services:
  main:
    depends_on:
      depression-chatbot:
        condition: service_healthy

  depression-chatbot:
    build:
      context: ./depression-chatbot
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      QWEN_API_KEY: ${QWEN_API_KEY:-${DASHSCOPE_API_KEY:-}}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DEPRESSION_AGENT_PROVIDER: ${DEPRESSION_AGENT_PROVIDER:-qwen}
      DEPRESSION_AGENT_MODEL: ${DEPRESSION_AGENT_MODEL:-qwen-plus}
      DEPRESSION_AGENT_API_BASE: ${DEPRESSION_AGENT_API_BASE:-}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-}
      QWEN_API_BASE: ${QWEN_API_BASE:-${DASHSCOPE_API_BASE:-}}
      DASHSCOPE_API_BASE: ${DASHSCOPE_API_BASE:-}
      PYTHONUNBUFFERED: "1"
    expose:
      - "8000"
    ports:
      - "8906:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()",
        ]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 20s
