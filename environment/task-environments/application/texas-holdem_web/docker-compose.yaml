services:
  main:
    depends_on:
      holdem-web:
        condition: service_healthy
  holdem-web:
    build:
      context: ./holdem-web
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',8000),timeout=2); s.close()"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s
