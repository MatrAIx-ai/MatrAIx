services:
  main:
    depends_on:
      owly-api:
        condition: service_healthy

  owly-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: owly
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  owly-api:
    # Upstream Owly (Hesper-Labs/owly) built from its own Dockerfile,
    # pinned to the last reviewed main commit.
    build:
      context: ./owly-app
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@owly-db:5432/owly?schema=public
      NEXT_PUBLIC_APP_URL: http://owly-api:3000
      NODE_ENV: production
      JWT_SECRET: personabench-local-jwt-secret-not-for-production
      WEBHOOK_SECRET: personabench-local-webhook-secret
      NEXTAUTH_SECRET: personabench-local-nextauth-secret
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    # Extend upstream CMD with the knowledge-base seed so the support agent
    # has grounded answers (business hours, return/refund policy).
    command:
      [
        "sh",
        "-c",
        "npx prisma migrate deploy && (npx prisma db seed || echo 'seed skipped') && npm start",
      ]
    depends_on:
      owly-db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 45s
