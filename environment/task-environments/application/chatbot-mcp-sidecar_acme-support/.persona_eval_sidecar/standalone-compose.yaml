services:
  support-bot:
    build:
      context: support-bot
    ports:
    - 127.0.0.1:8903:8000
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - import socket; s=socket.create_connection(('localhost', 8000), timeout=2);
        s.close()
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
