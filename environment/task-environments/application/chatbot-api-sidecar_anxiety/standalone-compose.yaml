services:
  anxiety-chatbot:
    build:
      context: ./anxiety-chatbot
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      QWEN_API_KEY: ${QWEN_API_KEY:-${DASHSCOPE_API_KEY:-}}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      ANXIETY_AGENT_PROVIDER: ${ANXIETY_AGENT_PROVIDER:-qwen}
      ANXIETY_AGENT_MODEL: ${ANXIETY_AGENT_MODEL:-qwen-plus}
      ANXIETY_AGENT_API_BASE: ${ANXIETY_AGENT_API_BASE:-}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-}
      QWEN_API_BASE: ${QWEN_API_BASE:-${DASHSCOPE_API_BASE:-}}
      DASHSCOPE_API_BASE: ${DASHSCOPE_API_BASE:-}
      PYTHONUNBUFFERED: "1"
    ports:
      - "8907:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()",
        ]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 20s
