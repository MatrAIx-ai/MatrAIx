services:
  platform:
    build:
      context: ../..
      dockerfile: environments/oasis/platform/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/simulation.db
      - RECSYS_TYPE=random
      - MAX_REC_POSTS=50

  agent-0:
    build:
      context: ../..
      dockerfile: environments/oasis/agents/Dockerfile
    environment:
      - PLATFORM_URL=http://platform:8000
      - PERSONA_PATH=personas/Jun20_1k_persona_description/ID0001.yaml
      - LLM_BASE_URL=http://host.docker.internal:8002/v1
      - LLM_MODEL=Qwen/Qwen3-4B
      - NUM_STEPS=10
    depends_on:
      - platform

  agent-1:
    build:
      context: ../..
      dockerfile: environments/oasis/agents/Dockerfile
    environment:
      - PLATFORM_URL=http://platform:8000
      - PERSONA_PATH=personas/Jun20_1k_persona_description/ID0002.yaml
      - LLM_BASE_URL=http://host.docker.internal:8002/v1
      - LLM_MODEL=Qwen/Qwen3-4B
      - NUM_STEPS=10
    depends_on:
      - platform

  agent-2:
    build:
      context: ../..
      dockerfile: environments/oasis/agents/Dockerfile
    environment:
      - PLATFORM_URL=http://platform:8000
      - PERSONA_PATH=personas/Jun20_1k_persona_description/ID0003.yaml
      - LLM_BASE_URL=http://host.docker.internal:8002/v1
      - LLM_MODEL=Qwen/Qwen3-4B
      - NUM_STEPS=10
    depends_on:
      - platform
