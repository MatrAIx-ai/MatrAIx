# Docker survey form run with a checked-in example instrument. ANTHROPIC_API_KEY only.
#
#   uv run harbor run -c configs/jobs/example-job-recipe/appSim-survey-form-local.yaml

job_name: appSim-survey-form-local
jobs_dir: jobs
n_attempts: 1
timeout_multiplier: 1.0
n_concurrent_trials: 1
quiet: false

environment:
  type: docker
  delete: true

agents:
  - name: persona-claude-code
    model_name: anthropic/claude-haiku-4-5
    kwargs:
      persona_path: persona/datasets/bench-dev-2000/persona_0042.yaml

tasks:
  - path: application/tasks/survey_form

extra_instruction_paths:
  - application/tasks/survey_form/examples/product_attitudes_task_prompt.md
