# Backtest portfolio asset allocation web task — ORACLE trial (no API key).
# Runs the reference solution/solve.sh in the shared browser-use Docker env,
# exercising the task + verifier contract end to end without an LLM call.
#
#   uv run harbor run -c configs/jobs/example-job-recipe/appSim-web-portfoliovisualizer-backtest-oracle.yaml

job_name: appSim-web-portfoliovisualizer-backtest-oracle
jobs_dir: jobs
n_attempts: 1
timeout_multiplier: 1.0
n_concurrent_trials: 1
quiet: false

environment:
  type: docker
  delete: true

agents:
  - name: oracle

tasks:
  - path: application/tasks/web-portfoliovisualizer_backtest-allocation
