# Docker Linux web CUA against a task-hosted ecommerce platform. ANTHROPIC_API_KEY only.
#
#   uv sync --extra computer-1
#   export ANTHROPIC_API_KEY=...
#   uv run harbor run -c configs/jobs/example-job-recipe/appSim-web-ecommerce-platform-local.yaml

job_name: appSim-web-ecommerce-platform-local
jobs_dir: jobs
n_attempts: 1
timeout_multiplier: 1.0
n_concurrent_trials: 1
quiet: false

environment:
  type: docker
  delete: true

agents:
  - name: persona-computer-1
    model_name: anthropic/claude-sonnet-4-6
    kwargs:
      persona_path: persona/datasets/bench-dev-2000/persona_0042.yaml
      cua_submission_profile: ecommerce_interaction

tasks:
  - path: application/tasks/web-ecommerce-platform_product-discovery
