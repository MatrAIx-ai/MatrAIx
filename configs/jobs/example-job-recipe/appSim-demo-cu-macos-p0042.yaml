# macOS notification-preferences demo — persona 0042 (Southeast Asia / formal).
#   uv run harbor run -c configs/jobs/example-job-recipe/appSim-demo-cu-macos-p0042.yaml

job_name: appSim-demo-cu-macos-p0042
jobs_dir: jobs
n_attempts: 1
timeout_multiplier: 1.0
n_concurrent_trials: 1
quiet: false

environment:
  type: use-computer
  delete: true
  kwargs:
    reservation_id: ${USE_COMPUTER_RESERVATION_ID}

agents:
  - name: persona-computer-1
    model_name: anthropic/claude-sonnet-4-6
    kwargs:
      persona_path: persona/datasets/bench-dev-sample/persona_0042.yaml
      max_steps: 25

tasks:
  - path: application/tasks/example-computer-use-macos_notification-preferences
