# IKEA Room Planner — CUA variant (persona-computer-1 on the shared-web-cua-linux
# desktop: headed Chromium under Xvfb, driven by screenshots + xdotool). Claude
# Sonnet 4.5 computer-use via Amazon Bedrock.
#   export AWS_BEARER_TOKEN_BEDROCK=...   # Bedrock API key (bearer token)
#   export AWS_REGION=us-east-1
#
#   uv run harbor run -c configs/jobs/example-job-recipe/appSim-web-cua-ikea-room-planner-bedrock.yaml

job_name: appSim-web-cua-ikea-room-planner-bedrock
jobs_dir: jobs
n_attempts: 1
timeout_multiplier: 1.0
n_concurrent_trials: 1
quiet: false

environment:
  type: docker
  delete: true

agents:
  - name: persona-computer-1
    model_name: bedrock/us.anthropic.claude-sonnet-4-5-20250929-v1:0
    kwargs:
      persona_path: persona/datasets/bench-dev-sample/persona_0042.yaml

tasks:
  - path: application/tasks/web-cua-ikea-room-planner
