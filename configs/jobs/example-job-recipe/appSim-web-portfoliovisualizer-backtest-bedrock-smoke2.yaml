# Backtest portfolio asset allocation — 2-persona SMOKE batch. Confirms the
# live-site + Bedrock browser-use loop and the aggregation->PDF pipeline before
# committing to the full 10-persona cohort. Two contrasting risk bands so the
# reporting.json grouping (reason-by-risk) has >1 bucket.
#
#   export AWS_BEARER_TOKEN_BEDROCK=...   # Bedrock API key (bearer token)
#   export AWS_REGION=us-east-1
#   uv run harbor run -c configs/jobs/example-job-recipe/appSim-web-portfoliovisualizer-backtest-bedrock-smoke2.yaml
#
# Personas: 0069 Risk-averse 25-34 High income · 0129 Risk-tolerant 45-54 High income

job_name: appSim-web-portfoliovisualizer-backtest-bedrock-smoke2
jobs_dir: jobs
n_attempts: 1
timeout_multiplier: 1.0
n_concurrent_trials: 2
quiet: false

environment:
  type: docker
  delete: true

agents:
  # Sonnet 4.5: Haiku 4.5 fails browser-use's structured AgentOutput schema
  # (emits `thinking` but not the required `action` field, 6/6 failures).
  - name: persona-browser-use
    model_name: bedrock/us.anthropic.claude-sonnet-4-5-20250929-v1:0
    kwargs:
      persona_path: persona/datasets/bench-dev-sample/persona_0069.yaml
  - name: persona-browser-use
    model_name: bedrock/us.anthropic.claude-sonnet-4-5-20250929-v1:0
    kwargs:
      persona_path: persona/datasets/bench-dev-sample/persona_0129.yaml

tasks:
  - path: application/tasks/web-portfoliovisualizer_backtest-allocation
