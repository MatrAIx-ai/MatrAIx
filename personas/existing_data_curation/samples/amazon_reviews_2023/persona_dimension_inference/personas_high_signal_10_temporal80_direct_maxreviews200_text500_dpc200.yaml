  id: "amazon_user_0001"
  name: "AHJYOD56GVUHGUW6NV4US7JR6NDA"
  title: "Amazon review-derived persona"
  description: "Window 1: Reviewer frequently purchases and reviews products in home and kitchen, arts and crafts, electronics, beauty, pet supplies, and health categories. Shows interest in accessibility and sensory-friendly products, often mentioning ease of use and comfort. Reviews indicate a focus on family-related needs and caregiving, with repeated mentions of a son with autism and sensory issues. Rating behavior is generally positive with occasional critical feedback. Window 2: Reviewer shows broad interests in home improvement, electronics, pet supplies, health and personal care, and crafts, with frequent purchases for family members including children and husband. Reviews indicate use of assistive devices and adaptations for wheelchair use. Shows preference for durable, easy-to-use, and practical products, often with health or accessibility considerations. Window 3: Reviewer frequently engages with home improvement, gardening, electronics, clothing, and caregiving-related products, showing preferences for practical, durable, and comfortable items. Reviews often mention ease of use, safety, and suitability for people with disabilities or special needs."
