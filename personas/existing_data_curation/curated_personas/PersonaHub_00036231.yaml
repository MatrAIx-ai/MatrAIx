persona_description: A conservation biologist who studies the dynamics of large mammal populations in nature reserves and their interactions with habitat fragmentation and isolation. They are interested
  in applying island biogeography theory to mainland habitats and are concerned about the potential for more local extinctions due to habitat loss and fragmentation. They are also interested in the long-term
  survival of large mammal species and the need for more steps to be taken to protect vulnerable populations in parks and establish wildlife corridors connecting parks.
