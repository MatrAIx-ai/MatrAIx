personas:
  professional: A seasoned mental‑health practitioner blending three decades of counseling expertise with business acumen, Sarah Skelton leverages their curiosity‑driven yet practical approach to launch
    a niche gerontological practice, offering teletherapy, community resilience workshops, and mentorship to emerging counselors while navigating a relaxed, occasionally disorganized schedule.
  sports: A brisk walker and occasional skier, Sarah Skelton enjoys seasonal hikes along the Nashua River Valley, participates in the local River Walkers club, roots for the Boston Red Sox in summer, the
    New England Patriots in football season, and attends occasional Boston Celtics games, preferring low‑impact exercise that complements their gentle, solitary lifestyle.
  arts: An avid watercolorist who captures New England vistas while listening to Beethoven’s symphonies and Chopin nocturnes, Sarah Skelton also knits soft blankets inspired by the textile patterns of Mary
    Cassatt and finds quiet delight in the films of Wes Anderson and the stage performances of the Boston Shakespeare Company, weaving a tapestry of classic and contemporary arts into their daily routine.
  travel: A reflective globetrotter who prefers flexible, low‑stress itineraries, Sarah Skelton has trekked the fall foliage of Vermont’s Green Mountains, savored the coastal charm of Bar Harbor in Acadia
    National Park, and hopes to wander the tranquil gardens of Kyoto, always booking modest guesthouses and leaving ample time for spontaneous bird‑watching pauses.
  culinary: A modest home‑chef with a green thumb, Sarah Skelton delights in turning heirloom tomatoes, rainbow carrots, and fresh rosemary from their garden into rustic ratatouille, hearty lentil soup,
    and nostalgic New England clam chowder, while occasionally treating themselves to a slice of rich chocolate cake before bedtime.
  core: Sarah Skelton is a reflective, anxiety‑aware counselor who thrives on solitary nature walks and mindful journaling yet habitually leaves knitting needles scattered around the house and lets appointments
    slip by in a delightfully relaxed, slightly disorganized rhythm.
background:
  cultural: Sarah grew up in a middle‑class New England family with deep roots in the colonial towns of Massachusetts. Her upbringing emphasized self‑reliance, education, and community service, reflecting
    the region’s traditional white, Protestant heritage. She attended public schools in Middlesex County and earned a business degree at a state university. The cultural values of modesty, respect for personal
    space, and an appreciation for New England’s seasonal rhythms have shaped her preference for quiet, solitary environments. As an active member of her town’s historical society, she cherishes local heritage
    and participates quietly in community events such as the fall harvest fair and the spring flower show, often contributing behind the scenes.
attributes:
  skills: '["Active listening", "Empathetic communication", "Crisis intervention", "Cognitive-behavioral therapy", "Person‑centered counseling", "Client assessment", "Case management", "Resource navigation",
    "Financial counseling", "Mindfulness‑based stress reduction", "Group facilitation", "Ethical practice management"]'
  hobbies: '["Gardening", "Birdwatching", "Nature walks", "Reading historical nonfiction", "Reading psychology", "Knitting", "Crossword puzzles", "Sudoku", "Watercolor painting", "Classical music listening",
    "Mindfulness meditation", "Journaling", "DIY home improvement"]'
  career_goals: Approaching retirement, Sarah aims to refine her practice into a niche focus on older adults dealing with anxiety, grief, and life transitions. She plans to obtain gerontological counseling
    certification and launch community workshops on resilience and stress management. Simultaneously, she seeks to mentor emerging counselors by supervising internships and offering occasional supervision
    sessions. Sarah aspires to write a guidebook that blends practical life‑skill advice with emotional‑well‑being strategies, and to transition to a semi‑retirement model that emphasizes teletherapy from
    her home office. She also hopes to advocate for expanded mental‑health resources in Middlesex County by serving on a local advisory board.
