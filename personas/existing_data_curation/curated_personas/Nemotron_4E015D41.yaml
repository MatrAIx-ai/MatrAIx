personas:
  professional: Yvette Mayotte, a seasoned retail operations manager with a graduate business degree, leverages their meticulous analytical mindset and diplomatic communication style to streamline store
    processes, drive data‑driven profitability, and mentor emerging leaders while maintaining a calm, predictable workplace.
  sports: Yvette Mayotte favors low‑impact exercise, committing to sunrise yoga sessions three times a week and joining the local Midtown Run Club for weekend 5k jogs, while they cheer on the Dallas Cowboys
    in the fall and the Texas Rangers during baseball season.
  arts: Yvette Mayotte finds creative balance in their evenings by reading the latest leadership titles alongside literary works by Margaret Atwood, listening to the mellow chords of Willie Nelson and the
    vocal harmonies of Alison Krauss, and attending community theatre performances of classics like 'Our Town' starring local talent.
  travel: Yvette Mayotte favors carefully planned getaways that blend relaxation with cultural immersion, having explored the historic streets of New Orleans and the artistic enclave of Santa Fe, while
    they dream of a spring visit to Kyoto’s zen gardens and the serene hiking trails of the Great Smoky Mountains.
  culinary: Yvette Mayotte relishes crafting Southern comfort dishes such as slow‑smoked brisket, collard greens seasoned with smoked paprika, and buttery cornbread, often incorporating home‑grown heirloom
    tomatoes and fresh basil from their garden, though they occasionally over‑spice in their enthusiasm.
  core: Yvette Mayotte blends analytical rigor with gentle hospitality, orchestrating efficient retail operations while nurturing a backyard garden and a secret stash of overdue library books, all while
    battling a chronic habit of over‑organizing their spice rack.
background:
  cultural: Yvette grew up in a middle-class suburban setting in Texas, blending traditional Southern hospitality with contemporary American values. Her family traditions emphasize community involvement,
    church attendance, and strong family bonds. She identifies with mainstream American culture while appreciating local Texan customs such as supporting high school sports, enjoying barbecue gatherings,
    and participating in neighborhood events.
attributes:
  skills: '["Strategic Planning", "Operational Efficiency", "Budget Management", "Data-Driven Decision Making", "Project Management", "Team Leadership", "Conflict Resolution", "Advanced Excel", "ERP (SAP
    Business One)", "CRM", "Data Visualization (Tableau)"]'
  hobbies: '["Reading (business & self-improvement books)", "Gardening", "Cooking (Texan/Southern cuisine)", "Small book club", "Volunteering at community food bank", "Yoga", "Meditation"]'
  career_goals: Yvette aims to advance to a senior leadership position, such as Director of Operations, within the next five years. She is focused on driving process improvements that boost profitability
    while preserving a supportive workplace culture. She seeks opportunities to mentor emerging managers, lead technology integration projects, and shape strategic initiatives that align with the company's
    long-term growth. Maintaining a healthy balance between career advancement and family commitments remains a central ambition.
