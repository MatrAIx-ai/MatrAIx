personas:
  professional: Terry Garcia, a retired electrical engineer with three decades of systematic problem‑solving experience, now volunteers as a technical advisor at the local community center where they translate
    complex renewable‑energy concepts into practical DIY projects for seniors while mentoring high‑school STEM students and documenting every step in meticulous spreadsheets.
  sports: Terry Garcia, an avid participant in the senior walking club that meets twice weekly on the Hudson River Trail, cheers on the New York Yankees and Hudson Valley Renegades, occasionally joins a
    low‑key bowling league at the senior center, and practices gentle stretching routines to keep the knees flexible for their gardening and woodworking hobbies.
  arts: Terry Garcia, a regular at the Hudson Community Theater where they enjoy productions of Arthur Miller’s "The Crucible" and local jazz nights, reads mystery novels by Agatha Christie and Tana French,
    plays chess at the senior center, and curates a modest collection of vintage train model brochures that inspire their model‑railway layouts.
  travel: Terry Garcia, who prefers low‑impact road trips with a well‑planned itinerary, has visited the historic streets of Savannah, Georgia, the botanical gardens of Asheville, North Carolina, and the
    scenic Adirondack Park for fall foliage, while budgeting travel expenses to ensure they can afford future visits to the Grand Canyon with their spouse.
  culinary: Terry Garcia, a garden‑to‑table enthusiast, frequently cooks roasted beets with goat cheese, herb‑infused grilled chicken, and a hearty vegetable stew using carrots, kale, and potatoes from
    their beds, enjoys the occasional New York‑style pizza with extra mozzarella, and keeps a well‑stocked spice rack featuring rosemary, cumin, and smoked paprika.
  core: Terry Garcia is a structurally minded retired engineer who blends meticulous planning with a lively social spirit, worrying about finances and health while cultivating a vibrant garden, mentoring
    youths, and staying active in community arts and sports.
background:
  cultural: Terry grew up in a middle‑class New England family where practical work ethic, self‑reliance, and community involvement were core values. His cultural milieu reflects traditional New England
    White Anglo‑Saxon Protestant influences, emphasizing modesty, respect for local traditions, seasonal town events, and a strong sense of civic duty. This background informs his structured lifestyle,
    commitment to volunteering, and appreciation for organized group activities.
