persona_description: A statistician who focuses on economic statistics, particularly on measuring and quantifying economic activity and its impact on living standards, sustainability of public finances,
  and economic policy. This person is passionate about the challenges of measuring the economy and the importance of GDP in managing the economy, and is committed to ensuring that the core focus of GDP
  remains on its key drivers of living standards, sustainability, and economic policy. They are also aware of the limitations of GDP and the need to develop other measures to capture well-being, distributional
  issues, and environmental sustainability.
