  career_goals: Although only three years old, Diana shows early curiosity about books and learning. Her parents encourage her to master pre‑literacy and numeracy skills—learning to recognize the alphabet,
    counting to twenty, and writing her name. In the long term, she expresses a gentle interest in helping others, hinting at future ambitions such as becoming a teacher, librarian, or community‑center
    volunteer where her methodical nature and love for order can be applied.
