personas:
  professional: A meticulous three‑year‑old named Diana Smith runs a pretend tea‑party business, meticulously setting out tiny plates, tracking guest lists on crayon, and insisting every doll sits in a
    designated seat before serving, demonstrating an early love for structure and methodical planning, and they take pride in keeping the schedule perfectly timed.
  sports: A spirited three‑year‑old Diana Smith spends Saturday mornings at the local community center’s toddlers’ T‑ball practice, proudly wearing a mini Atlanta Braves cap, waving a plastic bat, and cheering
    for the team while also attending the weekly kids’ soccer clinic at the church’s field, showing a competitive edge even in play as they strive to out‑run their peers.
  arts: A creative three‑year‑old Diana Smith loves drawing colorful portraits of Dolly Parton and Mickey Mouse, dancing to gospel hymns after Sunday service, and staging elaborate puppet shows for family,
    often narrating each scene with a confident, slightly competitive flair that reflects their love for performance, and they delight in applause.
  travel: An adventurous three‑year‑old Diana Smith enjoys weekend outings to Lake Allatoona for paddle‑boat rides, eagerly explores the county fair’s carousel, and dreams of a family road‑trip to Walt Disney World,
    where they plan to map out each ride and snack stall in advance, balancing curiosity with a need for schedule.
  culinary: A food‑enthusiastic three‑year‑old Diana Smith relishes the crunchy bite of fried chicken, buttery biscuits, and sweet tea—always insisting on extra sugar—and proudly pretends to stir a pot
    of mac and cheese in her toy kitchen, often demanding a taste test before serving anyone else, a charming yet slightly selfish habit that they repeat with gusto.
  core: Diana Smith is a methodical three‑year‑old who thrives on routine, hoards crayons like treasure, and insists on counting every bite of sweet tea before savoring it, showing they love order even
    in play.
background:
  cultural: Diana is raised in a white family in Rome, Georgia, within Bartow County, a region steeped in Southern American traditions. Her family participates in local church gatherings, community events
    such as county fairs, and seasonal celebrations like Fourth of July barbecues. The neighborhood values close‑knit relationships, hospitality, and a respect for routine. Family meals frequently feature
    Southern cuisine—fried chicken, biscuits, sweet tea—while Sunday mornings often include family‑friendly worship services. The area’s natural surroundings provide opportunities for outdoor exploration,
    including hiking nearby trails and visiting local lakes. Her upbringing reflects a blend of Mid‑South cultural values that prioritize community, family cohesion, and appreciation for simple, everyday
    pleasures.
