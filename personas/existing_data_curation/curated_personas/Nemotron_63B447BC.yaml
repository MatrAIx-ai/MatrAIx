  hobbies: '[''Gardening (tomatoes, native wildflowers)'', ''Reading historical fiction and mystery novels'', ''Book club participation'', ''Walking/hiking local trails with her rescued dog'', ''Gentle
    yoga and mindfulness meditation'', ''Volunteering at community shelter (housing referrals)'', ''Neighborhood clean‑up events'', ''Cooking and trying new recipes'', ''Attending local art fairs and craft
    markets'']'
  career_goals: Sheila aims to deepen her impact in Fort Wayne by obtaining a broker’s license and building a small, community‑focused team that specializes in assisting first‑time homebuyers and seniors
    transitioning to smaller homes. Over the next five years she plans to launch a mentorship program for new agents, become a recognized advocate for sustainable housing practices, and develop a consultancy
    role that advises developers on creating neighborhood‑friendly projects. Balancing her ambitious business growth with stress‑management practices, such as regular yoga and mindful scheduling, remains
    a core priority.
