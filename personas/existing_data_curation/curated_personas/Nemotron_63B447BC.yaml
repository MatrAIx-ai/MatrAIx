personas:
  professional: Sheila Henry is a seasoned residential real-estate broker in Fort Wayne whose practical market-analysis skills are balanced by a curiosity for AI-driven analytics, leveraging MLS, CRM and
    virtual tours to assist first-time buyers and seniors, while her relaxed, occasionally disorganized schedule is tempered by a compassionate, cooperative approach to client relationships and community
    outreach.
  sports: Sheila Henry enjoys regular walks along the Fort Wayne riverfront trails with her rescued dog, joins the local Fort Wayne Walking Club for weekend group hikes, and when the weather allows she
    courts a friendly game of pickleball at the community center, while she casually follows the Fort Wayne TinCaps baseball team and the Komets hockey club, often attending home games to unwind.
  arts: Sheila Henry nurtures her love of the arts by frequenting Fort Wayne’s art fairs and craft markets, admiring works by regional painter Heather Swenson, listening to folk classics by Joan Baez while
    cooking, and indulging in historical fiction by Ken Follett and mystery novels by Tana French, a habit that fuels her imagination and offers a quiet escape after a busy day.
  travel: Sheila Henry favors modest, road-trip style travel that blends nature and small-town charm, having explored the Blue Ridge Mountains in Asheville and the historic gardens of Colonial Williamsburg,
    while she dreams of wandering through the vineyards of Tuscany, always balancing her budget with a keen eye for off-season deals and a desire to return home in time for her community volunteering schedule.
  culinary: Sheila Henry, an avid home cook, specializes in comfort meals like chicken pot pie and homemade tomato basil soup made from her garden’s heirloom tomatoes, enjoys experimenting with fried green
    tomatoes and fresh herb-infused pasta sauces, and while her cooking skill is solid, she sometimes over-spices dishes in a bid to impress guests at neighborhood potlucks.
  core: Sheila Henry balances a compassionate, community-centered real-estate career with a garden-filled sanctuary and a habit of worrying over the smallest details, often letting a disorganized schedule
    lead to late-night candlelit cooking sessions.
background:
  cultural: Sheila was raised in a middle‑class white family in Fort Wayne, Indiana, with German and Irish ancestry that reflects the region’s immigrant history. Growing up in the Midwest instilled in her
    values of community, modesty, practicality, and neighborly support. These cultural influences shape her compassionate approach to real estate, her emphasis on helping others, and her preference for
    flexible, people‑centered solutions while still respecting established methods.
