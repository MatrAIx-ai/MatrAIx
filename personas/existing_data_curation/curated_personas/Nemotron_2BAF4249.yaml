personas:
  professional: Pablo Salim, a 21‑year‑old janitor in Villalba, leverages precise floor‑care techniques, bilingual inventory logging, and basic plumbing and electrical repairs to maintain a highly organized
    work environment that reflects his preference for structure and quiet efficiency, while actively pursuing OSHA certification and an associate degree to transition into facilities management.
  sports: Pablo Salim enjoys solitary early‑morning jogs along the hills surrounding Villalba and occasional weekend hikes, follows the Capitanes de Arecibo basketball team and the Cangrejeros de Santurce
    baseball club for quiet inspiration, and participates in a local community running club that meets twice a month, preferring low‑key, structured exercise over crowded gym settings.
  arts: Pablo Salim’s creative side shines through his landscape photography inspired by Ansel Adams, his appreciation for instrumental piano works by Ludovico Einaudi, and his occasional listening to the
    gentle plena rhythms of Plena Libre, while his literary palate favors historical fiction by Ken Follett and biographies of resilience by Laura Hillenbrand.
  travel: Pablo Salim prefers well‑planned, low‑stress getaways, often trekking the rainforest trails of El Yunque, island‑hopping to Culebra for sunrise photography, and saving for future cultural tours
    of Barcelona and Granada to explore the historic architecture that fuels his reading interests.
  culinary: Pablo Salim, a budding home chef, experiments with classic mofongo and arroz con gandules using plantains, sofrito, pork cracklings, and cilantro, while also growing his own tomatoes, herbs,
    and plantains in a modest garden that supplies fresh ingredients for his meticulously measured, quiet cooking sessions.
  core: Pablo Salim, a methodical 21‑year‑old with a quiet demeanor, channels his love of structure into cleaning, photography, and cooking, yet battles frequent anxiety that drives his solitary, ritual‑driven
    lifestyle.
background:
  cultural: Pablo was born and raised in Villalba, a close‑knit municipality in the central mountains of Puerto Rico. His family reflects the island's blend of Spanish, African, and Taíno heritage, and
    he grew up speaking Spanish at home while learning English at school. Villalba’s community life, rooted in Catholic traditions and local festivals such as the Fiesta de la Cordialidad, shaped his sense
    of belonging and respect for collective rituals. He cherishes Puerto Rican cultural expressions, from the rhythmic beats of plena and bomba to the flavors of island cuisine like lechón asado and tembleque.
    The resilience displayed by his neighbors after past hurricanes reinforced his practical, structured approach to daily life and work. Though he values solitude, his cultural background instills a deep,
    albeit quiet, pride in his Puerto Rican identity.
attributes:
  skills: '[''Floor stripping, waxing, and polishing'', ''Carpet and upholstery cleaning'', ''Inventory management of cleaning supplies'', ''Basic plumbing repairs (leak fixing, drain unclogging)'', ''Basic
