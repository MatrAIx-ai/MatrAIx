    scheduling'', ''Bilingual communication (Spanish and English)'']'
  hobbies: '[''Reading historical fiction and biographies'', ''Landscape photography'', ''Gardening (vegetable and herb patch)'', ''Cooking traditional Puerto Rican dishes'', ''Mindfulness meditation'',
    ''Listening to instrumental piano and soft plena music'']'
  career_goals: Pablo aims to transition from a janitorial role to a facilities‑management position within the next five years. He plans to obtain a certification in Occupational Safety and Health (OSHA)
    and enroll in a community‑college associate program focused on building maintenance or facilities management to gain formal credentials. In the short term, he seeks a stable, full‑time position with
    a clear schedule and benefits, valuing the predictability it provides. Long‑term, he hopes to become a shift supervisor or maintenance coordinator for a municipal building or a private corporation,
    eventually opening his own small cleaning and maintenance service that emphasizes structured workflows and reliable service. He also wants to develop leadership skills that allow him to mentor younger
    workers while maintaining a calm, organized work environment.
