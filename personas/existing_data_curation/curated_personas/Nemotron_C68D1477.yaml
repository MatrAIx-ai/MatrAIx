  hobbies: '[''Painting/Drawing'', ''Photography'', ''Attending art exhibitions'', ''Listening to Mexican folk and contemporary music'', ''Salsa and folklorico dancing'', ''Playing soccer'', ''Debate club'',
    ''Strategic board games (chess)'', ''Volunteer work at community festivals'', ''Reading psychology and art books'', ''Journaling'', ''Yoga'', ''Creating short videos'']'
  career_goals: Marisol plans to pursue a bachelor’s degree in Communications with a focus on digital media or a BFA in Visual Arts. Her immediate goal is to secure internships in community outreach or
    cultural event management, where she can apply her organizational talents and bilingual abilities. Long‑term, she envisions becoming a cultural events coordinator and digital strategist for a nonprofit
    that celebrates Mexican heritage in the Southern United States. She aims to launch an online platform that blends art criticism, community storytelling, and virtual exhibitions, eventually establishing
    a community art space in Bryant where local artists and youth can collaborate. Leveraging her competitive drive, she hopes to win grants and awards that fund her projects and expand her influence as
    a bilingual content creator bridging Mexican and Southern cultures.
