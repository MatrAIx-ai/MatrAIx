personas:
  professional: Marisol Roa is a bilingual communications major who blends competitive debate polish with a creative eye for mixed‑media visuals; they use Adobe Photoshop and Canva to craft eye‑catching
    social‑media campaigns for community cultural events while pursuing internships in nonprofit outreach and event coordination.
  sports: Marisol Roa energizes weekends on a co‑ed soccer team in the Bryant community league while dancing salsa at local folklórico gatherings, supplements the routine with yoga, and avidly roots for
    the Dallas Cowboys and the Houston Astros, often wearing their jerseys to practices for a morale boost.
  arts: Marisol Roa channels a love for mixed‑media painting, sketching, and photography into Instagram photo essays that reference the vibrant motifs of Frida Kahlo and the minimalist tones of Georgia
    O'Keeffe; they curate weekly playlists featuring Son Jarocho duo Los Cojolites alongside Southern indie band The War on Drugs to accompany their creative process.
  travel: Marisol Roa prefers meticulously planned cultural trips that blend adventure with relaxation; they have explored Mexico City’s Día de los Muertos parades, New Orleans’ jazz streets, and Oaxaca’s
    artisan markets, while dreaming of a solo road trip along the Gulf Coast to capture sunrise moments in small coastal towns, all balanced against a limited student budget and academic calendar.
  culinary: Marisol Roa enjoys a moderate level of home cooking, frequently whipping up tacos al pastor with fresh pineapple and chipotle adobo, slow‑cooking chicken mole using ancho chilies and epazote,
    and pairing these with Southern staples like collard greens and fried catfish; they savor the fragrant aroma of simmering pozole and often experiment with corn masa dough for homemade tamales de elote.
  core: Marisol Roa balances a relentless drive to curate cultural experiences with a habit of over‑scheduling and obsessively editing Instagram videos into the early hours; they often battle anxiety‑fueled
    worry about missing deadlines.
background:
  cultural: Marisol is a first‑generation Mexican‑American whose family hails from Oaxaca. She grew up speaking Spanish at home and English at school, giving her a bicultural lens. Her household celebrates
    Mexican holidays such as Día de los Muertos, Las Posadas, and Mexican Independence Day, with traditional foods like mole, tamales, and fresh corn tortillas. Living in Bryant, Alabama, she has also embraced
    Southern customs—family barbecues, church gatherings, and Saturday high‑school football are part of her routine. This blend of Mexican heritage and Southern community life shapes her identity, fostering
    a deep appreciation for cultural exchange. She frequently shares her heritage through bilingual storytelling, cooking demonstrations, and cultural workshops, aiming to bridge the gap between her Mexican
    roots and the Southern environment she calls home.
attributes:
  skills: '[''Bilingual Spanish-English'', ''Graphic design (Adobe Photoshop, Canva)'', ''Event planning and coordination'', ''Social media content creation'', ''Public speaking & debate'', ''Critical thinking
