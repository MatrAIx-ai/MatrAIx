personas:
  professional: An aspiring community storyteller and rhythm enthusiast, Lakita Baker leads neighborhood sing‑alongs at the local park, wielding her toy microphone and a carefully sequenced set‑list that
    mirrors the structured rhythm of weekly church worship, showcasing they natural knack for organizing group activities while staying delightfully flexible.
  sports: A vivacious member of the local T‑ball league, Lakita Baker darts after the bright orange ball while the Tuskegee Golden Tigers mascot cheers from the dugout, proudly sports a mini Alabama Crimson
    Tide jersey on game days, and joins the family’s weekend run‑club sprint sessions, balancing structured practice with spontaneous playground races.
  arts: An enthusiastic gospel choir apprentice, Lakita Baker sings along to Mahalia Jackson’s timeless hymns and Kirk Franklin’s upbeat choruses during church rehearsals, while also crafting vivid finger‑paint
    murals of favorite hymn verses that brighten the community center walls, reflecting they love for group creativity and rhythmic structure.
  travel: An inquisitive explorer who favors short road trips, Lakita Baker has visited the historic Tuskegee Institute, splashed at Gulf Shores’ gentle surf, and dreams of a family vacation to Disneyland,
    always clutching a well‑worn picture book of airplanes as a travel companion and preferring planned itineraries with plenty of snack breaks.
  culinary: A budding chef who delights in the sweet tang of collard greens seasoned with smoked ham hocks, the comforting crunch of fried chicken, and the sugary warmth of sweet‑potato pie, Lakita Baker
    often helps grandparents stir cornbread batter while insisting on sprinkling extra cinnamon on their oatmeal, though they sometimes sneak a bite of chocolate pudding before dinner.
  core: Lakita Baker blends a love for rhythmic gospel sing‑alongs, meticulous coin‑saving rituals, and tireless playground energy into a charming mix of predictability and spontaneous joy, all while confidently
    leading group play and occasionally demanding the last cookie.
background:
  cultural: Lakita is a Black child growing up in Tuskegee, Alabama, a city steeped in African‑American history and Southern traditions. Her family celebrates cultural heritage through weekly church gatherings
    where gospel music and community fellowship are central. Souther­n soul food cooked by her grandparents, storytelling about Tuskegee Institute’s legacy, and participation in local festivals like Juneteenth
    shape her sense of identity. She learns about resilience and pride from family elders who share stories of the civil‑rights era, and these cultural influences nurture her confidence, community spirit,
    and love for music and shared experiences.
