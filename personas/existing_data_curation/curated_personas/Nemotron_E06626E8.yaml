  career_goals: Lakita loves imagining future roles that let her help others and stay active. She often says she wants to be a teacher because she enjoys sharing stories and guiding friends in learning
    new things. She also dreams of becoming a veterinarian to care for animals she sees at the local park, and she envisions herself as a dancer, moving to the joyful gospel and children’s music she loves.
    These ambitions reflect her outgoing nature, her compassion, and her desire to be part of a community.
