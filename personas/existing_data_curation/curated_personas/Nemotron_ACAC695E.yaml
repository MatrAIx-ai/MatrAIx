personas:
  professional: Ke Choi is an artisanal baker and pastry chef who merges sourdough precision with inventive flavor pairings like matcha and yuzu, leads a streamlined kitchen team with meticulous organization,
    and balances curiosity with practicality to uphold exacting quality and safety standards while they mentor emerging bakers.
  sports: Ke Choi fuels a love of the outdoors by hiking the San Gabriel Mountains with the Glendora Hiking Club on weekends, practicing Vinyasa yoga three times a week at Yoga Flow LA, cheering for the
    Los Angeles Dodgers during spring training, and tracking workouts on Strava, balancing high‑intensity cardio with mindful movement as they stay fit and energized.
  arts: Ke Choi immerses themselves in the arts by photographing each pastry creation à la Annie Leibovitz, attending intimate concerts featuring artists like Mitski and Anderson · Paak, and frequenting
    LACMA’s modern art exhibitions, finding inspiration for flavor narratives and visual presentation as they blend visual storytelling with culinary craft.
  travel: Ke Choi plans culinary pilgrimages that blend meticulous itineraries with spontaneous market strolls, having explored Tokyo’s Tsukiji fish market, Seoul’s Gwangjang street food alley, and Taipei’s
    night bazaars, while also seeking weekend getaways to Napa Valley vineyards and Santa Fe’s art scene, always budgeting travel costs to fund their future bakery as they balance wanderlust with entrepreneurial
    goals.
  culinary: Ke Choi is a master baker who delights in crafting pastries like black sesame croissants, matcha chiffon cake, and yuzu curd tarts, blends almond flour for gluten‑free options, experiments with
    street‑food‑inspired fillings such as miso‑caramel, and seeks diners that pair artisanal coffee with fresh fruit from the Glendora farmers market, all while they continuously refine flavor pairings
    through relentless experimentation.
  core: Ke Choi blends relentless curiosity with disciplined precision, juggling a bustling bakery, daily yoga, and a habit of late‑night recipe sketches that often end in a midnight snack of leftover dough,
    as they chase perfection in both work and play.
background:
  cultural: Ke is a first-generation Korean-American raised in the Los Angeles County suburbs. Her parents immigrated from Seoul, bringing with them a strong emphasis on family meals, respect for tradition,
    and a love of Korean sweets such as yakgwa and dasik. Growing up bilingual, she celebrates Korean holidays like Chuseok and Seollal while also embracing Californian outdoor lifestyle. This blend of
    cultural influences fuels her passion for integrating ingredients like black sesame, matcha, red bean paste, and yuzu into her bakery creations, and she stays active in local Korean cultural associations
    and language circles.
