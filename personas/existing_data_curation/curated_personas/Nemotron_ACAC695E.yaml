  career_goals: Ke aims to open a boutique bakery in the San Gabriel Valley that showcases her signature East‑Asian‑inspired pastries while serving as a community hub for baking workshops and cultural events.
    In the next five years she plans to earn the Certified Pastry Chef designation, expand her product line to include a line of gluten‑free and vegan options, and build a small wholesale network supplying
    local cafés. She also envisions publishing a cookbook that documents her family’s Korean recipes alongside her modern creations and mentoring emerging bakers from immigrant backgrounds.
