  hobbies: '[''Gardening'', ''Genealogy research'', ''Reading historical novels'', ''Chess'', ''Church choir participation'', ''Cooking soul food'', ''Listening to classic R&B'', ''Walking in nature'',
    ''Volunteer work at senior center'']'
  career_goals: Although retired, Willie seeks to document and preserve the oral histories of the African American community in Sumner County by compiling a memoir and curating a local exhibit. He aims
    to mentor younger volunteers at the senior center, help them develop research and storytelling skills, and maintain his health and independence so he can continue supporting his wife and family. He
    also aspires to contribute his budgeting expertise to the church’s outreach programs.
