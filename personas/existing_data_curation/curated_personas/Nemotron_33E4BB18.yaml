  career_goals: In her retirement, Elizabeth aims to deepen her impact as a community mentor and senior health advocate, leading intergenerational workshops that blend craft skills with wellness education.
    She hopes to document and share the oral histories of her neighbors, organize a small annual heritage festival, and continue learning new technologies to stay connected with her grandchildren. Maintaining
    her health, staying socially active, and leaving a lasting, structured legacy for future residents of Ashland are her primary ambitions.
