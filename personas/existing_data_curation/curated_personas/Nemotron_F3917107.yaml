  hobbies: '[''Reading science fiction and speculative nonfiction'', ''Urban photography'', ''Jogging along the Riverwalk'', ''DIY electronics (Arduino, Raspberry Pi)'', ''Cooking contemporary soul food'',
    ''Listening to jazz and hip‑hop'', ''Watching documentaries on social and tech topics'', ''Playing pickup basketball with a small group of friends'']'
  career_goals: Antonio aims to become a senior investigative journalist known for bridging technology and social equity, eventually leading a data‑driven news team in the Midwest. He hopes to earn a Nieman
    or Knight fellowship to deepen his expertise in data journalism, and later launch a community‑focused digital news platform that amplifies under‑represented voices in STEM. A long‑term ambition is to
    host a podcast highlighting Black innovators and to mentor aspiring journalists from marginalized backgrounds, marrying his passion for storytelling with his commitment to representation.
