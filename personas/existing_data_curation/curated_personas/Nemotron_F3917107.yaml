personas:
  professional: Antonio Hall is a data‑driven investigative journalist who blends Python and SQL expertise with a knack for turning complex tech‑policy datasets into compelling multimedia stories, navigating
    deadlines with assertive focus while preferring solitary deep‑research sessions.
  sports: Antonio Hall enjoys quiet early‑morning jogs along the Grand Rapids Riverwalk, joins occasional pickup basketball games with a tight‑knit friend group, and follows the West Michigan Whitecaps
    with fervor, embodying a low‑key but consistent commitment to personal fitness.
  arts: Antonio Hall immerses himself in jazz legends like John Coltrane and hip‑hop innovators such as Kendrick Lamar, devours speculative fiction by Octavia Butler, and routinely captures candid street
    moments for photo essays, allowing creative expression to shape his journalistic voice.
  travel: Antonio Hall favors spontaneous road trips—often heading to Chicago for live music or New Orleans for jazz festivals—while dreaming of Iceland’s Northern Lights, planning travel on a shoestring
    budget that balances curiosity with flexibility.
  culinary: Antonio Hall experiments with modern soul‑food, reinventing collard greens with miso glaze and sweet‑potato cornbread spiced with jalapeño, often using a sous‑vide for perfectly tender chicken,
    and delights in swapping recipes at community potlucks, reflecting his love for both tradition and innovation.
  core: Antonio Hall is a curious, pragmatic storyteller who blends tech savvy with soulful creativity, juggling disciplined research with a relaxed, sometimes scattered, lifestyle.
background:
  cultural: Antonio grew up in a close‑knit African‑American community in Grand Rapids, where storytelling was a cornerstone of family gatherings and church gatherings. His parents, both college‑educated
    professionals, emphasized academic achievement while also preserving cultural traditions such as Sunday cooking, gospel music, and community barbershop conversations. Facing the dual pressures of being
    a Black student in STEM and a minority voice in media, he developed a keen awareness of representation and equity. This background fuels his dedication to covering stories that highlight racial disparities
    in technology, environmental justice, and social policy. Antonio stays connected to his heritage through annual participation in local Black cultural festivals, volunteering at after‑school STEM programs
    for youth, and maintaining strong ties with his extended family, which informs both his journalistic lens and personal pursuits.
attributes:
  skills: '[''Data journalism'', ''Statistical analysis (Python, R)'', ''SQL querying'', ''Investigative reporting'', ''Multimedia production (audio, video, photography)'', ''Data visualization (Tableau,
