personas:
  professional: Emely Casal, a bilingual dental hygienist with 25 years of experience, combines preventative care expertise, artistic storytelling, and community outreach to deliver culturally resonant
    oral health education that empowers underserved families across Bexar County.
  sports: Emely Casal enjoys salsa dancing as an energetic cardio outlet, hikes with the Hill Country Trails Club during spring and fall, follows the San Antonio Spurs and the Dallas Cowboys avidly, and
    participates in occasional community charity runs supporting local health initiatives.
  arts: Emely Casal spends weekends at Gallery 30 and the San Antonio Museum of Art, immerses themselves in the vibrant watercolors of Frida Kahlo and the bold murals of Diego Rivera, creates their own
    watercolor renditions of historic missions, and volunteers with the San Antonio Watercolor Society to mentor emerging artists.
  travel: Emely Casal prefers spontaneous cultural getaways, having trekked the historic streets of Oaxaca and the blue‑hued alleys of Chefchaouen, explored the museums of Barcelona and Kyoto on extended
    vacations, and frequently escapes to the Texas Hill Country or New Mexico for weekend hikes, balancing travel with family commitments and a modest travel budget.
  culinary: Emely Casal enjoys cooking mole poblano, chiles en nogada, cochinita pibil, and uses ingredients like fresh tomatillos, epazote, and poblano peppers, easily oscillating between intermediate
    and advanced techniques, often hosting dinner parties where they pair homemade aguas frescas with live salsa music.
  core: Emely Casal is a community‑driven, art‑infused dental hygienist who blends flexible spontaneity with steadfast compassion, occasionally letting paperwork lag behind while championing vibrant cultural
    health education.
background:
  cultural: Emely was born to Mexican parents who immigrated to Texas and raised her in a bilingual household in San Antonio. Her cultural identity blends traditional Mexican customs with the Texan spirit
    of hospitality. She grew up celebrating holidays such as Día de los Muertos, Las Posadas, and Mexican Independence Day, often participating in vibrant family gatherings centered around food, music,
    and folk art. Spanish remains her first language at home, and she comfortably switches between Spanish and English in her professional role to better serve the Hispanic community. Emely’s Mexican heritage
    informs her appreciation for bright colors, storytelling, and folk artwork, which she incorporates into patient‑education materials and community outreach. Being part of a close‑knit extended family
    has reinforced values of solidarity, respect for elders, and communal responsibility, shaping her collaborative approach at work and her dedication to improving oral health among underserved Hispanic
    families in Bexar County. Her Catholic faith and involvement in local parish events also provide a sense of community and service.
attributes:
  skills: '["Preventive dental care", "Periodontal assessment", "Dental radiography", "Bilingual communication (English/Spanish)", "Patient education and counseling", "Dental aesthetics and smile design",
    "Team collaboration and mentorship", "Community health outreach", "Infection control and safety compliance", "Dental software proficiency (Eaglesoft)", "Flexible scheduling management"]'
  hobbies: '["Painting", "Visiting art galleries and museums", "Salsa dancing", "Community volunteering", "Cooking Mexican cuisine", "Reading non-fiction travel and history books", "Participating in book
    clubs", "Group hiking in Hill Country", "Attending cultural festivals (Día de los Muertos)", "Exploring historic sites in San Antonio (Alamo, missions)"]'
  career_goals: Emely aims to become a certified dental hygiene educator and to develop a community oral health program that serves underserved Hispanic families across Bexar County. She plans to complete
    a bachelor's degree in health education within the next three years, positioning herself for a supervisory role where she can design patient‑education curricula and mentor junior hygienists. Combining
    her love for art with her profession, Emely envisions creating visually engaging educational materials that use storytelling and folk‑art motifs to improve health literacy. Long‑term, she dreams of
    establishing a small community clinic that integrates preventive dental care with culturally resonant wellness activities such as cooking workshops, traditional crafts, and art‑therapy sessions, fostering
    holistic health in her neighborhood.
