personas:
  professional: A budding preschool builder named Brittney Lee meticulously stacks wooden blocks into towering structures, applying early spatial reasoning, methodical planning, and a balanced curiosity
    for new designs with a practical insistence on stability, and they showcase the nascent professional traits of an organized and reliable future architect.
  sports: An energetic toddler named Brittney Lee darts around the community center’s toddler soccer program, proudly dons a miniature Seattle Seahawks jersey during game days, and they eagerly watch the
    Seattle Mariners on TV, blending a competitive spirit with methodical practice of basic kicking drills.
  arts: An imaginative little artist named Brittney Lee sings along to The Wiggles and Disney's Frozen soundtrack, reenacts scenes from Mickey Mouse Clubhouse, and they carefully color within the lines
    of a rainbow picture, reflecting a blend of sociable energy and organized creativity.
  travel: A curious explorer named Brittney Lee relishes family road trips to the Grand Canyon and Disneyland, balancing excitement for new sights with a practical need for scheduled nap breaks, snack intervals,
    and a handheld map of the park to feel secure amidst the adventure, and they often request extra stops at playgrounds to burn off energy.
  culinary: A budding foodie named Brittney Lee delights in creamy mac and cheese, crispy chicken nuggets, and strawberry‑topped pancakes, proudly scoops peas with a tiny plastic fork, occasionally stirs
    batter for banana muffins, and they stubbornly refuse broccoli due to its texture, showcasing both adventurous taste buds and a selective palate.
  core: A methodical, curious, and energetic three‑year‑old named Brittney Lee organizes toys by color, negotiates snack trades, and they never back down from a game of hide‑and‑seek, revealing a competitively
    stable spirit with occasional skepticism toward new friends.
background:
  cultural: Brittney is a white child raised in Lockport, Louisiana, within Lafourche Parish's close‑knit, bayou‑side community. Her family participates in local traditions such such as Mardi Gras parades,
    community church picnics, and seasonal seafood boils, exposing her to Cajun and Creole flavors and music. The natural surroundings of wetlands and the nearby Gulf coast inspire her love of outdoor exploration
    and an early appreciation for local wildlife. These cultural influences blend with a structured preschool routine, shaping her balanced curiosity and practicality.
attributes:
  skills: '[''expressive language'', ''basic counting and number recognition'', ''shape and color sorting'', ''fine motor coordination (drawing, puzzles)'', ''self‑dressing'', ''toy organization'', ''following
    routines'', ''leading simple games'', ''practical problem solving'']'
  hobbies: '[''Duplo block building'', ''dancing to Zydeco/Cajun music'', ''reading picture books about animals and nature'', ''pretend veterinary play with stuffed animals'', ''exploring outdoors (collecting
    shells, watching wildlife)'', ''group games (Duck, Duck, Goose)'', ''simple puzzles and shape sorting'']'
  career_goals: Even at three, Brittney dreams of becoming a teacher who can share her favorite stories, a veterinarian who cares for the neighborhood pets she meets, and a firefighter who helps keep her
    community safe. She often imagines herself leading a group of friends in organized play, aiming to be the one who decides the rules. Her competitive nature fuels a desire to win in races and games,
    while her practical side wants to master new skills quickly. She intends to keep learning and eventually turn her curiosity about the natural world into a career helping people and animals.
