personas:
  professional: Antwann Maing, a budding community storyteller who transforms family anecdotes into vivid crayon illustrations during preschool art time, shows an early knack for narrative composition and
    they relish the freedom to explore ideas without rigid schedules.
  sports: Antwann Maing, a member of the Allentown United youth soccer club who also enjoys cheering for the Philadelphia 76ers during family game nights, prefers small‑group backyard tag games over large
    school assemblies and they stay active by bouncing on a trampoline in the spring while occasionally dabbling in ice skating at the local rink in winter.
  arts: Antwann Maing, an enthusiastic little painter who loves recreating the vibrant colors of collard greens and cornbread on canvas, frequently hums gospel classics like 'Oh Happy Day' and dances to
    the rhythms of The Clark Sisters, and they are fascinated by Pixar’s animated films and the storybooks of Ezra Jack Keats.
  travel: Antwann Maing, who enjoys family weekend trips to Bushkill Falls and occasional visits to the Liberty Bell in Philadelphia, prefers spontaneous stops at ice‑cream trucks over meticulously planned
    itineraries, and they dream of exploring Washington, D.C.’s museums and Disney World’s magical rides someday.
  culinary: Antwann Maing, a picky eater with a soft spot for mac and cheese, chicken tenders, sweet potato pie, and collard greens with a dash of hot sauce, enjoys helping stir cornbread batter and they
    love dipping crispy fries into ketchup while occasionally sneaking a bite of grandma’s seasoned black‑eyed peas.
  core: Antwann Maing, a curious, art‑loving five‑year‑old who finds comfort in quiet storytelling corners, balances a love for community traditions with a laid‑back, slightly disorganized approach to daily
    routines, and they quietly radiate kindness in every interaction.
background:
  cultural: Antwann is raised in an African‑American family in Allentown, Pennsylvania. His parents celebrate cultural traditions such as soul food meals, gospel music, and storytelling nights that pass
    down family history. He attends a local church where community and harmony are emphasized, and he participates in neighborhood events that highlight Black heritage, like Juneteenth celebrations and
    cultural festivals at the Lehigh Valley. These experiences blend his family's roots with the diverse cultural landscape of the Lehigh County region, nurturing his curiosity and appreciation for art
    and community.
