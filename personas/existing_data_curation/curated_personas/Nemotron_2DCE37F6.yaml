  career_goals: Even at five, Antwann dreams big. He imagines becoming an astronaut who can explore space and draw the stars, an artist who paints vibrant pictures, or a teacher who shares stories with
    younger children. His goals are guided by his love for discovery, creativity, and helping others feel happy.
