personas:
  professional: Michell Lemonier, a five-year-old budding architect, sketches intricate fort blueprints on every scrap of paper, applies disciplined organization to each block placement, and they insist
    on meeting exacting standards even in play, reflecting a competitive drive and a love for abstract concepts.
  sports: Michell Lemonier, a five-year-old member of the local Dragonfly Soccer Club, they channel a fierce competitive spirit into every training drill, keep meticulous scorecards of matches, idolize
    the New York Yankees as a future baseball star, and prefer the structured rhythm of gymnastics over free-play.
  arts: Michell Lemonier, a five-year-old with a vivid imagination, spends afternoons sketching Dr. Seuss-style creatures, mimics the bold patterns of Yayoi Kusama with finger paints, they sing along to
    They Might Be Giants, and reenact favorite scenes from the Muppets, weaving artistic play into daily routines.
  travel: Michell Lemonier, a five-year-old who loves structured day trips, they pack a tiny backpack for visits to the nearby botanical garden, daydream about exploring the castles of Scotland, enjoy family
    road trips to the beach with scheduled snack breaks, preferring adventures that balance novelty with predictable routines.
  culinary: Michell Lemonier, a five-year-old budding chef, loves crafting perfect peanut butter and jelly sandwiches, insists on spreading the jelly in even ribbons, they savor mac and cheese with crisp
    cheddar and peas, and delight in helping stir carrot-laden chicken noodle soup, often demanding a taste test before dinner.
  core: Michell Lemonier, a hyper-organized five-year-old with boundless imagination, obsessively arranges crayons by color, worries about the outcome of every play scene, and they secretly compete with
    peers for the title of best castle builder.
background:
  cultural: Michell is raised in Batesville, Indiana, a small Midwestern community where family and local traditions play a central role. Her family celebrates holidays with gatherings that include homemade
    pies, church picnics, and town events such as the county fair and Fourth of July fireworks. She attends the local elementary school, participates in the library’s story‑time program, and often visits
    nearby farmers’ markets with her parents, giving her a blend of rural and small‑town cultural experiences.
