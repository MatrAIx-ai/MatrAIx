  career_goals: Looking ahead, Doris intends to channel her curiosity and practicality into a career that merges scientific discovery with tangible community benefit. She aims to pursue a degree in environmental
    engineering or biomedical research at a university known for strong STEM programs, hoping to earn a scholarship that supports her studies. In the long term, she envisions working on sustainable energy
    solutions or medical device design that improve quality of life in her hometown and beyond. Doris also wants to mentor younger students through school clubs or community programs, using her cooperative
    yet assertive nature to lead small teams. Recognizing her sensitivity to stress, she values workplaces that promote work‑life balance and mental‑wellness.
