personas:
  professional: An aspiring robotics programmer and high‑school junior, Doris Sanantonio channels their curiosity and practical mindset into coding small games and Arduino projects through the school’s
    robotics club, where they balance teamwork with independent problem‑solving.
  sports: A devoted local sports fan, Doris Sanantonio follows the Cleveland Browns and the Cleveland Cavaliers, cheered at Canton McKinley Bulldogs Friday night football games, and plays in the school’s
    intramural soccer club each spring, blending spectator enthusiasm with casual participation.
  arts: An imaginative visual storyteller, Doris Sanantonio draws inspiration from Neil Gaiman’s fantasy novels and Hayao Miyazaki’s animated films, creating digital illustrations and hand‑drawn sketches
    while also enjoying indie music from Tame Impala and listening to the piano works of Ludovico Einaudi, weaving artistic influences into their daily life.
  travel: A curious weekend explorer, Doris Sanantonio has visited Niagara Falls and Chicago’s Museum of Science and Industry with family, dreams of backpacking through the Olympic National Park in Washington
    state, and prefers budget‑friendly trips that combine hiking in nature with brief city cultural stops.
  culinary: An enthusiastic teen baker, Doris Sanantonio regularly experiments with chocolate chip cookies, strawberry shortcake muffins, and homemade cinnamon rolls using locally sourced Ohio dairy and
    seasonal berries, sharing the treats at neighborhood potlucks and church youth group gatherings.
  core: A reflective yet restless 15‑year‑old, Doris Sanantonio balances quiet curiosity with practical ambition, often juggling coding projects, sketchbooks, and worries about school performance in equal
    measure.
background:
  cultural: Doris grew up in Canton, Ohio, within a middle‑class white family that reflects typical Midwestern values of hard work, modesty, and community involvement. Her family traditions include potluck
    gatherings for holidays, attendance at a local Protestant church where she participated in youth‑group activities, and regular trips to community events such as the Stark County Fair and local high‑school
    football games. The region’s emphasis on practicality and self‑reliance aligns with Doris’s balanced approach to curiosity and groundedness, while the supportive, close‑knit neighborhood has nurtured
    her cooperative spirit and desire to give back through volunteer work.
