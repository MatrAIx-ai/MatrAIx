  career_goals: Maria aspires to a future where she can merge her love for art and technology, aiming to become a concept artist or video game designer. She envisions creating immersive visual stories that
    reflect her cultural roots while exploring innovative ideas. She also dreams of contributing to community art projects in Chicago that celebrate Mexican heritage. Ultimately, she seeks a career that
    offers creative freedom, intellectual challenge, and the ability to work independently or in small, collaborative teams.
