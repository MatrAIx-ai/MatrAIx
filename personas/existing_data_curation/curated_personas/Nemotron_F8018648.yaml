personas:
  professional: Maria Moralesaviles is an aspiring digital artist and budding coder who channels her curiosity and competitive streak into daily sketchbook sessions and Scratch projects, while her relaxed
    approach to deadlines often leads to spontaneous, unfinished prototypes.
  sports: Maria Moralesaviles follows the Chicago Bulls for basketball, the Chicago White Sox for baseball, and plays on a local youth soccer club, preferring solo practice drills over big team drills,
    and she often streams indie e‑sports tournaments on the side.
  arts: Maria Moralesaviles immerses herself in graphic novels by Alan Moore, draws inspiration from the street‑art of Banksy and the animation of Hayao Miyazaki, and regularly visits the Art Institute
    of Chicago to study the Impressionist collection while listening to a playlist that mixes traditional folk tunes from her family's heritage with contemporary pop.
  travel: Maria Moralesaviles prefers short, adventure‑filled weekend trips, such as a family road‑trip to the Grand Canyon and a day‑long bike tour of Chicago's lakefront, while dreaming of a future solo
    visit to Tokyo’s Akihabara district to explore its gaming culture.
  culinary: Maria Moralesaviles enjoys helping her family prepare spicy corn tortillas with homemade salsa, mastering the art of perfecting guacamole, and experimenting with the occasional fusion dish that
    blends novel ingredients like quinoa into classic comfort meals.
  core: Maria Moralesaviles is a curious, art‑obsessed twelve‑year‑old who balances independent creativity with a competitive edge, yet often lets disorganization sideline her ambitious plans.
background:
  cultural: Maria is a first‑generation Mexican‑American living in Chicago’s Pilsen neighborhood, where vibrant murals and community festivals keep her connected to her heritage. At home she speaks Spanish
    with her parents and grandparents, and celebrates traditions such as Día de los Muertos, Mexican Independence Day, and her upcoming Quinceañera. Her family’s Mexican cuisine, music, and folklore shape
    her worldview, while growing up in a culturally diverse city exposes her to a blend of American and Mexican influences that inform her artistic sensibility.
