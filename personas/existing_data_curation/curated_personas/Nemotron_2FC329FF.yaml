  career_goals: Although still young, Darrin often talks about wanting to work with animals when he grows up. He imagines becoming a veterinarian who cares for farm livestock and wildlife, a role that would
    let him explore his curiosity about biology while providing practical help to his community. He also dreams of one day contributing to wildlife conservation projects that protect the forests and streams
    near Pangburn, and he occasionally mentions becoming a modern farmer who uses technology to run a sustainable farm.
