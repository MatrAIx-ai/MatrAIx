personas:
  professional: A fledgling junior engineer, Darrin Lee (8) channels their curiosity and practicality into meticulously designed LEGO cities, uses Scratch to script simple interactive stories, and reliably
    assists with household chores, balancing organization with the flexibility to improvise whenever a new idea sparks.
  sports: An active little explorer, Darrin Lee (8) cheers for the Riverdale Rovers youth soccer team in the fall, splashes around in the community pool as a member of the Sunlit Swimmers club during summer,
    and spends weekends fishing at the pond while rooting for the city's baseball heroes, the Springfield Sluggers.
  arts: A budding wildlife illustrator, Darrin Lee (8) spends afternoons sketching pond birds inspired by the delicate line work of Oliver Jeffers, enjoys the whimsical melodies of Disney’s Frozen soundtrack,
    and regularly watches National Geographic Kids videos to fuel their creative imagination.
  travel: A curious day‑tripper, Darrin Lee (8) loves mapping out weekend outings to the local state park’s hiking trails, cherishes family visits to the city’s natural history museum, and aspires to someday
    explore the towering cliffs of the Grand Canyon and the cherry‑blossom festivals of Japan.
  culinary: A kitchen‑savvy kid, Darrin Lee (8) enjoys whisking batter for fluffy blueberry pancakes, assembling classic peanut‑butter‑and‑jelly sandwiches, and experimenting with fruit salads featuring
    strawberries, bananas, and kiwi, all while proudly measuring each ingredient with a bright‑colored kitchen scale.
  core: Darrin Lee (8) is a reserved yet inquisitive LEGO architect who sketches pond wildlife, flips between meticulous planning and spontaneous creation, and occasionally loses track of time, leaving
    unfinished puzzles in a cozy corner of their room.
background:
  cultural: Darrin grew up in Pangburn, a small town in White County, Arkansas, surrounded by a close‑knit, predominantly white community where Southern traditions run deep. Family life centers on the local
    Baptist church, weekly potlucks, and community events such as the county fair and school science fairs. Rural values of self‑reliance, respect for the land, and helping neighbors shape his daily routine;
    chores on the family’s small farm, like feeding chickens and tending gardens, are viewed as regular responsibilities. At school he is exposed to both traditional subjects and modern technology, giving
    him a balanced view of his heritage and the wider world. Country music, hunting and fishing outings, and stories about local folklore are common parts of his upbringing, while his parents encourage
    curiosity through books and hands‑on projects.
