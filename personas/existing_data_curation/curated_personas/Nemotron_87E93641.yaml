personas:
  professional: Beatrice Goodly, an aspiring graphic designer and digital storyteller, channels their curiosity for color and character into volunteer design work for community organizations while leveraging
    their meticulous organization to meet deadlines, even as they battle a chronic worry about not meeting expectations.
  sports: Beatrice Goodly sticks to low‑key fitness routines such as morning jogs through the community garden and occasional yoga sessions at the local recreation center, while cheering on the Miami Heat
    and following the Fort Lauderdale Strikers, yet they often skip workouts when anxiety spikes, preferring to retreat to their sketchpad instead.
  arts: Beatrice Goodly immerses themselves in the visual storytelling of graphic novels such as 'Saga' and the lyrical depth of R&B artists like H.E.R., hip‑hop icons like Kendrick Lamar, and jazz legends
    like Miles Davis, channeling these influences into vibrant digital illustrations on their tablet that often feature neon‑hued sci‑fi cityscapes.
  travel: Beatrice Goodly prefers carefully planned weekend getaways that blend quiet nature walks—like a sunrise hike in the Everglades—with cultural stops at places such as the Salvador Dalí Museum in
    St. Petersburg and the vibrant street‑art districts of Wynwood, while budget constraints keep their eye on affordable bus trips to New Orleans and dreaming of a future solo pilgrimage to Tokyo’s anime
    hubs.
  culinary: Beatrice Goodly, an intermediate home cook, often whips up quick comfort meals like cheesy baked ziti with a dash of sriracha and avocado‑lime smoothies for breakfast, while occasionally treating
    themselves to late‑night ramen bowls from a nearby Japanese spot after a long coding session, and they love experimenting with seasonal produce from their community garden to create vibrant salads.
  core: Beatrice Goodly blends shy introspection with a relentless drive to turn digital sketches into community‑focused visual stories, all while battling a perpetual worry that fuels both their meticulous
    planning and occasional procrastination.
background:
  cultural: Beatrice grew up in the Black community of Pompano Beach, a city where Southern‑Florida culture blends Afro‑Caribbean rhythms, Southern traditions, and beach‑side lifestyles. Her family celebrates
    holidays with soul food, music, and church gatherings that emphasize communal support. She is influenced by the local Haitian and Jamaican diaspora, which adds a layer of Caribbean language, cuisine,
    and festival customs to her upbringing. The neighborhood’s strong sense of solidarity—seen through block parties, youth mentorship programs, and local murals—has shaped her identity and reinforced values
    of resilience, mutual aid, and creative expression. These cultural threads inform her artistic style, her commitment to community service, and her desire to uplift other Black teens in her area.
attributes:
  skills: '[''basic digital literacy'', ''introductory coding (Scratch, Python)'', ''graphic design using Canva'', ''creative writing and poetry'', ''peer counseling and emotional support'', ''home cooking
    and meal planning'', ''time management and organization'', ''mindfulness and stress‑management techniques'']'
  hobbies: '[''reading sci‑fi and graphic novels'', ''sketching and digital illustration'', ''listening to R&B, hip‑hop, and jazz'', ''creative writing and poetry'', ''journaling'', ''coding simple games
    with Scratch'', ''volunteering at community garden'', ''attending small open‑mic events'']'
  career_goals: Beatrice aims to earn her GED within the next two years and then enroll in a community college program that offers a certificate in graphic design or web development. She hopes to combine
    her design skills with her passion for community outreach by creating visual content for local non‑profits that serve Black youth in Broward County. In the longer term, she envisions starting a freelance
    digital‑art business that provides affordable branding for small community organizations, while also mentoring younger teens on coping with stress and navigating school. Her ultimate ambition is to
    become a youth advocate who uses both technology and creative expression to empower her peers.
