personas:
  professional: Rosa Gracia, a full‑stack software engineer proficient in Python, JavaScript/TypeScript, and TensorFlow, merges meticulous test‑driven development with a strong UI/UX sensibility, channeling
    their curiosity and organized, methodical nature into building AI‑enhanced creator platforms while mentoring diverse coding workshops.
  sports: Rosa Gracia enjoys weekend hikes in the Blue Hills, plays in a co‑ed recreational soccer league tied to the Boston Sports Club, follows the Boston Red Sox and Celtics, and incorporates salsa dancing
    as cardio, balancing structured fitness with spontaneous movement.
  arts: Rosa Gracia frequents contemporary venues like the Institute of Contemporary Art, draws digital inspiration from creators such as James Jean and Yuko Shimizu, attends live performances by the Boston
    Symphony and indie group Tasha & The Strings, and channels this eclectic taste into their illustration practice.
  travel: Rosa Gracia crafts travel plans that blend adventure and culture, favoring spontaneous road trips along the New England coast, immersive stays in Barcelona’s design scene, and quick city breaks
    to New York’s art districts, always balancing saved funds with occasional credit‑card points.
  culinary: Rosa Gracia, an avid home cook, perfects arepas and hearty sancocho using fresh plantains, yucca, and cumin, experiments with pour‑over coffee using Ethiopian beans, and while confident with
    savory dishes, still fumbles with delicate pastries, often ordering croissants to round out breakfast.
  core: Rosa Gracia is a curiosity‑driven engineer who balances methodical code craftsmanship with vibrant salsa steps, caffeine‑fuelled creativity, and a habit of over‑booking social events that sometimes
    leaves them scrambling for downtime.
background:
  cultural: Rosa was born and raised in Medellín, Colombia, in a close‑knit family where Spanish was spoken at home and Colombian traditions were celebrated daily. She grew up with the rhythms of cumbia,
    vallenato, and contemporary reggaetón, and she still enjoys sharing these sounds at cultural gatherings. Her family’s weekend ritual of brewing fresh Colombian coffee and sharing storytelling sessions
    instilled a love for community and conversation. After moving to the United States for graduate studies, she settled in Cambridge, MA, where she integrates her heritage with the local academic and tech
    environment. Rosa actively participates in the Boston Colombian community, attending events like Colombia Fest, volunteering at cultural festivals, and teaching Spanish to children of immigrants. She
    balances her Colombian identity—marked by warmth, resilience, and a love for the arts—with the innovative, collaborative spirit of the New England tech scene.
