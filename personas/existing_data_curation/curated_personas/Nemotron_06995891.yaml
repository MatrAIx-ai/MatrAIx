  career_goals: Rosa aims to become a senior engineer leading product teams that blend technology with artistic expression, such as platforms that empower creators with AI‑driven tools. Over the next five
    years she plans to earn a master's degree in Human‑Computer Interaction to deepen her design expertise, while taking on mentorship roles to support other Latinx women in tech. She aspires to eventually
    transition into a product leadership role—ideally as a Director of Product or Chief Technology Officer—where she can shape strategic vision, champion inclusive design, and possibly launch a startup
    that democratizes access to digital art creation for underrepresented communities.
