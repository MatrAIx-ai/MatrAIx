personas:
  professional: Verna Hartley, a seasoned facilities maintenance specialist with a deep command of OSHA safety standards, green cleaning protocols, and meticulous inventory control, channels their disciplined
    organization and curiosity into training junior staff and spearheading the preservation of historic community spaces, and they aim soon for an OSHA certification and an associate degree to step into
    a supervisory role.
  sports: Verna Hartley, a devoted supporter of the Kentucky Wildcats men's basketball team and the Louisville Bats minor‑league baseball club, participates in the local senior walking group that meets
    twice weekly at the community center, and enjoys low‑impact water aerobics at the county pool during the summer, preferring modest, regular activity over competitive sports, and they cherish the social
    camaraderie of the walking group while maintaining a disciplined fitness routine.
  arts: Verna Hartley, an avid patron of the local art scene, frequently attends gallery openings at the Hardin County Loft and community theater productions, curates modest exhibitions featuring works
    by local painter Sarah McIntyre and regional landscape artist Thomas Caldwell, and relaxes at home listening to the timeless blues of B.B. King and the soulful jazz of Ella Fitzgerald, which inspire
    their own quilting designs, and they often spend evenings sketching notes for future shows.
  travel: Verna Hartley prefers meticulously planned heritage trips, having explored the historic streets of Savannah, Georgia, the Civil War battlefields of Gettysburg, and the vibrant jazz clubs of New
    Orleans, while dreaming of a quiet pilgrimage to the cobblestone alleys of Bruges, Belgium, and they always return home to the serenity of their Kentucky herb garden, savoring the contrast between bustling
    cities and tranquil rural landscapes.
  culinary: Verna Hartley delights in preparing herb‑infused dishes such as rosemary‑and‑thyme roasted chicken, fried catfish with a side of collard greens, and homemade buttermilk biscuits, boasting an
    intermediate cooking skill that lets them experiment with traditional Southern flavors while still favoring simple, garden‑fresh ingredients like mint, sage, and lavender for teas, and they occasionally
    indulge in a late‑night snack of fresh basil pesto on crackers.
  core: Verna Hartley blends disciplined precision with quiet curiosity, meticulously maintaining historic buildings while nurturing a love for jazz, crossword puzzles, and herb gardening, though they occasionally
    over‑order rare vinyl records and let paperwork pile up on rainy afternoons.
background:
  cultural: Verna’s family migrated from the Deep South during the Great Migration and settled in Hardin County, where they became active members of the Black church and local civic organizations. Her upbringing
    blended Southern gospel traditions with the rural Kentucky community’s emphasis on self‑reliance and storytelling. She has long been involved in preserving African‑American history in the region, participating
    in oral‑history projects and supporting the local African‑American heritage museum. These experiences, combined with her lifelong curiosity and disciplined work ethic, shape her identity as a resilient,
    community‑oriented individual.
attributes:
  skills: '[''Facility cleaning and maintenance'', ''Health and safety compliance (OSHA)'', ''Inventory control and procurement'', ''Staff training and mentorship'', ''Time management and scheduling'',
    ''Problem‑solving for building issues'', ''Basic minor repairs (plumbing, electrical)'', ''Green cleaning practices'', ''Art appreciation and basic curation'', ''Community outreach and volunteer coordination'']'
  hobbies: '[''Reading historical nonfiction and local Kentucky history'', ''Listening to jazz and blues music'', ''Knitting and quilting'', ''Gardening (herbs and small vegetables)'', ''Birdwatching'',
    ''Visiting art galleries and community theater'', ''Volunteering at the local library and historical society'', ''Solving crossword puzzles'', ''Participating in community heritage walks'', ''Curating
    a scrapbook of African‑American cultural artifacts'']'
  career_goals: Verna aims to obtain an OSHA certification and complete her associate degree in facilities management, positioning herself for a supervisory or facilities‑manager role at a community center
    or historic building. She hopes to mentor younger custodial workers, advocate for safer working conditions, and eventually launch a small cleaning business that specializes in preserving historic and
    culturally significant spaces. Parallel to her professional aspirations, she wants to deepen her involvement in local arts programming, perhaps curating an annual exhibition that highlights African‑American
    heritage in Hardin County.
