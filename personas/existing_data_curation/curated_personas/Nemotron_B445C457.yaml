personas:
  professional: Maria Morante, a 21‑year‑old graphic design major at the University of Pittsburgh, blends acrylic painting and digital illustration expertise with meticulous project planning to orchestrate
    community art workshops and curate pop‑up exhibitions, leveraging their Adobe Photoshop and Illustrator mastery while thriving on the buzz of live performances and collaborative brainstorming.
  sports: Maria Morante regularly hikes the wooded trails of Frick Park, joins a co‑ed volleyball league at the Carnegie Library, and follows the Pittsburgh Steelers, Penguins, and Pirates, cheering at
    games when time permits while preferring low‑key cardio over intense gym sessions.
  arts: Maria Morante immerses themselves in the local art scene, drawing inspiration from Andy Warhol, Banksy’s street murals, and the vibrant illustrations of James Jean, while performing spoken‑word
    poetry at the Open Mic nights at the Carnegie Library and attending indie theater productions at the Pittsburgh Playhouse.
  travel: Maria Morante’s travel itinerary includes budget backpacking trips to New York City’s galleries, a spring weekend in Austin for SXSW, a coveted summer visit to Berlin’s contemporary art fairs,
    and a future plan to explore the frescoes of Florence, all meticulously plotted in a shared Google Sheet while balancing a limited student allowance.
  culinary: Maria Morante experiments in the kitchen with dishes like miso‑glazed eggplant, quinoa‑infused sushi rolls, and turmeric‑spiced ramen, often improvising with ingredients such as kale, chickpeas,
    and smoked paprika, but frequently forgets to eat dinner after a night of late‑night painting sessions.
  core: Maria Morante is a hyper‑social, organized art‑enthusiast who schedules spontaneous creativity, occasionally overcommits to events, and tends to misplace their favorite paintbrush in the most unexpected
    places.
background:
  cultural: Maria Ellen is a white American raised in the suburbs of Pittsburgh, Pennsylvania. Her family traces its roots to German and Irish immigrants who settled in the region during the early 20th
    century. Growing up, she was immersed in the city’s rich cultural landscape, regularly attending events in the Cultural District, the annual Three Rivers Arts Festival, and the vibrant local music scene.
    Her upbringing blends traditional Midwestern values—hard work, community responsibility, and modesty—with a progressive, artistic outlook encouraged by her parents’ support for creative pursuits. This
    combination of heritage and the diverse artistic opportunities in Pittsburgh shapes Maria’s identity and informs her aspirations to contribute to the broader cultural tapestry.
