  career_goals: Maria aims to complete her bachelor's degree in Graphic Design or Communications and subsequently pursue a master's in Arts Administration or Creative Leadership. She envisions a career
    where she can shape cultural experiences, targeting roles such as Creative Director for a museum or cultural institution, Content Strategist for a nonprofit arts organization, or Curatorial Assistant
    for community art programs. In the longer term, she hopes to launch her own freelance illustration studio and a digital platform that highlights emerging artists and promotes socially engaged art projects.
    Travel and exposure to diverse artistic scenes are also central to her professional growth, as she plans to study abroad or attend international art festivals to broaden her creative perspective.
