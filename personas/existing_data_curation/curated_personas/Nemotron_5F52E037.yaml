personas:
  professional: Awilda Loredo, a budding elementary educator, channels a meticulous curriculum-design mindset and bilingual arts integration into lesson plans, and they leverage a competitive drive to innovate
    classroom technology like Google Classroom and Kahoot, ensuring every student sees their own stories reflected on the wall.
  sports: Awilda Loredo, an avid weekend hiker on the foothills near Evans and member of the Denver Trail Run Club, follows the Colorado Avalanche in the NHL and roots for the Denver Broncos, and they unwind
    after each trek with a sunset yoga flow to keep anxiety at bay.
  arts: Awilda Loredo, an acrylic painter who captures Denver's skyline with bold strokes, sketches urban alleys inspired by Banksy's graffiti, frequents exhibits at the Denver Art Museum featuring artists
    like Kehinde Wiley, and they draw speculative-fiction influences from Octavia Butler and Nnedi Okorafor into their visual storytelling.
  travel: Awilda Loredo, who plans trips with meticulous spreadsheets and occasional spur-of-the-moment detours, has explored Portland's street art scenes and Santa Fe's mural districts, dreams of wandering
    Barcelona's Gothic Quarter and Kyoto's Nishiki Market, and they keep travel budgets modest to fund their art-supply reserves.
  culinary: Awilda Loredo, a confident home cook, prepares family-style mole with dark chocolate, chilies, and toasted seeds, rolls silky tamales filled with seasoned pork and masa, experiments with quinoa-infused
    salsas, and they perfect a skillet-seared salmon for weekend dinners.
  core: Awilda Loredo blends fierce competitive ambition with a sensitive, anxiety-prone soul, as they channel artistic curiosity into carefully crafted lesson plans while navigating the tension between
    methodical order and emotional turbulence.
background:
  cultural: Awilda is a first‑generation Mexican‑American raised in a bilingual household in Evans, Colorado. She celebrates Mexican holidays such as Día de los Muertos and incorporates folk art motifs
    into her personal projects. Fluent in both Spanish and English, she often bridges cultural viewpoints in her interactions, valuing family ties and community solidarity while also navigating the individualistic
    expectations of her broader American environment. Her Mexican heritage strongly influences her culinary preferences, artistic aesthetic, and desire to promote bilingual education that honors cultural
    identity.
attributes:
  skills: '["Curriculum design","Bilingual instruction (Spanish/English)","Arts‑integrated teaching","Classroom management","Educational technology (Google Classroom, Seesaw, Kahoot)","Student assessment
    and data analysis","Instructional planning and differentiation","Education research methods","Parent and community communication"]'
  hobbies: '["Acrylic painting and sketching","Visiting contemporary art galleries","Hiking Colorado foothills","Yoga and mindfulness meditation","Cooking traditional Mexican cuisine","Reading speculative
    fiction","Reflective journaling","Volunteer tutoring with arts integration"]'
  career_goals: Awilda aims to obtain her Colorado teaching credential within the next year and secure a full‑time elementary school position where she can lead a bilingual arts program. She aspires to
    become a curriculum specialist who designs culturally responsive lesson plans that bridge Mexican traditions and contemporary pedagogy. Long‑term, she hopes to mentor new teachers, earn a master’s degree
    in educational leadership, and eventually direct a community learning center that offers after‑school art workshops and mental‑health support for students struggling with anxiety and emotional distress.
