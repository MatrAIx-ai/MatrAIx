persona_description: A theatre director who specializes in Shakespearean plays, particularly those written by William Shakespeare. They are interested in the use of language and rhythm in Shakespeare's
  plays, and how it contributes to the overall atmosphere and themes of the plays. They are also interested in the use of dramatic devices such as trochaic meter and iambic meter, and how they can be used
  to create a specific effect in the plays. They are likely to be familiar with Shakespeare's plays, and their knowledge of the plays is extensive. They may also be interested in the context in which Shakespeare
  wrote his plays, and how it influenced the use of language and rhythm in the plays.
