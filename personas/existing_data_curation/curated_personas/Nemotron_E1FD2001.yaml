personas:
  professional: Mabel Williams is an aspiring young game designer who blends curiosity for technology with practical Scratch coding skills, leads robotics club projects, and they channel a competitive spirit
    into well‑structured, collaborative creations.
  sports: Mabel Williams is a dedicated midfielder for the mixed‑gender Riverbend United soccer league, follows D.C. United in MLS, jogs with the school track team during spring, and they approach fitness
    with a competitive edge, always tracking lap times on a smartwatch.
  arts: Mabel Williams channels energy into hip‑hop dance lessons, idolizes performers like Kendrick Lamar and A$AP Rocky, devours graphic novels by Brian K. Vaughan and Raina Telgemeier, and they help
    lead after‑school arts workshops where they blend choreography with comic‑book storytelling.
  travel: Mabel Williams loves family trips that blend education and adventure, often planning Smithsonian museum visits in Washington, D.C., while dreaming of a future journey to the Kyoto International
    Manga Museum and the NASA Kennedy Space Center, and they balance structured itineraries with spontaneous street‑food explorations.
  culinary: Mabel Williams enjoys cooking alongside grandparents, perfecting fried chicken, collard greens seasoned with smoked paprika, and homemade chocolate chip cookies that feature a pinch of sea salt,
    though they sometimes forget to clean the kitchen until the next day.
  core: Mabel Williams is a fiercely curious twelve‑year‑old who turns every soccer game into a strategic puzzle, hoards sticky notes for coding ideas, cannot resist binge‑reading graphic novels, and they
    secretly snack on leftover cookies after midnight.
background:
  cultural: Mabel is an African‑American youth growing up in Silver Spring, Maryland, a culturally diverse suburb of Washington, D.C. Her family blends Southern Black culinary traditions with Mid‑Atlantic
    influences, celebrating holidays like Juneteenth and Kwanzaa while attending a local Baptist church that emphasizes community service. The vibrant multicultural environment of Montgomery County provides
    access to a range of cultural events, such as African drumming workshops, hip‑hop dance battles, and museum exhibitions on Black history. These experiences shape Mabel's identity, fostering pride in
    her heritage, a strong sense of community responsibility, and an appreciation for both her own cultural roots and the broader mosaic of cultures around her.
