  career_goals: Mabel dreams of attending a STEM‑focused high school in Montgomery County and eventually earning a degree in biomedical engineering or computer science. She wants to combine her love of
    technology with a desire to improve health outcomes in her community, aiming to develop affordable medical devices or health‑tech apps for underserved populations. In the meantime, she hopes to earn
    scholarships for science competitions, lead a youth robotics team, and mentor younger students through community workshops, building a foundation for a future career that blends innovation with social
    impact.
