  career_goals: Although approaching retirement, Mary remains eager to stay intellectually active. She aims to mentor the next generation of developers through part‑time consulting and local coding workshops,
    contribute occasional bug fixes to open‑source projects that support community services, and explore user‑experience design to improve accessibility for senior users. She also hopes to document her
    decades‑long experience in a memoir that blends technical insights with personal reflections, ensuring her practical knowledge is preserved for future programmers.
