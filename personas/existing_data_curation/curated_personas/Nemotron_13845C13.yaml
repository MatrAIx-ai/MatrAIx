personas:
  professional: Georgia Everett is an aspiring digital storyteller who blends comic‑style drawing with short video editing, and they use their curious yet practical mindset to experiment with new techniques
    while keeping the workflow relaxed and flexible.
  sports: Georgia Everett is a budding basketball enthusiast who spends weekends shooting hoops at the neighborhood park with friends, competes in the local Lil' Hoops club, follows the City Warriors’ NBA
    games, and also joins a high‑school hip‑hop dance crew, and they use the sport and dance as outlets for social connection and energetic release.
  arts: Georgia Everett is a creative spirit who draws comic‑style characters inspired by graphic artists like Gene Luen Yang, edits short videos set to tracks from Anderson .Paak and H.E.R., devours YA
    novels by Angie Thomas and historical fiction by Ijeoma Oluo, and they find artistic identity through journaling and mindfulness practices.
  travel: Georgia Everett is an adventurous young traveler who has explored nearby attractions such as the state museum and the coastal beach town of Seaview, dreams of visiting Boston and the Louvre in
    Paris, and they typically plan trips through a mix of parental guidance and spontaneous road‑trip ideas, balancing family budgets with a craving for new experiences.
  culinary: Georgia Everett is a budding baker who delights in making chocolate chip cookies, banana bread, and cinnamon‑swirl muffins using their grandmother’s time‑tested recipes and staple ingredients
    like butter, brown sugar, and vanilla extract, and they balance their love for sweet treats with a growing curiosity for experimenting with vegan alternatives.
  core: Georgia Everett is a calm, curious teen who turns everyday moments into comic sketches, bakes sweet treats, and they navigate life with a relaxed, organized‑chaos approach, often forgetting appointments
    but never missing a chance to support friends.
background:
  cultural: Georgia comes from a Black family rooted in the Rochester community, where extended family gatherings, church life, and neighborhood networks play a central role. She celebrates traditions such
    as Kwanzaa and Juneteenth, and she loves listening to a blend of classic soul, contemporary R&B, and hip‑hop that reflects her heritage. Family meals often feature dishes like collard greens, sweet
    potato pie, and homemade cornbread, connecting her to Southern culinary roots. Growing up in Monroe County, she is aware of Rochester's rich history of civil‑rights activism, which inspires her interest
    in community advocacy and preserving Black cultural stories through her creative projects.
