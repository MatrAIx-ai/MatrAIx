  hobbies: '[''Drawing and comic art'', ''Video editing'', ''Reading YA and historical fiction'', ''Basketball and hip‑hop dancing'', ''Baking family recipes'', ''Journaling and mindfulness'', ''Volunteering
    at the local library'']'
  career_goals: Georgia hopes to combine her love for community, creativity, and problem-solving into a career that makes a positive impact. She is interested in becoming a community outreach coordinator
    or youth mentor, where she can design engaging programs that encourage learning and teamwork. She also dreams of exploring graphic design or digital storytelling as a way to share stories from her neighborhood
    and celebrate Black culture. Long-term, she imagines a role that allows her to advocate for educational equity and environmental sustainability in Rochester, while still keeping space for flexibility
    and personal growth.
