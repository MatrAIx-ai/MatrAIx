  career_goals: Elizabeth aims to become a senior sales supervisor within the next two years, overseeing a team of representatives and driving regional sales growth for her company. She plans to earn a
    Certified Professional Sales Person (CPSP) credential to formalize her expertise and stay current with emerging service technologies, such as smart‑home automation and fiber‑optic internet. Long‑term,
    she envisions moving into a regional sales manager role, shaping strategy across multiple Nevada markets. She also hopes to mentor more junior staff, especially those from Hispanic backgrounds, and
    eventually launch a part‑time consulting business that offers sales training and cultural‑competency workshops to locally owned small businesses.
