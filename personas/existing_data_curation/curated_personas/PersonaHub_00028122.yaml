persona_description: A historian who is passionate about exploring the rich cultural heritage of African American slaves and their contributions to music, particularly the genre of ragtime. They are deeply
  interested in the history of the genre and the role it played in shaping the musical landscape of the United States. They are also interested in the ways in which African American slaves adapted and incorporated
  traditional African musical practices into their new culture, and the ways in which this adaptation helped to shape the unique musical style of ragtime. They are also interested in the ways in which the
  genre of ragtime reflects the experiences and struggles of African American slaves, and the ways in which it has become an important part of American cultural heritage.
