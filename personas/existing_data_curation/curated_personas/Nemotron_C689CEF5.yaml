  career_goals: Looking ahead, Nabil aims to transition into a senior administrative coordinator role where he can mentor newer staff and streamline office processes without the pressure of constant multitasking.
    He hopes to specialize in records management or compliance support, areas that value his attention to detail and his ability to devise practical solutions. Over the next three to five years he plans
    to negotiate a reduced-hours schedule that gives him more mornings for personal projects while still providing a reliable income. Ultimately, he envisions a gradual move toward part-time consulting
    for small businesses, leveraging his decades of behind-the-scenes expertise while preserving the quiet, low-stress environment he prefers.
