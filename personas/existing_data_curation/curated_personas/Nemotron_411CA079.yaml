personas:
  professional: Hattie Deal leverages a solid grounding in GAAP, audit practice, and emerging data‑visualization tools to lead audit teams with a meticulous yet adaptable style, translating complex financial
    findings into clear narratives for clients while mentoring junior staff with a mix of assertiveness and compassion.
  sports: Hattie Deal jogs twice weekly with the Houston Road Runners club, participates in community Zumba and yoga classes, and avidly follows the Houston Astros, Texans, and Rockets, often wearing their
    merchandise during weekend runs.
  arts: Hattie Deal regularly attends live performances by jazz icons such as Wynton Marsalis, gospel legends like Mavis Staples, and blues virtuoso Gary Clark Jr. at venues across Greater Houston, and
    she blends this musical passion with a habit of quoting inspiring lines from business leadership books during discussions with friends.
  travel: Hattie Deal’s travel style blends meticulous planning for weekend getaways to Texas Hill Country vineyards and spontaneous trips to cultural hubs like New Orleans and Austin, while dreaming of
    an extended adventure exploring the historic streets of Lisbon and the vibrant markets of Marrakech, all balanced against a modest budget and family commitments.
  culinary: Hattie Deal’s culinary repertoire includes mastering Southern classics like shrimp and grits, sweet potato pie, and collard greens seasoned with smoked paprika, and she enjoys experimenting
    with homemade hot sauce featuring jalapeños and cayenne, often hosting potluck gatherings where she serves these dishes alongside a selection of artisanal cornbread.
  core: Hattie Deal is an energetic, curiosity‑driven accountant who balances meticulous financial precision with a love for community‑centered fitness, soulful music, and generous home‑cooked meals, all
    while juggling a persistent undercurrent of worry that fuels both diligence and occasional self‑criticism.
background:
  cultural: Hattie’s identity as a Black woman raised in Texas informs many aspects of her life. She grew up attending a historically Black church where community service, music, and storytelling were emphasized,
    fostering a strong sense of solidarity and cultural pride. Her family’s traditions blend Southern hospitality with African‑American culinary customs, shaping her love for food and communal gatherings.
    Living in Tomball and the broader Harris County area, Hattie is immersed in the multicultural mosaic of Greater Houston, which broadens her perspective on inclusion and social equity. She is actively
    involved in local cultural events, such as Juneteenth celebrations and Black History Month panels, and she values mentorship programs that uplift underrepresented youth in the professional sphere. This
    cultural heritage fuels her commitment to giving back, advocating for financial literacy, and championing diversity within the accounting field.
attributes:
  skills: '[''Financial Accounting'', ''Auditing'', ''Tax Preparation'', ''GAAP Compliance'', ''ERP Systems (SAP, Oracle NetSuite)'', ''Advanced Excel & Power Query'', ''Data Visualization (Power BI)'',
    ''Risk Assessment'', ''Internal Controls'', ''Client Relationship Management'', ''Team Leadership'', ''Mentoring'']'
  hobbies: '[''Running'', ''Zumba fitness classes'', ''Yoga and mindfulness practice'', ''Cooking Southern comfort cuisine'', ''Attending jazz, gospel, and blues concerts'', ''Book club discussions'', ''Volunteer
    tax‑preparation clinic'']'
  career_goals: Hattie aims to obtain her CPA designation within the next two years and transition into a senior audit manager role, where she can oversee larger, more complex engagements and drive strategic
    improvements for clients. She envisions eventually stepping into a CFO position for a mid‑size Texas‑based firm, leveraging her blend of technical expertise and people‑focused leadership. Parallel to
    her corporate aspirations, Hattie wants to expand her community outreach by establishing a free tax‑preparation clinic for low‑income families in Harris County and mentoring aspiring accountants, especially
    women of color, to diversify the profession. She also hopes to specialize in ESG (Environmental, Social, Governance) reporting, integrating her personal commitment to sustainability with her professional
    skill set.
