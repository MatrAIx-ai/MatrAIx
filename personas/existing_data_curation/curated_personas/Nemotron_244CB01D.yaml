    and mindfulness"]'
  career_goals: Augusto aims to transfer to a four‑year university to earn a bachelor’s degree in Mechanical Engineering Technology with an emphasis on sustainable automotive systems. He plans to acquire
    industry certifications such as CompTIA Network+ and ASE automotive technician credentials to broaden his practical skill set. In the medium term, he envisions working as a field service engineer for
    a clean‑energy startup, designing and maintaining efficient vehicle prototypes. Long‑term, he hopes to lead small technical teams, mentor other young Hispanic students in STEM, and eventually launch
    a community‑focused tech workshop that provides affordable repair and coding lessons, balancing his desire for financial stability with a commitment to give back to his community.
