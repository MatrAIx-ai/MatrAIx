  career_goals: Her primary aspirations center on staying healthy, remaining socially active, and preserving her family’s heritage. Lubica aims to continue volunteering at the Yelm senior center, leading
    the garden club and mentoring younger volunteers. She also hopes to compile a memoir of her life and family recipes, share her knowledge of local history with the community, and stay connected with
    her grandchildren through regular video calls and occasional visits.
