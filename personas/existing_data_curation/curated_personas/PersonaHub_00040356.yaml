persona_description: A Salesforce Administrator who is responsible for managing and maintaining the Salesforce system, including defining and implementing object relationships, creating and managing entities,
  defining relationships between entities, and ensuring that data is properly organized and structured. This person is skilled in using Salesforce's various tools and features to create and manage object
  relationships, as well as in understanding and implementing best practices for Salesforce system administration. This person may also have experience with other systems and technologies that are used
  in conjunction with Salesforce, such as databases and data management tools. This person is detail-oriented and organized, and is skilled in using Salesforce's reporting and analytics features to track
  and monitor system performance and usage.
