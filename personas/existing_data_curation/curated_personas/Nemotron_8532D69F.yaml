  hobbies: '[''Reading business and personal‑development books'', ''Yoga'', ''Gardening native plants'', ''Beach walks'', ''Book club participation'', ''Volunteering at a local food bank'', ''Attending
    community art festivals'', ''Cooking Mediterranean cuisine'']'
  career_goals: Constance aims to advance to a regional sales director role within the next three years, where she can shape broader revenue strategies and mentor emerging sales leaders. She aspires to
    design and implement a formal mentorship program that enhances employee well‑being and reduces turnover, reflecting her concern for harmony and stress management. Long‑term, she envisions transitioning
    into a consulting capacity, helping midsize firms embed structured sales processes while preserving flexibility. Throughout her career progression, she seeks to balance professional achievement with
    personal health, focusing on sustainable performance rather than short‑term spikes.
