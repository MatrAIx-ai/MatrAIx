  hobbies: '["Drawing and coloring", "Listening to picture books", "Building with LEGO", "Solving simple puzzles", "Exploring the park and collecting rocks", "Dancing to music", "Helping in the kitchen"]'
  career_goals: Joyce dreams of becoming someone who creates and shares beautiful things, such as an artist who paints bright murals, a teacher who tells stories to children, a veterinarian who cares for
    animals, or an astronaut who explores space. She is motivated by the idea of helping others and discovering new ideas, and she often imagines herself leading a community art project or guiding younger
    kids in a classroom setting.
