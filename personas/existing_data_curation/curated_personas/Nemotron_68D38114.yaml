personas:
  professional: Joyce Marshall, a budding junior illustrator, blends a love for drawing animals and imaginary worlds with the methodical problem‑solving practiced through LEGO building, resulting in meticulous,
    colorful sketches that capture storybook scenes while staying delightfully curious and cooperative.
  sports: Joyce Marshall, an energetic park explorer, enjoys rope‑skipping, knee‑high soccer drills with the Greenfield Cubs youth team, and cheering for the hometown Springfield Sluggers baseball club,
    while also participating in a weekly community gymnastics class that satisfies their love for movement and balance.
  arts: Joyce Marshall, a passionate little artist, delights in coloring pages by Eric Carle and Dr. Seuss, mimics the whimsical animation style of Hayao Miyazaki in doodles, dances to The Wiggles during
    family music time, and collects stickers of favorite animals, weaving these influences into a vibrant personal aesthetic.
  travel: Joyce Marshall, an adventurous six‑year‑old, loves weekend trips to the nearby nature reserve where they collect rocks and leaves, dreams of visiting the National Gallery of Art to see famous
    animal paintings, and is eager for a family vacation to Disneyland, balancing curiosity with the need for familiar routines and parental supervision.
  culinary: Joyce Marshall, a budding kitchen helper, enjoys stirring batter for banana pancakes, arranging rainbow fruit salads with strawberries, blueberries, and kiwi, favors snack‑time peanut‑butter
    apple slices, and sometimes insists on using only bright‑colored plates, showcasing a playful yet developing culinary skill set.
  core: Joyce Marshall, a curious, organized six‑year‑old artist‑engineer hybrid, balances vibrant creativity with disciplined savings, health routines, and energetic play, all while sprinkling glittery
    quirks into daily life.
background:
  cultural: Joyce is part of an African American family rooted in Fort Wayne, Indiana. Her cultural background includes family gatherings featuring soul food, listening to gospel, R&B, and hip‑hop music,
    and celebrating holidays such as Juneteenth and Kwanzaa. She attends a local church where community values of kindness, cooperation, and mutual support are emphasized. Stories of Black history and role
    models are shared at home and school, fostering pride in her heritage while she also enjoys the Midwestern seasonal traditions like autumn leaf trips and winter festivals.
attributes:
  skills: '["Reading simple words", "Counting to 20", "Recognizing shapes", "Drawing and coloring", "Cutting with safety scissors", "Asking explanatory questions", "Following multi‑step instructions", "Cooperative
