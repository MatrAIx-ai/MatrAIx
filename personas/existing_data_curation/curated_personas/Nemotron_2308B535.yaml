  hobbies: '[''Metal sculpting'', ''Sketching'', ''Black‑and‑white photography'', ''Visiting art galleries'', ''DIY electronics (Arduino, 3D printing)'', ''Gardening'', ''Mindfulness meditation'', ''Volunteering
    at community shelter'', ''Reading philosophy'', ''Listening to classical music'']'
  career_goals: Stephen aims to transition into a lead‑assembler or safety‑trainer role where he can shape workplace culture and champion employee well‑being. He plans to earn a CNC programming certification
    and a certified safety trainer credential within the next two years. By leveraging his artistic curiosity, he hopes to launch a small side business crafting custom metal art pieces for local collectors,
    providing a creative outlet and supplemental income as he approaches retirement. He also seeks a work environment that supports mental‑health resources, allowing him to manage his anxiety while remaining
    a reliable, compassionate team member.
