personas:
  professional: Lia Guilarte, a 39‑year‑old correctional officer renowned for de‑escalation, crisis intervention, and meticulous incident reporting, combines fluent Spanish and a curiosity for art to run
    creative‑expression workshops for inmates while pursuing a bachelor’s degree that will pave the way toward a shift‑commander or training coordinator role.
  sports: Lia Guilarte stays fit through weekly hikes at Organ Pipe Cactus National Monument and sunset yoga classes, cheers the Arizona Cardinals on Sundays and the Phoenix Suns during the NBA season,
    and participates in a community running group that meets for 5K runs on Saturday mornings.
  arts: Lia Guilarte channels a love for desert hues into watercolor paintings reminiscent of Georgia O’Keeffe, curates street‑photography of Día de los Muertos festivals with a nod to Dorothea Lange, and
    regularly attends local gallery openings featuring contemporary Mexican‑American artists such as Carlos Almaraz, while also leading art‑based mentorship workshops for at‑risk youth.
  travel: Lia Guilarte favors a blend of spontaneous road trips across the Southwest—like weekend escapes to Tucson’s historic Old Town and Joshua Tree’s star‑filled nights—and meticulously planned cultural
    journeys to Oaxaca, Mexico, where they explore mural tours and traditional markets, balancing limited family obligations with a yearning for immersive art experiences.
  culinary: Lia Guilarte showcases solid intermediate cooking skill by preparing authentic mole negro with ancho chilies and Mexican chocolate, hand‑rolled tamales seasoned with hoja santa, and experimental
    fusion dishes like cactus‑infused quesadillas, often sourcing fresh corn masa and dried chiles from local farmers’ markets.
  core: Lia Guilarte is a compassionate correctional officer whose artistic curiosity fuels inmate rehabilitation programs, meticulously budgets yet splurges on watercolor supplies and artisanal coffee,
    and steadies stress with yoga—though they sometimes overcommit to community mentorships at the expense of personal downtime.
background:
  cultural: Lia’s Mexican heritage is a core part of her identity. She grew up in a bilingual household where Spanish was spoken daily, and she celebrates traditions such as Día de los Muertos, quinceañeras,
    and Christmas posadas with her extended family in Yuma. Her cultural roots inform her values of family loyalty, community solidarity, and respect for elders. Lia actively participates in the local Mexican‑American
    community, contributing to cultural festivals and supporting Spanish‑language educational initiatives. This background enhances her empathy and cultural sensitivity, especially when working with a diverse
    inmate population and when integrating culturally resonant art programs into correctional settings.
attributes:
  skills: '[''Inmate Supervision'', ''Crisis Intervention'', ''Conflict Resolution'', ''Incident Report Writing'', ''Security Log Management'', ''Defensive Tactics'', ''Firearms Safety'', ''First Aid'',
    ''Bilingual Communication (Spanish/English)'', ''Cultural Competency'', ''Program Development for Art Therapy'', ''Emotional Support and Mediation'']'
  hobbies: '[''Watercolor Painting'', ''Visiting Art Galleries'', ''Cooking Traditional Mexican Cuisine'', ''Hiking Desert Trails'', ''Yoga'', ''Photography'', ''Reading Mystery Novels'', ''Spanish‑Language
    Book Club'', ''Youth Mentorship Volunteering'']'
  career_goals: Lia aims to earn a bachelor's degree in criminal justice or social work within the next three years, positioning herself for a supervisory role such as Shift Commander or Training Coordinator.
    She aspires to lead the development of inmate rehabilitation programs that integrate artistic and cultural activities, leveraging her appreciation for art to reduce recidivism. Long‑term, Lia envisions
    becoming a correctional program manager or a consultant who designs humane, evidence‑based interventions across the state correctional system, while also mentoring new officers and advocating for staff
    wellness initiatives.
