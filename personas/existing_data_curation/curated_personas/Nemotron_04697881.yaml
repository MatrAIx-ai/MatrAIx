personas:
  professional: Roberto Suarez is a civil engineer who leverages AutoCAD Civil 3D, Revit BIM, and GIS expertise to design cross‑border infrastructure, applying meticulous cost‑estimating and scheduling
    skills while using their bilingual fluency to smooth communication between U.S. and Mexican stakeholders, embodying a structured yet adaptable work style that prioritizes community‑focused, sustainable
    outcomes.
  sports: Roberto Suarez is a dedicated member of the Franklin Mountains Soccer Club, playing weekly matches in a co‑ed amateur league, while cheering on El Paso Locomotive FC during the USL Championship
    season and following the Mexican national team’s World Cup campaign.
  arts: Roberto Suarez finds creative release in strumming acoustic guitar tunes inspired by José González, capturing desert sunsets and historic adobe facades with a Nikon D850, and curating a modest collection
    of Frida Kahlo prints that decorate their workspace.
  travel: Roberto Suarez prefers mixed‑mode trips that combine meticulously planned hiking itineraries in the Chihuahuan Desert with spontaneous weekend getaways to nearby border towns such as Ciudad Juárez
    and cultural festivals in Oaxaca, balancing a modest travel budget with a yearning to explore both rugged landscapes and vibrant community celebrations.
  culinary: Roberto Suarez enjoys cooking at a high‑intermediate level, mastering tacos al pastor with pineapple‑infused pork, creating rich mole poblano that blends toasted chilies, almonds, and chocolate,
    and experimenting with fresh nopales and huitlacoche in seasonal dishes that honor family recipes.
  core: Roberto Suarez blends disciplined engineering precision with a love for desert adventures, spontaneous guitar jams, and community‑centric projects, all while occasionally neglecting dental check‑ups
    in favor of late‑night woodworking.
background:
  cultural: Roberto grew up in a bilingual Mexican‑American household in El Paso, surrounded by the vibrant traditions of both cultures. His parents instilled in him a deep respect for family, community,
    and the rituals of Día de los Muertos and Semana Santa, which he celebrates with relatives on both sides of the border. Fluent in Spanish and English, he navigates seamlessly between the two linguistic
    worlds, often serving as a cultural bridge in professional and social settings. The blend of Mexican collectivist values—emphasizing harmony, cooperation, and consideration for others—and the individualistic,
    opportunity‑driven ethos of the U.S. Southwest shapes his collaborative work style and his commitment to projects that benefit the local community. He participates in local festivals, supports Mexican
    cuisine markets, and maintains strong ties with extended family in Ciudad Juárez, keeping his heritage an active part of his daily life.
attributes:
  skills: '["Structural analysis", "Concrete design", "Site surveying", "AutoCAD Civil 3D", "Revit BIM", "GIS mapping", "Cost estimating", "Construction budgeting", "Project scheduling (MS Project)", "Permit
    acquisition and code compliance", "Bilingual communication (Spanish/English)", "Stakeholder coordination", "Safety and OSHA compliance", "Risk management", "Sustainable & resilient design", "Water resources
    management (desert irrigation)"]'
  hobbies: '["Hiking", "Mountain biking", "Soccer", "Cooking Mexican cuisine", "Woodworking", "Playing guitar", "Photography", "Volunteering at community center", "Reading technical journals"]'
  career_goals: Roberto plans to earn his Professional Engineer (PE) license within the next two years, positioning himself for senior project manager roles on large‑scale infrastructure projects such as
    water treatment facilities and cross‑border freight corridors. He is driven to lead multidisciplinary teams, mentor junior engineers, and champion sustainable, climate‑resilient design solutions that
    serve both the Texas and Mexican communities. Over the next five years, he hopes to obtain a master’s degree focused on resilient infrastructure, expand his expertise in water resources, and eventually
    establish his own consulting firm that specializes in border‑region development, emphasizing community engagement and equitable access to essential services.
