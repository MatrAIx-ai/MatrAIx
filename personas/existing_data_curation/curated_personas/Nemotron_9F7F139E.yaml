personas:
  professional: Terry Cordes, a registered nurse in a rural Arkansas hospital, blends meticulous patient assessment, IV therapy, and wound-care expertise with health-informatics proficiency, and they channel
    their love of structure and cooperative spirit into streamlining EMR documentation, leading quality-improvement teams, and mentoring new graduates.
  sports: Terry Cordes anchors the point guard spot in a local intramural basketball league, spends weekends fishing at Lake Dardanelle with the Arkansas Anglers Association, hikes the Ozark foothills for
    cardio, and follows the Arkansas Razorbacks, St. Louis Cardinals, and Dallas Cowboys, blending team allegiance with personal fitness routines.
  arts: Terry Cordes immerses themselves in Southern arts by performing at the Red River Bluegrass Festival and singing in the church choir with arrangements of Alison Krauss and the Punch Brothers, crafting
    furniture inspired by Sam Maloof, and unwinding to The Avett Brothers’ folk-rock while enjoying films starring John Goodman, melding tradition with contemporary creativity.
  travel: Terry Cordes favors short road trips that juxtapose outdoor adventure and cultural discovery, having trekked the Ouachita National Forest, explored New Orleans’ French Quarter, soaked in Nashville’s
    live-music scene, and now dreams of driving the Blue Ridge Parkway near Asheville and lounging on Hawaii’s Big Island, all while keeping travel costs modest through careful planning.
  culinary: Terry Cordes cooks Southern comfort staples—crispy fried catfish with hush-puppies, shrimp and grits seasoned with Andouille sausage, and slow-smoked pork ribs glazed with a brown-sugar-hickory
    BBQ sauce—accompanied by collard greens and buttery cornbread, and they showcase their intermediate woodworking flair by hand-carving cutting boards for serving dishes to friends and family.
  core: Terry Cordes blends a Southern love of hospitality with a data-driven, structured mindset, tackling every challenge—whether a patient chart or a fishing lure—with methodical precision, an infectious
    smile, and a habit of humming bluegrass tunes while double-checking their to-do list.
background:
  cultural: Terry grew up in Cabot, Arkansas, within a close‑knit, predominantly white Southern community that places a high value on hospitality, family ties, and service to others. His upbringing was
    shaped by regular church involvement, community barbecues, and Saturday high‑school football games, fostering a strong sense of belonging and collective responsibility. The agricultural roots of Lonoke
    County instilled a practical work ethic, while his family's emphasis on education—his mother a schoolteacher and his father a farm manager—encouraged him to pursue a STEM degree and a career in nursing.
    This blend of traditional Southern values and exposure to progressive health‑care practices informs his compassionate, cooperative nature and his drive to improve rural health outcomes.
