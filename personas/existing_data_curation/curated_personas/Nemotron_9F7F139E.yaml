  career_goals: In the short term, Terry plans to earn a Master of Science in Nursing with a focus on nursing informatics or acute care, and to become certified in ACLS and PALS. He aims to lead quality‑improvement
    projects that streamline patient flow in his hospital and to mentor new graduate nurses. Long‑term, he aspires to a nurse‑manager or director‑of‑clinical‑services role at a regional health system, where
    he can develop telehealth and mobile‑clinic services that address the healthcare gaps in rural Lonoke County. Ultimately, he hopes to influence policy on rural health access and to teach future nurses
    in an academic setting.
