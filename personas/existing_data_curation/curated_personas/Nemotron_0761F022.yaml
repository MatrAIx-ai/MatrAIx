personas:
  professional: Kaylamarie Edison is a budding multimedia artist‑programmer who merges watercolor sketches with Python‑driven interactive installations, and they apply their disciplined, high‑standard approach
    to both class assignments and personal blog tutorials.
  sports: Kaylamarie Edison joins the school’s track club for cross‑country, hikes the Cascades on weekends with a local environmental group, and they cheer for the Seattle Seahawks while also attending
    community climbing sessions at a nearby gym, balancing competitive runs with leisurely nature walks.
  arts: Kaylamarie Edison curates a personal blog that reviews the latest MoMA exhibitions, admires the street works of Banksy and the immersive installations of Yayoi Kusama, and they frequently practice
    piano pieces by Debussy as well as contemporary electronica remixes, letting these influences shape their sketching of urban skylines.
  travel: Kaylamarie Edison dreams of visiting the art‑filled alleys of Florence and the neon districts of Tokyo, while they have already taken day trips to Seattle’s Pike Place Market and the volcanic
    landscapes of Mount Rainier, preferring meticulously planned itineraries that fit within a modest family budget and school schedule.
  culinary: Kaylamarie Edison enjoys crafting avocado toast topped with smoked salmon and a drizzle of sriracha, perfecting a home‑made miso ramen, and they often snack on dark chocolate while sketching,
    though they sometimes skip meals during marathon coding sessions.
  core: Kaylamarie Edison is a hyper‑curious, meticulously organized teen who fuses art and code, hikes mountains, and runs a polished art blog, yet they habitually sacrifice sleep and hoard sketchbooks.
background:
  cultural: Kaylamarie was raised in a middle-class, predominantly European-heritage family in a suburban neighborhood of Seattle. Her household places a strong emphasis on education, independent thinking,
    and community involvement, reflecting broader Pacific Northwest values of environmental stewardship and cultural openness. Frequent visits to the Seattle Art Museum, the Museum of Pop Culture, and local
    galleries have nurtured her appreciation for both classic and contemporary art. At home, family traditions include celebrating holidays such as Thanksgiving and Fourth of July with a blend of classic
    American customs and occasional Scandinavian-inspired dishes, reflecting her ancestral roots. Growing up near the water and mountains, she internalized a deep respect for nature, which informs her recreational
    choices and her commitment to sustainability. This blend of traditional American upbringing with the progressive, arts-focused atmosphere of Seattle shapes her worldview and personal identity.
