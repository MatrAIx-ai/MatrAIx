  career_goals: Kaylamarie aspires to combine her love for art, technology, and structured problem solving into a career that bridges creativity and user experience. She dreams of attending a top university—ideally
    the University of Washington—to major in Human-Centered Design & Engineering or Museum Studies. Long-term, she envisions working as a UX designer or museum curator, creating immersive exhibits and digital
    interfaces that make complex ideas accessible. She also hopes to launch a youth-led community art initiative in Seattle that empowers peers to explore unconventional artistic concepts while fostering
    collaborative project management skills.
