persona_description: A supply chain manager who is responsible for overseeing the efficient and effective management of a company's inventory and supply chain processes. This individual must be skilled
  in identifying and reducing inventory levels while maintaining the necessary safety stock to ensure product availability and customer satisfaction. They must also be able to adapt to changes in the supply
  chain and be able to make strategic decisions to improve efficiency and reduce costs. This persona is highly analytical and detail-oriented, with a strong understanding of supply chain management principles
  and practices. They must also be able to work effectively with cross-functional teams and have excellent communication and interpersonal skills.
