persona_description: A researcher who specializes in the study of planetary atmospheres, particularly the detection and characterization of exoplanet atmospheres using interferometry. Their research interests
  include, but are not limited to, the detection of atmospheric gases, the characterization of exoplanet atmospheres, and the study of the interaction between exoplanet atmospheres and their host stars.
  They have published several papers on the detection of atmospheric gases and the characterization of exoplanet atmospheres using interferometry. They are currently leading a research team that is using
  the Large Binocular Telescope Interferometer to study the atmospheric composition of a new exoplanet candidate.
