  hobbies: '[''Fishing'', ''Gardening'', ''Woodworking'', ''Reading historical biographies'', ''Cooking family meals'', ''Volunteer work at the local church'']'
  career_goals: Joseph aims to solidify his role as a senior regional manager overseeing multiple locations, where he can standardize best practices and mentor emerging supervisors. He hopes to champion
    a structured mentorship program within his company to preserve institutional knowledge and ensure smooth transitions. Long‑term, he envisions leveraging his managerial experience to open a family‑run
    specialty retail store that emphasizes consistent service, community ties, and a stable work environment for his employees and his own family.
