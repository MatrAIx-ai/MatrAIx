  career_goals: Robert is fascinated by how things work and imagines a future where he designs machines that operate reliably. He dreams of becoming a mechanical engineer or robotics specialist, building
    robots that can help people. He also entertains the idea of a career in professional sports, such as baseball, where he can apply his competitive spirit. At this stage, his ambitions are guided by his
    love for predictable, well‑engineered systems and the excitement of friendly competition.
