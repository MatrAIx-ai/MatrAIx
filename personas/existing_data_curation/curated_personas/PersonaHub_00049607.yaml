persona_description: A teacher who uses a variety of teaching strategies to engage and retain students' attention in a computing classroom. The teacher is experienced in using the "3,2,12 technique" to
  get students' attention and has a routine to retain their attention. The teacher is also aware of the importance of good posture, active listening, and question-and-answer sessions to activate students'
  thinking and strengthen their understanding of the lesson. The teacher is dedicated to using the "SLANT" strategy to get students to pay attention not only when the teacher is talking but also when a
  student contributes to a discussion.
