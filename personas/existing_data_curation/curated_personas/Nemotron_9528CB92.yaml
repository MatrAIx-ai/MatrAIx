    school assignments'', ''Volunteering at the Bowie Public Library (shelving and event assistance)'']'
  hobbies: '[''Journaling'', ''Listening to R&B/Neo‑Soul music'', ''Reading teen fiction and sci‑fi short stories'', ''Community gardening (herb plots)'', ''Experimenting with cooking and baking'', ''DIY
    crafting (bracelets, tote bags)'', ''Practicing dance routines from online tutorials'', ''Playing strategic board games with a small group of friends'']'
  career_goals: 'Bertha wants to finish her education through a GED program and eventually enroll in a community college where she can study health informatics—a field that blends her fascination with technology
    and her desire to work in a stable, well‑paying health‑care environment. She sees herself acquiring certifications in medical coding and health‑data analysis, with a long‑term aim to become a medical
    records specialist or a health‑IT support technician. At the same time, she dreams of launching a small online shop where she sells her handcrafted accessories, providing an extra income stream and
    a creative outlet. Her ambition is grounded in practicality: she plans to secure a reliable job that can support herself and her family while still nurturing her entrepreneurial side.'
