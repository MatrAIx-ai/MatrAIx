personas:
  professional: Bertha Best is a forward‑looking health‑informatics aspirant who channels her curiosity for technology and practical reliability into coordinating peer‑tutoring at school, mastering basic
    digital photo editing, and planning to earn medical‑coding certifications while simultaneously building a small online shop for handcrafted accessories, and they are determined to blend tech and creativity
    in a stable career.
  sports: Bertha Best enjoys low‑impact fitness, attending weekday yoga classes at the community center, cheering on the local Riverside Raptors baseball team, and joining casual weekend pick‑up soccer
    games at the neighborhood park, while they prefer solo sunrise jogging for mental clarity.
  arts: Bertha Best curates neo‑soul playlists featuring Erykah Badu and H.E.R., immerses herself in contemporary teen novels by Becky Albertanni, draws inspiration from sci‑fi short stories by Becky Cleary,
    crafts friendship bracelets and customized tote bags, and occasionally practices TikTok dance routines from choreographer Kandra, weaving music and literature into daily creative expression that they
    share on social media.
  travel: Bertha Best favors low‑budget weekend escapes, having trekked the nearby Redwood National Park’s trails and tasted soulful cuisine in New Orleans, while they day‑dream about a future solo trip
    to Kyoto to explore its blend of tradition and cutting‑edge technology, though financial constraints keep international travel on the backburner for now.
  culinary: Bertha Best delights in soul‑food inspired cooking, experimenting with collard greens seasoned with smoked turkey, sweet‑potato cornbread, and spicy jerk chicken marinated in herbs from the
    community garden, while their beginner‑level baking skill shines in perfectly timed cinnamon rolls and simple pastries for family gatherings that they proudly serve.
  core: Bertha Best is a reserved yet inquisitive teen who balances tech‑driven health ambitions, careful budgeting, solitary creative projects, and weekend garden‑to‑table cooking, all while navigating
    the occasional impulse to splurge on concert tickets.
background:
  cultural: Bertha was raised in a multigenerational African‑American family in Bowie, Maryland, a suburb of Prince George’s County with deep roots in the Washington‑D.C. metropolitan area. Family stories
    of the Great Migration and the civil‑rights movement are shared at Sunday church gatherings, where gospel music and communal meals reinforce a sense of belonging. She grew up eating traditional soul‑food
    dishes—collard greens, cornbread, and fried chicken—prepared by her grandparents, and celebrates cultural holidays such as Juneteenth with local festivals and barbecues. The neighborhood’s strong church
    community, the Prince George’s County African‑American Heritage Festival, and nearby museums like the National Museum of African American History and Culture provide her with regular exposure to Black
    art, history, and activism. These experiences shape her values of resilience, community service, and pride in her heritage while informing her aspirations to give back to her community.
attributes:
