personas:
  professional: Ngan Yim is an aspiring landscape architect who blends hands‑on horticulture expertise with a watercolor artist’s eye, using entry‑level CAD tools and a keen sense of organization to design
    sustainable Texas gardens that incorporate stone lanterns and bamboo, while confidently leading crew schedules and adapting on‑site.
  sports: Ngan Yim stays active by playing point guard for the local Katy Knights basketball league, cheering on the Houston Rockets and Astros during the season, and hitting the trails of Sam Houston National
    Forest for weekend hikes that blend cardio with plant photography.
  arts: Ngan Yim channels a love for watercolor into sketching native grasses while drawing inspiration from Georgia O’Keeffe’s desert palettes, Ai Weiwei’s sculptural installations, and the ambient sounds
    of Ryuichi Sakamoto, often visiting the Katy Arts Center to view rotating exhibits.
  travel: Ngan Yim prefers carefully planned short trips that balance exploration and relaxation, having already visited family roots in Taiwan and the vibrant street art of Austin, they now dream of a
    spring pilgrimage to Kyoto’s zen gardens and a weekend getaway to the Texas Hill Country vineyards.
  culinary: Ngan Yim enjoys cooking at home, skillfully whipping up pork and chive dumplings, spicy Sichuan mapo tofu, and Texas‑style BBQ brisket glazed with honey‑soy, often seasoning with fresh basil,
    cilantro, and ginger harvested from their balcony garden.
  core: Ngan Yim blends a keen eye for plant design with a watercolor habit, juggling a steady work ethic and occasional late‑night sketch marathons that leave coffee‑stained hands and a growing backlog
    of garden proposals.
background:
  cultural: Ngan was born in Katy to immigrant parents from Taiwan, and he grew up in a bilingual household where Mandarin and English were spoken daily. His family maintains cultural traditions such as
    celebrating Lunar New Year with red lanterns, dumplings, and temple visits, while also embracing Texan customs like barbecues and local festivals. This blend of East Asian heritage and Southern U.S.
    life has given him a strong appreciation for community, respect for elders, and a love for both traditional cuisine and modern, multicultural experiences. The emphasis his parents placed on education
    and hard work influenced his pursuit of a college program in horticulture, and his multicultural upbringing fuels his interest in integrating Asian garden aesthetics—such as stone lanterns, bamboo,
    and koi ponds—into contemporary Texas landscapes.
attributes:
  skills: '[''Plant identification'', ''Soil preparation'', ''Irrigation system installation and maintenance'', ''Operation of commercial landscaping equipment'', ''Basic landscape design and sketching'',
    ''Entry‑level CAD/SketchUp for garden layouts'', ''Inventory management'', ''Safety compliance (OSHA)'', ''Customer service and communication'', ''Team coordination and leadership'']'
  hobbies: '[''Watercolor painting'', ''Visiting art galleries'', ''Hiking and nature photography'', ''Balcony herb gardening'', ''Weekend basketball'', ''Community garden volunteering'', ''Cooking traditional
    East Asian cuisine'', ''Listening to music'', ''Digital sketching for landscape concepts'']'
  career_goals: Ngan aims to leverage his hands‑on experience and artistic sensibility to become a certified landscape architect. Over the next few years he plans to complete an associate degree in horticulture,
    earn the Texas Certified Landscape Professional (TCLP) credential, and master advanced design software such as AutoCAD Landscape. He envisions eventually opening his own sustainable landscaping firm
    that blends eco‑friendly practices with culturally inspired garden art, possibly collaborating with local artists and community spaces. In the medium term, he hopes to take on crew‑lead responsibilities,
    mentor newer workers, and lead projects that incorporate native Texas plants and creative hardscape features while maintaining a balance between organization and flexibility.
