  career_goals: In the short term, Marcus aims to sharpen his basketball skills to earn a scholarship and compete at the high‑school level, while mastering Python to join his school's robotics team. Long‑term,
    he envisions studying aerospace or sports‑technology engineering in college, creating innovative athletic equipment that merges his love for sports and tech. He also hopes to give back by mentoring
    younger teammates and aspiring coders in his community.
