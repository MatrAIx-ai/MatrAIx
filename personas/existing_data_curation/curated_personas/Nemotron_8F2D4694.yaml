personas:
  professional: Marcus White is an aspiring robotics hobbyist who merges methodical project planning with the competitive mindset honed in online strategy games, building Arduino‑based bots that showcase
    their practical, immediate‑reality focus.
  sports: Marcus White thrives in pickup basketball games at the neighborhood gym, cheers for the Miami Heat and Miami Dolphins, and participates in the youth basketball club 'Okeechobee Hoopers,' balancing
    an energetic, competitive approach with structured after‑school conditioning.
  arts: Marcus White produces short TikTok dance videos set to Ariana Grande’s '7 Rings' and BTS’s 'Dynamite,' blending trending pop beats with self‑choreographed moves inspired by YouTube tutorials, while
    also admiring classic pop legends like Michael Jackson.
  travel: Marcus White prefers purposeful weekend trips—like fishing excursions on Lake Okeechobee with dad—while dreaming of a meticulously planned road trip to Washington, D.C., and a relaxed family getaway
    to Disney World, navigating between adventure cravings and a modest allowance.
  culinary: Marcus White loves whipping up simple fish tacos with fresh cilantro and lime and perfecting a microwave mac‑and‑cheese, yet often skips breakfast for sugary cereal that fuels their morning
    gaming marathons, reflecting both culinary curiosity and quick‑fix habits.
  core: Marcus White is a structured yet outgoing 13‑year‑old who channels competitive energy into robotics, basketball, and TikTok dance, balancing disciplined planning with spontaneous fun and a tendency
    toward impulsive spending.
background:
  cultural: Marcus was raised in a close‑knit African‑American family in Okeechobee, Florida. His parents emphasized community pride, perseverance, and the importance of education. Family gatherings often
    feature soulful music, barbecues, and stories about ancestors who migrated from the South during the Great Migration. He attends a historically Black church where the youth program blends gospel music,
    mentorship, and service projects. The multicultural environment of Central Florida—its wetlands, fishing culture, and diverse neighborhoods—shapes his appreciation for nature and local traditions, while
    his Black cultural roots influence his love for rhythm, storytelling, and collective uplift.
