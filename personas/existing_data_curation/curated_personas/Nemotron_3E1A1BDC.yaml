  career_goals: Although retired, Joan is determined to leave a lasting impact on her community and the next generation of technologists. Her primary ambition is to endow a scholarship at her alma mater
    for women pursuing STEM degrees, and to launch a mentorship network that pairs retired engineers with undergraduate students. She also hopes to author a memoir that captures the challenges and triumphs
    of being a female engineer in the latter half of the 20th century. Locally, she aims to serve on the board of the De Pere Senior Center, helping to design intergenerational technology workshops and
    organize cultural events. While she prefers to plan these initiatives methodically, she remains open to spontaneous speaking engagements and short trips to neighboring states to share her story.
