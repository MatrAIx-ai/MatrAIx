personas:
  professional: Joan Mull, a retired systems engineer with three decades of experience designing control systems for automated manufacturing, channels their methodical project‑leadership skills into organizing
    a community book club, heading a senior choir, and mentoring young engineers, and they also flip spontaneously into impromptu improv storytelling sessions that showcase their love of centre‑stage attention.
  sports: Joan Mull follows the Green Bay Packers with fervent devotion, cheers on the Milwaukee Brewers during summer baseball outings, participates in a local walking club that meets for bird‑watching
    hikes along the Fox River, and they join a senior cycling group that rides the scenic trails around De Pere on crisp autumn mornings.
  arts: Joan Mull finds artistic fulfillment in leading a senior choir that performs works by folk legend Joan Baez and classical pieces by Mozart, attending pottery workshops inspired by Bernard Leach,
    knitting scarves while listening to Ella Fitzgerald, and they delight in improv storytelling evenings that echo the wit of Maya Angelou.
  travel: Joan Mull plans their travels with a mix of meticulous itineraries for heritage tours of historic sites in Wisconsin and spontaneous weekend getaways to neighboring Minnesota’s Boundary Waters,
    balancing a modest travel budget with their desire to share their story at community events in Madison and Milwaukee.
  culinary: Joan Mull enjoys cooking farm‑to‑table meals, favoring dishes like roasted root vegetable medley with sage, chicken pot pie flavored with thyme, and fresh apple crumble using local Honeycrisp
    apples, while their intermediate pottery skills let them serve soups in hand‑thrown bowls, and they occasionally over‑indulge in cheese curds at the Green Bay market.
  core: Joan Mull blends disciplined engineering precision with spontaneous stage‑presence, nurturing community bonds through choir and book club while they occasionally lose track of deadlines, all sustained
    by an unflappable calm and a love for garden‑grown herbs.
background:
  cultural: Joan was raised in De Pere, Wisconsin, in a family of German-American heritage with deep roots in the Upper Midwest. Her upbringing emphasized Midwestern values such as community involvement,
    practicality, modesty, and a strong work ethic, reinforced by regular participation in her local Catholic parish. The region’s seasonal landscapes nurtured her appreciation for gardening and outdoor
    recreation, while the close-knit town culture fostered her sociable, cooperative nature. These cultural influences blend with her STEM education, shaping a calm, resilient, and collaborative approach
    to both personal pursuits and community service.
