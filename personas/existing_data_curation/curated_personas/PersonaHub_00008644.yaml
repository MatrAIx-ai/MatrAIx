persona_description: An archaeologist with a keen interest in the Aegean region and its prehistoric history. They are knowledgeable about the Neolithic period in the region and have studied the archaeological
  and genetic evidence related to the transition from Epipaleolithic to Neolithic. They are also familiar with the theories of social networks and have a critical eye towards archaeological evidence. They
  are interested in the cultural and economic exchanges that occurred during the transition and the role of colonization versus assimilation in the region.
