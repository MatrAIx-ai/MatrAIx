personas:
  professional: Thedric Alexander, a 39‑year‑old food‑science specialist, blends rigorous microbial safety testing with AI‑driven predictive models to pioneer low‑impact, climate‑resilient food production
    while steering interdisciplinary teams with a methodical yet adaptable leadership style that balances meticulous data analysis with creative experimentation.
  sports: Thedric Alexander enjoys early‑morning runs with the Orlando Running Club, follows the Orlando Magic and Orlando City SC with casual devotion, participates in a community basketball league during
    winter, and balances these activities with a low‑impact home‑gym routine that mixes body‑weight circuits and garden‑based chores, though anxiety spikes occasionally cause missed sessions.
  arts: Thedric Alexander spends weekends wandering Orlando’s art districts, photographing the vibrant murals of local artist Maya Rivera and the abstract works of emerging painter Jamal Thompson, while
    evenings are soundtracked by John Coltrane, Miles Davis, and Kendrick Lamar, and they occasionally join a community jam session on saxophone, channeling the improvisational spirit of jazz into both
    music and culinary creations.
  travel: Thedric Alexander favors purpose‑driven trips that combine culinary exploration with cultural immersion, having planned detailed itineraries for a food‑fermentation workshop in Kyoto, a jazz‑centric
    weekend in New Orleans, and a road‑trip to the Georgia coastal marshes, while budget considerations and family responsibilities steer them toward short‑haul getaways rather than extended overseas expeditions,
    though a future dream is to trek the vineyards of Mendoza, Argentina.
  culinary: Thedric Alexander, an advanced home chef, fuses soul‑food heritage with modern techniques to craft dishes like sous‑vide pork ribs finished with a sorghum‑miso glaze, fermented hot sauce infused
    with hibiscus and gochujang, and smoked collard greens tossed with smoked paprika and fresh rosemary from their backyard garden, relishing the experimental process as much as the final tasting.
  core: Thedric Alexander is a curiosity‑driven food‑science innovator whose relentless experimental cooking and love for jazz coexist with a habit of over‑checking lab data late into the night, often trading
    sleep for the next breakthrough while battling persistent anxiety.
background:
  cultural: Thedric identifies as African‑American, with family roots tracing back to the Deep South of the United States. His upbringing was steeped in the traditions of soul‑food cooking, gospel music,
    and community gatherings at the local church. In Orlando, he actively participates in Black cultural events such as Juneteenth parades, AfroFest, and art showcases featuring African‑Diaspora artists.
    His culinary perspective is deeply influenced by the flavors and stories of his heritage, which he brings into his professional work in food science. He values collective uplift, often supporting neighborhood
    initiatives that promote health, nutrition, and STEM education for underrepresented youth. While embracing modern, multicultural experiences, he remains connected to the oral histories, music, and artistic
    expressions that shape his identity.
attributes:
  skills: '[''Laboratory techniques (microbial analysis, food safety testing)'', ''Analytical instrumentation (GC, HPLC, spectrophotometry, mass spectrometry)'', ''Statistical data analysis (R, Python,
    SAS)'', ''Soil and crop assessment'', ''Greenhouse and hydroponic system management'', ''Food product development and sensory evaluation'', ''Quality assurance and HACCP compliance'', ''Technical writing
    and presentation'', ''Project coordination and leadership'', ''Adoption of unconventional research methods'']'
  hobbies: '[''Experimental cooking and recipe development'', ''Visiting art galleries and street murals'', ''Nature and food photography'', ''Backyard gardening (herbs and seasonal vegetables)'', ''Listening
    to jazz, blues, and hip‑hop music'', ''Playing saxophone in community jam sessions'', ''Reading science‑fiction, literary fiction, and philosophy'', ''Yoga and mindfulness meditation'', ''Journaling
    for emotional regulation'', ''Mentoring youth in STEM programs'']'
  career_goals: Thedric aims to become a senior specialist in sustainable food safety and quality, leading interdisciplinary research that integrates emerging technologies like AI‑driven predictive analytics
    into agricultural practices. He plans to pursue a doctoral degree in food science or agronomy within the next five years to deepen his expertise and qualify for a university‑industry partnership role.
    Ultimately, he envisions directing a research lab that develops low‑impact, climate‑resilient food production methods while mentoring underrepresented youth in STEM. He also hopes to influence policy
    by contributing to state‑level food safety standards and to publish his work in peer‑reviewed journals.
