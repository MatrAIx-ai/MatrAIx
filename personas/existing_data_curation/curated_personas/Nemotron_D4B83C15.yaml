  career_goals: Garry aims to expand his influence beyond the classroom by leading the development of a cross‑departmental program that merges technology, humanities, and community engagement. He seeks
    tenure‑track stability that affords him academic freedom to pursue long‑term research on student resilience and self‑directed learning. In the next five years, he hopes to author a textbook on experiential
    pedagogy, secure external funding for a series of open‑access online courses, and spearhead faculty‑development workshops that promote flexible, curiosity‑driven teaching strategies while maintaining
    practical rigor.
