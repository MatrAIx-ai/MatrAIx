personas:
  professional: Yik Vo, an aspiring product engineer and UX designer, leverages self‑taught Python, web development, and Adobe skills to build user‑focused prototypes, and they thrive on a relaxed, curiosity‑driven
    approach that lets them bounce between AI concepts and practical hardware tinkering, even if their backlog of tasks sometimes drifts into disarray.
  sports: Yik Vo, a weekend hiker with the Pacific Crest Hiking Club, spends Saturday mornings trekking the Santa Monica Mountains, follows the LA Lakers passionately, and occasionally joins intramural
    beach volleyball games, balancing a love for low‑key outdoor fitness with occasional ticket‑purchasing for Dodgers games.
  arts: Yik Vo, a budding visual storyteller, captures Los Angeles street life through DSLR shots reminiscent of Wang Qingsong, edits short films inspired by the glitch aesthetic of Andy Stott, and unwinds
    with sci‑fi soundtracks from Vangelis while binge‑watching Studio Ghibli classics, letting these artistic influences shape their digital creations.
  travel: Yik Vo treasures spontaneous road trips, has roamed the neon‑lit night markets that echo Mid‑Autumn Festival celebrations, yearns to wander Tokyo’s Akihabara district for retro gaming loot, and
    frequently spends weekends driving to the sultry cliffs of Malibu or the star‑filled silence of Joshua Tree.
  culinary: Yik Vo, an experimental home chef, often whips up homemade jiaozi filled with pork and scallions, tosses spicy bibimbap with gochujang, kimchi, and sesame oil, while polishing their ramen broth
    with miso and cracked pepper, and they adore the crisp texture of fresh cilantro and the aromatic zing of toasted sesame seeds.
  core: Yik Vo combines a calm, laid‑back demeanor with a relentless curiosity for tech, turning late‑night gaming marathons into DIY electronics projects, while their habit of jotting ideas on napkins
    and occasional disorganization fuels a uniquely inventive life path.
background:
  cultural: Yik Kang is a second‑generation East Asian American, with parents who immigrated from Taiwan and maintain Mandarin as the home language. Growing up in Los Angeles, he has been immersed in a
    multicultural environment that blends traditional Chinese values—such as respect for elders, emphasis on education, and community responsibility—with the individualistic and entrepreneurial spirit of
    the United States. He participates in cultural celebrations like Lunar New Year and the Mid‑Autumn Festival, which reinforce his connection to his heritage, while also navigating the diverse social
    fabric of Southern California. This bicultural experience shapes his cooperative demeanor, his calm resilience, and his comfort balancing new ideas with established practices.
attributes:
