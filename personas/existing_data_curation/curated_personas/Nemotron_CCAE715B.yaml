  hobbies: '[''Playing strategy and simulation video games'', ''Hiking and urban photography'', ''Reading science‑fiction and tech non‑fiction'', ''Cooking traditional Chinese and Korean dishes'', ''DIY
    electronics projects (Arduino/Raspberry Pi)'', ''Video editing and short‑film creation'', ''Mindfulness meditation'']'
  career_goals: Yik Kang aims to pursue a Computer Science degree at a university in California, with the long‑term goal of becoming a product engineer or UX designer for interactive media. He is drawn
    to roles that let him merge curiosity about emerging technologies—such as AI, AR/VR, and game development—with practical delivery of user‑focused solutions. After gaining industry experience, he hopes
    to launch his own indie game studio or freelance consultancy that offers flexible, remote work and the freedom to explore innovative ideas on his own schedule. His ambition is balanced by a desire for
    stability, so he values positions that provide clear pathways for skill growth while allowing creative autonomy.
