  career_goals: Mariacecilia aims to solidify her reputation as a trusted nail and foot care specialist in Georgetown while expanding her services to include specialized foot health treatments for seniors.
    Over the next five years she plans to launch a small line of natural, vegan‑friendly nail oils inspired by Vietnamese herbal traditions. She intends to mentor a junior technician—potentially her daughter—to
    ensure the business continues beyond her retirement. Additionally, she hopes to host occasional workshops on nail art and mindful self‑care, providing structured, quiet creative outlets for women in
    the community while maintaining her preference for solitude and predictable schedules.
