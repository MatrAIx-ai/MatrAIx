personas:
  professional: A budding junior builder and storyteller, Bessie loves designing LEGO structures and drawing neighborhood scenes, and they channel their organized curiosity into small‑scale architectural
    projects for family play.
  sports: Bessie enjoys the community’s Little Meadow Soccer Club’s Sunday mini‑matches as a goalkeeper, and they also attend a beginner gymnastics class at the local recreation center to practice balance
    and flexibility.
  arts: Bessie spends hours coloring family portraits inspired by Eric Carle’s bold palettes, sings along to her favorite gospel lullaby "Precious Lord" during family gatherings, and they collect Disney
    stickers to embellish her art notebooks.
  travel: Bessie loves weekend trips to the nearby botanical garden to catalog leaves, dreams of visiting the National Aquarium in Baltimore, and they eagerly anticipate the annual family getaway to the
    beachfront town of Ocean City for sandcastle building.
  culinary: Bessie delights in making strawberry‑banana smoothies with fresh berries, prefers cheesy macaroni with a sprinkle of broccoli, and they insist on decorating cupcakes with frosting swirls and
    tiny sprinkles whenever she helps in the kitchen.
  core: Bessie is a quietly curious six‑year‑old who balances organized play with spontaneous nature hunts, and they maintain a steady temperament that lets them joyfully juggle LEGO building, sketching,
    and family melodies.
background:
  cultural: Bessie is raised in a tight-knit African-American family in Mansfield, Texas, where community, faith, and cultural traditions play an integral role. Her parents and extended relatives teach
    her the values of perseverance, respect, and celebration of Black heritage through stories, music, and participation in local church events. She experiences the richness of Southern hospitality, enjoys
    family gatherings that feature soul food and gospel music, and learns about African-American history during school and community programs. These cultural influences shape her sense of identity, her
    appreciation for collective responsibility, and her pride in her roots.
