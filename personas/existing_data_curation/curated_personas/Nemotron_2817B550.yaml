  career_goals: Bessie often talks about wanting to become a teacher who helps younger children discover the joy of reading, reflecting her love for learning and her practical desire to support others.
    She also imagines herself as a scientist, astronaut, or veterinarian, showing her blend of curiosity and compassion. While her ambitions are still playful, she consistently emphasizes roles that involve
    helping her community and using her organized, responsible nature.
