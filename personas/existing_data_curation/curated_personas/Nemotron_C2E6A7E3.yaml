  career_goals: Although retired from formal employment, Johnny is eager to channel his expertise into meaningful community roles. He aims to establish a volunteer STEM mentorship program at the local high
    school, offering hands‑on robotics and coding sessions. He also hopes to start a modest consulting service helping small businesses in Cherokee County adopt affordable tech solutions while maintaining
    a flexible schedule that respects his health. Additionally, Johnny plans to author a guidebook on affordable home maintenance for seniors and to serve on the county's senior advisory board to advocate
    for stress‑reduction resources and accessible community activities.
