personas:
  professional: A retired maintenance engineer named Johnny Lewis leverages his decades of troubleshooting expertise to spearhead a volunteer STEM mentorship program, offer low‑cost tech consulting to small
    Cherokee County businesses, and write a practical home‑maintenance guide for seniors, all while applying his organized yet flexible mindset and assertive yet cooperative leadership style.
  sports: A dedicated bowler named Johnny Lewis competes weekly in the Cherokee County men’s bowling league, follows the Atlanta Falcons, Atlanta Braves, and Atlanta Hawks avidly, participates in a local
    senior softball team, and incorporates daily walks through his community garden to stay fit.
  arts: A lifelong aficionado of soul and gospel music named Johnny Lewis fills his evenings with the sounds of Aretha Franklin, Marvin Gaye, Gregory Porter, and local gospel choirs, regularly attends performances
    at the Atlanta Symphony Hall, and devours documentary series by Ken Burns and PBS that explore American history.
  travel: A curious road‑tripper named Johnny Lewis prefers well‑planned trips that blend cultural festivals with family visits, having recently driven to New Orleans for the Jazz & Heritage Festival, explored
    Savannah’s historic district, and dreaming of a future pilgrimage to Ghana’s historic diaspora sites, all while staying within his modest retirement budget and balancing family constraints.
  culinary: A seasoned home‑cook named Johnny Lewis enjoys preparing collard greens with smoked turkey, sweet‑potato pie, and barbecue ribs glazed with a homemade apple‑cider‑vinegar sauce, often using
    fresh tomatoes from his garden and seasoning with garlic, paprika, and a pinch of cayenne, and occasionally treats himself to dinner at Atlanta’s acclaimed restaurant Staplehouse when budget allows.
  core: Johnny Lewis, a 66‑year‑old retired engineer with a knack for community STEM mentorship, a love for gospel music, a cautious yet occasionally indulgent financial streak, and a worry‑prone nature,
    blends practical know‑how with a vibrant social life and a habit of over‑planning that sometimes leaves him stressed.
background:
  cultural: Born in the Deep South during the early 1960s, Johnny grew up amid the civil‑rights movement, witnessing both the challenges and the triumphs of African‑American resilience. His upbringing was
    steeped in the traditions of the Black church, where gospel music, communal worship, and a strong sense of mutual aid shaped his values. Family gatherings centered around soul food and storytelling,
    reinforcing a deep respect for elders and a collective identity. Over the decades, Johnny has navigated the transition from segregation to a more integrated society, drawing on the perseverance of his
    generation to mentor younger community members. In Cherokee County, he maintains ties to the vibrant Black cultural scene of nearby Atlanta, attending festivals, supporting local Black‑owned businesses,
    and celebrating the rich heritage of African‑American cuisine, music, and oral history. These cultural influences inform his commitment to community service, his love for collaborative activities, and
    his desire to preserve and share African‑American traditions with future generations.
