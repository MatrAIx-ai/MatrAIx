persona_description: A researcher and scientist who specializes in atmospheric chemistry, atmospheric physics, and the study of greenhouse gases. They are interested in the atmospheric budget of methane,
  its sources and sinks, and its role in the global climate system. They are likely to be working on a living review paper that integrates top-down and bottom-up studies, inventories, and data-driven approaches
  to estimate methane emissions, and to synthesize and stimulate research on the methane cycle. They are also likely to be interested in the uncertainties and biases in the estimates of methane emissions,
  and in the potential implications of their findings for global climate change.
