personas:
  professional: Orestes Alberto is a budding handyman who blends solid carpentry and automotive maintenance skills with a budding HVAC apprenticeship ambition, channeling their reliable, attentive nature
    and balance of curiosity and practicality into meticulous home‑repair projects and client interactions.
  sports: Orestes Alberto enjoys occasional Saturday soccer matches with the local 'Parkside Strikers' league, roots for the LA Galaxy, and they stay fit through light weight‑training at home, balancing
    social play with a preference for small‑group activity.
  arts: Orestes Alberto nurtures their creative side by playing acoustic guitar to regional Mexican classics like José Alfredo Jiménez, savoring the melodic storytelling of artists such as Rodrigo y Gabriela,
    and winding down with classic films like 'Casablanca' and 'The Godfather,' which shape their reflective evenings.
  travel: Orestes Alberto favors modest road trips that blend nature and culture, having driven to Joshua Tree National Park and explored Los Angeles’ historic Olvera Street, while they dream of a future
    visit to Oaxaca’s culinary markets and the historic streets of Barcelona, all planned around a tight budget and family responsibilities.
  culinary: Orestes Alberto loves experimenting with Mexican‑American fusion in their kitchen, frequently cooking dishes such as carnitas tacos with fresh cilantro, tomatillo salsa, and avocado slices,
    alongside comfort foods like mac and cheese with chorizo, reflecting their practical yet adventurous palate.
  core: Orestes Alberto is a quietly curious handyman who juggles DIY projects, a sustainable garden, and classic film marathons while secretly hoarding vintage guitar picks and procrastinating on their
    GED.
background:
  cultural: Orestes was raised in a Mexican‑American household in Fresno’s Central Valley, where traditions from both Mexican heritage and California’s diverse culture shaped his identity. He grew up speaking
    Spanish at home, celebrating holidays such as Día de los Muertos and Las Posadas, and participating in Catholic rites, while also engaging with broader American customs through school and community
    events. This bicultural upbringing fosters his strong sense of family, community responsibility, and appreciation for both Mexican culinary roots and the local agricultural environment.
