  career_goals: Orestes aims to obtain his GED within the next year and enroll in a vocational apprenticeship program, preferably in HVAC or electrical work, to turn his practical abilities into certified
    expertise. He plans to launch a modest handyman service that can provide steady income for his family while allowing him to continue learning new techniques. Long‑term, he hopes to achieve financial
    stability, support his wife’s aspirations, and possibly mentor other young adults in his community who have similar educational backgrounds.
