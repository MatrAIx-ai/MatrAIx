persona_description: A geotechnical engineer who specializes in the study of geomaterials and their interactions with the ground. This person is likely to have a deep understanding of the mechanics and
  properties of common geomaterials, including their ability to support structures, resist deformation, and behave under various environmental conditions. They are also likely to be familiar with the engineering
  properties of common geomaterials and how they can be used to design and analyze geotechnical structures. Additionally, this person may have experience with the simulation of processes that occur on the
  microscopic scale using engineering properties of common geomaterials, such as contact mechanics for soil-structure interaction at large deformation.
