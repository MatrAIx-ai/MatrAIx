persona_description: A highly skilled and experienced occupational health researcher, with expertise in occupational cancer research and surveillance, particularly in Latin America and the Caribbean. They
  have a proven track record of collaborating with international partners, including the World Health Organization, Pan American Health Organization, and CAREX Canada, to develop and implement national
  CAREX projects aimed at estimating the burden of occupational cancer and promoting the prevention of occupational exposures. They have a deep understanding of the various occupational carcinogens present
  in different countries in the region, and are actively involved in developing models for estimating the global burden of disease and promoting the prevention of occupational cancer more broadly. They
  are also known for their contributions to the development of Canadian and international asbestos research, including the planning of a planned publication on asbestos in the Americas and the provision
  of scientific input on a large, multi-year study on the surveillance and projection of mesothelioma and lung cancer due to occupational asbestos exposure in Brazil.
