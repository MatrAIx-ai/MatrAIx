  career_goals: Alexa aims to transition from a front‑line supervisory role to an operations manager position within a cultural or creative organization, where she can blend her administrative acumen with
    her passion for the arts. In the next three to five years she plans to earn a certificate in nonprofit management and deepen her strategic planning skills. Her long‑term ambition is to become a director
    of operations for a contemporary art museum or a creative agency, driving innovative workflow practices, championing employee empowerment, and shaping programs that increase community engagement. She
    also envisions launching a boutique consulting service that helps small arts nonprofits streamline their administrative processes.
