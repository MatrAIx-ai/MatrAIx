  hobbies: '["Cooking traditional Mexican dishes", "Herb and vegetable gardening", "Reading historical fiction", "Attending church services", "Participating in cultural festivals", "Embroidery and quilting",
    "Walking in local parks", "Listening to mariachi music"]'
  career_goals: Although retired from formal employment, Maria aims to preserve and pass on her cultural legacy. She plans to compile a memoir of her family's journey from Mexico to Texas, create a series
    of workshops on traditional crafts and cooking at the local Mexican cultural center, and serve as a cultural liaison to help new immigrants adapt while maintaining their heritage. She also hopes to
    mentor grandchildren and community youths in humanities subjects, fostering an appreciation for history, literature, and the arts.
