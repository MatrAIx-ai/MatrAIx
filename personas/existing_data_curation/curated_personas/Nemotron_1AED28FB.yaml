personas:
  professional: Maria Bermudez is a retired arts and humanities scholar turned community cultural liaison, leveraging their bilingual fluency, organizational acumen, and reverence for tradition to orchestrate
    heritage festivals, carefully budget volunteer resources, and mentor younger generations, all within a comforting routine that balances structure with occasional improvisational flair.
  sports: Maria Bermudez enjoys gentle morning walks in the neighborhood park, participates in a senior softball league at the community center during spring, and avidly follows the Houston Astros in baseball
    season and the Houston Rockets in basketball, using the excitement of these teams to keep their fitness routine lively.
  arts: Maria Bermudez finds creative fulfillment in embroidery and quilting, often listening to mariachi groups such as Mariachi Vargas de Tecalitlán and the guitar stylings of Carlos Santana, while attending
    local art exhibits that showcase Frida Kahlo‑inspired works, allowing vibrant colors and rhythmic melodies to guide their textile designs.
  travel: Maria Bermudez prefers well‑planned, culturally immersive trips, often traveling with a small group to historic towns like San Miguel de Allende, the Yucatán Peninsula’s colonial ruins, and the
    artistic enclave of Santa Fe, balancing curiosity with a modest budget and a desire to sample local home‑cooked meals wherever they go.
  culinary: Maria Bermudez is a master of traditional dishes such as chicken enchiladas with mole sauce, hand‑made pork‑and‑chili tamales, and pozole rojo seasoned with dried guajillo chilies and epazote,
    delighting in harvesting fresh corn, ripe tomatillos, and fragrant herbs from their garden to infuse every family meal with authentic flavor.
  core: Maria Bermudez embodies a steadfast devotion to routine, cultural heritage, and community service, gently coaxing tradition into modern life while occasionally indulging in spontaneous extra sweets
    and letting a few garden herbs wilt from occasional forgetfulness.
background:
  cultural: Maria was born in Puebla, Mexico, and moved to Texas in her early twenties after marrying her husband, who was also from a Mexican-American family. She grew up in a devout Catholic household,
    where celebrations of Mexican holidays and family gatherings were central. Maintaining strong ties to her roots, she speaks Spanish at home, keeps traditional recipes, and actively participates in the
    Mexican-American community in Fort Worth, championing cultural events, language preservation, and intergenerational bonding.
attributes:
  skills: '["Bilingual Spanish-English communication", "Community event planning and coordination", "Traditional Mexican cooking", "Handcrafted textile embroidery and quilting", "Genealogical research",
