personas:
  professional: An aspiring architect named Dipali Giang, who at two already builds towering block structures with meticulous order yet sprinkles in whimsical twists, they demonstrate a blend of organization
    and creative flexibility that hints at a future career designing imaginative, child-friendly spaces.
  sports: Dipali Giang delights in toddling through backyard obstacle courses, participates in a weekly toddler gymnastics class at the Little Sprouts Club, cheers loudly for the local professional basketball
    team the City Hawks during family game nights, and prefers the company of a small group of playmates over large playground crowds.
  arts: Dipali Giang is captivated by the vivid illustrations of Eric Carle's 'The Very Hungry Caterpillar' and frequently hums along to the cheerful tunes of The Wiggles, while occasionally attempting
    to draw their own stick-figure animals in crayon, illustrating a budding appreciation for visual art and music.
  travel: Dipali Giang has visited the nearby coastal beach with sandy dunes, explored the city zoo's monkey enclosure, taken a weekend trip to a grandparents' farm in the countryside, and dreams of someday
    seeing the Eiffel Tower in Paris, favoring short, family-oriented excursions that blend gentle discovery with familiar comforts.
  culinary: Dipali Giang loves the sweet taste of banana pancakes drizzled with honey, enjoys crunchy carrot sticks with hummus, can butter toast with surprising precision, and eagerly requests strawberry
    slices at dinner, reflecting a growing palate that appreciates simple, colorful, and mildly sweet foods.
  core: Curious yet reserved, Dipali Giang balances meticulous block-building with spontaneous doodles, saves pennies in a piggy bank, manages eczema with a mix of diligence and occasional forgetfulness,
    and thrives in intimate playgroups while daydreaming about distant landmarks.
background:
  cultural: Dipali comes from a South Asian (likely Indian) family that blends traditional customs with life in Marietta, GA. At home, she hears both English and her family's heritage language (e.g., Hindi
    or Gujarati) and participates in celebrations such as Diwali, Holi, and Raksha Bandhan, where she enjoys bright decorations, sweets, and music. Family meals feature staples like roti, rice, dal, and
    samosas, and stories about ancestors are shared during gatherings. While immersed in these cultural practices, Dipali also experiences Southern U.S. community events, local parks, and the multicultural
    environment of Cobb County, shaping a hybrid identity that values harmony, respect for elders, and openness to new ideas.
attributes:
  skills: '[''~200‑word vocabulary'', ''following simple two‑step instructions'', ''color and shape recognition'', ''fine‑motor control for crayons and blocks'', ''basic self‑care (hand‑washing, spoon use)'',
    ''simple puzzle solving'', ''early rhythmic movement and dancing'']'
  hobbies: '[''scribbling and coloring with crayons'', ''singing nursery rhymes and Indian lullabies'', ''building towers with wooden blocks'', ''sandbox and playground exploration'', ''listening to picture
    books'', ''dancing to simple rhythms'']'
  career_goals: When asked about the future, Dipali delights in saying she wants to "make pictures for people" and "help friends when they feel sad." Her emerging ambition blends her love of art with a
    caring nature, pointing toward dreams of becoming a kind‑hearted artist, a future teacher who encourages creativity, or a gentle caregiver who supports others’ well‑being.
