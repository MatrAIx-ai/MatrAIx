  hobbies: '[''Woodworking'', ''Model Train Building'', ''Hiking'', ''Fishing'', ''Chess'', ''Reading Historical Non-Fiction'', ''Homebrewing'', ''Cooking'', ''Volunteer STEM Mentor'']'
  career_goals: Charles seeks to advance into senior leadership, aiming for roles such as Director of Operations or Chief Operating Officer within a mid-size manufacturing or technology firm. He wants to
    champion digital transformation initiatives, embed a culture of continuous improvement, and mentor the next generation of operations professionals. Long-term, he envisions establishing his own consultancy
    focused on operational excellence for small and medium enterprises.
