personas:
  professional: Alece Langelier is an emerging digital communications enthusiast who leverages their solid grasp of Canva design, beginner-level Adobe editing, and strong written communication to craft
    compelling social media campaigns for campus clubs while balancing meticulous planning with the flexibility to pivot when last-minute event changes arise.
  sports: Alece Langelier enjoys the outdoors, regularly joining the Indiana Trailblazers hiking club for weekend walks in Brown County, follows the Indianapolis Colts in the fall, the Indiana Pacers during
    winter, participates in a local 5K charity run each spring, and keeps a casual membership at a community gym for strength training.
  arts: Alece Langelier cultivates a vibrant artistic life, reading contemporary fiction by Celeste Ng and non-fiction by Malcolm Gladwell, playing acoustic renditions of Joni Mitchell songs on a worn-in
    guitar, snapping candid shots inspired by Annie Leibovitz at campus events, and attending local theater productions featuring actors like Andrew Garfield.
  travel: Alece Langelier favors purposeful travel, planning low-budget road trips to national parks such as the Badlands and Great Smoky Mountains, dreaming of a language-immersion visit to Paris to practice
    conversational French, and enjoys weekend getaways to nearby lake cabins for reflective hiking and photography.
  culinary: Alece Langelier is an enthusiastic home cook who experiments with rustic dishes like rosemary-infused focaccia, caramelized apple tarte tatin, and vegan lentil shepherd's pie, often sourcing
    fresh herbs from a local farmers market and perfecting the crust of homemade sourdough bread.
  core: Alece Langelier blends curiosity with practicality, juggling a love for digital storytelling, hiking, and French language study while occasionally over-budgeting on craft projects and navigating
    mild allergies with a mindful, adaptable approach to life.
background:
  cultural: Alece was raised in Findlay, Ohio, a tight‑knit Midwestern community where family ties, modesty, and a strong work ethic are emphasized. Her surname reflects French‑Canadian ancestry, and she
    grew up hearing stories of her grandparents' migration from Quebec, which has given her a modest appreciation for French language and traditions. The cultural fabric of her upbringing includes participation
    in local church activities, community volunteerism, and annual town events such as the Hancock County Fair. While she identifies as white American, she values the blend of Midwestern values—practicality,
    friendliness, and community spirit—combined with a subtle appreciation for her French‑Canadian heritage.
