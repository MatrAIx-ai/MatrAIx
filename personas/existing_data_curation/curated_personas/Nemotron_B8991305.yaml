  career_goals: Alece aims to earn a bachelor’s degree in Communications or Business Administration, leveraging her curiosity for emerging media trends and her practical mindset to help small businesses
    and community organizations improve their online presence. In the short term, she plans to secure internships in digital marketing or public relations while continuing to volunteer in local event planning
    to sharpen her coordination skills. Her long‑term ambition is to become a digital marketing strategist, eventually launching her own boutique agency focused on sustainable, community‑driven branding
    for Midwestern enterprises.
