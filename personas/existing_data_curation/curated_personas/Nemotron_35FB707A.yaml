  career_goals: Alberto aims to advance into senior operations leadership where he can shape strategic process improvements while championing a people-centric culture. In the next two years, he plans to
    earn an MBA with a focus on operations management and achieve Six Sigma Black Belt certification, strengthening his credibility for higher-impact initiatives. Long-term, he envisions leading an operations
    department or founding a consultancy that assists emerging Hispanic-owned businesses in streamlining their processes and building resilient, employee-friendly workflows. He is also passionate about
    integrating mental-health resources into corporate practices, leveraging his own experiences with anxiety to design supportive programs that reduce distress and promote well-being among team members.
