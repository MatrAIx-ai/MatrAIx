personas:
  professional: Jessica Larrea, a dental and ocular laboratory technician, merges meticulous craftsmanship in prosthetic devices and ophthalmic lenses with an artist’s eye, using their curiosity and compassion
    to experiment with unconventional designs while navigating a relaxed, occasionally disorganized workflow that still meets tight deadlines.
  sports: Jessica Larrea enjoys low‑impact fitness, attending a weekend yoga class at the community studio and jogging along the local river trail in the spring, while cheering for the Phoenix Suns (NBA)
    and the Arizona Diamondbacks (MLB) on game days, and she also joins a casual adult softball league during the summer to stay active and feed her love of teamwork.
  arts: Jessica Larrea immerses herself in visual creation—painting watercolors inspired by the vibrant patterns of Frida Kahlo’s murals, sketching cityscapes in the style of Edward Hopper, shaping pottery
    reminiscent of Alphonse Mucha’s organic lines, and photographing sunrise reflections with a Nikon D5600—all of which feed her curiosity and open‑mindedness while providing a therapeutic escape from
    professional pressures.
  travel: Jessica Larrea prefers spur‑of‑the‑moment trips that blend artistic inspiration with culinary discovery, having wandered the colorful streets of Oaxaca to study traditional tile work, strolled
    through Kyoto’s historic temples to capture minimalist garden photography, and later roamed Barcelona’s modernist architecture, all while deliberately avoiding rigid itineraries and leaving room for
    spontaneous cooking workshops with local families.
  culinary: Jessica Larrea is a confident home chef who masterfully prepares authentic mole poblano, hand‑rolled tamales with masa and roasted chilies, and bright ceviche with fresh lime and cilantro, often
    layering flavors with epazote and ancho chilies, yet she sometimes over‑season a dish in her eagerness to experiment, leading to a beloved (if slightly fiery) family dinner ritual that doubles as a
    social gathering.
  core: Jessica Larrea is a creatively restless dental‑lab artisan who balances meticulous precision with a habit of procrastinating on paperwork, constantly weaving art into science while worrying about
    every detail and finding calm only in a splash of watercolor or a stretch of yoga.
background:
  cultural: Jessica is a first‑generation Mexican American whose parents immigrated to the United States in the 1970s. She grew up speaking Spanish at home and celebrating Mexican traditions such as Día
    de los Muertos, Cinco de Mayo, and the annual posada during Christmas. The vibrant colors and folklore of Mexican culture influence her artistic taste and her approach to design in the lab. She maintains
    close ties to her extended family in Illinois and frequently participates in community events at the local Hispanic cultural center. Her cultural values of family unity, mutual respect, and community
    service inform her compassionate work ethic and her desire to give back through volunteer health outreach.
attributes:
  skills: '[''Dental prosthetic fabrication'', ''Ophthalmic lens grinding'', ''Material selection and testing'', ''Hand-eye coordination'', ''CAD/CAM software operation'', ''Quality assurance and inspection'',
    ''Patient and provider communication'', ''Team collaboration'', ''Creative aesthetic design'', ''Problem solving under pressure'']'
  hobbies: '[''Watercolor painting'', ''Sketching'', ''Pottery'', ''Cooking Mexican cuisine'', ''Gardening'', ''Reading art and design books'', ''Yoga and mindfulness meditation'', ''Volunteering at community
    health fairs'', ''Photography of nature and architecture'', ''Listening to traditional Mexican music'']'
  career_goals: Jessica aims to deepen her technical expertise by completing a GED and enrolling in a community college program focused on digital dentistry and ocular device design. She hopes to gain certification
    in 3D printing for prosthetic applications, eventually leading a small lab team that blends technical precision with artistic flair. She aspires to mentor new technicians, especially those from underrepresented
    backgrounds, and to cultivate a work environment that prioritizes harmony and employee well‑being. Balancing her ambition with her need for flexibility, she envisions a schedule that allows her to continue
    volunteering at community health clinics and spending time with her family.
