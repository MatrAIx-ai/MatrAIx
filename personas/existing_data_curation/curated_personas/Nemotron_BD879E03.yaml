  career_goals: Even at his age, Joseph dreams of growing up to be a firefighter because he admires the clear structure, teamwork, and the chance to help people in need. He also talks about wanting to be
    a teacher one day, inspired by his love for storytime and his desire to guide friends through learning activities.
