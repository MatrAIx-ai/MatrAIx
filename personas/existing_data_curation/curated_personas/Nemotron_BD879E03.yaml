personas:
  professional: A budding builder who loves arranging LEGO bricks into tidy cityscapes, Joseph Colon often pretends to be a junior architect, using structured play to explore the immediate realities of
    cause-and-effect while occasionally improvising new designs when a piece doesn’t fit, demonstrating a balance of organization and flexibility.
  sports: An energetic member of the Neighborhood Sprouts soccer club, Joseph Colon loves the structured drills of the Tuesday practice, cheers loudly for the Chicago Cubs during family TV nights, and enjoys
    the occasional swing at the local batting cages where they practice their technique with a mini‑bat.
  arts: A colorful fan of animated storytelling, Joseph Colon spends afternoons drawing characters from "Paw Patrol" and sings along to The Wiggles, often staging mini‑performances for stuffed audience
    members and proudly displaying a hand‑drawn poster of their favorite cartoon on the bedroom wall.
  travel: A curious little explorer, Joseph Colon’s most treasured family trips include a weekend at Disney World where they rode the "It’s a Small World" boat and a summer visit to the Grand Canyon where
    they marveled at the vastness and collected a smooth pebble, preferring guided tours over spontaneous wanderings.
  culinary: A picky eater with a soft spot for cheesy macaroni, Joseph Colon can whip up a pretend meal in their toy kitchen, loves the bright orange slices of carrots, occasionally sneaks a bite of honey‑glazed
    chicken nuggets when no one’s looking, and refuses broccoli unless it’s cut into tiny dinosaur shapes.
  core: Joseph Colon is a structured yet imaginative four‑year‑old who balances tidy routines with spontaneous bursts of creativity, often insisting on color‑coded crayons while daydreaming about building
    towering LEGO castles.
background:
  cultural: Joseph is raised in a Colombian‑American household in Forest Hills, Queens. At home, Spanish is spoken alongside English, and he grows up hearing Colombian lullabies, vallenato, and cumbia music.
    Family gatherings often feature traditional foods such as arepas, empanadas, and arroz con pollo, and celebrations of Colombian holidays—like Carnaval de Barranquilla and Día de la Independencia—are
    infused with stories from his parents' homeland. Living in a diverse New York neighborhood, Joseph also enjoys the multicultural environment, blending his Colombian roots with the vibrant city life
    around him.
