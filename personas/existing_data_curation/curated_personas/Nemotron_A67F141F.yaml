personas:
  professional: Marc Williams, a 17‑year‑old aspiring automotive technician, blends the strategic planning of Civilization with hands‑on garage experience to methodically troubleshoot engines, assemble
    computer hardware, and lead small project teams, positioning them for ASE certification and a future independent repair shop.
  sports: Marc Williams, a staunch supporter of the Notre Dame Fighting Irish football team, regularly attends high‑school football games and follows the Chicago Cubs, while playing in a local weekend RC‑car
    racing club that doubles as a casual fitness meetup.
  arts: Marc Williams finds creative release listening to classic rock legends like Led Zeppelin and The Rolling Stones, sketching mechanical designs during downtime, and occasionally curating a small YouTube
    channel showcasing DIY RC‑car builds set to a soundtrack of AC DC and Pink Floyd.
  travel: Marc Williams prefers carefully plotted road trips, having driven to the Indianapolis Motor Speedway and the Detroit Auto Show, and dreams of an overseas engineering pilgrimage to Germany’s Nürburgring
    and Japan’s Tsukuba Circuit, balancing budget constraints with a love for automotive culture.
  culinary: Marc Williams enjoys cooking to the same precise standards as their car repairs, regularly whipping up classic cheeseburgers with smoked cheddar, pepperoni pizza loaded with fresh basil, and
    hearty macaroni‑and‑cheese, while experimenting with DIY snack mixes of pretzel sticks, jalapeño chips, and seasoned peanuts for gaming marathons.
  core: Marc Williams is a structure‑obsessed teen who channels strategic gaming, garage tinkering, and classic rock into a disciplined path toward automotive mastery, all while juggling disciplined savings,
    mild health quirks, and a love for sports and road‑trip adventures.
background:
  cultural: Marc grew up in South Bend, Indiana, a Midwestern city with a strong blue‑collar heritage and close ties to the University of Notre Dame. His upbringing reflects typical Midwestern values of
    hard work, modesty, community involvement, and respect for tradition. Coming from a primarily white, middle‑class neighborhood, he was exposed to local customs such as seasonal community fairs, church
    gatherings (often Catholic or Protestant), and a deep enthusiasm for regional sports, particularly college football. The practical, orderly environment of his hometown has shaped his preference for
    structure and his pragmatic outlook on life.
attributes:
  skills: '[''Mechanical troubleshooting'', ''Basic automotive repair'', ''Computer hardware assembly and maintenance'', ''Software troubleshooting'', ''Time management'', ''Organizational skills'', ''Strategic
    thinking'', ''Team communication'']'
  hobbies: '[''Playing tactical video games (e.g., Civilization, Rocket League)'', ''Car maintenance and automotive tinkering'', ''Building and customizing RC cars'', ''Attending high‑school and college
    sports events'', ''Reading DIY and technical manuals'', ''Listening to classic rock music'', ''Sketching mechanical designs'']'
  career_goals: Marc plans to complete his GED within a year, then enroll in a community‑college automotive technology program or pursue industry‑recognized IT certifications such as CompTIA A+. His primary
    career ambition is to become a Certified Automotive Service Technician (ASE) and eventually run his own independent garage offering reliable, community‑focused repairs. As a secondary aim, he considers
    working in computer support or help‑desk roles, valuing clear career ladders, hands‑on problem solving, and stable income.
