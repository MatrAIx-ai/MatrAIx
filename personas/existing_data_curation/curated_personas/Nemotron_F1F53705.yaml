personas:
  professional: Kenneth Jordan, a retired small‑business owner turned community mentor, blends his hands‑on carpentry, boat repair, and Cape Cod historical knowledge into a practical, curiosity‑driven volunteer
    role where they guide DIY homeowners while chronicling maritime stories on a blog.
  sports: Kenneth Jordan spends Saturday mornings sailing out of Osterville harbor, afternoons on the links with the Hyannis Golf Club where they fiercely chase a low handicap, and evenings cheering the
    Boston Red Sox, all while keeping a casual, competitive edge to their fitness routine.
  arts: Kenneth Jordan captures Cape Cod’s shoreline through a DSLR, channeling the moody light of Winslow Homer’s seascapes, while they unwind with the folk ballads of Bob Dylan and the nautical memoirs
    of Captain Charles Bishop.
  travel: Kenneth Jordan favors coastal getaways, having already charted trips to Martha’s Vineyard, the historic lighthouses of Nova Scotia, and a dream cruise through the Greek Cyclades, balancing a modest
    travel budget with a penchant for sailing adventures and occasional family visits.
  culinary: Kenneth Jordan enjoys cooking fresh Atlantic lobster rolls, New England clam chowder, and grilled swordfish brushed with garden‑harvested thyme and dill, although they sometimes over‑salt the
    broth, reflecting their love of bold coastal flavors tempered by a modest home‑cooking skill set.
  core: Kenneth Jordan is a pragmatic, curiosity‑driven retiree who swaps a disorganized schedule for spontaneous boat repairs, competitive golf rounds, and a lifelong habit of documenting Cape Cod’s maritime
    heritage.
background:
  cultural: Kenneth is a lifelong New Englander of Anglo‑Irish descent, raised in a small coastal town in Massachusetts. His upbringing was steeped in the maritime culture of Cape Cod, with strong community
    values, self‑reliance, and a modest, practical outlook. He and his wife have deep roots in Osterville, where they are active in local events, seasonal festivals, and the town’s historical preservation
    efforts.
