  career_goals: Now retired from the workforce, Kenneth’s ambition is to stay engaged and useful in his community while maintaining flexibility. He plans to volunteer as a mentor for younger homeowners
    on DIY repairs, document and share Cape Cod maritime history through a blog and occasional talks, and help launch a neighborhood community garden. He also hopes to write a memoir of his life on the
    Cape, stay physically active through sailing and golf, and support his wife’s charitable projects.
