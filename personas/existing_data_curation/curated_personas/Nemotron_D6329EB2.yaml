personas:
  professional: Detra Minton is a protective services officer in San Francisco who leverages their education background and certification in first aid to lead community safety workshops, employing evidence‑based
    conflict‑resolution techniques while balancing curiosity for emerging safety tech with a methodical, reliable work style, and they consistently apply disciplined planning to ensure thorough incident
    reporting.
  sports: Detra Minton avidly plays in a co‑ed ultimate Frisbee league, commutes by bike with the Team Marin Cyclists group, hikes the Marin Headlands on weekends, roots for the San Francisco 49ers and
    Golden State Warriors, quietly follows the San Jose Earthquakes during the MLS season, and they treat each workout as a chance to balance energy with disciplined conditioning.
  arts: Detra Minton enjoys attending live shows at The Fillmore featuring artists like Haim, Janelle Monáe, and The Teskey Brothers, participates in improv workshops with the Second City San Francisco
    troupe, and finds inspiration in the vibrant murals of the Mission District, which influence their occasional sketching and storytelling, and they often attribute the creative boost to these community
    experiences.
  travel: Detra Minton prefers weekend road trips to coastal towns like Mendocino and Big Sur, has a bucket list that includes hiking in Iceland’s Reykjavik and exploring the vibrant food scene of Portland,
    and they balance meticulous itinerary planning with spontaneous detours after consulting travel forums and friends.
  culinary: Detra Minton experiments with fusion dishes such as miso‑glazed salmon tacos and avocado‑radish toast on sourdough, adeptly balances moderate cooking skills with bold flavor combos, and they
    seek out farmers market finds like Dungeness crab, heirloom tomatoes, and fresh herbs for their weekend dinner parties.
  core: Detra Minton blends community‑oriented pragmatism with an adventurous spirit, juggling rigorous safety work, spontaneous music outings, and a habit of over‑packing for trips while never missing
    a yoga class, and they often credit their productivity to an internal clock that runs on both discipline and curiosity.
background:
  cultural: Detra comes from a white, middle‑class family with deep roots in the Pacific Northwest and the Bay Area. Her grandparents emigrated from Ireland and Germany in the mid‑20th century, bringing
    a strong emphasis on education, community service, and self‑reliance. Raised in a suburban neighborhood of San Francisco County, she grew up in a multicultural environment that exposed her to a wide
    array of cultures, languages, and social perspectives. This upbringing fostered an appreciation for diversity and a commitment to inclusive public service. While her cultural heritage emphasizes modesty,
    hard work, and civic responsibility, Detra also embraces the progressive, open‑minded ethos of San Francisco, integrating both traditions into her personal values and professional approach.
attributes:
  skills: '["Conflict resolution and de-escalation", "First aid, CPR, and basic trauma care", "Risk assessment and threat analysis", "Incident report writing", "Public speaking and safety workshop facilitation",
    "Community outreach and youth mentorship", "Physical fitness and self-defense techniques", "Emergency response planning", "Safety protocol development", "Data-driven safety audits"]'
  hobbies: '["Hiking coastal trails in the Marin Headlands", "Urban cycling along the Embarcadero", "Playing ultimate Frisbee in local leagues", "Attending live music concerts", "Volunteering as a tutor
    in after-school programs", "Experimenting with fusion cooking", "Yoga and meditation practice", "Participating in improvisational theater", "Reading true-crime and psychology books", "Learning basic
    self-defense techniques"]'
  career_goals: Detra aims to advance within the protective services field while leveraging her education background to bridge the gap between public safety and community education. In the next three to
    five years she plans to complete a certification in crisis management and pursue a master's degree in public administration or criminal justice. Her goal is to become a senior safety coordinator or
    community liaison officer for the City of San Francisco, where she can design and implement preventive safety programs for schools and neighborhoods. She is also interested in leading a specialized
    team focused on youth violence prevention, integrating teaching strategies with protective service protocols. Ultimately, Detra envisions a leadership role that influences policy, mentors new officers,
    and promotes a culture of proactive, inclusive safety.
