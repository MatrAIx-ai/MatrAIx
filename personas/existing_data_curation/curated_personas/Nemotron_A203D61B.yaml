personas:
  professional: Eric Palmer is an aspiring junior architect who channels their love for building LEGO sets and designing Minecraft structures into early sketching projects, using a practical, organized
    mindset and strong teamwork skills to lead school group assignments while their talkative confidence makes them comfortable presenting ideas, though they sometimes worry about meeting perfection.
  sports: Eric Palmer plays weekend basketball at the local park, is a dedicated member of the YMCA youth basketball league, supports the nearby NBA team the Chicago Bulls, and uses structured warm‑up routines
    to channel their energetic sociability while occasionally skipping practice when school stress weighs them down.
  arts: Eric Palmer thrives in the school drama club, performs hip‑hop‑inspired dance routines from online tutorials, devours graphic novels like Amulet and Bone, and listens to artists such as Kendrick
    Lamar, Drake, and Beyoncé, blending their love for storytelling with a vibrant, talkative stage presence that often draws applause.
  travel: Eric Palmer enjoys family road trips to destinations like Yellowstone National Park, the beaches of San Diego, and the museums of Washington D.C., preferring itineraries that mix adventure hikes
    with scheduled stops for local festivals, yet they rely heavily on their parents for budgeting and often request a final souvenir to remember each journey.
  culinary: Eric Palmer favors pizza with pepperoni and mozzarella, mac and cheese, and homemade sushi rolls, can confidently make a grilled cheese and banana smoothie under YouTube guidance, and delights
    in experimenting with fresh basil and soy sauce, though they sometimes forget to clean up the kitchen afterwards.
  core: Eric Palmer is a socially energetic, structure‑loving pre‑teen who balances creative building and performance with occasional worry‑driven splurges and a habit of forgetting small chores.
background:
  cultural: Eric is an African-American boy raised in Houston's vibrant, multicultural environment. His family's roots in the city stretch back generations, with strong ties to local churches, community
    centers, and neighborhood traditions. He celebrates cultural milestones such as Juneteenth and participates in church choirs and youth groups that emphasize service and fellowship. Family meals often
    feature Southern-inspired dishes, and storytelling sessions with grandparents keep him connected to his heritage. Growing up near the Houston Rockets and the Johnson Space Center, he's exposed to a
    mix of sports enthusiasm and scientific curiosity, shaping his outlook and interests.
attributes:
  skills: '["Group facilitation", "Public speaking", "Basic Scratch programming", "LEGO construction", "Organizational planning", "Conflict mediation", "Basketball fundamentals"]'
