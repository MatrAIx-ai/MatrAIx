  career_goals: Eric aspires to a future where he can combine his love for structure, helping others, and being in the spotlight. He dreams of becoming a teacher or community mentor who can organize engaging
    learning experiences for younger children. He also imagines roles such as a youth sports coach or a junior engineer, where he can design projects and guide teams. Ultimately, he wants a career that
    lets him create order, support his community, and inspire peers.
