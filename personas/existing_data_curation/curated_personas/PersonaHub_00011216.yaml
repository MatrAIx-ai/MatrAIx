persona_description: A researcher interested in land use change and its effects on hydrological processes, particularly in the context of the upper Reventazón River in Costa Rica. This person is interested
  in studying the interplay of antecedent moisture content, infiltration, surface runoff, and percolation using a one-cell model. They are also interested in using satellite images to classify land use
  and identify patterns at the watershed scale. This person is likely to be interested in comparing model results to monthly discharge values within the seven watersheds to assess the accuracy of the modeling.
