personas:
  professional: Diane Kelly is an educational leader who blends data‑driven curriculum design with a collaborative, arts‑appreciating mindset, leveraging grant‑writing acumen and strategic planning to steer
    early‑childhood STEAM programs while balancing meticulous budget oversight with the flexibility to innovate on the fly; they inspire staff with calm confidence that keeps the team focused amid tight
    deadlines.
  sports: Diane Kelly roots for the Alabama Crimson Tide football team, follows the Atlanta Hawks in the NBA, participates in the local YMCA adult tennis league each spring, and joins a community running
    club for weekend 5K races, balancing team spirit with personal fitness goals, and they keep a steady routine of stretching before each match.
  arts: Diane Kelly immerses themselves in the arts by attending exhibitions featuring Olafur Eliasson, enjoying live performances of Lin‑Manuel Miranda’s Broadway hits, listening to Jason Isbell’s Americana
    concerts, and bringing their family to community theater productions of contemporary dramas, all of which fuel their curiosity and inspire the maker‑space curriculum they lead.
  travel: Diane Kelly plans mixed‑mode trips that blend structured itineraries for family visits to Charleston and Asheville with spontaneous weekend getaways to New Orleans, and they dream of an extended
    cultural tour of Barcelona and Kyoto, balancing a modest travel budget with a desire for authentic, arts‑rich experiences.
  culinary: Diane Kelly is a confident home cook who transforms locally sourced heirloom tomatoes, fresh okra, and sweet potatoes into Southern staples like shrimp and grits, collard greens, and buttermilk
    biscuits, while also experimenting with global flavors such as Korean gochujang‑marinated chicken, and they often host family dinner parties to showcase the dishes they create.
  core: Diane Kelly is a curiosity‑driven educational leader who balances meticulous planning with spontaneous creativity, championing STEAM innovation while navigating family life, community involvement,
    and a love for Southern cuisine and the arts, and they inspire others through their energetic presence.
background:
  cultural: Diane grew up in a middle‑class white family in the American South, where values of hospitality, community involvement, and a strong work ethic were emphasized. Her upbringing in Alabama exposed
    her to Southern traditions such as church fellowship, local festivals, and a deep appreciation for regional cuisine. Her parents encouraged academic achievement, especially in the sciences, which guided
    her toward a STEM graduate education. This blend of Southern cultural roots and a passion for education informs her collaborative leadership style and her commitment to enriching her community through
    innovative learning experiences.
attributes:
  skills: '[''Educational Leadership'', ''Curriculum Development'', ''Data Analysis'', ''Budget Management'', ''Grant Writing'', ''Regulatory Compliance'', ''Staff Coaching'', ''Conflict Resolution'', ''Community
