  hobbies: '[''Visiting Art Galleries'', ''Live Music and Theater'', ''Reading Contemporary Fiction'', ''Science Journalism'', ''Book Club Participation'', ''Community Gardening'', ''Southern Cooking'',
    ''Leading a Kids Makerspace'', ''Robotics and Coding Workshops'']'
  career_goals: Diane aims to advance to a district-level director role where she can champion innovative STEAM initiatives across multiple schools. She plans to earn a doctorate in Educational Leadership
    to deepen her expertise and to position herself as a thought leader in early childhood education reform. Long‑term, she aspires to establish a non‑profit focused on providing under‑served Alabama communities
    with hands‑on STEM enrichment programs and maker‑spaces for young learners.
