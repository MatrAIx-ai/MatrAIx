  career_goals: Annabel aims to secure a full‑time role that blends her love of helping others with a stable, routine‑based environment. In the short term she seeks an entry‑level position such as a front‑desk
    administrator at a health‑care facility or a community‑outreach assistant for a local non‑profit. Over the next three years she plans to obtain a Certified Nursing Assistant (CNA) credential, allowing
    her to transition into a hybrid role that includes both administrative duties and direct client support. Her long‑term ambition is to become a community‑services coordinator, where she can design and
    manage programs that promote well‑being and harmony in her neighborhood.
