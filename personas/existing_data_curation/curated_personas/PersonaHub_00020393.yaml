persona_description: A microbiologist who specializes in the study of bacteriology and the transmission of diseases, particularly the Black Death. She has a deep understanding of the evolution and transformation
  of Yersinia pseudotuberculosis into Yersinia pestis, and how minor changes in RNA molecules played a crucial role in the transformation of the bacterium into the ultimate killer. She is highly interested
  in the molecular mechanisms of disease transmission and the development of new diagnostic tools for infectious diseases.
