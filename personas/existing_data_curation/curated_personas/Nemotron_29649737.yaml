personas:
  professional: Matthew Caraway is a veteran operations manager who blends a curiosity‑driven practicality with a competitive edge to streamline supply‑chain logistics, optimize budgeting and staff scheduling,
    negotiate vendors, and implement automated inventory and analytics tools, all while maintaining a relaxed, sometimes disorganized workflow that prioritizes flexibility over rigid planning.
  sports: Matthew Caraway hikes the desert trails of Red Rock Canyon with the Red Rock Hiking Club in spring, plays nine‑hole golf at the Canyon Club senior league where he strives to shave strokes from
    his swing, and follows the Las Vegas Raiders and Vegas Golden Knights, occasionally joining a low‑impact community walking group for winter cardio.
  arts: Matthew Caraway enjoys immersing himself in historical nonfiction by David McCullough and Ken Burns documentaries, appreciates the kinetic artistry of classic Chevrolet designs, finds solace in
    the blues of B.B. King and the guitar work of Ry Cooder, and admires the woodworking elegance of Sam Maloof.
  travel: Matthew Caraway prefers low‑key, meticulously planned road trips that balance scenic desert drives with comfortable stops, having driven to the Grand Canyon, explored Sedona’s red rocks, toured
    Stuttgart’s Mercedes‑Benz Museum, and camped by Lake Tahoe, while dreaming of a quiet wine‑country retreat in Napa Valley.
  culinary: Matthew Caraway favors hearty, smoky fare—regularly grilling ribeye steak seasoned with rosemary and smoked paprika, simmering a signature Arizona‑style green chile stew with fresh jalapeños
    and cilantro, and baking apple pie with locally sourced honey and cinnamon—though he sometimes overcooks when distracted by unfinished woodworking projects.
  core: Matthew Caraway is a 62‑year‑old operations veteran who channels his competitive drive into process‑improvement and classic‑car restoration while battling anxiety that spikes during high‑stakes
    poker nights and wrestling with a habit of forgetting appointments.
background:
  cultural: Matthew is a White American who grew up in a small Midwestern town where hard work and self‑reliance were core values. After completing high school, he moved to Nevada, where the hospitality
    and gaming industry shaped his professional outlook, blending a pragmatic work ethic with an openness to the diverse cultural fabric of Las Vegas. His marriage and long‑term residency in Clark County
    have anchored him in a community that values loyalty, independence, and a balanced mix of traditional American customs and the multicultural influences of the city.
