    & Mentorship'']'
  hobbies: '[''Reading (History & Business)'', ''Hiking'', ''Golf'', ''Classic Car Restoration'', ''Woodworking'', ''Poker (Small Group)'', ''Volunteer Cooking'']'
  career_goals: Before retiring, Matthew aims to cement a lasting legacy by leading a comprehensive process‑improvement initiative that reduces operational costs by at least ten percent across his division
    while mentoring a cohort of junior managers to sustain those gains. He also hopes to transition into a part‑time consulting role, leveraging his hands‑on experience to help small hospitality businesses
    in Las Vegas streamline their operations. On a personal level, he intends to develop coping strategies for his anxiety, such as mindfulness training, to maintain his well‑being during the final years
    of his career.
