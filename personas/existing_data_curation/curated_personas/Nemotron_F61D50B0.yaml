personas:
  professional: Janet Clenney, a seasoned property‑and‑casualty claims adjuster, blends investigative instincts with solid business acumen to assess, appraise, and resolve insurance claims efficiently;
    she leverages Xactimate, advanced Excel modeling, and a calm yet assertive negotiating style that balances empathy with fairness, all while keeping meticulous documentation and transparent communication.
  sports: Janet Clenney’s athletic pursuits revolve around weekend hikes in the Santa Ana Mountains, membership in a local hiking club, occasional yoga classes at a nearby studio, and a loyal fandom for
    the Los Angeles Dodgers and LA Galaxy, which she follows through Sunday brunch watch parties at her favorite café.
  arts: Janet Clenney’s artistic side shines through her love of photography—capturing sunrise vistas over the hills and candid shots of friends at wine‑tasting events—with an admiration for Ansel Adams
    and Edward Hopper, while her reading list includes historical mysteries like Umberto Eco’s *The Name of the Rose* and she enjoys listening to the soothing strums of Rodrigo y Gabriela during garden
    evenings.
  travel: Janet Clenney’s travel style mixes careful planning with spontaneous road trips, favoring destinations that pair outdoor adventure with culinary delight such as Napa Valley wine tours, the coastal
    trails of Cinque Terre, and the desert landscapes of Joshua Tree, while she keeps a handwritten itinerary notebook for each journey.
  culinary: Janet Clenney’s culinary preferences gravitate toward Mediterranean dishes—she frequently prepares ratatouille, grilled lamb with rosemary, and a tangy Greek salad featuring heirloom tomatoes
    from her garden—yet she sometimes over‑season meals with extra olive oil and uses wine reduction sauces after a glass of cabernet at a tasting night.
  core: Janet Clenney navigates life with a balanced blend of curiosity and practicality, channeling meticulous data‑driven habits into both her claim work and personal finance while indulging in weekend
    hikes, wine‑tasting socializing, and a habit of over‑cooking Mediterranean meals whenever the garden yields fresh herbs.
background:
  cultural: Raised in a middle‑class suburban setting in Southern California, Janet’s family background reflects typical White American values of independence, hard work, and community involvement. Her
    parents emphasized education and civic responsibility, encouraging participation in local volunteer programs and neighborhood events. Growing up in a diverse region like Orange County exposed her to
    a blend of cultural perspectives, fostering an open‑minded yet pragmatic outlook. She maintains traditions such as celebrating holidays with family gatherings while also embracing contemporary lifestyles,
    including health‑focused activities and continuous learning. This cultural mix nurtures her balanced approach to personal and professional life.
