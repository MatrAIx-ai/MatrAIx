  career_goals: Janet aims to advance to a senior claims management position within the next five years, leveraging her expertise to lead a regional team and shape policy for efficient claim handling. She
    plans to obtain the Chartered Property Casualty Underwriter (CPCU) designation and pursue certifications in advanced risk analytics. Her ambition includes developing training programs for new adjusters,
    championing technology adoption to reduce processing times, and eventually consulting for insurance firms on fraud prevention and process optimization. She also envisions mentoring younger professionals,
    fostering a collaborative and ethical work culture.
