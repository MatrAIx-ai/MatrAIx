  career_goals: Looking ahead, Anthony aims to step into a supervisory role—such as Patrol Sergeant or Lieutenant—where he can institutionalize community‑policing principles and expand mental‑health support
    for officers and citizens alike. He plans to design a precinct‑wide crisis‑intervention training curriculum that incorporates art‑based therapeutic techniques, reflecting his interest in unconventional
    approaches. Over the next five years, he intends to mentor a cohort of new officers, champion transparent policing practices, and advocate for increased resources for community outreach programs. As
    he approaches retirement, he envisions transitioning to a security‑consultancy role for local businesses, leveraging his business education, or serving on the city’s public‑safety advisory board.
