  career_goals: He aims to become a senior lead engineer or tech architect who can bridge software engineering with interactive art, building immersive experiences that blend code and creativity. Over the
    next five years, he plans to lead cross‑functional teams developing generative‑art platforms, explore AI‑driven creative tools, and eventually launch his own boutique studio focused on experimental
    digital media. He also wants to contribute to open‑source projects that democratize creative coding, and occasionally mentor junior developers while continuing to hone his artistic practice.
