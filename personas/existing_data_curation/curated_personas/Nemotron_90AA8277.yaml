personas:
  professional: Norman Duhon, a full‑stack software developer turned creative technologist, leverages deep expertise in Python, TypeScript, and Unity while channeling his vivid imagination and meticulous
    organization into crafting immersive generative‑art platforms that bridge code and visual storytelling.
  sports: Norman Duhon paddles Lake Michigan every weekend with the Milwaukee Kayak Club, follows the Detroit Lions and the Chicago Cubs keenly, and blends his love for the water with a disciplined yet
    relaxed fitness routine that includes early‑morning runs along the shoreline and seasonal pickup basketball games at the local community center.
  arts: Norman Duhon crafts intricate digital illustrations inspired by the generative patterns of Joshua Davis, sketches serene lake vistas reminiscent of Edward Hopper, loses himself in the ambient drones
    of Biosphere while devouring speculative fiction by N.K. Jemisin and Neal Stephenson, and regularly attends local gallery openings and indie film screenings to feed his artistic curiosity.
  travel: Norman Duhon favors thoughtfully curated trips that blend natural wonder with creative inspiration, having photographed the fjords of Iceland and explored the neon‑lit streets of Tokyo, he now
    dreams of a road‑trip along the Pacific Coast Highway to capture sunrise over Big Sur while balancing his limited vacation days and a modest travel fund.
  culinary: Norman Duhon is an adept home‑cook who transforms fresh Lake Michigan trout into cedar‑smoked fillets seasoned with fennel and orange zest, often pairs them with roasted beet‑goat‑cheese salads
    featuring hazelnuts, while unwinding at local micro‑breweries to savor a hoppy IPA and a perfectly brewed pour‑over coffee with notes of chocolate and citrus.
  core: Norman Duhon is a 35‑year‑old code‑crunching dreamer who sketches futuristic cityscapes between coffee sips, obsessively tweaks his modular synth at night, but habitually overthinks project deadlines
    and worries about missing the perfect sunset.
background:
  cultural: Norman grew up in a white, Midwestern American family in the Great Lakes region, with ancestry tracing back to German and Irish immigrants who settled in Michigan in the early 20th century.
    The community values of modesty, self‑reliance, and a close connection to nature shaped his appreciation for the outdoors and local traditions. He was raised with a blend of Protestant and secular cultural
    influences, participating in community events like the annual Pentwater summer festival and local farmers’ markets. This background nurtured his pragmatic work ethic while also encouraging curiosity
    and a love for the arts, reflected in his involvement with regional art workshops and the lake‑centered recreational lifestyle.
