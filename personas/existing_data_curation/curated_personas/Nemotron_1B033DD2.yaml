  hobbies: '[''Landscape painting'', ''Acoustic guitar'', ''Fishing'', ''Hiking'', ''Visiting art galleries'', ''Attending live music'', ''Volunteer work (food drives)'', ''Reading non-fiction (psychology,
    business)'', ''Gardening'', ''Exploring local history museums'']'
  career_goals: Driven by his curiosity and desire to foster teamwork, Anthony aims to become an Operations Manager within the next five years, overseeing multiple distribution sites. He plans to complete
    a bachelor’s degree in Supply Chain Management and earn certifications such as Certified Transportation Professional and Six Sigma Green Belt. His long‑term ambition includes implementing sustainable,
    green‑logistics initiatives and eventually starting his own regional transportation company that emphasizes employee well‑being and community partnership.
