  career_goals: Allan aims to become a lead architect or engineering manager within the next five years, guiding a team to deliver high-quality software solutions while maintaining a hands-on technical
    role. He intends to obtain advanced certifications such as AWS Solutions Architect Professional and Certified ScrumMaster, and to spearhead process improvements that increase efficiency and reliability.
    In the longer term, he envisions starting his own consultancy to help small businesses in Berks County modernize their IT infrastructure, balancing his entrepreneurial drive with his desire for stability
    and community impact.
