personas:
  professional: Albert Smith is an aspiring game designer who spends weekends coding simple Scratch animations and analyzing strategy‑heavy video games, channeling their love for structure into meticulous
    level designs while tolerating the occasional disorganized sprint, and they often share their progress with a small online community.
  sports: Albert Smith is a pick‑up basketball enthusiast who dribbles for the local community center’s Saturday games, cheering for the Chicago Bulls while favoring one‑on‑one matchups that satisfy their
    competitive streak without the pressure of large crowds, and they relish the brief moments of quiet focus after a game.
  arts: Albert Smith’s artistic side shines through building intricate LEGO Technic models, listening to Kendrick Lamar’s latest hip‑hop releases and Miles Davis’s “Kind of Blue,” and devouring sci‑fi classics
    like “Ender’s Game,” which together shape a distinctive creative voice, and they often sketch ideas for future game narratives in a worn notebook.
  travel: Albert Smith has explored the nearby science museum and a weekend road trip to Niagara Falls, and dreams of visiting Tokyo to experience the bustling Akihabara district, preferring short, well‑planned
    outings that balance parental supervision with a pinch of spontaneous adventure, though they sometimes overpack out of worry.
  culinary: Albert Smith favors ordering pepperoni pizza and crunching on trail mix, but can whip up a passable mac and cheese using a microwave, and delights in the tangy zest of mango‑salsa, which they
    claim boosts their focus during long coding sessions, even though they occasionally skip meals when absorbed in a game.
  core: Albert Smith is a structure‑loving, competitively driven 13‑year‑old who channels anxiety into disciplined hobbies while juggling a relaxed approach to obligations and an occasional penchant for
    impulsive snack binges, and they often find solace in solitary journaling.
background:
  cultural: Albert is an African‑American teen raised in Rochester, New York, a city with a rich history of civil‑rights activism and vibrant Black cultural institutions. His family places a strong emphasis
    on community ties and education, often attending local events at the Rochester Museum & Science Center’s African‑American exhibit and participating in the annual Juneteenth celebration held in the city’s
    East End. He grew up hearing stories from his grandparents about the 1964 Rochester race riots and the subsequent push for social justice, which have instilled in him a sense of resilience and awareness
    of systemic challenges. While he leans toward solitary activities, he values the support of his close‑knit family and a few trusted mentors at his middle school’s after‑school STEM club, where Black
    youth are encouraged to explore technology and engineering. His cultural background informs his interest in storytelling—both through the narratives of hip‑hop music he listens to and the games he designs—allowing
    him to express his identity and experiences in creative ways.
