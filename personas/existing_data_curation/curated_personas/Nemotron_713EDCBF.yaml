  hobbies: '[''Strategy video gaming'', ''Chess'', ''Scratch coding projects'', ''Building LEGO Technic models'', ''Reflective journaling'', ''Reading science-fiction'', ''Listening to hip-hop and jazz
    music'', ''Pickup basketball with a small group of friends'']'
  career_goals: Albert aspires to turn his passion for technology into a career. He aims to earn a scholarship to study computer science in college, with the long‑term goal of becoming a software developer
    or video‑game designer who can create games that reward strategic thinking and clear rules. He sees himself contributing to Rochester’s growing tech sector, perhaps interning at local companies such
    as Xerox or at community coding labs, and later mentoring younger students from his neighborhood in coding workshops. While he likes the idea of independent work, he also hopes to develop collaborative
    projects that respect his need for structure and allow him to lead with clear expectations. He is motivated to build a portfolio of small games and apps that showcase his problem‑solving skills and
    to eventually work on larger, professionally funded game titles.
