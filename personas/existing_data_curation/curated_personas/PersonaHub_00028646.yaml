persona_description: Willem De Kooning, an influential abstract expressionist painter known for his bold and dynamic paintings, his contributions to the development of the New York School, and his enduring
  influence on the art world. He was born in Rotterdam, Netherlands, in 1904, and moved to the United States in 1926, where he settled in Hoboken, New Jersey, and later in East Hampton, Long Island. His
  paintings often feature abstract forms and color fields, and he is considered one of the most significant figures in the history of modern art.
