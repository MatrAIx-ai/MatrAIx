  hobbies: '[''Backyard gardening'', ''Woodworking'', ''Morning jogging'', ''Reading mystery novels'', ''Home cooking'', ''Fishing at Lake Wylie'', ''Church community activities'', ''Puzzle solving (crosswords,
    sudoku)'', ''Board game nights with close friends'']'
  career_goals: Tony aims to transition from sales associate to store manager within the next three years, leveraging his reliable performance and organized work style to oversee daily operations, staff
    development, and financial accountability. He plans to complete an associate's degree in Business Administration to strengthen his managerial skill set. In the longer term, he aspires to become a district
    manager or to open a modest, family-run retail shop that emphasizes routine, community service, and dependable customer experiences. His primary ambition is to secure a stable, upward-mobile career
    that provides financial security for his marriage and future family plans.
