personas:
  professional: Norma Gause is an aspiring junior wildlife comic creator who blends her love for sketching animals on Colorado trails with beginner coding in Scratch, while applying the methodical curiosity
    she honed in her school science club to craft engaging digital stories.
  sports: Norma Gause enjoys weekend hikes on Broomfield’s Bear Creek Trail, participates in the Broomfield Youth Soccer League, and cheers on the Denver Broncos and Colorado Rockies, while using a family
    bike for regular cardio and balancing team interaction with solo trail time.
  arts: Norma Gause sketches squirrels, wildflowers, and mountain vistas, transforms them into digital comics inspired by Hayao Miyazaki’s storytelling, reads adventure series like ‘Harry Potter,’ and practices
    beginner piano pieces such as ‘Für Elise’ to blend imagination with disciplined practice.
  travel: Norma Gause loves exploring the nearby Rocky Mountain National Park, has visited Washington D.C. on a school field trip, dreams of traveling to Tokyo to see anime studios, and prefers nature‑focused
    trips over theme parks, always planning routes with a mix of structure and spontaneity.
  culinary: Norma Gause prefers homemade mac and cheese, banana pancakes with honey, and snacks on carrot sticks with hummus while drawing, and enjoys helping their family bake cinnamon rolls on weekends,
    balancing healthy meals with occasional sugary treats when feeling anxious.
  core: Norma Gause is a curious, organized ten‑year‑old who balances artistic ambition with anxiety, turning trail walks into comic adventures while carefully managing savings and self‑care.
background:
  cultural: Norma comes from a middle‑class suburban white American family in Broomfield, Colorado. Her cultural background reflects typical Rocky Mountain suburban values—emphasis on outdoor recreation,
    school involvement, community service, and celebrating mainstream American holidays such as Thanksgiving, Christmas, and the Fourth of July. Her family attends a local Christian congregation, encourages
    curiosity and practical skill‑building, and values both academic achievement and participation in community activities.
