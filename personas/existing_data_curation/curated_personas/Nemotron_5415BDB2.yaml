  hobbies: '["Hiking and nature exploration", "Sketching and wildlife illustration", "Creating simple games and comics in Scratch", "Reading adventure and fantasy books", "Playing beginner piano", "Science
    club projects", "Volunteering at the local animal shelter", "Journaling for emotional expression"]'
  career_goals: Norma dreams of becoming a wildlife biologist or veterinarian, combining her love of animals with practical scientific skills to protect nature. She is also fascinated by the idea of teaching
    younger kids about science through after‑school clubs or school projects, so she hopes to someday lead a community science program that encourages curiosity while providing hands‑on learning experiences.
