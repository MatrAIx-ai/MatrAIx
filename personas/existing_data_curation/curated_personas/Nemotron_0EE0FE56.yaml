  career_goals: Larry often talks about growing up to be a brave firefighter who helps his community, an adventurous explorer who discovers new places in nature, and a colorful artist whose drawings win
    the preschool art show. He aims to read whole storybooks by age six, write his own short stories, and someday help on his family's small farm. In the near future, he hopes to be the fastest runner in
    his preschool’s race day, reflecting his competitive streak, and to earn a gold star for his art projects.
