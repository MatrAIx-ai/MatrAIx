personas:
  professional: Ronika Gresham, a veteran roofing contractor with two decades of hands‑on experience, blends technical mastery of shingle, slate, and green‑roof systems with an artist’s eye for decorative
    ridge caps, mentors apprentices while eyeing the launch of a boutique sustainable‑roofing firm, and they channel their competitive edge into setting higher industry standards.
  sports: Ronika Gresham, a devoted follower of the Indianapolis Colts and Indiana Pacers, supplements the spectator experience with early‑morning walks through historic districts and occasional community
    yoga sessions, preferring low‑impact activity over high‑intensity competition while occasionally joining a weekend pick‑up basketball game for the camaraderie, and they view fitness as a flexible routine
    that fits their relaxed approach to obligations.
  arts: Ronika Gresham, who spends evenings listening to Miles Davis and Nina Simone while capturing cityscapes reminiscent of Henri Cartier‑Bresson, paints abstracts inspired by Basquiat’s texture, devours
    Octavia Butler’s sci‑fi narratives alongside literature that explores the African diaspora and cultural identity, hones new skills in pottery and woodworking whenever a workshop opens, and they fuse
    these artistic pursuits into a cohesive personal aesthetic that influences even their roofing designs.
  travel: Ronika Gresham, an avid explorer of historic neighborhoods, plans most trips on a whim, having already trekked the cobblestone streets of Savannah, Georgia, the riverfront charms of Cincinnati’s
    Over‑the‑Rhine, and a weekend getaway to the limestone cliffs of Hocking Hills, always returning with a fresh scrapbook page of architectural sketches, and they balance wanderlust with the financial
    prudence needed for their future business.
  culinary: Ronika Gresham, who tends a small herb garden of rosemary, thyme, and hot peppers, frequently whips up soul‑food classics like collard greens seasoned with smoked turkey and a dash of their
    home‑grown herbs, treats themselves to occasional experimental dishes such as herb‑infused cornbread crème brûlée, and they view cooking as both nourishment and a creative outlet that complements their
    visual arts.
  core: Ronika Gresham navigates life like a rooftop—balancing structural precision with artistic flair, maintaining an easy‑going, slightly disorderly routine, and they constantly seek new heights of creative
    and sustainable expression.
background:
  cultural: Ronika grew up as a Black woman in the heart of Indianapolis, shaped by the close‑knit community of her neighborhood and the traditions of the local church. Family gatherings featured soul‑food
    cooking, gospel and jazz music, and storytelling about the civil‑rights movement, fostering a strong sense of resilience and pride. Her cultural roots inform her work ethic and her appreciation for
    collaborative, yet independent, endeavors. She regularly participates in citywide Juneteenth celebrations and Black History Month events, and she draws on the rich legacy of African‑American artisans
    to bring a unique aesthetic perspective to her roofing projects.
