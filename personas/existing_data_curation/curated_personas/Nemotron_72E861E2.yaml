  career_goals: Ronika aims to transition from hands‑on work to establishing her own small roofing firm that specializes in sustainable and artistically‑inspired roof solutions for Indianapolis neighborhoods.
    She plans to earn a certified safety trainer credential and a green‑roof certification within the next two years. By mentoring a diverse group of apprentices, she hopes to increase minority representation
    in the trade. Ultimately, she envisions a flexible part‑time consulting role that allows her to design custom roof art pieces while maintaining financial independence and a balanced lifestyle.
