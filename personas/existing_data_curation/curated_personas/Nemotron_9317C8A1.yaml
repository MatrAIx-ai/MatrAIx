personas:
  professional: Jenna Pilgrim, a retired senior‑center facilitator, channels their curiosity and love of art into running informal watercolor and genealogy workshops that thrive on their cooperative yet
    assertive style, even though their spontaneous nature often leads to last‑minute scheduling changes and a charmingly cluttered classroom.
  sports: Jenna Pilgrim stays fit by joining the senior‑center’s low‑impact yoga class, taking daily sunrise walks along nearby desert trails while birdwatching for red‑tailed hawks, and cheering on the
    New Mexico State Aggies football team and the Albuquerque Isotopes baseball club during family outings.
  arts: Jenna Pilgrim immerses themselves in the arts by painting desert landscapes in a style echoing Georgia O’Keeffe, photographing hummingbirds with their DSLR, knitting quilts inspired by Southwestern
    motifs, attending productions at the Carlsbad Community Theatre, and delighting in folk songs by Pete Seeger at local music gatherings.
  travel: Jenna Pilgrim plans their travels around seasonal comfort, reveling in spring guided tours of Carlsbad Caverns, road‑tripping to the Grand Canyon in autumn, and dreaming of a weekend pilgrimage
    to Santa Fe’s historic plaza to practice Spanish, all while balancing a modest travel budget and a senior‑friendly itinerary.
  culinary: Jenna Pilgrim experiments with New Mexican dishes such as green chile stew, roasted poblano enchiladas, and charred cactus fries, favoring fresh Hatch green chiles, roasted corn, and a pinch
    of oregano, while occasionally over‑spicing their meals in the excitement of flavor discovery.
  core: Jenna Pilgrim, a 77‑year‑old desert‑dwelling storyteller, blends spontaneous curiosity with a habit of misplacing their watercolor brushes, yet always finds their way back to the garden, the gallery,
    or a bird‑watching hideout.
background:
  cultural: Jenna is a white American who grew up in a Midwestern small town in the post‑World War II era before relocating to Carlsbad, New Mexico. Living in the Southwest has exposed her to a rich blend
    of Hispanic, Native American, and frontier cultures. She appreciates the region’s folk art, music, and cuisine, and she respects the traditions of the local Pueblo peoples. Raised in a Protestant household,
    Jenna retains a modest, community‑oriented ethic while remaining open to diverse cultural influences. Her background informs her appreciation for storytelling, gardening suited to arid climates, and
    the importance of intergenerational connections.
