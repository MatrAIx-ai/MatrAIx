  hobbies: '[''Visiting art museums and galleries'', ''Reading historical fiction and poetry'', ''Birdwatching'', ''Exploring Carlsbad Caverns'', ''Photography of desert landscapes and wildlife'', ''Cooking
    New Mexican cuisine'', ''Knitting and quilting'', ''Attending local theater productions'', ''Learning basic Spanish'', ''Genealogy research'']'
  career_goals: Although retired, Jenna aims to leave a lasting legacy by documenting her family’s stories and the history of Carlsbad in a memoir that can be shared with grandchildren and community members.
    She hopes to mentor younger relatives and local youth through art and craft workshops at the senior center, and to develop a small community garden that showcases native flora and promotes sustainable
    gardening practices. Jenna also wishes to deepen her knowledge of New Mexican folk art, exhibit her own work in local galleries, and learn enough Spanish to engage more fully with the Hispanic community
    in her town. Regular participation in guided tours at Carlsbad Caverns and occasional volunteering as a docent are also part of her aspirations.
