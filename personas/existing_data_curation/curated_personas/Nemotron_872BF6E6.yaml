  hobbies: '[''Drawing and painting'', ''LEGO building'', ''Basic coding projects (Scratch Jr.)'', ''Soccer and group outdoor games'', ''Visiting art and science museums'', ''Participating in community
    art and robotics clubs'', ''Listening to Indian folklore stories'', ''Helping prepare festival sweets'']'
  career_goals: Lakshman dreams of becoming an animator or cartoonist so he can bring his drawings to life, and he also imagines himself as an astronaut exploring the stars. He wants to combine his love
    of art with technology by creating video games or interactive stories. While his ambitions are whimsical, he is aware that staying organized and managing worries will help him achieve his goals, so
    he hopes to develop better focus and confidence as he grows. He also hopes to win school science fairs and art contests, seeing those achievements as milestones.
