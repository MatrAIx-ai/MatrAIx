personas:
  professional: Lakshman Chakraborty is a budding junior artist and amateur coder who mixes comic‑book inspired sketches with simple LEGO robotics projects at the community center, channeling their curious
    mind and relaxed attitude into spontaneous, unstructured creations while often competing with peers for the most inventive design.
  sports: Lakshman Chakraborty stars as a forward for the local Under‑8 soccer squad called the City Cubs and organizes energetic tag games during recess, thriving on group competition yet sometimes letting
    their competitive edge cause friction with teammates.
  arts: Lakshman Chakraborty is an avid fan of comic‑book art, idolizing creators like Stan Lee and Jim Lee, and regularly paints vibrant superhero scenes at the community art club, while also borrowing
    storyboards from Studio Ghibli films for inspiration, embodying their love for unconventional ideas and social play.
  travel: Lakshman Chakraborty enjoys weekend trips to the city science museum and dreams of exploring the Natural History Museum in London and the Space Center in Houston, favoring hands‑on exhibits where
    they can sketch curiosities over structured tours, all while balancing their excitement with occasional worry about new environments.
  culinary: Lakshman Chakraborty loves helping his family whip up sweet treats such as chocolate chip cookies, creamy rice pudding, and honey‑drizzled banana fritters during festivals, though they often
    get distracted and forget to stir, resulting in endearing kitchen mishaps.
  core: Lakshman Chakraborty is a curious, competitive 7‑year‑old who blends comic‑book art with LEGO robotics, savors sweet kitchen experiments, and navigates a world of group games and occasional worries
    with a charmingly disorganized, yet energetic spirit.
background:
  cultural: Lakshman’s family originates from the Indian subcontinent, and they maintain South Asian cultural traditions while living in Cupertino. At home, he hears a blend of English and regional languages,
    celebrates festivals such as Diwali and Holi with lights, rangoli, and sweets, and enjoys seasonal foods like rice dishes and lentil soups. The vibrant South Asian community in the Bay Area provides
    him with opportunities to attend cultural workshops, dance classes, and community gatherings, shaping his appreciation for art, music, and storytelling that reflect his heritage.
attributes:
