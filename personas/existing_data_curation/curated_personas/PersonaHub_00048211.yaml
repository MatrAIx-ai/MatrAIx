persona_description: A Literature Professor who specializes in the study of children's and adolescent literature, particularly focusing on literary genres such as fantasy, folklore, prose, fiction, picture
  books, biography, and nonfiction. Their research interests include content analysis, literature related to the interests and development of children and adolescents, including gender and multicultural
  aspects. They are expected to read a substantial number of books for children and adolescents and are interested in discussing the literary genres they analyze in class.
