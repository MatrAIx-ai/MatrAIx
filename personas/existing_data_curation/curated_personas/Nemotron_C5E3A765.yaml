  career_goals: Jessie aims to complete her high school education with a strong academic record and obtain a GED if necessary, then pursue a nursing program at a local community college. She is motivated
    to become a licensed practical nurse (LPN) specializing in pediatric care, combining her practical curiosity with her desire to help others. Long‑term, she hopes to earn a registered nurse (RN) credential,
    work in a children's hospital, and eventually lead community health outreach programs for youth. She also aspires to earn scholarships through community service, become a mentor for younger students,
    and be recognized for her contributions to local volunteer initiatives.
