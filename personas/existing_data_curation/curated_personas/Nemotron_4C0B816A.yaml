personas:
  professional: Arrone Mitchum, a budding digital storyteller at age 11, blends hand‑drawn cartoon sketches with Scratch programming to prototype interactive narrative games, channeling their curiosity
    and love for quiet, organized creation into early‑stage software development.
  sports: Arrone Mitchum, a quiet 11‑year‑old, joins the local youth cross‑country club for its solitary runs through the nearby woods, supports the hometown baseball team the Tigers, and keeps a low‑key
    fitness routine of weekend hikes and occasional basketball practice with a small group of friends, preferring endurance over high‑impact team sports.
  arts: Arrone Mitchum delights in sketching characters inspired by Hayao Miyazaki’s fantastical worlds, reveres the comic strips of Bill Watterson, and spends evenings listening to the smooth saxophone
    of John Coltrane and the uplifting gospel of Mahalia Jackson, letting those influences color their own imaginative cartoons and digital art.
  travel: Arrone Mitchum dreams of exploring the misty forests of the Pacific Northwest after several family trips to the local state park and the historic cobblestones of Boston, favoring slow, nature‑filled
    itineraries over crowded theme parks, and they often plan trips using hand‑drawn maps and journal entries.
  culinary: Arrone Mitchum loves simple yet flavorful meals like pepperoni pizza topped with fresh basil, homemade spaghetti carbonara with pancetta, and weekend smoothies blended with strawberries, banana,
    and Greek yogurt, and they enjoy experimenting with tiny kitchen tasks such as whisking batter or arranging fruit art on plates.
  core: Arrone Mitchum is an introspective, curious 11‑year‑old who turns solitary sketches into interactive stories, saves allowance for LEGO adventures, and balances quiet hobbies with a disciplined,
    organized routine peppered with occasional wrist‑stretch breaks.
background:
  cultural: Arrone lives in Caldwell, Texas, and is raised in a close-knit African-American family that cherishes Southern traditions and community values. Weekly church gatherings, soulful gospel music,
    and family meals featuring dishes such as collard greens, cornbread, and sweet potato pie are central to his upbringing. He participates in local cultural events, celebrates Kwanzaa with his relatives,
    and hears stories of his ancestors' journeys from the Deep South, which instill a sense of pride and resilience. The rural Texas setting adds an appreciation for the outdoors, neighborly cooperation,
    and a supportive community that encourages his artistic and academic pursuits.
