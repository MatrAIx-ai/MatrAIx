  hobbies: '[''Sketching'', ''Digital art'', ''Reading sci-fi/fantasy'', ''Building LEGO sets'', ''Scratch programming'', ''Journaling'', ''Listening to music'', ''Nature walks'']'
  career_goals: Arrone dreams of becoming a multimedia artist who can blend storytelling, illustration, and interactive technology. He hopes to attend a magnet school that emphasizes STEAM subjects, later
    pursuing a college degree that merges computer science with visual arts. His long-term ambition is to design educational games or graphic novels that inspire other kids, especially those from his community,
    to explore creativity and science. He also envisions mentoring younger students in art and coding clubs at his local library.
