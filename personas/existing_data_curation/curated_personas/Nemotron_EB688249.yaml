personas:
  professional: Brian White, a civil engineer specializing in structural analysis and sustainable design, blends rigorous technical expertise with an artist's eye, and they lead multidisciplinary teams
    to deliver smart‑city infrastructure while constantly sketching concepts for public art installations.
  sports: Brian White, a regular member of the St. Louis Cycling Club who logs long rides along the Mississippi River in spring, hits the vertical walls at Urban Climb gym for weekly sessions, and follows
    the St. Louis Cardinals and St. Louis Blues with strategic game‑day analysis, they treat fitness as a competitive yet meditative counterbalance to their engineering workload.
  arts: Brian White, an avid oil‑painter of St. Louis skylines inspired by Edward Hopper and a committed improv performer with the St. Louis Playwrights’ Collective, frequently visits exhibitions at the
    Contemporary Art Museum and draws design inspiration from Zaha Hadid and Maya Lin, they fuse visual and performative art to fuel their engineering creativity.
  travel: Brian White, who meticulously plans architecture‑focused trips, has explored Barcelona’s modernist streets and Kyoto’s zen gardens while fitting spontaneous weekend getaways to Nashville for live
    music, and they balance structured itineraries with impromptu road trips to the Ozarks for hiking and sketching.
  culinary: Brian White, a moderately skilled home cook who delights in searing Mississippi catfish with a citrus‑herb glaze, tossing fresh kale and toasted walnuts into a quinoa bowl, and indulging in
    a classic St. Louis thin‑crust pizza topped with Provel cheese and pepperoni on Friday nights, they often pair meals with craft IPAs from local breweries.
  core: Brian White, a 40‑year‑old civil engineer who channels a competitive, stress‑prone mind into vibrant cityscape paintings, improv comedy, and daring bridge designs, they habitually procrastinate
    on paperwork by obsessively fine‑tuning model bridges at midnight.
background:
  cultural: Brian grew up in Belleville, Illinois, a Midwestern town with a strong German‑Irish immigrant heritage. His family traditions reflect the region’s work ethic, modest Catholic upbringing, and
    community‑first mentality. The local culture—characterized by hospitality, a love for barbecued cuisine, and a deep connection to the industrial history of the St. Louis metropolitan area—has shaped
    his values of reliability and teamwork. While never married, he maintains a vibrant social network through sports clubs, art groups, and professional societies, navigating the balance between personal
    independence and the Midwestern emphasis on belonging.
