  career_goals: Brian aims to earn his Professional Engineer (PE) license and advance to a senior project manager or director of infrastructure within a forward‑thinking consulting firm. He is driven to
    lead flagship projects that blend cutting‑edge engineering with public art and green technology—such as smart‑city bridges, solar‑powered pedestrian plazas, and resilient flood‑ mitigation systems.
    In the longer term, he envisions launching his own boutique consultancy that specializes in innovative, aesthetically compelling urban infrastructure, while publishing interdisciplinary research on
    novel construction materials and competing for awards from professional engineering societies.
