  career_goals: Within the next two years Maxine aims to be promoted to assistant manager, using her sales record and people‑skills to demonstrate leadership potential. She plans to earn a retail‑management
    certification and enroll in community‑college courses in marketing to broaden her strategic knowledge. Over the next five years she envisions becoming a store manager and eventually moving into a regional
    or district management role, where she can shape sales strategies across multiple locations. Parallel to her corporate ambitions, Maxine hopes to channel her love of art into a merchandising or buying
    position that curates fashion collections with artistic collaborations. Long‑term, she dreams of opening her own boutique that merges contemporary art with apparel, allowing her to blend her creative
    curiosity with her competitive drive while maintaining a supportive environment for her family.
