  hobbies: '[''Gallery and Museum Visits'', ''Indie Concerts and Live Music'', ''Improvisational Theater Workshops'', ''Cycling'', ''Hiking in Columbia River Gorge'', ''Community Drum Circles'', ''Reading
    Speculative Fiction'', ''Home Brewing Beer'', ''Collecting Vintage Vinyl Records'', ''Community Gardening'', ''Board Game Hosting'']'
  career_goals: Looking ahead, Jason aims to lead a regional nonprofit that blends evidence‑based addiction treatment with expressive arts, establishing a dedicated center for art‑guided recovery in the
    Portland area. He plans to secure funding for research on the efficacy of art and music therapies, publish his findings, and mentor the next generation of counselors through workshops and supervised
    practice. In the longer term, he envisions transitioning to a part‑time consulting role that influences state policy on harm‑reduction and expands access to culturally responsive care, while maintaining
    a personal practice of counseling a select group of clients.
