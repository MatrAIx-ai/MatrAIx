personas:
  professional: Jason Balgo is a veteran substance‑use counselor who weaves evidence‑based therapies like Motivational Interviewing, CBT, and DBT with expressive‑arts interventions, leveraging neurobiological
    insights and a curious, flexible mindset to design community‑driven recovery programs while occasionally improvising to meet tight grant deadlines.
  sports: Jason Balgo cycles the Portland greenways, hikes the Columbia River Gorge, supports the Portland Timbers and Trail Blazers, plays forward on the St. Johns FC adult soccer league, and belongs to
    the Portland Pedal Power club, though his workout schedule can wobble when community events arise.
  arts: Jason Balgo regularly attends openings at the Portland Art Museum, collects vintage vinyl from artists like Joni Mitchell, The Decemberists, and Radiohead, participates in improv workshops at Brave
    New Workshop, and drums in neighborhood drum circles that blend rhythm with social connection.
  travel: Jason Balgo favors spontaneous road trips that blend nature and culture, having biked the Oregon coast, trekked New Zealand’s Milford Track, explored Kyoto during cherry blossom season, and dreaming
    of Iceland’s volcanic highlands while planning his next weekend getaway to the Columbia River Gorge.
  culinary: Jason Balgo brews seasonal IPAs with Cascade hops, cooks cedar‑plank salmon with dill and miso glaze, enjoys crafting sourdough loaves, frequents the Saturday farmers market for fresh herbs,
    and never says no to a pepperoni pizza during late‑night board‑game nights.
  core: Jason Balgo is a curious, art‑infused counselor who blends science with creativity, thrives on community interaction, and navigates life with a relaxed, improvisational spirit.
background:
  cultural: Jason was born and raised in the suburban outskirts of Portland to a middle‑class family of mixed German and Irish ancestry. Growing up during the cultural shifts of the 1960s and 1970s, he
    absorbed the region’s emerging counter‑culture, embracing progressive politics, environmental stewardship, and an openness to alternative approaches to health and well‑being. The Pacific Northwest’s
    strong emphasis on self‑reliance, community collaboration, and a thriving indie arts scene has shaped his values and worldview. While his heritage links him to European immigrant narratives, his daily
    life reflects the inclusive, socially conscious fabric of modern Portland, where he participates in local activism, supports community arts, and prioritizes cultural competency in his professional work.
