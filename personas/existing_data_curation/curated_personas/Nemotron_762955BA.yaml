  career_goals: William dreams of a future where he can blend art and technology. He imagines becoming a concept artist or game designer who creates immersive worlds, or a scientist‑inventor who makes scientific
    discoveries through creative experiments. He is open to many possibilities and plans to explore different fields through school projects, summer camps, and community workshops, keeping his options flexible
    as his interests evolve.
