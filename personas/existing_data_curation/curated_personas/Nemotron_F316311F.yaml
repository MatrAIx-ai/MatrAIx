personas:
  professional: Dolores Burgess, a seasoned dispensing optician with three decades of hands‑on expertise in lens edging, phoropter operation, and patient counseling, translates her blend of curiosity and
    practicality into meticulous eye‑care while they assertively mentor junior staff and empathetically guide senior patients through vision‑health workshops.
  sports: Dolores Burgess plays golf three times a week as a member of The Villages Golf Association, cheers for the Orlando Magic and the Florida Gators football team, follows the Tampa Bay Rays during
    baseball season, and joins the local senior tennis league for light cardio, embodying a balanced approach to fitness that they weave into their social calendar.
  arts: Dolores Burgess expresses her creative side through delicate watercolor paintings of native Floridian roses, draws inspiration from Monet and Georgia O'Keeffe, enjoys evenings listening to Ella
    Fitzgerald and Beethoven's Ninth Symphony, and occasionally attends community theater productions at The Villages, enriching the cultural depth they bring to everyday life.
  travel: Dolores Burgess spends her weekends exploring historic towns such as St. Augustine, Savannah, and Charleston, delights in guided tours of colonial districts, and dreams of a longer cultural immersion
    trip to Kyoto, Japan, where they hope to study traditional Japanese garden design.
  culinary: Dolores Burgess enjoys low‑sodium cooking, regularly preparing grilled salmon with lemon‑rosemary, cucumber–mint salad flavored with native rose petals, and a modified Georgia peach cobbler
    that swaps traditional salt for a pinch of sea salt, showcasing the practical culinary creativity they apply to everyday meals.
  core: Dolores Burgess blends precise optical expertise with a love for native rose gardening and watercolor painting, navigating intense anxieties through structured routines, supportive community work,
    and occasional impulsive midnight true‑crime podcast binges that keep them up.
background:
  cultural: Dolores is a white American who grew up in a small Midwestern town with deep family roots in the region. Her upbringing emphasized community involvement, modesty, and a strong work ethic, values
    she carries into her professional life. Relocating to The Villages, FL, she embraces the active‑adult culture of the area, participating in its many social clubs while retaining the practical sensibility
    of her Midwestern heritage. Her cultural identity blends mainstream American traditions with the professional ethos of healthcare, fostering a respect for both evidence‑based practice and compassionate
    patient care.
attributes:
  skills: '["Optical dispensing", "Vision screening", "Prescription verification", "Lens selection and edging", "Frame fitting and adjustments", "Patient counseling on eyewear care", "Inventory management",
    "Retail sales", "Electronic health record (EHR) management", "Use of optical instruments (phoropter, retinoscope)", "Digital lens technology integration", "Team training and mentorship"]'
  hobbies: '["Book club participation", "Volunteer work at senior center", "Gentle yoga instruction", "Gardening (native roses)", "Journaling", "Watercolor painting", "Golf", "Historical travel", "Cooking
    (low‑sodium recipes)"]'
  career_goals: Dolores aims to transition from day‑to‑day dispensing to a leadership role within her optical practice, eventually becoming the clinic manager or opening a boutique shop that emphasizes
    low‑vision aids and personalized service. She is motivated to earn advanced certifications in low‑vision rehabilitation and to spearhead community eye‑health workshops at The Villages senior centers.
    Balancing her curiosity for new optical technologies with a practical approach, she also plans to mentor emerging opticians, fostering a supportive environment that can help her and her colleagues manage
    workplace stress and emotional well‑being.
