personas:
  professional: Cody Spence is a retired humanities educator who now channels a polished blend of public speaking, storytelling, and conflict‑mediation expertise into orchestrating senior‑center workshops,
    oral‑history projects, and museum advisory initiatives, and they thrive as the sociable catalyst who makes history come alive for diverse audiences.
  sports: Cody Spence is an avid beach walker who joins the Lake Worth Senior Walkers club for sunrise strolls, keeps a modest weekly routine of low‑impact tai chi at the community center, cheerfully roots
    for the Miami Heat, the Florida Gators, and the Tampa Bay Buccaneers, occasionally plays casual pickleball with neighbors during the cooler months, and they view these activities as essential rituals
    that sustain both physical health and social connectivity.
  arts: Cody Spence is a lively participant in Lake Worth’s community theater, often taking lead roles in productions such as 'Our Town' and 'The Importance of Being Earnest,' while their evenings are filled
    with the smooth sounds of Miles Davis, John Coltrane, and Ella Fitzgerald on vinyl, and they eagerly volunteer at the Palm Beach Museum of Art’s annual jazz night and the multicultural Calle Ocho Festival,
    letting these artistic experiences shape their storytelling.
  travel: Cody Spence is an exploratory senior who combines meticulously planned road trips to historic towns such as St. Augustine and Savannah with annual cruise voyages to the Caribbean, cherishes weekend
    getaways to Key West for sunrise birdwatching, dreams of a future pilgrimage to New Orleans’ Mardi Gras, balances health considerations and a modest travel budget, and they approach each journey as
    a living lesson in the region’s rich cultural tapestry.
  culinary: Cody Spence is a competent home chef who delights in preparing fresh stone crab claws, blackened grouper with mango salsa, and shrimp ceviche seasoned with lime, cilantro, and jalapeño, often
    sourcing ingredients from the local fish market and pairing meals with a classic Cuban café con leche, while they sometimes over‑salt the dish or leave leftovers out too long, a testament to their love
    of flavor and occasional absent‑mindedness.
  core: Cody Spence is a charismatic, history‑loving retiree who blends meticulous storytelling with a penchant for over‑salting his seafood and occasionally forgetting medication, all while championing
    community engagement through bridge, theater, and beach walks, and they remain a beloved pillar of local cultural life.
background:
  cultural: Cody grew up in a middle‑class family in the American Midwest during the post‑World War II era, absorbing mid‑century values of hard work, community involvement, and a deep appreciation for
    the arts and education. After a career rooted in academia and public service, he retired to Lake Worth, Florida, where he now lives within a richly multicultural environment. While his primary cultural
    identity remains that of a Midwestern white American, he embraces the vibrant Latin American and Caribbean influences of South‑Florida, integrating them into his social interactions, culinary tastes,
    and community activities.
attributes:
  skills: '[''Public speaking'', ''Storytelling'', ''Historical research'', ''Writing and editing'', ''Curriculum development'', ''Mentorship'', ''Conflict mediation'', ''Volunteer coordination'', ''Digital
