personas:
  professional: A dedicated paramedic named David Wiggins, 25, employs rapid assessment, advanced ACLS, and improvisational problem‑solving on the streets of Plano while yearning to mentor new EMTs and
    shape protocol as a future senior lead.
  sports: David Wiggins fuels fitness by hiking the trails of Oak Point Park, fishing at Lake Grapevine, and occasional weekend runs with the Plano Running Club, while cheering on the Dallas Cowboys, Mavericks,
    and Rangers and joining casual pickup basketball games when time permits.
  arts: David Wiggins finds artistic solace building model aircraft kits, devouring medical documentaries, streaming the melodic folk of Ray LaMontagne, and listening to the improvisational jazz of Miles
    Davis, weaving these threads into his creative downtime.
  travel: David Wiggins prefers low‑key nature escapes—camping in Texas Hill Country, a weekend road trip to Austin’s music scene, and dreaming of Iceland’s auroras—planning trips meticulously on budgeting
    apps while balancing the constraints of a demanding shift schedule and a supportive spouse.
  culinary: David Wiggins cooks simple comfort meals like chicken‑and‑rice casserole, chili con carne, and grilled trout seasoned with smoked paprika and fresh herbs, honing a modest culinary skill set
    that doubles as therapeutic wind‑down after intense calls.
  core: A restless, emotionally intense paramedic, David Wiggins channels anxiety into solitary hikes, model kit construction, and a drive to create a community‑forward mental‑health response network.
background:
  cultural: David grew up in a middle‑class, White family in the Plano suburbs of Texas, where a blend of Southern hospitality, strong community ties, and a pragmatic work ethic shaped his worldview. His
    upbringing included regular participation in local church activities and annual Texas traditions such as Fourth of July parades and community barbecues. Though his formal schooling ended before ninth
    grade, he values practical, hands‑on learning—a trait common in his regional culture. Living in Collin County, he is accustomed to serving a demographically diverse population, which has taught him
    to respect and adapt to cultural nuances, including occasional use of basic Spanish phrases when interacting with non‑English‑speaking patients. This background informs his compassionate approach to
    emergency care and his commitment to community outreach.
attributes:
  skills: '[''EMT‑Basic certification'', ''Paramedic certification (state‑licensed)'', ''Advanced Cardiac Life Support (ACLS)'', ''Trauma triage and hemorrhage control'', ''Crisis de‑escalation and mental‑health
    first response'', ''Rapid decision‑making under pressure'', ''Vehicle and emergency equipment maintenance'', ''Community health outreach and education'']'
  hobbies: '[''Hiking local trails in Oak Point Park'', ''Fishing at Lake Grapevine'', ''Birdwatching in suburban Texas habitats'', ''Reading medical journals and listening to EMS podcasts'', ''Cooking
    comfort meals with his spouse'', ''Building model aircraft and rescue vehicle kits'', ''Playing realistic EMS simulation video games'', ''Volunteering at community health fairs'']'
  career_goals: David aims to advance to a senior lead paramedic position within his department, where he can mentor newer EMTs and shape field protocols. He plans to earn a paramedic instructor certification
    and complete an Associate's degree in Emergency Medical Services to formalize his knowledge. Long‑term, he hopes to launch a community‑focused mental‑health first‑response initiative in Collin County,
    bridging his practical skills with his desire to support vulnerable populations and reduce the emotional toll of crises on both patients and responders.
