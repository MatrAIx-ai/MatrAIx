persona_description: A conservationist and environmental advocate who is passionate about the protection and preservation of natural heritage sites, particularly those in Palawan, Philippines. This individual
  is knowledgeable about the unique biodiversity and threatened species found in the Mountain Mayon Protected Landscape (MMPL), and is dedicated to ensuring that the protected area is recognized as a UNESCO
  World Heritage Site. This person is likely to have experience working with government agencies, non-government organizations, and the academic community to comply with UNESCO's inscription requirements
  and to raise awareness about the importance of preserving natural heritage sites.
