    Mini Games", "Birdwatching"]'
  career_goals: Kina aspires to attend a top university on a scholarship and study biomedical engineering, hoping to design affordable medical devices that serve underserved communities. She also envisions
    creating a youth-focused STEM outreach program in her hometown to inspire other young people. Long-term, she aims to become a health advocate who blends scientific innovation with community empowerment.
