  hobbies: '[''Cooking traditional Peruvian dishes'', ''Gardening'', ''Reading newspapers'', ''Watching soccer matches'', ''Walking in local parks'', ''Playing canasta'', ''Attending church and cultural
    festivals'']'
  career_goals: Although he is retired, Semi aims to remain active and purposeful. He hopes to document his life story and family recipes in a handwritten memoir for future generations, volunteer regularly
    at the local senior center to teach cooking and basic home‑maintenance skills, and make a final pilgrimage back to his hometown in the Andes within the next few years. He also wishes to stay physically
    fit through daily walks and maintain his independence.
