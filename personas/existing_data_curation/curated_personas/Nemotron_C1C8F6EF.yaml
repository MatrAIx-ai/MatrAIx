personas:
  professional: Semi Algarin, a retired maintenance specialist turned community mentor, channels eight decades of hands‑on carpentry, plumbing, and small‑engine troubleshooting into weekly volunteer workshops
    at the senior center, balancing a love for structured lesson plans with occasional spontaneous improvisations that sometimes run past the scheduled time.
  sports: Semi Algarin, a fervent supporter of the national soccer team and the local Houston Dynamo, never misses a televised match, often marching to the neighborhood bar with friends for the game, while
    also completing daily walks along the Pulaski Park trails and occasionally joining a community futsal pick‑up on weekends.
  arts: Semi Algarin, an enthusiastic admirer of classic bolero vocalist Julio Jaramillo, folk guitarist Mercedes Sosa, and the occasional performance by the local symphony, fills quiet evenings with their
    music and often recounts favorite lyrical verses while preparing his signature ceviche.
  travel: Semi Algarin, after years of dreaming of a pilgrimage to his Andean hometown, has already explored the historic high‑altitude city of Cusco and the sunny coastal town of Mancora, and now plans
    a modestly budgeted trip back to the mountain village where his grandparents lived, preferring short, well‑planned journeys over impulsive overseas adventures due to limited finances.
  culinary: Semi Algarin, whose culinary pride shines when preparing fresh ceviche with lime juice, aji amarillo, sea bass, and cilantro, and arroz con pollo seasoned with cumin, oregano, and a splash of
    dark beer, sources the ingredients from the local farmer’s market and often shares generous portions at neighborhood potlucks, though they sometimes over‑salt the arroz when caught up in conversation.
  core: Semi Algarin, an eight‑decade‑old blend of disciplined planner and spontaneous storyteller, balances meticulous budgeting, modest health routines, and a passionate love for soccer and traditional
    cooking, while occasionally misplacing receipts and forgetting appointments.
background:
  cultural: Semi was born in a small mountain town in the Andes of Peru and immigrated to the United States in his early twenties, settling in Cicero, Illinois, where a vibrant Latino community offered
    a familiar cultural anchor. He carries forward Andean traditions through cuisine, music, and Catholic holidays, while also embracing the multicultural fabric of his Chicago neighborhood, including its
    historic Italian influences. His bilingual ability and deep ties to both Peruvian and American cultures shape his identity and community involvement.
attributes:
  skills: '[''Carpentry'', ''Plumbing and small‑engine repair'', ''Gardening'', ''Bilingual Spanish‑English translation'', ''Traditional Peruvian cooking'', ''Senior budgeting and benefits navigation'',
