personas:
  professional: Travis Valles, a retired civil engineer turned community mentor, combines their structural analysis expertise with a methodical, project-management mindset to lead after-school STEM workshops,
    advise local infrastructure initiatives, and curate interdisciplinary exhibitions that fuse engineering concepts with visual art, and they regularly host talks on design thinking for curious audiences.
  sports: Travis Valles, an avid hiker of the Willamette River trails, participates in the Oregon Trail Hiking Club, cheers for the Oregon Ducks football team and the Portland Timbers soccer club, and they
    schedule weekly morning walks that double as informal photo expeditions.
  arts: Travis Valles, a regular at Eugene's galleries, delights in discussing contemporary works by artists such as Dale Chihuly and Jenny Holzer, enjoys live jazz performances by the Eugene Jazz Society
    and folk shows featuring Sarah Jarosz, and they unwind by playing Beethoven's Moonlight Sonata on a well-worn piano.
  travel: Travis Valles, a meticulous planner, has already trekked the Oregon Coast and visited Seattle's Pike Place Market, and they aim to complete a grand European art pilgrimage to the Louvre, the Uffizi
    Gallery, and the Prado before turning 75, carefully budgeting each trip around their retirement income.
  culinary: Travis Valles, a competent home cook, favors Pacific Northwest flavors like cedar-plank salmon, wild mushroom risotto, and dandelion greens salad, and they often source ingredients from the
    community garden while pairing meals with locally roasted coffee beans and a splash of Oregon Pinot Gris.
  core: Travis Valles blends disciplined engineering precision with a restless curiosity for art and nature, and they channel a competitive edge into community mentorship while savoring quiet moments with
    a camera, a chisel, or a piano key.
background:
  cultural: Travis is a white American whose family roots trace back to Midwestern farming communities, but he has lived in the Pacific Northwest for the past four decades. The region’s emphasis on self‑reliance,
    environmental stewardship, and a vibrant independent arts scene has shaped his worldview. He values a pragmatic, methodical approach inherited from his engineering upbringing, while also embracing the
    eclectic, nature‑centered culture of Oregon that celebrates outdoor recreation, local crafts, and community collaboration.
