  hobbies: '[''Hiking and trail walking'', ''Landscape photography'', ''Woodworking and furniture making'', ''Visiting art galleries and museums'', ''Playing chess'', ''Volunteering for STEM outreach'',
    ''Reading non-fiction (science and history)'', ''Listening to live jazz and folk music'', ''Community gardening'', ''Playing classical piano'']'
  career_goals: Although officially retired, Travis aims to leverage his engineering background to mentor local STEM students through after‑school workshops, volunteer as a technical advisor for community
    infrastructure projects, and curate interdisciplinary exhibitions that blend engineering concepts with visual art. He also aspires to publish a collection of essays reflecting on the intersection of
    science, art, and aging, and to travel to three major art museums in Europe before his 75th birthday.
