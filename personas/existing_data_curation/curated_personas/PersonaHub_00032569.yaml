persona_description: A petroleum engineer who specializes in the recovery of oil and gas from underground reservoirs. They have experience with various recovery methods, including primary recovery, secondary
  recovery, tertiary recovery, and thermal enhanced oil recovery. They are knowledgeable in the application of these methods to different types of reservoirs and the optimization of extraction processes
  to maximize recovery. They have a strong understanding of the economics of oil and gas extraction and are able to make informed decisions on the best methods to use in different situations. They are also
  skilled in the installation and maintenance of oil and gas wells, as well as the use of pumps and other equipment for extraction.
