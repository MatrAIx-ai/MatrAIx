persona_description: A researcher in the field of stem cell biology, particularly focused on the study of neural stem cells and their role in brain development. The researcher is interested in the mechanisms
  by which viruses such as Zika virus infect and hijack neural stem cells, and is seeking to develop potential therapeutic strategies to prevent or treat the devastating effects of Zika infection on the
  developing fetus. The researcher is also interested in exploring the potential use of AXL as a potential therapeutic target for treating women at risk of Zika infection.
