  career_goals: Raphael aims to move from hands‑on courier work to a supervisory role in logistics, seeking a position as a route manager where he can mentor new drivers and implement efficiency improvements.
    He plans to obtain a Commercial Driver’s License (CDL) and take vocational courses in supply‑chain management within the next two years. Ultimately, he dreams of launching his own neighborhood delivery
    service that blends his love of community interaction with innovative, tech‑driven routing solutions, while also building a healthier work‑life balance to manage his anxiety and emotional reactivity.
