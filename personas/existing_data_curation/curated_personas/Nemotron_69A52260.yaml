  career_goals: Garnett is determined to translate his informal expertise into a stable, self‑directed career. His immediate goal is to obtain a GED and enroll in a community‑college trade program, focusing
    on HVAC or welding, fields that promise reliable income in the region. In the medium term, he wants to launch his own handyman service, leveraging his reputation for dependable, no‑nonsense work. Financial
    independence is a key driver, as is the desire to provide a more structured environment for himself and any dependents. He also hopes to secure a permanent residence rather than moving between transient
    housing, and to build a professional network that respects his competence and competition‑driven work ethic.
