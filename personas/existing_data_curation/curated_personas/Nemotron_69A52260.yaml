personas:
  professional: An ambitious handyman who thrives on clear, step‑by‑step projects yet improvises when tools are scarce, Garnett Watkins leverages their carpentry, automotive maintenance, and basic computer
    troubleshooting skills to deliver reliable, no‑nonsense repairs while they pursue a GED and community‑college trade program to formalize their expertise.
  sports: An outdoors‑oriented sports enthusiast, Garnett Watkins spends weekends fishing at Little Walnut Creek with the local angling club, hunting deer during the season, and playing competitive pickup
    basketball at the Westfield Community Center league, all while they cheer for the Cleveland Cavaliers and Browns.
  arts: An avid vinyl collector and DIY craftsman, Garnett Watkins spins classic soul and blues records by Otis Redding, Aretha Franklin, and B.B. King while restoring an old radio and building birdhouses,
    and they frequently attend intimate blues performances at the downtown venue The Groove.
  travel: Preferring low‑key road trips over lavish vacations, Garnett Watkins plans weekend getaways to nearby Hocking Hills State Park and the Ohio River Valley with a modest budget, they occasionally
    drive to Nashville for live music and dream of a future cross‑country tour to New Orleans to soak in the blues heritage.
  culinary: A practical home cook, Garnett Watkins enjoys grilling freshly caught trout seasoned with lemon, dill, and garlic, cooking chicken fried steak with a side of homemade cornbread, and they occasionally
    smoke pork shoulder using a rub of paprika, brown sugar, and cumin for weekend barbecues.
  core: Resourceful yet laid‑back, Garnett Watkins blends a competitive handyman mindset with a cash‑first lifestyle, often over‑checking tools before a job while they habitually leave half‑finished projects
    on the back porch.
background:
  cultural: Garnett grew up in a close‑knit African‑American family in the Midwest, where church and community gatherings shaped his worldview. The local Black church in Pickaway County has been a cornerstone
    of his cultural life, providing a space for music, fellowship, and mutual support. Family traditions such as Sunday night BBQs, storytelling, and gospel singing have reinforced a sense of identity rooted
    in resilience and communal care. Though the rural setting offers limited exposure to broader Black cultural movements, Garnett stays connected to his heritage through radio, music, and the stories passed
    down from older relatives about migration, labor, and the importance of self‑reliance. These influences blend with the practical, no‑frills ethos of small‑town Ohio, creating a cultural perspective
    that values hard work, personal accountability, and the occasional celebration of shared history.
attributes:
  skills: '["basic carpentry","home repair","automotive maintenance","yard work and landscaping","basic computer troubleshooting"]'
