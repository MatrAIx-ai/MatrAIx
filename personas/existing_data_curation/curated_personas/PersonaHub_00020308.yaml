persona_description: A researcher who specializes in the study of fish biology and the effects of environmental factors on fish populations, particularly pink snapper Pagrus auratus. They are interested
  in the direct and indirect effects of simulated calcareous dredge material on the eggs and larvae of pink snapper, including their tolerance to suspended solids and ingestion of copepod nauplii. They
  are looking for insights into how these effects can be used to manage and protect the fish population.
