personas:
  professional: David Raymond, an aspiring young game developer, channels a blend of sci‑fi curiosity and practical problem‑solving into designing simple Scratch games while enthusiastically customizing
    LEGO creations, and their relaxed, flexible attitude lets them iterate freely without worry about strict deadlines.
  sports: David Raymond loves biking along the Cedar Rapids River Trail and is a member of the local “Trailblazers” youth cycling club, while they cheer on the Iowa Hawkeyes football team on weekends, blending
    solitary outdoor activity with occasional team fandom.
  arts: David Raymond immerses themselves in sci‑fi literature, devouring books by Isaac Asimov and Philip K. Dick, while also enjoying the whimsical animations of Studio Ghibli and listening to the indie
    folk tunes of Vance Joy during LEGO building sessions, which together shape their creative worldview.
  travel: David Raymond favors short road trips to nearby state parks like Maquoketa Caves and dreams of a future family vacation to Japan’s Kyoto, planning adventures with a mix of spontaneous curiosity
    and parental constraints, balancing outdoor exploration with a desire for cultural discovery.
  culinary: David Raymond prefers quick, handheld meals like pepperoni pizza slices and cheesy macaroni, occasionally experimenting with making trail mix using almonds, raisins, and pretzel sticks during
    Minecraft sessions, reflecting a practical yet slightly messy approach to food.
  core: David Raymond is a quietly inventive ten‑year‑old who stitches together sci‑fi dreams, LEGO bricks, and bike trails, yet often leaves a trail of unfinished projects and half‑filled snack bowls behind.
background:
  cultural: 'David comes from a White Midwestern family rooted in Cedar Rapids, Iowa, with cultural ties to German and Irish ancestry common in the region. His upbringing reflects typical small‑town values:
    community involvement, appreciation for local festivals like the Cedar Rapids Freedom Festival, and a strong emphasis on self‑reliance and practicality. He attends a local public elementary school where
    emphasis is placed on collaborative learning, yet his reserved nature leads him to seek quiet corners of the library and the outdoors for personal exploration. Family traditions include Sunday visits
    to the farmer''s market, participation in community service projects, and weekend trips to the nearby state parks, all of which reinforce his connection to the regional culture.'
