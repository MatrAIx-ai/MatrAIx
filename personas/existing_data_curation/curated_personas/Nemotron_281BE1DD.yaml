  hobbies: '[''Birdwatching at Lake Apopka'', ''Reading scientific nonfiction and historical biographies'', ''Organic gardening'', ''Woodworking (furniture and tool restoration)'', ''Volunteering for community
    oral‑health workshops'', ''Playing chess with friends'', ''Photography of local wildlife'']'
  career_goals: Michael aims to transition from clinical practice to a leadership role that amplifies his impact on community oral health. Over the next five years he plans to earn a Master of Public Health
    with a focus on Dental Public Health, and to become the coordinator of a county‑wide school dental screening program in Orange County. He hopes to develop a sustainable preventive‑care curriculum that
    reduces cavities among children and seniors. Michael also envisions mentoring a cohort of dental hygienists through a continuing‑education series he will design, and eventually establishing a consulting
    firm that advises dental practices on patient‑experience improvement and staff well‑being. Balancing his ambition with his need for stability, he seeks positions that allow him to maintain a manageable
    clinical schedule while pursuing these larger public‑health initiatives.
