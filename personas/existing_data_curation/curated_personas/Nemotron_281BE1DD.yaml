personas:
  professional: Michael Lott, a seasoned dental hygienist with fifteen years of hands‑on experience in periodontal assessment, digital charting and infection control, leverages his analytical STEM background
    and compassionate communication to mentor junior staff, develop evidence‑based protocols and spearhead community oral‑health outreach, while charting a path toward a Master of Public Health and a leadership
    role coordinating county‑wide school dental screenings.
  sports: Michael Lott enjoys low‑impact fitness such as early morning walks around Lake Apopka, weekly pickleball sessions at the senior recreation center, follows the Orlando Magic in the NBA and Orlando City SC
    in MLS, and holds a casual membership in the Orlando Senior Pickleball Club that also hosts weekly chess matches for mental exercise.
  arts: Michael Lott finds artistic solace in the folk storytelling of Jimmy Buffett, the minimalist piano works of Ludovico Einaudi, and the nature photography of Ansel Adams, often reading biographies
    of innovators like Marie Curie and attending the annual Orlando Museum of Art’s rotating exhibits to broaden their cultural perspective.
  travel: Michael Lott prefers meticulously planned trips that balance quiet nature immersion with cultural enrichment, favoring weekend getaways to the Everglades, road trips along the Blue Ridge Parkway,
    and a long‑awaited pilgrimage to the historic streets of Florence, while budgeting travel around retirement planning and family responsibilities.
  culinary: Michael Lott enjoys cooking with vegetables harvested from their garden, favoring dishes like herb‑crusted grilled snapper with citrus glaze, roasted heirloom tomato quinoa salad, and slow‑cooked
    chicken and dumplings seasoned with fresh rosemary and thyme, while occasionally treating themselves to a slice of key lime pie from a local bakery.
  core: Michael Lott is a methodical, community‑focused dental hygienist whose curiosity fuels meticulous birdwatching journals, yet a lingering habit of over‑worrying about hurricane preparedness and staff
    well‑being adds a gentle, nervous edge to their compassionate nature.
background:
  cultural: Michael was born and raised in central Florida to a middle‑class, white American family with roots in the Midwest. His upbringing emphasized education, hard work, and community service, values
    reflected in his Catholic upbringing and participation in his local church’s outreach programs. Growing up near Orlando, he absorbed the region’s blend of suburban hospitality and multicultural influences,
    which fostered an appreciation for diverse perspectives while maintaining a traditional, family‑centered lifestyle. The warm, seasonal rhythm of Florida life—its outdoor recreation, hurricane preparedness,
    and seasonal tourism—has shaped his practical, adaptable outlook. His cultural identity is marked by a respect for Southern‑Florida customs, a commitment to volunteerism, and a strong sense of responsibility
    toward his neighbors in Apopka.
