  hobbies: '[''Volunteering at local health fairs'',''Community theater'',''Zumba classes'',''Gardening'',''Cooking Southern-inspired meals'',''Hiking in state parks'',''Yoga and meditation'',''Reading
    self‑help and wellness books'',''DIY home improvement projects'',''Participating in book clubs'']'
  career_goals: Julia aims to transform her practical experience into formal qualifications by completing an LPN program and ultimately earning an RN license. She hopes to lead a patient‑advocacy unit within
    her health‑care facility, where she can design flexible scheduling models that reduce staff burnout and improve patient satisfaction. In the longer term, Julia envisions launching a community wellness
    outreach program in Citrus County that offers health‑screening events, nutrition workshops, and stress‑management classes, leveraging her love of group activity and her commitment to harmonious, compassionate
    care.
