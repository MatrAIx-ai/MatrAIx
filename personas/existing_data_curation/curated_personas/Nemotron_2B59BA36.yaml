personas:
  professional: Julia Harris, a seasoned patient support professional with twenty years of hands‑on experience in hospital and assisted‑living settings, blends a practical mastery of vital‑sign monitoring,
    medication reminders, and wound care with an inquisitive eye for emerging health‑tech tools, while their compassionate communication and flexible, sometimes disorganized, approach to scheduling make
    them a natural mentor and informal patient advocate eager to advance toward an LPN and eventually lead a patient‑advocacy unit.
  sports: Julia Harris, an energetic participant in Zumba and line‑dance classes who spends weekends hiking the state parks with the Citrus County Trail Club, also cheers for the Tampa Bay Buccaneers and
    the Tampa Bay Rays while occasionally joining a local adult softball league for extra cardio.
  arts: Julia Harris, a dedicated community‑theater performer who loves starring in regional productions of 'Rent' and 'Steel Magnolias', also enjoys listening to Dolly Parton, Beyoncé, and the Broadway
    scores of Lin‑Manuel Miranda, using these artistic inspirations to fuel their own creative expression on stage and in the kitchen.
  travel: Julia Harris, a spontaneous road‑trip enthusiast, has explored the historic streets of Savannah and the jazz scene of New Orleans, dreams of visiting Charleston’s waterfront and Asheville’s Blue
    Ridge Mountains, and typically plans weekend getaways around community events while balancing a modest travel budget and family responsibilities.
  culinary: Julia Harris, an intermediate home chef, delights in slow‑cooked gumbo brimming with okra and Andouille sausage, fresh citrus‑infused salads featuring Meyer lemons, and occasional key‑lime pie,
    often sourcing local ingredients from the farmer’s market to perfect Southern‑style comfort dishes.
  core: Julia Harris embodies a compassionate, socially‑driven spirit who balances curiosity with practicality, thrives on group activities and community service, yet often grapples with stress‑induced
    worry and a relaxed, occasionally disorganized, approach to obligations.
background:
  cultural: Julia was raised in a Southern‑Florida family with deep roots in the citrus‑growing region of Citrus County. Her upbringing blended traditional Southern hospitality, Christian community values,
    and a strong sense of family interdependence. She carries the warmth and friendliness typical of the area, which informs her compassionate approach to patient care and her eagerness to foster harmonious
    group environments. The local culture’s emphasis on community service and practical ingenuity has shaped Julia’s pragmatic curiosity, encouraging her to adopt new ideas while honoring established traditions.
attributes:
  skills: '[''Patient Care'',''Vital Signs Monitoring'',''Medical Documentation'',''Infection Control'',''Health Education'',''Team Coordination'',''Compassionate Communication'',''Basic Phlebotomy'',''First
