personas:
  professional: Ruby Evans, a 57‑year‑old community‑focused artist and volunteer coordinator, leverages their self‑taught watercolor, abstract collage, and event‑management expertise, coupled with a calm,
    cooperative demeanor, to run weekly senior‑center workshops that blend prairie‑style garden aesthetics with contemporary artistic exploration.
  sports: Ruby Evans, a regular participant in the Altus Senior Walking Club and occasional bowler in the local senior league, enjoys watching the Oklahoma City Thunder and the Dallas Cowboys, and favors
    sunrise prairie walks and gentle stretching as their primary fitness routine.
  arts: Ruby Evans, an avid watercolorist and abstract collagist, draws inspiration from Georgia O'Keeffe's bold colors, Andy Warhol's experimental spirit, and Bob Dylan's lyrical storytelling, while they
    regularly attend productions at the Altus Community Theater featuring plays like 'The Glass Menagerie' directed by local artist Jane Miller.
  travel: Ruby Evans, a methodical planner who prefers week‑long road trips to scenic natural sites such as the Grand Canyon, Santa Fe’s art district, and the Texas Hill Country, and dreams of a future
    journey to New Zealand’s wildflower meadows, balances budget constraints with a desire to fund community art projects, and they always choose family‑run B&Bs to experience local hospitality.
  culinary: Ruby Evans, an enthusiastic home cook, delights in preparing farm‑to‑table dishes like rosemary‑roasted pork tenderloin with a wild‑flower honey glaze, seasonal squash‑and‑quinoa salad tossed
    with heirloom tomatoes, fresh basil, and goat cheese, and they treat themselves to warm pecan pie with a dollop of vanilla ice cream at the town diner.
  core: Ruby Evans, a calm, imaginative retiree who merges prairie folk‑art traditions with avant‑garde collages, habitually hoards vintage postcards, loses track of time bird‑watching, and occasionally
    forgets to water their garden during late‑night art sessions.
background:
  cultural: Ruby grew up in the heart of rural Oklahoma, raised in a multigenerational family of farmers and small‑town merchants. The cultural fabric of Altus emphasized neighborly hospitality, self‑reliance,
    and a strong church community, shaping her values of kindness, cooperation, and service. She cherishes the region’s folk‑art traditions, from quilting to prairie‑style garden design, and integrates
    these heritage influences into her own creative work. While rooted in Midwestern values, Ruby stays connected to broader artistic currents through online art forums and virtual workshops, bridging local
    cultural heritage with contemporary artistic exploration.
attributes:
  skills: '["Watercolor painting", "Abstract collage creation", "Creative writing (poetry and short stories)", "Quilt design and handcrafting", "Ornamental garden design (native wildflowers)", "Community
    event coordination", "Mediation and conflict resolution", "Volunteer library assistance", "Basic digital photography", "Self-directed study of philosophy and art theory"]'
  hobbies: '["Watercolor painting", "Abstract collage art", "Creative writing (poetry and short stories)", "Garden cultivation (native wildflowers)", "Birdwatching", "Reading speculative fiction and philosophy",
    "Attending local theater and arts festivals", "Exploring new art techniques via online tutorials", "Collecting vintage postcards", "Volunteering at the community library and senior center"]'
  career_goals: Ruby envisions channeling her creative energy into a community-focused artistic initiative. She aims to establish a weekly art workshop at the local senior center where she can teach watercolor
    and collage techniques to fellow retirees. In parallel, she dreams of compiling and self‑publishing a collection of her poems and short reflections on nature and resilience. Over the next few years,
    she hopes to curate a small pop‑up gallery featuring works by local artisans, thereby fostering cultural exchange and preserving the town’s folk‑art heritage.
