  hobbies: '["soccer", "animal shelter volunteering", "hiking and nature walks", "reading fantasy and science fiction novels", "baking", "DIY crafts and jewelry making", "photography", "science club projects"]'
  career_goals: Jessica dreams of turning her love for animals and her practical mindset into a career as a veterinary technician or a community health aide. She plans to graduate high school, attend a
    local community college for an associate degree in veterinary technology, and volunteer at the regional animal shelter to gain hands‑on experience. Alongside this, she hopes to develop leadership skills
    by becoming a youth group coordinator at her church, combining her sociable nature with a desire to serve her community. Ultimately, she aims to balance a stable, hands‑on profession with opportunities
    for continued learning and community involvement.
