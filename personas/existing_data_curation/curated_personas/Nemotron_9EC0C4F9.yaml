  career_goals: Alexzander is fascinated by how things work and often talks about building or fixing objects. He dreams of becoming an engineer or architect who designs helpful structures, and he also imagines
    being a firefighter, inspired by stories of rescuing others. He enjoys competitive games and seeks roles where he can solve challenges and be recognized for his ideas. While his aspirations are still
    playful, he shows a clear interest in careers that blend creativity, problem‑solving, and community service.
