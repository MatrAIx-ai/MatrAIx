personas:
  professional: A budding young architect fascinated by building with LEGO, Alexzander balances curiosity for new designs with a methodical approach to sorting bricks by color and size, yet often shifts
    to spontaneous structures when peers join the play.
  sports: A lively kid soccer enthusiast, Alexzander plays on the local Under‑5 league team, cheering for the 'Manchester United' youth kit and insisting on a pre‑game routine of lining up their cleats,
    while often challenging teammates in a competitive drill.
  arts: A colorful imagination lover, Alexzander delights in drawing cartoon superheroes like Spider‑Man and watching Pixar’s 'Toy Story', often recreating scenes with finger paints and sprinkling glitter,
    yet sometimes worries about the mess left behind.
  travel: An adventurous stroller‑age explorer, Alexzander’s family road trips include visits to the beach at Myrtle Beach and the amusement park in Orlando, where they eagerly plan ahead with a colorful
    map but get anxious when crowds become too noisy.
  culinary: A picky but enthusiastic eater, Alexzander favors macaroni and cheese, chicken nuggets, and strawberry‑banana smoothies, while meticulously arranging food on the plate but occasionally refusing
    broccoli unless it’s hidden in a 'fun' sauce.
  core: Alexzander is a curious, competitive five‑year‑old who blends organization with spontaneous play, worries about new situations, and channels that energy into building blocks, soccer drills, and
    colorful art.
background:
  cultural: Alexzander comes from an African‑American family rooted in the Chicago metropolitan area. His household celebrates cultural traditions such as gospel music, soul‑food dishes like collard greens
    and sweet potatoes, and community gatherings at the local church. Family events often include storytelling about family history and visits to nearby museums and cultural festivals that highlight Black
    art and history. Living in Palos Heights, he experiences a blend of suburban life and the rich cultural resources of nearby Chicago, which influence his interests in music, art, and community involvement.
