  career_goals: Clay’s aspirations are shaped by his environment and sociable nature. He often points to fire trucks, tractors, and a local grocery store, expressing wishes like "be a fire‑truck driver"
    or "help at the store". He enjoys watching adults at work and imagines joining them in roles that involve hands‑on activity and community interaction, such as a helper on a farm or a friendly cashier.
    These ambitions are playful, modest, and grounded in the practical, familiar world he knows.
