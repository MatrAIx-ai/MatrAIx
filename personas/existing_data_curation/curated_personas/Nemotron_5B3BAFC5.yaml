personas:
  professional: Clay French, a two‑year‑old who loves to imitate teachers during playtime, runs a make‑believe classroom with stuffed animals, crafting simple lesson plans and using picture cards, which
    showcases their preference for routine, natural sociability, and an emerging knack for organizing activities.
  sports: Clay French, a two‑year‑old who energetically toddles around the community’s Mini Kickers soccer club, cheers loudly for the hometown baseball team the Red Sox during family outings, and loves
    bouncing on the indoor play‑area trampoline, reflecting their love for routine activity sessions and sociable enthusiasm.
  arts: Clay French, a two‑year‑old who sings along to Raffi’s “Baby Beluga,” watches Disney’s “Moana” repeatedly, and draws wobbly animal figures inspired by Dr. Seuss books, weaving their talkative nature,
    love for familiar stories, and creative impulse into everyday play.
  travel: Clay French, a two‑year‑old whose travel memories center on family road trips to the Grand Canyon State Park and a week‑long adventure at Disney World in Orlando, thrives on the predictable schedule
    of nap times and snack packs while eagerly pointing out familiar landmarks.
  culinary: Clay French, a two‑year‑old who favors creamy mac and cheese, soft boiled carrots, and peanut butter‑banana sandwiches, can proudly pour pre‑measured cereal into a bowl but often makes a mess
    with the spoon, demonstrating a blend of routine food preferences and exploratory cooking habits.
  core: Clay French, a two‑year‑old who clings to daily routines, chatters nonstop about anything that catches their eye, refuses to part with a beloved stuffed giraffe, yet habitually leaves toys strewn
    across the living room floor.
background:
  cultural: Clay is raised in McCordsville, Indiana, within a white, Midwestern family that values community, modesty, and traditional routines. His family participates in local church gatherings, county
    fairs, and weekly family meals that reinforce a sense of stability and familiarity. The small‑town atmosphere, with its emphasis on practical work, neighborly support, and seasonal community events,
    shapes Clay’s preferences for the familiar, his sociable demeanor, and his practical, hands‑on interests.
