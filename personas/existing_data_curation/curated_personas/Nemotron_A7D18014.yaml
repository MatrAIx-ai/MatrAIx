  career_goals: Approaching retirement, Jian Wai still aims to cement his legacy as a top‑performing agent by hitting the 2025 sales‑volume benchmark for his agency. He plans to transition into a part‑time
    consultant role, offering strategic advice to younger agents and small brokerage firms. He also hopes to launch a niche boutique service that specializes in insurance solutions for Asian‑American small
    businesses in Texas, leveraging his cultural insight and network. Financially, he wants to secure a comfortable retirement fund while building a modest passive income stream from referral fees. Finally,
    he aspires to obtain the Certified Insurance Counselor (CIC) designation to formalize his expertise and serve as a guest lecturer at local community colleges.
