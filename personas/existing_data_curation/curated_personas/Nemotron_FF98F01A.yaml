  career_goals: As she approaches retirement, Gerldine aims to transition to a part‑time advisory role that focuses on socially responsible optimization projects, such as environmental sustainability initiatives
    and logistics support for non‑profits. She plans to author a book on applied operations research for public‑sector agencies, develop open‑source analytical tools for community planning, and mentor a
    cohort of women entering STEM fields through a local university program. Additionally, she hopes to curate a small exhibition that blends data visualizations with local art, reflecting her curiosity
    for unconventional thinking and appreciation of the arts.
