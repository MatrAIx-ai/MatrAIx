  hobbies: '[''Watercolor Painting'', ''Solo Hiking'', ''Birdwatching'', ''Reading Philosophy'', ''Reading Contemporary Fiction'', ''Logic Puzzles'', ''Sudoku'', ''Gallery Visits'', ''Classical Music Listening'',
