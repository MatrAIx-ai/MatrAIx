  hobbies: '[''Community Gardening'', ''Card Games (Bridge, Canasta)'', ''Bingo and Social Games'', ''Walking with Spouse'', ''Church Activities and Pot‑luck Volunteering'', ''Genealogy Research'', ''Cooking
