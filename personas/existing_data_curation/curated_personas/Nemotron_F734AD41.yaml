  hobbies: '[''Fishing'', ''Hiking'', ''Rotary Club Volunteering'', ''Mentoring Youth'', ''Vintage Car Restoration'', ''Drone Photography'', ''Attending Green Bay Packers Games'', ''Reading Business and
    History Books'']'
  career_goals: At this stage Michael aims to transition from active sales to mentorship and strategic investing. He plans to build a small portfolio of multi‑family and senior‑friendly properties, develop
    a training program for up‑and‑coming agents in Chippewa County, and eventually reduce his day‑to‑day brokerage work while securing a steady passive income stream that will fund his retirement and allow
    him to contribute to community development projects.
