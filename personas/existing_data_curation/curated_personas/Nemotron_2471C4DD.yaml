personas:
  professional: Karin Wynn is a front‑line retailer with a knack for people‑centred service, leveraging their cash‑handling expertise, meticulous organization, and compassionate conflict‑resolution skills
    to create a welcoming checkout experience while championing local art through thoughtfully curated visual displays, all while pursuing a shift‑manager role and a part‑time Business Administration degree.
  sports: Karin Wynn channels their love of the outdoors into regular hikes along the Red River Valley trails and weekend kayaking on the Red River, participates in the local Red River Outdoors Club, stays
    fit with a seasonal membership at the community gym where they follow a CrossFit program, and passionately supports the Minnesota Twins and Minnesota Vikings during the sports seasons.
  arts: Karin Wynn immerses themselves in the regional art scene by attending Moorhead Arts Council exhibitions featuring artists like Sarah Rubin and Andrew Lantz, sketching and photographing the natural
    beauty of Buffalo River State Park, experimenting with watercolor at home, and curating a personal collection of prints that inform their visual merchandising ideas, all of which fuel their desire to
    someday open a boutique showcasing local creators.
  travel: Karin Wynn prefers a balanced travel style that blends meticulous itinerary planning for domestic trips—such as weekend getaways to Duluth’s lakeside galleries and a road trip through the Green
    Mountains of Vermont—with spontaneous cultural immersion during international adventures like a week‑long art‑focused itinerary in Paris and a future dream to explore the craft workshops of Kyoto, all
    while budgeting carefully to fund both professional development and community volunteering.
  culinary: Karin Wynn delights in baking, mastering blueberry‑lemon scones and herb‑infused focaccia using locally sourced honey, heirloom tomatoes, and farmer’s‑market fresh herbs, while also enjoying
    seasonal Minnesota wild‑rice soup and roasted root vegetables, often sharing their culinary creations at family gatherings and community events, though they sometimes over‑season dishes in pursuit of
    bold flavor.
  core: Karin Wynn is a curiosity‑driven, meticulously organized retail professional who balances compassionate community service with a habit of late‑night watercolor sketching and occasional coffee splurges,
    all while dreaming of a boutique that marries art and commerce.
background:
  cultural: Karin was raised in a middle‑class, white family with Northern European roots in the Upper Midwest. Her upbringing in Moorhead, Minnesota, exposed her to a blend of Scandinavian and German heritage
    traditions, such as community festivals, church gatherings, and a strong work ethic. The region’s emphasis on neighborliness, modesty, and self‑reliance shaped her values of compassion, reliability,
    and cooperation. She celebrates holidays like Thanksgiving, Christmas, and local events such as the Clay County Fair, and she feels a deep connection to the prairie landscape and the seasonal rhythms
    of the area.
