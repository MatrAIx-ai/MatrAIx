persona_description: A technology and education advocate who is interested in the evolving challenges and opportunities presented by technology and wants to help develop best practices and standardized
  tools to address these issues nationwide. They are interested in media literacy and its importance in preparing today's students for the 21st century, and want to see where states can work together to
  update their standards, instructional resources, and professional development practices. They are also interested in state media literacy policies and/or guidelines, and want to see progress being made
  in developing state definitions, standards, and assessments of media literacy.
