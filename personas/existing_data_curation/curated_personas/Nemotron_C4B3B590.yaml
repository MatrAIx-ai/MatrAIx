  hobbies: '["visiting art museums and galleries", "watercolour painting", "reading historical biographies", "genealogical research", "gardening", "knitting", "small book club participation", "historic
    neighborhood walks", "volunteering at senior center art program", "short road-trip cultural excursions"]'
  career_goals: Although retired, Jennifer remains driven to deepen her artistic involvement and community impact. She aims to curate a rotating art showcase at the Columbus senior center, publish a memoir
    weaving her family history with reflections on Midwestern culture, mentor younger women interested in art and genealogy through informal workshops, and establish a modest scholarship fund that supports
    senior artists in the region. She also plans to continue lifelong learning by taking occasional art-history classes at a community college and to develop a personal archive of her own creative works
    for future generations.
