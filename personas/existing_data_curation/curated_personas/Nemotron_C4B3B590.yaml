personas:
  professional: Jennifer Kassell, a retired community arts coordinator, leverages her keen eye for watercolor, genealogical research, and budgeting savvy to curate rotating art showcases at the senior center,
    using digital photo archiving and modest mixed-media exhibits while favoring flexible planning over rigid schedules and maintaining a quietly competitive edge when selecting featured artists.
  sports: Jennifer Kassell is a casual fan of the Columbus Blue Jackets and the Columbus Crew, attending occasional games with senior-center friends while preferring low-impact exercise such as weekly walks
    along the Scioto River trail, a bi-weekly beginner’s yoga class, and seasonal hikes in Hocking Hills, using a modest pedometer to track steps yet sometimes skipping workouts when an art exhibition deadline
    looms.
  arts: Jennifer Kassell immerses herself in visual arts, drawing inspiration from Monet’s water lilies and the contemporary works of Columbus artist Julie Rindfleisch, while curating small exhibitions
    at the senior center, painting serene Ohio River watercolors, and regularly attending gallery openings at the Wexner Center for the Arts and the Columbus Museum of Art, where she often engages in quiet
    contemplation rather than bustling socializing.
  travel: Jennifer Kassell prefers short, well-planned road trips that blend cultural immersion and historic exploration, such as weekend visits to Hocking Hills State Park for its waterfalls, day tours
    of historic German Village, annual stops at the Ohio State Fair, and occasional drives to the National Museum of African American History and Culture in Washington, D.C., all coordinated with her flexible,
    last-minute packing habit.
  culinary: Jennifer Kassell, an enthusiastic home cook with a green thumb, frequently prepares herb-infused roasted chicken using rosemary and thyme from her garden, whips up fresh garden salads with heirloom
    tomatoes and basil vinaigrette, and delights in occasional indulgences at Columbus’s North Market where she orders a bowl of Ohio-style corn chowder and a seasonal beet tart, though she sometimes leaves
    the kettle on too long while reading a biography.
  core: Jennifer Kassell is a curious, softly competitive retiree who blends watercolor painting, genealogical sleuthing, and community art curation into a life of quiet discovery, often juggling a flexible
    schedule that leads to occasional missed appointments but always leaves a trail of vibrant river sketches and generous scarves for friends.
background:
  cultural: Jennifer is a white Midwestern American whose family roots trace back to German and Irish immigrants who settled in Ohio during the early 20th century. Raised in suburban Columbus, she internalized
    the region’s values of modesty, community involvement, and self-reliance, while also developing a deep appreciation for the local arts scene. Her marriage of over four decades reflects a stable, partnership-oriented
    lifestyle, and her upbringing in a church-affiliated community has reinforced a sense of civic duty and an affinity for small, close-knit social circles.
attributes:
  skills: '["art appreciation and critique", "watercolour painting", "mixed-media basics", "small-scale exhibition curation", "volunteer program coordination", "personal finance and budgeting", "genealogical
