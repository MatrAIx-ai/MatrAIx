personas:
  professional: Celeste Polanco, a bilingual front-of-house hospitality specialist, combines a sharp aesthetic sense with rapid problem-solving to create welcoming table settings, while their relaxed attitude
    toward scheduling and occasional worry keep them adaptable yet sometimes over-cautious under pressure.
  sports: Celeste Polanco keeps fit with early-morning yoga at a local studio, joins the Little Rock Running Club for weekend 5K runs, and avidly follows the Arkansas Razorbacks basketball team and St.
    Louis Cardinals baseball, viewing sports as a communal escape from work's hustle.
  arts: Celeste Polanco immerses themselves in creative expression, painting watercolors inspired by street-art murals reminiscent of Banksy, sketching scenes echoing Frida Kahlo's vibrancy, and attending
    indie festivals featuring The Staves and Brittany Howard, while also curating a small home gallery of local Arkansas artists.
  travel: Celeste Polanco favors spontaneous road trips along scenic byways, often planning last-minute stops in Austin, New Orleans, and the historic streets of Merida, balancing a love for adventure with
    a modest travel budget that prioritizes cultural immersion over luxury.
  culinary: Celeste Polanco cooks with confidence, perfecting traditional sancocho and arroz con pollo before experimenting with Arkansas corn masa and river catfish in a fusion jambalaya, while savoring
    the bold flavors of cilantro, plantains, and smoked paprika in every dish.
  core: Celeste Polanco blends artistic curiosity, hospitality savvy, and a wandering spirit, yet their penchant for occasional disorganization and lingering worries adds a quirky, endearing tension to
    their otherwise vibrant life.
background:
  cultural: Celeste was raised in a Panamanian household, where Spanish was spoken at home and English was used at school. Her family celebrates traditional festivals such as Carnaval de Las Tablas and
    the Día de la Independencia, and she grew up with the rhythms of salsa, reggaetón, and folk music. Panamanian cuisine—seafood, tropical fruits, and dishes like tamales—remains a core part of her identity,
    influencing her cooking experiments. While living in Malvern, Arkansas, she blends her heritage with local Southern culture, often sharing stories of Panama with friends and coworkers, and she participates
    in community multicultural events to maintain a sense of belonging.
attributes:
  skills: '[''Customer service'', ''Bilingual communication (Spanish/English)'', ''Order taking and POS operation'', ''Cash handling'', ''Table setting and presentation'', ''Team collaboration'', ''Problem
