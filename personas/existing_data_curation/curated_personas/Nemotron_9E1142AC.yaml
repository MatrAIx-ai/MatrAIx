  hobbies: '[''Watercolor painting'', ''Sketching'', ''Visiting art galleries and street murals'', ''Cooking Panamanian cuisine'', ''Yoga and mindfulness meditation'', ''Journaling'', ''Spontaneous road
    trips'', ''Indie music festivals'', ''Photography'']'
  career_goals: Celeste aims to deepen her understanding of the hospitality industry by pursuing an associate degree in culinary arts or hospitality management, planning to enroll in evening classes while
    continuing to work. She dreams of eventually opening a small café that blends Panamanian flavors with local Arkansas ingredients, offering a space that showcases art and music from both cultures. In
    the near term, she hopes to take on supervisory responsibilities, such as shift lead or trainer, to develop leadership skills and build confidence in managing stress. Long‑term, she envisions traveling
    to explore global culinary traditions and possibly coordinating cultural food events.
