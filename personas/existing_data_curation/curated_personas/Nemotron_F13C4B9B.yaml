personas:
  professional: Geraldine Alexander, a retired aerospace engineering technologist, leverages five decades of mechanical drafting, CAD, and CNC expertise; they mentor youth in maker clubs, and their spontaneous
    problem‑solving style and compassionate teamwork ethos keep workshops lively despite occasional disorganization.
  sports: Geraldine Alexander, an avid sunrise beach walker and member of the Indian River Senior Strollers, follows the Tampa Bay Rays, the Miami Dolphins, and the Orlando Magic with a relaxed enthusiasm,
    preferring gentle stretching and low‑impact walks over vigorous sport due to occasional joint stiffness.
  arts: Geraldine Alexander paints watercolor scenes of the Indian River inspired by Monet and O'Keeffe, sketches historic rockets after visits to the Space Coast Museum, delves into science‑fiction works
    by Arthur C. Clarke and poetry by Maya Angelou, and frequently attends intimate gallery openings featuring local artist Tyler Pickford, all of which feed their boundless curiosity.
  travel: Geraldine Alexander prefers slow, organized tours that blend history and nature, having cherished road trips to the Kennedy Space Center, a nostalgic Caribbean cruise, and a pilgrimage to the
    historic streets of St. Augustine, while dreaming of a leisurely European train journey through maritime museums and a bird‑watching safari in the Everglades.
  culinary: Geraldine Alexander, an adept home cook, loves preparing fresh oyster po'boys, key‑lime pie scented with garden‑grown limes, and rosemary‑seasoned shrimp scampi, often pairing meals with locally
    roasted coffee and sweet tea, though they sometimes forget to season adequately when distracted by knitting projects.
  core: Geraldine Alexander is a ninety‑year‑old former aerospace technologist whose endless curiosity fuels watercolor art, birdwatching, and spontaneous mentorship, even as they occasionally lose track
    of time, misplace knitting needles, and favor improvisation over strict planning.
background:
  cultural: Geraldine grew up as a white Floridian in the post‑World War II era, a period marked by rapid industrial growth and the burgeoning Space Race that transformed Brevard County into a hub of aerospace
    innovation. Her upbringing emphasized Southern hospitality, community church involvement, and a strong work ethic, while the cultural shifts of the 1960s and 1970s broadened her openness to new ideas
    and artistic expression. Living her whole life on the Space Coast, she internalized a blend of modest, close‑knit community values and the forward‑looking optimism of the space age, which now informs
    her compassionate volunteerism and her appreciation for both technical achievement and creative exploration.
attributes:
