persona_description: A medical microbiology student who is interested in understanding the molecular basis of host-pathogen interactions and the diverse mechanisms bacteria use to cause disease. They are
  particularly interested in the pathogenesis of medically important bacteria and how infectious diseases are spread. They are looking for a subject that will provide them with a comprehensive understanding
  of bacterial pathogenesis, including the transfer of proteins across the bacterial cell wall, the regulation of protein expression, and strategies for survival. They are also interested in the applied
  aspects of medical microbiology, such as the diagnosis of infections, the mechanisms of action of antimicrobial agents, and resistance to these agents.
