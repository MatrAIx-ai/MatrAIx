personas:
  professional: Gricel Perezrosales is a diligent teaching assistant who leverages bilingual fluency and platforms like Google Classroom and Blackboard to craft structured lesson plans, manage detailed
    records, and drive competitive student outcomes while balancing organization with flexibility.
  sports: Gricel Perezrosales jogs three times a week through Freedom Park, attends a local yoga studio for balance, cheers on the Charlotte Hornets and Charlotte FC, and participates in a community 5K
    club, merging personal fitness goals with team enthusiasm.
  arts: Gricel Perezrosales dances cumbia and salsa at neighborhood festivals, devotes evenings to reading contemporary fiction by authors like Sally Rooney and Colson Whitehead, maintains a reflective
    journal, and frequents Charlotte venues to watch live performances by Bad Bunny and Rosalía, weaving rhythm and narrative into daily life.
  travel: Gricel Perezrosales plans weekend trips around coffee‑culture destinations such as Medellín and Quito, dreams of visiting Kyoto during cherry blossom season, and balances travel aspirations with
    a modest budget and a commitment to volunteer tutoring during school breaks.
  culinary: Gricel Perezrosales loves preparing traditional dishes like bandeja paisa and empanadas, perfecting the crunchy chicharrón, the hearty black‑bean sofrito, and the savory ground‑beef filling,
    while pairing meals with hand‑crafted pour‑over coffee brewed from locally roasted beans and seasoned with fresh cilantro and lime.
  core: Gricel Perezrosales merges a competitive drive for academic excellence with a love for rhythmic dance and coffee‑shop experiments, all while juggling a meticulously organized schedule that sometimes
    overcommits and occasionally overlooks dental flossing.
background:
  cultural: Gricel was born to Colombian parents who immigrated to the United States before she was born. Raised in a bilingual household in Charlotte, she grew up speaking Spanish at home and English at
    school. Her family maintains Colombian traditions such as celebrating Día de los Reyes, Carnaval de Barranquilla, and cooking regional foods. She identifies strongly with the Colombian diaspora community
    in Cabarrus County, participating in cultural festivals, attending the local Colombian association’s events, and supporting community initiatives that preserve Colombian music, dance, and cuisine. Her
    Catholic upbringing and close family ties shape her values of hard work, hospitality, and communal responsibility.
