  career_goals: Gricel aims to earn a Bachelor’s degree in Elementary Education within the next three years, followed by teacher certification. She aspires to become a full‑time classroom teacher in a bilingual
    program, eventually moving into a leadership role such as curriculum coordinator or assistant principal. She is motivated to develop programs that support Latino students in the Charlotte area and seeks
    professional development opportunities that enhance her instructional strategies and give her a competitive edge in the education field.
