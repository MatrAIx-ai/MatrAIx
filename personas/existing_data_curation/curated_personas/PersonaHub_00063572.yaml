persona_description: A statistician who is interested in the statistical testing methods and their assumptions. They are familiar with the central limit theorem and the properties of the t-test. They have
  conducted research on the validity of data analysis methods and have a keen eye for detecting deviations from normality in data distributions. They are also familiar with the R programming language and
  have experience using the normalityAssessment function in the userfriendlyscience R package to inspect the sampling distribution of the mean. They are aware of the limitations of the t-test and the importance
  of checking for normality in their data analyses.
