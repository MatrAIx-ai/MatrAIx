data:
  user 1 personas: 'I love to take road trips.

    I live in upstate new york.

    My favorite place to visit is seattle.

    I live with my husband and two children.

    I work as a meeting coordinator.'
  user 2 personas: 'I love to play softball.

    My father was a dry wall finisher.

    I love history.

    My mother was an rn.

    I am a technician.'
  Best Generated Conversation: 'User 1: I love to take road trips! Where are some of your favorite places to go?

    User 2: I love to go to Seattle! It''s such a beautiful city with so much to offer.

    User 1: I''ve never been to Seattle, but I''ve heard great things about it. What do you like to do there?

    User 2: I love to go to the Space Needle, Pike Place Market, and the Museum of Pop Culture.

    User 1: Those all sound like great places to visit! I''ll have to add Seattle to my list of places to go.

    User 2: You definitely should! It''s a great city.

    User 1: So, what do you do for a living?

    User 2: I''m a technician.

    User 1: Oh, what kind of technician?

    User 2: I''m a computer technician.

    User 1: That sounds like a cool job.

    User 2: It is! I get to help people with their computers all day long.

    User 1: That''s great! I''m sure you''re a valuable asset to your company.

    User 2: I try to be!

    User 1: So, what do you like to do for fun?

    User 2: I love to play softball! It''s my favorite sport.

    User 1: That''s great! I used to play softball in high school.

    User 2: Oh, really? What position did you play?

    User 1: I played second base.

    User 2: That''s a tough position!

    User 1: It was, but I loved it!

    User 2: So, what are you up to this weekend?

    User 1: I''m not sure yet. What are you doing?

    User 2: I''m going to play softball in a tournament.

    User 1: Oh, that sounds fun! I wish I could play.

    User 2: You should come!

    User 1: I might! Thanks for the invite.'
