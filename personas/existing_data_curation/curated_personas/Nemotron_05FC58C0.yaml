personas:
  professional: Alexa Hazelrig, a senior project manager at a federal agency, integrates rigorous schedule design, dual Agile and Waterfall fluency, and a skeptical, data‑driven mindset to deliver high‑visibility
    programs on time while leveraging their sociable flair to persuade stakeholders and mentor emerging managers.
  sports: Alexa Hazelrig runs with the DC 5K Club three times a week, practices yoga on Saturday mornings, follows the Washington Capitals (NHL) and DC United (MLS) as their go‑to sports teams, and maintains
    a casual membership in a local running group, balancing a competitive edge in board‑game strategy with a routine fitness regimen.
  arts: Alexa Hazelrig spends Friday evenings at the Kennedy Center watching productions like Lin‑Manuel Miranda’s ‘Hamilton’, explores new exhibits at the National Gallery of Art featuring works by Vermeer
    and contemporary installations, and collects vinyl records of classic Broadway scores, letting the arts satisfy both their analytical curiosity and sociable desire for shared cultural experiences.
  travel: Alexa Hazelrig plans trips with meticulous spreadsheets, favoring historic European cities such as Florence, Prague, and Dublin for their rich art heritage, while often retreading familiar U.S.
    destinations like Annapolis for weekend getaways, balancing a desire for structured itineraries with occasional spontaneous museum‑hopping when time allows.
  culinary: Alexa Hazelrig delights in cooking comfort foods like creamy mushroom risotto, baked chicken pot pie, and homemade lasagna, skillfully seasoning with rosemary, sage, and Parmigiano‑Reggiano,
    and hosts monthly dinner parties where they pair each dish with a thoughtfully selected wine, though they sometimes over‑salt out of competitive perfectionism.
  core: Alexa Hazelrig channels a competitive, detail‑obsessed mind into structured project leadership, disciplined finances, meticulous health monitoring, routine fitness, cultured arts outings, historic
    travel, and a love for comforting home‑cooked meals, all while wrestling with chronic worry and a penchant for over‑planning.
background:
  cultural: Alexa is a white American born and raised in a middle-class suburban environment, likely in the Mid-Atlantic or Midwest, where practicality, punctuality, and respect for tradition were emphasized.
    Her humanities education deepened her appreciation for arts and history, while her professional life in Washington, D.C. exposes her to a diverse, politically engaged urban culture. She aligns with
    mainstream American values such as self-reliance and meritocratic competition, yet actively participates in the city’s rich cultural scene, including museums, theater, and historic landmarks, which
    complement her practical, routine-oriented outlook.
