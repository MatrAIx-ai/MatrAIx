  career_goals: Alexa aspires to advance to a senior program director or portfolio manager position within a federal agency or a prominent nonprofit, overseeing multi-agency initiatives with measurable
    impact. She plans to obtain advanced certifications such as PMP, PgMP, and an executive MBA to strengthen her strategic leadership capabilities. Her ambition includes designing a standardized, data-driven
    project management framework that enhances efficiency and accountability across the organization. She also seeks to mentor emerging project managers, fostering a high-performing, collaborative culture.
    While driven by competition and personal advancement, she values roles that provide clear structure, routine, and opportunities to apply her practical expertise to large-scale, mission-focused projects.
