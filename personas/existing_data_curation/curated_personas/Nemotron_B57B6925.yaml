  hobbies: '[''Group fitness classes (Zumba, spin)'', ''Weekend hiking in the Sonoran Desert'', ''Hosting dinner parties'', ''Community volunteering (food bank)'', ''Gardening'', ''Reading business and
    self‑development books'', ''Participating in a local women’s professional network'']'
  career_goals: Brandi aims to advance from industrial production manager to plant director within the next five years, overseeing a multi‑site manufacturing network and spearheading digital‑transformation
    projects that integrate automation and IoT while preserving operational reliability. She aspires to mentor emerging female leaders in the manufacturing sector, champion sustainability initiatives that
    reduce waste and energy consumption, and ultimately attain a senior executive role such as Vice President of Operations where she can influence strategic direction across the corporation.
