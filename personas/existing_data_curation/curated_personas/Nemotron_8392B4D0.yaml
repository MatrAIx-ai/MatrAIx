personas:
  professional: Robert Jones, a 26‑year‑old food‑processing operative in Miami who blends his solid HACCP expertise and bilingual communication skills with a street‑art photographer’s eye for detail, is
    actively pursuing a shift‑lead role while studying food science to eventually launch a Caribbean‑southern fusion catering venture.
  sports: Robert Jones, a devoted fan of the Miami Heat and an active participant in the South Beach Hoops pickup league, squeezes in evening basketball games on weekends and dances salsa to the rhythms
    of Miami’s vibrant nightlife, using his high energy to stay fit.
  arts: Robert Jones, a street‑art photographer who captures the colorful murals of Wynwood and collaborates on community frescoes inspired by the bold lines of Shepard Fairey and the whimsical pop‑culture
    nods of Banksy, spends his free evenings dancing to the beats of Bad Bunny while attending local Art Basel events, letting the visual and musical energy fuel his creative outlook.
  travel: Robert Jones, who plans his trips on a spreadsheet to maximize weekend getaways while staying on a modest budget, has already explored New Orleans’ jazz scene, spent a long weekend in Havana soaking
    up its street art, and dreams of backpacking through Mexico City’s markets and the Dominican Republic’s coastal villages to sample new flavors for his future catering menu.
  culinary: Robert Jones, an experimental home chef who fuses Southern soul food staples like fried chicken with Caribbean spices such as Scotch bonnet and allspice, frequently crafts dishes like jerk‑infused
    shrimp and grits or sweet‑potato pie with coconut milk, and while his friends love his bold flavor combos, he sometimes over‑salts or forgets to set a timer, leading to occasional kitchen mishaps.
  core: Robert Jones, a 26‑year‑old Miami food‑processing specialist turned street‑art photographer, balances a disciplined work ethic with spontaneous culinary experiments, often juggling basketball games,
    salsa nights, and a secret stash of extra camera batteries.
background:
  cultural: Robert grew up in a vibrant Black neighborhood of Miami‑Dade County where African‑American traditions blend with Caribbean influences from Haitian and Jamaican families. He celebrates Juneteenth,
    Caribbean holidays like Carnival, and participates in local cultural events such as Art Basel, reflecting his love for art and new experiences. Bilingual in English and Spanish, he navigates a multicultural
    environment daily, and his upbringing emphasized community solidarity, music, dance, and food as central pillars of identity.
