  hobbies: '["Street‑Art Photography","Community Mural Painting","Pick‑up Basketball","Salsa & Hip‑Hop Dancing","Experimental Cooking (Afro‑Caribbean Fusion)","Volunteering at Youth Center (Cooking Mentor)"]'
  career_goals: Motivated by recent life changes, Robert aims to advance from production line worker to shift‑lead within the next three years, taking on supervisory duties that let him mentor new hires
    and oversee quality‑assurance processes. He plans to earn an associate degree in food science or a specialized quality‑management certification to deepen his technical expertise. Long‑term, he envisions
    launching a small catering venture that blends Afro‑Caribbean flavors with contemporary Miami culinary trends, leveraging his industry experience and his innate curiosity for innovative food concepts.
