  career_goals: Nora aims to transition from employee to owner of a reputable local painting and paper‑hanging contracting business. She plans to secure regular residential and small‑commercial contracts,
    obtain a professional master painter certification, and expand her client base through reliable service and word‑of‑mouth in the Park Falls community. Long‑term, she hopes to mentor apprentices, offer
    small‑scale workshops, and achieve financial stability that allows her to invest in a modest workshop space for training and DIY community projects.
