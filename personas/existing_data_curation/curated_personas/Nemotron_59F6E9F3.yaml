personas:
  professional: Schwanda Ladouceur, a seasoned full‑stack software developer with deep expertise in Java, Python, and C#, translates their preference for structure into meticulously documented RESTful API
    designs and disciplined cloud‑native architectures, while their relaxed stance on strict obligations lets them pivot agilely when project scopes shift, and they actively mentor junior engineers as they
    prepare to step into a senior architect role and launch a mentorship program for women from underrepresented backgrounds.
  sports: Schwanda Ladouceur participates in the Chicago Lakeside Running Club for regular lakefront jogs, cheers on the Chicago Cubs during baseball season, the Chicago Bears in fall football, and the
    Chicago Blackhawks for hockey, and occasionally joins a senior‑friendly pick‑up basketball game at a local community center.
  arts: Schwanda Ladouceur captures Chicago’s historic architecture with a vintage Leica, frequents live blues at Buddy Guy’s Legends and jazz nights at the Green Mill featuring artists like Esperanza Spalding,
    and devotes evenings to reading contemporary literature from award‑winning authors such as Toni Morrison and Octavia Butler, weaving these artistic experiences into their creative coding projects.
  travel: Schwanda Ladouceur favors relaxed, self‑guided road trips that combine cultural stops with nature, having driven the Great River Road to explore the Mississippi Delta’s music heritage and planning
    future visits to Savannah’s historic squares and Lisbon’s tiled neighborhoods, while also enjoying annual weekend retreats to the Wisconsin Dells with family.
  culinary: Schwanda Ladouceur expertly prepares Southern‑inspired comfort foods such as slow‑cooked brisket with smoked paprika and brown sugar rub, fresh heirloom tomato bruschetta garnished with garden‑grown
    basil and oregano, and sweet‑potato collard‑green gratin, sharing these meals at community potlucks and occasionally treating themselves to a slice of New York cheesecake after a jazz gig.
  core: Schwanda Ladouceur blends meticulous code craftsmanship with a habit of scattering coffee mugs across the garden bench, remains competitively driven yet delightfully disorganized, and finds balance
    in gardening, jazz, and DIY tech projects.
background:
  cultural: Schwanda is a Black woman who grew up in Chicago during the civil rights era, deeply rooted in the city's vibrant African‑American culture. Her family traditions include gospel music, church
    community gatherings, and soul food cooking, which have shaped her appreciation for music, food, and communal support. She participated in Black student organizations during college, fostering a sense
    of activism and mentorship that continues today. Schwanda's professional journey reflects both the challenges and triumphs of navigating a predominantly white tech industry, motivating her to advocate
    for diversity and inclusion within her local community and beyond.
attributes:
  skills: '["Java", "Python", "C#", "SQL", "RESTful API design", "AWS cloud services", "Azure cloud services", "Agile Scrum", "System architecture", "Legacy system modernization", "Mentoring"]'
  hobbies: '["Gardening", "Jazz and blues listening", "Reading (historical fiction, Black literature)", "Arduino and Raspberry Pi home automation projects", "Cooking soul food", "Board gaming", "Volunteer
    coding instruction", "Lakefront walking", "Urban photography"]'
  career_goals: Schwanda aims to transition into a senior architect or technical advisor role where she can lead a small, high‑performing team and shape strategic technology decisions. She wants to launch
    a community mentorship program in Chicago that supports Black women entering tech, contributing her competitive drive to foster the next generation of developers. Additionally, she plans to contribute
    to open‑source projects focused on accessibility and healthcare technology, publish a series of technical articles on system modernization, and eventually move into part‑time consultancy to retain flexibility
    while maintaining a lasting impact in the industry.
