  career_goals: Qin dreams of becoming a visual storyteller who can blend art and technology—perhaps an animator or graphic novelist—so he can share the bright, sometimes quirky, ideas that fascinate him.
    He also imagines designing interactive games that teach kindness and cultural appreciation. As he grows, he hopes to work in a collaborative studio where diverse voices are welcomed, and he wants to
    use his creativity to bring people together and make the world a friendlier place. He occasionally whispers that he'd like to be a teacher someday, because he loves helping friends understand new concepts.
