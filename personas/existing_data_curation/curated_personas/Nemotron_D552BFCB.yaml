personas:
  professional: A budding multimedia creator named Qin Zheng channels curiosity into drawing comics and turning them into short animations on a tablet, while their relaxed attitude toward deadlines leads
    them to prototype ideas spontaneously during after‑school art club sessions.
  sports: An enthusiastic soccer fan named Qin Zheng plays on the community youth league, cheers for the local Syracuse Orange, and explores the Onondaga Creek Trail on weekend bike rides, preferring informal
    kick‑about games with friends over regimented drills.
  arts: A creative storyteller named Qin Zheng fills sketchbooks with comic panels, experiments with watercolors and calligraphy in the school art club, idolizes Studio Ghibli soundtracks and Disney composers
    like John Williams, and proudly displays a collection of hand‑painted figurines.
  travel: An adventurous traveler named Qin Zheng dreams of camping in the Adirondack Mountains, has visited Niagara Falls on a family road trip, and hopes to explore the interactive science exhibits at
    the Smithsonian in Washington D.C., favoring spontaneous day‑trip plans over rigid itineraries.
  culinary: A budding chef named Qin Zheng loves helping roll pork‑and‑cabbage dumplings and garnish spring rolls with fresh ginger and scallions, can whip up a quick mac and cheese, and often experiments
    by adding a dash of soy sauce to pancake batter for a playful flavor twist.
  core: Qin Zheng blends a restless imagination with a love for collaborative play, juggling comic sketches, LEGO city builds, and soccer matches while worrying over unfinished projects and occasional health
    hiccups.
background:
  cultural: Qin is the son of first‑generation Chinese immigrants who settled in Syracuse. At home, Mandarin is spoken alongside English, and family traditions like Chinese New Year, the Lantern Festival,
    and Mid‑Autumn Mooncakes are celebrated with enthusiasm. The household values education and community harmony, which aligns with Qin’s kind and cooperative nature. Living in upstate New York exposes
    him to the seasonal rhythm of snowy winters and vibrant autumns, shaping his love for outdoor play and indoor creative projects. He bridges both cultures by sharing his Chinese heritage with classmates
    through school projects and embraces typical American childhood experiences, such as school sports and after‑school clubs.
