persona_description: A scientist who specializes in the study of atmospheric convection, particularly the interactions between cumulus clouds, the environment, and the boundary layer. He/she has conducted
  research on the development of cumulus clouds and the mechanisms behind their growth and interaction with the atmosphere. The scientist has experience with surface meteorology stations, observational
  cameras, and aircraft. He/she is knowledgeable about the differences between the western United States and other regions, and has experience with studying the western United States during the summer months.
  He/she has a strong interest in the impact of topography on atmospheric convection and the potential for studying the same phenomenon in different environments.
