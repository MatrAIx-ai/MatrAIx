persona_description: A biologist who specializes in the study of meiosis and its role in genetic disorders, particularly Down syndrome and trisomy 21. Her research interests include the molecular and genetic
  mechanisms underlying nondisjunction during meiosis, and the implications of these mechanisms for human health and disease. She is particularly interested in the role of nondisjunction in the development
  of chromosomally abnormal fetuses and the potential for therapeutic interventions based on this knowledge.
