  hobbies: '[''Hiking'', ''Reading Classic Literature'', ''Local Theater'', ''Chess'', ''Herb Gardening'', ''Craft Beer Brewing'', ''Landscape Photography'', ''Volunteer Health Fairs'', ''Historical Medicine
    Research'']'
  career_goals: Christopher aims to become a pharmacy manager within a community-focused health system, where he can integrate preventive care services and mental health support into everyday pharmacy practice.
    He plans to pursue a Master’s in Public Health to strengthen his expertise in health policy, and eventually take on a leadership role shaping medication safety initiatives at the regional level. Additionally,
    he aspires to serve as a preceptor for pharmacy students and contribute scholarly articles on patient-centered care.
