persona_description: A conservation biologist who is interested in the impact of dams and other stressors on diadromous fish populations in the Atlantic region. They are passionate about the recovery of
  diadromous fish and the complex interplay between species within diadromous assemblages. They have a deep understanding of the ecological relationships between diadromous fish and the potential for habitat
  change due to climate change. They are also knowledgeable about the socio-economic dimensions of dam removals and the benefits of reintroducing diadromous fish runs.
