personas:
  professional: Lisa Darling leverages her methodical planning, advanced Excel dashboarding, and empathic communication to excel in high‑volume customer service operations, transforming call center challenges
    into data‑driven improvements while they mentor new hires and champion process efficiencies.
  sports: Lisa Darling stays fit through Thursday night Zumba sessions at the community center, joins the Trailblazers Hikers for weekend treks in the Blue Ridge Mountains, and they passionately root for
    the Atlanta Falcons and the Atlanta Braves, while they also participate in a local charity 5K run organized by the church outreach program.
  arts: Lisa Darling finds solace in the choir’s harmonies, immerses herself in jazz legends like John Coltrane and soul icons such as Aretha Franklin, curates a vinyl collection featuring Herbie Hancock
    and Nina Simone, and they channel their creative energy into quilting projects inspired by Gee’s Bend patterns, often listening to these artists while stitching.
  travel: Lisa Darling prefers road‑trip itineraries that blend relaxation with cultural immersion, frequently escapes to Savannah’s historic squares, explores the culinary scene of New Orleans, enjoys
    weekend stays in Asheville’s mountain cabins, and they dream of a pilgrimage to the jazz heritage sites of New Orleans and the historic plantations of Charleston, all while budgeting travel expenses
    through a dedicated spreadsheet.
  culinary: Lisa Darling cooks Southern comfort dishes like baked fried chicken, collard‑green quinoa salad, and low‑sugar peach cobbler, substituting cream with Greek yogurt, incorporating kale into traditional
    gumbo, and perfecting her signature sweet‑potato‑black‑bean chili, and they showcase a moderate cooking skill that balances family tradition with health‑conscious experimentation.
  core: Lisa Darling is a detail‑driven garden‑to‑table enthusiast who merges a competitive customer‑service mindset with soulful jazz, community mentorship, and a penchant for over‑planning even the smallest
    grocery run, and they often find themselves double‑checking receipts for fun.
background:
  cultural: Lisa is an African-American woman raised in Lexington County, South Carolina. Her family’s roots in the Southern Black community have instilled a deep appreciation for church fellowship, storytelling,
    and intergenerational support. She grew up celebrating cultural milestones such as Juneteenth and Emancipation Day, and she embraces the rich culinary heritage of soul food while also valuing health-focused
    adaptations. The legacy of perseverance and education within her community motivated her to pursue a bachelor's degree in business and to mentor younger neighbors. Lisa’s cultural identity shapes her
    values of reliability, collective uplift, and a pragmatic optimism that guides both her professional approach and her community involvement.
