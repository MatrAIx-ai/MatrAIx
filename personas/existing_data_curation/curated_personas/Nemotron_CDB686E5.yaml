  career_goals: Lisa aims to advance into a supervisory or management role within the customer experience department over the next three years. She plans to obtain a Certified Customer Service Professional
    credential and a Six Sigma Yellow Belt to strengthen her process-improvement toolkit. In the longer term, she is considering pursuing an online MBA to broaden her strategic expertise and eventually
    transition into an operations-manager position. She also hopes to lead a cross-functional team that designs and implements a company-wide customer-satisfaction improvement program, leveraging her data-driven
    approach and competitive drive to achieve measurable results.
