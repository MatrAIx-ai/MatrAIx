personas:
  professional: Pablo Perez, a seasoned civil‑mechanical engineer with deep expertise in CAD, finite‑element analysis, and lean process optimization, channels their competitive drive and love for structure
    into consistently delivering large infrastructure projects on time and under budget while mentoring multidisciplinary teams; they thrive on clear milestones and data‑driven decisions.
  sports: Pablo Perez anchors a local bowling league with the Olympic Bowlers Association, stars on the Lewis County Rangers soccer team, hikes the Olympic Peninsula’s Hurricane Ridge Trails, fishes the
    Chehalis River on weekends, and follows the Seattle Seahawks, Seattle Sounders FC, and Portland Trail Blazers for inspiration; they relish the camaraderie and competitive edge of each activity.
  arts: Pablo Perez expresses their outgoing side by strumming acoustic guitar at family gatherings, attending Mexican cultural festivals featuring artists like Vicente Fernández and Los Tigres del Norte,
    and watching performances by the Seattle Repertory Theatre and films starring Gael García Bernal.
  travel: Pablo Perez plans methodical road trips that blend adventure and relaxation, having trekked the Canadian Rockies, explored the historic streets of San Miguel de Allende, and regularly camped along
    the Oregon Coast, while they dream of a future trek to Machu Picchu once their consulting workload eases.
  culinary: Pablo Perez, a confident home chef, perfects traditional Mexican dishes such as pork‑filled tamales made with masa, simmered pozole with hominy and dried chiles, and grills fresh Chehalis River
    trout seasoned with cilantro and lime, often pairing meals with homemade salsa verde; they love sharing these meals with friends and family.
  core: Pablo Perez, a 58‑year‑old engineer, blends meticulous project management with a vibrant social life, balancing competitive ambition and community mentorship while wrestling occasional stress through
    yoga, meditation, and a weekly ritual of cooking tamales; they often worry about meeting every deadline.
background:
  cultural: Born to Mexican parents who immigrated from Jalisco, Pablo grew up bilingual, speaking Spanish at home and English at school. Family gatherings are centered around music, storytelling, and food,
    and he continues to celebrate Día de los Muertos and Cinco de Mayo with the local Hispanic community in Chehalis. His cultural values of hard work, respect for elders, and collective responsibility
    shape his professional ethic, prompting him to mentor younger engineers and contribute to community projects. While he has assimilated into the Pacific Northwest lifestyle, he maintains strong ties
    to Mexican traditions through cooking, salsa dancing, and attending the annual Hispanic Heritage Festival, which also offers him a social outlet that balances his competitive and sociable nature.
