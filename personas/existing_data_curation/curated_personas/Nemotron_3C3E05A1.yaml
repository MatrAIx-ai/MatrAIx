  career_goals: Pablo aims to secure a senior project‑manager role overseeing large‑scale sustainable infrastructure projects in the Pacific Northwest, such as water‑resource upgrades and renewable‑energy
    installations. He plans to obtain his Professional Engineer (PE) license within the next two years and eventually launch his own consulting firm that offers cost‑effective, environmentally responsible
    solutions to small municipalities like Lewis County. He also hopes to expand his professional network by speaking at regional engineering conferences, and to give back by establishing a mentorship program
    for aspiring Hispanic engineers. Financial stability and a balanced workload are top priorities as he manages stress and seeks long‑term wellbeing.
