  hobbies: '[''Mixed-Media Painting'', ''Collage Art'', ''Community Theater'', ''Speculative Fiction Reading'', ''Contemporary Poetry'', ''Organizing Trivia Nights'', ''Dance Classes'', ''Neighborhood Clean‑up
    Events'', ''Zumba'', ''Hiking'', ''Mentoring At‑Risk Youth'']'
  career_goals: Kelly aims to advance from her current managerial position to a senior operations director role within the next five years, overseeing multiple sites in Prince William County. She also envisions
    launching a boutique creative consultancy that blends her managerial expertise with her passion for art and innovation, offering branding, experiential design, and strategic planning services to local
    businesses. To support these goals, she plans to complete her GED, earn a project management certification, and build a professional network through industry conferences and mentorship programs.
