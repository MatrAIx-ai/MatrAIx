personas:
  professional: Kelly Brown is a senior operations manager in Prince William County whose design‑thinking approach and disciplined organization transform complex projects into streamlined processes, while
    their competitive edge and skeptical risk assessment keep teams focused and accountable.
  sports: Kelly Brown fuels their high‑energy lifestyle with weekly Zumba classes, bi‑weekly hikes with a local trail club, and avidly follows the Washington Capitals and Washington Wizards, balancing competitive
    spirit with a community‑oriented fitness mindset.
  arts: Kelly Brown immerses themselves in community art workshops experimenting with mixed‑media collage, frequents the Prince William County Playhouse for contemporary theater, and draws inspiration from
    speculative fiction authors like N.K. Jemisin and visual artists such as Yayoi Kusama.
  travel: Kelly Brown prefers weekend getaways to nature spots like Shenandoah National Park and cultural trips to New York City’s Broadway district, planning trips meticulously but allowing spontaneous
    detours for local festivals when time permits.
  culinary: Kelly Brown enjoys preparing Mediterranean quinoa bowls with feta and roasted vegetables, explores Thai coconut curry on a monthly basis, and indulges in dark chocolate and oat‑milk lattes,
    though they sometimes neglect meal prep during busy weeks, opting for take‑out.
  core: Kelly Brown is a disciplined, imaginative community catalyst who merges strategic operations with artistic flair, yet their skeptical competitiveness can occasionally stall collaborative momentum.
background:
  cultural: Kelly identifies as African American and grew up in historically Black neighborhoods of the Greater Washington, D.C. area. She celebrates cultural milestones such as Juneteenth, Black History
    Month, and family church gatherings, which have fostered a strong sense of community, resilience, and pride in her heritage. Her cultural perspective shapes her appreciation for storytelling through
    art, music, and oral traditions, and she actively participates in local cultural festivals, community service initiatives, and programs that empower Black youth and celebrate the African diaspora.
attributes:
  skills: '[''Team Leadership'', ''Operational Planning'', ''Budget Management'', ''Strategic Initiative Implementation'', ''Process Optimization'', ''Design Thinking'', ''Creative Problem Solving'', ''Community
