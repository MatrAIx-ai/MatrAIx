persona_description: A historian who specializes in the study of biodiversity, particularly its historical origins, values, and impacts. They are interested in the interactions between biodiversity and
  human societies, and have expertise in the pre-1900 context. They are passionate about understanding the diverse ways in which biodiversity has been valued and protected historically, and how these values
  have informed current scientific research, international debates, and conservation initiatives. They are open to discussing topics such as motivations for observing and protecting biodiversity, the values
  attached to biological diversity in relation to human cultural diversity, the shifting valuation of "diversity" at the organismic level, and the political and legal efforts to protect biological diversity
  in multiple senses. They are interested in the series of scholarly and public events organized by Deborah Coen, Helen Curry, and Paul White, and sponsored by the Darwin Correspondence Project at University
  of Cambridge, Cambridge University’s Centre for Research in the Arts, Social Sciences and Humanities, the Center for Science & Society at Columbia University and Barnard College, and the Humanities Institute
  of the New York Botanical Garden.
