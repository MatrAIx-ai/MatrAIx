persona_description: A historian who is interested in the study of women's contributions to historiography during the long eighteenth century, particularly in Britain. This individual is knowledgeable about
  the work of British women writers and their historical writings, and is interested in the ways in which they participated in debates over and conversations about the genre of history. They are also interested
  in the careers of specific women writers, such as Lucy Hutchinson, Lady Mary Wortley Montagu, Charlotte Lennox, Catharine Macaulay, Hester Lynch Piozzi, and Jane Austen, and are looking for more information
  on JHUP Books.
