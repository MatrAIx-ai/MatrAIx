personas:
  professional: Raquel Veitia is a 27‑year‑old middle‑school STEM teacher who designs hands‑on, bilingual lessons using Google Classroom and interactive whiteboards, mentors new teachers, and balances her
    love for structured curricula with a flexible, cooperative classroom atmosphere; they thrive on data‑driven assessment while fostering harmony among students.
  sports: Raquel Veitia energizes weekends with salsa dancing at a downtown studio and hikes the trails of Stone Mountain, while cheering on the Atlanta Falcons and the Atlanta Hawks, and they belong to
    a local hiking club that meets monthly.
  arts: Raquel Veitia captures everyday moments through photography, revels in salsa rhythms by artists like Celia Cruz and Marc Anthony, attends Latin American art exhibitions featuring Frida Kahlo reproductions,
    and unwinds with contemporary novels from authors such as Chimamanda Ngozi Adichie, letting these artistic experiences shape their weekend routine.
  travel: Raquel Veitia prefers spontaneous weekend getaways, often hopping on a bus to Asheville’s mountain trails or catching a budget flight to Cartagena’s historic walled city, while planning longer
    trips to New York for Broadway shows and to Mexico City for its vibrant street art; they balance this wanderlust with a modest teacher salary that necessitates careful budgeting.
  culinary: Raquel Veitia, an avid home cook, expertly prepares mofongo using fried plantains, garlic, and chicharrón, whips up arroz con gandules with sofrito, pigeon peas, and cilantro, and experiments
    with quick weekday dishes like shrimp tacos with mango salsa, savoring the blend of aromatic spices and fresh herbs; they often share these meals at family gatherings.
  core: Raquel Veitia blends structured teaching with spontaneous salsa steps, juggling a love for community STEM outreach and a habit of forgetting bill due dates, all while nurturing a garden and camera
    lens with equal devotion; they embody a pragmatic yet flexible approach to life.
background:
  cultural: 'Raquel was raised in a Puerto Rican household where Spanish and English were spoken interchangeably, fostering a strong bilingual identity. Family ties and community gatherings play a central
    role in her life, with traditions such as Día de San Juan, vibrant parades, and shared meals reinforcing cultural pride. She actively participates in Atlanta''s Puerto Rican community, contributing
    to local festivals and cultural organizations. This heritage informs her teaching philosophy: she incorporates multicultural examples in science lessons, celebrates linguistic diversity, and encourages
    students to view their cultural backgrounds as assets in learning and problem‑solving.'
attributes:
  skills: '["STEM lesson design", "Educational technology integration", "Bilingual instruction (English-Spanish)", "Classroom management with cooperative learning", "Differentiated instruction", "Data‑driven
    assessment", "Curriculum development", "Mentorship for novice teachers", "Community outreach coordination"]'
  hobbies: '["Cooking Puerto Rican cuisine", "Salsa dancing", "Hiking at Stone Mountain", "Reading popular science books", "Gardening", "Yoga", "Volunteering at community center for weekend STEM workshops",
    "Attending cultural festivals", "Journaling", "Photography"]'
  career_goals: Raquel aims to become a district STEM coordinator, creating interdisciplinary curricula that blend science, technology, engineering, arts, and mathematics while reflecting cultural diversity.
    She plans to earn a master's degree in Educational Leadership to qualify for assistant principal or principal roles, allowing her to influence schoolwide policy and equity initiatives. Long‑term, she
    envisions launching an after‑school robotics and coding club for underserved youth and developing bilingual STEM resource kits that empower families to engage with school learning at home.
