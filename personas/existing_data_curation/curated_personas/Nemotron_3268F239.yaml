  hobbies: '[''Abstract painting'', ''Mixed‑media sculpture'', ''Contemporary art gallery visits'', ''Reading philosophy and poetry'', ''Writing poetry'', ''Yoga'', ''Mindfulness meditation'', ''Beach photography'',
    ''Experimental plant‑based cooking'', ''Avant‑garde theater attendance'']'
  career_goals: Maite plans to expand her private practice in Arverne to include a dedicated art‑therapy wing that serves adults coping with trauma and grief. She is pursuing a Doctorate in Clinical Psychology
    to deepen her research on the role of imagination in resilience and hopes to publish scholarly articles on creative therapeutic interventions. In the next five years, she aims to become a certified
    art‑therapy specialist, mentor junior psychologists in the Queens community, and launch a low‑cost mental‑health workshop series in multicultural neighborhoods. Long‑term, she aspires to serve on the
    board of a local mental‑health advocacy organization and influence policy that promotes integrative, culturally responsive care.
