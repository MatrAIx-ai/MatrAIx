personas:
  professional: Maite Long, a licensed clinical psychologist in Arverne, combines rigorous CBT, DBT, and trauma‑focused therapies with expressive art techniques, because they rely on their vivid imagination
    and methodical precision to craft individualized treatment plans that foster resilience and emotional integration.
  sports: Maite Long jogs with the Rockaway Beach Running Club each spring, is a devoted fan of the New York Knicks, New York Mets, and NYC FC, and they supplement their cardio routine with weekly yoga
    sessions at Queens Mindful Flow studio to maintain flexibility and mental calm.
  arts: Maite Long draws creative energy from visits to MoMA and the Whitney, where the abstract color fields of Mark Rothko, the immersive installations of Yayoi Kusama, and Marina Abramović’s avant‑garde
    performances inspire their own mixed‑media sculptures, while evenings they often listen to Björk and reread Virginia Woolf’s literary masterpieces.
  travel: Maite Long has explored the historic neighborhoods of Seville, the contemporary art scene of Berlin, and regularly escapes to the tranquil Hudson Valley, and they dream of a future immersive retreat
    on Japan’s Shikoku island to deepen their contemplative practices.
  culinary: Maite Long experiments with plant‑based cuisine by preparing miso‑glazed tempeh, vegan lentil shepherd’s pie, and jackfruit tacos, skillfully pairing flavors like harissa, sumac, and fresh basil,
    and they frequently share their culinary creations at a Queens‑based global cooking club.
  core: Maite Long merges a disciplined therapist’s mind with an artist’s heart, navigating life through meticulous planning, boundless curiosity, and a habit of scribbling late‑night poetry in a leather‑bound
    journal, and they often schedule spontaneous sketching breaks between client sessions.
background:
  cultural: Maite Long is a White American of Irish‑German descent, raised in a suburban Long Island community during the 1960s and 1970s. Her family emphasized education, personal responsibility, and a
    strong work ethic, values typical of Mid‑Atlantic middle‑class culture. Proximity to New York City exposed her early to diverse ethnic neighborhoods, fostering an inclusive worldview and a respect for
    multicultural perspectives. While she celebrates traditional American holidays such as Thanksgiving and the Fourth of July, her adult life in Queens has deepened her appreciation for the city’s cultural
    mosaic, influencing her collaborative, harmony‑seeking approach to both therapy and community involvement.
attributes:
  skills: '[''Cognitive Behavioral Therapy'', ''Dialectical Behavior Therapy'', ''Trauma‑Focused Cognitive Therapy'', ''Art Therapy Integration'', ''Psychological Assessment'', ''Crisis Intervention'',
