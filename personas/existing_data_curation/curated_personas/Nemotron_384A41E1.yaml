  hobbies: '[''PC building and customization'', ''DIY electronics kits'', ''Desert hiking'', ''Target shooting'', ''Bass guitar playing'', ''Strategic video gaming'', ''Model building'']'
  career_goals: Alan aims to become a licensed journeyman electrician within the next two years, followed by acquiring a master electrician license to qualify for supervisory and design roles. He is interested
    in specializing in renewable‑energy installations, particularly solar, to align with Nevada’s growing clean‑energy market. In the long term, Alan envisions leading a small contracting crew or eventually
    starting his own electrical services business that emphasizes safety, quality, and reliable service for residential clients in the Las Vegas area.
