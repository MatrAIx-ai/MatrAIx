personas:
  professional: Alan Bloor, a diligent apprentice electrician in Las Vegas, combines their methodical, safety‑first mindset with hands‑on expertise in wiring, conduit bending, and solar panel basics, and
    consistently applies the National Electrical Code to deliver reliable installations while planning every job down to the last connection.
  sports: Alan Bloor, an avid desert‑trail hiker and regular at the local shooting range, follows the Vegas Golden Knights for hockey, supports the Las Vegas Raiders in football, and trains with the Red
    Rock Canyon hiking club, balancing cardio hikes with precision target practice to stay fit.
  arts: Alan Bloor, a reserved bass guitarist in a tight‑knit jam group, draws creative energy from classic rock legends like Led Zeppelin and modern synth‑pop artist Daft Punk, occasionally attends the
    monthly First Friday art walk in downtown Las Vegas, and enjoys building scale model kits as a tactile form of artistic expression.
  travel: Alan Bloor, a pragmatic traveler who prefers short, well‑planned road trips, has explored Zion and the Grand Canyon, dreams of witnessing Iceland’s geothermal power plants, and chooses budget‑friendly
    lodging but always packs a portable charger and a spare tool kit for any impromptu repairs.
  culinary: Alan Bloor, a competent home cook who favors hearty breakfast burritos with scrambled eggs, chorizo, and cilantro, enjoys grilling ribeye steaks seasoned with smoked paprika, and experiments
    with quick sous‑vide techniques despite occasionally over‑cooking the steak when distracted by a new PC build.
  core: Alan Bloor, a methodical 22‑year‑old electrician‑in‑training who balances desert hikes, bass grooves, and precise budget‑tracking, yet sometimes forgets to stretch before target practice, embodies
    a quiet blend of practicality and curiosity.
background:
  cultural: Alan comes from a white American background and was raised in the culturally diverse environment of Las Vegas, Nevada. Growing up near the entertainment hub and the expansive desert, he has
    been shaped by a blend of Southwest practicalism, a strong work ethic common in blue‑collar families, and exposure to a mix of regional traditions. His community values self‑reliance, punctuality, and
    respect for safety standards, which align with his structured and methodical personality. Though his family roots are in the local trades, he also appreciates the multicultural mosaic of the city, which
    informs his openness to varied perspectives while maintaining his personal cultural identity.
