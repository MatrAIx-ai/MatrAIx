  career_goals: Amelia aspires to combine her love of visual storytelling with her methodical mindset in a career that balances creativity and structure. She plans to pursue a bachelor's degree in graphic
    design or art history at a university such as Middle Tennessee State University, aiming to become a museum educator, exhibition designer, or freelance illustrator for children's books. In the short
    term, she is building a strong portfolio, seeking an internship at a local design studio, and aiming to excel in AP Art and English courses. Ultimately, she hopes to launch community art workshops in
    Murfreesboro that empower other teens to explore their creative potential.
