personas:
  professional: Amelia Mackay, an aspiring teenage illustrator, combines meticulous sketching, fluid watercolor techniques, and savvy digital illustration on Instagram, applying her curious mindset and
    methodical planning to a disciplined content calendar and collaborative art workshops.
  sports: Amelia Mackay stays active by hiking with the Murfreesboro Hiking Club, cheering the Tennessee Titans and Nashville Predators, and playing varsity soccer, blending cardio endurance, team camaraderie,
    and seasonal competition into her fitness routine.
  arts: Amelia Mackay immerses herself in the visual arts through watercolor studies of the Tennessee landscape, sketching at the Murfreesboro Art Center, and curating a vibrant Instagram feed inspired
    by artists such as Hayao Miyazaki, Loish, and Winslow Homer, which together shape her evolving creative identity.
  travel: Amelia Mackay has explored the Great Smoky Mountains, roamed Nashville’s music venues, and visited Asheville’s art districts, while dreaming of Kyoto’s temples and Iceland’s waterfalls, balancing
    school responsibilities with budget-friendly road trips and meticulously planned itineraries that blend adventure with artistic inspiration.
  culinary: Amelia Mackay enjoys crafting Southern comfort dishes like shrimp and grits and sweet potato biscuits, experimenting with Thai basil stir-fry and lemon blueberry muffins, and, with intermediate
    kitchen confidence, pairing meals with locally sourced honey and fresh rosemary, often sketching the plates before she cooks to capture their color and composition.
  core: Amelia Mackay, a curious and methodical teenage artist, blends sketchbooks with digital feeds, hikes trails, curates her savings via a custodial Roth, and wrestles with occasional eczema and mild
    anxiety while juggling school, art, and video-game design.
background:
  cultural: Amelia grew up in Murfreesboro, Tennessee, a city that blends Southern traditions with a vibrant college town atmosphere. Her family values hospitality, community involvement, and a strong work
    ethic, often gathering for church services, local festivals, and seasonal family meals featuring Southern cuisine such as fried chicken, collard greens, and homemade pies. Exposure to nearby Middle
    Tennessee State University has introduced her to a diverse arts scene, including concerts, theater productions, and museum events. She participates in community activities like the Murfreesboro Arts
    & Culture Festival and local farmer’s markets, which reflect the town’s emphasis on supporting local creators and preserving regional heritage. While her upbringing is rooted in typical Southern middle‑class
    experiences, she maintains an open curiosity toward broader cultural ideas and values education and artistic expression.
