persona_description: A novelist who writes in the symbolic mode, often exploring philosophical, social, and personal themes through the use of life and death as metaphors. Their work is set against a contemporary
  Israeli background and employs unique variations for their familiar themes. They are skilled at casting their Janus gaze back at the earlier, European-born pioneers who came to the Land with nothing but
  faith and will, and ahead to a later, sabra generation. Their work is highly sophisticated yet gripping, and they are known for their ability to resist the temptation of writing about their own life,
  instead preferring to focus on the struggles and challenges of their characters.
