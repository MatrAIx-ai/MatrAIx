personas:
  professional: Helen Menard, a four-year-old budding block architect, builds elaborate LEGO towers and cardboard cities, channeling her curiosity and love for unconventional ideas into creative construction
    while her relaxed attitude to rules often leaves a few pieces scattered and her competitive streak drives her to out‑build classmates during playtime.
  sports: Helen Menard, a four-year-old enthusiastic member of the Bright Stars Little Soccer Club that practices on Saturday mornings, delights in swimming lessons at the community pool, and cheers loudly
    for the local professional baseball team the City Giants while occasionally trying to mimic the moves of the Los Angeles Lakers during backyard basketball games.
  arts: Helen Menard, a four-year-old who adores drawing whimsical animals after watching episodes of Bluey, sings along to The Wiggles' Fruit Salad, and collects storybooks illustrated by Dr. Seuss, letting
    these colorful influences shape her own bedtime sketches and imaginative play.
  travel: Helen Menard, a four-year-old whose family has taken her to the city zoo, a sunny beach resort in Myrtle Beach, and a weekend trip to the Grand Canyon, now daydreams about riding the monorail
    at Disneyland and exploring the sparkle of the Eiffel Tower in Paris, though she often needs a familiar stuffed rabbit to feel secure during long journeys.
  culinary: Helen Menard, a four-year-old who prefers creamy macaroni‑and‑cheese, chicken nuggets with ketchup, and fresh strawberry slices, can butter toast with her tiny fingers, loves helping stir pancake
    batter, yet frequently refuses steamed broccoli, turning mealtime into a playful negotiation of flavors.
  core: Helen Menard, a four‑year‑old explorer, combines boundless curiosity with a competitive spark, turns snack time into a miniature art project, and wrestles with daily worries that turn simple routines
    into dramatic adventures.
background:
  cultural: Helen comes from a white American family living in Hawthorne, California. The family celebrates typical U.S. holidays such as Thanksgiving, Christmas, and Independence Day, and participates
    in community events that showcase the diverse cultural tapestry of Los Angeles County. Exposure to nearby multicultural neighborhoods adds a subtle appreciation for varied artistic traditions, while
    the household emphasizes curiosity, art, and flexible learning.
