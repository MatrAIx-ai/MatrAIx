personas:
  professional: Dong Go is a diligent property and casualty claims adjuster whose analytical precision, fluency in English and a heritage language, and collaborative mindset drive efficient investigations,
    data‑driven fraud detection, and customer‑friendly negotiations, while they mentor junior staff and plan for a senior managerial role.
  sports: Dong Go is a regular member of the adult soccer team the El Paso Strikers and a weekend hiker of the Franklin Mountains, balancing competitive matches with sunrise trail runs while cheering on
    the local El Paso Locomotive FC and the Texas Rangers.
  arts: Dong Go enjoys singing karaoke renditions of John Legend's 'All of Me' and Luis Miguel's 'Por Debajo de la Mesa', binge‑watches mystery series like 'True Detective', and regularly tackles strategic
    board games such as 'Terraforming Mars', using these creative outlets to balance their analytical work.
  travel: Dong Go prefers structured weekend trips that combine hiking the Guadalupe Mountains with exploring Santa Fe's art galleries, while planning longer adventures to Mexico City and Barcelona to practice
    Spanish and sample global cuisines, all balanced against family responsibilities and work deadlines.
  culinary: Dong Go is a confident home chef who masterfully prepares fermented kimchi and marinated bulgogi alongside crisp fish tacos and jalapeño‑infused guacamole, favoring fresh napa cabbage, gochujang,
    ancho chilies, and cilantro, and often experiments with sous‑vide techniques while indulging in occasional take‑out from the city's best Tex‑Mex taquerias.
  core: Dong Go blends methodical claim‑handling expertise with a sociable karaoke‑loving streak, juggling disciplined budgeting and occasional health‑check procrastination while fueling a passion for soccer,
    hiking, and culinary experimentation.
background:
  cultural: Dong Hoon is a first‑generation Korean‑American whose family maintains strong ties to Korean heritage while embracing life in Texas. Raised with Confucian values of respect for elders, education,
    and communal harmony, he celebrates traditional holidays such as Seollal and Chuseok and participates in a local Korean church. At the same time, he has adapted to the multicultural environment of El
    Paso, enjoying cross‑border festivals, integrating Spanish greetings, and appreciating the blend of Korean and Texan cuisines. This bicultural perspective informs his collaborative work style, his emphasis
    on harmony in client interactions, and his desire to bridge cultural gaps within the insurance community.
