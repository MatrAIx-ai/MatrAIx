  career_goals: Looking ahead, Dong Hoon aims to advance to a senior claims manager role within the next five years, where he can lead a regional team and drive process improvements. He plans to earn the
    Chartered Property Casualty Underwriter (CPCU) designation to deepen his technical expertise. His ambition includes developing a data‑driven claims handling framework that reduces cycle time while enhancing
    customer satisfaction. He also wants to mentor new adjusters, fostering a supportive culture that reflects his cooperative nature. In the longer term, he envisions transitioning into risk consulting,
    perhaps establishing his own consulting practice focused on cross‑border insurance issues that leverages his bilingual abilities and knowledge of both Korean and Texan business environments.
