personas:
  professional: Jean Mcneil is a claims adjuster and investigator who channels her investigative curiosity and practical mindset into dissecting complex insurance claims, balancing meticulous data analysis
    with a relaxed, flexible workflow while mentoring junior colleagues using her education training.
  sports: Jean Mcneil hits the Finger Lakes trails for weekend hikes, joins the Rochester Runners club for charity 5 K races, and follows the Buffalo Bills and Buffalo Sabres with a competitive spirit that
    mirrors her work style.
  arts: Jean Mcneil unwinds with the atmospheric mystery novels of Tana French, the soulful folk of Gillian Welch, and the sharp wit of community theater productions starring local actors like Derek St Clair,
    while capturing rural landscapes through a Canon DSLR that doubles as claim documentation.
  travel: Jean Mcneil prefers low‑key road trips that blend outdoor exploration with cultural immersion, often cruising the Finger Lakes in late autumn, and dreaming of a spring trek through the Scottish
    Highlands to trace ancestral roots while balancing family responsibilities.
  culinary: Jean Mcneil, an adept home‑cook, often whips up herb‑infused roasted chicken with rosemary and thyme from her garden, hearty Irish stew with potatoes and carrots, and pairs meals with local
    Finger Lakes Riesling, while occasionally indulging in a slice of New York‑style pizza on lazy evenings.
  core: Jean Mcneil blends investigative curiosity with a laid‑back, sometimes messy workflow, juggling secretive skepticism, a love for puzzles, and an occasional tendency to procrastinate on paperwork
    while still delivering sharp claim resolutions.
background:
  cultural: Jean Marie is a white American of Irish‑Scottish ancestry who grew up in a small town near Rochester, NY. Raised in a middle‑class family that valued education, hard work, and community involvement,
    she internalized the practical, self‑reliant ethos of upstate New York while also embracing the region’s seasonal traditions, such as autumn fairs and St. Patrick’s Day celebrations. Her upbringing
    in Monroe County exposed her to a mix of cultural influences, fostering an appreciation for diverse perspectives yet grounding her in mainstream American customs and the region’s strong ties to the
    insurance and manufacturing sectors.
