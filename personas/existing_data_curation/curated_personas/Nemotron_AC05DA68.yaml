  career_goals: Jean Marie aims to advance to a senior investigative or claims management position where she can lead a team focused on improving efficiency and fraud detection. She plans to earn professional
    certifications such as the CPCU and AIC to deepen her expertise. Leveraging her education background, she aspires to design comprehensive training programs for the insurance division and eventually
    consult on claim‑process innovation, incorporating data analytics and emerging technologies while honoring reliable, established practices.
