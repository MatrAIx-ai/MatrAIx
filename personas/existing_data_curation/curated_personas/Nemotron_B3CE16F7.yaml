    and community engagement'']'
  hobbies: '[''Cooking Vietnamese cuisine'', ''Playing badminton'', ''Organizing community game nights'', ''Volunteering at cultural center (storytelling workshops)'', ''Watercolor painting'', ''Photography
    of festivals'', ''Attending live music concerts'', ''Cycling in the Texas Hill Country'', ''Reading historical fiction'']'
  career_goals: Looking ahead, Dung aims to transition into a district-wide special education coordinator role where he can shape policies that promote inclusive arts programming for students with diverse
    needs. He plans to earn a Master’s degree in Special Education Administration, mentor new teachers, and launch a community outreach initiative that pairs local artists with special-needs classrooms.
    Ultimately, he aspires to influence state-level legislation to increase resources for culturally responsive special education.
