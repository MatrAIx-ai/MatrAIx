personas:
  professional: Dung Nam, a veteran special education teacher and arts‑integrated curriculum designer, leverages over a decade of experience, bilingual fluency, and a structured–yet‑flexible mindset to
    craft inclusive IEPs while effortlessly energizing colleagues with their talkative, collaborative style.
  sports: Dung Nam, an active member of the Austin Badminton Club, organizes weekly mixed‑doubles games, cycles the Texas Hill Country on weekends, and cheerfully follows the Dallas Cowboys and Houston
    Astros, adopting a sociable, flexible approach to fitness that blends competition with community bonding.
  arts: Dung Nam channels his love for watercolor into Monet‑inspired landscapes, captures the vibrancy of the Texas Folklife Festival through photography, and regularly attends live shows by Willie Nelson
    and the Austin City Limits Orchestra, allowing the intersection of Vietnamese storytelling and Texan music to shape his creative identity.
  travel: Dung Nam prefers spontaneous road trips, often biking to Hill Country vineyards or planning last‑minute group outings to New Orleans for jazz and historic tours, while also dreaming of a cultural
    pilgrimage to Hanoi to explore his family’s heritage, balancing relaxed planning with occasional meticulous itinerary tweaking for group activities.
  culinary: Dung Nam, a proficient home cook, spends weekends perfecting pho broth with star‑anise, ginger, and simmered beef bones, rolls fresh summer rolls with rice paper, cilantro, and Thai basil, and
    experiments with Texas brisket smoked over mesquite, merging Vietnamese flavors with local Texan barbecue traditions.
  core: Dung Nam is a socially vibrant, structure‑loving educator who blends art and inclusivity, indulges in spontaneous cooking and travel, and balances meticulous professional planning with a delightfully
    relaxed, occasionally disorganized personal life.
background:
  cultural: Dung was raised in a Vietnamese-American household where family ties, respect for elders, and collective harmony were core values. He grew up speaking both Vietnamese and English, celebrating
    traditions such as Tet and Mid-Autumn Festival while also embracing the multicultural fabric of Fort Bend County. His heritage informs his teaching philosophy, emphasizing inclusive practices that honor
    cultural diversity and promote a sense of belonging for all students. Dung remains actively involved in the local Vietnamese community, participating in cultural events and supporting new immigrant
    families.
attributes:
  skills: '[''Individualized Education Program (IEP) development'', ''Differentiated instruction'', ''Applied Behavior Analysis (ABA)'', ''Behavioral intervention planning'', ''Classroom management'', ''Bilingual
