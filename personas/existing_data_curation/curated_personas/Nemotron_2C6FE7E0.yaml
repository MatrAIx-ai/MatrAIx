personas:
  professional: Cynthia Terranova is an aspiring junior coder and budding illustrator who channels their curiosity into creating simple games on a tablet, designs LEGO models that tell adventure stories,
    and leads soccer scrimmages with friends, showcasing a blend of organized planning, flexible creativity, and a competitive spirit.
  sports: Cynthia Terranova plays forward for the local after‑school soccer club, idolizes Alex Morgan, cheers for the U.S. Women’s National Team, and spends weekends honing dribbling drills while competitively
    challenging friends to mini‑tournaments on the neighborhood field.
  arts: Cynthia Terranova spends evenings sketching scenes from "Harry Potter", painting vibrant seashell collages inspired by Van Gogh’s "Starry Night", and listening to the "Frozen" soundtrack while admiring
    the animation artistry of Pixar’s "Toy Story".
  travel: Cynthia Terranova loves weekend trips to the nearby state park to collect shells, dreams of exploring the Grand Canyon’s red rocks, hopes to visit Disney World’s Magic Kingdom, and prefers parent‑approved
    itineraries over spontaneous outings.
  culinary: Cynthia Terranova enjoys making rainbow fruit skewers with strawberries, blueberries, and pineapple, mastering the perfect cheese pizza slice, and proudly adding a dash of oregano to scrambled
    eggs, though they often forget to wash their hands before cooking.
  core: Cynthia Terranova is a fiercely curious seven‑year‑old who balances art, coding, and soccer with a competitive edge, a skeptical eye for promises, and a habit of leaving LEGO pieces scattered across
    the floor.
background:
  cultural: Cynthia comes from a white, middle-class family living in Midlothian, Virginia. Her upbringing blends typical suburban American values with the regional culture of Chesterfield County, including
    participation in community events, holiday celebrations, and visits to local institutions such as the Virginia Museum of Fine Arts and historic farms. Her family emphasizes education, artistic expression,
    and community service, providing her with both stability and exposure to diverse experiences.
