personas:
  professional: Eddie Brown, a former senior systems engineer turned retiree, channels a graduate engineering background, expertise in systems architecture, risk assessment, and technical documentation
    into volunteer consulting for non‑profits and leading community STEM workshops, applying a structured, reliable approach and an assertive yet compassionate mentoring style to guide both youth and fellow
    retired engineers.
  sports: Eddie Brown follows the Miami Heat and Miami Dolphins, plays weekly senior tennis at the Hollywood Country Club during cooler months, joins a local beach volleyball league in summer, and maintains
    daily brisk walks along Hollywood Beach to keep joints flexible, favoring low‑impact exercise that aligns with their structured routine.
  arts: Eddie Brown immerses themselves in classic soul legends like Aretha Franklin and Marvin Gaye, jazz greats such as Miles Davis and John Coltrane, and contemporary R&B artists like H.E.R. and John
    Legend, while also enjoying Ken Burns' science‑history documentaries and attending local heritage festivals celebrating African‑diaspora and Caribbean traditions, letting music and storytelling shape
    their reflective downtime and narrative voice for a memoir.
  travel: Eddie Brown prefers meticulously planned trips that balance relaxation with cultural enrichment, often choosing week‑long cruises to the Bahamas, weekend drives to the historic streets of Savannah
    and New Orleans, and annual visits to the Kennedy Space Center, while staying within a modest retirement budget and occasionally postponing overseas adventures due to health‑related anxiety.
  culinary: Eddie Brown enjoys cooking Southern‑Florida fare such as shrimp and grits, stone crab claws, and key lime pie, frequently seasoning dishes with fresh herbs like cilantro and rosemary harvested
    from their garden, pairing meals with classic soul jazz playlists, and indulging in an occasional habit of over‑seasoning with extra hot sauce, a guilty pleasure that sometimes leaves a lingering burn.
  core: Eddie Brown is a detail‑driven, garden‑loving retiree who applies lifelong engineering precision to community STEM mentoring while battling persistent anxiety that fuels meticulous planning and
    occasional procrastination.
background:
  cultural: Eddie grew up in the post‑civil‑rights era as an African‑American in the South, absorbing the strong community bonds of church, family, and neighborhood that emphasized perseverance and mutual
    support. His family traditions include Sunday gospel services, cooking soul food with a Florida twist, and celebrating milestones like Juneteenth and Kwanzaa. Living in Broward County, he is also influenced
    by the vibrant Caribbean diaspora—particularly Haitian and Jamaican neighbors—reflected in his appreciation for Caribbean music, food, and cultural events. These experiences have shaped his identity
    as a proud Black man who values education, mentorship, and community service.
attributes:
  skills: '["Systems architecture","Data analysis","Risk assessment","Technical documentation","Project management","Team leadership","Mentorship and training","Community STEM outreach"]'
  hobbies: '["Vegetable gardening","Scale model building","Chess","Crossword puzzles","Reading science‑history","Listening to soul and jazz music","Cooking Southern‑Florida cuisine","Beach walking","Church
    choir participation","Attending cultural festivals"]'
  career_goals: Although no longer in the formal workforce, Eddie aims to remain professionally active through volunteer consulting for local non‑profits, especially those that support under‑represented
    youth in STEM. He hopes to develop a small mentorship program that pairs retired engineers with high‑school students in Broward County, securing modest grant funding to sustain it. Additionally, he
    is working toward completing a certification in geriatric mental‑health first aid to better manage his own anxiety and to help peers. He also aspires to author a memoir that reflects on his career,
    the evolution of technology, and the importance of resilience in the Black community.
