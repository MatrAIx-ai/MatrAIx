personas:
  professional: Mariza Perez, a community heritage advocate and informal educator, leverages their bilingual fluency, seasoned garden wisdom, and culinary mastery to lead language-and-cooking workshops
    that blend traditional festivities with Southern ingredients, channeling their practical curiosity and competitive bridge mindset into meticulously adaptable sessions while resisting rigid planning.
  sports: Mariza Perez, a dedicated member of the Lowcountry Nature Walkers club, supports the Carolina Panthers and Clemson Tigers on game days, enjoys seasonal bird‑watching trips to the Francis Marion
    National Forest, and maintains a light fitness routine of garden‑stretching, gentle Tai Chi, and occasional community basketball viewing parties.
  arts: Mariza Perez, an avid flamenco aficionado, fills their home with recordings of Camarón de la Isla and Paco de Lucía, treasures the piano works of Manuel de Falla, devours mystery novels by Agatha
    Christie, and volunteers to curate a quarterly craft exhibit at the local cultural center, channeling their competitive curiosity into curatorial decisions.
  travel: Mariza Perez, a cautious yet curious traveler, favors small‑group cultural tours that combine visits to historic sites like Seville’s Alcázar and Barcelona’s tapas bars with relaxed Southern road
    trips to Savannah’s riverfront and Charleston’s historic district, always budgeting for comfortable lodging and travel insurance to accommodate health considerations.
  culinary: Mariza Perez, a seasoned home chef, masterfully prepares seafood paella infused with saffron and chorizo, cool gazpacho brimming with cucumber and olive oil, and inventive tapas that merge okra
    and collard greens, while joyfully experimenting with fresh garden herbs yet sometimes over‑salting dishes in the excitement of entertaining guests.
  core: Mariza Perez blends a lifelong love of language, cooking, and garden herbs with a competitive bridge mindset, guarding a skeptical eye toward new commitments while embracing flexible, low‑key social
    rituals and a steadfast dedication to personal health.
background:
  cultural: Mariza was born in Andalusia, Spain, and emigrated to the United States in the early 1970s. She retains a strong Spanish identity, speaking fluent Castilian Spanish at home and celebrating holidays
    such as Día de los Reyes, Semana Santa, and the Feria de Abril with family. Living in North Charleston, South Carolina, she has integrated Southern customs—attending the local Catholic parish, enjoying
    Southern hospitality, and incorporating regional ingredients like okra and collard greens into her cooking. She participates in the nearby Spanish Cultural Center’s events, sharing her heritage while
    also embracing community traditions like low‑country barbecues and church potlucks. This blend of Spanish and Southern influences shapes her worldview, tastes, and social engagements.
