  career_goals: At 76, Mariza’s ambition centers on legacy rather than a traditional career. She aims to preserve her family’s stories by compiling a written memoir and a photo archive that blend Spanish
    heritage with her life in the American South. She hopes to mentor younger Spanish‑speaking residents in North Charleston, offering informal language lessons and cooking workshops. Maintaining her independence
    and health is a top priority, so she plans to stay active through regular walks, gardening, and light exercise. Mariza also wants to become more proficient with tablets and video‑calling platforms to
    keep in touch with distant relatives and to share her cultural knowledge online.
