personas:
  professional: Miguel, a two‑year‑old with a natural flair for order, runs his playroom like a miniature office, sorting blocks by hue, arranging snack times on a tiny calendar, and politely but firmly
    cueing his parents to follow the schedule, showcasing early project‑management talent and practical curiosity.
  sports: Miguel, a two‑year‑old, enthusiastically attends the local Uvalde Tots Soccer Club’s Saturday morning sessions, waves a miniature San Antonio Spurs banner during games, loves splashing in the
    community pool in summer, and insists on doing a quick ‘wiggle‑wiggle’ dance before bedtime as his personal fitness ritual.
  arts: Miguel, a two‑year‑old, delights in dancing to the lively rhythms of Luis Miguel and the playful tunes of Sesame Street, creates vibrant finger‑paint masterpieces inspired by Pixar’s “Toy Story”,
    and eagerly watches family karaoke nights featuring classic mariachi songs, immersing himself in a rich tapestry of music and visual art.
  travel: Miguel, a two‑year‑old, adores car rides to the San Antonio River Walk where he splashes on the splash pads, dreams of visiting Disney World’s Magic Kingdom, and cherishes annual family trips
    to his grandparents’ rural home in New Mexico, balancing his love of familiar comforts with budding wanderlust.
  culinary: Miguel, a two‑year‑old, prefers soft tacos filled with shredded chicken, mild cheese, and avocado slices, enjoys helping his mother stir warm mango‑coconut oatmeal, and insists on dipping his
    carrot sticks in a tiny bowl of ranch, showcasing his developing palate and enthusiastic but limited cooking participation.
  core: Miguel, a two‑year‑old, blends hyper‑organized snack rituals, contagious curiosity, and sudden emotional meltdowns into a uniquely vivid toddler personality.
background:
  cultural: Miguel is a Mexican‑American toddler raised in a bilingual household in Uvalde, Texas. He grows up hearing both Spanish and English at home, celebrating Mexican traditions such as Día de los
    Muertos and Mexican Independence Day alongside local Texan holidays. Family gatherings feature traditional Mexican food, music, and storytelling, fostering a strong sense of cultural identity that blends
    Mexican heritage with the broader American community.
