  career_goals: Approaching retirement age, Marcus aims to transition into a senior management role such as store manager or district trainer, where he can mentor younger associates, drive sales performance
    across multiple locations, and institutionalize best‑practice processes. He also envisions launching a part‑time consultancy focused on helping local small businesses streamline inventory and improve
    customer service. Ultimately, his ambition is to balance a reduced‑hour advisory position with increased involvement in community and family activities, while still maintaining a competitive edge in
    achieving top‑ranked store metrics.
