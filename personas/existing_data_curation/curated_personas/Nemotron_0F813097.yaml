  career_goals: Mehrzad aims to progress to a senior software engineer role within the next three years, positioning himself to lead a product team that creates culturally resonant digital experiences—such
    as interactive storytelling platforms or educational media tools. He hopes to become a technical lead who can mentor junior developers, embed humane design principles, and champion accessibility across
    the product lifecycle. Long‑term, he envisions launching his own startup or creative studio that fuses technology with the arts, enabling artists and educators to reach broader audiences. He also aspires
    to pursue a certification in UX research and a management‑focused program to broaden his strategic impact while maintaining a sustainable work rhythm that mitigates stress.
