personas:
  professional: Mehrzad Ellis, a full-stack web developer with a strong focus on user-centered design, wields Python, TypeScript, React, and D3.js to build accessible, narrative-driven applications, while
    their blend of curiosity and practicality fuels meticulous code reviews and proactive mentorship despite occasional bouts of stress-induced over-thinking.
  sports: Mehrzad Ellis, an avid hiker of the Santa Monica Mountains and weekend yoga enthusiast, proudly cheers for the Los Angeles Lakers, Dodgers, and Galaxy, and participates in the local Griffith Trail
    Runners club for Saturday trail runs and monthly beach volleyball matches.
  arts: Mehrzad Ellis, a frequent visitor to LACMA and MOCA and regular attendee of the Drafthouse Indie Film Festival, strums acoustic renditions of Bon Iver and Sufjan Stevens, drawing creative inspiration
    from visual artists like Kehinde Wiley and Banksy, which infuses their code with contemporary artistic sensibilities.
  travel: Mehrzad Ellis, who blends spontaneous weekend getaways with meticulously planned overseas trips, has explored Kyoto's street food, trekked the Canadian Rockies, and dreams of chasing the Northern
    Lights in Iceland while juggling a modest travel budget and a packed tech-meetup calendar.
  culinary: Mehrzad Ellis, an adventurous DIY cook with a growing knack for mastering spicy Korean tacos, homemade shakshuka, and maintaining a sourdough starter, delights in fresh cilantro, ginger, and
    miso, while also frequenting Los Angeles' multicultural eateries for authentic biryani and ramen.
  core: Mehrzad Ellis, at 28, fuses code, culture, and curiosity, channeling worry-driven meticulousness into accessible tech experiences while juggling yoga, guitar, and an unquenchable appetite for puzzles
    and board games.
background:
  cultural: Mehrzad grew up in a middle‑class Anglo‑American household in the Greater Los Angeles area. Though his ethnicity is identified as white, his family name reflects Persian ancestry, which has
    given him an affinity for cross‑cultural perspectives. The Los Angeles environment—rich in ethnic diversity, vibrant arts communities, and a strong tech ecosystem—has shaped his worldview. He embraces
    a progressive, eclectic cultural identity that values individuality, creative expression, and social responsibility. He frequently participates in local cultural festivals, supports independent art
    venues, and aligns with the laid‑back yet ambition‑driven ethos of Southern California.
