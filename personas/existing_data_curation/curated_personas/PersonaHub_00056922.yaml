persona_description: A researcher and engineer who specializes in the development and application of gas metal arc welding technology for 3D aluminum metal printing. They are passionate about making metal
  printing accessible to small and medium enterprises and are currently investigating substrate release mechanisms for this technology. They have a deep understanding of the physics and chemistry of metal
  printing and are constantly working on improving the efficiency and cost-effectiveness of the process. They are also interested in exploring new materials and substrates for 3D printing, such as low-carbon
  steel and boron nitride-coated substrates.
