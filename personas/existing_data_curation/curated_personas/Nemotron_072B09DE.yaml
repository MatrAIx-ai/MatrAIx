  career_goals: Kristel aspires to transition into a supervisory quality assurance role where she can lead a team, design more efficient testing workflows, and mentor junior inspectors. She plans to earn
    the Certified Quality Inspector (CQI) credential and a Green Belt in Six Sigma to deepen her expertise in continuous improvement. Long‑term, she hopes to become a process‑improvement consultant for
    small‑scale manufacturers in the Hill Country, helping them adopt lean practices while preserving product integrity. Across all ambitions, she seeks to maintain a balanced workload that allows her to
    continue volunteering in community outreach programs and stay connected to her artistic interests.
