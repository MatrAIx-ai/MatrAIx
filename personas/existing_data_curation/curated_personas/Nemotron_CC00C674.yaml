  hobbies: '[''Reading non‑fiction (logistics, tech, self‑improvement)'',''Puzzle solving'',''Strategy board games'',''Hunting and fishing'',''Home woodworking and electronics tinkering'',''Competitive
    online gaming'']'
  career_goals: Kyle aims to move from a stocker role to a supervisory position within two years, seeking a shift lead or logistics coordinator role where he can oversee a small team and drive operational
    improvements. He plans to enroll in a part‑time certification program in Supply Chain Management to strengthen his credentials. Ultimately, he hopes to manage a medium‑size distribution center or launch
    a modest e‑commerce fulfillment side business, while maintaining a stable income that eases his financial worries.
