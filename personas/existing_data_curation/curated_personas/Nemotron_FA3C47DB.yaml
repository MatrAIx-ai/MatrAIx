personas:
  professional: Scott Saliba, a 60‑year‑old wholesale and industrial sales supervisor, leverages three decades of forecasting, contract negotiation and metrics‑driven team management to impose structure
    on their regional operations while channeling their competitive edge into lean‑process improvements and mentorship initiatives.
  sports: Scott Saliba, a dedicated golfer at the Sunshine Country Club and a regular participant in the senior men’s walking group, follows the Tampa Bay Buccaneers, Rays and Lightning closely, using golf’s
    competitive nature to channel their drive while staying fit through weekly walks.
  arts: Scott Saliba, an avid reader of Agatha Christie and Michael Connelly mysteries and a fan of classic war films such as The Bridge on the River Kwai and Patton, finds the structured plots a comforting
    counterbalance to their anxiety‑filled days, often discussing these works at church bible study socials.
  travel: Scott Saliba, who meticulously plans weekend getaways, favors low‑stress trips to the Florida Keys, historic St. Augustine and an annual pilgrimage to the Newport Beach art festival, viewing each
    itinerary as a structured project that reflects their need for control, yet still dreams of a spontaneous road‑trip along the Pacific Coast after retirement.
  culinary: Scott Saliba, a garden‑to‑table enthusiast, regularly prepares citrus‑glazed grilled snapper with fresh tomatoes, basil and bell peppers, crafts homemade salsa from their own garden harvest,
    and occasionally indulges in a hearty steak‑and‑potatoes dinner at their favorite local steakhouse.
  core: Scott Saliba, a structured‑minded sales veteran with a competitive streak, balances meticulous work habits with hands‑on hobbies, while wrestling with anxiety‑driven intensity and a tender love
    for their gardening, classic mysteries, and community service.
background:
  cultural: Scott was born and raised in a middle‑class white family in the American South, moving to Florida in his early twenties to pursue work in the growing industrial sector. His upbringing emphasized
    self‑reliance, punctuality, and respect for hierarchy, values reflected in his preference for structure and predictability. The family’s Southern Baptist faith has shaped his moral outlook and community
    involvement, with regular church attendance and volunteer service. Growing up during the late 1960s and 1970s, he witnessed the nation’s social changes, which contributed to his cautious, sometimes
    skeptical view of others’ intentions. In Pasco County, he embraces the Floridian outdoor lifestyle—fishing, gardening, and supporting local sports teams—while maintaining a strong commitment to family,
    evident in his long‑term marriage and close ties with his adult children. His cultural identity blends Southern work ethic with the relaxed, recreational vibe of central Florida.
