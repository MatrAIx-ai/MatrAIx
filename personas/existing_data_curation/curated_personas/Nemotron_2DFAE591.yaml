  career_goals: Abigail dreams of a future where she can combine her love of animals with her practical, organized mindset. She frequently mentions wanting to become a veterinarian, imagining a day when
    she can diagnose and treat farm animals and pets in her hometown. At the same time, she is fascinated by the idea of teaching because it would let her share clear, step‑by‑step lessons and create a
    structured learning environment for younger kids. Her competitive nature pushes her to aim for top grades in science and to participate in school science fairs, hoping to earn recognition that will
    open doors to a veterinary program later on.
