personas:
  professional: Abigail Schuler is a budding junior soccer forward and comic strip creator who balances a structured practice schedule with spontaneous LEGO building sessions, using their competitive drive
    and practical mindset to aim for a team captain role while honing storytelling skills on paper.
  sports: Abigail Schuler plays forward for the River Valley Youth Soccer Club, cheers for the regional baseball team the River City Royals, and follows the national women’s soccer team, embodying a competitive
    spirit both on the field and in weekend fantasy league picks.
  arts: Abigail Schuler draws comic strips borrowing visual storytelling techniques from Jeff Smith’s Bone, designs LEGO creations with a cinematic flair, and relaxes to classic country tunes by Dolly Parton
    and Garth Brooks, often rewatching Pixar’s “Coco” for inspiration.
  travel: Abigail Schuler loves weekend family road trips to the nearby state nature park for rock hunting, dreams of hiking Acadia National Park’s rugged cliffs, and eagerly anticipates a future visit
    to Disney World’s theme parks, balancing adventure with school schedule constraints.
  culinary: Abigail Schuler enjoys cheesy pepperoni pizza, creamy macaroni and cheese made with sharp cheddar, and apple slices sprinkled with cinnamon, and they occasionally experiment with building veggie
    wraps using lettuce, carrots, hummus, and whole‑grain tortillas.
  core: Abigail Schuler is a 10‑year‑old soccer enthusiast with a competitive edge, a sketchbook‑loving comic creator, a LEGO architect, and a skeptical, sometimes disorganized planner who mixes structure
    with spontaneous fun.
background:
  cultural: Abigail was born and raised in Sumrall, a small town in Jefferson Davis County, Mississippi. Her family is part of the white, Southern community that values close‑knit family ties, church involvement,
    and local traditions. She attends a Baptist church where community events, Sunday school, and seasonal celebrations shape her sense of belonging. The region’s rural character means she often explores
    forests, farms, and the nearby rivers, developing an appreciation for nature and the rhythms of agricultural life. Local customs such as county fairs, fried catfish dinners, and country music gatherings
    influence her tastes and social activities. While she experiences a traditional Southern upbringing, school curricula and friendships introduce her to broader perspectives, fostering a nuanced view
    of her cultural heritage.
