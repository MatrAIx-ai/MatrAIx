persona_description: A historian and medical expert with a special interest in the history of coeliac disease. This person is likely to have a strong background in both medical history and dietary sciences,
  and is likely to have a deep understanding of the evolution and development of the condition over time. They may have a particular interest in the early descriptions of the condition and the different
  diets that have been tried to treat it, as well as the toxic components of the diet that were discovered. They may also have a keen interest in the genetic and non-genetic factors that contribute to the
  development of the condition, as well as the potential for the condition to be relatively common and frequently without classical symptoms. This person is likely to have a deep understanding of the history
  of coeliac disease, as well as the current state of research and treatment for the condition.
