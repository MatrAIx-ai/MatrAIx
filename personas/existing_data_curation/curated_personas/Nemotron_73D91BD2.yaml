    ''Quilting'', ''Local historical society volunteer'', ''Volunteer at town events'']'
  career_goals: Stacy’s primary career ambition is to advance from her current clerk role to an office manager or senior administrative supervisor within the next five years. She seeks to lead a small team,
    streamline workflows by implementing digital filing and process‑improvement systems, and negotiate vendor contracts to enhance cost efficiency. To support this transition, she plans to earn the Certified
    Administrative Professional (CAP) credential and attend local workshops on project management and leadership. Stacy also aims to mentor junior staff, sharing her practical expertise while upholding
    high performance standards. Long‑term, she envisions leveraging her community connections to coordinate larger town events, positioning herself as a reliable organizer and a bridge between municipal
    officials and residents.
