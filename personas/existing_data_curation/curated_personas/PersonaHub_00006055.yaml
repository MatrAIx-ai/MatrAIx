persona_description: A biologist and philosopher who is interested in the evolution of social and biological complexity, particularly in the context of conflict and creativity. She is particularly interested
  in the potential for conflict to be both destructive and constructive, and the ethical complexities that arise from it. Her research focuses on comparing construction processes in diverse systems, including
  biological and social systems. She is also interested in the themes of The Road, including conflict, creativity, and the potential for destructive and constructive outcomes.
