  career_goals: Although still only six, Inderjeet often talks about future possibilities. He dreams of becoming a scientist or engineer who can design inventions that make life easier for others, inspired
    by his love of building and exploring how things work. He also imagines working as a computer programmer, creating games that encourage quiet, focused play. His practical side leads him to want a career
    that offers stability and clear steps to master, so he envisions a path that involves formal education, mentorship, and consistent progress. He hopes his future work will allow him to help his family
    and community while giving him the quiet environment he values.
