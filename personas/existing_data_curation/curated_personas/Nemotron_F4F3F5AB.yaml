personas:
  professional: Inderjeet Patel, a budding young scientist, channels curiosity into building intricate LEGO structures, reading space picture books, and experimenting with simple science kits, all while
    quietly mastering the discipline of following step‑by‑step instructions before inventing new designs, and they often share their discoveries with a trusted adult.
  sports: Inderjeet Patel quietly follows the Boston Red Sox and Boston Celtics on TV, but prefers solitary activities like practicing soccer dribbling in the driveway, riding a balance bike on the neighborhood
    trail, and joining the local youth swimming class on Saturdays, blending gentle competition with personal fitness, and they cherish the calm routine of these solo sessions.
  arts: Inderjeet Patel spends free time drawing detailed animal and space scenes, listening to instrumental tracks by A.R. Rahman alongside Disney soundtracks like 'Let It Go' from Frozen, and enjoying
    audiobooks narrated by Morgan Freeman, all of which shape their imaginative creative identity, and they often replay favorite tunes while coloring.
  travel: Inderjeet Patel has visited the Boston Children’s Museum, explored the Natural History Museum, attended a cultural fair at the local Hindu temple, and dreams of a family road trip to the Kennedy
    Space Center in Florida and a future pilgrimage to the Ganges during Diwali, and they eagerly maps out these adventures with crayons and paper.
  culinary: Inderjeet Patel enjoys the sweet tang of mango lassi, the crisp bite of homemade vegetable samosa, and cheesy pizza slices, yet they only help with simple kitchen tasks like sprinkling cheese
    on a roti or stirring batter for dhal, preferring to taste and observe rather than cook independently.
  core: Inderjeet Patel is a quiet, curiosity‑driven six‑year‑old who balances meticulous LEGO building with dreamy space fantasies, delicate worries, and a penchant for solitary exploration, and they often
    find solace in quiet corners of the library.
background:
  cultural: Inderjeet comes from a South Asian (Gujarati Indian) family that settled in Cambridge, Massachusetts. At home, he hears both English and Gujarati, and his family celebrates Diwali, Holi, and
    Navratri with traditional foods, music, and rituals. The Patel household places a strong emphasis on education and community service, values common in many Indian families. Growing up in the diverse
    neighborhoods of Cambridge, he is exposed to a mix of cultures, which broadens his perspective while his family maintains close ties to Indian customs, such as praying at the local Hindu temple and
    participating in cultural events at the university’s South Asian student association.
