  hobbies: '[''Sketching and digital illustration'', ''Acoustic guitar improvisation'', ''Photography of rural landscapes'', ''Pickup basketball'', ''Competitive video gaming (League of Legends)'', ''Spontaneous
    road trips'', ''Attending art festivals and open-mic nights'', ''Volunteering at community events'', ''Reading philosophy and popular science'']'
  career_goals: Frank aims to turn his eclectic creative interests into a dynamic career that lets him move between art, media, and community engagement. He plans to pursue a post-secondary program in multimedia
    arts, creative technology, or communications, focusing on hands-on production and independent project work. His goal is to become a freelance content creator and event curator, producing short films,
    visual art installations, and live performances that highlight emerging talent in his region. He also dreams of building an online platform that showcases local artists and hosts virtual exhibitions,
    leveraging his social networking strengths. In the competitive arena, he hopes to qualify for regional e-sports tournaments and develop a streaming presence, merging his gaming passion with his ability
    to engage audiences. Ultimately, he seeks a career path that blends spontaneity, artistic experimentation, and the opportunity to lead collaborative projects while maintaining the calm, resilient mindset
    that helps him thrive under pressure.
