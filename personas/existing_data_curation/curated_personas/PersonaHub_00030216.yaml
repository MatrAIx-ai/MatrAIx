persona_description: A healthcare professional with expertise in the diagnosis, treatment, and management of E. coli infections, particularly those caused by E. coli enterohemorrhagic (EHEC) and E. coli
  O157:H7. They are familiar with the latest diagnostic methods, first aid treatment, and laboratory hazards associated with E. coli. They are also aware of the importance of prophylaxis and immunization
  in preventing E. coli infections, and the need for proper containment and personal protection in handling and storing infectious materials. They have a strong understanding of the regulatory and other
  information related to E. coli infections, including the latest research and developments in the field.
