  career_goals: David envisions a career that blends his love for art and technology. He aims to attend a university or art institute where he can major in graphic design, illustration, or interactive media.
    His long‑term ambition is to become a concept artist for video games or film, eventually launching his own freelance studio that creates immersive visual experiences. He also hopes to mentor younger
    artists through workshops and online tutorials, building a community around innovative visual storytelling.
