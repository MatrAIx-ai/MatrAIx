personas:
  professional: David Jackson is a teenage visual artist who fuses Procreate‑powered digital illustration with basic Python scripts to prototype interactive concept art, leveraging their disciplined project
    planning and collaborative spirit to lead school art club initiatives.
  sports: David Jackson hikes with the Mountain Explorers Club, competes on their high school cross‑country team, and rallies behind the Los Angeles Lakers and New York Yankees, balancing their love for
    outdoor endurance with a passion for watching professional basketball and baseball.
  arts: David Jackson draws inspiration from concept artist Feng Zhu, comic illustrator Alex Ross, and animator Hayao Miyazaki, frequently visits the annual downtown art fair to discover emerging talent
    and leads a weekly sketch‑and‑storytelling workshop for younger library patrons, reflecting their commitment to community creativity and they often invite peers to collaborate on mural projects.
  travel: David Jackson favors weekend backpacking trips to nearby state parks like Yellowstone, dreams of an immersive two‑week art pilgrimage through Kyoto and Tokyo to study Japanese animation studios,
    and is planning a family road‑trip to the Grand Canyon this summer to combine hiking with photography, showing they balance adventurous curiosity with budget‑conscious planning.
  culinary: David Jackson enjoys crafting vibrant avocado toast topped with feta and chili flakes, perfects a steaming bowl of miso ramen using kombu and pork broth, and often orders pepperoni pizza late
    at night while editing animations, a habit that reflects their blend of health‑conscious meals and indulgent comfort food.
  core: David Jackson channels boundless imagination into detailed sketches and code, balances disciplined planning with spontaneous bursts of creativity, and occasionally sacrifices sleep for late‑night
    pizza and gaming, embodying a teen who fuses art, tech, and quirky habits into a uniquely disciplined dreamer and they rarely miss a chance to share their latest creations.
background:
  cultural: David grew up in Meridian, Idaho, a suburban community in the Intermountain West. His family is of European descent, with roots in German and Irish ancestry. His upbringing reflects typical
    middle‑class American values—emphasis on education, community involvement, and appreciation for the outdoors—shaped by the region's natural landscape. He participates in local traditions such as Fourth
    of July parades, community potlucks, and seasonal celebrations like Thanksgiving, while also enjoying outdoor activities like hiking and fishing that are common in Idaho culture.
