  hobbies: '["Reading (historical fiction)", "Journaling", "Vegetable gardening", "Cooking traditional Mexican meals", "Knitting", "Crossword puzzles", "Listening to regional Mexican music", "Walking on
    nature trails"]'
  career_goals: Gloria aims to move into a supervisory role within the same retail setting, seeking a shift‑lead position that offers more responsibility while preserving the predictable routine she values.
    Over the next three years she plans to complete her associate’s degree in business administration and obtain a retail‑management certification, which would qualify her for store‑manager opportunities.
    Ultimately, she hopes to achieve a stable income that supports her family, provides financial security, and possibly enable her to open a small family‑run convenience store that blends Mexican culinary
    traditions with everyday necessities. Her career ambitions are rooted in practicality, job stability, and the desire to reduce financial stress.
