  hobbies: '[''Soccer (team captain)'', ''Volunteer work at local food bank'', ''Hiking and nature walks'', ''Digital photography'', ''DIY crafts and jewelry making'', ''Reading mystery & sci‑fi novels'',
    ''Social media content creation'']'
  career_goals: Deborah aims to complete her GED within the next year and enroll in a community college program focused on public administration or nonprofit management. She envisions a career as a community
    outreach coordinator, designing and leading youth mentorship and health‑promotion programs in the Cedar Hill area. Long‑term, she hopes to earn a bachelor’s degree, obtain certification in project management,
    and eventually direct a regional nonprofit that blends her love for organized planning, community service, and practical problem‑solving.
