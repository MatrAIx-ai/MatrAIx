persona_description: A historian or a researcher interested in the history of Jewish communities in France, particularly those in the region of Normandy. They are likely to be interested in the history
  of the Jewish settlement in Le Havre, the expulsions and deportations of Jews during the 18th and 19th centuries, and the establishment of organized Jewish communities in the 19th and 20th centuries.
  They would be interested in the contributions and contributions of Jewish communities to the cultural and economic life of Le Havre and the wider region.
