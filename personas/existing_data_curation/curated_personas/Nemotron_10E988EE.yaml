  career_goals: Although no longer in the formal workforce, Huseyin aims to remain professionally active by mentoring emerging engineers through a regional STEM nonprofit, serving on the board of a senior
    technology education initiative, and authoring a series of practical guides on project management for retirees. He also aspires to lead a fundraising campaign to upgrade the community center’s meeting
    spaces and to win the county’s senior chess championship, blending his competitive drive with community service.
