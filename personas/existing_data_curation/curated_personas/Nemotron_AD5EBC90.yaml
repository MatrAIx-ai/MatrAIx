  career_goals: Although retired, Cesario aims to stay purposeful and independent. He wishes to keep his home in optimal condition, expand his garden to provide fresh produce for family and neighborhood
    gatherings, and compile a family cookbook preserving his mother's recipes. He aspires to mentor a few younger neighbors in basic home‑maintenance and gardening, sharing his methodical approach. He also
    plans to document his life stories, focusing on his Mexican heritage and the immigrant experience in Los Angeles, to give future generations a tangible link to their roots. Ultimately, he seeks to remain
    healthy, self‑sufficient, and leave a lasting cultural and practical legacy within his community.
