  career_goals: Christy aims to leverage her STEM background to transition into a supervisory or operational role that values routine, efficiency, and people‑focused leadership. In the next three to five
    years she plans to earn a Six Sigma Green Belt and a certification in data analytics, positioning herself for a shift‑manager or operations‑coordinator position within retail or a logistics environment.
    Long‑term, she envisions managing a network of stores or leading process‑improvement projects in a manufacturing firm, while maintaining a stable schedule that supports her married life and family responsibilities.
