personas:
  professional: Christy Ruiz is an analytically driven retail operations specialist with a STEM bachelor’s degree, bilingual fluency, and hands‑on cashier experience who leverages meticulous cash handling,
    POS system expertise, Excel analysis, and basic Python scripting to streamline inventory and process efficiency while pursuing a Six Sigma Green Belt and a data‑analytics certification to move into
    a supervisory role that values routine and people‑focused leadership.
  sports: Christy Ruiz practices yoga twice a week at a local studio, follows the Los Angeles Lakers for basketball and the LAFC soccer team for football, and joins a community recreational soccer league
    on weekends, balancing structured fitness with team camaraderie.
  arts: Christy Ruiz unwinds by reading historical fiction authors such as Hilary Mantel and Ken Follett, listens to classical guitarist Andrés Segovia and pop vocalist Adele, and attends monthly community‑theater
    productions, allowing artistic expression to temper their methodical daily routine.
  travel: Christy Ruiz prefers meticulously planned trips, having recently explored Barcelona’s architecture and Valencia’s culinary scene, while dreaming of a Pacific Coast road trip that blends scenic
    drives, historic museum stops, and budget‑conscious accommodations.
  culinary: Christy Ruiz delights in preparing traditional Spanish dishes like saffron‑infused paella, tortilla de patatas, and chilled gazpacho, often seasoning with fresh rosemary, thyme, and basil harvested
    from their indoor herb garden, though they sometimes over‑season in enthusiasm.
  core: Christy Ruiz is an organized, routine‑loving operations enthusiast who balances analytical rigor, puzzle‑solving, yoga, and family cooking, yet occasionally lets perfectionism drive over‑budgeting
    and sporadic neglect of personal downtime.
background:
  cultural: Christy is of Spanish descent; her parents immigrated from Andalusia, Spain, in the early 1990s. Raised bilingual, she celebrates Spanish holidays such as Semana Santa, Día de los Reyes, and
    enjoys regional foods and music at family gatherings. The household emphasizes close‑knit relationships, communal meals, and the value of harmony—mirroring her cooperative nature. Living in Rockford,
    Illinois, she blends these traditions with Midwestern American customs, participating in local festivals while preserving Spanish customs through language, cuisine, and occasional trips to visit relatives
    in Spain.
