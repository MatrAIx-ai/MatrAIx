persona_description: Kim Tallbear, a Canadian Research Chair in Indigenous Peoples, Technoscience and the Environment, is a renowned scholar and advocate for Indigenous rights and perspectives. Her work
  directly challenges the compulsory monogamy and hetero/homo-normative couple-centric marriage, which she calls "compulsory monogamy and hetero/homo-normative couple-centric marriage." Her research focuses
  on how European settlement disrupted diverse forms of relating, sexuality, family and community practices, and how settler categorization of sexuality and the management of resources was "entangled with
  the state management of women, children, slaves, Indigenous people and other-than-human bodies," meaning land, animals and water. She has revealed how, according to research, "monogamous marriage was
  not a dominant worldview until the late 19th century." Her work examines how enforced marital practices especially targeted women's power and ties land tenure rights to heterosexual one-on-one, life-long
  marriages, thus tying women's economic well-being to men who controlled private property. She argues that "we must oppose a system of compulsory settler-sexuality and kinship that mark Indigenous and
  other relations as deviant."
