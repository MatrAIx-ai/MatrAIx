personas:
  professional: Anthony Wesley, a seasoned janitorial specialist with fifteen years of hands‑on facilities maintenance experience, combines meticulous floor‑care expertise, OSHA‑compliant safety practices,
    and a naturally cooperative demeanor to lead small crews, and they balance a love for structure at work with occasional spontaneous problem‑solving on the job.
  sports: Anthony Wesley, a die‑hard basketball enthusiast who roots for the New York Knicks and the Syracuse Orange, watches games with his wife and teenage kids on weekends, plays in the Syracuse Community
    Basketball League’s pickup games, and volunteers as a youth mentor in the local sports clinic, and they blend competitive spirit with community involvement.
  arts: Anthony Wesley, a choir‑singer who delights in classic R&B and blues legends like Marvin Gaye, Aretha Franklin, and Stevie Wonder while also crafting simple wood projects inspired by Popular Woodworking
    magazine, reads short stories by James Baldwin, and attends occasional Syracuse Stage productions, and they find creative expression both in music and hands‑on artistry.
  travel: Anthony Wesley, who blends careful trip planning with a spontaneous love for weekend getaways, enjoys family vacations to Washington, D.C., road trips exploring the Adirondack Mountains, and dreams
    of a future cruise to the Bahamas, and they balance budget‑friendly local adventures with occasional aspirational escapes.
  culinary: Anthony Wesley, a modestly skilled home cook, prepares soul‑food staples such as collard greens simmered with smoked turkey, sweet‑potato pie, and fried chicken seasoned with garlic and hot
    sauce, often incorporating fresh vegetables harvested from his backyard garden like okra and tomatoes, and they delight in sharing these hearty meals with neighbors and church fellowship.
  core: Anthony Wesley, a 40‑year‑old facilities veteran with a garden‑to‑table cooking habit, a love for basketball, and an easygoing yet organized outlook, balances routine with spur‑of‑the‑moment projects,
    sometimes splurging on power tools while diligently saving for a family‑run cleaning business, and they embody a blend of stability and spontaneous curiosity.
background:
  cultural: Anthony identifies as African‑American and was raised in a close‑knit Black community in the Syracuse area. His family’s roots trace back to the Great Migration, bringing a blend of Southern
    cultural traditions and Northern urban experiences. He grew up attending a historically Black church, where music, storytelling, and communal support were central. These influences shaped his values
    of resilience, respect, and collective responsibility. He celebrates cultural holidays such as Juneteenth and enjoys sharing the rich culinary heritage of soul food with friends and family. While he
    navigates the everyday realities of a working‑class life, he remains actively involved in local Black cultural events, community clean‑up initiatives, and mentorship programs that empower younger generations.
attributes:
  skills: '[''Floor care (strip‑and‑wax, carpet extraction, tile polishing)'', ''Chemical handling and safety compliance'', ''Basic plumbing and electrical repairs'', ''Inventory management of cleaning
    supplies'', ''Building inspections and safety checks'', ''Customer service and occupant communication'', ''Team coordination and scheduling'']'
  hobbies: '[''Basketball (watching and playing)'', ''Cooking soul‑food and family meals'', ''Backyard gardening'', ''Church choir participation'', ''Youth mentorship volunteering'', ''Listening to classic
    R&B and blues'', ''Reading short stories'', ''Woodworking projects'']'
  career_goals: Looking ahead, Anthony aims to move into a supervisory or facilities‑management role where he can mentor newer staff and help shape cleaning‑service standards for larger complexes. He plans
    to earn a Certified Janitorial Supervisor credential and complete a community college course in building operations to broaden his technical knowledge. Ultimately, he hopes to launch his own small,
    family‑run cleaning business that offers reliable, environmentally‑friendly services to local schools and churches, providing both financial stability for his family and a meaningful contribution to
    the community.
