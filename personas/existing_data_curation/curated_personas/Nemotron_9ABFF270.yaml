  hobbies: '[''Building with LEGO'', ''Drawing and coloring'', ''Playing at the park with peers'', ''Singing nursery rhymes'', ''Toddler music and movement classes'', ''Exploring nature with a magnifying
    glass'', ''Sorting and collecting stickers'', ''Organizing toy shelf'', ''Participating in group games (e.g., Simon Says)'']'
  career_goals: Michael’s curiosity and desire to help others lead him to dream about future roles that combine organization, learning, and service. He often talks about wanting to teach his friends how
    to play games, to fix things around the house, and to explore space, reflecting early aspirations of becoming a teacher, an engineer, or an astronaut. His family encourages preschool attendance and
    STEM‑focused play to nurture these ambitions toward a career centered on education, problem‑solving, and teamwork.
