  career_goals: Sergio aims to advance his healthcare career by completing an Associate of Science in Nursing at a community college in Southern California, with the goal of becoming a Registered Nurse
    within the next three years. He is particularly interested in geriatric and community health nursing, hoping to serve the growing Spanish‑speaking senior population in Riverside County. In the longer
    term, he envisions earning a Bachelor of Science in Nursing and eventually working as a nurse educator or health outreach coordinator, where he can combine his clinical expertise with his passion for
    promoting health literacy among underserved communities.
