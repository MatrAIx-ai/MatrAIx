personas:
  professional: Sergio Zamora is a nursing assistant who combines meticulous patient care skills with a calm, collaborative style, leveraging their penchant for structure while flexibly handling the unpredictable
    demands of a busy Riverside clinic.
  sports: Sergio Zamora enjoys casual Sunday soccer matches with a close‑knit group of friends, follows the Los Angeles Dodgers in baseball and the Los Angeles Lakers during basketball season, and maintains
    a modest fitness routine by jogging along the Riverside trail network during temperate evenings.
  arts: Sergio Zamora immerses themselves in historical fiction, revering works like "Don Quixote" and contemporary narratives, while cultivating a budding photography hobby inspired by Ansel Adams and
    listening to the flamenco guitar stylings of Paco de Lucía during quiet evenings.
  travel: Sergio Zamora prefers low‑key road trips that blend nature and culture, having explored Joshua Tree National Park and the historic streets of Seville, and dreams of trekking the Andes and visiting
    the coastal villages of Portugal, favoring spontaneous itineraries that fit within a modest travel budget.
  culinary: Sergio Zamora experiments in the kitchen with traditional paella, carefully sautéing chicken, chorizo, and shrimp with saffron‑infused rice, and crafts refreshing gazpacho using garden‑grown
    tomatoes, cucumbers, and olive oil, revealing a modest but passionate home‑cook level.
  core: Sergio Zamora is a quietly diligent nursing aide who balances a love for solitary reading and gardening with occasional spontaneous soccer games, a habit of over‑organizing notes while forgetting
    to water plants on busy weeks.
background:
  cultural: Sergio is a second‑generation Spanish American. His family maintains strong ties to Spanish customs, celebrating festivals such as Semana Santa and Dia de Los Muertos with traditional food,
    music, and gatherings. He grew up bilingual, speaking Spanish at home and English at school, which has given him a deep appreciation for both cultures. In Riverside’s diverse community, he often participates
    in local Hispanic cultural events and volunteers at community health fairs that serve Spanish‑speaking residents, reflecting his commitment to his heritage and to fostering cultural bridges.
