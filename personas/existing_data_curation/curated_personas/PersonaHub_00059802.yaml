  and have a deep understanding of his theories on international monetary relations. This person is interested in the potential benefits of a new international monetary system, such as a reduction in currency
  manipulation and speculation, and a response to the severe global problem of climate change. They are also interested in the potential drawbacks of such a system, such as the need for global reserve systems
  and the potential for disputes between nations.
