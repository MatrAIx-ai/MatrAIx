  hobbies: '["Hiking", "Nature photography", "Reading", "Acoustic guitar", "Animal shelter volunteering", "Cooking", "Theater attendance", "Board games", "Casual video gaming"]'
  career_goals: He aims to finish his associate's degree and transfer to a bachelor's program in Business Administration or Environmental Management, securing an entry-level role such as project coordinator
    or administrative assistant where he can apply his structured approach and help local community initiatives. In the long term he hopes to move into operations management or run a small community-focused
    business like a coffee shop, while continuing to develop coping strategies for stress and maintaining a stable, predictable career path.
