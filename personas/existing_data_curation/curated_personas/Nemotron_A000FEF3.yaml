personas:
  professional: Mabel Cason is an emerging community health volunteer coordinator who leverages their meticulous organizational skills and compassionate nature to design and lead peer‑to‑peer support workshops
    for seniors, blending practical curiosity with a steadfast commitment to follow through on every detail.
  sports: Mabel Cason enjoys light weekend hikes with the Colorado Trails Club, attends a weekly senior yoga class at the community center, and follows the Denver Broncos and Colorado Rockies, cheering
    them from home while occasionally joining a local volunteer‑run 5K for charity.
  arts: Mabel Cason finds inspiration in historical fiction by Ken Follett and Hilary Mantel, unwinds to the folk melodies of John Denver and the Avett Brothers, and channels creativity through knitting
    blankets for the shelter and attending the Colorado Shakespeare Festival's summer productions.
  travel: Mabel Cason plans trips with the same methodical care they apply to budgeting, favoring relaxed getaways like a weekend in Estes Park, a nostalgic drive through the historic Route 66 towns, and
    dreaming of a cultural immersion in Tuscany’s vineyards, yet they keep travel ambitions grounded by family responsibilities and a modest travel fund.
  culinary: Mabel Cason loves cooking comforting meals such as chicken pot pie with garden‑grown carrots and rosemary, hearty beef stew with potatoes, and fresh vegetable soup seasoned with thyme, while
    their knitting‑handy fingertips also craft homemade bread and apple crumble using heirloom apples from their own orchard.
  core: Mabel Cason blends practical curiosity with quiet compassion, obsessively plans every detail, worries over the smallest setbacks, and finds solace in knitting blankets for strangers while meticulously
    balancing a modest budget.
background:
  cultural: Mabel grew up in a small Midwestern town in a family that valued self‑reliance, modesty, and community service. She later moved to Colorado, where she embraced the outdoors‑oriented lifestyle
    of the foothills while retaining a strong sense of traditional American values. As a lifelong member of a local Protestant congregation, she participates in church‑based outreach and volunteer initiatives.
    Her cultural identity blends rural Midwestern roots with the collaborative, nature‑focused spirit of Colorado’s smaller communities, shaping her practical, compassionate, and community‑oriented outlook.
attributes:
  skills: '[''Organizational planning'', ''Household budgeting'', ''Volunteer coordination'', ''Basic computer literacy (Word, Excel, email)'', ''Gardening and horticulture'', ''First aid and CPR'', ''Creative
