  hobbies: '[''Reading historical fiction'', ''Gardening'', ''Birdwatching'', ''Knitting and crocheting'', ''Light hiking'', ''Cooking'', ''Journaling'', ''Small book club participation'']'
  career_goals: Although not currently employed, Mabel is determined to deepen her impact on the community. She plans to complete a community health volunteer certification and eventually take on a leadership
    role within the local senior center or the neighborhood outreach program. Her long‑term ambition is to develop a small network of volunteers that provides peer‑to‑peer support for isolated residents,
    especially seniors, and to organize regular workshops on stress‑management and practical life skills. Additionally, she hopes to compile her experiences into a guidebook for compassionate caregiving.
