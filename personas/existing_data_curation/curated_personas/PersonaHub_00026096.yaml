  is skilled in writing parallel MPI applications locally and on a cluster and is capable of executing parallel MPI applications both locally and on a cluster. He is familiar with the MPI programming model
  and can easily launch the same program across many different machines with a single command. He has unique knowledge and skills in using MPI.NET library and is skilled in writing parallel MPI applications
  in C# and other .NET languages.
