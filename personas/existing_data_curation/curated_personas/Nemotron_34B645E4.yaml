  hobbies: '[''Sketching landscapes'', ''Digital painting'', ''Acoustic guitar playing'', ''Creative writing (short stories, poetry)'', ''Reading science-fiction and nature non-fiction'', ''Coding simple
    Python games'', ''Nature photography of Alaskan wildlife'', ''Hiking in Anchorage area'', ''Cooking Mexican dishes with family'', ''Participating in virtual art workshops'']'
  career_goals: Luis aspires to combine his artistic talent and scientific curiosity by becoming a wildlife illustrator or environmental documentary creator. He plans to attend a STEM-arts focused high
    school and later study visual communication or environmental science. He hopes to produce compelling educational content about climate change and Alaskan wildlife that can reach both English- and Spanish-speaking
    audiences. Ultimately, he envisions working with conservation organizations where his methodical approach and collaborative spirit can contribute to community-based projects.
