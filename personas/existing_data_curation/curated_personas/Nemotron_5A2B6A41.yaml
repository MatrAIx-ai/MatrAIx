personas:
  professional: Laura Titera, a veteran higher‑education leader with thirty years of curriculum development expertise, weaves art, sustainability and social justice into learner‑centered courses, mentors
    early‑career faculty with a relaxed, open‑minded style, and they are currently shaping a new interdisciplinary program while authoring a guide on experiential learning.
  sports: Laura Titera enjoys low‑impact fitness through weekly hikes with the Monterey Bay Senior Hiking Club, occasional kayaking on the Pacific, and follows the San Jose Sharks and Oakland Athletics,
    preferring relaxed, social exercise sessions over rigid training regimens.
  arts: Laura Titera immerses herself in Monterey’s art scene by visiting the Monterey Museum of Art, painting watercolor seascapes inspired by Winslow Homer, discussing contemporary novels such as Kazuo
    Ishiguro’s Klara and the Sun and philosophical essays by Simone de Beauvoir at her weekly book club, and they channel this artistic passion into volunteering for a community literacy program.
  travel: Laura Titera favors flexible, curiosity‑driven travel, having explored the Venice Biennale, the Glastonbury Festival, and the historic ruins of Machu Picchu, while dreaming of attending Kyoto’s
    Gion Matsuri and the Marrakech Gnaoua World Music Festival, and they often craft itineraries around cultural festivals and historic sites rather than strict schedules.
  culinary: Laura Titera cooks Mediterranean‑inspired meals at an intermediate skill level, frequently preparing grilled branzino with lemon and oregano, chickpea‑spinach stew seasoned with rosemary, and
    ratatouille featuring fresh basil and locally sourced zucchini, while they relish harvesting herbs from their garden to infuse each dish with aromatic freshness.
  core: Laura Titera blends a lifelong curiosity for art and sustainability with a delightfully relaxed, sometimes disorganized approach to life, turning herb‑filled mornings, watercolor seascapes, and
    spontaneous festival trips into a harmonious, gently unconventional rhythm.
background:
  cultural: Laura grew up in a middle‑class family on California’s Central Coast, with ancestry tracing back to Irish and German roots. The region’s blend of maritime heritage, Spanish colonial influences,
    and a thriving arts community shaped her appreciation for cultural diversity and place‑based learning. Living in Monterey, she embraces the local emphasis on environmental stewardship, the Pacific coastal
    lifestyle, and the progressive, inclusive values characteristic of Northern California’s academic and artistic circles.
attributes:
  skills: '[''Curriculum Development'', ''Adult Learning Theory'', ''Interdisciplinary Course Design'', ''Digital Pedagogy'', ''Mentorship'', ''Educational Research'', ''Grant Writing'', ''Public Speaking'',
