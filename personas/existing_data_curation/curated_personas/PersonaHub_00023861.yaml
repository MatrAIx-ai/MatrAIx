persona_description: A physician who is dedicated to staying informed about the latest clinical developments and research in their field. They value concise, relevant, and engaging content that helps them
  understand and address the needs of their patients. They seek out news sources that feature artful visuals and explore current events that relate to the questions and concerns of their patients. They
  also appreciate research from peer-reviewed medical journals and medical research meetings, as well as other sources of breaking news. They seek out news services that offer a daily exchange with physicians
  and help them answer their own questions as well as their patients' questions.
