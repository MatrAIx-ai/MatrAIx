persona_description: A scientist who studies exoplanets and their habitability, particularly those that have a similar composition to Earth but are much hotter. They are interested in determining the atmospheric
  properties and habitability of these planets using techniques such as transit photometry and Doppler radial velocity. They are also interested in studying the atmosphere of Gliese 486b, which is the only
  planet so far detected orbiting the small star and has a radius 1.3 times larger than the Earth but is 2.8 times more massive.
