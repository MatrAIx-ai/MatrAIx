  hobbies: '[''Sudoku and logic puzzles'', ''LEGO architecture building'', ''Reading mystery and historical non‑fiction'', ''Journaling'', ''Volunteer book cataloging at the local library'', ''Playing piano'',
    ''Robotics club projects'', ''Organizing school supply drives'']'
  career_goals: Judy aims to pursue a career that capitalizes on her methodical nature and love of structure. She is drawn to fields such as civil engineering, data analytics, or accounting, where precise
    planning, systematic problem‑solving, and attention to detail are central. She envisions earning a STEM‑focused degree, gaining internships in engineering firms or analytics departments, and eventually
    contributing to projects that require rigorous design and organization.
