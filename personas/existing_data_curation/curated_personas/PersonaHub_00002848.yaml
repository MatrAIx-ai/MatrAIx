persona_description: A scientist who specializes in the study of scramjet technology, particularly in the development and testing of supersonic combustion ramjets. His research interests include the design
  and operation of scramjets, as well as the potential uses of scramjets for launching satellites and for super-fast passenger trips. He is also interested in the development of rocket technology and the
  use of scramjets as an efficient way of launching satellites into space. He has been involved in the development of the HyShot scramjet project and has been involved in the planning and execution of the
  latest test flight.
