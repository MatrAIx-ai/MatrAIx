  hobbies: '[''vegetable gardening'', ''woodworking'', ''reading historical fiction'', ''listening to big-band and gospel radio'', ''crossword puzzles'', ''card games with friends'', ''attending Sunday
    church services'', ''community potlucks'']'
  career_goals: Even at 94, Emmanuel’s primary ambition is to stay healthy and independent while continuing to contribute to his tight‑knit community. He aims to mentor his grandchildren and younger neighbors
    by sharing his practical skills, to document his family’s history for future generations, to remain an active volunteer at the local church and senior center, and to maintain his daily routine of gardening
    and walking to preserve his sense of purpose.
