  hobbies: '["art gallery visits", "street‑art photography", "hip‑hop dance classes", "beach volleyball", "experimental cooking", "live music (jazz, R&B)", "reading entrepreneurship and psychology books",
    "volunteering at youth career programs"]'
  career_goals: Tyshelle aims to move from the road into a leadership role within the logistics and transportation sector. Over the next five years she plans to complete a bachelor's degree in Business
    Administration while obtaining advanced certifications in supply‑chain management and become a licensed fleet manager. Her ambition is to supervise a team of drivers, implement more sustainable routing
    practices, and eventually launch her own minority‑owned transportation company that partners with local arts and cultural events for specialized freight services. She is also interested in mentoring
    other Black women entering the driving and logistics fields and advocating for greater diversity in the industry.
