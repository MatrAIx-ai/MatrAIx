personas:
  professional: Tyshelle Mcfarlane, a 28‑year‑old logistics specialist who transitioned from commercial driving to sales, blends meticulous route optimization and data‑driven reporting with an artistic
    eye, driving process improvements for freight services to cultural events while maintaining a competitive edge that keeps them cautious in negotiations.
  sports: Tyshelle Mcfarlane competes in beach volleyball leagues at Manhattan Beach, attends thrice‑weekly hip‑hop dance workshops, and avidly follows the Los Angeles Lakers and LA Galaxy, using these
    physical pursuits as outlets for stress and a platform to satisfy their competitive nature.
  arts: Tyshelle Mcfarlane curates a personal collection of street‑art photographs featuring works by Shepard Fairey, RETNA, and local muralists, frequents The Broad, MOCA, and LACMA for contemporary exhibitions,
    and spends nights at live shows headlined by Kamasi Washington, H E R, and emerging West Coast jazz ensembles, feeding a relentless curiosity for visual and auditory art.
  travel: Tyshelle Mcfarlane meticulously maps coastal road trips along the Pacific Coast Highway, has visited Santa Fe’s art markets, explored Tokyo’s neon districts, and soaked in Mexico City’s culinary
    vibrancy, yet often adds spontaneous stops for local festivals when the itinerary feels too rigid.
  culinary: Tyshelle Mcfarlane experiments in the kitchen by fusing Southern soul dishes like fried chicken and collard greens with California bounty such as avocado and heirloom tomatoes, creating plates
    like jalapeño‑infused shrimp‑and‑grits with citrus‑herb kale, showcasing an intermediate skill set and bold flavor ambitions.
  core: Tyshelle Mcfarlane is a disciplined 28‑year‑old logistics professional who merges a competitive drive, artistic curiosity, and anxiety‑fueled perfectionism into a life balanced between freight planning,
    street‑art photography, beach volleyball, and experimental cooking.
background:
  cultural: Tyshelle identifies as African American, raised in the multicultural neighborhoods of Santa Monica and surrounding Los Angeles. Her family blends Southern Black traditions—church gatherings,
    soulful music, and communal cooking—with the West Coast’s eclectic cultural mix, including influences from Hispanic and Caribbean communities. Growing up near the vibrant street‑art districts of LA,
    she developed an appreciation for visual storytelling and social commentary. She is proud of her heritage and actively participates in local Black cultural events, while also championing representation
    for Black women in the trucking and logistics industry.
attributes:
  skills: '["commercial driving (CDL)", "route planning and optimization", "fleet‑management software", "vehicle inspection and maintenance", "customer service and sales negotiation", "inventory control",
