personas:
  professional: A budding LEGO architect, Jefferson Berry channels a meticulous, curiosity‑driven mind into designing intricate house and bridge models, planning each brick placement with the same methodical
    precision they apply to school projects.
  sports: A young nature explorer with a love for movement, Jefferson Berry participates in the Meadowbrook Sprouts soccer club, cheers on the local minor league baseball team the River City Rivets, and
    spends weekend hikes in the forest preserve collecting stones and shells, balancing a preference for solo play with occasional group games.
  arts: Jefferson Berry's artistic expression flourishes through coloring books featuring Eric Carle's illustrations, sketching detailed animal drawings inspired by Dr. Seuss, and listening to upbeat tunes
    by The Wiggles, while they proudly organize their crayons by hue and keep a tidy art station that feels like a personal gallery.
  travel: When planning trips, Jefferson Berry prefers small, well‑structured outings like family visits to the nearby state park, a weekend camping adventure at Pine Ridge Campground, and a carefully mapped
    trip to the national aquarium in Monterey; they always annotate each destination in a notebook and feel nervous when itineraries change unexpectedly.
  culinary: Jefferson Berry enjoys simple yet colorful meals such as mac & cheese with hidden peas, peanut‑butter‑banana sandwiches, and building fruit kebabs with grapes, strawberries, and melon cubes,
    proudly arranging the ingredients like LEGO bricks while occasionally sneaking extra cookies when no one watches.
  core: Jefferson Berry is a methodical, inquisitive six‑year‑old who balances a love for structured LEGO building with a quiet worry about new experiences, and they keep everything from art supplies to
    emotions neatly cataloged.
background:
  cultural: Jefferson is raised in a white, Midwestern family in Round Lake, Illinois, where community values emphasize politeness, reliability, and a close‑knit neighborhood spirit. He celebrates typical
    American holidays such as Thanksgiving, Fourth of July, and Christmas, often participating in family gatherings that favor small, intimate groups over large parties—matching his reserved nature. The
    local culture’s focus on order and routine aligns with his methodical habits, while the region’s abundant lakes and parks nurture his love for nature and outdoor exploration.
attributes:
  skills: '[''Early reading (sight words and simple sentences)'', ''Counting to 20 and basic addition'', ''Fine motor coordination (cutting, coloring)'', ''Organizing personal belongings and school supplies'',
