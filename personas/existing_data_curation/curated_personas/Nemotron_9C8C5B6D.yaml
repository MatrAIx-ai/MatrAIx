  hobbies: '[''Building LEGO constructions (especially bridges and houses)'', ''Reading picture books about animals, space, and science'', ''Drawing and coloring with organized art supplies'', ''Collecting
    and cataloguing rocks and shells during park walks'', ''Solving jigsaw puzzles'', ''Playing educational coding apps (e.g., ScratchJr)'']'
  career_goals: Although only six, Jefferson often talks about the kind of work he hopes to do when he grows up. He is drawn to professions that let him build, solve problems, and help others—such as a
    civil engineer who designs safe bridges, an environmental scientist protecting local lakes, or a teacher who guides small groups of curious children. His practical side imagines a stable, orderly career,
    while his caring nature envisions roles that contribute to community harmony.
