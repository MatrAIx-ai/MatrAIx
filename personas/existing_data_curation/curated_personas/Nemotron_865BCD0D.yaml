  career_goals: Edward often declares that he wants to become a firefighter because he loves the bright trucks and the idea of helping people, and he also dreams of building the biggest tower of blocks
    ever, viewing it as a "career" in constructing. He is eager to master riding a tricycle and compete in racing his toy cars, showing his competitive streak. He expresses a desire to be the "big helper"
    at home, taking on tasks like feeding his pet hamster, reflecting his emerging independence and personal‑interest focus.
