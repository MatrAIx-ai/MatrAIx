personas:
  professional: Edward Jones is a three‑year‑old budding builder who loves arranging wooden blocks into orderly towers, and they proudly display each completed structure, balancing a love of predictability
    with occasional spontaneous reshuffling.
  sports: Edward Jones enjoys toddling around the community park's mini‑soccer field with the Red Valley Tots club, and they cheer loudly for the Tennessee Titans on game days, blending a love of active
    play with a budding competitive spirit.
  arts: Edward Jones delights in listening to bluegrass fiddle tunes by Alison Krauss during family picnics and drawing colorful pictures of the Smoky Mountains, and they often chant the chorus of the Sesame
    Street theme song while coloring, revealing a playful artistic side.
  travel: Edward Jones loves car rides to the Great Smoky Mountains National Park where they collect pine cones, and they dream of one day riding a train to Washington, D.C., showing a blend of local adventure
    and budding wanderlust.
  culinary: Edward Jones prefers bite‑size chicken nuggets with a side of sweet potato fries and apple slices with peanut butter, and they help stir mashed potatoes at home, showcasing a simple yet hands‑on
    approach to meals that mirrors family BBQ picnics.
  core: Three‑year‑old Edward Jones is a practical yet playful toddler who counts pennies, builds block towers, and enjoys bluegrass tunes, and they often balance routine with spontaneous fun.
background:
  cultural: Edward is being raised in Johnson City, a small city in the foothills of the Appalachian region of East Tennessee. His family participates in community traditions such as the annual Hands‑on‑Heritage
    Days, church gatherings, and Sunday picnics that feature BBQ and local music. The surrounding natural landscape of the Great Smoky Mountains and nearby greenways provides frequent family outings to
    parks and trails, fostering an appreciation for outdoor recreation. While his cultural milieu reflects Southern hospitality and a blend of contemporary middle‑class family life, his parents also emphasize
    respecting diversity and encouraging curiosity, creating a supportive environment for his developing identity.
attributes:
  skills: '[''running'', ''climbing'', ''throwing a ball'', ''stacking blocks'', ''shape sorting'', ''scribbling letters'', ''basic conversational speech'', ''following two‑step instructions'']'
