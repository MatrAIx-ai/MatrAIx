  hobbies: '[''Soccer'', ''Dancing to regional Mexican music'', ''Cooking traditional Mexican cuisine'', ''Hosting family barbecues'', ''Following security technology trends'', ''Listening to true‑crime
    podcasts'', ''Hiking'', ''Volunteering at community center (self‑defense classes)'']'
  career_goals: While he values practicality, Luis aspires to advance to a supervisory role within his department, eventually becoming a shift manager or security team lead. He aims to obtain his GED and
    complete certification as a certified protection officer, positioning himself for a role in private security consulting. He also wants to develop a community crime-prevention program that mentors at‑risk
    youth in Lynwood, leveraging his experience to foster safer neighborhoods.
