  career_goals: Although retired from formal employment, Yamila is driven to remain an active contributor to her community. She aims to become a senior advisor for a nonprofit that promotes STEM education
    among girls and Latino youth in the Coachella Valley, and to help design intergenerational mentorship programs that pair retired engineers with high‑school students. Additionally, she hopes to expand
    her digital art skills, create a community exhibition that fuses Mexican folk art with contemporary desert themes, and eventually volunteer as a board member for the local historical society, preserving
    the cultural heritage of Mexican immigrants in Southern California.
