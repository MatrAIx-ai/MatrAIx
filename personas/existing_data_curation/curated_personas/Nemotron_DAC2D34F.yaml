personas:
  professional: Alana Jones, though only a newborn, already shows a budding fascination with patterns and sound, meticulously stacking colorful blocks in symmetrical arrangements while babbling rhythmic
    narratives, and they demonstrate early signs of a future career as a user experience designer who blends imagination with meticulous organization.
  sports: Alana Jones enjoys the rhythmic bounce of her weekly infant gym class, where they clap to soft music while lying on a foam mat, and they light up at plush toys featuring the New York Yankees and
    the New York Knicks, revealing an early affinity for baseball and basketball.
  arts: Alana Jones engages with the arts by cooing along to Mozart’s 'Eine kleine Nachtmusik' while a mobile painted with Van Gogh’s 'Starry Night' spins above their crib, and they smile at a picture book
    of Frida Kahlo’s vibrant self‑portraits, embedding a love for classical music and visual storytelling.
  travel: Alana Jones delights during stroller walks through the nearby city park’s botanical garden and the local aquarium, and they dream of future family trips to the sandy beaches of Maui and the historic
    streets of Kyoto they glimpse in picture‑book postcards.
  culinary: Alana Jones drinks warm breast milk occasionally sweetened with a drop of natural vanilla, and they giggle when offered a bright orange spoonful of pureed carrots or a dab of applesauce, showing
    early enjoyment of sweet, smooth textures and the aroma of cinnamon.
  core: Alana Jones is a newborn who, despite being only weeks old, already arranges her soft toys in neat rows, babbles rhythmic nonsense to lullabies, resists nap time by opening their eyes wide, and
    shows an uncanny preference for high‑contrast patterns, hinting at a lifetime of curiosity, sociability, and a touch of stubbornness.
background:
  cultural: Alana hails from a white family in Crescent, Oklahoma, a small rural community that values Midwestern hospitality, church fellowship, and local traditions such as high-school football, country
    and folk music, and community gatherings. Her upbringing is shaped by the open plains, family-cooked meals, and a supportive network that encourages creativity, cooperation, and a gentle respect for
    nature.
