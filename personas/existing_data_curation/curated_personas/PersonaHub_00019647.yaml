persona_description: A scientist who specializes in the study of marine biology, particularly the behavior and hunting tactics of fish, such as the sailfish. His research interests include, but are not
  limited to, the behavior of schools of fish, the use of specialized tools such as the sailfish's long, rapier-like snout, and the complex hunting habits of these fish. He is known for his systematic analysis
  of the sailfish's hunting habits, which are more complex than previously recognized.
