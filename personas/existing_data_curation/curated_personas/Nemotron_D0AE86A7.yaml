  career_goals: At 73, Grant’s ambitions revolve around personal enrichment and community contribution rather than formal employment. He aims to deepen his artistic practice by completing a series of paintings
    that explore the changing landscape of Calhoun County and to organize a small exhibit at the local library. He hopes to compile his recollections of the town’s history into a modest memoir that can
    be shared with younger residents. Grant also plans to volunteer as a guide at the county historical museum, lead occasional photography walks, and mentor teenagers interested in DIY projects or music.
    Continuing to learn—through online courses on art history, attending occasional lectures at nearby Birmingham, and exploring new creative mediums—is a central goal. Maintaining good health to keep enjoying
    nature walks, gardening, and spontaneous jam sessions with friends is also part of his long‑term outlook.
