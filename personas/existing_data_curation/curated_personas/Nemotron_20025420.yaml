personas:
  professional: Kim Prater, a retired household manager turned volunteer coordinator at the local senior center, channels her methodical organization, budget‑savvy planning, and compassionate assertiveness
    into designing workshop series that blend sustainable gardening with social connection for Moncks Corner seniors.
  sports: Kim Prater, a dedicated member of the Moncks Corner Trail Walkers, enjoys daily low‑impact walks, cheers on the Carolina Panthers on Sundays, roots for the Charleston Battery soccer team, and
    participates in the senior softball league at the local community center.
  arts: Kim Prater, an enthusiastic church choir singer who reveres Mahalia Jackson and Dolly Parton, enriches her quilting sessions with Ella Fitzgerald’s smooth jazz, regularly attends Charleston Theatre
    Company productions of classic Southern plays, and keeps a well‑worn shelf of Pat Conroy novels for inspiration.
  travel: Kim Prater, who prefers meticulously planned road trips on a modest budget, has explored Savannah’s historic squares, hiked the Blue Ridge Parkway in Asheville, and dreams of a leisurely culinary
    pilgrimage to New Orleans’ French Quarter and a week‑long garden tour of England’s cottage farms.
  culinary: Kim Prater, an accomplished home chef who blends classic Lowcountry dishes like shrimp and grits with smoked paprika and fresh heirloom tomatoes, perfects collard greens simmered with ham hocks,
    crafts pecan‑crusted sweet‑potato pie, and experiments with global flavors such as miso‑glazed carrots, all while confidently wielding a cast‑iron skillet, a Dutch oven, and a garden‑fresh herb garden.
  core: Kim Prater, a meticulous garden‑loving organizer who balances lingering worry with boundless community spirit, turns heirloom tomatoes, quilting patterns, and senior gatherings into a resilient
    tapestry of Southern tradition and forward‑thinking generosity.
background:
  cultural: Kim was raised in the Lowcountry of South Carolina, a region steeped in Southern hospitality, church life, and close‑knit community values. Her family traditions emphasize family meals, seasonal
    celebrations, and a reverence for local cuisine such as shrimp and grits, sweet tea, and homemade biscuits. Growing up, she participated in church activities and community festivals, which fostered
    a strong sense of belonging and service. These cultural influences shape her dedication to nurturing relationships, preserving regional culinary heritage, and contributing to the wellbeing of her neighbors
    in Berkeley County.
