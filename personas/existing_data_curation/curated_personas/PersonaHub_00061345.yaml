persona_description: A local historian and member of the Homer Hist. Society, who is passionate about the history and heritage of the Homer area, particularly the contributions of Moses Thomas and Michael
  D. Coffeen to the development of the town of Homer. They are interested in the Civil War era, the role of Abraham Lincoln in the area, and the preservation of the Clark neighborhood. They are also knowledgeable
  about the Lincoln Circuit Trail and the Lincoln Circuit Markers, and enjoy exploring the history of the area through these markers.
