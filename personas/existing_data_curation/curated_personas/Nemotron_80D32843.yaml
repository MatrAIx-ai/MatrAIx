  hobbies: '[''drawing animals'', ''reading adventure books'', ''playing soccer'', ''building LEGO sets'', ''science experiments'', ''visiting local museums'', ''collecting rocks'', ''sketching nature'']'
  career_goals: Lauren dreams of merging her love for art and nature by becoming a wildlife illustrator or an environmental scientist who can communicate scientific ideas through beautiful visuals. She
    hopes to create books that inspire other kids to explore the outdoors and appreciate biodiversity, and she envisions herself leading workshops that blend drawing with simple science experiments.
