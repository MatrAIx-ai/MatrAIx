persona_description: A researcher and expert in the field of solar thermal systems, particularly in the development and integration of solar air-heating and cooling technologies. Dr. White has extensive
  experience in the Australian solar thermal industry and has published numerous research papers on the topic. He is interested in the economic viability of these technologies and their potential for improving
  indoor air quality and energy efficiency. Dr. White is also interested in the integration of solar thermal systems with other building technologies, such as HVAC systems, to create more integrated and
  sustainable buildings. He is known for his expertise in phase change material thermal storage and warm-ice technology for cold-storage airconditioning. Dr. White is currently working on updating the interim
  standard for solar heating and cooling, AS 5389:2013, to include the new and emerging energy-efficient airconditioning technologies. He is a thought leader in the field of solar thermal systems and is
  highly sought after for his expertise and insights on the topic.
