  career_goals: Joseph hopes to turn his love of technology and hands‑on problem solving into a future career in STEM. He aims to study computer science in high school and eventually become a software developer
    who designs educational games that make subjects like math and science fun for younger students. He is also intrigued by robotics and envisions working as a robotics engineer, building interactive machines
    for schools and community centers. Inspired by his city’s vibrant streets, Joseph wants his work to have practical benefits for Brooklyn—such as creating apps that help kids safely navigate public spaces
    or contribute to projects that improve local parks and sustainability. His ambitions reflect a blend of creative curiosity and a desire for real‑world impact.
