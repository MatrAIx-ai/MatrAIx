persona_description: A disaster risk management expert who is interested in the Western Balkans and Turkey, particularly in the areas of flood and drought risk assessment and early warning systems. They
  are familiar with the WMO integrated capacity development approach and are looking for ways to expand their focus to partnership and service delivery agreements with national DRR user communities, core
  and specialized products and services for DRR decision support, and disaster risk financing and sectoral planning. They are passionate about using their knowledge and skills to help reduce the economic
  impact of natural disasters in these regions.
