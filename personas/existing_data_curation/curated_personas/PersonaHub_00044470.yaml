  efforts, including the Travel Weekly Magellan Award, TripAdvisor Certificate of Excellence, and a World Boutique Hotel Award. Lamontagne is knowledgeable about the impact of tourism on the environment
  and the importance of sustainable practices, and she is committed to reducing carbon emissions and slowing down climate change.
