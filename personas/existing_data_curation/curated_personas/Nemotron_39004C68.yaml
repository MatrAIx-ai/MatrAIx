personas:
  professional: Alfredo Peinado, a budding little architect who spends morning playtime methodically stacking colorful blocks into orderly cityscapes, showcases the same organized, reliable, and compassionate
    demeanor they bring to sharing toys and solving tiny puzzles.
  sports: Alfredo Peinado, an energetic preschooler who attends a local YMCA toddlers gymnastics class, cheers enthusiastically for the Carolina Hurricanes and Carolina Panthers, and loves pretending to
    dribble a soft foam soccer ball in the backyard while proudly wearing a tiny Forsyth County Little Soccer jersey, they often invite friends to join their mini matches.
  arts: Alfredo Peinado, a curious child who dances to the lively beats of cumbia and vallenato playing on the family stereo, enjoys banging a wooden spoon on pots like a mini drummer, and spends afternoons
    drawing bright, folk‑inspired scenes after watching cartoons starring Elmo and Sesame Street friends, they often hum the melodies while coloring.
  travel: Alfredo Peinado, a tiny explorer who has already joined family road trips to the Blue Ridge Mountains and a summer visit to Orlando's theme parks, prefers itineraries that include playground stops
    and sand‑castle building on the Outer Banks, yet always asks for a familiar blanket to be packed for comfort, they delight in pointing at maps and counting mile markers.
  culinary: Alfredo Peinado, a budding food enthusiast who loves the buttery crunch of cheese‑filled corn cakes and the sweet fragrance of fruit‑stuffed empanadas, also enjoys banana slices with peanut
    butter, and often insists on stirring the pot with a wooden spoon to feel part of the cooking ritual, they are quick to request a taste of every dish.
  core: Alfredo Peinado, a two‑year‑old whirlwind of curiosity, compassion, and methodical play, navigates the world with rhythmic enthusiasm and a surprisingly organized outlook; they delight in arranging
    blocks as carefully as a miniature city planner.
background:
  cultural: Alfredo comes from a Colombian family that maintains strong cultural ties while living in Winston‑Salem, NC. He is exposed to both Spanish and English at home, celebrating Colombian holidays
    like Día de la Independencia with traditional foods such as arepas and empanadas. Music from his heritage, especially cumbia and vallenato, fills the household, influencing his rhythmic play. His family
    participates in local multicultural events, allowing him to blend his Colombian roots with the diverse community of Forsyth County.
