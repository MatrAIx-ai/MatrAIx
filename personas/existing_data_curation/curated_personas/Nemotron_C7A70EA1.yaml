personas:
  professional: Carlos Dotel is a budding visual storyteller who blends sketching, digital illustration, and entry‑level coding to craft interactive comic projects, applying their organized yet flexible
    work style, curious mindset, and reserved confidence to meet deadlines while exploring unconventional ideas.
  sports: Carlos Dotel is an avid hiker and cross‑country runner who trains with the Mount Vernon Youth Soccer Club in the spring, follows the Seattle Seahawks and Seattle Sounders, and spends weekends
    exploring the Cascades while maintaining a balanced fitness routine that mixes trail runs with occasional bike rides.
  arts: Carlos Dotel is an enthusiastic creator who spends evenings drawing comics inspired by the narrative depth of Hayao Miyazaki, practicing acoustic guitar renditions of Joni Mitchell and The Strokes,
    and attending community workshops that celebrate the works of Frida Kahlo and contemporary street artists.
  travel: Carlos Dotel is a curious teen traveler who has explored the Pacific Northwest’s Seattle, Portland, and the San Juan Islands, visited family friends in Vancouver, dreams of wandering Kyoto’s historic
    temples, and prefers low‑budget trips planned with friends using public transportation and detailed itineraries.
  culinary: Carlos Dotel is a budding home chef who enjoys mastering hand‑rolled corn masa pockets with savory fillings, rolling sushi with fresh cucumber and avocado, and perfecting herb‑infused salsa
    using cilantro, lime, and jalapeño, often cooking alongside family while experimenting with flavors in their kitchen.
  core: Carlos Dotel is a meticulous yet spontaneous 16‑year‑old who fuses art and code, saves diligently for future projects, monitors health with pragmatic habits, and occasionally procrastinates on schoolwork
    to chase late‑night drawing sessions.
background:
  cultural: Carlos is a second‑generation Mexican American raised in Stanwood, Washington. His household embraces Mexican traditions such as Día de los Muertos altars, cooking tamales, and celebrating family
    gatherings with Spanish music and food. While he navigates the rural Pacific Northwest environment, he maintains strong ties to his heritage through bilingual communication and incorporating Mexican
    folk art patterns into his creative work. This cultural blend informs his artistic perspective, reinforcing a sense of pride and curiosity about his roots.
attributes:
  skills: '[''Sketching and drawing'', ''Digital illustration'', ''Basic graphic design (Photoshop, Procreate)'', ''Bilingual communication (Spanish/English)'', ''Introductory coding (Python, HTML/CSS)'',
    ''Guitar playing'', ''Problem solving'', ''Time management'', ''Organizational flexibility'']'
  hobbies: '[''Comic drawing'', ''Watercolor painting'', ''Photography of natural landscapes'', ''Acoustic guitar playing'', ''Reading science‑fiction'', ''Hiking in Skagit County'', ''Co‑op video gaming'',
    ''Cooking Mexican meals with family'', ''Learning Japanese'', ''Attending local art workshops'']'
  career_goals: Carlos aims to earn his GED and enroll in a community college program for graphic design or multimedia arts, eventually building a career as a digital storyteller who blends contemporary
    design with traditional Mexican motifs. He dreams of creating a portfolio that showcases culturally inspired illustrations, interactive web projects, and music videos that celebrate his heritage. Long‑term,
    he hopes to work freelance for cultural institutions or studios, using his art to foster cross‑cultural understanding while maintaining the flexibility to explore personal projects.
