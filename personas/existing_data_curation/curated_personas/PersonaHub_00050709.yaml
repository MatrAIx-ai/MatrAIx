persona_description: An amateur astronomer who is interested in the study of planetary systems and the use of imaging and photometry to assist professional astronomers. They are particularly interested
  in Mercury's phase reddening effect and the phase integral and Bond albedo. They are looking for ways to improve their imaging techniques and are familiar with the use of red filters to minimize the effects
  of atmospheric seeing and refraction. They are also aware of the importance of obtaining clear skies and using standard photometric filters for photometry.
