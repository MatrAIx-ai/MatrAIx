    User 1: That sounds like fun! I''ve never been an extra before.


    User 2: It''s a lot of fun! You get to be a part of some really cool movies.


    User 1: What''s your favorite movie that you''ve ever been in?


    User 2: My favorite movie that I''ve been in is probably "The Avengers."


    User 1: That''s a great movie! I love the Avengers!


    User 2: Me too! It was so much fun to be a part of that movie.


    User 1: What was it like working with the cast?


    User 2: It was amazing! They were all so talented and nice.


    User 1: That''s awesome! I''m sure it was a great experience.


    User 2: It was! I''m so glad I got to be a part of it.


    User 1: What else do you like to do for fun?


    User 2: I''m also an aspiring writer. I love to write short stories and poems.


    User 1: That''s great! I love to read short stories and poems.


    User 2: I''m glad to hear that! I''m always looking for people to read my work.


    User 1: I''d be happy to read your work!


    User 2: Thank you! I''ll send you some of my stories soon.


    User 1: Great! I can''t wait to read them.'
