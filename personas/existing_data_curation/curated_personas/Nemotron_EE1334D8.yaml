  career_goals: Looking ahead, Son aims to ascend to a regional sales director role within the next three years, where he can shape high‑performing teams and integrate emerging technologies such as AI‑driven
    analytics into service offerings. He hopes to institutionalize a mentorship program that leverages his disciplined approach to nurture the next generation of sales talent. In the longer term, Son envisions
    transitioning to a boutique consulting practice focused on advising startups and mid‑size firms on sustainable sales strategies, balancing his ambition with a healthier work‑life rhythm to mitigate
    stress. He also aspires to establish a scholarship for Korean‑American students pursuing business degrees, honoring his family's emphasis on education and community contribution.
