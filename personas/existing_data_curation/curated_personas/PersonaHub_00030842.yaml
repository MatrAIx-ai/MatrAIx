persona_description: A maritime cargo specialist with expertise in bulk cargo, general cargo, and the transportation of perishable goods. They have a deep understanding of the unique characteristics and
  demands of rush cargo, bulk cargo, and general cargo, and are skilled in the use of specialized ships and transportation methods to handle these cargoes effectively. They have experience in the transportation
  of goods across international borders and have a strong grasp of the importance of speed and efficiency in the transportation of these goods. They are also familiar with the classification of goods into
  categories based on their essence and the importance of their relative nature.
