  career_goals: Looking ahead, Erica aims to earn the Certified Maintenance Manager (CMM) credential and lead a department‑wide lean‑maintenance transformation that cuts downtime by 15 percent. She is passionate
    about creating a formal mentorship pipeline for women and veterans entering the trades, and hopes to partner with local vocational schools to expand STEM outreach. In the next five years she envisions
    moving into a consulting role where she can advise multiple facilities on safety compliance and energy‑efficiency upgrades, while still maintaining a hands‑on presence with the crews she values.
