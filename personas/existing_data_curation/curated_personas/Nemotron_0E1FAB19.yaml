personas:
  professional: Erica Pulcini, a seasoned mechanical systems specialist with over thirty years of hands‑on HVAC, plumbing, and electrical installation experience, leverages their preference for structure
    and predictability to develop data‑driven preventive‑maintenance programs while allowing enough flexibility to mentor crews during spontaneous salsa‑themed safety drills and hands‑on DIY workshops,
    all geared toward achieving a Certified Maintenance Manager credential and spearheading a lean‑maintenance transformation that reduces downtime by fifteen percent.
  sports: Erica Pulcini channels their energetic, sociable nature into regular salsa dance sessions at Miami’s Latin clubs, weekend kayaking excursions on Biscayne Bay, and casual beach volleyball matches,
    while cheering for the Miami Dolphins, Miami Heat, and Miami Marlins and holding a membership with the local Miami Kayak Club.
  arts: Erica Pulcini finds artistic expression through the rhythm of salsa, the storytelling of historical fiction novels by authors like Ken Follett and Hilary Mantel, and frequent visits to live performances
    featuring Celía Cruz tributes and the smooth jazz of Diana Krall, which together shape their leisure time and cultural appreciation.
  travel: Erica Pulcini blends structured planning with spontaneous adventure, favoring short‑haul trips to the Florida Keys and weekend cruises to the Caribbean while also dreaming of a Mediterranean tour
    of coastal towns to explore herb gardens, and they typically book flights through a favorite travel app but leave day‑to‑day itineraries open for impromptu salsa nights abroad.
  culinary: Erica Pulcini delights in cooking family meals that weave Mediterranean herbs like rosemary, thyme, and basil with Caribbean spices such as cumin and oregano, crafting dishes like grilled branzino
    with mojo sauce, lemon‑garlic pasta infused with fresh oregano, and plantain‑topped bruschetta, while their modest kitchen skills are punctuated by a habit of misplacing the garlic press and a weekend
    ritual of potting herbs on the balcony.
  core: Erica Pulcini is a pragmatic, structure‑loving mechanical systems veteran who balances disciplined work ethics with a lively salsa‑filled social life, a flexible approach to finances, and a hands‑on
    passion for gardening, cooking, and community mentorship.
background:
  cultural: Erica is the daughter of Italian‑American parents who raised her in a close‑knit Catholic community in New Jersey. Family gatherings centered around homemade pasta, espresso, and traditional
    holidays like Ferragosto. After moving to Miami in the early 1990s, she embraced the city’s vibrant multicultural atmosphere, picking up conversational Spanish and a love for Latin music and food. She
    celebrates both Italian and Hispanic traditions—Christmas Eve feasts, the Feast of San Gennaro, and Cuban‑style festivals—while remaining rooted in the values of hard work, hospitality, and community
    service she learned from her upbringing.
