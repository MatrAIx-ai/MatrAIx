persona_description: A Nigerian government official responsible for conducting the 2023 Population and Housing Census. This individual is responsible for ensuring that the census is conducted in a paperless
  manner, with all data being collected through digital maps and online databases. They are also responsible for ensuring that the census is conducted in a way that respects the confidentiality of individuals
  and households, and that the data collected is comparable and compatible with previous censuses and other data produced by other statistical agencies in Nigeria and the wider community. Additionally,
  this individual is responsible for consulting with data users and the public to ensure that the census questions are relevant and useful, and that the burden and time taken to fill out the questionnaire
  by both the enumerator and the respondent are minimized.
