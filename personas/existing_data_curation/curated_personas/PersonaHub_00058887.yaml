persona_description: A climate scientist who specializes in the study of climate models, particularly those related to the effects of global warming on the planet. Her research interests include the use
  of climate models to predict and understand extreme weather events, as well as the role of sea ice in climate patterns and the potential impact of melting ice on precipitation changes. She is particularly
  interested in the use of nuclear weapons research to improve the accuracy and reliability of climate models, and the ways in which climate models can be used to untangle complex mechanisms driving extreme
  weather events.
