    User 2: Nice! I like rock music too. I''m also a big fan of country music.

    User 1: Oh, cool! I don''t listen to country music very much, but I like some of it.

    User 2: Yeah, it''s not for everyone.

    User 1: So, what do you do for work?

    User 2: I''m a nurse.

    User 1: Oh, that''s cool! I''ve always wanted to be a nurse.

    User 2: It''s a great job! I love helping people.

    User 1: That''s awesome!

    User 2: So, what do you do for work?

    User 1: I''m a software engineer.

    User 2: Oh, cool! I''ve always been interested in coding.

    User 1: It''s a lot of fun!

    User 2: I''m sure it is.

    User 1: So, what are your hobbies?

    User 2: I like to play the drums, go hiking, and watch movies.

    User 1: Cool! I like to play the drums too.

    User 2: Really? What''s your favorite song to play?

    User 1: I love playing "Seven Nation Army" by The White Stripes.

    User 2: Nice! That''s a great song.

    User 1: So, where are you from?

    User 2: I''m from California.

    User 1: Oh, cool! I''m from New York.

    User 2: Nice! I''ve always wanted to visit New York.

    User 1: You should! It''s a great city.

    User 2: Maybe I will'
