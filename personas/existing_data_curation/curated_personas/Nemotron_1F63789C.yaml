  hobbies: '["Building towers with large interlocking blocks", "Sandcastle building at the beach", "Coloring with crayons", "Listening to storybooks", "Simple wooden puzzles", "Singing interactive children’s
    songs", "Pretend play with toy kitchen and cars"]'
  career_goals: Thomas’s imagination is already directing his aspirations. He frequently talks about becoming a firefighter because he likes the bright trucks and helping people, and he loves building things,
    so he also dreams of being a builder or a LEGO architect when he grows up. He expresses a practical desire to “fix broken toys” and “help Mom and Dad,” reflecting his balance of curiosity and practicality.
    While his ambitions are playful, they show an early inclination toward service‑oriented and creation‑focused careers.
