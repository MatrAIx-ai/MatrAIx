personas:
  professional: Thomas Hall, a budding block architect who spends hours stacking Mega Bloks into towering structures, balances wild imagination with the practical need for stability, and dutifully tidies
    up the pieces before bedtime, showing they value both creativity and order.
  sports: Thomas Hall, an energetic toddler who attends a weekly beginner soccer class with the Kiddie Kickers, cheers for the local professional baseball team during family outings, and practices balance
    on a mini trampoline at home, showing they enjoy structured play but occasionally prefer solitary sandbox digging.
  arts: Thomas Hall, an enthusiastic little artist who loves finger-painting bright suns while humming The Wiggles, eagerly collects storybooks about dinosaurs, and occasionally imitates their favorite
    cartoon characters' dance moves, which highlights they blend creativity with a love for familiar routines.
  travel: Thomas Hall, an adventurous preschool traveler who loves weekend trips to the local children's museum and has a budding wish to see the sea turtles at the nearby aquarium, prefers car rides with
    a favorite blanket and music, yet sometimes feels anxious about new places, prompting them to clutch a handheld toy.
  culinary: Thomas Hall, a picky yet curious eater who devours creamy mac and cheese, crunchy carrot sticks, and strawberry slices, helps stir batter with a plastic spoon, and occasionally insists on adding
    extra cheese, demonstrating they balance comfort foods with small culinary experiments.
  core: Thomas Hall, a curious three-year-old who builds towering block castles, saves every coin, worries about new faces, paints bright pictures, and clutches a stuffed rabbit for comfort, embodying a
    blend of imagination, cautiousness, and endearing quirks.
background:
  cultural: Thomas was born and raised in Long Beach, California, to a middle‑class family of European descent. His upbringing blends typical American family traditions—celebrating holidays such as Thanksgiving,
    Fourth of July, and Christmas—with the coastal lifestyle of Southern California. Frequent trips to the Pacific shoreline, visits to local parks, and exposure to the city’s multicultural environment
    (including Spanish signage and diverse community events) shape his awareness of cultural variety, while his home life emphasizes values of curiosity, practicality, and balanced independence.
attributes:
  skills: '["Stacking wooden blocks", "Basic color and shape identification", "Counting 1‑10", "Early vocabulary and simple sentence formation", "Simple wooden puzzle solving", "Toy organization by category",
