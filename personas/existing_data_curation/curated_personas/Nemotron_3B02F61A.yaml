personas:
  professional: Maria Diaz is a budding visual artist and freelance illustrator whose proficiency in sketching, watercolor, and beginner digital tools blends with their bilingual storytelling, while their
    curiosity and relaxed approach to deadlines fuel self‑directed projects and collaborations in a community studio setting.
  sports: Maria Diaz cheers for the Texas Rangers and follows the local McAllen FC soccer club, enjoys occasional pick‑up basketball at the community center, and channels their love of movement into sketching
    stadium murals after weekend games.
  arts: Maria Diaz immerses themselves in the works of indie musician Tame Impala, regional folk singer Lila Downs, and muralist Kevin Vega, frequently visiting downtown galleries and street‑art festivals,
    while drawing inspiration for graphic novels like 'Saga' and creating meme‑style illustrations that blend pop culture with traditional folklore.
  travel: Maria Diaz favors spontaneous weekend road trips, having explored San Antonio's River Walk, the vibrant murals of Austin's South Congress, a family visit to Valle de Guadalupe's vineyards, and
    a school‑organized trip to New York City's street‑art districts, while dreaming of a future backpacking adventure along the Pacific Coast.
  culinary: Maria Diaz loves cooking chilaquiles with salsa verde, carnitas tacos seasoned with chipotle and epazote, and mole poblano, often using fresh cilantro and corn masa, and they consider each family
    kitchen session a creative laboratory for flavor experimentation.
  core: Maria Diaz is a restless dreamer who sketches murals between snack breaks, neglects homework but never skips family cooking nights, and channels curiosity into vibrant art while juggling disorganization
    with bursts of focused creativity.
background:
  cultural: Maria comes from a Mexican‑American family rooted in the vibrant border community of McAllen, Texas. She grew up bilingual, celebrating traditions such as Día de los Muertos and festive gatherings
    that emphasize family and community. The cultural tapestry of the Rio Grande Valley—blending Mexican folklore, Tejano music, and cross‑border influences—shapes her worldview and informs her artistic
    expression. While she navigates the dual identity of being Mexican and American, she values the resilience and warmth of her heritage, often reflecting these themes in her creative projects and everyday
    interactions.
attributes:
  skills: '[''sketching'', ''digital illustration'', ''handmade crafts'', ''bilingual communication (Spanish/English)'', ''basic photo editing'', ''creative writing'']'
