    local murals and street art'', ''reading graphic novels'', ''photography of everyday scenes'']'
  career_goals: Maria aspires to earn her GED within the next year and enroll in a community college program focused on visual arts or graphic design. Her long‑term ambition is to merge her Mexican heritage
    with contemporary design by creating culturally inspired murals, illustrations, and an online shop for handcrafted artwork. She hopes to work in a collaborative studio environment where she can both
    learn from seasoned artists and contribute her unique perspective, eventually mentoring other young creators from her community.
