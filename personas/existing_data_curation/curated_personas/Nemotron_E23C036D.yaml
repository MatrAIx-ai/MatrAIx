  hobbies: '[''Metal sculpting'', ''Model railroading'', ''Weightlifting'', ''Fishing'', ''Technical reading'', ''Visiting museums'', ''Gardening'']'
  career_goals: Kevin aims to formalize his expertise by earning the Certified Welding Inspector (CWI) credential from the American Welding Society within the next two years. He aspires to move into a foreman
    or lead‑welder role where he can plan project schedules, allocate resources, and enforce safety protocols—leveraging his natural preference for structure and predictability. In the longer term, he hopes
    to establish a small, owner‑operated metal‑fabrication shop that specializes in custom architectural pieces and restoration work for historic buildings in the DC area. He sees this as a way to secure
    financial stability, reduce day‑to‑day stress, and create a controlled work environment that aligns with his methodical nature while also allowing him to mentor apprentices.
