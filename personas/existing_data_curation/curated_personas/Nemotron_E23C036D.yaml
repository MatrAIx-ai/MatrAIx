personas:
  professional: Kevin Wiersma, a 49‑year‑old master welder with 25 years of MIG, TIG, and stick expertise, is methodically preparing for his Certified Welding Inspector exam while planning to step into
    a foreman role and eventually launch a boutique metal‑fabrication shop specializing in historic restoration.
  sports: Kevin Wiersma hits the weight room three times a week at the community gym, casts a line on the Potomac River whenever the weekend opens, and avidly follows the Washington Capitals, the Washington
    Commanders, and the Washington Nationals, using these routines to channel his stress into structured physical activity.
  arts: Kevin Wiersma spends his evenings welding small metal sculptures inspired by Alexander Calder and Anish Kapoor, curates a modest model‑railroading layout reminiscent of historic rail lines, and
    seeks fresh ideas during regular visits to the Smithsonian American Art Museum, where he also enjoys listening to Pink Floyd’s instrumental tracks while sketching designs.
  travel: Kevin Wiersma plans trips like a project schedule, having already toured historic sites in Williamsburg, the Gettysburg battlefield, and the colonial districts of Boston, while dreaming of a guided
    architecture tour of Rome and a fishing retreat in the Canadian Rockies, always booking months ahead to lock in budget‑friendly rates.
  culinary: Kevin Wiersma favors hearty, protein‑rich meals such as grilled steak with rosemary, roasted garden tomatoes, zucchini, and homemade chili, cooking his own vegetables from his backyard plot
    and occasionally treating himself to a cold craft IPA after a long day in the shop.
  core: Kevin Wiersma is a meticulous, stress‑prone craftsman who balances a love for precision metalwork with a habit of over‑planning, occasional budget rigidity, and a penchant for late‑night blueprint
    sketching.
background:
  cultural: Kevin is a white American of Dutch ancestry; the surname Wiersma traces back to the Netherlands, and his family celebrated occasional Dutch traditions such as King's Day and cooking stroopwafels
    during holidays. Raised in a middle‑class Washington, DC neighborhood, he grew up immersed in the city’s multicultural atmosphere while his household emphasized the American work ethic of punctuality,
    self‑reliance, and practical problem‑solving. This blend of heritage and urban exposure fostered a pragmatic outlook, a respect for diverse perspectives, and a preference for organized, methodical approaches
    in both his professional and personal life.
attributes:
