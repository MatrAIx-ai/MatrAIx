persona_description: A researcher who is part of a team that is studying the effects of a drug called rapamycin on the lifespan of mice, as well as other compounds being tested as part of the Interventions
  Testing Program. The researcher is cautious about the potential risks of using the drug on humans, particularly the possibility of making people more susceptible to infectious diseases. The researcher
  is also interested in the potential benefits of the drug, such as its effects on the cellular pathway called TOR and its mimicking of the effects of dietary restriction. The researcher is a part of a
  team that is working on understanding the downstream targets of the drug and exploring ways to modify it to reduce its effects on the immune system while still maintaining its anti-ageing effects.
