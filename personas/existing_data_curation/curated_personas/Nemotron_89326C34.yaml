personas:
  professional: Breyonna Fairley is an eager elementary school student who devours adventure books and applies her curiosity to classroom projects, balancing creative ideas with the practical structure
    of assignments while volunteering for group tasks yet keeping a healthy skepticism about shortcuts.
  sports: Breyonna Fairley is a spirited soccer enthusiast who practices drills that let her chase the ball and score goals, proudly cheers for the nearby Springfield Strikers, and exhibits a competitive
    edge by often attempting solo shots, though she sometimes hesitates to pass the ball in friendly matches.
  arts: Breyonna Fairley is a budding illustrator and LEGO architect who admires Dr. Seuss’s whimsical storytelling, Pixar’s animation, and the soulful gospel rhythms of Aretha Franklin, often humming those
    tunes while sketching cartoon characters inspired by her adventure books.
  travel: Breyonna Fairley loves weekend trips to the county fair and family road trips to Chicago’s Museum of Science and Industry, preferring organized stops at parks and museums over spontaneous wandering,
    and dreams of one day exploring the Grand Canyon’s vast horizons.
  culinary: Breyonna Fairley enjoys Southern‑style meals like collard greens with a splash of vinegar and cornbread drizzled with honey butter, delights in helping her parents bake sweet potato pies, and
    experiments with LEGO‑shaped fruit snacks during snack time.
  core: Breyonna Fairley is a curious, competitive, and steady 7‑year‑old who balances schoolwork, soccer, and creative play, often questioning shortcuts and occasionally hoarding small treasures like shiny
    stones from the backyard.
background:
  cultural: Breyonna comes from an African‑American family rooted in Bethany, Illinois. Her parents emphasize community, faith, and family traditions, often gathering for church services, Sunday potlucks,
    and celebrating holidays like Juneteenth. The household fills with soulful gospel music, and meals feature Southern favorites such as collard greens and cornbread. Her family encourages pride in her
    heritage, shares stories of African‑American history, and supports academic achievement. Growing up in a close‑knit rural town, she participates in local community events, school cultural programs,
    and neighborhood picnics that reinforce both her cultural identity and a sense of belonging.
