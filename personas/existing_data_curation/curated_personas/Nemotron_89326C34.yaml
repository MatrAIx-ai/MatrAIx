  hobbies: '[''Reading adventure books'', ''Drawing cartoon characters'', ''Soccer (team drills and games)'', ''LEGO building'', ''Puzzle solving (jigsaw and logic puzzles)'', ''Nature exploration (collecting
    leaves, stones, observing insects)'', ''Listening to gospel and soul music'']'
  career_goals: Breyonna dreams of becoming a scientist who discovers new things, perhaps an astronaut or a veterinarian who cares for animals. She hopes to win the school science fair by creating a simple
    water‑filtration project and wants to start a Kids Nature Club at school to teach classmates about plants and insects. Her competitive spirit pushes her to set high goals, while her pragmatic side plans
    step‑by‑step progress through reading more books, mastering new science concepts, and practicing teamwork in sports.
