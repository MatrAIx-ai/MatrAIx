personas:
  professional: Jae Macready, an aspiring young comic artist and LEGO architect, blends a vivid imagination for prairie landscapes with a relaxed, sometimes disorganized work style, turning school projects
    into collaborative art sessions while they delight peers with compassionate, spontaneous storytelling.
  sports: Jae Macready enjoys playing forward for the Pierre Youth Soccer Club, cheers for the North Dakota State Bison football team on Saturdays, and spends weekends biking across prairie fields, but
    they prefer imaginative tag games over rigid drills and occasionally forget to stretch after practice.
  arts: Jae Macready draws comic panels inspired by Marvel’s Spider‑Man and the sweeping prairie murals of Thomas Hart Benton, attends after‑school art workshops where they emulate Hayao Miyazaki’s animation
    style and practice recorder melodies from The Sound of Music and Frozen, and they love swapping sketches with classmates during library story hour.
  travel: Jae Macready prefers spontaneous family road trips that blend adventure and relaxation, having explored Badlands National Park and the historic streets of Deadwood, dreaming of a future visit
    to the Smithsonian National Museum of Natural History in Washington, D.C., and they always pack a small backpack with a magnifying glass for on‑the‑spot nature hunts.
  culinary: Jae Macready adores Sunday pot roast with mashed potatoes, sneaks bites of homemade strawberry shortcake, experiments with building mini pizzas topped with pepperoni and fresh basil, and they
    sometimes forget to eat breakfast before school, opting for a quick granola bar instead.
  core: Jae Macready is a curious, compassionate nine‑year‑old who turns prairie explorations into comic art, balances spontaneous creativity with occasional anxiety, and they delight in sharing smiles
    over LEGO builds and shared meals.
background:
  cultural: Jae is raised in Pierre, South Dakota, within a family that values Midwestern community life, modesty, and togetherness. His heritage traces back to European settlers, and family traditions
    include Sunday family meals, attending the county fair, and participating in school and church activities. He is taught respect for the surrounding prairie landscape and the region’s history, including
    an appreciation for the stories of the Lakota people who have lived in the area for generations.
