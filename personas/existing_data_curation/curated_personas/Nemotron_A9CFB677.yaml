  career_goals: Jae dreams of a future where he can blend his love for art and his desire to help others. He envisions becoming an illustrator for children's books, a teacher who nurtures curiosity, or
    a veterinarian who cares for animals. He also imagines working in community outreach, perhaps as a youth program coordinator, using his artistic talents to create inclusive and inspiring activities
    for his peers.
