persona_description: An expert in quantum dot technology, particularly in the field of SSL red. This person has extensive knowledge and experience in the development and application of quantum dots for
  various applications, including light-emitting materials architecture. They are interested in understanding the mechanisms behind the instability of quantum yields when exposed to high temperatures and
  photon fluxes, and are dedicated to unraveling the underlying yield-decrease phenomena. They have a particular interest in the development of a foundational understanding of light-emission phenomena and
  exploring light-emitting device's power-conversion efficiency.
