personas:
  professional: Sharon Jacques, an aspiring visual artist, blends meticulous sketching, watercolor techniques, and digital illustration with a curious yet calm mindset, balancing disciplined practice with
    spontaneous creative experiments, and they frequently seek inspiration during solitary walks.
  sports: Sharon Jacques enjoys the rhythmic lift of swimming with the Connetquot River Swim Club, follows the New York Mets and the New York Knicks avidly, and practices yoga at home to stay flexible,
    preferring low‑key fitness over competitive team sports, and they keep their routine aligned with their preference for quiet activity.
  arts: Sharon Jacques immerses herself in contemporary art, drawing inspiration from Frida Kahlo, Banksy, and the works displayed at the Long Island Museum, while regularly sketching in her notebook and
    curating miniature art displays for the community library, and they find that each curated exhibit deepens their appreciation for artistic storytelling.
  travel: Sharon Jacques loves weekend trips to the historic streets of Savannah, the coastal charm of Fire Island, and dreams of studying art in Florence, balancing her school schedule with short, well‑planned
    getaways that feed her curiosity and love of quiet observation, and they often photograph local scenes to inspire future works.
  culinary: Sharon Jacques prefers simple yet vibrant meals like avocado toast with cherry tomatoes, homemade sushi rolls, and fresh summer berries, often sketching the dishes before cooking, though they
    sometimes forget to eat regular meals during long art sessions, and they delight in tasting the fresh ingredients themselves.
  core: Sharon Jacques is a quiet creative mind who channels curiosity and calm into art, music, and steady savings, while they occasionally indulge in impulsive sketching marathons and sweet treats.
background:
  cultural: Sharon comes from a white, middle‑class family living in the suburban community of Ronkonkoma, Long Island. Her upbringing blends typical suburban American values—emphasis on education, community
    involvement, and family traditions such as holiday celebrations and annual trips to regional fairs—with the cultural richness of nearby New York City, which provides regular exposure to museums, theater,
    and diverse artistic events. Her family encourages curiosity and self‑expression, supporting her participation in local art clubs, school programs, and occasional weekend outings to NYC galleries, fostering
    a balanced appreciation for both community roots and broader cultural experiences.
attributes:
  skills: '[''Digital illustration'', ''Traditional drawing and watercolor'', ''Creative writing (poetry, short stories)'', ''Basic photography'', ''Photo editing (Adobe Photoshop, Lightroom)'', ''Organizational
