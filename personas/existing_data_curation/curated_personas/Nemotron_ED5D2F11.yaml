  hobbies: '[''Sketching and watercolor painting'', ''Digital illustration on tablet'', ''Reading science-fiction and contemporary literature'', ''Visiting local art museums (e.g., Long Island Museum)'',
    ''Photography (nature and urban scenes)'', ''Playing piano'', ''Creative writing and journaling'', ''Nature walks in Connetquot River State Park'', ''Participating in a small book club'']'
  career_goals: Sharon aspires to attend a specialized high school or summer program focused on visual arts, then pursue a college degree in fine arts or art history. She hopes to become a museum curator
    or education specialist who can design interactive exhibitions that blend art and technology. Long‑term, she dreams of creating an online platform that showcases youth art and encourages collaborative,
    interdisciplinary projects, while also seeking scholarship opportunities to support her academic and creative pursuits.
