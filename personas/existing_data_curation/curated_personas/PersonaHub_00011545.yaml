persona_description: A scholar and historian of Italian history, particularly the Risorgimento period, and the life and legacy of Giuseppe Garibaldi. He is the author and editor of numerous publications
  on Garibaldi, and his work has been influential in the field of Garibaldian studies. He is the recipient of a generous gift from Dr. Anthony P. Campanella, a Sicilian historian and professor of sociology
  at New York University, which has raised the University of South Carolina to the status of an international research center for the study of Garibaldi and Italian reunification.
