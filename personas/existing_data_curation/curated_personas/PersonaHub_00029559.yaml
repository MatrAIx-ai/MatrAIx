persona_description: A scientist who is interested in the effects of mixtures on ecosystems, particularly in the field of Ecological Risk Assessment (ERA). This scientist has expertise in developing tools
  for ERA and regulatory tools for mixtures, and is familiar with the prediction of interactions, the problem of modes of action, and many other knowledge gaps in assessing exposure and effects of mixtures.
  This scientist is likely to be interested in the special issue of Toxics, which aims to bring together experimental and predictive approaches for assessing exposure and effects of mixtures on ecosystems,
  in order to update current knowledge on ERA for mixtures.
