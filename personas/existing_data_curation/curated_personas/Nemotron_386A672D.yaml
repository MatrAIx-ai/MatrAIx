personas:
  professional: Marlen Ortega, a 32‑year‑old elementary teacher, blends bilingual fluency, data‑driven assessment, and interactive‑tech lesson design with a structured yet adaptable classroom style, channeling
    their outgoing energy into clear behavior expectations while they flexibly pivot when lessons drift off track.
  sports: Marlen Ortega spends Saturdays competing in the Lone Star Co‑ed Softball League while weekend mornings are reserved for brisk hikes with the Hill Country Trail Club, cheering on the Texas Rangers
    and rooting for Austin FC, and they approach fitness with a sociable, competitive edge that blends team camaraderie with personal endurance.
  arts: Marlen Ortega channels the rhythmic spirit of salsa legend Celía Cruz and the soulful narratives of folk singer Lila Downs into vibrant community performances, regularly showcasing folkloric choreography
    at local festivals while they also curate a home playlist that mixes salsa classics with contemporary Latin pop.
  travel: Marlen Ortega favors spontaneous weekend road trips across the Texas Hill Country’s wineries and hiking trails, while dreaming of a cultural immersion in Oaxaca’s markets, a jazz‑filled night
    in New Orleans, and a desert‑starred retreat in Santa Fe, and they balance limited vacation time with a flexible, adventure‑leaning itinerary.
  culinary: Marlen Ortega, an avid home cook, excels at mastering regional staples like mole poblano—rich with ancho chilies, dark chocolate, and sesame seeds—and hand‑rolled tamales wrapped in corn husks,
    often balancing meticulous recipe experimentation with occasional spontaneous pantry improvisations that leave the kitchen a flavorful mess, and they never shy away from adding an extra pinch of cumin.
  core: Marlen Ortega fuses disciplined lesson‑planning precision with a love for spontaneous salsa dances, and although they meticulously design curricula, they often forget where they parked their car
    after a hike.
background:
  cultural: Marlen grew up in a Mexican‑American household in San Angelo, Texas, where Spanish was spoken at home and English at school. Her family honors Mexican traditions such as Día de los Muertos,
    quinceañeras, and weekly tamale nights, while also participating in Texas‑style community events like rodeos and county fairs. This bicultural upbringing instilled a strong sense of community, pride
    in her heritage, and a love for sharing cultural stories through food, music, and dance. She remains actively involved with the local Mexican cultural center, helping to organize events that celebrate
    the vibrant blend of Mexican and Texan identities.
attributes:
  skills: '[''Bilingual Spanish‑English Instruction'', ''Lesson Planning (K‑5)'', ''Classroom Management'', ''Interactive Learning Activities'', ''Student Assessment and Data Analysis'', ''Educational Technology
