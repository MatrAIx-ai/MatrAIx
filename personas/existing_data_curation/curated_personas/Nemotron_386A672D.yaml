  hobbies: '[''Salsa and Folkloric Dance'', ''Cooking Traditional Mexican Dishes'', ''Softball League'', ''Hiking in Hill Country'', ''DIY Crafting for Cultural Celebrations'', ''Volunteering at Local Community
    Center'', ''Attending Tex‑Mex Music Festivals'', ''Reading Young Adult Fiction for Classroom Use'']'
  career_goals: Marlen aims to earn a bachelor's degree in Elementary Education and obtain full Texas teaching certification within the next two years. She aspires to become a lead teacher, championing
    bilingual curricula and spearheading an after‑school enrichment program. Long‑term, she sees herself moving into educational leadership, perhaps as a curriculum specialist or assistant principal, with
    a track record of winning district‑wide teaching awards and contributing to school‑wide improvement initiatives.
