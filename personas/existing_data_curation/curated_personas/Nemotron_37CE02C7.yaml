  hobbies: '["Hiking", "Vegetable Gardening", "Historical Non-Fiction Reading", "Science-Fiction Reading", "Woodworking", "Board Games (small group)", "STEM Mentoring Volunteering"]'
  career_goals: Angela aims to transition into a senior engineering leadership role where she can shape long‑term product strategy and mentor emerging engineers. She plans to obtain her Professional Engineer
    (PE) license and PMP certification within the next two years, positioning herself to lead multi‑year, high‑impact projects that balance efficiency with sustainable practices. Ultimately, she envisions
    establishing a consultancy focused on process optimization for mid‑size manufacturers in New England, allowing her to blend technical expertise with her desire for structured, predictable work environments
    while preserving a healthy work‑life balance for her family.
