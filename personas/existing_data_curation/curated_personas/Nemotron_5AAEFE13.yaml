  career_goals: Aaron aims to deepen his expertise in scalable system design and move into a senior engineering role within the next three years. He wants to lead cross-functional teams that build reliable,
    high-performance services, eventually progressing to a technical lead or Site Reliability Engineer position where he can apply his methodical mindset to improve system resilience. He also plans to pursue
    a part-time master's degree in Computer Science to strengthen his theoretical foundation, contribute to open-source projects focused on developer tooling, and mentor junior developers through community
    coding workshops.
