personas:
  professional: Aaron Huynh, a 26‑year‑old full‑stack web developer, leverages deep expertise in Python, Java, and JavaScript along with test‑driven, Agile practices to design scalable backend services
    and responsive frontends, while routinely mentoring junior developers through community coding workshops and plotting a path toward a senior engineering or SRE role.
  sports: Aaron Huynh follows the San Francisco Giants and Golden State Warriors, hikes with the San Francisco Bay Trail Club on weekends, and plays in a local intramural soccer league, preferring steady
    cardio and team camaraderie over high‑impact gym workouts.
  arts: Aaron Huynh collects vintage Ansel Adams prints, finds solace in the melancholic indie sounds of Mitski, frequents SFMOMA’s contemporary art openings, and often quotes lines from Bong Joon‑ho’s
    films during photography meet‑ups, weaving visual and auditory inspiration into their creative routine.
  travel: Aaron Huynh plans trips with exhaustive spreadsheets, having trekked the Yosemite segment of the Pacific Crest Trail, celebrated Tet in Hanoi, explored Kyoto’s historic temples, and now dreams
    of an Icelandic road‑trip to photograph northern lights and volcanic craters.
  culinary: Aaron Huynh’s culinary pursuits revolve around perfecting a fragrant pho broth with star anise and ginger, crafting crisp banh mi with pâté and pickled carrots, and simmering Thai green curry
    with fresh lemongrass and kaffir lime, skills they showcase during intimate dinner gatherings with close friends.
  core: Aaron Huynh’s life is a methodical blend of code, puzzles, and coastal hikes, punctuated by a quiet habit of late‑night strategy game marathons and a steadfast commitment to orderly planning.
background:
  cultural: Aaron's family traces its roots to Vietnam, and he was raised in a bicultural household in the Bay Area. He grew up bilingual, speaking both English and Vietnamese at home, and celebrated cultural
    holidays such as Tet with traditional foods, lanterns, and family gatherings. The emphasis on education, respect for elders, and community responsibility common in Southeast Asian cultures shaped his
    cooperative and considerate demeanor. While he embraces American values of independence and innovation, he also maintains close ties to his heritage through occasional trips to Vietnam, participation
    in local Vietnamese community festivals, and cooking family recipes passed down through generations.
