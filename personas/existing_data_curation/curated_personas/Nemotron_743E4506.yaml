personas:
  professional: Stacie Yon, a 21‑year‑old community‑focused event coordinator in training, leverages their knack for people‑centric communication and Canva‑fueled design to organize vibrant local festivals
    while simultaneously shadowing stylists in a salon to hone their cosmetology skills, balancing pragmatic budgeting with creative spontaneity.
  sports: Stacie Yon plays recreational basketball on Saturday mornings with a local community league, cheers for the Oklahoma City Thunder and follows the Oklahoma Sooners football season, and incorporates
    dance‑inspired cardio workouts twice a week, balancing competitive spirit with a laid‑back approach to fitness.
  arts: Stacie Yon immerses themselves in hip‑hop culture, dancing to Kendrick Lamar and Missy Elliott tracks while studying contemporary pieces by Alvin Ailey, drawing inspiration from fashion icons like
    Rihanna and Zendaya, and curating Instagram reels featuring choreography to H.E.R.’s latest singles.
  travel: Stacie Yon prefers weekend road trips to nearby music hubs such as Austin, New Orleans, and Nashville, planning itineraries on Google Trips with a mix of festival tickets and low‑cost Airbnb stays,
    while dreaming of a future solo adventure in Barcelona’s art districts once their beauty school tuition is covered.
  culinary: Stacie Yon experiments with Southern comfort dishes like fried chicken with hot‑cayenne honey glaze, collard greens sautéed in smoked paprika, and sweet potato pie, skillfully balancing spice
    levels using Tabasco and cayenne while also mastering quick weeknight avocado toast for a balanced diet.
  core: Stacie Yon is a bold, community‑driven dreamer who blends hip‑hop swagger with meticulous event planning, often juggling late‑night concerts with early‑morning beauty classes, and despite a penchant
    for impulse fashion splurges, they keep a disciplined savings habit.
background:
  cultural: Stacie is an African‑American woman raised in Oklahoma City. Her cultural identity is shaped by Southern Black traditions, gospel music, church community, and family gatherings centered on food
    and storytelling. She draws strength from the local Black community’s emphasis on mutual support, resilience, and activism, while also navigating the diverse cultural landscape of an urban Midwestern
    environment. These influences inform her values, aesthetic sensibilities, and commitment to uplifting her community.
attributes:
  skills: '["Interpersonal Communication", "Event Coordination", "Social Media Management", "Basic Computer Literacy", "Customer Service", "Budgeting and Time Management", "Cooking", "Hair Styling and Fashion
