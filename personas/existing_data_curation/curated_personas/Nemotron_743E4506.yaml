  hobbies: '["Hip‑Hop Dance", "Concert and Festival Attendance", "Cooking Soul Food", "Fashion and Hairstyle Design", "Volunteer Work at Community Center", "Recreational Basketball", "DIY Crafting", "Photography"]'
  career_goals: Stacie aims to first obtain her GED and then enroll in a cosmetology program to become a licensed cosmetologist or makeup artist. She also plans to acquire certifications in event planning
    and community outreach. In the long term, she envisions opening a community wellness and beauty hub in Oklahoma City that offers hair‑care services, health workshops, and youth mentorship programs,
    allowing her to combine her creative talents with her passion for community empowerment.
