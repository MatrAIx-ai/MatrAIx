persona_description: A materials scientist specializing in the development and application of stretchable and conductive materials for wearable electronics, medical devices, and other applications. The
  individual is highly skilled in optimizing the three-dimensional cross-linked structure of thermosetting resins to prevent degradation over time, and is experienced in using these materials to develop
  transparent electrode materials, conductive pastes, and wearable devices. The persona is also knowledgeable about the potential of these materials in shifting the design equation for wearable devices
  from bulky to more wearable and comfortable.
