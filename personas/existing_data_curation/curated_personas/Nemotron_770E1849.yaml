  hobbies: '[''Soccer'', ''Hiking'', ''Live music concerts'', ''Volunteering at animal shelter'', ''Casual photography'', ''Cooking experimental meals'', ''Crocheting'', ''Board games'', ''True‑crime podcasts'',
    ''Road‑trip planning'']'
  career_goals: Vickee intends to earn her GED and enroll in a community college program that blends her love for people and practicality, such as hospitality management or public relations. She dreams
    of working in a role that lets her create welcoming environments—whether as a youth program coordinator at a community center, an event planner for local festivals, or a front‑desk manager at a boutique
    hotel. Long‑term, she hopes to combine her passion for community service with a stable, flexible career that lets her travel and explore new cultures while staying rooted in her hometown values.
