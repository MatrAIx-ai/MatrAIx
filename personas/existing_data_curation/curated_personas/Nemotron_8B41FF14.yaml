  hobbies: '["Watercolor painting", "Visiting contemporary art galleries", "Photography of street scenes", "Asian fusion cooking", "Reading philosophy and design theory", "Yoga", "Strategic board games
    (Go, Settlers of Catan)", "Coastal hiking"]'
  career_goals: Bao aims to advance from his current managerial position to a senior creative director role within a forward‑thinking agency or tech company, where he can shape culturally resonant products
    and campaigns. He is motivated to establish his own boutique consultancy that advises brands on integrating East Asian aesthetics and inclusive storytelling for diverse audiences. In the long term,
    he aspires to mentor emerging talent, publish thought‑leadership pieces on art‑driven innovation, and be recognized as a bridge between artistic vision and strategic business impact.
