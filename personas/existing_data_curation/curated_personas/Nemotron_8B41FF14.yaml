personas:
  professional: Bao Rivera's professional persona blends agile project leadership with a restless curiosity that fuels unconventional creative solutions, leveraging bilingual fluency and cross‑cultural
    insight to pitch heritage‑inspired visual concepts while juggling too many ideas at once due to a relaxed attitude toward strict deadlines.
  sports: Bao Rivera's sports persona is a casual fan of the Golden State Warriors and a regular participant in a weekend hike club that meets at Lands End, but they also join a co‑ed ultimate frisbee league
    at a Bay Area community center, treating each match as low‑key competition reflecting their competitive streak.
  arts: Bao Rivera's arts persona revolves around watercolor landscapes of the Bay’s foggy skyline, weekend visits to the San Francisco Museum of Modern Art to see works by Julie Mehretu and Kara Walker,
    and street photography inspired by Steve McCurry’s use of light, all while curating micro‑exhibitions for friends.
  travel: Bao Rivera's travel persona favors spontaneous, low‑budget trips along the Pacific Coast Highway and weekend escapes to Napa’s vineyards, yet they dream of a month‑long immersion in Kyoto’s tea
    houses and the bustling night markets of Bangkok to fuel future culinary experiments.
  culinary: Bao Rivera's culinary persona is a budding home chef who expertly folds pork and vegetable fillings into dumplings, slow‑cooks adobo with a splash of kaffir lime, and experiments with galangal,
    soy sauce, and smoked paprika in dishes like honey‑glazed pork belly, often hosting intimate dinner parties for fellow creatives.
  core: Bao Rivera blends relentless curiosity with a zen‑like calm, juggling disorganized creative projects, competitive board‑game nights, and spontaneous culinary experiments while quietly building a
    path toward senior creative leadership.
background:
  cultural: Bao was born and raised in Newark, California to a Chinese immigrant father and a Filipino mother, giving him a blended East Asian and Southeast Asian heritage. He grew up celebrating Lunar
    New Year with family gatherings, participating in Vietnamese lantern festivals, and joining Filipino fiestas that feature Spanish‑influenced traditions. Fluent in Mandarin, English, and conversational
    in Tagalog, he navigates multiple cultural lenses. The multicultural fabric of the Bay Area further shaped his appreciation for diverse artistic expressions, while his family’s emphasis on education
    and respect for elders provided a foundation of discipline balanced by his open, curious outlook.
attributes:
