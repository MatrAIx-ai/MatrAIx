  hobbies: '[''hiking in the Rocky Mountains'', ''woodworking projects'', ''playing guitar'', ''cooking traditional Spanish cuisine'', ''watching soccer matches'', ''reading non-fiction self-improvement
    books'', ''cycling around Denver'']'
  career_goals: Miguel aims to advance from his current material mover role to a supervisory position within a logistics or warehousing environment. He plans to obtain certifications such as OSHA safety,
    the Certified Logistics Associate (CLA), and an advanced forklift certification. Over the next five years, he envisions becoming a shift lead or warehouse manager, overseeing inventory control and team
    scheduling, while maintaining the structured, predictable work environment he values. Long‑term, he hopes to leverage his experience to start a small, community‑focused moving or logistics service in
    Denver.
