personas:
  professional: Jennifer Lance, a seasoned CNC machining and plastics fabrication specialist with a business degree, leads their Gooding workshop by blending lean‑manufacturing rigor with a collaborative,
    mentorship‑focused approach that reflects their organized, community‑oriented mindset.
  sports: Jennifer Lance, an avid hiker of the Snake River Canyon trails and loyal supporter of the Idaho State Bengals football team who never misses a Gooding High School basketball game, maintains fitness
    through weekly community yoga classes and occasional volunteer‑run 5K walks, blending their love of local sports spirit with practical, low‑impact exercise.
  arts: Jennifer Lance, a stage‑craft enthusiast who lights and builds sets for the Gooding Community Players while performing in drama productions, spends evenings quilting patterned afghans to the tunes
    of Bob Dylan, and loses themselves in Ken Follett’s historical novels, a blend that underscores their sociable, creative soul and love for tradition.
  travel: Jennifer Lance, who prefers well‑planned road trips that combine scenic drives along the Oregon Coast with stops at historic small towns like Leavenworth, enjoys leisurely visits to Yellowstone's
    geysers and occasional weekend getaways to Vancouver Island, balancing how they love the open landscape with a modest budget and family obligations.
  culinary: Jennifer Lance, an avid gardener‑chef who skillfully prepares garden‑fresh salads with heirloom tomatoes, radishes, and goat cheese, brews their own amber ale to accompany hearty Idaho potato
    stew, and whips up occasional apple crumble for potluck gatherings, reflects their practical yet experimental culinary style that blends home‑cooking comfort with community sharing.
  core: Jennifer Lance navigates life with a practical curiosity, meticulously planning every project while delighting in spontaneous bursts of talkative charm at community events, even if they occasionally
    over‑commit and forget to water their garden for a day.
background:
  cultural: Jennifer grew up in a small town in the Pacific Northwest before settling in Gooding, Idaho. Her family’s roots trace back to German and Irish immigrants who valued hard work, self-reliance,
    and community service. The rural Idaho culture—characterized by close-knit neighborhoods, a strong agricultural heritage, and a pragmatic outlook—has shaped her practical approach to problem-solving
    and her dedication to cooperative community life. While she embraces broader American customs, she also holds onto regional traditions such as annual harvest festivals, local church gatherings, and
    a love for the open, rugged landscape that surrounds Gooding County.
