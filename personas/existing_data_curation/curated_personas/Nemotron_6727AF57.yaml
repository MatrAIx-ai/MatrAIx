  career_goals: Approaching retirement, Jennifer aims to transition from daily production oversight to a mentorship and consulting role where she can share her decades-long expertise with the next generation
    of tradespeople in Gooding. She hopes to lead a safety and continuous-improvement committee, achieve formal Six Sigma certification, and partner with the local community college to develop a hands-on
    apprenticeship program. Additionally, she dreams of opening a small boutique workshop that produces custom metal art and plastic components for local businesses, blending her technical skill with her
    creative side while maintaining financial security for her future.
