  career_goals: Xiujuan aims to advance to an office manager or senior administrative coordinator role, leveraging her extensive experience to lead a small team and oversee workflow optimization. She plans
    to obtain a professional certification in office administration and explore automation tools such as Zapier or Microsoft Power Automate to streamline repetitive tasks. Mentoring younger staff and serving
    as a cultural liaison for Asian community organizations are important to her, as is integrating mindfulness practices to better manage stress. In the long term, she envisions a gradual transition toward
    part‑time consulting for local nonprofits while volunteering to teach language basics and administrative skills.
