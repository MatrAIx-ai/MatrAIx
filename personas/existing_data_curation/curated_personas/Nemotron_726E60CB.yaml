personas:
  professional: Narciso Enriquez, a 16‑year‑old aspiring automotive technician, blends bilingual fluency, methodical planning, and a cooperative spirit to excel in school projects, home garage repairs,
    and community service, while their preference for structure drives them to meticulously document each fix and follow step‑by‑step procedures.
  sports: Narciso Enriquez plays pickup basketball at the Antelope Valley community park, participates with the Lancaster Youth Basketball Club, and cheers for the Los Angeles Lakers and the LA Clippers
    during the NBA season, favoring disciplined practice drills over casual scrimmages to maintain physical fitness and team camaraderie.
  arts: Narciso Enriquez spends evenings listening to bachata, merengue, reggaeton, and mainstream hip‑hop artists such as Romeo Santos, Bad Bunny, and Kendrick Lamar, while immersing themselves in graphic
    novels like \"Saga\" and \"Bone\" and sketching in a personal notebook, a blend that fuels their creative outlet and provides a calming counterbalance to academic pressures.
  travel: Narciso Enriquez prefers low‑key road trips that blend family visits and personal exploration, having driven to the California desert towns of Joshua Tree and Palm Springs, and dreaming of a future
    vacation to the historic capital of a Caribbean island known for its vibrant street festivals and traditional dishes.
  culinary: Narciso Enriquez enjoys cooking family recipes like mangú with boiled plantains, onions, and a fried egg, and simmering a hearty sancocho stew with yucca, corn, and assorted meats, while also
    experimenting with fresh cilantro, lime, and ripe avocado to add bright flavors to their meals.
  core: Narciso Enriquez is a methodical, community‑oriented teen who balances a quiet, worry‑prone nature with a strong sense of duty, often channeling anxiety into meticulous planning, hands‑on projects,
    and heartfelt family traditions.
background:
  cultural: Narciso is a second-generation Dominican-American raised in Lancaster, California. His parents emigrated from the Dominican Republic, so Spanish is spoken at home and Dominican cultural traditions—such
    as celebrating Dominican Independence Day, enjoying family meals of rice, beans, plantains, and dishes like mangú—are integral to his upbringing. He participates in local Latino community events, including
    the Antelope Valley Dominican cultural fair and church youth gatherings, which reinforce a strong sense of family cohesion and communal responsibility. The blend of Caribbean rhythms, Dominican family
    values, and the multicultural environment of Southern California shapes his identity, giving him a deep appreciation for community, hospitality, and the importance of supporting others.
