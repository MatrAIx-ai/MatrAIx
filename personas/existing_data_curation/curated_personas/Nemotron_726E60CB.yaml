  career_goals: Narciso aims to obtain his GED within the next two years and then enroll in a community-college automotive technology program to become a certified automotive technician. He is also exploring
    the option of joining the U.S. Navy, attracted by the clear structure, technical training, and educational benefits it offers. In the longer term, he hopes to secure a stable, well-paying job that allows
    him to support his family, possibly advancing to a supervisory role in an auto repair shop or a maintenance position within a larger organization.
