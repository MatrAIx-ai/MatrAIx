persona_description: 'A political scientist who studies the impact of partisanship on legislative outcomes in the US House of Representatives. Krehbiel''s work challenges the conventional wisdom that partisanship
  affects voting behavior, and he examines two specific situations in which partisanship should affect outcomes: committee assignments and appointment of Conferees. Krehbiel''s methodology involves examining
  the relationship between partisanship and legislative outcomes, and he rejects the premise that partisanship is the only significant factor influencing voting behavior. Krehbiel''s findings suggest that
  partisanship has almost no significant effect in the US House, and he argues that his measure of preferences/ideology is a mere measure of partisanship. Krehbiel''s work is notable for its empirical approach
  and its critical examination of the existing literature on partisanship and legislative outcomes.'
