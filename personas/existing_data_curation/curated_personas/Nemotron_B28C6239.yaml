personas:
  professional: Samuel Bowes, a self‑taught teen game designer, blends imaginative creature sketches with Unity prototypes, demonstrating a knack for storytelling and a competitive edge in online game jam
    contests.
  sports: Samuel Bowes joins the Marlin Middle School soccer team in the fall, follows the Seattle Seahawks for football and the Los Angeles Lakers for basketball, and maintains fitness through spontaneous
    bike rides around the countryside, preferring competition over casual play.
  arts: Samuel Bowes devotes weekends to drawing fantastical beasts inspired by H.R. Giger and Hayashi Kagami, while listening to ambient tracks from Aphex Twin and Brian Eno, and cites Neil Gaiman's novels
    as narrative fuel for their fan‑fiction.
  travel: Samuel Bowes imagines future trips to Iceland's volcanic landscapes and the misty ruins of Angkor Wat, yet their current travel itinerary centers on weekend explorations of the nearby ghost town
    of Jericho and county fairs in neighboring towns, favoring DIY maps over booked tours.
  culinary: Samuel Bowes prefers quick meals like ramen with soft‑boiled eggs and shiitake mushrooms, occasionally experiments with baking sourdough bread, but their cooking skill hovers at a middling level,
    often resorting to instant noodles while gaming.
  core: Samuel Bowes is a hyper‑imaginative teen who sketches monsters, builds pixel worlds, and competitively hacks through school assignments while juggling a chaotic schedule and a love for ambient beats.
background:
  cultural: Samuel grew up in Marlin, a small, close‑knit town in Falls County, Texas, within a predominantly white, rural community. The local culture emphasizes self‑reliance, modesty, and a strong sense
    of neighborly support, often centered around school sports, church gatherings, and community events. While his family and peers value a practical work ethic and traditional Southern values, Samuel’s
    extensive use of the internet and participation in online art forums have broadened his horizons, allowing him to fuse the straightforward, grounded lifestyle of his hometown with the imaginative, abstract
    influences he cherishes. This blend shapes his worldview, balancing respect for local customs with a drive to explore novel ideas beyond his immediate environment.
attributes:
  skills: '[''Hand‑drawn sketching'', ''Digital illustration (Procreate, Krita)'', ''Basic video editing (DaVinci Resolve)'', ''Introductory programming (Python, Scratch)'', ''Creative writing (speculative
    short fiction)'', ''Concept development for games/art'', ''Critical analysis of abstract concepts'']'
  hobbies: '[''Sketching fantastical creatures and characters'', ''Digital painting'', ''Open‑world video gaming (Minecraft, The Legend of Zelda, etc.)'', ''Reading science‑fiction and fantasy novels'',
    ''Writing short stories and fan‑fiction'', ''Experimenting with Unity game development'', ''Nature and abandoned‑site photography'', ''Listening to alternative and ambient music'']'
  career_goals: Samuel aims to turn his vivid imagination into a professional creative career. He plans to complete a GED and then attend a visual arts or game‑design program, with the goal of becoming
    a concept artist for video games or animated productions. He also hopes to publish a collection of his speculative short stories and eventually work as a freelance visual storyteller who blends illustration,
    narrative, and interactive media. His competitive streak drives him to enter art contests, game‑dev hackathons, and online challenges to gain recognition and build a portfolio.
