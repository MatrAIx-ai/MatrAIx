personas:
  professional: Maria Santander is a bilingual cashier known for lightning‑fast POS transactions and calm conflict resolution, and they thrive on immediate, tangible tasks while occasionally stumbling over
    long‑term planning as they pursue an associate degree in Business Administration and aim for a retail supervisory role.
  sports: Maria Santander is an avid weekend hiker of Hill Country trails, occasionally joins a local amateur soccer league, and they stay connected to the Dallas Cowboys while practicing morning stretch‑yoga
    to maintain flexibility.
  arts: Maria Santander immerses in contemporary fiction by authors such as Sally Rooney, journals nightly reflections, crafts crochet gifts for friends, and they find rhythm in cumbia classics like Los
    Ángeles Azules that often soundtrack their small gatherings.
  travel: Maria Santander favors spontaneous day trips to nearby Hill Country towns like Fredericksburg, budgets carefully for backpacking adventures to places such as Santa Fe for its art scene, and they
    dream of eventually exploring the historic streets of Seville while balancing a limited student budget.
  culinary: Maria Santander loves cooking family recipes that blend corn masa, roasted chilies, black beans, and fresh herbs, regularly perfecting dishes like homemade tamales and chilaquiles, and they
    often experiment with spice rubs for grilled vegetables while sharing their creations at weekend potlucks.
  core: Maria Santander is a pragmatic dreamer who balances meticulous cash‑handling at work with a love for solitary reading and spontaneous cooking experiments, often juggling a desire for structure with
    last‑minute inspirations and a tendency to misplace their keys.
background:
  cultural: Maria was raised in a bicultural Mexican‑American household in Texas. She grew up bilingual, speaking Spanish at home and English at school, and participates in family traditions such as Día
    de los Muertos, quinceañera celebrations, and weekly church gatherings. Her cultural identity blends Mexican culinary customs, festive music, and a strong sense of familial responsibility with the community
    values of small‑town Texas. This background informs her practical outlook, her love of cooking authentic dishes, and her desire to give back to the Jourdanton community through future entrepreneurship.
attributes:
  skills: '[''cash handling'', ''point-of-sale operation'', ''bilingual communication (English/Spanish)'', ''customer service'', ''inventory management'', ''basic bookkeeping'', ''conflict resolution'',
    ''quick learning'', ''adaptability'', ''time-sensitive multitasking'']'
  hobbies: '[''reading'', ''journaling'', ''cooking Mexican cuisine'', ''hiking'', ''gardening'', ''listening to regional Mexican music'', ''dancing'', ''crocheting'']'
  career_goals: Maria plans to earn an associate degree in Business Administration at a local community college while continuing her work as a cashier. Her short‑term goal is to move into a supervisory
    or assistant manager role within the retail environment, where she can apply her practical skills and develop leadership experience. In the longer term, she dreams of opening a family‑owned convenience
    store in Jourdanton that serves the community and creates stable jobs for her relatives. To support this, she hopes to pursue additional coursework in entrepreneurship and a certification in financial
    management.
