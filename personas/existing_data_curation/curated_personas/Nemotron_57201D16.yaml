personas:
  professional: Steve Kelly, a 26‑year‑old quality inspector at a food‑processing plant, blends hands‑on expertise with lean principles and a curiosity for automation by using micrometers, SPC charts, and
    Excel to ensure product compliance, and they see each inspection as a stepping stone toward a supervisory role and eventual consulting business.
  sports: Steve Kelly, a dedicated fisherman who spends weekends on the river, a casual member of the County Fair Crushers softball team, a loyal fan of the Iowa Hawkeyes football and the Chicago Cubs,
    and they keep fit by running with the local Trailblazers 5K club each spring, blends community spirit with personal fitness.
  arts: Steve Kelly, an avid model‑train builder who assembles detailed layouts in his garage, simultaneously enjoys classic country tunes from Johnny Cash and Bob Dylan, attends the community theater’s
    productions of classics like ‘Our Town,’ and they often unwind by watching Steven Spielberg’s films for inspiration.
  travel: Steve Kelly, who prefers low‑cost road trips planned around local fairs and family visits, has explored Chicago’s museums, driven through the Badlands on a summer weekend, and they hope to hike
    Yellowstone’s geysers before expanding travel to the Canadian Rockies, balancing adventure with budget‑conscious planning.
  culinary: Steve Kelly, a competent backyard griller who regularly prepares Kansas City‑style ribs with a bourbon glaze, buttery corn on the cob seasoned with smoked paprika, and homemade apple crisp topped
    with oat crumble, enjoys sourcing herbs from his garden and experimenting with fresh ingredients while they still rely on a trusty charcoal grill.
  core: Steve Kelly, a pragmatic, curiosity‑driven 26‑year‑old who balances precise quality‑inspection work with a love for fishing, grilling, and model trains, while occasionally hoarding spare bolts and
    procrastinating on paperwork, embodies modest ambition and hands‑on creativity.
background:
  cultural: Steve was raised in a small farming community in central Iowa, where values of self‑reliance, modesty, and neighborly cooperation are deeply ingrained. His family has long‑standing ties to a
    Methodist congregation, participating in church potlucks and community service projects. The rural Midwestern backdrop, combined with seasonal county fairs and a strong work ethic, has shaped his pragmatic
    outlook and his appreciation for both tradition and incremental innovation.
attributes:
  skills: '[''Precision measurement'', ''Statistical Process Control (SPC)'', ''Lean manufacturing & 5S'', ''Technical drawing interpretation'', ''Sample preparation'', ''Quality inspection software (Q‑DAS,
    Minitab)'', ''Data entry and basic Excel analysis'', ''Report writing'', ''Team communication'', ''Basic equipment troubleshooting'']'
  hobbies: '[''Fishing'', ''Gardening'', ''Model train building'', ''Grilling and BBQ cooking'', ''Volunteering at the county fair'', ''Listening to tech and DIY podcasts'', ''Attending local high school
    sports events'', ''DIY home improvement projects'']'
  career_goals: Steve aims to formalize his education by earning a GED and pursuing an ASQ Certified Quality Inspector credential within the next two years. He envisions moving into a lead inspector role,
    eventually becoming a shift supervisor for quality assurance, and cross‑training in basic PLC programming to support automation initiatives. Long‑term, he hopes to leverage his practical experience
    and newfound technical skills to launch a small consulting firm that helps regional manufacturers improve their quality systems.
