persona_description: A team of scientists and researchers from The University of Nottingham, particularly from the School of Veterinary Medicine and Science, who specialize in molecular biology, bioinformatics,
  and animal genetics. They are part of a research team that has carried out the first molecular characterisation of the African elephant's adipose tissue, which is crucial for securing the health and future
  survival of captive elephants. This research provides important information on the structure and function of adipose tissue in the African elephant, highlighting the crucial genes and nutrients present
  during different times of life, particularly reproduction and lactation. The research team is likely to be interested in understanding the role of leptin, a hormone made by fat cells to regulate the amount
  of fat stored in the body, in elephant health and reproduction. They are also likely to be interested in exploring the impact of this research on the captive elephant population, as well as on other domestic
  or non-domestic species.
