personas:
  professional: Robert Burt, a 4‑year‑old, is a budding builder who loves assembling Lego sets with meticulous precision, turning each block into a structured mini‑city while quietly critiquing the stability
    of each design.
  sports: Robert Burt, a 4‑year‑old, eagerly follows the Detroit Tigers in spring, the Grand Rapids Griffins in winter, and participates in toddler soccer with the Kent County Little Leagues, while also
    reveling in snow‑ball battles and impromptu backyard baseball with a plastic bat.
  arts: Robert Burt, a 4‑year‑old, delights in colorful storytimes at the Grand Rapids Public Library, dances to the playful tunes of Raffi and the classic Disney soundtrack, and can recite lines from the
    beloved animated film Frozen by Idina Menzel.
  travel: Robert Burt, a 4‑year‑old, loves weekend family road trips to Mackinac Island's horse‑drawn tours, the Michigan State Fair's candy stalls, and his upcoming wish to see the glittering lights of
    Disneyland in California, preferring car rides with his favorite plush blanket and frequent snack breaks.
  culinary: Robert Burt, a 4‑year‑old, favors buttery mac and cheese, crunchy fish sticks, and apple slices sprinkled with cinnamon, proudly helps stir the batter for banana muffins, and insists on sprinkling
    shredded cheddar on everything.
  core: Robert Burt, a pragmatic 4‑year‑old with a competitive streak, balances meticulous Lego constructions with spirited snow‑ball fights, but stubbornly clings to bedtime routines, often negotiating
    extra story time.
background:
  cultural: Robert comes from a white Midwestern American family rooted in the Comstock Park community of Kent County, Michigan. His parents value practicality, self‑reliance, and modesty—traits common
    in this region. He grows up attending local events such as the Michigan State Fair and community picnics, and he is familiar with the rhythms of the four seasons, enjoying snow‑ball play in winter and
    fishing trips to nearby lakes in summer. The family’s cultural practices include Sunday family meals, weekly visits to the local church, and a strong emphasis on education and community service, reflective
    of typical Midwestern values. Exposure to nearby Grand Rapids’ arts scene and the region’s strong high‑school sports culture adds a subtle competitive edge to his upbringing.
