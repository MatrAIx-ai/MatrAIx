  career_goals: Robert frequently talks about growing up to become a firefighter because he admires the clear rules, teamwork, and the ability to help others in a structured way. He also expresses interest
    in becoming a builder or junior engineer, inspired by his love for stacking blocks and creating stable structures. These aspirations reflect his desire for predictable, purposeful roles where he can
    apply his practical skills and competitive spirit.
