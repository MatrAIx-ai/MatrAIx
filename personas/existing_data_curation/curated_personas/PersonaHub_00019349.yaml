persona_description: Dr. Jerry Howard, a Ph.D. archaeologist with expertise in prehistoric Hohokam irrigation and the environmental impacts of such practices. He is a curator at the Arizona Museum of Natural
  History in Mesa, Arizona, and an adjunct faculty member at Mesa Community College. Dr. Howard has authored numerous archaeological publications and created an overview of settlements and canals in the
  Salt River Valley. He is considered the ultimate information source and expert on prehistoric canals in the Phoenix area, with a positive impact on research and public planning. Dr. Howard is a tireless
  worker with a passion for archaeology and has supported the acquisition, preservation, and study of the Mesa Grande Mound. He is a valued member of the Arizona Archaeology Society – Desert Foothills Chapter,
  attending their meetings on the second Wednesday of each month.
