  career_goals: Nicholas often talks about becoming an astronaut who can travel to the stars and sketch the planets he discovers. He also enjoys drawing comics and imagines a future as an artist who creates
    vivid illustrations. Occasionally, he says he'd like to be a teacher because he likes helping friends learn new things. His ambitions reflect his curiosity, love of art, and desire to make a positive
    difference for others.
