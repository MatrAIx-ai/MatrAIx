    ''Time management'']'
  hobbies: '[''Cooking authentic Mexican cuisine'', ''Gardening (herbs and succulents)'', ''Reading non‑fiction personal development and business books'', ''Listening to traditional Mexican music'', ''Participating
    in small cultural gatherings'', ''Knitting and crochet projects'']'
  career_goals: Marlene aims to advance from her current purchasing agent role to a senior purchasing manager within the next five years, leveraging her hands‑on experience and bilingual strengths. She
    plans to earn the Certified Professional in Supply Management (CPSM) credential to formalize her expertise. Her long‑term ambition is to lead a strategic sourcing team that drives measurable cost reductions
    and builds strong supplier relationships, especially with manufacturers in Mexico, thereby contributing to the company’s profitability and operational efficiency.
