personas:
  professional: Everett is an aspiring young robotics enthusiast and budding inventor who spends afternoons in the school robotics club sketching contraptions in a notebook, channeling their curiosity and
    practicality while preferring the relaxed, small-group collaboration that matches their easygoing yet sometimes disorganized nature.
  sports: Everett enjoys Saturday football gatherings, cheering for the Dallas Cowboys, rides a bike with the Cypress Cyclones biking club, and occasionally plays midfield for the local youth soccer team,
    balancing a love for outdoor activity with a preference for low-pressure, small-group participation.
  arts: Everett engages in creative expression by drawing detailed invention schematics, strumming simple chords on a starter acoustic guitar, and immersing themselves in classic rock legends like The Beatles
    and Pink Floyd as well as video-game soundtracks composed by Koji Kondo, using these artistic outlets to soothe their intense emotions.
  travel: Everett dreams of exploring the stars at Houston's Space Center, relishes family trips to Disneyland and the Grand Canyon, and often embarks on spontaneous bike rides to nearby Hill Country lakes,
    favoring a mix of planned adventures and relaxed, budget-conscious outings within their family's constraints.
  culinary: Everett favors backyard barbecue classics such as chicken fried steak and smoked brisket, enjoys a cheesy slice of pizza topped with pepperoni, can whip up a decent grilled cheese using cheddar
    and butter, and is fascinated by the bold flavors of cilantro and cumin when experimenting with tacos.
  core: Everett is a curious, slightly disorganized 12-year-old who builds Minecraft replicas, sketches inventions, and wrestles with anxiety while finding calm through drawing and guitar.
background:
  cultural: Everett was raised in the suburban community of Cypress, Texas, in a middle‑class, white family that blends typical Texan customs with a touch of the multicultural environment of the Greater
    Houston area. He celebrates American holidays such as Independence Day, Thanksgiving, and Christmas with family barbecues, fireworks, and community events. The local culture of football Saturdays, weekend
    barbecues, and a strong emphasis on community volunteering influences his worldview. Though his surname reflects South Asian ancestry, his upbringing is primarily rooted in mainstream American values,
    with occasional exposure to diverse cuisines and cultural festivals through school and neighborhood diversity.
