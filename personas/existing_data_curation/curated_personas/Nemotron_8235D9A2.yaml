  career_goals: Everett dreams of turning his love for building and coding into a career as a software engineer or robotics developer. He imagines working on projects that blend practical problem solving
    with creative technology, such as designing educational robots for children. While his anxiety sometimes makes him worry about future competition, he aims to earn a scholarship to a strong STEM high
    school, followed by a degree in computer science or engineering. He also hopes to create a portfolio of personal projects that could lead to internships or mentorships by the time he finishes high school.
