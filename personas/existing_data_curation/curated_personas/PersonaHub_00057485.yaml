persona_description: A historian who is deeply interested in the history of the Third Reich and the role of psychiatry in the Holocaust. He has a special interest in the history of psychiatric institutions
  in Austria and the details of the deaths of the patients buried in the hospital graveyard. He is also interested in the ethical implications of euthanasia and the way in which it was used as a tool of
  oppression and discrimination.
