  career_goals: Gregory aims to transition from senior machinist to shop foreman within the next two years, leveraging his deep technical knowledge to oversee workflow, improve efficiency, and mentor the
    next generation of tradespeople. He plans to earn a nationally recognized CNC certification and complete a leadership development course offered by his employer. Long‑term, he dreams of opening a small
    custom metal‑fabrication shop that serves local agricultural and construction businesses while incorporating emerging technologies such as additive manufacturing. He also intends to obtain his GED to
    broaden his educational foundation.
