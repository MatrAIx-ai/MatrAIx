personas:
  professional: Louis Jones is an aspiring junior LEGO architect who applies a practical, structure‑loving mind and a competitive edge to design intricate builds while enthusiastically leading collaborative
    building sessions with peers.
  sports: Louis Jones plays forward for the Riverdale Kids Soccer Club, idolizes the Seattle Seahawks for their disciplined play, and channels their competitive drive into disciplined drills and weekend
    matches, aiming to score the most goals each season.
  arts: Louis Jones finds inspiration in the vibrant animation of "PJ Masks" and the orchestral themes of John Williams, often reenacting space rescue scenes with LEGO while humming the iconic "Star Wars"
    motif.
  travel: Louis Jones loves family hikes through the nearby pine‑covered state park, remembers the thrill of a recent trip to Disney World in Orlando, and dreams of exploring the Space Center in Houston
    to see real rockets up close.
  culinary: Louis Jones favours cheese pizza with extra pepperoni, enjoys assembling snack plates of carrot sticks with hummus, and proudly helps stir batter for chocolate‑chip pancakes, though they often
    sneak extra raisins into the mix.
  core: Louis Jones is a structured, competitive six‑year‑old who loves building LEGO, scoring soccer goals, and meticulously sorting toys, yet often worries about losing small items and can be skeptical
    of new rules.
background:
  cultural: Louis grew up in Joplin, Missouri, a small Midwestern city with a close‑knit community and strong family ties. His household reflects Midwestern values that emphasize hard work, reliability,
    and friendliness. He attends a local elementary school where the curriculum emphasizes structure and routine, and his family participates in community events such as town fairs, church gatherings, and
    youth sports leagues. The region’s cultural backdrop includes a blend of rural traditions, a love for outdoor activities, and a supportive neighborhood environment that nurtures his outgoing nature
    while also teaching him to be cautious and responsible.
