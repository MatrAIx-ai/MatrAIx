  career_goals: Joseph aims to advance into a senior engineering or lead developer role that lets him deepen his expertise in building robust, high‑quality systems while preserving a predictable work schedule
    for family stability. Over the next five years he plans to earn an AWS Solutions Architect certification and a Certified Scrum Master credential, positioning himself for a technical architect or team‑lead
    position focused on process improvement and mentoring junior developers. He also hopes to allocate time for community service by supporting local nonprofit coding workshops, combining career growth
    with his desire to give back.
