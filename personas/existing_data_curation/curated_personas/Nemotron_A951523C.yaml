  hobbies: '["Surfing", "Kayaking", "Beach Fishing", "Coastal Hiking", "Woodworking & Model Boat Building", "Acoustic Guitar Playing", "Volunteer Work at Food Bank", "Community Festival Organization", "Reading
    Marine Ecology", "Documentary Watching"]'
  career_goals: He aims to secure stable, full‑time employment that lets him blend his hands‑on skills with his desire to help his community. In the next few years, Keith plans to obtain a certification
    as a marine mechanic and to work at the local marina or a commercial fishing operation. He also hopes to transition into a community outreach role with a nonprofit focused on coastal conservation or
    social services, where his organizational and interpersonal strengths can be used to coordinate volunteer programs. Long‑term, he envisions opening a modest family‑run café or a small boat‑repair shop
    that provides steady income for his growing family while serving the needs of Gold Beach residents and visitors.
