personas:
  professional: Keith Chase, a 23‑year‑old aspiring marine mechanic with solid carpentry and small‑engine repair expertise, applies their methodical planning and compassionate nature to lead community boat‑maintenance
    workshops while studying for certification that will let them secure a full‑time position at the local marina and support Gold Beach’s fishing fleet.
  sports: Keith Chase rides winter surf with the Gold Beach Lifesavers surf club, supports the Oregon Ducks football team and the Portland Trail Blazers, and they maintain fitness through early‑morning
    shoreline runs, weekly kayaking trips, and seasonal hikes in the Siskiyou foothills.
  arts: Keith Chase strums acoustic versions of Bob Dylan and local folk singer Phil Ochs at community gatherings, crafts model sailboats while listening to Modest Mouse, and they occasionally help produce
    a community theater night featuring works by playwrights such as Tony Kushner.
  travel: Keith Chase maps modest road trips along the Pacific Northwest, having explored Seattle’s Pike Place Market and the misty cliffs of Cape Disappointment, while dreaming of a summer surf pilgrimage
    to New Zealand’s Coromandel Peninsula, and they balance early‑bird booking discounts with spontaneous weekend surf‑camp escapes.
  culinary: Keith Chase prepares cedar‑plank salmon, Dungeness crab chowder, and fish tacos seasoned with fresh cilantro, lime, and locally foraged seaweed, showing a competent home‑cook level that often
    experiments with wild mushrooms and native herbs, and they delight in serving these dishes at neighborhood potlucks.
  core: Keith Chase is a community‑oriented marine‑mechanic‑to‑be who channels persistent worry into meticulous planning, fuels daily surf sessions with caffeine, and they habitually stay up late perfecting
    woodworking projects.
background:
  cultural: Keith is a white American raised in Gold Beach, Oregon, a small coastal community with deep roots in fishing, timber, and seafaring traditions. His family has generations of experience in the
    local logging and fishing industries, instilling a strong work ethic, self‑reliance, and respect for the natural environment. Growing up in a close‑knit town, he internalized a communal values system
    that emphasizes helping neighbors, preserving the coastline, and celebrating local heritage. While he identifies with the regional Pacific‑Northwest culture, he also respects the history and traditions
    of nearby Indigenous peoples, often participating in community events that honor that legacy.
attributes:
  skills: '["Carpentry & Woodworking", "Small Engine Repair", "Basic Computer Troubleshooting", "Project Planning & Scheduling", "Volunteer Coordination", "CPR & First Aid", "Customer Service", "Conflict
