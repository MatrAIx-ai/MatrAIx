personas:
  professional: Oliver Davis is a meticulous three‑year‑old 'assistant organizer' who loves to line up toy trucks by size and color, turning household chores into playful projects while proudly announcing
    each completed task.
  sports: Oliver Davis is a beach‑sand enthusiast who builds elaborate forts, enjoys kicking a small soccer ball with neighborhood kids, and proudly waves a Miami Heat cap while cheering on the local basketball
    team during family game nights.
  arts: Oliver Davis is a budding performer who sings along to lively gospel choir tunes at Sunday services, dances to Disney movie songs, and eagerly shows off crayon drawings of colorful parrots inspired
    by Caribbean family gatherings.
  travel: Oliver Davis is a curious explorer who treasures family outings to Miami Beach, short drives to the Everglades for airboat rides, and dreams of one day visiting the historic streets of Cartagena
    after hearing Spanish greetings at neighborhood festivals.
  culinary: Oliver Davis is a budding chef who loves munching on sweet plantain bites, scooping mac and cheese with a tiny fork, and proudly stirring banana pancake batter alongside a parent, always requesting
    a sprinkle of cinnamon on top.
  core: Oliver Davis is a structured toddler who blends a love for routine with the joy of community gatherings, showing early signs of organization, modest spending, and a heartfelt preference for harmony
    over chaos.
background:
  cultural: Oliver grows up in a Black family rooted in South Florida's rich cultural mosaic. His household blends African‑American traditions—such as Sunday church services, gospel music, and celebrations
    of Juneteenth—with influences from the diverse Miami‑Dade community, including occasional Spanish‑language greetings and Caribbean cuisine at family gatherings. The family values community, harmony,
    and respect, encouraging Oliver to be cooperative and considerate. Regular exposure to local cultural festivals, seaside outings, and a close‑knit neighborhood context shapes his worldview and provides
    a supportive environment for his developmental milestones.
attributes:
  skills: '[''following two‑step instructions'', ''color and shape recognition'', ''basic counting to ten'', ''fine‑motor coordination for stacking blocks and crayon drawing'', ''object sorting by size
    or type'', ''simple sentence formation'']'
  hobbies: '[''building block towers'', ''drawing simple pictures'', ''structured sandbox and water play at the park'', ''guided storytelling sessions'', ''listening to rhythmic children’s music'', ''participating
    in family and church gatherings'']'
  career_goals: Although only three, Oliver already expresses vivid dreams shaped by his caring nature and desire for order. He frequently points to fire trucks in videos and declares he wants to be a firefighter
    to help people stay safe. He also enjoys watching airplanes and talks about flying, hinting at a future interest in becoming an astronaut or pilot. These ambitions are framed by his love for predictable
    roles where he can protect and support others, and he often says he wants to "be a helper" in any job he imagines.
