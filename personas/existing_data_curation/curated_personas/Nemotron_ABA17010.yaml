  career_goals: Loretta aims to move from a general clerk role into office management within the next three to five years, seeking to lead a small team and oversee departmental operations. She plans to
    earn the Certified Administrative Professional (CAP) credential and is considering a part‑time MBA or a project‑management certification to broaden her strategic skill set. In the longer term, she hopes
    to combine her administrative experience with her passion for the arts by becoming a community‑outreach coordinator for a local cultural center, designing programs that bring together residents for
    workshops, exhibitions, and public events. Mentoring new clerks and championing workplace improvements that enhance both efficiency and employee well‑being are also central to her professional ambitions.
