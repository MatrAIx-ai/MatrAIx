personas:
  professional: April Feaster is a veteran school transportation driver with a knack for defensive driving, meticulous route planning, and calm conflict resolution, and their gentle, cooperative nature
    turns the daily bus ride into a trusted, supportive space for children, where they foster a sense of community.
  sports: April Feaster enjoys a relaxed fitness routine that includes weekend shoreline walks, cheerfully supporting the Cleveland Browns, Cavaliers, and Guardians, and they belong to the Lake Erie Walking
    Club that meets after school events.
  arts: April Feaster finds inspiration in gospel legends like Mahalia Jackson and soul icons such as Aretha Franklin, frequently listening while knitting, and they unwind with mystery novels by Agatha
    Christie and historical sagas by Ken Follett.
  travel: April Feaster loves weekend getaways to Hocking Hills and annual trips to New Orleans for its music and cuisine, while dreaming of a relaxed vacation in Savannah’s historic district, and they
    prefer to plan trips loosely, relying on family recommendations rather than strict itineraries.
  culinary: April Feaster is a confident home cook who blends Southern comfort food—like fried chicken, collard greens, and cornbread—with Mid‑Western staples such as pierogies, often using fresh garden
    tomatoes, sweet potatoes, and a dash of hot sauce to season their signature gumbo, and they relish sharing these dishes at community potlucks.
  core: April Feaster balances a structured, community‑focused career with a flexible, garden‑loving lifestyle, peppered by a sweet tooth for soul music and a habit of forgetting to file tax receipts until
    the last minute, and they constantly remind themselves to tighten those loose ends.
background:
  cultural: April’s cultural background reflects the African‑American experiences of Cleveland’s historic neighborhoods. Raised in a close‑knit Black community, she grew up with strong ties to church, family
    storytelling, and communal celebrations that emphasize resilience, mutual support, and cultural pride. These influences shape her values of harmony, cooperation, and dedication to community service,
    while her personal history includes navigating the challenges of a mid‑life divorce and balancing work with family responsibilities.
attributes:
  skills: '[''Defensive driving'', ''Route planning'', ''Child safety enforcement'', ''Basic first aid'', ''Vehicle inspection'', ''Effective communication'', ''Conflict mediation'', ''Community outreach'']'
