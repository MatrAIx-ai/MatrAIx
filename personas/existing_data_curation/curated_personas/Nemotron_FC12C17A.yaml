  career_goals: April aims to advance within the school transportation department, seeking a senior driver or supervisor role where she can train new drivers and influence route safety policies. She plans
    to obtain additional certifications in transportation safety and eventually explore a position in district‑wide logistics planning, while also considering a part‑time role teaching driver safety workshops
    to youth.
