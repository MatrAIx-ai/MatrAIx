personas:
  professional: Faith Oden is an aspiring community storyteller who blends curiosity and practicality by illustrating picture-book characters for Sunday school, using their compassionate yet sometimes anxious
    nature to engage peers while staying relaxed about rigid schedules.
  sports: Faith Oden loves the short soccer games she plays with the Columbia Elementary Tigers Soccer Club on weekend afternoons, enjoys dancing to upbeat children's tunes at her local dance studio, and
    rallies with excitement for the South Carolina Gamecocks during football season, though she prefers gentle activities over organized competition.
  arts: Faith Oden draws inspiration from the uplifting gospel sounds of Kirk Franklin and the playful melodies of Raffi, while she spends afternoons sketching characters from Disney's Moana and building
    imaginative worlds with LEGO, weaving these artistic threads into her weekend church choir rehearsals.
  travel: Faith Oden prefers short family road trips that blend adventure and comfort, such as weekend visits to Charleston's historic waterfront and yearly pilgrimages to Disney World in Orlando, while
    dreaming of a school field trip to Washington D.C.'s National Museum of African American History.
  culinary: Faith Oden delights in the comforting flavors of fried chicken, buttery cornbread, and sweet potato pie, often helping her mother whisk together mac and cheese and garnish it with crunchy garden
    peas she harvested herself, while she can't resist a snack of gummy bears after church.
  core: Faith Oden is a curious yet anxious seven-year-old who finds solace in gospel music, LEGO worlds, and quiet moments with a sketchbook, balancing a love for community with occasional bouts of disorganization.
background:
  cultural: Faith grows up in a tight‑knit African‑American community in Columbia, South Carolina, where family, church, and Southern traditions shape everyday life. Her family celebrates cultural milestones
    such as Juneteenth and participates in local church events featuring gospel music, storytelling, and communal meals of soul food. She is exposed to the rich history of the civil‑rights movement in the
    South through school projects and community gatherings, and she often hears oral histories from grandparents that emphasize resilience and community support. These cultural influences nurture her love
    for music, communal worship, and a strong sense of belonging.
attributes:
  skills: '["Reading comprehension (grade‑2 level)", "Basic addition and subtraction (up to 20)", "Creative drawing and coloring", "LEGO building and spatial reasoning", "Basic tablet navigation for educational
    apps", "Oral storytelling and memorization of short verses", "Cooperative play in small groups"]'
  hobbies: '["Reading picture books", "Drawing and coloring", "Building with LEGO bricks", "Backyard nature exploration", "Listening to gospel and children’s music", "Sunday school and church activities",
    "Playing soccer in a small group", "Simple dance class"]'
  career_goals: Faith dreams of becoming a teacher one day so she can share the joy of learning with other children, and she also imagines caring for animals as a future veterinarian. In the near term,
    she aims to improve her reading speed, learn to organize her school supplies more consistently, and develop strategies to soothe her intense emotions when she feels anxious or sad. She hopes to start
    a small book‑sharing circle with a few friends at school, giving her a chance to lead while staying in a comfortable, low‑key setting.
