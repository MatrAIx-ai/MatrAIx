persona_description: A meteorologist who specializes in atmospheric research, particularly in the areas of air quality monitoring and satellite data analysis. She is part of the Penn State meteorology team
  working on a five-year study to improve NASA's ability to monitor air quality from satellites. Her role is to act as ground control and provide real-time data on levels of carbon monoxide, sulfur dioxide,
  nitrogen compounds, ozone and methane to help NASA better understand and forecast air quality. Her research interests include meteorology, satellite data analysis, and air quality monitoring.
