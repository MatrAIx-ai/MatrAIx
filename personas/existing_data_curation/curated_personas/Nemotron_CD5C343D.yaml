  career_goals: Josefina aims to advance from her current hands-on role into a supervisory position within the retail sector, such as shift leader or store manager, over the next two to three years. She
    plans to complete her bachelor’s degree in Business Administration, focusing on supply-chain management, and earn certifications like APICS Certified in Production and Inventory Management. In the longer
    term, she dreams of managing a logistics operation or launching a small e-commerce business that highlights Mexican artisan goods, providing a platform for local producers. Throughout her career trajectory,
    she hopes to mentor new employees, champion workplace diversity, and use her bilingual skills to improve communication across multicultural teams.
