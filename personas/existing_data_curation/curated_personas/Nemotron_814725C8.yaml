    "Traveling to the Gulf Coast", "Farmers market visits", "Gentle yoga"]'
  career_goals: Although retired from formal employment, Amina aims to deepen her impact on the Baton Rouge community. She plans to lead a senior‑center activity program focused on storytelling and cooking
    workshops, expand the local food‑bank volunteer network, and document her family's oral history in a memoir. Amina also hopes to learn digital photography to capture community moments, attend a regional
    genealogy conference, and travel to visit her grandchildren while maintaining her health and managing stress through gentle yoga and mindfulness practices.
