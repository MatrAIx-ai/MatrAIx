  hobbies: '[''Hiking local trails'', ''Singing in the church choir'', ''Cooking Southern cuisine and experimenting with recipes'', ''Photography of natural landscapes'', ''Reading contemporary fiction
    and theology'', ''Volunteering at community food banks'', ''Traveling to historic religious sites'', ''Participating in improv comedy workshops'', ''Attending live music concerts'', ''Gardening'']'
  career_goals: Sonya aims to earn a Master of Divinity within the next three years to deepen her theological expertise and expand her leadership capabilities. She envisions growing the church’s outreach
    initiatives into a regional network that partners with schools, other faith communities, and non‑profits across Southern Kentucky. Long‑term, she aspires to become a regional director of religious education,
    overseeing curriculum innovation and community‑service programs while championing interfaith collaboration and sustainable, flexible program models that can adapt to evolving community needs.
