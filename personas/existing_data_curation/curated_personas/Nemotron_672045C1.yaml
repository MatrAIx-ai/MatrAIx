  hobbies: '[''Cooking'', ''Baking'', ''Choir singing'', ''Volunteer work at food pantry'', ''Organizing game nights'', ''Gardening'', ''Crocheting'', ''Watching sitcoms'', ''Yoga'', ''Gratitude journaling'']'
  career_goals: Stephanie aims to build a career in social services, focusing on community outreach and case management where she can support individuals and families and promote harmony. In the short term,
    she plans to enroll in a community college program in social work or human services, obtain certifications in first aid and basic counseling, and secure a part‑time role at a local non‑profit organization.
    Long‑term, she hopes to earn a bachelor’s degree in social work, become a licensed social worker, and eventually lead a community center or youth services program in her hometown of Machesney Park.
