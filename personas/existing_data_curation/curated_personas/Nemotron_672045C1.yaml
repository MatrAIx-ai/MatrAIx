personas:
  professional: Stephanie Taylor, an aspiring community outreach coordinator, channels strong interpersonal communication, meticulous event planning, and basic first‑aid training into designing reliable,
    supportive programs for seniors and youth, while their sociable, routine‑driven nature helps them build lasting trust, even as they occasionally over‑worry about every detail.
  sports: Stephanie Taylor, a yoga‑enthusiast who also cheers on the Chicago Cubs in summer and the Chicago Bears in fall, participates in a local recreational softball league and joins a weekend jogging
    group to stay active without sacrificing their love for routine.
  arts: Stephanie Taylor, a devoted church‑choir vocalist who unwinds by crocheting blankets while streaming classic sitcoms like Friends and Seinfeld, also draws creative inspiration from the folk storytelling
    of Dolly Parton and the uplifting worship of Chris Tomlin, enriching their community spirit.
  travel: Stephanie Taylor, a budget‑conscious traveler who favors carefully planned weekend getaways, often drives to Chicago’s Millennium Park and Michigan’s Lake Michigan shoreline, while dreaming of
    a future pilgrimage to Washington, D.C., balancing their love for familiar routines with a yearning for new cultural experiences.
  culinary: Stephanie Taylor, an enthusiastic home baker who delights friends with signature chocolate chip cookies, classic lasagna, and herb‑infused soups, frequently experiments with fresh basil, rosemary,
    and tomatoes from their backyard garden, yet occasionally splurges on premium vanilla beans.
  core: Stephanie Taylor, a routine‑loving social‑service hopeful who can’t resist a nightly sitcom episode and an extra scoop of frosting, balances boundless compassion with a habit of over‑worrying and
    an uncanny ability to turn any gathering into a perfectly organized celebration, all while they keep a gratitude journal to soothe their nerves.
background:
  cultural: Stephanie grew up in Machesney Park, a close‑knit suburb of Rockford, Illinois. Her family’s ancestry includes German and Irish roots that settled in the Midwest in the early 1900s. Raised in
    a traditional, middle‑class household, she experienced a strong emphasis on hard work, community involvement, and church participation. Local customs such as seasonal fairs, high school sports events,
    and church potlucks shaped her practical outlook, reliability, and her commitment to helping others and maintaining community harmony.
