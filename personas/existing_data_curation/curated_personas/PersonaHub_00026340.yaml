persona_description: An art historian who specializes in the analysis and authentication of paintings, especially those from the Renaissance period. They have extensive knowledge of the techniques used
  by artists during that era and are skilled in using nuclear techniques such as X-ray Fluorescence and Particle Induced X-ray Emission to analyze and reconstruct the exact composition of pigments used
  by the artist. They have a keen eye for spotting fake paintings and have successfully used radiocarbon dating to date a painting that was believed to be a forgery.
