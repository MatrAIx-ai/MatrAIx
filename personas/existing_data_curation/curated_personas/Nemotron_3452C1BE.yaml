  career_goals: James daydreams about becoming an astronaut so he can explore space and draw the planets he discovers. He also imagines himself as a cartoonist who creates comic books about wildlife adventures,
    combining his love of art and animals. Occasionally he mentions wanting to be a wildlife biologist to protect the piney woods near Kirbyville, and he admires firefighters and teachers for helping the
    community. His career ambitions intertwine curiosity, creativity, and a desire to make a positive impact on others.
