personas:
  professional: James Adams is a budding imagination engineer who channels their love for dinosaurs, robots, and Texas landscapes into intricate LEGO forts and Minecraft worlds, demonstrating early problem‑solving
    skills and a knack for turning abstract ideas into tangible designs.
  sports: James Adams thrives on the neighborhood youth soccer team, the “Lone Star Cubs,” sprinting across the field with boundless energy, celebrating each goal with teammates, and uses after‑practice
    drills to improve footwork while occasionally demanding a longer snack break.
  arts: James Adams immerses themselves in creative expression, filling sketchbooks with dinosaur sketches reminiscent of Michael Crichton’s Jurassic illustrations, dabbling in watercolor scenes inspired
    by Claude Monet’s garden paintings, and eagerly performing dance moves to classic children’s songs like “The Wheels on the Bus” during family gatherings.
  travel: James Adams loves backyard expeditions in the piney woods, has visited the nearby Big Bend State Park for a weekend nature hike, dreams of exploring the Dinosaur National Monument in Colorado,
    and hopes to one day see the glittering lights of Disneyland with their family.
  culinary: James Adams enjoys a playful palate, frequently munching on crunchy carrot sticks, devouring macaroni‑and‑cheese, and helping whisk together a simple no‑bake chocolate‑peanut butter cookie,
    while also insisting on adding a splash of salsa to any taco night.
  core: James Adams is a curious 7‑year‑old LEGO architect and soccer enthusiast who paints watercolors of Texas plains, collects pine‑forest treasures, and sometimes forgets to brush their teeth after
    candy treats.
background:
  cultural: James grew up in Kirbyville, a small East Texas town with deep roots in Southern hospitality and community values. His family attends a local Baptist church, where Sunday school nurtures his
    curiosity about stories and morals. He spends holidays at family barbecues, enjoys country music and gospel hymns, and participates in community events like the county fair and school talent shows.
    The piney woods and nearby lakes shape his love for nature, while his school exposes him to a mix of rural and modern influences, including technology and diverse ideas. This blend of traditional Texas
    culture, family support, and an open‑minded environment fuels his artistic appreciation and adventurous spirit.
