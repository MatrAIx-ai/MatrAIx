  hobbies: '[''Watercolor painting'', ''Quilting'', ''Creative writing'', ''Reading contemporary and philosophical literature'', ''Gardening'', ''Chess'', ''Crossword and Sudoku puzzles'', ''Volunteering
    at senior programs'', ''Historic walking tours'', ''Experimental cooking'']'
  career_goals: Although retired from formal employment, Gladys aims to leave a lasting artistic and civic legacy. She plans to curate a traveling exhibition of her watercolor works, publish a memoir that
    weaves together her community activism and artistic journey, mentor younger volunteers at the local community center, launch a small online shop for her quilts, and secure a board seat on the Hampshire
    Historical Society to help preserve the town’s heritage.
