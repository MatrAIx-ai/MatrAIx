persona_description: Sara Teasdale was a poet who had a tumultuous personal life, but her work as a poet was recognized and celebrated. She was born in 1884 in St. Louis, Missouri, and died in 1933 in New
  York City at the age of 48. She was a highly regarded poet and won a Pulitzer prize in 1917 for her work. Despite her success as a poet, she struggled with loneliness and depression throughout her life.
  Her poetry often dealt with themes of love, loss, and the human condition.
