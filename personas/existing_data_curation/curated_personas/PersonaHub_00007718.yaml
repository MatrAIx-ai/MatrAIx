persona_description: A Turkish economist with expertise in global value chains and their impact on the Turkish economy. The person is interested in understanding the role of GVCs in the Turkish economy,
  the challenges and opportunities they present, and the potential for Turkey to rebalance its economy through increased participation in GVCs. They are likely to be familiar with the OECD Economic Survey
  of Turkey and the OECD database on trade in value added. They are also interested in the potential for Turkey to overcome institutional barriers, improve corporate governance, and leverage technological
  advancements in production and management processes to enhance competitiveness and rebalance growth.
