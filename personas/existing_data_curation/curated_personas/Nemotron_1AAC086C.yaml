  career_goals: Andrea aims to become a Certified Public Accountant (CPA) within the next two years and advance to a senior auditor or finance manager position at a regional firm. She is motivated to lead
    a cross‑functional audit team, spearhead the implementation of technology‑driven process improvements, and develop expertise in sustainability and ESG reporting to align financial practices with emerging
    corporate responsibility standards. Long‑term, she envisions taking on a leadership role where she can mentor emerging accountants, influence strategic financial decisions, and contribute to the financial
    health of her community through pro‑bono consulting for local non‑profits.
