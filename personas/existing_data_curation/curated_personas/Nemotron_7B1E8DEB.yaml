personas:
  professional: Ben Price, a disciplined budding robotics engineer, merges his curiosity for new tech with a practical, methodical programming style, leading his school's robotics club to design competition‑grade
    autonomous vehicles while energizing teammates with his talkative, charismatic presence.
  sports: Ben Price anchors the point guard spot on his middle school basketball team, drills daily at the local youth athletic club, draws strategic inspiration from the NBA’s Golden State Warriors, and
    often organizes post‑game community clean‑ups, balancing his competitive drive with a strong sense of teamwork.
  arts: Ben Price channels his sociable energy into creating fifteen‑second TikTok skits set to tracks by Billie Eilish and Lil Nas X, while drawing visual inspiration from YouTube maker Mark Rober and
    sprinkling sci‑fi quotes from William Gibson into his captions.
  travel: Ben Price has explored the nearby Redwood State Park during community clean‑up outings, dreams of attending a robotics summer camp at MIT in Cambridge, and plans a future family trip to Tokyo
    to experience Japan’s cutting‑edge tech culture.
  culinary: Ben Price favors quick, protein‑rich meals like chicken teriyaki bowls with rice, soy sauce, and broccoli, enjoys customizing his own pepperoni pizza with extra cheese, and often snacks on crunchy
    trail mix while debugging code, though he sometimes forgets to stay hydrated.
  core: Ben Price is a hyper‑organized, talkative teen who blends a love for robotics, basketball, and TikTok fame with disciplined savings, occasional energy‑drink overindulgence, and a relentless drive
    to turn futuristic ideas into real‑world projects.
background:
  cultural: Ben was raised in Hacienda Heights, a suburban enclave of Los Angeles County known for its blend of American suburban culture and diverse Asian influences. His family emphasizes academic achievement,
    community service, and cultural celebrations such as the local Fourth of July parade and community summer festivals. This environment has fostered his practical curiosity, organized work ethic, and
    strong social confidence.
