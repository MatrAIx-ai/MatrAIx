persona_description: A person who is interested in linguistics, particularly the rules and conventions of English grammar and usage. They are familiar with the different rules and conventions of American
  and British English, and are knowledgeable about the differences between American and British usage of quotation marks, periods, commas, and other punctuation marks. They are also aware of the logical
  systems used by early champions of the logical system, such as H.W. Fowler and F.G. Fowler, and are familiar with the memory trick used to remember the correct placement of punctuation marks inside or
  outside quotation marks.
