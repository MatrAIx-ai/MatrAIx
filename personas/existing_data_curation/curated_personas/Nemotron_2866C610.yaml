personas:
  professional: Juan Quetglas is a veteran Class A driver with over 30 years of long‑haul and local delivery experience who combines meticulous route planning, bilingual communication, and a sales‑savvy
    negotiation style to mentor junior drivers, optimize fleet logistics, and spearhead the transition to electric‑vehicle operations for their future family‑run delivery service.
  sports: Juan Quetglas enjoys weekend fishing along the San Diego coastline, follows the San Diego Padres and the LA Chargers, participates in a local amateur soccer league as a midfielder, and maintains
    a modest fitness regimen of early‑morning jogs and garage‑based stretching to stay limber for long drives.
  arts: Juan Quetglas has a deep appreciation for classic automotive literature, the cinematic storytelling of directors like Steven Spielberg, the music of Bruce Springsteen and the blues of B.B. King,
    and often attends local community theater productions, finding that these artistic experiences fuel their creativity in car restoration and mentorship.
  travel: Juan Quetglas prefers well‑planned road trips along scenic coastal highways, having explored the Pacific Coast Highway, the vineyards of Napa Valley, and a historic car museum in Stuttgart, Germany,
    while dreaming of an electric‑vehicle tour of Scandinavia and balancing travel with a modest budget that accommodates family responsibilities.
  culinary: Juan Quetglas enjoys cooking family‑style dishes such as pork carnitas, chicken enchiladas verdes, and fresh salsa made with garden‑grown tomatoes and chilies, showcasing a confident home‑chef
    skill level that blends traditional recipes with occasional experiments like smoked brisket, and they love pairing meals with craft beers from local microbreweries.
  core: Juan Quetglas is a methodical, curiosity‑driven former long‑haul driver who balances meticulous planning with a love for classic cars, gardening spicy peppers, and mentoring the next generation,
    all while occasionally forgetting to take their blood‑pressure medication after a long haul.
background:
  cultural: Juan Samuel grew up in a bilingual Mexican‑American household in the San Diego area. His upbringing emphasized strong familismo values, Catholic traditions, and celebrations such as Día de los
    Muertos, Cinco de Mayo, and patron saint festivals. Fluent in both Spanish and English, he comfortably navigates Mexican cultural practices—like cooking mole, listening to mariachi, and participating
    in community fiestas—while also engaging with the broader Californian lifestyle. This bicultural identity shapes his work ethic, community involvement, and personal interests, blending Mexican heritage
    with the coastal Southern California environment.
