  career_goals: Juan Samuel aims to transition from front‑line driving to a mentorship and fleet‑management role within the next five years. He plans to earn a certified driver‑trainer credential, deepen
    his knowledge of emerging electric‑vehicle logistics, and eventually launch a small family‑run delivery service that serves the Mexican‑American community in San Diego. He also seeks to secure financial
    stability for retirement by paying off his mortgage, establishing a college fund for his grandchildren, and building a modest side business that leverages his sales and logistics expertise.
