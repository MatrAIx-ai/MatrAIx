personas:
  professional: Tong Hong, a nuclear medicine technologist specializing in PET/CT imaging, radiopharmaceutical preparation, and precise dosimetry, leverages rigorous safety protocols, Python‑driven QA automation,
    and a competitive drive to streamline workflows while creatively applying artistic perspectives to AI‑based dose‑optimization research, and they meticulously double‑check peer‑reviewed protocols, reflecting
    a healthy skepticism that fuels their pursuit of error‑free operations.
  sports: Tong Hong, an avid hiker who spends weekends trekking the Santa Ana Mountains and Cleveland National Forest, also follows the Los Angeles Dodgers and Los Angeles Lakers, and they regularly train
    with the Orange County Hiking Association while attending a local rock‑climbing gym to complement their cardio regimen.
  arts: Tong Hong, a photographer and erhu player, immerses themselves in contemporary art by frequenting the Museum of Contemporary Art Los Angeles and The Broad, studying works by Yayoi Kusama, Mark Rothko,
    and James Turrell, while they draw creative energy from ambient compositions by Brian Eno and cinematic scores by Hans Zimmer for their own visual projects.
  travel: Tong Hong, a meticulous yet adventurous traveler, blends detailed itineraries with spontaneous night‑sky photography stops, having trekked the Grand Canyon, captured the auroras of Iceland, and
    now dreaming of an astrophotography expedition to the Atacama Desert while they balance family commitments and a modest travel budget.
  culinary: Tong Hong, an intermediate‑skill home chef, delights in crafting traditional Mapo tofu, hand‑rolled jiaozi, and Sichuan hot‑pot, while experimenting with fusion creations like miso‑glazed pork
    belly tacos, favoring ingredients such as Sichuan peppercorn, gochujang, and fresh cilantro, and they often pair meals with a curated playlist of ambient jazz.
  core: Tong Hong, a curious technologist who balances rigorous safety standards with a rebellious streak of night‑time astrophotography, is known for meticulous note‑taking, occasional over‑caffeination,
    and a habit of humming erhu melodies while calibrating PET scanners, and they often find themselves double‑checking dosage logs even after shift end.
background:
  cultural: Tong is a second‑generation Chinese‑American whose parents immigrated to California in the 1980s. He grew up in a bilingual household, speaking Mandarin at home while attending English‑language
    schools in Riverside County. Family traditions such as Lunar New Year, the Mid‑Autumn Festival, and ancestral reverence remain important, and he often prepares festive meals and participates in community
    celebrations at the local Chinese cultural center. While he embraces American values of individualism and career ambition, his upbringing emphasized respect for elders, collective responsibility, and
    a strong work ethic—qualities that influence his reliability and competitive drive at work. Living in Perris, a diverse community with significant Latino and Asian populations, he navigates a multicultural
    environment, blending his heritage with the broader Southern California lifestyle.
attributes:
  skills: '[''Radiopharmaceutical preparation'', ''PET/CT imaging operation'', ''SPECT imaging operation'', ''Radiation dose calculation and dosimetry'', ''Radiation safety compliance (NRC, OSHA)'', ''Quality
    assurance and quality control of imaging equipment'', ''Medical imaging equipment maintenance and troubleshooting'', ''Patient communication and counseling'', ''Data analysis and report generation using
    imaging software'', ''Regulatory compliance (HIPAA, state radiation regulations)'', ''Basic programming for data automation (Python)'', ''Creative problem solving in clinical workflow'', ''Continuing
    education and certification maintenance (CNMT)'']'
  hobbies: '[''Photography (urban and astrophotography)'', ''Visiting art galleries and contemporary museums'', ''Playing the erhu'', ''Calligraphy'', ''Hiking in the Cleveland National Forest and surrounding
    mountains'', ''Cooking traditional Chinese and fusion cuisine'', ''Reading science‑fiction literature'', ''Attending medical imaging seminars and conferences'', ''Experimenting with 3D‑printing and
    prototyping'', ''Listening to jazz and experimental music'']'
  career_goals: Tong aims to become a lead dosimetrist or senior nuclear medicine technologist within the next five years, overseeing a department’s safety program and quality assurance initiatives. He
    plans to earn a bachelor’s degree in radiologic technology or health physics to broaden his expertise, and to obtain advanced certifications such as the Certified Nuclear Medicine Technologist (CNMT)
    and eventually the Certified Health Physicist (CHP). He is interested in integrating artificial‑intelligence tools into dose‑optimization protocols and contributing to research on new radiopharmaceuticals.
    Long‑term, he envisions a supervisory role that allows him to mentor junior staff, shape departmental policy, and improve patient care while providing a stable, higher‑earning environment for his family.
