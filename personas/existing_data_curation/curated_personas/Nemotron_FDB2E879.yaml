  career_goals: Yaling aspires to pursue a career that blends scientific curiosity with a caring, people-oriented focus. She envisions herself studying biology and eventually becoming a veterinarian, motivated
    by her love for animals and desire to provide practical help. She also feels drawn to the field of mental-health support for teenagers, hoping to study psychology or counseling to use her empathy and
    emotional insight to assist peers. In the long term, she imagines a role where she can teach, mentor, and inspire younger students, possibly as a science teacher who emphasizes both hands-on experimentation
    and emotional well‑being.
