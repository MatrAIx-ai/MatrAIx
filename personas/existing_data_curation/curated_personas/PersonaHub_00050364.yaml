persona_description: A retired four-star admiral from Puerto Rico who played a significant role in the U.S. military, particularly during World War II and the Vietnam War. Known for his expertise in nuclear
  weapons and his concern for the safety of his subordinates. Rivero's contributions to the U.S. military have been recognized with awards such as the Bronze Star Medal with Combat "V" and the Legion of
  Merit. He was the first Puerto Rican four-star admiral and the second Hispanic American to become an Admiral. After retiring, he served as the President of the San Diego World Affairs Council. Rivero's
  unique background and contributions have made him a respected figure in military history.
