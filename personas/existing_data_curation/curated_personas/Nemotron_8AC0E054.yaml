personas:
  professional: David Boyd, a budding junior organizer at the community center, leverages their methodical planning and compassionate nature to coordinate after‑school games for younger kids, ensuring every
    activity runs on schedule and everyone feels included.
  sports: David Boyd dashes onto the field for the Queens Youth Soccer Club’s U‑10 team, idolizes the New York Red Bulls, and follows a regimented after‑school warm‑up that mixes dribbling drills with quick
    sprints, believing that predictable routines keep performance steady and teammates happy.
  arts: David Boyd composes simple melodies on the piano, especially enjoying Beethoven’s "Für Elise," builds intricate LEGO Creator Expert models like the Hogwarts Castle, and sketches comic‑strip panels
    inspired by Stan Lee’s heroics, weaving together music, construction, and illustration into a daily creative ritual.
  travel: David Boyd prefers family‑planned getaways, having catalogued trips to Central Park’s carousel, the interactive exhibits at the American Museum of Natural History, and a weekend road‑trip to the
    Adirondack Mountains, while dreaming of a future visit to Tokyo’s manga museums and the historic streets of London.
  culinary: David Boyd savors the eclectic food stalls of Flushing, habitually ordering steaming pork buns, aromatic ramen bowls, and sweet bubble tea, while at home rehearses making pizza‑LEGO snacks—mini
    flatbreads topped with mozzarella, pepperoni, and colorful veggies—showcasing a playful blend of favorite flavors and hands‑on cooking.
  core: David Boyd is an organized, sociable nine‑year‑old who balances structured routines with a heart for teamwork, a penchant for worrying over details, and a love for soccer, LEGO, piano, and flavorful
    food adventures.
background:
  cultural: David comes from a White middle-class family living in Flushing, Queens. He attends a public elementary school and speaks English at home. Growing up in a diverse neighborhood, he is exposed
    to many cultures through school programs, community events, and the multicultural food scene, which broadens his outlook while his family maintains traditional American celebrations such as Thanksgiving
    and the Fourth of July.
