  skills: '[''Organizing school supplies'', ''Coordinating group activities'', ''Mediating peer conflicts'', ''Reading comprehension'', ''Basic arithmetic'', ''LEGO building'', ''Beginner piano playing'']'
  hobbies: '[''Soccer'', ''LEGO building'', ''Reading adventure/mystery books'', ''Playing piano'', ''Volunteering at community center'', ''Exploring local food stalls'', ''Comic drawing'']'
  career_goals: David dreams of becoming an elementary-school teacher or a pediatric nurse, where he can combine his love for structure, his enjoyment of helping others, and his enthusiasm for working with
    children. He also hopes to serve as a class representative or student-council member in middle school, giving him early leadership experience.
