  career_goals: Rajinder aims to graduate high school with honors, obtain a scholarship in Business Administration, and attend a state university where he plans to major in Supply Chain Management or Operations.
    In the short term, he seeks a summer internship in a logistics or warehouse setting to gain hands‑on experience. His long‑term ambition is to become a certified logistics analyst and eventually hold
    a managerial position overseeing regional distribution networks. He also considers enrolling in the ROTC program to combine his interest in structured environments with leadership development, potentially
    pursuing a commission in the Army as a logistics officer.
