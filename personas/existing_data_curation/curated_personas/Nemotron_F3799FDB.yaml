personas:
  professional: Rajinder Sayers, an organized aspiring logistics analyst, leverages their methodical planning skills honed through coordinating soccer drills, youth mentorship events, and self‑taught HTML/CSS
    projects to excel in school logistics simulations and pursue a supply chain management scholarship.
  sports: Rajinder Sayers plays forward on the varsity soccer team, joins the intramural basketball league, avidly follows the Syracuse Orange and New York Knicks, and organizes weekend hikes with friends
    through the Finger Lakes trail system.
  arts: Rajinder Sayers enjoys strategic board games like Settlers of Catan and Risk, builds detailed scale models of WWII aircraft, attends performances at the Geva Theatre Center, and listens to classic
    rock icons such as The Rolling Stones alongside indie favorites like Vampire Weekend.
  travel: Rajinder Sayers prefers structured travel itineraries, having mapped a weekend road trip to Niagara Falls with a detailed spreadsheet, participated in a school‑organized cultural tour of Washington DC,
    and dreaming of a backpacking trek across New Zealand’s Milford Track while budgeting with a part‑time job.
  culinary: Rajinder Sayers favors hearty American‑Italian dishes such as chicken parmigiana and pepperoni pizza, regularly sources fresh heirloom tomatoes and sweet corn from the local farmer’s market,
    but admits to overindulging in late‑night gaming snack chips.
  core: Energetic, meticulously organized, and competitively driven, Rajinder Sayers balances a love for team sports and strategic gaming with a habit of over‑planning every aspect of life—even their snack
    drawer.
background:
  cultural: Rajinder grew up in Pittsford, a suburban community in Monroe County, New York. His family’s heritage traces back to English and Irish ancestors, and they have lived in the Finger Lakes region
    for several generations. The household emphasized punctuality, hard work, and community involvement, reflecting a typical Northeastern American middle‑class upbringing. Local traditions such as seasonal
    farmer’s markets, community sports leagues, and high school homecoming events shaped his social life. While his cultural identity aligns with mainstream American customs, his family also celebrates
    multicultural festivals in the area, exposing him to a broader cultural perspective.
