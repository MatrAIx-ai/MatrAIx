  career_goals: Jama Ann dreams of one day becoming a wildlife veterinarian or a scientist who studies animals and the environment, combining her love for animals with her curiosity about how things work.
    She also imagines helping her community by teaching younger kids about nature, and she aspires to keep her future work organized and practical, ensuring that she can make a real difference while staying
    grounded.
