personas:
  professional: Jama Sanford, an aspiring young builder, channels curiosity and practicality into constructing LEGO sets with methodical precision while staying open to new designs.
  sports: Jama Sanford, an energetic park explorer, enjoys weekly nature walks with the GreenKids Club, occasionally kicks a ball with the Mini Lions Soccer team, and cheers for the River City Bears, the
    local professional baseball club.
  arts: Jama Sanford, a quiet creative, fills sketchbooks with animal drawings inspired by Dr. Seuss books, listens to storytime music by Raffi, and watches animated performances of Sesame Street, letting
    these artistic influences shape their playtime narratives.
  travel: Jama Sanford, an adventurous day‑tripper, loves weekend visits to Sunnybrook State Park to collect leaves, dreams of a family trip to Disney World in Florida, and enjoys planning outings using
    colorful maps and stickers.
  culinary: Jama Sanford, a budding home chef, delights in making peanut butter and banana sandwiches, helps stir mac and cheese with shredded cheddar, and experiments with fruit kebabs featuring strawberries,
    grapes, and melon cubes.
  core: Jama Sanford blends methodical LEGO building, diligent saving habits, and steady health routines into a harmonious childhood marked by quiet curiosity, small‑group play, and a penchant for organized
    yet flexible adventures.
background:
  cultural: Jama Ann lives in Shreveport, Louisiana, where Southern hospitality, community gatherings, and local traditions shape her upbringing. Her family celebrates holidays such as Mardi Gras and Thanksgiving
    with regional foods like gumbo and crawfish, and attends a local church that emphasizes service and togetherness. Growing up in a predominantly white, middle‑class neighborhood, she is exposed to a
    mix of Southern U.S. customs, occasional Creole influences, and a strong emphasis on family values and respect for elders.
