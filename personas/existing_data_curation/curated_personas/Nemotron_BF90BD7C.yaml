personas:
  professional: An experienced diesel mechanic and metal fabricator, Mary Hincapie combines ASE‑level troubleshooting with a flair for artistic vehicle retrofits, leveraging their methodical problem‑solving,
    competitive drive, and love of abstract design to plan and execute sustainable custom modifications for agricultural equipment.
  sports: Mary Hincapie is a loyal fan of the Chicago Bears and Milwaukee Brewers, plays in a senior pick‑up softball league at the local YMCA, rows a small skiff on the Mississippi each spring, and volunteers
    as a judge for the county fair’s tractor‑pull competition, reflecting their competitive spirit and love of community sport.
  arts: Mary Hincapie spends evenings creating abstract canvases inspired by Mark Rothko, builds reclaimed‑metal sculptures reminiscent of Frank Gehry’s industrial aesthetic, and regularly attends the Midwest
    Craft Fair where they admire ceramicist Lisa Hines and folk singer‑songwriter Shawn Colvin, integrating their artistic curiosity into daily life.
  travel: Mary Hincapie prefers meticulously planned road trips that blend river scenery with maker workshops, having driven the Great River Road from Minneapolis to St. Louis, spent a weekend exploring
    Door County’s lighthouse district, and visited the Smithsonian’s National Museum of American History in Washington, D.C., always balancing budget constraints with a yearning for fresh mechanical inspiration.
  culinary: Mary Hincapie delights in cooking heirloom tomato gazpacho, slow‑roasted pork shoulder with apple‑cider glaze, and pickled corn relish using vegetables from their garden and fresh herbs from
    the local farmer’s market, though they often forget to add enough salt until the final minute.
  core: Mary Hincapie is a 50‑year‑old diesel‑engine expert who channels a competitive, detail‑driven mind into abstract art and sustainable machine retrofits while quietly budgeting every dollar for their
    future boutique shop.
background:
  cultural: Mary Ann grew up in East Dubuque, a small Midwestern town along the Mississippi River with a strong agricultural and river‑trade heritage. The community’s values—self‑reliance, modesty, a solid
    work ethic, and close‑knit family ties—shaped her pragmatic outlook. Her family’s roots trace back to Irish and Scandinavian immigrants who settled in Jo Daviess County, and she was raised with a blend
    of Protestant (later ecumenical) church involvement and participation in local traditions such as county fairs, quilting circles, and community potlucks. These cultural influences celebrate hands‑on
    craftsmanship, practical ingenuity, and a quiet curiosity about the wider world, which align with Mary Ann’s blend of technical skill, imaginative pursuits, and reserved yet competitive personality.
attributes:
  skills: '[''Diesel engine diagnostics'', ''Hydraulic system repair'', ''Electrical wiring and troubleshooting'', ''Welding and metal fabrication'', ''Preventive maintenance scheduling'', ''Parts inventory
