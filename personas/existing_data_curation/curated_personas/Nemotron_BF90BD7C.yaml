    ''Workshop safety compliance'', ''Independent project planning'', ''Innovative solution design'']'
  hobbies: '[''Abstract painting'', ''Woodworking and furniture making'', ''Vintage tractor restoration'', ''DIY electronics projects (Arduino, Raspberry Pi)'', ''Reading science‑fiction and philosophy'',
    ''Photography of rural landscapes'', ''Gardening (heirloom vegetables)'', ''Birdwatching'', ''Local maker meet‑ups'', ''Crafting custom vehicle accessories'', ''Sketching mechanical designs'']'
  career_goals: Mary Ann aims to attain ASE Master Technician certification within the next two years and gain specialized credentials in electric and hybrid vehicle retrofits for agricultural machinery.
    She envisions opening a boutique mobile‑equipment shop in East Dubuque that focuses on sustainable custom modifications and artistic vehicle accessories. Long‑term, she hopes to mentor apprentices through
    a local trade school, lead workshops on innovative mechanical design, and become a respected voice in regional trade associations, blending her technical mastery with her creative vision.
