  hobbies: '["Listening to R&B and gospel music", "Crafting bead jewelry", "Reading contemporary African American literature", "Walking in Fairmount Park", "Sketching urban scenes", "Watching documentaries
    about Black history", "Managing a personal journal", "Playing pick‑up basketball in small groups"]'
  career_goals: Phyllis aims to earn her GED within the next two years, establishing a credential that will open doors to stable, part‑time employment in a community organization. She seeks a role that
    blends structured responsibilities—such as managing outreach schedules and resource inventories—with the flexibility to respond quickly to community needs. In the longer term, she aspires to become
    a community outreach coordinator or to start a small home‑based craft business, using her competitive drive and calm resilience to build sustainable impact in her Philadelphia neighborhood.
