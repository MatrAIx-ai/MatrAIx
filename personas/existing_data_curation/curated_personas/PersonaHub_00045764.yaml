persona_description: A researcher and inventor in the field of microgrid technology, particularly in the use of repurposed electric vehicle batteries for stationary energy storage systems. Talal Alharbi,
  Kankar Bhattacharya, and Mehrdad Kazerani are electrical engineering doctoral candidates and professors who have developed a microgrid planning model to optimize the use of repurposed EV batteries in
  microgrids. Their work is aimed at reducing the cost of microgrid development while minimizing the environmental impact of diesel generators.
