personas:
  professional: Cheryl Eng, a 15‑year‑old aspiring interactive media creator, blends a curiosity for speculative worlds with practical hands‑on skills, designing Arduino‑driven light installations and conceptual
    game levels while wrestling with the lack of structure that often delays her projects.
  sports: Cheryl Eng, an avid runner on the Wissahickon Trail, follows the Philadelphia Eagles and the 76ers on televised games, occasionally joins a local youth sprint club, and channels competitive energy
    from strategy video games into personal time‑trial challenges.
  arts: Cheryl Eng sketches dystopian characters inspired by authors like China Miéville, captures moody urban decay in black‑and‑white photographs reminiscent of Nan Goldin, and draws creative fuel from
    listening to Radiohead and the graphic novels of H.R. Giger.
  travel: Cheryl Eng has explored nearby Philadelphia and the historic streets of New York City, dreamt of wandering the neon‑lit alleys of Tokyo’s Akihabara and the misty cliffs of Norway’s Lofoten Islands,
    preferring solo day trips that fit within her parents’ schedule and a tight budget.
  culinary: Cheryl Eng’s teenage palate gravitates toward instant ramen with spicy kimchi toppings, late‑night pizza slices from the local shop after gaming marathons, and the occasional attempt at avocado
    toast, though she lacks confidence in cooking beyond microwavable meals.
  core: Cheryl Eng is a solitary, curiosity‑driven teen who channels intense emotions into DIY tech art, strategic gaming, and fleeting culinary experiments while wrestling with anxiety and a stubborn resistance
    to structure.
background:
  cultural: Cheryl grew up in the suburban community of Downingtown, Chester County, Pennsylvania, within a middle-class, predominantly white neighborhood. Her family traces its roots to German and Irish
    ancestry, and cultural traditions include holiday gatherings centered around homemade meals and occasional attendance at a local Lutheran church’s youth group. The region’s emphasis on education and
    community service has shaped her values, while the proximity to Philadelphia provides exposure to arts, tech meetups, and academic resources. She identifies with the broader American suburban culture,
    valuing independence, self-reliance, and a blend of traditional and modern lifestyles.
attributes:
  skills: '[''Basic Python programming'', ''Graphic design (Adobe Photoshop, Canva)'', ''DIY electronics (Arduino)'', ''Creative writing and poetry'', ''Research and fact-checking'', ''Critical thinking
