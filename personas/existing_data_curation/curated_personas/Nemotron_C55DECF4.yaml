  hobbies: '[''Reading speculative fiction'', ''Creative writing (poetry, short stories)'', ''Sketching and digital illustration'', ''Arduino electronics projects'', ''Strategy and puzzle video gaming'',
    ''Mindful journaling'', ''Running on Wissahickon Trail'', ''Urban and nature photography'']'
  career_goals: Cheryl aspires to turn her blend of curiosity and practicality into a career that allows her to both create and solve real-world problems. She is drawn to fields such as software development
    and interactive game design, where she can code, design visuals, and tell stories. She also entertains the idea of becoming an environmental data analyst, using her research skills to inform policy.
    In the short term, she aims to win a regional coding competition, build a polished portfolio of digital art, and secure a mentorship with a local tech entrepreneur. Long-term, she hopes to work as a
    user-experience engineer or data-driven storyteller, leveraging her competitive drive to excel and her personal experience with anxiety to design inclusive digital products.
