personas:
  professional: Niurka Fraga, a 35‑year‑old retail cashier in Allendale, Michigan, blends meticulous cash‑handling and bilingual fluency with a talkative, people‑focused style that makes her a go‑to problem‑solver
    on the sales floor while quietly charting a path toward assistant management and eventually launching her own culturally‑infused convenience shop.
  sports: Niurka Fraga is a regular participant in Allendale’s community yoga classes, a weekend member of the local running club that races the Michigan Half Marathon, and a devoted fan of the Detroit
    Lions and Michigan Wolverines, cheering loudly at games and using that energy to fuel her own cardio routine.
  arts: Niurka Fraga immerses herself in the rhythms of Celia Cruz and Marc Anthony, devours mystery novels by Gillian Flynn, enjoys community theatre productions of Lin‑Manuel Miranda’s In the Heights,
    and often channels that artistic spark into choreographing salsa routines for her dance class.
  travel: Niurka Fraga favors culturally rich trips, having explored Oaxaca’s markets, wandered the historic streets of San Miguel de Allende, and attended a music festival in New Orleans, while her next
    dream destination is Buenos Aires, where she plans to combine culinary workshops with a salsa immersion program.
  culinary: Niurka Fraga’s kitchen is a laboratory for family recipes like mole poblano, handmade tamales, and her signature cilantro‑lime rice, where she blends fresh garden herbs with roasted chiles,
    and she proudly pairs each meal with a glass of chilled agua fresca made from hibiscus and pineapple.
  core: Niurka Fraga, a 35‑year‑old Allendale retail pro, balances a talkative, community‑driven spirit with a constant undercurrent of stress‑fuelled coffee cravings, turning every interaction into a cultural
    showcase while secretly plotting her own neighborhood store.
background:
  cultural: Niurka comes from a bicultural Hispanic family that straddles Latin American traditions and Midwestern American life. Raised in a bilingual household, she grew up celebrating holidays such as
    Día de los Muertos and Christmas with a blend of Catholic rituals, vibrant music, and family‑centered gatherings. These experiences fostered a deep appreciation for community, food, and dance, which
    she expresses through her cooking and participation in local cultural events. Living in Allendale, Michigan, she has woven her heritage into the fabric of the local community, actively engaging with
    both the Hispanic diaspora and the broader population, and serving as a cultural bridge in her workplace and volunteer activities.
attributes:
  skills: '["Cash handling", "Customer service", "Bilingual communication (English/Spanish)", "Point-of-sale system operation", "Inventory management", "Conflict resolution", "Team collaboration", "Basic
    bookkeeping", "Event coordination", "Adaptability to new technologies"]'
  hobbies: '["Cooking traditional Latin dishes", "Salsa and bachata dancing", "Yoga and meditation", "Volunteering at the local community center", "Reading mystery and suspense novels", "Gardening vegetables
    and herbs", "Participating in local cultural festivals"]'
  career_goals: Niurka aims to transition from a cashier role to a supervisory position within the next two to three years. She plans to complete an associate degree in Business Management at a local community
    college while pursuing a retail management certification. Her ambition includes becoming an assistant manager, leading staff training, and eventually overseeing store operations. Long‑term, she dreams
    of opening a small family‑run convenience store or specialty food shop that showcases her cultural heritage, offering traditional Latin snacks alongside everyday groceries. She also prioritizes developing
    stress‑management skills to maintain a healthy work‑life balance.
