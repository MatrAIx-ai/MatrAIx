personas:
  professional: Sheila Hughes, a veteran financial accountant and audit strategist, blends their methodical precision with a curiosity for AI-driven risk assessment, channeling their competitive streak
    into mentoring junior staff while spearheading process‑improvement projects that integrate SAP, Power BI, and forensic analytics.
  sports: Sheila Hughes stays active by playing weekly senior tennis at the Salina Community Center, joining a springtime walking group that explores the historic trails of the Smoky Hill River, cheering
    on the Kansas State Wildcats football team each fall, and following the Kansas City Royals during baseball season, all while they track their steps on a smartwatch to maintain a modest 7,000‑step daily
    goal.
  arts: Sheila Hughes immerses themselves in the arts by curating watercolor landscapes inspired by Monet and O'Keeffe, photographing Kansas prairie sunsets with a vintage Nikon, attending the Salina Community
    Theatre’s productions of plays like ‘Our Town’, and devouring contemporary novels by authors such as Zadie Smith, while they regularly visit the Wichita Art Museum to study works by Edward Hopper.
  travel: Sheila Hughes approaches travel like a well‑planned audit, mapping out detailed itineraries for road trips to historic sites such as Gettysburg, Colonial Williamsburg, and the Scottish Highlands
    to trace their family roots, balancing their love of structured research with spontaneous stops at local farmers’ markets, and they dream of a quiet retirement stay‑cation in a refurbished 19th‑century
    cottage near the Blue Ridge Mountains.
  culinary: Sheila Hughes, an enthusiastic home chef, experiments with seasonal recipes that showcase the kale, heirloom tomatoes, and fresh rosemary from their garden, mastering dishes like rosemary‑garlic
    roasted chicken, rustic ratatouille, and a surprisingly silky miso‑infused pumpkin soup, while they occasionally indulge in a decadent chocolate ganache tart that clings to their reputation for both
    precision and indulgence.
  core: Sheila Hughes is a methodically curious accountant‑turned‑art lover who balances meticulous spreadsheets with spontaneous watercolor sessions, never misses a Sunday yoga class, but stubbornly insists
    on solving the crossword puzzle before bedtime, even when the answers elude them.
background:
  cultural: Sheila hails from a Midwestern white family with German and Irish ancestry, raised on a small farm near Salina, Kansas. Her upbringing emphasized hard work, community service, and modesty, values
    reinforced by her involvement in the local church and the Rotary Club. After earning a business degree at the University of Kansas, she built a career in accounting that reflects the region's pragmatic
    and diligent ethos while also embracing a curiosity for art and new ideas.
