  career_goals: Jason aspires to build on his artistic and technical abilities by studying visual arts and environmental communication in college. He envisions a future career as a graphic designer or visual
    storyteller for a non‑profit or community organization, creating compelling visuals that promote environmental stewardship and social harmony. He also hopes to combine his coding skills with his passion
    for education by developing interactive media or educational games that inspire other kids to explore nature and science.
