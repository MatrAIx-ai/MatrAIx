personas:
  professional: Michael Morrison is a budding junior architect who channels their love for routine and hands-on creativity into meticulously building LEGO sets according to the instructions, often planning
    each step on paper before snapping the bricks together, and they take pride in keeping their construction area impeccably organized.
  sports: Michael Morrison plays forward for the West Seattle Youth Soccer Club, idolizes the Seattle Sounders FC striker and mimics his footwork during drills, and they cherish the structured routine of
    weekly practices and weekend matches, always emphasizing teamwork and fair play.
  arts: Michael Morrison spends afternoons sketching realistic animals inspired by National Geographic Kids and copying the gentle brushstrokes of Bob Ross in their art notebooks, while they eagerly watch
    Hayao Miyazaki's animated films for storytelling ideas and proudly display completed LEGO models as miniature sculptures.
  travel: Michael Morrison loves family camping trips to Olympic National Park where they can collect rocks and spot elk, prefers itineraries mapped out step-by-step, and they dream of a future adventure
    to Yellowstone's geysers and a short visit to the Seattle Space Needle for a city view.
  culinary: Michael Morrison enjoys bite-sized cheese pizza slices and creamy mac-and-cheese, helps their mom whisk banana pancakes on Saturday mornings, favors crunchy trail mix made with almonds, raisins,
    and pretzel sticks, though they sometimes sneak extra chocolate chips into the mix.
  core: Michael Morrison is a calm, routine-loving 7-year-old whose compassionate heart shines through their meticulous LEGO builds, steadfast friendships, and quiet confidence, even if they occasionally
    forget to pack their snack.
background:
  cultural: Michael was raised in a middle-class, white family in Spokane, Washington. His family participates in typical Pacific Northwest traditions such as weekend hikes, community fairs, and seasonal
    camping trips, while also observing the local church's Sunday services. He attends a public elementary school where multicultural awareness is encouraged, yet his home life reflects the practical, down-to-earth
    values common to many families in the area.
attributes:
