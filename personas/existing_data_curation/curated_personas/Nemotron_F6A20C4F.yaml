  career_goals: Michael dreams of growing up to a career where he can directly help people, such as becoming a firefighter, a teacher, or a veterinarian. He often talks about rescuing animals, protecting
    his community, and teaching younger kids, reflecting his strong desire for a compassionate, service-oriented profession.
