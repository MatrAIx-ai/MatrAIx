  hobbies: '[''Gardening'', ''Cooking'', ''Church choir'', ''Line dancing'', ''Genealogy research'', ''Reading historical fiction'', ''Bridge'', ''Volunteer work at food bank'']'
  career_goals: Although retired from formal employment, Emily aims to expand her influence as a community mentor and advocate. She plans to obtain a volunteer leadership certificate to formalize her role
    at the local senior center, where she hopes to develop intergenerational programs that connect older adults with youth. Emily also aspires to complete a memoir documenting her family’s history and the
    African‑American experience in Dallas, and she is exploring the possibility of turning her love of cooking and quilting into a small home‑based boutique business. Continuing to sharpen her digital skills,
    particularly on tablets and social media, is a personal ambition that supports her outreach goals.
