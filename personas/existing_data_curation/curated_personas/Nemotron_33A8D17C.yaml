personas:
  professional: A seasoned community organizer and former corporate bookkeeper, Liya Teo uses three decades of office administration expertise to meticulously run senior‑center events, volunteer rosters,
    and neighborhood garden projects, balancing curiosity for new horticultural methods with a practical, methodical approach.
  sports: An avid fan of the New York Giants and the New Jersey Devils, Liya Teo also joins a low‑impact walking club at the senior center, participates in weekly water‑aerobics sessions, and tends to the
    garden for its gentle cardio benefits.
  arts: A dedicated quilter and historical fiction aficionado, Liya Teo devotes afternoons to stitching patchwork blankets inspired by New Jersey’s colonial past while listening to Ella Fitzgerald and admiring
    the works of local painter Susan Morrow at the Monmouth County Historical Society.
  travel: When not caring for her garden, Liya Teo enjoys road trips to visit grandchildren in Florida, plans annual pilgrimages to Philadelphia’s Independence Hall, and dreams of a train journey to Boston’s
    historic Freedom Trail, always booking senior discounts and packing extra medication.
  culinary: As the leader of a cooking club, Liya Teo delights in preparing heirloom tomato soup, rosemary‑infused roast chicken, and banana‑bread made with fresh basil from her garden, yet they occasionally
    over‑salt dishes because they trust their seasoned palate more than a measuring spoon.
  core: Liya Teo blends meticulous bookkeeping, green‑thumb curiosity, and a sociable senior‑center spirit into a life of quilting, gardening, and community storytelling, while occasionally misplacing dental
    appointments and over‑salting soups.
background:
  cultural: Liya grew up in a mid‑century American suburb, influenced by the values of post‑war hard work, community service, and family cohesion typical of white Anglo‑American families. Her upbringing
    emphasized celebration of holidays such as Thanksgiving, Fourth of July, and Christmas, often centered around large family meals and church gatherings. While she cherishes these traditions, living in
    the diverse environment of Brick, NJ, has broadened her appreciation for multicultural influences, leading her to incorporate foods, music, and stories from her neighbors into her own social circles.
    This blend of traditional American roots and an open, inclusive community outlook shapes her identity and daily life.
