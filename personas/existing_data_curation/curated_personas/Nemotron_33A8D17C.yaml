  career_goals: Even at 88, Liya remains driven to give back. She aims to launch a "Heritage Circle" at the local senior center where elders document family histories and share oral stories, preserving
    community memory for future generations. She also hopes to expand the neighborhood garden she co‑maintains, introducing companion‑planting workshops that blend her curiosity for new horticultural ideas
    with proven gardening practices. Additionally, Liya wants to mentor high‑school students in basic budgeting and computer literacy, helping them develop reliable, practical skills while fostering intergenerational
    harmony.
