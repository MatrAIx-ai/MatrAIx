  career_goals: He aims to progress to a senior reliability engineering manager role within the next five years, overseeing a team responsible for optimizing plant uptime and reducing maintenance costs.
    To achieve this, he plans to complete a bachelor's degree in mechanical engineering, obtain the Certified Maintenance & Reliability Professional (CMRP) certification, and lead a plant-wide reliability
    improvement project. He also aspires to mentor junior engineers, especially those from underrepresented backgrounds, and to contribute to community outreach programs that promote STEM education.
