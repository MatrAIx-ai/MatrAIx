personas:
  professional: Keith Jones, a seasoned substance‑abuse counselor with over twenty years of frontline experience, they merge evidence‑based therapies like motivational interviewing and CBT with expressive‑arts
    techniques such as guided watercolor sessions, creating a calm, solitary therapeutic space that reflects their love of nature and their uncompromising commitment to compassionate, client‑centered care.
  sports: Keith Jones, an avid nature enthusiast, they spend their free time kayaking on local lakes, cross‑country skiing the snow‑covered trails in winter, and follow the Milwaukee Bucks and Green Bay
    Packers, while belonging to the Barron County Hiking Club that meets monthly for long, quiet treks.
  arts: Keith Jones, a quiet creative soul, they devote mornings to watercolor landscapes of the Northwoods, capture migratory birds with their DSLR, and immerse themselves in the works of classical pianist
    Glenn Gould and jazz trumpeter Chet Baker, while attending the annual regional folk‑art festival to reconnect with their love of visual and musical expression.
  travel: Keith Jones, a contemplative traveler, they plan trips that blend solitude with natural beauty, such as a winter cabin stay at the Boundary Waters, a spring canoe expedition on Norway’s fjords,
    and a mindful visit to the Scottish Highlands, always favoring off‑the‑beaten‑path destinations that echo the calm of their hometown lakes.
  culinary: Keith Jones, a modest home cook, they favor hearty, seasonal dishes like pan‑seared lake trout with wild herb butter, mushroom‑laden barley stew, and fresh berry crisp, regularly sourcing ingredients
    from the local farmer’s market and occasionally experimenting with foraged mushrooms and pine tips, though they sometimes forget to refrigerate leftovers promptly.
  core: Keith Jones, a compassionate counselor who blends art with therapy, they live quietly in the Northwoods, balance careful financial stewardship with occasional artistic indulgences, and find solace
    in solitary hikes, watercolor, and vintage jazz.
background:
  cultural: Keith was born and raised in the Upper Midwest, growing up in a modest, middle‑class family in rural Wisconsin. His ancestry traces back to German and Scandinavian immigrants who settled the
    state in the late‑19th century, embedding values of hard work, self‑reliance, and community stewardship. The region’s close connection to lakes, forests, and seasonal cycles fostered his calm, resilient
    temperament and his love for solitary outdoor activities. Participation in local church and community service projects reinforced his compassionate, cooperative outlook, while the area's modest, stoic
    cultural tone nurtured his preference for quiet environments and understated self‑expression.
attributes:
  skills: '[''Motivational Interviewing'', ''Cognitive Behavioral Therapy'', ''Trauma-Informed Care'', ''Relapse Prevention Planning'', ''Crisis Intervention'', ''Case Management'', ''Group Facilitation'',
