  hobbies: '[''Watercolor painting'', ''Landscape photography'', ''Bird watching'', ''Reading philosophy and psychology'', ''Hiking in local nature trails'', ''Woodworking'', ''Listening to classical and
    jazz music'', ''Meditative gardening'', ''Writing reflective journals'', ''Playing chess'']'
  career_goals: Looking ahead, Keith aims to deepen his clinical expertise by obtaining a Certified Advanced Alcohol and Drug Counselor (CAADC) credential and completing a master‑level course in art therapy.
    He envisions establishing a small, tranquil private practice in the Turtle Lake area that offers a hybrid model of traditional counseling and expressive‑arts workshops, providing a refuge for clients
    seeking a quieter, nature‑infused healing environment. Additionally, he hopes to mentor emerging counselors, develop a tele‑counseling outreach program for isolated rural communities, and collaborate
    with local health agencies to advocate for policies that expand access to substance‑abuse services in underserved parts of Barron County.
