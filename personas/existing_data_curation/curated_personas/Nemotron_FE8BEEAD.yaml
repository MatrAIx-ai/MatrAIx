  career_goals: Although retired, Charles aims to leave a lasting, practical legacy by mentoring emerging entrepreneurs and local nonprofit leaders, sharing his business acumen through informal workshops
    and one‑on‑one guidance. He also plans to author a concise memoir that captures his family's history and the lessons learned from a lifetime of navigating both corporate and community challenges, prioritizing
    impact over recognition.
