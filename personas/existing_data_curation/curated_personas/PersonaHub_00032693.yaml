persona_description: A historian interested in the study of medieval history, particularly the period of the Wars of the Roses. They are particularly interested in the impact of medieval castles on small
  villages and the land around them. They are also interested in the interpretation of medieval landscapes and the interpretation of the landscape of Slingsby Castle. They have a particular interest in
  the early forms of settlement that have disappeared and their expertise in early landscapes and early forms of settlement. They have a background in archaeology and are visiting lecturer at Leeds University.
