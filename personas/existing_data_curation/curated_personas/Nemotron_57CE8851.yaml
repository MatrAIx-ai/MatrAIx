  career_goals: Deidre aims to complete her remaining college credits toward a degree in Business Administration or Community Development, with the intention of entering a stable administrative or program‑coordination
    role at a local nonprofit or municipal office. She plans to obtain a CAPM (Certified Associate in Project Management) certification to formalize her project‑management skills. In the short term, she
    seeks part‑time work that leverages her organizational strengths while allowing flexibility for self‑care. Long‑term, she hopes to launch a modest side business selling handcrafted items and garden
    produce, blending her practical expertise with entrepreneurial ambition.
