  hobbies: '[''Reading contemporary fiction'', ''Self‑help literature'', ''Bullet journaling'', ''Gardening'', ''Nature hikes'', ''Bird‑watching'', ''Digital photography'', ''Knitting'', ''Cooking Midwest
