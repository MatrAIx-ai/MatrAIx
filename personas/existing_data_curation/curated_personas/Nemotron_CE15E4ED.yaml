personas:
  professional: An aspiring community storyteller, Liliam Bravo blends a love for reggaeton, salsa, and hip‑hop dance with volunteer work at the Astoria community center, using TikTok to spotlight neighborhood
    narratives while casually teaching friends simple choreography, a role that showcases their sociable, compassionate nature and a preference for structured after‑school programs tempered by a relaxed
    attitude toward strict scheduling.
  sports: An enthusiastic pickup basketball player, Liliam Bravo joins the Astoria Park Hoopers club for weekend games, cheers for the New York Knicks and New York City FC, and balances athletic activity
    with daily dance practice, a mix that satisfies their sociable drive and love for flexible, unstructured exercise.
  arts: A creative TikTok creator, Liliam Bravo draws inspiration from reggaeton star Bad Bunny, salsa legend Celia Cruz, and hip‑hop pioneer Missy Elliott while devouring graphic novels such as 'Nimona'
    and 'Ms. Marvel,' a blend that fuels their expressive dance routines and talkative storytelling style.
  travel: Passionate about cultural exploration, Liliam Bravo has wandered through the bustling streets of Little Italy and enjoyed a family beach getaway in San Juan, dreams of trekking a rainforest in
    Costa Rica, and favors spontaneous weekend day trips over meticulously planned vacations, a habit that mirrors their flexible mindset and love for social experiences.
  culinary: An eager home‑chef, Liliam Bravo helps their family prepare mofongo with plantains, chicharrón, and garlic, and arroz con gandules seasoned with sofrito and cilantro, demonstrating intermediate
    cooking skills and a penchant for bold, savory flavors while occasionally over‑salting dishes in their enthusiastic experimentation.
  core: Socially magnetic and calm, Liliam Bravo is a teenage dance‑enthusiast who juggles community volunteering, TikTok storytelling, and a love for bold cooking, yet they habitually misplace their dance
    shoes and forget to track indulgent snack spending.
background:
  cultural: Liliam grew up in a Puerto Rican household in Astoria, Queens, where Spanish was spoken at home, and English dominated school and public life. Her family maintains strong ties to Puerto Rican
    traditions, from music and dance to festive cuisine, while also engaging with the multicultural fabric of Astoria's diverse neighborhoods. This blend of island heritage and urban New York influences
    her worldview, fostering a deep sense of pride in her roots and a commitment to bridge cultural gaps through communication, community service, and creative expression.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Peer mediation and conflict resolution'', ''Event coordination for school clubs and neighborhood gatherings'', ''Social media content creation
    and video editing'', ''Basic graphic design using Canva'', ''Proficiency with Google Workspace (Docs, Slides, Sheets)'']'
  hobbies: '[''Dancing to reggaeton and salsa'', ''Cooking traditional Puerto Rican dishes'', ''Playing basketball at the local park'', ''Creating TikTok videos about community life'', ''Reading graphic
    novels and teen memoirs'', ''Volunteering at the Astoria community center'', ''Attending cultural festivals and street fairs'']'
  career_goals: Liliam aspires to become a community advocate or youth counselor who can leverage her bilingual abilities and social media savvy to empower other teenagers, especially within the Puerto
    Rican diaspora in New York City. She envisions studying communications or social work in college, eventually launching a multicultural youth podcast or a nonprofit that organizes cultural events and
    mentorship programs. Her ultimate ambition is to create safe, structured spaces where young people can express themselves freely while also fostering community resilience and harmony.
