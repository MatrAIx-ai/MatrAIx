personas:
  professional: Elvira Hurtado, an 81‑year‑old community event coordinator and senior‑center cooking instructor, leverages her bilingual fluency, meticulous budgeting, and practical storytelling to run
    vibrant cultural celebrations while balancing a relaxed, flexible approach to planning.
  sports: Elvira Hurtado enjoys daily walks along the River Walk, participates in a senior folk‑dance troupe performing traditional routines, and roots for the local basketball team, attending a few home
    games each season while also cheering on the high‑school softball league.
  arts: Elvira Hurtado immerses herself in quilting, embroidery, and storytelling while listening to folk musicians like Los Tigres del Norte, Lila Downs, and Carlos Santana, and she frequently attends
    performances by local mariachi ensembles at the parish hall.
  travel: Elvira Hurtado prefers short, well‑planned road trips to historic Texas towns such as Fredericksburg and Austin, enjoys occasional cruises to coastal destinations like Galveston, and dreams of
    a relaxed vacation in a tranquil seaside village where she can garden and share recipes.
  culinary: Elvira Hurtado excels at preparing authentic mole poblano, chicken tamales, and chiles en nogada, skillfully balances flavors with ingredients like ancho chilies, tomatillos, and fresh cilantro,
    and adapts each dish for guests with diabetes or low‑sodium needs, while also tending her garden of tomatoes, chilies, and herbs for farm‑to‑table meals.
  core: Elvira Hurtado blends a structured, community‑focused mindset with a competitive streak, navigating senior life through lively folk dancing, strategic bingo wins, and a steadfast dedication to preserving
    family recipes and stories.
background:
  cultural: Elvira was born to Mexican immigrant parents who settled in San Antonio’s West Side. She grew up bilingual, surrounded by the sounds of mariachi, the aromas of home‑cooked tacos al pastor, and
    the traditions of Catholic celebrations like Día de los Muertos and Las Posadas. Over the decades, she blended Mexican customs with Texan influences, participating in local parades, the Fiesta San Antonio,
    and community potlucks that showcase both cultures. Her identity is rooted in family loyalty, respect for elders, and a strong sense of community service, which she expresses through volunteer work,
    cultural teaching, and preserving the stories of her neighborhood.
attributes:
  skills: '["Traditional Mexican cooking", "Bilingual communication (Spanish/English)", "Community event coordination", "Gardening and horticulture", "Budgeting and financial management", "Senior safety
