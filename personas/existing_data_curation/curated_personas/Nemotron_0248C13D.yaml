  hobbies: '[''soccer'', ''building LEGO sets'', ''reading adventure books (bilingual)'', ''watching space cartoons'', ''helping cook arepas'', ''listening to Venezuelan folk music'', ''playing chess'']'
  career_goals: He dreams of becoming a firefighter because he admires their bravery and teamwork, and also hopes to be an astronaut to explore space. At the same time, he aspires to be a professional soccer
    player, aiming to be the top scorer on his school team. He often talks about designing a robot that could help people, showing an early interest in engineering.
