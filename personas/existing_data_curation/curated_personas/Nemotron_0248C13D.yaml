personas:
  professional: Domingo Torresortiz, an 8‑year‑old LEGO enthusiast, designs each set with a disciplined eye and they imagine a future designing real buildings, driven by a competitive need for perfect,
    predictable outcomes.
  sports: Domingo Torresortiz plays forward for the neighborhood youth soccer club Little Lions, practices three times a week, and they passionately cheer for the national squad during Copa América while
    also tracking the professional team Caracas FC.
  arts: Domingo Torresortiz delights in the rhythmic strains of folk singer Simón Díaz while they binge‑watch the space‑themed cartoon Starlight Explorers and lose themselves in bilingual adventure novels
    like Treasure Island and the Spanish‑language version of The Jungle Book.
  travel: Domingo Torresortiz enjoys meticulously planning weekend trips to the nearby Lake Amarillo for sandcastle building, and they dream of traveling to Disney World in Orlando and trekking the ancient
    ruins of Machu Picchu, always packing a detailed checklist of snacks and souvenirs.
  culinary: Domingo Torresortiz loves rolling dough for arepas beside their mother, favoring cheese and black‑bean fillings, and they snack on sweet mango slices and grilled chicken while boasting a modest
    skill in flipping mini‑pancakes for breakfast.
  core: Domingo Torresortiz balances a rule‑loving, competitive mindset with a vivid imagination, turning each LEGO set and soccer match into a structured adventure while they worry about perfection and
    the unknown.
background:
  cultural: Domingo belongs to a Venezuelan immigrant family living in Houston. At home, Spanish is spoken and cultural traditions like celebrating Venezuelan Independence Day with arepas and hallacas are
    kept alive. He participates in a bilingual after‑school program that reinforces his heritage while helping him integrate into the diverse community of Houston. The mix of Venezuelan family customs,
    the local Hispanic community, and the multicultural Texan environment shapes his values, language use, and daily life.
attributes:
  skills: '[''bilingual reading and writing (Spanish and English)'', ''basic arithmetic (addition, subtraction, multiplication)'', ''organized soccer footwork'', ''attention to detail in following instructions'',
