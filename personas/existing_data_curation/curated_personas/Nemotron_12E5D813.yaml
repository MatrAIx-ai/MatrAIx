personas:
  professional: Dakota Perez, a 64-year-old retired environmental engineer, leverages their three-decade expertise in quantitative analysis, GIS, and scientific communication to mentor senior learners,
    spearhead interdisciplinary community art-science initiatives, and advise the Phoenix Museum of Art on sustainability.
  sports: Dakota Perez hikes the trails of Camelback and South Mountain with the Arizona Mountain Collaborative senior walking group, supports the Phoenix Suns and Arizona Diamondbacks, and balances occasional
    yoga classes at the community center with a competitive streak in senior chess tournaments.
  arts: Dakota Perez explores Phoenix's vibrant art scene, frequently attending exhibitions featuring contemporary desert artists like Robyn O'Neil, paints watercolor landscapes inspired by Ansel Adams
    and Georgia O'Keeffe, and finds solace in the jazz stylings of Herbie Hancock and the flamenco guitar of Paco de Lucia.
  travel: Dakota Perez prefers curated road trips that combine desert photography with cultural immersion, having driven to Sedona for sunrise shoots, trekked the Grand Canyon's South Rim, explored the
    historic streets of Oaxaca for authentic mole, and now dreams of a spring pilgrimage to Andalusia's white villages.
  culinary: Dakota Perez delights in cooking traditional Spanish dishes such as paella valenciana, gazpacho, and tortilla espanola, mastering the art of saffron infusion and peppercorn balance while swapping
    recipes with fellow senior center members, yet often forgets to let the paella rest, leading to a slightly crunchy bottom.
  core: Dakota Perez fuses a scientist's precision with an artist's curiosity, turning desert horizons into watercolor lessons while championing sustainable community projects, even if they occasionally
    overlook their own bedtime for a late-night chess match.
background:
  cultural: Dakota’s family traces its roots to Andalusia, Spain, and she was raised in a bilingual household where Spanish language, cuisine, and celebrations such as Semana Santa and Día de los Reyes
    were central. While living in Phoenix, she blends her Spanish heritage with Southwest influences, participating in local flamenco gatherings, sharing paella at community events, and volunteering with
    Hispanic outreach programs. Her cultural identity informs her appreciation for art, her collaborative spirit, and her commitment to fostering cross‑cultural understanding in both scientific and artistic
    circles.
attributes:
  skills: '[''Statistical analysis (R, Python)'', ''GIS and spatial analysis'', ''Project management'', ''Technical writing'', ''Research methodology'', ''Data visualization'', ''Mentoring and tutoring'',
    ''Fluent in Spanish'', ''Organizational planning'', ''Critical thinking'']'
  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting'', ''Photography (desert landscapes)'', ''Hiking in Camelback and South Mountain'', ''Cooking traditional Spanish dishes'', ''Playing
    chess'', ''Volunteer STEM outreach for youth'', ''Reading scientific and philosophical books'', ''Attending lectures on emerging technologies'', ''Participating in a community book club'']'
  career_goals: Although retired from full‑time employment, Dakota aims to continue making an impact by mentoring emerging scientists, leading interdisciplinary community projects that blend sustainability
    with public art, and serving on the advisory board of the Phoenix Museum of Art. She hopes to author a guidebook that connects scientific inquiry with artistic creativity for senior learners, and she
    aspires to win a regional senior innovation award for a project that uses AI to optimize water use in desert landscaping.
