personas:
  professional: Joyce Loizaga, a master carpenter and construction manager in her early forties, blends two decades of hands‑on woodworking with formal project‑scheduling expertise to craft sustainable
    furniture that marries modern lines with traditional Andean motifs, and they lead a meticulous workshop where apprentices learn both precision joinery and cultural storytelling.
  sports: Joyce Loizaga cheers for the Milwaukee Brewers and the Green Bay Packers while they keep fit by walking the Lake Michigan shoreline with the Lake Michigan Shoreline Hiking Club and playing intramural
    tennis at the Racine Community Center, preferring low‑impact activities that complement their woodworking stamina.
  arts: Joyce Loizaga nurtures a vibrant artistic life, painting misty Midwestern lake vistas in the style of Monet, attending gallery openings that showcase the bold colors of Maya Ruiz, and evenings filled
    with Andean rhythms from Susana Baca while they occasionally improvise on a cajón at community gatherings.
  travel: Joyce Loizaga plans trips with meticulous itineraries, favoring eco‑friendly travel to destinations like Mackinac Island’s horse‑drawn streets and remote Andean high‑land villages, while they
    also relish weekend getaways to the historic Mercado de Oaxaca to sample street foods, balancing family obligations and a modest travel budget.
  culinary: Joyce Loizaga experiments in the kitchen with a solid home‑cook skill set, mastering dishes such as ceviche with fresh lake‑caught whitefish, tamales wrapped in corn husks, and quinoa salads
    spiced with aji amarillo and fresh cilantro, often hosting potlucks where friends mingle over these flavors while they keep a well‑stocked pantry of sustainably sourced herbs and spices.
  core: Joyce Loizaga, a methodical master carpenter with a curiosity for art and a habit of over‑ordering exotic wood, balances disciplined workshop routines with spontaneous salsa nights, constantly weaving
    cultural motifs into every facet of life.
background:
  cultural: Born to Peruvian parents who immigrated to the United States, Joyce grew up bilingual, celebrating fiestas like Inti Raymi and Día de la Canción Criolla. She maintains strong ties to her heritage
    through cooking traditional dishes, listening to Andean music, and weaving Peruvian motifs into her woodworking designs. In Racine she participates in the local Latino cultural association, contributing
    her skills to community events and teaching younger members about Peruvian art forms. Her cultural roots shape her values of family, perseverance, and collaborative harmony, which she brings to both
    her professional and personal life.
