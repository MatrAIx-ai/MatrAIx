  career_goals: Joyce aims to expand her carpentry business into a boutique studio that fuses contemporary design with traditional Peruvian artistic elements. She plans to obtain a master carpenter certification
    and complete an associate degree in construction management to enhance her project-leadership capabilities. Over the next five years, she envisions hiring a small team of apprentices, offering community
    workshops on sustainable woodworking, and establishing a storefront showcasing her custom furniture line. Ultimately, she hopes to be recognized as a regional expert in culturally inspired woodworking
    and to contribute to local green building initiatives.
