persona_description: A music professor who specializes in the study of atonality, serialism, and world music, and is known for pushing the boundaries of what is considered acceptable in classical music.
  He is also an advocate for the use of electronic music and the internet in the creation of new forms of expression in music. His research interests include the development of new musical techniques and
  the use of unconventional instruments and sounds. He is a pioneer in the field of music theory and is known for his contributions to the study of tonality, dissonance, and the evolution of music in the
  20th century.
