  career_goals: Jing imagines a future where she can combine her love for helping others with her disciplined approach to learning. She dreams of becoming a pediatric doctor who can keep children healthy
    and calm, or a teacher who can guide young learners with clear structure and compassion. She also expresses curiosity about science and hopes to explore research that solves everyday problems, always
    aiming to make a positive impact on her community.
