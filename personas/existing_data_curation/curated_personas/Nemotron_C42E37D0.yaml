personas:
  professional: Jing Wang, a budding young STEM enthusiast, demonstrates impressive organizational skills and disciplined focus while designing intricate LEGO structures, and they balance curiosity with
    practicality in a way that foreshadows a future in architecture or engineering.
  sports: Jing Wang, a member of the Chicago Park District's junior soccer club and a regular participant in beginner swimming lessons at the North Shore Aquatic Center, approaches fitness with the same
    disciplined routine applied to LEGO building, and they avidly cheer for the Chicago Cubs during spring training and the Chicago Blackhawks in the winter.
  arts: Jing Wang, who devotes weekend afternoons to practicing piano pieces like Beethoven's Für Elise and Yiruma's River Flows in You, eagerly dives into picture books by Mo Willems and Dr Seuss, and
    they create imaginative LEGO dioramas inspired by the vibrant illustrations of Studio Ghibli's My Neighbor Totoro, weaving a rich tapestry of visual and auditory arts into their daily play.
  travel: Jing Wang, who prefers organized family day trips—such as exploring the Field Museum's dinosaur halls, strolling along the Lake Michigan shoreline, and gathering pinecones during a weekend getaway
    to Starved Rock State Park—enjoys a balanced travel style that mixes educational stops with the calm of nature, and they dream of a future visit to Tokyo's Ghibli Museum.
  culinary: Jing Wang, a budding kitchen assistant who proudly helps whisk together a smooth peanut butter‑banana smoothie with fresh strawberries and oatmeal, delightfully savors classic Chicago deep‑dish
    pizza topped with mozzarella and pepperoni, and they prefer simple, colorful meals like vegetable‑studded macaroni‑and‑cheese, showcasing a palate that blends comfort foods with curiosity for fresh
    ingredients.
  core: Jing Wang, a meticulously organized, curiosity‑driven seven‑year‑old who balances disciplined LEGO engineering with gentle compassion, occasionally procrastinates on bedtime routines, and they epitomize
    a calm yet ambitious spirit.
background:
  cultural: Jing is a second‑generation Chinese‑American raised in Chicago. Her household is bilingual, with Mandarin spoken at home alongside English at school. Her family celebrates cultural traditions
    such as Lunar New Year and the Mid‑Autumn Festival, while also embracing the diverse cultural landscape of the city. Emphasis on education, respect for elders, and community involvement are core values
    in her upbringing, shaping her organized, compassionate, and resilient personality.
