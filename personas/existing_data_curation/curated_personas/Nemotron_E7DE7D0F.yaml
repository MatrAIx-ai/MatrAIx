  career_goals: Christopher is fascinated by how things are built and function, and he dreams of becoming a civil engineer who designs safe, sustainable bridges and community infrastructure. He enjoys constructing
    detailed Lego models, which fuels his interest in structural design and problem solving. He also admires wildlife biologists who study ecosystems with systematic methods, and he sometimes imagines combining
    these passions by working on projects that protect natural habitats while developing eco-friendly infrastructure. He aspires to pursue higher education in engineering or environmental science, and he
    values a career that offers clear goals, reliable outcomes, and the opportunity to serve his community.
