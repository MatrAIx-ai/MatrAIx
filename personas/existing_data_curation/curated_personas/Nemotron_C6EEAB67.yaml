personas:
  professional: Ashley Dorman, a seasoned electrician with over two decades of NEC‑mastered residential and commercial work, channels their critical, competitive nature into flawless renewable‑energy and
    smart‑home projects, while their artistic curiosity drives immersive lighting designs and a disciplined mentorship of apprentices.
  sports: Ashley Dorman maintains fitness through solo hikes on the Allegheny County trail network, follows the Pittsburgh Steelers in the fall, the Penguins during hockey season, and the Pirates in summer,
    while occasionally joining a Saturday morning cycling club at a local bike co‑op, balancing competitive spirit with solitary reflection.
  arts: Ashley Dorman roams the Mattress Factory and Carnegie Museum of Art for avant‑garde inspiration, paints mixed‑media canvases lit by custom LEDs, and unwinds to the sounds of Miles Davis, Erykah
    Badu, and Janelle Monáe, weaving these artistic currents into both work and weekend projects.
  travel: Ashley Dorman prefers meticulously planned road trips to culturally rich U.S. cities like New Orleans and Asheville, while dreaming of a solar‑powered solo trek through Iceland’s Reykjavik and
    the Blue Lagoon, balancing a modest budget with a desire for immersive, low‑key exploration.
  culinary: Ashley Dorman whips up Southern comfort staples—collard greens with smoked turkey, shrimp étouffée, and sweet‑potato pie—seasoned with hot sauce and a splash of bourbon, displaying a confident
    home‑cook’s skill while still savoring occasional jazz‑age brunches at local diners.
  core: Ashley Dorman fuses circuitry and color, obsessively tweaking LED lighting in every room, hoarding electronic components like treasure, and juggling a relentless quest for sustainable design with
    a habit of late‑night speculative‑fiction binge‑reading.
background:
  cultural: Ashley grew up in the vibrant African‑American community of the Pittsburgh suburbs, where church, family gatherings, and community events shaped her sense of identity and resilience. Her parents
    emphasized the importance of education, hard work, and representation, encouraging her to pursue a trade traditionally under‑represented by Black women. She carries forward these values by celebrating
    cultural milestones such as Juneteenth and participating in local NAACP initiatives. The rich traditions of storytelling, music, and cuisine from her heritage inform both her artistic sensibilities
    and her collaborative approach at work, fostering a deep appreciation for diverse perspectives while remaining critically focused on her personal and professional goals.
attributes:
  skills: '[''Electrical wiring'', ''Circuit troubleshooting'', ''Blueprint reading'', ''Conduit bending'', ''Solar photovoltaic installation'', ''Battery storage integration'', ''Smart home automation'',
    ''NEC code compliance'', ''Project planning and cost estimating'', ''Mentoring apprentices'', ''Electrical safety inspections'']'
  hobbies: '[''Visiting art galleries and museums'', ''Mixed‑media painting with integrated LED lighting'', ''Arduino/Raspberry Pi home‑automation projects'', ''Reading speculative fiction and tech non‑fiction'',
    ''Small‑group book club'', ''Hiking local trails'', ''Cooking family soul‑food recipes'', ''Listening to jazz and neo‑soul music'', ''Volunteering as a STEM mentor for youth'']'
  career_goals: Looking ahead, Ashley aims to earn her Master Electrician license and deepen her specialization in renewable‑energy solutions, particularly solar and micro‑grid projects. She envisions launching
    her own contracting firm that blends sustainable electrical practices with artistic lighting design, collaborating with local artists to create immersive installations. Additionally, she aspires to
    become a certified trainer for the state apprenticeship program, fostering greater diversity in the trades by mentoring young Black women interested in electrical work. Balancing professional growth
    with family life, Ashley also plans to secure a stable retirement pathway through strategic investments and continued education.
