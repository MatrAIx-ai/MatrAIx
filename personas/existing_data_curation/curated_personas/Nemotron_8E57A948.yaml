personas:
  professional: A front‑of‑house hospitality specialist, Alejandro Reyes blends bilingual fluency, lightning‑quick order memorization, and a competitive drive to deliver personalized guest experiences,
    mentor new staff, and engineer efficient service workflows, balancing their curiosity for innovative upselling techniques with a practical, organized approach to high‑pressure rushes.
  sports: A community‑focused athlete, Alejandro Reyes plays forward for the Garland United amateur soccer league, they cheer passionately for FC Dallas during MLS season and the Dallas Cowboys on Sundays,
    they join the local gym for functional training three times a week, and they balance a competitive spirit on the field with a sociable desire to bond over post‑game craft beers at the team’s favorite
    local bar.
  arts: An enthusiastic performer, Alejandro Reyes thrives on salsa dancing at local social clubs, they belt out karaoke hits from artists like Luis Miguel, Selena, and Carlos Santana on weekend nights,
    they immerse themselves in the lively rhythms of mariachi and norteño at community festivals, and they cultivate a deep appreciation for classic Latin American cinema and contemporary Latin pop, which
    infuse their social gatherings with vibrant musical playlists.
  travel: An adventurous traveler with a family‑oriented itinerary, Alejandro Reyes frequently drives to Mexico City to visit relatives and bring back authentic recipes, they savor weekend getaways to the
    Texas Hill Country and New Orleans for Mardi Gras, they dream of exploring Oaxaca’s culinary scene and the historic streets of San Miguel de Allende, and they meticulously plan trips around holiday
    festivals to maximize cultural immersion while staying within a modest budget.
  culinary: A creative home chef, Alejandro Reyes expertly prepares carnitas, tamales, and chipotle‑infused BBQ ribs, they experiment with cotija cheese, chile de árbol, and avocado‑lime salsa in fusion
    tacos, they craft mezcal‑based cocktails with fresh hibiscus and agave syrup for friends, they follow MasterChef‑inspired techniques while balancing a pragmatic approach to food safety, and they delight
    in sharing their dishes at neighborhood potlucks and DIY kitchen workshops.
  core: A dynamic 34‑year‑old bilingual hospitality manager, Alejandro Reyes merges a competitive edge, late‑night karaoke habit, and a relentless passion for blending tradition with modern Tex‑Mex flavors
    into every facet of life.
background:
  cultural: Alejandro comes from a first‑generation Mexican‑American family in the Dallas‑County area. Raised bilingual, he grew up speaking Spanish at home while attending English‑language schools. Family
    traditions such as Día de los Muertos, tamale making, and Catholic celebrations remain central to his identity. The vibrant Mexican community in Garland has shaped his love for Tex‑Mex cuisine, community
    festivals, and lively music like mariachi and norteño. He frequently visits relatives in Mexico, bringing back recipes and cultural stories that he shares with his own family, merging Mexican heritage
    with Texan life.
