  career_goals: Alejandro aims to be promoted to floor manager within the next two years, then advance to restaurant manager within five years, leveraging a hospitality‑management certification he plans
    to earn. His competitive drive pushes him to become the top‑performing employee in his shift, recognized for sales growth and staff development. Long‑term, he dreams of opening a family‑run Tex‑Mex
    restaurant or food truck that blends traditional Mexican recipes from his heritage with modern Texas flavors, creating a community hub where he can mentor younger workers and showcase his culinary curiosity.
