  hobbies: '[''Gardening'', ''Knitting'', ''Reading mystery novels'', ''Cooking family recipes'', ''Walking her Labrador'', ''Volunteering at the local food bank'', ''Participating in a quilting circle'',
    ''Listening to classic country music'']'
  career_goals: Katrina aims to transition from a frontline cleaning role to a supervisory position, such as lead janitor or facilities coordinator, where she can mentor new staff and oversee building‑wide
    maintenance programs. She plans to obtain a Certified Professional Cleaner (CPC) credential and take a short certification in Facility Management to broaden her technical knowledge. Over the next few
    years, she hopes to secure a part‑time schedule that offers greater work–life balance, allowing her more time for self‑care while still contributing her expertise to the workplace. Ultimately, she envisions
    a role that blends hands‑on maintenance with training responsibilities, fostering a supportive and orderly environment for both staff and building occupants.
