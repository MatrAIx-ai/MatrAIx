personas:
  professional: An experienced facilities professional, Katrina Oconnell leverages over three decades of hands-on expertise in floor care, restroom sanitation, and minor building repairs while applying
    their love of predictable routines and cooperative spirit to mentor junior staff and keep maintenance schedules running smoothly despite occasional disorganization.
  sports: As an active sports enthusiast, Katrina Oconnell walks their rescued Labrador each morning, participates in a neighborhood walking club, and faithfully cheers for the New Orleans Saints and Atlanta
    Braves while occasionally joining a community bowling league, balancing solitary exercise with team spirit.
  arts: Creatively, Katrina Oconnell spends evenings knitting scarves and quilts while listening to classic country legends like George Strait and Dolly Parton, they devour mystery novels by Agatha Christie
    and T. Jefferson Parker for mental escape, and they enjoy occasional visits to the local community theater, blending solitary craftsmanship with shared cultural appreciation.
  travel: Travel-wise, Katrina Oconnell prefers low-key road trips to nearby Southern gems such as Savannah, Asheville, and the Gulf Coast beaches, they plan itineraries loosely to allow spontaneous stops
    while balancing a modest travel budget and a desire for relaxation over adventure.
  culinary: In the kitchen, Katrina Oconnell excels at preparing Southern comfort staples - crispy fried chicken, buttery collard greens, cornbread, and peach cobbler - using fresh tomatoes, okra, and sweet
    potatoes from their garden, and they approach cooking with a home-cook's confidence that mixes tradition with spontaneous creativity.
  core: At 53, Katrina Oconnell blends a love of orderly routines with a streak of harmless disarray; they find solace in gardening, knitting, and community volunteer work while constantly battling worry
    and a penchant for last-minute schedule shifts.
background:
  cultural: Katrina was raised in a middle‑class, white working‑family in the Arlington area of Texas. Her upbringing reflected typical Southern values of hard work, modesty, and community responsibility.
    She grew up attending a local Methodist church, which reinforced a sense of fellowship and service. The cultural milieu of Tarrant County, with its blend of suburban growth and strong neighborhood ties,
    shaped her practical outlook and cooperative spirit. While English is her primary language, she has a basic familiarity with Spanish phrases common in the region, though she does not use them regularly.
    Her high school education included a vocational shop and basic business courses, which laid the groundwork for her long‑standing career in building maintenance.
