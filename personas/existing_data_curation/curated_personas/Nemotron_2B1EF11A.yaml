  hobbies: '[''Abstract watercolor painting'', ''Street and landscape photography'', ''Reading contemporary philosophy and modern literature'', ''Playing chess'', ''Cooking traditional Colombian cuisine'',
    ''Collecting vintage vinyl records (cumbia, jazz, rock)'', ''Gardening (orchids and tropical plants)'', ''Writing poetry'']'
  career_goals: Emilio aims to transition from day-to-day managerial duties to a senior advisory role that allows him to shape the future of people strategy on a broader scale. Over the next five years
    he plans to launch a boutique HR consulting practice focused on infusing creativity and cultural awareness into workplace design, targeting companies with a multinational presence in Latin America.
    He also intends to author a book on using art-based methods to increase employee motivation and to become a regular speaker at HR and leadership conferences. Mentoring emerging HR professionals, especially
    those from under-represented backgrounds, is a personal priority as he gradually moves toward a semi-retired, mentorship-centric phase of his career.
