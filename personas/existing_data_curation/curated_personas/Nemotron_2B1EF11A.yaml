personas:
  professional: Emilio Yournett channels three decades of HR leadership into a senior advisory role that blends rigorous strategic workforce planning with art‑driven employee engagement workshops, leveraging
    bilingual communication, data analytics, and a competitive drive to innovate while they remain reserved and occasionally skeptical of corporate promises.
  sports: Emilio Yournett stays active by walking three times a week with the Teaneck Senior Center walking club, joining a seasonal senior tennis league at the Bergen County Community Center, and follows
    the New York Giants (NFL) and New York Knicks (NBA) with avid enthusiasm, while they keep a low‑impact fitness routine that satisfies their competitive spirit without the pressure of high‑intensity
    sports.
  arts: Emilio Yournett expresses their imagination through abstract watercolors inspired by Kandinsky’s vivid palettes, curates a vintage vinyl collection featuring Los Corraleros de Majagual, Miles Davis,
    and John Coltrane, attends monthly poetry readings spotlighting spoken‑word artists like Saul Williams, and they often blend visual and auditory cues to design immersive employee workshops.
  travel: Emilio Yournett prefers meticulously planned journeys that combine nostalgic returns to Bogotá’s historic La Candelaria district, tranquil weekend retreats to the Catskill Mountains for sketching,
    and ambitious future plans for a Patagonia glacier trek, while they balance these trips against a modest retirement budget and a desire for low‑stress travel experiences.
  culinary: Emilio Yournett showcases modest culinary skill by simmering aromatic ajiaco with chicken, corn, and guasca, frying golden empanadas stuffed with pork, potatoes, and cilantro, and they relish
    pairing these meals with freshly brewed coffee infused with panela.
  core: Emilio Yournett is a 62‑year‑old HR strategist whose disciplined analytical mind coexists with a vivid artistic soul, driving them to champion creative workplace design while they quietly battle
    chronic worry.
background:
  cultural: Emilio was born to Colombian parents who immigrated to the United States in the late 1960s; he spent his early childhood in Medellín before moving to New Jersey as a teenager. He grew up bilingual,
    absorbing the rhythms of Colombian music, the flavors of regional cuisine, and the communal values of family gatherings. In Teaneck he remains actively involved with the local Colombian diaspora, participating
    in cultural festivals, supporting a community garden that grows tropical produce, and volunteering at the Colombian-American Association. His heritage informs his professional worldview, prompting him
    to champion multicultural inclusion and to incorporate Latin American artistic sensibilities into his HR initiatives. Despite being separated, he maintains close ties with his extended family in Colombia,
    often traveling there to visit and to reconnect with his cultural roots.
