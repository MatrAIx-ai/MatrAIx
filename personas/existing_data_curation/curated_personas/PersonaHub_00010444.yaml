persona_description: 'A researcher working in the field of catalysis and energy efficiency, focusing on the design and development of novel catalysts and active sites for molecular and solid catalysts.
  They are part of the PNNL''s Institute for Integrated Catalysis (IIC) and work on multidisciplinary collaborations to explore applied problems, develop a foundational understanding of various catalyst
  chemistries, design new catalysts, chart new ways to make catalysts, and provide novel solutions to environmentally friendly technologies. Their research areas include electrocatalysis, hydrogenation,
  and carbon–carbon and carbon–hydrogen bond formation, with a focus on developing high selectivity and rates for these reactions. They are part of the Core Basic Energy Sciences Catalysis Program, Energy
  Frontier Research Center: Center for Molecular Electrocatalysis, and Chemical Transformations Initiative.'
