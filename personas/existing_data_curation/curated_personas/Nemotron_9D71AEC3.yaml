personas:
  professional: Onelis Lopez, a bilingual pharmacist in Houston, blends meticulous prescription verification with culturally attuned medication counseling, leveraging digital adherence tools and a data‑driven
    safety mindset to serve the Spanish‑English speaking community.
  sports: Onelis Lopez, an avid hiker of the Spring Creek Greenway, supports the Houston Astros and follows the Houston Dynamo, while participating in a community yoga league and joining a local recreational
    softball team that meets on Saturday mornings.
  arts: Onelis Lopez, a watercolor enthusiast who paints Texas Gulf Coast landscapes, strums acoustic guitar chords inspired by Sufjan Stevens and Iron & Wine, and reads contemporary sci‑fi authors like
    Becky Chambers, often attending the Houston Museum of Fine Arts’ Sunday open‑house events.
  travel: Onelis Lopez, a meticulous planner who maps weekend getaways in spreadsheets, enjoys road trips to Austin for live music, prefers the relaxed vibe of Galveston’s beachfront, and dreams of backpacking
    through Patagonia while balancing a modest travel fund.
  culinary: Onelis Lopez, an amateur chef, perfects traditional baleadas and pastelitos with fresh herbs from a home garden, experiments with citrus‑infused marinades for grilled fish, and frequently pairs
    meals with homemade hot chocolate spiced with a hint of cinnamon.
  core: Onelis Lopez balances a methodical pharmacist’s precision with a love for sci‑fi imagination, garden‑fresh cooking, and quiet watercolor sessions, all while quietly battling late‑night email checks
    and occasional garden‑watering lapses.
background:
  cultural: Onelis grew up in a close‑knit Honduran‑American household, where Spanish was spoken at home and community celebrations like Semana Santa and Feria de San Jerónimo were observed with traditional
    music, dance, and food. Her parents instilled a strong sense of responsibility toward family and community, which surfaces in her compassionate approach to pharmacy practice. Relocating to Spring, Texas,
    she bridges her heritage with the multicultural fabric of the Houston metro area, often serving as a cultural liaison for fellow Honduran immigrants navigating the U.S. healthcare system. She incorporates
    her cultural roots into her professional life by offering bilingual medication counseling, celebrating Honduran holidays with coworkers, and advocating for health‑literacy materials that reflect the
    linguistic and culinary preferences of the local Latino population.
attributes:
  skills: '["Prescription verification", "Medication therapy management", "Compounding sterile and non‑sterile preparations", "Bilingual patient counseling (Spanish/English)", "Pharmacy inventory control",
    "Regulatory compliance", "Health education and literacy", "Community outreach", "Medication safety data analysis", "Team collaboration"]'
  hobbies: '["Reading contemporary science‑fiction", "Cooking traditional Honduran dishes", "Hiking on local trails", "Practicing yoga", "Volunteering at a free clinic", "Watercolor painting", "Playing
    acoustic guitar", "Herb gardening"]'
  career_goals: Onelis aims to obtain a Clinical Pharmacy Residency in ambulatory care within the next two years, focusing on chronic disease management for underserved Hispanic populations in the Houston
    area. She plans to earn certifications as an Immunizer and Diabetes Educator, and later pursue a PharmD specialization in pediatric pharmacy. In the long term, she envisions opening a community‑focused
    pharmacy that integrates culturally relevant health services, such as bilingual medication counseling, nutrition workshops featuring Honduran cuisine, and digital adherence programs. Ultimately, she
    aspires to lead a regional pharmacy network, mentor new pharmacists, and contribute research on medication adherence disparities among Latino communities.
