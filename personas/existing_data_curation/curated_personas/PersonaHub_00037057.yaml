persona_description: A Native American woman who founded and runs a nonprofit organization called Mother Nation, which provides services and mentorship, advocacy, cultural services, and homelessness prevention
  for Native women. She is a member of the Oneida Nation and was raised on the Oneida settlement near London, Ontario. Norine was sexually abused for the first time when she was 4 and has since been sober
  since 2005. She moved to Seattle with her children in 2006 and started her life over. Norine is a strong advocate for Native women and their right to heal from abuse.
