persona_description: A researcher at the Learning Algorithms and Systems Laboratory at EPFL (LASA), Aude Billard is a roboticist who specializes in developing innovative solutions for capturing and dodging
  complex objects in full motion. Her research aims to create machines that can quickly assimilate data changes, react on the spot, and generate a movement in the opposite direction, which is crucial for
  the success of robotic applications in space. Billard's research has led to the development of a unique robotic arm that can catch projectiles of various irregular shapes in less than five hundredths
  of a second.
