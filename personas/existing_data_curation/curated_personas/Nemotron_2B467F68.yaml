  hobbies: '[''Reading (science fiction & fantasy)'', ''Online chess'', ''Puzzles (Sudoku, Rubik’s Cube)'', ''Coding small Python projects'', ''Model aircraft kit building'', ''Hiking in Rocky Mountains'',
    ''Nature photography'', ''Cooking Mexican cuisine'', ''Journaling for stress management'', ''Listening to instrumental music'']'
  career_goals: Fermin aims to complete his high school equivalency (GED) within the next two years, then enroll in a community‑college program focused on information technology, specifically network administration.
    He plans to obtain CompTIA A+ and Network+ certifications to build a reliable skill set for predictable, low‑stress IT support roles. In the short term, he seeks a part‑time position as a tech‑assistant
    in a school or small business, where he can apply his disciplined work habits. Long‑term, he aspires to become a certified network engineer or system analyst in a structured corporate environment that
    values meticulous documentation and routine processes. He also hopes to leverage his achievements to support his family financially and eventually mentor younger Hispanic students in his community.
