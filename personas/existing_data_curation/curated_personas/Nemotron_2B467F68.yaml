personas:
  professional: Fermin Cornejo is a disciplined 16‑year‑old high‑school junior who leverages their meticulous organization, bilingual fluency, and introductory Python skills to produce small automation
    scripts, assemble detailed aircraft models, and seek part‑time tech‑assistant positions that will lay the groundwork for future network‑administration certifications.
  sports: Fermin Cornejo is a devoted weekend hiker on the Rocky Mountain trails, an occasional participant in a local climbing club, and a loyal follower of the Colorado Avalanche and Denver Broncos, preferring
    solitary cardio activities over team sports.
  arts: Fermin Cornejo finds solace in ambient instrumental music by Brian Eno and Max Richter while reading science‑fiction works from authors like Neal Stephenson, and channels their attention to detail
    into constructing precise Boeing 747 model kits, which together comprise their quiet creative pursuits.
  travel: Fermin Cornejo favors carefully structured trips to natural destinations such as Yellowstone and Grand Teton, enjoys low‑stress itineraries that allow for photography and reflection, and dreams
    of a future visit to Tokyo’s Akihabara district to explore technology museums.
  culinary: Fermin Cornejo enjoys preparing spice‑rich dishes like enchiladas and homemade salsa, approaching cooking with the same methodical precision as their model‑building hobby, and often pairs the
    process with ambient music to create a meditative kitchen environment.
  core: Fermin Cornejo is an introverted, hyper‑organized teen who balances solitary tech projects, disciplined self‑care, and an ever‑present worry about meeting their own exacting standards.
background:
  cultural: Fermin is a second‑generation Mexican American raised in Denver’s vibrant Hispanic community. At home, Spanish is spoken alongside English, and family gatherings celebrate traditions such as
    Día de los Muertos, quinceañeras, and other Mexican holidays. He grew up on home‑cooked meals like tamales and enchiladas, learning recipes from his parents and grandparents. Local Mexican cultural
    festivals and community centers have reinforced his connection to Mexican music, dance, and religious customs, while also exposing him to the broader multicultural environment of Denver. This bicultural
    upbringing shapes his values of family solidarity, respect for elders, and a strong work ethic.
attributes:
  skills: '[''Organizational and time‑management'', ''Bilingual communication (Spanish & English)'', ''Basic Python programming'', ''Microsoft Office Suite (Word, Excel, PowerPoint)'', ''Data entry and
