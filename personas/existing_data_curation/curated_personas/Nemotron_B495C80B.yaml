  hobbies: '[''Visiting museums and galleries'', ''Attending theatre and live music performances'', ''Playing chess'', ''Gardening'', ''Cooking Italian cuisine'', ''Walking the Bronx River Trail'', ''Mindfulness
    meditation and journaling'', ''Volunteering as a docent at a historic site'', ''Participating in community theatre workshops'', ''Photography of urban and natural scenes'']'
  career_goals: Although approaching retirement, Jordan's primary goal is to transition from day-to-day operations to a mentorship role, sharing his decades of knowledge with emerging managers and small-business
    owners in the Bronx-Westchester area. He aims to serve on the board of a local arts council, where he can integrate his love for visual and performing arts into community programming. Jordan also hopes
    to champion mental-health awareness in the workplace, using his own experiences of anxiety to develop supportive policies and peer-support groups. Finally, he wants to document his life story in a memoir
    that highlights the interplay of work, family, and cultural heritage, leaving a legacy for his children and grandchildren.
