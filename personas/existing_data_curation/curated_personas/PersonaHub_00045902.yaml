persona_description: A Local Education Authority (LEA) official who is responsible for overseeing the implementation and administration of the National Curriculum in their area, including the transition
  from three-tier to two-tier education models. They are likely to have experience in education policy, school governance, and curriculum implementation, and may have a special interest in the development
  and implementation of first schools. They may also have a keen eye for detail and a deep understanding of the nuances of educational reform, as they are responsible for ensuring that the transition from
  three-tier to two-tier education models is smooth and effective.
