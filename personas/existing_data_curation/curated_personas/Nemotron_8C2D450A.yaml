  career_goals: Sebastian aims to transition his solo practice into a boutique brokerage with a small team of trusted agents, positioning the firm as the go‑to service for residential buyers and sellers
    in Mount Morris and surrounding areas. He intends to mentor younger agents, sharing his disciplined approach and community knowledge. Over the next five years, he hopes to rank among the top three high‑performing
    agents in Genesee County, integrate more technology‑driven tools for virtual tours and data analytics, and eventually establish a real‑estate investment fund that supports local homeowners and revitalizes
    the neighborhood. Balancing his ambition with his sensitivity to stress, he also plans to adopt a more structured work‑life schedule to safeguard his health and family time.
