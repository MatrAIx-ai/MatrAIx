  career_goals: In the next few years John aims to master reading simple words, ride his bicycle without training wheels, and construct taller block towers than his peers. His love of structure and competitive
    spirit fuels a vivid imagination of winning preschool building contests. He frequently says he wants to become a firefighter or a construction worker, roles that combine practical help, order, and the
    chance to protect and build safely. He also hopes to help his family with gardening and simple chores, reflecting his sense of responsibility and desire to contribute.
