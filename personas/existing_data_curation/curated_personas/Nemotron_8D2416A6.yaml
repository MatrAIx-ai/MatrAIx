personas:
  professional: A budding builder and problem‑solver named John Ramirez loves assembling LEGO cityscapes, where they apply a practical, step‑by‑step mindset and reliably follow instructions, yet still squeeze
    in moments of imaginative play when the routine feels too rigid.
  sports: A preschool soccer enthusiast named John Ramirez kicks the ball at their after‑school league, idolizes the local youth team the Little Rangers, and eagerly watches the New York Knicks on TV, demonstrating
    that they thrive on structured practice yet their competitive streak sometimes overshadows cooperative play.
  arts: A budding artist named John Ramirez loves drawing bright dinosaurs and colorfully re‑imagining scenes from Pixar’s Toy Story, humming tunes from Disney’s Frozen while they proudly display their
    crayon masterpieces on the refrigerator door.
  travel: An adventurous explorer named John Ramirez has visited the nearby zoo and a beachside splash park, and dreams of traveling to Disney World and the Grand Canyon, preferring short car trips where
    they bring along a favorite stuffed llama for comfort.
  culinary: A young food lover named John Ramirez prefers cheesy macaroni, chicken nuggets, and apple slices, occasionally helps stir batter for banana pancakes with a wooden spoon, yet they can be stubborn
    about vegetables, especially broccoli.
  core: A structured yet playful four‑year‑old named John Ramirez balances a love for routine Lego building with spontaneous dinosaur‑themed dance bursts, often forgetting to finish chores but always returning
    to their trusted pink piggy bank where they meticulously count each saved coin.
background:
  cultural: 'John is raised in a predominantly white, rural community in Bellevue, Kentucky. His family observes typical Southern and Midwestern traditions: weekly church attendance at a local Baptist congregation,
    celebrating Thanksgiving with a large family dinner, and observing Christmas with gift‑giving and carol singing. Outdoor activities such as fishing, hiking, and neighborhood picnics are common, reflecting
    the region’s appreciation for nature. The cultural emphasis on order, self‑reliance, and community service aligns with John’s preference for structure and responsibility. While his surname hints at
    possible Hispanic ancestry, his daily life is rooted in local customs and values that blend practicality with a warm sense of community.'
