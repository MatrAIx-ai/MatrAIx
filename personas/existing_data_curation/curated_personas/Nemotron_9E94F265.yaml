  career_goals: Seeking to transition from frontline representative to a supervisory or training role, Pamela aims to lead a small team of customer service agents, develop a mentorship program for new hires,
    and obtain the Certified Customer Experience Professional (CCXP) credential. She hopes to integrate her love of the arts by curating employee wellness workshops that incorporate creative thinking, and
    to continue her education through community college courses in business communication and art history. Long‑term, she envisions a part‑time role as a community outreach coordinator for a local cultural
    institution, leveraging her service expertise and curiosity.
