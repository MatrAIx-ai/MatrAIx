    creation", "Mindfulness and self-care techniques"]'
  hobbies: '["Painting and sketching", "Digital photography", "Listening to Latin and jazz music", "Salsa dancing", "Cooking Puerto Rican dishes", "Visiting art museums and galleries", "Reading modern art
    and philosophy books", "Journaling", "Meditation and yoga", "Volunteering at community centers", "Hiking in local parks", "Creating content for Instagram/TikTok"]'
  career_goals: Roberto aspires to turn his creative passions and caring nature into a sustainable career. In the next few years he hopes to enroll in a certificate program in graphic design or art therapy,
    gaining formal credentials that will qualify him for roles in nonprofit cultural organizations. His primary goal is to secure a full‑time position as a community arts facilitator or cultural outreach
    coordinator, where he can design workshops, curate exhibitions, and mentor youth from the Puerto Rican diaspora. He also dreams of building a freelance portfolio of graphic‑design and illustration work,
    allowing him flexibility while he continues to volunteer in mental‑health awareness initiatives. Ultimately, Roberto wants to blend his artistic talent, bilingual communication, and empathy to create
    inclusive spaces that celebrate cultural identity and support emotional wellbeing.
