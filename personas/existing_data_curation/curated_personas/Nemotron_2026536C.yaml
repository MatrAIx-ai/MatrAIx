personas:
  professional: Renz Whiddon, an aspiring robotics engineer, channels their methodical, structure-loving mindset into meticulous design schematics, precise coding for school club competitions, and a habit
    of documenting every build in a leather-bound journal, while quietly mentoring younger teammates to ensure harmonious teamwork.
  sports: Renz Whiddon, a quiet teen who channels their love of order into the school cross-country track team, spends Saturday mornings cueing up the Seattle Seahawks game and fervently follows the Seattle
    Sounders FC, while also maintaining a personal running log to track lap times and progress.
  arts: Renz Whiddon, a piano enthusiast who practices Chopin's Nocturnes with disciplined precision, immerses themselves in the sci-fi worlds of Isaac Asimov and Denis Villeneuve's Blade Runner, and curates
    a digital gallery of concept art from Syd Mead, all of which shape their creative outlet during quiet evenings.
  travel: Renz Whiddon, a meticulous planner, prefers low-key nature escapes like the alpine trails of Rocky Mountain National Park and the serene gardens of Kyoto, packs detailed itineraries with exact
    train schedules, and dreams of attending the annual International Robot Expo in Barcelona, all while balancing a modest family budget.
  culinary: Renz Whiddon, a detail-oriented home cook, enjoys perfecting spaghetti carbonara with precisely measured pancetta and Pecorino, experiments with sushi rolls using calibrated rice-to-vinegar
    ratios, and relies on a well-organized pantry stocked with staple ingredients like almond flour and canned beans.
  core: Renz Whiddon blends a quiet, methodical curiosity with compassionate teamwork, turning solitary pursuits into disciplined projects while occasionally over-indulging in late-night strategy games.
background:
  cultural: Renz was raised in Middletown, Ohio, a small Midwestern city with a predominantly white population. His family reflects the region's typical middle‑class background, with roots that trace back
    to German and Irish ancestors who settled in the area generations ago. The community emphasizes modesty, hard work, reliability, and neighborly support. Local traditions such as church youth groups,
    4‑H involvement, and community service projects have shaped his sense of responsibility and cooperative spirit. These Midwestern values underscore his preference for structure, his practical outlook,
    and his compassionate drive to help others.
