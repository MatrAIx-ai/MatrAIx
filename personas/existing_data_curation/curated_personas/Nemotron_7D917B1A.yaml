  hobbies: '[''Playing soccer'', ''Exploring local parks'', ''Reading science magazines'', ''Coding with Scratch'', ''Building LEGO models'', ''Sketching and drawing'', ''Volunteering at community center'',
    ''Listening to hip‑hop and R&B music'', ''Playing Minecraft'']'
  career_goals: Derrick dreams of a future where he can combine his love of science, technology, and helping others. He aspires to become a pediatric doctor or a biomedical engineer, hoping to create tools
    that improve children's health. He also envisions leading community youth programs, using his organizational skills and compassion to mentor younger students. Ultimately, Derrick aims to earn scholarships
    that allow him to attend a strong STEM high school and later pursue a degree that merges health care with innovative technology.
