personas:
  professional: Prachi Sankaranarayanan, a 26‑year‑old audit professional at a tech‑focused accounting firm, leverages sharp analytical skills in GAAP and IFRS compliance, advanced Excel, Power BI, and
    Python to uncover hidden financial risks, while their curiosity and artistic eye transform dense audit data into vivid visual narratives that persuade skeptical stakeholders.
  sports: Prachi Sankaranarayanan, a 26‑year‑old Bay Area resident, follows the San Francisco Giants and Golden State Warriors avidly, runs with the Run the Bay club on crisp mornings, and hikes the Coastal
    Trail with the Bay Area Hiking Group, treating workouts as both a competitive outlet and a vital stress‑relief ritual.
  arts: Prachi Sankaranarayanan spends weekends at SFMOMA immersing themselves in exhibitions by Kehinde Wiley and Yayoi Kusama, sketches street‑art murals by Shepard Fairey in the Mission, and curates
    playlists featuring A.R. Rahman and Lianne La Havas, allowing the visual and musical tapestry to inform their audit storytelling.
  travel: Prachi Sankaranarayanan prefers meticulously planned trips, combining cultural immersion with artistic inspiration; they have explored the historic temples of Kyoto, the vibrant markets of Marrakech,
    and frequently escape to Napa Valley for wine‑and‑art tours, while dreaming of a sustainable art residency in Barcelona.
  culinary: Prachi Sankaranarayanan blends traditional South Indian dishes like masala dosa and avial with Californian farm‑to‑table ingredients such as heirloom tomatoes and fresh basil, experimenting
    with coconut‑milk‑based sauces, and enjoys serving friends at pop‑up dinners where they showcase their skillful yet slightly obsessive plating.
  core: Prachi Sankaranarayanan, a 26‑year‑old audit professional, fuses art‑driven curiosity with relentless drive, juggling meticulous spreadsheets, yoga‑induced calm, and occasional bouts of worry that
    fuel both competitive ambition and creative breakthroughs.
background:
  cultural: Prachi grew up in a first‑generation Indian‑American family in the Bay Area. Her parents emigrated from Kerala, South India, and she was raised bilingual, speaking Malayalam at home while attending
    American schools. Cultural traditions such as celebrating Onam and Diwali, listening to classical Carnatic music, and enjoying family meals centered on rice, coconut, and spices remain integral to her
    identity. At the same time, she embraces the multicultural environment of San Francisco, participating in local South Asian cultural festivals and being active in the diaspora’s art and culinary scenes.
    This bicultural upbringing nurtured her curiosity, respect for diverse perspectives, and an appreciation for the intersection of art and community, which influences both her personal pursuits and professional
    ethos.
attributes:
  skills: '[''Financial statement analysis'', ''GAAP & IFRS compliance'', ''Internal audit planning'', ''Data analytics (Excel, Power BI, Python)'', ''Risk assessment and mitigation'', ''Regulatory reporting'',
