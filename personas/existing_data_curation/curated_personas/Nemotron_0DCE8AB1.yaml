  hobbies: '[''Visiting art galleries and street art tours'', ''Sketching and watercolor painting'', ''Reading contemporary fiction and poetry'', ''Creative journaling and short writing'', ''Fusion cooking
    (South Indian & Californian cuisine)'', ''Yoga and mindfulness meditation'', ''Hiking coastal trails around the Bay Area'', ''Listening to finance and tech podcasts'', ''Participating in women‑in‑accounting
    meet‑ups'', ''Volunteering as a financial manager for a community arts collective'']'
  career_goals: Prachi aims to become a Certified Public Accountant within the next two years and subsequently earn the Certified Internal Auditor (CIA) designation. She aspires to specialize in forensic
    accounting and sustainability audits, focusing on tech companies and cultural institutions where her dual interest in finance and the arts can add unique value. In the medium term, she seeks a senior
    auditor role that offers leadership of cross‑functional audit teams and the opportunity to mentor junior colleagues, leveraging her competitive drive and collaborative instincts. Ultimately, Prachi
    envisions a transition to a finance leadership position at a museum or nonprofit arts organization, where she can integrate her artistic sensibility with financial stewardship. She also plans to develop
    a niche consultancy that advises creators and cultural startups on financial compliance, risk management, and data‑driven decision‑making, balancing her ambition with a desire for purposeful work.
