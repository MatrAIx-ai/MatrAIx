  hobbies: '[''Live music concerts'', ''Hiking'', ''Pickup basketball'', ''Improv comedy'', ''Social media content creation'', ''Photography'', ''True-crime podcasts'', ''Game nights with friends'']'
  career_goals: She aims to build a dynamic career in people‑focused fields such as brand management, digital marketing, or public relations, where she can leverage her sociability and competitive drive.
    In the near term she hopes to become a social media strategist for an emerging startup or launch her own boutique event‑planning service. Long‑term she aspires to a senior marketing director role overseeing
    large‑scale campaigns and mentoring creative teams.
