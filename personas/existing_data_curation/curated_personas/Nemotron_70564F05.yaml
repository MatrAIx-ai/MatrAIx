personas:
  professional: Travis Sales is a 22‑year‑old restaurant waiter who leverages meticulous order‑taking, cash reconciliation, and food‑safety expertise to keep busy Texan dining rooms running smoothly, and
    they demonstrate calm conflict resolution and proactive shift‑scheduling that reflect their routine‑driven, low‑stress demeanor.
  sports: Travis Sales is an avid Dallas Cowboys supporter who watches every NFL game with friends, runs three miles around Oak Point Park each morning, attends the Plano YMCA CrossFit class twice a month,
    and they also follow the Dallas Mavericks during basketball season for a change of pace.
  arts: Travis Sales enjoys unwinding with acoustic guitar, methodically working through fingerstyle progressions of artists like Andy McKee and Tommy Emmanuel, while devouring mystery novels by Agatha
    Christie and Gillian Flynn, and they occasionally catch live music at the Plano Plaza Theatre.
  travel: Travis Sales prefers short, well‑planned road trips, having driven to Austin for its food‑scene and to Santa Fe for its art galleries, and they hope to visit New Orleans next summer to study its
    café culture while staying within a modest travel budget.
  culinary: Travis Sales loves grilling, often perfecting a smoky brisket rub with mesquite wood chips and a side of Texas‑style chili, and they comfortably follow recipes from the Food Network while experimenting
    with simple sides like grilled asparagus and corn on the cob.
  core: Travis Sales is a routine‑oriented hospitality pro who balances meticulous work habits with low‑stress hobbies like jogging, grilling, and football, all while quietly planning a community‑focused
    café.
background:
  cultural: Travis grew up in a middle‑class, suburban family in Plano, Texas, where the community’s blend of traditional American values and Texan hospitality shaped his outlook. His upbringing emphasized
    practicality, hard work, and courteous interaction, reinforced by participation in local high school sports events, church gatherings, and holiday celebrations such as Thanksgiving and Fourth of July
    barbecues. While his family is of European descent, his cultural identity is rooted in the broader Texan ethos of friendliness, reliability, and community service, which is reflected in both his professional
    demeanor and personal activities.
attributes:
  skills: '[''Customer service'', ''POS system operation'', ''Cash handling and reconciliation'', ''Food safety and sanitation compliance'', ''Multitasking under high volume'', ''Conflict resolution'',
