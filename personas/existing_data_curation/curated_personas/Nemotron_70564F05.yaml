  hobbies: '[''Jogging'', ''Gym workouts'', ''Watching NFL games'', ''Grilling and cooking'', ''Reading mystery novels'', ''Playing acoustic guitar'', ''Volunteering at food bank'']'
  career_goals: Travis aims to move up within the restaurant industry while maintaining a stable, routine‑driven work life. In the next 1‑2 years he plans to earn a shift‑supervisor or assistant‑manager
    role, leveraging his college coursework to assist with scheduling and inventory control. He intends to complete a Hospitality Management certificate at Collin College, positioning himself for a full
    restaurant manager position within five years. Ultimately he hopes to open a modest, family‑friendly café in Plano that emphasizes consistent service, community involvement, and a predictable daily
    schedule, allowing him to balance career growth with personal downtime.
