personas:
  professional: Charlie Jacques, a 15‑year‑old high‑school student, leverages their practical mindset and love of teamwork to serve as a peer tutor in math while captaining the football squad, turning hands‑on
    problem‑solving from model‑car builds into real‑world collaboration.
  sports: Charlie Jacques thrives on the high school football field as a wide receiver for the Tigers and competes in a community basketball league, cheering for the NFL’s Dallas Cowboys and the NBA’s Chicago
    Bulls while maintaining a personal regimen of sprint drills and weekend pickup games.
  arts: Charlie Jacques channels creative energy into lead guitar for a garage‑band that covers country artists like Luke Bryan and Chris Stapleton, while curating short DIY videos on TikTok set to tracks
    by Maren Morris, and sneaking in occasional binge‑watch sessions of classic Western movies.
  travel: Charlie Jacques enjoys family camping trips to Yellowstone National Park and weekend road trips to the Great Smoky Mountains, dreams of visiting Nashville for a country music festival, and prefers
    spontaneous getaways packed with outdoor activities over long‑haul vacations.
  culinary: Charlie Jacques favors backyard barbecues with grilled chicken and homemade coleslaw, enjoys cooking chili con carne using canned beans and fresh jalapeños, and proudly masters the art of making
    perfect s'mores over a campfire.
  core: Charlie Jacques is a structured yet social teen who blends hands‑on tinkering, sports leadership, and country‑music flair into a vibrant, slightly impulsive lifestyle.
background:
  cultural: Charlie grew up in Springtown, a small, close‑knit community in Parker County, Texas. His family’s roots trace back to German and English settlers who arrived in central Texas in the early 20th
    century, and they maintain traditions such as celebrating Oktoberfest with a local twist and gathering for Sunday barbecues. The town’s culture emphasizes community involvement—high school football
    games, church socials, and county fairs are central social events. Charlie’s family attends a Southern Baptist congregation, which reinforces values of service, responsibility, and fellowship. The surrounding
    rural landscape, with its open fields and nearby ranches, has fostered his appreciation for practical, hands‑on activities and a strong work ethic typical of the region.
