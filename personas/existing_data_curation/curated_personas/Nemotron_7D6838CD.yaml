  career_goals: Charlie aims to complete his high school education—either by catching up academically or earning a GED—and then enroll in a vocational program for automotive technology at a local community
    college. He envisions working as an automotive technician in a family‑run garage in Parker County, eventually progressing to a master technician or shop manager role. He is also drawn to the structure
    and service of law‑enforcement careers and plans to explore the Texas Highway Patrol academy after gaining more work experience. In the long term, Charlie hopes to combine his technical skills with
    his community‑focused mindset by mentoring younger teens through local youth organizations.
