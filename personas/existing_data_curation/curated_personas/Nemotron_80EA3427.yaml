  hobbies: '[''Gardening'', ''Birdwatching'', ''Reading (science, history, mystery novels)'', ''Bridge'', ''Crossword puzzles'', ''Photography (nature)'', ''Cooking (experimenting with new recipes)'', ''Volunteer
    tutoring in STEM'', ''DIY craft projects'']'
  career_goals: Although retired, Victoria aims to stay intellectually active and leave a lasting mark on her community. She plans to lead a senior gardening club that showcases low‑maintenance, sustainable
    practices, mentor high‑school students for regional science fairs, complete a memoir chronicling her experiences as a woman in early STEM fields, and maintain her physical health to preserve independence.
    Her competitive streak drives her to win the local senior bridge championship and contribute regular 'practical science' columns to the community newspaper.
