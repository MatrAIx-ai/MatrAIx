  hobbies: '[''Fly fishing'', ''Woodworking'', ''Gardening'', ''Reading historical nonfiction'', ''Genealogy research'', ''Hiking on local trails'', ''Volunteer tutoring'', ''Birdwatching'']'
  career_goals: Although retired from formal employment, Randy aims to deepen his impact on the North Anson community. He plans to expand the local literacy tutoring network he already volunteers with,
    mentor younger teachers through informal workshops, and compile a collection of oral histories from long‑time residents to preserve the town’s heritage. He also hopes to help establish a community orchard
    that blends his gardening passion with sustainable food education for local schools.
