personas:
  professional: Douglas Cyr is a seasoned heavy‑construction equipment operator with four decades of bulldozer, excavator, and grader expertise, and they now channel their methodical, safety‑first mindset
    into mentoring younger crews, designing OSHA‑compliant training modules, and launching a local equipment‑rental venture as they work toward a Certified Safety Professional credential and a memoir of
    their trade.
  sports: Douglas Cyr enjoys early‑morning bass fishing on Cherokee Lake, and they participate in a senior pick‑up baseball league, root for the Tennessee Volunteers football team and the Knoxville Smokies
    minor‑league baseball club, and maintain a low‑impact walking routine in their backyard garden to stay limber.
  arts: Douglas Cyr spends weekends photographing the Smoky Mountains at sunrise, and they craft rustic furniture inspired by folk artist Howard Finster, attend community theater productions at the Bijou
    Theatre, and listen to bluegrass legends like Doc Watson, Bill Monroe, and contemporary Appalachian singer‑songwriter Sarah Jarosz, which fuels their creative curiosity.
  travel: Douglas Cyr prefers carefully plotted road trips along the Blue Ridge Parkway, and they revisit their ancestor’s homestead in the Shenandoah Valley, and occasionally embark on pilgrimages to Dublin,
    Ireland to trace family roots, balancing a love of scenic drives with the practical need to stay within a modest travel budget.
  culinary: Douglas Cyr delights in slow‑cooked catfish and cornbread, and they often season their catch with garden‑grown dill and lemon, while experimenting with smoked pork shoulder recipes that call
    for a dash of locally sourced honey and a pinch of hot sauce, proudly serving their signature peach cobbler at community potlucks.
  core: Douglas Cyr blends a rugged construction career and a meticulous safety mindset with a restless curiosity for art, genealogy, and the outdoors, but their competitive streak and habit of over‑thinking
    sometimes turn simple pleasures into sources of stress.
background:
  cultural: Douglas grew up in a close‑knit, rural Tennessee community where Southern hospitality, church involvement, and a strong work ethic were central values. His family has deep roots in Monroe County,
    with generations of farmers and tradespeople who emphasized self‑reliance and community service. While maintaining these traditional Southern values, Douglas has cultivated an openness to new ideas,
    often exploring regional folk art, Appalachian music, and contemporary cultural events. His cultural identity blends the modest, pragmatic outlook of a long‑time Appalachian resident with a curiosity
    for artistic expression and lifelong learning.
