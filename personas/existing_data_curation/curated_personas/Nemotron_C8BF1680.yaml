  career_goals: As he approaches retirement, Douglas aims to transition into a safety consultant role, leveraging his extensive field experience to develop training programs for construction crews. He plans
    to obtain a Certified Safety Professional (CSP) credential and to start a small equipment rental venture focused on serving local contractors. Additionally, he hopes to document his career stories in
    a memoir that emphasizes the value of diligence, curiosity, and artistic appreciation in a traditionally hands‑on profession.
