personas:
  professional: Mark Moran, an emerging sales engineer specializing in hardware solutions, merges a methodical approach to structuring product demos with a relaxed attitude toward scheduling, turning complex
    specs into clear value propositions while improvising on the fly during client meetings.
  sports: Mark Moran, a weekend weight-lifting regular at CrossFit Little Rock and avid mountain-biker on the Ouachita trail system, roots for the Arkansas Razorbacks football team, follows the Arkansas
    Travelers minor-league baseball, and keeps an eye on the Memphis Grizzlies for NBA action.
  arts: Mark Moran's creative downtime is soundtracked by classic rock legends like Led Zeppelin, The Rolling Stones, and Deep Purple on a vinyl turntable, while they attend live gigs at Little Rock's White
    Water Tavern and draw inspiration from the raw energy of performers such as Jack White for their maker projects.
  travel: Mark Moran prefers spontaneous road trips to nearby spots like the Ozark National Forest and Austin's music scene, yet they budget for a future tech pilgrimage to Tokyo's Maker Faire and a cultural
    detour through Berlin's startup festivals.
  culinary: Mark Moran, an intermediate home cook, grills the fresh trout they catch on local lakes, perfects smoky BBQ ribs on the backyard grill, and rolls thin-crust pizza topped with basil, mozzarella,
    and spicy pepperoni, all while munching nachos and craft beers during marathon gaming sessions.
  core: Mark Moran is a pragmatic tinkerer who blends structured sales pitches with spontaneous gaming marathons, tends to postpone laundry for weeks, and secretly hoards vintage circuit boards like treasure.
background:
  cultural: Mark was raised in North Little Rock, Arkansas, in a middle‑class White American family with strong community ties. His upbringing reflects a blend of Southern hospitality and the pragmatic,
    down‑to‑earth values typical of the region—emphasizing hard work, self‑reliance, and modesty. He grew up participating in high‑school extracurricular activities, attending local church events, and enjoying
    weekend barbecues and community festivals. While he respects these regional traditions, he also embraces the growing tech‑focused culture of Little Rock, staying informed about emerging industries and
    the area's entrepreneurial spirit.
attributes:
  skills: '[''Technical troubleshooting'', ''Product demonstration'', ''Customer relationship management (CRM)'', ''Basic CAD modeling'', ''Data analysis'', ''Python scripting'', ''Technical writing'',
