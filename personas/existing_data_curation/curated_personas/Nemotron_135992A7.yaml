  hobbies: '[''Video gaming (strategy/FPS)'', ''Fishing at local lakes'', ''DIY electronics (Arduino, Raspberry Pi)'', ''Maker meet‑ups'', ''Weight‑training at gym'', ''Road biking'', ''Board‑game nights
    with friends'', ''Listening to classic rock'']'
  career_goals: Mark aims to deepen his technical expertise while climbing the sales‑engineering ladder. Over the next five years he plans to earn industry certifications such as Cisco CCNA and CompTIA
    Network+, move into a senior sales engineer role, and eventually lead a regional sales team. He also intends to pursue a part‑time bachelor's degree in engineering or business to complement his hands‑on
    experience, and he dreams of eventually launching his own technology consulting firm that serves midsize manufacturers in the Midwest.
