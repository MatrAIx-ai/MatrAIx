personas:
  professional: Charles Benenati is a budding 4‑H enthusiast and aspiring mechanical designer who blends their curiosity about how things work with the practical, hands‑on values of their small‑town community,
    channeling their energy into collaborative projects and school‑based robotics, and they love to share ideas with peers during after‑school maker clubs.
  sports: Charles Benenati fuels their love for competition by playing forward on the Estherville Youth Basketball team, kicking midfield for the local soccer club, cheering loudly for the Iowa Hawkeyes
    football squad on Saturdays, idolizing NBA star Luka Dončić, and they keep a worn Chicago Bulls jersey in their locker.
  arts: Charles Benenati channels creative energy into drumming with the Estherville Youth Band, losing themselves in the rhythmic grooves of Imagine Dragons and the classic beats of The Beatles, while
    evenings are spent devouring sci‑fi novels like Dune and building detailed model airplanes inspired by vintage aircraft designs, and they often experiment with new drum patterns during practice.
  travel: Charles Benenati prefers road‑trip adventures with family, having camped under the stars at the Loess Hills, visited the bustling museums of Chicago and the historic streets of St Louis, and dreaming
    of a future trek to Yellowstone National Park and the rugged coasts of Banff, all planned around school breaks and a modest travel budget, and they always pack a snack of homemade apple pie for the
    journey.
  culinary: Charles Benenati enjoys the hearty comfort of corn‑bread‑baked chicken, the smoky tang of grilled trout caught during weekend fishing trips, and the simple pleasure of crafting cheese‑filled
    quesadillas with cheddar, while their cooking skill hovers between flipping perfect pancakes and occasionally scorching toast, and they love to finish meals with a scoop of chocolate ice cream.
  core: Charles Benenati is a socially‑charged, curiosity‑driven teen who thrives on group projects and community help, yet their laid‑back approach to planning often leaves a backpack of undone chores
    and a half‑finished model kit on the nightstand, and they frequently forget to water their houseplants.
background:
  cultural: Charles grew up in Estherville, a small town in north‑central Iowa with deep agricultural roots. His family belongs to a close‑knit community that values hard work, modesty, and mutual assistance,
    often centered around local churches and school events. He frequently attends county fairs, community potlucks, and volunteer youth programs that reinforce a sense of collective responsibility. The
    Midwestern ethos of practicality paired with a strong emphasis on neighborly compassion shapes his worldview, while his white, rural heritage provides a cultural backdrop of traditional family gatherings,
    respect for the land, and a straightforward, down‑to‑earth lifestyle.
