  career_goals: Charles aspires to a career that blends his love for science, hands‑on problem solving, and helping others. He dreams of becoming a veterinarian or an emergency medical technician, allowing
    him to care for both animals and people in his rural community. In the meantime, he plans to deepen his high‑school studies in biology and technical trades, while continuing to volunteer with local
    youth programs. Long‑term, he hopes to either run a family‑owned farm that incorporates sustainable practices and community outreach, or work in a health‑related field where he can use his compassion
    and practical skills to improve the well‑being of his neighbors.
