  career_goals: Ashley aims to advance to a fire captain position within the next five years, with the long‑term objective of becoming a battalion chief. She plans to leverage her curiosity for new firefighting
    technologies to lead department initiatives that incorporate drone surveillance, smart‑sensor fire detection, and advanced ventilation techniques. Additionally, she intends to complete a bachelor’s
    degree in fire administration or emergency services management, develop comprehensive community fire‑prevention programs, and mentor incoming firefighters, fostering a culture of both innovation and
    reliability.
