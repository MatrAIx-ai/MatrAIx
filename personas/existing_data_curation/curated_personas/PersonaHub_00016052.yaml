persona_description: A preservation planning professional who has a background in organizational management and has expertise in the field of document conservation. They are responsible for creating and
  implementing preservation plans for institutions, ensuring that the needs and resources are allocated effectively to prevent and mitigate damage to collections. This individual is skilled in working with
  a range of staff members, including senior management, to develop a comprehensive preservation plan that is well thought out and aligned with the institution's goals. They are also adept at managing staffing
  and budgeting for preservation activities, and are skilled in summarizing preservation needs and writing preservation plans. This professional is knowledgeable about the factors that cause or accelerate
  the deterioration of collections and has the ability to develop strategies to prevent or mitigate damage.
