    trend awareness'', ''Negotiation and conflict resolution'', ''Project management and time management'', ''Financial modeling for mortgage and investment scenarios'']'
  hobbies: '[''Visiting art galleries and museums'', ''Architectural photography'', ''Hiking and bird‑watching on the Natchez Trace'', ''Gardening native Tennessee plants'', ''Playing chess at the community
    center'', ''Reading non‑fiction (science, philosophy, technology)'', ''Experimenting with cooking Southern comfort food'', ''Volunteering with Habitat for Humanity'', ''Participating in a small interdisciplinary
    book club'', ''Listening to classic rock and jazz'']'
  career_goals: 'As he approaches the next phase of his career, Mark aims to deepen his expertise while leaving a lasting imprint on the Murfreesboro real‑estate community. He plans to obtain the Certified
    Residential Specialist (CRS) and Accredited Land Consultant (ALC) designations within the next two years, and to launch a boutique division of his brokerage that focuses on historic preservation and
    eco‑friendly homes, blending his love of art with sustainable design. Mark also intends to mentor emerging agents through a structured training program that emphasizes data‑driven decision‑making and
    client‑centric service. He is drafting a guidebook titled ''The Artful Home: Integrating Aesthetics and Data in Real Estate'' to share his unique approach. Serving on the Murfreesboro Historic Preservation
    Commission and hosting quarterly workshops on emerging real‑estate technologies are additional milestones. Ultimately, he seeks a balanced portfolio that secures a comfortable retirement while maintaining
    an active, influential presence in the local market.'
