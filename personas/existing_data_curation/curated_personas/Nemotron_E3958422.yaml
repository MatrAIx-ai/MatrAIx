personas:
  professional: Mark Kirby is a veteran real‑estate broker in central Tennessee who blends data‑driven market analysis, GIS mapping, and architecturally‑inspired staging aesthetics to close deals, while
    their meticulous, methodical nature and reserved demeanor help them navigate negotiations with calm precision, even as they quietly worry about market volatility.
  sports: Mark Kirby enjoys weekend hikes along the Natchez Trace and bird‑watching at state parks, is a seasonally active member of the Murfreesboro Trail Runners and the local tennis club, and follows
    the Tennessee Titans, Nashville Predators, and Vanderbilt Commodores, approaching fitness with a carefully scheduled routine that balances outdoor activity with occasional gym sessions.
  arts: Mark Kirby regularly visits art galleries and historic home exhibits, photographing architectural details while drawing inspiration from artists like Georgia O'Keeffe and Andy Warhol, and they unwind
    to classic rock from The Allman Brothers Band and jazz by Miles Davis, weaving these influences into their staging style and personal aesthetic.
  travel: Mark Kirby favors meticulously planned short trips that blend cultural immersion and nature, having explored Asheville’s art scene, Savannah’s historic squares, and Paris’s Musée d’Orsay, while
    they dream of hiking in Sedona’s red rocks and strolling Kyoto’s temples, always balancing adventure with family obligations and a prudent travel budget.
  culinary: Mark Kirby enjoys cooking seasonal regional comfort dishes with a modern twist—such as smoked brisket with a coffee rub, jalapeno honey‑butter biscuits, and shrimp and grits brightened by lemon
    zest—using fresh heirloom tomatoes, sweet potatoes, and a splash of bourbon, and they often seek out farm‑to‑table restaurants for inspiration while occasionally over‑seasoning in the pursuit of bold
    flavor.
  core: Mark Kirby is a methodical, curiosity‑driven real‑estate veteran who blends artful aesthetics with data, worries quietly about market shifts, indulges in occasional bourbon splurges, and finds solace
    in solitary hikes and chess matches, while they constantly balance community service with personal ambition.
background:
  cultural: Mark was raised in a middle‑class Anglo‑American family in central Tennessee, where traditional Southern values of hospitality, community service, and a strong work ethic were emphasized. His
    parents, both educators, encouraged academic achievement, leading him to earn a STEM degree at the University of Tennessee. While he cherishes regional customs—enjoying BBQ, biscuits, and country‑rock
    music—he also seeks diverse cultural experiences, such as art exhibitions, contemporary literature, and technology‑focused seminars. His marriage and active involvement in local civic groups, including
    the historic preservation board and Habitat for Humanity, reflect a deep commitment to family and community. This blend of Southern heritage and an inquisitive, open‑minded outlook shapes his personal
    and professional identity.
