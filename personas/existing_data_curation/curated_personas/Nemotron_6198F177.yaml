personas:
  professional: Si Kwok is an aspiring game developer who designs simple computer games using logic puzzles for inspiration, they follow a structured coding schedule that balances school assignments and
    extracurricular volunteer work.
  sports: Si Kwok is a member of the middle‑school soccer team who enjoys the routine of three weekly practices, they also follow Manchester United in the Premier League, cheer for the local youth basketball
    club, and schedule weekend bike rides with friends.
  arts: Si Kwok is a dedicated calligrapher and piano player who admires Lang Lang’s performances and reads mystery novels by Agatha Christie, they often merge music and visual art in homemade shows and
    attend community cultural festivals.
  travel: Si Kwok is a curious traveller who prefers family‑oriented trips to nearby historic towns, they have visited the Great Wall on a school excursion and dream of exploring Kyoto’s temples while balancing
    adventure with parental guidance and budgeting constraints.
  culinary: Si Kwok is an enthusiastic home chef who loves preparing dumplings and stir‑fried noodles with their family, they favor ingredients like ginger, soy sauce, and tofu, and apply the same meticulous
    precision from calligraphy to plating each dish.
  core: Si Kwok is a methodical teen who blends a love for puzzles, music, and cooking into a disciplined, harmony‑seeking lifestyle, occasionally hoarding extra pens and staying up late perfecting a game
    prototype.
background:
  cultural: Si Fe is a second-generation East Asian American whose family originates from Guangdong, China. Growing up in Montgomery, Alabama, she blends the Confucian-inspired values of education, family
