personas:
  professional: Selena Ivester, an 18‑year‑old aspiring horticulture student, blends hands‑on garden work and digital storytelling to volunteer at the local farm while documenting plant growth for a community‑college
    application, showing curiosity and practicality in equal measure.
  sports: Selena Ivester enjoys gentle yoga, weekend bird‑watching hikes on the Ozark trails, and cheering on the Arkansas Razorbacks football team while belonging to the Clinton Trail Riders club, preferring
    low‑impact exercise over organized league sports.
  arts: Selena Ivester finds inspiration in Tolkien’s fantasy worlds, knits scarves while listening to Taylor Swift and Mumford & Sons, and visits the local community theater for live folk music nights,
    letting music and storytelling shape her leisure hours.
  travel: Selena Ivester favors spontaneous road trips to nearby gems like Hot Springs National Park and the Great Smoky Mountains, dreams of a summer festival in New Orleans, and plans most getaways on
    a shoestring budget with her friends from the church youth group.
  culinary: Selena Ivester loves cooking with garden harvests, often preparing herb‑roasted tomatoes, buttery biscuits, and cinnamon‑sugar cookies, while expertly canning strawberry jam and experimenting
    with seasoning blends, though they sometimes burn the edges of the cookies when distracted.
  core: Selena Ivester is a quiet, nature‑loving teen who talks to her plants, misplaces knitting needles in the garden, and balances a love of old‑world recipes with a modern, DIY spirit.
background:
  cultural: Selena was raised in Clinton, a small town in Conway County, Arkansas, within a predominantly white, Southern community that values hospitality, self‑reliance, and close family ties. Her family
    attends a local Baptist church, where community service and seasonal celebrations such as the county fair and church picnics are central. Southern culinary traditions—home‑cooked meals, baking pies,
    and preserving seasonal produce—have shaped her appreciation for food and garden produce. At the same time, exposure to online media and school friends has introduced contemporary pop culture, giving
    her a blend of rural customs and modern youth influences.
attributes:
  skills: '[''Gardening'', ''Basic animal care'', ''Home cooking'', ''Digital literacy (email, social media, photo editing)'', ''Knitting/Crocheting'', ''Basic first aid'', ''Small-group event coordination'']'
  hobbies: '[''Reading (fantasy, nature)'', ''Hiking and nature walks'', ''Gardening'', ''Birdwatching'', ''Baking and preserving'', ''Knitting and crocheting'', ''Photography'', ''Listening to podcasts'',
    ''Yoga'']'
  career_goals: Eager to build a stable future while preserving her love of nature, Selena plans to finish her GED this year and enroll in a community‑college program focused on horticulture or veterinary
    assisting. Her medium‑term goal is to work part‑time at a local farm or animal clinic, gaining experience that could lead to a career in sustainable agriculture or animal care. She also dreams of turning
    her knitting and homemade preserves into a modest side business sold at the county fair, and hopes to volunteer in community health outreach programs to combine her caring nature with practical service.
