personas:
  professional: Donald Chowdhury leverages his knack for troubleshooting hardware and his collaborative spirit to lead community tech workshops while juggling his role as a DJ for local events, balancing
    his competitive drive with a pragmatic approach to problem‑solving and a clear vision of moving into junior project‑management after college.
  sports: Donald Chowdhury shoots hoops for the Alameda Community League, follows the Golden State Warriors with fervor, and cycles with the Bay Area Cyclists Club in the spring, combining his love for
    fast‑paced basketball with disciplined fitness routines that keep his competitive edge sharp.
  arts: Donald Chowdhury spins tracks from DJ Premier and Kaytranada at youth‑center events, hones his hip‑hop moves to the choreography of the Jabbawockeez, and draws creative inspiration from the street
    art of Banksy and the visual storytelling of Marvel’s Spider‑Man movies.
  travel: Donald Chowdhury has explored the tech hubs of San Francisco and Austin, day‑tripped to the serene redwoods of Muir Woods, and dreams of attending the electronic music festival in Berlin and the
    cultural Diwali celebrations in London after graduation.
  culinary: Donald Chowdhury enjoys cooking fusion dishes like spicy chicken tikka tacos topped with cilantro and lime, whipping up buttery ramen with miso paste, and regularly ordering pepperoni pizza
    with extra jalapeños, showcasing his moderate kitchen skills and love for bold flavors.
  core: Donald Chowdhury is a socially‑charged tech enthusiast whose competitive drive fuels both his community projects and his restless quest for self‑improvement, even as he wrestles with frequent worry
    and occasional sleepless nights.
background:
  cultural: Donald is a Black American with Bangladeshi heritage, reflecting a blend of African‑American and South‑Asian cultural influences. Raised in Alameda, California, he grew up in a multilingual
    household where English was the primary language, but he also heard Bengali at family gatherings and celebrated traditions such as Eid and Juneteenth. His family’s cuisine mixes soul food staples like
    collard greens and mac & cheese with dishes like biryani and samosas, providing him with a diverse palate. The multicultural environment of the Bay Area, combined with his parents’ emphasis on education
    and community service, has shaped Donald’s values of resilience, communal responsibility, and appreciation for both his Afro‑American roots and South‑Asian lineage.
attributes:
  skills: '["Effective verbal communication", "Team collaboration", "Basic Python programming", "Computer hardware troubleshooting", "Event planning and coordination", "Leadership in group settings", "Strategic
