  hobbies: '["Basketball (recreational league)", "Hip-hop dancing", "DJing and music production", "Team-based online gaming", "Building and upgrading PCs", "Volunteering at the local youth center (tech
    workshops)", "Attending African-American and South-Asian cultural festivals", "Mindfulness meditation"]'
  career_goals: Donald aims to enroll in a community college to earn an associate degree in Computer Science or Information Technology, with the long‑term goal of securing an entry‑level software development
    or IT support position. He is motivated to apply his technical skills in a real‑world setting while also giving back to his community by mentoring other youth interested in technology. Over the next
    five years, he envisions moving into a junior project‑management role where he can blend his organizational strengths, curiosity for new solutions, and competitive drive to lead innovative projects.
