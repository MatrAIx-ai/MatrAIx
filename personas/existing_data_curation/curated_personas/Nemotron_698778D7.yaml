  hobbies: '[''Gardening'', ''Reading mystery novels'', ''Crocheting'', ''Home cooking'', ''Walking nature trails'', ''Journaling'', ''Volunteer soup kitchen work'']'
  career_goals: Ricki aims to advance to a supervisory or shift‑lead position where she can mentor newer operators and help shape safety and quality procedures. She plans to acquire certifications in industrial
    maintenance and automation to broaden her technical skill set. A key personal goal is to secure a more predictable day‑shift schedule that reduces her anxiety and provides a stable routine for her family
    life. Long‑term, she envisions transitioning into a maintenance‑technician role that combines her hands‑on experience with deeper troubleshooting responsibilities, while continuing to support her household
    and community.
