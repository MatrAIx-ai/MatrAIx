personas:
  professional: Jerita Sandulli is an aspiring medical laboratory technician who blends a solid foundation in biology and information technology with meticulous data analysis skills, leveraging their methodical
    nature and competitive drive to excel in PCR workflows, Excel data tracking, and Python automation while consistently delivering precise lab reports.
  sports: Jerita Sandulli enjoys solitary fitness pursuits such as hiking the rural trails of Medina County with the local Trailblazers Hiking Club and training for 5K runs through the Medina Community
    Center’s running group, while cheering on the Cleveland Browns and Cleveland Cavaliers during the NFL and NBA seasons, preferring methodical cardio over team sports.
  arts: Jerita Sandulli finds solace in the ambient compositions of Brian Eno and the lyrical storytelling of Sufjan Stevens, regularly attends performances at the Austin Opera, and draws photographic inspiration
    from Ansel Adams and the minimalist aesthetic of Henri Cartier‑Bresson, shaping a quiet yet discerning artistic taste.
  travel: Jerita Sandulli prefers meticulously planned trips that balance outdoor adventure with cultural immersion, having camped in Ohio’s Hocking Hills and trekked a segment of the Appalachian Trail
    near Cuyahoga Valley, while dreaming of photographing the fjords of Norway and exploring the historic streets of Kyoto, Japan, all within a student‑budget framework.
  culinary: Jerita Sandulli enjoys cooking simple science‑inspired meals like quinoa‑seeded salads with roasted chickpeas, avocado, and a lemon‑tahini dressing, occasionally experimenting with molecular
    gastronomy by spherifying fruit juices for friends, but often resorts to fast‑food pizza slices when exam deadlines loom.
  core: Jerita Sandulli is a methodical, curiosity‑driven 18‑year‑old who merges lab precision with solitary hikes, precise budgeting, and data‑driven decision‑making, while occasionally neglecting dental
    floss and over‑indulging in DSLR gear.
background:
  cultural: Jerita is a white Midwestern American raised in Lodi, Ohio, a small town in Medina County. Her family’s heritage includes Italian and German ancestry, and she grew up in a household that emphasized
    self‑reliance, modesty, and the value of education. Her parents are active in the local community and attend a nearby church, while also maintaining family traditions such as Sunday Italian‑style meals
    and German Christmas cookie baking. The close‑knit, rural environment fostered her reserved nature and comfort with solitude, whereas the emphasis on academic achievement nurtured her curiosity and
    practicality. She identifies with broader Midwestern cultural values of hard work, independence, and community service, while maintaining an introspective, competitive personal outlook.
attributes:
  skills: '["Data analysis (Excel, Python)", "Laboratory techniques (PCR, gel electrophoresis, microscopy)", "Technical writing", "Project planning and tracking", "Critical thinking and troubleshooting"]'
  hobbies: '["Reading scientific non‑fiction", "Solving crosswords and Sudoku", "Coding Python scripts", "Hiking local trails with nature photography", "Journaling", "Volunteer math tutoring"]'
  career_goals: Jerita aims to complete an associate’s degree in health sciences and become a certified medical laboratory technician, with plans to later earn a bachelor’s in clinical laboratory science.
    She also intends to acquire a data‑analytics certificate to blend laboratory work with data interpretation. Her short‑term goal is to secure an internship in a hospital or research lab in Ohio, where
    she can apply her analytical skills and gain real‑world experience. Long‑term, she aspires to specialize in molecular diagnostics, lead a small team of technicians, and eventually move into supervisory
    or quality‑assurance roles. She is driven to build a stable technical career that contributes to community health while offering opportunities for continued learning and advancement.
