personas:
  professional: A teen tech enthusiast, Shed Dozier blends a love for science‑fiction with hands‑on engineering, designing Arduino‑controlled model rockets and mastering strategy video games while maintaining
    a rigorously organized approach that mirrors a budding engineer's mindset.
  sports: A disciplined basketball player, Shed Dozier practices solo shooting drills at the community center, joins occasional five‑on‑five scrimmages with the local youth club, roots for the Los Angeles
    Lakers, and applies his competitive edge from chess to dominate the paint during games.
  arts: An avid collector of vinyl, Shed Dozier curates a growing shelf of classic R&B and contemporary hip‑hop, featuring Kendrick Lamar, Anderson Paak, and SZA, while his evenings are often spent immersed
    in sci‑fi novels by Isaac Asimov and reading graphic novels like Saga, all of which fuel his creative journal entries.
  travel: A methodical planner, Shed Dozier has explored nearby state parks and visited the Kennedy Space Center, dreams of a tech‑focused trip to Tokyo’s Akihabara district, and prefers budget‑friendly
    road trips with a detailed itinerary, balancing his love for discovery with the constraints of a teenager’s allowance.
  culinary: A pragmatic eater, Shed Dozier favors pepperoni pizza and spicy ramen but enjoys experimenting by crafting his own sriracha‑infused popcorn and assembling quick, protein‑rich wraps, though his
    cooking skill remains at a beginner level, often relying on microwave hacks between study sessions.
  core: Shed Dozier is a 14‑year‑old curiosity‑driven strategist who balances disciplined routines with a competitive edge, turning sci‑fi dreams into Arduino projects while meticulously budgeting his allowance
    and mastering solo basketball drills.
background:
  cultural: Shed grew up in a close‑knit Black family in Danville, Illinois, where community and church have been central pillars. He is influenced by the Midwest’s blend of small‑town values and the broader
    cultural heritage of African‑American music, storytelling, and resilience. Family gatherings often feature soulful music and shared meals, reinforcing a sense of identity and communal support. Local
    mentors at the library and community center provide academic encouragement, while neighborhood basketball courts serve as a social hub. This cultural environment nurtures his disciplined work ethic,
    competitive spirit, and appreciation for both individual achievement and community ties.
attributes:
  skills: '["analytical problem solving", "basic programming (Python, Scratch)", "project planning and organization", "mechanical tinkering", "strategic thinking (basketball, chess)", "basic video editing"]'
  hobbies: '["reading sci-fi novels", "building model rockets", "Arduino/DIY electronics projects", "strategy video games", "chess", "basketball drills", "collecting vinyl records", "journal writing"]'
  career_goals: Shed aims to graduate high school with a strong GPA and pursue a technical degree in engineering, preferably mechanical or computer engineering. He dreams of designing innovative robotics
    or sustainable technology solutions, perhaps starting his own tech venture. In the short term, he wants to secure a mentorship in a local STEM program, earn certifications in coding, and compete in
    a regional robotics competition. He also hopes to earn a scholarship to a university where he can continue his disciplined approach to learning.
