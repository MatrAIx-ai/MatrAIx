  hobbies: '[''reading adventure and animal books'', ''drawing/sketching wildlife'', ''building LEGO models'', ''exploring nature trails and collecting rocks/leaves'', ''playing educational video games'',
    ''doing simple science experiments'', ''caring for a pet hamster'', ''solving puzzles'', ''listening to calming music'', ''writing diary entries and short stories'']'
  career_goals: Olga dreams of becoming a wildlife biologist or veterinarian who works with animals in natural settings. She is fascinated by how animals live and hopes to help them stay healthy, while
    also conducting practical field research that lets her explore nature and solve real‑world problems. She also imagines herself designing educational games or interactive science displays that make learning
    fun for other kids, combining her curiosity with a practical desire to teach. Even though she feels anxious in large crowds, she hopes to work in small, supportive teams or in a lab environment where
    she can focus on hands‑on projects.
