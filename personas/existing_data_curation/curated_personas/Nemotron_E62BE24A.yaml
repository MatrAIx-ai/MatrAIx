personas:
  professional: Olga Kerchner, an imaginative 8‑year‑old, channels curiosity and practicality into school science fairs by building functional LEGO habitats and crafting detailed bird sketches that impress
    teachers, while they take a relaxed approach to deadlines that sometimes leads to last‑minute rushes.
  sports: Olga Kerchner, an avid nature‑trail explorer, also participates in the neighborhood’s after‑school soccer program with the Oakwood Tigers and attends a weekend kids’ gymnastics class, though they
    often forget gear and end up sitting out.
  arts: Olga Kerchner, a budding illustrator, spends afternoons sketching detailed birds inspired by John James Audubon and reading Beatrix Potter tales while listening to Yiruma’s piano pieces, and they
    occasionally lose track of time and miss dinner because they become absorbed in drawing.
  travel: Olga Kerchner, who loves exploring local forest paths and collecting rocks, has visited Yellowstone National Park with family and dreams of trekking the Galápagos Islands, preferring meticulously
    planned day trips over spontaneous vacations, yet they often forget to pack a snack.
  culinary: Olga Kerchner, who enjoys simple comfort foods like peanut butter‑jelly sandwiches, homemade spaghetti with marinara, and fruit salads featuring strawberries and blueberries, often helps in
    the kitchen by arranging colorful veggie sticks, though they sometimes over‑season dishes with too much ketchup.
  core: Olga Kerchner, an inquisitive yet easily anxious 8‑year‑old, blends a love for nature, LEGO engineering, and sketching with a habit of last‑minute rushes and occasional over‑indulgence in sugary
    snacks, and they often seek comfort in calming music.
background:
  cultural: Olga grows up in a middle‑class white family in Jonesboro, Arkansas, where Southern hospitality and close‑knit community values are a daily presence. Her family participates in local traditions
    such as community picnics, church gatherings, and school events that emphasize politeness, modesty, and helping neighbors. The region’s love for the outdoors—fishing, hiking, and backyard gardening—shapes
    her appreciation for nature and hands‑on activities. While she enjoys the comforts of a small‑town environment, she also has access to modern technology through school and home, giving her a blend of
    traditional Southern upbringing and contemporary digital influences.
attributes:
  skills: '[''reading chapter books'', ''handwriting'', ''basic arithmetic'', ''drawing animals and nature'', ''storytelling'', ''LEGO building'', ''simple science experiment setup'', ''basic tablet navigation'',
