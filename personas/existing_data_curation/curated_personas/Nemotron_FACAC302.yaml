  hobbies: '["backyard gardening (tomatoes, jalapeños, herbs)", "preparing traditional Mexican cuisine", "fishing at local lakes", "woodworking small furniture projects", "reading historical biographies
    and classic novels", "watching classic 1950s/1960s films", "listening to mariachi and ranchera music", "playing bridge with a small group of friends", "participating in parish cultural celebrations"]'
  career_goals: Although retired, Darrius aims to maintain his health and independence by adhering to a daily routine of light exercise, gardening, and nutritious meals. He is devoted to passing on his
    cultural heritage, so he plans to record family recipes and stories for his grandchildren and to teach a small cooking class at the local cultural center. He also hopes to expand his volunteer work,
    offering occasional translation services for community events and assisting the senior center with technology workshops. Additionally, he aspires to learn how to use a smartphone for video calls with
    relatives in Mexico, ensuring he stays connected across generations.
