personas:
  professional: Darrius Sanchez, a retired automotive repair and small‑scale construction veteran, leverages four decades of hands‑on troubleshooting, carpentry, and electrical maintenance to volunteer
    as a trusted technician at the senior center, where their preference for structured routines balances a relaxed, flexible approach to occasional unexpected repairs.
  sports: Darrius Sanchez enjoys early‑morning fishing at Lake Conroe, follows the Texas Rangers and Dallas Cowboys for seasonal excitement, participates in a senior center bridge club that doubles as a
    low‑impact social exercise, and maintains light fitness through weekly walks and occasional woodworking sessions that keep their hands limber.
  arts: Darrius Sanchez, a fan of classic cinema, regularly watches films starring James Stewart, Audrey Hepburn, and Cary Grant, listens to mariachi and ranchera legends like Vicente Fernández and Pedro
    Infante, and treasures American folk art prints that adorn the living room wall, often discussing the storytelling aspects with bridge teammates.
  travel: Darrius Sanchez prefers low‑key road trips, having explored the historic towns of Santa Fe, New Mexico and the coastal charm of Savannah, Georgia, while dreaming of a pilgrimage to the Day of
    the Dead celebrations in Oaxaca, yet limits travel plans to short stays due to health considerations and a modest travel budget.
  culinary: Darrius Sanchez, an adept home cook, expertly prepares dishes like pozole with hominy, tender chicken tamales wrapped in corn husks, and fresh salsa verde using tomatoes, jalapeños, and cilantro,
    while experimenting with new herb blends and occasionally over‑salting the stew, which they correct with a splash of lime.
  core: Darrius Sanchez blends a lifetime of practical trades with a quiet, structured rhythm, savoring garden harvests, hand‑crafted meals, and modest community service despite a habit of misplacing small
    tools and occasional forgetfulness.
background:
  cultural: Darrius is a second‑generation Mexican‑American whose parents immigrated to the United States in the 1950s. He grew up speaking Spanish at home and English at school, maintaining a deep connection
    to Mexican traditions such as Día de los Muertos, quinceañeras, and weekly family meals centered around homemade tamales and pozole. Living in Niles, MI, he is part of a tight‑knit Hispanic community
    that celebrates cultural festivals and supports one another through church and community events. His Mexican heritage informs his culinary skills, storytelling, and the value he places on family cohesion,
    respect, and community service.
attributes:
  skills: '["automotive maintenance", "basic carpentry", "electrical troubleshooting", "Spanish‑English bilingual communication", "budgeting and household finance management", "home gardening", "traditional
