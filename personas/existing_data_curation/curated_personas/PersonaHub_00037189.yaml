persona_description: A researcher and scientist who studies the interactions and dynamics of social networks in wildlife populations, particularly focusing on the role of social structure in disease transmission.
  They are interested in the implications of social disruption on disease spread and are seeking ways to maintain stability in social networks while managing wildlife populations for disease control. They
  are likely to be interested in the findings of the study mentioned in the text, which suggests that badger management is most effective when it maintains stability and does not disrupt social networks,
  and that vaccination does not disturb social structure. They are also likely to be interested in the implications of their findings for disease control and management strategies in wildlife populations.
