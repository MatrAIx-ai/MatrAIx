  hobbies: '[''Watercolor painting'', ''Reading speculative fiction and poetry'', ''Birdwatching'', ''Native plant gardening'', ''Knitting and quilting'', ''Small book club participation'', ''Astrophotography'',
    ''Cooking seasonal meals'']'
  career_goals: Joy aspires to compile her poetry and short stories into a self‑published anthology that reflects her fascination with abstract concepts. She hopes to organize a monthly art‑and‑storytelling
    circle in Pine Grove, bringing together seniors and teens to share creative works and foster intergenerational connection. Another goal is to help establish a community garden that serves as a peaceful
    gathering space and a venue for workshops on native horticulture. Joy plans to volunteer as a reading mentor at the local library, offering one‑on‑one support for adults seeking literacy improvement.
    She is also interested in pursuing a certificate in counseling or gerontology to formalize her supportive role within her family and community. Additionally, she wishes to travel to culturally rich
    regions such as the Hudson River Valley and historic New England towns to draw artistic inspiration and bring back new ideas for local projects.
