  hobbies: '[''Fishing'', ''Hiking'', ''Woodworking'', ''Playing acoustic guitar'', ''Community theater'', ''Gardening'', ''Reading historical novels'', ''Listening to classic country and bluegrass music'',
    ''Attending church potluck events'']'
  career_goals: Although retired, Justin aims to remain active in his community by volunteering as agenda coordinator for the Jefferson County council, mentoring young craftsmen through a local apprenticeship
    program, and possibly publishing a memoir about life in rural Tennessee. He also wants to maintain his health, travel with his wife to historic sites across the United States, and ensure his family's
    financial security.
