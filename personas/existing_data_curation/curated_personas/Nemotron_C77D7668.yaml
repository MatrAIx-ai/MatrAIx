  career_goals: Although only six, Ivette often imagines future roles where she can combine her love for art, organization, and helping others. She dreams of becoming a painter who tells stories with vivid
    pictures, a teacher who guides children in learning, or a scientist who explores the natural world. She sets small, concrete goals—such as mastering new letters each week, completing a drawing for a
    school art show, and keeping her personal space orderly—as stepping stones toward these larger ambitions.
