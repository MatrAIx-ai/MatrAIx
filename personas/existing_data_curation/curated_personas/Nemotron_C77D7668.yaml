personas:
  professional: Ivette Barrios is a budding junior artist who spends hours drawing and coloring, using their exceptionally organized approach to keep sketchbooks meticulously labeled and always aiming for
    perfect lines, while their quiet, solitary nature lets them dive deep into imaginative worlds.
  sports: Ivette Barrios delights in outdoor play at the neighborhood park, joining a Saturday morning mini‑soccer league with the Little Strikers club and cheering for the city’s professional baseball
    team, the City Rangers, while preferring structured warm‑ups that match their love for organization.
  arts: Ivette Barrios is an enthusiastic young creator who devours picture books illustrated by Oliver Jeffers, mimics the soft pastel style of Studio Ghibli films, and hums tunes from Pixar movie soundtracks,
    weaving these influences into elaborate paper crafts and colored sketches.
  travel: Ivette Barrios loves day trips to the local botanical garden and weekend family outings to the coast, dreaming of a future adventure to the Grand Canyon while savoring the excitement of packing
    their own tiny backpack with crayons and a map.
  culinary: Ivette Barrios enjoys crunchy carrot sticks, warm grilled cheese sandwiches with cheddar and a dash of paprika, and sweet strawberry yogurt, often attempting to stir batter for banana pancakes,
    yet they sometimes spill milk in their eagerness to serve the family dinner.
  core: Ivette Barrios is a meticulous, imaginative six‑year‑old who balances quiet artistic exploration with a careful eye for organization, a gentle anxiety about new experiences, and a penchant for spilling
    milk during enthusiastic cooking attempts.
background:
  cultural: Ivette is raised in a Mexican‑American household in Rancho Cucamonga, California. Spanish is spoken at home, and she participates in family traditions such as creating Día de los Muertos altars,
    making tamales, and celebrating Mexican Independence Day. Her parents emphasize community, respect, and harmony, and she attends a bilingual elementary program that weaves Mexican cultural stories,
    music, and values into the curriculum, fostering a strong sense of heritage and bilingual identity.
