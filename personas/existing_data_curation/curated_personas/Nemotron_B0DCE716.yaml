personas:
  professional: An early builder of block towers who loves arranging colorful cubes into perfect rows, Jessie Miles shows a budding curiosity for how things fit together while also experimenting with new
    shapes, and they demonstrate a practical side by neatly sorting pieces after play, hinting at a future path in engineering or design.
  sports: A splash‑loving toddler who attends baby swim lessons with the local Puddle Ducks water club and participates in a weekend toddler gymnastics class, Jessie Miles delights in chasing floating toys
    and wobbling on a soft mat, and they balance energetic bursts with quiet moments of observation, reflecting their mix of social interaction and need for alone time.
  arts: A bright‑eyed explorer of nursery rhymes and simple melodies, Jessie Miles giggles to The Wiggles and Sesame Street, and they often reach for a crayon to scribble vivid circles, combining structured
    coloring books with spontaneous doodles, which satisfies both their organized and flexible creative instincts.
  travel: A stroller‑bound adventurer who loves short road trips to the city zoo and sunny days at the nearby beach in Florida, Jessie Miles enjoys the rhythmic hum of the car and the chance to explore
    sandcastles, and they eagerly point at new sights while occasionally demanding a nap break, reflecting a balanced love for exploration and comfort.
  culinary: A budding foodie with a sweet spot for mashed bananas, applesauce, and avocado toast, Jessie Miles happily spreads avocado on soft bread but firmly rejects peas, and they occasionally surprise
    caregivers by reaching for a dash of cinnamon, hinting at an early adventurous palate tempered by typical toddler picky eating.
  core: A one‑year‑old who blends boundless curiosity with gentle practicality, Jessie Miles explores the world through organized block play and spontaneous babble, and they often hum familiar lullabies
    before drifting to sleep, balancing talkative bursts with quiet moments.
background:
  cultural: Jessie is raised in a Black Southern family in Picayune, Mississippi. Her cultural environment blends the rich traditions of African‑American heritage—such as gospel and blues music, church
    gatherings, communal meals featuring Southern comfort foods, and storytelling—with the close‑knit community life of a small town. Family elders emphasize respect, resilience, and mutual support, while
    local celebrations like Juneteenth and church potlucks provide a sense of belonging and cultural pride.
