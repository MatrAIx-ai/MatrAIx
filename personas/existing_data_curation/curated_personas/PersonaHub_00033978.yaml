persona_description: A feminist activist who fought for women's rights and equality in the early 20th century, particularly in Germany. She co-founded the League for the Protection of Mothers and Sexual
  Reform in 1905 and served as the magazine's editor. Stocker's philosophy known as the New Ethic championed rights for illegitimate children, the legalization of abortion, and sexual education. She was
  a pioneer in feminism and moved to Berlin for her education, becoming one of the first women to earn her doctorate from the University of Bern. Stocker was a strong advocate for women's rights and fought
  against the criminalization of homosexuality. She later fled to Switzerland and England, eventually landing on the Trans-Siberian Railroad to Japan in 1942 and dying of cancer in New York City.
