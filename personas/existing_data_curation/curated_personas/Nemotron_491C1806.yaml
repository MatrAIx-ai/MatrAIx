personas:
  professional: Felix Lopez, a retired grocery‑store owner turned community mentor, blends decades of small‑business financial planning with a relaxed, artistic mindset to guide budding entrepreneurs through
    hands‑on workshops that weave storytelling and abstract visual concepts into practical advice.
  sports: Felix Lopez enjoys low‑impact fitness, joining a local walking club that meets at Prospect Park on Saturdays, and occasionally watches the New York Knicks games on television, but prefers the
    calm of chess tournaments at the community center over high‑intensity sports.
  arts: Felix Lopez immerses themselves in the vibrant Brooklyn art scene, attending openings at the Brooklyn Museum's contemporary wing and listening to live performances by local saxophonist Marlon Perkins,
    while channeling their imagination into large‑scale abstract canvases inspired by the interplay of light captured during their digital photography walks.
  travel: Felix Lopez plans relaxed, culturally rich trips, favoring short train rides to historic towns like Beacon, NY, where they explore small galleries and local cafés, while dreaming of a summer visit
    to the seaside town of Santa Cruz de Tenerife to sketch coastal sunsets.
  culinary: Felix Lopez delights in cooking simple yet flavorful meals such as arroz con pollo with saffron and cilantro, enjoys the occasional pamper of a paella with fresh shellfish, and often pairs their
    meals with a glass of aged rum, savoring the sweet notes that echo their love for classic boleros.
  core: Felix Lopez is a free‑spirit senior who weaves business acumen, abstract art, and community storytelling into a laid‑back lifestyle, occasionally forgetting appointments but never missing a chance
    to share a vivid sunrise photograph.
background:
  cultural: Born in the Dominican Republic and immigrating to New York as a teenager, Felix grew up immersed in Dominican family traditions—vibrant music, flavorful cuisine, and Catholic celebrations—while
    navigating the bustling immigrant neighborhoods of Queens and Brooklyn. Spanish remains his primary language at home, and he honors holidays such as Día de los Reyes and Carnaval with community gatherings.
    His Dominican heritage influences his love for rhythmic music, communal cooking, and oral storytelling, while his decades in Woodhaven have fostered a bicultural identity that blends Caribbean warmth
    with the diverse tapestry of New York City. He proudly shares this heritage through mentorship, cultural workshops, and his artwork.
