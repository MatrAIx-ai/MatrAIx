  career_goals: Patricia dreams of combining her love for technology and her cultural heritage by becoming a robotics engineer who designs tools to help community organizations. In the near term, she aims
    to win the school science fair with a project that explores renewable energy, become captain of her soccer team, and start a bilingual mentorship club for younger students. She also envisions one day
    leading cultural events that celebrate Salvadoran traditions and inspire other kids to pursue STEM fields.
