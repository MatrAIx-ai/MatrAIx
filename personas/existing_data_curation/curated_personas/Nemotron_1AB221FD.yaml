personas:
  professional: Patricia Felton, an 11‑year‑old middle school student who channels their curiosity and competitive spirit into leading the debate club, balancing fresh ideas with proven argument structures
    while they organize meetings with the meticulousness of a budding project manager.
  sports: Patricia Felton, a dedicated after‑school soccer player for the Lilburn Lions youth team, practices trick moves on the field, idolizes Atlanta United and their star midfielder, competes in weekend
    community tournaments, and they also dabble in basketball at the local park during free afternoons.
  arts: Patricia Felton, an avid comic‑book creator and TikTok content maker, draws inspiration from graphic novelists like Alan Moore and artists such as Becky Cloonan, choreographs cumbia and reggaeton
    dance videos set to Bad Bunny tracks, and they often stay up late perfecting a frame for the next upload.
  travel: Patricia Felton, who loves weekend trips to Stone Mountain Park for hiking and photography, dreams of exploring the vibrant streets of Mexico City and the historic sites of Quito, prefers spontaneous
    day‑trips over meticulously planned vacations, and they save allowance for future travel adventures.
  culinary: Patricia Felton, who enjoys cooking pupusas with their mother on Saturday mornings, perfects the balance of masa, cheese, and loroco fillings, experiments with adding spicy salsa roja, documents
    the process in short TikTok tutorials, and they occasionally forget to clean the kitchen afterward.
  core: Patricia Felton blends a fierce competitive drive with a love for community traditions, juggling debate victories, soccer tricks, and vibrant dance videos while they sometimes battle procrastination
    and a sweet tooth.
background:
  cultural: Patricia is a second‑generation Salvadoran‑American raised in Lilburn, Georgia. She grows up in a close‑knit family where Spanish is spoken at home and English at school, making her bilingual
    and bicultural. She celebrates Salvadoran holidays such as Día de la Independencia with traditional foods, music, and community festivals hosted by the local Hispanic cultural center. Her grandparents
    share stories of El Salvador, instilling pride in her heritage and a sense of responsibility to preserve it. She attends a local Catholic church where she participates in youth outreach events, and
    she regularly joins community gatherings that showcase Salvadoran dance, crafts, and cuisine, reinforcing her connection to her roots while navigating life in a diverse suburban environment.
