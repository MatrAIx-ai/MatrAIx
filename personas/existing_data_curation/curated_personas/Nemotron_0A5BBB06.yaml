personas:
  professional: Danah Harris is an ambitious mechanical engineer in Denver who leverages advanced 3D CAD, Python data pipelines, and Agile project management to drive sustainable solar-plus-storage projects,
    and they thrive as the charismatic organizer of local engineering meetups.
  sports: Danah Harris is an avid outdoor enthusiast who spends weekends rock climbing with the Boulder Crag Club, cycles in the Denver Open Ride, roots for the Colorado Avalanche and Denver Nuggets, and
    they occasionally join community trail-run groups during the summer.
  arts: Danah Harris expresses creativity through lead roles in salsa dancing to the rhythms of Celia Cruz and Marc Anthony, while their downtime is filled with listening to Fleet Foxes, binge-watching
    Guillermo del Toro’s films, and they collect graphic novels by Junji Ito.
  travel: Danah Harris prefers spontaneous, nature-focused trips planned in their bullet-journal, having already hiked the Canadian Rockies in Banff, trekked Iceland’s black-sand beaches, and they now dream
    of a sustainable eco-tour of Patagonia’s Torres del Paine.
  culinary: Danah Harris loves experimental cooking, often whipping up quinoa-infused ramen with miso broth, lavender-roasted beet salads, and plant-based cauliflower crust pizza topped with smoked mozzarella
    and fresh basil, and they frequently experiment with sous-vide techniques to perfect texture.
  core: Danah Harris blends relentless project-driven discipline with magnetic social energy, yet they have a habit of over-booking weekend activities that sometimes forces a scramble to fit in a late-night
    yoga session.
background:
  cultural: Danah grew up in a suburban community of the American West, where a blend of libertarian independence and progressive environmental values shaped her worldview. As a white American with Midwestern
    family roots, she was raised with an emphasis on education, hard work, and community involvement. Living in Denver, she absorbed the city's outdoor-oriented lifestyle, its thriving tech ecosystem, and
    a culture that values sustainability and inclusivity. These influences manifest in her appreciation for rugged landscapes, her commitment to green engineering, and her active participation in diverse
    social circles that span from professional societies to local cultural festivals.
