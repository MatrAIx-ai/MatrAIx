  career_goals: Danah intends to leverage her curiosity for emerging sustainable technologies into a leadership track within the renewable infrastructure sector. In the next five years she aims to become
    a senior project engineer overseeing large-scale solar-plus-storage installations for the Denver metro area. She plans to earn a professional engineering license and a certification in Sustainable Design
    (LEED AP). Long-term, she aspires to head an interdisciplinary engineering team, influence city policy on resilient building standards, and become a recognized speaker at national conferences on green
    engineering. Her disciplined nature drives her to set measurable milestones, such as publishing two technical articles and obtaining a PMP certification within three years.
