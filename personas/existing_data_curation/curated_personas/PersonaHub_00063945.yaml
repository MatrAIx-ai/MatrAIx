persona_description: A Virginia Tech professor and Extension entomologist who specializes in the study of stink bugs, particularly their biology, pest management, and the challenges they pose to agriculture.
  He is working with farmers and scientists in the Mid-Atlantic states to find ways to control the bug and minimize its damage. He is also researching the impact of stink bugs on tree fruit, wine grapes,
  and berries, and assessing the potential of importing one of the bugs to manage their populations.
