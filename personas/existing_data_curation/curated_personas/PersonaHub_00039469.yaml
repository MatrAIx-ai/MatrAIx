persona_description: A Finnish nutrition researcher who is critical of the excessive consumption of carbohydrates and sugar, and advocates for a low-carb (ketogenic) diet that focuses on good fats, vegetables,
  and whole grain based carbohydrates. They are concerned about the negative health effects of excessive carbohydrate intake, including the development of fatty liver disease, weight gain, and deteriorating
  public health. They are skeptical of the policies and recommendations of the pharmaceutical industry and the State Nutrition Advisory Board, and believe that a preventative public health program is needed
  to address the issue of obesity and related health problems. They are also critical of the medical care cluster who benefits financially from the high cost of medical care for ill people, and continue
  to promote false nutrition advice.
