personas:
  professional: Gerald Mixon, a ten‑year‑old budding robotics enthusiast, channels a love of structure and competition into building simple robots for the school’s club while they meticulously document
    each design in a journal, a habit that satisfies a need for predictability and fuels a competitive edge.
  sports: Gerald Mixon dominates pickup basketball games after school, idolizing the Los Angeles Lakers and the local high‑school team, they ride a bike on the neighborhood trail club every weekend, and
    they compete fiercely in the school chess club, treating each match like a strategic sport.
  arts: Gerald Mixon immerses themselves in pop hits from Imagine Dragons and classic rock anthems by Queen, they also collect vintage baseball cards, flip through adventure novels by Rick Riordan, and
    sketch detailed superhero scenes in a weathered sketchbook, turning LEGO constructions into miniature art installations.
  travel: Gerald Mixon dreams of exploring the bustling robotics exhibition at Maker Faire in Ohio after spending summer vacations at the family’s beach cabin, while they also plan a weekend day‑trip to
    the nearby state park’s hiking trails for bike rides and nature scouting.
  culinary: Gerald Mixon favors pepperoni pizza, chicken nuggets with honey‑mustard dip, and homemade chocolate chip cookies, while experimenting with quick LEGO‑themed fruit skewers, yet they often sneak
    extra candy during gaming marathons, creating a sweet‑tooth habit that conflicts with occasional vegetable avoidance.
  core: Gerald Mixon, a ten‑year‑old who blends competitive robotics, basketball bravado, and anxious journaling, navigates childhood with a structured yet impulsive spirit and a sweet tooth that never
    quits, and they constantly balance a competitive drive with bursts of creative self‑expression.
background:
  cultural: Gerald is a white Midwestern American growing up in Three Rivers, a small city in Cass County, Michigan. Its family reflects typical regional values of hard work, modesty, and community involvement.
    He attends a public elementary school, participates in local youth sports leagues, and occasionally goes to church with his family. The local culture of fishing and biking along the St. Joseph River,
    attending the county fair, and celebrating holidays with extended relatives shapes his experiences. His ancestry includes German and Irish roots common to the area, and his family emphasizes self‑reliance
    and teamwork.
