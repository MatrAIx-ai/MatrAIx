  career_goals: Gerald dreams of becoming a firefighter because he admires the clear routines, teamwork, and direct impact of the job. He also hopes to be a star player on his middle‑school basketball team
    and wants to earn the class monitor position to practice responsibility and leadership. In the longer term, he is fascinated by building things, so he sees a possible future as a mechanical engineer
    or auto mechanic, building on his current interest in robotics and bike repair. He occasionally writes in a journal to track his feelings, hoping one day to help other kids who feel anxious.
