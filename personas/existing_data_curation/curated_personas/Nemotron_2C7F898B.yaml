personas:
  professional: Anthony Ramazani, an 8-year-old budding technologist, blends a love for LEGO engineering with early coding in Scratch and Minecraft, channeling their curiosity-practical balance and competitive
    streak into designing intricate digital builds and solving puzzles with methodical yet adaptable problem-solving, and they eagerly share their creations with friends online.
  sports: Anthony Ramazani, a member of Cub Scout Pack 101 who spends weekends hiking the trails of Prince William Forest Park, follows the Washington Capitals and Washington Commanders on TV, and participates
    in the school’s after-school soccer club, approaching fitness with a competitive edge and a love for nature-based activity, and they relish the challenge of a good sprint up a hill.
  arts: Anthony Ramazani, an avid LEGO builder and Scratch animator, draws creative inspiration from the whimsical storytelling of Disney’s Moana, the vibrant art of Hayao Miyazaki’s films, and the catchy
    beats of The LEGO Movie soundtrack by Mark Mothersbaugh, weaving these influences into their own block-based sculptures and pixel-art creations, and they often experiment with new color palettes to
    capture the mood of their favorite scenes.
  travel: Anthony Ramazani prefers weekend getaways that blend outdoor adventure with family tradition, such as camping trips to Shenandoah National Park, day visits to the National Air and Space Museum
    in Washington D.C., and occasional road trips to the Virginia State Fair, planning itineraries with a checklist of hikes, snack stops, and secret LEGO treasure hunts, and they love mapping each journey
    on a scrapbook they keep at home.
  culinary: Anthony Ramazani, a self-declared snack architect, enjoys building custom macaroni-and-cheese towers topped with cheddar, bacon bits, and a dash of paprika, can reliably microwave frozen pizza,
    and delights in weekend pizza-making sessions with their parents where they experiment with pepperoni, pineapple, and fresh basil, and they proudly serve their creations to family members who act as
    taste-test judges.
  core: Anthony Ramazani is an 8-year-old curiosity-driven LEGO strategist who balances competitive gaming with nature hikes, hoards a pink piggy bank, and sometimes forgets to wear sunscreen on sunny adventures,
    and they always plan the next build before bedtime.
background:
  cultural: Anthony is an 8‑year‑old white American raised in Nokesville, a small community in Prince William County, Virginia. He attends a local public elementary school and comes from a middle‑class
    family that values education, modest independence, and community involvement. Family traditions include observing national holidays such as Thanksgiving and the Fourth of July with communal meals and
    fireworks, as well as participating in local events like the county fair and church‑organized service projects. The rural‑suburban setting provides regular opportunities for outdoor play, hiking, and
    exploring the surrounding farmland, shaping his appreciation for nature and hands‑on learning.
