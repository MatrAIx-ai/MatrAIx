  career_goals: Anthony hopes to become a mechanical or robotics engineer who can design functional machines and solve real‑world problems. He also envisions a future as a detective or forensic scientist,
    leveraging his love for puzzles and skeptical mindset. In the short term, he aims to win his school’s science fair by presenting a self‑programmed robot, and ultimately he wants to work on projects
    that combine creativity with practical impact.
