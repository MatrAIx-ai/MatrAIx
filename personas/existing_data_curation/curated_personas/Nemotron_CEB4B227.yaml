personas:
  professional: Janice Harris is a clinical psychologist who blends evidence‑based therapies such as CBT, DBT, and EMDR with data‑driven outcome tracking and home‑automation tools, balancing their curiosity
    for tech innovation with the practical demands of client care while they assertively guide interdisciplinary teams toward culturally responsive services.
  sports: Janice Harris hits the Lakefront Trail for sunrise runs five times a week, participates in the Chicago Area Running Club’s weekend long‑distance meet‑ups, practices yoga at a local studio twice
    a week, and they cheer for the Chicago Bulls and Cubs, blending a disciplined fitness routine with spirited support for hometown teams.
  arts: Janice Harris immerses themselves in Chicago’s vibrant jazz scene, regularly attending performances by the Jazz Showcase featuring artists like Kamasi Washington and Esperanza Spalding, while also
    devouring contemporary science‑fiction novels by N.K. Jemisin and Ann Leckie, and they occasionally explore experimental theater at Steppenwolf, which together shape their creative outlook.
  travel: Janice Harris favors a mix of solo weekend getaways and curated group trips, often escaping to the rugged coast of Maine for quiet reflection, exploring the tech‑forward cafés of Tokyo to inspire
    their automation projects, and they revisit the historic jazz districts of New Orleans, all while balancing a modest travel budget and their responsibility to a growing private practice.
  culinary: Janice Harris enjoys cooking experimental dishes like miso‑glazed salmon with fermented kimchi and beet‑quinoa salads, often harvesting fresh basil and heirloom tomatoes from their balcony garden
    and experimenting with spices such as sumac and smoked paprika, while they still indulge in a perfectly brewed pour‑over espresso after yoga sessions.
  core: Janice Harris is a data‑savvy therapist who runs at dawn, programs smart home gadgets, and curates jazz playlists, yet they can’t resist a late‑night espresso and occasionally forget to water their
    balcony plants.
background:
  cultural: Janice grew up in a middle‑class suburban family on the North Side of Chicago with German‑Irish ancestry. The city’s multicultural environment shaped her inclusive worldview, and she actively
    integrates cultural competence into her therapeutic work. While her own heritage is European, she identifies strongly with Chicago’s progressive values, celebrates diverse holidays with clients, and
    participates in community events that reflect the city’s ethnic mosaic. Her upbringing emphasized education, self‑reliance, and community service, which continue to inform her professional ethos.
