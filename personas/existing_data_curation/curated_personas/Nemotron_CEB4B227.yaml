    balcony garden'']'
  career_goals: She aims to become a director of clinical services at a community mental‑health center in Chicago, overseeing program development that integrates data‑driven evaluation and tech‑enhanced
    therapy modalities. Over the next five years, Janice plans to launch a private practice specializing in anxiety and trauma for adults, author a guide on blending STEM principles with psychotherapy,
    and mentor early‑career clinicians. She is also passionate about expanding access to culturally responsive mental‑health services for underserved neighborhoods and hopes to secure grant funding to support
    community outreach initiatives.
