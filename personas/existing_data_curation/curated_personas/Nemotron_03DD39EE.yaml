  career_goals: Although not currently employed, Lorraine aims to deepen her volunteer leadership within the Sherman community. She hopes to earn a Certified Volunteer Administrator credential, lead the
    senior center’s activity committee, mentor younger volunteers, and eventually serve on the board of a local nonprofit. She also wishes to preserve her family’s traditions by documenting recipes and
    home‑management techniques for future generations, and to develop a small garden program that supplies fresh produce to the neighborhood food pantry.
