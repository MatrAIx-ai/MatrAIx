  hobbies: '["Watercolor painting", "Sketching", "Visiting art museums", "Photography", "Volunteer tutoring", "Traditional Vietnamese dance", "Anime and graphic novel clubs", "Journaling", "Baking Vietnamese
    pastries", "Coding mini‑projects"]'
  career_goals: Sophana aims to earn a scholarship to a top university where she can major in Graphic Design or Human‑Computer Interaction, blending her love of art with technology. She aspires to build
    a professional portfolio that showcases socially conscious visual storytelling and eventually work as a UX/UI designer at a forward‑thinking tech firm in the Bay Area. Long‑term, she hopes to create
    community‑focused design workshops that empower other Southeast Asian youth to explore creative careers, while maintaining high personal standards of excellence and continual learning.
