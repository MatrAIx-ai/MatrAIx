personas:
  professional: Sophana Vang, an aspiring graphic designer and future UX/UI specialist, channels meticulous planning, disciplined adherence to deadlines, and a curiosity for blending traditional motifs
    with digital interfaces into every school project and freelance commission, ensuring they deliver thoughtful, socially conscious visual stories.
  sports: Sophana Vang plays recreational badminton at the community center and follows the local soccer team, the San Jose Earthquakes, using weekend pickup games and occasional hiking trips to nearby
    redwood trails as a balanced outlet from their intensive academic schedule.
  arts: Sophana Vang engages in watercolor painting, street photography, and digital illustration, drawing inspiration from local murals, the storytelling of Hayao Miyazaki, and the bold patterns of traditional
    holiday lanterns, weaving these influences into socially conscious visual narratives.
  travel: Sophana Vang prefers meticulously planned weekend road trips to coastal towns like Monterey and cultural excursions to Kyoto’s historic temples, balancing a modest travel budget with school responsibilities
    while dreaming of exploring the art districts of Barcelona and the cherry‑blossom festivals of Washington, D.C.
  culinary: Sophana Vang enjoys baking moon‑shaped rice flour pastries and crafting aromatic pho broth at home, pairing these culinary experiments with a playlist of traditional drumming and modern lo‑fi
    beats, and demonstrates a growing confidence in balancing authentic flavors with creative twists.
  core: Sophana Vang is a disciplined, curiosity‑driven teen who melds cultural motifs with modern design, relentlessly juggling school, art, and community service while battling a habit of late‑night sketch
    marathons that sacrifice sleep.
background:
  cultural: Sophana is a second‑generation Vietnamese‑American raised in the vibrant Little Saigon community of East San Jose. Her family maintains strong cultural ties through celebrating Tet (Lunar New
    Year), shared meals of pho and bánh mì, and frequent visits to the local Buddhist temple. Fluent in both English and Vietnamese, she bridges her parents' heritage with her American upbringing, valuing
    respect for elders, community harmony, and the importance of education. These cultural roots influence her artistic sensibility, often inspiring her to incorporate traditional patterns and stories into
    modern designs, and shape her desire to give back to her community through mentorship and cultural outreach.
attributes:
  skills: '["Time management", "Project planning", "Digital illustration", "Basic Python programming", "Bilingual in English and Vietnamese", "Research and analysis", "Public speaking", "Collaborative teamwork",
