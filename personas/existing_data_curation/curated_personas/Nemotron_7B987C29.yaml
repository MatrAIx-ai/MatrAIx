  career_goals: As he approaches retirement, Saher aims to shift from direct hands-on work to a strategic advisory role that leverages his decades of experience. He plans to become a surgical services coordinator
    or quality-improvement consultant, focusing on integrating new technologies and refining workflow protocols. He also hopes to launch a community-based mentorship program for aspiring surgical technologists,
    especially veterans and adult learners returning to school. Personally, he intends to complete a series of art-history courses at a local community college, blending his artistic curiosity with his
    professional background by documenting the visual culture of surgical instruments.
