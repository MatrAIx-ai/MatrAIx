  hobbies: '[''Visiting art galleries and museums'', ''Impromptu road trips and local festivals'', ''Pick‑up basketball and walking groups'', ''Photography of urban and natural scenes'', ''Playing harmonica
    in community jam sessions'', ''Listening to podcasts on neuroscience and design'', ''Volunteering at health fairs and senior center wellness programs'']'
  career_goals: Looking ahead, Lloyd aims to transition from day‑to‑day clinic work to a part‑time mentorship and community‑outreach role. He hopes to earn a certification as a Certified Therapeutic Exercise
    Specialist and lead free wellness workshops at local senior centers, emphasizing holistic movement and creative expression. He also aspires to curate a monthly 'Art in Motion' program that combines
    simple art projects with gentle exercise for residents of Elmhurst. While retirement is on the horizon, he plans to stay connected to the field by volunteering as a trainer for new aides and by staying
    abreast of emerging rehab techniques.
