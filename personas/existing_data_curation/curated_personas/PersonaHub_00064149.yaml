persona_description: Thomas Maclear was a renowned Irish-born astronomer who made significant contributions to the field of astronomy, particularly in the areas of amateur astronomy and geodesy. He was
  knighted in 1860 for his achievements as an astronomer and was awarded the Lalande Prize in 1866. Maclear's crater on the Moon, Maclear's Beacon on Table Mountain, the town of Maclear in South Africa,
  and Cape Maclear in Malawi are named after him. He was married to Mary Pearse, the daughter of Theed Pearse, Clerk of the Peace for the county of Bedford, and they had a close friendship with David Livingstone.
  Maclear's son, John Maclear, was an Admiral in the Royal Navy and Commander of the 1873–1876 HMS Challenger expedition.
