  hobbies: '[''Cooking Mexican cuisine'', ''Gardening'', ''Reading historical fiction'', ''Attending community cultural festivals'', ''Volunteer tutoring'', ''Bingo and board games'', ''Walking in local
    parks'', ''Knitting'', ''Listening to traditional Mexican music'', ''Yoga for seniors'']'
  career_goals: Marlen aims to leverage her experience to advance within the retail environment, aspiring to become a shift supervisor and eventually a store manager, where she can apply her organizational
    talent and people‑oriented approach. Simultaneously, she wishes to give back to her community by volunteering as a bilingual tutor for elementary students, using her education degree to support literacy.
    A long‑term goal is achieving a stable retirement, so she is focused on financial planning and possibly transitioning to a part‑time teaching role at a community college.
