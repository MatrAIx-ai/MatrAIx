personas:
  professional: Jan Gilbert, a 44‑year‑old aspiring community arts facilitator, merges a curiosity‑driven eye for curation with modest Canva design skills, meticulous budget spreadsheets, and a competitive
    drive that pushes her volunteer projects to exceed expectations while she navigates a skeptical stance toward new proposals.
  sports: Jan Gilbert embraces the outdoors with seasonal hikes through the Willamette Valley’s vineyards as a member of the Yamhill County Hiking Club, follows the Portland Timbers fervently each MLS season,
    occasionally joins community fun runs, and channels a competitive streak into beating personal trail‑time records.
  arts: Jan Gilbert immerses herself in the Pacific Northwest’s arts scene, frequents the Portland Art Museum and local Yamhill galleries, curates a growing collection of Georgia O’Keeffe prints, captures
    sunrise vineyards with her Canon EOS R5, writes ukulele‑accompanied verses inspired by Mary Oliver, and enjoys listening to Sufjan Stevens while painting watercolors.
  travel: Jan Gilbert favors thoughtfully planned weekend getaways that blend art and nature, having explored the cliffside beauty of Cannon Beach, toured Tuscan vineyards for inspiration, trekked Kyoto’s
    historic temples on a recent solo trip, and regularly spends summers visiting Portland’s galleries, all while balancing a modest travel budget and family obligations.
  culinary: Jan Gilbert’s culinary pursuits revolve around baking rustic sourdough and rosemary‑infused focaccia with heirloom wheat, tossing garden‑fresh heirloom tomato and basil salads with creamy goat
    cheese, and experimenting with fermented kombucha and seasonal preserves, showcasing a palate that mirrors her love for earthy, handcrafted flavors.
  core: Jan Gilbert, a 44‑year‑old art‑enthusiast and community volunteer, blends curiosity and a competitive edge with a habit of worrying, channeling this mix into meticulous workshop planning, garden
    stewardship, and occasional indulgent pottery purchases.
background:
  cultural: Jan Ann identifies as a White American with deep roots in the Midwest, having grown up in a small-town environment that prized self‑reliance and community ties. Relocating to Sheridan, Oregon
    in early adulthood, she has embraced the Pacific Northwest’s emphasis on environmental stewardship, local art scenes, and seasonal living. Her cultural perspective blends a respect for traditional European
    artistic heritage with a keen appreciation for the region’s indigenous history and natural beauty. This hybrid background informs her values of independence, community involvement, and a curiosity for
    diverse artistic expressions.
