  hobbies: '[''Visiting galleries and museums'', ''Watercolor painting'', ''Pottery making'', ''Hiking in vineyards and forests'', ''Gardening (heirloom vegetables)'', ''Yoga'', ''Reading contemporary fiction
    and poetry'', ''Playing ukulele'', ''Writing poetry'', ''Volunteer work at community garden'', ''Digital photography'', ''Artisan bread baking'']'
  career_goals: Jan Ann aims to re‑enter the workforce in a part‑time capacity that leverages her passion for the arts and community engagement. She envisions a role as a community arts facilitator or workshop
    coordinator for a local nonprofit or cultural center in Yamhill County. Concurrently, she hopes to launch a modest online boutique showcasing her own handcrafted pottery, prints, and garden-inspired
    products. Long‑term, she is interested in obtaining a certification in art therapy to combine her artistic interests with a desire to support mental‑health and stress‑relief initiatives, ultimately
    contributing to a supportive, creative environment for her neighbors.
