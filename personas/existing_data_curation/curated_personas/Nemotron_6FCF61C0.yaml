  hobbies: '[''Church choir'', ''Knitting circle'', ''Cooking Southern cuisine'', ''Hosting potluck dinners'', ''Gardening'', ''Reading mystery novels'', ''Walking her dog'', ''Group fitness classes'',
    ''Line dancing'']'
  career_goals: Vanessa aims to channel her extensive hands‑on experience into a supervisory or training position within her plant. She is pursuing certification in CNC programming and advanced welding
    to broaden her technical skill set. Over the next few years, she hopes to lead a small team, introduce continuous‑improvement initiatives that reduce waste and improve on‑time delivery, and mentor younger
    workers. Ultimately, she seeks a stable, well‑compensated role that will secure her family’s long‑term financial stability and support a comfortable retirement.
