    and traditions'']'
  hobbies: '[''Watercolor painting of coastal landscapes and historic sites'', ''Attending salsa, bomba, and plena performances'', ''Salsa and merengue dancing at community gatherings'', ''Reading historical
    novels, biographies, and Puerto Rican literature'', ''Gardening tropical fruits, herbs, and ornamental plants'', ''Cooking traditional Puerto Rican dishes and experimenting with fusion recipes'', ''Volunteering
    at the senior center, organizing bingo nights and craft circles'', ''Participating in a monthly book club at the local library'', ''Learning new crafts such as crocheting, pottery, and mask making'',
    ''Walking along the Arecibo coastline for birdwatching and photography'', ''Engaging in online forums for retired educators'']'
  career_goals: 'Although retired, Maria aims to leave a lasting legacy by establishing a mentorship network that connects retired teachers with current educators in Arecibo. She plans to publish a guidebook,
    Cultural Bridges: Integrating Puerto Rican Art into Education, to help schools incorporate local artistic heritage into curricula. Maria also dreams of launching a weekly art workshop for seniors at
    the community center and securing a municipal grant to create an oral‑history archive of Hatillo’s elder residents. She is passionate about advocating for better mental‑health resources for seniors,
    continuing her own lifelong learning through online courses, and traveling to major art museums on the mainland to bring fresh ideas back to her community.'
