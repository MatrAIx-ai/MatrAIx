    (landscape and portrait)", "Watercolor painting", "Art history knowledge (informal)", "Senior therapeutic activity facilitation", "Effective listening and client advocacy", "Competitive work ethic and
    reliability"]'
  hobbies: '["Fishing", "Hunting (competitive tournaments)", "Watercolor painting of Montana landscapes", "Landscape photography", "Gardening (vegetable plot)", "Reading historical non‑fiction and biographies",
    "Attending small local art fairs and craft shows", "Woodworking projects", "Maintaining and restoring a classic pickup truck", "Listening to folk and classic rock music"]'
  career_goals: Gregory aims to formalize his healthcare credentials by obtaining a Licensed Practical Nurse (LPN) license, which would allow him to take on greater clinical responsibilities and potentially
    supervise other aides. He also aspires to start a small, community‑focused home‑care agency that integrates art‑based wellness programs for older adults, blending his caregiving expertise with his artistic
    interests. While he values flexibility and prefers a less rigid schedule, he hopes to achieve a supervisory role that offers mentorship opportunities for younger aides, allowing him to channel his competitive
    drive into building a reputable service. Additionally, Gregory wants to reduce the chronic stress he experiences by improving his organizational habits and incorporating stress‑management techniques
    into his daily routine.
