  career_goals: George loves to imagine helping others and creating beautiful things. He often says he wants to be an artist who paints bright pictures for his family, a teacher who reads stories to friends,
    or a community helper like a firefighter who keeps people safe. His ambitions are rooted in his strong desire to bring happiness and harmony to those around him.
