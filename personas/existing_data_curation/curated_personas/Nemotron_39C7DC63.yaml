personas:
  professional: George Oby, an eager mini-architect with a knack for assembling wooden block towers, channels their boundless curiosity and compassion into imaginative play, yet they resist rigid instructions,
    preferring spontaneous building sessions that spark new ideas.
  sports: George Oby dashes around the backyard with boundless energy, joining the neighborhood's Tiny Tots soccer club where they idolize Lionel Messi, and cheers loudly for the Chicago Cubs during family
    game nights, although their attention drifts after a few innings.
  arts: George Oby spends afternoons drawing whimsical Dr. Seuss-style creatures while humming the tune of 'Let It Go' from Frozen and dancing to Pharrell Williams' 'Happy' whenever their favorite 'Sesame
    Street' episode airs.
  travel: George Oby dreams of a family road trip to the Grand Canyon followed by a splashy weekend at Disneyland in Anaheim, but their spontaneous nature means they often prefer short, familiar car rides
    to the local beach over lengthy plane journeys.
  culinary: George Oby eagerly devours chicken nuggets and mac and cheese, proudly sprinkling shredded cheddar on their mini-pizza at breakfast, and pretends to be a chef by stirring pancake batter with
    a wooden spoon, though they stubbornly refuse peas, opting for apple slices instead.
  core: George Oby is a four-year-old explorer whose boundless curiosity fuels endless block-building and doodling adventures, yet their habit of losing socks on the way to bedtime and worrying about tiny
    scratches keeps the household on constant, compassionate alert.
background:
  cultural: George is a Black child growing up in Detroit, a city known for its rich musical heritage, vibrant street art, and close‑knit community. His family celebrates African‑American traditions, attends
    church gatherings, and participates in local cultural events such as community festivals and art workshops. He is surrounded by the sounds of Motown, the colors of neighborhood murals, and the flavors
    of soulful home‑cooked meals, all of which shape his sense of identity and belonging.
