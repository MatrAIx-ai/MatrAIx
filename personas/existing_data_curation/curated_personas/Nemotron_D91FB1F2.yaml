personas:
  professional: An aspiring junior artist and storyteller, Maria Vu channels their curiosity and love for colorful characters into sketching and narrating imaginative scenes, showing early signs of visual
    communication skills and a natural ability to organize group art projects while occasionally worrying about getting every detail perfect, and they love sharing their drawings with classmates.
  sports: Maria Vu fuels their boundless energy on the field with the Riverbend Junior Soccer Club, cheering for the Seattle Sounders FC during weekend family watch parties, and balances the fast‑paced
    drills with calm nature hikes in the nearby hills that they use as inspiration for creative collage art.
  arts: Maria Vu immerses themselves in the vibrant worlds of Dr. Seuss’s whimsical illustrations, the playful melodies of Taylor Swift’s pop hits, and the soothing tones of classic lullabies, and they
    often reenact scenes from Disney’s animated movies while crafting watercolor stories that reflect their love for imagination and community collaboration.
  travel: Maria Vu’s travel adventures consist of weekend trips to the nearby hill trail park for leaf collecting, a family vacation to Disneyland California where they rode the Space Mountain coaster,
    and a dreamed‑for spring break in Paris to see the Eiffel Tower and explore the Louvre’s child‑friendly art tours, all planned around school schedules and parental budget considerations.
  culinary: Maria Vu delights in mixing chocolate chips into homemade cookies with their parents, assembling simple rice noodle salads with fresh cucumber and carrot sticks, and sipping strawberry‑banana
    smoothies topped with a sprinkle of powdered sugar, proudly serving their creations to friends during school bake‑sale events, and they often add a dash of cinnamon for extra flavor.
  core: Maria Vu is a bright, socially‑savvy seven‑year‑old who transforms everyday moments into colorful stories, yet they can get stuck worrying over perfect details and occasionally hoard crayons in
    their backpack, only to share them exuberantly during group art projects.
background:
  cultural: Maria Isabel Vu is a first‑generation American of Vietnamese descent. At home, her parents speak Vietnamese and share cultural traditions such as celebrating Tet, preparing dishes like pho and
    bánh chưng, and teaching her simple Vietnamese phrases and songs. Growing up in Morgan Hill, a diverse suburb of Silicon Valley, she experiences a blend of cultures—her classmates come from many backgrounds,
    and the community offers multicultural festivals, tech‑focused after‑school programs, and public libraries that host storytimes in multiple languages. Her family values education, respect for elders,
    and community involvement, reflected in her polite demeanor and collaborative spirit. These influences shape her appreciation for art, storytelling, and curiosity about the world, as she often incorporates
    Vietnamese motifs into her drawings while also embracing contemporary American pop culture.
