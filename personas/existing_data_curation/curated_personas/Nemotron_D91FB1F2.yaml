  career_goals: Maria often talks about becoming an artist who paints bright pictures that make people smile, and she also dreams of caring for animals as a veterinarian because she loves pets and wants
    to help others feel safe. Sometimes she imagines exploring the stars as an astronaut, reflecting her curiosity about new ideas and unconventional thinking. Her biggest ambition is to keep learning,
    share her cultural stories through art, and help friends feel brave when they worry or feel stressed.
