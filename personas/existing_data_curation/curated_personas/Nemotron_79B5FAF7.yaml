  hobbies: '[''Fishing and Small Game Hunting'', ''Hiking Trails in the Red River Valley'', ''Playing Electric Guitar'', ''Strategy Board Games (e.g., Settlers of Catan)'', ''Video Gaming – Simulation and
    Management Games'', ''Reading Non-Fiction (History, Business, Law)'', ''Softball League Participation'', ''DIY Home Improvement Projects'', ''Attending Local Live Music Events'', ''Volunteering to Teach
    Basic Computer Skills'']'
  career_goals: Jake aims to deepen his compliance expertise through a blend of formal education and industry certifications. Over the next two years he plans to complete an associate’s degree in Business
    Administration and begin coursework toward a bachelor’s degree online. He intends to earn a Certified Compliance and Ethics Professional (CCEP) credential within five years and, later, a Certified Regulatory
    Compliance Manager (CRCM) designation. Professionally, he seeks to advance from his junior compliance officer role to a senior compliance manager position at a mid‑size agribusiness or manufacturing
    firm in the Upper Midwest. His long‑term ambition is to lead a compliance department, designing automated monitoring processes that marry his curiosity for new technologies with the practical, established
    methods valued by his organization. He also hopes to become a recognized mentor, guiding newcomers and fostering a culture of rigorous yet adaptable compliance practices.
