  career_goals: Jonathan’s short‑term goal is to complete his Associate’s degree in Business Administration within the next year and earn the Certified Public Accountant (CPA) credential. He intends to
    secure an entry‑level accounting position at a local firm where he can apply his precision and reliability. Over the longer term, he aspires to advance to senior finance manager or controller, using
    his competitive drive to improve financial processes and achieve measurable performance gains.
