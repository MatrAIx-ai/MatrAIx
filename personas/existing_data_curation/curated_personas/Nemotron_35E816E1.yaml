    volunteering'', ''Animal shelter assistance'']'
  career_goals: She aims to pursue a career that blends creativity with real‑world impact, such as a product designer for sustainable tech, a wildlife photographer, or a developer of educational apps. Susan
    wants a path that lets her explore new ideas, stay flexible, and give back to her community, perhaps by creating tools that help local schools teach STEM in engaging ways. She hopes to attend a university
    in Texas with strong engineering or visual arts programs and eventually work in a role that offers both independence and collaborative opportunities.
