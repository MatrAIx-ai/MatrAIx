personas:
  professional: Susan Parham is a budding electronics hobbyist and community event organizer who blends hands‑on tinkering with DIY kits and a practical, flexible mindset, allowing them to troubleshoot
    projects on the fly while coordinating volunteer crews for the Georgetown Main Street Festival.
  sports: Susan Parham rides a mountain bike with the Hill Country Pedalers club on weekends, follows the Dallas Cowboys for football, the Texas Rangers for baseball, and squeezes in a casual soccer game
    with friends in the spring, viewing fitness as a flexible, socially‑driven activity.
  arts: Susan Parham captures sunset vistas with a vintage Canon camera inspired by Ansel Adams, sketches sci‑fi characters reminiscent of Moebius, strums acoustic renditions of Johnny Cash and Taylor Swift
    at family gatherings, and binge‑watches the latest releases from director Denis Villeneuve.
  travel: Susan Parham dreams of weekend road trips through the Hill Country, day‑trips to Austin’s live‑music scene, a future adventure to the Grand Canyon, and a cultural immersion in Kyoto, balancing
    a modest student budget with parents’ support and a love for spontaneous detours.
  culinary: Susan Parham favors Texas‑style brisket tacos, homemade guacamole with fresh cilantro, and attempts to bake chocolate chip cookies, yet their cooking skill remains at a confident beginner level,
    often relying on quick‑cook meals while savoring fresh strawberries and creamy peanut butter.
  core: Susan Parham blends an adventurous curiosity for tech and nature with a laid‑back, slightly scatter‑brained vibe that fuels community projects, bike rides, and creative jams.
background:
  cultural: Susan was raised in a middle‑class, predominantly white neighborhood of Georgetown, Texas, where Southern hospitality and community values are strong. Her family celebrates traditional holidays
    like Thanksgiving and the Fourth of July with barbecues and local music, and they attend a nearby Methodist church, which instills a sense of service and modesty. Growing up near both farmland and the
    expanding tech corridor of Austin gives her exposure to both rustic Texas traditions and modern digital culture, shaping her practical outlook and openness to new ideas.
attributes:
  skills: '[''Basic computer troubleshooting'', ''Digital photography and video editing'', ''Arduino and simple robotics'', ''Minor home repairs'', ''Effective group communication'']'
