  career_goals: Laura aims to advance to a supervisory role within her security team, eventually becoming a shift supervisor or security manager at the casino where she works. She plans to obtain the Certified
    Protection Professional (CPP) credential to formalize her expertise and to lead initiatives that modernize the surveillance infrastructure with AI‑assisted video analytics. Recognizing her competitive
    drive, she seeks to be the top performer in loss‑prevention metrics, earning recognition for reducing incident rates and improving compliance audits. In the longer term, Laura envisions transitioning
    into a consulting capacity, providing private security and fraud‑prevention advice to smaller gaming venues across Texas. Achieving a stable, structured position that offers predictable schedules will
    also help her manage stress and provide a reliable foundation for future retirement planning.
