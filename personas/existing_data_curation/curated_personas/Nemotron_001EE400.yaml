  hobbies: '[''Gardening'', ''Reading historical fiction'', ''DIY crafts'', ''Volunteering at community center'', ''Hiking in local parks'', ''Cooking experimental recipes'', ''Listening to practical self-improvement
    podcasts'']'
  career_goals: Rebeccal aims to re‑enter the workforce in a role that honors her need for flexibility while allowing her to apply her practical knowledge and caregiving instincts. She plans to obtain a
    Certified Nursing Assistant (CNA) credential to support older adults in her area, and is also exploring part‑time remote administrative or customer‑service positions that let her balance work with personal
    time. Long‑term, she hopes to combine her event‑coordination experience with a position in a local nonprofit or municipal office, where she can develop programs that strengthen community support networks,
    especially for families coping with loss. Her career ambition is to build a sustainable, purpose‑driven path that blends learning new skills with reliable, service‑oriented work.
