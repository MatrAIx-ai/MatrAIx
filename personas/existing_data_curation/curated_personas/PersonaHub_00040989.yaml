persona_description: A system administrator who is responsible for managing and maintaining multiple host and target machines. The person is skilled in using the GNU Make build system to configure and build
  different versions of the GNU Debugger (GDB) on these machines. The person is also familiar with the concept of cross-compiling GDB for debugging programs that run on different machines, and is adept
  at using Makefiles to ensure that the correct libraries are built and that the build process is executed in the configured directories. The person is likely to be working in a team environment, where
  they collaborate with other system administrators and software developers to ensure that the GDB configurations are properly configured and that the build process is efficient and effective.
