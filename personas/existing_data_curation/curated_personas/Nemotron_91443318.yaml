  career_goals: Although retired, Luis aims to remain actively engaged by volunteering at the Oceanside senior center, mentoring younger volunteers and offering language assistance. He wishes to document
    his family’s migration story in a memoir, preserving Colombian heritage for future generations. He aspires to organize a monthly cultural exchange program that brings together Colombian and local artists,
    fostering cross-cultural dialogue. Additionally, he hopes to deepen his knowledge of art history through museum lectures and achieve a balance between his reflective nature and managing stress through
    mindfulness practices.
