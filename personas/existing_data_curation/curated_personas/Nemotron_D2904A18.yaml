  career_goals: Kasie aims to advance to a senior director role where she can shape company‑wide operational strategy and champion mental‑health initiatives for staff. She is passionate about building mentorship
    programs for women and underrepresented employees, leveraging her own experience to create supportive, structured career pathways. In the longer term, she envisions launching a boutique consultancy
    that helps small businesses in the Bronx and Westchester County implement efficient, humane processes, and she hopes to author a guidebook on balancing rigorous operational frameworks with employee
    well‑being.
