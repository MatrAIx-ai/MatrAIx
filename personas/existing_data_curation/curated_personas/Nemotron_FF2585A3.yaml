  career_goals: Van J dreams of becoming an astronaut or a wildlife biologist, inspired by his fascination with rockets and the creek behind his house. He also imagines working as a firefighter because
    he admires the bravery of the big red trucks he sees on his way to preschool. While his aspirations are still playful, he consistently talks about "exploring the stars" or "saving animals," reflecting
    his competitive drive to be the best at whatever he chooses.
