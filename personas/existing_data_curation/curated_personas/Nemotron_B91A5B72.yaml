  hobbies: '[''sketching comics'', ''rap freestyling'', ''video editing for YouTube'', ''pick‑up basketball'', ''reading graphic novels'', ''listening to diverse music'', ''bike riding to view street art'',
    ''journaling'', ''participating in community art events'']'
  career_goals: Deandre dreams of turning his love for art, music, and technology into a career as a multimedia creator. He hopes to attend a high‑school program focused on visual arts and later study animation,
    game design, or graphic novel production at a university. His long‑term ambition is to launch an independent studio that produces animated shorts and original music, giving a platform to voices from
    his Fort Worth community. While he remains intrigued by the possibility of a professional basketball path, he prioritises creative work where his curiosity and competitive drive can flourish. He also
    envisions mentoring younger kids in after‑school art workshops, using his own experiences to foster flexibility and open‑minded thinking.
