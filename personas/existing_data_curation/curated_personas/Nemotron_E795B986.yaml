  hobbies: '[''Sketching'', ''Digital painting'', ''Concept art'', ''Music composition'', ''Science‑fiction reading'', ''Philosophy reading'', ''Creative writing'', ''Poetry'', ''Photography'', ''Puzzle
    solving'', ''Board‑game evenings'', ''Community art volunteering'']'
  career_goals: Jesse plans to attend a university program in Visual Arts, Interactive Media, or Game Design, where he can deepen his expertise in concept art and user experience. In the near term, he aims
    to build a compelling portfolio that can secure an internship at a video‑game studio or a design agency. His longer‑term ambition is to become a senior concept artist or creative director, leading interdisciplinary
    teams that craft immersive storytelling experiences. He also envisions launching independent creative projects—such as an indie video game or a digital graphic novel—that reflect his imaginative vision
    while upholding his high standards of quality and organization.
