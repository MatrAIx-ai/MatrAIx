personas:
  professional: Jesse Escott, an aspiring concept artist and interactive media student, merges digital illustration, Python‑driven workflow automation, and narrative writing to craft speculative character
    designs and atmospheric storyboards, while their meticulous project planning and collaborative mindset earn them recognition in the local community art workshop.
  sports: Jesse Escott, a casual desert‑hiker and occasional intramural basketball player, follows the Las Vegas Raiders and the Denver Broncos for NFL excitement, and stays active at the local climbing
    gym, but prefers board‑game nights to traditional team sports.
  arts: Jesse Escott, a dedicated digital painter and ambient music composer, draws inspiration from H.R. Giger, Syd Mead, Studio Ghibli, and Brian Eno, exhibits their photography of the Nevada desert at
    the community art workshop, and regularly curates an online gallery of speculative character concepts.
  travel: Jesse Escott, a road‑trip enthusiast, has explored the stark beauty of Death Valley, captured sunrise at Arches National Park, and dreamed of visiting Kyoto’s neon districts to study urban lighting,
    all while budgeting trips with a mix of saved portfolio earnings and discount student travel passes.
  culinary: Jesse Escott, a self‑taught home cook, favors crafting quick ramen bowls with miso broth, grilled vegetable tacos with avocado salsa, and occasionally indulges in late‑night pizza while listening
    to ambient synth tracks, though they often rely on instant noodles after marathon art sessions.
  core: Jesse Escott is an 18‑year‑old disciplined dreamer who channels relentless curiosity into digital art, ambient music, and meticulously planned creative projects, while occasionally succumbing to
    all‑night sketch marathons and snack‑filled coding sprints.
background:
  cultural: Jesse grew up in North Las Vegas, a suburban community within the diverse and vibrant cultural landscape of Southern Nevada. Though his family identifies as white and American, the region’s
    mix of desert Southwest heritage, gaming and entertainment influences, and the influx of visitors from around the world have shaped his worldview. He was exposed to the visual spectacle of the Las Vegas
    Strip, which fostered his appreciation for bold design and storytelling, while the surrounding desert environment nurtured a quieter, reflective side that draws him to landscape photography and nature
    hikes. Family values emphasize education, hard work, and community service, and local traditions—such as Fourth of July fireworks and community art events—have reinforced his sense of belonging and
    cooperation.
