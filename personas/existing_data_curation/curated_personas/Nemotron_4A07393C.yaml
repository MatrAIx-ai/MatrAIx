personas:
  professional: Elijah Brown, a 28‑year‑old full‑stack developer in New Orleans, blends JavaScript, Python, and cloud DevOps expertise with a passion for generative visual art, leads community workshops
    on creative coding for youth, and they aspire to become a technical leader shaping AI‑enhanced platforms that empower musicians and visual artists.
  sports: Elijah Brown fuels their competitive edge by playing pickup basketball with the Bywater Hoops crew at City Park, cheering on the New Orleans Pelicans during the NBA season and the Saints on Sundays,
    and they complement high‑intensity court sessions with weekend runs along the Mississippi River levee to maintain overall fitness.
  arts: Elijah Brown immerses themselves in New Orleans’ jazz heritage by playing saxophone alongside local ensembles that echo the sounds of Wynton Marsalis and Kamasi Washington, captures the city’s nocturnal
    vibrancy through low‑light photography inspired by Henri Cartier‑Bresson, and they create generative visual installations reminiscent of Zach Lieberman, while regularly attending gallery openings featuring
    muralists such as Brandan 'Mist' Hill.
  travel: Elijah Brown prefers spontaneous weekend getaways that blend cultural immersion with tech exploration, such as a last‑minute road trip to Austin for SXSW, occasional flights to New York for hackathons,
    and they nurture a long‑standing dream of visiting Tokyo’s teamLab Borderless museum and Paris’s Musée d’Orsay for artistic inspiration, all while budgeting carefully to keep travel expenses within
    their savings plan.
  culinary: Elijah Brown, an avid home‑cook, perfects classic Creole staples like gumbo with Andouille sausage, jambalaya seasoned with filé powder, and beignets dusted with powdered sugar, while they occasionally
    fuse these flavors with modern plating techniques inspired by chefs such as Emeril Lagasse, and they relish pairing their meals with locally roasted chicory coffee.
  core: Elijah Brown is a creatively driven full‑stack developer who balances a relentless competitive streak and skeptical mindset with a love for jazz, night‑time photography, and mindfulness, even as
    they wrestle with anxiety that fuels meticulous goal‑setting.
background:
  cultural: Elijah is a Black American raised in the soulful, multicultural neighborhoods of New Orleans. His family roots trace back to both the African diaspora and the city’s historic Creole community,
    giving him a deep appreciation for the rhythms of jazz, the exuberance of Mardi Gras, and the storytelling traditions of spoken word poetry. Growing up, he participated in local second‑line brass bands
    and attended community festivals that blended African, French, and Caribbean influences. This rich heritage instilled in him a strong sense of resilience, communal responsibility, and a love for collaboration,
    while also shaping his awareness of the systemic challenges faced by Black professionals in tech. Elijah draws on this cultural tapestry to inform his artistic projects and his commitment to mentorship
    and representation in the tech industry.
attributes:
  skills: '["Full‑Stack Web Development", "JavaScript (React, Vue)", "Python (Django, Flask)", "Node.js & Go", "RESTful API Design", "Docker & Container Orchestration", "CI/CD (GitHub Actions, Jenkins)",
