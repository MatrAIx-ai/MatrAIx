  hobbies: '["Jazz saxophone playing", "Street photography", "Exploring New Orleans murals", "Creative coding workshops", "Community hackathons", "Cooking Creole cuisine", "Pickup basketball", "Chess puzzles",
    "Algorithmic coding contests", "Mindfulness meditation", "Reflective journaling"]'
  career_goals: Elijah aspires to become a technical leader who bridges the gap between cutting‑edge software engineering and experiential art. In the next five years, he aims to step into a lead engineer
    or architect role where he can shape large‑scale, AI‑enhanced platforms that empower creators. He envisions launching a startup that offers interactive, data‑driven art tools for musicians and visual
    artists, leveraging his background in both code and culture. Simultaneously, Elijah is committed to fostering inclusive tech communities in New Orleans, mentoring Black and LGBTQ+ developers, and championing
    equitable hiring practices. His competitive drive pushes him to earn industry certifications (e.g., AWS Solutions Architect, Certified Kubernetes Administrator) and to win regional hackathons, while
    his curiosity fuels continuous learning in emerging fields like AR/VR and generative AI.
