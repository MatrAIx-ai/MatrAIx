  hobbies: '[''Listening to Memphis blues and soul music'', ''Playing harmonica'', ''Cooking Southern comfort foods'', ''Gardening a vegetable plot'', ''Attending Baptist church and singing in choir'',
    ''Watching Memphis Grizzlies and baseball'', ''Volunteering at community center teaching home‑repair'', ''Fishing on the Mississippi River'', ''Spending time with grandchildren'']'
  career_goals: He hopes to transition from full‑time labor to a part‑time safety advisor role for his union local, where he can codify decades of practical knowledge into training modules for apprentices.
    He also aims to complete a meaningful home renovation project – building a wheelchair‑accessible deck for his wife – and to document his life’s work in a series of short memoir essays for the local
    senior center. Maintaining his health to continue volunteering and mentoring remains central to his ambitions.
