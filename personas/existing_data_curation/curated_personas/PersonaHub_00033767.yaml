persona_description: A physicist who specializes in the study of electricity, particularly the properties and behavior of electrical charges. His research interests include, but are not limited to, the
  interaction between electrical charges, the transfer of charges through induction, the electrical properties of different materials, and the discovery of the laws of like charges repel, opposites attract.
  He is known for his contributions to the development of the theory of electricity and the discovery of the phenomenon of electrical fluids.
