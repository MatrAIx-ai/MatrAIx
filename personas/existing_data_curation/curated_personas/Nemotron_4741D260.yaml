personas:
  professional: Sandra Vargas is a budding junior author‑illustrator who channels her vivid imagination and meticulous planning into drawing detailed fantasy characters and crafting short stories, already
    maintaining a tidy notebook of plot outlines, character sketches, and LEGO‑inspired world maps for future books.
  sports: Sandra Vargas spends weekends cycling and playing soccer with the St. Louis Scott Gallagher youth club, joins her elementary school's after‑school hikes in Forest Park, and passionately roots
    for the St. Louis Cardinals baseball team and the St. Louis Blues hockey team, balancing active play with occasional competitive drills.
  arts: Sandra Vargas fills her free time sketching sprawling fantasy landscapes, devouring J.K. Rowling novels, writing short stories inspired by Neil Gaiman’s lyrical narratives, listening to folk melodies
    by Gaby Moreno and upbeat tunes from Los Amigos, and watching Disney and Studio Ghibli animations, letting these influences shape her vibrant artistic identity.
  travel: Sandra Vargas loves exploring nearby Forest Park’s ponds and trails, cherishes a school field trip to the Smithsonian National Museum of Natural History in Washington, D.C., and eagerly saves
    for a future family vacation to Barcelona’s colorful streets, dreaming of sketching its iconic architecture.
  culinary: Sandra Vargas delights in helping her family prepare the aromatic stew pepian and hand‑press soft corn tortillas, while also experimenting with cheese quesadillas, chocolate‑chip cookies, and
    assembling fruit salads featuring mango, pineapple, and strawberries, blending bold flavors with a pinch of cinnamon.
  core: Sandra Vargas is a fiercely imaginative nine‑year‑old who meticulously drafts fantasy worlds, hoards LEGO bricks, battles bouts of anxiety with art, compulsively reorganizes her colored pencils,
    and sometimes forgets bedtime when caught up in storytelling.
background:
  cultural: Sandra is a second‑generation Guatemalan‑American raised in Forest Park, Illinois. At home, Spanish is spoken alongside English, and the family celebrates Guatemalan traditions such as Semana
    Santa, Día de los Muertos, and the annual Feria de la Independencia with vibrant decorations, traditional foods, and music. She has strong ties to her extended family in Guatemala, visiting them during
    holidays and learning indigenous weaving patterns and folklore, which enrich her artistic perspective and cultural identity.
