  career_goals: Sandra dreams of becoming a children's book illustrator, channeling her love for art, fantasy, and storytelling into books that spark other kids' imaginations. She also harbors a fascination
    with science and space, imagining a future as an astronaut or environmental researcher who uses creativity to solve global challenges. Ultimately, she wants a career that blends creativity, curiosity,
    and the ability to inspire and help others.
