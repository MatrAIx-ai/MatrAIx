  career_goals: She aspires to combine her love of nature with a practical, stable career. Her primary ambition is to become a wildlife biologist or environmental scientist focused on Colorado's mountain
    ecosystems, contributing to conservation and wildlife management. To achieve this, she plans to enroll in a high school with a strong STEM program, join the science and robotics clubs, take advanced
    biology and environmental science courses, and seek internships or volunteer opportunities at local nature centers or the U.S. Forest Service. Katie also envisions a backup plan of studying veterinary
    medicine, providing a reliable professional path while still satisfying her curiosity about living organisms. She values thorough preparation and hopes her future work will allow her to make a measurable
    impact on her community and the natural world.
