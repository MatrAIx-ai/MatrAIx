personas:
  professional: Katie Steadman is an emerging junior technologist who blends ecological curiosity with practical coding by creating Scratch games themed around Rocky Mountain wildlife and volunteering on
    her school's robotics team to design nature-inspired automation projects, all while maintaining a meticulous project journal that reflects her balanced curiosity and need for organization.
  sports: Katie Steadman enjoys hiking the trails of Garden of the Gods and Rocky Mountain National Park with her family, competes on her middle-school cross-country team, cheers for the Denver Broncos
    and Colorado Rockies, and balances her love for outdoor cardio with occasional yoga sessions to alleviate tension from academic stress.
  arts: Katie Steadman sketches detailed watercolors of alpine flora, strums the ukulele to songs by Jake Shimabukuro and Taylor Swift during small gatherings, attends local community theater productions
    of The Secret Garden and watches Studio Ghibli's My Neighbor Totoro, using these creative outlets to soothe her worries and fuel her imagination.
  travel: Katie Steadman spends weekend trips exploring the Colorado high country, has visited the Grand Canyon and the Smithsonian National Museum of Natural History, and dreams of backpacking through
    the Scottish Highlands to study native plants, always planning trips with a blend of structured itineraries and spontaneous detours that satisfy her curiosity while managing her anxiety about the unknown.
  culinary: Katie Steadman is a budding baker who perfects chocolate chip and snickerdoodle cookies using dark chocolate chunks and cinnamon, experiments with simple vegan smoothies featuring kale and mango,
    and, when stressed, often over-sweetens her treats as a comforting habit she gladly shares during sleepover bake-offs.
  core: Katie Steadman is a curiosity-driven 13-year-old who balances tech tinkering, nature sketching, and a habit of over-thinking, turning worry into detailed journals while chasing creative projects
    and occasionally indulging in oversized cookie batches.
background:
  cultural: Katie grew up in a middle‑class family in Colorado Springs, a city framed by the Rocky Mountains and home to a diverse mix of civilian and military communities. The local culture emphasizes
    outdoor recreation—hiking, skiing, and exploring nature—which has shaped her love for the environment. She celebrates typical American holidays such as Thanksgiving and Independence Day, and also participates
    in regional events like the Colorado State Fair and summer trail festivals. The presence of nearby military installations has introduced her to a broad range of cultures, fostering an appreciation for
    diversity while still grounding her in the values of hard work, independence, and community service common to many families in the area.
