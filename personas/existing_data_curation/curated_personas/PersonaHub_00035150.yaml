persona_description: A literary critic and scholar who is interested in the representation of geographical space in novels, particularly those from the mid-nineteenth century to the late twentieth century.
  They have a strong background in literature and have read and analyzed a variety of novels by authors such as Charles Dickens, Herman Melville, Thomas Pynchon, and W.G. Sebald. They have a keen interest
  in how authors use maps, guidebooks, and other documents of geographical orientation to create fictional worlds and explore the complexities of place. They are also knowledgeable about the history of
  these works and the role of maps and guidebooks in the writing and criticism of fiction.
