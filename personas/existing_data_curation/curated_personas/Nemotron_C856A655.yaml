  hobbies: '["Senior Fitness Classes", "Line Dancing", "Book Club", "Community Volunteering", "Food Bank Assistance", "Patio Gardening", "Genealogy Research", "Travel to Arizona Landmarks", "Baking and
    Recipe Experimentation", "Puzzles and Brain Games", "Digital Photography"]'
  career_goals: Suzi aims to transition from a purely operational role to a mentorship position within the store, formally becoming a trainer for new staff members and sharing her practical knowledge. She
    hopes to be recognized as a model employee who bridges the gap between seasoned workers and younger colleagues, offering guidance on both traditional stocking methods and newer digital tools. In the
    next few years, she plans to attend a short certification course on modern inventory systems to stay current. Beyond her workplace, Suzi is passionate about maintaining financial independence in retirement,
    so she seeks part‑time opportunities that align with her strengths while allowing flexibility for her health and family commitments. She also aspires to volunteer as a coordinator for senior‑focused
    community programs in Sun City, using her organizational talents to enrich the lives of her peers.
