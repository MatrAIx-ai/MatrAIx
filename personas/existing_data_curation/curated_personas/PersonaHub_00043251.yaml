  support for girls' education. They are well-versed in the complexities of gender discrimination and its impact on girls' education, and have a deep understanding of the barriers that girls face in accessing
  education, including violence, discrimination, and harmful traditional practices. They are a strong advocate for policy change and are committed to making a difference in the lives of girls and young
  women around the world.
