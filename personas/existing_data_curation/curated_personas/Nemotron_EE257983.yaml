    and sustainable horticulture'', ''Basic first aid and emergency preparedness'', ''Digital literacy for online archival work'']'
  hobbies: '[''Reading historical nonfiction and philosophy'', ''Family genealogy research'', ''Writing articles for local publications'', ''Chess and bridge'', ''Woodworking and furniture making'', ''Classic‑car
    restoration (1965 Chevrolet Impala)'', ''Gardening heirloom vegetables'', ''Fishing at local creeks'', ''Hiking in the Ozark foothills'', ''Photography of projects and nature'', ''Volunteering for the
    Washington Historical Society'']'
  career_goals: Although retired from formal employment, John aims to make his passion for local history and hands‑on craftsmanship count. He plans to author a comprehensive history of Washington, Missouri,
    to be published through the county historical society, and to lead an oral‑history project that records veteran stories from the region. He hopes to finish restoring his 1965 Chevrolet Impala and to
    display it at the annual Franklin County classic‑car show. John also intends to achieve a top‑seed rating in the local chess club and to mentor youth interested in genealogy and historical research.
    Finally, he wishes to maintain a self‑sufficient lifestyle by expanding his garden and continuing his woodworking projects, all while staying flexible and unburdened by rigid schedules.
