personas:
  professional: Jennifer Oneill, a seasoned custodial specialist with over three decades of building maintenance experience, blends deep expertise in floor care, chemical safety, and green‑cleaning certifications
    with a practical curiosity for new sustainable methods, and they now channel their competitive drive and meticulous organization into training junior staff while pursuing a supervisory role in facilities
    management.
  sports: Jennifer Oneill, an avid member of the New Haven Walking Club who hikes the East Rock trails each weekend, passionately roots for the New England Patriots and follows the Boston Red Sox season,
    and they also play in a local senior volleyball league, balancing their competitive trivia night victories with low‑impact fitness.
  arts: Jennifer Oneill, who spends evenings at community folk‑dance workshops and volunteers at the local food pantry while snapping candid shots with a DSLR, finds solace in contemporary fiction by Sally
    Rooney and Colson Whitehead, admires the striking portraits of Steve McCurry, and they regularly attend performances at the Yale Repertory Theatre, often knitting a scarf to the rhythm of The Chieftains’
    reels.
  travel: Jennifer Oneill, a meticulous planner who favors short‑haul trips to historic New England towns like Mystic and the autumn‑colored White Mountains, reflects fondly on a lively St. Patrick’s Day
    getaway to Dublin, and they now dream of a modest cultural tour of the Scottish Highlands that balances exploration with a tight budget.
  culinary: Jennifer Oneill, a competent home cook who experiments with Mediterranean‑style grilled salmon, quinoa pilaf, and seasonal kale salads seasoned with fresh rosemary and thyme from their windowsill
    garden, often bakes an Irish soda bread for St. Patrick’s Day and treats themselves to an occasional chocolate‑chip cookie, all while they knit a scarf beside the stove.
  core: Jennifer Oneill fuses a competitive, worry‑prone spirit with a community‑driven heart, obsessively tracking eco‑cleaning innovations while they juggle nightly knitting projects and triumphant trivia
    wins.
background:
  cultural: Jennifer comes from a working‑class Irish‑American family rooted in New England. Raised in a modest household in the suburbs of New Haven, she inherited a strong work ethic and a sense of community
    responsibility. Family traditions include celebrating St. Patrick's Day with music and traditional meals, and she often volunteers at local cultural festivals. While she respects her heritage, she embraces
    the diverse, multicultural environment of modern New Haven, integrating its local customs and values into her daily life.
attributes:
  skills: '["commercial cleaning techniques", "chemical safety and disposal", "floor care (strip‑and‑seal, buffing, carpet maintenance)", "operation of industrial cleaning equipment", "indoor air quality
    management", "green cleaning certifications", "sustainable waste‑reduction practices", "schedule and rota organization", "facility issue troubleshooting", "staff training and mentorship"]'
  hobbies: '["community dance classes", "hiking in East Rock Park", "book club (contemporary fiction)", "digital photography workshops", "computer basics workshops", "trivia night competitions", "knitting",
    "healthy cooking experiments", "volunteering at neighborhood food pantry"]'
  career_goals: At 62, Jennifer aims to transition from hands‑on cleaning to a supervisory or training role, leveraging her experience to mentor the next generation of custodial staff. She plans to complete
    her associate degree in environmental health to qualify for a junior facilities‑management position within the New Haven university system. Long‑term, she hopes to lead a small, eco‑focused cleaning
    consultancy that offers sustainable services to local businesses, while securing a stable pension and health benefits for her retirement years.
