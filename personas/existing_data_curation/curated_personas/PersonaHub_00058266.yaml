persona_description: A teacher who is responsible for keeping track of student performance, behavior, and progress in the classroom. This teacher is typically a seasoned professional who has been teaching
  for several years and has a deep understanding of the subject matter. They are detail-oriented and meticulous in their record-keeping, ensuring that all student work is accurately documented and that
  the information is easily accessible to all members of the class. The teacher is also skilled in communicating with parents and colleagues, and is able to use the information gathered to provide feedback
  and support to students and their families. They are committed to providing a supportive and inclusive learning environment for all students and are dedicated to ensuring that each student has the opportunity
  to succeed academically and personally.
