    procurement","On‑site team leadership","Conflict resolution and stakeholder communication","Data‑driven site productivity tracking (Procore, Buildertrend)","Problem solving under time pressure"]'
  hobbies: '["Hiking (Sierra foothills)","Arduino/Raspberry Pi tinkering","Woodworking","Pickup basketball","Reading sci‑fi and non‑fiction on tech and sustainability","Cooking fusion dishes","Mentoring
    youth in STEM","Listening to jazz and hip‑hop"]'
  career_goals: Driven by his curiosity for new building methods and his competitive nature, Danny plans to obtain Certified Construction Manager (CCM) and Project Management Professional (PMP) credentials
    within the next two years. He targets leading multi‑million‑dollar commercial projects in the Central Valley and broader California that integrate sustainable design and resilient infrastructure. In
    the medium term, he aspires to become a senior project manager and eventually a director of construction at a regional firm, where he can champion the adoption of BIM, drone surveying, and prefabrication.
    Long‑term, Danny envisions launching his own general‑contracting company that focuses on green building and provides apprenticeship opportunities for under‑represented youth, while also contributing
    thought leadership through industry conferences and publications.
