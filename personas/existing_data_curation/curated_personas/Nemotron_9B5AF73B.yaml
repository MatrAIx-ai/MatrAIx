  hobbies: '["Pickup basketball", "Improv comedy", "Hiking in the Santa Monica Mountains", "Photography and vlogging", "Attending live music concerts", "Cooking with friends", "Exploring new restaurants",
    "Traveling", "Volunteering at community festivals", "Board game nights"]'
  career_goals: Thomas aims to leverage his sociable energy and digital savvy to break into the field of digital marketing, eventually becoming a senior social media strategist or creative director at a
    tech or entertainment company. He also harbors ambitions to launch a boutique event‑planning consultancy that focuses on community‑focused experiences in the Los Angeles area. To achieve this, he plans
    to complete a specialized certification in digital marketing, build a robust portfolio, and develop stronger organizational habits.
