  career_goals: Timothy dreams of becoming an astronaut who explores space, an artist who creates vivid paintings, or a scientist who studies wildlife and the environment. He aspires to master reading,
    learn more about nature, and someday design inventions that protect the planet. Even at his young age, he sets high standards for himself and envisions a future where his curiosity and discipline lead
    to impactful contributions.
