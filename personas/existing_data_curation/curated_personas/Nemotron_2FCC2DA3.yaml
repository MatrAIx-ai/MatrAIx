  career_goals: Zelma aims to advance to a shift‑supervisor or store‑manager role where she can blend her operational knowledge with her passion for fostering a welcoming, community‑focused environment.
    She plans to complete her associate degree in business administration or arts to broaden her managerial credentials. Long‑term, she dreams of launching a small community art program that offers workshops
    for local youth and showcases emerging Black artists, eventually opening a boutique space that sells her own artwork and crafts alongside curated pieces from Oakland creators.
