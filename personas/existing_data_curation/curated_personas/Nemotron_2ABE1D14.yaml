  hobbies: '[''Hiking in Columbia River Gorge'', ''Cycling around Portland'', ''Group yoga classes'', ''Live music and concert attendance'', ''Community theatre volunteering'', ''Trivia nights'', ''Strategy
    board games'', ''Cooking and food exploration'', ''Balcony gardening'']'
  career_goals: Nancy aims to advance to a senior project manager role within the next two years, taking charge of larger cross‑functional programs that blend technology, community development, and creative
    arts. She plans to obtain her Project Management Professional (PMP) certification and deepen her expertise in Agile scaling frameworks such as SAFe. Eventually she sees herself progressing to a program‑management
    or director‑of‑PMO position, where she can shape organizational strategy, mentor emerging project managers, and embed sustainable, outcome‑focused practices across the enterprise. In the longer term,
    she is interested in launching a consulting practice that helps nonprofit arts organizations and socially‑impact startups manage projects efficiently while preserving their creative mission.
