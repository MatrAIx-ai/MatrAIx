personas:
  professional: Nancy is a project manager at a nonprofit arts accelerator who leverages Agile and Waterfall methodologies, data-driven reporting in Tableau, and tools like Asana and Jira to lead interdisciplinary
    teams, balancing her practical, structured approach with a competitive drive to deliver projects on time and within budget.
  sports: Nancy cycles with the Portland Pedal Power club, hikes the Columbia River Gorge every weekend, attends Portland Timbers matches, and plays on a co-ed intramural soccer league, channeling her competitive
    nature into community fitness.
  arts: Nancy volunteers backstage at Portland Center Stage, frequents indie concerts at Mississippi Studios featuring The Decemberists and Sufjan Stevens, enjoys indie film screenings of Wes Anderson and
    Greta Gerwig, and hosts board-game nights with Stonemaier titles, allowing her creative energy to flourish beyond the office.
  travel: Nancy favors thoughtfully planned eco-friendly trips, having explored Iceland's geothermal landscapes, Banff's alpine trails, and Tokyo's street-food scene, while dreaming of a sustainable road
    trip along the Pacific Coast Highway with her balcony-grown herbs as souvenirs.
  culinary: Nancy loves cooking seasonal herb-infused grilled salmon with lemon-dill sauce, beet-goat cheese salads, and experimenting with food-cart delights like Khao San Road's Pad Thai, while tending
    a balcony garden of basil, mint, and thyme, though she often over-salts her dishes.
  core: Nancy blends a pragmatic, structured project leadership style with a competitive, community-oriented spirit, never missing a trivia night, a yoga session, or an opportunity to garden.
background:
  cultural: Nancy comes from a middle‑class white family of German‑Irish descent that grew up in the Pacific Northwest suburbs. Her upbringing emphasized education, self‑reliance, and civic participation,
    reflecting the region’s blend of frontier pragmatism and progressive social values. While her heritage includes European traditions—such as celebrating Oktoberfest with family and an appreciation for
    folk music—her adult life is shaped by Portland’s eclectic cultural scene. She actively engages with the city’s emphasis on sustainability, diversity, and community arts, and she values inclusive, collaborative
    environments both at work and in her personal life.
