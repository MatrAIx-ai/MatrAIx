persona_description: A Seattle University professor who has created and will commission an art exhibit to honor those lost in Japan's massive earthquake and tsunami. She is an associate fine arts professor
  at the university and her art will be displayed inside a temple in Fukushima Prefecture. The exhibit, titled "Requiem 3.11," is meant to mourn the spirits of those lost but also encourage survivors to
  mourn and remember. The Fukushima Nuclear Power Plant caused significant damage to the area, and Kasumi's past art exhibits have been featured locally and internationally.
