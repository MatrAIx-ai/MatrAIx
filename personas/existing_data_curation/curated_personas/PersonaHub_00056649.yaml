persona_description: A scientist who specializes in the study of invasive species, particularly in the areas of ecology, population dynamics, and invasion biology. They are interested in developing predictive
  principles for understanding and preventing invasive species. They have a deep understanding of the natural history of nonindigenous species and the events that dictate their immigration, persistence,
  and invasion in new environments. They are skilled in conducting experiments to evaluate nonindigenous species in stochastic environments and quantifying the uncertainties in available predictive schemes.
  They have experience with expert judgment and the use of quantitative methods to transform judgment into transparent, repeatable, and comprehensive predictive capability.
