persona_description: A professor who teaches a course on modern history and is interested in incorporating the digital humanities into the course. The professor is experienced with the digital humanities
  and has used it in the past to enhance student learning. The professor values the use of evidence and statistics to support historical arguments and is open to incorporating the use of the transatlantic
  slavery database into the course. The professor is also interested in exploring the complexities of digital humanities assignments and how to balance the use of digital tools with traditional writing
  and research methods.
