  career_goals: Monica’s imagination often leads her to picture herself as a curious explorer or a kind scientist who discovers how things work, while also dreaming of helping others like a teacher or a
    doctor. She expresses a desire to keep learning new facts, share what she finds with friends, and grow up in a way that lets her stay free to play and explore.
