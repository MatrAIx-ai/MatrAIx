personas:
  professional: Madeline Compton, a 17‑year‑old teen event organizer who leverages her First Aid and CPR certification and knack for logistics to run beach volleyball tournaments and community karaoke nights,
    is eyeing a Certified Nursing Assistant credential or an associate degree in Hospitality Management to translate her people‑focused enthusiasm into a reliable, supervisory role.
  sports: Madeline Compton dominates local sand courts as a member of the Cape Coral Sand Storm beach‑volleyball club, cheers on the Tampa Bay Lightning and Tampa Bay Rays, and commits to weekly sunrise
    swims at Fort Myers Beach, balancing competitive play with a laid‑back coastal lifestyle.
  arts: Madeline Compton channels her outgoing spirit into community theater productions at the Cape Coral Playhouse, belts out karaoke classics from Beyoncé to Ed Sheeran, and captures golden‑hour marine
    wildlife on her iPhone, drawing inspiration from photographers like Chris Burkard and musicians such as Ariana Grande.
  travel: Madeline Compton plans low‑cost weekend getaways to nearby Sanibel Island and the Florida Keys, dreams of backpacking the Maldives for its coral reefs, and prefers group road trips with friends
    over solo travel, balancing her love for sun‑soaked relaxation with photography adventures.
  culinary: Madeline Compton loves whipping up simple yet vibrant dishes like grilled shrimp tacos with mango salsa, coconut‑lime smoothies, and avocado toast for her friends, experimenting with fresh local
    seafood while playlists of tropical house music set the kitchen vibe.
  core: Madeline Compton is a socially driven, meticulously organized teen who transforms beachside spontaneity into structured community events, all while juggling anxiety with mindfulness, budgeting quirks,
    and a habit of curating endless playlists.
background:
  cultural: Madeline grew up in a predominantly white, middle‑class neighborhood in Cape Coral, Florida, where a laid‑back coastal lifestyle blends with strong community values. Her family’s heritage includes
    English and Irish roots, and they maintain traditions of seasonal holidays, church gatherings, and backyard barbecues. The local culture emphasizes outdoor recreation, hospitality, and volunteerism,
    which shaped her love for beach activities, group sports, and community service. While she left formal schooling after eighth grade, she continues to embrace self‑directed learning and local youth programs,
    reflecting a blend of independence and the collaborative spirit of her hometown.
attributes:
  skills: '["First Aid/CPR certification", "Event planning and coordination", "Team communication and delegation", "Social media content creation and community engagement", "Peer counseling and active listening",
    "Basic budgeting and cooking", "Time management and scheduling"]'
  hobbies: '["Beach volleyball", "Swimming", "Community theater acting", "Karaoke singing", "Volunteer work at animal shelter", "Beach clean‑up projects", "Coastal photography", "Simple cooking and recipe
    experimentation", "Playlist curation for group events", "Journaling and mindfulness exercises"]'
  career_goals: Madeline aims to earn her GED within the next year and enrol in a community‑college program that aligns with her love for stable, people‑focused work. She is considering a certification
    as a Certified Nursing Assistant (CNA) to combine her caregiving skills with a reliable schedule, or pursuing an associate degree in Hospitality Management to work in the resort and tourism sector prominent
    in Cape Coral. Her long‑term ambition is to hold a supervisory role where she can use her organizational talents, provide supportive leadership, and maintain a predictable, structured work environment
    that balances her need for reliability with her sociable nature.
