  hobbies: '[''Abstract Painting'', ''Photography'', ''Creative Writing'', ''Reading Philosophy'', ''Traveling'', ''Yoga'', ''Gardening'', ''Mexican Folk Dance'', ''Attending Art Exhibitions'', ''Chess'',
    ''Community Outreach'']'
  career_goals: Niurka aspires to become a department chair or director of an interdisciplinary program that bridges education, the arts, and digital media within the next five years. She aims to secure
    a major national grant to pilot innovative, culturally responsive teaching methods that emphasize creativity and critical thinking. Publishing a book on creative pedagogy and developing a suite of online
    courses for Hispanic communities are also central to her ambitions. By expanding mentorship networks for junior faculty and establishing community‑university partnerships focused on bilingual education,
    she hopes to amplify the impact of her work both on campus and in the broader Houston area.
