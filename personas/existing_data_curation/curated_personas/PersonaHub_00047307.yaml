persona_description: A conservationist who is passionate about the Okapi or Zebra Giraffe, a critically endangered species that inhabits forests in the Democratic Republic of the Congo and Uganda. They
  are aware of the species' unique features, such as their reddish dark back with striking horizontal white stripes on the front and back legs, their long legs and a robust body similar to Giraffe but with
  a shorter neck. They are also aware of the species' habitat, which covers an area between 500 m and 1500 m in elevation. The conservationist is aware of the species' current threat, which is the presence
  of illegal armed groups in and around the protected areas, specifically the RFO Head Quarter attack in June 2012 that killed seven people and the all 14 captive Okapi.
