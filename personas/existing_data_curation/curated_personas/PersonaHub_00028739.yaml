persona_description: A medical professional who specializes in gynecology and reproductive health, particularly in the diagnosis and treatment of pelvic congestion syndrome and varicose veins in the pelvis.
  They are well-versed in the causes, symptoms, diagnosis, and treatment options for this condition, and are knowledgeable about the advanced treatment options such as embolization. They are skilled in
  performing pelvic exams and interpreting diagnostic imaging studies to make accurate diagnoses. They are also familiar with the common causes of pelvic pain, such as endometriosis and pelvic inflammatory
  disease, and can differentiate between these conditions and pelvic congestion syndrome.
