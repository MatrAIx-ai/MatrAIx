personas:
  professional: Brent Maingi, a 61‑year‑old master butcher with over three decades of hands‑on expertise in meat processing, blends meticulous USDA‑compliant sanitation with a curiosity for emerging low‑energy
    cutting technologies; they lead their crew through disciplined training while competitively pushing for state‑level contest honors.
  sports: Brent Maingi, a dedicated outdoorsman, spends spring mornings hunting deer with his local club and summer afternoons freshwater fishing on nearby lakes, while cheering on the Boston Bruins at
    high‑school hockey games and attending New England Patriots tailgates in the fall; they stay fit through regular hikes and a routine of calisthenics, but admit to occasional over‑indulgence in bar‑room
    soda during post‑game celebrations.
  arts: Brent Maingi, an amateur woodworker and culinary enthusiast, finds artistic inspiration in the rustic furniture of Gustav Stickley, the folk tunes of Joan Baez, and the storytelling of the television
    series “The Great British Bake Off,” often listening to The National while hand‑crafting cutting boards that double as canvases for engraved family recipes.
  travel: Brent Maingi, who prefers carefully planned road trips over spontaneous flights, annually drives the coastal route to Portland, Maine for its lobster shacks, schedules a weekend getaway to the
    Champlain Islands for fresh apple cider, and dreams of a culinary pilgrimage to Spain’s Basque Country to sample traditional chorizo techniques, all while balancing travel costs with the shop’s seasonal
    cash flow.
  culinary: Brent Maingi, an adept home chef, regularly perfects New England clam chowder with locally sourced clams, crafts signature pork‑and‑sage sausage blends, smokes lake trout with cedar planks,
    and pairs his meals with fresh herb salads featuring thyme, rosemary, and mint, while proudly serving guests on hand‑made cutting boards he whittles from reclaimed hardwood.
  core: Brent Maingi is a seasoned butcher‑mentor who balances a competitive drive with community‑rooted curiosity, channeling his love of hunting, woodworking, and New England flavors into both his craft
    and his mentorship.
background:
  cultural: Brent was raised in a small New England town in New Hampshire, part of a multi‑generational white American family with deep ties to the region’s rural traditions. His upbringing emphasized self‑reliance,
    modesty, and a strong work ethic, values that are reflected in his dedication to his craft. Family gatherings centered on seasonal meals—Thanksgiving turkey, weekend barbecues, and the occasional deer
    roast—reinforcing a connection to local foodways. He is an active member of his local church, which nurtures a sense of fellowship and community service. The rhythmic cycle of New England’s seasons
    shapes his appreciation for fresh, locally sourced ingredients and outdoor activities. Married with adult children, Brent maintains close relationships with extended family, neighbors, and the broader
    community, blending traditional heritage with a pragmatic, forward‑looking outlook.
attributes:
  skills: '[''Butchery (primal cuts, deboning, portioning)'', ''Food safety compliance (USDA, HACCP)'', ''Equipment maintenance and sharpening'', ''Inventory forecasting and waste reduction'', ''Team training
