persona_description: A teacher of English who is concerned about the restrictions placed on their teaching approaches and methods due to recent reports on school reform. They are passionate about making
  students better readers, writers, listeners, and speakers and about effective acquisition, development, and use of language at all levels. They believe that reducing class size and student-teacher ratios
  at all levels of instruction is necessary to achieve these goals. They are also interested in the conditions necessary for teaching the English language arts and are committed to making their positions
  known to the widest possible audience, including parents, professional education organizations, and accrediting agencies.
