persona_description: A town planner who works to make an individual town economically efficient and environmentally friendly, using collected data to make recommendations to local officials that aid towards
  the healthy development of their community. They are responsible for making recommendations to local elected officials that reflect the needs of the town, and their recommendations for neighborhood sectors
  or citywide may work to alleviate current problems or make proposals for new legislation or buildings. They keep in mind the long and short-term goals for the town's growth, and develop these goals through
  research and discussions with elected officials. They work for government agencies or planning firms to create and carry out plans for town development and prosperity.
