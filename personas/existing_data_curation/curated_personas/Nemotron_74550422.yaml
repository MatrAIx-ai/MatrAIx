personas:
  professional: Savannah Tholen is a budding pretender scientist, arranging building blocks into experimental labs while they pose endless "why" questions, and their blend of organization and flexibility
    ensures each play session ends with a tidy lab and a surprising new hypothesis.
  sports: Savannah Tholen delights in the toddler gymnastics class at BrightKids Center, laces up tiny soccer shoes for the Tiny Tots FC weekly drills, and while they cheer for the hometown baseball team,
    the Chicago Cubs, during weekend family outings.
  arts: Savannah Tholen spends afternoons finger‑painting abstract swirls inspired by Dr. Seuss’s vivid illustrations, they sing along to Raffi’s "Baby Beluga," and mimic the lively dance moves of The Wiggles,
    turning their boundless imagination into colorful creative expression.
  travel: Savannah Tholen loves short family road trips to the local zoo and the sandy shoreline at Seaside Beach, they dream of a magical visit to Disney World and the sparkling lights of the Eiffel Tower
    in Paris, and they prefer flexible itineraries that allow for spontaneous sandcastle building and nap breaks.
  culinary: Savannah Tholen prefers soft, mildly sweet foods such as mashed sweet potatoes, banana slices, and kid‑friendly macaroni and cheese, they enjoy pretend cooking with a play‑kitchen set, and occasionally
    sneaks a bite of the seasoned chicken nuggets their parents reserve for dinner.
  core: Savannah Tholen is a wildly imaginative three‑year‑old whose curiosity fuels endless pretend adventures, yet they often fret over minor disruptions, turning everyday moments into creative play while
    occasionally resisting bedtime routines.
background:
  cultural: 'Savannah is being raised in a predominantly white, middle‑class family in Cleveland, Ohio. Her household reflects typical Midwestern values: politeness, community involvement, and a strong
    emphasis on safety and routine. Family traditions include celebrating Thanksgiving, Christmas, and local community fairs, where she experiences live music, art workshops, and seasonal foods. She attends
    a nearby public preschool that offers arts‑and‑crafts sessions and storytime at the Cleveland Public Library, exposing her to a blend of American mainstream culture and the city’s rich artistic heritage.
    These experiences shape her sense of identity while nurturing her imaginative and curious nature.'
attributes:
  skills: '[''advanced language development'', ''fine motor coordination (crayon drawing, block building, puzzle solving)'', ''color and shape recognition'', ''creative storytelling'', ''basic problem‑solving'',
