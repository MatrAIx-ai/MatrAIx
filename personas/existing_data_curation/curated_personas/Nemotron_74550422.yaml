  hobbies: '[''crayon drawing and color blending'', ''block tower construction'', ''listening to and dancing to children’s music'', ''picture‑book storytime'', ''pretend play (explorer, astronaut)'', ''sand
    play and texture organization'']'
  career_goals: Savannah expresses a bright desire to become someone who creates—she talks about wanting to paint pictures that make people smile, build things like rockets, and tell stories that feel magical.
    She often says she wants to be a 'painter' or a 'space explorer' and hopes to grow up learning science and art side by side. Her long‑term ambition is to turn her love of imagination into a career where
    she can share beautiful, novel ideas with others, perhaps as an artist, illustrator, or scientist‑inventor.
