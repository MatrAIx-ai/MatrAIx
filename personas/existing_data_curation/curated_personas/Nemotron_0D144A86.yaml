  hobbies: '[''Visiting art galleries'', ''Live music concerts'', ''Beach volleyball'', ''Salsa dancing'', ''Yoga and mindfulness'', ''Photography'', ''Volunteer beach clean-ups'', ''Hosting game nights'',
    ''Cooking for friends'', ''Exploring new coffee shops'']'
  career_goals: Brianna aims to advance from her current sales manager role to a regional director position within the next five years, overseeing multiple teams across the Gulf Coast. She plans to pursue
    an MBA part-time to deepen her strategic and financial expertise. Her long-term ambition is to combine her love of art and community engagement by launching a boutique agency that creates experiential
    sales events for cultural and lifestyle brands. She also hopes to mentor younger sales professionals, advocating for mental-health awareness in the workplace, and eventually establish a flexible work
    environment that supports both creativity and emotional well-being.
