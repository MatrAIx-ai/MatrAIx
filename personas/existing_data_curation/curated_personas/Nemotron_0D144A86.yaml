personas:
  professional: Brianna Bruno, a 21‑year‑old sales manager at a Gulf‑coast lifestyle brand, leverages HubSpot and Salesforce to build visually‑rich, art‑infused sales campaigns, coaching her team through
    spontaneous brainstorming sessions that reflect her curiosity and high emotional intelligence, even as anxiety sometimes fuels disorganization.
  sports: Brianna Bruno spends her evenings playing beach volleyball with the Bradenton Beach Barracudas, practices salsa at the Downtown Dance Studio, follows the Tampa Bay Buccaneers and Rays, and maintains
    a weekly yoga routine to keep her anxiety in check.
  arts: Brianna Bruno immerses herself in the local art scene, snapping sunrise shots of the Gulf for her Instagram while attending live shows by indie artists like Phoebe Bridgers and Maggie Rogers at
    the Beachside Music Pavilion, and curating her own mini‑exhibits of friends’ photography at the Light House Art Gallery.
  travel: Brianna Bruno prefers spontaneous weekend road trips along the Gulf Coast to places like Siesta Key in Sarasota, the vibrant streets of New Orleans during Mardi Gras, and occasional budget flights
    to Barcelona for its beach art festivals, balancing her love of exploration with a tight student‑loan budget.
  culinary: Brianna Bruno enjoys whipping up eclectic meals—seasoned grouper tacos with mango salsa, a Thai coconut‑lime soup, and, during holiday weekends, gingerbread cookies baked from her family’s traditional
    recipes—though she often improvises with pantry staples when a grocery run slips her mind.
  core: Brianna Bruno is a 21‑year‑old art‑obsessed sales whiz whose fierce curiosity and mellow beach vibe coexist with a jittery anxiety that fuels late‑night journaling, spontaneous salsa spins, and
    an ever‑growing collection of sunrise photographs.
background:
  cultural: Raised in Bradenton, Florida, Brianna grew up in a coastal, tourism-driven community that blends Southern hospitality with a laid-back beach lifestyle. Her family, of Northern European descent,
    maintains traditions such as holiday baking and annual trips to the nearby Manatee County Fair. She is fluent in the regional dialect and values the multicultural influx of visitors, which has given
    her an appreciation for diverse artistic expressions and cuisines. The proximity to the Gulf has shaped her love of outdoor activities, seafood, and seasonal festivals, while her upbringing in a middle-class
    household emphasized education, hard work, and community involvement.
