  hobbies: '["Pottery", "Watercolor painting", "Desert photography", "Reading (science‑fiction, history, art history)", "Gardening (succulents and native cacti)", "Hiking low‑elevation trails", "Attending
    theater productions", "STEM mentorship (high‑school robotics)", "Yoga and meditation"]'
  career_goals: Although retired, Clara remains goal‑oriented. She hopes to expand the senior‑run community garden she helped start, integrating native plants that support local pollinators. She aims to
    develop a series of informal workshops that blend science and art, teaching neighborhood seniors how to document desert flora through photography and simple data collection. Clara also aspires to complete
    a reflective memoir that weaves her experiences in engineering, lifelong learning, and her love of the arts, and to master digital painting using a tablet. She sees these pursuits as ways to leave a
    meaningful legacy and stay intellectually engaged.
