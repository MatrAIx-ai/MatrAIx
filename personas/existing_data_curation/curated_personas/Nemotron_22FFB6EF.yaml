personas:
  professional: Clara Wingard, a retired environmental engineer, channels her expertise in hydrologic modeling and GIS into leading a senior‑run community garden and mentoring a high‑school robotics club,
    blending data‑driven insight with a love of desert art while allowing her naturally relaxed approach to scheduling to foster creativity.
  sports: Clara Wingard hikes the gentle, low‑elevation trails of the McDowell Sonoran Preserve, watches the Arizona Diamondbacks on weekend game nights with friends at a local sports bar, and participates
    in a senior walking group organized by Mesa Parks, preferring steady, low‑impact activity over high‑intensity competition.
  arts: Clara Wingard immerses herself in Mesa’s vibrant art scene, attending weekly pottery and watercolor workshops, photographing desert sunrises inspired by Ansel Adams, and enjoying productions by
    the Arizona Theatre Company, while her collection of Georgia O’Keeffe desert prints fuels her creative projects.
  travel: Clara Wingard enjoys relaxed road trips to nearby desert gems like Sedona and the Grand Canyon for sunrise photography, and she dreams of a cultural pilgrimage to Barcelona to explore its modernist
    architecture, favoring carefully planned itineraries that balance exploration with ample rest.
  culinary: Clara Wingard delights in southwestern flavors, often preparing green chile enchiladas, prickly pear salsa, and succulent‑infused salads, while her modest cooking skill shines when she experiments
    with cactus pads (nopal) and fresh rosemary harvested from her own garden.
  core: Clara Wingard melds a veteran engineering mind with a curious artistic spirit, using data to nurture a senior garden, capture desert light, and mentor youth, all while navigating occasional forgetfulness
    and a relaxed stance toward strict schedules.
background:
  cultural: Clara grew up in a middle‑class family in the Midwest, where a strong emphasis on education and community service shaped her early values. After completing her graduate studies in engineering,
    she built a career in the western United States, eventually retiring to Mesa, Arizona. The desert environment and the Southwest’s rich artistic traditions have become integral to her identity, reflected
    in her love for native‑plant gardening and appreciation for regional art, including Indigenous motifs. While her cultural roots remain grounded in a broadly American, white Midwestern heritage, she
    embraces the multicultural tapestry of the Mesa community, participating in local festivals and intergenerational programs.
