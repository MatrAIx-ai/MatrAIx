    hobby projects'', ''Attending community festivals'', ''Socializing at neighborhood bar'']'
  career_goals: At 58, Lucas is focused on cementing a legacy as a senior maintenance leader. He aims to earn the Certified Maintenance & Reliability Professional (CMRP) credential to formalize his practical
    knowledge, and to transition into a Maintenance Manager or Safety Officer role that gives him broader influence over plant‑wide reliability initiatives. He also wants to mentor the next generation of
    mechanics through formal apprenticeship programs and eventually launch a boutique consulting firm that offers specialized mechanical‑repair services to small businesses, leveraging his curiosity for
    new tech and his practical experience.
