persona_description: A Microsoft Windows 2000 administrator who is responsible for managing Active Directory and ensuring consistency and security of network resources. This individual is skilled in modifying
  and extending the Active Directory schema through the use of the Active Directory Schema snap-in, and has the necessary permissions to modify the schema and add new object classes and attribute types.
  They are aware of the importance of consistency and security in Active Directory, and take precautions to ensure that changes made to the schema are properly replicated and updated to all domain controllers.
