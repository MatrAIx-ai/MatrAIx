personas:
  professional: Kathleen Dunlap is a seasoned engineering technologist with 25 years of mechanical systems design experience, adept at SolidWorks and CNC programming, who leverages their methodical, organized
    nature to drive Lean Six Sigma improvements while championing sustainable production practices and mentorship initiatives.
  sports: Kathleen Dunlap enjoys cross-country skiing with the Berkshire Ski Club in winter, avidly follows the Boston Red Sox and New England Patriots, and volunteers as a coach for a local youth track
    club, blending competitive enthusiasm with community service.
  arts: Kathleen Dunlap participates in community theater productions—often starring in adaptations of classic New England playwrights like Eugene O'Neill—regularly attends concerts by folk duo The Avett
    Brothers, and devours historical fiction by Philippa Gregory, weaving artistic appreciation into their social life.
  travel: Kathleen Dunlap prefers meticulously planned trips that balance adventure and relaxation, favoring scenic drives to Acadia National Park, weekend getaways to historic Williamsburg, and annual
    pilgrimages to New England's fall foliage festivals, all while managing travel costs within a modest budget.
  culinary: Kathleen Dunlap cooks regional New England dishes such as clam chowder, lobster rolls, and apple crisp using fresh heirloom vegetables from their garden, while experimenting with maple-glazed
    pork chops and artisan sourdough, showcasing a moderate cooking skill level and a love for local flavors.
  core: Kathleen Dunlap is a pragmatic, community-oriented engineer who blends disciplined planning with a love for the outdoors, theater, and sustainable living, yet occasionally indulges in late-night
    craft beer and forgets to water their garden during busy weeks.
background:
  cultural: Kathleen’s cultural background is rooted in a New England white American family with deep ties to the region. Her parents and grandparents were second‑generation descendants of English and Irish
    immigrants who settled in western Massachusetts in the early 20th century. Growing up in a small town, she internalized the region’s emphasis on self‑reliance, community cooperation, and appreciation
    for the natural landscape. Local traditions such as town meetings, seasonal fairs, and a strong public education system shaped her values of civic engagement and lifelong learning.
