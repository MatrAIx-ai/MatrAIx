  career_goals: She aims to transition into a senior technologist or engineering manager role within a mid-sized manufacturing firm, focusing on implementing sustainable production practices and leading
    continuous improvement initiatives. Kathleen also aspires to develop a regional STEM mentorship program for high school students, especially encouraging women and underrepresented groups to pursue technical
    careers, and eventually serve as an industry consultant for renewable energy projects in the Berkshires.
