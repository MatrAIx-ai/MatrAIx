persona_description: A philosopher who specializes in the study of mythology, particularly the mythologies of ancient Greece and Egypt. Her research interests include, but are not limited to, the analysis
  of the roles of gods and goddesses in the myths, the interpretation of the symbolism of the myths, and the examination of the cultural and social implications of the myths. She is particularly interested
  in the ways in which the myths reflect the values and beliefs of the societies that created them.
