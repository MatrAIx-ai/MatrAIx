personas:
  professional: Craig is a reliable production worker at a midsize manufacturing plant; they excel at operating CNC machines, forklifts, and conveyor systems, and they leverage their curiosity for electronics
    and woodworking to streamline processes, apply lean principles, and mentor teammates, aiming to transition into a supervisory role while pursuing Six Sigma Green Belt certification.
  sports: Craig is a dedicated fan of the St. Louis Cardinals, never missing a regular‑season game; they also support the St. Louis Blues, and they participate in the St. Louis Cycling Club’s weekend rides
    through Forest Park, hike the Missouri River trails, and maintain a membership at Fit Factory gym where they do strength training to complement their outdoor activities.
  arts: Craig enjoys the eclectic sounds of The Strokes and Bon Iver, often listening to their albums while tinkering with Arduino projects; they attend live performances at the Sheldon Concert Hall, where
    they recently saw a local folk band, reflecting their appreciation for both modern indie music and community cultural events.
  travel: Craig prefers road‑trip adventures that blend nature and small‑town charm; they have explored the Ozark National Forest, taken a weekend getaway to Nashville for its music scene, and are planning
    a future hike in Banff National Park, while balancing their travel budget with the goal of homeownership.
  culinary: Craig’s cooking revolves around quick, hearty meals like St. Louis‑style pizza topped with pepperoni and mozzarella, grilled chicken tacos seasoned with cumin and lime, and occasional weekend
    attempts at homemade sourdough; they favor ingredients such as fresh basil, local honey, and smoked paprika, though they often leave the kitchen a mess.
  core: Craig is a hands‑on production specialist who merges curiosity with practicality; they balance an active outdoor life, a love for DIY electronics, and a steady march toward financial security and
    supervisory leadership, all while juggling a friendly social circle and occasional caffeine‑driven late‑night gaming sessions.
background:
  cultural: Craig grew up in a working‑class neighborhood of St. Louis, Missouri, within a family that identifies as white Midwestern American with roots tracing back to European immigrants, primarily of
    Italian and Spanish descent. While English is his primary language, family gatherings sometimes include a few Spanish phrases, reflecting his heritage. The community values hard work, modesty, and neighborly
    support, which shaped Craig's cooperative and considerate personality. He celebrates typical American holidays—Thanksgiving, Independence Day, and Christmas—while also honoring family traditions such
    as making homemade tamales during the holidays, a nod to his ancestral cuisine. This blend of Midwestern pragmatism and multicultural family customs informs his balanced outlook on life.
attributes:
  skills: '[''Operating CNC machines'', ''Manual assembly line work'', ''Quality inspection and documentation'', ''Safety compliance (OSHA)'', ''Basic equipment maintenance'', ''Inventory tracking and data
    entry'', ''Lean manufacturing principles (5S, visual controls)'', ''Forklift operation (certified)'', ''Team collaboration and shift coordination'', ''Troubleshooting mechanical issues'']'
  hobbies: '[''Cycling around Forest Park'', ''Weekend hiking on Missouri River trails'', ''DIY electronics projects (Arduino, Raspberry Pi)'', ''Woodworking (small furniture and décor)'', ''Playing strategy
    and simulation video games with friends'', ''Attending St. Louis Cardinals baseball games'', ''Volunteering at the local food bank'']'
  career_goals: Craig aims to move from a front‑line production role into a supervisory position within the next three to five years. He plans to enroll in an associate‑degree program in industrial technology
    at a community college while pursuing Six Sigma Green Belt certification to deepen his process‑improvement expertise. Long‑term, he envisions a career in production planning or quality assurance, where
    he can combine his practical know‑how with his curiosity for new manufacturing technologies. Alongside professional growth, Craig hopes to achieve financial stability that will enable homeownership
    and eventually support a family.
