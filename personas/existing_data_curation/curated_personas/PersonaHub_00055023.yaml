persona_description: A researcher in the field of ornithology, focusing on the study of avian song repertoires, song variation, and song complexity. They have expertise in comparative analyses of song repertoires
  in different avian taxa and have published research on the evolution of song repertoire size in the genus Vireo. They have also conducted field work in Costa Rica on song variation in woodcreepers and
  song-sharing in White-breasted Wood-Wrens. Additionally, they have experience with the use of song repertoires as a tool for understanding avian behavior and ecology.
