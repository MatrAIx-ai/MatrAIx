  career_goals: Cherlyn aims to re‑enter the workforce in a part‑time, people‑focused role such as community liaison, event coordinator for a local nonprofit, or front‑desk position at a small business
    where her communication and organizational talents can shine. She is exploring the possibility of launching a home‑based catering or baked‑goods service that leverages her cooking skills and love of
    hosting. To strengthen her qualifications, she plans to complete a GED or enroll in a community college hospitality management certificate program. Long‑term, she hopes to take on a leadership role
    in community initiatives, perhaps serving on a city council committee or spearheading a neighborhood volunteer network, while building financial independence and stability.
