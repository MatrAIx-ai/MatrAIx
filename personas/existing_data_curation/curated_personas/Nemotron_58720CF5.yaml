personas:
  professional: Troy Alsobrooks, a budding mini‑engineer, delights in constructing block towers with meticulous precision, cataloguing each piece by color and size, thereby showcasing a rare blend of early
    curiosity and practical, methodical planning.
  sports: Troy Alsobrooks, a participant in the local 'Mini Kickers' soccer clinic and a weekend toddler gymnastics class, cheers for the nearby 'Hurricanes' youth team, enjoys the structured drills of
    organized play while still relishing solo sandbox moments, blending social interaction with needed alone time.
  arts: Troy Alsobrooks, an avid follower of Sesame Street and Disney’s animated classics, spends afternoons finger‑painting jungle scenes, drumming along to 'Baby Shark', and collecting stickers of beloved
    characters, channeling curiosity and organization into creative expression.
  travel: Troy Alsobrooks, a curious explorer who loves family road trips to the Springfield Zoo and weekend beach outings, prefers meticulously planned stroller routes with frequent snack stops, yet dreams
    of an upcoming Disneyland adventure where they can finally ride the teacups.
  culinary: Troy Alsobrooks, a selective eater who craves cheesy macaroni, chicken nuggets, and sweet banana slices, enjoys assisting with stirring oatmeal under close supervision, but fiercely resists
    trying new vegetables, often bargaining for extra fruit as a snack.
  core: Troy Alsobrooks, a methodical mini‑explorer, balances relentless curiosity with tidy routines, hoards stickers, and negotiates snack deals with adorable tenacity.
background:
  cultural: Troy is an African‑American toddler raised in Birmingham, Alabama, within a close‑knit Southern Black family. His upbringing includes regular attendance at a local Baptist church, participation
    in family gatherings featuring soul food and barbecues, and exposure to community celebrations such as Juneteenth and local festivals. The cultural emphasis on family, faith, storytelling, and respect
    for elders shapes his early worldview and daily experiences.
