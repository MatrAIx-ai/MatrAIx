personas:
  professional: Roberto Avalos, a 19‑year‑old automotive technician at a Twin Falls garage, blends ASE‑level mastery of hybrid and electric power‑trains with a keen eye for custom paint and graphics, using
    his bilingual fluency to translate complex repairs into trusted service for Spanish‑speaking customers.
  sports: Roberto Avalos spends his free time hiking the Snake River Canyon, fishing at Twin Falls Reservoir, competing in local go‑kart races, riding his refurbished motorcycle along scenic backroads,
    and cheering for the Idaho Falls Chukars, all while maintaining a flexible fitness regimen that mixes cardio rides with occasional weight‑lifting sessions at the community gym.
  arts: Roberto Avalos channels his creativity into street‑art sketches and digital vehicle wraps inspired by the vivid palettes of Frida Kahlo and the graphic flair of local muralist Eduardo García, while
    his playlists shuffle between regional Mexican legends like Los Tigres del Norte and indie rock icons such as The Strokes, fueling both his work and his downtime.
  travel: Roberto Avalos prefers spontaneous road‑trip escapades over rigid itineraries, having already rolled into Austin for a music festival and now plotting a drive along the Pacific Coast Highway to
    Big Sur, all while setting aside savings to someday explore the colorful street‑art districts and traditional festivals of Oaxaca.
  culinary: Roberto Avalos proudly prepares aromatic mole poblano and hand‑rolled tamales for family celebrations, masters grilled trout seasoned with chipotle and fresh cilantro after a day on the reservoir,
    and experiments with epazote and roasted corn when crafting weekend taco brunches, though he occasionally over‑spices his dishes in his enthusiasm.
  core: Roberto Avalos is a 19‑year‑old gear‑obsessed mechanic‑artist whose competitive drive fuels midnight engine rebuilds, vibrant car‑wrap designs, and an occasional habit of forgetting to charge his
    phone before a long ride.
background:
  cultural: Roberto was raised in a Mexican‑American household where Spanish is spoken daily and family gatherings revolve around traditional celebrations such as Día de los Muertos, Cinco de Mayo, and
    holiday feasts featuring mole and tamales. His parents instilled a strong work ethic and respect for community, values that resonate with the close‑knit atmosphere of Twin Falls. While adapting to life
    in rural Idaho, he has blended his Mexican heritage with the local car culture, often incorporating vibrant colors and folk motifs into his vehicle customizations. He maintains ties to both cultures
    by volunteering at the local Hispanic outreach center, helping newer immigrants navigate English‑language resources, and by attending art festivals that showcase Mexican and Native American artists.
attributes:
  skills: '[''automotive diagnostics (OBD‑II)'', ''engine repair and rebuilding'', ''transmission maintenance'', ''electrical system troubleshooting'', ''fuel system repair'', ''welding and metal fabrication'',
    ''custom paint and vehicle wrap design'', ''inventory management'', ''safety compliance'', ''bilingual customer service (Spanish/English)'', ''hydraulic lift operation'', ''basic refrigeration for HVAC
    systems in vehicles'']'
  hobbies: '[''sketching and digital illustration'', ''custom vehicle wrap design'', ''listening to regional Mexican music'', ''listening to classic rock'', ''hiking in Snake River Canyon'', ''fishing in
    local reservoirs'', ''motorcycle riding'', ''go‑kart racing'', ''attending automotive meet‑ups'', ''racing simulators'', ''reading automotive tech blogs'', ''cooking Mexican cuisine'', ''playing guitar'']'
  career_goals: He aims to become an ASE Master Technician within the next five years, focusing on hybrid and electric power‑train systems to position himself at the forefront of the industry’s shift toward
    greener vehicles. Roberto plans to enroll in a community‑college automotive technology program to earn advanced certifications, and he hopes to compete in regional car‑modification contests to showcase
    his blend of technical skill and artistic design. In the longer term, he dreams of opening his own boutique garage in Twin Falls that offers high‑performance repairs, custom painting, and a bilingual
    service desk, providing a welcoming environment for the growing Hispanic community. He also envisions mentoring younger apprentices, passing on both his mechanical expertise and his appreciation for
    creative problem‑solving.
