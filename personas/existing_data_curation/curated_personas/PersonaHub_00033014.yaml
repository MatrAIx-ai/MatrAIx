persona_description: A physical therapist who specializes in treating concussion and dizziness, using a combination of physical therapy, manual therapy, and mental challenges to help patients recover from
  their injuries. They are trained in assessing risk for falls, developing individualized treatment programs, and working with patients to improve balance, strength, and mobility. They collaborate with
  other health care providers in the Des Moines area for concussion management, and are currently offering in-clinic and virtual appointments for patients.
