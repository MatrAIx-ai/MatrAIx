  career_goals: Although retired from formal employment, Jayna aims to deepen her involvement in the Newburgh community. She plans to obtain a certificate in horticulture to enhance her gardening workshops
    for seniors, and she hopes to become a mentor for younger volunteers at the local senior center, sharing her organizational expertise. Jayna also aspires to document the town's history by compiling
    oral histories and writing a series of articles for the county newspaper, eventually publishing a small memoir that weaves together her family’s genealogy and Midwestern heritage. Maintaining her independence
    and mental sharpness drives her to keep learning new technologies—such as advanced digital photography techniques—while remaining cautious and pragmatic about their adoption. She also wishes to secure
    a modest legacy for her grandchildren by establishing a small scholarship fund for local high‑school students interested in agriculture or community service.
