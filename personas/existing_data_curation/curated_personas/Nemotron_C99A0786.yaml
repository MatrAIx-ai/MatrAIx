personas:
  professional: Andres Reyes, a retired mechanical engineer who applies their strong analytical mind and bilingual fluency to mentor high‑school students in hands‑on STEM projects, troubleshoot community
    DIY repairs, and experiment with modest solar panel installations at home, embodies a blend of curiosity and practicality in every technical endeavor.
  sports: Andres Reyes enjoys low‑impact fitness through early‑morning fishing along the Gulf coast with the Gulf Coast Senior Fishing Club, casual walks with the local senior walking group, and fervently
    supports the Houston Astros in baseball season while occasionally joining friendly senior baseball scrimmages, preferring the calm of the water over high‑intensity workouts.
  arts: Andres Reyes immerses themselves in the arts by listening to classic mariachi ensembles such as Mariachi Vargas de Tecalitlán and Norteño legends like Los Tigres del Norte while savoring the storytelling
    of historical biographers like David McCullough, and they often spend quiet evenings admiring Frida Kahlo’s paintings and local pottery, letting these cultural touches shape their creative outlook.
  travel: Andres Reyes prefers spontaneous, low‑stress travel, often planning short road trips to nearby historic towns like San Antonio and New Orleans on a modest budget, while dreaming of a pilgrimage
    to their ancestral hometown in Jalisco, balancing a love for quiet sightseeing with the practical need to stay within retirement savings.
  culinary: Andres Reyes, a proficient home cook, delights in preparing traditional Mexican dishes such as tamales, chiles en nogada, and pozole, meticulously using heirloom tomatoes, dried pasilla chilies,
    fresh cilantro, and locally sourced cheese, and they take pride in sharing their flavorful meals with their spouse and occasional visitors, while constantly experimenting with new herb blends in the
    garden.
  core: Andres Reyes blends a lifelong curiosity for practical problem‑solving with a relaxed, sometimes forgetful streak—often misplacing their trusty wrench while humming mariachi, yet always finding
    time to tend heirloom tomatoes, mentor teens, and dream of solar‑powered mornings.
background:
  cultural: Andres was born to Mexican parents who immigrated from Jalisco in the 1950s and grew up in the Rio Grande Valley. He was raised bilingual, speaking Spanish at home and English at school, which
    gave him fluency in both cultures. Family life centered around Mexican traditions such as Día de los Muertos, quinceañeras, and communal meals featuring homemade mole and posole, while also embracing
    Texan customs like community barbecues and high school football games. A lifelong Catholic, he remains active in his local parish in Bishop, TX. This blend of Mexican heritage and Texan ranching culture
    instilled values of hard work, respect for family, and community cooperation. He maintains strong ties with relatives in Mexico and across the United States, often traveling to visit his hometown and
    sharing cultural stories with his grandchildren.
