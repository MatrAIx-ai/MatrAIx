  career_goals: Although retired, Andres aims to stay intellectually active by learning about renewable energy technologies and experimenting with solar installations at home. He aspires to volunteer as
    a STEM mentor for local high school students, helping them with hands‑on projects and problem‑solving strategies. Andres also wishes to document his family’s genealogy and preserve oral histories for
    future generations, while maintaining good health through regular walking and community activities. Travel to his ancestral hometown in Jalisco remains a personal ambition.
