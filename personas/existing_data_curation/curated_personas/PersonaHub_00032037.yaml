persona_description: An Israeli architect who specializes in low-tech water collection and purification methods. He is a graduate student at the Technion-Israel Institute of Technology and has developed
  a device called "WatAir" that collects dew from the air and turns it into fresh water. His invention won an international competition for making clean, safe water available to millions around the world.
  He is interested in simple, effective solutions that utilize tried and tested technology and draws inspiration from nature. He is based in Haifa, Israel.
