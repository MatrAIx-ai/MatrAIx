  career_goals: Cedric often talks about becoming an astronaut because he loves looking at the night sky, and he also dreams of creating big murals that brighten his neighborhood. He hopes to explore space
    and draw the planets he visits, combining his curiosity for new ideas with his love for art. He imagines leading a team of friends on fun quests, showing his competitive drive while wanting to be recognized
    for his creative problem‑solving.
