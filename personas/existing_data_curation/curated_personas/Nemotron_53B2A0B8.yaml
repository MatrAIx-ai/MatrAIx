personas:
  professional: Cedric Hawkins, an aspiring mini architect, spends hours building imaginative structures with LEGO bricks, demonstrating early spatial reasoning and a meticulous yet flexible approach to
    design, while their competitive streak drives them to challenge peers in construction contests.
  sports: Cedric Hawkins, a spirited member of the local Little League baseball team and an enthusiastic junior soccer club participant, idolizes the New York Yankees and Manchester United, thriving on
    friendly competition and often organizing backyard relay races with peers to channel their energetic, competitive nature.
  arts: Cedric Hawkins, a budding painter who loves splashing colors on large paper canvases, is fascinated by the whimsical world of Disney’s Moana, the animated storytelling of Pixar’s Toy Story, and
    the playful rhythms of children’s musician Raffi, often mimicking scenes with crayon sketches while proudly displaying their art on the fridge.
  travel: Cedric Hawkins, an adventurous five‑year‑old, has already explored the local zoo, the bright lights of Disneyland, and the sandy shores of Florida’s Gulf Coast, and dreams of visiting the towering
    Eiffel Tower in Paris and a safari in Kenya, favoring trips that blend interactive play zones with family‑friendly guided tours.
  culinary: Cedric Hawkins enjoys the classic comfort of mac‑and‑cheese with extra cheddar, delights in crunchy chicken nuggets dipped in honey‑mustard, and shows budding culinary curiosity by helping stir
    batter for banana pancakes, often insisting on adding a dash of cinnamon for extra flavor.
  core: Five‑year‑old Cedric Hawkins is a curious, competitive whirlwind who balances meticulous organization with spontaneous play, loves building LEGO fortresses, saves pennies for prized toys, and never
    misses a chance to splash color on a canvas.
background:
  cultural: Cedric grows up in a close‑knit Black family in Houston’s Third Ward, where community and cultural heritage are celebrated. His parents and grandparents share stories of the civil‑rights movement
    and Juneteenth celebrations, and he participates in church Sunday school where gospel music and African‑American traditions are taught. He attends the local community center’s art workshops, which often
    incorporate elements of African‑American visual art, such as vibrant murals and storytelling through paint. He is exposed to the city’s rich musical scene, hearing blues, jazz, and contemporary hip‑hop,
    which influences his taste and rhythmic sense. Family gatherings feature soul food and lively conversation, reinforcing a sense of pride in his heritage and encouraging him to be curious about the world.
