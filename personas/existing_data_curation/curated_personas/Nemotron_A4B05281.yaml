  hobbies: '[''Soccer'', ''LEGO building'', ''Desert hiking and nature sketching'', ''Scratch programming'', ''Reading adventure novels'', ''Cartoon drawing'', ''Spanish music and guitar'', ''Cooking traditional
    Spanish meals'', ''Organizing school club events'', ''Participating in community festivals'']'
  career_goals: Jose dreams of turning his love of building and helping others into a career that makes a tangible difference. He envisions becoming a civil engineer who designs safe playgrounds and community
    parks in the desert, merging his curiosity about structures with a practical desire to improve his neighborhood. He also hopes to work as a science teacher one day, inspiring younger students to ask
    questions while providing clear, step‑by‑step learning paths. Because he cares deeply about his friends’ wellbeing, he occasionally imagines a future as a pediatric health advocate, ensuring kids have
    access to health resources. Jose’s long‑term ambition is to stay connected to his community, using his technical skills and empathetic nature to create spaces where curiosity can thrive without causing
    stress.
