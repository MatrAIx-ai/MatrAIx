personas:
  professional: Jose Andelis, a budding young coder and LEGO engineer, translates their curiosity and practicality into Scratch animations and custom LEGO modifications while reliably coordinating school
    club events and occasionally fretting over missed deadlines.
  sports: Jose Andelis, an energetic member of the Sandia Rangers youth soccer team, plays every Saturday at the local park, cheers for New Mexico United in the USL Championship, and joins weekend family
    hikes in the Sandia Mountains to build stamina, though they sometimes stay out too late and miss the next day's practice.
  arts: Jose Andelis, who sketches cartoons inspired by Adventure Time and practices guitar to the flamenco rhythms of Camarón de la Isla, dances enthusiastically to the beat, devours the Harry Potter adventure
    series, and occasionally doodles entire comic strips during math class, much to the teacher's chagrin.
  travel: Jose Andelis, an avid explorer of the Southwest, has camped under the stars of the Sandia Mountains, visited the historic plaza of Santa Fe, dreamed of seeing the Eiffel Tower in Paris, and prefers
    itineraries that blend nature hikes with quick cultural stops, though they sometimes lose track of time and rush the family's return flight.
  culinary: Jose Andelis, who assists in cooking paella by carefully measuring saffron and rice, loves to toast churros with cinnamon sugar, frequently experiments with creating a LEGO-shaped sandwich,
    and often burns the toast while daydreaming about the next LEGO set.
  core: Jose Andelis, a curious yet anxious ten-year-old, balances a love for soccer, LEGO, coding, and family traditions while juggling worry-driven perfectionism and a penchant for losing track of homework
    when playtime beckons.
background:
  cultural: Jose grows up in a bilingual Spanish‑American household in Albuquerque, where his family blends traditions from Spain with the vibrant Hispanic culture of New Mexico. At home, Spanish is spoken
    daily, and holidays such as Día de los Reyes and Cinco de Mayo are celebrated with family meals, music, and dance. He enjoys classic Spanish foods like tortilla wraps and paella, as well as New Mexican
    specialties such as green chile stew, reflecting the region’s culinary mix. The desert environment shapes his appreciation for outdoor activities and the local art scene, and he frequently attends community
    events like the Albuquerque International Balloon Fiesta, where he feels a strong sense of belonging to both his Spanish roots and his Southwestern community.
