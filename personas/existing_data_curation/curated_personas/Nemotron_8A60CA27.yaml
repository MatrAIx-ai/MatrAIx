personas:
  professional: Roberto Portela, an 85‑year‑old retired import‑export entrepreneur, blends his reliable, organized nature with a curious, open‑minded spirit to mentor aspiring business owners, using his
    budgeting expertise, market‑analysis acumen, and bilingual fluency to bridge cultural gaps and foster community harmony.
  sports: Roberto Portela stays active through energetic group walks organized by the senior center, cheers passionately for the Nebraska Cornhuskers football team each fall, and enjoys occasional outings
    to see the Omaha Storm Chasers, all while integrating light stretching and yoga to preserve flexibility.
  arts: Roberto Portela spends his afternoons exploring nearby galleries, listening to classic Latin crooners like José José and Celia Cruz, and painting watercolors inspired by the vibrant murals of Diego Rivera,
    where his open‑minded curiosity leads him to experiment with unconventional color blends that surprise even his most cooperative peers.
  travel: Roberto Portela prefers thoughtfully planned journeys that blend nostalgia with gentle discovery, having traveled to the colonial charm of Antigua, Guatemala, and to family reunions in his hometown
    region, while now dreaming of a serene wine‑tour in Napa Valley and a cultural pilgrimage to the Smithsonian in Washington, D.C., all balanced against his careful budgeting.
  culinary: Roberto Portela delights in preparing traditional hand‑made pupusas stuffed with cheese and refried beans, simmering a comforting sopa de gallina flavored with cilantro, plantain, and fresh
    oregano from his garden, showcasing an intermediate cooking talent that sometimes leads him to over‑spice dishes in his excitement to share flavor with neighbors.
  core: Roberto Portela, an 85‑year‑old retired entrepreneur and cultural bridge, balances meticulous organization with restless curiosity, channels his sociable kindness into mentoring and community art,
    yet frequently wrestles with worry that he calms through yoga and mindful gardening.
background:
  cultural: Roberto was born in San Salvador, El Salvador, and immigrated to the United States in his early thirties, eventually settling in the small town of Elkhorn, Nebraska. He maintains a strong connection
    to his Salvadoran roots through language, food, music, and religious traditions—celebrating holidays such as Christmas, Día de la Madre, and the vibrant Feria del Libro. He remains active in the local
    Salvadoran diaspora, serving as an informal cultural ambassador who shares stories of his homeland, organizes traditional dance performances, and helps younger families preserve their heritage while
    integrating into the broader American community.
