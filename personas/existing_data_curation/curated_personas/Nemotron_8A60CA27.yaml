  hobbies: '[''Watercolor painting'', ''Visiting art galleries'', ''Listening to Latin music'', ''Gardening'', ''Cooking Salvadoran cuisine'', ''Reading historical biographies'', ''Playing chess'', ''Participating
    in community walks'', ''Attending senior group activities'', ''Attending local library talks on new ideas'', ''Gentle yoga and mindfulness meditation'']'
  career_goals: Although retired, Roberto aims to stay active by mentoring young business owners, sharing his decades‑long experience in entrepreneurship, and serving as a cultural liaison for Salvadoran
    heritage events in Nebraska. He hopes to author a memoir that captures his journey from El Salvador to the American Midwest, and to organize an annual art exhibition that showcases Salvadoran artists,
    thereby fostering greater appreciation for the arts within his community. He also aspires to volunteer regularly at the local senior center, helping to design and run social programs that reduce isolation
    among older adults while practicing mindfulness techniques to manage his own worries and stress.
