personas:
  professional: Juan Suarez, a bilingual 19‑year‑old with a knack for orchestrating community events, plans to enroll in hospitality management at a local community college, secure a part‑time hotel front‑desk
    role, and eventually lead guest‑experience teams that weave his family’s Carnaval celebrations and festive cuisine into Tampa’s tourism vibe.
  sports: Juan Suarez, a dedicated soccer enthusiast, plays for the Tampa Youth Soccer Club during the fall, follows the Tampa Bay Buccaneers and Tampa Bay Lightning avidly, and caps his weekly routine
    with beach volleyball sessions, all while juggling a laid‑back attitude toward structured workouts.
  arts: Juan Suarez blends his love of dance and digital creativity by mastering reggaeton and salsa moves at local festivals, producing TikTok sketches set to Bad Bunny, J Balvin, and Rosalia tracks, and
    curating playlists that echo his family’s festive traditions.
  travel: Juan Suarez prefers spontaneous weekend getaways, often booking last‑minute budget flights to Caribbean islands like Barbados or exploring nearby Florida keys, while dreaming of a cultural pilgrimage
    to the historic streets of Cartagena, all balanced against his part‑time job schedule.
  culinary: Juan Suarez’s culinary flair shines when he simmers sancocho with yucca, plantains, and cilantro, rolls tamales stuffed with pork, and gratinates arroz con pollo, sharing each dish’s aroma and
    recipe on TikTok while occasionally over‑seasoning to the point of fiery heat.
  core: Juan Suarez, a 19‑year‑old bilingual social dynamo, merges structured hospitality ambitions with a carefree love for soccer, salsa beats, and spiced stews, all while juggling impulsive spending
    and a habit of forgetting to floss.
background:
  cultural: Juan is a first‑generation Panamanian‑American whose family maintains strong ties to Panama’s Caribbean‑Coastal culture. He grew up speaking Spanish at home and English at school, giving him
    a bilingual fluency that shapes his identity. Traditional celebrations such as Carnaval, Semana Santa, and the Feast of the Black Christ are important family events, featuring music like salsa and reggae,
    and foods such as sancocho, tamales, and empanadas. In Tampa, Juan participates in the local Panamanian diaspora network, helping organize cultural and youth events that blend his heritage with the
    multicultural vibe of Florida. His cultural background informs his love for community involvement, rhythmic dance, flavorful cooking, and a warm, inclusive social style.
