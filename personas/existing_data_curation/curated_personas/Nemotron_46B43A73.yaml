  career_goals: Juan aims to enroll in a community‑college program in Hospitality Management or Business Administration, leveraging his bilingual communication and people‑focused strengths to build a career
    in Tampa’s tourism and hospitality sector. He plans to secure a part‑time role in a hotel or restaurant to gain industry experience, eventually progressing to a supervisory or managerial position where
    he can design guest experiences that reflect his cultural background. Alongside his professional aspirations, Juan hopes to remain active in the local Panamanian community, mentoring younger members
    and helping organize cultural festivals or youth outreach programs.
