  hobbies: '[''Hiking and camping'', ''Fishing'', ''Digital photography'', ''Acrylic painting'', ''Watercolor sketching'', ''Guitar playing and songwriting'', ''Community theater and improv'', ''Volunteering
    at library art programs'', ''Organizing local fundraisers'', ''Playing ultimate frisbee'', ''Reading science fiction and art books'']'
  career_goals: Thomas plans to enroll in a Bachelor of Fine Arts program in Graphic Design at Spring Arbor University, aiming to build a professional portfolio that blends visual storytelling with community
    engagement. He aspires to secure internships at local design studios and nonprofit arts organizations, where he can apply his event coordination and social media skills. In the long term, Thomas envisions
    a career as a community arts coordinator or creative director, developing accessible art programs and cultural events that bring together diverse groups in his hometown and beyond. He also hopes to
    develop a freelance graphic design business that supports small businesses and local artists.
