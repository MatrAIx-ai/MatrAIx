personas:
  professional: Thomas Mcneil, an aspiring graphic designer and community arts coordinator-in-training, blends their curiosity for visual storytelling, meticulous Adobe Creative Suite mastery, and reliable
    event-planning experience to craft engaging designs that serve local nonprofits and small businesses.
  sports: Thomas Mcneil stays fit by joining the Spring Arbor High School ultimate frisbee team in the spring, hiking the Huron-Manistee National Forest during summer weekends, fishing at the Clinton River
    in the fall, while ever-faithful cheering on the Michigan State Spartans football and basketball squads and tracking their workouts on a smartwatch.
  arts: Thomas Mcneil channels their love for Ansel Adams-inspired landscape photography, paints in watercolor like a young Winslow Homer, strums acoustic covers of Bob Dylan and The Lumineers at Spring
    Arbor Community Center open-mic nights, and volunteers backstage for local theater productions of Lin-Manuel Miranda's Hamilton, all of which anchor their sense of creative purpose.
  travel: Thomas Mcneil prefers budget-friendly road trips that mix outdoor adventure with cultural stops, having spent a weekend camping on Lake Michigan’s shoreline, a day exploring Chicago’s Art Institute,
    and a summer jaunt to Door County’s cherry orchards, while they often plan these trips with friends and dream of a future backpacking trek through the Canadian Rockies and a spring visit to the tulip
    fields of Holland, Michigan.
  culinary: Thomas Mcneil, an eager but still-learning home cook, often prepares skillet salmon with lemon-dill sauce, whips up a hearty chicken pot pie with flaky pastry, indulges in cheese-curd-laden
    poutine at a local diner, and dreams of mastering authentic Italian carbonara using pancetta, pecorino, and farm-fresh eggs; they especially enjoy experimenting with fresh herbs.
  core: Thomas Mcneil fuses a methodical, community-first mindset with a restless creative spark, habitually staying up until sunrise editing photos, over-scheduling their weekends, and secretly hoarding
    vintage Polaroid cameras they never fully use.
background:
  cultural: Thomas grew up in Spring Arbor, a small town in Michigan’s Jackson County, within a predominantly white, middle‑class, Midwestern community. His family’s roots trace back to German and English
    immigrants who settled in the region in the early 20th century. He was raised in a close‑knit environment where church gatherings, high‑school sports, county fairs, and community service are central
    to social life. Local values of modesty, reliability, and cooperation shaped his character, while the region’s natural landscapes fostered his love for outdoor activities. Exposure to the modest but
    vibrant local arts scene—via the Spring Arbor Community Center, the county library’s art classes, and regional festivals—nurtured his appreciation for visual and performing arts. These cultural influences
    blend traditional Midwestern work ethic with an openness to new ideas, reflected in his curiosity and collaborative spirit.
attributes:
  skills: '[''Digital photography'', ''Graphic design (Adobe Photoshop/Illustrator)'', ''Event planning and coordination'', ''Public speaking'', ''Team collaboration'', ''Creative writing'', ''Social media
