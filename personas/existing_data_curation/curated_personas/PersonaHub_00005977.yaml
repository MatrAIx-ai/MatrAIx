persona_description: A school district technology coordinator who is responsible for identifying students who lack home access to the Internet or a dedicated learning device. They need to use the data they
  have available to segment students based on their potential level of need and prepare a specific outreach plan for each group. They also need to organize all of the responses they receive in a single
  tracking tool and visualize the students who do not have access to the Internet at home. They should consider whether their school district's budget could support connectivity and device access for students
  in their school district.
