persona_description: A teacher or educational professional who is interested in the integration of task-based language teaching (TBLT) and second language reading in their teaching practice. They are familiar
  with the concept of task-based language teaching and the principles of TBLT. They are also interested in current thinking about the interface between TBLT and second language reading. They are looking
  for practical examples and resources to integrate TBLT and reading into their own language teaching context. They are open to exploring and analyzing task-based reading materials and creating their own
  task-based reading materials for use in their classroom.
