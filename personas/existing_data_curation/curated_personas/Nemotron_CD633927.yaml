  hobbies: '[''Reading business and psychology books'', ''Crossword puzzles and Sudoku'', ''Chess and strategic board games'', ''Jogging on Loantaka Brook Trail'', ''Yoga'', ''Experimenting with recipes'',
    ''Wine tasting'', ''Pro‑bono tax preparation volunteering'', ''Farmers’ market visits'', ''Hiking in state parks'', ''Community trivia nights'']'
  career_goals: Hannah aims to obtain her CPA and Certified Fraud Examiner (CFE) certifications within the next two years and leverage them to move into a senior advisory role, either as a Director of Audit
    Services at a regional accounting firm or as a Chief Financial Officer for a mid‑size technology company. She is motivated to build a boutique consulting practice focused on data‑driven forensic accounting,
    where she can lead high‑stakes investigations and develop innovative audit methodologies. Long‑term, she hopes to be recognized as a thought leader in the field, publish articles on audit analytics,
    and mentor the next generation of women accountants while maintaining a flexible schedule that supports her family life.
