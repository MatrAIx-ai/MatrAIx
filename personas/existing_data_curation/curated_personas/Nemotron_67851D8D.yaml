  hobbies: '[''Choir singing'', ''Field hockey'', ''Community theater acting'', ''Knitting and crocheting'', ''Volunteering at the animal shelter'', ''Journaling'', ''Reading young adult novels'', ''Listening
    to pop music with friends'']'
  career_goals: Kelly wants a future that lets her help others in a stable, community‑focused role. She aspires to become a pediatric nurse or an elementary school teacher, careers that combine her compassion
    with her practical, routine‑oriented nature. She also considers a position in youth outreach or social work, but she seeks a clear pathway that offers job security and structured daily responsibilities.
    In the short term, she aims to hold a leadership role in her school's student council, earn a youth volunteer certification, and gain more experience organizing community service projects.
