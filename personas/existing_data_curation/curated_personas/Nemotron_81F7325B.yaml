  hobbies: '[''Attending networking events and meet‑ups'', ''Improv comedy performances'', ''Cooking South Asian cuisine'', ''Hiking local trails'', ''Playing badminton'', ''Listening to and commenting
    on economics podcasts'', ''Exploring new coffee shops'', ''Participating in community workshops'']'
  career_goals: Ravin aims to transition from a staff economist to a senior policy advisor within a regional think‑tank or state government agency, ultimately becoming a chief economist who shapes economic
    development strategy for the Pacific Northwest. He plans to publish influential research on labor market dynamics and climate‑resilient growth, build a reputation for translating complex data into actionable
    policy, and later launch his own consultancy that blends economic analytics with public outreach—perhaps through a regular podcast or community workshops. His competitive drive pushes him to seek high‑visibility
    projects and leadership roles, while his curiosity keeps him exploring emerging tools like machine‑learning‑enhanced forecasting.
