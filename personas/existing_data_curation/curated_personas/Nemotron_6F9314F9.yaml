  hobbies: '[''Reading historical fiction'', ''Creative writing (journaling, poetry)'', ''Hiking local Appalachian trails'', ''Gardening (vegetable and flower beds)'', ''Knitting and crocheting'', ''Solving
    puzzles (crosswords, jigsaw puzzles)'', ''Baking and cooking simple meals'', ''Listening to educational podcasts'']'
  career_goals: Jessica aims to transition from her current secretarial role to an office manager or senior executive assistant position within the next three to five years. She plans to earn a bachelor's
    degree in Business Administration and obtain the Certified Administrative Professional (CAP) credential to strengthen her leadership and strategic planning capabilities. Long‑term, she envisions overseeing
    a small team, mentoring junior staff, and implementing efficiency initiatives that balance established procedures with innovative solutions.
