personas:
  professional: Joseph Garcia, an 82‑year‑old retired handyman and woodworking enthusiast, channels his lifelong mastery of carpentry, home repairs, and gardening into a steady routine of maintaining his
    property and mentoring neighbors, and they approach each task with practical precision, a skeptical eye for shortcuts, and a quietly competitive drive to be the go‑to fixer in the community.
  sports: Joseph Garcia, a devoted fan of the Denver Broncos and Colorado Rockies, spends summer mornings fishing the Gunnison River, takes leisurely walks along Montrose’s scenic trails, and they treat
    these low‑impact activities as their primary fitness routine, preferring the calm of nature over organized team sports.
  arts: Joseph Garcia, an avid admirer of classic western cinema, regularly watches John Wayne and Clint Eastwood films while their evenings are serenaded by Johnny Cash and Willie Nelson, and they weave
    this cultural heritage into their identity by sharing stories of Colorado pioneers from books by Dee Brown.
  travel: Joseph Garcia enjoys well‑planned, low‑stress road trips along Colorado’s byways, often revisiting beloved spots like the historic town of Silverton and the mesas of Mesa Verde, while they also
    dream of a leisurely pilgrimage to Yellowstone and a quiet cabin retreat in the Adirondacks.
  culinary: Joseph Garcia, a competent home cook, often prepares garden‑fresh vegetable stew, pan‑seared trout caught on the Gunnison River, hearty beef chili with beans, and buttery cornbread, savoring
    the simplicity of pepper, thyme, and local honey.
  core: Joseph Garcia is a pragmatic, routine‑loving octogenarian who balances a quiet love of fishing and woodworking with a competitive streak in bridge, a tendency to worry about finances, and a habit
    of forgetting to water the garden until the last minute.
background:
  cultural: Joseph is a white American who grew up in a Midwestern farming community before settling in Montrose, Colorado. He identifies strongly with the values of self‑reliance, practicality, and traditional
    Protestant (Methodist) ethics that are common in the western ranching culture. His life reflects a blend of Midwestern modesty and Colorado frontier spirit, emphasizing routine, family, and a deep respect
    for the natural landscape of the Rocky Mountains.
