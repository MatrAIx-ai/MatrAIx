personas:
  professional: Jacquelin Fox, a plant-level manufacturing manager with two decades of expertise in Lean, Six Sigma, and IoT-driven production optimization, leverages their curiosity and love of aesthetics
    to redesign workflows while intentionally delegating detailed scheduling to trusted leads, balancing assertive team coaching with a relaxed, flexible managerial style.
  sports: Jacquelin Fox, an avid weekend rower with the Georgia Coast Rowing Club and a loyal supporter of the Atlanta Falcons and Savannah Bananas, combines low‑impact cardio on the water with occasional
    community basketball pick‑up games, viewing fitness as a stress‑relief outlet rather than a rigid regimen.
  arts: Jacquelin Fox, a watercolor painter of Georgia’s coastline and industrial skylines, draws visual inspiration from Edward Burtynsky’s industrial photography and Georgia O'Keeffe’s color palettes,
    curates evenings listening to Brandi Carlile’s folk ballads, and devotes free time to reading Margaret Atwood’s speculative fiction, weaving these influences into their creative practice.
  travel: Jacquelin Fox, who prefers a blend of carefully mapped coastal road trips and spontaneous weekend getaways, has explored the historic streets of Savannah, the culinary scene of New Orleans, the
    rugged cliffs of Galway, Ireland, and dreams of sailing along Portugal’s Algarve, always balancing budget constraints with a desire for authentic local experiences.
  culinary: Jacquelin Fox, an enthusiastic home cook who experiments with low‑country shrimp and grits, Mediterranean paella featuring saffron and mussels, and seasonal farm‑to‑table dishes seasoned with
    fresh thyme and lemon zest, often swaps recipes at local potluck gatherings while lamenting their habit of over‑spicing when stressed.
  core: Jacquelin Fox, a curious yet occasionally disorganized manufacturing leader, blends industrial precision with artistic flair, manages stress through yoga, and constantly juggles ambitious career
    goals with a love for spontaneous creativity and culinary experiments.
background:
  cultural: Jacquelin grew up in a working‑class family in the coastal town of Brunswick, Georgia, where shipbuilding, logistics, and light manufacturing have long shaped the local economy. Her upbringing
    was steeped in Southern hospitality and a strong sense of community, with family gatherings often centered around shared meals and church events. Although she did not complete formal secondary education,
    she was exposed early to hands‑on trade skills through family members who worked in the port and factories, fostering a practical, self‑reliant mindset. The region’s blend of maritime heritage, low‑key
    social rhythms, and an emerging arts scene has nurtured her appreciation for both industrial precision and creative expression. As a single woman navigating a traditionally male‑dominated field, she
    draws on the independent spirit characteristic of many Southern women, balancing respect for local traditions with an openness to new ideas and cultural diversity.
