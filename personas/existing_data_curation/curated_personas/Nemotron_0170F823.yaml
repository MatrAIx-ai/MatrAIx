  career_goals: Jacquelin aims to move from plant‑level management to a regional operations director role within the next five years, where she can shape strategic initiatives around sustainable manufacturing
    and digital transformation. She is passionate about championing environmentally friendly production practices, such as waste‑reduction programs and energy‑efficient equipment upgrades. A long‑term ambition
    is to establish a mentorship network for women and non‑traditional entrants in industrial trades, leveraging her own experience to broaden diversity in the sector. Eventually, she envisions launching
    a boutique consultancy that helps small‑ to medium‑size manufacturers implement Lean, IoT, and green initiatives. Parallel to her professional drive, Jacquelin seeks better work‑life balance, aiming
    to implement stress‑reduction techniques and delegate more responsibilities to achieve personal well‑being.
