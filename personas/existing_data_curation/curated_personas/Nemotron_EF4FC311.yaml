  hobbies: '[''Fashion sketching'', ''Historical fashion reading'', ''Nature hiking'', ''Gardening'', ''Baking'', ''Listening to classic jazz'', ''Vintage clothing curation'', ''Journaling'', ''Knitting'']'
  career_goals: Maren aims to establish a small, locally‑sourced boutique in Meriden that offers timeless, high‑quality clothing for everyday wear, building a reputation for durability and classic style.
    Over the next five years she plans to refine her technical expertise, secure a sustainable supply chain with regional farms, and create a workshop that trains apprentices in traditional garment making.
    She intends to earn a master’s degree in fashion entrepreneurship to strengthen her business acumen, enabling her to expand her brand regionally while maintaining low‑volume, meticulously managed production.
    Her long‑term ambition is to become a respected figure in Midwestern fashion circles known for marrying practicality with refined design, all within a structured, routine‑oriented operation.
