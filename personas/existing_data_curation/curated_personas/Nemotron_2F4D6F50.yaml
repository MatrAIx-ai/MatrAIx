  career_goals: Vikram aims to earn a Certified Forklift Operator credential and then move into a supervisory role within the logistics sector. Over the next few years, he plans to complete a certification
    in supply chain management or an associate degree in logistics at a community college, positioning himself for a warehouse manager or shift‑lead position. His long‑term ambition is to start his own
    small moving and freight service that can serve the South Asian community in the Chicago suburbs, integrating technology to offer efficient scheduling and tracking. He also hopes to mentor younger workers
    and contribute to a safe, inclusive workplace culture.
