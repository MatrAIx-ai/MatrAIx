personas:
  professional: Cathy Reeb, a retired home economist turned senior‑center volunteer coordinator, leverages her meticulous budgeting, medication‑management checklists and event‑planning skills to keep community
    programs running on schedule, while her preference for structure and occasional anxiety drive her to double‑check every detail.
  sports: Cathy Reeb enjoys gentle daily walks with the local senior‑center walking club, occasionally participates in a beginner’s Tai Chi class, and remains an avid fan of the Chicago Cubs, cheering quietly
    during televised games while balancing her low‑impact fitness routine with her age.
  arts: Cathy Reeb finds solace in knitting classic Fair‑Isle blankets while listening to the soothing piano works of Claude Debussy and the folk ballads of Joan Baez, and she frequently discusses historical
    novels by Philippa Gregory at her modest book club.
  travel: Cathy Reeb prefers meticulously planned weekend getaways to historic towns like Williamsburg, Virginia, and the scenic gardens of Portland, Oregon, balancing her love of gentle sightseeing with
    her health constraints and a modest travel budget.
  culinary: Cathy Reeb delights in baking apple‑cinnamon pie, crafting rosemary‑infused focaccia, and preserving strawberry–lavender jam, frequenting the farmer’s market for fresh herbs and sharing her
    homemade treats with neighbors and church friends.
  core: Cathy Reeb, an 81‑year‑old garden‑loving knitter, blends a life of disciplined routine with a soft spot for nostalgic comforts, yet her lingering anxiety often turns simple tasks into meticulous
    checklists.
background:
  cultural: Cathy grew up in a middle-class white Protestant family in central Pennsylvania, with German and Irish ancestry. Her upbringing emphasized self-reliance, modesty, and strong community ties,
    reflected in local traditions such as the annual county fair, church gatherings, and neighborhood potlucks. These cultural values underpin her practical, organized outlook and her dedication to helping
    neighbors.
