  career_goals: Alfred aims to become a senior claims manager within the next five years, leading a high‑performance team that implements data‑driven and innovative claim‑resolution strategies. He plans
    to earn the Chartered Property Casualty Underwriter (CPCU) designation and pursue a master’s degree in Business Analytics to deepen his expertise in predictive modeling for loss prevention. His competitive
    drive pushes him to consistently rank among the top adjusters, earning recognition and opportunities to shape organizational policies. In the longer term, Alfred envisions establishing his own boutique
    consulting firm that advises insurers on leveraging technology and unconventional thinking to streamline claim processes, while also mentoring young professionals from under‑represented backgrounds.
