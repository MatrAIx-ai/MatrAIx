  hobbies: '[''Fishing (off the Atlantic coast and inland ponds)'', ''Golf (playing early mornings)'', ''Woodworking (building furniture and small projects)'', ''Model Shipbuilding'', ''Reading non-fiction
    (history, technology, and economics)'', ''Crossword puzzles'', ''Trail jogging'', ''Digital photography (nature and coastal scenes)'', ''Home improvement projects'']'
  career_goals: Michael aims to advance to a regional senior claims manager position, overseeing a team of adjusters and investigators across multiple offices in Florida. He seeks to become a recognized
    subject‑matter expert in catastrophic loss handling, particularly hurricane‑related claims common in the Jacksonville area. To support this, he plans to obtain professional certifications such as the
    Chartered Property Casualty Underwriter (CPCU) and Associate in Claims (AIC). Michael also aspires to lead the development of data‑driven claim analytics tools that streamline assessment workflows,
    reduce turnaround times, and improve loss prediction accuracy. Mentoring junior adjusters and fostering a culture of disciplined performance are also key components of his long‑term career vision.
