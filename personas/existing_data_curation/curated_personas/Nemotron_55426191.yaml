personas:
  professional: Melinda Egbert, a veteran retail specialist with over twenty years of hands‑on experience in customer service, visual merchandising, and inventory management, leverages her curiosity and
    organized flexibility to integrate community art displays into store layouts while pursuing a Retail Management certification and eyeing a store‑manager role within the next two years.
  sports: Melinda Egbert, an avid weekend hiker who explores nearby hardwood forests with a local hiking club, also attends the regional minor‑league baseball team, the Greenville Drive, and participates
    in a community yoga class each spring to maintain flexibility.
  arts: Melinda Egbert, a devoted patron of folk museums and an accomplished quilter who draws inspiration from the tapestry work of William Morris and the narrative quilts of Faith Ringgold, regularly
    volunteers at her church’s arts‑and‑crafts fair and curates rotating art displays in her store featuring local artists such as painter Sarah Hemphill.
  travel: Melinda Egbert, a measured traveler who prefers weekend road trips to historic Southern towns like Savannah, Charleston, and Asheville, yet dreams of a summer pilgrimage to the art districts of
    Florence and the culinary scene of Barcelona, plans each journey using a rewards credit card and a carefully crafted itinerary to balance adventure with budget constraints.
  culinary: Melinda Egbert, an enthusiastic home chef who routinely experiments with Southern dishes such as shrimp and grits, fried green tomatoes, and peach cobbler, using fresh herbs like basil and thyme
    from her garden and locally sourced butter, and delights in pairing each meal with a playlist of classic folk tunes.
  core: Melinda Egbert blends a meticulous retail mind with a free‑spirited love for art and gardening, often juggling spreadsheets while stitching a quilt, and occasionally forgets to water her plants
    during busy weeks.
background:
  cultural: Melinda grew up in the rural South of Georgia, steeped in Southern hospitality and a close‑knit community ethos. Her upbringing in a Baptist family emphasized service, cooperation, and respect
    for tradition, while her curiosity and love of art introduced her to diverse cultural expressions, from folk quilting traditions to contemporary regional art fairs. Living in Hazlehurst, she maintains
    strong ties to local customs—such as community festivals, church gatherings, and Southern culinary traditions—while also embracing new ideas and technologies that shape modern retail.
attributes:
  skills: '[''Customer Service'', ''Sales'', ''Visual Merchandising'', ''Inventory Management'', ''Point-of-Sale Systems'', ''Staff Training and Coaching'', ''Vendor Relations'', ''Conflict Resolution'',
