    At night , i party hard in the atlanta club scene , and i never miss a music festival.'
  Best Generated Conversation: 'User 1: What do you do for a living?

    User 2: I work as a dental assistant in a ritzy part of town.

    User 1: That sounds like a nice job.

    User 2: It is. I get to work with a lot of interesting people.

    User 1: What''s the weirdest thing that''s ever happened at work?

    User 2: One time, a patient came in with a huge tongue piercing.

    User 1: Oh my gosh! That must have been something to see.

    User 2: It was. I didn''t know what to do.

    User 1: What did you end up doing?

    User 2: I just pretended not to notice it.

    User 1: That''s probably the best way to handle it.

    User 2: Yeah, I think so too.

    User 1: So, what do you do for fun?

    User 2: I like to go to music festivals and party hard in the Atlanta club scene.

    User 1: That sounds like a lot of fun.

    User 2: It is. I love to dance and have a good time.

    User 1: What''s your favorite festival?

    User 2: My favorite festival is Electric Forest. It''s the best place to be if you love electronic music.

    User 1: I''ve heard good things about that festival.

    User 2: It''s amazing. You should go next year.

    User 1: I might just do that.'
