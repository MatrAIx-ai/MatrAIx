persona_description: A nurse practitioner who is particularly interested in occupational health and safety, particularly in the field of occupational health nursing. She is familiar with the guidelines
  for universal precautions and the precautions used by OHN students during their clinical placements. She is concerned about the availability of updated guidelines for universal precautions in clinical
  settings and the compliance of OHN students to these guidelines. She is also interested in the recommendations made for employers and staff at all occupational settings to ensure that updated guidelines
  for universal precautions are available and accessible to everyone interacting with high-risk patients.
