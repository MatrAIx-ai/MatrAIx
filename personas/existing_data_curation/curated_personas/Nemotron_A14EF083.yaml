  hobbies: '[''Quilting'', ''Gardening'', ''Cooking and baking'', ''Church choir'', ''Bridge club'', ''Genealogy research'', ''Attending Amarillo Rodeo'', ''Reading historical novels'', ''Walking in local
    parks'', ''Volunteer work at senior center'']'
  career_goals: Although she is no longer in the formal workforce, Sandra’s ambition is to remain a vital, organized presence in her community. She aims to expand her volunteer leadership role by establishing
    a regular schedule of intergenerational workshops at the senior center, teaching quilting, cooking, and basic computer use to younger neighbors. She also hopes to create a community cookbook that preserves
    traditional Texan recipes while showcasing contributions from local families. Another personal goal is to complete a certified CPR refresher course and share those skills through volunteer training
    sessions. Finally, she wishes to deepen her genealogical research, compiling a detailed family history that can be shared at upcoming family reunions.
