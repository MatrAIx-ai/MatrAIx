persona_description: A fly tier who specializes in developing Stonefly patterns, particularly those tied along the Yellowstone River during his retirement years. He is known for his innovative approach
  to tying stones, which involves "tying in the round" and studying the natural behavior of trout. His patterns are heavily weighted and feature prominently hackles and ostrich hair, which are highlighted
  against a darker body. He uses a variety of variations to the pattern and ties most of his stones with a scruffy appearance. His patterns are designed to mimic the behavior of stoneflies and are known
  for their ability to get to the bottom quickly. He is also known for his ability to tie Salmonfly nymphs and Golden Stonefly nymphs, and his patterns are used by many fly anglers.
