  career_goals: Curtis aims to finish his high‑school equivalency and enroll in a vocational program that offers an automotive technology certification. He envisions working as a certified mechanic at a
    reputable shop, mastering increasingly complex repairs, and eventually opening a modest, community‑focused garage where he can apply his routine‑oriented work style. While keeping his career goals grounded,
    he also nurtures a side ambition to compete in regional e‑sports tournaments, leveraging his gaming expertise as a supplemental source of income and personal achievement. His long‑term ambition balances
    financial stability with the competitive drive that fuels his personal growth.
