personas:
  professional: Curtis Griffin is a 16‑year‑old aspiring automotive technician who blends solid hands‑on skills in oil changes, brake‑pad swaps, and basic engine diagnostics with a routine‑driven, practical
    mindset and a competitive edge sharpened by fast‑paced video games and pick‑up basketball, and they aim to earn a vocational certification and eventually launch a community‑focused garage.
  sports: Curtis Griffin dominates the local Brooklyn park’s street‑basketball courts with the Brooklyn Hoops crew, tracks the Brooklyn Nets and New York Knicks for inspiration, spends weekends grinding
    tricks at the Brooklyn Skate Collective, and joins seasonal pick‑up soccer games with friends, while they maintain a fitness regimen that balances high‑intensity bursts with a laid‑back approach to
    recovery.
  arts: Curtis Griffin’s artistic groove fuses the lyrical flow of Kendrick Lamar and J Cole with the soaring riffs of Led Zeppelin and The Rolling Stones, while their occasional woodworking projects echo
    a minimalist, functional aesthetic, and they unwind by binge‑watching Marvel blockbusters and classic Spielberg films, letting both music and cinema shape their creative outlook.
  travel: Curtis Griffin favors short, budget‑friendly road trips that let them tinker with their car en route, having explored the diverse neighborhoods of New York City, taken a weekend drive to the Hamptons,
    and dreaming of a cross‑country journey to Detroit’s automotive museums, while they keep longer vacations on the back‑burner due to family finances and school responsibilities.
  culinary: Curtis Griffin gravitates toward hearty, easy‑to‑prepare dishes like a double‑cheese bacon burger, pepperoni pizza, and nachos piled high with jalapeños and shredded cheddar, often whipping
    up a quick spaghetti‑meatball dinner after a day in the garage, while they occasionally experiment with avocado toast for a snack, though they sometimes over‑cook it when distracted by a gaming session.
  core: Curtis Griffin is a routine‑obsessed, competitively driven 16‑year‑old who juggles garage tinkering, fast‑paced gaming, and street basketball with a relaxed take on obligations, and they have a
    knack for turning mechanical challenges into personal victories.
background:
  cultural: 'Curtis grew up in a working‑class white family in Brooklyn''s diverse neighborhoods. His family roots trace back to Italian and Irish immigrants, and although they maintain some traditional
    customs such as holiday gatherings and a modest Catholic upbringing, they have fully embraced the urban lifestyle of the borough. The neighborhood''s multicultural vibe exposed him to a variety of languages,
    foods, and street cultures, while his immediate family instilled a strong work ethic, practicality, and a preference for routine. This blend of heritage and city life shaped his values: a respect for
    hands‑on craftsmanship, a love for street basketball courts that serve as community hubs, and an appreciation for the reliable, straightforward approach to daily tasks.'
