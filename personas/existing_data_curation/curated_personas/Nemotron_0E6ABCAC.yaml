  hobbies: '[''Gardening'', ''Reading historical biographies'', ''Book club participation'', ''Knitting and crocheting'', ''Baking traditional pies'', ''Birdwatching'', ''Crossword puzzles'', ''Sudoku'',
    ''Hiking local trails'', ''Volunteer tutoring at community center'']'
  career_goals: Whitney aims to progress from her current managerial role to senior leadership, such as Operations Director or Vice President of Operations, within the next five to seven years. She plans
    to enhance her expertise in operational excellence by pursuing certifications like Six Sigma Black Belt and deepening her strategic planning capabilities. A key ambition is to create a work culture
    that balances high performance with employee well‑being, incorporating mental‑health support initiatives and mentorship programs, especially for women in management. Ultimately, she envisions leveraging
    her experience to consult small businesses in her region on process improvement and sustainability, ensuring long‑term stability for both her career and the local economy.
