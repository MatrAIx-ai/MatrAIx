  career_goals: Mohamad aims to become a leading boutique broker in the Chicago metro area, recognized for integrating art and design insights into property marketing. Over the next five years he plans
    to obtain the Certified Residential Specialist (CRS) and Accredited Buyer’s Representative (ABR) designations, expand his personal brand through a curated online presence, and launch a team of junior
    agents whom he will mentor. He also aspires to develop a small portfolio of mixed‑use properties that combine residential space with galleries or creative workspaces, promoting sustainable building
    practices. In the longer term, he envisions serving on the board of the Cook County Association of Realtors and contributing to community‑focused affordable‑housing initiatives.
