  hobbies: '[''Gardening'', ''Knitting'', ''Reading mystery novels'', ''Attending community theater'', ''Participating in senior bingo nights'', ''Volunteering at the local library'', ''Cooking for friends'',
    ''Birdwatching'', ''Walking in Oak Park'', ''Crossword puzzles'']'
  career_goals: Approaching retirement, Rachel aims to transition into a part‑time advisory role where she can mentor younger receptionists and help small businesses set up efficient front‑office processes.
    She plans to earn a certificate in Office Administration to formalize her expertise and volunteer as an information coordinator at the senior center, creating a weekly Community Connections newsletter
    that highlights local services. While she remains competitive, she hopes to be recognized as Employee of the Month one final time and to leave a legacy of a well‑organized filing system and a supportive
    training program for future staff. Additionally, she wants to improve her digital fluency by learning basic customer‑relationship‑management software, ensuring she stays relevant in an increasingly
    tech‑driven workplace.
