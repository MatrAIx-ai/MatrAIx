  hobbies: '[''Reading historical and literary fiction'', ''Book club participation'', ''Gardening'', ''Healthy cooking (Southern-inspired)'', ''Yoga and meditation'', ''Dog walking'', ''Volunteering at
    community food bank'', ''Mentoring high‑school students in financial literacy'', ''Attending African‑American cultural events'', ''Church involvement'', ''Puzzles and crosswords'', ''Watercolor painting'',
    ''Travel to historical sites'']'
  career_goals: Kayla aims to transition into a senior leadership role where she can shape sustainable finance initiatives, such as a Director of ESG Investing or Chief Financial Officer for a purpose‑driven
    organization. She plans to earn a CPA designation and pursue an executive MBA to deepen her strategic acumen. A core ambition is to launch a community‑based financial empowerment program that equips
    under‑served families—particularly within the Black community—with the skills to achieve economic stability. She also seeks to mentor emerging women leaders in finance, fostering greater diversity at
    the executive level.
