personas:
  professional: Shilpa Akhter, a seasoned postsecondary humanities educator, crafts interdisciplinary curricula that fuse art history, literature, and cultural studies, delivering spontaneous, improvisational
    lectures that reflect their critical, competitive mindset while integrating mindfulness techniques to temper a high‑strung temperament that sometimes causes missed deadlines.
  sports: Shilpa Akhter stays active through gentle yoga and weekly walks with the Silver Seasons Senior Walking Club, competes in a local senior bridge league, and ardently follows the Chicago Bulls, Cubs,
    and Blackhawks, treating each game as a strategic case study.
  arts: Shilpa Akhter devotes leisure to sketching watercolors of Monet's Water Lilies, curating personal essays on the works of Frida Kahlo, listening to the sitar passages of Ravi Shankar alongside Miles
    Davis, and analyzing world‑cinema documentaries by Mira Nair, allowing the fusion of visual and auditory arts to shape their reflective yet critical artistic identity.
  travel: Shilpa Akhter meticulously plans cultural trips, having explored the art‑laden streets of Florence, the historic canals of Bruges, and the ancient temples of Bagan, while budgeting for future
    pilgrimages to the historic ruins of Petra and the coastal heritage towns of the Mediterranean, balancing a love for immersive research with a cautious eye on retirement funds.
  culinary: Shilpa Akhter, an adept home chef, enjoys experimenting with spice‑rich dishes like biryani and dal makhani, reimagining them alongside contemporary creations such as saffron‑infused ramen and
    turmeric‑spiced quinoa salads, often sourcing fresh herbs from their garden to add authentic flavor depth.
  core: Shilpa Akhter is a curious, high‑strung scholar who channels competitive skepticism into interdisciplinary art projects, yet habitually procrastinates on deadlines and over‑caffeines while seeking
    solace in watercolor sketches and mindful yoga.
background:
  cultural: Shilpa was born in Kolkata, India, into a Muslim family that celebrated both Eid and, through extended family, Diwali, reflecting a pluralistic cultural environment. Growing up she spoke Hindi,
    Urdu, and English, absorbing the literary and artistic traditions of the subcontinent. She moved to the United States in her early thirties to pursue graduate studies, eventually settling in the Chicago
    area where she became an integral part of the South Asian diaspora community. She actively participates in local cultural festivals, cooks traditional dishes for community gatherings, and supports newcomers
    navigating life in the Midwest. Her South Asian heritage informs her scholarly perspective, prompting her to foreground marginalized voices in art and literature. As a divorced woman, she has navigated
    cultural expectations around marriage, which deepened her independent outlook and commitment to personal authenticity.
attributes:
  skills: '[''Interdisciplinary curriculum design'', ''Art criticism and visual analysis'', ''Comparative literature'', ''Adult education pedagogy'', ''Mentoring and advising'', ''Museum partnership development'',
    ''Digital teaching platforms (Canvas, Zoom)'', ''Grant writing'', ''Research on South Asian diaspora art'', ''Public speaking'', ''Multilingual communication (English, Hindi/Urdu)'', ''Mindfulness integration
    in classroom'']'
  hobbies: '[''Art gallery and museum visits'', ''Watercolor painting and sketching'', ''Reading contemporary fiction and poetry (South Asian authors)'', ''World cinema documentaries'', ''Cooking South
    Asian and fusion dishes'', ''Yoga and meditation'', ''Herb gardening'', ''Volunteer work at community arts center'', ''Travel planning to cultural heritage sites'', ''Writing essays and poetry'', ''Book
    club participation'', ''Listening to classical Indian music and jazz'']'
  career_goals: Shilpa aims to launch a signature interdisciplinary course on South Asian feminist visual culture that bridges art history, gender studies, and diaspora literature. She aspires to publish
    a scholarly monograph on the evolution of South Asian women's art in the diaspora, securing a National Endowment for the Humanities grant to fund field research trips to India, Bangladesh and Pakistan.
    She seeks to expand partnerships with local museums and cultural centers to create community‑based exhibitions that give voice to under‑represented artists. While eyeing a brief tenure as department
    chair to champion curricular innovation, she also plans to mentor a cohort of emerging scholars and develop a digital archive of South Asian women’s artwork. Post‑retirement, she hopes to continue as
    an adjunct and consultant, delivering guest lectures and guiding research projects.
