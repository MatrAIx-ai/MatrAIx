personas:
  professional: Jason Bruni, a retired mechanical engineer turned community mentor, leverages four decades of system design, project coordination, and hands‑on troubleshooting while they channel their curious‑practical
    mindset into affordable Arduino projects and collaborative STEM workshops for seniors and youth.
  sports: Jason Bruni enjoys weekly hikes in the Wasatch foothills, joins the senior center’s walking club, follows the Utah Jazz and Real Salt Lake, participates in the Wasatch Trails hiking group, and
    takes occasional cross‑country ski trips to Park City, balancing low‑impact fitness with a love for the outdoors while they stay socially connected through group activities.
  arts: Jason Bruni performs in community theater productions, volunteers backstage for local plays, admires classic films like Casablanca, listens to John Denver and The Beatles, and draws inspiration
    from Ansel Adams’ black‑and‑white photography while they explore digital photography of native birds.
  travel: Jason Bruni favors road trips to nearby natural wonders such as Yellowstone, Arches, and Antelope Island, has visited Japan during cherry‑blossom season and toured Tuscany’s vineyards, and dreams
    of photographing the Northern Lights in Iceland during a future retirement adventure, while they plan each trip with meticulous itineraries and a penchant for wildlife photography.
  culinary: Jason Bruni cultivates heirloom tomatoes and prepares farm‑to‑table caprese salads with fresh basil, mozzarella, and balsamic glaze, enjoys grilling trout with lemon‑dill butter, experiments
    with sourdough starter, and mixes herbs like rosemary and smoked paprika into homemade marinades, while they relish sharing meals at community potlucks and occasionally forget to clean the kitchen promptly.
  core: Jason Bruni blends a lifelong engineer’s curiosity with a community‑oriented spirit, staying active in nature, tinkering with electronics, performing on stage, and mentoring youth, while they occasionally
    hoard old schematics and forget to water their garden.
background:
  cultural: Jason grew up in Ogden, Utah, within a family whose roots trace back to German and Irish immigrants who settled in the Intermountain West in the early 20th century. The region’s emphasis on
    self‑reliance, community service, and outdoor recreation shaped his values, while the local aerospace and manufacturing industries provided a practical context for his STEM education. Although not a
    member of any specific religious community, he respects the prevailing cultural norms of the area, which prioritize modesty, hard work, and neighborly support. This blend of European heritage and Western
    American frontier spirit informs his pragmatic outlook, his appreciation for both tradition and innovation, and his commitment to giving back to the community that raised him.
