persona_description: A cartographer with a passion for exploring the history and evolution of woodland mapping, particularly in the context of the Spanish National Forest Survey. They are interested in
  developing a symbology for trees and woodland that is both informative and visually appealing, drawing inspiration from a wide range of historical and contemporary examples. They are skilled at experimenting
  with different approaches to represent trees and woodland, drawing on ideas from a variety of sources, including cartographic tools, traditional woodcraft, and digital mapping software. Their expertise
  includes the study of pictorial symbology, overhead symbology, and abstract symbology, as well as the development of new symbology for OSM. They are interested in the role of symbology in mapping and
  the potential for cartographers to use it to convey information in a way that is both informative and engaging.
