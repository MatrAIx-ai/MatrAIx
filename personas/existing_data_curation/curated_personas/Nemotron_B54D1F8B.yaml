personas:
  professional: Steven Shumway is a seasoned material‑handling specialist in the mining sector, blending three decades of forklift, front‑loader, and WMS expertise with a data‑driven safety mindset as they
    pursue a foreman role, mentor peers, and pilot reliable yet innovative logistics solutions at the Bingham Canyon yard.
  sports: Steven Shumway spends weekends hiking the Wasatch foothills, casting lines at Jordanelle Reservoir, and hitting the snow‑covered trails on their snowmobile, while they proudly cheer for the Utah
    Jazz and Real Salt Lake, and they belong to a local volunteer fire department’s fitness program that includes monthly strength‑training sessions.
  arts: Steven Shumway’s artistic side surfaces in their meticulous model‑railroad layouts inspired by the classic work of Hornby, their appreciation for vintage automotive design at 1965 Mustang shows,
    and their evenings listening to classic rock legends like The Rolling Stones and Led Zeppelin while they leaf through photography books from Ansel Adams.
  travel: Steven Shumway prefers road‑trip adventures, having explored Utah’s national parks—Zion, Bryce Canyon, and Arches—plus a memorable fishing lodge stay in Alaska’s Kenai Peninsula, and they hope
    to one day take a cross‑country RV journey along historic Route 66 before retirement.
  culinary: Steven Shumway enjoys mastering the perfect smoked brisket on their backyard hickory grill, pairing it with cedar‑plank‑cooked trout caught at Jordanelle, and crafting hearty trail‑mix snack
    bags featuring dried cherries, almonds, and jerky for long hikes, while they proudly stock rye flour and juniper berries for occasional gourmet experiments.
  core: Steven Shumway is a pragmatic DIY enthusiast and seasoned logistics pro whose competitive streak, love of rugged outdoor pursuits, and skeptical yet curious mind shape a life balanced between reliable
    routines and occasional bold experiments, and they constantly seek ways to improve both work and play.
background:
  cultural: Steven’s cultural identity reflects a blend of Western U.S. blue-collar traditions and the mining community of Bingham Canyon. Raised in a family that valued hard work, self-reliance, and practical
    problem-solving, he embraces the pragmatic ethos of the American West while maintaining a modest attachment to the local Latter-day Saints-influenced community values of neighborly support and modest
    living. His worldview balances a respect for longstanding customs with an openness to new ideas, shaped by decades of labor-intensive, team-oriented work.
