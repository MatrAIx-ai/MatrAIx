  career_goals: Steven aims to earn a foreman or shift-supervisor position within the next two years, securing advanced certifications such as OSHA 30-hour and a certified safety trainer designation. He
    wants to implement data-driven safety and efficiency programs at the Bingham Canyon material yard, reduce incident rates, and mentor younger workers. Long-term, he envisions transitioning to a part-time
    safety consultant or starting a small independent moving-and-storage service that leverages his logistics expertise, while ensuring a stable retirement fund.
