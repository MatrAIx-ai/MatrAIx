persona_description: A taxonomist who specializes in the study of the family group system, particularly in the application of the Principle of Coordination to family-group names. The taxonomist has a deep
  understanding of the taxonomic hierarchy and the nuances of naming conventions within the family group system, including the application of the emendation rule and the correct spelling of genus-group
  names. The taxonomist is also familiar with the precedence rules for names in use at higher rank, and is able to navigate the complex interplay between family-group names and higher rank names in the
  family group system.
