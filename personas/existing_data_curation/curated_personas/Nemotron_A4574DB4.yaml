  career_goals: Anibal’s main ambition is to stay active and valued within Miami’s Colombian community while improving his personal wellbeing. He plans to launch a small home‑based catering service that
    offers authentic Colombian meals for local festivals and private celebrations. He intends to enroll in a GED program to improve his literacy and confidence in handling paperwork. Anibal also aims to
    volunteer as a mentor at the neighborhood youth center, teaching practical skills and sharing his life experiences. Additionally, he wishes to organize a monthly cultural gathering that blends music,
    dance, and food, creating a structured outlet for his social energy and a supportive environment to manage his anxiety. He hopes to adopt mindfulness practices and attend a local support group to cultivate
    emotional resilience.
