personas:
  professional: Anibal Amador, a 68‑year‑old community facilitator and handyman, leverages their carpentry, cooking, and bilingual translation skills to orchestrate neighborhood events, mentor youth, and
    launch a modest home‑catering venture while juggling a GED class, despite a habit of misplacing paperwork.
  sports: Anibal Amador, a lifelong devotee of the Andes‑region soccer club, never misses a match of their beloved team at the neighborhood bar, supports the local senior pick‑up soccer group, and balances
    their passion with leisurely fishing outings on the Gulf.
  arts: Anibal Amador channels their social energy through nightly salsa and cumbia dance‑offs at the local Latino club, idolizing the rhythmic flair of cumbia legends and salsa icons, while curating traditional
    folk playlists that serve as the soundtrack for their community gatherings.
  travel: Anibal Amador enjoys short road trips to nearby coastal fishing villages and annual pilgrimages to their family’s coffee‑growing hills, favoring organized group tours for Miami festivals and spontaneous
    weekend drives to the Everglades, balancing a limited budget with a love for cultural immersion.
  culinary: Anibal Amador thrives in the kitchen, perfecting the hearty bandeja paisa, aromatic sancocho, and crisp empanadas, seasoning them with fresh tomatoes, cilantro, and chilies from their backyard
    garden, and routinely hosting potluck feasts that double as fundraisers for neighborhood projects.
  core: Anibal Amador is a charismatic, competitive elder who transforms every gathering into a lively celebration, yet battles anxiety and forgetfulness that often undermine their well‑intentioned plans.
background:
  cultural: Anibal was born in the Andean region of Colombia, where his family raised coffee and practiced Catholic traditions. He grew up speaking Spanish and learning the rhythms of cumbia, vallenato,
    and the warm hospitality of Colombian neighborhoods. After marrying, he immigrated to the United States and settled in Miami, a city with a vibrant Latino diaspora. He maintains strong ties to his Colombian
    roots, celebrating holidays such as Independence Day, Carnaval de Barranquilla, and family birthdays with traditional foods, music, and dance. At the same time, he embraces the multicultural environment
    of Miami, blending his heritage with the city’s diverse customs, enjoying bilingual conversations, and participating in local Latino community organizations. His cultural identity serves both as a source
    of pride and as a grounding force that helps him navigate the challenges of aging and emotional distress.
