persona_description: A researcher and scientist with expertise in fire behavior and smoke spread prediction, particularly focused on developing computer models and simulations to aid firefighters in controlling
  large and destructive wildfires in the Western United States. Mallia and his colleagues, Jan Mandel and Adam Kochanski, have developed a model called WRF-SFIRE that can forecast fire behavior and smoke
  spread, which can be beneficial for firefighters working in the region.
