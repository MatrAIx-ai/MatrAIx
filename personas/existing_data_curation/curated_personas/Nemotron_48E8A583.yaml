  hobbies: '[''Pickup Basketball'', ''Fishing at Lake Tohopekaliga'', ''Car Restoration'', ''DIY Home Projects'', ''Listening to Hip-Hop and R&B'', ''Attending Community Festivals'', ''Competitive Video
    Gaming'', ''Road Trip Adventures'', ''Barbecue Cooking'', ''Weekly Social Gatherings'']'
  career_goals: Leon aims to advance from first‑line supervisor to construction manager within the next three years, seeking a bachelor’s degree in construction management or relevant certifications such
    as PMP and OSHA 30‑hour. He also dreams of launching his own subcontracting firm that focuses on sustainable building practices and provides mentorship opportunities for young Black tradespeople. He
    wants to improve his site's safety record to achieve zero‑incident status and be recognized as a top‑performing crew leader in the region.
