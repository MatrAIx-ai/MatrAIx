personas:
  professional: Leon Bradley is a construction site supervisor who blends a practical, blueprint‑driven expertise with a competitive edge, calmly steering crews through tight schedules, enforcing OSHA safety
    standards, and optimizing budgets while embracing a flexible, sometimes chaotic, approach to planning that keeps productivity high and incidents low; they thrive on turning on‑site challenges into opportunities
    for continuous improvement.
  sports: Leon Bradley burns off workday stress on pickup basketball games at Central Park, cheering for the Orlando Magic while playing for the local Orlando Pick‑Up Basketball League, casts lines at Lake
    Tohopekaliga as a member of the Lake Okeechobee Anglers Association, and squeezes in weekend jogs to keep their fitness level ready for the next site inspection.
  arts: Leon Bradley’s soundtrack consists of Kendrick Lamar, Anderson .Paak, and H.E.R., which they pump through a portable Bluetooth speaker while working on car restorations, and they frequently attend
    the annual Florida Music Festival and community barbecues where local R&B and jazz bands perform.
  travel: Leon Bradley prefers short, budget‑friendly road trips that blend fishing excursions to the Everglades with cultural stops in New Orleans for jazz brunches, and they have a growing bucket list
    that includes a cross‑country drive to Detroit’s International Auto Show and a chill weekend in Key West to unwind from construction deadlines.
  culinary: Leon Bradley enjoys grilling smoked brisket and preparing shrimp po’boys on their patio, often pairing the meals with homemade coleslaw and hot sauce, and they dabble in cooking fish tacos with
    fresh lime and avocado after a successful lake catch, showcasing a moderate cooking skill set that leans heavily on barbecue techniques.
  core: Leon Bradley balances a hands‑on construction career with a love for classic cars, competitive gaming, and spontaneous weekend fishing trips, all while maintaining a calm, resilient demeanor that
    sometimes leads them to forget routine paperwork but never to compromise on site safety.
background:
  cultural: Leon grew up in the African‑American community of Kissimmee, where his parents, who migrated from the rural South, instilled a strong sense of family, church, and resilience. He celebrates cultural
    traditions such as Juneteenth, soul‑food gatherings, and local gospel choirs, while also embracing the diverse influences of central Florida’s multicultural environment. His Black heritage informs his
    commitment to mentorship, community uplift, and the celebration of music and food that connect him to his roots.
attributes:
  skills: '[''Crew Supervision'', ''Construction Site Safety'', ''Blueprint Reading'', ''Budget Management'', ''Heavy Equipment Operation'', ''Conflict Resolution'', ''OSHA Compliance'', ''Quality Control'',
