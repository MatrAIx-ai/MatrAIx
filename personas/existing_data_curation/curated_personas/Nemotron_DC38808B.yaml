  career_goals: Marcelo aspires to achieve senior captain status on a major airline, aiming to earn a type rating on a wide‑body aircraft such as the Boeing 777. He seeks to deepen his impact by mentoring
    the next generation of pilots through structured training programs and contributing to airline safety initiatives, potentially transitioning to a safety officer role. Balancing professional ambition
    with personal well‑being, he aims to secure a more predictable schedule that reduces stress, and ultimately envisions a move into flight operations management or safety oversight where his expertise
    can shape industry standards.
