  career_goals: Corazon aims to rise to a senior executive role—such as Chief Financial Officer or Vice President of Finance—within the next five years, driving digital transformation and sustainable finance
    initiatives at her organization. She plans to earn the CFA charter and pursue a CPA license to deepen her expertise. Parallel to corporate advancement, she aspires to launch a boutique consultancy that
    supports creative‑industry clients and to develop a community‑focused financial‑literacy program for the Dominican diaspora in New York. Mentoring emerging women leaders and serving on nonprofit boards
    that promote arts and cultural heritage are also central to her long‑term vision.
