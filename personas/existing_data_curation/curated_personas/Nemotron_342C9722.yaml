personas:
  professional: Corazon Doak is a senior finance leader who blends rigorous financial analysis, advanced Excel and Power BI modeling, and risk-management expertise with a design-thinking mindset, and they
    turn complex data into clear strategies while leveraging their curiosity and methodical reliability to drive digital transformation initiatives.
  sports: Corazon Doak stays active by playing weekly squash at the Midtown Athletic Club, cheering on the New York Knicks during the basketball season, and participating in the annual NYC Marathon through
    the New York Road Runners, while they balance a competitive drive with a preference for solo cardio sessions over team sports.
  arts: Corazon Doak immerses themselves in visual and performing arts, frequenting the Metropolitan Museum of Art's modern wing, attending productions of Lin-Manuel Miranda's Hamilton, and collecting works
    by contemporary Latin American painter Beatriz Milhazes, and they let this creative perspective inform their financial storytelling.
  travel: Corazon Doak prefers meticulously planned trips that blend cultural immersion and leisure, routinely revisiting Santo Domingo to reconnect with family, while they also seek artistic inspiration
    on weekend getaways to Barcelona's Gothic Quarter and the tranquil beaches of Tulum, balancing budget constraints with the desire for authentic experiences.
  culinary: Corazon Doak enjoys cooking Dominican staples such as sancocho, mangú with sautéed onions, and pastelitos de guanábana, mastering the balance of spices like oregano and achiote, and they often
    pair these home-cooked meals with an occasional glass of aged rum, though they sometimes over-season when experimenting late at night.
  core: Corazon Doak is a methodical finance visionary who channels their art-infused curiosity into data-driven strategies, and they balance disciplined budgeting with occasional splurges while combating
    health monitoring lapses with a relentless drive for self-improvement.
background:
  cultural: Corazon grew up in a close‑knit Dominican household in the New York metropolitan area, speaking Spanish at home and English at school. Family gatherings centered around music—bachata, merengue,
    and salsa—home‑cooked meals like sancocho and mangú, and stories of her parents’ migration journey. She celebrates Dominican holidays such as Independence Day and participates in community festivals
    that showcase Caribbean art and cuisine. Her bilingual fluency and deep ties to the Dominican community inform both her professional network and her commitment to cultural preservation. While embracing
    American professional norms, she maintains the Dominican values of resilience, familial loyalty, and communal responsibility.
