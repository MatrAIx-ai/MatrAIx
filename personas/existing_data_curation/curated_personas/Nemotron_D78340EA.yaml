  hobbies: '[''Hiking'', ''Reading historical fiction and philosophy'', ''Acoustic guitar'', ''Yoga and mindfulness'', ''Cooking'', ''Community theater (stage crew)'', ''Volunteer tutoring'', ''Photography
    of nature and historic sites'', ''Playing chess'', ''Strategy board games'']'
  career_goals: Philip aims to deepen his impact by earning National Board Certification and completing a master’s degree in Educational Leadership. He aspires to transition into a curriculum specialist
    role where he can shape district‑wide humanities programs and embed structured SEL frameworks that address student and teacher stress. Long‑term, he envisions becoming an assistant principal or department
    head, championing a balanced, data‑informed environment that values both predictability and creative flexibility.
