persona_description: A 35-year-old MIT professor who is known for his expertise in digital media and communication technologies. He has extensive experience in developing and implementing educational programs
  that integrate new media technologies into the classroom. Jenkins is a strong advocate for the importance of 21st century literacy, which includes the digital skills needed to participate in the new media
  environment. He is passionate about encouraging students to collaborate and share knowledge in large communities, and believes that by doing so, they will be better adapted to the team work and collaborative
  problem solving expected in the workplace. Jenkins is also aware of the dangers of offering too much of one type of literacy and not enough of the other, and is committed to developing high expectations
  and rigorous assignments that challenge students. He is well-versed in new media technologies and is able to communicate with both faculty and students about them.
