persona_description: A paleoecologist who is conducting research on the Andean landscape, specifically focusing on the study of paleoecology to understand the natural and altered landscapes over time. This
  person is skilled in using paleoecology to define "natural baselines" for ecosystems across elevations, investigating how climate change interacted with human activity to produce altered fire regimes,
  crop use, and forest cover, and analyzing sediment cores and soil cores to provide historical data to establish these natural baselines. This person is also interested in collaborating with scientists
  in complementary disciplines such as soil science, plant physiology, ecology, and remote sensing to integrate project results into a larger prediction of appropriate policy for Andean conservation and
  carbon sequestration.
