persona_description: A historian and archaeologist who specializes in the study of Ancestral Puebloan communities and their architecture and village layout. He/she has a deep understanding of the techniques
  used to construct adobe walls and the specific calendar dates related to the construction of the pueblo. The individual has worked extensively on the site of Tijeras Pueblo, including its excavation,
  mapping, and interpretation, and has a strong interest in the cultural and historical context of the area. They are knowledgeable about the site's significance in the history of the region and its role
  in the exchange of pottery with other communities.
