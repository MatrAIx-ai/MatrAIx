personas:
  professional: Sandra Pllana, a 55‑year‑old master carpenter, leverages three decades of structural framing, custom cabinetry, and decorative inlay expertise while mentoring apprentices and weaving historic
    Creole motifs into modern builds, balancing meticulous organization with an open‑minded, community‑focused leadership style they bring to every client project.
  sports: Sandra Pllana embraces outdoor recreation by fishing for redfish on local bayous, hiking swamp trails, cheering for the Lafourche Parish High School baseball team and the New Orleans Pelicans,
    and joining a community walking club that meets twice weekly, embodying the energetic and sociable spirit they bring to group activities.
  arts: Sandra Pllana immerses themselves in the arts through weekly watercolor sketches of bayou scenes, quilting inspired by George Rodrigue’s “Blue Dog” palette, attending gallery exhibitions featuring
    Brittany Ford, playing the washboard in the church’s Zydeco ensemble, and listening to accordion legend Clifton Chenier while they unwind.
  travel: Sandra Pllana prefers meticulously planned trips that blend cultural immersion and family time, having explored the historic French Quarter of New Orleans, the marshes of Atchafalaya Basin, a
    weekend getaway to Savannah, Georgia, and a culinary tour of Montreal, while dreaming of a future pilgrimage to the Bay of Biscay region in Brittany, France, to study traditional timber‑framing techniques
    they admire.
  culinary: Sandra Pllana’s culinary repertoire showcases love for Cajun flavors, regularly preparing gumbo with okra, andouille sausage, and tasso, baking crusty sourdough bread using a starter cultivated
    from garden yeast, and crafting classic shrimp étouffée seasoned with fresh thyme and bay leaves, all dishes they perfect while sharing meals with extended family.
  core: Sandra Pllana is a seasoned carpenter‑artist who intertwines historic design with modern furniture, fuels community spirit through music and volunteering, and balances a disciplined work ethic with
    a quirky habit of humming construction chants while they paint watercolors.
background:
  cultural: Sandra is a white American whose family has lived in Lafourche Parish for generations, absorbing the region's Cajun‑influenced culture. Though primarily English‑speaking, she grew up hearing
    occasional French phrases and participating in Acadian traditions such as Mardi Gras Krewes and communal feasts. Her Catholic upbringing emphasizes community service, hospitality, and respect for elders.
    Sandra’s identity is shaped by Southern customs of generosity and close‑knit neighborhood ties, a love for the bayou’s natural rhythms, and a deep appreciation for the blend of French, Creole, and American
    heritage that defines her hometown.
