    Coast historical novels'']'
  career_goals: Sandra aims to achieve master carpenter certification and eventually become a licensed contractor specializing in historic preservation projects throughout Lafourche Parish. She envisions
    opening a boutique workshop that produces artisanal furniture while offering restoration services for the region's classic Creole homes. A core ambition is to create a mentorship program for women entering
    the trades, providing hands‑on training and career guidance. She also hopes to collaborate with local cultural organizations to integrate traditional Cajun design motifs into modern construction, ensuring
    her legacy blends craftsmanship with community heritage.
