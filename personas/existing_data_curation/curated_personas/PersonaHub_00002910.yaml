persona_description: A Swiss geotechnical engineer with expertise in the study of natural hazards and their impact on infrastructure. Specializes in the design and analysis of protective measures for slope
  stability and rockfalls, particularly using innovative cushioning materials and numerical simulations. Has conducted research on the influence of rock boulders falling onto slopes, the load deriving from
  impact events, and the development of new cushioning materials to dissipate impact energy. Has experience in the use of the ETHZ Geotechnical Drum Centrifuge for laboratory-scale testing and numerical
  simulations of rockfalls. Has collaborated with researchers at ETH Zurich on permafrost, creeping slopes, and the application of nets as protection measures to shield infrastructure from rockfalls. Has
  a strong interest in the physical modelling and analysis of the system to determine the damping parameters of slope and cushioning materials, as well as the integrity and response of the boulder and the
  associated parameters. Has a background in geotechnical engineering and has conducted research on the influence of natural hazards on Swiss infrastructure.
