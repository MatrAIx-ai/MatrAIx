  career_goals: Terry dreams of a career that blends his love for art, organization, and community. He hopes to attend a high‑school program focused on arts and STEM, then study museum studies or exhibit
    design so he can create interactive displays that inspire other kids. He also envisions becoming an environmental educator who uses visual storytelling to raise awareness about coastal conservation
    in Texas.
