personas:
  professional: Terry Gomez is an aspiring digital illustrator who blends hand‑drawn wildlife sketches with vibrant tablet techniques, leveraging their methodical planning and curiosity to experiment with
    new art software while collaborating on community art workshops.
  sports: Terry Gomez is a lively member of the Coastal Bay Youth Soccer Club, plays as a midfielder for the Strikers’ U‑13 team, cheers for the regional professional side Bay City FC, and spends weekends
    hiking the nearby nature trails to stay fit, often encouraging teammates with their boundless energy.
  arts: Terry Gomez is a budding visual artist who draws inspiration from Studio Ghibli’s Hayao Miyazaki, the street art of Banksy, and the vivid colors of Frida Kahlo, while listening to classic rock icons
    like Led Zeppelin, country favorites like Dolly Parton, and indie bands such as Tame Impala for creative fuel, and they often sketch hidden details in margins of comic books.
  travel: Terry Gomez is an adventurous day‑tripper who has explored the rugged cliffs of Point Reyes, collected shells at Laguna Beach, dreams of visiting the forests of Hokkaido, and prefers spontaneous
    family road trips over meticulously planned vacations, balancing school constraints with a love for new scenery, and they keep a scrapbook of every place visited.
  culinary: Terry Gomez is a budding home‑chef who loves crafting quick avocado toast with chili flakes, whipping up spaghetti Bolognese with fresh basil, and enjoys snacking on mango sticky rice, yet often
    forgets to clean the kitchen after cooking, and they sometimes burn toast when distracted by music.
  core: Terry Gomez is a curious, organized twelve‑year‑old who sketches wildlife on a tablet, scores goals on the soccer field, saves allowance for art supplies, and balances a love for indie music with
    a habit of misplacing their glasses.
background:
  cultural: Raised in the small town of Markham, Texas, Terry’s life reflects the close‑knit, community‑oriented culture of rural Matagorda County. Family gatherings often feature backyard barbecues, church
    potlucks, and trips to the Gulf Coast for fishing and bird‑watching. Local traditions such as high‑school football games, county fairs, and community art programs at the library have shaped his social
    values and his appreciation for both Texan folk arts and contemporary creative expression.
