personas:
  professional: John Franklin is a budding junior programmer who designs mini‑games in Scratch, using their curiosity for new ideas and a practical step‑by‑step coding style, while they stay relaxed and
    sometimes disorganized, which leads to enthusiastic but occasionally unfinished projects.
  sports: John Franklin craves the thrill of riding rugged forest trails near Woodburn, proudly belongs to the local youth biking club for weekend rides, cheers for the Portland Timbers and the Oregon Ducks
    during soccer and football seasons, and they approach fitness with a laid‑back, sometimes sporadic routine that balances bike rides, creekside hikes, and occasional community‑center soccer games.
  arts: John Franklin strums simple acoustic renditions of Ed Sheeran and Jack Johnson on their battered guitar, sketches comic‑book panels inspired by Stan Lee’s Spider‑Man, assembles intricate LEGO sets
    that echo the whimsical architecture of Studio Ghibli’s fantasy worlds, and they let these artistic outlets shape a vivid, storytelling‑driven identity.
  travel: John Franklin prefers spontaneous weekend escapades, often rallying friends for bike trips through the Columbia River Gorge or family hikes to Crater Lake, while they dream of a future backpacking
    adventure to Kyoto, Japan to explore the temples and cherry‑blossom pathways that inspire their favorite games.
  culinary: John Franklin delights in devouring pepperoni pizza with extra mozzarella, proudly mixes banana‑oat smoothies with honey after a bike ride, occasionally experiments with garden‑fresh basil and
    cherry tomatoes in simple spaghetti, and they find their cooking confidence wanes when recipes demand precise timing.
  core: John Franklin is a curiosity‑driven, slightly disorganized 12‑year‑old who balances outdoor adventures, creative tinkering, and a quiet worry that fuels both meticulous LEGO builds and occasional
    lapses in homework completion, and they often wrestle with the tension between spontaneous play and the need for a bit more structure.
background:
  cultural: John is a white American raised in Woodburn, Oregon, a town rooted in agriculture and known for its diverse farming community; his family’s heritage traces back to European-American settlers
    of the Pacific Northwest and his upbringing reflects the region’s emphasis on outdoor recreation, self-reliance, and community cooperation, although he celebrates typical American holidays such as Thanksgiving
    and Christmas, he also participates in local events like the Harvest Festival where he is exposed to the multicultural flavors and traditions of the surrounding Latino farming population, the blend
    of rural values, a strong sense of environmental stewardship, and the inclusive spirit of his hometown shape his worldview and daily life.
