  career_goals: John dreams of a future where his love for nature and technology intersect; he hopes to study environmental engineering or sustainable agriculture at a university, eventually designing low-cost
    irrigation sensors or automated greenhouse systems for family farms in the Willamette Valley, he is also intrigued by creating educational video-games that teach kids about ecology, and keeps the door
    open for a career in software development or teaching, his long-term ambition is to help his community adopt practical, eco-friendly solutions while staying grounded in real-world needs.
