personas:
  professional: Lora Akeson, a senior full‑stack developer with expertise in Python, Java, C# and cloud‑native architectures, leverages their curiosity and practical mindset to champion test‑driven development,
    mentor junior engineers, and drive inclusive, AI‑enhanced product strategies within Midwestern tech teams.
  sports: Lora Akeson is an avid hiker and kayaker who regularly explores the Great Lakes shoreline with their club, cheers on the Detroit Lions in the fall and the Detroit Tigers in the summer, and joins
    a local adult softball league each spring to stay active and socially connected.
  arts: Lora Akeson immerses themselves in the arts by attending live concerts featuring artists like Tame Impala and the Glenn Miller Orchestra, practicing swing dancing to the rhythms of Big Bad Voodoo
    Daddy, and capturing candid community moments through photography that they share on Instagram.
  travel: Lora Akeson prefers weekend getaways that blend structured itineraries—such as a planned kayaking expedition to the Apostle Islands—with spontaneous city explorations like their recent impromptu
    food tour of Chicago’s West Loop, while dreaming of an extended trek through New Zealand’s fjords.
  culinary: Lora Akeson experiments with fusion cuisine, often combining Midwestern corn chowder with Korean gochujang, perfecting dishes like miso‑glazed pork ribs and sriracha‑infused beet salads, and
    enjoys sourcing fresh produce at local farmers’ markets while occasionally over‑spicing their creations.
  core: Lora Akeson is a curiosity‑driven tech leader who balances disciplined planning with spontaneous adventures, constantly tinkering with code, kayaks, and cuisines, yet sometimes forgets to unwind.
background:
  cultural: Lora grew up in Midland, Michigan, a midsized city in the heart of the Midwest with a predominantly white, middle‑class population. Her family emphasized self‑reliance, hard work, and community
    service—a value system shaped by the region’s industrial heritage and the presence of large corporations like Dow Chemical. From an early age, Lora was encouraged to pursue education, especially in
    mathematics and science, which led her to a STEM bachelor’s degree. The local culture, characterized by modesty, practicality, and a collaborative spirit, has influenced her pragmatic approach to problem‑solving
    and her preference for teamwork. She celebrates traditional American holidays, enjoys regional foods such as cherry pie and pasties, and maintains strong ties to the Great Lakes environment through
    outdoor recreation.
