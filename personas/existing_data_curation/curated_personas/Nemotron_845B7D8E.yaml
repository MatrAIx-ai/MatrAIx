  career_goals: Lora aims to evolve from a senior full‑stack developer to a technical leader who shapes product strategy and architecture. Over the next five years she plans to become a lead engineer or
    engineering manager, overseeing multi‑disciplinary teams and driving the adoption of cloud‑first, AI‑enhanced solutions. She is passionate about building inclusive workplaces, so she seeks to spearhead
    mentorship programs and champion diversity initiatives within her company and the broader Midwest tech community. Lora also intends to contribute to open‑source projects related to DevOps automation
    and to present at regional conferences, sharing pragmatic insights on scaling resilient applications. Ultimately, she envisions leveraging her technical expertise to help midsized enterprises modernize
    legacy systems while maintaining cost‑effective, practical solutions.
