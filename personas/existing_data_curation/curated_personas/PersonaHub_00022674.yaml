persona_description: An artist who is interested in creating whimsical and eye-catching posters of local wildlife species, particularly the little brown bat, and wants to unite the flat block-printed, 2-dimensional
  and baudy quality of Toulouse Lautrec's posters with the scientific detail and focus given to depicting each of those characterizing elements of the organism. The artist is interested in developing illustrations
  like these to observe biological diversity and think about the non-human creatures that cohabitate urban areas. The artist wants to take this to print to make multiples in keeping with the "poster" quality
  it assumes and is open to experimenting with traditional block printing techniques with their usual mixed media approach, despite the technical challenges.
