  career_goals: Joseph dreams of turning his love of the ocean and his knack for building things into a future as a coastal engineer or marine scientist. He envisions designing sustainable, floating structures
    that protect Long Island’s shoreline while providing habitats for marine life. In the short term, he aims to deepen his Scratch coding skills, earn a junior lifeguard badge, and join his school’s robotics
    club to develop teamwork and engineering experience. He also hopes to learn coping strategies for his worries so he can become an adult who calmly solves problems and supports others.
