personas:
  professional: Adrien Franklin, an aspiring robotics hobbyist and budding programmer, leverages their methodical planning and competitive curiosity, and they channel this into crafting precise Arduino‑controlled
    devices, solving intricate chess puzzles for strategic insight, and meticulously documenting each project, foreshadowing a future as a systems engineer.
  sports: Adrien Franklin cycles on weekends with a close friend through the Chicago Youth Bike Club, occasionally joins the school’s intramural flag football in the fall, and they avidly follow the Chicago
    Bulls (NBA) and Chicago Cubs (MLB) for strategic analysis, balancing solitary fitness with a competitive eye on professional sports.
  arts: Adrien Franklin finds artistic release through digital photography, emulating the compositional style of Sebastião Salgado, while they listen to cinematic scores by Hans Zimmer to fuel concentration,
    and they regularly revisit classic science‑fiction novels by Isaac Asimov and contemporary works by Andy Weir for narrative inspiration.
  travel: Adrien Franklin plans outings with the same spreadsheet precision they use for projects, favoring short, structured getaways to tech‑centric sites like the Computer History Museum in Mountain
    View and natural retreats such as Yellowstone, while they dream of a future solo visit to Tokyo’s Akihabara district to explore robotics exhibits.
  culinary: Adrien Franklin enjoys preparing methodical meals, mastering the exact ratios for a classic spaghetti Bolognese, experimenting with homemade sushi rolls using sushi‑grade tuna and avocado, and
    they craft sweet‑potato and quinoa power bowls with smoked paprika, all while adhering to a precise recipe checklist that satisfies their love for order.
  core: Adrien Franklin is a meticulously organized teen whose competitive curiosity drives them to build Arduino gadgets and solve chess puzzles, yet they often drown in worry, hoard spare screws for future
    projects, and procrastinate on social invitations.
background:
  cultural: Adrien grew up in Florissant, a suburban community in St. Louis County, Missouri, within a predominantly white Midwestern American household. His family values practicality, self‑reliance, and
    community involvement, reflecting the region’s modest, industrious culture. Local influences include a strong interest in St. Louis sports (especially the Cardinals), exposure to the city’s automotive
    and manufacturing heritage, and participation in neighborhood events and occasional church gatherings typical of many Midwestern families. At the same time, he balances these traditional roots with
    a contemporary digital culture, engaging with online tech communities and global media.
