  hobbies: '[''Arduino projects'', ''Chess puzzles'', ''Strategy video games (Civilization VI, StarCraft)'', ''Model kit building (aircraft, rockets)'', ''Technical reading (technology blogs, sci‑fi)'',
    ''Digital photography'', ''Journaling'', ''Cycling (short rides with a friend)'']'
  career_goals: Adrien aims to complete his high‑school equivalency (GED) within the next two years and then pursue a degree in computer science or mechanical engineering. He aspires to become a software
    developer specializing in embedded systems or robotics, and hopes to contribute to innovative projects at a tech firm in the St. Louis area. He also wants to compete in regional coding contests and
    eventually launch a small freelance tech‑support business that offers reliable, organized solutions for local clients. Building emotional resilience and maintaining a low‑stress work environment are
    important priorities in his long‑term career planning.
