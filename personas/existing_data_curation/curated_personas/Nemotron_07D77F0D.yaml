  hobbies: '[''Playing cards (bridge, poker)'', ''Listening to classic R&B and soul music'', ''Community volunteering at church'', ''Gardening'', ''Woodworking small projects'', ''Barbecue cooking'', ''Watching
    Dallas Cowboys football'', ''Storytelling for grandchildren'', ''Participating in local trivia nights'']'
  career_goals: Dontae aims to transition from a hands‑on cleaner to a senior supervisor, overseeing a small crew and shaping cleaning protocols for his building. He hopes to earn a formal recognition award
    for long‑term service and eventually start a micro‑cleaning business that would allow him to mentor younger workers while providing extra income for his family. Financial security for his grandchildren’s
    education and preserving his reputation as a reliable, efficient caretaker are also top priorities.
