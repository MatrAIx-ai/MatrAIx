personas:
  professional: Dontae Carlock is a veteran janitorial specialist whose hands‑on expertise in floor care, safe chemical handling, and minor repairs, combined with a natural gift for motivating staff and
    mediating conflicts, drives his ambition to become a senior supervisor and eventually launch a micro‑cleaning business that mentors younger workers, and they leverage their talkative nature to keep
    morale high while pursuing efficiency awards.
  sports: Dontae Carlock is an avid follower of the Dallas Cowboys, never missing a Sunday game while cheering with fellow seniors at the community center, and they also enjoy participating in the local
    bocce league and occasional pickleball matches to stay active and socialize.
  arts: Dontae Carlock's evenings are filled with classic R&B and soul vinyl—from Otis Redding and Aretha Franklin to Marvin Gaye—and they often weave stories about the songs' histories into community gatherings,
    while also attending the church’s gospel choir rehearsals and occasionally watching stage productions celebrating Motown heritage.
  travel: Dontae Carlock prefers low‑key road trips that blend music heritage and family visits, having driven to Memphis to explore Sun Studio and to New Orleans for jazz festivals, and they dream of a
    relaxed Caribbean cruise with their grandchildren when finances allow.
  culinary: Dontae Carlock enjoys cooking hearty soul‑food staples—smoked turkey collard greens, sweet potato pie, and homemade cornbread—often incorporating fresh tomatoes and basil from their backyard
    garden, and they never turn down a chance to grill at community barbecues.
  core: Dontae Carlock blends a talkative, community‑center charisma with a competitive edge and a habit of worrying over every detail, turning everyday cleaning into a quest for excellence while never
    missing a Sunday Cowboys game.
background:
  cultural: Born in the South during the era of segregation, Dontae grew up immersed in the traditions of the African‑American community in Texas. The church played a central role in his upbringing, fostering
    a strong sense of fellowship, music, and resilience. Family gatherings featuring soul food, gospel singing, and lively conversation shaped his sociable, talkative personality. Over the years, he has
    blended Southern hospitality with the rich cultural heritage of Black Texans—celebrating Juneteenth, supporting local Black-owned businesses, and passing down stories of the civil‑rights movement to
    younger generations. This background informs his deep respect for community, his love of shared music and food, and his determination to succeed despite systemic challenges.
