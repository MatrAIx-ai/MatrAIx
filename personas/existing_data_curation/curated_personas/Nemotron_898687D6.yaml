personas:
  professional: Lindsay Geddis is a seasoned ATM and office equipment technician whose hands‑on curiosity drives them to blend mechanical troubleshooting with up‑to‑date security protocols, and they are
    actively pursuing a lead‑technician role where they can mentor newcomers while navigating a flexible schedule that sometimes spirals into charming disorganization.
  sports: Lindsay Geddis enjoys low‑impact fitness, tending their garden and strolling the neighborhood as daily cardio, cheers on the local minor‑league baseball team, the Durham Bulls, plays in a community
    softball league for women, and follows the Carolina Panthers during football season, reflecting a relaxed yet consistent engagement with sports that they savor on their own terms.
  arts: Lindsay Geddis immerses themselves in the world of words through a small historical‑fiction book club, devours works by Toni Morrison and Octavia Butler, and unwinds to classic soul legends like
    Aretha Franklin, B.B. King, and Marvin Gaye, letting those narratives and melodies shape their creative, solitary evenings as they seek quiet inspiration.
  travel: Lindsay Geddis prefers purposeful road trips to historic towns—they have explored Savannah’s cobblestone squares, taken a solo weekend to the jazz‑rich streets of New Orleans, and dream of touring
    the colonial charm of Williamsburg, always planning itineraries around antique fairs and low‑key lodging that fit their flexible schedule.
  culinary: Lindsay Geddis lovingly cooks Southern comfort dishes such as smoked collard greens with ham hocks, heirloom tomato gravy over fried chicken, and shrimp and grits, using pantry staples like
    buttermilk, smoked paprika, and fresh okra, while their modest culinary skill lets them experiment with family recipes and occasional fusion twists, and they often share these meals with neighbors.
  core: Lindsay Geddis blends technical precision with a quiet curiosity, turning vintage radios, heirloom tomatoes, and classic soul records into a solitary yet richly textured life, and they find fulfillment
    in the gentle rhythm of their own inventions.
background:
  cultural: Lindsay was raised in the African-American community of Jackson, Georgia, where Southern traditions and church life play a central role. Growing up, she attended a historic Black Baptist church
    that emphasized community service, oral storytelling, and the preservation of family heritage. These experiences instilled in her a strong sense of resilience, hospitality, and respect for elders. While
    she embraces modern technology in her career, she remains connected to cultural practices such as celebrating Juneteenth, participating in local soul food festivals, and cooking family recipes passed
    down through generations. Her cultural background also informs her collaborative yet assertive communication style, balancing communal harmony with personal agency.
attributes:
  skills: '["ATM hardware repair", "Office equipment troubleshooting", "Electrical diagnostics", "Mechanical component replacement", "Firmware and software updates", "Network configuration", "Security protocol
    compliance", "Diagnostic scripting", "Technical documentation", "Inventory management", "Customer communication"]'
  hobbies: '["Reading historical fiction", "African-American literature book club", "Vintage radio restoration", "Appliance repair as a hobby", "Backyard gardening", "Cooking Southern cuisine", "Gentle
    yoga", "Listening to soul and blues music"]'
  career_goals: Lindsay aims to advance from field service technician to a lead technician or regional supervisor role within her company, where she could mentor newer employees and help shape service standards.
    She is also interested in earning certifications in cybersecurity for banking hardware and in learning more advanced programmable logic controller (PLC) programming, with the long-term ambition of designing
    her own diagnostic tools that blend hardware repair with automated software analysis. While she values flexibility and prefers a work environment that allows her to manage her own schedule, she hopes
    the next step will also provide a clearer path toward a stable income that supports her independent lifestyle.
