personas:
  professional: A civil engineer who melds technical precision with community storytelling, Teresa Geddes leverages AutoCAD, Civil 3D, and GIS to design flood‑resilient infrastructure while championing
    stakeholder engagement through structured checklists and adaptable on‑site problem solving.
  sports: An adventurous weekend athlete, Teresa Geddes rows the Neches River with the East Texas Kayakers Club, hikes coastal pine forests, attends line‑dancing socials as a cardio routine, and roots for
    the Dallas Cowboys, Houston Astros, and the local Lone Star Soccer Club.
  arts: A stage‑loving performer, Teresa Geddes appears in community theater productions of "Our Town," dances to the twang of Carrie Underwood and the soul of Dolly Parton, and keeps a playlist of Lin‑Manuel
    Miranda and Beyoncé for inspiration during her DIY projects.
  travel: A hybrid planner and spontaneous explorer, Teresa Geddes enjoys day trips to Galveston’s beachside boardwalk, cultural evenings in New Orleans, dreams of a Patagonia kayaking expedition, and occasionally
    books a weekend getaway to Barcelona, balancing travel with family budget constraints.
  culinary: A confident home chef, Teresa Geddes whips up sizzling chicken fajitas with poblano peppers, cilantro, lime, and roasted corn, and simmers gumbo brimming with Andouille sausage, okra, diced
    tomatoes, and file powder, often incorporating fresh vegetables from her own garden.
  core: Teresa Geddes is a structured civil engineer who channels sociable energy into community projects, spontaneous DIY splurges, and a habit of double‑checking everything while occasionally forgetting
    to file taxes on time.
background:
  cultural: Teresa is a white, Southern‑Texas native raised in Beaumont, where her family has deep roots in the Gulf Coast region. Her upbringing reflects a blend of traditional Southern hospitality, a
    strong work ethic, and the multicultural flavors of East Texas, including Cajun and Creole culinary influences. Though she identifies with mainstream Protestant values typical of the area, her arts‑focused
    education fostered an appreciation for cultural diversity, historic preservation, and the importance of community narratives. This background informs her commitment to building infrastructure that respects
    local heritage while meeting modern resilience standards.
attributes:
  skills: '["Structural analysis","Site planning","Infrastructure design","Project management","Budgeting and cost estimation","Scheduling and timeline control","Quality assurance and documentation","AutoCAD","Civil
    3D","GIS mapping","Public speaking","Stakeholder engagement","Conflict mediation","Regulatory compliance"]'
  hobbies: '["Habitat for Humanity volunteering","Community clean‑up coordination","Book club participation","Line dancing","Community theater acting","Cooking Tex‑Mex and Creole cuisine","Vegetable gardening","DIY
    home improvement","Kayaking","Hiking"]'
  career_goals: Teresa aims to become a senior project manager overseeing large‑scale, resilient infrastructure projects across the Gulf Coast, with a focus on flood mitigation and sustainable design. She
    plans to achieve full Professional Engineer (PE) licensure, lead multidisciplinary teams, and eventually direct a regional civil engineering division. Long‑term, she hopes to launch her own consultancy
    that combines technical engineering solutions with community‑centred urban planning, mentoring younger engineers and advocating for policies that protect vulnerable neighborhoods from climate‑related
    risks.
