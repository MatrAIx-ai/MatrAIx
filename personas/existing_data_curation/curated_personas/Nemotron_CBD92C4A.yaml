personas:
  professional: Chew Daugird is a seasoned occupational therapy assistant with over three decades of acute and outpatient experience, whose meticulous organizational talent, bilingual fluency, and structured
    approach to patient assessment enable them to deliver precise, culturally sensitive care while they mentor junior staff and spearhead quality‑improvement projects.
  sports: Chew Daugird keeps fit through low‑impact tai chi in the local park, follows the Portland Timbers and Portland Trail Blazers, participates in a senior walking club during spring, and occasionally
    joins a community pickleball league, and they appreciate the structured routine it provides.
  arts: Chew Daugird enjoys classic cinema, regularly watching films by Akira Kurosawa and Wong Kar‑wai, delights in the cello performances of Yo‑Yo Ma, and attends local theater productions of Arthur Miller’s
    plays, and they find solace in these artistic experiences during their leisurely evenings.
  travel: Chew Daugird favors purposeful travel, planning meticulously for cultural immersion trips, having explored the historic gardens of Kyoto and the spice markets of Istanbul, while dreaming of a
    leisurely pilgrimage along the Silk Road trail through Central Asia, and they relish the balanced blend of adventure and reflective downtime.
  culinary: Chew Daugird is an adept home chef who expertly prepares traditional dishes such as char kway teow, curry laksa, and bok choy stir‑fry, favoring fresh herbs like cilantro and lemongrass, and
    they enjoy sharing these meals at family gatherings while occasionally indulging in a late‑night bowl of instant ramen for convenience.
  core: Chew Daugird balances a methodical, garden‑tending mind with a love for intricate model trains, yet they often forget to water the seedlings during rainy weeks, revealing a charmingly human paradox.
background:
  cultural: Chew Khim Daugird was born in Penang, Malaysia, into a family of ethnic Chinese descent. Raised in a bilingual household that emphasized Confucian values of respect, education, and family duty,
    he maintained strong ties to his cultural heritage through language, cuisine, and seasonal festivals. After immigrating to the United States in the early 1990s, he settled in Bloomfield, New Jersey,
    joining a vibrant Asian‑American community. He actively participates in local Chinese New Year celebrations and the Malaysian Cultural Association, where he contributes to events that showcase traditional
    arts, music, and food. His cultural identity influences his professional practice, as he integrates culturally sensitive communication and health beliefs when working with Southeast Asian patients.
    He also preserves familial rituals such as communal meals during festivals, honoring both his Southeast Asian roots and his adopted American environment.
