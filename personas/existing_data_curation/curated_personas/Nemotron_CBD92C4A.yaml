  career_goals: As he approaches retirement age, Chew aims to transition into a senior mentorship and supervisory role within his occupational therapy department. He plans to obtain Certified Occupational
    Therapy Assistant credentials if not already held, and to complete a professional development series focused on evidence‑based interventions for geriatric populations. His long‑term ambition is to design
    and implement a community outreach program that offers free mobility workshops for Southeast Asian seniors, integrating culturally relevant exercises and education. He also aspires to present his program
    model at state conferences and publish a guide on culturally sensitive occupational therapy practices. In parallel, he intends to reduce his weekly clinical hours while maintaining a part‑time consulting
    capacity to support newer aides.
