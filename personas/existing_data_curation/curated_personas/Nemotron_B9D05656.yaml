  hobbies: '[''Reading adventure and animal books'', ''Building with LEGO'', ''Drawing and coloring'', ''Playing soccer'', ''Solving jigsaw puzzles'', ''Attending library storytime'', ''Listening to R&B
    and gospel music'', ''Practicing piano'']'
  career_goals: Donna Anne dreams of a future where she can help others learn and explore. She wants to become a teacher because she enjoys sharing knowledge and keeping a classroom orderly. She also imagines
    herself as an astronaut, fascinated by space and the clear, structured rules of science. In the short term, she aims to win her school’s science fair and become the captain of her soccer team, showing
    her competitive drive and leadership aspirations.
