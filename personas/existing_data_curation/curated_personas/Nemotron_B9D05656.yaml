personas:
  professional: Donna Rasool, a budding architect in the making, channels her love for building complex LEGO structures and drawing imaginative scenes into a precise, detail-oriented approach that blends
    creativity with a practical, rule-following mindset, often sketching floor plans for imagined animal habitats during quiet reading times.
  sports: Donna Rasool, a spirited player on the Rising Star Soccer Club in Baltimore County, trains twice a week at the local park, idolizes Maryland United's midfielder Aria Jackson, and balances competitive
    drive with a structured warm-up routine, occasionally challenging teammates to score more goals.
  arts: Donna Rasool, an enthusiastic young illustrator, spends afternoons recreating scenes from Dr. Seuss books and the vivid animal paintings of National Geographic, while humming Beyoncé's upbeat R&B
    hits and gospel choruses from Kirk Franklin, and practices piano scales to accompany her creations.
  travel: Donna Rasool, a curious explorer, loves family road trips to the National Aquarium in Baltimore and the Smithsonian's National Zoo in Washington, D.C., and dreams of visiting Disney World and
    the Great Smoky Mountains, always insisting on a detailed itinerary that includes an "animal encounter" stop.
  culinary: Donna Rasool, a budding chef, prefers comfort foods like macaroni and cheese and chicken nuggets, enjoys crafting mini veggie pizzas topped with mozzarella and pepperoni, and loves the sweet
    tang of strawberry-banana smoothies, often experimenting with extra cheese as a secret ingredient.
  core: Donna Rasool blends a competitive, structure-loving mindset with a vivid imagination, turning LEGO builds, soccer drills, and storybook adventures into a disciplined yet creative daily routine,
    while occasionally forgetting to share snacks or sunscreen.
background:
  cultural: Donna Anne is a Black child growing up in Parkville, Maryland, within a close‑knit family that celebrates African‑American heritage. Her family participates in church activities, observes cultural
    events like Black History Month at school, and enjoys traditional foods such as collard greens and sweet potatoes during family gatherings. She takes pride in learning about notable Black scientists
    and athletes, and she frequently attends community festivals that highlight African‑American art, music, and history. The multicultural environment of Baltimore County, combined with her family’s emphasis
    on education and community involvement, shapes her worldview and sense of identity.
attributes:
  skills: '[''Reading fluently'', ''Basic arithmetic (addition, subtraction, multiplication)'', ''Using educational tablets and learning apps'', ''Puzzle solving'', ''Organizational skills (keeping school
