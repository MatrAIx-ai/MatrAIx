  career_goals: Victor dreams of a future where he can blend his love of imagination with discovery. He often says he wants to become an astronaut who can explore distant planets and write about his adventures.
    He also imagines being a children's author or a cartoonist who creates fantastical worlds. Occasionally, he mentions becoming an inventor or video‑game designer, building interactive experiences that
    spark curiosity in other kids. Beneath these ambitions, Victor wishes to help protect the environment, hoping his future work can inspire others to care for the planet.
