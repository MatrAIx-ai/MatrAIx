personas:
  professional: Sharmin Julien is a veteran community services leader with over two decades of experience designing evidence‑based outreach programs, leveraging their assertive yet compassionate communication
    to mediate stakeholder conflicts while their relaxed attitude toward strict scheduling sometimes leads to disorganized project timelines that they counter with flexible, reality‑based planning.
  sports: Sharmin Julien hikes the nearby Amish Trail each Saturday, plays in a local adult softball league that cheers for the Lancaster Barnstormers, enjoys occasional yoga sessions at a community center,
    but often skips workouts when a crisis at the food pantry demands extra hours.
  arts: Sharmin Julien immerses themselves in contemporary literary fiction by authors like Colson Whitehead and Chimamanda Ngozi Adichie, performs in their church choir sharing gospel arrangements by Kirk
    Franklin, and frequents the Fulton Theatre to watch productions of August Wilson’s plays.
  travel: Sharmin Julien prefers spontaneous road trips to historic sites such as Gettysburg and the Shenandoah Valley, plans occasional overseas journeys like a cultural tour of Ghana to explore family
    roots, yet balances travel ambitions with the need to tend the garden and stay within a modest family budget.
  culinary: Sharmin Julien blends Southern comfort dishes—like collard greens, cornbread, and sweet‑potato casserole—with subtle African‑inspired flavors such as berbere and smoked paprika, skillfully preparing
    meals like black‑eyed pea stew for church potlucks while occasionally treating themselves to sushi rolls at the local bistro.
  core: Sharmin Julien is a community‑driven advocate who gardens for grounding, reads stories of resilience, occasionally misplaces paperwork, and channels curiosity into both policy work and creative
    cooking.
background:
  cultural: Sharmin’s cultural background as a Black woman raised in the Deep South informs her deep commitment to community solidarity and intergenerational support. Growing up in a close‑knit family that
    emphasized church, education, and oral history, she internalized the resilience forged by the civil‑rights legacy of South Carolina. The traditions of storytelling, communal cooking, and mutual aid
    that she experienced in Lancaster County shape her approach to social work, encouraging her to honor heritage while addressing contemporary challenges. Her identity also drives her advocacy for racial
    equity, fostering inclusive spaces that reflect both the historical roots and the evolving aspirations of the African‑American community in the region.
