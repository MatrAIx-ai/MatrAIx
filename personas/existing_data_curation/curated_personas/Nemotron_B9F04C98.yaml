  hobbies: '[''Reading literary fiction'', ''Gardening'', ''Cooking Southern and African-inspired dishes'', ''Church choir participation'', ''Volunteering at food pantry'', ''Hiking local nature trails'',
    ''Community storytelling events'', ''Genealogy research'']'
  career_goals: Looking ahead, Sharmin aims to expand her impact by stepping into a regional leadership role where she can shape policy and secure long‑term funding for community programs across Lancaster
    County and neighboring areas. She envisions establishing a multidisciplinary community center that integrates after‑school tutoring, mental‑health counseling, and vocational training, especially for
    historically underserved families. Sharmin also plans to mentor emerging social‑service professionals, creating a pipeline of culturally competent leaders. Ultimately, she hopes to develop a sustainable
    scholarship fund that supports local students pursuing higher education in social work or education.
