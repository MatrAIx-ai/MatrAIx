persona_description: A landscape architect who specializes in creating sustainable and ecologically friendly landscapes, particularly those that incorporate biotechnical features and vegetation changes.
  The project aims to use the character of the area (waterlogged agriculture land) to its advantage, and the project's positive effect is already visible in the area becoming a mosaic of endangered biotopes
  in our agricultural land and enhancing the water retention potential of the area and its ability to withstand extreme weather. The project's biotopes are a strong magnet for endangered species of animal
  and plants in the area, and the exact species composition and its changes will derive from the future management of the area and other conditions. The landscape architect is likely to be interested in
  this project as they are passionate about creating sustainable and ecologically friendly landscapes and are skilled in the use of biotechnical features and vegetation changes to achieve this goal.
