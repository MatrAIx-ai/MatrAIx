  hobbies: '[''Reading business and self‑improvement books'', ''Cooking traditional soul food with a modern twist'', ''Gardening (especially herbs and vegetables)'', ''Quilting and textile arts'', ''Walking
    and light hiking in local parks'', ''Attending small jazz or poetry gatherings'', ''Volunteering at the local community center and church'', ''Exploring new coffee shops with friends'']'
  career_goals: Aysia aims to transition from a frontline sales role to a store management position within the next two years, leveraging her competitive edge and practical insight to boost team performance.
    Long‑term, she envisions becoming a district manager overseeing multiple locations, where she can apply her business education to drive regional growth. Ultimately, she aspires to launch her own boutique
    that blends contemporary fashion with culturally inspired designs, using her entrepreneurial curiosity and solid retail foundation to create a community‑focused retail space.
