persona_description: An anthropologist who is interested in the global study of human cultures and biology, with a cross-cultural perspective and field research methodology. They regularly draw on anthropological
  research and theory in their work across various disciplines, including history, comparative political science, literary criticism, psychology, medicine, biologists, linguists, archaeologists, and others.
  Their work is an asset for work in international affairs, financial services, communications, public health, media and market research, and public policy. They have a broad understanding of the interrelation
  of history and culture, and are active in interdisciplinary research on topics such as nationalism, religion, race and ethnicity, gender, ritual, language, law, violence, refugees, medicine, science,
  media, literature, human origins, and the interrelation of history and culture.
