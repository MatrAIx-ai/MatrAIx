personas:
  professional: Rodrigo Pizarro is a budding visual artist who blends the vivid palettes of Los Angeles street murals with digital painting techniques, channeling a relentless curiosity into sketchbooks
    while allowing a relaxed, sometimes last‑minute approach to school art assignments to coexist with their keen eye for color.
  sports: Rodrigo Pizarro enjoys kicking a soccer ball at the local park, rooting for the LA Galaxy in the MLS season, slides into occasional basketball pickup games with the school team, and follows the
    Los Angeles Lakers, although they prefer the laid‑back vibe of weekend skate sessions over organized practice.
  arts: Rodrigo Pizarro immerses themselves in creating murals‑inspired drawings, drawing inspiration from Diego Rivera, Frida Kahlo, and contemporary street artist Shepard Fairey, while strumming guitar
    to the sounds of Juanes and Billie Eilish, and devouring graphic novels like "Saga" and animated films from Studio Ghibli.
  travel: Rodrigo Pizarro loves weekend trips to the Griffith Observatory for skyline sketches, day‑long explorations of downtown mural districts, and dreams of visiting Oaxaca’s historic plazas and the
    vibrant alleyways of San Miguel de Allende, yet their travel plans hinge on parental permission and school schedules.
  culinary: Rodrigo Pizarro favors bold flavors, often munching on freshly made tamales with salsa roja, crafting avocado‑lime guacamole on a whim, and experimenting with DIY churro dough after watching
    YouTube cooking tutorials, though they sometimes forget to clean the kitchen afterward.
  core: Rodrigo Pizarro blends a restless artistic curiosity with a laid‑back attitude, juggling sketchbooks, a gasped‑for‑time worry over schoolwork, and a love for bold colors, perfect‑tuned playlists,
    and midnight Minecraft builds.
background:
  cultural: Rodrigo is a first‑generation Mexican‑American raised in Los Angeles. He grew up speaking Spanish at home and English at school, giving him a bicultural perspective. Family celebrations of Día
    de los Muertos, Mexican holidays, and traditional foods like tamales shape his identity, while the vibrant Chicano art scene of LA—especially murals and community festivals—feeds his artistic sensibility.
    He feels a strong connection to the legacy of Mexican muralists such as Diego Rivera, and he often incorporates those bold colors and symbolic motifs into his own drawings, reflecting a blend of heritage
    and contemporary American influences.
attributes:
  skills: '[''Digital Illustration'', ''Sketching'', ''Basic Python Programming'', ''Scratch Visual Scripting'', ''Bilingual Spanish‑English Communication'', ''Creative Problem Solving'', ''Small‑Group
    Collaborative Projects'', ''Basic Guitar Playing'']'
  hobbies: '[''Sketching'', ''Digital Painting'', ''Street‑Mural Exploration'', ''Playing Guitar'', ''Watching Animated Films'', ''Minecraft World‑Building'', ''Reading Graphic Novels'', ''YouTube Art Tutorials'',
    ''After‑School Art Club'']'
  career_goals: Rodrigo hopes to turn his love of art and technology into a career as a concept artist or animator, ideally creating characters and environments that weave Mexican cultural symbols into
    modern media. He dreams of attending an art‑focused high school and later a college program in visual storytelling, eventually working freelance so he can keep a flexible schedule that allows time for
    personal projects and family. He is also curious about museum work and would like to help curate exhibits that highlight Latin American art, merging his appreciation for heritage with his creative skills.
