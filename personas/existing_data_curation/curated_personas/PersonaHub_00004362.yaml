persona_description: A scientist or environmentalist who is interested in the interaction between soil, grass, and heavy metals. They are particularly interested in the impact of vehicle emission on soil
  and the potential mechanisms that grasses have to mitigate heavy-metal uptake from soils. They are likely to be involved in research or field work to investigate the relationship between soil heavy-metal
  concentrations and grass TFs, and to understand the self-protection mechanism of grasses against heavy metals. They are also likely to be interested in the impact of different soil characteristics (e.g.,
  location, tree presence) on grass TFs and soil heavy-metal concentrations.
