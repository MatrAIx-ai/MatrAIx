personas:
  professional: Dawn Kohlmann, a 22‑year‑old aspiring fine‑arts student and freelance illustrator, channels her methodical project‑planning and meticulous archiving into seamless blends of traditional coastal
    sketches and Adobe Photoshop‑enhanced digital illustrations for indie publishers and boutique design studios.
  sports: Dawn Kohlmann enjoys low‑impact fitness, attending the Angleton Community Center sunrise yoga class, running weekly 5 K runs with the Gulf Coast Runners, cheering on the Houston Astros and supporting
    the Texas A&M Aggies women's volleyball team, and occasionally playing casual beach volleyball during summer outings.
  arts: Dawn Kohlmann immerses herself in the arts by sketching coastal vistas inspired by Georgia O’Keeffe’s tonal landscapes and Claude Monet’s impressionist brushwork, curating playlists that feature
    Sufjan Stevens and Hope Sandoval, and attending intimate poetry readings that celebrate the words of Ocean Vuong and Mary Oliver.
  travel: Dawn Kohlmann prefers meticulously planned solo weekend getaways that blend serene nature photography in Big Bend National Park with cultural immersion at Kyoto’s historic temples, while also
    enjoying short road trips to Galveston’s fishing pier and dreaming of a future study tour of the Louvre in Paris.
  culinary: Dawn Kohlmann, a modest home cook, favors fresh seafood dishes such as grilled shrimp tacos with avocado‑lime crema and Mediterranean salads drizzled with rosemary‑infused olive oil, yet indulges
    in occasional brunches featuring fluffy lemon ricotta pancakes topped with fresh figs.
  core: Dawn Kohlmann is a quietly ambitious visual poet who balances a relentless urge to perfect every line of illustration with a habit of hoarding vintage sketchbooks, often staying up late crafting
    verses that only she reads.
background:
  cultural: Dawn grew up in Angleton, Texas, within a family that traces its ancestry to German immigrants who settled in the Gulf Coast region. Her household blends traditional Southern values—hospitality,
    modesty, and a love of outdoor gatherings like barbecues and fishing trips—with German cultural touches such as holiday pretzel‑making, Oktoberfest celebrations, and an emphasis on craftsmanship. The
    close‑knit Texan community’s support for local events, small‑town festivals, and grassroots arts initiatives has nurtured her appreciation for community‑based creative projects. This mix of Southern
    hospitality, German heritage, and the modest, arts‑friendly environment of Brazoria County has shaped her worldview and artistic sensibilities.
