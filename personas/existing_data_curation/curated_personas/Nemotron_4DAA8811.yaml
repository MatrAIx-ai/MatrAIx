    art workshops'']'
  career_goals: Dawn intends to enroll in a community college or university program to earn a degree in Fine Arts or Creative Writing within the next two years, building a professional portfolio that highlights
    her illustration and literary work. She aims to launch a freelance career as a graphic designer and illustrator, collaborating with independent publishers and boutique design studios. Long‑term, she
    envisions curating small‑scale art exhibitions and community workshops in Texas towns, using her organizational expertise to support local artists. She also hopes to develop an online platform for publishing
    her poetry and hosting virtual creative‑thinking workshops.
