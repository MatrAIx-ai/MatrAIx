persona_description: A historian or genealogist who is interested in the history of logging towns in eastern Oregon, particularly the town of Maxville. They are passionate about preserving the memory of
  the town and its community, and are willing to relocate to eastern Oregon to do so. They are also interested in the history of the town's workers, particularly the racial segregation and the bond formed
  between white and black loggers. They are dedicated to the National Trust for Historic Preservation and are interested in their work to save America's historic places.
