personas:
  professional: Nicholas Strickland is a meticulous aircraft mechanic at a regional maintenance shop, who excels at routine inspections, preventive maintenance scheduling, and detailed documentation, and
    they leverage their methodical mindset to streamline workflows while dreaming of one day opening a community‑focused aviation service shop in Lincoln County.
  sports: Nicholas Strickland is an avid outdoorsman who spends weekends hunting deer in the county woods, fishing for largemouth bass on the local lake, cheering on the Lincoln County Knights high‑school
    football team and the Cleveland Browns, and they maintain a modest fitness routine of weight‑training at the community gym and occasional pickup basketball games.
  arts: Nicholas Strickland is a sociable acoustic guitarist who often leads sing‑alongs of classic country tunes by Johnny Cash and Willie Nelson at county fair gatherings, enjoys line‑dancing nights to
    the sounds of the local square dance band, and they occasionally dabble in sketching vintage aircraft silhouettes during downtime.
  travel: Nicholas Strickland is a methodical planner who budgets annual trips to nearby national parks such as Badlands National Park and the Grand Canyon for weekend camping, prefers driving routes that
    allow stops at historic small towns for local diners, and they have a bucket‑list destination of a cross‑country road trip to explore the historic Route 66 aviation museums.
  culinary: Nicholas Strickland is a hearty home‑cook whose go‑to meals include grilled trout seasoned with dill and lemon, smoky BBQ brisket glazed with honey‑chipotle sauce, and buttery cornbread made
    from stone‑ground cornmeal, and they take pride in perfecting a secret chili recipe that combines backyard‑grown jalapeños with smoked paprika.
  core: Nicholas Strickland is a routine‑driven, outgoing twenty‑two‑year‑old whose love of aircraft maintenance, country music, and community gatherings is balanced by a habit of double‑checking every
    tool before sleeping, and they have an occasional over‑indulgence in late‑night fishing snacks.
background:
  cultural: Nicholas is a white Appalachian native from Crab Orchard, Kentucky. He was raised in a tight‑knit, rural community where Southern hospitality, church involvement, and family gatherings are central
    to daily life. The region’s heritage of hard work, respect for practical skills, and love of the outdoors shaped his values. Local traditions such as country music, community fairs, and a strong sense
    of neighborly support influence his outlook, reinforcing his preference for routine, reliability, and cooperative interaction.
attributes:
  skills: '["Aircraft maintenance", "Hydraulic systems troubleshooting", "Electrical systems diagnostics", "Propulsion component repair", "Preventive maintenance scheduling", "FAA regulations compliance",
    "Technical documentation", "Tool and inventory management", "Team coordination"]'
  hobbies: '["Fishing", "Hunting", "Model airplane building and flying", "Volunteer firefighting", "Attending county fairs and line‑dancing", "Watching high‑school football", "Playing acoustic guitar at
    gatherings"]'
  career_goals: Nicholas aims to obtain his FAA Airframe and Powerplant (A&P) license within the next year and advance to a senior technician role at the regional maintenance facility. He aspires to specialize
    in avionics systems, eventually supervising a maintenance team and implementing streamlined workflow processes. Long‑term, he hopes to open a small aviation service shop in Lincoln County, providing
    maintenance for local GA aircraft and supporting community aviation needs while mentoring new mechanics.
