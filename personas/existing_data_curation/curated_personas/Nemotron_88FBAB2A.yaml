  career_goals: Gregorio aims to transition from his current managerial role to a senior executive position—ideally Vice President of Operations or Chief Operating Officer—where he can shape company strategy
    at a higher level. He envisions establishing a mentorship program to nurture emerging talent, championing flexible, data‑driven decision‑making processes, and spearheading sustainability initiatives
    that align profitability with environmental responsibility. Long‑term, he dreams of launching his own boutique consultancy that helps midsize firms adopt agile management practices while honoring cultural
    diversity.
