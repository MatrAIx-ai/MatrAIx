personas:
  professional: Marites Hill, a 23‑year‑old retail cashier with a STEM degree, merges her Python, Excel, and Photoshop skills with her high emotional reactivity to deliver empathetic data insights and user‑experience
    research for a fast‑growing LA tech startup, although her love of spontaneity sometimes leaves project trackers half‑filled.
  sports: Marites Hill explores Griffith Park’s trails on weekend hikes, attends Saturday yoga classes at a downtown studio, cheers for the LA Lakers and LA Galaxy, and holds a membership at a local climbing
    gym where she occasionally busts a move on the bouldering wall.
  arts: Marites Hill immerses herself in LA’s art scene, snapping street murals by Swoon and Banksy with her DSLR, performing original poetry at open‑mic nights alongside indie acts like Mitski and The
    Strokes, and curates a personal Instagram feed that blends urban photography with vibrant graphic design using Canva.
  travel: Marites Hill prefers spur‑of‑the‑moment getaways, often jetting off to Santa Barbara’s coast for sunset hikes, dreaming of a tech‑focused trip to Seoul’s coworking hubs, and keeping a flexible
    travel budget that lets her snag last‑minute flight deals to Japan’s Tokyo for the neon‑lit night markets.
  culinary: Marites Hill loves cooking home‑cooked adobo and sinigang while experimenting with fusion dishes like adobo tacos and ramen‑sinigang broth, enjoys sourcing fresh herbs at farmers’ markets, and
    treats herself to matcha lattes and ube‑infused desserts as part of her weekly culinary adventures.
  core: Marites Hill is a socially‑charged, art‑obsessed data enthusiast who balances spontaneous creativity with bouts of anxiety, often juggling caffeine‑fuelled late‑night coding sessions and impromptu
    photo walks through LA’s murals.
background:
  cultural: Marites is a second‑generation Southeast Asian American, with her parents having emigrated from the Philippines to Los Angeles. Raised in a bilingual household, she grew up speaking Tagalog
    at home while attending an English‑language public school. Family gatherings are centered around shared meals, traditional celebrations such as Sinulog and Christmas Eve 'Noche Buena', and storytelling
    that weaves Filipino folklore with modern experiences. The multicultural fabric of Los Angeles, especially the vibrant Filipino community in Historic South Central, has shaped her identity, allowing
    her to blend Filipino values of close‑knit family ties and respect for elders with the individualistic, entrepreneurial spirit of the city. She participates in local cultural festivals, volunteers at
    the annual Filipino American Festival, and stays connected to her heritage through music, food, and community.
attributes:
