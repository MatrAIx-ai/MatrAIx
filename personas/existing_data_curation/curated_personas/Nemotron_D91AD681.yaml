  hobbies: '[''Street photography'', ''Visiting art galleries and murals'', ''Creative writing and poetry'', ''Singing at open‑mic events'', ''Cooking Filipino and fusion cuisine'', ''Hiking in Griffith
    Park'', ''Yoga and mindfulness practice'', ''Watching sci‑fi TV series'', ''Multiplayer video gaming'', ''Volunteering at cultural festivals'']'
  career_goals: Marites aims to transition from cashier work into a role that fuses her technical know-how with her love for people. Over the next few years she plans to secure an entry-level position in
    data analytics or user‑experience research at a tech startup, leveraging her STEM background and her knack for gathering customer insights. She intends to complete an online certification in data visualization
    (Tableau) and a UX design boot camp. Long‑term, she dreams of becoming a product manager or community manager who can shape products that improve everyday interactions, especially tools that support
    mental‑health resilience for young adults. She also hopes to eventually launch her own side‑project – a multimedia blog that highlights Southeast Asian artists and tech innovators, blending her artistic
    curiosity with her analytical skills.
