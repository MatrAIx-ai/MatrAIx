personas:
  professional: Melanie Benson, a budding arts program coordinator with a foundation in visual arts and communications, leverages her sketching talent, basic graphic design skills in Photoshop and Canva,
    and natural empathy to design community workshops and curate intimate exhibitions while juggling a love for flexibility over rigid schedules.
  sports: Melanie Benson enjoys low‑key fitness through weekend hikes on the Inman trails, regular yoga sessions at Blue Ridge Yoga, and cheering on the Charlotte Hornets and Carolina Panthers, while she
    occasionally joins a local "Inman Trail Hikers" meetup group for group outings.
  arts: Melanie Benson finds inspiration in the works of Georgia O'Keeffe and contemporary photographer Andreas Gursky, frequents the Greenville Art Museum and indie music venues where Tame Impala and Maggie
    Rogers play, and actively participates in a small‑group book club that devours Ocean Vuong's poetry and Brit Bennett's novels.
  travel: Melanie Benson favors spontaneous weekend road trips to nearby Asheville, Savannah, and the Blue Ridge Parkway, while dreaming of a spring pilgrimage to Florence's Uffizi Gallery and Kyoto's temple
    gardens, balancing her modest travel budget with careful use of travel‑deal apps.
  culinary: Melanie Benson enjoys modest cooking, often whipping up roasted beet salad with goat cheese, fresh herbs like rosemary and thyme, and homemade pesto, relishes strawberry shortcake during the
    Inman Strawberry Festival, and frequents farm‑to‑table brunch spots for avocado toast and locally roasted pour‑over coffee.
  core: Melanie Benson is a curious, art‑obsessed 23‑year‑old who blends sketchbooks with community volunteering, spends freely on creative experiences, and sometimes lets disorganization and procrastination
    color her finance and health routines.
background:
  cultural: Melanie grew up in a close-knit, middle-class family in Inman, South Carolina. Her upbringing reflected the traditional Southern values of hospitality, community involvement, and appreciation
    for the natural landscape. Family gatherings often featured home-cooked Southern meals, church potlucks, and local festivals such as the Inman Strawberry Festival, which fostered her love for small-scale
    community events. While her family is rooted in Protestant tradition, Melanie maintains an open-minded stance toward spirituality and draws inspiration from the region’s folk art, storytelling, and
    local music. This Southern cultural milieu, combined with exposure to the broader arts scene in nearby Greenville, shapes her aesthetic sensibility and collaborative spirit.
attributes:
  skills: '[''visual composition'', ''basic graphic design (Adobe Photoshop, Canva)'', ''creative writing'', ''research and synthesis'', ''active listening'', ''mediation and conflict resolution'', ''community
    event coordination'', ''social media management'', ''Microsoft Office proficiency'']'
  hobbies: '[''gallery visits'', ''sketching and visual journaling'', ''book club'', ''indie music concerts'', ''hiking'', ''volunteering at community festivals'', ''yoga'']'
  career_goals: Melanie aims to translate her love for art and people into a career that blends creativity with community service. She hopes to pursue a role as a program coordinator for a local arts nonprofit
    or a museum education specialist, where she can design workshops, curate small exhibitions, and facilitate art-based outreach for under-served groups. In the longer term, she is interested in obtaining
    a certification in art therapy to combine her empathetic nature with therapeutic practices, allowing her to help individuals process emotions through creative expression while maintaining the flexibility
    and autonomy she values.
