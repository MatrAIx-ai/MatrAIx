persona_description: A transplant surgeon who specializes in the study of pregnancy outcomes in transplant recipients, particularly those who have undergone kidney and liver transplants. His research interests
  include the long-term effects of pregnancy on transplant recipients, the risks and benefits of pregnancy after transplant, and the development of counseling and support for transplant families. He has
  published extensively on the topic and is considered a leading expert in the field.
