  hobbies: '["Cooking Mexican cuisine", "Salsa dancing", "Gardening (herbs and tomatoes)", "Volunteering at community health fairs", "Book club (Latino literature)", "Hiking in Livermore hills", "Visiting
    vineyards"]'
  career_goals: Gabriela aims to advance to a senior lead dental assistant role, overseeing clinical workflow and staff training in her practice. She plans to obtain a Certified Dental Radiography credential
    and explore part-time coursework toward a Dental Hygiene associate degree, allowing her to expand clinical services. Additionally, she wishes to launch a community outreach program that offers free
    oral‑health workshops for Spanish‑speaking families in the Livermore‑Stanislaus region, leveraging her cultural background and network. Long term, she envisions mentoring a new generation of dental
    assistants, promoting workplace stability and patient‑centered care.
