    patient communication (art-based techniques)'']'
  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Photography'', ''Group hiking'', ''Cooking classes (global cuisines)'', ''Volunteer work (health‑and‑art community programs)'',
    ''Yoga and mindfulness'', ''Attending cultural festivals'', ''Reading contemporary fiction and science literature'']'
  career_goals: Shellie aims to advance into a nursing leadership role within the next five years, such as a unit manager or director of patient experience, where she can shape policies that promote holistic,
    patient‑centered care. She is also interested in pursuing a Nurse Practitioner certification with a focus on community health, allowing her to combine clinical practice with preventive programs. Long‑term,
    she envisions developing a community outreach initiative that pairs health education with art workshops to improve wellness and mental health among diverse populations in Rowland Heights and the broader
    Los Angeles County.
