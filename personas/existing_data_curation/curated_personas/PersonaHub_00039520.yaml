persona_description: A U.S. doctor who specializes in the treatment of uterine disease, including cancer, fibroids, endometriosis, and prolapse. They perform about 600,000 hysterectomies every year, making
  it the second most common surgical procedure. They are knowledgeable about the wide variety of conditions that affect the uterus, and offer alternative treatments that can preserve the uterus and ovaries.
  They are likely to read about the benefits of a less invasive surgical procedure using a state-of-the-art surgical robotic system, including the potential benefits over traditional surgical approaches,
  such as fewer complications, shorter recovery time, and less pain.
