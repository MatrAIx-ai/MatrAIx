persona_description: Henry Ell Frye was a lawyer who was involved in the NAACP from a young age, especially during his college years. He recalls that the organization had a reputation as being a radical
  organization during the 1930s through 1940s, and that his involvement with the group was questioned by the bar. Frye became a life member of the NAACP and tried to work with the organization, but he wasn't
  active during law school. He was asked about his involvement with the NAACP when he was being considered for his license to practice law, and he thought it was inappropriate. Frye was a lawyer who specialized
  in civil rights law and was known for his work in the NAACP.
