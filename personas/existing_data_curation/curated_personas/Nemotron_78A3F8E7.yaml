personas:
  professional: Daniel Manaois, a 62‑year‑old master electrician in coastal Louisiana, blends three decades of residential, marine, and solar‑panel wiring expertise with a practical, solution‑focused mindset,
    mentoring apprentices while often juggling spontaneous on‑site challenges that clash with their preference for structure and occasional deadline lapses.
  sports: Daniel Manaois enjoys early‑morning bayou fishing, participates in seasonal deer hunting trips, supports the New Orleans Saints and LSU Tigers, and is a member of the Bayou Anglers Club where
    they compete in local bass tournaments while balancing a relaxed approach to fitness that includes weekend gardening and occasional cardio walks.
  arts: Daniel Manaois regularly attends Zydeco concerts featuring Clifton Chenier tributes and Rockin' Dopsie revivals, collects folk art prints by regional painters, and enjoys playing cards to live the
    storytelling tradition of local musicians, all of which nourish their love for community‑rooted creative expression.
  travel: Daniel Manaois prefers carefully planned road trips along the Gulf Coast, especially to historic fishing villages and swamp tours, but occasionally embarks on spontaneous weekend getaways to New England
    for leaf‑peeping, balancing a desire for low‑stress travel with a spontaneous streak that leads them to book last‑minute river‑boat charters.
  culinary: Daniel Manaois takes pride in cooking gumbo, crawfish étouffée, and blackened catfish using andouille sausage, file powder, and fresh okra, demonstrates solid but not gourmet-level culinary
    skills, and frequently hosts Cajun cooking gatherings where they share family recipes while occasionally over‑seasoning dishes to the point of nasal irritation for themselves.
  core: Daniel Manaois is a seasoned electrician turned consultant who balances meticulous planning with sudden spur‑of‑the‑moment ventures, worries about finances and health, yet finds calm in fishing,
    woodworking, and community music nights.
background:
  cultural: Daniel comes from a white Southern Louisiana background rooted in Houma, Terrebonne Parish. He grew up in a working‑class family that valued hard work, self‑reliance, and community cohesion.
    While his cultural upbringing is primarily Southern American, he has been heavily influenced by the Cajun and Creole traditions of the region, including Catholic holidays, festive Mardi Gras celebrations,
    and a cuisine centered on seafood and spice. These cultural threads combine with a pragmatic, down‑to‑earth worldview that shapes his daily life, relationships, and professional identity.
attributes:
  skills: '[''Residential wiring'', ''Commercial electrical systems'', ''Generator installation and maintenance'', ''Solar panel wiring'', ''Electrical code compliance (NEC)'', ''Troubleshooting and diagnostics'',
