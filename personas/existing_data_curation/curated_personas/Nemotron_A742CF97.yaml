personas:
  professional: Yolanda Thurston is a seasoned dental assistant whose expertise in chairside assistance, dental radiography, and infection‑control protocols is matched by a disciplined scheduling precision
    and a warm, choir‑honed empathy that steadies anxious patients and harmonizes the clinic’s staff dynamics.
  sports: Yolanda Thurston stays active by walking with the Shelbyville Senior Strollers, cheering on the St. Louis Cardinals baseball team on weekends, and joining gentle yoga classes at the community
    center, maintaining a low‑impact routine that respects their joint sensitivities while satisfying their sociable spirit.
  arts: Yolanda Thurston expresses creativity through leading the church choir’s gospel harmonies, crafting quilts inspired by Georgia O’Keeffe’s floral motifs, and attending performances by the local symphony
    where they especially admire violinist James Ehnes, often quoting the lyricism of Mahalia Jackson for inspiration.
  travel: Yolanda Thurston prefers meticulously planned short road trips, revisiting the historic streets of Savannah, Georgia, and the jazz‑filled nights of New Orleans, while dreaming of a leisurely cruise
    to the Bahamas as a gentle escape from daily routines.
  culinary: Yolanda Thurston delights in cooking Southern comfort dishes such as chicken and dumplings, collard greens simmered with smoked turkey, and peach cobbler made with fresh Georgia peaches, showcasing
    a competent, home‑cooking skill that blends tradition with a disciplined attention to seasoning and texture.
  core: Yolanda Thurston merges disciplined precision with a vibrant community spirit, channeling anxiety into meticulous routines—from perfecting patient records to a never‑ending, slightly chaotic quilt
    stash.
background:
  cultural: Yolanda grew up in a close‑knit African‑American community in rural Tennessee during the civil‑rights era, where church, family, and community resilience were central to daily life. Her upbringing
    emphasized oral traditions, soulful music, and Southern cuisine, fostering a deep sense of cultural pride and collective responsibility. As a Black woman navigating the challenges of the South, she
    developed strong empathy and a commitment to uplifting others, especially through health education and community service. These cultural influences continue to shape her values of compassion, cooperation,
    and the importance of preserving heritage through shared activities.
