  hobbies: '[''sketching and traditional painting'', ''digital illustration and 3D modeling'', ''playing acoustic guitar'', ''listening to experimental indie music'', ''reading sci‑fi, fantasy, and philosophy'',
    ''sandbox and indie video gaming'', ''photography (street and landscape)'', ''visiting art galleries and community workshops'', ''improv theater and group performances'', ''board‑game nights'', ''hiking
    desert trails'', ''journaling and mindfulness meditation'']'
  career_goals: Joseph aims to turn his artistic passion into a sustainable career. Over the next few years, he plans to enroll in a community‑college program or a certificate in graphic design or illustration
    while completing his GED. He wants to build a professional portfolio that showcases concept art, digital illustrations, and short narrative pieces, targeting entry‑level positions at indie game studios,
    animation houses, or design agencies. He also envisions freelance work creating social‑media visuals for local businesses, allowing him to balance creative freedom with steady income. Long‑term, Joseph
    hopes to launch a community art workshop for at‑risk youth in Glendale, combining his love for group activities, mentorship, and visual storytelling. He is focused on developing resilience to stress
    through structured routines and mindful practices to sustain his creative output.
