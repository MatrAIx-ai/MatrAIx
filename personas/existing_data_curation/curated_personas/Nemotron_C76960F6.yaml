  hobbies: '[''Digital drawing and painting'', ''Creative writing (poetry, short stories)'', ''Improv comedy'', ''Board game nights'', ''Visiting art galleries and museums'', ''Live music concerts'', ''Hiking
    local trails'', ''Photography'', ''Volunteer art workshops'', ''Podcast listening (philosophy, art)'', ''Video essay production'']'
  career_goals: Gary aims to channel his artistic talents and curiosity into a sustainable freelance career as a visual storyteller and content creator. Over the next two years, he plans to complete his
    bachelor's degree in visual communications or a related field, build a robust portfolio, and secure regular commissions from local businesses, start‑ups, and community organizations in the Bucks County
    area. He envisions eventually founding a community art space where he can host workshops, curate pop‑up exhibitions, and mentor emerging artists. Long‑term, he hopes to combine his passion for abstract
    ideas with media production by creating video essays and podcasts that explore art, philosophy, and culture, gaining a wider online following and influencing public discourse.
