persona_description: A scientist or researcher who is passionate about understanding the complex processes of nitrogen cycling through air, land, and water systems, and who is dedicated to balancing the
  goals of a developed world with the health of people and ecosystems. This person is drawn to remote and wild landscapes, such as the BC coastal range, and is skilled at using laboratory tools to measure
  the levels of nitrogen in rain and determine its potential impacts on the environment. This person is also skilled at working with land managers to balance the goals of a developed world and sustaining
  the health of people and ecosystems.
