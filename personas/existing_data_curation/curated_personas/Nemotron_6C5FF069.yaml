personas:
  professional: Joline Self blends rigorous statistical modeling, Python programming, and laboratory precision with a cooperative, curiosity‑driven approach, delivering data‑rich sustainability insights
    to community stakeholders as a budding environmental data analyst.
  sports: Joline Self enjoys weekend hikes along the Toms River coastal trails, runs with the Toms River Striders running club, roots for the New York Yankees in baseball and the New Jersey Devils in hockey,
    and occasionally joins community softball games, balancing active outdoor time with moderate competition.
  arts: Joline Self cultivates creative leisure through weekly board‑game nights, attends live shows featuring indie folk artists like The Lumineers and singer‑songwriter Taylor Swift, and draws inspiration
    from science‑fiction authors Anne McCaffrey and Neal Stephenson while exploring visual art in local galleries.
  travel: Joline Self prefers thoughtfully planned escapes, often weekend‑tripping to Cape May’s historic lighthouse or Asbury Park’s board‑walk, while dreaming of Mediterranean getaways to Santorini and
    cultural immersion in Kyoto, balancing cost‑conscious budgeting with a desire for both relaxation and adventure.
  culinary: Joline Self delights in cooking Mediterranean‑style meals such as Greek salad with feta and olive oil, chickpea falafel with tahini, and grilled sea bass seasoned with fresh rosemary, often
    sourcing organic vegetables from their backyard garden and experimenting with seasonal herbs like basil and mint.
  core: Joline Self is a data‑savvy environmental advocate who balances meticulous research with a love for birdwatching, garden composting, occasional board‑game marathons, and a habit of over‑organizing
    travel itineraries that sometimes leaves them scrambling for spontaneity.
background:
  cultural: Joline is a white American raised in a middle‑class family in New Jersey, with ancestry tracing back to Northern Europe. Her upbringing emphasized education, community involvement, and a balanced
    work‑life ethic. Growing up near the Atlantic coast, she developed an appreciation for the outdoors and a sense of stewardship for the local environment. She enjoys regional traditions such as Fourth
    of July beach outings, autumn festivals, and seasonal community gatherings, often participating in neighborhood clean‑up events and supporting local charities.
attributes:
  skills: '["Statistical modeling and data analysis (Python, R, SQL)", "Laboratory techniques and experimental design", "Technical writing and report preparation", "Project planning and agile coordination",
    "Data visualization (Tableau, PowerBI)", "GIS mapping and spatial analysis", "Public speaking and community outreach", "Problem solving and critical thinking"]'
  hobbies: '["Hiking and coastal trail walking", "Birdwatching and nature photography", "Organic gardening and composting", "Cooking Mediterranean and health‑focused recipes", "Board‑game nights with friends",
    "Volunteering at community garden", "Attending live‑music events", "Reading science fiction and non‑fiction", "Online learning (e.g., language or tech courses)"]'
  career_goals: Joline aims to secure a role that merges her scientific expertise with tangible community impact, such as sustainability consulting, environmental data analysis, or a data‑science position
    within a public‑health nonprofit. She plans to obtain a professional certification in data science and deepen her knowledge of environmental policy over the next two years. Her long‑term ambition is
    to lead multidisciplinary projects that drive evidence‑based decision‑making and, eventually, to launch her own consulting practice that helps local municipalities implement resilient, data‑informed
    environmental solutions.
