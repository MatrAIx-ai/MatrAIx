personas:
  professional: Nadège Spencer is a seasoned housekeeping specialist who blends deep‑cleaning expertise with a passion for eco‑friendly methods, excels at mentoring newcomers, and leverages their spontaneous
    adaptability to meet client needs while occasionally battling the pressure of strict deadlines.
  sports: Nadège Spencer stays active through weekly Zumba classes and line‑dancing socials, cheers on the LSU Tigers football team on Saturdays, and supports the New Orleans Saints during the NFL season,
    all while balancing a light jog around their backyard garden to keep fit.
  arts: Nadège Spencer delights in leading her church gospel choir, sings soulful harmonies alongside classics by Aretha Franklin and modern R&B from Alicia Keys, frequents local jazz nights featuring artists
    like Wynton Marsalis, and finds inspiration for her crocheting projects in the rhythmic patterns of music.
  travel: Nadège Spencer prefers spur‑of‑the‑moment road trips along the Gulf Coast, revisiting the historic charm of New Orleans during Mardi Gras and exploring the quiet bays of Grand Isle, while budgeting
    modestly to ensure family responsibilities remain covered, and they often bring back regional spices to enrich their cooking.
  culinary: Nadège Spencer showcases her culinary flair by simmering hearty gumbo with locally sourced shrimp, tossing jambalaya with smoked sausage and collard greens harvested from her garden, and perfecting
    a sweet potato pie topped with caramelized pecans, all while juggling family meals and occasional late‑night cravings for fried catfish.
  core: Nadège Spencer is a vibrant, community‑rooted eco‑cleaning enthusiast who juggles a love for gospel music, spontaneous dance, and robust Creole cooking while wrestling with financial worries and
    a tendency to overcommit.
background:
  cultural: Nadège is a Black woman raised in the rich cultural tapestry of the Gulf South. Her family traditions blend African-American Southern customs with elements of Louisiana Creole heritage, reflected
    in her love for gospel music, community churches, and seasonal celebrations such as Juneteenth and Mardi Gras. She grew up hearing stories of resilience and community solidarity, which inform her strong
    sense of family, respect for elders, and commitment to helping neighbors. The cuisine, music, and oral histories of Baton Rouge have shaped her identity, and she maintains these ties through cooking,
    church involvement, and participation in local cultural events.
attributes:
  skills: '["Deep cleaning", "Sanitation protocols", "Eco-friendly product knowledge", "Fabric and laundry care", "Floor care (hard-floor polishing, carpet cleaning)", "Basic home maintenance", "Inventory
    management", "Time-sensitive task execution", "Customer service", "Team mentoring", "Multilingual communication (English, Louisiana Creole)", "Event setup and teardown"]'
  hobbies: '["Church choir and fellowship", "Cooking Creole and soul-food", "Attending Mardi Gras and local festivals", "Social dancing (Zumba, line dancing)", "Backyard gardening", "Crocheting and quilting",
    "Reading self-help books", "Listening to R&B and jazz"]'
  career_goals: Nadège aims to move from individual housekeeping work to a supervisory role within a residential or hospitality cleaning team, where she can train and lead others. She plans to earn a certification
    in green cleaning and later pursue a small business license to launch her own eco-focused cleaning service, employing other women from her community. Financial stability and the ability to set her own
    schedule are top priorities, allowing her to reduce stress and provide more security for her family. Long-term, she hopes to become a recognized expert in sustainable housekeeping within the Baton Rouge
    area.
