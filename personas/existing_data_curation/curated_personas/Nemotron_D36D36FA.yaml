  hobbies: '[''Cooking Mexican cuisine'', ''Gardening'', ''Listening to Mexican folk music'', ''Reading mystery novels'', ''Lakefront walking'', ''Playing chess in a small club'', ''Truck engine tinkering'',
    ''Volunteering at church food pantry'']'
  career_goals: Amelia aims to shift from primarily driving to a supervisory and mentorship role within the Chicago trucking community. She plans to obtain a logistics management certification and eventually
    own a small fleet of trucks, allowing her to provide stable income for her family and secure a comfortable retirement. Additionally, she seeks to diversify her earnings by offering part‑time sales consulting
    to local businesses, leveraging her negotiation skills. Her competitive streak drives her to be recognized as a reliable, high‑performing professional, while her practical nature pushes her to establish
    a work schedule that reduces emotional distress and balances personal well‑being.
