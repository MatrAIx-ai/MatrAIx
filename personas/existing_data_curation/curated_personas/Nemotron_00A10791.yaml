personas:
  professional: Jerry Johnson, a 46‑year‑old commercial and industrial designer, leverages their methodical expertise in SolidWorks, Rhino and CNC prototyping to translate client concepts into production‑ready
    products while delivering confident, talk‑heavy presentations that rally cross‑functional teams and keep projects on a tightly scheduled track.
  sports: Jerry Johnson fuels their competitive streak by joining a weekend cycling club, logging 8‑mile trail runs, practicing yoga twice weekly, and cheering on the Seattle Seahawks and Chicago Bulls,
    while remaining disciplined about training schedules that mirror their structured work ethic.
  arts: Jerry Johnson channels their love for visual storytelling through product and architectural photography inspired by Ansel Adams and Dieter Rams, while unwinding with karaoke renditions of Stevie
    Nicks and weekly gatherings featuring live local jazz bands, maintaining a curated collection of classic car restoration manuals as functional art.
  travel: Jerry Johnson prefers meticulously planned road trips that blend design inspiration with adventure, having toured the Bauhaus in Dessau, the Milan Design Week exhibitions, and the Toyota Automobile
    Museum in Japan, while eyeing future visits to Denmark’s sustainable housing projects and the Canadian Rockies for a balance of relaxation and structured exploration.
  culinary: Jerry Johnson, an avid grill master, expertly seasons smoked brisket with a rub of smoked paprika, brown sugar, and cumin, pairs it with a craft IPA, and proudly hosts weekend BBQs where they
    showcase their DIY smoker construction skills alongside live karaoke performances.
  core: Jerry Johnson blends a meticulously structured design career with a flamboyant love for grilling, karaoke, and classic‑car restoration, yet their compulsive need for control often fuels anxiety
    that they mask with talkative social gatherings.
background:
  cultural: Jerry identifies with mainstream white American middle‑class culture shaped by his upbringing in the suburban neighborhoods of Sacramento County. His family values emphasize hard work, self‑reliance,
    and community involvement, reflecting a blend of straightforward Midwestern and Californian sensibilities. Growing up in Citrus Heights, he was exposed to the region's practical, result‑oriented mindset
    and the diverse cultural tapestry of the Bay Area, which sparked his interest in design and innovation while grounding him in the local traditions of high school sports, community festivals, and a strong
    DIY ethic.
