  hobbies: '[''Community design meetups'', ''Toastmasters public speaking'', ''Yoga'', ''Meditation'', ''Running'', ''Cycling'', ''DIY woodworking'', ''Home improvement projects'', ''Classic car restoration'',
    ''Product photography'', ''Architectural photography'', ''Grilling and cooking'', ''Karaoke'', ''Hosting social gatherings'', ''Reading leadership and design books'']'
  career_goals: Jerry aims to transition into a senior leadership role within the design department of a mid‑size manufacturing firm, ultimately becoming a Design Manager who oversees cross‑functional product
    development teams. He aspires to secure high‑profile commercial contracts that showcase sustainable design practices, earn industry recognition through design awards, and later launch his own boutique
    consultancy focused on structured, data‑driven product development. To support these ambitions, he plans to pursue a professional certification in Industrial Design and acquire formal training in project
    management (PMP) to solidify his credentials and reduce workplace uncertainty that fuels his anxiety.
