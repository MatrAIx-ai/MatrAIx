personas:
  professional: Mariah Petrie, a pint-sized preschool organizer, uses their innate curiosity and disciplined love of order to arrange block towers, schedule snack times, and enforce clean‑up routines with
    a level of focus that often impresses teachers.
  sports: Mariah Petrie darts around the local park’s toddler soccer circle, proudly wearing a mini‑Los Angeles Dodgers cap while practicing dribbling with a soft foam ball, and they prefer small group
    play over massive crowds.
  arts: Mariah Petrie delights in drawing detailed pictures of dinosaurs while humming the tunes of Disney’s 'Moana' soundtrack, and they obsessively re‑create scenes from the 'Toy Story' movies with colored
    pencils, showing their organized creativity.
  travel: Mariah Petrie’s family trips include a meticulously planned day at the nearby aquarium and a weekend visit to the Grand Canyon, where they insist on bringing their favorite stuffed bear for comfort,
    balancing adventure with a love for familiar routine.
  culinary: Mariah Petrie favors mac and cheese with hidden peas, enjoys building banana‑sliced faces on toast, and they can meticulously arrange fruit slices into smiley faces, illustrating their disciplined
    yet playful approach to food.
  core: Mariah Petrie is a curious, ultra‑organized four‑year‑old who turns everyday play into a miniature project, often arranging toys by size while they dream of future mastery.
background:
  cultural: Mariah comes from a middle‑class Anglo‑American family in Mount Vernon, Washington, situated in the lush Skagit County region of the Pacific Northwest. Her upbringing reflects typical American
    early‑childhood experiences—preschool attendance, library storytimes, and seasonal community events such as the Skagit County Fair. The family values education, environmental stewardship, and outdoor
    recreation, encouraging her to explore forests and beaches while also emphasizing routine, politeness, and holiday traditions like Thanksgiving and Christmas. This cultural milieu blends mainstream
    U.S. customs with a strong appreciation for the natural surroundings of the Pacific Northwest.
attributes:
  skills: '[''Letter recognition (uppercase A–Z)'', ''Basic counting to 20'', ''Shape and color identification'', ''Fine motor coordination (cutting, drawing)'', ''LEGO building and spatial reasoning'',
