  hobbies: '[''LEGO building'', ''Drawing and coloring'', ''Reading and storytelling'', ''Nature exploration (collecting leaves, rocks)'', ''Toy organization and labeling'', ''Pretend doctor play with stuffed
    animals'', ''Baking cookies with Mom'', ''Library storytime visits'', ''Small‑group playdates'']'
  career_goals: Mariah dreams of becoming a teacher or librarian because she loves organizing books and sharing stories. She also imagines caring for animals as a veterinarian, drawn by her methodical nature
    and compassion. Short‑term, she is determined to read all the letters fluently, master counting to 100, tie her shoes, and complete a 100‑piece puzzle without assistance. Her disciplined personality
    fuels high‑standard goals, and she aspires to earn a “Star Reader” badge at her preschool and win a local art contest.
