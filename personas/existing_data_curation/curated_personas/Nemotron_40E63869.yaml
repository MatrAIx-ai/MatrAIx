personas:
  professional: Kayla Wright, a 13‑year‑old 4‑H member and library volunteer, channels her love of structure into meticulously planning weekly reading events, cataloguing books, and maintaining detailed
    logs of garden yields, and they demonstrate a precocious knack for organized project management.
  sports: Kayla Wright signs up for the Oak Grove Youth Soccer club’s Saturday practices, keeps a disciplined strength‑training routine at home, and they follow the Seattle Seahawks (NFL) and the Seattle
    Sounders FC (MLS) religiously, appreciating the predictable schedule of games that aligns with their need for routine.
  arts: Kayla Wright, an avid pianist, spends evenings practicing Beethoven’s ‘Für Elise’ and playing simplified arrangements of Taylor Swift’s hits, while they devour the Harry Potter and Percy Jackson
    series and craft friendship bracelets to the sound of Billie Eilish, often humming along as they work.
  travel: Kayla Wright dreams of a family road trip to the Grand Canyon, but for now their travel style is limited to weekend visits to the nearby state park’s botanical garden and annual 4‑H field trips,
    and they meticulously plan each itinerary to avoid uncertainty and ensure a clear schedule.
  culinary: Kayla Wright enjoys baking classic chocolate chip cookies, lemon zest cupcakes, and simple banana bread, measuring flour, butter, and vanilla extract to the gram, and they take pride in documenting
    each recipe’s results in their journal while occasionally experimenting with decorative icing from Pinterest tutorials.
  core: Kayla Wright is a methodical 13‑year‑old who finds comfort in schedules, gratitude lists, and precise cookie recipes, yet they wrestle with intense anxiety that spikes when their rigid routine is
    disrupted, leading them to over‑plan, bite their nails, and seek solace in piano scales and rock‑collecting.
background:
  cultural: Kayla grew up in Stanton, Texas, a small, close‑knit community in Martin County. Her family follows traditional Southern values that emphasize practicality, reliability, and community involvement.
    Church gatherings, county fairs, and local school events play a central role in her social life. The regional culture embraces hospitality, a respect for routine, and a strong sense of family responsibility,
    all of which have shaped Kayla’s worldview and personal priorities.
attributes:
  skills: '["Organized note‑taking", "Time management and scheduling", "Basic computer skills (Google Docs, Sheets)", "Project planning for school assignments", "Simple cooking and meal preparation", "Household
    budgeting", "Volunteer coordination for school events", "Reading comprehension", "Journaling for emotional regulation", "Basic first aid knowledge"]'
  hobbies: '["Journaling and planner organization", "Baking (cookies, cupcakes) following measured recipes", "Reading chapter‑book series", "Playing piano", "4‑H club gardening and animal care", "Volunteer
    shelving and event coordination at the local library", "Collecting rocks", "Crafting friendship bracelets"]'
  career_goals: Kayla aims to graduate high school with honors and earn a scholarship to study nursing at a reputable university. She envisions a career as a registered nurse working in a community health
    clinic near her hometown, where she can blend her practical skill set with her compassionate nature. In the long term, she hopes to become a health‑education advocate for teens, using her personal experience
    with anxiety to support peers and promote mental‑well‑being. Kayla also values stability and wishes to remain connected to her family and local community throughout her professional life.
