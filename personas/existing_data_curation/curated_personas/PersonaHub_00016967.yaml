persona_description: A scientist or researcher who specializes in electron microscopy, particularly in the field of biological research. They have expertise in using electron microscopes, including the
  FESEM and TEM, to study the ultrastructure and surface details of biological samples. They have a strong background in cryo sample preparation and are skilled in using the cryo sample transfer attachment.
  They have experience with both the FESEM and TEM and are able to analyze the images captured to determine the sample's structure and composition. They have a passion for scientific discovery and are always
  looking for new ways to improve their techniques and expand their knowledge in the field of electron microscopy.
