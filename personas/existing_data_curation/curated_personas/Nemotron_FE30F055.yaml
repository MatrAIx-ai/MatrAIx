  career_goals: Jeanette aims to become a senior communications leader for a major research university or tech company, where she can shape the public narrative around breakthrough innovations. In the next
    five years she plans to earn a master's degree in Strategic Communication, build a portfolio of high‑impact media campaigns, and mentor junior staff. Long‑term, she envisions launching a regional science
    outreach program that partners with schools and community groups, positioning herself as a thought leader at the intersection of technology, policy, and public engagement.
