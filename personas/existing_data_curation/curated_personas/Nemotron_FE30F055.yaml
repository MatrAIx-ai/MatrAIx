personas:
  professional: Jeanette Oconnell is a 22-year-old science communications associate at a regional research institute, where she uses Python, Tableau, and Adobe Creative Cloud to translate complex data into
    compelling press releases and visual stories, balancing her natural curiosity for emerging technologies with a pragmatic, deadline-driven workflow; her competitive edge pushes her to out-perform rival
    agencies while her occasional skepticism of senior managers keeps her questioning motives, ensuring every campaign meets both strategic goals and ethical standards.
  sports: Jeanette Oconnell channels her love of the outdoors into weekend hikes with the Spring Creek Trail Club, maintains a disciplined cardio routine by training for the Chicago Marathon, and supports
    the Chicago Cubs, Chicago Bulls, and the Illinois Fighting Illini with a competitive streak that prompts her to track personal bests against friends during recreational volleyball matches at the campus
    gym.
  arts: Jeanette Oconnell captures the subtle light of Spring Creek Forest through landscape photography inspired by Ansel Adams, sketches natural forms in the style of Georgia O'Keeffe, unwinds to the
    synth-pop sounds of Grimes and the orchestral scores of Hans Zimmer, and regularly debates the narrative layers of sci-fi novels by Liu Cixin and N. K. Jemisin during board-game nights.
  travel: Jeanette Oconnell plans her travel itineraries on a spreadsheet, alternating between adrenaline-filled trips to Yellowstone National Park and cultural immersion in Kyoto’s bamboo groves, while
    budgeting for occasional weekend getaways to Chicago’s Museum Campus and a dream-longed visit to the Amalfi Coast, balancing a modest student stipend with a desire for both adventure and relaxation.
  culinary: Jeanette Oconnell experiments in her modest kitchen by turning classic Midwestern chicken-pot-pie into a spicy kimchi-infused casserole, perfects a sweet-corn and smoked paprika chowder, and
    adds a dash of sumac to apple crumble, all while relying on her trusty Instant Pot and occasionally ordering a pepperoni pizza when time runs short.
  core: Jeanette Oconnell, a 22-year-old science communicator, blends relentless curiosity with disciplined practicality, competes fiercely in both career and hobbies, and navigates life with a healthy
    dose of skepticism and a steady, stress-resistant demeanor.
background:
  cultural: Raised in a middle‑class family in the Midwest, Jeanette grew up with the region's trademark values of self‑reliance, modesty, and community involvement. Her Irish‑American heritage and Midwestern
    upbringing emphasized a practical outlook tempered by a genuine curiosity about the world. Attending the University of Illinois enriched her cultural perspective, exposing her to diverse academic and
    activist circles. This blend of hometown pragmatism and campus‑wide intellectual openness informs her balanced approach to both professional challenges and personal pursuits.
attributes:
