  hobbies: '[''Landscape Photography'', ''Hiking'', ''Sketching'', ''Reading Popular Science'', ''Science Fiction'', ''Yoga'', ''Cooking Fusion Recipes'', ''Volunteering at Science Museum'', ''Board‑Game
