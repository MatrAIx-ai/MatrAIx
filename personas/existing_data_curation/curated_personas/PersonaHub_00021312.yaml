persona_description: A chemist who specializes in the field of solvation theory, particularly the use of continuum solvation models to describe the behavior of molecules in solution. They are interested
  in the principles of dielectric constant and its effect on the chemical characteristics of solvents, and how it can be used to predict the behavior of macromolecules in solution. They are also interested
  in the use of functional group derived charges in macromodels and the calculation of long-range Coulomb forces inside macromolecules. They have a background in physical chemistry and molecular mechanics,
  and are likely to be familiar with the works of M. Witanowski, W. Sicinska, Z. Biedrzycka, Z. Grabowski, and G. A. Webb, A. d' Aprano, A. Capalbi, M. Iammarino, V. Mauro, A. Princi, B. Sesta, J. Solution
  Chem., Vol. 24, 227, and P. W. Atkins, Physical Chemistry, Oxford University Press (4th Edition), and CRC Handbook of Chemistry and Physics, ed. D. R. Lide, 77th edition.
