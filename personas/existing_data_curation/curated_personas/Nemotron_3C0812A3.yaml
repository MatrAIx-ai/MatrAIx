    facilitation'', ''Market trend analysis'', ''Quality assurance and standards compliance'']'
  hobbies: '[''Book club (classic literature)'', ''Community gardening'', ''Volunteering at Houston Botanic Garden'', ''Craft workshops (teaching floral techniques)'', ''Attending art fairs and cultural
    festivals'', ''Yoga and mindfulness meditation'', ''Home organization and interior redecorating'', ''Cooking and hosting dinner parties'', ''Participating in local cooking contests'']'
  career_goals: Cathy aims to expand her floral design business into a flagship boutique in Houston, offering a curated line of signature arrangements and sustainable, locally sourced flowers. She aspires
    to earn recognition as a master floral designer through prestigious industry awards and to author a practical guide on floral design for professionals seeking disciplined, repeatable processes. Her
    competitive drive pushes her to develop a corporate clientele, securing contracts for large-scale events and establishing long‑term partnerships. Additionally, she seeks to implement streamlined operational
    systems that reduce stress, improve profitability, and provide financial security post‑divorce, while mentoring emerging designers through structured apprenticeship programs.
