personas:
  professional: Cathy Sellers is a meticulously organized floral designer who leverages her horticultural expertise, disciplined workflow, and competitive edge to deliver high‑end bespoke arrangements for
    weddings and corporate events, while also running the business side with strict budgeting, vendor negotiation, and strategic use of design software.
  sports: Cathy Sellers enjoys a seasonal mix of yoga sessions, weekend volleyball leagues with her book‑club friends, and fiercely cheering for the Houston Astros in baseball and the Houston Rockets in
    basketball, often attending games as a social outing.
  arts: Cathy Sellers cultivates her artistic side by regularly browsing Houston art fairs for Monet‑inspired watercolors, attending live performances of classic Broadway shows like The Phantom of the Opera,
    and discussing Jane Austen novels at her book club, all of which inform her floral color palettes.
  travel: Cathy Sellers prefers meticulously planned trips that blend floral inspiration with cultural immersion, such as a week‑long visit to the gardens of Versailles, a culinary jaunt through New Orleans’
    French Quarter, and a weekend retreat to Austin’s music festivals, while keeping a travel fund for spontaneous weekend getaways to nearby Hill Country vineyards.
  culinary: Cathy Sellers is a competitive home chef who delights in crafting elegant dishes like seared duck à l’orange, shrimp étouffée with fresh Cajun spices, and rosemary‑infused lamb shank, often
    featuring heirloom tomatoes, fresh basil, and locally sourced honeys in her dinner parties and regional cooking contests.
  core: Cathy Sellers is a detail‑driven, socially vibrant floral entrepreneur whose love of routine, competitive streak, and occasional worry fuels her pursuit of perfection in both business and personal
    life.
background:
  cultural: Cathy grew up in a suburban neighborhood of Houston, Texas, within a family that valued Southern hospitality, practicality, and community involvement. Her cultural upbringing is rooted in traditional
    American values, with influences from Methodist church traditions and a strong emphasis on family ties. Living in the diverse Houston area, she appreciates multicultural perspectives, especially in
    culinary and artistic expressions, while maintaining a personal affinity for the familiar rhythms and routines of her hometown. Her white ethnic background is complemented by an awareness of the city's
    rich cultural tapestry, which informs both her personal interests and professional floral designs.
attributes:
  skills: '[''Floral arrangement and design'', ''Color theory and seasonal styling'', ''Event planning and coordination'', ''Client consultation and relationship management'', ''Business operations and
