personas:
  professional: Jesus Panesso, a senior architectural drafter in New Jersey, combines meticulous code‑compliant drafting with a curiosity for emerging BIM tools, and leverages their sociable, talkative
    nature to act as the communication hub between engineers, contractors, and clients.
  sports: Jesus Panesso plays midfield for the local Bridgeton United adult soccer league, cheers for the New York Red Bulls during MLS season, and keeps fit with early‑morning jogs along the Delaware River,
    balancing competitive drive with a relaxed community‑spirit approach to fitness that they share enthusiastically with friends.
  arts: Jesus Panesso captures the historic brick facades of Bridgeton through architectural photography inspired by Ansel Adams and Edward Hopper, while also enjoying the indie rock sounds of The Strokes,
    the cinematic scores of Hans Zimmer, and occasional evenings at the local theater to see productions of Lin‑Manuel Miranda’s works, and they often discuss the visual storytelling with fellow club members.
  travel: Jesus Panesso prefers short road trips to Atlantic City and the Poconos for weekend getaways, has explored the historic streets of Philadelphia and Washington, D.C., and dreams of a longer cultural
    immersion trip to Kyoto, Japan, combining a love of architecture with a desire for new experiences that they eagerly plan during evenings after drafting work.
  culinary: Jesus Panesso showcases cooking flair by perfecting spicy corn tamales with roasted chilies and cilantro, grilling smoky pulled‑pork ribs for neighborhood fiestas, and experimenting with fresh
    guacamole alongside classic cheese‑filled quesadillas, reflecting a balance of traditional flavors and modern twists that they proudly share with neighbors.
  core: Jesus Panesso blends a methodical drafting career with a lively social circle, relentless curiosity, and a habit of worrying about every detail, making them a reliable yet occasionally over‑thinking
    community leader who they admit often double‑checks every plan.
background:
  cultural: Born to Mexican immigrant parents, Jesus grew up bilingual, speaking Spanish at home and English in school. His family maintains traditions from their hometown in Michoacán, celebrating Día
    de los Muertos, Cinco de Mayo, and Christmas with family‑centric meals and music. He remains actively involved in the local Mexican-American community in Bridgeton, helping to organize cultural events
    and serving as a liaison between the community and municipal officials. His heritage informs his work ethic, emphasizing reliability and respect for craftsmanship, while his curiosity drives him to
    integrate contemporary design approaches with the rich architectural legacy of his roots.
