  career_goals: Jesus aims to advance from senior drafter to BIM coordinator or project manager within the next five years, leveraging his curiosity for new technologies while grounding his work in practical
    code compliance. He plans to obtain Autodesk Certified Professional credentials and pursue an associate’s degree in architectural technology to broaden his design expertise. Ultimately, he envisions
    founding a boutique drafting consultancy that serves small‑scale developers and community‑focused projects in Salem County, emphasizing sustainable, resilient design solutions that improve local infrastructure.
    He also seeks to mentor younger drafters, using his sociable nature to foster collaborative learning environments.
