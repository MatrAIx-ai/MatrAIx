persona_description: A scientist or researcher with a specialization in natural resource management and sustainable livelihoods in arid and semi-arid rangelands, focusing on research projects that aim to
  contribute to better regional planning for sustainable livelihoods and habitation of the Australian rangelands and deserts. This persona is interested in integrating environmental, social, and economic
  considerations in developing new approaches to complex issues, and incorporates uncertainty about possible impacts of climate change in Australia's interior. This person has a distinguished history of
  research in other parts of the world and is currently involved in international projects with other research institutions, including local, state/territory, and federal government agencies, as well as
  international organizations.
