persona_description: A researcher or scientist interested in the effects of methylmercury on the reproductive success of birds, particularly female mallards. They are looking for a method to study the reproductive
  effects of methylmercury in the eggs of a wild bird, with the ability to vary the levels of methylmercury injected into the eggs. They are interested in studying the effects of methylmercury on the reproductive
  success of the mallard species and are open to exploring different methods to achieve this goal, including intraperitoneal injections. They are also interested in exploring the effects of different solvents
  used in the injections on the reproductive success of the mallards.
