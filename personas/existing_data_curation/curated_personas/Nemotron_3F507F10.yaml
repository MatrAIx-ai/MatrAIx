personas:
  professional: Dylan Scholl, a 37‑year‑old retail salesperson in Mount Dora, blends meticulous cash‑handling, POS expertise, and calm conflict resolution with a competitive streak for operational efficiency,
    positioning them for an assistant‑manager promotion within the next year.
  sports: Dylan Scholl follows the Tampa Bay Buccaneers avidly, participates in the Lake Dora Anglers Association for weekday fishing trips, and maintains fitness by jogging with the Mount Dora Walking
    Club along the historic downtown trail each weekend.
  arts: Dylan Scholl channels quiet creativity by assembling Revell model kits of classic cars and ships, visits the Mount Dora Arts Festival to admire local painter Sarah McKenna’s work, and relaxes to
    the folk‑rock sounds of Bob Dylan and Johnny Cash during evenings at home.
  travel: Dylan Scholl prefers low‑key, well‑planned road trips, has explored historic St. Augustine and the nearby crystal‑clear waters of Clearwater Beach, and they dream of a leisurely vacation in Tuscany’s
    vineyards, balancing limited vacation days with a modest travel budget.
  culinary: Dylan Scholl enjoys cooking fresh garden harvests into dishes like lemon‑herb grilled trout, zucchini sautéed with garlic and basil, and classic Florida key‑lime pie, demonstrating moderate
    culinary skill and a preference for home‑cooked, season‑aligned meals, and they often finish the evening with a slice of the pie.
  core: Dylan Scholl is a routine‑driven, detail‑oriented retailer who worries about stress, saves diligently, tends a garden, and occasionally over‑analyzes both fish catches and financial spreadsheets.
background:
  cultural: Dylan is a White American raised in central Florida, likely of mixed German‑Irish ancestry, and grew up in a modest working‑class family in the Mount Dora area. His upbringing emphasized traditional
    middle‑class values, routine work ethic, and a practical approach to daily life. He is familiar with the Southern hospitality common in Florida and participates in community events such as the Mount
    Dora Arts Festival and local church gatherings, though his personal beliefs are more pragmatic than religious. The tourism‑driven culture of his hometown has shaped his appreciation for friendly service
    and local craftsmanship.
attributes:
