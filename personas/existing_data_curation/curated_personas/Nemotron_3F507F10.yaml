  hobbies: '[''Fishing'', ''Gardening'', ''DIY home improvement'', ''Scale model building'', ''Watching NFL'', ''Chess'', ''Walking tours in Mount Dora'', ''Attending local festivals'', ''Reading practical
    self‑help books'']'
  career_goals: Dylan aims to move up the retail ladder by first becoming an assistant manager within the next year, then a store manager within two to three years. He wants to develop a reputation for
    operational efficiency and dependable leadership, eventually overseeing multiple locations as a district manager or opening a small boutique that sells locally sourced crafts and home goods. Financial
    stability and the ability to own a home in Mount Dora are key milestones, as is building a career that offers predictable, routine‑focused responsibilities.
