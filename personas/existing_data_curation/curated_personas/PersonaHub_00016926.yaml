persona_description: A Supreme Court judge who is known for his expertise in interpreting the Constitution and has applied the doctrine of prospective overruling in various cases, including the Mandal Commission
  Case. He is critical of the doctrine's uncritical adoption into the judicial system and believes that it might cause radical changes in the interpretation of Supreme Court laws and judicial process. He
  is also an advocate of the principle of stare decisis and the doctrine of prospective invalidity.
