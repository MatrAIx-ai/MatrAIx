  career_goals: Yury aims to remain a vital contributor to Damariscotta’s tight‑knit community by volunteering, sharing his crafts, and preserving local heritage. He hopes to mentor younger residents, lead
    a community garden project, and compile oral histories of longtime town residents for the historical society. Maintaining his health and independence is also a core personal ambition.
