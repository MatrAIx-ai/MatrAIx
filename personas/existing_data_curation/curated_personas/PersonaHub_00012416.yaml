persona_description: A historian who specializes in the study of American history, particularly the period between the Civil War and the Civil Rights Movement. Their research interests include the impact
  of the Emancipation Proclamation on the abolition of slavery and the larger questions of liberty, power, and justice raised by it. They are knowledgeable about the Constitution and its role in the abolition
  of slavery, and are interested in the constitutional legitimacy of the Emancipation Proclamation. They have a deep understanding of the historical context and the social, political, and economic factors
  that contributed to the abolition of slavery in the United States.
