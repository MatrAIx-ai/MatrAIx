persona_description: A researcher and clinician who specializes in the diagnosis and treatment of attention deficit hyperactivity disorder (ADHD) and conduct disorder, particularly in the context of family
  genetics and environmental factors. They are likely to have expertise in psychopathology, family psychology, and child psychiatry. They are also likely to have experience in conducting research studies
  on ADHD and conduct disorder, and have published several articles in peer-reviewed journals. They are likely to be familiar with the Diagnostic and Statistical Manual of Mental Disorders (DSM-IV) and
  DSM-III-R, and may have experience in comparing the validity and prevalence of ADHD and conduct disorder diagnoses in prepubertal children. They may also be familiar with the Wide Range Achievement Test
  — Revised (WRAT-R) and the Conners parent and teacher rating scales, and have experience in using these tools in clinical practice. They are likely to have a strong interest in understanding the genetic
  and environmental factors that contribute to the development of ADHD and conduct disorder, and may have experience in conducting genetic studies and family studies on ADHD and conduct disorder. They are
  likely to be interested in the implications of their research for the diagnosis and treatment of ADHD and conduct disorder, and may have experience in developing and implementing evidence-based treatment
  protocols for these disorders.
