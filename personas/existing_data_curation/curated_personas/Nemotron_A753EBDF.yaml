  career_goals: Monica’s current career ambition is to transition from hands‑on case support to a mentorship and advocacy role within the legal‑aid community. She aims to develop a series of free workshops
    for senior New Yorkers that demystify common legal processes such as estate planning, tenant rights, and healthcare consent. She also seeks to mentor younger paralegals, sharing best practices in case
    organization and client communication. While she enjoys her work, Monica hopes to achieve a Certified Paralegal designation, publish a practical handbook on navigating the legal system for older adults,
    and eventually serve on the board of a non‑profit legal services organization, influencing policy that protects vulnerable populations.
