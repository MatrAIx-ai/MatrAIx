personas:
  professional: Trevor Gutierrez, a seasoned retail floor supervisor, merges bilingual fluency with a calm, curiosity-driven approach to visual merchandising, inventory management, and team coaching, balancing
    practical budget constraints with an eagerness to test new retail technologies even as a relaxed planning style sometimes leads to last-minute adjustments.
  sports: Trevor Gutierrez spends early weekends fishing on Lake Conroe, cheers for the Houston Astros and Texas Rangers from his favorite local sports bar, and joins the Richmond community softball league
    each spring, though a laid-back fitness routine means regular gym sessions are often skipped.
  arts: Trevor Gutierrez finds solace in the plaintive voice of Mercedes Sosa, devours historical epics by Ken Follett, and regularly attends community theater productions starring local actor James McKay,
    letting the blend of music and drama echo his own family narratives.
  travel: Trevor Gutierrez prefers flexible road trips that combine fishing at Lake Conroe with a weekend stop in Fredericksburg's wine country, dreams of an immersive cultural tour of Curaçao's spice markets,
    and plans trips around family gatherings, shunning rigid itineraries in favor of spontaneous detours.
  culinary: Trevor Gutierrez enjoys hand-crafting arepas and empanadas filled with shredded beef, black beans, and sweet plantain, seasoning them with cilantro, jalapeno, and cumin, while also perfecting
    hallacas for festive celebrations and savoring smoky Texas-style brisket at neighborhood potlucks.
  core: Trevor Gutierrez is a seasoned retail leader who balances curiosity and practicality, channels intense anxiety into meticulous hobby pursuits, and quietly mentors younger coworkers while navigating
    the push-and-pull of career ambition and a relaxed, sometimes disorganized lifestyle.
background:
  cultural: Trevor is a first‑generation Venezuelan‑American whose parents immigrated to Texas in the 1980s. He grew up bilingual, celebrating Venezuelan holidays such as Día de la Independencia with family
    gatherings that feature music, dance, and foods like hallacas. Living in Richmond, TX, he blends his Latin American roots with the local Southern culture—enjoying Texas‑style barbecues, participating
    in community festivals, and maintaining strong family ties. His Catholic upbringing influences his values of compassion and community service, while his love for Venezuelan cuisine often finds a place
    at neighborhood potlucks.
attributes:
  skills: '[''Retail Operations Management'', ''Team Leadership'', ''Customer Service'', ''Inventory Management'', ''Visual Merchandising'', ''POS Systems'', ''Bilingual Communication (Spanish/English)'',
