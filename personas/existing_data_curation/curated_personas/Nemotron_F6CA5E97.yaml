  hobbies: '["Watercolor painting", "Sketching abstract designs", "Acoustic guitar and singing", "Community soccer league", "Organizing cultural festivals", "Cooking traditional Mexican cuisine", "Reading
    science fiction novels", "DIY home improvement projects"]'
  career_goals: Juan aims to transition from a packager to a supervisory role within the next two years, leveraging his organizational strengths and innovative mindset to lead a packaging team. He plans
    to complete his bachelor's degree in industrial engineering or business administration, which will equip him with the strategic knowledge to pursue an operations manager position. In the longer term,
    Juan dreams of launching a boutique packaging consultancy that blends sustainable packaging practices with culturally inspired Mexican design motifs, serving small businesses in the Midwest and creating
    job opportunities for his community.
