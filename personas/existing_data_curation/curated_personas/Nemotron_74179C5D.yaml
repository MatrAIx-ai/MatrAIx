  career_goals: Bobby aims to advance from his current guard position to a senior security management role, eventually overseeing security strategy for a major casino or cultural institution such as a museum.
    He plans to obtain the Certified Protection Professional (CPP) credential and deepen his expertise in AI‑driven surveillance technologies. Over the next five years, he hopes to lead a team of security
    personnel, develop comprehensive training programs for new hires, and mentor younger guards. In the long term, he envisions consulting on security best practices for hospitality and entertainment venues,
    merging his business acumen with his passion for protecting public spaces.
