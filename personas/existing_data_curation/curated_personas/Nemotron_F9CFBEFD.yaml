personas:
  professional: Jessica Conneely, a seasoned food‑preparation specialist with razor‑sharp knife skills, inventory‑tracking expertise, and a talent for training new staff, leans on their love of structure
    to keep the kitchen orderly while their occasional stress‑induced worry pushes them to double‑check food safety protocols before every service.
  sports: Jessica Conneely gets their daily cardio from brisk walks with their Labrador, joins the Chicago Parks Senior Walking Club in spring, cheers on the Chicago Cubs during baseball season and the
    Chicago Bears in the fall, and occasionally plays pickleball at the local community center for social exercise.
  arts: Jessica Conneely unwinds by attending productions at the Goodman Theatre, devouring mystery novels by Agatha Christie and Gillian Flynn, while listening to folk legends like Bob Dylan and contemporary
    singer-songwriter Brandi Carlile, and they often knit scarves while humming the theater’s show tunes.
  travel: Jessica Conneely prefers short, well‑planned road trips that blend relaxation with exploration, having recently visited the Great Smoky Mountains for a hiking retreat and the historic streets
    of Charleston, South Carolina, while they dream of a culinary pilgrimage to the Tuscan countryside of Italy.
  culinary: Jessica Conneely delights in transforming garden harvests into comfort dishes— their signature heirloom tomato bruschetta, roasted red pepper hummus spiced with smoked paprika, and herb‑infused
    focaccia—while honing their baking skills with weekly banana‑bread experiments and a growing repertoire of rustic pies.
  core: Jessica Conneely is a structure‑loving kitchen pro who channels stress into garden‑fresh cooking, knits gifting, and community theater attendance, all while they juggle a worry‑prone mind and a
    habit of occasional overspending on yarn.
background:
  cultural: Jessica grew up in a middle‑class white family in suburban Montgomery County, Pennsylvania. Her family traditions reflect a blend of Irish‑American heritage and broader Pennsylvania customs,
    such as celebrating St. Patrick's Day and participating in Fourth of July picnics. She was raised in a Catholic community, attending church services and school events that emphasized community service
    and modest living. The region's appreciation for comfort foods—like meatloaf, macaroni and cheese, and homemade pies—has influenced her culinary tastes. Jessica values the close‑knit neighborhood atmosphere,
    local farmers' markets, and the seasonal festivals that bring residents together.
attributes:
  skills: '["Food preparation", "Knife handling", "Food safety and sanitation", "Inventory management", "Recipe scaling and adaptation", "Kitchen equipment maintenance", "Point‑of‑sale system operation",
