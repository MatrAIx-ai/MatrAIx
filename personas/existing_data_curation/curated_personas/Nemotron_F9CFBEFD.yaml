  hobbies: '["Home cooking and recipe experimentation", "Vegetable gardening", "Knitting", "Reading mystery novels", "Walking her dog", "Attending community theater", "Volunteering at the local food bank"]'
  career_goals: Jessica aims to advance from a food preparation role to a supervisory position, such as shift supervisor or kitchen manager, within the next few years. She plans to earn a Certified Food
    Protection Manager (CFPM) credential to formalize her expertise and increase her eligibility for leadership roles. Additionally, she is exploring part‑time culinary workshops to refine her baking skills,
    with the long‑term ambition of launching a small home‑based catering service focused on comfort foods for local community events. A stable, structured work environment that offers predictable schedules
    is important to her as she seeks to reduce daily stress and create a balanced work‑life routine.
