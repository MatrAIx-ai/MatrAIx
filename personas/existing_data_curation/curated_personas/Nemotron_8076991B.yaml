    at the community center'', ''Cooking and exploring new cuisines'', ''Participating in local AIA meetings and networking events'']'
  career_goals: Gregory aims to cement his legacy by expanding his boutique firm into a regional leader in eco‑friendly historic renovation, securing award‑winning projects that showcase inventive design
    solutions. He plans to mentor the next generation of architects through a structured apprenticeship program, author a book on New England architectural evolution, and take on a leadership role within
    the local AIA chapter. Ultimately, he seeks a gradual transition to an advisory capacity while ensuring his firm’s values of creativity, reliability, and community impact endure.
