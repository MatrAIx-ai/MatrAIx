persona_description: A martial artist who specializes in the manipulation and control of muscles, often referred to as "Body Manipulation." This individual has complete control over the muscles of themselves
  and others, allowing them to freely alter and manipulate them, including altering muscle tissue itself, its development, increase/decrease muscle mass/strength and thus stamina, flexibility, reflexes,
  etc. They can move muscles without or keep them from moving, cause them to over or under-react to nerve-impulses, etc. This person can cause/remove any muscle-related ailments/diseases or cause muscles
  to react so violently they rip the tendons from their connections, snap bones or are themselves damaged.
