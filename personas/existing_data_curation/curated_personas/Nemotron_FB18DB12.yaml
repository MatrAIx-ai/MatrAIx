  career_goals: Looking ahead, Colton aims to transition into a senior HR leadership role, such as HR Director, within the next two to three years, where he can shape organizational culture and lead strategic
    workforce initiatives. He plans to earn the Senior Professional in Human Resources (SPHR) certification to solidify his expertise, mentor emerging HR professionals, and champion employee engagement
    and inclusive workplace practices. In the longer term, he hopes to serve as a trusted advisor to local businesses through part‑time consulting, and ultimately retire with a legacy of a resilient, people‑focused
    organization.
