  hobbies: '[''Oil Painting'', ''Analog Photography'', ''Reading Classic Literature'', ''Competitive Chess'', ''Woodworking'', ''Gardening'', ''Attending Art Lectures'']'
  career_goals: Though retired from full‑time work, Javier aims to leave a legacy by mentoring a select group of emerging entrepreneurs, offering one‑on‑one strategic counsel that blends business rigor
    with artistic insight. He aspires to curate a modest private collection of contemporary art and publish a series of essays that explore the intersection of commerce and creativity. Additionally, he
    hopes to stay intellectually vibrant by learning new subjects, traveling to niche art exhibitions, and occasionally consulting for nonprofit arts organizations in the Portsmouth area.
