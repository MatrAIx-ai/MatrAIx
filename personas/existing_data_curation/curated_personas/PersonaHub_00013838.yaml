persona_description: A cryptozoologist who is known for his extensive fieldwork and investigations in the field of cryptozoology, particularly focusing on the Przewalski's horse and the Mongolian Wild Ass.
  He is recognized as the current living American researcher and writer who has most popularized cryptozoology in the late 20th and early 21st centuries, and has been bestowed with honorary memberships
  of various international organizations. He is also the founder of the Cryptomundo Team and has a daily blog where he shares his experiences and updates on cryptozoological news.
