personas:
  professional: Evan, a preschool‑aged explorer who loves building blocks and picture books, approaches each play session like a tiny architect by meticulously arranging and re‑arranging toys while still
    allowing spontaneous creativity, takes pride in tidying up after each activity, and they often request a 'one‑more‑story' bedtime routine.
  sports: Evan, a tiny soccer enthusiast who drills a soft ball at the Little Explorers Soccer Club every Saturday, cheers loudly for the Los Angeles Dodgers during family game nights, looks forward to
    the annual community ice‑skating program each winter, and they balance the joy of organized play with free‑form backyard tag.
  arts: Evan, an inquisitive little artist who spends afternoons drawing dinosaurs with thick crayons, sings along to Raffi’s 'Baby Beluga' and the 'Sesame Street' theme, recites Dr. Seuss verses from 'Green
    Eggs and Ham', marvels at reproductions of Claude Monet’s Water Lilies in the local children’s museum, and they let music and color shape their imaginative world.
  travel: Evan, an adventurous road‑trip companion who has already visited the city zoo, a sunny beach in Myrtle Beach, and the magical realms of Disneyland, always clutching his stuffed giraffe, now dreams
    of seeing the towering Grand Canyon and the sparkling lights of the Eiffel Tower on future family vacations, and they love planning trips with colorful stickers on a map.
  culinary: Evan, a budding foodie who adores cheesy macaroni, strawberry‑yogurt parfaits, and blueberry pancakes topped with maple syrup, proudly helps stir batter with a wooden spoon, spreads smooth peanut
    butter and jelly on toast under supervision, adds extra shredded mozzarella to homemade pizza, and they treat each cooking session as a playful experiment.
  core: Evan, a four‑year‑old explorer who blends meticulous block‑building with boundless curiosity, hoards stickers like treasure, shares band‑aids with friends, never skips bedtime stories, and they
    occasionally indulge in gummy‑bear binges that disrupt a tidy piggy‑bank plan.
background:
  cultural: Evan is raised in a middle‑class suburban family in Hazel Park, Michigan. His paternal lineage traces back to French‑Canadian roots, reflected in the family surname Laliberte, while his maternal
    side has Anglo‑American heritage common to the region. The household celebrates typical Midwest traditions—holiday gatherings, community picnics, and seasonal festivals—while also incorporating occasional
    French‑Canadian customs like family storytelling in French and enjoying poutine on special occasions. He attends a local preschool that emphasizes inclusive play, diverse arts exposure, and community
    values, giving him a blend of American suburban culture and a subtle French‑Canadian influence.
