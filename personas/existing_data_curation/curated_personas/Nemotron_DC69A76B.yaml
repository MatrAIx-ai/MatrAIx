  career_goals: Although only four, Evan dreams of becoming an artist who can fill the world with bright colors, a teacher who can guide curious minds, or a veterinarian who helps animal friends. His love
    for art, his desire to help others, and his fascination with new ideas shape these imaginative ambitions.
