  career_goals: Nelson’s immediate focus is on mastering basic developmental milestones—walking confidently, communicating his needs with words, and establishing a secure sense of routine. Building on his
    organized and methodical temperament, his long‑term ambition, as nurtured by his family, is to pursue a career that blends curiosity with practicality, such as environmental science, engineering, or
    library science, where he can contribute thoughtfully and kindly to his community.
