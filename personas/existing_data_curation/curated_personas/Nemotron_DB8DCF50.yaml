personas:
  professional: Valleen Milanes is a community‑focused bilingual coordinator who leverages their fluency in Spanish and English, strong written communication, and knack for budgeting to organize language‑access
    events for a local nonprofit, while balancing a practical, structured approach with a flexible, easy‑going attitude.
  sports: Valleen Milanes enjoys casual jogging along the Hudson Riverbank, weekly home yoga sessions, and passionately rooting for the New York Yankees in summer, the Knicks during basketball season, and
    the Giants in fall, while occasionally joining a neighborhood softball league that meets at the community center.
  arts: Valleen Milanes spends evenings painting Hudson River water‑colors in a style reminiscent of Monet, while diving into the magical realism of Gabriel García Márquez and the poetry of Octavio Paz,
    and unwinding to the sultry jazz of Nina Simone and the folk storytelling of Bob Dylan.
  travel: Valleen Milanes prefers short, well‑planned weekend getaways to the Catskill Mountains and the coastal town of Cape May, while dreaming of an extended cultural immersion in the historic old town
    of Cartagena and a trek through the Andean streets of Quito, balancing travel aspirations with family responsibilities and a modest budget.
  culinary: Valleen Milanes delights in crafting hand‑made corn cakes filled with slow‑cooked shredded beef, black beans, and fresh avocado, pairing them with herb‑infused rice and fried ripe plantains,
    often seasoning with garden‑fresh cilantro, oregano, and a splash of lime to elevate cherished family recipes.
  core: Valleen Milanes is a warm‑hearted community champion who balances a love for structured budgeting with a habit of leaving the basil on the windowsill until the last minute.
background:
  cultural: Valleen is a first‑generation Venezuelan‑American. She grew up in a Spanish‑speaking household that celebrated traditional Venezuelan holidays such as Carnaval and Día de la Independencia, and
    maintained strong ties to Catholic customs. Her family’s migration experience instilled a deep appreciation for resilience and adaptability, which she now blends with her life in Croton‑on‑Hudson, adopting
    local customs while preserving Venezuelan music, food, and storytelling as central parts of her identity.
attributes:
  skills: '[''Bilingual Spanish‑English communication'', ''Household budgeting and financial management'', ''Event coordination for community gatherings'', ''Culinary arts – Venezuelan cuisine'', ''Basic
