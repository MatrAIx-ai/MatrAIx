  hobbies: '[''Painting'',''Quilting'',''Attending Art Exhibitions'',''Listening to Gospel and Jazz Music'',''Reading Biographies'',''Gardening'',''Cooking Southern Cuisine'',''Hosting Social Gatherings'',''Community
    Storytelling'',''Learning Languages'']'
  career_goals: Zanavia aims to transition into a role that blends her administrative expertise with her passion for community culture. She plans to complete an associate degree in Business Administration
    within the next two years, while seeking a part‑time position as a community liaison for the Selma Historical Society or a local arts council. She hopes to mentor junior clerical staff, champion mental‑health
    awareness in the workplace, and eventually launch a small home‑based craft business that sells hand‑painted ceramics and African‑inspired quilts. Flexibility is crucial to her goals, as she values a
    schedule that allows space for self‑care and reduces anxiety.
