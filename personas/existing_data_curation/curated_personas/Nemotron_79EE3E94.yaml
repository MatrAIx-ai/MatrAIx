personas:
  professional: Zanavia Clarington, a veteran office clerk with two decades of filing, data entry, and schedule management, is leveraging their strong interpersonal skills to pursue a part‑time community
    liaison role with the Selma Historical Society while mentoring junior staff and championing mental‑health awareness within a flexible work environment.
  sports: Zanavia Clarington enjoys low‑impact fitness, joining the Birmingham Senior Walking Club for thrice‑weekly walks, cheering on the Alabama Crimson Tide football team and the New Orleans Saints,
    and they play casual pickleball at the local YMCA where they often engage in friendly banter with teammates.
  arts: Zanavia Clarington spends weekends painting watercolor landscapes of the Alabama countryside, quilting African‑inspired patterns while listening to gospel legend Mahalia Jackson and jazz great John
    Coltrane, and they regularly visit exhibitions featuring works by Georgia O'Keeffe and local Southern artists.
  travel: Zanavia Clarington prefers relaxed, culturally rich trips, revisiting the Selma‑to‑Montgomery National Historic Trail, taking spontaneous weekend getaways to Charleston, South Carolina and Savannah,
    Georgia, and dreaming of a short pilgrimage to Paris to practice their budding French, all while balancing travel costs with their fixed income.
  culinary: Zanavia Clarington, an avid home cook, blends soul‑food classics like collard greens seasoned with smoked turkey and cayenne pepper, shrimp and grits, and peach cobbler, drawing fresh herbs
    from their backyard garden—including basil, thyme, and mint—to enhance dishes, and they occasionally treat friends to meals at Dooky’s Restaurant in New Orleans for inspiration.
  core: Zanavia Clarington is a sociable, art‑obsessed community champion who balances a flexible, often disorganized schedule with bouts of anxiety that fuel both their creative output and their relentless
    pursuit of meaningful connections.
background:
  cultural: Zanavia grew up in Selma, Alabama, a city steeped in African‑American civil‑rights history. Her parents were active in the local church and community organizing, exposing her early to the rhythms
    of gospel music, the flavors of Southern cooking, and the stories of the 1965 Selma marches. She carries forward that heritage through participation in the Selma Historical Society and a local African‑American
    arts cooperative, where she helps showcase both traditional crafts and contemporary visual art. Her cultural identity blends the deep communal values of the Black Southern church—hospitality, collective
    support, intergenerational storytelling—with a personal curiosity for new artistic expressions, from modern paintings to African diaspora literature. She celebrates family gatherings with soul food
    and music, while also seeking workshops on quilting techniques from other regions, reflecting a balance of honoring her roots and embracing broader cultural experiences.
