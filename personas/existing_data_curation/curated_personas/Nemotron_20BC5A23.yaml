personas:
  professional: Fiona Carter merges a business degree with hands‑on retail expertise, leading a boutique store team through data‑driven merchandising while infusing local artistic flair into visual displays,
    and they constantly balance structured scheduling with spontaneous creative problem‑solving.
  sports: Fiona Carter hikes the Sandia Mountains with the local Sandia Trailblazers club, practices yoga thrice weekly at a community studio, and passionately supports the Albuquerque Isotopes baseball
    team and New Mexico United soccer club, balancing vigorous outdoor activity with mindful movement.
  arts: Fiona Carter visits the Albuquerque Museum of Art and the Blue Door Gallery, paints abstract desert vistas inspired by the Rio Grande, experiments with black‑and‑white photography echoing the style
    of Ansel Adams, and draws creative inspiration from contemporary Southwest artists like Maria Martinez.
  travel: Fiona Carter enjoys weekend road trips to Santa Fe’s art districts, annual pilgrimages to the International Balloon Fiesta, and occasional backpacking adventures in Utah’s Zion National Park,
    preferring a mix of detailed itinerary planning for festivals and spontaneous detours for hidden hiking spots, all while budgeting carefully to fund future trips to Patagonia.
  culinary: Fiona Carter delights in cooking green chile stew, carne adovada, and roasted cactus paddles, often sourcing fresh chiles and prickly pear at the local farmers' market, and while their cooking
    skill is intermediate, they occasionally over‑salt dishes in their enthusiasm for bold Southwestern flavors.
  core: Fiona Carter blends a data‑driven retail mindset with a restless artistic curiosity, balancing structured leadership with spontaneous hikes and studio sessions, yet they sometimes procrastinate
    on MBA applications and over‑indulge in gallery prints.
background:
  cultural: Fiona was raised in Albuquerque, New Mexico, in a white family with European ancestry, but her upbringing was shaped by the city’s rich blend of Native American, Hispanic, and Southwestern artistic
    influences. She grew up attending local art festivals, exploring Pueblo art markets, and celebrating community traditions such as the Balloon Fiesta. This multicultural environment fostered her appreciation
    for diverse perspectives and reinforced her commitment to collaboration and harmony.
