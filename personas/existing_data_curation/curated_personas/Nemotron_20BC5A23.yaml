  hobbies: '[''Visiting Art Galleries'', ''Painting'', ''Photography'', ''Hiking in the Sandia Mountains'', ''Yoga'', ''Cooking Southwestern Cuisine'', ''Attending the Albuquerque International Balloon
    Fiesta'', ''Reading Contemporary Fiction'', ''Volunteering at Community Centers'', ''Mentoring Youth in Retail Skills'']'
  career_goals: Fiona aims to advance to a store manager position within the next two years, focusing on driving sales growth through data-driven merchandising and employee development. In the longer term
    she aspires to become a district manager, overseeing multiple locations while championing sustainable retail practices and community engagement. She plans to pursue an MBA to deepen her strategic expertise
    and eventually launch her own boutique that highlights Southwestern artisans and provides apprenticeships for young workers.
