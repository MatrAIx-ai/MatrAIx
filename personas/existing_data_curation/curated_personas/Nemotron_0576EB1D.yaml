personas:
  professional: Roger Blanks, a 20‑year‑old material mover who combines forklift expertise, inventory software savvy and self‑taught Python scripting, applies their practical curiosity and competitive drive
    to streamline warehouse operations while quietly eyeing a supervisory position in logistics.
  sports: Roger Blanks, an avid pickup basketball player at the Pineville Community Court, competes fiercely with the local Pineville Community Basketball Club, follows the New Orleans Pelicans and LSU
    Tigers, and uses the sport as a key outlet for their competitive energy.
  arts: Roger Blanks, a reserved music aficionado, fills their listening playlists with classic soul from Aretha Franklin, modern hip‑hop by Kendrick Lamar, and New Orleans jazz icons like Louis Armstrong,
    while attending the annual Mardi Mardi Jazz Festival to recharge their emotional well‑being.
  travel: Roger Blanks, a budget‑conscious road‑trip enthusiast, meticulously plans weekend getaways to historic towns such as Natchitoches and scenic drives along the Great River Road, while dreaming of
    a solo Gulf Coast train adventure to explore the Gulf Islands National Seashore.
  culinary: Roger Blanks, a modest home cook, perfects comforting Cajun dishes like jambalaya with Andouille sausage, shrimp étouffée spiced with paprika and cayenne, and a roux‑based gumbo, yet often grabs
    fast‑food tacos when late‑night shifts leave little time for cooking.
  core: Roger Blanks, a diligent yet anxious 20‑year‑old warehouse worker, blends a love of quiet tech tinkering and soulful music with a fiercely competitive drive and a habit of over‑thinking every decision,
    and they often double‑check inventory reports before sleeping.
background:
  cultural: Roger grew up in Pineville, a small town in Rapides Parish with a rich blend of Southern and Creole influences. As a Black resident, his family maintains connections to the local African-American
    church community, church gatherings, and the tradition of soulful music that shaped his appreciation for jazz and gospel. He celebrates regional food traditions such as gumbo and jambalaya at family
    events and participates in community festivals that honor both African-American heritage and the broader Louisiana culture. The close-knit nature of his neighborhood has taught him the value of mutual
    support, even though his reserved personality leads him to engage in more intimate, trusted circles.
attributes:
  skills: '[''forklift operation'', ''pallet jack handling'', ''inventory management (WMS)'', ''basic equipment maintenance'', ''load securing and safety compliance'', ''physical stamina and heavy lifting'',
    ''problem-solving and process improvement'', ''basic Python scripting for automation'', ''reading technical schematics'']'
  hobbies: '[''reading about automation and logistics'', ''watching documentary series'', ''DIY woodworking and tool repair'', ''playing basketball in small groups'', ''listening to soul, hip-hop, and jazz
    music'', ''journaling'', ''guided meditation'']'
  career_goals: Roger aims to leverage his hands-on experience into a supervisory role within the logistics sector. Over the next three years he plans to earn a certified forklift instructor credential,
    complete an associate's degree in supply chain management, and move into a warehouse coordinator position where he can oversee inventory flow and implement efficiency projects. His competitive nature
    drives him to become known for reducing turnaround times and improving safety records. Long-term, he hopes to start his own moving-service business that emphasizes reliability and modern, technology-driven
    logistics, giving him both financial stability and a sense of control over his work environment.
