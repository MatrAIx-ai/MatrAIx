  hobbies: '[''Cooking traditional South Asian cuisine'', ''Watching and discussing cricket'', ''Walking in local parks'', ''Gardening'', ''Playing chess'', ''Listening to classic Bollywood music'', ''Reading
    newspapers and community newsletters'', ''Participating in block parties and cultural festivals'', ''DIY home improvement projects'']'
  career_goals: Although retired from formal employment, Ganesh aims to channel his experience into community leadership. He aspires to become a senior volunteer coordinator at the Bronx Community Center,
    where he can organize workshops on home‑repair basics, financial literacy, and cultural cooking. He also wishes to mentor a group of young adults from the South Asian diaspora, helping them navigate
    educational pathways and career choices. Additionally, Ganesh hopes to document and share family recipes, perhaps publishing a small community cookbook, preserving culinary traditions for future generations.
