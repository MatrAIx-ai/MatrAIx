  career_goals: Even in retirement, Wayne aims to stay engaged and purposeful. He plans to expand his volunteer work at the local senior center, focusing on a mentorship program that teaches practical home‑repair
    skills to at‑risk youth and peers. He hopes to preserve his independence and health by maintaining a routine of physical activity and mental stimulation, and he aspires to document his life story in
    a memoir that captures the history of Shreveport’s African‑American community for future generations.
