personas:
  professional: Fabiana Butler, a seasoned administrative professional, blends their curiosity for emerging office technologies with a practical, organized approach to orchestrate complex calendars, travel
    logistics, and confidential records, while their sociable energy and assertive communication style empower them to lead cross‑functional projects using tools like Asana and Trello, positioning them
    for an office‑manager role.
  sports: Fabiana Butler fuels their fitness with vibrant group activities—regularly attending salsa, African dance, Zumba, and boot‑camp sessions at the Houston Dance Fusion studio—while cheering on the
    Houston Astros, Rockets, and Dynamo, and they log their workouts in Strava to maintain a balanced, socially driven exercise routine.
  arts: Fabiana Butler immerses themselves in the Houston arts scene by frequenting jazz and blues venues such as The Continental Club and House of Blues to hear Gregory Porter, Kamasi Washington, and Buddy
    Guy, while regularly touring the Museum of Fine Arts and the Contemporary Arts Museum for visual inspiration, a habit that fuels their creative energy and community connections.
  travel: Fabiana Butler’s travel style blends careful planning with spontaneous adventure, as they have explored New Orleans during Mardi Gras, sampled street food in Mexico City’s Mercado de San Juan,
    and attended Trinidad’s Carnival, while they dream of a Senegalese dance workshop, preferring group trips that balance cultural immersion with budget‑conscious choices.
  culinary: Fabiana Butler delights in crafting soulful Southern and Caribbean meals—such as jambalaya, jerk chicken with Scotch bonnet pepper, and callaloo seasoned with coconut milk and allspice—displaying
    a confident yet experimental kitchen style that shines at their frequent potluck gatherings, even though they occasionally burn the ends of their cornbread.
  core: Fabiana Butler, a socially vibrant yet pragmatically curious 35‑year‑old, balances a relentless appetite for group dance, community mentorship, and culinary experiments with occasional overspending
    on shoes and a habit of forgetting to water their houseplants, embodying a lively, organized, yet imperfect approach to life.
background:
  cultural: Fabiana grew up in Houston's vibrant African American neighborhoods, where church, family, and community gatherings shaped her values. She retains traditions of Southern hospitality, soulful
    cooking, and an appreciation for gospel music, while also embracing the city's multicultural fabric. Her cultural identity is reflected in her active participation in local Black cultural events, such
    as Juneteenth celebrations, and her ongoing involvement with community organizations that support African American youth and entrepreneurship. This background has fostered a strong sense of resilience,
    communal responsibility, and pride in her heritage.
