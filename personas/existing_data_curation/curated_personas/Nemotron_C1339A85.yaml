  career_goals: Fabiana aims to move from a senior secretary role into an office manager position within the next two to three years, leveraging her curiosity for emerging office technologies to redesign
    workflows and increase efficiency. She plans to earn a certification in project management to broaden her leadership capabilities and hopes to mentor junior staff, fostering a collaborative team environment.
    Long‑term, Fabiana envisions starting her own virtual assistant consultancy, offering services to small businesses that value both innovative solutions and reliable administrative support.
