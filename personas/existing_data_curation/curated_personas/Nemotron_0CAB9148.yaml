personas:
  professional: Adam Osborne, a methodical project planner with a talent for budgeting, inventory control, and scheduling in Excel and Trello, they channel their reliable, structure‑loving nature into coordinating
    municipal initiatives while quietly laying the groundwork for a side‑business offering home‑maintenance consulting services.
  sports: Adam Osborne regularly hikes the Sangre de Cristo peaks, fishes the Rio Grande for trout, they belong to the local Sangre de Cristo Trail Club, cheer for the Colorado Rockies and Colorado Rapids,
    and enjoy seasonal pickup volleyball games at the Del Norte community center.
  arts: Adam Osborne devotes evenings to reading historical non‑fiction by authors like David McCullough, they unwind with board games such as Terraforming Mars, enjoy the folk melodies of John Denver and
    the storytelling of the Del Norte Playhouse, and keep a modest collection of vintage western film posters.
  travel: Adam Osborne prefers meticulously planned road trips, they have explored Great Sand Dunes and Mesa Verde National Parks, keep a travel spreadsheet for budgeting, dream of trekking Patagonia’s
    Torres del Paine, yet their modest income and desire for self‑sufficiency keep most journeys within the Southwest’s accessible gems.
  culinary: Adam Osborne experiments with regional dishes such as green‑chile enchiladas, Rio Grande trout al fresco, and roasted corn‑squash medley from their garden, they savor the fresh flavor of heirloom
    tomatoes and jalapeños, and consider their cast‑iron skillet skills intermediate, often topping meals with farm‑fresh eggs from their chickens.
  core: Adam Osborne is a 33‑year‑old planner who balances a love for rugged outdoor pursuits with a worry‑prone, spreadsheet‑driven approach to every project, often juggling a new woodworking plan while
    double‑checking the household budget.
background:
  cultural: Adam’s upbringing in rural northern Colorado reflects a blend of Anglo‑American frontier values and close‑knit small‑town culture. His family’s roots trace back to early settlers of the San Luis
    Valley, fostering a strong respect for the land, community self‑reliance, and modest living. He subscribes to the local customs of seasonal harvest celebrations, community service, and a preference
    for practical, down‑to‑earth lifestyles, while also embracing broader American cultural elements such as participation in national holidays and contemporary media.
attributes:
  skills: '["Project planning","Budgeting and financial tracking","Inventory management","Digital scheduling (Google Calendar, Trello)","Basic carpentry and home repairs","Plumbing and electrical troubleshooting","Small‑scale
    gardening and livestock care","Conflict mediation and cooperative teamwork"]'
  hobbies: '["Hiking in the Sangre de Cristo Mountains","Fishing in the Rio Grande","Vegetable gardening and chicken keeping","Woodworking and furniture making","Cooking regional cuisine","Reading historical
    non‑fiction","Board‑game evenings with friends","Volunteering at the community food pantry"]'
  career_goals: Adam aims to re‑enter the workforce in a role that leverages his organizational strengths, such as a project coordinator for a municipal department or a small non‑profit serving the Rio
    Grande Valley. He is also exploring the possibility of launching a part‑time home‑maintenance consulting service that would provide reliable repairs for neighbors while maintaining a predictable schedule.
    Long‑term, he hopes to achieve financial stability that enables him to invest in a modest family farm or rental property, allowing greater self‑sufficiency and reduced stress.
