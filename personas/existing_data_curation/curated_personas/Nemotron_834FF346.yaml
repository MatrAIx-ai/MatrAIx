  career_goals: Katrina aspires to transition from a freelance personal appearance worker to owning a boutique salon that emphasizes personalized, holistic beauty experiences. She aims to develop a small
    line of natural, cruelty‑free beauty products that reflect her practical yet innovative approach. Over the next five years, she plans to mentor emerging stylists, establishing a collaborative studio
    environment where continuous learning is encouraged. Ultimately, she envisions her brand becoming a trusted name in the Tampa Bay area for high‑quality, compassionate service that enhances client confidence.
