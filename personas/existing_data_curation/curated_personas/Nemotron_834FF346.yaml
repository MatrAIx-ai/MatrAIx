personas:
  professional: Katrina Herrera, a freelance stylist and makeup artist in Tampa Bay, they blend precision hair cutting, advanced color theory, and compassionate client consultations with a calm, curiosity‑driven
    mindset that keeps their workspaces meticulously organized yet flexibly responsive to each client’s vision.
  sports: Katrina Herrera, a 26‑year‑old wellness‑oriented professional, they enjoy early‑morning runs on the Pinellas Trail, weekend beach volleyball with the Tampa Bay Beach Volleyball Club, year‑round
    yoga practice, cheer for the Tampa Bay Buccaneers during football season, and follow the Tampa Bay Lightning as a seasonal fan for winter excitement.
  arts: Katrina Herrera, a 26‑year‑old aesthetic‑focused stylist, they immerse themselves in contemporary fiction by Sally Rooney, draw visual inspiration from Yayoi Kusama’s bold patterns for salon décor,
    unwind listening to H.E.R.’s soulful R&B, and occasionally reference performances by actress Zendaya for Instagram storytelling ideas.
  travel: Katrina Herrera, a 26‑year‑old solo traveler, they favor mindful itineraries that blend beach serenity in the Florida Keys, hiking in Asheville’s Blue Ridge Mountains, and occasional yoga retreats
    in Bali, often planning trips months in advance while leaving room for spontaneous seashell‑collecting excursions.
  culinary: Katrina Herrera, a 26‑year‑old culinary enthusiast, they prefer fresh, plant‑forward meals like avocado‑lime quinoa bowls, grilled snapper with citrus, and homemade turmeric‑ginger teas, cooking
    at an intermediate level while experimenting with coconut oil and sea salt to enhance both flavor and skin health.
  core: Katrina Herrera, a 26‑year‑old salon professional, they blend a calm, curiosity‑driven work ethic with a penchant for collecting seashells, occasional Instagram scrolling binges, and a habit of
    perfecting DIY beauty recipes at the expense of a regular night’s sleep.
background:
  cultural: Katrina grew up in Riverview, Florida, within a predominantly white, middle‑class suburban environment. Her family carries a Spanish surname, Herrera, reflecting a lineage of third‑generation
    American ancestors who migrated from the American Southwest in the mid‑20th century. While her cultural upbringing is rooted in typical Floridian values—emphasis on hospitality, outdoor recreation,
    and a laid‑back lifestyle—she also absorbs the multicultural vibrancy of the Greater Tampa area, especially its strong Latin‑American community. This blend of Anglo‑American heritage and exposure to
    diverse cultural expressions informs her inclusive approach to beauty, allowing her to connect authentically with clients from varied backgrounds.
