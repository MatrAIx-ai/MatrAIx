  career_goals: Dwayne dreams of a future where he can combine his love for art and helping others. He often talks about becoming an art teacher who can inspire younger kids, a mural artist who paints colorful
    scenes that bring his community together, or even an astronaut who explores new worlds while sharing his discoveries through drawings and stories. He wants a career that lets him use his imagination,
    create beauty, and make people feel happy and supported.
