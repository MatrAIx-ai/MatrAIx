personas:
  professional: Dwayne Rivens, an aspiring junior architect who loves constructing LEGO kingdoms, demonstrates they possess a keen eye for detail, balances meticulous organization with boundless imagination,
    and often sketches building ideas alongside animal drawings, foreshadowing a future in design or engineering.
  sports: Dwayne Rivens, a lively participant in neighborhood soccer games, proudly wears the 'City Little Lions' jersey on weekends, idolizes the professional 'City Hawks' baseball team, dribbles the ball
    with boundless energy, and when exhausted they take a brief rest to regroup before rejoining the play.
  arts: Dwayne Rivens, a prolific watercolor enthusiast, fills sketchbooks with animal portraits, superhero scenes, and family drawings, draws inspiration from animated movies like 'Moana' and 'The Incredibles',
    while humming to gospel singer Kirk Franklin, hip‑hop beats, and upbeat pop tracks by Taylor Swift, which they say fuels their rhythmic coloring.
  travel: Dwayne Rivens, a curious explorer, enjoys family road trips to the nearby state park for shell and rock collecting, dreams of visiting the 'Grand Canyon' and the Natural History Museum in Washington
    D.C., and when planning they balance excitement for adventure with the need to stay within the family's weekend budget.
  culinary: Dwayne Rivens, a budding little chef, loves homemade mac and cheese topped with sharp cheddar, chicken nuggets with honey‑mustard, fruit smoothies blended with banana and strawberries, often
    helps whisk pancake batter while humming pop songs, and occasionally they forget to wash their hands before cooking, a quirk their parents gently remind them about.
  core: Dwayne Rivens, a bright six‑year‑old who blends artistic curiosity with organized saving habits, delights in church youth gatherings, soccer drills, and vibrant watercolor sketches, yet sometimes
    they leave crayons scattered across the living room and forget to finish chores.
background:
  cultural: Dwayne is an African‑American child growing up in Owensboro, Kentucky, a region with a predominantly Southern culture but a close‑knit Black community. His family places a strong emphasis on
    church, music, storytelling, and multigenerational support. He regularly attends a local Baptist church where he sings gospel songs and participates in youth programs, and his home celebrates soul‑food
    traditions like fried chicken, collard greens, and sweet corn. At school and community events he learns about African‑American history and civil‑rights heroes, while also being exposed to Southern customs
    such as bluegrass festivals and Kentucky Derby celebrations. This blend of cultural influences nurtures his appreciation for art, rhythm, cooperation, and community harmony.
