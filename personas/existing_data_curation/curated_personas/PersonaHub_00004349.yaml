persona_description: A geoscientist specializing in the study of sedimentary rocks and microfossil assemblages, particularly those from the late Tonian period. They are particularly interested in the taxonomy,
  taphonomy, and stratigraphical occurrence of Vase-Shaped Microfossils (VSMs) from the Callison Lake Formation of the Coal Creek inlier, Yukon, Canada. Their expertise includes the use of Re–Os geochronology
  to date the sedimentary rocks and the examination of fossil specimens to identify and describe new species. They are also interested in the potential utility of M. hexodiadema as a latest Tonian biostratigraphical
  marker and the role of Callison Lake sequence stratigraphy as a control on the distribution and abundance of VSMs in the Coal Creek inlier and other global sedimentary successions.
