  career_goals: Juan aims to transition from his current role as a quantitative analyst at a regional financial firm to a senior research consultant specializing in environmental and economic modeling.
    He aspires to publish a series of peer-reviewed papers on stochastic processes applied to climate risk, secure a small grant to develop open-source modeling tools, and eventually establish his own boutique
    consultancy that allows him to work remotely and maintain a solitary, flexible schedule. He also hopes to gain recognition as a thought leader in the niche intersection of pure mathematics and real-world
    policy analysis, while preserving his independence and avoiding corporate hierarchy.
