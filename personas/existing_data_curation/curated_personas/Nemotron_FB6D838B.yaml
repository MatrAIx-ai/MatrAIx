personas:
  professional: Juan Frost, a quantitative analyst with a flair for mathematical modeling, leverages their expertise in statistical analysis, programming, and data visualization to craft complex environmental
    risk models while they quietly nurture ambitions to become a senior research consultant and thought leader in climate-policy analytics.
  sports: Juan Frost, an avid long-distance hiker with the Des Moines Hiking Club, prefers solitary trail runs over team sports, tracks their fitness with a Garmin watch, and they support the Iowa Cubs,
    Iowa Hawkeyes, and the local amateur soccer side Des Moines Menace while occasionally signing up for autumn 5K charity runs.
  arts: Juan Frost, a dedicated visitor of Des Moines contemporary galleries, collects abstract prints by artists such as Julie Mehretu and Mark Rothko, experiments with digital painting inspired by Refik
    Anadol, and they unwind listening to Philip Glass, Radiohead, and the scores of Christopher Nolan films, which fuels their own creative impulses.
  travel: Juan Frost, an itinerant explorer who favors low-key, self-planned trips, has hiked the Badlands and trekked Iceland's fjords, enjoys weekend getaways to nearby Lake Okoboji, and they dream of
    a solitary research retreat in Patagonia while balancing a modest travel budget and remote work flexibility, often weighing their next destination against the demands of their research schedule.
  culinary: Juan Frost, a modest home-cook with a penchant for farm-to-table flavors, often prepares heirloom tomato caprese salads, rosemary-roasted potatoes, and occasionally experiments with sous-vide
    salmon, while they reserve evenings for tasting avant-garde menus at Des Moines' 801 Bar & Grill and savoring Ethiopian coffee, which satisfies their curiosity about culinary techniques.
  core: Juan Frost is a solitary mathematician-artist who balances rigorous data modeling with a quiet love for abstract art, puzzles, and nature, navigating life's stresses through meticulous curiosity,
    occasional disarray, and a relentless quest for intellectual independence, and they often rely on their own inner compass.
background:
  cultural: Juan was raised in a small town near Des Moines, Iowa, in a family of German-Scandinavian descent that valued self-reliance, practical problem-solving, and a quiet, community-oriented lifestyle.
    Growing up in the Midwest, he absorbed a cultural emphasis on independence, modesty, and a stoic attitude toward adversity, which aligns with his preference for solitude and skepticism. His middle-class
    upbringing gave him access to public libraries and community theater, fostering an early appreciation for art and science. The Midwest’s agrarian roots and the seasonal rhythms of the Iowa landscape
    have shaped his love for hiking, gardening, and reflective observation of natural patterns, which often inspire his mathematical work.
