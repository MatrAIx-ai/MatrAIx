persona_description: A child psychologist who emphasizes the importance of basic manners and respect in children's interactions with their parents' friends and peers. She believes that these values are
  essential for a child's development and well-being and that parents have a responsibility to instill these values from an early age. She advocates for strong expectations and consequences for children's
  disrespectful behavior towards their parents' friends and peers, and she encourages parents to be purposeful and intentional in their efforts to teach their children these important values.
