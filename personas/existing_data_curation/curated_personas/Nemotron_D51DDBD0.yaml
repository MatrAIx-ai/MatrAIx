personas:
  professional: An emerging occupational therapist, Edith Purvis merges client-centered assessment with vibrant arts-integrated techniques, leveraging virtual-reality tools and their competitive research
    drive to craft adaptive interventions that reflect an improvisational flair and a ambition for board certification in neurorehabilitation.
  sports: A yoga-enthusiast who mixes weekly Pilates sessions with competitive escape-room marathons, Edith Purvis also darts onto the local Springfield Wolves intramural soccer field each spring, follows
    the Chicago Cubs and the Chicago Bears devotionally, and laces up for occasional snowshoe hikes during winter, reflecting their blend of relaxed dedication and competitive spark.
  arts: An avid sketcher and watercolor aficionado, Edith Purvis spends weekends absorbing contemporary exhibits featuring artists like Yayoi Kusama and street-art provocateur Banksy, while listening to
    indie folk singer Sufjan Stevens and improvising scenes with her local improv troupe, letting these diverse influences inform both their therapeutic practice and personal identity.
  travel: A spontaneous explorer with a penchant for coffee-cafe culture, Edith Purvis has already roamed the lantern-lit alleys of Kyoto, wandered the Gaudi-styled streets of Barcelona, and hiked the red
    rocks of Sedona, usually booking last-minute Airbnb stays that align with their flexible schedule and modest student-budget.
  culinary: A culinary experimenter, Edith Purvis mixes a medium-proficiency kitchen skill set with a love for flavor pairings, often whipping up avocado toast topped with charred radish, crafting a fragrant
    lemon-rosemary chicken, and indulging in a spicy miso ramen complete with shiitake and soft-boiled egg, while they never pass up a freshly brewed pour-over espresso.
  core: Edith Purvis is a curiosity-driven, arts-infused occupational therapy trainee who balances a competitive edge with a delightfully disorganized, coffee-stained schedule and a habit of turning every
    patient session into a miniature improv performance, often leaving their notes scattered across coffee tables.
background:
  cultural: Edith grew up in a middle‑class, white family in Springfield, Missouri, steeped in Midwestern values of friendliness, modesty, and community involvement. Her upbringing combined traditional
    small‑town sensibilities—like church gatherings and county fairs—with exposure to a growing arts scene and university culture that sparked her curiosity. She identifies with the region’s work ethic
    and appreciation for practicality, yet she embraces progressive ideas, seeking varied experiences beyond the local norm. This blend of Midwestern roots and a forward‑looking mindset shapes her worldview
    and professional outlook.
attributes:
  skills: '[''Client‑centered assessment'', ''Activity analysis'', ''Fine‑motor skill training'', ''Sensory integration therapy'', ''Adaptive equipment recommendation'', ''Creative arts‑based interventions'',
    ''Virtual‑reality and gamified therapy'', ''Interdisciplinary collaboration'', ''Patient education'', ''Evidence‑based practice and documentation'']'
  hobbies: '[''Sketching and watercolor painting'', ''Visiting art galleries and museums'', ''Attending lectures on neuroscience and design'', ''Improvisational theater'', ''Strategy board games and escape
    rooms'', ''Yoga and mindfulness'', ''Journaling'', ''Exploring coffee shops'', ''Hosting game nights with friends'']'
  career_goals: Edith aims to become a board‑certified occupational therapist specializing in neurorehabilitation and arts‑integrated therapy. She plans to earn the OTR/L licensure and later pursue a Certified
    Hand Therapist credential. In the next five years she hopes to lead a cutting‑edge program at a regional rehab center that uses technology and creative expression to accelerate recovery. Long‑term,
    she envisions opening her own private practice in Springfield that offers flexible, client‑driven services and collaborates with local art institutions. She also wants to publish research on the efficacy
    of arts‑based interventions and mentor junior therapists, reflecting her competitive drive for professional recognition.
