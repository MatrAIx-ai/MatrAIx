  hobbies: '[''Watercolor painting'', ''Visiting art galleries'', ''Reading science-fiction'', ''Tech meetups'', ''Hiking'', ''Traditional Mexican cooking'', ''Folklórico dancing'', ''Bilingual financial‑literacy
    volunteering'', ''Traveling in Mexican border towns'', ''Exploring AI in finance'']'
  career_goals: Rosa aims to advance to a senior loan officer or branch manager within the next three to five years, while developing specialized expertise in micro‑mortgage products for low‑to‑moderate
    income families in the border region. She plans to earn the Certified Loan Officer (CLO) designation and eventually pursue an MBA focused on financial inclusion. In the long term, Rosa envisions creating
    a community‑focused financial‑literacy program that integrates artistic storytelling to make budgeting concepts accessible, and possibly launching a fintech startup that offers bilingual, AI‑driven
    budgeting tools for Spanish‑speaking households. She also aspires to mentor junior colleagues, contribute to professional associations, and be recognized for innovative client‑education initiatives.
