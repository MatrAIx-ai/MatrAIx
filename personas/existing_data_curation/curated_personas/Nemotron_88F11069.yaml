  career_goals: Although only ten, Aileen already dreams of a future where she can combine her curiosity about the natural world with practical impact. She aspires to become a marine biologist or an environmental
    engineer, envisioning a role where she can study ocean life and help protect the coastal ecosystems she loves. She also expresses a budding interest in science communication, hoping one day to mentor
    younger kids in exploring nature through experiments and beach clean‑up projects. Her competitive streak fuels a desire to excel in school science fairs and eventually contribute to real‑world conservation
    efforts.
