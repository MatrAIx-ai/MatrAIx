personas:
  professional: Hasan Joshi is a seasoned carpenter who blends precise joinery with project management expertise, leveraging a methodical approach and organized workflow to deliver custom furniture and
    oversee remodeling projects, all while mentoring apprentices with a calm, reliable demeanor.
  sports: Hasan Joshi is an avid cricket enthusiast who follows international tournaments, plays pickup matches with the Lake Wylie Cricket Club, supports the Charlotte Hornets, and spends quiet mornings
    fishing with the Lake Wylie Anglers Association for relaxation.
  arts: Hasan Joshi’s creative side unfolds through listening to Nusrat Fateh‑Ali‑Khan’s qawwali and A.R. Rahman’s film scores while carving intricate inlays, and they attend local performances at the Charlotte
    Symphony and draw inspiration from master woodworkers such as James Krenov on YouTube.
  travel: Hasan Joshi prefers planned weekend getaways that balance family time with inspiration, having toured the historic wood markets of Istanbul, explored the gardens of Kyoto for vegetable ideas,
    and dreaming of a road trip along the Pacific Coast Highway to visit coastal fishing villages.
  culinary: Hasan Joshi enjoys cooking family recipes like fragrant biryani, soft roti, and tangy fish curry, often incorporating garden‑fresh cilantro and tomatoes, and they love hosting neighbors for
    meals that feature saffron‑infused rice and smoky marinated fish.
  core: Hasan Joshi is a methodical carpenter‑entrepreneur who blends precise woodworking, disciplined budgeting, and a love for cricket and community meals, all while juggling occasional back pain and
    a picky dental‑care routine.
background:
  cultural: Hasan Joshi is a second‑generation South Asian American, born to parents who emigrated from Gujarat, India, where they were part of a Muslim community. He grew up bilingual, speaking Gujarati
    and Urdu at home while attending public school in South Carolina. The family’s cultural traditions—celebrating Eid, observing Ramadan, and honoring Diwali with sweets—have instilled a strong sense of
    family responsibility, hospitality, and respect for communal harmony. These values align with his cooperative and considerate personality. His heritage influences his culinary tastes, love for cricket,
    and occasional use of South Asian design motifs in his custom furniture work. At the same time, he embraces the local Southern community, participating in church gatherings and neighborhood events,
    blending his dual cultural identities seamlessly.
