  career_goals: His primary career goal is to become a licensed general contractor within the next three years, which will allow him to expand his services beyond carpentry into full‑scale residential remodeling.
    He plans to acquire the NC Certified Lead Carpenter designation and an OSHA 30‑hour certification. Hasan also aspires to launch a boutique furniture line that blends modern design with traditional South‑Asian
    motifs, selling pieces through a small showroom and online platform. Long‑term, he hopes to mentor a new generation of skilled tradespeople, perhaps by establishing a apprenticeship partnership with
    the local community college.
