persona_description: A biomechanist who specializes in the study of human posture and balance, particularly the mechanisms and principles underlying upright standing, sitting, and lying positions. Her research
  interests include the role of the core muscles in maintaining posture, the effects of gravity and body weight on posture, and the optimization of body structure and proportion for optimal balance and
  circulation of bodily fluids. She is interested in developing interventions and techniques to improve posture and balance, and in understanding the underlying biomechanics and neural mechanisms of upright
  standing and lying positions.
