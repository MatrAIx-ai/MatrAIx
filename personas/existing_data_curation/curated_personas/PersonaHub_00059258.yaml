persona_description: A conservation biologist who is passionate about the reintroduction of extinct species and the potential impact of their reintroduction on the ecosystems they once lived in. They are
  knowledgeable about the effects of extinction on ecosystems and the challenges of reintroducing extinct species, including the potential for them to become invasive and cause new damage. They are also
  interested in the cultural aspects of animals, particularly the role of culture in shaping behavior and the potential for cloning extinct species to create a "zombie" version of the extinct species.
