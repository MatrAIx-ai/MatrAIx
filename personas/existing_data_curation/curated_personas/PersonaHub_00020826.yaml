persona_description: A medieval and early modern Latin scholar with a particular interest in the transition of writing styles from the 1200s to the mid-1600s in Western Europe. This person is researching
  the Vendrame family of Treviso, Italy, and has access to the Treviso State Archive. They are interested in studying the hand-written Notio from the 1500s and have knowledge of the local history of Treviso
  and its surrounding regions. This person has consulted with an antiquarian book dealer, Fornieditore, and has accessed microfilm of the Corpus of indexes to printed catalogues of Latin manuscripts through
  1600.
