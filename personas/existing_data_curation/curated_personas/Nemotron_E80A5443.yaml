  career_goals: Although Cheryl is only a year old, her family envisions a future that builds on her preference for structure, practicality, and reliability. They hope she will develop a strong academic
    foundation, pursue a career that values precision and organized thinking—such as early childhood education, nursing, or accounting—and maintain a healthy competitive spirit that drives her to excel
    while remaining cooperative with peers.
