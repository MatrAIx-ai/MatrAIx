  hobbies: '[''Playing basketball'', ''Video gaming (eSports, streaming)'', ''Skateboarding'', ''DIY electronics projects'', ''Listening to music (reggaeton, regional Mexican, hip‑hop)'', ''Socializing
    at community events'', ''Exploring local trails and hiking'']'
  career_goals: Virgilio aims to turn his love for gaming and technology into a viable career. In the short term, he plans to build a personal brand on Twitch and YouTube, streaming his gameplay and providing
    tech‑tinker tutorials to attract a modest following and revenue. After establishing a foothold online, he hopes to acquire certifications in automotive technology or IT support, eventually opening a
    small garage‑tech shop that offers both vehicle maintenance and electronics repair services. Long‑term, he envisions balancing a side‑hustle as a content creator with a stable technical trade, leveraging
    his curiosity and practicality to stay adaptable in a fast‑changing market.
