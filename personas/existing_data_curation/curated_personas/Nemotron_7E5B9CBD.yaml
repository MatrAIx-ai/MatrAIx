personas:
  professional: Marilou Aballa, a 36‑year‑old operations research analyst and data‑driven strategist, blends deep expertise in optimization modeling, Python, R, and visualization tools with a naturally
    collaborative and compassionate demeanor, and they translate complex analytics into community‑focused solutions for healthcare and sustainability challenges.
  sports: Marilou Aballa fuels their active lifestyle with sunrise hikes along the Buffalo Bayou trails as a member of the Bayou Trail Hikers club, regular yoga sessions for flexibility, and enthusiastic
    support for the Houston Astros and Houston Dynamo, which they follow religiously during spring training and match days.
  arts: Marilou Aballa channels their love for movement into community dance workshops that fuse contemporary choreography—drawing inspiration from Martha Graham—and traditional Southeast Asian folk steps,
    while their evenings often feature playlists of John Legend, BTS, and classic jazz from Miles Davis, and they regularly attend performances at the Houston Grand Opera.
  travel: Marilou Aballa plans their travel with a balance of meticulous research and spontaneous detours, favoring culturally immersive trips such as a culinary tour of Bali, a cherry‑blossom weekend in
    Kyoto, and a historic jazz pilgrimage to New Orleans, while weekend getaways to Big Bend National Park satisfy their craving for rugged outdoor adventure.
  culinary: Marilou Aballa, an avid home‑cook, delights in preparing adobo with soy‑vinegar glaze, tangy pad thai tossed with tamarind and shrimp, and aromatic coconut‑milk‑based satay marinades infused
    with lemongrass and galangal, often showcasing their creations at potluck gatherings where they experiment with fusion twists on classic Asian staples.
  core: Marilou Aballa is a data‑savvy community champion who juggles optimization models, nightly yoga, and a relentless habit of collecting limited‑edition board games, and they balance a penchant for
    spontaneous dance flash‑mobs and occasional coffee‑induced insomnia.
background:
  cultural: Marilou was born in Houston to parents who emigrated from the Philippines in the early 1990s. Growing up in the multicultural neighborhoods of Harris County, she absorbed a blend of Filipino
    family values—emphasis on communal support, respect for elders, and a love of shared meals—and the entrepreneurial spirit of the broader Southeast Asian diaspora. Bilingual in English and Tagalog, she
    celebrates holidays such as Sinulog and Christmas with traditional music, food, and community gatherings, while also embracing Texan customs like barbecue and local festivals. This bicultural upbringing
    nurtured her compassion, cooperative nature, and drive to give back, shaping both her personal relationships and her professional focus on creating equitable solutions for diverse communities.
attributes:
  skills: '["Mathematical Optimization", "Simulation Modeling", "Statistical Analysis", "Data Mining", "Python Programming", "R Programming", "SQL Querying", "Data Visualization (Tableau, PowerBI)", "Problem
    Solving", "Strategic Planning", "Process Improvement", "Cross‑Functional Collaboration", "Effective Communication", "Stakeholder Engagement", "Project Management Basics"]'
  hobbies: '["Community Dance (Traditional & Contemporary)", "Cooking Fusion Asian Cuisine", "Board Game Strategy Nights", "Volunteer Tutoring for Immigrant Families", "Hiking (Buffalo Bayou Trails)", "Yoga"]'
  career_goals: Marilou aspires to advance into a senior analytics leadership role where she can guide multidisciplinary teams to develop data‑driven solutions that address community challenges, such as
    healthcare accessibility and environmental sustainability in the Greater Houston area. She aims to deepen her expertise in machine‑learning‑enhanced optimization and to obtain a professional certification
    in Operations Research, compensating for her limited formal schooling through targeted coursework and mentorship. A long‑term ambition is to mentor underrepresented women and Southeast Asian professionals
    entering STEM fields, fostering inclusive workplaces. She also dreams of contributing to public‑policy initiatives that use quantitative analysis to promote equitable resource allocation.
