personas:
  professional: Michael Whittington, a project manager specializing in community arts events, leverages their meticulous planning, persuasive public speaking, and competitive drive to curate inclusive exhibitions
    and orchestrate large‑scale cultural festivals, while their skeptical eye ensures donor proposals are rigorously vetted.
  sports: Michael Whittington, an avid outdoors enthusiast and seasonal soccer player, organizes weekly hikes on the Appalachian Trail foothills, supports the Atlanta Braves, Falcons, and Hawks, and captains
    a local co‑ed recreational soccer league team called the "Gardeners United".
  arts: Michael Whittington, a devoted gallery‑hopper and community theater participant, regularly engages with works by Kara Walker, Ai Weiwei, and local Georgia muralist Jeff Swenson, while attending
    live shows featuring Leon Bridges and the indie folk band Fleet Foxes, and often debates contemporary art theory over espresso with friends.
  travel: Michael Whittington, who balances a modest travel budget with a love for cultural immersion, has explored Savannah’s historic squares, hiked the Great Smoky Mountains, attended the Venice Biennale,
    dreams of visiting Kyoto’s tea gardens, and plans a road‑trip tour of Southern culinary hotspots next summer.
  culinary: Michael Whittington, an experimental backyard chef, blends Southern staples like shrimp and grits and smoked brisket with global twists such as miso‑glazed carrots, fermented kimchi slaw, and
    sous‑vide duck breast, often sourcing heirloom tomatoes from their garden and pairing dishes with craft bourbon cocktails.
  core: Michael Whittington, a competitively organized arts advocate with a penchant for late‑night event planning, garden‑fresh cuisine, and skeptical yet sociable networking, never misses a chance to
    blend Southern comfort with avant‑garde flair.
background:
  cultural: Michael grew up in the rural South of Georgia, shaped by Southern hospitality, strong community ties, and a tradition of church gatherings and high school sports. His family’s love for backyard
    barbecues and seasonal festivals instilled an appreciation for communal celebrations. While rooted in these Southern values, Michael embraces broader artistic influences, regularly seeking out unconventional
    and avant‑garde ideas that expand his cultural perspective.
