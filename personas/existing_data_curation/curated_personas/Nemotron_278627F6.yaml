  career_goals: Michael aims to complete his bachelor's degree in Arts Administration and secure a managerial position at a regional arts center or museum in Georgia. He aspires to curate inclusive exhibitions
    and launch a community-driven arts festival that highlights local talent and diverse cultural expressions. Over the next five years, he envisions establishing his own event-planning consultancy focused
    on cultural and charitable events, leveraging his organizational skills and competitive drive to become a recognized leader in the regional arts scene.
