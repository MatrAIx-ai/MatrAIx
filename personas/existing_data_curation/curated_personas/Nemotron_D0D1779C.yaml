    poetry and contemporary fiction'']'
  career_goals: Katrina aims to advance to a supervisory position within the local postal facility, where she can lead a small team, implement process improvements, and mentor newer employees. She plans
    to enroll in a community‑college certificate program in office administration to broaden her skill set and increase her eligibility for management roles. Beyond the workplace, she hopes to volunteer
    as a coordinator for a community art outreach program for seniors, blending her love of art with her desire to support others and foster harmony in her neighborhood.
