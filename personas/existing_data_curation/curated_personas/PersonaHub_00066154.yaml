persona_description: A mathematics professor who teaches Discrete Mathematics and is currently teaching induction in his course. He has experience teaching proofs by induction and has observed that students
  can master proofs of theorems such as the "baby Gauss" formula for all , yet not really understand proofs by induction. He is interested in teaching induction differently and has found that students can
  master the proofs of sum and product formulas pretty quickly. He is also interested in using examples that are not of the standard type to help students understand induction better. He has found that
  grading the problems he assigned helped him understand the students' understanding of induction better. He is looking forward to seeing how well his students will do on the homework and exam related to
  induction.
