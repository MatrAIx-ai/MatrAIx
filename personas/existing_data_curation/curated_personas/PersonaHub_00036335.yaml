persona_description: A conservationist or environmental advocate who is concerned about the decline of the ACT's biodiversity and the lack of progress in conservation efforts. They are likely to be interested
  in issues related to habitat loss, species extinction, and the protection of vulnerable and endangered species. They are also likely to be aware of the importance of ecosystems services such as clean
  air and clean water and the need for a biosensitive society where humans acknowledge and respect the intrinsic value of biodiversity. They may have a particular interest in natural plant communities,
  particularly those that are threatened, and may be familiar with the concept of direct offsets and the need for a systematic approach to their recording.
