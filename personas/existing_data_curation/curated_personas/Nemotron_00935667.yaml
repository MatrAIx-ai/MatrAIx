  hobbies: '[''Birdwatching'', ''Coastal Gardening'', ''Sailing'', ''Historical Fiction Reading'', ''Science Writing'', ''Knitting'', ''Beach Walking'', ''Volunteer Teaching'']'
  career_goals: Although retired from formal employment, Nellie aims to stay intellectually active by volunteering as a mentor for local STEM outreach initiatives, especially programs that encourage girls
    and underrepresented youth to explore science and engineering. She plans to organize small workshops on coastal environmental stewardship, leveraging her sailing experience and knowledge of marine ecosystems.
    Nellie also hopes to author a memoir that blends her professional experiences with personal reflections on lifelong learning, and she is considering part‑time consulting on sustainability projects for
    community organizations. Maintaining mental acuity and contributing meaningfully to her small‑scale community are central to her ambitions.
