personas:
  professional: An aspiring young coder and storyteller named Polly Woody blends curiosity about science‑fiction worlds with practical problem‑solving, spending afternoons coding Scratch games while journaling
    ideas, and they thrive in quiet corners where they can focus without the distraction of peers.
  sports: A desert‑trail explorer named Polly Woody prefers solo hikes and occasional skate sessions over team sports, follows the Las Vegas Raiders for the excitement, and they are a member of a local
    youth nature club that organizes monthly trail runs through Red Rock Canyon.
  arts: A creative sketcher and piano enthusiast named Polly Woody draws inspiration from the lyrical piano works of Ludovico Einaudi, the whimsical illustrations of Hayao Miyazaki, and the epic world‑building
    of Brandon Sanderson, channeling those influences into desert wildlife drawings, origami cranes, and short sci‑fi poems.
  travel: An inquisitive traveler named Polly Woody dreams of visiting Joshua Tree National Park and the Grand Canyon for stargazing, has already taken family trips to the nearby Red Rock Canyon and a weekend
    road trip to San Diego, and they meticulously plan future journeys around school breaks and parental permission.
  culinary: A budding home chef named Polly Woody favors simple, comfort foods like macaroni‑and‑cheese with a sprinkle of cinnamon, enjoys assembling cactus‑infused tacos after watching cooking videos,
    and they love experimenting with rock candy made from desert mineral salts for a sweet treat.
  core: Polly Woody is a solitary, curiosity‑driven 12‑year‑old whose blend of poetic imagination and practical tinkering is often shadowed by a quiet worry about perfection and social overload.
background:
  cultural: Polly was raised in a middle‑class, predominantly white family that relocated to Las Vegas, Nevada, when she was five. Her household follows mainstream American traditions—celebrating Thanksgiving,
    Christmas, and the Fourth of July—and places a strong emphasis on education, self‑reliance, and personal responsibility. Living near the vibrant Strip, she has been exposed to a mosaic of cultures,
    languages, and artistic performances, which has sparked her curiosity about the wider world. Despite this exposure, Polly prefers the quiet of her home and the desert landscape outside the city, finding
    solace in solitary activities. Her school integrates technology with a traditional curriculum, encouraging practical inquiry and fostering her interest in both the arts and sciences.
attributes:
