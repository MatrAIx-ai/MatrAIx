  hobbies: '["Reading fantasy and science‑fiction novels", "Creative writing (short stories, poetry)", "Piano playing", "Sketching and drawing", "Scratch programming", "Rock collecting", "Origami", "Stargazing",
    "Journaling"]'
  career_goals: Polly dreams of becoming a published author of science‑fiction and adventure stories for young readers, and she also hopes to design educational video games that teach environmental stewardship.
    She aims to study creative writing and computer science in college, merging storytelling with interactive technology. In the longer term, Polly wants to contribute to projects that inspire other children
    to explore nature and develop problem‑solving skills, while also maintaining the practical, detail‑oriented approach that helps her bring ideas to life.
