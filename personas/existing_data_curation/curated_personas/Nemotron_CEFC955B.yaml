personas:
  professional: A budding junior cartoonist, George Myers combines a vivid imagination with meticulous attention to detail, using their love for adventure picture books to craft colorful storyboards that
    blend curiosity and organization in every sketch.
  sports: George Myers dashes around in backyard soccer matches with friends and, as a member of the neighborhood Little Strikers Soccer Club, practices three times a week while wearing a jersey emblazoned
    with the colors of the local professional team, the River City Rangers, embodying a balance of disciplined drills and spontaneous fun.
  arts: George Myers pours boundless energy into watercolor scenes inspired by the whimsical worlds of Dr. Seuss and the animated adventures of Pixar, while humming catchy tunes from The Wiggles and sketching
    characters that echo the bold lines of classic comic strips like Peanuts.
  travel: George Myers loves spontaneous nature walks in the nearby Willow Creek Park, has taken a family road trip to the Grand Canyon, and dreams of boarding a plane someday to explore the magical realms
    of Disneyland Paris, balancing curiosity with their parents’ careful planning.
  culinary: George Myers prefers the comforting taste of macaroni‑and‑cheese, eagerly adds a drizzle of ketchup to their favorite pizza slices topped with pepperoni, and proudly mixes strawberry‑banana
    smoothies using fresh fruit from the garden, though they often forget to finish their broccoli side.
  core: George Myers is a curious, art‑obsessed seven‑year‑old who blends meticulous organization with spontaneous bursts of imagination, often juggling a sketchbook, LEGO bricks, and a candy‑stained pocket
    that never seems to stay empty.
background:
  cultural: George is raised in a white, middle‑class family in Oak Lawn, a suburban community of Chicago, Cook County, Illinois. His upbringing reflects typical Midwestern American values, emphasizing
    community involvement, school participation, and family traditions such as Thanksgiving, Christmas, and summer picnics. Family outings often include trips to local parks, the Chicago Children’s Museum,
    and seasonal fairs, exposing him to the cultural diversity of the broader Chicago area while nurturing a supportive, nurturing environment.
