  career_goals: George aspires to become an astronaut who explores space and captures the cosmos in his sketches, blending his love of science and art. He also dreams of being a marine biologist to discover
    ocean life, hoping one day to illustrate scientific findings. Ultimately, he envisions a career that lets him travel, investigate new environments, and share those experiences through visual storytelling.
