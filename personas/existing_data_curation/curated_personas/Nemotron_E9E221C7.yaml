personas:
  professional: Phat Bautista, a one‑year‑old, showcases budding problem‑solving skills by meticulously stacking colorful blocks, balancing a natural curiosity for new shapes with a practical sense of stability
    even in play.
  sports: Phat Bautista loves the rhythmic movements of toddler gymnastics at the local community center, gleefully attempts crawling races in the park, and often watches the New York Knicks games on a
    family TV, cheering with a tiny foam finger.
  arts: Phat Bautista enjoys the soothing piano lullabies of Ludovico Einaudi, giggles at the vibrant illustrations in Eric Carle’s 'The Very Hungry Caterpillar,' and lights up when hearing the gentle voice
    of Norah Jones.
  travel: Phat Bautista has delighted in trips to the nearby city zoo, the family’s seaside cottage in Maine, and a weekend getaway to San Diego’s beach boardwalk, always perched in the front seat to watch
    the scenery roll by, and dreams of someday seeing the Eiffel Tower.
  culinary: Phat Bautista prefers warm apple puree spiced with a pinch of cinnamon, enjoys soft mashed sweet potatoes and ripe avocado, though they have a quirky habit of flinging peas toward the high chair.
  core: Phat Bautista, a one‑year‑old, balances a bright curiosity with early caution, often worrying over new textures while delighting in colorful toys and soothing lullabies.
background:
  cultural: Phat Minh’s family is of mixed Southeast Asian heritage, primarily Filipino and Vietnamese, reflected in his surname Bautista and given names. His parents maintain cultural traditions such as
    celebrating Lunar New Year with red envelopes and lanterns, preparing dishes like sinigang, adobo, and pho at home, and speaking Tagalog and Vietnamese alongside English. Living in the small town of
    Winterville, North Carolina, he also experiences Southern hospitality, community events like county fairs, and Southern cuisine. This blend of Southeast Asian customs and Southern American lifestyle
    shapes his daily routines, food preferences, and values of family unity, respect for elders, and a love for communal gatherings.
