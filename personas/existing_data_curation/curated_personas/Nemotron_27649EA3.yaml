  career_goals: Patricia hopes to attend a high school with a strong arts program and eventually study visual arts or graphic design at college. She dreams of becoming a professional illustrator who can
    bring stories to life and also envisions working with community centers or schools to lead art workshops for younger children, using her creativity and compassion to foster a supportive environment.
    In the longer term, she sees herself possibly combining art and education as an art teacher or youth program coordinator, where she can inspire peers and promote harmony through creative expression.
