personas:
  professional: Patricia Reist is an aspiring multimedia storyteller who blends hand‑drawn sketches of fantasy characters, watercolor landscapes of the Ohio River, and digital comic panels on her tablet
    while performing in school dramas and practicing piano to sharpen focus, channeling her boundless curiosity and organized work ethic into creative projects for class and community events.
  sports: Patricia Reist plays on the Cincinnati Riverhawks U13 youth soccer team, practices yoga after drama rehearsals to stay flexible, avidly follows the Cleveland Browns and the Cincinnati Bengals
    for weekend inspiration, and spends Saturdays hiking the trails of Hocking Hills State Park, where she often leads friends in nature‑scavenger games.
  arts: Patricia Reist draws artistic inspiration from the watercolor elegance of Winslow Homer, the comic storytelling of Jeff Smith’s Bone series, and the animated worlds of Hayao Miyazaki, while actively
    participating in the school drama club, performing piano solos at local recitals, and volunteering to organize illustrated storytime sessions at the community library.
  travel: Patricia Reist loves day trips to Hocking Hills State Park’s waterfalls, explores the Cincinnati Museum Center’s natural history exhibits, dreams of visiting the National Gallery in London to
    see classic art, and hopes to tour the Studio Ghibli Museum in Japan, preferring meticulously planned itineraries that balance adventurous hikes with comfortable museum pauses.
  culinary: Patricia Reist enjoys cooking simple dishes like blueberry muffins and strawberry shortcake, often adding fresh Ohio strawberries, cinnamon, and whole‑wheat flour, while she delights in savoring
    pizza with extra mozzarella, homemade cornbread with honey butter, and experimenting with fruit smoothies featuring kale, mango, and a splash of almond milk.
  core: Patricia Reist is a talkative, compassionate 12‑year‑old who turns curiosity into vibrant art, thrives on community projects, and occasionally misplaces her homework when a new comic idea sparks
    imagination.
background:
  cultural: Patricia was raised in East Liverpool, Ohio, a small town along the Ohio River with a rich pottery heritage and a close‑knit Midwestern community. Her family celebrates typical American holidays
    such as Thanksgiving, Christmas, and the Fourth of July, and they take pride in local traditions like the Tri‑State Pottery Festival, which has sparked her interest in crafts. Growing up in a predominantly
    white, working‑class neighborhood, she has been influenced by the values of friendliness, modesty, community cooperation, and a strong sense of place tied to the river and local industry. These cultural
    influences shape her appreciation for art, community service, and collaborative activities.
