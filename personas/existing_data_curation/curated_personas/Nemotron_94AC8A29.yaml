  hobbies: '[''Gardening'', ''Cooking'', ''Knitting/Crocheting'', ''Hiking local trails'', ''Visiting farmers’ markets'', ''Listening to podcasts'', ''Reading mystery novels'', ''Yoga/mindful breathing'',
    ''Playing competitive board games'']'
  career_goals: While she enjoys her current role, Cathy aims to advance to a supervisory position within the next two years, targeting a shift‑lead or assistant manager role where she can shape team performance
    and store layout. In the longer term she dreams of managing an entire store or opening a small, community‑focused boutique that showcases locally made crafts and produce. She plans to earn her GED to
    broaden her qualifications, secure a stable income for her family, and eventually purchase a home in Lancaster County. Additionally, she wants to develop stronger leadership and stress‑management skills
    so she can mentor new hires and create a more supportive work environment.
