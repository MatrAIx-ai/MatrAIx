personas:
  professional: Eddison Harvey, a seasoned technology sales veteran with over three decades of experience, leverages his STEM background and relentless curiosity to translate complex tech concepts into
    compelling value propositions; they blend a competitive yet fair negotiation style with data‑driven market analysis and a passion for mentoring emerging talent, positioning themselves for a consultative
    advisory role that bridges Midwestern manufacturers with cutting‑edge startups.
  sports: Eddison Harvey, an avid golfer who meets his clubmates for a competitive 9‑hole round every Wednesday at the historic Detroit Golf Club, also tracks the Detroit Tigers in spring and the Detroit
    Red Wings in winter while squeezing in treadmill intervals and occasional senior‑league pickleball matches to stay fit, channeling their competitive streak into regular workouts despite occasional knee
    discomfort.
  arts: Eddison Harvey, a devoted explorer of Detroit’s art scene, regularly visits the Detroit Institute of Arts and the Museum of Contemporary Art Detroit, hunts for new street murals in Eastern Market,
    attends live jazz performances by artists like Christian Scott aTunde Adjuah at the Blue Note, and hones their own creative eye through weekend photography workshops and woodworking classes, blending
    curiosity with a keen appreciation for improvisational expression; they often capture shots of urban murals for a personal blog that doubles as a networking tool.
  travel: Eddison Harvey, a strategic travel enthusiast who plans trips like a sales campaign—researching local art festivals, historic sites, and culinary hotspots—prefers curated weekend road trips to
    Midwest gems such as Grand Rapids for ArtPrize and New Orleans for the Jazz & Heritage Festival, while dreaming of an extended immersion in Tokyo’s tech‑forward art districts, all balanced against a
    modest retirement budget, family obligations, and an occasional desire for spontaneous jazz‑city getaways; they approach each itinerary with a blend of careful budgeting and an adventurous spirit.
  culinary: Eddison Harvey, an intermediate home chef, delights in crafting fusion dishes that marry soul‑food roots with Midwestern bounty—think collard‑green and mushroom risotto, sweet‑potato gnocchi
    topped with smoked pork belly, and cornbread‑crusted catfish served alongside kale slaw—while sourcing fresh produce from their vegetable garden and seeking inspiration during late‑night visits to Detroit’s
    Selden Standard, a favorite spot for seasonal tasting menus; they often experiment with new flavor pairings and document their creations on a personal food journal.
  core: Eddison Harvey blends relentless curiosity with a competitive edge, turning a lifelong sales career into a mentorship‑driven mission that bridges technology, art, and community while they savor
    jazz, golf, and inventive cooking.
background:
  cultural: Born and raised in the Detroit metropolitan area, Eddison grew up in a close-knit Black family that emphasized education, church community, and cultural pride. His parents were part of the post-World
    War II migration that settled in Michigan's industrial belt, and they instilled in him the values of perseverance and collective uplift. Throughout his life, he has felt the influence of Motown's musical
    legacy, the civic activism of the civil-rights era, and the strong sense of neighborhood camaraderie found in Wayne County. These experiences shape his worldview, informing his respect for tradition
    while encouraging a forward-looking curiosity about new ideas and artistic expression.
