  career_goals: Approaching retirement, Eddison aims to shift from day-to-day management to a consultative advisory role where he can help emerging technology firms enter the Midwestern market. He plans
    to establish a mentorship program linking local historically Black colleges and universities (HBCUs) with the automotive and tech sectors, aiming to increase diversity in STEM-focused sales roles. Additionally,
    he hopes to author a guide on integrating curiosity-driven innovation into sales strategies and to serve on the board of a community arts nonprofit.
