  hobbies: '[''Community theater'', ''Mountain walking club'', ''Art gallery visits'', ''Woodworking guild'', ''Landscape photography'', ''Bridge (card game)'', ''Community gardening'', ''Genealogy research'']'
  career_goals: Keir aims to channel his lifelong curiosity and competitive spirit into meaningful community contributions and personal artistic growth. He plans to mentor young engineers and hobbyists
    through workshops at the local senior center, helping them develop practical skills and critical thinking. He aspires to curate a historically accurate exhibition on Appalachian engineering achievements
    at the county museum, ensuring authenticity and educational value. He is determined to complete a series of original landscape paintings and host a local exhibition, seeking recognition in regional
    art contests. Additionally, he wishes to author a memoir detailing his engineering projects and the cultural heritage of Ashe County, preserving knowledge for future generations. Finally, he hopes to
    achieve master status in the local bridge league and win the county’s woodworking competition, reflecting his drive for excellence.
