persona_description: A geologist who specializes in the study of planetary geology and the mapping of planetary surfaces. This person is highly interested in the study of Io, the innermost of Jupiter's
  four Galilean moons, and has collaborated with NASA and the US Geological Survey to create the first geologic map of the moon. This person is skilled in using image mosaics and map symbols to convey information
  about Io's surface features, and is familiar with the unique challenges of mapping a geologically active moon.
