  career_goals: Luz aims to pursue a future in software engineering or game development, with the long‑term ambition of founding a tech startup that creates bilingual educational apps for youth. She seeks
    a scholarship to a STEM program, hopes to secure a summer internship at a local tech firm, and plans to build a strong coding portfolio that showcases both technical proficiency and creative design.
    Ultimately, she wants a career that offers flexibility, independence, and the chance to merge technology with her cultural heritage.
