personas:
  professional: An aspiring teenage software engineer, Luz Calle blends beginner‑level Python and Scratch coding with hands‑on Arduino tinkering, channeling their competitive streak and love of problem‑solving
    into community‑focused tech projects while they often juggle schoolwork with a relaxed, sometimes chaotic schedule.
  sports: Luz Calle kicks a soccer ball with the Dundee Youth Soccer Club in the spring, they cheer on the Chicago Bears in the fall, drop by the local ice‑skating rink for winter practice, and squeeze
    in occasional pickup basketball games, preferring a laid‑back, fun‑first attitude over rigorous training regimens.
  arts: Luz Calle sketches pixel‑perfect sprites for indie games while listening to Bad Bunny and Daddy Yankee, they immerse in sci‑fi epics like The Name of the Wind, and write Zelda fanfiction under a
    secret pen name, blending vibrant digital art with a soundtrack of salsa and reggaeton that fuels their creative bursts.
  travel: Luz Calle loves weekend road trips to Chicago’s museums, they dream of exploring Barcelona’s design scene after a school exchange, and occasionally join family voyages to the Caribbean for Noche de San Juan
    celebrations, balancing spontaneous adventures with a modest budget that relies on parental approval.
  culinary: Luz Calle whips up arroz con gandules and pasteles alongside homemade pizza, they confidently handle sofrito, sazón, and mozzarella, while also experimenting with avocado‑lime smoothies, turning
    the family kitchen into a weekend lab for flavor mash‑ups.
  core: Luz Calle is a tech‑savvy, competition‑driven teen who fuses bilingual community spirit with a love for gaming, they often juggle chaotic projects and snack‑filled all‑nighters while dreaming of
    launching a bilingual education startup.
background:
  cultural: Luz is a second‑generation Puerto Rican American raised in a bilingual household in Dundee, Illinois. Her family maintains strong ties to Puerto Rican traditions, celebrating festivals such
    as Noche de San Juan and preparing classic dishes like arroz con gandules and pasteles. Fluent in both English and Spanish, Luz blends Caribbean cultural warmth with Midwestern practicality. Her heritage
    informs her interests in bridging technology and community, inspiring her desire to develop tools that serve bilingual youth and celebrate her cultural roots.
