personas:
  professional: Stephanie Stevens, a retired community volunteer, leverages her methodical budgeting, event coordination, and digital literacy expertise to expand senior computer classes, mentor volunteers,
    and spearhead a neighborhood garden, all while weaving her curiosity for marine conservation into practical, step‑by‑step community projects.
  sports: Stephanie Stevens enjoys gentle sunrise walks along the Atlantic shoreline, practices yoga twice a week at the local senior center, and cheers on the Boston Red Sox and Boston Celtics, while occasionally
    joining a senior walkers' club that meets at the Seaside Park.
  arts: Stephanie Stevens, an avid reader, devours historical fiction by Hilary Mantel and memoirs by Michelle Obama, participates in a community book club that discusses works like Ken Follett's 'The Pillars
    of the Earth,' and finds inspiration in the folk tunes of Old Crow Medicine Show and the classic blues of B.B. King.
  travel: Stephanie Stevens prefers meticulously planned trips, often taking advantage of senior discounts to visit coastal gems like Charleston, South Carolina, the historic streets of Savannah, Georgia,
    and the tropical breezes of Key West, while dreaming of a future cruise to the Azores to explore marine biodiversity firsthand.
  culinary: Stephanie Stevens blends her Midwestern comfort cooking—think chicken pot pie and cornbread—with Caribbean flair, creating dishes such as jerk‑spiced pork tenderloin with corn pudding and mango‑lime
    salsa, and they relish experimenting with fresh fish, sweet potatoes, and callaloo in their small tropical garden.
  core: Stephanie Stevens balances a love of organized garden planning, diligent budgeting, and weekly bridge games with a penchant for occasional forgetfulness about dental floss, a stubborn habit of over‑scheduling
    classes, and an unshakable curiosity that fuels lifelong learning.
background:
  cultural: Stephanie grew up in a middle‑class white family in the Midwest, where practicality, self‑reliance, and community participation were emphasized. After moving to Delray Beach in her early fifties,
    she embraced the coastal lifestyle, integrating Florida’s diverse cultural influences—such as local seafood cuisine, beach conservation values, and a vibrant senior social network—while retaining the
    organized, dependable ethos of her upbringing.
attributes:
  skills: '["Household budgeting","Meal planning","Event coordination","Garden maintenance","Basic first aid","Digital communication (email, video calls, social media)","Senior computer literacy tutoring"]'
  hobbies: '["Garden tending","Historical fiction reading","Beach walking","Bridge (card game)","Community book club","Gentle yoga","Recipe experimentation"]'
  career_goals: Although retired, Stephanie aims to deepen her involvement in community service by expanding the senior computer literacy program at the local senior center, mentoring younger volunteers,
    and establishing a neighborhood garden shared by residents. She also hopes to complete a series of online courses in local history and marine conservation to better support her beach-cleanup initiatives
    and to remain mentally active.
