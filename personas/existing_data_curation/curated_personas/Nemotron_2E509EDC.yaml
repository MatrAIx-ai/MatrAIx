personas:
  professional: Yezenia Wittyngham is a community‑focused culinary historian who blends practical gardening, bilingual outreach, and volunteer coordination to preserve and share traditional foodways while
    organizing intergenerational workshops and library programs.
  sports: Yezenia Wittyngham enjoys low‑impact fitness through daily walks in the nearby grasslands, supports the Kansas City Royals and the Kansas City Chiefs, and participates in a senior tennis club
    that meets each spring.
  arts: Yezenia Wittyngham finds artistic fulfillment listening to plena legends like Willie Colón, salsa icons such as Marc Anthony, and bolero classics by Los Panchos, while also contributing quilts to
    local art fairs and attending community theater productions of classic dramas.
  travel: Yezenia Wittyngham loves cultural travel, having visited Old San Juan, the historic streets of Cartagena, and the gardens of Seville, yet now prefers day trips to nearby state parks and plans
    a modest cruise to the Bahamas when finances allow.
  culinary: Yezenia Wittyngham excels at adapting traditional island recipes—such as arroz con gandules, pernil, and pasteles—using locally grown heirloom tomatoes, sweet corn, and native herbs, and delights
    in sharing these dishes at the farmer’s market while experimenting with new spice blends.
  core: Yezenia Wittyngham blends curiosity with practicality, preserving heritage through food and crafts, mentoring youth, and balancing frugality with community generosity, all while navigating the aches
    of aging.
background:
  cultural: Yezenia was born to Puerto Rican parents who migrated to the United States in the early 1960s, first settling in Kansas City before moving to Liberal, Kansas, where she spent most of her life.
    Her household spoke Spanish, and she grew up immersed in Puerto Rican traditions—celebrating holidays such as Three Kings Day, San Juan’s Festival, and cooking dishes passed down from her grandparents.
    The family’s Catholic faith played a central role, blending Caribbean customs with Midwestern community life. As a cultural minority in a predominantly white, agricultural town, Yezenia forged strong
    ties with both the local Hispanic community and her neighbors, often acting as a cultural liaison. She maintained a connection to her island roots through music, dance, and storytelling, while also
    adopting Kansas agricultural practices that shaped her practical outlook. Her bicultural experience—balancing Caribbean heritage with rural Midwestern values—has informed her identity, fostering resilience,
    adaptability, and a deep appreciation for both her ancestral and adopted homes.
