  career_goals: Yezenia aims to complete her high‑school equivalency (GED) to strengthen her literacy and confidence. She hopes to start a modest home‑based kitchen selling Puerto Rican pastries and tamales
    at the local farmers’ market, providing supplemental income. She dreams of leading a monthly intergenerational cooking workshop at the senior center, teaching younger participants about Puerto Rican
    cuisine and food preservation. Yezenia also plans to mentor Hispanic teens in the community, offering guidance on college readiness and cultural pride. Additionally, she seeks to advocate for bilingual
    services at the town library and health clinics to ensure older Spanish‑speaking residents receive accessible information.
