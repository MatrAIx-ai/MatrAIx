personas:
  professional: Maria Veitia, a retired elementary and middle-school educator, leverages four decades of curriculum design, bilingual instruction, and mentorship to craft inclusive, structured yet flexible
    learning experiences that honor community traditions and foster collaborative classroom dynamics.
  sports: Maria Veitia stays active through daily walks around the campus of Kansas State University, joins the Manhattan Senior Center’s low-impact fitness class, and supports the Kansas State Wildcats
    football and the Kansas City Royals baseball teams, while occasionally attending community salsa dance workshops for fun.
  arts: Maria Veitia, a dedicated member of her parish choir, delights in singing traditional folk songs for Día de los Muertos and other celebrations, regularly attends local performances by the Kansas
    State University Symphony, and draws inspiration from the works of renowned folk artists such as Joan Baez and cultural storytellers who blend music with community narratives.
  travel: Maria Veitia prefers relaxed, culturally immersive trips, often taking slow road‑trips to historic towns like Oaxaca and Santa Fe to experience Día de los Muertos festivities, while also enjoying
    weekend getaways to the Kansas State Fair and local botanical gardens, favoring flexible itineraries over strict schedules.
  culinary: Maria Veitia, an avid home cook, harvests her own cilantro, jalapeños, and oregano to craft authentic tamales, pozole, and enchiladas each week, and takes pride in serving these dishes at neighborhood
    gatherings, though she occasionally forgets to turn off the stove while chatting with friends.
  core: Maria Veitia, a spirited 71‑year‑old educator‑turned‑community‑mentor, blends structured teaching wisdom with a love for spontaneous garden chats, lively choir rehearsals, and a tender devotion
    to preserving family traditions—though she often misplaces her glasses and forgets bill due dates.
background:
  cultural: Maria Jannet Veitia is a first‑generation Mexican‑American whose parents immigrated from Jalisco, Mexico. She grew up in a bilingual household where Spanish was spoken alongside English, and
    Mexican customs such as Día de los Muertos, Las Posadas, and quinceañera celebrations were central to family life. After moving to Manhattan, Kansas, Maria blended her Mexican heritage with Midwestern
    community values, fostering a strong sense of familismo, hospitality, and respect for tradition. Her cultural identity informs her teaching philosophy, emphasizing inclusivity, cultural pride, and the
    sharing of Mexican stories and music within the classroom and broader community.
attributes:
