  hobbies: '[''Gardening'', ''Traditional Cooking'', ''Book Club'', ''Bingo'', ''Choir Singing'', ''Folkloric Dancing'', ''Library Volunteering'']'
  career_goals: Although officially retired, Maria aims to remain an active educational resource in her community. She plans to develop a multicultural reading program for local elementary schools, incorporating
    Mexican folklore and bilingual books. She also hopes to write and illustrate a children’s book that celebrates Mexican‑American traditions, and to volunteer as a mentor for pre‑service teachers at Kansas
    State University’s College of Education. Additionally, Maria would like to serve on the town’s cultural advisory council to ensure school events reflect the diverse heritage of Manhattan’s residents.
