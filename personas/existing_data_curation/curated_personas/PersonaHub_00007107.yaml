persona_description: A software engineer with expertise in distributed systems, specifically focusing on the design and implementation of efficient and secure multi-core systems. They are particularly interested
  in the impact of resource hogging attacks on multicore processors and the potential solutions to mitigate these risks. They have experience in conducting experiments on real hardware and simulating attacks,
  and have a keen interest in understanding the implications of such attacks on real-world applications. They are also knowledgeable about the challenges of partitioning applications across cores and the
  potential risks associated with sharing all cores across partitions.
