  career_goals: Stephen dreams of a future where he can serve his community and work with others in a structured, reliable role. He aspires to become a firefighter, drawn to the teamwork, clear protocols,
    and service to others, or a school teacher, where he can combine his love for organization with helping peers learn. He also imagines working with animals as a veterinarian, reflecting his caring nature.
    Whatever path he chooses, he wants to stay connected with his community and make a positive impact.
