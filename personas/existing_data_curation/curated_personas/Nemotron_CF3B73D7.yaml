personas:
  professional: Stephen is a budding robotics enthusiast who channels his love for structure into building functional LEGO machines and coding simple Scratch programs, applying his practical mindset to
    group projects in his school’s robotics club, and they often take the lead in organizing team tasks.
  sports: Stephen is an energetic participant on the Gardner County Youth Soccer team and a pitcher for the Gardner County Little League baseball squad, training at the local park three times a week and
    they love cheering on the local high school football team, the County Wildcats.
  arts: Stephen enjoys constructing intricate LEGO sculptures as a form of kinetic art, devours adventure novels like "Percy Jackson & the Olympians" and "The Magic Tree House", and they frequently listen
    to pop‑rock band Imagine Dragons and watch animated films starring Tom Hanks.
  travel: Stephen prefers short family road trips to nearby attractions such as the State Science Museum and the coastal boardwalk, loves camping at Pine Ridge Campground, and they dream of visiting the
    Kennedy Space Center to see real rockets up close.
  culinary: Stephen loves cooking simple meals like grilled cheese sandwiches, banana pancakes, and spaghetti with meatballs, often adding shredded cheddar cheese and pepperoni, and they proudly claim credit
    for the best chocolate‑chip cookies at the Gardner County Fair.
  core: Stephen is a structured, sociable 10‑year‑old who blends a love for teamwork, hands‑on building, and practical problem‑solving into every activity, from sports fields to the kitchen, while occasionally
    neglecting to tidy up their LEGO creations.
background:
  cultural: Stephen grew up in Gardner, Kansas, a suburban community in Miami County that embodies classic Midwestern values of friendliness, hard work, and community involvement. His family participates
    in local traditions such as school events, church gatherings, and the annual county fair, emphasizing teamwork and cooperation. The region’s agricultural roots and strong emphasis on school sports shape
    his outlook, fostering a sense of responsibility and collective spirit. Celebrations like Thanksgiving and the Fourth of July are marked with family potlucks and neighborhood parades, reinforcing his
    cooperative nature and respect for community harmony.
