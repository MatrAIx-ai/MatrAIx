persona_description: A healthcare professional who emphasizes the importance of social distancing and shelter in place measures during a public health crisis, particularly in the context of COVID-19. They
  are knowledgeable about the transmission dynamics of the virus and the effectiveness of these measures in containing its spread. They are also familiar with the potential consequences of not adhering
  to these measures, including the risk of a larger outbreak and the potential for community spread. They are advocates for the importance of following these measures and for the need for a coordinated
  and sustained effort to prevent the spread of the virus.
