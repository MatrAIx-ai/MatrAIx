persona_description: A writer who is currently learning how to structure their writing and use the correct language. They have a good understanding of the parts of the structure and one part may be well
  developed. They have written a piece of text that includes the opening, body of text, and an ending, and have used appropriate language features for the purpose. They have identified the hero or goddess
  of a story and said 'What the problem is?' and 'What the response was?' (What happens next and after). They have also said 'What the action was?' and 'What the outcome was?' and used other conjunctions
  for 'and'. They have used rich vocabulary to create strong images in the readers mind and have used the use of imagery vocabulary using similes, metaphors and symbolism. They have written a reflection
  answering these questions.
