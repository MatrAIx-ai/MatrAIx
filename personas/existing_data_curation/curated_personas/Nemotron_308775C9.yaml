personas:
  professional: Agustin Hunt, a 10‑year‑old aspiring game designer and digital illustrator, channels their curiosity and love for building worlds into creating Minecraft mods and hand‑drawn character concepts,
    and they balance meticulous sketching routines with spontaneous creative bursts.
  sports: Agustin Hunt plays midfield for the Riverside Rovers youth soccer team, enjoys weekend bike rides along the Blackstone River, and they cheer for the Boston Red Sox and New England Patriots while
    watching games with family.
  arts: Agustin Hunt draws inspiration from manga artist Akira Toriyama and digital painter Loish, immerses themselves in sci‑fi graphic novels like 'Saga', practices piano pieces by Yiruma, and they regularly
    visit the local art museum to study contemporary installations.
  travel: Agustin Hunt loves short family road trips to nearby state parks, has explored the Boston Children's Museum and a summer outing to Washington, D.C., dreams of wandering Tokyo's Akihabara district,
    and they prefer itineraries that include time for rock collecting and quiet moments.
  culinary: Agustin Hunt favours cheesy pepperoni pizza, mac and cheese, and occasional sushi rolls, delights in creating LEGO‑shaped cookie sculptures, and they can confidently whisk up simple pancakes
    and scrambled eggs with a bit of help from parents.
  core: Agustin Hunt is a curious, art‑obsessed ten‑year‑old who balances meticulous LEGO building with restless imagination, they worry about every detail yet find joy in crafting whole new worlds.
background:
  cultural: Agustin grows up in Woonsocket, a small city in Rhode Island known for its blend of New England and immigrant traditions, especially French‑Canadian, Irish, and Portuguese influences. His family
    celebrates typical American holidays like Thanksgiving and also participates in local community events such as the St. Patrick’s Day parade and the Woonsocket Harvest Festival. He is exposed to the
    region’s coastal environment, the nearby Blackstone River, and the vibrant arts scene of nearby Providence, including occasional visits to the Rhode Island School of Design’s community programs.
