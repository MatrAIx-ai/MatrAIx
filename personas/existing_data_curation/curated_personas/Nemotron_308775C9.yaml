  career_goals: He dreams of becoming a visual storyteller who can blend art and technology. In the near term, he wants to win his school's art contest, learn more advanced digital illustration techniques,
    and create a simple video game using Scratch. In the longer term, he hopes to study graphic design and computer science, eventually working as an illustrator or game designer who creates engaging, educational
    experiences.
