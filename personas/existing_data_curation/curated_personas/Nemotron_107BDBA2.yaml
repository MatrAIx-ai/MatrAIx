  career_goals: Although still young, Francisco aspires to become someone who builds and improves things for his community. He often says he wants to be an engineer or architect to design safe playgrounds
    and homes, or a teacher who can share his love of learning with other kids. He also imagines helping animals as a veterinarian, reflecting his compassionate side. He sees himself leading projects that
    combine creativity, practicality, and teamwork.
