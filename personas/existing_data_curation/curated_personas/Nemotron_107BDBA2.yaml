personas:
  professional: Francisco Smith, a budding junior engineer, channels their methodical planning and energetic curiosity into building intricate LEGO cities on weekends, dominates school science fairs with
    simple mechanical experiments, and dreams of inventing a playground gadget that lets friends play together safely.
  sports: Francisco Smith plays forward for the Phoenix Rising Juniors soccer team, sprints through tag games at the local park with relentless energy, cheers for the Phoenix Suns during basketball season,
    and emulates Lionel Messi’s dribbling moves on the playground, blending competitive spirit with teamwork.
  arts: Francisco Smith sketches vibrant cartoons inspired by folklore and Día de los Muertos motifs, listens avidly to mariachi tunes while drawing, and proudly displays a 'Coco' poster in their room,
    letting music and cultural stories fuel their creative bursts.
  travel: Francisco Smith daydreams about exploring the ancient pyramids of Teotihuacan after a memorable Grand Canyon hike, enjoys weekend family trips to the Desert Botanical Garden, and balances their
    wanderlust with school responsibilities and a modest allowance.
  culinary: Francisco Smith actively helps mash ripe avocados with lime, cilantro, and a pinch of salt for guacamole, folds cheese and sautéed peppers into warm quesadillas, and occasionally sneaks an extra
    cheese pizza slice, showcasing a budding love for fresh, bold flavors and simple cooking tasks.
  core: Francisco Smith blends organized curiosity with boundless energy, turning every LEGO set, soccer match, and sketch into a lively experiment while juggling allowance savings, allergy meds, and secret
    extra‑cheese pizza cravings.
background:
  cultural: Francisco is raised in a Mexican‑American household in Phoenix, where Spanish is spoken alongside English. Family traditions such as celebrating Día de los Muertos, sharing homemade tamales,
    and attending local Mexican festivals shape his identity. The vibrant Mexican community in Maricopa County provides him with cultural role models, and he often participates in school multicultural events
    that highlight his heritage. This bicultural environment fosters his appreciation for both Mexican customs and broader American culture.
