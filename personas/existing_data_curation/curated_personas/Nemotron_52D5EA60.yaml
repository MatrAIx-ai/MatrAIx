  hobbies: '[''Reading technical non-fiction'', ''Puzzle solving (Sudoku, logic puzzles)'', ''Urban hiking in the Bay Area'', ''Photography (landscape and street)'', ''Cooking Chinese & fusion dishes'',
    ''Gardening (indoor succulents)'', ''Programming small automation scripts'', ''Playing strategy board games (Go, chess)'', ''Attending small science meetups'', ''Volunteering for STEM education workshops'']'
  career_goals: Weihua aims to transition from frontline supervision to a senior operations management role within the next five years, eventually becoming a plant manager for a tech‑manufacturing facility
    in the Bay Area. She plans to deepen her expertise by earning a Lean Six Sigma Black Belt and pursuing a master's degree in industrial engineering. Her ambition is to lead large‑scale automation projects
    that reduce waste, improve safety, and set industry benchmarks for productivity. She also envisions mentoring junior supervisors, sharing her pragmatic problem‑solving approach, and eventually consulting
    on efficiency transformations for startups.
