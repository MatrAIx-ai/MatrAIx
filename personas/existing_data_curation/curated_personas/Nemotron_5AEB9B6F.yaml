  hobbies: '[''sketching in coffee shops'', ''visiting contemporary art galleries'', ''reading speculative fiction'', ''writing poetry'', ''listening to experimental music'', ''yoga'', ''mindfulness meditation'',
    ''urban photography'', ''attending poetry slams'', ''DIY paper‑cut crafts'']'
  career_goals: Simone aims to deepen her practice by pursuing a Master of Fine Arts in Visual Arts, focusing on conceptual and interdisciplinary work. She dreams of exhibiting her pieces in alternative
    spaces across New York City and collaborating with small collectives that share her commitment to innovative, thought‑provoking art. While studying, she hopes to work part‑time as a gallery assistant
    or outreach coordinator to gain curatorial experience and build professional networks. Ultimately, she envisions a freelance career that balances the freedom to explore personal projects with opportunities
    to create immersive installations and visual narratives that engage community audiences and spark dialogue about identity and memory.
