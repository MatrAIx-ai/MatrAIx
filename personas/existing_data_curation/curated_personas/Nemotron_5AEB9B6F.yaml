personas:
  professional: Simone Mcelroy is a budding visual artist who leverages Procreate, Photoshop, and mixed‑media techniques to translate speculative narratives into immersive installations, while their spontaneous
    nature and collaborative empathy make them a sought‑after gallery assistant hopeful for an MFA.
  sports: Simone Mcelroy enjoys casual early‑morning runs through Central Park, watches the New York Knicks in the winter and the New York Yankees in the summer, and participates in a community ultimate
    frisbee league on Saturdays, preferring low‑impact movement that complements their artistic rhythm.
  arts: Simone Mcelroy is a devoted follower of contemporary visionaries like Marina Abramović, Damien Hirst, and Yayoi Kusama, listens to experimental soundscapes by Aphex Twin and Oneohtrix Point Never,
    and finds poetic resonance in the work of Ocean Vuong and Rupi Kaur, letting these influences shape every sketch, installation, and social‑media post.
  travel: Simone Mcelroy favors spontaneous, budget‑friendly trips that weave art and adventure, having explored the street‑art corridors of Berlin, the museum districts of Florence, and the serene tea
    houses of Kyoto, while dreaming of a summer residency in the coastal studios of São Paulo.
  culinary: Simone Mcelroy is a fledgling home‑chef who relishes avocado toast with smoked salmon, masterfully brews pour‑over coffee using Ethiopian beans, crafts simple vegan ramen bowls peppered with
    miso and shiitake, yet often orders take‑out sushi after late‑night gallery openings due to a habit of work‑over‑eat cycles.
  core: Simone Mcelroy blends restless imagination with a gentle, harmony‑seeking spirit, turning fleeting city moments into thoughtful art while battling disorganization and occasional anxiety.
background:
  cultural: Simone was raised in a middle‑class white family in New York City, with roots tracing back to Irish and English ancestry. Her parents valued education and encouraged artistic exploration, exposing
    her early on to a diverse range of cultural experiences that the city offers. Growing up amidst the vibrant, multicultural art scene of Manhattan and Brooklyn, she absorbed influences from international
    contemporary artists, avant‑garde performances, and community‑driven cultural events. This environment nurtured her appreciation for both Western art traditions and the eclectic, global perspectives
    that characterize New York’s cultural tapestry, shaping her worldview as inclusive, curious, and open‑minded.
