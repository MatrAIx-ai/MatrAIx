  career_goals: Mayrim aspires to become a robotics or aerospace engineer, aiming to design innovative technology that blends creativity with practicality. She wants to win national science fairs and math
    competitions, earn scholarships, and attend a top engineering university. In the long term, she hopes to mentor other bilingual students and contribute to STEM outreach in her community, using her cultural
    background and technical expertise to inspire future innovators.
