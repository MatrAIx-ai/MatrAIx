personas:
  professional: Mayrim Collazo, a budding robotics hobbyist, channels their curiosity and practical mindset into building intricate LEGO robots and programming simple games in Scratch, approaching each
    challenge with meticulous organization and a competitive spirit that drives them to dominate school robotics contests.
  sports: Mayrim Collazo enjoys playing forward for the Prairie Village Soccer Club’s U‑12 team, follows the Kansas City Royals with keen enthusiasm, and maintains a disciplined after‑school cardio routine
    that includes biking around the local park, though occasional anxiety can cause them to skip practice sessions.
  arts: Mayrim Collazo immerses in classic science‑fiction novels by Isaac Asimov and Ursula K. Le Guin, draws creative inspiration from the vivid murals of Diego Rivera, and finds solace in listening to
    the lyrical storytelling of Lin‑Manuel Miranda’s musical scores while also indulging in the rhythmic beats of contemporary pop artist Billie Eilish.
  travel: Mayrim Collazo prefers meticulously planned weekend trips to nearby state parks like Cedar Bluff for stargazing, dreams of visiting the historic observatory at Mauna Kea and exploring the ancient
    pyramids of Chichen Itza, and balances these wanderlust ambitions with family commitments that often prioritize holiday gatherings in the Midwest and occasional visits to relatives in Mexico City.
  culinary: Mayrim Collazo showcases a growing culinary flair by mastering the preparation of aromatic mole sauce and hand‑shaping savory tamales during family celebrations, yet they often become impatient
    waiting for dough to rise and usually opt for quick snacks like grilled cheese when overwhelmed by schoolwork.
  core: Mayrim Collazo is a meticulous, anxiety‑prone 12‑year‑old who balances inventive robotics projects with a deep love for family traditions, channeling their competitive drive into puzzles while navigating
    intense emotional swings.
background:
  cultural: Mayrim comes from a Mexican‑American family that maintains strong cultural ties while living in Prairie Village, Kansas. Spanish is spoken at home daily, and family traditions such as Día de
    los Muertos, celebrating Mexican holidays, and preparing traditional foods are central to her life. Attending a predominantly white suburban school, she navigates a blend of Mexican heritage and Midwestern
    American culture, which shapes her identity and social experiences. Her family's Catholic faith and participation in local cultural events reinforce values of family cohesion, respect for tradition,
    and community involvement. These influences inform her bilingual communication skills, love for Mexican cooking, and her drive to excel academically while honoring her cultural roots.
