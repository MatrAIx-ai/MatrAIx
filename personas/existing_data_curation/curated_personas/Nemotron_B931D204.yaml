  hobbies: '[''Gym workouts'', ''Swimming'', ''Beach volleyball'', ''Fishing trips'', ''Spontaneous road trips'', ''Cooking Puerto Rican cuisine'', ''Salsa dancing'', ''Attending cultural festivals'', ''Watching
