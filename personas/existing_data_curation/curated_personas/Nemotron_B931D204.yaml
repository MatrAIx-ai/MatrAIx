personas:
  professional: Vianney Soto is a bilingual retail manager who excels at streamlining inventory and scheduling, and they balance a love for routine with a spontaneous knack for on‑the‑fly problem‑solving,
    which makes them a reliable yet adaptable leader in fast‑paced hospitality settings.
  sports: Vianney Soto hits the gym for weight‑training, swims daily at the local beach, plays beach volleyball with the South Beach Volleyball Club each weekend, follows the Miami Marlins during baseball
    season, and they often join friends for fishing trips off the Atlantic coast, balancing structured workouts with spontaneous outdoor play.
  arts: Vianney Soto regularly dances salsa at community nights, immerses themselves in the rhythms of Bad Bunny, Daddy Yankee, and Marc Anthony, and they attend local cultural festivals where performances
    by the classic orchestra of Celia Cruz echo their love for lively, heritage‑rich music.
  travel: Vianney Soto prefers a mix of planned beach escapes and spur‑of‑the‑moment road trips, having driven to the Florida Keys and chartered a boat to the Bahamas, while dreaming of a cultural immersion
    tour of Barcelona and a culinary retreat in Oaxaca, and they balance budget‑friendly spontaneity with occasional longer‑haul vacations.
  culinary: Vianney Soto enjoys cooking at home with a semi‑professional flair, mastering arroz con gandules, lechón slow‑roasted with a citrus‑garlic mojo, and a weekly paella featuring saffron, mussels,
    and chorizo, while they hunt down the perfect ripe plantains and fresh cilantro for flavor‑rich meals.
  core: Vianney Soto balances an unwavering love for routine with a spontaneous streak, often scheduling weekly gym sessions but occasionally swapping them for last‑minute fishing trips, and despite a diligent
    budgeting habit, they still splurge on gourmet seafood and impromptu road trips that keep life lively.
background:
  cultural: Vianney grew up in a Puerto Rican household where Spanish was spoken daily and family gatherings centered around food, music, and Catholic celebrations like Three Kings Day. He carries the island’s
    emphasis on community, hospitality, and pride in heritage into his everyday life, often sharing Puerto Rican recipes with friends and participating in local Latino events in West Palm Beach. The multicultural
    vibe of South Florida adds an extra layer of influence, exposing him to diverse culinary scenes, beach culture, and a blend of Caribbean and mainland American traditions, which he embraces while staying
    rooted in his Puerto Rican identity.
