  career_goals: Vianney aims to move from his current managerial role to a regional manager position within the next three to five years, overseeing multiple locations and shaping operational standards
    across the chain. He plans to complete a bachelor's degree in Business Administration to strengthen his strategic planning skills. Long‑term, he dreams of launching his own boutique hotel or restaurant
    that blends Puerto Rican culinary traditions with the vibrant lifestyle of South Florida, allowing him to apply both his practical management experience and his creative, spontaneous side.
