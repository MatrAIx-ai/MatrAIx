  career_goals: While still a toddler, Haley often talks about the future in imaginative play. She likes to pretend to be a teacher, guiding stuffed animals through storytime, and she enjoys drawing big,
    colorful pictures, hinting at a budding artistic ambition. Her caregivers nurture her desire to help others, and she frequently expresses a wish to "make people happy" and "be a nice friend." As she
    grows, these impulses suggest potential aspirations toward roles such as a preschool teacher, a community artist, or a caregiver who supports and uplifts others.
