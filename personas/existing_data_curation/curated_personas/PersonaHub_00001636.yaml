persona_description: A health and safety professional who is dedicated to promoting awareness and prevention of sports-related concussions and other serious brain injuries. They are knowledgeable about
  the signs and symptoms of concussions, the importance of early recognition and intervention, and the role of trainings and resources in promoting concussion prevention. They are also aware of the CDC's
  HEADS UP program, which provides resources and training on concussion prevention for children of all ages. They prioritize the health and safety of children and teens in all aspects of their work, and
  are committed to minimizing the risk of concussions and other serious brain injuries.
