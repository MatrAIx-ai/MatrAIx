personas:
  professional: Dantoni Thornton, a seasoned construction manager with three decades of hands‑on building expertise, leverages meticulous blueprint reading, cost estimation, and Procore scheduling while
    letting curiosity drive the integration of sustainable materials, all managed with a relaxed, collaborative crew‑lead style.
  sports: Dantoni Thornton enjoys pick‑up basketball at the local community center, seasonal fishing trips on Lake Murray, follows the Carolina Panthers and the Columbia Fireflies, and plays in the city’s
    senior recreational basketball league to stay active and social.
  arts: Dantoni Thornton is an avid fan of gospel legends like Mahalia Jackson and contemporary voices such as Kirk Franklin, as well as jazz icons John Coltrane and Miles Davis, regularly attending live
    concerts that blend spiritual uplift and improvisational flair.
  travel: Dantoni Thornton prefers low‑key road trips across the Southeast, having explored Savannah, Charleston, and Nashville, while dreaming of a Caribbean cruise to St. Lucia and a cultural pilgrimage
    to New Orleans to savor its music and cuisine.
  culinary: Dantoni Thornton relishes cooking Southern staples like smoked pork ribs, shrimp and grits, collard greens, and sweet‑potato casserole, seasoning with smoked paprika and pimento cheese, and
    often experiments with a smart‑home oven to perfect weekend barbecues.
  core: Dantoni Thornton is a sociable, hands‑on builder who balances curiosity for green construction with a relaxed schedule, often juggling multiple woodworking projects and a growing list of unfinished
    tasks.
background:
  cultural: Dantoni grew up in one of Columbia’s historic African‑American neighborhoods, where church life and family ties shaped his worldview. Raised in a Baptist household, the rituals of worship, gospel
    music, and communal potlucks instilled values of cooperation, generosity, and resilience. As a Black man in the South, he has navigated both the richness of cultural traditions—soul food, storytelling,
    and a strong sense of community—and the challenges of systemic inequities. These experiences fostered a deep pride in his heritage and a commitment to giving back, evident in his involvement with local
    mentorship programs, church outreach, and efforts to improve affordable housing for the African‑American community.
