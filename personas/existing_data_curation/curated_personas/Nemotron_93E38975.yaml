  hobbies: '[''Basketball'', ''Fishing'', ''Woodworking'', ''Classic Car Restoration'', ''Gospel Music'', ''Barbecue Cooking'', ''Smart Home Tech Exploration'', ''Community Volunteering'', ''Gardening'',
    ''Attending Local Festivals'']'
  career_goals: Looking ahead, Dantoni aims to step into a senior project director role overseeing large‑scale commercial developments across the Midlands, while earning a LEED Accredited Professional certification
    to deepen his expertise in green construction. He envisions launching his own consulting firm that helps small contractors adopt sustainable practices and improve safety cultures. Mentoring the next
    generation of African American tradespeople remains a core ambition, as does serving on the city’s planning commission to advocate for affordable housing projects that benefit his community. At the
    same time, he seeks to sharpen his organizational habits, turning his natural flexibility into a strategic advantage for more efficient project delivery.
