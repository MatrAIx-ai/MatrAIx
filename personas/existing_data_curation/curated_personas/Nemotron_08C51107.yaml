personas:
  professional: Juan Alberto, a 28‑year‑old heavy‑vehicle and mobile‑equipment service technician, blends rigorous diagnostic expertise in diesel, hydraulic, and electrical systems with an artist’s eye
    for custom paintwork, delivering innovative retrofitting solutions that marry sustainability with aesthetic flair while juggling workshop schedules through meticulous yet flexible planning, and pursues
    ASE Master Technician certification and green‑tech credentials to launch a boutique shop.
  sports: Juan Alberto fuels fitness through weekend rides with the Toa Alta Mountain Bike Club, early‑morning hikes along the Sierra de Cayey trails, occasional soccer matches with a local San Juan FC
    amateur squad, and avidly follows the Cangrejeros de Santurce during the BSN season, maintaining a disciplined yet adaptable workout routine that balances adrenaline‑pumping activities with recovery.
  arts: Juan Alberto channels creative energy into street photography of San Juan’s vibrant murals, watercolor paintings of coastal architecture, regular visits to galleries showcasing works by Rafael Ferrer,
    immersion in live performances by Calle 13 and Bad Bunny, and attendance at literature readings featuring authors such as Mayra Santos‑Febres, all of which shape a rich, art‑infused worldview.
  travel: Juan Alberto prefers meticulously planned weekend escapes to nearby islands like Vieques and Culebra, interspersed with dream trips to Barcelona’s modernist streets and Tokyo’s bike culture, balancing
    a craving for adventure with a modest travel budget and the need for downtime after demanding workshop days.
  culinary: Juan Alberto, an intermediate‑level home chef, delights in reimagining classic dishes such as mofongo relleno de camarones, arroz con gandules seasoned with sofrito, and pastelón, often incorporating
    smoked paprika, annatto, and fresh cilantro, while also savoring street‑food stalls that serve alcapurrias and empanadillas.
  core: Juan Alberto is a technically savvy, art‑obsessed mechanic who balances meticulous retrofitting projects with spontaneous motorcycle paint jobs, battles chronic back pain and anxiety through creative
    outlets, and constantly worries about the next deadline while dreaming of a greener, aesthetically striking future.
background:
  cultural: Juan Antonio grew up in the twin municipalities of Toa Baja and Toa Alta, where the rhythms of Bomba, Plena and reggaetón blend with the quiet of residential neighborhoods. He is rooted in a
    close‑knit Puerto Rican family that values communal gatherings, hearty meals, and shared celebrations such as the San Sebastián Festival. Bilingual in Spanish and English, he navigates both local and
    mainland U.S. work environments with ease. The island’s rich artistic scene—its murals, music, and literary traditions—has shaped his appreciation for creativity and has informed his unconventional
    approach to vehicle customization. His cultural upbringing also instills a strong work ethic, respect for safety, and a sense of responsibility to give back to the community, which is reflected in his
    mentorship activities and his desire to promote sustainable practices on the island.
attributes:
  skills: '[''diesel engine repair'', ''hydraulic system diagnostics'', ''pneumatic system maintenance'', ''preventive maintenance planning'', ''welding and metal fabrication'', ''electrical troubleshooting
    for mobile equipment'', ''diagnostic software usage (ALLDATA, Tech‑Assist)'', ''bilingual communication (Spanish/English)'', ''technical documentation and reporting'', ''team collaboration and conflict
    resolution'', ''creative vehicle customization'', ''sustainable retrofitting (electric conversion)'', ''OSHA safety compliance'']'
  hobbies: '[''photography (urban and nature)'', ''painting and sketching'', ''visiting art galleries and street murals'', ''reading Puerto Rican literature'', ''cooking traditional Puerto Rican dishes'',
    ''hiking and biking on coastal trails'', ''volunteering as a youth mechanics mentor'', ''customizing personal motorcycle'', ''listening to diverse music (reggaeton, salsa, indie)'', ''exploring sustainable
    living projects'']'
  career_goals: Juan Antonio aspires to become a recognized specialist in sustainable retrofitting of heavy equipment, converting diesel‑powered machines to hybrid or fully electric solutions while preserving
    their functional aesthetics. He plans to earn ASE Master Technician certification and additional credentials in green technology, then launch his own boutique service shop in Toa Baja that offers both
    routine maintenance and artistic customizations. Long‑term, he aims to mentor younger technicians, develop training modules that blend technical rigor with creative thinking, and influence industry
    standards for safety and environmental responsibility—all while maintaining a balanced lifestyle that protects his mental well‑being.
