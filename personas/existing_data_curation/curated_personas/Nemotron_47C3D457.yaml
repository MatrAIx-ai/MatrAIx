  hobbies: '["Watercolor painting", "Art museum and gallery visits", "Reading (art history, non‑fiction)", "Reflective journaling", "Birdwatching", "Gardening", "Cooking (Southern-inspired recipes)", "Traveling
    to cultural sites", "Small book club participation", "Volunteering at the public library"]'
  career_goals: Looking ahead, Judith aims to lead high‑impact research initiatives that shape brand strategy, with a particular focus on integrating artistic visual storytelling into data‑driven campaigns.
    She seeks to mentor emerging analysts, sharing both technical expertise and her interdisciplinary perspective. Judith also plans to teach part‑time courses in market research and consumer behavior at
    a local community college, bridging her education background with industry practice. Additionally, she hopes to consult for small businesses in the Monroe area, helping them harness market insights
    to grow sustainably. Continuing professional development in advanced analytics and attending interdisciplinary conferences are also on her agenda.
