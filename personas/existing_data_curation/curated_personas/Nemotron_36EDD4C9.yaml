  career_goals: As a seasoned financial manager in Collinsville, Mina is positioning herself for senior-level executive responsibility. Her primary ambition is to become a Chief Financial Officer within
    the next five to seven years at a mid-size manufacturing or logistics firm that anchors the Etowah County economy. To support this trajectory, she plans to earn a CFA designation and pursue an executive
    MBA, deepening her expertise in investment strategy and corporate governance. Mina also aims to spearhead digital transformation projects that embed predictive analytics and sustainability metrics into
    the finance function. Outside of corporate advancement, she is committed to mentoring emerging female finance professionals and contributing her expertise to local economic-development nonprofits.
