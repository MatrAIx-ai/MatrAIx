personas:
  professional: Chavier Pina is a 28‑year‑old aspiring journeyman electrician who merges hands‑on expertise in electromechanical assembly, advanced soldering, and basic PLC programming with a love for LED
    art installations, while mentoring new hires and dreaming of opening a boutique electronics repair and custom lighting studio that serves local artists and community spaces.
  sports: Chavier Pina is a lively pick‑up basketball enthusiast who dominates Woodhaven courts after work, roots for the New York Knicks and Brooklyn Nets, follows the New York Rangers during hockey season,
    and adds weekend salsa dance sessions to stay agile and socially engaged.
  arts: Chavier Pina is an urban photographer who roams Queens' street‑art corridors capturing vibrant murals by artists like Kofi Breed, curates beat‑making sessions inspired by Bad Bunny and A Tribe Called Quest,
    and regularly attends live shows at the Bowery Ballroom featuring indie acts such as Mitski, all while weaving these creative experiences into community festivals.
  travel: Chavier Pina enjoys spontaneous weekend trips that blend cultural immersion and relaxation, planning a last‑minute ferry ride to Old San Juan in Puerto Rico, a road trek to the Catskills for hiking
    and a family‑style cook‑out, and frequenting Williamsburg's street‑food festivals, all while keeping costs low through Airbnb stays and ride‑sharing with friends.
  culinary: Chavier Pina loves cooking soulful Caribbean‑Latin dishes such as mangú with sautéed onions, tostones, and mojo‑marinated chicken, pairing them with cilantro‑lime rice, while also experimenting
    with fusion dishes like plantain‑crusted pork belly tacos, and often hosts communal meals where salsa, bachata, and R&B fill the background.
  core: Chavier Pina is a curious, community‑focused tinkerer who balances a relaxed approach to obligations with a relentless drive to merge technology and art in everyday life.
background:
  cultural: Chavier is an Afro‑Latinx New Yorker, the son of parents who immigrated from the Dominican Republic. Growing up in Woodhaven’s multicultural neighborhood, he was immersed in a blend of African‑American
    and Caribbean‑Latin traditions. He celebrates Juneteenth, Dominican Heritage Month, and Caribbean Carnival, and his household resonated with hip‑hop, R&B, salsa, and bachata. Bilingual in English and
    Spanish, he values community solidarity, gospel church gatherings, and the artistic vibrancy of his borough, which influences both his creative pursuits and his collaborative, harmony‑focused outlook.
attributes:
  skills: '[''Electromechanical assembly'', ''Electronic circuit testing'', ''Schematic and wiring diagram reading'', ''Soldering (through‑hole and SMD)'', ''PLC programming basics'', ''Troubleshooting
    and fault diagnosis'', ''Use of multimeters and oscilloscopes'', ''Quality inspection and documentation'', ''NEC and OSHA safety compliance'', ''Team mentoring and training'', ''Custom LED installations'',
    ''Basic 3‑D modeling (Fusion 360)'']'
  hobbies: '[''Street‑art exploring'', ''Pick‑up basketball'', ''Urban photography'', ''Custom PC building'', ''LED art installations'', ''Music production (beat making)'', ''Cooking Caribbean and Latin
    cuisine'', ''Live music and hip‑hop events'', ''Community volunteer work (after‑school robotics)'', ''Visiting local food markets'', ''Attending art exhibitions and festivals'']'
  career_goals: Chavier aims to earn a Journeyman Electrician license and obtain certifications such as Certified Electronics Technician (CET) and PLC Specialist within the next three years. He plans to
    enroll in an associate degree program in Electrical Technology at a community college to deepen his technical knowledge. Long‑term, he aspires to open a boutique electronics repair and custom lighting
    studio that blends his technical expertise with his love for art, providing services for local artists, community spaces, and small businesses. He also hopes to develop a mentorship program for youth
    in Woodhaven, teaching robotics and basic electronics to inspire the next generation.
