personas:
  professional: Wiley Ahmed is a veteran editorial mastermind whose two‑decade track record in copyediting, structural editing, and fact‑checking now fuels a strategic push toward senior leadership at a
    regional publication, where they blend a meticulous eye for narrative flow with a passion for inclusive storytelling and multimedia integration.
  sports: Wiley Ahmed is a devoted fan of the Tennessee Titans and the Memphis Grizzlies, plays pickup basketball at the Shelby County Community Center every Thursday, joins the local cycling club for Sunday
    rides along the Natchez Trace, and they participate in indoor rock‑climbing sessions during winter months to stay active and socially engaged.
  arts: Wiley Ahmed immerses themselves in the arts by curating monthly literary salons that showcase poets like Natasha Trethewey and musicians such as Gillian Welch, volunteering as a board member for
    the Shelby County Community Theater, and they document gallery openings with a Canon EOS R5, often discussing the work of contemporary painter Kara Walker over a glass of pinot noir.
  travel: Wiley Ahmed prefers thoughtfully planned cultural trips, having recently explored the historic districts of Charleston and the vibrant art studios of Santa Fe, while dreaming of a future itinerary
    that includes a literary pilgrimage to Dublin’s James Joyce Center and a culinary tour of Oaxaca’s mole markets, and they always book boutique B&Bs to stay close to local arts scenes.
  culinary: Wiley Ahmed delights in cooking Southern‑inspired dishes such as shrimp and grits seasoned with smoked paprika and collard greens flavored with applewood‑smoked salt, while their modest garden
    yields heirloom tomatoes and fresh basil they fold into homemade gnocchi, and they often pair these meals with a chilled Muscadet or a bold Malbec.
  core: Wiley Ahmed is a talkative, art‑obsessed editor who turns every editorial meeting into a mini‑gallery walk, can’t resist a good glass of pinot, and they occasionally forget to stretch after a day
    of gardening.
background:
  cultural: Raised in the heart of the American South, Wiley grew up amidst Southern hospitality, small‑town community values, and a reverence for local history. His bachelor’s degree in the humanities
    broadened his perspective, fostering an appreciation for European art, contemporary media, and unconventional ideas. This blend of Southern roots and expansive cultural curiosity informs his worldview,
    enabling him to bridge traditional community sensibilities with progressive editorial practices.
attributes:
  skills: '[''Copyediting'', ''Structural Editing'', ''Fact‑Checking'', ''Content Strategy'', ''Project Management'', ''Digital Publishing'', ''Adobe InDesign'', ''WordPress CMS'', ''Art Critique'', ''Research'',
    ''Team Leadership'', ''Public Speaking'']'
  hobbies: '[''Visiting art museums and galleries'', ''Supporting community theater'', ''Hosting literary salons'', ''Reading historical fiction and poetry'', ''Playing acoustic guitar'', ''Landscape photography'',
    ''Gardening'', ''Cooking Southern cuisine'', ''Traveling to cultural destinations'', ''Volunteering at the public library'']'
  career_goals: Wiley aims to advance into a senior editorial leadership role where he can shape the editorial voice of a regional or national publication, champion inclusive storytelling, and spearhead
    the integration of multimedia formats. He also aspires to launch a community‑focused arts initiative in Shelby County that connects local creators with broader audiences, mentor emerging writers and
    editors, and eventually author a collection of essays reflecting on Southern art and literary culture.
