  career_goals: Aims to advance to a regional director of operations role within the next five years, leading a broader portfolio of business units and championing sustainable, technology‑enabled processes.
    Long‑term ambition is to launch a boutique consultancy that helps small and medium‑sized enterprises in the Southeast improve efficiency while preserving cultural authenticity. Also seeks to mentor
    emerging Vietnamese‑American professionals and increase representation in senior leadership.
