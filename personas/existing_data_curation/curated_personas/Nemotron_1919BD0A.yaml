personas:
  professional: Winnie Chan is a tech‑savvy public librarian who leverages a STEM background to master MARC21 and Dublin Core metadata, runs data‑driven maker‑space workshops, and uses their natural curiosity
    and sociable charm to translate complex digital resources into community‑friendly programs, even while navigating a loosely organized schedule.
  sports: Winnie Chan fuels their weekend energy with hikes on Stone Mountain and paddle‑boarding on Lake Lanier, participates in the Atlanta Hiking Collective, cheers on the Atlanta Hawks, Braves, United
    FC and Falcons, and joins a casual intramural soccer league in summer while swapping post‑game smoothies with teammates.
  arts: Winnie Chan channels creative energy into a community dance troupe that fuses contemporary movement with folk rhythms, captures the dynamic life of Lawrenceville through street photography, and
    draws inspiration from performers such as Lin‑Manuel Miranda, dancer Akram Khan, musician H.E.R., and indie filmmaker Greta Gerwig, often weaving references to their work into their popular YouTube
    tech‑tips videos.
  travel: Winnie Chan favors spontaneous weekend road‑trips that blend hiking, cultural immersion and culinary discovery, such as an impromptu drive to the Blue Ridge Mountains followed by a budget‑friendly
    backpacking adventure in Kyoto, while also dreaming of a future long‑haul culinary tour of Southeast Asia, all balanced against a modest student‑loan budget that prioritizes affordable experiences over
    luxury stays.
  culinary: Winnie Chan enjoys experimenting with Asian‑fusion cuisine, proudly serving kimchi‑taco rolls, miso‑glazed salmon with mango salsa, ramen‑burrito bowls seasoned with gochujang, and Thai‑inspired
    basil chicken fried rice, showcasing a confident yet home‑grown cooking style that often turns friends’ dinner nights into lively tasting sessions.
  core: Winnie Chan is a socially driven, tech‑savvy 25‑year‑old who balances disorganized spontaneity with relentless curiosity, turning library stacks into maker‑space adventures, board‑game nights into
    community rituals, and hikes into opportunities for both physical challenge and culinary experimentation.
background:
  cultural: Winnie is a second‑generation East Asian American, with parents who immigrated from Taiwan. Growing up in a bilingual household, she speaks both English and Mandarin, which has given her a deep
    appreciation for both her family's cultural traditions—such as celebrating Lunar New Year and Mid‑Autumn Festival—and the Southern hospitality of Georgia. Her family emphasized the value of education
    and community service, shaping her commitment to public knowledge. While she enjoys traditional Chinese cuisine, she also embraces the diverse culinary scene of Gwinnett County, often blending flavors
    in her own cooking. This bicultural perspective informs her inclusive approach to library programming, ensuring that services reflect both her heritage and the multicultural community she serves.
attributes:
  skills: '[''Cataloging and Metadata Management'', ''Integrated Library Systems (SirsiDynix, Koha)'', ''Digital Resource Instruction'', ''Technical Troubleshooting'', ''Data Analysis and Visualization'',
    ''Programming (Python basics)'', ''Community Programming and Event Coordination'', ''Public Speaking and Instructional Design'', ''User Service and Patron Assistance'', ''Research Support'']'
  hobbies: '[''Board-game nights'', ''Hiking'', ''Asian-fusion cooking'', ''Dance (contemporary/traditional)'', ''Volunteer event logistics'', ''Tech‑tips video creation'', ''Photography'', ''Book clubs'',
    ''Community outreach'']'
  career_goals: Winnie aims to earn a Master of Library and Information Science within the next three years, positioning herself for a senior librarian role specializing in digital collections and technology
    services. She envisions spearheading a community maker‑space at the Gwinnett County Library that blends STEM learning with creative making. She is also interested in developing data‑driven outreach
    programs that introduce underserved youth to research skills and coding basics. Long‑term, she hopes to become a subject specialist in scientific information, curating and expanding the library's research
    support for local colleges and schools, while mentoring new library staff in technical competencies.
