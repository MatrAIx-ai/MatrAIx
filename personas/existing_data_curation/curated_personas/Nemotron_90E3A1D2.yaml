  career_goals: Marta aims to transition from her current role as a senior accountant to a consultancy position focusing on financial advisory for local small businesses, especially those owned by fellow
    Salvadoran immigrants. She plans to complete her Certified Public Accountant (CPA) credential within the next two years to solidify her expertise. Additionally, she aspires to develop a mentorship program
    within her firm to support younger, diverse talent. Over the long term, she envisions establishing a boutique bookkeeping and tax service that combines professional rigor with culturally sensitive client
    support, allowing her to remain engaged in the field while gradually reducing her workload as she approaches retirement. She also hopes to contribute her experience to community workshops on financial
    literacy.
