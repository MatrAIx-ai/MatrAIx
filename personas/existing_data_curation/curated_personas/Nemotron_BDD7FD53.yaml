  hobbies: '[''Vegetable gardening'', ''Preparing traditional Honduran dishes'', ''Woodworking'', ''Birdwatching'', ''Walking Hill Country trails'', ''Reading historical biographies'', ''Attending weekly
    church services and choir participation'', ''Volunteering at senior center (computer lessons)'', ''Listening to classic salsa and marimba music'']'
  career_goals: Although retired, Pablo aims to channel his engineering experience into community service. He plans to mentor high‑school students, especially from Hispanic backgrounds, in STEM through
    local after‑school programs; to develop a sustainable garden at the senior center; and to author a memoir that chronicles his journey from Honduras to Texas, preserving his family’s history. He also
    wishes to stay physically active, continue learning about horticulture and local wildlife, and maintain his involvement in his church and neighborhood volunteer initiatives.
