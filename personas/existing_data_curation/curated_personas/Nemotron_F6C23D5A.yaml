  hobbies: '[''drawing manga and comic strips'', ''playing soccer with friends'', ''listening to regional Mexican music and pop'', ''watching animated movies and series'', ''DIY crafts and paper art'',
    ''exploring sandbox video games (Minecraft)'', ''attending community festivals'', ''participating in school theater'', ''reading graphic novels'', ''learning traditional Mexican dances'']'
  career_goals: Wilfredo dreams of turning his love for art into a career, envisioning himself as a professional illustrator or comic book creator who can share stories that blend Mexican and American cultures.
    He is also curious about animation and video game design, hoping to one day work on projects that let him bring his characters to life. In the long term, he hopes to open a community art space where
    local kids can explore creativity together, using his bilingual background to foster cultural exchange.
