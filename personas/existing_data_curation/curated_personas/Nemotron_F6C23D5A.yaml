personas:
  professional: Wilfredo is an aspiring manga illustrator who spends after‑school hours sketching dynamic characters for a fan‑made comic book, experimenting with new art techniques out of sheer curiosity,
    while their relaxed attitude toward deadlines sometimes results in rushed pages and missed submission dates.
  sports: Wilfredo is a member of the River City Rovers Under‑12 soccer team, practicing drills after school and cheering passionately for Liverpool FC during televised matches, while their energetic nature
    drives them to organize friendly pick‑up games, yet they sometimes feel intense nervousness before a big match, which can affect performance.
  arts: Wilfredo is a devoted manga enthusiast who sketches daily, gushes over Studio Ghibli’s Spirited Away, collects graphic novels by Jeff Lemire and Kyousuke Motomi, curates DIY paper lanterns for family
    celebrations, and compiles a playlist that blends Los Tigres del Norte with Olivia Rodrigo, channeling their curiosity and sociable spirit into collaborative art projects while occasionally staying
    up late, leading to tired eyes the next day.
  travel: Wilfredo plans spontaneous trips with their family, having visited the historic streets of San Miguel de Allende for a cultural festival, camped in Redwood State Park, and dreaming of exploring
    Tokyo’s Akihabara district, preferring adventure over relaxation but often feeling anxious about long journeys, which makes them rely heavily on their parents’ schedules and a well‑packed snack bag.
  culinary: Wilfredo enjoys devouring tacos al pastor and steaming bowls of ramen after marathon Minecraft sessions, can confidently whip up quick cheese quesadillas with fresh salsa for family gatherings,
    and loves experimenting with bright fruit toppings on homemade ice‑cream sundaes, yet their penchant for late‑night snacking sometimes leads to a messy kitchen and a lingering sweet tooth.
  core: Wilfredo is a 12‑year‑old imagination engine whose love for manga, soccer, and video‑game worlds fuels boundless creativity, while intense bursts of anxiety and a carefree approach to responsibilities
    shape a lively yet sometimes chaotic daily rhythm.
background:
  cultural: Wilfredo is a Mexican-American growing up in Laredo, Texas, a city on the U.S.-Mexico border. His family celebrates traditions such as Día de los Muertos, Cinco de Mayo, and weekly family gatherings
    featuring Mexican cuisine like tacos and tamales. Bilingual at home, he navigates both English and Spanish cultures, attending a local Catholic church and participating in community events that blend
    Texan and Mexican influences. This bicultural environment shapes his worldview and fuels his artistic expression, inspiring him to incorporate vibrant colors and cultural motifs into his creations.
attributes:
  skills: '[''sketching and drawing'', ''basic digital illustration (Procreate)'', ''bilingual communication (English and Spanish)'', ''basic guitar playing'', ''creative writing (short stories)'', ''improvisational
