  hobbies: '["Lego building", "Chess", "Jigsaw puzzles", "Reading adventure books", "Nature hiking", "Rock collecting", "Minecraft (Creative mode)", "Nature documentaries", "Robotics club"]'
  career_goals: Timothy is fascinated by how things are built and functions, and he dreams of one day designing and constructing reliable structures. He aspires to become a civil engineer or architect who
    creates sturdy, sustainable homes and bridges for his community. He also has a budding interest in technology and robotics, imagining a future where he merges engineering with programming to develop
    helpful machines. His competitive nature pushes him to aim for excellence in these fields.
