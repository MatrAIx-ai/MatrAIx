  hobbies: '[''Gardening'', ''Reading (medical journals, historical fiction, contemporary novels)'', ''Hiking'', ''Book club participation'', ''Crocheting and knitting'', ''Cooking (including Indian cuisine)'',
    ''Volunteering at community health events'']'
  career_goals: Betsy aims to transition into a nursing leadership role within the next three years, seeking a position as a charge nurse or nurse manager where she can shape policy, mentor staff, and drive
    evidence-based practice improvements. She also plans to pursue a Master of Science in Nursing with a focus on healthcare administration, while maintaining a balanced schedule that allows quality time
    with her family. Long-term, she envisions contributing to community health initiatives in Warren County, perhaps establishing a local wellness outreach program.
