personas:
  professional: Rosana Vazquezdejesus, a budding choreographer and TikTok content creator, leverages her competitive drive and love for structure to craft precise dance routines while keeping a laid‑back,
    spontaneous vibe that resonates with her teenage followers.
  sports: Rosana Vazquezdejesus plays forward for the Eastside United Soccer Club, channels her competitive edge into relentless goal‑hunting, roots for the Seattle Sounders FC and the U.S. Women’s National
    Team, and squeezes in late‑night drills whenever schoolwork allows.
  arts: Rosana Vazquezdejesus blends salsa and reggaetón dance with graffiti‑style sketching, TikTok humor, and bilingual poetry inspired by Bad Bunny, Rupi Kaur, and Banksy, using each medium to process
    emotions and showcase her vibrant cultural humor.
  travel: Rosana Vazquezdejesus prefers spontaneous weekend trips to nearby beaches like Coney Island and family road‑trips to the historic district of Cartagena, while dreaming of a spring semester exchange
    in Barcelona to soak up street art and urban rhythms.
  culinary: Rosana Vazquezdejesus loves cooking arroz con gandules with her family’s secret sofrito, experiments with mango‑salsa tacos, and occasionally attempts to perfect pastelitos, showcasing her moderate
    cooking skills and a palate for bold, aromatic ingredients.
  core: Rosana Vazquezdejesus is a competitive, socially vibrant teen who balances structured dance choreography with spontaneous TikTok humor, saves money haphazardly, wrestles with anxiety, and fuels
    her creative fire with soccer, graffiti, and family‑style cooking.
background:
  cultural: Rosana is a proud second‑generation Puerto Rican growing up in Lawrence, Massachusetts, a city with a vibrant Latino community. She speaks Spanish at home with her grandparents and English at
    school, giving her a bicultural lens on everyday life. Family gatherings often feature traditional dishes, music from the festivals in San Juan, and stories of life on the island, which shape her sense
    of identity and community responsibility. She participates in local cultural events such as the annual Puerto Rican Festival on the Lawrence River, where she helps set up dance performances and food
    stalls. This blend of American and Puerto Rican influences informs her values of close family ties, mutual support, and a strong desire to represent her heritage positively in the wider community.
