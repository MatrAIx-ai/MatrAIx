  hobbies: '[''Salsa & reggaetón dancing'', ''Playing soccer with friends'', ''Listening to Latin music'', ''Creating short TikTok videos'', ''Drawing graffiti‑style art'', ''Cooking traditional Puerto
    Rican dishes'', ''Writing poetry/journaling in Spanish and English'', ''Practicing Spanish slang and phrase usage'']'
  career_goals: Rosana aims to finish high school with strong grades in English and Social Studies, then pursue a college degree in Communications or Social Work. She hopes to leverage her bilingual abilities
    and social‑media talent to become a community content creator who highlights Puerto Rican culture and youth issues in the Lawrence area. Long‑term, she dreams of working as a bilingual outreach coordinator
    for a local nonprofit, designing programs that empower other teens, while also maintaining a personal brand as a dancer and influencer. Her competitive nature drives her to set measurable milestones—such
    as reaching a certain follower count on TikTok or leading her soccer team to a regional championship—so she can track progress and stay motivated despite occasional stress or worry.
