  hobbies: '[''Visiting art galleries and craft fairs'', ''Sketching and mixed‑media collage'', ''Reading about design and technology trends'', ''Attending community theater'', ''Bird‑watching and hiking'',
    ''Playing strategy board games'']'
  career_goals: Donna aims to leverage her retail experience into a supervisory role that allows more flexibility and room for creative input, such as a department manager or visual merchandiser. She is
    considering completing her associate degree in business administration to strengthen her managerial credentials. Long‑term, she hopes to transition into a position that blends her love of art with commerce—perhaps
    working for a local gallery, boutique, or community art space—where she can curate exhibits and engage customers while maintaining a balanced schedule that supports her family life.
