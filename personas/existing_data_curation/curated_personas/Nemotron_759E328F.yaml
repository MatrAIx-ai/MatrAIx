personas:
  professional: Alejandro Valencia, a seasoned electrician with 25 years of hands‑on experience, fuses code‑strict precision and a competitive drive with a laid‑back, improvisational style, turning complex
    wiring and smart‑home projects into artistic lighting installations while casually mentoring apprentices amid a somewhat disorganized schedule.
  sports: Alejandro Valencia stays active by sunrise bike rides with the Orlando Cycling Club, cheers on the Orlando Magic during the basketball season and the Tampa Bay Rays in summer, and spends quiet
    weekends fishing on the Halifax River with a local charter crew, balancing low‑key outdoor pursuits with occasional casual soccer matches at the community park.
  arts: Alejandro Valencia immerses themselves in Central Florida's vibrant art scene, attending mural tours featuring works by local street artist Andrew Biert, browsing openings at the Orlando Museum
    of Art, and channeling salsa rhythms from legends like Celia Cruz and contemporary guitarist Gilberto Santa Rosa into occasional jam sessions on their guitar.
  travel: Alejandro Valencia prefers spontaneous weekend getaways, camping in the Ocala National Forest or fishing in the Florida Keys, while dreaming of a cultural pilgrimage to Barcelona's Gaudí architecture
    and a fly‑fishing expedition in Patagonia, balancing limited family obligations with a modest travel budget.
  culinary: Alejandro Valencia enjoys cooking fresh‑caught grouper ceviche with lime, cilantro, and jalapeño, savors a classic Cuban sandwich with pickles and mustard, and often experiments with custom‑crafted
    lighting‑inspired plating while occasionally treating themselves to a plate of conch fritters and a cold craft brewery IPA.
  core: Alejandro Valencia blends a curious, art‑obsessed mind with a competitive electrician's precision, yet their relaxed, sometimes disorganized lifestyle and love for sunrise bike rides keep them grounded
    and ever‑ready for the next creative spark.
background:
  cultural: Alejandro is a first‑generation Puerto Rican American, raised in a bilingual household where Spanish and English were spoken interchangeably. He grew up with the rhythms of bomba, plena, and
    salsa, and the flavors of mofongo, arroz con gandules, and lechón, which remain staples at family celebrations. His Catholic upbringing informs his participation in holiday traditions like Nochebuena
    and the Three Kings Day parade held by the local Puerto Rican community in Volusia County. He actively participates in cultural events such as the annual Puerto Rican Day Festival in nearby Orlando,
    often volunteering to set up lighting for community stages. This heritage instills in him a strong sense of family, community solidarity, and pride in sharing his island roots while embracing the multicultural
    fabric of Central Florida.
attributes:
  skills: '["Residential wiring and repairs", "Commercial electrical installations", "Blueprint reading and code compliance", "Smart‑home automation (lighting, security, HVAC)", "Solar photovoltaic system
    installation", "Electrical troubleshooting and diagnostics", "Conduit bending and wiring layout", "Team leadership and apprentice training", "Use of advanced power tools and testing equipment", "Artistic
    lighting design and implementation"]'
  hobbies: '["Visiting art galleries and murals", "Playing guitar (salsa and plena)", "Dancing salsa", "DIY home improvement projects", "Custom lighting design as a hobby", "Fishing on the Halifax River",
    "Camping and nature hikes", "Reading science‑fiction novels", "Staying updated on emerging electrical technologies", "Family gatherings and cultural festivals"]'
  career_goals: Alejandro aims to become a Master Electrician and eventually launch his own boutique electrical contracting firm that specializes in high‑end residential projects, integrating custom artistic
    lighting and renewable energy solutions. He is working toward obtaining the Florida Certified Solar Installer credential and plans to mentor the next generation of electricians through a local trade
    school partnership. In the next five years, he hopes to be recognized by the Florida Electrical Contractors Association for excellence in safety and innovation, and to expand his business to include
    a small team of skilled technicians.
