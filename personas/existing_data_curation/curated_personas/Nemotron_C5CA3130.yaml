  career_goals: Although retired from formal employment, Kara aims to channel her expertise into structured community service. She plans to launch a mentorship program for aspiring entrepreneurs in Harris
    County, providing quarterly workshops and one‑on‑one coaching sessions. She also aspires to serve as a volunteer finance advisor for the local senior center, helping fellow retirees manage their finances
    with clarity and predictability. On a personal level, Kara seeks to stay intellectually active by completing a certificate in nonprofit management, reinforcing her commitment to organized, impact‑driven
    initiatives.
