    household products'']'
  career_goals: Azia aims to transition from a hands‑on maid to a supervisory role within a reputable cleaning service, eventually earning a certification in green cleaning and property management. She
    hopes to use her practical knowledge and leadership skills to oversee a team of cleaners, implement sustainable cleaning policies, and improve service efficiency. Long‑term, she envisions launching
    her own boutique housekeeping business that emphasizes environmentally safe practices, offers flexible scheduling for clients, and provides on‑the‑job training for women seeking stable, well‑paid work.
    Continued education—such as completing a business management course—forms part of her plan to secure financial independence and professional growth.
