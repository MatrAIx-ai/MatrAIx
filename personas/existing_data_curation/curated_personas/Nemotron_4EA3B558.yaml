  career_goals: Allen envisions a future where he can combine his love for exploring how things work with a desire to make a positive impact on his community. He is particularly interested in pursuing a
    career in environmental engineering or robotics, fields that blend scientific curiosity, practical problem‑solving, and teamwork. He aims to study advanced science and technology in high school, earn
    a degree in engineering, and eventually contribute to projects that improve local ecosystems, develop sustainable infrastructure, or create innovative tools that help people. His calm, resilient nature
    and emphasis on harmony guide his ambition to work collaboratively and responsibly toward long‑term solutions.
