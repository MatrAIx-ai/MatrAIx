personas:
  professional: Allen Libby, a 12‑year‑old budding engineer, merges his love for LEGO construction and simple robotics kits with a practical, curiosity‑driven approach, applying trial‑and‑error methods
    in the school science club while frequently sidestepping strict deadlines.
  sports: Allen Libby, an avid outdoor explorer, spends weekends playing forward for the Cedar Creek Cubs youth soccer team, cheers for the Seattle Seahawks, the Seattle Sounders FC, and the Seattle Mariners,
    and delights in hiking the nearby Green Lake trails where he practices bird‑watching as a calming cross‑training routine.
  arts: Allen Libby, a creative spark, composes simple melodies on the piano to unwind, explores the epic scores of Hans Zimmer, draws inspiration from the vibrant brushwork of Vincent van Gogh, and streams
    the synth‑rock sounds of Imagine Dragons and Tame Impala while sketching sci‑fi scenes for his Minecraft builds.
  travel: Allen Libby, who prefers spontaneous weekend getaways over rigid itineraries, loves camping trips to Olympic National Park and day‑excursions to the Seattle Center’s Interactive History Museum,
    while dreaming of visiting the robotics exhibit at the Tokyo National Museum and the Grand Canyon’s rim to collect rock samples.
  culinary: Allen Libby, a budding home chef, enjoys assembling cheesy pepperoni pizza, mixing avocado toast with lemon zest, and whipping up fruit smoothies with banana, spinach, and almond milk, though
    he often forgets to pre‑heat the oven and relies on YouTube tutorials for guidance.
  core: Allen Libby, a calm, curiosity‑driven 12‑year‑old, blends relentless tinkering with spontaneous creativity, juggling scattered LEGO bricks, impromptu coding sessions, and gentle piano melodies while
    occasionally misplacing homework deadlines.
background:
  cultural: Allen comes from a White, middle‑class family in the suburban town of Hatboro, Pennsylvania, part of Bucks County. His upbringing reflects a typical American suburban environment that values
    education, community involvement, and outdoor recreation. He has been exposed to local cultural traditions such as county fairs, historical sites from the colonial era, and community sports leagues,
    as well as the broader American media landscape including movies, music, and sports. His family encourages curiosity, practical learning, and cooperative behavior, fostering a sense of responsibility
    toward his neighbors and the natural surroundings of the region. While his cultural identity is rooted in mainstream American values, he also appreciates the diversity of his school community and the
    environmental stewardship common in Bucks County.
