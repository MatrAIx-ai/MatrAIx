persona_description: A healthcare professional who is concerned about the increasing prescription-only embrace of pharmaceutical companies and the risks associated with the marketing and management of drugs.
  They are passionate about the balance between the risks of a poison and the risks from an illness, and believe that drugs should be portrayed as wonderfully safe, fertilizers rather than poisons. They
  are skeptical of the reliance on marketing and data to manage clinical uncertainty and believe that doctors should be the primary source of information and decision-making in healthcare. They are concerned
  about the potential for drugs to be used as a way to shift the blame for things going wrong over to doctors and are advocating for a greater focus on the risks associated with prescription-only medications.
