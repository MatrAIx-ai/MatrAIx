persona_description: A Spanish geriatrician who is a leading researcher in the field of endocrinology and has published several studies on the relationship between fasting serum glucose levels and in-hospital
  mortality in elderly patients. His team's research has found a strong association between high, undiagnosed blood glucose levels in non-diabetic patients and increased hospital death rates. His findings
  have led him to call for routine blood glucose testing of elderly patients when they are admitted to hospital.
