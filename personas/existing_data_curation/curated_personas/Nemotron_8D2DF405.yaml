  hobbies: '[''Reading classic literature'', ''Writing poetry'', ''Kayaking/paddle-boarding on Tampa Bay'', ''Birdwatching'', ''Gardening (native Florida plants)'', ''Nature photography'', ''Participating
    in small craft workshops (pottery, weaving)'', ''Volunteering at the local historical society'', ''Leading digital-literacy sessions for seniors'', ''Cooking Southern-inspired meals'', ''Visiting local
    museums and cultural sites'']'
  career_goals: Lynn aims to lead interdisciplinary research at the nexus of digital humanities and responsible AI, developing tools that make cultural heritage data accessible to scholars and the public.
    She aspires to secure a senior research position or professorship that allows her to mentor graduate students and shape curriculum that integrates technical and humanistic perspectives. Over the next
    five years she plans to obtain a major grant for a community-driven digital archive of Florida's coastal history, publish a landmark monograph on ethical AI in cultural heritage, and contribute to professional
    standards for data governance. Ultimately, she hopes to establish an institute that fosters collaboration between technologists, historians, and local communities, promoting sustainable and socially-responsible
    research practices.
