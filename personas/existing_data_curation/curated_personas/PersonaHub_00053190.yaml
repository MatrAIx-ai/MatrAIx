persona_description: A scientist or researcher who is interested in the study of materials, particularly those that are complex and have unique properties. They are likely to be familiar with the use of
  synchrotron X-ray scattering techniques to investigate the structure and dynamics of large molecular assemblies. They may also have a background in materials science, polymer science, or biophysics. They
  are interested in the use of synchrotron X-rays to study materials under extreme environments and to investigate the relationship between microscopic structure and macroscopic properties. They may also
  have an interest in the application of scattering techniques to the study of supramolecular organization in biological systems and to the study of the structure and function of muscle filaments.
