personas:
  professional: Todd Chan, a 20‑year‑old shift manager at a local retail outlet, blends practical leadership with a budding data‑analysis mindset, using Excel to track inventory while they sprinkle Canva‑crafted
    graphics into store promotions, and they channel their curiosity and community‑first values into a clear path toward a Business Administration degree and future regional management roles.
  sports: Todd Chan stays fit by playing guard in a community basketball league and cheering on the regional high‑school football Saturdays, proudly rooting for the Dallas Cowboys and the Houston Rockets,
    while they also escape to the Sam Houston National Forest for weekend hikes, balancing team camaraderie with solo trail runs.
  arts: Todd Chan fuels their creative side by sketching urban landscapes in a pocket sketchbook at Huntsville’s monthly art walk, jamming acoustic guitar with friends to covers of The War on Drugs and
    Sufjan Stevens, and they curate Instagram stories that showcase emerging Texan painters such as Maya Ramirez and street‑art influences from Banksy, reflecting a deep appreciation for both local tradition
    and contemporary culture.
  travel: Todd Chan prefers weekend road trips that blend music‑city excitement with culinary discovery, often planning spontaneous drives to Austin’s South by Southwest festival or the vibrant jazz clubs
    of New Orleans, while they dream of a future art‑focused getaway to New York’s MoMA and an affordable backpacking adventure through Mexico City’s murals, balancing limited student funds with a love
    for cultural immersion.
  culinary: Todd Chan delights in the eclectic flavors of food‑truck cuisine, regularly ordering spicy tacos al pastor, smoked Texas brisket sliders, and aromatic ramen bowls, and they occasionally try
    their hand at home‑cooking by whipping up a quick pepper‑jack grilled cheese or a simple cilantro‑lime rice, all while they keep a list of favorite ingredients—chipotle, cilantro, and smoked paprika—hand‑written
    in their sketch journal.
  core: Todd Chan is a socially energetic, art‑obsessed aspiring business leader who balances meticulous budgeting and anxiety‑driven worry with spontaneous food‑truck binges, midnight sketching sessions,
    and a habit of checking their phone for basketball scores during meditation breaks, and they often find themselves drifting between spreadsheets and guitar strings.
background:
  cultural: Todd was raised in a middle‑class, white family in Huntsville, Texas. His upbringing reflects the Southern hospitality and community values typical of small‑town Texas, such as helping neighbors,
    attending church events, and enjoying regional traditions like Saturday barbecues and high‑school football games. While rooted in this Texan culture, he actively seeks diverse artistic experiences,
    exploring contemporary art and independent music beyond his hometown. His cultural perspective blends a practical, down‑to‑earth mindset of the Texas Hill Country with an openness to broader American
    and global artistic influences.
attributes:
  skills: '["Team leadership", "Customer service", "Inventory management", "Scheduling", "Conflict resolution", "Basic data analysis (Excel)", "Graphic design (Canva)", "Social media marketing", "Problem
