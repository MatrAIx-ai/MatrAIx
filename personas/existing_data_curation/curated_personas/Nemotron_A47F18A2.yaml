  hobbies: '["Visiting art galleries", "Sketching", "Playing acoustic guitar", "Community basketball", "Hiking in Sam Houston National Forest", "Food‑truck culinary exploration", "Reading contemporary fiction",
    "Smartphone photography", "Mindfulness meditation", "Sketch journaling"]'
  career_goals: Todd plans to enroll in a Business Administration bachelor's program within the next year, aiming to graduate in three years. He intends to advance from his current manager role to a full
    store manager position for a regional retail chain, eventually pursuing a regional management role overseeing multiple locations. Parallel to his corporate ambitions, he hopes to combine his love of
    art and entrepreneurship by opening a community art café or launching an online marketplace for local artists. To support these goals, he seeks leadership certifications and digital‑marketing courses.
