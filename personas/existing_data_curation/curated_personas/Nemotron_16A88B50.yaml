    apps'']'
  career_goals: Christian dreams of becoming an astronaut who can explore distant planets, a comic‑book artist who brings his imaginative worlds to life, or a scientist who discovers new wonders in nature.
    He also imagines himself as a teacher one day, sharing exciting ideas and stories with other children. His ambitions are shaped by his love for novelty, art, and abstract concepts, and by his desire
    to help and inspire others.
