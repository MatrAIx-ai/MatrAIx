personas:
  professional: Christian Salaverria, a budding young artist and imaginative explorer, blends meticulous planning with vivid imagination to craft detailed LEGO space stations and colorful landscape paintings,
    demonstrating early talent for visual storytelling and disciplined creativity.
  sports: Christian Salaverria loves joining the neighborhood mini‑soccer league, proudly wearing a jersey with the number 7 for the KidSprints Tigers, enjoys sliding down the community pool's water slide
    in summer, and spends weekends practicing cartwheels at the local gymnastics club, balancing energetic play with a habit of lining up cones for organized obstacle courses.
  arts: Christian Salaverria fills sketchbooks with swirling landscapes reminiscent of Georgia O'Keeffe, paints heroic superhero scenes inspired by the bold graphics of Jim Lee, and grooves to lively Broadway
    tunes from "The Lion King" while dancing to traditional folk melodies played on maracas, weaving a tapestry of artistic influences into daily play.
  travel: Christian Salaverria prefers family road trips that blend discovery and comfort, eagerly exploring the towering red rocks of Sedona, the dinosaur fossils at a regional natural history museum,
    and dreaming of a future visit to the International Space Center in Houston, while always insisting on packing a sketchbook for spontaneous drawing sessions during pit stops.
  culinary: Christian Salaverria loves munching on crunchy carrot sticks with hummus, savors strawberry‑banana smoothies, and proudly helps the family kitchen by assembling a simple cheese flatbread using
    soft flatbread, shredded cheese, and a splash of mild salsa, though they often spill milk on the floor in the process.
  core: Christian Salaverria is a six‑year‑old dreamer who meticulously builds LEGO galaxies while worrying about the next school art critique, and whose habit of humming folk tunes in the grocery aisle
    can both charm and distract nearby shoppers.
background:
  cultural: Christian comes from a Mexican heritage and grows up in a bilingual household where Spanish is spoken alongside English. Family traditions such as celebrating Día de los Muertos, Cinco de Mayo,
    and sharing dishes like tacos and tamales are integral parts of his daily life. He enjoys listening to Mexican folk music and dancing with relatives during gatherings. Living in Lakewood, Washington,
    he is also immersed in the Pacific Northwest's natural environment, often exploring nearby woods and parks. The multicultural community of Pierce County enriches his social experiences, fostering an
    appreciation for both his Mexican roots and his local American culture.
