personas:
  professional: Maggie Edwards, a meticulous dental hygienist with 15 years of hands‑on experience, uses their love of routine and competitive edge, and they consistently deliver flawless prophylaxis, precise
    periodontal assessments, and patient education while targeting a promotion to lead hygienist and eventual office manager.
  sports: Maggie Edwards hikes the Brown County trails each summer, cross‑country skis with the Green Bay Nordic Club in winter, and they follow the Green Bay Packers, Milwaukee Brewers, and Wisconsin Badgers
    while they occasionally join a local adult softball league for camaraderie.
  arts: Maggie Edwards enjoys quilting patterns inspired by Martha Stewart, reads historical fiction by Philippa Gregory, sings gospel classics by Amy Grant in their church choir, and they attend community
    theatre starring Tony Shalhoub, all while their playlists feature folk legends like Joan Baez.
  travel: Maggie Edwards prefers well‑planned road trips that revisit Wisconsin gems such as Door County and Mackinac Island, yet dreams of exploring the historic castles of Scotland and the cherry blossoms
    of Kyoto, and they balance family duties with occasional solo retreats.
  culinary: Maggie Edwards loves preparing Wisconsin comfort foods—cheese‑curd casserole, bratwurst with sauerkraut, butter tarts—and they incorporate garden‑fresh tomatoes, kale, and herbs into hearty
    family meals, while they also master chicken‑and‑dumpling soup for winter gatherings.
  core: Maggie Edwards is a calm, routine‑driven dental hygienist whose competitive nature fuels meticulous patient care, and they blend spare time with gardening, quilting, and community service into a
    practical, no‑drama lifestyle.
background:
  cultural: Maggie grew up in a small, predominantly white Midwestern town in Wisconsin, where her family traces its roots to German and Polish immigrants who settled the region in the early 1900s. The
    community emphasizes hard work, self‑reliance, and close family ties, values that have shaped her practical outlook and dedication to routine. Local traditions such as county fairs, church potlucks,
    and seasonal festivals are integral to her social life. Her upbringing in this culturally cohesive, modest environment underpins her strong sense of responsibility, her preference for stability, and
    her commitment to serving her neighbors through both her profession and volunteer activities.
attributes:
  skills: '[''Dental Prophylaxis'', ''Periodontal Assessment'', ''Intraoral Radiography'', ''Patient Education'', ''Infection Control'', ''Dental Charting'', ''Appointment Scheduling'', ''Team Communication'',
    ''Emergency First Aid'', ''Clinical Documentation'', ''Basic Business Operations'']'
  hobbies: '[''Garden vegetable beds'', ''Quilting'', ''Historical fiction reading'', ''Family cooking'', ''Local hiking'', ''DIY home projects'', ''Church choir'', ''Volunteer health fairs'']'
  career_goals: Maggie aims to progress from senior hygienist to lead hygienist and eventually office manager at her dental practice. She plans to earn the Certified Dental Hygienist (CDH) credential and
    pursue a specialization in periodontics to deepen her clinical expertise. Long‑term, she hopes to mentor new hygienists through a part‑time instructor role at a community college and to develop a modest
    community‑outreach program that promotes preventive oral health in local schools and churches. Her ambitions are grounded in practicality and a desire to improve the standards of care within her Midwestern
    community.
