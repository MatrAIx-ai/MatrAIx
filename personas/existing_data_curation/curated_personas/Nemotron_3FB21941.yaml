personas:
  professional: Donald Conn, a budding technologist and theater enthusiast, merges their tinkering with robotics kits and coding simple games with backstage experience in the school drama club, designing
    interactive stage props that spark curiosity while staying practical.
  sports: Donald Conn, an energetic point‑guard for the Southside Hoops youth league, drills under the bright lights of the community center, roots for the Los Angeles Lakers on game nights, and spends
    weekends hiking the Barren River Lake trails to build stamina and clear their mind.
  arts: Donald Conn, a charismatic drama club member and budding guitarist, regularly stars in school productions of *Grease* while riffing to songs by Taylor Swift and Lin‑Manuel Miranda, and they find
    creative inspiration in the graphic novel *Maus*.
  travel: Donald Conn, a curious explorer, enjoys summer road trips to historic Washington, D.C., dreams of backpacking through Rome’s ancient ruins, and frequently organizes weekend hikes to the nearby
    Barren River Lake, balancing family budget limits with a love for immersive learning.
  culinary: Donald Conn, a self‑proclaimed snack connoisseur, favors pepperoni pizza, chicken nuggets with honey‑mustard, and arroz con pollo, occasionally attempts simple guitar‑inspired plating at home,
    yet they habitually grab a sugary soda from the vending machine before school.
  core: Donald Conn, a chatty teenage tech‑theater hybrid, blends curiosity and compassion, channeling boundless energy into robotics, basketball, and stage spotlight, while they battle occasional procrastination
    and a persistent sweet‑tooth habit.
background:
  cultural: Donald grew up in the small‑city environment of Bowling Green, Kentucky, within a predominantly white, middle‑class community shaped by Southern traditions. His family participates in local
    church activities, and community events such as the Warren County Fair and regional high school football games are regular parts of his life. He has been exposed to regional customs like Sunday family
    meals, country and bluegrass music, and a strong emphasis on hospitality and neighborly support. While rooted in these traditions, his curiosity drives him to explore broader perspectives through school
    projects and online resources.
