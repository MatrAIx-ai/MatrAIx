  career_goals: Donald aims to complete high school with strong academic performance and earn a scholarship for a degree in social work or community health. He envisions a future as a youth counselor or
    community outreach coordinator in his hometown, using his compassion and practical problem‑solving skills to support peers. He is also interested in becoming a high school sports coach or drama teacher,
    roles that combine his love for teamwork, public speaking, and helping others, ultimately contributing to a supportive and harmonious community in Warren County.
