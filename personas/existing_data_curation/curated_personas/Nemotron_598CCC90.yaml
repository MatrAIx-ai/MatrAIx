personas:
  professional: Rocio Bermejo, an aspiring public speaker and debate champion, channels their competitive drive and meticulous planning into winning arguments and coordinating the school’s cultural showcases,
    often taking charge as the central voice and event planner, and they thrive on the structure of preparation and the buzz of the audience.
  sports: Rocio Bermejo stays fit through salsa and traditional folk dance, regularly trains with the DC Youth Salsa Society and pays close attention to cardio drills, while cheering for the Washington
    Capitals in winter, the Washington Wizards during the NBA season, and the DC United when soccer rolls in the spring, and they treat every rehearsal as a competitive workout.
  arts: Rocio Bermejo fuels their artistic side by devouring YA novels from Sarah J. Maas and John Green, flipping through graphic memoirs like Raina Telgemeier’s Smile, listening to salsa legends such
    as Celia Cruz while rehearsing dance routines, and they occasionally sketch choreography notes in a battered sketchbook.
  travel: Rocio Bermejo plans trips with meticulous checklists, prefers a mix of cultural immersion and sightseeing, has already explored the National Mall, taken a weekend road‑trip to Philadelphia, and
    a family vacation to Mexico City, and they dream of wandering the ancient ruins of Cusco, Peru and the vibrant streets of Barcelona, Spain, while saving pocket money from birthday gifts for those adventures.
  culinary: Rocio Bermejo balances a solid home‑cooking skill set with teenage curiosity, expertly preparing family staples like tamales wrapped in corn masa and pepian simmered with roasted chilies and
    cocoa, loves spicing up tacos al pastor with fresh pineapple, and they often experiment by adding a splash of lime to traditional pupusas, all while listening to salsa playlists in the kitchen.
  core: Rocio Bermejo is a competitively driven social dynamo who thrives on structured debates and salsa beats, though they often sacrifice sleep for late‑night Rocket League sessions and occasionally
    let their meticulous planning slip when the spotlight calls.
background:
  cultural: Rocío is a first‑generation Guatemalan‑American raised in Woodbridge, Virginia. Her parents immigrated from Guatemala, and the household is bilingual, with Spanish spoken at home and English
    used at school and in the community. She grew up celebrating Guatemalan holidays such as Día de la Independencia and Semana Santa, and she regularly attends community gatherings hosted by local Latinx
    organizations. This bicultural upbringing blends the close‑family values and culinary traditions of Guatemala with the diverse, opportunity‑focused environment of suburban Virginia, shaping her identity
    and giving her a strong sense of cultural pride.
attributes:
  skills: '["Bilingual communication (Spanish/English)", "Public speaking and debate", "Event planning and coordination", "Organizational and time-management skills", "Digital content creation (Canva, iMovie)",
    "Competitive problem-solving (math contests)", "Peer mediation and active listening", "Basic Guatemalan cooking (tamales, pepian)"]'
  hobbies: '["Salsa and folkloric dance", "Cooking traditional Guatemalan recipes", "Debate and public speaking club", "Competitive video gaming (Rocket League)", "Reading YA fiction and graphic novels",
    "Volunteering at local cultural events"]'
  career_goals: Rocío aims to turn her communication strengths and organizational talent into a career in media and public advocacy. She plans to pursue a college degree in communications, journalism, or
    political science with the goal of becoming a multimedia journalist or public‑relations strategist focused on under‑represented Latino voices. Long‑term, she hopes to launch her own digital platform
    that blends storytelling, cultural education, and community activism, empowering other young Guatemalan‑American youth to share their experiences and pursue higher education. To prepare, she seeks scholarships,
    internships at local news outlets, and leadership positions in her school's student government, building a portfolio of interview pieces, video reports, and event‑management projects.
