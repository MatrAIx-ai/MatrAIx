  career_goals: Sydney plans to complete her associate degree in Business Administration within the next year and secure an internship in project coordination or office administration. In the medium term,
    she aims to become a project coordinator or office manager at a nonprofit organization where she can apply her structured approach to support community programs. Her long‑term ambition is to advance
    to a senior program manager role, overseeing multiple initiatives focused on youth development and community outreach. To achieve this, she intends to pursue a bachelor's degree in Management or Nonprofit
    Administration and obtain a certified associate in project management (CAPM) certification. Sydney seeks a career that offers stability, clear processes, and the opportunity to make a tangible positive
    impact.
