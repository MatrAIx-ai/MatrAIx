  hobbies: '[''Painting'', ''Visiting art galleries'', ''Reading contemporary fiction and poetry'', ''Cooking Mexican cuisine with modern twists'', ''Yoga'', ''Gardening'', ''Attending intimate acoustic
    music sessions'', ''Traveling to culturally rich destinations'', ''Volunteering to teach Spanish'', ''Listening to traditional Mexican folk music'']'
  career_goals: Ivette aims to advance to a senior compliance leadership position, such as Compliance Manager or Director, within the next five years. She aspires to build and mentor a high‑performing compliance
    team that leverages technology—particularly AI‑driven monitoring tools—to streamline risk identification. Ivette also hopes to develop a comprehensive compliance training program that integrates cultural
    awareness, helping employees understand both regulatory obligations and the diverse backgrounds of the workforce. Long‑term, she envisions contributing to industry best‑practice standards and serving
    as a strategic advisor on corporate governance and ethical business conduct.
