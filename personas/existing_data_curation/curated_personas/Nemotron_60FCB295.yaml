  hobbies: '[''Salsa dancing'', ''Folkloric Mexican dance'', ''Cooking traditional Mexican dishes'', ''Community volunteering at a local center'', ''Attending cultural festivals'', ''Yoga'', ''Rooftop gardening'',
    ''Reading mystery novels'', ''Exploring Los Angeles food scene'']'
  career_goals: Fatima aims to transition from a front‑desk role to a supervisory or office‑manager position where she can oversee a small team and shape administrative processes. She is interested in earning
    a certification in office administration or project coordination to reinforce her practical skill set. While she values flexibility and a less rigid schedule, she also seeks a role that offers clearer
    structure to help manage her tendency toward disorganization and reduce workplace stress. Long‑term, she envisions using her business degree to launch a modest family‑run venture—perhaps a boutique
    catering service that blends Mexican flavors with her love for community events.
