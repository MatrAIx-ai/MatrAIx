personas:
  professional: Fatima Salama is a veteran front‑desk coordinator who leverages her bilingual fluency, meticulous data‑entry skills, and natural knack for calming anxious visitors to streamline office flow,
    while her curiosity drives her to adopt new technologies even as her relaxed attitude toward strict schedules sometimes leads to occasional organizational lapses.
  sports: Fatima Salama stays active through nightly salsa and folkloric dance classes, weekly gentle rooftop yoga, and cheering on the LAFC and Los Angeles Lakers, while they also join a community softball
    league each spring for a mix of competition and camaraderie.
  arts: Fatima Salama finds artistic inspiration in the vibrant murals of local street artists, the soulful sounds of Celia Cruz and Selena, the mystery‑filled pages of Agatha Christie and Tana French,
    and the eclectic indie‑film screenings at the Downtown Film Center, which together color her leisure time.
  travel: Fatima Salama prefers spontaneous weekend getaways over rigid itineraries, often traveling to San Diego for beach picnics, hopping on a short flight to Oaxaca to explore traditional markets, and
    dreaming of a future cultural immersion trip to Barcelona to study Catalan dance rhythms with local instructors.
  culinary: Fatima Salama delights in preparing homemade tacos al pastor, mole poblano, and fresh guacamole, skillfully blending dried chiles, corn masa, and cilantro in her modest kitchen, while they also
    love sampling street‑taco trucks and indie‑cuisine pop‑ups across Los Angeles.
  core: Fatima Salama is a socially vibrant front‑desk professional who balances a love for dance, community cooking, and relentless curiosity with a tendency toward disorganization and stress‑induced worry.
background:
  cultural: Fatima was born and raised in Los Angeles to Mexican parents who preserved strong ties to their heritage. She grew up bilingual, celebrating Día de los Muertos, quinceañeras, and family gatherings
    centered around Mexican cuisine. The multicultural vibrancy of Southern California, combined with occasional family stories of Lebanese ancestry—a common thread in many Mexican families—has given her
    a rich, layered identity. This blend influences her cooking, which sometimes fuses Mexican spices with Middle Eastern techniques, and her social circles, which include both Mexican‑American and broader
    Latino communities. Her cultural background informs her warm hospitality, community involvement, and pride in sharing traditions with others.
attributes:
