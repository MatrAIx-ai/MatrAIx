personas:
  professional: Christina Bolles, an 11‑year‑old aspiring interactive storyteller, blends a methodical approach with boundless imagination to craft Scratch games featuring fantastical creatures, while meticulously
    documenting each project in a planner and competing fiercely in school coding challenges.
  sports: Christina Bolles follows the New York Yankees and the New York Knicks on television, enjoys solo kayaking sessions at the Staten Island shoreline, and participates in a community swimming club
    on weekends, but prefers quiet, solitary workouts like yoga in their room over team sports.
  arts: Christina Bolles fills sketchbooks with dragons, phoenixes, and biomechanical beasts inspired by artists such as Hayao Miyazaki, H.R. Giger, and Lisa Frank, collects vintage postcards for their
    color palettes, and spends evenings listening to the soundtracks of "The Lord of the Rings" and "Studio Ghibli" to fuel their creative process.
  travel: Christina Bolles loves weekend explorations of the historic Sandy Hook Lighthouse, has collected shells from the Staten Island beaches, dreams of visiting the Jurassic Coast in England to see
    real fossils, and prefers meticulously planned itineraries over spontaneous trips.
  culinary: Christina Bolles enjoys crafting homemade granola bars with honey, almonds, and dried cranberries, experiments with rock candy recipes that echo their love of geology, and savors classic comfort
    foods like pepperoni pizza while occasionally refusing vegetables they deem unappealing.
  core: Christina Bolles is a solitary, detail‑oriented 11‑year‑old who channels imagination into art, code, and careful savings, while navigating persistent worries and a competitive streak.
background:
  cultural: Christina is raised in a white, middle‑class family on Staten Island, New York. Her family places a strong emphasis on education and self‑directed learning, often visiting the Staten Island
    Museum, the New York Public Library, and local art galleries. These experiences expose her to a broad spectrum of art and science while reinforcing a sense of individualism. Growing up near the waterfront
    gives her a connection to nature and a habit of collecting natural curiosities, complementing the culturally diverse environment of New York City.
attributes:
  skills: '[''drawing'', ''creative writing'', ''basic programming (Scratch)'', ''critical thinking'', ''research and fact-checking'', ''organizing school projects'', ''puzzle solving'']'
  hobbies: '[''drawing and sketching'', ''reading speculative fiction'', ''building LEGO or model kits'', ''playing strategy board games like Settlers of Catan'', ''coding simple games in Scratch'', ''keeping
    a reflective journal'', ''collecting rocks, shells, and vintage postcards'']'
  career_goals: Christina aspires to become a concept artist or graphic novelist who builds immersive, fantastical worlds, and she also dreams of pursuing scientific research that lets her explore novel
    ideas independently. She hopes to win youth competitions in art or science, use her imagination to blend science and fantasy in illustrated books, and eventually work as an independent creator where
    she can control her environment and schedule.
