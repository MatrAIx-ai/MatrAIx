personas:
  professional: Wesley Negron, an 85‑year‑old veteran community outreach coordinator, blends decades of event‑planning expertise with their curious, organized yet flexible nature to lead Día de los Muertos
    celebrations, mentor junior volunteers, and keep cultural programs at the senior center running smoothly.
  sports: Wesley Negron stays active by joining the Elmira Seniors Walking Club for daily morning strolls, enjoys low‑impact shuffleboard leagues at the senior center, and remains a loyal fan of the Buffalo
    Bills and New York Yankees, attending occasional games when health permits, and they proudly wear team colors during community events.
  arts: Wesley Negron channels his creative spirit through watercolor landscapes infused with the bold hues of Frida Kahlo, guitar sessions echoing Andrés Segovia’s classical folk melodies, lively Latin‑style
    dance classes, and regular visits to the Elmira Community Theatre to watch productions starring local talent alongside works by Lin‑Manuel Miranda, and they often share the stories behind each piece
    with younger volunteers.
  travel: Wesley Negron prefers purposeful travel that blends family reunions in Mexico’s coastal towns with cultural tours of historic sites like Oaxaca and Guanajuato, while also indulging in occasional
    road trips to the Grand Canyon and city visits to New York; they meticulously plan each itinerary using email and video calls yet sometimes postpone trips due to health flare‑ups.
  culinary: Wesley Negron delights in preparing traditional dishes such as pozole, mole verde, and hand‑rolled tamales, expertly seasoning them with freshly harvested cilantro, chilies, and corn masa from
    his herb garden, while they enjoy sharing meals at community potlucks but sometimes forget to refrigerate leftovers, resulting in occasional food‑safety mishaps.
  core: Wesley Negron, an 85‑year‑old cultural dynamo, balances relentless curiosity and community spirit with a habit of losing their glasses on the garden bench and a sweet tooth for churros that often
    derails their modest diet.
background:
  cultural: Wesley’s Mexican heritage shapes his worldview and daily life. Born in Mexico and raised in a bilingual household, he carries forward family traditions such as celebrating Día de los Muertos,
    preparing mole and tamales, and listening to Ranchera music. His Catholic upbringing informs his participation in community festivals and church events. Living in Solano County for many decades, he
    blends Mexican customs with Californian influences, acting as a cultural bridge for newer immigrant families and preserving Mexican folk art practices like papel picado and storytelling within his local
    community.
attributes:
  skills: '[''Spanish‑English bilingualism'', ''Cultural mediation'', ''Community outreach'', ''Event planning'', ''Traditional Mexican cooking'', ''Storytelling'', ''Basic woodworking'', ''Gardening'',
    ''Digital photography'', ''Computer literacy (email, video calls)'', ''Mentoring and volunteer coordination'']'
  hobbies: '[''Watercolor painting'', ''Attending art exhibitions'', ''Playing guitar'', ''Group dance classes'', ''Cooking traditional Mexican cuisine'', ''Herb gardening'', ''Reading historical novels'',
    ''Volunteering at senior center cultural programs'', ''Traveling to Mexico'', ''Participating in community lectures and workshops'']'
  career_goals: Although retired, Wesley aims to preserve his family’s oral histories by compiling a memoir and recording stories for future generations. He aspires to mentor younger community members in
    cultural arts, ensure the continuity of Mexican traditions in Elmira, and possibly establish a small scholarship for local youth interested in cultural studies. He also seeks to stay active by learning
    more advanced digital photography and participating in community leadership roles at the senior center.
