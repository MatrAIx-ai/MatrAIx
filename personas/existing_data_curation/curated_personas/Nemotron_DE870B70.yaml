  career_goals: Jelani aims to transition into a senior advisory role where he can shape technology strategy for community‑focused initiatives, especially those that empower underrepresented groups in the
    tech sector. He aspires to become a recognized thought leader in accessible software design, author technical articles that blend creativity with practicality, and mentor the next generation of developers
    through workshops at local schools and historically Black community centers. He also hopes to lead a pilot program that leverages AI to improve public services in Harris County, merging his technical
    expertise with his desire for societal impact.
