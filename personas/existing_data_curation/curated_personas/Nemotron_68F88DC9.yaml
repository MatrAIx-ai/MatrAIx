personas:
  professional: Elizabeth Falcher is an emerging graphic designer and community event organizer who blends self‑taught mastery of Adobe Photoshop, Illustrator, and Canva with a meticulous, research‑driven
    approach to budgeting and logistics, enabling them to craft striking brand identities for Delta small businesses while orchestrating flexible, art‑focused workshops, and their critical, competitive
    nature pushes them to constantly refine their portfolio and outpace peers in local art contests.
  sports: Elizabeth Falcher stays active by joining the Mississippi River Trail Club for weekend hikes along the river, cheering on the Memphis Grizzlies during the NBA season, occasionally playing pickup
    basketball with the West Memphis community league, and testing their competitive streak in local 5K runs, though they prefer solitary river walks over rigid gym schedules.
  arts: Elizabeth Falcher immerses herself in contemporary art by painting acrylics inspired by the bold patterns of Yayoi Kusama, dissecting the narrative depth of Kehinde Wiley's portraits, exploring
    the luminous installations of James Turrell through community workshops, and regularly performing folk covers of Bob Dylan at open‑mic nights, all of which fuel her creative identity.
  travel: Elizabeth Falcher prefers low‑key, budget‑friendly road trips plotted on spreadsheets, has trekked the historic Natchez Trace Parkway, soaked in the vibrant murals of New Orleans' French Quarter,
    enjoyed a solo weekend in Asheville's craft‑brew scene, and dreams of an artist retreat in Santa Fe to merge travel with creative renewal.
  culinary: Elizabeth Falcher enjoys cooking Southern comfort food with a modern twist, often preparing shrimp and grits with chipotle‑infused butter, fried chicken glazed with hot honey, collard greens
    sautéed with smoked paprika, and peach cobbler topped with vanilla bean ice cream, while experimenting with heirloom tomatoes and fresh basil in her occasional blog recipes.
  core: Elizabeth Falcher is a fiercely curious 29‑year‑old who channels her competitive edge into vibrant mixed‑media art, meticulous budgeting, and a relentless drive to launch a community art space,
    even as they binge‑watch art documentaries at 2 am and habitually forget to water houseplants.
background:
  cultural: Elizabeth’s cultural background is rooted in the African-American experience of the Arkansas Delta. Raised in West Memphis, she grew up attending a historically Black church where gospel music,
    communal storytelling, and strong family ties shaped her worldview. The region’s legacy of blues and soul, combined with Southern culinary traditions, influences her artistic sensibilities and cooking
    interests. She is aware of the civil-rights history of the area and the resilience of Black communities that have faced economic and social challenges. This heritage gives her a deep appreciation for
    community solidarity while also fueling her desire to create spaces where under-represented voices, especially young Black artists, can be celebrated.
attributes:
  skills: '[''digital illustration'', ''graphic design'', ''social media content creation'', ''event planning'', ''budgeting and financial management'', ''research and critical analysis'', ''basic office
    software (Word, Excel)'', ''caregiving and household management'']'
  hobbies: '[''acrylic painting'', ''mixed-media art experiments'', ''visiting local galleries'', ''watching art documentaries'', ''reading contemporary art books'', ''cooking Southern cuisine with a modern
    twist'', ''maintaining a food blog'', ''walking along the Mississippi River'', ''hiking local trails'', ''attending open-mic nights'', ''playing strategy board games'', ''solving puzzles'']'
  career_goals: Elizabeth aspires to turn her creative talents into a sustainable career. She plans to earn a certificate in graphic design or digital media through a community college or online program
    within the next two years, and to build a freelance portfolio that includes branding, illustration, and promotional materials for small businesses in the Arkansas Delta. She hopes to launch an online
    store for her original artwork and handcrafted prints, entering regional art competitions to gain recognition. In the longer term, Elizabeth envisions opening a community art space in West Memphis that
    offers workshops for youth, blending her organizational skills with her passion for artistic expression. Financial stability and the ability to support her family remain central motivations.
