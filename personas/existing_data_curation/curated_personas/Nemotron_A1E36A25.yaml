  hobbies: '[''gardening'', ''cooking Mexican cuisine'', ''reading mystery novels'', ''reading popular science'', ''yoga'', ''crossword puzzles'', ''small-group book club'', ''volunteering at food bank'',
    ''supporting school science fairs'']'
  career_goals: Carmen aims to re-enter the professional arena on a part-time or contract basis, focusing on STEM outreach and education within her community. She plans to earn a certification in data analytics
    within the next year and leverage her analytical skills to support local non-profits that run after-school science programs. Ultimately, she hopes to mentor middle-school girls from Mexican-American
    families, encouraging them to pursue STEM careers while maintaining a balanced schedule that respects her family responsibilities.
