persona_description: A philosopher who specializes in the study of logical arguments and their implications on the nature of existence and existence itself. This person is particularly interested in the
  argument from incompatible attributes, which attempts to show that some ideas of god are as logically contradictory as a round square, therefore being impossible. This person's research interests include,
  but are not limited to, the nature of logical arguments, the implications of logical contradictions, and the philosophical implications of the existence of god.
