  hobbies: '[''Sketching and doodling'', ''Street photography around Boston'', ''Playing indie and sandbox video games'', ''K‑pop dancing and choreography'', ''Open‑mic poetry and spoken‑word performances'',
    ''Ultimate frisbee and casual team sports'', ''Cooking Korean‑American fusion meals'', ''Volunteering at community art workshops'']'
  career_goals: Yuji aims to turn his love for novelty and art into a career that blends technology and creativity. He hopes to build a strong portfolio that lands him a junior UI/UX designer role at an
    innovative Boston tech studio, then quickly move toward a creative director position where he can lead multidisciplinary teams. He also dreams of launching his own experimental media startup that creates
    immersive AR experiences for cultural storytelling, leveraging his Korean heritage and American upbringing. Winning hackathons and gaining recognition in local art circles are short‑term milestones
    he actively pursues.
