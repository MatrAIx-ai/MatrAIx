personas:
  professional: Yuji Kim is an aspiring junior UI/UX designer who channels a vivid visual imagination into rapid app prototypes, thriving on spontaneous brainstorming sessions and collaborative hackathons
    while they often wrestle with the discipline needed to meet tight project deadlines.
  sports: Yuji Kim is an enthusiastic ultimate frisbee player who competes with the Boston Ultimate club, cheers for the New England Patriots on Sundays, hits the gym for occasional weight training, and
    eagerly joins weekend hikes in the White Mountains, though they sometimes skip warm‑ups, leading to occasional ankle sprains during spirited games.
  arts: Yuji Kim is a versatile visual artist who sketches digital illustrations inspired by hyper‑color street art and indie video game aesthetics, captures candid city moments with their Nikon camera,
    dances to the kinetic beats of BTS and Blackpink at local pop‑culture events, and regularly performs spoken‑word pieces at open‑mic nights, even as they procrastinate on finishing personal art projects.
  travel: Yuji Kim is a curious traveler who frequently explores Boston’s historic neighborhoods, takes weekend road trips to the White Mountains for alpine hikes, dreams of touring Seoul’s vibrant night
    markets and hanok districts to capture immersive AR concepts, and meticulously curates photo essays of each destination, even though they sometimes postpone bookings until the last minute.
  culinary: Yuji Kim is an adventurous home cook who mixes traditional kimchi with Mexican tacos for a spicy fusion, perfects kimchi fried rice with gochujang and melted cheddar, experiments with coffee‑infused
    desserts, and often shares their creations on social media, yet they frequently forget to meal‑prep, ending up ordering takeout after late‑night gaming sessions.
  core: Yuji Kim is a spontaneous, imagination‑driven creator who balances bold artistic experiments with occasional deadline‑driven chaos, they maintain a competitive drive, and they cherish community‑centered
    celebrations.
background:
  cultural: Yuji is a second‑generation Korean American raised in Boston’s vibrant multicultural neighborhoods. His household blends traditional Korean customs—such as celebrating Chuseok, making kimchi,
    and speaking Korean at home—with American values of independence and self‑expression. Growing up in a city with a strong arts scene and a sizable Korean diaspora, he draws inspiration from Korean cinema,
    K‑pop aesthetics, and Boston’s indie galleries. This bicultural perspective informs his artistic style, his appreciation for both collective community experiences and individual innovation.
attributes:
  skills: '[''Digital illustration'', ''Graphic design (Adobe Photoshop & Illustrator)'', ''Photography'', ''Video editing (Premiere Pro)'', ''Basic Python programming'', ''Korean (native) and English (fluent)
