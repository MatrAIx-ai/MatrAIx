personas:
  professional: Cassandra Rounds, a retired volunteer coordinator, now channels her organizational expertise, calm demeanor, and empathetic communication into leading a multigenerational gardening program
    that preserves native Southern plants, mentors youth volunteers, and blends traditional horticultural practices with innovative sustainable techniques.
  sports: Cassandra Rounds follows the Carolina Hurricanes, supports the UNC Tar Heels basketball team, participates in a weekly low‑impact walking club along the Tar River, and enjoys occasional pickleball
    matches at the local community center.
  arts: Cassandra Rounds finds creative fulfillment in reading historical fiction by authors such as Toni Morrison, knitting quilts that incorporate family patterns, and listening to the soulful blues of
    B.B. King while attending seasonal productions at the Greenville Community Theatre.
  travel: Cassandra Rounds prefers road‑tripping to historic Southern towns like Charleston, Savannah, and Natchez, exploring antebellum architecture and local gardens, while dreaming of a leisurely visit
    to the Great Smoky Mountains National Park next spring.
  culinary: Cassandra Rounds delights in cooking Southern staples such as collard greens, shrimp and grits, and sweet potato casserole, often swapping traditional butter for olive oil and adding quinoa
    or kale for a healthier twist, and proudly harvests heirloom tomatoes and okra from their garden for fresh, farm‑to‑table meals.
  core: Cassandra Rounds blends a steady, community‑focused spirit with quiet curiosity, tending gardens, quilts, and mentorship projects while savoring the comfort of Southern traditions seasoned with
    modern, health‑forward twists.
background:
  cultural: Cassandra is an African‑American woman whose family lineage traces back to the post‑Reconstruction era in the South, with ancestors who migrated from the Deep South to North Carolina during
    the early 20th‑century Great Migration. She grew up immersed in the church community, gospel music, and Southern culinary traditions that emphasize shared meals and storytelling. The rich oral histories
    of her family, combined with the vibrant cultural tapestry of Pitt County, have shaped her values of community service, resilience, and intergenerational connection. While embracing modern ideas, she
    remains grounded in the customs and collective memory that define her cultural identity.
