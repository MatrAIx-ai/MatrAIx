persona_description: A group of early pioneers in underwater diving and spearfishing activities in Australia, including Denny Wells, May Wells, Frank Cunliffe, Bill Heffernan, Rod McNeill, Keith Vagg, Goff
  Gapp, Noel Monkman, and a small band of followers. They were the early pioneers of underwater diving before the 2nd World War, and their exploits were from men and women who were proficient with snorkelling
  and spearfishing and had no fear of the ocean. The group formed the country’s first underwater scuba club in 1960, and the first meeting organised for spearfishermen was held near Long Reef Golf Club
  on Sunday, April 4, 1948.
