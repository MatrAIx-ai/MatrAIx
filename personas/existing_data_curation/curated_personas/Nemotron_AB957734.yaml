personas:
  professional: Tara Tift, a 32-year-old Software Quality Assurance Analyst in the Dallas-Fort Worth area, channels their methodical, risk-based mindset into meticulous manual and automated testing using
    Selenium, JIRA, and Python, while they assertively mentor junior teammates and champion inclusive accessibility standards in every release.
  sports: Tara Tift avidly follows the Dallas Cowboys and Dallas Mavericks, runs with the Dallas-Fort Worth Runners Club on weekends, and they practice yoga at a local studio to maintain flexibility and
    balance.
  arts: Tara Tift immerses themselves in Southern gospel harmonies and contemporary R&B, often listening to H.E.R. and Leon Bridges while attending performances by the Dallas Symphony Orchestra, and they
    read novels by Jesmyn Ward to fuel their creative spirit.
  travel: Tara Tift prefers meticulously planned getaway trips, having explored the historic streets of New Orleans and the vineyards of the Texas Hill Country, and they dream of a cultural immersion journey
    to Savannah’s waterfront and the historic ports of Charleston, South Carolina.
  culinary: Tara Tift, an enthusiastic home cook, blends Southern comfort classics like shrimp and grits and sweet-potato pie with fresh vegetables from their garden, mastering both skillet-seared fried
    chicken and herb-infused sauces while they occasionally treat themselves to farm-to-table dining experiences for fresh inspiration.
  core: Tara Tift is a detail-driven QA professional who channels their love for organization into flawless software releases and perfectly timed potlucks, yet secretly hoards an ever-growing collection
    of coffee mugs they never actually use.
background:
  cultural: Tara identifies as African American and grew up in the vibrant cultural landscape of Texas. Her upbringing emphasized strong family ties, community involvement, and the rich traditions of Black
    Southern cuisine and music. She celebrates cultural holidays such as Juneteenth and participates in local African American heritage events. Tara's cultural perspective informs her collaborative work
    style, her commitment to mentorship, and her appreciation for storytelling through food, music, and community service.
attributes:
  skills: '[''Manual testing'',''Automated testing with Selenium'',''Test scripting in Python'',''API testing with Postman'',''Performance testing with JMeter'',''Defect tracking with JIRA'',''Agile Scrum
    methodology'',''Test case documentation'',''SQL data validation'',''Accessibility testing'']'
  hobbies: '[''Cooking Southern comfort food'',''Gardening'',''Family event planning'',''Church choir and mentorship'',''Reading contemporary fiction'',''Yoga and fitness'',''Attending local tech meetups'']'
  career_goals: Tara aims to advance to a QA Lead role within the next three years, where she can shape testing strategies and mentor junior analysts. She plans to earn the ISTQB Advanced Test Manager certification
    and deepen her automation skills by mastering CI/CD integration with tools like Jenkins and GitHub Actions. Long‑term, she envisions contributing to product quality leadership, driving process improvements,
    and influencing cross‑functional teams to embed quality early in the development lifecycle.
