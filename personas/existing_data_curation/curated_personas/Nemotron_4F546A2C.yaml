personas:
  professional: A senior civil engineer Donna Morgan, with three decades of structural and transportation infrastructure expertise, leverages advanced analysis software such as SAP2000, STAAD.Pro, and Revit
    and applies a methodical, organized approach to lead multidisciplinary teams while injecting curiosity and artistic sensibility into sustainable, LEED‑focused project designs, and they consistently
    champion interdisciplinary collaboration.
  sports: An avid hiker and occasional jogger, Donna Morgan joins the Rock Creek Trail Group for weekend hikes, follows the Washington Capitals hockey season, supports Washington DC United soccer, and participates
    in the annual Capital Beltway 10‑k run with the DC Road Runners, combining her love of outdoor activity with a structured weekly yoga practice for stress relief, and they sometimes miss a run when work
    demands intensify.
  arts: Donna Morgan spends evenings at the Smithsonian American Art Museum admiring works by contemporary painter Kehinde Wiley and classic landscapes by Claude Monet, then translates that inspiration
    into her own watercolor paintings of D.C.’s historic architecture, while also enjoying live jazz performances by Gregory Porter at The Hamilton and attending book‑club discussions of Margaret Atwood
    and Jane Jacobs, and they often find themselves procrastinating on a new canvas when a deadline looms.
  travel: Donna Morgan prefers meticulously planned getaways that blend cultural immersion with nature, such as weekend trips to the historic streets of Annapolis, a summer hike in Shenandoah National Park,
    and a long‑awaited European tour of the historic castles along the Rhine, all balanced against a modest vacation budget and occasional family obligations, and they sometimes over‑research destinations
    to the point of indecision.
  culinary: In the kitchen Donna Morgan experiments with family heritage recipes, perfecting a slow‑cooked lamb stew seasoned with rosemary and root vegetables, skillfully rolling her own rye‑based sourdough
    bread, and delighting in fresh salads featuring heirloom tomatoes, feta, and a drizzle of extra‑virgin olive oil, while also savoring a favorite weekly dinner at a local farm‑to‑table restaurant featuring
    grilled salmon with quinoa and asparagus, and they occasionally over‑salt a dish when distracted by a work call.
  core: Donna Morgan is a methodical, curiosity‑driven engineer who balances high‑stakes infrastructure work with artistic pursuits, mindful wellness practices, and a cautious yet adventurous approach to
    life, all while wrestling with a habit of over‑planning and occasional stress‑induced worry, and they continue to seek harmony between precision and creativity.
background:
  cultural: Donna identifies as a White American of primarily Irish and German ancestry, raised in the suburban communities of Montgomery County, Maryland. Growing up in the diverse Washington‑DC metropolitan
    area exposed her to a broad range of cultural experiences—from classical music and theater to multicultural festivals. Her family emphasized education, public service, and community involvement, shaping
    her commitment to civic infrastructure and volunteerism. While maintaining a Mid‑Atlantic suburban upbringing, she appreciates the region's progressive values, environmental consciousness, and rich
    artistic scene, which inform both her professional perspective and personal interests.
attributes:
  skills: '[''Structural analysis'', ''Transportation design'', ''Geotechnical assessment'', ''AutoCAD Civil 3D'', ''Revit BIM'', ''SAP2000'', ''STAAD.Pro'', ''Project management'', ''PMP certification'',
    ''Professional Engineer (PE) license'', ''LEED AP'', ''Risk management'', ''Budgeting and cost control'', ''Technical report writing'', ''Team leadership'', ''Public speaking'']'
  hobbies: '[''Visiting museums and art galleries'', ''Watercolor painting'', ''Yoga and meditation'', ''Hiking'', ''Reading (science-fiction, urban planning, sustainability)'', ''STEM outreach tutoring'',
    ''Book club participation'', ''Cooking heritage recipes'']'
  career_goals: Donna aims to become a senior director of infrastructure development within a regional government agency or a large engineering consultancy, focusing on resilient, climate‑responsive transit
    and water systems for the Washington metropolitan area. She plans to deepen her expertise in sustainable design, spearhead community‑engaged infrastructure projects, and eventually transition into a
    policy advisory role influencing regional planning and funding strategies. Additionally, she wants to champion diversity in engineering by expanding mentorship programs for women and underrepresented
    groups, and to attain LEED AP credentials if not already held.
