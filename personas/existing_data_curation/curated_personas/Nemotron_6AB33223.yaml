  hobbies: '[''Salsa dancing'', ''Traditional Mexican cooking'', ''Literary book club (Latin American focus)'', ''Yoga and mindfulness meditation'', ''Hiking in the Santa Monica Mountains'', ''Volunteer
    mentorship for immigrant career development'']'
  career_goals: Leonor aims to transition from a store‑level manager to a regional operations director within the next five years, overseeing multiple locations across Southern California. She is driven
    to champion diversity and inclusion initiatives, leveraging her Mexican heritage to embed cultural competence into corporate training programs. In the longer term, she hopes to launch a consulting boutique
    that advises midsize businesses on efficient, culturally‑aware operational practices. Simultaneously, she wants to mentor younger women and Hispanic professionals, creating a pipeline of talent that
    reflects the community she serves. Reducing her own work‑related stress while still achieving high performance is a personal ambition that guides her pursuit of leadership roles that offer better work‑life
    balance.
