personas:
  professional: Leonor Garcia leverages over three decades of retail and hospitality management experience to drive operational efficiency as a store manager in Los Angeles, using her methodical Excel analytics,
    bilingual communication, and competitive edge to streamline scheduling, budgeting, and staff training while channeling her outgoing nature into cross‑functional networking and community outreach.
  sports: Leonor Garcia hikes the Santa Monica Mountains with the local “Friends of the Santa Monica Trails” club each weekend, cheers for the Los Angeles Dodgers and Lakers, and incorporates low‑impact
    cardio salsa classes as part of her fitness routine, balancing competitive drive with her organized scheduling.
  arts: Leonor Garcia immerses herself in contemporary Latin American literature, discussing works by Isabel Allende and Jorge Luis Borges in her book club, while also savoring the music of Celia Cruz and
    Lila Downs during salsa practice and attending the Getty’s Mexican art exhibitions when time permits.
  travel: Leonor Garcia prefers meticulously planned road trips along the Pacific Coast, having explored Santa Barbara, San Diego, and a recent cultural immersion in Oaxaca, while budgeting travel around
    her mentoring commitments and favoring destinations that offer both artistic inspiration and opportunities for community volunteering.
  culinary: Leonor Garcia excels at preparing traditional dishes like tamales with masa, pork filling, and green mole with chilhuacle peppers, frequently experimenting with fresh cilantro, roasted pumpkin
    seeds, and Mexican chocolate, yet admits to over‑seasoning when stress spikes.
  core: Leonor Garcia is a detail‑driven, socially vibrant manager who balances a competitive edge with cultural passions, but often wrestles with anxiety that fuels both meticulous planning and occasional
    over‑cooking.
background:
  cultural: Leonor was raised in a bilingual, Mexican‑American household in East Los Angeles, where her parents immigrated from Jalisco in the 1960s. She grew up celebrating Día de los Muertos, quinceañeras,
    and other Mexican traditions while also assimilating to the multicultural tapestry of Southern California. Her bilingual fluency and deep respect for family ties have shaped her personal values of community,
    hospitality, and perseverance. Leonor often infuses these cultural sensibilities into her managerial style—prioritizing relational trust, collective responsibility, and respect for diverse perspectives.
    Her Mexican heritage also informs her culinary passions and her commitment to supporting immigrant and Hispanic communities through mentorship and advocacy.
