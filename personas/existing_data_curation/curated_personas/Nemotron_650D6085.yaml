  career_goals: Carrie Ann aspires to transition into a senior technology strategy role where she can influence enterprise‑wide architecture decisions and mentor junior analysts. She aims to lead cross‑functional
    teams that develop scalable, user‑focused solutions for the financial services sector prevalent in Nassau County. Over the next five years, she plans to acquire certifications in cloud architecture
    and data governance, while also championing initiatives that improve workplace well‑being and stress management for her team, reflecting her personal sensitivity to pressure. Ultimately, she hopes to
    leave a legacy of balanced, innovative systems that align business goals with human‑centered design.
