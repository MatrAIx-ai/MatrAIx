personas:
  professional: Eliza Nixon, a retail veteran of five years in a bustling Houston supermarket, leverages their curiosity and practical organization to excel at cash handling, conflict resolution, and team
    leadership, aiming to become a shift manager within two years and eventually a regional manager or neighborhood store owner.
  sports: Eliza Nixon hits the local recreation center for pick‑up basketball games, roots for the Houston Rockets and Houston Astros, and follows a seasonal cross‑training routine that mixes streetball
    drills with weekend jogs along Buffalo Bayou to stay fit.
  arts: Eliza Nixon expresses their creative side by singing gospel and R&B in the church choir, practicing hip‑hop and line‑dance at community events, and crafting simple macramé wall hangings, drawing
    inspiration from artists like Beyoncé, Kirk Franklin, and local muralist Maya Hopkins.
  travel: Eliza Nixon prefers road trips that blend adventure and family time, having explored Austin’s live‑music scene, a weekend beach stay in Galveston, and a culinary tour of New Orleans, while dreaming
    of a future Caribbean cruise to unwind after achieving their retail management goals.
  culinary: Eliza Nixon delights in cooking soul‑food staples such as collard greens, fried chicken, and cornbread for friends, while their palate also loves sampling food‑truck tacos al pastor, Korean
    BBQ sliders, and crafting homemade sweet potato pies, reflecting a moderate cooking skill level and a love for bold, comforting flavors.
  core: Eliza Nixon balances boundless energy and community spirit with disciplined ambition, turning every cashier shift into a stepping stone toward retail leadership while dancing, cooking, and volunteering
    keep them grounded and socially connected.
background:
  cultural: Eliza grew up in Houston’s historic Third Ward, a vibrant African‑American neighborhood steeped in Southern traditions, church‑centered community life, and a rich music scene. Her family’s cultural
    practices include preparing soul food, attending weekly services at a Baptist church, and participating in local Juneteenth celebrations. The multicultural fabric of Houston—blending African, Caribbean,
    and Latino influences—has shaped her palate and openness to diverse cultural experiences. Her upbringing in a working‑class Black household instilled a strong work ethic, resilience, and a deep commitment
    to giving back through church activities and neighborhood volunteerism.
