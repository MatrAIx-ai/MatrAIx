  hobbies: '["Dancing", "Cooking", "Church choir participation", "Playing basketball", "Community volunteering", "Exploring local food trucks", "Listening to R&B and gospel music", "DIY home décor"]'
  career_goals: In the short term, Eliza aims to become a shift manager within the next two years, overseeing floor staff and coaching new hires. Her medium‑term ambition is to earn a store manager position,
    gaining experience in budgeting, merchandising, and personnel management. Long‑term, she envisions either advancing to a regional management role within the retail chain or opening her own small convenience
    store in her neighborhood. To support these goals, she plans to complete her GED, enroll in a community‑college business program, and obtain a retail management certification.
