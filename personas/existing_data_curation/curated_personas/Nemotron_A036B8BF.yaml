  hobbies: '[''Online gaming (eSports, streaming)'', ''Social media content creation (TikTok, YouTube)'', ''Public speaking and karaoke'', ''DIY woodworking and upcycling projects'', ''Chess club'', ''Hiking
    and outdoor exploration'', ''Animal shelter volunteering'', ''Journaling and creative writing'']'
  career_goals: Chelsea aspires to become a prominent digital content creator and influencer who can merge her love for community interaction with her competitive edge. She envisions launching a YouTube
    channel and a TikTok presence focused on lifestyle vlogs, DIY tutorials, and gaming streams, ultimately monetizing her platform to fund a small‑scale boutique coffee shop in Jerome that doubles as a
    community hub. Long‑term, she is interested in advocacy for teen mental health, hoping to use her platform to destigmatize anxiety and provide resources for peers. Her competitive drive also fuels a
    secondary ambition to qualify for regional eSports tournaments and perhaps secure a scholarship for a specialized media program.
