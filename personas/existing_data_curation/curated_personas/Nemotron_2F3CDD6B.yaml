personas:
  professional: Uzma Jasthi, a seasoned program management veteran with four decades of expertise, harnesses advanced Excel, Tableau, and AI ethics knowledge to guide data‑driven strategy while mentoring
    emerging STEM talent, balancing pragmatic implementation with a genuine curiosity for new technologies and an assertive yet cooperative leadership style.
  sports: Uzma Jasthi walks the Rutgers University trails three times a week, participates in a community walking group that meets at the university’s arboretum, follows the New York Giants and the New
    Jersey Devils, and practices gentle yoga twice weekly for flexibility and stress relief.
  arts: Uzma Jasthi immerses herself in historical fiction by authors like Hilary Mantel, savors the poetry of Mary Oliver, attends local cultural festivals featuring traditional folk music, and enjoys
    bridge evenings where strategic thinking meets social camaraderie.
  travel: Uzma Jasthi prefers low‑stress travel that blends gardening inspiration with history, having explored the historic streets of Philadelphia, taken a weekend agritourism stay at a Vermont farm,
    and planning a future visit to the vineyards of the Finger Lakes region to combine wine tasting with peaceful walks.
  culinary: Uzma Jasthi delights in turning garden harvests into spiced vegetable stews, herb‑infused lentil soups, and fresh flatbreads, frequently experimenting with cumin, turmeric, and fresh cilantro
    to adapt family recipes while occasionally treating herself to a gourmet cheese platter at the local farmers market.
  core: Uzma Jasthi blends decades of strategic leadership with a garden‑centered, anxiety‑aware lifestyle, channeling curiosity into mentorship while juggling meticulous budgeting, health monitoring, and
    a love for literature, bridge, and gentle movement.
background:
  cultural: Uzma was raised in a close‑knit South Asian family that emphasized education, community service, and respect for tradition. She celebrates festivals such as Diwali and Eid with her extended
    family, blending religious customs with modern American life. Her upbringing instilled a strong sense of duty toward family and community, which she carries into her professional ethos of mentorship
    and collaborative leadership. Living in Piscataway, NJ for many years, she integrates South Asian values of hospitality, perseverance, and reverence for elders with the multicultural, inclusive spirit
    of the New Jersey diaspora, actively participating in local cultural associations and interfaith events.
