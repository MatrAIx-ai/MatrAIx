  career_goals: Approaching retirement, Uzma aims to shift from day‑to‑day operations to advisory and mentorship roles. She plans to launch a mentorship program for underrepresented South Asian women in
    STEM within New Jersey, serve on the board of a nonprofit focused on education equity, and complete a certification in geriatric health data analysis. She also hopes to author a memoir reflecting her
    journey as a South Asian woman in technology, stay current on emerging tech through continuous learning, and ensure her legacy supports future generations of diverse professionals.
