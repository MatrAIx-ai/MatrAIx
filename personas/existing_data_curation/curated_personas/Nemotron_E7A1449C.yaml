  hobbies: '[''playing basketball'', ''listening to hip‑hop and R&B'', ''experimenting with fusion cooking at home'', ''video gaming'', ''hiking local trails'', ''volunteering at community events'', ''attending
    live music shows'']'
  career_goals: He plans to enroll in a culinary arts program at a community college while continuing to work at the bakery to refine his craft. His long‑term ambition is to open a community‑focused bakery
    in Newark that showcases Southern‑inspired desserts alongside modern, health‑conscious options. He also hopes to create a mentorship program for local teens interested in culinary careers and eventually
    expand to a small café‑bistro that serves as a cultural hub.
