personas:
  professional: Van Rhodes is a bakery apprentice who blends artisanal breadmaking, pastry decorating, and sourdough starter cultivation with a hands‑on curiosity for food science, efficiently managing
    inventory and point‑of‑sale systems while stepping into leadership when needed, balancing their practical mindset with experimental flavor pairings.
  sports: Van Rhodes shoots hoops three evenings a week at the local recreation center, follows Columbus Crew SC and the Cleveland Cavaliers, joins weekend hikes on the scenic trails of Licking County,
    and uses basketball as a quick stress‑relief outlet after busy bakery shifts.
  arts: Van Rhodes immerses themselves in hip‑hop and R&B playlists featuring Kendrick Lamar and H.E.R., discovers emerging Afro‑beat artists like Burna Boy, attends live shows at Columbus’s Big Room and
    local open‑mic nights, and collects street‑art prints that echo the rhythmic energy of their favorite music.
  travel: Van Rhodes prefers spontaneous weekend road trips, having driven to Asheville for a craft‑brew festival and explored New Orleans for its jazz and gumbo, dreams of a culinary pilgrimage to Lagos
    to taste authentic Afro‑beat‑inspired street food, yet stays within a modest budget that balances school expenses and bakery wages.
  culinary: Van Rhodes experiments with soul‑food foundations by infusing traditional biscuits with rosemary‑honey butter, swapping classic sweet‑potato pie filling for a chili‑spiced caramel swirl, and
    topping creations with locally sourced kale and smoked paprika, showcasing a skill level that blends artisan pastry techniques with innovative flavor mash‑ups.
  core: Van Rhodes is a laid‑back 20‑year‑old bakery apprentice who balances experimental cooking with practical hustle, loves basketball and gaming, and navigates life with flexible but occasionally disorganized
    habits.
background:
  cultural: Van is a Black American raised in Newark, Ohio, where his family’s roots trace back to the Southern United States. Growing up, he was exposed to the flavors of soul food—collard greens, cornbread,
    and sweet potato pie—through his grandparents, while also absorbing the rhythms of gospel and hip‑hop in the local church and community gatherings. The Midwestern setting has taught him the value of
    close‑knit community ties and self‑reliance. These cultural influences shape his baking style, infusing classic African‑American desserts with locally sourced ingredients and a modern flair.
attributes:
  skills: '[''artisanal bread baking'', ''sourdough fermentation'', ''pastry and cake decorating'', ''recipe development'', ''food safety (HACCP)'', ''inventory control'', ''customer service'', ''team collaboration'',
