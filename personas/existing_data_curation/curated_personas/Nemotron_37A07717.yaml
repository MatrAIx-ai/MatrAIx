    ''Drawing and storytelling'']'
  career_goals: Cameron dreams of turning his curiosity into a career, hoping one day to become a software engineer or robotics designer who creates games and gadgets for kids. He envisions participating
    in school robotics contests, developing his own simple video game, and eventually working at a tech company in Silicon Valley. His competitive streak drives him to set high personal standards, while
    his practical mindset pushes him to focus on tangible skills he can build and showcase.
