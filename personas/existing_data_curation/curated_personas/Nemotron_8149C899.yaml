  career_goals: Approaching retirement, Kharla aims to leave a lasting legacy by mentoring emerging supervisors and establishing robust succession plans for her store. She aspires to transition into a regional
    training or consulting role where she can share her expertise in staff development, inclusive workplace culture, and operational efficiency. Balancing her desire for continued professional contribution
    with reduced stress, she seeks a part-time schedule that allows more time for family, community volunteering, and personal well‑being.
