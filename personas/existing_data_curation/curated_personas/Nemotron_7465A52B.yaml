personas:
  professional: Chae Leung, an aspiring technologist, leverages a methodical love of coding simple Scratch games and building LEGO robotics to turn curiosity about sci‑fi worlds into tangible, organized
    projects while balancing teamwork with alone‑time practice, and they consistently document progress in a notebook.
  sports: Chae Leung, an enthusiastic hiker, joins a small weekend club to trek parts of the Angeles National Forest, occasionally watches LA Dodgers baseball games and LA Galaxy soccer matches on TV, and
    uses a basic fitness tracker to log steps, showing a balanced love of nature and team sports, and they often challenge friends to a friendly race up the nearest hill.
  arts: Chae Leung, a budding illustrator, fills sketchbooks with detailed anime characters inspired by Studio Ghibli’s Spirited Away and draws fan art of My Hero Academia, practices piano pieces by Ludovico
    Einaudi, and admires the storytelling of author Margaret Atwood, weaving these influences into creative projects, and they occasionally share their drawings on a kid‑friendly art forum for feedback.
  travel: Chae Leung, a curious explorer, has visited the Griffith Observatory for stargazing, spent weekends at Disneyland, dreams of a school field trip to the Kennedy Space Center in Florida, and plans
    to hike the Redwood trails with family next summer, and they keep a scrapbook of photos and ticket stubs to remember each adventure.
  culinary: Chae Leung, a junior baker, whips up vanilla cupcakes with buttercream swirls and sprinkles, experiments with seasonal fruit fillings like strawberry, and enjoys pairing them with homemade hot
    chocolate while occasionally helping the family prepare sushi rolls on special occasions, and they love to decorate the cupcakes with galaxy‑themed icing inspired by their love of astronomy.
  core: Chae Leung, a methodical 11‑year‑old with a sci‑fi imagination, balances coding, anime drawing, piano practice, and weekend cupcake baking while staying organized, resilient, and occasionally impulsively
    buying limited‑edition merch, and they proudly display a collection of stickers representing their favorite space movies on their laptop.
background:
  cultural: Chae comes from a Cantonese‑heritage family that blends traditional East Asian values with the multicultural environment of Southern California. At home, she speaks both English and Cantonese,
    celebrates Lunar New Year with family gatherings, traditional meals, and red envelope customs, and occasionally practices calligraphy and Chinese brush painting. Her parents emphasize the importance
    of education, respect for elders, and community involvement, which aligns with her organized and cooperative nature. Living in Tujunga, she also engages with the broader local culture through school
    events, community festivals, and the diverse culinary scene, creating a hybrid identity that respects her heritage while embracing American influences.
attributes:
  skills: '[''Time management'', ''Basic coding (Scratch)'', ''Organizational planning'', ''Mathematical problem solving'', ''Bilingual communication (English and Cantonese)'', ''Piano performance'', ''Anime-style
