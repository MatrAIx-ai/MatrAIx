  hobbies: '[''Reading science‑fiction novels'', ''Coding Scratch projects'', ''Building LEGO robotics'', ''Drawing anime characters'', ''Playing piano'', ''Baking cupcakes'', ''Hiking in local parks'',
    ''Participating in school robotics club'']'
  career_goals: Chae dreams of becoming a civil engineer or architect who designs sustainable, community‑focused spaces, blending her curiosity about how things work with a practical desire to improve daily
    life. She aims to excel in STEM subjects throughout high school, earn a scholarship for an engineering program, and later contribute to environmentally friendly projects in Los Angeles. In the meantime,
    she plans to deepen her coding skills and participate in science fairs to build a strong foundation for her future career.
