personas:
  professional: Shonda Tyler, a two-year-old aspiring block‑tower architect, meticulously arranges bright wooden cubes into structured patterns each play session, demonstrating a practical focus on immediate
    results while staying flexible enough to incorporate peers’ ideas.
  sports: Shonda Tyler, a fan of the local Minor League baseball team the River City Blue Jays and member of the Tiny Tots Soccer Club, energetically chases a plastic soccer ball at the community park each
    Saturday, balancing her love for team spirit with a practical habit of always lining up in a neat row before play begins.
  arts: Shonda Tyler, an enthusiastic admirer of Sesame Street’s Elmo, enjoys dancing to the tune of 'The Lion Sleeps Tonight' and often reenacts scenes from Disney’s Frozen while clutching a plush Olaf,
    satisfying her desire for structured play and social interaction.
  travel: Shonda Tyler, who delights in family outings to the nearby city zoo and recently experienced a beach day at Sunny Cove, dreams of visiting Disneyland’s Fantasyland and prefers parents to plan
    trips with detailed itineraries and familiar snack stops.
  culinary: Shonda Tyler, a picky yet adventurous eater, adores mac and cheese with broccoli florets, savors banana slices dipped in honey, proudly helps stir her mom’s homemade tomato soup, and occasionaly
    insists on having a single gummy bear as a treat.
  core: Shonda Tyler is a two-year-old who craves routine, thrives on group play, worries about new experiences, and delights in bright colors, sticker collections, and snack time.
background:
  cultural: Shonda grows up in a Black African‑American family in Midway, Liberty County, Georgia, immersed in Southern cultural traditions. Her household celebrates church gatherings, gospel music, family
    cookouts featuring Southern soul food, and storytelling that connects her to the region’s Gullah‑Geechee heritage. Community events, church choir rehearsals, and intergenerational family time shape
    her identity and values.
attributes:
  skills: '["Walking", "Climbing", "Fine‑motor stacking", "Scribbling", "Object naming", "Simple two‑step routines", "Singing nursery rhymes", "Reciprocal play"]'
  hobbies: '["Storytime circles", "Dancing to nursery rhymes", "Building block towers", "Finger painting", "Park play", "Family walks", "Water play", "Church nursery activities"]'
  career_goals: Though only two, Shonda often talks about becoming a teacher or caregiver, expressing a desire to help other children learn and play. She is drawn to roles that involve structure, predictable
    schedules, and social interaction, and she dreams of one day working in a community school or health center where she can support families.
