  hobbies: '[''Basketball'', ''Pickup soccer'', ''Live music events'', ''Community volunteering'', ''Event organization'', ''Cooking Southern/soul food'', ''Hosting potluck gatherings'', ''Watching college
    football'', ''Tech gadget tinkering'']'
  career_goals: Eddie aims to secure a stable, full‑time position that offers clear advancement pathways. He plans to obtain a forklift certification and pursue an entry‑level supervisory role in a logistics
    or warehouse environment within the next two years. Longer‑term, he aspires to become a shift lead or operations coordinator, leveraging his organizational strengths and people‑oriented approach. He
    also considers enrolling in a community‑college program for supply‑chain management to broaden his career options.
