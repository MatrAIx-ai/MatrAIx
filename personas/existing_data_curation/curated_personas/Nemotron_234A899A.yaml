personas:
  professional: Eddie Shannon, a 24‑year‑old aspiring logistics supervisor, leverages hands‑on experience with point‑of‑sale systems, inventory management, and community event coordination to pursue forklift
    certification and a clear pathway toward a shift‑lead position in a warehouse, and they apply a practical, structured mindset and people‑focused teamwork.
  sports: Eddie Shannon thrives on the energy of weekly pickup basketball games at Lake Town Park and Sunday soccer scrimmages, follows the Carolina Panthers and Duke Blue Devils football, maintains fitness
    by hitting the gym three times weekly, and they occasionally skip a workout after late‑night concert videos.
  arts: Eddie Shannon, an avid concert‑goer, immerses themselves in live hip‑hop shows featuring Kendrick Lamar, soulful R&B evenings listening to Beyoncé’s classics, and intimate jazz performances by local
    ensembles echoing the sounds of Herbie Hancock, and they let these musical experiences shape their weekend downtime.
  travel: Eddie Shannon prefers structured weekend getaways, often road‑tripping to Southern gems like Charleston and New Orleans to enjoy live music and local cuisine, while they save for a longer‑term
    adventure to New York City’s cultural districts or a culinary tour of Italy.
  culinary: Eddie Shannon, who cooks at a confident intermediate level, frequently prepares Southern comfort staples such as fried chicken, collard greens, mac and cheese, and sweet‑potato pie, experimenting
    with spice blends and hosting potluck dinners that feature their signature cornbread casserole, and they take pride in feeding friends with wholesome, soul‑nourishing meals.
  core: Eddie Shannon blends a practical, organized mindset with an outgoing love for community sports, soulful cooking, and the rhythm of live R&B, and they steadily march toward a logistics leadership
    role.
background:
  cultural: Eddie’s cultural identity is rooted in the African‑American community of Greensboro, a city with a rich civil‑rights legacy. He grew up attending a historically Black church, where music, fellowship,
    and service shaped his values of cooperation and harmony. Family gatherings often feature soul food, storytelling, and celebrations of Black heritage. He identifies with Southern Black cultural expressions,
    including a love for R&B, gospel, and community rituals such as block parties and local festivals. The experience of being Black in the South informs his perspective on resilience, community support,
    and the importance of mentorship.
