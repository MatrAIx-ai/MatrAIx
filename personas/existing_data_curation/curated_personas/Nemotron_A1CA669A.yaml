personas:
  professional: Patti Llamas, a seasoned housekeeper with three decades of hands‑on experience, channels meticulous cleaning expertise, eco‑friendly chemical knowledge, and staff‑training acumen into a
    goal of earning a Certified Professional Cleaner credential and stepping into a supervisory role at a local senior‑living facility while laying groundwork for a modest, community‑focused cleaning service
    that mentors apprentices.
  sports: Patti Llamas, an enthusiastic fan of the Charlotte Hornets and the Carolina Panthers, participates in a weekly church walking club, tends to her dog on early morning strolls through Crowders Mountain
    State Park, and occasionally joins a community gardening fitness group that incorporates light yard work as exercise.
  arts: Patti Llamas, an avid reader of mystery novels like Agatha Christie’s "Murder on the Orient Express" and a devoted viewer of classic Southern TV series such as "The Andy Griffith Show" and "Matlock,"
    also enjoys listening to gospel choirs at church and the country storytelling of Dolly Parton and Emmylou Harris while crocheting and knitting in the evenings.
  travel: Patti Llamas, a planner who prefers low‑cost, well‑structured trips, often takes weekend drives along the Blue Ridge Parkway, visits Asheville’s craft fairs, has toured the historic streets of
    Charleston and Savannah for their Southern charm, and dreams of a leisurely cruise to the Bahamas once her finances allow for a modest indulgence.
  culinary: Patti Llamas, a faithful follower of comfort‑food recipes, regularly prepares chicken and dumplings, peach cobbler with fresh garden peaches, and loaded potato casserole, while reliably seasoning
    with butter, thyme, and a pinch of cayenne, and she delights in baking sugar cookies topped with a thin layer of powdered sugar for church potlucks.
  core: Patti Llamas, a detail‑oriented housekeeper with a worry‑prone yet compassionate heart, balances routine and mentorship while secretly hoarding receipts and indulging in mystery novels at night.
background:
  cultural: Patti was raised in the rural parts of Gaston County, North Carolina, within a working‑class family that values Southern hospitality, faith, and self‑reliance. Her upbringing emphasized modest
    living, hard work, and community service. She attended the local public high school and, after graduating, entered the workforce directly, building a career in housekeeping. Patti identifies with Protestant
    (Baptist) traditions, regularly attending church and participating in community outreach. The regional culture of modesty, respect for routine, and close‑knit social ties shapes her practical outlook
    and her commitment to helping neighbors.
attributes:
  skills: '[''Deep cleaning'', ''Time management'', ''Green cleaning knowledge'', ''Laundry care'', ''Inventory management'', ''Client communication'', ''Team training'', ''Attention to detail'', ''Physical
    stamina'', ''Basic home maintenance'']'
  hobbies: '[''Gardening'', ''Crochet and knitting'', ''Reading mystery novels'', ''Watching classic TV shows'', ''Cooking and baking'', ''Church attendance and bible study'', ''Volunteer work at community
    center'', ''Dog walking'', ''Nature walks'']'
  career_goals: Patti seeks a stable, predictable work schedule that reduces stress while allowing her to build on her decades of experience. She aims to obtain a Certified Professional Cleaner (CPC) credential
    and transition into a lead housekeeper or supervisory role at a local hotel or senior‑living facility, where she can mentor younger staff. Long‑term, she dreams of launching a small community‑focused
    cleaning service, offering affordable, reliable housekeeping to neighbors in Gaston County, and eventually training apprentices to sustain the business. Financial security and the ability to contribute
    to her church’s charitable programs are also central to her ambitions.
