persona_description: A member of the Ontario Childhood Injury Prevention Committee (OCIPC) who is committed to promoting physical literacy and fall prevention among children from birth to 6 years of age.
  They are knowledgeable about the impacts of falls on children, the importance of physical activity, and the benefits of increasing physical literacy. They have experience in developing and implementing
  evidence-based strategies to target parents/caregivers of children and engage community stakeholders in fall prevention efforts. They have a strong understanding of the Ontario Neurotrauma Foundation's
  role in the Fall Prevention Month initiative and the Toronto Public Health's contribution to the Child Fall Prevention Social Media Toolkit. They are dedicated to reducing the risk of falls and promoting
  physical activity among children, with a goal of developing a concrete plan and engaging community stakeholders in implementing evidence-based strategies.
