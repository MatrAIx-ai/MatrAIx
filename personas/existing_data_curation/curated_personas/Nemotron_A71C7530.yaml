  hobbies: '[''Gardening'', ''Traditional Spanish Cooking'', ''Reading Historical Fiction'', ''Poetry'', ''Book Club'', ''Digital Photography'', ''Community Choir'', ''Teaching Computer Basics to Seniors'',
