  career_goals: Despite being retired, Noelia remains driven to share her knowledge. She plans to volunteer as a mentor for new teachers at the local elementary school, design a bilingual after‑school enrichment
    program, and compile a series of oral‑history recordings of Spanish‑Texan families for the regional historical society. She also hopes to author a memoir that interweaves her experiences in Spanish
    education with reflections on life in West Texas, and to learn advanced digital photography to document community events.
