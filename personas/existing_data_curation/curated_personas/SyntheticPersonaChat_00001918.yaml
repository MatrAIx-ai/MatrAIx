    User 2: That sounds like fun. I like to go for walks too.

    User 1: Me too! It''s a great way to get some exercise and clear your head.

    User 2: I agree. I also like to read. What kind of books do you like to read?

    User 1: I like to read a variety of different genres, but I especially like historical fiction.

    User 2: I like historical fiction too! I''ve been reading a lot of books about the Roman Empire lately.

    User 1: That sounds interesting! I''ve never read anything about the Roman Empire.

    User 2: You should check it out! It''s really interesting.

