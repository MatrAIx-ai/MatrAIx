persona_description: A person who is concerned about the impact of climate change on urban areas and the need for adaptation strategies. They are interested in the engineering, ecological, and public policy
  responses to rising sea levels and more frequent, intense storms, and are aware of the potential for disaster to overshadow the legacy of the event. They are aware of the lessons learned from past disasters
  and the need for forward-thinking, transformative policies to address ecological changes and the potential for adaptation strategies to be implemented on a smaller, more decentralized scale. They are
  aware of the challenges of choosing the appropriate scale of adaptation strategies in an era of government belt-tightening and public reticence about the reach of government into society.
