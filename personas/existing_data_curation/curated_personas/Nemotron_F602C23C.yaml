personas:
  professional: Erika Addison, a retired homemaker turned community mentor, leverages their decades of cooking, canning, knitting and gardening expertise to lead small workshop circles at the local church,
    where their warm, routine‑driven approach and gentle patience create a comforting learning environment despite occasional disorganization in scheduling.
  sports: Erika Addison, an avid morning walker who participates in the Huntingdon County Senior Walking Club and enjoys gentle yoga in the church basement, follows the Pittsburgh Steelers during football
    season and the State College Spikes in summer, but prefers low‑impact activities over competitive sports, using garden chores as their primary form of exercise.
  arts: Erika Addison, a devoted listener of classic radio dramas like 'The Shadow' and a fan of crooners such as 'Frank Sinatra' and 'Ella Fitzgerald', fills their evenings with choir rehearsals and occasional
    viewings of Agatha Christie adaptations starring Margaret Leighton, while their knitting patterns are inspired by the geometric quilts of folk artist Mary Tyrrell, weaving a tapestry of mid‑century
    American culture into their creative life.
  travel: Erika Addison, who prefers short, well‑planned road trips over lengthy flights, has visited historic sites in Gettysburg and Washington D.C., enjoys annual family reunions at the lake in the Alleghenies,
    dreams of a leisurely cruise on the Mississippi River to watch river birds, but often postpones long‑distance travel due to health concerns and a mild fear of flying.
  culinary: Erika Addison, a master of traditional Pennsylvania hearth cooking, bakes flaky apple pie with a crumbly lattice topping, whips up chicken pot pie using garden carrots and potatoes, preserves
    heirloom tomatoes and strawberry jam with a pinch of cinnamon, and habitually adds a dash too much nutmeg to their pumpkin bread, delighting friends at potluck gatherings.
  core: Erika Addison, an 82‑year‑old keeper of family stories who finds comfort in routine knitting and garden work, worries about every detail, occasionally forgets to pay bills on time, and can’t resist
    a fresh roll of yarn even when it means skipping a doctor’s appointment.
background:
  cultural: Erika is a white American whose family has lived in central Pennsylvania’s Huntingdon County for several generations, likely tracing roots to Scots‑Irish and German immigrants who settled the
    region in the 19th century. The local culture emphasizes practicality, self‑reliance, and strong community ties anchored by a Protestant church. Traditional values such as hospitality, respect for elders,
    and preservation of family customs are central to her identity. She celebrates regional holidays like the county fair and maintains rituals like sharing home‑cooked meals during Thanksgiving and church
    gatherings. Her worldview reflects the modest, routine‑oriented lifestyle typical of rural Appalachian‑influenced Pennsylvania, blended with a deep appreciation for the simple, familiar comforts of
    her lifelong home.
