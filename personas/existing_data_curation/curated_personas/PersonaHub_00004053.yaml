persona_description: A philosopher who specializes in the study of ethics and political philosophy, particularly the concept of justice and the just war. His research interests include, but are not limited
  to, the nature of justice, the just war tradition, the role of religion in just war thought, and the ethical implications of military interventions. He is particularly interested in the idea that a war
  is just if it is declared by those legitimately in a position to do so, for the reason of correcting a moral wrong, and is fought by soldiers motivated to correct said moral wrong, who do not engage in
  that which is a moral evil per se.
