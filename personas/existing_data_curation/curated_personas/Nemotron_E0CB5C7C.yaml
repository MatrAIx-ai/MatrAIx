personas:
  professional: Carlos Alcantar is a budding junior coder and robotics hobbyist who transforms LEGO builds into functional prototypes, channels their meticulous organization into well‑structured Scratch
    games, and leverages a competitive spark to constantly outdo peers in school tech challenges.
  sports: Carlos Alcantar dazzles at the neighborhood soccer field, dribbling with the same precision as their LEGO builds, passionately supports the local youth team the City Rovers, and channels a competitive
    drive into Saturday league matches while occasionally questioning teammates' commitment.
  arts: Carlos Alcantar sketches bold comic heroes during recess, draws inspiration from the vibrant rhythms of reggaeton star Bad Bunny, salsa legend Marc Anthony, and traditional bomba beats, and often
    blends these artistic bursts into animated Scratch stories that they proudly showcase at school art fairs.
  travel: Carlos Alcantar dreams of a family road trip to the astronomy museum in Houston, reminisces about past weekend outings to the coastal boardwalk where they collected seashells for LEGO seas, and
    prefers meticulously planned itineraries over spontaneous wanderings, balancing school schedule constraints.
  culinary: Carlos Alcantar loves the savory crunch of homemade empanadas stuffed with cheese and cilantro, enjoys assembling quick nachos with melted cheddar, and, though their cooking skills are limited
    to microwave meals, they relish the aroma of pineapple‑glazed chicken that their grandmother prepares during festivals.
  core: Carlos Alcantar is a hyper‑organized 10‑year‑old tech whiz who fuses soccer, LEGO, and comic art into competitive Scratch games while juggling a cautious allowance, mild allergies, and a love for
    reggaeton‑powered family gatherings.
background:
  cultural: Carlos grew up in a vibrant Puerto Rican household in Jersey City, where Spanish is spoken daily and family gatherings revolve around dishes like mofongo, arroz con gandules, and pasteles. He
    celebrates traditional holidays such as Noche de San Juan and participates in local parades that showcase Puerto Rican music, dance, and art. The strong sense of community and resilience passed down
    from his parents influences his outlook, encouraging him to honor his island roots while navigating the diverse urban environment of Hudson County. He embraces both the island's rhythmic heritage—learning
    basic steps of salsa and bomba—and the multicultural fabric of his city, often blending these influences in his school projects and social activities.
