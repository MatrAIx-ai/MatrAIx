  career_goals: Carlos dreams of becoming a scientist‑engineer who designs rockets or sustainable technology, aiming to one day work on space exploration missions. He also imagines a future where he can
    blend his love for art and technology, perhaps as a video‑game designer or digital animator. Guided by his competitive streak, he hopes to win regional science fairs, robotics competitions, and soccer
    tournaments, using each achievement as a stepping stone toward higher education in STEM. He aspires to lead collaborative projects that combine creative problem‑solving with rigorous standards, and
    ultimately to serve as a role model for other kids in his community who share his Puerto Rican heritage and curiosity about the world.
