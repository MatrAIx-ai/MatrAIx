  hobbies: '[''Birdwatching'', ''Gardening'', ''Reading (science and history)'', ''Cooking'', ''Knitting'', ''Local lectures and workshops'', ''Photography'', ''Puzzle solving (Sudoku, crosswords)'', ''Small
    book club'', ''Volunteering at community garden'']'
  career_goals: Marsha aims to stay intellectually active by volunteering as a STEM mentor for local high‑school clubs and serving as a data‑consultant for community nonprofits seeking evidence‑based solutions.
    She hopes to develop a short guidebook that bridges scientific thinking with everyday decision‑making, and is considering part‑time adjunct teaching at a community college to share her knowledge. Continuing
    personal learning in emerging fields such as machine learning is also a priority, while maintaining a balanced lifestyle that supports her family and community involvement.
