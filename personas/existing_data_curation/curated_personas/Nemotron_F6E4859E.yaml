  hobbies: '[''Salsa and Bomba Dancing'', ''Community Soccer'', ''Volunteer Work at Cultural Festivals'', ''Cooking Traditional Puerto Rican Cuisine'', ''Hiking in the Mountains of Puerto Rico'', ''Reading
    Business and Self‑Improvement Books'', ''Doing Crosswords'', ''Attending Live Music Events'']'
  career_goals: Ana aims to transition from her current cashier role to a supervisory position within the next two years, ultimately targeting a store manager role for a regional retail chain. She plans
    to enroll in part‑time MBA courses to complement her business background and later explore opening her own boutique that showcases Puerto Rican artisanal products. Her competitive drive fuels a desire
    to lead high‑performing teams, implement data‑driven sales strategies, and become a recognized contributor to community‑focused retail initiatives.
