    ''Practice workflow analysis and improvement'']'
  hobbies: '[''DIY home renovation'', ''Gardening'', ''Watching medical documentaries'', ''Reading non‑fiction (science, history)'', ''Playing chess'', ''Fishing'', ''Spontaneous road trips'', ''Cooking
    new recipes'', ''Volunteering at community health fairs'']'
  career_goals: Michael aims to move into a supervisory role within his clinic, seeking certification as a Certified Medical Manager (CMM) and eventually a bachelor’s degree in Healthcare Administration.
    He is motivated by a competitive drive to become the top-performing medical staff member, spearheading efficiency projects that reduce patient wait times and improve documentation accuracy. He also
    hopes to mentor newer medical assistants, sharing his blend of practical experience and curiosity for emerging health‑tech tools. Long‑term, Michael envisions opening a small health‑coaching practice
    that offers preventive‑care workshops to his community, leveraging his medical background while maintaining flexibility to balance family life.
