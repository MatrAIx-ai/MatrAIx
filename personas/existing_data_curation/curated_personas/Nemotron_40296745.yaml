  career_goals: Karim aims to transition into a senior executive role such as Vice President of Operations, where he can drive digital transformation and embed sustainability into the company's core processes.
    He plans to develop a consulting practice focused on operational excellence combined with creative innovation, helping midsize manufacturers in the Southeast optimize efficiency while fostering inclusive
    workplace cultures. Additionally, he wishes to mentor emerging black professionals in STEM and management, and to contribute to regional economic development initiatives in Chattanooga by partnering
    with local colleges and workforce programs.
