persona_description: This text is likely to be of interest to healthcare professionals, specifically pediatricians, nutritionists, and dietitians, who work with infants, children, and adolescents. It covers
  the core best-practice guidelines on nutrition for these age groups, including assessing and monitoring nutritional status and growth. The text also provides tools and resources to address unique nutritional
  challenges faced by infants and children with disabilities, diseases, and conditions. It features case studies and practical information to help readers apply key pediatric nutrition practices and principles.
  The authors are experts in their practice areas and include case studies using the standardized language of the Nutrition Care Process from The International Dietetics and Nutrition Terminology (IDNT),
  Third Edition, in most chapters. The text also provides access to the 2010 Dietary Guidelines, CDC Growth Charts, Tanner Stages of Sexual Development, Recommended Dietary Allowances/Dietary Reference
  Intakes, and Conversion Tables.
