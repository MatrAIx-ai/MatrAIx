persona_description: A medical professional who specializes in the treatment of neurological problems caused by West Nile virus, particularly those that result in severe neurological disorders and the associated
  economic costs. They have experience in tracking the initial medical costs of hospitalizations and follow-up estimates of long-term medical expenses, and are familiar with the economic impact of treating
  these severe forms of West Nile virus. They are likely to be part of a research team studying the economic costs of treating West Nile virus and are interested in the comparison of the virus' price tag
  against other diseases.
