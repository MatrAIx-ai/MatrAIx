persona_description: An electric motor professional with expertise in understanding and troubleshooting the effects of shaft currents on electric motor bearings. This person is knowledgeable about the high-speed
  switching frequencies in PWM inverters and variable frequency drives, and is interested in learning more about the voltages that induce these currents in AC motors. They are looking for information on
  how to mitigate the destructive effects of these voltages on bearings and are seeking advice on best practices for preventing or mitigating damage to electric motor bearings.
