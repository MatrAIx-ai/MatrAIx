personas:
  professional: Kevin Franklin is a seasoned secondary-school science teacher who blends physics, chemistry, and engineering with visual arts, designing STEAM curricula that spark student curiosity while
    their compassionate, organized yet flexible style nurtures a supportive classroom environment.
  sports: Kevin Franklin frequents the Torrey Pines and Lake Miramar trails with the San Diego Hiking Club, joins a seasonal community soccer league, follows the San Diego Padres and San Diego Wave FC,
    and balances their love of outdoor meditation with regular yoga sessions at a local studio.
  arts: Kevin Franklin spends weekends sketching at the Museum of Contemporary Art San Diego and photographing street murals by artists like Banksy and Shepard Fairey, draws inspiration from the acoustic
    folk of José González and Nick Drake, and curates a small photo series celebrating the interplay of light on coastal architecture.
  travel: Kevin Franklin prefers short, immersive getaways that blend hiking and cultural immersion, such as weekend trips to Joshua Tree, a summer surf excursion in Costa Rica’s Nicoya Peninsula, and a
    cherished vacation to Santorini to capture sunset vistas on canvas.
  culinary: Kevin Franklin enjoys experimenting with Mediterranean‑inspired fusion dishes like grilled octopus with lemon‑oregano vinaigrette and saffron‑infused seafood paella, cooks at an intermediate
    skill level using fresh local fish, olives, feta, and capers, and often pairs meals with a crisp Albariño wine while occasionally burning the edges of a pan‑fried fish filet.
  core: Kevin Franklin merges an artist’s eye with a scientist’s rigor, navigating a life of meticulous planning peppered with spontaneous sketch‑stops, chronic worry about classroom outcomes, and a habit
    of over‑caffeinating before grading late‑night lab reports.
background:
  cultural: Kevin grew up in a middle-class suburban community in Southern California, shaped by the region’s blend of laid-back West Coast lifestyle and a diverse multicultural milieu. As a White American,
    his family traditions include celebrating holidays such as Thanksgiving, Fourth of July, and Christmas with a focus on community gatherings and homemade meals. Living in San Diego has exposed him to
    a rich tapestry of Hispanic, Asian, and Indigenous influences, which he embraces through his appreciation of regional art, cuisine, and outdoor culture. This environment reinforces his value of inclusivity
    and collaboration, prompting him to incorporate diverse perspectives into his teaching. While his personal heritage is grounded in mainstream American customs, Kevin actively seeks out cross-cultural
    experiences—attending local cultural festivals, learning Spanish basics to better connect with his students, and integrating multicultural examples into his STEAM curriculum. His upbringing and current
    surroundings have instilled in him a balanced worldview that honors both his own cultural roots and the broader community’s diversity.
