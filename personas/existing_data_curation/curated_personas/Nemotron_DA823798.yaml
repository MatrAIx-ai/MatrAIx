    instruction and individualized tutoring'', ''Student counseling and mental-health support'', ''Peer mediation and conflict resolution'', ''Grant writing for classroom resources'', ''Community outreach
    and STEM club mentorship'']'
  hobbies: '[''Visiting art museums and sketching exhibits'', ''Photography of coastal and urban scenes'', ''Hiking coastal trails (Torrey Pines, Balboa Park)'', ''Reading science-fiction, popular science,
    and philosophy'', ''Playing acoustic guitar'', ''Experimenting with fusion cooking'', ''Meditation and mindfulness practices'', ''Volunteering for after-school STEM tutoring'', ''Participating in small
    book-discussion groups'', ''DIY electronics projects (Arduino, Raspberry Pi)'']'
  career_goals: Kevin aims to expand his impact beyond the classroom by moving into instructional leadership and curriculum innovation. In the next five years, he plans to earn a Master’s degree in Education
    with a focus on STEAM integration and educational psychology, positioning himself for a role as a department chair or instructional coach. He aspires to design district-wide interdisciplinary programs
    that embed artistic creativity into science education, and to secure sustained funding for hands-on labs and student wellness initiatives. Kevin also hopes to publish research on the effects of mindfulness
    and stress-reduction strategies in high-school science classes, contributing to policies that support student mental health. Ultimately, he envisions a career where he can mentor new teachers, shape
    equitable curricula, and foster a school culture that balances academic rigor with compassion.
