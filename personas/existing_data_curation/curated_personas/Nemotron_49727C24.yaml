  career_goals: Jose aims to leverage his associate’s degree in Computer Science to transfer to a four-year university and earn a bachelor’s in software engineering. He plans to secure an internship at
    a tech startup where he can apply his front-end development skills, eventually becoming a full-stack developer or UI/UX designer with the flexibility to work remotely. Concurrently, he dreams of launching
    a small side venture—a food blog and pop-up taco stall that blends traditional Mexican flavors with Californian twists—allowing him to express his cultural heritage while building entrepreneurial experience.
    He also intends to earn industry certifications such as AWS Cloud Practitioner and Google UX Design to broaden his career options and increase his marketability.
