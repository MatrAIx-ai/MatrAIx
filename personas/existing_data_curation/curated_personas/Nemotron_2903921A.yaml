personas:
  professional: Bertha Comeaux is an 18-year-old facility maintenance apprentice who leverages her hands-on expertise in electrical troubleshooting, HVAC filter replacement, and basic carpentry to keep
    a high-school campus running smoothly, and they apply meticulous documentation and compassionate communication to turn routine work orders into quiet acts of service.
  sports: Bertha Comeaux enjoys low-impact fitness, trekking the Utah County foothills with the Provo Trail Hikers club in spring, occasionally joining a community yoga class for flexibility, and they cheer
    on the Utah Jazz during basketball season while rooting for the BYU Cougars football team in the fall.
  arts: Bertha Comeaux finds artistic solace in the intricate patterns of knitting while listening to the gentle folk melodies of Sufjan Stevens and the classical piano of Ludovico Einaudi, and they occasionally
    visit the Utah Museum of Fine Arts to admire landscape paintings that echo the serenity of their indoor plant collection.
  travel: Bertha Comeaux prefers meticulously planned, low-stimulus trips, favoring solo hikes in Yellowstone and weekend getaways to the serene gardens of Kyoto, and they budget carefully to keep travel
    costs modest while aiming to explore Iceland's remote lava fields within the next two years.
  culinary: Bertha Comeaux leans toward simple, wholesome cooking, often preparing quinoa and roasted vegetable bowls seasoned with rosemary and thyme, while indulging in occasional avocado toast with a
    drizzle of sriracha, and they enjoy quiet evenings sipping chamomile tea after a modest culinary effort.
  core: Bertha Comeaux is an organized, quietly compassionate 18-year-old who turns solitary hobbies like plant care and model building into soothing rituals, yet they battle persistent worry that fuels
    meticulous budgeting and a penchant for over-documenting every repair.
background:
  cultural: Bertha grew up in a middle‑class, predominantly White community in Lehi, Utah, where family and community service are emphasized. Her upbringing was shaped by the region’s strong LDS cultural
    influences, which stress humility, responsibility, and helping others, even though she identifies more with the broader values of cooperation and kindness than formal religious practice. The liberal‑conservative
    blend of the area exposed her to a pragmatic work ethic and a respect for self‑reliance, while the surrounding natural landscape fostered an appreciation for quiet, outdoor spaces. These cultural threads
    combine to reinforce her preference for structure, her compassionate motivation to maintain harmonious environments, and her desire for predictable, low‑stress routines.
attributes:
  skills: '[''Basic electrical troubleshooting'', ''HVAC filter replacement'', ''Routine plumbing repairs'', ''General carpentry'', ''Hand and power tool operation'', ''Preventive maintenance scheduling'',
    ''Work order documentation'', ''Inventory management'', ''OSHA safety compliance'', ''Empathetic communication'']'
  hobbies: '[''Technical reading'', ''DIY electronics projects'', ''Model kit building'', ''Indoor plant care'', ''Meditation and journaling'', ''Nature walks'', ''Knitting and crocheting'']'
  career_goals: Bertha aims to turn her practical experience into a certified career in facilities maintenance. Over the next few years she plans to earn a Certificate in Facility Maintenance and a USDA
    Sustainable Building certification, and eventually complete an associate’s degree in facilities management at a community college. Her goal is to progress from a general repair worker to a facilities
    coordinator in a quiet environment such as a school, library, or small corporate office, where she can ensure safe, well‑maintained spaces for staff and visitors. She values job stability, predictable
    schedules, and the ability to contribute positively to the community, and she hopes to eventually mentor new maintenance staff, sharing her organized approach and compassionate work ethic.
