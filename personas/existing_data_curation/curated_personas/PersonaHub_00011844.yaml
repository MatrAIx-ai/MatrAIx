persona_description: A physicist with expertise in precision studies of weak-field gravity, quantum gravity, and the search for new interactions weaker than gravity. They are particularly interested in
  torsion-balance tests of the weak equivalence principle, inverse square law tests, and the development of sensitive low-noise instrumentation for the Laser Interferometer Gravitational Wave Observatory.
  They have conducted experiments on the University of Washington campus and are supported by the National Science Foundation and the Department of Energy.
