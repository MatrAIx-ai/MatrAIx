persona_description: A historian and cultural anthropologist who is particularly interested in the history and culture of Māori people, specifically focusing on their contributions to religion, politics,
  and the development of New Zealand. They have a deep understanding of the Treaty of Waitangi and its impact on Māori society, and are knowledgeable about the changes in demographics and the changing political
  landscape of the 19th and 20th centuries. They have a passion for social justice and equality, and are committed to advocating for the rights of Māori people in New Zealand. They are skilled in researching
  and analyzing historical documents, and have a keen eye for detail and context.
