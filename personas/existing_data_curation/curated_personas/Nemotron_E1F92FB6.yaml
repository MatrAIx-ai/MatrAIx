personas:
  professional: Leyla Guevara is an aspiring visual storyteller who blends hand‑drawn sketches, watercolor experiments, and digital illustrations on a tablet, while using Scratch to prototype interactive
    narratives, and they channel their curiosity and organized flexibility into disciplined creative projects.
  sports: Leyla Guevara stays active through Saturday salsa dance classes at the community center, plays on her middle‑school soccer team, and cheers for the local professional soccer club City FC, and
    they embody a love for rhythmic movement and team spirit.
  arts: Leyla Guevara immerses herself in fantasy novels like Neil Gaiman’s *The Ocean at the End of the Lane* and graphic novels such as *Saga*, drawing inspiration from artists like Studio Ghibli and
    Hayao Miyazaki, while they listen to folk melodies, mariachi brass, and contemporary Latin pop stars like Carlos Vives, shaping their artistic identity.
  travel: Leyla Guevara dreams of exploring the vibrant street art of Barcelona, the historic plazas of Kyoto, and the ancient stepped pyramids of a famed Mesoamerican site, but currently they channel their
    wanderlust into weekend family trips to a nearby historic town famed for its bustling market and seasonal festivals, balancing school duties and a modest family budget.
  culinary: Leyla Guevara loves helping in the kitchen to prepare masa‑based tamales stuffed with seasoned pork and a hearty pozole soup flavored with hominy, chilies, and cilantro, while they also master
    chocolate‑drizzled churros and experiment with avocado toast topped with lime and queso fresco, reflecting their blend of traditional flavors and youthful curiosity.
  core: Curious and creative yet prone to worry, Leyla Guevara channels their artistic passions into daily sketches, mindfulness routines, and careful allowance management, and they navigate teenage life
    with a blend of organized flexibility and occasional splurges.
background:
  cultural: Leyla is a second-generation Mexican-American living in Aurora, Illinois. At home, Spanish is spoken regularly, and family traditions such as Día de los Muertos altars, festive posadas, and
    cooking homemade tamales are central to her cultural identity. She attends a public middle school where she interacts with peers from diverse backgrounds, and she participates in a local Mexican cultural
    center that offers dance, art, and language programs. Her bicultural experience blends the warmth and collectivist values of her Mexican heritage - respect for family, community involvement, and celebration
    of cultural festivals - with the individualistic and organized aspects of Midwestern American life. These influences are evident in her artwork, which often incorporates vibrant Mexican motifs, and
    in her desire to share her culture through community projects.
