  hobbies: '[''Drawing/sketching'', ''Watercolor painting'', ''Digital illustration'', ''Reading fantasy and graphic novels'', ''Playing puzzle-adventure video games'', ''Beginner coding with Scratch'',
    ''Journaling for stress relief'', ''Listening to Mexican folk and Latin pop music'', ''Salsa dance classes'', ''Cooking traditional Mexican dishes'']'
  career_goals: Leyla hopes to turn her love of art and storytelling into a future career. She aspires to study graphic design or animation in high school and college, with the long‑term goal of becoming
    a concept artist for video games or an illustrator of children's books that celebrate Mexican culture. She plans to attend summer art workshops, build a portfolio of both traditional and digital pieces,
    and seek mentorship through school art clubs. In addition, she wants to use her skills to lead community art projects that raise awareness of cultural diversity and provide younger students with creative
    outlets.
