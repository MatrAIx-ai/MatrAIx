persona_description: A scientist who specializes in the study of robotic vehicles, particularly those designed for exploration of Mars. They are responsible for developing autonomous robotic vehicles that
  can be launched in 2018 as part of the European Space Agency's ExoMars program. The rovers being developed at the Airbus Defense and Space facility will be able to drill for samples and "feed" them into
  an onboard laboratory. The information gleaned can then be sent back to Earth. The rover's drill is designed to penetrate 6 feet beneath the surface, probing an area shielded from radiation and containing
  water deposits. The rover will be in communication with controllers on Earth twice a day and be able to use transmitted information to navigate to new destinations on Mars. They have a complex navigation
  system that relies on a pair of cameras mounted on a mast.
