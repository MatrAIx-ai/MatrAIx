persona_description: A professional astronomer who specializes in the study of space observation and research, particularly in the use of telescopes for studying space objects and supporting education and
  outreach efforts. The individual has expertise in conducting classical astronomical research, addressing national security concerns, and supporting traditional classroom coursework through laboratory
  observing exercises. They are also involved in NASA-funded programs to obtain astrometry and photometry of potentially hazardous near-Earth asteroids, and an NSF-funded program to determine the spin rates
  of Earth-crossing asteroids. The individual is highly skilled in conducting research in the field of space observation and has a passion for sharing their knowledge and expertise through outreach efforts.
