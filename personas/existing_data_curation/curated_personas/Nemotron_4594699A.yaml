  career_goals: She aspires to advance to a senior systems analyst role and eventually become a lead solutions architect, overseeing end‑to‑end technology initiatives for mid‑size enterprises. Vicenta plans
    to earn certifications such as CBAP, PMP, and AWS Solutions Architect to deepen her expertise and broaden her strategic impact. While pursuing these professional milestones, she remains focused on maintaining
    a healthy work‑life balance to support her marriage and future family plans, and she hopes to mentor junior analysts as a way of giving back to her field.
