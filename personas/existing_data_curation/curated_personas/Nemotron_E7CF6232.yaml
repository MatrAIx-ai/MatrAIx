    Little Havana neighborhoods'']'
  career_goals: Looking ahead, Agustín hopes to move into a supervisory role, such as shift lead or senior teller, where he can mentor younger staff and shape the branch’s service culture. He plans to enroll
    in a GED program to formalize his education and later pursue a short certification in community banking to strengthen his expertise in serving Spanish‑speaking customers. Beyond the bank, he dreams
    of creating a small community space that showcases Cuban art and offers financial‑literacy workshops for seniors, blending his love of culture with his professional experience. He also wishes to reduce
    workplace stress by establishing personal routines that balance his flexible work style with moments of quiet reflection.
