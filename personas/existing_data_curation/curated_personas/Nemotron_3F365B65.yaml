  hobbies: '[''Fishing'', ''Hiking'', ''Skiing'', ''Boating'', ''Automotive restoration'', ''Community volunteering'', ''Photography'', ''Reading historical non-fiction'', ''Playing cards'', ''Attending
    local music festivals'']'
  career_goals: As he approaches retirement, Kenneth aims to transition from active driving to a mentorship and supervisory role within the trucking industry. He aspires to become a fleet manager or driver
    trainer for a regional carrier, leveraging his organizational prowess to improve safety standards and operational efficiency. Additionally, he dreams of launching a modest family‑owned delivery service
    that serves the Sandpoint community, providing stable income for his wife and grandchildren while preserving his legacy of dependable service.
