personas:
  professional: Donna Reagin, a 19‑year‑old freight stock mover in the Texas Hill Country, combines forklift expertise, inventory mastery with Fishbowl and NetSuite, and a methodical, safety‑first mindset
    to streamline loading processes while pursuing OSHA certification and an associate degree that will launch them into a supervisory role.
  sports: Donna Reagin joins the Hill Country Trail Runners club for weekend long‑distance runs, supports the Austin FC during the MLS season, and occasionally plays pickup basketball at the local community
    center to stay active, reflecting their competitive spirit and preference for small‑group activities.
  arts: Donna Reagin devotes evenings to acoustic guitar, often layering John Mayer’s fingerpicking style with original folk verses, while crocheting blankets inspired by the muted tones of Ansel Adams’
    black‑and‑white landscapes and reading Agatha Christie mysteries, and they regularly attend poetry readings at the Hill Country Community Library featuring local spoken‑word artists.
  travel: Donna Reagin plans trips with a spreadsheet, preferring weekend road‑trips to rugged destinations like New Mexico’s White Sands and Texas’ Big Bend for hiking and bird‑watching, while dreaming
    of an extended backpacking adventure through Patagonia’s Torres del Paine and a tech‑focused stop in Tokyo, balancing limited college funds with a love for immersive nature experiences.
  culinary: Donna Reagin enjoys hearty Texas Hill Country fare, often cooking smoked brisket with a dry rub of paprika, brown sugar, and coffee grounds, pairing it with fresh avocado salsa, and they relish
    mornings over a strong black coffee with a dash of cinnamon while occasionally experimenting with homemade jalapeño poppers and pecan pie.
  core: Donna Reagin is a solitary, methodical 19‑year‑old logistics enthusiast who balances a competitive edge with a love for nature photography, tends to postpone medical check‑ups, and impulsively splurges
    on camera gear despite a tight budget.
background:
  cultural: Donna was raised in the close‑knit community of Wimberley, a small town nestled in the Texas Hill Country. Her family’s roots trace back several generations to early German and English settlers,
    giving her a Euro‑American cultural identity shaped by the region’s blend of Southern hospitality and rugged individualism. Local traditions—outdoor recreation, country‑music gatherings, church‑based
    service, and a strong work ethic—have instilled values of reliability, modesty, and self‑reliance. While her personal background is predominantly white Texan, she is familiar with the multicultural
    tapestry of Central Texas, including the influence of Tex‑Mex cuisine and community events that celebrate the area’s diverse heritage.
