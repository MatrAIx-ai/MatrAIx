  career_goals: Donna aims to translate her hands‑on experience into a supervisory role within the next three to five years. She plans to acquire OSHA forklift certification and enroll in a community‑college
    associate program in supply chain management, positioning herself for a warehouse lead or logistics coordinator position. In the longer term, driven by her competitive spirit, she aspires to launch
    her own small moving and storage business that emphasizes efficiency, reliability, and data‑driven process improvements while maintaining a safe, organized work environment.
