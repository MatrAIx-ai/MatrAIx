  career_goals: Rosenique aims to advance from her current clerk position to an office supervisor or administrative manager role within the county office or a local small business. She plans to earn a Certified
    Administrative Professional (CAP) credential and complete an associate’s degree in business administration at a community college. Her long‑term ambition is to become a mentor for new clerical staff,
    championing a culture of efficiency and teamwork. She also hopes to lead a digital transformation project that modernizes record‑keeping processes, thereby reducing errors and improving service for
    the community she serves. Balancing career growth with family stability, she seeks a position that offers a clear path for promotion while allowing her to maintain her supportive role at home.
