  hobbies: '[''playing ice hockey'', ''hiking in state parks'', ''camping'', ''nature photography'', ''community gardening'', ''live music events'', ''board-game nights'', ''fitness training'']'
  career_goals: Daniel aims to obtain an International Society of Arboriculture (ISA) Certified Arborist credential within the next two years, which will enable him to advance to a crew supervisor role.
    He aspires to transition from contract work to a stable, benefits‑rich position with the City of Minneapolis Parks Department, where predictable schedules can reduce his stress levels. In the longer
    term, Daniel hopes to start his own small tree‑care business, leveraging his certifications and reputation for reliable, safety‑first service. He also plans to complete a GED program to broaden his
    educational foundation and open up additional career pathways.
