  career_goals: Fady aspires to channel his love of structure and helping others into a career that blends technical expertise with community impact. He is fascinated by civil engineering and envisions
    designing safe, efficient bridges and community facilities that improve daily life in small towns like Hurlock. He also dreams of attaining the Eagle Scout rank, which he sees as a stepping stone toward
    a future as a civil engineer or infrastructure planner. His long‑term ambition includes earning top grades, graduating as valedictorian, and eventually studying engineering at a university where he
    can continue to lead organized, service‑oriented projects.
