personas:
  professional: An aspiring junior programmer, Fady Candiani leverages meticulous organization and disciplined analysis to craft polished Scratch games while simultaneously perfecting LEGO and model airplane
    builds, and they consistently apply systematic problem‑solving techniques.
  sports: Fady Candiani plays forward on the Hurlock Hawks youth soccer team in the fall, practices swimming at the community pool during summer, follows the Baltimore Orioles in baseball, and they incorporate
    daily brisk walks into their routine to stay active.
  arts: Fady Candiani spends free evenings building LEGO Architecture sets to the soundtrack of Hans Zimmer, and they read Isaac Asimov’s “Foundation” series, sketch scenes from Studio Ghibli’s “Spirited
    Away,” and enjoy pop‑rock hits from Imagine Dragons.
  travel: Fady Candiani prefers meticulously planned family trips, having explored the National Air and Space Museum in Washington DC, hiked the waterfalls of Shenandoah National Park, and they dream of
    a future visit to the aviation museum in Tokyo to see historic aircraft up close.
  culinary: Fady Candiani loves crafting mini pepperoni pizzas on a kid‑friendly stovetop, pairing them with carrot sticks and hummus, and occasionally attempts to bake chocolate chip cookies, though they
    tend to over‑mix the batter, leading to denser cookies.
  core: Fady Candiani balances a laser‑sharp love for order with boundless curiosity, obsessively aligning LEGO bricks while they occasionally forget to water the houseplants on weekends.
background:
  cultural: Fady is a White American with an Italian‑American family heritage, reflected in occasional family gatherings centered around traditional Italian dishes like pasta and lasagna. Growing up in
    Hurlock, Dorchester County, Maryland, he experiences the close‑knit, small‑town atmosphere of the Eastern Shore, where community events such as county fairs, church picnics, and local sports fixtures
    shape his social life. His family emphasizes respect for routine, education, and community responsibility, values that align with his organized personality. He celebrates mainstream American holidays—Thanksgiving,
    Christmas, and Fourth of July—while also observing cultural traditions passed down from his grandparents, such as storytelling about his ancestors’ immigration and occasional participation in Italian
    festivals in nearby Baltimore. This blend of regional rural culture and Italian‑American family customs informs his worldview and daily routines.
