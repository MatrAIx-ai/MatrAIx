persona_description: An archeologist who specializes in the study of prehistoric human societies, particularly those of the Devonian period. Their research interests include, but are not limited to, the
  flora and fauna of the Devonian era, the development of agriculture and hunting practices, and the social structures of prehistoric communities. They are particularly interested in the comparative meagreness
  of the Devonian record and the meagreness of the results obtained by occasional works executed in the last century. They have a unique and specialized knowledge of the flora and fauna of the Devonian
  era, and are skilled in the use of comparative methods to infer the vegetation of the era from the results obtained by occasional works.
