  career_goals: He aims to expand his boutique brokerage into a leading multicultural real estate firm in Queens, integrating advanced technology such as AI‑driven market analytics and virtual‑reality tours
    while offering specialized services to the growing Asian‑American community. His ambition includes ranking among the top‑10 agents in sales volume within the borough, earning the Certified Luxury Home
    Marketing Specialist designation, mentoring a new generation of agents, and eventually transitioning to a consulting role focused on sustainable development and community‑oriented housing projects.
    He also plans to give back by establishing a scholarship for local students interested in business and real estate.
