persona_description: A Caltech researcher who specializes in the study of hydrophobicity and superhydrophobicity in insects, particularly the Mono Lake flies. His research interests include the adaptation
  of insects to survive in extreme environments and the mechanisms by which insects maintain their underwater visibility. He is particularly interested in the protective air bubbles surrounding the Mono
  Lake flies and how they allow them to survive in the "wettest water in the world."
