persona_description: A cognitive scientist who specializes in the study of cognitive processes, particularly the mechanisms underlying decision-making and categorization. She is interested in developing
  and testing new theories and models to explain how people make decisions and categorize information. She has experience with various experimental designs and techniques, including those used in the Cognitive
  Atlas, and has a strong background in statistics and data analysis. Her research interests include cognitive psychology, cognitive neuroscience, and decision-making. She is also interested in the relationship
  between cognitive processes and emotional states and has conducted studies on the effects of emotions on decision-making.
