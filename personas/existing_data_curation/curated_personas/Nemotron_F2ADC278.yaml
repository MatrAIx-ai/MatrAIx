personas:
  professional: Jose Sotogonzalez is a pipefitter who blends solid technical prowess in pipe, steam, and MIG/TIG welding with a knack for reading complex schematics, and leverages his bilingual fluency
    to bridge communication between English‑speaking contractors and Spanish‑speaking clients; while he prefers a structured workflow and aims for journeyman and eventually master certification, his natural
    outgoing energy sometimes leads to a relaxed approach to scheduling, yet he consistently steps up to guide apprentices and mentor new immigrant workers.
  sports: Jose Sotogonzalez anchors a forward position on the community soccer team “Merrimack County Rovers,” where the camaraderie mirrors his teamwork on job sites, and when the season pauses he hikes
    the White Mountains, often tackling the Franconia Ridge Trail; he proudly wears a Boston Red Sox cap and cheers for the New England Patriots during football season, balancing competitive play with a
    laid‑back approach to personal fitness.
  arts: Jose Sotogonzalez frequents salsa and cumbia nights at the local “Casa de la Salsa,” where he spins to the rhythms of Celia Cruz and Carlos Vives, and he regularly attends performances by the regional
    folk ensemble “Nuevo Horizonte”; his love for music fuels his cooking gatherings, and he occasionally joins an amateur drumming circle, reflecting his outgoing nature and deep appreciation for Latin
    dance culture.
  travel: Jose Sotogonzalez has explored the highlands of his parents’ homeland on family reunions, cherished weekend getaways to the White Mountains and historic Boston, and dreams of trekking the trail
    to Machu Picchu and strolling through Barcelona’s Gothic Quarter; his travel style fuses spontaneous road trips with a modest budget, often booking last‑minute stays in hostels while saving a portion
    of his earnings for future international adventures.
  culinary: Jose Sotogonzalez is a self‑taught chef who marvels at cooking pepian with roasted pumpkin seeds, slow‑cooked turkey, and a blend of annatto and cinnamon, and he rolls tamales using masa, pork
    shoulder, and a hint of tomatillo salsa, often layering corn husks with fresh cilantro and lime; his kitchen skills range from simmering stews to mastering proper grill sear, and he loves sharing these
    dishes at neighborhood potlucks.
  core: Jose Sotogonzalez is a hardworking pipefitter who balances a love for community soccer, salsa dancing, and cooking hearty stews with an occasional struggle to keep finances and health routines organized,
    all while dreaming of starting his own mentoring‑focused contracting firm.
background:
  cultural: Jose was born to Guatemalan immigrant parents and grew up in a bilingual household that celebrated Catholic traditions, Semana Santa processions, and Guatemalan Independence Day. His family’s
    emphasis on hard work, hospitality, and close‑knit community ties shaped his values and work ethic. In Haverhill, he stays connected to his roots by participating in local Latin festivals, cooking family
    recipes, and speaking Spanish with neighbors and coworkers. This cultural grounding gives him a sense of identity and motivates his desire to mentor younger Guatemalan and Latino newcomers to the trade.
attributes:
  skills: '[''Pipefitting'', ''Steamfitting'', ''MIG/TIG welding'', ''Blueprint reading'', ''Hydraulic and pneumatic system troubleshooting'', ''OSHA 30‑hour safety certification'', ''Team coordination'',
    ''Bilingual communication (Spanish/English)'']'
  hobbies: '[''Community soccer league'', ''Salsa and cumbia dancing'', ''Cooking traditional Guatemalan dishes'', ''Hiking in New England state parks'', ''Volunteer mentorship for immigrant youth'', ''Listening
    to Latin rock and reggaeton music'', ''DIY car maintenance'']'
  career_goals: Jose aims to earn his Journeyman Pipefitter license within the next year and eventually achieve Master Pipefitter certification. He hopes to move into a foreman role where he can blend his
    technical expertise with structured project planning, while still preserving the flexibility he values. Long‑term, he dreams of launching a small, family‑oriented contracting firm that serves both the
    Haverhill community and the growing Latino workforce, providing mentorship opportunities for apprentices from similar backgrounds. Completing his associate degree in mechanical technology is also a
    stepping stone toward greater management responsibilities.
