personas:
  professional: Nathalie Santiago, a high‑school sophomore with a budding career as a visual storyteller, blends hand‑drawn illustration with digital tools, harnesses bilingual writing to craft graphic‑novel
    scripts, and applies their methodical planning to meet art‑club deadlines.
  sports: Nathalie Santiago follows the Los Angeles Lakers basketball team avidly, attends their high school’s varsity soccer games on weekends, and maintains a casual jogging routine at the neighborhood
    park to stay active, they also enjoy discussing game stats with friends after matches.
  arts: Nathalie Santiago immerses themselves in artistic worlds ranging from Frida Kahlo’s vivid folk motifs and Alex Ross’s hyper‑realistic comic illustrations to Hayao Miyazaki’s animated storytelling,
    and they frequently recreate these styles in their own sketchbooks.
  travel: Nathalie Santiago has explored the historic streets of Santa Fe and the bustling markets of Oaxaca with their family, dreams of wandering the canals of Venice, and carefully plans each school
    trip with a blend of research and a keen eye for local art museums, they also keep a travel journal to capture sketches of each destination.
  culinary: Nathalie Santiago enjoys cooking family‑style traditional dishes such as tamales, pozole, and salsa verde, has a solid intermediate skill level that lets them follow recipes with precision,
    yet occasionally burns toast in their quest for the perfect crunch, they often share the meals with siblings and grandparents.
  core: Nathalie Santiago fuses meticulous organization with boundless creative curiosity, often arranging their art supplies by color while day‑dreaming about graphic‑novel plots, and has a habit of doodling
    in the margins of school notebooks despite looming deadlines, they sometimes lose track of time when immersed in a new story idea.
background:
  cultural: Nathalie’s family roots are in Mexico, and she grew up in a bilingual household where Spanish is spoken daily alongside English. She celebrates Mexican traditions such as Día de los Muertos
    and Las Posadas with her extended family, and she is familiar with folk arts like papel picado and Talavera tiles. Living in Santa Paula, a community with agricultural ties, she is aware of the immigrant
    experience and values the sense of community and family solidarity. These cultural influences shape her appreciation for vibrant colors, storytelling, and community‑oriented projects.
attributes:
  skills: '[''digital illustration'', ''sketching'', ''creative writing'', ''time management'', ''bilingual Spanish-English translation'', ''event planning'', ''research'']'
  hobbies: '[''drawing'', ''digital art'', ''reading graphic novels'', ''creative writing'', ''visiting museums'', ''attending cultural festivals'', ''cooking Mexican cuisine'', ''gardening'', ''journaling'',
    ''sandbox video games'']'
  career_goals: Nathalie envisions herself pursuing a career in visual communication, hoping to study graphic design or illustration at a university with a strong art program. She dreams of creating culturally
    resonant artwork that celebrates Mexican heritage and aims to work as a community arts coordinator or museum curator, where she can blend her organizational talents with her passion for art and cultural
    storytelling. In the short term she plans to build a strong portfolio, attend summer art camps, and seek mentorship from local artists.
