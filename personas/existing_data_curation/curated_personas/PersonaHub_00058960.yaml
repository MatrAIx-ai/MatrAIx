persona_description: A meteorologist who is interested in analyzing and interpreting weather patterns, particularly those related to the Arctic Oscillation (AO) and its impact on temperature, precipitation,
  and atmospheric circulation. This persona is likely to be interested in the unique and unusual weather patterns observed during the 2012 and 2013 winters, particularly the differences in the circulation
  around the upper ridge and the impact on the temperature and precipitation in the northern plains. This persona may also be interested in the role of the snowpack in the regeneration and sustaining of
  the colder airmass.
