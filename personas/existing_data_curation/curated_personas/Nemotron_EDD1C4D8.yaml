personas:
  professional: Clare Pena, a retired cultural event coordinator, channels decades of neighborhood festival experience into volunteer work at the Hialeah senior center, where they teach cooking classes,
    translate bilingual communications, and manage modest program budgets with a relaxed, flexible approach.
  sports: Clare Pena enjoys low‑impact fitness, taking daily walks through their garden, joining a senior shuffleboard league at the local community center, and cheering on the Miami Heat and Miami Marlins
    from their balcony, preferring leisurely activity over high‑intensity sport.
  arts: Clare Pena immerses in the arts by painting watercolors of sunset horizons reminiscent of South Florida skies, sketching street scenes inspired by memories of Havana, listening to classic son and
    contemporary salsa from icons like Celia Cruz, and regularly admiring works by Frida Kahlo and Georgia O’Keeffe while attending intimate performances featuring actors such as Lin‑Manuel Miranda.
  travel: Clare Pena prefers relaxed, culturally immersive trips, using senior discounts to explore the historic streets of Old Havana on a guided group tour, while also enjoying local excursions to the
    Everglades and Key West, and they plan future voyages with a mix of careful budgeting and spontaneous detours.
  culinary: Clare Pena specializes in home‑cooked, herb‑infused dishes like ropa vieja, lechón asado, and sweet plantain pastelitos, skillfully blending garden‑grown cilantro, oregano, and lime into each
    recipe while sharing handwritten recipe cards with neighbors and occasionally experimenting with new flair like a dash of smoked paprika.
  core: Clare Pena is a relaxed, curiosity‑driven cultural steward who nurtures a tropical garden, paints vivid watercolors, and shares beloved family recipes, all while they navigate senior life with gentle
    disorganization and a generous heart.
background:
  cultural: Clare was born to Cuban immigrant parents who settled in Hialeah, a vibrant enclave of Cuban-American life. Raised in a bilingual household, she grew up immersed in the rhythms of Afro‑Cuban
    percussion, the aromas of her mother's kitchen, and the Catholic traditions of her community, celebrating fiestas like San Juan and the annual Calle Ocho celebration. Family ties and the principle of
    familismo have shaped her values of cooperation and mutual support. While she maintains strong connections to her Cuban roots—through food, music, and language—she also embraces the multicultural fabric
    of Miami‑Dade County, often acting as a bridge between older Cuban residents and newer, diverse neighbors.
attributes:
