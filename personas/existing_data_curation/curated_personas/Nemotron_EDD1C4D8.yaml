  hobbies: '[''Gardening tropical herbs and flowers'', ''Watercolor painting'', ''Sketching cultural scenes'', ''Listening to Cuban music'', ''Small‑group salsa dancing'', ''Reading historical fiction and
    poetry'', ''Volunteering at community art events'']'
  career_goals: Although retired from formal work, Clare aims to deepen her engagement with the local Cuban community by volunteering as a cultural ambassador at the Hialeah senior center, teaching cooking
    classes and sharing the stories behind traditional dishes. She wishes to document her family's migration narrative in a handwritten memoir that she plans to digitize and share online. Clare also hopes
    to enroll in short art workshops at a nearby community college to experiment with watercolor painting, and she dreams of making a short trip to Cuba to reconnect with relatives and experience contemporary
    Cuban arts firsthand.
