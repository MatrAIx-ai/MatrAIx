  hobbies: '[''Reading popular science'', ''Hiking'', ''Yoga'', ''Tennis'', ''Strategic board games'', ''Robotics club mentorship'', ''Gardening'']'
  career_goals: Sophia aims to advance into educational leadership as a department head or assistant principal within the next five years, focusing on expanding STEM opportunities. She plans to earn a Master’s
    in Educational Leadership, lead a district-wide STEM curriculum overhaul, and secure additional funding for hands‑on lab resources. She also aspires to mentor new teachers, publish articles on evidence‑based
    teaching practices, and organize community outreach programs that inspire middle‑school students to pursue STEM fields.
