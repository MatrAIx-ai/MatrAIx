personas:
  professional: Felix Miura, an 18-year-old accelerated STEM undergraduate, blends a pragmatic engineering mindset with a love for collaborative coding, translating data-heavy research into clean, reproducible
    software pipelines while juggling soccer practices and guitar sessions.
  sports: Felix Miura plays midfield for a local Central Florida soccer league, cheers on Orlando City SC during the MLS season, and spends weekends trail-running through the Ocala National Forest to stay
    fit, though they sometimes skip cross-training after long gaming sessions.
  arts: Felix Miura strums acoustic guitar to the tunes of Andres Segovia and John Mayer, devours sci-fi novels by Neal Stephenson and Liu Cixin, and attends occasional indie film screenings featuring directors
    like Guillermo del Toro, letting creative moments balance their analytical studies.
  travel: Felix Miura explores Florida's natural gems like the Everglades and the crystal springs of Crystal River, has trekked to Cusco to sample authentic ceviche, and dreams of backpacking the Patagonian
    Andes, preferring DIY itineraries over guided tours despite a limited travel budget.
  culinary: Felix Miura experiments with traditional Peruvian recipes such as ceviche with lime and cancha, lomo saltado using a wok, and aji de gallina spiced with aji amarillo, while also mastering the
    art of grilling marinated chicken thighs for weekend gatherings, though they sometimes over-salt the dishes while humming guitar chords.
  core: Felix Miura is an 18-year-old tech-savvy guitarist who fuses structured coding with spontaneous outdoor adventures, balancing disciplined study with a laid-back approach to money, health, and community.
background:
  cultural: Felix was raised in a bilingual household that blends Peruvian traditions with Floridian culture. His family celebrates Peru's national holidays such as Fiestas Patrias and Inti Raymi, and they
    keep customs like communal meals featuring ceviche, quinoa, and causa. Fluent in both Spanish and English, Felix often acts as a cultural bridge in his community, sharing Peruvian music, dance, and
    stories while also embracing the diverse influences of the Orlando metropolitan area. The strong family ties and emphasis on hospitality from his Peruvian heritage shape his cooperative and considerate
    outlook.
