personas:
  professional: Jawad Munilla is an aspiring junior scientist who loves tinkering with simple science kits, constructing detailed LEGO models, and debugging Minecraft redstone contraptions, using their
    curiosity‑driven yet practical mindset to turn wild ideas into workable experiments despite occasional disorganization.
  sports: Jawad Munilla channels their energy into after‑school soccer, playing as a forward for the community club Riverdale Rovers and cheering for Manchester United in the Premier League, while also
    joining a local summer baseball camp and following the Chicago Cubs for lessons in teamwork.
  arts: Jawad Munilla immerses themselves in comic art, sketching original heroes inspired by Stan Lee and Bill Watterson while blasting upbeat tracks from BTS and Imagine Dragons, often improvising background
    scores on a cheap keyboard to match the pace of their drawings.
  travel: Jawad Munilla loves spontaneous weekend trips to nearby state parks like Yellowstone and the local Redwood Trail, dreaming of future adventures to the Great Barrier Reef and Kyoto, but their family
    budget steers them toward affordable camping outings and short drives to city museums.
  culinary: Jawad Munilla favors bold flavor combos, often mixing cheddar cheese, pepperoni, and pineapple on homemade pizza, and they proudly concoct a cauliflower‑crust pizza after watching a YouTube
    tutorial, while also enjoying simple snack‑time bowls of rice with soy sauce and steamed carrots.
  core: Jawad Munilla is a curious, ever‑inventive nine‑year‑old who builds sprawling LEGO kingdoms, drafts comic strips on a napkin, and forgets to tidy up their workspace, all while they hum the latest
    pop hits and chase after a soccer ball.
background:
  cultural: Jawad grows up in a middle‑class, predominantly white family in Federal Way, Washington. His household celebrates common American holidays such as Thanksgiving and the Fourth of July, participates
    in community sports leagues, and values cooperation and harmony. The family encourages curiosity, practical learning, and involvement in local community events.
