persona_description: A hydrogeologist who is interested in the study of groundwater hydrology and the management of water resources. The person is likely to be familiar with the Atlas of Ground-Water Hydrology
  and its comprehensive coverage of the principal aquifers of the United States. They may have a background in hydrogeology, geology, or a related field, and are interested in using the Atlas to understand
  the regional geology, permeability, and ground-water movement of the principal aquifers. They may also be interested in using the Atlas to plan and manage future water supplies, predict areas where overdrafting,
  saltwater encroachment, or contamination are likely to occur, and so on.
