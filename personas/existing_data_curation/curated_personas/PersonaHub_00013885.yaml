persona_description: An ichnologist who specializes in the study of burrows, particularly those made by vertebrate animals, and has expertise in the use of ground-penetrating radar (GPR) to study these
  burrows. The ichnologist has conducted research on the preservation potential of burrows and their comparison to burrows made by other animals in the geologic past. The ichnologist has used GPR to study
  gopher-tortoise burrows on St. Catherines Island in Georgia and has plans to present their findings at a geological conference.
