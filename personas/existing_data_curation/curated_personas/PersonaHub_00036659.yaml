persona_description: Valeria Alvarado, a dedicated advocate for immigrants and refugees, who has created "We, Too, Are America" to share stories of the undocumented, refugee, and immigrant community. Her
  story of coming from Mexico to the United States as a child has inspired her to use her platform to educate and empower others. She is interested in the challenges faced by immigrants and refugees in
  Houston and is willing to share her knowledge and experience with students to help them understand and connect with their experiences.
