persona_description: A professional with expertise in international forestry and environmental policy, who has participated in various international workshops and conventions. They are interested in exploring
  and implementing proposals to address the underlying causes of deforestation and forest degradation, including through the development of integrated national policies, improved data collection and dissemination,
  and better certification processes for forest products. They are also interested in exploring the role of civil society in international negotiations and ensuring the participation of indigenous peoples
  and local communities in decision-making processes.
