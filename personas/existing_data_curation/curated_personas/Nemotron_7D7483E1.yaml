  hobbies: '[''Reading fantasy and science books'', ''Drawing animal illustrations'', ''Journaling'', ''Puzzle solving'', ''Scratch animation'', ''Exploring local nature trails'', ''Collecting natural specimens'',
    ''Playing piano'']'
  career_goals: Victoria hopes to eventually become a wildlife biologist or environmental scientist, combining her love for nature and systematic inquiry. She also envisions working on interactive educational
    software that helps other kids learn about ecosystems, reflecting her practical curiosity. In the near term, she aims to improve her coding abilities, participate in science fairs, and volunteer at
    the local library to develop research and communication skills.
