personas:
  professional: An aspiring young naturalist named Victoria Cofer, who spends weekends cataloguing riverbank finds and turning observations into detailed sketchbooks, applies both their curious imagination
    and methodical note‑taking to school science projects, while they quietly offer help to classmates when challenges arise.
  sports: A nature‑oriented athlete named Victoria Cofer enjoys solo hiking along the Sacramento River trails and practicing beginner swimming at the community pool, cheers for the Sacramento Kings during
    basketball season, and occasionally joins the local River Edge Explorers club to log their weekend treks.
  arts: An imaginative artist named Victoria Cofer fills sketchbooks with detailed Audubon‑style animal illustrations, composes gentle piano pieces reminiscent of Debussy’s Arabesque, creates short Scratch
    animations inspired by Miyazaki’s fantastical worlds, and collects quotes from J.K. Rowling’s wizarding tales to fuel their creative journaling, while they quietly attend the library’s weekly art showcase.
  travel: An organized explorer named Victoria Cofer prefers meticulously planned weekend trips to nearby natural sites like Lake Tahoe and Yosemite, where they hike and collect geology specimens, while
    also day‑dreaming about future family visits to the Smithsonian National Museum of Natural History in Washington, D.C., balancing a love for orderly itineraries with spontaneous river‑bank discoveries.
  culinary: A budding home chef named Victoria Cofer enjoys assembling simple meals such as spaghetti with marinara sauce, apple slices with peanut butter, and vegetable stir‑fry with snap peas and carrots,
    often cooking while listening to classical piano, and their favorite snack is a granola bar with honey and dried cranberries, though they sometimes forget to clean the kitchen promptly after cooking.
  core: Victoria Cofer, an inquisitive 11‑year‑old who balances quiet curiosity with practical organization, spends time sketching river wildlife, solving puzzles, and softly mastering piano, all while
    navigating school, savings, and solo adventures with a gentle, considerate spirit.
background:
  cultural: Victoria is a White American girl growing up in Red Bluff, a small town in Tehama County, Northern California. Her family reflects the region’s blend of rural values and modest suburban life,
    with strong emphasis on self‑reliance, community involvement, and appreciation for the surrounding farmland and river ecosystems. The local culture includes annual county fairs, school‑based extracurricular
    programs, and a close‑knit community where neighbors often support each other. While she shares mainstream American cultural experiences such as school sports events and popular media, she also values
    the quieter, nature‑focused aspects of her surroundings, which shape her interests and worldview.
