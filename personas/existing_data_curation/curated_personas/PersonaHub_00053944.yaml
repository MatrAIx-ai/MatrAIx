persona_description: A researcher who is conducting research as outlined in the text, which involves systematic inquiry and the collection, documentation, and analysis of data, in accordance with suitable
  methodologies set by specific professional fields and academic disciplines. This researcher is particularly interested in evaluating the validity of a hypothesis or an interpretive framework, assembling
  a body of substantive knowledge and findings for sharing, and generating questions for further inquiries. This researcher is familiar with the process of reviewing and approving research by the Institutional
  Review Board (IRB) at Hampshire before proceeding with their research. This researcher may be conducting research that is limited to secondary analysis of data, records, or specimens that are either publicly
  available, de-identified, or otherwise impossible to be linked to personal identities, in which case the researcher may still need IRB approval to do their project. This researcher is likely to be interested
  in understanding the specific ways different schools at Hampshire think about research and the types of research that fall under the purview of the IRB.
