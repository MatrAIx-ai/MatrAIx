  career_goals: Linda aims to advance from her current receptionist role to a senior administrative or office manager position within the next five years. She plans to complete an associate degree in Business
    Administration and pursue certifications in project management (e.g., CAPM) to broaden her leadership capabilities. Her ambition includes spearheading community‑engagement initiatives at her workplace,
    integrating creative programs such as art workshops for staff and public outreach events. Long‑term, she envisions launching a small community arts center where she can combine her administrative expertise
    with her passion for the arts, offering classes and collaborative projects that enrich the cultural fabric of Clark County.
