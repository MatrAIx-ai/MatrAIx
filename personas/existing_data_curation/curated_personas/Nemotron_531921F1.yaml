personas:
  professional: Linda Tittley, a 38‑year‑old receptionist with a knack for streamlining front‑desk operations, leverages their meticulous organizational skills and creative flair to design eye‑catching
    Canva flyers and coordinate office events, while quietly positioning themselves for a future office‑manager role through business coursework and project‑management certification.
  sports: Linda Tittley is an avid hiker of the Columbia River Gorge trails, a regular participant in community yoga sessions at the local studio, and a devoted fan of the Seattle Seahawks, often joining
    a weekend pickup volleyball game organized by their board‑game group.
  arts: Linda Tittley immerses themselves in the Pacific Northwest art scene, painting abstract acrylics inspired by the misty Gorge, frequenting gallery openings featuring artists like Mark Rothko and
    Yayoi Kusama, and reciting contemporary poets such as Ocean Vuong while volunteering at the county library’s reading programs.
  travel: Linda Tittley prefers short, purposeful getaways that blend nature and culture, planning weekend trips to the Oregon Coast to collect driftwood for art projects, savoring the food scene in Portland,
    and dreaming of a month‑long study tour of European art museums after saving through a disciplined travel budget.
  culinary: Linda Tittley experiments with seasonal produce like heirloom tomatoes, rainbow chard, and foraged mushrooms, often crafting vibrant ratatouille‑style stews or fermenting their own kombucha,
    while they keep their cooking skill at an intermediate level, marked by a habit of over‑seasoning to compensate for a tendency to multitask.
  core: Linda Tittley, a 38‑year‑old office‑pro with a boundless imagination, balances an orderly work life with spontaneous art projects, hikes, and they have a habit of splurging on craft supplies that
    sometimes jeopardizes their budget.
background:
  cultural: Linda is a white American of primarily German‑Irish heritage, raised in a suburban setting in the Pacific Northwest. Growing up in a region known for its natural beauty and progressive community
    values, she developed an appreciation for outdoor recreation, environmental stewardship, and cultural diversity. Her family emphasized self‑reliance, education, and community involvement, which shaped
    her collaborative yet assertive outlook. Living in Vancouver, Washington, she is woven into the multicultural tapestry of Clark County, regularly interacting with neighbors from varied backgrounds and
    participating in local festivals that celebrate the area’s Indigenous history and contemporary cultural blend. This blend of heritage and regional influence informs her openness to new ideas, respect
    for tradition, and commitment to contributing positively to her community.
