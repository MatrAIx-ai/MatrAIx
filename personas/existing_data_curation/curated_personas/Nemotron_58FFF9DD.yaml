personas:
  professional: Jacob Lee is an aspiring junior builder and coder who translates the methodical approach nurtured by his small-town upbringing into detailed LEGO constructions and interactive Scratch games,
    blending curiosity with practicality while often working alone in the quiet of his backyard workshop, and they consistently follow through on each project plan.
  sports: Jacob Lee enjoys low‑key outdoor activity, spending weekends hiking in the nearby Appalachians and participating in the local Little League baseball team, while cheering on the Nashville Predators
    and the Tennessee Titans from the family’s living room TV, and they occasionally help set up the town’s baseball gear after the county fair.
  arts: Jacob Lee expresses creative flair through meticulous sketches of birds and rock formations, listening to folk‑rock storytellers like The Avett Brothers and the lyrical fantasy scores of Howard
    Shore, admiring the detailed illustrations of Brian Froud, and they often incorporate these visual inspirations into their Scratch narratives.
  travel: Jacob Lee’s travel style centers on solo, nature‑focused trips, such as camping in Great Smoky Mountains National Park and exploring the historic rail trails of Knoxville, while dreaming of a
    future visit to Washington, D.C.’s Smithsonian National Air and Space Museum for its aerospace exhibits, and they always pack a field notebook for observations.
  culinary: Jacob Lee favors hearty Southern comfort foods, often requesting meat‑loaf, homemade biscuits, and blueberry pancakes, and they occasionally help the family garden to harvest fresh tomatoes
    for their prized spaghetti sauce, yet they reliably skip the broccoli side at dinner.
  core: Jacob Lee is a methodical, introverted young explorer who balances scientific curiosity with a practical, worry‑prone mindset, finding solace in solitary LEGO builds, nature hikes, and meticulous
    planning.
background:
  cultural: Jacob was raised in Rickman, a small town in Overton County, Tennessee. The community reflects Southern Appalachian traditions, with strong ties to local churches, county fairs, and outdoor
    recreation. Family gatherings often involve potlucks and storytelling, emphasizing self‑reliance, respect for nature, and the value of education. The rural setting fosters his appreciation for quiet,
    natural environments and reinforces his methodical, practical approach to tasks.
attributes:
  skills: '[''Reading comprehension'', ''Scratch programming'', ''LEGO construction'', ''Puzzle solving'', ''Elementary ecology knowledge'', ''Organizational skills'']'
  hobbies: '[''Reading adventure novels'', ''LEGO model building'', ''Nature walks and wildlife observation'', ''Scratch programming'', ''Kid‑friendly Sudoku and logic puzzles'', ''Sketching and drawing'']'
  career_goals: Jacob dreams of a career that blends practicality with his love of technology and the outdoors. He hopes to become a civil engineer who designs sustainable bridges and community projects
    in rural Tennessee, or a software developer who creates educational games about nature. He plans to attend a STEM‑focused high school, earn scholarships for engineering or computer science, and eventually
    apply his skills to improve his hometown’s infrastructure while preserving its natural beauty.
