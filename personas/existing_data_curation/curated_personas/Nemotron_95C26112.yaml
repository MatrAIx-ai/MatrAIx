personas:
  professional: Michael Hinojosa, a curious three‑year‑old, builds intricate block towers and pretends to run a tiny “construction company”, showing an early knack for spatial thinking while favoring spontaneous
    play over rigid schedules.
  sports: Michael Hinojosa, a budding athlete, enjoys the Little Kickers soccer program at the local park, loves splashing in toddler swimming classes, and watches the Chicago Cubs broadcasts with fascination,
    preferring small‑team practices over large crowds.
  arts: Michael Hinojosa, an avid little creator, spends hours with Crayola crayons drawing whimsical scenes, delights in listening to the playful songs of Raffi and watching Pixar short films, and cherishes
    storytime with Dr. Seuss books.
  travel: Michael Hinojosa, a miniature explorer, has visited the interactive Children’s Museum of Indianapolis and coast‑line beach trips to Clearwater, dreaming of a future family vacation to Tokyo’s
    Ghibli Museum, always favoring short, family‑focused itineraries with plenty of rest breaks.
  culinary: Michael Hinojosa, a picky yet enthusiastic eater, loves mac and cheese smothered in cheddar, chicken nuggets, apple slices, and insists on golden‑crisp Goldfish crackers for snacks, often refusing
    vegetables unless they’re cut into fun shapes.
  core: Michael Hinojosa, a three‑year‑old explorer, blends boundless curiosity with a sweet spot for solo play, a love of art, and a habit of hoarding shiny coins while keeping a relaxed, flexible approach
    to daily routines.
background:
  cultural: Michael is raised in a white American family in Kingston, New York. His family celebrates traditional U.S. holidays such as Thanksgiving and Christmas, often takes weekend trips to the Catskill
    region, and participates in local community events. His parents value exposure to diverse cultures through picture books, music, and occasional visits to cultural festivals, while his everyday environment
    reflects the suburban American lifestyle of Ulster County.
