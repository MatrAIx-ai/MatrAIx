  hobbies: '["Gardening", "Woodworking", "Birdwatching", "History Reading", "Model Shipbuilding", "Volunteer at Food Pantry", "Card Games (Bridge)", "Walking Trails", "Genealogy Research", "Cooking"]'
  career_goals: Although no longer in the paid workforce, Juan is driven to remain a vital contributor to his community. He plans to expand his mentorship role by teaching DIY home‑repair and woodworking
    to youth through local after‑school programs. He is also interested in deepening his knowledge of smart‑home technology and sustainable gardening, intending to lead workshops at the Monroe Township
    senior center. Juan hopes to author a series of short articles on the township’s local history for the historical society’s newsletter, and to obtain a volunteer first‑responder certification so he
    can assist in emergency preparedness efforts. Maintaining his health and independence through regular physical activity and continued learning remains a core personal ambition.
