  hobbies: '[''Oil painting'', ''Woodworking'', ''Genealogy research'', ''Reading historical fiction'', ''Attending community theater'', ''Bird watching'', ''Gardening'', ''Traveling to art festivals'',
    ''Chess club'', ''Volunteer docent at local library'']'
  career_goals: In his post‑retirement years, Andy aims to consolidate his passion for local history and art. He plans to write and self‑publish a family memoir that weaves genealogical findings with stories
    from New London’s past. He also aspires to curate a traveling exhibit of his oil paintings in regional community centers and to lead a series of workshops on woodworking and historical research for
    seniors. Additionally, he hopes to serve on the board of the New London Historical Society, helping secure funding for preservation projects and mentoring younger volunteers.
