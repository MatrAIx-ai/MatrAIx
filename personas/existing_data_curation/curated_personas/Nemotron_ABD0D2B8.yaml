personas:
  professional: Peter Colon is an aspiring automotive technician who, after completing his GED, plans to enroll in a vocational automotive technology program, leveraging his hands‑on experience with his
    family’s pickup truck to build a routine‑focused career that eventually leads to a small community garage and a weekend taco‑stand, and they are determined to support their parents with a stable income.
  sports: Peter Colon spends his free time fishing at Lake Alamo as a member of the local Alamo Fishing Club, while cheering on the Dallas Cowboys in the fall and the Houston Astros during baseball season,
    and they occasionally join pickup basketball games at the community park to stay active.
  arts: 'Peter Colon frequently listens to norteño and ranchera greats such as Los Tigres del Norte and Vicente Fernández while cooking or building scale model cars, and they unwind with single‑player strategy
    video games like Civilization VI and read graphic novels such as Batman: The Killing Joke, which together shape their quiet yet competitive creative outlet.'
  travel: Peter Colon has visited Laredo and made a family road trip to Mexico City, dreams of exploring the historic streets of Oaxaca for its renowned tacos al pastor, and they hope to hike the rugged
    trails of Big Bend National Park on a future solo adventure.
  culinary: Peter Colon expertly prepares tacos al pastor with achiote‑marinated pork, pineapple, and cilantro, also makes sopes topped with refried beans and queso fresco, often experiments with homemade
    salsa roja while listening to ranchera, and they occasionally let their kitchen become cluttered with model‑car tools, reflecting a passionate but slightly chaotic cooking style.
  core: Peter Colon is a routine‑driven, solitary 18‑year‑old who balances hands‑on auto work, quiet gaming, and weekend fishing, while they juggle a modest savings habit, occasional health worries, and
    a budding entrepreneurial dream of a family garage and taco stand.
background:
  cultural: Peter is a first‑generation Mexican‑American raised in Alamo, Texas, a community with strong cross‑border cultural ties. His household celebrates traditional Mexican holidays such as Día de
    los Muertos, Mexican Independence Day, and the Feast of Our Lady of Guadalupe, blending religious observance with family gatherings and food. Spanish is the primary language spoken at home, while he
    acquired conversational English through school and community interactions. He grew up immersed in regional customs, from enjoying street‑side tacos to listening to the local radio stations that play
    norteño, corridos, and mariachi. These cultural influences shape his food preferences, music taste, and communal values, even as he prefers solitary pursuits. His family emphasizes hard work, respect
    for elders, and maintaining modest, practical lifestyles, all of which resonate with his routine‑oriented personality.
attributes:
  skills: '[''automotive basic maintenance'', ''preparing traditional Mexican cuisine'', ''bilingual Spanish‑English communication'', ''basic computer and smartphone usage'', ''yard and garden upkeep'',
    ''cash handling and budgeting'']'
  hobbies: '[''single‑player video gaming'', ''fishing'', ''building scale model cars'', ''listening to norteño and ranchera music'', ''reading graphic novels'', ''cooking family recipes'']'
  career_goals: Peter aims to obtain his GED within the next year and then enter a vocational training program for automotive technology, a field that aligns with his hands‑on skills and desire for a stable,
    routine career. He envisions working as an auto‑service technician at a local shop, eventually gaining enough experience to open a small, family‑run garage that serves the Alamo community. In the longer
    term, he hopes to supplement his income by offering a weekend taco‑stand featuring his family’s recipes, combining his culinary talent with entrepreneurial ambition. He is motivated by the prospect
    of financial independence that allows him to support his parents and maintain a predictable daily schedule.
