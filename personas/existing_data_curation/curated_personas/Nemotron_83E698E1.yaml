  hobbies: '["Visiting art galleries and sketching", "Painting and drawing", "Reading non-fiction (art history, psychology, technology)", "Journaling", "Yoga and mindfulness meditation", "Patio gardening",
    "Seasonal cooking", "Book discussion group", "Volunteering arts‑and‑crafts workshops for seniors", "Listening to indie folk music"]'
  career_goals: Karen is determined to finish her bachelor’s degree in Business Administration or Human Resources, using the credential to qualify for a higher‑level management position such as Office Manager
    or Operations Manager within her organization. In the next five years she hopes to lead a cross‑functional team responsible for streamlining administrative processes across multiple departments, while
    also championing an office‑wide wellness initiative that brings art workshops, creative brainstorming sessions, and mindfulness practices to the workplace. Long‑term, she envisions launching a boutique
    consulting firm that assists small nonprofit and community‑based offices in optimizing their administrative workflows and fostering a culture of creative problem‑solving. Throughout, she seeks roles
    that allow her to balance strategic responsibilities with opportunities for innovative thinking, while maintaining a workload that supports her mental‑health needs.
