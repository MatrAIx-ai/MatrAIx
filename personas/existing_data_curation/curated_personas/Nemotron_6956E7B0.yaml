personas:
  professional: Valentina Vallejo, a 33‑year‑old construction professional, combines hands‑on expertise in concrete forming, drywall installation, and framing with a bilingual knack for crew coordination,
    and balances a practical work ethic with a curiosity for emerging building materials, while her easygoing, sometimes disorganized style forces her to improvise under pressure.
  sports: Valentina Vallejo hits the sand for beach volleyball with the Lompoc Sunset Club in the summer, follows MLS action as a devoted fan of LAFC while tuning into Liga MX matches featuring Club América,
    and complements her active lifestyle with weekday runs, yoga, and occasional cheering for the LA Dodgers.
  arts: Valentina Vallejo expresses her artistic side by dancing cumbia and salsa to the rhythms of Celia Cruz and Marc Anthony at neighborhood festivals, enjoys the visual storytelling of Guillermo del
    Toro films, and occasionally paints watercolor scenes of coastal trails that she hikes on weekends.
  travel: Valentina Vallejo prefers spontaneous weekend getaways to nearby coastal towns like Santa Barbara and Pismo Beach, but dreams of a road‑trip along the Pacific Coast Highway to Big Sur and a future
    adventure exploring Oaxaca’s culinary scene, balancing limited vacation days with a desire for both relaxation and cultural discovery.
  culinary: Valentina Vallejo is a confident home chef who regularly prepares tamales, pozole, and enchiladas using fresh masa, ancho chilies, and hominy, while hosting weekend barbecues featuring grilled
    shrimp, corn on the cob, and a signature chipotle‑marinated skirt steak.
  core: Valentina Vallejo blends hands‑on construction savvy with a love for dancing, yoga, and spontaneous barbecues, juggling a worry‑prone mind and an easygoing, sometimes chaotic schedule that keeps
    life lively.
background:
  cultural: Valentina was raised in a bicultural household in Lompoc, where her parents immigrated from Michoacán, Mexico. She grew up speaking Spanish at home and English at school, celebrating Dia de
    los Muertos alongside American holidays. Family gatherings centered around shared meals, music, and dance, fostering a strong sense of community and collectivism. She remains active in the local Mexican
    community, participating in church festivals, cultural celebrations, and volunteering at a community garden. Her heritage influences her work ethic, emphasizing reliability, cooperation, and respect
    for tradition, while also enriching her love for music, dance, and cooking.
attributes:
  skills: '[''Concrete forming and finishing'', ''Drywall installation'', ''Basic framing and carpentry'', ''Power‑tool operation (jackhammer, nail gun, pneumatic drill)'', ''Blueprint reading (basic)'',
    ''Construction safety and OSHA compliance'', ''Bilingual communication (English/Spanish)'', ''Crew coordination and leadership'', ''Problem‑solving under stress'', ''Basic math and measurement'']'
  hobbies: '[''Cumbia and salsa dancing'', ''Beach volleyball'', ''Hiking coastal trails'', ''Cooking traditional Mexican cuisine'', ''Hosting neighborhood barbecues'', ''Watching soccer (Liga MX and MLS)'',
    ''Yoga and mindfulness practice'', ''DIY home‑improvement projects'']'
  career_goals: Valentina aims to earn an OSHA 30‑hour certification and obtain a Journeyman Carpentry license within the next two years, positioning herself for a foreman role on residential projects in
    Santa Barbara County. She plans to enroll part‑time at a local community college to pursue an associate degree in construction management, ultimately seeking a supervisory or project‑manager position.
    In the longer term, she dreams of starting a small contracting firm focused on affordable housing for the Mexican‑American community, where she can mentor other women and Spanish‑speaking workers. Financial
    stability for her family and the ability to balance work with her personal life are central to her ambition.
