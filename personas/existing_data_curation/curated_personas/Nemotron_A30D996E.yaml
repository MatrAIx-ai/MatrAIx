  career_goals: Darnika dreams of turning her love for imagination and technology into a career where she can create worlds that inspire others. She aspires to become a concept artist and interactive storyteller
    for video games or animated films, merging her drawing talent with her programming curiosity. She also envisions herself as a science communicator who uses visual media to explain complex ideas to kids,
    hoping to spark the same curiosity she feels today. Ultimately, she wants a profession that lets her innovate, experiment, and share her unique vision with a wide audience.
