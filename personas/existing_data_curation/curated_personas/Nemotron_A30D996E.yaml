personas:
  professional: Darnika Akintunde is a twelve-year-old aspiring technologist, combining a love for fantasy illustration with a knack for building Scratch animations at the community robotics club, and they
    dream of turning storyboards into interactive games.
  sports: Darnika Akintunde enjoys weekend hikes in the San Bernardino foothills with friends, follows the Los Angeles Lakers and LA Galaxy for inspiration, and participates in a middle-school track club
    where they occasionally compete in the 800-meter run.
  arts: Darnika Akintunde fills sketchbooks with doodles inspired by the illustrations of Jim Lee, paints fantasy scenes echoing the worlds of J.R.R. Tolkien, and channels the rhythms of Beyonce and Kendrick
    Lamar into lyrical prose for their short stories.
  travel: Darnika Akintunde eagerly plans day trips to Disneyland and weekend camping adventures in Joshua Tree, while dreaming of a future visit to Edinburgh during the International Festival to explore
    medieval castles and storytelling workshops.
  culinary: Darnika Akintunde prefers pepperoni pizza and homemade sushi rolls for after-school snacks, enjoys experimenting with stir-fried noodles using soy sauce and sriracha, and occasionally attempts
    to bake chocolate chip cookies despite occasional under-baking.
  core: Darnika Akintunde blends boundless imagination with meticulous planning, turning fantasy art into coded projects, obsessively saving for LEGO sets, and navigating allergies with a calm resilience
    that fuels their creative drive.
background:
  cultural: Darnika comes from an African‑American family rooted in the traditions of storytelling, music, and community resilience. Celebrations like Juneteenth, Kwanzaa, and family gatherings filled with
    soul food and shared histories have shaped her appreciation for her cultural heritage. Her grandparents often recount stories of the civil‑rights movement and ancestral journeys, nurturing her curiosity
    about history and identity. Living in Yucaipa, she experiences a blend of suburban California life and the rich cultural mosaic of Riverside County, which adds diverse influences to her worldview while
    keeping her connection to her Black heritage strong and affirming.
