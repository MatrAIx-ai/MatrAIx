  career_goals: Theo aims to move from a frontline sales representative to a regional sales manager within the next three years, overseeing a team of reps across multiple counties. He envisions eventually
    stepping into a director‑level role where he can shape sales strategy for the entire division and mentor emerging talent. To support this trajectory, he plans to earn a Certified Professional Sales
    Person (CPSP) credential and take leadership workshops focused on organization and coaching. Financially, he wants to boost his earnings enough to secure a larger family home and fund his children’s
    college savings. Long‑term, he entertains the idea of launching his own wholesale distribution venture that leverages his deep network of manufacturers and local buyers, blending his curiosity for new
    product lines with a pragmatic, community‑focused business model.
