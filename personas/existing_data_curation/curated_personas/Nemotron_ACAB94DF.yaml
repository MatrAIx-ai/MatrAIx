    in the Texas Hill Country'', ''volunteering at youth center'']'
  career_goals: Roman aims to advance to a regional operations manager role within the next five years, overseeing multiple locations across North Texas. He plans to earn a bachelor's degree in Business
    Administration (online) to complement his practical experience and to obtain a PMP certification to formalize his project‑management skills. Beyond promotion, he is passionate about creating a workplace
    culture that prioritizes employee well‑being, so he hopes to develop and lead a company‑wide wellness program that integrates stress‑management workshops and cultural inclusion initiatives. Long‑term,
    he envisions launching his own community‑focused retail venture that highlights Puerto Rican products and celebrates local diversity.
