  such as its ability to store excess energy during periods of low demand, and the ways in which batteries can help to bridge the gap between when power is produced and when it is consumed. This person
  is also likely to be aware of the increasing demand for renewable energy sources and the potential impact of increased wind farm installation on the demand for energy storage technologies.
