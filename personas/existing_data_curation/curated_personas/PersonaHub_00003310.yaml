persona_description: A historian who specializes in the study of the history of the Augustinian Order, particularly the history of the Gianboniti Province and the history of the Order of Hermits of Saint
  Augustine. He is particularly interested in the history of the community at Cesena and the history of the community at Clare Priory. His research interests include the history of the Order of Hermits
  of Saint Augustine, the history of the community at Cesena, the history of the community at Clare Priory, and the history of the community at Romandiola.
