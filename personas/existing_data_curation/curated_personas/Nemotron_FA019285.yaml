personas:
  professional: An experienced bookkeeping professional, Dale Miguel leverages three decades of ledger mastery, QuickBooks and Sage expertise, and their curiosity for artistic processes to deliver precise
    financial statements, mentor junior staff, and transition toward part-time consulting for local non-profits and community art programs.
  sports: A fan of the Kansas City Chiefs, Royals, and Sporting Kansas City, Dale Miguel enjoys regular walks along the Liberty Memorial park trails, participates in a senior bowling league at the local
    community center, joins a weekend cycling club that rides along the Missouri River, and uses light gardening as their primary form of low-impact exercise.
  arts: A devoted art aficionado, Dale Miguel visits the Nelson-Atkins Museum and the Kemper Museum each month, sketches watercolor landscapes of the rolling Missouri fields, draws inspiration from Thomas
    Hart Benton, Georgia O'Keeffe, and local Kansas City artists, and engages in lively discussions about artists’ biographies during their book club.
  travel: Preferring relaxed road-trip itineraries, Dale Miguel often plans weekend getaways to historic towns like Hermann, Missouri, Mackinac Island, and the charming streets of Savannah, balances their
    love for heritage sites with budget-friendly lodging, and harbors a dream of a summer tour of Napa Valley’s vineyards and the museums of Florence.
  culinary: A modest home cook, Dale Miguel delights in preparing heirloom tomato salads, slow-cooked Kansas City burnt-end brisket, garden-fresh ratatouille seasoned with rosemary and thyme from their
    herb patch, and occasionally treats themselves to a slice of cherry pie at a local diner.
  core: Dale Miguel blends meticulous financial stewardship with a quiet passion for watercolor art and community service, though they sometimes delay software upgrades and indulge in sweet desserts.
background:
  cultural: Dale is a white Midwestern American with roots in German‑Irish immigrant families who settled in the Kansas City area in the early 20th century. Growing up in Independence, Missouri, he absorbed
    the region’s emphasis on modesty, hard work, and community involvement, reinforced by his participation in a local Lutheran church and neighborhood civic groups. The cultural milieu of the Midwest—characterized
    by a blend of practicality and a quiet appreciation for the arts—has shaped his approachable demeanor, his commitment to public service, and his love for regional history and small‑town traditions.
attributes:
