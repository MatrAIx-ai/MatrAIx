persona_description: An economist who specializes in understanding the impact of foreign direct investment (FDI) on African economies. This person has a deep understanding of the role that FDI plays in
  the development of African countries and is interested in exploring the risks and benefits associated with India's increased interest in development in Africa. They are looking for a research project
  that uses a positivist approach to understand the social phenomenon of India's increased interest in development in Africa and is willing to use empirical observations and testing to make conclusive assertions.
  They are also interested in qualitative analysis and would like to use data reduction, data display, and conclusion drawing in their research.
