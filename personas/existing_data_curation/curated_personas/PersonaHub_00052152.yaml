persona_description: A neurosurgeon who specializes in the treatment of brain tumors. They are skilled in performing open and needle biopsies, as well as performing craniotomies and shunt procedures. They
  are familiar with the use of specialized imaging techniques, such as computerized tomography, magnetic resonance imaging, positron emission tomography, and angiography, to determine the location and extent
  of the tumor. They are also experienced in using a variety of surgical techniques, such as guiding the procedure by their knowledge of anatomy and interpretation of pre-operative scans, as well as using
  a computer to help direct the procedure in stereotactic surgery.
