  career_goals: Although retired from formal employment, Tonney remains driven by a desire for lifelong learning and meaningful contribution. She aims to deepen her knowledge of art history by completing
    a series of online courses and attending workshops at local galleries. She aspires to curate a traveling exhibition of regional senior artists, providing a platform for their work. Tonney also hopes
    to mentor young volunteers at the senior center, sharing her organizational expertise. On a personal level, she plans to explore new travel experiences, including a road trip through the American Southwest’s
    historic art towns, and to maintain her health through regular hiking and yoga.
