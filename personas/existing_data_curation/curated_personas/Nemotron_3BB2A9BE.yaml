personas:
  professional: Marvin Perez is a seasoned broadcast sound and lighting technician who blends a decade of hands-on mastery of Yamaha consoles, DMX control, and live-stream integration with a collaborative,
    energetic approach, and they are actively pursuing ETCP certification and a technical director role to spearhead immersive media projects and eventually launch a boutique AV production company.
  sports: Marvin Perez fuels their fitness routine with weekend hikes in the Watchung Reservation, regular rides with the Passaic River Cycling Club, and lively pickup basketball games where they often
    cheer for the New York Knicks, balancing a competitive edge with a laid-back, social vibe.
  arts: Marvin Perez channels their love for rhythm by DJing neighborhood block parties with sets that swing from classic rock to contemporary pop while teaching basic salsa steps and volunteering as the
    lighting-tech for the local community theater’s productions of Rent and The Lion King, drawing inspiration from lighting designer Ken Billington and musicians like DJ Jazzy Jeff.
  travel: Marvin Perez favors a blend of structured weekend getaways to the Catskill hiking trails and spontaneous road trips to music-rich cities like New Orleans and Berlin, balancing a modest travel
    budget with a craving for cultural immersion and outdoor adventure.
  culinary: Marvin Perez cooks with confidence, regularly preparing homemade baleadas stuffed with refried beans, cheese, and crema, simmering aromatic sopa de mondongo with beef tripe and yuca, and experimenting
    with fresh salsa verde and grilled corn, though they sometimes over-season dishes in the pursuit of bold flavor.
  core: Marvin Perez blends technical precision with social energy, turning every live event into a collaborative performance while juggling a penchant for gear splurges, occasional back-pain from heavy
    lifts, and a disciplined yet flexible approach to life.
background:
  cultural: Marvin is a first‑generation American son of Honduran immigrants who grew up in a bilingual household in Newark's Little Honduras neighborhood. He was raised with Spanish as his primary language
    at home and English at school, allowing him to navigate both cultures fluidly. Family gatherings featured traditional foods such as tamales and pupusas, music like garífuna and punta, and celebrations
    of Honduran holidays like Día de la Independencia. He participates in local cultural festivals, volunteering to set up sound and lighting for events that showcase Central American arts. His heritage
    informs his aesthetic sensibility, often incorporating vibrant colors and rhythmic patterns into his lighting designs. Marvin also maintains close ties to the Honduran diaspora community, serving as
    a cultural liaison in his professional network.
attributes:
  skills: '[''Audio mixing (Yamaha CL/QL, Pro Tools)'', ''Live sound reinforcement'', ''Microphone technique'', ''Signal processing'', ''Lighting design'', ''DMX programming'', ''ETC EOS console operation'',
    ''GrandMA2 operation'', ''LED and moving-head fixture control'', ''Video playback integration (QLab, OBS)'', ''Broadcast standards compliance (FCC)'', ''Equipment maintenance and troubleshooting'',
    ''Project coordination'', ''Team communication'', ''Documentation and technical scripting'']'
  hobbies: '[''Salsa dancing'', ''DJing'', ''Hiking'', ''Cooking Honduran cuisine'', ''Basketball'', ''Exploring new AV gear'', ''Photography'', ''Community theater tech volunteering'', ''Attending live
    concerts'', ''Listening to emerging Latin music'']'
  career_goals: Marvin aims to advance from senior technician to technical director for a regional broadcast station, overseeing both audio and lighting departments. He plans to obtain ETCP Certified Technologist
    status and deepen his expertise in immersive media, such as augmented reality lighting and spatial audio. In the medium term, he wants to lead a team that designs live‑streamed cultural events that
    showcase Central American music and arts, merging his heritage with cutting‑edge production. Eventually, he envisions founding a boutique AV production company that provides end‑to‑end services for
    community festivals, corporate events, and educational broadcasts, while mentoring emerging technicians from underrepresented backgrounds.
