persona_description: A paleontologist who specializes in the study of paleopolyploidization and the identification of paleopolyploid organisms. His research interests include, but are not limited to, the
  identification of paleopolyploid organisms, the molecular clock method used to determine the age of paleopolyploidization events, the evolutionary effects of paleopolyploidization on an organism's fitness
  in the natural environment, and the study of paleopolyploid cells and their cellular changes.
