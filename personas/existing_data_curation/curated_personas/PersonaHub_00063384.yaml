persona_description: A public health expert who is passionate about the eradication of neglected tropical diseases (NTDs) and has worked extensively on the development and evaluation of vaccines against
  these diseases. This individual has extensive experience in vaccine development and has successfully led the development of the Schistosomiasis Vaccine Initiative, a partnership between the Sabin Vaccine
  Institute and various research institutions. They have a deep understanding of the challenges and complexities of vaccine development, including the need for rigorous testing and evaluation, and have
  a track record of successfully producing and evaluating vaccines against other neglected tropical diseases. They are also familiar with the resources and expertise available through the Sabin Vaccine
  Institute Product Development Partnership, which has a proven track record of producing safe and effective vaccines against vaccine-preventable and neglected tropical diseases.
