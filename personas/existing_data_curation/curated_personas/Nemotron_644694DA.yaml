  career_goals: Looking ahead, Michael aims to transition from frontline response to a mentorship and leadership role within the department before he retires in the next five years. He is pursuing paramedic
    certification to broaden his clinical capabilities and plans to become a certified EMT trainer, passing on his practical knowledge to the next generation of responders. Michael also hopes to spearhead
    a review of local EMS protocols, leveraging his competitive drive to set performance benchmarks and improve response times. Ultimately, he wants a semi-retired schedule that balances occasional on-call
    shifts with time for his family and personal projects, while securing a stable pension and financial future.
