personas:
  professional: Zackary Steer, a broadcast sound and lighting technician in the Greater New Haven area, blends meticulous signal‑flow troubleshooting with an experimental flair for modular synth sound design,
    using Pro Tools and QLab to deliver seamless live productions while mentoring junior crew members and eyeing a future as a chief lighting director.
  sports: Zackary Steer stays active by hiking the Metacomet Trail in the fall, playing in a co‑ed adult soccer league that supports the local YMCA, and cheering on the New England Patriots, the Hartford
    Yard Goats, and the Boston Celtics during the respective football, baseball, and basketball seasons.
  arts: Zackary Steer channels creative energy into experimental music sessions inspired by Aphex Twin and Brian Eno, captures urban moments with a Fuji X‑100 reminiscent of Vivian Mayer's street photography,
    and regularly volunteers as a technical assistant for community theater productions that stage avant‑garde plays by Sarah Ruhl.
  travel: Zackary Steer prefers spontaneous road trips with a small crew, often escaping to the White Mountains for fall foliage, has already trekked the historic streets of Boston and the neon alleys of
    Tokyo for synth parts, and dreams of witnessing the aurora borealis over Iceland’s Reykjavik while balancing a modest travel budget.
  culinary: Zackary Steer is an intermediate home cook who relishes classic New England clam chowder and lobster rolls, experiments with miso‑glazed salmon and homemade kimchi for a fusion twist, and always
    keeps a stash of fresh rosemary, smoked paprika, and dark chocolate for impromptu culinary projects.
  core: Zackary Steer is a technically gifted, community‑driven sound engineer who lives for modular synth discoveries, overbooks their calendar with creative gigs, and never forgets to carry a spare set
    of XLR cables.
background:
  cultural: Zack grew up in the suburban town of Wallingford, CT, within a middle‑class, Anglo‑American family with Irish and English ancestry. The New England setting infused him with a blend of traditional
    values—self‑reliance, modesty, and community stewardship—and an openness to the region’s rich academic and artistic scene, thanks to proximity to Yale and a vibrant local arts community. This background
    nurtured his appreciation for both classic American folk traditions and contemporary, experimental art forms, shaping his collaborative and inclusive outlook.
attributes:
  skills: '[''Live sound reinforcement'', ''Audio mixing and mastering'', ''Lighting design and DMX programming'', ''Digital audio workstation (Pro Tools, Ableton Live) operation'', ''Signal flow troubleshooting'',
    ''Broadcast standards compliance (ATSC, SMPTE)'', ''Stage monitoring and coordination'', ''Project scheduling and logistics'', ''Team leadership and collaboration'', ''Creative sound design'', ''Video
    playback integration'']'
  hobbies: '[''Modular synthesizer patching and experimental music'', ''Live concert and festival attendance'', ''Street photography'', ''Hiking in Connecticut state parks'', ''Reading science‑fiction and
    fantasy novels'', ''Tabletop role‑playing games'', ''Improvisational comedy workshops'', ''Volunteering as a technical assistant in community theater'', ''DIY home audio and lighting projects'', ''Cooking
    inventive dishes'']'
  career_goals: Zack aims to progress into senior technical leadership roles, such as a lead broadcast engineer or chief lighting director for regional networks and large‑scale live productions. He seeks
    to earn advanced certifications (e.g., Society of Broadcast Engineers SBE, RDK) and eventually launch his own boutique production studio that blends immersive audio‑visual experiences with interactive
    technology. Additionally, he hopes to mentor emerging technicians and contribute to community arts initiatives in the Greater New Haven area.
