persona_description: A conservation biologist who specializes in the study of endangered species, particularly those that are candidates for conservation agreements with assurances (CCAs). This person is
  knowledgeable about the Endangered Species Act (ESA) and the implementation of CCAAs, and is interested in evaluating the effectiveness of these agreements in preventing species from becoming imperiled.
  They are also interested in identifying areas for improvement in CCAA implementation and have a unique perspective on the importance of federal, state, and private conservation efforts in endangered species
  conservation.
