persona_description: A researcher in environmental science who specializes in the study of the interaction between the atmosphere, the land surface, and the climate system. This person is interested in
  understanding the net radiation balance of forested sites on opposite sides of a valley in south-western Germany, and the differences in this balance between the two slopes. They are likely to be familiar
  with concepts such as net radiation balance, slope, aspect, surface-parallel fluxes, and solar radiation, and are interested in the implications of these differences for the vegetation and microclimate
  of the forest stands.
