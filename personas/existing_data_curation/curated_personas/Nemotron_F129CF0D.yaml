    and cultural sites'']'
  career_goals: As he approaches retirement, Juan aims to transition from day‑to‑day supervisory duties to a mentorship and consulting role, sharing his expertise with younger managers and helping small
    local retailers enhance their visual merchandising and customer service. He hopes to secure a stable financial footing, reduce work‑related stress, and remain actively involved in the community through
    part‑time advisory work and cultural events. Juan also dreams of curating a small pop‑up gallery that blends Mexican art with local crafts, reflecting his lifelong love of artistic expression.
