  hobbies: '[''Salsa dancing'', ''Cooking Mexican-Louisiana fusion dishes'', ''Volunteering at a regional food bank'', ''Hiking local nature trails'', ''Attending live blues and zydeco concerts'', ''Reading
    contemporary fiction'', ''Gardening'', ''Participating in community cultural festivals'']'
  career_goals: Francely aims to move from her current sales representative role to a regional sales manager position within the next three to five years. She plans to earn a Certified Professional Sales
    Person (CPSP) credential and consider an associate degree in business administration to deepen her strategic expertise. Her long-term ambition includes leading a high-performing sales team, expanding
    market share in new Gulf Coast segments, and mentoring junior sales staff. She also hopes to leverage her bilingual abilities to grow the company's presence in Hispanic markets.
