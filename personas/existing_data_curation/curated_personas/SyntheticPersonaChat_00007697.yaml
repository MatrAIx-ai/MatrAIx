    User 2: I''m glad. I''m sure you''ll have many happy years together.

    User 1: Thanks. I hope so.

    User 2: So, what do you like to do for fun?

    User 1: I like to watch TV, play video games, and read.

    User 2: I like watching TV too. What''s your favorite show?

    User 1: I like a lot of different shows, but my favorite is probably "The Office."

    User 2: I love "The Office!" I''ve watched it all the way through at least three times.

    User 1: Me too! It''s so funny.

    User 2: I know, right? I love Michael Scott.

    User 1: He''s the best.

    User 2: So, what are you studying in school?

    User 1: I''m studying business.

    User 2: Oh, cool! What do you want to do with your degree?

    User 1: I''m not sure yet. I''m thinking about going into marketing.

    User 2: That sounds like a good field.

    User 1: Thanks. I think so too.'
