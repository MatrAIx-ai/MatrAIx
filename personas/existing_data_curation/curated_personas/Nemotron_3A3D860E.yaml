  career_goals: Billy aims to formalize his creative interests by earning a certificate in digital media or marketing within the next two years, positioning himself for a role as a community outreach coordinator
    or creative marketer at a local arts organization. He is driven to eventually launch a pop‑up gallery‑café that showcases emerging artists while serving as a social hub for his neighborhood. Competitive
    by nature, he plans to build a reputation for delivering innovative, high‑impact projects and hopes to pursue an associate’s degree in graphic design to broaden his professional toolkit.
