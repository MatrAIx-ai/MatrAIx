  hobbies: '["Visiting art galleries and museums", "Attending live music and dance events", "Cooking Peruvian cuisine", "Hiking in natural springs", "Street fashion photography", "Volunteer styling workshops
    for youth", "Exploring color theory and design podcasts", "Traveling to Peru to connect with family and heritage"]'
  career_goals: Aníbal aims to open a boutique salon in downtown Orlando that blends modern design with Peruvian cultural motifs, positioning himself as a creative director of hair artistry. He aspires
    to become a recognized influencer in the hair community, collaborating with fashion designers for runway shows, and eventually launching a line of hair care products featuring Peruvian botanical ingredients
    like quinoa and maca. He also intends to teach advanced styling workshops at local cosmetology schools and mentor young stylists from underrepresented backgrounds.
