personas:
  professional: Anibal Zepeda, a 28‑year‑old master barber and colorist, merges precision haircutting with textile‑inspired color palettes, crafting runway‑ready updos while maintaining a meticulously organized
    yet flexible appointment system that mirrors their curious, calm, and socially energetic personality.
  sports: Anibal Zepeda stays fit through weekend hikes to natural springs, occasional pickup basketball games at the local community center, and avidly cheers for the Orlando Magic and Orlando City SC,
    while they belong to a casual urban‑fashion photography club that meets for jogs and street‑style shoots.
  arts: Anibal Zepeda immerses themselves in Orlando’s gallery scene, draws inspiration from kinetic murals by local artists such as Shepard Fairey, the rhythmic beats of Afro‑Peruvian bands at salsa evenings,
    and the storytelling power of photographer Diane Arbus, all of which fuel their styling aesthetic.
  travel: Anibal Zepeda’s travel itinerary blends cultural immersion and creative inspiration, from recent trips to Cartagena’s historic streets and the Andean highlands of Cusco, to future plans for attending
    a design summit in Milan and a boutique‑hotel retreat in Kyoto.
  culinary: Anibal Zepeda loves experimenting with traditional South American dishes, perfecting ceviche with fresh lime, passion fruit, and scallops, crafting causa layered with avocado and roasted quinoa,
    and they often host friends for weekend cooking workshops featuring aji amarillo and maca‑infused sauces.
  core: Anibal Zepeda is a vibrant, art‑driven hair artist who balances meticulous salon craft with a love for community workshops, adventurous cooking, and calm resilience, all while budgeting prudently
    for their future boutique.
background:
  cultural: Born to Peruvian parents, Aníbal grew up bilingual in Spanish and English, celebrating traditions such as Día de los Muertos and Inti Raymi with family gatherings that feature music, dance,
    and woven textiles. The vibrant colors and rhythmic patterns of Andean textile art have shaped his aesthetic sensibility, influencing his choice of bold hair colors and intricate styling. He maintains
    strong ties to the Peruvian community in Orlando, participating in cultural festivals and supporting local Latinx businesses. His cultural heritage imbues him with a collaborative spirit, hospitality,
    and a deep appreciation for the blend of modern American life with rich Peruvian customs.
attributes:
  skills: '["Precision haircutting", "Balayage and foilyage coloring", "Custom event updos", "Hair extensions installation", "Scalp health assessment", "Artistic color palette design", "Client consultation
