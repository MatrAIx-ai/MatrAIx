  hobbies: '[''LEGO building'', ''Minecraft exploration'', ''Scratch coding projects'', ''Soccer'', ''Rock collecting'', ''Fishing with family'', ''Reading adventure books'', ''Sketching wildlife'', ''Competitive
    video gaming (e.g., Rocket League)'']'
  career_goals: John envisions a future where he can combine his love of building and problem solving. He dreams of becoming a robotics engineer or a wildlife biologist, roles that let him design practical
    solutions while exploring new ideas. He aims to join a middle‑school STEM club, participate in robotics competitions, and eventually study engineering or environmental science in college. He also sees
    himself creating video games that blend creative storytelling with logical design.
