personas:
  professional: John Sexton is an aspiring game developer and LEGO architect who channels a love for building complex sets and coding simple Scratch games into a competitive drive to outscore peers, balancing
    inventive curiosity with a practical eye for structural stability; they often challenge friends to recreate their designs in timed contests.
  sports: John Sexton thrives on the soccer field as a midfield playmaker for the Red River Rovers youth league, cheering for FC Barcelona's tiki-taka style, while also they join the after-school fishing
    club along the Red River and collect rocks during weekend hikes for calm downtime.
  arts: John Sexton sketches wildlife from hikes, draws inspiration from the vibrant art of Studio Ghibli films, enjoys reading adventure series by Rick Riordan, and blasts energetic tracks by Imagine Dragons
    while building Minecraft realms; they blend visual creativity with auditory stimulation to fuel their projects.
  travel: John Sexton favors spontaneous road trips to nearby state parks like Turtle Mountains, dreams of wandering the bustling streets of Tokyo for a Minecraft Expo, and cherishes family fishing outings
    on the Red River; they also love exploring the rocky canyons of the Grand Canyon when school holidays permit.
  culinary: John Sexton loves pepperoni pizza and homemade mac-and-cheese, often helps stir a simple spaghetti Bolognese sauce, enjoys crafting rock-shaped candy using sugar and food coloring, and can expertly
    butter a grilled cheese sandwich after watching cooking videos.
  core: John Sexton blends a competitive spark with a laid-back schedule, building LEGO fortresses, mastering Scratch games, and chasing soccer goals, all while juggling a love for adventure novels, rock
    collecting, and an ever-present curiosity that sometimes overruns their organization.
background:
  cultural: John grows up in Moorhead, Minnesota, a midwestern community that blends small‑city life with surrounding agricultural roots. His family’s heritage includes German and Scandinavian ancestry,
    common in the region, and they celebrate holidays with traditional foods and community gatherings. He attends a public elementary school that emphasizes practical learning, outdoor field trips, and
    community service. Local events like the Clay County Fair, school sports, and visits to the Red River shape his appreciation for outdoors, self‑reliance, and modest teamwork.
