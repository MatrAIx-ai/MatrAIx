  career_goals: Although officially retired, Margarita aims to leave a lasting intellectual legacy. She plans to finish a memoir that weaves her teaching stories with family history, publish a small booklet
    of local folklore through the Bullitt County Historical Society, and continue mentoring aspiring teachers through a senior‑teacher‑in‑Residence program at a nearby university. She also hopes to earn
    a “Volunteer of the Year” recognition for her contributions to adult‑literacy programs and to become a certified genealogist by completing a senior‑focused online certification.
