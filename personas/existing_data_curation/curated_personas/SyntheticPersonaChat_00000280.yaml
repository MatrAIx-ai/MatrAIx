    My hair is brown and curly.

    I hate red meat.'
  Best Generated Conversation: 'User 1: Hi, I''m Bob!

    User 2: Hi Bob, I''m Sarah!

    User 1: It''s nice to meet you, Sarah!

    User 2: Nice to meet you too, Bob!

    User 1: What do you like to do for fun?

    User 2: I love to surf, go for bike rides, and skateboard.

    User 1: Oh, that''s cool! I like to do those things too.

    User 2: Really? That''s great! We should hang out sometime and do one of those things together.

    User 1: That sounds like fun! I''m free this weekend.

    User 2: Me too! How about we go for a bike ride?

    User 1: That sounds great! What time do you want to meet?

    User 2: How about 10am?

    User 1: That works for me!

    User 2: Great! I''ll see you then!

    User 1: See you!


    (10am)

    User 1: Hi Sarah!

    User 2: Hi Bob!

    User 1: I''m so glad you could make it!

    User 2: Me too! I''ve been looking forward to this.

    User 1: Me too! Where do you want to go for our bike ride?

    User 2: How about we go to the beach?

    User 1: That sounds like a great idea!


    (They bike to the beach.)

    User 1: This is so beautiful!

    User 2: I know, right? I love the ocean.

    User 1: Me too! It''s so relaxing.

    User 2: Let''s go for a swim!

    User 1: That sounds like fun!


    (They swim in the ocean.)

    User 1: This is the best!

    User 2: I know, right?

    User 1: I''m so glad we came here.

    User 2: Me too!


    (They continue to bike around the beach.)

    User 1: This is so much fun!

    User 2: I know, right?

    User 1: I''m so glad I met you, Sarah.

    User 2: Me too, Bob. I''m glad we have something in common.

    User 1: Me too!


    (They continue to bike and talk.)

    User 1: I''m so tired!

    User 2: Me too!

    User 1: I''m glad we did this.

    User 2: Me too!

    User 1: I''m so glad I met you, Sarah.

    User 2: Me too, Bob. I''m glad we have something in common.

    User 1: Me too!


    (They get back to their bikes and ride back home.)

    User 1: I had so much fun today!

    User 2: Me too!

    User 1: I''m so glad we met.

    User 2: Me too! I hope we can do this again soon.

    User 1: Me too!'
