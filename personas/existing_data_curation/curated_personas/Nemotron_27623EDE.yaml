personas:
  professional: Heriberto Mendez is an aspiring licensed massage therapist who blends evidence‑based Swedish and deep‑tissue techniques with a bilingual, community‑focused approach, using his natural curiosity
    to stay current on orthopedic and prenatal research while maintaining a practical schedule that balances client appointments, workshop planning, and occasional evening guitar sessions.
  sports: Heriberto Mendez is a devoted Dallas Cowboys fan who joins a local pick‑up basketball league in winter, hikes the Texas Hill Country with the Hill Country Hiking Club during spring weekends, and
    follows a flexible fitness routine that mixes yoga for flexibility with occasional strength training at a nearby gym.
  arts: Heriberto Mendez expresses his artistic side by playing guitar and singing classic ranchera tunes of Vicente Fernández, attending Mexican cinema nights featuring Guillermo del Toro and Alfonso Cuarón,
    and sketching street‑art inspired by Austin murals while occasionally binge‑watching Luis Miguel’s music videos.
  travel: Heriberto Mendez prefers spontaneous road trips to nearby destinations like Fredericksburg’s vineyards and Waco’s Magnolia Market, while also dreaming of an immersive cultural tour of Oaxaca’s
    markets and San Miguel de Allende’s historic plazas, balancing these travel plans with student finances and family responsibilities.
  culinary: Heriberto Mendez enjoys cooking family recipes such as tacos al pastor with chipotle‑marinated pork and pozole with hominy, cilantro, and lime, boasts an intermediate skill level on the stove,
    often pairs his meals with a cold craft cerveza, and occasionally over‑salts the broth in his quest for bolder flavor.
  core: Heriberto Mendez is a diligent yet laid‑back future massage therapist who juggles bilingual client care, midnight guitar practice, and a habit of forgetting to water his succulents until the last
    minute.
background:
  cultural: Heriberto is a second-generation Mexican-American raised in a bilingual household in Texas. His parents immigrated from Jalisco, and he grew up celebrating Día de los Muertos, quinceañeras,
    and other Mexican traditions while also embracing Texan customs like high school football tailgates. He speaks fluent Spanish, which enriches his client interactions and keeps him connected to his cultural
    roots. The values of family, community service, and respect for hard work shape his outlook and motivate his desire to give back through affordable wellness services.
attributes:
  skills: '[''Swedish massage'', ''Deep tissue massage'', ''Sports massage'', ''Myofascial release'', ''Reflexology basics'', ''Client intake and assessment'', ''Anatomy and physiology knowledge'', ''Bilingual
