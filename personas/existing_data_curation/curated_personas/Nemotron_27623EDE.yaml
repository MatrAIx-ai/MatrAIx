  hobbies: '[''Playing guitar and singing traditional Mexican songs'', ''Cooking Mexican family recipes (tacos al pastor, pozole, etc.)'', ''Hiking in the Texas Hill Country'', ''Reading popular science
    books on human physiology'', ''Yoga practice'', ''Volunteering at community health fairs (free chair massages)'', ''Watching Dallas Cowboys games'', ''Viewing Mexican cinema'']'
  career_goals: Heriberto aims to become a licensed massage therapist with advanced certifications in orthopedic and prenatal massage within the next three years. He plans to complete his associate’s degree
    in health sciences, then open a modest, community-focused wellness studio in Waco that offers affordable services, workshops, and collaborative health programs. He also hopes to mentor other young therapists
    from under-represented backgrounds and eventually expand into a holistic health center that integrates nutrition counseling and yoga.
