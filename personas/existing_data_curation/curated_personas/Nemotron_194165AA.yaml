personas:
  professional: Leonard Langham, a meticulous 13‑year‑old aspiring engineer, applies their methodical mindset to building scale model cars and airplanes, codes small Python scripts for automating hobby
    tasks, and dominates the school chess club with a strategic, routine‑driven approach.
  sports: Leonard Langham thrives in solitary track events, training for the 400‑meter dash with the middle‑school track club in the fall and the indoor track team in winter, while cheering for the Los
    Angeles Lakers as their favorite professional team, but they avoid large‑team sports, preferring to measure progress with personal lap times.
  arts: Leonard Langham immerses themselves in historical non‑fiction by authors like David McCullough, finds inspiration from the precision of model‑maker art, and relaxes by listening to classical composer
    Ludovico Einaudi and the rock legends The Beatles, occasionally doodling detailed sketches of aircraft while waiting for chess matches.
  travel: Leonard Langham prefers planned, low‑key trips that blend learning and solitude, such as a weekend visit to the Smithsonian National Air and Space Museum in Washington, D.C., a family camping
    outing at a nearby state park to harvest garden herbs, and a dreamed‑of solo backpacking tour of the Scottish Highlands once they earn enough from a small online tutoring gig.
  culinary: Leonard Langham favors simple, hearty meals like homemade spaghetti Bolognese with fresh tomatoes from the garden, reheated chicken nuggets on rainy study nights, and occasional snack bars of
    granola with honey and almonds, yet they rarely experiment beyond familiar recipes, often relying on a well‑worn family cookbook.
  core: Leonard Langham is a methodical 13‑year‑old who channels intense anxiety into precise model building, relentless chess tactics, and a disciplined routine, while quietly battling a competitive edge
    that sometimes isolates them from peers.
background:
  cultural: Leonard comes from a middle‑class white family that has lived in Fresno’s Central Valley for generations. His mother works as a staff assistant at a local farm cooperative and his father is
    a mechanic at a nearby farm‑equipment dealership. The community is deeply rooted in agriculture, with a strong emphasis on hard work, self‑reliance, and practical values. While the neighborhood is increasingly
    multicultural, Leonard’s household maintains traditional American values and routines, reinforcing his preference for structure, reliability, and practicality.
