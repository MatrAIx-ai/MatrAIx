  career_goals: Leonard aims to pursue a career in civil engineering or a related field that offers clear, structured pathways and tangible results. He envisions attending a specialized STEM high school,
    earning a scholarship, and eventually working on infrastructure projects that improve his community. He also considers joining the military as an engineer, attracted by its regimented environment and
    emphasis on discipline.
