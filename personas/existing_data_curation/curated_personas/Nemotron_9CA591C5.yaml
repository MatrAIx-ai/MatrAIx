  hobbies: '[''Wildlife painting'', ''Gardening (native and Mexican plants)'', ''Birdwatching'', ''Traditional Mexican cooking'', ''Acoustic guitar playing'', ''Attending cultural festivals'', ''Reading
    historical novels and philosophy'', ''Volunteering at animal rescue events'']'
  career_goals: Raphiel aims to transition into a senior caretaker or lead enrichment coordinator role at a regional wildlife sanctuary, where he can apply his curiosity about innovative animal welfare
    practices while maintaining practical, proven standards. He hopes to develop a culturally enriched animal enrichment curriculum that integrates Mexican folk motifs and storytelling, and to publish a
    memoir that reflects on his lifelong relationship with animals and his Mexican heritage. Additionally, he aspires to mentor a new generation of caretakers, fostering a collaborative and flexible work
    environment.
