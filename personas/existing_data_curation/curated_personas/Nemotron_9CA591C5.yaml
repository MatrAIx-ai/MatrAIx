personas:
  professional: Raphiel Retamar, a senior animal caretaker with over 30 years of wildlife care experience, blends practical husbandry expertise—routine veterinary first aid, nutritional planning, and habitat
    design—with an inquisitive flair for culturally‑informed enrichment, while their relaxed, slightly disorganized work style lets creativity flourish even as they juggle mentorship duties.
  sports: Raphiel Retamar enjoys early‑morning birdwatching hikes in the San Bernardino mountains, is a member of the senior “Trail‑Trek” walking club, and follows the Los Angeles Lakers and LA Dodgers
    with a casual devotion that fuels their occasional weekend pickup basketball games at the community center.
  arts: Raphiel Retamar paints vibrant wildlife scenes inspired by folklore, strums acoustic guitar to the melodies of Juan Gabriel and Luis Miguel, and regularly visits exhibitions featuring Frida Kahlo,
    Diego Rivera, and John James Audubon, letting these influences color both the canvas and animal enrichment designs.
  travel: Raphiel Retamar favors low‑key road trips to national parks like Joshua Tree and the Grand Canyon, dreams of a cultural pilgrimage to Oaxaca’s Day of the Dead celebrations, plans itineraries loosely
    around volunteer animal‑rescue events, and balances travel costs with a modest pension.
  culinary: Raphiel Retamar prepares traditional dishes such as mole poblano, pozole, and chiles en nogada using native California ingredients like prickly pear and mesquite flour, cooks with a confident
    intermediate skill level, and delights in tasting street‑style tacos al pastor at local festivals while occasionally over‑seasoning with extra chilies.
  core: Raphiel Retamar is a curious yet laid‑back wildlife caretaker who weaves Mexican folklore into animal enrichment, forgets where they left their keys but never their sketchbook, and balances a flexible
    work rhythm with a stubborn dedication to mentorship.
background:
  cultural: Raphiel is a first‑generation Mexican‑American whose family roots trace back to the central highlands of Mexico. He grew up bilingual, absorbing both Mexican traditions—such as Dia de los Muertos,
    folk music, and regional cuisine—and the multicultural influences of Southern California. His cultural identity informs his respect for nature, communal responsibility, and storytelling, which he weaves
    into his animal care approach and educational outreach. Living in Redlands, he balances his Mexican heritage with the local Californian lifestyle, participating in community events and maintaining strong
    ties to both cultures.
attributes:
  skills: '[''Animal husbandry'', ''Veterinary first aid'', ''Nutritional planning'', ''Habitat maintenance'', ''Enrichment program design'', ''Bilingual communication (Spanish/English)'', ''Visitor education'',
