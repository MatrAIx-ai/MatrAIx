personas:
  professional: Delaina Minshew, a front‑of‑house specialist in a bustling Michigan coffee‑shop, leverages her meticulous reservation system, calm guest resolution, and hands‑on barista skills to keep the
    floor humming while eyeing a shift‑supervisor role after completing her hospitality management certificate.
  sports: Delaina Minshew, an avid walker of the Riverwalk and seasonal fan of the Detroit Tigers, joins the Battle Creek Rowing Club in summer, attends weekly yoga classes at a local studio, and squeezes
    in occasional pickup basketball games with coworkers.
  arts: Delaina Minshew, who finds inspiration in folk musician Iron & Wine, enjoys the literary clarity of Brené Brown’s self‑improvement books, volunteers at the community theater for productions like
    August Wilson’s "Fences," and knits while listening to classic vinyls from Grant Wood’s era, weaving these artistic threads into her own creative downtime.
  travel: Delaina Minshew, who prefers low‑key weekend escapes, has road‑tripped to Door County, taken a short flight to Nashville for a songwriting workshop, and dreams of a summer canoeing adventure in
    the Boundary Waters, always booking through Airbnb and balancing travel costs with her disciplined savings plan.
  culinary: Delaina Minshew, a self‑taught baker, kneads sourdough starter on Sunday evenings, whips up blueberry‑lemon scones with fresh Michigan raspberries, perfects rosemary‑infused focaccia for the
    coffee‑shop staff, and delights friends with pumpkin‑spice muffins topped with locally sourced honey.
  core: Delaina Minshew blends structured hospitality expertise with a quiet love for community‑centered rituals, juggling spreadsheets, knitting needles, and a nightly habit of late‑night coffee that sometimes
    leaves her jittery the next shift.
background:
  cultural: Delaina grew up in a small Midwestern town in Michigan, embracing the region’s values of hard work, community involvement, and modest hospitality. Her family’s traditions included attending
    high school football games, participating in county fairs, and celebrating holidays with simple, home‑cooked meals. Though identified as white, she reflects a broad American cultural tapestry, blending
    Protestant ethical influences with the inclusive, neighborly spirit characteristic of the Great Lakes region.
attributes:
  skills: '["Customer service", "Reservation and seating management", "POS and cash handling", "Food safety compliance", "Barista basics", "Conflict resolution", "Time management", "Team coordination",
    "Inventory tracking", "Shift scheduling"]'
  hobbies: '["Walking the Riverwalk and local parks", "Baking breads and pastries", "Reading self‑improvement and local history books", "Knitting in a community circle", "Volunteering at the food bank"]'
  career_goals: Delaina aims to progress from host/hostess to shift supervisor within the next two years, leveraging her organizational strengths to oversee floor operations. She plans to complete a hospitality
    management certificate at a local community college, positioning herself for an assistant manager role. Long‑term, she envisions opening a small, community‑focused coffee lounge in Battle Creek that
    emphasizes a welcoming atmosphere and consistent service, reflecting her desire for stability and harmonious guest experiences.
