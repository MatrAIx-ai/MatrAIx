persona_description: A researcher at the University of East Anglia who specializes in the development of patient-specific virtual birth simulators. The researcher has expertise in 3D graphics, ultrasound
  data analysis, and the simulation of labor and delivery. The researcher's work aims to improve the preparation and outcomes of births by creating realistic and accurate simulations of labor and delivery.
  The researcher is known for pioneering the use of patient-specific data in the development of virtual birth simulators and has presented their research at international conferences.
