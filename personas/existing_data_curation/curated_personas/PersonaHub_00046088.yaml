persona_description: A researcher at the University of Michigan who has conducted quantitative studies on the educational value of involving undergraduates in research, particularly in the context of the
  Undergraduate Research Opportunity Program. She has found that students who actively participate in undergraduate research are more likely to stay in college, get their degrees, and go on to graduate
  school. Her studies have been published in academic journals and have been widely cited in the field of higher education.
