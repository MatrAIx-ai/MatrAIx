personas:
  professional: Mai Wong is an organized retail professional who leverages bilingual fluency, meticulous cash handling, and spreadsheet‑driven inventory tracking to consistently exceed performance targets,
    and is poised to step into a shift‑supervisor role while pursuing a Business Administration associate degree.
  sports: Mai Wong enjoys evening walks in Tower Grove Park and follows the New York Giants and New York Rangers, occasionally joining the Garden State Running Club for weekend 5K runs to maintain a balanced
    fitness routine.
  arts: Mai Wong finds creative escape in solving crossword puzzles, listening to Yo‑Yo Ma’s cello suites and Lin‑Manuel Miranda’s musical scores, and volunteering at the annual cultural festival where
    they help curate traditional performances.
  travel: Mai Wong plans trips with a spreadsheet itinerary, preferring culturally rich destinations like Taiwan, Barcelona, and the historic streets of Kyoto, while also taking short family getaways to
    the Hudson Valley for weekend hikes.
  culinary: Mai Wong experiments in the kitchen by blending family recipes—such as dumplings with locally sourced bok choy and a low‑sodium mapo tofu—and pairing them with seasonal dishes like roasted beet
    salad, often using fresh cilantro and ginger harvested from their garden.
  core: Mai Wong balances a competitive, detail‑oriented work ethic with a love for structured puzzles, garden‑fresh cooking, and meticulously planned life‑goals, yet can’t resist a late‑night snack of
    cookies after a long shift.
background:
  cultural: Mai comes from an East-Asian (Chinese) immigrant family that settled in New Jersey. She grew up bilingual, speaking Mandarin at home while attending English-language schools. Her family emphasizes
    respect for elders, the importance of education, and the celebration of cultural holidays such as Chinese New Year and the Mid-Autumn Festival. While she embraces these traditions, Mai also integrates
    mainstream American customs, reflecting a balanced bicultural identity that shapes her worldview and daily life.
attributes:
  skills: '[''Cash Handling'', ''POS System Operation'', ''Customer Service'', ''Inventory Management'', ''Basic Accounting and Reconciliation'', ''Data Entry and Spreadsheet Management'', ''Time Management
    and Scheduling'', ''Problem Solving'', ''Conflict Resolution'', ''Bilingual Communication (English & Mandarin)'', ''Compliance with SOPs'', ''Training New Employees'']'
  hobbies: '[''Crossword Puzzles'', ''Sudoku'', ''Home Gardening'', ''Cooking Traditional Chinese Dishes'', ''Personal Finance Management'', ''Reading Business and Self-Help Books'', ''Volunteer Work at
    Local Cultural Events'', ''Walking in Nearby Parks'', ''Nature Photography'']'
  career_goals: Mai is focused on advancing within the retail sector. Over the next year she aims to be promoted to shift supervisor, using her organizational strengths to lead a team and improve operational
    efficiency. She plans to complete an associate degree in Business Administration while obtaining a Retail Management certification, positioning herself for an assistant-store-manager role within three
    years. Ultimately, she hopes to become a store manager and, in the longer term, open a small convenience store that highlights East-Asian specialty foods, leveraging her industry experience and cultural
    background.
