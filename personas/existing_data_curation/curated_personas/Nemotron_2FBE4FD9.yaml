  career_goals: As Earl reaches adulthood, his identity as a pragmatic, structure‑oriented individual motivates him toward career paths that blend reliability with tangible outcomes. In the short term,
    he aspires to complete high school with solid grades in mathematics and science, and to pursue an apprenticeship in a skilled trade or a degree in civil engineering at a state university. Long‑term,
    Earl envisions a role where he can design or manage community infrastructure projects—such as roadways, water systems, or manufacturing operations—contributing to the stability and growth of his hometown
    in Henry County. He also expresses ambition to hold a supervisory position, guiding teams with the calm, steady leadership style that reflects his temperament.
