persona_description: A scientist working at the International Maize and Wheat Improvement Centre (CIMMYT) in Kenya, focusing on the development of high yielding maize lines and the identification of molecular
  markers for resistance against disease. He is responsible for setting up a doubled haploid maize facility that will be the only one of its kind in Africa. The facility will use modern molecular techniques
  to develop breeding lines for the continent and will be funded by the Bill and Melinda Gates Foundation. The scientist is also interested in identifying molecular markers for resistance against the disease
  caused by maize chlorotic mottle virus and sugarcane mosaic virus.
