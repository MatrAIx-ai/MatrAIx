  career_goals: Kane aspires to turn his love for visual media and interactive entertainment into a career. He hopes to attend a post‑secondary program in graphic design, game art, or multimedia production,
    eventually working as a freelance digital artist or content creator for a gaming studio. He imagines a flexible work life that lets him travel, explore new artistic trends, and experiment with unconventional
    ideas. In the short term, he aims to build a robust online portfolio of artwork, video edits, and skate videos that can attract commissions from local businesses and indie game developers. Over time,
    he would like to launch his own brand of lifestyle and creative content that blends his Midwestern roots with the global digital culture.
