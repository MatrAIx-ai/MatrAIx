persona_description: 'A historian of modern India, Sumit Sarkar is known for his contributions to the field of history, particularly in the context of the Swadeshi Movement and the post-Independence era.
  He has authored several books on the history of India, including "Towards Freedom: Documents on the Movement for Independence in India, 1946" (New Delhi, 2007), "Beyond Nationalist Frames: Post-Modernism,
  Hindu Fundamentalism, History" (Delhi, 2002), and "Writing Social History" (Delhi, 1998). He has also contributed to the publication of the "Towards Freedom" project of the Indian Council of Historical
  Research, which was blocked in 2000 by the ICHR under the influence of the Bharatiya Janata Party (BJP), but was eventually allowed by the Government of India once the Congress party came to power after
  the general election of 2004.'
