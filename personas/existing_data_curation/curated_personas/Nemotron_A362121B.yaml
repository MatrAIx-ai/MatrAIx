    Scratch projects", "Playing beginner piano"]'
  career_goals: Christina dreams of a future where she can combine her love of art and curiosity about the natural world, aiming to become a museum curator, environmental storyteller, or graphic designer
    who creates engaging exhibits and visual content that inspire other children. She plans to explore advanced art and science courses in high school and eventually study environmental science or visual
    communications in college.
