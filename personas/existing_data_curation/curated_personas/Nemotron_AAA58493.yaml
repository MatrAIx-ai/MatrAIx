  career_goals: Hoping to leave a lasting legacy, Roger seeks to mentor youth and emerging artisans through workshops that blend basic engineering principles with creative art projects, thereby fostering
    interdisciplinary curiosity. He aspires to volunteer as a docent and curator at the local Peninsula Arts Center, organize exhibitions that highlight the region’s maritime and cultural heritage, and
    contribute oral histories to the Newport News Historical Society. He also wishes to author a memoir that intertwines his personal journey, family genealogy, and reflections on the evolving shipbuilding
    sector, while continuing to learn new artistic media such as digital photography and mixed‑media collage.
