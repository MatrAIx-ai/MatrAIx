personas:
  professional: Roger Price is a retired shipbuilding mechanical engineer who now leverages his four‑decade expertise in propulsion systems, welding, and CNC machining to mentor apprentices and curate interdisciplinary
    art‑engineering workshops at the Peninsula Arts Center, embodying his calm, organized yet flexible approach to problem‑solving and community building.
  sports: Roger Price enjoys low‑impact fitness through daily walks along the Newport News waterfront promenade, participates in a senior bowling league at the local community center, and avidly follows
    the Washington Capitals, the Norfolk Tides, and the Virginia Tech Hokies, while occasionally coaching a youth sailing club during summer.
  arts: Roger Price spends his free hours painting oil and watercolor seascapes inspired by Winslow Homer and J. M. W. Turner, attends concerts by the Virginia Symphony Orchestra and jazz nights featuring
    local reinterpretations of Miles Davis, and curates community exhibitions that spotlight maritime heritage alongside contemporary local artists.
  travel: Roger Price favors leisurely East Coast trips, having explored historic shipyards in Boston, the maritime museum in Baltimore, and the colonial streets of Williamsburg, while dreaming of a pilgrimage
    to Portsmouth, England’s naval heritage sites and planning a future autumn road‑trip through the Blue Ridge Mountains.
  culinary: Roger Price enjoys cooking with fresh herbs from his modest garden, often preparing steamed rockfish caught from tidewater creeks with a lemon‑thyme glaze, paired with classic Chesapeake crab
    cakes and a side of roasted root vegetables, though he sometimes neglects proper food storage, leading to occasional spoilage.
  core: Roger Price is an eight‑decade‑old shipbuilding veteran turned maritime‑themed artist who balances disciplined budgeting, gentle health routines, and a calm curiosity, channeling his love of engineering
    into community art workshops while quietly indulging in herb‑gardened seafood dishes.
background:
  cultural: Roger was born and raised in the post‑war suburbs of Newport News, Virginia, within a family of Anglo‑American heritage that valued hard work, community service, and modesty. He grew up attending
    a Baptist church and was shaped by the Southern hospitality and cooperative spirit of his neighborhood. His service in the U.S. Navy during the early 1960s exposed him to a broader world view and sparked
    his lifelong curiosity about diverse cultures and ideas. Throughout his adult life, the maritime legacy of Hampton Roads, the growing cultural scene of the region, and the blend of traditional values
    with emerging artistic movements have informed his balanced perspective that honors both tradition and innovation.
