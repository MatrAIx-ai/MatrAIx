personas:
  professional: Ivette Bonilla is a bilingual retail associate who leverages data‑driven insights and eye‑catching visual merchandising to consistently exceed sales targets, while mentoring teammates with
    a competitive yet supportive style.
  sports: Ivette Bonilla is an avid beach‑volleyball player who joins weekday pick‑up games at Deerfield Beach, cheers on Liga MX clubs at local sports bars, and rallies behind the Miami Heat and Orlando
    Magic, all while staying fit through weekly salsa dance sessions that double as cardio workouts.
  arts: Ivette Bonilla immerses themselves in Latin music culture, attending live shows by artists like Juanes and Marc Antonio, curating playlists that blend cumbia and reggaeton, and finding creative
    inspiration for visual displays while also hosting board‑game nights featuring Settlers of Catan and trivia challenges.
  travel: Ivette Bonilla prefers spontaneous coastal road trips that blend structured itineraries—like a planned stop at Key West’s historic Duval Street—with the freedom to discover hidden beachfront cafés,
    while dreaming of future getaways to the Caribbean’s vibrant markets and the historic streets of Seville.
  culinary: Ivette Bonilla loves cooking family‑heritage dishes such as tamales, tlacoyos, and fresh salsas, expertly grinding masa by hand, char‑roasting tomatillos for a smoky salsa verde, and pairing
    each meal with a crisp light lager, all while occasionally over‑seasoning and laughing off the occasional burnt corn husk.
  core: Ivette Bonilla blends relentless competitiveness with a love for community dance and spontaneous road trips, often juggling meticulous work metrics against a relaxed approach to personal planning,
    and can’t resist a perfect salsa or a well‑timed board‑game victory.
background:
  cultural: Born to Mexican immigrant parents, Ivette grew up in a bilingual household where Spanish was spoken at home and English at school. Her upbringing emphasized family cohesion, respect for elders,
    and a warm, hospitality‑focused interaction style that she carries into her professional life. She actively participates in community celebrations such as Día de los Muertos and Mexican Independence
    Day parades in Broward County, often helping organize cultural booths and food stalls. While embracing Mexican culinary traditions and folk music, Ivette also navigates the multicultural tapestry of
    South Florida, blending Caribbean and Latin influences into her social circles. Her dual cultural identity informs her adaptability, giving her the ability to connect with diverse customers and coworkers,
    and fuels her desire to showcase Mexican creativity through potential future entrepreneurship.
