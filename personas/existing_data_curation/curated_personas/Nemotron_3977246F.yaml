  hobbies: '[''Beach volleyball'', ''Salsa and bachata dancing'', ''Cooking Mexican cuisine'', ''Attending live Latin music concerts'', ''Watching Liga MX soccer matches'', ''Playing strategy board games
    (e.g., Settlers of Catan)'', ''Participating in trivia nights'', ''Listening to personal‑development podcasts'', ''Spontaneous road trips along the Florida coast'']'
  career_goals: Ivette aims to transition from front‑line associate to a leadership role within the next three years. Her immediate objective is to become an assistant store manager, where she can formalize
    processes, coach a team, and refine operational efficiencies. She plans to complete a Bachelor’s degree in Business Administration through online coursework, building on her prior college experience.
    Long‑term, Ivette envisions managing multiple locations as a district manager or opening her own boutique that fuses contemporary fashion with Mexican cultural motifs, offering a curated shopping experience
    that reflects her heritage. Throughout her ascent, she remains focused on measurable performance, seeking to consistently rank in the top percentile of sales associates and to champion data‑driven decision
    making.
