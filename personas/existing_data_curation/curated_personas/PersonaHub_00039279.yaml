persona_description: A language teacher who is passionate about creating a positive and respectful learning environment for their students. They are skilled at organizing language learning activities that
  engage their students and allow for body language to be incorporated into the lessons. They have experience in cutting down on distractions in the classroom and using the TTT method effectively. They
  are aware of the importance of listening and believe in the power of two ears and one mouth. They have a creative approach to teaching and enjoy going off on tangents, finding the most fun parts of lessons.
  They are aware of the importance of setting high standards for teachers and are willing to raise their game to make a go of it. They are open to new ideas and enjoy thinking outside the box.
