personas:
  professional: Jason Contino is a 32‑year‑old financial advisor in Sonoma County who combines meticulous organization, a people‑focused communication style, and a curiosity for behavioral economics to
    deliver data‑driven, client‑centric wealth plans while confidently leading community workshops.
  sports: Jason Contino plays in a co‑ed recreational basketball league on Thursday nights, follows the San Francisco Giants during spring training, holds season tickets for the Golden State Warriors, and
    supplements the competition with weekend mountain‑bike rides along Sonoma’s rolling hills and a Saturday morning yoga class.
  arts: Jason Contino attends live shows at the Sonoma Valley Wine & Arts Festival, draws inspiration from acoustic folk artists like Iron & Wine and local guitarist John Mayer, and spends evenings practicing
    classic acoustic pieces such as "Blackbird" and "Landslide" on their newly acquired guitar.
  travel: Jason Contino favors weekend road trips that blend hiking, cycling, and wine tasting, having explored Napa’s vineyards, the cliffs of Big Sur, and a recent culinary tour of Santorini and Crete,
    while planning a future bike‑packing adventure through the French Alps.
  culinary: Jason Contino is an enthusiastic home cook focused on Mediterranean cuisine, mastering dishes like creamy hummus with tahini, grilled branzino seasoned with za’atar, and rustic ratatouille,
    though they sometimes over‑salt experimental sauces, and they love pairing meals with Sonoma Pinot Noir and fresh burrata.
  core: Jason Contino is a hyper‑organized, talkative finance professional who balances a data‑driven approach to wealth building with a habit of over‑committing to community events, often juggling three
    projects while forgetting to water their succulents.
background:
  cultural: Raised in a middle‑class suburban environment in Northern California, Jason comes from a white family with mixed Italian and Irish ancestry. The region’s emphasis on agriculture, especially
    viticulture, and the progressive, community‑oriented culture of Sonoma County have shaped his appreciation for local traditions, sustainable living, and collaborative engagement. His marriage and close
    ties to the area reinforce his commitment to family values and community service, while his broader American upbringing provides a pragmatic outlook on work and personal success.
attributes:
  skills: '[''Financial Planning'', ''Retirement Planning'', ''Tax‑Efficient Investment Strategies'', ''Portfolio Management'', ''Risk Assessment and Mitigation'', ''Client Relationship Management'', ''Public
