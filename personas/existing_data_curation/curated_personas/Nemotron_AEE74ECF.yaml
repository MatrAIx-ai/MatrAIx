  career_goals: George aims to leverage his practical expertise and disciplined work ethic to move into a supervisory role within his company. Over the next two years he plans to earn certifications in
    building‑automation systems and HVAC maintenance, and to design a data‑driven preventive‑maintenance program that improves equipment uptime. He envisions becoming a facilities manager overseeing multiple
    sites, where he can set high performance standards and mentor younger technicians. As a long‑term ambition, he hopes to launch a small independent maintenance contracting business that focuses on reliable,
    cost‑effective service for local businesses, providing financial stability for his family.
