personas:
  professional: George Holder, a facilities maintenance veteran with three decades of HVAC, electrical, and plumbing expertise, channels their disciplined curiosity and competitive drive into designing
    a data‑driven preventive‑maintenance program while pursuing building‑automation certifications to secure a supervisory role and eventually a small contracting business.
  sports: George Holder, a devoted fan of the St. Louis Cardinals and Kansas City Chiefs, participates in a local senior softball league, hikes the Ozark trails in spring, and maintains fitness through
    weekend fishing trips on the Missouri River and periodic weight‑lifting at the community gym, viewing sport as both recreation and a low‑stakes arena for competition.
  arts: George Holder, who enjoys classic rock icons like the Rolling Stones and blues legends such as B.B. King, attends the regional community theater’s quarterly productions, collects vintage model‑train
    kits that showcase intricate craftsmanship, and frequently flips through technical magazines for design inspiration, melding artistic appreciation with hands‑on creation.
  travel: George Holder, an avid road‑tripper who prefers meticulously planned itineraries, has driven Route 66 to explore classic car shows in Arizona, explored Yellowstone National Park’s geysers in summer,
    and dreams of attending the Munich Oktoberfest to combine their love of engineering heritage with cultural immersion, all while balancing family commitments and a modest travel budget.
  culinary: George Holder, a proficient grill master, experiments with Kansas City‑style smoked ribs, hickory‑infused brisket, and garden‑fresh roasted vegetables, frequently uses rubs featuring paprika,
    brown sugar, and garlic, and pairs their creations with craft amber ales, while also enjoying the occasional challenge of perfecting a homemade apple pie crust during fall.
  core: George Holder, a meticulous, competition‑driven facilities expert, blends hands‑on tinkering with data precision, yet wrestles with chronic worry that fuels both relentless improvement and occasional
    over‑thinking.
background:
  cultural: George grew up in the heart of the Midwest, in a blue‑collar family in the Kansas City area. The region’s blend of Mid‑western pragmatism, self‑reliance, and community spirit shaped his worldview.
    He was raised with values of hard work, punctuality, and modesty, reinforced by the local high‑school culture that emphasized sports, local fairs, and a tight‑knit neighborhood network. Though his ancestry
    is primarily German and Irish, the local cultural mix of Protestant work ethic, small‑town neighborliness, and a respect for tradition has informed his disciplined, organized approach to life while
    leaving room for practical curiosity about new tools and techniques.
