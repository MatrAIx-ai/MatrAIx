personas:
  professional: An experienced industrial truck and tractor operator, Creighton Yazdani leverages a blend of hands‑on mechanical curiosity and pragmatic safety focus to troubleshoot hydraulic systems on
    the fly, while their spontaneous streak sometimes clashes with formal scheduling, prompting them to champion flexible workflow solutions.
  sports: When not in the garage, Creighton Yazdani enjoys target shooting at the local range, follows the St. Louis Cardinals, and maintains a modest fitness routine consisting of weekend fishing trips
    along the Mississippi River as a member of the Riverbend Fishing Club, which double as low‑impact cardio.
  arts: A solitary creator, Creighton Yazdani builds scale model trucks with meticulous detail while listening to classic rock legends like Bruce Springsteen and watching Ken Burns documentaries on American
    industrial history, which shape his appreciation for gritty, working‑class narratives.
  travel: A spontaneous road‑tripper, Creighton Yazdani favors weekend getaways in a restored vintage pickup, often heading to the industrial museums of Detroit or the riverfront bars of Memphis, yet they
    rarely book flights, preferring the freedom of the open highway.
  culinary: An adept backyard grill master, Creighton Yazdani relishes smoking Mississippi catfish, grilling flank steak with a dry rub of smoked paprika and brown sugar, and experimenting with homemade
    chili using canned beans, though they often skip cooking at home when a new truck project demands their attention.
  core: Creighton Yazdani embodies a rugged, curiosity‑driven pragmatist who trades spreadsheets for wrench‑tightening, competes fiercely in both the garage and the shooting range, yet habitually procrastinates
    on paperwork, leading to a perpetual juggling act between ambition and disorganized flexibility.
background:
  cultural: Creighton grew up in St. Louis, Missouri, absorbing the Midwestern values of hard work, self‑reliance, and community ties. Although identified as white, his family carries Iranian heritage,
    reflected in occasional celebrations of Nowruz and Persian cuisine at home. This blend gives him a pragmatic American outlook tempered by an appreciation for cultural traditions and curiosity about
    diverse perspectives. He enjoys local staples such as St. Louis‑style BBQ and jazz, while also maintaining a personal connection to his family's cultural roots.
attributes:
  skills: '["Heavy equipment operation", "Mechanical troubleshooting", "Safety compliance (OSHA)", "Basic hydraulic systems maintenance", "Inventory and logistics coordination", "Equipment inspection and
    documentation", "Adaptability to new technologies in industrial automation", "Spatial awareness and load balancing", "Physical stamina and endurance", "Basic computer operation (fleet management software)"]'
  hobbies: '["Restoring classic trucks", "DIY engine repair", "Fishing", "Truck simulation video games", "Scale model truck building", "Reading on industrial automation", "Small‑group operator meet‑ups",
    "Target shooting at a range"]'
  career_goals: Creighton aims to earn advanced certifications in heavy‑equipment operation and become a lead operator or on‑site trainer within his current industry. He is interested in transitioning into
    a safety‑officer role where his practical experience can inform training programs, while still maintaining the flexibility he values. In the longer term, he hopes to launch a small independent fleet‑service
    business that offers specialized transport and on‑site equipment maintenance for local manufacturers, allowing him to blend his competitive drive with entrepreneurial autonomy.
