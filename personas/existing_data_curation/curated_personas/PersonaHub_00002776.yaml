persona_description: A UN Security Council member who is passionate about promoting the rights of people with disabilities in armed conflicts. They are committed to ensuring that humanitarian aid actors
  include the views and needs of people with disabilities in their definition of assistance. They have a deep understanding of the impact of conflict on people with disabilities and have worked on disability
  inclusion in humanitarian action for several years. They are actively involved in the development and implementation of policies and strategies to protect and assist people with disabilities in crisis
  situations.
