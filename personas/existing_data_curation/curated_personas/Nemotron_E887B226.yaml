personas:
  professional: Maria Hernandez is a detail‑driven data analyst‑in‑training who leverages their strong Excel, SQL, and Python data‑cleaning skills to translate messy datasets into actionable insights, while
    applying their methodical project‑management mindset to keep every analysis on schedule and aligned with business goals, and they eagerly embrace quality‑assurance tasks that reward predictable, structured
    processes.
  sports: Maria Hernandez hikes the Texas Hill Country with a local outdoor club, follows the Austin FC soccer team and the Dallas Cowboys football team, occasionally joins a community softball league for
    light exercise, and prefers low‑impact cardio like trail walking over high‑intensity gym sessions.
  arts: Maria Hernandez spends evenings immersed in mystery novels by authors such as Tana French and Gillian Flynn, enjoys the soulful vocals of Lila Downs and the eclectic sounds of Café Tacuba, and attends
    community theater productions that feature classics like Arthur Miller’s ‘Death of a Salesman’.
  travel: Maria Hernandez plans trips with spreadsheet precision, favors road‑tripping to nearby gems like New Mexico’s White Sands National Monument and culinary explorations in Oaxaca, balances their
    love of adventure with a modest travel budget, and dreams of someday trekking the Inca Trail in Peru.
  culinary: Maria Hernandez is a confident home chef who crafts authentic mole poblano and homemade tamales using fresh chilies from their herb garden, experiments with Korean‑Mexican fusion tacos topped
    with kimchi, and delights in the aromatic blend of cilantro, rosemary, and oregano simmering in their kitchen.
  core: Maria Hernandez blends analytical rigor with culinary creativity, turning data sets into structured insights while meticulously perfecting recipes, all while juggling a garden, volunteer work, and
    a persistent worry that everything stays perfectly organized.
background:
  cultural: Maria identifies as Mexican‑American and is fluent in both Spanish and English. She maintains strong family ties and honors traditions such as Día de los Muertos, festive cooking, and participation
    in local Hispanic cultural events in San Angelo. Her upbringing blends Mexican heritage with Texan community values, fostering a bicultural perspective that influences her communication style, communal
    involvement, and appreciation for both cultures.
