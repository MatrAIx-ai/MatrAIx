  career_goals: Tania aims to transition from regional theater to professional film and television, securing representation with a reputable talent agency within the next two years. She aspires to land
    supporting roles in independent movies, eventually leading a feature film that explores abstract, socially relevant themes. Concurrently, she plans to launch her own experimental one‑person stage show,
    collaborate with avant‑garde directors, and mentor emerging actors in her hometown. Her long‑term ambition is to be recognized as a versatile, critically acclaimed actress who balances mainstream work
    with innovative, boundary‑pushing projects.
