personas:
  professional: Troy Tingle, a seasoned industrial engineer with Six Sigma and OSHA expertise, transforms manufacturing floors into lean, ergonomically safe spaces by applying visual design principles and
    delivering charismatic safety workshops that double team engagement; they thrive on turning data into creative solutions.
  sports: Troy Tingle, an avid outdoorsman, hikes the Blue Ridge Trail with the Asheville Hiking Club, fishes at Lake Hickory on weekends, passionately follows the Carolina Panthers, Charlotte Hornets,
    and Asheville Tourists, and occasionally joins a community softball league for friendly competition.
  arts: Troy Tingle, a watercolor enthusiast, paints misty mountain vistas of the North Carolina range, plays alto saxophone in the Asheville Community Band, frequents the Asheville Art Museum to study
    works by Andy Warhol and local Appalachian artists, and never misses a performance at the Diana Wortham Theatre featuring actors like James Earl Jones.
  travel: Troy Tingle, a weekend traveler, dreams of a cross‑country road trip along Route 66 after exploring the Blue Ridge Parkway, has already visited New Orleans for jazz festivals and the Grand Canyon
    for sunrise hikes, and prefers meticulously planned itineraries that balance family time with solo artistic retreats.
  culinary: Troy Tingle, a self‑taught pitmaster, perfects low‑and‑slow hickory‑smoked ribs, pulled pork sandwiches with coleslaw, and bourbon‑glazed baked beans, often pairing meals with locally sourced
    heirloom tomatoes and craft beers while using the backyard grill as a stage for storytelling evenings, though they sometimes forget to turn off the smoker, leaving the house smoky.
  core: Troy Tingle melds industrial precision with artistic flair, leading safety programs by day, painting mountains and saxophone solos by night, and hosting lively BBQ gatherings that showcase their
    knack for turning data‑driven rigor into warm community experiences.
background:
  cultural: Troy is a White American raised in the heart of Hickory, North Carolina, where the legacy of furniture manufacturing and Appalachian craftsmanship shaped his work ethic and community values.
    His family traditions reflect Southern hospitality, church involvement (Methodist), and a strong sense of neighborly responsibility. The region’s blend of German‑Pennsylvania Dutch roots and Appalachian
    folklore influences his appreciation for music, storytelling, and folk art. Growing up amidst the industrial evolution of Catawba County, Troy internalized the pride of hard work, perseverance, and
    collective well‑being, which informs both his professional focus on safety culture and his personal commitment to community engagement.
