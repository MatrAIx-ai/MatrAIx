  career_goals: Troy aims to progress from his current engineering role to a senior safety leadership position, such as Director of Safety, Health, and Environmental (SH&E) for a regional manufacturing
    hub. He plans to earn a Certified Safety Professional (CSP) credential and pursue a master's degree in safety engineering to deepen his technical expertise. Long‑term, he envisions launching his own
    consultancy that helps mid‑size manufacturers embed safety, sustainability, and lean principles into their operations. Troy also aspires to become a recognized thought leader, presenting at national
    safety conferences and contributing articles to industry journals while mentoring the next generation of engineers in his community.
