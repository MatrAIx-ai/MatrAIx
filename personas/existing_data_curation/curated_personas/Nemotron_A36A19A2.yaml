personas:
  professional: Alain Garcia is a veteran industrial and refractory machinery mechanic who blends meticulous troubleshooting, MIG/TIG welding, and hydraulic diagnostics with a curiosity for modern monitoring
    technology, translating his reserved yet cooperative nature into reliable maintenance leadership as he pursues a foreman role.
  sports: Alain Garcia stays fit by early‑morning fly‑fishing on the Río Culebrinas and weekend hikes in the Cordillera Central, while cheering for the Indios de Mayagüez baseball team and participating
    in the local Aguada Anglers Association’s seasonal catch‑and‑release tournaments.
  arts: Alain Garcia finds solace in playing the cuatro, frequently performing traditional bomba and plena pieces by groups like Bomba Sinfónica de Puerto Rico and Plena Libre, and enjoys the cinematic
    storytelling of Rita Moreno’s classic films, which fuel his appreciation for cultural heritage.
  travel: Alain Garcia prefers low‑key travel, planning modest weekend getaways to coastal towns such as Culebra for snorkeling and to San Juan’s historic Old San Juan for its colonial architecture, while
    dreaming of a guided genealogy tour through the streets of Seville to trace his ancestors.
  culinary: Alain Garcia relishes cooking arroz con gandules, pernil, and mofongo with homemade sofrito and fresh plantains, skillfully balancing traditional techniques with occasional experimentation like
    adding a pinch of smoked paprika, and enjoys sharing these meals at community potlucks on festival days.
  core: Alain Garcia blends a practical mechanic’s precision with a quiet love for island traditions, often found tinkering on vintage motorcycles while quietly humming a cuatro melody, and occasionally
    neglects his own sleep to finish a repair job.
background:
  cultural: Alain was born and raised in Aguada, a coastal town in western Puerto Rico, and his upbringing is infused with the island's rich blend of Spanish, African, and Taíno traditions. He grew up speaking
    Spanish at home, celebrating Catholic holidays such as Día de los Santos Reyes, and participating in local festivities like the Festival del Cofre, where music, dance, and communal food play central
    roles. Although he has never married, he maintains close ties with an extended family network that values respeto, solidaridad, and a collective spirit. His cultural identity influences his culinary
    tastes, love for traditional music (bomba, plena, and folk songs), and his commitment to community service, reflecting the island's emphasis on mutual support and pride in local heritage.
