  career_goals: Alain aims to transition from hands‑on maintenance to a supervisory role as a lead maintenance foreman within the next three years. He plans to obtain certifications such as Certified Maintenance
    & Reliability Professional (CMRP) and pursue a bachelor’s degree in mechanical engineering part‑time. Long‑term, he envisions establishing his own boutique workshop that specializes in sustainable refurbishment
    of industrial and refractory equipment, while mentoring the next generation of mechanics in Aguada and the surrounding region.
