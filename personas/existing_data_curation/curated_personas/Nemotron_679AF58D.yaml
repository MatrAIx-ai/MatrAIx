    Interest Inventory, MBTI)'', ''Mentorship'']'
  hobbies: '[''Abstract painting'', ''Sketching'', ''Photography'', ''Reading contemporary fiction and poetry'', ''Visiting art galleries and exhibitions'', ''Attending live music and theater'', ''Cooking
    Mexican and fusion dishes'', ''Writing a career‑guidance blog with artistic themes'', ''Meditation and yoga'', ''Hiking in the Sierra foothills'']'
  career_goals: Gonzalo aims to become the Director of Guidance Services for the Fresno Unified School District, where he can scale his innovative, art‑infused counseling model district‑wide. He plans to
    develop a "Creative Career Lab" that blends visual arts, storytelling, and technology to help first‑generation Mexican‑American students envision non‑traditional career paths. Over the next five years,
    he hopes to earn the Certified Career Development Facilitator credential and contribute research articles on culturally responsive, creativity‑driven guidance practices. Additionally, he envisions launching
    a community‑based mentorship nonprofit that pairs local professionals with high‑school students to foster academic persistence and cultural pride.
