personas:
  professional: Jorge Carranza, a 20‑year‑old aspiring interaction designer, merges solid programming skills in Python, Arduino, and data visualization with a flair for mural‑inspired digital art, and they
    channel their curiosity and collaborative spirit into prototype‑driven projects that prioritize user creativity, cultural storytelling, and meticulous yet flexible design processes.
  sports: Jorge Carranza, an avid hiker who spends weekends on the Appalachian foothills with the Morristown Trail Club, follows the Tennessee Titans and Nashville Predators for their community spirit,
    joins occasional pickup soccer games in a local university league, and they maintain a balanced fitness routine that blends cardio hikes with brief home‑based bodyweight workouts, though they often
    skip the gym when a new art project consumes their evenings.
  arts: Jorge Carranza, a sketch‑obsessed digital painter, draws inspiration from mural masters like Diego Rivera and graphic novelists such as Alan Moore, constantly listens to acoustic folk renditions
    alongside indie bands like Tame Impala, and they spend evenings refining Adobe Illustrator compositions while occasionally binge‑watching performance art videos by Marina Abramović for fresh ideas.
  travel: Jorge Carranza, a meticulous planner who loves spontaneous creative escapes, frequently maps out budget‑friendly trips to local gems such as the Great Smoky Mountains and Chattanooga’s Riverfront
    Art District, has already ventured to mural‑rich Oaxaca and historic Kyoto, and they continue to dream of trekking the Inca Trail while setting up a pop‑up art exhibit in Barcelona.
  culinary: Jorge Carranza, a self‑taught home chef, enjoys mastering traditional dishes like tamales, pozole, and mole—experimenting with ancho chilies, masa harina, and cacao—and they often host small
    gatherings where friends sample freshly made salsas and roasts, though they sometimes burn tortilla shells when multitasking between coding and cooking.
  core: Jorge Carranza, a 20‑year‑old tech‑savvy artist who blends code and color, balances a disciplined study routine with late‑night creative marathons, tends to over‑commit to projects, and they can’t
    resist a good taco after a long hike.
background:
  cultural: Jorge is a first-generation Mexican-American, raised in a bilingual household where Spanish and English intertwine. Family traditions such as Día de los Muertos, mariachi music, and home-cooked
    Mexican cuisine remain central to his identity. Growing up in the Southern United States, he blends Mexican cultural values of familismo and collectivism with the community-oriented spirit of his Tennessee
    neighborhood. This hybrid background informs his appreciation for vibrant visual storytelling, his respect for collaborative harmony, and his commitment to giving back to both the Latinx and broader
    local community.
attributes:
  skills: '["Python programming", "MATLAB", "Arduino microcontroller development", "Data analysis (NumPy, pandas)", "Statistical modeling (R)", "Data visualization (Matplotlib, Tableau)", "CAD (SolidWorks)",
    "3D modeling (Blender)", "Graphic design (Adobe Photoshop, Illustrator)", "Scientific research methods", "Technical writing", "Project management basics", "Cross-cultural communication"]'
  hobbies: '["Digital painting and sketching", "Creative coding (generative art, interactive web projects)", "Playing acoustic guitar", "Listening to Mexican folk and indie music", "Reading science-fiction
    and philosophy", "Hiking in the Appalachian foothills", "Cooking Mexican cuisine", "Participating in community art workshops", "Volunteering for STEM outreach", "Visiting art galleries and museums"]'
  career_goals: Jorge aims to pursue a graduate degree in Human-Computer Interaction or Interaction Design, where he can fuse his engineering expertise with his passion for art. In the short term, he is
    seeking a research internship or entry-level position in a multidisciplinary studio that develops interactive media, AR/VR experiences, or data-driven art installations. He aspires to create technology
    that enhances human creativity and accessibility, and later hopes to mentor Latinx youth in STEM-art programs to broaden representation. His long-term ambition is to lead a small, collaborative team
    that integrates sustainable design, user-centered interfaces, and cultural storytelling.
