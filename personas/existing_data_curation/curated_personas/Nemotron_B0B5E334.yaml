personas:
  professional: Susan Hood, a senior IT support specialist with a knack for translating complex tech issues into clear, user‑friendly guides, leverages her curiosity and practical mindset to troubleshoot
    Windows, macOS, and Linux environments while leading a small team with a quietly competitive edge.
  sports: Susan Hood enjoys solitary hikes along Fort De Soto’s coastal trails, practices sunrise yoga on the beach, and follows the Tampa Bay Rays with a casual loyalty, while occasionally joining a small
    kayaking club that meets at the St. Petersburg Pier.
  arts: Susan Hood routinely visits the Saint Petersburg Museum of Fine Arts, where she studies works by Monet and local contemporary painter George Guttus, sketches waterfront scenes in a well‑worn sketchbook,
    captures sunrise over the Gulf with her DSLR, and curls up listening to indie folk artists like The Milk Carton Kids while devouring literary fiction by Zadie Smith and cultural criticism by Susan Sontag.
  travel: Susan Hood prefers low‑key, spontaneous trips—she’s explored the historic streets of Charleston, photographed the cliffs of the Amalfi Coast, and often retreats to a quiet cabin on the Ocala National
    Forest for weekend solitude, all while juggling a modest budget and a desire for off‑peak travel to avoid crowds.
  culinary: Susan Hood’s kitchen experiments blend fresh herbs from her modest garden—basil, rosemary, thyme—with Mediterranean flavors, yielding dishes like herb‑crusted salmon with lemon‑caper vinaigrette
    and a slow‑cooked shakshuka, while indie folk playlists and an occasional splash of craft cider accompany her culinary improvisations.
  core: Susan Hood is a technically savvy, art‑loving introvert who automates her home, procrastinates on paperwork, and competes silently with herself to turn curiosity into practical solutions.
background:
  cultural: Susan was raised in a suburban community in north‑central Florida within a predominantly Anglo‑American family that values self‑reliance and community involvement. Her grandparents originated
    from the Midwest and the American South, imparting a blend of traditional values and a modest, laid‑back outlook. She earned her graduate degree in arts and humanities from the University of Florida,
    where exposure to a broad liberal arts curriculum sparked her lifelong curiosity about literature, visual arts, and cultural critique. Living in Saint Petersburg, FL, she embraces the city’s vibrant
    yet intimate arts scene, participates in local cultural events, and enjoys the coastal lifestyle that emphasizes outdoor recreation, informal gatherings, and a balance between solitary reflection and
    small‑group connections.
attributes:
  skills: '[''Technical troubleshooting (Windows, macOS, Linux)'', ''Hardware diagnostics and repair'', ''Network fundamentals and LAN/WAN troubleshooting'', ''Remote desktop support'', ''Ticketing system
