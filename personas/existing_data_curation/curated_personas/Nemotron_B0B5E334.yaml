    ''Scripting for automation (PowerShell, Bash)'', ''Onboarding and peer training'']'
  hobbies: '[''Reading literary fiction and nonfiction (philosophy, art history)'', ''Visiting museums and galleries'', ''Sketching and drawing'', ''Digital photography (landscape and sunrise)'', ''Hiking
    in local state parks (Fort De Soto Park)'', ''Herb gardening'', ''Raspberry Pi and home automation projects'', ''Small book club participation'', ''Volunteer tech tutoring for seniors'', ''Cooking experimental
    recipes'', ''Listening to indie folk music'']'
  career_goals: 'Susan aims to deepen her technical credentials by earning CompTIA Network+ and Security+ certifications within the next 18 months, followed by a Microsoft Certified: Modern Desktop Administrator
    Associate. She aspires to transition from a support specialist to a senior or lead support role, overseeing a small team of technicians while maintaining direct client interaction. Long‑term, she envisions
    blending her humanities background with technology by moving into instructional design or technical content strategy, creating engaging training materials for end users. Ultimately, she hopes to manage
    IT operations for a community‑focused organization in Saint Petersburg, leveraging her competitive drive to improve service metrics and user satisfaction.'
