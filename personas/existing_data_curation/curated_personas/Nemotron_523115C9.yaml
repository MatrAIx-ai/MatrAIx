  hobbies: '[''Visiting Art Galleries & Museums'', ''Painting & Watercolor'', ''Hiking & Trail Exploration'', ''Community Theater Volunteer'', ''Photography'', ''Reading Contemporary Fiction'', ''Attending
    Live Music & Local Festivals'', ''Exploring Craft Breweries'', ''Cooking & Baking'', ''Yoga & Mindfulness'']'
  career_goals: Beatrice aims to advance into a senior administrative or office‑manager position within the next three to five years, taking on greater responsibility for budgeting, team coordination, and
    strategic planning. She plans to earn a GED and pursue a Certified Administrative Professional (CAP) credential to formalize her expertise. Long‑term, she hopes to combine her administrative strengths
    with her passion for the arts by working for a local cultural institution or starting her own boutique event‑planning business that serves galleries, nonprofit arts groups, and community festivals in
    the Fort Collins area.
