persona_description: A researcher who specializes in the study of sunlight and its effects on the body, particularly in relation to the prevention and treatment of multiple sclerosis. They have conducted
  research on the role of sunlight exposure and vitamin D in reducing the risk of developing MS, and have found that constant exposure to UV radiation and vitamin D is required year-round to minimise the
  risk of MS. They have also conducted research on the prevalence of MS at latitudes with low levels of UV radiation, such as Tasmania, and have found that the winter sun offers even greater protection.
