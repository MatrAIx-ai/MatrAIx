persona_description: A researcher and scholar who is passionate about the history, culture, arts, literature, and social sciences of Florida, particularly its Native American and minority populations, exploration
  and development, tourism, the natural environment, and regional interests. They are knowledgeable about the state's preeminent Floridiana collection, which includes a diverse array of primary sources
  and has a long-standing association with scholars working in prehistory, ethnohistory, and archaeology. They are also interested in political papers related to Florida outside of the State Archives and
  have specialized in collecting materials on the Seminoles and on the 19th Century Seminole Wars.
