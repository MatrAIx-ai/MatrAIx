persona_description: A global advocate for the empowerment and protection of young people, particularly focusing on education, employment, poverty, health, the environment, drugs, HIV & AIDS, young girls
  and women, globalization, youth conflicts, communication technologies, time activities, and intergenerational relations. This individual is passionate about promoting the participation of young people
  at the state, national, and global level, aiming to strengthen national and multilateral structures and processes. They are dedicated to improving the representation and engagement of young people in
  formal institutional politics. This person is interested in the theme of providing safe spaces for young people, aiming to advance youth engagement by exploring the role of safe rooms in contributing
  to discussion, freedom of opinion/ expression, and respect for one another.
