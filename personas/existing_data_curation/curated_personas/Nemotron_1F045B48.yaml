personas:
  professional: Ryan Thompson leverages a decade of hands‑on troubleshooting in consumer electronics and DIY home‑automation to secure an entry‑level IT support role, while they meticulously document project
    plans in spreadsheets and offer neighborly smart‑home consulting as a side service.
  sports: Ryan Thompson enjoys moderate hikes through Cuyamaca Rancho State Park, participates in the San Diego Hiking Club’s weekend treks, watches the San Diego Padres and the LA Lakers on game nights,
    and they occasionally join a pickup basketball game at the local community center.
  arts: Ryan Thompson captures the subtle drama of sunrise over the park with his DSLR, draws inspiration from Ansel Adams and the atmospheric scores of Hans Zimmer, indulges in mystery novels by Agatha
    Christie and Tana French, and they enjoy the folk‑rock sounds of The Tallest Man on Earth while tinkering with model‑train scenery.
  travel: Ryan Thompson favors low‑key road trips to national parks like Yosemite and Grand Teton, plans meticulous itineraries for craft‑beer pilgrimages to Portland and Munich, and they occasionally take
    spontaneous weekend getaways to nearby coastal towns when a new hop variety catches their eye.
  culinary: Ryan Thompson brews his own IPA using Citra and Mosaic hops, perfects the grain‑bill for a balanced malt profile, pairs the beer with smoked bratwurst and roasted root vegetables, and they occasionally
    whip up a quick quinoa salad with avocado after a long hike.
  core: Ryan Thompson is a solitary, curiosity‑driven tinkerer who blends methodical project planning with a love for nature photography, home‑brewing, and low‑key hikes, and they cautiously navigate mid‑life
    financial and health responsibilities.
background:
  cultural: As a white American who grew up in a suburban environment and now resides in El Cajon, California, Ryan’s cultural background blends mainstream middle‑class U.S. values with the relaxed, outdoors‑oriented
    lifestyle of Southern California. He values individualism and self‑reliance, while also being influenced by the diverse, multicultural community of San Diego County, where he adopts local habits such
    as attending farmer’s markets and emphasizing environmental stewardship.
attributes:
  skills: '[''Electronics troubleshooting'', ''Computer hardware repair'', ''Basic automotive maintenance'', ''DIY home improvement'', ''Home automation (Arduino, Raspberry Pi)'', ''Microsoft Office proficiency'',
