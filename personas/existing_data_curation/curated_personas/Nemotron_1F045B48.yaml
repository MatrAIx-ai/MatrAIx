  hobbies: '[''Hiking'', ''Nature photography'', ''Arduino/Raspberry Pi projects'', ''Reading (science nonfiction, mystery)'', ''Homebrewing'', ''Model train building'', ''Attending small craft‑brew meetups'']'
  career_goals: Ryan aims to re‑enter the workforce by earning the CompTIA A+ certification and securing an entry‑level IT support position that leverages his troubleshooting expertise. He also plans to
    expand his home‑automation projects into a part‑time consulting service for neighbors interested in smart‑home upgrades. In the longer term, he aspires to achieve financial stability that will allow
    him to pursue independent learning and potentially launch a small venture offering custom‑built electronics kits.
