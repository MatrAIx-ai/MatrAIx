persona_description: A mechanical engineer who specializes in the design and analysis of kinematic mechanisms, especially those involving kinematic joints. She has a deep understanding of the properties
  of joints such as relative motion and degrees of freedom, and how they influence the working of a machine. She is skilled in creating and analyzing complex mechanisms and is particularly interested in
  compound joints and their design. She is also knowledgeable about the various types of joints and how they can be combined to create more complex mechanisms.
