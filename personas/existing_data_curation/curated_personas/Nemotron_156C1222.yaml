personas:
  professional: Roberto Henriquez, a 33‑year‑old practical‑handyman‑chef, blends his carpentry, electrical, and plumbing know‑how with a flair for authentic Mexican street food, using his curiosity to prototype
    a mobile taco stand while leveraging his bilingual communication and team‑building talent to rally community support.
  sports: Roberto Henriquez captains a local adult soccer league team in LaGrange, trains thrice weekly on the community field, backs the Atlanta Falcons for NFL Sundays, and follows Atlanta United FC,
    balancing competitive drills with weekend hikes on the nearby Pine Mountain Trail for cardio.
  arts: Roberto Henriquez finds rhythm in the norteño sounds of Los Tigres del Norte and the brass‑driven beats of Banda El Recodo, often dancing at community festivals while also enjoying classic ranchera
    ballads by Vicente Fernández and the lively murals of local street artists, which inspire his own DIY décor projects.
  travel: Roberto Henriquez prefers short, budget‑friendly road trips, having explored the historic markets of San Antonio and the culinary scene of Oaxaca, while planning a future family getaway to the
    Great Smoky Mountains and a weekend visit to Austin’s food‑truck festivals.
  culinary: Roberto Henriquez excels at cooking tacos al pastor, pozole, and tamales, favoring fresh corn masa, smoky chilies, and pineapple‑marinated pork, and he delights in hosting dinner parties where
    he pairs homemade salsas with craft cerveza, while occasionally over‑salting his sauces in his experimental batches.
  core: Roberto Henriquez, a socially‑savvy handyman‑chef, balances curiosity with practicality, hustles on weekends cooking tacos, and despite occasional knee pain and a habit of over‑scheduling, remains
    emotionally steady and community‑focused.
background:
  cultural: Roberto is a first‑generation Mexican American whose parents emigrated from Jalisco to the Midwest in the early 1990s seeking work in agriculture. Growing up in a bilingual household in the
    small town of LaGrange, Indiana, he was infused with Mexican traditions—celebrating Día de los Muertos, sharing tamales during Christmas, and maintaining a strong emphasis on family loyalty—while also
    adopting Midwestern values of community involvement and self‑reliance. He speaks Spanish fluently at home and uses English in daily interactions, allowing him to bridge cultural gaps within his neighborhood.
    His cultural identity is reflected in his love for Mexican cuisine, music, and festivities, and in his active participation in local Latino community groups that promote heritage preservation and support
    new immigrants.
