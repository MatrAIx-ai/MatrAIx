  career_goals: Roberto’s primary career ambition is to channel his practical skills into a sustainable, self‑run business. He is planning to launch a mobile taco stand that serves authentic Mexican street
    food at local fairs, farmers’ markets, and community events, leveraging his cooking expertise and his knack for engaging crowds. In parallel, he aims to formalize his handyman abilities by obtaining
    a certification in residential maintenance, which would open doors to regular contract work. Recognizing the value of education, Roberto intends to work toward a GED, which will broaden his eligibility
    for apprenticeships and improve his long‑term earning potential. Ultimately, he envisions providing financial stability for his wife and any future children, becoming a respected figure in the LaGrange
    community, and mentoring other youths who share a limited formal education background.
