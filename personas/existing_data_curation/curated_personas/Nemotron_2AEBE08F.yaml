personas:
  professional: Debra Symons, a senior data science strategist with deep expertise in advanced statistical modeling, predictive analytics, and machine learning, channels her imaginative curiosity and sociable
    flair into translating complex public health data into compelling visual stories, while mentoring women in STEM and orchestrating interdisciplinary STEAM projects that blend mathematics with community
    art.
  sports: Debra Symons stays fit by practicing Vinyasa yoga three times weekly, joining a community cycling group that rides the Hill Country trails in spring, and cheering on the Dallas Mavericks during
    basketball season, while she occasionally participates in a co‑ed recreational softball league at her local park.
  arts: Debra Symons channels her imagination through abstract acrylic paintings inspired by the color palettes of Mark Rothko and the texture experiments of Yayoi Kusama, plays classical piano pieces by
    Chopin to unwind, regularly attends live music shows featuring Austin’s indie folk scene and theater productions at the Zachary Scott Theatre, and devours speculative fiction by authors like N.K. Jemisin
    and Ted Chiang, often weaving narrative themes into her visual art.
  travel: Debra Symons favors immersive cultural trips, having explored the street art districts of Berlin, the historic tea houses of Kyoto, and the vibrant murals of San Antonio, while planning future
    visits to the Provence lavender fields and the Austin‑based SXSW festival, balancing budget constraints with a desire for artistic inspiration and occasional family‑friendly beach getaways.
  culinary: Debra Symons enjoys crafting herb‑infused dishes such as rosemary‑garlic grilled salmon and basil pesto pasta using fresh ingredients from her succulent and herb garden, excels at hosting elaborate
    dinner parties featuring Mediterranean mezze alongside Texas‑style barbecue, yet admits to a habit of over‑spicing her experimental fusion recipes, resulting in amusing palate surprises for her friends.
  core: Debra Symons is a data‑driven, art‑infused thinker who balances analytical rigor with creative flair, social engagement, and a penchant for worrying about every detail.
background:
  cultural: Debra was raised in a middle‑class Anglo‑American family in the Dallas‑Fort Worth metroplex. Her parents emphasized education, community service, and a blend of traditional Southern hospitality
    with an openness to the cultural diversity of Texas. This upbringing fostered a strong work ethic, a respect for individual initiative, and a deep commitment to communal harmony. She participates in
    regional festivals, celebrates holidays such as Thanksgiving and the Fourth of July, and maintains active ties to local churches and civic groups. Her cultural background informs her collaborative style,
    her desire for inclusive environments in both STEM and the arts, and her appreciation for blending analytical rigor with creative expression.
