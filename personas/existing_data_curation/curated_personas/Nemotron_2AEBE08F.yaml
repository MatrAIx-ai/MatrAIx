  hobbies: '["Abstract Painting","Live Music and Theater","Speculative Fiction Reading","Classical Piano","Gardening","Toastmasters","Hosting Dinner Parties","STEAM Volunteer Teaching","Yoga"]'
  career_goals: Debra aspires to become a senior director of data science for a public health agency in Texas, where she can lead interdisciplinary projects that fuse mathematical insight with community
    arts initiatives. She aims to publish a seminal paper on mathematical modeling of cultural dynamics, mentor the next generation of women in STEM, and launch a city‑wide STEAM outreach program that uses
    artistic expression to teach scientific concepts. Ultimately, she hopes to balance a high‑impact career with personal well‑being, and she envisions establishing a consulting venture that supports nonprofit
    arts organizations with data‑driven strategies.
