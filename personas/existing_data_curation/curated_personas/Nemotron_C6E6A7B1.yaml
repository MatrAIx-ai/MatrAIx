personas:
  professional: Amber Myers is an experienced construction specialist who leverages two decades of framing, concrete forming, and heavy equipment operation to deliver meticulous renovations, and their disciplined,
    organized nature means they conduct site inspections with the precision of a foreperson while quietly mentoring crew members on OSHA safety and teamwork.
  sports: Amber Myers supports the Dallas Cowboys and Dallas Mavericks, enjoys seasonal backyard softball with neighborhood friends, and stays fit by walking the local park’s bird‑watching trails and participating
    in a weekly adult beginner’s lacrosse league, preferring low‑impact activity that complements their physically demanding job.
  arts: Amber Myers enjoys country‑music gatherings featuring Johnny Cash and Dolly Parton, reads historical fiction by Ken Follett and Philippa Gregory, and channels creative impulse into woodworking projects
    that echo the craftsmanship of mid‑century modern designers like Charles and Ray Eames, all of which enrich their evenings after long construction days.
  travel: Amber Myers favors road‑trip adventures across the Texas Hill Country, weekend hikes in Big Bend National Park, and occasional cultural pilgrimages to historic sites in England such as Bath and
    York, planning trips months ahead to fit around family duties while seeking both natural solitude and a glimpse of the past.
  culinary: Amber Myers loves a well‑smoked brisket seasoned with paprika, garlic, and brown sugar, pairs it with garden‑fresh roasted okra and corn on the cob, and confidently whips up homemade cornbread
    using buttermilk and locally milled cornmeal, though they often over‑salt the veggie dish because they’re eager to showcase their garden harvest.
  core: Amber Myers blends rugged construction expertise with quiet, methodical ambition, tending a vegetable garden while pursuing a foreperson role, yet they can’t resist a late‑night binge on classic
    country ballads and occasionally forgets to lock the tool shed.
background:
  cultural: Amber grew up in a modest, working‑class family in the Dallas‑Fort Worth metro area, part of a primarily white, Anglo‑American community. The region’s emphasis on self‑reliance, strong church
    involvement, and a respect for hard work shaped her values. She celebrates Texan traditions such as community barbecues, country‑music gatherings, and maintains close ties to family heritage. Her background
    emphasizes practicality, neighborly cooperation, and a quietly proud sense of identity.
attributes:
  skills: '["Framing", "Concrete forming", "Heavy equipment operation", "Tool maintenance", "Blueprint reading", "Material delivery coordination", "OSHA safety compliance", "Quality‑control inspection",
    "On‑site problem solving", "Mentoring and training"]'
  hobbies: '["Gardening", "Reading historical fiction", "DIY home improvement reading", "Woodworking", "Volunteer mentoring", "Birdwatching", "Nature walks"]'
  career_goals: Amber aims to transition from laborer to foreperson within the next two years, obtaining a Certified Construction Supervisor certification and completing OSHA 30‑hour training. She wants
    to lead a crew that values safety and teamwork, and eventually mentor other women entering the trades. Long‑term, she hopes to start her own small contracting firm specializing in renovation projects
    that prioritize sustainable practices, while maintaining a work schedule that allows time for personal responsibilities.
