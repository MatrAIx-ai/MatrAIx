  career_goals: Looking ahead, Alejandro aims to move into a senior director or vice‑presidential operations role where he can shape long‑term strategy while maintaining the hands‑on, people‑centered focus
    he values. He wants to lead sustainability initiatives that cut operational waste by at least 20%, champion mentorship programs for emerging leaders from underrepresented backgrounds, and eventually
    launch a boutique consulting practice that helps non‑profit organizations streamline their operations without sacrificing mission impact. Balancing career advancement with family time remains a guiding
    priority.
