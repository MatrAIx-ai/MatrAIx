personas:
  professional: A veteran printing technician in Saint Paul, Lo Zhang blends decades of high‑speed offset and digital press mastery, exacting statistical process control, and a disciplined, solitary work
    ethic that they apply to mentor a handful of apprentices while championing low‑waste practices and preserving a curated archive of vintage printing artifacts.
  sports: A low‑impact fitness enthusiast, Lo Zhang favors daily walks through the quiet neighborhoods of Saint Paul, participates in the Saint Paul Senior Strollers walking club, occasionally joins a gentle
    water‑aerobics class at the local senior center, and follows the Minnesota Twins and Minnesota Timberwolves with a competitive streak that they channel into weekly chess matches as mental sport.
  arts: A solitary art aficionado, Lo Zhang spends afternoons perfecting ink calligraphy, sketching delicate botanical illustrations inspired by Georgia O'Keeffe’s floral studies, and exploring avant‑garde
    installations by artists like Yayoi Kusama at the Walker Art Center, all of which they cite as vital sources of visual balance for their printing work.
  travel: A methodical solo traveler, Lo Zhang plans each trip with a detailed itinerary, preferring tranquil historic sites such as Kyoto’s tea houses, the Victorian charm of Mackinac Island, and the sunrise
    over Lake Superior’s Split Rock Lighthouse, while budgeting their modest pension to ensure comfortable accommodations and ample time for reflective sketching.
  culinary: A precise home chef, Lo Zhang frequently prepares traditional steamed dumplings, hot‑and‑sour soup, and herb‑infused barley tea from their balcony garden, mastering the balance of flavors with
    the same meticulous attention they apply to press registration, though they occasionally over‑season in a momentary lapse of restraint.
  core: Lo Zhang, an 82‑year‑old master printer, blends relentless curiosity, exacting discipline, and a solitary competitive spirit, though they often wrestle with anxiety and a habit of double‑checking
    every detail.
background:
  cultural: Lo Kim Zhang was born to Chinese immigrant parents who settled in Minnesota in the 1960s. Raised in a bilingual household, she was steeped in traditional customs such as Lunar New Year celebrations,
    filial respect, and a cultural emphasis on meticulous craftsmanship. While she pursued an American education and a STEM degree, her East Asian heritage continues to shape her aesthetic sensibility—favoring
    clean lines, balanced composition, and an appreciation for negative space. She maintains cultural ties through cooking traditional dishes, celebrating community festivals, and integrating the disciplined
    work ethic and attention to detail valued in her upbringing into both her professional printing work and personal artistic pursuits.
