  career_goals: Approaching retirement, Kim aims to cement her legacy in Saint Paul's printing community by documenting the evolution of printing technology, mentoring a select group of apprentices, and
    advocating for sustainable, low‑waste practices on the shop floor. She hopes to be recognized by the local historical society for her contributions, publish a reflective guide on precision press operation,
    and create a curated archive of vintage printing artifacts that showcases her lifelong dedication to craftsmanship and innovation.
