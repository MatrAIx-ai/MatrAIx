  career_goals: Although retired from formal employment, Crystal aims to deepen her post‑retirement involvement in the community. She plans to lead the church’s senior volunteer program, mentor new volunteers,
    and organize intergenerational workshops on crafting and gardening. Crystal also aspires to preserve local history by conducting oral‑history interviews and compiling a family memoir that will be shared
    with younger relatives. Maintaining her health and well‑being is a priority, so she intends to follow a regular walking routine and explore new Southern recipes. Small‑scale travel to nearby historic
    sites and cultural festivals is another goal, allowing her to broaden her appreciation of regional heritage while staying within a comfortable and familiar setting.
