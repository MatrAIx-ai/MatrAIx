  professional: Jae Kim, a 4‑year‑old aspiring architect in preschool, merges their boundless curiosity with a methodical love of order by meticulously arranging LEGO bricks into detailed cityscapes, leading
    peers in collaborative building sessions while reliably keeping each block inventory up‑to‑date.
  sports: Jae Kim, a 4‑year‑old member of the Tiny Tigers Soccer Club, energetically joins weekend t‑ball practice, splashes through beginner swimming lessons, and proudly waves a River City Mariners baseball
    cap while chanting the team's rally chant during family game nights, showing they embrace teamwork both on and off the field.
  arts: Jae Kim, a 4‑year‑old miniature artist, spends afternoons coloring jungle scenes inspired by Eric Carle’s picture books, belts out 'Let It Go' from Disney’s Frozen at family karaoke, and delights
    in watching the animated series Bluey for storytelling ideas, showing they blend visual imagination with musical expression.
  travel: Jae Kim, a 4‑year‑old explorer, loves weekend trips to the city zoo’s panda exhibit, builds sandcastles at the nearby beach, and dreams of seeing the giant pandas at Chengdu Research Base in China
    on the next family vacation, and they often pack a small backpack with their favorite stuffed rabbit for comfort.
  culinary: Jae Kim, a 4‑year‑old budding chef, mixes oat‑based cookie dough with chocolate chips, proudly assembles peanut butter‑and‑jelly sandwiches, adds bright red strawberries and crisp cucumber slices
    to each plate, and they often forget to wash hands before diving into meals.
  core: Jae Kim, a 4‑year‑old whirlwind of curiosity, blends meticulous block‑building with spontaneous snack raids, habitually negotiates bedtime extensions with their stuffed rabbit, and occasionally
    loses track of their favorite red crayon.
