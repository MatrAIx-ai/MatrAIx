  career_goals: Patricia plans to finish her associate degree in Business Administration within the next two years, leveraging her practical experience to move into a shift‑supervisor role. Her long‑term
    ambition is to become a store manager, where she can design efficient workflows and foster a supportive, inclusive team culture. She also hopes to combine her interest in mental‑health advocacy with
    retail by establishing a workplace peer‑support program and eventually launching a small boutique that partners with local mental‑health nonprofits, using her curiosity for new ideas and her organizational
    strengths to build a sustainable business.
