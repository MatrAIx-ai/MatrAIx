personas:
  professional: Roberto Santos, a retired handyman turned community volunteer, relies on their carpentry, plumbing, and basic electrical expertise to organize senior‑center workshops, coordinate cultural
    events, and run a modest consulting service for fellow seniors, and they always follow a detailed checklist and a disciplined schedule that reflects their methodical, reliable nature.
  sports: Roberto Santos stays active by joining weekly low‑impact senior exercise classes at the community center, cheering on the New York Mets and the New York Knicks, and playing a competitive yet friendly
    game of dominoes on Saturday afternoons, and they treat the physical and mental challenges of both as essential components of their fitness routine.
  arts: Roberto Santos channels their outgoing energy into salsa and merengue nights, sings in the church choir, and frequently listens to classic performers like Celia Cruz, Luis Ponce, and Juan Luis Guerra
    while they also appreciate Broadway hits such as "Hamilton" and local theater productions, allowing music and dance to shape their cultural identity.
  travel: Roberto Santos dreams of returning to San Juan and the historic streets of Old San Juan, while also favoring short road trips to nearby historic towns like Williamsburg and scenic coastal drives
    along the Atlantic, and they plan each journey with a detailed itinerary and a modest budget that balances adventure with financial prudence.
  culinary: Roberto Santos excels at preparing traditional dishes such as mofongo with shrimp, arroz con gandules seasoned with sofrito, and pasteles de yuca, cultivating fresh cilantro and recao in their
    garden to enhance flavors, and enjoys sharing generous portions with neighbors, though they occasionally over‑salt the sofrito in their quest for a perfect taste.
  core: Roberto Santos blends a competitive love for salsa, dominoes, and budgeting with a methodical, community‑focused mindset, often juggling meticulous project checklists while they occasionally indulge
    in a late‑night TV drama binge.
background:
  cultural: Roberto was born into a bilingual Puerto Rican family and grew up celebrating vibrant traditions such as the parranda, Nochebuena, and the spirited festivals of San Juan. His upbringing emphasized
    strong family bonds, Catholic faith, and a love for lively music and dance. Though he now resides in Kernersville, North Carolina, he maintains close ties to his heritage by speaking Spanish at home,
    cooking authentic island dishes, and participating in cultural events hosted by the local Puerto Rican community. He values the communal spirit and generosity typical of Puerto Rican culture, often
    acting as a bridge between his neighbors and his cultural roots.
