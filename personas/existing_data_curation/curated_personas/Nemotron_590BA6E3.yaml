    ''Bilingual communication and cultural competence'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching architectural details'', ''Photography of historic neighborhoods'', ''Practicing yoga'', ''Hiking in nature preserves'', ''Cooking traditional
    Puerto Rican dishes with modern twists'', ''Listening to salsa, bomba, and jazz music'', ''Reading contemporary art and design books'', ''Exploring Spanish literature'', ''Volunteering on community
    mural projects'']'
  career_goals: Diana aims to earn the Certified Building Inspector credential within the next two years and to pursue advanced coursework in construction management. She aspires to become a senior inspector
    specializing in historic preservation and green building retrofits, blending her artistic sensibility with technical expertise. Long‑term, she hopes to launch an independent consulting practice that
    offers culturally sensitive, sustainability‑focused inspection services to community developers and heritage projects. She also envisions mentoring junior inspectors, sharing her knowledge while maintaining
    the solitary, reflective work style she values.
