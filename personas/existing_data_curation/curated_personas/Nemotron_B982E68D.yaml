personas:
  professional: Anna Stokes, a retired senior‑center volunteer who channels her lifelong expertise in budgeting, event coordination, and organic gardening into leading larger community projects, and they
    demonstrate relentless organization and curiosity by meticulously planning each workshop and constantly seeking new preservation techniques.
  sports: Anna Stokes, an avid follower of the New Orleans Saints and LSU Tigers, attends Sunday football games when possible, participates in the Pearl River Trail Walkers club for weekly nature walks,
    and they enjoy gentle tai‑chi sessions at the community center to stay limber.
  arts: Anna Stokes, a devoted lover of Southern folk arts who quilts inspired by Clementine Hunter’s motifs, listens to Dr. John’s piano blues while crocheting, attends the New Orleans Jazz & Heritage
    Festival annually, and they keep a collection of Eudora Welty biographies on their nightstand.
  travel: Anna Stokes, a planner‑oriented traveler who has visited New Orleans, Charleston, and Savannah on organized group tours, dreams of exploring Monticello and Edinburgh’s historic sites, and they
    book trips well in advance while balancing a modest travel budget with their love of heritage exploration.
  culinary: Anna Stokes, a master of Southern and Cajun cuisine who perfectly seasons gumbo with Andouille sausage, okra, and file powder, prepares shrimp po'boys with fresh garden herbs, and they experiment
    with new seasonal vegetable preserves every autumn.
  core: Anna Stokes blends meticulous organization with a curious spirit, juggling garden experiments, coupon hoarding, and a love for heritage recipes while occasionally forgetting to water indoor plants.
background:
  cultural: Anna grew up in Pearl River, a small town in St. Tammany Parish, Louisiana, immersed in the traditions of the American South. Her family’s Anglo‑American heritage blends with the region’s deep‑rooted
    Catholic and Protestant influences, fostering a strong sense of community, hospitality, and faith. She celebrates local customs such as Mardi Gras parades, Fourth of July picnics, and church potlucks,
    where Southern cuisine—gumbo, jambalaya, and fried catfish—plays a central role. The close‑knit environment of rural Louisiana, with its emphasis on family ties, church involvement, and mutual assistance,
    shaped her values of cooperation, reliability, and modest assertiveness. These cultural strands continue to inform her worldview, community service, and love for preserving local history and culinary
    traditions.
