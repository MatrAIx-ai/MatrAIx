  career_goals: Even at 84, Patricia aims to leave a lasting cultural imprint on Fairfield. She plans to curate a traveling exhibit of local artists’ work, mentor younger painters through weekly workshops,
    and publish a memoir that intertwines family history with reflections on art and literature. She also seeks to establish a small scholarship for high‑school seniors pursuing humanities studies, and
    to continue volunteering as a guest lecturer at the nearby community college, sharing her expertise in literary criticism and regional history.
