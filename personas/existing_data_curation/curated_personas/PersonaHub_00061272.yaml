persona_description: A historian who is interested in the impact of colonialism on postcolonial development. They are particularly interested in the economic models of the colonizing nations and how they
  influenced the reversals of fortune in the non-European world. They are knowledgeable about the mercantilist and liberal economic models that were prevalent during Spanish and British colonialism, respectively,
  and how they affected the development of precolonial regions. They are also interested in the unique experiences of the colonized areas, as evidenced by the different impacts of Spanish and British colonization.
