personas:
  professional: Jocelin Etheart, a 53‑year‑old veteran of casino surveillance, blends two decades of CCTV and AI‑assisted video analytics expertise with a humanities‑sharpened eye for detail, using their
    curiosity‑practical balance and empathetic conflict‑de‑escalation skills to craft clear incident reports and mentor junior officers.
  sports: Jocelin Etheart stays fit through lively salsa sessions with the local Salsa Rhythm Society, cheers for the Orlando Magic during basketball season, and occasionally joins a weekend recreational
    softball league, balancing structured team support with spontaneous dance cardio.
  arts: Jocelin Etheart channels creative energy into salsa performances set to Celia Cruz and Marc Anthony, participates in community theater productions of Neil Simon’s ‘The Odd Couple’, and satisfies
    their mystery‑loving mind with novels by Agatha Christie and true‑crime works by Ann Rule while also attending music festivals featuring vibrant Latin rhythms.
  travel: Jocelin Etheart prefers a mix of detailed itineraries and spontaneous exploration, often traveling to Caribbean destinations such as Jamaica for its reggae and cuisine, to the Florida Keys for
    snorkeling, and to New Orleans for its jazz heritage, balancing a modest travel budget with a craving for culturally rich experiences.
  culinary: Jocelin Etheart, an adept home cook, delights in preparing soul‑food staples like collard greens and cornbread alongside Caribbean dishes such as jerk chicken, rice and peas, and plantain fritters,
    seasoning them with fresh cilantro, Scotch bonnet peppers, and herbs harvested from their backyard garden.
  core: Jocelin Etheart is a meticulous security veteran who blends analytical rigor with vibrant community artistry, all while juggling chronic worry and a love for spicy home‑cooked meals.
background:
  cultural: Jocelin identifies as African‑American and was raised in a close‑knit Black community in Central Florida. Her family’s traditions blend Southern soul‑food cuisine, church‑centered fellowship,
    and celebrations of African‑American heritage such as Juneteenth and Kwanzaa. She grew up hearing stories of the civil‑rights movement, which instilled a strong sense of resilience and community responsibility.
    While her professional life has placed her in predominantly white corporate settings, she maintains strong ties to her cultural roots through church choirs, local Black‑owned businesses, and mentorship
    of younger Black adults. Her cultural identity informs her emphasis on empathy, cooperation, and advocacy for equitable treatment in the workplace and the broader community.
attributes:
