  career_goals: Jocelin aims to transition into a supervisory position within the casino’s security department, such as Lead Surveillance Officer, where she can shape training programs and safety protocols.
    She plans to obtain a Certified Protection Professional (CPP) credential and pursue advanced coursework in digital forensics and cybersecurity to integrate more sophisticated technologies into everyday
    operations. Long‑term, she envisions starting a community‑focused security consulting firm that offers mentorship to women of color entering the field, while also advocating for responsible gambling
    practices and stronger employee safety standards.
