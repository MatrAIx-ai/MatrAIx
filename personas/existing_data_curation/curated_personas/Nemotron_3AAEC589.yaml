personas:
  professional: Joseph Cleary, a tenured physics and applied mathematics professor at a Vermont liberal arts college, leverages their meticulous, disciplined nature and quiet competitiveness to design interdisciplinary
    STEAM curricula, master computational modeling in Python and MATLAB, and secure multi‑year NSF grants while mentoring graduate students with exacting standards.
  sports: Joseph Cleary spends weekends hiking with the Green Mountain Hiking Club, cross‑country skis the Snowy River Trail in winter, and follows the Vermont Catamounts and Boston Red Sox, while they
    join modest game‑day gatherings at the local café.
  arts: Joseph Cleary blends his love for visual detail and classical sound by painting watercolors inspired by Monet’s light, shooting landscape photographs reminiscent of Ansel Adams, carving wooden bowls
    while listening to Bach’s Brandenburg Concertos and Debussy’s Clair de Lune, and they regularly discuss art history with their book club.
  travel: Joseph Cleary prefers meticulously planned trips that balance modest budgets with immersive natural scenery, having hiked in Acadia National Park, explored the Scottish Highlands, and dreams of
    a summer workshop in Florence to study Renaissance fresco techniques, while they fit travel around academic commitments and grant deadlines.
  culinary: Joseph Cleary enjoys farm‑to‑table cuisine, often preparing herb‑infused grilled salmon with rosemary harvested from their garden, rustic New England clam chowder, and beet and goat cheese salads,
    cooking with a practiced yet occasionally clumsy hand that still manages to produce elegant plates despite occasional splatters from a wood‑carving session, and they always sip a dark roast coffee while
    reviewing lecture notes.
  core: Joseph Cleary is a disciplined, quietly competitive educator who fuses physics with watercolor, solves problems on the chessboard, and finds serenity in solitary hikes while they meticulously track
    every detail of their life—from grant budgets to blood pressure.
background:
  cultural: Joseph identifies with a New England Anglo‑American heritage that values education, self‑reliance, and community participation. Raised in a small Vermont town, he grew up attending town meetings,
    supporting local farm markets, and embracing the region’s seasonal rhythms—from leaf‑peeping in autumn to snowshoeing in winter. His family’s emphasis on disciplined work and modesty aligns with the
    classic Puritan work ethic, while his academic career has exposed him to progressive, interdisciplinary ideas. This blend of traditional New England modesty and modern scholarly openness informs his
    reserved demeanor, his competitive drive in academia, and his appreciation for both the natural and artistic worlds.
attributes:
  skills: '[''Advanced Physics Instruction'', ''Applied Mathematics Teaching'', ''Curriculum Development'', ''Quantitative Data Analysis'', ''Computational Modeling (Python, MATLAB)'', ''Laboratory Safety
