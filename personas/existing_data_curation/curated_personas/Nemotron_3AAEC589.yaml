  hobbies: '[''Hiking'', ''Watercolor painting'', ''Landscape photography'', ''Chess'', ''Reading philosophy of science'', ''Classical music listening'', ''Attending local art exhibitions'', ''Birdwatching'',
    ''Woodworking'', ''Herb gardening'']'
  career_goals: Joseph's primary ambition is to leave a lasting academic legacy by establishing a flagship STEAM program that integrates physics, engineering, and visual arts for undergraduate students.
    He aims to secure a multi‑year NSF grant to fund a research lab focused on computational modeling of artistic phenomena, such as digital painting algorithms. Within the next five years, he hopes to
    be appointed department chair, using that platform to champion innovative teaching methods and expand community outreach to rural schools across Vermont. He also plans to author a widely adopted textbook
    on interdisciplinary science‑art curricula and, upon retirement, devote time to writing a memoir that explores the intersection of curiosity, disciplined achievement, and the quiet resilience of a lifelong
    educator.
