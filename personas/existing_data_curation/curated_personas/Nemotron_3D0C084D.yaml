  career_goals: Although retired, Hendricks aims to deepen his civic contributions by becoming a volunteer docent at the Brooklyn Museum, sharing his art knowledge with visitors of all ages. He hopes to
    launch an intergenerational art‑workshop series at the local community center, pairing seniors with school‑age students to explore painting and photography. He is working on a memoir that chronicles
    Brooklyn’s cultural evolution from the 1940s to the present, intending to donate the finished manuscript to the borough's historical archive. Additionally, he aspires to serve on the advisory board
    of a neighborhood arts nonprofit, helping shape programming that reflects the borough’s diverse heritage while continuing to learn new artistic techniques, especially digital photography.
