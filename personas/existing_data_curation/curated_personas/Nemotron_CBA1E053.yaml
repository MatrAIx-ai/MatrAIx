  hobbies: '["Salsa dancing", "Community volunteering", "Gardening", "Reading local history", "Exploring Bronx neighborhoods", "Yoga and meditation", "Playing board games with friends", "Cooking family
    meals"]'
  career_goals: Lilly aims to advance into a supervisory role where she can mentor new drivers and help shape route planning for the Bronx transit network. She plans to obtain a commercial driver’s license
    endorsement for passenger safety and a certification in transit safety coordination. Long‑term, she hopes to work on driver‑wellness initiatives, advocating for mental‑health support and better work‑life
    balance for transit staff. She also dreams of contributing to community outreach programs that educate residents about public transportation options and safety.
