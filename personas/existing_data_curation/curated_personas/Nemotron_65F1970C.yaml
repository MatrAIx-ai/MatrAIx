  hobbies: '[''Reading historical fiction'', ''Gardening'', ''Crossword puzzles'', ''Sudoku'', ''Knitting'', ''Crocheting'', ''Quilting'', ''Bridge'', ''Senior book club'', ''Birdwatching'', ''Listening
    to swing music'']'
  career_goals: Although retired, Mary Kay aims to maintain full independence by staying mentally sharp and physically active. She wants to deepen her digital skills to communicate with distant family and
    to archive her family’s genealogy online. She aspires to complete a memoir of her life in Rutherford County, contribute stories and photographs to the local historical society, and mentor younger community
    members in quilting and gardening through small workshops. Preserving her health so she can continue to tend her garden and attend church services remains a central ambition.
