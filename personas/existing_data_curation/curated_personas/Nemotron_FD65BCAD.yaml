    for kids'']'
  career_goals: Nereida is determined to transition from a bus monitor to a classroom teacher, aiming to obtain her state teaching credential within the next two years. She plans to pursue a Master’s degree
    in Education focusing on inclusive and arts‑integrated teaching methods, with the long‑term ambition of establishing an after‑school arts program that celebrates multicultural heritage and supports
    students’ social‑emotional growth. Additionally, she hopes to gain certification in special education to better serve diverse learners while continuing to volunteer in community outreach initiatives.
