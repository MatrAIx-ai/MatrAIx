persona_description: A disaster relief worker who specializes in flood management and has extensive experience in predicting and responding to flooding events along the Red River of the North in North Dakota
  and Minnesota. They are highly skilled in using advanced hydrologic prediction services to monitor and forecast flood conditions, and have a deep understanding of the region's history of flooding and
  its impact on the communities along the river. They are also knowledgeable about the local government's response to flooding, including the use of sandbags and other emergency management tools, and have
  experience in coordinating with local authorities and community members to ensure the safety and well-being of affected residents.
