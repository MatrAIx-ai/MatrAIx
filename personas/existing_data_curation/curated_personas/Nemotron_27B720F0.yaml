personas:
  professional: Susan Mcniel, a 24‑year‑old mail clerk at the Patoka USPS facility, blends meticulous sorting expertise with a budding curiosity for logistics technology, leveraging their eye for detail
    and Excel‑savvy data tracking to pursue a supervisory role while balancing practical efficiency with innovative ideas.
  sports: Susan Mcniel enjoys early‑morning hikes on the Rend Lake trail network, tracks birds with the local Audubon chapter, runs with the Patoka Trail Runners club, cheers on the Chicago Cubs during
    baseball season and the Chicago Bears in the fall, and occasionally volunteers as a scorekeeper for Patoka High School’s cross‑country meets.
  arts: Susan Mcniel finds solace in the folk storytelling of John Prine, the acoustic melodies of The Lumineers, the historical novels of Hilary Mantel, and the regional paintings of Grant Wood, often
    annotating passages while knitting a scarf and listening to vinyl records of these artists.
  travel: Susan Mcniel prefers meticulously planned weekend road trips to historic towns like Galena, Illinois, and nature escapes such as the Great Smoky Mountains, yet they sometimes indulge in a spontaneous
    two‑day train ride to New Orleans for a jazz weekend, balancing a limited travel budget with a deep curiosity for American history and landscapes.
  culinary: Susan Mcniel delights in preparing garden‑fresh beet and goat‑cheese salads, hearty chicken pot pies with buttery crust, and the occasional slice of Chicago‑style deep‑dish pizza, while regularly
    brewing chamomile tea and savoring warm apple crisp made with locally sourced apples during autumn evenings.
  core: Susan Mcniel merges Midwestern modesty with quiet curiosity, turning their love for orderly logistics, backyard gardening, and careful budgeting into a balanced life punctuated by occasional back‑pain
    struggles and a habit of journaling every detail.
background:
  cultural: Susan was raised in Patoka, a small town in Marion County, Southern Illinois, where Midwestern values of hard work, modesty, and community service are deeply ingrained. Her family’s background
    includes generations of farm and small‑business owners, fostering a practical outlook and respect for tradition. She grew up attending a local Protestant church and participating in community events
    such as the county fair and volunteer clean‑up days. The region’s close connection to nature, along with an appreciation for local history, shapes her modest yet curious worldview, balancing a love
    for established customs with an openness to new ideas.
attributes:
