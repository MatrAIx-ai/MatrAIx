  hobbies: '["Reading", "Gardening", "Hiking", "Bird watching", "Journaling", "Knitting", "Book club participation", "Library volunteering"]'
  career_goals: Looking ahead, Susan aims to advance within the United States Postal Service by moving into a supervisory role on the mail‑processing floor. Over the next three to five years she plans to
    earn the USPS checkpoint supervisor certification and complete night courses in supply‑chain management, positioning herself for a shift‑lead or logistics coordinator position. Ultimately, she envisions
    managing a regional distribution center, where she can blend her practical experience with a growing curiosity for emerging mail‑handling technologies. She also hopes to finish her associate degree
    and possibly pursue a bachelor's in business administration to broaden her career options.
