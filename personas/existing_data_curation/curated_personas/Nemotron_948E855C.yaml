personas:
  professional: Ellen Newby, a retired retail clerk turned community events coordinator, leverages meticulous bookkeeping and warm interpersonal skills to organize church socials, senior‑center programs,
    and local fundraisers with a blend of routine‑driven precision and friendly flexibility, and they are known for assertively guiding volunteers while maintaining a compassionate tone.
  sports: Ellen Newby enjoys walking the Evansville riverfront trail, participates in a senior pickleball league, follows the Indianapolis Colts and the Evansville Purple Aces with seasonal enthusiasm,
    and they keep fit through low‑impact yoga and occasional community fun runs.
  arts: Ellen Newby sings in her church choir, treasures the folk ballads of Johnny Cash and the gospel harmonies of The Blind Boys of Alabama, crafts quilts inspired by Grandma Moses scenes, attends community
    theatre productions of classic plays, and they regularly listen to the soothing piano works of George Winston.
  travel: Ellen Newby prefers carefully planned road trips, often visits the Great Smoky Mountains, the Amish farms of Lancaster, and the beachfront inns of Gulf Shores, uses senior discounts for lodging,
    and they balance travel with family visits to grandchildren in Florida during holidays.
  culinary: Ellen Newby excels at cooking traditional Midwestern dishes such as pork tenderloin sandwich, sugar‑cream pie, and chicken and dumplings, grows tomatoes and herbs in her garden for fresh sauces,
    enjoys leading cooking classes at the senior center, and they occasionally treat themselves to a slice of chocolate cake from the local bakery.
  core: Ellen Newby is a routine‑loving, community‑driven senior who blends meticulous organization with outgoing sociability, hoards grocery coupons like treasure, and always has a spare invitation ready
    for the next garden party.
background:
  cultural: Ellen was raised in the Hoosier heartland, embodying the modesty, practicality, and strong community ethic typical of mid‑20th‑century white families in Indiana. Her family’s roots trace back
    to German and English settlers, and she grew up with Protestant (Methodist) values that emphasize service, family gatherings, and respect for tradition. Evansville’s blend of city life and nearby farmland
    shaped her appreciation for both organized events and hands‑on activities like gardening and cooking. These cultural influences reinforce her preference for routine, her outgoing nature in group settings,
    and her dedication to preserving local customs.
