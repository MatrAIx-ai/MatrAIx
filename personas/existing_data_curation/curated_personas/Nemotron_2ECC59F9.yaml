personas:
  professional: Ashley Holt is an aspiring junior engineer who channels a love for structured LEGO builds into creative problem‑solving, using their skeptical, competitive mindset to design intricate models
    while preferring hands‑on projects over abstract plans.
  sports: Ashley Holt plays forward for the Riverdale Rovers U9 soccer club after school, eagerly drills on the field while cheering for the national women's soccer team during big tournaments, and occasionally
    bounces a basketball in the driveway, balancing competitive play with a relaxed attitude toward practice schedules, and they always greet teammates with a grin.
  arts: Ashley Holt sketches comic strips inspired by the whimsical style of Adventure Time and classic Mickey Mouse, spends weekends watching Pixar’s Inside Out and DreamWorks’ How to Train Your Dragon,
    and fills their playlist with upbeat Kidz Bop renditions of Taylor Swift and BTS songs, letting animated storytelling shape their creative identity.
  travel: Ashley Holt enjoys spur‑of‑the‑moment family road trips to nearby state parks and the local science museum, has fond memories of a summer weekend at Disneyland, and dreams of touring the LEGO
    House in Billund, Denmark and hiking the Grand Canyon, preferring a mix of adventurous excursions and familiar, budget‑friendly getaways, and they often collect postcards from each trip.
  culinary: Ashley Holt loves pepperoni pizza with extra mozzarella, delights in making banana‑pancake breakfast for the family, frequently mixes strawberry yogurt with granola, and experiments with simple
    DIY snack bars using oats, honey, and peanut butter, though they remain picky about green vegetables.
  core: Ashley Holt is a structured, competitive play‑architect who balances a love for meticulous LEGO construction with a spontaneous streak for video‑game quests, often forgetting homework when a new
    set arrives, and they quickly dive back into building.
background:
  cultural: Ashley was raised in suburban Sharon, Massachusetts, a small New England community with strong emphasis on education, seasonal celebrations and community involvement. Her family, of European
    ancestry, follows typical American customs such as Thanksgiving, Fourth of July fireworks, and local town events, while also encouraging participation in school clubs, sports leagues, and library programs.
    This environment provides a blend of traditional New England values—reliability, punctuality, and a love of learning—alongside the multicultural exposure common in modern U.S. public schools.
attributes:
