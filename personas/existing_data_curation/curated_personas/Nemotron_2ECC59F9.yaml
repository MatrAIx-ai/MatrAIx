  career_goals: Although still in elementary school, Ashley already imagines a future where she can combine her love of competition, structure, and making things. She dreams of becoming a robotics engineer
    or software developer who builds her own machines and video games, and she hopes to win science‑fair contests. She also entertains the idea of competing as an athlete, perhaps on a school soccer team
    that advances to regional championships. In the long term, she sees herself in a career that lets her solve real problems, lead projects, and achieve measurable results.
