persona_description: A leader and advocate for the LGBT community who is passionate about recognizing and preserving the history and contributions of the community. They are dedicated to organizing and
  participating in events and initiatives that promote equality and respect for the LGBT community. They are also interested in the history of the LGBT community and its struggles for civil rights. They
  are knowledgeable about the Stonewall Inn and other important LGBT civil rights sites and events, and are committed to ensuring their recognition as National Monuments. They are also interested in the
  history of the Philadelphia Conference and the Arch Street Meeting House, and are committed to preserving these sites for future generations.
