  career_goals: James aims to step into a supervisory role—ideally as a shift manager or safety coordinator—where he can apply his process-optimization expertise to reduce waste and boost efficiency. He
    is currently completing his associate degree in business administration, a step he believes will qualify him for senior management and provide a solid foundation for a future consulting venture in food-safety
    compliance. Ultimately, he wants to secure a stable retirement while leaving a legacy of mentorship for the next generation of plant workers.
