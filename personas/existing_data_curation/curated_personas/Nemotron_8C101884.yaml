personas:
  professional: Maria Escobar is a telecommunications field engineer who leverages her practical, structure‑loving mindset and competitive edge to master RF diagnostics, regulatory compliance, and team
    leadership, even as her relaxed approach to paperwork sometimes creates mild chaos in project documentation.
  sports: Maria Escobar powers through weekend hikes in the Loess Hills and long rides on the Des Moines trail system, cheers the Iowa Hawkeyes football team, and occasionally joins the Des Moines Cycling
    Club, maintaining a disciplined yet flexible fitness routine that mirrors their competitive yet relaxed personal style.
  arts: Maria Escobar’s artistic side shines when they tinker with a vintage Moog synthesizer while spinning tracks from Aphex Twin and Kraftwerk, and they unwind with sci‑fi novels by N.K. Jemisin and
    visits to the Des Moines Art Center to view works by Grant Wood, blending technical curiosity with a hunger for auditory and visual innovation.
  travel: Maria Escobar favors spur‑of‑the‑moment road trips across the Midwest—like a weekend drive to the Badlands—while also dreaming of a structured backpacking adventure through Patagonia’s Andes,
    balancing a love for unplanned scenic detours with occasional meticulous itineraries for overseas travel.
  culinary: Maria Escobar is an adept home cook who fuses traditional Mexican street‑taco flavors—like carne asada using locally sourced Iowa pork shoulder and a drizzle of chipotle‑infused honey—into Midwestern
    twists such as a corn‑meal‑crusted fish taco with fresh cucumbers, always experimenting with cilantro, smoked paprika, and farm‑to‑table ingredients.
  core: Maria Escobar blends a competitive, detail‑driven engineering mind with a laid‑back, improvisational kitchen and ham‑radio hobby, channeling structure into work while habitually misplacing schematics
    at home.
background:
  cultural: Maria was born to Mexican immigrant parents who settled in the Midwest, and she grew up bilingual, speaking Spanish at home and English in school. Her family celebrates Mexican holidays such
    as Día de los Muertos and Cinco de Mayo, and she stays connected to her extended family in Mexico through regular video calls. Living in Des Moines, she blends Mexican culinary traditions with Iowa’s
    farm‑to‑table culture, participates in local Latino community events, and volunteers at the city’s multicultural festival. Her cultural identity informs her work ethic—valuing perseverance, community
    support, and respect for diverse perspectives—while giving her a unique lens on problem‑solving and communication.
attributes:
  skills: '[''RF system installation'', ''Microwave link setup'', ''Fiber optic splicing'', ''Signal testing and calibration'', ''Electrical schematics interpretation'', ''FCC compliance'', ''Safety protocols'',
    ''Troubleshooting hardware failures'', ''Project coordination'', ''Customer communication'']'
  hobbies: '[''Cooking Mexican fusion dishes'', ''Amateur ham radio operation'', ''Hiking in the Loess Hills'', ''Cycling around Des Moines'', ''DIY electronics and synth building'', ''Reading science fiction'',
    ''Listening to tech podcasts'']'
  career_goals: Maria aims to become a senior field engineer within the next five years, leading a team of technicians and overseeing large‑scale infrastructure projects across the Midwest. She plans to
    earn the Certified Telecommunications Network Specialist (CTNS) and BICSI Installer 2 certifications, and eventually launch her own independent telecom contracting firm specializing in rural broadband
    deployment. Driven by her competitive nature, she seeks industry recognition as a technical authority in RF optimization and wants to mentor junior technicians while consistently winning project bids
    and certification exams.
