persona_description: A US Geological Survey (USGS) scientist who specializes in coastal hurricane-related research, particularly in the study of storm vulnerability and the development of accurate and timely
  storm tide data for coastal communities. The scientist has responded to every major hurricane for almost two decades and has developed a science plan to support recovery, restoration, and rebuilding efforts
  following Hurricane Sandy. The scientist's work yields data and better models addressing future hazard scenarios, thereby helping coastal communities to be better prepared to withstand and respond to
  coastal storms.
