  career_goals: Although retired from formal employment, Dayna’s ambitions focus on deepening her artistic legacy and expanding community impact. She aims to curate a traveling intergenerational art exhibition
    that showcases works by senior artists alongside local youth, leveraging her event‑planning expertise. Publishing a collection of her poems and memoir reflections on the cultural shifts she has witnessed
    is a personal milestone. She aspires to become a docent at the Salvador Dalí Museum, sharing her love for abstract art with visitors. Dayna also plans to launch a small scholarship fund for promising
    young painters in Pinellas County, and she hopes to win a regional senior‑artist competition to gain broader recognition for her work. Continuing education is important to her, so she intends to complete
    an advanced course in abstract painting techniques and travel to major art museums in Europe, especially in Spain and Italy, to study the masters that inspire her.
