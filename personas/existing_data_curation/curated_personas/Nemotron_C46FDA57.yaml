  career_goals: Although retired from formal employment, Frances is driven to leave a lasting artistic and cultural imprint on her community. She aims to curate a traveling exhibition of senior artists
    in Montgomery County, complete a series of twelve large-scale abstract canvases that explore the intersection of memory and place, and publish a memoir that weaves together her family history with reflections
    on Southern art. She also plans to launch a mentorship program that pairs emerging local artists with seasoned volunteers, and hopes to earn a bachelor’s degree in fine arts to further deepen her theoretical
    understanding.
