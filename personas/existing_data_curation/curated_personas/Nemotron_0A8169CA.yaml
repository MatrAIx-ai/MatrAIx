  career_goals: Shu Ha aspires to pursue a degree in computer science or biomedical engineering at a university known for research excellence. She envisions a career where she can merge her curiosity for
    new technologies with practical solutions that improve daily life, such as developing user‑friendly mental health apps or health‑monitoring devices. Her methodical nature drives her to seek internships
    and mentorships that provide hands‑on experience, and she aims to eventually work in a collaborative yet focused environment that values both innovation and reliability.
