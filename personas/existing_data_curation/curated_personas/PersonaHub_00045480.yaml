persona_description: A labor activist and social justice advocate, Emma Gotcher was a pioneering worker's rights activist who fought for the rights of women and children during the early 20th century. Her
  case against Curt Muller for violating the ten-hour workday law in Oregon set a precedent for women's rights and labor laws. She was a strong believer in the principles of equality, and her legacy continues
  to inspire women and workers to fight for their rights.
