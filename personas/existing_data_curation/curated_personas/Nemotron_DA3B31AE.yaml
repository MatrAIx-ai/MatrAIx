  career_goals: Though retired from formal employment, Melinda aims to stay intellectually active by pursuing independent scholarly projects that fuse science and art. She hopes to develop a series of community
    workshops in Greenfield that introduce high-school students, especially girls, to data storytelling and creative coding. Additionally, she aspires to author and illustrate a collection of speculative
    essays that explore emerging scientific ideas through narrative and visual art. These goals reflect her desire for flexibility, continual learning, and meaningful contribution without the constraints
    of a traditional job structure.
