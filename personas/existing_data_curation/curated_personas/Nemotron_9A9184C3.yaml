  hobbies: '["Watercolor painting", "Abstract sketching", "Digital illustration", "Hiking", "Wildlife photography", "Reading speculative fiction", "Science popular‑science books", "Puzzle solving", "DIY
    crafts", "Volunteer animal shelter enrichment design", "Attending art galleries and workshops"]'
  career_goals: Rosemary aims to become a senior veterinary technologist specializing in exotic and wildlife medicine, contributing to research on emerging zoonotic diseases. Over the next five years she
    plans to earn a Master’s degree in Veterinary Science or obtain a certification in veterinary practice management. In the long term she envisions opening a boutique veterinary clinic in the Greater
    Houston area that blends evidence‑based care with art‑inspired therapeutic environments for pets and owners. She also seeks to publish research on animal stress‑reduction techniques, mentor junior technicians,
    and take on leadership roles within professional veterinary societies.
