  career_goals: Even at his young age, Travis dreams of becoming an astronaut who can explore the vastness of space, an artist who brings his vivid inner worlds to life on canvas, and an inventive engineer
    who designs creative solutions to everyday challenges. He aspires to combine his love for art, science, and structured thinking into a future career that inspires curiosity, encourages collaboration,
    and makes a positive impact on others.
