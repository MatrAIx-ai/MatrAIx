personas:
  professional: A budding junior inventor named Travis Peterson organizes daily play‑time experiments in preschool, using methodical step‑by‑step plans and imaginative problem‑solving to lead peers in building
    simple machines out of blocks and recycled toys, and they relish the pride of seeing a prototype work.
  sports: An energetic preschooler named Travis Peterson plays on the community Tiger Cubs soccer team, practices kicking drills after school, watches the local Major League Baseball team, the Chicago Cubs,
    and they idolize soccer star Lionel Messi, while also enjoying occasional visits to the nearby indoor swimming pool.
  arts: A creative mini‑artist named Travis Peterson spends afternoons finger‑painting abstract shapes, watches animated films by Pixar, sings along to Raffi’s “Baby Beluga,” and they treasure picture books
    by Dr. Seuss, letting these artistic influences fuel endless storytelling during play.
  travel: A curious explorer named Travis Peterson loves family road trips to nearby state parks, has visited Disneyland and the Grand Canyon, dreams of seeing the Eiffel Tower someday, and they prefer
    short, supervised adventures that balance excitement with the safety of familiar routines.
  culinary: A picky eater named Travis Peterson delights in creamy mac and cheese, chicken nuggets with honey‑mustard dip, and banana slices, while resisting broccoli and peas, and they occasionally help
    stir a simple spaghetti sauce under watchful eyes.
  core: Travis Peterson is a vivacious four‑year‑old whose imagination and methodical streak drive endless backyard experiments, yet they often worry, making bedtime stories a soothing escape.
background:
  cultural: Travis is raised in a middle‑class, white family in San Diego, California. His upbringing blends typical American traditions—celebrating holidays such as Thanksgiving, Christmas, and the Fourth
    of July—with the relaxed, outdoor‑oriented lifestyle of Southern California. Frequent trips to local beaches, parks, and community libraries expose him to the region's diverse cultural fabric, while
    his family values reliability, organization, and community involvement. This environment nurtures his sociable nature, curiosity about the natural world, and appreciation for artistic expression.
