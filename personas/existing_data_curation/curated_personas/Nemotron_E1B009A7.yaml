  career_goals: At 72, Kason aims to shift from full‑time job sites to a mentorship and artistic role. He plans to become a certified master painter to advise on historic restoration projects and to consult
    on sustainable paint applications. A key ambition is to secure a commission for a community mural that celebrates Philadelphia’s multicultural heritage, and he hopes to win the city’s annual "Best Mural"
    competition. Long‑term, Kason envisions opening a modest studio where he can teach weekend art workshops, showcase his own paintings, and sell hand‑mixed paints, thereby leaving a creative legacy while
    staying socially active within his neighborhood.
