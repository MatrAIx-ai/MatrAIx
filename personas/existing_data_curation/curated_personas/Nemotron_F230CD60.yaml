  hobbies: '["Observational sketching", "Digital illustration", "Scratch animation", "Reading (fiction and science)", "Creative writing", "Piano practice", "Nature photography", "Model building (LEGO, scale
    kits)", "Solo gardening"]'
  career_goals: Shemeki aspires to a career that merges his love for art, technology, and tranquil environments. He dreams of becoming a visual artist or graphic designer who creates illustrations for books,
    games, or educational materials. He is also drawn to the idea of designing interactive museum exhibits that provide contemplative, immersive experiences. In the longer term, he considers studying architecture
    or environmental design, where his meticulous planning and appreciation of nature can shape spaces that promote serenity and cultural heritage. Ultimately, he hopes his work will foster harmony, reflect
    his cultural roots, and offer peaceful places for learning and reflection.
