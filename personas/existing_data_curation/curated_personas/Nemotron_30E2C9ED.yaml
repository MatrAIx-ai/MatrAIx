    ''Problem solving under pressure'', ''Mentoring pharmacy staff'']'
  hobbies: '[''Reading historical non‑fiction and medical journals'', ''Gardening (vegetables and herbs)'', ''Cooking Italian cuisine'', ''Woodworking small projects'', ''Crossword puzzles'', ''Fishing
    at Belews Lake'', ''Playing chess at a local club'', ''Volunteering at community health fairs'', ''Hiking on local trails in small groups'']'
  career_goals: Angelo aims to transition into a pharmacy manager role within the next three years, focusing on integrating medication therapy management programs that improve patient outcomes while streamlining
    workflow to reduce staff stress. He is pursuing board certification (BCPS) to deepen his clinical expertise and plans to develop a community outreach initiative that provides free health screenings
    and education for underserved neighborhoods in Greensboro. Long‑term, he dreams of opening a boutique pharmacy that blends his interest in personalized care with innovative services like telepharmacy
    and chronic disease monitoring, all while maintaining a balanced work‑life schedule for himself and his family.
