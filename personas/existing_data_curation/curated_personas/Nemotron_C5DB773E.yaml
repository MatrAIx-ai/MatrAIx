  career_goals: Naadiya aspires to transition into a technical leadership role where she can guide product strategy while fostering a collaborative, inclusive team culture. She aims to become an engineering
    manager or solutions architect, leveraging her curiosity for emerging technologies like AI and serverless computing to deliver practical, high‑impact solutions. Additionally, she is passionate about
    expanding representation of Black women in tech by organizing mentorship programs, speaking at regional conferences, and contributing to open‑source projects that prioritize accessibility and equity.
    Flexible, remote‑friendly work arrangements are also a priority, allowing her to balance professional growth with community involvement in Alexandria.
