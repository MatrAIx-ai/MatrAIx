personas:
  professional: Anmar Hedden is a budding junior naturalist and aspiring builder, blending their curiosity about local wildlife with practical, organized LEGO engineering and early coding games, which makes
    them methodically document pond ecosystems and meticulously plan each brick placement.
  sports: Anmar Hedden revels in weekend hikes through the woods near Milaca, cheers on the Minnesota Twins during baseball season, and competes in the Milaca Youth Soccer Club, balancing energetic team
    play with the quiet, reflective scouting hikes that satisfy their love of nature.
  arts: Anmar Hedden devotes rainy afternoons to drawing comic strips inspired by the whimsical illustrations of Shaun Tan, delving into the magical narratives of J.K. Rowling’s Harry Potter series, and
    practicing simple piano pieces by ear, often humming the melodies of Disney’s Frozen soundtrack while aligning LEGO bricks to the rhythm.
  travel: Anmar Hedden’s travel dreams include exploring the pristine waters of the Boundary Waters Canoe Area, revisiting the interactive exhibits at Chicago’s Museum of Science and Industry, and someday
    trekking to the Grand Canyon, all while planning trips with their family using a colorful map calendar to stay organized.
  culinary: Anmar Hedden favors crunchy carrot sticks with ranch dip, builds personalized mini‑pizzas topped with pepperoni, mozzarella, and a splash of pineapple, and enjoys mixing a homemade trail‑mix
    of almonds, raisins, chocolate chips, and pretzel bits, often helping their parent measure flour for LEGO‑themed cupcakes in the kitchen.
  core: Anmar Hedden channels relentless curiosity and meticulous organization into every rock‑collecting adventure, LEGO construction, and piano practice, while their occasional worries drive them to seek
    comfort in nature walks and structured routines.
background:
  cultural: Anmar grows up in Milaca, a small town in Kanabec County, Minnesota, a region with strong Scandinavian‑American roots and a close‑knit Midwestern community ethos. His family celebrates local
    traditions such as the summer county fair, ice‑fishing season, and Thanksgiving with homemade casseroles, while attending a nearby Catholic school. The community values self‑reliance, volunteerism,
    and respect for the outdoors, shaping his practical outlook and love for nature. His parents emphasize a balance of curiosity and responsibility, reflecting the region’s cultural emphasis on hard work,
    kindness, and caring for neighbors.
