  career_goals: Anmar dreams of a future where he can combine his curiosity about how things work with a practical desire to help others. He imagines becoming an engineer who designs kid‑friendly bridges
    and playgrounds in his town, or a wildlife researcher who protects Minnesota’s lakes and forests. He also looks up to doctors and veterinarians who care for people and animals, hoping to develop the
    calm problem‑solving skills needed when he feels worried. Alongside these ambitions, he wants to be a community leader who organizes neighborhood clean‑ups and school projects, balancing compassion
    with self‑interest.
