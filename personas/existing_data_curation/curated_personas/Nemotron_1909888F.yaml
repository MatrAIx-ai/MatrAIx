  hobbies: '[''Visiting art galleries and museums'', ''Creating Mexican folk art crafts'', ''Cooking traditional Mexican meals'', ''Participating in local cultural festivals'', ''Salsa dancing'', ''Gardening'',
    ''Knit and crochet projects'', ''Volunteer work at community centers'', ''Reading about history and new ideas'', ''Taking community college classes for personal enrichment'']'
  career_goals: Maria aims to advance from her current secretarial role to an office manager position within the next few years, seeking to lead a small team and shape workflow processes. She plans to earn
    a Certified Administrative Professional (CAP) credential and to deepen her proficiency with accounting software such as QuickBooks. Beyond professional advancement, Maria is passionate about her community
    and hopes to volunteer as a mentor for younger employees, sharing her practical knowledge and work ethic. In the longer term, she dreams of helping establish a community arts hub in Hanford, where local
    artists—especially those from Mexican heritage—can showcase their work and where she can combine her administrative expertise with her love of art.
