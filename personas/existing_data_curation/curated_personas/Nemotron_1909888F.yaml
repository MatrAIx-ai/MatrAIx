personas:
  professional: Maria Montalvo, a veteran administrative professional with bilingual fluency, leverages meticulous organization, reliable calendar management, and a warm customer‑service style to seamlessly
    coordinate office logistics and community art programs, while assertively pursuing a Certified Administrative Professional credential and an office‑manager role.
  sports: Maria Montalvo, a regular participant in the local senior softball league and a weekend hiker with the Fresno Parks and Recreation group, follows the Fresno State Bulldogs football season and
    supports the Los Angeles Dodgers, integrating community camaraderie with moderate fitness routines.
  arts: Maria Montalvo, an avid patron of visual and performing arts, frequents the Fresno Art Museum, crafts papel picado and hand‑painted tiles, and draws inspiration from Frida Kahlo, Diego Rivera, and
    contemporary dancer Lil Buck, weaving artistic expression into everyday life.
  travel: Maria Montalvo, a meticulous planner, favors cultural road trips to historic towns like Santa Fe and Granada, balances weekend getaways to the California coast with a desire to explore the vineyards
    of Napa Valley, yet keeps travel within a modest budget to support her community arts hub dream.
  culinary: Maria Montalvo, a seasoned home cook, delights in preparing mole, tamales, and tlacoyos using home‑grown chilies and fresh herbs, masters the art of layering flavors while occasionally over‑salting
    dishes in her enthusiasm, and enjoys savoring regional specialties at the annual food festival.
  core: Maria Montalvo, a detail‑oriented, sociable 50‑year‑old who blends organized professionalism with a vibrant love for folk art, gardening, and community, often juggling spreadsheets and salsa steps
    in equal measure.
background:
  cultural: Maria is a first‑generation Mexican‑American who grew up in a close‑knit family that preserved many traditions from Mexico’s central highlands, such as Día de los Muertos celebrations, mariachi
    music, and communal cooking. Bilingual and bicultural, she effortlessly navigates both Spanish‑speaking and English‑speaking environments, often acting as a cultural bridge in her workplace and community.
    Living in Hanford, a city with deep agricultural roots and a vibrant Latino community, Maria participates in local fiestas, church events, and neighborhood gatherings that reflect her heritage. Her
    cultural identity shapes her values—family loyalty, hard work, respect for elders—and informs her enthusiasm for sharing Mexican art, cuisine, and customs with a broader audience.
attributes:
  skills: '[''Office administration'', ''Calendar management'', ''Document preparation'', ''Bilingual communication (Spanish/English)'', ''Customer service'', ''Event planning'', ''Basic bookkeeping'',
