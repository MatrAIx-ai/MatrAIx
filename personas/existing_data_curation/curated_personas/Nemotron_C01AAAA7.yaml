personas:
  professional: Raven Kearse, a seasoned construction professional with expertise in carpentry, concrete work, blueprint reading, and heavy‑equipment operation, applies their meticulous organization and
    safety‑first mindset to coordinate small crews, and they aspire to become a site foreman within three years before launching a community‑focused, sustainable building firm.
  sports: Raven Kearse, an avid walker on the Capital Crescent Trail and occasional participant in the Takoma Park Running Club’s 5K runs, roots for the Washington Capitals, Washington Wizards, and DC United,
    enjoys friendly weekend softball games with neighbors, and they stay active by blending gentle cardio with occasional strength training.
  arts: Raven Kearse, a devoted gallery‑hopper who draws inspiration from the abstract murals of Kehinde Wiley, the bold installations of Mark Bradford, and the timeless architecture of Frank Lloyd Wright,
    fills their evenings with the sounds of Miles Davis, Aretha Franklin, and Mahalia Jackson, and they sketch design ideas in a worn notebook while sipping tea.
  travel: Raven Kearse, a meticulous planner who prefers purposeful trips over spontaneous getaways, has explored the historic streets of Boston, the sustainable housing showcases in Portland, and dreams
    of visiting Copenhagen’s eco‑districts and Kyoto’s zen gardens, all while balancing travel costs with their goal of saving for a future community‑building venture.
  culinary: Raven Kearse, a moderately skilled home cook who cultivates tomatoes, basil, and kale in their backyard, crafts fresh garden salads, hearty jambalaya with smoked sausage, and a signature herb‑infused
    olive oil for grilled vegetables, and they occasionally treat themselves to a jazz‑themed brunch at a local eatery.
  core: Raven Kearse, a 41‑year‑old construction aficionado with a penchant for vintage jazz vinyl, an obsession with color‑coded toolboxes, and a habit of turning every spare minute into a DIY project,
    embodies disciplined curiosity and community spirit.
background:
  cultural: Raven’s cultural background is rooted in African‑American traditions of the Mid‑Atlantic region. Raised in a close‑knit family that valued community, church gatherings, and storytelling, she
    carries forward the resilience and collaborative spirit of her heritage. Living in Takoma Park, a diverse suburb of Washington, D.C., she engages with local African‑American cultural events, supports
    community art projects, and participates in neighborhood initiatives that celebrate Black history and promote social equity. Her upbringing has instilled a deep respect for collective harmony, which
    shapes her considerate nature and her commitment to uplifting others.
attributes:
  skills: '[''carpentry'', ''concrete mixing and pouring'', ''blueprint reading'', ''equipment operation (mini‑excavator, forklift)'', ''site safety compliance'', ''small crew leadership'', ''material estimation
    and inventory management'', ''hand and power tool proficiency'', ''problem solving'', ''time management'']'
  hobbies: '[''visiting art galleries and museums'', ''reading architecture and design books'', ''DIY home‑improvement projects'', ''gardening'', ''listening to jazz, soul, and gospel music'', ''volunteering
    with youth after‑school construction programs'', ''hiking the Capital Crescent Trail'']'
  career_goals: Raven aims to advance from laborer to site foreman within the next three years, leveraging her organizational strengths and safety expertise. She aspires to become a certified safety officer
    and eventually launch a small, community‑focused construction firm that emphasizes sustainable building practices and affordable housing for the Takoma Park area. Mentoring younger workers, especially
    women and people of color entering the trades, is a central part of her long‑term ambition.
