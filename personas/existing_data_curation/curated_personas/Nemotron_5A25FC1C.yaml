  hobbies: '["Reading mystery and science books", "LEGO building", "Simple science experiments (volcanoes, slime)", "Soccer", "School choir singing", "Beginner piano practice", "Drawing and sketching",
    "Scratch programming (simple animations)", "Nature walks and collecting leaves/rocks", "Keeping a sketch journal"]'
  career_goals: As she grows, Lisa dreams of turning her love for animals and science into a career as a veterinarian, envisioning herself caring for pets and wildlife in her community. She is also fascinated
    by space, often reading about astronauts and imagining herself exploring the stars, which fuels an ambition to study astronomy or engineering in the future. Lisa hopes to earn recognition in school
    science fairs, using those experiences as stepping stones toward a college degree in biology or environmental science. Ultimately, she wants to combine her curiosity, practical problem‑solving, and
    community‑focused values to protect the natural world and help others, whether as a veterinarian, a research scientist, or an educator.
