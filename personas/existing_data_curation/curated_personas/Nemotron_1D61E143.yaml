  hobbies: '[''reading speculative fiction'', ''watercolor painting'', ''abstract sketching'', ''urban photography'', ''model kit building'', ''crossword puzzles'', ''journaling'', ''experimental cooking'',
    ''volunteering at a community art center'', ''attending automotive shows and gallery openings'']'
  career_goals: Philip envisions moving from front‑line cashier duties to a supervisory role within the next two years, aiming to become a store manager where he can apply his organizational strengths and
    creative flair to visual merchandising. Long‑term, he aspires to combine his love of art and community by opening a small boutique that doubles as a local art‑café, offering curated supplies, rotating
    gallery space, and workshops. He also hopes to network with Dearborn’s cultural institutions to eventually serve as a community arts coordinator, crafting programs that bring creative experiences to
    families across Wayne County.
