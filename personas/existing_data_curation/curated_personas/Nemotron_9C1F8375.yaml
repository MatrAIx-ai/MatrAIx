  hobbies: '["Scale model building (automobiles and ships)", "Reading science‑fiction and technical nonfiction", "Urban balcony gardening", "Listening to jazz and blues", "DIY electronics and Arduino projects",
    "Solo hiking in local nature preserves", "Meditation and mindfulness practice", "Photography of Detroit’s industrial architecture"]'
  career_goals: Thea aims to progress into a supervisory role within the fabrication department, eventually becoming a shift lead and then a floor manager. She plans to earn industry certifications such
    as the Certified Production Technician (CPT) and Certified Manufacturing Engineer (CMfgE) to solidify her technical credibility. Beyond personal advancement, she is passionate about creating a structured
    mentorship program that equips junior workers, especially women and minorities, with the skills and confidence needed to thrive in manufacturing. Long‑term, she envisions launching a side business offering
    custom metal art and functional pieces for local community events, blending her technical expertise with her creative interests while giving back to Detroit’s neighborhoods.
