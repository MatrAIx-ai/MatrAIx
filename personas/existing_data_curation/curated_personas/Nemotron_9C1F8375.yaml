personas:
  professional: Thea Stuckey is a seasoned fabricator in Detroit’s automotive supply chain who blends CNC machining, lean‑Kaizen efficiency, and a patient, empathetic mentorship style to champion precision
    and team harmony while actively pursuing supervisory roles and industry certifications.
  sports: Thea Stuckey supports the Detroit Tigers and Red Wings from her quiet balcony, joins a weekend hiking group in nearby nature preserves for low‑impact cardio, and occasionally attends indoor rock‑climbing
    sessions to keep functional strength aligned with her fabrication work.
  arts: Thea Stuckey’s artistic life revolves around jazz and blues soundtracks while she builds scale models, draws visual inspiration from Detroit’s industrial photography of Mike Henneberry, and frequents
    the Museum of Contemporary Art Detroit to study contemporary metal sculpture.
  travel: Thea Stuckey favors solitary, purpose‑driven trips such as a weekend retreat to the Porcupine Mountains for hiking and reflection, a study tour of Stuttgart’s precision engineering museums to
    fuel her technical curiosity, and a road‑trip along historic Route 66 to scout vintage automobile sites for future metal‑art projects.
  culinary: Thea Stuckey enjoys cooking simple, herb‑forward meals like rosemary‑roasted potatoes and basil‑pesto pasta using fresh produce from her balcony garden, while rewarding herself with a perfectly
    seared ribeye at a Detroit steakhouse after a demanding shift.
  core: Thea Stuckey is a meticulous fabricator who thrives in quiet creation, balances technical precision with compassionate mentorship, and channels her curiosity into metal art, solo hikes, and carefully
    curated investments.
background:
  cultural: Thea is an African‑American woman whose family has deep roots in Detroit’s working‑class neighborhoods. Growing up amidst the city’s rich musical heritage—from Motown to jazz and blues—she internalized
    a strong sense of community, resilience, and pride in Black cultural traditions. Her parents emphasized the value of hard work and education, leading her to pursue an Associate’s degree in Manufacturing
    Technology at Wayne County Community College. The shared experiences of Black women in the automotive sector have shaped her perspective on equity and mentorship, motivating her to support other underrepresented
    workers. While she prefers solitude, she remains connected to her cultural identity through family gatherings, soulful cooking, and participation in local events such as the Detroit Black History Month
    festivals and community workshops that celebrate African‑American craftsmanship.
attributes:
  skills: '["CNC machine operation", "Blueprint and schematic interpretation", "MIG/TIG welding", "Metal cutting and forming", "Quality inspection and statistical process control", "Lean manufacturing and
