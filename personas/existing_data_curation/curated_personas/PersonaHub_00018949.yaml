persona_description: A teacher who is passionate about promoting the use of coding in education and has taken the initiative to adopt a new tool, Code Kingdoms, to teach computer science to children. They
  are a dedicated IT and Computer Science leader who can promote change and support other teachers in their school. They have a background in ICT and are familiar with Scratch, a popular tool for coding.
  They are interested in using Code Kingdoms to teach the Computing National Curriculum and have partnered with the BBC and Teach First to support their initiative. They are open to new technologies and
  are willing to explore alternative methods of teaching coding. They are committed to ensuring that children have access to the latest tools and resources to develop essential skills in coding.
