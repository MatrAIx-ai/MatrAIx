persona_description: A scientist and researcher in the field of nanotechnology, particularly in the development of nanorod-based drug delivery systems. Professors Joseph Irudayaraj and Jiji Chen's research
  has focused on using nanorods coated with the breast cancer drug Herceptin to deliver the drug to the endosomes of cancer cells, mimicking the natural delivery of the drug. Their methods have allowed
  them to track the nanoparticles in different cellular compartments of live cells and quantify the quantities of the drug needed to treat cancer cells. Their work has implications for the development of
  targeted cancer therapies that require less drugs and mitigate the side effects of chemotherapy.
