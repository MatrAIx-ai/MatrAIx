persona_description: A historian and archaeologist who is interested in the origins and development of the peoples of Northwestern Europe, particularly the Germanic languages. They are also interested in
  the role that language contact has played in creating these languages and the key that linguistics can provide in unlocking the secret of their genesis. They are likely to have a background in history,
  archaeology, and human evolutionary genetics, and have a strong interest in the linguistic and cultural history of the region. They are also likely to be familiar with the work of linguists and archaeologists
  in this field, and have a keen interest in using linguistic data to understand the cultural and historical context of the peoples of Northwestern Europe.
