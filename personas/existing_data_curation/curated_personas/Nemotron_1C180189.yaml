personas:
  professional: Betty Foreman leverages their curiosity for practical tools and strong organizational skills to volunteer at the food bank, lead a community line‑dancing group, and chart a path toward a
    Home Health Aide certification while laying the groundwork for a home‑based block‑party coordination and cleaning business.
  sports: Betty Foreman enjoys weekly walks with a local women’s walking club, participates in community line‑dancing sessions as a low‑impact cardio routine, cheers on the Tampa Bay Buccaneers and Miami
    Heat during the football and basketball seasons, and signs up for seasonal senior‑friendly yoga classes at the community center.
  arts: Betty Foreman spends evenings listening to Dolly Parton and classic country playlists while line‑dancing, devours historical romance novels by authors like Julia Quinn, attends occasional performances
    at the local community theater featuring classic plays by Tennessee Williams, and curates a small collection of folk‑art prints from regional artisans.
  travel: Betty Foreman prefers short road trips that blend cultural immersion and nature, having explored Savannah’s historic squares, taken a weekend to the Florida Keys for snorkeling, and dreaming of
    a future visit to Charleston, South Carolina to sample its historic cuisine and art scene.
  culinary: Betty Foreman delights in cooking low‑cost Southern comfort meals such as shrimp‑and‑grits, collard greens seasoned with smoked turkey, and a hibiscus‑infused peach cobbler, often using pantry
    staples like buttermilk and cornmeal while experimenting with fresh herbs from their garden.
  core: Betty Foreman is a community‑driven optimist who balances meticulous budgeting with a penchant for DIY projects, never misses a neighborhood block party, yet occasionally forgets to water the hibiscus
    until the last minute.
background:
  cultural: Betty was raised in a modest white family in central Florida, steeped in Southern hospitality and a strong Protestant church community. Her upbringing emphasized self‑reliance, neighborly support,
    and celebration of regional traditions such as county fairs and local cuisine like fried catfish and peach cobbler. While her primary cultural identity aligns with traditional Southern values, she has
    also absorbed the multicultural flavor of Mulberry, Florida, including seasonal exposure to Hispanic neighbors and Florida’s diverse agricultural heritage, which enriches her appreciation for community
    and shared meals.
