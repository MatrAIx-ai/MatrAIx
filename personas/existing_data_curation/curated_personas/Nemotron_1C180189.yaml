  hobbies: '[''Volunteering at food bank'', ''Organizing neighborhood block parties'', ''Line dancing at community center'', ''Native Florida gardening'', ''Cooking Southern comfort foods'', ''Bird‑watching'',
    ''Walking club outings'', ''Reading historical romance novels'', ''DIY upcycling furniture'', ''Floral arrangement for community events'']'
  career_goals: Betty aims to earn her GED within the next year and then pursue a Home Health Aide certification so she can secure a stable part‑time role caring for seniors. She also dreams of turning
    her event‑planning flair into a small home‑based business offering neighborhood block‑party coordination and cleaning services. In parallel, she hopes to deepen her computer skills to qualify for an
    administrative assistant position at the local community center, where she can blend her organizational talent with her love for helping others.
