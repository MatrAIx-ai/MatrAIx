  hobbies: '[''Gardening'', ''Cooking traditional recipes'', ''Hosting dinner parties'', ''Book club participation'', ''Attending theater productions'', ''Volunteer tutoring'', ''Hiking with friends'',
    ''Knitting and crocheting'', ''Yoga'']'
  career_goals: Lauren aims to secure tenure and ultimately serve as department chair, where she can shape a balanced, student‑centered curriculum that blends traditional humanities scholarship with practical,
    community‑focused projects. She seeks to develop an interdisciplinary program that links local Ohio history and cultural studies with the region’s manufacturing heritage, increasing student engagement
    and employability. Additionally, she aspires to publish research on inclusive and collaborative teaching methods, obtain funding for service‑learning initiatives, and mentor emerging educators to foster
    a supportive departmental culture.
