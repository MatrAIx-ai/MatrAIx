  career_goals: Erin aims to advance from receptionist to office manager within the next three years, seeking to lead a small administrative team and oversee office procedures. She plans to complete a bachelor's
    degree in Business Administration at a nearby community college to broaden her management competencies. Long‑term, she envisions transitioning into a community outreach coordinator role for the county,
    leveraging her knowledge of local resources to support residents. Additionally, Erin hopes to become a mentor for new front‑desk staff, sharing her organized workflow techniques and stress‑management
    strategies.
