  career_goals: Kara is motivated to pursue a career that blends her scientific curiosity with practical problem‑solving. She aims to attend a STEM‑focused high school and eventually study biomedical engineering
    or environmental science at a university. Her long‑term ambition is to develop technologies or solutions that improve community health and sustainability, such as designing affordable medical devices
    or creating data‑driven environmental initiatives. She also envisions gaining experience through science fairs, internships at local research labs, and volunteering at community health centers to build
    a solid foundation for her future career.
