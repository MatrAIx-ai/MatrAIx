persona_description: A soil scientist who specializes in the study of nitrogen fertilization, particularly the methods and techniques used for evaluating nitrogen status in soils and predicting the need
  for nitrogen fertilizer. His research interests include the development and evaluation of laboratory methods for determining the nitrogen supplying power of the irrigated soils of northern Utah. His work
  involves the use of chemical methods to release the same amount or a constant portion of the amount of nitrogen that normally would be furnished to a growing plant by the soil during one season.
