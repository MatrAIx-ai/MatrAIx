    art gatherings", "Resin art"]'
  career_goals: She aims to transition from her informal role into a part‑time freelance creative professional, building a portfolio of illustrations and custom art pieces for online clients. Over the next
    five years she hopes to launch an e‑commerce boutique selling her original artwork and handcrafted home décor, and eventually enroll in a community‑college program in graphic design or creative writing
    to deepen her expertise. Long‑term, she envisions publishing a collection of speculative‑fiction stories that blend her love for abstract concepts and visual storytelling.
