personas:
  professional: A freelance illustrator and budding e‑commerce entrepreneur, Kristin Whitehead leverages their self‑taught expertise in Photoshop, Procreate, and WordPress to craft speculative‑fiction‑inspired
    visual narratives while meticulously balancing client deadlines with an ever‑present urge to experiment with new mediums, a tension they navigate with critical precision and imaginative curiosity.
  sports: A moderately active outdoor enthusiast, Kristin Whitehead follows the Colorado Avalanche and Denver Broncos, participates in the Denver Mountain Club’s weekend hikes, and attends a weekday Vinyasa
    class at Breathe Boulder, preferring low‑impact exercise that complements their gardening and artistic routines, a balance they maintain without the pressure of competitive league play.
  arts: A devoted curator of intimate art gatherings, Kristin Whitehead draws inspiration from Frida Kahlo’s bold self‑portraits, the surreal cinema of David Lynch, and the ethereal soundscapes of Björk,
    frequently hosting small salons where friends discuss speculative fiction while they demonstrate watercolor techniques and experiment with resin art.
  travel: A detail‑oriented yet spontaneous traveler, Kristin Whitehead has trekked the red rocks of Sedona, explored Iceland’s Golden Circle and the temples of Kyoto, and plans a future hike of the Inca
    Trail, arranging trips around freelance project milestones while they balance a modest travel budget with a penchant for immersive cultural experiences.
  culinary: A moderately skilled home chef, Kristin Whitehead enjoys crafting quinoa salads with roasted beets, goat cheese, and sage from their garden, whipping up lavender‑infused shortbread and wild
    mushroom risotto for intimate dinner parties, while they occasionally splurge on Colorado trout at farm‑to‑table restaurants to savor fresh local flavors.
  core: An imaginative yet pragmatically organized creative, Kristin Whitehead spends evenings sketching speculative worlds, meticulously budgets every art supply dollar, and can’t resist checking the weather
    forecast before starting a watercolor session, a quirky ritual they swear fuels their solitary artistic flow.
background:
  cultural: Kristin grew up in a small, predominantly white, middle‑class community in Colorado, where values of self‑reliance, independence, and connection to the outdoors were emphasized. Her family’s
    roots trace back to Northern European (German and Scandinavian) ancestors, shaping traditions of practicality, modesty, and a strong work ethic. Living in rural Jefferson County has fostered an appreciation
    for local crafts, sustainability, and the quiet rhythms of small‑town life, while her marriage and community ties provide a supportive, yet private, social foundation.
