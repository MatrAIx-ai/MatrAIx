  hobbies: '[''Watercolor painting'', ''Experimental photography'', ''Reading speculative fiction'', ''Creative writing'', ''Community theater'', ''Improv comedy'', ''Yoga'', ''Meditation'', ''Hiking'',
    ''Volunteering at the public library'']'
  career_goals: Charlene aims to progress into a senior sales leadership role within the next five years, targeting a position as Sales Manager or Regional Director where she can mentor a team and shape
    sales strategy for innovative service offerings. She is keen to spearhead a training program that blends sales tactics with creative thinking, fostering a culture of continuous learning. In the longer
    term, Charlene envisions launching her own boutique consulting firm that helps small‑to‑mid‑size businesses design and market cutting‑edge service solutions, leveraging her blend of business acumen
    and artistic sensibility. Throughout her career, she aspires to balance professional advancement with personal well‑being, integrating stress‑reduction practices into her leadership style.
