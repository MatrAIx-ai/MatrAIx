  career_goals: Sarai aims to transition from her current homemaker role into entrepreneurship by launching a boutique event planning and community services business within the next three years. She plans
    to obtain a project management certification to formalize her organizational expertise and leverage her associate degree in business administration to handle finances and marketing. Her ambition is
    to build a reputable brand that balances profitability with community impact, allowing her to achieve financial independence while maintaining a flexible schedule that reduces stress and supports her
    family life.
