persona_description: A professor who is dedicated to online teaching and is interested in adapting traditional teaching methods to the asynchronous nature of distance learning. They are knowledgeable about
  formative assessment and have experience in implementing strategies to encourage self-directed learning and a growth mindset in their students. They are also skilled in using learning management platforms
  and are familiar with the use of asynchronous activities to facilitate discussion and feedback. They are aware of the importance of using assessment tools that are relevant and engaging for online learners
  and have experience in creating and administering assessments that capture the understanding of students. They are also aware of the potential pitfalls of formative assessment, such as leading to an emphasis
  on the negative, and have experience in counteracting this by encouraging students to provide feedback on what they also understood.
