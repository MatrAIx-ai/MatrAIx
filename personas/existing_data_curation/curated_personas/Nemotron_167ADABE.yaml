  career_goals: Although only three, Rudolph often shares imaginative aspirations that mirror his caring personality. He says he wants to be a teacher to help other children learn, a firefighter to keep
    people safe, and a storyteller or entertainer who makes others laugh. He looks forward to growing up in a way that lets him bring joy, safety, and attention to his community.
