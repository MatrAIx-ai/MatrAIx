persona_description: An anthropologist or biologist who studies the microcosm of minute organisms, particularly those found in the deep sea vents, crevasses, and in plain sight. This individual is interested
  in the tactile experience of these organisms and how they adapt to their environment through the use of appendages such as antennae, flagella, legs, and tentacles. They are curious about the mechanisms
  and adaptations that allow these organisms to survive in their specialized niches and are fascinated by the similarities and differences they observe between dissimilar organisms. This individual is likely
  to be a scientist, researcher, or explorer who is dedicated to understanding the complex microcosm of these minute organisms.
