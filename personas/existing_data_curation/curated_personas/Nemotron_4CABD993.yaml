personas:
  professional: Joel Jones is a veteran rural physician who leverages three decades of diagnostic expertise, telehealth fluency, and a pragmatic curiosity to design patient‑centered chronic disease programs
    while mentoring residents, and they balance meticulous organization with the flexibility required for unexpected emergencies.
  sports: Joel Jones waters down their mornings with fly‑fishing trips on the Ocmulgee River, joins the local senior walking club for brisk walks, roots for the Atlanta Falcons and Atlanta Braves, and they
    maintain a flexible fitness routine that mixes gardening labor with occasional community softball games.
  arts: Joel Jones strums an acoustic guitar at church socials, enjoys the storytelling of folk singer John Prine and the lyrical poetry of Emmylou Harris, reads historical nonfiction about the American
    South, and they occasionally attend regional theater productions of classic Southern dramas.
  travel: Joel Jones prefers road‑trip explorations of historic towns like Savannah and Asheville, plans trips with detailed itineraries yet leaves room for spontaneous detours to local farmers’ markets,
    and they dream of a cultural immersion week in the Scottish Highlands despite limited vacation time.
  culinary: Joel Jones excels at cooking traditional Southern comfort foods such as shrimp and grits, collard greens simmered with smoked ham hocks, and peach cobbler, often using fresh herbs from their
    garden, while modestly rating themselves a competent home chef who enjoys sharing meals at church fundraisers.
  core: Joel Jones blends seasoned medical expertise with a love of river fishing, guitar playing, and community service, navigating their 56 years with pragmatic curiosity, steady compassion, and a penchant
    for Southern flavors and modest financial prudence.
background:
  cultural: Born and raised in central Georgia, Dr. Jones grew up in a multigenerational white farming family that emphasized hospitality, church participation, and mutual aid. The values of self‑reliance,
    respect for tradition, and a deep sense of community shaped his compassionate bedside manner and his commitment to serving underserved populations. Although he initially left high school before graduating,
    he earned a GED, pursued college, and later attended medical school—experiences that inform his advocacy for adult education and health‑literacy programs in his region. His Southern accent, love of
    regional cuisine, and familiarity with local customs underscore his cultural identity while his professional life reflects a broader, inclusive outlook.
attributes:
  skills: '["Diagnostic reasoning","Patient communication","Chronic disease management","Acute care management","Electronic health record (EHR) proficiency","Telehealth coordination","Medical mentorship","Quality
