  hobbies: '["Fly fishing","Gardening","Reading historical nonfiction","Playing acoustic guitar","Woodworking","Volunteer health‑screening events","Cooking Southern cuisine","Local history research"]'
  career_goals: Dr. Jones intends to expand access to preventive and primary care in Twiggs County by establishing a community health hub that integrates telemedicine, mobile screening units, and health‑literacy
    workshops aimed at adults without a high‑school diploma. He aspires to mentor the next generation of rural physicians, publish research on rural health disparities, and develop a collaborative care
    model that balances evidence‑based protocols with individualized patient preferences. Ultimately, he envisions a sustainable network that reduces hospital readmissions, improves chronic disease outcomes,
    and strengthens the overall health of his community.
