personas:
  professional: Chandni Patel, a 2‑year‑old, engages in pretend play as a budding builder, expertly stacking colorful blocks into orderly towers before whimsically reshaping them into imaginative castles,
    which shows that they blend curiosity and practicality while balancing organization and flexibility.
  sports: Chandni Patel loves energetic group games at the local playground, especially chasing the bright red ball with the toddler class, participates in a weekly toddler gymnastics class at the community
    center, chats excitedly about the "Sunnyvale Tigers" youth soccer team, and enjoys watching the professional soccer club "River City FC" on TV, showcasing that they value both organized activity and
    spontaneous movement.
  arts: Chandni Patel delights in listening to Raffi’s "Baby Beluga", dancing to The Wiggles’ upbeat songs, and scribbling bright pictures inspired by Eric Carle’s "The Very Hungry Caterpillar", a routine
    that reveals they blend imaginative expression with the comfort of familiar, soothing melodies.
  travel: Chandni Patel enjoys short family outings to the nearby city park, visits to the local zoo where they marvel at giraffes, trips to the beach for sandcastle building, and dreams of traveling to
    Disney World in Florida and the ancient ruins of Machu Picchu, illustrating that they balance curiosity with a love for both familiar and exotic experiences.
  culinary: Chandni Patel prefers soft foods such as mashed banana, avocado toast, and mini pancakes topped with fresh blueberries, loves smearing strawberry jam on crackers, and actively participates in
    kitchen play by stirring pretend soups with a plastic spoon, showing they are both discerning and eager to explore new flavors.
  core: Chandni Patel is a curious, sociable toddler who mixes organized block‑building with spontaneous imagination, balances a budding desire to save with occasional snack splurges, and navigates health
    routines with endearing resistance, creating a uniquely balanced early personality.
background:
  cultural: Chandni’s cultural background is rooted in a South‑Asian (Indian‑Gujarati) family that has settled in Naperville, Illinois. At home, she hears both English and Gujarati, picking up common words
    and lullabies in both languages. Family meals often feature traditional dishes such as dhokla, aloo sabzi, and chapati, which she enjoys helping to serve. She participates in cultural celebrations like
    Diwali, where she helps decorate the house with diyas and enjoys sweets, and Holi, where she experiences safe colour play with family and friends. The Patel family maintains strong community ties through
    a local South‑Asian cultural centre that hosts weekend story‑time, music, and dance classes, giving Chandni early exposure to traditional dances and festivals. These cultural experiences blend with
    the Midwestern environment of Naperville, fostering a bicultural identity that values both family cohesion and community involvement.
