  career_goals: Although still in early childhood, Chandni already whispers enthusiastic aspirations that mirror her sociable and caring temperament. She often says she wants to "help doctors" and "give
    hugs to people who are sad," indicating an early interest in health‑care and nurturing roles. She also loves storytime and sometimes imagines herself as a "teacher who shows pictures," reflecting a
    budding desire to share knowledge. Her practical side surfaces when she says she would "make big yummy snacks for the family," echoing an ambition to contribute through cooking. These early goals are
    fluid and tied to her love of people, her curiosity about how things work, and the supportive environment of her South‑Asian family.
