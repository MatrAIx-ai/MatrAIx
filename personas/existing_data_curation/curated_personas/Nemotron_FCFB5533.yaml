  hobbies: '["Reading historical fiction","Leading a local book club","Volunteering as an adult literacy tutor","Singing in a gospel choir","Cooking Southern and Caribbean cuisine","Gardening","Attending
    blues and jazz concerts","Participating in neighborhood block parties","Celebrating Juneteenth and Caribbean festivals"]'
  career_goals: Kandace aims to transition from a teaching assistant to a full‑time lecturer or adjunct professor in humanities, with a focus on African American studies. She plans to pursue a PhD to qualify
    for a tenure‑track position and wants to become a department coordinator to shape curriculum across the college. Additionally, she hopes to publish a textbook on inclusive humanities pedagogy and to
    launch a community outreach program that provides adult literacy and cultural enrichment workshops in Calumet City.
