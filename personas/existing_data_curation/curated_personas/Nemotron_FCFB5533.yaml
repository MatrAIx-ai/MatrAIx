personas:
  professional: Kandace Laguerre, a seasoned humanities educator, excels at designing structured curricula, facilitating inclusive classroom discussions, and leveraging Canvas and Blackboard to deliver
    consistent assessments, while their sociable charisma and practical mindset enable them to mentor students, mediate faculty conflicts, and coordinate research support initiatives.
  sports: Kandace Laguerre, an avid supporter of the Chicago Bears and the Chicago Bulls, participates in the Calumet City Walking Group each Saturday morning and joins a local recreational volleyball league
    during summer, approaching fitness with a structured routine that doubles as a social gathering after games and practices, and they view each activity as a chance to connect with neighbors.
  arts: Kandace Laguerre, a gospel choir vocalist who revels in the soulful sounds of Aretha Franklin, the blues of B.B. King, and the improvisational jazz of John Coltrane, also leads a book club that
    delves into historical fiction and works by Toni Morrison, James Baldwin, and Chinua Achebe, using these artistic experiences to shape both their teaching style and community outreach, and they frequently
    weave musical examples into classroom discussions.
  travel: Kandace Laguerre prefers meticulously planned weekend trips that blend cultural immersion with relaxation, having explored New Orleans for its jazz heritage, Charleston for Southern cuisine, and
    Kingston for Caribbean festivals, while dreaming of a heritage tour of Ghana and a culinary weekend in San Juan, and they ensure each itinerary fits within a modest travel budget that still leaves room
    for family visits.
  culinary: Kandace Laguerre, an accomplished home cook, blends soulful Southern staples such as gumbo, collard greens, and sweet potato pie with Caribbean favorites like jerk chicken, callaloo, and plantain
    roti, favoring ingredients such as Andouille sausage, Scotch bonnet peppers, coconut milk, and a well‑stocked spice rack that includes smoked paprika, allspice, and dried thyme, and they often experiment
    with new spice blends to personalize each dish.
  core: Kandace Laguerre, a 55‑year‑old educator who balances structured curriculum design with lively gospel singing, often found juggling lesson plans while humming hymns, and they occasionally forget
    to water their garden amidst a flurry of community events and book club discussions.
background:
  cultural: Kandace is an African American woman with deep roots in the Midwest. Her family descends from the Great Migration, moving from the South to the Chicago area, and she also carries Haitian ancestry
    through the Laguerre lineage. Growing up in Calumet City, she was immersed in the vibrant Black church community, soul music, and neighborhood solidarity. These cultural influences foster a strong emphasis
    on education, communal harmony, and the celebration of African diaspora traditions, which she continues to honor through her teaching, community service, and participation in local heritage events.
attributes:
  skills: '["Curriculum development","Academic advising","Instructional design","Classroom management","Assessment design and grading","Educational technology (LMS) proficiency","Public speaking and workshop
