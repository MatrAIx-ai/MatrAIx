    coding club'']'
  career_goals: Nathaniel aims to become a senior engineer within the next three years, leveraging his competitive drive to lead high‑impact projects and mentor junior developers. He aspires to transition
    into a tech‑lead role where he can shape architecture decisions while championing inclusive development practices. Long‑term, he dreams of launching a startup that creates affordable coding education
    platforms for under‑served youth in the South, merging his technical expertise with his desire to give back to his community. He also plans to earn a master's degree in Computer Science to deepen his
    knowledge of AI and cloud scalability, and to secure speaking slots at conferences like AfroTech and AWS re:Invent to build his professional reputation.
