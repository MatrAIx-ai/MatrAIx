  career_goals: As she approaches retirement, Brianna aims to transition into a part‑time consulting role where she can mentor emerging IT professionals and help small businesses strengthen their cybersecurity
    posture. She plans to earn a CompTIA Security+ certification to formalize her expertise, develop a workshop series on digital literacy for seniors, and eventually author a practical guide on navigating
    workplace anxiety in tech settings. Additionally, she hopes to take on an advisory position with a local nonprofit that bridges the digital divide in Philadelphia neighborhoods.
