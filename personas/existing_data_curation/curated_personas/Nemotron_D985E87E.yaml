personas:
  professional: Patty Shaw is a budding junior illustrator who channels their curiosity and methodical nature into detailed animal sketches, meticulously organizes their art supplies, and thrives in collaborative
    school art projects.
  sports: Patty Shaw dashes around the playground during recess, participates in the Little Lions Soccer Club’s Saturday drills, cheers for the nearby baseball team, the Riverdale Rangers, and proudly wears
    a jersey of the New York Knicks when playing indoor basketball during winter, showing they love staying active.
  arts: Patty Shaw devotes afternoons to watercolor paintings of forest creatures, eagerly recites folk songs from their music circle, collects picture books by Eric Carle and Beatrix Potter, and sings
    along to Raffi’s 'Bananaphone' while drawing in their sketchbook.
  travel: Patty Shaw loves family nature walks in the nearby Maplewood Forest, dreams of camping at Yellowstone National Park, and squeals with excitement whenever a road trip to a beach like Myrtle Beach
    is plotted on a colorful map they help color.
  culinary: Patty Shaw eagerly assists in the kitchen by mixing cookie dough with butter, flour, and chocolate chips, proudly serves their homemade chocolate chip cookies to friends, enjoys munching on
    mac and cheese with cheddar, and swaps carrots for gummy bears when given a choice.
  core: Patty Shaw is a curious, organized six‑year‑old whose relentless love for drawing animals is matched only by their habit of misplacing crayons and leaving a trail of glitter wherever they go.
background:
  cultural: Patty is a white child growing up in Chelsea, a small town in Shelby County, Alabama. Her family embraces Southern hospitality and community values, attending church services and participating
    in local festivals such as the annual Shelby County Fair. She is exposed to Southern traditions like family barbecues, storytelling, and country music, while her school emphasizes community involvement
    and regional history. The close‑knit environment nurtures her sociable nature and reinforces a sense of belonging and kindness.
