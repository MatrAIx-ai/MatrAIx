  hobbies: '[''drawing'', ''painting'', ''reading picture books'', ''playing on the playground'', ''craft projects'', ''singing'', ''nature walks'', ''baking with family'', ''puzzles'']'
  career_goals: Patty dreams of becoming a teacher because she loves helping friends understand new ideas. She also imagines herself as a veterinarian caring for animals she meets at the local farm, and
    she is fascinated by astronauts and space exploration, hoping to draw pictures of planets. Her ambitions are guided by her curiosity about the world, her desire to help others, and her love for creativity.
