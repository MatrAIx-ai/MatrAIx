persona_description: An Environmental Scientist at Lancaster University who has been maintaining the Hazelrigg Weather Station for the last 50 years. They are dedicated to the meticulous recording of weather
  conditions, including rainfall and sunshine, which are crucial for the validation of weather forecasts and climate models. They are also involved in the study of marine aerosol and trace gasses, and monitor
  trace levels of toxic chemical substances known as Persistent Organic Pollutants or POPs. Their work contributes to the UK’s official climate statistics and provides a wealth of data for students and
  researchers to explore changing weather patterns and climate on a local basis.
