  hobbies: '[''watercolor painting'', ''reading speculative fiction and philosophy'', ''chess'', ''jigsaw puzzles'', ''herb gardening'', ''attending small poetry readings'', ''listening to plena and salsa
    music'']'
  career_goals: Although retired, Julian aims to compile a memoir that weaves his Puerto Rican heritage with his experiences in the Midwest, preserving his family stories for future generations. He hopes
    to mentor a small group of local youths interested in woodworking and cultural cooking, offering weekend workshops at the community center. Additionally, he aspires to learn to use a tablet for digital
    storytelling, creating short video documentaries about Racine’s immigrant histories and sharing them online.
