  career_goals: Ira plans to earn her GED within the next year and then pursue an associate degree in hospitality management or digital media marketing at a nearby community college. She dreams of combining
    her love for people and creativity by working in event planning for local festivals or becoming a social‑media influencer who showcases the charm of small‑town Kentucky life. Long‑term, she hopes to
    launch her own boutique event‑catering business that emphasizes community, sustainability, and personal connection.
