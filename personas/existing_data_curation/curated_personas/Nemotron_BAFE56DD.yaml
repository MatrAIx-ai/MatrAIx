  hobbies: '["Digital drawing and illustration", "Sketchbook journaling", "Piano (intermediate level)", "Indie music listening and playlist curation", "Science‑fiction reading", "Community theatre attendance",
    "Volunteer tutoring at the local library", "Organizing peer study groups", "Exploring local history and county fair events"]'
  career_goals: She aims to earn a scholarship to a specialized art and design high school, then pursue a college degree in graphic design or interactive media. Long‑term, Karen aspires to become a creative
    director at a boutique design studio or launch her own online brand selling custom artwork and merchandise. She is motivated to compete in regional art contests, build a professional portfolio, and
    eventually work in UX/UI design where her analytical mindset can complement her artistic vision.
