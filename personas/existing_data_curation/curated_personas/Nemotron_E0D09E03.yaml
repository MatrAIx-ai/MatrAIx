  career_goals: Tracey aims to advance to an accounting manager or senior auditor role within the next three years, with the long‑term ambition of becoming a Certified Public Accountant (CPA) and eventually
    a chief financial officer for a mid‑size regional firm. She is focused on gaining expertise in the mining and energy sectors prevalent in Arizona, positioning herself as a go‑to specialist for industry‑specific
    audits. Tracey also aspires to lead a small team, fostering a collaborative yet performance‑driven environment, and to implement automation tools that enhance efficiency while preserving the reliable
    routines she values.
