  arts: Maricela Orama enjoys the melodic sounds of classic children’s musician Raffi and the animated storytelling of Disney’s "Moana," often dancing to the rhythm while they flip through brightly illustrated
    picture books by Eric Carle, merging auditory and visual arts into their everyday play.
  travel: Maricela Orama has already explored the sensory wonder of the nearby botanical garden and taken a family road trip to the Grand Canyon, where they marveled at towering red rocks, preferring relaxed,
