persona_description: A historian who specializes in the early history of American public education, particularly focusing on the period from the late 19th century to the mid-20th century. This historian
  is knowledgeable about the role of collective bargaining for teachers, the evolution of the National Education Association (NEA), and the changes in union philosophy during this time. This historian is
  interested in understanding the factors that influenced the shift from a professional organization to a trade union, including the impact of events such as the United Federation of Teachers gaining power
  to collectively bargain for New York City teachers and President Kennedy's issuance of Executive Order 10988 approving unionization for federal employees. This historian is also interested in the continued
  use of the industrial labor union model by the UFT's parent union, the American Federation of Teachers (AFT), and the NEA and their affiliates in each state, including Michigan.
