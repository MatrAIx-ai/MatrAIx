personas:
  professional: Bobby Barbaree is a budding junior artist and self-taught engineer, combining a love for desert-scape painting and rocket sketches with elaborate LEGO builds that reveal an early knack for
    spatial design and creative problem-solving.
  sports: Bobby Barbaree plays forward for the local under-10 soccer club, cheering on the Phoenix Suns and the LA Galaxy, and spends Saturdays sprinting on the school field before joining weekend hikes
    where they collect rocks for science projects.
  arts: Bobby Barbaree attends after-school community art workshops, drawing inspiration from Georgia O'Keeffe's desert palettes and listening to Ariana Grande's upbeat pop as well as Queen's classic rock
    while they paint rockets that soar across imagined horizons.
  travel: Bobby Barbaree loves family road trips to the Grand Canyon and Arches National Park, dreams of visiting the Kennedy Space Center to see real rockets, and prefers travel itineraries that mix short
    hikes with hands-on museum exhibits, even though their allowance limits longer excursions.
  culinary: Bobby Barbaree enjoys building homemade pizza with mozzarella and pepperoni, crafts rock-shaped cookies after a geology hike, and proudly flips sizzling quesadillas for the family, though they
    often leave a trail of flour on the kitchen floor.
  core: Bobby Barbaree is a nine-year-old desert-dreaming LEGO architect whose curiosity fuels daily experiments, occasional overspending on candy, and a relentless energy that sometimes derails bedtime
    routines.
background:
  cultural: Bobby is raised in a white, middle‑class family in Casa Grande, Arizona, where the expansive desert and nearby mountains shape daily life. His family’s roots trace back to Midwestern ancestors
    of German and Irish heritage, yet they embrace the multicultural vibe of the Southwest, often joining community festivals that feature Hispanic music, local crafts, and desert‑flora art. School events,
    the Casa Grande Art & Music Festival, and junior ranger programs expose him to the region’s blend of Native American history and contemporary desert culture. Family traditions include celebrating typical
    American holidays alongside summer gatherings that involve BBQs, pool parties, and trips to the nearby Sonoran Desert for wildlife spotting.
