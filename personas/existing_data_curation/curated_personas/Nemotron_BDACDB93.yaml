  career_goals: Bobby dreams of becoming an astronaut or a creative engineer who designs solar‑powered inventions for the desert. He also imagines himself as an artist who captures the colors of the Arizona
    landscape on canvas. His long‑term ambition is to combine science and art to solve real‑world problems, maybe designing sustainable habitats or interactive museum exhibits that inspire other kids.
