persona_description: A clinical educator who has experience working with preceptors and in clinical settings and is interested in teaching strategies and methods used by physicians, nurses, pharmacists,
  and other health professionals. The individual is knowledgeable about the One Minute Preceptor model and has conducted research on its effectiveness in clinical settings. They are skilled in giving quick
  feedback on tasks and processes requiring critical thinking and are interested in facilitating learning through short blocks of time. They are also interested in teaching and giving feedback in a culture
  that promotes correcting errors as a means of learning, rather than as a synonym for "bad" thinking.
