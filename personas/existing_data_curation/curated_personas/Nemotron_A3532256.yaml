personas:
  professional: Andrew Miller, an organized preschool explorer, loves arranging colorful building blocks into orderly towers while eagerly asking why they fit together, turning playtime into a miniature
    engineering lab that showcases their practical curiosity and cooperative spirit.
  sports: Andrew Miller, a budding fan of the Detroit Tigers and a member of the local Little League t-ball team, spends snow days building indoor forts for agility drills and eagerly watches the Michigan
    State Spartans on weekends, displaying a cooperative team spirit and a love for seasonal outdoor play.
  arts: Andrew Miller, whose afternoons are filled with dancing to Sesame Street tunes, humming the catchy chorus of Let It Go from Frozen, and drawing bright crayon pictures of apple orchards inspired
    by community harvest festivals, finds creative expression through familiar children's performers and local folk celebrations.
  travel: Andrew Miller, who enjoys family road trips to Mackinac Island for a day of bike riding and to the Upper Peninsula’s Pictured Rocks for a short hike, prefers meticulously packed snack boxes, a
    beloved stuffed squirrel for comfort, and an endless curiosity for every new stop, while occasionally whining when the car ride feels too long.
  culinary: Andrew Miller, a budding junior chef, loves helping stir mac and cheese, eagerly adding grated cheddar and a pinch of paprika, delighting in homemade apple pie from the autumn harvest, and insisting
    on a crunchy carrot stick after every backyard barbecue, showcasing a growing palate and a penchant for simple, comforting foods.
  core: Andrew Miller blends a methodical love of tidy block towers with a heart that beats for community apple picking, sticker rewards, and endless curiosity, all while occasionally demanding extra bedtime
    stories to soothe a whiny moment.
background:
  cultural: Andrew was raised in Fowlerville, a small town in Livingston County, Michigan. His family reflects typical Midwestern values such as politeness, community involvement, and an appreciation for
    seasonal activities like apple picking and snow days. He attends a local preschool where diversity includes other white families as well as families of various backgrounds, fostering an early respect
    for different cultures. Family gatherings often feature home‑cooked meals, backyard barbecues in summer, and holiday traditions like decorating a tree together. The community’s emphasis on neighborly
    support aligns with Andrew’s compassionate and cooperative nature.
