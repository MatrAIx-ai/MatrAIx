  hobbies: '[''building wooden block towers'', ''drawing and coloring'', ''collecting leaves and insects'', ''reading picture books'', ''pretend play with animal figures'', ''participating in cooperative
    games'', ''visiting the local park'']'
  career_goals: Andrew often talks about growing up to be someone who helps others. He dreams of becoming a teacher because he enjoys sharing stories and explaining things to his stuffed animals, or a veterinarian
    because he loves caring for the neighborhood dog and cat. He also expresses interest in being a firefighter, admiring the idea of protecting people and keeping the community safe. These aspirations
    reflect his compassionate, cooperative personality and his practical curiosity about how the world works.
