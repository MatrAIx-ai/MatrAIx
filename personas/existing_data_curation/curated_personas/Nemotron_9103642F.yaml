  hobbies: '["Gardening", "Reading (Historical Fiction, Biographies)", "Needlework (Knitting, Crocheting, Quilting)", "Birdwatching", "Book Club Participation", "Crossword Puzzles", "Cooking (Texan Comfort
    Food)", "Gentle Yoga", "Walking in Parks"]'
  career_goals: At 81, Marta aims to continue nurturing family ties and her local community. She plans to complete a memoir that captures her family's stories and preserve cherished family recipes for future
    generations. She wishes to contribute oral histories to the Plano historical society and share her knowledge of local heritage. Maintaining health through daily walks, gentle yoga, and regular medical
    check‑ups is a personal priority. Marta also hopes to mentor her grandchildren in practical life skills such as cooking, budgeting, and basic computer use, while exploring a short online course in digital
    photography to document her garden and daily life.
