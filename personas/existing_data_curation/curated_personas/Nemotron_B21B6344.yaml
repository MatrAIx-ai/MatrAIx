  career_goals: Approaching retirement, Gizella aims to transition smoothly by mentoring a successor and establishing a mentorship program for younger staff. She hopes to introduce sustainable, eco‑friendly
    practices at her store and champion mental‑health awareness initiatives for employees, drawing from her own experiences with anxiety. Long‑term, she envisions volunteering as a consultant for other
    small businesses in Wood County, helping them improve operations while preserving community values, and serving on the board of a local nonprofit focused on senior services.
