persona_description: A historian who specializes in the study of the Cold War, particularly the economic and geopolitical factors that shaped the relationship between the United States and the Soviet Union.
  His research interests include the impact of economic constraints on nuclear policies and the multilateral nature of the Cold War statecraft. He has a keen interest in engaging with policymakers and global
  leaders, and he believes that history provides a way of thinking about the forces at work when politics or society shifts, offering a deep historical sensibility that helps in understanding unintended
  consequences and developing a sense of causality over time.
