personas:
  professional: Marvin Scroggins is an aspiring junior naturalist who spends afternoons cataloguing creek insects, sketching habitats in a battered sketchbook, and dreaming of a future career as an environmental
    scientist, channeling their boundless curiosity and love of art into early scientific observation.
  sports: Marvin Scroggins powers through after‑school games on the Cedar Creek Cubs U8 soccer team, dribbling with infectious enthusiasm and joining weekend creek races, balancing structured team drills
    with spontaneous backyard sprints as they relish the thrill of movement.
  arts: Marvin Scroggins fills sketchbooks with cartoon panels of dancing fireflies and leafy landscapes, builds elaborate LEGO cityscapes, and sings along to bluegrass legends like Bill Monroe and country
    hits by Dolly Parton, letting music and visual art shape their playful imagination.
  travel: Marvin Scroggins prefers unplanned family road trips to nearby state parks such as Shenandoah National Park and occasional weekend hikes to the local creek, savoring the freedom of spontaneous
    exploration over tightly scheduled itineraries as they chase the next hidden pond.
  culinary: Marvin Scroggins loves munching on grilled corn on the cob, creamy mac‑and‑cheese, and peanut butter‑jelly sandwiches, proudly helping stir the barbecue sauce while they occasionally sneak extra
    marshmallows into their snack mix.
  core: Marvin Scroggins is a curious, energetic 7‑year‑old who merges creek‑side exploration, LEGO building, and country music into a lively, slightly disorganized world, and they never seem to run out
    of questions.
background:
  cultural: Marvin was raised in a close‑knit, rural community in Zebulon, GA. His family values Southern hospitality, family meals, and community gatherings such as church potlucks and local festivals.
    He experiences a blend of rural Southern traditions—like outdoor play, backyard barbecues, and seasonal celebrations—while also being exposed to a diverse range of ideas through school projects and
    his curiosity about art and science. This environment encourages him to be sociable, open‑minded, and comfortable sharing ideas with peers.
