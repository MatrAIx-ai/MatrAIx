  career_goals: Marvin imagines a future where he can explore the stars or bring his drawings to life. He often says he wants to be an astronaut who sketches alien worlds, a wildlife artist who sketches
    animals in the Georgia woods, or a teacher who shares his love of storytelling with other kids. He is motivated by the idea of using his creativity to solve problems and inspire others.
