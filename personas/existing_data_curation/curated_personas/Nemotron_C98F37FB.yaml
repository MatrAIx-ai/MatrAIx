personas:
  professional: An aspiring arts administrator, Nevin Raggio leverages strong research, event planning, and graphic‑design skills to manage community outreach at the Purdue Art Museum, where they combine
    a preference for clear structure with a spontaneous knack for creative problem‑solving and a cooperative, calm demeanor under pressure.
  sports: A weekend hiker and casual cyclist, Nevin Raggio joins the West Lafayette Trailblazers club for solitary treks along the Tippecanoe River while they also follow the Purdue Boilermakers basketball
    season and catch occasional Indianapolis Colts games, balancing solitary exercise with light team‑spirit fandom.
  arts: A devoted lover of contemporary literature and indie music, Nevin Raggio publishes thoughtful blog reviews of novels by Sally Rooney and poems by Ocean Vuong, while they perform folk‑infused acoustic
    covers of Bon Iver at campus open‑mic nights and attend Greta Gerwig film screenings, weaving structured analysis with spontaneous artistic expression.
  travel: A budget‑mindful explorer, Nevin Raggio plans spontaneous weekend road trips to Chicago for live music and dreams of a summer backpacking trek through the Scottish Highlands, where they meticulously
    budget each leg but revel in unplanned photo walks along cobblestone streets.
  culinary: A home chef who blends family pasta recipes like carbonara with experimental twists—adding smoked paprika to gnocchi and topping it with caramelized onions—Nevin Raggio delights in sourcing
    fresh basil, sun‑dried tomatoes, and artisanal cheese at the local market, though they habitually leave the sink piled with dishes after cooking.
  core: Nevin Raggio is a structured idealist who meticulously plans community art events yet habitually forgets to charge their phone, leading to missed calls during spontaneous photo shoots.
background:
  cultural: Nevin comes from a white, Italian‑American family that has lived in the Midwest for several generations. Raised in West Lafayette, he grew up in a middle‑class household that valued education,
    community service, and family traditions. Weekly Sunday dinners often feature homemade pasta and stories of his grandparents' immigration, giving him a connection to his Italian roots while also embracing
    the modest, pragmatic sensibilities of the Indiana heartland. The presence of Purdue University in his hometown exposed him early to a diverse academic environment, fostering an appreciation for cultural
    events, public lectures, and the arts. His upbringing blends Midwestern values of reliability and friendliness with an awareness of broader cultural narratives through his heritage and college town
    exposure.
attributes:
  skills: '[''Academic research'', ''Critical writing'', ''Public speaking'', ''Event coordination'', ''Interpersonal communication'', ''Microsoft Office proficiency'', ''Basic graphic design'', ''Social
