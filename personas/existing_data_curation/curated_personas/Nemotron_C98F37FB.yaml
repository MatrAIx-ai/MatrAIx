  hobbies: '[''Reading contemporary fiction'', ''Writing poetry reviews'', ''Playing acoustic guitar'', ''Urban photography'', ''Volunteering at local food bank'', ''Hiking the Tippecanoe River trail'',
    ''Attending open‑mic nights'', ''Watching indie films'', ''Cooking family Italian recipes'', ''Playing board games'']'
  career_goals: Nevin aims to turn his passion for the arts and community engagement into a career in arts administration or nonprofit program management. He envisions starting as a program assistant at
    the Purdue Art Museum or a local cultural nonprofit, where he can apply his research and event‑planning skills while learning institutional operations. Within five years, he hopes to advance to a program
    coordinator role, designing outreach initiatives that bring art and humanities experiences to underserved audiences in Tippecanoe County. He is also interested in pursuing a master's degree in Arts
    Management or Public Policy to deepen his strategic planning abilities and eventually lead a community‑based cultural organization. Throughout, he seeks positions that provide clear responsibilities
    but also allow creative spontaneity and flexible problem‑solving.
