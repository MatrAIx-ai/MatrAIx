  hobbies: '[''Bowling league'', ''Rotary club membership'', ''Lake Michigan fishing'', ''Woodworking'', ''Racine summer festivals'', ''Green Bay Packers fandom'', ''Reading mystery novels'']'
  career_goals: Stephen aims to advance into a regional sales management position, overseeing multiple sites across the Midwest while implementing standardized processes that boost efficiency. He is focused
    on cultivating high‑performing teams through mentorship and clear performance metrics, and he hopes to leave a lasting impact on the company's sales culture before gradually transitioning to a semi‑retired
    consulting role.
