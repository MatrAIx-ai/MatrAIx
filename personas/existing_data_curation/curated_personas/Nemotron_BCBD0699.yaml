  hobbies: '[''Soccer (player and coach)'', ''Cooking traditional Mexican cuisine'', ''DIY woodworking'', ''Fishing'', ''Listening to Latin jazz and classic rock'', ''Reading about measurement technology'',
    ''Spontaneous road trips'', ''Attending cultural festivals'']'
  career_goals: Nelio aims to transition from his current role into a supervisory position within quality assurance, seeking a Certified Quality Auditor (CQA) credential to bolster his expertise. He is
    interested in pursuing a bachelor's degree in industrial engineering to deepen his understanding of lean manufacturing and process optimization. Over the next five years, he envisions leading a team
    that implements data‑driven improvements to reduce waste and enhance product consistency, while also mentoring younger employees and contributing to community outreach programs that promote technical
    education for Latino youth.
