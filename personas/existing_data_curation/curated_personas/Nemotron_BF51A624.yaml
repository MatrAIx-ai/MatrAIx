  career_goals: Zelda aspires to combine her love of art, science, and exploration in her future. She dreams of becoming a wildlife illustrator who brings animal stories to life, or an environmental scientist
    who studies ecosystems and shares findings through vivid drawings. She also imagines being a storyteller—writing and illustrating her own picture books or comics. Her competitive spirit fuels her ambition
    to win a school science fair or an art competition. Fascinated by space, she occasionally envisions herself as an astronaut or a space‑engineer designing habitats for other planets. Whatever path she
    chooses, Zelda hopes to use creativity to make complex ideas accessible and to inspire others.
