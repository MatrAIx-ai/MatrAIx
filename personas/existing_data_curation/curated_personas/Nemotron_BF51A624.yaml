personas:
  professional: Zelda Smith, a budding junior coder and imaginative city‑builder, blends block‑based programming with watercolor sketches of fantasy skyscrapers, turning school projects into tiny, organized
    yet whimsical worlds, and they often share their creations with classmates during show‑and‑tell.
  sports: Zelda Smith enjoys community youth soccer with the Foothill Falcons in the fall, competes fiercely to become the top scorer, cheers on the Sacramento Kings and the San Francisco Giants, and spends
    summer afternoons at the local pool mastering the elementary backstroke, while also participating in a weekend mini‑marathon club that tracks lap counts on a waterproof watch, and they are proud of
    their progress.
  arts: Zelda Smith spends afternoons painting watercolor dragons inspired by Miyazaki’s ‘Spirited Away’ and reading The Chronicles of Narnia, while also attending the library’s story‑hour featuring Dr.
    Seuss and listening to piano pieces by Debussy, shaping a unique blend of visual and auditory imagination, and they often draw inspiration from the stories they hear.
  travel: Zelda Smith loves road trips to Yosemite’s giant sequoias and weekend visits to the Monterey Bay Aquarium, meticulously drawing maps in a travel journal and dreaming of a future family vacation
    to the Grand Canyon, yet prefers traveling with familiar family members rather than solo adventures, and they cherish the feeling of discovering new trails on nature walks.
  culinary: Zelda Smith eagerly helps bake chocolate‑chip cookies, precisely measuring flour and brown sugar, enjoys a slice of pepperoni pizza with extra mozzarella, and delights in a fresh strawberry‑banana
    fruit salad topped with a drizzle of honey, often insisting on adding a pinch of cinnamon for extra flavor, and they love to sprinkle a dash of nutmeg on the cookies for an aromatic twist.
  core: Zelda Smith, a curious 7‑year‑old who balances quiet watercolor reveries with fierce LEGO competitions, carefully saves allowance for future builds while navigating seasonal allergies and high‑energy
    soccer games, and they often reflect on their adventures.
background:
  cultural: Zelda comes from a white, middle‑class family living in Rancho Cordova, a suburban community in Sacramento County, California. Her upbringing reflects typical American values of education, independence,
    and community involvement. She celebrates national holidays such as Thanksgiving and the Fourth of July, and often attends local community events, library story hours, and museum visits that expose
    her to California’s diverse cultural landscape. While English is the primary language at home, she has been introduced to basic Spanish words in school, reflecting the region’s linguistic diversity.
    The family’s lifestyle encourages outdoor activities, environmental awareness, and participation in arts programs, shaping Zelda’s appreciation for nature, creativity, and civic engagement.
