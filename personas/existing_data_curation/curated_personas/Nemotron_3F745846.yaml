  career_goals: Although retired, Rose aims to deepen her involvement in the community by taking on a mentorship role for younger volunteers at the senior center, helping to design and lead workshops on
    budgeting, cooking, and crafts. She hopes to document local histories by conducting oral interviews with longtime residents and compiling them into a community archive. Rose also dreams of expanding
    the neighborhood garden project she co‑founded, making it a hub for intergenerational learning. Maintaining her health and independence, she aspires to stay active, travel to visit family members in
    neighboring states, and perhaps win a regional senior gardening competition.
