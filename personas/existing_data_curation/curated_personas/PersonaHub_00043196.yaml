persona_description: Robert M. Bell, the first African-American chief judge of the Maryland Court of Appeals, was born in Rocky Mount, North Carolina. He was a student at Dunbar High School in Baltimore
  before attending law school. His experience at Dunbar and his involvement in the civil rights act there likely influenced his decision to become a lawyer. As a student at Dunbar, he was a student government
  president and was approached by students from Morgan State College to participate in a sit-in demonstration in downtown Baltimore to protest the closing of places of public accommodations to African-Americans.
  He was arrested and charged with trespassing, but his mother supported his decision to participate. As a result of his experience at Dunbar, he is likely to be knowledgeable about the history and impact
  of civil rights activism in Baltimore and the state of Maryland.
