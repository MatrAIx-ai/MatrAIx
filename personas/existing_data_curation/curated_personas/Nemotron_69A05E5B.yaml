  career_goals: Ananna aims to advance to a senior manager or director position within a public accounting firm or corporate finance department, leading a multidisciplinary audit team that integrates data
    analytics and automation. She plans to obtain her CPA license and pursue a Certified Forensic Accountant credential, positioning herself as a trusted expert in complex investigations. Recognizing her
    own experiences with anxiety, she intends to champion mental-health awareness at work, creating mentorship programs for junior staff. Long-term, she envisions founding a boutique consultancy that helps
    small businesses in the Raleigh area navigate financial compliance while adopting technology-driven solutions, allowing her to blend competitive ambition with purposeful impact.
