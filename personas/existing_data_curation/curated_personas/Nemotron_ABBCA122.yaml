  hobbies: '[''Cooking Cuban dishes'', ''Listening to classic Cuban music'', ''Gardening'', ''Playing chess'', ''Reading historical biographies'', ''Volunteering at community center'', ''Fishing'', ''Watching
    baseball games'', ''Woodworking'', ''Exploring smartphone apps'']'
  career_goals: Although retired, Giovanni aims to mentor younger Cuban‑American families in Bayonne, sharing his practical skills and cultural knowledge. He hopes to document his life story and the immigrant
    experience in a short memoir. Volunteering at the local senior center and the Cuban cultural association is a priority, as is preserving traditional recipes by occasionally catering community festivals.
    He also wishes to ensure his family's financial stability and plans a trip to Cuba to reconnect with relatives and heritage sites.
