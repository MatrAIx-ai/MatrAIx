  career_goals: While formal career aspirations are still far in the future, Crystal shows early signs of ambition through her play. She likes to pretend to fix toys and feed her stuffed animals, indicating
    an interest in hands‑on, caregiving tasks. Her fascination with animal sounds and mimicking pets suggests a budding desire to work with animals, such as becoming a veterinarian or animal caretaker.
    Additionally, her enjoyment of building block towers hints at a future enthusiasm for construction or engineering. In the present, she aims to become a 'big kid' who can help her parents with simple
    chores and learn new things each day.
