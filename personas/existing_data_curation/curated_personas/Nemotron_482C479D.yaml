personas:
  professional: Steven Knight, an experienced commercial driver and sales professional with three decades of logistics expertise, leverages meticulous route planning, hands‑on mechanical repairs, and a
    compassionate customer‑service approach to guarantee on‑time deliveries while mentoring new drivers, and is actively pursuing a commercial driver safety trainer certification to eventually launch a
    senior‑focused community transport service.
  sports: Steven Knight, an avid outdoorsman, spends weekends fishing Lake Thurmond for bass, hunting white‑tailed deer in the Piedmont, cheers for the Carolina Panthers and follows the Greenville Drive
    minor‑league baseball team, and belongs to the local 4‑H shooting club where he practices clay‑target shooting each spring.
  arts: Steven Knight, a lifelong fan of classic rock and country, routinely listens to Lynyrd Skynyrd, Johnny Cash, and local gospel choir recordings while working in the garage, devours Civil War biographies
    by Shelby Foote and James McPherson, and attends quarterly performances at the York County Playhouse, often quoting lines from classic Southern films.
  travel: Steven Knight, a methodical vacation planner, enjoys weekend road trips to historic Charleston, the Blue Ridge Parkway near Asheville, and the music scene in Nashville, prefers staying in family‑run
    B&Bs that emphasize Southern hospitality, and schedules travel around his volunteer driving shifts for Meals on Wheels, keeping mileage within a reasonable budget.
  culinary: Steven Knight, a barbecue enthusiast, perfects a vinegar‑based pork shoulder rub, experiments with pineapple‑infused hickory smoke on ribs, adds fresh garden basil and thyme to his slow‑cooked
    collard greens, serves his creations on hand‑crafted wooden boards, and finishes meals with sweet tea brewed from locally sourced sugar cane.
  core: Steven Knight blends Southern pragmatism, compassionate service, and a steady hand on the wheel and in the workshop, all while juggling a love for barbecue, classic rock, and late‑night motorcycle
    rides.
background:
  cultural: Steven grew up in York, South Carolina, a rural community with deep Southern roots and a strong emphasis on hospitality, church life, and neighborly assistance. Raised in a middle‑class white
    family that valued hard work, self‑reliance, and community service, he was taught the importance of punctuality, respect for elders, and helping those in need. The local culture—characterized by Southern
    cuisine, country and gospel music, and a reverence for the region’s Civil War heritage—shaped his worldview. Regular participation in Methodist worship and local volunteer initiatives reinforced his
    compassionate, cooperative nature. His education at a nearby community college provided a practical, business‑oriented perspective, while lifelong residence in the Upstate reinforced a modest, resilient
    identity anchored in Southern tradition.
attributes:
  skills: '["Commercial driving (CDL)", "Route planning & logistics", "Vehicle maintenance & basic repairs", "Safety compliance & regulatory knowledge", "Customer service & sales", "Negotiation & relationship
    building", "Conflict resolution & mediation", "Time management & organizational skills", "Use of GPS and fleet management software", "First aid & emergency response", "Compassionate assistance to clients",
    "Mentoring junior drivers"]'
  hobbies: '["Fishing", "Hunting", "Woodworking", "Classic car restoration", "Cooking Southern barbecue", "Volunteer driver for Meals on Wheels", "Church community involvement", "Reading Civil War history",
    "Gardening", "Motorcycle riding for relaxation", "Listening to classic rock and country music"]'
  career_goals: Steven aims to transition from hands‑on driving to a supervisory and instructional role within the transportation sector. He plans to earn a commercial driver safety trainer certification
    so he can teach new drivers, emphasizing reliability, safety, and compassionate customer care. In the longer term, he envisions launching a small, community‑focused transport service that offers scheduled
    rides for seniors, veterans, and residents without reliable mobility in York County, blending his logistical expertise with his desire to help others. Ultimately, he hopes to establish a reputable local
    delivery and transportation business rooted in Southern hospitality and operational excellence.
