personas:
  professional: Dawnice Matthews is a senior HR specialist who fuses data‑driven workforce analytics with art‑inspired employee engagement, leveraging Python scripts and Workday to build predictive hiring
    models while critically questioning every new initiative and fiercely competing for measurable diversity results.
  sports: Dawnice Matthews follows the New York Knicks and the New York City FC, joins a local yoga studio for weekly classes, and occasionally jogs along the Bronx River while refusing rigid training schedules,
    preferring spontaneous street‑basketball pick‑up games that satisfy their competitive streak.
  arts: Dawnice Matthews immerses herself in the Bronx’s vibrant art scene, drawing inspiration from muralist Shepard Fairey, listening to Miles Davis and Kendrick Lamar at live shows, and performing spoken‑word
    pieces alongside poet Sarah Kay, using these experiences to fuel both personal creativity and workplace training modules.
  travel: Dawnice Matthews plans trips on a whim, favoring weekend getaways to the Hudson Valley’s art museums, spontaneous jazz festivals in New Orleans, and occasional international flights to Berlin’s
    street‑art districts, balancing a tight budget with a love for cultural immersion.
  culinary: Dawnice Matthews experiments in the kitchen, turning classic soul‑food like collard greens and fried chicken into dishes with miso glaze, kimchi‑slaw, and quinoa‑infused jambalaya, while also
    mastering the art of sous‑vide sweet‑potato gnocchi and pairing meals with craft beers from local Brooklyn breweries.
  core: Dawnice Matthews is a data‑savvy HR professional who channels a competitive, art‑driven curiosity into innovative workplace solutions, while juggling stress‑induced health worries, spontaneous creativity,
    and a love for flexible, flavorful living.
background:
  cultural: Dawnice is a Black American who has spent her adult life in the Bronx, a melting pot of African‑American, Afro‑Caribbean, and Latino cultures. Her upbringing in this vibrant borough exposed
    her to hip‑hop, graffiti art, and community activism, shaping a strong sense of resilience and cultural pride. She celebrates African heritage through food, music, and participation in local cultural
    festivals, while also navigating the challenges of systemic inequities in the workplace. Her cultural lens informs her commitment to diversity, equity, and inclusion initiatives and fuels her appreciation
    for artistic expression as a vehicle for community empowerment.
attributes:
  skills: '[''Employee Relations'', ''Talent Acquisition'', ''HR Analytics (Excel, SQL, Python)'', ''HRIS Management (Workday, ADP)'', ''Labor Law Compliance (Federal and NY)'', ''Conflict Mediation'',
