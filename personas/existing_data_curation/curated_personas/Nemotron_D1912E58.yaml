  hobbies: '[''Visiting art galleries and museums'', ''Listening to jazz and hip‑hop concerts'', ''Photography of urban street art'', ''Cooking soul food with experimental twists'', ''Mentoring youth in
    community programs'', ''Reading contemporary fiction and psychology'', ''Yoga and mindfulness practice'', ''Exploring new neighborhoods on foot'', ''Attending spoken‑word poetry and theater events'']'
  career_goals: Dawnice aims to advance from senior HR specialist to HR Director within the next five years, focusing on integrating technology and creative employee‑experience programs. She plans to earn
    the SHRM‑SCP certification and spearhead a company‑wide diversity and inclusion framework that leverages data analytics to track progress. Long‑term, she envisions launching a boutique consultancy that
    helps midsize firms in the Bronx and greater NYC adopt innovative, art‑infused talent strategies while maintaining flexibility and work‑life balance for herself and her clients.
