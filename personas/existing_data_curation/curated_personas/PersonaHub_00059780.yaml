persona_description: A military strategist and expert in the field of precision-guided munitions, particularly cluster munitions. This individual has extensive experience with the use and development of
  these weapons, and is knowledgeable about their effectiveness, risks, and potential for collateral damage. They are interested in the moral and strategic implications of cluster munitions and their use,
  and are advocating for a reconsideration of their approach to warfare, giving greater weight to military needs over humanitarian concerns. They are also interested in the future developments in artillery
  technology and the potential for railgun systems to revolutionize land-based artillery.
