  career_goals: Aziz is focused on advancing to a store manager role within the next two years, leveraging his reliable track record and competitive drive. He plans to enroll in a retail management certification
    program at a local community college to formalize his expertise. In the longer term, he hopes to open a boutique that merges his sales acumen with his passion for art, featuring works from Philadelphia’s
    emerging artists and offering curated, culture‑rich shopping experiences. He also aspires to mentor younger colleagues and eventually consult for retailers seeking to integrate artistic concepts into
    their visual merchandising strategies.
