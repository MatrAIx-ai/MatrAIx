personas:
  professional: Keri Hill is an emerging little leader in preschool, excelling at coordinating playtime and drawing up step‑by‑step activity plans, using their strong preference for routine and practical
    thinking to keep games organized, while their relaxed view of obligations can lead to occasional missed clean‑up tasks and their heightened sensitivity to stress makes them seek comfort from their stuffed
    rabbit when plans shift.
  sports: Keri Hill is a member of the Mini Tigers youth soccer club, where they thrive on structured drills and love leading tag games during recess, regularly cheer for the local junior baseball team
    the City Cubs, and enjoy seasonal outdoor activities like sledding down the neighborhood hill, all while their sociable energy fuels team camaraderie and their worry about missing practice sometimes
    makes them arrive early to double‑check the equipment.
  arts: Keri Hill delights in drawing family portraits with crayons, assembling LEGO sets from step‑by‑step instructions, making friendship bracelets, and spinning in library dance circles to Disney songs
    like Let It Go and The Wiggles' Fruit Salad, all while looking up to illustrators such as Dr. Seuss and Mo Willems and mimicking favorite characters from the animated series PJ Masks.
  travel: Keri Hill loves family trips that follow a clear itinerary, such as weekend visits to the nearby beach at Myrtle Shores, a day at the theme park Six Flags Great Adventure, and a winter sledding
    excursion in the mountains, and they dream of exploring Disneyland, all while their parents’ careful budgeting and their own preference for familiar routines make them feel most comfortable when each
    day’s activities are listed on a colorful schedule board.
  culinary: Keri Hill favors simple, comforting foods like chicken nuggets, mac and cheese, and strawberry shortcake, enjoys assembling peanut butter‑banana sandwiches and sprinkling sliced strawberries
    on yogurt, eagerly helps whisk chocolate chips into cookie dough under mom’s supervision, yet they often forget to wash their hands before meals, a quirk that their parents gently remind them about
    as part of their daily routine.
  core: Keri Hill is an energetic, routine‑loving six‑year‑old whose love for group games and practical creativity is balanced by occasional anxiety and a habit of clutching their stuffed rabbit when the
    familiar world shifts.
background:
  cultural: 'Keri comes from a white, middle‑class family living in Concord, New Hampshire. Her upbringing reflects typical New England values: emphasis on community, respect for tradition, and participation
    in seasonal holidays such as Thanksgiving, July Fourth fireworks, and autumn leaf‑peeping trips. Her family attends a local Methodist church, and she regularly visits the town’s public library for story
    hours. The cultural environment blends a modest, practical mindset with an appreciation for outdoor activities across the four‑season climate.'
