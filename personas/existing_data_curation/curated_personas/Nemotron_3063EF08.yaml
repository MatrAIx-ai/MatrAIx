  hobbies: '[''playing tag'', ''preschool soccer drills'', ''group dancing'', ''drawing'', ''LEGO building'', ''crafting friendship bracelets'', ''story time at the library'', ''seasonal outdoor play (sledding,
    leaf collecting)'', ''snuggling with stuffed rabbit'']'
  career_goals: Keri often talks about growing up to be a teacher who can create a warm, predictable classroom where every child feels safe and can learn together. She also imagines working with animals
    as a veterinarian because she loves caring for her family's pet rabbit. Her current ambition is to lead her preschool's play‑group activities, showing an early interest in guiding peers and establishing
    friendly routines.
