personas:
  professional: Hoa Nguyen is a meticulous teaching assistant in art education, leveraging bilingual expertise and strong project management to design inclusive curricula and coordinate community festivals
    that blend island and ancestral traditions.
  sports: Hoa Nguyen regularly hikes the Koʻolau trail with the Hawaii Volcanoes Trail Club, plays recreational volleyball for the Honolulu Waves, and cheers on the University of Hawaii Rainbow Warriors
    basketball team.
  arts: Hoa Nguyen immerses themselves in watercolor painting of volcanic landscapes, studies the works of contemporary artists like David Hockney and local muralist Kele Luu, and curates monthly gallery
    openings that showcase Pacific‑Island and diaspora creators.
  travel: Hoa Nguyen prefers thoughtfully planned trips that combine cultural immersion and adventure, having explored the lantern festivals of Luang Prabang, the rice terraces of Bali, and the coral reefs
    of Fiji, while they dream of a future artistic residency in Tahiti.
  culinary: Hoa Nguyen enjoys cooking family recipes such as fragrant lemongrass‑infused noodle soup, caramelized pork belly with star‑anise, and fresh rice paper rolls, and they often host potluck gatherings
    where they pair dishes with locally sourced taro and pineapple.
  core: Hoa Nguyen blends disciplined organization with a vibrant curiosity, turning every hike, brushstroke, and community event into a chance to bridge island life and inherited traditions.
background:
  cultural: Hoa Bich is a first‑generation Vietnamese American whose parents immigrated to Hawaii in the early 1980s. Growing up in Pearl City, she was immersed in a multicultural environment where Vietnamese
    traditions—such as celebrating Tet, practicing ancestral worship, and cooking family recipes—coexisted with Hawaiian customs like hula, aloha spirit, and island festivals. Bilingual in Vietnamese and
    English, she maintains close ties to the local Vietnamese community while actively participating in broader Hawaiian cultural life. This dual heritage informs her worldview, fostering a deep appreciation
    for the convergence of Southeast Asian and Pacific Island artistic expressions and driving her commitment to bridge these cultures through education and community outreach.
attributes:
  skills: '[''Curriculum development'', ''Instructional design'', ''Bilingual communication (Vietnamese-English)'', ''Classroom technology integration'', ''Research methodology'', ''Scholarly writing'',
    ''Art history expertise (Southeast Asian and contemporary art)'', ''Event planning and coordination'', ''Community outreach'', ''Project management'', ''Public speaking'', ''Workshop facilitation'',
    ''Cross‑cultural mediation'', ''Digital media creation'', ''Data analysis for student performance'']'
  hobbies: '[''Watercolor painting'', ''Landscape photography'', ''Hiking in volcanic trails'', ''Cooking Vietnamese cuisine'', ''Attending gallery openings'', ''Volunteering at community festivals'', ''Traditional
    Vietnamese music (đàn tranh)'', ''Hula dancing'', ''Yoga'', ''Reading contemporary literature'', ''Exploring new media art'', ''Traveling'']'
  career_goals: Hoa Bich aims to transition from a teaching assistant to a tenure‑track faculty position in Art Education or Cultural Studies, ultimately achieving a PhD in Art Education. She envisions
    designing interdisciplinary programs that blend visual arts, digital media, and Southeast Asian cultural perspectives, fostering a more inclusive curriculum at her university. She aspires to lead a
    community arts center in Honolulu that connects local Hawaiian artists with the Vietnamese diaspora, curating exhibitions and educational workshops that celebrate hybrid identities. Publishing research
    on the impact of multicultural art education on student engagement and advocating for increased representation of underrepresented artists in museum collections are also central to her long‑term ambitions.
