persona_description: A scientist who specializes in the study of hydrocarbon weathering and oil spill impacts. They are knowledgeable about the various fate processes that affect petroleum hydrocarbons
  from different input categories, and have developed a table to rank these processes based on their relative importance. They are interested in comparing their model results with observed data, and have
  experience with the use of composite models for hydrocarbon weathering and oil spill impacts. They are also familiar with the limitations of these models and the importance of accounting for the relative
  importance of different fate processes in developing a comprehensive understanding of hydrocarbon weathering and oil spill impacts.
