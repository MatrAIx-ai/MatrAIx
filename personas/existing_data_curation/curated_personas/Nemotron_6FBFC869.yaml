personas:
  professional: An aspiring young robotics innovator, Tan Choi leverages their curiosity and methodical planning to design intricate LEGO robotics creations, entering school science fairs where their competitive
    drive pushes them to out‑perform peers while staying grounded in practical problem‑solving.
  sports: A dedicated swimmer and budding archer, Tan Choi trains at the Layton YMCA pool and the community archery club, cheering for the Utah Jazz and following the Los Angeles Lakers, channeling their
    competitive nature into personal bests rather than team play.
  arts: A passionate manga sketcher and piano aficionado, Tan Choi immerses themselves in the works of Hayao Miyazaki and John Williams, practicing pieces by Yiruma and Ryuichi Sakamoto to fuel their artistic
    imagination, and they often lose track of time while creating.
  travel: A meticulous planner with a love for quiet exploration, Tan Choi has visited the Grand Canyon and the Guangzhou Canton Tower, and dreams of touring the Kennedy Space Center, balancing school commitments
    and a modest allowance while favoring off‑peak travel for affordability, and they plan each trip using detailed spreadsheets.
  culinary: An enthusiastic junior chef, Tan Choi enjoys crafting homemade jiaozi with pork and cabbage, perfecting stir‑fried noodles with shiitake mushrooms, and sipping bubble tea, showing growing confidence
    in the kitchen despite occasional over‑salting, and they often experiment with new sauces.
  core: An introspective puzzle‑loving competitor, Tan Choi is an 11‑year‑old who blends relentless curiosity for science with a competitive streak, thriving in solitary challenges while constantly worrying
    about perfection and budgeting allowance for the next LEGO set, and they often stay up late refining strategies.
background:
  cultural: Tan Choi is the daughter of Chinese immigrants who settled in Layton, Utah. At home, Mandarin is spoken alongside English, and the family celebrates Lunar New Year with traditional meals, red
    envelopes, and cultural performances. The emphasis on education and perseverance from her heritage fuels her academic drive. While she attends a public middle school and participates in local community
    activities, she also maintains ties to her East Asian roots through language lessons, occasional visits to a nearby cultural center, and exposure to Chinese art and music. This bicultural experience
    shapes her identity, blending American school life with deep respect for her family’s cultural traditions.
