  career_goals: Tan Choi dreams of becoming a biomedical engineer, motivated by a fascination with technology that can improve human health. In the near term, she aims to win regional science fairs, earn
    a spot in an advanced robotics program, and secure scholarships for higher education. Long‑term, she envisions studying computer science and engineering at a top university, then working in a research
    lab where she can design innovative medical devices or contribute to cutting‑edge scientific projects while maintaining an independent, analytical work style.
