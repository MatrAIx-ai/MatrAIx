  career_goals: Carlos aspires to turn his passion for visual storytelling into a career. He hopes to attend a specialized arts high school, build a portfolio of digital and mural artwork, and eventually
    study graphic design or animation at a university. He envisions working as a multimedia artist or game designer where he can blend Mexican cultural motifs with modern media, and eventually freelance
    on projects that allow creative freedom and flexibility.
