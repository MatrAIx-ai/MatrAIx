personas:
  professional: A teenage caricature artist, Carlos Palacio blends a love for street murals and rapid sketching into TikTok tutorials, using their curiosity and competitive drive to constantly push artistic
    boundaries while often skipping structured practice in favor of spontaneous drawing sessions.
  sports: Carlos Palacio lives for after‑school soccer matches on local fields, cheering for the San Diego Loyal while also admiring FC Barcelona’s playbook, and they keep fit through informal drills rather
    than formal training, embracing a competitive edge that fuels their drive to win every scrimmage.
  arts: Carlos Palacio’s artistic world is a vibrant mash‑up of watching anime series like Attack on Titan, devouring graphic novels from Image Comics, drawing inspiration from street artist Banksy and
    indie musician Vetusta Morla, and they channel that energy into crisp caricatures that capture friends’ personalities in seconds.
  travel: Weekend getaways to the Mexican border town of Tijuana for street food and a day trip to the coastal cliffs of La Jolla shape Carlos Palacio’s wanderlust, and they dream of a future backpacking
    adventure through Tokyo’s Akihabara district to chase anime culture firsthand.
  culinary: Carlos Palacio experiments in the kitchen with intermediate skill, whipping up smoky chicken tacos al pastor using pineapple, achiote, and fresh cilantro, perfecting salsa verde with tomatillos
    and jalapeños, and they occasionally pair meals with a side of mango‑lime agua fresca for that bright, tangy finish.
  core: Carlos Palacio is an inquisitive, competition‑driven teen who fuses caricature art, soccer, and bold flavors into a spontaneous, slightly disorganized lifestyle, and they are always ready to turn
    a casual moment into a TikTok sketch.
background:
  cultural: Carlos grew up in a Mexican‑American household in El Cajon, where Spanish is spoken at home and Mexican traditions are celebrated. He participates in community events such as Día de los Muertos
    and Cinco de Mayo, enjoys family gatherings centered around tacos, tamales, and mole, and draws inspiration from Mexican folk art, muralism, and the vibrant multicultural vibe of San Diego County. His
    bicultural upbringing gives him a strong sense of identity that he weaves into his creative work.
