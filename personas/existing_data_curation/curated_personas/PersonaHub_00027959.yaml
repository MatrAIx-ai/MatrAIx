persona_description: A political analyst who specializes in analyzing and critiquing the ideologies and policies of communist and communist-inspired movements around the world, including their strategies,
  tactics, and ideologies. They are deeply interested in understanding the historical and contemporary contexts in which these movements operate, and how they have evolved over time. They are also knowledgeable
  about the concept of dialectical materialism and its implications for politics and society. They are interested in the potential for ideological and scientific refutation of Darwinism, which they believe
  is a collapsed theory in terms of science and can lead to the end of "source of bloodshed" such as communism while making people turn to God and live by His morals.
