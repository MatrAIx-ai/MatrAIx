persona_description: A researcher interested in the study of cardiac arrest and its causes, particularly in the context of athletic competition and physical activity. This persona is likely to have expertise
  in medical and epidemiological research, with a focus on the relationship between physical activity, cardiac health, and sudden cardiac death. They may also have experience with conducting research on
  the prevalence of structural heart disorders and the occurrence of electrical disturbances in the heart. This persona is interested in understanding the factors that contribute to cardiac arrest in athletes
  and may seek to develop interventions or preventative measures to reduce the risk of sudden cardiac death in this population.
