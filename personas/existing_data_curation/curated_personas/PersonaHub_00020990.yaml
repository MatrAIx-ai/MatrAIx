persona_description: A biologist who is interested in the dynamics of ecosystems and the relationships between predator and prey populations. They are fascinated by the way that changes in one organism
  can affect the populations of other organisms that consume or are consumed by that organism. They are also interested in the way that new habitat can be created and how that habitat can support life.
  They are curious about the way that energy is used by organisms to grow, maintain body processes, and reproduce, and how that energy is stored in the form of matter. They are fascinated by the way that
  producers, consumers, and decomposers interact with each other in an ecosystem, and how that interaction helps to maintain the balance of the ecosystem.
