persona_description: A Hebrew language expert who specializes in the study of verb conjugation and the concept of verbal meaning. This individual is knowledgeable in the Hebrew language's seven major verbal
  patterns and twelve minor patterns, and can explain the different ways in which roots can be cast into different binyanim to form different verbs. They also have a deep understanding of the concept of
  verbal meaning, which is defined by the triliteral root and the identity of the binyan. This person is likely to have a strong interest in linguistics and has a vast knowledge of Hebrew grammar and syntax.
