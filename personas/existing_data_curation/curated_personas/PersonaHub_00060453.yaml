persona_description: A researcher or historian who is interested in the civil rights movement in Milwaukee during the 1960s and the struggles faced by African Americans in the city. The person is likely
  to be knowledgeable about the history of the civil rights movement in the United States and has a particular interest in the experiences of African Americans in Milwaukee. They are likely to be interested
  in the actions of the NAACP's Youth Council, school boycotts, alternative freedom schools, and the activities of the Wisconsin Education Association Council during the school desegregation lawsuit. The
  person is also likely to be interested in the civil disturbances in Milwaukee's central city during the summer of 1967.
