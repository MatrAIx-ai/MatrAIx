  career_goals: Rodney dreams of turning his love of building things and solving practical problems into a career as a civil or mechanical engineer, focusing on projects that improve his hometown's infrastructure.
    He also envisions using his sociable personality to lead community initiatives, perhaps as a future town council member or youth program coordinator. While his ambitious plans sometimes cause him anxiety
    about meeting expectations, he remains motivated to earn scholarships and gain real-world experience through internships or the high school robotics team.
