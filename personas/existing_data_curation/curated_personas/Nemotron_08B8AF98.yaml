personas:
  professional: Rodney Eberly, a budding teen technologist, merges a curiosity for Minecraft modding with the practicality of LEGO engineering, making them a standout problem‑solver in their school’s robotics
    and coding clubs, where their talkative, team‑oriented nature fuels collaborative projects.
  sports: Rodney Eberly dominates the Cedar County Youth Basketball League as a point guard, idolizing the Los Angeles Lakers and Golden State Warriors while balancing competitive drive with team‑first
    tactics, and they unwind on weekends fishing at Lake El Dorado, hoping to someday compete in a junior angling tournament.
  arts: Rodney Eberly shines in the school drama club as a natural lead, channeling the energy of Lin‑Manuel Miranda’s Broadway flair and the storytelling of Neil Gaiman’s sci‑fi novels into improv performances,
    while they also jam to Taylor Swift and practice guitar riffs on weekends.
  travel: Rodney Eberly plans trips with a blend of spreadsheet checklists and last‑minute snack stops, eagerly revisiting the Cedar County Fair each summer and dreaming of a road trip to Yellowstone National
    Park’s geysers, while also saving up for a future family vacation to Tokyo’s Akihabara district to explore video‑game culture.
  culinary: Rodney Eberly loves crafting pepperoni pizza and cheesy mac and cheese from scratch, often sprinkling fresh tomatoes from the family garden and basil harvested in summer, yet their cooking is
    still at a beginner level, relying on YouTube tutorials while they brag about making the perfect s’mores over a backyard fire pit.
  core: Rodney Eberly is a talkative, basketball‑obsessed 13‑year‑old who channels relentless curiosity into Minecraft mods and LEGO builds, yet battles frequent worry and a habit of staying up late perfecting
    video‑game strategies.
background:
  cultural: Rodney comes from a white, Midwestern family rooted in El Dorado Springs, Missouri. The town's close-knit community, agricultural heritage, and strong emphasis on school sports and church activities
    shape his daily life. Family gatherings often feature barbeques, country music, and stories of his grandparents' German-American farming background. Local traditions such as the Cedar County Fair, 4-H
    club meetings, and youth group events reinforce values of hard work, modesty, and community service, while also providing Rodney with opportunities to showcase his sociable and leadership qualities.
