  hobbies: '["Cooking traditional Mexican dishes", "Gardening herbs and vegetables", "Crocheting and knitting", "Listening to ranchera and mariachi music", "Participating in church Bible study", "Reading
    Spanish-language novels", "Walking in local park and bird-watching", "Volunteering at senior center"]'
  career_goals: Although retired from formal employment, Daisy's ambitions focus on remaining a vital pillar in her family and neighborhood. She aims to stay physically healthy through gardening and regular
    walks, and to continue volunteering at the local senior center and her church’s outreach programs. Daisy hopes to pass her culinary knowledge to her grandchildren, preserving family recipes and cultural
    traditions. She also wishes to mentor younger women in her community on practical life skills, such as budgeting, meal planning, and coping with stress, and to maintain her independence and peace of
    mind.
