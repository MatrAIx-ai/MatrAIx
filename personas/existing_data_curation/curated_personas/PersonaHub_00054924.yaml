persona_description: A dedicated advocate for open government and transparency, who is actively engaged in fighting for more openness in New Mexico. This individual is knowledgeable about the Inspection
  of Public Records Act and the Open Meetings Act, and is actively involved in fighting against attempts to scale back these laws. They are also familiar with the judiciary's efforts to provide online access
  to court records, and are supportive of the Supreme Court's decision to make this possible. This person is passionate about ensuring that citizens have access to information about their government and
  the actions of public officials, and is committed to promoting transparency and accountability in the state's government.
