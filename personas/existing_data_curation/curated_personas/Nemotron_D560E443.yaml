  hobbies: '[''Watercolor Painting'', ''Abstract Sketching'', ''Reading Science Fiction and Philosophy'', ''Stargazing'', ''Coastal Photography'', ''Ukulele Playing'', ''Gardening'', ''Beach Cleanup Volunteering'',
    ''DIY Home Projects'', ''Meditation'']'
  career_goals: Dawn aspires to become a certified lead insulation installer and, within the next few years, launch a small eco‑focused insulation business that offers energy‑saving retrofits for Hawaiian
    homes. She plans to complete her associate degree in environmental studies, earn a Green Building Certification, and mentor younger workers, especially women entering the trades. Her long‑term ambition
    is to integrate her artistic inclination with sustainable building practices, perhaps developing a line of aesthetically pleasing insulation panels and conducting community workshops on home energy
    conservation.
