personas:
  professional: Cecil Corbin is a 17‑year‑old aspiring content creator and brand strategist who leverages charismatic communication, quick‑witted improv experience, and a keen eye for visual composition
    to produce engaging short‑form TikTok and YouTube videos while planning community events and scouting internship opportunities at local entertainment venues.
  sports: Cecil Corbin enjoys weekend pick‑up basketball games at the community park, cheering for the Orlando Magic while also following the NBA and local high‑school leagues, and occasionally joins a
    recreational ultimate frisbee club to stay active, but their competitive nature sometimes turns friendly matches into intense showdowns.
  arts: Cecil Corbin immerses themselves in Orlando’s vibrant art scene, frequently sketching the CityArts Factory’s installations, citing inspiration from street artist Banksy, digital creator Beeple,
    and indie musician Tame Impala, and incorporates these influences into their improv comedy bits and TikTok edits.
  travel: Cecil Corbin prefers short, budget‑friendly road trips to nearby beach towns like Clearwater and spontaneous day‑camps at Disney’s Theme Park to capture behind‑the‑scenes footage, while dreaming
    of a future immersive media tour of Kyoto’s neon districts, balancing a love for adventure with the constraints of a GED schedule and part‑time gig.
  culinary: Cecil Corbin’s palate is tuned to bold, handheld flavors, gravitating toward Korean BBQ tacos, jalapeño‑cheddar pretzel bites from local food trucks, and experimenting with homemade sriracha‑glazed
    chicken wings for their video content, yet they often skip breakfast to jump straight into editing.
  core: Cecil Corbin is a charismatic, competition‑driven teen who transforms every social hangout, art exhibit, and gaming session into content gold, while juggling a slight caffeine dependency and occasional
    overcommitment.
background:
  cultural: Cecil grew up in a middle‑class white family in Orlando, Florida, where the tourism‑driven economy and the presence of Disney World created a blend of mainstream American and multicultural influences.
    He is exposed to a diverse array of cultures through the city’s large Latino and Caribbean communities, which adds a vibrant flavor to his social life and culinary interests. His upbringing reflects
    typical suburban Floridian values—emphasis on community, friendliness, and a laid‑back yet ambitious spirit. The regional emphasis on entertainment and hospitality has shaped his appreciation for performance
    arts, theme‑park experiences, and the desire to work in creative marketing within the tourism sector.
attributes:
