  hobbies: '[''Visiting art museums and galleries'', ''Sketching and drawing'', ''Improv comedy workshops'', ''Live music concerts'', ''Streaming strategic video games on Twitch'', ''Creating TikTok short
    videos'', ''Playing basketball at local park'', ''Exploring food festivals and food trucks'', ''Photography of street and theme‑park scenes'', ''Reading sci‑fi and philosophy'']'
  career_goals: Cecil aims to turn his love for performance and digital media into a career as a content creator and brand strategist. In the short term, he plans to earn his GED, build a portfolio of TikTok
    and YouTube videos that showcase his humor, art commentary, and event hosting skills, and secure a part‑time internship with a marketing agency or at a local entertainment venue such as Disney World.
    Long‑term, he envisions leading a creative team that produces immersive multimedia campaigns for tourism and lifestyle brands, leveraging his sociable personality, competitive drive, and artistic sensibility.
    He also wants to develop a personal brand that can speak to young audiences about creativity, resilience, and navigating non‑traditional education paths.
