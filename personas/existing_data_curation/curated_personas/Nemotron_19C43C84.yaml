  career_goals: Although she is officially retired, Ann sees her later years as an opportunity to give back and keep learning. She aspires to mentor a handful of novice teachers through a local teachers’
    alumni network, and she hopes to co‑author a memoir that blends her classroom anecdotes with reflections on educational change. Ann also wants to serve on the board of a nonprofit that promotes lifelong
    learning for seniors, using her practical experience to shape program content while staying flexible enough to avoid overcommitment. In personal terms, she aims to travel to at least three historic
    sites in Nevada each year, expanding her knowledge of the state's heritage without feeling pressured by rigid schedules.
