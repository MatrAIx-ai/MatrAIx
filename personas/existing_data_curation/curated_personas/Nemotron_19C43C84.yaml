personas:
  professional: Ann Perezguerra, a retired elementary teacher with three decades of classroom experience, now volunteers to run adult learning workshops, designs community‑center curricula, and embraces
    new digital tools only when they genuinely enhance engagement, all while improvising program details on the fly.
  sports: Ann Perezguerra enjoys line‑dancing classes, weekly gentle yoga, and a senior‑center pickleball club, cheers on the Las Vegas Raiders and the Nevada Wolf Pack football teams, and takes occasional
    hikes to Red Rock Canyon to keep active.
  arts: Ann Perezguerra immerses herself in historical fiction by authors like Philippa Gregory, attends local theater productions featuring classic plays, listens to Ella Fitzgerald and Frank Sinatra while
    knitting quilts, and volunteers at the library’s story‑time, where she often reads aloud passages from classic literature.
  travel: Ann Perezguerra prefers spontaneous weekend road trips, has visited Red Rock Canyon and plans yearly excursions to Virginia City, Great Basin National Park, and Fort Churchill, balancing her desire
    to explore Nevada’s historic sites with a modest budget and the flexibility to join group tours at the last minute.
  culinary: Ann Perezguerra loves preparing generous pot‑luck meals featuring dishes such as chicken enchiladas, roasted vegetable lasagna, and homemade apple pie, enjoys using fresh basil, rosemary, and
    heirloom tomatoes from her patio garden, and rates herself as a competent home cook who thrives on feeding friends and neighbors.
  core: Ann Perezguerra is a vivacious 79‑year‑old former teacher who channels her curiosity, sociability, and spontaneous spirit into community volunteering, pot‑luck cooking, and gentle yoga, while wrestling
    with occasional worries and a relaxed approach to planning.
background:
  cultural: Ann grew up in a mid‑western white American family during the post‑World War II era, raised in a modest Protestant household that emphasized community service, education, and self‑reliance.
    The cultural shifts of the 1960s and 1970s—civil‑rights activism, the women’s movement, and the rise of television—shaped her open‑minded curiosity while reinforcing a practical outlook. After marrying
    and moving to Las Vegas in the early 1970s, she embraced the city’s unique blend of Western frontier heritage and burgeoning tourism culture, often attending local festivals that celebrate Nevada’s
    mining and entertainment history. Her identity remains rooted in mainstream American values, yet she appreciates the multicultural tapestry of Las Vegas, which informs her inclusive approach to community
    activities.
