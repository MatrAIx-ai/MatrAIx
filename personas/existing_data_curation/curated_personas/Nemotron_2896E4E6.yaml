  career_goals: David aims to advance to a senior accounting supervisor role within his organization, leveraging his experience to lead a team in modernizing the department's workflows. He plans to earn
    his Certified Management Accountant (CMA) designation to solidify his credentials, and to spearhead initiatives that introduce cloud‑based accounting platforms and AI‑driven data analysis tools. Over
    the next five years, he hopes to mentor emerging talent, contribute to community financial education programs, and gradually transition to part‑time consulting for local small businesses, ensuring a
    stable and rewarding retirement while staying professionally engaged.
