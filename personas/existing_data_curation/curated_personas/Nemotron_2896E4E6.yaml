personas:
  professional: David Hodges, a seasoned accountant with deep expertise in QuickBooks Enterprise, Sage 50, and advanced Excel, uses their curiosity and practicality to streamline bookkeeping for midsize
    firms while mentoring junior staff and championing cloud‑based automation.
  sports: David Hodges, a dedicated golfer at Melbourne Country Club, regular participant in a men’s volleyball league, and youth basketball coach, follows the Tampa Bay Buccaneers, Orlando Magic, and Tampa
    Bay Rays, and incorporates early‑morning sailing on the Indian River into their fitness routine.
  arts: David Hodges, an enthusiastic patron of the arts, spends weekends at the Central Florida Playhouse, enjoys the jazz of John Coltrane, the classical guitar of Andrés Segovia, and the films of Steven Spielberg,
    and channels that creative energy into experimenting with Mediterranean and Asian recipes at home.
  travel: David Hodges, a methodical planner who balances family time with adventure, frequently road‑trips to the Florida Keys and the Bahamas, treasures hikes in Merritt Island National Wildlife Refuge,
    dreams of a culinary tour of Italy’s Amalfi Coast and Japan’s Kyushu, and carefully budgets each trip within their retirement savings plan.
  culinary: David Hodges, an avid home chef with a backyard garden overflowing with heirloom tomatoes and basil, expertly prepares grilled swordfish with lemon‑oregano glaze, cooks authentic Greek moussaka
    and Thai Pad Thai, occasionally over‑spices dishes in their quest for authenticity, and treats each meal as a small experiment.
  core: David Hodges, a pragmatic yet curious lifelong learner, blends disciplined accounting precision with a passion for sailing, gardening, and global cooking, while they juggle a competitive golf swing
    and a habit of forgetting to water their lawn during summer heat waves.
background:
  cultural: David’s cultural background reflects a traditional white American upbringing in the southeastern United States. Raised in a middle‑class family that valued hard work, community service, and
    education, he pursued some college before entering the accounting field. Living in Melbourne, FL, he embraces the region’s blend of coastal lifestyle and suburban values, celebrating mainstream American
    holidays while also participating in local fishing and seafood traditions. His social circles include longtime neighbors, fellow professionals, and members of civic organizations, reinforcing a sense
    of belonging to both his family heritage and the diverse community of Brevard County.
