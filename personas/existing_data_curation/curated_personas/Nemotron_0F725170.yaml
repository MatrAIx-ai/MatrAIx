  hobbies: '[''Bridge and Mahjong card games'', ''Community gardening and urban farming'', ''Traditional Vietnamese cooking and recipe sharing'', ''Volunteering at local STEM outreach workshops'', ''DIY
    woodworking and furniture building'', ''Attending live music and theater performances'', ''Spontaneous road trips to regional fairs and historical sites'', ''Reading science fiction and technology magazines'']'
  career_goals: Although retired from formal employment, Tien aims to remain purposefully engaged by expanding his mentorship role in local STEM workshops, helping high‑school students prepare for science
    fairs, and establishing a modest makerspace at the community center where seniors can share practical tech skills. He hopes to publish a memoir that chronicles his journey from a Vietnamese refugee
    to a Midwest engineer, and he aspires to win regional senior bridge and trivia competitions, demonstrating his competitive spirit while contributing to the cultural life of Des Moines.
