  career_goals: Jennifer aspires to become a multimedia artist or creative director, envisioning a future where she can produce engaging visual content for digital platforms and community projects. She
    aims to attend a specialized arts high school, later pursue a degree in visual communications, and eventually lead a youth arts program that blends creativity with social outreach. Her ambition also
    includes building a personal brand as a content creator who inspires peers through imaginative storytelling and collaborative events.
