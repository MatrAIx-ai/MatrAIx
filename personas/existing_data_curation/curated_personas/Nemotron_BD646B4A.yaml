  hobbies: '[''Watercolor painting'', ''Sketching'', ''Visiting art galleries'', ''Reading historical biographies'', ''Reading philosophy'', ''Cycling'', ''Hiking'', ''Improv theater'', ''Volunteering at
    community events'', ''Organizing charity runs'', ''Playing acoustic guitar'']'
  career_goals: Shawn aspires to transition into a leadership role that blends his policing experience with his passion for the arts and community development. He aims to become a detective specializing
    in community‑focused investigations, with an eventual goal of establishing a police‑led public art and youth outreach program in Johnson County. To support these ambitions, he plans to pursue a master's
    degree in criminal justice or public administration, while seeking certification in crisis mediation and community engagement training. He also hopes to mentor new officers, encouraging flexible thinking
    and empathy in modern law enforcement.
