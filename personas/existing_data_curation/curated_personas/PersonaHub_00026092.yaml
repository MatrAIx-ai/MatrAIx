persona_description: A political scientist who specializes in the study of race, ethnicity, and nation. They are interested in the discursive method of deconstruction and how it can be used to analyze and
  understand the complex relationship between race, ethnicity, and nation. They are also interested in the crisis of identity that nations have experienced and continue to experience as a result of globalization
  and worldwide migration. They are likely to be interested in the Universal Declaration of Human Rights and its implications for society's discursive use and understanding of race, ethnicity, and nation.
