personas:
  professional: Jeremy Smith, a senior scale‑verification specialist at a regional grain cooperative, blends his methodical record‑keeping and compliance expertise with a surprisingly relaxed attitude toward
    scheduling, often swapping a planned training session for a late‑night furniture build in his garage.
  sports: Jeremy Smith, an avid outdoor enthusiast, tackles summer hikes in the Bridger Mountains, joins the Bozeman Mountain Bike Club for weekend rides, fishes the Gallatin River for trout, and follows
    the Colorado Rockies and Montana Grizzlies while carving powder at Big Sky Resort each winter.
  arts: Jeremy Smith, a hands‑on creator, spends evenings home‑brewing Belgian‑style ales, crafting custom furniture, capturing wildlife with a Nikon D850, and soaking up folk‑rock performances by The Avett
    Brothers and local bluegrass bands at community music festivals.
  travel: Jeremy Smith, a pragmatic wanderer, plans detailed road‑trip itineraries to Yellowstone and Grand Teton, yet leaves room for spontaneous detours to local farmer’s markets in Idaho, and dreams
    of a long‑haul adventure to Patagonia’s Torres del Paine once his savings permit.
  culinary: Jeremy Smith, a moderate home chef, favors smoky elk chili, cedar‑plank trout seasoned with juniper berries, and uses locally sourced honey and heirloom potatoes while perfecting a stout that
    pairs with his custom‑built wooden cutting board.
  core: Jeremy Smith, a structured yet easy‑going quality‑focused professional, balances a love for precise data with a workshop cluttered by unfinished projects, a disciplined retirement plan, and a habit
    of forgetting to file his health check‑ups on time.
background:
  cultural: Jeremy is a white American who grew up in a multi‑generational farming family that settled in central Montana. His upbringing emphasized self‑reliance, a strong work ethic, and community involvement
    typical of rural Western culture. While he values the practical, no‑nonsense attitudes of his Midwestern heritage, he also embraces the outdoor‑focused, environmentally conscious lifestyle of modern
    Bozeman. This blend of traditions informs his pragmatic approach to work, his respect for regulations, and his appreciation for the natural beauty surrounding his home.
attributes:
  skills: '["Weight verification and calibration", "Sampling techniques for grains and livestock feed", "Statistical analysis of quality data", "Recordkeeping and data entry (Excel, Access)", "Regulatory
    compliance (USDA, FDA)", "Equipment maintenance and troubleshooting", "Process improvement and lean practices", "Team coordination and training", "Report writing and documentation", "Safety protocols
    (OSHA)"]'
  hobbies: '["Hiking in the Bridger Mountains", "Fly fishing on the Gallatin River", "Mountain biking local trails", "Home brewing craft beer", "Woodworking projects", "Reading historical non-fiction",
    "Volunteering at the Bozeman farmer''s market", "Wildlife and landscape photography", "Attending local music festivals", "Skiing at Big Sky Resort"]'
  career_goals: Jeremy aims to move into a supervisory or quality‑assurance management role within the regional grain cooperative, where he can shape measurement standards and drive efficiency projects.
    He plans to complete his associate degree and earn a Certified Quality Auditor (CQA) credential to formalize his expertise. Over the next five years, he hopes to lead a cross‑functional team that integrates
    digital tracking tools, reduces waste in the supply chain, and mentors younger workers, while maintaining enough flexibility to stay engaged with his community and personal projects.
