personas:
  professional: Adriana Rodriguez, a budding mini-architect, they skillfully assemble wooden block towers, blending their love for orderly designs with spontaneous improvisation, and channel their competitive
    edge by racing peers to finish structures during playtime.
  sports: Adriana Rodriguez, an energetic toddler gymnast, they attend the “Tiny Tumblers” class twice a week, passionately imitate the moves of the city’s professional soccer team the Harbor Hawks, love
    sprinting across the park’s sandbox with fellow kids, and frequently insist on being the first to climb the climbing frame.
  arts: Adriana Rodriguez, a vivacious little artist, they splash bright crayon circles on every scrap of paper, sing loudly along to Raffi’s “Baby Beluga,” watch Sesame Street with wide-eyed fascination,
    and occasionally reenact scenes from Disney’s “Moana” during playtime, showing both structured imitation and spontaneous creativity.
  travel: Adriana Rodriguez, a curious explorer, they delight in weekend trips to the city’s aquarium and have already set their sights on a family adventure to Paris after seeing the Eiffel Tower in a
    picture book, prefer short drives that end with a snack break over long flights, and always pack their favorite stuffed rabbit for comfort.
  culinary: Adriana Rodriguez, a picky yet adventurous eater, they love soft rice cereal with banana slices, enjoy avocado toast dipped in olive oil, occasionally refuse peas but eagerly devour sweet potato
    mash, and assist their parents by stirring mashed carrots with a wooden spoon, showing early kitchen curiosity.
  core: Adriana Rodriguez, a precociously organized yet delightfully impulsive 2‑year‑old, they balance competition with camaraderie, dive into sensory play, and turn everyday routines into miniature adventures.
background:
  cultural: Adriana is raised in a bilingual Dominican household in the Bronx, where Spanish is spoken at home and English dominates the neighborhood and preschool environment. Her family celebrates Dominican
    traditions such as the Dominican Day Parade, baking pasteles en hoja, and cooking dishes like mangú and arroz con habichuelas. Music is a constant, with bachata and merengue filling family gatherings,
    influencing her love for dancing. She attends a local Catholic church where community events reinforce cultural values of family closeness, respect, and hard work. Growing up in a vibrant Bronx community,
    she also interacts with other Latino families, sharing playgrounds and neighborhood festivals that blend her Dominican heritage with the multicultural fabric of the city.
