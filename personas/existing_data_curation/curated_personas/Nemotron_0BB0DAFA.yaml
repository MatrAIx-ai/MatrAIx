  hobbies: '[''Dancing to merengue and bachata'', ''Playing with building blocks'', ''Drawing with crayons'', ''Singing nursery rhymes (Spanish & English)'', ''Playing at the playground'', ''Watching animal‑focused
    cartoons'', ''Exploring parks and observing birds and squirrels'']'
  career_goals: Even at two, Adriana shows early signs of dreaming about the future. She frequently imitates adult dancers to the rhythm of merengue and bachata played at family gatherings and says she
    wants to be a dancer when she grows up. She also enjoys watching her mother read picture books to younger children and likes to help, suggesting a budding aspiration to become a preschool teacher. Additionally,
    her love for animals at the local park leads her to imagine herself as a veterinarian. These ambitions blend her sociable, competitive spirit with the cultural pride she feels for Dominican music and
    community caring.
