persona_description: A speech-language pathologist specializing in the treatment of lymphedema of the head and neck region, focusing on manual lymphatic drainage and compression therapy. They are trained
  to provide intervention for lymphedema caused by surgery or radiation therapies, aiming to reduce discomfort, improve movement, and address functional and cosmetic issues. They prioritize early intervention
  and home-based therapy, offering customized compression garments and training patients and caregivers in manual lymphatic drainage.
