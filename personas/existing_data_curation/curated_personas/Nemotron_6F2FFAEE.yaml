  hobbies: '[''Landscape painting'', ''Visiting art galleries'', ''Gardening'', ''Hiking'', ''Woodworking'', ''Arduino tinkering'', ''Cooking Mexican cuisine'', ''Reading popular science'', ''Documentary
    watching'', ''Celebrating Día de los Muertos'']'
  career_goals: Although retired from formal employment, Juan seeks to leave a lasting impact through mentoring and community engineering. He plans to develop a series of hands‑on STEM workshops for local
    high‑school students, design and construct a solar‑powered greenhouse for his neighborhood, and document his family’s Mexican heritage in a photo‑essay book. He also aspires to refine his painting technique,
    explore new artistic mediums, and undertake a meaningful trip to his birthplace in Mexico to reconnect with his roots and collaborate with local artisans.
