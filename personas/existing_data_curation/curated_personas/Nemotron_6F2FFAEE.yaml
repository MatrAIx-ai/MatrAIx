personas:
  professional: Juan Feliciano, a retired mechanical engineer turned community STEM mentor, leverages their CAD, data analysis, and Arduino expertise to design solar‑powered greenhouse prototypes and teach
    high‑school students, balancing meticulous planning with spontaneous improvisation that keeps workshops both organized and unexpectedly inventive.
  sports: Juan Feliciano enjoys cheering for the Boise State Broncos, participates in the local Sawtooth Hiking Club, and tackles moderate elevation hikes in the foothills each weekend while maintaining
    a simple home‑based fitness routine that includes stretching derived from woodworking movements to protect their joints.
  arts: Juan Feliciano paints impressionistic Idaho landscapes using watercolor and mixed media, regularly attends exhibitions at the Boise Art Museum, and draws inspiration from both the region’s rugged
    terrain and folk motifs featured in community Día de los Muertos celebrations.
  travel: Juan Feliciano favors thoughtfully planned road trips that combine scenic photography stops in places like Yellowstone and the Cascade Range with cultural immersion at heritage festivals, and
    dreams of a pilgrimage to their birthplace in their family's region of origin to reconnect with local artisans and collaborate on a mural.
  culinary: Juan Feliciano delights in preparing hand‑made corn tortillas, roasted heirloom tomatoes with epazote, and slow‑cooked mole—dishes passed down through their family heritage—often pairing meals
    with a glass of local Idaho Pinot Noir while fresh garden produce fuels their culinary experiments.
  core: Juan Feliciano blends engineering precision with artistic spontaneity, turning retirement into a hands‑on laboratory of sustainable design, vibrant painting, and community mentorship, all while
    maintaining a skeptical eye toward new collaborations and a penchant for weekend woodworking marathons.
background:
  cultural: Juan was born to Mexican immigrants and grew up bilingual, holding a deep respect for both Mexican and American traditions. He maintains Mexican cultural practices at home, including celebrating
    Día de los Muertos, preparing dishes like tamales and pozole, and listening to traditional music. While living in Rupert, Idaho, he has embraced the region’s rugged, self‑reliant lifestyle, yet his
    Mexican heritage remains central to his identity, influencing his culinary preferences, art appreciation, and storytelling. He stays connected with extended family in Mexico through regular visits and
    video calls, and he often shares Mexican folklore with his grandchildren and community members.
