personas:
  professional: Willie Jackson is a community‑oriented teen who blends practical hands‑on carpentry and yard work skills with strong conflict‑resolution abilities, using their curiosity and reliability
    to organize neighborhood clean‑ups and lead group basketball games while preparing for a future as an EMT or automotive apprentice.
  sports: Willie Jackson is an avid basketball player at the local park, a devoted fan of the Golden State Warriors and the Chicago Bulls, and a member of the youth league team Hoops United, regularly attending
    Saturday pick‑up games and cheering on the Chicago White Sox during the baseball season.
  arts: Willie Jackson finds creative outlet in the church choir, crafting hip‑hop beats inspired by Kendrick Lamar and J. Cole while flipping through graphic novels like Saga and Watchmen, and they also
    admire street artist Banksy and enjoy listening to Ariana Grande on repeat during study sessions.
  travel: Willie Jackson loves budget‑friendly road trips with friends, having explored Washington, D.C.’s monuments and the nearby Great Lakes region, they dream of a future adventure to New Orleans for
    its music scene and a cultural immersion in Tokyo to experience anime and sushi.
  culinary: Willie Jackson enjoys swapping between cooking simple mac and cheese with extra cheese, mastering spicy tacos al pastor with fresh cilantro and lime, and experimenting with instant ramen topped
    with soft‑boiled eggs, while they occasionally treat themselves to a slice of pepperoni pizza after a long gaming session.
  core: Willie Jackson is a high‑energy teen who balances basketball, beat‑making, and community service, always remembers to bring a water bottle but often forgets to finish homework, and uses that lively
    hustle to fuel their dream of becoming an EMT.
background:
  cultural: Willie grows up in the African‑American community of Brownsville, Tennessee, where family, church, and neighborhood ties shape daily life. The legacy of Southern gospel music, soul food cooking,
    and community solidarity is part of his upbringing. He participates in church events, local barbecues, and neighborhood clean‑up days, reflecting the region’s emphasis on mutual aid and cultural pride.
attributes:
  skills: '[''Effective communication'', ''Teamwork'', ''Basic carpentry and hand tool usage'', ''Yard work and landscaping'', ''Basic first aid knowledge'', ''Computer literacy (Microsoft Office, internet
