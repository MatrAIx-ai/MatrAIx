  hobbies: '[''Playing basketball at the community park'', ''Singing in the church choir'', ''Creating hip‑hop beats on a laptop'', ''Volunteering at the community garden'', ''Participating in local dance
    circles'', ''Playing video games (Minecraft, Fortnite)'', ''Reading graphic novels'', ''Helping out at family barbecues'']'
  career_goals: Willie aims to finish his GED within the next two years and then enroll in a community‑college program for emergency medical services or a vocational apprenticeship in automotive repair.
    His long‑term ambition is to become a community health aide or EMT, allowing him to combine his compassion for others with his practical skills. He also hopes to mentor younger kids in his neighborhood,
    showing them that a solid career can start from humble beginnings.
