  career_goals: David aims to transition from hands‑on assembly to a supervisory role where he can mentor apprentices and drive process innovation. He is pursuing certification in CNC programming and a
    Lean Six Sigma Green Belt to bolster his credentials. Long‑term, he envisions launching a boutique studio that blends his fabrication expertise with artistic metal sculpture, offering custom installations
    for local businesses and public spaces. He also hopes to contribute to the Willow Grove maker community by organizing workshops that fuse technical skills with creative expression.
