  career_goals: Mai Yen aims to turn her passion for art and cultural storytelling into a career in museum curation or graphic design. She hopes to earn a scholarship to study art history or visual communications
    at a university, where she can combine her analytical mindset with her creative practice. Long‑term, she envisions creating exhibitions that highlight immigrant narratives and foster cross‑cultural
    understanding. She also wants to develop a freelance illustration business that provides steady income to support her family and give her the independence she values.
