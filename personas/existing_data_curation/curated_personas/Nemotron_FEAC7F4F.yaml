personas:
  professional: Mai Yen, at age one, demonstrates a methodical curiosity when stacking blocks, and they often compete with older siblings to be the first to place the final piece, signaling an early engineer’s
    mindset.
  sports: Mai Yen, barely out of crawling, enjoys parent‑child swimming lessons at the community pool and eagerly watches the Metro City Monarchs baseball team on family TV, while their budding coordination
    is honed through the Little Sprouts Gymnastics Club’s weekly tumble class.
  arts: Mai Yen, despite being only a year old, is mesmerized by the vivid illustrations of Eric Carle’s The Very Hungry Caterpillar and the gentle lullabies of Raffi’s Baby Beluga, and they often hum along
    while turning the pages, indicating an early appreciation for visual and auditory art.
  travel: Mai Yen, an inquisitive one‑year‑old, delights in trips to the local zoo’s butterfly garden and looks forward to the family’s upcoming vacation to Orlando’s Walt Disney World Resort, where they
    will encounter new sights and sounds for the first time.
  culinary: Mai Yen, a toddler, prefers smooth mashed sweet potatoes, ripe avocado puree, and occasional chicken noodle soup, yet they occasionally protest the sight of broccoli, revealing a selective palate
    paired with a willingness to explore new textures.
  core: Mai Yen, a one‑year‑old, combines a methodical curiosity, early competitive edge, and a touch of anxiety about new experiences, and they navigate the world with cautious wonder and a penchant for
    routine.
background:
  cultural: Mai Yen is the daughter of Vietnamese immigrants who settled in Clarkston, a city known for its refugee and immigrant communities. At home, Vietnamese language and customs—such as celebrating
    Tet, preparing traditional dishes, and practicing respect for elders—shape her daily life. Outside, she engages with the multicultural tapestry of DeKalb County, interacting with peers from a variety
    of backgrounds and attending community events that blend Asian traditions with Southern American culture. This dual exposure fosters a deep appreciation for cultural hybridity and informs her artistic
    perspective, while also grounding her in the values of family cohesion, perseverance, and modesty common in many East Asian households.
