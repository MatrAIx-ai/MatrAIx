  career_goals: Jyotikaben aims to complete a bachelor's degree in Business Administration or Marketing while leveraging her current retail experience to transition into a supervisory or visual merchandising
    role within a boutique or cultural venue. She aspires to combine her passion for art with business by eventually working as a gallery coordinator or museum educator in Los Angeles, fostering community
    engagement with the arts. Long‑term, she envisions launching a culturally focused coffee shop or pop‑up space that showcases emerging artists and serves as a hub for multicultural dialogue.
