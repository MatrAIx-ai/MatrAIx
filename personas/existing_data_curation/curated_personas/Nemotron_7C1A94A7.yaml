personas:
  professional: Jyotikaben Bhatt is a retail cashier in Los Angeles who leverages bilingual communication and a keen visual sense to excel in customer service, while actively pursuing a Business Administration
    degree and aiming to transition into a visual merchandising supervisor role at a boutique gallery, blending analytical skills with creative display design.
  sports: Jyotikaben Bhatt follows the Los Angeles Lakers and LA Galaxy, participates in weekly beach volleyball with the Sunset Beach Club, practices yoga three times a week at the downtown LA Yoga Collective,
    and enjoys occasional hiking trips to Griffith Park during the spring.
  arts: Jyotikaben Bhatt immerses themselves in the Los Angeles art scene, sketching street‑art murals inspired by Banksy and Shepard Fairey, curating Instagram feeds featuring works by local muralist Mear
    One, and studying contemporary theory from texts on Yoko Ono and Marina Abramović to shape their own digital illustrations.
  travel: Jyotikaben Bhatt favors spontaneous weekend trips that blend cultural immersion and visual exploration, having documented street‑art tours in Tokyo, culinary markets in Mexico City, and desert
    hikes in Joshua Tree, while budgeting travel through a combination of student discounts, Couchsurfing stays, and occasional splurges on boutique hostels in Barcelona.
  culinary: Jyotikaben Bhatt’s palate navigates from spicy pani puri and chaat to LA‑style fish tacos and vegan bowl creations, and in the kitchen they confidently whip up avocado toast with miso glaze,
    sautéed chickpeas with cumin and turmeric, and homemade matcha latte, often swapping recipes on Instagram.
  core: Jyotikaben Bhatt balances a disciplined schedule of retail work and school with a relentless curiosity for urban art, often caught juggling a sketchbook and a coffee while snapping murals at sunrise,
    yet they sometimes procrastinate on assignments by scrolling endless Instagram art feeds.
background:
  cultural: Jyotikaben is a second‑generation South Asian American of Gujarati Indian heritage, raised in a close‑knit family in Los Angeles. She grew up speaking Gujarati at home while navigating American
    school and social settings, giving her a bicultural perspective. Traditional celebrations such as Diwali, Navratri, and Holi are integral to her family life, as are values of respect for elders, community
    service, and hospitality. Simultaneously, she embraces the multicultural fabric of Los Angeles, blending Indian culinary traditions with the city's diverse food scene and integrating an appreciation
    for global arts into her daily experiences.
