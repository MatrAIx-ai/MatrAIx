  hobbies: '["Art museum visits", "Guided art walks", "Calligraphy & ink painting", "Community gardening", "Cooking traditional Chinese cuisine", "Potluck hosting", "Tai chi", "Book club (historical fiction
    & education)", "Cultural festival attendance", "Travel to heritage sites"]'
  career_goals: Although retired from full‑time teaching, Ying aspires to continue influencing education through volunteer mentorship of new teachers, consulting on inclusive curriculum design for local
    school districts, and establishing a cross‑generational art‑and‑storytelling program that bridges seniors and elementary students. She hopes to author a guidebook on integrating Asian cultural narratives
    into K‑12 literacy instruction and to serve on the advisory board of a community‑center learning hub in Oakland. Her long‑term ambition is to champion lifelong learning initiatives that empower older
    adults to engage creatively with the arts and technology.
