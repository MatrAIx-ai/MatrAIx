personas:
  professional: William Adams is an aspiring roboticist who hones design and teamwork skills through the school robotics club, applying their practical mindset and love for structure to build competition‑ready
    bots while balancing school responsibilities.
  sports: William Adams is a point‑guard on the high school basketball team, plays pick‑up games at the community center, cheers for the NBA’s Los Angeles Lakers, and they spend summer afternoons shooting
    hoops with the local youth league.
  arts: William Adams strums acoustic guitar while writing verses inspired by Ed Sheeran and John Mayer, posts lyric snippets on a private Discord channel, and they enjoy watching indie film festivals with
    friends every spring.
  travel: William Adams loves road‑trip camping in the nearby national forest, has a bucket‑list entry for a spring visit to Washington, D.C.’s museums, and they hope to explore the vibrant street art of
    Berlin after graduation.
  culinary: William Adams favors spicy chicken tacos with fresh cilantro and lime, often attempts to perfect a homemade guacamole, and they occasionally discover new snack combos like peanut butter‑banana
    toast during late‑night study sessions.
  core: William Adams blends a love for disciplined teamwork with a spontaneous streak, always juggling basketball drills, robot builds, guitar riffs, and they have a persistent snack‑craving habit that
    sometimes derails their study schedule.
background:
  cultural: William grew up in Youngstown, Ohio, a Midwestern city with a strong working‑class heritage. His family is of mixed German and Irish ancestry and identifies with the region’s traditions of hard
    work, community involvement, and modesty. He attends a local public school where Friday night football games are a community event, and his family participates in church gatherings and seasonal celebrations
    like Thanksgiving and Fourth of July parades. The cultural values of reliability, neighborly support, and practicality shape his outlook and everyday choices.
