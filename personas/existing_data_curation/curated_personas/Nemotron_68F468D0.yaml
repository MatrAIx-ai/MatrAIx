personas:
  professional: Megan Gray is an aspiring junior builder who channels their love of step‑by‑step LEGO instructions into a dream of becoming a civil engineer, using their organized, methodical nature and
    preference for clear rules to meticulously plan every miniature construction.
  sports: Megan Gray thrives on the structured play of community soccer, joining the Millbrook Tigers U‑8 team each fall and practicing drills from a schedule posted on their bedroom wall, while cheering
    for the hometown baseball club, the River City Rookies, and attending weekly swim lessons at the municipal pool to stay active.
  arts: Megan Gray immerses themselves in the world of colorful illustration by faithfully coloring picture books featuring Eric Carle’s bold collages, delights in reading the Magic Tree House series by
    Mary Pope Osborne, and lifts their voice in the church children’s choir alongside the uplifting hymns of contemporary Christian artist Chris Tomlin.
  travel: Megan Gray prefers meticulously planned family road trips, having explored the Grand Canyon’s rim on a summer adventure and the historic museums of Washington, D.C., while dreaming of a future
    visit to London’s Natural History Museum where they can see dinosaur fossils up close.
  culinary: Megan Gray, a budding junior baker, measures flour, brown sugar, and chocolate chips with careful precision when making chocolate chip cookies alongside their mother, enjoys assembling simple
    veggie wraps with carrot sticks and hummus, and looks forward to family pizza nights featuring mozzarella and fresh basil.
  core: Megan Gray is a detail‑loving eight‑year‑old who balances a love of orderly LEGO builds, careful budgeting, and choir singing with an intensely emotional response to disruptions, often seeking comfort
    in routine, sweet cookies, and the steady rhythm of their daily planner.
background:
  cultural: Megan was born and raised in Sibley, a small town in Lyon County, Iowa. Her family lives on a modest farm where the rhythms of planting, harvest, and seasonal chores shape daily life. They attend
    a local Protestant church and participate in community gatherings such as the county fair and 4‑H programs. The Midwestern values of politeness, hard work, cooperation, and respect for nature are woven
    into her upbringing. This cultural setting reinforces her preference for predictable schedules, organized environments, and strong community ties.
attributes:
  skills: '[''Reading fluency (3rd grade)'', ''Basic addition and subtraction'', ''Following multi‑step instructions'', ''Organizing personal belongings'', ''Caring for a pet rabbit'', ''Assisting with
