  hobbies: '[''LEGO building (with instruction booklets)'', ''Reading Magic Tree House books'', ''Coloring books'', ''Board games with clear rules (Candy Land, Connect Four, Scrabble Junior)'', ''Helping
    in the family garden (watering, weeding)'', ''Caring for a pet rabbit'', ''Baking simple cookies with mother'', ''Keeping a daily planner/journal'', ''Singing in the church children’s choir'']'
  career_goals: Megan’s long‑term ambition is to work in a caring, orderly environment where she can help others feel safe and understood. She often says she wants to become a teacher for young children
    because she enjoys keeping a classroom organized and supporting students who feel anxious. She also imagines being a veterinarian for farm animals, valuing the chance to care for creatures she already
    helps at home. A quieter alternative she mentions is a librarian, where the structured world of books matches her love of order. In the short term she aims to earn the school’s ‘Student Helper’ badge
    and participate in 4‑H projects that teach responsibility.
