  career_goals: Margrit aims to transform her talent for coordination into a professional career in event management and cultural programming. She plans to enroll in an associate’s degree program in business
    administration or event management while continuing to volunteer for local arts festivals. Her short‑term goal is to secure a junior event coordinator role with a community arts center or nonprofit,
    where she can design and execute exhibitions, workshops, and public gatherings. Long‑term, she aspires to earn a certification as a Certified Meeting Professional, lead larger regional cultural initiatives,
    and eventually launch her own boutique event‑planning firm that highlights emerging artists from Western New York.
