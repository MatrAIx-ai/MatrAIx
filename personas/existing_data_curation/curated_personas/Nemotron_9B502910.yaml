personas:
  professional: An aspiring automotive and electrical technician apprentice, Ross Roberts leverages his self‑taught computer troubleshooting and hands‑on Arduino projects to demonstrate a methodical yet
    adaptive problem‑solving style, while his reserved demeanor and occasional worry push them to meticulously document each repair step in pursuit of a future small repair business.
  sports: Ross Roberts is a casual skateboarder who spends Saturday afternoons at the community skate park, hikes the nearby Cedar Ridge Preserve during summer, roots for the hometown River City Raptors
    minor‑league baseball team, and occasionally joins a pickup basketball game at the local recreation center to stay active.
  arts: Ross Roberts channels their curiosity into acoustic guitar sessions inspired by John Mayer and Ed Sheeran, scours indie folk playlists while reading classic sci‑fi novels like Dune, and captures
    the serenity of local parks through analog photography reminiscent of Ansel Adams, often sharing their work on a modest personal blog.
  travel: Ross Roberts prefers low‑key, budget‑conscious trips, having camped in the nearby Grand Oak State Park and taken a weekend road‑trip to the coastal city of Harborview, they now dream of a solo
    train journey through Japan’s countryside to experience its blend of technology and tradition while balancing school responsibilities and family finances.
  culinary: Ross Roberts enjoys cooking simple yet satisfying meals—such as mastering the perfect pepperoni pizza with fresh basil, whipping up a quick ramen bowl flavored with miso paste and soft‑boiled
    eggs, and experimenting with bite‑size homemade energy bars using oats and peanut butter—while their modest kitchen skills keep them comfortable with the basics and occasionally lead to burnt toast
    when they get lost in a gaming session.
  core: Ross Roberts is a methodical, curiosity‑driven teen who balances solitary tech tinkering with creative guitar riffs, wrestles constant worry, and occasionally trades disciplined budgeting for late‑night
    gaming marathons.
background:
  cultural: Ross grew up in a middle‑class, predominantly white suburb of Lincolnshire, Illinois, surrounded by Midwestern values of hard work, modesty, and community participation. His family has a Protestant
    background and emphasizes self‑reliance, personal responsibility, and respect for neighbors. Local customs such as high school sports events, community fairs, and church gatherings have shaped his sense
    of belonging, while the suburban environment provides a safe, orderly setting that aligns with his practical and organized outlook.
attributes:
  skills: '[''Basic computer troubleshooting'', ''Self‑taught HTML/CSS web design'', ''DIY woodworking'', ''Bicycle repair and maintenance'', ''Acoustic guitar playing'', ''Arduino microcontroller projects'',
    ''Manual photography'', ''Personal task organization'']'
  hobbies: '[''Strategy video gaming'', ''Science‑fiction and mystery reading'', ''Acoustic guitar playing and songwriting'', ''Arduino electronics projects'', ''Manual photography of local scenery'', ''Skateboarding'',
    ''Hiking in nature preserves'']'
  career_goals: Ross aims to secure a technical apprenticeship after earning his GED, targeting fields such as automotive technology or electrical work where his hands‑on curiosity can be applied pragmatically.
    He hopes to build a stable, well‑paid career that offers clear progression, mentorship, and the opportunity to eventually start his own small repair business. In parallel, he is open to pursuing an
    associate degree in information technology if a supportive pathway emerges.
