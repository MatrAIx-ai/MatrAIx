    small emerging-artist meet-ups"]'
  career_goals: Tipawan aims to turn her passion for art and cultural storytelling into a career as an independent multimedia artist and cultural curator. She plans to transfer to a four-year university
    to complete a bachelor's degree in Fine Arts or Museum Studies, followed by a graduate program focused on Asian art curation. In the long term she hopes to establish a small community space in the Texas
    Hill Country where she can host rotating exhibitions that highlight contemporary Southeast Asian artists, run workshops for local youth, and publish a digital magazine that blends visual art with her
    Vietnamese heritage. Her competitive drive pushes her to seek recognition for her work through regional art competitions and curated shows, while her desire for flexibility ensures she will work as
    a freelance creator rather than in a rigid corporate setting.
