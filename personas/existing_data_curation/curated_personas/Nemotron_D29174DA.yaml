  career_goals: Shirley aims to transition into a senior HR leadership role, such as HR Director or Vice President of People, within the next three to five years. She seeks to champion a culture of flexibility
    and resilience, expanding remote‑work policies, mental‑health initiatives, and data‑driven talent strategies. She plans to earn the SHRM‑Senior Certified Professional (SHRM‑SCP) credential and to mentor
    emerging HR professionals, drawing on her curiosity for new practices while ensuring pragmatic ROI. Long‑term, she envisions consulting for nonprofit organizations in Colorado, helping them build sustainable
    workforce systems that reflect her values of compassion and self‑interest.
