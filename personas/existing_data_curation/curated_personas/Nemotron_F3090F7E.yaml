  hobbies: '[''Abstract drawing'', ''Digital illustration'', ''Experimental cooking'', ''Reading speculative fiction and poetry'', ''Writing short poems'', ''Listening to jazz, hip‑hop, and reggae'', ''Mindfulness
    meditation'', ''Yoga'', ''Journaling'', ''Visiting art galleries and street markets'', ''Photography of street art and urban nature'']'
  career_goals: Diamond dreams of moving from the production floor into food product development, where she can blend her technical knowledge with her artistic sensibility. She plans to enroll in a community‑college
    program in food science or culinary arts, earn a Certified Food Safety Manager credential, and eventually become a junior food technologist or product‑development assistant. In the longer term, she
    hopes to create a line of health‑focused snack foods that reflect the flavors of her Bronx upbringing and her family’s Caribbean heritage. She also aspires to take on a supervisory role, mentoring other
    young workers from her neighborhood while advocating for mental‑health resources in the workplace. Achieving these goals will give her both creative fulfillment and financial stability.
