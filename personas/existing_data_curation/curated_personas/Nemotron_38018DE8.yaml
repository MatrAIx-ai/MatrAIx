  career_goals: Even at his young age, Donald imagines helping others and understands how things work. He dreams of becoming a firefighter who drives big trucks, a teacher who shares stories, or a community
    helper who keeps friends safe. His goal is to combine his natural curiosity about tools and machines with a practical desire to support and protect the people he cares about.
