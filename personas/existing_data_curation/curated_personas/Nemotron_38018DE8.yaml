personas:
  professional: Donald Johnson, a curious three‑year‑old who delights in sorting colored blocks and matching puzzle pieces, shows early problem‑solving and attention‑to‑detail that foreshadow a future career
    in engineering, blending his practicality with a love for new ideas and a balanced approach to organization, and they eagerly share discoveries with anyone who will listen.
  sports: Donald Johnson, who joyfully splashes in toddler swim lessons at the Sunrise Community Pool, toddles around in the Little Tigers Preschool Soccer program every spring, and bursts into applause
    whenever a family TV night features the Chicago Cubs, blends structured play with spontaneous bursts of energy, and they idolize the Cubs’ team spirit during their limited but enthusiastic viewings.
  arts: Donald Johnson, a three‑year‑old delightfully humming along to The Wiggles and Disney’s Frozen soundtrack while drawing crayon pictures of Moana’s canoe and proudly reciting Sesame Street’s alphabet
    song, lets beloved children’s performers shape his playful imagination, and they often perform rehearsed verses for family members.
  travel: Donald Johnson, whose family adventures include a magical day at Disneyland in Anaheim, a sun‑filled weekend at the local aquarium, and a hopeful future trip to the Grand Canyon, favors parent‑planned
    itineraries with comfortable nap breaks to ease his occasional anxiety, and they eagerly point at maps and ask what lies beyond the next hill.
  culinary: Donald Johnson, who eagerly devours macaroni and cheese mixed with hidden peas, loves crunchy apple slices with peanut butter, and proudly helps stir batter for banana pancakes, showcases a
    budding and picky palate that still cherishes simple comfort foods, and they insist on a sprinkle of cinnamon on every bite for extra flavor.
  core: Donald Johnson, a bright‑eyes three‑year‑old whose boundless curiosity and meticulous play are tinged with frequent meltdowns and deep empathy, navigates the world with an endearing mix of wonder
    and anxious sensitivity, and they often sway between silence and chatter at the drop of a hat.
background:
  cultural: Donald is raised in a white, middle‑class family in Canton, Ohio, within the broader Midwestern cultural setting. His upbringing reflects the region’s emphasis on community, modesty, and practicality.
    Family gatherings often feature local foods like hot‑dish casseroles and BBQ, and community events such as high‑school football games and church socials shape his sense of belonging. These cultural
    influences reinforce his kind, cooperative nature and his balanced approach to curiosity and structure.
