  career_goals: Jordain aims to earn a bachelor's degree in communications or marketing while building a robust freelance portfolio in digital media and graphic design. He aspires to become a digital marketing
    strategist or creative director for a forward‑thinking agency, eventually launching his own boutique creative studio that promotes local artists and cultural events. He also hopes to contribute to the
    Lake Placid community by organizing art exhibitions and youth mentorship programs.
