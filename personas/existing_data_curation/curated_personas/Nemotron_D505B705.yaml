personas:
  professional: Crystal West is a certified EMT‑B in Nashville who blends rigorous, data‑driven emergency scene management with a compassionate, collaborative style, leveraging their meticulous organization
    to mentor new EMTs, lead crisis de‑escalation, and spearhead health‑informatic reporting while channeling their artistic curiosity into visual training tools.
  sports: Crystal West is a devoted runner who logs miles with the Nashville Running Club, cheers for the Tennessee Titans and Nashville Predators, mixes group fitness classes at Orangetheory with weekend
    hikes at Radnor Lake, and tracks performance using a Garmin watch.
  arts: Crystal West frequents the Frist Art Museum and local galleries, paints watercolors of Tennessee hills inspired by Georgia O’Keeffe, captures sunrise over the Cumberland River with a DSLR, participates
    in improv workshops at the Nashville Improv Theatre, and enjoys folk and country acts like Sturgill Simpson and The Civil Wars.
  travel: Crystal West prefers curated weekend getaways that balance adventure and relaxation, planning hikes in the Great Smoky Mountains and cultural tours of Asheville’s art districts, while dreaming
    of a spring trip to Kyoto’s cherry blossom festivals and a culinary pilgrimage through Tuscany, always budgeting trips with a spreadsheet and reserving occasional spontaneous concert road‑trips.
  culinary: Crystal West enjoys experimenting in the kitchen, mastering dishes like shrimp‑and‑grits with miso glaze, fried chicken tacos topped with kimchi slaw, and peach‑infused bourbon glazed pork ribs,
    blending Southern staples such as buttermilk and smoked paprika with global ingredients like gochujang and za’atar, and rates their cooking skill as intermediate‑advanced.
  core: Crystal West is a 36‑year‑old EMT‑B who balances high‑octane emergency work with watercolor painting, marathon‑training runs, and a penchant for late‑night sci‑fi podcasts, often forgetting to eat
    between shifts but always squeezing in a quick sketch.
background:
  cultural: Raised in a middle‑class family in suburban Goodlettsville, TN, Crystal grew up immersed in Southern hospitality, community church activities, and regional traditions such as family barbecues
    and country fairs. Her upbringing emphasized strong family ties, respect for neighbors, and a sense of duty to help others. Attending a STEM‑focused university away from home broadened her perspective,
    fostering an appreciation for diverse cultures and artistic expression. Returning to the Nashville area, she blends her Southern roots—valuing community, storytelling, and music—with a curiosity for
    unconventional ideas and global experiences.
