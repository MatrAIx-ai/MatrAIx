  career_goals: Crystal aims to advance from EMT‑B to full paramedic certification within the next two years, followed by earning a Master's degree in Emergency Management or Public Health. She aspires
    to become an EMS training officer, develop evidence‑based community outreach programs to improve emergency preparedness, and eventually take on a leadership role as an EMS operations manager. Her long‑term
    ambition includes integrating creative visual tools—such as medical illustration and interactive simulations—into EMT training curricula, merging her love of art with her professional expertise.
