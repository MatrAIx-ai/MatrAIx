personas:
  professional: Elsa Mejia, a master carpenter with 35 years of experience in residential framing, custom cabinetry, and artistic wood carving, merges traditional joinery techniques with bold abstract designs
    while patiently mentoring apprentices in a calm, supportive workshop, yet their spontaneous nature often leads to flexible, deadline‑defying project timelines.
  sports: Elsa Mejia enjoys low‑impact fitness through weekly lake walks, occasional paddle‑boarding in summer, and follows the Chicago Cubs, Chicago Bulls, and the local senior curling league with quiet
    devotion, while rarely engaging in competitive sports.
  arts: Elsa Mejia immerses themselves in magical realism novels by Gabriel García Márquez, sketches abstract motifs inspired by René Magritte and Anselm Kiefer, and finds solace listening to Beethoven
    piano sonatas alongside traditional folk ballads performed with acoustic guitar, weaving these influences into their wood sculptures.
  travel: Elsa Mejia prefers contemplative solo trips that blend cultural immersion and natural serenity, having journeyed through Seville’s historic plazas, the tranquil gardens of Kyoto, and the rugged
    shores of the Great Lakes, while dreaming of trekking Patagonia’s remote wilderness.
  culinary: Elsa Mejia delights in preparing heritage dishes such as mole, tamales, and pozole, meticulously simmering complex chilies and chocolate with fresh cilantro, epazote, and oregano from their
    garden, and proudly hosting family feasts where the aromatic flavors become the centerpiece of joyful gatherings.
  core: Elsa Mejia, a quietly resilient 60‑year‑old artisan, fuses folk motifs with abstract wood art, lives frugally yet indulges in handcrafted tools, and finds balance through solitary nature walks,
    herbal remedies, and heartfelt family gatherings.
background:
  cultural: Elsa was born to Mexican immigrants from Oaxaca, and she grew up immersed in the rich traditions of Mexican folk art, such as alebrije carving and Día de los Muertos symbolism. Bilingual in
    Spanish and English, she retains a deep appreciation for Mexican cuisine, Catholic celebrations, and community festivals like Fiesta Latina in Chicago. Her craftsmanship reflects the influence of Mexican
    woodworking heritage, while living in Mundelein, Illinois, has blended Midwestern practicality with her cultural roots. She often incorporates vibrant colors, symbolic motifs, and storytelling elements
    from her Mexican background into her wood pieces, honoring her family’s legacy while sharing it with the broader community.
