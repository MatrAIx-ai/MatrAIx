  career_goals: Elsa aims to transition from contract carpentry to establishing a boutique studio in Mundelein where she can design limited-edition pieces that fuse Mexican folk motifs with modern abstract
    forms. Over the next five years she plans to launch a community workshop series for young artisans, publish a handbook on imaginative woodworking, and create a handcrafted heirloom chest for her grandchildren
    that embodies both her cultural heritage and artistic vision. She also hopes to mentor a small cohort of apprentices, preserving the craft while encouraging creative experimentation.
