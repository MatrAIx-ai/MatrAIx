  career_goals: She aims to earn her GED within the next year and enroll in a foundation program for visual arts at a college known for interdisciplinary design, such as the Minneapolis College of Art and
    Design or the School of the Art Institute of Chicago. Her long‑term ambition is to become a concept artist for video games or animated feature films, building a professional portfolio that includes
    both traditional and digital work. Lisa also hopes to start a freelance studio that merges visual storytelling with social‑impact projects, eventually collaborating with non‑profits to create awareness
    campaigns. In the short term, she plans to secure an apprenticeship at a local design firm, participate in regional art competitions, and curate a solo exhibition of her work at a community gallery.
