personas:
  professional: Lisa Skahill is an aspiring concept artist who leverages their proficiency in Photoshop, Procreate, and Affinity Designer to craft immersive visual narratives for indie video games, balances
    meticulous project organization with spontaneous creative bursts, and channels their competitive streak into regional art competitions and freelance commissions for social‑impact NGOs.
  sports: Lisa Skahill is a passionate weekend hiker who frequently explores the trails of Anoka County and the Duck Lake State Trail, occasionally joins a local disc‑golf league, avidly follows the Minnesota
    Twins and Minnesota Timberwolves, but rarely engages in structured gym workouts, preferring spontaneous outdoor adventures that fuel their imagination.
  arts: Lisa Skahill curates a personal soundtrack of indie and alternative acts like Phoebe Bridgers, Tame Impala, and Mitski while regularly visiting the Minneapolis Institute of Art to study works by
    Frida Kahlo and Jean‑Michel Basquiat, and they avidly read speculative fiction by N. K. Jemisin and Becky Chambers, allowing these influences to permeate their sketchbooks and digital paintings.
  travel: 'Lisa Skahill''s travel persona blends meticulous planning with spontaneous curiosity: they have trekked through the galleries of the Art Institute of Chicago, hiked the Shoreline Trail in New
    York during a summer exchange, and dream of attending the Ghibli Museum in Mitaka, Japan, while budget constraints as a high‑school student often limit longer trips, leading them to prioritize weekend
    road trips to regional art festivals.'
  culinary: Lisa Skahill enjoys crafting quick yet creative meals like avocado‑toast topped with smoked salmon, homemade ramen bowls, and experimental sushi rolls, while their kitchen skills hover at a
    confident amateur level and they frequently snack on gummy candies during late‑night drawing sessions, revealing a preference for bold flavors that mirror their artistic daring.
  core: Lisa Skahill is a fiercely imaginative teenage artist who balances a competitive drive and social energy with bouts of anxiety, channeling their creativity into sketchbooks, digital canvases, and
    community activism while occasionally succumbing to impulsive spending and procrastination.
background:
  cultural: Lisa was raised in a middle‑class white family in Saint Paul, Minnesota, with ancestry that includes German and Scandinavian (particularly Norwegian) roots, reflecting the common heritage of
    the Upper Midwest. Her family celebrates typical American holidays such as Thanksgiving, Christmas, and the Fourth of July, often incorporating regional customs like enjoying wild rice dishes and maple‑syrup
    desserts. Growing up near the Twin Cities, she has been influenced by the vibrant local arts scene, frequenting the Minneapolis Institute of Art, the Walker Art Center, and community theater performances.
    She also participates in seasonal county fairs and cultural festivals that showcase Midwestern folk music and crafts, which have nurtured her appreciation for both contemporary and traditional artistic
    expressions.
