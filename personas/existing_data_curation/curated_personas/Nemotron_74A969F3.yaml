personas:
  professional: Jose Lapon, a veteran mechanical engineer with mastery of 3D CAD, fluid‑mechanics analysis, and additive manufacturing, channels their curiosity and improvisational flair into part‑time
    teaching and consulting, mentoring makers while championing sustainable retrofits for historic structures.
  sports: Jose Lapon enjoys weekend hikes along the nearby Appalachian Trail and chairs a senior walking club, while they cheer on the Washington Nationals for baseball and the Washington Capitals for hockey,
    blending low‑impact outdoor activity with passionate local sports fandom.
  arts: Jose Lapon captures the rolling Shenandoah hills through an Ansel Adams‑inspired lens, they pluck acoustic folk‑blues tunes reminiscent of Bob Dylan in a community‑center band, and they sculpt metal
    pieces echoing motifs from traditional festivals, weaving a creative life that thrives on local gallery openings and D.C. art shows that feature artists like Kehinde Wiley.
  travel: Jose Lapon favors flexible, spontaneous road trips that combine photography stops in the Blue Ridge Parkway with cultural immersion in local festivals, and they dream of returning to the highland
    village of their youth while also planning future tours of historic European cities like Granada and Prague.
  culinary: Jose Lapon delights in preparing pepian with roasted pepitas, tomatoes, chocolate, and annatto, they regularly craft tamales using masa harina and pork filling, and they serve fragrant atol
    de elote made from fresh corn and cinnamon at community gatherings, showcasing a confident yet modest culinary skill set that blends traditional flavors with an adventurous palate.
  core: Jose Lapon is a seasoned engineer‑mentor who balances improvisational problem‑solving with spontaneous cultural celebrations, a love for photography, and a habit of misplacing their tools before
    every woodworking session, and they approach life with a relaxed, curiosity‑driven spirit.
background:
  cultural: Jose was born in Guatemala and grew up in a bilingual household where Spanish and English were spoken interchangeably. His family instilled a strong sense of community, respect for tradition,
    and a love of music and storytelling that is characteristic of Guatemalan culture. After moving to the United States to pursue higher education in engineering, he settled in Martinsburg, West Virginia,
    where he has lived for several decades. While fully integrated into the local Appalachian community, Jose maintains his cultural roots by celebrating Guatemalan holidays such as Semana Santa and Dia
    de los Muertos, preparing traditional dishes like pepian and tamales, and participating in the regional Guatemalan diaspora association. He often shares his heritage through cooking classes, cultural
    presentations at community events, and by incorporating Guatemalan artistic motifs into his woodworking and metal sculptures, creating a bridge between his Latin American background and his adopted
    hometown.
attributes:
  skills: '[''3D CAD modeling (SolidWorks, AutoCAD, Autodesk Inventor)'', ''Fluid mechanics and thermal systems design'', ''HVAC system design and energy-efficiency retrofits'', ''Additive manufacturing
