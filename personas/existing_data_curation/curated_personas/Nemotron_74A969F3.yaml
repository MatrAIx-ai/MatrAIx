    ''Project facilitation and cross-disciplinary collaboration'']'
  hobbies: '[''Acoustic guitar playing'', ''Photography (landscape & historic architecture)'', ''Hiking Appalachian Trail sections'', ''Woodworking and metal sculpture'', ''Attending live music, theater,
    and art exhibitions'', ''Cooking Guatemalan cuisine'', ''Volunteer mentoring at a makerspace'', ''Participating in senior engineering club discussions'', ''Community cultural festival involvement'']'
  career_goals: At 67, Jose is channeling his career energy toward mentorship and community impact. He aims to serve as a part-time instructor or guest lecturer at the local community college, sharing practical
    engineering insights and fostering creativity among students. He also plans to formalize his volunteer work at the Martinsburg Makerspace, guiding hobbyists in prototype development and sustainable
    design. Jose is exploring consulting opportunities that let him apply his expertise to small-scale, socially-focused projects, such as energy-efficiency upgrades for historic buildings and low-cost
    water-management solutions for underserved neighborhoods. Personally, he aspires to author a memoir that blends technical lessons with reflections on his Guatemalan heritage, and to spend time traveling
    to Guatemala to reconnect with family traditions and observe contemporary engineering practices there.
