  hobbies: '[''Cooking traditional Mexican dishes'', ''Gardening (especially peppers and herbs)'', ''Folk dancing'', ''Knitting and crocheting'', ''Reading historical fiction'', ''Volunteer work at senior
    center'', ''Attending community festivals'', ''Genealogy research'', ''Digital photo archiving'', ''Storytelling for children'']'
  career_goals: Andrea aims to deepen her involvement in community service by expanding her volunteer programs, preserving and sharing Mexican cultural traditions through cooking classes and storytelling,
    and learning new digital tools to stay connected with her grandchildren. She hopes to compile a memoir that celebrates her family’s journey, mentor younger members of the Mexican-American community,
    and adopt wellness practices such as gentle yoga and meditation to manage stress and maintain her health.
