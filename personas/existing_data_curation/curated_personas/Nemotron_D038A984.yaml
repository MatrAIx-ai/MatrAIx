  career_goals: Jesse aims to enroll in a specialized high‑school program that focuses on arts and technology, eventually pursuing a degree in industrial design or user experience design. He envisions creating
    products that marry functionality with aesthetic appeal. Long‑term, he hopes to return to his rural community to open a collaborative maker space where young people can explore art, coding, and hands‑on
    fabrication, fostering creativity and skill development in Hulbert and the surrounding area.
