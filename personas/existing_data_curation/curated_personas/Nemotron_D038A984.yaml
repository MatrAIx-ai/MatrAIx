personas:
  professional: Jesse Strickland is an aspiring digital illustrator and model‑kit enthusiast who channels curiosity and a methodical work ethic into weekly art‑club projects, detailed aircraft scale builds,
    and self‑directed study of art history, and they consistently meet project deadlines with quiet focus.
  sports: Jesse Strickland competes on the Hulbert High School cross‑country team, hikes the Ouachita National Forest trails on weekends, cycles the local farm lanes, and they root for the Oklahoma Sooners
    football squad and the Oklahoma City Thunder.
  arts: Jesse Strickland draws inspiration from the brushstrokes of Vincent van Gogh, the surreal worlds of Hayao Miyazaki, and the lyrical storytelling of Taylor Swift, while playing acoustic renditions
    of John Denver songs in their room, and they often translate those influences into sketchbook scenes that blend fantasy with realism.
  travel: Jesse Strickland prefers meticulously planned weekend getaways to the Ouachita National Forest and annual family trips to the Grand Canyon, while dreaming of a spring immersion in Kyoto’s cherry
    blossoms and a museum‑hop through Paris after high school, and they map out each itinerary with spreadsheets and travel guides.
  culinary: Jesse Strickland boasts an intermediate cooking skill, enjoys whipping up spaghetti carbonara with pancetta and pecorino, perfecting tacos al pastor with pineapple‑marinated pork, and experimenting
    with homemade granola using oats, honey, and dried berries, and they keep a handwritten notebook of flavor tweaks.
  core: Jesse Strickland is a calm, relentlessly organized teen who fills sketchbooks nightly, hoards random bottle caps as inspiration, and secretly binge‑watches sci‑fi series until sunrise despite a
    strict bedtime, and they swear they will cut back but never quite succeed.
background:
  cultural: Jesse grew up in Hulbert, a small town in Mayes County, Oklahoma, where community life revolves around family gatherings, local churches, and county fairs. The area’s mixed Southern and Midwestern
    heritage emphasizes hospitality, self‑reliance, and a close connection to the outdoors. Although his family is of white, Midwestern descent, the proximity to the Cherokee Nation and the multicultural
    atmosphere of the county expose him to Native American art and storytelling, which intrigue him. Rural Oklahoma values modesty, hard work, and community involvement; these values shape Jesse’s respect
    for local traditions, his active participation in school clubs, and his desire to contribute positively to his town’s cultural life.
