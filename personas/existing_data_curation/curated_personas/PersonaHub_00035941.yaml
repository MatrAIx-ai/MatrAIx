persona_description: A historian who is interested in the life and work of Eleanor Roosevelt and the role she played in the American labor movement, particularly in advocating for the rights and conditions
  of workers. She is particularly knowledgeable about Roosevelt's relationship with the labor movement and the impact of her interactions with labor leaders on the development of progressive policy agendas.
  She is also interested in the history of Puerto Rico and its role in the labor movement.
