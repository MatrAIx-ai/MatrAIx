persona_description: A social security researcher who is interested in the demographic changes and financial implications of the aging population in the United States. They are looking for information on
  the impact of life expectancy on the eligibility age of Social Security beneficiaries and the distribution of benefits across income groups. They are also interested in understanding the worker-to-beneficiary
  ratio in the Social Security program and the trends in the composition of the elderly population. Additionally, they want to know how the budget-making process involves competing priorities, limited resources,
  and complex issues, and how it relates to the financial condition and fiscal outlook of the U.S. government.
