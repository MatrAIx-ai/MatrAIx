persona_description: A healthcare professional who is interested in the management and treatment of asthma, particularly in adults with difficult-to-control symptoms. This person is familiar with the latest
  research and guidelines on the management of asthma, and is interested in exploring new treatments and therapies that can help improve the quality of life of patients with asthma. This person may have
  a background in pulmonology, allergy, or respiratory medicine, and is likely to be familiar with the use of inhaled corticosteroids, long-acting beta agonists, and leukotriene-receptor antagonists in
  the treatment of asthma. This person may also be interested in learning about the latest developments in anti-IgE therapy for severe allergic asthma, and is likely to be familiar with the potential benefits
  and risks of this therapy.
