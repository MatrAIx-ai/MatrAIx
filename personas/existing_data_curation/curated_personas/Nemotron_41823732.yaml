personas:
  professional: Terry Valdez, a budding young builder, channels their curiosity and practicality into constructing elaborate LEGO cities, balancing meticulous planning with spontaneous improvisation to
    keep playtime organized yet flexible.
  sports: Terry Valdez, an energetic member of the local Little Lions soccer team, idolizes the Los Angeles Dodgers and the Golden State Warriors, eagerly joins weekend park runs, and approaches each game
    with a competitive edge, preferring fast‑paced drills over cooperative drills.
  arts: Terry Valdez, a creative preschooler, spends afternoons drawing whimsical characters inspired by Disney’s Frozen and listening to the upbeat tunes of The Wiggles, often performing impromptu sing‑alongs
    for family, which reflects their love for bright, lively artistic expression.
  travel: Terry Valdez, a curious explorer, loves family road trips to national parks like Yellowstone, dreams of seeing the geysers up close, and fancies a future visit to Disneyland Paris, yet prefers
    trips with clearly scheduled activities over spontaneous adventures, balancing excitement with the need for predictable routine.
  culinary: Terry Valdez, a picky yet enthusiastic eater, adores mac and cheese, chicken nuggets, and strawberry‑banana smoothies, can proudly spread peanut butter on toast unaided, but consistently refuses
    broccoli, often negotiating extra dessert in exchange for finishing vegetables.
  core: Terry Valdez, a five‑year‑old who blends fierce curiosity with a competitive streak, navigates the world with organized play, frequent worries, and a love for bright, energetic experiences.
background:
  cultural: Terry grows up in Jonestown, Pennsylvania, a small town in Lebanon County where community events, outdoor activities, and seasonal celebrations are central to daily life. His family blends typical
    Mid‑Atlantic traditions—such as Thanksgiving dinners, Fourth of July fireworks, and church gatherings—with occasional Hispanic influences reflected in family recipes like tamales and bilingual storytelling,
    honoring his Valdez heritage. This multicultural environment nurtures his sociable, outgoing nature while also exposing him to diverse customs and perspectives.
