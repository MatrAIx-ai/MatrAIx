  career_goals: Demetre often imagines himself as a future artist who paints the forest, an explorer who walks the hills around Candler, and a storyteller who shares his family's tribal legends. He dreams
    of helping others feel happy and safe, picturing roles such as a nature guide, a community caretaker, or a teacher who passes on cultural stories when he grows up.
