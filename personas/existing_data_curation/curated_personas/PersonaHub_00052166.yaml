persona_description: A geologist who specializes in the study of copper and silver deposits, particularly those in the Mesoproterozoic Revett Formation in western Montana and northern Idaho. He is knowledgeable
  about the geology and mineral resources of the Revett Formation, and has experience with the geologic and mineral-resource data for 57 Revett-subtype stratabound copper-silver deposits, occurrences, and
  prospects. He has detailed knowledge of the stratigraphic records of 40 diamond-drill cores and 86 measured sections, as well as spatial geologic data consisting of geologic maps of the Revett Formation,
  the subsurface locations of resources in Revett-subtype stratabound copper-silver deposits based on diamond-drill-core data, and the locations of diamond-drill holes and measured sections. He is skilled
  in using Arc/Info interchange files to derive spatial information from the data and to create digital databases of untested exploration areas and permissive tracts for undiscovered mineral deposits.
