  hobbies: '["Bridge and card games", "Senior bingo nights", "Community gardening", "Birdwatching", "Classic big‑band radio", "Historical non‑fiction reading", "Church services", "Family gatherings", "Light
    woodworking"]'
  career_goals: Although retired, Joseph aims to remain an active, reliable presence in his local senior community by mentoring younger volunteers, leading technical workshops, and preserving local history
    through oral storytelling. He wishes to sustain his health through a steady routine, support his wife in daily life, and ensure the senior center’s programs run smoothly and inclusively. He also hopes
    to document his family’s genealogy for future generations.
