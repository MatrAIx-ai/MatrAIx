  hobbies: '[''Visiting art museums'', ''Life‑drawing classes'', ''Community theater volunteering'', ''Weekend basketball games'', ''Barbecue club leadership'', ''Kayaking on Galveston Bay'', ''Reading
    art history'', ''Digital photography'', ''Attending craft beer festivals'']'
  career_goals: Brent aims to progress to an operations manager role within the next three years, eventually targeting a plant manager position where he can lead large‑scale efficiency and sustainability
    initiatives. He plans to pursue a Lean Six Sigma Black Belt certification and an MBA part‑time to deepen his strategic and financial acumen. He also hopes to create a mentorship program that blends
    technical training with creative thinking workshops, positioning his future facility as a model for innovative, people‑focused manufacturing.
