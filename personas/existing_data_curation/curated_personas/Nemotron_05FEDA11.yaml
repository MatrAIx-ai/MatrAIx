personas:
  professional: Nigel Shaw, a one‑year‑old with a budding fascination for stacking wooden blocks, foreshadows a future career as a civil engineer, they apply methodical planning, precision placement, and
    calm resilience to each miniature tower, already demonstrating an organized, reliable work ethic rarely seen at this age.
  sports: Nigel Shaw, a one‑year‑old who loves crawling through Mommy‑and‑Me gymnastics at the local YMCA, they cheer on the New York Yankees on Sunday afternoons and proudly belong to the Tiny Tigers toddler
    soccer club, approaching each mini‑dribble with a competitive spark yet balanced calm.
  arts: Nigel Shaw, a one‑year‑old who delights in humming along to Debussy’s 'Clair de Lune' and the playful tunes of The Wiggles, they spend quiet moments turning the vibrant pages of Eric Carle’s 'The
    Very Hungry Caterpillar,' and show an early eye for bold colors reminiscent of Maya Angelou’s illustrated children’s books, weaving these artistic experiences into their daily routine.
  travel: Nigel Shaw, a one‑year‑old who, under meticulously planned itineraries, has already explored Disney World in Orlando and the historic streets of Bath in England, they prefer trips that blend stimulating
    sights with scheduled nap breaks, and dream—through bedtime stories—of toddling through Kyoto’s cherry blossom festivals, all while remaining serenely calm amid airport bustle.
  culinary: Nigel Shaw, a one‑year‑old who shows a clear palate for smooth sweet‑potato puree lightly spiced with cinnamon, loves mashing ripe bananas into oatmeal, eagerly reaches for soft cheese sticks
    and steamed peas, and despite lacking any cooking ability, they assist by patting down baby‑food jar lids, reflecting a calm, methodical approach to mealtime that mirrors their organized play.
  core: Nigel Shaw, a one‑year‑old who calmly lines up plush animals in perfect rows, devours sweet‑potato puree with disciplined gusto, and quietly out‑competes peers at peek‑a‑boo while maintaining an
    almost adult‑like resilience to stress.
background:
  cultural: Nigel is raised in a Black family in Houston, Texas, where Southern hospitality and African‑American cultural traditions shape his early environment. Family gatherings feature gospel, R&B, and
    community events such as Juneteenth celebrations, and home‑cooked Southern dishes introduce him to a rich cultural heritage while living in a diverse urban setting.
