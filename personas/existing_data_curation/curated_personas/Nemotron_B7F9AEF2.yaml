  career_goals: Although retired, Aleck is intent on staying mentally active and contributing to his community. He aims to serve on the board of the Revere Historical Society, mentor aspiring entrepreneurs
    through a senior‑business advisory program, and co‑author a guide on sustainable gardening for New England seniors. He also hopes to travel with his wife to historic European sites and to document his
    own life story for future generations, while maintaining his health through regular exercise and balanced routines.
