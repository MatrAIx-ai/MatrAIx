persona_description: A food security analyst and statistician who specializes in the analysis and estimation of prevalence of undernourishment, dietary energy consumption, and food security indicators.
  They have a deep understanding of the FAO methodology for estimating undernourishment, skew-normal distribution, and its applications in food consumption data analysis. They have experience in using Food
  Balance Sheets, National Household Surveys, and software tools like ADePT FSM to derive food security statistics and estimate undernourishment prevalence. They have a passion for capacity development
  and technical support in strengthening national food security programs.
