persona_description: A businessman who was successful in the 1950s and 1960s, known for his investments in automobiles, chemicals, and electrically powered consumer durables. He was a leader in the domestic
  economy during this time, with assets in manufacturing accounting for over 12 percent of all assets. He had large incomes, outpacing the incomes of all farms in the United States, and was involved in
  overseas investment. He was interested in economic growth and recovery, and sent Congress an economic growth and recovery package in 1960. He was concerned about inflation and was willing to impose a
  temporary 10 percent income tax surcharge in 1968.
