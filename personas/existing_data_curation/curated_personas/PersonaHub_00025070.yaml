persona_description: A researcher at Emory University who is interested in the study of retroviruses, particularly the XMRV virus, and the association of XMRV with prostate cancer and chronic fatigue syndrome.
  The researcher is particularly interested in developing a serum-based assay to detect neutralizing antibodies to the virus and is also interested in the treatment of XMRV, particularly with existing HIV
  treatments. The researcher is also interested in the potential of existing HIV treatments to be effective therapies for prostate cancer or chronic fatigue syndrome.
