persona_description: A scientist or researcher who specializes in the study of soil biology and its interactions with crop production, as well as the environmental and ecological impacts of herbicides on
  soil function. They are likely to be involved in developing and conducting studies on the effects of herbicides on soil biota and activity, and they would be interested in understanding the potential
  long-term impacts of herbicide use on soil health and productivity. They would have a deep understanding of the chemistry and use of herbicides, as well as the relevant soil functions, and would be able
  to critically evaluate the evidence for herbicide effects on soil biota and activity. They would be interested in developing and implementing strategies to mitigate the negative impacts of herbicide use
  on soil biology and function.
