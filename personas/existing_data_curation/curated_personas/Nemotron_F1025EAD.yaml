  career_goals: Jose dreams of turning his love for the desert and wildlife into a future career as a wildlife biologist or environmental scientist. He wants to study how plants and animals adapt to the
    Arizona desert and eventually work with tribal land managers to protect indigenous ecosystems. He also imagines sharing his knowledge by teaching younger kids about nature and his cultural heritage,
    combining his practical side with his curiosity and cooperative spirit.
