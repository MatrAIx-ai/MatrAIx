  career_goals: Madison often talks about wanting to help people when she grows up. She imagines being a teacher who tells stories and helps children learn, or a veterinarian who cares for animals. She
    also mentions a desire to become a community helper, like a park ranger, so she can keep the desert playground safe and enjoyable for her friends. These ambitions reflect her curiosity about the world,
    her practical wish to assist others, and her desire for a flexible, caring role.
