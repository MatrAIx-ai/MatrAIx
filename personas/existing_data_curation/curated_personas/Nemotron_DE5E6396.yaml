personas:
  professional: Madison Douglass is a budding builder who uses colorful blocks to craft imaginative structures, balancing a curious drive for new designs with a practical sense for stability, while they
    freely jump between projects, valuing flexibility over strict scheduling, and regularly invites friends to join their play.
  sports: Madison Douglass darts around the local Kids Soccer League's Tiny Turtles team, proudly wearing their little jersey while cheering for the New York Yankees on game days, and they also enjoy weekly
    toddler gymnastics where they practice forward rolls with boundless energy.
  arts: Madison Douglass splashes bright crayons on paper to recreate favorite characters like Elsa and Mickey Mouse, belts out Let It Go during preschool sing‑alongs, and eagerly copies dance moves from
    Kids Bop versions of catchy pop tunes, turning every hallway into a mini‑stage.
  travel: Madison Douglass enjoys family road trips to the local zoo and a magical day at Disney World in Orlando, while dreaming of exploring the sandy shores of Monterey Bay and a future adventure to
    the giant aquarium in Seattle, always packing a beloved stuffed animal for comfort.
  culinary: Madison Douglass adores creamy macaroni and cheese, golden chicken nuggets, peanut‑butter‑and‑jelly sandwiches, and delights in helping stir batter for fluffy banana‑blueberry pancakes, though
    they occasionally beg for extra chocolate sprinkles, showing a sweet tooth that can overrun a balanced plate.
  core: Madison Douglass is a playful, curiosity‑driven four‑year‑old who builds block forts, sings out loud, collects stickers obsessively, and while they radiate kindness and flexibility, they sometimes
    tumble into anxious meltdowns and leave a trail of scattered toys.
background:
  cultural: Madison was born and raised in Thermal, a small town in Imperial County, California. Her family lives in a modest single‑family home surrounded by the region’s desert and agricultural landscape.
    The community is predominantly white with close ties to neighboring farm families and a multicultural environment that includes Latino influences from the surrounding area. Growing up, Madison has experienced
    community events such as local fairs, school picnics, and seasonal celebrations that blend traditional American customs with the regional desert lifestyle. Her upbringing emphasizes kindness, cooperation,
    and a relaxed approach to daily routines, mirroring the laid‑back atmosphere of her hometown.
