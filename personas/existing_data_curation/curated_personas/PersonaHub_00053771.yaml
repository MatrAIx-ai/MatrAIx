persona_description: A historian or linguist who is interested in the cultural and historical context of the early modern period, particularly in the Ottoman Empire and its territories, and the role of
  European and North African cultural contacts in shaping the region's development. They are also knowledgeable about the history of the Mediterranean Sea, particularly the wars of conquest of the Barbary
  Coast and the establishment of the Ottoman Porte's influence in the region. They are likely to be interested in the Topography of Algiers by Antonio de Sosa and its insights into the quotidian life of
  an Islamic city during the early modern period.
