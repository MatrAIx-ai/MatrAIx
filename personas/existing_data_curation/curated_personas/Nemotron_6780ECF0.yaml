  career_goals: Although currently not part of the formal workforce, Maria aspires to translate her passions into meaningful community contributions and personal growth. She aims to complete her associate
    degree in liberal arts or community development, strengthening her academic foundation. Her long‑term goal is to establish a small, volunteer‑run community art space that offers workshops in painting,
    writing, and sustainable gardening, creating a supportive hub for local residents. She also envisions contributing articles and reviews to regional art publications on a freelance basis, sharing her
    perspective on emerging artists and cultural events. Additionally, Maria hopes to compile a collection of her poems and short essays for self‑publication, and to mentor young adults in her town through
    informal creative mentorship. These ambitions align with her desire for flexible, purpose‑driven involvement rather than a traditional 9‑to‑5 role.
