personas:
  professional: Maria Wheeler is a community‑focused arts facilitator with a talent for visual critique, creative writing, and horticultural stewardship, who leverages her spontaneous, empathic nature to
    coordinate volunteer workshops while often wrestling with the lack of formal structure and deadlines.
  sports: Maria Wheeler enjoys low‑impact fitness, favoring early‑morning hikes with the Gulf Coast Birdwatchers Club and weekend kayaking on the bay, while cheering on the New Orleans Saints in the fall,
    the Atlanta Braves during spring training, and occasionally joining a casual senior softball league.
  arts: Maria Wheeler frequents the Regional Contemporary Art Museum, draws inspiration from the paintings of María Berrío and the sculptures of Dale Chihuly, listens to acoustic concerts featuring artists
    like John Mayer and Laura Marling, and quotes poets such as Mary Oliver and Ocean Vuong in her own writing.
  travel: Maria Wheeler plans weekend getaways to Charleston’s historic district and the pine‑scented trails of the Great Smoky Mountains, while dreaming of a summer sojourn in the lavender fields of Provence
    and a cultural immersion in Kyoto’s tea gardens.
  culinary: Maria Wheeler delights in reimagining Southern comfort foods — she cooks shrimp and grits with smoked paprika and lemon zest, bakes sweet‑potato biscuits seasoned with rosemary, and crafts herb‑infused
    collard greens using fresh thyme, garlic, and a splash of apple cider vinegar.
  core: Maria Wheeler blends an artistic soul with a love for nature, using her spontaneous, community‑centered spirit to turn quiet creativity into vibrant local gatherings, even if countless unfinished
    projects quietly line her studio walls.
background:
  cultural: 'Maria grew up in a small town near Foley, Alabama, immersed in the traditions of the American South while also cultivating a broad, open‑minded worldview. Her family heritage includes English
    and German ancestors who settled in the region generations ago, and she was raised with an appreciation for Southern hospitality, community gatherings, and a close relationship with the natural environment.
    Church and local festivals played a role in her early life, fostering a sense of togetherness and shared values. At the same time, her inquisitive nature led her to explore diverse artistic and intellectual
    influences beyond her immediate surroundings, from contemporary visual arts to global literature. This blend of rooted Southern cultural values and an expansive curiosity shapes her identity: she respects
    tradition, values harmony, and welcomes new ideas that enrich her community and personal life.'
