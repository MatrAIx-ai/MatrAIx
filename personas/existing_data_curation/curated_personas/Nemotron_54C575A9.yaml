personas:
  professional: Antonio Prater, a budding playground organizer, uses their practical, routine-loving mindset to set up quick soccer scrimmages for friends at the local park, even though they sometimes forget
    to bring a water bottle and rely on spontaneous improvisation when plans slip.
  sports: Antonio Prater, an energetic soccer enthusiast, plays on the Little Kickers Soccer Club, cheers for FC Barcelona on TV, and they love watching the local junior basketball team, the Junior Lions,
    during winter.
  arts: 'Antonio Prater, a cartoon-loving creative, watches animated series like "Paw Patrol" and "Avatar: The Last Airbender", grooves to gospel songs by Kirk Franklin and hip‑hop tracks from Lil Nas X
    with family, and they enjoy building LEGO scenes inspired by their favorite characters.'
  travel: Antonio Prater, a curious explorer, loves family trips to the beach in Florida, day‑long adventures at the local state park, and they dream of visiting Disneyland in Anaheim next summer.
  culinary: Antonio Prater, a budding foodie, favors pepperoni pizza, chicken nuggets with sweet‑and‑sour sauce, mac and cheese, can assemble a simple grilled cheese sandwich, and they especially love crunchy
    apple slices with peanut butter.
  core: Antonio Prater blends a love for routine soccer games with a vivid imagination for LEGO worlds, yet they often worry about missing a step, making them both a reliable friend and a slightly anxious
    little planner.
background:
  cultural: Antonio is an African‑American boy raised in Forest Park, Georgia. His family celebrates Southern Black traditions such as church gospel services, family barbecues, and holiday gatherings featuring
    soul food like fried chicken, collard greens, and sweet tea. He participates in local community events like Juneteenth parades and church youth groups, and his upbringing blends the warmth of extended
    family ties with the vibrant cultural life of the Atlanta metropolitan area.
attributes:
  skills: '["Reading simple sight words", "Writing his name", "Counting to 20", "Basic addition", "Cooperative play", "Following routines", "Tablet navigation", "Coloring and drawing"]'
  hobbies: '["Soccer", "LEGO building", "Watching cartoons", "Listening to music", "Helping with chores", "Sunday school activities", "Community festivals"]'
  career_goals: Antonio dreams of becoming a firefighter or another community helper who can keep people safe and provide stability. He also imagines being a teacher one day, guiding younger kids through
    daily routines and helping them learn, aiming to make others feel secure and happy.
