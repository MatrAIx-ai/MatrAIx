  career_goals: Gabriel aims to progress from his current specialist role to an Operations Manager within the next three to five years. He plans to enroll part-time in a Business Administration program
    at a community college to earn a bachelor's degree, while also pursuing a Six Sigma Green Belt certification to deepen his process-improvement expertise. Long-term, he envisions leading operations for
    a mid-size e-commerce company or launching his own online retail venture, leveraging his practical experience and entrepreneurial curiosity. He also seeks to develop strong leadership and mentorship
    skills to create a supportive, high-performing team environment.
