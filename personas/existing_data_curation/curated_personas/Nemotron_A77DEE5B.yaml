  career_goals: Channell aims to move into a regional sales‑operations director role within the next five years, where he can oversee multiple sites, shape company‑wide sales strategies, and drive measurable
    growth. He is passionate about mentoring emerging leaders, championing diversity and inclusion initiatives, and eventually establishing a consulting practice that helps small and mid‑size businesses
    optimize their sales processes. While pursuing these ambitions, he also plans for a comfortable retirement that reflects the legacy of the teams he has built.
