  hobbies: '[''Reading literature and art journals'', ''Watercolor painting'', ''Photography'', ''Gardening'', ''Book club'', ''Chess'', ''Folk music listening'', ''Genealogy research'', ''Volunteer art
    talks at the library'']'
  career_goals: Although retired, Clinton aims to deepen his impact on the cultural life of Clarkesville by volunteering as a senior advisor for the local historical society, publishing a illustrated history
    of Habersham County, and curating a yearly exhibition that showcases regional artists and craftsmen. He also hopes to mentor a small group of teens interested in the arts, author a collection of reflective
    essays on art and aging, and travel to a few major art museums in the Northeast to broaden his artistic perspective.
