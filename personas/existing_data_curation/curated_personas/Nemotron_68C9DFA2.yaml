  career_goals: 'In the short term, Benjamin aims to become student council president and lead his school''s robotics team to a regional competition, leveraging his organizational talents and love of structured
    challenges. Long‑term, he dreams of a career that blends his desire for order with his sociable nature: he is interested in civil engineering or software engineering, fields that allow him to design
    and build systems while collaborating with teams. He also entertains the possibility of playing soccer at the collegiate level and eventually coaching, where his competitive drive and ability to motivate
    others could thrive. Throughout, he hopes to develop resilience to stress, using his strong sense of responsibility to stay on track toward these ambitions.'
