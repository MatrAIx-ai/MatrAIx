personas:
  professional: An aspiring robotics engineer, Benjamin Francis channels a love for structured challenges and competitive strategy into designing functional LEGO automation rigs, leading his school’s Robotics
    Club with meticulous planning while constantly double‑checking every circuit to ease their ever‑present worry.
  sports: An avid soccer player, Benjamin Francis captains the junior Riverside Tigers community team that meets every Wednesday and Saturday, follows Los Angeles FC for inspiration, roots for the Los Angeles Dodgers
    (baseball) and the Los Angeles Lakers (basketball) during off‑season play, and keeps a skeptical eye on opposing players’ tactics.
  arts: In the school band, Benjamin Francis keeps the beat on a snare drum, channeling the energy of The Who’s Keith Moon, while after school they devour Marvel’s Spider‑Man graphic novels, adventure series
    by Rick Riordan, and study the drumming of Questlove for rhythmic inspiration.
  travel: A planner at heart, Benjamin Francis prefers detailed itineraries and often maps out trips using Google Maps, having already explored Disneyland with family, taken a weekend hike at the Grand
    Canyon, and now day‑dreams about a future visit to Tokyo’s Akihabara district to soak up robot exhibits and anime culture, all while worrying about missing out on gaming time.
  culinary: When not building LEGO models, Benjamin Francis enjoys devouring pepperoni pizza, homemade chicken quesadillas with cheddar and salsa, and occasionally attempts to whisk up banana‑pancake stacks
    topped with chocolate chips, though they often burn the edges when distracted by the next game.
  core: Benjamin Francis is a detail‑obsessed, competitive kid who balances a love for structured play with a lingering worry that fuels endless journal entries and last‑minute checklists.
background:
  cultural: Benjamin is a white Midwestern American growing up in the suburban community of Olmsted Falls, Ohio. His family likely traces its roots to European ancestors—such as German, Irish, or Polish—reflecting
    the common heritage of the region. The local culture emphasizes hard work, community involvement, and modest, friendly interaction, often centered around school sports, church gatherings, and neighborhood
    events. He experiences typical American holidays—Thanksgiving, Halloween, and Fourth of July celebrations—and enjoys the seasonal rhythms of Midwestern life, from snowy winters to warm summer baseball
    games. The community’s value on reliability and orderly routines has reinforced his preference for structure, while the sociable atmosphere has nurtured his outgoing, talkative nature.
