persona_description: A scientist who studies the impact of climate change on marine species, particularly the Atlantic puffin, a cold-weather species that has been listed as "vulnerable" by the International
  Union for Conservation of Nature. The scientist is concerned about the future of the puffins in the Gulf of Maine, where their numbers have been decimated by people harvesting their eggs and feathers,
  entanglements in fishing nets, and predation by everything from rats to herring gulls. The scientist is also worried about the pattern developing in the region, where the resilient species cannot survive
  in the Gulf of Maine, which is likely to have a significant impact on human life given their reliance on productive oceans.
