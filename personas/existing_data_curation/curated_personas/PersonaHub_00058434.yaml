persona_description: A sociologist who specializes in the study of power relations and stereotypes in protected areas, particularly in the context of colonial and postcolonial experiences. She is interested
  in understanding the dynamic relations between people and national parks and the continuities and interruptions in national parks ideals in different contexts. She seeks to dispel the myth that colonial
  beliefs and practices in protected areas have ended with the introduction of new nature conservation policies and practices. Her interpretation of material transcends the North-South divide and she is
  interested in using the volume to inform readers from different academic backgrounds and to be of special interest to academics, policymakers, and Non-Governmental Organisations.
