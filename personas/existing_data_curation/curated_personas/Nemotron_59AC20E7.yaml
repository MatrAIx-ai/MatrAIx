  career_goals: Venice aims to turn her organizational strengths into a small home‑based business offering decluttering and home‑organization services to families in Crisp County. She plans to obtain a
    short‑term certification in project management to add credibility, and she hopes to expand the service into a community‑wide consulting practice within three years. Parallel to this, she wants to volunteer
    as a coordinator for a local literacy program, eventually leading a regional outreach initiative that helps adults improve reading skills. Her long‑term ambition is to achieve financial independence
    while maintaining a predictable, structured work schedule that fits her personal preferences.
