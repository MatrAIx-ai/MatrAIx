personas:
  professional: Kathleen Whatley, a veteran carpenter with over thirty years in residential and small‑scale commercial construction, leverages their keen eye for framing, precision trim work, and OSHA‑compliant
    safety to deliver high‑quality, schedule‑driven projects while mentoring apprentices—especially women—and they are now channeling that structured expertise into launching a boutique woodworking studio
    focused on handcrafted furniture, historic home restoration, and sustainable building practices.
  sports: Kathleen Whatley stays active by hiking the Blue Ridge foothills, supporting the West Virginia Mountaineers football team and the Pittsburgh Steelers, and they participate in a local walking club
    that meets twice weekly at the community center to combine social interaction with low‑impact exercise.
  arts: Kathleen Whatley nurtures their artistic side through a quilting circle inspired by William Morris patterns, listening to bluegrass legends the Infamous Stringdusters while they craft birdhouses,
    attending community theater productions of Tracy Letts' plays, and they find literary intrigue in contemporary mystery novels by Tana French and Gillian Flynn.
  travel: Kathleen Whatley favors purposeful travel, often planning weekend trips to Asheville’s craft fairs, weekend getaways to Shenandoah National Park for sketching historic cabins, and they dream of
    a summer apprenticeship in Florence’s renowned furniture workshops, all while balancing a modest travel budget and family obligations.
  culinary: Kathleen Whatley enjoys seasonal cooking, frequently preparing roasted heirloom tomatoes with fresh basil, sautéed collard greens with smoked ham hocks, homemade sourdough bread infused with
    rosemary, hearty chicken and dumplings on chilly evenings, and they occasionally experiment with sweet potato gnocchi topped with sage butter.
  core: Kathleen Whatley blends disciplined craftsmanship with a yearning for calm, navigating chronic anxiety through structured routines, community mentorship, and quiet creative escapes, and they find
    balance in the rhythm of woodwork and reflection.
background:
  cultural: Kathleen grew up in a working‑class family in rural Virginia, where self‑reliance and a strong sense of community were emphasized. Her heritage is rooted in the Appalachian region, with family
    traditions that include church attendance, seasonal farming cycles, and a respect for manual labor. As a white woman in a male‑dominated trade, she has navigated cultural expectations by embracing both
    the industrious spirit of her upbringing and a modern drive for gender equity. Her background informs her practical outlook, her value for structured routines, and her commitment to giving back to the
    Shipman community through mentorship and volunteer work.
