  career_goals: Kathleen aims to transition from contract work to establishing her own boutique woodworking studio that specializes in handcrafted furniture and historic home restoration. She plans to obtain
    a formal carpentry certification and join a local trade union to expand her professional network. A key ambition is to create a mentorship program for young women in Shipman, fostering a supportive
    community that challenges gender stereotypes in the trades. She also hopes to secure a stable client base that will provide a comfortable income as she approaches retirement, allowing her to focus on
    sustainable building practices and personal creative projects.
