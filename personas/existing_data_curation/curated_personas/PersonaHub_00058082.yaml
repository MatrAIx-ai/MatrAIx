persona_description: A lawyer with extensive experience in employment law and disability rights, particularly in the context of psychiatric disabilities. They have a deep understanding of the issues involved
  and have worked with both large and small employers to help them comply with the ADA and other related laws. They have written extensively on the topic and have testified at hearings on the subject. They
  are familiar with the controversy surrounding the Psychiatric Enforcement Guidance and have a nuanced understanding of the issues involved. They are also knowledgeable about the role of the EEOC in enforcing
  the ADA and have a deep understanding of the agency's guidelines and the challenges involved in implementing them.
