  career_goals: Glenn dreams of exploring space and technology; he often imagines becoming an astronaut or a robotics engineer who designs machines for scientific research. He is also intrigued by the idea
    of creating educational games that help other kids learn, reflecting his desire to contribute to his community and promote harmony. In the longer term, Glenn sees himself pursuing a career that combines
    his curiosity about the world with practical problem‑solving, such as a scientist or an engineer.
