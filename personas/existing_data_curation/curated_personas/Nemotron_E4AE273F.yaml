personas:
  professional: Glenn Jackson, a budding young coder, blends curiosity and practicality by designing Scratch games that feature moving‑part LEGO robots, demonstrating methodical planning and reliability
    while collaborating with friends to debug and iterate on projects, and they often document their code in a tidy notebook.
  sports: Glenn Jackson, a member of the Oakridge Tigers U11 soccer team, follows Manchester United and LA Galaxy matches for inspiration, attends after‑school training three times a week, keeps a tidy
    notebook of drills and goals, values teamwork and fairness on the field, and they often volunteer to help younger teammates master ball control.
  arts: Glenn Jackson, a LEGO enthusiast and comic‑strip creator, draws inspiration from the sci‑fi novels of Isaac Asimov and the rhythmic storytelling of Kendrick Lamar, spends weekends building moving‑part
    space stations, regularly shares their drawings on a kid‑friendly art forum, and they blend imaginative curiosity with methodical craftsmanship.
  travel: Glenn Jackson, curious about the cosmos, dreams of visiting the Kennedy Space Center and the Science Museum of London, has already taken a family road trip to the Grand Canyon, prefers meticulously
    planned itineraries with checklists, balances adventure with the comfort of familiar snack breaks, and they love collecting postcards from each destination.
  culinary: Glenn Jackson, who enjoys helping in the kitchen, frequently prepares pasta primavera with fresh tomatoes and basil, experiments with making homemade pizza dough, delights in baking chocolate
    chip cookies, occasionally forgets to wash hands before cooking, and they savor the chance to taste‑test family‑favorite dishes.
  core: Glenn Jackson is an organized, inquisitive ten‑year‑old who balances building LEGO space rockets, coding Scratch games, and scoring goals on the soccer field while keeping a meticulous allowance
    ledger and occasionally forgetting to wash hands before cooking.
background:
  cultural: Glenn is an African‑American child whose family traces its heritage to the southern United States and the Caribbean, with grandparents who grew up in the rural South and a mother who immigrated
    from Jamaica. Living in Williston Park, New York, he experiences a suburban environment while staying connected to cultural traditions. His household celebrates Juneteenth and Kwanzaa, shares stories
    of civil‑rights leaders, and prepares dishes like collard greens, sweet potatoes, and Jamaican jerk chicken during family gatherings. Glenn’s parents emphasize the importance of education, community
    service, and cultural pride, encouraging him to participate in community events at the local YMCA and to learn about his heritage through school projects and family discussions.
