  hobbies: '["gardening", "knitting", "coastal walking and birdwatching", "reading classic literature and poetry", "local history research", "cooking traditional New England recipes", "journaling", "reflective
    prayer"]'
  career_goals: Bernice aims to deepen the spiritual formation of her congregation by establishing a mentorship program that pairs seasoned members with younger families, preserving traditional practices
    while gently integrating contemporary perspectives. She hopes to author a modest guidebook on maintaining religious rituals in modern daily life, drawing on her own experiences of routine and stability.
    Over the next few years, she plans to expand the church’s outreach to seniors and individuals facing anxiety or depression, collaborating with local mental‑health services to provide holistic support.
    Ultimately, she envisions a gradual transition to a consulting role, offering her expertise to neighboring faith communities while continuing to volunteer in pastoral care.
