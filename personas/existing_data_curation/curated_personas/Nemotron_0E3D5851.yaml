  hobbies: '["Paddleboarding","Acoustic guitar playing","Organizing beach clean-ups","Food photography","Travel documentaries","Trivia competitions","Hosting pop-up cooking demos"]'
  career_goals: Riley aims to secure a sous-chef position at a well-regarded beachfront restaurant within the next two years, then advance to executive chef, where he can create a signature menu that highlights
    sustainable Gulf seafood. In the longer term he plans to open his own farm-to-table restaurant on Bradenton Beach, earn a prestigious culinary award such as a James Beard recognition, and eventually
    host a cooking show that teaches viewers disciplined, organized cooking techniques. He also intends to complete a culinary degree to deepen his theoretical knowledge and broaden his professional network.
