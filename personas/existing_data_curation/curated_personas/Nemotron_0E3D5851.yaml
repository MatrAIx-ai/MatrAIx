personas:
  professional: Riley Bingham, an aspiring sous‑chef at 18, blends meticulous kitchen workflow design with a natural flair for center‑stage charisma, using precision knife work, sous‑vide, and Gulf‑inspired
    seafood expertise to lead a line crew while constantly refining cost‑effective, visually striking menus.
  sports: Riley Bingham devotes sunrise paddleboarding sessions on the Gulf, belongs to the Bradenton Paddleboard Club, plays weekend beach volleyball, and fervently follows the Tampa Bay Buccaneers, often
    wearing the team jersey during training.
  arts: Riley Bingham strums acoustic guitar renditions of Jack Johnson and Ed Sheeran at local beach bars, captures golden‑hour sunsets reminiscent of Chris Burkard’s photography, and binge‑watches travel
    documentaries like "Chef's Table" for creative inspiration.
  travel: Riley Bingham plans meticulously detailed weekend getaways to the Florida Keys, the Bahamas, and occasionally dreams of Amalfi’s cliffs, balancing a tight student budget with a penchant for sunrise
    paddle sessions and sunset photography, while using spreadsheet‑based itineraries to maximize every dollar.
  culinary: Riley Bingham’s culinary palate revolves around Gulf‑fresh grouper, stone crab, and shrimp ceviche, expertly prepared with sous‑vide precision and plated with micro‑herbs and citrus foam, reflecting
    an advanced skill set that merges disciplined technique with a love for vibrant, sustainable flavors.
  core: Riley Bingham is an 18‑year‑old disciplined culinary prodigy who paddles at dawn, strums acoustic guitar for crowds, obsessively spreadsheets life, yet can’t resist a late‑night taco run.
background:
  cultural: Riley grew up in a middle‑class family in the Tampa Bay area, where his parents owned a modest diner that served classic American fare with a coastal twist. The local Florida culture—characterized
    by a blend of Southern hospitality, Latin Caribbean flavors, and a strong connection to the Gulf—shaped his palate and cooking style. His white American heritage, combined with exposure to Hispanic
    and Caribbean culinary traditions prevalent in Bradenton Beach, has given him a multicultural appreciation for fresh seafood, bold spices, and a laid‑back beach lifestyle. He attended a community‑college
    culinary program, reinforcing his disciplined work ethic and structured approach to cooking.
attributes:
  skills: '["Precision knife work","Sous-vide cooking","Grilling techniques","Seafood preparation","Kitchen workflow design","Inventory management","Food safety compliance","Team leadership","Menu development","Cost
