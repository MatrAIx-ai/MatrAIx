personas:
  professional: Mohammad Kuhn, a licensed practical nurse with fifteen years of bedside experience and a parallel passion for visual arts, blends meticulous wound care and medication management with art‑therapy
    activities, using empathy and curiosity to teach future nurses how creative expression can improve patient outcomes while often juggling disorganized lesson plans.
  sports: Mohammad Kuhn, an avid fan of the Alabama Crimson Tide football team and the Mobile BayBears baseball club, participates in a local walking group at sunrise on the Baldwin County trail, joins
    a seasonal senior softball league each summer, and balances his love of gentle cardio with occasional discomfort from his arthritis, preferring low‑impact exercise over high‑intensity workouts.
  arts: Mohammad Kuhn, a weekend painter of Gulf‑Coast seascapes inspired by Winslow Homer and a hobbyist guitarist who covers folk classics by Johnny Cash and Doc Watson, regularly attends performances
    at the Mobile Theatre and volunteers at a hospice art‑therapy program, while collecting folk‑art prints from local craft fairs and citing Georgia O'Keeffe and the poetry of Mary Oliver as creative touchstones.
  travel: Mohammad Kuhn, who enjoys relaxed road trips along the Gulf Coast visiting historic Charleston, the vibrant French Quarter in New Orleans, and the secluded islands of the Mississippi Delta, plans
    vacations around off‑season museum tickets and modest budget accommodations, and dreams of a springtime art pilgrimage to Provence and the Uffizi in Florence, though his tendency to procrastinate on
    bookings sometimes delays travel plans.
  culinary: Mohammad Kuhn, a competent home cook who loves preparing shrimp and grits, low‑country gumbo, and fresh garden salads seasoned with thyme, oregano, and a pinch of cayenne, often experiments
    with creole sauces while occasionally over‑salting dishes during impromptu cooking sessions, and enjoys dining at family‑run diners that serve classic Southern comfort food like fried catfish and sweet
    potato pie.
  core: Mohammad Kuhn, a 55‑year‑old nurse‑artist who merges bedside compassion with watercolor sunsets, playlists of folk guitar, a love of Crimson Tide football, and a perpetual battle between organized
    planning and charming disarray.
background:
  cultural: Born and raised in the Deep South, he comes from a mixed German‑Swiss and Anglo‑American heritage common to many white families in Alabama. He grew up steeped in Southern hospitality, church‑centered
    community life, and a strong appreciation for Gulf‑Coast folk art and music. The regional culture of communal support, respect for tradition, and openness to new ideas—shaped by the multicultural influences
    of neighboring African‑American and Creole art scenes—has informed his values of harmony, empathy, and curiosity. His marriage to a fellow lifelong resident reinforces these cultural ties while encouraging
    shared creative pursuits.
attributes:
  skills: '[''Wound care management'', ''Medication administration (IV and oral)'', ''Patient education and counseling'', ''Electronic health record documentation'', ''Crisis intervention and de‑escalation'',
