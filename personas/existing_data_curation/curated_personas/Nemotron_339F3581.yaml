  hobbies: '[''Landscape painting'', ''Sketching marine life'', ''Photography'', ''Reading philosophy, poetry, and art history'', ''Gardening'', ''Playing acoustic guitar'', ''Cooking Southern cuisine'',
    ''Volunteering at art‑therapy programs'', ''Participating in community theater'', ''Birdwatching'']'
  career_goals: Seeks to transition from bedside practice to a teaching role at a community college or vocational nursing program, sharing his blend of clinical expertise and artistic perspective. Aims
    to earn a Certified Nurse Educator credential and develop an integrated health‑and‑art curriculum for seniors and patients with chronic illness. Long‑term, hopes to establish a community center in Baldwin
    County that offers health workshops, art classes, and support groups, promoting mental‑well‑being and creative coping strategies.
