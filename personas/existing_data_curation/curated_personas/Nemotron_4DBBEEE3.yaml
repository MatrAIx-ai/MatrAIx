personas:
  professional: Stephanie Johnson, a seasoned community volunteer in Oneonta, leverages her event‑planning acumen, budgeting expertise, and warm communication style to orchestrate festivals, book‑club gatherings,
    and craft circles, while pursuing a volunteer caregiving certification and digital‑skill courses to amplify her impact on senior services.
  sports: Stephanie Johnson cheers on the New York Knicks and the local Oneonta Tigers, participates in the senior center’s weekly dance classes, joins a community 5K charity run each spring, and follows
    the Oneonta High School basketball team, balancing low‑impact exercise with her love of team spirit.
  arts: Stephanie Johnson immerses herself in the Oneonta book club reading works such as Toni Morrison’s Beloved, leads a quilting circle inspired by classic patterns, enjoys karaoke nights belting out
    Dolly Parton’s Jolene, and regularly attends local theater productions of Our Town.
  travel: Stephanie Johnson favors short road trips to the Adirondacks for leaf‑peeping, spends summer weekends in the Catskills, recalls a memorable historic tour of Savannah, Georgia, and dreams of exploring
    Asheville’s art districts, planning each journey around community bulletin board tips and a modest travel budget.
  culinary: Stephanie Johnson delights in farm‑to‑table cooking, turning garden‑grown tomatoes, basil, and zucchini into a hearty ratatouille, perfects rosemary‑roasted chicken, bakes apple crumble with
    Granny Smith apples, and crafts homemade sourdough bread, while occasionally treating herself to a slice of pizza from the town’s favorite pizzeria.
  core: Stephanie Johnson, a 59‑year‑old community champion, blends curiosity with practicality, orchestrates local events, nurtures friendships through crafts and dance, and balances budget‑wise living
    with occasional indulgences.
background:
  cultural: Stephanie was raised in a small-town, middle-class White family in the upstate New York region, where community ties, modest church involvement, and self-reliance were emphasized. Her upbringing
    combined traditional Northeastern American values—such as punctuality, pragmatism, and a strong work ethic—with a warm, sociable culture that encourages neighborhood gatherings and volunteerism. Over
    the decades, she has absorbed the local heritage of Otsego County, including its agricultural roots, seasonal festivals, and an appreciation for preserving regional history. These cultural influences
    shape her collaborative spirit, practical curiosity, and dedication to fostering harmony within her community.
