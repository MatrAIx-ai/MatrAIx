  career_goals: Although she is currently not in the formal workforce, Stephanie aims to deepen her impact in Oneonta by taking on leadership roles in local nonprofit boards, particularly those focused
    on senior services and community health. She is motivated to earn a volunteer certification in caregiving to formally support elderly neighbors. Additionally, she aspires to document and preserve Oneonta’s
    local history by collaborating with the historical society, possibly curating a small exhibition. On a personal level, she plans to enroll in a short online course to enhance her digital skills, enabling
    her to create a community newsletter and share resources more effectively.
