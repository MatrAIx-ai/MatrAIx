personas:
  professional: Ricardo Davila is a data‑driven market researcher who blends rigorous quantitative analysis with an artistic storytelling flair, using Python, Tableau, and qualitative methods to craft immersive
    brand narratives while coordinating cross‑functional teams.
  sports: Ricardo Davila enjoys weekend pick‑up basketball at a local gym, follows the Dallas Cowboys for football, and practices yoga three times a week to maintain flexibility, while occasionally joining
    a 5 k running club during spring.
  arts: Ricardo Davila immerses themselves in visual arts—painting abstract canvases inspired by cultural motifs, creating digital illustrations with D3.js, capturing street photography, and strumming acoustic
    guitar while reading speculative fiction by Neal Stephenson and philosophy texts by Camus, regularly attending gallery openings and cultural festivals.
  travel: Ricardo Davila prefers thoughtfully planned trips that balance cultural immersion with creative inspiration, such as a week‑long art retreat in Oaxaca, a tech‑design tour of Tokyo’s Akihabara
    district, and a quick weekend getaway to Berlin’s contemporary art scene, always using reward points to stretch their travel budget.
  culinary: Ricardo Davila is a confident home cook who delights in preparing traditional Mexican dishes like mole poblano, tacos al pastor, and chiles en nogada, expertly seasoning with chipotle, ancho
    chilies, and fresh cilantro, while also experimenting with molecular gastronomy techniques for friends.
  core: Ricardo Davila is a creatively analytical market researcher who meticulously budgets, actively balances wellness with art, and occasionally neglects flossing while hoarding vintage Polaroid film
    for spontaneous photo projects.
background:
  cultural: Ricardo was raised in a bilingual Mexican‑American household in Texas, where Spanish and English are spoken interchangeably. His family hails from central Mexico, maintaining traditions such
    as Día de los Muertos, quinceañeras, and weekly family gatherings centered on homemade tamales and pozole. This heritage instilled a deep appreciation for community, hospitality, and the rich visual
    storytelling of Mexican folk art, which influences both his professional creativity and personal pursuits.
attributes:
  skills: '["Statistical Analysis (Python, R, SAS)", "Data Visualization (Tableau, PowerBI, D3.js)", "Survey Design (Qualtrics, SurveyMonkey)", "Consumer Behavior Modeling", "Qualitative Research (focus
    groups, in‑depth interviews)", "Brand Positioning & Market Segmentation", "Digital Marketing Analytics (SEO, social media metrics)", "Project Management", "Creative Storytelling & Presentation"]'
  hobbies: '["Painting and digital illustration", "Photography", "Reading speculative fiction and philosophy", "Playing acoustic guitar", "Cooking Mexican cuisine", "Solving puzzles and chess", "Designing
    data‑visualization side projects", "Yoga and meditation", "Attending local art exhibits and cultural festivals"]'
  career_goals: Ricardo aims to become a senior market research manager within the next five years, leading a multidisciplinary team that blends analytic rigor with innovative, art‑inspired research methods.
    He plans to earn an MBA to strengthen his business strategy acumen and to publish thought‑leading articles on emerging trends such as immersive AR/VR advertising. Ultimately, he aspires to shape brand
    strategies at a Fortune‑500 consumer‑goods company, driving data‑informed creativity while fostering a collaborative, inclusive workplace culture.
