personas:
  professional: Manuel Soliz, a seasoned construction laborer with 15 years of hands‑on experience, blends concrete finishing, rough carpentry, and heavy equipment operation with a curiosity for sustainable
    building techniques, and they use bilingual communication and collaborative problem‑solving to lead small crews on diverse job sites while consistently prioritizing safety and artistic detail.
  sports: Manuel Soliz plays as a midfielder in the Fresno Community Soccer Club's weekend league, avidly follows the Fresno State Bulldogs football team, the LA Lakers, and the Fresno Grizzlies, and they
    balance recreational play with a disciplined evening jog through the city’s river trail during cooler months.
  arts: Manuel Soliz immerses himself in Fresno’s mural culture, drawing inspiration from Diego Rivera’s frescoes and local street artist Sasha Hamblin, while practicing Spanish guitar to the sounds of
    Rodrigo y Gabriela and finding solace in the ambient piano works of Ólafur Arnalds, and they often sketch design concepts on construction sites for future artistic finishes.
  travel: Manuel Soliz has explored the rugged coastline of Big Surf, spent a weekend in Oaxaca sampling traditional cuisine, and they aspire to drive the historic Route 66 and tour sustainable housing
    projects in Copenhagen, all while balancing family commitments and a modest vacation budget.
  culinary: Manuel Soliz enjoys cooking homemade mole poblano with ancho chilies, sesame seeds, and dark chocolate, prepares fresh garden salads featuring heirloom tomatoes, nopal cactus, and avocado, and
    they whip up quick tacos al pastor using pork marinated in achiote and pineapple, showcasing a solid home‑cook skill level that blends authentic flavors with creative twists.
  core: Manuel Soliz is a gritty builder‑artist hybrid who balances concrete mixers with watercolor palettes, habitually checks construction podcasts on their phone during meals, and they can’t resist adding
    a splash of mural‑inspired paint to any freshly finished wall.
background:
  cultural: Manuel was raised in a Mexican‑American household in Fresno, where Spanish was spoken at home and Catholic traditions shaped family life. He celebrates Día de los Muertos, Mexican Independence
    Day, and local fiestas, often helping to prepare traditional foods and organize community events. His family’s roots trace back to migrants who worked in California’s agricultural fields, giving him
    a strong sense of community solidarity and respect for hard work. He is bilingual, uses both English and Spanish daily, and draws inspiration from Mexican folk art, which informs his appreciation for
    color, pattern, and craftsmanship in both his personal hobbies and his work.
