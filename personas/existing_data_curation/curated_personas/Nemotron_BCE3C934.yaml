  career_goals: Manuel aims to earn his GED and obtain an OSHA 30‑hour certification within the next year. He hopes to advance to a foreman role, taking on more supervision and planning responsibilities.
    Ultimately, he dreams of starting his own small remodeling firm that blends modern construction practices with Mexican‑inspired artistic design, offering custom finishes and sustainable solutions for
    local homeowners. He also wants to mentor younger workers from his community and help them develop trade skills.
