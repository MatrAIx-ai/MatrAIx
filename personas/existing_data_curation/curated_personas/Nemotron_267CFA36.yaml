personas:
  professional: Manuel Ortizsantiago, a budding structural engineer in the making, channels his disciplined curiosity into constructing intricate LEGO masterpieces, methodically solving jigsaw puzzles,
    and sketching detailed cartoon scenes, always aiming for flawless execution and meeting his high personal standards.
  sports: Manuel Ortizsantiago thrives on the soccer field as a forward for the neighborhood Little Strikers Soccer Club, idolizes FC Barcelona's dynamic play, and eagerly joins seasonal pick-up games while
    balancing schoolyard recess with occasional weekend swimming at the community pool.
  arts: Manuel Ortizsantiago expresses creativity by drawing vibrant cartoon characters inspired by Pixar's Toy Story, dancing to salsa beats by Marc Antonio and reggaeton hits from Bad Bunny, and immerses
    themselves in picture books about space illustrated by Dr. Seuss, which together shape their colorful artistic identity.
  travel: Manuel Ortizsantiago loves family road trips to the local zoo and beach, delights in exploring the interactive exhibits at the nearby science museum, and dreams of visiting the Smithsonian National
    Air and Space Museum and a tropical island resort, preferring short flights with familiar companions due to their young age.
  culinary: Manuel Ortizsantiago eagerly assists in the kitchen, skillfully stirring the saffron-infused rice, diced chicken, peas, and cilantro for arroz con pollo, enjoys the crunchy texture of carrot
    sticks and cheesy pizza, and delights in making mango smoothies with fresh mango, lime, and a splash of coconut milk.
  core: Manuel Ortizsantiago blends meticulous organization with boundless curiosity, building elaborate LEGO worlds, scoring goals on the soccer field, and occasionally losing sleep over the next big project,
    all while balancing disciplined routines with a love for music and cooking.
background:
  cultural: Manuel comes from a proud Puerto Rican family that keeps cultural traditions alive at home, speaking Spanish alongside English and celebrating holidays such as Noche Buena, Three Kings Day,
    and local Latino festivals. Living in Ridgewood, Queens, he participates in a vibrant community of Puerto Rican and broader Latino families, attending a bilingual preschool, enjoying meals like mofongo
    and pasteles, dancing to salsa and bomba rhythms, and taking pride in his heritage while integrating into the multicultural fabric of New York City.
