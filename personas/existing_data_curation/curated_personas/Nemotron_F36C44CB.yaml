personas:
  professional: Chi Wang, a budding game developer, channels their love of structure and meticulous planning into crafting simple but well‑documented Scratch games; they treat each coding session like a
    mini‑project with clear milestones and a personal journal of progress.
  sports: Chi Wang, a member of the Willow Creek Swim Club and occasional weekend soccer player for the junior league, follows the Springfield Tigers with devoted enthusiasm; they structure their own workout
    schedule around school with timed plank challenges and disciplined swimming laps each Saturday.
  arts: Chi Wang, an avid pianist who reveres the precision of Ludovico Einaudi's minimalist pieces and delights in Agatha Christie's whodunits, channels that same analytical focus into building LEGO landscapes
    that echo the set designs of Studio Ghibli's 'Spirited Away'; they also share insights in a small after‑school book club.
  travel: Chi Wang, who prefers meticulously planned, short‑duration trips over spontaneous wanderings, enjoys family visits to the Grand Canyon and the coastal town of Monterey; they also dream of exploring
    the historic streets of Kyoto and the snowy slopes of the Alps.
  culinary: Chi Wang, a budding home chef, loves the precise art of folding steamed dumplings and shaping moon‑shaped pastries with fillings of pork, ginger, and scallion; they also master classic spaghetti
    carbonara with pancetta and pecorino and relish experimenting with matcha‑infused desserts.
  core: Chi Wang blends meticulous discipline with quiet curiosity, turning LEGO bricks and piano keys into tools for mastering order; they yet occasionally hoard spare change in secret jars and forget
    to reply to group texts.
background:
  cultural: Chi Kuk is a second‑generation East Asian American, with her family tracing roots to a Mandarin‑speaking region of China. Growing up in Belle Vernon, PA, she balances her American school life
    with rich cultural traditions at home, such as celebrating Lunar New Year, observing the Mid‑Autumn Festival, and speaking Mandarin with her parents and grandparents. Her family places a high value
    on education and respect for elders, which reinforces her disciplined approach to schoolwork. While she navigates typical suburban American experiences—like attending local community events and playing
    sports—she also participates in cultural activities at a nearby Chinese community center, where she learns traditional calligraphy and practices Chinese dance during seasonal festivals. This bicultural
    environment nurtures her bilingual abilities and a deep appreciation for both her heritage and her American upbringing.
