  career_goals: Chi Kuk aspires to attend a specialized STEM high school where she can deepen her knowledge in engineering and computer science. Her long‑term ambition is to become a software engineer who
    designs educational technology tools that help students learn math and science more effectively. She also dreams of studying abroad in a university with strong engineering programs, while maintaining
    ties to her cultural heritage by possibly incorporating Mandarin language support into her future products. In the short term, she aims to win regional science fair competitions and earn a certification
    in introductory coding.
