  career_goals: Ariful aims to secure a full‑time entry‑level position in a structured environment such as a technical support specialist or junior business analyst within a tech or finance firm in the
    Atlanta metropolitan area. He plans to leverage his analytical skills and competitive spirit to meet performance targets, earn promotions, and gain industry certifications like CompTIA A+ or Google
    Data Analytics. Over the next three to five years, he intends to pursue a bachelor’s degree in Information Systems or Business Administration and ultimately transition into a project management role
    where he can lead cross‑functional teams.
