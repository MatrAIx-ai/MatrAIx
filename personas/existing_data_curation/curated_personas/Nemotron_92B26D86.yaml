personas:
  professional: Ariful Varghese is a detail‑oriented technical support specialist‑in‑training who leverages his strong Excel and SQL skills, hands‑on networking know‑how, and people‑centric mindset to troubleshoot
    tickets efficiently while constantly seeking the next certification to climb the corporate ladder.
  sports: Ariful Varghese is a forward for a local Marietta soccer club, a weekend league basketball player for the Marietta Hoops squad, follows Atlanta United FC and the Atlanta Hawks closely, and incorporates
    early‑morning runs into his routine to balance a competitive drive with team camaraderie.
  arts: Ariful Varghese enjoys the infectious rhythms of Bhangra and the cinematic scores of A.R. Rahman, rocks out to indie bands like The Strokes, and attends local theater productions starring performers
    such as Lupita Nyong'o, using these artistic experiences as a creative outlet between data‑driven tasks.
  travel: Ariful Varghese prefers meticulously planned short‑haul trips, often road‑tripping to Asheville’s Blue Ridge Mountains for hiking, while dreaming of a solo backpack adventure through Kerala’s
    backwaters and a cultural weekend in London to attend a tech conference and a West End musical.
  culinary: Ariful Varghese is a confident home cook who can whip up authentic masala dosa with coconut chutney and buttery garlic naan, enjoys experimenting with Southern fried chicken using a buttermilk
    brine, and frequently blends spices like cumin, mustard seeds, and smoked paprika to create fusion dishes for community potlucks.
  core: Ariful Varghese blends structured ambition with a love for group energy, turning spreadsheets into social engines, devouring data by day and dancing to Bhangra beats by night, all while battling
    a stubborn habit of over‑scheduling every weekend.
background:
  cultural: Ariful was raised in a South Asian household that blends traditional values with the multicultural fabric of the United States. His family emphasizes education, respect for elders, and close‑knit
    community ties, celebrating festivals like Diwali and Eid and maintaining connections with relatives in Kerala, India. Growing up in Marietta, GA, he navigates both the expectations of his heritage—such
    as collective responsibility and modesty—and the American emphasis on individuality and career ambition. This bicultural experience informs his strong work ethic, love for communal gatherings, and appreciation
    for both South Asian and Southern U.S. culinary traditions.
