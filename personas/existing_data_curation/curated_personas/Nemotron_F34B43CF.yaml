  hobbies: '[''LEGO building'', ''Reading adventure/mystery books'', ''Minecraft gameplay'', ''Helping cook Vietnamese dishes'', ''Exploring local parks and rock collecting'', ''Beginner piano practice'',
    ''Small‑group board games (e.g., Ticket to Ride)'']'
  career_goals: Nhung hopes to become a mechanical engineer, inspired by his love for building LEGO models and tinkering with simple gadgets. He also dreams of mastering Vietnamese cooking to one day open
    a family restaurant that blends tradition with modern flavors. In the short term, he wants to win his school’s science fair and earn a ‘Junior Chef’ badge at his community center.
