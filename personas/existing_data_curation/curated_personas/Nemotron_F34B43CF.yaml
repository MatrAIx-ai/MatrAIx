personas:
  professional: Nhung Mai, a nine‑year‑old budding structural engineer, loves constructing detailed LEGO vehicles from step‑by‑step manuals and later tweaking them with spontaneous ideas, showing a practical
    mind that enjoys routine yet occasionally rebels against strict deadlines.
  sports: Nhung Mai enjoys casual weekend walks in Everett’s local parks, cheering for the Seattle Mariners and Seattle Kraken while occasionally playing in the Everett Youth Soccer Club, preferring low‑pressure
    activity over organized team sports but still relishes the chance to run after a tossed soccer ball.
  arts: Nhung Mai is a budding pianist who practices soft pieces by Ludovico Einaudi and sings along to Taylor Swift’s melodies while diving into adventure series like The Hardy Boys and Nancy Drew, blending
    quiet melodic focus with a love for clear‑cut storytelling.
  travel: Nhung Mai’s travel style is family‑guided yet curiosity‑driven, exploring nearby Seattle and Portland parks, dreaming of a trip to Yellowstone National Park’s geysers, and wondering about the
    bustling streets of Tokyo, all while cataloguing interesting rocks and leaves collected along the way.
  culinary: Nhung Mai helps prepare family meals each weekend, proudly stirring fried rice with shrimp, peas, carrots, soy sauce and sesame oil, and experimenting by adding extra veggies or a sprinkle of
    cheese, while also mastering a simple banana bread with mashed bananas, flour, butter, sugar and walnuts.
  core: Nhung Mai blends a love for structured LEGO builds with spontaneous tweaks, a cautious saver who occasionally splurges, a diligent yet sometimes forgetful asthma manager, and a quiet piano lover
    who treasures routine, rocks, and the comfort of familiar stories.
background:
  cultural: Nhung was born to Vietnamese immigrant parents who settled in the Seattle metropolitan area before moving to Everett. At home, Vietnamese is spoken alongside English, and family meals center
    around traditional dishes such as pho, bánh mì, and fresh spring rolls. He celebrates Tet (Lunar New Year) with red envelopes, lion dance performances at the local Vietnamese cultural center, and visits
    his grandparents who live in a nearby suburb. His parents emphasize respect for elders, diligence in school, and preserving cultural customs, while also encouraging participation in American activities
    like baseball and school clubs. Growing up in the Pacific Northwest, Nhung enjoys the region’s rain‑soaked forests and the multicultural vibe of the greater Seattle area, which blends his Vietnamese
    roots with American peer culture.
