  career_goals: Lisandra aims to earn journeyman electrician certification and an EPA certification for refrigerants within the next two years, positioning herself for a senior technician role. She envisions
    moving into a supervisory position where she can lead a crew, implement energy‑saving retrofits, and mentor apprentices. Long‑term, she hopes to launch her own independent handyman business focused
    on sustainable repairs and installations, leveraging her curiosity for new tech and her competitive drive to become a trusted service brand in the Newark community.
