  hobbies: '["Reading literary fiction", "Traditional South Asian cooking", "Gardening", "Knitting", "Journaling", "Yoga and meditation", "Listening to Hindustani classical music", "Calligraphy", "Birdwatching"]'
  career_goals: Mamata aims to transition from a receptionist to an office manager role, seeking certification in office administration to strengthen her supervisory capabilities. She desires a position
    that allows her to implement streamlined processes and improve workplace efficiency while maintaining a low‑stress, quiet environment. Long‑term, she hopes to mentor new staff, contribute to staff training
    programs, and potentially move into a remote administrative role that offers greater work‑life balance and time for personal interests.
