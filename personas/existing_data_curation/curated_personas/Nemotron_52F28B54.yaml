  career_goals: Although currently not in the workforce, Andrew aims to expand his impact through volunteer leadership. He plans to become the coordinator of a community garden in his neighborhood, leveraging
    his gardening know‑how and organizational skills. He also hopes to obtain a certification in senior caregiving so he can assist at the local senior center, and to lead a series of DIY workshops for
    other older adults, sharing his practical expertise while fostering social connection. Ultimately, he wants to remain an active, supportive presence in Albuquerque’s civic life and to mentor younger
    community members.
