  career_goals: Leah aims to move from a senior sales associate to a regional sales manager within the next three years, overseeing a team of representatives across several neighboring counties. She wants
    to leverage her curiosity for emerging sales technologies to introduce data‑driven strategies while preserving the personal touch valued by her clients. Long‑term, she envisions opening a boutique consultancy
    that helps small rural businesses improve their sales and marketing outreach, allowing her to stay flexible and community‑focused.
