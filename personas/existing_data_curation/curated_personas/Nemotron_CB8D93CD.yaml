  hobbies: '["Sketching urban landscapes", "Street mural photography", "Visiting art museums", "Walking along the Canal Walk", "Journaling", "Collecting vintage jazz records", "Attending small live‑music
    sessions", "Balcony gardening"]'
  career_goals: Alan aims to complete his GED within the next year and pursue a Certified Nursing Assistant (CNA) credential to deepen his clinical responsibilities. He aspires to become a mental health
    technician or unit supervisor, where he can integrate his organizational strengths with his passion for creating therapeutic art programs for residents. Additionally, he plans to enroll in evening courses
    on art therapy and eventually lead a community outreach initiative that brings art experiences to underserved neighborhoods, combining his love of art with his commitment to service.
