  hobbies: '[''Abstract Painting'', ''Chinese Calligraphy'', ''Gallery Visiting'', ''Digital Photography'', ''Reading Contemporary Fiction'', ''Exploring Modern Philosophy'', ''Listening to Experimental
    Music'', ''Cooking Fusion Cuisine'', ''Participating in Cultural Festivals'', ''Practicing Tai Chi'']'
  career_goals: Looking ahead, Mai aims to transition from day‑to‑day operational management to a senior advisory role, where she can shape organizational vision and mentor the next generation of leaders,
    especially women and older employees. She is interested in establishing a nonprofit that bridges business and the arts, creating programs that support emerging artists and promote cultural exchange
    between East Asian and American communities. Additionally, Mai envisions a phased retirement that includes part‑time consulting for start‑ups that value imaginative, socially responsible business models.
