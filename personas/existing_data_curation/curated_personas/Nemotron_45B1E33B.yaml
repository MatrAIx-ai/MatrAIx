  career_goals: Quynh aims to advance to a regional management role where she can influence broader operational strategies across multiple locations. She plans to earn a Lean Six Sigma Green Belt and a
    Certified Manager credential to formalize her expertise. A key ambition is to champion workplace well‑being initiatives, reducing stress for her team through structured support programs. She also hopes
    to mentor emerging female leaders in the Stockton community and, long‑term, possibly launch her own boutique retail venture that blends her managerial skills with her passion for Vietnamese cuisine
    and community entrepreneurship.
