personas:
  professional: Christina Biggs, a seasoned registered nurse specializing in emergency department triage and patient safety, leverages their methodical mindset, competitive drive, and sociable nature to
    mentor staff, streamline discharge planning, and champion evidence-based protocols.
  sports: Christina Biggs, an avid supporter of the New Orleans Saints and New Orleans Pelicans, runs with the Lake Pontchartrain Trail Club on weekend hikes, participates in a friendly corporate softball
    league, and channels their competitive energy into cheering loudly at every game.
  arts: Christina Biggs, a regular attendee of the New Orleans Jazz & Heritage Festival and patron of the Saenger Theatre, paints watercolor scenes of bayou marshes inspired by the improvisational rhythms
    of Trombone Shorty, and thrives on being the lively voice in post-show conversations, often sharing their insights with fellow audience members.
  travel: Christina Biggs, who balances a busy nursing schedule with weekend road trips, prefers historic coastal towns like Charleston and Savannah, dreams of an art residency in Provence, and meticulously
    plans each journey in a travel journal to ensure both cultural immersion and relaxation, reflecting their love of organized exploration.
  culinary: Christina Biggs, an enthusiastic home chef, perfects shrimp étouffée, duck gumbo, and jambalaya seasoned with tasso ham and filé powder, experiments with sous-vide techniques while still relying
    on a trusted cast-iron Dutch oven for classic Creole fare, showcasing their devotion to flavor and culinary experimentation.
  core: Christina Biggs, a 41-year-old nurse who blends organized competitiveness with a love for jazz, watercolor, and Cajun cooking, often juggles endless community events while they secretly hoard extra
    sugar packets for late-night art projects.
background:
  cultural: Christina grew up in a white Southern family in rural Louisiana, steeped in the region's traditions of hospitality, community gatherings, and reverence for local cuisine. Her upbringing included
    church involvement, family potlucks, and participation in parish festivals like Mardi Gras, exposing her to the fusion of French, African, and Caribbean cultural influences that characterize the Gulf
    Coast. This background nurtured her appreciation for music, storytelling, and the vibrant arts scene of New Orleans while reinforcing values of reliability, hard work, and community service that continue
    to shape her personal and professional life.
attributes:
  skills: '["Patient assessment", "IV therapy and medication administration", "Wound care", "Emergency department triage", "Electronic health record documentation", "Health education and patient counseling",
