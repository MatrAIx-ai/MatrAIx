  hobbies: '["Watercolor painting", "Visiting art galleries and museums", "Attending live jazz and music festivals", "Cooking Cajun and Creole cuisine", "Gardening native Louisiana plants", "Hiking local
    nature trails", "Participating in community theater", "Organizing social gatherings", "Volunteering for health‑education outreach", "Reading contemporary fiction and non‑fiction"]'
  career_goals: Christina aims to advance into a Nurse Manager role within the next three years, leveraging her organizational strengths and competitive drive to improve unit performance metrics. She plans
    to earn a Bachelor of Science in Nursing (BSN) and pursue certifications such as ACLS, PALS, and the Trauma Nursing Core Course to deepen her specialized expertise. Long‑term, she envisions becoming
    a clinical educator or preceptor, developing innovative health‑education programs that integrate art and creativity to promote patient well‑being. She is also interested in contributing to local health
    policy initiatives that address community health disparities in St. Tammany Parish.
