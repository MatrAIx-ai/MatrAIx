  hobbies: '[''Drawing/Sketching'', ''Watercolor painting'', ''Reading fantasy and sci‑fi books'', ''Exploring nature trails'', ''Bird watching'', ''Collecting leaves and rocks'', ''Building LEGO constructions'',
    ''Playing piano'', ''Creating Scratch games'', ''Writing short stories'']'
  career_goals: Shelby dreams of a future where she can blend her love for art and nature. She envisions herself as a children's book illustrator or a wildlife artist, perhaps later becoming an environmental
    science communicator who creates visual stories about local ecosystems. She also imagines working as a digital storyteller, designing interactive projects that let her explore unconventional ideas.
    Her career ambition emphasizes flexibility, independent work, and opportunities for continual learning and creativity.
