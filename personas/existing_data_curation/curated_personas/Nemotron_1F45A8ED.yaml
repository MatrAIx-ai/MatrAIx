personas:
  professional: An aspiring junior illustrator and budding game creator, Shelby Higgins merges watercolor forest scenes with simple Scratch games, channeling their curiosity into visual storytelling while
    navigating school projects with a delightfully disorganized, flexible approach.
  sports: A nature‑focused explorer, Shelby Higgins enjoys weekend hikes with the Kids Outdoor Adventures Club, follows the Seattle Seahawks football season on TV, and prefers solo trail walks over team
    sports, though they occasionally dabble in community swimming lessons.
  arts: A dedicated young creator, Shelby Higgins spends afternoons sketching woodland creatures inspired by Claude Monet’s pastel tones, paints watercolor scenes reminiscent of Hayao Miyazaki’s forest
    landscapes, reads J.K. Rowling’s wizarding world for narrative ideas, and practices piano pieces by Ludovico Einaudi, all while swapping art tips with fellow members of the library’s Young Artists Circle.
  travel: An inquisitive day‑tripper, Shelby Higgins explores Willow Creek State Park’s leaf‑littered trails, has taken a family road‑trip to the Smithsonian National Museum of Natural History in Washington
    D.C., and dreams of one day wandering the ancient redwood groves of Redwood National Park and the misty highlands of Scotland.
  culinary: A budding kitchen experimenter, Shelby Higgins loves making apple cinnamon muffins and simple vegetable stir‑fry with fresh basil after sketching, enjoys snacking on trail mix of dried cranberries,
    almonds, and dark chocolate chips, and occasionally treats themselves to a cheesy pizza with extra mushrooms, though they often forget to clean up the kitchen promptly.
  core: Shelby Higgins is a curious, solitary ten‑year‑old who blends watercolor forests with Scratch games, lives for quiet creativity, and occasionally misplaces their inhaler before school.
background:
  cultural: Shelby comes from a multi‑generational Midwestern family that has lived in Indiana for several decades. Growing up in Albany, a small town in Delaware County, she experiences a community that
    values modesty, neighborliness, and a close connection to the surrounding farmland and natural landscape. Her household celebrates traditional American holidays and participates in local events such
    as the county fair, school fundraisers, and library reading challenges. The regional culture encourages self‑reliance, curiosity, and appreciation for nature, which have shaped her independent learning
    style and love for solitary creative activities.
attributes:
  skills: '[''Reading comprehension'', ''Creative writing'', ''Sketching and drawing'', ''Watercolor painting'', ''Basic Scratch programming'', ''Nature observation'', ''Bird identification'', ''Basic piano'',
