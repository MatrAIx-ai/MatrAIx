personas:
  professional: Carmen Salgado, a seasoned facility maintenance specialist who expertly blends chemical handling, minor‑repair know‑how, and bilingual communication with a curious yet pragmatic mindset,
    channels their sociable, competitive energy into rallying cleaning crews, pushing for higher standards, and navigating new protocols with healthy skepticism, all while embracing a flexible, occasionally
    disorganized work style to pursue a lead janitor role.
  sports: Carmen Salgado fuels their boundless energy by dancing salsa at community nights, tackling weekend hikes with the Sangre de Cristo Trail Club, cheering on the Denver Broncos each fall, and keeping
    a modest home treadmill for rainy days, all while maintaining a competitive edge that pushes them to set personal fitness goals despite occasional schedule chaos.
  arts: Carmen Salgado unwinds after work by streaming telenovelas starring Thalía, spinning salsa steps to Celia Cruz’s cumbia rhythms, knitting scarves to the backdrop of Garth Brooks’s country ballads,
    and admiring local muralist José’s vibrant street art, weaving together a lively tapestry of music, dance, and visual creativity that fuels their sociable spirit.
  travel: Carmen Salgado prefers spontaneous road trips that blend scenic mountain treks with cultural pit‑stops, having explored the Sangre de Cristo peaks, the historic streets of Santa Fe, the colorful
    plazas of Oaxaca, and dreaming of a future adventure to New Orleans’ jazz scene, all while managing travel budgets flexibly to accommodate family gatherings and community commitments.
  culinary: Carmen Salgado, a confident home cook, delights in preparing traditional corn‑based dishes such as carnitas, tamales, and pozole using roasted chilies, cilantro, avocado, and masa harina, proudly
    sharing these flavorful meals at neighborhood potlucks and family gatherings while occasionally improvising with new spice blends to outdo fellow cooks.
  core: Carmen Salgado balances a hands‑on, pragmatic work ethic with a vibrant community life, navigating occasional disorganization and skeptical caution while staying relentlessly upbeat and competitively
    driven in both cleaning standards and cultural celebrations.
background:
  cultural: Carmen was raised in a Mexican‑American household where Spanish was spoken at home and English at school. Her family maintains strong ties to Mexican traditions such as Día de los Muertos, quinceañeras,
    and weekly family meals featuring dishes like tamales and pozole. As a Catholic, she participates in parish activities that blend Mexican religious customs with local Colorado community events. Living
    in Pueblo, a city with a vibrant Hispanic community, she balances her Mexican heritage with the cultural flavors of the American Southwest, fostering a sense of belonging both to her roots and to her
    adopted hometown.
attributes:
  skills: '[''commercial cleaning'', ''floor care (scrubbing, polishing)'', ''restroom sanitation'', ''basic facility maintenance'', ''inventory management'', ''health and safety compliance'', ''bilingual
