  hobbies: '[''social dancing (salsa, folk dances)'', ''cooking Mexican cuisine'', ''gardening'', ''hiking in the mountains'', ''volunteering at church and community events'', ''knitting'', ''organizing
    Día de los Muertos celebrations'', ''watching telenovelas'', ''listening to cumbia and country music'']'
  career_goals: Carmen aims to advance to a lead janitor or facilities coordinator role within her building, where she can mentor newer staff and influence cleaning standards. She plans to obtain an OSHA
    certification and a professional cleaning technician credential to bolster her expertise. Long‑term, she dreams of starting a small community‑based cleaning service that offers employment to other local
    residents, especially fellow Spanish‑speaking workers, while maintaining flexible schedules that allow her to stay connected to family and community events.
