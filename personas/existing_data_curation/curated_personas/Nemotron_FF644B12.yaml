  career_goals: Andrew aims to advance within the Zanesville Police Department by earning a promotion to detective within the next three years, leveraging his investigative curiosity and practical policing
    skills. He plans to complete a bachelor's degree in criminal justice and obtain specialized certifications in crisis intervention, DUI enforcement, and advanced interview techniques. In the longer term,
    he aspires to become a sergeant and eventually a captain, where he can shape department policy, mentor younger officers, and lead community‑oriented initiatives that balance his competitive drive with
    a desire to improve public safety.
