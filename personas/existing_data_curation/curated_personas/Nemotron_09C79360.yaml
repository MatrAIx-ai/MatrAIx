  career_goals: Mark aspires to pursue a career that blends his love for structure, practical problem-solving, and helping others. He is interested in engineering—particularly civil or mechanical engineering—or
    computer science, where he can design and implement systematic solutions. He envisions himself eventually working as a project manager or software developer in a technology firm that values clear processes
    and teamwork. Long-term, he hopes to obtain a college degree in a STEM field, secure a stable, predictable professional path, and use his organizational strengths to lead collaborative projects.
