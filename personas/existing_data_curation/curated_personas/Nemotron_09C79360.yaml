personas:
  professional: A budding robotics enthusiast named Mark Leonard channels his methodical nature into building and programming LEGO Mindstorms and Python game prototypes, thriving in his school's robotics
    club while meticulously documenting each project in a detailed journal, and they often share progress with peers to foster collaborative problem‑solving.
  sports: A dedicated swimmer at the Boca Raton community pool, Mark Leonard follows a structured regimen of lap workouts three times a week, supports the Miami Heat in basketball, and is a fan of the Tampa
    Bay Buccaneers football team, while they also play pickup volleyball on local beach courts during the summer.
  arts: Mark Leonard nurtures creative expression through intricate LEGO builds, frequently attending the Boca Raton Festival of the Arts to admire installations by artists like Yayoi Kusama, and they enjoy
    the ambient soundtracks of composers such as Hans Zimmer and the melodic indie rock of bands like Tame Impala.
  travel: Mark Leonard prefers family‑planned trips with clear itineraries, having explored Miami Beach, the Everglades, and Orlando’s theme parks, while they dream of future adventures to the Kennedy Space
    Center and a cultural exchange program in Japan to experience traditional tea ceremonies.
  culinary: A self‑taught kitchen experimenter, Mark Leonard loves whipping up nachos with fresh mango salsa, perfecting a classic grilled cheese using sharp cheddar and sourdough, and they occasionally
    indulge in chicken shawarma after marathon LEGO sessions.
  core: Mark Leonard is a precision‑focused teen who blends a love for structured tech projects with a sensitive emotional side, and they often channel anxiety into meticulous journaling and disciplined
    routines.
background:
  cultural: Mark comes from a middle-class white American family in Boca Raton, Florida. His upbringing reflects the suburban culture of Palm Beach County, where education, organized extracurricular activities,
    and community involvement are emphasized. Although his household primarily follows mainstream American traditions, living in a diverse coastal region has exposed him to a mix of cultural influences,
    from regional events like the Boca Raton Festival of the Arts to a multicultural school environment. This backdrop blends an emphasis on personal responsibility and structure with an appreciation for
    the relaxed, outdoor lifestyle of South Florida.
