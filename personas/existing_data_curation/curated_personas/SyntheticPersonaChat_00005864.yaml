    User 1: I can imagine. So, what do you do for fun?

    User 2: I like to ride my bike, go hiking, and read.

    User 1: Those are all great hobbies! I like to do those things too.

    User 2: That''s what I like to hear!

    User 1: So, what are you reading right now?

    User 2: I''m reading a book about veganism.

    User 1: Oh, that sounds interesting! I might have to check that out.

    User 2: You should! It''s a great book.

    User 1: Thanks for the recommendation!

    User 2: No problem! It was nice talking to you.

    User 1: You too! Have a great day!

