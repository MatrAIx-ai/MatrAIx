  hobbies: '[''Community volleyball league'', ''Hip‑hop dance classes'', ''DIY furniture building'', ''Arduino electronics tinkering'', ''Car interior customization'', ''Listening to R&B and soul music'',
    ''Cooking Southern comfort food'', ''Journaling for stress relief'', ''Mindfulness breathing exercises'', ''Youth mentorship volunteering'']'
  career_goals: Yvonne aims to move from the shop floor to a supervisory role within the next three to five years, leveraging her technical aptitude and people‑skills to become a shift lead or production
    coordinator. She plans to earn a CNC programming certification and eventually a bachelor’s degree in manufacturing engineering to broaden her expertise in automation and additive manufacturing. Long‑term,
    she dreams of opening her own small‑scale custom fabrication shop that blends modern technology with the community‑focused values she grew up with, while also mentoring other young Black women entering
    the trades.
