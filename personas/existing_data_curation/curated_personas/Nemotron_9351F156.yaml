personas:
  professional: Yvonne Vaughans, a 24‑year‑old assembler and fabricator proficient in CNC milling, lathe operation, MIG/TIG welding, and PLC troubleshooting, channels their competitive curiosity into improvising
    practical solutions on the shop floor, while their relaxed, often disorganized planning style pushes them to seek supervisory roles where they can mentor peers.
  sports: Yvonne Vaughans fuels their competitive spirit by playing co‑ed volleyball with the Peachtree Community Center league in the spring and joining high‑energy hip‑hop dance classes year‑round, while
    cheering on the Atlanta Hawks, Falcons, and the regional women's semi‑pro volleyball squad as their go‑to sports teams.
  arts: Yvonne Vaughans channels their love for contemporary R&B and neo‑soul by curating playlists featuring H.E.R., SZA, Anderson .Paak, and Jorja Smith while honing hip‑hop moves inspired by the choreography
    of Misty Copeland and the energy of Beyoncé, and they frequently attend local art showcases and spoken‑word nights that celebrate community stories.
  travel: Yvonne Vaughans prefers spontaneous, budget‑friendly road trips that blend cultural immersion with hands‑on experiences— they’ve already explored New Orleans’ music scene and Washington, D.C.’s
    museums, and they dream of a DIY‑focused adventure in Japan’s Akihabara district and a maker‑community hike through Portland, Oregon.
  culinary: Yvonne Vaughans cooks Southern comfort meals with a confident, home‑chef flair— frequently whipping up crispy fried chicken, creamy collard greens seasoned with smoked paprika, and buttery cornbread
    while layering playlists of neo‑soul, and they love to experiment by adding unexpected ingredients like mango salsa to classic jambalaya.
  core: Yvonne Vaughans is a competitive, curiosity‑driven maker who thrives on group energy, fumbles with disorganized planning, and balances anxiety‑fueled worry with DIY projects, dance, and a love for
    Southern comfort food.
background:
  cultural: Yvonne is a Black woman raised in Brandon, Mississippi, whose upbringing reflects the rich traditions of the Southern African‑American community. Her family places a strong emphasis on church,
    communal gatherings, and storytelling, and she grew up celebrating Juneteenth, Nat King Cole’s music, and the flavors of Southern cuisine—collard greens, fried chicken, and sweet potato pie. While she
    attended a historically Black junior college for her associate’s degree, she also navigated a predominantly white manufacturing environment, which has sharpened her awareness of both cultural pride
    and the challenges faced by Black workers in the South. Her identity is grounded in resilience, community service, and a commitment to paving a path for future generations of Black tradespeople.
attributes:
  skills: '[''Technical drawing interpretation'', ''CNC machine operation'', ''MIG/TIG welding'', ''Manual assembly of mechanical components'', ''Quality inspection and documentation'', ''Basic PLC troubleshooting'',
