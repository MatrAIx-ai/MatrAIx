  career_goals: Pascual dreams of becoming a civil engineer who can design flood‑resilient infrastructure for Baytown and other Gulf Coast communities, inspired by the frequent storms he’s witnessed. He
    also hopes to earn a scholarship to a top Texas university, where he can merge his love for engineering with community service. Alongside his engineering ambition, he aspires to mentor younger students
    through robotics clubs and youth sports, using his organized nature to help others succeed. His long‑term goal is to give back to his Mexican‑American community by creating safe, sustainable public
    spaces and by supporting bilingual education initiatives.
