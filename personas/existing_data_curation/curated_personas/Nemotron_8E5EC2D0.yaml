personas:
  professional: Pascual Bantillo, a 13‑year‑old robotics enthusiast who also captains the midfield on his school soccer team and leads his Boy Scouts troop’s service initiatives, blends disciplined organization
    with curiosity to design, program, and troubleshoot simple machines while they foster collaborative problem‑solving among peers.
  sports: Pascual Bantillo thrives as a school soccer midfielder, training with the Bay Area youth club and cheering for the Houston Dynamo, while also embracing seasonal Boy Scouts hikes and weekend basketball
    pickup games, and they maintain a disciplined conditioning routine that includes pre‑match stretch drills and after‑school fitness challenges.
  arts: Pascual Bantillo nurtures his creative side by practicing guitar after school, drawing inspiration from folk ballads of his family’s homeland and contemporary pop icons like Billie Eilish, and regularly
    attends local art fairs where they admire vibrant murals, channeling this blend of tradition and modernity into occasional songwriting.
  travel: Pascual Bantillo enjoys family road trips to South Texas relatives and short visits to the historic missions along the Rio Grande, dreams of exploring the desert vistas of Big Bend National Park
    and the thrills of Orlando’s theme parks, and they prefer budget‑friendly itineraries that balance cultural immersion with the excitement of new attractions.
  culinary: Pascual Bantillo loves to help prepare tamales, enchiladas, and homemade salsa verde with his family, has a growing knack for mastering the perfect corn masa dough, enjoys seasoning dishes with
    chipotle and oregano, and they often reward themselves with churros and pizza after a long robotics session.
  core: Pascual Bantillo is a disciplined, slightly anxious 13‑year‑old who juggles robotics, soccer, and guitar practice while diligently balancing a structured allowance, family traditions, and late‑night
    gaming bursts, and they always keep a mental checklist of upcoming goals.
background:
  cultural: Pascual is a second‑generation Mexican‑American raised in Baytown, Texas. His household is bilingual, celebrating Mexican holidays such as Día de los Muertos and quinceañeras while also participating
    in local Texan community events. Family ties are strong; weekend gatherings often revolve around home‑cooked Mexican cuisine and storytelling. He attends a public middle school with a diverse student
    body, which reinforces his ability to navigate both Mexican cultural traditions and broader American social norms. The blend of Mexican heritage and Southern Texas influences shapes his values of hard
    work, community service, and pride in his cultural identity.
