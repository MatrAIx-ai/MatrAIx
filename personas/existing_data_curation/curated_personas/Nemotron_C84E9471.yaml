  hobbies: '[''Hiking in the Shenandoah foothills'', ''Cooking and baking Southern recipes'', ''Reading YA fiction and mysteries'', ''Journaling and sketching'', ''Church youth group volunteering'', ''Playing
    acoustic guitar'', ''Casual online gaming'']'
  career_goals: Diane aims to complete her GED within the next year and then pursue a vocational program that blends her love for helping others with her practical skills. She is interested in becoming
    a certified nursing assistant or a veterinary technician, seeing both paths as ways to provide care while working in structured, yet varied environments. Long‑term, she hopes to work in a community
    health clinic or an animal welfare organization in the Lynchburg area, where she can contribute to the well‑being of both people and pets. She also dreams of eventually opening a small pet‑care boutique
    that offers grooming, supplies, and educational workshops for local families.
