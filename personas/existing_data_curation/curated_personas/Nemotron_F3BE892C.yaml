personas:
  professional: Toby Diaz, a seasoned professor of modern American literature and cultural studies, leverages deep expertise in curriculum development, grant writing, and digital pedagogy to design interdisciplinary
    courses that merge classic poetry with environmental themes, while their calm resilience and balanced curiosity enable them to mentor graduate students confidently and navigate departmental leadership
    with assertive yet cooperative poise.
  sports: Toby Diaz enjoys low‑impact fitness, favoring sunrise walks along Far Rockaway beach, weekend tennis matches at the Queens Tennis Club, and cheering for the New York Mets in baseball season while
    keeping a casual membership in a local walking group that meets for early‑morning beach jogs.
  arts: Toby Diaz immerses themselves in the arts by devouring classic novels, attending intimate poetry readings, listening to Miles Davis and Debussy on vinyl, curating street photography inspired by
    Henri Cartier‑Bresson, and regularly visiting the Museum of Modern Art and the Whitney for contemporary exhibitions.
  travel: Toby Diaz prefers thoughtfully planned, low‑key trips that blend literary pilgrimage with culinary curiosity, having explored the historic streets of Florence, the ancient ruins of Crete, and
    the serene temples of Kyoto, while they dream of a future journey to Dublin to trace James Joyce's footsteps.
  culinary: Toby Diaz enjoys cooking Mediterranean meals at an intermediate skill level, often preparing moussaka with locally sourced eggplant, fragrant rosemary‑infused grilled branzino, and slow‑cooked
    chickpea stew seasoned with fresh basil and oregano harvested from their rooftop garden, while they savor occasional evenings dining out at a quiet Sicilian trattoria.
  core: Toby Diaz, a calm, solitudinal scholar with a penchant for sunrise beach walks, meticulous grant writing, and an occasional coffee‑shop splurge, balances a disciplined academic life with a delightfully
    stubborn habit of hoarding vintage poetry books.
background:
  cultural: Toby was raised in a middle‑class White family in the Northeastern United States, with ancestral roots in Irish and German immigrant communities. Living and working in Queens, New York, has
    exposed him to the borough’s rich cultural diversity, shaping an inclusive teaching philosophy that values both the American liberal‑arts tradition and the multicultural fabric of his community.
