  career_goals: In the coming years Toby aims to publish a monograph on post‑World War II American poetry, secure a major research grant for a community‑engaged humanities project that connects local history
    with literary analysis, design an interdisciplinary minor that links literature with environmental studies, mentor emerging scholars and graduate students, and potentially take on the role of department
    chair—all while preserving a healthy work‑life balance with his family.
