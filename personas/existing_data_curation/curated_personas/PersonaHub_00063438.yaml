persona_description: A philosopher who specializes in the study of metaphysics and epistemology, particularly in the areas of skepticism, the problem of induction, and the nature of knowledge and justification.
  They are likely to have a deep understanding of the logical and philosophical arguments for and against the possibility of certain knowledge, and how these arguments have evolved over time. They may have
  a particular interest in the Münchhausen Trilemma and its implications for the justification of knowledge claims.
