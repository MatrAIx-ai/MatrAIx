  career_goals: He aims to become a lead foreman at his current fabrication shop within the next two years, using his organizational strengths to streamline workflow and mentor younger apprentices. Long‑term,
    Alex hopes to launch a boutique metal‑art studio that creates custom sculptures and functional art pieces for local businesses and public spaces in Virginia Beach. He also plans to obtain a Certified
    Sheet Metal Fabricator credential and to attend evening courses in design software such as AutoCAD and SketchUp to integrate his imaginative concepts with precise technical drawings.
