  career_goals: William aspires to transition into a senior leadership role such as PMO Director or Vice President of Operations, where he can shape organizational strategy, drive digital transformation,
    and institutionalize best‑practice project governance. He aims to expand his expertise in enterprise‑wide portfolio management, develop scalable lean processes, and mentor the next generation of project
    managers. Over the next five years, William plans to earn a Master’s degree in Business Administration, deepen his knowledge of emerging technologies (AI‑enabled analytics, IoT integration), and lead
    multi‑site, cross‑industry initiatives that deliver measurable business value.
