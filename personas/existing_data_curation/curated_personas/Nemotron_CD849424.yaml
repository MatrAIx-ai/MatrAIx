personas:
  professional: Keyenna Clinton, a budding game developer and comic story‑writer, channels her methodical planning and love for collaboration into crafting Scratch games and illustrated short stories that
    she shares with friends and the school drama club.
  sports: Keyenna Clinton beams with energy on the soccer field for the Desert Trail U10 Girls team, drills her footwork after watching LA Galaxy matches on weekends, and balances her active lifestyle with
    weekly dance rehearsals and bike rides through nearby desert trails.
  arts: Keyenna Clinton pours her imagination into drawing comic heroes inspired by Marvel’s Spider‑Man while rehearsing skits from the school drama club, often humming the catchy tunes of Kidz Bop’s pop
    covers and borrowing story ideas from the mystery adventures of Nancy Drew.
  travel: Keyenna Clinton prefers meticulously planning weekend bike excursions along the local desert trails, yet dreams of visiting the Grand Canyon’s rim and the glittering lights of Disneyland Paris
    with her family during the summer holidays.
  culinary: Keyenna Clinton favors cheesy pepperoni pizza and homemade mac‑and‑cheese, often experimenting by adding sliced jalapeños for a kick, while mastering the art of chocolate‑chip cookie dough in
    the school kitchen and proudly serving fruit kebabs topped with honey drizzle at family gatherings.
  core: Keyenna Clinton is a curious, ultra‑organized 10‑year‑old who juggles comic‑book creation, soccer drills, and a meticulous allowance‑splitting system, yet can’t resist launching into marathon storytelling
    sessions that leave her friends both inspired and exhausted.
background:
  cultural: Keyenna is raised in a close‑knit African‑American family that cherishes storytelling, music, and community ties. Her parents keep traditions such as celebrating Juneteenth, Kwanzaa, and Black
    History Month with food, music, and family gatherings, and they attend a local Baptist church where she learns the value of service. Growing up in Henderson, she also benefits from the city’s diverse
    cultural events, library programs, and desert outdoor activities. These experiences blend her African‑American heritage with the broader Nevada community, giving her a strong sense of identity, pride
    in her cultural roots, and an appreciation for diversity.
