  hobbies: '[''reading mystery books'', ''creative writing'', ''illustrating comics'', ''soccer'', ''dance'', ''drama club'', ''Scratch coding'', ''LEGO building'', ''biking'', ''library volunteer'']'
  career_goals: She dreams of a future where she can combine her love for learning, her talent for organizing people, and her caring nature. Currently, she aspires to become a teacher or a pediatric healthcare
    professional, imagining herself leading classroom projects, mentoring younger students, and eventually caring for children's health. She also envisions participating in community outreach programs that
    bring science and health education to kids in her neighborhood.
