persona_description: A conservation biologist who specializes in the study of invasive species, particularly the impacts of non-native species like quagga mussels, Asian clams, and rusty crayfish on the
  Lake Champlain Basin. Her research interests include the biology, ecology, and management of invasive species, as well as the development of strategies to control and eradicate invasive species. She has
  worked extensively on the impacts of invasive species on native species, water quality, and biodiversity in the Lake Champlain Basin. She is also interested in the potential impacts of invasive species
  on the overall health of the Great Lakes ecosystem.
