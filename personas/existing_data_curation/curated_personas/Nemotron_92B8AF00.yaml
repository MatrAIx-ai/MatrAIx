personas:
  professional: Cynthia Purpura, an eleven‑year‑old budding illustrator and young world‑builder, blends a love of fantasy graphic novels with Minecraft architecture to craft whimsical sketches, while their
    relaxed, disorganized style lets creativity flow without the constraints of rigid deadlines.
  sports: Cynthia Purpura enjoys weekend hikes with the Little Duck River Trail Club, follows the Nashville Predators for hockey thrills, and reluctantly joins the community’s after‑school soccer league,
    preferring the freedom of wandering trails to regimented drills.
  arts: Cynthia Purpura fills a battered sketchbook with vibrant murals inspired by the Nashville Art Museum, riffs on the graphic novel "Amulet" by Kazu Kibuishi while crafting friendship bracelets in
    the library art club, and dreams of illustrating a fantasy world someday.
  travel: Cynthia Purpura embarks on spontaneous family road trips to the Nashville Art Museum and the Great Smoky Mountains, prefers loosely‑planned adventures that let them sketch roadside vistas, and
    daydreams about a future overseas trek to Kyoto to study traditional Japanese woodblock prints.
  culinary: Cynthia Purpura prefers bright, easy meals like cheese‑filled pizza slices and peanut‑butter‑jelly sandwiches, and when hiking, they snack on a homemade trail mix of almonds, dried apricots,
    and chocolate chips, while occasionally attempting to bake cookies with extra chocolate chips that often bake unevenly.
  core: Cynthia Purpura is an imaginative eleven‑year‑old who blends art, nature, and game design into a free‑spirit approach to life, balancing occasional disorganization with a deep‑seated kindness and
    curiosity.
background:
  cultural: Cynthia is raised in a white, middle-class family in Mount Juliet, a suburb of Nashville in Wilson County, Tennessee. The community blends traditional Southern hospitality with the nearby city's
    vibrant music and arts scene. Family gatherings often feature homemade meals, country-style barbecues, and stories about local heritage, while school events celebrate seasonal festivals such as the
    annual county fair. Church and community service are regular parts of life, reinforcing values of kindness, cooperation, and helping neighbors. Proximity to Nashville exposes Cynthia to a mix of country,
    folk, and contemporary music, and occasional field trips to museums and live performances broaden her cultural perspective, grounding her identity in both the comforts of small-town Southern life and
    a curiosity about broader artistic expressions.
