    bracelets'', ''Participating in school art and science clubs'']'
  career_goals: Cynthia envisions a future where she can blend her love of art, storytelling, and discovery. She aspires to become a children's-book illustrator or a graphic designer who transforms imaginative
    ideas into visual experiences. The prospect of creating interactive museum exhibits or educational video games also excites her, as these roles would let her share her curiosity with other kids. In
    the short term, she aims to strengthen her drawing techniques, expand her writing portfolio, and explore more advanced digital art tools, keeping her options open and allowing her to follow whichever
    creative path feels right as she grows.
