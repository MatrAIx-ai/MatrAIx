  career_goals: Although only four, Donald already talks about future roles that promise order, routine, and clear responsibilities. He loves watching firefighters and police officers on TV and says he
    wants "to be the best firefighter" because they follow a schedule and help people. He also mentions wanting to become a mail carrier or a school bus driver, jobs he imagines involve predictable routes
    and daily tasks. In the near term, he aims to be "the fastest at building block towers" and to earn a gold star for finishing his preschool tasks independently, indicating an early drive toward achievement
    and competence.
