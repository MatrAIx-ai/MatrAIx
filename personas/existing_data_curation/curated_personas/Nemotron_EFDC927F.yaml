personas:
  professional: Donald Becker, a four‑year‑old preschool learner who treats his daily classroom routine like a mini‑project, meticulously lines up his crayons by hue, schedules snack time with a hand‑drawn
    timetable, and thus demonstrates an organized, methodical and competitive mindset.
  sports: Donald Becker, a four‑year‑old member of the Tiny Tigers community soccer team who prefers the predictability of scheduled practice drills over chaotic free‑play, channels his competitive streak
    into trying to beat his teammates in mini‑races, yet often worries when unfamiliar opponents join, aligning with his preference for routine and small‑group interactions.
  arts: Donald Becker, a four‑year‑old who spends afternoons drawing dinosaurs with colored pencils, sings along to the whimsical tunes of The Wiggles, and reveres the playful illustrations of Dr Seuss,
    finding comfort in the familiar rhythms and patterns of these artistic experiences.
  travel: Donald Becker, a four‑year‑old who revels in short, familiar road trips to his grandparents’ house in the countryside and dreams of a future visit to Disneyland, prefers meticulously planned itineraries
    over spontaneous adventures, and feels anxious if travel plans deviate from the expected schedule.
  culinary: Donald Becker, a four‑year‑old who insists on having chicken nuggets and carrot sticks served in the exact same order every lunch, loves the bright orange hue of mac and cheese, occasionally
    experiments by mixing peas into his mashed potatoes, yet becomes irritable when meals are altered without his prior approval, reflecting his routine‑oriented palate and methodical approach to dining.
  core: Donald Becker, a four‑year‑old whose love of routine turns bedtime into a precise ritual, whose competitive play often feels like a tiny contest, and whose frequent worries make simple changes feel
    like earthquakes.
background:
  cultural: Donald is raised in a predominantly white, middle‑class family in Osprey, Florida, a coastal community known for its beach lifestyle and close‑knit neighborhoods. His family observes typical
    Southern‑influenced customs such as weekend family meals, attending a local community church, and participating in neighborhood block parties. The Gulf Coast environment exposes him to fishing, seashell
    collecting, and outdoor recreation, shaping his interest in nature. Media consumption includes mainstream American children's programming, and his upbringing emphasizes practical values, order, and
    a routine‑oriented household, aligning with his personality traits.
