persona_description: A healthcare professional who is interested in the implementation and improvement of telehealth services in New Zealand. This person is likely to have a background in healthcare, telehealth,
  or related fields and is interested in the benefits and challenges of telehealth in delivering healthcare services. They are likely to be familiar with the New Zealand Telehealth Resource Centre and the
  New Zealand Telehealth Forum, and are interested in exploring ways to improve the use of telehealth in New Zealand. They may also be interested in exploring the use of telehealth in rural and remote areas,
  and in improving the education and training of healthcare professionals in telehealth.
