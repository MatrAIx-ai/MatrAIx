  hobbies: '[ ''LEGO building'', ''Snap‑circuit electronics kits'', ''FIRST Lego League robotics club'', ''Soccer'', ''Basketball'', ''Chess'', ''Strategy video games (real‑time strategy)'', ''Reading science
    magazines'', ''Watching documentaries on space and technology'' ]'
  career_goals: Driven by his curiosity and practicality, Larry hopes to become a robotics engineer or software developer who creates functional, real‑world solutions. He aims to win a state‑level science
    competition by the time he reaches high school and dreams of joining a collegiate robotics team. His competitive streak also fuels ambitions to earn a varsity spot on his high school soccer team and
    perhaps play at the collegiate level. Ultimately, Larry wants a career that blends technical expertise with teamwork, allowing him to lead innovative projects while staying grounded in practical outcomes.
