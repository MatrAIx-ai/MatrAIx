personas:
  professional: An aspiring young robotics engineer, Larry Walker channels curiosity and practicality into leading the school's FIRST Lego League team, where they blend snap-circuit experiments with disciplined
    project planning while critiquing teammates' designs to keep the group competitive.
  sports: A high-energy team player, Larry Walker excels as a forward on the South Side Steelers youth soccer club and as a guard for the Milwaukee Junior Lakers basketball squad, cheers loudly for the
    Milwaukee Bucks, and spends Saturday afternoons at the local YMCA swimming pool to stay fit.
  arts: A creative technophile, Larry Walker builds intricate LEGO sculptures inspired by the works of architect Frank Gehry, binge-watches Marvel movies, draws pixel art of their favorite characters in
    Scratch, and fills free time with playlists from Imagine Dragons and the Milwaukee Symphony Orchestra's family concerts.
  travel: An adventure-curious explorer, Larry Walker has road-tripped to Chicago's Museum of Science and Industry, splashed through the water parks of Wisconsin Dells, dreams of attending a Space Camp
    in Alabama, and hopes to one day stand beneath the launch pad at Kennedy Space Center.
  culinary: A budding food enthusiast, Larry Walker relishes cheese curds, enjoys slicing bratwurst with mustard, can whip up a passable mac and cheese with extra cheddar, experiments with toppings on homemade
    nachos using jalapeños and salsa, and occasionally burns toast when distracted by electronics.
  core: Larry Walker is a sociable, competitively curious eleven-year-old who balances building LEGO robots with leading a youth sports team, saving allowance like a mini-investor, managing mild allergies,
    and dreaming of space while never quite mastering bedtime.
background:
  cultural: 'Larry was born and raised in a middle‑class family in Milwaukee’s south side. His household reflects typical Midwestern values: a focus on education, community involvement, and a strong work
    ethic. He celebrates common American holidays and enjoys local foods such as cheese curds and Milwaukee‑style bratwurst with his family. The city’s diverse cultural scene, including festivals and sports
    traditions, has exposed him to a variety of perspectives, though his immediate family’s cultural roots are primarily European‑American (German and Irish ancestry). He attends a public elementary school
    where he participates in extracurricular clubs, and his parents encourage both academic achievement and participation in community service.'
attributes:
  skills: '[ ''Hands‑on problem solving (building, tinkering)'', ''Basic programming (Scratch)'', ''Elementary mathematics (pre‑algebra)'', ''Task organization and time management'', ''Public speaking for
