personas:
  professional: Evelyn Ramos, a 25‑year‑old food‑service manager, thrives on routine by meticulously supervising staff schedules, inventory, and food‑safety compliance, using bilingual communication and
    cost‑control expertise, while their relaxed attitude toward obligations sometimes leads to occasional lapses in updating the weekly roster.
  sports: Evelyn Ramos stays active with early‑morning trail walks with their dog, follows the Dallas Cowboys and the regional soccer club Lone Star FC on game days, plays in a co‑ed softball league each
    summer, yet they often forgo the gym in favor of gardening.
  arts: Evelyn Ramos fills their kitchen with the sounds of Luis Miguel, Los Tigres del Norte, and Natalia Lafourcade while cooking, occasionally attends community theater productions of plays like 'A Streetcar
    Named Desire', and collects prints of Frida Kahlo and Diego Rivera to decorate their modest home.
  travel: Evelyn Ramos prefers low‑key road trips that blend culinary discovery and nature, having explored Oaxaca’s vibrant markets, the historic River Walk of San Antonio, and dreaming of a weekend in
    Antigua, Guatemala, though a modest budget keeps international travel occasional.
  culinary: Evelyn Ramos enjoys preparing authentic tamales, cochinita pibil, and chiles en nogada, relishing ingredients like masa harina, achiote paste, roasted tomatillos, and fresh epazote, and while
    their cooking skill ensures consistently flavorful meals for friends, they sometimes over‑salt dishes in pursuit of the perfect taste.
  core: Evelyn Ramos blends a love for routine‑driven cooking and community service with a habit of misplacing schedule notes and forgetting to file receipts, creating a charming yet occasionally chaotic
    rhythm to daily life.
background:
  cultural: Evelyn grew up in a bilingual Mexican‑American household in North Wilkesboro, NC. Her parents immigrated from Jalisco, and she was raised with deep respect for Mexican traditions such as Día
    de los Muertos, family‑centered meals featuring homemade tamales, and Catholic holiday celebrations. While embracing Southern hospitality and the local community's values, she maintains Spanish as the
    language of the home and actively preserves cultural practices by preparing authentic dishes for neighborhood events and sharing her heritage with friends. This blend of Mexican roots and Southern influences
    shapes her identity, fostering a strong sense of family, practicality, and harmony.
attributes:
  skills: '[''Food service operations management'',''Staff scheduling and supervision'',''Inventory control and ordering'',''Menu planning and recipe standardization'',''Customer service excellence'',''Bilingual
    communication (Spanish/English)'',''Cost analysis and budgeting'',''Food safety and sanitation compliance'',''Conflict resolution and team building'',''POS system proficiency'']'
  hobbies: '[''Cooking Mexican cuisine'',''Gardening'',''Morning dog walks'',''Reading non-fiction self-help books'',''Listening to regional Mexican music'',''Volunteering at community center'',''Attending
    small family gatherings'']'
  career_goals: Evelyn aims to deepen her expertise in hospitality management and, within the next five to seven years, transition from a single‑store food‑service manager to a regional manager overseeing
    multiple locations. She plans to earn her ServSafe certification and complete a bachelor's degree in Hospitality Management, emphasizing the development of consistent, high‑quality service standards
    across restaurants. Long‑term, she dreams of opening a family‑owned Mexican eatery that blends traditional flavors with the community’s Southern hospitality, providing a stable, routine‑driven environment
    for both staff and patrons.
