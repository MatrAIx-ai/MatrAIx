personas:
  professional: Patricia Gaud, a tiny entrepreneur, runs a plastic cup lemonade stand in the backyard, meticulously lining up the cups each morning yet occasionally abandoning the order for an impromptu
    splash of water, delighting in the attention of neighborhood kids, and they thrive on being the center of this miniature market.
  sports: Patricia Gaud, a budding fan of the Chicago Cubs who proudly wears their cap, regularly attends toddler gymnastics sessions at the Little Rockets Club, where they enjoy the structure of rhythmic
    routines but occasionally dart away to chase other children, embodying a love of both routine and spontaneous movement.
  arts: Patricia Gaud, an enthusiastic admirer of Disney’s animated classics, can often be found humming 'Let It Go' by Idina Menzel and drawing their own versions of Mickey Mouse, while also delighting
    in the colorful illustrations of Dr. Seuss’s 'The Cat in the Hat,' allowing the arts to shape their playtime narratives, and they often brighten the room with spontaneous songs.
  travel: Patricia Gaud, who delights in the predictable schedule of weekly visits to the local park but also brightens at impromptu family trips to the city aquarium, has a growing wish list that includes
    a stroller‑friendly stroll through the Eiffel Tower’s gardens in Paris, blending routine comfort with adventurous curiosity, and they often request a stuffed companion for reassurance on new journeys.
  culinary: Patricia Gaud, who adores buttery macaroni and cheese, dabs peanut butter on toast, craves sweet banana slices, and proudly makes a perfect mess when helping stir pancake batter with a wooden
    spoon, their culinary palate mixes comfort foods with a budding curiosity for new flavors, and they love sharing bites with friends during playdates.
  core: Patricia Gaud, a two‑year‑old whirlwind of routine‑loving yet impulsive energy, thrives on caregiver attention, fiercely guards their favorite toys, often worries over minor changes, and delights
    in turning everyday moments into dramatic performances, and they constantly seek the spotlight.
background:
  cultural: Patricia is a second‑generation Cuban‑American raised in LaBelle, Florida. Her household blends Spanish and English, and she participates in Cuban traditions such as cooking plantains, listening
    to salsa and son, celebrating Cuban holidays, and attending community festivals that emphasize music, dance, and family togetherness.
