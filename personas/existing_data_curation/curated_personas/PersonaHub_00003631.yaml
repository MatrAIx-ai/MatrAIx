persona_description: A Lead Analytical Chemist at a pharmaceutical company who specializes in the analysis of antacids for the Food and Drug Administration (FDA). The persona is skilled in conducting back
  titration tests and has experience with chemical reactions involving stomach acid and antacids. They have a deep understanding of the properties and strengths of various antacids and are able to accurately
  determine which antacids are the strongest and weakest on a per dose and per gram basis. The persona is also skilled in writing concise and clear reports, which is why they are tasked with writing a brief
  report for the FDA.
