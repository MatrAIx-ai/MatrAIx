persona_description: A researcher studying the prevalence and co-infection of Eimeria oocysts in village chickens in Ethiopia. The researcher is interested in understanding the factors that contribute to
  the prevalence of Eimeria oocysts in these chickens, such as the risk factors and environmental conditions, and how these factors may vary across different regions. The researcher is also interested in
  the impact of Eimeria oocysts on the productivity and health of chickens, and how the co-infection with multiple Eimeria spp. affects the clinical symptoms of the chickens. The researcher is likely to
  have expertise in virology, parasitology, and epidemiology, and may use statistical analysis and molecular techniques to study the prevalence and co-infection of Eimeria oocysts in village chickens.
