  hobbies: '[''Composing and performing music'', ''Attending live concerts in the DC area'', ''Reading contemporary literature and philosophy'', ''Hiking on Shenandoah trails'', ''Urban/nightscape photography'',
    ''Cooking and experimenting with recipes'', ''Journaling and personal planning'', ''Strategy board games'', ''Volunteering in community music education'', ''Listening to music production and business
    podcasts'']'
  career_goals: Larry aims to establish himself as a respected indie singer‑songwriter in the Mid‑Atlantic music scene within the next three years. He plans to release a professionally recorded EP, achieve
    at least 20,000 streams across platforms, and secure a regional tour covering major venues in Washington, D.C., Baltimore, and Richmond. He wants to win the annual DC Battle of the Bands, leverage his
    production skills to produce tracks for fellow artists, and eventually open a modest recording studio that doubles as a community space for music education. He also hopes to diversify his income by
    offering private lessons and composing scores for local documentaries.
