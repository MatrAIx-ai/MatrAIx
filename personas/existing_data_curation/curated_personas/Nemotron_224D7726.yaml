personas:
  professional: Larry Lacroix, a 25‑year‑old indie singer‑songwriter, blends disciplined studio workflows with systematic booking management and meticulous lyrical craftsmanship, allowing them to efficiently
    produce an EP while planning a Mid‑Atlantic tour and laying the groundwork for a community‑focused recording studio.
  sports: Larry Lacroix, a 25‑year‑old outdoor enthusiast, spends Saturdays hiking Shenandoah trails with a local climbing club, follows the Washington Capitals and DC United for their competitive spirit,
    and incorporates quick bodyweight circuits at home to maintain stamina without disrupting their structured rehearsal schedule.
  arts: Larry Lacroix, a 25‑year‑old creative, captures urban nightscapes inspired by Henri Cartier‑Bresson, draws lyrical inspiration from Sufjan Stevens and the poetic storytelling of Joan Didion, and
    attends local art openings featuring emerging visual artists, intertwining these influences into his songwriting.
  travel: Larry Lacroix, a 25‑year‑old itinerant musician, plans trips like a meticulously organized spreadsheet, favoring budget‑friendly music festivals in Austin and Nashville while dreaming of a week‑long
    songwriting retreat in Dublin, and balances travel with the financial realities of funding an EP.
  culinary: Larry Lacroix, a 25‑year‑old home‑cook, enjoys experimenting with dishes like mushroom risotto seasoned with fresh thyme and Parmesan, perfecting kimchi for a tangy side, and perfecting pour‑over
    coffee using single‑origin beans, though they often forget to pre‑heat the oven until the timer rings.
  core: Larry Lacroix, a 25‑year‑old indie artist, balances relentless schedule‑driven productivity with nightly journal entries and a stubborn habit of double‑checking streaming stats at 2 a.m., making
    them both meticulously organized and creatively restless.
background:
  cultural: Larry grew up in a middle‑class family in Arlington, Virginia, immersed in the diverse cultural fabric of the Washington, D.C. metropolitan area. His surname reflects French‑Canadian ancestry,
    and he maintains a modest connection to that heritage through an appreciation of French chanson and occasional language study. His parents emphasized education and civic responsibility, exposing him
    to both local theater productions and the vibrant DC live‑music scene. This blend of American suburban upbringing and European roots, combined with the multicultural influences of the region, informs
    his inclusive yet structured artistic perspective.
