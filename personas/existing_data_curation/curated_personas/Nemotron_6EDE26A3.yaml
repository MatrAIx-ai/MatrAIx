personas:
  professional: David Hills is an aspiring university educator who blends meticulous lesson planning, Canvas and Moodle expertise, and a calm, empathetic classroom presence to foster curiosity while upholding
    the modest, cooperative values of their close‑knit community, and they aim to model both intellectual rigor and compassionate service.
  sports: David Hills competes in intramural basketball during the winter, rides with the Boise Ridges mountain‑bike club on summer weekends, hikes with the Idaho Trailblazers, and passionately follows
    the Boise State Broncos football team and the Idaho State Bengals basketball squad, and they consider each workout a chance to strengthen both body and spirit.
  arts: David Hills finds creative release strumming acoustic renditions of John Denver and Mumford & Sons for church youth gatherings, captures Idaho’s rugged vistas through photography inspired by Ansel Adams,
    and unwinds with sci‑fi novels by Isaac Asimov and psychology podcasts featuring Malcolm Gladwell, and they often share recordings with friends at community events.
  travel: David Hills prefers meticulously planned road trips that blend adventure and reflection, having hiked the Snake River Canyon, camped in Yellowstone, and dreaming of pilgrimage‑like visits to Kyoto’s
    temples and New Zealand’s Milford Sound, and they map each itinerary with careful attention to both scenic routes and meaningful stops.
  culinary: David Hills, an enthusiastic home chef, frequently cooks bison stew with Idaho potatoes, grilled trout seasoned with lemon and dill, experiments with homemade kimchi, yet occasionally orders
    late‑night pizza after marathon study sessions, and they relish the chance to test new flavor combinations on family gatherings.
  core: David Hills balances a diligent, faith‑rooted work ethic with restless curiosity, channeling anxiety into meticulous planning while indulging in occasional impulsive culinary experiments, and they
    constantly seek ways to turn self‑doubt into purposeful action.
background:
  cultural: 'David grew up in a predominantly white, rural community in Idaho within a family that values self‑reliance, service, and religious faith—his upbringing is rooted in the Church of Jesus Christ
    of Latter‑Day Saints. The local culture emphasized modesty, hard work, and close‑knit community ties, while the university environment introduced him to broader academic perspectives. This blend of
    conservative, faith‑centered values and exposure to diverse ideas informs his teaching philosophy: he prioritizes cooperation, respect, and moral responsibility while encouraging curiosity and evidence‑based
    inquiry. Seasonal traditions, outdoor recreation, and church‑based service remain central to his identity.'
attributes:
  skills: '[''Instructional Design'', ''Lesson Planning'', ''Classroom Management'', ''Public Speaking'', ''Group Facilitation'', ''Academic Advising'', ''Curriculum Development'', ''Assessment Design'',
    ''Learning Management Systems (Canvas, Moodle)'', ''Statistical Analysis (SPSS, R)'', ''Research Methods'', ''Academic Writing'', ''Time Management'', ''Organizational Skills'', ''Empathy'', ''Conflict
    Resolution'', ''Peer Counseling'', ''Mental Health First Aid'', ''Event Coordination'']'
  hobbies: '[''Intramural Basketball'', ''Hiking'', ''Mountain Biking'', ''Acoustic Guitar'', ''Church Youth Volunteering'', ''Board Game Nights'', ''Science Fiction Reading'', ''Psychology Podcasts'',
    ''Cooking'', ''Travel'', ''Photography'']'
  career_goals: David aims to complete his bachelor’s degree in Education within the next year and pursue a master’s in Curriculum and Instruction. He envisions securing a full‑time, tenure‑track faculty
    position at a university where he can blend his curiosity for new teaching methodologies with practical classroom application. Long‑term, he hopes to lead curriculum innovation initiatives, publish
    research on student mental health and engagement, and potentially serve as a department chair. Concurrently, he is committed to developing personal resilience strategies—such as mindfulness practice
    and counseling—to better manage his own anxiety and model healthy coping for his students.
