  career_goals: Although retired, Joan aims to deepen her involvement in community cultural life. She plans to lead a weekly seniors' art appreciation group at the local library, develop a community garden
    in collaboration with the town, and compile an oral‑history project documenting the stories of longtime residents of Itasca County. She also hopes to publish a memoir of her family's generational experiences
    and to mentor younger volunteers in event coordination. Maintaining her health and independence remains a personal priority.
