persona_description: A chemist who specializes in the development and application of new analytical methods for detecting and preventing fake pharmaceuticals. He has expertise in the use of DESI-MS for
  Tamiflu screening and is passionate about finding innovative solutions to the problem of fake drugs. He is aware of the global trade in counterfeit goods and is committed to fighting the presence of fakes
  through legal and regulatory measures, as well as through public awareness campaigns. He remains optimistic about the possibility of shutting down the traffic of fake Tamiflu, but acknowledges that it
  will require new tools and approaches.
