  career_goals: Kenneth aims to move into a senior regional operations role where he can shape strategic initiatives across multiple facilities, leveraging his flexibility and innovative mindset. In the
    longer term, he plans to launch an independent consulting practice that helps small‑to‑mid‑size manufacturers streamline operations while incorporating design‑thinking principles inspired by his love
    of art. He also aspires to mentor emerging managers, building a legacy of pragmatic leadership that balances efficiency with creative thinking. Financial independence and the ability to fund community
    art projects in Ramona are central to his ambition.
