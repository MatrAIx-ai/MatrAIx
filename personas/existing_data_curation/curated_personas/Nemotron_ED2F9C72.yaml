  career_goals: At 50, Ley aims to pivot from routine corporate auditing to establishing her own boutique consulting practice focused on forensic accounting for small‑business owners and nonprofit arts
    organizations. She aspires to become a recognized speaker on integrating technology and creativity in financial reporting, and hopes to teach part‑time at a community college to mentor the next generation
    of women accountants. Ley also wants to champion sustainable accounting practices and develop a mentoring network for mid‑career professionals navigating career transitions after personal life changes
    like divorce.
