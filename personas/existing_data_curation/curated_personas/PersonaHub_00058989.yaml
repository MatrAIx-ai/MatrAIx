persona_description: A geologist or planetary scientist who is interested in the study of the geologic processes that shaped the surface of planets and moons, particularly those on Jupiter and its moons.
  They are familiar with laboratory models and physical analogs used in geology and planetary science research, and have a keen interest in understanding the mechanisms behind the formation of geologic
  structures like ridges and troughs on Ganymede. They are also interested in the development of hypotheses and the testing of theories related to landscape evolution on planetary bodies.
