  hobbies: '[''Basketball'', ''Music production (gospel/hip‑hop)'', ''Cooking soul food'', ''Video gaming'', ''Volunteer work at church youth group'', ''Car restoration'', ''Photography'', ''Community event
    organization'']'
  career_goals: Andrew plans to earn his GED within the next year and then enroll in a vocational apprenticeship program, focusing on becoming a certified electrician or HVAC technician. He envisions using
    his technical skills to open a small service shop that can provide jobs for other youth in Crewe, VA. Long‑term, he hopes to launch a community youth center that offers mentorship, after‑school tutoring,
    and recreational activities, leveraging his organized nature and love for group work. He also considers a future in the U.S. Navy to gain additional discipline and technical training before returning
    to his hometown to give back.
