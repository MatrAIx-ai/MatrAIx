personas:
  professional: William Kilbourne, a 16‑year‑old high‑school student with a knack for hands‑on repair, merges his love of automotive tinkering and simulation gaming into a clear career path, spending afternoons
    swapping brake pads on the family sedan and evenings mastering mechanic certifications on online courses, while dreaming of opening a classic‑car restoration shop and showing off his skills in local
    drag‑racing events.
  sports: William Kilbourne follows the local drag‑strip champion’s schedule and is a devoted fan of the NASCAR driver Kyle Busch, regularly practices at the River Valley Shooting Club’s target‑shooting
    program, fishes early mornings at Lake Clearwater, occasionally joins the high‑school cross‑country team for low‑key trail runs, and roots for the hometown baseball squad, the River City Runners.
  arts: William Kilbourne channels his solitary creativity into painting scale‑model kits of vintage aircraft while listening to classic rock legends like AC DC and progressive metal band Tool, binge‑watching
    automotive documentaries such as "The Car Collection" and attending occasional local art fairs that feature retro car illustrations by artists like Chris Burden.
  travel: William Kilbourne prefers low‑key road trips that blend his love of mechanics and scenery, having driven the historic Route 66 to a weekend at the Gilmore Car Museum in Michigan and dreaming of
    a future pilgrimage to the Porsche Museum in Stuttgart, while mostly relying on family‑planned camping outings at nearby state parks due to limited teen independence.
  culinary: William Kilbourne enjoys cooking simple yet satisfying meals like grilled trout with lemon‑dill sauce, a smoky brisket smoked on a backyard pellet grill, and homemade pizza topped with fresh
    mozzarella, basil, and pepperoni, while occasionally experimenting with DIY CNC‑crafted wooden cutting boards for his culinary projects.
  core: William Kilbourne is a meticulous teenage mechanic who pairs solitary gaming marathons with a relentless pursuit of classic‑car restoration, all while juggling anxiety‑driven perfectionism, a chaotic
    schedule, and a habit of spending the last of their allowance on the next high‑end gaming peripheral.
background:
  cultural: William comes from a white, Midwestern, working‑class background in Westland, Michigan, a suburb of Detroit historically tied to the auto industry. His family’s values emphasize self‑reliance,
    practicality, and routine, reflecting broader regional cultural norms of modesty, hard work, and community loyalty. The local community is predominantly Protestant (with a mix of Catholic influences)
    and celebrates seasonal events such as county fairs and local automotive shows, which have shaped his interest in cars and hands‑on trades. Growing up in this environment, William internalized a traditional
    outlook that favors concrete skills and familiar routines over abstract ideas.
attributes:
  skills: '["Automotive maintenance (oil changes, brake replacement)", "Basic mechanical troubleshooting", "Computer hardware assembly", "Fundamental Python scripting", "Strategic video gaming", "Scale
    model kit construction", "Basic woodworking"]'
  hobbies: '["Strategic and simulation video gaming", "Scale model kit building", "Automotive tinkering (car and motorcycle maintenance)", "Fishing", "Hiking", "Target shooting at local range", "Reading
    practical manuals (auto repair, DIY, programming)"]'
  career_goals: William aims to turn his practical abilities into a stable career in the automotive trade. He plans to earn an Automotive Service Technician certification at a local community college and
    secure a position as a mechanic in a routine‑driven garage where he can apply his hands‑on skills. Over the long term he hopes to open a small independent repair shop that specializes in classic‑car
    restoration, allowing him to combine his mechanical expertise with his love for detailed, solitary projects. He also dreams of achieving recognition as a top competitor in local drag‑racing events,
    and quietly builds a modest side income by streaming his solo gaming sessions.
