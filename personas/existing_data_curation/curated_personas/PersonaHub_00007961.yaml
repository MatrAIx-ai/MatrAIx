persona_description: A person who is interested in understanding and analyzing the social structures and systems that divide and organize society. They may be a sociologist, political scientist, or someone
  who is passionate about social justice issues. They are likely to be familiar with concepts such as social stratification, inequality, hierarchy, power, and purpose, and may have an interest in the ways
  in which these concepts are used to explain and critique social systems. They may also be interested in the ways in which social stratification is created and maintained through various means such as
  age, sex/gender, race/ethnicity, SES, sexual orientation, and physical ability.
