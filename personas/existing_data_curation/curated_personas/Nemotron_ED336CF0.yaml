  career_goals: Marian aspires to pursue a formal education in museum studies or curatorial practice at a community college, aiming to combine her love for art, history, and organization into a career as
    an exhibit curator or museum educator. In the short term, she plans to earn a certification in project management and secure a part-time role assisting the Boise Art Museum's education department. Long‑term,
    she envisions establishing a community‑focused arts space in Eagle that offers workshops, rotating exhibits, and a platform for emerging local artists, while also maintaining a sustainable freelance
    design practice.
