personas:
  professional: Marian Carlson is a budding museum studies enthusiast who leverages their meticulous project management skills, graphic design expertise, and love for art history to curate community exhibits
    and produce polished promotional materials, all while they maintain a disciplined workflow that reflects their high standards and occasional reliance on exhaustive checklists.
  sports: Marian Carlson enjoys moderate hikes on the Boise River Trail and summers spent climbing at Creak85, follows the Boise State Broncos football team and the Portland Trail Blazers NBA squad, and
    they regularly join a local board‑game‑brunch club that doubles as a light‑fitness meet‑up, providing a balanced fitness routine that suits their solitary yet community‑oriented nature.
  arts: Marian Carlson expresses herself through watercolor landscapes inspired by Claude Monet and digital illustrations echoing the bold colors of Yayoi Kusama, curates a personal collection of Ansel Adams
    photographs, devours contemporary fiction by Sally Rooney and poetry from Rupi Kaur, and they frequently visit Boise’s Basque Block cultural events, allowing artistic theory from John Berger to shape
    both their blog and their community‑oriented curatorial vision.
  travel: Marian Carlson plans trips with meticulous itineraries, favoring nature‑focused getaways such as a weekend in Sun Valley, a photography expedition to Yellowstone, and a dream cultural tour of
    Kyoto’s temples and Paris’s Louvre, balancing modest travel budgets with a desire for immersive art experiences, and they occasionally postpone trips due to work‑related stress.
  culinary: Marian Carlson cooks at a competent level, favoring farm‑to‑table dishes like roasted beet and goat‑cheese salad, pan‑seared trout with lemon‑dill butter, and occasional experimental meals such
    as miso‑ramen with wild mushrooms, and they also indulge in specialty coffee while savoring Idaho‑grown potatoes in classic finger steak style.
  core: Marian Carlson is a detail‑driven, nature‑loving art enthusiast whose disciplined planner’s mind coexists with a habit of over‑thinking, a journal‑filled habit, and a penchant for solitary creativity
    punctuated by intimate gatherings, and they constantly balance ambition with anxiety.
background:
  cultural: Marian grew up in the modest, close‑knit community of Eagle, Idaho, within a predominantly white, middle‑class environment where self‑reliance and community service are valued. Her family’s
    roots trace back to German‑Scandinavian ancestors who settled in the Pacific Northwest, instilling a respect for nature, practicality, and a quiet work ethic. While she embraces these regional traditions—such
    as seasonal outdoor activities and participation in local volunteer groups—she also actively seeks out diverse artistic influences through online galleries, contemporary literature, and occasional trips
    to Boise’s cultural institutions, blending her heritage with a broader, modern perspective.
