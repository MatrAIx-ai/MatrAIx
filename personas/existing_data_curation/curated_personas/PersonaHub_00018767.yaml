persona_description: A security professional who specializes in network security and has expertise in remote access protocols, encryption, and network management. They are familiar with the vulnerabilities
  and security issues of common remote access protocols and are interested in developing solutions to mitigate these issues. They are looking for a solution that allows them to securely forward traffic
  between multiple peers on a network, without compromising the security of their network or the privacy of their users. They are also interested in solutions that allow for the creation of a network of
  trusted devices and users who can see each other as if they are in the same local network, and that can emulate an Ethernet LAN.
