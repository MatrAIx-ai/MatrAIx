persona_description: A landscape architect who specializes in the design and management of water management systems, especially in the context of river restoration and urban water management. They are skilled
  in identifying and selecting appropriate plant species for different water levels and conditions, taking into account factors such as soil type, drainage, compaction, and nutrient retention. They are
  also knowledgeable about the importance of plant height and the value of plants to wildlife, and are aware of the potential impact of shade on agricultural production. They are passionate about the use
  of native species and sustainable practices in their work, and are committed to creating healthy, biodiverse ecosystems through their projects.
