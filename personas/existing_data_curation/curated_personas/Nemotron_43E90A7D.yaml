  career_goals: Although retired from formal employment, Erin aims to continue contributing to her community by preserving and sharing the cultural and educational heritage of Vermilion Parish. She plans
    to mentor local high‑school teachers, develop a small scholarship for students pursuing education degrees, author a memoir and a local history booklet, and lead a genealogy workshop series at the Abbeville
    library. She also hopes to maintain her intellectual vitality by learning new historical research methods and collaborating with a university’s oral‑history project.
