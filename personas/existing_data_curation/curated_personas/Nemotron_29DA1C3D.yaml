  hobbies: '["Salsa and cumbia dancing", "Cooking Salvadoran cuisine", "Hiking in Columbia River Gorge", "Community gardening", "Reading science-fiction", "Attending workshops and lectures", "Volunteer
    tutoring in STEM", "Participating in cultural festivals", "Improvisational theater", "Urban clean-up projects"]'
  career_goals: Luz hopes to re‑enter the professional world on her own terms, aiming for part‑time or project‑based roles that blend her technical expertise with her passion for community building. She
    would like to volunteer as a STEM mentor for local high‑school students, especially those from immigrant families, and eventually launch a community workshop that teaches basic data literacy and coding
    in both English and Spanish. A long‑term ambition is to open a small café that doubles as a cultural hub where she can share Salvadoran cuisine and host educational events. Throughout, she seeks a balance
    that allows her to stay close to family, maintain flexibility, and keep exploring new ideas.
