personas:
  professional: Luz Ordonez is a data analyst and research specialist with advanced proficiency in Python, R, and statistical modeling, who leverages bilingual communication and community‑outreach experience
    to turn complex datasets into accessible workshops, balancing a curious, practical mindset with a relaxed, often improvised workflow.
  sports: Luz Ordonez stays active by dancing salsa and cumbia at local gatherings, hiking the Pacific Northwest’s forest trails with the Seattle Hiking Club, and cheering on the Seattle Seahawks, Seattle
    Mariners, and Portland Timbers, while occasionally joining community volleyball games at the neighborhood recreation center.
  arts: Luz Ordonez immerses herself in community theater nights, attends digital art workshops, enjoys the folk‑rock sounds of The Decemberists and the vibrant Latin rhythms of Carlos Vives, and finds
    inspiration in Frida Kahlo’s paintings, all of which shape her creative expression and social gatherings.
  travel: Luz Ordonez favors family‑friendly weekend getaways to the Oregon Coast, the Olympic Peninsula, and occasional trips to Vancouver, Canada, while dreaming of exploring Costa Rica’s rainforests
    and the Galápagos Islands, planning trips with a mix of spontaneous detours and travel‑reward credit card bookings to keep costs balanced with adventure.
  culinary: Luz Ordonez expertly prepares pupusas and tamales using corn masa, cheese, and seasoned pork, crafts fresh salsa with tomatillos, jalapeños, and cilantro, experiments with quinoa and plantain
    dishes, and enjoys sampling local farmers’ market produce, reflecting an intermediate cooking skill level and a love for both tradition and culinary innovation.
  core: Luz Ordonez blends data‑driven curiosity with a love for community, dancing her way through life while juggling a relaxed schedule, occasional overcommitment, and a habit of ending projects with
    sticky‑note reminders.
background:
  cultural: Luz was born in El Salvador and moved to the United States as a teenager, settling in Portland where a vibrant Salvadoran diaspora thrives. She grew up bilingual, celebrating traditions such
    as Semana Santa, Día de Los Muertos, and family gatherings centered around pupusas. While she embraces her heritage—through language, food, music, and community involvement—she also identifies with
    the progressive, environmentally conscious culture of the Pacific Northwest. This dual identity informs her worldview, blending collectivist family values with a strong commitment to social equity,
    sustainability, and cultural exchange.
attributes:
  skills: '["Data analysis (Python, R)", "Statistical modeling", "Scientific research design", "Technical writing", "Problem solving", "Project coordination", "Bilingual communication (Spanish/English)",
