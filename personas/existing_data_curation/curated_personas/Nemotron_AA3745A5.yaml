personas:
  professional: Men Miyata, an aspiring robotics hobbyist and budding game developer, blends curiosity-driven experimentation with practical problem‑solving, often building LEGO‑based programmable machines
    while collaborating with friends in online multiplayer coding challenges.
  sports: Men Miyata, a regular at the neighborhood basketball court and a member of the East Bay Skate Club, idolizes the Golden State Warriors and follows skateboarding pro Yuto Horigome, while balancing
    after‑school pickup games with weekly skate sessions at the local skate park.
  arts: Men Miyata, a manga aficionado who sketches shōnen heroes from My Hero Academia during study breaks and streams J‑Pop hits by Kenshi Yonezu alongside mainstream pop anthems from Taylor Swift, often
    humming the choruses while doodling.
  travel: Men Miyata, who spends weekends hiking the Contra Costa Regional Park and dreams of exploring the historic streets of Kyoto during a future school exchange, balances spontaneous local bike rides
    with a careful savings plan for an upcoming family trip to Disneyland.
  culinary: Men Miyata, a budding home chef who helps roll sushi with cucumber and avocado and simmer miso soup, often experiments by adding chili oil to their favorite instant ramen, and enjoys sweet snacks
    like Pocky and mochi after gaming marathons.
  core: Men Miyata, a 13‑year‑old blend of tech‑savvy gamer, aspiring robotics builder, and basketball‑court regular, navigates life with a flexible, curiosity‑driven mindset, even if their backpack is
    perpetually half‑packed and their room a touch chaotic.
background:
  cultural: Men is a Japanese‑American growing up in Brentwood, California. His household blends traditional Japanese customs—such as celebrating Obon, eating home‑cooked meals like sushi and ramen, and
    practicing basic Japanese language—with typical American suburban life. He participates in local cultural events at the Bay Area Japanese Cultural Center and attends a public middle school with a diverse
    student body, giving him a hybrid perspective that values both respect for heritage and the openness of Californian youth culture.
