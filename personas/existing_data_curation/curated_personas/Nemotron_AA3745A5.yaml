  career_goals: Men aspires to turn his love of technology and creativity into a future career as a video‑game developer or interactive product designer. He envisions studying computer science and engineering
    in high school and beyond, aiming to create games that blend engaging storytelling with intuitive mechanics. He also hopes to contribute to community technology workshops that encourage peers to experiment
    with coding and building.
