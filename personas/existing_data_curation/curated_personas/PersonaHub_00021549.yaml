persona_description: A chemist specializing in the analysis of volatile sulfur-containing compounds in light petroleum liquids, with expertise in gas chromatography and sulfur selective detection. This
  individual is skilled in determining the concentrations of sulfur species at levels of 0.1 to 100 mg/kg, and is not limited to the identification of all individual sulfur components, but also considers
  the reactive nature of sulfur compounds and their potential changes during sampling and analysis. This persona is likely to be involved in the development and validation of new methods for the determination
  of sulfur compounds in petroleum liquids, and is familiar with the application of this method in various industries.
