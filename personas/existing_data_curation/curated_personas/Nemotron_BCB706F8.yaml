    knowledge'', ''Personal caregiving and peer support for seniors'']'
  hobbies: '[''Gardening (citrus, ornamental, herbs)'', ''Traditional Colombian cooking'', ''Reading historical fiction and biographies'', ''Volunteer coordination at senior center'', ''Birdwatching on
    local nature trails'', ''Knitting and quilting'', ''Participating in Spanish‑language discussion groups'', ''Attending Colombian cultural festivals and dances'', ''Mindfulness meditation for stress
    reduction'']'
  career_goals: Although Jacqueline is retired from formal employment, she remains driven to contribute meaningfully to her community and to preserve her heritage. Her primary ambition is to expand the
    senior‑center’s cultural programming by establishing a monthly “Colombian Heritage” workshop where she can teach cooking, music, and dance to younger participants and fellow retirees. She also aims
    to become a mentor for new volunteers, sharing her systematic approach to planning and budgeting. On a personal level, she hopes to improve her stress‑management skills through mindfulness classes,
    and she plans to complete a beginner’s digital‑photography course so she can document neighborhood events and family gatherings. A long‑term dream is to make a pilgrimage to her hometown in Colombia
    to reconnect with relatives and to capture stories that she could later compile into a memoir bridging Colombian and Floridian life.
