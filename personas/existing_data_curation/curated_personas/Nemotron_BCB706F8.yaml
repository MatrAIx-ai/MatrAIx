personas:
  professional: Jacqueline Garcia, a retired community volunteer, leverages their bilingual fluency and methodical planning to orchestrate senior‑center events, craft workshops, and low‑budget cultural
    programming while mentoring new volunteers.
  sports: Jacqueline Garcia enjoys leisurely walks along the nearby wildlife trail for birdwatching, participates in a senior walking club, and avidly follows the Tampa Bay Rays baseball team and the Miami
    Dolphins football team from their patio.
  arts: Jacqueline Garcia immerses themselves in music from artists such as Shakira, Carlos Vives, and Frank Sinatra, delights in community dance festivals, reads historical fiction by Isabel Allende, and
    attends local theater productions starring Meryl Streep in touring performances.
  travel: Jacqueline Garcia has explored Savannah, Georgia, taken day trips to the Everglades, enjoys planning relaxed garden‑tour vacations, and dreams of a pilgrimage to their ancestral hometown in South
    America to record family stories for a future memoir.
  culinary: Jacqueline Garcia delights in preparing arepas, sancocho, and empanadas using fresh cilantro, oregano, and lemons harvested from their garden, blends citrus zest into sauces, and shares these
    staples at church potlucks, while occasionally indulging in sugary pastries as a treat.
  core: Jacqueline Garcia blends meticulous garden stewardship with heartfelt community storytelling, balancing a love for traditional cooking and a persistent worry that fuels their careful planning and
    occasional over‑scheduling.
background:
  cultural: Jacqueline was born in Medellín, Colombia, and moved to the United States in the early 1970s after marrying a fellow Colombian who later settled in Florida. Raised in a Catholic, family‑centered
    environment, she grew up celebrating Colombian holidays such as Independence Day, Día de la Raza, and the festive Carnaval de Barranquilla with music, dance, and communal meals. The values of hospitality,
    strong family bonds, and respect for elders remain central to her identity. After relocating to Lake Wales, Florida, she blended these traditions with Southern customs, participating in church activities,
    local fairs, and community gardening projects. She maintains fluency in Spanish, regularly converses with relatives in Colombia, and serves as a cultural liaison for the neighborhood’s growing Hispanic
    population, ensuring that Colombian customs are represented in local festivals and that new immigrants feel welcomed.
