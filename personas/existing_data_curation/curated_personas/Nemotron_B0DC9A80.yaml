  hobbies: '[''Woodworking'', ''Scale model train building'', ''Gardening'', ''Crossword puzzles'', ''Sudoku'', ''Reading technical journals'', ''Cooking Puerto Rican cuisine'', ''Salsa dancing'', ''Photography'',
    ''Volunteering at local STEM workshops'']'
  career_goals: In retirement, Tomas aims to channel his engineering background into community service and knowledge sharing. He plans to mentor aspiring engineers through local STEM outreach programs,
    volunteer on infrastructure improvement projects in York County, and document his professional experiences for a memoir that highlights practical problem‑solving. Additionally, he seeks to stay intellectually
    active by attending technical workshops and contributing to senior advisory boards for regional development initiatives.
