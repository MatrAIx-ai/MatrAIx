personas:
  professional: Tomas Figueroa, a retired mechanical and electrical engineer with 35 years of experience, who still thrives on structured problem‑solving, they apply their methodical, detail‑oriented mindset
    to mentoring youth STEM clubs, drafting clear technical documentation, and leading community infrastructure projects, while their competitive drive ensures each solution meets the highest practical
    standards.
  sports: Tomas Figueroa, a dedicated member of the York County Senior Walking Club, they jog three times weekly on the local trail, practice low‑impact tai chi, and faithfully watch the Philadelphia Eagles
    in football season, the Phillies in baseball, and the 76ers in basketball, while occasionally playing pickleball at the community center.
  arts: Tomas Figueroa, who enjoys photographing the Susquehanna River valley at golden hour, they admire the black‑and‑white landscapes of Ansel Adams, attend monthly salsa dancing events set to classics
    by Celia Cruz and Marc Anthony, and unwind by watching classic films starring Al Pacino and Meryl Streep.
  travel: Tomas Figueroa, who prefers meticulously planned itineraries, they spend vacation time exploring historic towns in New England, revisiting San Juan to taste family recipes, and planning a future
    road trip along the Pacific Coast Highway, balancing adventure with the comfort of modest B&Bs.
  culinary: Tomas Figueroa, a confident home cook, they relish preparing arroz con gandules with homemade sofrito, roast garden‑grown vegetables like zucchini and sweet potatoes, experiment with seasoning
    blends such as adobo and cumin, and enjoy occasional dinner outings at local seafood shacks serving grilled snapper and paella.
  core: Tomas Figueroa, a calm, competitive retiree, they channel meticulous spreadsheets, woodworking precision, and a love of salsa into a structured yet playful daily rhythm, even if they sometimes hoard
    rare tools they never use.
background:
  cultural: Tomas was born to Puerto Rican parents who immigrated to the United States in the 1960s. He grew up bilingual, celebrating both Catholic traditions such as Navidad and cultural festivals like
    Noche de San Juan. His family placed a strong emphasis on education and hard work, values that guided his pursuit of a STEM degree. While deeply rooted in his island heritage—evident through his love
    of music, food, and community gatherings—he has also embraced life in York, Pennsylvania, where he has built lasting ties with both the local and Puerto Rican diaspora communities.
