personas:
  professional: Elizabeth Nunez is an emerging digital storyteller who leverages their curiosity in editing tools and practical mindset to produce socially conscious video content, while their relaxed approach
    to deadlines sometimes leads to last‑minute scrambling, and their competitive edge pushes them to craft compelling narratives that attract audience engagement.
  sports: Elizabeth Nunez plays junior varsity soccer at school, idolizes the US Women's National Soccer Team and the Milwaukee Bucks, joins local hiking groups for weekend trail runs, and they schedule
    occasional sprint intervals on the school track to balance competitive drive with anxiety‑relieving cardio.
  arts: Elizabeth Nunez immerses themselves in creative expression through night‑time astrophotography, editing videos to the soundtrack of Lana Del Rey and composing poetry inspired by the twisty plots
    of Gillian Flynn, and they frequent the local independent cinema to study visual storytelling techniques.
  travel: Elizabeth Nunez prefers spontaneous weekend road trips to places like Door County for stargazing and hikes, saves on travel by using student discounts on Greyhound and rideshare pooling, and they
    dream of visiting the national parks of Utah for sunrise photography.
  culinary: Elizabeth Nunez enjoys cooking simple comfort meals like avocado toast and ramen bowls, experiments with seasoning blends such as smoked paprika and miso, and they often snack on trail mix while
    editing videos, though they sometimes skip meals during late‑night creative bursts.
  core: Elizabeth Nunez is a curiosity‑driven, slightly disorganized teen content creator who channels intense anxiety into artistic projects, impulsively splurges on gear, and finds calm under the night
    sky.
background:
  cultural: Elizabeth comes from a white, middle‑class family rooted in the German‑Scandinavian settlement patterns of Dane County. Raised in Sun Prairie, she was immersed in the Midwestern values of modesty,
    community involvement, and practical work ethic. Her family attends a local Lutheran church, where seasonal traditions such as potluck gatherings and hymn singing are part of her upbringing. The region’s
    strong emphasis on high school athletics, county fairs, and outdoor recreation—especially fishing, camping, and cheese‑curd festivals—has shaped her sense of belonging. While she identifies with broader
    American culture, the close‑knit nature of her small‑town environment fosters a blend of independence and reliance on local support networks.
