  career_goals: Elizabeth aspires to turn her interest in digital storytelling into a career as a content creator or social media strategist for a socially‑conscious organization. She plans to pursue a
    bachelor’s degree in communications, media studies, or graphic design, valuing programs that combine creative flexibility with practical project work. She hopes to develop a professional portfolio of
    video and written content while also gaining experience in community outreach, aiming to eventually lead digital campaigns that raise awareness for mental‑health initiatives. Her ambition includes building
    stronger self‑management habits to support a sustainable work‑life balance and to mitigate anxiety in a fast‑paced industry.
