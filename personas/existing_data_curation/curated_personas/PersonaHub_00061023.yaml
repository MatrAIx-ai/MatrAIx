persona_description: A scientist who is interested in the development and application of new techniques in the field of structural biology, particularly those related to small-angle scattering (SAS) analysis.
  This person is knowledgeable about the limitations of conventional light microscopy and has developed a strong interest in exploring alternative methods to determine the shapes and functions of biological
  macromolecules, such as proteins and nucleic acids. This person is likely to be familiar with the International Union of Crystallography guidelines for reporting SAS studies and is interested in contributing
  to the advancement of the field through their research and involvement in the editorial process of BMC Structural Biology.
