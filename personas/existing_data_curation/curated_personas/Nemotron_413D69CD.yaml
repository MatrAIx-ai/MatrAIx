  career_goals: Orville aims to first obtain his GED within the next year, then enroll in a community‑college associate program in graphic design. He aspires to build a robust freelance portfolio that blends
    digital illustration, photography, and interactive media, ultimately securing a junior designer position at a creative agency in the Tampa Bay or Miami area. In the longer term, he hopes to launch a
    community art hub in Fort Myers that offers workshops, collaborative mural projects, and a shared studio space for local artists, while also growing his personal brand on social media to showcase his
    work and inspire other young creatives.
