personas:
  professional: Orville Poe is a budding graphic designer and community event coordinator who blends digital illustration, photography, and interactive media into freelance projects while meticulously planning
    each client engagement and leveraging their strong public speaking to champion local art initiatives.
  sports: Orville Poe plays center forward in a neighborhood basketball league, roots for the Tampa Bay Buccaneers and the Miami Heat, and follows Inter Miami CF, using weekend pickup games to stay fit
    while cheering on the teams during the NFL and NBA seasons.
  arts: Orville Poe immerses in contemporary art, drawing inspiration from abstract painter Mark Rothko, street artist Banksy, and experimental filmmaker David Lynch, regularly attending gallery openings
    in Fort Myers, curating Instagram reels of their own mixed‑media sketches, and debating philosophy with friends over works by Slavoj Žižek and Haruki Murakami.
  travel: Orville Poe travels for both relaxation and inspiration, favoring spontaneous road trips to Siesta Key and the Florida Keys for beach sessions, planning occasional weekend getaways to New Orleans
    for its vibrant music scene, while budgeting to eventually explore Berlin’s street‑art districts and the galleries of New York City.
  culinary: Orville Poe enjoys cooking simple, social meals like shrimp tacos with fresh cilantro and lime, avocado‑toast brunches, and one‑pot garlic‑butter pasta, often improvising with seasonal local
    fish and sharing the process on social media, though they sometimes over‑salt dishes in their enthusiasm.
  core: Orville Poe is an imaginative, organized 24‑year‑old who juggles freelance design, community art projects, late‑night VR gaming, and spontaneous beach trips, all while battling occasional insomnia,
    a coffee habit, and impulse buys on art supplies.
background:
  cultural: Orville is a 24‑year‑old white American who grew up in the coastal suburbs of Fort Myers, Florida. The Gulf‑Coast environment, with its laid‑back beach lifestyle, tourism‑driven economy, and
    a mix of Southern hospitality and Hispanic influences, shaped his worldview. Raised in a middle‑class family that valued punctuality, self‑reliance, and community involvement, he was exposed to diverse
    cultural events such as multicultural festivals, local art fairs, and outdoor gatherings. Although his formal education ended before obtaining a high‑school diploma, he remains connected to the community
    through volunteer events, group meet‑ups, and a strong appreciation for artistic expression.
