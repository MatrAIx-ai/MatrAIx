  hobbies: '[''Painting'', ''Mexican folk dancing (Folklorico)'', ''Cooking Mexican cuisine'', ''Book club (world literature)'', ''Senior art workshops'', ''Volunteering at cultural center'', ''Herb gardening'',
    ''Crossword puzzles'', ''Museum visits'', ''Traveling to Mexico (periodically)'']'
  career_goals: Even in retirement, Maritza is driven to leave a lasting cultural legacy. She aims to curate a traveling exhibition of Mexican‑American art for schools in Delaware, mentor youth interested
    in the humanities, and complete a memoir that intertwines her personal journey with broader historical narratives. Additionally, she hopes to develop a digital archive of oral histories from older Mexican
    immigrants in Wilmington, ensuring their stories remain accessible for future generations.
