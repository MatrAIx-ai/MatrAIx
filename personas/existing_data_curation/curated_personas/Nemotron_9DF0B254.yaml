personas:
  professional: Paul Coker, an inquisitive one‑year‑old who constantly pulls apart stacking toys and reassembles them, shows early mechanical reasoning and hands‑on curiosity, and they embody the nascent
    talents of a future engineer.
  sports: Paul Coker, a bright‑eyed toddler who delights in the indoor soft‑play gym’s mini‑soccer net and who claps enthusiastically for the Chicago Cubs whenever a home run lights up the living‑room TV,
    shows an early affinity for energetic, group‑focused sports and they love the camaraderie of team cheering.
  arts: Paul Coker, a giggly infant who bounces to the lively tunes of The Wiggles, hums along with Sesame Street characters like Elmo, and enjoys the bright illustrations of Dr. Seuss books during bedtime
    storytime, finds artistic expression through music and color and they often mimic rhythms with a wooden rattle.
  travel: Paul Coker, a curious explorer who has already taken family road trips to Central Park’s playgrounds in New York and a magic‑filled weekend at Disney World, prefers short, stroller‑friendly journeys
    that blend sensory wonder with the comfort of familiar caregivers, and they relish the rhythmic hum of a car engine as a soothing backdrop to discovery.
  culinary: Paul Coker, a budding foodie who thrives on smooth avocado puree, mashed sweet potatoes seasoned with a pinch of cinnamon, and occasional banana mash, enjoys experimenting with finger foods
    as they learn texture and taste, and they often end up with a delightful mess of bright‑colored puree on their high chair.
  core: Paul Coker, a sociable, curious one‑year‑old who balances a love for hands‑on discovery with a relaxed, sometimes messy approach to routine, turns everyday moments into playful learning opportunities,
    even if it means leaving a trail of snack crumbs, and they constantly seek out the next tactile adventure.
background:
  cultural: Paul comes from a white, middle‑class American family in Denver, Colorado. He is raised in a culturally diverse city that values outdoor recreation, community gatherings, and celebration of
    traditional American holidays such as Thanksgiving and Fourth of July. His family embraces the local mountain lifestyle, often spending weekends hiking or at park events, and emphasizes kindness, cooperation,
    and respect for others.
