personas:
  professional: Eleanor Mcmillan leverages four decades of hands‑on wholesale sales leadership to craft data‑driven strategies, mentor ambitious women, and inject unconventional creativity into contract
    negotiations while keeping a keen eye on budget spreadsheets.
  sports: Eleanor Mcmillan enjoys weekly low‑impact tennis at the local community club, follows the Rockford IceHogs hockey team, participates in a senior bowling league, and treats long walks through her
    vegetable garden as both exercise and meditation.
  arts: Eleanor Mcmillan frequents the Rockford gallery scene, champions community theater productions that subvert classic tropes, collects prints by regional realist painters, and finds solace in listening
    to folk legends like Joan Baez while sketching garden flora.
  travel: Eleanor Mcmillan explores historic Midwestern sites such as the Henry Ford Museum, the Indiana Dunes, and St. Louis’s Gateway Arch, captures sunrise landscapes with her DSLR, and dreams of a pilgrimage
    to Colonial Williamsburg despite budgeting constraints.
  culinary: Eleanor Mcmillan delights in preparing farm‑to‑table dishes like rosemary‑infused roasted root vegetables, hearty chicken pot pie, and seasonal apple crumble, often experimenting with heirloom
    tomatoes from her garden while occasionally over‑salting soups in her enthusiasm.
  core: Eleanor Mcmillan blends strategic sales acumen with an artistic curiosity, mentors with a competitive edge, gardens for quiet reflection, travels to historic locales, and indulges in seasonal cooking,
    all while occasionally letting skepticism temper new ideas.
background:
  cultural: Eleanor was raised in Rockford, Illinois, within a family of European‑American roots—her grandparents emigrated from Germany and Ireland in the early 20th century. The Midwestern cultural fabric
    of hard work, community solidarity, and modest self‑reliance shaped her worldview. Growing up during the post‑war industrial boom, she witnessed the city’s manufacturing heritage and the evolution of
    labor unions, which instilled a respect for teamwork tempered by healthy competition. While she retains the region’s practical sensibilities, her lifelong curiosity has opened her to diverse artistic
    and intellectual currents, allowing her to blend traditional Midwestern values with a progressive, open‑minded outlook.
