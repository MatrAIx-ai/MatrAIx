  career_goals: Although nearing retirement, Eleanor aims to leave a lasting professional legacy by establishing a mentorship program for younger sales professionals, especially women entering the field
    later in life. She hopes to transition into a part‑time consulting role where she can advise small local manufacturers on modernizing their sales approaches. Additionally, she aspires to document her
    career insights in a series of workshops and a concise guidebook, merging her love of practical knowledge with her appreciation for storytelling and art.
