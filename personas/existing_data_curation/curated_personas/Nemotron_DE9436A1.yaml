  career_goals: Carlos aims to transition from his current clerk role into a logistics coordinator position within the next two years, leveraging his hands‑on experience to manage larger supply‑chain projects.
    He plans to complete a bachelor’s degree in supply chain management and earn industry certifications such as APICS CPIM and Certified Supply Chain Professional (CSCP). Long‑term, he dreams of opening
    a small third‑party logistics (3PL) firm that serves regional manufacturers, integrating technology‑driven solutions he discovers through his curiosity while maintaining the practical, customer‑focused
    service ethos he values.
