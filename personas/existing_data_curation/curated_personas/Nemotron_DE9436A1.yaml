personas:
  professional: Carlos Serranorivera is an inventory control professional who leverages hands‑on expertise with Manhattan and SAP EWM, sharp Excel analytics, and bilingual communication to streamline warehouse
    operations, troubleshoot bottlenecks on the fly, and propose incremental process improvements while maintaining calm composure under tight shipping deadlines.
  sports: Carlos Serranorivera plays midfield in a local community soccer league, spends weekends hiking the Blue Ridge Mountains, follows the Washington Commanders and Washington Capitals for professional
    sports, and maintains a flexible fitness routine that blends trail runs with occasional pick‑up basketball at the community center.
  arts: Carlos Serranorivera unwinds to a mixtape featuring Bad Bunny, Maná, and Appalachian folk legend Jean Ritchie, enjoys indie film marathons with titles like Moonrise Kingdom and The Florida Project,
    and occasionally strums a guitar inspired by Latin rock riffs, letting music and cinema shape their creative downtime.
  travel: Carlos Serranorivera favors low‑key road trips that combine spur‑of‑the‑moment hikes in the Blue Ridge with weekend escapes to Asheville and nurtures a long‑standing dream of trekking Patagonia’s
    Torres del Paine, balancing a modest travel budget with a love for spontaneous discovery.
  culinary: Carlos Serranorivera delights in cooking hearty baleadas filled with refried beans, queso fresco, and avocado, simmers sopa de caracol with coconut milk and plantains, and often experiments
    with fresh cilantro, lime, and hot peppers to elevate traditional flavors, impressing friends at potlucks with their solid home‑cook skill set.
  core: Carlos Serranorivera, a logistics‑savvy soccer enthusiast who smells fresh coffee on rainy evenings while gaming, balances a laid‑back approach to planning with unrelenting curiosity that drives
    process improvements, even if they occasionally forget to update their budgeting app or misplace shipment paperwork.
background:
  cultural: Carlos is the son of Honduran immigrants who settled in Virginia in the early 2000s. He grew up bilingual, celebrating Honduran holidays such as Fiesta de la Independencia and Semana Santa while
    also embracing American traditions like Thanksgiving. His Catholic upbringing instilled a sense of community service, reflected in his volunteer work. Living in Roanoke’s growing Hispanic neighborhood,
    he blends his Central American heritage with the Appalachian culture, drawing on both to inform his worldview, work ethic, and social connections.
