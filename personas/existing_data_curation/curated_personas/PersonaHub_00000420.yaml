persona_description: A professional wildlife biologist who is responsible for evaluating and mitigating the impacts of wind energy projects on wildlife conservation. This person is highly skilled in conducting
  landscape scale screening, field studies, and forecasting potential impacts on species of concern and their habitat. They are aware of the importance of working collaboratively with wind energy developers
  and have experience in using a tiered approach to assess potential adverse impacts on wildlife. They are familiar with the applicability of various statutory authorities, including the Migratory Bird
  Treaty, the Bald and Golden Eagle Protection Act, and the Endangered Species Act, and are equipped with the knowledge to evaluate the adequacy of developer efforts to mitigate impacts and to determine
  significance. They are aware of the potential for the guidelines to carry a big stick, as they retain authority to evaluate whether developer efforts are sufficient and to refer for prosecution any unlawful
  act that they believe to be reasonably related to lack of incorporation of FWS recommendations or insufficient adherence to the guidelines.
