personas:
  professional: Eduardo Martinez is a curious elementary school student who excels at collaborative group projects, applying his love for clear instructions to classroom assignments while thriving on the
    social energy of group play.
  sports: Eduardo Martinez plays for the Robbinsville Youth Soccer Club’s U‑8 team, idolizes the New York Red Bulls, enjoys watching the New York Yankees in summer, and mixes structured drills with spontaneous
    kick‑about games at the local park.
  arts: Eduardo Martinez loves drawing comic heroes like Spider‑Man, listens to Bad Bunny and J Balvin while dancing around the kitchen, and eagerly watches Disney animated movies, often imitating characters
    in school performances.
  travel: Eduardo Martinez has visited Quito to celebrate Carnaval with relatives, explored the Smithsonian museums in Washington, D.C., and dreams of snorkeling in the Galápagos Islands and riding roller
    coasters at Six Flags Great Adventure.
  culinary: Eduardo Martinez enjoys helping prepare empanadas de verde with cheese filling, mixing ceviche with fresh lime, and loves the comforting taste of arroz con menestra, while also favoring kid‑friendly
    pizza and mac & cheese; he’s adept at rolling dough and can whisk an egg for a quick omelet.
  core: Eduardo Martinez is a sociable, structure‑loving 7‑year‑old who balances disciplined soccer drills with free‑form LEGO creation, all while sprinkling family‑rooted traditions into his everyday adventures.
background:
  cultural: Eduardo grows up in a bilingual Ecuadorian household in Robbinsville, NJ. At home, Spanish is spoken daily, and family traditions such as celebrating Carnaval, Día de los Difuntos, and sharing
    Ecuadorian cuisine are central to his life. He enjoys dishes like empanadas de verde, ceviche, and arroz con menestra, and he participates in community events organized by the local Ecuadorian diaspora.
    His cultural heritage shapes his values of family closeness, hospitality, and a love for music and dance, which he carries into his everyday interactions.
