  career_goals: Parvati aims to ascend to a senior director or COO role within the next five years, spearheading digital transformation initiatives that embed AI‑powered predictive analytics into operational
    workflows. She seeks to build a reputation as a champion of operational excellence and sustainability, driving measurable improvements in cost, quality, and environmental impact. Pursuing an executive
    MBA is part of her plan to broaden strategic insight. Ultimately, she envisions launching a consulting practice that mentors emerging South Asian women leaders and helps organizations cultivate high‑performing,
    data‑centric cultures.
