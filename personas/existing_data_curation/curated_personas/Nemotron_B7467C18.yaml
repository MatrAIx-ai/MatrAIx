personas:
  professional: Parvati Butt blends meticulous data‑driven operations expertise with a competitive drive, applying Lean Six Sigma, SAP, and Oracle to craft AI‑powered predictive analytics that streamline
    supply chains, while leading cross‑functional teams with calm decisiveness and a skeptical eye toward vendor claims.
  sports: Parvati Butt hikes the Santa Monica Mountains with family on weekends, practices Vinyasa yoga three times a week at a downtown studio, competes in a co‑ed recreational volleyball league, and passionately
    follows the Los Angeles Lakers, cheering them each game night.
  arts: Parvati Butt fuels their creative side by attending Bollywood and contemporary dance classes, curating playlists that blend AR Rahman soundtracks with indie artists like Tame Impala, and regularly
    visiting the Getty Center to study modern sculptures, finding both inspiration and a social outlet in the arts community.
  travel: Parvati Butt prefers a blend of adventure and cultural immersion, planning meticulous road trips to Napa Valley vineyards and weekend hikes in Colorado, while also budgeting for annual trips to
    Tokyo’s tech expos and a dream vacation to Oaxaca’s culinary festivals, all balanced against family commitments.
  culinary: Parvati Butt’s culinary adventures range from mastering spice‑rich dishes such as turmeric‑infused chicken biryani and cumin‑spiced lentil dal for friends, to exploring LA’s eclectic food scene
    at spots like Grand Central Market, while they pride themselves on a modest home‑cooking skill set that mixes traditional methods with frequent experimentation.
  core: Parvati Butt is a fiercely organized, data‑driven leader who balances a competitive edge with a sociable, yoga‑fueled lifestyle, constantly seeking efficiency while indulging in flavorful cooking
    and weekend hikes.
background:
  cultural: Parvati was raised in a bilingual South Asian household that blended Indian Hindu and Punjabi Muslim traditions, speaking Hindi and Urdu at home. Her family emphasized education, hard work,
    and close-knit relationships, celebrating festivals such as Diwali, Holi, and Eid with communal meals and music. This multicultural upbringing instilled a strong sense of hospitality, respect for elders,
    and a drive for professional achievement. Living in West Hills, she actively participates in the local South Asian diaspora community, attending cultural events, supporting heritage organizations, and
    mentoring younger immigrants. Her heritage informs her values of perseverance, community service, and a balanced integration of tradition with contemporary American life.
