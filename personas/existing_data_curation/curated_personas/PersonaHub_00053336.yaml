persona_description: A professional engineer tasked with designing curves for highways to ensure safety and efficiency. The engineer must consider various factors such as the slope of the curve, the coefficient
  of static friction, the speed of the car, and the bank angle to determine the minimum radius of curvature and bank angle required for a car to safely negotiate the curve. The engineer may also need to
  take into account the mass of the car and the road surface conditions. The engineer's expertise lies in highway engineering, curve design, and road safety.
