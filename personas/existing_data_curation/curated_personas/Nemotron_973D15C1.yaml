  career_goals: Although retired, Gladys remains driven to contribute to her community. She aims to mentor younger volunteers at the Abingdon senior center, compile a memoir of local Appalachian life for
    the Washington County Historical Society, and help launch a quarterly oral-history podcast that records elders' stories. She also wishes to expand the town's community garden into a butterfly sanctuary,
    organize an inclusive arts-fair that highlights unconventional art forms, and learn simple digital tools so she can share her garden and craft tutorials online. Her overarching ambition is to foster
    harmony and cultural continuity across generations in her hometown.
