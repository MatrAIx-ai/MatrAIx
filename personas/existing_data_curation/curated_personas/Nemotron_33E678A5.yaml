    to indie/folk music'', ''nature photography'', ''journaling'']'
  career_goals: Bryan aims to finish high school and pursue a degree in visual arts or game design, ultimately working as a concept artist or illustrator for video games, animation, or graphic novels. He
    also hopes to incorporate his empathy and interest in mental well‑being by learning art‑therapy techniques, with the long‑term ambition of leading community art programs that help peers manage stress
    and anxiety. He envisions a career that merges his creative talents with a meaningful contribution to others' emotional health.
