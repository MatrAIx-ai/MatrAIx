personas:
  professional: Bryan Colson, a 15-year-old aspiring game developer, channels curiosity and disciplined organization into Scratch projects that blend indie comic storytelling with simple interactive mechanics,
    while quietly collaborating with a tight-knit circle of artistic friends.
  sports: Bryan Colson enjoys solitary hikes through the Great Smoky Mountains, capturing wildlife on their phone, follows the Tennessee Volunteers football team and the Nashville Predators hockey club,
    and joins a small weekend pickup soccer group at the local community park for light cardio.
  arts: Bryan Colson immerses themselves in drawing graphic novels like Saga and Blankets, sketches folk-inspired album covers for artists such as Bon Iver and Lucy Dacus, strums acoustic renditions of
    Bob Dylan on a battered guitar, and experiments with digital painting in Procreate, all of which shape a quietly expressive identity.
  travel: Bryan Colson prefers low-key adventure trips, having trekked the Appalachian Trail sections near their home, dreaming of hiking Yosemite’s Half Dome, and hoping to attend the San Diego Comic-Con
    next summer, while budgeting each trip around parental approvals and school schedule.
  culinary: Bryan Colson favors simple, wholesome meals like avocado toast topped with radish, homemade banana bread, and occasionally experiments with ramen broth, using a handheld mixer for pancake batter
    while relishing the occasional snack of trail-mix granola on hikes.
  core: Bryan Colson is a quietly curious 15-year-old artist who balances solitary sketching and mountain hikes with gentle community service, often over-thinking details yet thriving on creative discovery
    and modest routines.
background:
  cultural: Bryan grew up in Maryville, Tennessee, a small city nestled at the foothills of the Great Smoky Mountains. His family reflects a traditional Southern upbringing that values community, modesty,
    and a strong sense of hospitality. Local cultural influences include an appreciation for Appalachian folk music, storytelling, and hands‑on crafts like woodworking and quilting. Regular participation
    in church activities and community events has taught him the importance of cooperation and caring for others. At the same time, Bryan is exposed to broader American teen culture through school clubs,
    online art communities, and streaming platforms, blending regional traditions with contemporary artistic trends.
