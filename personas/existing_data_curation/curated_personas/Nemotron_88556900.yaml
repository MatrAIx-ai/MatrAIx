personas:
  professional: Damaris Reyes, a budding illustrator at the age of nine, channels a fierce curiosity and a competitive streak into their cartoon drawings, mastering watercolor techniques while also experimenting
    with digital art tools on their tablet, which reflects their organized‑yet‑flexible approach to creative projects.
  sports: Damaris Reyes darts across the soccer field for the neighborhood Bumblebees U10 team, idolizing the LAFC forward Carlos Vela and cheering for the Los Angeles Dodgers during summer baseball games,
    while also practicing salsa steps as a warm‑up routine to stay agile and channel their competitive energy.
  arts: Damaris Reyes immerses themselves in the world of cartoons, drawing inspiration from classic Disney animators like Glen Keane and contemporary YouTube creators such as Draw with Jazza, while their
    love for watercolor brings them to study the delicate palettes of artist Mary Blair.
  travel: Damaris Reyes prefers weekend adventures that blend nature and nostalgia, such as hiking the Redwood trails in California, visiting the interactive exhibits at the Exploratorium in San Francisco,
    and dreaming of a future trip to the rainforests of Costa Rica after watching a documentary on wildlife, all of which fuel their curiosity for new experiences.
  culinary: Damaris Reyes enjoys rolling up their sleeves in the kitchen to help prepare pupusas with fresh cheese and beans, mastering the perfect caramelized edge on banana fritters, and experimenting
    with avocado toast topped with cherry tomatoes and lime zest for breakfast.
  core: Damaris Reyes, a nine‑year‑old creative dynamo, balances a competitive spark with a love for collaborative art, soccer, and salsa, yet can be skeptical of strangers and occasionally forgets their
    inhaler during play.
background:
  cultural: Damaris is a second-generation Salvadoran growing up in Fresno, California. Her household embraces both Salvadoran and American traditions, speaking Spanish at home while attending school in
    English. She participates in cultural celebrations such as Las Posadas and Día de los Santos, and she enjoys traditional foods like pupusas and tamales. Her family places a strong emphasis on close-knit
    relationships, respect for elders, and the value of community, which shape her worldview and daily life.
