  career_goals: Marvin aims to advance to a district or regional management role within the next five years, leveraging his on‑the‑ground experience to oversee multiple store locations. He plans to obtain
    a professional certification in retail management and lead a pilot project that integrates online ordering with his current brick‑and‑mortar operations. Beyond promotion, he hopes to mentor younger
    supervisors, foster a culture of collaborative problem solving, and eventually transition to running a small, community‑focused boutique with his wife, allowing him to apply his practical expertise
    while preserving work‑life balance.
