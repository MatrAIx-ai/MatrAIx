persona_description: A historian who is interested in the study of historical matters, methods of historical research and presentation, and the narrative presentation of history based on critical examination
  and selection of material from primary and secondary sources. This individual is likely to be knowledgeable about the history of the field, the techniques and principles of historical research, and the
  narrative structure of historical accounts. They may have a particular interest in medieval historiographies or the study of group theory, particularly in the concepts and theorems related to subgroups
  and isomorphisms.
