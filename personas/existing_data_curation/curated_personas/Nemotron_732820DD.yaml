  hobbies: '[''Reading classic literature'', ''Gardening'', ''Birdwatching'', ''Sailing'', ''Photography'', ''Chess club'', ''Volunteering at the Ringling Museum'', ''Cooking seasonal meals'', ''Attending
    local theater productions'']'
  career_goals: Nicholas aims to develop a flagship interdisciplinary digital humanities program that bridges traditional scholarship with emerging technologies. He plans to secure a major research grant
    to support collaborative projects with the Ringling Museum and local cultural institutions. Over the next five years, he hopes to publish a monograph on the intersection of American literature and environmental
    thought, assume a department chair position to shape faculty development, and expand community‑engaged learning opportunities for Sarasota students.
