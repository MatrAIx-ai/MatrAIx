persona_description: A historian interested in the history and culture of Florida, particularly the Seminole Tribe of Florida, and their adaptation to the challenges brought by European explorers. This
  person is knowledgeable about the mound-building chiefdoms that once thrived in the Southeast and the extensive communication, cultural, and trade routes that existed centuries before the arrival of Europeans.
  This person is interested in the artifacts found in Florida, such as figurines, shell carvings, and earthen structures, which represented the religious and political power exerted throughout the Southeast.
  This person is interested in the impact of European exploration on the Seminoles and the changes they had to adapt to, as well as the significance of the artifacts found in Florida.
