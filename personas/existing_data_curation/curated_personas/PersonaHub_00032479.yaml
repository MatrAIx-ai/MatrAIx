persona_description: An astronomer and researcher who specializes in the study of the Kuiper Belt, particularly the discovery and classification of dwarf planets and objects in the region. She is part of
  the Outer Solar System Origins Survey team and has made significant contributions to the field through her research on RR245, a dwarf planet discovered by the Canada-France-Hawaii Telescope. Her work
  has helped establish precise orbits for a larger set of objects in the Kuiper Belt and shed light on the solar system's chaotic beginnings.
