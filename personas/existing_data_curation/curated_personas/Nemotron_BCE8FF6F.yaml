  career_goals: Walker dreams of growing up to be a community protector and educator—he frequently says he wants to be a firefighter who helps his neighbors and a teacher who shares knowledge with younger
    kids. He is eager to learn more about science, especially space and nature, and to develop leadership and teamwork skills now so he can one day guide others and keep his town safe.
