persona_description: A scientist who specializes in evolutionary biology and has conducted extensive research on the topic of speciation. They have written several articles and books on the subject and
  have a deep understanding of the limitations of evolutionary mechanisms in explaining speciation. They are aware of the lack of evidence for speciation by evolutionary mechanisms and have observed that
  no new species have emerged in the wild or in domestic breeding. They are skeptical of the idea that evolutionary mechanisms can explain speciation and have conducted numerous experiments and studies
  to test this theory.
