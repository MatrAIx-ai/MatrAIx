  career_goals: As he approaches retirement, Ho Tung aims to transition from daily clerical duties to a strategic advisory role, leveraging his extensive credit expertise to consult small businesses and
    community organizations on responsible lending practices. He aspires to obtain a Certified Credit Professional (CCP) designation, develop a financial-literacy workshop series for the Vietnamese community
    in Oxnard, and serve as a mentor for emerging credit analysts within his bank. Additionally, he seeks to champion the adoption of AI-driven credit scoring tools, positioning himself as a bridge between
    traditional risk assessment methods and emerging technologies.
