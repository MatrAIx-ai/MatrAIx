personas:
  professional: Carmel Kyles, a seasoned community organizer with expertise in budget management, volunteer coordination, and digital outreach, leverages their methodical planning, outgoing nature, and
    assertive problem‑solving to deliver well‑run neighborhood events while pursuing a transition into nonprofit project coordination.
  sports: Carmel Kyles stays active through weekly yoga and line‑dancing classes, supports the Philadelphia Eagles, 76ers, and Phillies, participates in a local senior walking club for morning strolls,
    and occasionally volunteers as a scorer for neighborhood softball games, blending structured fitness with community camaraderie.
  arts: Carmel Kyles, who sings gospel classics by Aretha Franklin with their church choir, immerses themselves in the literary works of Harper Lee and Maya Angelou, and regularly attends community theater
    productions featuring music by Lin‑Manuel Miranda, weaving these artistic experiences into their storytelling and event programming.
  travel: Carmel Kyles prefers meticulously planned weekend getaways to historic sites like Gettysburg and Williamsburg, balances these trips with occasional longer journeys to New Orleans for its music
    scene and to Edinburgh for its literary festivals, organizing itineraries in a spreadsheet and traveling with a small group of choir friends to keep costs manageable.
  culinary: Carmel Kyles, an enthusiastic home chef, blends Southern comfort staples such as fried chicken and collard greens with contemporary flavors like miso‑glazed carrots from their garden, frequently
    crafting dishes like shrimp‑and‑grits with a chipotle‑infused sauce, and takes pride in mastering the perfect flaky biscuit while swapping recipes on the community Facebook page.
  core: Carmel Kyles, a 54‑year‑old community catalyst, balances razor‑sharp planner precision with a love for spontaneous line‑dancing, often juggling spreadsheets while humming gospel hymns, yet habitually
    over‑books their calendar and forgets to water the garden during the busiest weeks.
background:
  cultural: Carmel’s cultural identity is rooted in the African‑American experience of the Mid‑Atlantic region. Raised by parents who migrated from the South during the Great Migration, she grew up immersed
    in the traditions of the Black church, community solidarity, and a strong emphasis on education and self‑improvement. Living in Broomall, a suburb of Philadelphia, she has been active in local Black
    cultural festivals, has a deep appreciation for soul‑food recipes passed down through generations, and values the history of civil‑rights activism that shaped her community. This heritage informs her
    commitment to service, her love of storytelling through music and literature, and her desire to preserve and share cultural practices with younger generations.
attributes:
  skills: '[''Event Planning'', ''Budget Management'', ''Volunteer Coordination'', ''Mentorship'', ''Basic Computer Literacy'', ''Public Speaking'', ''Conflict Mediation'', ''Culinary Skills'', ''Gardening'',
