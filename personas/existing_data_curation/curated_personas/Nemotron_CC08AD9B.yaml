  hobbies: '[''Volunteering at food pantry'', ''Church choir singing'', ''Quilting'', ''Gardening'', ''Cooking and recipe experimentation'', ''Reading African-American literature'', ''Book club participation'',
    ''Line dancing'', ''Yoga'']'
  career_goals: Carmel aims to translate her decades of community experience into a formal role within the nonprofit sector or to launch a home‑based catering and event‑service venture. She plans to complete
    a short certificate program in nonprofit management or community health, which will equip her to apply for part‑time project coordinator positions at local charities. Long‑term, she hopes to serve on
    the board of the Broomall Community Center, mentor at‑risk youth through after‑school programs, and eventually expand her catering services to include culturally inspired African‑American dishes for
    community festivals.
