  career_goals: James dreams of a career that blends his love of science with practical problem-solving for his community. He hopes to become an environmental engineer or a veterinary scientist, designing
    sustainable solutions for the farms and wildlife of the Central Valley. To achieve this, he plans to maintain top grades through high school, earn a scholarship for a STEM-focused university program,
    and eventually contribute to agricultural innovation or animal health research. His ambition is fueled by his desire to meet high standards, help others, and turn his curiosity into tangible, beneficial
    outcomes, even though he sometimes worries about the difficulty of these long-term goals.
