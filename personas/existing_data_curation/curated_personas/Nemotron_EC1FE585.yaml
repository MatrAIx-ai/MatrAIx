  hobbies: '["Sketching on tablet", "Digital photography", "Playing acoustic guitar", "Writing short science‑fiction stories", "Volunteering at youth center", "Organizing community art workshops", "Cycling
    on Texas nature trails", "Attending live music shows", "Playing strategy video games (e.g., Civilization)", "Reading science‑fiction novels"]'
  career_goals: Lawrence plans to complete his GED within the next year and enroll in a community college program focused on graphic design and digital media. He aims to combine his passion for art with
    his organizational talent by eventually establishing a community arts hub in Quinlan that offers workshops, exhibitions, and collaborative projects. In the longer term, he envisions working as a freelance
    multimedia designer while also serving as a youth mentor, using his calm resilience to guide peers toward creative and professional growth.
