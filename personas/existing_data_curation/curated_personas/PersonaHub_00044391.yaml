persona_description: A healthcare professional who values the intrinsic value of patients, but also recognizes the instrumental value of medical resources during exceptional circumstances, such as during
  a health emergency on a ship. This person is likely to have experience in allocating medical resources and is familiar with the concept of diachronic instrumental value, but also recognizes that this
  principle should not apply retrospectively. They are also aware of the importance of recognizing and rewarding those who have made relevant contributions to society, but this should not be used as a criterion
  for selecting who should have access to ICU beds, ventilators, etc. They are likely to have a strong ethical framework and recognize the moral obligation to save as many lives as possible during a health
  emergency.
