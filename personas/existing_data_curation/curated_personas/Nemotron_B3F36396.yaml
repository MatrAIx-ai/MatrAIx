personas:
  professional: Donald Baker leverages two decades of operational expertise, blending Lean Six Sigma process optimization with his humanities‑rooted communication skill to drive cost‑effective improvements
    while fostering a compassionate, collaborative team environment.
  sports: Donald Baker stays fit through weekly treks with the Cumberland Trail Hikers, occasional Sunday runs supporting his Tennessee Titans fan club, and a relaxed membership with the local tennis league,
    while cheering on the Nashville Predators during the hockey season.
  arts: Donald Baker finds creative renewal strumming acoustic renditions of Woody Guthrie and the Carter Family on his guitar, attending intimate performances by the hometown community theater’s productions
    of August Wilson’s plays, and immersing himself in the storytelling of David McCullough’s biographies.
  travel: Donald Baker favors low‑key, self‑planned travel that blends history and nature, having explored Colonial Williamsburg, the Blue Ridge Parkway’s overlooks, and a weekend culinary tour of Asheville’s
    farm‑to‑table scene, while nurturing a long‑standing wish to trek the Scottish Highlands and trace early American folk roots.
  culinary: Donald Baker enjoys farm‑to‑table cooking, regularly preparing heirloom tomato gazpacho, roasted beet and goat‑cheese salads, and skillet‑seared trout with fresh dill, complemented by his ritual
    of black coffee with a dash of cinnamon, and he occasionally dines at the local farm‑to‑table bistro for seasonal tasting menus.
  core: Donald Baker is a methodical yet compassionate operations specialist who balances Lean efficiency with heirloom gardening, folk guitar sessions, and quiet community service, often humming a Woody
    Guthrie chorus while perfecting a spreadsheet.
background:
  cultural: Donald grew up in a middle‑class family in the rural‑suburban region of Winchester, Tennessee. His upbringing was shaped by Southern Appalachian values of community, modesty, and self‑reliance.
    He was raised in a Methodist household, which instilled a sense of service and compassion that continues to guide his personal and professional life. Local traditions such as county fairs, outdoor festivals,
    and family‑style Southern cooking remain important to him. While he identifies as white, he respects the cultural diversity of the broader Tennessee community and actively seeks to bridge gaps through
    his collaborative work style.
attributes:
  skills: '["Process Optimization","Lean Six Sigma","Project Management","Data Analysis (Excel, SQL, Tableau)","Budget Management","Cross‑functional Communication","Conflict Mediation","Staff Training &
