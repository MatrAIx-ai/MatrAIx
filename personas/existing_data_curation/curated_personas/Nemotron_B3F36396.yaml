  hobbies: '["Reading historical biographies","Gardening (vegetables & heirloom plants)","Acoustic guitar (folk music)","Small‑group book club","Volunteer work at food pantry","Hiking in Cumberland Plateau"]'
  career_goals: Donald aims to transition into a senior operations leadership role within the next five years, where he can shape company‑wide efficiency initiatives and mentor a larger team. He is interested
    in obtaining a certification in Certified Professional in Business Operations (CPBO) to formalize his expertise. Long‑term, he envisions leading a community‑focused nonprofit or social enterprise that
    leverages his operational acumen to improve local services, reflecting his strong desire to help others and maintain harmony. He also hopes to influence corporate culture by championing compassionate
    leadership practices that balance productivity with employee well‑being.
