personas:
  professional: Dustin Alonzo, a budding robotics enthusiast and aspiring engineer, leverages a love of strategy games and model airplane kits to approach school projects with meticulous planning, collaborative
    problem‑solving, and an assertive yet compassionate leadership style that they demonstrate during group assignments.
  sports: Dustin Alonzo, a member of the Lakewood Junior Fishing Club and an avid weekend hiker, competes on the North Lakes High School cross‑country team in the fall, passionately follows the Minnesota
    Twins in baseball and Minnesota United FC in soccer, and often wears team caps on hikes for good luck, a habit they say boosts morale.
  arts: Dustin Alonzo, who constantly has headphones on, streams alternative rock bands like Arctic Monkeys, Tame Impala, and The Strokes while sketching futuristic aircraft designs in a personal journal,
    and occasionally participates in the Silverlake Community Arts Workshop to refine drawing technique, a creative outlet they cherish after long coding sessions.
  travel: Dustin Alonzo, who prefers family road trips planned on Google Maps with a mix of structured itineraries and spontaneous detours, has hiked Yosemite National Park’s trails, fished on Lake Tahoe,
    and dreams of a summer exchange program in Tokyo, Japan to explore its robotics museums and anime districts, adventures they document in a travel journal.
  culinary: Dustin Alonzo, whose cooking skill ranges from microwave mastery to novice skillet work, loves grilling salmon with lemon‑dill sauce from the fish they catch, tossing together spaghetti carbonara
    with pancetta, and rewarding themselves with a double‑cheese pepperoni pizza topped with fresh basil after a long gaming session.
  core: Dustin Alonzo balances a strategic, model‑building mind and a reflective journaling habit with bouts of anxiety, turning their love for structured projects into disciplined schoolwork while occasionally
    succumbing to impulsive video‑game spending.
background:
  cultural: Dustin grew up in Greenwood, Arkansas, a small town in Sebastian County known for its close‑knit community and Southern hospitality. His family is rooted in the local church and regularly attends
    town events such as high school football games, county fairs, and community service projects. The cultural environment emphasizes self‑reliance, modesty, and respect for tradition, while also exposing
    him to broader American pop culture through school and online media. These influences shape his values of responsibility, cooperation, and a pragmatic outlook on life, reflecting his white, middle‑class
    background that aligns with the predominant demographic of the region.
attributes:
  skills: '[''Organizational skills'', ''Basic automotive maintenance'', ''Computer troubleshooting'', ''Introductory Python programming'', ''Team collaboration'', ''Time management'']'
  hobbies: '[''Strategy video gaming'', ''Model airplane building'', ''Robotics club participation'', ''Fishing and hiking'', ''Listening to alternative rock music'', ''Journaling'']'
  career_goals: Dustin aims to graduate high school with a focus on vocational training, aspiring to become a certified automotive technician. He sees himself enrolling in a local community college or trade
    school apprenticeship that will allow him to work in a stable, hands‑on environment. He is also drawn to public safety and considers a future as a police officer, motivated by a desire to serve his
    community. In the short term, he wants to earn his high school diploma, obtain a journeyman certificate, and develop coping strategies to manage his anxiety so that he can sustain a reliable career
    path.
