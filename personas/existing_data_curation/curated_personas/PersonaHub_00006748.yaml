persona_description: A lifelong learner and researcher who values the importance of continuous learning and improvement in their skills, particularly in the area of information search and retrieval. They
  are interested in exploring the changing nature of work and education, and how they can equip their students with the skills and knowledge they need to be effective learners and searchers in an increasingly
  digital and information-driven world. They are also interested in the broader issues of meta-literacy, including how to be literate about one's own literacy and how to stay informed about changes in the
  future of work and education.
