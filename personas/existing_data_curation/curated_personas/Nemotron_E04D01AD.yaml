    Decision Making'', ''Stress Management for Teams'']'
  hobbies: '[''Reading historical non-fiction'', ''Crossword puzzles'', ''Woodworking'', ''Gardening'', ''Fishing'', ''Kayaking'', ''Volunteer food bank assistance'', ''Attending local history talks'',
    ''Watching Minnesota Twins games'']'
  career_goals: Eric’s immediate goal is to achieve record‑low shrinkage and exceed sales targets for his store, positioning it as a benchmark within the regional chain. He also aims to formalize a mentorship
    program that prepares a successor for his supervisory role, ensuring a smooth transition before retirement. Over the next two years, he hopes to step into a district‑manager capacity on a part‑time
    basis or serve as a consultant, applying his practical expertise to improve operational efficiency across multiple locations. To support these ambitions, he plans to earn a certification in retail analytics,
    strengthening his ability to drive data‑centric improvements and secure a stable financial foundation for his post‑work life.
