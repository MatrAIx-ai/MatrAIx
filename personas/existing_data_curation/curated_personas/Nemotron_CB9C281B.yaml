  hobbies: '[''Hiking the Peninsula trails'', ''Cooking Mexican cuisine'', ''Reading non-fiction (education policy, psychology)'', ''Yoga and mindfulness practice'', ''Nature photography'', ''Puzzle solving'',
    ''Board games with a small group of friends'', ''Journaling'']'
  career_goals: Jose aims to advance to a district-level Director of Early Childhood Programs within the next five years, overseeing multiple child care centers and shaping policy for equitable access.
    He plans to earn a Master's in Education Leadership, expand his expertise in evidence‑based instructional practices, and champion culturally responsive curricula for bilingual families. In the long
    term, he envisions founding a nonprofit early learning center that serves underserved Mexican‑American communities in the Bay Area, integrating community partners and securing sustainable funding.
