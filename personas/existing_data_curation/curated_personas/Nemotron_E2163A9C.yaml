  career_goals: Linda is fascinated by outer space, imaginative worlds, and how things work. She often says she wants to become an astronaut who paints the planets she visits, or a scientist‑artist who
    invents new toys that help children learn. At school, she dreams of being a teacher who can turn lessons into adventures. She values careers that allow her to explore, create, and help others feel happy,
    and she imagines a future where she can combine curiosity, art, and kindness in her work.
