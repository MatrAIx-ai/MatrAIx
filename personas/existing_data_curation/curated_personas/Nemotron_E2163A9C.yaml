personas:
  professional: Linda Ngy, a budding junior architect, channels their vivid imagination and calm resilience into constructing elaborate LEGO castles and drawing fantastical blueprints, while their relaxed,
    flexible approach makes collaborative building sessions with friends feel like spontaneous storytelling labs.
  sports: Linda Ngy, an enthusiastic member of the community's Mini Rangers nature explorer club and a cheerful sideline supporter of the local youth soccer team, the Riverdale Cubs, delights in sprinting
    across the park's grassy fields, cheering for the hometown baseball squad, the Bay City Hawks, during weekend games, and joyfully collects fallen leaves as trophies of their outdoor adventures.
  arts: Linda Ngy, a budding visual storyteller, spends afternoons drawing fantastical creatures inspired by Mary GrandPre's whimsical illustrations and the animated world of Adventure Time, belts out beloved
    Sesame Street songs like C is for Cookie, and practices simple recorder melodies after watching recordings of the Little Orchestra Society, showcasing how their boundless imagination and cooperative
    spirit breathe life into every creative endeavor.
  travel: Linda Ngy, a curious junior explorer, relishes weekend picnics at the nearby Greenleaf State Park, treasured family road trips to the sandy Seaside beach, and dreams of future adventures to the
    glittering Eiffel Tower in Paris and the awe-inspiring Grand Canyon, all while embracing a spontaneous planning style that lets imagination lead the itinerary.
  culinary: Linda Ngy, a playful kitchen helper, adores cheesy macaroni with cheddar, mixes chocolate chips into banana muffins, crafts rainbow fruit salads featuring strawberries, blueberries, and kiwi,
    and eagerly nods at the aroma of sizzling stir-fry veggies like carrots and broccoli, reflecting their love for bright flavors and hands-on cooking experiments.
  core: Linda Ngy is a wildly imaginative seven-year-old who balances creative construction, gentle generosity, and an unflappable calm that turns every day into a playful adventure.
background:
  cultural: Linda grew up in Plano, a family‑friendly suburb of Dallas‑Fort Worth in Collin County, Texas. Her family lives in a diverse, middle‑class neighborhood where community events, library programs,
    and school activities are central to daily life. Although her ethnic background is white, she experiences a blend of traditional American customs—celebrating holidays like the Fourth of July and Thanksgiving—with
    the multicultural flavor of her town, including occasional festivals that introduce foods and music from various cultures. Her parents encourage kindness, cooperative play, and curiosity, fostering
    an environment where creativity and calm resilience are valued.
