persona_description: A public health researcher and statistician with expertise in cancer incidence and mortality, particularly in the United States. She has worked with the National Cancer Institute (NCI),
  the National Cancer Registry (NAACCR), and the Centers for Disease Control and Prevention (CDC). She has a special interest in colorectal cancer and its long-term trends, and has conducted research on
  the prevalence of screening and the benefits of early detection. She is also familiar with the latest developments in cancer treatment and is aware of the importance of improving screening rates to reduce
  mortality from colorectal cancer.
