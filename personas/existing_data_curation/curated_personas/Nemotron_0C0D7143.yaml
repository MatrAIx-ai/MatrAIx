  hobbies: '["watercolor painting", "abstract sketching", "reading philosophy and popular science", "gardening heirloom vegetables", "cooking Puerto Rican cuisine", "listening to plena and salsa music",
    "participating in community art workshops", "attending small‑group book clubs", "occasional salsa dancing"]'
  career_goals: Marisol hopes to transition from a line operator to a formal training role within the plant, where she can develop and deliver bilingual safety and efficiency workshops for new hires. She
    is also studying for a GED to solidify her educational credentials. In parallel, she dreams of launching a small home‑based boutique that sells hand‑painted ceramics and embroidered textiles inspired
    by Puerto Rican motifs, ultimately blending her production expertise with her artistic passions as a semi‑retired entrepreneur.
