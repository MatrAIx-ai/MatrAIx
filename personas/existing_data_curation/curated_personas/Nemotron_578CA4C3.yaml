  career_goals: Although still a toddler, Rajendra’s caring disposition and love for routine suggest future aspirations toward roles that involve helping others and stability, such as becoming a teacher,
    a pediatrician, or a community service professional. In the short term, his goals are to expand his vocabulary, master simple self‑care tasks like dressing and feeding, and build confidence in interacting
    with peers during playdates.
