personas:
  professional: A future early‑childhood educator, Rajendra Rampertab delights in leading simple rhythm games and snack‑time circles, channeling their love of routine and sociability while they often forget
    to tidy up after play.
  sports: A pint‑sized athlete, Rajendra Rampertab attends the Malvern Mini Soccer Club on Tuesdays, proudly waves a Philadelphia Eagles cap while cheering in the family living room, and they delight in
    running finger‑painted relay races at the local park.
  arts: Energetic in creative play, Rajendra Rampertab hums A. R. Rahman's 'Jai Ho' alongside Taylor Swift's 'Shake It Off' while drawing bright crayon circles of sun and moon, and they enjoy nightly storytime
    featuring the animated antics of Bluey and the moral lessons of Sesame Street.
  travel: A curious wanderer, Rajendra Rampertab enjoys family road trips to Pennsylvania Dutch Country and seasonal visits to the Jersey Shore's Wildwood Boardwalk, while they dream of a splash‑filled
    adventure at Walt Disney World in Orlando.
  culinary: Fond of gentle flavors, Rajendra Rampertab savors soft roti brushed with ghee, mild dal with a side of mango puree, and occasional chicken nuggets, often getting a smudge of yogurt on their
    cheek while they enthusiastically stir a bowl of gajar ka halwa under parental supervision.
  core: Rajendra Rampertab is a routine‑loving, sociable two‑year‑old who balances a heart for harmony with occasional worries, they have a penchant for playful messes and a bright curiosity about the world.
background:
  cultural: Rajendra was raised in a South Asian Indian household in Malvern, Pennsylvania, where he experiences a blend of Indian traditions and American suburban life. His family celebrates festivals
    such as Diwali and Holi, prepares homemade Indian dishes like roti, dal, and mild curries, and speaks both English and Hindi at home. He is exposed to traditional Indian stories, songs, and values of
    respect and community, while also participating in local community activities and school‑age programs.
