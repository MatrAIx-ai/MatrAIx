personas:
  professional: Carolyn Good is a veteran municipal IT support specialist whose methodical troubleshooting, love for routine, and sociable teaching style keep city employees online, expertly handling Windows
    workstations, printer configurations, and ServiceNow ticketing while she mentors junior technicians with patience and precision.
  sports: Carolyn Good enjoys daily walks with the Springfield Senior Park Walkers, participates in weekly bridge tournaments at the senior center, and cheers on the Springfield Isotopes baseball team while
    occasionally joining a pickle‑ball league at the community recreation center.
  arts: Carolyn Good expresses her creativity through quilting to the rhythm of Mahalia Jackson’s gospel hymns, reads historical fiction by Philippa Gregory, and finds inspiration in the floral paintings
    of Georgia O’Keeffe.
  travel: Carolyn Good prefers organized, low‑stress trips, such as a guided tour of Colonial Williamsburg, weekend bird‑watching excursions to Everglades National Park, and hopes to one day explore the
    historic gardens of Kyoto, Japan.
  culinary: Carolyn Good loves cooking with fresh garden produce, often preparing heirloom tomato gazpacho, rosemary‑infused roasted chicken, and baking apple crumble topped with cinnamon and crunchy oat
    streusel for community potlucks.
  core: Carolyn Good is a reliable tech‑savvy caretaker whose habit of double‑checking every email inbox reveals a gentle paranoia that fuels her community‑first spirit.
background:
  cultural: Carolyn grew up in a middle‑class, white Midwestern family in the post‑World War II era, absorbing traditional American values of hard work, reliability, and community service. Her upbringing
    was rooted in Protestant (Methodist) traditions, emphasizing modesty, responsibility, and volunteerism. Living her entire adult life in Springfield, Illinois, she feels a strong connection to the city’s
    historical legacy, especially its ties to Abraham Lincoln. This cultural backdrop informs her practical, routine‑oriented outlook, her respect for established processes, and her commitment to civic
    involvement through local churches, senior groups, and community organizations.
attributes:
  skills: '[''Hardware troubleshooting'', ''Software installation and configuration'', ''Windows operating system support'', ''Printer and peripheral setup'', ''Network connectivity troubleshooting'', ''Ticketing
    system management (ServiceNow)'', ''User training and documentation'', ''Basic cybersecurity practices'', ''Data backup and recovery procedures'', ''Remote support tools (TeamViewer, Remote Desktop)'',
    ''IT asset inventory management'', ''Standard operating procedure development and compliance'']'
  hobbies: '[''Gardening (vegetables and flowers)'', ''Quilting and needlework circles'', ''Playing bridge at the senior center'', ''Walking clubs in Springfield parks'', ''Volunteering for the local historical
    society'', ''Teaching basic computer classes for seniors'', ''Church choir participation'', ''Reading historical fiction'', ''Community potluck gatherings'', ''Birdwatching in local nature reserves'']'
  career_goals: Approaching retirement, Carolyn aims to cement her legacy by formalizing her knowledge into training modules and mentoring junior technicians. She plans to obtain a CompTIA A+ certification
    and an ITIL Foundation credential to validate her expertise and transition into a part‑time advisory role after stepping back from full‑time work. She also hopes to launch a volunteer program at the
    local senior center that offers free basic computer classes, using her practical mindset to empower other seniors to stay digitally independent. Ultimately, she wants to be remembered as a reliable
    pillar who kept the organization’s technology running smoothly while fostering community tech literacy.
