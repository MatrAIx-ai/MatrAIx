personas:
  professional: Benjamin Hunt, a 20‑year‑old aspiring mechanic, leverages a routine‑oriented mindset, hands‑on automotive repair skills, and a knack for mediating peer disputes to excel in a local apprenticeship,
    though they occasionally miss paperwork due to disorganization.
  sports: Benjamin Hunt stays active by playing pick‑up basketball at the Rayne Community Center, cheering on the Louisiana Ragin' Cajuns football team and the New Orleans Pelicans, and they spend quiet
    weekends fishing in Bayou Bienvenue, balancing competitive play with relaxed outdoor recreation.
  arts: Benjamin Hunt’s artistic palate includes looping hardcore hip‑hop tracks by Kendrick Lamar, soulful R&B from H.E.R., and uplifting gospel hymns by CeCe Winans, while their comic‑book collection
    features Marvel’s Spider‑Man and Alex Ross’s Kingdom Come, and they use these creative outlets to reflect emotional highs and lows.
  travel: Benjamin Hunt prefers low‑key road trips that blend fishing at the Gulf Coast’s Grand Isle, weekend visits to the historic French Quarter of New Orleans for music and food, and they dream of a
    future solo adventure to the Caribbean island of St. Martin for a quieter, sun‑soaked escape.
  culinary: Benjamin Hunt expertly cooks Cajun classics like gumbo, jambalaya, and boudin using Andouille sausage, file powder, and a secret dash of smoked paprika, while they experiment with a vegetarian
    gumbo twist that swaps crawfish for smoked tofu, showcasing a practical yet inventive kitchen style.
  core: Benjamin Hunt is a routine‑loving, easily anxious 20‑year‑old who balances hands‑on trades, soulful music, and late‑night gaming, yet they often forget appointments and overindulge in fishing bait
    purchases.
background:
  cultural: Benjamin was raised in Rayne, Louisiana, within a close‑knit African‑American community that blends Southern Black traditions with the multicultural influences of Acadia Parish. His family’s
    weekly life revolves around the local church, where gospel music, communal meals, and fellowship shape his values of cooperation and compassion. The regional Cajun culture is evident in the food he
    cooks and the music he enjoys, reflecting a shared heritage of resilience and practicality. Growing up in a working‑class environment, he learned the importance of manual trades and self‑reliance, while
    the warmth of Southern hospitality taught him to balance individual needs with communal support.
attributes:
