  career_goals: Although only four, Tranesa imagines a future where she can help others learn in a structured environment. She dreams of becoming a kindergarten teacher, a librarian for a community library,
    or a nurse who keeps a tidy and predictable clinic. She is drawn to roles that involve clear schedules, organized spaces, and the ability to support children and families. Her ambition is to achieve
    high standards in whichever path she chooses, ensuring that the environment around her runs smoothly.
