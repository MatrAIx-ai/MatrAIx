  career_goals: Looking ahead, Olivio aims to move into a senior administrative or office‑manager role within a cultural nonprofit or community arts organization where he can blend his organizational expertise
    with his passion for art. He plans to earn the Certified Administrative Professional (CAP) credential and enroll in a community‑college business administration program to strengthen his strategic planning
    and budgeting skills. Over the next five years he hopes to lead a team that coordinates public exhibitions, cultural festivals, and community outreach programs, and to become a trusted liaison between
    the organization and its diverse stakeholder base. He also expresses a personal ambition to develop a more structured workflow for himself, reducing stress and improving deadline adherence.
