  career_goals: Antonio plans to enroll in a community college business program and later transfer to a four-year university to earn a BBA with a focus on entrepreneurship. He aspires to launch a family-owned
    venture that blends his Mexican heritage with community engagement—such as a cultural café or a sports-equipment store that sponsors youth soccer programs. Long-term, he aims to become a certified project
    manager, using his disciplined approach to oversee operations in a midsized manufacturing firm while remaining involved in local community initiatives.
