  career_goals: At 62, Allen aims to complete a three‑volume memoir that weaves his personal journey with the broader story of Black life in Dorchester County. He seeks to publish the series through a small
    independent press that champions regional voices, and to build a modest online archive of oral histories he has collected from longtime community members. Additionally, he hopes to lead a quarterly
    writer‑in‑residence program at the local library, providing mentorship and short‑term workshops for high‑school and adult students interested in preserving their cultural heritage through writing.
