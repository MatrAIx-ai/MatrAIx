personas:
  professional: Terry Mays is an aspiring junior architect who channels a love for intricate LEGO constructions into an early fascination with structural design, methodically following instruction manuals
    and sketching mechanical ideas, and they often apply the same orderly mindset to school projects.
  sports: Terry Mays is a member of the local youth swimming club, enjoys solo basketball drills after school, and they cheer for the nearby minor league baseball team, the Springfield Sluggers, while sometimes
    watching professional soccer matches to study team formations.
  arts: Terry Mays engages in mechanical sketching while listening to instrumental hip‑hop artists like Nujabes and J Dilla, reads adventure science‑fiction series such as Percy Jackson and Ender’s Game,
    and they occasionally experiment with simple drum patterns, finding rhythm a comforting structure.
  travel: Terry Mays prefers family trips that follow a detailed itinerary, having visited the Grand Canyon, the LEGO Discovery Center in Chicago, and Disneyland, they dream of exploring Kyoto’s historic
    temples and a future visit to the Smithsonian’s Air and Space Museum, always packing a notebook to map out daily activities.
  culinary: Terry Mays enjoys building custom pizza slices with toppings like pepperoni, olives, and pineapple, loves making mac and cheese with a sprinkle of cheddar, and they often practice laying out
    snack plates in geometric patterns, reflecting their love of structure, while occasionally snacking on sugary cereal straight from the box.
  core: Terry Mays, an eight‑year‑old builder‑in‑training, blends a meticulous love for structured play with an undercurrent of worry‑driven perfectionism, preferring solo pursuits and clear routines while
    occasionally battling anxiety over unpredictable moments.
background:
  cultural: Terry is raised in a Black family on the South Side of Chicago, where community ties, church gatherings, and family storytelling shape his identity. He grows up hearing tales of the Great Migration
    from his grandparents and celebrating cultural milestones such as Juneteenth and Kwanzaa. He enjoys traditional soul‑food meals like collard greens, sweet potatoes, and cornbread at family gatherings,
    and he participates in community library programs that showcase African‑American authors and STEM workshops aimed at Black youth. The rhythm of city life, local basketball courts, and neighborhood block
    parties also influence his sense of belonging.
attributes:
  skills: '[''Organizing school supplies'', ''Adhering to daily routines'', ''Reading comprehension (2nd‑grade level)'', ''Step‑by‑step puzzle solving'', ''LEGO construction'', ''Basic Scratch programming'',
