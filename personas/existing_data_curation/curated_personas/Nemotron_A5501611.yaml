  hobbies: '[''LEGO building'', ''Reading adventure and sci‑fi books'', ''Single‑player Minecraft gameplay'', ''Sketching mechanical designs'', ''Listening to instrumental hip‑hop'', ''Practice drum patterns'']'
  career_goals: Terry dreams of becoming an astronaut or a mechanical engineer who designs tools that help people in his neighborhood. He is fascinated by space missions and wants to build machines that
    solve everyday problems. He also imagines creating his own video games, so he aspires to learn more coding and eventually work as a software developer. His long‑term ambition includes giving back to
    the Chicago community by mentoring younger kids in STEM activities.
