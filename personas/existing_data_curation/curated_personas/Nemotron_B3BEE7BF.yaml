personas:
  professional: Tiffany Petty, a data‑driven boutique real‑estate broker in the Shenandoah Valley, blends rigorous market analytics with artistic staging and historic‑home expertise to close high‑value
    deals while they juggle a competitive edge and meticulous organization.
  sports: Tiffany Petty hits the Shenandoah National Park trails on weekends for hikes ranging from moderate loops to rugged climbs, participates in a local yoga studio’s sunrise sessions, follows the Washington
    Capitals and the Washington Nationals, cheering them from a home bar while they sport a vintage baseball cap.
  arts: Tiffany Petty immerses themselves in the regional art scene by frequenting galleries featuring works by Ansel Adams and Kehinde Wiley, curates vintage finds from antique shops, and they draw inspiration
    from photographers like Annie Leibovitz and musicians such as Norah Jones and the folk‑rock band The Lumineers when staging historic homes.
  travel: Tiffany Petty prefers curated road trips that blend wine tasting in Charlottesville, historic house tours in Savannah, and spontaneous weekend hikes in the Blue Ridge, using a detailed spreadsheet
    to budget but leaving room for last‑minute detours to local festivals like the Virginia Folk Music Festival, and they relish the flexibility of unplanned stops.
  culinary: Tiffany Petty relishes farm‑to‑table dishes, frequently preparing roasted beet and goat cheese salads, herb‑infused sourdough, and a signature Cabernet‑marinated short rib, while they also savor
    a glass of Barboursville Vineyards Merlot after a day of photography.
  core: Tiffany Petty is a competitive, curiosity‑driven real‑estate broker who balances meticulous market analysis with artistic flair, channels stress into yoga and hiking, and they indulge in wine and
    vintage finds despite a budget‑watching habit.
background:
  cultural: Raised in a modest, close‑knit community in the Shenandoah Valley, Tiffany’s White, middle‑class Virginian upbringing emphasized self‑reliance, hard work, and a respect for the region’s historical
    roots. With only a high school diploma, she entered the workforce early, learning on the job and valuing practical knowledge over formal credentials. The local culture of Appalachian hospitality, combined
    with a growing appreciation for arts, tourism, and heritage preservation, shaped her love for historic architecture and community events. Family traditions of church involvement and seasonal festivals
    reinforced a sense of belonging, while the area's natural beauty nurtured her appreciation for outdoor recreation and sustainable living.
