  hobbies: '[''Visiting Art Galleries'', ''Photography'', ''Historic Home Tours'', ''Hiking in Shenandoah National Park'', ''Wine Tasting'', ''Reading Mystery Novels'', ''Gardening'', ''DIY Home Improvement'',
