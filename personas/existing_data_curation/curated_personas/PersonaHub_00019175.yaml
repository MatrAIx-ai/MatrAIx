persona_description: A climate scientist who is interested in monitoring and understanding the changes in mass, volume, area, and length of glaciers with time, as well as the distribution of perennial surface
  ice. They are familiar with the World Glacier Monitoring Service (WGMS) and its role in climate system monitoring, hydrological modeling, and glaciology. They are also aware of the recent reports on the
  melting of glaciers and the importance of WGMS data in understanding the effects of atmospheric warming and the fundamental information in glaciology, glacial geomorphology, and quaternary geology.
