  career_goals: She aspires to translate her organizational talents and cooking expertise into a small, home‑based catering business that offers authentic Colombian meals and occasional cooking workshops
    for the Hispanic community in Broward County. To enhance her credibility and expand service options, she plans to complete a short certification in community health work or caregiving, allowing her
    to provide wellness education alongside her culinary services. Long‑term, she hopes to achieve a steady supplemental income that reduces financial anxiety, build a modest client base, and eventually
    mentor younger immigrant women who wish to start similar ventures.
