  hobbies: '[''Traditional Colombian Cooking'', ''Garden Cultivation (Vegetables & Flowers)'', ''Morning Beach Walks'', ''Reading (Historical Fiction & Self‑Help)'', ''Crocheting and Needlework'', ''Volunteer
