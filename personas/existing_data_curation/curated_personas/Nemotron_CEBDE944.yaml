personas:
  professional: Esperanza Ortega is channeling her meticulous organizational talent and home‑cooking expertise into a small, home‑based catering venture, where they apply rigorous budgeting, bilingual communication,
    and a no‑nonsense approach to meet high standards while managing the stress of entrepreneurship.
  sports: Esperanza Ortega enjoys early morning beach walks, occasionally joins a local senior walking club, and supports the Miami Heat and Miami Dolphins, while practicing gentle stretching at home to
    maintain flexibility.
  arts: Esperanza Ortega appreciates classic vallenato and salsa rhythms, follows artists like Carlos Vives and Celia Cruz, watches telenovelas such as La Reina del Sur, and spends evenings crocheting blankets
    for charity while listening to church choir performances.
  travel: Esperanza Ortega prefers meticulously planned short trips, having visited Key West, St. Augustine, and the Everglades, and dreams of a relaxed cruise to the Bahamas during her annual holiday season,
    always guided by detailed checklists to avoid stress.
  culinary: Esperanza Ortega excels at crafting arepas, empanadas, and sancocho using garden‑fresh herbs like cilantro and culantro, skillfully balances flavors with a pinch of cumin and a splash of lime,
    and occasionally indulges in a sweet tres leches cake baked for neighborhood celebrations.
  core: Esperanza Ortega is a hyper‑organized, stress‑prone culinary enthusiast who transforms community care into a disciplined home‑catering dream, juggling meticulous budgeting, health worries, and a
    love for beach walks.
background:
  cultural: Esperanza was born and raised in a rural town in the Antioquia region of Colombia, where Catholic traditions, family solidarity, and communal celebrations shaped her upbringing. After moving
    to Hollywood, Florida, following her marriage, she retained strong ties to Colombian culture through language, cuisine, and participation in local Colombian associations in Broward County. She celebrates
    holidays such as Carnaval de Barranquilla, Día de la Independencia (July 20), and Semana Santa, and she often shares these customs with neighbors and friends, fostering a sense of cultural continuity
    while adapting to her American surroundings.
