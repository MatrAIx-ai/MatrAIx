personas:
  professional: Maria Centeno, a 22‑year‑old first‑line supervisor in a busy retail store, blends their STEM training with a love for data‑driven inventory forecasting, visual merchandising tweaks, and
    on‑the‑fly Python scripts to streamline operations while juggling staff coaching and conflict mediation with a relaxed, flexible approach that sometimes leaves their desk a bit chaotic.
  sports: Maria Centeno hits the Wasatch foothills for weekend hikes with the local Trailblazers Hiking Club, follows Real Salt Lake’s MLS matches, catches Utah Jazz games on TV, and squeezes in occasional
    snowboarding trips to Park City during winter, balancing competitive board‑game strategies with an active, outdoorsy lifestyle that they cherish.
  arts: Maria Centeno spends Saturday afternoons roaming contemporary galleries featuring artists like Yayoi Kusama and Kehinde Wiley, sketches digital illustrations inspired by sci‑fi aesthetics using
    a tablet, and unwinds listening to Tame Impala and the experimental jazz trio Snarky Puppy, letting art shape both work presentations and personal identity as they navigate a data‑driven career.
  travel: Maria Centeno prefers spur‑of‑the‑moment road trips, having recently driven to Santa Fe for a mural festival, dreaming of exploring Oaxaca’s culinary markets, and penciling a future solo backpacking
    adventure across Iceland’s volcanic landscapes while keeping travel budgets flexible thanks to their habit of snagging last‑minute flight deals.
  culinary: Maria Centeno loves mastering authentic mole poblano, chiles en nogada, and tamales during family gatherings, while also experimenting with fusion tacos topped with kimchi, and spends weekends
    perfecting corn‑based salsas using fresh cilantro, roasted chilies, and lime juice as they blend tradition with culinary curiosity.
  core: Maria Centeno, a curious yet laid‑back data‑savvy retail supervisor, balances fierce competition in board games with a serene, flexible approach to life, often drifting between art‑filled spontaneity
    and a love for algorithmic problem‑solving as they navigate daily challenges.
background:
  cultural: Maria was raised in a bilingual Mexican-American household. Spanish is spoken at home, and family traditions such as Día de los Muertos, Christmas Posadas, and weekly tamal-making gatherings
    remain central to her identity. Living in Orem, Utah, she balances her heritage with the local community, participating in cultural festivals at the Utah State University Hispanic Center, volunteering
    at local Mexican restaurants during community events, and maintaining close ties with relatives in Mexico through regular video calls and annual visits.
