  career_goals: Maria aims to become a store manager within the next twelve to eighteen months, followed by a district-manager position where she can shape regional retail strategy using data analytics.
    She plans to supplement her experience with an MBA or a master's in Business Analytics, and eventually launch her own tech-focused boutique that blends innovative product curation with immersive art
    experiences.
