persona_description: A wetland delineation expert with a passion for learning and identifying wetland plants. They are experienced in the field of wetland delineation and have a keen eye for distinguishing
  between upland and wetland plant species. They are highly skilled in recognizing wetland plants during the winter months through the use of specific criteria such as bark, twigs, and other leafless characteristics.
  They have a strong background in hydrology and have a deep understanding of the importance of wetland plants in delineating wetland boundaries. They are a valuable asset to any team or organization involved
  in wetland delineation.
