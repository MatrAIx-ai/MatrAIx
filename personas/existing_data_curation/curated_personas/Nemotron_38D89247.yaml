  career_goals: Alejandra aims to advance into senior leadership within early childhood education, such as becoming a director of programs or a district‑level curriculum specialist. She plans to pursue
    a master's degree in Educational Leadership to deepen her strategic and policy expertise. In the long term, she envisions launching her own multilingual childcare center that blends Spanish cultural
    heritage with STEM‑focused curricula, and becoming an advocate for state‑wide early‑education reforms that support working families and promote cultural inclusion.
