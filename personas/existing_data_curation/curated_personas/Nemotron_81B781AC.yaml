  career_goals: Janice aims to deepen her impact on student learning by earning a Master of Education with a focus on Instructional Leadership within the next two years. She aspires to become a curriculum
    specialist or literacy coordinator at her district, where she can mentor new teachers and lead professional development on evidence-based practices. Long-term, she envisions moving into an administrative
    role, such as assistant principal, to shape school culture and expand community partnerships that support holistic student growth. Concurrently, she hopes to launch an after-school enrichment program
    that blends STEM exploration with local history, fostering curiosity while meeting the practical needs of families in Monroe.
