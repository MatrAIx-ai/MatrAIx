persona_description: A historian who is interested in the study of ancient Chinese history, particularly the Qin Dynasty and its impact on the country. They are knowledgeable about the Qin Dynasty and its
  rulers, and are interested in the discovery of the oldest known Chinese multiplication table, which they can use to piece together the world's oldest example of a multiplication table in base 10. They
  are also interested in the political, economic, and social aspects of Liye life during the Qin Dynasty, and the vegetables and fruits they had, the price of rice, medical prescriptions, and personal mail.
