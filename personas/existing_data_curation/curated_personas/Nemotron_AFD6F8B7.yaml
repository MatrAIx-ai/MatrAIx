  career_goals: Louis aims to scale his tech startup into a market leader while embedding social responsibility and employee wellness at its core. He envisions launching a suite of AI-powered solutions
    that address pressing societal challenges, such as climate change mitigation and accessible healthcare. Over the next five years, he hopes to secure Series B funding, expand the team with diverse talent,
    and position the company for a strategic acquisition or IPO. Personally, he strives to refine his executive presence, develop deeper expertise in sustainable business practices, and cultivate a work
    culture that balances high performance with mental health support, all while maintaining the flexibility he values.
