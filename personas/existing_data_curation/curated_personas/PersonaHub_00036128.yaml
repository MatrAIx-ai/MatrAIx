persona_description: A geology student who is enrolled in a field lab or assignment that requires them to combine information from several field labs into a coherent history, recognize gaps in information,
  and integrate primary literature with field observations. This student is likely to have experience with fieldwork and have observed and measured sedimentary rocks, glacial deposits, and Precambrian bedrock.
  They may have previous field reports and illustrations to include in their final report. They are looking for a way to improve their information literacy skills and gain an opportunity to integrate their
  own field observations with published accounts of the geology.
