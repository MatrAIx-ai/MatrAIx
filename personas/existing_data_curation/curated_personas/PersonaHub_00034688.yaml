persona_description: A highly respected and accomplished orthopedic surgeon who made significant contributions to the field of prosthetics and bone formation. Known for his innovative research and groundbreaking
  discoveries, he was the first tenured chair of orthopedic surgery at Harvard and held the position for over 50 years. His expertise in the study of human gait and bone genetics and formation, as well
  as his contributions to the field of prosthetics, have earned him a reputation as a leading authority in his field. He was survived by three daughters.
