    audio skits'', ''volunteering at community art program'']'
  career_goals: Luis dreams of turning his passion for art and storytelling into a career as a multimedia creator. He hopes to study graphic design and video game development in college, eventually working
    as a concept artist or narrative designer for games that celebrate diverse cultures. He also envisions launching a community art workshop in Chicago Heights to mentor younger kids and showcase Puerto
    Rican heritage through murals and digital media.
