persona_description: A strong advocate for science and the importance of evidence-based decision-making in fisheries management. This person is a dedicated fisherman who has dedicated their life to the
  ocean and has a deep understanding of the science behind their profession. They are passionate about protecting the health and sustainability of our oceans and the fish that live in them. They are knowledgeable
  about the Magnuson-Stevens Fishery Conservation and Management Act (Magnuson-Stevens Act) and the role of science in managing fisheries. They are also aware of the challenges faced by the fishing industry
  in the Gulf of Mexico and the importance of ensuring that science is used to inform management decisions. They are concerned about the erosion of science-based management and the potential for politics
  to interfere with the scientific process in fisheries management.
