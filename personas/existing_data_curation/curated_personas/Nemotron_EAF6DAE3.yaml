personas:
  professional: Shayla Woodside is an aspiring bioinformatics analyst who blends her Python, R, and molecular biology expertise with a knack for visual storytelling, using her curiosity and meticulous organization
    to turn complex health data into accessible infographics for community‑focused public‑health projects.
  sports: Shayla Woodside enjoys early‑morning runs with the Chicago Track Club, practices yoga at a community studio, and cheers for the Chicago Bulls during the NBA season and the Chicago Cubs in the
    summer, balancing moderate cardio with occasional intramural soccer matches and weekend kayaking on the lake.
  arts: Shayla Woodside frequents the Art Institute of Chicago and the vibrant Wabash Avenue murals, drawing inspiration from artists like Kerry James Marshall and Shepard Fairey, while regularly attending
    live jazz at The Green Mill and open‑mic poetry nights featuring spoken‑word poets such as Sarah Kay.
  travel: Shayla Woodside plans weekend getaways to Chicago’s lakefront islands and annual road trips to the Great Lakes, while dreaming of a solo train journey to New Orleans for its jazz heritage and
    a future backpacking adventure through Iceland’s Reykjavik to attend the Iceland Airwaves festival, often relying on student discounts and meticulous itinerary spreadsheets.
  culinary: Shayla Woodside loves the comfort of Chicago‑style deep‑dish pizza and the spice of jalapeño‑topped Mexican tacos, while at home she experiments with quinoa‑based grain bowls, matcha‑infused
    smoothies, and homemade ramen using miso paste and fresh shiitake mushrooms.
  core: Shayla Woodside is a curiosity‑driven, art‑loving bio‑data enthusiast who steadies her anxious mind with meditation, channels her meticulous budget into modest index‑fund investments, and blends
    science with visual storytelling to champion health equity in Chicago.
background:
  cultural: Shayla grew up in the South Side of Chicago within a close‑knit African‑American family that emphasized community, faith, and education. Her cultural identity is shaped by the city’s historic
    Black neighborhoods, the legacy of the civil‑rights movement, and the vibrant contemporary art and music scenes. She celebrates traditions such as Juneteenth, honors the contributions of Black scientists
    and artists, and frequently participates in local cultural festivals and church gatherings. This background informs her commitment to social justice, her appreciation for soulful music and visual storytelling,
    and her desire to give back to the community through mentorship and public‑health initiatives.
attributes:
  skills: '[''Python programming'', ''R and SPSS statistical analysis'', ''Data visualization (Tableau, matplotlib)'', ''Molecular biology techniques (PCR, gel electrophoresis, microscopy)'', ''Scientific
    writing and communication'', ''Graphic design (Adobe Photoshop, Illustrator)'', ''Digital illustration and infographics'']'
  hobbies: '[''Visiting art museums and galleries'', ''Sketching street murals'', ''Digital collage creation'', ''Reading speculative fiction'', ''Listening to science podcasts'', ''STEM mentoring for high‑school
    students'', ''Mindfulness meditation and journaling'', ''Attending live jazz concerts'', ''Open‑mic poetry nights'']'
  career_goals: Shayla aims to pursue a master’s degree in bioinformatics or data science within the next two years, with a focus on using data-driven approaches to address health disparities in underserved
    Chicago communities. She envisions a career that combines her technical expertise with her passion for visual communication, ultimately working as a research data analyst or science communication specialist
    for a public‑health nonprofit or academic lab. Long‑term, she hopes to lead interdisciplinary projects that integrate community‑based participatory research, digital storytelling, and policy advocacy,
    while maintaining a work environment that supports mental‑well‑being and collaborative harmony.
