  career_goals: Approaching retirement, Karen aims to transition into a mentorship and consulting role, sharing her knowledge with emerging health‑service managers in rural Nebraska. She hopes to launch
    a community‑based art‑therapy program that integrates her appreciation for the arts with mental‑health support for seniors. Additionally, she plans to volunteer as a board member for a local nonprofit
    focused on improving access to preventive health services. Karen also aspires to document her career experiences in a memoir that highlights the evolution of health‑care management in small‑town America.
