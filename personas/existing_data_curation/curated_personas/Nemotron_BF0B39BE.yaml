personas:
  professional: Luis is a budding builder who treats every LEGO set like a miniature architectural project, meticulously sorting bricks by color and shape before constructing intricate models, and they
    relish the sense of achievement that comes from meeting their own exacting standards.
  sports: Luis participates in the Little Lions youth soccer club, enjoys the structured drills at weekly practices, and they cheer for the Los Angeles Dodgers, finding inspiration in the team's disciplined
    approach to the game.
  arts: Luis loves drawing animals inspired by Dr. Seuss, coloring with Crayola markers while humming Disney melodies by Alan Menken, and they occasionally perform simple tunes on their small keyboard,
    showcasing a quiet yet creative side.
  travel: Luis prefers short, well‑planned family trips such as weekend visits to the nearby state park, day outings to the zoo, and they dream of exploring the Grand Canyon and the Eiffel Tower, always
    mapping routes on a colorful world map before traveling.
  culinary: Luis enjoys helping prepare family favorite tacos with corn tortillas, fresh cilantro and shredded cheese, can whisk a bowl of mac and cheese with surprising confidence, though they sometimes
    over‑salt the salsa, revealing a playful yet meticulous kitchen habit.
  core: Luis is a methodical mini‑architect who lines up LEGO bricks by hue, hoards stickers in a secret stash, and insists on a bedtime ritual of counting exactly one hundred steps before the lights go
    out.
background:
  cultural: Luis is raised in a Mexican‑American household in Croydon, Utah. At home, Spanish is spoken alongside English, and family traditions such as celebrating Día de los Muertos and Mexican Independence
    Day are observed. He enjoys Mexican foods like tacos and guacamole, often helping his parents in the kitchen. The blend of Mexican cultural values—family closeness, respect, and community harmony—combined
    with his small‑town Utah environment gives Luis a bicultural perspective that influences his language, celebrations, and appreciation for both Mexican and American customs.
