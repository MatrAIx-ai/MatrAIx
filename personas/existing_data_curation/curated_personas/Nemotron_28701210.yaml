personas:
  professional: Jessica Harris, a 92-year-old retired construction forewoman, still applies her decades-long expertise in framing, siding, and concrete mixing to mentor younger relatives, oversee historic
    home restorations in Silverton, and lead community workshops, embodying the same methodical, safety-obsessed precision that defined her career.
  sports: Jessica Harris stays active by walking the Willamette River Trail several times a week, participates in the Silverton Senior Walking Club, follows the Portland Timbers and Oregon State Beavers
    on TV, and joins a low-impact senior yoga class at the community center each spring, all while maintaining a gentle stretching regimen to keep her joints supple.
  arts: Jessica Harris finds creative fulfillment in the senior choir’s gospel hymns, the folk ballads of Joan Baez, the classic films of Meryl Streep, and the watercolor landscapes of Oregon artist David
    Yandell, often knitting patterned blankets while humming the melody of "Amazing Grace" and attending the Oregon Shakespeare Festival each summer.
  travel: Jessica Harris favors leisurely, multi-generational trips, having toured the Oregon Coast, visited the historic Columbia River Gorge, and taken a senior-group river cruise to Seattle, and she
    dreams of a gentle pilgrimage to the Grand Canyon's South Rim, always planning itineraries around comfortable lodging and accessible walking paths.
  culinary: Jessica Harris delights in cooking with her garden harvest—fresh tomatoes, sweet carrots, and sharp rosemary—preparing classic dishes like chicken pot pie with a buttery crust, a hearty vegetable
    stew, and an apple-marionberry crisp, while she still cherishes the occasional indulgence of a pepperoni pizza ordered for a movie night.
  core: Jessica Harris, a 92-year-old who blends meticulous construction know-how with a love of garden order, choir harmony, and yarn patterns, navigates life with disciplined budgeting, measured health
    routines, and a sprightly, if occasionally forgetful, spirit.
background:
  cultural: Jessica grew up in a mid-century white, Protestant (Methodist) family with German and Irish ancestry, embodying the Pacific Northwest's values of self-reliance, community service, and respect
    for the natural environment. Her upbringing in rural Oregon emphasized a strong work ethic, modesty, and participation in local traditions such as the Silverton Rose Festival, shaping a cultural identity
    rooted in practicality and communal cooperation.
