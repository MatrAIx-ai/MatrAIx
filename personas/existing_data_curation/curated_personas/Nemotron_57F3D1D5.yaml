  career_goals: Sara dreams of a future where she can help others in a calm, predictable setting. She is most interested in becoming a veterinarian because she loves animals and likes the clear daily schedules
    that animal care requires. She also imagines herself working as a librarian or a teacher’s aide, where she can create orderly environments, share books, and support classmates in a gentle, cooperative
    way. These ambitions reflect her desire for structure, her kindness, and her wish to contribute to a harmonious community.
