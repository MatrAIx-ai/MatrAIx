persona_description: A researcher at Pacific Northwest National Laboratory (PNNL) who specializes in the study of cell signaling, particularly the ability of cells to detect and respond to chemical and
  physical changes in their environment, including detecting and responding to other living cells. The researcher is part of the Joint Program in Cell Signaling, a research and educational initiative that
  aims to understand the dynamic information systems in cells and integrate genomic and functional information, powerful bioinformatics, and novel experimental techniques to expand understanding of human
  disease. The researcher is confident that significant federal funding will follow and is writing grant proposals to fund future work. The researcher is also a research professor in the UW’s departments
  of bioengineering and molecular biotechnology and has been pioneering the development of advanced optical instruments, unique mass spectrometry facilities, and mathematical models of cell signaling networks.
