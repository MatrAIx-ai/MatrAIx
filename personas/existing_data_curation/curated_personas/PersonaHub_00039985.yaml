persona_description: A physicist who specializes in the study of thermodynamics and kinetics, particularly the relationship between temperature and reaction rate. He is interested in the Arrhenius equation
  and how it applies to various reactions. He is also interested in the effects of temperature on reaction rates and how they can be used to predict the outcome of a reaction. He is familiar with the rule
  of thumb that a 10°C rise in temperature might double the reaction rate, but this is a very iffy generalization. He is also aware that many reactions can slow down when temperature rises, and that this
  can result in a violent explosion. He is interested in the examples of reactions that slow down when temperature rises and how they can be used to predict the outcome of a reaction.
