personas:
  professional: Jeanette Hans is a budding junior programmer and LEGO robotics enthusiast who channels her curiosity and practical mindset into building Scratch games and improvisational robot prototypes,
    while they favor a relaxed, sometimes disorganized approach that lets them adapt on the fly and a competitive edge that pushes them to out‑solve peers in coding challenges.
  sports: Jeanette Hans caps off their week with soccer matches for the Perkasie Youth Soccer Club and weekend hikes on nearby nature trails, cheering on the Philadelphia Eagles on game days while their
    competitive demeanor drives them to improve both as a team player and a solo explorer.
  arts: Jeanette Hans devotes their free time to devouring Agatha Christie mysteries, constructing intricate LEGO dioramas, and attending family trips to the Philadelphia Museum of Art where they admire
    works by Georgia O'Keeffe, while their playlist loops Taylor Swift and Imagine Dragons, reflecting a blend of classic intrigue and modern pop that fuels their imagination.
  travel: Jeanette Hans enjoys family road trips to the historic streets of Philadelphia for museum days, weekend camping in the Pocono Mountains where they collect rocks, and occasional visits to the county
    fair, preferring a mix of spontaneous nature hikes and carefully planned city excursions while dreaming of a future adventure to the Smithsonian in Washington, D.C.
  culinary: Jeanette Hans, a budding kitchen tinkerer, favors pepperoni pizza, creamy mac and cheese, and strawberry‑banana smoothies, often mastering beginner‑level dishes like cheese quesadillas and homemade
    soft pretzels while occasionally experimenting with a dash of oregano on their spaghetti for a culinary twist.
  core: Jeanette Hans navigates life with a curious, competitive spark that fuels their love of LEGO robotics and mystery novels, while their laid‑back, sometimes disorganized habits keep their schedule
    fluid and their snack stash perpetually stocked with pizza slices.
background:
  cultural: Jeanette grew up in a suburban middle‑class family in Perkasie, Bucks County, Pennsylvania. The community blends historic American values with a modern, tech‑oriented lifestyle. She attends
    a public elementary school where multicultural events expose her to a variety of traditions, though her household reflects typical Mid‑Atlantic American customs—celebrating holidays like Thanksgiving
    and the Fourth of July, enjoying local fairs, and participating in community sports leagues. The region’s proximity to Philadelphia gives her occasional exposure to broader cultural activities such
    as museum visits and performances, shaping her appreciation for both tradition and innovation.
