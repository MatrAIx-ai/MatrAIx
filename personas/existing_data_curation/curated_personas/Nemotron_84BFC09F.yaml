  career_goals: Jeanette dreams of becoming a robotics engineer or software developer who creates tools that make everyday life easier. She is fascinated by how things work and wants to design her own inventions.
    Her competitive streak pushes her to aim for top positions in science fairs and coding contests. While still young, she envisions attending a STEM‑focused high school, studying engineering at university,
    and eventually leading a tech start‑up that blends her love of practical solutions with creative ideas.
