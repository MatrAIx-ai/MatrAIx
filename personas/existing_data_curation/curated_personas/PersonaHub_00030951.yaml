persona_description: A psychologist who is interested in understanding human behavior and the mind. They have a strong interest in the Stanford Prison Experiment and are familiar with the ethical standards
  that were put in place after the experiment was discontinued. They have a background in psychology and have conducted their own psychological experiments, but are also interested in learning more about
  the evolution of psychological experiments and the impact of these experiments on society. They are curious about the history of psychological experiments and the ethical considerations that were put
  in place to prevent harm from being inflicted upon participants.
