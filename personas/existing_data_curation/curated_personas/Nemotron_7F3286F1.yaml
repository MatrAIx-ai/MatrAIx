personas:
  professional: Jordon Coulter, a seasoned construction specialist with 15 years of hands‑on experience in framing, drywall, and heavy‑equipment operation, translates their practical curiosity and spontaneous
    problem‑solving into a natural on‑site leader who frequently improvises solutions but sometimes struggles with keeping paperwork and deadlines organized as they eye a foreman promotion.
  sports: Jordon Coulter energizes weekends by hunting deer at Broken Bow Lake and fishing for bass in spring, occasionally joins a local 4‑horse‑man club for archery practice, while cheering on the Oklahoma
    City Thunder during NBA season and attending high‑school football games to support the local Panthers, even though their spontaneous schedule sometimes leaves little room for structured workouts.
  arts: Jordon Coulter unwinds to classic rock legends like Lynyrd Skynyrd and country staples such as Johnny Cash while frequenting vintage‑car shows that showcase automotive design as functional art,
    and occasionally attends community theater productions to support local talent, reflecting a practical yet appreciative aesthetic sensibility.
  travel: Jordon Coulter prefers spontaneous road trips that blend work and leisure—spending cold‑weather weekends exploring the rugged trails of Yellowstone National Park and dreaming of an Alaskan fly‑fishing
    expedition—yet family commitments and a tight budget often anchor their travel plans to nearby stays at Broken Bow Lake and occasional visits to neighboring Texas hill country.
  culinary: Jordon Coulter, an adept backyard chef, favors hearty dishes like smoked brisket rubbed with paprika and brown sugar, cedar‑plank salmon seasoned with dill, and fried catfish seasoned with cornmeal,
    often pairing meals with a cold craft lager while occasionally experimenting with wood‑smoked vegetables during family gatherings.
  core: Jordon Coulter is a hands‑on, 41‑year‑old builder whose practical curiosity fuels a love for hunting, woodworking, and classic cars, yet their spontaneous nature and lingering worry about finances
    occasionally clash with the discipline needed for long‑term goals.
background:
  cultural: Jordon grew up in a small, close‑knit town in southeastern Oklahoma, a region shaped by a blend of Southern hospitality and Midwestern work ethic. He identifies with the traditional values of
    self‑reliance, community service, and family loyalty typical of rural white Americans in the area. He is an active member of his local Baptist church, where he participates in fellowship groups and
    church‑led service projects. The local culture's emphasis on practicality, hands‑on trades, and respect for nature influences his outlook, while his curiosity about new building technologies reflects
    an openness to broader, modern ideas.
attributes:
  skills: '[''Framing'', ''Drywall installation'', ''Concrete finishing'', ''Heavy equipment operation'', ''Blueprint reading'', ''Site layout'', ''Basic carpentry'', ''Low‑VOC material handling'', ''Solar
    panel mounting basics'', ''OSHA safety compliance'', ''First‑aid certified'']'
  hobbies: '[''Hunting'', ''Fishing'', ''Woodworking'', ''Classic car restoration'', ''Habitat for Humanity volunteering'', ''Attending high‑school football games'', ''Hiking'', ''Listening to classic rock'',
    ''Family outings'']'
  career_goals: Jordon aims to move from laborer to crew foreman within the next three years, leveraging his on‑the‑job experience and the construction‑management courses he completed in college. He plans
    to obtain a certified foreman credential and a commercial driver’s licence to operate larger trucks. Ultimately, he dreams of starting his own small contracting firm focused on energy‑efficient home
    renovations, allowing him to blend his practical skills with his curiosity about green building. He also wants to secure a stable, higher‑earning position that reduces financial stress for his family
    while giving him flexibility to spend time at home.
