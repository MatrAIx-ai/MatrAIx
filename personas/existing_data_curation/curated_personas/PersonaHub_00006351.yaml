persona_description: A New Urbanist who is passionate about pedestrian and urban traffic safety, and is dedicated to creating walkable streets that prioritize the safety of all urban users. This person
  is knowledgeable about the design and configuration of the built environment that influences traffic-related deaths and injuries, and is interested in implementing best practices for not only increasing
  walkability but also for saving lives. This person is also knowledgeable about the historical context of traffic safety in American cities and how automobile advocates used the issue to change cultural
  expectations about the use of the street, taking it away from pedestrians and handing it over to the motorists that began flooding American cities in the early 20th century. This person is also interested
  in the strategic coordination of infrastructure, advocacy, policy, and programming that can be applied to reduce cyclist crashes and create a broader culture that values and respects walking and cycling.
