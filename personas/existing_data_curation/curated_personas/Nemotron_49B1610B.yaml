    youth art programs", "Reading contemporary fiction", "Improv comedy workshops"]'
  career_goals: Hugh aims to transition from a frontline sales representative to a senior account manager or sales team leader within the next three years, where he can mentor newer reps and shape a client‑centric
    culture. He is also interested in developing a niche expertise in arts‑related services, such as corporate art leasing or cultural consulting, blending his sales acumen with his passion for the arts.
    Long‑term, he envisions launching a boutique consultancy that helps organizations integrate creative experiences into employee engagement and community outreach programs, allowing him to maintain flexibility
    while making a broader social impact.
