persona_description: A railroad engineer who is responsible for operating and maintaining train signals and ensuring safety during operations. They must understand and comply with the various signal indications
  to prevent accidents and ensure the smooth movement of trains. They must be able to read and interpret the signals accurately and quickly, and be able to communicate the meaning of the signals to other
  operators, such as the engineman and head brakeman. They must also be able to quickly respond to any changes in the signals and take appropriate action to ensure the safety of the train and the crew.
