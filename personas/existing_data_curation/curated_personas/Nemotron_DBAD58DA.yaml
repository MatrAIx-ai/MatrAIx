    bars'', ''Yoga practice'', ''Reflective journaling'']'
  career_goals: Robert aims to advance to a senior engineering technologist or project manager role within the next five years, eventually leading multidisciplinary teams on large‑scale renewable‑energy
    or advanced‑manufacturing projects. He plans to obtain a Six Sigma Green Belt and pursue Professional Engineer (PE) licensure to bolster his credibility. Long‑term, he envisions establishing a small
    consultancy that integrates sustainable engineering solutions with artistic installations, leveraging his love for art and innovation to create community‑focused public works.
