  career_goals: Bobby aims to earn a Certified Professional Cleaner credential and move into a supervisory role within his current cleaning company, eventually transitioning to a small, owner‑operated cleaning
    business that highlights sustainable practices. Over the next few years he plans to pursue a vocational certification in facilities management or HVAC maintenance to broaden his technical skill set
    and increase earning potential. His longer‑term ambition is to achieve financial independence, purchase his own home in Grantville, and mentor new entrants to the housekeeping field while maintaining
    a balanced work‑life schedule.
