persona_description: A person who is interested in old-time music and its history, particularly the southern Appalachian region. They are familiar with the instruments such as the fiddle and banjo, and
  understand the unique combination of European and African sounds and styles that led to something completely new and uniquely American. They are also knowledgeable about the history of old-time music
  and its evolution, and are interested in the different interpretations and definitions of old-time music. They are likely to be interested in attending old-time music festivals or events, and learning
  more about the instruments and music from different regions of the United States.
