personas:
  professional: Yajaira Incera, a four-year-old who loves arranging crayons by color and leading group sing-along circles at preschool, they channel their methodical, compassionate nature into tiny project
    manager roles, eagerly planning play-dates and ensuring every friend feels included, though they sometimes fret if a schedule changes.
  sports: Yajaira Incera, a four-year-old who energetically joins the San Bernardino Little League T-ball team, they practice batting with a plastic bat and love cheering for the Los Angeles Dodgers on
    game days, prefer group drills and mini-races over solitary exercises, and always remind their teammates to share the ball.
  arts: Yajaira Incera, a four-year-old who swirls crayons to recreate the vibrant papel picado patterns they see at family celebrations, delights in listening to the folk tunes of Los Tigres del Norte
    and the playful melodies of Raffi, and eagerly imitates their favorite cartoon characters by drawing them on construction paper, though they often insist on adding a glittery sparkle to every masterpiece.
  travel: Yajaira Incera, a four-year-old who loves family road trips that combine a visit to Legoland California with a picnic by Lake Arrowhead, they enjoy the anticipation of packing their favorite stuffed
    animal and a small snack, prefer itineraries planned by their parents yet get thrilled when an unexpected detour leads to a street-side ice-cream stand, and they dream of exploring the turquoise waters
    of Cancun someday.
  culinary: Yajaira Incera, a four-year-old who adores soft corn tacos filled with shredded chicken, mild cheese, and fresh cilantro, they proudly help grind cumin and mash avocado for guacamole using a
    child-safe mortar, savor sweet mango slices after meals, but constantly forget to wash their hands after playing with play-dough, prompting gentle reminders from their caregivers.
  core: Yajaira Incera, a four-year-old bundle of curiosity, they line up their stuffed animals by height, worry if a friend feels left out, hum a lullaby before bedtime, and insist on coloring within the
    lines even when the crayons are too small.
background:
  cultural: Yajaira is raised in a Mexican‑American household in San Bernardino, where Spanish is spoken at home alongside English. Family gatherings feature traditional foods like tacos, tamales, and horchata,
    and celebrations such as Día de los Muertos and Mexican Independence Day are marked with colorful decorations, music, and stories of ancestors. Her grandparents often share folk tales and lullabies
    in Spanish, fostering a deep sense of cultural pride and community belonging. The close‑knit "familia" dynamic emphasizes respect, hospitality, and caring for others—values that reinforce Yajaira's
    compassionate and cooperative nature. Community events in the local Hispanic neighborhood provide opportunities for group dances, pottery workshops, and shared meals, further integrating cultural traditions
    into her daily life.
attributes:
  skills: '["early literacy (letter recognition and simple storytelling)", "basic counting (1‑10)", "bilingual communication (English/Spanish)", "fine‑motor coordination (cutting, drawing, puzzle assembly)",
