    community festivals"]'
  career_goals: Even at age four, Yajaira imagines a future where she can help people and solve everyday problems. She talks about becoming a teacher who reads to children, a doctor who makes people feel
    better, or a community helper who organizes events for families. Her curiosity drives her to ask many "why" questions, while her practical side wants to see tangible outcomes, so she envisions a career
    that blends learning new ideas with caring for others and keeping things organized.
