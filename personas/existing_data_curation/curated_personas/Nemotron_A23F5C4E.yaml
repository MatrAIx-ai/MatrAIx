personas:
  professional: Jeremy Ortego, a budding LEGO architect and amateur nature journalist, blends curiosity about machines with practical building skills, turning backyard discoveries into intricate brick constructions
    while thriving on the flexibility of spontaneous play.
  sports: Jeremy Ortego loves speeding down the town’s sledding hill at Silver Lake in winter, spends weekends ice skating at the community rink where they cheer for the Milwaukee Brewers and the Green
    Bay Packers during televised games, and plays forward for the Eau Claire Youth Soccer Club, preferring the freedom of running through the park over rigid drills.
  arts: Jeremy Ortego delights in drawing comic strips reminiscent of Bill Watterson’s Calvin and Hobbes, spends quiet afternoons humming Disney classics like ‘Let It Go’ from Frozen, and eagerly attends
    the Eau Claire Arts Festival to admire handcrafted pottery and live folk music by artists such as Gillian Welch.
  travel: Jeremy Ortego enjoys family road trips that blend adventure and relaxation, having explored the Chippewa River’s boardwalks, visited the Great Lakes North Shore in Minnesota, taken a weekend trip
    to Chicago’s Navy Pier, and dreaming of a future visit to the Grand Canyon’s rim, all while insisting on packing a well‑worn backpack of rocks and leaves as souvenirs.
  culinary: Jeremy Ortego prefers hearty comfort foods like cheese pizza with extra pepperoni and mac‑and‑cheese, loves butter‑drizzled popcorn and berry smoothies made with strawberries, blueberries, and
    a splash of honey, can confidently assemble a peanut‑butter‑jelly sandwich on their own, yet sometimes over‑salts their scrambled eggs, reflecting a budding yet experimental palate.
  core: Jeremy Ortego is a quiet‑minded explorer who builds towering LEGO cities with a mis‑placed habit of losing the tiniest bricks under couch cushions.
background:
  cultural: Jeremy lives in Eau Claire, Wisconsin, a Midwestern city known for its close‑knit community, seasonal outdoor traditions, and a blend of rural and small‑town values. His family participates
    in local celebrations like the Eau Claire Fall Fest and winter activities such as ice skating and sledding. He is raised with values of modesty, cooperation, and respect for nature, reflecting the region’s
    emphasis on community involvement and appreciation for the surrounding lakes and forests.
attributes:
  skills: '[''basic reading'', ''counting and simple addition'', ''building with LEGO bricks'', ''drawing and coloring'', ''using age‑appropriate science kits'', ''navigating local nature trails'', ''participating
