  hobbies: '[''exploring local woods and riverbanks'', ''collecting rocks and leaves'', ''birdwatching'', ''building LEGO sets'', ''drawing and coloring'', ''reading picture books about nature and inventions'',
    ''playing educational video games'', ''small‑group playdates'']'
  career_goals: Jeremy dreams of becoming someone who makes new things that help people, such as a kid‑friendly inventor or an environmental explorer. He imagines building gadgets that protect the woods
    around Eau Claire, or working as a wildlife scientist who discovers ways to keep animals safe. His ambition is driven by his love for nature, his desire to solve problems, and his wish to contribute
    to his community.
