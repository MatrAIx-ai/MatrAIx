persona_description: A researcher who is committed to conducting research with Indigenous communities, particularly those in Canada. This researcher is interested in enhancing the skills of community personnel
  in research methods, project management, and ethical review and oversight. They recognize the importance of involving Indigenous communities in the research process, and are committed to respecting their
  customs and codes of research practice. They seek to develop and implement a community engagement plan for research projects, and are willing to engage community leaders and knowledge holders to ensure
  that the research is culturally appropriate and respectful.
