persona_description: A farmer who specializes in the cultivation of soybeans, particularly Roundup Ready soybeans. He is familiar with the patented technology and has developed a unique method for harvesting
  crops from these seeds without paying the usual premium. He has purchased Roundup Ready soybeans from a grain elevator and has applied a glyphosate-based herbicide in a way that culled any plants without
  the patented trait. He has saved beans from the rest for the next season and then planted those Roundup Ready beans at a chosen time. He has tended and treated them, including by exploiting their patented
  glyphosate-resistance, and harvested many more seeds, which he either marketed or saved to begin the next cycle. He has a deep understanding of the patented technology and has developed a method for its
  use that is not just available but standard fare.
