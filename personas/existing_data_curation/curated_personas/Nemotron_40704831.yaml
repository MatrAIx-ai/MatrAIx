  career_goals: Mary aims to become a certified medical assistant within the next year and then enroll in a registered-nurse program to qualify as an RN. She is motivated to take on supervisory responsibilities,
    aspiring to a patient flow coordinator or health services manager role in a community clinic. She seeks to deepen her expertise in health informatics, hoping to lead initiatives that streamline electronic
    record workflows and improve patient safety metrics. Her competitive drive pushes her to earn professional certifications such as Certified Nursing Assistant and Certified Clinical Medical Assistant,
    and to be recognized for high-quality patient support. Long-term, she envisions contributing to the design of efficient clinic operations while maintaining her calm, resilient approach.
