personas:
  professional: Kelly Hickox, a budding mechanical tinkerer, blends a love for LEGO models with early coding projects, tackling each design with methodical planning, balancing boundless curiosity and practical
    problem‑solving.
  sports: Kelly Hickox glides at the community ice rink with the junior figure skating club, idolizes the local NHL team the Iceville Blizzards, and spends weekends hiking nearby nature trails for birdwatching,
    using the physical activity to stay fit and satisfy their curiosity about wildlife.
  arts: Kelly Hickox devours mystery series like Nancy Drew and The Hardy Boys, sketches vivid illustrations of favorite detective scenes, and revels in the animation artistry of Hayao Miyazaki’s films,
    often recreating beloved moments using LEGO minifigures.
  travel: Kelly Hickox plans family trips with detailed checklists, has explored the lower Appalachian Trail, dreams of witnessing Yellowstone’s geysers and walking the ancient ruins of Machu Picchu, preferring
    hands‑on birdwatching excursions over lengthy flights.
  culinary: Kelly Hickox enjoys making cheese‑filled quesadillas, peanut‑butter banana sandwiches, and LEGO‑shaped cookies, favors crunchy carrots with hummus as snacks, and experiments with a child‑friendly
    sushi roll kit under parental guidance, always aiming for a tidy kitchen despite a habit of leaving LEGO pieces scattered.
  core: Kelly Hickox is a methodical ten‑year‑old who unites curiosity and practicality through LEGO engineering, coding, birdwatching, and figure skating, while meticulously managing a modest allowance
    and indulging in mystery novels.
background:
  cultural: Kelly comes from a White, Midwestern family rooted in the small‑town community of Mount Morris, Michigan. Her upbringing reflects the region’s emphasis on family cohesion, community participation,
    and a respect for practical skills. She celebrates local traditions such as the county fair, Fourth of July fireworks, and seasonal community service events. The values of reliability, teamwork, and
    an appreciation for both innovation and tradition shape her outlook and daily life.
