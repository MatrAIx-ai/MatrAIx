persona_description: A researcher and scientist who is interested in the impact of hypoxia on the shrimp fishery in the Northwest Gulf of Mexico, particularly in understanding how hypoxia affects the harvest
  and economic dynamics of the fishery. They are also interested in linking the interests of those charged with managing the nutrient load to coastal watersheds and those charged with managing coastal fishery
  resources. The persona is knowledgeable about the effects of hypoxia on the ecosystem's ability to support brown shrimp, habitat loss, and the impacts of hypoxia on the fishery sector. They are interested
  in developing a bioeconomic model of the shrimp fishery that can be used to assess the economic consequences of alternative nutrient and fishery management policies.
