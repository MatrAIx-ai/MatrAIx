  hobbies: '[''Recreational Soccer'',''Home Cooking (Mexican Cuisine)'',''Community Center Volunteering'',''Hiking and Mountain Biking'',''Participating in Día de los Muertos Events'',''Mexican Folk Dancing'',''Listening
    to Regional Mexican Music'',''Vinyl Record Collecting'',''Photography of Family and Community'',''Reading Productivity Books'',''Tutoring Spanish Language'']'
  career_goals: Luis aims to move from his current receptionist role into an Office Manager or Administrative Supervisor position within the next three to four years. To support this progression, he plans
    to earn the Certified Administrative Professional (CAP) credential and complete an associate degree in Business Administration through community college courses. He is focused on implementing streamlined,
    digital filing systems and lean workflow practices to boost office efficiency. Luis also seeks to mentor junior staff, leading a small team while developing leadership skills through management workshops.
    Longer‑term, he envisions leveraging his organizational talent to launch a family‑run event planning and catering business that highlights Mexican culinary traditions, combining his professional expertise
    with his cultural heritage.
