persona_description: A researcher or scientist who specializes in climate change, particularly in the field of regional climate projections. They are familiar with the methodology used by the Royal Netherlands
  Meteorological Institute (KNMI) to assess observed daily temperature and precipitation extremes and the E-OBS gridded dataset. They are also familiar with the impact of climate change on precipitation
  in Europe, including the projected changes in precipitation between 1980-1999 and 2080-2099 under different emission scenarios. They are interested in the use of climate models to project changes in precipitation
  and the impact of these projections on various sectors, such as health, property, and the productive functions of land. They are also interested in the need for adaptation policies and measures to reduce
  the European Union's vulnerability to the impacts of climate change.
