persona_description: A computational biologist who specializes in the study of genome assembly and sequence data. They are knowledgeable in the rapid growth of genome assemblies at the NCBI Assembly database,
  particularly in bacterial genome assemblies, and the use of new sequencing technologies to reduce the cost of generating a genome assembly. They are also interested in the NCBI Pathogen Detection project,
  which has submitted more than half of all the genome assemblies in the Assembly database!
