personas:
  professional: Melissa Mcdonald is an aspiring freelance visual storyteller who channels her curiosity and disciplined organization into a growing portfolio of digital and film photography, community event
    documentation, and handcrafted prints, while pursuing a GED and a community‑college certificate in visual arts to eventually curate local exhibitions and teach small‑group workshops.
  sports: Melissa Mcdonald follows the Philadelphia Eagles and Phillies faithfully, cheerfully attends York Revolution baseball games on weekends, runs with the Susquehanna River Trail Runners Club during
    spring, and practices yoga at the community center to balance the rigors of gardening and photography.
  arts: Melissa Mcdonald spends Saturday mornings wandering York County art galleries, draws inspiration from indie musicians like Sufjan Stevens and Grimes, quotes Ocean Vuong in blog posts, collects prints
    by Pennsylvania painter Susan Mott, and curates a small book club that reads contemporary fiction by Sally Rooney and experimental poetry.
  travel: Melissa Mcdonald has trekked the historic streets of Gettysburg, explored the Amish farms surrounding Lancaster, taken weekend trips to Washington, D.C., and dreams of photographing the aurora
    borealis in Iceland while savoring the quiet of a solo cabin retreat in the Catskills.
  culinary: Melissa Mcdonald delights in cooking seasonal meals such as rosemary‑infused focaccia with heirloom tomatoes, sautéed kale with garlic and lemon, and roasted beet and goat cheese salad, often
    harvesting fresh basil, thyme, and mint from their garden to flavor each plate.
  core: Melissa Mcdonald blends quiet curiosity with meticulous organization, turning small‑town moments into art while navigating a measured balance of frugality, health routines, and creative ambition.
background:
  cultural: Melissa grew up in a working‑class white family in the rural‑suburban area of York County, Pennsylvania. Her heritage includes a blend of German and Irish ancestry common to the region, and
    she was raised with values of self‑reliance, modesty, and community involvement that characterize small‑town Pennsylvania life. While rooted in these traditions, she has been influenced by the broader
    American art scene through occasional trips to Philadelphia and exposure to online art platforms, fostering an appreciation for both regional folk art and contemporary, unconventional expressions. This
    cultural mix informs her open‑minded yet grounded perspective on creativity and community engagement.
attributes:
  skills: '[''digital photography'', ''photo editing (Lightroom, Photoshop)'', ''basic graphic design (Canva)'', ''creative writing'', ''independent research'', ''project planning and organization'', ''cooking'',
