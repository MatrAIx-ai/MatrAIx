  hobbies: '[''visiting art galleries'', ''nature hiking'', ''sketching'', ''reading contemporary fiction and poetry'', ''listening to indie/experimental music'', ''film photography'', ''herb and vegetable
    gardening'', ''cooking seasonal meals'', ''small book clubs'', ''community craft workshops'', ''maintaining a personal blog'']'
  career_goals: Melissa plans to obtain her GED within the next year and then enroll in a community‑college certificate program focused on visual arts or photography. Her long‑term ambition is to transition
    to a freelance creative career, offering photography services for local events, selling prints and handcrafted items through an online shop, and eventually curating community art exhibitions at the
    York County cultural center. She also hopes to develop a modest teaching role by leading small‑group workshops on photography and creative writing, thereby combining her passion for art with a desire
    to give back to her community.
