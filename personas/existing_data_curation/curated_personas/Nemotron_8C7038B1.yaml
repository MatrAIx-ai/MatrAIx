personas:
  professional: Andrea Ketcham, a meticulous payroll specialist with three decades of experience mastering ADP, QuickBooks and advanced Excel, leverages their methodical record‑keeping and regulatory expertise
    to streamline payroll processes while calmly mentoring junior staff and scouting emerging cloud‑based solutions for future consulting work.
  sports: Andrea Ketcham follows the Kentucky Wildcats basketball team and the Louisville Cardinals football squad with seasonal enthusiasm, participates in a local senior walking club that meets at the
    Owensboro Riverfront Park, and enjoys leisurely birdwatching hikes rather than competitive sports.
  arts: Andrea Ketcham paints delicate watercolors of native Kentucky wildflowers inspired by Monet and Georgia O'Keeffe, regularly attends performances at the Owensboro Community Theatre, enjoys podcasts
    like Radiolab and The Art History Gurus, and knits traditional Appalachian quilts while exchanging ideas at regional art fairs.
  travel: Andrea Ketcham prefers thoughtfully planned cultural trips, having visited the art museums of Florence, the historic streets of Savannah, and the Appalachian music festivals in Asheville, while
    favoring relaxed road drives through the Kentucky Bourbon Trail during weekends, always balancing travel costs with a modest retirement budget.
  culinary: Andrea Ketcham favors a blend of Southern comfort and Mediterranean freshness, often preparing bourbon‑glazed salmon, slow‑cooked collard greens, and herb‑infused rosemary focaccia using thyme
    and sage harvested from their garden; their cooking skill is solid but they sometimes forget to set kitchen timers during long painting sessions.
  core: Andrea Ketcham is a detail‑driven payroll guru whose curiosity fuels a vibrant artistic life, tempered by a tendency to worry and a love for quiet moments amid a garden of native blooms.
background:
  cultural: Andrea is a lifelong resident of Owensboro, Kentucky, raised in a white, Protestant (Baptist) community that values hard work, self‑reliance, and Southern hospitality. Her family’s roots trace
    back to the Appalachian region, influencing her appreciation for regional crafts, bluegrass music, and community festivals. She earned an associate’s degree in business administration from a local community
    college, reflecting the area’s emphasis on practical, accessible education. Andrea remains active in her church’s outreach programs and participates in the local historical society, blending traditional
    values with a genuine curiosity for new ideas and cultural experiences.
