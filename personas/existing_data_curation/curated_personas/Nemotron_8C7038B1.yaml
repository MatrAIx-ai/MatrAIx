  hobbies: '[''Watercolor painting'', ''Visiting art galleries'', ''Reading art history'', ''Gardening (native plants)'', ''Birdwatching'', ''Volunteer tutoring for seniors'', ''Community theater'', ''Podcast
    listening (history and philosophy)'', ''Travel to cultural festivals'', ''Knitting and quilting'']'
  career_goals: Looking ahead, Andrea aims to transition into a part‑time consulting role over the next few years, helping small businesses streamline their payroll systems while sharing her expertise through
    mentorship. She plans to earn a certification in a cloud‑based payroll platform such as Paycom to stay current with industry trends. Simultaneously, she hopes to volunteer her financial knowledge with
    local nonprofit arts organizations and to contribute to a community guide on best payroll practices for small employers. Her ultimate ambition is to achieve a balanced retirement that allows her to
    stay intellectually engaged and financially secure without the pressure of full‑time responsibilities.
