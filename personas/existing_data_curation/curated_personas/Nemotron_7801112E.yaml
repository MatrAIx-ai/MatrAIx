  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Reading poetry'', ''Gardening'', ''Cooking international dishes'', ''Volunteering at a senior center'', ''Meditation and yoga'', ''Walking
    nature trails'', ''Attending community theater performances'']'
  career_goals: Kristen aspires to move into a supervisory or management role within the hospitality sector, aiming to become a lead steward or floor manager at a restaurant that values community engagement.
    She dreams of eventually opening a small coffee shop that doubles as a local art gallery, merging her passion for service with her love of visual arts. To support this vision, she plans to complete
    her college coursework in art history or hospitality management, and to earn a certification in stress‑management techniques to better support both herself and her team. Volunteering as a mentor for
    younger hospitality workers and coordinating community art‑related events are also key ambitions.
