personas:
  professional: Kristen Milliron, a seasoned front‑of‑house leader with decades of hospitality experience, blends rapid order memorization, empathetic conflict resolution, and a talent for recommending
    local art attractions, while balancing meticulous organization with flexible mentorship of staff.
  sports: Kristen Milliron enjoys daily walks along the St. Lucie nature trails, participates in a senior walking club, and passionately follows the St. Lucie Mets and the Miami Heat, using these activities
    to temper her emotional reactivity.
  arts: Kristen Milliron frequents Port Saint Lucie's art galleries and community theater, paints watercolors inspired by Monet and Frida Kahlo, reads poetry by Maya Angelou, and finds solace in the unconventional
    narratives of contemporary visual art.
  travel: Kristen Milliron prefers carefully planned cultural getaways, having visited New Orleans for jazz, Barcelona for its architecture, and Savannah for its historic squares, while dreaming of a future
    trip to Kyoto's tea gardens, balancing adventure with budget constraints.
  culinary: Kristen Milliron experiments with international recipes, crafting dishes like saffron paella, homemade tamales, and citrus‑infused gazpacho, while relying on fresh basil, cumin, and a well‑stocked
    spice rack to bring world flavors into her modest kitchen.
  core: Kristen Milliron is a compassionate hospitality veteran whose artistic curiosity, anxiety‑driven caution, and love for community create a uniquely empathetic yet occasionally over‑cautious life
    approach.
background:
  cultural: Kristen comes from a white American background with roots in the Midwestern United States, where a close‑knit community ethos shaped her compassionate and cooperative nature. Relocating to Port
    Saint Lucie, Florida, she now lives amidst a vibrant mix of Southern, Caribbean, and Latin American cultural influences that permeate the local hospitality scene. This environment enriches her appreciation
    for diverse art forms, cuisines, and languages, while her upbringing continues to inform her values of reliability, organization, and heartfelt service to others.
attributes:
  skills: '[''Customer service'', ''Order memorization'', ''POS system operation'', ''Food safety and sanitation'', ''Conflict resolution'', ''Team training and mentorship'', ''Shift scheduling and management'',
