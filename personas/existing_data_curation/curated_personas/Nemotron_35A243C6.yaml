  hobbies: '[''Basketball'', ''Hiking'', ''Animal shelter volunteering'', ''Live music concerts'', ''Cooking soul-food'', ''Photography'', ''Community gardening'', ''Improv comedy'']'
  career_goals: He aims to establish a community-focused veterinary clinic in Passaic County that combines high-quality animal care with affordable services for underserved neighborhoods. Henry also plans
    to pursue a specialty certification in exotic animal medicine to broaden his clinical repertoire. Long-term, he hopes to contribute to research on zoonotic disease transmission and develop mental-health
    support programs for veterinary professionals, while mentoring aspiring vets from underrepresented backgrounds.
