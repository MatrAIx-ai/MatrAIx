persona_description: A researcher in the field of vaccine research, specifically focused on developing and evaluating oral ETEC vaccines. The individual is involved in conducting clinical trials to assess
  the safety, immunogenicity, and protective efficacy of the vaccine. They have expertise in vaccine development, particularly in the context of ETEC and have a strong background in immunology and microbiology.
  The persona is likely to be interested in presenting the results of the study at upcoming conferences, such as the Mucosal Vaccines, Adjuvants and Delivery Conference in Copenhagen, September 25-27 2013,
  and the 7th International Conference on Vaccines for Enteric Diseases, 6-8 November 2013 in Bangkok, Thailand.
