persona_description: A NASA engineer and aerospace scientist specializing in the development and testing of experimental units for manned spacecraft, particularly in the area of carbon dioxide and moisture
  removal. They have extensive experience with amine-based filter beds and have a keen interest in reducing the size and power requirements of these systems. They are responsible for troubleshooting and
  final performance tests of the CAMRAS unit on the International Space Station (ISS) and are working on plans for integration of the system on the Orion spacecraft.
