  career_goals: Nicholas aims to advance to a senior program director role where he can shape enterprise‑wide strategic initiatives that blend operational excellence with innovative, sustainability‑focused
    solutions. He aspires to mentor emerging project managers, champion a culture of continuous improvement, and lead large‑scale digital transformation projects that elevate Rochester’s regional competitiveness.
    Long‑term, he envisions establishing a consultancy that helps midsize companies adopt agile, design‑centric processes while preserving organizational harmony.
