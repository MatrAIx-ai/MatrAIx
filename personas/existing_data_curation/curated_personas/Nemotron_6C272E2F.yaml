personas:
  professional: Tomika Smith is a disciplined elementary scholar whose love for adventure novels fuels imaginative storytelling in class projects, while her competitive streak and organized nature make
    her the undefeated champion of the school chess club and a top performer in math challenges.
  sports: Tomika Smith channels her competitive spirit into weekly sessions with the Seattle Kids Soccer Club, cheering for the Seattle Sounders FC while practicing hip‑hop routines at the Beats & Moves
    dance studio, and she regularly orchestrates neighborhood capture‑the‑flag games where she leads the red team with the same strategic precision she applies on the playground.
  arts: Tomika Smith blends her love for piano—where she practices pieces by Ludovico Einaudi—with a voracious appetite for adventure series by Rick Riordan and J.K. Rowling, all while dancing to beats
    from Beyoncé and Kendrick Lamar and soaking up the storytelling of Pixar’s movies, making her a lively fixture at the community art fair.
  travel: Tomika Smith prefers family‑friendly itineraries that balance adventure and relaxation, having delighted in a road trip to the Grand Canyon’s rim, a week‑long stay at Disney World’s Magic Kingdom,
    and dreaming of a future visit to London’s British Library to see the original manuscripts of her favorite adventure tales.
  culinary: Tomika Smith enjoys a mix of kid‑friendly comfort foods like pepperoni pizza and chocolate chip cookies while proudly helping her mom roll sushi with cucumber and avocado, and she often adds
    an extra sprinkle of cinnamon to her strawberry‑banana smoothies, though she sometimes forgets to rinse the cutting board after chopping carrots.
  core: Tomika Smith is a hyper‑organized, talkative nine‑year‑old who transforms every adventure book into a strategic game plan, yet frequently misplaces her glasses and forgets to take her allergy medication
    before a backyard match.
background:
  cultural: Tomika is raised in a vibrant African‑American community in Houston, where she experiences a blend of Southern traditions and contemporary Black culture. Family gatherings often feature soulful
    gospel music, hearty Southern cuisine like collard greens and fried catfish, and storytelling that honors her ancestors. She participates in citywide Juneteenth celebrations and attends a local church
    that emphasizes service and community empowerment. These cultural influences nurture her strong sense of identity, collective responsibility, and pride in her heritage.
attributes:
  skills: '[''Organized planner management'', ''Fluent reading and strong comprehension'', ''Quick mental arithmetic (multiplication/division)'', ''Public speaking and class presentations'', ''Basic coding
    with Scratch'', ''Team coordination in soccer'']'
  hobbies: '[''Reading adventure books'', ''Playing piano'', ''Chess club'', ''Math competitions'', ''Hip‑hop and R&B dance workshops'', ''Organizing neighborhood game days'']'
  career_goals: Tomika dreams of becoming a STEM leader who can inspire other children, especially girls of color, to pursue science and technology. She envisions herself as a future aerospace engineer
    working with NASA, combining her love for space, problem‑solving, and teamwork. She also hopes to be a community mentor, using her organizational talents to run after‑school clubs that teach coding
    and collaborative projects. In the short term, she aims to win the school science fair and earn a spot on the varsity soccer team, proving that dedication and high standards lead to achievement.
