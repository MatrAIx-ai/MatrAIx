persona_description: A Renaissance Italian composer and opera theorist who made significant contributions to the development of Italian dramatic monody and the beginning of Western opera. His works include
  the opera Euridice and his contributions to the creation of the genre. He is particularly known for his association with the Medici court and his association with the Gonzagas in Mantua.
