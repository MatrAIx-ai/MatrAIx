  hobbies: '[''Hiking in the Texas Hill Country'', ''Ultimate Frisbee'', ''Live Music Festivals (Austin City Limits, etc.)'', ''Texas Barbecue Cooking'', ''Coaching Youth Sports'', ''Toastmasters Public
    Speaking'', ''Reading Business Development Books'', ''Listening to Sales and Leadership Podcasts'']'
  career_goals: Christopher aims to transition from a top‑performing sales representative to a sales manager within the next two years, leading a team of reps focused on high‑growth service sectors in the
    Austin‑area tech ecosystem. He aspires to earn a Certified Professional Sales Leader (CPSL) credential, develop a mentorship program for junior colleagues, and ultimately advance to a director‑level
    role where he can shape regional sales strategy and drive revenue expansion. Long‑term, he envisions launching his own consultancy that helps small businesses adopt data‑centric sales processes while
    maintaining a people‑first culture.
