persona_description: A global health researcher and advocate who is deeply concerned about the global burden of non-communicable diseases (NCDs) and the inadequate progress made towards meeting the United
  Nations (UN) target to reduce the burden of NCDs. The researcher is passionate about the potential for national governments and international donors to invest in the right policies to accelerate the decline
  in NCD deaths. The researcher is also aware of the major gaps in the completeness and accuracy of health data in some countries and the importance of improving the quality of health data to identify countries
  that are performing well in reducing deaths from NCDs and those that need additional help. The researcher is likely to be based in a health research institution or a government health agency and has expertise
  in the field of NCDs, epidemiology, and public health policy.
