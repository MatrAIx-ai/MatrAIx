  hobbies: '[''Co‑ed softball league'', ''Volunteer fire department equipment maintenance'', ''Classic‑car shows'', ''Vintage motorcycle rallies'', ''DIY woodworking and furniture restoration'', ''Barbecue
    cooking for community events'', ''Hiking Blue Mountain trails'', ''Jigsaw puzzles and crosswords'', ''Listening to classic rock'']'
  career_goals: Angle aims to earn ASE Master Technician certification and a specialized heavy‑equipment endorsement within the next two years. She plans to become a lead service technician, overseeing
    a team of mechanics at a regional equipment dealer, and to spearhead process‑improvement projects that boost workshop efficiency. Long‑term, she envisions opening her own mobile repair business that
    provides on‑site service for construction firms and small fleets across Lehigh County. She also hopes to establish a mentorship program that encourages more women to pursue skilled‑trade careers, positioning
    herself as a recognized top performer and respected leader in her field.
