personas:
  professional: Angle Jorge, a seasoned heavy‑equipment technician with 15 years of hands‑on experience diagnosing diesel engines, hydraulic systems and vehicle electronics, they apply a methodical, safety‑first
    mindset and a talkative, competitive edge to the workshop, mentoring junior mechanics while spearheading process‑improvement projects toward ASE Master Technician certification.
  sports: Angle Jorge fuels her competitive spirit by pitching for a local co‑ed softball league, cheering the Lehigh Valley IronPigs in summer and the Philadelphia Eagles in fall, and they hit the nearby
    Blue Mountain trails for weekend hikes that double as cardio endurance training.
  arts: Angle Jorge’s evenings often echo the riffs of Led Zeppelin, The Rolling Stones and Fleetwood Mac, they attend Classic Car Show jazz nights featuring saxophonist Kenny G, and sketch vintage motorcycle
    silhouettes for personal art projects inspired by old‑school Americana.
  travel: Angle Jorge prefers meticulously planned road trips that combine vintage‑car rally stops in Monterey, California and historic bike festivals in St. Maurice, France, with occasional spontaneous
    weekend escapes to the Adirondacks for fishing, and they balance a tight budget for their future mobile‑repair business with a love for open‑road freedom.
  culinary: Angle Jorge excels at smoking a 12‑hour brisket seasoned with paprika, brown sugar and coffee grounds, mastering a custom wood‑chip blend of hickory and apple, and they host neighborhood barbecues
    featuring pulled‑pork tacos, coleslaw, and craft IPA pairings while still daring to experiment with a spicy Korean‑inspired kimchi slaw side.
  core: Angle Jorge blends a razor‑sharp, competition‑driven work ethic with an effortless knack for rally‑track banter, a steady habit of over‑cooking ribs for friends, and a relentless disdain for paperwork
    delays, and they remain remarkably calm under pressure.
background:
  cultural: Angle grew up in the Lehigh Valley of Pennsylvania, a region with a strong industrial and manufacturing heritage. She is of White European descent, with family roots tracing back to German and
    Irish ancestors common in the area. Raised in a working‑class suburb of Allentown, she internalized values of hard work, practicality, and community involvement. Local traditions such as town festivals,
    farmers’ markets, and the proximity to Amish communities have given her an appreciation for both industriousness and modest, grounded lifestyles, while her social nature aligns with the region’s close‑knit
    neighborhood culture.
attributes:
  skills: '[''Automotive diagnostics'', ''Heavy equipment repair'', ''Hydraulic system maintenance'', ''Diesel engine overhaul'', ''Transmission repair'', ''Technical schematics interpretation'', ''Computerized
