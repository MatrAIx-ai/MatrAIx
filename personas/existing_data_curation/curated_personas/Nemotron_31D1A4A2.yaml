  hobbies: '["Abstract painting", "Digital illustration", "Reading science fiction and literary classics", "Crossword and logic puzzles", "Formal garden design and maintenance", "Genealogy research", "Piano
    (classical repertoire)", "Volunteer teaching computer basics to seniors", "Small interdisciplinary book club"]'
  career_goals: Although retired from formal employment, Amanda is driven to remain intellectually active. She aims to publish a memoir that intertwines her scientific career with her artistic reflections,
    to produce a series of interdisciplinary articles that bridge STEM and the visual arts, and to mentor emerging women scientists through community workshops and scholarship initiatives. Additionally,
    she aspires to curate a local exhibition that showcases the convergence of science and Southern folk art, preserving her legacy while fostering appreciation for both fields.
