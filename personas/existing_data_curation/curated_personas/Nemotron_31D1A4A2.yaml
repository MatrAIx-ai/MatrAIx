personas:
  professional: Amanda Habecker, a retired data-driven scientific researcher, integrates her meticulous project-management and grant-writing prowess with an imaginative flair for visual storytelling, guiding
    interdisciplinary studies that she documents in crystal-clear technical papers while dedicating patient, one-on-one mentorship to emerging women scientists.
  sports: Amanda Habecker maintains low-impact fitness through daily garden walks, weekly senior yoga at the Savannah Senior Wellness Center, and spirited games with the local Savannah Senior Pickleball
    Club, all while loyally cheering the Atlanta Braves and the Georgia Bulldogs during baseball and college football seasons.
  arts: Amanda Habecker translates her scientific mind into abstract canvases reminiscent of Jackson Pollock's kinetic energy and Georgia O'Keeffe's botanical intimacy, creates digital illustrations that
    echo Claude Monet's shimmering palettes, captures still-life photographs of garden light, and at dusk practices the Romantic piano works of Frédéric Chopin and Clara Schumann, often while discussing
    Jane Austen with her book-club friends.
  travel: Amanda Habecker favors meticulously planned, small-group cultural journeys, having revisited the historic charm of Savannah and the vibrant music scene of New Orleans, explored Kyoto's temples
    on a guided tour, and now dreaming of a leisurely Dalmatian Coast cruise, always budgeting for accessible accommodations and a pace that accommodates her mobility needs.
  culinary: Amanda Habecker enjoys moderate-skill Southern cooking, crafting dishes such as shrimp and grits seasoned with fresh basil, smoked paprika, and heirloom tomatoes, simmering hearty gumbo with
    okra and andouille sausage, and occasionally indulging in saffron risotto and pecan pie, while savoring a cup of Earl Grey tea to accompany her meals.
  core: Amanda Habecker blends rigorous scientific discipline with boundless artistic imagination, channeling meticulous organization and a penchant for worry into a lifelong pursuit of interdisciplinary
    creation, mentorship, and cultivated solitude.
background:
  cultural: Amanda was raised in mid‑century Salisbury, North Carolina, within a predominantly white, Protestant community where education, church involvement, and community service were core values. Her
    family emphasized self‑reliance, modesty, and a deep respect for local history and Southern folklore, encouraging her to pursue higher education at a time when few women entered STEM fields. The cultural
    heritage of the American South—its hospitality, reverence for place, and strong work ethic—shapes her reserved demeanor, organized approach to life, and enduring connection to regional traditions.
attributes:
  skills: '["Statistical analysis", "Scientific research design", "Technical writing", "Project management", "Grant writing", "Mentoring and tutoring", "Data visualization", "Python programming", "Digital
