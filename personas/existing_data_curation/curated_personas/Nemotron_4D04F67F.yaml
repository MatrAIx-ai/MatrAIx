  hobbies: '[''street photography'', ''attending art galleries'', ''open‑mic nights'', ''softball league'', ''board‑game meetups'', ''woodworking projects'', ''home cooking experiments'', ''hiking local
    trails'', ''improv comedy workshops'', ''listening to art & technology podcasts'']'
  career_goals: Philip aims to turn his passion for art and community engagement into a sustainable venture. His primary goal is to open a modest community art hub in Edmond that offers workshops, pop‑up
    exhibitions, and collaborative projects. To support this, he plans to earn a certification in event planning and take introductory graphic design courses at a local community college while completing
    his GED. He also hopes to develop a freelance photography and social‑media content business serving nearby small businesses. Long‑term, Philip envisions mentoring youth through arts programs, organizing
    a competitive amateur softball league, and traveling to major art festivals to draw fresh inspiration for his local initiatives.
