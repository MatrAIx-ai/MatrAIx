persona_description: A beverage company executive who is responsible for managing the environmental impact of their products and is committed to reducing carbon emissions. They are aware of the complexities
  involved in calculating and reporting carbon footprints and are willing to take steps to reduce their company's carbon footprint. They are also interested in promoting low-carbon products and are willing
  to invest in technologies that can help reduce emissions. They are aware of the potential for marketing claims to be backed by fuzzy numbers and dubious assumptions and are committed to using accurate
  and transparent information to communicate their company's environmental impact.
