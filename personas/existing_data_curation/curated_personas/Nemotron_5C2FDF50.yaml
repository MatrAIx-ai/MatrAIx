  hobbies: '["Backyard gardening", "Reading historical biographies", "Fishing at the pier", "Beach walks", "Cooking traditional South Asian cuisine", "Watching cricket", "Volunteering at a senior community
    center", "Playing chess", "Solving crossword puzzles"]'
  career_goals: Approaching retirement, Paresh aims to transition from day‑to‑day operational duties to a strategic advisory role, focusing on building a resilient security culture within mid‑size nonprofit
    organizations in South Florida. He plans to author a practical guide on incident response for healthcare providers, leveraging his competitive drive to set industry benchmarks. Additionally, Paresh
    seeks to formalize a mentorship program that pairs seasoned security professionals with emerging talent from underrepresented South Asian communities, ensuring his legacy of practical expertise endures.
