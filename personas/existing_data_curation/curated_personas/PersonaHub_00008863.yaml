persona_description: An art historian and archaeologist interested in the history of cartography and the geography of ancient Italy, particularly the Ptolemaic system and its influence on later geographical
  knowledge and mapping practices. They are particularly interested in the XV-century copy of a Ptolemaic map, which they believe could inspire later XVII-century copies and the Ptolemaic system itself.
  They are knowledgeable about plane and spherical trigonometry, geography, and the history of cartography. They are interested in the perspective and chromatism of the Ptolemaic map and its representation
  of the Italian peninsula.
