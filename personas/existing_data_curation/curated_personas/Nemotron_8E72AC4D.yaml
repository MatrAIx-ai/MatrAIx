personas:
  professional: David Lucy is a 32-year-old student-services counselor who fuses evidence-based career analytics with charismatic group facilitation, using their knack for crisis intervention and high-energy
    sociability to turn workshops into lively, data-driven coaching sessions.
  sports: David Lucy captains an intramural ultimate frisbee team called the Orlando Skybreakers, avidly supports Orlando City SC soccer, and dedicates weekend hikes in Wekiwa Springs State Park to maintain
    fitness, preferring high-energy group activities over solitary gym routines.
  arts: David Lucy frequents the Orlando Museum of Art, curates playlists featuring Tame Impala, Hozier, and local jazz quartet The Brass Beacon, and contributes blog essays on how music festivals can serve
    as informal therapy sessions, weaving their love for live performance into personal well-being.
  travel: David Lucy's travel style blends purposeful urban explorations with weekend nature getaways, having trekked the Blue Ridge Mountains, attended the New Orleans Jazz & Heritage Festival, and planning
    a tech-focused trip to Tokyo, all while budgeting trips through a dedicated travel savings account and using point-based airline rewards.
  culinary: David Lucy relishes Orlando's multicultural cuisine, often ordering a Korean-style bulgogi taco, savoring Ethiopian injera with berbere stew, and cooking cilantro-infused shrimp pad thai at
    home, while a semi-competent home chef experiments with Arduino-controlled sous-vide rigs for precise temperature control.
  core: David Lucy, a 32-year-old hyper-social career coach with a penchant for board-game hoarding, breath-work marathons, and the occasional anxiety-driven caffeine binge, turns every client interaction
    into a lively data-driven workshop.
background:
  cultural: David grew up in a middle‑class, suburban family in Central Florida, immersed in typical White American cultural traditions such as celebrating Thanksgiving, Fourth of July fireworks, and a
    strong emphasis on education and self‑reliance. The diverse, tourist‑rich environment of Orlando exposed him early to a mosaic of cultures, shaping his openness to different perspectives and his comfort
    in multicultural settings. His family valued practical achievement, encouraging him to pursue a STEM degree while also supporting his outgoing, community‑oriented nature. This blend of traditional American
    values and the vibrant, eclectic atmosphere of Orlando informs his balanced approach to career counseling—grounded in practicality yet eager to explore innovative, inclusive pathways.
attributes:
  skills: '["Career counseling", "Academic advising", "STEM curriculum guidance", "Psychometric testing interpretation", "Data‑driven career assessment", "Group workshop facilitation", "Public speaking",
    "Crisis intervention", "Emotional regulation strategies", "Project management", "Stakeholder collaboration", "Technology integration (career mapping software)", "Research and program evaluation", "Report
    writing"]'
  hobbies: '["Board‑game nights", "Intramural ultimate frisbee", "Volunteer tutoring", "Food tourism in Orlando", "Live music festivals", "Hiking in Florida state parks", "Yoga and mindfulness meditation",
    "Career advice blogging", "Arduino and maker projects", "Tech meetups"]'
  career_goals: David aims to become a senior director of student services at a university in the Orlando area, where he can shape campus‑wide career development programs. He plans to earn a master’s degree
    in counseling or educational psychology within the next three years to deepen his clinical expertise. He also aspires to develop a proprietary, analytics‑driven career‑path platform that personalizes
    guidance for diverse student populations. Ultimately, he hopes to mentor junior counselors, advocate for mental‑health awareness among young professionals, and launch a community‑focused career workshop
    series that blends practical skill‑building with creative exploration.
