  hobbies: '[''Reading (non-fiction)'', ''Acoustic guitar'', ''Hiking'', ''Craft brewery tours'', ''Personal blogging'', ''Volunteering at community food bank'']'
  career_goals: John aims to deepen his analytical expertise and eventually transition into a senior management analyst role or a business consultant position within a mid‑sized firm. He plans to enroll
    in a part‑time bachelor's program in Business Administration while pursuing certifications such as the Certified Business Analysis Professional (CBAP) and a Lean Six Sigma Green Belt. Over the next
    five years, he hopes to lead cross‑functional improvement projects, mentor junior analysts, and contribute to strategic planning initiatives that balance innovative ideas with proven practices. Long‑term,
    he envisions moving into an operations manager role where he can influence organizational culture and drive sustainable performance improvements.
