personas:
  professional: John Denison is a data‑driven management analyst who leverages advanced Excel, SQL, and Tableau skills to translate messy datasets into clear, actionable insights for small‑team strategy
    sessions, balancing their curiosity for new analytical methods with a practical, process‑focused mindset, and often volunteers to mentor junior analysts while maintaining a flexible schedule to accommodate
    their coursework.
  sports: John Denison fuels their love of the outdoors with weekly hikes in the Knobs Region and follows the Louisville City FC soccer team and the Kentucky Wildcats basketball squad, occasionally joining
    a local trail‑running club for weekend cardio, while preferring solitary trail time over crowded gym sessions.
  arts: John Denison spends evenings strumming acoustic guitar, mastering classic rock riffs from Jimi Hendrix and blues licks from Stevie Ray Vaughan, while regularly attending intimate live shows at Louisville’s
    Indie Spot venue and curating a personal blog that blends productivity hacks with occasional reviews of local art exhibitions.
  travel: John Denison plans low‑cost, spreadsheet‑organized road trips to destinations like the Red River Gorge and Nashville, preferring short, adventure‑focused getaways that allow them to explore natural
    scenery and local music scenes while keeping travel expenses within a tight budget and avoiding large tourist crowds.
  culinary: John Denison enjoys sampling the hoppy notes of local IPA brews such as Against the Grain’s Cyclops, complements them with homemade spicy chicken wings, and occasionally experiments with sous‑vide
    salmon, but their cooking skills remain modest, often relying on quick, recipe‑based meals after work.
  core: John Denison is a methodical data analyst who balances analytical curiosity with practical execution, channels discipline into both personal finance and fitness, and finds solace in solitary hikes,
    acoustic guitar, and small‑group brewery outings.
background:
  cultural: John grew up in a middle‑class family in the Louisville suburbs, steeped in the cultural traditions of the American South and the Midwest. His upbringing emphasized modesty, hard work, and community
    involvement, with regular exposure to local customs such as the Kentucky Derby, bourbon tasting, and bluegrass music. Although his family is primarily Protestant (Southern Baptist), they value religious
    tolerance and lifelong learning. The blend of urban and rural influences in Kentucky fostered his balanced outlook—respecting established practices while staying open to new ideas. This cultural milieu
    shapes his pragmatic curiosity, reserved demeanor, and appreciation for small‑group connections.
attributes:
