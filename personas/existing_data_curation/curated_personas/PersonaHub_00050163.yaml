persona_description: A mental health professional who works with at-risk youth and is passionate about promoting their wellbeing through the use of nature. They have experience in providing trainings and
  workshops that focus on developing an attuned relationship with the natural world, including the twin goals of introducing and including nature awareness programming in their work with at-risk youth.
  They are skilled in developing tools and practices for mindful awareness of the natural world and have a unique understanding of the beneficial effects of exposure to nature and the detrimental effects
  of its lack. They are dedicated to supporting the mental and emotional wellbeing of at-risk youth by integrating the presence of nature into their work.
