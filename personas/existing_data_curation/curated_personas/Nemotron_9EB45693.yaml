personas:
  professional: Joseph Wood is a budding junior architect who channels his love for LEGO building into developing spatial reasoning and systematic design skills, relying on his organized, methodical nature
    and collaborative spirit from soccer and Boy Scouts to lead group projects at school.
  sports: Joseph Wood thrives on the soccer field as a midfielder for the Riverside Cubs youth club, dives into weekly swim lessons at the community aquatic center, and passionately roots for the nearby
    professional baseball team, the Springfield Sluggers, while maintaining a disciplined weekly training routine.
  arts: Joseph Wood immerses himself in adventure stories by author Rick Riordan, loses himself in the animated series 'Adventure Time', hums along to the upbeat tracks of Imagine Dragons, and admires the
    colorful LEGO stop-motion videos of filmmaker Nathan Sawaya.
  travel: Joseph Wood eagerly anticipates family road trips to Yellowstone National Park, enjoys weekend camping hikes in the Appalachian Mountains with his Boy Scout pack, and dreams of visiting Tokyo
    Disneyland and the Great Barrier Reef during future school breaks.
  culinary: Joseph Wood loves helping in the kitchen by assembling mini pizzas topped with mozzarella, pepperoni, and sliced bell peppers, stirring chocolate chip cookie dough, and preparing classic grilled
    cheese sandwiches on sourdough bread, while his favorite snack is carrot sticks with hummus.
  core: Joseph Wood is a routine-loving, energetic nine-year-old who blends methodical LEGO engineering with a big heart for teamwork, often juggling an over-full piggy bank and occasional forgetfulness
    about his allergy meds.
background:
  cultural: Joseph is a white American boy raised in Columbia, Maryland, a suburban community in Howard County. His household reflects mainstream middle‑class American values, celebrating holidays such
    as Thanksgiving, Independence Day, and Christmas. He attends a local public elementary school where diversity is present, but his family’s cultural practices are rooted in typical U.S. suburban life,
    emphasizing community involvement, school participation, and outdoor recreation. The local cultural environment includes a mix of regional traditions, sports enthusiasm, and civic events that shape
    his everyday experiences.
