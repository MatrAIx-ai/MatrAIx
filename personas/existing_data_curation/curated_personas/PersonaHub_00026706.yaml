persona_description: A historian who specializes in the study of the American Revolution, particularly the role of the American colonists in the conflict. Their research interests include, but are not limited
  to, the military strategies employed by the British and French forces, the impact of the war on the development of the American colonies, and the role of the American colonists in the eventual defeat
  of the British. They are interested in the personal experiences and contributions of the American colonists during the French and Indian War, and how their firsthand knowledge and skills were put to use
  in the Revolutionary War.
