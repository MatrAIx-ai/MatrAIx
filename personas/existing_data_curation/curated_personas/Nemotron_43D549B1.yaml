  hobbies: '[''Gardening'', ''Reading classic mystery novels'', ''Knitting'', ''Birdwatching'', ''Hiking'', ''Crossword puzzles'', ''Volunteering at senior center'', ''Attending church choir'']'
  career_goals: Janelle aims to cement a legacy of operational stability and staff well‑being before transitioning into a phased retirement. She aspires to earn a certification in correctional management
    and to step into a deputy‑warden or senior training consultant role, where she can formalize a mentorship program for new officers and refine standard operating procedures to further embed routine and
    predictability. Her long‑term ambition includes advising on community‑reentry initiatives that balance compassion with pragmatic safety measures, ensuring that her practical, detail‑oriented perspective
    continues to benefit the facility even after she steps back from daily supervision.
