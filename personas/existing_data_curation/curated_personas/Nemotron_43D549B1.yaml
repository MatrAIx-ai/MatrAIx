personas:
  professional: Janelle Mills, a seasoned correctional operations supervisor with over thirty years of experience, leverages meticulous scheduling, budget oversight, and step‑by‑step crisis de‑escalation
    protocols to create a predictable, low‑stress environment for staff, while mentoring officers with a reserved yet assertive style that values routine and practical safety.
  sports: Janelle Mills, who enjoys low‑impact fitness like weekly hikes in the Columbia River Gorge and birdwatching walks, is a faithful supporter of the Seattle Seahawks and follows the Portland Trail
    Blazers, while participating in a small community walking club that blends gentle exercise with social routine.
  arts: Janelle Mills immerses herself in the structured creativity of classic mystery novels by Agatha Christie, knits intricate scarves to soothing folk tunes, and joins her church choir, where she particularly
    cherishes singing hymns accompanied by a cello solo of Bach’s Cello Suites.
  travel: Janelle Mills prefers meticulously planned, low‑key travel experiences, such as organized tours of the Oregon Coast and the historic gardens of Savannah, Georgia, and dreams of a quiet, off‑season
    visit to the Grand Canyon where she can follow a set itinerary without surprise crowds.
  culinary: Janelle Mills, an adept home cook, delights in turning garden‑grown tomatoes and rosemary into a hearty tomato‑basil soup or a classic roasted chicken, while her knitting evenings often feature
    a side of warm apple pie spiced with cinnamon from her pantry.
  core: Janelle Mills blends a steadfast devotion to routine with a quietly compassionate heart, balancing meticulous professional order, cautious financial planning, and a love for solitary, structured
    hobbies that keep her grounded amid life’s uncertainties.
background:
  cultural: Janelle is a White American who grew up in a stable, middle‑class family in Oregon, shaped by the Pacific Northwest’s values of self‑reliance, modesty, and a deep respect for nature. Her upbringing
    emphasized a Protestant work ethic, routine family gatherings around holidays like Thanksgiving, and participation in community and church activities. These cultural influences reinforce her practical
    outlook, preference for orderly environments, and a sense of responsibility both at home and in her professional role. Living in Gresham, Multnomah County, she identifies with the region’s blend of
    suburban community life and easy access to the outdoors, integrating these elements into her daily rhythm and personal pursuits.
attributes:
  skills: '[''Leadership'', ''Staff Supervision'', ''Conflict Resolution'', ''Crisis De‑escalation'', ''Emergency Response Planning'', ''Risk Assessment'', ''Budget Management'', ''Scheduling'', ''Regulatory
