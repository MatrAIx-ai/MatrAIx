personas:
  professional: Jimmy Bourret is an aspiring junior engineer who constructs intricate LEGO creations, experiments with simple Scratch games, and approaches each project with a balance of curiosity and practicality,
    they stay organized yet flexible enough to improvise new designs whenever inspiration strikes.
  sports: Jimmy Bourret plays midfield for the Riverdale Rangers youth soccer club and cheers for the Seattle Sounders FC during the MLS season, they also join the school’s spring track team and root for
    the hometown baseball team, the Portland Pilots, on weekends.
  arts: Jimmy Bourret draws comic strips inspired by Calvin and Hobbes and the sci‑fi adventures of Star Wars, they enjoy listening to Imagine Dragons while building LEGO sets, and they collect vintage
    LEGO minifigures as a creative hobby.
  travel: Jimmy Bourret spends free time hiking the trails of Redwood National Park and exploring the local science museum, they dream of a family road trip to the Grand Canyon and hope to participate in
    a school exchange program to Japan someday.
  culinary: Jimmy Bourret loves homemade pepperoni pizza with extra mozzarella and often snacks on trail mix containing almonds and dried cranberries, they can make a decent grilled cheese sandwich and
    frequently help harvest fresh tomatoes from the community garden for their meals.
  core: Jimmy Bourret is a curious, organized 10‑year‑old who balances LEGO engineering, soccer, coding, and community gardening, they often leave comic panels unfinished as a quirky habit.
background:
  cultural: 'Jimmy is raised in a predominantly white, middle‑class family in Milford, Ohio, a small city in Hamilton County. His upbringing reflects typical Midwestern values: a practical, modest outlook,
    a strong sense of community, and self‑reliance. He attends a local public elementary school, participates in after‑school programs such as community fairs, youth sports leagues, and church youth groups.
    Family traditions include weekend trips to nearby state parks, supporting local high‑school sports events, and holiday gatherings that emphasize hospitality and togetherness.'
