personas:
  professional: April Price, a 21‑year‑old residential real‑estate broker in Latah County, leverages data‑driven market analysis, meticulous contract compliance, and compassionate negotiation to close deals
    and nurture a trusted referral network; they balance structured organization with empathetic client care to build a reputation for reliability.
  sports: April Price regularly hikes the Palouse foothills with the Palouse Trails Club, follows the Idaho Vandals basketball team and the Seattle Seahawks, and they supplement their outdoor routine with
    weekly yoga classes at a local studio to maintain flexibility and core strength.
  arts: April Price captures the rolling landscapes of eastern Washington with a Nikon D3500, drawing inspiration from Ansel Adams, and they unwind with contemporary novels by Celeste Ng, the folk‑indie
    sounds of The Decemberists, and host quarterly board‑game nights featuring Catan and Pandemic with close friends.
  travel: April Price plans trips on a detailed spreadsheet, favoring budget‑friendly road trips to the Oregon Coast and weekend ski adventures in Colorado, and they dream of a sustainable farming stay
    in Sweden and a photography expedition to Iceland’s volcanic terrain.
  culinary: April Price enjoys cooking farm‑to‑table meals such as roasted beet and goat‑cheese salad with fresh rosemary, hand‑made sourdough bread, and spiced quinoa bowls, and they demonstrate a moderate
    cooking skill level but occasionally over‑season dishes in enthusiastic experiments.
  core: April Price blends Idaho‑rooted practicality with modern ambition, juggling meticulous spreadsheets, sunrise hikes, and a penchant for perfecting DSLR shots while they occasionally over‑analyze
    contracts and procrastinate on paperwork.
background:
  cultural: April grew up in a white, middle‑class family in the Pacific Northwest, with ancestral roots tracing back to German and Scandinavian immigrants who settled the region. Her upbringing emphasized
    self‑reliance, community involvement, and an appreciation for the natural environment typical of rural Idaho. Family values highlighted modesty, hard work, and practical education, while exposure to
    mainstream American media and digital technology shaped her modern outlook. This blend of traditional Idaho culture and contemporary professional ambition informs both her personal and career choices.
attributes:
  skills: '[''Property valuation'', ''Market analysis'', ''Client relationship management'', ''Negotiation'', ''Sales cycle management'', ''MLS and listing platform usage'', ''Digital marketing'', ''Real
