  hobbies: '[''Hiking'', ''Landscape photography'', ''Gardening'', ''Cooking and baking'', ''Reading (real estate, personal finance, fiction)'', ''DIY home improvement'', ''Podcast listening (entrepreneurship,
    real estate)'', ''Board games with close friends'', ''Yoga and meditation'', ''Visiting local farmer’s markets'']'
  career_goals: April aims to become a top‑producing agent in Latah County and earn her broker’s license within the next three years. She wants to build a strong referral network focused on first‑time homebuyers
    and environmentally sustainable homes, achieving an annual sales volume of over $2 million. Long‑term, she plans to launch her own boutique real‑estate firm that integrates property management and renovation
    services, and she intends to complete a bachelor’s degree in Business Administration to deepen her strategic and financial expertise.
