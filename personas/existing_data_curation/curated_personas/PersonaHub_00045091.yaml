persona_description: A person who is responsible for developing and maintaining operating ground rules for timber harvesting operations in Alberta, ensuring that these rules are in compliance with federal
  legislation and requirements. They must be knowledgeable about the FMP and other higher level plans, as well as federal agencies such as the Department of Fisheries and Oceans and Environment Canada.
  They must have the ability to conduct regular reviews of the ground rules to fine-tune them and correct any inconsistencies or problems. They must also have the ability to regularly consider modifications
  that reflect the best and most current knowledge and tools available.
