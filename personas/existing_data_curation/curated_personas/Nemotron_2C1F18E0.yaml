  hobbies: '[''Intramural Basketball'', ''Soccer'', ''Strategy Board‑Game Nights'', ''Competitive e‑Sports'', ''Museum Volunteering'', ''Community‑Theater Acting'', ''Journaling'', ''Poetry Writing'', ''Mindfulness
