  career_goals: Marcus aims to secure a full‑time role that blends structure with people interaction, such as a project manager for a community arts nonprofit or a public relations coordinator at a local
    museum. He plans to obtain a Project Management Professional (PMP) certification within the next year to solidify his credentials. Long‑term, he envisions launching his own event‑planning consultancy
    focused on cultural festivals and mental‑health‑awareness events, leveraging his organizational strengths, sociable nature, and commitment to supporting community well‑being.
