    of junior aides'', ''Adaptability to electronic health record systems'', ''Facilitation of group activities for clients'']'
  hobbies: '[''Adult basketball league'', ''Hiking in the Adirondacks'', ''Fishing on Saratoga Lake'', ''Volunteering at church senior ministry'', ''Grilling and cooking'', ''Classic car restoration'',
    ''DIY home improvement projects'', ''Visiting historic sites'', ''Reading biographies of medical innovators'']'
  career_goals: Jack aims to earn his Certified Nursing Assistant (CNA) credential within the next year, followed by enrollment in an LPN program and eventually a BSN to become a registered nurse. In the
    short term, he seeks a care‑coordinator position within his home‑health agency, where he can design individualized care plans and mentor junior staff. Long‑term, he envisions starting a family‑run home‑care
    business that emphasizes culturally sensitive, high‑quality service for seniors in Saratoga County, while also attaining specialized certifications in geriatrics and dementia care to broaden his expertise.
