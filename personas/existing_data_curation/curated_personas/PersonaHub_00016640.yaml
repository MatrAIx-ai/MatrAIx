persona_description: A conservation biologist who specializes in the study of bird species, particularly those found in the Pacific Islands. They are interested in the status and conservation status of
  the Zosterops samoensis, a bird species that is poorly known and has a Vulnerable Red List category. They are also interested in the threats facing the species, such as habitat loss and the impacts of
  slash-and-burn cultivation and black rats. They are likely to be involved in research projects aimed at monitoring the population size, distribution, and ecology of the species, as well as in conservation
  actions proposed to protect the species.
