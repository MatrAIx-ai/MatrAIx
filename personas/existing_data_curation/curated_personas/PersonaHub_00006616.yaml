persona_description: A mechatronics technician who is highly skilled in the design, development and maintenance of automatic and miniaturised assemblies, with a keen interest in technological developments
  and a desire to improve upon existing systems. They have a curious mind and are always on the lookout for ways to keep abreast of technological advancements, and their knowledge of English technical jargon
  enables them to constantly expand their knowledge. They are confident IT users, with solid experience in the use of computer-aided design software and sound knowledge of the tools used for computer-aided
  manufacturing design and computer-aided group technology. They may work for a car manufacturer, in a repair workshop or garage, in the R&D department of an industrial or transportation company, or with
  subcontractors in the aeronautics industry. Their working hours are generally regular.
