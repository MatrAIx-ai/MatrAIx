persona_description: A scientist who studies the effects of genetic factors on weight loss and metabolism, focusing on the genes fatty acid binding protein 2, peroxisome proliferator-activated receptor
  gamma, and beta 2 adrenergic receptor. She is interested in the role of these genes in energy balance and how they affect how people respond to diets. Her research is based on the Interleukin Genetics
  DNA test, which identifies specific genetic variations that affect how people metabolize food. She is a postdoctoral research fellow at Stanford University and has experience with the application of genetic
  testing to weight loss and metabolism.
