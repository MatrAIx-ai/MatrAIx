personas:
  professional: Elva Neely, a veteran coastal architect with three decades of experience, translates client visions into code‑compliant, storm‑resilient designs using Revit, AutoCAD and SketchUp, leads
    multidisciplinary teams with organized precision, mentors junior staff, and pursues emerging generative‑design workflows to keep her boutique practice at the cutting edge.
  sports: Elva Neely, a sunrise beach‑walker who incorporates weekly paddle‑boarding sessions at Kitty Hawk, participates in the local Kitty Hawk Female Runners Club, and passionately follows the Carolina
    Hurricanes and the North Carolina Tar Heels, balances low‑impact cardio with occasional beach volleyball matches.
  arts: Elva Neely, an enthusiastic sketcher of historic Outer Banks landmarks, draws inspiration from Ansel Adams' coastal photography and Winslow Homer's maritime paintings, attends performances by the
    North Carolina Symphony, and fills evenings with folk tunes by Joan Baez while sipping tea.
  travel: Elva Neely, a meticulous planner who prefers off‑season trips, savors weekend getaways to historic coastal towns like St. Augustine and Cape Cod, dreams of exploring Danish sustainable‑city design
    in Copenhagen and the volcanic landscapes of Iceland, and often books boutique inns that offer sea‑view balconies for sunrise birdwatching.
  culinary: Elva Neely, a confident home cook of Southern comfort cuisine, regularly prepares shrimp and grits, fried chicken with collard greens, and peach cobbler using locally sourced shrimp, fresh okra,
    and sweet potatoes, and experiments with slow‑cooked gumbo on weekends while occasionally indulging in a splash of hot sauce.
  core: Elva Neely blends disciplined architectural precision with a love of early‑morning shoreline walks, balancing meticulous budgeting and health routines while occasionally over‑scheduling weekend
    projects and hoarding seashells as trophies.
background:
  cultural: Elva was born and raised in the coastal communities of North Carolina and identifies with the region’s blend of Southern hospitality and maritime heritage. Though her family’s ancestry includes
    French-American roots reflected in the Beauregard name, her upbringing was firmly grounded in the modest, self-reliant culture of the Outer Banks. The close-knit community, reverence for the Atlantic
    shoreline, and the historic legacy of the Wright brothers have shaped her appreciation for practical craftsmanship, environmental stewardship, and collaborative community planning.
attributes:
  skills: '[''Architectural Design'', ''Coastal Resilient Design'', ''Sustainable Design'', ''Building Code Compliance'', ''Project Management'', ''BIM Modeling (Revit)'', ''AutoCAD Drafting'', ''Team Leadership'',
    ''Client Relations'', ''Site Analysis'', ''Historical Preservation'']'
  hobbies: '[''Coastal Walking'', ''Birdwatching'', ''Native Plant Gardening'', ''Maritime History Reading'', ''Architectural Sketching'', ''Photography'', ''Volunteer with Historical Society'', ''Cooking
    Southern Cuisine'', ''Woodworking'', ''Yoga'']'
  career_goals: She aims to consolidate her expertise in climate-adapted architecture by leading a boutique practice that focuses on resilient housing and small-scale community planning in the Outer Banks.
    Over the next five years, Elva plans to obtain fellowship status with the American Institute of Architects, publish a series of case studies on hurricane-proof design, and expand her mentorship program
    for emerging architects in the region. While she values a structured career path, she also seeks opportunities to incorporate emerging technologies such as generative design and advanced BIM workflows,
    ensuring her work remains both organized and adaptable.
