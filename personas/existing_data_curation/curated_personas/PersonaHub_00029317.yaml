persona_description: A historian and political scientist who specializes in the study of African American history, specifically focusing on the civil rights movement and its impact on American society.
  They are deeply interested in the legacy of Martin Luther King Jr., particularly his views on economic policy and his radical views on American capitalism. They are also interested in the intersection
  of race and economics, and how they are intertwined with issues of social justice and inequality. They have a strong understanding of King's speeches and writings and are knowledgeable about his life
  and work. They are passionate about advocating for a more equitable society and are committed to using King's legacy to inspire change.
