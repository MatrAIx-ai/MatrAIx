  hobbies: '[''Visiting art museums and galleries'', ''Attending theater performances'', ''Sketching and photography'', ''Reading classic literature and philosophy'', ''Writing poetry and essays'', ''Playing
    piano/organ'', ''Hiking in the Blue Ridge foothills'', ''Gardening'', ''Cooking experimental recipes'', ''Playing chess'']'
  career_goals: He aspires to become a senior pastor of a multi‑site congregation in the Charlotte region, renowned for innovative worship that weaves visual and performing arts into the liturgical experience.
    He aims to author a book exploring the intersection of theology and contemporary art, and to launch a community arts center affiliated with his church that offers classes, exhibitions, and therapeutic
    workshops. He also seeks to expand the church’s outreach to underserved neighborhoods, developing partnerships with local shelters and schools, and to serve on a regional council of clergy focused on
    interfaith collaboration and social justice.
