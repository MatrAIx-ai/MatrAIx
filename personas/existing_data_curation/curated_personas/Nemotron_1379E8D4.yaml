  hobbies: '[''Community volunteer work'', ''Pick-up basketball'', ''Fishing'', ''Hiking'', ''Custom PC building'', ''Playing guitar'', ''Attending local music festivals'', ''Board gaming'', ''Dungeons
    & Dragons'', ''Gardening'', ''Landscape photography'']'
  career_goals: Henry aims to formalize his expertise with industry certifications such as CompTIA A+, Network+, and Security+ within the next two years. He aspires to become the lead technician for his
    local school district or a small regional business, where he can mentor younger staff and shape a supportive technical environment. Long‑term, he dreams of opening his own community‑focused computer
    repair and consulting shop that offers affordable services, tech workshops, and a relaxed, customer‑friendly atmosphere. To manage his stress and tendency toward worry, he is also committed to adopting
    more structured workflows and time‑management practices, hoping to balance his flexible style with reliable processes.
