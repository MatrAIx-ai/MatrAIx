  career_goals: Ledale hopes to become a civil engineer or architect because he loves designing and organizing structures, and he also dreams of playing basketball at the college level, combining his competitive
    spirit with teamwork. He wants to use his planning skills to help his community create safe, well‑built neighborhoods.
