personas:
  professional: Tori Pettigrew is a budding comic‑strip creator who blends hand‑drawn fantasy characters with digital coloring, applying their organized yet imaginative mindset to school art projects, theatre
    scripts, and Scratch game prototypes.
  sports: Tori Pettigrew fuels their energetic spirit by joining the middle school cross‑country team, weekend hikes along the Shenandoah crest, and cheering for the Virginia Tech Hokies football and the
    Washington Capitals, while also playing in a local girls’ soccer clinic.
  arts: Tori Pettigrew immerses themselves in creative expression, sketching fantasy heroes in the style of artist Arthur Suydam, composing piano pieces inspired by folk tunes from local festivals, and
    performing in the school theatre club’s adaptation of "Alice in Wonderland".
  travel: Tori Pettigrew dreams of trading Shenandoah trail maps for the bustling streets of Tokyo for an anime convention, while also cherishing past road trips to Luray Caverns, a family weekend at the
    Blue Ridge Parkway, and an annual visit to Washington, D.C.’s Smithsonian museums.
  culinary: Tori Pettigrew enjoys whipping up fluffy pancakes with a dash of cinnamon, relishing homemade apple pie slices from their grandmother’s recipe, and snacking on sushi rolls they learned to roll
    at a summer art‑cooking camp, while still craving a slice of pepperoni pizza after a long art session.
  core: Tori Pettigrew is a bright, community‑oriented 12‑year‑old whose boundless imagination fuels a love for sketching, storytelling, and Lego building, all while staying responsibly organized, socially
    lively, and surprisingly calm under pressure.
background:
  cultural: Tori lives in Broadway, a small town in Shenandoah County, Virginia. Her family has deep roots in the region, blending Appalachian and Mid‑Atlantic traditions. She grew up attending community
    events such as the Shenandoah County Fall Festival and local farmers’ markets, where folk music, crafts, and storytelling are celebrated. Her parents place high value on education, community service,
    and creative expression, encouraging her to join school art programs, summer camps, and Girl Scouts. While she embraces the close‑knit, supportive atmosphere of rural Virginia, she also explores broader
    cultural influences through books, online art communities, and school exchange activities.
attributes:
  skills: '["Drawing and illustration", "Digital art (Procreate)", "Creative writing", "Basic piano playing", "Scratch programming", "Group project coordination", "Public speaking", "Conflict mediation",
