  hobbies: '["Reading fantasy and sci‑fi novels", "Sketching and drawing", "Digital art creation", "Comic strip writing", "Lego building", "Hiking and nature sketching", "School theatre participation",
    "Playing piano", "Scratch coding", "Volunteer reading program"]'
  career_goals: Tori aspires to become a professional visual artist or illustrator, dreaming of creating graphic novels, concept art for video games, or animated stories. She also envisions writing and
    illustrating her own books, blending narrative and image. Her short‑term goal is to attend a specialized art high school and later pursue a degree in fine arts, animation, or game design. Ultimately,
    she hopes to use her creativity to inspire others and lead community art projects that celebrate both imagination and the natural beauty of her hometown.
