  career_goals: Caroline aims to become a Licensed Veterinary Technician within the next year and plans to pursue specialized certifications in anesthesia and dental care. She hopes to earn a bachelor's
    degree in veterinary technology to open pathways toward a supervisory role, such as Lead Veterinary Technician or clinic manager. Long‑term, she envisions launching a community‑focused mobile veterinary
    service that brings preventive care to underserved neighborhoods in Colorado Springs, while also mentoring new techs and volunteering at local animal shelters.
