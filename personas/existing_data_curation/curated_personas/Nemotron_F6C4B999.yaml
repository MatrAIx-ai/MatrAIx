  career_goals: Helene aims to earn a bachelor’s degree in Business Administration or Arts Management within the next three years, positioning herself for a regional manager role in a retail or hospitality
    chain. In the long term, she aspires to open her own boutique café that doubles as a community art space, featuring rotating exhibitions and hands‑on workshops. She also seeks to mentor emerging professionals,
    champion inclusive workplace cultures, and become a recognized advocate for integrating local art into commercial venues.
