personas:
  professional: Helene Rizk, a 27‑year‑old retail manager in a bustling boutique on the outskirts of Memphis, leverages her people‑oriented management style, flexible scheduling, and knack for spontaneous
    social‑media campaigns to turn every store event into a community celebration, even if her desk often resembles a creative collage rather than a tidy spreadsheet.
  sports: Helene Rizk, an avid participant in the Great Smoky Mountains Hiking Club and a weekend player on a co‑ed softball league, proudly dons Memphis Grizzlies jerseys to games while cheering on the
    Tennessee Titans during football season, and finds balance by practicing sunrise yoga at the park three times a week.
  arts: Helene Rizk, who spends Saturday mornings sketching inspired by the bold street murals of Memphis and curating pop‑up exhibitions featuring works by contemporary artists like Kara Walker and Shepard Fairey,
    also unwinds by listening to blues legend Al Green and attending indie‑film screenings of directors such as Greta Gerwig.
  travel: Helene Rizk, a spontaneous traveler who prefers short road trips to the Appalachian foothills and weekend escapes to New Orleans for jazz, yet dreams of a month‑long cultural immersion in Oaxaca,
    Mexico, and keeps a habit of booking flights on a whim using a last‑minute‑deals app.
  culinary: Helene Rizk, an enthusiastic home cook who can whip up smoky Nashville‑style hot chicken, fragrant rosemary‑infused gnocchi, and a classic pretzel with just the right bite, balances her love
    for comfort food with a curiosity for global flavors like Thai basil pesto and Korean kimchi.
  core: Helene Rizk, a 27‑year‑old social‑butterfly with a penchant for last‑minute art projects, forgetful budgeting, and a habit of humming folk songs while restocking shelves, lives at the crossroads
    of Southern warmth and contemporary creativity.
background:
  cultural: Helene grew up in a small town in Tennessee, steeped in Southern hospitality and close‑knit community values. Her family heritage includes Anglo‑American and German roots, fostering an appreciation
    for traditional crafts, seasonal celebrations, and regional cuisine. While she embraces the down‑to‑earth culture of the South, her curiosity and exposure to university life have broadened her perspective,
    leading her to blend Southern warmth with a modern, artistic sensibility. She actively participates in local cultural events, supporting regional artists and community initiatives, and values the intersection
    of heritage and contemporary creativity.
