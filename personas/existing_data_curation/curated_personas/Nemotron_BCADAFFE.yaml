personas:
  professional: Owen Whitlock, a retired structural engineer with decades of experience in CAD‑driven design and data analysis, applies their meticulous, organized mindset to mentoring young engineers and
    coordinating community projects.
  sports: Owen Whitlock stays active by joining the Greenville Senior Walking Club for weekly morning strolls, playing seasonal pickleball at the community center, and cheering on the Carolina Panthers
    while following the Atlanta Braves during baseball season, all while occasionally volunteering as a scorekeeper for the local senior softball league.
  arts: Owen Whitlock, who finds solace in the works of William Faulkner and the folk rhythms of Johnny Cash, spends weekends photographing the historic homes of Campobello in an Ansel‑Adams‑inspired style
    and frequently attends community theater productions featuring local talent such as actress Maria Bennett.
  travel: Owen Whitlock, who plans trips with the same precision as their garden calendars, enjoys weekend road‑trips to historic towns like Savannah and Asheville, and dreams of a leisurely Mediterranean
    cruise along the Amalfi Coast, balancing their love for heritage sites with the need for comfortable, low‑impact travel.
  culinary: Owen Whitlock, an adept home cook, favors Southern comfort dishes such as shrimp and grits and collard greens seasoned with garden‑fresh heirloom tomatoes, rosemary, and smoked paprika, and
    delights in meticulously measured baked pies that reflect their disciplined engineering mindset.
  core: Owen Whitlock merges a lifelong engineer’s precision with a gardener’s patience, often lecturing chess opponents about structural integrity while occasionally forgetting to water their tomatoes
    during an engrossing woodworking session.
background:
  cultural: Owen was born and raised in the Upstate region of South Carolina, in a multigenerational family that traces its roots to small‑scale farms and textile mills of early 20th‑century Greenville
    County. He grew up steeped in Southern hospitality, church fellowship, and community celebrations such as the annual Grape Festival and Fourth‑of‑July parades. His upbringing emphasized respect for
    tradition, a strong work ethic, and the value of helping neighbors—a foundation that shaped his compassionate personality. While he identifies as White and has benefited from the cultural norms of the
    American South, Owen also embraces the region’s evolving diversity, actively supporting inclusive educational programs. He remains an active member of his Baptist church, participating in outreach ministries,
    and enjoys dishes like fried chicken, collard greens, and peach cobbler that connect him to his family’s culinary heritage. The blend of modest rural origins, a lifelong commitment to learning, and
    a deep sense of communal responsibility defines his cultural identity.
