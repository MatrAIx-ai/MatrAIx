  career_goals: Although officially retired, Owen is driven by a desire to leave a lasting, positive imprint on his community and the next generation of engineers. His primary ambition is to establish a
    local STEM mentorship program that pairs retired professionals with high‑school students in Greenville County, fostering curiosity while emphasizing practical problem‑solving. He also hopes to contribute
    his organizational expertise to the town’s historic preservation committee, ensuring that Campobello’s architectural heritage is documented and maintained. On a personal level, Owen aims to continue
    his lifelong learning through online courses in emerging technologies such as renewable energy systems, and to author a reflective memoir that blends his technical experiences with the values of compassion
    and service that have guided his life. Maintaining good health, supporting his spouse, and deepening his involvement in his church’s outreach activities round out his goals.
