  hobbies: '["Gardening", "Reading historical fiction", "Book club", "Knitting for charity", "Volunteer work at senior center", "Walking/hiking in historic neighborhoods", "Road trips with spouse", "Cooking
    and experimenting with recipes", "Puzzles (crosswords, jigsaw)", "Genealogy research"]'
  career_goals: Suzette aims to transition into a mentorship‑focused role within her agency, guiding newer agents while maintaining a curated portfolio of high‑value clients. She plans to earn the Certified
    Insurance Counselor (CIC) designation to deepen her technical expertise, develop a series of workshops on insurance and financial literacy for seniors, and receive recognition for exemplary service
    within her community. Over the next few years, she hopes to scale back her sales workload to part‑time consulting, allowing more time for volunteer work and family while leaving a lasting professional
    legacy.
