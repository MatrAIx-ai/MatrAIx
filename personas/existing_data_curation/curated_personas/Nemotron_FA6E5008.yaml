  hobbies: '[''Reading mystery novels'', ''Jigsaw puzzles'', ''Herb gardening'', ''Cooking traditional Puerto Rican cuisine'', ''DIY home‑improvement projects'', ''Solitary nature walks'']'
  career_goals: Verna aims to advance from a floor‑level labor role to a supervisory position within the next three to five years, seeking certification as a Certified Forklift Operator and completing an
    OSHA safety trainer course. She hopes to leverage her curiosity and practical mindset to become a logistics coordinator, overseeing inventory flow and scheduling while mentoring newer workers. Long‑term,
    she envisions establishing a modest side business offering home‑organization and DIY consulting services, providing additional financial stability for her family.
