  career_goals: Even at 89, Dustin's ambitions focus on personal fulfillment rather than professional advancement. He aims to remain physically independent by maintaining his garden and continuing light
    woodworking projects. He hopes to compile a memoir of his life and the changing face of New Brighton, preserving stories for future generations. Volunteering at the senior center remains a priority,
    as does mentoring younger neighbors who seek practical advice. Improving his emotional well‑being is central; he strives to manage anxiety through regular walks, breathing exercises, and staying connected
    with family via video calls. Ultimately, Dustin wants to leave a legacy of resilience, community service, and cherished memories.
