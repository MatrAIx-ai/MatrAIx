personas:
  professional: Dustin Colter, an 89‑year‑old former steel‑mill laborer turned community historian, leverages their practical mechanical and carpentry expertise to fix vintage radios, build birdhouses for
    neighbors, and deliver vivid WWII‑era stories at the local historical society, while they favor a flexible schedule that embraces spontaneous projects over rigid planning.
  sports: Dustin Colter, a lifelong Steelers devotee who never misses a Sunday game and fondly recalls cheering on the local high‑school football rivalry, also enjoys occasional fishing trips on the Ohio
    River and participates in the borough’s senior bowling night, and they keep an easy‑going loyalty to Pittsburgh’s sports spirit.
  arts: Dustin Colter, an 89‑year‑old who fills their afternoons listening to Glenn Miller’s big band swing, Elvis Presley’s early rock ’n’ roll, and Johnny Cash’s classic country while watching timeless
    films like Casablanca and The Wizard of Oz, finds comfort in the nostalgic melodies that echo the soundtrack of their youth.
  travel: Dustin Colter, who favors low‑key road trips by car to nearby historic sites such as Gettysburg and the bustling boardwalk of Atlantic City, and yearly visits to grandchildren’s home in Florida,
    they plan travel with a mix of nostalgia‑driven destinations and practical budgeting, rarely venturing far beyond the Eastern seaboard.
  culinary: Dustin Colter, an avid home cook who perfects their own pierogies stuffed with potato and cheese, stews hearty chicken pot pies, and cans seasonal preserves from heirloom tomatoes and beans,
    they enjoy the ritual of simmering sauces and the occasional indulgence of a slice of apple pie made with grandparents’ secret spice blend.
  core: Dustin Colter, the 89‑year‑old who balances a tireless curiosity for history with a relaxed, sometimes disorganized routine, navigates life’s anxieties through gardening, storytelling, and spontaneous
    woodworking, and they often clutch a cup of coffee and a well‑worn crossword puzzle.
background:
  cultural: Born and raised in New Brighton, Pennsylvania, Dustin grew up in a tight‑knit, working‑class white community rooted in post‑war industrial America. His family’s heritage traces back to German
    and Irish immigrants who settled the region in the late 19th century, bringing traditions of hard work, self‑reliance, and community solidarity. He attended the local public high school, leaving before
    graduation to work in the nearby steel mills, which shaped his practical skill set and appreciation for manual labor. The cultural fabric of his upbringing includes regular church attendance at a Methodist
    congregation, participation in community fairs, and a love for regional comforts like pierogies, chicken pot pie, and homemade preserves. Football Sundays, especially cheering for the Pittsburgh Steelers,
    and local high‑school sports rivalries were staples of his social life. Over the decades, he has internalized the values of modesty, perseverance, and a deep respect for local history, which he now
    shares through storytelling and volunteer work with the borough’s historical society.
