  hobbies: '[''Sketching'', ''Digital illustration'', ''Museum and gallery visits'', ''Reading contemporary fiction'', ''Listening to indie folk music'', ''Yoga and meditation'', ''Volunteer reading mentorship'',
    ''Gardening'', ''Indie film watching'', ''Journaling'']'
  career_goals: Anita plans to pursue a bachelor’s degree in Visual Arts with a minor in Psychology, aiming to become an art therapist or community arts coordinator. In the short term, she wants to build
    a robust portfolio, secure a scholarship, and volunteer with local youth art programs to gain hands‑on experience. Long‑term, she aspires to obtain a master’s in Art Therapy, obtain licensure, and eventually
    open a community studio that offers therapeutic art workshops for at‑risk teens and adults, while also exhibiting her own work in regional galleries.
