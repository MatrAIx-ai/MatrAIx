  career_goals: Jennifer aims to become class president in the upcoming school year and to captain her soccer team, which would allow her to combine her leadership, organizational skills, and competitive
    spirit. She also hopes to join the school's robotics club to deepen her coding abilities. Looking further ahead, she dreams of studying civil engineering or becoming an elementary school teacher, careers
    that would let her apply her love for structure, practical problem‑solving, and helping others succeed.
