personas:
  professional: Jennifer Oman, an aspiring game developer, channels her love for building LEGO sets, solving puzzles, and coding interactive stories in Scratch into budding programming skills, while her
    competitive streak and love for structure keep her projects meticulously organized.
  sports: Jennifer Oman, a forward on the Elgin United youth soccer team, thrives on the competitive rush of weekend matches, complements her game with after-school dance classes for agility, and follows
    the local high-school basketball team, the Elgin Eagles, while also dabbling in winter roller-blading at the community rink.
  arts: Jennifer Oman, a fervent fan of fantasy literature, draws comic strips inspired by J.K. Rowling's Harry Potter and the vibrant panels of Marvel's Spider-Man, practices contemporary hip-hop dance
    routines to songs by Dua Lipa, and spends evenings building elaborate LEGO dioramas of Hogwarts scenes.
  travel: Jennifer Oman, an enthusiastic planner, loves structured family trips to the local state fair and the interactive science museum in Chicago, dreams of visiting the Wizarding World at Universal
    Studios Orlando and the historic castles of Edinburgh, and prefers itineraries with clear daily activities over spontaneous wanderings.
  culinary: Jennifer Oman, a budding home chef, favors quick, comforting foods like pepperoni pizza, mac and cheese, and homemade chocolate chip cookies, enjoys adding fresh basil and mozzarella to simple
    spaghetti, and occasionally trades snack wrappers for extra LEGO pieces, a habit she's trying to curb.
  core: Jennifer Oman is a competitive, structure-loving pre-teen who balances her love for soccer, dance, coding, and fantasy worlds with a habit of worrying over details, a penchant for saving every spare
    penny, and a constant quest for organized creativity.
background:
  cultural: 'Jennifer was raised in a middle‑class family in Elgin, Illinois, a suburban community within the Chicago metropolitan area. Her cultural background reflects typical Midwestern American values:
    an emphasis on education, community involvement, and modesty. Family traditions include celebrating holidays like Thanksgiving and Fourth of July with neighborhood gatherings, attending local church
    services, and participating in community events such as the Elgin Street Fair and school fundraisers. While her household is predominantly white, the diverse surroundings of Cook County expose her to
    a variety of cultural perspectives, fostering an appreciation for inclusion and community service.'
