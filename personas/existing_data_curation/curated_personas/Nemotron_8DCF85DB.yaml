  hobbies: '[''Vegetable gardening'', ''Fishing'', ''Gospel choir singing'', ''Cooking Southern soul food'', ''Attending Juneteenth festivals'', ''Reading biographies'', ''Museum visits'', ''Walking in
    local parks'']'
  career_goals: Rodney aims to transition into a supervisory role within the home-care agency, seeking certification as a Certified Nursing Assistant (CNA) and a Certified Medication Aide to broaden his
    clinical skill set. He envisions leading a small team of aides, developing standardized care plans that reduce client stress, and eventually establishing his own community-focused caregiving service
    that prioritizes culturally responsive care for African-American seniors in Houston. Continuous professional development and maintaining a stable, low-stress work environment are central to his long-term
    ambition.
