  hobbies: '["watercolor painting", "antique furniture restoration", "birdwatching", "hiking", "reading mystery novels", "vegetable gardening", "genealogy research"]'
  career_goals: Felisa aims to transform her solo operation into a fully licensed painting and paper‑hanging contracting firm that can take on multi‑family and light commercial jobs in the Lexington‑area
    corridor. She plans to obtain a state contractor’s license and professional certifications in low‑VOC coatings and historic‑home restoration within the next three years. Competitive by nature, she seeks
    to build a reputation for precision and on‑time delivery that outpaces regional competitors, eventually hiring one or two apprentices to mentor. In the longer term, she envisions stepping back from
    day‑to‑day labor to focus on consulting, teaching workshops on advanced finishing techniques, and offering quality‑control services to other contractors, ensuring a steady income stream as she approaches
    retirement.
