personas:
  professional: Felisa Giffin, a seasoned painting and paper-hanging contractor, leverages two decades of hands-on experience and a meticulous, data-driven approach to deliver flawless finishes on historic
    and modern projects, while their competitive drive pushes them to out-schedule rivals and their skepticism of shortcuts ensures every job meets low-VOC and preservation standards.
  sports: Felisa Giffin finds solace in low-impact fitness; they hike the ridges of Daniel Boone National Forest with the local Boone Ridge Hiking Club each spring, practice gentle yoga at home, and cheer
    on the Kentucky Wildcats men's basketball team and the Lexington Legends minor-league baseball squad on game days.
  arts: Felisa Giffin channels their love of quiet creativity into watercoloring intimate interior scenes, drawing inspiration from the delicate palette of Georgia O'Keeffe and the atmospheric tones of
    Winslow Homer, while they unwind with classic mystery novels by Agatha Christie and occasionally attend local productions of Christie’s plays performed by the Lexington Community Theatre, and they enjoy
    listening to folk duo The Milk Carton Kids during work.
  travel: Felisa Giffin plans trips with the same precision they use for project estimates, preferring off-season visits to historic sites such as Williamsburg, Virginia, and a weekend pilgrimage to the
    Blue Ridge Parkway, while dreaming of a spring tour of Edinburgh's castle and the medieval streets of Prague, always booking accommodations that offer quiet, low-stimulus environments and staying within
    a modest budget that leaves a contingency for unexpected restoration-related expenses.
  culinary: Felisa Giffin enjoys farm-to-table cooking centered on vegetables from their garden, often preparing roasted heirloom carrots with fresh rosemary, beet and goat-cheese salad, and a hearty chicken
    pot pie made with low-sodium broth, they possess intermediate cooking skills, favoring simple, methodical recipes that reflect their organized nature, and they treat dining out as an occasional reward,
    favoring locally sourced cuisine at the Lexington Coffee & Crumb bakery.
  core: Felisa Giffin is a methodical, solitary craftsperson who blends competitive precision with a curiosity for preservation, turning quiet hobbies into a disciplined professional empire while juggling
    meticulous budgeting, health monitoring, and a love for low-key outdoor pursuits.
background:
  cultural: Felisa grew up in a white, Southern‑Appalachian community in central Kentucky where self‑reliance, hard work, and modesty are deeply valued. Her family attended a local Baptist church, and community
    events such as county fairs and church potlucks shaped her sense of belonging. The region’s pragmatic culture emphasized practical skills—carpentry, farming, and trades—over formal education, which
    aligns with her high‑school completion and subsequent apprenticeship in painting. The rural landscape, characterized by rolling hills, tobacco farms, and historic brick homes, fostered an appreciation
    for preserving the built environment, influencing her focus on historic‑home restoration. Though traditionally conservative, the community’s close‑knit nature has also taught her the importance of reliability
    and reputation, traits she carries into her professional and personal life.
attributes:
  skills: '["surface preparation", "color matching", "interior painting", "paper hanging", "drywall installation", "taping and finishing", "project estimation", "budget management", "safety compliance",
