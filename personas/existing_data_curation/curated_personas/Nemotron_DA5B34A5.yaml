    ''Listening to tech and creativity podcasts'']'
  career_goals: Royal aims to advance from his current role to senior IT support engineer, earning certifications such as CompTIA Security+ and AWS Certified Solutions Architect along the way. He envisions
    transitioning into network architecture and eventually launching his own boutique consulting firm that blends technical support with user‑experience design, helping small businesses adopt intuitive,
    aesthetically‑pleasing technology solutions. A long‑term ambition is to mentor junior technicians while preserving the flexibility he values, allowing him to pursue personal creative projects alongside
    his professional growth.
