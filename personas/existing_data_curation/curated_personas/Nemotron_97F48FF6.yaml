personas:
  professional: Joshua Thomas is an aspiring mini-architect who builds elaborate forts and draws colorful floor plans with crayons, yet often abandons his creations halfway because rigid structures feel
    stifling.
  sports: Joshua Thomas dabbles in weekend soccer with the Bright Stars junior club, pretends to be a tiny forward, lights up when watching the city's minor league baseball team on TV, and loves splash-down
    play at the summer pool.
  arts: Joshua Thomas is a budding artist who sketches bright creatures inspired by Eric Carle's books, sings loudly to the upbeat tunes of The Wiggles and Raffi, and delights in finger-painting sessions
    that turn the kitchen floor into a rainbow canvas.
  travel: Joshua Thomas loves spontaneous family road trips to the aquarium, the soaring desert of the Grand Canyon, and occasional visits to the magical world of Disney, preferring short flights with the
    seat-back tray for drawing and windows to stare at clouds.
  culinary: Joshua Thomas is a picky but adventurous eater who devours cheesy macaroni, insists on building perfect peanut-butter-and-jelly sandwiches, requests extra strawberries on pancakes, and occasionally
    refuses broccoli, getting gleeful when a new flavor appears on the plate.
  core: Joshua Thomas is a curiosity-driven, art-loving five-year-old who flits between spontaneous imagination and sudden bouts of anxiety, preferring solitary play and small-group adventures.
background:
  cultural: Joshua is raised in a white, middle‑class family in Van Nuys, California. His upbringing blends typical Southern‑Californian culture—celebrating holidays such as Thanksgiving, Christmas, and
    Halloween, attending community events, and enjoying weekend trips to local museums and the beach—with his family's European‑American traditions. Growing up in a diverse Los Angeles County environment,
    he is exposed to a variety of artistic influences, from street art to multicultural festivals, while his household maintains a focus on classic American values and family togetherness.
attributes:
  skills: '[''basic drawing and coloring'', ''recognizing shapes and colors'', ''counting to 20'', ''storytelling through pictures'', ''basic phonics awareness'']'
  hobbies: '[''drawing and coloring'', ''building with LEGO'', ''reading picture books'', ''playing in the park'', ''listening to music'', ''simple science experiments'']'
  career_goals: Joshua often talks about becoming an astronaut who can paint the stars, or an artist who brings his imagination to life on big canvases. He also dreams of being a teacher who helps other
    kids explore new ideas and a superhero who protects his friends. These ambitions reflect his love for discovery, creativity, and helping others.
