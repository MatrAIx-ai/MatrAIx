  career_goals: Although still an infant, Rosa’s future aspirations are shaped by her caring, cooperative nature. She hopes to become a supportive member of her family and, later, to pursue a career that
    allows her to help others—such as a teacher, community health worker, or social services professional—leveraging her bilingual abilities and sociable personality. She aims to balance her curiosity for
