persona_description: A neuroscientist who is interested in studying the effects of meditation and mindfulness on the brain and its functions. She is a Harvard medical school neuroscientist who has conducted
  research on the link between meditation and the brain. Her studies have established a link between meditation and improved quality of life, reduced stress and anxiety, and increased gray matter in the
  frontal cortex. She has conducted two studies on the effects of meditation, one on long-term meditators and the other on participants with no prior meditation experience. Her research has also led her
  to discover that the meditators had a more gray matter in the frontal cortex, and that after just eight weeks of meditation, participants' brains improved, with thickening in many regions of the brain,
  including the amygdala, which links up with fear, anxiety, aggression, and depression.
