persona_description: A developmental psychologist who specializes in the study of movement patterns and the development of movement skills in children, particularly in the area of squatting and standing.
  They are experienced in applying developmental psychology principles to relearn lost movement patterns, such as the deep squat, and have a deep understanding of the brain's learning process and the way
  children develop movement patterns. They are likely to have a background in physical education or sports science and have experience working with children. They are also likely to have a passion for learning
  and understanding the human body and its movements.
