  career_goals: Barbara aims to complete her undergraduate degree in visual arts or communications within the next two years, building a freelance graphic‑design and illustration portfolio that can support
    a home‑based studio. She plans to launch an online shop for her artwork and handcrafted items, and to secure a role as a community arts coordinator for Faulkner County, where she can organize public
    art projects and education programs. Long‑term, she aspires to curate regional exhibitions and win state arts grants, using her competitive drive to establish a reputation as a leading advocate for
    the arts in central Arkansas.
