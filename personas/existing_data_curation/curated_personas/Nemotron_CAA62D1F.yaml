personas:
  professional: Phylinda Mccoy is a highly organized 17‑year‑old who channels her methodical planning and compassionate caretaking into coordinating church potluck logistics and volunteering at the local
    health clinic, while preparing for her GED and a future medical assisting certification.
  sports: Phylinda Mccoy enjoys early morning walks in the local woods, plays on a co‑ed softball team during the spring, follows the Mississippi State Bulldogs football season, supports the New Orleans
    Saints in the fall, and attends weekly low‑impact yoga sessions at her church’s community center to stay fit.
  arts: Phylinda Mccoy finds calm while crocheting blankets to the sound of Aretha Franklin and Marvin Gaye, devours historical fiction by Toni Morrison and James Baldwin, and occasionally volunteers at
    community theater productions featuring local actors.
  travel: Phylinda Mccoy prefers carefully planned weekend road trips to nearby historic towns like Oxford and the cultural vibrancy of New Orleans, dreams of exploring Washington, D.C.’s National Museum
    of African American History, yet balances her wanderlust with a modest savings plan that limits long‑distance travel.
  culinary: Phylinda Mccoy expertly prepares soul‑food classics such as collard greens simmered with smoked turkey, sweet‑potato casserole topped with marshmallows, and crisp fried chicken seasoned with
    a secret spice blend, while often adding fresh herbs from her garden like basil and thyme to elevate family recipes.
  core: Phylinda Mccoy is a calm, methodical teen whose love for garden vegetables, crossword puzzles, and community service intertwines with a habit of over‑organizing her planner to the point of occasional
    procrastination.
background:
  cultural: Phylinda grew up in Taylorsville, a small town in the heart of the Mississippi Delta, within a close‑knit African‑American community. Her family’s traditions are rooted in church life, where
    gospel music, communal potlucks, and Sunday services provide a strong sense of belonging. The legacy of Southern Black resilience and storytelling shapes her worldview; stories of the civil‑rights era
    shared by her grandparents inspire her calm determination. Family gatherings, multi‑generational support, and the practice of cooking soul‑food recipes are central to her cultural identity. She values
    the importance of mutual aid, humility, and respect for elders, which guide her interactions and aspirations.
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Basic computer operation (Microsoft Office, email)'', ''Household cooking and meal preparation'', ''Budgeting and financial record‑keeping'',
    ''Community event coordination'', ''Caretaking for younger siblings'', ''Basic first aid'', ''Reading comprehension'', ''Written communication'']'
  hobbies: '[''Reading historical fiction and biographies'', ''Journaling and reflective writing'', ''Gardening and horticulture'', ''Cooking family recipes'', ''Crocheting and knitting'', ''Bird‑watching
    and nature walks'', ''Solving puzzles (crosswords, Sudoku)'', ''Listening to gospel and R&B music'', ''Participating in community service projects'', ''Learning basic computer skills (spreadsheets,
    internet research)'']'
  career_goals: Phylinda’s immediate goal is to earn her GED and enroll in a community‑college vocational program for medical assisting or certified nursing assistance. She wants to work in the Covington
    County health clinic, providing compassionate care to families while continuing to develop her organizational and caregiving skills. Long‑term, she hopes to become a community health worker who can
    design health‑education programs and mentor younger teens on academic and personal development. She also envisions eventually pursuing a degree in public health to broaden her impact on the well‑being
    of her neighborhood.
