  career_goals: Arman aims to transition from competitive racing to a leadership role that blends sports and the arts. He envisions establishing a community center in Milwaukee that offers coaching, mental‑wellness
    workshops, and creative‑arts programs for underserved youth. He also aspires to become a recognized ambassador for mental health in athletics, author a memoir that explores the synergy between physical
    endurance and artistic imagination, and eventually earn a graduate credential in sports psychology to deepen his impact as a mentor and educator.
