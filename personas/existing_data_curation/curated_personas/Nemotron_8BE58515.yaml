personas:
  professional: A former elite endurance racer turned community wellness pioneer, Arman Cornelius blends high‑performance training expertise with improvisational storytelling to craft mental‑health workshops
    that feel as fluid as a jazz solo, even if their love of spontaneity sometimes leaves the paperwork a step behind, and they rely on their calm resilience to navigate the inevitable chaos.
  sports: A versatile endurance athlete and youth mentor, Arman Cornelius trains on the rugged Wisconsin trail network, competes in local road races while cheering for the Milwaukee Bucks and Brewers, and
    they coach with the Milwaukee Striders Cycling Club, blending high‑intensity interval training with a meditative appreciation for nature’s rhythm.
  arts: An abstract painter and improvisational jazz saxophonist, Arman Cornelius draws inspiration from Jackson Pollock’s drip technique, Miles Davis’s modal explorations, and the existential prose of
    Sartre, regularly performing at the Milwaukee Jazz Fest and curating community mural projects, and they channel this creative energy into spontaneous poetry slams where they often quote Rimbaud.
  travel: A curious explorer with a penchant for art‑laden getaways, Arman Cornelius has trekked the misty cliffs of Lake Bled, meditated beneath Kyoto’s cherry blossoms, and toured the contemporary galleries
    of Berlin, while still finding time for weekend drives to the Wisconsin Door Peninsula and spontaneous road trips to the Chicago Art Institute, and they prefer loosely planned itineraries that leave
    room for impromptu studio visits.
  culinary: A culinary experimenter who blends global flavors with garden freshness, Arman Cornelius frequently cooks Sichuan mapo tofu with fermented Doubanjiang, crafts Mediterranean mezze featuring za'atar‑spiced
    heirloom tomatoes from their community plot, and perfects a slow‑roasted lamb tagine with apricots and preserved lemons, and they delight in pairing each dish with a vinyl‑spun jazz record.
  core: An endlessly imaginative endurance coach who swaps spreadsheets for sax solos, Arman Cornelius is a calm, compassionate visionary who habitually loses track of deadlines while obsessively polishing
    abstract canvases and collecting vintage coffee beans.
background:
  cultural: Arman grew up in Milwaukee's historic Black neighborhood, the child of parents who moved north during the Great Migration. His upbringing was steeped in the rhythms of gospel choirs, the storytelling
    traditions of African‑American oral history, and the civic activism that shaped Wisconsin's civil‑rights landscape. He celebrates cultural milestones such as Juneteenth and Black History Month and draws
    inspiration from local Black artists, musicians, and community leaders. This heritage informs his commitment to mentoring Black youth, promoting inclusive spaces in sport and the arts, and honoring
    the resilience and creativity that define his community.
