  career_goals: Although retired, Rosemary aims to preserve her independence by maintaining a simple, predictable daily routine that includes morning walks, light gardening, and regular health check‑ups.
    She hopes to continue mentoring a small group of local high‑school students in basic STEM concepts, sharing her knowledge without the pressure of formal obligations. A long‑term ambition is to compile
    her life stories and practical lessons into a memoir that can serve as a calming guide for future generations. She also seeks to keep her living space safe and organized enough to reduce anxiety and
    stress, while remaining flexible enough to adapt to her health needs.
