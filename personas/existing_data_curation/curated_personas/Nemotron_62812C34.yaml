    with seasonal farm produce'', ''Collecting vintage engineering manuals'']'
  career_goals: Robert aims to advance to a senior engineering technologist role where he can lead cross‑functional R&D projects focused on sustainable product design for the agricultural sector. He plans
    to earn a Professional Engineer (PE) license and pursue certifications such as Six Sigma Black Belt and Project Management Professional (PMP). Over the next five years he hopes to file patents for eco‑friendly
    tooling innovations, become a recognized expert in low‑impact manufacturing processes, and mentor junior technicians. Long‑term, he aspires to launch his own boutique consultancy that blends cutting‑edge
    engineering with environmentally responsible design, positioning himself at the intersection of technical excellence and innovative entrepreneurship.
