persona_description: A pediatric orthopedic surgeon who specializes in the diagnosis and treatment of children with hip disorders, particularly Legg-Calvé-Perthes syndrome. He/she is interested in the development
  of a comprehensive diagnostic algorithm for transient synovitis and septic arthritis, and the identification of risk factors for these conditions. The persona is also knowledgeable about the use of ultrasonography
  in the diagnosis of transient synovitis and is interested in the role of physical examination in the evaluation of hip disorders in children.
