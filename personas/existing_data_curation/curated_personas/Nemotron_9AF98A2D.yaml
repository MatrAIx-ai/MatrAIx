  hobbies: '[''Adult softball league'', ''Zumba and circuit‑training classes'', ''Volunteering at Westland Food Bank'', ''Book club (mystery and self‑help)'', ''DIY home‑improvement projects'', ''Museum
    workshops and art exhibitions'', ''Strategic board games (Settlers of Catan, chess)'', ''Yoga and mindfulness breathing'']'
  career_goals: Tiffany aims to move into a lead fabricator or production supervisor role within the next three years, seeking to obtain a Certified Production Technician (CPT) credential and an OSHA trainer
    certification. She is motivated to lead a small team, drive continuous improvement projects, and mentor younger workers while maintaining a predictable schedule that mitigates her stress sensitivity.
    In the longer term, she aspires to transition into a quality‑assurance or process‑engineering position where she can combine her practical curiosity with data‑driven analysis to refine manufacturing
    methods and enhance the plant’s competitiveness.
