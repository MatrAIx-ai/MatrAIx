personas:
  professional: A seasoned fabricator with over twenty years in automotive parts, Tiffany Neri leverages expertise in CNC machining, welding, and Lean principles to streamline production lines, and they
    channel their organized, methodical nature into meticulous quality inspections while mentoring new hires, all while balancing a competitive drive to out‑perform targets with a practical curiosity for
    process improvements.
  sports: Tiffany Neri dominates the local adult softball league, cheers for the Detroit Tigers, attends weekly Zumba and circuit‑training classes, participates in a community yoga circle, and they occasionally
    join the Westland Softball Club’s summer tournament, balancing competitive spirit with a love for team camaraderie.
  arts: Tiffany Neri immerses herself in the arts by attending weekend workshops at the Detroit Museum of Art, where they study works by Georgia O'Keeffe and Andy Warhol, devour mystery novels by Agatha
    Christie in her book club, and unwind to the soulful sounds of Stevie Wonder and Aretha Franklin.
  travel: Tiffany Neri favors budget‑friendly road trips to nearby destinations like Mackinac Island and Cleveland, they plan trips meticulously using travel forums, and they dream of a summer getaway to
    Asheville’s Blue Ridge Mountains to combine hiking with local food festivals.
  culinary: Tiffany Neri enjoys cooking hearty Michigan‑style dishes such as cherry‑glazed pork chops and homemade lasagna, they favor fresh basil, garlic, and locally sourced apples, and they often experiment
    with quick weeknight meals like fish tacos seasoned with lime and cilantro.
  core: Tiffany Neri is a pragmatic, socially‑charged fabricator who balances a competitive work ethic with community‑centric hobbies, all while wrestling with stress‑induced worry and a penchant for meticulous
    planning.
background:
  cultural: Raised in a middle‑class, working‑class family in the Detroit metropolitan area, Tiffany’s heritage traces back to German and Irish immigrants who settled in Michigan’s industrial heartland.
    The region’s strong automotive manufacturing legacy, combined with Midwestern values of hard work, self‑reliance, modesty, and community involvement, has shaped her practical and organized outlook.
    She grew up attending a local Protestant church, which reinforced a sense of duty, fellowship, and participation in neighborhood events. These cultural influences foster her reliability, teamwork orientation,
    and competitive drive while also grounding her in a tradition of pragmatic problem‑solving.
attributes:
