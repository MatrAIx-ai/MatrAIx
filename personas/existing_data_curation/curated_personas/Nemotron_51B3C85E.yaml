  career_goals: Kevin aims to transition from being a journeyman carpenter to owning a boutique custom‑furniture studio that serves the Marksville area and surrounding communities. He plans to obtain a
    Master Carpenter certification, specialize in historic‑home restoration, and build a small, tightly knit team that shares his commitment to quality and craftsmanship. Additionally, he hopes to establish
    a quarterly workshop series that introduces local youth to woodworking, preserving the trade for future generations while integrating his love for art and innovative design.
