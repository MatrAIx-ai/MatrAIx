personas:
  professional: Kevin Goodwin is a seasoned carpenter with over twenty years of hands‑on experience in framing, finish carpentry, and custom cabinetry, who combines meticulous organization and a strong
    design eye to deliver high‑quality residential and historic‑home restoration projects while mentoring apprentices and planning to launch a boutique custom‑furniture studio.
  sports: Kevin Goodwin enjoys seasonal outdoor pursuits such as fishing on the Atchafalaya Basin, hiking in Kisatchie National Forest, playing pick‑up basketball at the community center, and follows the
    LSU Tigers football, the New Orleans Saints, and the New Orleans Pelicans, while holding a membership in the Marksville Anglers Club.
  arts: Kevin Goodwin spends evenings at intimate blues and jazz venues listening to B.B. King, Wynton Marsalis, and local Creole saxophonist Aaron Neville, sketches the Louisiana wetlands in a weathered
    sketchbook, and crafts small wooden art pieces inspired by the folk paintings of George Rodrigue and the design principles of Frank Lloyd Wright.
  travel: Kevin Goodwin plans road trips with meticulous itineraries, favoring nature‑focused destinations like the Atchafalaya Basin, Natchez historic district, and the Texas Hill Country, while dreaming
    of a cultural excursion to New Orleans for Mardi Gras and a study tour of traditional woodworking workshops in Kyoto, Japan.
  culinary: Kevin Goodwin loves cooking Cajun classics such as gumbo, jambalaya, and étouffée, layering flavors with Andouille sausage, filé powder, and dark roux, often grilling his own catch on a homemade
    cedar plank, and he enjoys experimenting with bourbon‑infused sauces while sharing meals with family around a reclaimed‑wood dining table.
  core: Kevin Goodwin blends a carpenter’s discipline with a quiet curiosity, crafting fine furniture, sketching Louisiana’s landscapes, and nurturing community ties, all while balancing a modest budget
    and a lingering love for vinyl blues.
background:
  cultural: Kevin grew up in a working‑class white family in the heart of Rapides Parish, where Southern hospitality, a strong sense of community, and the region’s Cajun and Creole culinary traditions shaped
    his upbringing. He was raised with Protestant values that emphasize modesty, hard work, and helping neighbors, which align with his cooperative and considerate nature. Though he left formal schooling
    after the 9th grade, he learned the carpentry trade from his father and local mentors, internalizing the practical, hands‑on ethos of rural Louisiana while maintaining an appreciation for the area’s
    artistic heritage.
