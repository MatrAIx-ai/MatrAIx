personas:
  professional: David Mendez, a two‑year‑old, is an aspiring little engineer who spends hours building block towers and sorting shape puzzles, showcasing early spatial reasoning, a knack for practical problem‑solving,
    and a love for predictable routines while occasionally assertively rearranging any misplaced piece.
  sports: David Mendez, a two‑year‑old dynamo, thrives in toddler gymnastics classes at Tiny Tumble Gym and weekly Mini Minis soccer drop‑ins at the neighborhood park, while his family’s backyard barbecues
    feature cheering for the Houston Astros, blending energetic play with a structured taste for favorite sports teams.
  arts: David Mendez, a curious two‑year‑old, bursts into spontaneous sing‑along sessions to The Wiggles and Sesame Street themes, gleefully finger‑paints inspired by Eric Carle’s vivid illustrations, and
    stages mini‑performances for family using plush toys as props.
  travel: David Mendez, at two, eagerly anticipates family road trips to the sun‑kissed sands of San Diego Beach and the interactive wonders of the Smithsonian National Air and Space Museum in Washington,
    D.C., thriving on the predictable rhythm of car‑seat naps yet lighting up with excitement when a new playground or museum exhibit appears.
  culinary: David Mendez, a two‑year‑old foodie in training, delights in buttery chicken nuggets, cheesy macaroni, sweet banana slices, and occasional avocado toast, proudly wielding a small fork to stab
    peas—though they often end up with milk splatters on their superhero‑themed bib, revealing a charmingly messy eating style.
  core: David Mendez is a structured yet flexible two‑year‑old who craves predictable play routines, bursts into sociable energy with peers, asserts himself with a charming stubbornness, and turns everyday
    moments into miniature adventures.
background:
  cultural: David is a white American child raised in Twin Falls, Idaho, within a middle‑class family that values community involvement and outdoor recreation. His upbringing includes participation in local
    traditions such as the Jerome County Fair, farmers' markets, and library storytime programs. The region's agricultural and recreational culture exposes him to nature, sports, and community gatherings,
    shaping a grounded, sociable, and flexible outlook.
