  career_goals: David loves role‑play with toy fire trucks, construction vehicles, and doctor kits. He often exclaims, "I'm a firefighter!" or "I will build a house!" These imaginative scenarios hint at
    early aspirations centered on helping others and building things. While still very young, his ambitions revolve around being part of a helpful team and exploring the world through playful, hands‑on
    activities.
