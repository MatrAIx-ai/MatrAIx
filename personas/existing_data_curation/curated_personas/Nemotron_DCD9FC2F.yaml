personas:
  professional: Shareen Poche is a front‑of‑house hospitality professional whose obsessive attention to detail, precise POS and inventory management, and charismatic, talkative leadership turn daily briefings
    into high‑energy performance reviews, all while pursuing an assistant‑manager promotion, a Certified Food Service Manager credential, and a hospitality‑management degree to eventually launch a community‑focused
    café.
  sports: Shareen Poche is a devoted supporter of the Chanute High School football team—where they volunteer at concessions—and a regular attendee of Kansas City Chiefs games, while playing in a co‑ed adult
    softball league on Saturdays and squeezing in weekly yoga sessions to counterbalance the stress of their fast‑paced hospitality role.
  arts: Shareen Poche shines on the community theater stage in leading speaking roles, draws inspiration from Lin‑Manuel Miranda’s lyrical storytelling and Idina Menzel’s vocal power, and never misses the
    annual regional musical revue where they dissect set designs for future café décor ideas.
  travel: Shareen Poche plans trips with the same spreadsheet precision they use for inventory, favoring budget‑friendly weekend escapes to the Ozark Mountains and a culinary pilgrimage to Portland’s food
    trucks, while dreaming of a spring tour of Provence’s lavender fields and farmer’s markets to inspire their future café menu.
  culinary: Shareen Poche channels their garden’s bounty into experimental kitchen creations, expertly kneading sourdough and rosemary focaccia, whipping up carrot cake with cream cheese frosting for church
    potlucks, and seasoning heirloom tomato salads with fresh basil and a drizzle of locally sourced olive oil.
  core: Shareen Poche blends meticulous organization and a talkative, competitive spirit, turning every café dream, trivia night, and garden harvest into a precisely choreographed performance—sometimes
    at the cost of sleepless worry.
background:
  cultural: Shareen was born and raised in the heart of Kansas, growing up in a small‑town, white, middle‑class family that valued hard work, practicality, and community involvement. Her upbringing was
    shaped by Midwestern traditions such as Friday‑night high school football, county fairs, and regular church attendance in a Protestant congregation. These experiences fostered a strong sense of neighborliness,
    self‑reliance, and an appreciation for routine and family‑oriented gatherings, all of which continue to influence her personal and professional life.
attributes:
  skills: '[''Customer service'', ''High‑volume order taking'', ''POS system operation'', ''Cash handling and reconciliation'', ''Inventory tracking'', ''Health‑code compliance'', ''Shift scheduling and
    checklist creation'', ''Staff training and mentorship'', ''Conflict resolution'', ''Team briefing facilitation'', ''Performance metrics analysis'', ''Multitasking under pressure'']'
  hobbies: '[''Vegetable gardening'', ''Baking and cooking'', ''Community theater acting'', ''Trivia night competition'', ''Volunteer concession work'', ''Reading self‑help and productivity books'', ''Church
    choir singing'', ''Budgeting and personal finance tracking'', ''Attending local fairs'', ''Crafting (quilting)'']'
  career_goals: Shareen aims to move from server to assistant manager within the next two years and obtain a Certified Food Service Manager credential. She plans to complete a bachelor's degree in hospitality
    management through evening classes while continuing to work. Her long‑term ambition is to open a family‑friendly café in Chanute that emphasizes reliable service, locally sourced foods, and community
    events such as book clubs and live music. She also wants to mentor younger staff, develop a reputation for operational excellence, and eventually oversee a small chain of neighborhood cafés that reflect
    her practical, high‑standard approach.
