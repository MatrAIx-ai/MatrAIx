persona_description: A chemist who specializes in the study of glass and porcelain cleaning, particularly in the use of fuller's earth for polishing porcelain and vegetable reds for the preservation of
  China-ware. He is aware of the potential risks and benefits of cleaning porcelain and China-ware, and is cautious about the temperature and conditions under which such cleaning should be performed. He
  is also familiar with the use of innovative methods for annealing glass, such as the use of cold water and oil. He is interested in the practical application of his knowledge and is open to new ideas
  and techniques.
