  hobbies: '[''Hiking'', ''Fishing'', ''Photography'', ''Acoustic guitar playing'', ''Collecting vintage maps'', ''Volunteering at historical society'', ''Seasonal cooking'']'
  career_goals: Keith aims to advance into a supervisory role within his tourism organization, eventually becoming a senior guide manager overseeing multiple tour groups and mentoring new guides. He plans
    to obtain additional certifications in eco‑tourism and wilderness safety to broaden his service offerings. In the long term, he aspires to launch his own boutique tour company that specializes in heritage
    and nature experiences in upstate New York, leveraging his network, reputation, and digital marketing skills to attract regional and out‑of‑state visitors.
