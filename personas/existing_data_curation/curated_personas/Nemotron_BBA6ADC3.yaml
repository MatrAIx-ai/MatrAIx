personas:
  professional: Brandon Etheridge, an aspiring LEGO architect and junior game‑design enthusiast, blends meticulous step‑by‑step planning with creative improvisation, thriving on the routine of building
    while eagerly competing for high scores, and despite occasional anxiety, they captivate classmates with confident explanations of their projects.
  sports: Brandon Etheridge dashes through soccer drills with the Willow Wolves Youth Soccer Club, cheers loudly for the Seattle Seahawks during games, spends winter snowshoeing with the Anchorage Snowshoe
    Club, and competes fiercely in schoolyard tag, always seeking the next high‑score on the field while balancing a love for routine practice.
  arts: Brandon Etheridge practices piano daily, mastering Beethoven’s Für Elise and humming the chorus of a Kidz Bop version of Let It Go, while sketching Calvin‑and‑Hobbes‑style cartoons that they proudly
    showcase at school talent shows, drawing inspiration from the comedic timing of Jim Henson’s puppetry and the vibrant colors of Disney’s animated classics.
  travel: Brandon Etheridge loves the ritual of planning family trips, revels in elk‑spotting hikes in Denali National Park, dreams of snow‑capped adventures in Reykjavik, and already boasts a weekend getaway
    memory from a ferry ride to Juneau, balancing a love for rugged wilderness with a budding curiosity for bustling cities like Seattle.
  culinary: Brandon Etheridge enjoys the simple pleasure of pan‑seared trout seasoned with wild herbs, devours hearty reindeer stew on cold evenings, builds elaborate peanut‑butter‑and‑jelly sandwiches,
    and, despite being a novice, proudly assists in cooking by stirring the pot and sprinkling fresh lingonberries over desserts.
  core: Brandon Etheridge is a routine‑loving, socially energetic seven‑year‑old who channels competitive spark into LEGO builds and soccer, wrestles intense anxiety with meticulous planning, and delights
    in sharing creative works while occasionally splurging on a new game.
background:
  cultural: Brandon comes from a white, multi‑generational Alaskan family that settled in the Willow area decades ago. His upbringing blends typical Midwestern values of practicality, self‑reliance, and
    hard work with the unique rhythms of rural Alaska—long daylight hours in summer, deep snow in winter, and a close‑knit community that relies on shared subsistence activities. Family gatherings often
    feature potluck meals with locally sourced fish and game, and community events emphasize cooperation and respect for the natural environment. Though not of Indigenous descent, Brandon has been exposed
    to native cultural teachings about the land, which reinforce his appreciation for outdoor safety and seasonal cycles.
