  career_goals: Brandon dreams of a career that blends structure, leadership, and community service. He often talks about becoming a firefighter or a park ranger, roles that offer clear daily routines,
    the chance to protect others, and opportunities to work outdoors in Alaska’s stunning landscapes. He also imagines serving as a school coach, where he can lead team drills and be at the center of attention
    while helping teammates improve. His competitive nature fuels a desire to be top of his class in any role he chooses.
