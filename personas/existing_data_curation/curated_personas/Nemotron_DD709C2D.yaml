  career_goals: Approaching retirement, Gwendolyn aims to transition to a part‑time or volunteer role that leverages her front‑desk experience while allowing more flexibility for personal pursuits. She
    hopes to mentor younger clerical staff at her current organization, sharing best practices for efficient office workflow. Additionally, she plans to complete a short community‑college course on advanced
    computer skills to stay current with digital tools. Long‑term, she envisions volunteering as an information desk attendant at the local historical museum or senior center, where she can continue serving
    the community in a structured, predictable environment.
