persona_description: A historian or sociologist who is interested in the economic and social impacts of mass migration during the 19th and early 20th centuries. This person is likely to have a strong background
  in economic history, comparative economics, and international relations. They are interested in analyzing the causes and effects of mass migration, including the impact on the distribution of global population
  and economic activity, and the effects on the host and sending countries. They may also have a particular interest in understanding the role of international labor markets, the impact of mass migration
  on living standards, and the debate around whether mass migration contributed to the catching-up of poor countries on rich. They may also be interested in the economic and social impacts of mass migration
  on the societies and economies of the countries it involves.
