persona_description: A healthcare professional who specializes in wound care and pressure ulcer management. They have extensive knowledge and experience in assessing, treating, and preventing pressure ulcers,
  and are skilled in applying appropriate wound dressings and management techniques. They are familiar with the EPUAP-NPUAP classification system for pressure ulcers and the treatment needs for different
  stages of tissue damage. They are also aware of the importance of pressure relief and wound care optimization in managing pressure ulcers.
