personas:
  professional: Anna Sherman, a retired community volunteer, leverages her methodical gardening expertise, meticulous budgeting skills, and gentle leadership style to coordinate senior center craft workshops,
    mentor younger volunteers, and develop a master gardening calendar for neighboring neighborhoods.
  sports: Anna Sherman enjoys gentle hikes in the foothills, participates in the Fort Collins senior walking club, and cheers on the Colorado Rockies while occasionally attending Denver Broncos games with
    her craft‑circle friends.
  arts: Anna Sherman, an avid crafter, spends afternoons crocheting intricate Fair Isle patterns inspired by folk singer Judy Collins and listening to Aaron Copland’s orchestral works while attending the
    local community theatre’s monthly play nights.
  travel: Anna Sherman favors carefully planned road trips that blend scenic drives with family visits, having explored Yellowstone, the historic streets of Santa Fe, and a genealogy pilgrimage to England’s
    Yorkshire countryside, while dreaming of a leisurely cruise along Norway’s fjords.
  culinary: Anna Sherman delights in preserving garden harvests by canning heirloom tomatoes, fermenting sauerkraut with wild garlic, and baking rustic apple crumble with a sprinkle of Colorado honey, often
    pairing meals with freshly brewed herbal tea made from mint and sage from her own plot.
  core: Anna Sherman embodies quiet curiosity and steadfast practicality, turning garden experiments, craft circles, and genealogy quests into a legacy of community kindness, though they occasionally lose
    track of their knitting needles.
background:
  cultural: Anna grew up in a small Midwestern farming community in the 1940s and 1950s, raised in a modest Protestant household of Northern‑European ancestry. The values of hard work, thrift, and neighborly
    cooperation shaped her early life. In the 1970s she moved to Fort Collins, Colorado, drawn by the foothills and the town’s growing sense of community. She embraced the regional outdoors culture while
    retaining the traditions of her upbringing, such as celebrating holidays with family recipes, participating in church gatherings, and preserving homemade foods. Her cultural identity blends Midwestern
    roots with Colorado’s emphasis on environmental stewardship and community arts, informing her love of gardening, quilting, and volunteer service.
