personas:
  professional: Elena Dossantos is an aspiring community health worker and future CNA who leverages her bilingual fluency, budgeting acumen, and hands-on experience from tutoring and garden maintenance
    to bridge cultural gaps in local health services, all while applying her practical curiosity and calm reliability to adapt quickly to patient needs.
  sports: Elena Dossantos enjoys casual jogging in the nearby Red River Gorge, follows the Kentucky Wildcats basketball team and the Bowling Green Hot Rods for sports inspiration, and participates in a
    seasonal community yoga class that balances her love of nature with maintaining modest fitness.
  arts: Elena Dossantos immerses herself in bilingual literature from authors like Gabriel Garcia Marquez and Isabel Allende, unwinds by knitting patterns from the popular Simply Knitting blog, and connects
    with her heritage through the folk-pop songs of Natalia Lafourcade and the evocative films of Pedro Almodovar.
  travel: Elena Dossantos prefers to plan weekend getaways with a simple spreadsheet, enjoys nature hikes in Red River Gorge and day trips to Chicago's museums, while dreaming of exploring the historic
    markets of Oaxaca and the vibrant souks of Marrakesh, balancing budget constraints with cultural curiosity.
  culinary: Elena Dossantos, an adept home-cook, routinely prepares her family's mole and pepian using home-grown cilantro, oregano, and chilies, experiments by adding kale or quinoa to traditional tamales,
    and delights in tasting her creations at local farmers' markets while occasionally treating herself to a gourmet brunch at a downtown café.
  core: Elena Dossantos balances a caring heart with a meticulous budget, yet can't resist the late-night urge to binge-watch cooking videos, often sacrificing sleep for culinary experiments.
background:
  cultural: Elena’s cultural background is rooted in her Guatemalan heritage and the Hispanic community of Southern Kentucky. Her parents emigrated from Guatemala before she was born, and her household
    has always been bilingual, with Spanish spoken at home and English at school and in the wider community. She grew up celebrating Guatemalan holidays such as Día de los Muertos and Semana Santa, cooking
    family recipes like pepian, kak'ik, and tamales, and learning traditional weaving from her grandmother. Residing in Bowling Bowling, Kentucky, she has adapted these customs to the local context, participating
    in regional festivals and sharing her culture through food and crafts. Her involvement with a local Hispanic outreach organization deepens her connection to the immigrant experience, reinforcing values
    of family solidarity, community cooperation, and respect for tradition while also nurturing her curiosity about broader American life.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Basic cooking (Guatemalan cuisine)'', ''Household budgeting and organization'', ''Basic computer literacy (smartphone, internet, social media)'',
