  hobbies: '[''Cooking traditional Guatemalan meals'', ''Experimenting with fusion recipes'', ''Gardening (herbs and vegetables)'', ''Reading bilingual literature and folklore'', ''Listening to health and
    personal development podcasts'', ''Knitting and textile crafts'', ''Volunteering for after‑school tutoring'', ''Participating in community center events'', ''Nature walks and hiking in local parks'']'
  career_goals: Elena aims to earn her high‑school equivalency (GED) within the next year, followed by a certification as a Certified Nursing Assistant (CNA) or a community health worker, fields where her
    empathy, reliability, and bilingual abilities can directly help underserved families. She also plans to develop a small home‑based catering venture that specializes in Guatemalan comfort foods, using
    the culinary skills she enjoys exploring. In the medium term she hopes to work part‑time at a local health clinic or community center, where she can combine caregiving, health education, and cultural
    outreach, while continuing her education and saving toward her eventual business.
