  hobbies: '[''Gardening'', ''Cooking Mexican cuisine'', ''Listening to mariachi/norteño music'', ''Beach walks with her rescue dog'', ''Crossword puzzles'', ''Salsa dancing'', ''Volunteering at senior
    center'', ''Organizing cultural events'']'
  career_goals: Vivian aims to advance to a supervisory or lead janitorial position within the next few years, overseeing a team of cleaners and managing larger facility operations. She plans to obtain
    a Certified Professional Cleaner (CPC) credential and complete OSHA 10‑hour safety training to enhance her qualifications. Ultimately, she hopes to secure a stable, higher‑pay role that provides benefits
    and the possibility of mentoring younger workers, while also saving enough to purchase a modest home in Vista.
