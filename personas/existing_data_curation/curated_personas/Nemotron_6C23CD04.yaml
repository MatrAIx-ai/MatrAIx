personas:
  professional: Vivian Marrero applies their extensive commercial cleaning expertise—operating floor stripping machines, managing waste, and ensuring OSHA-compliant safety—to maintain efficient, cost-saving
    operations, and while they prefer clear procedures, they often adopt a relaxed, flexible schedule, eyeing a supervisory role that allows them to mentor younger staff.
  sports: Vivian Marrero enjoys leisurely beach walks with their rescue dog, plays in the Vista adult softball league during summer, and fervently follows the San Diego Padres and Los Angeles Lakers, preferring
    low-impact activities that fit their flexible schedule.
  arts: Vivian Marrero’s evenings often echo the sounds of Mariachi Vargas de Tecalitlán and Los Tigres del Norte, while they also attend community salsa nights and admire the vibrant murals at the local
    cultural center, reflecting a balanced love for music and visual art.
  travel: Vivian Marrero favors relaxed road trips along the California coast, such as revisiting Ensenada’s seafood markets and exploring the historic streets of San Miguel de Allende, yet they plan trips
    around family commitments and a modest budget, blending adventure with practicality.
  culinary: Vivian Marrero delights in simmering mole poblano with home-grown oregano and fresh tomatoes, expertly preparing carnitas seasoned with epazote and cumin, and they regularly host neighborhood
    potlucks where traditional dishes are shared over lively mariachi music.
  core: Vivian Marrero blends practical facility expertise, a love for gardening and cooking, and a competitive drive toward supervisory success, all while juggling a relaxed approach to obligations and
    occasional disorganization.
background:
  cultural: Vivian is a first‑generation Mexican American whose parents immigrated from Jalisco. Growing up in a close‑knit Mexican community in the San Diego area, she was immersed in Spanish language,
    Catholic traditions, and cultural celebrations such as Día de los Muertos and Cinco de Mayo. Her heritage influences her culinary interests, music preferences, and strong work ethic. She maintains ties
    with extended family in both California and Mexico, often visiting relatives during holidays and supporting community events that celebrate Mexican culture.
