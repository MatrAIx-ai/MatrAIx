    ''Basic digital navigation and scheduling software proficiency'', ''Artistic sketching and watercolor techniques'']'
  hobbies: '[''Watercolor painting'', ''Pencil sketching'', ''Landscape photography'', ''Reading contemporary fiction and philosophy'', ''Listening to podcasts on art and science'', ''Exploring Wisconsin’s
    state parks through hiking and fishing'', ''Participating in a small book club'', ''Cooking and experimenting with new recipes'', ''Volunteering for after‑school art projects'', ''Attending local craft
    fairs and gallery openings'']'
  career_goals: Elizabeth hopes to transition from daily driving to a mentorship role within the school transportation department, eventually becoming a senior driver trainer or route coordinator. She plans
    to complete a bachelor's degree in transportation logistics or education management to broaden her expertise. Long‑term, she envisions spearheading a community outreach program that pairs school transportation
    staff with local art initiatives, allowing her to blend her love of art with her professional experience. She also aims to maintain a work schedule that supports a flexible family life, balancing her
    ambition with her value for personal freedom and occasional solitude.
