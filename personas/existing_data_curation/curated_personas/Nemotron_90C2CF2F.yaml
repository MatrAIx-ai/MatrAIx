  career_goals: Although retired from formal employment, Abdi aims to deepen his involvement in the Micanopy community by leading a senior‑focused volunteer program, establishing a neighborhood garden that
    provides fresh produce for local families, and mentoring younger volunteers in event planning and basic home‑repair skills. He also hopes to document the town’s oral histories and share them through
    local workshops, ensuring the town’s heritage is preserved for future generations.
