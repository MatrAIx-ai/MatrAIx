  hobbies: '[''Photography'', ''Painting and drawing'', ''Digital art'', ''Reading science fiction and philosophy'', ''Playing acoustic guitar'', ''Collecting vinyl records'', ''Attending live music and
    theater'', ''Community volunteering'', ''Organizing and participating in trivia nights'', ''Gardening'', ''DIY woodworking projects'', ''Exploring new technology and software for creative work'']'
  career_goals: Although currently not in the workforce, John aims to translate his passion for art and community into a semi‑professional role. He plans to launch a small community art studio in Oak Creek
    that offers free workshops in photography, painting, and digital media, and to secure a local grant to fund public‑art projects. He hopes to exhibit his own photography in regional galleries, publish
    a photo‑essay book documenting the cultural history of Milwaukee County, and organise an annual Oak Creek Art Fair. Additionally, John wants to mentor emerging artists and volunteers, using his organizational
    skills to run community programs and to become recognized as a cultural ambassador for his hometown.
