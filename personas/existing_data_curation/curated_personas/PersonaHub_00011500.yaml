persona_description: An archaeologist specializing in the study of ancient pottery production, metallurgy, and the exploitation of mineral resources. She is particularly interested in the identification
  and reconstruction of trade networks, and the use of heavy minerals such as garnet, tourmaline, and magnetite in historical-archaeological contexts. She has a strong background in archaeometrical techniques
  and is skilled in the use of stratigraphy and cultural deposits to infer the presence of minerals in the environment. Her research interests also include the study of ancient metallurgy and the exploitation
  of natural resources, particularly in the context of the exploitation of iron and limestone.
