persona_description: A Bolingbroke Geography teacher who is dedicated to educating students to become global citizens equipped with the skills to assess received opinion and make independent judgements.
  They are interested in exploring the place of geography within the world and their own values and responsibilities. The teacher aims to provide students with the tools to make sense of a complex and dynamically
  changing world, at all different scales, and to learn about places, landscapes, economies, societies, and environments. The teacher is passionate about geography and believes in the importance of teaching
  students about the interconnectedness of diverse societies and environments.
