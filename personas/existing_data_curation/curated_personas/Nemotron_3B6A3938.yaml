  hobbies: '[''Reading chapter‑book series (e.g., Magic Tree House, Percy Jackson)'', ''Building LEGO sets'', ''Coding with Scratch'', ''Girl Scouts activities and badge projects'', ''Biking on local trails'',
    ''Beginner piano lessons'', ''Sketching and journaling'', ''Swimming at the community pool'', ''Visiting Disneyland and local theme parks'']'
  career_goals: Wendy envisions herself as an elementary school teacher who can create a structured, caring classroom where every student feels supported. She is also fascinated by animals and hopes to
    volunteer at a veterinary clinic, keeping the possibility open to become a veterinarian or a wildlife rehabilitator. Her long‑term ambition is to combine her love for organization with helping others,
    aiming for a career that blends education and care.
