personas:
  professional: Wendy Crane, a budding coder and future storyteller, applies their love of routine and logical problem‑solving to mastering Scratch projects, building intricate LEGO sets, and crafting chapter‑book‑style
    narratives, all while reliably meeting Girl Scout badge goals.
  sports: Wendy Crane swims with the local Junior Dolphins club, rides their bike on the city’s dedicated trail network, follows the MLB team the Chicago Cubs for summer games, and cheers on the NFL’s Green
    Bay Packers during the fall, balancing structured swim practices with spontaneous weekend rides.
  arts: Wendy Crane enjoys beginner piano lessons where they practice pieces by Ludwig van Beethoven and Yiruma, sketch scenes inspired by the animated worlds of Pixar’s Toy Story and Studio Ghibli’s My
    Neighbor Totoro, and read the Percy Jackson series by Rick Riordan, weaving those influences into their own doodles and journal entries.
  travel: Wendy Crane prefers meticulously planned family trips, such as the yearly visit to Disneyland and a recent weekend camping excursion in the nearby state park, while dreaming of a future road trip
    along historic Route 66 and a cultural tour of London’s museums.
  culinary: Wendy Crane loves making cheesy pepperoni pizza at home, whisking strawberry‑banana smoothies with fresh berries and yogurt, and baking chocolate chip cookies with their mom, yet they often
    forget to clean the kitchen counter before starting a new recipe.
  core: Wendy Crane is a detail‑oriented ten‑year‑old who blends routine‑driven LEGO engineering, Scratch coding, and Girl Scout badge quests with a love for pizza, swimming, and occasionally misplacing
    their homework in piles of sketchbooks.
background:
  cultural: Wendy comes from a white, middle‑class family in Anaheim, California. Her upbringing reflects typical suburban Southern California culture, emphasizing school involvement, community groups like
    Girl Scouts, and family outings to local attractions such as Disneyland and the beach. The family values punctuality, responsibility, and practical problem‑solving, while also celebrating cultural events
    common in the area, like Fourth of July fireworks and holiday parades. Her background includes exposure to a diverse, yet predominantly English‑speaking environment, where mainstream American traditions
    blend with the relaxed, outdoor‑oriented lifestyle of Orange County.
attributes:
  skills: '[''Organizational skills (keeping school supplies and personal space tidy)'', ''Arithmetic and problem‑solving'', ''Reading comprehension'', ''Basic coding in Scratch'', ''Following multi‑step
