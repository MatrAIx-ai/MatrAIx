  hobbies: '[''Fishing'', ''Hiking'', ''Pickup basketball'', ''Home woodworking projects'', ''Attending live music festivals'', ''Visiting local breweries'', ''Block parties'', ''Volunteer community clean‑ups'',
    ''Playing guitar'']'
  career_goals: Kevin aims to become a certified master carpenter within the next five years, take on supervisory roles on larger renovation projects, and eventually launch his own small contracting business
    focusing on high‑quality, custom home improvements for clients in the Milwaukee area. He also hopes to mentor younger tradespeople and contribute to the local union apprenticeship program. While he
    values the stability of routine work, he seeks opportunities that allow occasional creative, bespoke projects that keep his work engaging.
