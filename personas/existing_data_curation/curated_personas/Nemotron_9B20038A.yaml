personas:
  professional: Kevin Alvarado is a seasoned carpenter with six years of residential framing, finish carpentry, and custom cabinet experience, who applies a methodical, routine‑driven work ethic, while
    they occasionally battle spontaneous disorganization on tight deadlines, and they thrive on mentoring apprentices with a competitive edge.
  sports: Kevin Alvarado is an avid pickup basketball player at the Milwaukee Community Center and a dedicated fan of the Milwaukee Bucks and Brewers, who hikes Ozaukee County trails in the summer, fishes
    Lake Michigan on weekends, and they maintain fitness through spontaneous, high‑intensity games rather than structured gym routines, often joining local basketball leagues on a whim.
  arts: Kevin Alvarado immerses themselves in Milwaukee’s cultural scene by attending Summerfest shows featuring artists like The White Stripes and Bob Dylan, frequents the Milwaukee Art Museum for exhibitions
    by Jean‑Michel Basquiat, and collects vintage vinyl records, while they also volunteer at neighborhood block parties planning live music line‑ups, reflecting their competitive drive to curate the best
    local entertainment.
  travel: Kevin Alvarado prefers low‑key, spontaneous weekend road trips to nearby Door County cabins or a quick ferry ride to Canada’s Niagara Falls, and they dream of a summer backpacking adventure through
    the German beer gardens of Munich and the fjords of Norway, planning most trips on a whim while using a modest travel fund they have built through diligent budgeting.
  culinary: Kevin Alvarado enjoys hearty Midwestern fare, from a perfectly battered Lake Michigan walleye fish fry and cheese curds smothered in whisky‑infused gravy to home‑cooked BBQ ribs seasoned with
    smoked paprika, and they showcase their woodworking skill by hand‑crafting cutting boards and custom kitchen islands while pairing meals with craft brews from Lakefront Brewery.
  core: Kevin Alvarado is a competitive, routine‑loving carpenter who spontaneously tackles projects, loves craft beer, basketball, and Midwestern comfort food, and they balance a disciplined financial
    plan with occasional impulsive splurges.
background:
  cultural: Kevin grew up in a working‑class family in Milwaukee’s south side, where the city’s German‑Polish heritage and Midwestern work ethic shaped his values. He was raised with a blend of Catholic
    traditions and secular community activities, fostering an appreciation for local festivals, neighborhood solidarity, and the pride of craftsmanship that characterizes the region’s trade culture.
