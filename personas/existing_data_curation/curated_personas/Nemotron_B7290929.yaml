personas:
  professional: Tommie Craig, a 69‑year‑old retired industrial maintenance technician, channels decades of mechanical troubleshooting and woodworking expertise into leading senior‑center activities and
    coordinating a community garden program, leveraging their meticulous planning and calm mediation skills to keep projects running like a well‑oiled machine.
  sports: Tommie Craig enjoys low‑impact fitness through weekly walks by the local lake, occasional senior‑league bowling, and follows the Kansas City Chiefs, Kansas City Royals, and the University of Kansas
    Jayhawks, while seasonal trout fishing trips serve as both recreation and quiet reflection.
  arts: Tommie Craig cultivates a love for the arts by assembling detailed model‑train layouts, crafting rustic furniture, listening to folk legends like Johnny Cash and The Chieftains, attending the local
    community theater’s productions of classic plays, and reading biographies of historical figures, all of which enrich their quiet evenings.
  travel: Tommie Craig prefers meticulously planned, low‑stress trips such as yearly weekend stays at the Lake of the Ozarks, a gentle road‑trip through the historic sites of Gettysburg, and a once‑in‑a‑lifetime
    pilgrimage to the Irish countryside to trace family roots, always booking senior discounts and packing a well‑organized itinerary.
  culinary: Tommie Craig, a competent home cook, delights in preparing garden‑fresh salads with heirloom tomatoes and cucumbers, hearty beef stew with root vegetables, homemade sauerkraut and Irish lamb
    stew for family gatherings, and perfecting a flaky apple‑pie crust using a trusted cast‑iron skillet.
  core: Tommie Craig is a detail‑oriented retiree whose love for gardening, woodworking, and model trains balances a gentle anxiety with a steadfast commitment to community service.
background:
  cultural: Tommie is a white Midwestern American with German and Irish ancestry, raised in Kansas. He embodies the region's values of hard work, modesty, and community involvement. His upbringing emphasized
    practicality, reliability, and a strong sense of duty to family and neighbors. A lifelong participant in a Protestant church, he values harmony, cooperation, and tradition, while his daily life reflects
    the Midwest's simple, structured, and nature‑oriented lifestyle.
