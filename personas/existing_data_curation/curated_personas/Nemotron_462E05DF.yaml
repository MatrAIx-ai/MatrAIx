personas:
  professional: Derlin Sorrell, a 17‑year‑old aspiring tech‑repair entrepreneur and budding basketball talent, blends hands‑on hardware troubleshooting, Python scripting, and video editing with a disciplined,
    competition‑driven mindset to launch a community‑focused repair shop and a tutorial YouTube channel.
  sports: Derlin Sorrell dominates the local park basketball court, leading pick‑up teams with a sharp shooting eye and defensive hustle, idolizes the Los Angeles Lakers and follows the NBA season closely,
    while also enjoying seasonal streetball tournaments with the community’s youth league and occasionally playing pick‑up soccer in the summer.
  arts: Derlin Sorrell immerses themselves in contemporary hip‑hop and classic soul—spinning tracks by Kendrick Lamar, J. Cole, and Aretha Franklin—while penning original lyrics, short sci‑fi stories, and
    creating legal graffiti murals inspired by Banksy on community walls, using these creative outlets to balance the analytical side of tech tinkering.
  travel: Derlin Sorrell dreams of a budget‑friendly road trip to the Tech Expo in Las Vegas and a weekend basketball camp in Chicago, has already explored nearby state parks and the city’s public library
    for research, but stays grounded by the costs of parts and school fees, opting for day trips to local museums and occasional family outings to the beach.
  culinary: Derlin Sorrell favors quick, high‑energy meals like pepperoni pizza, chicken wings with buffalo sauce, and homemade ramen, enjoys snacking on trail mix and protein bars while coding, and occasionally
    experiments with simple Arduino‑controlled kitchen gadgets to perfect a perfectly timed grilled cheese.
  core: Derlin Sorrell is a competitive, curiosity‑driven teen who juggles basketball, tech repair, and DIY creativity while navigating teenage budget constraints and occasional health shortcuts.
background:
  cultural: Derlin is a Black teenager raised in Tucker, Georgia, a suburban enclave of Atlanta with a vibrant African‑American community. His family’s roots trace back to the Southern civil‑rights era,
    and stories of resilience and collective uplift are woven into his upbringing. He grew up attending a local Baptist church where gospel music and community service formed a strong cultural foundation.
    Southern hip‑hop, soul food gatherings, and neighborhood block parties have shaped his tastes and social outlook. While he navigates the challenges of a less‑traditional educational path, he draws strength
    from a heritage that values perseverance, creativity, and the power of mentorship within the Black community.
attributes:
  skills: '["Smartphone Repair", "PC Assembly", "Basic Python Scripting", "Basketball", "Bike Maintenance", "Video Editing", "Strategic Gaming", "Team Coordination", "Time Management"]'
  hobbies: '["Basketball at the local park", "Video gaming (strategy and shooter titles)", "DIY electronics and PC building", "Listening to hip‑hop and R&B", "Reading science‑fiction and tech blogs", "Writing
    lyrics and short stories", "Community service through church youth programs", "Street art (graffiti sketches)"]'
  career_goals: Derlin aims to earn his GED within the next year and enroll in a vocational program focused on computer hardware technology or automotive mechanics. He envisions launching a small neighborhood
    tech‑repair shop that offers affordable services to his peers and seniors, while also building an online YouTube channel that showcases step‑by‑step repair tutorials. Parallel to his technical aspirations,
    he dreams of earning a basketball scholarship or joining a semi‑professional league, using sports as a platform to stay disciplined and inspire younger kids in his community. Long‑term, he hopes to
    combine his technical business with community mentorship, helping other teenagers acquire marketable skills and confidence.
