personas:
  professional: Iris Avila, a 29‑year‑old customer‑experience analyst with a STEM bachelor's, combines razor‑sharp CRM data insight, quick public speaking, and a flair for abstract brainstorming to prototype
    user‑centric product ideas, thriving on spontaneous team jams while battling a habit of letting loose structure creep in.
  sports: Iris Avila, a 29‑year‑old adventure seeker, spends weekends scaling Utah’s canyon trails with the Wasatch Hiking Club, catches Utah Jazz games at the Delta Center, and plugs into Real Salt Lake
    matches, all while maintaining a weekly chess club meet‑up that fuels their competitive edge.
  arts: Iris Avila channels creative energy into abstract canvas pieces inspired by the bold colors of Frida Kahlo and the surreal narratives of David Lynch, regularly attends live shows featuring indie
    rock groups like The National and experimental jazz trio Kamasi Washington, and volunteers at local galleries to curate pop‑up installations.
  travel: Iris Avila, always chasing novelty, alternates between spontaneous weekend escapes to Sedona’s red rock vistas and meticulously planned trips to Iceland’s midnight sun, juggling a modest travel
    budget while using a points‑earning credit card to snag upgrades for future visits to Kyoto’s lantern festivals.
  culinary: Iris Avila flips between a novice home‑cook who whips up quick avocado toast with pepper jack and a daring foodie who relishes street‑taco trucks serving al pastor with pineapple, constantly
    experimenting with saffron‑infused risotto and hand‑rolled sushi rolls during late‑night kitchen sessions.
  core: Iris Avila is a restless 29‑year‑old blend of analytical strategist and spontaneous artist, whose calm resilience fuels a relentless quest for novelty while their competitive spirit keeps both deadlines
    and board games in perpetual tension.
background:
  cultural: Raised in a Mexican‑American household, Iris grew up bilingual and deeply connected to Mexican traditions such as Día de los Muertos and family gatherings centered around shared meals. Living
    in Midvale, Utah, she blends this vibrant heritage with the local culture, often infusing Mexican folklore motifs into her artwork and cooking authentic dishes for friends. She participates in community
    events at the local Mexican cultural center, values family ties across the border, and draws on her bicultural perspective to enrich her creative projects and interpersonal interactions.
