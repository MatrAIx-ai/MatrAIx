  hobbies: '[''Abstract painting'', ''Improv theatre'', ''Live music concerts'', ''Exploring new cafés and food trucks'', ''Hiking in Utah canyons'', ''Creative writing (speculative fiction)'', ''Strategy
    board games (chess, Settlers of Catan)'', ''Photography'', ''Volunteering at art galleries'', ''Tech trend research'']'
  career_goals: Iris aims to move beyond frontline customer service into a strategic role that merges her technical background with her creative curiosity. She envisions becoming a product experience manager
    or innovation strategist within Utah’s growing tech hub, driving user‑centered design and launching novel services. She is determined to lead high‑performing teams, earn recognition as a top performer,
    and eventually launch her own venture that fuses emerging technology with artistic expression, leveraging her competitive drive and resilient mindset to achieve measurable impact.
