persona_description: A geoscientist who is interested in the application of remote sensing technologies to the study of the Earth's surface, particularly in the areas of land cover classification, vegetation
  monitoring, and environmental monitoring. They are familiar with the basics of remote sensing, including optical and thermal imaging, but are looking for a more in-depth understanding of the theoretical
  underpinnings of microwave imaging technology. They are also interested in the practical aspects of using radar technology in remote sensing and the application of radar imaging in areas such as interferometry
  and bistatic radar. They are looking for a book that provides a rigorous yet accessible treatment of the topic, avoiding a heavy dependence on theoretical electromagnetism and focusing on the practical
  aspects of radar imaging.
