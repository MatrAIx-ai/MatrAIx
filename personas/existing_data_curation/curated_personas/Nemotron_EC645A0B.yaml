personas:
  professional: An MRI technologist with 1.5T and 3T expertise, Diana Benitez blends meticulous image quality control with an artistic eye, they lead a team while pioneering functional MRI protocols, driven
    by a competitive curiosity and balanced organization.
  sports: A seasonal outdoor enthusiast, Diana Benitez hikes the Organ Mountains with the local Alpine Club, they cheer for New Mexico United soccer matches and support the Albuquerque Isotopes, while maintaining
    a modest weekly jogging routine that they sometimes skip after long shifts.
  arts: A visually driven creator, Diana Benitez frequents the Santa Fe Art Institute, they paint watercolors of desert vistas, experiment with digital illustration, and draw inspiration from Georgia O'Keeffe,
    Ansel Adams, and contemporary photographer James Balog, while also attending folk dance workshops that celebrate Mexican traditions.
  travel: A curious explorer, Diana Benitez has trekked the red rocks of Sedona, sampled street food in Oaxaca, and dreams of photographing Kyoto’s autumn foliage, they prefer self‑guided road trips that
    balance adventure with a limited budget, often planning routes that include stops at historic art museums.
  culinary: A passionate food lover, Diana Benitez enjoys cooking green chile stew, tamales, and chiles rellenos, they relish sourcing fresh Hatch chiles and masa, but sometimes over‑salt dishes while experimenting
    with new spice blends during weekend cooking sessions.
  core: Diana Benitez is a competitively curious MRI technologist who fuses art and science, balances meticulous work with desert hikes, and occasionally sacrifices sleep for creative pursuits.
background:
  cultural: Diana grew up in a Mexican‑American household where Spanish was spoken daily and traditions like Día de los Muertos, Semana Santa, and family gatherings around tamales were central. Living in
    Vado, NM, she feels the blend of borderland culture, celebrating both Mexican festivals and New Mexican customs. Her cultural identity informs her warm hospitality, respect for community, and a deep
    appreciation for vibrant colors and storytelling, which she channels into both her professional approach to medical imaging and her artistic hobbies.
attributes:
  skills: '["MRI scanner operation (1.5T & 3T)", "Magnetic safety & emergency protocols", "Patient positioning and communication", "Anatomical and pathological image interpretation", "Image acquisition
    optimization", "Troubleshooting scanner hardware/software", "Radiology information system (RIS) and PACS management", "Data archiving and HIPAA compliance", "Continuing education & certification in
    advanced MRI sequences", "Artistic visual analysis for image quality assessment"]'
  hobbies: '["Visiting art galleries and museums", "Watercolor painting", "Photography of New Mexico landscapes", "Hiking (Organ Mountains, local trails)", "Cooking and exploring Mexican cuisine", "Traditional
    folk dancing (e.g., folklórico)", "Chess and strategic board games", "Attending neuroscience and art workshops", "Reading speculative fiction and science journals", "Volunteering at community health
    fairs"]'
  career_goals: She aims to become a senior lead MRI technologist, overseeing a team and implementing cutting‑edge imaging protocols such as functional MRI and diffusion tensor imaging. Diana plans to obtain
    the American Registry of Radiologic Technologists (ARRT) certification, pursue a specialized certification in advanced MRI techniques, and contribute to clinical research studies at a tertiary care
    center. Long‑term, she envisions developing an outreach program that combines medical imaging with community art projects, using MRI images as a bridge between science and culture.
