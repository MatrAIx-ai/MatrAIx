  career_goals: Mindy aims to progress to a regional sales manager role within the next three years, overseeing multiple market territories and shaping broader sales strategies. She is passionate about
    embedding creative storytelling into the sales process, and plans to lead a cross‑departmental initiative that blends art‑inspired messaging with data‑driven selling. Mindy also intends to develop a
    mentorship program that supports the professional growth of women and underrepresented employees in sales. To solidify her leadership credentials, she is considering an executive MBA or a Certified
    Sales Leader certification. Ultimately, she envisions a senior executive position—such as Director of Sales Operations or VP of Sales—where she can champion an innovative, culturally attuned sales culture.
