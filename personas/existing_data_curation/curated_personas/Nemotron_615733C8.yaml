personas:
  professional: Flor Perez is a dedicated volunteer leader at the Katy community center, channeling their disciplined organizational talent, bilingual outreach skills, and reverence for family‑centric traditions
    into overseeing senior programs and laying the groundwork for a home‑based authentic Mexican catering service.
  sports: Flor Perez enjoys a routine of early morning walks with the Katy Trail Runners, follows the Houston Astros and Dallas Cowboys avidly, and participates in a local co‑ed softball league that balances
    friendly competition with community bonding.
  arts: Flor Perez enriches their life through singing in the church choir, quilting inspired by traditional motifs, and attending performances by artists like Vicente Fernández and the Ballet Folklórico,
    while also devouring historical biographies of figures such as Frida Kahlo and César Chávez.
  travel: Flor Perez prefers meticulously planned road trips that blend cultural immersion and relaxation, having explored Oaxaca’s culinary markets and the historic missions of San Antonio, and now dreams
    of a pilgrimage to Seville’s Feria de Abril to deepen their culinary repertoire.
  culinary: Flor Perez boasts a robust repertoire of family recipes—including mole poblano, tamales de elote, and fresh salsa verde—cooking with staples like dried chilies, masa harina, and fresh cilantro,
    while balancing a modest skill level that shines brightest during community potlucks and upcoming catering events.
  core: Flor Perez blends disciplined organization with a warm community spirit, often juggling a garden, a choir rehearsal, and a spreadsheet of recipes, yet habitually forgets to water succulents on rainy
    days.
background:
  cultural: Flor Elena grew up in a Mexican household in Texas, where she learned the values of family, faith, and community. She maintains strong ties to Mexican traditions, celebrates Día de los Muertos,
    Quinceañeras, and shares her heritage through food and cultural events. Her bilingual upbringing enables her to bridge cultures within Katy’s diverse community.
attributes:
  skills: '[''Event Coordination'', ''Budget Management'', ''Bilingual Communication (Spanish/English)'', ''Traditional Mexican Cooking'', ''Home Organization'', ''Gardening'', ''Volunteer Program Management'']'
  hobbies: '[''Cooking Mexican recipes'', ''Gardening'', ''Church choir participation'', ''Reading biographies'', ''Youth mentorship volunteering'', ''Quilting'', ''Attending cultural festivals'']'
  career_goals: She aims to become a trusted volunteer leader at her local community center, overseeing senior programs and eventually launching a home‑based catering business specializing in authentic
    Mexican cuisine. Flor Elena also plans to obtain a caregiving certification to support her aging parents and contribute to community health initiatives.
