  career_goals: Although retired, Monika aims to expand her impact on the Dry Ridge community. She plans to launch a senior gardening club that pairs horticultural education with social interaction, and
    to become the volunteer coordinator for the local community center, training new volunteers in event logistics and safety. She wishes to document her family’s multigenerational stories in a memoir that
    blends oral history with photographs. Learning to play the piano is a personal ambition, as is completing a short course on digital photography to capture community events. Monika also hopes to travel
    within Kentucky to visit state parks and historic sites, fostering a deeper appreciation of her region’s natural and cultural heritage.
