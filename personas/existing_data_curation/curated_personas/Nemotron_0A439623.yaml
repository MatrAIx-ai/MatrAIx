personas:
  professional: Antonina Landreneau, a retired business administrator, leverages their bookkeeping savvy and event‑planning flair to coordinate volunteer programs at the local senior center while mentoring
    younger women in budgeting, balancing a relaxed approach to schedules with an assertive knack for resolving group disputes.
  sports: Antonina Landreneau enjoys leisurely birdwatching walks in the city park, participates in the community seniors’ walking club, and cheers for the New Orleans Saints and LSU Tigers while occasionally
    playing catch‑up softball at the senior center.
  arts: Antonina Landreneau immerses themselves in historical fiction by authors like Hilary Mantel, quilts intricate patterns inspired by ancestral motifs, captures everyday scenes with a Canon EOS camera
    following Annie Leibovitz’s lighting style, and attends local theater productions featuring classic Southern plays.
  travel: Antonina Landreneau prefers low‑stress road trips to historic towns such as Savannah, Charleston, and Quebec City, relishes a recent Mississippi River cruise, and dreams of a leisurely visit to
    Montreal’s old port to explore their family’s roots.
  culinary: Antonina Landreneau expertly prepares Creole classics like shrimp étouffée and jambalaya using fresh rosemary and thyme from their herb garden, experiments with Thai green curry on weekends,
    and treats themselves to a slice of pecan pie while listening to classic jazz.
  core: Antonina Landreneau blends quiet curiosity with a practical, slightly disorganized charm, finding joy in gardening, quilting, and mentoring while occasionally worrying about money and health.
background:
  cultural: Antonina is a white American of French‑Canadian descent who grew up in the Dallas‑Fort Worth metroplex. Her family’s heritage blends Creole culinary traditions with classic Southern hospitality,
    and she was raised in a Catholic household that emphasized community service and family ties. Living in Lewisville, Texas, she is influenced by the region’s blend of suburban life, Texan independence,
    and multicultural neighborhoods, which informs her values of self‑reliance, respect for tradition, and openness to new ideas.
