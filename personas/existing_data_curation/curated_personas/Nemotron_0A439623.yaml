  career_goals: Although retired from formal employment, Antonina aims to stay mentally and socially engaged. She hopes to expand her volunteer work at the local senior center, mentor younger women in budgeting
    and home‑care skills, complete a memoir that captures her family’s French‑Texan heritage, and learn intermediate digital photography to document community events. Maintaining health, independence, and
    financial stability are also central to her long‑term goals.
