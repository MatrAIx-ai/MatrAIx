persona_description: A member of the European Union (EU) who is interested in environmental sustainability, poverty reduction, and the management of natural resources. They are likely to be involved in
  EU development policy, environmental protection, and natural resource management. They may have expertise in sustainable development strategies, the Cotonou Agreement, and the environment. They are also
  likely to be knowledgeable about the Millennium Ecosystem Assessment and its findings on the decline in ecosystems that support human development and supply many of the services and products which we
  all take for granted. They may also be interested in the future of Europe and its dependence upon global natural resources, as well as the impacts of their actions on the sustainable development of other
  countries.
