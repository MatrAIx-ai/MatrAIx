  career_goals: Jesusa aims to champion inclusive technology that narrows the digital divide for older adults and Latino communities. She plans to lead an open‑source project that provides culturally aware,
    intuitive tools for art creation and storytelling. Over the next few years, she intends to mentor emerging developers through local coding bootcamps, publish a bilingual guide on accessible software
    design, and consult for nonprofits seeking tech solutions. Ultimately, she envisions transitioning to a part‑time advisory role to explore emerging AI‑art interfaces while preserving her legacy of mentorship
    and cultural advocacy.
