  hobbies: '[''Cooking traditional dishes'', ''Listening to Mexican music'', ''Single-player video gaming'', ''Automotive model building'', ''Reading automotive magazines'', ''Balcony gardening'', ''Sketching'']'
  career_goals: Abelardo hopes to pursue a vocational path that offers stability, clear expectations, and the ability to support his family. He aims to enroll in a community‑college trade program either
    in automotive technology or culinary arts, eventually securing a reliable job as an automotive technician or a chef specializing in Mexican cuisine. His long‑term ambition is to work for a reputable
    shop or open a modest family‑run kitchen where he can maintain a predictable schedule, provide for loved ones, and avoid high‑pressure corporate environments.
