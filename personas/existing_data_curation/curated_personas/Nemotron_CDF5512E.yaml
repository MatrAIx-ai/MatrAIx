personas:
  professional: Abelardo Mora, a 16‑year‑old aspiring automotive technician and home‑cook, blends his hands‑on knack for routine car maintenance and his reliable, empathetic listening to envision a future
    as a dependable shop mechanic who values predictable schedules and harmonious teamwork.
  sports: Abelardo Mora, a quiet teen who prefers watching over playing, follows the local professional soccer team River City FC and the national baseball side the Harbor Hawks, enjoys occasional weekend
    jogs around his neighborhood for functional fitness, and belongs to his school’s casual automotive club that doubles as a light‑exercise group.
  arts: Abelardo Mora finds solace in the plaintive tones of ranchera legends like Vicente Fernández and the gritty storytelling of corrido group Los Tigres del Norte, while his sketchbook captures quiet
    street corners reminiscent of Edward Hopper, and occasional binge‑watching of classic Mexican cinema starring María Félix fuels his appreciation for visual storytelling.
  travel: Abelardo Mora dreams of a low‑cost road trip through the historic towns of Guanajuato and San Miguel de Allende, prefers meticulously planned itineraries over spontaneous getaways, balances the
    desire for new scenery with his family's budget constraints, and hopes to someday visit the coastal cliffs of Los Cabos for a weekend of seaside cooking experiments.
  culinary: Abelardo Mora, a competent home‑cook, regularly prepares beloved dishes such as carnitas, chiles en nogada, and homemade tamales using fresh cilantro, roasted jalapeños, and corn masa, relishes
    the ritual of family meals around the kitchen table, yet sometimes shortcuts recipes with pre‑made sauces when pressed for time.
  core: Abelardo Mora, a routine‑loving yet mildly anxious teen, channels his solitary, hands‑on passions into cooking and car tinkering while quietly balancing kindness with a tendency to over‑worry.
background:
  cultural: Abelardo is a second‑generation Mexican‑American raised in a bilingual household where Spanish is spoken daily and Catholic traditions shape family life. He celebrates Mexican holidays such
    as Día de los Muertos and enjoys cooking recipes passed down from his grandparents. Living in Milwaukee's Latino community, he blends Mexican cultural heritage with Midwestern American influences, participating
    in local cultural festivals, community events, and maintaining strong ties to his family's roots while navigating life in a diverse urban setting.
attributes:
  skills: '[''Cooking (Mexican cuisine)'', ''Bilingual communication (Spanish/English)'', ''Basic automotive maintenance'', ''Handyman tasks'', ''Smartphone troubleshooting'', ''Routine organization'',
