  hobbies: '[''Community Basketball League'', ''Barbecue & Grilling Experiments'', ''Restaurant Exploration & Blogging'', ''Weekend Road‑Trip Travel'', ''Live Music (Jazz & Hip‑Hop)'', ''Hospitality Podcasts'',
    ''Church Youth Mentoring'', ''Classic Car Restoration'', ''Competitive FIFA Gaming'']'
  career_goals: Demetrius aims to move from desk clerk to Front Office Supervisor within the next 18 months and become Front Office Manager within two years. He plans to enroll in an associate’s degree
    program in Hospitality Management at a community college and earn the Certified Front Desk Representative (CFDR) and eventually the Certified Hotel Administrator (CHA) credentials. In the longer term,
    he aspires to oversee a boutique hotel in the Greater Dallas area, leveraging his deep knowledge of guest expectations to build a property known for exceptional service. His competitive drive fuels
    a desire to be recognized as a top performer in guest satisfaction scores and to mentor newer staff as a future general manager.
