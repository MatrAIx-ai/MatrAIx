persona_description: A microbiologist who specializes in the development of heat-stable freeze-dried vaccines for the eradication of smallpox. He is particularly known for his work with Leslie Collier,
  who developed a method for producing a heat-stable freeze-dried vaccine in powdered form, and for his work with Benjamin Rubin, who developed the bifurcated needle, a sharpened two-prong fork designed
  to hold one dose of reconstituted freeze-dried vaccine by capillarity, which was used globally in the WHO Smallpox Eradication Campaign from 1968. His work has had a significant impact on the eradication
  of smallpox and has earned him recognition and awards.
