personas:
  professional: Khiari Hart, an aspiring junior robotics engineer, merges disciplined curiosity with practical design by building Scratch‑programmed Lego robots that echo science‑fiction concepts while
    adhering to step‑by‑step engineering methods.
  sports: Khiari Hart channels energy into hip‑hop dance classes at the community center, plays on the school’s basketball club that competes in the regional middle‑school league, and roots for the Los
    Angeles Lakers while also cheering on the local youth soccer team, balancing structured teamwork with personal freedom in each practice.
  arts: Khiari Hart expresses creativity by sketching futuristic cityscapes inspired by the films of Denis Villeneuve, playing piano pieces by Ludovico Einaudi, and studying the choreography of the Jabbawockeez,
    while regularly listening to Billie Eilish and reading the biography of Ada Lovelace for artistic and scientific inspiration.
  travel: Khiari Hart loves family trips that blend education and adventure, having explored Washington, D.C.’s National Air and Space Museum and the Smithsonian’s National Museum of African American History
    and Culture, while dreaming of a future visit to the Kennedy Space Center in Florida and a study‑tour of Tokyo’s Miraikan museum to see cutting‑edge robotics.
  culinary: Khiari Hart enjoys cooking simple yet inventive meals, such as homemade macaroni‑and‑cheese with extra sharp cheddar and a sprinkle of paprika, banana‑bread muffins with walnuts, and beginner
    sushi rolls featuring avocado, cucumber, and seasoned rice, though they sometimes forget to clean the kitchen counter after experiments.
  core: Khiari Hart blends meticulous organization with boundless curiosity, tackling robotics projects, budget spreadsheets, and journal pages all while juggling anxiety, a love for hip‑hop rhythm, and
    a habit of leaving dishes unattended until reminded.
background:
  cultural: Khiari comes from an African-American family rooted in Washington, D.C., where generations have been active in the city’s civil-rights legacy. Her grandparents shared stories of the 1960s movement,
    and family traditions include celebrating Juneteenth, cooking soul-food dishes like collard greens and cornbread, and attending church services that emphasize community service. Growing up near the
    Smithsonian’s African American Museum, she often visits exhibitions that deepen her pride in Black history and culture. These experiences foster a strong sense of identity, a respect for education,
    and a commitment to give back to her community through volunteering and advocacy.
