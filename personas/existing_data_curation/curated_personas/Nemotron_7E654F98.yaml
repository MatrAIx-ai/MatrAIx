  career_goals: Khiari aspires to become a pediatrician or a public-health researcher who can combine her love of science with her desire to help others. She dreams of attending a top high school in D.C.,
    then studying biology and environmental health in college, eventually working on community health initiatives that address childhood wellness. Her disciplined nature drives her to set high academic
    standards, while her caring personality motivates her to make a positive impact on the well-being of her peers and neighborhood.
