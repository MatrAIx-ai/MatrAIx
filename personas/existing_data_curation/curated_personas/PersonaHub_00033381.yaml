persona_description: A Physical Therapist who specializes in treating patients with muscle injuries, particularly those caused by trauma. They have extensive knowledge of muscle injuries and their treatment,
  including the application of ice and compression, immobilization in a surgical boot, and surgical evacuation of hematomas. They are skilled in managing pain and tenderness, and have experience in the
  management of long-term effects such as localized tenderness to touch. They are aware of the potential for complications such as bone development within the muscle and the need for surgery to decompress
  the compartment and prevent nerve damage. They have a thorough understanding of the clinical pictures and signs of compartment syndrome, and are prepared to provide immediate attention to this condition.
