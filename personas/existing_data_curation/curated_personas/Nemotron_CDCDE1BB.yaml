personas:
  professional: Milton Wells, a veteran computer systems analyst with over three decades of experience, they apply their organized, methodical mindset and competitive drive to blend curiosity about AI‑driven
    analytics with pragmatic, risk‑aware enterprise architecture, leading cost‑cutting cloud migrations, conducting meticulous stakeholder workshops, and mentoring junior analysts while vigilantly questioning
    vendor claims.
  sports: Milton Wells stays active through a weekly hiking club in the Rocky Mountain foothills, a summer adult softball league with the Littleton Lions, mountain biking on the Colorado Trail network,
    seasonal ski trips, and they cheer for the Denver Broncos, Colorado Rockies, and Colorado Avalanche while regularly competing in chess and bridge tournaments at the community center.
  arts: Milton Wells enjoys classic rock legends such as The Eagles and Fleetwood Mac, attends live performances at the Denver Center for the Performing Arts, collects vintage computer hardware as functional
    art, and watches wilderness documentaries, all of which satisfy their creative curiosity and provide a cultural counterbalance to their technical career.
  travel: Milton Wells plans travel with an engineer’s checklist, favoring adventure‑filled trips like a spring trek through Patagonia’s Torres del Paine, a ski getaway to Whistler, a tech conference tour
    of Tokyo and Berlin, and weekend revisits to Colorado’s Mesa View Trail, balancing a modest budget with a desire for memorable experiences.
  culinary: Milton Wells delights in preparing hearty Colorado fare such as bison chili, elk burgers with rosemary‑garlic crust, and wild mushroom risotto, they skillfully use a sous‑vide for precise protein
    cooking yet often over‑season with smoked paprika, and they regularly explore local farmers’ markets for fresh heirloom tomatoes and Colorado trout.
  core: Milton Wells is a methodical yet curious tech veteran whose competitive spirit fuels both high‑stakes board games and ambitious digital transformation projects, while a disciplined health routine
    and a penchant for spicy mountain cuisine keep life flavorful.
background:
  cultural: Milton was raised in a middle-class Anglo-American family in the Denver metropolitan area. His cultural upbringing blends a classic Midwestern work ethic—punctuality, reliability, and a hands-on
    problem-solving mindset—with the outdoor-oriented lifestyle that defines Colorado. He celebrates national holidays such as Thanksgiving, Fourth of July, and Memorial Day, and participates in community
    events like the Littleton Summer Festival. Family traditions include a yearly cabin trip to the Rockies, reinforcing a love for nature and camaraderie. While largely secular, his values reflect the
    Protestant ethic of stewardship and community service, which he expresses through volunteer work and mentoring. The region’s progressive attitudes toward technology and sustainability also shape his
    professional perspective.
