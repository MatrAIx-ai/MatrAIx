persona_description: A healthcare professional who is knowledgeable in the fields of cardiology and exercise physiology, particularly in the context of stress testing and heart health. This person is likely
  to have a background in medical or healthcare settings and has experience conducting or interpreting stress tests, such as TMT or treadmill tests, as part of their job responsibilities. They are familiar
  with the technical aspects of ECG machines and have a keen interest in the physiological responses of the heart during exercise, particularly during stress tests. This person is likely to be experienced
  in interpreting results from these tests and is able to communicate complex medical information in a clear and understandable manner.
