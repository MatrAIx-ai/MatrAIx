personas:
  professional: Yadira Lara, a seasoned automotive service technician with over twenty years of hands‑on experience, combines meticulous diagnostic skill with a calm, supportive demeanor, leveraging a curiosity
    for emerging EV technology while keeping a well‑documented but slightly chaotic workshop where they effortlessly locate the right tools when needed.
  sports: Yadira Lara enjoys low‑impact fitness, taking early‑morning walks through Forest Park and cheering on the New York Mets and the Queensboro FC while belonging to a small community walking group
    that meets twice a week, preferring the quiet rhythm of strolling over high‑intensity sports.
  arts: Yadira Lara finds solace in the sounds of 70s salsa, plena, and bomba, often listening to Tito Puente and Celia Cruz while assembling model car kits, and they regularly peruse classic car magazines
    and attend local art gallery openings featuring vibrant Caribbean‑inspired paintings that echo their heritage.
  travel: Yadira Lara favors purposeful road trips that double as research expeditions, having visited the Henry Ford Museum in Michigan and a historic automobile festival in Texas, while dreaming of a
    scenic drive through the coastal towns of New England and a future weekend getaway to a Caribbean island that would let them test a restored electric‑converted vehicle.
  culinary: Yadira Lara enjoys cooking family‑rooted dishes such as arroz con gandules, pernil, and a fragrant sofrito made with herbs from their balcony garden, skillfully blending fresh tomatoes and citrus
    from a dwarf tree into hearty meals that provide comfort and a tangible link to their cultural roots.
  core: Yadira Lara, a 46‑year‑old automotive technician, balances a meticulous love of classic cars and garden herbs with a quiet, introspective nature and an ongoing battle against anxiety.
background:
  cultural: Yadira grew up in a bilingual Puerto Rican household, speaking both Spanish and English fluently. Her family traditions—such as celebrating Noche de San Juan, preparing arroz con habichuelas,
    and listening to plena and bomba music—remain central to her identity. Living in Queens, she stays connected to the local Puerto Rican community through church gatherings, cultural festivals, and neighborhood
    markets where she purchases familiar ingredients. The island’s values of perseverance, family solidarity, and community service have shaped her compassionate approach to work, motivating her desire
    to help others through reliable vehicle maintenance. As a widowed mother of adult children, she now finds solace in solitary activities, yet her cultural roots continue to inform her food, music, and
    occasional participation in communal celebrations.
attributes:
  skills: '[''Engine diagnostics and repair'', ''Transmission disassembly and rebuild'', ''Brake system maintenance'', ''Hybrid and electric vehicle basics'', ''Use of OBD‑II scanning tools'', ''Vehicle
    safety and emissions compliance'', ''Customer communication and service'', ''DIY vehicle modifications for accessibility'', ''Workshop safety protocols'', ''Mentoring junior technicians'']'
  hobbies: '[''Reading automotive manuals and classic car magazines'', ''Restoring a 1978 Chevrolet Camaro as a personal project'', ''Balcony gardening (herbs, tomatoes, dwarf citrus tree)'', ''Cooking
    traditional Puerto Rican dishes'', ''Listening to salsa, plena, and bomba music with headphones'', ''Early‑morning walks in Forest Park'', ''Practicing guided meditation and gentle yoga'', ''Collecting
    and assembling model car kits'']'
  career_goals: Yadira aims to attain the ASE Master Technician certification to solidify her professional credentials and deepen her expertise in electric‑vehicle maintenance. She dreams of opening a small,
    community‑focused garage in Queens that offers flexible hours and a quiet, supportive environment for senior drivers and clients who prefer a calm service setting. She also wishes to develop a mentorship
    program specifically for women entering the automotive trade, sharing her knowledge while fostering a collaborative workplace culture. Balancing her career ambitions with her mental‑health needs, Yadira
    plans to integrate regular mindfulness practices into her routine to manage anxiety and maintain emotional resilience.
