personas:
  professional: A retired elementary and secondary school teacher turned community mentor, Elizabeth Oba channels her 40‑year legacy of curriculum design, visual‑arts integration, and event planning into
    mentoring at‑risk educators, curating a traveling coastal‑artist exhibition, and advocating for heritage preservation, all while maintaining a meticulous, competitive edge that pushes her initiatives
    to outdo past projects.
  sports: An avid bridge player and dedicated beach‑walker, Elizabeth Oba joins the Cape May Senior Bridge Club for strategic card battles, hikes the dunes each morning for low‑impact cardio, cheers the
    Philadelphia Eagles and New York Yankees from her porch, and participates in a seasonal senior walking group that meets for weekly 3‑mile strolls along the shoreline.
  arts: A watercolorist enamored with coastal vistas, Elizabeth Oba spends weekends painting dunes and harbor scenes while drawing inspiration from Georgia O'Keeffe’s palette, Claude Monet’s light, and
    contemporary artist Kehinde Wiley’s bold colors, regularly attends openings featuring works by local artists like Brian Stauffer, and enjoys listening to cello virtuoso Yo‑Yo Ma and watching Meryl Streep’s
    performances for artistic rejuvenation.
  travel: A meticulous planner with a love for leisurely cultural immersion, Elizabeth Oba has explored Philadelphia’s historic museums, taken the Amtrak to New York for Broadway outings, and savored weekend
    trips to the Amalfi Coast and Seville, while dreaming of a future pilgrimage to the Greek islands of Crete and Santorini to study Mediterranean culinary traditions, all within a modest travel budget
    that balances scholarship funding.
  culinary: A passionate home chef specializing in Mediterranean fare, Elizabeth Oba expertly prepares dishes such as Greek salad with Kalamata olives, chickpea‑laden shakshuka, and lemon‑herb grilled sea
    bass, favors ingredients like fresh basil, feta, and extra‑virgin olive oil, and enjoys occasional dining at Cape May’s waterfront seafood bistro for a plate of bouillabaisse, while her cooking skill
    remains comfortably advanced but never professional.
  core: Elizabeth Oba, a 73‑year‑old retired teacher with a relentless curiosity, competitive streak, and occasional worry‑induced overthinking, fills her days with watercolor dunes, bridge battles, and
    meticulous scholarship planning, balancing a disciplined budget with a penchant for splurging on art supplies and cultural outings.
background:
  cultural: Elizabeth grew up in a middle‑class Irish‑American family in the suburban Philadelphia area, raised in a Methodist household that emphasized education, community service, and seasonal coastal
    traditions. Her parents encouraged a love of reading and the arts, shaping her later career in education. Upon retirement she settled in Stone Harbor, NJ, where she embraced the town’s maritime heritage,
    environmental stewardship, and vibrant arts scene. She participates in local holiday celebrations, supports historic preservation societies, and maintains family customs such as large Thanksgiving gatherings
    and Sunday brunches, reflecting a blend of Mid‑Atlantic cultural values and seaside community identity.
attributes:
