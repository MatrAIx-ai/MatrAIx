personas:
  professional: Nita Boyett, a seasoned logistics professional with a CDL Class A and three decades of long‑haul and regional trucking expertise, leverages their methodical route‑planning, fuel‑efficiency
    focus, and knack for persuasive client negotiations to lead driver teams while mentoring newcomers through hands‑on safety workshops.
  sports: Nita Boyett stays active by leading a weekend walking club through Iowa’s scenic byways, cheering on the Iowa Hawkeyes football team each fall, following the Des Moines Menace soccer matches,
    and occasionally joining a community softball league, all while tracking mileage with the same precision they apply to freight routes.
  arts: Nita Boyett weaves community connection into art by heading a quilting circle that reproduces traditional Amish patterns, knitting scarves to the rhythm of Johnny Cash and Elvis Presley, and attending
    the Montrose theater’s productions of classic Americana like The Music Man, which fuels their love for hands‑on creativity.
  travel: Nita Boyett prefers meticulously planned weekend road trips along Iowa’s Covered Bridge Scenic Byway, stopping at historic towns such as the Amana Colonies and savoring local diners, while dreaming
    of a leisurely drive to Mackinac Island’s car‑free streets, balancing a modest retirement budget with a love for quiet, culturally rich getaways.
  culinary: Nita Boyett blends their green thumb with kitchen skill, turning heirloom tomatoes, bell peppers, and basil into fresh bruschetta and herb‑infused chicken, while also perfecting classic Midwest
    comfort foods like pork chops with apple‑butter glaze and never passing up a slice of homemade berry pie made with hand‑picked fruit.
  core: Nita Boyett balances relentless organization with a mischievous love for late‑night country radio jams, never hitting the road without a spare tire and a notebook of route optimizations, yet they
    occasionally splurge on boutique quilting yarns despite a tight budget.
background:
  cultural: Nita was born and raised on a family farm just outside Montrose, Iowa, in a multigenerational White, predominantly German‑American household. The Midwestern values of hard work, self‑reliance,
    and community service were instilled from a young age, reinforced by her active participation in the local Lutheran church, 4‑H projects, and county fairs. She attended the local public school and later
    completed some coursework in business administration at a regional community college, reflecting the practical, vocational orientation common in the area. These cultural roots inform her disciplined,
    organized approach to both work and personal life, as well as her deep commitment to community involvement and mentorship.
attributes:
  skills: '[''CDL Class A commercial driving'', ''Long‑haul and regional route planning'', ''Fuel efficiency and logistics optimization'', ''DOT safety compliance and record‑keeping'', ''Basic vehicle maintenance
    and troubleshooting'', ''Sales negotiation and client relationship management'', ''Public speaking and presentation'', ''Training and mentoring of new drivers'', ''Inventory tracking and logistics coordination'',
    ''Time management and scheduling'']'
  hobbies: '[''Gardening (heirloom tomatoes, peppers, herbs)'', ''Bridge and Scrabble clubs at the senior center'', ''Church fundraising and community quilting circle'', ''Knitting scarves and blankets'',
    ''Listening to classic country and early rock‑and‑roll music while driving'', ''Weekend scenic road trips across Iowa'', ''Reading historical fiction novels'']'
  career_goals: Nita’s immediate goal is to secure a senior logistics coordinator position within her current company, overseeing a team of drivers and expanding service routes throughout southern Iowa
    and neighboring states. She plans to complete a Certified Driver Trainer (CDT) program to formalize her mentoring role and hopes to develop a small on‑demand freight brokerage that leverages her dual
    expertise in driving and sales. Long‑term, Nita aspires to be recognized as a safety champion and to mentor the next generation of women in the trucking industry, possibly establishing a scholarship
    for local youth interested in transportation careers.
