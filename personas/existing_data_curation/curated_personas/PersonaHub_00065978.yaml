persona_description: A mantis shrimp researcher who specializes in the study of visual communication and color preservation in deep ocean environments. They are dedicated to understanding how mantis shrimp
  use their antennal scales to communicate and adapt to their unique environment, and how they have evolved to adapt to the limited light spectrum available in the deep ocean. They are also interested in
  the specific fluorescent materials used by the Lysiosquillina glabriuscula mantis shrimp to preserve their color signals in a monochromatic environment.
