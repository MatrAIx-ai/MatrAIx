personas:
  professional: Nitya Sembrano, a retired senior-center coordinator who channels her competitive bridge mindset and exacting budgeting skills into designing structured intergenerational programs, while
    mentoring volunteers with a skeptical eye for detail and a drive to measure mental-wellness outcomes.
  sports: Nitya Sembrano, a regular at the community pool’s water-aerobics class, a devoted fan of the Miami Dolphins and the Florida Gators, and a member of the local senior walking club that meets each
    Saturday for a breezy stroll through the botanical garden.
  arts: Nitya Sembrano, an avid patron of the downtown community theater, a collector of Monet reproductions, and a lover of world‑music playlists featuring traditional stringed folk instruments and jazz
    pianist Diana Krall that accompany her cooking evenings.
  travel: Nitya Sembrano, who enjoys weekend getaways to the Florida Keys, annual trips to New Orleans for the jazz festival, and dreams of strolling through the gardens of Marrakech, always budgeting travel
    expenses in her meticulous spreadsheet.
  culinary: Nitya Sembrano, a heritage-inspired home chef who blends garden-fresh citrus, cardamom, cumin, coconut milk, and mango into dishes like spiced lentil stew, coconut-lime chicken, and mango chutney,
    while perfecting the art of sourdough bread using locally grown herbs.
  core: Nitya Sembrano blends competitive spirit, meticulous organization, and community-centered generosity into a vibrant senior life flavored by garden-fresh cooking, water-aerobics, and cultural bridge-building.
background:
  cultural: Born to South Asian parents who immigrated to the United States, Nitya grew up balancing traditional Indian customs with American life. She celebrates Diwali with elaborate lantern displays
    and festive meals, while also engaging in the broader Tampa multicultural scene. Her fluency in English and conversational Hindi allows her to bridge generational gaps within the diaspora community.
    Over the decades, she has woven elements of Floridian coastal culture—such as seafood dishes and beach outings—into her South Asian culinary repertoire, creating a unique fusion that reflects her adaptability
    and respect for both her heritage and current environment.
attributes:
  skills: '["Event planning and coordination", "Volunteer management", "Budgeting and resource allocation", "Home cooking (South Asian cuisine)", "Basic computer literacy", "Household management", "Problem
