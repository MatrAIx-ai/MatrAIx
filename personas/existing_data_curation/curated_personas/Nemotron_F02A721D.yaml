    sessions"]'
  career_goals: Although retired from formal employment, Nitya is driven to remain an influential figure within her senior community. Her primary ambition is to expand the senior center's intergenerational
    programming, bridging the gap between younger volunteers and older residents through structured workshops and cultural exchange events. She aspires to mentor newer volunteers, passing on her organizational
    expertise and fostering a culture of accountability. Nitya also hopes to obtain a certification in geriatric counseling to better support widowed seniors navigating grief, combining her competitive
    drive to set measurable outcomes for mental‑wellness initiatives.
