  career_goals: Dena dreams of merging her love for art with a desire to support others' emotional well‑being. She aspires to become an art therapist, using creative expression to help adolescents navigate
    anxiety and stress, drawing on her own experiences of worry. To reach this goal, she plans to enroll in advanced art classes in high school, volunteer at local community centers and youth counseling
    programs, and eventually study psychology and visual arts at a university. She also envisions working part‑time at a museum or gallery to gain exposure to curation and community outreach, aiming for
    a career that balances creativity, organization, and compassion.
