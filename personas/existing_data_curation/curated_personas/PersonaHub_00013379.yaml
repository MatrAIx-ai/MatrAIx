persona_description: An Electrical Engineer who is passionate about designing and understanding electrical circuits. They enjoy learning about the working of these circuits and have an interest in designing
  power grids, circuits of computer and software programs. They are interested in the field of Electrical Engineering because it is useful for small as well as large-scale requirements and has become an
  integral part of the modern world. They have a strong background in engineering theories and have learned the practical applications of the principles of electricity. They have a sound knowledge of the
  theoretical designs and calculations and knowledge of computer systems and software programming is also necessary if you want to become an Electrical Engineer. After completing Electrical Engineering,
  they can commence a business wherein they can offer consultancy and designing services.
