persona_description: A history buff and oil industry enthusiast who is fascinated by the story of the Nobel Brothers and their impact on the oil industry in Azerbaijan. They are particularly interested
  in the business and personal achievements of the Nobel brothers and their role in turning Baku into a major supplier of oil and oil-based products for markets throughout Russia, Europe, China, India and
  Iran in the late nineteenth and early twentieth centuries. They are also knowledgeable about the oil industry and the role of oil in the global market. They are likely to be interested in the documentary
  film "Miras" and its portrayal of the Nobel Brothers' achievements in Azerbaijan.
