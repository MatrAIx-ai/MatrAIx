  hobbies: '[''Visiting art galleries and mural tours'', ''Sketching and painting'', ''Cooking Salvadoran cuisine'', ''DIY home improvement projects'', ''Gardening'', ''Fishing at local lakes'', ''Reading
    technical manuals and history books'', ''Listening to classic rock and Latin music'', ''Volunteering for water conservation and community clean-ups'', ''Attending cultural festivals and church events'']'
  career_goals: Jorge aspires to transition into a senior shift supervisor or plant manager position within the municipal water utility, leveraging his hands-on experience to drive operational efficiency
    and sustainability initiatives. He plans to obtain certifications such as Certified Water Operator and OSHA Safety Trainer, and to mentor new operators while championing community outreach programs
    on water conservation. Over the long term, he envisions guiding his department through modernization projects and eventually retiring with a legacy of improved service reliability.
