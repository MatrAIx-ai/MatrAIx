personas:
  professional: Jorge Montalvan, a seasoned water utility technician with expertise in SCADA systems, hydraulic troubleshooting, and bilingual crew coordination, leverages their methodical, organized nature
    to streamline preventive maintenance schedules while championing sustainability initiatives at the municipal level.
  sports: Jorge Montalvan, a member of the Lake Tillery Anglers Association, spends weekends fishing on Lake Tillery, follows the Carolina Panthers and Charlotte Hornets on game days, and joins a local
    adult softball league in the spring, using light jogging and stretching to stay limber.
  arts: Jorge Montalvan, an avid patron of the Greensboro art scene, frequently visits murals by local artist John Yearsley, draws inspiration from Diego Rivera’s vivid storytelling and Georgia O’Keeffe’s
    landscapes, and unwinds listening to Los Lobos and Bob Dylan while sketching countryside scenes.
  travel: Jorge Montalvan prefers meticulously planned road trips to Asheville’s Blue Ridge Mountains and spontaneous weekend getaways to Charleston’s historic waterfront, while dreaming of an eco-tour
    of the Galápagos Islands, balancing a modest travel budget with occasional family visits to their hometown in Central America.
  culinary: Jorge Montalvan, a confident home cook, masterfully prepares traditional pupusas and tamales, often experimenting with Southern twists like smoked pork and collard-green fillings, and delights
    in seasoning dishes with chipotle, cilantro, and masa harina.
  core: Jorge Montalvan merges a methodical engineer’s precision with a curious artist’s wanderlust, channeling a love for water stewardship and mural-filled streets into a life where spreadsheets share
    space with paintbrushes and occasional back-pain reminds them to pause.
background:
  cultural: Born to Salvadoran immigrant parents, Jorge grew up steeped in the traditions of El Salvador, speaking Spanish at home and celebrating holidays such as Holy Week processions, Día de los Muertos,
    and the annual pupusa festival with family and the local Salvadoran community. While residing in Salisbury, NC, he has blended his cultural roots with Southern hospitality, enjoying Southern barbecues
    and attending local festivals, yet he maintains a strong connection to his heritage through cooking Salvadoran dishes, participating in church gatherings, and supporting community groups that preserve
    Central American culture.
attributes:
  skills: '[''Pump operation and maintenance'', ''Hydraulic system troubleshooting'', ''Preventive maintenance scheduling'', ''SCADA system monitoring'', ''Environmental and safety compliance'', ''Basic
