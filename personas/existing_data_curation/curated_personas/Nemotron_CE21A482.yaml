  career_goals: Hafiza dreams of a future where she can help others every day. She often talks about becoming a teacher or a veterinarian because both roles involve caring for people or animals and require
    a well-organised environment. She also imagines working in a library, arranging books and stories for children. Her ambitions are shaped by her love of routine, practicality, and compassion, and she
    aspires to study hard, stay organized, and make a positive difference in her community.
