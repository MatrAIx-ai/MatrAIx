  hobbies: '["Hiking in the Sonoran Desert", "Rock climbing", "Photography", "Exploring new cuisines", "DIY home improvement projects", "Playing indie video games", "Reading non-fiction on psychology and
    technology", "Attending live music events", "Cooking for friends and family", "Volunteering at community food drives"]'
  career_goals: Raphael aims to move from his current managerial position into senior operations leadership within the next five years, pursuing a bachelor’s degree in Business Administration and eventually
    an MBA. He seeks to lead larger multi‑site teams, implement data‑driven process improvements, and ultimately launch his own boutique hospitality venture that blends community focus, sustainability,
    and innovative service models. Alongside these ambitions, he plans to sharpen his organizational skills and acquire advanced analytics capabilities.
