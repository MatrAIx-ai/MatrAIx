personas:
  professional: Shankar Brooks, a 16‑year‑old self‑taught tech enthusiast, combines a methodical planning style with a competitive edge to design custom PCs, prototype small JavaScript games, and troubleshoot
    hardware while meticulously documenting every step, positioning themselves for a future in cybersecurity.
  sports: Shankar Brooks skateboards at Brooklyn’s Throop Park on weekends, follows the Brooklyn Nets for basketball excitement, and incorporates quick calisthenics routines after each session to stay fit,
    preferring solitary practice over team sports.
  arts: Shankar Brooks captures street photography of Brooklyn’s urban textures with a smartphone, curates a playlist of synthwave artists such as Kavinsky and electronic acts like Daft Punk, and devours
    science‑fiction novels by Isaac Asimov and Liu Cixin, letting these artistic influences shape their creative coding projects.
  travel: Shankar Brooks dreams of a tech‑focused pilgrimage to Tokyo’s Akihabara district, has already explored nearby Philadelphia during a school break, and plans to earn a summer camp scholarship that
    would fund a hiking trip to the Adirondacks, balancing a limited budget with a desire for cultural immersion.
  culinary: Shankar Brooks prefers quick, flavorful meals like chicken teriyaki bowls and pepperoni pizza slices, often hacks instant ramen by adding soft‑boiled eggs and sliced scallions, and occasionally
    attempts simple stir‑fry dishes though their cooking skill remains at a beginner’s level.
  core: Shankar Brooks channels an unflappable, methodical curiosity into building PCs, solving puzzles, and plotting a future in cybersecurity, all while maintaining a quiet, competitive spirit and a quirky
    habit of collecting every Rubik’s Cube model they can find.
background:
  cultural: Shankar grew up in a working‑class white family in Brooklyn, where his parents, of Irish‑American and Italian‑American descent, emphasized self‑reliance, education, and community involvement.
    The neighborhood’s diverse cultural tapestry exposed him to a broad range of perspectives, while local resources like the Brooklyn Public Library and community makerspaces nurtured his curiosity. This
    blend of traditional middle‑class American values and the vibrant, multicultural environment of Brooklyn shapes his pragmatic yet open‑minded outlook.
