  career_goals: Shankar aims to earn his GED within the next year and enroll in a community college program focused on computer science or information technology. He aspires to become a cybersecurity analyst,
    leveraging his analytical mindset and technical foundation, and eventually to launch a boutique tech consultancy that helps small businesses secure their digital assets. His competitive drive pushes
    him to achieve certifications such as CompTIA Security+ and to participate in local hackathons.
