  career_goals: Although retired, Joyce aims to stay intellectually active by deepening her knowledge of African American art and history, documenting her family genealogy, and mentoring younger community
    members in crafts and storytelling. She hopes to contribute a personal memoir to the local senior center’s archive, help organize a small intergenerational art exhibit, and continue fostering harmony
    through her church’s bible study and service groups.
