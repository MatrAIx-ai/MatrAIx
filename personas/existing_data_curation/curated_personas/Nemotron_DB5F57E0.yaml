personas:
  professional: Joyce Cobb, a retired community arts facilitator, leverages their storytelling, quilting, and church volunteer coordination to mentor younger members and curate intergenerational art exhibits,
    and they approach project planning with a relaxed mindset that occasionally leads to delightful spontaneity.
  sports: Joyce Cobb enjoys gentle morning walks in the neighborhood park, belongs to the Golden Years Senior Fitness Club for weekly low-impact exercise, cheers for the hometown baseball team the River
    City Redbirds, attends games of the River Valley Eagles basketball squad, and they participate in a senior bowling league on Thursdays.
  arts: Joyce Cobb immerses themselves in visual and musical arts, regularly visits the downtown Gallery of Light to view works by painters like Georgia O'Keeffe and contemporary creators, listens to jazz
    legends such as John Coltrane and Ella Fitzgerald alongside gospel icons like Mahalia Jackson, and they draw inspiration from these artists for their quilting patterns and storytelling sessions.
  travel: Joyce Cobb prefers relaxed, organized trips with family or small groups, has toured historic Savannah, Charleston, and New Orleans on past road trips, dreams of strolling the gardens of Versailles
    in France and exploring the Renaissance art of Florence, Italy, and they plan each journey within a modest travel budget to ensure comfort and cultural enrichment.
  culinary: Joyce Cobb delights in preparing southern comfort meals such as fried catfish with hush-puppies, collard greens simmered with smoked turkey, sweet-potato pie, and peach cobbler, season them
    with garden-fresh basil, thyme, and a pinch of cayenne, and they love sharing these dishes at intimate gatherings that celebrate family and community.
  core: Joyce Cobb, a curious yet delightfully disorganized 77-year-old storyteller, weaves history, art, and home-grown meals into a harmonious life while they occasionally misplace their knitting needles
    and forget to water a corner of their garden.
background:
  cultural: Joyce is a Black woman from the American South, raised in Georgia during the civil‑rights era. Her upbringing was rooted in a close‑knit African American church community and family traditions
    of cooking, storytelling, and music. She embodies the resilience of generations who faced segregation and fought for equality, and she values Southern hospitality, gospel and jazz heritage, and deep
    respect for elders. Living in Ellenwood, Henry County, she remains connected to the local Black cultural legacy through church events, community gardening, and intergenerational gatherings that celebrate
    her roots.
