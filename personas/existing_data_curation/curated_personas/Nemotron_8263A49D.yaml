    and mentorship","Quality improvement initiatives","Medical equipment handling"]'
  hobbies: '["Book club participation","Community theater acting","Church choir singing","Backyard gardening","Lake kayaking and fishing","Trivia nights","Cooking Italian cuisine","Quilting"]'
  career_goals: At 63, Cheryl aims to leverage her experience into a supervisory or lead role within her current facility, focusing on streamlining patient flow and reducing error rates. She plans to obtain
    a Certified Nursing Assistant (CNA) credential and a short‑course certification in healthcare quality improvement to bolster her expertise. Cheryl is also interested in developing a community outreach
    program that teaches seniors basic health self‑management, combining her curiosity for new ideas with her practical, methodical approach. Ultimately, she hopes to leave a lasting legacy as a mentor
    and process‑innovation champion while maintaining a balanced workload that mitigates stress.
