  career_goals: She aspires to transition into a supervisory role within the next two years, leveraging her strong performance record to lead a small team of representatives. Completing her bachelor's degree
    in Business Administration remains a priority, allowing her to qualify for operations management positions. Additionally, she plans to launch a home‑based online boutique featuring handcrafted Mexican
    textiles, blending her cultural passion with entrepreneurial ambitions.
