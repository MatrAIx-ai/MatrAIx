  hobbies: '[''Visiting Art Galleries'', ''Watercolor Painting'', ''Urban Photography'', ''Live Music Concerts'', ''Reading Business and Fiction Books'', ''Yoga and Meditation'', ''Journaling'', ''Hiking'',
    ''Experimental Cooking'', ''Puzzle Solving'']'
  career_goals: Cheryl aims to earn an MBA within the next two years to broaden her strategic management expertise. She aspires to advance to an Operations Manager role, overseeing multiple departments
    and driving digital transformation initiatives within her organization. Pursuing a Six Sigma Black Belt certification is a priority to deepen her process‑improvement credentials. She also envisions
    launching a side venture that blends her business skills with her passion for the arts, such as curating pop‑up exhibitions or offering creative consulting for corporate culture. Long‑term, Cheryl seeks
    a director‑level position where she can shape organizational policy, champion employee wellness programs, and be recognized as a thought leader at industry conferences.
