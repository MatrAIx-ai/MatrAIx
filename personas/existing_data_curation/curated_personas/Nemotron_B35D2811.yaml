personas:
  professional: Theron Hillson is a 27‑year‑old community‑oriented organizer who leverages meticulous spreadsheet budgeting, volunteer‑schedule coordination, and empathetic conflict mediation to excel as
    a prospective outreach coordinator for local nonprofits, and they envision launching a consulting service that streamlines event planning for grassroots groups.
  sports: Theron Hillson competes on the Dayton Drifters recreational basketball team, roots for the Cleveland Cavaliers and Cincinnati Bengals, hikes the ridges of Hocking Hills State Park each spring,
    and they maintain a weekly morning jog to balance the high‑impact nature of their basketball schedule.
  arts: Theron Hillson winds down by blasting classic rock legends like Led Zeppelin, The Rolling Stones, and Pink Floyd while hosting board‑game nights featuring titles such as Terraforming Mars, and they
    regularly attend the Dayton Art Space exhibitions showcasing local painters inspired by Van Gogh and Frida Kahlo.
  travel: Theron Hillson prefers budget‑friendly road trips planned on spreadsheets, often exploring nearby Hocking Hills and Cedar Point before dreaming of a cross‑country hike through Yellowstone and
    a cultural getaway to New Orleans, and they balance their love of nature with a desire for vibrant music scenes.
  culinary: Theron Hillson crafts hearty, garden‑fresh meals like roast chicken with rosemary potatoes, beef chili topped with homegrown jalapeños, and cornbread, skillfully blending their moderate cooking
    chops with a penchant for classic comfort food and the occasional craft‑beer pairing from local breweries such as Flying Pig Brewing Co., and they occasionally experiment with new spice blends despite
    a tendency to over‑season.
  core: Theron Hillson is a structure‑loving, community‑centric DIY enthusiast who juggles backyard gardening, basketball, and weekend board games while secretly hoarding a collection of vintage rock vinyl,
    and they often over‑commit to volunteer events, leaving little downtime.
background:
  cultural: Theron grew up in Dayton, Ohio, within a white, Midwestern family of German and Irish ancestry. His upbringing emphasized hard work, modesty, and strong community ties, with regular participation
    in church activities and local volunteer events. The cultural values of practicality, reliability, and neighborly support that he absorbed from his family and community continue to shape his outlook,
    fostering a deep commitment to helping others and maintaining harmonious relationships.
attributes:
  skills: '[''Event Planning'', ''Volunteer Coordination'', ''Budget Management'', ''Conflict Mediation'', ''Customer Service'', ''Basic Computer Literacy'', ''First Aid Certification'']'
  hobbies: '[''Playing basketball in community leagues'', ''Volunteering at the local food bank'', ''Gardening in his backyard'', ''DIY home improvement projects'', ''Cooking family meals'', ''Listening
    to classic rock'', ''Hiking local trails'', ''Playing board games with friends'']'
  career_goals: Theron aims to re‑enter the workforce in a role that leverages his organizational and interpersonal strengths, such as a community outreach coordinator for a nonprofit or a program assistant
    in local government. He plans to complete a bachelor's degree in social work or public administration to broaden his impact, and eventually hopes to launch a small consulting service that helps other
    community organizations streamline their events and volunteer programs. His overarching ambition is to become a reliable pillar in his hometown, supporting his family while contributing meaningfully
    to the well‑being of his neighbors.
