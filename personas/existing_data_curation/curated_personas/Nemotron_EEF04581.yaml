  hobbies: '["Watercolor painting", "Community theater participation", "Choir singing", "Reading contemporary fiction and art history", "Book club membership", "Gardening", "Hiking and bird‑watching", "Volunteering
    at cultural center", "Online learning (art therapy, digital photography, Indigenous art) "]'
  career_goals: Looking ahead, Debra aims to transition into a lead teaching assistant role where she can shape school‑wide instructional strategies, especially those that weave the arts into STEM subjects.
    She plans to complete her associate degree in education and obtain a state teaching credential, allowing her to teach part‑time as a dedicated art instructor for elementary students. A long‑term ambition
    is to establish a community art program that brings together students, seniors, and local Apache artisans, fostering intergenerational dialogue and cultural exchange. She also hopes to become a certified
    mental‑health first aider to better support staff and students coping with stress, using her personal experience with anxiety as a catalyst for positive change.
