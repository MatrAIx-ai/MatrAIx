  hobbies: '["Visiting art galleries and museums", "Playing basketball in a community league", "Guitar playing and jam sessions", "Karaoke with friends", "Collecting vintage Japanese wood‑carving manuals",
    "Restoring antique furniture", "Watching Asian cinema", "Cooking East Asian cuisines", "Volunteering on community build projects", "Exploring LA street art"]'
  career_goals: Chue aims to transform his current subcontracting work into a boutique workshop that creates high‑end, art‑inspired furniture for Los Angeles’s interior‑design market. He plans to obtain
    journeyman certification through the local carpenters’ union, expand his client base, and eventually open a makerspace that offers trade training to at‑risk youth in his community. Financially he hopes
    to own a home, achieve greater stability to ease his chronic stress, and gain recognition as a leading craftsman who blends traditional East‑Asian aesthetics with contemporary design.
