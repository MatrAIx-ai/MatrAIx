personas:
  professional: Chue Zhang, a master carpenter with over 25 years of residential and commercial woodworking experience, blends precision Japanese joinery with contemporary design, mentors apprentices with
    a methodical eye for code compliance and budgeting, and channels their curiosity and competitive drive into building a boutique workshop that will showcase art‑inspired furniture while they manage chronic
    stress to meet ambitious certification and community‑impact goals.
  sports: Chue Zhang, a dedicated member of the Westside Hardwood Basketball League, plays weekly games with a competitive edge that mirrors their professional drive, roots for the Los Angeles Lakers and
    Los Angeles Dodgers, frequently participates in local pickup games at Griffith Park, and they balance their athletic pursuits with a regimen of light strength training to support their back health.
  arts: Chue Zhang, an avid visitor of the Getty Center, contemporary art galleries, and street‑art festivals, draws design inspiration from creators such as Takashi Murakami, Banksy, and James Turrell,
    channels this aesthetic into custom furniture while they unwind with weekly jam sessions and spontaneous karaoke nights, and their critical eye often leads them to debate artistic concepts with fellow
    enthusiasts at after‑hours gallery talks.
  travel: Chue Zhang, a travel‑savvy craftsman who plans trips months ahead but also enjoys spontaneous weekend getaways, has explored the historic districts of Kyoto and the bustling markets of Seoul,
    dreams of a design‑focused pilgrimage to Barcelona’s modernist sites, often returns to the California coast for surf‑side retreats in Malibu, and they balance travel aspirations with the financial realities
    of funding their future boutique workshop.
  culinary: Chue Zhang, a home‑cook who experiments with regional Chinese, Japanese, and Korean dishes, regularly prepares Mapo Tofu with Sichuan peppercorns, authentic Ramen broth using kombu and katsuobushi,
    and spicy Bibimbap featuring gochujang and bulgogi, showcases these meals at friends’ karaoke gatherings, and they consider their kitchen a laboratory where precision woodworking meets culinary creativity.
  core: Chue Zhang, a meticulous carpenter who fuses East‑Asian carving traditions with contemporary art, channels chronic stress into relentless craftsmanship, competes fiercely in basketball and business,
    and they habitually cap off long workdays with late‑night karaoke and a strong cup of espresso.
background:
  cultural: Chue is a second‑generation Asian‑American whose father immigrated from China and mother from Japan. Raised in Los Angeles’s Chinatown‑Little Tokyo enclave, he grew up bilingual, celebrating
    Lunar New Year and Obon while absorbing both Mandarin and Japanese cultural values. The immigrant work ethic and reverence for craftsmanship were instilled by his parents, shaping his dedication to
    detail and quality. His design sensibility reflects a hybrid aesthetic that merges minimalist Japanese lines with robust Chinese motifs, and his social circle spans both Asian community groups and the
    broader creative scene of Los Angeles.
attributes:
  skills: '["Custom furniture design", "Precision joinery (Japanese & Chinese)", "Cabinet installation", "Home renovation", "Blueprint reading & code compliance", "Project budgeting and scheduling", "Client
