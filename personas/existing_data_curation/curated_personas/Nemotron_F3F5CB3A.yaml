  career_goals: Exel aims to earn a scholarship to a STEM‑focused high school and later pursue a degree in civil or environmental engineering, with the long‑term ambition to design sustainable water‑management
    systems that benefit both her desert community in Victorville and agricultural regions in Ecuador. She plans to lead a robotics or debate team, gain leadership experience, and secure internships that
    strengthen her technical portfolio.
