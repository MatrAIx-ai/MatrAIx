personas:
  professional: Exel Narvaez, a 15‑year‑old budding robotics engineer and chess tactician, channels their fierce competitiveness and meticulous organization into leading the school’s robotics club to regional
    qualifiers while perfecting opening gambits on the chess board.
  sports: Exel Narvaez, a member of the Victorville Youth Soccer Club and a weekend runner for the local Canyon Trails group, follows the LA Dodgers and LA Galaxy religiously, balancing a disciplined cardio
    routine with yoga to keep anxiety in check while maintaining a competitive edge on the field.
  arts: 'Exel Narvaez, a self‑taught short‑story writer who intertwines robotics concepts with folklore, devours the works of Octavia Butler and Neil Gaiman, playlists featuring Carlos Vives and the classical
    guitar of Andrés Segovia while sketching circuit diagrams, and occasionally replicates scenes from the animated series "Avatar: The Last Airbender" for creative inspiration.'
  travel: Exel Narvaez, whose travel log includes family trips to the coastal markets of Guayaquil, a weekend getaway to San Diego’s SeaWorld, and a future bucket‑list destination of Machu Picchu, prefers
    meticulously planned itineraries that squeeze cultural immersion into school breaks while scrupulously budgeting each excursion.
  culinary: Exel Narvaez, an enthusiastic home cook, masters the balance of tangy ceviche, hearty llapingacho pancakes, and aromatic arroz con pollo, skillfully slicing fresh chilies and zesting lime for
    each dish, while experimenting with fusion recipes that sprinkle Arduino‑inspired garnish shapes, though they sometimes forget to clean the kitchen after a marathon cooking session.
  core: Exel Narvaez, a hyper‑organized teen with a competitive spark, channels curiosity into robotics and chess, battles anxiety with yoga and journaling, and flavors life with a love for cultural cuisine
    and meticulous planning.
background:
  cultural: Exel grew up in a bicultural household where Spanish is spoken at home and Ecuadorian customs—such as celebrating Carnaval, preparing ceviche for family gatherings, and honoring Catholic holidays—are
    upheld alongside typical American traditions. Her parents immigrated from the coastal region of Guayaquil, and she maintains close ties with a local Ecuadorian community in Victorville, often attending
    cultural events at the nearby Hispanic Center. This blend of Ecuadorian heritage and Californian influences shapes her values of family solidarity, respect for elders, and a strong work ethic, while
    also fueling her desire to contribute to sustainable development that benefits both her hometown and her ancestral home.
