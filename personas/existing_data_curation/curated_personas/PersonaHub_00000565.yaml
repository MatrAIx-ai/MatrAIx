persona_description: A corporate executive who values and integrates biodiversity and ecosystem services into their strategic plans. They are interested in the concept of ecosystem services and how they
  can be used to measure and consider the value of natural resources long-term. They are familiar with the concept of Ecosystem Services and its four broad categories of provisioning, regulating, supporting,
  and cultural. They are also aware of the importance of incorporating an enhanced understanding of value and risk when making decisions about the costs and benefits of using and protecting ecosystem services.
  They are interested in how Ecosystem Services can be used to promote sustainable human and natural systems and to ensure their long-term success.
