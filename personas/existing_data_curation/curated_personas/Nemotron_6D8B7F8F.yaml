personas:
  professional: Terry Greene, a 34‑year‑old office administrator, leverages a blend of curiosity and skepticism to design streamlined filing systems, wields Excel for data‑driven insights, and champions
    process improvements that reflect their competitive drive to out‑perform departmental benchmarks.
  sports: Terry Greene supports the Oklahoma Sooners football team, follows the Dallas Mavericks for basketball, pitches in with a local fishing club on the Arkansas River, and hits the gym for functional
    strength training twice a week, treating each session as a strategic quest to out‑perform their personal bests.
  arts: Terry Greene’s cultural palate includes listening to Garth Brooks and classic rock from The Rolling Stones while binge‑watching Ken Burns documentaries on American history, attending the local community
    theater’s production of Our Town, and admiring Frederic Remington’s frontier paintings displayed at the regional art museum.
  travel: Terry Greene prefers meticulously planned road trips that blend fishing on the Colorado River with visits to sleek tech hubs like Seattle, having already explored the Texas Hill Country and dreaming
    of a future weekend in Reykjavik to experience Nordic design and geothermal pools.
  culinary: Terry Greene enjoys a hearty blend of smoked brisket, homemade chili topped with jalapeños, and shrimp‑and‑grits at a local farm‑to‑table restaurant, confidently handling his pellet smoker and
    smart oven while experimenting with rubs that feature cumin, brown sugar, and smoked paprika.
  core: Terry Greene is a 34‑year‑old office‑admin strategist who balances data‑driven efficiency with a DIY hobbyist’s hands‑on curiosity, rivaling coworkers in spreadsheet challenges while secretly hoarding
    spare screws for future projects.
background:
  cultural: Terry grew up in a middle‑class, Protestant family in central Oklahoma, where community involvement and self‑reliance were emphasized. The cultural environment of Norman—a mix of university
    influence, agricultural heritage, and Midwestern sensibilities—shaped his values of hard work, modesty, and civic duty. He regularly participates in local church gatherings and volunteers at community
    events such as the county fair, reflecting the region’s focus on service. While his ancestry is primarily Anglo‑American, he respects the broader cultural tapestry of Oklahoma, including the presence
    of Native American traditions in the state. This background informs his pragmatic outlook, his appreciation for tradition, and his measured openness to gradual innovation.
