  career_goals: Terry aims to move from a general office clerk to an office manager or operations coordinator within the next three to five years. He plans to complete a part‑time bachelor's degree in business
    administration and earn the Certified Administrative Professional (CAP) credential to formalize his expertise. His competitive drive pushes him to lead a team, optimize workflow, and introduce technology‑enabled
    solutions that boost efficiency. In the longer term, he envisions taking on a senior operations role in a regional nonprofit or small business, where he can apply his analytical skills, risk‑assessment
    abilities, and continuous‑improvement mindset to achieve measurable organizational gains.
