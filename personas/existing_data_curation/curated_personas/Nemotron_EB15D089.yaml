  hobbies: '[''Reading science‑fiction and nature books'', ''Drawing marine life sketches'', ''Maintaining a home aquarium'', ''Introductory coding with Scratch'', ''Playing piano'', ''Journaling observations'',
    ''Walking on the beach and collecting shells'']'
  career_goals: Jean dreams of becoming a wildlife biologist who studies marine ecosystems along the California coast, hoping to spend time in quiet field labs and conduct research that protects sea life.
    She also envisions learning advanced programming to create educational apps that help other children explore nature. Her long‑term ambition is to combine scientific inquiry with technology, allowing
    her to work both independently and collaboratively on projects that have real‑world impact.
