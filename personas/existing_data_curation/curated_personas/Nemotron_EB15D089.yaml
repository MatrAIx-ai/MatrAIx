personas:
  professional: Jean Cabbagestalk, an 11‑year‑old budding coder and marine sketcher, blends curiosity with practicality by designing Scratch animations that model ocean currents, recording precise fish‑behaviour
    notes for school science fairs, and methodically organizing their project files while they thrive in the quiet of their bedroom studio.
  sports: Jean Cabbagestalk, a member of the local junior swimming club who practices twice weekly and enjoys solo beach runs that end with shell collecting, watches the San Diego Padres and the Golden
    State Warriors on TV, but they prefer these quiet, personal fitness routines over team sports.
  arts: Jean Cabbagestalk, a dedicated marine illustrator who spends afternoons reproducing the intricate line work of James Prosek, listens to Debussy’s "Clair de Lune" while sketching, devours the sci‑fi
    novels of Ursula K. Le Guin, and they are equally fascinated by Studio Ghibli’s "Nausicaä of the Valley of the Wind".
  travel: Jean Cabbagestalk, who loves low‑key coastal getaways, has visited the Monterey Bay Aquarium, dreams of snorkeling the Great Barrier Reef, treasures a school field trip to tide pools in Oregon,
    and they always plan trips around quiet beaches where they can journal and collect shells.
  culinary: Jean Cabbagestalk, a fan of fresh, ocean‑inspired meals, often prepares grilled salmon with avocado toast for breakfast, rolls homemade tuna sushi with soy sauce and pickled ginger, snacks on
    kelp chips, and they occasionally indulge in chocolate chip cookies after a piano recital.
  core: Jean Cabbagestalk is an inquisitive 11‑year‑old introvert who channels a love of marine life into solitary coding, sketching, and meticulous saving, yet they occasionally indulge in sweet treats
    and quiet beach walks to balance their focused routine.
background:
  cultural: Jean is an African‑American girl growing up in Los Angeles, a city rich with cultural diversity and vibrant Black communities. Her family celebrates traditions such as Juneteenth, Kwanzaa, and
    community gatherings at local churches and cultural centers, where storytelling, music, and food reinforce a strong sense of identity. She is influenced by the artistic legacy of Los Angeles' Black
    artists and musicians, which fuels her interest in creative expression. African‑American history lessons and visits to museums like the California African American Museum help her connect to a broader
    heritage while navigating the dynamic, multicultural environment of her neighborhood.
