  hobbies: '[''Salsa and Bomba dancing'', ''Playing the Cuatro'', ''Cooking traditional Puerto Rican dishes'', ''Hiking in El Yunque'', ''Nature photography'', ''Reading culinary literature'', ''Mentoring
