  career_goals: Alejandro aims to move from his current supervisory role to a regional food‑operations manager position, overseeing multiple restaurant locations across Puerto Rico within the next five
    years. He also plans to establish a culinary training academy that blends technical cooking skills with soft‑skill development, leveraging his background in education. In the long term, Alejandro envisions
    opening a community‑focused restaurant that showcases sustainable Puerto Rican cuisine and serves as a mentorship hub for young people pursuing culinary careers. He is committed to advancing sustainability
    practices, such as farm‑to‑table sourcing and waste reduction, and seeks professional certifications like Certified Food Safety Manager and Certified Hospitality Trainer.
