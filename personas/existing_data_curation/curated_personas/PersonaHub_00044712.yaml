persona_description: A service sector manager or executive who is interested in implementing green initiatives to reduce their company's carbon footprint and contribute to the fight against climate change.
  They are looking for a comprehensive guide that outlines the steps necessary to manage, track, and reduce GHG emissions from their business operations, including electricity use, heating, cooling, and
  travel. They are also interested in learning about the expected impacts of climate change on their industry and the business case for action. They are willing to take the lead in changing their company's
  behaviors and practices to mitigate the most dangerous effects of climate change.
