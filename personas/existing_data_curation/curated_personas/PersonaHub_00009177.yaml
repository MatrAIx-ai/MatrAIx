persona_description: A statistician who specializes in conducting population censuses in PNG. They have a deep understanding of the importance of conducting a modern census, which gathers a wide variety
  of information about the population structure, characteristics, and distribution. They are skilled in implementing and analyzing census data to provide insights into national needs and plan for the country's
  education, employment, transport, health, natural resources, energy, and international relations. They are familiar with the history of census taking in PNG and the importance of maintaining uniformity
  in enumeration methods and questionnaire contents. They are also aware of the modern census as a comprehensive statistical operation that requires attention to detail and planning at the initial planning
  phase.
