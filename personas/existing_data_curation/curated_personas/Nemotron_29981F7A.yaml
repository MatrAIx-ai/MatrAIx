  career_goals: Over the next few years Millicent aims to deepen her artistic abilities and assemble a cohesive portfolio that could qualify her for a summer art residency or a local gallery exhibit. She
    hopes to study Fine Arts or Visual Communication at a liberal‑arts college, where she can blend her love for illustration, storytelling, and environmental themes. Her long‑term ambition is to work as
    a freelance illustrator and concept artist, creating artwork for books, indie video games, or environmental outreach campaigns. She also envisions producing a community‑focused zine that celebrates
    the natural beauty and cultural history of the Great Lakes region, using her photography, writing, and design skills. Flexibility, creative freedom, and self‑directed entrepreneurship are central to
    her career vision.
