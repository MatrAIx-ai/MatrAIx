persona_description: A History professor who specializes in the study of ethnic minorities and the rise of national states in the Modem Balkans, particularly focusing on the status of minorities following
  the founding of Serbia, Greece, Bulgaria, Albania, and Yugoslavia. He has a particular interest in the identity and history of the Macedonian minority, particularly the identification of the deceased
  in Steelton, Pennsylvania, as being from "Macedonia" in the 1930s and 1950s. His research interests include the study of ethnic minorities, the history of national states, and the identification of ethnic
  backgrounds.
