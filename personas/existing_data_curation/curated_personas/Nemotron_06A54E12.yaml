  career_goals: Marina aims to channel her extensive experience into leadership positions within San Antonio’s cultural sector. She plans to join the board of a local museum or arts center, spearheading
    initiatives that expand arts education for underserved youth. To strengthen her impact, she intends to earn a certificate in nonprofit management and develop a sustainable nonprofit focused on community
    arts workshops. She also aspires to author a memoir highlighting her community service journey, become a sought‑after speaker at regional nonprofit conferences, and mentor the next generation of community
    organizers.
