persona_description: A museum educator and maker who is passionate about exploring the potential of LEGO linkages to inspire and engage visitors in tinkering experiences. They are skilled in using cardboard
  linkage workshops as a medium for engaging with museum visitors, and have a background in art machines and artist-in-residence programs. They are interested in creating personal boards with motors for
  building linkage arms and experimenting with different materials and objects to animate. They are open to exploring the potential of robot arms using LEGO linkages and encourage linkage use and explorations
  as a way to lower the threshold and help people set their own goal for the linkage investigation.
