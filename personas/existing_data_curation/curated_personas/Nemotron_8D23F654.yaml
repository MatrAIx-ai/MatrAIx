  career_goals: As she approaches retirement, Tina aims to transition from full‑time clinical work to a mentorship and community‑outreach role. She plans to develop a volunteer training program for home‑health
    aides, contribute to the local health department’s senior wellness initiatives, and author a practical guide on aging in place for seniors and their families. Ultimately, she hopes to leave a legacy
    of improved patient safety and empowered caregivers in her Lapeer County community.
