personas:
  professional: Tina Doan, a veteran licensed practical nurse with over 40 years of geriatric and community health expertise, channels their curiosity for evidence‑based practice and disciplined organization
    into developing a volunteer training program for home‑health aides, authoring a guide on aging in place, and leading senior wellness initiatives for the Lapeer County health department.
  sports: Tina Doan stays active through the Lapeer Senior Walking Club, follows the Detroit Tigers baseball and Detroit Lions football seasons with devoted enthusiasm, and competes in a weekly senior bowling
    league at the community center, which provides both social interaction and low‑impact exercise during the winter months.
  arts: Tina Doan nurtures their creative side in a weekly quilting circle, devours mystery novels by Agatha Christie and Louise Penny, enjoys occasional performances by the Lapeer Community Theatre, and
    finds inspiration in the folk ballads of Joan Baez.
  travel: Tina Doan prefers leisurely road‑trip adventures, having explored the historic streets of Savannah, the blooming gardens of the Biltmore Estate in Asheville, and the tranquil shores of Lake Huron,
    while they daydream about a guided tour of the Loire Valley’s châteaux and a quiet river cruise along the Mississippi.
  culinary: Tina Doan delights in farm‑to‑table cooking, frequently preparing roasted beet and walnut salad with fresh basil from their garden, hearty chicken pot pie, and seasonal apple crumble, while
    their modest culinary skill allows them to experiment with herb‑infused vinaigrette and tea blends using rosemary, thyme, and mint.
  core: Tina Doan blends disciplined nursing precision with a garden‑lover’s curiosity, a penchant for unfinished crossword puzzles, and a habit of meticulously labeling quilting fabrics, all while they
    quietly champion community health and senior empowerment.
background:
  cultural: Tina was raised in a small, close‑knit town in rural Michigan, steeped in Midwestern values of self‑reliance, hard work, and community service. Her family’s heritage includes Irish and German
    roots, reflected in family gatherings centered around holiday meals and church involvement. The local Presbyterian church and the township’s agricultural fairs have shaped her appreciation for tradition,
    cooperation, and the importance of caring for neighbors, all of which continue to influence her personal and professional life.
