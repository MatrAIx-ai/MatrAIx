    maintenance issues'']'
  hobbies: '[''hiking in the Catskills'', ''fishing on the Hudson River'', ''volunteering for local park clean‑ups'', ''playing acoustic guitar (folk/classic rock)'', ''building model kits'', ''reading
    mystery novels'', ''cooking comfort food for friends'', ''casual video gaming'']'
  career_goals: Julian aims to move into a supervisory role within the facilities management field, such as a lead janitor or building services coordinator, where he can mentor newer staff and help design
    more efficient cleaning schedules. He plans to earn a Certified Professional Cleaner (CPC) credential and possibly complete an associate degree in facilities management at a local community college.
    Long‑term, Julian dreams of launching his own small cleaning business that emphasizes reliable service and environmentally friendly practices, giving him the flexibility to support a future family while
    staying rooted in the Kingston community.
