  career_goals: Deidra aims to advance to a senior product leadership role where she can shape the strategic direction of innovative tech solutions while preserving a flexible, people‑centred work environment.
    She aspires to lead a multidisciplinary team that iterates quickly, champions user‑first design, and launches products that solve real‑world problems for her community. In the longer term, she envisions
    founding a socially responsible tech startup that merges her business insight with emerging technologies to improve access to education and digital services in underserved areas.
