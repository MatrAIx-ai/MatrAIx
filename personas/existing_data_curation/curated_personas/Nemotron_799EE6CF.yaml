  hobbies: '["Church choir singing","Bridge club participation","Quilting circles","Balcony gardening","Genealogy research","Local history walking tours","Senior‑center fitness classes","Travel to family
    reunions in the South","Journaling and meditation"]'
  career_goals: Although retired from formal employment, Keisha remains driven to contribute meaningfully to her community. She aims to secure a leadership role on the board of her local senior center,
    using her organizational talents to shape programming that balances social engagement with practical support. She aspires to compile a family cookbook and memoir that document her life experiences,
    culinary heritage, and the history of Philadelphia's Black neighborhoods, ensuring her legacy endures for future generations. Keisha also seeks to become a trusted voice in advocacy circles, challenging
    policies that affect seniors and championing initiatives that promote health, financial security, and cultural preservation.
