  hobbies: '[''building block towers'', ''drawing and coloring'', ''listening to storytime books'', ''playing organized games'', ''dancing to music'', ''helping in the kitchen'']'
  career_goals: Liping dreams of becoming a teacher because she enjoys helping friends learn and likes the structure of a classroom. She also expresses interest in being a pediatric doctor to care for other
    children, and sometimes imagines herself as an artist, drawing pictures of animals and nature. Her ambitions reflect her kindness, desire for harmony, and love of organized, purposeful activities.
