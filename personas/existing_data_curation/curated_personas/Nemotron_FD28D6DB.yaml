personas:
  professional: Brittney Fox, a veteran secondary‑school STEM educator with three decades of experience, leverages their knack for structured curriculum design, data‑driven assessments, and calm classroom
    leadership to champion a district‑wide rural STEM outreach program while mentoring retiring teachers and drafting a practical guide for small‑class environments.
  sports: Brittney Fox, a member of the Bennington Trail Runners club, enjoys low‑impact hiking on the Green Mountains in spring and fall, follows the Vermont Lake Monsters baseball team, and incorporates
    gentle morning yoga to maintain flexibility.
  arts: Brittney Fox, an avid reader of Jane Austen and a fan of Beethoven’s late string quartets, nurtures their creativity through intricate knitting patterns inspired by the works of Ansel Adams, and
    occasionally attends performances at the nearby Bennington Theatre starring local playwrights.
  travel: Brittney Fox prefers meticulously planned nature retreats, having booked solo trips to Acadia National Park in Maine and the historic gardens of Kyoto, while budgeting for comfortable lodging
    and avoiding crowded tourist hotspots.
  culinary: Brittney Fox delights in farm‑to‑table cooking, regularly preparing roasted root vegetable stew with heirloom carrots and sage from their garden, baking whole‑grain sourdough, and savoring a
    well‑balanced quinoa salad topped with fresh goat cheese and toasted walnuts.
  core: Brittney Fox, a calm, solitary teacher‑mentor, balances meticulous garden bookkeeping with a habit of over‑organizing their knitting supplies, channeling that structure into innovative STEM outreach
    initiatives.
background:
  cultural: Brittney is a White American with deep New England roots, tracing her family lineage to several generations of Vermont farmers and educators. Raised in a small rural community, she internalized
    values of self‑reliance, stewardship of the land, and communal responsibility. These cultural influences shape her practical, structured outlook, her commitment to quiet, reflective environments, and
    her dedication to fostering educational opportunities in her hometown of Arlington, VT.
attributes:
  skills: '[''Curriculum Development'', ''Differentiated Instruction'', ''Laboratory Management'', ''Data‑Driven Assessment'', ''Educational Technology Integration'', ''Classroom Management'', ''Conflict
    Resolution'', ''Mentoring'', ''Professional Development Facilitation'', ''STEM Subject Expertise (Biology, Mathematics)'']'
  hobbies: '[''Reading classic literature'', ''Vegetable gardening'', ''Birdwatching'', ''Knitting'', ''Puzzle solving (crosswords, Sudoku)'', ''Hiking'', ''Journaling'']'
  career_goals: Approaching the latter stage of her teaching career, Brittney aims to spearhead a district‑wide STEM outreach initiative that connects rural schools with local universities and industry
    partners, providing hands‑on experiences for underrepresented students. She also plans to mentor retiring teachers transitioning to part‑time consultancy, author a practical guide on STEM pedagogy for
    small‑class environments, and serve on the Bennington County Education Board to influence policy that supports structured, equitable learning opportunities. Ultimately, she envisions a gradual shift
    toward advisory roles that allow her to share her expertise while maintaining the solitude and predictability she values.
