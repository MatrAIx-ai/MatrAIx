  hobbies: '["building block constructions", "drawing and coloring", "storytime listening", "backyard nature exploration", "group games (tag, racing)", "dancing to music", "pretend role play", "singing
    nursery rhymes", "educational cartoons"]'
  career_goals: Even at three, Yusef loves pretending to be professionals who combine tangible action with exploration. He often says he wants to be a firefighter because he likes the idea of helping people
    and using equipment, an astronaut because he is fascinated by stars, and a chef who can create tasty meals for family gatherings. These aspirations reflect his practical interest in jobs that have clear
    tools and outcomes, his competitive desire to master them, and his calm confidence that he can handle the challenges.
