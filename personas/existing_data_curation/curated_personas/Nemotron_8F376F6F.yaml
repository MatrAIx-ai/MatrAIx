  career_goals: Even at age three, Julius is fascinated by order, structure, and how things work. He often watches construction trucks and asks to be the "boss" when they arrive, dreaming of building safe
    playgrounds and sturdy houses. He expresses interest in community helpers like firefighters and police officers, admiring their uniforms and predictable routines. Looking ahead, he imagines becoming
    an architect or engineer who designs structures with clear rules, or a public‑service worker who keeps his neighborhood organized and safe.
