  hobbies: '[''Gallery and Museum Visits'', ''Urban Sketching'', ''Photography'', ''Live Jazz and Blues Concerts'', ''Hiking in Ozark Trails'', ''Basketball'', ''STEM Mentorship'', ''Speculative Fiction
    Reading'', ''Creative Writing'']'
  career_goals: Sylvester aims to progress from project management specialist to senior program manager within the next three years, eventually stepping into a director‑level role overseeing a portfolio
    of high‑impact technology and community development projects in the Arkansas region. He plans to earn his PMP certification, deepen his expertise in digital transformation, and lead initiatives that
    integrate innovative technology solutions with local economic growth. Long‑term, he envisions launching his own consultancy focused on helping small businesses and nonprofits adopt agile practices while
    championing diversity and inclusion in the tech sector.
