  career_goals: Maria dreams of a future where she can help others and share stories. She wants to become a teacher or a school counselor so she can support classmates who feel anxious or sad, drawing on
    her own emotional experiences. She also imagines caring for animals as a veterinarian, inspired by her love for pets and wildlife she sees on nature walks. Occasionally, she envisions herself as a community
    storyteller who will preserve Mexican folk tales and celebrate cultural festivals, combining her talkative nature with her desire to foster harmony and understanding.
