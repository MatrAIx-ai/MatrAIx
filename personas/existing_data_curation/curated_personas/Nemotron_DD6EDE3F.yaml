personas:
  professional: Maria Perez, an imaginative junior coder and budding performer, leverages her curiosity and practical mindset to build intricate LEGO creations while rehearsing short skits for school talent
    shows, thriving as a talkative center of attention.
  sports: Maria Perez plays forward for a community soccer club that affiliates with the Colorado Rapids youth program, cheers for the Denver Broncos on football Sundays, follows the Colorado Avalanche
    during the hockey season, and spends weekends both climbing the jungle gym and trying out beginner snowshoeing on the nearby foothill trails.
  arts: Maria Perez expresses herself through drawing lively scenes inspired by the bold colors of Frida Kahlo, sings ranchera classics by Vicente Fernández during school talent shows, and delights in the
    rhythmic storytelling of Pixar’s ‘Coco’, often incorporating these influences into her own handmade crafts.
  travel: Maria Perez eagerly maps out family road trips to Rocky Mountain National Park and the Great Sand Dunes, dreams of visiting the sun‑kissed beaches of San Diego and the magical attractions of Disney
    World, and plans each adventure with a mix of colorful hand‑drawn itineraries and a set budget for souvenirs.
  culinary: Maria Perez loves assisting grandparents in rolling homemade corn masa for tacos and shaping tamales, has a budding talent for whisking fresh salsa with cilantro, lime, and jalapeño, and always
    requests extra queso fresco, while occasionally sneaking a bite of the spicy chorizo filling.
  core: Maria Perez is a gregarious, inventive 7‑year‑old who blends LEGO building, coding, and ranchera dancing into daily play, while frequent anxiety spikes make winding down at night a challenging routine.
background:
  cultural: Maria comes from a Mexican heritage that is woven into everyday life. She lives in a bilingual household where Spanish is spoken at home and English is used at school, giving her a strong grasp
    of both languages. Her family celebrates traditional holidays such as Día de los Muertos and Mexican Independence Day, often preparing foods like tamales, tacos, and arroz con frijoles. They listen
    to mariachi, ranchera, and regional folk music, and Maria enjoys dancing to these rhythms with her relatives. The family participates in local Mexican cultural events in Fort Collins, such as community
    festivals and dance workshops, fostering a sense of connection to her roots while integrating into the broader Colorado community. Respect for elders, emphasis on family togetherness, and a warm, cooperative
    spirit are core values that guide her interactions.
