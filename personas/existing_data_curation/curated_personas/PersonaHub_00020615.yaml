persona_description: A policy analyst who focuses on the economic and environmental impacts of nuclear weapons programs, particularly the health and environmental damage caused by nuclear testing and fissile
  material production, and the associated economic costs of loss of land and human work hours and increase in medical costs. This persona is interested in the full cost of nuclear disarmament and the economic
  benefits of nuclear weapons research and development, as well as the potential for conversion of nuclear weapons facilities and supporting industries to non-weapons purposes or nuclear disarmament purposes.
  This persona is likely to be concerned with the long-term economic and environmental sustainability of nuclear weapons programs and the potential for these programs to be replaced with more sustainable
  and cost-effective alternatives.
