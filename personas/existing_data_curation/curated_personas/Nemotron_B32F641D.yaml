  career_goals: Angelica aims to deepen her impact on the local arts community by launching an intergenerational mural project that pairs senior participants with high school students, fostering mutual
    learning and community pride. She aspires to publish a collection of her poems and reflective essays that explore aging, nature, and creativity. Additionally, she seeks to expand her skills in digital
    media to produce short documentary videos about Tacoma’s cultural history. Angelica also wishes to continue her volunteer work, ultimately taking on a leadership role within the local senior center’s
    arts programming, and to maintain lifelong learning by enrolling in community college courses on new artistic techniques.
