personas:
  professional: Brittany Jenkins, a 20‑year‑old food‑prep worker at a bustling Atlanta kitchen, leverages meticulous knife skills, rigorous inventory control, and a skeptical eye for quality to streamline
    batch cooking, while charting a fast‑track plan to become a sous‑chef within three years through an associate culinary degree and advanced certifications.
  sports: Brittany Jenkins, a casual fan of the Atlanta Falcons and Atlanta United, attends Saturday football games with a small group of friends, participates in a campus intramural yoga league, and keeps
    a disciplined morning stretch routine to stay limber for long kitchen shifts.
  arts: Brittany Jenkins, who finds solace in Southern literature like Flannery O’Connor, curates a vinyl collection of jazz legends such as Miles Davis and contemporary folk singer Brandi Carlile, and
    regularly watches independent film screenings at a local arthouse theater, using these artistic escapes to recharge their competitive kitchen mindset.
  travel: Brittany Jenkins, who saves strategically for weekend getaways, has explored Savannah’s historic squares, Asheville’s farm‑to‑table scene, and dreams of a culinary pilgrimage to New Orleans to
    study Creole techniques, preferring meticulously planned itineraries that balance affordable travel with a deep dive into regional food cultures.
  culinary: Brittany Jenkins, an avid experimenter with classic Southern cookbooks, meticulously records flavor tweaks in a food‑journal while perfecting dishes like shrimp‑and‑grits with fresh basil from
    their indoor herb garden, and delights in serving meticulously plated comfort meals at intimate dinner parties for close friends.
  core: Brittany Jenkins, a 20‑year‑old culinary perfectionist, blends obsessive organization, competitive ambition, and anxiety‑driven self‑care into a disciplined pursuit of a future upscale Southern
    bistro.
background:
  cultural: Brittany grew up in a middle‑class family in Fulton County, Atlanta, where Southern hospitality and home‑cooked meals were central to family life. Her parents, of Irish‑German descent, emphasized
    traditional Southern dishes—fried chicken, collard greens, and pecan pie—while also encouraging openness to the city's diverse culinary scene. This blend of heritage and local culture fostered her appreciation
    for both classic comfort food and modern cooking techniques. She identifies with the Southern work ethic, valuing reliability, punctuality, and a pragmatic approach to everyday challenges.
attributes:
  skills: '["Knife skills","Recipe scaling and portion control","Food safety (ServSafe certification)","Inventory management","Mise en place organization","Time‑bound batch cooking","Quality control and
    process auditing","Basic nutrition knowledge","Digital kitchen management software proficiency"]'
  hobbies: '["Recipe development and testing","Food journaling","Yoga and meditation","Crossword puzzles and Sudoku","Indoor herb gardening","Hosting small‑group dinner parties"]'
  career_goals: Brittany aims to transition from a prep cook to a sous‑chef within the next three years by completing an associate degree in culinary arts and obtaining advanced certifications in kitchen
    management. She is driven to lead a kitchen team where she can implement structured workflows and clear, predictable procedures, reducing stress for herself and her staff. Long‑term, she envisions opening
    a small, upscale Southern‑comfort bistro that emphasizes meticulous plating, consistent menu offerings, and a controlled dining environment, allowing her competitive spirit to flourish while maintaining
    the stability she values.
