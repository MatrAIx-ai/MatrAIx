  career_goals: Lacey aims to transition from a front‑line representative to a leadership role within the customer‑experience field. She envisions becoming a Team Lead or Customer Experience Manager where
    she can mentor colleagues, design innovative training programs, and embed creative thinking into service processes. Over the next five years she plans to complete her bachelor's degree in Communications
    or Business Administration, obtain a certification in Customer Experience Management, and launch a side venture that offers consulting services to small businesses seeking to improve their customer
    interactions through artistic and storytelling techniques. Ultimately, she hopes to combine her passion for art and community service by founding a nonprofit that provides creative workshops for under‑served
    youth in Hattiesburg, helping them channel imagination into personal and professional growth.
