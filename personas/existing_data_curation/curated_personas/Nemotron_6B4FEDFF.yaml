personas:
  professional: Jacobo Delrio is a diligent registered nurse who blends meticulous clinical assessment with creative art‑based stress‑relief techniques, leveraging their bilingual fluency and methodical
    nature to deliver culturally attuned, holistic patient care.
  sports: Jacobo Delrio enjoys weekend hikes in the Cascades, belongs to a local trail‑running club, follows the Seattle Seahawks for football and the Portland Trail Blazers for basketball, and incorporates
    yoga twice weekly to counteract stress.
  arts: Jacobo Delrio devotes evenings to sketching urban murals, photographing the misty coast, playing acoustic guitar inspired by Sufjan Stevens, and draws inspiration from the works of Banksy, Ansel
    Adams, and vibrant muralists, while attending indie shows at Seattle’s The Crocodile.
  travel: Jacobo Delrio prefers spontaneous weekend road trips up the Pacific Coast Highway, admires the serene beauty of Glacier National Park, and dreams of exploring the historic streets of Oaxaca for
    culinary inspiration, balancing a modest travel budget with a love for mindful exploration.
  culinary: Jacobo Delrio enjoys cooking hearty family recipes featuring corn masa, chilies, and slow‑cooked meats, experimenting with seasonal vegetables from local farmers' markets, and mastering the
    art of fresh salsa while keeping their culinary skill at an enthusiastic home‑chef level.
  core: Jacobo Delrio is a worry‑prone yet creatively driven nursing student who merges art, mindfulness, and meticulous care to navigate life’s stresses while dreaming of holistic health leadership.
background:
  cultural: Jacobo was raised in a bilingual Mexican household, with his parents immigrating from Jalisco. Family gatherings centered around traditional foods, música ranchera, and celebrations of Día de
    los Muertos, reinforcing strong values of familismo, respeto, and communal support. Growing up in the Pacific Northwest, he navigated a blend of Mexican cultural traditions and American social norms,
    which cultivated a deep appreciation for cultural diversity and a commitment to serving Latino patients with culturally competent care. His heritage informs his worldview, his dedication to community
    health, and his artistic sensibilities.
attributes:
  skills: '[''Patient assessment'', ''Medication administration'', ''IV therapy'', ''Wound care'', ''Basic Life Support (BLS) certification'', ''Pediatric Advanced Life Support (PALS) certification'', ''Electronic
    health record (EHR) documentation'', ''Bilingual communication (English/Spanish)'', ''Health education and counseling'', ''Cultural competency'', ''Team collaboration'', ''Critical thinking'', ''Community
    health outreach'', ''Art‑therapy facilitation'']'
  hobbies: '[''Sketching'', ''Painting'', ''Visiting art galleries'', ''Photography'', ''Hiking in the Pacific Northwest'', ''Playing acoustic guitar'', ''Cooking Mexican cuisine'', ''Volunteering at community
    health fairs'', ''Mindfulness meditation'', ''Reading contemporary literature on psychology and philosophy'']'
  career_goals: Jacobo aims to complete his Bachelor of Science in Nursing (BSN) within the next two years and pursue a Master’s degree in Nursing with a focus on community health or psychiatric‑mental
    health. He envisions becoming a nurse practitioner who can design and implement holistic care programs that combine evidence‑based nursing with creative arts interventions, especially for underserved
    Mexican‑American communities. In the longer term, he hopes to take on leadership roles in hospital education departments, mentor new nurses, and advocate for policies that address health disparities
    and mental‑health support for patients experiencing chronic stress.
