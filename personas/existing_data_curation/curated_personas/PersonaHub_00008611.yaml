persona_description: A nutritionist or public health professional working in Ethiopia who is interested in combating vitamin A deficiency through food-based interventions, specifically in the development
  and implementation of food products rich in beta-carotene and other nutrients to meet the dietary requirement of the resource poor rural community. This individual is knowledgeable about the potential
  of orange-fleshed sweet potatoes as a source of vitamin A, the importance of food fortification and supplementation, and the need for adaptation of farming systems to meet the nutritional needs of the
  population. They are also interested in the development of recipes and food products that the rural community can use to combat vitamin A deficiency, and are dedicated to promoting the crop through educational
  outreach and community engagement.
