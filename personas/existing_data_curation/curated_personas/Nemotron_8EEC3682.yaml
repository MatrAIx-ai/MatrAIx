  hobbies: '[''Hiking local trails (Willamette Valley, Silver Falls)'', ''Birdwatching and nature photography'', ''Reading (science‑fiction, historical nonfiction)'', ''Woodworking and small‑scale carpentry
    projects'', ''3D printing and design'', ''Playing single‑player RPG video games'', ''Participating in a small board‑gaming group'', ''Meditation and mindfulness practice'']'
  career_goals: Richard aims to secure an entry‑level position in project coordination or administrative support where he can apply his organizational strengths and curiosity for process improvement. Over
    the next few years, he plans to pursue a bachelor’s degree in Management Information Systems, with the long‑term ambition of becoming a technical project manager for a nonprofit or community‑focused
    organization. He also envisions eventually launching a small online store that sells handcrafted wooden items, combining his interest in woodworking with his business knowledge.
