  career_goals: At three, Mitchell’s aspirations are imaginative yet reflect his love of art and discovery. He often says he wants to be an artist who paints big pictures, an explorer who finds new places
    in the woods, or a builder who makes cool forts. He also enjoys the idea of helping his family on the farm and dreaming of leading games, showing his competitive spirit.
