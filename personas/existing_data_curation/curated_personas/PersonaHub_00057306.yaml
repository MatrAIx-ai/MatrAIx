persona_description: A scientist from the National Centers for Coastal Ocean Science (NCCOS) who is responsible for collecting and analyzing samples of sediments, fish tissue, and benthic community for
  contaminant analysis and toxicity testing in the Bristol Bay region. The scientist collaborates closely with the University of Alaska-Fairbanks and the U.S. Fish and Wildlife Service to ensure the accuracy
  and reliability of the data collected. The scientist is experienced in using National Status and Trends Bioeffects Program protocols and has a strong background in environmental science and toxicology.
  The scientist's expertise is in the analysis of chemical contaminants, toxicity bioassays, and the assessment of benthic community health. The scientist is also knowledgeable in the management of fishery
  resources and the integration of their findings into an integrated assessment.
