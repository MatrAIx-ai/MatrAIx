  career_goals: Maria dreams of a future where she can combine her love for art and curiosity about the natural world. She aspires to become an environmental illustrator, creating visual stories that raise
    awareness about wildlife conservation. She also imagines attending a specialized high school for the arts and sciences, where she can deepen her skills in illustration and environmental science. In
    the longer term, Maria hopes to work as a museum exhibit designer or a wildlife documentary illustrator, helping people appreciate the beauty of nature through visual media. She is also motivated to
    give back to her community by offering art workshops for younger kids in Donalds and participating in local conservation projects.
