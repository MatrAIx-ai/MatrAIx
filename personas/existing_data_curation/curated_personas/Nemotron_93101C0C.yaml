personas:
  professional: Maria Bovard is a budding visual artist who blends traditional pencil sketches with watercolor and digital tablet work, using their curiosity and balanced organization to lead mixed-media
    projects in the school art club.
  sports: Maria Bovard enjoys playing for the Donald’s Middle School Falcons soccer team, cheering on the New York Yankees in baseball, and spending weekends hiking with the local nature club, which balances
    their love of the outdoors with team camaraderie.
  arts: Maria Bovard immerses themselves in diverse creative worlds, drawing inspiration from the whimsical illustrations of Brian Froud, the lyrical storytelling of J.K. Rowling, and the country‑bluegrass
    melodies of Chris Stapleton and Taylor Swift, which together shape their own artistic voice.
  travel: Maria Bovard prefers adventure‑filled trips that combine learning and play, having explored the Great Smoky Mountains, toured the Smithsonian museums in Washington, DC, and they dream of wandering
    the historic streets of Paris and the awe‑inspiring vistas of the Grand Canyon.
  culinary: In the kitchen, Maria Bovard delights in baking Southern‑style biscuits and peach cobbler, often adding a dash of cinnamon, while their modest cooking skill includes mastering simple recipes
    like homemade chocolate chip cookies, though they occasionally forget to set the timer, resulting in a crisped bottom.
  core: Maria Bovard is a curious, organization‑balanced 11‑year‑old artist who channels their love of nature, music, and baking into colorful creations, even if they sometimes lose track of time and homework.
background:
  cultural: Maria was raised in Donalds, a small rural town in Abbeville County, South Carolina. Her family reflects the region’s Southern heritage, emphasizing close‑knit community ties, hospitality, and
    a love for local traditions such as church gatherings, Southern cuisine, and outdoor activities like fishing and gardening. While her ethnic background is white, her upbringing includes a blend of modern
    influences—access to digital media and contemporary art education—alongside long‑standing Southern values like respect for elders, appreciation for nature, and participation in community events like
    county fairs and volunteer clean‑up days. This cultural context shapes her worldview, fostering both a respect for tradition and an openness to new ideas.
