  hobbies: '[''Sketching'', ''Digital painting'', ''Creative writing (short stories, poetry)'', ''Reading speculative fiction'', ''Playing chess'', ''Exploring new mobile apps for art'', ''Attending local
    art workshops'', ''Organizing study groups'', ''Collecting visual inspiration boards'']'
  career_goals: Charlotte aspires to turn her love of visual art and abstract concepts into a professional career. She dreams of attending a specialized arts high school and eventually studying graphic
    design, illustration, or concept art at a university. Her long-term ambition is to work as a concept artist for video games or a graphic novelist, creating immersive worlds that blend narrative and
    visual design. She also hopes to use her organizational talent to lead collaborative creative projects and perhaps launch a youth-focused digital art platform that encourages other young creators to
    explore their imagination.
