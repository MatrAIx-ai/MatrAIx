personas:
  professional: Charlotte Sellers, a budding teen concept artist, blends disciplined sketching techniques with speculative storytelling to create compelling visual narratives for indie game pitches, and
    they meticulously plan each illustration to meet high standards.
  sports: Charlotte Sellers plays on her middle school girls' soccer team, trains with the local U-14 Tigers club, and follows the Washington Capitals (NHL) and DC United (MLS) for inspiration, balancing
    a disciplined practice schedule with their passion for creative pursuits.
  arts: Charlotte Sellers channels their imagination through sketching, digital painting on their tablet, and writing speculative short stories, drawing inspiration from the visual storytelling of Studio
    Ghibli, the lyrical compositions of Lin-Manuel Miranda, and the vibrant digital illustrations of Loish, while actively participating in community art workshops.
  travel: Charlotte Sellers prefers meticulously planned weekend getaways, often visiting nearby cultural hubs such as the Smithsonian museums in Washington D.C., the historic streets of Williamsburg, Virginia,
    and dreaming of future trips to Kyoto's ancient temples and the vibrant streets of Barcelona, all within their modest family travel budget.
  culinary: Charlotte Sellers enjoys experimenting with quick, colorful meals like avocado toast topped with smoked salmon, homemade sushi rolls featuring cucumber and tuna, and spicy ramen bowls, while
    they master the art of crafting perfect fruit smoothies using fresh berries and Greek yogurt.
  core: Charlotte Sellers, a disciplined yet wildly imaginative 13-year-old, turns solitary creative explorations into detailed sketches, speculative tales, and carefully saved allowance, navigating teenage
    life with quiet confidence and a penchant for organization, and they often surprise friends with unexpected bursts of humor.
background:
  cultural: Charlotte is a Black teenager growing up in the vibrant, multicultural landscape of Las Vegas. She is part of a close-knit family that emphasizes pride in African-American heritage, celebrating
    traditions such as Juneteenth and participating in local community events organized by youth groups like Black Girls Code. Her upbringing blends the city's dynamic entertainment scene with the strong
    cultural values of her community, exposing her to a variety of musical influences—from classic R&B and hip‑hop to contemporary jazz. These experiences shape her artistic sensibility, often infusing
    her work with themes of identity, resilience, and creative expression rooted in her cultural background.
attributes:
  skills: '[''Creative writing'', ''Digital illustration'', ''Critical thinking'', ''Time management'', ''Organizational planning'', ''Basic programming (Python)'', ''Research and information synthesis'',
