persona_description: A scientist who specializes in the study of meteorites and their origins, particularly the HED (howardite, eucrite and diogenite) meteorites. This person is likely to be interested
  in the Dawn mission to Vesta and Ceres, which is managed by NASA's Jet Propulsion Laboratory and is responsible for overall Dawn mission science. The person's expertise lies in meteorite classification,
  meteorite impact studies, and the analysis of meteorite samples. They are likely to be interested in the properties and composition of Howardites, which are believed to originate from Vesta and are a
  good laboratory analog for spectral and chemical measurements that will be made of the Vestan surface by Dawn.
