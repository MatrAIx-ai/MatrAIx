  hobbies: '[''Woodworking'', ''Gardening'', ''Historical reading and genealogy research'', ''Puzzle solving (crosswords, Sudoku)'', ''Participating in local church activities'', ''Listening to soul and
    jazz music'', ''Volunteering at senior center'', ''Walking along the waterfront'']'
  career_goals: Dennis aims to channel his disciplined organizational strengths into meaningful community service. He aspires to become a volunteer coordinator for the local senior center, serve on the
    board of a nonprofit focused on youth mentorship, and mentor at‑risk youngsters in job‑readiness skills. He also wishes to document his family’s African heritage by researching genealogy and publishing
    a short memoir, pursue adult education courses in digital archiving, and complete a home renovation project that reflects his high standards. Maintaining his health through regular walking and stress‑reduction
    practices is an integral part of his long‑term personal ambitions.
