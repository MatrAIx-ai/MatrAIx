personas:
  professional: Dennis Adeola, a seasoned community organizer with an associate’s degree in business administration, channels their meticulous project‑planning, budgeting, and troubleshooting expertise
    into coordinating senior‑center programs, and their unwavering discipline and high standards keep every event on schedule, even if their tendency to over‑plan sometimes creates stress.
  sports: Dennis Adeola stays active with daily waterfront walks, participates in the Norfolk Senior Center’s shuffleboard league during winter, and cheerfully follows the Norfolk Tides baseball team and
    the Virginia Cavaliers football squad, reflecting a balanced love for low‑key fitness and local team spirit.
  arts: Dennis Adeola immerses themselves in classic soul and jazz, often playing Aretha Franklin, Marvin Gaye, Miles Davis, and John Coltrane on a vintage record player while they craft furniture, and
    they regularly attend the Virginia Symphony Orchestra’s community concerts, finding that these musical roots fuel both their creative woodworking and genealogical research.
  travel: Dennis Adeola enjoys organized heritage tours, having explored Washington D.C.’s national museums, the historic streets of Charleston, SC, and the battlefields of Gettysburg, and they dream of
    a curated pilgrimage to the island of St. Helena to trace maritime history, always preferring trips with clear itineraries and modest budgets.
  culinary: Dennis Adeola delights in cooking garden‑fresh meals, regularly preparing rosemary‑roasted chicken with roasted carrots, a hearty vegetable stew seasoned with thyme, and occasionally treating
    themselves to a slice of classic New York‑style cheesecake, while their woodworking‑inspired precision translates into meticulous chopping and plating.
  core: Dennis Adeola blends disciplined organization with a restless curiosity, juggling meticulous senior‑center coordination, careful budgeting, chronic worry about health numbers, and a soulful love
    for jazz, all while secretly hoarding half‑finished furniture projects.
background:
  cultural: Dennis is an African‑American senior whose family name, Adeola, reflects Yoruba roots from Nigeria, indicating a lineage that blends West African heritage with Southern United States culture.
    He grew up in Norfolk’s historic Black neighborhoods during the civil‑rights era, shaped by strong church involvement, Southern cuisine, storytelling traditions, and a deep sense of community solidarity.
    He values intergenerational respect, maintains ties to African diaspora cultural events, and embraces both his African ancestry and the traditions of the African‑American community in Virginia.
attributes:
  skills: '[''Project planning and coordination'', ''Budgeting and bookkeeping'', ''Office administration'', ''Microsoft Office proficiency'', ''Basic computer troubleshooting'', ''Woodworking and home
