persona_description: A neurologist with expertise in the diagnosis, treatment, and research of movement disorders, particularly tardive dyskinesia. They have a collaborative approach to treatment, involving
  input from physical, occupational, and speech therapists, as well as members of the Otolaryngology Department. They have a special area of expertise in pallidotomy, thalamotomy, and thalamic or subthalamic
  deep brain stimulators, and use advanced image-guidance techniques to optimize surgical procedures. They are passionate about finding the sources of movement disorders and improving treatments and therapies
  for patients with these conditions.
