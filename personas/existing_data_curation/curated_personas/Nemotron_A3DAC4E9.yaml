  hobbies: '[''Gardening'', ''Quilting'', ''Reading historical fiction'', ''Walking her dog'', ''Community theater backstage work'', ''Adult literacy tutoring'']'
  career_goals: Wana aims to advance to a senior compliance leadership role, such as Compliance Manager or Director, where she can shape organization‑wide policies and mentor junior staff. She seeks to
    integrate automated compliance monitoring tools to streamline routine tasks, reinforcing the predictable environment she values. Over the next five years she plans to earn the Certified Compliance &
    Ethics Professional (CCEP) credential and to contribute her expertise to local small businesses through consulting, helping them establish reliable compliance programs. Ultimately, she envisions a semi‑retired
    advisory position that balances professional engagement with her personal interests while allowing her to be recognized as a top performer in her field.
