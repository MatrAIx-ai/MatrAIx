personas:
  professional: Wana Tyler, a seasoned compliance officer with over twenty years in manufacturing and logistics, leverages her meticulous audit expertise and data‑driven risk assessments to design foolproof
    compliance frameworks, while their competitive edge drives them toward senior leadership and the pursuit of a CCEP certification to mentor junior staff.
  sports: Wana Tyler’s athletic regimen centers on daily walks with her border collie along the Spring River trail, occasional attendance at Kansas State Wildcats football games and local high‑school baseball
    matches, and participation in a senior walking club that meets at the county fairgrounds, blending community spirit with a low‑impact fitness routine.
  arts: Wana Tyler channels creative energy into intricate quilt designs inspired by historical fiction authors like Willa Cather and classic country melodies from Johnny Cash, volunteers backstage for
    the community theater, and attends the Kansas State Fair’s folk music showcases featuring The Avett Brothers, weaving arts into a disciplined yet expressive lifestyle.
  travel: Wana Tyler prefers road trips that combine modest adventure with familiar comforts, such as weekend getaways to the Ozark foothills, a nostalgic visit to the historic Route 66 town of Galena,
    and annual pilgrimages to the Kansas State Fair, planning itineraries around family obligations and budgeting constraints while dreaming of a future trip to Williamsburg’s colonial reenactments.
  culinary: Wana Tyler delights in cooking with garden bounty, regularly preparing heirloom tomato salads, sweet corn succotash, and pickled cucumbers, while mastering classic Midwestern dishes like chicken‑fried
    steak and cornbread, and occasionally enters the county fair's 'best casserole' contest, reflecting a blend of practical home‑cooking and occasional culinary competition.
  core: Wana Tyler is a methodical compliance veteran whose love of routine, competitive drive, and community‑rooted hobbies shape a life that balances meticulous work, garden stewardship, and a quiet quest
    for artistic perfection.
background:
  cultural: Wana grew up in a small, conservative town in southeastern Kansas, raised in a Methodist family that emphasized hard work, self‑reliance, and community service. Her white Midwestern heritage
    is reflected in a practical, no‑nonsense outlook and a strong sense of duty to family and neighbors. She maintains close ties with local churches and participates in county fairs and the Kansas State
    Fair, valuing traditions that reinforce stability and continuity. While she respects diverse perspectives, her upbringing fosters a preference for familiar customs and a cautious approach to change.
