  hobbies: '["Playing strategy video games", "Reading sci‑fi and fantasy novels", "Building Arduino/Raspberry Pi projects", "Sketching urban and beach landscapes", "Listening to lo‑fi hip‑hop and instrumental
    music", "Walking on Fort Lauderdale beaches at sunrise", "Cooking Mexican family recipes", "Creating short video edits"]'
  career_goals: Nestor hopes to turn his curiosity about technology into a career that balances creativity and practicality. In the next few years he aims to earn a high school diploma, obtain industry
    certifications such as CompTIA IT Fundamentals, and enroll in a community‑college program in computer science or information technology. He envisions working as a junior software developer, web designer,
    or technical support specialist, while keeping the option open to learn a trade like automotive repair to support his family. He aspires to eventually create a small online platform where he can share
    tutorials and his own digital art, giving him both independence and a channel for collaborative projects when he feels ready.
