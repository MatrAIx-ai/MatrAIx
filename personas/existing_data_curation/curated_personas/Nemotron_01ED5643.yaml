  career_goals: Kobra aims to achieve CPA certification within the next year and advance to senior manager at his firm, focusing on the integration of data analytics and sustainability reporting. He aspires
    to become a partner who leads a practice area dedicated to environmental, social, and governance (ESG) accounting and to develop innovative audit methodologies for cultural and nonprofit organizations.
    Long‑term, he envisions launching a boutique consulting firm that advises artists, galleries, and heritage institutions on financial stewardship and valuation. Throughout his career progression, he
    is committed to maintaining a healthy work‑life balance, supporting his spouse, and mentoring the next generation of accountants through community workshops and adjunct teaching at local colleges.
