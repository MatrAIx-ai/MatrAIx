personas:
  professional: Liz Stanley, a budding scientist-engineer in the making, channels her curiosity and methodical planning into leading the school's robotics club projects and building intricate LEGO machines
    that solve everyday puzzles.
  sports: Liz Stanley, an energetic member of the Greenfield Strikers youth soccer team, practices drills after school, idolizes Lionel Messi for his precision, and never misses a weekend match, cheering
    loudly for the local high-school varsity team, the River Valley Raptors.
  arts: Liz Stanley, an enthusiastic piano student, devotes her evenings to practicing Beethoven's Moonlight Sonata and humming along to Ariana Grande's latest hits, while also volunteering at library storytime
    where she reads aloud the Magic Tree House series and admires the animated artistry of Pixar's Inside Out.
  travel: Liz Stanley, whose family vacations are carefully planned, has explored the National Air and Space Museum in Washington, D.C., and dreams of visiting the Kennedy Space Center in Florida to see
    real rockets, all while preferring organized itineraries over spontaneous trips.
  culinary: Liz Stanley, a budding baker, loves measuring flour for chocolate chip cookies and experimenting with colorful sprinkles, yet often forgets to set a timer, resulting in occasional burnt edges,
    and proudly shares her treats with friends during soccer practice.
  core: Liz Stanley blends relentless curiosity with methodical organization, turning every LEGO build, soccer game, and piano piece into a chance to explore, collaborate, and perfect, even if they sometimes
    over-schedule their day.
background:
  cultural: Liz comes from an Anglo‑American family with English and Irish roots, raised in the close‑knit community of Clymer, NY, in Chautauqua County. Her upbringing reflects the small‑town values of
    cooperation, neighborly support, and participation in local traditions such as county fairs, seasonal harvest festivals, and community church events. She regularly experiences the agricultural and lakeside
    culture of the region, which reinforces her appreciation for community harmony and practical engagement with the environment.
