  career_goals: Liz dreams of becoming a teacher or a veterinarian, combining her love for helping others with her fascination for animals and science. She aims to excel academically, earn a scholarship
    to a reputable high school, and later study biology or education in college. Additionally, she hopes to lead community service projects that support local animal shelters and environmental clean‑ups,
    reflecting her practical desire to make a positive impact.
