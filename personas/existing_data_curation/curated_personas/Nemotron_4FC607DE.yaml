personas:
  professional: Kimberly Lastrapes, a one‑year‑old who already helps organize toys and assists her mother during the weekly Nashville church food‑bank drive, displays early signs of methodical planning,
    reliability, and a cooperative yet assertive spirit that hint at a future career in event coordination or community outreach.
  sports: Kimberly Lastrapes enjoys toddler gymnastics classes at the community center, loves splashing in a parent‑guided swimming lesson at the local pool, and giggles whenever the family watches the
    Nashville Predators or Tennessee Titans on game night, often attempting to mimic the mascots’ dance moves.
  arts: Kimberly Lastrapes delights in church worship music, twirls to the fiddle strains of Dolly Parton, and attends storytime at the Nashville Public Library where picture books by Eric Carle spark their
    imagination, blending Southern musical roots with early artistic curiosity.
  travel: Kimberly Lastrapes travels primarily by car with family, cherishes weekend trips to the Great Smoky Mountains for leaf‑peeping hikes, enjoys annual visits to Disney World in Orlando, and dreams—through
    bedtime storybooks—of someday seeing the Eiffel Tower in Paris.
  culinary: Kimberly Lastrapes favors creamy biscuits with honey, tender banana pancakes, smoky BBQ‑glazed chicken nuggets, and sweet potato mash, and while still mastering the art of self‑feeding, they
    love exploring textures by stirring batter, dropping peas, and smearing ketchup on everything.
  core: Kimberly Lastrapes is a meticulous one‑year‑old who thrives on routine, turns everyday chores into playful learning, and curiously watches family finances while nurturing a budding love for community,
    music, and tasty Southern comforts.
background:
  cultural: Kimberly grew up as a white Southern woman in Nashville, Tennessee, where she absorbed the region's values of hospitality, community involvement, and practical conservatism. She participates
    in local church activities, volunteers at food‑bank drives, and enjoys Southern cuisine such as barbecue and biscuits. The blend of urban Nashville culture and traditional Southern traditions—festivals,
    live music, and a strong sense of neighborhood—shapes her worldview and reinforces her preference for predictable, well‑ordered environments.
attributes:
  skills: '["Household budgeting", "Event planning", "Time management", "Basic office software (email, word processing, spreadsheets)", "Record‑keeping", "Caretaking", "Organizing and decluttering", "Customer
