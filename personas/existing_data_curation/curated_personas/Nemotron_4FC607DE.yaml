  hobbies: '["Puzzle solving (Sudoku, jigsaw)", "Gardening", "Journaling", "Reading self‑help and lifestyle books", "Baking", "Knitting", "Attending community theater", "Listening to country and gospel
    music"]'
  career_goals: Kimberly is focused on completing her GED and obtaining a vocational certification in medical records administration or office management. She aims to secure a stable, structured position
    in a local clinic, university office, or small business where her organizational strengths and reliability can be leveraged. In the long term, she hopes to progress to a supervisory role that allows
    her to design efficient workflows and mentor new staff while maintaining the predictability she values.
