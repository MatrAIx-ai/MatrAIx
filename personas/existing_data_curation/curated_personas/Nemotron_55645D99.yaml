personas:
  professional: Joel Milis, a seasoned arborist with over a decade of tree trimming and safety expertise, channels his pragmatic problem‑solving and competitive drive into meeting strict seasonal job targets
    while pushing for a crew‑lead position that offers the predictable schedule he craves.
  sports: Joel Milis anchors second base for his town’s summer softball league, spends weekends hunting white‑tailed deer and fishing for catfish on the Roanoke River, rides his ATV on muddy trail runs,
    and roots for the Carolina Panthers and the NC State Wolfpack while proudly cheering the local high‑school basketball team during March madness.
  arts: Joel Milis sings baritone in his church choir, organizes the annual harvest festival, and unwinds by listening to classic Southern gospel legends like The Staple Singers and contemporary Americana
    artists such as Jason Isbell, finding that the rhythm of a hymn mirrors the cadence of a well‑pruned tree.
  travel: Joel Milis prefers short, purpose‑driven road trips that combine hunting in the Great Smoky Mountains and fishing on the Albemarle Sound, but he also dreams of a weekend getaway to Charleston’s
    historic waterfront and a future adventure to New Zealand’s fjordland for back‑country trekking.
  culinary: Joel Milis excels at low‑and‑slow hickory‑smoked pork shoulder barbecue, pairs it with collard greens seasoned with smoked turkey, homemade buttermilk biscuits, and a splash of sweet tea, and
    he enjoys building a custom smoker while perfecting the rub that includes brown sugar, paprika, and cayenne.
  core: Joel Milis is a competitive, hands‑on arborist whose love for community choir, hunting, and barbecue battles his occasional financial disarray and lingering worries, making him a reliable yet occasionally
    anxious fixture in his small‑town world.
background:
  cultural: Joel grew up in Rich Square, a small town in Bertie County that embodies the rural, white, working‑class culture of eastern North Carolina. His family has deep roots in agriculture and forestry,
    with generations who tended farms, harvested timber, and participated in local church life. The community’s values of self‑reliance, hospitality, and respect for the land were reinforced by regular
    events such as the county fair, church potlucks, and seasonal hunting seasons. Growing up speaking a Southern dialect and attending a Baptist church, Joel internalized a blend of traditional Southern
    conservatism and a pragmatic, no‑nonsense work ethic. The local environment—pine forests, wetlands, and the Roanoke River—shaped his familiarity with outdoor work and fostered a lifelong appreciation
    for the region’s natural resources.
attributes:
  skills: '["Arboricultural pruning", "Chainsaw and pole saw operation", "Tree climbing and safety", "Equipment maintenance and repair", "Tree species identification", "Landscape and ground‑cover management",
    "Customer communication and service", "Team coordination and crew leadership", "First aid and emergency response", "Basic carpentry and fence repair"]'
  hobbies: '["Community softball league", "Hunting trips", "Fishing on the Roanoke River", "ATV off‑road riding", "Church choir participation", "Barbecue grilling", "DIY woodworking", "Camping and hiking",
    "Classic rock music collection"]'
  career_goals: Joel wants to convert his hands‑on expertise into formal credentials by earning an ISA Certified Arborist designation within the next two years. He aims to move into a crew‑lead role that
    gives him more predictable scheduling while still allowing the flexibility he enjoys in the field. Long‑term, he hopes to launch a small, owner‑operated tree‑care business that serves homeowners and
    municipal contracts across Bertie County, emphasizing safety, reliability, and community outreach. To reduce his stress about income volatility, he is also exploring a part‑time certification as a land‑management
    consultant, which would let him advise local farms on tree planting and erosion control. His competitive streak drives him to set measurable performance targets—such as completing 150 tree‑service jobs
    per season with a sub‑2% safety incident rate.
