personas:
  professional: Sarah Jung, a seasoned healthcare administrator with three decades of experience overseeing operations, budgets, and regulatory compliance, leverages their methodical, detail‑oriented nature
    and love for solitary research to implement data‑driven patient flow improvements and champion fiscally responsible telehealth integration across multiple facilities.
  sports: Sarah Jung, a member of the Niagara Senior Walking Club, enjoys early morning shoreline walks for fitness, supports the Buffalo Bills during football season and the Toronto Raptors in basketball,
    and prefers low‑impact activities over competitive sports to protect their joints.
  arts: Sarah Jung, an admirer of Claude Monet’s Impressionist gardens and a devoted listener of Yo‑Yo Ma’s cello performances, often knits intricate Celtic patterns while attending the Niagara Falls Symphony
    Orchestra’s concerts featuring Beethoven and Tchaikovsky.
  travel: Sarah Jung, a careful itinerary planner, favors quiet, culturally rich trips such as visits to the historic estates of Washington, D.C., the Royal Botanical Gardens in Ontario, and the castles
    of Scotland, always booking serene accommodations well in advance to accommodate their love of solitary reading and birdwatching.
  culinary: Sarah Jung, a competent home cook, regularly prepares Mediterranean‑inspired dishes like grilled salmon with dill, heirloom roasted carrots glazed with wildflower honey, and herb‑laden salads
    using basil, mint, and sage harvested from their garden, while occasionally enjoying farm‑to‑table tasting menus at their local restaurant.
  core: Sarah Jung blends a methodical healthcare leadership style with a solitary curiosity for history, nature, and puzzles, balancing disciplined financial planning and practical health management with
    occasional indulgences in rare garden seeds and quiet artistic pursuits.
background:
  cultural: Sarah is a fifth‑generation white American whose family roots trace back to German and English settlers in western New York. Raised in the industrial‑post‑war suburbs of Niagara County, she
    internalized the region’s values of self‑reliance, community service, and modesty. Though she identifies culturally with the Mid‑Atlantic’s blend of traditional Protestant work ethic and the area’s
    immigrant heritage, she embraces the local customs of modest celebration, seasonal festivals, and a deep appreciation for the natural landscape of the Niagara region.
