  hobbies: '[''Historical Biography Reading'', ''Medical Research Journals'', ''Gardening (native wildflowers)'', ''Birdwatching'', ''Jigsaw Puzzles'', ''Knitting'', ''Nature Photography'']'
  career_goals: Sarah aims to advance to a regional director of operations position, where she can spearhead large‑scale quality improvement initiatives across multiple facilities. She is also interested
    in shaping telehealth integration strategies that balance innovative patient care with fiscal responsibility. Long‑term, she envisions mentoring emerging healthcare managers and consulting on best‑practice
    models for rural health systems.
