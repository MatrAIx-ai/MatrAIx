personas:
  professional: Grace Mullis, an aspiring teen event coordinator, leverages their love of structure and reliability through meticulous planning, Trello‑driven project management, and charismatic public
    speaking to organize school pep rallies and community fundraisers, and they envision a future designing corporate conferences.
  sports: Grace Mullis fuels their competitive edge on the Concord Field Hockey Club’s varsity squad and spring track meets, while cheering the Boston Celtics, New England Patriots, and Boston Bruins, adheres
    to a regimented fitness routine that blends skill drills, interval sprints, and weekly yoga for injury prevention, and they set weekly performance goals to track progress.
  arts: Grace Mullis channels their sociable flair into crafting themed playlists featuring Taylor Swift, BTS, and Billie Eilish, produces short TikTok sketches that riff on Agatha Christie mysteries, spends
    weekends binge‑watching Christopher Nolan’s films to recharge before debate practice, and they often share these creations with friends for instant feedback.
  travel: Grace Mullis, who meticulously maps itineraries in their bullet‑journal, enjoys weekend road trips to Boston and Washington D.C. while dreaming of an immersive spring break in Paris and a summer
    surf adventure in Kyoto, balances their love of adventure with a tight high‑school budget and parental permission, and they prioritize group travel experiences that strengthen friendships.
  culinary: Grace Mullis, a budding home‑chef, favors quick‑fire meals like margherita pizza, spicy tuna rolls, and miso‑ramen, often whipping up avocado‑toast brunches and snack trays of pretzel bites
    with cheddar dip for game nights, occasionally experiments with sriracha‑glazed chicken wings, and they love sharing their culinary creations on Instagram Stories.
  core: Grace Mullis is a hyper‑organized, talkative teen who channels a competitive streak into event planning, social media creation, and sports, while juggling a tendency to over‑schedule, impulsive
    merch purchases, and a relentless quest for structure, and they constantly seek new ways to bring order to chaos.
background:
  cultural: Grace comes from a middle‑class white New England family in Concord, New Hampshire. Her upbringing reflects the region’s emphasis on community involvement, self‑reliance, and a pragmatic approach
    to life. She’s been raised with an appreciation for local traditions such as the annual Concord Fair and a strong sense of civic duty, often participating in town clean‑up events and school volunteer
    projects. While her household is secular and values education, it also encourages independence and practical skill‑building, which aligns with her preference for structure and predictability.
attributes:
  skills: '[''event planning'', ''public speaking'', ''project management'', ''social media content creation'', ''budgeting'', ''team leadership'', ''strategic sports analysis'', ''time management'']'
  hobbies: '[''organizing game nights'', ''hosting themed parties'', ''participating in debate club'', ''playing field hockey'', ''volunteering at community center'', ''bullet journaling'', ''creating TikTok
    videos'', ''reading mystery novels'']'
  career_goals: Grace is determined to finish her high school equivalency by the end of next year and then enroll in a community college program in business administration with a focus on marketing and
    event management. She aims to gain practical experience through internships at local event venues or community organizations, eventually securing a full‑time position as an event coordinator for a regional
    corporate office. Long term, she envisions moving into senior project‑management roles, where she can combine her love of structure with her sociable leadership style to design large‑scale conferences
    and community outreach campaigns. Additionally, she hopes to maintain a side presence as a social‑media content creator, leveraging her communication skills.
