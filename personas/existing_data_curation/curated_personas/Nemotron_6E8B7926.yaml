  hobbies: '[''Heritage Gardening'', ''Quilting'', ''Historical Fiction Reading'', ''Senior Dance Classes'', ''Church Choir Participation'', ''Birdwatching'', ''Genealogy Research'', ''Cooking and Recipe
    Sharing'']'
  career_goals: Although retired, Judy is driven to give back to Ashville by establishing a sustainable community garden for seniors, publishing a memoir of her family’s multigenerational story, and creating
    a mentorship program that pairs experienced volunteers with younger community members. She also aims to stay physically active through regular walking groups and dance classes, ensuring her independence
    and health into her later years.
