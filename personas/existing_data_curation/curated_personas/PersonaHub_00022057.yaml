persona_description: A professional engineer who specializes in the design and construction of synchronous machines. They are familiar with the principles and practices of electrical engineering, particularly
  in the area of power generation and distribution. They have extensive experience in the design and installation of power plants, and are skilled in the use of slip rings and permanent terminals for power
  transmission. They are also knowledgeable about the design and construction of windings, and are familiar with the use of three-phase conductors for power distribution. They have a strong understanding
  of the principles of magnetism and electromagnetism, and are skilled in the use of mathematical models to analyze and optimize the performance of synchronous machines.
