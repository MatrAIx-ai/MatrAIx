  career_goals: Even at four, Nassim frequently talks about wanting to work with animals, dreaming of becoming a veterinarian or helping on a farm, which reflects his kindness and practical interest in
    caring for living things. He also enjoys stories about teachers and sometimes imagines himself leading a classroom, showing an early ambition to share knowledge and help classmates. These aspirations
    align with his cooperative nature and his desire to contribute to his community in a helpful, stable role.
