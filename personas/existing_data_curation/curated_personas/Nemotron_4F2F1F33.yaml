personas:
  professional: Nassim Witherington is a budding engineer who builds elaborate towers with LEGO bricks, balancing boundless curiosity about how pieces fit together with a practical approach to following
    step‑by‑step instructions, while often abandoning strict plans in favor of spontaneous redesigns.
  sports: Nassim Witherington loves the splash of the local community pool’s kiddie slide, joins the Bluebirds Soccer Club that practices on Saturday mornings alongside the hometown River City Rangers fans,
    and prefers flexible, playful exercise over regimented training, often strolling with a tiny foam ball while chanting the cheer of the pro football team.
  arts: Nassim Witherington delights in painting bright animal pictures alongside the classics of children’s storyteller Mo Willems, dancing to upbeat tunes by the children's singer Raffi, and regularly
    watches the animated series "Bluey" and "Paw Patrol", which together weave a creative world that fuels their imaginative play.
  travel: Nassim Witherington enjoys weekend family trips to the nearby lake camp, eagerly packing a small suitcase with crayons and a favorite stuffed giraffe, and dreams of one day visiting the towering
    castles of Scotland after watching a travel documentary with their parents.
  culinary: Nassim Witherington relishes buttery macaroni and cheese topped with a sprinkle of cheddar, loves crunchy apple slices dipped in peanut butter, and while they can barely stir a pot, they proudly
    serve up a DIY snack plate of grapes and cheese cubes for play‑date friends.
  core: Nassim Witherington navigates the world with a blend of restless curiosity and easygoing flexibility, often swapping meticulously built block towers for spontaneous puddle splashes, and manages
    to keep everyone smiling despite the occasional mess.
background:
  cultural: Nassim is raised in Indianola, a small Midwestern town in Iowa, within a family that values community, humility, and close‑knit relationships. His cultural environment includes participation
    in local church gatherings, school events, and the annual Iowa State Fair, where he experiences regional traditions such as corn mazes, farm animal exhibits, and classic fair foods. The community’s
    predominantly German‑ and Irish‑American heritage influences celebrations of holidays like Thanksgiving and Fourth of July with family potlucks and outdoor activities. This setting fosters a sense of
    simplicity, cooperation, and appreciation for the agricultural surroundings that shape his daily life.
