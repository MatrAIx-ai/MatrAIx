  career_goals: She aspires to attend a STEM-oriented high school and eventually earn a degree in civil or environmental engineering. Her long‑term ambition is to design sustainable infrastructure for growing
    communities like Salado, ensuring safe water, resilient roads, and green public spaces. She hopes to earn scholarships, join engineering internships, and eventually lead projects that blend practical
    problem‑solving with innovative technology. In the shorter term she plans to participate in robotics competitions, take advanced math and science courses, and secure a mentorship with a local engineering
    firm.
