personas:
  professional: Hallie Horton is an aspiring robotics engineer who channels a methodical curiosity into building small autonomous bots for school competitions, balancing innovative coding experiments with
    a practical, step‑by‑step workflow, and they plan each build meticulously.
  sports: Hallie Horton rides with the Salado Riders Club, jogs the Barton Creek trail, and follows the Austin FC and Texas Longhorns, and they treat fitness as a structured routine that blends solitary
    cardio with competitive equestrian drills.
  arts: Hallie Horton finds creative release in baking and listening to the folk‑rock sounds of The Lumineers and the storytelling of Pixar films, and they love historical biographies that fuel a penchant
    for crafting scrapbook timelines of past innovators.
  travel: Hallie Horton enjoys meticulously planning weekend getaways to nearby Austin for live music and to the Hill Country for hiking, dreams of a school‑organized trip to the Space Center Houston, and
    they prioritize budget‑friendly travel by using a saved allowance and family rides.
  culinary: Hallie Horton has a moderate baking skill, favoring recipes like lemon‑blueberry muffins, chocolate‑chip cookies, and pecan pie, often measuring ingredients with a digital scale and sharing
    the treats at school club meetings and library events, and they take pride in perfecting the crumb texture.
  core: Hallie Horton blends a competitive, organized mind with a love for tinkering, trail running, and baking, always juggling a journal of ideas, a cautious budget, and a skeptical eye toward shortcuts,
    and they thrive on turning plans into tangible results.
background:
  cultural: Hallie grew up in Salado, a small town in Bell County, Texas, where community ties, church involvement, and local traditions play a central role. Her family reflects a typical white, middle‑class
    Texas upbringing, with a blend of Southern hospitality and a pragmatic work ethic. She has been exposed to Texas heritage through family stories, county fairs, and school events that celebrate regional
    history and music. While the community values modesty, reliability, and self‑reliance, Hallie’s curious nature encourages her to explore broader ideas and contemporary technology. This cultural mix
    of traditional Southern values and a forward‑looking curiosity shapes her worldview and daily life.
