    as an art‑education mentor'']'
  career_goals: Donna aims to achieve Fellowship status (FSA) within the next three years, positioning herself for senior consulting or chief actuarial roles at a national insurer. She is especially interested
    in leading projects that integrate climate‑risk modeling and behavioral economics into traditional actuarial frameworks, seeking to pioneer innovative, data‑driven products. Long‑term, she aspires to
    become a recognized thought leader, publishing papers at actuarial conferences and mentoring women entering the field. She also values work‑life balance and plans to secure a role that offers flexibility,
    autonomous decision‑making, and opportunities for continuous learning.
