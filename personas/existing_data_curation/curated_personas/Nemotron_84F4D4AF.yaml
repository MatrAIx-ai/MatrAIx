  career_goals: Christopher dreams of becoming an astronaut, fascinated by rockets and the practical science behind space travel, but he also admires firefighters for their teamwork and hands‑on problem
    solving. He often talks about designing his own video games one day, mixing his love for new ideas with a practical desire to see his creations work. His competitive streak pushes him to imagine leading
    a crew of explorers or athletes, and his pragmatic side wants his future work to have tangible, helpful results.
