personas:
  professional: Clarence Perdue is a budding teenage engineer who channels their curiosity and practicality into building model airplanes and cars, programming Scratch projects, and leading a weekly robotics
    club workshop, balancing meticulous organization with flexible problem‑solving while reliably meeting project deadlines.
  sports: Clarence Perdue shoots hoops on the local middle school basketball team, plays pickup games with friends on weekends, follows the Los Angeles Lakers, rides their bike on rural trails, and trades
    fishing stories with teammates from the county's youth baseball club.
  arts: Clarence Perdue strums acoustic guitar chords learned from online tutorials while humming along to the classic rock of The Beatles and the progressive metal riffs of Rush, and devours sci‑fi epics
    by Isaac Asimov alongside nonfiction chronicles of Leonardo da Vinci’s inventions, letting those artistic influences shape their weekend model‑building projects.
  travel: Clarence Perdue prefers low‑cost weekend getaways, planning bike rides through nearby state parks, casting a line at Lake Willow for bass, dreaming of a future road trip down Route 66 to the Grand
    Canyon, and cherishes a school field trip to the Smithsonian National Air and Space Museum as a highlight of their travel experiences.
  culinary: Clarence Perdue favors hearty home‑cooked meals like spaghetti carbonara with pancetta, homemade pepperoni pizza topped with fresh basil, and keeps a stash of granola bars for after‑practice
    snacks, while occasionally ordering pizza from the local pizzeria after a late‑night robotics session.
  core: Clarence Perdue blends a curious tinkerer’s mind with a cautious, often anxious temperament, juggling model kits, basketball hoops, guitar chords, and meticulous budgeting while seeking balance
    between alone time and the buzz of friends.
background:
  cultural: Clarence was raised in Locust Grove, a close-knit community in Butts County, Georgia. His family's history in the area includes several generations of small-scale farming and local business
    ownership, instilling a strong work ethic and value for self-reliance. The community's Southern hospitality, church gatherings at a nearby Baptist congregation, and regular participation in county fairs
    and local volunteer events shape his social outlook. While he embraces modern technology and contemporary media, his cultural identity remains rooted in the traditions of rural Georgia - respect for
    family, neighborly support, and an appreciation for the outdoors.
