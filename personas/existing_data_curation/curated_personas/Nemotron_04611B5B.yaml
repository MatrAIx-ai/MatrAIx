personas:
  professional: Jason Adkins, an aspiring software engineer with a knack for building custom gaming rigs and prototyping strategy games, channels their curiosity and practical mindset into data‑driven development,
    while they balance meticulous project planning with the flexibility to tinker on the fly.
  sports: Jason Adkins, an avid hiker of the Sweetwater Preserve and a casual pick‑up basketball player at Lake Alice Sports Complex, they track cardio miles with the Gainesville Runners club while cheering
    on the Florida Gators, treating each trail ascent as a personal leaderboard challenge.
  arts: Jason Adkins, a lone photographer who captures Florida’s nocturnal owls and an ardent fan of electronic maestros like Daft Punk and Aphex Twin, they regularly indulge in tabletop RPG nights featuring
    Critical Role and curate an eclectic playlist that fuels their coding sessions.
  travel: Jason Adkins, a budget‑savvy adventure seeker, they spend semester breaks exploring natural gems such as Everglades National Park and the Blue Ridge Mountains, while dreaming of a solo trek through
    Iceland’s geothermal landscapes.
  culinary: Jason Adkins, a self‑taught home chef who favors building perfectly balanced ramen bowls with pork belly, soft‑boiled eggs, and a dash of chili oil, they also experiment with garlic‑ginger stir‑fry
    dishes and rely on protein bars for late‑night coding fuel.
  core: Jason Adkins blends relentless curiosity for tech and wilderness with a competitive, detail‑oriented streak, often sacrificing sleep for new PC builds while obsessively logging every hike and code
    commit, and they can’t resist a late‑night caffeine binge before a deadline.
background:
  cultural: Jason grew up in a middle‑class white family in the Gainesville area, absorbing a blend of Southern hospitality and the university town’s progressive, academic atmosphere. His upbringing emphasized
    self‑reliance, practical problem solving, and a respect for personal space, reflecting broader American cultural values. While he partakes in regional traditions such as enjoying outdoor activities
    and community events, his identity is shaped largely by the campus culture of the University of Florida, with influences from its diverse student body and the tech‑oriented circles he navigates.
