persona_description: A scientist who specializes in studying the climate and atmosphere of Titan, the largest moon of Saturn. Her research interests include atmospheric circulation systems, hydrocarbon
  cycles, and the possibility of life on Titan. She has been studying Titan's climate for six years and has made significant discoveries about its atmospheric cycle, including the presence of methane and
  ethane, and the discovery of a cloud in the tropics. Her work has been supported by the National Science Foundation and the University of Arizona's Lunar and Planetary Laboratory.
