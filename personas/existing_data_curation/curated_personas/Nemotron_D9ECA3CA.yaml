  career_goals: While still a toddler, Hocine already shows a budding curiosity about future work. He is fascinated by the construction trucks he sees on family outings and frequently pretends to build
    with his blocks, expressing a desire to become a builder or engineer who creates organized structures. He also admires firefighters for their clear roles and immediate impact, often saying he wants
    to help people. As he grows, his competitive streak drives him to master building taller towers than his peers, and his love of routine suggests he may gravitate toward careers that blend practical
    skills with predictable outcomes, such as carpentry, landscaping, or classroom assistance.
