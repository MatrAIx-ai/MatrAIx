persona_description: A civilian science writer who has produced the Canadian UFO survey since 1989, Chris Rutkowski. Rutkowski is a pragmatic investigator of UFO sightings, thoroughly investigating every
  account to weed out those he deems to be truly inexplicable. His work has attracted the attention of the Canadian government, who has decided that investigating UFOs is no longer a priority. Rutkowski
  has been inundated with reports and is struggling to follow up every lead. He has a unique perspective on the phenomenon, questioning why Canada is attracting so much UFO activity and commenting that
  if the recent increase in sightings continues, Ottawa will soon have to attribute more importance to the issue.
