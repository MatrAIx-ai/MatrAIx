  hobbies: '[''Watercolor Painting'', ''Creative Writing'', ''Attending Local Art Exhibits'', ''Exploring New Restaurants'', ''Cooking Fusion Dishes'', ''Volunteer Mentorship at Youth Center'', ''Listening
    to Jazz, R&B, and Gospel Music'']'
  career_goals: Virginia aims to advance within the hospitality industry by moving into supervisory roles, such as Front Office Supervisor or Hotel Manager, within the next five years. She plans to enroll
    in a community‑college certificate program in Hospitality Management to complement her practical experience. Long‑term, she dreams of opening a boutique bed‑and‑breakfast that showcases African‑American
    art and local Jacksonville culture, creating a welcoming space that blends her love of hospitality with her artistic passions.
