personas:
  professional: Virginia Haughton, a front‑desk specialist at a bustling Jacksonville hotel, blends sharp organizational skills with a vivid imagination to craft personalized guest experiences—recommending
    hidden art galleries, handling reservations with precision, and resolving conflicts calmly—while eyeing a future promotion to front office supervisor after completing a hospitality management certificate.
  sports: Virginia Haughton cheers for the Jacksonville Jaguars on game nights, joins the River Runners club for early‑morning runs along the St. Johns River, plays recreational beach volleyball in the
    summer, and rolls out a yoga mat for weekly evening sessions to balance the high‑energy demands of hospitality work.
  arts: Virginia Haughton spends weekends sketching vibrant downtown skylines, attends poetry open‑mic nights at The Loft where they recite stories inspired by hotel guests, draws creative energy from contemporary
    artists like Kehinde Wiley and Amy Sherald, and curates a rotating collection of local paintings in their living space.
  travel: Virginia Haughton plots travel with a blend of curiosity and practicality, favoring short road trips to Savannah and New Orleans to sample regional cuisine, has a bucket‑list desire to wander
    Marrakech’s spice souks, and always books budget‑friendly Airbnbs that offer a kitchen for experimental cooking, while coordinating trips around work shifts.
  culinary: Virginia Haughton enjoys fusing Southern comfort food with world flavors, whipping up shrimp‑and‑grits seasoned with Korean gochujang, collard greens tossed in miso, and jambalaya infused with
    Thai basil, while mastering the art of perfecting a roux and regularly experimenting with quinoa‑pomegranate salads for brunch gatherings.
  core: Virginia Haughton is a hospitality‑savvy artist who balances meticulous guest service with a love for bold flavors, spontaneous creativity, and community mentorship, all while juggling a habit of
    late‑night sketching and occasional overspending on art supplies.
background:
  cultural: Virginia grew up in Jacksonville’s historic African‑American community, where church, family gatherings, and Southern culinary traditions shaped her identity. She embraces the storytelling heritage
    of Black culture, which fuels her creative writing and love for poetry. Celebrations like Juneteenth and local festivals provide her with a deep sense of belonging and inspiration for her artistic pursuits.
    Her cultural roots also influence her hospitality style, as she strives to create inclusive, warm experiences that reflect the hospitality and resilience of the African‑American community in the South.
attributes:
  skills: '[''Guest Relations'', ''Reservation Systems (e.g., Opera, Cloudbeds)'', ''Conflict Resolution'', ''Multitasking'', ''Organizational Skills'', ''Basic Spanish Communication'', ''Creative Problem‑Solving'',
