  hobbies: '[''Community potlucks'', ''Church gatherings'', ''Karaoke nights'', ''Handmade puppetry'', ''Seasonal decorations'', ''Woodworking projects'', ''Baking cookies'', ''Exploring new recipes'',
    ''Hiking local trails'', ''Backyard gardening'', ''Reading children’s literature'', ''Reading child development psychology books'', ''County fair volunteering'', ''Trivia nights'']'
  career_goals: Janet aims to transition from her current childcare role to a licensed preschool teacher or program coordinator within the next five years. She plans to enroll part‑time at a community college
    to earn an Associate’s degree in Early Childhood Education and obtain a Child Development Associate credential. In the longer term, she dreams of opening a small, family‑run daycare that emphasizes
    a nurturing, flexible environment and offers community workshops for parents. She also hopes to advocate for improved early‑learning standards in Cass County and mentor new childcare staff.
