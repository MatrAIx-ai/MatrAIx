personas:
  professional: Janet Haswell is a 21‑year‑old early‑childhood caregiver who blends curiosity‑driven play with rigorous safety protocols, using their knack for improvisation and calm resilience to turn
    spontaneous craft projects into engaging learning experiences while effortlessly captivating both kids and parents.
  sports: Janet Haswell enjoys trail hiking in Cass County during summer, participates in a local women's recreational soccer league affiliated with the Cass County Community Center, and cheerfully follows
    the Indianapolis Colts and Indiana Pacers, balancing moderate cardio with weekend nature walks.
  arts: Janet Haswell fuels their love of arts by crafting whimsical puppets inspired by Jim Henson’s Muppets, quoting Dr. Seuss in storytime, belting out pop anthems by Taylor Swift and Bruno Mars at karaoke,
    and devouring the illustrated picture books of Oliver Jeffers, all of which shape their vibrant, interactive teaching style.
  travel: Janet Haswell, a weekend‑roadtrip enthusiast, often drives to the Indiana Dunes for sunrise hikes, has taken a day trip to Chicago’s Navy Pier for a family‑friendly museum outing, and dreams of
    exploring the whimsical streets of Bruges and the vibrant markets of Marrakech for fresh craft ideas.
  culinary: Janet Haswell bakes batch after batch of soft chocolate chip and oatmeal‑raisin cookies for the kids, whips up hearty vegetable lasagnas with garden‑grown zucchini and basil, and flaunts a modest
    yet confident culinary skill set that loves fresh herbs, seasonal produce, and the occasional experimental match of honey‑glazed carrots with smoked paprika.
  core: Janet Haswell exudes a breezy, people‑centric glow, turning spontaneous craft chaos into teachable moments, yet their habit of misplacing checklist notes and impulsively splurging on karaoke outfits
    adds a charmingly messy edge to their otherwise calm, resilient demeanor.
background:
  cultural: Janet grew up in Pleasant Hill, Missouri, within a predominantly white, Midwestern community that values family, hard work, and community service. Her ancestry includes German and Irish roots
    that settled the region in the late 1800s, imparting a practical, modest outlook and a strong sense of neighborly support. Raised in a close‑knit rural setting, she learned the importance of self‑reliance,
    faith‑based gatherings, and community involvement—values that shape her caring, down‑to‑earth approach to childcare and her desire to give back to her local area.
