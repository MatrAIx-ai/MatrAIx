  hobbies: '[''Puzzle solving (Sudoku, logic grids)'', ''Reading science and technology nonfiction'', ''Strategy video gaming'', ''Woodworking'', ''Scale model building'', ''Nature photography'', ''Indoor
    herb gardening'', ''Solo hiking'', ''Mindfulness meditation'']'
  career_goals: Alex aims to reenter the workforce in a remote, structured role that leverages his analytical and technical strengths while minimizing unnecessary social interaction. He plans to obtain
    certifications in cloud data platforms (e.g., AWS Certified Data Analytics) and advanced machine‑learning techniques to broaden his consultancy opportunities. Long‑term, he envisions establishing a
    freelance data‑analytics practice focused on small‑to‑medium enterprises in the Midwest, offering reliable, methodical insights and data pipelines. He also hopes to pursue a part‑time master's program
    to deepen his expertise and secure a stable, low‑stress career path that aligns with his preference for predictability and independent work.
