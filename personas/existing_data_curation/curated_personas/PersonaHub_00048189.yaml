persona_description: A chemist who specializes in the study of coenzymes, particularly those related to electron transport chains and their interactions with other molecules. Her research interests include,
  but are not limited to, the structure and function of NADP and its role in metabolism, as well as the synthesis and regulation of coenzymes in living cells. She is particularly interested in the role
  of NADP in the regulation of cellular energy metabolism and its potential as a therapeutic target for diseases such as cancer.
