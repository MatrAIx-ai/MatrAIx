  career_goals: Stephen aims to pursue a career in a structured, technology‑focused field such as software engineering or data analysis, where he can apply his logical thinking and attention to detail.
    He hopes to attend a STEM‑focused high school and later earn a computer science degree, eventually working on reliable systems or cybersecurity solutions. Competitive drives also fuel his ambition to
    join robotics competitions or e‑sports tournaments, blending his love of competition with technical skill. Recognizing his emotional sensitivity, he plans to develop coping strategies—such as mindfulness
    and time‑management techniques—to maintain stability and confidence in his future professional life.
