personas:
  professional: A budding programmer Stephen White spends after‑school hours writing Python scripts that automate simple tasks, leveraging their love for structure and predictability to create tidy, well‑documented
    code, and they eagerly record each bug fix and new feature in a meticulous journal that doubles as a personal progress tracker.
  sports: An occasional athlete Stephen White spends weekend mornings practicing archery at the community center, follows the New York Knicks for basketball inspiration, cheers for the local junior soccer
    team the Riverside Rangers, and prefers the strategic calm of chess to the noise of large team sports.
  arts: A creative enthusiast Stephen White immerses themselves in the futuristic scores of Daft Punk, collects graphic novels featuring the intricate art of Moebius, and often re‑creates iconic Star Wars
    scenes using LEGO bricks, channeling their love for detail into both visual and auditory realms.
  travel: An inquisitive traveler Stephen White has already explored the Grand Canyon on a family road trip, eagerly anticipates a future visit to the Kennedy Space Center in Florida for a behind‑the‑scenes
    tour, and maintains a scrapbook of postcards from Tokyo, favoring well‑organized itineraries over impromptu adventures.
  culinary: A budding chef Stephen White prefers constructing meals with clear steps, often whipping up homemade macaroni and cheese with sharp cheddar, assembling precise toppings on a personal pizza (pepperoni,
    olives, and pineapple), and experimenting with sushi rolls using sushi rice, nori, and cucumber, all while meticulously measuring each ingredient.
  core: Stephen White is a detail‑driven, anxiety‑prone 12‑year‑old who finds comfort in structured coding, meticulous model building, and strategic games, yet often battles intense emotions that fuel both
    disciplined habits and occasional over‑focus.
background:
  cultural: Stephen is a White American teenager growing up in Jacksonville, Florida. He lives in a middle‑class family that reflects a blend of Southern hospitality and broader U.S. cultural norms, emphasizing
    personal responsibility, punctuality, and privacy. He attends a public middle school and is exposed to the coastal lifestyle of Jacksonville, including local festivals, outdoor activities, and the multicultural
    diversity of the city’s neighborhoods. Media consumption includes mainstream American television, video games, and online tech communities, providing him with a contemporary pop‑culture perspective
    while his family maintains traditional values such as respect for elders and a focus on education.
