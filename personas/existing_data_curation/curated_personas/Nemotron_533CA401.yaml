personas:
  professional: Engels Rosa, a community‑focused culinary and arts facilitator, blends expertise in traditional cooking with a keen eye for street‑art, leveraging basic tech skills to promote pop‑up kitchens
    and informal workshops, yet often wrestles with deadlines due to a spontaneous, low‑structure work style.
  sports: Engels Rosa, an avid participant in local pick‑up basketball games at Miami Gardens, a seasonal fan of the Miami Heat, Inter Miami CF, and the Miami Marlins, and a regular member of a Saturday‑morning
    beach‑side walking club, also treats herb gardening as a low‑intensity cardio routine.
  arts: Engels Rosa, a devoted explorer of Miami's Wynwood street‑art murals and gallery openings, frequently cites artists such as Os Gêmeos, Shepard Fairey, and local muralist Tropic Atlas, while collecting
    vintage postcards and attending live Afro‑Cuban jazz performances by groups like the Buena Vista Social Club tribute band.
  travel: Engels Rosa, an adventurous yet budget‑conscious traveler, prefers weekend escapes to Key West and historic New Orleans for their music scenes, and occasional longer trips to Cartagena and Havana
    to reconnect with familiar rhythms, always planning trips around local festivals and using credit‑card loyalty points to offset costs.
  culinary: Engels Rosa, a self‑taught chef adept at crafting ropa vieja, lechón asado, and arroz con frijoles, loves marinating pork in orange‑garlic Mojo, simmering beans with smoked ham hock, and finishing
    dishes with fresh cilantro, plantains, and pickled onions, while experimenting with herb‑infused sauces harvested from a personal garden.
  core: Engels Rosa, a 45‑year‑old cultural conduit, balances spontaneous pop‑up cooking ventures with a penchant for street‑art pilgrimages, a habit of collecting faded postcards, and a chronic tendency
    to misplace deadlines, all while staying grounded by gardening and rhythmic salsa spins.
background:
  cultural: Engels is a first‑generation Cuban American whose parents emigrated from Havana in the early 1970s. Growing up in Miami Gardens, he was immersed in the rich tapestry of the Cuban diaspora, absorbing
    traditions such as lively music (son, salsa, Afro‑Cuban percussion), communal cooking, Catholic celebrations with subtle Santería influences, and strong family bonds. He actively participates in neighborhood
    festivals like Carnaval de La Habana and Día de la Cultura Cubana, and maintains close ties with extended family across Florida. His bilingual fluency and everyday practices reflect the melding of Cuban
    heritage with the multicultural rhythm of South Florida.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Cuban culinary arts'', ''Amateur painting and sketching'', ''Basic computer and social media use'', ''DIY home repair and woodworking'', ''Facilitating
    small-group community discussions'']'
  hobbies: '[''Visiting art galleries and street murals'', ''Cooking and experimenting with Cuban recipes'', ''Listening to Afro-Cuban music and jazz'', ''Gardening (herbs and tropical plants)'', ''Reading
    Cuban history and biographies'', ''Playing chess'', ''Collecting vintage postcards'', ''Occasional salsa dancing with spouse'']'
  career_goals: Engels dreams of turning his passion for Cuban food and culture into a modest, community‑focused venture. He hopes to launch a pop‑up kitchen or weekend food stall that celebrates authentic
    Cuban street fare while providing a gathering spot for neighbors. Simultaneously, he envisions creating a small cultural studio where he can lead informal art workshops and host micro‑exhibitions for
    local artists. These goals reflect his love of new ideas, his desire for flexible, low‑structure projects, and his commitment to giving back to the Cuban diaspora in Miami Gardens without the pressure
    of a traditional 9‑to‑5 job.
