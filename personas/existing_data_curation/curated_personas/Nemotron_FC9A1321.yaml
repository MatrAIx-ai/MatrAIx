  career_goals: Although retired, Maria remains driven to share knowledge and preserve community memory. She aims to complete a self‑published memoir that intertwines her family’s story with the broader
    history of Peoria and the American Southwest. She also plans to launch a collaborative oral‑history project that records the testimonies of longtime residents, to be housed in the local library’s digital
    archive. Additionally, Maria hopes to mentor a new generation of volunteers by offering a weekly literature discussion series at the senior center, and to serve as an advisory board member for the Peoria
    Historical Society, guiding exhibitions and educational programs.
