persona_description: A Japanese American author who wrote about the experiences of Japanese Americans who resisted the draft during World War II. His novel, "No-No Boy," explores the psychological and emotional
  impact of the war on the characters and the impact of the racial tensions that followed. The author, John Okada, was born in Seattle, Washington, and served in the U.S. Army during World War II. His work
  has been influential in the Asian American literary history and has been rediscovered and celebrated in recent years.
