  hobbies: '[''Sketching and digital illustration'', ''Photography'', ''Listening to diverse music'', ''Reading graphic novels and sci‑fi literature'', ''Playing chess'', ''Cooking Colombian dishes'', ''Volunteering
    at community centers'']'
  career_goals: Josue aspires to turn his passion for visual storytelling into a career as a graphic designer or UI/UX artist, eventually creating inclusive digital experiences for community‑focused organizations.
    He hopes to attend a specialized art or design program after completing his high‑school equivalency, possibly through a community college or mentorship pathway. In the longer term, he envisions combining
    his design talent with his compassionate nature by leading community art workshops, helping other youth express themselves, and perhaps working with non‑profits that use art therapy to promote mental
    well‑being in underserved neighborhoods.
