personas:
  professional: Josue Bonilla is a 16‑year‑old aspiring graphic designer and UI/UX artist who blends Procreate, Photoshop, and introductory Python skills to craft inclusive digital experiences while organizing
    volunteer art workshops at a local community center, and they approach each project with meticulous planning.
  sports: Josue Bonilla enjoys solitary evening jogs through Flushing Meadows, follows the New York Knicks and New York City FC for inspiration, and participates in a weekend community basketball league
    at a local park, preferring low‑key physical activity over competitive sports while they maintain a modest fitness routine.
  arts: Josue Bonilla draws artistic inspiration from the vibrant murals of Diego Rivera, the lyrical storytelling of Carlos Vives's vallenato, indie rock bands like Arctic Monkeys, and graphic novels such
    as 'Saga' and 'Monstress,' channeling these influences into detailed digital illustrations, street photography of Queens, and occasional chess‑themed sketch series, and they seamlessly integrate these
    influences into their evolving portfolio.
  travel: Josue Bonilla plans trips with a mix of curiosity and budget awareness, having explored family visits to Cartagena and a school excursion to Washington, D.C., while dreaming of a solo backpacking
    adventure through Japan's anime hotspots and a summer trek to the Grand Canyon, and they often budget carefully to make these trips possible.
  culinary: Josue Bonilla delights in preparing homemade arepas and empanadas with cheese and shredded meat, experiments with avocado‑lime salsa and panela cheese, and balances these family‑rooted dishes
    with a love for New York‑style pizza, sushi rolls, and occasional late‑night ramen bowls, while they often share meals with friends to showcase new flavor combos.
  core: Josue Bonilla is a curiosity‑driven, methodical teen who channels solitary creativity into digital art, saves dutifully for tech upgrades, occasionally skips sleep for projects, and they quietly
    champion community art mentorship.
background:
  cultural: Josue is the son of Colombian immigrants who settled in Queens, giving him a bicultural upbringing that blends Colombian traditions with the multicultural fabric of New York City. At home, Spanish
    is spoken daily, and family celebrations often feature Colombian food, music, and customs such as Día de la Independencia and Carnaval. He grew up attending a local Catholic church and participating
    in community events in Jackson Heights, where many Latin American families gather. This heritage nurtured his love for rhythmic music, vibrant colors, and storytelling, which he now expresses through
    his art. At the same time, his life in Rego Park exposed him to diverse artistic scenes, public libraries, and museums, shaping a worldview that values both his roots and the broader cultural mosaic
    of his neighborhood.
attributes:
  skills: '[''Bilingual Spanish/English communication'', ''Digital illustration (Procreate, Photoshop)'', ''Basic graphic design principles'', ''Photography composition and editing'', ''Introductory coding
