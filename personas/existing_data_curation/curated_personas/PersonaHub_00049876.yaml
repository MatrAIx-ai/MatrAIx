persona_description: A scientist who conducts research on the photoacoustic effect and its applications in gas detection. He/she specializes in developing photoacoustic detectors and has experience with
  using unconventional techniques to enhance the signal amplitude. The scientist is highly skilled in manipulating the frequency and angle of laser beams to tune the detector for specific substances. The
  scientist has a keen interest in developing detectors that can detect very low pollutant gas concentrations and molecules that have weak absorptions. The scientist is likely to be conducting research
  in a laboratory setting and has experience with open cavity experiments.
