personas:
  professional: A high‑school varsity soccer captain with a talent for debate, Janice Parker leverages her first‑aid certification, organizational acumen, and passion for animal care to lead school projects
    and plans a scholarship path toward veterinary technology or environmental science.
  sports: A varsity soccer captain for the River Valley High Raiders, Janice Parker rides weekly at Ridgeview Equestrian Center, hikes Badger Hills with her friends, and avidly follows the Midwest Wolves
    football team and the Chicago Cubs, embodying a competitive yet team‑oriented athletic spirit.
  arts: An acoustic‑guitar enthusiast, Janice Parker strums John Mayer and Ed Sheeran melodies after school, devours mystery novels by Agatha Christie and Gillian Flynn, and attends performances at the
    local Grand Stage theater featuring contemporary playwrights.
  travel: Janice Parker has trekked the Grand Canyon and explored Yellowstone National Park on school trips, dreams of volunteering at a wildlife sanctuary in the Galápagos Islands, and plans a spring break
    road‑trip to Colorado’s Rocky Mountain National Park with her soccer teammates.
  culinary: A budding farm‑to‑table cook, Janice Parker favors grilled chicken with roasted root vegetables, spicy black‑bean tacos, and homemade apple crumble, often sourcing ingredients from the family
    ranch’s garden and experimenting with fresh rosemary and thyme.
  core: Janice Parker blends structured ambition with outgoing energy, excelling in varsity soccer and debate while nurturing a love for animals, strategic chess, and guitar, all aimed at a future as a
    community‑focused veterinary technologist.
background:
  cultural: Raised in Cut Bank, Montana, Janice's upbringing is rooted in a close‑knit, rural community where self‑reliance, hard work, and neighborly support are valued. The town's rhythm is shaped by
    agricultural cycles, the annual county fair, and seasonal outdoor activities such as hunting, fishing, and rodeos. This western frontier culture, combined with a mainstream American middle‑class background,
    fosters her practical mindset, love of the outdoors, and sense of responsibility toward family and community.
