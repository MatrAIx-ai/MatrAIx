  hobbies: '[''Soccer (varsity)'', ''Debate club'', ''Horseback riding'', ''Hiking'', ''Volunteering at animal shelter'', ''Playing acoustic guitar'', ''Reading mystery novels'', ''Chess tournaments'']'
  career_goals: Janice aims to secure a scholarship to study veterinary technology or environmental science at a university, hoping to combine her love for animals with a science‑based career in her rural
    community. In the short term, she plans to earn a Certified Nursing Assistant credential to gain hands‑on healthcare experience. Ultimately, she envisions launching a youth outreach program that promotes
    sustainable farming practices and outdoor stewardship, positioning herself as a community leader.
