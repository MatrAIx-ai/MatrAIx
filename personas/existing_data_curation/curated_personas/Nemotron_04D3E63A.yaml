  career_goals: Looking ahead, Nathalia aims to move into an office‑manager or operations‑director role within the next five years, where she can lead larger teams and shape organizational strategy. She
    plans to earn a Certified Administrative Professional (CAP) credential and may pursue a part‑time MBA to deepen her management expertise. Improving her project‑management and data‑analysis skills is
    a priority, as is developing mentorship programs for entry‑level administrative staff. Balancing career advancement with family life, she also hopes to launch a community workshop that shares Puerto
    Rican culinary traditions with the Worcester community.
