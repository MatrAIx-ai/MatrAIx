personas:
  professional: Bryanna Gorter is a proactive operations leader who leverages their expertise in project planning, budget management, and Power BI analytics to drive process efficiencies, while mentoring
    emerging women leaders and charting a path toward a Regional Director of Operations role.
  sports: Bryanna Gorter commits to a weekly schedule of group fitness classes, hikes the Clinton Lake trail with friends, plays third‑base for the Mid‑West Blazers adult softball league, and avidly follows
    the Kansas City Chiefs and Royals, using a fitness tracker to log workouts and set performance goals.
  arts: Bryanna Gorter cultivates a love of mystery novels—from Agatha Christie to Tana French—attends Kansas City jazz nights featuring the Blue Room, enjoys seasonal community theater productions like
    ‘The Glass Menagerie,’ and regularly supports local art fairs that showcase folk crafts.
  travel: Bryanna Gorter designs weekend getaways with detailed itineraries, favoring road trips to Chicago’s museums, a stroll through St. Louis’ Gateway Arch park, and annual family camping in the Great
    Smoky Mountains, while dreaming of a summer music pilgrimage to New Orleans’ French Quarter.
  culinary: Bryanna Gorter experiments in cooking classes, perfecting herb‑infused roast chicken, German potato salad, and Irish stew, frequently harvests kale and heirloom tomatoes from their garden for
    fresh salads, and relishes Kansas City’s signature burnt‑end ribs on special occasions.
  core: Bryanna Gorter blends meticulous operational leadership with a vibrant social streak, balancing disciplined budgeting and health routines with community‑focused volunteerism and a penchant for organized
    fun.
background:
  cultural: Bryanna was raised in a middle‑class, white family in the Olathe suburb of Kansas, with German and Irish ancestry. Her upbringing emphasized Midwestern values such as hard work, practicality,
    and community involvement, reinforced by regular participation in church and local civic events. She grew up attending community festivals, county fairs, and family gatherings that celebrated seasonal
    traditions, which fostered her sociable nature and appreciation for structured, collaborative activities. While she identifies with mainstream American culture, she also values the diversity of perspectives
    present in Johnson County’s growing metropolitan environment.
