  hobbies: '["Street-photography", "Visiting art galleries and murals", "Cooking Afro-Caribbean & Southern cuisine", "Beach running", "Pickup basketball", "Mentoring youth entrepreneurs", "Reading business
    innovation literature", "Listening to jazz and R&B", "Guided meditation"]'
  career_goals: Larry aims to move into a sales management role within the next two years, leading a team of representatives and designing data-driven sales strategies for his company. Over the next five
    to seven years, he aspires to become a regional director overseeing the Southeast United States, championing the integration of sustainable manufacturing practices and innovative digital sales tools.
    Ultimately, he envisions launching his own consulting firm that helps minority-owned businesses scale their wholesale operations while fostering inclusive, creative sales cultures.
