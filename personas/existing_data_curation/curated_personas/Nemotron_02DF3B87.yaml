personas:
  professional: Professional sales specialist Larry Johnson leverages strategic data analysis, bilingual communication, and a calm, collaborative negotiating style to nurture long‑term B2B wholesale partnerships,
    while they eye a sales‑management role that will let them mentor a team and champion sustainable manufacturing initiatives.
  sports: Athletically inclined Larry Johnson hits the sand for sunrise runs along South Beach, joins a local pickup basketball league that cheers on the Miami Heat, follows the Miami Marlins and Inter
    Miami CF for a balanced mix of basketball, baseball, and soccer, and they treat each weekend as a chance to blend cardio, competition, and community.
  arts: Culture‑enthusiast Larry Johnson frequents Wynwood Walls, captures vibrant murals with street‑photography, curates an Instagram feed inspired by jazz legends like Kamasi Washington and R&B icons
    such as Erykah Badu, attends gallery openings spotlighting contemporary Caribbean‑influenced artists, and they share their visual discoveries with friends during weekly art‑themed meetups.
  travel: Adventure‑seeking Larry Johnson plans weekend getaways to the Everglades and Key West with a focus on nature and culture, dreams of a summer itinerary through Jamaica’s reggae festivals and Barcelona’s
    street‑art districts, and they balance their wanderlust with a modest travel budget that prioritizes off‑peak flights and shared accommodations.
  culinary: Food‑lover Larry Johnson blends Afro‑Caribbean flavors—jerk chicken with scotch bonnet peppers, collard greens simmered in smoked paprika, sweet‑potato pie—and experiments with homemade plantain
    chips, often hosting pot‑luck gatherings where friends sample their latest mash‑up, and they view cooking as a communal celebration of heritage and creativity.
  core: Calm, creative, and community‑focused, Larry Johnson channels their love of music, street art, and collaborative sales into a disciplined yet adaptable lifestyle, and they balance ambitious career
    goals with a deep commitment to mentoring and cultural celebration.
background:
  cultural: Larry identifies as African American with strong ties to Miami’s vibrant Black and Caribbean diaspora communities. Growing up in a multicultural neighborhood, he was immersed in a blend of Southern
    U.S. traditions, Afro-Caribbean music, and the bilingual environment of South Florida. Family and church have been central to his upbringing, reinforcing values of community, resilience, and cooperative
    spirit. His cultural heritage informs his appreciation for rhythmic art forms, communal gatherings, and a collaborative approach to both personal relationships and professional negotiations.
attributes:
  skills: '["B2B sales negotiation", "Customer relationship management (CRM) software proficiency", "Market research and data analysis", "Strategic account planning", "Cross-cultural communication", "Creative
