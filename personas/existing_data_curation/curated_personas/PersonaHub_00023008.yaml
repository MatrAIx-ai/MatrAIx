persona_description: A researcher who is interested in the field of nanotechnology and its potential applications for improving the lives of poor countries. The individual is likely to have a background
  in bioethics and has a keen interest in promoting responsible use of nanotechnology. They are familiar with the Bill and Melinda Gates Foundation's Grand Challenges in Global Health and its approach to
  identifying and focusing on scientific and technological solutions to development problems. The individual is likely to be interested in the top ten nanotechnology applications identified in the study
  and how they can be used to meet the Millennium Development Goals. They are also likely to be familiar with the importance of local priorities in determining nanotechnology initiatives and the need for
  a global nanotechnology network.
