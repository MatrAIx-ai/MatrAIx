  career_goals: Malaya aims to leverage her organizational talent and sociable nature into a career in community development or nonprofit management, where she can orchestrate programs that benefit her
    hometown of Longview. In the next three to five years, she plans to pursue a bachelor's degree in Public Administration while gaining hands‑on experience as a project coordinator or outreach assistant.
    Long‑term, she envisions leading a regional nonprofit or a municipal initiative that promotes youth empowerment and local economic growth, combining her practical curiosity with a desire to make measurable
    impact.
