  hobbies: '[''Reading (literary fiction)'',''Journaling'',''Knitting'',''Gardening'',''Puzzle solving (crosswords, Sudoku)'',''Yoga and meditation'',''Cooking (baking recipes)'',''Running (local trails)'',''Volunteer
    work at the community library'']'
  career_goals: Bambi aims to progress from her current secretary role to an office manager position within the next three to five years. She plans to earn a Certified Administrative Professional (CAP)
    credential and, if possible, pursue a part-time MBA with a focus on nonprofit management to broaden her strategic skill set. Her long-term ambition is to lead a well-organized administrative team in
    a midsized nonprofit or community organization, where she can apply her structured approach while fostering a supportive workplace culture.
