  hobbies: '[''Reading science fiction and non-fiction'', ''Building LEGO models'', ''Coding simple games in Scratch'', ''Gardening and composting'', ''Baking treats for classmates'', ''Keeping a personal
    journal'', ''Participating in school science club'', ''Playing soccer'', ''Organizing classroom projects'', ''Sketching and watercolor painting'']'
  career_goals: Kaylyn dreams of becoming a pediatric researcher‑physician, a career that would let her blend her love of science with her deep desire to help children. She aims to excel in high school
    STEM courses, win science fair awards, and volunteer at the local children's hospital to gain practical experience. In the long term she envisions earning a medical degree, conducting research on childhood
    illnesses, and later establishing community health outreach programs in her hometown to ensure all kids have access to quality care.
