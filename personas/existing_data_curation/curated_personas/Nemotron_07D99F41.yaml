  career_goals: Carlos aims to advance to a senior director position overseeing multiple facilities, where he can implement enterprise‑wide efficiency initiatives and mentor emerging managers. He plans
    to obtain a Project Management Professional (PMP) certification to formalize his project‑leadership expertise. In the longer term, he envisions launching a consulting practice that helps small‑to‑mid‑size
    businesses in the Houston area streamline operations while preserving a people‑first culture. Throughout his career progression, he remains committed to maintaining a balanced family life and contributing
    to community programs that support workforce development.
