persona_description: Enoch Henry Crowder was a highly respected and influential figure in the history of the United States Army, known for his service as Judge Advocate General and Provost Marshal General
  during World War I and the drafting of the Selective Service Act in 1917. He was a perceptive critic of the military justice system and his efforts to reform it are reflected in the specific recommendations
  he submitted to Congress. Crowder was also a lawyer and served as the first Ambassador to Cuba, a post he held until 1927. He was a member of the American Bar Association and the American Society of Military
  Attorneys, and was awarded numerous honors and decorations for his service to his country.
