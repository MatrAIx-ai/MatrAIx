persona_description: A scientist or researcher with expertise in honeybees, parasitology, or entomology. They are likely to be interested in the latest research findings and developments in the field, and
  may have experience working with honeybees or other insects. They may have a background in biology, entomology, or a related field, and may have published research papers or articles in scientific journals.
  They may be involved in the study of colony collapse disorder, a mysterious affliction that has wiped out hives nationwide, and may have expertise in viruses, mites, improper nutrition, and pesticides.
  They may be profiled in the media or have been interviewed by The Oregonian in 2010.
