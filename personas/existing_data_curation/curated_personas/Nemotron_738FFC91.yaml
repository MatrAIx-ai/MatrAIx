  career_goals: Although retired, Kenson is determined to leave a lasting legacy. He aims to mentor his grandchildren and other local youth in practical trades, compile a handwritten memoir of his family’s
    history and the Pearl community, and secure a small scholarship for a local high‑school student interested in vocational skills. He also strives to maintain his health through regular walking and to
    reduce stress by establishing a weekly routine of meditation and community service.
