  hobbies: '[''Community Theater Acting and Production'', ''Garden Club Membership'', ''Group Yoga and Water Aerobics Classes'', ''Road Trip Travel to Historic Coastal Towns'', ''Volunteer Work at Local
    Food Bank'', ''Homeowners Association Board Service'', ''Book Club Participation'']'
  career_goals: Cinda aims to step into a regional facilities director role within the next five years, overseeing multiple sites across Long Island and eventually the greater New York metropolitan area.
    She is pursuing the Certified Facility Manager (CFM) credential to solidify her professional standing. Her long‑term ambition is to spearhead a company‑wide sustainability program that reduces energy
    consumption by at least 20% while enhancing occupant well‑being. She also hopes to mentor younger facility professionals, creating a supportive network that values collaboration over rigid hierarchy.
