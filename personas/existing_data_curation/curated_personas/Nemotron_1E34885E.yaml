  career_goals: Lydia dreams of turning her imagination into a career where she can inspire others. She hopes to become a children's author and illustrator, creating picture books that blend art and storytelling,
    or to explore the cosmos as an astronaut who can share the wonder of space with kids. She also envisions a future as a science educator, using hands-on experiments to spark curiosity in her community.
