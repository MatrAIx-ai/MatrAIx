personas:
  professional: Lydia Caines, a budding technologist, blends her love for epic fantasy stories with emerging coding skills, crafting whimsical Scratch games that echo the adventures she reads while channeling
    her organized curiosity into meticulously engineered LEGO creations that hint at future engineering aspirations.
  sports: Lydia Caines, an enthusiastic member of the River Valley Rovers youth soccer club and a regular participant in her school's hip-hop dance class, cheers for the hometown Hawks baseball team, and
    spends weekends at the neighborhood park climbing ropes, practicing cartwheels, and launching a homemade kite during breezy afternoons.
  arts: Lydia Caines, an avid storyteller, sketches scenes inspired by J.K. Rowling's wizarding world and Studio Ghibli's animated landscapes, paints dreamy watercolors of constellations, performs in her
    school drama club's productions of Peter Pan, and strums the ukulele to the tunes of Taylor Swift and the Beatles during after-school jam sessions.
  travel: Lydia Caines, who maps out backyard stargazing nights with her family's telescope, dreams of camping under the Milky Way in the Grand Canyon, has already taken a family trip to Disneyland in California
    to explore the castle's magical architecture, and prefers day-trip adventures to the local county fair for cotton candy and carousel rides.
  culinary: Lydia Caines, a budding home-chef, loves making cheesy macaroni with crisp breadcrumbs, enjoys assembling fresh strawberry-banana smoothies with honey, and enthusiastically helps her parents
    knead pizza dough topped with pepperoni and mozzarella, though she sometimes forgets to wash her hands before cooking.
  core: Lydia Caines, a wildly imaginative nine-year-old with a penchant for epic stories, endless LEGO towers, and a quiet anxiety that fuels her drive to create order in chaos.
background:
  cultural: Lydia is a Black child growing up in Warner Robins, Georgia, a city with a strong Southern and military presence. Her family celebrates African-American traditions, such as gospel music, soulful
    storytelling, and community gatherings at the local church. She enjoys Southern comfort foods like collard greens and cornbread, and her upbringing blends the rich heritage of Black culture with the
    supportive, close-knit neighborhood atmosphere of Jones County. The influence of nearby Robins Air Force Base adds a sense of pride in service and diversity, shaping her respect for teamwork and discipline.
