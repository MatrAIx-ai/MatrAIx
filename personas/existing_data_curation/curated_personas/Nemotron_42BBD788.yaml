personas:
  professional: Adrienne Dalgetty, a 63‑year‑old public librarian with a graduate background, leverages her curiosity, meticulous skepticism, and competitive grant‑writing drive to turn a rural library
    into a cultural hub that blends literacy, art exhibitions, and mental‑wellness programming, even while they sometimes let a relaxed, disorganized work style leave filing cabinets in creative chaos.
  sports: Adrienne Dalgetty, an avid birdwatcher and occasional hiker, follows the Montana Grizzlies basketball team, participates in a local senior walking club that meets at Yellowstone National Park
    during summer, and prefers low‑impact activities like Nordic walking over competitive sports, though they occasionally challenge younger members to a chess‑themed scavenger hunt at the community center.
  arts: Adrienne Dalgetty, a devoted reader of contemporary art monographs and poetry, finds inspiration in the works of Yayoi Kusama, Mark Rothko, and poet Mary Oliver, curates rotating gallery exhibitions
    at the library featuring local Indigenous and settler artists, and they attend the annual Missoula Symphony performances whenever they can fit it into their schedule.
  travel: Adrienne Dalgetty, who favors thoughtfully planned yet flexible trips, has photographed the glaciers of Glacier National Park, explored the historic streets of Edinburgh during a literary festival,
    dreams of photographing the aurora borealis in Iceland, and they prefer road‑trips that allow spontaneous stops for birdwatching and local cuisine.
  culinary: Adrienne Dalgetty, an enthusiastic home chef, blends their love for global flavors with Montana staples, mastering dishes like Moroccan tagine with bison, Indian vegetable biryani featuring
    local heirloom carrots, and a signature lavender‑infused honey glaze for roasted trout, while they use knitting sessions as informal recipe testing labs.
  core: Adrienne Dalgetty, a curious yet worry‑prone librarian, channels their competitive edge into grant writing, balances solitary photography with community chess, and they occasionally let disorganization
    hijack their meticulous research instincts.
background:
  cultural: Adrienne grew up on a family farm in the Midwestern United States, inheriting a cultural identity rooted in self‑reliance, modesty, and a deep appreciation for community gatherings. Of German
    and Irish ancestry, she carries forward familial traditions of storytelling and folk music while also cherishing the wide‑open spaces that defined her upbringing. Relocating to Charlo, Montana in her
    thirties, she embraced the region’s rugged natural beauty and the cultural tapestry of the Flathead and Kootenai peoples, learning to respectfully incorporate indigenous perspectives into her library
    programming. Her lifelong participation in a small Methodist congregation reinforced values of service and stewardship, which continue to shape her dedication to educational equity and cultural preservation.
attributes:
  skills: '[''Library cataloging and classification'', ''Reference and research assistance'', ''Information literacy instruction for adult learners'', ''Digital archiving and metadata creation'', ''Grant
    writing and fundraising'', ''Community outreach and partnership development'', ''Art exhibition coordination and local artist liaison'', ''Curriculum development for lifelong learning workshops'', ''Public
    speaking and presentation skills'', ''Genealogy and local history research support'']'
  hobbies: '[''Landscape photography'', ''Birdwatching'', ''Reading contemporary art and poetry'', ''Visiting galleries and community theater'', ''Knitting and textile crafts'', ''Cooking experimental global
    recipes'', ''Playing chess'', ''Volunteering at the local historical society'', ''Gardening native perennials'', ''Participating in book clubs'']'
  career_goals: Adrienne aims to transform her small‑town library into a cultural hub that blends traditional literacy services with vibrant art programming and mental‑wellness initiatives. She aspires
    to lead a regional consortium of rural libraries, sharing best practices for digital preservation and grant acquisition, and hopes to publish a practical guide on integrating community art projects
    into library services. In the next five years, she wants to secure a multi‑year endowment that sustains free mental‑health workshops for seniors, while mentoring emerging librarians to continue her
    legacy of curiosity‑driven, community‑focused service.
