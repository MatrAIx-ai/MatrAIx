  career_goals: Joaquin aims to move from purchasing agent to procurement manager within the next three years, targeting a senior director role that oversees regional supply‑chain strategy. He plans to
    earn professional certifications such as CPSM and CPIM, and to champion a sustainability program that reduces vendor carbon footprints. Long‑term, he envisions launching a boutique consulting firm that
    helps small Texas manufacturers adopt AI‑driven sourcing tools, while also mentoring young Black professionals interested in supply‑chain careers.
