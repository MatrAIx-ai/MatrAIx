personas:
  professional: Hannah Roberts, an ambitious administrative professional with a STEM background, leverages their meticulous organization, data‑analysis expertise in Python and Excel, and basic graphic‑design
    skills in Photoshop and Canva to streamline office workflows, craft polished presentations, and support marketing initiatives, positioning themselves for a transition to office manager and eventually
    an operations analyst role after earning a PMP certification.
  sports: Hannah Roberts, an enthusiastic cyclist, rides with the Cape May Community Bike Club each Saturday, follows the Philadelphia Eagles and Phillies avidly, and incorporates quick HIIT sessions and
    weekend hikes into their routine to counteract the stress of a socially‑rich lifestyle while staying fit and energized.
  arts: Hannah Roberts, a visual storyteller, paints whimsical landscapes inspired by Georgia O’Keeffe, sketches characters for speculative short stories, experiments with analog photography reminiscent
    of Diane Arbus, and participates in improv theater where they channel the comedic timing of Tina Fey, while sharing their creations on Instagram using Canva‑crafted designs.
  travel: Hannah Roberts, a budget‑conscious explorer, meticulously plans road trips along the Atlantic coast, has visited historic Williamsburg, the vibrant streets of Montreal, and the serene Blue Ridge
    Mountains of Asheville, and prefers off‑peak travel to maximize experiences while staying within a modest travel fund.
  culinary: Hannah Roberts, a culinary experimenter, grows rosemary, thyme, and basil in a balcony herb garden and uses them to craft fresh pesto, loves whipping up lemon‑herb roasted chicken with quinoa,
    and occasionally indulges in homemade sushi rolls after a night of board‑game marathons.
  core: Hannah Roberts blends analytical rigor with vivid imagination, turning stress‑induced worry into creative output while juggling disciplined budgeting, a love for cycling, and a penchant for spontaneous
    art projects.
background:
  cultural: Hannah grew up in a middle‑class, white Anglo‑American family in the Mid‑Atlantic region. Living in Marmora, New Jersey, she is deeply connected to the coastal lifestyle of Cape May County—enjoying
    beach outings, seasonal fairs, and community gatherings that celebrate local maritime heritage. Her upbringing emphasized hard work, education, and community service, values reflected in her involvement
    with local volunteer initiatives and family‑centered traditions. While rooted in mainstream American customs—celebrating holidays like Thanksgiving and the Fourth of July—she also embraces the region’s
    growing cultural diversity, often exploring ethnic cuisines at local festivals and incorporating inclusive perspectives into her social circles.
