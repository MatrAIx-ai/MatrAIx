  career_goals: Hannah aims to transition from an administrative assistant to an office manager within the next three years, using her organizational strengths and tech savviness to streamline office workflows.
    She plans to earn a Project Management Professional (PMP) certification and deepen her data‑analysis expertise through an advanced Python or R course, positioning herself for a future role as an operations
    analyst or product operations specialist at a tech‑focused company. Long‑term, she envisions leading a cross‑functional team that integrates innovative digital tools with creative process improvements,
    while also mentoring junior staff and championing workplace well‑being initiatives to mitigate stress for herself and her colleagues.
