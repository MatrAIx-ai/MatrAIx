  career_goals: Yafreisy plans to earn her Certified Public Accountant (CPA) credential within the next three years, positioning herself for a senior auditor role at a regional firm. She aspires to later
    launch a boutique accounting consultancy that specializes in serving small Hispanic‑owned businesses, incorporating sustainability reporting and technology‑driven solutions. Mentoring younger accountants—particularly
    women and members of underrepresented groups—is also a core ambition, as she wishes to foster a supportive professional community while continuing her own lifelong learning.
