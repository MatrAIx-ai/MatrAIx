persona_description: A compliance officer who works for a financial institution, responsible for ensuring the compliance of the institution with anti-money laundering (AML) rules and regulations. The compliance
  officer must oversee the implementation of a robust AML compliance program, including conducting ongoing customer due diligence, conducting risk-based procedures for conducting ongoing customer monitoring,
  and ensuring that the institution is aware of suspicious activity. The compliance officer must also be knowledgeable about the framework set by the Financial Action Task Force (FATF) and the EU's Anti-money
  Laundering Directive (AMLD), as well as the key factors in AML banking, such as identity checks, AML holding periods, and AML transaction monitoring software. The compliance officer must be trained in
  anti-money laundering techniques and must report suspicious activity to the appropriate authorities.
