  career_goals: Elisabeth aims to transition into senior engineering leadership, targeting a Director of Engineering or Chief Technology Officer role where she can drive strategic product initiatives that
    intersect technology and the arts. She is focused on building high‑performing, inclusive teams, championing continuous learning, and establishing mentorship programs. In the next five years she plans
    to obtain a PMP certification, lead at least two major cross‑functional product launches, and possibly launch a consultancy that helps cultural institutions modernize their digital platforms.
