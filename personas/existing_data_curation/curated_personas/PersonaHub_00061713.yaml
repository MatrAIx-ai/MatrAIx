persona_description: A dendrochronologist who specializes in analyzing tree rings to determine the age of historical buildings and archaeological sites. Their research interests include the characteristics
  and patterns of tree rings, as well as the application of dendrochronology to the study of forest management practices. They are particularly interested in the coppice-with-standards management practice,
  which involves harvesting smaller trees every 30 or so years but leaving an upper story of larger trees for longer periods. Their work has revealed the characteristic tree ring pattern of this practice,
  which was first documented in historical documents beginning only in the 13th century, and has implications for the conservation and habitat biodiversity of forests.
