  career_goals: Heather aims to advance to a senior property management role, eventually overseeing a multi‑million‑dollar portfolio or becoming a director of community association services. She plans to
    obtain professional certifications such as the Certified Manager of Community Associations (CMCA) and the Certified Property Manager (CPM) to solidify her expertise. Long‑term, she envisions starting
    her own boutique property management firm that emphasizes resident well‑being and sustainable practices. She also wants to complete her GED and pursue continuing education courses to broaden her strategic
    leadership abilities while maintaining a healthier work‑life balance to mitigate stress.
