  hobbies: '[''Gardening (herbs and vegetables)'', ''Cooking traditional Mexican dishes'', ''Knitting and crocheting'', ''Listening to mariachi and folklorico music'', ''Reading historical fiction'', ''Walking
    in local parks'', ''Participating in small community gatherings'', ''Creating Día de los Muertos altars'', ''Volunteer work at senior center'']'
  career_goals: Maria aims to turn her passion for Mexican culinary traditions into a modest home-based venture, selling homemade tamales, mole sauces, and preserved salsas at local farmers' markets. She
    also wants to teach weekend cooking workshops at the senior center, passing on family recipes to younger generations. Beyond food, Maria hopes to mentor community volunteers, especially women of her
    cultural background, helping them develop organizing and budgeting skills. In the longer term, she dreams of compiling a family cookbook and memoir that documents her heritage and the stories of her
    Los Angeles neighborhood.
