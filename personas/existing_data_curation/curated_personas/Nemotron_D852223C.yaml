personas:
  professional: Misty Fedak, a budding junior coder who creates simple games on ScratchJr, they keep their code blocks meticulously organized and delight in experimenting with unconventional story twists,
    reflecting a curious yet balanced approach to early tech exploration.
  sports: Misty Fedak, a budding soccer enthusiast who plays for the Little Lions Youth Soccer Club, watches the NBA's Los Angeles Lakers games with family, and attends swimming lessons at the community
    pool twice a week, they balance structured practice with spontaneous backyard tag games.
  arts: Misty Fedak, an imaginative art lover who spends weekend afternoons watercolor painting, is fascinated by Dr. Seuss’s whimsical illustrations, sings along to Kidz Bop’s upbeat covers of pop songs,
    and enjoys Disney’s Mickey Mouse cartoons and the musical storytelling of Pixar’s 'Soul', they let their curiosity shape a vibrant creative world.
  travel: Misty Fedak, an adventurous little traveler who fondly recalls a family road‑trip to the Grand Canyon, dreams of spotting dinosaur fossils on the Jurassic Coast in England, and has a growing wish
    list that includes a magical stay at Disneyland Paris next summer, they eagerly plan future explorations with a scrapbook of imagined postcards.
  culinary: Misty Fedak, a self‑proclaimed pizza connoisseur who savors pepperoni pizza, crunchy chicken nuggets with ketchup, creamy mac and cheese with extra cheddar, and snack‑time treats of sliced strawberries,
    apple slices, and occasional gummy bears, they proudly help stir batter for pancake mornings.
  core: Misty Fedak, a bright‑eyed five‑year‑old whose boundless curiosity, love for tidy crayons, and spontaneous sweet cravings often clash, leading them to occasional cookie‑stashing mischief, they also
    maintain a disciplined habit of putting coins in their piggy bank.
background:
  cultural: Misty is raised in a suburban neighborhood of Loveland, Colorado, within a family that values both community involvement and outdoor recreation. The local culture emphasizes participation in
    seasonal festivals, such as the Colorado State Fair and holiday parades, and encourages activities like hiking, visiting local parks, and exploring the nearby Rocky Mountain foothills. Her family partakes
    in community events at the public library, art classes, and neighborhood playgroups, reflecting a mainstream American middle‑class upbringing with a strong appreciation for the natural landscape and
    local arts scene. This environment blends broader American cultural traditions of school‑based learning, family celebrations, and a regional emphasis on the outdoors.
