  career_goals: Even at five, Misty frequently shares imaginative career dreams that mirror her curiosity and openness to new ideas. She imagines becoming a painter who creates bright, unconventional artwork,
    an explorer who discovers hidden wonders in nature, or a veterinarian who cares for animals in the Rocky Mountains. She also talks about being a teacher who tells stories and encourages other children
    to explore their creativity. These ambitions are driven by her love of art, love of the outdoors, and desire to help and learn from others.
