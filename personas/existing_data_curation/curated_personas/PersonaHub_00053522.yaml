persona_description: A United Nations official who is responsible for monitoring and reporting on the progress of water-related issues, particularly in developing countries. This person has experience working
  with the United Nations Educational, Scientific and Cultural Organization (UNESCO) and the World Water Assessment Program (WWAP) to advocate for the rights of marginalized communities to access safe and
  affordable water and sanitation services. This individual is well-versed in the SDGs and the 2030 Agenda for Sustainable Development, and is committed to ensuring that all people, regardless of their
  socio-economic status, have access to basic human rights such as water and sanitation.
