personas:
  professional: Amy Sumpter, a 40‑year‑old registered nurse on a busy med‑surg unit, leverages her precise medication administration, IV management, and infection‑control expertise to drive quality‑improvement
    projects, while her love of routine coexists with a relaxed attitude toward shift scheduling, prompting her to occasionally let paperwork pile up but still mentor staff with a competitive edge toward
    measurable outcomes.
  sports: Amy Sumpter is an active member of the Lake County Trail Club, hiking the Black Bear Wilderness Trail twice monthly, complements her routine with weekly Vinyasa yoga classes, avidly follows the
    Tampa Bay Buccaneers in the NFL and the Orlando Magic in the NBA, and occasionally joins a community softball league for social exercise, balancing structured fitness with casual team spirit.
  arts: Amy Sumpter spends evenings knitting scarves while listening to Gillian Welch’s folk‑rock, loses herself in Agatha Christie mysteries and Hilary Mantel’s historical novels, and regularly attends
    productions at the Lake County Community Theatre, such as a recent staging of "The Glass Menagerie" starring local actress Jenna Torres, weaving literary and performing arts into her personal identity.
  travel: Amy Sumpter favors low‑key, self‑planned road trips—most recently a week‑long drive along the Florida Keys and a weekend escape to St. Augustine’s historic district—while dreaming of a springtime
    vineyard tour in Tuscany to study Mediterranean flora, balancing her penchant for routine itineraries with occasional spur‑of‑the‑moment detours.
  culinary: Amy Sumpter, an avid home gardener, crafts modest yet flavorful meals such as citrus‑infused shrimp scampi with fresh basil from her garden, hearty Cuban black bean soup seasoned with oregano,
    and classic Key lime pie topped with whipped cream, showcasing her intermediate cooking skills and a deep appreciation for ingredient provenance.
  core: Amy Sumpter blends a love for routine with a laid‑back streak, channeling her competitive nursing drive into community health while occasionally letting personal organization slip, and finds balance
    in gardening, knitting, and mystery novels.
background:
  cultural: Amy was raised in a middle‑class, predominantly white suburb of the Midwest, where traditional values, self‑reliance, and community involvement were emphasized. After moving to Mount Dora, Florida
    in her late twenties, she adopted the region's outdoor‑centric lifestyle and participated in local festivals, church activities, and civic groups. Her cultural identity blends Midwestern practicality
    with Central Florida's appreciation for nature, communal events, and a relaxed pace, while maintaining a secular outlook that respects diverse perspectives.
attributes:
  skills: '[''IV therapy'', ''Medication administration'', ''Patient assessments'', ''Wound care'', ''Infection control'', ''Electronic health record (EHR) documentation'', ''Patient education'', ''Triage
    in emergency settings'', ''Clinical mentorship'', ''Basic cardiac life support (BCLS)'']'
  hobbies: '[''Gardening'', ''Reading mystery novels'', ''Yoga'', ''Hiking on local trails'', ''Knitting'', ''DIY home projects'', ''Volunteering at community health fairs'']'
  career_goals: Amy aims to translate her years of bedside experience into a leadership position within her health system. Over the next three to five years she plans to earn a certification in nursing
    management and pursue a part‑time RN‑BSN to DNP pathway, positioning herself for a charge‑nurse or unit‑manager role on a med‑surg floor. She also seeks to develop a specialty in infection control and
    spearhead quality‑improvement projects that standardize patient‑care protocols, aligning with her preference for routine, measurable outcomes and her competitive drive for excellence.
