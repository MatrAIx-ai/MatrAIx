  and analyzing data on the representation of different groups in science and engineering education and employment. They would have a deep understanding of the historical and current trends in participation
  in these fields, as well as the factors that influence these trends. They would also be familiar with the specific data sources used in this report and the methodology used to collect and analyze the
  data.
