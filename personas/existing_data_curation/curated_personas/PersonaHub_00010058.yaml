persona_description: A scientist and researcher who specializes in the study of marine geology and coastal circulation, particularly in the context of coral reef settings. This person is likely to be involved
  in ongoing process studies being conducted as part of the USGS Coastal and Marine Geology Program's Pacific Coral Reef Project. The person is interested in collecting high-resolution measurements of waves,
  currents, water levels, temperature, salinity, and turbidity in Hanalei Bay, northern Kauai, Hawaii, to better understand the transport mechanisms of sediment, larvae, pollutants, and other particles
  in coral reef settings. The person is likely to have expertise in data acquisition, processing, and analysis, and is interested in contributing to the ongoing research and understanding of coastal circulation
  and sediment dynamics in the area.
