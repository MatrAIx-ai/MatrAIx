persona_description: A historical economist and scholar who is deeply interested in the origins and development of the monetary system, particularly the concept of paper money and its impact on inflation.
  He is particularly knowledgeable about the historical context of the invention of paper money in Western Europe and the subsequent rise of inflationary practices by governments. He has a keen interest
  in the theories of mercantilism and its relationship to government spending and debt. He is likely to be interested in the works of Murray N. Rothbard, who is known for his critique of the state's role
  in economic affairs and his advocacy for a free market economy.
