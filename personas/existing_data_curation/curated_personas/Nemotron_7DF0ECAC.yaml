  career_goals: Richard aims to transition into a supervisory role within his current kitchen, such as a sous chef or kitchen manager, where he can leverage his organizational strengths and mentor younger
    staff. In the longer term, he hopes to establish a modest catering service focused on hearty, family‑style meals that reflect his own culinary heritage, allowing him to work at a steadier pace and reduce
    the high‑pressure environment that contributes to his anxiety. He also plans to earn a ServSafe certification upgrade to reinforce his commitment to food safety.
