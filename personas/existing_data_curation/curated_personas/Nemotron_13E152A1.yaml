  hobbies: '["Sketching urban and mechanical designs","Playing acoustic guitar","Visiting art museums and galleries","Exploring street art in Los Angeles","Attending Mexican cultural festivals (e.g., Día
    de los Muertos, Carnaval)","DIY metal sculpting with Mexican motifs","Cooking traditional Mexican dishes","Building scale model kits","Watching science‑fiction and fantasy films"]'
  career_goals: Juan aims to advance from machine operator to lead technician or shift supervisor, securing a CNC programmer certification to broaden his technical scope. He envisions blending his mechanical
    expertise with his artistic curiosity by developing custom metal sculptures for interior design and public art installations. Over the next five years, he plans to complete a bachelor's degree in industrial
    engineering, obtain certifications in advanced CNC programming, and eventually launch a side business that offers bespoke metal art pieces while maintaining a flexible work schedule that accommodates
    his creative pursuits.
