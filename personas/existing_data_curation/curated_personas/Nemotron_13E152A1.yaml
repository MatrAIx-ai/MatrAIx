personas:
  professional: Juan Pena works as a machine operator on a Los Angeles factory floor, expertly setting up cutting, punching, and press machines, reading technical drawings, and applying lean and OSHA standards,
    while eyeing a lead‑technician role that would let them merge mechanical precision with a budding side business creating custom metal sculptures.
  sports: Juan Pena enjoys casual weekend skate sessions at Venice Beach and occasional pick‑up basketball games with coworkers, cheering for the LA Lakers and LAFC while favoring low‑key, self‑paced workouts
    over regimented gym routines.
  arts: Juan Pena spends Saturday mornings sketching downtown LA streetscapes inspired by the graffiti of Banksy and the composition of Edward Hopper, strums acoustic renditions of Joni Mitchell and José
    González, and frequents LACMA exhibitions featuring contemporary Mexican artists such as Gabriel Orozco.
  travel: Juan Pena favors spontaneous weekend getaways to nearby California surf towns like Santa Cruz and cultural hotspots such as Oaxaca, Mexico, yet dreams of a meticulously planned pilgrimage to Japan’s
    Hiroshima to explore its metal‑working museums, balancing a tight budget with a desire for immersive experiences.
  culinary: Juan Pena enjoys cooking homemade carnitas tacos with charred pineapple, mole negro with pasilla chilies, and experimenting with copper‑pan paella, demonstrating an intermediate skill level
    that blends treasured family recipes with a bold, smoky flavor palate.
  core: Juan Pena is a mechanically gifted yet delightfully disorganized 29‑year‑old who fuses industrial precision with a free‑spirited love for sketching, guitar riffs, and midnight metal‑sculpting sessions.
background:
  cultural: Juan grew up in a bicultural Mexican‑American household in Los Angeles. His parents emigrated from central Mexico, bringing traditions such as Día de los Muertos, quinceañeras, and a love for
    mariachi music. Bilingual in Spanish and English, he speaks Spanish at home while using English at work. He celebrates Mexican holidays with family gatherings, enjoys cooking dishes like tamales and
    mole, and participates in community events at a local cultural center. Living in a diverse city, he blends Mexican heritage with the vibrant art scene of Los Angeles, often incorporating traditional
    patterns and colors into his personal creative projects.
