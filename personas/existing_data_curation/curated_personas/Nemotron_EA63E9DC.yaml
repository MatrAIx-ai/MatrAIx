personas:
  professional: Jorge Menendez, a budding robotics enthusiast and aspiring engineer, combines methodical programming skills with a love for structured teamwork, channeling his preference for routine into
    weekly robot builds while flexibly adapting designs based on teammates’ input.
  sports: Jorge Menendez, a dedicated midfielder on the school’s soccer squad and member of the local youth club Greenfield Strikers, drills twice a week and weekends with the same disciplined routine,
    cheering for FC Barcelona and the national team while balancing his love for group play with personal fitness goals.
  arts: Energetic and sociable, Jorge Menendez indulges in a mixtape that swings from Billie Eilish’s modern pop hits to traditional folk ballads by Los Andes, practices impromptu dance steps at family
    gatherings, and occasionally sketches robot schematics as a creative outlet.
  travel: Jorge Menendez blends careful planning with spontaneous fun, enjoying short family trips to the nearby snow‑capped hills of Sierra Vista, a yearly beach visit to Playa del Sol, and dreaming of
    saving up for a student‑exchange adventure to Barcelona’s historic neighborhoods.
  culinary: Jorge Menendez, a competent home‑cook who delights in the rhythmic chopping of fresh lime, cilantro, and fish for ceviche, and the golden frying of empanada dough filled with seasoned beef,
    balances his love for familiar flavors with occasional experiments like adding mango salsa to classic recipes.
  core: Jorge Menendez thrives on routine‑driven teamwork, balancing a calm, resilient mindset with bursts of impulsive sports gear purchases and occasional forgetfulness about his inhaler.
background:
  cultural: Jorge grew up in an Ecuadorian‑American household in Chestertown, Maryland, where Spanish is spoken at home and cultural traditions are celebrated. His family maintains strong ties to Ecuadorian
    heritage through holiday celebrations such as Carnaval and Día de los Difuntos, and they regularly prepare dishes like ceviche, llapingachos, and empanadas. Catholic values and a close‑knit family structure
    influence his daily life, emphasizing respect for elders and community involvement. While he embraces the local American school culture, Jorge balances this with his Ecuadorian roots, participating
    in bilingual school programs and community events that showcase Latin American culture.
