  career_goals: Jorge aspires to pursue a career that blends practicality with community service. He envisions becoming a bilingual technician or maintenance specialist, working in fields such as automotive
    repair, HVAC, or electrical systems, where his hands‑on skills and calm, resilient demeanor will be valuable. He also dreams of supporting his family's future restaurant by modernizing operations and
    incorporating technology, potentially studying business administration after high school. Ultimately, he hopes to obtain a technical certification that will allow him to secure stable, well‑paid work
    while staying connected to his cultural roots and local community.
