personas:
  professional: An experienced full‑stack engineer, Hae Ni combines deep expertise in Python, JavaScript, AWS, Docker, and Kubernetes with a pragmatic curiosity that drives scalable product design, while
    they use bilingual communication and mentorship to foster inclusive, collaborative teams that balance structured agile processes with creative flexibility.
  sports: An avid outdoor enthusiast, Hae Ni organizes weekend hikes with the Queens Park Hiking Club, follows the New York Knicks and New York Mets faithfully, and joins a community soccer league every
    spring, while they treat fitness as a social commitment rather than a solitary regimen.
  arts: A culturally engaged creative, Hae Ni regularly attends community dance workshops that remix K‑pop choreography with contemporary moves, streams performances by BTS and choreographer Jow B, and
    savors indie films by directors such as Hirokazu Kore‑eda and Bong Joon‑ho, letting those artistic experiences shape their storytelling approach at work, while they incorporate those artistic insights
    into product narratives.
  travel: A curious traveler, Hae Ni meticulously plans weekend getaways to nearby locales like the Hudson Valley and the Appalachian Trail while also daydreaming about future trips to Seoul and the coastal
    villages of Oaxaca, balancing a love for both structured itineraries and spontaneous street‑food explorations, while they remain flexible about travel timing due to family commitments.
  culinary: A passionate home chef, Hae Ni experiments with Korean‑American fusion dishes such as kimchi‑topped tacos, bulgogi‑infused burgers, and gochujang‑marinated salmon, often pairing them with sesame‑oil‑drizzled
    quinoa bowls while they fine‑tune flavors with fermented sauces and fresh herbs.
  core: Hae Ni is a socially driven tech leader who fuses curiosity with pragmatism, channeling a love for collaborative hikes, dance‑floor creativity, and experimental cooking into inclusive product innovation,
    despite a habit of occasional over‑commitment that leads them to late‑night caffeine binges.
background:
  cultural: Hae Ni is a second‑generation Korean‑American. Raised in Astoria, she grew up bilingual, celebrating Chuseok and Lunar New Year with her family while also participating in the diverse cultural
    tapestry of Queens. Her upbringing emphasized education, community service, and respect for intergenerational ties, which inform her collaborative work style and her commitment to giving back through
    mentorship and culturally aware tech initiatives.
