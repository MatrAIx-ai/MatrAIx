  Best Generated Conversation: 'User 1: I''m so bored. I don''t know what to do with myself.

    User 2: Why don''t you go for a run?

    User 1: I don''t like running. It''s so boring.

    User 2: What about playing basketball?

    User 1: I don''t know how to play basketball.

    User 2: I could teach you.

    User 1: Maybe. I don''t know.

    User 2: Come on, it''ll be fun. We can go to the park and I''ll show you the basics.

    User 1: Okay, I''ll do it.


    (At the park)


    User 1: This is so hard.

    User 2: I told you it would be a challenge at first. But you''re doing great!

    User 1: I don''t know about that.

    User 2: Yes you do. Look at how far you''ve come. You were just standing there a few minutes ago, and now you''re dribbling the ball and running down the court.

    User 1: You''re right. I''m not as bad as I thought I was.

    User 2: I told you! Now, let''s try a game.

    User 1: Okay.


    (After the game)


    User 1: That was so much fun!

    User 2: I told you you''d like it.

    User 1: I didn''t think I would, but I really did.

    User 2: Well, I''m glad. Now, we can play basketball every day!

    User 1: I don''t know about that. I''m not sure I''m that good.

    User 2: You''re good enough for me.

    User 1: Okay, I''ll play with you again sometime.

    User 2: Great! I''ll see you then.'
