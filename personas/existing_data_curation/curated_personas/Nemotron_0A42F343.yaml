  career_goals: Kenneth imagines growing up in a steady, community‑oriented job that follows clear routines. He often talks about becoming a firefighter or a teacher because both roles involve helping people,
    wearing a uniform, and having predictable schedules, which align with his love of order and practicality. He aspires to be reliable, organized, and helpful to others in his future career.
