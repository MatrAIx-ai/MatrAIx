persona_description: 'Jessica Scalzo is a member of the Diversity, Equity and Human Rights Committee for Parkland Teachers Local #10 of the Alberta Teachers’ Association and the contract writer of the Respectful
  Schools Online Toolkit. She is passionate about building schools and communities that are welcoming, caring, respectful and safe, and believes that moving forward in an increasingly diverse province depends
  on collaborative work by all Albertans. Jessica has a unique understanding of the issues related to vulnerable groups, as she has been involved in human rights education and has a deep knowledge of legislation,
  background information, and government bodies dedicated to serving these groups. She is a skilled writer and has a strong interest in sharing information and resources with others. Jessica is dedicated
  to promoting a culture of dignity and respect for all people, through challenging oppression and strengthening positive relationships in schools and communities.'
