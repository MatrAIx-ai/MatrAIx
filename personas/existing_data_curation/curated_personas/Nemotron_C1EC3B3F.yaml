  career_goals: Jonathan aims to advance to a senior executive role such as Director of Operations or Vice President of Manufacturing, where he can champion enterprise‑wide operational excellence and sustainability
    initiatives. He seeks to integrate AI‑driven analytics into workflow optimization, reduce operational costs by measurable margins, and mentor emerging leaders within the organization. Long‑term, he
    envisions establishing a consulting practice focused on process improvement while maintaining a healthier work‑life balance to mitigate stress.
