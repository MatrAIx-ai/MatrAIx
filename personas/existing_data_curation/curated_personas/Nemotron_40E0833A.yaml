  career_goals: Even at four, Reinaldo dreams of roles that let him help others and use his love of learning. He often talks about becoming a firefighter who rescues people, a teacher who shares new ideas
    with classmates, or an inventor who creates fun gadgets. His imagination blends his curiosity for how things work with a practical desire to keep his community safe and organized. He also expresses
    a wish to be a community helper, like a helpful police officer or a friendly doctor, reflecting his compassionate yet self‑assured personality.
