personas:
  professional: Reinaldo Riego, a mini‑architect of LEGO creations, organizes each block set with methodical precision, plans elaborate structures ahead of playtime, and joyfully collaborates with friends
    while confidently asserting design ideas when needed.
  sports: Reinaldo Riego, member of the local toddlers' soccer club, dashes around the park with boundless energy, chants support for the nearby professional baseball team the Chicago Cubs, and eagerly
    signs up for swim lessons each summer to stay active.
  arts: Reinaldo Riego, a tiny fan of Pixar movies like 'Toy Story', loves singing along to Disney’s 'Let It Go', and enjoys finger‑painting sessions that blend bright crayons with the rhythmic beats of
    Pharrell’s ‘Happy’ as background music.
  travel: Reinaldo Riego, who loves weekend trips to the nearby aquarium and family vacations at Disney World, prefers parent‑planned itineraries that balance exciting rides with downtime for nap breaks,
    and dreams of exploring the giant red rocks of Sedona someday.
  culinary: Reinaldo Riego, a picky eater with a soft spot for cheesy macaroni, chicken nuggets shaped like dinosaurs, fresh strawberries, and occasionally tries making banana pancakes with a plastic whisk,
    often insisting on extra ketchup on everything.
  core: Reinaldo Riego blends boundless curiosity with a tiny‑tuned sense of order, turning every playtime into a well‑planned adventure while still chasing glittering stickers and the occasional snack‑induced
    sugar rush.
background:
  cultural: Reinaldo comes from a Guatemalan family that maintains strong cultural ties while living in Flint, Michigan. Spanish is spoken at home, and he learns traditional songs, simple proverbs, and
    holiday customs like celebrating Día de los Muertos with colorful papel picado and family‑made tamales. His parents incorporate Guatemalan foods such as beans and corn tortillas into meals, and they
    share stories of their hometowns, giving Reinaldo a sense of heritage. At the same time, he is immersed in the diverse urban environment of Flint, participating in community preschool programs and local
    festivals that blend his Latin roots with Midwestern culture.
