personas:
  professional: Alexis Forret, a seasoned licensed practical nurse with two decades of bedside experience, leverages their analytical mindset and love of creative expression to design streamlined care protocols,
    mentor interdisciplinary teams, and champion an upcoming art-therapy program while pursuing an RN-to-BSN and gerontological certification.
  sports: Alexis Forret enjoys low-impact cardio through bird-watching walks along the Chesapeake Bay, follows the Baltimore Orioles and the Ravens with loyal enthusiasm, participates in a small local walking
    club that meets at the historic Salisbury Museum’s lawn for light strength exercises, and they find the intimacy of small groups far more rewarding than the roar of a stadium crowd.
  arts: Alexis Forret spends quiet evenings translating Chesapeake Bay sunsets onto watercolor canvas, drawing inspiration from Winslow Homer and contemporary regional artist Sandra Miller, attends monthly
    openings at the Delmarva Arts Center, cherishes classic film performances by Meryl Streep and Alan Alda, and they appreciate the nuanced storytelling that mirrors their own creative outlook.
  travel: Alexis Forret plans meticulously for weekend getaways to historic Williamsburg and Eastern Shore vineyards, dreams of a summer sail to the Danish islands that echo their coastal roots, balances
    a love of exploration with a family-centered schedule that avoids long-haul flights during the school year, and they often incorporate visits to local art festivals like the Maryland Seafood Festival
    on the road.
  culinary: Alexis Forret delights in preparing seasonal crab cakes seasoned with Old Bay, herb-infused quinoa salads featuring garden-grown basil and kale, a signature blueberry-lavender tart for book-club
    gatherings, a hearty lentil soup seasoned with rosemary, and they love sharing the meals with friends and family, showcasing a solid yet humble culinary skill set that favors fresh, locally sourced
    ingredients.
  core: Alexis Forret blends a nurse’s precision with an artist’s eye, meticulously budgeting their time and money while channeling a quiet curiosity into watercolor, community health, and a habit of double-checking
    medication labels at night.
background:
  cultural: Alexis is a white, middle‑class woman with German and English ancestry, raised in the Mid‑Atlantic region near Salisbury, Maryland. Growing up in a close‑knit suburban community, she was immersed
    in local traditions such as the Maryland Seafood Festival, Fourth of July parades, and church‑centered gatherings. The blend of coastal culture, historic preservation, and proximity to academic institutions
    nurtured her dual appreciation for scientific inquiry and the arts. Her marriage and strong family ties reinforce values of reliability, cooperation, and service to the community.
attributes:
  skills: '["Patient assessment", "Medication administration", "Wound care", "Infection control", "Electronic medical records (EMR) management", "Health education", "Patient advocacy", "Telehealth support",
    "Data analysis", "Quality improvement initiatives", "Team coordination", "Basic laboratory procedures"]'
  hobbies: '["Watercolor painting", "Sketching", "Visiting art galleries", "Exploring the Salisbury Museum", "Reading science fiction and medical nonfiction", "Gardening", "Bird watching", "Cooking healthy
    meals", "Small book club discussions", "Crossword and Sudoku solving", "Volunteering at health fairs"]'
  career_goals: After two decades of bedside nursing, Alexis plans to advance her credentials by completing an RN‑to‑BSN program and obtaining certification in gerontological nursing. She aims to move into
    a charge nurse or patient care manager role, lead community health outreach projects that emphasize preventive care for seniors in Wicomico County, and eventually transition into a nurse educator position
    at a local community college. A personal passion project is to develop and implement an art‑therapy program within her facility to enhance patient well‑being and foster holistic healing.
