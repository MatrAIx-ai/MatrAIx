  hobbies: '[''Landscape photography'', ''Hiking in Wasatch Mountains'', ''Visiting art galleries and museums'', ''Reading contemporary fiction and philosophy'', ''Playing acoustic guitar'', ''Journaling'',
    ''Mindfulness meditation'', ''Collecting vintage vinyl records'', ''Playing chess'']'
  career_goals: Thomas aims to become a Director of Procurement within the next five years, leading a team to embed sustainable and ethical sourcing practices across his organization. He plans to earn the
    Certified Professional in Supply Management (CPSM) credential, champion the adoption of AI‑driven spend analytics, and build a reputation for delivering significant cost reductions. Long‑term, he envisions
    transitioning into a consulting role that merges his procurement expertise with his passion for art, advising corporations on sourcing artwork and creating inspiring work environments. He also seeks
    a balanced work‑life rhythm, possibly through flexible remote work, to better manage his anxiety and emotional reactivity.
