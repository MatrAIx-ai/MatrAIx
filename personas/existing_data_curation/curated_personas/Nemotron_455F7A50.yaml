  career_goals: Although retired from formal employment, Christi is focused on maintaining her independence, health, and sense of purpose. Her primary ambition is to stay socially engaged by continuing
    her volunteer work at the senior center and by mentoring younger neighbors in gardening and cooking. She hopes to compile a small family‑recipe booklet that blends classic comfort dishes with her recent
    culinary experiments, which she plans to share with the community and her grandchildren. She also aims to deepen her knowledge of low‑maintenance landscaping to create a shared garden space that brings
    together seniors and teens in the neighborhood, fostering intergenerational connections. Finally, she is determined to keep her cognitive abilities sharp through regular puzzles, reading, and occasional
    community‑college workshops on topics that interest her, such as nutrition and basic digital literacy.
