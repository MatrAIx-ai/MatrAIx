persona_description: A constitutional lawyer who specializes in the interpretation and application of the United States Constitution, particularly in relation to the rights and privileges of residents of
  the District of Columbia. This individual is knowledgeable about the unique status of the District as the seat of Federal Government under the exclusive legislative control of Congress and has a deep
  understanding of the issues related to enfranchisement and the rights of District citizens to participate in national elections for President and Vice President of the United States.
