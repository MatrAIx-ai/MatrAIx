persona_description: A historian who specializes in the study of American history, particularly focusing on the development of civic identity and the articulation of white manhood in the context of the
  United States. They are interested in the intersection of gender, race, and nation, and have a particular interest in the theoretical consolidation of white manhood as a means of grounding and finding
  the nation. They have a deep understanding of the political, social, and cultural contexts of this period and are able to engage with a wide range of texts, including literary and historical documents,
  to analyze and understand the complex relationship between gender, race, and nation. They are likely to have a background in American history, literature, and culture, and have a strong interest in exploring
  the ways in which early national culture, race, and gender issues have been shaped by the ideal of white manhood.
