personas:
  professional: Angel King, a 46‑year‑old community‑focused organizer transitioning from homemaking to a part‑time nonprofit program coordinator role, blends persuasive grant‑writing, volunteer management,
    and empathetic counseling with a practical curiosity that drives her to design senior outreach initiatives while still keeping her garden and theater commitments on schedule.
  sports: Angel King, an avid hiker on the Catskill trails, practices yoga at the local studio, plays co‑ed softball with the Earlville Community League, passionately follows the Buffalo Bills and the New
    York Knicks, and maintains membership in the Earlville Hiking Club to stay motivated year‑round.
  arts: Angel King, a regular on the community theater stage, devotes evenings to a knitting circle, reads historical fiction by Ken Follett and Philippa Gregory, and finds inspiration in the folk sounds
    of Mumford & Sons and the paintings of Grandma Moses.
  travel: Angel King prefers purposeful road trips to historic towns like Saratoga Springs and to charming European villages known for half‑timbered houses and farmer’s markets, balancing her love of heritage
    with a modest travel budget and occasional family responsibilities.
  culinary: Angel King, an enthusiastic seasonal cook, often prepares roasted beet and goat cheese salad with fresh thyme and rosemary, homemade apple crumble spiced with cinnamon, sauerkraut paired with
    smoked pork, and garden salads topped with locally harvested honey, showcasing a confident yet experimental kitchen style.
  core: Angel King merges deep community compassion with restless curiosity, channeling her perpetual worry into meticulous planning, while nurturing her garden, theater troupe, and emerging nonprofit career.
background:
  cultural: Angel is a White American of Irish and German descent, raised in the rural fabric of upstate New York. Her family’s heritage is steeped in Protestant (Methodist) traditions, community service,
    and a strong work ethic typical of the region. She values familial bonds, local heritage preservation, and the cooperative spirit of small‑town life, all of which shape her compassionate and sociable
    outlook.
attributes:
  skills: '["Community Outreach", "Event Planning", "Volunteer Coordination", "Conflict Mediation", "Grant Writing", "Creative Writing", "Public Speaking", "Basic First Aid", "Gardening", "Culinary Arts",
