  hobbies: '["Gardening", "Cooking", "Reading (historical fiction, self‑help)", "Knitting", "Volunteer work at food pantry", "Community theater", "Hiking", "Yoga", "Mindfulness meditation", "Hosting book
    club"]'
  career_goals: Angel aims to transition from her current homemaker role into a part‑time program coordinator position with a local nonprofit serving seniors or youth, leveraging her community‑building
    experience. She plans to complete a certification in geriatric care and eventually launch a community garden that doubles as an educational outreach program for nearby schools. Long‑term, she hopes
    to serve on the board of the Earlville Historical Society and perhaps author a memoir that shares her journey of balancing curiosity, practicality, and compassion while managing stress.
