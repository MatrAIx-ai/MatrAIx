  hobbies: '[''Visiting art museums'', ''Watercolor painting'', ''Sketching'', ''Reading contemporary fiction and non-fiction'', ''Listening to jazz and soul music'', ''Singing in a gospel choir'', ''Gardening'',
    ''Walking along the Flint River'', ''Yoga'', ''Volunteer reading mentorship'']'
  career_goals: Christine aims to transition from a front‑line representative to a leadership role within customer experience. Over the next three years she plans to complete a bachelor’s degree in Business
    Administration, obtain a Certified Customer Service Professional credential, and take on a team‑lead position. Her long‑term ambition is to become a Customer Experience Manager, designing training programs,
    mentoring new agents, and championing inclusivity and service‑quality initiatives. Parallel to her corporate trajectory, she hopes to leverage her love of art by developing community outreach programs
    that showcase local artists within the workplace, fostering a culturally rich environment for both employees and customers.
