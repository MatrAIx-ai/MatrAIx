    schematics'', ''Inventory management for parts and supplies'', ''Training and mentoring junior operators'', ''Environmental compliance for desert operations'', ''Basic computer skills (CMMS, maintenance
    software)'', ''First aid and emergency response'']'
  hobbies: '[''Fishing on Lake Mohave'', ''Desert hiking and wildlife photography'', ''Astronomy and astrophotography'', ''Reading historical non‑fiction'', ''Woodworking and furniture making'', ''Model
    train building'', ''Home brewing craft beer'', ''Volunteer work at the local veterans\'' center'', ''Small‑group book club'', ''Classic car restoration'']'
  career_goals: Approaching retirement, Steven aims to transition into a supervisory and safety‑leadership role, such as fleet supervisor or safety coordinator, where he can formalize his mentorship of
    younger operators and champion a culture of proactive maintenance. He hopes to earn the company's "Operator of the Year" award and to obtain certification in emerging tele‑operated or autonomous equipment
    systems. Additionally, he envisions launching a part‑time consulting service that offers preventive‑maintenance planning and regulatory compliance advice to local construction and mining contractors,
    allowing him to stay engaged while enjoying a balanced, low‑stress lifestyle.
