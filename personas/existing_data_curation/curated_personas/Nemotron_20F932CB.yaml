personas:
  professional: Randy Stanford, a budding teen engineer who channels their love for routine into meticulously assembling LEGO Technic and model airplane kits, spends weekends troubleshooting basic electronics,
    and quietly mentors classmates on DIY projects, demonstrating a practical, hands‑on approach to problem‑solving.
  sports: Randy Stanford enjoys solitary fishing trips along the Lake Michigan shoreline, watches the Chicago Cubs on TV, and belongs to the local junior fishing club, while skipping team sports in favor
    of quiet, low‑impact exercises like weekend bike rides, because they find group dynamics draining.
  arts: 'Randy Stanford grooves to classic rock legends like Led Zeppelin and The Rolling Stones on headphones while building models, and occasionally watches classic sci‑fi films such as 2001: A Space
    Odyssey for inspiration, weaving music and visual storytelling into their creative downtime.'
  travel: Randy Stanford prefers low‑key road trips to nearby nature spots like the Indiana Dunes and a weekend pilgrimage to the Model Airplane Museum in Kalamazoo, planning each outing with a detailed
    checklist but avoiding crowded tourist hubs unless a friend invites them.
  culinary: Randy Stanford loves simple farm‑to‑table meals, often tossing fresh garden tomatoes, cucumbers, and basil into a crisp salad, whips up buttery buttermilk pancakes on lazy Saturday mornings,
    and occasionally indulges in instant ramen when homework piles up, because they enjoy quick, comforting food after a long day of tinkering.
  core: Randy Stanford blends a love for routine, quiet solo hobbies, and heartfelt cooperation, balancing meticulous model‑building with a laid‑back, sometimes forgetful approach to obligations and a secret
    stash of classic rock.
background:
  cultural: 'Randy grew up in a white, Midwestern family in Milwaukee with Irish‑Polish Catholic roots. His upbringing reflects the region’s modest, practical values: a strong work ethic, community responsibility,
    and a preference for straightforward, hands‑on activities. He participates in his church’s youth outreach programs and regularly helps neighbors during clean‑up drives, embodying the neighborhood solidarity
    characteristic of Milwaukee’s working‑class communities.'
attributes:
  skills: '["Household repair (plumbing, light fixtures)", "Basic computer troubleshooting", "Woodworking (birdhouses, simple furniture)", "Gardening", "Pet care", "Model kit assembly", "Community service
    (clean‑up volunteer)"]'
  hobbies: '["Model airplane building", "LEGO Technic construction", "Vegetable gardening", "Fishing at Lake Michigan", "Listening to classic rock", "Strategy video gaming", "Reading DIY manuals"]'
  career_goals: Randy wants to finish high school, earn a GED, and then attend a trade school to become a certified electrician or automotive technician. He dreams of opening a modest repair shop where
    he can offer affordable services and teach practical skills to other teens. In the short term he hopes to get a part‑time job at a local hardware store to gain experience and save for his vocational
    training, while continuing to help neighbors with small repairs.
