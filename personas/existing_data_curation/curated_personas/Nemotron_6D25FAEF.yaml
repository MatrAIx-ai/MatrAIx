personas:
  professional: Xiaodi Yang, a veteran aircraft maintenance specialist, leverages decades of hands‑on structural repair, avionics diagnostics, and precision machining expertise, while their competitive
    nature and meticulous skepticism drive them to rigorously validate new tools before adopting them, and they have become a trusted lead inspector and mentor for aspiring technicians.
  sports: Xiaodi Yang hikes the trails of Brazos Bend State Park with the Houston Hiking Club, follows the Houston Astros and Houston Rockets seasons with quiet enthusiasm, and they fit in weekly yoga sessions
    to counterbalance the physical strain from their hands‑on maintenance work, preferring low‑key group activities over large crowds.
  arts: Xiaodi Yang cultivates their artistic side through traditional brush calligraphy inspired by the works of Wang Xizhi and ink landscape painting reminiscent of Sesshū, and they also find solace in
    the jazz improvisations of Miles Davis and the ambient piano compositions of Ludovico Einaudi, a blend that satisfies both their curiosity for heritage and their competitive drive for technical precision.
  travel: Xiaodi Yang prefers meticulously planned trips that blend aviation heritage with gentle adventure, having toured the Smithsonian National Air and Space Museum in Washington, D.C., the Museum of
    Flight in Seattle, and the historic aviation sites of New Zealand, and now they are saving to attend the Farnborough International Airshow in the United Kingdom and to explore the tranquil tea gardens
    of Kyoto on their next overseas journey.
  culinary: Xiaodi Yang, a confident home cook, regularly prepares herb‑infused grilled salmon seasoned with rosemary, thyme, and lemon, tosses fresh garden mint into a tangy cucumber salad, and indulges
    in weekend sessions of hand‑rolled dumplings filled with pork and chives, while they savor occasional upscale dinners featuring Texas‑style brisket at a beloved local barbecue joint.
  core: Xiaodi Yang blends meticulous aircraft expertise with a quiet competitive streak, channeling their curiosity into precision model building, while they habitually double‑check every detail, sometimes
    skewing them between perfectionism and procrastination.
background:
  cultural: Xiaodi was born in Houston to parents who immigrated from Zhejiang Province, China. Growing up bilingual in Mandarin and English, she blends traditional Chinese values—such as respect for elders,
    dedication to craftsmanship, and an emphasis on education—with the independent, pragmatic spirit of Texan work culture. She observes Lunar New Year, the Mid‑Autumn Festival, and prepares family recipes
    passed down through generations, while also enjoying the diverse culinary scene of Houston. Her East Asian heritage informs her meticulous attention to detail, appreciation for harmony, and the balance
    between curiosity and practicality that shapes both her professional and personal life.
attributes:
  skills: '["Airframe structural repair", "Engine troubleshooting and overhaul", "Avionics diagnostics", "Composite material restoration", "FAA regulatory compliance", "Safety inspection and quality assurance",
    "Precision machining and metalworking", "Welding (TIG/MIG)", "Technical documentation and record-keeping", "Mentoring of apprentices", "Root cause analysis", "Diagnostic software operation (e.g., AMTS,
    BITE)", "Maintenance scheduling and project planning"]'
  hobbies: '["Scale model aircraft building", "Aerospace literature reading", "Chinese calligraphy and brush painting", "Herb gardening", "Hiking in local nature areas", "Mechanical puzzles and crosswords",
    "Aviation history club meetings", "STEM mentorship for teenage girls"]'
  career_goals: Her immediate goal is to obtain the FAA Senior Aviation Maintenance Inspector certification and move into a Lead Maintenance Inspector role where she can oversee a dedicated team and shape
    maintenance policies. Over the next five years, Xiaodi plans to develop a structured mentorship program that encourages more women and minorities to enter aircraft mechanics, and to deepen her expertise
    in emerging technologies such as electric propulsion and advanced composite repairs. Long‑term, she envisions launching a boutique consulting firm that provides safety‑compliance audits and process‑optimization
    services to regional carriers and private operators, allowing her to blend her practical knowledge with her competitive drive for excellence.
