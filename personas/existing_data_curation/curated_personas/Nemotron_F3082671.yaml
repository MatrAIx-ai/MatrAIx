personas:
  professional: Billy Hartley, a retired maintenance supervisor turned community event organizer, leverages their hands‑on expertise in home repair, woodworking, and budgeting to calmly mentor volunteers
    and keep local gatherings running smoothly, blending curiosity with practicality.
  sports: Billy Hartley follows the Omaha Storm Chasers faithfully, attends Nebraska Cornhuskers football games when possible, participates in a weekly senior walking club at the city park, and enjoys occasional
    fishing trips on the Missouri River, bringing their energetic, sociable spirit to every game and outing.
  arts: Billy Hartley regularly attends community theater productions, especially those featuring classic American playwrights, delights in the folk tunes of Bob Dylan and the vocal stylings of Joan Baez,
    and volunteers as a stagehand, letting their cooperative nature and love for history enrich their artistic pursuits.
  travel: Billy Hartley prefers short, purposeful trips to visit their grandchildren in Chicago and Denver, delights in weekend road trips to historic sites like the National Museum of American History
    in Washington, D.C., and dreams of a leisurely cruise along the Great Lakes, balancing their curiosity with a modest travel budget and family obligations.
  culinary: Billy Hartley cooks hearty Midwestern staples such as beef pot roast, corn succotash, and pan‑fried catfish, skillfully seasons with garden‑fresh herbs like thyme and rosemary, and enjoys sharing
    their dishes at community potlucks, though they sometimes over‑salt their gravy when distracted by conversation.
  core: Billy Hartley is a calm, community‑focused octogenarian who blends hands‑on craftsmanship with a love for history, family, and modest, well‑ordered living, occasionally forgetting to floss but never
    missing a bridge game.
background:
  cultural: Billy’s cultural identity is rooted in the Midwestern values of Omaha, Nebraska, where he was born and raised in the post‑World War II era. He grew up in a close‑knit, predominantly white neighborhood
    that emphasized practicality, self‑reliance, neighborliness, and community service. Church gatherings, county fairs, communal potlucks, and a love of the outdoors have shaped his outlook. While his
    ancestry reflects the Anglo‑American heritage common to the region, Billy’s daily life is guided by the gentle hospitality, modesty, and civic pride characteristic of the Great Plains.
