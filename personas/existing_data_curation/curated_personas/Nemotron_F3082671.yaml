  career_goals: At 80, Billy’s primary ambition is to leave a meaningful legacy for his community and family. He aims to document his life story and family genealogy, mentor younger volunteers at the senior
    center, and continue contributing to local events by offering his organizational expertise. He also hopes to travel occasionally to visit grandchildren and to share his love of Midwestern history through
    informal talks at community gatherings.
