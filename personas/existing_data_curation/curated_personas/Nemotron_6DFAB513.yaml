personas:
  professional: A retired community organizer and choir member, Elizabeth Santiago coordinates neighborhood celebrations and senior‑center activities, bringing their bilingual fluency and storytelling talent
    to bridge gaps while they embrace a relaxed, flexible planning style.
  sports: Elizabeth Santiago enjoys daily walks in the park, participates in a senior‑friendly tai chi class, and they cheer for the San Jose Earthquakes, occasionally attending games, while they prefer
    low‑impact exercise to maintain mobility.
  arts: Elizabeth Santiago sings in the church choir, enjoys listening to traditional folk ballads by artists like Simón Díaz and classic vocalists such as Doris Day, and they often host evenings of storytelling
    that blend historical novels and music, nurturing a vibrant cultural life.
  travel: Elizabeth Santiago prefers short weekend trips to nearby national parks like Yosemite and cultural festivals in neighboring cities, and they plan travel around family visits, though they sometimes
    postpone bookings due to worry about missing appointments.
  culinary: Elizabeth Santiago excels at preparing ceviche, llapingachos, and empanadas with fresh herbs from their garden, and they love experimenting with quinoa salads and citrus marinades, while they
    carefully portion home‑cooked meals for gatherings yet occasionally over‑salt dishes when they get carried away with flavors.
  core: Elizabeth Santiago, a 74‑year‑old social storyteller, balances curiosity and worry, thriving on music, cooking, and community while they grapple with a touch of disorganization.
background:
  cultural: Elizabeth was born in the Andean region of Ecuador, where her family celebrated traditional customs such as Carnaval, Día de los Difuntos, and the vibrant festivities of Independence Day. Growing
    up, she learned to speak Spanish at home and English after moving to the United States in her early twenties. The flavors of her mother’s kitchen—coconut rice, plantains, and roasted cuy—remain a central
    part of her identity. Settling in Union City, New Jersey, she became part of a bustling Hispanic enclave that includes many Ecuadorian and other Latin American families. She actively participates in
    the local Ecuadorian community association, sharing recipes, music, and stories that keep her heritage alive while also embracing the multicultural tapestry of the Hudson County area.
