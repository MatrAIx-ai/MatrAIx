persona_description: A person interested in soil quality and soil management, particularly in understanding the physical and chemical properties of soil, and how to improve soil quality for agricultural
  purposes. This person may be a farmer, soil scientist, or a person involved in land management. They are interested in knowing how soil texture affects soil quality indicators such as bulk density, water
  availability, and risk of erosion, and how to adjust for gravel content. They may also be interested in learning about the effects of soil texture on soil structure and how to improve soil structure to
  enhance plant growth and crop yield.
