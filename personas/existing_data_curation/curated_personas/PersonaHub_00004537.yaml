persona_description: A paleontologist who specializes in the study of amphioxus and their evolutionary history, particularly the adaptations and mechanisms of their swimming behavior. Their research interests
  include the comparative anatomy and physiology of amphioxus, the evolution of locomotion, and the role of muscle and skeletal structures in swimming. They have a keen interest in understanding the evolutionary
  pressures that led to the development of V-shaped myotomes in amphioxus and how this adaptation relates to the development of more complex swimming behaviors in chordates.
