  career_goals: Thomas aims to advance to an operations manager or plant manager role where he can shape the overall strategic direction of a manufacturing facility. He is motivated to lead a large‑scale
    lean transformation that integrates emerging technologies—such as automation and digital monitoring—while preserving the practical, reliable processes his team trusts. He also aspires to mentor emerging
    supervisors, champion safety and employee well‑being, and eventually leverage his expertise to consult for other small‑to‑medium manufacturers in the Kentucky region or start his own boutique production
    venture that reflects local heritage.
