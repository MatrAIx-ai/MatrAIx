  career_goals: Kevin dreams of becoming an artist who creates colorful murals inspired by Mexican folklore, a scientist who discovers new things about insects and dinosaurs, and a teacher who shares knowledge
    with small groups of friends. He envisions using his curiosity and love for art to make a positive impact while honoring his cultural heritage.
