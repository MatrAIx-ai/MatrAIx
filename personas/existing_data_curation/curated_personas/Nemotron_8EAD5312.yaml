personas:
  professional: Kevin Soriao is an aspiring junior architect whose bright, folk-inspired drawings of block towers reveal an early knack for spatial planning, and their methodical habit of sketching layouts
    before building with LEGO mirrors a budding professional mindset.
  sports: Kevin Soriao is a budding soccer enthusiast in the local under-7 league, cheering for the hometown City Rovers and they also enjoy weekend visits to the community park where they practice balance
    on a kiddie climbing wall.
  arts: Kevin Soriao is a small-scale visual artist who spends afternoons creating vibrant papel picado and sugar skull decorations for Día de los Muertos, drawing inspiration from lively mariachi tunes
    and the works of Frida Kahlo, and they often share their bright sketches with classmates during art time.
  travel: Kevin Soriao loves family road trips to nearby historic towns such as the colorful streets of San Miguel, where they collect leaf specimens from local parks, and they dream of visiting the pyramids
    of Teotihuacan as a future adventure.
  culinary: Kevin Soriao delights in helping the kitchen by mixing guacamole with avocado and lime, loves the crunch of homemade taco shells, and they can name the ingredients of a classic chicken pozole,
    though they sometimes sneak extra chocolate chips into the cookie dough.
  core: Kevin Soriao is a meticulous little creator who blends bright folk art, puzzle-solving, and quiet curiosity into a world of colorful structures, while occasionally forgetting chores like brushing
    teeth.
background:
  cultural: Kevin grows up in a bilingual Mexican-American family in Los Angeles. His parents speak Spanish at home and celebrate Mexican traditions such as Día de los Muertos, Las Posadas, and Mexican
    Independence Day, blending them with Southern Californian influences. He regularly enjoys Mexican cuisine, family gatherings, and community events, which foster a strong sense of family, respect, and
    harmony. Exposure to Mexican art, music, and folklore fuels his appreciation for vibrant colors, storytelling, and collaborative values.
