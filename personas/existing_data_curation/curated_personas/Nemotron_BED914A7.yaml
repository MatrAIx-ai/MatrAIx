  hobbies: '[''Saltwater Fishing'', ''Kayaking'', ''Lowcountry Cooking'', ''Chess'', ''Genealogy Research'', ''Community Art Volunteering'', ''Jazz Listening'', ''Gardening'', ''Sailing'']'
  career_goals: Although retired, Fred aims to preserve and share the cultural heritage of African‑American communities along the South Carolina coast by authoring a memoir and curating a traveling exhibition
    of oral histories and artifacts. He plans to launch a modest woodworking studio that offers hands‑on classes to seniors and teenagers, fostering intergenerational skill transfer. Additionally, Fred
    aspires to fund his grandchildren’s college education through a family scholarship, travel to historic African diaspora sites in Ghana and the Caribbean, and earn a certification in marine conservation
    to contribute to local shoreline restoration projects.
