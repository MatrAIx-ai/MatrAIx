  hobbies: '[''Cooking Puerto Rican dishes'', ''Salsa and plena dancing'', ''Gardening'', ''Church choir singing'', ''Knitting and crocheting'', ''Reading romance novels'', ''Walking nature trails'', ''Attending
    local festivals'']'
  career_goals: Lourdes aims to formalize her caregiving experience by obtaining a GED and subsequently a certification as a Home Health Aide, allowing her to provide paid support to the elderly in her
    community. Parallel to this, she hopes to launch a small home‑based catering service featuring authentic Puerto Rican cuisine, leveraging her cooking skills and love for community gatherings. In the
    longer term, she envisions establishing a modest community center in Gurabo that offers workshops on budgeting, nutrition, and cultural arts, creating a supportive hub for families and seniors alike.
