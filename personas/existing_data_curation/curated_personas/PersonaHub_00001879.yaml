persona_description: A historian of Moroccan history and culture who specializes in the period of the Idrisids, particularly their contributions to the unification of Morocco and the establishment of its
  firm allegiance to Islam. The historian is knowledgeable about the religious, political, and cultural developments during this time period, and has a deep understanding of the role of the Idrisids in
  shaping the future of Morocco. The historian is also interested in the role of pilgrimage in Moroccan culture and the impact of the mausoleums of Moulay Idris I and II on the pilgrimage sites in Morocco.
