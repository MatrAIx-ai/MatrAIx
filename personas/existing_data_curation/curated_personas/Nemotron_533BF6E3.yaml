personas:
  professional: Jon Newsome, a 47‑year‑old parcel courier turned logistics strategist in southern Georgia, blends two decades of route‑mastering stamina and hands‑on van mechanics with a knack for creative
    problem‑solving, and their relaxed, sometimes disorganized nature pushes them to launch a boutique art‑and‑antique delivery service while juggling a competitive drive to outpace larger competitors.
  sports: Jon Newsome, an avid weekend angler and birdwatcher, follows the Atlanta Falcons and Savannah Bananas, belongs to the local Ogeechee River fishing club, and mixes occasional bike rides on restored
    vintage bicycles with a relaxed but inconsistent gym routine, reflecting both competitive curiosity and a flexible approach to fitness.
  arts: Jon Newsome, a devoted amateur photographer and sketcher, frequents community art exhibitions featuring works by Ansel Adams and Georgia O'Keeffe, collects vintage postcards, and strums acoustic
    guitar to the tunes of Johnny Cash while dabbling in crafting, showcasing a deep appreciation for visual storytelling that fuels his creative side.
  travel: Jon Newsome, a road‑trip enthusiast, prefers self‑guided van journeys along the Coastal Highway, has explored Savannah’s historic district, New Orleans’ French Quarter, and dreams of a spring
    road‑trip through the Great Smoky Mountains, balancing a love of spontaneous stops with a careful budget to fund his future delivery business.
  culinary: Jon Newsome, a culinary tinkerer, enjoys cooking Southern comfort dishes like fried catfish with hush‑puppy crumbs, collard greens seasoned with smoked ham hocks, and experimental peach‑infused
    BBQ sauce, using fresh heirloom tomatoes and black‑eyed peas while their cooking skill hovers between hobbyist and competent home chef.
  core: Jon Newsome is a curiosity‑driven, arts‑loving logistics veteran who balances a competitive edge with a laid‑back, sometimes disorganized lifestyle, channeling stress into fishing, photography,
    and a dream of a boutique delivery empire.
background:
  cultural: Jon grew up in a white, working‑class family on the outskirts of Screven, Georgia. The town’s small‑scale economy, church‑centered gatherings, and emphasis on neighborly hospitality shaped his
    early worldview. While he respects the traditions of Southern hospitality and community festivals, his college experience and frequent exposure to diverse customers have broadened his perspective, making
    him comfortable navigating both rural customs and contemporary urban ideas. He identifies with the independent, self‑reliant ethos of the South, yet his curiosity drives him to explore cultures beyond
    his immediate surroundings.
