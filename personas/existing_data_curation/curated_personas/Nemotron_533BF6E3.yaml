  hobbies: '[''Photography'', ''Visiting art galleries and craft fairs'', ''Collecting vintage postcards'', ''Birdwatching'', ''Fishing in local waterways'', ''Reading historical non‑fiction and speculative
    fiction'', ''Playing acoustic guitar'', ''DIY vehicle maintenance'', ''Cooking Southern comfort food'', ''Exploring coffee shops'']'
  career_goals: Jon aspires to transition from frontline courier work to a supervisory or ownership role in the local logistics sector. He envisions launching a boutique delivery service that specializes
    in transporting artwork and antiques for galleries and private collectors, leveraging his appreciation for art and his deep knowledge of the area. Over the next five years he plans to complete a certificate
    in supply‑chain management, streamline his operations to reduce stress, and build a small team of reliable drivers.
