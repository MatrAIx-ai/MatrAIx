  career_goals: As she approaches retirement age, Brianna aims to secure a stable part‑time schedule that allows her to maintain financial independence while staying engaged at work. She hopes to transition
    into a supervisory or mentorship role, formally training new cashiers and sharing best practices. Brianna is also interested in enrolling in community‑college courses on elder services or nonprofit
    administration so she can volunteer as a coordinator at the local senior center, eventually leveraging her retail experience to manage a small community‑run kiosk or café.
