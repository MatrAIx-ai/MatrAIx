personas:
  professional: A seasoned cashier with decades of point‑of‑sale expertise, Brianna Lum leverages her precise cash handling, calm conflict‑diffusing style, and love for structured routines to mentor new
    staff, while navigating occasional disorganized shifts with a friendly, team‑first attitude.
  sports: A devoted fan of the San Francisco Giants and Golden State Warriors, Brianna Lum joins the senior‑center’s weekly low‑impact dance class and a local walking club that meets at Golden Gate Park,
    preferring gentle cardio over intense competition while cheering loudly from her garden bench during games.
  arts: A dedicated pottery hobbyist and mystery‑novel aficionado, Brianna Lum finds inspiration in the music of Norah Jones, the films of Morgan Freeman, and the guitar work of Carlos Santana, often displaying
    her hand‑thrown mugs alongside a stack of Agatha Christie paperbacks at neighborhood potlucks.
  travel: Brianna Lum enjoys spontaneous day‑trips to Sonoma wine country and weekend getaways to Monterey, while dreaming of attending a cultural festival in Kyoto, balancing her love for multicultural
    celebrations with the constraints of a part‑time schedule and modest travel budget.
  culinary: With a green thumb and a sweet tooth, Brianna Lum blends fresh rosemary and thyme from her garden into flaky apple‑cinnamon pie crusts, perfects a hearty chicken pot pie, and delights in tasting
    Vietnamese pho at local festivals, though she sometimes forgets to turn off the oven after baking.
  core: Brianna Lum is a structured yet delightfully flexible 64‑year‑old who balances meticulous cash handling with spontaneous community dancing, a knack for mentoring, and an unapologetic fondness for
    late‑night pie baking.
background:
  cultural: Brianna is a third‑generation white American of Irish‑German ancestry who grew up in suburban California. She identifies with mainstream American cultural traditions while also embracing the
    Bay Area’s multicultural environment. Her upbringing emphasized community involvement, practical self‑reliance, and an appreciation for diverse cultural events in Fremont, such as the Festival of the
    Arts and local farmers’ markets. She maintains close ties to a local church women’s group and often incorporates an inclusive, progressive outlook shaped by her long‑term residence in a diverse, tech‑centric
    region.
