  hobbies: '[''Urban Dance'', ''Live Music Events'', ''Cooking Ethiopian Cuisine'', ''Travel Blogging'', ''Fitness Dance Classes'', ''Community Volunteering'', ''Hosting Social Gatherings'', ''Public Speaking'']'
  career_goals: Takeisha aims to move from managing a single location’s daily activities to overseeing multiple sites as a regional operations director within the next five years. She plans to build a reputation
    for turning under‑performing units into high‑output teams, leveraging her networking talent to foster partnerships that boost efficiency. Long‑term, she hopes to launch her own consulting boutique that
    helps small businesses in the Mid‑Atlantic streamline operations while preserving the personal touch that defines her management style.
