personas:
  professional: Anissa Niles, a 48‑year‑old facilities specialist with a knack for creative problem‑solving, leverages her deep expertise in commercial cleaning, budgeting, and team coordination while infusing
    art‑centric touches into workspaces, fostering welcoming environments that reflect her curiosity and sociable nature.
  sports: Anissa Niles, an avid participant in a weekly community‑center dance class and occasional weekend hikes, stays active by blending low‑impact cardio with pick‑up soccer games at the local park,
    while cheering for the Philadelphia Eagles, Phillies, and 76ers as her favorite professional sports teams.
  arts: Anissa Niles, who regularly explores local galleries featuring artists like Kehinde Wiley, volunteers for community theater productions of plays such as Lin‑Manuel Miranda’s ‘Hamilton’ starring
    local talent, and incorporates the rhythmic influence of Nina Simone’s jazz into her dance classes, finds that these artistic experiences shape her identity and fuel her creative approach to everyday
    life.
  travel: Anissa Niles, who prefers spontaneous, culturally immersive trips over rigid itineraries, has already explored the historic streets of Charleston, the vibrant food markets of New Orleans, and
    the mountain art colonies of Asheville, and she hopes to soon travel to Oaxaca for its culinary heritage and Kyoto for its traditional gardens, balancing these adventures with her modest family budget.
  culinary: Anissa Niles, a confident home cook who enjoys blending classic soul‑food comfort with global flavors, frequently prepares dishes like smoked‑paprika jackfruit tacos with cilantro‑lime slaw,
    sweet‑potato collard‑green gratin, and herb‑infused shrimp étouffée using fresh basil, thyme, and garden‑grown rosemary, and she delights in attending weekly cooking workshops that expand her repertoire.
  core: Anissa Niles, a socially magnetic and art‑obsessed facilities pro who thrives on flexibility but often misplaces her keys and forgets to file receipts, channels her curiosity into community murals
    while juggling her ambition to launch a sustainable cleaning venture.
background:
  cultural: Anissa is a Black woman rooted in the Southern African‑American tradition, having grown up in the Dallas‑Fort Worth metroplex. Her family values church fellowship, gospel music, and soul‑food
    cuisine, which remain central to her gatherings and celebrations. She embraces the rich tapestry of Dallas County's multicultural community, often participating in local block parties and cultural events
    that blend African‑American heritage with broader Texan influences. Her upbringing instilled a strong sense of community responsibility, hospitality, and resilience, which she carries into her professional
    and social life.
