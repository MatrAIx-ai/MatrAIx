  career_goals: Anissa aims to advance to a supervisory or facilities‑manager role within the next few years, leveraging her practical expertise and interpersonal strengths. She plans to obtain a certification
    in Facilities Management to broaden her qualifications. Ultimately, she hopes to start her own small cleaning business that emphasizes sustainable practices and integrates local art collaborations,
    allowing her to merge her love for community, flexibility, and creativity. She also envisions volunteering as a docent at a nearby community art center, sharing her enthusiasm for art with others.
