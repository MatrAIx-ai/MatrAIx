  hobbies: '["Gardening", "DIY home‑improvement projects", "Quilting", "Reading historical fiction", "Cooking Midwestern comfort food", "Hiking local trails", "Volunteering with Habitat for Humanity"]'
  career_goals: April aims to transition from laborer to a supervisory role within the next three years. She plans to earn a Certified Construction Manager (CCM) credential and complete an OSHA 30‑hour
    trainer certification, positioning herself for a crew foreman or site safety officer position. In the longer term, she hopes to start a small residential remodeling business that emphasizes quality,
    reliability, and safe work practices, providing a stable future for herself and her teenage daughter.
