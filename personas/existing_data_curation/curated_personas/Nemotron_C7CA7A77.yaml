personas:
  professional: Jerry Soper is an aspiring young game developer and digital artist who merges elaborate LEGO constructions with interactive Scratch stories, channeling boundless imagination into structured
    coding projects while balancing school responsibilities with creative play.
  sports: Jerry Soper cheers passionately for the Kingwood High School Cougars football team on Friday nights, follows the Dallas Cowboys on TV, plays on the Kingwood Strikers youth soccer team after school,
    and occasionally practices batting at the neighborhood baseball diamond imitating a favorite local player.
  arts: Jerry Soper is a budding comic‑strip creator who fills sketchbooks with fantasy landscapes inspired by the cinematic scores of John Williams and Hans Zimmer, admires the animation style of Pixar
    and Studio Ghibli, and practices piano chords while humming the themes of their favorite movies, often sharing drawings with friends at school.
  travel: Jerry Soper loves road trips that combine family visits to the historic San Antonio River Walk and weekend camping at Huntsville State Park, dreams of exploring the glittering lights of Tokyo
    for its anime culture, and usually plans outings around school holidays and the limited budget of a middle‑class family.
  culinary: Jerry Soper delights in the smoky taste of family‑cooked brisket at backyard barbecue gatherings, enjoys assembling quick snacks like cheese‑filled tortilla roll‑ups, and experiments with making
    simple LEGO‑themed fruit kebabs, though they often skip vegetables in favor of chip‑laden snack packs.
  core: Jerry Soper is an imaginative 11‑year‑old who fuses storytelling with building blocks, worries often about school pressure, and channels that stress into vivid drawings, LEGO creations, and the
    occasional impulsive splurge on new kits.
background:
  cultural: Jerry was raised in Kingwood, a suburban community in Montgomery County, Texas. His family reflects a typical middle‑class Texan upbringing, valuing close family ties, community events like
    local fairs, and a blend of Southern hospitality with modern American pop culture. He attends a public elementary school where he experiences a mix of traditional values and diverse extracurricular
    opportunities. His cultural exposure includes regional traditions such as barbecue gatherings, high‑school football games, and holiday celebrations, alongside a strong emphasis on education and technology
    that encourages his curiosity and imaginative pursuits.
