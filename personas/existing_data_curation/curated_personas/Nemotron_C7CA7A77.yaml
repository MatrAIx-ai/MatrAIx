  career_goals: Jerry dreams of turning his love for imagination into a career that lets him create worlds for others. He hopes to study graphic design or animation in high school and later become a video
    game developer or concept artist. He also imagines exploring scientific fields such as robotics or marine biology, where he can apply his problem‑solving skills to real‑world challenges. In the short
    term, he aims to win his school’s science fair, build a polished portfolio of artwork, and learn more advanced coding languages like Python to prepare for future studies.
