  hobbies: '[''Fishing'', ''Listening to R&B/Soul Music'', ''Basketball (recreational)'', ''Church Choir Participation'', ''Cooking Soul Food'', ''Car Maintenance & Restoration'', ''Chess'', ''Watching
    Classic Movies'', ''Community Volunteering'', ''Collecting Vintage Vinyl Records'']'
  career_goals: Jadarius aims to move up within the logistics field by obtaining a forklift certification and an associate degree in supply chain management. Over the next three years, he hopes to be promoted
    to shift supervisor, eventually aspiring to a warehouse manager role where he can design efficient workflows and mentor newer staff. His competitive drive pushes him to seek leadership responsibilities
    that provide clearer structure and higher earnings, helping him secure financial stability and the possibility of home ownership in his community.
