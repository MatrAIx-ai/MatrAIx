  career_goals: Even at 69, Lily aims to deepen her impact at the information desk by mentoring younger clerks and spearheading a small‑scale digital‑archiving project for local historical documents. She
    hopes to acquire certification in modern cloud‑based office systems, enabling her to advise nearby small businesses on efficient record‑keeping. Ultimately, Lily envisions transitioning to a part‑time
    consulting role that blends her administrative expertise with community outreach, such as leading digital‑literacy workshops for senior residents and contributing to a curated collection of Bloomfield’s
    oral histories.
