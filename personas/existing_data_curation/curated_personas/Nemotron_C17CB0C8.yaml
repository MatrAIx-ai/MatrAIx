  career_goals: Kelvin aims to leverage his disciplined work ethic and competitive drive to become a top-performing student and eventually pursue a career in either software engineering or sports management.
    He hopes to earn a scholarship to a prestigious university, where he can deepen his coding skills while continuing to develop as an athlete. Long‑term, Kelvin envisions mentoring younger Black youth
    in his community, using his experience in robotics, coding, and basketball to inspire them to set high standards and achieve their own goals.
