persona_description: A geologist who specializes in the study of planetary geology, particularly the formation and evolution of volcanoes on Mars. His research interests include, but are not limited to,
  the composition of Martian meteorites, the structure and composition of Martian volcanoes, and the interaction between Martian volcanoes and the Martian mantle. He is particularly interested in understanding
  the formation and evolution of Martian volcanoes and the role of mantle plumes in their formation.
