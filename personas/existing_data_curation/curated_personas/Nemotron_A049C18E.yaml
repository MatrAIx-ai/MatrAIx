  career_goals: Feliza aims to transition into a senior leadership role such as Quality Assurance Manager or Process Improvement Director, where she can spearhead the integration of advanced testing technologies,
    including AI‑driven inspection systems and machine‑vision tools. She plans to earn the ASQ Certified Quality Engineer (CQE) and Six Sigma Black Belt certifications to formalize her expertise. Her ambition
    includes establishing a mentorship program for women and bilingual employees, positioning herself as a top performer recognized for both operational excellence and innovative contributions. Long‑term,
    she envisions launching a consulting boutique that helps manufacturers adopt lean, data‑driven quality frameworks while preserving cultural inclusivity.
