  hobbies: '[''Visiting art galleries and museums'', ''Reading historical and biographical books'', ''Genealogy research'', ''Knitting and quilting'', ''Gardening (herbs and roses)'', ''Crossword puzzles
    and jigsaw puzzles'', ''Birdwatching'', ''Attending community theater performances'', ''Listening to classical music and opera'', ''Cooking and experimenting with new recipes'', ''Writing memoirs and
    letters'']'
  career_goals: Although retired from formal employment, Bertha remains driven by personal milestones. She aims to complete a comprehensive memoir that intertwines her family's story with the history of
    Du Bois and Clearfield County. She plans to spearhead a local oral-history project, recording the recollections of longtime residents for preservation. Learning advanced digital photography and editing
    is a near-term goal to document her gardening and craft projects. Bertha also aspires to curate a small community art exhibition showcasing works of local senior artists. On the practical side, she
    wishes to establish a modest online shop for her hand‑made quilts, providing supplemental income for her family, while ensuring her husband’s health and financial security remain well managed.
