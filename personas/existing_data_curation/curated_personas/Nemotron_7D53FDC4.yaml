  hobbies: '["Watching Liga MX soccer matches", "Cooking traditional Mexican cuisine", "Playing community baseball", "Restoring vintage tools and DIY home projects", "Evening walks in local parks", "Attending
    Mass and parish activities"]'
  career_goals: Sixto aims to advance to a senior sales or regional management role within the next three to five years, where he can mentor newer representatives and shape strategic sales plans. He seeks
    certification in sales analytics to complement his practical experience and increase his confidence in meeting quotas, which would also reduce his worry about performance pressure. A long‑term ambition
    is to secure a stable financial foundation for his family, enabling an early retirement with enough savings to support his grandchildren’s education. He also hopes to build stronger partnerships with
    Mexican‑based suppliers, leveraging his cultural background to open new market channels for his company.
