persona_description: A clinician who specializes in the diagnosis and management of red cell disorders, particularly anemias and polycytemias. They are interested in the specific causes of anemia and the
  clinical presentation of these conditions, and are skilled in the interpretation of laboratory tests and the use of blood films to diagnose and classify these disorders. They are also knowledgeable in
  the use of hematological indices such as MCV, MCH, MCHC, RDW, and reticulocyte count to assess the severity of anemia and the adequacy of red cell production.
