  hobbies: '["Abstract Painting", "Experimental Photography", "Visiting Art Galleries", "Science‑Fiction and Philosophy Reading", "Fusion Cooking (South Asian & Floridian)", "Community Theater", "Team Volleyball",
    "Habitat for Humanity Volunteering", "Kayaking in Coastal Mangroves"]'
  career_goals: Aicha aims to advance to a senior executive role—such as Director of Construction or Vice President of Development—within a forward‑looking firm that values innovative, sustainable design.
    She plans to earn PMP and LEED‑AP credentials, lead multi‑million‑dollar mixed‑use projects that blend artistic elements with green building practices, and eventually launch her own consultancy focused
    on integrating cultural aesthetics into modern construction. Mentoring women and underrepresented professionals in the trades is also a core ambition.
