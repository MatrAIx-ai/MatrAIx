  career_goals: At this stage, Jihyun aims to transition from day‑to‑day management to senior advisory and board roles within nonprofit arts organizations, particularly those that promote Korean and broader
    Asian cultural heritage in the Philadelphia region. She aspires to lead a flagship cross‑cultural exhibition that travels between the United States and Korea, and to mentor the next generation of arts
    administrators. Additionally, she hopes to author a book on the evolution of Korean diaspora art and to serve as a consultant for corporations seeking culturally informed art acquisition strategies,
    all while maintaining a balanced schedule that allows time for family and personal enrichment.
