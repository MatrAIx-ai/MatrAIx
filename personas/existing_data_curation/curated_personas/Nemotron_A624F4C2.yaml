personas:
  professional: Jihyun Park, a veteran arts manager with a track record of strategic planning, budget oversight, and cross‑cultural curatorial projects, leverages methodical organization, bilingual fluency,
    and a curiosity‑driven mindset to guide nonprofit boards toward impactful Asian heritage exhibitions, and they consistently champion collaborative decision‑making while asserting clear vision.
  sports: Jihyun Park maintains fitness with daily walks along the Schuylkill River Trail, weekly restorative yoga at the Center for Women’s Wellness, and occasional tennis at the Fairmount Tennis Club,
    while avidly supporting the Philadelphia Eagles, the Phillies, and the Flyers each season, and they view these routines as essential balance to a busy professional life.
  arts: Jihyun Park frequently visits the Philadelphia Museum of Art to study works by Lee Ufan, Cai Guo‑Qiang, Yayoi Kusama, and Anish Kapoor, writes art criticism on contemporary narratives like Han Kang’s
    literary portraits, and curates private displays of traditional calligraphy and porcelain, blending modern and historic perspectives, and they approach each exhibition with a blend of scholarly rigor
    and personal curiosity.
  travel: Jihyun Park prefers thoughtfully planned, bi‑annual trips to Seoul for research and cultural immersion, interspersed with weekend getaways to the historic streets of Washington, D.C., and occasional
    longing visits to Kyoto’s temples, balancing a modest travel budget with a desire for in‑depth, low‑key experiences, and they often draft detailed itineraries months in advance.
  culinary: Jihyun Park delights in preparing comforting home‑cooked meals such as bibimbap with gochujang, kimchi jjigae, and japchae, expertly handling fermented soybean paste, perilla leaves, and sweet
    rice flour, while also savoring occasional fine‑dining outings that feature seasonal ingredients like heirloom carrots and wild mushrooms, and they take pride in perfecting the balance of flavors for
    family gatherings.
  core: Jihyun Park is a methodical, curiosity‑driven arts steward who balances meticulous board‑room strategy with a quiet love for solitary calligraphy, garden meditation, and a habit of double‑checking
    every budget line, and they often get lost in a pile of research articles late into the night.
background:
  cultural: Jihyun was born to Korean immigrant parents and grew up navigating both Korean traditions and American society. She maintains strong ties to her heritage through language, seasonal celebrations
    like Chuseok and Seollal, and participation in the local Korean community's cultural festivals and church activities. Her East Asian background informs her aesthetic sensibilities, her respect for hierarchical
    relationships, and her commitment to intergenerational knowledge sharing, while her long residence in Montgomery County, Pennsylvania, has fostered an inclusive, multicultural perspective that she applies
    in both her professional and personal life.
