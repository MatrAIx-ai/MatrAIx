  career_goals: Leonard aspires to become the lead assessor for Hennepin County, guiding a team toward more data-driven and equitable valuation practices. Over the next five years, he plans to earn a Master's
    in Public Administration to deepen his policy expertise, and to champion initiatives that reduce assessment disparities affecting minority neighborhoods. He also aims to develop and deliver community
    workshops that demystify property taxes, and eventually launch a consulting practice focused on fair appraisal methods and urban equity. Recognizing his tendency toward worry, he is committed to building
    a supportive network and incorporating stress-management practices into his leadership style.
