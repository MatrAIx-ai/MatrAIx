personas:
  professional: Leonard Arnold, a Hennepin County property assessor with deep GIS and drone‑imaging expertise, blends curiosity‑driven data analysis with a practical, people‑focused approach, using their
    teaching background to demystify valuation while occasionally battling disorganization and worry as they pursue a lead assessor role and a future consulting practice.
  sports: Leonard Arnold, a weekend kayaker on the Chain of Lakes and volunteer youth basketball coach with the Minneapolis Recreation Association, roots for the Minnesota Timberwolves, Vikings, Twins,
    and Wild, and often attends games with friends while balancing a relaxed approach to personal fitness.
  arts: Leonard Arnold, a devoted patron of Minneapolis’s live jazz scene—frequenting venues where Kamasi Washington and Robert Glasper perform—and an avid hip‑hop listener of Kendrick Lamar and J Cole,
    also finds inspiration in science‑fiction novels by Neal Stephenson and urban‑history podcasts hosted by Jane Jacobs enthusiasts, weaving these cultural threads into their community workshops.
  travel: Leonard Arnold, who relishes planning low‑key weekend getaways to nearby Duluth for lake kayaking and has already explored New Orleans’s soul‑food scene and Tokyo’s tech districts, now dreams
    of a summer trek through Iceland’s fjords, balancing his wanderlust with a modest travel budget and family commitments.
  culinary: Leonard Arnold, an enthusiastic home cook at an intermediate level, frequently crafts soul‑food staples like smoked catfish, collard‑green casserole, and peach‑glazed chicken using fresh basil,
    oregano, and heirloom tomatoes from their balcony garden, while occasionally experimenting with spice blends inspired by their jazz improvisations.
  core: Leonard Arnold is a curiosity‑driven property assessor who blends data‑rich appraisal with community compassion, yet wrestles with chronic worry and a relaxed, sometimes chaotic, lifestyle that
    fuels both creative pursuits and occasional disorganization.
background:
  cultural: Leonard is an African-American who grew up on Minneapolis' north side, where the close-knit community and church played central roles in his upbringing. His family's roots trace back to the
    Great Migration, and he maintains strong ties to local cultural traditions such as celebrating Juneteenth, participating in Kwanzaa gatherings, and supporting the Twin Cities' Black arts scene. These
    experiences shape his commitment to equity in property assessment and his dedication to giving back through mentorship, community service, and advocacy for fair housing.
