personas:
  professional: Aasiyah Brooks, a meticulous child, family, and school social worker in Baltimore County, leverages their disciplined case‑management skills, thorough intake assessments, and culturally
    attuned counseling to craft trauma‑informed service plans, while pursuing licensure as a clinical social worker and a future leadership role that balances high standards with a predictable routine.
  sports: Aasiyah Brooks enjoys low‑key fitness activities such as weekend jogs along the Inner Harbor, participates in a local recreational badminton league, follows the Baltimore Ravens and the Baltimore
    Orioles, and practices yoga three times a week to maintain balance, while they prefer routine over high‑intensity competition.
  arts: Aasiyah Brooks engages deeply with literature, frequently reading contemporary works by Colson Whitehead, Brit Bennett, and Ta‑Nehisi Coates, attends exhibitions at the American Visionary Art Museum
    and the Reginald F. Lewis Museum, and finds comfort in gospel music by Kirk Franklin while knitting scarves inspired by artistic motifs they encounter.
  travel: Aasiyah Brooks prefers carefully planned short getaways, having explored historic Charleston, the gardens of Shenandoah National Park, and the vibrant streets of New Orleans for cultural immersion,
    while dreaming of a future study tour to Ghana to connect with ancestral narratives, and they always budget trips to fit their disciplined financial routine.
  culinary: Aasiyah Brooks, a moderately skilled home cook, delights in gardening basil, mint, and rosemary on her balcony and incorporates these herbs into simple but flavorful dishes like lemon‑herb grilled
    salmon, quinoa bowls with roasted sweet potatoes, and ginger‑turmeric tea, while they occasionally indulge in soul‑comfort foods such as collard greens and cornbread.
  core: Aasiyah Brooks balances a regimented professional life with soothing rituals—yoga, knitting, and herb gardening—to temper their worry‑prone nature, while quietly pursuing ambitious leadership goals
    in school‑based mental health.
background:
  cultural: Aasiyah is an African-American woman raised in Owings Mills, a suburb of Baltimore, with deep ties to the rich cultural history of Maryland's Black community. Her family emphasized the importance
    of education, church involvement, and community service, values that continue to shape her worldview. She grew up attending a local Baptist church where gospel music, storytelling, and communal celebrations
    like Juneteenth reinforced a sense of collective identity. The vibrant artistic scene of Baltimore, including its museums, theater, and literary circles, fostered her appreciation for the arts and informed
    her graduate studies in humanities. Aasiyah draws on her cultural heritage to build trust with the families she serves, integrating traditions of oral storytelling, respect for elders, and communal
    resilience into her social-work practice.
attributes:
  skills: '[''Case Management'', ''Individual and Family Counseling'', ''Crisis Intervention'', ''Needs Assessment'', ''Program Development'', ''Community Resource Coordination'', ''Documentation & Reporting'',
    ''Cultural Competency'', ''Advocacy'', ''Time Management'']'
  hobbies: '[''Reading contemporary African-American literature'', ''Journaling'', ''Herb gardening'', ''Yoga and mindfulness'', ''Knitting'', ''Visiting local museums and historic sites'', ''Mentoring
    high-school students in a small group'']'
  career_goals: Aasiyah aims to become a Licensed Clinical Social Worker within the next three years and to lead a school-based mental health program in Baltimore County that integrates trauma-informed
    care. She plans to pursue a Master's in Social Work to deepen her clinical skills and to obtain certification in evidence-based interventions for children experiencing adversity. Long-term, she aspires
    to supervise a team of social workers, design community-wide youth support services, and influence state child-welfare policy to improve outcomes for marginalized families. Her ambition is to create
    sustainable, data-driven programs that provide consistent, high-quality support while maintaining a balanced, predictable work routine.
