personas:
  professional: Samantha Caviedes, a senior investment analyst with a strong STEM foundation, blends a methodical, skeptical mindset and a competitive drive to craft quantitative models, conduct rigorous
    ESG and risk assessments, and mentor junior analysts while staying curious about emerging fintech tools.
  sports: Samantha Caviedes rides a road bike through the Everglades on weekends, follows the Miami Heat and Tampa Bay Buccaneers closely, and participates in a local Pilates studio’s weekly class, using
    these activities to balance competitive spirit with solitude.
  arts: Samantha Caviedes stays connected to her island heritage by salsa dancing to the rhythms of Celia Cruz and Marc Anthony, enjoys reading biographies of innovators like Elon Musk and Sheryl Sandberg,
    and unwinds with classic films starring Meryl Streep and Al Pacino.
  travel: Samantha Caviedes blends purposeful family visits to her island roots with leisurely getaways to the Florida Keys, and they plan future trips to Barcelona for its architecture, Kyoto for its gardens,
    and Patagonia for adventure, always balancing budget constraints with a desire for cultural immersion.
  culinary: Samantha Caviedes is a confident home cook who perfects traditional ropa vieja and crisp tostones, often adding a twist of smoked paprika and lime zest, and they relish sourcing fresh plantains,
    garlic, and cumin at local farmers’ markets for their weekly dinner parties.
  core: Samantha Caviedes fuses analytical rigor with a love of salsa, never skips a daily crossword, hoards tidy code snippets like trophies, and occasionally forgets to water her indoor succulents during
    intense project cycles.
background:
  cultural: Samantha grew up in a close‑knit Cuban‑American family in Hialeah, where Spanish was spoken at home and community traditions were celebrated year‑round. The vibrant Cuban diaspora in Miami‑Dade
    shaped her identity, instilling a strong sense of resilience, family loyalty, and pride in her heritage. She regularly participates in local festivals, enjoys classic Cuban music and dance, and maintains
    ties with relatives on the island. Her bicultural upbringing gives her a nuanced perspective on both American and Cuban values, which she brings to her professional life through bilingual communication,
    community involvement, and a deep appreciation for the entrepreneurial spirit common among Cuban immigrants.
attributes:
  skills: '[''Financial modeling'', ''Equity and fixed‑income analysis'', ''Risk management'', ''Python data analysis'', ''R statistical programming'', ''SQL database querying'', ''Advanced Excel & VBA'',
