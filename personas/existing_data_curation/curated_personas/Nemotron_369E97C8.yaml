  hobbies: '[''Salsa dancing'', ''Cooking Cuban cuisine'', ''Reading economics and tech books'', ''Puzzle solving (crosswords, Sudoku)'', ''Yoga and Pilates'', ''Everglades nature walks'', ''Traveling to
    Cuba and Florida Keys'', ''Financial literacy volunteering'']'
  career_goals: Samantha aims to move into a senior leadership role within investment management, targeting a Portfolio Manager or Chief Investment Officer position over the next five years. She wants to
    lead a team, design data‑driven investment strategies, and integrate emerging fintech tools and AI‑enhanced analytics into the firm’s decision‑making process. Her competitive drive pushes her to consistently
    outperform benchmarks and develop proprietary models that deliver alpha. In parallel, she is committed to mentoring junior analysts, especially Hispanic women, and plans to launch a boutique advisory
    service that caters to the Latin‑American community’s unique financial needs. Long‑term, she envisions establishing a financial education nonprofit that empowers Spanish‑speaking adults in South Florida.
