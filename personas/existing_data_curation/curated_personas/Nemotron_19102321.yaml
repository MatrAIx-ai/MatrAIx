  career_goals: Raymond dreams of exploring the world in many ways. He often talks about becoming an astronaut who can travel to space, an artist who paints colorful pictures, or a scientist who discovers
    new things. He also enjoys the idea of helping friends learn, so he imagines being a teacher one day. His organized nature leads him to think about jobs where he can plan projects, like an engineer
    or a museum curator, where he can combine his love for art and new ideas. As he grows, he wants to use his curiosity to solve problems and share his excitement with others.
