personas:
  professional: Raymond Bougard, a five-year-old preschooler, already dreams of becoming a community librarian, channeling his methodical habit of arranging picture books by color and his boundless curiosity
    about how stories are created, while his outgoing nature shines during storytime circles where they eagerly answer questions and share ideas.
  sports: Raymond Bougard, a five-year-old energetic participant in the local Little League t-ball league and neighborhood soccer sprint, proudly wears a Milwaukee Brewers cap during practice, idolizes
    the Milwaukee Bucks on game nights, and spends weekends at the community recreation center mastering the monkey bars, balancing structured team drills with spontaneous playground races.
  arts: Raymond Bougard, an avid fan of library storytime, loves drawing colorful dinosaurs after watching 'Sesame Street' episodes, sways to 'The Wiggles' and 'CocoMelon' songs, and recently delighted
    in a museum field trip that introduced them to glassblowing, fueling a budding appreciation for visual arts and performance.
  travel: Raymond Bougard, whose family vacations include splash-filled days at Wisconsin Dells water parks, annual trips to Milwaukee's lakefront summer festival, and short weekend visits to Chicago's
    Navy Pier, dreams of one day exploring Disney World's Magic Kingdom, and they approach travel with a mix of meticulous parental planning and an eager desire for new playgrounds.
  culinary: Raymond Bougard, a picky-but-adventurous eater, favors mac and cheese, chicken nuggets, buttered pancakes topped with blueberries, and delights in assembling rainbow fruit kebabs of grapes,
    strawberries, and banana slices, often helping stir batter under parental supervision while eagerly anticipating holiday meals like turkey with cranberry sauce.
  core: Raymond Bougard, a five-year-old bundle of curiosity and organized chaos, balances an enthusiastic love for play with a lingering worry about missing the next storytime, often hoarding stickers
    and insisting on lining up toys by size.
background:
  cultural: Raymond grows up in Cudahy, a suburban city in Milwaukee County, Wisconsin. His family is part of a largely white, Midwestern community where values such as friendliness, modesty, and community
    involvement are common. Family life includes celebrating widely observed American holidays like Thanksgiving, Christmas, and the Fourth of July, often with gatherings that feature shared meals and outdoor
    activities. His parents encourage participation in local events such as Cudahy Summer Fest and community library programs, providing him exposure to arts, music, and multicultural stories. The region’s
    blend of urban influences from nearby Milwaukee and the quieter neighborhood atmosphere gives him access to both city museums and neighborhood parks, shaping a cultural background that values community,
    outdoor recreation, and appreciation for the arts.
