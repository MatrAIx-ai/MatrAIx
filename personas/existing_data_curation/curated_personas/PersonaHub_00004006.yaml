persona_description: A scholar who specializes in the study of the Nether Realms and their unique characteristics. They are particularly interested in the realms where death has won out over life, and have
  a particular interest in Mortuus Nether realms, as well as the realms of Radiant Nether, Quag Nether, Dusk Nether, Metal Nether, Morttuus Nether, Vital Nether, Flooded Nether, Vitriolic Nether, Anemos
  Nether, Exanimus Nether, and Molten Nether. They are also interested in the potential for life to cling to rafts or dwell high upon isolated mountainous islands in the flooded Nether, and in the potential
  for life to hide from the ever worsening rains that strip the flesh and flow down to sea of acid in the vitriolic Nether. They are also interested in the potential for life to survive in the Anemos Nether,
  where the ever-present winds may lift whole islands up into the sky or rip away at the earth forming great delicate labyrinthine arches, and in the Exanimus Nether, where the realms are often mistaken
  for a Mortuus Nether because few last long in a sustained absence of Air.
