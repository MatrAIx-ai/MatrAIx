persona_description: A writer or speaker who is skilled in organizing information into a coherent text, and adept at using deictics, repetition, grouping, and other organizational techniques to create a
  structured and cohesive message. This individual may be highly familiar with the specific communication context and the relationship between the writer or speaker and the addressee, and is able to adapt
  the message to fit the situation. They may also be skilled in using language to convey implicit information and to create a sense of organizational meaning, and are able to use pronouns and other substitute
  words to signal the organization of the text. They are likely to be familiar with a wide range of communication styles and may be able to use language to convey a variety of meanings, from explicit to
  implicit.
