  hobbies: '[''Reading non-fiction (business, self-improvement)'', ''Jogging'', ''Hiking (solo or with spouse)'', ''Home brewing'', ''Woodworking'', ''Puzzle solving (crosswords, Sudoku)'', ''Cooking'',
