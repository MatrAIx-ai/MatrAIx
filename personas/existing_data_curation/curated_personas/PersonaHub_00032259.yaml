persona_description: A researcher and engineer specializing in the field of electro-optic and photonic instrumentation, with a focus on the design and realization of optical sensors and instruments. They
  have expertise in diffraction-based instrumentation, optical fiber sensors, optical gyroscopes, laser vibrometers, and laser triangulation sensors. They have experience in teaching and research in this
  field, and are skilled in the development of practical examples and numerical analysis of performance and specifications. They are interested in the latest advancements and trends in this field, and have
  a passion for sharing their knowledge with others.
