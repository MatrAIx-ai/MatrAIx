  career_goals: She plans to earn her GED within the next year, then enroll in a community‑college program in horticulture or environmental technology that offers flexible, hands‑on coursework. Her long‑term
    ambition is to combine her love of the outdoors with entrepreneurship by launching a small‑scale sustainable landscaping service that designs low‑maintenance, native‑plant gardens for homeowners in
    Rappahannock County. She also hopes to build a freelance portfolio of web‑design and graphic‑design projects, allowing her to generate income while maintaining a schedule that respects her spontaneous,
    low‑structure work style. Stephanie aims to be recognized locally for the quality and practicality of her designs, and she envisions entering regional craft or garden‑design competitions to test her
    skills against peers, fueling her competitive drive. In parallel, she wishes to develop a solid foundation in technical troubleshooting so she can offer DIY‑repair consultations to neighbors, reinforcing
    her reputation as a reliable problem‑solver.
