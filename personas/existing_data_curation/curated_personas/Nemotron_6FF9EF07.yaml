personas:
  professional: Charles Zegarra, a 13‑year‑old tech enthusiast from Wrentham, balances curiosity with practicality by leading his school’s robotics club build sessions, coding simple arcade‑style games
    after school, and meticulously documenting each LEGO Technic project in a color‑coded planner, all while aiming to develop a science‑fiction‑themed mobile app by the end of the semester.
  sports: Charles Zegarra, a member of the Wrentham Wolves youth soccer squad and the Easton Eagles middle‑school basketball team, spends weekends sprinting in after‑school drills, cheers for the Boston
    Celtics and New England Patriots during the season, and integrates scouting hikes in the nearby state parks into cross‑training to boost endurance.
  arts: Charles Zegarra, who devours science‑fiction novels such as Ender’s Game and The Martian while listening to the synth‑heavy sounds of Daft Punk and the lyrical storytelling of Billie Eilish, regularly
    watches the documentary series Cosmos to fuel their love of space, and channels that inspiration into building intricate LEGO Technic models that double as kinetic art pieces.
  travel: Charles Zegarra, who prefers day trips planned with Google Maps that combine school breaks with family getaways, has charted routes to Boston’s Freedom Trail, explored the cobblestone streets
    of Boston’s North End for a historic pizza tour, trekked the cliffs of Acadia National Park during a Fourth of July weekend, and dreams of backpacking through the Canadian Maritimes next summer.
  culinary: Charles Zegarra, an aspiring home‑chef with a moderate skill level, loves whipping up a hearty bowl of New England clam chowder topped with crisp bacon, perfecting classic mac and cheese using
    sharp cheddar and a dash of hot sauce, and baking pumpkin‑spice pancakes on Thanksgiving mornings, all while occasionally over‑seasoning their pizza with extra pepperoni and anchovies.
  core: Charles Zegarra, a 13‑year‑old who blends relentless organization with a love for team sports and tech tinkering, habitually color‑codes every notebook, forgets to turn off phone notifications during
    study sessions, and can be caught humming the theme of their favorite space documentary while sketching LEGO designs.
background:
  cultural: Charles comes from an Anglo‑American background typical of suburban New England. Growing up in Wrentham, MA, he experiences a culture that values education, community involvement, and seasonal
    traditions such as Thanksgiving, Fourth of July celebrations, and winter holiday gatherings. His family emphasizes participation in local sports leagues, school clubs, and volunteer service, reflecting
    a community‑oriented, middle‑class Massachusetts upbringing.
