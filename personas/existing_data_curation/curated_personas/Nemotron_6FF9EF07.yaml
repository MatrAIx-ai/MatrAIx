  career_goals: Charles aspires to pursue a career in engineering, specifically mechanical or robotics engineering, where he can combine his curiosity for new technologies with practical problem‑solving.
    He aims to attend a specialized STEM high school, earn a scholarship for a top university engineering program, and eventually work on sustainable design projects such as renewable‑energy‑powered robots.
    In the long term, he hopes to mentor younger students by establishing a community robotics workshop in his hometown.
