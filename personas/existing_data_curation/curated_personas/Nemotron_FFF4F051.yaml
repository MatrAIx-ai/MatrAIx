personas:
  professional: Westley Palmer, a seasoned office administrator turned community art coordinator, blends decades of clerical precision with a spontaneous, compassionate approach, offering mentorship to
    younger staff while juggling flexible schedules and occasional chaos.
  sports: Westley Palmer, a devoted fan of the Los Angeles Lakers and occasional member of the local Desert Trail Hiking Club, enjoys low‑impact fitness through sunrise hikes and bird‑watching treks, while
    attending Lakers games at the arena for community camaraderie.
  arts: Westley Palmer, an avid patron of the Palm Springs Art Museum and regular attendee of seasonal Coachella Valley art shows, finds inspiration in the works of Georgia O'Keeffe and Ansel Adams, and
    often spends evenings listening to Miles Davis while painting watercolors of desert sunsets.
  travel: Westley Palmer, a lover of mindful, low‑stress travel, prefers weekend road trips to the Grand Canyon and Sedona for photography, dreams of a summer visit to Florence’s Uffizi Gallery, and carefully
    plans itineraries to accommodate a modest budget and need for rest.
  culinary: Westley Palmer, who favors fresh, Mediterranean‑inspired meals, often prepares grilled salmon with rosemary, roasted figs, and quinoa salads at home, while indulging in occasional Mexican fish
    tacos and savoring a cup of Ethiopian coffee during art gallery openings.
  core: Westley Palmer, a 69‑year‑old compassionate administrator turned art volunteer, blends meticulous clerical habits with spontaneous creativity, balances modest finances with occasional splurges,
    and finds solace in desert walks, jazz, and community exhibitions despite a tendency to worry.
background:
  cultural: Westley is a white American who came of age in the post‑World War II era, likely in a suburban California or Midwestern environment. His upbringing reflected the mid‑century values of hard work,
    community responsibility, and moderate social conservatism, tempered by the cultural shifts of the 1960s and 1970s. Settling in Palm Desert, he has embraced the retirees‑heavy, desert‑oriented lifestyle
    that emphasizes leisure, outdoor activity, and a strong appreciation for the arts. He identifies with the local blend of laid‑back attitudes, respect for nature, and a supportive community ethos.
