  career_goals: At 69, Westley aims to transition into a mentorship role where he can share his decades of administrative experience with younger staff, fostering a collaborative and harmonious workplace.
    He hopes to volunteer as a coordinator for local art programs, using his organizational skills to support community exhibitions and workshops. A personal ambition is to improve his digital proficiency—particularly
    in digital archiving—to stay relevant while reducing workplace stress. Ultimately, he seeks to balance part‑time work with meaningful volunteer involvement, ensuring financial stability without compromising
    his well‑being.
