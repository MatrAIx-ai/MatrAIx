  career_goals: Grace aims to advance to a senior executive role, ultimately becoming a chief financial officer within the next five to seven years. She wants to lead a finance function that embraces technology-driven
    solutions such as fintech tools and promotes sustainable, data-rich decision-making. Leveraging her artistic curiosity, she also envisions establishing a community-focused arts-funding program where
    she can apply her financial expertise to support local creators. To bolster her credentials, she plans to pursue a CFA designation or an executive MBA. Alongside professional ambition, Grace is committed
    to cultivating better stress-management habits and achieving a healthier work-life balance after her recent separation.
