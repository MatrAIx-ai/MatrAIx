  hobbies: '[''Community Volunteer Painting'', ''Guitar Jam Sessions'', ''Softball League'', ''Hiking in State Parks'', ''Fishing on Lake Mendota'', ''Digital Photography of Architecture'', ''DIY Woodworking'',
