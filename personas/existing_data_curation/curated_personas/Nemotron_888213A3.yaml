personas:
  professional: Ernestina Ruiz, a budding game designer, merges a love for magical realism with methodical planning by drafting storyboards for Scratch games before coding, volunteers to help peers debug,
    and lets their empathetic nature shape game narratives that encourage cooperation, even when anxiety occasionally delays their progress.
  sports: Ernestina Ruiz anchors the midfield for their middle‑school soccer team, eagerly follows the city’s professional women’s soccer club, the Skyhawks, joins a weekend youth athletics club for track‑and‑field
    where they run the 400 m, and they consistently stretch with yoga before games to stay flexible, blending competitive drive with holistic fitness.
  arts: Ernestina Ruiz devotes evenings to sketching whimsical beings inspired by contemporary YA authors like Cassandra Clare, rehearses vibrant routines with the community folkloric dance troupe, draws
    creative energy from indie singer‑songwriter Luna Sol and visual artist Diego Torres, and they often turn journal entries into short illustrated stories, reflecting a vivid imagination tempered by a
    structured creative process.
  travel: Ernestina Ruiz prefers low‑key, well‑planned weekend trips to nearby pine‑forested state parks and historic river towns, meticulously maps bus routes using a travel app, dreams of exploring the
    ancient stone citadel of Petra and the misty cliffs of Big Sur, yet they often hesitate to commit to longer journeys due to school responsibilities and lingering anxiety, balancing adventurous curiosity
    with pragmatic caution.
  culinary: Ernestina Ruiz assists in preparing the family’s heritage dishes such as spiced bean stew, hand‑pressed corn tortillas, and a bright roasted‑tomato salsa, can whip up a quick avocado toast for
    friends, enjoys experimenting with fusion twists like adding cilantro‑lime rice, but they frequently forget to clean the kitchen after cooking because they become engrossed in sketching, showcasing
    a blend of culinary curiosity, moderate skill, and occasional disorganization.
  core: Ernestina Ruiz is a methodical dream‑weaver who balances magical storytelling with disciplined routines, yet their intense emotions can turn quiet journaling into spontaneous bursts of creativity
    or sudden bouts of anxiety that they sometimes struggle to contain.
background:
  cultural: Ernestina is raised in a Mexican‑American household in Mecca, California. She grew up speaking Spanish at home and English at school, blending both linguistic worlds. Family celebrations such
    as Día de los Muertos, quinceañera preparations, and weekly gatherings around homemade Mexican food reinforce her cultural identity. Her parents’ roots in the agricultural valleys of Riverside County
    instill a respect for hard work and community collaboration. Catholic traditions coexist with vibrant Mexican music and dance, shaping her values of harmony, cooperation, and pride in her heritage.
attributes:
  skills: '[''Bilingual communication (English-Spanish)'', ''Organizational and time‑management skills'', ''Digital literacy (Google Suite, basic Scratch coding)'', ''Peer counseling and emotional support'',
