  hobbies: '[''Reading contemporary YA and magical realism novels'', ''Journaling and sketching'', ''Folklorico dance'', ''Soccer'', ''Cooking traditional Mexican meals'', ''Basic Scratch programming'',
    ''Yoga and mindfulness'', ''Volunteering at community garden'']'
  career_goals: Ernestina aims to continue her education with a focus on child development and mental health. She hopes to become a bilingual school counselor or elementary teacher who can foster inclusive
    classrooms and support students coping with anxiety. She also dreams of participating in community‑health outreach programs that serve Mexican‑American families, eventually earning a degree in psychology
    or social work to advocate for youth well‑being.
