persona_description: A psychologist who conducts research on the cognitive processes involved in decision-making and prejudice, particularly the role of implicit knowledge and automatic processing. This
  researcher is interested in understanding how implicit stereotypic knowledge affects decision-making and how this knowledge can be controlled or inhibited. They are particularly interested in the relationship
  between implicit stereotypic knowledge and explicit beliefs, and the impact of gender-related information on these relationships. They are also interested in the use of measures such as the SentComp and
  OthsVws to assess implicit stereotypic knowledge and the extent to which participants are aware of these constructs.
