personas:
  professional: Eva Marklew, a high-school senior who leads the robotics club and captains varsity soccer, blends technical tinkering with polished communication to steer team projects, turning skeptically-questioned
    ideas into actionable plans while juggling schoolwork and leadership duties.
  sports: Eva Marklew, a varsity midfielder for the Riverside High Tigers soccer team, trains year-round, follows the tactical play of the Chicago Fire FC for inspiration, and spends weekends at the local
    community center's indoor basketball league, balancing competitive drive with a love for team camaraderie.
  arts: Eva Marklew finds creative release in sketching comic-style cartoons inspired by artists like Bill Watterson, playing piano pieces from Yiruma’s "River Flows in You," and devouring sci-fi novels
    by Neal Stephenson, while also streaming indie game soundtracks from composer Disasterpeace during late-night coding sessions.
  travel: Eva Marklew plans weekend trips with friends to nearby state parks such as Red Rock Canyon, dreams of a future study-abroad stint in Japan's robotics hubs, and occasionally splurges on a weekend
    stay at a themed resort in Orlando, balancing budget-conscious itineraries with an appetite for high-tech cultural immersion.
  culinary: Eva Marklew enjoys whipping up quick stir-fried ramen with miso broth, pepperoni pizza slices, and avocado toast, favors bold flavors like sriracha and smoked paprika, but often forgets to defrost
    chicken in time, leading to a reliance on frozen pizza as a fallback.
  core: Eva Marklew is a strategically-minded, competitively-spirited teen who fuses technical curiosity with people-centric leadership, yet occasionally lets skepticism and impulsive gaming indulgences
    steer them off course.
background:
  cultural: Eva was raised in a middle-class family in Akron, Ohio, within a predominantly white, Midwestern community that emphasizes hard work, modesty, and close-knit neighborhood relationships. Family
    traditions such as attending high school football games, county fairs, and local volunteer events have reinforced her sociable nature and sense of responsibility. The city's industrial heritage and
    the region's focus on practical education have cultivated her pragmatic outlook, while exposure to Akron's cultural festivals and diverse school population has broadened her perspective, nurturing both
    her curiosity and healthy skepticism.
