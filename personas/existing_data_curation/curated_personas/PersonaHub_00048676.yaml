persona_description: A historian who specializes in the study of American civil rights movements, particularly those led by black women. They are interested in exploring the moral context and religious
  influences that shaped these activists' work, and how it reflects their womanist consciousness and practices of witness and testimony. They are drawn to the fascinating narrative style that draws on biography,
  social history, and original archival research, and are motivated by the major work's engrossing history and moving ethical challenge. They are likely to be interested in the civil rights activism of
  black women, and are dedicated to understanding the complex challenges of contemporary social life.
