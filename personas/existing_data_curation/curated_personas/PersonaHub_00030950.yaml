persona_description: A professional development educator who is interested in using online modules from Vanderbilt University's IRIS Center to support teacher development pre-K-12 over the summer and during
  the next school year. They are looking for resources that are scientifically-validated, evidence-based, engaging, and use a variety of modalities to promote access to the general education curriculum
  and accountability for students with disabilities. They are interested in learning about classroom considerations that promote access to the general education curriculum, accountability for students with
  disabilities, and connecting standards-based curriculum to instructional planning.
