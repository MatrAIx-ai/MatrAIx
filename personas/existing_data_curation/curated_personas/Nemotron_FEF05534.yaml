personas:
  professional: Chadrick Wong, a veteran office operations leader with three decades of supervisory experience, blends their deep analytical skill in Excel, Access, and ERP dashboards with a curiosity for
    new efficiency methods, delivering calm yet assertive mentorship while streamlining workflows for their senior team.
  sports: Chadrick Wong, a loyal fan of the Charlotte Hornets and the Carolina Panthers, attends weekly senior walking clubs for low‑impact fitness and spends tranquil mornings fishing at Lake Wylie, where
    the sport doubles as a meditative escape.
  arts: Chadrick Wong, a dedicated collector of classic jazz and gospel vinyl, regularly spins Miles Davis, John Coltrane, and Mahalia Jackson while reflecting on their heritage, and they volunteer as a
    choir accompanist at their church, blending music with community service.
  travel: Chadrick Wong, an intentional planner of modest getaways, prefers serene nature retreats like the Blue Ridge Parkway and historic garden tours in England, balancing their wanderlust with a fixed
    retirement budget and a desire to avoid crowded tourist hubs.
  culinary: Chadrick Wong, an avid home gardener, enjoys cooking vegetable‑forward dishes such as roasted beet & carrot medley and pan‑seared lake fish seasoned with dill and lemon, often pairing meals
    with a glass of chilled white wine and their favorite jazz records.
  core: Chadrick Wong blends disciplined curiosity with practical order, navigating retirement through meticulous budgeting, health vigilance, quiet hobbies, and community mentorship, all while wrestling
    with a persistent undercurrent of worry.
background:
  cultural: Born in 1953 in the Charlotte area, Chadrick grew up amid the civil‑rights movement in the American South. His family emphasized education, perseverance, and community solidarity—core values
    of many African‑American households in North Carolina. Sunday services at a historically Black church instilled a love for gospel music, storytelling, and collective responsibility. He earned a bachelor's
    degree in a STEM field from a state university during a time when Black college enrollment was rising, and his career path has been shaped by navigating predominantly white workplaces while advocating
    for inclusion. Chadrick maintains strong ties to his cultural roots through participation in Juneteenth celebrations, Southern culinary traditions such as collard greens and fried fish, and intergenerational
    mentorship within his church and local community.
