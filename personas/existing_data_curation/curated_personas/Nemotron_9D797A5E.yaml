personas:
  professional: Kevin Rosemin, a seasoned volunteer docent and program coordinator at the Anacostia Community Museum, leverages their meticulous research, analytical rigor, and competitive drive to curate
    immersive exhibits, craft compelling interpretive texts, and mentor younger volunteers with organized precision.
  sports: Kevin Rosemin, a dedicated member of the Capitol Hill Senior Walking Club and an enthusiastic weekly chess competitor, follows the Washington Capitals with fervor, attends occasional community
    basketball pick‑up games for light exercise, and maintains a disciplined routine of morning garden stretches to stay limber, which they credit to their competitive nature.
  arts: Kevin Rosemin, a passionate patron of local galleries, frequently explores exhibitions featuring works by Kehinde Wiley and Amy Sherald, immerses themselves in the sounds of Miles Davis and B.B.
    King while photographing their garden's seasonal blooms, and channels their reflective nature into writing essays that blend art criticism with personal memoir.
  travel: Kevin Rosemin, who prefers carefully planned senior‑friendly itineraries, enjoys weekend trips to New Orleans for its jazz heritage, annual visits to Charleston's historic districts, and occasional
    overseas cultural tours to London’s Victoria and Albert Museum, balancing a modest travel budget with a yearning for immersive art experiences, which they schedule around their volunteer commitments.
  culinary: Kevin Rosemin, an adept home cook who delights in preparing soul‑food classics like collard greens seasoned with smoked turkey, sweet potato pie, and skillet‑fried catfish, often experiments
    with heirloom tomatoes from their garden and pairs meals with homemade sourdough bread, yet occasionally over‑indulges in sugary desserts during family gatherings, which they attribute to their love
    of comfort foods.
  core: Kevin Rosemin, a methodical yet curious 73‑year‑old who blends a competitive spirit with a love for art, gardening, and reflective writing, navigates life with organized precision, occasional skepticism,
    and a habit of turning every garden bloom into a photographic story, which they cherish.
background:
  cultural: Kevin is an African American who grew up during the civil rights era in the mid‑Atlantic region. His family’s roots trace back to the Southern United States, where church fellowship and community
    solidarity were central to daily life. These experiences instilled values of perseverance, respect for elders, and a deep appreciation for Black artistic expression. Residing in Prince George’s County,
    Maryland, he remains closely connected to the vibrant local Black cultural scene, participating in community festivals, church gatherings, and neighborhood advocacy groups that celebrate and preserve
    African American heritage.
attributes:
  skills: '[''Research and analysis'', ''Art curation and exhibition planning'', ''Educational program development'', ''Budgeting and financial management'', ''Public speaking'', ''Mentoring and coaching'',
