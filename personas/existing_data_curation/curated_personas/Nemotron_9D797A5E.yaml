  hobbies: '[''Visiting art galleries and museums'', ''Reading biographies and history'', ''Listening to jazz and blues music'', ''Playing chess'', ''Digital photography'', ''Gardening'', ''Cooking soul
    food'', ''Writing essays and memoir excerpts'', ''Volunteering as an art mentor'']'
  career_goals: Kevin aims to deepen his impact on the local arts community by becoming a lead volunteer docent at the Anacostia Community Museum, where he can share his knowledge of African American art
    and history. He plans to develop an intergenerational art mentorship program that pairs senior volunteers with youth interested in creative expression. Additionally, he aspires to author a memoir reflecting
    on his experiences as a Black man navigating the civil rights era and subsequent decades, and to continue lifelong learning through community‑college courses in art history and digital media.
