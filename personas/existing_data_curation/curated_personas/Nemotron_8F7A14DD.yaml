personas:
  professional: Alfrederick Blango is an aspiring teen game developer who builds small Unity and Python projects, merges digital sketching into game art, and applies a reliably organized yet flexible approach
    that lets them thrive in solitary coding sessions while still collaborating fluidly with a close circle of friends when needed.
  sports: Alfrederick Blango courts the basketball hoop with the Waipahu Warriors junior squad, follows the Los Angeles Lakers for NBA inspiration, dives into laps at the Waipahu Community Swim Club during
    summer, and embraces a steady, harmony-focused training routine that balances skill drills with relaxed pool cool-downs.
  arts: Alfrederick Blango creates digital illustrations of sci-fi scenes reminiscent of Hayao Miyazaki's worlds, strums a ukulele while covering Israel Kamakawiwo'ole's 'Somewhere Over the Rainbow/What
    a Wonderful World' mashups, and curates playlists that blend Kendrick Lamar's beats with The Growlers' surf-rock vibes, all of which feed their creative outlet and quiet evenings.
  travel: Alfrederick Blango plans trips with a mix of spontaneous day-hikes on Oahu's Waianae cliffs, weekend family getaways to Haleakala National Park on Maui, and dream voyages to Tokyo's Akihabara
    for gaming culture immersion and to New Zealand's South Island for its dramatic fjords, favoring budget-friendly itineraries that still feed a curiosity for both local lore and global tech scenes.
  culinary: Alfrederick Blango, a budding home cook, favors building poke bowls with fresh ahi tuna, avocado, seaweed, and soy-ginger dressing, whips up quick spam musubi using seasoned rice and nori, and
    enjoys Saturday night pizza topped with pineapple and jalapeños, while occasionally experimenting with banana-bread muffins that blend coconut and chocolate chips.
  core: Alfrederick Blango is a quietly inventive teen who merges code, ukulele chords, and nature hikes into a harmonious, slightly perfectionist routine that occasionally spirals into late-night gaming
    marathons and sneaker-crazed impulse buys.
background:
  cultural: 'Alfrederick is a Black teenager raised in Waipahu, Hawaii. His family hails from the African American community on the U.S. mainland but relocated to Hawai‘i when his parents sought a vibrant,
    multicultural environment. At home, he experiences a blend of traditions: he celebrates Juneteenth and enjoys soul and hip‑hop music, while also embracing local Hawaiian customs such as attending community
    luaus, learning basic Hawaiian words, and listening to slack‑key guitar. Growing up in a diverse neighborhood, he frequently interacts with peers of Pacific Islander, Asian, and other backgrounds, which
    enriches his worldview and fosters a deep respect for cultural harmony and "ohana" (family) values.'
attributes:
  skills: '["Python programming", "HTML/CSS basics", "Digital illustration", "Ukulele playing", "Swimming", "Basketball", "Time management"]'
  hobbies: '["Coding simple games", "Digital illustration", "Reading sci‑fi novels", "Basketball", "Swimming", "Ukulele playing", "Hiking local trails", "Volunteer beach clean‑ups"]'
  career_goals: Alfrederick aims to pursue a degree in Computer Science with a focus on educational technology, hoping to design accessible learning tools for underserved youth in Hawaii and beyond. He
    is also interested in environmental engineering, inspired by his love for the ocean, and envisions a career that merges technology with sustainable community projects. In the short term, he plans to
    earn a scholarship for a summer coding camp, contribute to his school's robotics team, and engage in local beach‑cleanup initiatives to build both technical and civic experience.
