  career_goals: Miguel aims to transform his practical skill set into a sustainable small‑business venture that serves Keams Canyon and the broader Navajo Nation. His primary goal is to launch a contracting
    service specializing in energy‑efficient home retrofits and solar‑panel installations, leveraging his hands‑on experience and growing expertise in renewable technology. To achieve this, he plans to
    obtain a certified solar‑PV installer credential and OSHA safety training. He also intends to establish a community workshop where he can teach youth and peers trade skills, blending his competitive
    drive with a desire to elevate local self‑reliance. In the long term, Miguel aspires to become a tribal sustainability advisor, influencing policy on renewable energy adoption and construction standards.
