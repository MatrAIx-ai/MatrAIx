personas:
  professional: Miguel Harris is a seasoned sustainable contractor specializing in energy‑efficient home retrofits and solar‑panel installations, blending hands‑on mechanical, electrical, and carpentry
    expertise with a skeptical eye for new technologies, and channeling his competitive drive into building a community workshop that teaches trade skills while advocating for tribal sustainability policies.
  sports: Miguel Harris is an avid hiker who joins the local high‑desert trail club for weekend outings, follows the Arizona Cardinals and the University of Northern Arizona Lumberjacks, and competes in
    regional model‑rocket contests that satisfy his competitive streak while keeping his fitness routine modest but consistent.
  arts: Miguel Harris expresses his creativity through landscape photography inspired by Ansel Adams, guitar compositions tuned to traditional scales, and woodworking projects that echo the motifs of his
    community storytelling gatherings, while he finds inspiration in folk artists like Gillian Welch and the cinematic scores of Ennio Morricone.
  travel: Miguel Harris prefers purposeful road trips that blend adventure with cultural immersion, having explored Monument Valley, Sedona’s red rocks, and the historic pueblos of Santa Fe, while dreaming
    of a future expedition to the ancient ruins of Machu Picchu to study sustainable building practices.
  culinary: Miguel Harris enjoys cooking hearty southwestern dishes such as chile‑rubbed pork shoulder, roasted corn succotash with sage and pine nuts, and homemade blue corn tortillas, skillfully balancing
    his modest home‑cooking abilities with a love for tasting regional fare at local food trucks and community potlucks.
  core: Miguel Harris is a pragmatic, curiosity‑driven craftsman who harmonizes modern sustainability with deep‑rooted desert traditions, competing fiercely in both trade and hobby pursuits while quietly
    safeguarding his community’s future.
background:
  cultural: Born and raised in Keams Canyon, Miguel is a member of the Navajo Nation with deep ties to his tribal community. He grew up speaking both English and Navajo, learned traditional land stewardship,
    and participated in seasonal ceremonies and community gatherings that emphasize respect for the desert landscape. His upbringing instilled an understanding of the balance between modern life and cultural
    heritage, influencing his approach to work and personal interests. While he embraces contemporary technologies and ideas, he remains grounded in Navajo values of self‑reliance, responsibility to the
    land, and the importance of preserving cultural stories for future generations.
