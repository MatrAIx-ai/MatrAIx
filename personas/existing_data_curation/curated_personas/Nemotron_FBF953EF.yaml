personas:
  professional: An experienced senior technical lead, Nitish Iyer blends three decades of full‑stack enterprise development with a pragmatic curiosity for containerization, serverless and AI‑assisted testing,
    designing micro‑service architectures that modernize legacy mainframes while rigorously applying security, performance, and Agile best practices, and now mentors teams and guides organizations toward
    sustainable digital transformation in healthcare and finance.
  sports: An avid weekend cyclist on the Illinois Prairie Path, Nitish Iyer also follows the Chicago Cubs and Chicago Bears, joins a local pickleball league for low‑impact exercise to protect their knees,
    and enjoys occasional solo jogs when they seek quiet focus away from group activities.
  arts: A culturally engaged enthusiast, Nitish Iyer frequently attends Carnatic concerts featuring artists like Sudha Raghunathan, enjoys the Chicago Symphony Orchestra’s performances, watches classic
    Satyajit Ray films, and participates in community Diwali and Pongal celebrations where they sometimes perform a brief tabla piece.
  travel: A thoughtfully adventurous traveler, Nitish Iyer plans road trips to historic towns such as Galena, WI, has visited Bangalore for a tech conference, explored Bali’s culinary scene for recipe inspiration,
    and trekked the Scottish Highlands for a retreat, balancing structured itineraries with spontaneous detours to local festivals.
  culinary: A dedicated home chef, Nitish Iyer perfects fermented rice‑urad dal batter for fluffy idlis and crisp dosas, crafts a signature carrot‑coconut masala gravy, experiments by adding smoked paprika
    and quinoa to traditional chutneys, and harvests fresh curry leaves, cilantro, and tomatoes from their backyard garden for daily meals.
  core: Nitish Iyer is a curious yet methodical technologist who balances lifelong learning with disciplined execution, mentors the next generation, and flavors life with South Indian culinary experiments,
    community service, and carefully planned adventures.
background:
  cultural: Nitish is a first‑generation Indian American whose family originates from the Tamil Brahmin (Iyer) community of Tamil Nadu. Growing up in a household that emphasized education, respect for elders,
    and communal values, he celebrated festivals such as Diwali, Pongal, and Thai Poosam, integrating traditional rituals with the Midwestern lifestyle of Itasca, Illinois. He maintains a bilingual connection
    to Tamil while primarily speaking English, and he participates in the local Hindu temple and South Asian cultural associations. His heritage shapes his commitment to family, mentorship, and a balanced
    worldview that respects tradition while embracing innovation.
