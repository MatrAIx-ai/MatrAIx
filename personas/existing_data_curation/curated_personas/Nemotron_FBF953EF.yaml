  career_goals: Nitish aims to transition toward a consulting and mentorship role, guiding organizations through digital transformation, particularly modernizing legacy systems in healthcare and finance
    sectors. He wishes to author a series of technical articles on sustainable architecture, contribute to open‑source projects, and help shape the next generation of developers through community workshops
    and STEM outreach. While planning a gradual reduction in day‑to‑day coding, he wants to ensure his expertise supports his family's stability and to leave a lasting impact on the local tech ecosystem
    of the Chicago suburbs.
