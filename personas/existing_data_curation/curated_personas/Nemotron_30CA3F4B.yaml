  career_goals: Gene aims to transition from a frontline representative to a supervisory role within the next 12–18 months, leveraging his track record of high customer satisfaction scores and process‑improvement
    initiatives. He plans to obtain the Certified Customer Service Manager (CCSM) credential and enroll in part‑time courses toward an associate’s degree in Business Administration. In the longer term,
    he envisions leading a regional Customer Experience team, shaping service strategy, and implementing data‑driven improvements that reduce call handling time and boost Net Promoter Score. His competitive
    drive pushes him to set measurable performance targets, and his practical nature ensures he focuses on attainable, results‑oriented milestones.
