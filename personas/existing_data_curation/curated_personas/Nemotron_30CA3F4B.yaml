personas:
  professional: Gene Muhammad leverages a decade of front‑line call‑center experience in Dallas to excel at active listening, conflict de‑escalation and data‑driven process improvements, blending a methodical,
    organized work style with a competitive drive that pushes customer‑satisfaction metrics while mentoring new hires toward excellence.
  sports: Gene Muhammad channels competitive energy into disciplined running and weight‑training sessions, tracks progress on fitness apps, participates in the Dallas Road Runners club, and avidly supports
    the Dallas Cowboys, Mavericks and Texas Rangers, while favoring seasonal activities like marathon training in spring and indoor cycling in winter.
  arts: Gene Muhammad immerses in jazz legends like Miles Davis, R&B icons such as Erykah Badu, and hip‑hop artists including Kendrick Lamar, using these soundtracks to energize weekend cooking experiments
    and finding solace in occasional visits to the Dallas Museum of Art for contemporary exhibits.
  travel: Gene Muhammad prefers meticulously planned trips that blend cultural curiosity with budget awareness, having explored Austin’s music scene, New Orleans’ cuisine, a solo adventure in Barcelona’s
    architecture, and a recent family‑friendly road trip to the Texas Hill Country while constantly comparing flight prices and reviewing itinerary apps.
  culinary: Gene Muhammad approaches cooking with a methodical, experimental mindset, recreating Southern comfort dishes like fried chicken, collard greens, shrimp and grits, and homemade mac and cheese,
    seasoning with smoked paprika, cayenne and fresh herbs, while pairing each meal with a curated playlist and occasionally experimenting with sous‑vide techniques.
  core: Gene Muhammad is a competitive, organized strategist who balances curiosity with practicality, channels stress into rigorous fitness and meticulous budgeting, yet often worries about performance
    and neglects sleep, turning to jazz and Southern cooking as both reward and refuge.
background:
  cultural: Gene was born and raised in the Oak Cliff area of Dallas, a historically African‑American neighborhood, before moving to Addison for work. His family traces its roots to the Deep South, with
    grandparents who migrated from Mississippi during the Great Migration, bringing traditions of church worship, gospel music, and Southern cooking. Growing up, he participated in community events such
    as Juneteenth celebrations and church picnics, which instilled a strong sense of cultural pride and communal responsibility. While his professional life has been shaped by mainstream corporate culture,
    he maintains connections to his heritage through family gatherings, attending local African‑American cultural festivals, and staying informed about civil‑rights issues that affect his community.
