  career_goals: Liji aims to advance to a supervisory role overseeing an entire surveillance team within a major casino or gaming complex. He plans to obtain the Certified Protection Professional (CPP)
    credential and to integrate AI‑driven video analytics into daily operations, improving threat detection accuracy. Long‑term, he envisions founding a boutique security‑consulting firm that specializes
    in loss‑prevention and mental‑health support programs for frontline security staff, blending his business acumen with his compassionate, people‑focused outlook.
