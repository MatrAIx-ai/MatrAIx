personas:
  professional: Liji Tae, an experienced surveillance specialist, combines deep business acumen, expert CCTV troubleshooting, and compassionate conflict‑de‑escalation skills to keep casino floors safe,
    while their curiosity and love for unconventional thinking drive innovative AI‑enhanced monitoring solutions.
  sports: Liji Tae is a dedicated yoga practitioner and weekend jogger; they support the Brooklyn Nets in basketball, follow the New York Yankees during baseball season, and coach a local community center’s
    indoor soccer team, blending seasonal fan fandom with personal fitness routines.
  arts: Liji Tae spends weekends photographing Bushwick’s street‑art murals, they draw inspiration from artists like Banksy, Jean‑Michel Basquiat, and Keith Haring, and unwind to music from Kendrick Lamar,
    Nina Simone, and the ambient scores of David Lynch, integrating these influences into their creative worldview.
  travel: Liji Tae prefers thoughtfully planned trips that balance cultural immersion and adventure, they have explored Seoul’s culinary districts, photographed the streets of Lisbon, and yearn to chase
    the Northern Lights in Iceland, while budgeting travel around a modest family stipend.
  culinary: Liji Tae experiments with Korean‑Italian fusion dishes such as kimchi carbonara and gochujang pesto pizza, they skillfully blend gochujang, miso, fresh basil, and Parmigiano‑Reggiano, while
    sourcing ingredients from the city’s Korean market and a local Italian grocery.
  core: Curious, art‑obsessed, and deeply compassionate, Liji Tae navigates a high‑stress security career with a habit of late‑night anxiety‑driven caffeine binges, they maintain an unwavering commitment
    to blend technology with mindfulness.
background:
  cultural: Liji is a second‑generation Korean‑American raised in a bilingual household in New York City. His upbringing blended traditional Korean values—respect for elders, community harmony, and seasonal
    celebrations like Chuseok and Lunar New Year—with the multicultural vibrancy of Brooklyn’s neighborhoods. This dual heritage informs his strong sense of duty, compassion for others, and appreciation
    for diverse artistic expressions.
