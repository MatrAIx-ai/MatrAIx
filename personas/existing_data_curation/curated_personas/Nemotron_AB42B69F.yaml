  career_goals: Tivisay aims to progress to a senior cashier or shift supervisor position where she can lead a small team, streamline store operations, and train new staff, while also preparing to launch
    a modest home‑based catering venture specializing in authentic Mexican dishes. She seeks financial stability to support her family, fund occasional trips to visit relatives in Mexico, and contribute
    to community programs for seniors.
