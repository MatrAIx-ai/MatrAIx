personas:
  professional: Carlos Robinson is a 19-year-old retail associate at a local grocery store, where his curiosity-driven mastery of cash handling and POS systems, combined with a practical, competitive mindset
    and outgoing communication style, fuels his ambition to move into store management and eventually launch his own boutique or e-commerce venture.
  sports: Carlos Robinson cheers on the Dallas Cowboys and Texas Rangers, plays pickup basketball at the county gym, joins a community soccer league with the East Texas Strikers, and volunteers as a youth
    coach for the Emory Little League, embodying his energetic, competitive approach to fitness.
  arts: Carlos Robinson enjoys live-music shows headlined by country artists like Luke Bryan and Sturgill Simpson, binge-watches the series ‘Friday Night Lights’, and curates Instagram reels of local band
    performances, letting his Southern-rooted love of storytelling shape his weekend leisure.
  travel: Carlos Robinson prefers spontaneous, budget-friendly road trips to nearby hotspots such as Austin’s live-music scene, New Orleans for its jazz and gumbo, and dreams of a backpacking adventure
    in the Rocky Mountains, balancing his curiosity with limited student finances.
  culinary: Carlos Robinson loves firing up the grill for Texas-style brisket, smoked pork ribs, and hearty chili topped with jalapeños, while also whipping up quick tacos al pastor with cilantro and lime,
    showcasing moderate cooking skills focused on bold, smoky flavors.
  core: Carlos Robinson is a sociable, competitively driven 19-year-old who blends Southern hospitality with a love for video games, often forgetting to plan ahead yet always ready to rally a crowd.
background:
  cultural: Carlos grew up in Emory, Texas, a small‑town community in Wood County with deep Southern roots. His white, working‑class family values practicality, self‑reliance, and neighborly hospitality,
    often expressed through church gatherings, high school football events, and county fairs. While his upbringing reflects traditional Texan customs—such as a love of outdoor recreation and communal celebrations—his
    exposure to a regional community college has broadened his perspective, blending local cultural ties with a curiosity about broader business practices.
