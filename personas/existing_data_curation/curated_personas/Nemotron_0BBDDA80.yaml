  hobbies: '[''Pickup basketball'', ''Soccer'', ''Multiplayer video gaming'', ''Live‑music concerts'', ''Camping'', ''Hiking'', ''Grilling and cooking'', ''Community volunteering'', ''Coaching youth sports'']'
  career_goals: Carlos aims to finish an associate degree in Business Administration while continuing to work as a cashier. He plans to move into a supervisory role within the same retail setting, eventually
    becoming a store manager. Long‑term, he aspires to open his own boutique or e‑commerce venture that blends practical retail experience with innovative marketing. He is motivated to develop expertise
    in retail analytics to boost store performance and hopes to one day serve as a regional manager or consultant, leveraging his competitive drive and sociable leadership style.
