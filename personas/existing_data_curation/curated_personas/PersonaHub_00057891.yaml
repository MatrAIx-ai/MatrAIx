persona_description: A scientist and engineer who specializes in the development and testing of new materials, particularly those made from ultra-light foamed concrete (mineralized foam). They are skilled
  in the use of a specialized testing machine, the Inspekt table 100 kN from Hegewald and Peschke, which can accurately measure and determine small deflections and breaking forces on the machine. They are
  interested in the use of innovative concrete materials such as mineralised foams and are seeking to purchase and use a testing machine that is suitable for both compression and bending tests, in addition
  to a scaled CMOD test based on DIN EN 14651.
