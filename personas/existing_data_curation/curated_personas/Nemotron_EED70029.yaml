  career_goals: Despite being seasoned, Fatima remains ambitious. She aims to transition into a store manager role within the next two years, leveraging her organizational talents and artful merchandising
    to increase store profitability by at least 15%. Ultimately, she dreams of opening a boutique that showcases contemporary Mexican folk art and handcrafted goods, creating a cultural hub for the Cuero
    community. She also hopes to mentor younger sales associates, sharing her skeptical, data‑driven approach to improve performance and reduce waste.
