  career_goals: Eduardo aims to become a certified master mason within the next five years, completing the NCCER certification and obtaining a safety-manager credential. He plans to enroll in a GED program
    to finish his secondary education, then attend a trade school to learn sustainable masonry practices such as permeable pavers and lime-based mortars. Long-term, he dreams of opening his own masonry
    contracting business that employs local youth, takes on community-focused projects—like building affordable housing and restoring historic structures—and provides a stable income that helps him manage
    his anxiety. He also hopes to gain recognition in the regional construction community for quality craftsmanship and innovative techniques.
