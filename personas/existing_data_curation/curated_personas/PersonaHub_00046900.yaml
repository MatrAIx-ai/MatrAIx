persona_description: A scientist or researcher who specializes in cognitive psychology, neuroscience, and behavior, particularly in the field of synesthesia and its learning mechanisms. They have experience
  with methods for investigating synesthetic associations between letters and colors by reading in color, and are interested in the potential for certain individuals to form letter-color associations through
  this method. They have a background in training and manipulating cognitive and behavioral systems in mice, and are skilled in analyzing large time-stamped behavioral and physiological event records and
  generating statistical and graphical analyses. They are also knowledgeable about the use of automated and fully-automated systems for conducting high-throughput, high-volume, and live-in behavioral testing
  on mice.
