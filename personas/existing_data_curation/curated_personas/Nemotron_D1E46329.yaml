    to Venezuela'', ''Attending Cultural Festivals'']'
  career_goals: Looking ahead, Soraya intends to transition into a part‑time consulting role where she can offer bookkeeping and financial organization services to local micro‑businesses and nonprofit groups,
    allowing her to share her expertise while maintaining a flexible schedule. She plans to obtain the Certified Bookkeeper credential within the next year and, at her current organization, aims to mentor
    younger clerks and lead a small team focused on streamlining accounting processes. Over the longer term, Soraya hopes to volunteer her financial knowledge with community organizations in Summerfield
    and to ensure a stable financial foundation for her family as she approaches retirement.
