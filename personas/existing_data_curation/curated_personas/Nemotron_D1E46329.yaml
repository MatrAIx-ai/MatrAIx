personas:
  professional: Soraya Villa, a veteran bookkeeping specialist with three decades of experience in double‑entry ledgers, QuickBooks, and advanced Excel, now leverages her meticulous attention to GAAP and
    strong interpersonal skills to mentor junior clerks while preparing to launch a part‑time consulting practice for micro‑businesses and nonprofits.
  sports: Soraya Villa stays fit by dancing salsa and merengue three times weekly, participates in a senior bridge club at the community center, enjoys seasonal tennis matches during spring, and faithfully
    roots for the local Summerfield Hawks baseball team.
  arts: Soraya Villa expresses creativity through her soulful voice in the church choir, immerses herself in historical fiction by authors like Ken Follett, and celebrates the music of icons such as Celia
    Cruz, while occasionally attending community theater productions of classic plays by playwrights like Federico García Lorca.
  travel: Soraya Villa prefers meticulously planned trips that blend family reunions in Venezuela with cultural festivals in Cartagena, while dreaming of a leisurely Mediterranean cruise along the Greek
    islands after retirement.
  culinary: Soraya Villa delights in preparing traditional arepas, pabellón criollo, and hallacas with fresh cilantro, sweet plantains, and black beans, showcases her skill in cultivating aromatic herb
    gardens, yet sometimes overindulges in late‑night empanada snacking.
  core: Soraya Villa blends disciplined bookkeeping expertise with an exuberant love for salsa, cooking, and community service, all while juggling an obsessive spreadsheet habit and an occasional penchant
    for impulsive kitchen gadget purchases.
background:
  cultural: Soraya was born into a Venezuelan family and grew up speaking Spanish at home while celebrating Venezuelan holidays like Día de la Independencia and Carnaval. She immigrated to the United States
    in her twenties, eventually settling in Summerfield, Florida, where she blended her Latin American heritage with Southern hospitality. Her cultural identity is reflected in her love for Venezuelan cuisine,
    Latin music, and community festivals that bring together the local Hispanic community. A lifelong Catholic, she values family, community service, and gratitude, which guide her involvement in church
    activities and volunteer work. While fully integrated into American life, Soraya maintains strong ties to her roots through language, food, and participation in Venezuelan cultural events in Marion
    County.
