personas:
  professional: Frederick Thomas, an aspiring multimedia creator, melds a vivid imagination with modest technical know‑how by producing digital paintings of fantastical characters, crafting intricate Minecraft
    realms, writing bite‑size sci‑fi stories, and building basic robots for his school club, all while their competitive streak drives them to enter art contests even as their laid‑back attitude often leaves
    projects half‑finished.
  sports: Frederick Thomas, who drifts between occasional after‑school basketball practice with the middle‑school team, weekend skate sessions at a local skatepark, and cheering for the Washington Wizards
    during the NBA season and the Baltimore Orioles in summer, prefers impromptu YouTube fitness challenges over structured workouts, yet their competitive nature shines in school intramural tournaments.
  arts: Frederick Thomas, a fervent fan of Studio Ghibli’s animated worlds, comic artists Jim Lee and Fiona Staples, and the eclectic sounds of Kendrick Lamar, Herbie Hancock, and the go‑go band Trouble
    Funk, spends weekends wandering Prince George’s County’s vibrant murals to sketch their bold colors while also curating playlists that blend contemporary hip‑hop with classic jazz for inspiration.
  travel: Frederick Thomas, whose travel plans hinge on parental approval and a modest allowance, favors spontaneous day trips to nearby Washington DC museums and Baltimore’s Inner Harbor over lengthy vacations,
    yet daydreams about a future adventure to Tokyo’s Akihabara district to soak up anime culture, balancing curiosity with the reality of school schedules.
  culinary: Frederick Thomas, a self‑declared pizza aficionado who relishes pepperoni slices loaded with extra mozzarella, dives into spicy pork‑topped ramen, blends mango smoothies with a splash of coconut
    milk, and occasionally attempts a daring grilled cheese with sriracha, yet often skips vegetables in favor of crunchy Doritos and Pop‑Tarts, reflecting a budding yet chaotic culinary curiosity.
  core: Frederick Thomas, a 13‑year‑old imagination engine, channels boundless creativity into digital art, world‑building, and makeshift robotics while juggling a laid‑back approach to chores and a competitive
    urge that fuels both art contests and impromptu gaming challenges.
background:
  cultural: Frederick is an African‑American teenager raised in Riverdale, Maryland, a suburb of Washington, D.C., where a vibrant Black community shapes daily life. His family roots trace back to the Southern
    United States, and his grandparents immigrated from Jamaica, giving him exposure to Caribbean cuisine and dialects. He regularly attends a local Baptist church youth group, where storytelling, gospel
    music, and community service are emphasized. The neighborhood’s cultural fabric includes annual African American heritage festivals, neighborhood basketball courts, and murals that celebrate Black history,
    all of which inspire his art. He is proud of the civil‑rights legacy of Prince George's County and values the resilience and creativity that his community models.
