  career_goals: Frederick aims to become a multimedia artist and interactive game designer who can blend storytelling, visual art, and technology. He hopes to attend a specialized high school for the arts
    in the D.C. area, later pursue a degree in interactive media or computer graphics, and eventually work on creating narrative‑driven video games or animated series. In the short term, he wants to build
    a portfolio of concept art and launch a YouTube channel showcasing his creative process.
