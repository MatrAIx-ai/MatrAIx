  career_goals: Brett aspires to turn his artistic and scientific interests into a career that lets him work independently while making an impact. He hopes to build a portfolio of digital art and photography
    that could lead to work as a marine wildlife photographer or a concept artist for video games that highlight natural environments. He also dreams of studying marine biology or environmental science
    in college, with the goal of becoming a science communicator who blends visual storytelling with research. In the short term, he wants to grow his online presence on platforms like Instagram and YouTube,
    possibly launching a channel that showcases his island‑inspired art, photography, and occasional coding tutorials. His competitive nature fuels an ambition to enter local esports tournaments, though
    he sees this more as a side pursuit to support his primary artistic goals.
