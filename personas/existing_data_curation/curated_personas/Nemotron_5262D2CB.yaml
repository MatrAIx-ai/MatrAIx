personas:
  professional: Ashley Ramseur, a seasoned mental‑health counselor and strategic program director, blends evidence‑based CBT, DBT, and trauma‑informed care with a Midwestern ethic of hard work and a Bay
    Area openness, delivering meticulously organized community wellness initiatives while they mentor emerging therapists and champion art‑based therapies.
  sports: Ashley Ramseur, an avid outdoors enthusiast and community sports supporter, follows the Sacramento Kings and the San Francisco 49ers, participates in the Vacaville Hiking Club’s weekend treks
    through the coastal ranges, and they schedule regular brisk walks and gardening sessions to stay fit.
  arts: Ashley Ramseur, a devoted oil painter and pottery workshop leader, draws inspiration from Frida Kahlo’s bold colors and Vincent van Gogh’s swirling skies, regularly attends the Sonoma Folk Festival
    to hear Arlo Guthrie and Joan Baez, and they volunteer to teach creative art classes to seniors at the local community center.
  travel: Ashley Ramseur, a curious traveler with a taste for cultural festivals, has trekked the redwoods of Humboldt, explored Oaxaca’s Guelaguetza folk celebration, visited the Edinburgh Fringe for avant‑garde
    theater, and they plan a future trip to the Venice Biennale to study contemporary visual art.
  culinary: Ashley Ramseur, a farm‑to‑table home chef, loves preparing quinoa bowls with roasted beets, carrots, and toasted walnuts, grills salmon with lemon‑dill sauce, and they frequently experiment
    with fresh basil pesto and goat cheese salads featuring heirloom tomatoes from their garden.
  core: Ashley Ramseur, a curious, organized 58‑year‑old therapist, merges Midwestern diligence with Bay Area creativity, balancing meticulous practice management with spontaneous oil‑painting sessions
    and a habit of late‑night philosophy podcasts.
background:
  cultural: Ashley was raised in a middle‑class white family in the Midwestern United States, where values of hard work, community involvement, and self‑reliance were emphasized. Relocating to California
    for her graduate studies and career, she embraced the state's cultural diversity and progressive attitudes, which have shaped her inclusive counseling style. Living in Vacaville, a suburb with a blend
    of agricultural roots and growing urban influences, she balances traditional American sensibilities with the openness and artistic vibrancy characteristic of the Bay Area region.
attributes:
  skills: '[''Cognitive Behavioral Therapy (CBT)'', ''Dialectical Behavior Therapy (DBT)'', ''Trauma‑Informed Care'', ''Crisis Intervention'', ''Individual Counseling'', ''Group Facilitation'', ''Case Management'',
    ''Program Development'', ''Grant Writing'', ''Business Planning and Practice Management'', ''Client Assessment and Diagnosis'', ''Ethical Decision‑Making'', ''Cultural Competence'']'
  hobbies: '[''Oil painting'', ''Pottery'', ''Visiting art galleries'', ''Hiking in local hills and regional parks'', ''Organic gardening'', ''Reading literary fiction'', ''Traveling to cultural festivals'',
    ''Yoga and meditation'', ''Photography of architecture and nature'', ''Volunteering at community art workshops'']'
  career_goals: Ashley aims to broaden the reach of mental‑health services in Vacaville by establishing a community wellness center that incorporates art‑based therapies and mindfulness programs. She seeks
    advanced certification in Eye Movement Desensitization and Reprocessing (EMDR) to better serve trauma survivors, and hopes to mentor emerging counselors through a local professional network. Long‑term,
    she envisions authoring a guidebook on integrating creative expression into therapeutic practice and advocating for state‑wide policies that increase funding for preventive mental‑health initiatives.
