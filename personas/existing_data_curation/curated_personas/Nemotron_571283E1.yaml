  career_goals: Although retired from formal employment, Colleen’s ambitions center on preserving her independence, strengthening community ties and leaving a tangible legacy. She aims to complete a comprehensive
    garden that supplies most of her fresh produce, reducing reliance on grocery trips. She wants to mentor younger volunteers at the church, teaching them organizational skills and event logistics. Colleen
    plans to finish a family history scrapbook, digitizing old photographs and recording oral histories for future generations. She also intends to finalize her estate documents, ensuring her wishes are
    clear and her assets are transferred smoothly. Finally, she hopes to learn to use a tablet for video calls so she can maintain regular contact with her children and grandchildren.
