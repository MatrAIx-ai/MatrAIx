  career_goals: At his current stage, Juan has no formal career goals, but he shows budding ambitions shaped by his environment. He often watches his father use tools in the garage and expresses excitement
    when he can hand over a small hammer, hinting at a future interest in hands‑on craftsmanship. He also enjoys story‑time sessions about community helpers, suggesting a latent desire to contribute to
    his neighborhood as he grows. His parents encourage curiosity, hoping he may pursue a future in a trade or community‑focused role.
