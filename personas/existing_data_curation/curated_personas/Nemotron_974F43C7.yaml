  career_goals: As a ten‑year‑old, Dayanna's aspirations are big and varied. She dreams of becoming a storyteller—whether as a children's book author, a comic‑book illustrator, or a local radio host—so
    she can share ideas and entertain her community. Her love of nature and curiosity about how things work sometimes leads her to imagine being a wildlife photographer or environmental researcher, documenting
    the landscapes of Oregon. She also expresses a desire to help peers who feel anxious, hinting at a future interest in counseling or community health. Ultimately, she wants a career that lets her combine
    creativity, public engagement, and a chance to explore new ideas.
