  career_goals: Mary aims to advance from a frontline sales agent to a senior consultant and eventually a regional team leader within her insurance firm. She plans to obtain the Chartered Property Casualty
    Underwriter (CPCU) designation to deepen her expertise and increase credibility. Over the next five years, she hopes to mentor new agents, spearhead a high‑performing sales team, and expand her client
    portfolio by focusing on small‑business owners in the Kitsap County area. Long‑term, she envisions opening her own boutique agency that emphasizes personalized service while allowing her to balance
    professional ambition with family commitments.
