    competitions'']'
  career_goals: Emilia aims to move into a supervisory role such as branch manager or director of credit services, where she can influence policies that promote responsible lending. She plans to earn the
    Certified Financial Counselor designation and launch a weekend workshop series on budgeting and credit repair for low‑income families in Dallas County. In the longer term she hopes to open her own independent
    credit counseling practice, offering personalized financial planning while maintaining her preference for routine, practicality, and community service.
