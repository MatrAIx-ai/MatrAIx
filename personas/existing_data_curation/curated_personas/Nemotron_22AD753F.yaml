  career_goals: Stephen aims to move from a production line worker to a supervisory position within the next three years. To support this, he plans to earn his GED and enroll in a community college program
    in industrial technology to deepen his technical knowledge. He intends to obtain certifications such as Certified Maintenance and Reliability Technician (CMRT) and a forklift operator license. In the
    medium term, he hopes to become a shift supervisor or team lead where he can apply his competitive drive to improve productivity and mentor newer workers. Long‑term, he envisions either managing a small
    manufacturing unit that emphasizes continuous improvement or opening his own workshop that blends his production expertise with his passion for handcrafted furniture and artistic design.
