  hobbies: '[''Zumba classes'', ''dance workshops'', ''choir singing'', ''road trips with friends'', ''cooking Southern dishes'', ''reading contemporary fiction'', ''volunteering at church health fairs'',
    ''hiking Lowcountry trails'', ''gardening'']'
  career_goals: Elyssa aims to advance from bedside nursing to a leadership role, such as Nurse Manager or Clinical Nurse Educator, to bring more structure and predictability to her work environment while
    mentoring newer staff. She plans to earn a Bachelor of Science in Nursing (BSN) within the next two years, followed by a Master of Science in Nursing (MSN) with a focus on healthcare administration
    or psychiatric‑mental health nursing. Her long‑term ambition includes launching a community health outreach program in Berkeley County that addresses both physical and mental wellness, leveraging her
    competitive drive to secure funding and partnerships.
