  hobbies: '[''mural scouting and sketching'', ''mixed‑media collage'', ''skateboarding'', ''live music listening (indie, regional Mexican)'', ''vineyard hiking'', ''spontaneous jam sessions'', ''video
    gaming'', ''cultural festival participation'']'
  career_goals: Tito aims to turn his passion for visual expression into a career as a freelance muralist and community art organizer in Sonoma County. He dreams of creating large‑scale murals that celebrate
    his Mexican heritage and the local landscape, securing commissions from businesses and public spaces. Over the next five years, he hopes to open a modest studio/gallery that offers workshops for youth,
    while building a reputation through participation in regional art contests and collaborations with other independent creators. Financial independence and artistic freedom are central to his ambition.
