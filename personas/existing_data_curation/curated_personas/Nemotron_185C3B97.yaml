personas:
  professional: Tito Abrego's professional persona is that of an infant explorer poised to become a multidisciplinary storyteller and visual artist, whose budding curiosity and spontaneous flexibility already
    shine as they engage with vivid mobiles and family narratives.
  sports: Tito Abrego's sports persona is that of a baby enthusiast who enjoys weekly tummy‑time classes at the local Family Fitness Club, whose family avidly supports the San Francisco Giants and the Golden
    State Warriors, and they greet each session with giggles and claps.
  arts: Tito Abrego's arts persona embraces colorful traditional blankets, lively lullabies by Los Lobos and Juan Gabriel, and classical guitar pieces by Andrés Segovia, fostering their early love for rhythm,
    pattern, and storytelling.
  travel: Tito Abrego's travel persona reflects a family‑centric road‑trip habit, already having visited the vineyards of Napa Valley and the coastal cliffs of Monterey, while dreaming of future adventures
    to Oaxaca’s ancient ruins and the cherry‑blossom festivals of Kyoto.
  culinary: Tito Abrego's culinary persona delights in homemade avocado puree, sweet‑potato mash seasoned with a pinch of cumin, and occasional bite‑size tacos al pastor, while their parents introduce them
    to the fragrant aromas of cilantro and lime.
  core: Tito Abrego is a newborn with a voracious curiosity for bright objects, a spontaneous giggle that disrupts nap schedules, and a stubborn refusal to accept diaper changes when their favorite mobile
    spins.
background:
  cultural: Raised in a Mexican‑American household in Santa Rosa, Tito grew up bilingual, celebrating traditions such as Día de los Muertos, family gatherings with authentic Mexican cuisine, and community
    fiestas. His parents instilled a respect for craftsmanship and storytelling, which he blends with the eclectic, progressive vibe of Sonoma County. This dual heritage informs his artistic perspective,
    prompting him to fuse Mexican motifs with California’s natural scenery and urban culture, while staying rooted in the values of family, resilience, and cultural pride.
