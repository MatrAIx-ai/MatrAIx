persona_description: A Polish Air Force veteran and fighter ace, Kazimierz Sporny, whose ashes were buried with military honors in Poznan, Poland. He was born in 1916, trained in Poland, and flew in the
  British Royal Air Force's Polish Fighter Squadrons during World War II. Sporny is known for his successful missions against Nazi Messerschmitt fighters and was awarded Poland's Cross of Valor, Virtuti
  Militari order, and Britain's Distinguished Flying Cross. He was married to a British citizen, Margaret McArthur, and died in 1949.
