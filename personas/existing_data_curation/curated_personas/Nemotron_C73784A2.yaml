  career_goals: Rattana often talks about becoming a marine biologist who can protect sea turtles and coral reefs after her family’s beach outings. She also imagines helping other kids as a preschool teacher
    because she enjoys organizing simple lessons. Her competitive streak leads her to aim for winning school science fairs and environmental clubs, reflecting both her curiosity and desire for practical
    impact.
