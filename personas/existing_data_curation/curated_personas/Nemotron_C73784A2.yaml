personas:
  professional: A budding mini‑engineer named Rattana Dang loves constructing intricate LEGO cities, blending boundless curiosity about how pieces interlock with a practical step‑by‑step approach, keeps
    a tidy workspace yet adapts quickly when a piece is missing, enjoys collaborative builds but also retreats to solo projects, often questions peers’ design ideas with a skeptical eye and fiercely competes
    in neighborhood building contests, though they frequently worry their structures won’t be perfect.
  sports: An energetic junior athlete named Rattana Dang spends Saturdays kicking soccer balls for the Tigers youth club, slides across the ice during winter skating lessons, roots for the Chicago Cubs
    and Chicago Bulls on game nights, blends a love for structured practice with spontaneous playground races, competes fiercely in tag games yet occasionally retreats to read a book alone, and often worries
    about keeping up with teammates.
  arts: A budding little artist named Rattana Dang enchants friends by performing The Wiggles’ “Fruit Salad” dance, eagerly flips through Dr. Seuss picture books while mimicking the whimsical drawings,
    collects Disney Frozen stickers featuring Idina Menzel’s voice, balances solo coloring sessions with occasional group craft projects, skeptically critiques peers’ artwork during playdates, competes
    for the “most colorful page” award, and often feels anxious when a drawing doesn’t turn out as imagined.
  travel: A curious miniature voyager named Rattana Dang has explored the downtown aquarium and the Grand Canyon on family road trips, dreams of visiting Disneyland and the snow‑capped Alps, prefers itineraries
    with clear schedules and familiar rest stops, enjoys spontaneous stops at playgrounds yet sometimes worries about unfamiliar crowds, and often asks to be the “map keeper” during trips to ensure nothing
    is missed.
  culinary: A playful young foodie named Rattana Dang delights in scooping shredded cheese onto velvety mac and cheese, mixing batter for banana‑chip pancakes, spreading peanut butter and jelly on whole‑grain
    bread, often assists in washing strawberries, balances a preference for familiar comfort foods with occasional daring bites of sushi, voices picky complaints when vegetables appear, and sometimes worries
    about spilling sauce on clothes.
  core: Rattana Dang, a five‑year‑old whose curious yet practical mind, competitive streak, and penchant for worry shape a disciplined, organized play style while balancing social tinkering with quiet reflection.
background:
  cultural: Rattana comes from a mixed Thai‑Vietnamese heritage. Her mother, originally from Thailand, shares Thai language, Buddhist customs, and celebrates festivals such as Songkran, while her father,
    of Vietnamese descent, introduces occasional Vietnamese New Year (Tet) traditions and family recipes like pho. Home life blends English with Thai and occasional Vietnamese phrases, and meals feature
    both pad thai and Vietnamese spring rolls. The family participates in Fort Lauderdale’s vibrant Asian community events, visiting the local Buddhist temple and attending cultural performances, which
    shape Rattana’s multicultural worldview.
