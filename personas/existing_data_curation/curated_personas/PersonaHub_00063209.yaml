persona_description: A historian or researcher interested in the history of human experimentation, particularly in the years between 1933 and 1945, and the experiments conducted by the National Socialist
  regime in Germany, Japan, and the United States. This person is likely to be familiar with the Nuremberg Medical Trial and the prosecution of high-ranking National Socialist physicians and medical administrators.
  They may have a particular interest in the alternative pathways to human experimentation and the complex human experiments conducted in other laboratories, settings, and nations.
