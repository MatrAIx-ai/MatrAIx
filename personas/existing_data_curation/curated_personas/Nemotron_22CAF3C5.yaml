  hobbies: '[''Church services and choir singing'', ''Quilting circles'', ''Gardening'', ''Cooking family meals'', ''Board games (bridge, bingo)'', ''Walking in local parks'', ''Reading historical fiction'',
    ''Storytelling with grandchildren'', ''Senior center social events'']'
  career_goals: At this stage, Pauline’s ambitions center on preserving her family’s legacy, deepening community ties, and staying vibrant and independent. She hopes to compile a memoir of her life and
    the history of Hattiesburg’s Black community, mentor younger members through the local senior center, and lead a committee that organizes intergenerational activities. Maintaining her health, continuing
    to share traditional recipes, and traveling to visit her grandchildren are also key aspirations.
