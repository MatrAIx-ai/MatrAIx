personas:
  professional: Pauline Fuller serves as a senior‑center mentor and volunteer organizer, leveraging their logistical savvy and nurturing calm to schedule intergenerational quilting workshops while balancing
    a love of flexibility with a structured approach to community events.
  sports: Pauline Fuller enjoys strolling the historic downtown on crisp mornings, cheering for the Mississippi Braves at the ballpark, gathering with fellow seniors to watch New Orleans Saints football
    on Sunday afternoons, and participating in low‑impact senior yoga classes at the community center.
  arts: Pauline Fuller sings gospel harmonies with the town’s church choir, weaves intricate quilts inspired by traditional patterns, and devours Southern‑style historical novels by authors such as Terry
    McMillan and Tayari Jones, often humming Mahalia Jackson’s Take My Hand, Precious Lord while they work.
  travel: Pauline Fuller prefers carefully planned road trips, occasionally flying to Orlando, Florida to surprise their grandchildren with homemade meals, while also cherishing pilgrimages to Washington,
    D.C.’s National Museum of African American History and leisurely weekends in New Orleans during Mardi Gras, balancing a modest travel budget with a desire for intergenerational connection, and they
    relish the journey as much as the destination.
  culinary: Pauline Fuller excels at Southern cuisine, mastering collard greens simmered with smoked turkey, crispy fried chicken, and sweet potato pie spiced with nutmeg, often seasoning their dishes with
    locally sourced okra and jalapeños while sharing recipes through handwritten notes to family members.
  core: Pauline Fuller is a steadfast matriarch whose love for quilting, gospel singing, and intergenerational storytelling blends a disciplined community spirit with a whimsical habit of collecting vintage
    button sets for every new project, and they proudly display each find in their living room.
background:
  cultural: Pauline grew up in the segregated South, born in the early 1940s in a close‑knit African American community near Hattiesburg. She witnessed the civil‑rights movement of the 1950s and 60s, participated
    in local voter‑registration drives, and found strength in church and family traditions. Her culinary skills reflect the soul‑food lineage of the Delta, and her quilting carries the storytelling patterns
    of Southern Black folk art. Throughout her life, she has maintained strong intergenerational bonds, passing down oral histories, gospel music, and community values. Today, she identifies as a proud
    member of the Black heritage of Mississippi, honoring both the struggles and the resilience of her ancestors.
