  career_goals: Mari Ann aims to advance to a forewoman or supervisory role within the next three years, obtaining additional certifications such as a Construction Management Associate’s degree and a Project
    Management Professional (PMP) credential. She plans to start her own small contracting firm that specializes in custom, art‑inspired interior finishes, providing opportunities for other underrepresented
    tradespeople. Long‑term, she hopes to become a recognized thought leader in the trade, speaking at industry conferences and collaborating with local art studios to blend construction and visual arts.
    Mentoring is central to her ambition; she wants to create a pipeline for women of color to enter and thrive in skilled trades.
