persona_description: A historian who specializes in the study of collective memory and its role in shaping identity. They are interested in exploring the dynamics of cultural memory in different contexts,
  including how memory is shaped and operates in uniting society and creating images that attain the value of truth even if they deviate from fact. They also discuss this cultural memory on the level of
  everyday life, building on research in the field and clearly showing how cultural memory has become the creative invention of the past in service of both the present and an imagined future.
