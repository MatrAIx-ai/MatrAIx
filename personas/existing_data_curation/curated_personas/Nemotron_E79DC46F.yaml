personas:
  professional: Jeffrey Roberts is a masterful hairdresser who combines classic cutting precision with advanced color techniques, runs a tightly organized salon schedule, mentors apprentices, and is strategically
    planning to launch a boutique salon in Granville that reflects their love of routine and high-quality service.
  sports: Jeffrey Roberts supports the Ohio State Buckeyes football team, enjoys weekly lunchtime walks along the Licking River for low-impact cardio, and participates in a casual weekend basketball league
    at the local community center, preferring small-group competition over large crowds.
  arts: Jeffrey Roberts finds creative fulfillment in restoring a 1965 Chevrolet while listening to classic rock icons like Led Zeppelin and The Rolling Stones, attends occasional performances at the Granville
    Community Theatre, and collects prints of Andrew Wyeth, which inspire their woodworking projects.
  travel: Jeffrey Roberts favors road-trip adventures that blend vintage-car rallies with scenic nature, having driven the Blue Ridge Parkway in the fall, planning a future pilgrimage to the Grand Canyon,
    and seeking quiet, family-friendly stays in historic B&Bs rather than bustling tourist resorts.
  culinary: Jeffrey Roberts enjoys cooking straightforward, nutritious meals such as grilled salmon with roasted asparagus, quinoa salads tossed with homegrown tomatoes and basil, and lean chicken stir-fry,
    relying on fresh garden produce and a modest spice rack while reserving the occasional indulgent backyard barbecue for special occasions.
  core: Jeffrey Roberts is a calm, routine-driven hairdressing expert who channels their competitive edge into meticulous car restoration, disciplined finances, and a low-key lifestyle anchored by gardening,
    classic rock, and family.
background:
  cultural: Jeffrey was born and raised in Licking County, Ohio, within a predominantly white, Midwestern community with roots tracing back to German and Irish immigrants. The region’s emphasis on hard
    work, practicality, and community involvement shaped his values. He grew up attending a local Protestant church, where modest traditions and family gatherings reinforced his preference for routine and
    small‑group social settings. The cultural milieu of central Ohio, with its agricultural heritage and close‑knit neighborhoods, nurtured his appreciation for steady, reliable work and a calm, resilient
    approach to life.
attributes:
  skills: '["Precision hair cutting", "Balayage and advanced color techniques", "Hair health assessment and personalized styling", "Client consultation and communication", "Salon sanitation and safety compliance",
