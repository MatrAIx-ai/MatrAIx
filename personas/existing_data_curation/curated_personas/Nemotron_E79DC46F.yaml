  hobbies: '["Vegetable gardening", "Classic car restoration", "Reading historical non‑fiction", "Listening to classic rock", "Chess", "Evening river walks", "Woodworking club projects", "Simple home cooking"]'
  career_goals: 'Jeffrey aims to transition from being a senior stylist to owning a boutique salon in Granville that reflects his love for routine and high‑quality service. He plans to achieve the Master
    Stylist certification within the next two years and develop a structured apprenticeship program that leverages his education background. Long‑term, he hopes to become a regional educator for a major
    hair product brand, conducting certified training sessions while maintaining a stable, family‑friendly schedule. His ambitions are grounded in practicality: expanding his business modestly, securing
    financial stability for his wife, and preserving the work‑life balance he values.'
