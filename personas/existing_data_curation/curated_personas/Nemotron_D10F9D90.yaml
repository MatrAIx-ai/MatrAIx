  hobbies: '[''Hiking'', ''Cycling'', ''Community soccer'', ''Mexican cooking'', ''DIY electronics'', ''Volunteer computer tutoring'', ''Science‑fiction reading'', ''Strategy video games'']'
  career_goals: Arturo aims to secure a stable technical role that blends his analytical strengths with his desire to help the community, such as a technical support specialist for a nonprofit, a field
    service engineer in renewable energy, or a data analyst for a local government agency. Over the next few years he plans to earn certifications in network security and project management to qualify for
    leadership positions that involve coordinating technology initiatives for underserved groups. Ultimately, he envisions creating a small consultancy that offers affordable tech solutions and training
    to small businesses and community organizations in Southern New Mexico.
