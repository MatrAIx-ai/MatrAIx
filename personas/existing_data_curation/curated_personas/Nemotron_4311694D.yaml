  career_goals: 'Although still an infant, Marcelo''s caregivers notice early signs of ambition: he seems determined to master communication, eagerly repeats words he hears, and shows a desire to explore
    his surroundings independently. In the coming years, he is expected to aim for fluency in both Spanish and English, develop confidence in interacting with small groups, and eventually pursue a path
    that blends creativity with practical problem-solving - such as illustration, engineering, or technology design - where his natural curiosity and competitive drive can be channeled constructively.'
