  career_goals: Kyle dreams of turning his passion for storytelling and technology into a career. He aims to attend a specialized high school or early college program focused on game design, visual effects,
    or multimedia arts. In the long term, he envisions working as a game developer or a digital content creator, producing immersive narrative-driven games or episodic web series. He also hopes to build
    a successful YouTube channel or Twitch stream where he showcases his game mods, animation tutorials, and skeptical commentary. Competitive by nature, he wants to qualify for regional eSports tournaments
    and eventually become a professional gamer while maintaining a reputation as a thoughtful, critical voice in online communities.
