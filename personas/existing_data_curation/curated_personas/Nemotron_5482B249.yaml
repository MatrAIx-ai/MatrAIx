personas:
  professional: Kyle Justice is an aspiring multimedia creator who blends fantasy illustration, digital animation, and sci‑fi storytelling, channeling their boundless imagination and competitive drive into
    early‑stage game design projects while thriving on the collaborative buzz of debate and improv theater.
  sports: Kyle Justice hikes the Appalachian Trail on weekends and participates in the school’s cross‑country team, cheering loudly for the Pittsburgh Steelers and Philadelphia Eagles, while using interval
    training and guitar‑practice stretches to stay fit.
  arts: Kyle Justice draws inspiration from Hayao Miyazaki’s animated worlds, the ethereal digital art of Beeple, and the strings of bluegrass legends like The Infamous Stringdusters, spending afternoons
    sketching fantasy landscapes, curating a vintage vinyl collection, and performing acoustic jam sessions with friends.
  travel: Kyle Justice prefers short, rugged getaways that fuse adventure with inspiration, planning spontaneous weekend trips to Shenandoah National Park or the historic streets of Savannah, while dreaming
    of a summer backpacking tour through the fjords of Norway and a cultural pilgrimage to Kyoto’s anime districts.
  culinary: Kyle Justice enjoys whipping up quick pesto pasta, mastering the art of smoky BBQ ribs, and snacking on trail mix of dried mango and almonds, while their favorite comfort dish after a long hike
    is a steaming bowl of miso ramen garnished with fresh basil and a splash of sriracha.
  core: Kyle Justice is a fiercely curious teenage creator who juggles digital worlds, acoustic strings, and trail hikes, habitually juggling multiple projects while occasionally losing sleep over unfinished
    animations and an ever‑growing vinyl wishlist.
background:
  cultural: Kyle grew up in Rocky Top, a small Appalachian town in Anderson County, Tennessee. The community is steeped in traditional Southern values—family gatherings, church attendance, and a strong
    oral storytelling tradition that celebrates local history and folk music. Weekly bluegrass jam sessions, church potlucks, and community fairs have given him a deep appreciation for the region’s musical
    heritage. At the same time, the internet provides him with a portal to global pop culture, gaming, and digital art, allowing him to blend his rural upbringing with contemporary creative influences.
    This hybrid environment nurtures his imaginative, sociable, and critical mindset, as he navigates both the close‑knit local culture and the broader online world.
