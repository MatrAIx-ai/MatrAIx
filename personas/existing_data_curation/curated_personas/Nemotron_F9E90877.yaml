  career_goals: Though still young, Evan dreams of a future where he can combine his love for structure and helping others. He often talks about becoming a civil engineer, designing safe bridges, roads,
    or playgrounds that benefit his community. He is drawn to the clear, logical steps involved in engineering projects and enjoys drawing plans for his own treehouse. Occasionally, he imagines being a
    veterinarian, caring for animals in a predictable, nurturing environment. Overall, his ambitions center on roles that allow him to apply practical problem‑solving skills while contributing to the well‑being
    of others.
