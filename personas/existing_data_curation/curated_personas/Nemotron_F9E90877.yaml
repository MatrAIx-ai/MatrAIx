personas:
  professional: Evan Tinsley, an 8‑year‑old budding engineer, channels their love for structure into building intricate LEGO sets, solving jigsaw puzzles, and crafting organized worlds in Minecraft, showing
    a practical, goal‑oriented mindset that makes classroom projects and science fair entries a natural fit.
  sports: Evan Tinsley, a member of the neighborhood Little Rangers soccer team and a fan of the local baseball club the River City Hawks, enjoys structured practices after school, follows the team's stats
    on the sports app, and finds quiet joy in weekend bike rides through the park.
  arts: Evan Tinsley, an avid consumer of illustrated adventure books by authors like Jeff Kinney, a fan of nature documentaries narrated by David Attenborough, and a doodler who recreates animals in sketchbooks
    inspired by Beatrix Potter and the animated films of Studio Ghibli.
  travel: Evan Tinsley, a young explorer who prefers family‑planned trips, has visited the Grand Canyon and the Great Barrier Reef, dreams of camping in Yellowstone National Park, and loves the predictability
    of staying at familiar chain hotels while collecting souvenir postcards.
  culinary: Evan Tinsley, a budding home chef who enjoys assembling veggie‑topped mini pizzas, mixing spaghetti with fresh garden tomatoes, and savoring crunchy apple slices, while occasionally refusing
    the texture of mushy peas and sneaking extra chocolate chips into oatmeal.
  core: Evan Tinsley is a detail‑loving, slightly worrier‑prone eight‑year‑old whose world is built on puzzles, plants, and carefully saved pennies.
background:
  cultural: Evan is growing up in Sykesville, a small historic town in Howard County, Maryland, within a predominantly White, middle‑class suburban community. His family participates in typical American
    traditions such as Thanksgiving, Fourth of July celebrations, and local county fairs. The nearby schools and community programs, including the local library and scouting groups, provide a supportive
    environment that values education, politeness, and community service. The blend of the town's rural charm and easy access to larger cities like Baltimore gives him exposure to both quiet, nature‑focused
    activities and broader cultural events. This background fosters his appreciation for structure, cooperation, and a sense of belonging to a close‑knit community.
