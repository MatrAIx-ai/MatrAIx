persona_description: A British aristocrat coming of age in the 18th century who is interested in European history and travel, particularly the grand tour of Europe. They are knowledgeable about early Euro-tourism,
  travel guidebooks, and the shift in travel from religious pilgrimages to secular routes. They appreciate the trappings of early Euro-tourism, such as rare books, engraved illustrations, and labyrinthine
  neighborhood maps, and are interested in the impact of new transportation options and the rise of the middle class on the Grand Tour. They are also interested in the history of the early Grand Tour, including
  the shift in focus from Paris to Rome and the rise of modern tourism.
