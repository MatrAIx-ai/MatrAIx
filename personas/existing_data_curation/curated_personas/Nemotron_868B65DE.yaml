  hobbies: '[''Pickup basketball'', ''Mountain biking in the Santa Rosa Mountains'', ''Off‑road Jeep excursions'', ''Volunteer construction with Habitat for Humanity'', ''Vehicle modification and mechanics'',
    ''Construction‑site photography'', ''Exploring craft breweries'', ''Attending live‑music events'', ''Camping in nearby state parks'', ''Strategy video gaming'']'
  career_goals: Short‑term, James aims to complete his associate degree in construction management and earn OSHA 30‑hour certification, positioning himself for promotion to site superintendent within the
    next three years. He plans to obtain a Project Management Professional (PMP) credential and later a bachelor's degree in construction engineering. Long‑term, he aspires to lead multi‑million‑dollar
    commercial projects, specialize in sustainable and green building practices, and eventually launch his own construction firm that emphasizes safety, efficiency, and innovative technology.
