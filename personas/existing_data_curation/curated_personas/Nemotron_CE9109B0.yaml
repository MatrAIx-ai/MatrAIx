personas:
  professional: Miguel Aviles, a 12‑year‑old aspiring programmer and LEGO Technic enthusiast, channels their love for routine and logical problem‑solving into building intricate machines, designing simple
    Scratch games, and experimenting with early Python scripts.
  sports: Miguel Aviles trains solo on the town’s running track three times a week, swims laps with the local youth aquatic club, and remains an avid follower of the Los Angeles Lakers, appreciating the
    structured schedule of broadcast games over participating in team sports.
  arts: Miguel Aviles reads graphic novels such as Saga and Watchmen, enjoys playing piano pieces by Debussy, and listens to folk artists like Lila Downs while helping prepare family meals, weaving quiet
    creative expression into daily life.
  travel: Miguel Aviles has visited the Smithsonian National Air and Space Museum in Washington, D.C., dreams of touring the Kennedy Space Center in Florida, and hopes to someday explore the Atacama Desert
    in Chile for stargazing, preferring meticulously planned trips that fit within family constraints.
  culinary: Miguel Aviles tends a small indoor herb garden of basil and cilantro, seasons family tamales and pozole with fresh herbs, often crafts homemade pesto and guacamole, and can quickly assemble
    a grilled cheese while measuring ingredients precisely, reflecting a methodical, hands‑on approach to cooking.
  core: Miguel Aviles is a routine‑loving, solitary 12‑year‑old who blends methodical LEGO building, quiet coding, and disciplined herb‑gardening into a uniquely structured world, though they sometimes
    procrastinate on chores to finish a graphic novel.
background:
  cultural: Miguel was raised in a Mexican-American household in Rio Rancho, New Mexico, where both Spanish and English are spoken at home. His family maintains strong ties to Mexican traditions, celebrating
    holidays like Día de los Muertos, Cinco de Mayo, and Mexican Independence Day with altars, food, and music. He participates in family gatherings that feature homemade dishes such as tamales, enchiladas,
    and pozole, and he often helps prepare them, learning the cultural recipes. The local community includes a vibrant Hispanic presence, and Miguel attends a public middle school where many classmates
    share similar cultural roots. His Catholic upbringing influences his values of respect, responsibility, and community service. Growing up in the Southwest, he is also exposed to the broader Chicano
    and Native American cultural tapestry of New Mexico, which enriches his sense of identity and informs his aspirations to one day create bilingual educational tools for his community.
