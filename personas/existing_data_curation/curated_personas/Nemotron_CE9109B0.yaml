  career_goals: Miguel aspires to channel his love for technology and routine into a future career as a software engineer or robotics specialist. He dreams of attending a STEM-focused high school where
    he can deepen his coding abilities and eventually pursue a computer science or mechanical engineering degree. His long-term ambition is to develop educational software and interactive tools that help
    other students learn in structured, engaging ways. He also envisions a role where he can blend his technical skills with his cultural heritage, perhaps creating bilingual learning platforms for Mexican-American
    children.
