persona_description: A researcher and scientist who specializes in the field of nanophotonics, particularly in the development and application of 2D materials for optical and photonic applications. This
  person has expertise in chemical vapour deposition (CVD) techniques for the growth of 2D materials and has successfully integrated transition metal dichalcogenides into specially developed glass fibres
  for the first time. The person's research interests include the development of hybrid material platforms that combine 2D materials with optical fibres, with the goal of creating an intelligent material
  platform that combines the best of both worlds. The person is likely to be interested in applications of 2D materials in the areas of sensors, non-linear optics, and quantum technologies.
