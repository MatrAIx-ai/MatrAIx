  career_goals: Brittany aims to move into a store manager role within the next two years, focusing on elevating sales performance, enhancing employee engagement, and implementing efficient operational
    processes. Long‑term, she aspires to become a district manager or join corporate retail operations, where she can influence broader strategy and mentor emerging leaders. To support these ambitions,
    she plans to pursue a part‑time MBA or a retail management certification, and she hopes to design a mentorship program for new supervisors while championing stress‑reduction initiatives for frontline
    staff.
