    Bowling Green'', ''Urban gardening'', ''Board games and role‑playing (D&D)'', ''Meditation and yoga'']'
  career_goals: She aims to become a program director of a progressive childcare center that integrates STEAM learning, eventually launching her own early‑learning boutique that offers immersive art‑science
    experiences. She plans to pursue a master’s degree in Early Childhood Education or Educational Technology, earn a certification in Montessori or Reggio Emilia approaches, and become a regional speaker
    at early‑education conferences. Long‑term, she hopes to influence state policy on early STEM access and develop a statewide mentorship network for young educators.
