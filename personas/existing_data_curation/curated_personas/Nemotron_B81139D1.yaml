personas:
  professional: Mai Park, a 60‑year‑old senior office administrator, leverages three decades of data‑entry precision, Excel bookkeeping, bilingual coordination, and SOP craftsmanship to streamline workflows
    while quietly critiquing inefficiencies and mentoring junior staff with a calm, routine‑driven approach, and they are known for their meticulous attention to detail.
  sports: Mai Park, a dedicated tai chi practitioner who joins the Golden Gardens Senior Walking Club for morning strolls, enjoys watching the Seattle Mariners in summer baseball and the Seattle Sounders
    FC during soccer season, and occasionally plays casual pétanque at the community center, reflects a low‑impact, routine‑oriented fitness philosophy, and they value consistency above competition.
  arts: Mai Park finds solace in the literary works of Han Kang and Yi Mun‑yol, listens to the soothing piano renditions of Ludovico Einaudi, appreciates the traditional Korean drumming ensemble Samul Nori,
    occasionally attends a local community theater production of classic plays, and they consider these artistic experiences essential to their quiet introspection.
  travel: Mai Park favors meticulously planned, low‑stress trips that combine cultural immersion with garden‑inspired leisure, having visited Jeju Island’s volcanic tea fields, the historic city of Gyeongju,
    and the tranquil San Juan Islands, while dreaming of a future pilgrimage to the temples of Kyoto, and they always keep a detailed itinerary to avoid any surprise detours.
  culinary: Mai Park, a proficient home chef, expertly ferments kimchi using napa cabbage, Korean radish, gochugaru, and fermented shrimp, prepares bibimbap with sautéed spinach, carrots, and a sunny‑side‑up
    egg over rice, delights in pairing these dishes with sesame oil, soy sauce, and homemade soybean paste, occasionally indulges in a slice of apple pie for comfort, and they take great pride in the harmony
    of flavors.
  core: Mai Park embodies a routine‑driven, quietly competitive spirit, balancing meticulous office stewardship, garden‑to‑table cooking, and a disciplined tai chi regimen, all while they occasionally forget
    to water their succulents on rainy days.
background:
  cultural: Mai Hee Park was born to Korean immigrant parents and grew up in the Greater Los Angeles Korean community. Her upbringing emphasized hard work, respect for elders, and traditional customs such
    as celebrating Chuseok and Lunar New Year. Although she did not complete a formal high‑school diploma, she values practical skills and lifelong learning. She maintains Korean language use at home, participates
    in a local Korean church, and blends East Asian cultural practices with the everyday life of a suburban Californian.
attributes:
  skills: '[''Data entry'', ''Record keeping'', ''File management'', ''Scheduling and calendar management'', ''Customer service'', ''Office equipment operation'', ''Basic bookkeeping'', ''Microsoft Office
