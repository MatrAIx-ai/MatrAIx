  hobbies: '[''Gardening'', ''Korean cooking'', ''Reading historical fiction'', ''Knitting'', ''Tai chi'', ''Crossword puzzles'', ''Walking in local parks'', ''Small cultural gatherings with friends'']'
  career_goals: She aims to continue delivering reliable administrative support while gradually taking on more supervisory responsibilities. Her ambition is to become a senior office administrator or team
    lead, where she can mentor younger staff, refine office processes for greater efficiency, and ensure a smooth transition toward a comfortable retirement with a stable pension and benefits.
