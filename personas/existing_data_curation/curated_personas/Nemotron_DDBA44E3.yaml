  hobbies: '[''Sketching and digital painting'', ''Speculative fiction and poetry reading'', ''Philosophy and abstract thought exploration'', ''Coastal photography'', ''Journaling'', ''Mindfulness meditation'',
    ''Art‑history podcasts'', ''Volunteering at animal shelter'', ''Small‑group art workshops'']'
  career_goals: Alex aims to pursue a bachelor's degree in Fine Arts or Art Therapy, blending his artistic talent with his desire to help others heal through creative expression. He envisions leading community‑based
    art projects in Sarasota that provide safe, collaborative spaces for youth and marginalized groups. Over the next five years, he hopes to secure a role as a program coordinator for a nonprofit arts
    organization, eventually moving into a creative director position where he can shape inclusive curricula and outreach initiatives. Simultaneously, Alex plans to develop his personal portfolio of speculative
    illustrations and narrative art, hoping to exhibit locally and publish in niche literary magazines.
