personas:
  professional: Alex Myers, a budding fine arts student with a talent for digital illustration and community coordination, leverages their strong conceptual thinking and compassionate listening to design
    inclusive art workshops while juggling coursework and a part‑time volunteer role at a local animal shelter.
  sports: Alex Myers, an avid supporter of the Tampa Bay Buccaneers and the Miami Heat, enjoys weekend beach volleyball at Siesta Key and participates in the Sarasota Rowing Club’s early‑morning paddles,
    balancing their love for low‑key outdoor activity with occasional viewings of the Rays’ games on TV.
  arts: Alex Myers, who sketches coastal sunsets and admires the luminous installations of James Turrell, finds inspiration in the surreal poetry of Ocean Vuong and the ethereal soundscapes of Björk, while
    also attending local gallery shows featuring Florida artist Anne McDonald and curating a digital portfolio that blends speculative illustration with narrative art.
  travel: Alex Myers, a travel‑enthusiast with a modest budget, has visited Key West and New Orleans for their vibrant music scenes, dreams of kayaking through the bioluminescent bays of Puerto Rico, and
    hopes to explore the misty cliffs of a remote island steeped in ancient myths to draw inspiration for speculative art.
  culinary: Alex Myers, whose palate favors fresh Gulf shrimp in a zesty po'boy, tangy key lime pie, and Mediterranean salads tossed with olives, feta, and fresh basil, enjoys cooking experimental dishes
    like citrus‑marinated tofu, yet often orders late‑night pizza while binge‑watching art documentaries, a guilty pleasure they concede fuels creative cravings.
  core: Alex Myers, a 19‑year‑old aspiring art therapist, blends a love of coastal sketching with a compassionate drive to heal, balancing meticulous project planning with bouts of worry and a habit of
    late‑night pizza indulgence.
background:
  cultural: Alex grew up in a middle‑class white family in Sarasota, Florida, where the vibrant arts scene—anchored by institutions like the Ringling Museum and local galleries—shaped his aesthetic sensibilities.
    His family’s European (primarily Irish and German) heritage emphasized education, community involvement, and respect for tradition, while the coastal Floridian lifestyle introduced him to a relaxed,
    nature‑oriented way of life. The multicultural influx of tourists and artists in Sarasota exposed Alex to diverse perspectives, reinforcing his cooperative spirit and his commitment to fostering inclusive,
    harmonious community spaces.
