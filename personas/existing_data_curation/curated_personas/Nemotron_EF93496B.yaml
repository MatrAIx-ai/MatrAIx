personas:
  professional: Michael Desmond is an aspiring digital illustrator and budding robotics enthusiast who channels his vivid imagination and methodical curiosity into sketching sci-fi characters and building
    intricate redstone machines in Minecraft, blending creative flair with organized project planning.
  sports: Michael Desmond joins the middle school cross-country team, hikes weekend trails across the local plains, and supports the Seattle Seahawks and Los Angeles Lakers, balancing an easygoing love
    of outdoor endurance with occasional after-school soccer practice with friends.
  arts: Michael Desmond immerses themselves in indie animation such as Studio Ghibli's 'Princess Mononoke' and Cartoon Saloon's 'The Secret of Kells', admires musicians like Tame Impala and composer Ludovico
    Einaudi, and frequently mimics Yuko Shimizu's bold line work in their sketchbooks, shaping a vibrant artistic identity.
  travel: Michael Desmond enjoys road-trip adventures to national parks like Yellowstone, dreams of visiting Tokyo's Akihabara for anime culture, and prefers spontaneous photo-filled hikes over structured
    tours, often planning trips around school breaks and budget constraints.
  culinary: Michael Desmond favors homemade pizza with fresh basil and mozzarella, experiments with ramen broth using miso and soy sauce, and can confidently whip up pancakes crowned with strawberries,
    yet they often skip cleaning kitchen counters in the excitement of creating new dishes.
  core: Michael Desmond is a curious 13-year-old who weaves digital art, LEGO engineering, and indie music into a lively creative world, though they sometimes lose track of chores while chasing the next
    imaginative spark.
background:
  cultural: Michael grew up in Amarillo, Texas, a community where the open plains, ranching heritage, and a strong sense of local pride shape daily life. His family values education, self‑reliance, and
    community involvement, often attending local events like the Amarillo Rodeo and county fairs. He has been exposed to a mix of Southwestern cuisine, county‑wide sports traditions, and a diverse blend
    of music ranging from country to indie rock. These regional influences, alongside a supportive school environment that encourages creative and technical pursuits, have helped shape his worldview and
    personal identity.
