  career_goals: Michael dreams of combining his love for art, technology, and storytelling into a career that lets him create immersive experiences. He hopes to study graphic design, game development, or
    interactive media at a university like Texas Tech, eventually becoming a concept artist or digital storyteller for video games or animated films. He also entertains the idea of exploring scientific
    communication, using visual media to explain complex ideas to a broad audience, and envisions himself leading projects that blend imagination with technical innovation.
