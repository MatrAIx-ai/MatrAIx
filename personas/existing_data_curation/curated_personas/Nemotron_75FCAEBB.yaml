personas:
  professional: Adriana Perez pivots from a long life of informal community stewardship into a volunteer leader role, channeling their event‑coordination savvy, bilingual fluency, and hands‑on repair know‑how
    into senior‑center programs, while their spontaneous nature sometimes clashes with the need for strict scheduling.
  sports: Adriana Perez enjoys low‑impact cardio by walking the historic Bluff Park trails in spring, joins a casual co‑ed softball league at the local community center during summer, and roots for the
    Memphis Grizzlies in basketball, the Memphis Redbirds in baseball, and the University of Memphis Tigers in volleyball, all while using these activities as social glue and a counterbalance to seasonal
    stress.
  arts: Adriana Perez weaves creative expression into their life through weekly salsa dance nights set to classic salsa anthems like "El Cantante" and local blues jams featuring B.B. King's "The Thrill
    Is Gone," while unwinding with Agatha Christie murder mysteries and knitting vibrant throw blankets inspired by folk motifs, attending Memphis's annual Blues & Soul Festival to feed both musical and
    cultural appetites.
  travel: Adriana Perez favors relaxed yet culturally rich trips, planning weekend getaways to historic Charleston and the jazz‑infused French Quarter of New Orleans, while dreaming of a summer vacation
    on the sun‑kissed beaches of Puerto Rico's Old San Juan, balancing a limited travel budget with bargain flight alerts and careful itinerary research.
  culinary: Adriana Perez is a home‑chef virtuoso who perfects aromatic dishes like Ropa Vieja marinated in citrus‑y‑adobo, fuses it with Southern shrimp and grits, and serves Arroz con Pollo seasoned with
    cumin and annatto alongside collard greens cooked with smoked ham hocks, often garnishing plates with fresh cilantro, lime, and diced sweet plantains from their garden.
  core: Adriana Perez blends a nurturing spirit with a spontaneous streak, channeling island family traditions into community service, while their worry‑prone mind battles deadlines, and a love for impromptu
    kitchen experiments often leaves the pantry in organized chaos.
background:
  cultural: Adriana's family emigrated from Cuba to the United States in the early 1970s, bringing with them a rich tapestry of Caribbean customs, Catholic traditions, and a love for music and dance. Growing
    up in a close‑knit Cuban community, she learned the importance of hospitality, family solidarity, and preserving cultural heritage through food, storytelling, and celebration. Relocating to Memphis
    introduced her to Southern hospitality and a vibrant blues and soul scene, which she blends with her Cuban roots, creating a unique cultural identity that honors both her ancestors and her adopted hometown.
    She celebrates Cuban holidays like San Juan and also participates in Memphis's local festivals, embodying a bridge between Caribbean and Southern cultures.
attributes:
  skills: '["Traditional Cuban cooking", "Bilingual communication (Spanish/English)", "Community event coordination", "Volunteer management", "Basic home maintenance", "Gardening", "Household budgeting",
