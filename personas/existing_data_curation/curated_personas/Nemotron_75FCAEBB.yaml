  hobbies: '["Cooking traditional and fusion recipes", "Salsa dancing", "Gardening", "Reading mystery novels", "Knitting", "Volunteering at food pantry", "Attending church and cultural festivals"]'
  career_goals: Although not currently in the formal workforce, Adriana aspires to deepen her impact as a volunteer leader at local senior centers and cultural organizations. She hopes to launch a small
    home‑based catering service that offers Cuban–Southern fusion meals for community events, using her cooking talent to preserve her heritage while generating modest income. Additionally, she seeks to
    mentor younger Cuban‑American women, sharing stories of resilience and helping them navigate cultural identity and practical life skills.
