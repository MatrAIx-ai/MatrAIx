personas:
  professional: Tiffany Henry, a 25-year-old registered nurse with expertise in comprehensive patient assessment, IV therapy, wound care, and medication administration, pairs her meticulous time-management
    and data-driven quality-improvement mindset with a curiosity for health informatics and art-therapy integration, while her competitive drive pushes her toward leadership as a future charge nurse despite
    a lingering worry about meeting high standards.
  sports: Tiffany Henry stays active by attending weekly yoga classes, joining a local 5K club for spring runs, playing pick-up basketball at the Harrisburg Community Center, cheering for the Philadelphia
    Eagles and the Philadelphia 76ers, and hiking the Blue Ridge Mountains during autumn weekends.
  arts: Tiffany Henry cultivates a deep appreciation for visual arts by sketching urban Harrisburg landscapes in local galleries and immersing themselves in live jazz from Kamasi Washington, neo-soul performances
    by H.E.R., and classic vinyls of Nina Simone, which fuel their emerging art-therapy projects for patients.
  travel: Tiffany Henry prefers meticulously planned weekend road trips using TripIt to cultural hotspots like Charleston, Asheville, and Washington, D.C., while also indulging in spontaneous drives to
    the Blue Ridge Mountains, and dreams of a future culinary tour of New Orleans to combine music, food, and heritage.
  culinary: Tiffany Henry, an intermediate home chef, loves experimenting with Southern-inspired dishes such as shrimp and grits, collard greens seasoned with smoked turkey, and sweet-potato pie, often
    incorporating andouille sausage, cajun seasoning, and fresh okra sourced from local farmers’ markets.
  core: Tiffany Henry is a detail-oriented, competitively driven nurse who channels artistic curiosity into patient care, yet constantly wrestles with anxiety-fueled overthinking that both motivates and
    overwhelms them.
background:
  cultural: Tiffany identifies as African American and was raised in a close‑knit family that values education, faith, and community service. Growing up in the Mid‑Atlantic region, she was immersed in the
    rich traditions of Black church life, soul music, and storytelling. Her cultural heritage informs her commitment to health equity, as she frequently mentors aspiring Black nurses and participates in
    local Black arts festivals. She integrates the values of resilience and collective support from her community into her professional ethos.
attributes:
  skills: '[''Patient Assessment'', ''IV Therapy'', ''Wound Care'', ''Medication Administration'', ''Electronic Health Records (EHR) Management'', ''Quality Improvement and Data Analysis'', ''Research Methodology'',
    ''Patient Education'', ''Time Management'', ''Interdisciplinary Communication'', ''Health Informatics'']'
  hobbies: '[''Visiting Art Galleries'', ''Sketching and Drawing'', ''Yoga and Mindfulness Meditation'', ''Listening to Jazz and Neo‑Soul Music'', ''Reading Science‑Fiction'', ''Attending Health Tech Meetups'',
    ''Cooking Southern‑Inspired Cuisine'', ''Volunteering at Community Health Fairs'']'
  career_goals: Tiffany aims to advance her nursing career by obtaining a Master of Science in Nursing with a focus on Clinical Nurse Specialist or Nurse Practitioner specialization, particularly in adult‑gerontology.
    She aspires to lead a unit as a Charge Nurse, implementing evidence‑based protocols to reduce readmissions and improve patient satisfaction. Long‑term, she dreams of spearheading community health initiatives
    that address health disparities in African American populations in Harrisburg, and eventually teaching nursing students while integrating art‑based therapeutic techniques. She also intends to contribute
    to research on stress mitigation for healthcare providers.
