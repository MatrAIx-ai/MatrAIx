persona_description: A teacher who loves using Google Earth to teach history and geography, particularly during President's Day. They are interested in creating their own tours and using the ruler tool
  in Google Earth to measure distances. They enjoy exploring historical monuments and monuments in Google Earth. They have created a Google Earth Across the Curriculum eBook and have a passion for using
  Google Maps for curricular units. They are a fan of Richard Byrne's work and appreciate his teaching skills. They are a fan of Steve Jobs and have a special interest in the history of Apple.
