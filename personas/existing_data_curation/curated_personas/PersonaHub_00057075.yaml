persona_description: A scientist and researcher who has dedicated their career to the study of food chemistry, specifically cassava cyanide diseases, and has developed innovative solutions to prevent and
  control these diseases in developing countries. They have a deep understanding of the health implications of cassava consumption and have successfully implemented their research in the prevention of konzo,
  a significant public health problem in DRC, through the development of a wetting method to remove cyanogens from cassava flour. They have also developed a test kit to measure the cyanogen content of cassava
  and a method to assess urinary thiocyanate levels, which has led to the prevention of new konzo cases. Their work has been instrumental in reducing the incidence of konzo in DRC and has resulted in the
  halving of the intervention time and the reduction of the cost of the intervention. However, the funding for their work has been cut due to Australian aid funding cuts, and they are now looking for new
  sources of funding to continue their research.
