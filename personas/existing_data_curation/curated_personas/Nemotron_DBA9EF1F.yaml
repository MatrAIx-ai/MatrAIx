personas:
  professional: Kadie Jones is a budding preschool 'mini librarian' who skillfully sorts picture books, curates story‑time playlists for classmates, and blends meticulous organization with spontaneous curiosity
    to keep the reading nook vibrant.
  sports: Kadie Jones delights in weekend T‑ball practices with the Little League Tiger Cubs, weekly YMCA swimming lessons, proudly wears a Chicago Cubs cap, and balances energetic team play with quiet
    afternoons on the playground swing, embodying a cheerful yet balanced approach to fitness.
  arts: Kadie Jones immerses in finger‑painting inspired by Disney’s Frozen and Picasso’s bold colors, hums Sesame Street tunes while arranging crayons in rainbow order, and often watches performances by
    the local children’s theater troupe, letting those creative experiences shape their playful identity.
  travel: Kadie Jones enjoys family excursions to Disney World in Orlando and the Grand Canyon’s rim, eagerly collects souvenir postcards, and nurtures a dream of seeing the Eiffel Tower in Paris, favoring
    guided tours that combine interactive scavenger hunts with plenty of snack breaks.
  culinary: Kadie Jones favors cheesy macaroni, chicken nuggets, strawberry‑topped pancakes, and proudly sprinkles extra cheese on everything, eagerly helps stir batter with a tiny wooden spoon, though
    kitchen cleanup often ends in a flour‑covered whirlwind, reflecting both culinary enthusiasm and messy curiosity.
  core: Kadie Jones is a curious, orderly five‑year‑old who harmonizes vivid imagination with a love for routine, yet cannot resist occasional sticker binges and spontaneous flour fights.
background:
  cultural: Kadie lives in Sayreville, a suburban community in Middlesex County, New Jersey. Her family celebrates typical American holidays such as Thanksgiving, Christmas, and the Fourth of July, often
    participating in neighborhood parades and fireworks. She attends a local preschool where she interacts with a diverse group of classmates and learns about various cultural traditions through school
    projects. Proximity to New York City provides occasional trips to museums and art galleries, nurturing her appreciation for visual arts. Her upbringing reflects middle‑class American values emphasizing
    politeness, cooperation, community involvement, and a supportive environment for curiosity and creativity.
