  career_goals: Kadie dreams of becoming an artist who creates bright, imaginative paintings and a teacher who helps other children learn new things. She also talks about exploring space like an astronaut
    to see the stars up close. Her ambitions reflect her love for art, curiosity about new ideas, and desire to help others and experience varied adventures.
