personas:
  professional: Maria Rosario, a 21‑year‑old hospitality management student, delivers high‑quality front‑of‑house service at a bustling Los Angeles bistro; they expertly juggle OpenTable reservations, bilingual
    guest interactions, and on‑the‑fly conflict resolution while recommending local art events to guests.
  sports: Maria Rosario enjoys weekend hikes in the San Gabriel Mountains with the Los Angeles Hiking Club; they cheer for the Lakers and LA Galaxy at home, and play casual co‑ed soccer in a community league,
    balancing active pursuits with occasional indulgent brunches.
  arts: Maria Rosario immerses herself in Los Angeles’s vibrant visual culture, tagging along street‑art tours in the Arts District and frequenting The Broad and Hauser & Wirth; they collect limited‑edition
    prints by artists like Shepard Fairey and curate spontaneous pop‑up galleries for friends during cooking nights.
  travel: Maria Rosario favors short, budget‑friendly getaways—sunset hikes in Joshua Tree, a weekend surf trip to Ventura, and a culinary‑focused pilgrimage to Oaxaca, Mexico; they also plan a future summer
    road‑trip along the Pacific Coast Highway to capture sunrise panoramas for their photography portfolio.
  culinary: Maria Rosario channels her love for Mexican flavors into mastering homemade mole poblano, chiles en nogada, and perfectly crisp tacos al pastor; they source fresh cilantro, roasted chilies,
    and artisanal corn tortillas from local farmers’ markets and host weekly salsa‑and‑cuisine nights that blend cooking with impromptu photography sessions.
  core: Maria Rosario blends a bustling hospitality career with a fierce curiosity for art, a disciplined yet spontaneous financial streak, and a weekend habit of hiking, cooking bold Mexican dishes, and
    snapping cityscapes; they always juggle responsibilities with a sprinkle of salsa‑dance flair.
background:
  cultural: Maria comes from a Mexican-American family rooted in Pomona, where bilingual Spanish-English traditions shape her daily life. She grew up celebrating Día de los Muertos, quinceañeras, and other
    Mexican customs, and she frequently participates in community festivals at the La Plaza and local cultural centers. Her upbringing emphasizes close family bonds, respect for heritage, and a love for
    Mexican cuisine and music, which she blends with the multicultural influences of Los Angeles County. This cultural tapestry informs her worldview, hospitality style, and appreciation for the arts.
attributes:
  skills: '[''Customer service'', ''Bilingual communication (Spanish/English)'', ''Reservation management (OpenTable)'', ''Multitasking'', ''Time management'', ''Conflict resolution'', ''Team coordination'',
