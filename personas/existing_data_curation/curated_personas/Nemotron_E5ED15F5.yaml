  hobbies: '[''Visiting street murals and art galleries'', ''Photography'', ''Cooking Mexican dishes'', ''Salsa and Bachata dancing'', ''Exploring local coffee shops'', ''Hiking in the San Gabriel Mountains'',
    ''Attending live music events'', ''Volunteer work at community art workshops'', ''Socializing with friends at group outings'']'
  career_goals: Maria aims to complete her degree in hospitality management, progress to a floor manager or assistant manager role within the next two years, and eventually open a community-focused café
    that doubles as an art gallery highlighting Mexican and Latino artists. She is motivated to develop leadership skills, deepen her understanding of business operations, and create a welcoming space that
    blends her love of food, coffee, and visual art. In the longer term, she envisions contributing to the local cultural scene by hosting workshops, exhibitions, and community events.
