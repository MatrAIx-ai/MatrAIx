personas:
  professional: Jessica Garza, an aspiring robotics engineer, fuses their knack for assembling intricate LEGO Technic models, coding simple Scratch games, and strategic chess play into designing reliable,
    rule‑driven projects for their school’s robotics club, where their methodical, skeptical outlook and calm resilience enable them to debug complex systems without panic.
  sports: Jessica Garza keeps fit by attending three weekly practices with the Eastside Explorers youth soccer club, where they follow a regimented warm‑up and stamina routine, while enthusiastically cheering
    for the Los Angeles Dodgers and Los Angeles Lakers, showcasing their competitive spirit and preference for structured, goal‑oriented exercise.
  arts: Jessica Garza channels their creative energy by choreographing folk dances for school cultural nights, drawing mystery‑inspired comic panels styled after Edward Gorey, and immersing themselves in
    the pop beats of Billie Eilish and the theatrical rap of Lin‑Manuel Miranda’s Hamilton soundtrack, reflecting their disciplined imagination and competitive drive to perfect each performance.
  travel: Jessica Garza prefers meticulously planned trips, recalling the family’s recent weekend road‑trip to the Grand Canyon and a day at the San Diego Zoo, while dreaming of a school‑organized excursion
    to the historic castles of Prague and a science‑focused visit to the SpaceX launch site in Boca Chica, reflecting their curiosity‑driven wanderlust balanced by a love for predictable itineraries.
  culinary: Jessica Garza, an intermediate home cook, delights in shaping masa for tacos and tamales seasoned with cumin, fresh cilantro, and a hint of chili, while also mastering homemade pizza topped
    with mozzarella, basil, and sliced avocado, blending their love for traditional family recipes with a playful curiosity for new flavors.
  core: Jessica Garza, a calm yet fiercely competitive 11‑year‑old, merges their passion for LEGO Technic engineering and chess strategy with a meticulous allowance‑tracking habit and an unwavering drive
    to perfect every folk dance step and robotics project.
background:
  cultural: Jessica is a first-generation Mexican-American raised in Downers Grove, Illinois. She speaks both Spanish and English fluently and celebrates Mexican traditions such as Día de los Muertos, Mexican
    Independence Day, and family gatherings centered around food and music. Her family maintains close ties with the local Hispanic community, attending cultural festivals and church events, while also
    embracing Midwestern values of education and civic involvement.
