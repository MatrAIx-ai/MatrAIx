personas:
  professional: A budding civil engineer in the making, Joan Woodward builds LEGO cityscapes and K'nex bridges with meticulous precision, showcasing their methodical planning and competitive edge that drives
    them to perfect every structure.
  sports: A dedicated young swimmer, Joan Woodward trains with the Riverside Community Swim Club and avidly follows the San Diego Padres and Los Angeles Lakers, channeling their competitive streak into
    weekly lap times while also enjoying beach shell hunts as a relaxed complement to structured workouts.
  arts: A budding musician and story lover, Joan Woodward immerses themselves in the structured melodies of Beethoven's 'Für Elise' during piano lessons, delights in the adventurous tales of Mary Pope Osborne's
    Magic Tree House, and models strategic thinking after chess grandmaster Garry Kasparov, weaving these influences into a disciplined appreciation for the arts.
  travel: An organized explorer, Joan Woodward enjoys weekend trips to the nearby shoreline for shell collecting and annual family visits to the regional science museum, while dreaming of a carefully planned
    adventure to Disney World and a future field trip to the Grand Canyon, always drafting checklists and maps to keep every detail predictable.
  culinary: A budding chef, Joan Woodward shows a knack for following recipes as precisely as their LEGO instructions, happily preparing peanut‑butter‑and‑jelly sandwiches, cheesy macaroni, and LEGO‑shaped
    sugar cookies using butter, flour, and rainbow sprinkles, while insisting on neatly arranging food on their plate before eating.
  core: Joan Woodward, a seven‑year‑old strategist, builds flawless LEGO cities and solves jigsaw puzzles with laser focus, yet habitually misplaces their pencil during piano practice, leaving a trail of
    stray notes on the music stand.
background:
  cultural: 'Joan comes from a white, middle‑class family living in Bay Shore, a suburban community on Long Island. Her upbringing reflects typical Northeastern U.S. cultural influences: emphasis on education,
    punctuality, and community involvement. Family traditions include celebrating holidays such as Thanksgiving and Fourth of July with communal meals and local beach outings. The diverse surroundings of
    Suffolk County expose her to a variety of cultural perspectives, but her household primarily follows mainstream American customs and values that prioritize structure, reliability, and personal responsibility.'
