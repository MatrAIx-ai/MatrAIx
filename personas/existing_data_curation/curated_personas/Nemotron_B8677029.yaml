  career_goals: Joan aspires to become a teacher or scientist who creates clear, organized learning environments. She dreams of one day leading a classroom as a teacher, where she can develop structured
    lesson plans and help children master subjects systematically. Alternatively, she envisions herself as a wildlife biologist or veterinarian, working with animals in a methodical, evidence‑based way.
    In the nearer term, she aims to be the class monitor, earn top grades, and win school competitions, reflecting her competitive drive.
