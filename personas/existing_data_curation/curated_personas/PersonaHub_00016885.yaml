persona_description: A historian and educator who is passionate about African American history and culture. This person is interested in learning about the contributions and struggles of African Americans
  throughout history, and is likely to be knowledgeable about notable figures such as Dr. Carter G. Woodson, Booker T. Washington, and Leon Sullivan. They may also be interested in visiting historical sites
  such as the Greenbrier Historical Society and North House Museum in Lewisburg, WV, or the African American Heritage Family Tree Museum in Ansted, WV, to learn more about the rich African American history
  of the region.
