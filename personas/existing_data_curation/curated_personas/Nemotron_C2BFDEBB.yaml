  hobbies: '[''Cooking traditional Honduran meals'', ''Attending church services'', ''Participating in cultural festivals'', ''Yoga and meditation'', ''Listening to Latin music'', ''Watching telenovelas'',
    ''Reading romance novels'', ''Indoor gardening (succulents, roses)'', ''Volunteering at ESL classes'']'
  career_goals: Jacqueline aims to open her own boutique nail salon in Dallas within the next three years, featuring a tranquil environment that blends her Honduran cultural touches with modern wellness
    services like aromatherapy foot spa. She envisions the salon as a hub for mentoring other Hispanic women who aspire to enter the beauty industry, offering apprenticeships and on‑the‑job training. Financially,
    she seeks to achieve a stable income that secures her family's future and allows for a comfortable retirement. Long‑term, she contemplates adding a mobile nail service to serve clients at home and possibly
    expanding to a second location as the brand gains recognition for quality and community focus.
