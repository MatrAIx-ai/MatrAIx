personas:
  professional: A seasoned manicurist and pedicurist, Jacqueline Torres, leverages 15 years of technical mastery and a business degree to run a meticulously organized salon, blending classic nail care with
    holistic foot treatments, mentoring junior staff, and creating a welcoming, family‑oriented atmosphere that reflects her deep sense of community reciprocity.
  sports: Jacqueline Torres, a regular member of the Dallas Women's Walking Club and an avid supporter of the Dallas Cowboys, Dallas Mavericks, and Dallas Stars, prefers low‑impact activities like weekend
    yoga series and evening strolls around Klyde Warren Park to stay fit, while cheering loudly on game days with a taco‑filled tailgate.
  arts: Jacqueline Torres, who relaxes after work by listening to Marc Antonio and Shakira, binge‑watching the telenovela “La Usurpadora,” and devouring romance novels by Nora Roberts, often draws inspiration
    from these melodramatic narratives to craft intricate nail art designs that echo the vivid colors of the music she loves.
  travel: Jacqueline Torres, who prefers meticulously planned short road trips to historic Texas Hill Country towns like Fredericksburg and long‑awaited international getaways to Mexico City for its vibrant
    markets and culinary scene, balances her love of family visits with occasional solo retreats to Costa Rica's cloud forests for quiet reflection.
  culinary: Jacqueline Torres, an accomplished home cook, routinely prepares baleadas stuffed with refried beans, queso fresco, and avocado, and occasionally experiments with pupusas filled with loroco,
    while also savoring a good coffee with a dash of cinnamon, and she enjoys the occasional night out at a farm‑to‑table restaurant to sample seasonal dishes like grilled trout with almond‑herb garnish.
  core: Jacqueline Torres, a detail‑oriented salon owner who balances a calming love for routine with occasional anxiety‑driven coffee cravings, uses yoga to stay centered while mentoring aspiring nail
    technicians with a warm, family‑first spirit.
background:
  cultural: Jacqueline was born to Honduran parents who immigrated to the United States in the early 1980s. Raised in a close‑knit, bilingual household in Dallas, she grew up speaking both Spanish and English
    and was deeply influenced by the values of familismo, respect for elders, and Catholic traditions. Her upbringing emphasized hard work, humility, and community reciprocity, which she carries into her
    professional life by fostering a welcoming salon environment and supporting fellow Honduran expatriates. She maintains strong ties to her heritage through regular visits to Honduran cultural associations,
    celebrating holidays such as Día de la Independencia, and preserving culinary customs that link her to her roots while navigating life in a multicultural Texan city.
attributes:
  skills: '[''Manicure'', ''Pedicure'', ''Nail art design'', ''Foot massage and reflexology'', ''Salon hygiene and sterilization'', ''Customer service and conflict resolution'', ''Bilingual Spanish‑English
