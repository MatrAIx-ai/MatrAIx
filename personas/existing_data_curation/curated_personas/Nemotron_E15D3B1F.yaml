  career_goals: Jose hopes to transition his practical knowledge into community-focused roles. He aims to mentor local youth interested in trades, expand the neighborhood community garden, and preserve
    Mexican culinary traditions by offering informal cooking workshops. He also plans to document his life experiences in a memoir that highlights the blend of his Mexican heritage with the coastal lifestyle
    of Humboldt County, while remaining flexible and allowing space for spontaneous opportunities.
