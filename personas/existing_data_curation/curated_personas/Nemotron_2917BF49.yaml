  career_goals: Although only two years old, Insun already shows budding aspirations shaped by her curiosity and practical outlook. She frequently pretends to be a teacher, arranging stuffed animals in
    a 'classroom' and guiding them through songs, hinting at a future interest in nurturing and educating others. She also loves building towers with blocks and asks 'why' when structures fall, suggesting
    a latent fascination with engineering or design. Role-play as a doctor caring for dolls reveals a desire to help and support others. As she grows, these early preferences may evolve into ambitions to
    become an early-child educator, a pediatric caregiver, or a creator of playful learning tools, combining her curiosity about how things work with a practical desire to make a positive impact.
