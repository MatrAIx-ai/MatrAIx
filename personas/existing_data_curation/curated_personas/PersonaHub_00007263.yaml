persona_description: A marine biologist who conducts research on the distribution and behavior of Callinectes sapidus (blue crab) megalopae, particularly focusing on their vertical distribution near the
  mouths of Chesapeake and Delaware Bays. This research aims to understand swimming behaviors that influence ingress to these estuaries and to infer the effects of estuarine chemical cues on megalopae behavior.
