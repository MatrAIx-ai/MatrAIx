  career_goals: Kamerin aspires to pursue a STEM career that combines structure, practicality, and a tangible impact on everyday life—specifically, she dreams of becoming an environmental engineer who designs
    sustainable water‑management systems for her community. She aims to graduate high school with honors, earn a scholarship to a university strong in engineering, and later work on projects that protect
    local ecosystems while providing reliable, data‑driven solutions. Alongside her technical ambitions, she hopes to mentor younger students in coding and gardening, blending her compassion with self‑interest.
