    ''CPA candidate'']'
  hobbies: '[''Sketching and digital illustration'', ''Photography of urban landscapes'', ''Reading speculative fiction'', ''Playing synthesizer and electronic music composition'', ''Strategic board games
    (e.g., Terraforming Mars)'', ''Hiking the Blackstone River Trail'', ''Volunteer financial literacy workshops for youth'', ''Cooking Caribbean-inspired dishes'']'
  career_goals: Monroe aims to become a Certified Public Accountant within the next two years and to progress to a senior audit manager role at a regional accounting firm. He aspires to lead multidisciplinary
    audit teams, specialize in audits for creative and tech‑driven companies, and eventually launch his own boutique consultancy that blends rigorous financial oversight with innovative data‑driven insights
    for arts organizations. Long‑term, he envisions taking on a CFO position where he can influence strategic growth while championing financial literacy initiatives in his community.
