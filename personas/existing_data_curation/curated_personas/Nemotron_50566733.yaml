personas:
  professional: Hung Zhao is a budding architect of imagination, channeling the precision of LEGO building into early design thinking while balancing their love for teamwork on the soccer field and their
    structured, practical mindset.
  sports: Hung Zhao thrives on after‑school soccer practice with classmates, proudly wears their Eastside Youth Soccer Club jersey, supports the local professional team the City Rangers, and keeps a habit
    of daily stretching and weekend bike rides to stay fit.
  arts: Hung Zhao expresses their creativity by drawing cartoon characters inspired by classic Pixar films like Toy Story, practicing calligraphy during Mandarin class with brush strokes that echo ancient
    poetry, and dabbling in early piano pieces such as 'Twinkle Twinkle Little Star' on their family’s upright piano.
  travel: Hung Zhao dreams of visiting Dinosaur National Monument in Utah and the Natural History Museum in London, but their family’s weekend trips usually stick to nearby parks where they can hunt for
    fossils and sketch the scenery, favoring a mix of structured itineraries and spontaneous backyard explorations.
  culinary: Hung Zhao loves slurping ramen broth with chewy noodles, assembling mini pizza bites topped with mozzarella and pepperoni, and sometimes helps stir‑fry vegetable fried rice, though they often
    forget to wash their hands before eating, showing the typical kid’s messiness.
  core: Hung Zhao is a pattern‑loving 7‑year‑old who builds intricate LEGO worlds, runs the soccer field with bright energy, saves every coin in a piggy bank, and secretly hoards gummy bears in their bedroom
    drawer.
background:
  cultural: Hung is raised in a Chinese‑American household in Pasadena, California. At home, his parents speak Mandarin and celebrate cultural traditions such as Chinese New Year, complete with red envelopes,
    dumplings, and lion dances performed by community groups. He attends a local Chinese cultural school on Saturdays, where he learns calligraphy, the lunar calendar, and traditional folk stories. The
    family values education, respect for elders, and community harmony, often participating in events at the Pasadena Chinese Cultural Center and sharing festive meals with extended relatives. This blend
    of East Asian heritage and American suburban life shapes Hung's worldview, fostering both a strong sense of cultural identity and an openness to diverse experiences.
