  hobbies: '["Watercolor Painting","Beadwork","Gallery Visits","Hiking the Blue Ridge Mountains","Community Storytelling Circles","Book Club Participation","Traditional Cooking","Native Herb Gardening","Dance
    Workshops","Continuing Education in Psychology"]'
  career_goals: Patricia aims to expand culturally grounded mental‑health services in Yancey County by establishing a community wellness center that blends traditional Indigenous healing practices with
    contemporary psychotherapy. She plans to obtain a clinical licensure upgrade and a certification in art therapy to formally incorporate creative modalities into her practice. Over the next five years,
    she hopes to lead a regional training program for counselors on culturally responsive care for Native American clients, develop a tele‑health outreach network for remote populations, and mentor emerging
    mental‑health professionals from underrepresented backgrounds.
