personas:
  professional: Patricia Zamdin, a veteran mental‑health counselor with over three decades of rural practice, blends evidence‑based CBT, Motivational Interviewing, and trauma‑informed care with art‑integrated
    techniques, leveraging her curious, organized‑yet‑flexible nature and competitive drive to mentor junior staff, run community workshops, and shape culturally responsive therapy models.
  sports: Patricia Zamdin hikes the Blue Ridge Mountains with the local Blue Ridge Hiking Club, follows the Carolina Panthers and Charlotte Hornets for seasonal excitement, and balances her weekend treks
    with a weekly yoga class at a community center, often swapping trail stories with fellow enthusiasts.
  arts: Patricia Zamdin expresses herself through watercolor landscapes, beadwork jewelry inspired by nature, and regular attendance at gallery openings featuring artists like Georgia O'Keeffe, Mark Rothko,
    and local painter Laura Sanchez, while she also leads a storytelling circle that weaves visual art into communal narratives.
  travel: Patricia Zamdin prefers flexible, research‑driven travel that blends adventure and relaxation, having trekked the Great Smoky Mountains, explored Santa Fe’s art scene, dreamed of visiting Sedona’s
    red rocks, and routinely revisits Asheville for its vibrant cultural festivals while balancing travel costs with a modest savings plan.
  culinary: Patricia Zamdin enjoys cooking herb‑infused chicken stew with sage and rosemary, baking cornbread topped with honey, preparing wild‑foraged mushroom risotto, and experimenting with sourdough
    bread, showcasing a moderate cooking skill that often features fresh garden herbs from her native‑plant herb garden.
  core: Patricia Zamdin, a curious counselor‑artist who channels her competitive spirit into both therapy sessions and mountain climbs, balances meticulous planning with spontaneous community projects,
    and occasionally overbooks herself, leading to late‑night art sessions fueled by coffee.
background:
  cultural: Patricia identifies as an American Indian, tracing her lineage to the Eastern Band of Cherokee ancestors who have long inhabited the Appalachian foothills of western North Carolina. She actively
    participates in tribal ceremonies, language revitalization classes, and intergenerational storytelling that emphasize holistic wellness. This cultural foundation informs her counseling philosophy, prompting
    her to integrate spiritual practices, oral traditions, and communal values into therapeutic interventions. Patricia also advocates for the preservation of Indigenous knowledge within the broader mental‑health
    field and mentors younger Native professionals to pursue careers in counseling.
attributes:
  skills: '["Cognitive Behavioral Therapy","Motivational Interviewing","Trauma‑Informed Care","Group Therapy Facilitation","Crisis Intervention","Case Management","Community Outreach","Program Development","Art‑Integrated
