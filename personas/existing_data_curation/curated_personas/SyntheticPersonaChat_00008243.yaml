    User 1: So, what''s your favorite thing about it?

    User 2: I like the feeling of knowing that I''m making a difference in people''s lives.

    User 1: That''s awesome.

    User 2: It really is. I''m really glad I get to do it.

    User 1: So, what are your favorite bands?

