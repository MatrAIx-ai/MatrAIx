    to detail and accuracy'', ''Independent work and self-directed tasks'', ''Calm problem solving and crisis handling'']'
  hobbies: '[''Reading historical fiction'', ''Knitting and crochet'', ''Herb and vegetable gardening'', ''Birdwatching along the coast'', ''Walking on the beach at sunrise'', ''Cooking traditional Mexican
    dishes'', ''Coastal landscape photography'', ''Puzzle solving (crosswords, sudoku)'', ''Collecting seashells'', ''Listening to classic and regional Mexican music'']'
  career_goals: Claudia’s primary career ambition is to build on her long-standing reputation for reliability by moving into a supervisory or specialist role that still allows her to work within a predictable,
    organized setting. She plans to earn a certification in Records Management or Office Administration within the next two years, which would qualify her for a senior administrative assistant or office
    manager position at the City Hall or a local tourism office. Additionally, she hopes to become a bilingual liaison for the town’s Hispanic community, ensuring that Spanish‑speaking residents receive
    clear information about municipal services. Mentoring newer reception staff and gradually transitioning to a part‑time advisory capacity as she approaches retirement are also important goals for her.
