personas:
  professional: Ruth Mainville is a budding digital illustrator and Scratch game developer who channels a disciplined, achievement‑driven mindset into meticulously crafted art projects and coding experiments,
    and they balance solo creation with occasional collaboration on school art showcases.
  sports: Ruth Mainville is a member of a local youth swimming club and a dedicated fan of the Houston Astros and Houston Rockets; they attend weekend practice at the community pool, join a small pick‑up
    basketball game with friends, and keep a scoreboard of Astros games on their phone.
  arts: Ruth Mainville immerses themselves in visual arts, drawing inspiration from contemporary illustrator Loish, the surreal paintings of Salvador Dalí, and the storytelling of Hayao Miyazaki, while
    they practice piano pieces by Debussy and attend exhibitions at the Museum of Fine Arts, Houston.
  travel: Ruth Mainville prefers carefully planned weekend getaways that blend cultural enrichment with artistic inspiration, such as a day trip to Space Center Houston, a family road trip to Austin’s Bullock
    Museum, and a dream of visiting Paris’s Musée d’Orsay to study Impressionist works, and they budget these trips using a parent‑supervised travel fund.
  culinary: Ruth Mainville enjoys experimenting with simple recipes like avocado toast, homemade sushi rolls, and chocolate chip cookies, favoring fresh basil, ripe strawberries, and crisp cucumber as favorite
    ingredients, and they often pair meals with a lo‑fi beats playlist while sketching.
  core: Ruth Mainville is a meticulously organized teenage artist who balances a love for solitary creativity with occasional collaborative projects, yet often wrestles with worry and perfectionism.
background:
  cultural: Ruth is a white teenager raised in Houston, Texas, where she experiences a blend of Southern hospitality and a vibrant, multicultural cityscape. Her family values education, community involvement,
    and exposure to the arts, often taking trips to the Museum of Fine Arts and attending local cultural festivals. Growing up in a diverse urban environment has broadened her appreciation for varied artistic
    expressions while maintaining traditional American holiday celebrations and community ties.
