  hobbies: '[''sketching'', ''digital illustration'', ''reading contemporary YA fiction'', ''journal writing'', ''coding with Scratch'', ''visiting art museums'', ''playing piano'', ''small group book club'',
    ''participating in school science fair'', ''organizing personal study schedule'']'
  career_goals: Ruth aims to maintain top academic performance throughout high school, building a strong portfolio of artwork and coding projects for future college applications. She envisions a career
    that merges her love for art and structured thinking—such as a digital media artist, museum curator, or UX/product designer—where she can apply her organizational skills to creative processes. In the
    short term, she hopes to win her school’s science fair, secure a scholarship, and gain mentorship from local artists and engineers.
