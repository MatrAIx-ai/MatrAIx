  career_goals: Marilyn aims to cement her reputation as the premier woodworker in the Warren County region by expanding her studio space to accommodate larger commissions and a dedicated teaching area.
    She plans to launch a limited‑edition line of heirloom‑quality furniture that showcases locally sourced wood and traditional joinery, targeting boutique galleries and high‑end collectors. Over the next
    five years she hopes to win the Pennsylvania State Woodworking Competition, publish a memoir‑style guide titled “Crafting with Purpose” that blends technical instruction with her philosophy of structured
    creativity, and formalize a mentorship program for women entering the trade. Ultimately, she wants to ensure her brand endures beyond retirement, possibly transitioning ownership to a trusted apprentice
    while maintaining a part‑time advisory role.
