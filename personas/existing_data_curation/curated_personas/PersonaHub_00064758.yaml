persona_description: A team of geologists and students from across Georgia who are planning to deploy 1200 small seismographs along a 200-mile-long line to record sound waves generated by controlled blasts
  in deep drill holes to study the geological structures created by a series of dramatic events that were central to the formation of the North American continent during the SUGAR project. The team is working
  on a long list of tasks, including mapping out the best route for the deployment of the seismographs, and is expected to require a week of intense work by over 30 people. The team is comprised of professionals
  and students who have unique knowledge and skills in geology and seismology.
