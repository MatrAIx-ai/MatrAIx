persona_description: A scientist and researcher who is interested in the study of oceanography and its underlying processes. They are particularly interested in the circulation of the upper ocean and the
  deep ocean circulation before it was observed, and they are also interested in the importance of scale to experimental design. They are skilled at using diagrams and visualizations to clarify complex
  research questions and to help avoid choosing the wrong scale of measurements. They are likely to read scientific papers and articles on oceanography and related fields.
