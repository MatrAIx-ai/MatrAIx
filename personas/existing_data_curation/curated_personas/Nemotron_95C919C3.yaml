personas:
  professional: Digna Ruiz is a bilingual administrative professional who blends curiosity for new productivity tools with a practical, relaxed approach to organization, and they leverage their assertive
    communication to streamline calendar management, coordinate travel logistics, and mentor junior staff while aspiring to become an office manager and earn the CAP credential.
  sports: Digna Ruiz enjoys brisk sunrise walks with the San Pedro Harbor Walkers Club, cheers for the LA Dodgers in baseball season and the LA Lakers in basketball, and they maintain a weekly salsa class
    that doubles as cardio, illustrating a relaxed yet consistent commitment to staying active.
  arts: Digna Ruiz immerses themselves in the vibrant sounds of mariachi and salsa, devours mystery novels by Agatha Christie and self‑help books by Brené Brown, and they often quote favorite lines during
    community festival dances, reflecting a blend of curiosity and practical expression.
  travel: Digna Ruiz balances spontaneous weekend getaways to nearby Santa Barbara and Sedona with a long‑term dream of a cultural immersion in Barcelona, and they prefer loosely planned itineraries that
    accommodate family commitments and a modest travel budget.
  culinary: Digna Ruiz, a confident home chef, spends Saturday afternoons perfecting mole with dark chocolate and ancho chilies, hand‑rolling tamales from fresh corn masa, and whipping up pico de gallo
    with ripe tomatoes and cilantro, and they love sharing these meals at potluck gatherings where friends admire the authentic flavors.
  core: Digna Ruiz blends a relaxed, flexible work ethic with a fierce passion for cooking mole, a habit of talking to their garden plants while humming salsa tunes, and they occasionally rely on ad‑hoc
    spreadsheets for budgeting.
background:
  cultural: Digna is a first‑generation Mexican‑American whose parents immigrated to Southern California in the 1970s. She was raised in a bilingual household where Spanish was spoken at home and English
    at school, giving her deep cultural ties to both traditions. Family gatherings celebrating Día de los Muertos, Christmas posadas, and quinceañeras are central to her identity, and she maintains these
    customs through cooking, music, and religious observances. Living in San Pedro—a community with a vibrant Latino presence—has allowed her to stay connected to Mexican cultural events, support local
    Mexican-owned businesses, and participate in neighborhood celebrations. Her heritage informs her warm interpersonal style, strong sense of community, and the value she places on family cohesion.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Microsoft Office Suite proficiency'', ''Google Workspace proficiency'', ''Calendar and appointment management'', ''Travel and logistics coordination'',
