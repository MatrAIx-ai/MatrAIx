    ''Problem‑solving and conflict resolution'']'
  hobbies: '[''Cooking authentic Mexican cuisine'', ''Gardening a backyard vegetable garden'', ''Walking along the San Pedro harbor'', ''Attending local cultural festivals'', ''Reading mystery and self‑help
    books'', ''Weekly salsa dancing class'', ''Volunteering at the local food bank'']'
  career_goals: Digna aims to move from a support role into an office manager position where she can lead a small team and spearhead the adoption of user‑friendly digital tools that streamline workflow.
    She plans to earn the Certified Administrative Professional (CAP) credential to formalize her expertise and increase her credibility. Over the next few years, she hopes to mentor newer administrative
    staff, develop a hybrid remote‑work arrangement that allows her greater flexibility for family responsibilities, and eventually offer consulting services to local small businesses seeking to modernize
    their office processes. Her ambition is balanced with a desire for stable work‑life harmony, ensuring she can continue to enjoy family time and community involvement.
