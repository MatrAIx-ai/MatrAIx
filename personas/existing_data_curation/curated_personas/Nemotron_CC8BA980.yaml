  career_goals: She aims to secure a junior role in a multidisciplinary design studio or cultural institution where she can merge her artistic sensibility with research-driven storytelling. In the next
    five years, Morita envisions leading a creative team, curating cross-cultural exhibitions, and eventually launching her own platform that showcases emerging East Asian artists in New York. She is also
    interested in earning a BFA in Visual Arts and building a robust freelance portfolio that balances artistic freedom with strategic client work.
