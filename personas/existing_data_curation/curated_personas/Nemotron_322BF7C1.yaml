personas:
  professional: Sonny Newsome, a business administration senior concentrating on operations and supply chain, they blend meticulous Excel tracking with a natural knack for coordinating group projects and
    mediating retail floor conflicts, delivering results with a friendly, community‑focused flair.
  sports: Sonny Newsome, a member of the Hazelwood Hoops intramural basketball team and a regular player for the Creekside Soccer Club, they carve out early‑morning runs around Creve Coeur Lake, cheer for
    the St. Louis Cardinals and St. Louis Blues, and view each weekend match as a chance to practice teamwork off the field.
  arts: Sonny Newsome, an avid supporter of the local music scene, they spend weekends at The Pageant watching indie acts like The Apex, stream Hozier and Lizzo at home, and binge‑watch contemporary dramas
    such as Ted Lasso and indie films from the Sundance festival, letting these creative outlets shape their social conversations.
  travel: Sonny Newsome, a weekend road‑trip enthusiast, they have camped in the Ozarks, explored Nashville’s vibrant music venues on spring break, and dream of a summer food‑festival pilgrimage to Austin,
    always planning itineraries in a shared spreadsheet to stay within a modest student budget.
  culinary: Sonny Newsome, a self‑taught barbecue hobbyist, they perfect St. Louis‑style ribs and experiment with smoked brisket, while also mastering homemade toasted ravioli with ricotta and marinara,
    and occasionally treat friends to spicy ramen bowls when late‑night study sessions run long.
  core: Sonny Newsome is a pragmatic, community‑oriented 22‑year‑old who balances spreadsheets with grill smoke, plays team sports for fun, saves cautiously yet treats themselves to concerts, and sometimes
    stays up all night finishing group projects.
background:
  cultural: Sonny grew up in Hazelwood, a suburban community in St. Louis County, within a predominantly white, middle‑class Midwestern environment. His upbringing emphasized community involvement, a strong
    work ethic, and polite, friendly interactions typical of the region. He attended local public schools, participated in church youth groups, and was exposed to regional traditions such as community fairs,
    baseball games, and the distinctive St. Louis cuisine of toasted ravioli and barbecue. This cultural context has shaped his collaborative spirit, practical outlook, and appreciation for group activities.
