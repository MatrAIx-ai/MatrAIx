  career_goals: Sonny plans to complete his bachelor's degree in Business Administration within the next two years, with a focus on operations and supply chain management. He aims to secure an entry‑level
    analyst position at a logistics firm or a regional retailer, leveraging his practical mindset and analytical skills. Over the next five years, he aspires to advance to a supervisory role, eventually
    overseeing a team and optimizing processes. He also entertains the idea of starting a small, community‑focused venture, such as a pop‑up food stall, to combine his entrepreneurial spirit with his love
    of local culture.
