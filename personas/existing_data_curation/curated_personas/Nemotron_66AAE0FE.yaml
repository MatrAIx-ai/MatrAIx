  hobbies: '[''Reading mystery novels'', ''Herb gardening'', ''Knitting and crocheting'', ''Crossword and Sudoku puzzles'', ''Listening to productivity and psychology podcasts'', ''Nature walks on local
    trails'', ''Small‑group book club'', ''Volunteering at the community library'']'
  career_goals: Darlene aims to advance to a senior executive assistant role supporting a C‑level leader within a regional corporation, and to earn the Certified Administrative Professional (CAP) credential
    while completing project‑management coursework. She envisions broadening her expertise in remote‑work coordination and eventually stepping into an office manager or operations liaison position. Over
    the longer term, her entrepreneurial curiosity inspires a modest virtual‑assistant consultancy that would allow her to leverage her organizational strengths while maintaining a stable, balanced lifestyle.
