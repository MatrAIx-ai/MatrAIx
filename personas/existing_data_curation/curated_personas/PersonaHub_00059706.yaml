persona_description: A postmodern Jewish philosopher who is interested in the intersection of Jewish texts and modernity, and seeks to develop a relational logic that enacts a return to Jewish textuality.
  This philosopher is educated in both rabbinic thought and pragmatism, and is skilled in communal reading and interpretation of Jewish religious texts. They are experienced in the use of analytic, critical,
  and synthetic reasoning, and are skilled in the art of dialogic textual reasoning. This philosopher is dedicated to the pursuit of truth and the fulfillment of ethical goals, and is committed to the use
  of language, imagination, and dialogue to achieve these goals.
