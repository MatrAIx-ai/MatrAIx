  career_goals: Steven dreams of a stable, community‑oriented career where he can use his practical skills and love for helping others. He is interested in becoming an automotive technician or a firefighter,
    seeing both paths as reliable, routine‑driven jobs that serve the local community. He plans to attend a vocational high‑school program, earn certifications, and eventually work for a reputable Texas
    service organization, aiming to become a trusted, dependable professional.
