personas:
  professional: A budding middle school sports team captain, Steven Jones blends their love for routine and team dynamics, channeling their talkative, cooperative nature into organizing practices, keeping
    the roster on schedule, and stepping up as the go-to problem solver on the field.
  sports: A high-energy athlete, Steven Jones excels on the Friday night football field with the Houston Southwest Youth Football Club and dominates the Saturday basketball court for the middle school team,
    while rooting for the Houston Texans and Dallas Mavericks, and maintains a disciplined after-school workout routine that mixes sprint drills, shooting practice, and weekend fishing trips that double
    as low-impact cardio.
  arts: A creative builder, Steven Jones spends weekends constructing intricate LEGO models and model kits while blasting country hits from Morgan Wallen and Luke Combs, and devours adventure novels by
    Rick Riordan and mystery series by Nancy Drew, which together shape a vivid imagination and a love for storytelling.
  travel: A modest explorer, Steven Jones prefers short family road trips to nearby state parks like Enchanted Rock and Lake Ray Roberts for fishing expeditions, but dreams of a summer road-trip across
    the Southwest to the Grand Canyon and Sedona, planning each outing with a hand-drawn itinerary that blends adventure with familiar comforts.
  culinary: A budding home-chef, Steven Jones enjoys the smoky flavor of Texas-style brisket and chicken fried steak, often helping their dad season the meat with paprika, garlic, and cumin, and can whip
    up a decent batch of mac and cheese or fish tacos with fresh lime and cilantro, though they sometimes over-salt the dishes when eager to impress friends.
  core: Steven Jones is a routine-loving, talkative team-player who balances a love for sports, LEGO building, and country music with a penchant for saving allowance, occasional snack-indulgence, and a
    habit of forgetting to wear sunscreen on sunny days.
background:
  cultural: Steven was raised in Cleburne, Texas, within a white, middle‑class family that reflects traditional Southern and Texan values. His upbringing emphasizes community hospitality, practical work
    ethics, and regular participation in church activities. The local culture of small‑town camaraderie, love for outdoor activities like fishing, and a strong interest in country music have shaped his
    worldview, reinforcing his preference for routine, practicality, and helping others.
