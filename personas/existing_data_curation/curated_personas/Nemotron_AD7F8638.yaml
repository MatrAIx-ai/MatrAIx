  hobbies: '["Visiting museums and galleries", "Attending community theater", "Watercolor painting", "Digital photography", "Gardening", "Reading popular science and history books", "Co‑founding and leading
    a senior book club", "Guiding neighborhood architectural walking tours", "Weekly senior dance class", "Yoga and mindfulness meditation", "Reflective journaling"]'
  career_goals: Although retired from formal employment, Analuisa aims to leverage her expertise through volunteer consulting for local startups and arts organizations, seeking to foster interdisciplinary
    collaboration. She aspires to design and lead workshops that blend scientific inquiry with creative practice for seniors and youth alike. A long‑term ambition is to establish a scholarship fund for
    women pursuing STEM fields in the Champaign area, thereby leaving a lasting legacy. She also hopes to author a series of articles—or a modest book—exploring the intersections of art, science, and community
    engagement, while continuing to mentor the next generation of curious, achievement‑driven individuals.
