personas:
  professional: Analuisa Dewitt, a retired data analyst with a STEM background, now volunteers as a community arts consultant, leveraging her analytical skills, meticulous project management, and charismatic
    public speaking to design interdisciplinary workshops that blend science and creativity for seniors and youth.
  sports: Analuisa Dewitt enjoys low‑impact fitness, joining the Champaign Senior Walking Club for weekly Nordic‑walking sessions, cheering on the Chicago Cubs, Chicago Bears, and Chicago Bulls, and dancing
    salsa at a local studio, which satisfies her energetic, sociable side while keeping her joints healthy.
  arts: Analuisa Dewitt immerses herself in the visual arts, painting watercolors of local flora, curating photo series of historic Champaign architecture, regularly attending exhibitions at the Museum
    of Contemporary Art Chicago and the Art Institute of Chicago, and delighting in the works of Georgia O’Keeffe, Ansel Adams, and Lin‑Manuel Miranda’s musical 'Hamilton'.
  travel: Analuisa Dewitt favors thoughtfully organized cultural trips, having revisited Florence to study Renaissance sculpture, embarked on a spring photography tour of Kyoto’s zen gardens, and taken
    weekend getaways to Chicago’s art districts, while balancing her travel budget with the costs of her scholarship fund.
  culinary: Analuisa Dewitt, an avid amateur chef, loves preparing Mediterranean ratatouille with fresh basil from her garden, perfecting miso‑glazed salmon, and pairing dishes with a cup of jasmine tea,
    yet she habitually adds a pinch too much sea salt, a quirk her friends tease her about.
  core: Analuisa Dewitt is a curious, hyper‑organized, sociable senior who blends scientific rigor with artistic flair, worries about missing deadlines, and can’t resist a daily splash of watercolor before
    bedtime.
background:
  cultural: Analuisa is a White Midwesterner who has spent most of her adult life in Champaign, Illinois, surrounded by the academic environment of the University of Illinois. Raised in a middle‑class family
    with roots in German and Irish ancestry, she grew up with values of self‑reliance, community service, and a strong emphasis on education. The cultural milieu of Champaign—characterized by a blend of
    university‑driven progressivism and traditional Midwestern hospitality—has shaped her open‑minded curiosity, her respect for diverse ideas, and her commitment to fostering inclusive community initiatives.
