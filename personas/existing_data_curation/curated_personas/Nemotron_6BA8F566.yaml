personas:
  professional: Adela Cangelosi, a budding young engineer and avid student, channels their curiosity and competitive spirit into designing simple machines from repurposed household items, leveraging meticulous
    organization and a skeptical eye for design flaws.
  sports: Adela Cangelosi thrives on the community park soccer field, playing as a forward for the Sunrise Soccer Club while cheering for the Chicago Fire FC, and they balance a competitive drive with regular
    running drills and weekend matches to stay fit.
  arts: Adela Cangelosi immerses themselves in art by sketching Van Gogh’s swirling night skies, emulating Yayoi Kusama’s polka‑dot installations, and humming the catchy tunes of Taylor Swift, allowing
    these influences to shape a vivid, imaginative outlook that fuels both their school projects and DIY crafts.
  travel: Adela Cangelosi prefers family‑planned road trips with detailed itineraries, having explored the Grand Canyon and a weekend visit to Washington, D.C., they now dream of a summer vacation in Paris
    to see the Louvre and a future snorkeling adventure at the Great Barrier Reef, balancing curiosity with the practical limits of a school schedule.
  culinary: Adela Cangelosi enjoys the bold flavors of margherita pizza topped with fresh basil, loves crafting spaghetti carbonara with pancetta and Parmesan, often experiments with homemade avocado toast
    and chocolate‑chip pancakes, and they enthusiastically assist in the kitchen by whisking batter and assembling simple sushi rolls like California rolls, reflecting a budding culinary curiosity.
  core: Adela Cangelosi blends a fierce curiosity for art and mechanics with a competitive edge on the soccer field, yet habitually forgets to tidy up their rock collection, scattering shells across the
    living room—a charming testament to their energetic, slightly scattered brilliance.
background:
  cultural: Adela comes from a white, middle‑class family rooted in the suburban community of Fairburn, Georgia. Her upbringing reflects Southern cultural traditions such as seasonal festivals, church youth
    gatherings, and family barbecues featuring classic Southern cuisine. She attends a public elementary school where she participates in the art club and the robotics program, exposing her to a blend of
    cultural appreciation and technological curiosity. Her family values education, community involvement, and encouragement of individual talent, which aligns with her personal drive to explore new ideas
    and excel in her interests.
