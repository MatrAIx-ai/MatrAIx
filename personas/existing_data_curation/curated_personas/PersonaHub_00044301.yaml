persona_description: A teacher of early childhood education, special education, and middle childhood education who is interested in teaching junior high or high school mathematics. They are passionate about
  fostering a love for mathematics and believe in the importance of deepening their own understanding of the subject matter. They are also interested in problem-solving and mathematical discussion, and
  are dedicated to giving their students "know-how" and attitudes of mind. They are interested in the philosophy of mathematics and are committed to promoting the view that mathematics is something that
  springs from reasoning, not as a mere collection of rules and skills to follow. They are excited to work with the Department of Mathematics and are open to learning from the team of core players.
