personas:
  professional: Adam Parsons is a high-school waiter who juggles multiple tables with ease, using their curiosity and practicality to master POS systems and mediate kitchen-floor conflicts, all while eyeing
    a supervisory role as they pursue a hospitality-management degree.
  sports: Adam Parsons embraces pickup basketball games with friends on weekends, cheers for the Atlanta Hawks and follows the Carolina Panthers, while regularly hiking the Savannah River trail as part
    of a local outdoor club, blending competitive energy with a laid-back fitness routine.
  arts: Adam Parsons cultivates a love for classic rock and blues, spinning Led Zeppelin and B.B. King alongside indie gems like Phoebe Bridgers, while occasionally picking up the guitar at gatherings and
    curating mixtapes that showcase their eclectic taste.
  travel: Adam Parsons prefers budget-friendly road trips that combine food discovery with scenic hikes, having toured Charleston's historic kitchens and New Orleans' spice markets, and they hope to later
    explore Oaxaca's mezcal scene and Italy's Tuscan farms to broaden their culinary repertoire.
  culinary: Adam Parsons experiments in the kitchen with Southern staples like shrimp-and-grits, smoked brisket, and collard greens seasoned with hot sauce and smoked paprika, while honing mixology skills
    to craft bourbon-based Old Fashioneds, reflecting a hands-on, flavor-first cooking style.
  core: Adam Parsons is an outgoing 18-year-old who blends a pragmatic hustle in hospitality with a restless curiosity for Southern flavors, music, and community, all while juggling a penchant for impulsive
    splurges and a disciplined workout routine.
background:
  cultural: Adam grew up in Trenton, South Carolina, in a middle‑class family where community involvement and Southern hospitality were integral parts of daily life. Local traditions such as high school
    football games, county fairs, and church gatherings provided a social framework that reinforced his outgoing personality. The regional emphasis on courteous interaction and a strong work ethic shaped
    his approach to service work. While he appreciates classic Southern foods like barbecue and sweet tea, his curiosity drives him to explore broader culinary trends and incorporate them into his personal
    cooking. This blend of local cultural rootedness and an open‑minded curiosity informs both his personal and professional aspirations.
