  career_goals: Adam plans to enroll in a hospitality‑management program after high school, aiming to earn a bachelor's degree that blends business acumen with culinary knowledge. In the short term, he
    seeks a supervisory role in a busy restaurant to sharpen his leadership abilities. Long‑term, he aspires to open a community‑focused eatery in the Aiken County area that highlights locally sourced Southern
    cuisine while offering a welcoming environment for diverse patrons. He also hopes to travel periodically to learn regional food traditions, which he can later integrate into his own menu, and eventually
    mentor young staff members entering the service industry.
