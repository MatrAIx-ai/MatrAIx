    User 1: So, what do you think of the moon landing?

    User 2: I think it was faked.

    User 1: What makes you think that?

    User 2: I just don''t think it''s possible. The technology wasn''t there at the time.

    User 1: I see. Well, I think it was real.

    User 2: We''ll just have to agree to disagree.

    User 1: Sure.

    User 2: So, what else do you do for fun?

    User 1: I like to go horseback riding.

    User 2: Oh, that''s cool. I''ve never been horseback riding.

    User 1: You should try it sometime. It''s a lot of fun.

    User 2: I might have to do that.

