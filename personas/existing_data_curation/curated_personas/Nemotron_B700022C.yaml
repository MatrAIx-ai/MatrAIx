  career_goals: Hung aims to transition into a stable, structured role such as office manager or project coordinator within a community‑focused organization or a mid‑size tech firm in the Bay Area. He plans
    to complete a bachelor's degree in business administration over the next two years and acquire a Project Management Professional (PMP) certification to solidify his credentials. His ultimate ambition
    is to secure a position that offers predictable routines, clear responsibilities, and a supportive environment that minimizes stress, allowing him to provide financial security for his spouse and contribute
    meaningfully to his local community.
