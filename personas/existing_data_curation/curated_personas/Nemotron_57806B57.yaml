  career_goals: Logan dreams of becoming a wildlife biologist or park ranger, envisioning a career where he can explore the natural world and protect the animals he loves. He also imagines designing practical
    inventions as an engineer, combining his curiosity with helpful solutions for his community. Ultimately, he hopes to work a job that lets him stay connected to nature, solve real problems, and share
    his enthusiasm with other kids.
