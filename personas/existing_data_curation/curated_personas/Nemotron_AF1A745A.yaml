    about supply chain innovation'', ''Exploring local music festivals'', ''Weekend hikes in Stone Mountain Park'']'
  career_goals: Rodney aims to progress from purchasing agent to senior category manager and eventually head of supply chain for a mid‑size manufacturing firm in the Southeast. He plans to earn the CPSM
    certification and pursue a part‑time MBA focused on sustainability. He is eager to lead a large‑scale digitization project that integrates AI‑based spend forecasting and to champion supplier‑diversity
    programs that benefit minority‑owned businesses in the Atlanta region. Long‑term, he envisions launching a consulting boutique that helps regional companies adopt ethical and resilient procurement practices.
