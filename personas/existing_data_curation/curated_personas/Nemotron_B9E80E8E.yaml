personas:
  professional: Alice Evans is a seasoned nursing assistant with over two decades of hands‑on patient care, who combines meticulous vital‑sign monitoring and empathetic de‑escalation skills with a spontaneous,
    self‑directed drive to integrate watercolor and photography into hospice settings, and they aim to formalize their credentials through CNA and LPN programs while championing holistic, patient‑centered
    practices.
  sports: Alice Evans enjoys low‑impact outdoor activities such as sunrise hikes in the Wasatch Range and seasonal snowshoeing, is a member of the Salt Lake City Seniors Trail Club, follows the Utah Jazz
    and Real Salt Lake with quiet devotion, and they occasionally join a local yoga studio’s gentle flow classes to complement their fitness routine.
  arts: Alice Evans channels their love for the arts through delicate watercolor landscapes inspired by Monet’s palette, macro photography echoing the style of Ansel Adams, knitting projects featuring patterns
    from the works of William Morris, and listening to classical compositions by Bach and Yo‑Yo Ma while attending intimate gallery openings showcasing emerging regional painters.
  travel: Alice Evans prefers solitary, off‑season travel to serene natural retreats, having explored the quiet valleys of Zion National Park, the alpine meadows of Glacier National Park, and a reflective
    pilgrimage to Kyoto’s temple gardens, and they are planning future visits to the lavender fields of Provence for their calming aroma.
  culinary: Alice Evans cooks with modest confidence, frequently preparing herb‑infused grilled salmon with rosemary and thyme from their garden, simmered lentil stew seasoned with sage and cilantro, and
    savoring fresh basil pesto over whole‑wheat pasta, while they occasionally indulge in saffron risotto when they splurge on culinary treats.
  core: Alice Evans is a quietly intense, art‑infused caretaker who balances a disciplined clinical routine with spontaneous creative escapes, often wrestling with anxiety but finding solace in solitary
    landscapes, herbs, and gentle rhythms, and they cherish the quiet moments that sustain their emotional well‑being.
background:
  cultural: Alice grew up in a modest, predominantly white community in the Intermountain West, with family roots tracing back to English and German ancestry. Her upbringing was influenced by the region’s
    strong community‑service ethic and the cultural values of the local LDS‑affiliated environment, though she now identifies as spiritually independent while still honoring the emphasis on family and mutual
    support. Living in Orem, Utah County places her within a suburban, culturally homogeneous setting that values modesty, hard work, and outdoor recreation. She appreciates the natural beauty of the Utah
    landscape, which informs her artistic interests, and she holds a respectful awareness of the indigenous Ute heritage of the area, occasionally seeking out cultural events that broaden her perspective.
attributes:
  skills: '[''Basic patient care'',''Vital sign monitoring'',''Wound dressing and care'',''Infection control'',''Patient advocacy'',''Empathetic communication'',''Art therapy basics'',''Creative problem
    solving'',''Adaptability'',''Self‑directed learning'']'
  hobbies: '[''Watercolor painting'',''Nature photography'',''Reading poetry and literary fiction'',''Journaling and reflective writing'',''Gardening (herbs and native plants)'',''Birdwatching'',''Yoga
    and mindfulness meditation'',''Knitting and crochet'',''Exploring art galleries and museums (solo)'',''Listening to classical music and podcasts'']'
  career_goals: Alice aims to formalize her caregiving expertise by completing a CNA certification and eventually pursuing an LPN program through evening courses, with a particular interest in hospice and
    palliative care where she can blend her clinical skills with her love of art. She hopes to develop a small, quiet art‑therapy corner within her workplace to help patients manage anxiety and pain. Long‑term,
    she envisions advocating for more holistic, patient‑centered practices in the Utah health system, and she plans to acquire a bachelor’s degree in nursing to broaden her impact while maintaining a flexible
    schedule that protects her emotional well‑being.
