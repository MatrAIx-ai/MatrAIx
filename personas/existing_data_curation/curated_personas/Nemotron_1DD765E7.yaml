  career_goals: Even at four, Stephanie dreams of a future where she can create and organize. She imagines becoming an architect or builder, fascinated by how things fit together and the predictability
    of plans. She also talks about caring for animals as a future veterinarian, drawn to the clear daily care routines. In the near term, she aims to learn to read simple books, master riding her balance
    bike without training wheels, and become more independent in dressing herself.
