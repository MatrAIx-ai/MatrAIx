personas:
  professional: Stephanie Orosa, a four-year-old aspiring block architect, meticulously arranges LEGO bricks into symmetrical towers, showcasing a love for structure while still happily improvising when
    a piece goes missing, revealing that they value predictability yet appreciate flexibility.
  sports: Stephanie Orosa, a kindergarten participant in the Tiny Turtles Swim Club and a fan of the Durham Bulls minor‑league baseball team, dives into the pool with a competitive spark while cheering
    loudly at games, yet also enjoys spontaneous tag games during recess.
  arts: Stephanie Orosa, who adores the animated series Bluey, sings along to Disney’s Let It Go performed by Idina Menzel, and delights in drawing characters from Dr. Seuss, lets these creative outlets
    shape their playtime and imagination.
  travel: Stephanie Orosa, who loves family road trips to the Grand Canyon and weekend visits to the local aquarium, prefers short, well‑planned outings with a reliable stroller but also delights in spontaneous
    stops at playgrounds along the way.
  culinary: Stephanie Orosa, a picky eater who prefers macaroni and cheese with extra cheddar, crunchy apple slices, and chicken nuggets, can skillfully spread peanut butter on toast but refuses foods with
    strong spices like cumin or curry.
  core: Stephanie Orosa, a four‑year‑old who builds perfect block towers yet leaves crayons scattered, balances a love for order with spontaneous bursts of imagination and a competitive streak in playground
    games.
background:
  cultural: Stephanie grows up in a middle‑class white family in Boise, Idaho, where the local culture emphasizes self‑reliance, outdoor recreation, and community gatherings. Her family celebrates typical
    American holidays like Thanksgiving and Fourth of July, and also participates in regional events such as the Boise River Festival, which foster a connection to the natural surroundings. The community’s
    values of politeness, independence, and respect for personal space shape her social interactions. Access to nearby forests and mountains encourages a love for hiking, wildlife observation, and seasonal
    activities like autumn leaf walks, reinforcing a balanced appreciation for structured routines and spontaneous exploration.
