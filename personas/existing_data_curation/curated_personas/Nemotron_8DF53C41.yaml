  hobbies: '[''building block towers'', ''listening to bilingual storybooks'', ''dancing to Latin music with family'', ''exploring the local park'', ''sand and water play'', ''coloring with crayons'', ''playing
    simple pretend games (firefighter, singer, soccer player)'']'
  career_goals: As a toddler, Andres’s ambitions are expressed through imaginative play and observation. He frequently pretends to be a firefighter, a soccer player, or a singer, echoing his curiosity about
    the world and a practical desire to help others. He enjoys watching grown‑ups around the house, such as a parent cooking or a neighbor fixing things, and often says he wants to "be big" and "do that
    too". These early aspirations reflect a balanced outlook—he is drawn to both creative, expressive roles (like singing) and service‑oriented roles (like helping people as a firefighter). Though his goals
    are still forming, they are guided by his kindness, desire for harmony, and a practical inclination to learn by watching and imitating adults.
