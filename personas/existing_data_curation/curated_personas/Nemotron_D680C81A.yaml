personas:
  professional: Reid Derosa is an ambitious 18‑year‑old sales associate in training, blending a natural knack for building rapport with a flair for visual storytelling; they leverage CRM tools and quick‑draw
    graphic sketches to pitch tech‑service packages, and their competitive drive pushes them to chase top‑performer status while they balance meticulous pipeline management with the flexibility to pivot
    during client conversations.
  sports: Reid Derosa thrives on sun‑soaked beach volleyball matches with the local San Diego Beach Volley Club, regularly hikes the coastal trails with the Hike San Diego group, and cheers loudly for the
    San Diego Padres at Petco Park and the San Diego Wave FC during their off‑season; they also follow the NBA’s Los Angeles Lakers from a distance, but their primary fitness focus remains the high‑energy,
    team‑oriented activities that satisfy their outgoing nature.
  arts: Reid Derosa is a digital illustration hobbyist inspired by the surreal aesthetics of Bee Bee‑Bee and the kinetic energy of Flying Lotus, producing short electronic music clips in the style of Aphex Twin
    and Flume that they share on TikTok, while they spend weekends photographing murals by local street artists and attending pop‑up shows featuring the work of contemporary visionaries like JR and Yayoi Kusama;
    their improv comedy stint with the San Diego Improv Lab sharpens their quick‑thinking, feeding back into their creative presentations.
  travel: Reid Derosa prefers spontaneous weekend getaways, often road‑tripping to Joshua Tree for desert photography, surfing in La Jolla, or exploring the vibrant food markets of Tijuana, while they dream
    of a tech‑art pilgrimage to Tokyo’s Akihabara district and a mindfulness retreat in Bali’s Ubud; their travel planning leans on budget‑friendly apps like Skyscanner and Hostelworld, and they usually
    travel with a compact backpack, a portable sketchpad, and a USB‑powered synth.
  culinary: Reid Derosa’s palate oscillates between craving spicy fish tacos from the Mission Beach stalls, experimenting with homemade ramen broth infused with miso and kombu, and crafting avocado‑lime
    toast topped with smoked salmon while listening to ambient electronica; they consider themselves an intermediate home cook, often improvising with ingredients like sriracha, fresh cilantro, and black
    garlic, but they frequently order a late‑night pizza from Hodad’s when a creative block hits.
  core: Reid Derosa is an imaginative, competition‑driven 18‑year‑old who fuses art, sales, and mindfulness into a restless quest for novelty, often juggling impulsive spending and anxiety‑fuelled worry
    while chasing top‑performer status.
background:
  cultural: Reid grew up in a suburban neighborhood of San Diego, California, in a family with Italian heritage. His upbringing combined traditional Italian values—such as an emphasis on family meals and
    craftsmanship—with the laid‑back, multicultural vibe of Southern California. The region’s surf culture, outdoor lifestyle, and thriving arts community have shaped his outlook, fostering both a competitive,
    entrepreneurial spirit typical of the West Coast and a deep appreciation for creative expression. He is fluent in English and has conversational Spanish from frequent interactions with the local Latino
    community, reflecting the diverse cultural tapestry of his hometown.
