    coordination and group promotion'']'
  hobbies: '[''Digital illustration'', ''Electronic music production'', ''Street‑art photography and gallery visits'', ''Reading speculative fiction and philosophy'', ''Improv comedy'', ''Strategy board
    gaming'', ''Beach volleyball'', ''Mindfulness meditation'', ''Reflective journaling'', ''Social media content creation'']'
  career_goals: Reid aims to become the top sales performer on his team within the next year, earning a certification in the Challenger sales methodology and consistently exceeding quota. He plans to enroll
    part‑time in a Business Administration program at San Diego State University to deepen his understanding of market analytics and strategic management. In five years, he envisions moving into an account‑manager
    role at a tech‑services firm, leading a small team, and designing innovative service packages that merge technology with visual design. Ultimately, he hopes to launch his own boutique consultancy that
    helps local San Diego businesses craft data‑driven, aesthetically striking service experiences, while also developing emotional resilience through mindfulness training to handle high‑pressure sales
    environments.
