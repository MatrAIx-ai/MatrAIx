personas:
  professional: Callie Archer, a seasoned food‑service manager with expertise in inventory control, cost budgeting, and team training, blends a structured, data‑driven approach with a flexible, people‑centric
    style that keeps the restaurant’s operations smooth while motivating staff with their high energy and competitive spirit.
  sports: Callie Archer enjoys senior Zumba and walking challenges with the local Walking Club, hearts the Washington Commanders and the Washington Nationals, plays bridge competitively at the community
    center, and cheers on the local Stafford County Little League team whenever they can fit a game into their garden‑plot schedule.
  arts: Callie Archer brings their dramatic flair to the Stafford Community Theatre, starring in productions like 'Our Town' and 'The Miracle Worker,' while sipping Pinot during gallery openings featuring
    works by Georgia O'Keeffe and listening to jazz pianist Diana Krall on weekend evenings, feeding their love for story and music into every social gathering.
  travel: Callie Archer prefers short road trips that balance adventure with family duties, regularly visits the historic sites of Washington, D.C., has taken a nostalgic cruise to the Outer Banks for a
    sunrise walk, dreams of a culinary tour of Tuscany, and plans their next outing to the Napa Valley wine region for a tasting weekend with their husband.
  culinary: Callie Archer’s palate gravitates to robust comfort foods like coq au vin, slow‑roasted pork shoulder, and blueberry crumble pies, they cultivate basil, thyme, and heirloom tomatoes in their
    garden plot to freshen their recipes, and while they master culinary techniques from their years in restaurant management, they occasionally over‑salt dishes when caught up in friendly bake‑off contests.
  core: Callie Archer blends a chef’s precision with a theater‑goer's charisma, channeling their competitive edge into every bake‑off and budgeting spreadsheet, while their occasional disorganization and
    skeptical streak keep them both grounded and constantly seeking fresh challenges.
background:
  cultural: Callie is a lifelong resident of the Mid‑Atlantic, raised in a middle‑class white family with deep roots in Virginia. Her upbringing emphasized Southern hospitality, community involvement, and
    a practical work ethic. She regularly attends a local Methodist church, celebrates traditional American holidays with extended family, and values the blend of historic Virginia customs with modern,
    diverse community influences prevalent in Stafford County.
attributes:
  skills: '[''staff scheduling'', ''inventory control'', ''cost budgeting'', ''health and safety compliance'', ''menu development'', ''conflict resolution'', ''vendor negotiation'', ''team training'', ''POS
