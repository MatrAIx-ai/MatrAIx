  hobbies: '[''community theater'', ''garden club'', ''volunteering at local food bank'', ''wine tasting'', ''senior fitness classes'', ''bridge club'', ''family cooking gatherings'', ''charity walks'',
    ''bake‑off contests'']'
  career_goals: In the next five years Callie aims to earn a regional food‑service manager certification, raise her restaurant’s customer satisfaction scores to the top tier within Stafford County, and
    mentor a new generation of hospitality leaders. She also hopes to obtain the ServSafe Manager certification, launch a small community‑focused catering venture with her husband, and eventually transition
    into a consulting role where she can share her practical expertise with emerging food‑service businesses.
