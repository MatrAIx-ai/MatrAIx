  career_goals: Chris aims to become a senior software architect within the next five years, focusing on building innovative platforms that fuse artificial intelligence with creative expression—such as
    AI‑driven graphic design tools or immersive multimedia experiences. He plans to earn professional certifications in cloud architecture (AWS Solutions Architect) and data science, and to lead interdisciplinary
    teams that blend engineering, art, and user research. Ultimately, Chris aspires to launch his own startup that offers next‑generation creative software for artists and designers, positioning himself
    as a thought leader at the intersection of technology and aesthetics.
