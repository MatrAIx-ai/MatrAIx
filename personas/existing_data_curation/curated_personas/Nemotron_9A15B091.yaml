  career_goals: At 75, Dennis aims to transition into a senior advisory and mentorship role within his credit union or community banking network. His primary goals are to train the next generation of loan
    officers, develop a bilingual financial‑literacy curriculum for underserved Latino families in Orange County, and author a memoir chronicling the evolution of community lending. He also seeks to obtain
    the Certified Credit Counselor designation to formalize his expertise and collaborate on policy advocacy for stronger consumer‑protection regulations.
