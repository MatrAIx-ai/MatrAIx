personas:
  professional: An acute care nurse with a meticulous eye for clinical detail, Pauline Simmons orchestrates shift handoffs with precision, leveraging their sociable nature to mentor new staff while strictly
    adhering to protocols and maintaining a calm demeanor despite their sensitivity to stress.
  sports: A devoted fan of the Buffalo Bills and Buffalo Sabres, Pauline Simmons attends local games when possible, participates in morning yoga classes and joins a weekend hiking group that explores Erie
    County parks, balancing structured fitness with team spirit.
  arts: A mystery‑novel enthusiast who devours Agatha Christie and Gillian Flynn, Pauline Simmons leads a book club that meets monthly, enjoys board games like Catan and Ticket to Ride, and frequently catches
    live performances at Shea's Performing Arts Center, especially productions featuring classic Broadway tunes.
  travel: A planner who favors both relaxation and cultural immersion, Pauline Simmons has road‑tripped to Niagara Falls, weekend‑escaped to Toronto for theater shows, and dreams of hiking the Scottish
    Highlands, always booking accommodations months ahead while budgeting for impromptu group meals on trip.
  culinary: A self‑titled Buffalo wing aficionado who perfects a tangy hot sauce for classic buffalo chicken dip and serves it at game nights, Pauline Simmons also experiments with homestyle mac & cheese,
    uses blue cheese crumbles liberally, and maintains a color‑coded spice rack for efficiency.
  core: Pauline Simmons, a routine‑loving, socially vibrant nurse, balances meticulous patient care with lively gatherings, yet often wrestles with stress‑induced overthinking and occasional impulse splurges
    on board games.
background:
  cultural: Pauline was raised in a middle‑class, white, Irish‑American family in the suburbs of Buffalo, New York. Her upbringing emphasized community involvement, modesty, and traditional values, with
    regular participation in local church events and neighborhood gatherings. The region's strong sense of loyalty and hard‑working ethos shaped her practical outlook and preference for familiar, routine‑based
    environments. She carries forward these cultural influences through her commitment to reliable care, dedication to community service, and the celebration of regional traditions such as attending the
    Buffalo Wing Festival and supporting the local sports teams.
