  career_goals: Pauline aims to advance from bedside nursing to a supervisory role within the next five years, targeting a position as a nurse manager on the medical‑surgical floor of her Buffalo hospital.
    She plans to obtain a certification in Nursing Management (CNM) and pursue a Master's degree in Healthcare Administration to deepen her understanding of operational efficiency. Ultimately, she envisions
    leading a department that values both high‑quality patient care and staff well‑being, implementing evidence‑based practices that streamline routine procedures while fostering a supportive, collaborative
    work environment. She also hopes to mentor junior nurses, sharing her reliable, organized approach while helping them navigate the emotional demands of the profession.
