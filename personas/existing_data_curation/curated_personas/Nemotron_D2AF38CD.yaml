  hobbies: '[''Salsa and bachata dancing'', ''Cooking traditional Latin American cuisine'', ''Hiking in Patapsco Valley State Park'', ''Yoga'', ''Volunteering at a community center (English‑Spanish tutoring)'',
    ''Photography (real estate and street)'', ''Reading business and technology books'', ''Traveling to Puerto Rico to visit family'', ''Participating in charity runs and community fundraisers'']'
  career_goals: Carmen aims to become a leading broker specializing in sustainable and affordable housing in the Baltimore region. She plans to earn the Certified Residential Specialist (CRS) designation
    and pursue certifications in green building. Within the next five years, she hopes to launch her own boutique brokerage that emphasizes data‑driven client service and offers mentorship programs for
    new agents, especially those from underrepresented backgrounds. Additionally, she seeks to influence local housing policy by advocating for affordable‑home initiatives and to expand her network to serve
    more Latino homebuyers while maintaining a reputation for integrity and community impact.
