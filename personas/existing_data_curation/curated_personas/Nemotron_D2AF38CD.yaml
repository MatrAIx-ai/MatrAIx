personas:
  professional: Carmen Hermida, a 52‑year‑old real‑estate broker who blends a STEM background with a data‑driven approach, uses advanced market analytics, CRM tools, and bilingual communication to negotiate
    deals and mentor underrepresented agents while championing sustainable, affordable housing in Baltimore.
  sports: Carmen Hermida hits the trails of Patapsco Valley State Park for weekend hikes, participates in the Baltimore Road Runners club’s charity 5K events, and lights up the dance floor with salsa and
    bachata at community festivals, while cheering on the Baltimore Ravens in football season and the Orioles during baseball spring.
  arts: Carmen Hermida captures the vibrancy of Baltimore’s neighborhoods through property photography inspired by Ansel Adams, dances to the rhythms of Tito Puente and Shakira, and curates a modest collection
    of folk art at home, often attending live performances at the Hippodrome Theatre.
  travel: Carmen Hermida balances family reunions in Puerto Rico with wanderlust trips to Barcelona’s historic quarters and the culinary streets of Oaxaca, preferring group tours that combine cultural immersion
    with comfortable accommodations while carefully budgeting to sustain her brokerage investments.
  culinary: Carmen Hermida whips up traditional dishes like arroz con pollo, ceviche, and plantain mofongo with a confident hand, favoring fresh cilantro, lime, and achiote, and enjoys experimenting with
    spice blends while occasionally over‑seasoning in her enthusiasm for bold flavors.
  core: Carmen Hermida is an energetic, data‑savvy real‑estate broker who channels her love for salsa, hiking, and community mentorship into a relentless pursuit of sustainable housing, even if that means
    occasional tech gadget indulgence and a penchant for late‑night paperwork.
background:
  cultural: Carmen is a second‑generation Hispanic American; her parents emigrated from Puerto Rico in the 1970s. She grew up in a bilingual household in Maryland, celebrating traditions such as Día de
    los Muertos, Christmas posadas, and family reunions with music, food, and storytelling. Her cultural identity informs a strong sense of community, hospitality, and respect for family ties. Carmen actively
    participates in local Latino cultural festivals, supports Spanish‑language community programs, and incorporates her heritage into her professional brand, often using Spanish in marketing materials to
    connect with Latino buyers and sellers.
