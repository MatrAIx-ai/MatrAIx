  hobbies: '[''Experimental painting'', ''Visiting contemporary art exhibitions'', ''Reading philosophy and art theory'', ''Urban sketching'', ''Hiking in the Santa Monica Mountains'', ''Listening to avant-garde
    music'', ''Meditation'', ''Collecting vintage postcards'', ''DIY home studio tinkering'']'
  career_goals: Ann aims to secure representation with a reputable West Coast gallery within the next two years and mount a solo exhibition that interrogates abstraction and emotional vulnerability. She
    is driven to create large‑scale immersive installations that integrate interactive technology, win regional art awards, and eventually teach a graduate‑level conceptual art course. In the long term,
    she hopes to establish an independent studio that supports experimental, interdisciplinary collaborations and positions her as a leading voice in contemporary avant‑garde art.
