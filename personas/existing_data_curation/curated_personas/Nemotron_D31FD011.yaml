  hobbies: '[''Rose and vegetable gardening'', ''Knitting and crocheting'', ''Reading historical novels and biographies'', ''Birdwatching at Lake Lehigh'', ''Crossword puzzles'', ''Bridge with senior group'',
    ''Baking pies and cookies for church'', ''Listening to classic jazz records'', ''Genealogy research'', ''Volunteering as a reading buddy at the local library'']'
  career_goals: Even at 90, Carla’s ambitions centre on sustaining her independence, preserving her family’s legacy, and contributing to her community. She aims to keep her health stable through regular
    walks, balanced nutrition, and mental exercises such as crossword puzzles. She wishes to compile a handwritten cookbook of family recipes for her grandchildren and to record oral histories of longtime
    Bath residents for the local historical society. Carla also hopes to continue leading the senior‑center’s weekly knitting circle, and she plans to volunteer as a reading buddy for elementary‑school
    students, sharing her love of stories while staying socially engaged.
