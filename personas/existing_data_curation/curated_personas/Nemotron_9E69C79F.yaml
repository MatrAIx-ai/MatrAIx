  hobbies: '[''Surfing'', ''Skateboarding'', ''Digital drawing and illustration'', ''Video editing and short film creation'', ''Competitive video gaming'', ''Photography (beach and ocean scenes)'', ''Attending
    local music gigs'', ''Reading speculative fiction'', ''Simple Arduino/electronics tinkering'', ''Volunteering at community beach clean‑ups'']'
  career_goals: He aspires to turn his passion for visual storytelling into a professional career. Over the next several years he plans to join a specialized high‑school arts program, build a robust portfolio
    of digital art, video, and interactive media, and eventually attend a university with a strong BFA or digital media program. His long‑term ambition is to work as a motion‑graphics artist, game designer,
    or creative director for an innovative entertainment studio, where he can continuously explore novel concepts and lead collaborative projects. He also hopes to leverage his surfing background to produce
    surf‑culture documentaries or branded content, merging his coastal roots with his creative skill set.
