  hobbies: '["Traditional Korean cooking", "Orchid and tropical plant gardening", "Tai chi", "Playing Go", "Attending Hawaiian and multicultural festivals", "Film photography", "Reading East Asian historical
    literature", "Sailing on Honolulu harbor", "Calligraphy", "Listening to classic jazz"]'
  career_goals: In retirement, Chao aims to preserve his family’s oral history by compiling an archive of recorded stories and photographs. He plans to volunteer as a cultural educator at the local museum,
    teaching visitors about the Korean diaspora in Hawaii, and to learn digital storytelling tools to share these narratives online. Travel to Korea to reconnect with relatives, mentor his grandchildren
    in language and tradition, and maintain his health through tai chi and regular social engagement are also central to his aspirations.
