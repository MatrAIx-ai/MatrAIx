  hobbies: '["Reading historical non‑fiction","Crossword puzzles","Sudoku","Gardening (vegetable and flower beds)","Fly fishing","Woodworking (furniture making)","Journaling"]'
  career_goals: Approaching retirement, Mark aims to leverage his extensive front‑line experience into a supervisory or process‑improvement role where he can design and refine service workflows that reduce
    error rates and enhance customer satisfaction. He is motivated to mentor younger representatives, cultivating a cohesive, high‑performing team while maintaining a low‑profile, behind‑the‑scenes influence.
    Ultimately, he hopes to leave a legacy of streamlined procedures and a more resilient support operation before transitioning to part‑time consultancy work that allows him to apply his competitive drive
    to broader organizational challenges.
