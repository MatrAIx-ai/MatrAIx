persona_description: A network administrator who is interested in analyzing and classifying network traffic to identify the operating systems running on different hosts. They are familiar with various tools
  and techniques for network fingerprinting, including tshark, ettercap, p0f, Satori, NetworkMiner, and Fingerbank. They have experience with manual OS classification and are interested in exploring the
  operating systems of hosts by analyzing their application layer data, such as server banners and User-Agent strings. They are also interested in the DHCP implementation of the host and have knowledge
  of Eric Kollmann's work on DHCP fingerprinting.
