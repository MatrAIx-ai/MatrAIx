  career_goals: Phillip aims to transition into a senior leadership role within the surgical services department, such as OR manager or clinical educator, where he can shape policy, mentor emerging technologists,
    and spearhead efficiency projects that reduce operative stress for staff. He is pursuing additional certification in surgical technology education and hopes to develop a regional training program that
    blends practical hands‑on skills with evidence‑based best practices. Ultimately, he envisions a consultancy focused on improving surgical workflow and patient safety metrics across hospitals in western
    Pennsylvania.
