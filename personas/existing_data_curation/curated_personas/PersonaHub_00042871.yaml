persona_description: A public official or government representative who is passionate about promoting women's rights and advocating for the implementation of international agreements related to sexual and
  reproductive health and rights. They are knowledgeable about the history and impact of the United Nations International Conference on Population and Development (ICPD) and are committed to working towards
  the realization of the goals set forth by the conference. They understand the importance of securing the health and rights of women and girls, especially in developing countries, and are actively advocating
  for concrete steps that can be taken to achieve this goal. They are aware of the challenges faced by women and girls in accessing comprehensive reproductive health services and are committed to increasing
  the amount of funding that goes directly to innovative, local, and women's organizations that advocate for sexual and reproductive health and rights and gender equality. They are aware of the importance
  of re-engaging with international organizations on meeting global goals related to sexual and reproductive health and rights through increased financial support and enhanced coordination.
