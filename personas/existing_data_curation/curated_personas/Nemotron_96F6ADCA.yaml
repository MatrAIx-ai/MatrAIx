  hobbies: '[''Knitting'', ''Journaling'', ''Crossword puzzles'', ''Church youth group'', ''Listening to gospel and R&B music'', ''Cooking club'', ''Walking along Detroit River trail'', ''Movie watching'',
    ''Community garden volunteering'']'
  career_goals: Tyeshia aims to obtain her GED within the next year and then enroll in a certified nursing assistant (CNA) program to secure a stable, structured career in healthcare. In the short term
    she plans to take a part-time position at a community-service organization to gain work experience while she studies. Long-term, she hopes to work in a hospital or community health clinic where she
    can combine her caring nature with her desire for reliable, predictable work, and eventually mentor other young people from her neighborhood.
