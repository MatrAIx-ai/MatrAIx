personas:
  professional: Tyeshia Green, a 21‑year‑old aspiring certified nursing assistant, leverages her knack for budgeting and event coordination to excel in a part‑time role at a community‑service organization,
    where she meticulously tracks appointments in Excel and uses her calm, structured demeanor to support clients and mentor peers in the youth group.
  sports: Tyeshia Green stays active by walking the Detroit River Trail three times a week, follows the Detroit Lions for football and the Detroit Pistons for basketball, and participates in a church‑organized
    recreational volleyball league, blending structured fitness with community camaraderie.
  arts: Tyeshia Green finds solace in gospel legends like Kirk Franklin and R&B icons such as Mary J. Blige, frequently streams the soulful album Lemonade by Beyoncé, and enjoys late‑night movie marathons
    of uplifting films like The Woman King and Hidden Figures, while also attending monthly spoken‑word nights at a nearby cultural center.
  travel: Tyeshia Green prefers budget‑friendly road trips, having explored Mackinac Island by ferry and the Upper Peninsula’s Pictured Rocks National Lakeshore by rental car, while dreaming of a future
    cultural immersion in New Orleans’ jazz scene, and always plans itineraries weeks in advance using a spreadsheet to keep costs predictable.
  culinary: Tyeshia Green showcases culinary skill in soul‑food staples like crispy fried chicken, buttery collard greens seasoned with smoked turkey, cheesy Southern‑style mac and cheese, cornbread with
    honey butter, and occasional gumbo simmered with okra and andouille sausage, frequently swapping family recipes at the weekly cooking club and experimenting with fresh herbs from the community garden.
  core: Tyeshia Green blends a meticulous, structure‑driven mindset with a compassionate heart, navigating anxiety through organized routines, budgeted living, and soulful creativity.
background:
  cultural: Tyeshia is a second-generation African-American who grew up in Lincoln Park, a neighborhood with deep roots in Detroit's Black community. Her family's history traces back to the Great Migration,
    with grandparents who moved from the rural South to Michigan in the 1940s, bringing traditions of soul food, church fellowship, and strong family ties. She values the cultural legacy of the local Black
    church, the city's rich musical heritage, and the mutual-aid networks that have long supported residents of her neighborhood.
