personas:
  professional: Victoria Lartey, a 38‑year‑old administrative professional in Houston, leverages meticulous calendar coordination, event‑planning acumen, and a curiosity for the local art scene to streamline
    office operations while championing inclusive community‑arts programming, turning their organized diligence into vibrant cultural events.
  sports: Victoria Lartey energizes mornings with Zumba classes at a local studio and evenings of restorative yoga, follows the Houston Astros in baseball and the Houston Rockets in basketball, and participates
    in a community gardening club that doubles as a weekend walking group, illustrating a sociable yet organized fitness routine.
  arts: Victoria Lartey curates a weekly itinerary of visits to the Museum of Fine Arts, the Contemporary Arts Museum Houston, and pop‑up exhibitions featuring artists like Kara Walker and Kehinde Wiley,
    while volunteering to lead hands‑on workshops that blend graphic design basics with community storytelling, allowing their curiosity and compassion to shape a vibrant personal art narrative.
  travel: Victoria Lartey prefers meticulously planned weekend getaways, often driving to Austin’s live‑music scene or flying to New Orleans for its culinary heritage, while keeping a travel fund earmarked
    for a future trip to the Venice Biennale, balancing their love of cultural immersion with budget‑consciousness and a demanding work schedule.
  culinary: Victoria Lartey delights in preparing Ghanaian‑inspired dishes such as jollof rice, groundnut soup, and kelewele, using garden‑grown herbs like basil and cilantro to freshen the meals, and while
    their cooking skill borders on amateur‑chef, they host monthly family feasts that showcase a fusion of West African flavors and Texan barbecue, reflecting both culinary curiosity and a love for communal
    dining.
  core: Victoria Lartey blends relentless organization with artistic curiosity, turning every spreadsheet into a canvas of community events, yet habitually worries about missing a deadline while secretly
    hoarding splurges on limited‑edition prints.
background:
  cultural: Victoria is a first‑generation American whose parents emigrated from Ghana. Growing up in the vibrant black community of Humble and greater Houston, she blends Ghanaian traditions—such as celebrating
    Homowo, speaking Twi with family, and cooking jollof rice and waakye—with Southern American cultural practices, including church involvement, soul food gatherings, and observance of Kwanzaa. Her identity
    is shaped by the diaspora experience, which informs her appreciation for African art, music, and community solidarity. She actively participates in local African cultural associations and contributes
    to multicultural events that highlight the rich tapestry of black heritage in Texas.
