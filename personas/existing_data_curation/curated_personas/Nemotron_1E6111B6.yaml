  career_goals: Victoria aims to advance from her current secretarial role to a supervisory position such as office manager or executive assistant within a culturally vibrant organization. She plans to
    obtain the Certified Administrative Professional (CAP) credential and complete a GED or associate degree in business administration. Long‑term, she hopes to combine her administrative expertise with
    her passion for the arts by taking on a program coordinator role at a community arts center or nonprofit, overseeing events, grant applications, and community outreach. She also aspires to mentor junior
    staff and champion inclusive workplace practices.
