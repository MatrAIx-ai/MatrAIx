  hobbies: '[''Reading (historical non-fiction, self‑development, classic literature)'', ''Gardening'', ''Crocheting and knitting'', ''Book club participation'', ''Walking/hiking in local parks'', ''Volunteering
    at senior center'', ''Genealogy research'']'
  career_goals: Linda aims to advance within the customer experience field, seeking a supervisory or team‑lead position within the next two to three years. She plans to earn a Six Sigma Green Belt certification
    to deepen her process‑improvement expertise and enroll in a part‑time MBA program focused on operations management. Her long‑term ambition is to become a Customer Experience Manager, shaping service
    strategies that balance efficiency with customer satisfaction. She also hopes to mentor junior representatives and help cultivate a culture of empathy and continuous improvement at her organization.
