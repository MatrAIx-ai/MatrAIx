personas:
  professional: Lisandra Rivas, a veteran technical support specialist with over forty years of experience, combines a diligent, step‑by‑step troubleshooting style with an intuitive flair for quick fixes,
    and they now channel that expertise into a low‑stress, part‑time consulting role for seniors and small family businesses in Sebastian, supported by a pending CompTIA A+ certification and a habit of
    crafting clear, printable guides despite occasional disorganization in paperwork.
  sports: Lisandra Rivas embraces low‑impact fitness, beginning each day with a brisk sunrise walk along the Atlantic shore, joining the Sebastian Seniors Walking Club for occasional group outings, cheering
    quietly for the Miami Marlins during spring baseball, and staying active through gentle yoga classes at the local community center, while their competitive streak shows up in jigsaw puzzle marathons
    rather than intense athletic pursuits.
  arts: Lisandra Rivas fills evenings with classic boleros and salsa on a vintage record player, savoring the crooning of Consuelo Velázquez and the upbeat rhythms of Celia Cruz, while they also nurture
    a creative side through knitting colorful scarves, solving intricate crossword puzzles, and curating a small collection of vintage computer components that they view as functional art, all of which
    shape a quiet yet richly textured cultural life.
  travel: Lisandra Rivas prefers tranquil travel experiences, often planning self‑driven road trips along Florida’s Gulf Coast to places like Sanibel Island and Key West, with occasional visits to historic
    Savannah, Georgia, and the colonial streets of St. Augustine, where they prioritize sunset views and low‑key accommodations over bustling tourist crowds, balancing a modest travel budget with a love
    for coastal heritage.
  culinary: Lisandra Rivas delights in cooking aromatic dishes such as arroz con gandules, alcapurrias, and festive coquito, seasoning them with fresh rosemary from their garden and complementing the meals
    with locally caught shrimp and snapper, yet they sometimes over‑spice in enthusiasm and reluctantly admit to the occasional shortcut of using store‑bought pre‑mixed dough, revealing a passionate but
    imperfect kitchen practice.
  core: Lisandra Rivas is a solitary, detail‑oriented tech veteran who gardens, knits, and solves puzzles to calm a mind prone to worry, mixing disciplined problem‑solving with nostalgic hobbies and a cautious
    yet occasionally impulsive approach to finances and health.
background:
  cultural: Lisandra’s cultural identity is rooted in her Puerto Rican heritage, shaped by a bilingual upbringing that blended Spanish family traditions with the American lifestyle of Florida. She grew
    up hearing stories of the island’s music, cuisine, and festivals, and continues to honor those customs by celebrating Noche de San Juan, preparing arroz con gandules and coquito for family gatherings,
    and participating in local Puerto Rican cultural events in Indian River County. Her Catholic background is reflected in her observance of holidays such as Semana Santa and the Three Kings' Day, and
    she maintains close ties with an extended family network spread across both Puerto Rico and the mainland. The migration experience has fostered a strong sense of resilience and self‑reliance, values
    that inform her independent approach to work and life.
attributes:
  skills: '[''Windows troubleshooting'', ''macOS troubleshooting'', ''Hardware repair and component replacement'', ''Home network configuration'', ''Remote desktop support'', ''Data backup and recovery
    planning'', ''Basic cybersecurity assessments'', ''Legacy system maintenance (e.g., Windows 95/XP, early Mac OS)'', ''Technical documentation for senior users'']'
  hobbies: '[''Gardening (herbs & citrus)'', ''Sunrise beach walks'', ''Reading historical nonfiction'', ''Listening to classic boleros and salsa'', ''Knitting and crocheting'', ''Jigsaw puzzles and crosswords'',
    ''Cooking traditional Puerto Rican dishes'', ''Genealogy research'', ''Collecting vintage computer parts'']'
  career_goals: Lisandra aims to transition her extensive support expertise into a low‑stress, part‑time consulting role that lets her serve local seniors and small family‑run businesses in Sebastian. She
    plans to formalize her knowledge with a CompTIA A+ certification to boost confidence and credibility while keeping the workload flexible enough to manage her health and anxiety. Volunteering at the
    county library’s technology help desk is a near‑term ambition, giving her a quiet, structured environment to share her skills without the pressure of large corporate expectations. Ultimately, she hopes
    to compile a personal repository of troubleshooting tips that can be shared online or printed as a modest guide for the older Puerto Rican community in Florida.
