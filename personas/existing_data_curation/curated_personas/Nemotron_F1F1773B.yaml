  career_goals: Edwin aims to advance from a crew member to a shift supervisor within the next two years, using his organizational strengths to manage staff schedules and ensure smooth operations. He plans
    to earn his high school equivalency (GED) and pursue a certification in food safety management. In the longer term, he dreams of opening a small neighborhood taquería or food truck that showcases authentic
    Mexican flavors, allowing him to combine his culinary interests with his business acumen. He also hopes to provide financial stability for his aging parents and eventually secure homeownership in Porterville.
