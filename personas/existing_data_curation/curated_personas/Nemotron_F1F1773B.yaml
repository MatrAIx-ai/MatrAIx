personas:
  professional: Edwin Santiago, a 37-year-old fast-food operations specialist, blends meticulous cash-handling, POS expertise, bilingual communication, and strict food-safety enforcement with a methodical,
    structure-loving mindset, positioning them for a shift-supervisor role while plotting a future independent taqueria.
  sports: Edwin Santiago, a 37-year-old who prefers low-key fitness, fits weekly morning jogs into a structured routine, supports the Los Angeles Dodgers and LA Galaxy from his balcony, and occasionally
    joins a community-run recreational soccer league on Saturdays to maintain a balanced, predictable activity schedule.
  arts: Edwin Santiago, a 37-year-old acoustic-guitar hobbyist, unwinds by strumming renditions of Los Tigres del Norte and Intocable, devours mystery novels by Agatha Christie and Stephen King, and finds
    motivation in self-help works by Brené Brown, while occasionally attending local folk-music open-mic nights that reinforce a quiet, introspective artistic outlet.
  travel: Edwin Santiago, a 37-year-old methodical planner, favors meticulously charted road trips through California's wine country and weekend getaways to Oaxaca's culinary festivals, while budgeting
    carefully to save for a future family vacation to Barcelona's historic streets, balancing low-key exploration with modest financial constraints.
  culinary: Edwin Santiago, a 37-year-old home-cook with an intermediate skill set, frequently batches authentic carnitas, pozole, and chicken mole using home-grown cilantro, jalapenos, and epazote from
    a balcony garden, carefully calibrating spice levels with dried chilies like ancho and guajillo, while reserving evenings for simple, comfort-food take-out meals that fulfill a low-stress routine.
  core: Edwin Santiago, a 37-year-old organized yet worry-prone fast-food veteran, balances a love for solitary guitar sessions and batch-cooked tacos with a meticulous eye on finances and health, all while
    quietly nurturing a garden of peppers on a balcony.
background:
  cultural: Edwin was born to Mexican immigrant parents and grew up in a bilingual household in the Central Valley. His upbringing emphasized family cohesion, respect for tradition, and Catholic values.
    He celebrates cultural holidays such as Día de los Muertos and Mexican Independence Day by preparing traditional dishes and gathering with extended family. Speaking both Spanish and English fluently,
    he navigates a bicultural identity, maintaining Mexican culinary and musical traditions while integrating into the broader community of Porterville’s agricultural workforce.
