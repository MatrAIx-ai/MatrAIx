personas:
  professional: Francis Osborn, a 19‑year‑old emerging visual artist and freelance graphic designer, leverages self‑taught Photoshop, Illustrator, and basic HTML/CSS skills to craft minimalist album covers
    and web portfolios while allowing their curiosity‑driven, loosely structured workflow and preference for solitary creation to guide project timelines.
  sports: Francis Osborn spends weekends trekking the lakeshore and forested paths with the Maple Grove Trail Club, occasionally rides with the Twin Cities Cycling Co‑op, and loosely follows the Minnesota
    Vikings (NFL) and Minnesota Wild (NHL) for the occasional social viewing, treating fitness as a meditative supplement to their art practice rather than a rigorous training schedule.
  arts: Francis Osborn curates ambient playlists featuring Brian Eno, Aphex Twin, and Tim Hecker while sketching abstract canvases inspired by the minimalist compositions of Agnes Martin, and frequenting
    indie film nights that showcase works by David Lynch and Ari Aster, merging visual and auditory experiments into a distinct personal aesthetic.
  travel: Francis Osborn prefers low‑key, nature‑focused getaways, often planner‑free road trips to Minnesota’s Boundary Waters and Lake Superior’s lesser‑known bays, while dreaming of a future budget‑friendly
    backpack stint through Iceland’s volcanic landscapes and the art‑laden streets of Berlin, balancing wanderlust with a modest student budget.
  culinary: Francis Osborn, a modest home cook, often whips up minimalist dishes such as avocado toast layered with radish and hemp seeds, a simple herb‑roasted salmon paired with fresh dill and wild‑caught
    Minnesota trout, and occasionally experiments with a vegan mushroom‑bourguignon, favoring clean flavors and the occasional indulgence in locally sourced maple‑glazed pancakes.
  core: Francis Osborn is a solitary‑minded 19‑year‑old creator who trades rigid schedules for spontaneous art bursts, hoards sketchbooks like secret diaries, and habitually over‑thinks every decision while
    fleeing social gatherings for lake‑side silence.
background:
  cultural: Francis grew up in Maple Grove, a suburban community in Hennepin County, Minnesota, surrounded by a predominantly white, middle‑class population with strong Northern European (German, Swedish)
    roots common to the region. His family embraced typical Midwestern values of modesty and self‑reliance, yet his innate curiosity led him to seek out the Twin Cities’ alternative art scene, underground
    music venues, and online cultural forums. The lakes and woods of Minnesota shaped his preference for solitude and nature, while the local emphasis on education and community service provided a backdrop
    for his critical, skeptical outlook. He identifies with a blended cultural identity that honors his regional heritage while constantly questioning and expanding beyond conventional norms.
attributes:
  skills: '["Digital illustration", "Graphic design (Adobe Photoshop, Illustrator)", "Basic front-end web development (HTML, CSS, JavaScript)", "Music production (Ableton Live)", "Critical art analysis",
