  hobbies: '["Sketching and drawing", "Abstract painting", "Experimental music listening", "Single-player narrative video games", "Reading existential philosophy", "Blogging/critical essays", "Solo nature
    hikes", "Independent/foreign film watching"]'
  career_goals: Francis aims to build a sustainable career as an independent visual artist and freelance graphic designer, focusing on minimalist album art, branding, and digital commissions that allow
    him to work remotely and on his own schedule. He hopes to launch an online platform that curates avant‑garde art reviews and experimental music showcases, giving him a venue to share his critical voice
    while staying out of large corporate structures. Completing a bachelor’s degree in Visual Communication or Media Studies is a tentative step, but only if it supports his artistic autonomy. Ultimately,
    he seeks financial stability that provides the flexibility to prioritize solitude, creative exploration, and low‑stress work environments.
