  career_goals: Philip aims to advance to a regional management position within the next five years, seeking to broaden his impact across multiple locations while securing a Lean Six Sigma Green Belt certification
    to formalize his process‑improvement expertise. He plans to spearhead the adoption of integrated inventory and scheduling technologies at his current workplace, positioning himself as a champion of
    efficiency and data‑driven decision‑making. Long‑term, he aspires to launch his own home‑renovation and small‑construction venture, leveraging his industry connections and hands‑on experience to build
    a reputable, community‑focused business.
