  hobbies: '["Reading mystery and adventure novels", "Playing Minecraft and building redstone circuits", "Sketching comic strips and drawing", "Basketball at the community center", "Journaling with R&B/hip‑hop
    music", "Youth choir singing", "Science club experiments"]'
  career_goals: Though only twelve, Venessa envisions a future where her curiosity and practical mindset intersect. She aims to pursue a career in biomedical engineering or technology development, hoping
    to design affordable health‑monitoring devices that could benefit her community. To reach that goal, she plans to attend summer STEM camps, excel in science competitions, and eventually study engineering
    at a university known for supporting underrepresented students. Her competitive nature fuels a desire to win scholarships and be recognized for innovative projects, while her concern for others inspires
    an ambition to mentor younger peers through school clubs, helping them navigate challenges she herself has faced.
