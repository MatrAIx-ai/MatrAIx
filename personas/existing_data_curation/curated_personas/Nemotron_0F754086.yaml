  hobbies: '[''Woodworking'', ''Restoring vintage farm equipment'', ''3D printing and prototyping'', ''Fishing'', ''Hiking'', ''Community gardening'', ''Historical preservation'', ''Reading technical journals'']'
  career_goals: Benjamin aims to obtain his Professional Engineer (PE) license within the next two years and transition into a senior engineering role where he can lead large‑scale infrastructure projects
    that support rural development. He also aspires to mentor junior engineers, champion sustainable design practices, and eventually establish his own engineering consultancy focused on improving agricultural
    processing facilities in the Southeast, balancing ambition with a pragmatic focus on community impact.
