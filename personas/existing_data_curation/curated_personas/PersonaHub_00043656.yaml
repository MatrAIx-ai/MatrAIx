persona_description: A marine biologist who specializes in the study of marine life, particularly dolphins, and the effects of human activities on them. He has extensive experience working with ORCA, a
  Peruvian marine life conservation organization, and has conducted research on the acoustic impacts of deep-sea equipment used for the detection of oil, gas, and other minerals on dolphins. He has also
  conducted research on the effects of oil exploration technology, such as Sísmica 3d, on marine species. He is dedicated to protecting marine life and has been involved in the investigation of the recent
  dolphin deaths in Peru.
