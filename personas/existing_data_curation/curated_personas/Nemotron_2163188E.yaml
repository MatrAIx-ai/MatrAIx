personas:
  professional: Jessica Saporsky is a retired curriculum developer who now volunteers as an educational advisor, using their talent for interdisciplinary lesson design, watercolor painting, and calm, imaginative
    problem‑solving to craft art‑infused workshops for seniors while mentoring younger teachers with a balance of organization and flexibility.
  sports: Jessica Saporsky enjoys low‑impact fitness, walking the Wisconsin countryside five times a week with the Sun Prairie Seniors Walking Club and tending a community garden for gentle cardio, and
    they cheer on the Milwaukee Bucks and the Wisconsin Badgers while staying clear of competitive sports.
  arts: Jessica Saporsky spends afternoons painting watercolor landscapes inspired by Monet and O'Keeffe, writes poetry echoing Mary Oliver, visits the Madison Museum of Contemporary Art to view works by
    Jackson Pollock, and regularly attends community theater productions featuring local actors, all of which fuel their creative spirit.
  travel: Jessica Saporsky plans trips with meticulous itineraries, favoring art‑centric destinations such as the Venice Biennale, Art Basel Miami, and the galleries of New York City, while also returning
    to beloved Wisconsin spots like Door County and the Apostle Islands for landscape photography, balancing budget‑friendly train travel with occasional splurges on weekend festival passes.
  culinary: Jessica Saporsky cooks with garden‑fresh ingredients, favoring dishes like roasted beet and goat‑cheese salad, wild mushroom risotto with thyme, and summer strawberry shortcake, and while their
    culinary skills are solidly intermediate, they often indulge in artisan cheese plates at local farm‑to‑table eateries.
  core: Jessica Saporsky is a quietly adventurous, art‑obsessed retiree who blends disciplined organization with boundless imagination, turning everyday routines into creative workshops, all while maintaining
    a calm, resilient outlook and a soft spot for garden‑fresh meals.
background:
  cultural: Jessica was raised in a middle‑class, European‑American family in Sun Prairie, Wisconsin, a community with strong Midwestern values and a heritage of German and Polish immigrants. The region’s
    emphasis on education, community involvement, and appreciation for the outdoors has shaped her worldview. She grew up attending a Lutheran church, which instilled a sense of service and respect for
    tradition, though she now identifies as spiritually eclectic, drawing inspiration from the region’s vibrant cultural festivals and natural landscapes.
