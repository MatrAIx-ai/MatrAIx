personas:
  professional: Miguel Sims, a senior systems engineer and data scientist, harnesses advanced statistical modeling, GIS, and machine‑learning tools to build predictive air‑quality and epidemiological models
    for federal agencies, while they infuse artistic design principles into visualizations, and their reliable, balanced leadership keeps interdisciplinary teams on schedule.
  sports: Miguel Sims stays active by playing weekly tennis matches at the DC Senior Tennis Club, strolling along the National Mall, and cheering for the Washington Capitals, Washington Wizards, and Washington
    Commanders, while they occasionally join the Capitol Hill Running Club's Saturday jogs for light cardio.
  arts: Miguel Sims nurtures a vibrant artistic life through regular visits to the National Gallery and Smithsonian, improvising piano to the sounds of John Coltrane and Miles Davis at Kennedy Center jazz
    nights, capturing Washington’s historic facades in photographs inspired by the compositional balance of Claude Monet, and devouring speculative fiction by authors like N.K. Jemisin, which together shape
    their reflective yet experimental creative outlook.
  travel: Miguel Sims prefers thoughtfully planned, culturally immersive trips that balance historic exploration with leisurely pace, having roamed the cobblestone streets of Boston, Savannah, and New Orleans,
    trekked the gardens of England’s Cotswolds, and dreaming of a future visit to the ancient terraces of Machu Picchu and the lavender fields of Provence, all while budgeting sensibly for senior-friendly
    accommodations.
  culinary: Miguel Sims enjoys a modestly skilled home kitchen where they expertly cook slow‑braised gumbo with okra and Andouille sausage, craft fresh Mediterranean salads tossed with heirloom tomatoes,
    feta, and basil, and savor occasional dinner outings for Oysters Rockefeller at the historic Georgetown waterfront, reflecting their love of bold flavors and seasonal ingredients.
  core: Miguel Sims unites a razor‑sharp curiosity for data and the arts into a disciplined mentor who devotes countless hours to community workshops, while their absent‑minded habit of neglecting the balcony
    garden and an irresistible urge to hoard vintage camera lenses reveal a delightfully quirky side.
background:
  cultural: Miguel grew up in the vibrant African‑American neighborhoods of Washington, DC during the 1960s and 1970s, a period marked by the civil‑rights movement and a strong emphasis on education within
    his community. His family’s church played a central role in shaping his values of service, resilience, and collective uplift. Throughout his life, he has maintained close ties to Black cultural institutions
    such as Howard University and local community centers, and he actively supports initiatives that highlight Black contributions to science and the arts. His identity as a Black man informs his dedication
    to mentorship, his appreciation for cultural expression, and his advocacy for greater representation in STEM fields.
attributes:
  skills: '["Statistical modeling", "Advanced data analysis", "GIS (Geographic Information Systems)", "Python programming", "R programming", "SQL", "Machine learning (scikit‑learn, TensorFlow)", "Data visualization
