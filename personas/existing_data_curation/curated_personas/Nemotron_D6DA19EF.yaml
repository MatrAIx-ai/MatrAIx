    "Digital photography for visualization"]'
  hobbies: '["Visiting art museums (National Gallery, Smithsonian)", "Attending live jazz concerts", "Digital photography (architecture, street scenes)", "Playing piano (improvisation)", "Chess", "Balcony
    gardening (herbs, succulents)", "Reading speculative fiction", "Volunteer science talks at senior centers", "Mentoring youth in STEM clubs", "Participating in community art‑science workshops"]'
  career_goals: Although officially retired, Miguel aims to channel his expertise into community‑focused initiatives. He plans to volunteer as a data consultant for local non‑profits addressing environmental
    justice, establish a mentorship program that connects Black high‑school students with STEM professionals, and co‑create a series of workshops that merge scientific inquiry with visual arts—showcasing
    how data can tell compelling stories. Additionally, he aspires to author a memoir that chronicles the contributions of Black scientists in the U.S. federal sector, hoping to inspire future generations
    while preserving his own legacy.
