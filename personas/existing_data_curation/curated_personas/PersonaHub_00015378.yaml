persona_description: A far western archaeologist who specializes in the study of Paleoindian cultures and their interactions with the environment, particularly in the context of open-air hearths and the
  discovery of waterfowl bone fragments. Their research interests include the dating and analysis of archaeological artifacts, the interpretation of environmental changes over time, and the understanding
  of ancient life ways and their impact on human societies. They are known for their meticulous fieldwork, meticulous excavation techniques, and their ability to uncover previously unknown archaeological
  sites and artifacts.
