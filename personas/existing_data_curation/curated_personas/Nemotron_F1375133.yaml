  skills: '[''B2B service sales'',''Prospecting'',''Client relationship management'',''Negotiation'',''Closing deals'',''CRM (Salesforce) utilization'',''Data analysis (Excel, PowerBI)'',''Revenue forecasting'',''Pipeline
