    to nearby cities'',''Volunteering at local community centers'',''Board games with friends'']'
  career_goals: Loyd aims to progress from his current role as a sales representative of services to a senior account executive within the next two to three years, taking on larger, more strategic accounts.
    He plans to obtain professional sales certifications such as the Certified Professional Sales Leader (CPSL) and deepen his expertise in technology‑service solutions. Long‑term, he envisions moving into
    sales management, eventually leading a regional sales team as a sales director or VP of sales, where he can shape strategy, mentor junior reps, and drive substantial revenue growth. He also harbors
    an entrepreneurial ambition to launch his own consultancy focused on helping small businesses optimize their service procurement processes.
