  hobbies: '[''Hiking and trail exploration'', ''Wildlife photography'', ''Reading sci‑fi and science nonfiction'', ''Digital illustration and animation'', '' LEGO Technic and robotics kits'', ''Creative
    writing and journaling'', ''Strategy video gaming (Minecraft, Civilization)'', ''Science podcast listening'']'
  career_goals: Eileen dreams of a future where she can blend her love of solitary discovery with real‑world impact. She is fascinated by environmental science and hopes to become a field researcher or
    conservation technologist who uses data‑driven tools to protect Utah’s mountain ecosystems. At the same time, her creative side fuels an ambition to design educational games or interactive media that
    teach scientific concepts to other curious kids. She envisions a career that lets her work independently—perhaps as a freelance science communicator or a remote research analyst—while still contributing
    practical solutions to community challenges like water conservation and renewable energy.
