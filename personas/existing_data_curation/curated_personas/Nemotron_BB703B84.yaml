personas:
  professional: A budding wildlife documentarian and junior robotics hobbyist, Eileen Duran merges their love for trail exploration with tech tinkering, using a phone camera to catalog flora and fauna and
    coding simple bots, while they navigate school projects with spontaneous creativity and occasional disorganization.
  sports: An enthusiastic member of the local Junior Trail‑Running Club, Eileen Duran spends Saturday mornings navigating forest paths, supports the regional Riverview Rovers youth soccer team, and follows
    the national Olympic cross‑country skiing events, while they prefer solitary endurance activities over team sports.
  arts: A digital sketch artist and sci‑fi aficionado, Eileen Duran draws inspiration from Hayao Miyazaki, Bee Bee Bee, and Hans Zimmer, creating short animations that blend nature motifs with futuristic
    narratives during quiet evenings, while they experiment with new techniques on a tablet.
  travel: A curious backpacker with a notebook full of trail maps, Eileen Duran has trekked Redwood National Park and dreams of exploring the Galapagos Islands, planning each trip with a mix of spontaneous
    detours and careful budgeting, while they prefer low‑key campsites over crowded tourist hubs.
  culinary: A budding home‑cook, Eileen Duran enjoys crafting trail‑ready snacks like granola bars with almonds, dried cranberries, and chia seeds, and whipping up simple meals such as avocado toast topped
    with feta and honey, while they often experiment with mango‑smoothie bowls after a day of fieldwork.
  core: Eileen Duran is a solitary, curiosity‑driven pre‑teen who fuses nature exploration, DIY tech, and digital arts into a patchwork of independent projects, occasionally stumbling over organization
    but always bouncing back with inventive energy, while they cherish quiet moments alone.
background:
  cultural: Eileen lives in the suburban community of Herriman, Utah, a region shaped by the state’s outdoor‑oriented lifestyle and a largely middle‑class, white demographic. The local culture values self‑reliance,
    appreciation of the nearby Wasatch mountains, and a practical, community‑service mindset that often aligns with the regional Latter‑day Saint heritage, though her family participates in secular community
    activities such as scout groups and school clubs. Her upbringing combines the modest, pragmatic values common in the Intermountain West with encouragement to explore the natural world, fostering her
    solitary love of nature, independent learning, and pragmatic problem‑solving.
