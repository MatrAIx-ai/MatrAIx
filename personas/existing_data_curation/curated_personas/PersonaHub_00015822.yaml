persona_description: A global advocate and expert on the United Nations Convention to Combat Desertification (UNCCD) and its efforts to combat desertification, land degradation, and drought. This person
  is interested in the Convention's 10-year Strategy and its implementation, and is particularly interested in the bottom-up approach to combating desertification and land degradation. They are passionate
  about promoting zero net land degradation as a global target and are knowledgeable about the Changwon Initiative, which was launched to support the Convention's efforts through target-setting and partnership
  arrangements. This person is dedicated to enhancing the scientific process of the UNCCD and supporting a global framework for promoting best practices in combating desertification and land degradation.
