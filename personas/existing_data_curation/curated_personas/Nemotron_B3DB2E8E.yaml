personas:
  professional: Donna Stumpf transforms her lifelong knack for practical problem‑solving, organic gardening, and craft facilitation into a senior‑center coordinator role where they lead knitting workshops,
    organize competitive bingo nights, and channel their curiosity into a self‑published memoir about local history.
  sports: Donna Stumpf enjoys leisurely walks on the St. Petersburg Senior Walking Club’s nature trails during spring and fall, they cheer for the Tampa Bay Rays in baseball and the Tampa Bay Buccaneers
    in football, and they keep their mind active through competitive bridge tournaments at the local senior center.
  arts: Donna Stumpf devotes afternoons to knitting and quilting while listening to Ella Fitzgerald’s jazz standards, they discuss Agatha Christie mysteries and local historian Susan Hart’s writings at
    the church book club, and they regularly attend performances at the St. Petersburg Playhouse featuring actor Kevin Kline.
  travel: Donna Stumpf prefers short weekend drives to explore Florida’s nature preserves like Fort De Soto, they look forward to organized Royal Caribbean cruises to the Bahamas and Cozumel, and they dream
    of visiting the historic streets of Charleston, South Carolina.
  culinary: Donna Stumpf delights in adapting classic Southern shrimp and grits and fried green tomatoes with garden‑fresh basil, thyme, and heirloom tomatoes, they expertly season Gulf Coast shrimp gumbo
    with okra and fresh cayenne, and they relish sharing these dishes at senior‑center potlucks while occasionally forgetting to pre‑heat the oven in their rush.
  core: Donna Stumpf balances competitive vigor with a love for community gardening, craft, and curiosity, they thrive on flexible routines while navigating the quirks of senior life.
background:
  cultural: Donna was raised in a Midwestern American family of German‑American heritage, where values of hard work, community involvement, and modest celebration of cultural holidays were emphasized. After
    relocating to Saint Petersburg, Florida, in her 50s, she embraced the coastal, relaxed lifestyle while retaining her Midwestern sense of independence and practicality. She regularly attends a local
    Protestant church and participates in community festivals. Her cultural identity blends her family's German roots, Midwestern upbringing, and the vibrant, multicultural atmosphere of Florida’s Gulf
    Coast, reflected in her appreciation for American classic cuisine—especially Southern comfort foods—and her active engagement in local traditions.
