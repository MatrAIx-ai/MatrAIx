  hobbies: '[''Gardening and horticulture'', ''Reading mystery and local history books'', ''Knitting and crocheting'', ''Quilting'', ''Bridge (card game)'', ''Organizing and playing competitive bingo'',
    ''Exploring nature trails'', ''Visiting farmers’ markets'']'
  career_goals: Although retired, Donna aims to stay mentally active and contribute to her community. She hopes to write and self‑publish a memoir that documents her family’s history and the transformation
    of Saint Petersburg over the past decades, ideally through a local historical society. She plans to expand her garden with a small greenhouse and to mentor younger volunteers at the senior center, sharing
    her competitive enthusiasm in bridge and bingo. Maintaining physical health is a priority, so she intends to join senior fitness classes and occasionally travel on organized cruise trips to explore
    new locales.
