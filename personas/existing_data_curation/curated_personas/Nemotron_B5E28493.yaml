  hobbies: '[''Visiting art galleries and fairs'', ''Amateur photography'', ''Gardening and horticulture'', ''Community theater involvement'', ''Playing bridge and card games'', ''Cooking with spouse'',
    ''Genealogy research'', ''Historical walking tours'', ''Listening to live folk music'']'
  career_goals: Although retired from formal employment, Travis aims to stay active by expanding his volunteer leadership at the Lebanon County Senior Center, where he hopes to develop a weekly arts‑and‑crafts
    workshop for seniors. He also dreams of curating a small traveling exhibition of local historical photographs that he will assemble with the help of high‑school students. Another long‑term ambition
    is to document his family’s genealogy and share the story through community talks, preserving the cultural heritage of his Pennsylvania Dutch roots. Maintaining good health for himself and his wife,
    traveling to regional museums, and leaving a legacy of kindness and creative curiosity are central to his personal goals.
