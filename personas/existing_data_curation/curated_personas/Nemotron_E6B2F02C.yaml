personas:
  professional: Paul Wood is a meticulous early childhood program administrator whose expertise in curriculum alignment, budget oversight, and data-driven evaluation is matched by a methodical, solitary
    work style that thrives on structured routines and detailed Excel reporting.
  sports: Paul Wood enjoys weekend fishing trips on Lake Parker, follows the Tampa Bay Lightning and the Florida Gators on TV, contributes to a local anglers' club, and maintains fitness by walking the
    nature trails of Hillsborough River State Park while rarely participating in organized team sports.
  arts: Paul Wood immerses themselves in the quiet of nonfiction, favoring authors like Yuval Noah Harari and Malcolm Gladwell, while also appreciating the classical compositions of Bach, the American realism
    of Winslow Homer, and occasional visits to the Tampa Museum of Art for its rotating photography exhibits.
  travel: Paul Wood prefers meticulously planned trips that balance low‑key nature retreats—such as a recent hike through Asheville's Blue Ridge Mountains and a weekend camping in the Everglades—with purposeful
    professional travel to early‑learning conferences in Chicago, and dreams of exploring Kyoto's historic temples when retirement approaches.
  culinary: Paul Wood crafts simple, garden‑fresh meals like grilled zucchini with rosemary, heirloom tomato caprese salads, and roasted salmon seasoned with dill, showcasing a competent home‑cooking skill
    set, yet occasionally succumbs to the convenience of fast‑food burgers after late‑night grading sessions.
  core: Paul Wood is a solitary, detail‑obsessed early‑learning leader who finds solace in gardening, woodworking, and quiet reflection, while meticulously managing finances and health, yet wrestles with
    occasional indulgent spend‑thrills and the occasional neglect of self‑care.
background:
  cultural: Paul grew up in a middle‑class family in central Florida, with deep roots in the small‑town culture of Polk County. His parents emphasized hard work, education, and modest civic involvement,
    instilling values of reliability, self‑reliance, and community responsibility. The region’s blend of Southern hospitality and Florida’s outdoor lifestyle shaped his appreciation for structure and nature.
    He participates in local volunteer events through his non‑denominational evangelical church and the Polk County Early Learning Coalition. While the demographic makeup of Lakeland—predominantly white
    with a growing Hispanic influence—has exposed him to multicultural perspectives, he maintains his own cultural identity rooted in Mid‑Florida values.
attributes:
  skills: '["Program Administration", "Curriculum Development", "Staff Training and Supervision", "Budget Management", "Florida Early Learning Compliance", "Data Analysis and Program Evaluation", "School
