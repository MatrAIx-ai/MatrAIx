persona_description: A historian or a cultural studies scholar who is interested in the study of historical biographies and their impact on the narrative of history. They are particularly interested in
  the use of fictional devices in historical writing and the way they blur the boundaries between fiction and nonfiction. They have a strong interest in the concept of the "Great Man" history and how it
  is constructed through the writing of historical biographies. They are also interested in the ways in which the private lives of historical figures are portrayed and how they contribute to the narrative
  of history. They are familiar with the works of Homi Bhabba and are interested in his approach to the study of history and the importance of the historical subject who tells his/her own story. They have
  a background in the arts and are interested in the ways in which historical biographies are used as primary sources for biographic novels. They are also interested in the ways in which the writing and
  the film making of historical auto/biographies illustrate the bearing of memory, feelings and resentment on the narrative of history.
