personas:
  professional: Qun Chang, a senior engineering project leader with four decades of experience in strategic planning, Lean Six Sigma, BIM and digital twin implementation, leverages his methodical organization
    and sociable assertiveness to unify cross‑functional teams and steer multi‑million‑dollar infrastructure initiatives toward resilient, tech‑driven outcomes.
  sports: Qun Chang stays fit through doubles tennis at the Kendall County Tennis Club, weekend hikes along the Fox River Trail, and cycling with the Chicago Cycling Club, while cheering for the Chicago
    Cubs in spring and the Chicago Bulls during the NBA season, and he routinely joins local community runs sponsored by the Chicago Marathon.
  arts: Qun Chang nurtures his creative side as a photographer inspired by Ansel Adams, a book‑club participant who relishes historical memoirs by Doris Kearns Goodwin, and a listener of classic jazz legends
    like John Coltrane, weaving these artistic influences into his weekend photo walks.
  travel: Qun Chang favors meticulously planned trips that blend cultural immersion and natural beauty, having trekked the Swiss Alps, wandered the historic temples of Kyoto, and explored the coastal towns
    of New Zealand, while his next dream destination is Patagonia’s Torres del Paine for a photography expedition.
  culinary: Qun Chang is an enthusiastic home cook who routinely prepares steamed pork buns, marinated bulgogi, and fresh corn succotash using seasonal Midwestern vegetables, while his signature dish is
    a hybrid dim sum platter featuring shrimp dumplings paired with a crisp apple salad, demonstrating both culinary tradition and local terroir.
  core: Qun Chang is a methodical, sociable veteran of engineering who balances relentless curiosity with pragmatic discipline, savoring tai chi mornings, tennis matches, and strategic bridge games while
    occasionally slipping into late‑night budgeting spreadsheets.
background:
  cultural: Qun was born to parents who emigrated from South Korea and Taiwan in the early 1960s and grew up in a bilingual household in the Chicago suburbs. The family maintained traditional values of
    respect for elders, collective responsibility, and a strong emphasis on education, while also embracing the American ethos of individual initiative. Celebrations of Lunar New Year, Chuseok, and the
    Mid‑Autumn Festival are core to his upbringing, and he continues these traditions by preparing family‑style feasts and sharing cultural stories with his grandchildren. His fluency in Mandarin, Korean,
    and English reflects this bicultural heritage, and he actively participates in local Asian cultural organizations, fostering cross‑generational connections. The blend of East Asian cultural discipline
    with Midwestern community spirit shapes Qun’s worldview, informing his collaborative leadership style and his commitment to giving back through mentorship and cultural outreach.
