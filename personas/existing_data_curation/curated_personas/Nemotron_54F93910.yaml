  career_goals: Looking ahead, Qun aims to channel his extensive experience into strategic advisory roles that shape the future of infrastructure and technology delivery. In the next three to five years
    he plans to transition from day‑to‑day project execution to a senior consulting position where he can guide organizations on digital transformation, sustainable construction practices, and resilience
    planning. He is also committed to nurturing the next generation of engineers, envisioning a mentorship program that partners local schools with industry to provide hands‑on STEM experiences. Writing
    a book on integrating classic project management principles with emerging technologies is another long‑term ambition. Ultimately, Qun seeks to leave a legacy of improved project outcomes, stronger cross‑cultural
    teams, and increased representation of East Asian professionals in senior leadership, while positioning himself for a phased retirement that balances continued impact with quality family time.
