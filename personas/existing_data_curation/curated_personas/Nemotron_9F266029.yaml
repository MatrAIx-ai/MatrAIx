personas:
  professional: David Raiz, a 44-year-old structural metal fabricator with two decades of MIG, TIG, and stick welding expertise, translates complex blueprints into precise shop layouts while leading small
    crews with a relaxed, hands‑on problem‑solving style that balances curiosity for new techniques with a pragmatic, safety‑first mindset.
  sports: David Raiz plays in the Hudson Valley recreational softball league, cheers on the New York Yankees and the New York Giants, and spends weekends hiking with the Catskill Trail Club, blending competitive
    team spirit with a love for outdoor fitness.
  arts: David Raiz immerses himself in the local music scene, attending live shows at the Capitol Theatre featuring artists like Bruce Springsteen and The Avett Brothers, while collecting vintage concert
    posters at antique fairs and drawing inspiration for custom metal art from the gritty aesthetic of blues legends such as Muddy Waters.
  travel: David Raiz favors road‑trip adventures that combine fishing on Esopus Creek, weekend hikes in the Catskills, and visits to craft‑beer festivals in Asheville and Munich, planning trips loosely
    around friends’ schedules and budget constraints rather than strict itineraries.
  culinary: David Raiz showcases his culinary flair by grilling smoked brisket with a coffee‑rub, brewing seasonal IPAs using Cascade hops and local honey, and hosting potluck barbecues where dishes like
    fish tacos with mango salsa and classic mac & cheese compete for the best‑taste award.
  core: David Raiz is a sociable, hands‑on problem‑solver who balances a competitive edge with a laid‑back attitude, often juggling spontaneous projects, barbecue gusto, and a skeptical eye toward new ideas.
background:
  cultural: David grew up in the small-town atmosphere of Walden, NY, a community rooted in the working‑class heritage of the Hudson Valley. His family background reflects the region’s blend of Dutch, English,
    and Irish immigrant histories, emphasizing hard work, self-reliance, and close community ties. Local traditions such as county fairs, farm-to-table markets, and support for union trades have shaped
    his values. This cultural environment nurtured his practical curiosity, sociable demeanor, and competitive spirit, while also fostering a strong sense of loyalty to the community and its blue‑collar
    ethos.
attributes:
  skills: '[''MIG/TIG/Stick welding'', ''Structural steel fabrication'', ''Blueprint and schematic interpretation'', ''CNC plasma cutting operation'', ''Manual metal forming (bending, rolling)'', ''Rigging
    and heavy-lifting techniques'', ''OSHA safety compliance'', ''Team coordination on construction sites'', ''On-the-fly problem solving'', ''Equipment maintenance and troubleshooting'', ''Basic cost estimating
    and material selection'', ''Forklift and crane operation'']'
  hobbies: '[''Recreational softball league'', ''Weekend barbecues and potluck gatherings'', ''Hiking in Catskill Mountains'', ''Fishing in Esopus Creek'', ''Classic car restoration'', ''Arduino electronics
    tinkering'', ''Home-brew craft beer'', ''Visiting farmers markets and antique fairs'', ''Attending live music events'', ''Woodworking small home projects'']'
  career_goals: David aims to obtain an AWS Certified Welding Inspector (CWI) credential within the next two years to formalize his expertise. He aspires to move into a supervisory role, such as lead fabricator
    or shop foreman, where he can mentor younger workers while still engaging in hands‑on work. Ultimately, he envisions launching a boutique metal‑fabrication business that serves regional contractors
    and offers custom metal art for local venues, balancing his competitive drive with a desire for greater independence. He also plans to expand his skill set by learning CAD software (SolidWorks/AutoCAD)
    to add design services to his repertoire, enabling more creative projects and better client communication.
