  career_goals: Kristina’s ambitions are still blossoming, but she often talks about becoming a painter who can fill big canvases with bright colors, a storyteller who shares adventures with friends, or
    a teacher who helps other children learn new things. She also imagines caring for animals as a veterinarian, reflecting her empathy and desire to help. These future career ideas are inspired by her
    love of art, her sociable nature, and her curiosity about the world.
