personas:
  professional: A budding four‑year‑old architect named Kristina Davis loves building intricate castles from wooden blocks, meticulously plans each tower before stacking, and proudly presents the finished
    structures to friends, thriving on the spotlight as they delightfully narrate every design.
  sports: A lively four‑year‑old named Kristina Davis belongs to the Little Tigers Soccer Club, proudly wears their tiny adidas jersey, cheers enthusiastically for the Chicago Bulls during family game nights,
    and they habitually lead the pre‑game stretch while occasionally feeling nervous when learning a new drill.
  arts: A vivid four‑year‑old named Kristina Davis fills a sketchbook with bold crayon pictures of rainbow unicorns, watches Disney’s The Little Mermaid starring Jodi Benson on repeat, and they often sing
    the chorus of ‘Let It Go’ from Frozen, captivating their family audience with animated storytelling and an uncanny appreciation for colorful expression.
  travel: An adventurous four‑year‑old named Kristina Davis has explored Grandma’s farm in the countryside, enjoyed a sun‑filled weekend at Santa Monica beach building sandcastles, and dreams of riding
    the Eiffel Tower, and they prefer short trips with plenty of snack breaks and parental reassurance to calm their occasional travel anxiety.
  culinary: A selective four‑year‑old named Kristina Davis swoons over creamy macaroni and cheese with extra cheddar, loves juicy strawberry slices, can butter toast with a kid‑safe spreader, yet resolutely
    refuses peas and broccoli, and they often bargain for a small chocolate treat if the main dish doesn’t meet their exacting taste.
  core: Kristina Davis, a talkative and meticulously organized four‑year‑old, blends boundless curiosity with a craving for center‑stage attention, yet they wrestle with frequent worries that turn playtime
    into a blend of enthusiastic performance and anxious over‑thinking.
background:
  cultural: Kristina grows up in a White, middle‑class family in Inglewood, California, where she is exposed to a vibrant multicultural community. Her parents encourage appreciation for a variety of artistic
    traditions, from classic American folk music to diverse visual arts presented at local festivals. The nearby Los Angeles County museums and cultural events provide her with early exposure to both mainstream
    and multicultural perspectives. While her household reflects typical North‑American customs—holiday celebrations, school‑age routines—she also participates in neighborhood gatherings that celebrate
    the city’s rich ethnic mosaic, shaping an open‑minded outlook and an eagerness to explore new ideas.
