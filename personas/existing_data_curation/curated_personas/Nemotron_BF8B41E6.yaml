personas:
  professional: Sandra Thomas, a retired community garden coordinator and seasoned volunteer manager, combines her associate’s degree in Business Administration, meticulous bookkeeping, and gentle mediation
    style to oversee the garden’s budget and volunteer scheduling, even as her relaxed attitude leads her to occasionally misplace supplies.
  sports: Sandra Thomas enjoys low‑impact cardio through daily sunrise walks on the foothills, is a member of the Sunset Hill Walkers club, and follows the Asheville Tourists (Minor League Baseball) and
    the Carolina Panthers (NFL) for occasional game‑day social gatherings, preferring gentle activity over competitive sports.
  arts: Sandra Thomas, an avid quilter and choir singer, draws inspiration from folk artist Grandma Moses, the storytelling songs of Dolly Parton, and the historical novels of Ken Follett, often incorporating
    these influences into her handcrafted quilts and melodious church performances.
  travel: Sandra Thomas favors relaxed, scenic road trips that include stops at historic towns like Asheville, NC, and Shenandoah National Park, meticulously planning routes on her laptop while balancing
    a modest travel budget that limits her vacations to nearby state parks and occasional weekend visits to Savannah, GA.
  culinary: Sandra Thomas, a skilled home cook, reimagines Southern comfort dishes such as low‑sodium shrimp and grits, collard greens cooked with smoked turkey, and sweet potato pie sweetened with honey,
    regularly using fresh herbs like rosemary, thyme, and sage to enhance flavor while hosting weekly potluck dinners at the senior center.
  core: Sandra Thomas, a garden‑loving, quilt‑crafting 70‑year‑old with a delightfully disorganized desk, channels boundless compassion into community projects while secretly hoarding vintage sewing needles
    for future embroidery marathons.
background:
  cultural: Sandra grew up in a small town in South Carolina, immersed in the traditions of the Southern United States. Her upbringing emphasized family closeness, hospitality, and a deep respect for community
    institutions such as the local Baptist church and volunteer organizations. The rhythms of the region—seasonal farming, porch conversations, and church gatherings—shaped her values of cooperation, modesty,
    and service. While rooted in these traditions, Sandra’s natural curiosity led her to embrace new ideas, from exploring healthier cooking methods to adopting digital tools for staying in touch with distant
    relatives. The Appalachian cultural influences of Pickens County have also left a mark, visible in her love for folk music, native plant gardening, and storytelling. Together, these elements create
    a cultural tapestry that blends reverence for Southern heritage with an open, adaptable mindset.
attributes:
  skills: '["Southern cooking", "Gardening (native plants and herbs)", "Bookkeeping and budgeting", "Volunteer coordination", "Basic computer literacy (email, video calls, social media)", "Interpersonal
