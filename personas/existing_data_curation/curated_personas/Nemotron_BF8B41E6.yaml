  hobbies: '["Gardening", "Quilting", "Cooking", "Reading historical fiction", "Bird‑watching", "Walking in the Blue Ridge foothills", "Volunteer work at the senior center", "Church choir participation",
    "Listening to classic country and folk music"]'
  career_goals: Sandra’s ambitions now center on deepening the ripple of kindness she’s always cultivated. She hopes to compile a community cookbook that blends cherished Southern recipes with the healthier
    twists she’s discovered, preserving family traditions while inviting new ideas. She also aims to expand the local community garden into an intergenerational learning space, where seniors mentor teens
    in sustainable gardening and cooking. By sharpening her digital skills, she plans to create short video tutorials for volunteers and grandchildren, bridging the gap between her generation and the tech‑savvy
    world. Ultimately, Sandra wants to remain a steady, compassionate presence in Sunset, helping to nurture harmony, support neighbors in need, and celebrate the small joys of everyday life.
