  career_goals: Even at six, Madeleine already envisions a future where she can work independently on complex problems. She dreams of becoming a scientist or engineer who designs experiments and builds
    inventions, because she enjoys figuring out how things work and likes the idea of a lab where she can follow precise procedures. Her competitive streak pushes her to aim for winning a school science
    fair or a math contest. She also imagines herself as a detective who solves mysteries by gathering clues methodically. These ambitions align with her love for routine, solitary focus, and logical challenges.
