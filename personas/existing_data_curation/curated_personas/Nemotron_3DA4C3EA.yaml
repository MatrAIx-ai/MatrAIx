personas:
  professional: Jorge Estevez, an 81‑year‑old retired civil engineer and veteran educator, channels their structural analysis expertise, data‑driven problem solving, and visual storytelling talent into
    volunteer mentorship for underrepresented STEM students and co‑leads intergenerational art‑science workshops at regional museums, balancing meticulous planning with flexible, creative improvisation.
  sports: Jorge Estevez, a devoted member of the Albuquerque Hiking Club, hikes the Sandia Mountains each weekend with friends and family, participates in a senior pickleball league at the local YMCA, and
    avidly supports the New Mexico State Aggies football team, approaching fitness with a sociable, low‑impact routine that balances activity and longevity.
  arts: Jorge Estevez, a passionate patron of the Albuquerque Museum of Art and regular attendee of folk music evenings featuring Lila Downs and Gustavo Santaolalla, captures gallery installations through
    black‑and‑white photography, volunteers as a docent at community art events, and occasionally procrastinates on curating exhibitions due to perfectionist tendencies.
  travel: Jorge Estevez prefers thoughtfully planned road trips that combine cultural immersion and gentle adventure, having recently driven to Santa Fe for its adobe art scene and dreaming of a future
    visit to Oaxaca’s culinary festivals, yet they delay booking flights because of anxiety about airline travel and rely on senior travel discounts to keep costs manageable.
  culinary: Jorge Estevez delights in preparing classic mole poblano, roasted chiles en nogada, and fresh nopal salads, skillfully tending a kitchen garden of chilies and corn while sometimes over‑seasoning
    dishes in an earnest attempt to recapture the bold flavors of their youth.
  core: Jorge Estevez is an intellectually curious, socially vibrant 81‑year‑old who blends engineering precision with artistic flair, constantly juggling mentorship, garden stewardship, and anxiety‑laden
    health routines, all while indulging in occasional impulsive splurges on camera gear.
background:
  cultural: Jorge was born in a small town in Jalisco, Mexico, and migrated to the United States during the late 1960s to pursue higher education in engineering. He retains a strong Mexican identity, celebrating
    traditions such as Día de los Muertos, Semana Santa, and the vibrant fiesta of his hometown. His family maintains bilingual communication, and he passes down Mexican culinary recipes, particularly mole
    and tamales, to his grandchildren. As a member of local Mexican-American cultural organizations in Corrales, NM, Jorge actively promotes cross‑cultural dialogue, sharing folklore, music, and oral histories.
    His Catholic upbringing influences his values of community service, humility, and respect for elders, which he integrates into his everyday interactions.
attributes:
  skills: '["Civil engineering", "Structural analysis", "Data analysis", "Project management", "Curriculum development", "Mentoring", "Bilingual communication (Spanish/English)", "Public speaking", "Community
