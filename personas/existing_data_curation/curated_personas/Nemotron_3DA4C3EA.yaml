  hobbies: '["Visiting art galleries", "Attending folk music concerts", "Gardening native desert plants", "Hiking in the Sandia Mountains", "Digital photography", "Playing chess", "Reading science literature",
    "Cooking traditional Mexican cuisine", "Volunteering at community centers", "Participating in cultural workshops"]'
  career_goals: In retirement, Jorge aims to channel his professional experience into volunteer mentorship for high school and college students pursuing STEM fields, particularly those from underrepresented
    backgrounds. He aspires to co‑lead an intergenerational workshops series that fuses science concepts with visual arts, fostering curiosity and creative thinking in the local community. Jorge also hopes
    to collaborate with regional museums and cultural centers to curate exhibitions that highlight Mexican scientific contributions and indigenous art, thereby preserving heritage while inspiring new ideas.
    Finally, he is committed to supporting mental‑health initiatives for seniors, drawing on his personal experience with anxiety to promote emotional wellness.
