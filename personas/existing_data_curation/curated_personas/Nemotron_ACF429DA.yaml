  career_goals: Alexander dreams of becoming a scientist who explores space and discovers how things work, reflecting his curiosity about new ideas. He also imagines building things that help his family,
    like a backyard garden or a small robot, showing his practical side. Occasionally, he mentions wanting to be a teacher one day, because he likes sharing what he knows and seeing others happy. While
    his plans are flexible and open‑ended, they all center on learning, helping others, and creating useful things.
