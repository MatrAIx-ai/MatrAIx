personas:
  professional: Shanti Thompson is a high‑school robotics enthusiast who codes Python games, builds ship models, and leads the robotics club with methodical planning, channeling their competitive drive
    into meticulous project timelines and detailed documentation.
  sports: Shanti Thompson is a competitive swimmer for the St. Johns Swim Club, trains five mornings a week at the community pool, cheers for the Miami Dolphins during football season, and joins the local
    youth chess league as a mental sport to sharpen strategic thinking.
  arts: Shanti Thompson devotes free evenings to reading Isaac Asimov, binge‑watching the sci‑fi series The Expanse, and sketching concept art inspired by the video game Mass Effect, while keeping a playlist
    of Vangelis’ synth scores for background while coding.
  travel: Shanti Thompson plans weekend getaways with a mix of nature and pop‑culture, having hiked the Timucuan Preserve, dreaming of a trip to the Kennedy Space Center for a behind‑the‑scenes tour and
    a future backpacking adventure through Kyoto’s historic temples, all on a modest allowance budget.
  culinary: Shanti Thompson prefers quick, protein‑rich meals like grilled chicken wraps with avocado and spinach, enjoys experimenting with homemade ramen broth seasoned with kombu and miso, yet frequently
    burns the toast when rushing between coding sessions.
  core: Shanti Thompson is a methodical 15‑year‑old with a competitive streak, juggling robotics, competitive swimming, and sci‑fi obsessions while occasionally overspending on limited‑edition games and
    forgetting to take their allergy meds.
background:
  cultural: Shanti grew up in a middle‑class white family in Orange Park, a suburban community on the outskirts of Jacksonville, Florida. Her family’s values blend traditional Southern hospitality with
    the laid‑back, outdoor‑oriented lifestyle common to the region. Weekend activities often involve trips to nearby beaches and state parks, community barbecues, and attendance at a non‑denominational
    Christian church where she participates in youth groups. The multicultural environment of Central Florida, with its mix of Hispanic, African‑American, and Caribbean influences, has exposed her to diverse
    perspectives, although her immediate social circle is primarily fellow middle‑school students from similar backgrounds. Her parents encourage academic achievement and self‑reliance, fostering a pragmatic
    approach to education while also supporting her curiosity through resources like science kits and local museum visits.
