  hobbies: '[''Reading science-fiction and popular science'', ''Competitive swimming'', ''Coding with Python and Scratch'', ''Model ship building'', ''Robotics club participation'', ''Nature hiking in Timucuan
    Preserve'', ''Playing chess'', ''Journaling'']'
  career_goals: Shanti aims to attend a selective STEM-focused high school, earn a merit scholarship, and eventually pursue a degree in biomedical engineering with a specialization in marine health. She
    is motivated by the desire to develop sustainable medical technologies that can benefit coastal communities. In the short term, she plans to win her school's science fair and qualify for regional robotics
    competitions. Long‑term, she envisions working as a research scientist at a marine research institute, contributing to the conservation of Florida’s coastal ecosystems and possibly collaborating on
    interdisciplinary projects that merge engineering and environmental science.
