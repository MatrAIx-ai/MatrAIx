personas:
  professional: Jackie Thomas, a seasoned community volunteer and caretaker, channels her decades of home‑maintenance, budgeting, and event‑planning expertise into reliably organizing church functions and
    senior‑center activities, while her practical, structure‑loving nature ensures every detail is accounted for.
  sports: Jackie Thomas enjoys watching the regional baseball team, the Sweetwater Sluggers, follows the college football season of the Appalachian State Mountaineers, and participates in a weekly sunrise
    walk with the local Senior Walking Club, balancing low‑impact exercise with community camaraderie.
  arts: Jackie Thomas, a devoted member of her church choir, harmonizes classic country staples like Loretta Lynn and folk legends such as Bob Dylan, while also immersing herself in historical fiction by
    authors like Ken Follett and attending quilting showcases featuring the work of renowned fiber artist Faith Ringgold.
  travel: Jackie Thomas prefers organized group trips that combine gentle sightseeing with historical narratives, has joined senior tours to the Blue Ridge Parkway and the historic town of Savannah, and
    dreams of a leisurely river cruise along the Mississippi, all while keeping travel plans within a modest budget and health‑friendly pace.
  culinary: Jackie Thomas, an experienced home cook, expertly bakes seasonal apple and peach pies using a heritage cast‑iron skillet, preserves garden‑fresh strawberry jam with a pinch of lemon zest, and
    delights in preparing buttermilk biscuits with locally sourced butter and fresh rosemary, showcasing her skillful balance of tradition and precision.
  core: Jackie Thomas blends meticulous organization with warm community spirit, turning garden bounty, needlework, and classic tunes into daily rituals that sustain both her independence and her role as
    Sweetwater’s beloved elder.
background:
  cultural: Jackie grew up in a small town in Tennessee, shaped by the Southern Appalachian culture of her grandparents who were farmers. Her upbringing emphasized self‑reliance, community service, and
    deep family ties. Church plays a central role in her social life, reflecting the region’s strong religious tradition. She values Southern hospitality, the preservation of local customs, and the oral
    transmission of stories and recipes that connect her to her heritage.
attributes:
  skills: '[''Home cooking and recipe preservation'', ''Household budgeting and financial management'', ''Basic home maintenance (plumbing, carpentry)'', ''Seasonal gardening and horticulture'', ''Knitting
