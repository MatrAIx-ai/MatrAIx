persona_description: A researcher in economics who specializes in the study of international trade and financial markets, focusing on the effects of home bias on the allocation of assets between countries.
  This researcher is particularly interested in understanding how factors such as wealth, education, and market entry costs affect the distribution of foreign assets held by households, and how this affects
  the overall international trade and financial stability. The researcher is likely to be interested in the theoretical implications of their findings and the potential policy implications for international
  trade and financial markets.
