    coastal trails'']'
  career_goals: Diep aims to open her own boutique bakery that showcases a fusion of Vietnamese and Hawaiian flavors, establishing a flagship store in Kaneohe within the next five years. She plans to acquire
    the Certified Pastry Chef credential, develop a line of signature pastries for local restaurants, and mentor apprentices to preserve traditional techniques. Long‑term, she hopes to publish a cookbook
    that documents her family's recipes and her own innovative creations, while ensuring a sustainable, family‑run business.
