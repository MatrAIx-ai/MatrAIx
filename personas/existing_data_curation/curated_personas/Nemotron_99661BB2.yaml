personas:
  professional: Lessie Habte is a retired engineering project manager who channels her CAD expertise, data‑driven problem solving, and competitive drive into mentoring high‑school girls, drafting grant
    proposals, and launching a community makerspace, all while applying methodical planning and reliable execution to every initiative.
  sports: Lessie Habte follows the Texas Rangers and the Houston Texans, participates in a local senior walking club that explores nature trails each Saturday, plays occasional soft‑serve tennis at the
    community center, and enjoys cheering on the Dallas Cowboys during football season, balancing competitive spirit with low‑impact fitness.
  arts: Lessie Habte immerses herself in creative pursuits by quilting intricate patterns inspired by the works of William Morris, singing gospel classics like “Amazing Grace” in her church choir, devouring
    science‑fiction novels by Ursula K. Le Guin and Octavia Butler, and attending local art exhibitions featuring Texas folk artists such as Mary Ann Taylor.
  travel: Lessie Habte curates weekend getaways to the Texas Hill Country vineyards, annual trips to New Orleans for jazz festivals, occasional pilgrimages to the National Archives in Washington, D.C. for
    genealogical research, and has a bucket‑list destination of visiting the historic city of York, England, preferring a mix of cultural immersion and relaxed nature hikes.
  culinary: Lessie Habte delights in cooking soul‑food staples such as collard greens seasoned with smoked ham hocks, slow‑roasted chicken with Creole spices, sweet potato pie, and homemade cornbread, while
    also experimenting with Texas‑style brisket rubs that blend coffee grounds, brown sugar, and paprika, and she frequently incorporates fresh okra and black‑eyed peas from her garden into stews.
  core: Lessie Habte is a methodical, competitively‑spirited retiree who marries engineering precision with quilting artistry, community mentorship, disciplined finances, and a skeptical yet curious outlook
    that fuels both her garden and her grant‑writing ambitions.
background:
  cultural: Lessie identifies as African American and grew up in the Dallas‑Fort Worth metro area before settling in Cleburne, Texas. Her cultural heritage is shaped by family stories of the civil‑rights
    era, the strong role of the Black church, and the rich culinary and musical traditions of the African‑American community in Texas. She maintains close ties to her extended family, participates in local
    church events, and celebrates Juneteenth and Kwanzaa with community gatherings. This background informs her commitment to uplifting underrepresented voices in STEM and preserving cultural legacy.
attributes:
  skills: '["Engineering analysis", "Project management", "Data analysis", "Computer‑aided design (CAD)", "Technical writing", "Quality assurance testing", "Curriculum development for STEM outreach", "Grant
    writing", "Public speaking", "Team leadership", "Problem solving"]'
  hobbies: '["Gardening", "Quilting", "Reading science‑fiction", "Genealogy research", "Church choir singing", "Cooking soul‑food dishes", "Mentoring at community college", "Walking nature trails", "Local
    history lectures", "DIY home projects"]'
  career_goals: Though she has retired from formal employment, Lessie is driven to leverage her expertise to empower the next generation. She plans to mentor high‑school girls interested in engineering,
    help establish a makerspace at the community center, author a guidebook on navigating STEM careers as a minority woman, and serve on the board of a local nonprofit focused on technology education. Her
    ambition also includes securing a small grant to fund STEM kits for after‑school programs, allowing her to combine her competitive spirit with community impact.
