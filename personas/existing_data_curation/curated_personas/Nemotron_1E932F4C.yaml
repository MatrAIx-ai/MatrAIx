personas:
  professional: James Brown is a teen automotive hobbyist and budding IT support specialist who blends hands‑on vehicle diagnostics with DIY electronics, leveraging their curiosity and practical reliability
    to pursue an apprenticeship while offering neighborhood tech fixes.
  sports: James Brown is a dedicated skateboarder who practices kickflips at the neighborhood skate park, rides a refurbished hybrid bike with the City Cycling Club, follows the Los Angeles Lakers for basketball
    inspiration, and looks up to the professional skate crew Team Vans and cyclist Peter Sagan for style.
  arts: James Brown is an aspiring rhythm guitarist who strums along to Arctic Monkeys riffs and Dr. Dre beats, improvises over alternative rock backings, draws visual inspiration from the sci‑fi aesthetics
    of Blade Runner 2049, and streams live concerts by Foo Fighters during late‑night chill sessions.
  travel: James Brown prefers low‑cost weekend getaways, cycling to the nearby coastal town of Santa Cruz for its surf‑skate vibe, dreaming of a cross‑country road trip along Route 66 and a sci‑fi pilgrimage
    to Tokyo's Akihabara to hunt for vintage gaming mods.
  culinary: James Brown experiments in the kitchen by preparing sriracha‑glazed chicken thighs, avocado‑toast breakfast bowls, and occasional kimchi fried rice, favoring bold flavors, fresh herbs, and quick,
    nutritious meals that fit a teenage schedule.
  core: James Brown is a curious, hands‑on teen who balances skate‑park thrills and garage tinkering with a habit of procrastinating homework for late‑night gaming, yet always manages to help neighbors
    with a smile.
background:
  cultural: James grew up in Maywood, a densely populated city in Los Angeles County known for its vibrant Latino community. Though his family is of European descent, his upbringing was shaped by the multicultural
    environment—he regularly heard Spanish greetings, celebrated community festivals like Cinco de Mayo, and absorbed the local car‑culture fascination with low‑riders and hot‑rods. His parents emphasized
    practicality and a strong work ethic, encouraging him to learn trades early and value reliability. The West Coast outdoor lifestyle, skate parks, and the eclectic music scene have also left a lasting
    imprint, giving him a blend of traditional suburban American values and the diverse, creative spirit of Southern California.
attributes:
  skills: '[''Computer troubleshooting'', ''Scratch programming'', ''Basic electronics (Arduino)'', ''Automotive maintenance (oil changes, brake checks)'', ''Bicycle repair'', ''Simple cooking'', ''Team
