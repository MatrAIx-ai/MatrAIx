  hobbies: '[''Skateboarding'', ''Playing rhythm guitar'', ''Video game modding'', ''Sci‑fi movies'', ''Reading science magazines'', ''Cooking experimental dishes'', ''Volunteering at community garden'',
    ''Listening to alternative rock and West Coast hip‑hop'', ''Bicycle rides'']'
  career_goals: James aims to earn his GED within the next year and secure a hands‑on apprenticeship in automotive technology at a local shop. He wants to deepen his knowledge of vehicle diagnostics and
    electronic systems while gaining legitimate credentials that open long‑term career pathways. In parallel, he plans to refine his IT support basics to offer freelance tech assistance to neighbors and
    small businesses. Ultimately, James envisions opening a community‑focused garage that provides affordable repairs and mentorship for youth interested in trades, blending his love for practical problem‑solving
    with a desire to give back to his neighborhood.
