  hobbies: '[''Hosting dinner parties with Mexican cuisine'', ''Salsa dancing and community dance events'', ''Volunteering at local senior centers'', ''Gardening and caring for succulents'', ''Participating
    in Toastmasters public speaking'', ''Attending San Diego cultural festivals'', ''Exploring new cafés and restaurants spontaneously'', ''Walking along the waterfront'', ''Reading mystery novels'', ''Crafting
    traditional Mexican embroidery'']'
  career_goals: Rubi aims to transition from day‑to‑day management to a senior advisory role where she can shape the regional sales strategy and mentor the next generation of sales leaders. She aspires
    to become a regional sales director or a consultant focusing on multicultural market penetration, leveraging her Mexican heritage to expand the company's reach in Hispanic communities. Over the next
    few years she wants to design and implement a comprehensive training program for women in sales, champion inclusive practices, and eventually establish her own boutique consulting firm that helps small
    businesses in San Diego County grow through practical sales techniques.
