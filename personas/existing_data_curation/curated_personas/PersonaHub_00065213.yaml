persona_description: A scientist or researcher who is dedicated to conducting high-quality, rigorous research in a variety of fields. They are particularly interested in the scientific method, statistical
  analysis, and the importance of replicability in study design. They are skeptical of anecdotal evidence and prefer large, well-controlled, randomized, double-blind, prospective studies as the most reliable
  sources of evidence. They are also cautious about the use of pilot studies, non-randomized studies, and uncontrolled prospective studies, as they may not be able to establish causality or prove their
  findings. They are interested in the US National Institute of Health's criteria for grading the reliability of research studies and the establishment of "levels of evidence" to grade the proof of treatments.
  They are also interested in the FDA's decision not to allow POM Wonderful to make health claims based on the pomegranate juice study, which led them to be suspicious of the way the research was conducted.
