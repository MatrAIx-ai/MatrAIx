    Excel macros)'', ''Basic bookkeeping'', ''Budget tracking'', ''Staff training'', ''Conversational Spanish'']'
  hobbies: '[''Visiting art galleries and museums'', ''Attending live music and theater performances'', ''Hiking in the Sonoran Desert'', ''Cooking Southwestern/Mexican cuisine'', ''Hosting potluck dinner
    gatherings'', ''Participating in a book club (contemporary fiction and art history)'', ''Volunteering with a youth arts program'', ''Practicing yoga'', ''Gardening succulents'', ''Group fitness classes
    (Zumba, salsa dancing)'']'
  career_goals: Ksenia aims to advance into a supervisory position such as Office Manager or Administrative Team Lead within the next three years, where she can shape office processes, mentor junior staff,
    and foster a collaborative culture. She plans to earn a Certified Administrative Professional (CAP) credential and complete a short course in project management to strengthen her leadership toolkit.
    Simultaneously, she is exploring opportunities to blend her administrative expertise with her passion for the arts, targeting a role as a program coordinator or volunteer manager at a local cultural
    nonprofit. Over the next five years, Ksenia hopes to spearhead community‑focused art events, develop volunteer training programs, and use her organizational skills to amplify the impact of Tucson’s
    vibrant cultural scene while maintaining a stable work‑life balance for her family.
