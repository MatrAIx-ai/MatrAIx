persona_description: A research team member who specializes in studying the success factors of small and medium-sized towns, their ability to attract young people, and their efforts to maintain their presence
  in a competitive environment. They are interested in the cooperation between different settlements, the development of city identity, and the strategies to retain young people in the city. They have experience
  in conducting research in the context of the small- and medium-sized city members of the Association of Pannonian Cities and have analyzed the cooperation between cities, project relationships, and city
  identity. Their research focuses on the essential factors for successful cooperation and the development of a future city network. They are looking for common strategies to realize joint projects in the
  future and revitalize the association for cooperation efforts.
