  hobbies: '[''digital illustration'', ''creative writing (short stories, poetry)'', ''improvisational theater'', ''attending live concerts'', ''playing narrative-driven video games'', ''reading speculative
    fiction'', ''photography'', ''blogging about art and philosophy'', ''participating in open mic events'', ''volunteering at local art galleries'']'
  career_goals: Joshua aims to turn his passion for visual and narrative arts into a career as a multidisciplinary creator. He envisions completing a bachelor's degree in Media Arts or Creative Communications,
    building a professional portfolio that blends illustration, interactive design, and storytelling. He aspires to work as a creative director or content strategist at an innovative agency, or launch his
    own indie game studio that produces narrative-driven experiences. In the short term, he plans to secure internships with local media firms, grow a YouTube channel showcasing his art process, and network
    at industry events to position himself for future opportunities in New York's creative hub.
