personas:
  professional: Joshua Cain, an emerging multidisciplinary creator at SUNY Oswego, blends digital illustration, narrative writing, and basic Python scripting into immersive media projects, channeling their
    sociable confidence and competitive edge into leading campus event teams and captivating audiences with improvisational flair.
  sports: Joshua Cain enjoys winter ice skating on Lake Ontario, follows the Buffalo Sabres and New York Knicks, participates in SUNY Oswego intramural soccer, and hits the local gym three times weekly
    to counteract sedentary studio time.
  arts: Joshua Cain draws inspiration from the surrealist works of Salvador Dalí, the indie folk sounds of Bon Iver, and the avant‑garde performances at the SUNY Oswego theatre, regularly attending shows
    by local poet‑musician Maya Torres and curating a monthly digital art exhibit on their blog.
  travel: Joshua Cain prefers spontaneous weekend road trips, has explored the historic streets of Boston, the vibrant neighborhoods of Toronto, and the Adirondack peaks, and dreams of backpacking through
    Iceland’s volcanic landscapes while saving funds from part‑time gigs.
  culinary: Joshua Cain loves cooking quick ramen bowls with miso, soft‑boiled eggs, and fresh lake‑caught trout, enjoys the tang of maple‑glazed pork chops, and is a self‑taught baker who frequently experiments
    with blueberry scones using locally sourced honey.
  core: Joshua Cain is an 18‑year‑old creative whirlwind who thrives on public applause, battles constant worry, hoards art supplies like treasure, and refuses to skip a single improv show even when deadlines
    loom.
background:
  cultural: Joshua grew up in Oswego, a small city on the shore of Lake Ontario in upstate New York. His family traces its roots to Anglo‑American heritages, with grandparents who migrated from Ireland
    and Germany, and they have long been part of the region's middle‑class working‑professional community. The local culture—seasonal winters, lake‑based recreation, and a close‑knit community centered
    around SUNY Oswego—shaped his appreciation for both independent thought and collaborative endeavors. He identifies with mainstream American cultural values of individualism and self‑expression, while
    also valuing the modest, community‑oriented ethos of his hometown.
attributes:
  skills: '[''public speaking'', ''graphic design'', ''digital illustration'', ''creative writing'', ''critical thinking'', ''research'', ''event coordination'', ''basic programming (Python)'', ''project
