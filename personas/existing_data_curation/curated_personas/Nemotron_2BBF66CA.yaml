  career_goals: Looking ahead, Richard is fascinated by how things are built and how living things are cared for. He dreams of becoming a civil engineer, where he can design safe and efficient structures
    for his community, or a wildlife biologist, allowing him to protect the natural habitats he enjoys exploring. He also expresses interest in working on a family farm someday, combining his love of practical,
    hands‑on work with his desire to contribute to his local community.
