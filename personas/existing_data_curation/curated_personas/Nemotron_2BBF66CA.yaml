personas:
  professional: Richard Reid is a budding junior engineer who channels his love for LEGO moving‑part sets, Minecraft architecture, and methodical science experiments into disciplined problem‑solving, applying
    a practical, structured mindset and quiet confidence when leading small Boy Scouts projects.
  sports: Richard Reid showcases his athletic side as a member of the Rapid City Rangers youth soccer team and the Black Hills Archers club, while cheering for the Denver Broncos in football and the Colorado
    Rockies in baseball, balancing structured practice with spontaneous games during Boy Scouts hikes.
  arts: Richard Reid expresses his creativity through intricate LEGO builds inspired by designers like Nathan Sawaya, Minecraft creations modeled after tutorials by Grian, and sketches of Black Hills terrain,
    while also enjoying adventure novels by Jules Verne and the epic scores of Star Wars, which ignite his imagination.
  travel: Richard Reid dreams of family road trips to the Badlands National Park and Yellowstone’s geysers, and also longs for a summer adventure in Tokyo’s Akihabara district, preferring meticulously planned
    itineraries that still allow spontaneous rock‑collecting detours on nature hikes.
  culinary: Richard Reid favors hearty meals such as homemade mac and cheese with sharp cheddar, grilled cheese sandwiches on sourdough, and corn on the cob grilled with butter and paprika, while also enjoying
    quick snacks like apple slices with peanut butter, reflecting his simple yet comfort‑focused palate.
  core: Richard Reid is a methodical ten‑year‑old explorer who balances quiet curiosity with practical engineering, disciplined saving, diligent health management, and a love for nature‑inspired adventures,
    all while occasionally hoarding extra LEGO bricks in his room.
background:
  cultural: Richard was born and raised in Hartford, a small town in Minnehaha County, South Dakota. His family is part of a predominantly white, Midwestern community that values self‑reliance, close family
    ties, and a connection to the land. The local culture includes traditions such as community potlucks, county fairs, Fourth of July parades, and barn dances. Growing up on a family farm, Richard has
    been exposed to agricultural practices and the rhythms of rural life. The region’s cultural emphasis on practical skills, community service, and modesty has shaped his outlook. While he enjoys the broader
    American media and school curriculum, he also respects the local heritage of hard work, respect for nature, and neighborly support.
