personas:
  professional: Felix Mcswain, a 19‑year‑old IT associate, provides remote help‑desk support using methodical troubleshooting, Python and PowerShell automation, and meticulous Git‑tracked documentation,
    and they are quietly pursuing CompTIA A+ and Network+ certifications as a stepping stone toward a junior cybersecurity analyst role.
  sports: Felix Mcswain, a 19‑year‑old who favors solitary fitness, hikes the Mount Hood National Forest with the Mount Hood Hiking Club, follows the Portland Timbers (MLS) and Portland Trail Blazers (NBA)
    for occasional sport enthusiasm, and in the winter joins a local cross‑country skiing group to stay active.
  arts: Felix Mcswain, who spends evenings strumming acoustic renditions of Nick Drake and Bon Iver, devours speculative novels by Ursula K. Le Guin and Neal Stephenson, and enjoys the ambient scores of
    the video game Journey, finds that these artistic outlets deepen their reflective nature and provide a quiet counterbalance to their technical work.
  travel: Felix Mcswain, a 19‑year‑old traveler with a tight student budget, meticulously plans solo backpacking trips to places like Yosemite National Park and the Canadian Rockies, dreams of a future
    solo excursion to Kyoto to explore its tech scene and tranquil temples, and prefers low‑key hostels that offer quiet workspaces for coding between hikes.
  culinary: Felix Mcswain, who enjoys the quiet ritual of cooking, often prepares simple yet flavorful dishes such as garlic‑sautéed shrimp with quinoa, homemade ramen with miso broth and soft‑boiled eggs,
    and bakes sourdough bread using whole‑grain flour, while they favor aromatic ingredients like fresh basil, smoked paprika, and kaffir lime leaves to add a subtle twist to their meals.
  core: Felix Mcswain, a 19‑year‑old tech‑savvy introvert, channels relentless curiosity into solitary coding projects, battles chronic worry with nightly meditation, and occasionally hoards extra USB drives
    and high‑end gaming peripherals that rarely see use.
background:
  cultural: Felix is a white male raised in the suburban outskirts of Charlotte, North Carolina. His upbringing reflects a blend of traditional Southern values—politeness, modesty, and a strong work ethic—with
    the modern, tech‑oriented culture of a rapidly growing metropolitan area. His family emphasized self‑reliance, education, and community involvement, often participating in church‑based service projects
    that reinforced his cooperative and considerate nature. While embracing Southern hospitality in his interactions, Felix prefers quieter, more private settings, a personal tendency shaped by both his
    personality and the relatively laid‑back, family‑centric environment of his hometown. This cultural mix informs his respectful demeanor, appreciation for reliable routines, and his desire to contribute
    thoughtfully while maintaining personal space.
attributes:
  skills: '["Hardware and software troubleshooting", "Network configuration (Router, Switch, Wi‑Fi)", "Python and PowerShell scripting", "Linux command‑line basics", "Technical documentation and version
    control (Git)", "Data cleaning and entry", "Microsoft Office Suite (Excel, Word, PowerPoint)", "Project tracking tools (Trello, Asana)"]'
  hobbies: '["Science‑fiction and speculative fiction reading", "Single‑player strategy video games", "Personal coding projects (web development, simple games)", "Hiking and nature photography", "Woodworking
    (small furniture, carvings)", "Journaling and mindfulness meditation", "Acoustic guitar playing"]'
  career_goals: Felix aims to secure an entry‑level IT support or help‑desk position that offers remote or low‑interaction work environments, allowing him to leverage his methodical problem‑solving skills
    while preserving his preference for solitude. Over the next three years he plans to earn CompTIA A+ and Network+ certifications, and later pursue a Cisco CCNA to broaden his networking expertise. His
    long‑term ambition is to transition into a systems analyst or junior cybersecurity analyst role, where his curiosity about emerging threats can be balanced with practical, structured remediation processes.
    He also intends to enroll part‑time in a bachelor's program in Computer Science to deepen his technical knowledge without sacrificing his need for a stable, low‑stress routine.
