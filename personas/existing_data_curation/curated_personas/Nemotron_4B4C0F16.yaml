  career_goals: Jenny aims to transition her extensive teller experience into a mentorship and training role, helping new tellers develop both technical and customer‑service competencies. She aspires to
    lead a small team or become a senior advisor for community outreach, designing financial‑literacy workshops for seniors and low‑income residents. While planning for a comfortable retirement, she also
    hopes to devote more time to personal artistic pursuits, perhaps opening a modest community art studio or curating local exhibitions that blend financial education with cultural enrichment.
