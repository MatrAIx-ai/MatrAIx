personas:
  professional: Jenny Shue, a veteran bank teller with a meticulous eye for process and a passion for the arts, they leverage their strong interpersonal skills and creative problem‑solving to mentor new
    tellers and design community‑focused financial‑literacy workshops that blend practical banking knowledge with cultural enrichment.
  sports: Jenny Shue, a regular participant in the senior walking club and occasional volunteer for the Sacramento River Cats' community events, they root for the Golden State Warriors and the San Jose
    Earthquakes, and enjoy low‑impact yoga sessions at a Bay Area studio to maintain flexibility and balance.
  arts: Jenny Shue, who frequents openings at the Crocker Art Museum and the San Francisco Museum of Modern Art, they paint vibrant acrylic landscapes inspired by Georgia O'Keeffe and sculpt pottery reminiscent
    of Japanese raku, while also savoring performances by the San Francisco Symphony and films starring Meryl Streep.
  travel: Jenny Shue, whose travel style blends careful itinerary planning with spontaneous day trips, they revisit historic towns like Sonoma and Santa Fe for their festivals, yearn to explore the medieval
    streets of Bruges, and prefer weekend getaways to the coastal vineyards of Napa Valley whenever their budget and senior‑friendly schedule allow.
  culinary: Jenny Shue, an avid herb gardener, they often cook herb‑infused dishes such as rosemary‑garlic roasted chicken, basil‑pesto pasta, and rose‑petal jam, while enjoying farm‑to‑table brunches at
    Sacramento’s Tower Café and experimenting with pottery‑crafted serving bowls for their culinary creations.
  core: Jenny Shue blends meticulous banking expertise with a vibrant artistic spirit, they calmly pursue lifelong learning, and occasionally forget to water their roses when deep in a new painting.
background:
  cultural: Jenny is a White American whose family roots trace back to German and Irish immigrants who settled in California during the early 20th century. Raised in the Sacramento suburbs, she grew up
    with a blend of Midwestern modesty and the diverse cultural influences of the Bay Area. Her upbringing emphasized education, community involvement, and an appreciation for the arts, values reinforced
    by her college studies in business and a longstanding interest in art history. The loss of her husband deepened her connection to community support networks, and her continued participation in local
    cultural events reflects a commitment to fostering inclusive, creative spaces.
