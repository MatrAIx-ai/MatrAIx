persona_description: A food expert who specializes in the prevention and control of gastrointestinal infections, particularly focusing on the transmission and prevention of salmonella, listeria, campylobacter,
  EHEC, and other bacterial pathogens. His expertise lies in the understanding of the factors that contribute to the spread of these pathogens, such as handling, cooking, and storage practices, and the
  importance of hand-washing, proper food preparation, and food storage. He is also knowledgeable about the cool chain, the importance of regular cleaning, and the need to properly defrost frozen meats.
