  career_goals: Although retired from a senior research scientist role at a federal laboratory, Evelyn aims to author a memoir that interlaces her scientific career with her love of art, making the narrative
    approachable for general readers. She hopes to launch a community science‑art program in Prince George’s County that partners local schools with neighborhood galleries, allowing students to explore
    scientific concepts through creative projects. Evelyn also aspires to mentor underrepresented youth interested in STEM, serving as a volunteer advisor for a regional mentorship network. In addition,
    she plans to deepen her involvement with the Smithsonian’s Hirshhorn Museum as a docent, sharing her interdisciplinary perspective with visitors, and to champion a neighborhood pollinator‑garden initiative
    that blends ecology, horticulture, and civic engagement.
