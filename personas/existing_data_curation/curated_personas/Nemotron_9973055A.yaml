personas:
  professional: A seasoned computational biophysicist, Evelyn Baker blends four decades of molecular dynamics expertise with a painter’s eye, using watercolor sketches to illustrate protein folding pathways
    in community workshops; their critical, skeptical stance drives rigorous model validation while their relaxed, flexible approach lets them mentor graduate students and volunteers in informal, sometimes
    chaotic, settings, and they often host impromptu sketch sessions during lab tours.
  sports: An avid birdwatcher and community-center chess enthusiast, Evelyn Baker joins weekly walking groups in Baltimore’s Inner Harbor park, follows the Baltimore Ravens and Orioles seasons with spirited
    debate, and occasionally rolls a gentle round of senior tennis, balancing competitive spirit with a love for nature’s quiet moments, and they frequently share game strategies with fellow walkers during
    breaks.
  arts: An eclectic art lover and watercolorist, Evelyn Baker spends weekends at the Baltimore Museum of Art admiring works by Georgia O'Keeffe and Yayoi Kusama, captures seasonal cityscapes with a Canon
    EOS 5D reminiscent of Ansel Adams, and engages in lively book-club discussions of speculative fiction authors like Ursula K. Le Guin while recreating favorite scenes in delicate watercolor studies,
    and they frequently sketch quick studies in the museum’s quiet corners.
  travel: A reflective traveler, Evelyn Baker plans low-key getaways that blend art and science, such as weekend trips to the Smithsonian Hirshhorn in Washington, a week-long exploration of Kyoto’s Zen
    gardens and tea houses, and annual visits to New York’s MoMA, preferring flexible itineraries over rigid schedules, and they often travel by Amtrak or short flights to balance comfort with adventure.
  culinary: A creative home chef, Evelyn Baker experiments with fusion recipes like miso-glazed salmon served over Southern collard greens, infuses Caribbean jerk spices into classic Maryland crab cakes,
    and delights in plating dishes that feature fresh figs, goat cheese, and smoked paprika, while sometimes neglecting to label leftovers, leading to spontaneous midnight snack adventures, and they often
    improvise new flavor twists when inspiration strikes.
  core: Evelyn Baker is a curious, art-infused former biophysicist whose flexible, slightly disorganized nature fuels a lifelong quest to blend science, creativity, and community, even as they remain competitively
    sharp and occasionally forgetful.
background:
  cultural: Evelyn is a white American whose family roots trace back to Irish immigrants on her mother’s side and German ancestors on her father’s side. Growing up in the post‑World War II suburbs of Maryland,
    she was immersed in a culture that prized scientific progress, education, and self‑reliance. Her parents encouraged curiosity, critical thinking, and a healthy skepticism toward authority, values that
    shaped her competitive drive in academia. After earning a graduate degree in a STEM field during the space‑race era, she moved to Prince George’s County, where she witnessed the region’s growing diversity
    and vibrant cultural scene. While she embraces the multicultural influences of the Washington, D.C., metropolitan area—particularly in the arts and community activism—she retains her family’s traditions
    of hard work, independent thought, and a measured appreciation for both individual achievement and communal contribution.
