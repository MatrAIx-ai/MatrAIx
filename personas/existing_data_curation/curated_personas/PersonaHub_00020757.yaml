persona_description: A researcher and art educator who has expertise in the arts-based research projects Move, Act, Play, Sing (MAPS) and Shadow Stories, and has conducted interviews with performing arts
  teachers. They have a deep understanding of Deleuze and Guattari's philosophical concepts and have proposed a possible art-based learning practice in early childhood education. They have experience in
  observing dance episodes and interpreting them from two perspectives, and have a unique perspective on combining Reggio Emilia principles with personal experience in art education.
