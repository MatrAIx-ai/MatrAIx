personas:
  professional: Karla Mcgraw, a budding explorer of textures and sounds at one year old, balances a fierce curiosity for cause‑and‑effect toys with a practical reliance on familiar routines, preferring
    spontaneous play over rigid schedules while displaying a relaxed, slightly disorganized approach to daily tasks.
  sports: Karla Mcgraw enjoys toddler swim classes at the community pool, they crawl eagerly after the bright orange ball used by the local Little Sprouts Gymnastics club, and they watch the Springfield
    Cardinals baseball team on weekend family outings, embracing a relaxed yet cooperative approach to movement.
  arts: Karla Mcgraw is entranced by the gentle melodies of lullaby singer Jewel, the vivid illustrations of Eric Carle’s books, and the playful antics of Sesame Street’s Elmo, and they often sway with
    a soft rattle while a parent reads aloud.
  travel: Karla Mcgraw loves short trips to the nearby botanical garden and visits to grandparents’ countryside cottage, favoring familiar routines but they brighten up with wide‑eyed wonder during a family
    beach vacation to Cancun, where the sea breeze becomes an exciting new scent.
  culinary: Karla Mcgraw savors warm sweet potato puree seasoned lightly with cinnamon, smears mashed banana on the high chair tray with a joyful mess, and they show a budding preference for the smooth
    texture of ripe avocado, though occasional picky bites of pureed peas test their patience.
  core: Karla Mcgraw, a one‑year‑old bundle of curiosity and gentle compassion, blends a practical love of routine with a delightfully disorganized play style, and they radiate a tender, cooperative spirit.
background:
