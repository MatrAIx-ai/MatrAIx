persona_description: A researcher in the field of taxonomy creation, particularly in the areas of hierarchy, relationships, and broader terms. This person is skilled in analyzing content to identify specific
  terms that are needed and has experience in creating bottom-up taxonomies. They are aware of the challenges in creating taxonomies, including the need to create terms based on broader terms and the potential
  for creating confusions in hierarchical relationships. They are familiar with the concept of the "parent-child" relationship and the importance of specific terms in a taxonomy. They are likely to be involved
  in creating taxonomies for various purposes, such as for organizational structures, industries, or occupations, and are skilled in identifying the appropriate broader terms for each term.
