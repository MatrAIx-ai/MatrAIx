  hobbies: '[''Fishing'', ''Hiking in coastal and forest trails'', ''Woodworking'', ''Photography of seascapes and forests'', ''Attending local art fairs and gallery openings'', ''Reading historical nonfiction'',
    ''Listening to folk music'', ''Playing acoustic guitar'', ''Cooking Greek cuisine'', ''Collecting vintage postcards'', ''Volunteering for community events'', ''Listening to podcasts on art and technology'']'
  career_goals: Bobby dreams of eventually owning a small, community‑focused delivery service that emphasizes sustainable practices and supports local businesses in Eastern Maine. He aims to mentor younger
    drivers, sharing his practical knowledge and fostering a cooperative work culture. While maintaining flexibility to enjoy his personal interests, he hopes to deepen his appreciation for art by curating
    occasional local art shows or workshops. He also plans to enhance his organizational skills through a short business management course, ensuring his future venture runs smoothly while allowing ample
    time for family and hobbies.
