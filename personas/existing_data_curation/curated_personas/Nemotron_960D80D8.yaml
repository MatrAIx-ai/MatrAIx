personas:
  professional: Bobby Katopodis, an experienced long‑haul truck driver who blends his knack for vehicle maintenance with a relaxed, improvisational route‑planning style, leverages basic logistics software
    to keep inventory on track, and they bring a friendly, empathetic touch to driver‑sales negotiations, preferring people‑first solutions over strict schedules.
  sports: Bobby Katopodis, an avid early‑morning fisherman and occasional member of a local rowing club, cheers for the New England Patriots, tracks the Boston Red Sox season religiously, and they follow
    the Portland Sea Dogs during spring training, while preferring solitary outdoor activities over organized team sports.
  arts: Bobby Katopodis, a visual storyteller who captures Maine’s rugged coastline and forested trails with his DSLR, showcases prints at the East Machias Art Fair, strums acoustic renditions of folk‑rock
    legends like Bob Dylan, Joan Baez, and Neil Young during small gatherings, and they collect vintage postcards from maritime ports to inspire new compositions.
  travel: Bobby Katopodis, a road‑trip enthusiast who has driven the scenic Route 1 to Acadia National Park, kayaked the waters of Bar Harbor, explored the historic fishing villages of Lunenburg, Nova Scotia,
    and dreams of a pilgrimage to the Greek islands for Easter, but they usually plan trips on a whim, using last‑minute deals and weaving travel into work routes to keep expenses low.
  culinary: Bobby Katopodis, a devoted home cook who prepares traditional moussaka, spanakopita, and avgolemono soup for family celebrations, frequents dockside shacks for fresh lobster rolls and clam bakes,
    seasons dishes with oregano, dill, and lemon zest, and they experiment with wood‑smoked cedar planks while juggling a modest collection of vintage cookware.
  core: Bobby Katopodis, a 50‑year‑old truck driver who balances a solitary love for sunrise fishing, photography, and folk‑rock guitar with a laid‑back, slightly disorganized lifestyle, while nurturing
    deep family ties and dreaming of a community‑focused, eco‑friendly delivery business.
background:
  cultural: Bobby is a second‑generation Greek‑American who grew up in a close‑knit working‑class community in East Machias, Maine. His grandparents emigrated from Greece and maintained traditions such
    as celebrating Easter with the Greek Orthodox Church and cooking family recipes, which he continues to honor. At the same time, he embodies the New England values of self‑reliance, modesty, and a deep
    respect for the natural environment, shaped by the region's logging, fishing, and maritime heritage. This blend of Greek familial warmth and rustic Maine pragmatism influences his outlook, social interactions,
    and appreciation for both cultural art forms and the rugged coastal landscape.
attributes:
  skills: '[''Long-haul truck driving'', ''Local route navigation'', ''Vehicle maintenance and troubleshooting'', ''Safety and compliance regulations'', ''Customer service and sales'', ''Negotiation and
