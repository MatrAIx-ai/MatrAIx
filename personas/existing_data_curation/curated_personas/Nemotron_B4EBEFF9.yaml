personas:
  professional: Brandon Watkins, a seasoned cafeteria operations specialist with over three decades of food-service experience, utilizes his methodical, routine-driven approach to maintain strict health-and-safety
    standards, mentor new hires, and pursue a shift-lead supervisory role reinforced by a forthcoming ServSafe certification.
  sports: Brandon Watkins, a loyal fan of the Boston Red Sox and Boston College Eagles baseball, watches games religiously on TV, participates in a senior fishing club on Narragansett Bay during early mornings,
    and keeps fit with daily walks and occasional league bowling at the local community center.
  arts: Brandon Watkins, an avid crossword and Sudoku solver, finds creative fulfillment in solving Sunday puzzles, listening to Glenn Miller’s swing era recordings, and attending maritime museum exhibitions
    featuring Winslow Homer’s seascapes, all of which complement his interest in World War II and early American maritime history.
  travel: Brandon Watkins, a meticulous planner who favors low-stress, culturally enriching trips, takes annual road trips to historic New England towns like Newport and Portland, dreams of visiting Normandy’s
    D-Day beaches, and books accommodations well in advance to keep itineraries predictable.
  culinary: Brandon Watkins, a practical home cook, prepares classic New England dishes such as clam chowder, baked cod with garden herbs, and hearty vegetable stews, and volunteers weekly at a neighborhood
    community kitchen where he crafts balanced meals for seniors using fresh produce from his garden.
  core: Brandon Watkins blends a steadfast love for routine, quiet fishing mornings, and meticulous food-service expertise into a life defined by reliable habits, modest savings, and a quiet, competitive
    edge.
background:
  cultural: Brandon grew up in East Providence, Rhode Island, in a working‑class, white New England family with roots in the region’s mid‑20th‑century manufacturing and maritime sectors. His upbringing
    emphasized reliability, modest living, and community involvement. He attended the local high school, worked part‑time in diner kitchens from a young age, and absorbed the practical, tradition‑oriented
    values of his neighborhood. These cultural influences shape his preference for routine, his methodical approach to work, and his modest, community‑focused hobbies.
attributes:
  skills: '["Food safety compliance", "Inventory management", "POS operation", "Customer service", "Staff scheduling", "Equipment maintenance", "Bar back support", "Training and mentorship", "Sanitation
