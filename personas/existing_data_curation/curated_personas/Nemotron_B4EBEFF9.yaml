  hobbies: '["Fishing", "Gardening", "Woodworking", "Crossword puzzles", "Sudoku", "Watching baseball", "Reading historical biographies", "Volunteering at a community kitchen", "Attending local historical
    society meetings", "Cooking traditional New England recipes"]'
  career_goals: Brandon aims to transition from his current attendant role to a shift‑lead or supervisory position within his cafeteria, where he can apply his organizational strengths to oversee staff
    scheduling and workflow. He plans to earn a ServSafe certification to formalize his food‑safety knowledge and to increase his eligibility for higher‑pay responsibilities. Long‑term, he hopes to leverage
    his experience to consult part‑time for local community‑center dining programs, helping them streamline operations while allowing him a steady, low‑stress schedule that supports his health and hobbies.
