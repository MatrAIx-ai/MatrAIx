  career_goals: Franklin’s ambitions are expressed through imaginative play. He often pretends to be a firefighter, a teacher or a truck driver, indicating a budding interest in roles that involve action
    and responsibility. He also strives for small milestones of independence, such as dressing himself and learning to ride a tricycle, which he describes as becoming a big kid. Though his goals are age‑appropriate,
    his competitive streak shows in his determination to master these tasks faster than his peers.
