personas:
  professional: Franklin Smith, a budding block architect who meticulously arranges LEGO bricks into orderly towers while periodically swapping pieces for spontaneous play, showcases early spatial reasoning
    and a competitive streak as they balance a love for predictable patterns with a relaxed, flexible attitude toward construction rules.
  sports: Franklin Smith, a spirited member of the playground’s Tiny Turtles soccer club who loves chasing a small orange ball at recess, eagerly supports the local junior baseball team the Little Lions,
    and channels their competitive energy into friendly races with peers, yet often prefers the freedom of unstructured tag games over regimented drills.
  arts: Franklin Smith, a lively finger‑painting enthusiast who spends rainy afternoons splashing bright colors on paper while humming the tunes of The Wiggles and occasionally mimicking the dance moves
    of Pixar’s Toy Story characters, finds artistic expression both structured (through following simple step‑by‑step painting guides) and liberating (through spontaneous doodles).
  travel: Franklin Smith, an adventurous toddler who enjoys family road trips to the nearby coastal aquarium and weekend visits to the city’s children’s museum, loves the predictability of packing the same
    stuffed giraffe each journey yet delights in the spontaneous excitement of discovering a new playground, and dreams of someday seeing the giant sand dunes of the Sahara Desert.
  culinary: Franklin Smith, a picky yet curious eater who adores buttery mac‑and‑cheese, crunchy chicken nuggets, and sweet strawberry slices, proudly helps stir batter for banana pancakes, but occasionally
    rebels against vegetables, preferring the comfort of familiar flavors while occasionally experimenting with honey‑drizzled carrots.
  core: Franklin Smith is a sociable, structure‑loving toddler who balances meticulous block building with spontaneous play, shows early competitive flair, worries about new sounds, and navigates daily
    routines with a blend of practicality and flexibility.
background:
  cultural: Franklin comes from a white family that lives in the small border town of Presidio, Texas. The community blends rural ranching traditions with a strong influence from nearby Hispanic culture,
    so he often hears Spanish greetings and sees colorful festivals that celebrate both Mexican and American customs. His family values self‑reliance, hard work and close‑knit neighborly ties, which are
    reflected in his preference for predictable daily routines and his comfort in social group settings.
