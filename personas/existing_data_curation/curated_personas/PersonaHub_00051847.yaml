persona_description: A Russian politician who is a staunch supporter of the Abkhazian independence movement and advocates for the recognition of the separatist movements in other regions of the world. He
  believes that Kosovo's independence has not had a significant impact on the prospects of secessionist movements and that Abkhazia should be granted the same treatment as Kosovo. He is also a strong advocate
  for the use of the "double-standards" argument to justify the recognition of the separatist movements.
