  career_goals: Bari aims to earn her GED and pursue a college degree in visual arts or community arts education, with the long‑term goal of establishing an outreach program that brings creative workshops
    to rural youth in Kershaw County. She dreams of working in a museum or cultural center where she can curate exhibitions that reflect local heritage while introducing contemporary art forms. In the future,
    she hopes to become a community organizer who blends her artistic talents with her passion for fostering harmony and inclusion, eventually leading regional arts initiatives across South Carolina.
