persona_description: A Puritan minister who emigrated to the New World in search of freedom of worship and to bring the Gospel to the native inhabitants of the New World. His life and work were marked by
  his desire to evangelize the Algonquin tribe and his efforts to learn the language. He was a pioneer in the field of Native American mission work and his work had a significant impact on the development
  of Christian missions in the New World.
