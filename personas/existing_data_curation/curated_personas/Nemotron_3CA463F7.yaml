  hobbies: '[''Visiting art galleries and museums'', ''Cooking and recipe experimentation'', ''Herb gardening'', ''Senior-center book club'', ''Live music and cultural events'', ''Photography'', ''Volunteering
    with cultural heritage committee'', ''Travel planning and memoir writing'']'
  career_goals: Ana aims to establish a community cultural hub in Vancouver, WA, that showcases Mexican art, music, and cuisine. She aspires to mentor a new generation of volunteers, develop a series of
    intergenerational cooking workshops, and compile a memoir of her family’s migration story paired with recipes. Additionally, she hopes to travel back to her hometown in Mexico to reconnect with relatives
    and document regional traditions.
