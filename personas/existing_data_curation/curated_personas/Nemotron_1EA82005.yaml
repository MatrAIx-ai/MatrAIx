personas:
  professional: A funeral service specialist and certified embalmer, Steve Kim blends meticulous restorative sculpting with abstract artistic vision, using their imaginative curiosity to craft personalized
    memorial installations while balancing the rigorous regulatory demands with a flexible, organized workflow, and they remain attentive to each compliance detail.
  sports: Steve Kim enjoys weekend hikes through the Woodlands, trains with the Woodlands Trail Runners club for half‑marathons, follows the Houston Astros and Rockets fervently, and participates in a local
    CrossFit box, and they balance their competitive streak with an appreciation for nature’s calm.
  arts: Steve Kim immerses themselves in abstract painting inspired by Mark Rothko and James Turrell, attends indie film screenings featuring David Lynch and Hong Sang‑soo, reads contemporary sci‑fi by
    Neal Stephenson, and practices calligraphy nights that echo the disciplined aesthetics of traditional brushwork, and they find that these rituals fuel their creative livelihood.
  travel: Steve Kim prefers meticulously planned trips that blend artistic inspiration with sustainability, having explored Kyoto’s temples, the Nordic fjords of Norway, and the desert art installations
    of Marfa, Texas, while dreaming of a future pilgrimage to Iceland’s geothermal sites and Finland’s eco‑architectural retreats, and they often craft travel journals that juxtapose sketches with reflective
    essays.
  culinary: Steve Kim delights in cooking fusion Korean‑Texan dishes such as kimchi‑topped smoked brisket tacos, gochujang‑glazed bulgogi burnt ends served with jalapeño‑infused coleslaw, and they proudly
    experiment with fermented radish kimchi and ancho chile rubs, showcasing a moderate to advanced cooking skill level.
  core: Steve Kim is a hyper‑creative embalmer who obsessively organizes their art studio, worries over every detail, occasionally over‑caffeinates to combat insomnia, and channels their competitive edge
    into crafting unforgettable memorials, and they continue to refine their craft each night.
background:
  cultural: Steve is a second‑generation Korean‑American whose parents immigrated to Texas in the 1980s. He grew up in a bilingual household, speaking both English and Korean, and was immersed in Korean
    cultural traditions such as Chuseok and Lunar New Year celebrations, while also embracing the Texan community's hospitality and outdoor lifestyle. His upbringing emphasized respect for elders, dedication
    to education, and a strong work ethic, values he carries into his professional life. Living in Katy, a diverse suburb of Houston, Steve maintains connections with the local Korean diaspora through church
    gatherings, cultural festivals, and a Korean language class, yet he also engages fully with the broader multicultural environment of the region. These dual cultural lenses inform his nuanced approach
    to funeral services, allowing him to honor both Korean ancestral rites and American memorial customs.
attributes:
  skills: '[''Embalming and restorative sculpting'', ''Crematory operation and equipment maintenance'', ''Human anatomy and forensic pathology'', ''Chemical preservation and eco‑friendly cremation techniques'',
    ''Funeral home management software (e.g., OS+)'', ''Regulatory compliance (state and OSHA)'', ''Client counseling and grief support'', ''Organizational logistics for funeral services'', ''Technical
    troubleshooting and equipment calibration'', ''Creative memorial design and artistic body presentation'']'
  hobbies: '[''Abstract painting and sketching'', ''Digital art and VR memorial design'', ''Reading science‑fiction and philosophy'', ''Bonsai cultivation'', ''Cooking fusion Korean‑Texan cuisine'', ''Hiking
    in the Woodlands'', ''Visiting local art galleries and indie film festivals'', ''Korean calligraphy practice'', ''Participating in community art workshops'']'
  career_goals: Steve aims to become a funeral home director and eventually open his own boutique mortuary that specializes in culturally sensitive, artistically driven memorial experiences. He plans to
    earn a certification in grief counseling and pursue a master's degree in funeral service management to blend his technical expertise with advanced leadership skills. Steve is also dedicated to pioneering
    sustainable practices, such as introducing biodegradable caskets and carbon‑neutral cremation methods, positioning his business as an industry innovator. He aspires to mentor the next generation of
    embalmers, publish a guide on the intersection of art, culture, and death, and establish a community outreach program that offers bereavement support to Asian‑American families in Greater Houston.
