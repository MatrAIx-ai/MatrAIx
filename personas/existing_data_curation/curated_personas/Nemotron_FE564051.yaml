  hobbies: '["Soccer", "Basketball", "Track and field", "Reading adventure/mystery novels", "LEGO building", "Scratch coding", "Keyboard music", "Singing in church choir", "Hip‑hop and gospel dancing",
    "Library reading buddy volunteer", "Gardening with family"]'
  career_goals: Nakisha aspires to become a STEM professional, envisioning a future as a robotics engineer or environmental scientist who designs technology to support sustainable farming in her community.
    She is also motivated to excel in athletics, hoping to earn a spot on her middle school soccer team and later pursue a scholarship. Additionally, she dreams of mentoring younger students through after‑school
    programs, sharing her love of coding and science. Her long‑term ambition combines practical problem solving with community impact, aiming to bridge technology and local agricultural needs.
