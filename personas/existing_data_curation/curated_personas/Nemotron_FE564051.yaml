personas:
  professional: Nakisha Smith is a budding junior programmer and storyteller who blends her love for building LEGO sets with creating interactive Scratch projects, channeling the discipline she learns from
    choir rehearsals into coding while they eagerly share their creations at family gatherings.
  sports: Nakisha Smith is a competitive middle school athlete who plays forward on the local youth soccer league, shoots guard on the Pike County Panthers basketball team, and sprints for the school track
    club, cheering for the Atlanta United soccer and Atlanta Hawks basketball franchises while they train five days a week to improve speed and stamina.
  arts: Nakisha Smith delights in creative expression, singing gospel and pop melodies in the church choir, learning basic keyboard chords, dancing to Beyoncé and Kirk Franklin beats, diving into the worlds
    of Percy Jackson and The Mysterious Benedict Society, and showcasing LEGO‑built dioramas inspired by their favorite artists like Lin‑Manuel Miranda’s Broadway ensembles.
  travel: Nakisha Smith loves weekend adventures, planning family road trips to historic Savannah for its cobblestone streets, camping in the Great Smoky Mountains for night hikes, and dreaming of a spring
    visit to Washington, D.C. to see the Lincoln Memorial and the Smithsonian, while they balance school schedules and a modest allowance to keep travel low‑cost.
  culinary: Nakisha Smith enjoys Southern kitchen aromas, helping grandparents simmer collard greens with smoked ham hocks, stir sweet tea with a hint of lemon, bake cornbread with cornmeal and a dash of
    honey, and they often experiment by adding shredded cheese to homemade macaroni, though they sometimes burn the edges of the cornbread when eager to taste it.
  core: Nakisha Smith is a curious, competitive ten‑year‑old who balances LEGO building, church choir verses, and a disciplined allowance‑saving habit while sprinting after soccer balls and dreaming of
    future tech projects.
background:
  cultural: Nakisha was raised in a close‑knit African‑American family in Williamson, a small community in Pike County, Georgia. Her family places a strong emphasis on faith, community, and intergenerational
    ties, with regular involvement in the local Baptist church where she participates in youth activities and choir. Southern culinary traditions, such as cooking collard greens, sweet tea, and cornbread
    with her grandparents, are integral to family gatherings. She is proud of African‑American history and celebrates cultural heritage through stories, music, and community events like Juneteenth and the
    local Black History Month programs at school. This cultural environment has fostered values of resilience, collective responsibility, and creative expression that shape her worldview.
attributes:
  skills: '["Reading comprehension", "Basic arithmetic and problem solving", "Scratch programming", "Scientific inquiry with hands‑on kits", "Leadership in group projects", "Organizational skills for classroom
