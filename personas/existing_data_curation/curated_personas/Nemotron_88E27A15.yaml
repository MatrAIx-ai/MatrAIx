  career_goals: Though retired, Roland’s ambition is to leave a concrete legacy. He plans to finish a memoir that weaves his family’s genealogy with the history of Pottsboro, and to continue his volunteer
    tax‑assistance program for low‑income seniors. He also hopes to mentor his grandchildren in practical life skills such as budgeting, basic carpentry, and garden maintenance, while preserving his health
    to remain active in the community for as long as possible.
