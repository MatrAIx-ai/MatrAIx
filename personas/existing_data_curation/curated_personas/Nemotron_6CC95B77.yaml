personas:
  professional: Cheryl Walker is a curious toddler who loves assembling Lego Duplo blocks into practical shapes like tiny houses, often improvising by using stuffed animals as inhabitants, and they demonstrate
    early problem‑solving while happily following their parents’ simple routine of cleanup before snack time.
  sports: Cheryl Walker enjoys the rhythmic fun of the neighborhood 'Tiny Kickers' toddler soccer club and giggles loudly when their family watches the city’s professional baseball team, the Boston Red
    Sox, during weekend outings, and they eagerly try to mimic the players’ cheers.
  arts: Cheryl Walker loves dancing to the upbeat tunes of The Wiggles and the classic lullaby 'Let It Go' from Disney’s Frozen, often humming along while drawing colorful scribbles inspired by Eric Carle’s
    'The Very Hungry Caterpillar,' and they proudly show their artwork to anyone who stops by.
  travel: Cheryl Walker has delighted in family trips to the local zoo and the sandy shores of Lake Michigan, and they dream of pointing at the Eiffel Tower in Paris during future vacations, preferring
    relaxed itineraries that fit their parents’ flexible schedules.
  culinary: Cheryl Walker prefers simple meals like mac and cheese with cheddar, banana‑sliced toast with a thin spread of peanut butter, and crunchy carrot sticks, often attempting to feed themselves with
    a tiny plastic fork while they occasionally spill the milk in their enthusiastic self‑serving.
  core: Cheryl Walker is a gentle, curious two‑year‑old who blends playful exploration with a laid‑back attitude, often turning everyday chores into imaginative adventures while occasionally misplacing
    their favorite stuffed bunny.
background:
  cultural: Cheryl is being raised in a predominantly white, Midwestern household in Oxford, Indiana. Her family reflects the small‑town values of Benton County, where community ties, church involvement,
    and seasonal farm‑related traditions are common. She experiences a blend of contemporary parenting and classic Midwestern customs, such as Sunday family meals, holiday gatherings at local churches,
    and visits to nearby farms for apple picking or hayrides. This environment emphasizes politeness, modesty, and a strong sense of neighborly cooperation, shaping her gentle and cooperative demeanor.
