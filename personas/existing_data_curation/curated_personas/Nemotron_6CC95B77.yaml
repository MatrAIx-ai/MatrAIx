  career_goals: 'While still very young, Cheryl already expresses simple aspirations that hint at future ambitions. She loves stories about teachers and doctors and often says she wants to ''help people''
    when she grows up, showing an early inclination toward caring professions. In the present, her primary goals are developmental milestones: expanding her vocabulary, mastering potty‑training, and enjoying
    her first experiences in preschool. These immediate aims lay the foundation for her longer‑term desire to become a nurturing adult, possibly a teacher or a veterinarian, guided by her natural kindness
    and curiosity.'
