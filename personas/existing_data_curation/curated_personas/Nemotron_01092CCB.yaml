  career_goals: Grace aims to complete her GED within the next year so she can qualify for entry‑level administrative or customer‑service positions that offer regular hours and a supportive environment.
    She is also exploring the possibility of turning her passion for cooking into a modest home‑based bakery, selling traditional Vietnamese pastries at local farmers’ markets. A long‑term ambition is to
    work in a role that allows her to help others manage stress—such as a peer‑support facilitator or a community health aide—while continuing to maintain a stable income for her family.
