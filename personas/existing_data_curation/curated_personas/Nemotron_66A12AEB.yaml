  hobbies: '[''Custom PC building'', ''Video game modding'', ''Competitive online gaming (FPS/RTS)'', ''Science fiction reading'', ''Mechanical sketching'', ''Fishing'', ''Hiking'', ''Woodworking (small
    projects)'']'
  career_goals: Brant aspires to turn his technical abilities into a sustainable career that balances independence with practical impact. He aims to obtain industry certifications such as CompTIA A+ for
    computer repair and ASE certification for automotive service, eventually opening his own small‑scale repair shop that offers both PC maintenance and mechanical services to local residents. He also hopes
    to build a modest online presence—through a YouTube channel or livestreams—showcasing DIY repair tutorials and custom PC builds, providing a platform for earning supplemental income while sharing his
    knowledge. While he acknowledges his anxiety about structured environments, he envisions a work life that allows flexible scheduling, hands‑on problem solving, and the opportunity to demonstrate his
    expertise on his own terms.
