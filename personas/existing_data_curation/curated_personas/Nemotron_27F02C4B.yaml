personas:
  professional: Jennifer Ritterdemonredont is a part-time data-analysis consultant who blends engineering project coordination experience with a knack for translating technical findings into clear reports,
    while preferring flexible, low-pressure gigs that let them mentor middle-school girls in STEM and stay curious about machine-learning basics.
  sports: Jennifer Ritterdemonredont is an avid hiker of the Wasatch foothills, a member of the Salt Lake City Trailblazers hiking club, follows the Utah Jazz and Real Salt Lake, and incorporates seasonal
    activities like cross-country skiing in winter and community yoga sessions in summer to stay fit.
  arts: Jennifer Ritterdemonredont cultivates creativity through pottery at a local studio, knits intricate scarves while listening to Norah Jones, and enjoys documentary films by Ken Burns and live performances
    by the Utah Symphony, often sharing insights with book-club friends.
  travel: Jennifer Ritterdemonredont favors weekend road trips to national parks such as Zion and Yellowstone, dreams of a summer adventure in Iceland to see the Northern Lights, and plans trips with a
    blend of spontaneity and detailed itineraries influenced by budget constraints and a love for photography.
  culinary: Jennifer Ritterdemonredont loves cooking with garden harvests, frequently prepares roasted beet and quinoa salads, zucchini lasagna, and seasonal soups, enjoys experimenting with Mediterranean
    spices like za'atar, but admits to occasionally over-indulging in store-bought pottery-inspired macaroni-and-cheese comfort meals.
  core: Jennifer Ritterdemonredont balances a restless curiosity with a laid-back lifestyle, juggling data-analysis consulting, pottery, and hiking while wrestling with worry-prone habits and a penchant
    for spontaneous creativity.
background:
  cultural: Jennifer was raised in a suburban Midwestern family that valued education, self‑reliance, and community involvement. After moving to South Jordan, Utah, she embraced the region’s outdoor lifestyle
    and close‑knit neighborhood culture. While she respects the predominant cultural norms of the area—such as strong family ties and a sense of civic responsibility—she maintains an independent outlook,
    blending her Midwestern upbringing with the progressive, tech‑oriented atmosphere of the Salt Lake metropolitan region.
