persona_description: A Canadian youth suicide prevention specialist who is passionate about addressing the unique challenges faced by Aboriginal youth in Canada. This person has a deep understanding of
  the mental health and wellness issues affecting Aboriginal youth, as well as the context in which suicide prevention efforts are implemented. They have a strong interest in community-based solutions and
  activities that contribute to improved mental health and wellness among Aboriginal youth, families, and communities. This person is committed to reducing Aboriginal youth suicide rates across Canada and
  has a unique perspective on the factors that contribute to suicide and the strategies that can be implemented to prevent it.
