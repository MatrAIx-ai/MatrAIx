personas:
  professional: Sanghee Chang, a seasoned educational guidance professional on Long Island, combines data‑driven counseling, psychometric assessment, and bilingual communication to craft highly structured,
    culturally responsive college‑admissions strategies for first‑generation students, while leading workshops that balance empathy with meticulous planning.
  sports: Sanghee Chang, an avid hiker on Long Island, routinely tackles the trails of Caumsett State Park with the Long Island Hiking Club, supplements yoga practice with weekend runs, stays loyal to the
    New York Yankees and New York Knicks, and occasionally joins a recreational co‑ed soccer league in the summer.
  arts: Sanghee Chang, a theater enthusiast, regularly attends productions at the Long Island Shakespeare Festival and the Stony Brook Stage Company, draws inspiration from playwrights like Arthur Miller
    and contemporary directors such as Lin‑Manuel Miranda, and unwinds listening to indie folk artists like Bon Iver and Korean indie band Hyukoh, which subtly guide their creative problem‑solving in counseling.
  travel: Sanghee Chang, a meticulous planner, prefers well‑researched trips that blend cultural immersion with low‑stress relaxation, has explored Tokyo and the historic towns of Tuscany, enjoys weekend
    getaways to the Hudson Valley, and is saving for a future solo trek through the Scottish Highlands while balancing a modest family budget.
  culinary: Sanghee Chang, an accomplished home cook, delights friends with homemade bibimbap topped with gochujang, tender braised galbi, and kimchi pancakes, skillfully balances bold flavors of sesame
    oil and garlic, and frequently experiments with fusion dishes like bulgogi tacos for potluck gatherings.
  core: Sanghee Chang, a 34‑year‑old bilingual counselor, blends meticulous organization with a sociable zest for community book clubs, yet battles intense anxiety that they soothe with yoga, puzzle‑solving,
    and perfectly timed potluck plans.
background:
  cultural: Sanghee is a second‑generation Korean‑American who grew up in a bilingual household in the New York metropolitan area. Her family emphasized academic excellence and respect for tradition, which
    cultivated her preference for structure, reliability, and practical outcomes. At the same time, her upbringing in a multicultural environment fostered a strong sense of community and sociability. She
    participates in Korean cultural festivals, volunteer work at a local Korean church, and maintains ties with extended family in Korea, all of which inform her culturally responsive counseling style and
    her dedication to supporting Asian‑American youth navigating both familial expectations and American educational systems.
attributes:
  skills: '[''Career counseling'', ''College admissions advising'', ''Psychometric testing'', ''Individualized education planning'', ''Group workshop facilitation'', ''Crisis intervention'', ''Bilingual
    counseling (Korean-English)'', ''Data-driven counseling'', ''Case documentation and record keeping'', ''Professional ethics and confidentiality'']'
  hobbies: '[''Community book club organization'', ''Korean‑English language exchange'', ''Yoga and mindfulness meditation'', ''Cooking Korean cuisine'', ''Hosting potluck gatherings'', ''Hiking Long Island
    trails'', ''Attending local theater'', ''Jigsaw puzzles'', ''Group board game nights'']'
  career_goals: Sanghee aims to become a licensed professional counselor and eventually lead the counseling department of a large school district in Long Island. She envisions creating a comprehensive,
    culturally tailored career readiness program for first‑generation Asian-American students that integrates mental‑health support. Long‑term, she hopes to open a private practice focused on career development
    and emotional well‑being for immigrant families, author a guidebook on navigating U.S. higher education for East Asian students, and serve as a speaker at national education conferences advocating for
    structured, compassionate counseling frameworks.
