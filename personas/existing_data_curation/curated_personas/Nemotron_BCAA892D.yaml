  career_goals: Although retired from formal employment, Ruda aims to deepen her role as a community steward. She hopes to become the lead volunteer coordinator at the local senior center, where she can
    design intergenerational programs that blend her love of storytelling, crafts, and gardening. Ruda also aspires to mentor younger volunteers, sharing her practical know‑how and calm, resilient approach
    to service. In the longer term, she would like to help establish a neighborhood garden that supplies fresh produce for local food‑bank drives, reinforcing her commitment to compassion and cooperation.
