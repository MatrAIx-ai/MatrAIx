  career_goals: Patricia aims to transition into a senior technical leadership role such as chief architect or principal engineer, where she can shape the strategic direction of software projects and champion
    interdisciplinary initiatives that fuse technology with visual art. She plans to mentor the next generation of developers, expand her contributions to open-source libraries for creative coding, and
    author a book on algorithmic art and ethical software design. In the longer term, she envisions establishing a boutique consultancy that provides innovative, artistically-driven tech solutions for nonprofit
    organizations in the Triangle region, while maintaining a balanced lifestyle that allows for continued personal creative practice.
