  hobbies: '[''Macro photography'', ''Hiking'', ''Cooking Mexican-inspired meals'', ''Yoga and mindfulness'', ''Reading contemporary fiction'', ''Small book club participation'', ''Volunteering at community
    art workshops'']'
  career_goals: Angelica aims to transition from clinical practice to a leadership role in oral health education and public health. Over the next five years she plans to earn a Master’s in Public Health
    focusing on health disparities in Hispanic communities, become a certified dental hygiene educator, and develop a community‑based preventive dental program in Kern County. She also hopes to publish
    research on culturally tailored oral health interventions and eventually open a small preventive care clinic that integrates aesthetic dental services with a strong emphasis on patient empowerment and
    evidence‑based care.
