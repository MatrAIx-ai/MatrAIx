  hobbies: '[''Gardening (native plants)'', ''Historical fiction reading'', ''Museum and gallery visits'', ''Bridge club'', ''Knitting blankets'', ''Watercolor painting'', ''Genealogy research'', ''Nature
    walks and birdwatching'', ''Jazz listening'', ''Cooking with garden herbs'']'
  career_goals: Although retired from formal employment, Shannon aims to deepen her engagement with the arts and community. She plans to complete a certificate in museum education at a local community college
    so she can become a volunteer docent at the Wake Forest Museum. She also hopes to win the county’s senior gardening competition, publish a series of articles on Southern folk art for the regional senior
    newsletter, and compile a family memoir that weaves together genealogy, photographs, and oral histories. A personal ambition is to travel to at least three major U.S. art museums over the next five
    years, using her new digital skills to document the visits.
