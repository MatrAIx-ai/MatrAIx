personas:
  professional: Shannon Wiggins, a retired community events coordinator turned volunteer docent, channels her methodical planning, horticultural know‑how, and love of Southern folk art into leading intergenerational
    workshops, overseeing senior garden initiatives, and curating museum tours for local visitors.
  sports: Shannon Wiggins, an avid walker who tracks migratory birds along nearby forest trails, follows the Durham Bulls with seasonal enthusiasm, and enjoys low‑impact community yoga classes designed
    for seniors, balances fitness with a love of nature.
  arts: Shannon Wiggins, a devoted lover of Southern folk art and watercolor landscapes, regularly attends gallery openings featuring works by Jacob Lawrence and Georgia O’Keeffe, curates notes for docent
    work at the Wake Forest Museum, and spends evenings listening to Billie Holiday and John Coltrane on her vintage turntable.
  travel: Shannon Wiggins, who meticulously plans her travel using spreadsheets and a digital scrapbook, aspires to visit the Metropolitan Museum of Art, the Art Institute of Chicago, and the Getty Center
    within five years while also enjoying weekend trips to the Biltmore Estate and nearby historic towns.
  culinary: Shannon Wiggins, an enthusiastic cook who harvests rosemary, sage, and lavender from her native‑plant garden to flavor herb‑infused chicken and dumplings, lavender shortbread, and shrimp and
    grits, often pairing meals with wildflower honey tea and occasionally experimenting with aromatic wildflower salads.
  core: Shannon Wiggins, a fiercely organized 76‑year‑old whose competitive bridge streak, skeptical eye for motives, and boundless curiosity fuse to shape a life of purposeful community service, artistic
    devotion, and meticulous self‑care.
background:
  cultural: Shannon grew up in the Piedmont region of North Carolina, where family, church, and community events shaped a Southern cultural identity rooted in hospitality, self‑reliance, and respect for
    tradition. Her upbringing in a small town exposed her to local folk art, Appalachian music, and the agricultural rhythms of Franklin County. While she values these regional customs—such as seasonal
    festivals, shared meals, and storytelling—her lifelong curiosity has led her to embrace broader artistic and intellectual influences, from modern art movements to digital media. As a widowed senior,
    she remains active in the local senior center and historical society, using her cultural heritage as a bridge to connect younger residents with the area’s history and artistic legacy.
