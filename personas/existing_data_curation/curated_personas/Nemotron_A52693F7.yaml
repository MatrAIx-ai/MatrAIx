personas:
  professional: Maria Suggs, a 22‑year‑old budding community program coordinator, leverages her curiosity and practical knack for organization to design inclusive wellness workshops, negotiate modest event
    budgets, and mediate group dynamics with a calm yet assertive style.
  sports: Maria Suggs channels her energetic spirit into weekly Zumba and dance classes, weekend hikes along Wisconsin’s lake trails, and cheering on the Milwaukee Bucks and Green Bay Packers, while holding
    a seasonal membership with the Madison Outdoor Adventure Club.
  arts: Maria Suggs nurtures her creative side by playing acoustic guitar at friends’ gatherings, curating playlists that feature Ed Sheeran, Joni Mitchell, and Snarky Puppy, and attending the Madison Community
    Theater’s quarterly productions, believing music and performance fuel her community‑building drive.
  travel: Maria Suggs prefers short, budget‑friendly road trips that blend nature and culture, such as weekend camping at Door County’s lighthouse trails, a music‑filled visit to Chicago’s blues clubs,
    and a long‑term dream of exploring Japan’s cherry‑blossom festivals once she saves enough.
  culinary: Maria Suggs delights in baking, routinely crafting rustic cranberry‑orange scones with locally sourced Wisconsin cheese, mastering flaky almond butter cookies, and experimenting with seasonal
    produce like fresh lake‑caught trout for dinner, though she occasionally forgets to set the timer and ends up with a charred crust.
  core: Maria Suggs is a socially vibrant yet anxiety‑prone 22‑year‑old who fuses her love for community events, baking, and guitar with a meticulous, budget‑conscious mindset, constantly juggling worry
    and optimism.
background:
  cultural: Maria grew up in Brooklyn, a small town in Dane County, Wisconsin, within a white, middle‑class Midwestern family that values community, self‑reliance, and neighborly support. Her upbringing
    included participation in school sports, the drama club, and the student council, exposing her early to teamwork and public speaking. The local culture—seasonal outdoor activities, county fairs, and
    a strong church and volunteer network—instilled in her a practical work ethic and an appreciation for communal traditions. These influences shape her blend of curiosity, practicality, and a desire to
    contribute positively to her community.
