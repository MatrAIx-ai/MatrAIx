  hobbies: '[''Zumba and dance classes'', ''Hiking on nearby trails'', ''Cooking and baking new recipes'', ''Reading self‑help and personal development books'', ''Volunteering at the community center'',
    ''Playing acoustic guitar for friends'', ''Attending local music festivals and farmers’ markets'']'
  career_goals: Maria aims to pursue a bachelor’s degree in communications or social work within the next two years, with the goal of securing a position as a community program coordinator for a local non‑profit.
    She is eager to blend her love for organizing events with a desire to support mental‑health initiatives, especially those addressing stress and anxiety among young adults. In the long term, she hopes
    to launch a community‑focused wellness hub that offers group fitness classes, peer‑support groups, and collaborative workspaces, creating a supportive environment for her peers while achieving financial
    independence.
