persona_description: A historian of law who specializes in the study of Roman law and its impact on the development of modern legal systems. She is particularly interested in the role of the Roman Republic
  and the institution of the Roman Senate in shaping the legal system of the Western world. Her research focuses on the conflict between the interests of the plebs and the patricians, and the role of the
  Roman Republic in creating the Twelve Tables and greater equality between the classes. She is also interested in the legal systems of other ancient civilizations and their impact on the development of
  modern legal systems.
