  hobbies: '[''Watercolor painting'', ''Gallery visits'', ''Book club participation'', ''Gardening'', ''Hiking'', ''Docent volunteering'', ''Digital photography'', ''Bridge'', ''Travel to art museums'']'
  career_goals: Even at 88, Andrea remains driven to expand her impact on the cultural life of Colorado Springs. She hopes to become a volunteer curator for the local history museum, establishing a senior‑led
    exhibition series that highlights overlooked artists. She aims to mentor younger community members through an intergenerational art mentorship program, publish a memoir that weaves together her personal
    history with the evolution of the region’s art scene, and organize annual art‑focused travel trips to major museums across the United States. Additionally, Andrea aspires to spearhead a preservation
    initiative for historic public murals in the city, ensuring they remain accessible to future generations.
