  career_goals: Roy aims to re‑enter the professional world within the next year, targeting a mid‑level business development or product management role at a tech‑savvy company in Los Angeles. He intends
    to leverage his analytical strengths and competitive drive to deliver revenue growth and market expansion. In the longer term, he aspires to launch a boutique consulting firm that helps small entertainment
    startups with strategic planning and digital marketing, and he is considering an MBA to deepen his leadership capabilities. He seeks positions that combine structured responsibility with room for innovative
    problem‑solving, reflecting his balance of curiosity and practicality.
