personas:
  professional: Lisa Lee is a retired home economist who volunteers at the local senior center, where they channel their organized, methodical mindset into weekly workshops on budgeting, sustainable gardening,
    and basic technology for fellow seniors.
  sports: Lisa Lee enjoys daily walks with the Golden Years Walking Club, practices gentle yoga at the community center, and cheers on the Houston Astros and the Texas Rangers from their living room, while
    they occasionally attend local high‑school baseball games at the nearby high school stadium.
  arts: Lisa Lee finds solace in quilting intricate blocks inspired by historical tapestries, singing in the Methodist choir, and immersing themselves in the novels of Philippa Gregory, while also listening
    to the folk ballads of Johnny Cash and admiring the desert paintings of Georgia O'Keeffe displayed in local galleries, and they cherish these artistic pursuits as a quiet source of joy.
  travel: Lisa Lee prefers relaxed, heritage‑focused trips, recalling past visits to Charleston’s historic district and Savannah’s riverfront, while dreaming of a low‑key pilgrimage to the San Antonio River
    Walk and a gentle weekend cruise to Galveston, and they always plan travel around senior discounts and limited mobility.
  culinary: Lisa Lee delights in cooking Southern comfort dishes such as chicken and dumplings, shrimp and grits, and pecan pie, using heirloom tomatoes from their garden to brighten summer salads, and
    they generously season meals with fresh basil, slow‑cooked pork, and a dash of hot sauce.
  core: Lisa Lee, an 87‑year‑old lifelong learner, blends old‑world practicality with quiet curiosity, balancing meticulous budgeting, garden stewardship, and a modest health worry while cherishing community,
    history, and the comforting flavors of Southern cuisine, and they approach each day with gentle determination.
background:
  cultural: 'Lisa grew up in a mid‑century white Texan family in the rural outskirts of Cleveland, San Jacinto County. Her upbringing was shaped by Southern values of hospitality, self‑reliance, and strong
    community ties, centered around the local Methodist church. The cultural atmosphere emphasized practicality—home economics, gardening, and modest living—while also encouraging curiosity about the wider
    world, reflected in her later interest in genealogy and historical reading. Her generation experienced the post‑war boom, the civil rights era, and the rise of digital technology, providing a blend
    of traditional customs and an openness to new ideas. This background informs her balanced approach to life: honoring time‑tested methods while quietly exploring modern tools and knowledge.'
