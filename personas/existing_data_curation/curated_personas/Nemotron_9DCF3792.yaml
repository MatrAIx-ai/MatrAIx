  career_goals: Although retired, Lisa’s ambitions focus on personal fulfillment and community contribution. She aims to preserve her health and independence through regular walks, yoga, and balanced nutrition.
    She is determined to master new digital tools—such as video editing and voice‑activated assistants—to document her family’s stories and create a memoir that will be shared with grandchildren. Lisa hopes
    to lead a small senior‑learning circle at the local library, facilitating workshops on budgeting, gardening, and basic tech skills for her peers. Additionally, she aspires to advocate for better senior
    healthcare services in San Jacinto County by partnering with local officials and senior organizations.
