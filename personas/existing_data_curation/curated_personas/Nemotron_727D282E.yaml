  hobbies: '[''Reading non-fiction'', ''Puzzle solving (chess, Sudoku)'', ''Woodworking'', ''Model building'', ''Cooking Mexican cuisine'', ''Indoor herb gardening'', ''Meditation and yoga'', ''Nature walks'',
    ''Coding personal finance tools'', ''Listening to classical and Mexican folk music'']'
  career_goals: Rolando aims to leverage his disciplined, organized approach and his curiosity for practical innovation by establishing a boutique consulting firm that helps small Mexican‑American businesses
    streamline operations and improve financial performance. Over the next five years he plans to earn a Project Management Professional (PMP) certification, deepen his data analytics skills—including Python
    and Tableau—publish a guide on sustainable business practices, and achieve financial independence that allows him to support his family's long‑term stability while maintaining a low‑key, solitary lifestyle.
    He also aspires to mentor emerging entrepreneurs from his community, emphasizing pragmatic strategies and resilience.
