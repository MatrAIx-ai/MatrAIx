  career_goals: Kandy dreams of becoming a marine biologist or wildlife veterinarian so she can explore and protect animals she loves. She also imagines herself as an illustrator, creating comic books and
    fantasy art. Space fascinates her, and she occasionally talks about wanting to be an astronaut. In the short term, she aims to win her school science fair with a creative experiment, earn a spot on
    the varsity soccer team, and showcase her artwork in the school art show. Long-term, she hopes to blend her love for science and art, possibly pursuing a career in scientific illustration or environmental
    design.
