personas:
  professional: Kandy Mcdonald is an aspiring young illustrator who blends their love of animals, mythical creatures, and vibrant landscapes into detailed sketches that they proudly display at school art
    fairs, using their curious mind, organized workflow, and competitive spirit to constantly improve and outshine peers.
  sports: Kandy Mcdonald plays forward for the Little Lions U-10 soccer team, they train twice weekly at the community field, cheer for Manchester United and local rival Red Rovers, approach each match
    with a competitive edge, and love the rush of scoring a goal in front of their teammates.
  arts: Kandy Mcdonald draws inspiration from Studio Ghibli’s Hayao Miyazaki, Mary GrandPré’s whimsical book illustrations, and Vincent van Gogh’s vivid color palettes, they often recreate magical scenes
    in their sketchbook while listening to pop hits, and proudly showcase their art during family museum visits.
  travel: Kandy Mcdonald has explored the Monterey Bay Aquarium, visited the Smithsonian National Air and Space Museum in Washington, D.C., taken a family road trip to the Grand Canyon, and dreams of snorkeling
    at the Great Barrier Reef, they always bring a sketchbook to capture new sights.
  culinary: Kandy Mcdonald loves pepperoni pizza, they build colorful fruit kebabs with strawberries, blueberries, and pineapple, experiment with edible gelatin slime flavored with orange juice, and often
    end up with a sticky kitchen while giggling at the mess.
  core: Kandy Mcdonald is a curious, competitive nine‑year‑old who blends artistic imagination with scientific tinkering, balances savings with splurges, battles seasonal allergies, dominates the soccer
    field, and dreams big about travel and tasty experiments, and they never miss a chance to add a new drawing to their ever‑growing sketchbook.
background:
  cultural: Kandy is a White child growing up in Cordova, Tennessee, a suburb of Memphis in Shelby County. Her family embodies Southern hospitality, often gathering for church events, community festivals,
    and family barbecues featuring local foods like pulled pork and biscuits. She attends a public elementary school where she participates in after‑school programs such as art club, science club, and soccer.
    The community places value on manners, respect for elders, and service, reflected in her involvement in Sunday school and occasional volunteer activities. While she enjoys regional country music and
    occasional line‑dance gatherings, she is also exposed to mainstream media and digital content, giving her a blend of traditional Southern influences and modern, global ideas.
