  career_goals: Joshua aims to remain a dependable presence for his employer while preparing for a phased retirement. In the next few years he hopes to transition into a senior courier or mentor role, training
    new hires and sharing his knowledge of efficient routing. He is also interested in taking on small supervisory responsibilities, such as coordinating daily shift assignments for a team of couriers.
    Long‑term, he envisions using his savings to start a modest side business offering local moving assistance or handyman services, allowing him to stay active and connected to his community without the
    pressures of a full‑time schedule.
