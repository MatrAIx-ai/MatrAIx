persona_description: A historian who specializes in the study of colonial history, particularly the impact of European colonization on indigenous cultures and the economic systems of the regions affected.
  He is particularly interested in the role of land tenure and the relationship between land use and economic development. His research interests include, but are not limited to, the impact of European
  colonization on indigenous cultures, the economic systems of the regions affected, and the relationship between land use and economic development. He is also interested in the history of colonialism and
  its impact on the world today.
