persona_description: A researcher who conducts surveys and studies to understand the impact of innovative technological services on the financial performance of deposit-taking savings and credit cooperatives
  in Nairobi City County, Kenya. The persona is interested in the implementation and diffusion of innovations in the financial sector, and is particularly focused on the relationship between financial performance
  and technological advancements. The persona is likely to be knowledgeable about Sacco Societies Regulatory Authority, mobile banking services, internet banking, credit cards, and electronic fund transfer.
  They are likely to be familiar with statistical analysis and research methodology, and have a strong interest in the development and implementation of policies to promote innovation in the financial sector.
