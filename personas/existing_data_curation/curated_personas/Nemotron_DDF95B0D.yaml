  hobbies: '[ ''Gardening'', ''Traditional Vietnamese cooking'', ''Listening to music (Vietnamese and classical)'', ''Reading biographies and poetry'', ''Playing Mahjong/board games'', ''Visiting art exhibitions
    and museums'', ''Recording oral histories for family'' ]'
  career_goals: To mentor younger members of the Vietnamese community in Fresno about cultural traditions and resilience; to develop and lead small intergenerational art and storytelling workshops that
    foster empathy and cultural exchange; to advocate for senior mental health resources, drawing from his own emotional experiences, and to contribute to preserving family histories through photo archiving
    and oral histories; to maintain personal well‑being by practicing mindfulness and staying socially connected in intimate group settings.
