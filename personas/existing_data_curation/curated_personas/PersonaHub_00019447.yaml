persona_description: An investor who is interested in absolute return strategies as an investment objective or a strategy. This person is willing to invest their capital over a longer period of time to
  generate real profits over a market cycle regardless of market conditions. They are concerned about their own objectives for total return over a period and tolerance for loss and drawdowns. This person
  is not concerned about what benchmark, allocation, or index provides, but instead seeks to generate positive returns on investment over a market cycle of both bull and bear market periods irrespective
  of the direction of stock, commodity, or bond markets. This person is skilled in active management of risk and exposure to markets, and they believe in price-based methods for creating absolute returns.
