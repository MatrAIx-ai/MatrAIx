  career_goals: Roberta aims to transition from floor sales to a store manager role within the next two years, using her organizational balance and competitive drive to lead a team to top regional performance.
    After establishing herself as a manager, she plans to become a regional trainer or consultant, sharing her extensive retail knowledge and art‑focused visual merchandising techniques with multiple locations.
    Simultaneously, she harbors an entrepreneurial ambition to open a boutique that showcases local Alabama artisans, merging her love for art, community, and curated retail experiences.
