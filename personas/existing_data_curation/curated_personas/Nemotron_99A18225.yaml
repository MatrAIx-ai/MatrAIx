personas:
  professional: Roberta Qazi, a veteran retail strategist with a flair for visual merchandising, blends their calm, competitive edge and deep community ties to transform boutique floors into art‑inspired
    shopping experiences, consistently exceeding sales targets through savvy relationship management and persuasive upselling.
  sports: Roberta Qazi, a devoted fan of Alabama Crimson Tide football and Birmingham Barons baseball, joins a local pick‑leball league each spring, attends early‑morning yoga sessions, and walks the Birmingham
    Riverwalk after games, balancing competitive enthusiasm with low‑impact fitness routines.
  arts: Roberta Qazi immerses themselves in Birmingham’s vibrant art scene, curating boutique displays inspired by Shepard Fairey’s murals and Kerry James Marshall’s brushwork, while playing piano at weekly
    jazz nights featuring Herbie Hancock and B.B. King covers, and mentoring youth in community theater alongside local director Jane Tate.
  travel: Roberta Qazi favors short cultural getaways, planning weekend trips to New Orleans for its historic French‑Quarter murals, Austin for the ‘Keep Austin Weird’ street‑art scene, and dreaming of
    a spring excursion to Berlin’s modern art museums, always booking boutique bed‑and‑breakfasts that showcase local flavor.
  culinary: Roberta Qazi delights in Southern comfort foods such as smoked pork ribs, cheese‑laden grits, and fried green tomatoes, they also experiment with Korean kimchi‑fried rice and Mediterranean roasted
    eggplant with sumac, and maintain an intermediate cooking skill level honed through weekly classes, often ending the week with avocado toast and poached eggs for brunch.
  core: Roberta Qazi is a calm, competitively‑driven retail veteran who fuses Southern hospitality with a global art sensibility, constantly curating experiences—from boutique windows to community theater
    stages—while never missing a chance to mentor, critique, or savor a perfectly smoked rib.
background:
  cultural: Roberta was raised in Birmingham, Alabama, deep within the Southern United States, where she absorbed the region's traditions of hospitality, community gatherings, and a strong sense of local
    identity. Her family background is rooted in a working‑class, white Southern community that values church involvement, regional cuisine such as barbecue and grits, and seasonal festivals. Despite this
    grounding, her surname, Qazi, reflects a multigenerational family connection that introduced her early on to cultural diversity, fostering an openness to different perspectives. Throughout her life,
    she has engaged with Birmingham's evolving cultural landscape, from the civil‑rights legacy to the contemporary arts scene, shaping a worldview that respects tradition while embracing new ideas and
    global influences.
