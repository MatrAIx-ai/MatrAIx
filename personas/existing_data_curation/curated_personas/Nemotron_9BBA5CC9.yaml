  career_goals: Kathy aims to transition into a senior advisory role where she can shape strategic technology initiatives for her county’s public services while championing digital inclusion programs for
    seniors and underserved communities. She plans to obtain a Project Management Professional (PMP) certification within the next year and to lead a county‑wide cybersecurity awareness campaign. Over the
    next five years, she hopes to mentor emerging IT talent, establish a community tech‑literacy workshop series, and eventually move into a part‑time consulting position focused on technology integration
    for nonprofit organizations.
