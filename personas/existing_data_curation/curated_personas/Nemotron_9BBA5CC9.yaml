personas:
  professional: Kathy Richardson is a seasoned network and systems administrator who translates her love of order into robust Windows Server and Linux environments, scripting automation in Python and PowerShell,
    and now channels her compassionate, cooperative nature into senior advisory work that shapes county-wide technology strategy and digital inclusion initiatives.
  sports: Kathy Richardson enjoys weekend hikes through Osage Hills State Park, regularly follows the Kansas City Chiefs and Kansas City Royals scores, and participates in a local walking club that meets
    every Saturday, blending low‑impact fitness with community spirit.
  arts: Kathy Richardson finds creative fulfillment in quilting intricate patterns inspired by Grant Wood and woodworking small furniture pieces while they devour contemporary fiction by Sally Rooney and
    historical memoirs by Maya Angelou, and attend the regional community theatre’s productions of "Our Town" and folk concerts featuring Gillian Welch.
  travel: Kathy Richardson prefers thoughtfully planned road trips to Midwestern gems like Badlands National Park and historic Galena, Illinois, while dreaming of a guided bird‑watching tour of the Scottish
    Highlands, balancing adventure with a comfortable, budget‑conscious itinerary.
  culinary: Kathy Richardson loves cooking classic Midwestern fare such as chicken pot pie, pan‑fried catfish, and apple crumble, often incorporating fresh heirloom tomatoes and basil from their garden
    into a summer caprese salad, and they consider themselves an adept home cook who enjoys experimenting with smoked paprika in Kansas City‑style BBQ ribs.
  core: Kathy Richardson is a meticulously organized tech mentor who balances a love of structure with a quirky habit of hoarding vintage quilting fabrics and occasionally forgetting to water the garden
    during a busy week.
background:
  cultural: Kathy was raised in a small town in Oklahoma and embodies Midwestern values such as self‑reliance, modesty, and a strong sense of community. Her family’s traditions include church gatherings,
    family reunions, and local potlucks that celebrate regional cuisine. She is an active member of her local Protestant congregation, where she volunteers in outreach programs. While she identifies as
    white, she has a deep appreciation for the cultural heritage of Osage County, often participating in community events that honor the area’s Native American history and supporting local arts. These experiences
    shape her compassionate approach to both her professional work and personal life.
