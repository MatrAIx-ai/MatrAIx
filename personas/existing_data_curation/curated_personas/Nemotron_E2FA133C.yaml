personas:
  professional: An experienced diesel technician, Kathy Sobieski blends over a decade of hands‑on mastery diagnosing Cummins Insite and Detroit Diesel Link systems with a methodical, process‑driven approach
    that still flexes to improvise when parts are scarce, while mentoring junior mechanics and steering toward a foreman role and a future mobile diesel‑service business.
  sports: A dedicated outdoors enthusiast, Kathy Sobieski hunts whitetail deer in the Smoky Mountains, fishes for trout in local streams, hikes rugged trails, and roots for the Tennessee Volunteers football
    and Nashville Predators while participating in a regional hunting club that meets each spring.
  arts: Enthralled by country‑music culture, Kathy Sobieski frequents line‑dancing nights playing Dolly Parton and Johnny Cash, attends live shows by Carrie Underwood and Sturgill Simpson, and curates a
    collection of vintage Americana folk art prints that brighten their workshop, using music as a rhythm for their mechanical projects.
  travel: Kathy Sobieski favors rugged road‑trip adventures, having driven the Blue Ridge Parkway, hunted in the Texas Hill Country, fished the Flathead River in Montana, and now dreams of a cross‑country
    ride to remote Alaska to test their mobile diesel‑service concept.
  culinary: A hearty food lover, Kathy Sobieski savors smoked brisket glazed with a rub of smoked paprika, brown sugar, and cumin, cooks chili con carne loaded with black beans, jalapeños, and cornbread,
    and expertly fries catfish in buttermilk‑cornmeal batter, often pairing meals with a cold craft IPA.
  core: Kathy Sobieski is a fiercely competitive, structure‑loving diesel mechanic who secretly hoards vintage farm parts, trades sleep for wrench time, and can’t resist a lively line‑dance after a long
    day under the hood.
background:
  cultural: Kathy’s family traces its roots to Polish immigrants who settled in the Appalachian region of Tennessee in the early 20th century. Growing up in Clinton, she absorbed the Southern‑Appalachian
    values of self‑reliance, hard work, and close‑knit community ties while also preserving Polish traditions such as holiday pierogi making and Catholic observances. This blend of Eastern European heritage
    and Southern culture informs her practical outlook, love of hands‑on craftsmanship, and a strong sense of loyalty to her local community.
attributes:
  skills: '[''Diesel engine diagnostics'', ''Heavy-duty brake system repair'', ''Hydraulic system maintenance'', ''Electrical wiring and troubleshooting'', ''Welding and metal fabrication'', ''Preventive
    maintenance scheduling'', ''Use of diagnostic software (e.g., Cummins Insite, Detroit Diesel Diagnostic Link)'', ''EPA emissions compliance'', ''Parts inventory management'', ''Mentoring junior mechanics'']'
  hobbies: '[''Restoring vintage farm equipment'', ''Motorcycle maintenance and customization'', ''Hunting and fishing trips in the Smoky Mountains'', ''Country music concerts and line‑dancing events'',
    ''DIY woodworking projects (building sheds, pallet furniture)'', ''Participating in local 4×4 off‑road clubs'', ''Camping and hiking in nearby state parks'', ''Gardening in her backyard'']'
  career_goals: Kathy aims to earn the ASE Master Diesel Technician certification within the next two years and leverage that credential to move into a foreman or shop manager role where she can shape maintenance
    processes and mentor a larger team. Long‑term, she dreams of launching a mobile diesel‑service business that offers on‑site repairs and preventive care to rural fleets, giving her the flexibility to
    set her own schedule while still providing structured, reliable service. She is also exploring emerging technologies such as biodiesel and hybrid diesel powertrains, hoping to become an early adopter
    and integrate greener solutions into her work.
