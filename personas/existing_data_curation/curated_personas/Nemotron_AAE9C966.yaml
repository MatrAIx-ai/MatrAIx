  career_goals: Although retired, Darren aims to stay intellectually active by volunteering as a mentor for local STEM outreach initiatives and serving on advisory boards for senior technology workshops.
    He plans to author a memoir that weaves together his professional experiences with reflections on curiosity, practicality, and lifelong learning. Darren also aspires to contribute to community sustainability
    projects, such as designing solar‑powered garden systems for senior housing, while maintaining his health through structured routines that help manage his tendency toward worry and stress.
