persona_description: A historian or legal scholar who specializes in the study of the US Constitution and its impact on slavery, particularly focusing on the debates over the issue during the 1787 Constitution
  Convention. They are knowledgeable about the historical context, the significance of the Constitution's provisions related to slavery, and the role of anti-slavery politicians such as Abraham Lincoln.
  They are interested in the complex and divisive nature of the issue, and the impact of the Constitution's omission of a clear prohibition against slavery on the future of the union.
