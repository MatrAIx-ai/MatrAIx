persona_description: A theoretical physicist with a keen interest in the foundations of physics and the construction of physical laws. They are particularly fascinated by the possibility of constructing
  a physically universal computer and the implications it has for distinguishing between different physical laws. They are also interested in the concept of physical universality in Janzing's sense and
  have studied the related ideas of constructor theory and physical universality. They are likely to be interested in the practical implications of constructing a physically universal computer and the potential
  for it to be used to solve problems in the real world.
