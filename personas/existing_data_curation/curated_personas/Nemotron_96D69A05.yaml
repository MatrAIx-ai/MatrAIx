  hobbies: '["Gardening","Cooking Puerto Rican cuisine","Bridge (card game)","Mahjong","Listening to salsa and bolero music","Walking in local parks","Knitting","Volunteering at food banks","Attending cultural
    festivals","Learning basic tablet usage"]'
  career_goals: At 93, Angela’s primary ambition is to leave a lasting legacy for her Puerto Rican community in Rochester by establishing a scholarship fund for students interested in business studies and
    by documenting family stories in a memoir. She aims to continue mentoring seniors and young entrepreneurs, helping them navigate financial decisions with her practical expertise. Though no longer in
    the workforce, she remains eager to support local cultural festivals and to foster harmonious collaboration among community organizations.
