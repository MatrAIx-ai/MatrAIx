persona_description: Nathan Rosscoe Pound, a prominent figure in the field of legal studies and jurisprudence, was a botanist, ecologist, attorney, judge, teacher, scholar, and legal theorist. He began
  his career at the University of Nebraska, where he received his doctorate in botany before switching to law. From 1899 to 1907, Pound taught law at the university. Later as dean of Harvard Law School
  (1916-1936), he greatly influenced the training of American lawyers through his lectures and writing. Pound was perhaps the chief U.S. advocate of sociological jurisprudence, which stresses that law is
  affected by social conditions, and his ideas influenced the New Deal programs of Franklin D. Roosevelt.
