  career_goals: At this stage, Vernie does not have formal career goals. His immediate ambition is to explore his environment, develop his language and motor abilities, and become more independent in self‑care
    tasks such as feeding and dressing. His caregivers support a future where he can pursue interests in helping others and community involvement.
