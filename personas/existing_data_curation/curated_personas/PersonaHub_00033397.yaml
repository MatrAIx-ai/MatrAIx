persona_description: A person who is deeply concerned about the rights and treatment of Gurkhas, especially after the British government's discriminatory policies. They have been campaigning for equal treatment
  for Gurkhas in the UK and have been successful in securing compensation, settlement rights, and pensions for Gurkha veterans. However, they are still fighting for complete equality between Gurkha and
  British pensions. They are also aware of the financial impact of Gurkhas immigrating to the UK and the potential effects on the Nepali economy. They are also aware of the rift within GAESO and the actions
  taken by the establishment.
