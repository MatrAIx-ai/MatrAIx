personas:
  professional: Louisanne Harris, a seasoned groundskeeper with a budding horticulture certification path, blends meticulous project planning, safety‑first standards, and a vivid artistic sense to design
    and execute small‑scale urban gardens that feel like living canvases for clients across Atlanta.
  sports: Louisanne Harris enjoys weekend trail runs with the Atlanta Trail Runners club, plays recreational basketball in a local park league, follows the Atlanta Hawks and Falcons with moderate enthusiasm,
    and treats each session as a chance to clear the mind after extensive design work.
  arts: Louisanne Harris immerses themselves in abstract painting inspired by Mark Rothko, creates digital illustrations echoing James White’s bold palettes, captures bark and graffiti textures on film,
    and regularly attends jazz performances by Kamasi Washington and spoken‑word nights featuring Saul Williams.
  travel: Louisanne Harris prefers meticulously planned weekend getaways, often biking to nearby Asheville for mountain vistas, cherishes annual trips to Savannah’s historic squares, and dreams of a cultural
    immersion tour of Ethiopia to study indigenous coffee rituals.
  culinary: Louisanne Harris loves preparing seasonal vegetable medleys like roasted beet and kale salads, perfects Ethiopian‑style coffee with a hand‑ground grinder and spices such as berbere and cardamom,
    and occasionally indulges in a hearty shakshuka brunch while experimenting with fusion twists.
  core: Louisanne Harris is an organized, art‑driven groundskeeper who balances precision in landscaping with spontaneous bursts of color, budget‑savvy yet occasionally splurges on creative supplies, and
    cultivates harmony between nature and urban life.
background:
  cultural: Louisanne is a Black American of Ethiopian descent, raised in the culturally vibrant neighborhoods of DeKalb County, Atlanta. His family maintains ties to Ethiopian traditions through language
    (Amharic), cuisine, and the annual coffee ceremony, while also embracing the broader African‑American community’s music, church gatherings, and civic activism. Growing up in a city known for its historic
    civil‑rights legacy and a flourishing arts scene, he blends these influences into a personal identity that values both collective harmony and individual creative expression.
attributes:
  skills: '[''plant identification'', ''soil preparation'', ''mower and equipment operation'', ''irrigation system maintenance'', ''hand‑drawn landscape sketching'', ''basic CAD drafting'', ''project scheduling'',
    ''budget estimation'', ''OSHA safety compliance'', ''client communication'', ''team coordination'', ''creative composition and colour theory'']'
  hobbies: '[''abstract painting'', ''digital illustration'', ''nature photography'', ''reading speculative fiction'', ''jazz listening'', ''spoken‑word events'', ''home vegetable gardening'', ''Ethiopian
    coffee ceremony'', ''community tree‑planting'', ''urban hiking'']'
  career_goals: Louisanne aims to transition from hands‑on groundskeeping to a supervisory role within the next two years, pursuing a certified horticulturist credential and completing his GED. He plans
    to enroll in a community college landscape design program to deepen his technical design skills and eventually launch a boutique urban‑garden studio focused on small‑scale, community‑driven projects
    in Atlanta. A long‑term ambition is to partner with the city’s Parks and Recreation department to develop inclusive green spaces that blend functional landscaping with public art installations, reflecting
    both African‑American and Ethiopian cultural motifs.
