  as well as the new begomovirus isolate detected in the Kathaupahadi, Madhya Pradesh, India. They may also be interested in the phylogenetic relationships of the new virus isolate with other begomoviruses
  and the proposed name for the new virus, Jatropha yellow mosaic India virus (JYMIV).
