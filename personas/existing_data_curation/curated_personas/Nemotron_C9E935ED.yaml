  career_goals: Although retired, Janice is driven to apply her expertise to enhance her hometown. She aims to launch a micro‑grant program for budding entrepreneurs in Marshville, mentor senior volunteers,
    and document the economic history of Union County through a series of articles. A personal ambition is to complete a memoir that intertwines her family’s genealogy with the region’s cultural evolution,
    and to secure a regular column in the local newspaper that offers practical financial advice for seniors.
