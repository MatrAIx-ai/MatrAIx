personas:
  professional: Janice Moulton, a retired business administrator with three decades of corporate accounting experience, now leverages her methodical budgeting, grant-writing, and spreadsheet mastery to
    launch a micro-grant program for budding entrepreneurs in Marshville, mentor senior volunteers, and pen a series of articles on Union County’s economic history.
  sports: Janice Moulton, a devoted birdwatching walker, attends the Marshville Senior Walking Club, follows the UNC Tar Heels basketball and Charlotte Hornets NBA teams on television, participates as a
    scorekeeper for the town's senior softball league, and enjoys seasonal local 5k runs that double as bird-identification outings.
  arts: Janice Moulton devotes her evenings to reading historical fiction by Margaret Mitchell and Southern memoirs by Eudora Welty, takes notes for her upcoming memoir, frequently listens to Patsy Cline's
    classic country ballads and B.B. King's blues, and attends the community theater's production of 'Our Town' whenever it tours the county.
  travel: Janice Moulton prefers meticulously planned weekend road trips to historic destinations such as Williamsburg, Virginia and Savannah, Georgia, staying in cozy bed-and-breakfasts with garden tours,
    while dreaming of a guided pilgrimage to the gardens of Versailles and relying on Amtrak for occasional longer journeys.
  culinary: Janice Moulton, an heirloom gardener, delights in preparing roasted heirloom tomato and basil soup, pickled okra, Southern collard greens with smoked ham hock, and homemade biscuits using fresh
    rosemary and thyme harvested from her garden, often sharing her dishes at the community kitchen.
  core: Janice Moulton is a meticulous, curiosity-driven senior who blends financial expertise, genealogy, and gardening into a purpose-filled retirement while managing anxiety with structured routines
    and occasional over-organization.
background:
  cultural: Janice grew up in a close‑knit white Southern community in Union County, North Carolina, where church attendance, family gatherings, and a strong sense of self‑reliance were core values. The
    region’s agricultural heritage and the traditions of hospitality shaped her practical outlook, while the civil‑rights era of her youth fostered an awareness of social change. She maintains ties to Methodist
    congregational life, participates in local heritage festivals, and cherishes the rhythms of small‑town life, balancing respect for tradition with an openness to new ideas.
