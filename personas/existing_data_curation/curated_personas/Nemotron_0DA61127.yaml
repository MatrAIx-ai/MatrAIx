  career_goals: As he approaches retirement, Robert aims to transition into a supervisory role where he can mentor younger workers and oversee safety programs on construction sites. He hopes to obtain a
    certified safety officer credential and eventually start a small consulting business offering safety audits and project planning for local contractors. While he values a steady routine, he also wants
    to secure a comfortable financial future for his family and possibly pass on his trade knowledge to his son.
