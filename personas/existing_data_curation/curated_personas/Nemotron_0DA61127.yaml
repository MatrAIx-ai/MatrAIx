personas:
  professional: Robert Wojcik is a veteran construction supervisor with over three decades of hands‑on experience in concrete formwork, framing, and site safety, whose methodical, routine‑driven mindset
    and assertive communication skills make them the go‑to mentor for crews and a natural candidate for the certified safety officer role they aim to achieve.
  sports: Robert Wojcik is an avid fan of the Buffalo Bills and a seasonal member of the Lake Ontario Anglers Association, spending winter weekends ice‑fishing, summer afternoons gardening, and joining
    a community bowling league, while they also cheer on the Buffalo Sabres during the NHL season.
  arts: Robert Wojcik enjoys classic films such as Casablanca and The Godfather, listens to Frank Sinatra and traditional polka bands at cultural festivals, and occasionally attends the Buffalo Philharmonic
    Orchestra’s concerts, finding these artistic experiences a soothing counterbalance to their practical work life.
  travel: Robert Wojcik prefers road trips that blend fishing and family visits, having driven to Niagara Falls for a weekend retreat and explored the Adirondack lakes during autumn foliage tours, while
    they dream of a summer cruise on the Great Lakes and a nostalgic pilgrimage to the historic Erie Canal towns that shaped their early memories.
  culinary: Robert Wojcik’s culinary tastes revolve around hearty home‑cooked meals like pierogi stuffed with potato and cheese, baked kielbasa, and garden‑fresh tomato sauce, and they take pride in preparing
    these dishes for community festivals, even though they often burn the edges of a roast while multitasking with woodworking projects.
  core: Robert Wojcik is a steady‑handed construction veteran who pairs routine‑driven safety leadership with a love for fishing, classic cinema, and home‑cooked pierogi, while occasionally procrastinating
    on dental appointments and indulging in impromptu woodworking marathons.
background:
  cultural: Robert is a second‑generation Polish‑American. His grandparents emigrated from southern Poland in the 1950s and settled in the Buffalo‑Niagara region to work in manufacturing. Raised in a Catholic
    household, he grew up celebrating Polish holidays, attending Polish language school, and partaking in community events organized by the local Polonia. The values of hard work, family loyalty, and community
    service were instilled early, shaping his practical outlook and his commitment to local traditions.
