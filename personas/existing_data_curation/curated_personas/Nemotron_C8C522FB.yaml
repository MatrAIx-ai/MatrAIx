  hobbies: '[''Sketching fantastical creatures'', ''Listening to experimental ambient music'', ''Music production (Ableton Live)'', ''Playing indie video games'', ''Creative writing (short stories, poetry)'',
    ''Attending open‑mic nights'', ''Visiting Austin art galleries'', ''Skateboarding'', ''Journaling for mindfulness'', ''Participating in online art challenges (Inktober, 30‑Day Sketch)'']'
  career_goals: James aspires to become a concept artist for video games or animated films, building a professional portfolio that highlights his unique, imaginative style. He plans to enroll in a community
    college or art school to formalize his training while continuing to freelance for independent creators. Over the next five years, he hopes to launch a personal brand on platforms like ArtStation, Instagram,
    and YouTube, offering commission work and sharing process videos that blend his visual art with original music and storytelling. He dreams of developing an indie game that combines his narrative writing
    and concept art, entering design competitions to test his competitive edge. Parallel to his artistic ambitions, James wants to cultivate healthier coping mechanisms for his anxiety, potentially using
    art therapy to support peers facing similar emotional challenges.
