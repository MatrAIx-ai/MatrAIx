personas:
  professional: James Diliberto is a self‑taught concept artist who blends digital illustration in Procreate and Photoshop, ambient music production in Ableton Live, and speculative short fiction into immersive
    visual packages, leveraging their curiosity and flexible, often disorganized workflow to turn surreal sketches into compelling game design pitches.
  sports: James Diliberto rides their skateboard through the downtown Austin skate park and follows Austin FC and the Texas Longhorns with fervor, using weekly skate sessions as a cardio outlet while they
    occasionally join the Austin Skate Club’s weekend meet‑ups for a burst of competitive energy.
  arts: James Diliberto curates experimental ambient playlists featuring Aphex Twin, William Basinski, and Ryuichi Sakamoto, while regularly sketching fantastical creatures inspired by the vibrant murals
    of East Austin, attending open‑mic nights to recite poetry, and they cite the surreal black‑and‑white cinema of the 1960s as a visual touchstone.
  travel: James Diliberto prefers spontaneous weekend road trips across the Texas Hill Country, dreams of backpacking through the Amalfi Coast’s cliffside villages and attending a tech‑focused art retreat
    in Kyoto, balancing a limited student budget with a love for indie hostels, community‑run campsites, and occasional rides on the Austin City Limits music festival road tour, and they often map out trips
    on a sketchbook.
  culinary: James Diliberto’s kitchen is a hybrid of hand‑rolled pasta dishes like tagliatelle al pesto and Texas‑style smoked brisket tacos, often paired with a splash of espresso, while they experiment
    with indie food trends such as fermented hot sauce made from habanero peppers and kombucha cultures.
  core: James Diliberto is a 17‑year‑old hyper‑imaginative visual creator who channels anxiety into sketchbooks, skateboards through Austin’s streets, and they treat life like a collage of spontaneous art
    projects, occasional financial splurges, and unpredictable sleep patterns.
background:
  cultural: James comes from a white, Italian‑American family whose grandparents emigrated from Southern Italy, bringing with them traditions of homemade pasta, classic cinema, and a reverence for artistic
    expression. Raised in the suburbs of Austin, Texas, he has been shaped by the region’s blend of Southern hospitality and the city’s eclectic, DIY arts scene. Austin’s vibrant music festivals, street
    murals, and indie tech community have nurtured his curiosity and flexible mindset, encouraging him to pursue self‑directed learning. While his formal schooling ended before the ninth grade, the Texan
    values of independence and self‑reliance have driven him to seek knowledge online and engage with local creative collectives. He feels a subtle connection to his Italian heritage through family gatherings
    and storytelling, which fuels his love for narrative art and speculative fiction.
attributes:
  skills: '[''Digital illustration'', ''Hand‑drawn sketching'', ''Basic web design (HTML/CSS)'', ''Music composition (guitar, electronic beats)'', ''Creative writing (speculative fiction, poetry)'', ''Visual
