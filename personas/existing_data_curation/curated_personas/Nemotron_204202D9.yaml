personas:
  professional: Teresa Levy, a budding problem‑solver who spends their days building block towers, exploring cause‑and‑effect with a pragmatic curiosity, and quietly taking charge of their stuffed‑animal
    crew in playtime, though often leaving a few blocks scattered due to their relaxed approach to organization.
  sports: Teresa Levy, an energetic two‑year‑old who adores tumbling in preschool gymnastics, splashing in the community pool, and quietly cheering for the Chicago Cubs when they appear on the family TV,
    while preferring solo swings at the local park over large group games, yet they readily join other toddlers for a brief game of catch when they feel assertive.
  arts: Teresa Levy, a creative spark who loves finger‑painting to the upbeat tunes of The Wiggles and Raffi, hums along to the lullaby ‘Somewhere Over the Rainbow,’ delights in watching Elmo on Sesame
    Street, and occasionally insists on arranging their crayons in precise color order, balancing their reserved nature with occasional assertive displays of artistic preference.
  travel: Teresa Levy, a curious explorer who prefers short car rides to familiar destinations like the San Diego Zoo and the sun‑kissed beaches of Outer Banks, often packs their favorite stuffed bunny,
    enjoys the flexibility of spontaneous snack stops, and delights in the occasional family weekend trip to their grandparents’ house, but avoids large crowds, favoring quiet corners of parks.
  culinary: Teresa Levy, a selective but adventurous eater who delights in soft macaroni‑and‑cheese, sweet banana slices, mild avocado mash, and occasionally experiments with a dab of tahini on toast, all
    while proudly smearing a bit of sauce on their cheek as an endearing quirk.
  core: Teresa Levy, a two‑year‑old balancing boundless curiosity with practical play, embraces flexible routines, prefers quiet solo activities, yet can assertively claim their favorite toys, all while
    remaining emotionally steady and delightfully messy.
background:
  cultural: Teresa is raised in a Black family in the Bronx, absorbing a rich blend of African‑American cultural traditions and the vibrant multicultural tapestry of her neighborhood. Her family celebrates
    community events such as block parties, enjoys gospel, R&B, and contemporary music, and incorporates Caribbean and Latin flavors into home meals. The nearby parks, including the Bronx Zoo and community
    gardens, provide early exposure to nature and diverse community interactions. Her upbringing reflects values of resilience, communal support, and pride in cultural heritage.
attributes:
