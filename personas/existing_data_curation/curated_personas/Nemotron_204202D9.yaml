  hobbies: '["Building block play", "Exploring local playground", "Listening to children''s music", "Crayon drawing", "Watching animated stories", "Helping in the kitchen", "Reading picture books", "Observing
    nature (butterflies, birds)"]'
  career_goals: Teresa frequently pretends to be a teacher, a doctor, or a community helper during play. She loves using her toy stethoscope and kitchen set, expressing a budding ambition to care for others
    and explore the world. While she does not have a concrete career plan, she shows an early desire to learn, help, and be independent, indicating future aspirations toward caregiving professions or community‑oriented
    roles such as teaching or nursing.
