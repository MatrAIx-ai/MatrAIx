personas:
  professional: Clemente Feliciano is a budding mechanical tinkerer who spends hours constructing LEGO bridges, vehicles, and simple robots, showcasing early spatial reasoning, problem‑solving, and a practical
    curiosity that blends imaginative play with hands‑on engineering.
  sports: Clemente Feliciano joins the neighborhood youth soccer league, playing as a midfielder for the Meadowbrook Strikers, enjoys weekend bike rides with friends on a blue BMX bike, and cheers for the
    local professional soccer club, the Coastal City FC, while favoring warm‑up games in the park over structured practice.
  arts: Clemente Feliciano devours adventure comics like "Dog Man" and "The Adventures of Tintin", reads animal‑hero picture books such as "The Wild Robot", dances enthusiastically to the beats of Shakira,
    Carlos Vives, and the upbeat Latin pop quartet Los Hermanos, and watches kid‑friendly animated series featuring heroic animals.
  travel: Clemente Feliciano loves weekend trips to the nearby botanical garden and the city’s aquarium, dreams of exploring the rainforest in Costa Rica’s Monteverde Cloud Forest Reserve, and hopes to
    visit the historic Old Town of Cartagena, balancing family‑planned vacations with spontaneous bike‑powered explorations of the local park.
  culinary: Clemente Feliciano helps their grandmother stir arroz con gandules, mastering the fragrant sofrito base and learning to grill plantain slices, while also proudly making peanut butter‑banana
    sandwiches and experimenting with adding mango chunks to smoothies.
  core: Clemente Feliciano blends a curious, hands‑on mind with a gentle, relaxed demeanor, turning every LEGO set, comic page, and park visit into a small adventure while keeping a loose budget and steady
    health routine.
background:
  cultural: Clemente comes from a Puerto Rican family that maintains strong cultural traditions while living in Spring Valley, New York. He is raised in a bilingual home where Spanish is spoken daily, and
    he celebrates holidays such as Three Kings' Day, Día de la Abuela, and Christmas with family gatherings, music, and traditional food. The vibrant Latino community in Rockland County exposes him to Spanish‑language
    media, salsa and reggaeton rhythms, and cultural events at the local community center. His family's values emphasize respect for elders, communal harmony, and sharing, which shape his cooperative and
    considerate nature.
