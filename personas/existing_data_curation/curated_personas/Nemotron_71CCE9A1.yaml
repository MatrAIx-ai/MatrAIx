  career_goals: Clemente dreams of becoming a veterinarian or wildlife caretaker so he can help animals stay healthy. He is also fascinated by how things work, which fuels an interest in engineering and
    building simple machines or robots. In the short term, he aims to improve his reading and math skills, win a school science fair, and learn to prepare simple family recipes to assist his parents and
    grandparents.
