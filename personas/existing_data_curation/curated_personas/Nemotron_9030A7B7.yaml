  hobbies: '[''Playing acoustic guitar'', ''Hiking'', ''Cooking Tex‑Mex cuisine'', ''Reading historical fiction'', ''Attending live music events'', ''Improv comedy workshops'', ''Volunteer financial‑literacy
    tutoring'']'
  career_goals: Peter aims to obtain his CPA license within the next two years and move into a senior auditor role at a regional firm, where he can lead complex audit engagements and mentor junior staff.
    Long‑term, he envisions becoming an audit manager who integrates cultural and ethical considerations into financial reporting, eventually launching a boutique consulting practice focused on ESG reporting,
    forensic accounting, and financial literacy outreach for underserved communities.
