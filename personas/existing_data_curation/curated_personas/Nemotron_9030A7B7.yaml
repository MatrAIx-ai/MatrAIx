personas:
  professional: Peter Houle, a 33‑year‑old accountant who blends his liberal arts insight with rigorous GAAP expertise, excels at audit risk assessments and data visualizations while occasionally letting
    his spontaneous nature clash with tight filing deadlines as he works toward a CPA and a future ESG‑focused consulting practice.
  sports: Peter Houle follows the Dallas Mavericks and FC Dallas with fervor, participates in a co‑ed basketball league at the Dallas Recreation Center, and hikes the Texas Hill Country on weekends as a
    member of the Trinity Hill Walking Club, blending urban sports fandom with a love for outdoor fitness.
  arts: Peter Houle strums acoustic guitar at open‑mic nights, covering John Mayer’s ‘Gravity’ and folk standards by The Avett Brothers, regularly attends live shows at the Kessler Theater featuring indie
    act Spoon, and hones quick‑thinking skills in improv workshops at Dallas Comedy Go, weaving music and performance into their social rhythm.
  travel: Peter Houle prefers spontaneous road trips to nearby Hill Country towns like Fredericksburg and Austin’s live‑music scene, while also planning annual pilgrimages to Santa Fe for its art markets
    and dreaming of a future extended stay in Barcelona to explore Catalan architecture, balancing budget‑friendly getaways with occasional overseas splurges.
  culinary: Peter Houle cooks inventive Tex‑Mex dishes such as chipotle‑lime chicken tacos with cilantro‑avocado salsa and homemade queso fundido with chorizo, often sourcing fresh corn masa, jalapeños,
    and queso fresco from the Dallas Farmers Market and experimenting with mole sauces that reflect a playful yet grounded culinary style.
  core: Peter Houle fuses audit precision with artistic spontaneity, navigating numbers and strings alike while juggling disciplined financial planning and impromptu creativity.
background:
  cultural: Peter grew up in a middle‑class, suburban Texan family in Addison, Dallas County. His white Anglo‑American heritage, combined with the diverse cultural tapestry of the Dallas metroplex, exposed
    him to a mix of Southern hospitality, Midwestern pragmatism, and a vibrant arts scene. Family values emphasized self‑reliance, community involvement, and a practical approach to life, while his humanities
    education fostered an appreciation for literature, the arts, and cultural nuance. This blend of regional Texas influences and broader cultural curiosity shapes his worldview and professional demeanor.
attributes:
  skills: '[''Financial statement analysis'', ''Tax preparation'', ''GAAP compliance'', ''Internal controls design'', ''Audit planning'', ''Risk assessment'', ''Advanced Excel modeling'', ''Data visualization
