personas:
  professional: Daniel Wynn, a three-year-old budding architect, meticulously arranges building blocks into orderly towers, plans each structure in advance, and insists on a consistent daily building routine
    that reflects they love of structure and predictability.
  sports: Daniel Wynn, a three-year-old enrolled in a toddler gymnastics class at the community recreation center, thrives on the routine of warm‑up stretches, proudly chants for the Chicago Cubs during
    family game nights, and enjoys climbing the playground jungle gym for its predictable ladder steps, reflecting they appreciate consistency in physical activities.
  arts: Daniel Wynn, a three-year-old who loves drawing with Crayola crayons, keeps his art supplies sorted by color, enjoys listening to children’s musician Raffi and watching Sesame Street, and often
    mimics the rhythmic patterns in his own playful songs, demonstrating they find comfort in organized creative expression.
  travel: Daniel Wynn, a three-year-old who delights in family trips to Disneyland and the beach, prefers itineraries with scheduled nap times and familiar attractions, and always brings his favorite stuffed
    rabbit for comfort on every adventure, showing they feel safest when travel plans are predictable.
  culinary: Daniel Wynn, a three-year-old with a selective palate that favors macaroni and cheese, banana slices, and chicken nuggets, insists on eating meals in a set order—first vegetables, then protein—and
    occasionally resists trying new foods like broccoli unless cut into fun shapes, indicating they crave structure even at the dinner table.
  core: Daniel Wynn, a three-year-old whose love for order, predictable routines, and gentle kindness shape their approach to play, spending, health habits, sports, artistic expression, travel plans, and
    food choices.
background:
  cultural: 'Daniel is raised in a white, rural Southern family in Richlands, Duplin County, North Carolina. His upbringing reflects typical small‑town Southern values: strong family ties, regular church
    attendance, community gatherings, and an agricultural heritage. He is immersed in local traditions such as church picnics, seasonal fairs, and a close‑knit neighborhood environment that emphasizes kindness,
    cooperation, and respect for routine.'
