  hobbies: '[''Latin dance classes'', ''Hip‑hop dance'', ''Co‑ed tennis league'', ''Adult literacy volunteering'', ''Cooking soul‑food and Caribbean cuisine'', ''Attending live music events (R&B, gospel,
    jazz)'', ''Reading biographies of African‑American leaders'', ''Travel to the Southern United States'']'
  career_goals: Vernice aims to advance into a senior leadership role such as Director of Strategic Planning or Operations Manager within the municipal government of Queens, where she can shape large‑scale
    budgeting and community development projects. She seeks to earn a PMP certification to formalize her project management credentials and to mentor emerging analysts, especially women of color, fostering
    a pipeline of diverse talent. Long‑term, she envisions leading a cross‑agency task force that integrates data‑driven decision‑making with community outreach to improve public services in underserved
    neighborhoods.
