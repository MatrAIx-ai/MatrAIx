personas:
  professional: A data-driven strategic planner, Vernice Thompson leverages three decades of analytics, Lean Six Sigma, and stakeholder engagement to turn municipal budgets into community impact, while
    mentoring rising analysts with a competitive edge and a healthy dose of skepticism toward untested ideas.
  sports: A kinetic community participant, Vernice Thompson energizes weekend co‑ed tennis matches at the Queens Racquet Club, attends Latin and hip‑hop dance workshops, and roots for the New York Knicks
    and New York Rangers when they’re on TV.
  arts: A culturally attuned aficionado, Vernice Thompson regularly rehearses Latin salsa and hip‑hop choreography, fills playlists with Beyoncé, Alicia Keys, and John Coltrane, and spends evenings at the
    Queens Library’s live jazz series featuring artists like Gregory Porter.
  travel: An explorer of Southern heritage, Vernice Thompson plans annual trips to Charleston, Savannah, and New Orleans to visit family and historic sites such as Fort Sumter, often combining these visits
    with local food tours and community service projects.
  culinary: An enthusiastic home chef, Vernice Thompson whips up soul‑food staples like collard greens, smoked turkey, and sweet plantain fried dumplings alongside Caribbean curried goat, perfecting each
    dish with staples such as smoked paprika, Scotch bonnet peppers, and buttermilk.
  core: Vernice Thompson blends analytical rigor, competitive drive, and community spirit into a life that balances data‑driven municipal planning, disciplined investing, active mentorship, vibrant dance,
    soulful cooking, and Southern road trips—all while navigating occasional health check‑up slips.
background:
  cultural: Vernice is an African‑American woman raised in the culturally rich neighborhoods of Queens, New York. Her mother emigrated from Jamaica, so she grew up with a blend of Afro‑Caribbean traditions,
    gospel music, and the vibrant Black community of the borough. Church, block parties, and neighborhood food festivals were integral parts of her upbringing, fostering a strong sense of community and
    resilience. As a Black professional navigating corporate environments, she draws on the collective history of civil‑rights activism and contemporary mentorship networks, which shape her values of perseverance,
    community service, and celebration of Black artistic expression.
attributes:
  skills: '[''Data Analysis'', ''Data Visualization'', ''Advanced Excel'', ''Power BI'', ''Lean Process Improvement'', ''Six Sigma Green Belt'', ''Financial Modeling'', ''Budgeting'', ''Risk Assessment'',
