personas:
  professional: Debra Liverman blends hands‑on manufacturing expertise with a people‑first mindset, excelling at CNC operation, welding, and interpreting technical drawings while championing safety and
    teamwork on the shop floor, a habit rooted in community‑service values.
  sports: Debra Liverman enjoys playing co‑ed softball for the Fauquier County Fireflys in spring, hikes the Shenandoah trails for cardio in summer, and roots for the Washington Capitals and D.C. United,
    balancing a laid‑back approach to fitness with group‑driven enthusiasm.
  arts: Debra Liverman participates in a community‑theater improv troupe that stages weekly sketches, dances Zumba classes set to Beyoncé and Carlos Vives, and unwinds with live acoustic performances at
    the local farmer’s market, especially admiring the folk storytelling of Brandi Carlile and the cinematic flair of Greta Gerwig.
  travel: Debra Liverman favors weekend road trips that blend scenic hikes and local food, having already explored the Blue Ridge Parkway, visited the historic vineyards of Charlottesville, and dreaming
    of a spring getaway to the coastal town of Cape May, where they plan to map out itineraries spontaneously rather than using rigid plans.
  culinary: Debra Liverman loves southern‑style comfort food, often cooking shrimp and grits with smoked paprika and collard greens, while also experimenting with a wood‑fired pizza topped with locally
    sourced figs, goat cheese, and arugula during DIY evenings, yet they admit to sacrificing a balanced diet for late‑night cheese‑filled pretzel snacks during improv rehearsals.
  core: Debra Liverman is a hands‑on problem‑solver who trades meticulous shop work for spontaneous social outings, often juggling a toolbox, a wine glass, and a mis‑filed calendar in the same afternoon.
background:
  cultural: Debra grew up in a middle‑class family in Fauquier County, Virginia. Her upbringing was shaped by the close‑knit, rural‑suburban community that values neighborly ties, seasonal fairs, and local
    traditions such as county fairs and Fourth‑of‑July celebrations. Raised in a Protestant background, she was involved in church‑based service projects, which reinforced her compassionate and cooperative
    nature. The region's blend of historic Southern hospitality and proximity to the Washington, D.C. metropolitan area gives her an appreciation for both small‑town community spirit and broader cultural
    opportunities.
attributes:
  skills: '[''Blueprint reading'', ''Manual assembly'', ''MIG/TIG welding'', ''CNC machine operation'', ''Quality inspection'', ''Troubleshooting'', ''Safety compliance'', ''Team collaboration'', ''Basic
    electrical wiring'', ''Material handling'']'
  hobbies: '[''Community theater improv'', ''Co-ed softball league'', ''Zumba dance classes'', ''Volunteer at local animal shelter'', ''Community gardening'', ''Hiking in Shenandoah Valley'', ''Exploring
    regional wineries'', ''DIY home improvement projects'', ''Woodworking'', ''Attending local craft fairs'']'
  career_goals: Debra aims to advance within the manufacturing sector by earning certifications such as Certified Welder and CNC Operator, and eventually move into a lead or supervisory role where she can
    mentor new hires and help improve workflow efficiency. She plans to enroll in a bachelor’s program in industrial technology or mechanical engineering part‑time, with a long‑term ambition to open a small
    custom metal‑fabrication shop that offers personalized projects for local businesses and community members while maintaining a flexible schedule that supports her active social life.
