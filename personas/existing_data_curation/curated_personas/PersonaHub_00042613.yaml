persona_description: A historian who specializes in the study of Soviet occupation of Lithuania during World War II, focusing on the political and cultural impact of the period on Lithuanian society. The
  individual is interested in the censorship system implemented by the Soviet authorities, the resistance movements, and the resilience of the organized armed resistance against the repression. They are
  also curious about the impact of the Soviet occupation on Lithuanian culture and literature, and the role of the Lithuanian resistance in preserving the country's cultural heritage.
