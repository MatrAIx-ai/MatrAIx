  skills: '[''Financial reporting'', ''Tax compliance'', ''Internal audit'', ''Risk assessment'', ''Regulatory compliance'', ''Excel VBA'', ''QuickBooks'', ''SAP'', ''Data analysis'', ''Process improvement'']'
