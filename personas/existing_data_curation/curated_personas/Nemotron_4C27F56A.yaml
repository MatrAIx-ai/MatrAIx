    stocks'', ''Gardening'']'
  career_goals: Brian aims to earn his Certified Public Accountant (CPA) designation officially and advance to a senior audit manager role within the next five years. He aspires to lead a boutique advisory
    practice that blends traditional accounting services with technology-driven consulting, eventually positioning himself as a trusted CFO for mid-sized companies in the Southeast. He is also interested
    in mentoring junior staff, leveraging his competitive drive to foster a high-performance culture while maintaining flexibility in work structures.
