  career_goals: Jordan aims to advance from a front‑line representative to a supervisory or team‑lead role within the next three years, seeking a formal GED and subsequently a bachelor’s degree in Marketing
    or Communications. He is interested in transitioning into a role that blends his customer insights with creative strategy, such as a brand strategist, content marketer, or UX researcher. Ultimately,
    he envisions launching a small boutique agency that offers branding and visual design services for local businesses, leveraging his artistic side while maintaining a stable income to support his family.
    He also plans to earn certifications in digital marketing and user experience design to broaden his skillset.
