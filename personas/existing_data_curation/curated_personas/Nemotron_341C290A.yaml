  skills: '[''event planning'', ''budget management'', ''archival research'', ''genealogy research'', ''digital photography'', ''art curation'', ''strategic problem solving'', ''website content management'']'
  hobbies: '[''visiting art galleries'', ''digital photography'', ''reading art history and philosophy'', ''native‑plant gardening'', ''puzzle solving'', ''writing art reviews'', ''birdwatching'', ''hiking
    in desert trails'', ''collecting vintage postcards'', ''volunteering for community art projects'']'
  career_goals: Sona aims to become a recognized curator of local art exhibitions and to spearhead community‑driven art projects that highlight diverse voices in Phoenix. Over the next five years she plans
    to earn a certificate in arts administration, secure a grant to launch a public art walking‑tour series, and develop a monthly blog that publishes thoughtful art reviews. She also intends to serve on
    the Phoenix Art Museum’s volunteer board, mentor younger volunteers, and eventually publish a memoir documenting her experiences navigating the Southwest art scene.
