personas:
  professional: Sona Brooks, a seasoned community arts coordinator in Phoenix who leverages meticulous event planning, budget oversight, and archival research to curate inclusive exhibitions, channeling
    their competitive drive and calm resilience into securing grants and forging strategic partnerships.
  sports: Sona Brooks, a low‑impact fitness enthusiast, spends Saturday mornings hiking with the Phoenix Desert Trail Club, follows the Phoenix Suns and Arizona Diamondbacks avidly, joins a seasonal adult
    softball league for camaraderie, and practices gentle yoga twice a week to maintain flexibility.
  arts: Sona Brooks, an avid follower of contemporary visual art, curates personal exhibitions featuring works by James Turrell, local desert‑inspired photographer Jeff Boatright, and indigenous textile
    artist Yvonne Gonzales, while regularly attending talks with curators like Christine Yamasaki and collecting vintage postcards depicting early 20th‑century Southwest scenes.
  travel: Sona Brooks, a methodical traveler who plans trips with detailed itineraries, enjoys weekend drives to Sedona’s red rocks and bird‑watching in the Grand Canyon, and dreams of a month‑long cultural
    immersion in Oaxaca’s galleries and the quiet tea houses of Kyoto, always booking eco‑friendly lodgings and using public transport where possible.
  culinary: Sona Brooks, a modest home cook with a penchant for Southwest flavors, frequently prepares carne asada tacos with roasted cactus, prickly pear salsa, and fresh cilantro, experiments with mole
    negro on chicken, and savors artisanal cheeses paired with a glass of Tempranillo, yet often skips meatless Mondays in favor of quick quinoa salads.
  core: Sona Brooks, a calm yet fiercely competitive art lover, meticulously curates vintage postcards, solves puzzles late into the night, and rarely lets anxiety surface, though they sometimes hoard rare
    prints like prized trophies.
background:
  cultural: Sona grew up in a middle‑class white family in the Midwest before relocating to Phoenix in her early thirties. The arid landscape, multicultural heritage, and outdoor lifestyle of the Southwest
    have deeply influenced her aesthetic sensibilities, leading her to appreciate desert‑inspired art and Indigenous craftsmanship. While her cultural identity is rooted in mainstream American traditions,
    she actively respects and incorporates Native American and Mexican artistic motifs into her personal collection. Living in Maricopa County for decades, she has become part of a close‑knit community
    of retirees, volunteers, and art enthusiasts, embodying the independent, self‑reliant ethos typical of Arizona residents.
