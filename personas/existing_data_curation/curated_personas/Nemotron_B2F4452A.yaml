  hobbies: '[''Woodworking'', ''Gardening'', ''Playing dominoes'', ''Listening to salsa and bolero music'', ''Cooking Puerto Rican dishes'', ''Reading history and biographies'', ''Genealogy research'',
    ''Walking nature trails'', ''Volunteering at community center events'']'
  career_goals: Although retired, Jorge aims to remain a productive member of his community. He plans to mentor younger neighbors in practical home‑repair skills through local senior‑center workshops, preserve
    his family’s culinary heritage by publishing a small cookbook of Puerto Rican recipes with modern twists, and document his life story for future generations. He also hopes to make a trip back to Puerto
    Rico within the next two years to reconnect with relatives and attend the annual San Juan Festival. Additionally, he wants to stay physically active by expanding his garden, participating in a local
    walking group, and maintaining good health to enjoy his hobbies.
