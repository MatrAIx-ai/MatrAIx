personas:
  professional: Jorge Bolivar, a retired residential maintenance specialist turned senior‑center workshop facilitator, leverages his methodical planning, competitive edge, and skeptical eye for shortcuts
    to teach DIY home‑repair and gardening, ensuring every class runs on a precise schedule and participants leave with a perfectly measured, hand‑crafted project.
  sports: Jorge Bolivar enjoys brisk walks along the Schuylkill River Trail, participates in a local senior walking club that meets thrice weekly, and fervently follows the Philadelphia Eagles and Philadelphia
    Phillies, cheering loudly at home games while keeping a competitive streak that fuels friendly wagers on game scores.
  arts: Jorge Bolivar immerses himself in music daily, spinning classic salsa legends like Celia Cruz and modern Puerto Rican artists such as Bad Bunny, while also savoring boleros by Luis Miguel; they
    attend occasional community theater productions at the local cultural center and collect vintage vinyl records, letting the rhythms guide their cooking and woodworking tempo.
  travel: Jorge Bolivar prefers well‑planned, budget‑friendly trips, having recently explored historic sites in Washington, D.C., and dreaming of a return to Puerto Rico to visit family during the San Juan
    Festival, where they intend to combine genealogical research with a culinary tour of local markets, all arranged through senior‑discount travel packages.
  culinary: Jorge Bolivar excels at preparing traditional dishes like arroz con gandules, mofongo, and plantain‑topped empanadillas, seasoning with sofrito, adobo, and freshly harvested cilantro from the
    garden, yet occasionally over‑salts the sofrito in enthusiasm; they relish sourcing root vegetables from the farmer’s market and enjoy experimenting with modern twists such as quinoa‑infused mofongo.
  core: Jorge Bolivar blends a competitive, methodical mindset with a love for heritage, turning every garden, woodworking project, and dominoes match into a meticulously planned celebration of culture
    and community.
background:
  cultural: Jorge was born to Puerto Rican parents who migrated to the mainland United States after World War II. He grew up in a bilingual household where Spanish was spoken at home and English at school,
    giving him a strong cultural duality. Catholic traditions and island celebrations—such as Nochebuena, Three Kings Day, and salsa festivals—remain central to his identity. While he has embraced the small‑town
    lifestyle of Alburtis, Pennsylvania, he maintains close ties with the Puerto Rican diaspora in the Philadelphia area, attending cultural gatherings, sharing traditional recipes, and supporting youth
    programs that teach Puerto Rican history and language. His background informs his values of family, resilience, and community service.
