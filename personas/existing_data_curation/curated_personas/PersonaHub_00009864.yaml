persona_description: A mental health professional who specializes in the diagnosis and treatment of individuals with autistic spectrum disorders, particularly those who require behavioral therapies, other
  community-based therapies, group therapy, and possible psychiatric medication treatment. They have extensive knowledge and experience in the diagnostic criteria, treatment approaches, and severity evaluation
  of these disorders. They are skilled in conducting thorough mental health histories, family history, and interviews of other people in the patient's life, and are adept at making a diagnosis and providing
  effective treatment plans.
