  career_goals: Richard envisions a future where he can merge his artistic sensibility with technical expertise. He aspires to become a multidisciplinary designer—perhaps a UI/UX designer, video‑game developer,
    or architectural visualizer—who creates user‑friendly, aesthetically engaging experiences. He plans to attend a high‑school program that emphasizes both STEM and the arts, then pursue a college degree
    in interactive media design or environmental engineering, aiming to work on projects that improve community spaces while honoring ecological principles.
