personas:
  professional: Richard Compton, a 12‑year‑old robotics club member, blends his knack for building simple code‑driven bots with a disciplined‑yet‑playful work ethic, channeling his curiosity into precise
    schematics while still leaving room for spontaneous sketch‑inspired design tweaks.
  sports: Richard Compton hikes the trails around Garden of the Gods with the local Youth Trail Club, cheers for the Colorado Rockies and Denver Broncos on game nights, and practices a weekend soccer drill
    with his neighborhood friends, balancing outdoor adventure with team spirit.
  arts: Richard Compton spends afternoons drawing comic‑style panels inspired by Neil Gaiman and Hayao Miyazaki, strums acoustic versions of John Mayer and Ed Sheeran songs on his guitar, and follows Minecraft
    creator YouTubers like Grian for design inspiration, weaving his love of fantasy literature, music, and digital art into a vibrant creative routine.
  travel: Richard Compton has explored the Grand Canyon on a school field trip, trekked to Rocky Mountain National Park with his family, and dreams of backpacking through Kyoto’s historic temples and Iceland’s
    volcanic landscapes, favoring trips that mix natural wonder with cultural immersion.
  culinary: Richard Compton prefers the comfort of homemade pizza topped with pepperoni, extra mozzarella, and sliced jalapeños, can whip up a quick guacamole snack for gaming sessions, and experiments
    occasionally with beginner‑level sushi rolls, though he still relies on Mom’s classic grilled cheese when time is short.
  core: Richard Compton is a curious, art‑obsessed teen who balances coding robots with sketching dragons, hoards stickers, forgets to water his plants, and always trades his last candy for a new Minecraft
    skin.
background:
  cultural: Richard is a white American of mixed German and Irish ancestry raised in Colorado Springs, Colorado. His family embraces the outdoor lifestyle common to the region, often taking weekend trips
    to the nearby mountains for hiking and camping. They celebrate traditional U.S. holidays such as Thanksgiving and Independence Day with community barbecues, while also respecting the local Native American
    heritage through occasional visits to cultural sites. Growing up in a public middle school with a diverse student body, he has been exposed to a variety of cultural perspectives, which reinforces his
    open‑mindedness and appreciation for varied experiences. His parents encourage curiosity, environmental stewardship, and artistic expression, shaping his balanced, harmonious outlook.
