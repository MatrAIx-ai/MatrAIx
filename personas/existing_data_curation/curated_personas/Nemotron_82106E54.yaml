personas:
  professional: A budding junior architect and puzzle enthusiast, Joan Ching translates their love of LEGO building and Sudoku into meticulous blueprint sketches, rigorously testing any peer suggestions
    before incorporating them, and they approach each design with a structured, competitive mindset that seeks flawless execution.
  sports: An avid swimmer, Joan Ching competes with the North Buffalo Aquatics Club's junior team, follows the Buffalo Bills' season for motivation, carefully reviews the coach's training plan each week,
    and adheres to a strict regimen that mirrors the structured approach they use in chess.
  arts: A dedicated piano student and mystery‑book aficionado, Joan Ching practices Mozart's Sonata No. 11 while devouring Nancy Drew mysteries, enjoys the animated artistry of Studio Ghibli, appreciates
    John Williams' scores, and critically evaluates each piece before deciding what to study further.
  travel: A nature‑loving explorer, Joan Ching spends weekend walks along the Buffalo River and has visited Niagara Falls, dreaming of traveling to Washington, D.C., to see the Smithsonian and to Kyoto
    for cherry‑blossom festivals, they meticulously compare travel guides before planning trips, preferring well‑planned itineraries over spontaneous adventures.
  culinary: A budding home chef, Joan Ching frequently spreads peanut butter and jelly on whole‑grain toast, whips up simple spaghetti‑meatball dishes, relishes crisp carrots and mild cheddar, yet often
    forgets to wash vegetables before cooking, and they double‑check recipes for any hidden sugars before following them.
  core: Joan Ching is a methodical, puzzle‑driven 10‑year‑old who thrives on structure, competes quietly, and approaches life with a blend of curiosity and cautious skepticism.
background:
  cultural: Joan grows up in a middle‑class white family in Buffalo, New York. Her cultural background reflects typical Northeastern U.S. traditions, including celebrating holidays such as Thanksgiving,
    Christmas, and the Fourth of July with family gatherings and regional foods like Buffalo wings. She experiences the area's distinct seasonal changes, winter sports enthusiasm, and community events such
    as visits to the Buffalo History Museum. Her family places a strong emphasis on education, punctuality, and community involvement, shaping her structured, reliable, and modestly competitive personality.
