  career_goals: Joan aspires to become an engineer or scientist, drawn to fields that involve building, problem‑solving, and structured design such as mechanical engineering or environmental science. She
    also entertains the idea of working as a librarian because of her love for orderly spaces and information organization. She aims to excel academically, participate in science fairs, and deepen her technical
    skills to pursue a career that blends creativity with systematic thinking.
