personas:
  professional: A curious three‑year‑old named Mercedes Dejesuslopez delights in arranging colored blocks into intricate patterns, displaying early methodical thinking and a love for exploring new ideas
    through play, and they often plan their block constructions before starting.
  sports: An energetic three‑year‑old named Mercedes Dejesuslopez joins the Little Cubs toddler soccer club, idolizes the local professional baseball team the Chicago Cubs, and enjoys weekly gymnastics
    classes at the community center, preferring small group activities over big crowds, and they love cheering quietly from the sidelines.
  arts: A budding art enthusiast named Mercedes Dejesuslopez loves finger‑painting with bright watercolors, humming along to Sesame Street’s Elmo songs and the classic tunes of The Beatles, and often watches
    Pixar’s “Toy Story” while admiring reproductions of Van Gogh’s “Starry Night” in the family’s picture frames, and they proudly display their crayon masterpiece on the refrigerator.
  travel: A wide‑eyed explorer named Mercedes Dejesuslopez enjoys short trips to the nearby zoo, weekend visits to Grandma’s coastal cottage, and dreams of riding the monorail at Disneyland, favoring well‑planned
    outings with a small familiar group, and they eagerly pack their favorite stuffed animal for each adventure.
  culinary: A little foodie named Mercedes Dejesuslopez prefers soft macaroni and cheese, chicken nuggets with ketchup, banana slices, and enjoys helping spread peanut butter on toast, often insisting on
    sprinkling a pinch of cinnamon on their oatmeal, and they sometimes get a tiny smudge of sauce on their cheek.
  core: A methodical, curious three‑year‑old named Mercedes Dejesuslopez balances a love for organized play with a shy, solitary nature, occasionally demanding extra snack time and insisting on lining up
    stuffed animals before bedtime, and they giggle loudly when a puzzle piece finally fits.
background:
  cultural: Mercedes is raised in a Salvadoran household in Aldie, Virginia. Her parents speak both Spanish and English at home, introducing her to Salvadoran traditions such as celebrating Las Posadas,
    preparing pupusas, and listening to cumbia and marimba music. These cultural experiences shape her love for vivid colors, rhythmic sounds, and storytelling, while also helping her develop bilingual
    communication skills.
