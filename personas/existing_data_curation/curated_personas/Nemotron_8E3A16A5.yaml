  career_goals: Curtis aims to progress from senior insurance sales agent to regional sales manager within the next five years, eventually targeting a director‑level position overseeing multiple territories.
    He is driven to design and launch niche insurance products that address emerging market risks, improve client retention metrics, and mentor a high‑performing team of agents. Long‑term, he envisions
    establishing his own boutique agency to offer tailored coverage solutions while maintaining a stable financial future for his family.
