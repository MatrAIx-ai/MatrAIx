personas:
  professional: Curtis Kostick, a senior property‑and‑casualty insurance sales agent, blends his STEM‑driven analytical rigor with a methodical, data‑first approach to underwriting, consistently exceeding
    targets while mentoring new reps through structured training programs and meticulous process optimization, and they apply the same precision to every client interaction.
  sports: Curtis Kostick maintains a regimented fitness regimen that includes early morning jogs along the river trail, weekend weight‑training sessions at the local CrossFit box, avidly follows the Chicago
    Bulls (NBA) and the Detroit Lions (NFL), and competes in a Saturday night recreational basketball league with the Riverside Racers club, and they view every workout as a strategic challenge.
  arts: Curtis Kostick decompresses by immersing themselves in classic‑rock icons like Led Zeppelin and The Rolling Stones, attending occasional chamber‑music performances by the Chicago Symphony Orchestra,
    and studying chess‑themed literature from authors such as Stefan Zweig and Garry Kasparov, while they also enjoy watching classic films starring Humphrey Bogart.
  travel: Curtis Kostick prefers meticulously planned road trips, having charted a two‑week itinerary through the Pacific Northwest’s coastal towns and historic Route 66, and dreams of touring Germany’s
    automotive museums in Stuttgart and Munich, all while they balance travel costs within a tight family budget.
  culinary: Curtis Kostick enjoys cooking medium‑rare ribeye steaks with rosemary‑garlic butter, perfecting a sourdough starter that they nurture weekly, and savoring heirloom tomato salads, while they
    are fastidious about ingredient freshness, avoid overly spicy dishes, and occasionally indulge in a weekend brunch at a high‑end steakhouse for a filet mignon.
  core: Curtis Kostick is a methodical insurance strategist who thrives on precise risk models, yet habitually reorganizes their garage workshop long after a project is complete, channeling that meticulous
    energy into every facet of life, and they rarely miss a chance to fine‑tune a spreadsheet.
background:
  cultural: 'Curtis grew up in a suburban Midwestern environment before moving to Frisco, Texas. His cultural upbringing reflects traditional American middle‑class values: emphasis on hard work, self‑reliance,
    and family stability. He participates in community activities typical of the area, such as local volunteer fire‑dept fundraisers and church service projects, while also embracing Texan hospitality and
    the pragmatic, results‑oriented mindset prevalent in the region. His white, Anglo‑American heritage informs a practical, straightforward communication style and a respect for established social norms.'
