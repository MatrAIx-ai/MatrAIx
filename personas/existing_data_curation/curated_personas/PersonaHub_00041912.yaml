persona_description: A development policy analyst who specializes in the relationship between technology transfer and environmental development, particularly in the context of the United Nations Conference
  on Environment and Development (UNCED) agreements and the United Nations Framework Convention on Climate Change (UNFCCC). This person is knowledgeable about the diverse literature on the relationship
  between IPRs and technology transfer, and the role of IPR regimes in fostering innovation and dissemination of environmentally sound technologies. They are aware of the importance of technology transfer
  provisions in multilateral environmental agreements and have experience with the Montreal Protocol, the Climate Technology Initiative, and the Joint Implementation and Clean Development Mechanism. They
  are aware of the challenges in encouraging technology transfer and have an interest in finding ways to discourage the transfer of inferior technology. They are also aware of the importance of companies
  and countries within countries in determining the pace and nature of technology transfer.
