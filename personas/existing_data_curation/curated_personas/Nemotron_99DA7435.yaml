  career_goals: Marcus aspires to blend his love for art and technology by pursuing a career in user‑experience (UX) design or interactive media. He aims to study graphic design and computer science at
    a university renowned for interdisciplinary programs, eventually working on designing intuitive interfaces for educational software or immersive museum exhibits. In the short term, he plans to build
    a robust portfolio of digital artwork and develop a small indie game that showcases his coding and artistic skills. He is also interested in attending summer workshops at the Denver Art Museum and participating
    in a high‑school robotics competition to strengthen his technical credentials.
