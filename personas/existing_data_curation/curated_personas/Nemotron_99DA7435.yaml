personas:
  professional: A budding digital illustrator and concept artist, Marcus Norman channels their curiosity and methodical nature into meticulously rendered urban and mountainous scenes, blending traditional
    sketching with digital painting while drawing narrative inspiration from science‑fiction novels and philosophy forums, and they plan each artwork like a strategic game.
  sports: An avid weekend hiker with the Colorado Trails Youth Club, Marcus Norman supports the Denver Broncos and Colorado Avalanche, and they blend their competitive drive into a disciplined personal
    fitness regimen that includes trail runs and occasional soccer practice with a small school team.
  arts: A dedicated sketcher of cityscapes, Marcus Norman finds inspiration in the atmospheric lighting of Edward Hopper, the dynamic line work of Kim Jung Gi, and the ethereal worlds of Studio Ghibli’s
    Hayao Miyazaki, and they often spend evenings on digital platforms to experiment with color theory.
  travel: Marcus Norman prefers meticulously planned family road trips, having explored the Rocky Mountain National Park and the historic streets of Santa Fe, and they dream of a solo backpacking adventure
    through Kyoto’s temples to capture Japan’s blend of modern design and nature.
  culinary: A novice cook with a penchant for hearty meals, Marcus Norman enjoys whipping up quinoa‑based salads with roasted sweet potatoes, feta, and a drizzle of balsamic glaze, while occasionally indulging
    in spicy ramen topped with soft‑boiled eggs and fresh green onions, and they relish experimenting with new spice blends whenever inspiration strikes.
  core: Marcus Norman is a curious, methodical teen who transforms solitary hikes and puzzle‑solving into detailed digital art, balances a competitive savings streak with careful budgeting, and they habitually
    arrange sketch pencils by hue.
background:
  cultural: Marcus grew up in a middle‑class suburban household in Broomfield, Colorado, surrounded by a blend of modern suburban culture and the outdoor heritage of the Rocky Mountain region. His family
    values self‑reliance, education, and community involvement, often attending local festivals, museum events, and outdoor recreation activities. The cultural atmosphere emphasizes a mix of American Midwest
    sensibilities—practicality, punctuality, and modesty—with an appreciation for the natural landscape that influences his interest in art and exploration. As a White American, he is aware of his cultural
    privilege and is encouraged by his parents to respect diversity and stay curious about different perspectives.
