persona_description: A water quality expert who is responsible for assessing the quality of drinking-water from "improved" sources and developing strategies to strengthen drinking-water quality regulations.
  This individual has extensive experience in conducting rapid assessments of water quality using the RADWQ methodology and has a deep understanding of the importance of water quality in public health.
  They are skilled in applying the RADWQ methods and procedures to different countries and contexts, and are committed to improving water quality through capacity development and regulatory strengthening.
