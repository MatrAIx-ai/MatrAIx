  hobbies: '[''Woodworking'', ''Arduino/Raspberry Pi electronics projects'', ''Hiking on local trails'', ''Lake Winnebago fishing'', ''Community basketball league'', ''Volunteer coaching youth robotics
    team'', ''Attending craft brewery tours'', ''Reading non‑fiction (productivity, sustainability, biographies)'', ''Participating in trivia and puzzle nights'']'
  career_goals: Although currently not in the workforce, Jesse aims to re‑enter the professional world as a part‑time consultant for local manufacturers, helping them implement Lean Six Sigma improvements
    and sustainable design practices. He plans to earn a Lean Six Sigma Black Belt certification to formalize his expertise. In parallel, he wants to launch a modest freelance engineering studio that offers
    CAD design and IoT prototyping services to small businesses. Jesse is motivated to give back to his community by establishing a mentorship program for high‑school students interested in STEM, and he
    hopes to author a practical guidebook on home maintenance and energy efficiency that blends his curiosity with his practical mindset. Financial stability and a sense of purposeful contribution drive
    his ambitions, while his natural worry prompts thorough preparation for each new venture.
