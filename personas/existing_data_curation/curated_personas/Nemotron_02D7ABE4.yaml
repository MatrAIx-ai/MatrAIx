personas:
  professional: Jesse Espejo, a part‑time Lean Six Sigma consultant and freelance mechanical engineer, leverages expert SolidWorks modeling, Python data analysis, and disciplined project management to turn
    complex manufacturing challenges for local Wisconsin firms into sustainable, community‑focused solutions, all while mentoring young engineers with their practical curiosity.
  sports: Jesse Espejo, a regular on the Winnebago County community basketball league and a member of the Kohler State Forest Hiking Club, devotes weekends to fishing on Lake Winnebago, supports the Green Bay
    Packers, Milwaukee Bucks, and Milwaukee Brewers, and maintains fitness through early‑morning jogs and weekly basketball games.
  arts: Jesse Espejo, an avid supporter of the Milwaukee Art Museum and frequent visitor to craft breweries showcasing local mural art, draws creative inspiration from folk legends like Johnny Cash and
    contemporary acts such as The Milk Carton Kids, channeling that aesthetic into their detailed woodworking projects.
  travel: Jesse Espejo prefers low‑key road trips that blend nature and small‑town charm, often spending long weekends exploring Door County’s shoreline, the Apostle Islands, or taking a brief cultural
    escape to Chicago’s museums, while dreaming of an autumn tour of Bavaria’s cheese farms and historic villages.
  culinary: Jesse Espejo, an enthusiastic home cook with solid woodworking skills, delights in preparing Wisconsin cheese curds, bratwurst with sauerkraut, and pan‑fried lake perch seasoned with local honey
    and fresh dill, and often pairs these dishes with craft brewery pretzels and stout‑matched chocolate desserts.
  core: Jesse Espejo is a meticulous, community‑driven engineer who balances practical problem‑solving with a love for outdoor camaraderie, local traditions, and a perpetual worry that fuels disciplined
    preparation but sometimes leads to over‑planning.
background:
  cultural: Jesse grew up in the Upper Midwest, raised in a middle‑class white family with German‑Polish roots typical of many Wisconsin communities. He attended the University of Wisconsin–Madison for
    his STEM education, absorbing the region’s values of hard work, modesty, and community responsibility. His cultural identity is shaped by a Protestant (Lutheran) upbringing, appreciation for local traditions
    such as county fairs, cheese making, and outdoor recreation, as well as a respect for the history of the Winnebago County area, including its Native American heritage. These influences foster a blend
    of self‑reliance, neighborly cooperation, and a deep connection to the local landscape and community.
attributes:
  skills: '[''SolidWorks CAD'', ''Lean Six Sigma process optimization'', ''Python programming'', ''MATLAB and Excel data analysis'', ''Project management (Agile and Waterfall)'', ''Technical writing and
