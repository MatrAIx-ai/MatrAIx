  career_goals: Sharleen dreams of becoming a marine biologist or wildlife scientist, inspired by frequent trips to the nearby Pacific shoreline where she collects shells and watches tide pools. She imagines
    herself discovering new sea creatures and inventing practical tools to protect the ocean, blending her natural curiosity with a desire for useful outcomes. Her competitive streak fuels an ambition to
    be the best in her future field, and she often tells herself she will one day lead exciting research projects that solve real‑world problems.
