personas:
  professional: Rebecca Kaster, a budding Girl Scout troop leader and soccer team captain at school, combines her love for routine and teamwork with a naturally outgoing, cooperative spirit, guiding peers
    through badge projects and after-school drills while often forgetting to tidy up her own supplies.
  sports: Rebecca Kaster blasts the field as a forward for the Pocono Pines Soccer Club, dribbling with the same enthusiasm she reserves for cheering on the Philadelphia Union and the Philadelphia Eagles,
    and treats weekend hikes as cross-training for endurance while maintaining a carefree, team-first mindset.
  arts: Rebecca Kaster channels her vivid imagination into sketching whimsical cartoons inspired by Bill Watterson and doodling scenes from Magic Tree House adventures, while also savoring Saturday night
    Disney movie marathons featuring Moana and Frozen, which together color their creative downtime.
  travel: Rebecca Kaster's travel style blends spontaneous weekend campsites in the Pocono Mountains with carefully planned family road trips to historic Washington, D.C., all while dreaming of a future
    summer adventure at Disney World, reflecting a balance of familiar outdoor routines and a thirst for new, story-book destinations.
  culinary: Rebecca Kaster whips up chocolate-chip cookies and easy peanut-butter banana muffins in the kitchen with Mom, pairs them with fresh berry smoothies using strawberries and blueberries she collected
    on hikes, and eagerly devours classic mac and cheese for lunch, showcasing a love for comforting, sweet-and-savory dishes.
  core: Rebecca Kaster is a routine-loving, high-energy 10-year-old who delights in soccer strategy, tends to misplace their crayons during art sessions, worries about school tests, and secretly steals
    extra gummy bears from the pantry when no one's looking.
background:
  cultural: Rebecca comes from a white, middle‑class family rooted in the small‑town community of Tobyhanna, Pennsylvania. Her ancestry includes German and Irish heritage, and her family observes traditional
    American holidays such as Thanksgiving, Christmas, and the Fourth of July with community gatherings, church services, and seasonal decorations. Growing up in Monroe County, she is accustomed to a close‑knit
    environment where neighbors know each other, local schools emphasize community involvement, and outdoor activities like hiking and hunting are common pastimes. This cultural setting reinforces her values
    of practicality, routine, and caring for others.
