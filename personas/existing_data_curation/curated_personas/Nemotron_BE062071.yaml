  career_goals: Rebecca dreams of a future where she can help children and families every day. She is drawn to careers that combine structure with caring, such as becoming an elementary school teacher or
    a pediatric nurse. She imagines creating a warm, organized classroom or clinic where kids feel safe and supported. She also hopes to volunteer in community events, like local fairs or church youth programs,
    because she values harmony and wants to make a positive impact on the people around her.
