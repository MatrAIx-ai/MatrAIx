  hobbies: '[''Gardening'', ''Birdwatching'', ''Reading historical fiction'', ''Quilting and crocheting'', ''Baking simple desserts'', ''Walking in local nature trails'', ''Attending small church gatherings'',
    ''Volunteering at the community library'']'
  career_goals: Haley plans to transition to part‑time work within the next year, allowing her more flexibility to pursue personal interests while still contributing to the post office. She hopes to mentor
    younger clerks informally, sharing practical tips and her curiosity about emerging postal tools. In retirement she aims to volunteer with the local library’s senior‑mail‑delivery program and to complete
    a community quilt for the Bartlesville senior center. Maintaining her health and staying socially connected in small, supportive groups are also central to her long‑term aspirations.
