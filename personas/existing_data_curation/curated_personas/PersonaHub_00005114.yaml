  and its variants, as well as the interactions between VP-ellipsis and other linguistic phenomena. They are likely to have a strong background in linguistics, with a specialization in the study of verb
  phrase structure and its variations. They may also have expertise in other areas of linguistics, such as syntax, semantics, or pragmatics, depending on their interests and research interests.
