personas:
  professional: Helen Mixon is a budding young scientist‑inventor who merges their love of sci‑fi storytelling with meticulous Scratch coding projects, detailed LEGO constructions, and a habit of sketching
    speculative machines in their journal, and they apply a methodical, self‑reliant mindset honed by their small‑town upbringing.
  sports: Helen Mixon enjoys playing in the Eureka Youth Soccer Club during the spring and cheering for the St. Louis Cardinals during baseball season, while they also keep a simple daily log of bike rides
    and nature walks where they collect insects, reflecting their organized, competitive spirit and love for outdoor activity.
  arts: Helen Mixon immerses themselves in watercolor painting inspired by Claude Monet’s lily ponds, sketches whimsical creatures reminiscent of Miyazaki’s Studio Ghibli films, and practices recorder pieces
    like Mozart’s ‘Eine kleine Nachtmusik’, while also designing interactive Scratch stories that showcase their illustrated worlds, and they often share their creations with a small circle of friends.
  travel: Helen Mixon prefers family road trips that combine learning and leisure, having explored the St. Louis Gateway Arch and the state fair’s agricultural exhibits, while they dream of a future visit
    to Washington D.C.’s National Air and Space Museum to see real rockets that echo their sci‑fi fantasies.
  culinary: Helen Mixon favors classic Midwestern comfort foods such as buttery cornbread, homemade apple pie, and cheesy mac‑and‑cheese, enjoys helping grandma bake chocolate chip cookies, and they often
    experiment by adding dried herbs like rosemary to their own sandwich creations.
  core: Helen Mixon is a methodical, curiosity‑driven nine‑year‑old who balances a love for detailed art, coding, and nature exploration with a disciplined approach to savings and health, and they quietly
    compete with themselves to perfect every project.
background:
  cultural: Helen comes from a white Midwestern family in Eureka, Missouri, a small rural community that values self-reliance, close-knit family ties, and modest community involvement. Her upbringing includes
    frequent visits to the local library, school art programs, and county fairs, exposing her to both traditional American folk culture and a growing appreciation for contemporary art and science. The region's
    emphasis on hard work, respect for nature, and support for educational enrichment shapes her practical, organized, and curious outlook.
attributes:
  skills: '["Reading comprehension and critical analysis", "Basic arithmetic and logical problem solving", "Organizational planning and project management", "Sketching and watercolor painting", "LEGO building
    and spatial reasoning", "Scratch block coding", "Scientific observation and field note-taking", "Time management"]'
  hobbies: '["Reading sci-fi and fantasy books", "Sketching and watercolor painting", "LEGO building", "Scratch coding", "Insect and rock collecting", "Puzzle solving (logic puzzles, crosswords)", "Playing
    the recorder", "Maintaining a structured journal"]'
  career_goals: Helen aspires to become a research scientist-engineer who blends art and technology to design sustainable solutions. She dreams of winning a regional science fair, later aiming for a career
    in environmental design or product innovation where she can lead projects and showcase her creative problem-solving. In the long term, she hopes to work in a museum or research institute, creating interactive
    exhibits that inspire curiosity in other children.
