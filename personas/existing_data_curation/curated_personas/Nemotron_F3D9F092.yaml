personas:
  professional: Laura Sevilla is a data‑driven financial manager who leverages advanced Excel modeling, Python automation, and rigorous risk assessment to craft strategic forecasts, while her curiosity
    about emerging fintech and methodical organization keep her projects on schedule and her team aligned.
  sports: Laura Sevilla fuels her fitness routine with weekly yoga sessions, Saturday hikes with the Forest Park Hikers Club, and occasional runs with the Fit St. Louis crew, while rooting for the St. Louis Cardinals,
    the St. Louis Blues, and the newly‑formed St. Louis City SC during each season.
  arts: Laura Sevilla channels her curiosity through street photography that mirrors the pulse of St. Louis, drawing inspiration from Henri Cartier‑Bresson’s decisive moments, while unwinding to the soulful
    croon of Leon Bridges and the intricate piano work of Ólafur Arnalds, and occasionally attending exhibitions at the St. Louis Art Museum featuring works by contemporary painter Kehinde Wiley.
  travel: Laura Sevilla plans her getaways with the same spreadsheet precision she applies at work, favoring a blend of adventure and relaxation—she’s trekked the Redwoods on a solo road trip, spent a long
    weekend exploring the jazz scene in New Orleans, savored street food in Mexico City, and now dreams of wandering the bamboo forests of Kyoto while balancing her consulting ambitions and a modest travel
    budget.
  culinary: Laura Sevilla is an avid home chef who meticulously crafts traditional mole with ancho chilies, pasilla, and Mexican chocolate, perfects hand‑pressed tamales using masa harina and locally sourced
    pork, and experiments with chiles en nogada, yet she also delights in savoring seasonal menus at St. Louis’ farm‑to‑table hotspot Farmhaus for inspiration.
  core: Laura Sevilla blends analytical rigor with a love for solitary creativity—balancing spreadsheets, mole recipes, and midnight crossword puzzles—while occasionally hoarding paper receipts like trophies
    and forgetting to water her succulents.
background:
  cultural: Laura was raised in a bilingual Mexican‑American household, where Spanish was spoken at home and English at school. Her family’s traditions—celebrating Día de los Muertos, preparing tamales
    for holidays, and listening to mariachi and corridos—instilled a deep appreciation for her Mexican heritage. Growing up in the Midwest, she also embraced local customs such as attending St. Louis Cardinals
    games and participating in community festivals. This bicultural experience taught her the value of hard work, family cohesion, and community support, shaping her respectful yet assertive communication
    style. She remains actively involved in the local Mexican community, attending cultural events at the Plaza of the Americas and supporting initiatives that promote educational opportunities for recent
    immigrants.
attributes:
  skills: '[''Financial analysis'', ''Budgeting and forecasting'', ''Data analytics'', ''Advanced Excel modeling'', ''Python programming'', ''SQL database management'', ''Risk assessment'', ''Strategic
    planning'', ''Project management'', ''Regulatory compliance'', ''Team leadership'', ''Financial reporting'', ''Fintech trend monitoring'']'
  hobbies: '[''Reading non-fiction (economics, technology, philosophy)'', ''Cooking Mexican dishes'', ''Yoga'', ''Hiking in local parks'', ''Puzzle solving (crossword, Sudoku)'', ''Street photography'',
    ''Board‑game evenings with close friends'', ''Volunteering for Latinx youth mentorship'', ''Exploring AI and blockchain basics'', ''Attending local music festivals'']'
  career_goals: Laura aims to transition from her current financial manager position to a senior leadership role, ultimately becoming a chief financial officer within a technology‑focused firm that values
    data‑driven finance. She plans to deepen her expertise in ESG (environmental, social, governance) investing and sustainable finance, positioning herself as a champion of responsible capital allocation.
    To support this trajectory, she intends to complete the CFA designation and enroll in an executive MBA program while continuing to mentor junior analysts. In the longer term, she envisions launching
    a consultancy that helps small Mexican‑American businesses in the St. Louis area improve financial literacy and leverage analytics for growth, combining her professional ambition with her community‑oriented
    values.
