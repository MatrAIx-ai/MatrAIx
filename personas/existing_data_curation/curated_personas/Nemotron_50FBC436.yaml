  hobbies: '["Bridge Club","Weekly Bingo","Local Car Shows","Road Trips (Red Rock Canyon, Lake Mead)","Watching Football (Las Vegas Raiders)","Tai Chi","Mystery Novel Reading","Book Club"]'
  career_goals: Approaching retirement, Edgar aims to shift from full‑time sales to a mentorship role, formally training junior staff and possibly coordinating weekend workshops on effective sales techniques
    for local small‑business owners. He hopes to leverage his curiosity about retail trends by consulting for boutique shops in Henderson, helping them optimize layout and inventory without overwhelming
    them with complex systems. Ultimately, he wants a flexible schedule that lets him spend more time with his wife and grandchildren while maintaining a sense of purpose in the retail community.
