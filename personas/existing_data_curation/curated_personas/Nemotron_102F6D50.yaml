  hobbies: '[''Gardening'', ''Traditional Mexican cooking'', ''Quilting'', ''Reading historical fiction'', ''Genealogy research'', ''Walking on the beach'', ''Attending church services'', ''Listening to
    bolero and mariachi music'', ''Volunteering for community festivals'']'
  career_goals: Even though she is no longer in the formal workforce, Sonia remains goal‑oriented. She plans to compile and publish a cookbook that blends her family's Mexican recipes with healthier twists,
    and to lead a series of financial‑literacy workshops for seniors at the local community center. She also hopes to mentor younger volunteers in event planning, expand the neighborhood garden she helped
    start, and complete a personal memoir documenting her family's migration story. Maintaining her health and independence so she can continue walking along the Gulf Coast and attending family gatherings
    is a core ambition.
