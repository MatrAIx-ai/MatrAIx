    reporting'', ''Inventory and parts management'', ''Informal mentoring and operator training'', ''Logistics coordination and route planning'']'
  hobbies: '[''Fly fishing on local lakes'', ''Woodworking and furniture making'', ''Birdwatching in nature preserves'', ''Scale model truck building'', ''Vegetable gardening'', ''Reading technical manuals
    and historical nonfiction'', ''Listening to classic rock'']'
  career_goals: Francis aims to transition from a front‑line operator to a supervisory or training role where he can shape safety culture and share his practical expertise with younger staff. He is interested
    in becoming a maintenance lead or equipment‑optimization consultant for the regional manufacturing sector, focusing on improving reliability while reducing downtime. Because of his sensitivity to stress,
    he also values a steady schedule and work–life balance, and he envisions a phased move toward part‑time consulting that allows him to devote more time to personal interests and family life.
