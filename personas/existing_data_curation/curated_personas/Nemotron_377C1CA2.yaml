personas:
  professional: A detail‑driven packager with five years of experience in high‑volume distribution, Katia Vinas leverages bilingual communication, meticulous inventory control, and a knack for spotting
    micro‑efficiencies to lead a prospective supervisory team while eyeing a supply‑chain certification and a future logistics coordinator role.
  sports: An avid park‑walker and occasional hill‑hiker, Katia Vinas logs weekend treks with the Hill Country Hikers Club, supports the Houston Dynamo in MLS and follows the Houston Astros, while occasionally
    playing in a recreational disc‑golf league at Memorial Park.
  arts: A quiet connoisseur of visual culture, Katia Vinas frequents intimate galleries like The Art House, sketches urban murals inspired by Diego Rivera, curates a personal collection of Frida Kahlo postcards,
    and captures everyday moments through a Canon EOS M50, often sharing her work on an Instagram feed devoted to DIY gift‑wrap designs.
  travel: Preferring curated experiences, Katia Vinas has explored Oaxaca’s culinary scene and the historic streets of San Miguel de Allende, dreams of trekking to Machu Picchu, and plans a budget‑friendly
    road trip along the Texas Gulf Coast, always packing a sketchbook for impromptu drawings.
  culinary: A passionate home cook, Katia Vinas masterfully prepares mole poblano, chiles en nogada, and pozole using masa harina, ancho chilies, and fresh epazote, often experimenting with regional sauces
    like pasilla de Oaxaca while skillfully arranging the dishes on handmade decorative plates for intimate gatherings.
  core: Katia Vinas blends a packaged‑line precision with artistic curiosity, balancing meticulous efficiency at work with a solitary love for hands‑on crafts, Mexican flavors, and quiet contemplation—though
    she sometimes sacrifices dental hygiene and overspends on boutique art supplies.
background:
  cultural: Katia grew up in a Mexican‑American household in Fort Bend County, Texas, where Spanish and English intertwine in daily life. Her family maintains strong ties to Mexican traditions—celebrating
    Día de los Muertos, Mexican Independence Day, and religious holidays with elaborate food, music, and communal gatherings. The culinary heritage, especially dishes from her grandparents' region of Veracruz,
    informs her cooking hobby. Growing up near Houston's diverse cultural scene, she blends Mexican customs with Texan values of independence and hard work. Her bilingual fluency reflects a cultural emphasis
    on family communication and respect for elders. These roots shape her resilient outlook, her appreciation for artistic expression, and her commitment to providing for her family.
attributes:
  skills: '["Packaging and labeling", "Inventory control", "Equipment operation (pallet jack, conveyor systems)", "Quality assurance", "Safety compliance", "Bilingual communication (Spanish/English)", "Time
    management", "Problem solving", "Process improvement", "Basic computer skills (inventory software)"]'
  hobbies: '["Visiting local art galleries", "DIY crafting and custom packaging projects", "Cooking traditional Mexican cuisine", "Walking and hiking in nearby parks", "Sketching and photography", "Solving
    puzzles (sudoku, crosswords)", "Reading fiction and non‑fiction", "Attending small cultural workshops"]'
  career_goals: Katia aims to move beyond the front‑line packager role into a supervisory position within the next three to five years. She plans to pursue a certification in supply‑chain management or
    a forklift operator license to strengthen her qualifications. Her competitive drive motivates her to lead a team, implement productivity initiatives, and earn recognition for efficiency gains. Long‑term,
    she envisions transitioning into a logistics coordinator role where she can blend her operational knowledge with strategic planning. Parallel to her professional growth, she hopes to launch a side business
    creating custom, artistically designed packaging for local Mexican‑American artisans, merging her love for art with her packaging expertise.
