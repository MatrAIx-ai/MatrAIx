  hobbies: '[''Contemporary Art Exploration'', ''Gallery Visits'', ''Art Workshops'', ''Salsa Dancing'', ''Community Music Events'', ''Hiking'', ''Cooking Salvadoran Cuisine'', ''Group Potlucks'', ''Reading
    Speculative Fiction'', ''Listening to Tech Podcasts'']'
  career_goals: Eulalia aims to become a senior engineering manager leading multidisciplinary offshore and onshore projects, with a focus on integrating emerging renewable technologies into traditional
    oil and gas operations. She plans to obtain her Professional Engineer (PE) license, publish research on enhanced oil recovery techniques, and speak at international energy conferences. Long‑term, she
    envisions shaping corporate strategies that balance profitability with sustainability, positioning herself as a thought leader in the energy transition.
