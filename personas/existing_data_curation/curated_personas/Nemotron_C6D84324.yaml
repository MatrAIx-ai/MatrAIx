personas:
  professional: A budding robotics enthusiast, Ada Valle combines their methodical mindset and love of teamwork to design simple Scratch programs and prototype autonomous soccer bots, often leading their
    robotics club projects with the same collaborative spirit they show on the soccer field.
  sports: A spirited member of the Greenfield Strikers youth soccer league, Ada Valle relishes both midfield play and team strategy, idolizes FC Barcelona's youthful energy, and trains after school with
    a focus on stamina and teamwork they bring to every match.
  arts: A devoted fan of the Harry Potter universe, Ada Valle devours J.K. Rowling's novels, recreates magical scenes with friendship-bracelet art, and streams the whimsical John Williams' scores while
    attending library story-time sessions, where they often share their favorite passages with friends.
  travel: Ada Valle loves weekend road trips with their family, especially visits to the nearby science museum and a family camping getaway at Redwood National Park, while dreaming of a future tour of the
    Warner Bros. Studio in London to walk the actual Hogwarts sets.
  culinary: A budding baker, Ada Valle perfects chocolate-chip cookies with their family, experimenting with a pinch of sea salt or matcha powder for a twist, and balances their love for sweet treats with
    quick, nutritious snacks like fruit-filled wraps after soccer practice.
  core: Ada Valle is a curious, organized, and sociable 12-year-old who blends fantasy reading, soccer teamwork, and hands-on robotics into a vibrant life of creativity, community service, and disciplined
    budgeting, and they manage a sweet tooth and occasional forgetfulness about flossing.
background:
  cultural: Ada is a white Midwestern American raised in Des Plaines, Illinois. Her family places a strong emphasis on community involvement, education, and a modest work ethic typical of the Chicago suburbs.
    Growing up, she attended a local public school, celebrated holidays like Thanksgiving and the Fourth of July with neighborhood block parties, and participated in community events such as the summer
    fair. The proximity to Chicago’s diverse neighborhoods has introduced her to a variety of foods, music, and cultural traditions, fostering an appreciation for inclusivity while upholding Midwestern
    values of friendliness, cooperation, and practical problem‑solving.
attributes:
  skills: '["Organizational planning for school projects", "Collaborative teamwork in group assignments", "Basic coding with Scratch", "Public speaking in class presentations", "Creative crafting (friendship
