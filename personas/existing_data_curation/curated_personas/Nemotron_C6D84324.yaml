  hobbies: '["Reading fantasy novels", "Playing soccer", "School robotics club (Scratch programming)", "Crafting friendship bracelets", "Baking with family", "Volunteering at community garden"]'
  career_goals: Ada dreams of becoming a veterinarian so she can combine her love for animals with her careful, detail‑oriented nature. She also sees herself as a future teacher or community mentor, using
    her organizational talents and sociable personality to help younger kids explore new ideas while applying practical solutions to everyday challenges. Ultimately, she wants a career that lets her make
    a positive impact on both people and living creatures.
