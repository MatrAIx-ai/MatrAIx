  hobbies: '[''Community gardening'', ''Hiking'', ''Cycling'', ''Reading historical fiction'', ''Knitting'', ''Raspberry Pi projects'', ''Arduino tinkering'', ''Teaching seniors basic computer skills'',
    ''Chess club'', ''Improv theater'']'
  career_goals: 'Isabel aims to deepen her expertise in IT service management and cybersecurity by obtaining certifications such as ITIL Expert, CompTIA Security+, and Microsoft Certified: Modern Desktop
    Administrator. Over the next few years she envisions moving into a senior support lead or IT consultant role where she can shape support processes, mentor the next generation of technicians, and champion
    user‑centric solutions for small and mid‑size businesses in the Bay Area. She also plans to launch a part‑time consultancy offering on‑site tech assistance for seniors, combining her competitive drive
    for excellence with a personal commitment to community service. Recognition as a top performer within her organization, such as Employee of the Year, is a concrete milestone she pursues.'
