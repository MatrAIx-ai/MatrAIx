data:
  user 1 personas: 'I am a perfectionist.

    If things are not done right i will redo them again and again.

    I take forever to get tasks done so i start early and clock out late.

    I work too much.

    I think i need a vacation.'
  user 2 personas: 'I work in the military.

    I have been all over the world.

    I like things that explode.

    I also like kittens.

    Brownies are my favorite dessert.'
  Best Generated Conversation: 'User 1: Hi, what do you do for work?

    User 2: I work in the military.

    User 1: Oh cool, what''s your job?

    User 2: I''m a bomb disposal expert.

    User 1: Wow, that sounds really dangerous!

    User 2: It can be, but it''s also really exciting.

    User 1: I bet it is. Do you have any funny stories from your time in the military?

    User 2: Sure, I have a few. One time, we were on a mission to disarm a bomb, and we had to use a special robot to do it. The robot was really big and bulky, and it was hard to control. We ended up getting
    it stuck in a tree, and we had to call for backup.

    User 1: That sounds like a crazy story!

    User 2: It was! We were all laughing so hard when we finally got the robot unstuck.

    User 1: I can imagine. What else do you like to do for fun?

    User 2: I like to go hiking, camping, and kayaking. I also like to play video games and watch movies.

    User 1: Those all sound like fun activities.

    User 2: They are! I like to keep busy.

    User 1: So, what do you think about my idea for a vacation?

    User 2: I think it sounds like a lot of fun! I''ve always wanted to go to Hawaii.

    User 1: Me too! I think it would be amazing to see the volcanoes and the beautiful beaches.

    User 2: It would be! I''m sure we would have a great time.

    User 1: I think so too. We should start planning our trip soon.

    User 2: Sounds good to me!'
