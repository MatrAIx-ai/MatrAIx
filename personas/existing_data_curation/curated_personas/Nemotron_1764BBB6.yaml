  hobbies: '["Gardening (heritage roses, native plants, pollinator gardens)", "Quilting and textile art", "Attending folk‑music sessions and dances", "Exploring historic sites and Lowcountry plantations",
    "Cooking Southern cuisine and experimental recipes", "Reading (historical fiction, mysteries, genealogy)", "River walks and bird‑watching", "Church choir singing", "Community potlucks and charity events"]'
  career_goals: Although retired, Monica aims to leave a lasting cultural imprint on her community. She hopes to compile and publish a memoir that weaves personal memories with the history of the Lowcountry.
    She plans to organize an annual senior‑artist showcase at the local community center, providing a platform for creative expression. Monica also wants to start a weekly intergenerational story circle
    at the library, where elders share oral histories with schoolchildren. In addition, she aspires to become a regular volunteer mentor for the town’s reading program, helping seniors learn to navigate
    e‑books. Finally, she dreams of traveling at least once a year to a major art museum or historic site to fuel her lifelong curiosity.
