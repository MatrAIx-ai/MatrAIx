persona_description: A scientist or researcher who is interested in the study of plant adaptation, responses to light cues, and molecular evolution. This person is likely to be familiar with the work of
  the Maloof Lab, which focuses on the QTL analysis of the shade avoidance response in Arabidopsis. They may have a background in genetics, molecular biology, and plant biology, and be interested in understanding
  the molecular mechanisms underlying plant responses to environmental cues. They may also be interested in the development of genetic approaches and network analysis methods to map and identify genes responsible
  for the differential response to shade between different strains and species of plants.
