personas:
  professional: Vernon Banks, a 32‑year‑old aspiring museum educator, leverages their background in digital photography, introductory graphic design, and community event coordination to develop immersive,
    youth‑focused art workshops, all while navigating a laid‑back attitude toward strict scheduling.
  sports: Vernon Banks enjoys hiking the Finger Lakes trails and supports the local Syracuse Crunch and Syracuse Orange basketball teams, occasionally joining a community running club for weekend jogs,
    but prefers creative pursuits over regimented gym workouts.
  arts: Vernon Banks frequents the Everson Museum of Art and the Onondaga Hall of Contemporary Art, sketches installations by artists like Yayoi Kusama and Banksy, and relaxes to the sounds of indie folk
    bands such as The National and local acts at The Westcott, letting those experiences shape their own artistic voice.
  travel: Vernon Banks loves spontaneous road trips through upstate New York, having explored the Erie Canal trail, the scenic vistas of the Finger Lakes, and a weekend getaway to Portland, Maine, while
    dreaming of a future study tour of Florence’s Renaissance galleries and Amsterdam’s modern art scene.
  culinary: Vernon Banks experiments with eclectic recipes—perfecting ramen broth, swapping in local Finger Lakes apples for traditional apple pie, and blending spices for a Moroccan tagine—while enjoying
    casual brunches at the iconic D'Youville Café and deep‑diving into farm‑to‑table markets for fresh ingredients.
  core: Vernon Banks is a curiosity‑driven cultural organizer who trades calendar discipline for spontaneous art adventures, board‑game nights, and a perpetual quest for the perfect espresso.
background:
  cultural: Vernon identifies as White American and was raised in a middle‑class family in upstate New York. Growing up near Syracuse exposed him to the region’s blend of post‑industrial history and a lively
    college‑town atmosphere, fostering a strong appreciation for public art, local festivals, and community initiatives. The Erie Canal’s historic legacy and the city’s multicultural neighborhoods have
    broadened his perspective on cultural expression. Vernon values the cooperative, egalitarian spirit common in the Northeastern United States, while also drawing inspiration from the diverse artistic
    currents that permeate Syracuse’s cultural scene. His background encourages a balance of traditional American values—such as independence and self‑reliance—with an openness to unconventional ideas and
    collaborative creativity.
