    culture'']'
  career_goals: Vernon aims to transition into a role within the cultural sector where his love for art and community can intersect. He is exploring positions such as museum educator, gallery coordinator,
    or program assistant for a nonprofit arts organization in Syracuse. To strengthen his prospects, he plans to enroll in a certificate program in Museum Studies or Arts Administration while continuing
    to build a portfolio of community‑focused art projects. A longer‑term ambition is to launch a hybrid community space—a café and gallery that showcases local artists and offers workshops—thereby creating
    a sustainable income stream that aligns with his values of flexibility, collaboration, and artistic exploration.
