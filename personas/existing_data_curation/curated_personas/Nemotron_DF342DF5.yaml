personas:
  professional: A teenage coder named Jose Canton builds Arduino projects and creates video-game mods, thriving in the structured yet flexible world of solo programming where they apply their calm, resilient
    nature to patient debugging and occasional assertive brainstorming with peers.
  sports: An avid soccer player named Jose Canton competes for the Eastside Thunder youth club, follows the San Jose Earthquakes with loyal enthusiasm, and practices drills after school to maintain structured
    fitness while they enjoy the camaraderie of a tight‑knit team.
  arts: A digital artist named Jose Canton sketches fan‑art using Procreate, draws inspiration from regional folk musicians like Café Tacvba and hip‑hop icons such as Kendrick Lamar, and spends evenings
    listening to a blend of traditional ballads and contemporary beats, where they channel their solitary focus into expressive visual stories.
  travel: A curious explorer named Jose Canton plans weekend getaways to Monterey Bay and hikes in Yosemite, while also traveling annually to visit relatives in the northern border region, using spreadsheet
    itineraries and spontaneous detours that satisfy their structured budgeting instincts, where they thrive on balancing order and surprise.
  culinary: A budding chef named Jose Canton perfects homemade salsa verde, tacos al pastor with pineapple and achiote, and seasonal mole during family gatherings, experimenting with spice levels in a relaxed
    yet meticulous manner that they refine through trial and error, reflecting their blend of practical precision and flexible creativity.
  core: A calm, solitary teen named Jose Canton balances structured coding projects with spontaneous salsa‑making, weekend soccer, and budget‑savvy gaming purchases, while they maintain a laid‑back attitude
    toward obligations that sometimes leads to missed deadlines.
background:
  cultural: Jose comes from a Mexican family that maintains strong cultural ties while living in Santa Clara. Spanish is spoken at home, and family gatherings often feature traditional foods such as tamales,
    mole, and salsas that he helps prepare. He participates in cultural celebrations like Día de los Muertos and Cinco de Mayo, where he assists with decorations and community events. His parents have instilled
    values of respect, hard work, and community support, encouraging him to stay connected with relatives in Mexico through video calls. This bicultural environment shapes his worldview, giving him pride
    in his heritage while also embracing the diverse, tech‑driven community of Silicon Valley.
