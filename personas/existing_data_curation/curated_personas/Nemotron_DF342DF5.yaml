  career_goals: Jose aims to turn his early technical curiosity into a professional career in the technology sector. He plans to attend a California university to major in Computer Science, focusing on
    software development and cybersecurity. By the time he graduates, he hopes to secure an entry‑level software engineering position at a Silicon Valley company where he can apply his bilingual skills
    to build tools that serve the Latino community. In the interim, he intends to earn industry‑recognized certifications such as CompTIA A+ and Google IT Support, and to obtain a summer internship at a
    local tech firm to gain real‑world experience.
