  career_goals: Alfredo aims to obtain his journeyman electrician license and eventually become a master electrician. He plans to start his own contracting business that specializes in innovative lighting
    designs and renewable‑energy installations for artistic and boutique commercial spaces. He is pursuing additional certifications in solar technology and seeks to blend his artistic interests with his
    trade by offering custom lighting solutions that enhance visual experiences. To support these ambitions, he intends to improve his organizational and project‑management skills through targeted training.
