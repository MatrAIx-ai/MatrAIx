personas:
  professional: Alfredo Salazar, a 28-year-old electrician with a flair for artistic lighting, blends their technical mastery of residential wiring, solar retrofits, and code compliance with a designer’s
    eye to craft custom illumination installations, while their spontaneous, competition-driven mindset often leads them to improvise on the job, and they sometimes miss project deadlines.
  sports: Alfredo Salazar, an avid outdoor enthusiast, plays weekly matches for the Salt Lake City Strikers soccer club, follows the Utah Jazz and Real Salt Lake with fervor, and they spend weekends hiking
    the Wasatch Mountains, where they combine cardio with a love for sunrise photography.
  arts: Alfredo Salazar channels their curiosity for visual culture into street photography inspired by Banksy and Frida Kahlo, they attend live shows featuring Los Angeles-based band Café Tacvba and indie
    folk act Sufjan Stevens, and they spend evenings crafting bespoke LED light fixtures that echo the aesthetics of contemporary installation artists like TeamLab.
  travel: Alfredo Salazar favors spontaneous, budget-conscious road trips to nearby natural wonders like Moab and the Great Basin, while they also map out a future adventure to Oaxaca’s Day of the Dead
    festivals, balancing their love for impulsive exploration with limited savings for overseas travel.
  culinary: Alfredo Salazar enjoys cooking at an intermediate level, perfecting traditional dishes such as chiles en nogada, carne asada tacos, and tamales, while they experiment with fusion creations like
    mole-marinated chicken ramen, favoring ingredients like ancho chilies, roasted corn, and fresh cilantro.
  core: Alfredo Salazar, 28, blends electric expertise with artistic flair, thrives on social spontaneity, but wrestles with organization, impulsive spending, and occasional health neglect, all while lighting
    up every room they enter.
background:
  cultural: Raised in a Mexican household, Alfredo grew up surrounded by family gatherings, music, and vibrant celebrations that emphasized community and perseverance. He is fluent in Spanish and English
    and maintains strong ties to his heritage through traditions like Día de los Muertos, Mexican cuisine, and participation in local Hispanic community events in Ogden. While embracing the outdoor, frontier
    spirit of Utah, he incorporates Mexican motifs, colors, and values into his personal and professional projects, creating a unique blend of cultural identity and regional influence.
