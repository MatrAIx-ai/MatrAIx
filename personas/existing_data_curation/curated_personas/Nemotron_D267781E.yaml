personas:
  professional: Julymar Puentes is a warehouse operative in Oklahoma City who leverages bilingual communication and proficiency with SAP Warehouse Management to streamline shipments while dreaming of a
    supervisory role that blends logistics efficiency with a passion for art handling.
  sports: Julymar Puentes enjoys hiking the prairie trails with the local Prairie Trail Runners Club, cheerfully follows the Oklahoma City Thunder in the NBA, and occasionally joins community soccer pick-ups,
    preferring flexible, low-pressure fitness over regimented workouts.
  arts: Julymar Puentes immerses themselves in Oklahoma City’s street-art scene, sketching murals inspired by the vivid colors of Frida Kahlo and the bold graphics of Shepard Fairey, attends gallery openings
    featuring works by local painter Rosa Luna, practices beginner guitar chords to the tunes of The Strokes and traditional folk ballads, and volunteers at a cultural center to organize Día de los Muertos
    celebrations.
  travel: Julymar Puentes favors spontaneous weekend road trips, having explored the rock formations of Turner Falls, the historic art districts of Santa Fe, and dreaming of a future immersion in the vibrant
    galleries of Mexico City and the architecture of Barcelona, while balancing travel with a limited student-loan budget that pushes them toward budget airlines and hostel stays.
  culinary: Julymar Puentes delights in cooking regional Mexican dishes such as cochinita pibil, enchiladas verdes, and handmade corn tortillas, experiments with chilies, masa, and fresh cilantro in their
    modest kitchen, and occasionally swaps recipes with friends over craft beer while admitting a habit of over-seasoning food to the point of teasingly calling themselves a ‘spice junkie’.
  core: Julymar Puentes is a curious, art-loving warehouse associate whose relaxed, slightly disorganized rhythm fuels a drive to blend logistics precision with creative ventures, even if it means occasional
    missed deadlines and over-caffeinated nights.
background:
  cultural: Julymar was raised in a Mexican-American household in Oklahoma City. Her parents emigrated from Veracruz and kept strong ties to Mexican traditions, celebrating Día de los Muertos, quinceañera
    rites, and cooking family recipes like mole and tamales. Bilingual at home, she grew up speaking Spanish with her family and English at school, giving her a fluid cultural navigation between Mexican
    heritage and Midwestern American life. She participates in local Latino community events, attends Mass on holidays, and enjoys the blend of Mexican street-art aesthetics with the city’s growing mural
    movement. This bicultural upbringing informs her values of family, community, and a deep appreciation for artistic expression.
attributes:
  skills: '["Forklift operation (certified)", "Pallet jack and hand truck handling", "Warehouse inventory management (barcode scanning, SAP WM)", "Safety compliance and OSHA regulations", "Material loading
    and unloading", "Basic equipment maintenance", "Bilingual communication (English/Spanish)", "Team coordination and conflict resolution", "Adaptability and problem-solving under time pressure", "Self-directed
    learning in logistics and technology"]'
  hobbies: '["Sketching murals", "Visiting galleries and museums", "Listening to music (Mexican folk, indie rock)", "Salsa dancing", "Hiking prairie trails", "Cooking Mexican cuisine", "Playing guitar (beginner)",
    "Volunteering at cultural events"]'
  career_goals: Julymar aims to move from frontline material moving into a supervisory logistics role within the next three years, targeting a certification in Certified Logistics Associate (CLA) and additional
    training in supply-chain analytics. She hopes to eventually become a warehouse manager where she can mentor new employees and implement innovative, sustainable material-handling practices. Long-term,
    she is interested in combining her love for art with her logistics expertise by working for an art-handling firm that transports gallery pieces and museum collections, or by launching a small business
    that offers specialized moving services for local artists and cultural events.
