  hobbies: '[''Pickup basketball and soccer'', ''Hiking in the Sierra foothills'', ''Organizing community barbecues'', ''Cooking fusion cuisine (Filipino/Chinese/Mexican)'', ''Attending cultural festivals'',
    ''Competitive board games (Settlers of Catan, chess)'', ''Local poker nights'', ''Following sustainable farming trends'']'
  career_goals: Steven aims to turn his practical know‑how into a small, locally‑focused landscaping and horticulture consulting business that serves homeowners and nearby farms in Tulare County. He plans
    to obtain a certification in sustainable horticulture within the next year to add credibility. At the same time, he wants to become a regular volunteer coordinator at the community center, using his
    sociable personality to run sports leagues and cultural festivals. Financially, his goal is to achieve a stable income that supports his independent lifestyle and eventually purchase a modest property
    with an organic garden. He also hopes to mentor younger community members, sharing his blend of hands‑on expertise and competitive drive.
