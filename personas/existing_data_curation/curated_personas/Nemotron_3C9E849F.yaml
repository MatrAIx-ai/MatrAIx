personas:
  professional: Steven Garcia, a hands‑on landscaper and DIY specialist, blends their carpentry, plumbing, and horticultural expertise with an outgoing, competitive streak to run a community‑focused consulting
    service while coordinating local sports tournaments, using bilingual fluency to connect with diverse homeowners.
  sports: Steven Garcia dominates pickup basketball at the local park, joins Saturday soccer matches, cheers for the Los Angeles Lakers and follows the San Antonio FC, and serves as a volunteer organizer
    for the Tulare County recreation league’s weekly tournaments, blending competitive drive with community camaraderie.
  arts: Steven Garcia immerses themselves in the rhythms of Cuban salsa at community festivals, enjoys the storytelling of Los Tigres del Norte, the modern beats of Jay Chou, and collects vintage vinyl
    records, using music as a soundtrack for cooking and board‑game nights.
  travel: Steven Garcia prefers weekend getaways to the Sierra foothills, having hiked the Sequoia National Forest trails, dreams of exploring the vineyards of Valle de Guadalupe, and alternates between
    spontaneous road trips to nearby farmer's markets and planned visits to the historic town of San Miguel de Allende.
  culinary: Steven Garcia crafts daring fusion dishes like kimchi‑taco al pastor, marinating pork in adobo before glazing it with mole sauce, combines calamansi‑lime zest into fresh salsas, and often grills
    pineapple skewers at barbecues, showcasing a bold palate, moderate cooking skill, and a love for flavor experimentation.
  core: Steven Garcia is a pragmatic, community‑oriented handyman‑turned‑entrepreneur who balances a competitive edge with a love for spontaneous gatherings, fusion cooking, and the great outdoors, all
    while navigating a laid‑back approach to planning.
background:
  cultural: Steven comes from a mixed Asian‑Hispanic background; his family’s roots trace back to the Philippines and Mexico, which is reflected in his surname Garcia and his middle name Badi. Raised in
    a bilingual household in Visalia, he grew up speaking both English and Spanish at home while also learning Tagalog from his grandparents. He celebrates a blend of traditions, from Lunar New Year gatherings
    with family to Mexican holidays such as Día de los Muertos and Cinco de Mayo. Living in Tulare County’s agricultural heartland, he has a strong connection to farm life and the region’s community‑oriented
    culture. This multicultural upbringing gives him a flexible worldview, an appreciation for diverse foods, and the ability to relate to a wide range of people in his neighborhood.
attributes:
  skills: '[''DIY home repair (carpentry, plumbing, electrical)'', ''Landscaping and orchard maintenance'', ''Basic auto and small‑engine maintenance'', ''Community event coordination'', ''Bilingual communication
