  career_goals: Dominga aims to secure a full-time role that blends her analytical expertise with her passion for community impact. In the short term she seeks a data analyst or junior project manager position
    within a healthcare organization or a technology firm that serves underserved populations in the Bronx, where she can apply her data-driven approach to improve health outcomes and resource allocation.
    She aspires to obtain professional certifications in data analytics (e.g., Google Data Analyst) and project management (e.g., PMP) within the next two years, building a clear path toward a senior analyst
    or program manager role. Long-term, she envisions leading a department that designs data-centric solutions for public-health initiatives, while also mentoring Latinx youth interested in STEM careers.
    A structured, supportive workplace that offers mental-health resources and clear advancement criteria is critical to her sustained success.
