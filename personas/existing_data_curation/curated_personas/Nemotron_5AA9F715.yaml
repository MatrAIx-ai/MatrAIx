personas:
  professional: Dominga Alvarez blends her solid Python and R expertise with meticulous project coordination to deliver data‑driven solutions for Bronx healthcare providers, translating complex analytics
    into clear, bilingual insights that empower community stakeholders.
  sports: Dominga Alvarez fuels her love for movement through salsa and reggaeton classes at a Bronx community center, cheers on the New York Knicks and the New York Yankees during game nights, and adds
    a weekly jog through Pelham Bay Park to her fitness regimen.
  arts: Dominga Alvarez immerses herself in the rhythms of Bad Bunny and Rosalía, devours sci‑fi classics such as Liu Cixin’s "The Three‑Body Problem", and frequents local spoken‑word open‑mic events where
    she occasionally performs her own verses about code and community.
  travel: Dominga Alvarez plans weekend escapes to the Catskills for hiking, city trips to Washington, D.C. for museums, and dreams of an immersive cultural tour of Oaxaca to explore its culinary and dance
    traditions.
  culinary: Dominga Alvarez spends evenings perfecting tamales and mole with healthier twists—using quinoa and extra vegetables—while also mastering avocado toast variations, and she enjoys testing new
    spice blends and sharing meals with neighbors at potluck gatherings.
  core: Dominga Alvarez is a structured yet socially vibrant data enthusiast who channels her anxiety into disciplined routines, passionate dancing, and community‑focused cooking, all while juggling a love
    for sci‑fi and a habit of over‑planning every detail.
background:
  cultural: Dominga was raised in a Mexican-American household in the Bronx, where Spanish was spoken at home and family gatherings centered around traditional celebrations like Día de los Muertos, Navidad,
    and quinceañera milestones. Her parents immigrated from Jalisco, bringing with them a strong sense of familial duty, community solidarity, and pride in Mexican heritage. Growing up in a multicultural
    neighborhood, Dominga blends those cultural values with the dynamic, urban rhythm of New York City. She participates in local cultural festivals at the Bronx River, volunteers at organizations that
    support Latinx immigrants, and maintains close ties with extended family both in the United States and Mexico. This bicultural perspective informs her linguistic fluency, culinary tastes, and commitment
    to giving back to the community that shaped her identity.
