personas:
  professional: George Bonifacio is a seasoned broadcast audio and lighting technician whose decade‑long hands‑on mastery of Pro Tools, Dante networking, and DMX rig programming blends a curious tinkerer’s
    mindset with a pragmatic, reliability‑first approach to live‑mixing and event production.
  sports: George Bonifacio spends weekend mornings fishing the Missouri River with the local Anglers' Association and evenings hiking the Ozark foothills, while also cheering on the Kansas City Chiefs and
    St. Louis Cardinals and maintaining a light‑weight routine at the community gym two times a week.
  arts: George Bonifacio builds model‑railroad dioramas, records synth‑laden tracks in a modest home studio, and devours classic film sound design, drawing inspiration from Pink Floyd, John Carpenter’s
    scores, and the pioneering work of Brian Eno.
  travel: George Bonifacio prefers low‑key road trips that combine music‑scene stops in Nashville and Austin with scenic hikes in the Great Smoky Mountains, and they keep a wish list that includes a week‑long
    immersion in New Orleans’ jazz culture and a weekend getaway to the Grand Canyon.
  culinary: George Bonifacio enjoys crafting Kansas City‑style burnt‑end ribs, simmering a tangy bourbon‑infused BBQ sauce, and occasionally experimenting with homemade kimchi, while their cooking skill
    sits at confident home‑chef level, often sharing meals at low‑key game‑night gatherings.
  core: George Bonifacio is a methodical tinkerer who balances a quiet love for vintage audio restoration with a steady, detail‑driven work ethic, punctuated by occasional indulgent splurges on gear and
    a habit of over‑checking signal paths before sleep.
background:
  cultural: George comes from an Italian‑American family that settled in Missouri during the early 20th century. Though his household primarily spoke English, family gatherings often featured Italian dishes
    and occasional phrases that kept his heritage alive. Raised in the modest, community‑oriented values of the Midwest, he inherited a strong work ethic, a respect for reliability, and a preference for
    practical problem‑solving. He is a regular attendee of his local Catholic parish, which reinforces a sense of service and community involvement. Living in Jefferson City, the state capital, has exposed
    him to a blend of governmental stewardship and small‑town camaraderie, shaping his balanced outlook that values both tradition and measured innovation.
attributes:
  skills: '[''Audio mixing (digital consoles, Pro Tools, Livewire)'', ''Live sound reinforcement for events'', ''DMX lighting programming and automation'', ''LED video wall integration'', ''Signal routing
    and patch‑bay management'', ''Networked A/V systems (Dante, AVB)'', ''Broadcast compliance and FCC regulations'', ''Equipment maintenance and troubleshooting'', ''Stage rigging fundamentals'', ''Crew
    training and safety protocols'']'
  hobbies: '[''Home recording and music production'', ''DIY electronics and equipment repair'', ''Fishing on the Missouri River'', ''Hiking in the Ozarks'', ''Model railroad building'', ''Watching classic
    films and analyzing sound design'', ''Local makerspace workshops'', ''Volunteer technical support for community theater'', ''Reading science‑fiction literature'']'
  career_goals: George aims to transition from a hands‑on technician role to a senior technical director or broadcast operations manager within the next five years. He is pursuing an AVIXA CTS‑M certification
    and plans to complete an associate’s degree in audio‑visual technology to solidify his theoretical foundation. His long‑term ambition is to establish a boutique AV consulting firm that provides end‑to‑end
    production services for community events, local theater, and small‑scale television productions across central Missouri. He also hopes to mentor the next generation of broadcasters through apprenticeship
    programs at the station and local technical schools, leveraging his practical experience to foster a culture of reliability and innovation.
