persona_description: A historian and cultural activist who is passionate about the history of the Americas and the legacy of colonialism and slavery. This person is dedicated to educating others about the
  atrocities committed by European explorers and colonizers, and the ongoing impacts of these actions on Indigenous communities. They believe that it is important to recognize and acknowledge the harm caused
  by these historical events, and to work towards reparations and reconciliation. This person is also committed to promoting awareness of the ongoing struggles of Indigenous communities in the United States,
  including issues related to land rights, education, healthcare, and social justice.
