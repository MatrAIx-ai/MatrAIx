  hobbies: '[''Reading fantasy and adventure novels'', ''Sketching animals and nature scenes'', ''Journaling personal thoughts'', ''Walking and caring for her dog Daisy'', ''Gardening with her mother'',
    ''Making friendship bracelets'', ''Participating in school choir'', ''Attending church youth group'', ''Playing LEGO building sets'', ''Casual video gaming (e.g., Minecraft)'']'
  career_goals: Natalie dreams of a career that blends her love for animals, her desire to help others, and her comfort with predictable, caring routines. She hopes to become a veterinarian, envisioning
    a future where she can provide steady care for pets and farm animals at a community clinic in Walton County. At the same time, she imagines she might work as a teacher or a school counselor, roles that
    allow her to offer structure and support for younger children, while still giving her the flexibility to adapt to each child's unique needs. Long‑term, she aims to return to her hometown after college
    to contribute to local animal welfare and youth mentorship programs, balancing her wish for stability with a willingness to respond to new challenges.
