  hobbies: '[''Fishing'', ''Gardening'', ''Church Choir Singing'', ''Bridge Games'', ''Storytelling Circle'', ''Southern Cooking'', ''Genealogy Research'', ''Road Trips to State Parks'']'
  career_goals: Although retired, Matthew aims to stay active and healthy so he can continue participating in community life and supporting his wife. He aspires to document his family's history and preserve
    oral traditions for future generations. He hopes to expand his volunteer work, especially mentoring youth at the local senior center and assisting the church's outreach programs. Matthew also plans
    occasional road trips to historic Southern sites and values leaving a legacy of service, kindness, and practical skill that his grandchildren can inherit.
