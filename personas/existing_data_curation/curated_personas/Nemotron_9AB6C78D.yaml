  career_goals: Coleman aims to enroll in a specialized art and design program after high school, with the long‑term goal of becoming a graphic designer or concept artist for video games. He plans to build
    a professional portfolio that showcases his blend of artistic vision and systematic workflow, eventually moving toward a creative director or UX‑design role. He also hopes to leverage his communication
    strengths to mentor younger students and incorporate mental‑wellness initiatives into collaborative creative projects, ensuring his future work supports both artistic excellence and emotional health.
