  hobbies: '["Basketball", "Live Music (R&B & Jazz) Concerts", "Soul Food Cooking", "Grilling with Friends", "Community Volunteering (Youth Mentorship)", "Church Choir", "Hiking (Rock Creek Park)", "Reading
    Leadership & Self‑Help Books", "Documentary Streaming (African‑American History)", "Traveling to Family Gatherings", "Board Games"]'
  career_goals: Thomas aspires to advance into senior leadership, aiming for a Director of Operations or Vice President of Operations role within the next five years. He plans to obtain a PMP certification
    and pursue Six Sigma training to bolster his process‑improvement credentials. He seeks to lead larger, multi‑site operations, implement more structured planning frameworks to reduce his own stress,
    and mentor emerging talent, especially from underrepresented backgrounds. Additionally, Thomas wants to champion corporate social responsibility initiatives that support local community programs in
    Prince George's County, aligning his professional growth with his family’s long‑term financial stability and work‑life balance.
