  hobbies: '["Sketching and watercolor painting", "Visiting art galleries and museums", "Landscape and architecture photography", "Reading modern art, philosophy, and speculative fiction", "Listening to
    design and innovation podcasts", "Playing chess", "Collecting vintage postcards", "Home brewing", "Volunteering at the local library", "Hiking local nature trails"]'
  career_goals: Joseph aims to leverage his retail experience to advance into a supervisory or store‑manager role within the next three to five years, pursuing online courses in business management to solidify
    his leadership skills. Concurrently, he wants to integrate his passion for art by curating a small, community‑focused gallery or café that showcases local artists, merging his competitive drive for
    operational excellence with his creative interests.
