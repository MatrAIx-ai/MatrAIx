  hobbies: '[''Hiking multi‑use trails in Box Elder County'', ''Gardening with a focus on native plants'', ''Knitting and crocheting handmade items for charity'', ''Experimenting with new farm‑to‑table
    recipes'', ''Participating in a local book club'', ''Volunteering at the Brigham City community shelter'', ''Reading mystery and psychology books'']'
  career_goals: Martha aims to transition from frontline support to a supervisory role where she can shape team culture around empathy and efficiency. She plans to earn a Certified Customer Service Professional
    credential and enroll in part‑time business management courses at a local community college. Long‑term, she hopes to design and lead a customer‑experience training program that blends practical service
    skills with psychological insight, ultimately positioning herself for a quality‑assurance or customer‑success manager role within a growing regional company or nonprofit organization.
