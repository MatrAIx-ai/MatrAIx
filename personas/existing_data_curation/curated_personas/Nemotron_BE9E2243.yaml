  hobbies: '["Visiting art museums and galleries", "Reading historical non-fiction", "Listening to jazz and blues", "Playing chess at the community center", "Gardening heirloom vegetables", "Nature photography",
    "Cooking traditional Southern dishes", "Walking nature trails", "Participating in local book clubs", "Genealogy research"]'
  career_goals: In his retirement, Adrianna seeks to leave a lasting legacy by documenting oral histories of the local African-American community, compiling a memoir, establishing a neighborhood art appreciation
    circle, and creating a mentorship program for teens interested in trades and the arts. He aims to volunteer as a docent at the Oneida County Historical Society, contribute his photography to local exhibitions,
    and travel to major art institutions to deepen his own understanding of art.
