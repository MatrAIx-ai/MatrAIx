personas:
  professional: Adrianna Montgomery, a retired community leader turned volunteer docent, channels their lifelong woodworking, oral storytelling, and genealogical research into documenting oral histories
    of local elders, curating neighborhood art circles, and mentoring teens in trades, embodying a curious yet organized, cooperative‑assertive approach that blends meticulous record‑keeping with spontaneous
    storytelling.
  sports: Adrianna Montgomery enjoys daily walks along nearby nature trails, cheerfully follows the Syracuse Orange basketball team and the New York Mets during baseball season, participates in a senior
    softball league each summer, and attends the local high school Knights football games, balancing gentle exercise with spirited community sports fandom.
  arts: Adrianna Montgomery, an avid lover of jazz and blues, spends evenings listening to Miles Davis, B.B. King, and Ella Fitzgerald while curating a personal collection of Jacob Lawrence prints and Ansel
    Adams photographs, frequently visits the Oneida County Historical Society and the Metropolitan Museum of Art, and contributes their own nature photography to local exhibitions, illustrating a curious
    and open‑minded artistic sensibility.
  travel: Adrianna Montgomery prefers meticulously planned trips that blend art exploration with comfortable pacing, having visited the Met in New York City, the Getty Center in Los Angeles, the historic
    Biltmore Estate in Asheville, and the Savannah Historic District, while dreaming of a future pilgrimage to the Louvre in Paris, all undertaken within a modest budget and often accompanied by a small
    group of interested grandchildren.
  culinary: Adrianna Montgomery whips up authentic Southern and Creole dishes such as shrimp and grits, gumbo with heirloom okra, collard greens seasoned with smoked turkey, and pecan pie, favoring home‑grown
    heirloom tomatoes and sweet potatoes, and approaches cooking with a meticulous, almost ritualistic care that mirrors their woodworking precision.
  core: Adrianna Montgomery blends a steadfast curiosity and meticulous habit with a love for Southern storytelling, garden‑grown meals, and community mentoring, all while occasionally indulging in nostalgic
    chess set upgrades.
background:
  cultural: Adrianna is a Black American whose family participated in the Great Migration from the rural South to upstate New York in the 1920s. He grew up in Rome, NY, immersed in the traditions of the
    African-American church, gospel music, and Southern culinary heritage, while also adapting to the working-class culture of the region. His life witnessed the civil‑rights movement, the evolution of
    local community activism, and the blending of Southern and Northern cultural influences. He carries forward a strong sense of resilience, storytelling, and communal responsibility that reflects both
    his Southern roots and his decades of life in the Oneida County community.
attributes:
  skills: '["Woodworking", "Oral storytelling", "Community event coordination", "Basic computer use", "Gardening", "Historical research", "Photography", "Cooking (Southern & Creole cuisine)", "Mentoring
