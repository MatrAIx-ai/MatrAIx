  hobbies: '[''Visiting art galleries and murals'', ''Sketching and watercolor painting'', ''Listening to Mexican folk and jazz music'', ''Reading historical biographies and novels'', ''Yoga and mindfulness
    meditation'', ''Small‑group cooking gatherings'', ''Volunteering at community cultural festivals'', ''Neighborhood clean‑up activities'']'
  career_goals: Mariana aims to expand her role beyond everyday taxi driving by creating curated cultural tours that highlight the art, history, and Mexican heritage of the Inland Empire. She plans to obtain
    a certification in driver training and community arts management, enabling her to mentor new drivers and guide small groups on themed excursions. Additionally, she hopes to establish a cooperative ride‑share
    service focused on serving senior citizens and families, providing reliable transportation while fostering a supportive work environment that prioritizes emotional well‑being. Long‑term, Mariana envisions
    opening a modest community art space where she can host local artists, conduct workshops, and continue integrating her passion for art with her transportation expertise.
