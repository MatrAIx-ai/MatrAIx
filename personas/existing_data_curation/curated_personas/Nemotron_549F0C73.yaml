personas:
  professional: Eleuterio Vazquez, a budding 11‑year‑old game designer and comic artist, merges their love for soccer strategy, LEGO engineering, and Scratch programming into interactive stories, while
    their spontaneous nature often leads to missed deadlines and half‑finished projects.
  sports: Eleuterio Vazquez, a dedicated midfielder on the Passaic County Youth Soccer Club, spends afternoons perfecting dribbles and shooting while idolizing the New York Red Bulls, and they also follow
    the San Antonio Spurs for tactical inspiration, yet often feels pressure to win during weekend scrimmages.
  arts: Eleuterio Vazquez, an avid comic sketcher who frequently draws panels inspired by Spider‑Man and Naruto, and who jams to Peruvian cumbia legends Los Destellos, huayno star Eva Ayllón, and reggaeton
    hits by Pedro Suárez Vértiz while crafting LEGO narratives, reflects an eclectic artistic palate.
  travel: Eleuterio Vazquez enjoys weekend hikes in Highland Lakes State Park and dreams of exploring Machu Picchu and the vibrant streets of Lima, while also hoping to experience the thrills of a Disney
    World vacation, balancing school schedule constraints with family‑budget travel plans.
  culinary: Eleuterio Vazquez loves cooking simple dishes like arroz con pollo and papa a la huancaina alongside their mother, experimenting with ingredients such as aji amarillo, quinoa, and fresh cilantro,
    and often pairs the meals with upbeat cumbia beats while occasionally burning the toast in their rush to finish homework.
  core: Eleuterio Vazquez is a curious, competitive 11‑year‑old who blends soccer, LEGO engineering, and comic sketching with a love for Peruvian rhythms, but often wrestles with procrastination and worries
    about meeting expectations.
background:
  cultural: 'Eleuterio was born in Haledon, New Jersey, to parents who immigrated from Peru in the early 2010s. At home, Spanish is spoken alongside English, and he celebrates both Peruvian and American
    holidays. His family originates from the coastal region of Lima and the highlands of Arequipa, which means he grew up tasting a mix of ceviche, causa, and roasted cuy—dishes often prepared during family
    gatherings. The Vazquez household keeps Peruvian traditions alive: they celebrate Independence Day on July 28 with dancing to cumbia and huayno, and they observe Inti Raymi, the ancient Sun Festival,
    in the summer. In Passaic County, Eleuterio attends a public elementary school where he participates in a bilingual program and interacts with a diverse Latino community. The blend of his heritage and
    his New Jersey upbringing gives him a bicultural perspective, influencing his language, food preferences, music taste, and the pride he feels in sharing his culture with classmates.'
attributes:
  skills: '[''Basic arithmetic and pre-algebra'', ''Reading comprehension (English & Spanish)'', ''Basic Spanish fluency'', ''Introductory coding with Scratch'', ''LEGO construction and problem-solving'',
    ''Soccer ball handling'', ''Sketching and cartoon drawing'', ''Simple cooking tasks (e.g., making empanadas)'', ''Strategic video game play (e.g., Mario Kart)'']'
  hobbies: '[''Soccer'', ''LEGO building'', ''Scratch programming'', ''Video games (Mario Kart, Minecraft)'', ''Comic book drawing'', ''Listening to Peruvian music'', ''Cooking traditional dishes with family'',
    ''Exploring parks and nature'', ''Reading graphic novels'', ''Simple science experiments'']'
  career_goals: Although he is only eleven, Eleuterio already imagines a future where he can blend his love of building, technology, and his cultural roots. He hopes to become a robotics engineer or a video-game
    designer, dreaming of creating games that teach players about Peruvian history and science. He also entertains the idea of a culinary career, inspired by his mother's cooking, and would love to open
    a small restaurant that serves modern twists on traditional dishes like ceviche and causa. At school he aims to win the regional science-fair with a project that combines simple robotics and environmental
    monitoring. His competitive streak drives him to be among the top in his math class and to lead his soccer team to a championship, while his practical side wants his work to have real-world impact.
