persona_description: A palaeontologist who specializes in the study of ichthyosaurs, particularly the Late Triassic period. His expertise lies in the identification and reidentification of fossils, particularly
  those that have been previously identified as belonging to dinosaur-like creatures. He is known for his meticulous attention to detail and his ability to accurately interpret and understand the evidence
  available to him. He is also interested in the evolution of life on Earth and the role of ichthyosaurs in the history of the planet.
