  hobbies: '[''Hiking'', ''Volunteer food drives'', ''Book club'', ''Recreational volleyball'', ''Cooking and baking'', ''Reading contemporary fiction'', ''Live music concerts'', ''Photography'', ''Yoga'',
    ''DIY home‑decor crafts'']'
  career_goals: Looking ahead, Amanda aims to transition from sales associate to store manager within the next two years, pursuing a bachelor's degree in business administration part‑time to strengthen
    her managerial toolkit. She is eager to lead a team, streamline store operations, and implement customer‑experience initiatives that blend her curiosity for new retail technologies with practical, results‑driven
    processes. In the longer term, she envisions moving into regional management or opening her own boutique that highlights locally sourced products, allowing her to combine her love for community engagement
    with entrepreneurial ambition.
