personas:
  professional: Eliseo Ciesla, a budding engineer‑in‑training, channels a love for structure and hands‑on problem solving into building elaborate LEGO creations that blend kit instructions with original
    designs, while their practical yet occasionally disorganized mindset fuels a curious, competitive approach to mastering new building challenges.
  sports: Eliseo Ciesla thrives on the fast‑paced competition of local park soccer games, proudly wears the New England Revolution jersey, practices with the Merrimack Youth Soccer Club, and they balance
    the physical rigor with a habit of stretching and collecting river rocks for post‑match relaxation.
  arts: Eliseo Ciesla immerses in comic‑style doodling inspired by Stan Lee and Jack Kirby, enjoys adventure books by Roald Dahl, and occasionally watches animated films like Studio Ghibli’s My Neighbor
    Totoro for artistic inspiration, while they playful imagination colors their LEGO creations.
  travel: Eliseo Ciesla prefers family road trips that blend adventure and education, having visited the Smithsonian in Washington, D.C., and the historic Old Port of Portland, Maine, while dreaming of
    a future visit to the Grand Canyon’s bright rock formations and the bustling streets of Tokyo, and they balance excitement with the comfort of familiar routines.
  culinary: Eliseo Ciesla loves the cheesy comfort of homemade mac and cheese, the crisp bite of pizza topped with pepperoni, and delights in gathering river‑found smooth stones as a quirky garnish for
    a pretend 'rocky road' dessert, though they often forget to finish vegetables on their plate.
  core: Eliseo Ciesla merges a competitive soccer spirit with meticulous LEGO engineering, navigates the world with pragmatic curiosity, occasional disorganization, and a skeptical eye toward others’ motives,
    and they become a uniquely focused yet delightfully unpredictable young explorer.
background:
  cultural: Eliseo comes from a Polish‑American family that settled in Lowell generations ago. His grandparents passed down traditions such as making pierogi for holidays and celebrating Polish Name Days,
    while his parents also emphasize mainstream American customs like Thanksgiving and Fourth of July fireworks. Growing up in a historically diverse mill city, he is exposed to a mix of languages and cuisines,
    though his household primarily speaks English and maintains a modest Catholic faith. This blend of Eastern European heritage and suburban New England upbringing shapes his worldview, giving him an appreciation
    for community events, local history, and the practical values his parents instill.
attributes:
  skills: '[''Reading comprehension (grade 2 level)'', ''Basic arithmetic (addition/subtraction up to 20)'', ''LEGO construction'', ''Tablet navigation for educational apps'', ''Neighborhood geography memory'',
    ''Competitive board game strategy'', ''Basic soccer dribbling'']'
  hobbies: '[''LEGO building'', ''Soccer'', ''Reading adventure books'', ''Drawing comic doodles'', ''Playing puzzle video games'', ''Rock collecting'', ''Exploring local parks'']'
  career_goals: Eliseo dreams of a future where he can help people in concrete ways. He often talks about becoming a firefighter because he admires the clear structure, teamwork, and immediate impact of
    the job. He also shows interest in building and engineering, imagining himself as a construction worker or a mechanical engineer who designs bridges. In the short term, he aims to earn a gold star in
    reading, become class line leader, and lead his soccer team to victory in the school league, believing these achievements will pave the way toward his long‑term ambitions.
