  hobbies: '[''Fishing'', ''Gardening'', ''Listening to R&B & Jazz'', ''Community Basketball'', ''Church Choir & Events'', ''Cooking Soul Food with Caribbean Influences'', ''Restoring Vintage Sewing Machines'',
    ''Reading Historical Biographies'', ''Following Sustainable Fashion Trends'']'
  career_goals: John aims to advance to a lead‑operator or shift‑supervisor role at his plant, where he can shape workflow improvements and oversee staff training. He plans to earn his GED and enroll in
    a community‑college certificate program in textile technology to broaden his technical knowledge. Over the next few years, he hopes to launch a modest side venture offering custom alterations and handcrafted
    garments for neighbors, leveraging his expertise and community connections. He also aspires to become a formal mentor in a local after‑school program that introduces sewing skills to youth, giving back
    to the Opa Locka community. In the longer term, John is focused on achieving a stable retirement fund while maintaining an active presence in his family and church life.
