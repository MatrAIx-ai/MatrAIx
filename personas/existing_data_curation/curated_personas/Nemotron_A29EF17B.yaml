  career_goals: Elizabeth aims to step into a senior strategic leadership role where she can shape organizational decision‑making through data‑driven storytelling and innovative analytics. She aspires to
    lead an analytics or operations‑research department, mentor emerging talent, and champion interdisciplinary projects that blend quantitative rigor with creative insights. To solidify her expertise,
    she plans to earn a professional certification such as the INFORMS Certified Analytics Professional and complete a bachelor’s degree in data science. Additionally, she hopes to launch community initiatives
    in Charlotte that promote data literacy and integrate art with analytics, fostering a culture of collaborative problem‑solving and inclusive innovation.
