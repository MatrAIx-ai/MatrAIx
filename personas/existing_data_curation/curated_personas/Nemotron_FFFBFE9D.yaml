  hobbies: '["Gardening", "Reading (historical fiction and biographies)", "Crossword puzzles", "Sudoku", "Quilting", "Knitting", "Photography", "Attending small community lectures", "Travel blogging"]'
  career_goals: Although retired from formal employment, Caitlin aims to stay intellectually active and contribute to her community. She plans to mentor younger volunteers at the local senior center, develop
    a small guidebook on low-maintenance gardening for retirees, and deepen her digital fluency by learning advanced photo editing for documenting her garden. She also aspires to travel to historic coastal
    towns in California and share her experiences through a personal blog.
