  career_goals: Although retired from formal employment, Franklin aims to channel his engineering expertise into community initiatives. He plans to design and launch a sustainable community garden at his
    local church, integrating rain‑water harvesting and IoT‑based soil monitoring. He also aspires to develop a small workshop where he can teach woodworking and basic electronics to high school students,
    fostering a pipeline of locally skilled makers. On a personal level, he wants to master advanced home‑automation platforms, document his family’s traditional recipes in a bilingual cookbook, and embark
    on a yearly trip to his hometown in Mexico to preserve cultural ties. Ultimately, Franklin seeks to leave a lasting legacy of practical knowledge and cultural heritage for his grandchildren and the
    wider Guadalupe community.
