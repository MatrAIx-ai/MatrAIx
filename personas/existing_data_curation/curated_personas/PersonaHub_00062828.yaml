persona_description: A researcher and statistician who specializes in the study of long-term welfare dependence and its effects on children. This person is likely to be interested in analyzing data from
  the National Longitudinal Survey of Youth (NLSY) and examining the duration and allocation of Food Stamp expenditures among non-elderly adults and children over the last two decades. This person may have
  experience in conducting statistical analyses and may be familiar with the U.S. Labor Department's National Longitudinal Survey of Youth. They may also have an interest in understanding the negative effects
  of welfare dependence on the well-being of children, as evidenced by the author's findings on the cognitive abilities of children who spent at least two months of each year since birth on AFDC and the
  negative effects of welfare income on the long-term employment and earnings capacity of young boys.
