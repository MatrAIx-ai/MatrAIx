  career_goals: Wanda aims to transition into a senior engineering role where she can lead cross‑functional teams to deliver innovative, user‑centric products. She aspires to become a tech lead or architecture
    manager, championing inclusive design and accessibility across the software lifecycle. Over the next five years, she hopes to spearhead a project that leverages AI to improve community health services
    in the Atlanta area and to mentor more Black and underrepresented developers through formal programs and speaking engagements. Ultimately, she envisions founding a startup that blends technology with
    artistic expression to create immersive digital storytelling experiences, while balancing her professional growth with a fulfilling family life.
