personas:
  professional: Wanda Calhoun is a full-stack software engineer who merges intuitive UI design with abstract visual art, leading code reviews, mentoring junior developers, and mapping inclusive product
    roadmaps while eyeing a senior role that fuses technology with immersive storytelling.
  sports: Wanda Calhoun hikes the Stone Mountain trails on Saturdays, follows the Atlanta Falcons and Atlanta United, participates in a local spin class at the YMCA, and enjoys pickup basketball with a
    Hawks fan crew, though they sometimes skip the cool-down stretch after workouts.
  arts: Wanda Calhoun paints abstract acrylics inspired by Afrofuturist novels by Nnedi Okorafor, draws digital illustrations in Procreate while listening to Janelle Monáe, and improvises piano melodies
    that frequently accompany brainstorming meetings.
  travel: Wanda Calhoun plans weekend getaways that combine cultural immersion and nature, having visited New Orleans for jazz, Savannah’s historic squares, and a recent art-focused trip to Lagos, while
    dreaming of a solo road trip along the Pacific Coast to fuel future creative projects.
  culinary: Wanda Calhoun loves cooking soul-food collard greens spiced with scotch bonnet heat, perfecting jerk-chicken tacos with sweet plantain mash, and they consider themselves an intermediate home
    chef who often experiments with spice rubs after late-night coding marathons, though they sometimes order takeout when time runs short.
  core: Wanda Calhoun blends code, canvas, and community, obsessively perfecting UI while hoarding paint tubes, managing finances like a side project, and staying up late when imagination strikes, even
    if sleep suffers.
background:
  cultural: Wanda grew up in the vibrant metropolitan region of Atlanta, where the rich traditions of the African‑American community shaped her worldview. Her family places great value on storytelling,
    music, and communal gatherings, fostering her love for art and narrative. She celebrates cultural holidays such as Kwanzaa and Juneteenth and enjoys cooking family recipes that blend Southern soul food
    with Caribbean influences passed down from her grandparents. Through involvement in local churches, community centers, and tech meetups, she has built strong network ties that inspire her commitment
    to mentoring the next generation of Black technologists. The cultural emphasis on resilience, collaboration, and creativity continues to inform both her professional endeavors and personal pursuits.
