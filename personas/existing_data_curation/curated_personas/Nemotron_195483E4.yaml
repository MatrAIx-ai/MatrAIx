    in elementary education'', ''Conflict resolution and mediation'']'
  hobbies: '[''Watercolor painting'', ''Handcrafted papel picado creation'', ''Cooking traditional Mexican cuisine'', ''Playing acoustic guitar'', ''Singing folk songs'', ''Reading contemporary fiction
    and poetry'', ''Listening to philosophy podcasts'', ''Yoga and mindfulness meditation'', ''Hiking in the Franklin Mountains'', ''Volunteering at a community storytelling club'', ''Participating in a
    bilingual book club'']'
  career_goals: Maria aspires to become a curriculum specialist focusing on bilingual STEM and arts integration, aiming to design district‑wide programs that celebrate cultural diversity while promoting
    inquiry‑based learning. She plans to pursue a master's degree in Educational Leadership to eventually serve as a school administrator or counselor, where she can champion mental‑health initiatives for
    both students and staff. Additionally, she dreams of launching a community arts workshop that offers after‑school creative programs for children of immigrant families, fostering both cultural pride
    and personal expression.
