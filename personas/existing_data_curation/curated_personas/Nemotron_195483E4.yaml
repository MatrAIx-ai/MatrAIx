personas:
  professional: Maria Palma, a 43‑year‑old bilingual elementary and middle‑school teacher in El Paso, designs project‑based STEM and arts units that fuse watercolor illustration and storytelling; they balance
    meticulous lesson planning with spontaneous classroom improvisation, using mindfulness circles to calm intense emotions and model empathy for their students.
  sports: Maria Palma, a 43‑year‑old outdoor enthusiast, hikes the Franklin Mountains every weekend, plays casual soccer with the El Paso Locomotive FC women's recreational league, and follows the Dallas
    Mavericks and El Paso Chihuahuas for a splash of professional sports excitement.
  arts: Maria Palma, a 43‑year‑old watercolorist, creates vivid seasonal scenes inspired by Día de los Muertos altars and paints papel picado for local festivals, while strumming acoustic guitar to the
    folk melodies of Lila Downs and the classic boleros of José Alfredo Jiménez; they quote Frida Kahlo in their classroom and devour poetry collections by Ocean Vuong.
  travel: Maria Palma, a 43‑year‑old traveler, enjoys meticulously planning road trips to cultural hotspots like Guanajuato, Oaxaca, and Santa Fe, while dreaming of a solo trek through Patagonia and a spring
    visit to Kyoto’s cherry‑blossom gardens; budget constraints sometimes limit international adventures, so they often explore nearby New Mexico’s art colonies.
  culinary: Maria Palma, a 43‑year‑old home cook, excels at preparing mole poblano, cochinita pibil, and tamales using dried chilies, achiote, and epazote, and they love experimenting with regional ingredients
    like huitlacoche; they host monthly potlucks where friends rave about their fresh guacamole with toasted pepitas.
  core: Maria Palma, a 43‑year‑old bilingual educator, channels boundless imagination into teaching, art, and community, while battling intense anxiety that they soothe with yoga, yet sometimes overindulge
    in specialty cooking supplies and impulsive travel dreams.
background:
  cultural: Maria’s Mexican heritage is a cornerstone of her identity; she grew up celebrating Día de los Muertos, quinceañeras, and regional festivals, preserving a rich tapestry of language, music, and
    culinary traditions. Living in El Paso, she navigates a vibrant bicultural landscape where Mexican and American influences intersect, allowing her to serve as a cultural bridge for her students and
    community. She values familial ties, communal solidarity, and the stories of ancestors, often incorporating folklore and oral histories into her teaching to honor her roots while fostering a sense of
    belonging among the diverse learners she serves.
attributes:
  skills: '[''Bilingual (Spanish‑English) instruction'', ''Curriculum development with art integration'', ''Project‑based learning facilitation'', ''Inclusive classroom management'', ''Social‑emotional
