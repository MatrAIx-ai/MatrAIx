  hobbies: '["Abstract watercolor painting","Community theater acting/directing","Creative writing circles","Hiking in Uintah Mountains","Folk music festivals","Quilting and textile crafts","Reading mythology
    and speculative fiction","Yoga and mindfulness meditation"]'
  career_goals: Melissa aims to expand her impact beyond her own classroom by becoming a curriculum coordinator or teacher‑coach who champions arts‑integrated, student‑centered learning across the Duchesne
    County school district. She plans to earn a bachelor’s degree in elementary education and pursue a master’s in curriculum development, allowing her to design district‑wide programs that nurture curiosity
    and creativity. Over the next five years, she hopes to publish a series of lesson‑plan guides, present at regional education conferences, and eventually take on a principal role that emphasizes a supportive,
    harmonious school culture.
