  hobbies: '[''Hiking'', ''Nature Photography'', ''Reading (Science Fiction, Psychology)'', ''Acoustic Guitar'', ''Coding Small Projects (Python)'', ''Meditation'', ''Journaling'', ''Community Gardening'']'
  career_goals: Marty aims to become a leader in integrating technology with social services, developing data‑driven mental health programs for youth in Ingham County. He plans to obtain his clinical social
    work license and pursue a doctorate in social work or public health to deepen his research skills. Long‑term, he aspires to direct a community mental health initiative that leverages digital platforms
    for outreach and outcome tracking, while also advocating for policies that address systemic barriers to mental health care.
