personas:
  professional: Marty Roper is a data‑savvy social worker who blends R and SPSS analytics with crisis‑intervention expertise, using their curiosity and practical mindset to build evidence‑based mental‑health
    programs while their spontaneous, flexible style sometimes clashes with the rigid reporting deadlines of grant‑funded projects.
  sports: Marty Roper enjoys early‑morning hikes along the shores of Lake Michigan in the summer, joins a local pickup basketball league at the community center, follows the Detroit Lions and Michigan Wolverines
    football teams, and in the winter trades the trail for cross‑country skiing with the Ann Arbor Nordic Club.
  arts: Marty Roper strums acoustic guitar for a small circle of friends, captures forest scenes with a Canon EOS R7, draws inspiration from indie folk artists like Bon Iver and Sufjan Stevens, and unwinds
    with sci‑fi novels by Ted Chiang and psychological thrillers by Gillian Flynn.
  travel: Marty Roper favors spontaneous, low‑key road trips that blend scenic drives through the Upper Peninsula, weekend stays at historic cabins on Isle Royale, and occasional pilgrimages to Iceland’s
    volcanic landscapes, all while balancing a modest travel budget and a desire to return home for the county fair each autumn.
  culinary: Marty Roper prefers hearty Midwestern fare such as pan‑fried perch with lemon‑dill sauce, homemade mushroom risotto, and seasonal beet salads, cooks with a modest skill set that leans on a cast‑iron
    skillet and a trusty Instant Pot, and often pairs meals with locally brewed craft beers from the Grand Rapids scene.
  core: Marty Roper is a conscientious yet impulsive data‑driven social worker who battles anxiety, thrives on solitary hikes and acoustic melodies, and constantly juggles the tension between meticulous
    planning and spontaneous action.
background:
  cultural: Marty grew up in a middle‑class white family in the Lansing‑Okemos region of Michigan, reflecting Midwestern cultural values such as modesty, community involvement, and a strong work ethic.
    His ancestry traces back to Northern European (German and Scandinavian) roots, though he identifies primarily with the broader American cultural milieu of the Great Lakes area. Seasonal changes, love
    for outdoor recreation, local traditions like county fairs, and an appreciation for small‑town community life have shaped his worldview.
attributes:
  skills: '[''Crisis Intervention'', ''Active Listening'', ''Case Management'', ''Data Analysis (R, SPSS)'', ''Program Evaluation'', ''Community Resource Coordination'', ''Advocacy'', ''Interdisciplinary
