personas:
  professional: Ernesto Botello is a bilingual securities and commodities sales professional who blends a data‑driven analysis of market trends with a client‑centric, empathetic style, leveraging Salesforce
    and Bloomberg Terminal to craft tailored portfolios, while their natural empathy and high emotional reactivity drive them to over‑prepare for client meetings yet sometimes lead to last‑minute schedule
    shifts.
  sports: Ernesto Botello follows Club América in Liga MX and Dallas FC in MLS, watches matches at a favorite local sports bar with friends, and spends weekend mornings hiking the Texas Hill Country with
    the Hill Country Hiking Club, though they often forgo post‑hike stretching when the schedule feels tight.
  arts: Ernesto Botello fills their home with norteño hits from Los Tigres del Norte and Banda el Recodo, attends live performances at the Dallas Latin Music Festival, and participates in a bilingual book
    club that reads works by Carlos Ruiz Zafón, using these cultural touchstones to unwind after high‑pressure trading days.
  travel: Ernesto Botello prefers short, well‑planned road trips to destinations such as Austin, Santa Fe, and the historic center of Mexico City, while dreaming of an extended adventure exploring the Yucatán’s
    cenotes and Patagonia’s glaciers, yet they often delay bookings due to anxiety over travel logistics.
  culinary: Ernesto Botello expertly prepares family‑style tamales, mole poblano, and chiles en nogada during weekend gatherings, favoring ingredients like masa, dried ancho chilies, Mexican chocolate,
    and epazote, and while their cooking skill is solid, they sometimes over‑season or create a smoky kitchen mess in pursuit of authentic flavor.
  core: Ernesto Botello balances a data‑driven financial career with a deep love for cultural cooking, community festivals, and intense emotional introspection, navigating success through meticulous planning
    tempered by bouts of anxiety and a habit of last‑minute schedule adjustments.
background:
  cultural: Ernesto was raised in a Mexican-immigrant family in the Dallas area, where Spanish was spoken at home and English at school. His upbringing emphasized strong family ties, respect for elders,
    and communal celebration of Mexican holidays such as Día de los Muertos, Navidad, and Cinco de Mayo. Catholic traditions and the values of familismo and personalismo shape his interpersonal style, fostering
    a cooperative and considerate demeanor. His bicultural identity informs his professional approach, allowing him to bridge cultural nuances when serving Hispanic clients and to integrate Mexican culinary
    and musical traditions into his personal life.
attributes:
  skills: '[''Securities and commodities sales'', ''Client relationship management'', ''Bilingual communication (Spanish/English)'', ''Financial market analysis'', ''Portfolio construction and risk assessment'',
