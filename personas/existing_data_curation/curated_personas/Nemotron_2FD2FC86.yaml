  career_goals: Looking ahead, Gerald aims to transition into a senior technical specialist role where he can shape the strategic direction of automation projects, especially those involving IoT and renewable‑energy
    technologies. He plans to earn a Professional Engineer (PE) license and a PMP certification to formalize his leadership capabilities. Gerald is also keen on establishing a mentorship program within
    his company to pass on practical knowledge to the next generation of technologists. In the longer term, he envisions consulting for small‑to‑mid‑size manufacturers in the New England region, helping
    them adopt sustainable practices while preserving operational reliability.
