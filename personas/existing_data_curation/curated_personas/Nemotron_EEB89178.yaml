personas:
  professional: Judy Jewell, a retired curriculum developer turned senior arts consultant in Las Vegas, leverages their expertise in adult learning and volunteer coordination to design intergenerational
    art workshops, mentor emerging educators, and chair the local senior arts council, and they balance meticulous organization with a flexible, creative approach.
  sports: Judy Jewell, a dedicated member of the Las Vegas senior walking club and an avid fan of the Vegas Golden Knights, incorporates three 30‑minute walks each morning and a weekly low‑impact water
    aerobics class into their routine, and they also cheer on the hockey team at the T‑Mobile Arena every season, balancing their love of low‑key fitness with a spirited loyalty to local sports.
  arts: Judy Jewell, an enthusiastic patron of Las Vegas cultural venues such as the Bellagio Gallery of Fine Art, the Neon Museum, and the Smith Center, regularly curates informal critique sessions during
    their book club, photographs street installations for a personal blog, and they draw artistic inspiration from the works of Georgia O'Keeffe and Andy Warhol, weaving these influences into their own
    mixed-media crafts and community art projects.
  travel: Judy Jewell, who favors organized senior tour groups, has recently completed a curated expedition to the Grand Canyon, a river cruise along the Danube, and a cultural immersion trip to Kyoto,
    preferring itineraries that blend scenic sightseeing with guided museum visits, and they enjoy budgeting carefully to keep travel expenses within their annual $4,500 allowance.
  culinary: Judy Jewell, an avid home cook who harvests basil, rosemary, and heirloom tomatoes from their backyard garden, delights in preparing Mediterranean dishes like chicken piccata with capers, whipping
    up fresh salsa verde, and baking lemon-blueberry scones, while also savoring the occasional upscale buffet at the Wynn, where they seek out the signature shrimp scampi station.
  core: Judy Jewell, a 67-year-old Las Vegas retiree, blends a lifelong passion for arts education with a nervous penchant for meticulous budgeting and a habit of worrying about every detail, and they stay
    socially vibrant through yoga, photography, and senior-focused community projects.
background:
  cultural: Judy grew up in a suburban Midwestern community where education, civic involvement, and appreciation for the arts were deeply valued. Her family heritage traces back to European (primarily Anglo‑American)
    roots, and she was raised with a blend of traditional American cultural practices and a strong work ethic. Relocating to Las Vegas in retirement, she now embraces the city's dynamic, multicultural atmosphere,
    integrating its diverse influences into her community activities while maintaining her core values of lifelong learning and community service.
