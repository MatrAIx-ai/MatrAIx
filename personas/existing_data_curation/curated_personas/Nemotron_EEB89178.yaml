  hobbies: '["Visiting art galleries and museums", "Attending theater and concert performances", "Leading community book clubs", "Traveling on senior tour groups", "Photography", "Gardening", "Volunteering
    at schools and senior centers", "Participating in knitting and craft circles", "Learning new languages", "Practicing yoga and mindfulness"]'
  career_goals: While retired from full‑time teaching, Judy aims to remain an active contributor to her community by consulting on intergenerational arts education programs and mentoring aspiring educators.
    She aspires to chair a local senior arts council, develop workshops that blend technology with traditional crafts, and author a guidebook on lifelong learning for seniors. Judy also hopes to advocate
    for mental‑health awareness within senior centers, using her experience with stress and worry to design supportive curricula that promote resilience and wellbeing.
