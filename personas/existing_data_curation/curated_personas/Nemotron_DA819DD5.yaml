    Resolution'', ''Change Management'', ''Documentation & Reporting'']'
  hobbies: '[''Art museum visits'', ''Urban photography'', ''Hiking'', ''Exploring food markets'', ''Reading sci-fi and tech non-fiction'', ''Cooking fusion dishes'', ''Mentoring community art projects'']'
  career_goals: Joshua aims to progress to a senior program-management role where he can oversee multiple complex initiatives, particularly those that blend technology with creative industries. He plans
    to earn his PMP certification within the next year and later pursue a PgMP to manage portfolios of projects. In the longer term, he envisions founding a boutique consultancy that helps startups in the
    Orange County tech-creative ecosystem adopt agile and design-thinking practices. He also intends to complete a bachelor's degree in Business Administration to broaden his strategic perspective.
