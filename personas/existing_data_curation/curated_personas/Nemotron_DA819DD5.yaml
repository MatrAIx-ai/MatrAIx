personas:
  professional: Joshua Solomon is a seasoned project management specialist who leverages agile, waterfall, and hybrid methodologies, data‑driven tools like Power BI and JIRA, and a design‑thinking mindset
    to turn complex tech‑creative initiatives into streamlined programs, and they consistently pair meticulous planning with a willingness to question conventions.
  sports: Joshua Solomon combines weekend hikes in the Cleveland National Forest with a casual spot‑play on a local amateur soccer team, tracks runs on Strava, roots for the Los Angeles Angels and the Los Angeles
    Lakers, and they prioritize functional fitness over competitive sports, treating exercise as a moving meditation.
  arts: Joshua Solomon immerses themselves in the Southern California art world, sketching installations at the Bowers Museum, photographing exhibits at the Laguna Art Museum, and volunteering as a mentor
    for youth art collectives, drawing inspiration from contemporary visionaries like James Turrell and Ai Weiwei while they curate an ever‑evolving personal aesthetic.
  travel: Joshua Solomon prefers meticulously planned itineraries for international trips—like a photography‑focused tour of Kyoto’s temples—yet embraces spontaneous weekend road trips to Joshua Tree or
    Tijuana’s street‑food markets, balancing a love for cultural immersion with the constraints of a busy professional schedule.
  culinary: Joshua Solomon delights in exploring Santa Ana’s multicultural food markets, experimenting with fusion dishes such as Korean‑style tacos with kimchi salsa and miso‑infused carbonara, and they
    consider themselves a competent home cook who still occasionally over‑salts a sauce in pursuit of bold flavors.
  core: Joshua Solomon blends analytical rigor with artistic curiosity, turning project timelines into canvases while they sneak in hikes, midnight cooking experiments, and a habit of doodling meeting notes.
background:
  cultural: Joshua grew up in a middle-class, white, Protestant family that moved from the Midwest to Orange County in the 1970s. Raised in Santa Ana, he was immersed in a multicultural environment—exposed
    to Latino, Asian, and other communities that shaped his appreciation for diverse perspectives and cultural expressions. His upbringing emphasized hard work, self-reliance, and community involvement,
    values that align with his organized and reliable nature. While rooted in mainstream American culture, his personal outlook is progressive, reflecting the vibrant, multicultural tapestry of Southern
    California.
