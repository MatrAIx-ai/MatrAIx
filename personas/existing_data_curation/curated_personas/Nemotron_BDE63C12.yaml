  hobbies: '[''LEGO building'', ''Jigsaw puzzles'', ''Reading (picture and early chapter books)'', ''Piano practice'', ''Caring for family dog'', ''Pattern drawing'', ''Gardening'']'
  career_goals: Scherrie dreams of becoming a teacher, particularly a reading specialist in a small, structured classroom where she can design organized lesson plans and nurture young learners. She is also
    fascinated by animals and hopes one day to study veterinary science, combining her love for caring with her disciplined approach.
