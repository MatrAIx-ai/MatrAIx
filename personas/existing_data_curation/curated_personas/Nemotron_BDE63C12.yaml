personas:
  professional: Scherrie Jones is an aspiring engineer who transforms LEGO builds into learning opportunities, applying meticulous organization and a practical mindset to every step, while their reserved
    nature fuels focused, solo problem‑solving.
  sports: Scherrie Jones is a member of the “Little Kickers” youth soccer club, delights in regular practice drills and weekend games, and is a devoted fan of Atlanta United, preferring structured team
    activities to unplanned playground scrambles.
  arts: Scherrie Jones sings in the church children’s choir, studies piano three times a week, fills sketchbooks with patterned designs, and draws inspiration from gospel legend Mahalia Jackson and Disney
    movie soundtracks, turning disciplined practice into creative calm.
  travel: Scherrie Jones enjoys family trips to the Georgia Aquarium and historic Savannah, dreams of a weekend visit to Washington, D.C.’s National Museum of History and Culture to explore civil‑rights
    exhibits, and approaches travel with detailed itineraries that balance educational stops with playful downtime.
  culinary: Scherrie Jones loves helping prepare collard greens, buttery cornbread, and fried chicken at home, relishes fresh strawberries and peanut butter sandwiches, and follows simple recipes step‑by‑step,
    though they sometimes get sidetracked by the bright LEGO bricks scattered on the kitchen counter.
  core: Scherrie Jones is a detail‑driven, kind, and organized seven‑year‑old who channels their love of structure into LEGO builds, piano practice, and caring for their dog, balancing disciplined routines
    with a gentle, team‑oriented heart, yet occasionally leaves half‑finished projects in their path.
background:
  cultural: Scherrie is part of a close‑knit Black family in Marietta, GA. Her cultural roots blend Southern traditions with African‑American heritage. She regularly attends a local Baptist church where
    she participates in the children's choir and holiday services. Family gatherings often feature soul‑food dishes such as collard greens, cornbread, and fried chicken, and stories of grandparents’ experiences
    in the civil‑rights era are shared. She celebrates Juneteenth and Kwanzaa, learning about African histories through books and community events. The neighborhood includes a multicultural library program,
    exposing her to Black children's literature and encouraging pride in her identity.
