personas:
  professional: Cash Metzler is an aspiring strategic thinker who leverages his football playbook and online chess tactics to dominate school group projects and class debates, showcasing a blend of analytical
    rigor and competitive drive, and they apply this competitive edge to every classroom challenge.
  sports: Cash Metzler is a dedicated member of his high school football team, practices at the community park, and cheers for the Dallas Cowboys while also holding a spot on the local youth hiking club
    that explores nearby nature trails each weekend, and they consider each game an opportunity to sharpen strategic thinking.
  arts: Cash Metzler is an avid photographer who captures rural sunrise vistas and family gatherings, drawing inspiration from Ansel Adams and the visual storytelling of National Geographic, while their
    model car hobby fuels a nostalgic appreciation for classic automotive design, and they often experiment with long exposure techniques.
  travel: Cash Metzler enjoys road trips to the Blue Ridge Mountains and a recent family vacation to Washington D.C., dreaming of a future backpacking adventure through the national parks of Utah, and they
    plan trips with a mix of Google Maps itineraries and spontaneous detours.
  culinary: Cash Metzler assists his mother in the kitchen, experimenting with Southern classics like shrimp and grits and sweet potato pie, adding modern twists such as smoked paprika and truffle oil,
    and they have become proficient at balancing bold flavors with careful plating.
  core: Cash Metzler blends competitive grit with creative curiosity, balancing football with chess, photography with model kits, and a disciplined allowance routine, all while occasionally forgetting to
    sleep before big game days.
background:
  cultural: Cash is raised in Clanton, Alabama, a close‑knit, predominantly white Southern community where family, church, and high school sports play central roles. He grew up attending a Southern Baptist
    church, participating in community events like the annual Chilton County Fair, and sharing traditions of Southern hospitality and cuisine. The local culture emphasizes respect for tradition while also
    valuing practical skills and self‑reliance, which align with Cash’s pragmatic outlook. He is familiar with regional customs such as porch gatherings, football tailgates, and a love for outdoor activities
    like fishing and hunting.
