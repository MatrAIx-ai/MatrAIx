  hobbies: '[''drawing and coloring'', ''listening to Native American stories'', ''building with blocks'', ''singing nursery rhymes'', ''exploring the park and nature'', ''group playground games'', ''pretend
    play (explorer, superhero)'']'
  career_goals: Lorenzo dreams of becoming an artist who can draw pictures that tell stories from his heritage, hopes to win the school art contest, and imagines one day sharing Native American stories
    with other children as a storyteller or cultural guide.
