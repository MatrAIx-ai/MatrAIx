personas:
  professional: Lillian Aziz is an aspiring junior programmer who builds interactive stories in Scratch, carefully maps out each project with step‑by‑step flowcharts, and consistently meets the personal
    deadlines she sets, balancing creative curiosity with a love for structure.
  sports: Lillian Aziz plays on the local Riverside Rangers U12 soccer team, practices twice a week at the community field, enjoys swimming laps at the municipal pool on weekends, cheers for the nearby
    Cleveland Guardians in baseball and the Cleveland Cavaliers in basketball, and sticks to a structured schedule that balances schoolwork, Girl Scouts duties, and athletic commitments.
  arts: Lillian Aziz devours mystery series like Encyclopedia Brown and adventure novels by Rick Riordan, crafts friendship bracelets while listening to the pop tunes of Taylor Swift and Billie Eilish,
    and spends Friday evenings watching animated classics such as Disney’s Moana and Pixar’s Coco with her close friends, often dissecting the plot twists with the analytical precision she applies to her
    coding projects.
  travel: Lillian Aziz dreams of hiking the redwood forests of California, has already explored the nearby state park’s nature trail on weekend outings, is saving part of her allowance for a summer family
    trip to Washington, D.C., where she plans to tour the Smithsonian museums and the National Zoo, and prefers carefully planned itineraries that include a notebook for recording wildlife observations.
  culinary: Lillian Aziz loves preparing simple garden‑to‑table snacks such as cucumber and cream cheese rolls, delights in strawberry‑yogurt parfaits, can whip up a perfect peanut‑butter‑banana sandwich,
    and enjoys family pizza nights featuring pepperoni, mushrooms, and extra cheese while occasionally experimenting with baking chocolate‑chip cookies using her grandma’s vintage recipe.
  core: A detail‑oriented, quietly ambitious eleven‑year‑old who balances a love for structured coding, garden stewardship, and mystery novels with a disciplined allowance budget, a proactive health routine,
    and a methodical approach to sports, arts, and community service.
background:
  cultural: Lillian was raised in Ruther Glen, a suburban‑rural community in Spotsylvania County, Virginia. Her family observes Southern traditions such as celebrating Independence Day with local fireworks,
    attending church services, and participating in community events like the county fair and volunteer clean‑up days. The area’s historical roots in colonial Virginia and a strong emphasis on hospitality,
    responsibility, and respect have shaped her values. At school, she interacts with peers from diverse backgrounds, fostering an inclusive outlook while staying grounded in the region’s modest, community‑oriented
    culture.
