  career_goals: Lillian aspires to become a veterinarian, motivated by her love for animals and her methodical nature. She also dreams of studying environmental science or civil engineering to help design
    safe, sustainable community spaces. She intends to excel in middle school, earn honors in high school, and pursue a science‑focused college degree that equips her to protect wildlife and improve local
    infrastructure.
