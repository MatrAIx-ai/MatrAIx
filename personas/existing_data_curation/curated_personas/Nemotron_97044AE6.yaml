  hobbies: '[''Visiting Art Galleries'', ''Painting'', ''Sketching'', ''Photography'', ''Hiking in the Blue Ridge Mountains'', ''Improv Comedy'', ''Community Theater'', ''Watching Indie Films'', ''Reading
    Contemporary Fiction'', ''Volunteering at Local Museum'', ''Organizing Community Events'', ''Cooking Southern-inspired Dishes'', ''Gardening'']'
  career_goals: Rhonda aims to complete a Bachelor’s degree in Communications or Arts Management with a focus on community cultural programming. She aspires to become a program director for a local arts
    center or nonprofit that emphasizes arts education and community engagement. Long‑term, she envisions launching a regional cultural festival that integrates interactive technology and digital media
    to broaden access to the arts in rural Georgia, and eventually establishing her own nonprofit dedicated to showcasing emerging Appalachian artists through both physical events and online platforms.
