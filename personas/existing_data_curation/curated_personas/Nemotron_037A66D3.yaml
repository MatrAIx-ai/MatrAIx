  career_goals: She aims to advance to a senior surveillance analyst role within the casino industry, where she can lead a team of operators and shape security policies. To achieve this, Ana plans to earn
    the Certified Protection Professional (CPP) credential and pursue a specialized certification in cybersecurity for gambling operations. She is also interested in developing a proprietary algorithm that
    automates detection of high‑risk betting patterns, hoping to publish her work and become a recognized expert in casino risk management. In the longer term, she envisions opening a consultancy that advises
    regional gaming establishments on integrated security and data‑analytics solutions, while securing enough financial stability to retire comfortably and travel to Mexico to reconnect with her heritage.
