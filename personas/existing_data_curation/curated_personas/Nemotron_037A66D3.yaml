personas:
  professional: Ana Brenes is an experienced surveillance analyst in the casino industry, using her technical training in CCTV, IP‑camera networks, and Python‑driven log analysis to lead a small team while
    applying her critical, skeptical mindset to develop and refine security policies.
  sports: Ana Brenes follows the Atlanta Braves baseball team and the Georgia Bulldogs football program, participates in a local senior walking club for fitness, and occasionally joins a community garden’s
    weekend softball games, preferring low‑impact activities that fit her solitary schedule.
  arts: Ana Brenes expresses creativity through astrophotography of the Milky Way, acoustic guitar evenings with a repertoire that includes John Mayer and Bob Dylan, knitting blankets for her grandchildren,
    and devouring true‑crime novels by Agatha Christie and forensic thrillers by Patricia Cornwell.
  travel: Ana Brenes enjoys planning trips that blend relaxation with curiosity, such as a weekend retreat in the Blue Ridge Mountains for night‑sky imaging and a future pilgrimage to the Yucatán Peninsula
    to explore historic ruins and regional cuisine, while balancing travel costs against her retirement savings.
  culinary: Ana Brenes delights in preparing traditional dishes like tamales stuffed with pork and masa, and mole enriched with chilies, chocolate, nuts, and spices, often cooking them for family gatherings
    while experimenting with heirloom tomatoes from her garden to create fresh salsas.
  core: Ana Brenes is a solitary, analytically fierce surveillance professional who balances night‑time astrophotography, competitive poker, and a lingering worry about security risks with a relaxed, sometimes
    disorganized lifestyle.
background:
  cultural: Ana Maria is a first‑generation Mexican‑American. She was born to parents who immigrated from Jalisco and grew up in a bilingual household where Spanish was spoken daily alongside English. Family
    traditions such as Día de los Muertos, quinceañeras, and the preparation of regional dishes remain central to her identity. After moving to rural Georgia in her thirties, she blended her Mexican heritage
    with Southern Appalachian culture, participating in local festivals while maintaining strong ties to the Mexican community through church gatherings and cultural events in nearby Atlanta. Her bicultural
    experience informs her worldview, making her both resilient and adaptable, and she often serves as a cultural bridge for coworkers and neighbors.
