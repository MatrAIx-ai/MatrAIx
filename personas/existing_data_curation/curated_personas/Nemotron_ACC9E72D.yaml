    control'', ''Collaboration with curators and educators'']'
  hobbies: '[''Historical research and genealogy'', ''Analog and digital photography'', ''Woodworking and crafting display cases'', ''Puzzle solving (crosswords, jigsaws)'', ''Nature walks and birdwatching'',
    ''Listening to folk and bluegrass music'', ''Participating in local historical society events'', ''Reading non-fiction and classic literature'', ''Volunteer work at community libraries'', ''Playing
    board games with close friends'']'
  career_goals: 'Naser aims to progress to a senior curator role within the next five years, leading large‑scale digitisation projects that make local histories accessible online. He aspires to secure grant
    funding to preserve at‑risk items from Decatur County, develop a comprehensive regional archive, and eventually move into museum directorship where he can shape inclusive narratives while streamlining
    operations to reduce staff stress. Continuous professional development in preservation science and leadership is also a priority, allowing him to mentor emerging archivists and foster a supportive workplace
    culture.

