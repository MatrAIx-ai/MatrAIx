personas:
  professional: Candida Cotton, an aspiring soccer captain on the school team, blends her competitive spirit with a meticulous practice schedule, often drafting drill plans in her notebook while encouraging
    teammates to stick to the game plan.
  sports: Candida Cotton, a dedicated member of the Newton Middle School soccer squad and a gymnastics enthusiast, trains three times weekly, cheers for the Kansas City Chiefs and the local high school
    basketball team, and volunteers as a water carrier during community games.
  arts: Candida Cotton, a vibrant community theater participant, loves performing scenes from "The Lion King," idolizes Lin‑Manuel Miranda, and spends evenings building intricate LEGO models inspired by
    her favorite Minecraft biomes.
  travel: Candida Cotton, an enthusiastic weekend explorer, loves road trips to the Kansas State Fair and family vacations to the Ozarks, and dreams of visiting Disneyland and the Grand Canyon, always drafting
    a detailed itinerary with checklists and snack packs.
  culinary: Candida Cotton, a budding kitchen helper, enjoys crafting homemade tacos with fresh corn and salsa, perfecting spaghetti sauce, and mastering the ultimate grilled cheese, while stubbornly refusing
    to eat green beans.
  core: Candida Cotton combines a competitive drive with a love for structured fun, leading friends in soccer drills, LEGO builds, and allowance budgeting, all while maintaining a practical, schedule‑obsessed
    outlook.
background:
  cultural: 'Candida comes from a White, Midwestern American family living in Newton, Kansas. Her upbringing reflects typical small‑town values: strong community ties, frequent participation in local events
    like the county fair, and involvement in church and school activities. Her family emphasizes a practical work ethic, education, and good manners, aligning with the broader cultural norms of the Great
    Plains region. While she celebrates mainstream American holidays such as Thanksgiving and the Fourth of July, she also partakes in regional traditions like supporting local high school sports and engaging
    in community service projects.'
attributes:
  skills: '["Reading comprehension", "Basic arithmetic", "Elementary science", "Organizational skills", "Leadership in group projects", "Team coordination", "Basic digital literacy (Scratch coding)", "Piano
