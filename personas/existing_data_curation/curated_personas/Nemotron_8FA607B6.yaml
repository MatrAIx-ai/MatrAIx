  hobbies: '["Soccer", "Gymnastics", "Community theater", "Adventure reading", "LEGO building", "Minecraft (collaborative gaming)", "Gardening", "Animal shelter volunteering"]'
  career_goals: Candida dreams of a future where she can combine her love for animals with her practical, organized mindset. She aspires to become a veterinarian, envisioning a well‑structured clinic where
    she can care for pets and educate her community about animal welfare. Alongside this, she hopes to hold leadership roles in school—such as class president or sports team captain—so she can use her dependable
    nature and competitive spirit to guide groups toward shared goals.
