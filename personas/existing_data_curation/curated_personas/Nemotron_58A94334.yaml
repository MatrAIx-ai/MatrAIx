  hobbies: '[''Gardening'', ''Gospel choir'', ''Bridge'', ''Woodworking'', ''Southern cooking'', ''Reading historical biographies'', ''Volunteer mentorship'', ''Community festivals'', ''Walking in local
    parks'']'
  career_goals: Although officially retired, Omar is committed to expanding his impact as a community elder. He aims to lead a multi‑generational mentorship program that pairs senior volunteers with at‑risk
    youth, helping them develop life‑skills and academic confidence. He also hopes to secure funding to transform an under‑utilized lot in Horn Lake into a garden and workshops space where residents can
    learn sustainable gardening, culinary arts, and basic home‑maintenance techniques. Additionally, Omar plans to finish the one‑year business administration course he began in college, so he can better
    manage nonprofit budgets and grant applications.
