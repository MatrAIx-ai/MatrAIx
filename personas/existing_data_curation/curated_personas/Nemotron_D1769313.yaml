  career_goals: Leonard aims to progress into a supervisory role within the customer service department, such as Team Lead or Quality Assurance Analyst, within the next two years. He plans to obtain a certification
    in Customer Service Management and possibly enroll in part‑time courses toward an Associate’s degree in Business Administration. Long‑term, he envisions moving into operations management or process
    improvement, where he can apply his organized mindset to streamline workflows. He also hopes to achieve financial stability sufficient for purchasing a home in Lancaster and building a modest savings
    cushion to reduce stress.
