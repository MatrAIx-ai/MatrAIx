  hobbies: '[''Gallery visits'', ''Community mural participation'', ''Watercolor painting'', ''Jazz and soul concert attendance'', ''Karaoke singing'', ''Urban photography'', ''Youth art workshop volunteering'',
    ''Neighborhood clean‑up organizing'', ''Spontaneous road trips'', ''Hiking in the Cascades'']'
  career_goals: Felecia aims to move from laborer to crew foreperson within the next three years, leveraging her communication strengths and on‑site experience. She plans to obtain an OSHA certification
    and a Construction Management Associate’s degree to qualify for site manager positions. Long‑term, she dreams of launching her own small‑scale renovation and community‑focused construction business
    that integrates artistic elements—like mural installations and custom interior design—into affordable housing projects across King County. She also hopes to mentor more women of color entering the trades,
    building a supportive network that reflects her sociable and competitive spirit.
