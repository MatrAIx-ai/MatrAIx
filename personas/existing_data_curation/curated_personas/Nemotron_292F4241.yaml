personas:
  professional: Felecia Johnson is a seasoned construction laborer who expertly operates backhoes, forklifts, and compactors, they leverage their curiosity to devise unconventional fixes on site, leads
    daily safety briefings with a charismatic flair that draws crew attention, and channels their competitive spirit into negotiating subcontractor rates while dreaming of integrating mural art into future
    affordable housing projects.
  sports: Felecia Johnson stays fit by tackling weekend hikes in the Cascade foothills, joining informal pick‑up basketball games at the Federal Way community center, and cheering on the Seattle Seahawks
    and Seattle Sounders, they treat fitness as a social extension of crew camaraderie rather than a regimented schedule.
  arts: Felecia Johnson immerses themselves in Seattle’s vibrant arts scene, frequenting the Frye Art Museum, painting murals in the light‑filled streets of South Seattle, perfecting watercolor techniques
    in weekend classes at Seattle Central College, capturing urban skylines with their DSLR as a member of the Seattle Street Photography Club, and leading karaoke nights with soulful renditions of Nina
    Simone and James Brown, they draw creative energy from each brushstroke and chord.
  travel: Felecia Johnson favors spontaneous, low‑key road trips that whisk them from Seattle to the windswept dunes of Cannon Beach, the historic bistros of Astoria, and the alpine vistas of Mount Rainier,
    they plan just enough to secure a cheap cabin while leaving ample wiggle room for unexpected detours.
  culinary: Felecia Johnson enjoys cooking Pacific‑Northwest staples like grilled Dungeness crab with garlic butter, smoked salmon bagels topped with capers and dill, and hearty miso ramen, while also indulging
    in food‑truck tacos and craft beers, they often pair their meals with a playlist of soul classics to enhance the dining experience.
  core: Felecia Johnson blends rugged construction expertise with a thriving artistic soul, walking the line between disciplined craft and spontaneous creativity, they inspire peers with their bold, colorful
    vision.
background:
  cultural: Felecia’s cultural identity is grounded in African‑American heritage, with family roots tracing back to the Southern United States before migrating to the Pacific Northwest. Growing up in Federal
    Way, she has been shaped by a tight‑knit Black community that values storytelling, soulful music, and communal support. Church gatherings and family cookouts featuring dishes like collard greens, fried
    chicken, and sweet potato pie remain central to her traditions. She embraces the blend of Southern cultural rhythms with the progressive, multicultural vibe of the Seattle metro area, finding inspiration
    in both the historic struggles and contemporary achievements of Black Americans. This background informs her commitment to community uplift, artistic expression, and fostering inclusive spaces within
    her professional and personal life.
attributes:
  skills: '[''Heavy equipment operation'', ''Concrete finishing'', ''Framing and rough carpentry'', ''Basic blueprint reading'', ''On‑site problem solving'', ''Safety briefing leadership'', ''Team mediation
