personas:
  professional: Janel Wilson, a seasoned Perry County school bus driver with over two decades of DOT-compliant route planning, vehicle maintenance expertise, and calm student management, is now pursuing
    Certified Bus Driver Instructor credentials and a transportation safety certification to transition into a mentorship and coordination role within the district.
  sports: Janel Wilson, a quiet outdoor enthusiast, spends weekends hiking the Appalachian foothills with the local Perry County Trail Runners, follows the University of Kentucky Wildcats football and the
    Cincinnati Reds baseball teams on TV, and occasionally joins her grandchildren at high-school basketball games.
  arts: Janel Wilson, an avid lover of classic mysteries by Agatha Christie and historical nonfiction by David McCullough, listens to audiobooks while tending her garden, knits blankets to the rhythm of
    Bill Monroe's bluegrass, and enjoys community theatre productions of Tennessee Williams' plays.
  travel: Janel Wilson, a methodical planner, prefers road trips with detailed itineraries to nearby natural retreats such as Great Smoky Mountains and Shenandoah National Park, often staying in historic
    bed-and-breakfasts, while dreaming of a future solo visit to Asheville's art scene.
  culinary: Janel Wilson, a competent home cook, harvests tomatoes, beans, and herbs from her garden to create hearty dishes like roasted vegetable medley, fried catfish with buttermilk biscuits, and apple
    crisp, and enjoys pairing meals with homemade herb-infused tea while knitting.
  core: Janel Wilson is a disciplined, solitude-seeking bus driver who blends meticulousness with garden-grown calm, weaving knitting and reading into a steady climb toward transportation leadership, all
    while keeping finances tight and health in check.
background:
  cultural: Janel's cultural background is rooted in the Appalachian region of eastern Kentucky. Growing up in a close-knit white community in Jackson, she internalized values of hard work, self-reliance,
    and modesty. The local traditions of bluegrass music, storytelling, and a strong sense of neighborly responsibility have shaped her practical outlook. While she attends a small Baptist congregation,
    she prefers the quiet of personal reflection over large social events. Her upbringing in a rural setting has cultivated a deep appreciation for the outdoors, seasonal cycles, and the importance of community
    safety, all of which influence her professional and personal life.
attributes:
  skills: '[''Vehicle pre-trip inspection'', ''Basic mechanical troubleshooting'', ''DOT and state safety compliance'', ''Route planning and optimization'', ''Student supervision and behavior management'',
    ''First aid and CPR certification'', ''Record-keeping and log management'', ''Time management'', ''Effective communication with school staff and parents'', ''Conflict resolution in a school transportation
    setting'', ''Navigation using GPS and paper maps'']'
  hobbies: '[''Gardening'', ''Reading mystery novels and historical nonfiction'', ''Listening to audiobooks'', ''Knitting'', ''Online crossword puzzle club'', ''Hiking in the Appalachian foothills'']'
  career_goals: Janel aims to transition from front-line driving to a leadership position within the Perry County School District's transportation department. Over the next five years she plans to complete
    the Certified Bus Driver Instructor program, enabling her to train new drivers and mentor the existing team. She also seeks to obtain a certification in transportation safety management, with the long-term
    goal of becoming the district's Transportation Coordinator, where she can shape policies, improve route efficiency, and further enhance student safety. While she values career stability, she also intends
    to build a legacy of safety and reliability before eventually retiring with a solid pension.
