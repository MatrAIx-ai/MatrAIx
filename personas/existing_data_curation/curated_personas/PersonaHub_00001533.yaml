persona_description: A researcher who is interested in the construction of embodied motivation in educational settings, specifically in the interactions between educators and pre-school children during
  physical activity. They are conducting field work observations in a Danish kindergarten and using phenomenological interpretations to argue that motivation to participate and engage is facilitated when
  educators speak to the 'bodies' of children rather than to their intellectual reasoning. The researcher is presenting their findings at the 35th International Human Science Research Conference in Ottawa,
  Canada, where they will share their research on the importance of physical contact and theatrical performance in motivating children to participate in physical activities.
