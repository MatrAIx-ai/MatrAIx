persona_description: William Welles "Bill" Hoyt was an American pole vaulter who competed in the 1896 Summer Olympics in Athens, Greece. He won the gold medal in the pole vault event, becoming the first
  Olympic gold medalist in pole vaulting. Hoyt was born in Glastonbury, Connecticut, on May 7, 1875, and died in Cambridge, New York, on December 1, 1954. He was affiliated with the Boston Athletic Association
  and Boston, Massachusetts. Hoyt's personal best in the pole vault event was 11-4½ (3.46) in 1898. After graduating from Harvard University in 1897, he entered the medical school at Harvard, where he graduated
  in 1901. Hoyt later served in the 1st Illinois Field Hospital Company during World War I and later in the U.S. Public Health Service. He eventually settled in the small town of Berlin, New York, where
  he practiced medicine. Hoyt's Olympic victory was the only major success of his career.
