  hobbies: '["community volunteering", "gospel choir singing", "cooking", "gardening", "walking/hiking", "reading", "yoga", "bridge club", "dance socials", "local politics involvement"]'
  career_goals: Tina aims to become one of the top‑producing brokers in Prince George’s County and to eventually launch her own boutique brokerage that emphasizes personalized service and community development.
    She aspires to mentor emerging agents, especially women of color, and to design a training program that blends practical sales techniques with ethical standards. Over the next five years, she plans
    to diversify her portfolio into commercial and mixed‑use properties, increase her market share in the Oxon Hill area, and be recognized for her contributions to affordable‑housing initiatives. Ultimately,
    she seeks financial independence and a lasting legacy of community empowerment through real estate.
