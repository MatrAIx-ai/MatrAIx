personas:
  professional: Tina Onu combines her three-decade residential real-estate mastery—sharp property valuation, comparative market analysis, and assertive negotiation—with a methodical, organized workflow
    and an outgoing, community-centric networking style, and they leverage this blend to dominate Prince George's County listings while laying the groundwork for a boutique brokerage and mentorship program.
  sports: Tina Onu enjoys daily walks with the Prince George's County Senior Walking Club at Oxon Hill Park, participates in the local Oxon Hill Softball League during spring, and faithfully cheers on the
    Washington Capitals, Washington Commanders, and Baltimore Orioles, while occasional line-dancing socials keep their feet moving year-round.
  arts: Tina Onu fuels their artistic side by singing gospel classics by Mahalia Jackson in the church choir, swinging to Benny Goodman at community dance socials, and devouring contemporary novels such
    as Kristin Hannah's 'The Nightingale' and biographies like Michelle Obama's 'Becoming' during quiet evenings.
  travel: Tina Onu plans low-key weekend getaways to the historic streets of Savannah, annual trips to Shenandoah National Park for fall foliage, and dreams of a relaxed cruise to the Caribbean islands,
    always coordinating travel around their church calendar and budgeting with a simple spreadsheet.
  culinary: Tina Onu showcases their culinary talent by perfecting soul-food staples such as smoky collard greens, buttery cornbread, and sweet potato pie for neighborhood potlucks, while experimenting
    with new flavor twists like chipotle-infused black-eyed peas, and they never balk at hunting for fresh rosemary and thyme at the farmer's market.
  core: Tina Onu blends a structured, community-focused mindset with vibrant social energy, balancing meticulous real-estate strategy, soulful cooking, and steady advocacy for neighborhood growth—though
    they occasionally forget to water their garden.
background:
  cultural: Tina was raised as an African‑American in the Washington, D.C. metropolitan area, deeply rooted in the traditions of Prince George’s County’s black community. Her upbringing emphasized church
    involvement, family cohesion, and a strong sense of collective responsibility. She draws inspiration from the legacy of civil‑rights activism in the region and embraces cultural expressions such as
    gospel music, soul food, and community festivals that celebrate African‑American heritage. This cultural foundation informs her professional ethos, emphasizing trust, fairness, and community uplift
    through her real‑estate practice.
