  hobbies: '[''Desert hiking and trail walking'', ''Photography of sunrise and desert landscapes'', ''Succulent and native plant gardening'', ''Cooking Southwestern and Mexican-inspired dishes'', ''Reading
    historical fiction and business non‑fiction'', ''Listening to personal‑finance podcasts'', ''Yoga and meditation practice'', ''Volunteering at local food bank'', ''Mentoring new volunteers'', ''DIY
    home organization projects'']'
  career_goals: Myranda aims to move from store‑level supervision to a district‑manager role within the next five years, overseeing multiple locations and driving regional performance. She plans to earn
    a bachelor's degree in Business Administration to deepen her strategic acumen and obtain a Lean Six Sigma Green Belt certification to formalize her process‑improvement expertise. Long‑term, she envisions
    opening her own boutique that blends modern retail practices with a curated selection of locally made goods, while also mentoring emerging retail leaders in her community.
