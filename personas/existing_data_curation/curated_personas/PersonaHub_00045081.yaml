persona_description: A health care professional who is a certified yellow fever vaccine provider and is responsible for advising travelers on the vaccination and entry requirements for yellow fever. They
  are knowledgeable about the history, ecology, and vaccination process of yellow fever, and are skilled in pre-travel consultation, storage, and administration of yellow fever vaccine. They are also familiar
  with the requirements for becoming a certified yellow fever vaccine provider and maintaining that certification. They have a strong understanding of the impact of yellow fever on public health and are
  committed to providing accurate and up-to-date information to their patients.
