  hobbies: '[''drawing and painting'', ''reading fantasy and adventure books'', ''exploring local parks and nature trails'', ''playing group games with friends'', ''school art club'', ''community theater'',
    ''singing and playing recorder'', ''watching educational videos about space and wildlife'']'
  career_goals: Marcia dreams of a future where she can blend her love for creativity, helping others, and exploring new ideas. She imagines becoming an illustrator or a children’s author who can bring
    stories to life, a teacher who inspires curiosity, or a wildlife rehabilitator who cares for animals. She also hopes to develop confidence to manage her strong feelings, so she can support friends and
    community members who feel anxious or sad. Overall, her ambition is to pursue a career that lets her stay curious, be kind, and make a positive impact.
