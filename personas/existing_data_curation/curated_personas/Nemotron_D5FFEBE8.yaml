personas:
  professional: Marcia Sentell, a budding visual storyteller, channels curiosity and love of fantasy into daily sketches and watercolor adventures; they turn school art club projects into mini exhibitions
    despite occasional disorganization and a relaxed attitude toward deadlines.
  sports: Marcia Sentell, a lively participant in the local elementary soccer league and the Brookside nature‑hike club, spends weekends chasing a soccer ball with the Brookshire Thunderkids and organizing
    capture‑the‑flag games in the town park, though they often forget to bring a water bottle and can become overly distressed if a game ends abruptly.
  arts: Marcia Sentell devotes afternoons to the school art club where they paint watercolors inspired by the nearby state park scenery, sing along to Ariana Grande's pop hits while practicing the recorder,
    and reenact scenes from Disney's *Moana* during community theater rehearsals, despite occasionally scribbling over homework assignments.
  travel: Marcia Sentell loves weekend excursions to Letchworth State Park to watch the roaring waterfalls and dreams of exploring the American Museum of Natural History in New York City, yet their family's
    modest budget leads them to relish imaginative backyard camping adventures, planning trips with crayon‑drawn maps of nearby farms and the county fairgrounds.
  culinary: Marcia Sentell delights in building crunchy apple‑cinnamon granola bars with their grandma, swapping homemade pepperoni pizza slices during family movie nights, and savoring buttery popcorn
    while watching space documentaries, though they sometimes skip breakfast before a busy school day.
  core: Marcia Sentell is a curious, art‑obsessed nine‑year‑old whose boundless imagination fuels vivid sketches, spontaneous whims, and occasional emotional turbulence that they soothe through color, community,
    and a love of backyard adventures.
background:
  cultural: 'Marcia is a white American growing up in Newark, a small town in Wayne County, New York. Her family’s cultural life reflects typical upstate New York values: a mix of suburban and rural influences,
    close‑knit community events like the county fair, local farmers’ markets, and school-sponsored activities. Seasonal traditions such as decorating for holidays, attending church services, and celebrating
    Thanksgiving with a big family meal are part of her upbringing. The region’s emphasis on public schooling, outdoor recreation, and community volunteerism shapes her worldview, encouraging both independence
    and a sense of collective responsibility.'
attributes:
  skills: '[''reading fluently'', ''creative drawing and painting'', ''basic digital art using tablet apps'', ''storytelling and imaginative writing'', ''basic math problem solving'', ''simple science experiments'',
