persona_description: A 19th-century scientist and speech therapist who combined scientific research with educational practice to solve the paradox of male stammerers and redefined the socio-cultural understanding
  of stammering. Known for his personal experience of stammering and his innovative approach to treating stammering, he proposed a series of exercises that explicitly mobilized the self-discipline of his
  'pupils' and redefined the perception of stammering in the society.
