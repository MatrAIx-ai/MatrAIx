persona_description: A molecular biologist, microbiologist, and immunologist who specializes in studying the relationships between frog and fish species in streams and applying innovative technologies to
  the process. She has applied real-time PCR technology to the identification of frog and trout species in eDNA samples collected in the PCT. She plans to continue studying these samples to identify pathogens
  in eDNA and their relation to the distribution of frog and trout species. These molecular biology tools can be used in several proposed studies of the IBE.
