personas:
  professional: Hong Tanuyan, a 25‑year‑old certified HVAC/R technician, leverages meticulous energy‑efficiency audits, blueprint interpretation, and a skeptical eye for vendor claims to deliver smart,
    green climate solutions while mentoring peers and planning a future eco‑focused business.
  sports: Hong Tanuyan plays pickup basketball at the local community center, joins an East Bay weekend hiking group that frequents Mount Diablo, competes in a recreational soccer league affiliated with
    the San Jose Earthquakes fan club, and roots for the Golden State Warriors and San Francisco Giants.
  arts: Hong Tanuyan immerses themselves in San Francisco’s art scene by frequenting the SFMOMA, attending street‑mural tours featuring works by Shepard Fairey and local Bay Area muralists, and capturing
    urban moments in black‑and‑white photography inspired by Henri Cartier‑Bresson.
  travel: Hong Tanuyan prefers purposeful trips that blend adventure and cultural immersion, such as road‑tripping to Yosemite for sunrise hikes, a weekend art‑focused getaway to Portland’s galleries, and
    a long‑planned visit to Kyoto’s historic temples to study traditional craftsmanship, all while budgeting carefully due to early‑career finances.
  culinary: Hong Tanuyan enjoys modernizing classic Chinese dishes, whipping up a quinoa‑based mapo tofu with Sichuan peppercorn, experimenting with a citrus‑glazed char siu using miso, and perfecting hand‑rolled
    dumplings filled with seasonal vegetables, showcasing both a love for tradition and a flair for culinary innovation.
  core: Hong Tanuyan blends a methodical, eco‑driven HVAC career with an artistic curiosity, competitive spirit, and a habit of over‑analyzing both work and life, often juggling meticulous planning with
    occasional bouts of worry.
background:
  cultural: Hong is a second‑generation Chinese‑American raised in the vibrant Asian community of Union City. He grew up bilingual, speaking Mandarin at home and English at school, and his family maintains
    traditions such as celebrating Lunar New Year, the Mid‑Autumn Festival, and weekend family meals centered on shared dishes. While his parents emphasized hard work, education, and respect for elders,
    Hong’s upbringing in the multicultural Bay Area also exposed him to a wide range of artistic and technological influences. He balances the collectivist values of his heritage with his own competitive,
    individualistic drive, often feeling a pull between personal ambition and the desire to contribute to his community. This cultural duality informs his respect for craftsmanship, his appreciation for
    both traditional and contemporary art, and his goal to create a business that honors his roots while innovating for a sustainable future.
attributes:
  skills: '[''HVAC system installation'', ''Refrigerant recovery and EPA 608 handling'', ''Electrical wiring and low‑voltage controls'', ''Blueprint and schematics reading'', ''Energy‑efficiency auditing'',
