  hobbies: '[''Urban photography'', ''Gallery and street‑mural tours'', ''Pickup basketball and soccer'', ''East Bay hiking groups'', ''Maker‑space smart‑home projects'', ''Online strategy gaming'', ''Board‑game
    meet‑ups'', ''Debate clubs'', ''Mindfulness meditation'', ''Cooking Chinese fusion meals'']'
  career_goals: In the next two years, Hong aims to complete his associate’s degree in Mechanical Engineering Technology and earn advanced certifications such as NATE Master Specialist and LEED Green Associate.
    He wants to become a senior technician leading a small team, leveraging his competitive drive to set performance benchmarks for speed, quality, and customer satisfaction. Long‑term, Hong aspires to
    launch his own eco‑focused HVAC business that offers smart, energy‑saving solutions and integrates aesthetic design elements inspired by his love of art. He envisions his company as a trusted brand
    in the Bay Area, known for reliable service, meticulous planning, and innovative green technologies, while also providing mentorship to younger technicians from diverse backgrounds.
