  hobbies: '[''Reading mystery and historical fiction'', ''Gardening (vegetable plot)'', ''Jogging on local trails'', ''Book club participation'', ''Volunteer library work'', ''Community theater backstage
    crew'']'
  career_goals: Crystal aims to deepen her administrative expertise by earning an Associate’s degree in Business Administration at a nearby community college and obtaining the Certified Administrative Professional
    (CAP) credential within the next two years. Her short‑term goal is to be promoted to Office Manager, overseeing a larger department and handling budgetary responsibilities. In the longer term, she aspires
    to transition into an Operations Manager role, where she can combine her practical problem‑solving skills with strategic planning. She also plans to mentor junior staff, develop formal leadership training,
    and eventually pursue a bachelor’s degree in Management to broaden her career options beyond her hometown.
