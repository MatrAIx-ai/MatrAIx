    and natural hair care products'']'
  hobbies: '[''Watercolor painting'', ''Reading speculative fiction'', ''Attending community theater'', ''Vintage shopping for fashion inspiration'', ''Yoga and mindfulness practice'', ''Beachcombing and
    coastal photography'', ''Cooking Southern cuisine with creative twists'', ''Traveling to fashion capitals for trend research'']'
  career_goals: Elyssa aims to transform her current salon position into a boutique studio that blends artistic expression with eco‑friendly hair care. She envisions opening her own flagship salon in the
    Gulf Coast region, featuring a dedicated space for experimental hair art and a line of her own natural hair products. Long‑term, she hopes to become a respected educator, offering workshops and mentoring
    aspiring stylists, and to be featured in regional fashion publications as a trendsetter in creative hairstyling.
