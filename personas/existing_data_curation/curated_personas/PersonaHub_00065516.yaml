persona_description: A healthcare professional who is interested in improving maternal and newborn care in low-income countries. They are passionate about the implementation of the Early Essential Newborn
  Care (EENC) program and are committed to making a difference in the lives of newborns. They are knowledgeable about the core components of EENC, including skin-to-skin contact, proper drying after birth,
  and exclusive breastfeeding, and are dedicated to ensuring that these interventions are available to all mothers and babies in their region. They are also aware of the challenges faced in implementing
  EENC in low-income countries and are committed to working with partners such as the World Health Organization and UNICEF to overcome these challenges and scale up EENC in the region.
