personas:
  professional: Reginald Campbell is a 24‑year‑old BIM specialist at a mid‑size engineering firm in Atlanta who leverages AutoCAD, Revit, and OSHA‑certified safety protocols to produce detailed residential
    and small‑commercial designs, and they meticulously manage budgets and schedules with color‑coded spreadsheets, apply Georgia building codes and LEED sustainability principles, and quietly excel at
    client communication and vendor negotiation, all while methodically working toward a bachelor’s degree in architecture and a future professional licensure.
  sports: Reginald Campbell follows the Atlanta Falcons throughout the NFL season, holds a season ticket for the Atlanta Braves, belongs to a local fishing club where they rise before dawn to cast at Lake
    Allatoona, and they fit their routine workouts into twice‑weekly sessions at the community center gym, always logging their reps in the same systematic spreadsheet they use for project budgets.
  arts: Reginald Campbell draws artistic inspiration from the clean lines of Frank Lloyd Wright’s houses, the soulful blues of B.B. King, the nightly community‑theater production of 'Our Town', and the
    annual Dahlonega folk‑music festival, and they often carve miniature wooden replicas of iconic structures while listening to classic Southern hymns recorded at their church.
  travel: Reginald Campbell plans their vacations like project schedules, reserving weekend road trips to the Blue Ridge Mountains or a historic stay in Savannah’s riverfront district, has already booked
    a spring itinerary to Asheville to study its art‑deco hotels, dreams of a future European tour to explore Barcelona’s Modernist architecture, and they always incorporate a night of sampling local BBQ
    joints into each trip.
  culinary: Reginald Campbell’s culinary routine revolves around slow‑smoked pulled pork seasoned with a rub of smoked paprika, brown sugar, and garden‑grown rosemary, a side of peach‑glazed collard greens,
    and a slice of fresh peach pie for dessert, while occasional evenings find them kneading sourdough starter and pairing meals with a tall glass of sweet tea.
  core: Reginald Campbell is a methodical, routine‑driven young professional who balances quiet precision in BIM design with a hands‑on love for woodworking, early‑morning fishing, and perfecting their
    BBQ rubs, and they obsessively track their life in color‑coded spreadsheets.
background:
  cultural: Reginald was raised in a middle‑class family in Woodstock, Georgia, steeped in Southern cultural traditions. His upbringing emphasized respect for tradition, a strong work ethic, and community
    involvement, values reinforced by his family's Southern Baptist church affiliation. He maintains close ties with extended family and participates in local events such as county fairs and church gatherings,
    appreciating the familiar rituals and interpersonal continuity. His cultural identity includes an appreciation for Southern cuisine like barbecue and peach pie, as well as a deep fondness for the region’s
    natural landscape.
attributes:
  skills: '[''AutoCAD'', ''Revit'', ''BIM coordination'', ''Project scheduling'', ''Budget management'', ''Georgia building code compliance'', ''LEED sustainability basics'', ''Construction documentation'',
