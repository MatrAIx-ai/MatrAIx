  hobbies: '[''Woodworking'', ''Model building'', ''Fishing'', ''Reading technical books and architecture history'', ''Chess'', ''Home improvement projects'', ''Herb gardening'']'
  career_goals: Reginald plans to earn a bachelor's degree in Architecture or Civil Engineering within the next three years, followed by licensure as a professional architect or engineer. He aims to lead
    larger multi-family and mixed-use projects and eventually launch his own boutique design firm specializing in sustainable, energy‑efficient homes for the Atlanta metro area. Additionally, he seeks to
    obtain a Project Management Professional (PMP) certification and become a mentor within his organization, while maintaining a stable work‑life balance.
