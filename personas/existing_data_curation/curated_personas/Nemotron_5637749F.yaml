  career_goals: Matthew aims to become the top‑producing broker in Merrimack County within the next five years while launching his own boutique real‑estate firm that emphasizes sustainable home practices
    and technologically enhanced client experiences. He plans to earn a certified real‑estate appraiser designation, expand his portfolio into investment properties, and create a mentorship program for
    junior agents. By leveraging his community ties, he hopes to shape local development projects that balance growth with environmental stewardship.
