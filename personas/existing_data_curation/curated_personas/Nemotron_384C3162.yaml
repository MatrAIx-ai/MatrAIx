  career_goals: Mohan aims to graduate high school with strong grades in math and science and then pursue a degree in engineering—preferably mechanical or civil—so he can apply his love of structure and
    practical problem‑solving to real‑world projects. He is particularly interested in robotics and hopes to join a university robotics team. In the long term, Mohan envisions a career designing reliable,
    efficient systems—such as automotive components, infrastructure, or software tools—that improve everyday life. He also values the idea of contributing to his community, hoping to work on local engineering
    projects or mentor younger students in STEM clubs.
