personas:
  professional: Mohan is a budding robotics enthusiast, blending his love for methodical building and programming with a practical, community‑oriented mindset, and they consistently lead school robotics
    projects with reliable, step‑by‑step planning.
  sports: Mohan plays midfield for Crown Point United’s youth soccer team, proudly supports the Cleveland Browns and Chicago Bulls, and they balance disciplined training sessions with a habit of reviewing
    game footage after each match to improve performance.
  arts: Mohan’s artistic side shines through an admiration for Theo Jansen’s kinetic sculptures, the synth‑driven soundscapes of Daft Punk, and the whimsical charm of The LEGO Movie, often spending weekends
    recreating scenes with LEGO bricks while they listen to the soundtrack, highlighting a creative outlet that mirrors their structured curiosity.
  travel: Mohan has explored Chicago’s Museum of Science and Industry and the Indiana Dunes on family road trips, dreams of a future field trip to the Kennedy Space Center, and they favor meticulously planned,
    short‑duration excursions that fit around school and soccer practice, reflecting a balance of curiosity and practical time management.
  culinary: Mohan prefers hearty meals like pepperoni pizza, macaroni and cheese, and chicken nuggets cut into LEGO‑shaped pieces, often experimenting with extra mozzarella or a pinch of paprika, while
    they occasionally help their mother bake chocolate‑chip cookies on weekends, blending comfort food with a playful, systematic approach to seasoning.
  core: Mohan, a methodical teen who obsessively arranges LEGO bricks by color, balances a love for structured robotics projects with occasional impulsive video‑game marathons, and they navigate life with
    a practical, community‑rooted reliability that masks a quiet yearning for creative exploration.
background:
  cultural: Mohan comes from a middle‑class white family in Crown Point, Indiana, a suburban community in Lake County known for its Midwestern values of hard work, community involvement, and practicality.
    He was raised attending the local public school system, where participation in extracurricular activities like sports, scouting, and school clubs is encouraged. Family gatherings often include visits
    to county fairs, local church services, and community events, reinforcing a sense of modesty, reliability, and respect for tradition. This cultural setting supports his organized, responsible personality
    and nurtures his interest in structured, hands‑on pursuits.
