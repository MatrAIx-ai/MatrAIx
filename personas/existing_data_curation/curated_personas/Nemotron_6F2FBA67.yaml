  hobbies: '[''Gardening'', ''Crocheting and quilting'', ''Traditional cooking'', ''Listening to regional Mexican and Tex‑Mex music'', ''Reading short stories in Spanish'', ''Small‑group tea and card games'',
    ''Participating in church and Día de los Muertos celebrations'', ''Walking along the Rio Grande trail'', ''Visiting the local library'']'
  career_goals: Although retired, Vivian aims to preserve and share her cultural heritage by teaching younger neighbors how to prepare traditional dishes and craft techniques. She hopes to compile a small
    family cookbook and a collection of stories from the Harlingen Mexican‑American community. Vivian also wants to maintain her health and independence, ensure her estate is in order for her grandchildren,
    and continue volunteering at the senior center, eventually taking on a mentorship role for new volunteers.
