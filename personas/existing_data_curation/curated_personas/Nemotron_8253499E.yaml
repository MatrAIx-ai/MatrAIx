  career_goals: Everette aspires to blend his love for art and technology into a future career as a multimedia artist or video‑game designer, where he can craft immersive visual stories. He also hopes to
    use his creativity to benefit his community, perhaps by organizing local mural projects or art‑based workshops for younger kids. Recognizing his anxiety about the unknown, he aims to strengthen his
    portfolio through high‑school art programs and summer coding camps, and he envisions attending a college that offers a strong interdisciplinary arts and tech curriculum. Ultimately, he wants a career
    that lets him express unconventional ideas while making a positive impact on others' well‑being.
