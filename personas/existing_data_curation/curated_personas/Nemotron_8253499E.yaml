personas:
  professional: Everette Gregory is a budding visual storyteller who merges hand‑drawn cartoons with digital art, leading his school’s art club mural projects and channeling his curiosity into robot‑building
    experiments, though his relaxed approach sometimes leaves deadlines forgotten.
  sports: Everette Gregory plays forward for the Meadowbrook Youth Soccer Club, cheering loudly for the local high school team and dreaming of one day supporting the national soccer squad, while also following
    professional clubs like FC Barcelona and Manchester United on game nights.
  arts: Everette Gregory thrives in the art club, coordinating themed challenges and mural collaborations inspired by classic comic artists like Charles Schulz, indie musician Sufjan Stevens, and Appalachian
    folk group The Carolina Chocolate Drops, while casually strumming simple chords to classic rock riffs from The Beatles and Led Zeppelin.
  travel: Everette Gregory prefers spontaneous weekend hikes in the nearby state forest and day trips to the regional science museum, but dreams of a family road trip to the Grand Canyon and a future visit
    to Tokyo's anime districts, balancing tight allowance constraints with a love for adventure.
  culinary: Everette Gregory enjoys cooking simple comfort foods like pepperoni pizza and grilled cheese, delights in snacking on apple cinnamon oatmeal and homemade banana smoothies, and experiments with
    layering spicy buffalo sauce on chicken nuggets after watching cooking videos online.
  core: Everette Gregory is a curious, socially vibrant 12‑year‑old who blends art, robotics, and soccer with a habit of day‑dreaming, occasional disorganization, and a lingering worry about meeting personal
    ambitions.
background:
  cultural: Everette grew up in Denver, a small town in Lincoln County, North Carolina, within a predominantly white, Appalachian‑influenced community. The local culture emphasizes close‑knit community
    gatherings, seasonal fairs, and a strong appreciation for the surrounding mountains and forests. Family traditions often revolve around Sunday church services, backyard barbecues, and participation
    in county festivals that celebrate folk music and crafts. Exposure to Appalachian folk art, storytelling, and a sense of self‑reliance has shaped his appreciation for creativity, community involvement,
    and the natural landscape.
