persona_description: An energy efficiency professional who specializes in the design and optimization of booster systems, particularly in residential buildings where the consumption profile has large periods
  with low flow. They are often tasked with assessing the need for a pilot pump in such applications and determining the most economical solution for the booster system. They have a deep understanding of
  the system's performance in low consumption periods and the impact of the main pumps' operation on energy consumption. They are skilled in using a compact solution to reduce the size of the diaphragm
  tank and the footprint of the system, and are familiar with the benefits of using a pilot pump to optimise energy consumption.
