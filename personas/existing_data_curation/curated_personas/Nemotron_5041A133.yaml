personas:
  professional: Lizette Garrido, a data-driven operations leader with three decades of cross-functional management experience, leverages their STEM background and design-thinking flair to champion innovative
    strategies while navigating corporate politics with a skeptical eye and a relaxed approach to deadlines; they thrive on turning analytical challenges into creative opportunities.
  sports: Lizette Garrido hikes the Santa Monica Mountains on weekends, follows the Los Angeles Dodgers baseball season religiously, and occasionally joins a recreational mixed-martial-arts club that meets
    on Tuesday evenings, treating fitness as a mental reset rather than a competitive outlet; they view physical activity as a way to clear their analytical mind.
  arts: Lizette Garrido regularly visits galleries showcasing vibrant modern painters like Frida Kahlo and Diego Rivera, devotes weekend evenings to photographing urban textures, and finds solace in listening
    to Miles Davis and John Coltrane during intimate jazz nights; they often draw creative inspiration from these artistic encounters for their own mixed-media projects.
  travel: Lizette Garrido favors flexible, small-group cultural tours that blend art-museum hopping in Barcelona, street-food walks in Oaxaca, and occasional skyrunning excursions in the Canadian Rockies;
    they often book flights at the last minute to satisfy their curiosity-driven wanderlust.
  culinary: Lizette Garrido enjoys cooking at home, mastering dishes like fragrant pork adobo with dried chilies, grilled corn masa cakes topped with fresh cilantro and lime, and experimenting with saffron-infused
    paella, while savoring the occasional artisanal cheese board featuring aged Manchego and quince paste; they love sourcing fresh herbs at weekend farmer's markets.
  core: Lizette Garrido blends analytical rigor with artistic spontaneity, juggling executive ambitions with late-night painting sessions, a habit of over-collecting art books, and a forgetful tendency
    to misplace their keys after every gallery visit.
background:
  cultural: Lizette’s Hispanic/Latino heritage is a blend of Mexican and Colombian family roots, shaping a bicultural identity that fuses Spanish language, family traditions, and a vibrant appreciation
    for music, food, and festivals. Growing up in a bilingual household, she celebrates Día de los Muertos, Navidad, and local community celebrations, often sharing these customs with her extended family
    in Woodland Hills. This cultural richness informs her worldview, fueling a respect for diverse perspectives and a desire to integrate artistic expression into her professional life while maintaining
    a strong sense of community and familial loyalty.
