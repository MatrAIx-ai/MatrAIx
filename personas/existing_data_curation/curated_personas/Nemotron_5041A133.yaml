  career_goals: Lizette aims to transition into a senior executive role, such as Director of Operations or Vice President of Innovation, where she can shape corporate strategy around technology and creativity.
    She is passionate about championing diversity and inclusion initiatives, particularly mentorship programs for women and Latinx professionals in STEM. Long‑term, she envisions launching a boutique consultancy
    that helps companies embed artistic perspectives into product development, fostering culturally resonant and market‑disruptive solutions.
