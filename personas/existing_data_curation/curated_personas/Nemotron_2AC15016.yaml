personas:
  professional: Gregory Austin, a 61‑year‑old veteran landscape architect, leverages advanced proficiency in AutoCAD, SketchUp, Revit, and GIS to design climate‑resilient coastal parks while their relaxed,
    sociable demeanor turns client meetings into lively brainstorming sessions, and occasional disorganization leads to last‑minute design tweaks that nonetheless inspire junior designers.
  sports: Gregory Austin stays active by leading a senior walking club that charts historic neighborhoods of St. Petersburg, paddling the Gulf in a local kayak association, cheering on the Tampa Bay Buccaneers
    and Tampa Bay Rays, and attending low‑impact yoga classes at the community center, preferring steady, social exercise over high‑intensity workouts.
  arts: Gregory Austin merges their watercolor sunrise canvases, inspired by Winslow Homer and Georgia O'Keeffe, with landscape photography reminiscent of Ansel Adams, regularly participates in St. Petersburg
    community theatre productions of Shakespeare and contemporary plays, and quotes Meryl Streep’s advice on authenticity while discussing art with local gallery owners.
  travel: Gregory Austin favors spontaneous weekend road trips that blend Gulf Coast relaxation with cultural immersion, having recently visited Savannah’s historic district, New Orleans’ culinary scene,
    and the orchid gardens of Singapore, while budgeting modestly and occasionally splurging on eco‑lodges that showcase sustainable design.
  culinary: Gregory Austin, an avid home chef, often prepares grilled mahi‑mahi with mango‑lime salsa using fresh key‑lime juice and herbs from their garden, enjoys cooking key lime pie at family gatherings,
    and experiments with aloe‑infused smoothies and hibiscus cocktails that highlight the succulents they tend.
  core: Gregory Austin is a curious, arts‑loving landscape architect who blends disciplined design with a delightfully disorganized, coffee‑fuelled lifestyle, constantly juggling senior walks, watercolor
    brushes, and spontaneous garden experiments.
background:
  cultural: Gregory grew up in a Midwestern small‑town family that valued hard work, modesty, and community gatherings, and later relocated to Saint Petersburg, Florida, 30 years ago. His upbringing instilled
    a sense of Southern hospitality and an appreciation for close‑knit neighborhoods. Living in Pinellas County, he has embraced the region’s coastal lifestyle, its diverse cultural tapestry—including Latin
    and Caribbean influences—and the strong environmental ethic prevalent among local residents. He celebrates traditional American holidays while also partaking in regional events like the St. Pete Renaissance
    Festival. This blend of Midwestern roots and Floridian coastal culture informs his design aesthetic, encouraging harmony between built environments and the natural landscape.
attributes:
  skills: '["Site analysis", "Master planning", "Ecological design", "Native plant selection", "Sustainable irrigation design", "AutoCAD", "SketchUp", "Revit", "GIS mapping", "Client consultation", "Project
    budgeting", "Team leadership", "Creative problem solving"]'
  hobbies: '["Watercolor painting", "Landscape photography", "Community theatre", "Kayaking", "Native plant gardening", "Volunteer at seed bank", "Art walks", "Food festivals", "Senior walking club"]'
  career_goals: Gregory aims to transition into a consultancy role that emphasizes climate‑resilient coastal landscapes for public parks and waterfronts across Pinellas County. He envisions launching a
    boutique studio that merges sustainable design with artistic installations, while mentoring the next generation of designers through a part‑time teaching position at a local community college. He also
    hopes to author a guidebook on Florida native planting and to be recognized with a regional award from the American Society of Landscape Architects for his contributions to community‑focused environmental
    design.
