persona_description: A historian who is interested in the history of Mennonite settlements in South Russia, particularly in the Molotschna settlement and the Hierschau village. They are particularly interested
  in the life and culture of the Mennonite settlers, the development of the village, and the impact of the Revolution and World War II on the village. They are also interested in the history of agriculture
  and the role of clay-pits in the prosperity of the village.
