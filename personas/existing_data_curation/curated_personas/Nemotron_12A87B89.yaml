personas:
  professional: Devin Craig, a seasoned industrial quality inspector with fifteen years of hands‑on experience in weigh‑scale calibration, statistical process control, and FDA/USDA compliance, mentors junior
    staff while their competitive drive pushes them to exceed production targets and their practical curiosity fuels continual SOP refinement.
  sports: Devin Craig, a dedicated member of Vilonia's adult soccer league, fronts the midfield for the local “Hillbilly Kickers,” follows the Arkansas Razorbacks football team each fall, and incorporates
    early‑morning fishing trips on the White River as low‑intensity cardio, blending competitive team play with solitary outdoor sport.
  arts: Devin Craig, a regular at the weekly country‑music jam at The Rusty Spur, strums along to classics by Johnny Cash and contemporary hits by Luke Combs, often cites Dolly Parton’s storytelling as
    inspiration for their woodworking designs, and enjoys the bluegrass sounds of Alison Krauss during quiet evenings at home.
  travel: Devin Craig favors meticulously planned road‑trip adventures, routinely camps in the Ozark foothills with family, spends occasional weekends hunting in the Texas Hill Country, and dreams of a
    guided fly‑fishing expedition on Patagonia’s remote rivers once their consulting practice provides the financial flexibility for such a distant venture.
  culinary: Devin Craig, a self‑taught pitmaster, crafts smoky brisket using a rub of paprika, brown sugar, and coffee grounds, experiments with hickory‑smoked pork ribs and cedar‑planked trout, and pairs
    each barbecue spread with a cold craft beer from a local Fayetteville brewery, showcasing both confidence in classic Southern flavors and a willingness to experiment.
  core: Devin Craig blends a competitive spark with a community‑first heart, juggling relentless quality‑control ambitions, a penchant for late‑night barbecue experiments, and a habit of double‑checking
    every scale reading even after a long day in the field.
background:
  cultural: Devin grew up in a rural part of Lonoke County, Arkansas, where community ties, church involvement, and a strong work ethic are core values. His upbringing emphasized hospitality, respect for
    tradition, and a love of Southern cuisine and outdoor recreation. He identifies with the region’s blend of conservative values and a pragmatic approach to life, celebrating local high‑school football
    games, county fairs, and seasonal hunting seasons. While he appreciates modern technology, his cultural lens remains rooted in the simple‑living, neighbor‑helping‑neighbor ethos typical of small‑town
    Arkansas.
attributes:
  skills: '[''Quality Inspection'', ''Material Sampling'', ''Weigh-Scale Operation'', ''Equipment Calibration'', ''Regulatory Compliance'', ''Statistical Process Control'', ''Root-Cause Analysis'', ''SOP
