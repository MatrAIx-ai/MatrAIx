  hobbies: '[''Hunting'', ''Fishing'', ''Adult Soccer League'', ''Country Music Jam Sessions'', ''Woodworking'', ''Barbecue Cooking'', ''Church Youth Sports Volunteering'', ''Camping'', ''Home Brewing'',
    ''Local Fair Attendance'']'
  career_goals: Devin aims to leverage his deep inspection expertise to move into a supervisory role within the next two years, targeting a shift‑lead or quality‑manager position. He plans to earn a Six
    Sigma Green Belt and an ASQ Certified Quality Auditor certification to strengthen his credentials. Long‑term, he envisions starting his own consulting practice helping small‑scale producers in Arkansas
    implement efficient quality‑control systems, which would allow him to combine his practical skills with his entrepreneurial drive while providing a stable income for his family.
