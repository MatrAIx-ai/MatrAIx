personas:
  professional: Catherine Harris is a seasoned home health aide who leverages her First Aid certification, meticulous care planning, and a love for mixed‑media art to integrate creative therapy into daily
    routines for seniors, while mentoring new aides and designing community wellness workshops.
  sports: Catherine Harris enjoys weekend hikes on the Appalachian foothills, participates in the Guernsey County Trail Club’s monthly walks, and is a devoted fan of the Cleveland Browns (NFL), the Cincinnati
    Reds (MLB), and the Ohio State Buckeyes football, often cheering from her living room while wearing her favorite team scarves.
  arts: Catherine Harris fills her free time painting vibrant mixed‑media pieces inspired by folk artists like Grandma Moses and contemporary painters such as Georgia O’Keeffe, attends productions at the
    Guernsey County Playhouse starring local talent like Sarah Lawson, and discusses the works of Bob Dylan and Brandi Carlile in her historical‑fiction book club.
  travel: Catherine Harris plans her trips with meticulous checklists, prefers leisurely road‑trips to nearby gems like Hocking Hills State Park and the Amish Country of Lancaster, while dreaming of a cultural
    pilgrimage to Kyoto’s temples and the historic streets of Galway, Ireland, balancing a modest travel budget with occasional splurges on weekend art retreats in Asheville.
  culinary: Catherine Harris loves preparing hearty chicken and dumplings, buttery buttermilk cornbread, and a summer ratatouille featuring garden‑grown zucchini, eggplant, and fresh basil, and as an intermediate
    home‑cook she experiments with plating like a gallery exhibit, though she often forgets to restock the pantry until her Saturday farmer’s‑market run.
  core: Catherine Harris blends caregiving precision with creative flair, turning senior wellness routines into art sessions while obsessively labeling every spice jar and occasionally over‑committing to
    community events.
background:
  cultural: Catherine is a white Midwestern American raised in Guernsey County, Ohio. Her upbringing reflects the region’s small‑town values of hard work, community involvement, and strong family ties.
    She grew up attending a Protestant church, participating in county fairs, and celebrating traditional holidays with homemade meals. The Appalachian influence of the area shaped her appreciation for
    folk art, outdoor recreation, and close‑knit neighborly networks, all of which inform her caring approach and community‑focused outlook.
attributes:
  skills: '[''Patient care'', ''Medication reminders'', ''Vital signs monitoring'', ''Mobility support'', ''First Aid and CPR certified'', ''Care documentation'', ''Scheduling and time management'', ''Team
