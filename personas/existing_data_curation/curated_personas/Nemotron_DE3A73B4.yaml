  hobbies: '[''Painting'', ''Mixed‑media art workshops'', ''Community theater'', ''Historical fiction book club'', ''Gardening'', ''Hiking Appalachian foothills'', ''Cooking family recipes'', ''Volunteering
    at senior center'', ''Leading craft circles'', ''Listening to philosophy and art podcasts'']'
  career_goals: Catherine aims to deepen her professional qualifications by earning a Certified Nursing Assistant (CNA) credential and a specialization in geriatric care. Over the next five years she hopes
    to transition into a supervisory role as a Home Health Aide Team Lead, where she can mentor new aides and design community‑based wellness programs that blend caregiving with art‑therapy workshops. Long‑term,
    she envisions opening a small adult‑day center in Guernsey County that offers holistic support and cultural enrichment for seniors.
