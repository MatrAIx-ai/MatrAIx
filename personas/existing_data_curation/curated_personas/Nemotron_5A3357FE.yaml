  career_goals: Karla dreams of a future where she can combine her love for living things with her practical problem‑solving mindset. She often talks about becoming a veterinarian or a wildlife biologist,
    roles that would let her care for animals while applying scientific knowledge. She also imagines designing inventions that help people in everyday life, hinting at an interest in engineering or applied
    science. Her goal is to pursue a career that allows her to work with small groups—whether caring for a herd of animals, conducting field studies, or teaching younger children—while making a tangible,
    helpful difference.
