personas:
  professional: Karla Johnson, a budding junior scientist in their elementary school’s science club, combines relentless curiosity about how things work with a methodical approach to experiments, and they
    meticulously record every hypothesis in a neatly organized notebook.
  sports: Karla Johnson, a member of their town’s elementary soccer league and an avid fan of the local professional baseball team, spends weekends sprinting through the park’s obstacle course and enjoys
    quiet bird‑watching sessions by the pond to recharge after games, and they often organize friendly matches with a small group of friends.
  arts: Karla Johnson, who sketches scenes from Mary Pope Osborne’s Magic Tree House adventures and practices piano pieces by Yann Tiersen, finds inspiration in the whimsical illustrations of Dr. Seuss
    and the melodic simplicity of Disney’s 'Let It Go', and they sometimes turn cookie‑baking sessions into edible art experiments.
  travel: Karla Johnson prefers family‑planned, low‑stress trips, having explored the nearby state forest’s camping grounds and the city’s interactive children’s museum, while dreaming of a future adventure
    to the Grand Canyon’s rim where they can collect rock specimens for their growing geology collection, and they always pack a small notebook to sketch new landscapes.
  culinary: Karla Johnson loves baking chocolate chip cookies with brown sugar and vanilla, enjoys assembling simple pasta salads with cherry tomatoes, mozzarella, and basil, delights in snacking on apple
    slices drizzled with peanut butter, and they often experiment with a pinch of cinnamon for extra flavor.
  core: Karla Johnson is a curious, organized seven‑year‑old who balances imaginative LEGO constructions with meticulous note‑taking, occasionally loses track of time in books, and they can be stubbornly
    particular about the placement of every pine cone they collect.
background:
  cultural: 'Karla grows up in a close‑knit, predominantly white community in Minnesota City, a small town in Winona County. Her family follows many Midwestern traditions: seasonal celebrations of holidays
    like Thanksgiving and Christmas, weekend trips to the nearby lake for swimming and ice‑fishing, and participation in local events such as the county fair and community potlucks. The cultural atmosphere
    emphasizes modesty, self‑reliance, and a strong connection to nature, which nurtures her love for outdoor exploration. While her family may attend a Lutheran church, the household also values inclusivity
    and encourages curiosity about the wider world, supporting Karla’s balanced blend of practicality and imagination.'
