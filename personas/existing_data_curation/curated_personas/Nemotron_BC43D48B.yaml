  hobbies: '[''Woodworking'', ''Home Renovation'', ''Gardening (vegetable garden)'', ''Golf'', ''Chess'', ''Historical Preservation (Matthews Historical Society)'', ''Book Club (Classic & Non-Fiction)'',
    ''Fishing'', ''Volunteer Work (Community Events)'']'
  career_goals: Arthur aims to transition his extensive property-management experience into a senior regional director role overseeing multiple communities across the greater Charlotte area. He plans to
    expand his portfolio by acquiring and managing higher-value mixed-use developments, integrate sustainable building practices, and mentor emerging managers within his firm. In the longer term, he hopes
    to establish his own boutique property-management consultancy that emphasizes data-driven efficiency and resident well-being, while balancing his desire for a stable, predictable work environment with
    his need for personal well-being.
