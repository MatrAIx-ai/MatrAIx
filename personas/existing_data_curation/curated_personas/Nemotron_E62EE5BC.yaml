personas:
  professional: Michael Gurnick, a seasoned network and computer systems administrator with a graduate business degree, blends deep technical expertise in virtualization, cloud migration, and IT budgeting
    with a pragmatic, curiosity‑driven mindset, making them a reliable bridge between engineering teams and executive leadership as they seek to step into a senior IT director role in Volusia County.
  sports: Michael Gurnick, a loyal fan of the Miami Dolphins, the Tampa Bay Rays, and the Daytona 500, cycles with the Daytona Beach Senior Cycling Club and enjoys occasional weekend rounds of golf at the
    Ocean Breeze Golf Club, merging their love of low‑key fitness with community sporting traditions.
  arts: Michael Gurnick, an avid coastal‑landscape photographer inspired by Ansel Adams and a fan of classic Southern rock like The Allman Brothers Band and folk storyteller John Prine, spends evenings
    flipping through mystery novels by Tana French and attending occasional local theater productions starring community actors, weaving artistic appreciation into their solitary leisure.
  travel: Michael Gurnick, who prefers road‑tripping along the historic coastal Highway 1 to St. Augustine and the Florida Keys, occasionally plans extended stays in historic European cities like Rome to
    indulge a love of non‑fiction history, yet balances travel with family obligations and a modest vacation budget, opting for a mix of spontaneity and careful planning.
  culinary: Michael Gurnick, who relishes cooking grilled grouper with fresh lemon, cilantro, and a dash of smoked paprika, also enjoys making shrimp jambalaya using home‑grown oregano and cayenne, and
    while they are a competent home‑chef, they often order takeout on busy weeks, reflecting a pragmatic blend of culinary curiosity and convenience.
  core: Michael Gurnick, a curious yet laid‑back network veteran who trades early‑morning fishing for late‑night tinkering with smart home gadgets while occasionally forgetting appointments, epitomizes
    a balanced blend of practical ambition and relaxed quirks.
background:
  cultural: Michael grew up in a middle‑class, suburban environment in the southeastern United States, where community ties and a strong work ethic were emphasized. His family’s cultural values—rooted in
    a Protestant ethic of service and modesty—shaped his practical, cooperative outlook. Living his adult life in Daytona Beach, he embraces the coastal lifestyle, which blends relaxed outdoor recreation
    with a modest appreciation for local traditions and seasonal events. His marriage and long‑term residency in Volusia County have reinforced a sense of local belonging, while his business education and
    career in IT reflect the broader American emphasis on professional advancement and adaptability.
attributes:
  skills: '[''Network design'', ''Server administration'', ''Virtualization (VMware/Hyper-V)'', ''Cybersecurity fundamentals'', ''IT budgeting'', ''Vendor management'', ''Business continuity planning'',
    ''Project management'', ''Scripting (PowerShell, Bash)'', ''Cloud services (AWS, Azure)'', ''Help desk support'', ''Troubleshooting'']'
  hobbies: '[''Fishing'', ''Beachcombing'', ''Home automation tinkering'', ''Woodworking'', ''Reading (technology and non-fiction)'', ''Photography of coastal landscapes'', ''Local history research'', ''Playing
    board games with close friends'', ''Gardening'', ''Cycling'']'
  career_goals: Michael aspires to transition from a hands‑on administrator role to a senior IT leadership position, such as IT Director for a regional office or a multi‑site operation in the Volusia County
    area. He aims to lead a digital transformation initiative that migrates legacy systems to the cloud, improving scalability and cost‑efficiency for his organization. To support this ambition, Michael
    plans to earn advanced certifications such as CCNP and CISSP, mentor junior staff, and develop a comprehensive IT strategy that integrates business analytics and process automation. Looking ahead, he
    envisions establishing a boutique consulting practice focused on small‑to‑medium businesses in coastal Florida, leveraging his blend of technical expertise and business insight.
