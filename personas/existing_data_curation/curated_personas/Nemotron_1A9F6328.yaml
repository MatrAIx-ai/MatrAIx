  career_goals: As she approaches retirement, Niketa aims to transition into a strategic advisory role that amplifies senior services and intergenerational programs in Franklin County. She plans to secure
    long-term, sustainable funding for community centers, champion racial equity initiatives, and mentor the next generation of social-service leaders. She also hopes to develop a regional coalition of
    nonprofits focused on mental-health support for older adults, and ultimately to contribute part-time as a guest lecturer on community program management at a nearby community college.
