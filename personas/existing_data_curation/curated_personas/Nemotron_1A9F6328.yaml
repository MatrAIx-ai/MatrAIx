personas:
  professional: Niketa Shorter, a seasoned community‑service manager with three decades of experience, leverages meticulous program design, grant‑writing expertise, and data‑driven evaluation to shape senior‑focused
    intergenerational initiatives while mentoring emerging leaders and advocating for equitable funding in Franklin County.
  sports: Niketa Shorter, an enthusiastic walker who joins her husband for daily strolls through the town’s historic park and cheers on the local high‑school baseball team while maintaining a seasonal membership
    with a community yoga class, also rooted in longtime fandom for the Boston Red Sox and the New England Patriots.
  arts: Niketa Shorter, a devoted gospel choir member, finds solace in singing hymns by Mahalia Jackson, reading Toni Morrison’s novels, and knitting hand‑crafted blankets while her artistic palate is also
    enriched by attending the regional theatre’s production of 'The Piano Lesson' and listening to Aretha Franklin’s timeless recordings.
  travel: Niketa Shorter, a meticulous planner, prefers escorted heritage tours that explore Civil War sites in Virginia, historic churches in New England, and the coastal charm of Savannah, Georgia, while
    budgeting her travel expenses through a dedicated senior‑travel savings account and limiting trips to two per year to accommodate health considerations.
  culinary: Niketa Shorter, an avid home cook, skillfully prepares soul‑food staples like collard greens simmered with smoked turkey, crisp cornbread, and sweet potato pie, often harvesting fresh vegetables
    from her spring garden and experimenting with spice blends such as Cajun paprika and dried sage.
  core: Niketa Shorter blends a lifelong devotion to community stewardship with a disciplined, garden‑tuned routine, yet she occasionally wrestles with anxiety‑driven over‑planning and an irresistible habit
    of collecting vintage hymnals.
background:
  cultural: Niketa is a second-generation African-American whose grandparents migrated from the Southern United States to New England during the Great Migration. Raised in a close-knit church community
    in Massachusetts, she grew up with the traditions of gospel music, oral storytelling, and a strong emphasis on communal responsibility. Her cultural identity blends the resilience and solidarity of
    Black heritage with the civic engagement culture of New England. She incorporates these values into her work, emphasizing equity, mutual aid, and intergenerational support, while also celebrating family
    gatherings, soul food cooking, and church festivals that honor her ancestors.
