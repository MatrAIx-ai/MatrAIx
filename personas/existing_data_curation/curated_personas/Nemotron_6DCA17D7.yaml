  hobbies: '[''Reading historical non-fiction'', ''Gardening'', ''Walking in local parks'', ''Playing chess'', ''Traditional Indian cooking'', ''Attending community cultural festivals'', ''Volunteering
    at the senior center'', ''Exploring tablet apps for seniors'']'
  career_goals: Although retired, Ayman aims to stay actively involved in education by volunteering as a mentor for young teachers and offering free tutoring sessions to low‑income families in Middlesex
    County. He hopes to author a practical guide on effective teaching strategies for adult learners, combining his curiosity for new pedagogical ideas with his preference for pragmatic application. Additionally,
    he aspires to receive recognition from local educational foundations for his community contributions, satisfying his competitive drive while reinforcing his commitment to lifelong learning.
