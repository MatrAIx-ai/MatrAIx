  career_goals: Larry aims to become a department head within the next five years, using that role to champion innovative, technology‑enhanced curricula in the humanities. He plans to pursue a master's
    degree in Curriculum and Instruction, develop a school‑wide interdisciplinary program that connects literature, history, and philosophy, and eventually transition into an instructional coaching or school
    administration position where he can shape district‑wide teaching practices and mentor new educators.
