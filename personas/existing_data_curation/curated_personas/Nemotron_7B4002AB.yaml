  career_goals: Because he values routine, predictability, and tangible achievement, Jamarko’s primary career goal is to secure a stable, part‑time role that lets him apply his organizational strengths
    in a community‑focused setting. He is targeting positions such as program coordinator at a local recreation center or administrative assistant for a nonprofit serving seniors, where daily responsibilities
    follow a set schedule. He also dreams of launching a modest home‑service business – offering handyman repairs and catering for neighborhood events – once he obtains a state‑issued handyman certification.
    To support these goals, he plans to enroll in a short vocational course, strengthen his resume, and develop stress‑management strategies to maintain his emotional well‑being while he re‑enters the workforce.
