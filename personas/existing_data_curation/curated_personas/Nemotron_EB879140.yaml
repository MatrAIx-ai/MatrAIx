  hobbies: '[''Strategy video games'', ''LEGO Technic building'', ''Hip‑hop and R&B music listening'', ''Journaling'', ''Small‑group basketball'', ''Reading sci‑fi novels'']'
  career_goals: Nathaniel aims to earn his GED within the next twelve months and then pursue a vocational certification that aligns with his love for structured, tangible work—either as a certified automotive
    technician or an IT support specialist. He seeks a career path that offers clear progression, steady income, and the ability to apply his practical problem‑solving skills daily. Long‑term, he hopes
    to achieve financial stability that enables him to support his family, give back to his community through mentorship programs for at‑risk youth, and eventually start his own small‑scale service business,
    such as a mobile computer repair service or a neighborhood auto‑care shop.
