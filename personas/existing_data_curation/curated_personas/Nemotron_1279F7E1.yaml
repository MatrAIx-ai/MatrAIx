  career_goals: Although retired from formal employment, Phyllis aims to channel her lifelong love of learning and art into meaningful civic contributions. She aspires to become a lead volunteer coordinator
    for a local museum’s senior‑focused outreach, launch an intergenerational art exchange that pairs retirees with school‑age students, and serve on the board of a community cultural council. Additionally,
    she hopes to author a memoir that weaves together her teaching stories, travel experiences, and reflections on the evolving art world, thereby preserving her legacy and inspiring future educators.
