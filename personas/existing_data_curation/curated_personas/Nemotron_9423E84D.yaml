personas:
  professional: Kristine Stevens, a 19‑year‑old aspiring concept artist and graphic design student, blends methodical planning with vivid imagination to produce surreal digital illustrations and character
    designs using Procreate and Photoshop, and they actively seek internships at indie game studios while envisioning a future as a creative director.
  sports: Apart from a love for horseback riding at the local equestrian club, Kristine Stevens practices yoga thrice weekly at Sunrise Flow studio, follows the Miami Heat for basketball and the Tampa Bay
    Rays for baseball, and they keep fitness low‑key with weekend jogs through the park and occasional beach volleyball with friends.
  arts: Kristine Stevens draws deep inspiration from surrealist painter Remedios Varo, digital installation artist Refik Anadol, and ambient musician Aphex Twin, frequents the Pérez Art Museum Miami and
    Wynwood Walls for contemporary art exposure, and they often experiment with mixed media collages that fuse photography, poetry, and generative Python scripts.
  travel: Kristine Stevens prefers budget‑friendly cultural itineraries, having explored Miami’s vibrant Wynwood street art, the historic charm of St. Augustine, and a week‑long solo trip to Iceland’s ethereal
    black sand beaches, and they plan future visits to Japan's Kyoto for its tea ceremony and to the Caribbean islands for their rhythmic festivals.
  culinary: Kristine Stevens enjoys crafting avocado toast topped with radish, poached egg, and chili flakes, savors key lime pie and Cuban sandwich with mojo pork, experiments with matcha‑infused smoothies,
    and they occasionally indulge in late‑night ramen bowls after art sessions, while maintaining a habit of chewing gum to stay focused.
  core: Kristine Stevens, a 19‑year‑old visual storyteller, balances meticulous project planning with wild imagination, fills sketchbooks with surreal worlds, hoards scented candles for ambiance, and they
    can't resist a late‑night binge of sci‑fi novels before sunrise.
background:
  cultural: Kristine grew up in Wellington, a suburban community in Palm Beach County known for its well‑planned neighborhoods and strong equestrian culture. Her family, of European descent, provided a
    middle‑class upbringing that emphasized education, community involvement, and artistic expression. While her day‑to‑day life reflected typical American suburban values—celebrating holidays like Thanksgiving
    and Fourth of July—her proximity to the culturally diverse Miami metropolitan area exposed her to a rich tapestry of Latin, Caribbean, and international influences. She attended local schools where
    arts programs were encouraged, and she often visited nearby galleries and museums, which nurtured her appreciation for both classic and contemporary art. This blend of suburban stability, exposure to
    multicultural artistic scenes, and a supportive family environment shaped Kristine's thoughtful, collaborative, and creatively inquisitive outlook.
attributes:
  skills: '[''digital illustration'', ''graphic design basics'', ''creative writing'', ''basic Python programming'', ''project planning'', ''critical thinking'', ''photography'']'
  hobbies: '[''sketching and digital painting'', ''reading speculative fiction'', ''creative writing (poetry and short stories)'', ''photography'', ''mind‑mapping and journaling'', ''listening to experimental
    music'', ''volunteering at local art events'', ''small‑group book club'']'
  career_goals: In the short term, Kristine plans to enroll in a bachelor's program in Visual Arts or Graphic Design at a Florida university, where she can refine her technical skills and expand her portfolio.
    She aims to secure an internship at a design studio or indie game developer to gain professional experience and build industry connections. Over the next five to ten years, Kristine aspires to become
    a lead concept artist and eventually transition into a creative director role, guiding multidisciplinary teams to produce innovative visual narratives for video games, animation, or interactive media.
    She also envisions establishing a small freelance practice that blends illustration, storytelling, and emerging technologies such as AR/VR, allowing her to maintain creative independence while collaborating
    on experimental projects.
