  hobbies: '[''reading (fiction and non-fiction)'', ''hiking in the Ozarks'', ''nature photography'', ''watercolor painting'', ''jigsaw puzzles'', ''acoustic guitar'', ''short story writing'', ''cooking/baking'',
    ''volunteering at library book club'']'
  career_goals: 'Looking ahead, Cynthia aims to channel her analytical curiosity into a data‑driven career that balances intellectual challenge with tangible impact. She plans to transfer to a four‑year
    university to complete a bachelor''s degree in environmental science or data analytics, followed by professional certifications such as Google Data Analytics and Tableau. Her medium‑term ambition is
    to secure an entry‑level analyst role with a state agency or nonprofit focused on public health or natural resource management, where she can apply her research skills to inform policy. Ultimately,
    she envisions becoming a senior analyst or project manager, leading interdisciplinary teams to design evidence‑based solutions. Cynthia also harbors a longer‑term entrepreneurial goal: launching a boutique
    consultancy that assists rural communities in gathering and visualizing environmental data, allowing her to blend competitive drive with community service.'
