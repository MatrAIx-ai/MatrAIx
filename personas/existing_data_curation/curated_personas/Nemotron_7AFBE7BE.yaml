personas:
  professional: Cynthia Donnelly, a 21‑year‑old community‑college student specializing in environmental science, leverages advanced Excel, basic Python, and field‑survey experience to deliver data‑driven
    insights for local conservation projects while they secretly eye a senior analyst role in a future boutique consultancy.
  sports: Cynthia Donnelly hikes the Ozark trails on weekends, belongs to a small local trail‑running club, roots for the Arkansas Razorbacks basketball team and the St. Louis Cardinals, and occasionally
    joins a casual pick‑up soccer game with friends to keep active, all while they prefer the quiet solitude of nature over crowded stadiums.
  arts: Cynthia Donnelly spends evenings painting watercolor landscapes inspired by Monet, strums acoustic guitar to the folk tunes of Sufjan Stevens, devours contemporary fiction by Ocean Vuong, assembles
    intricate jigsaw puzzles, and submits short stories to the Mountain Home Literary Review for a competitive edge, showing they channel their competitive streak into creative pursuits.
  travel: Cynthia Donnelly prefers low‑key road trips that combine hiking and photography, has logged visits to the Great Smoky Mountains and the Grand Canyon, plans future trips to Iceland’s waterfalls
    using spreadsheets, and balances wanderlust with a limited student budget, all while they meticulously map out each itinerary to avoid unexpected costs.
  culinary: Cynthia Donnelly cooks family‑style comfort foods like chicken‑and‑dumplings, homemade mac and cheese, and apple pie, perfects blueberry muffins with fresh local berries, and finds stress relief
    in measuring ingredients precisely, though they often forget to set a timer and end up with charred edges.
  core: Cynthia Donnelly is a data‑curious introvert who channels competitive drive into meticulous research, solo hikes, and carefully budgeted comforts, all while they wrestle with a persistent worry
    that fuels both productivity and occasional overthinking.
background:
  cultural: Cynthia is a white woman raised in Mountain Home, a small town in the Ozark region of northern Arkansas. Her upbringing is steeped in the rural Southern values of self‑reliance, close‑knit community
    networks, and a deep appreciation for the surrounding natural landscape. Family traditions have included church gatherings, seasonal festivals, and backyard gardening, all of which fostered a sense
    of grounded practicality. At the same time, attending a regional community college exposed her to a broader mix of students and ideas, encouraging a cautious but genuine curiosity about the wider world.
    While she respects the conservative leanings prevalent in her community, she has cultivated a personal identity that blends regional heritage with a desire for continual learning and measured ambition.
attributes:
  skills: '[''research'', ''data analysis'', ''Microsoft Excel'', ''basic Python programming'', ''field survey methods'', ''report writing'', ''time management'', ''self-motivation'', ''critical thinking'',
