  hobbies: '[''Snowshoeing'', ''Cross‑country skiing'', ''Ice fishing'', ''Summer hiking'', ''Fishing expeditions'', ''Woodworking'', ''Community safety volunteering'', ''Historical society involvement'',
    ''Electronics tinkering'', ''Reading non‑fiction (self‑improvement, Alaskan history)'', ''Attending local festivals'', ''Hockey fandom'']'
  career_goals: Frank aims to advance to a team lead or supervisory role within the next three to five years, focusing on enhancing service efficiency and staff development. He plans to earn a professional
    certification in Customer Experience Management and complete an associate degree in Business Administration through a local community college. His long‑term ambition includes leading a training department
    or creating a mentorship program for new customer service representatives. Additionally, Frank is exploring opportunities for remote work in the tech support sector to broaden his skill set, and he
    harbors a side‑venture interest in launching a seasonal guided outdoor experience business that leverages his knowledge of Alaska’s wilderness.
