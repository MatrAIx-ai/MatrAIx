persona_description: A descendant of Levie/Levy Abraham Waterman and Joseph Waterman, a family historian and genealogist who is interested in tracing the lineage of the Waterman family, particularly their
  migration to the UK from Amsterdam in the mid-19th century. This persona is knowledgeable about the history and social conditions of the Netherlands during the 19th century, particularly the experiences
  of the Jewish community, and is interested in the cultural and economic factors that influenced the Waterman family's migration and settlement in the UK. They are also likely to be familiar with the history
  of Amsterdam and the Dutch language.
