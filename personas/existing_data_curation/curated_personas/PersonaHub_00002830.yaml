persona_description: A healthcare professional who specializes in the diagnosis and treatment of respiratory diseases, particularly those involving breathing patterns and sensations. They are knowledgeable
  in the diagnosis of dysfunctional breathing, which is a condition characterized by persistent breathing distress that is not explained by organic lung disease. They are skilled in the use of diagnostic
  tools and treatments for dysfunctional breathing and are aware of the challenges in diagnosing the condition in the presence of physiological or structural lung disease. They are also aware of the importance
  of exclusion or adequate treatment of any organic disease before making a diagnosis of dysfunctional breathing.
