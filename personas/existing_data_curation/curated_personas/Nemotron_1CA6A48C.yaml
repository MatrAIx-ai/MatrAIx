  hobbies: '[''visiting art galleries'', ''attending jazz festivals'', ''painting on canvas'', ''photography of historic architecture'', ''cooking Creole cuisine'', ''gardening'', ''reading African-American
    literature'', ''volunteering at youth art programs'', ''puzzle solving'', ''participating in Second-Line parades'']'
  career_goals: Aaliyah aims to cement her legacy by establishing a boutique historic‑preservation consulting practice that offers specialized color‑matching and restoration services for New Orleans’s iconic
    homes. She plans to earn a formal certification in historic preservation painting, launch a community art studio that provides workshops in decorative painting and paper‑hanging, and publish a guidebook
    on traditional color palettes and techniques used in Creole architecture. Additionally, she hopes to mentor a new generation of Black craftsmen and complete a large‑scale community mural in the Tremé
    neighborhood celebrating African‑American heritage.
