personas:
  professional: Aaliyah Richardson, a veteran historic‑preservation painter and consultant in New Orleans, leverages four decades of expertise in surface preparation, period‑accurate color theory, and crew
    management while channeling her curiosity and methodical nature into meticulous restoration projects and mentoring apprentices.
  sports: Aaliyah Richardson participates in a senior softball league at the Crescent City Recreation Center, enjoys walking the riverfront for fitness, and is a season ticket holder for the New Orleans
    Saints and Pelicans, while occasionally joining the local NOLA Rowing Club for spring water‑training sessions.
  arts: Aaliyah Richardson immerses herself in the New Orleans art scene, painting weekly at the City Hall Fine Arts Studio, attending Wynton Marsalis concerts, admiring works by contemporary photographer
    Carrie Mae Weems, and curating a personal scrapbook of color palettes inspired by historic French‑Quarter architecture.
  travel: Aaliyah Richardson prefers meticulously planned trips that blend cultural discovery and relaxation, such as a week‑long architectural tour of Savannah, a culinary weekend in Charleston’s historic
    district, and an annual pilgrimage to the Jazz festivals of New Orleans, while dreaming of a future study‑trip to the art museums of Paris.
  culinary: Aaliyah Richardson cooks Creole cuisine with confidence, mastering gumbo with Andouille sausage, shrimp, okra, and a dash of filé powder, often experimenting with fresh thyme, bell pepper, and
    cayenne, while hosting monthly dinner gatherings where she pairs dishes with locally sourced hot sauce and rye bread.
  core: Aaliyah Richardson is a meticulous preservationist who balances disciplined budgeting, proactive health checks, and a vibrant love for New Orleans art, jazz, and Creole cooking, all while occasionally
    indulging in competitive puzzles and occasional dental neglect.
background:
  cultural: Aaliyah is a Black woman whose family roots run deep in New Orleans, particularly the historic Tremé neighborhood. She grew up surrounded by the city’s unique blend of Creole, French, and Southern
    traditions—listening to jazz and blues, celebrating Mardi Gras and Second‑Line parades, and participating in church and community gatherings. Her cultural identity is shaped by the oral histories, culinary
    heritage, and artistic expressions of the Black Creole community, and she maintains close ties with extended family and local Black‑owned businesses. This background fuels her passion for historic preservation
    and the vibrant aesthetic that defines New Orleans.
attributes:
  skills: '[''interior painting'', ''paper hanging'', ''surface preparation'', ''color theory'', ''decorative faux finishing'', ''custom mural creation'', ''historical restoration painting'', ''project
