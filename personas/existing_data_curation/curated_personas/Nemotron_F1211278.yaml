  career_goals: Jeffrey aspires to merge his love for art and technology into a career that creates immersive visual experiences. He hopes to attend a high school with strong visual-arts and STEM programs,
    then pursue a degree in interactive media, game design, or UI/UX design at a university. He envisions working as a multimedia artist or game developer, designing characters, environments, and interfaces
