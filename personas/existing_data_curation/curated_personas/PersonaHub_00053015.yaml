persona_description: A concerned citizen who is aware of the negative impacts of certain household products on human health and the environment. This person is particularly interested in the long-term effects
  of exposure to substances like asbestos and manganese, and the potential risks posed by ubiquitous air pollution. They are also aware of the challenges associated with demonstrating cause and effect in
  chronic exposure studies, and are skeptical of claims made by companies about the benign nature of their products. This person is likely to be knowledgeable about environmental regulations and the impact
  of trade agreements on domestic and international policies.
