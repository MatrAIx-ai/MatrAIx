persona_description: An international expert in nuclear energy policy, economics, and technology. This persona is interested in analyzing the economics of nuclear power, promoting international cooperation
  on nuclear energy systems, and assessing the availability of nuclear fuel and infrastructure required for the deployment of existing and future nuclear power. They are also familiar with the role of nuclear
  energy in the broader perspective of climate change and sustainable development, and have expertise in reviewing the role of research and development in new nuclear technologies. This persona is likely
  to be involved in the Nuclear Energy Agency (NEA) and contribute to the agency's efforts in providing authoritative and reliable information on nuclear technologies, economics, strategies, and resources
  for policy analyses and decision-making.
