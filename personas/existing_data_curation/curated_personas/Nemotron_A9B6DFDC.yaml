  career_goals: Gloria aims to advance to a senior strategic analyst or consulting manager role within the next five years. She plans to complete her bachelor’s degree in Business Administration and earn
    both a Project Management Professional (PMP) certification and a Six Sigma Black Belt to deepen her expertise. Her ambition is to lead enterprise‑wide transformation projects for regional employers
    and local government agencies, championing a data‑driven culture that balances innovative ideas with practical outcomes. She also aspires to mentor emerging analysts, develop predictive‑analytics capabilities
    for her organization, and eventually step into a director‑level position overseeing operational excellence across Rapides Parish.
