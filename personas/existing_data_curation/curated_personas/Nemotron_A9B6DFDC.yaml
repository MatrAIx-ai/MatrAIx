personas:
  professional: Gloria Fowler is a data‑driven management analyst who combines advanced Excel, Power BI, and SQL expertise with Lean Six Sigma and Agile project management, while they channel a sociable,
    assertive communication style and balanced curiosity into leading cross‑functional workshops that turn complex process maps into practical, high‑impact improvements.
  sports: Gloria Fowler plays competitive tennis at the Alexandria Community Center, follows the New Orleans Saints and Pelicans as a devoted fan, and joins a local running club for seasonal trail runs
    in Kisatchie National Forest, reflecting a blend of team spirit and personal fitness commitment they nurture across the year.
  arts: Gloria Fowler shines on stage in community theater productions of classics like 'A Streetcar Named Desire,' while they also enjoy live Zydeco performances by Beau Jocque, playlists featuring Beyoncé
    and Hozier, and occasional trips to see the New Orleans Opera, weaving performance and music into their social calendar.
  travel: Gloria Fowler favors spontaneous weekend road trips that explore Louisiana’s historic plantations, the Natchez Trace Parkway, and the culinary delights of New Orleans, while they plan annual family
    vacations to Asheville’s Blue Ridge Mountains for a mix of adventure hiking and relaxed mountain‑cabin evenings.
  culinary: Gloria Fowler excels at cooking Cajun staples such as gumbo with andouille sausage, shrimp étouffée, and creamy biscuits, drawing fresh herbs like thyme and basil from their own garden, and
    they alternate between hosting lively dinner parties and indulging in occasional visits to upscale farm‑to‑table restaurants for inspiration.
  core: Gloria Fowler blends analytical rigor with a lively social pulse, expertly juggling data projects, festival fun, and garden‑fresh cooking, while a modest budgeting habit coexists with a love for
    spontaneous Mardi Gras splurges and a persistent habit of forgetting to water their indoor succulents.
background:
  cultural: Gloria was raised in Boyce, a small town in central Louisiana, where Southern hospitality, close‑knit family ties, and community involvement shape everyday life. Her family’s traditions include
    regular church attendance, Sunday gatherings with extended relatives, and participation in local events that celebrate the region’s French‑Acadian (Cajun) and broader Southern heritage. These influences
    fostered her appreciation for storytelling, music, and food, while also instilling values of hard work, respect for tradition, and a willingness to support neighbors. This cultural foundation informs
    her pragmatic outlook, her love of community engagement, and her ability to blend curiosity with proven methods.
