  career_goals: Morgan dreams of a future where she can turn her imagination into a career, envisioning herself as a concept artist or illustrator for fantasy novels and video games. She also imagines designing
    interactive experiences that blend storytelling with simple coding. Because she values flexibility and independence, she hopes to work in an environment that allows her to set her own schedule and explore
    new ideas without rigid constraints. Over time, she hopes her work can help others express complex feelings through art, perhaps leading to a role that combines creativity with mental‑well‑being advocacy.
