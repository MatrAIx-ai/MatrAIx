personas:
  professional: Morgan Chung, a budding digital illustrator and storyteller, blends vivid creature designs with code‑driven interactive comics, thriving on imaginative freedom while occasionally neglecting
    deadlines due to a laid‑back approach that they prefer over strict planning.
  sports: Morgan Chung dribbles for the River Rangers youth soccer club, swims laps at the community pool, and cheers on the Los Angeles Lakers, channeling a competitive streak into practice while they
    often opt out of large team celebrations.
  arts: Morgan Chung devotes afternoons to sketching fantastical beasts inspired by Hayao Miyazaki’s films and Neil Gaiman’s novels, swapping comic strips with friends while they listen to piano renditions
    of Yiruma’s 'River Flows in You' for creative fuel.
  travel: Morgan Chung explores nearby forest trails and the city’s science museum, dreams of visiting Tokyo’s Studio Ghibli Museum and the Hobbiton sets in New Zealand, and plans trips meticulously with
    a hand‑drawn map despite a limited travel allowance that they must negotiate with their parents.
  culinary: Morgan Chung experiments with making cheese quesadillas, strawberry‑banana smoothies, and occasional ramen bowls, mastering simple knife skills to slice vegetables into artful shapes while they
    prefer the comfort of classic mac and cheese after a long drawing session.
  core: Morgan Chung is a ten‑year‑old imaginative artist who balances a competitive zeal with a shy, anxiety‑prone nature, channeling stress into sketching, piano, and dream‑filled adventures that they
    cherish.
background:
  cultural: Morgan was raised in a middle‑class White American family in El Cajon, a suburban community within San Diego County. Her upbringing reflects typical Southern California values, such as celebrating
    holidays like Thanksgiving, Fourth of July, and Halloween, and participating in local events such as the Lemon Festival and community art fairs. The multicultural atmosphere of the region has exposed
    her to diverse artistic influences, while her family’s emphasis on curiosity and self‑expression has nurtured her love for imagination and abstract thinking.
