personas:
  professional: Kim Jefferson, a three-year-old preschool enthusiast, applies an exceptionally organized and disciplined approach to building block towers, balancing curiosity with practicality to meet
    high standards in every play session.
  sports: Kim Jefferson, a three‑year‑old bundle of energy, joins the Little Sprinters Soccer Club for weekly toddler soccer sessions, cheers for the Chicago Cubs during family game nights, and loves bouncing
    on the playground, showing disciplined enthusiasm for physical activity.
  arts: Kim Jefferson, at three, delights in dancing to The Wiggles, humming the 'Let It Go' theme from Frozen, and drawing colorful pictures of Elmo and the sun, weaving these artistic experiences into
    daily play and reinforcing their organized, achievement‑driven approach to creative expression.
  travel: Kim Jefferson prefers short family road trips, such as weekend visits to the nearby aquarium in Jacksonville and annual vacations to Disneyland in Anaheim, where they energetically explore themed
    rides while parents meticulously plan itineraries, balancing adventurous curiosity with a practical love for routine.
  culinary: Kim Jefferson enjoys spoon‑feeding themselves macaroni and cheese with a sprinkle of cheddar, dips carrot sticks into hummus, and proudly helps stir pancake batter, yet often refuses broccoli,
    reflecting both an enthusiastic palate and a picky‑eater’s habit.
  core: Kim Jefferson, a three‑year‑old tornado of organized curiosity, insists on lining up crayons by color before drawing, saves spare change in a piggy bank, and can be both the loudest cheerleader
    on the playground and the staunchest negotiator for an extra bedtime story.
background:
  cultural: Kim is raised in a Black American family in Niles, Illinois, where her parents celebrate African‑American heritage through music, storytelling, and community gatherings. Family traditions include
    listening to jazz and blues, reading culturally relevant children's books, and participating in local church events and celebrations such as Kwanzaa and Juneteenth. Her upbringing blends the warmth
    of her extended family with the diverse cultural fabric of the Chicago metropolitan area, fostering a strong sense of community, resilience, and pride in her cultural identity.
