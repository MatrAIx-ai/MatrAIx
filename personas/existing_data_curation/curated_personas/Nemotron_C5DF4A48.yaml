  career_goals: Even at three, Kim loves to imagine her future. She frequently talks about becoming a teacher who helps other children learn, a doctor who cares for families, or a community leader who organizes
    events in her neighbourhood. She aspires to excel in school, set high standards for herself, and one day give back to the community that has nurtured her curiosity and discipline.
