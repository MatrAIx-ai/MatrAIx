  hobbies: '["Gardening (vegetables and herbs)", "Traditional Puerto Rican cooking and recipe experimentation", "Hosting small community meals", "Reading historical fiction and biographies", "Listening
    to salsa and plena music", "Attending local cultural festivals", "Gentle yoga and mindfulness meditation", "Journaling", "Crocheting for charity"]'
  career_goals: At 60, Maria aims to deepen her role as a community health advocate, focusing on mental‑wellness support for seniors in Orange County. She plans to enroll in a peer‑counseling certification
    program offered by a local community college, which will complement her natural empathy and desire to help others. Maria also hopes to mentor younger Puerto Rican women interested in cultural preservation
    and community service, sharing her cooking and event‑planning expertise. Additionally, she aspires to complete a memoir that weaves together her family’s Puerto Rican heritage, personal resilience,
    and experiences navigating life in New Windsor, hoping the book will inspire both diaspora and local readers.
