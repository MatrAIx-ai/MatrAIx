personas:
  professional: Maria Serralles, a 60‑year‑old community health advocate in Orange County, leverages her bilingual communication, event‑planning expertise, and hands‑on caregiving experience to design senior‑focused
    mental‑wellness workshops, balancing meticulous organization with a flexible, compassionate approach that reflects their practical curiosity and cooperative nature.
  sports: Maria Serralles maintains an active routine by tending her garden, joining the Orange County Senior Striders walking club for weekly low‑impact cardio, attending a spring Tai Chi class, and cheering
    on the Los Angeles Dodgers and LA Galaxy, balancing gentle exercise with seasonal sports enthusiasm that they relish.
  arts: Maria Serralles expresses artistic energy through crocheting vibrant blankets for donation drives, dancing to the classic salsa rhythms of Celia Cruz and Marc Anthony at local festivals, and losing
    themselves in historical novels by Ken Follett and biographies of Frida Kahlo, which together enrich their evenings.
  travel: Maria Serralles prefers meticulously planned short getaways that combine cultural immersion with relaxation, such as weekend trips to the historic streets of Old San Juan and day excursions to
    the botanical gardens of Huntington Library, while dreaming of a longer pilgrimage to the colonial plazas of Cartagena, Colombia, experiences they hope to savor soon.
  culinary: Maria Serralles excels at garden‑to‑table cooking, transforming home‑grown heirloom tomatoes, fire‑roasted poblano peppers, and fresh basil into dishes like a fragrant tomato‑pepper sofrito
    paella and herb‑infused chicken al forno, while also experimenting with sous‑vide techniques for delicate fish, flavors they love to share at community gatherings.
  core: Maria Serralles blends a nurturing community spirit with a restless curiosity, soothing their anxiety through daily yoga and crocheting while occasionally splurging on exotic spices that ignite
    their culinary passion.
background:
  cultural: Maria was born to Puerto Rican parents who settled in New York City, growing up in a bilingual household that celebrated both island traditions and American customs. She spent her early years
    in the Bronx before moving to New Windsor, where she maintains close ties with family on the island and in the diaspora. Her cultural practices include preparing arroz con gandules, pernil, and pasteles
    for holidays like Navidad and San Sebastián, participating in the annual Puerto Rican Festival in nearby Newburgh, and observing Catholic holidays while also appreciating secular community gatherings.
    Maria’s identity is shaped by the resilience of her immigrant grandparents, the vibrant rhythm of Caribbean music, and the solidarity of the local Latino community, all of which inform her commitment
    to cultural preservation and community service.
