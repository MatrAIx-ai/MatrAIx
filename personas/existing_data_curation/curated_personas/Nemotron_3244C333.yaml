  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Community theater attendance'', ''Book club participation'', ''Gardening'', ''Hiking'', ''Landscape photography'', ''Volunteering
    for senior art workshops'', ''Yoga'', ''Journaling'']'
  career_goals: Laura aims to expand her solo tutoring practice into a small community learning center in Westfield, offering group workshops on creative writing, art appreciation, and stress‑relief strategies.
    She plans to pursue a master’s degree in curriculum design to develop inclusive, interdisciplinary programs for local schools. Additionally, she hopes to mentor new tutors, publish educational articles
    on integrating the arts into core subjects, and secure speaking engagements at regional education conferences, all while maintaining a balanced, self‑care‑focused lifestyle.
