    building materials"]'
  career_goals: Gregory aims to become a certified master stucco mason within the next five years, earning certifications from the National Association of the Remodeling Industry (NARI) and the Gypsum Association.
    He plans to take advanced coursework in construction management to qualify for a foreman role on larger residential projects. Long‑term, he aspires to launch his own specialty finishing company that
    focuses on high‑performance, sustainable exterior finishes for homes in the Lowcountry, leveraging his curiosity about new materials to differentiate his business. He also hopes to mentor apprentices
    and eventually teach trade courses at a local technical college.
