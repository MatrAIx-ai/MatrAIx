  hobbies: '[''Restoring vintage sewing machines'', ''Woodworking'', ''Balcony gardening'', ''Fishing'', ''Listening to classic rock and salsa music'', ''Occasional community soccer matches'', ''Watching
    documentary series on manufacturing and engineering'']'
  career_goals: Martin aims to move into a supervisory role, such as lead machine operator or floor supervisor, where he can shape production standards and mentor a small team. He plans to earn a vocational
    certification in textile technology to solidify his technical credibility. Long‑term, he envisions opening a modest tailoring and alteration shop that combines his machine‑skill expertise with personalized
    service, allowing him to earn higher income and greater independence after his separation.
