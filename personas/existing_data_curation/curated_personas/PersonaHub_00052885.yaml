persona_description: A researcher and educator interested in the development of physical and social-emotional skills in young children through a whole-of-class physical activity program called Animal Fun.
  They are particularly interested in the impact of the program on motor coordination, self-perceptions, anxiety, social competence, and the long-term benefits for children's transition into the first year
  of school. They are looking for ways to evaluate the program's effectiveness and how it can be adapted for different educational settings.
