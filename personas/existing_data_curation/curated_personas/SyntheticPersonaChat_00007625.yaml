    User 1: Yeah, but I still love to play racquetball.

    User 2: Me too!

    User 1: So, what''s your favorite Italian food?

    User 2: I love all kinds of Italian food, but my favorite is probably spaghetti and meatballs.

    User 1: Me too! I love that dish.

    User 2: So, what''s your favorite TV show?

    User 1: I love Forensic Files. It''s so interesting to watch the investigators solve crimes.

    User 2: Me too! I love that show.

    User 1: So, what do you like to do for fun?

    User 2: I love to go to school, dance, and run. I also love to go shopping with my friends.

    User 1: Oh, that sounds like fun! I love to go shopping, too.

    User 2: So, what''s your favorite thing to do when you''re not working or doing homework?

    User 1: I love to play racquetball, go out with friends, and watch TV.

    User 2: Oh, that sounds like fun! I love to do all of those things, too.

    User 1: So, what do you think of the weather today?

    User 2: I think it''s pretty nice. It''s sunny and warm.

    User 1: Yeah, it''s a great day for a walk.

    User 2: Yeah, I think I''m going to go for a walk later.

    User 1: Oh, that sounds like fun! I might go for a walk, too.

    User 2: Oh, that would be great! We can walk together.

    User 1: Yeah, that would be fun.

    User 2: Great! I''ll meet you in front of the library in 10 minutes.

    User 1: Okay, I''ll see you there.'
