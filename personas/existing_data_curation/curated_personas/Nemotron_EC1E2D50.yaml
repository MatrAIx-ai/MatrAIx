  skills: '[''Strategic Sourcing'', ''Vendor Negotiation'', ''Inventory Forecasting'', ''Market Trend Analysis'', ''Data-Driven Decision Making'', ''Supply Chain Coordination'', ''Budget Management'', ''Procurement
