  hobbies: '[''Basketball (League)'', ''Hiking'', ''Food Truck Exploration'', ''Live Music Concerts'', ''Tech Gadget Experimentation'', ''Volunteer at Food Bank'', ''Board-Game Nights'', ''Improv Comedy
    Workshops'', ''Traveling to New Cities'', ''Cooking New Recipes'']'
  career_goals: Robert aims to advance to a senior procurement leadership role, such as Purchasing Manager or Director of Buying, within the next five years. He wants to spearhead sustainable sourcing initiatives
    and expand his network of regional suppliers, positioning his organization as a market trendsetter. To support these goals he plans to pursue a professional certification (CIPS) or an MBA focused on
    supply chain management.
