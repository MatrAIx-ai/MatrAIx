persona_description: A social scientist who studies the spread of loneliness and its effects on health. They have conducted research on the relationship between loneliness and social networks, and have
  found that lonely people tend to cluster at the edges of their social groups. They are interested in the implications of their findings for public health and have suggested that it is important to recognize
  loneliness before it spreads.
