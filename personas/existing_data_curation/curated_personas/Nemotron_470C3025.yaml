personas:
  professional: Edelisa Ramostorres, a seasoned arts program manager with a track record in project management, strategic budgeting, and community outreach, leverages their disciplined organization and
    compassionate, collaborative leadership to curate inclusive exhibitions, mentor emerging artists, and chart a path toward an executive directorship in a major cultural institution.
  sports: Edelisa Ramostorres stays active by dancing salsa three times a week, attending weekend pick-up basketball games at a Queens community center, and cheering for the New York City FC while occasionally
    joining a guided yoga run organized by a local nonprofit.
  arts: Edelisa Ramostorres immerses herself in the arts, spending weekends painting vivid acrylic canvases, attending experimental theatre productions at The Public Theater, listening to live cumbia performances
    at the Bowery Ballroom, and devouring magical realism novels by Gabriel García Márquez and other contemporary authors.
  travel: Edelisa Ramostorres plans her travels with a balance of purposeful and leisurely trips, flying annually to a South American country to reconnect with family and draw artistic inspiration, while
    also exploring cultural hubs like Barcelona, Oaxaca, and New York’s neighboring Hudson Valley for weekend retreats.
  culinary: Edelisa Ramostorres showcases culinary skill by mastering traditional dishes such as arepas, empanadas, and coffee-infused tres leches cake, seasoning them with fresh basil and cilantro from
    her balcony herb garden, and pairing meals with rich, aromatic coffee blends from the Andes, though they sometimes surrender to fast-food orders during hectic deadlines.
  core: Edelisa Ramostorres is a disciplined yet compassionate arts leader who blends meticulous project management with a vibrant passion for painting, salsa, and community empowerment, all while navigating
    the quirks of occasional coffee-induced jitteriness and a tendency to over-schedule.
background:
  cultural: Edelisa was raised in a bilingual Colombian household, where Spanish was spoken at home and English at school, fostering a fluid cultural identity. Family gatherings feature traditional foods
    like bandeja paisa, Colombian coffee, and celebrations of holidays such as Día de la Independencia and Carnaval de Barranquilla, which she continues to honor within her Queens community. Her upbringing
    emphasized communal harmony, hospitality, and a strong work ethic, values that shape both her professional leadership and personal relationships. While deeply connected to her Colombian roots—through
    music, dance, and culinary traditions—she also embraces the multicultural vibrancy of New York City, often acting as a bridge between Latino heritage and the broader American cultural landscape.
attributes:
  skills: '[''Project Management'', ''Strategic Planning'', ''Budgeting and Financial Oversight'', ''Team Leadership and Development'', ''Community Outreach and Engagement'', ''Arts Programming and Curation'',
    ''Event Coordination'', ''Cross‑cultural Communication (Spanish‑English)'', ''Conflict Resolution'', ''Data‑driven Decision Making'', ''Process Optimization'', ''Mentorship and Coaching'', ''Grant Writing
    and Fundraising'', ''Public Speaking'', ''Content Creation'']'
  hobbies: '[''Painting'', ''Visiting Art Galleries and Museums'', ''Reading Magical Realism and Contemporary Fiction'', ''Cooking Colombian Cuisine'', ''Salsa Dancing'', ''Listening to Cumbia and Jazz'',
    ''Yoga and Mindfulness Practice'', ''Balcony Herb Gardening'', ''Volunteering in Community Art Workshops'', ''Traveling to Colombia'', ''Street Photography'', ''Writing Poetry'']'
  career_goals: Edelisa aims to advance to an executive directorship within a major cultural institution or nonprofit arts organization, where she can shape inclusive programming that highlights Colombian
    and broader Latinx voices. She strives to launch a community arts incubator in Queens that empowers emerging artists through mentorship, micro‑grants, and interdisciplinary collaborations. Long‑term,
    she envisions publishing a guide on culturally responsive arts management and establishing her own consultancy that advises museums and civic agencies on equity‑focused initiatives. Throughout her career,
    she remains committed to nurturing the next generation of women leaders in the arts sector.
