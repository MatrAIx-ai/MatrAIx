personas:
  professional: Amanda Cochran, a seasoned K‑8 educator in Queens, merges a structured, data‑driven lesson planning style with a flexible, student‑centered mindset, leveraging Google Workspace, Orton‑Gillingham
    literacy techniques, and SEL activities to foster inclusive learning while quietly juggling a penchant for occasional disorganization.
  sports: Amanda Cochran enjoys low‑impact fitness, joining a local adult pickleball league at Queens Community Center, cheering for the New York Mets in baseball and the New York Knicks in basketball,
    and regularly jogs through Alley Pond Park on weekends to stay active.
  arts: Amanda Cochran spends her evenings reading historical fiction by authors like Hilary Mantel and Philippa Gregory, attends community theater productions featuring classic plays, and curates a diverse
    playlist that includes folk singer Joni Mitchell, jazz saxophonist John Coltrane, and indie band Vampire Weekend, reflecting a love for narrative and melody.
  travel: Amanda Cochran prefers thoughtfully planned weekend getaways, often exploring nearby natural escapes such as the Catskill Mountains or the Hudson Valley vineyards, while dreaming of a longer trip
    to the historic streets of Prague and the sun‑kissed coast of Santorini, balancing travel costs with a modest family budget.
  culinary: Amanda Cochran delights in cooking comforting family dishes, frequently preparing a slow‑cooked lamb stew with rosemary and garlic, a vibrant garden ratatouille featuring eggplant and zucchini,
    and a rustic homemade loaf, showcasing a modest but confident stovetop skill set.
  core: Amanda Cochran is a compassionate educator who juggles structured lesson design with spontaneous creativity, often misplacing her planner, yet finds grounding in yoga, gardening, and a habit of
    daily journaling.
background:
  cultural: Amanda is a white American raised in the Bayside area of Queens, with Irish and Italian family roots and a Catholic upbringing. Her parents emphasized community involvement, education, and respect
    for cultural traditions, which she continues to celebrate through holidays like St. Patrick's Day, Christmas, and Italian feast days. Living in the multicultural landscape of Queens has broadened her
    perspective, making her comfortable engaging with diverse cultures while staying grounded in the values of her heritage.
attributes:
  skills: '[''Classroom instruction (K-8)'', ''Curriculum development'', ''Differentiated instruction'', ''Student assessment and data analysis'', ''Behavior management'', ''Social‑emotional learning facilitation'',
    ''Parent communication'', ''Technology integration (Google Workspace, educational apps)'', ''Collaborative team teaching'', ''Literacy intervention strategies'']'
  hobbies: '[''Reading historical fiction'', ''Gardening'', ''Cooking family recipes'', ''Yoga and mindfulness'', ''Volunteer tutoring'', ''Park walks'', ''Community cultural festivals'', ''Journaling'',
    ''DIY crafts'']'
  career_goals: Amanda aims to become a lead teacher and curriculum specialist within the Queens school district, where she can mentor new educators and shape district‑wide instructional practices. She
    is working toward an Educational Leadership certification so she can eventually serve as an assistant principal or director of SEL, championing inclusive policies and student well‑being. In the shorter
    term, she hopes to launch an after‑school program that blends mindfulness, arts, and tutoring, allowing her to extend her compassionate, cooperative ethos beyond the classroom while maintaining a balanced
    personal life.
