  career_goals: At 76, George aims to retain stable employment while reducing daily stress. He hopes to earn a Casino Cage Supervisor certification within the next year, positioning himself for a shift‑lead
    role that leverages his reliability and mentorship instincts. He also wants to train younger colleagues, sharing his practical knowledge of casino operations. Long‑term, he plans to transition to a
    part‑time consulting position that allows him to advise on cash‑handling best practices, giving him more flexibility to focus on health, family visits, and his love of fishing.
