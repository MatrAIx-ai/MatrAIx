  hobbies: '[''Visiting contemporary art galleries'', ''Food photography'', ''Experimenting with fusion recipes'', ''Hiking the Kettle Moraine State Forest'', ''Attending Wisconsin cheese festivals'', ''Homebrewing
    craft beer'', ''Playing acoustic guitar'', ''Reading culinary history and food-science books'', ''Volunteering at a community kitchen'']'
  career_goals: He aims to advance to a sous-chef position within the next two years, eventually earning a head-chef role that allows him to shape a menu centered on Midwestern terroir and artistic presentation.
    Emir plans to complete a bachelor’s degree in Culinary Arts, explore modernist techniques, and open a small farm-to-table restaurant in Dane County that doubles as a community kitchen where he can mentor
    aspiring cooks and promote inclusive, sustainable dining experiences.
