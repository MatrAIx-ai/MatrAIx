personas:
  professional: Juana Hernandez, a budding architect-in-training, channels their vivid imagination into sketching colorful floor plans and building precise Lego structures, while their competitive edge
    pushes them to perfect every detail and their occasional worries keep them double-checking measurements.
  sports: Juana Hernandez fuels their boundless energy by playing soccer with their friends at the local Edinburg Soccer Academy, cheering for the Houston Dynamo when they watch games on TV, and during
    cooler months they dabble in backyard tag and bike rides, always striving to outscore the competition thanks to their competitive nature.
  arts: Juana Hernandez spends afternoons drawing bright watercolor scenes of dinosaurs and space rockets, crafting papel picado alongside their grandparents while humming to Lila Downs and dancing to the
    lively accordion tunes of Los Tigres del Norte, and they idolize Frida Kahlo’s bold self-portraits that inspire their own vibrant sketches.
  travel: Juana Hernandez loves weekend family road trips to the historic River Walk in San Antonio and day-long picnics at the nearby Santa Ana National Wildlife Refuge, but they dream of a future adventure
    to the colorful streets of Guanajuato, where they imagine exploring caves and trying street-food tacos, preferring organized itineraries that let them bring their sketchbook along.
  culinary: Juana Hernandez delights in helping their grandma roll homemade quesadillas with melty cheddar and fresh cilantro, savors the sweet crunch of churros dusted with cinnamon sugar, and often snacks
    on crunchy cucumber slices and guacamole made from ripe avocados, though they occasionally hide extra salsa when no one is watching.
  core: Juana Hernandez is a curious, competitively spirited six-year-old who transforms worry into colorful sketches, they balance a love for meticulous Lego builds with a tendency to over-compare their
    savings to peers, and they forever carry a pocket-sized journal for spontaneous doodles.
background:
  cultural: Juana is raised in a Mexican‑American family in Edinburg, Texas, where Spanish is spoken at home and English at school. Her household celebrates Mexican traditions such as Día de los Muertos,
    Cinco de Mayo, and Christmas posadas, often involving colorful decorations and homemade foods like tamales and quesadillas. She enjoys Tex‑Mex cuisine and participates in community events at the local
    park and church. Family gatherings are frequent, with grandparents sharing stories and teaching her traditional crafts and songs. This blend of Mexican heritage and border‑region culture shapes her
    identity, language skills, and appreciation for both artistic expression and community values.
