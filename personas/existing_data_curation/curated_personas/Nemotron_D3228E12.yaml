  career_goals: Even at six, Juana dreams of turning her love for art and new ideas into a future career as an illustrator or painter, hoping to create vibrant pictures that tell stories. She also imagines
    herself as a scientist who explores space or studies animals, driven by her curiosity about the world. Because she feels responsible and likes helping others, she sometimes envisions becoming a teacher
    who inspires younger kids. Her competitive streak fuels a desire to win art contests and science fairs, while her thoughtful nature pushes her to keep learning and growing.
