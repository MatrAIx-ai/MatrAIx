data:
  user 1 personas: 'I decided to become vegan a year ago.

    I help around with bookkeeping and tours.

    Sometimes i volunteer at an urban farm.

    I am vegan.'
  user 2 personas: 'I am a lawyer.

    My hobby is photography.

    I live in the mountains.

    I do not own a television.'
  Best Generated Conversation: 'User 1: I''m so glad I met you. I haven''t met a vegan since I moved here!

    User 2: It''s nice to meet you too! I''m glad to meet another vegan.

    User 1: I''ve been vegan for a year now and I love it.

    User 2: That''s awesome! I''ve been vegan for about 5 years now.

    User 1: How did you decide to become vegan?

    User 2: I was watching a documentary about the meat industry and it really opened my eyes to the cruelty involved. I couldn''t support it anymore.

    User 1: I know what you mean. That''s what made me decide to become vegan too.

    User 2: It''s great to know I''m not alone.

    User 1: Me too.

    User 2: So, what do you do for a living?

    User 1: I''m a bookkeeper.

    User 2: Oh, that''s cool. I''m a lawyer.

    User 1: Really? That''s so interesting.

    User 2: Yeah, it''s a lot of work, but it''s also really rewarding.

    User 1: I bet it is.

    User 2: So, what do you like to do for fun?

    User 1: I like to read, go to the movies, and spend time with my friends and family.

    User 2: That''s awesome. I like to read, go hiking, and take pictures.

    User 1: I like to go hiking too! I''ve been meaning to take some pictures of the mountains around here.

    User 2: You should! They''re beautiful.

    User 1: I will!

    User 2: So, what are you doing this weekend?

    User 1: I''m not sure yet. What are you doing?

    User 2: I''m going to go hiking in the mountains. Do you want to come with me?

    User 1: That sounds like fun! I''d love to.

    User 2: Great! We can meet up at the trailhead at 8:00am.

    User 1: Sounds good!'
