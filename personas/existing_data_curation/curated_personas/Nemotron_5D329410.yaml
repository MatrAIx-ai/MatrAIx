personas:
  professional: Edlene Sharper, a 21‑year‑old visual storyteller, channels disciplined project planning and a vivid imagination into freelance graphic design and illustration that weaves digital precision
    with hand‑rendered acrylics to highlight the lived experiences of women from their small southern hometown, and they often schedule creative sprints like a well‑organized quilt pattern.
  sports: Edlene Sharper enjoys casual weekend volleyball with the college intramural league, follows the Birmingham Barons baseball team, practices yoga at a community studio, and they spend sunrise hikes
    along the Sipsey River, balancing leisurely activity with a preference for low‑impact movement over intense cardio.
  arts: Edlene Sharper immerses themselves in abstract painting, digital illustration, and poetry, draws inspiration from the improvisational spirit of John Coltrane, the bold color fields of Wassily Kandinsky,
    and the narrative depth of Maya Angelou, while regularly contributing to a neighborhood quilting circle and curating short process videos for Instagram, and they view art as a conduit for personal healing
    and community dialogue.
  travel: Edlene Sharper plans low‑cost getaways that blend creative inspiration with southern charm, having explored New Orleans’ music scene, hiked the Appalachian Trail’s misty ridges, yearning to visit
    the civil‑rights landmarks of Montgomery and the Louvre in Paris, and they balance travel around academic deadlines and a modest freelance income.
  culinary: Edlene Sharper loves reimagining southern comfort dishes like shrimp‑and‑grits with smoked paprika, collard greens tossed with quinoa, and pecan pie topped with caramel drizzle, cooking at a
    moderate skill level and often experimenting with heirloom tomatoes, okra, and fresh herbs while they share meals with the quilting circle.
  core: Edlene Sharper is a 21‑year‑old imaginative designer who fuses soulful southern traditions with digital art, they channel anxiety into disciplined creativity, and they nurture community through
    quilting, cooking, and mentorship.
background:
  cultural: Edlene is a 21-year-old African-American woman raised in Springville, a small town in St. Clair County, Alabama. Her upbringing is rooted in the Southern Black tradition of church community,
    gospel music, storytelling, and intergenerational family support. She grew up attending a historically Black church where she learned the value of collective uplift, participation in church-based arts
    programs, and the oral history of the civil rights movement in Alabama. Family gatherings feature soul-food cooking, quilting, and rhythmic music, all of which have shaped her aesthetic sensibilities.
    While she embraces contemporary digital art forms, she remains connected to the cultural heritage of African-American visual arts, folk crafts, and the resilient spirit of the Black South, using her
    work to honor and reinterpret those influences.
attributes:
  skills: '[''Digital illustration'', ''Graphic design (Adobe Photoshop, Illustrator, Canva)'', ''Acrylic and watercolor painting'', ''Sketching'', ''Photography and photo editing'', ''Creative writing
    and poetry'', ''Project planning and time management'', ''Event coordination for community workshops'', ''Culinary arts (Southern cuisine)'', ''Mindfulness journaling'', ''Social media content creation'']'
  hobbies: '[''Abstract painting'', ''Sketching'', ''Creative journaling'', ''Poetry writing'', ''Reading speculative and Afro-futurist fiction'', ''Listening to jazz, soul, and gospel music'', ''Cooking
    Southern cuisine with modern twists'', ''Yoga and mindfulness meditation'', ''Community quilting'', ''Nature photography'', ''Social media art videos'']'
  career_goals: Edlene aspires to turn her artistic talents into a sustainable freelance career as a graphic designer and illustrator, focusing on storytelling that reflects the experiences of Black Southern
    women. She plans to complete a BFA in Visual Arts or a related certificate program, building a professional portfolio that blends abstract digital work with traditional media. In the medium term, she
    hopes to launch a small studio where she can offer custom commissions, community art workshops, and eventually an art-therapy practice to help youth cope with anxiety and depression through creative
    expression. Her long-term ambition includes securing grant funding for a community murals project in Springville and mentoring emerging Black artists in Alabama.
