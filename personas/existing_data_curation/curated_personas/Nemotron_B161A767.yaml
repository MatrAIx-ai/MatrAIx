personas:
  professional: Richard Green, a 24‑year‑old construction laborer in suburban Michigan, combines solid carpentry and blueprint‑reading skills with a curiosity for sustainable building methods, often proposing
    eco‑friendly material choices to his crew while keeping projects on schedule and safety compliant.
  sports: Richard Green regularly hikes the scenic trails around the Great Lakes with the Brighton Outdoor Club, joins weekend pickup basketball games at the community center, and follows the Detroit Red
    Wings with enthusiastic loyalty, reflecting his blend of outdoor vigor and regional sports fandom.
  arts: Richard Green fuels his artistic side by sketching historic storefronts, attending gallery openings featuring Midwestern realism painters such as Andrew Wyeth, strumming acoustic renditions of The
    Avett Brothers at local gatherings, and volunteering backstage at community theater productions.
  travel: Richard Green prefers modest road‑trip adventures, having explored Isle Royale National Park and the vibrant streets of Chicago, while dreaming of a future trek through Norway’s fjords, yet balances
    these aspirations with a careful budget and a weekend‑only travel schedule.
  culinary: Richard Green’s palate favors hearty Midwestern comfort foods like butter‑baked potatoes and apple‑cinnamon crumble, while he also enjoys cooking grilled salmon seasoned with lemon‑dill, pairing
    it with roasted carrots and locally sourced cheddar, and he occasionally treats himself to a slice of deep‑dish pizza on game night.
  core: Richard Green blends a builder’s practical reliability with an artist’s restless curiosity, habitually sketching blueprints in the margins of his notebook while humming folk tunes, and insists on
    sipping a cold brew before every site inspection.
background:
  cultural: Richard grew up in a middle‑class white family in suburban Michigan, with roots tracing back to German and Irish ancestry. The Midwestern values of hard work, modesty, and community involvement
    shaped his outlook, fostering a strong sense of reliability and cooperation. Brighton's close‑knit community, with its seasonal festivals, local art initiatives, and emphasis on outdoor recreation,
    reinforced his appreciation for both the arts and the natural environment. This blend of Midwestern practicality and cultural openness fuels his curiosity, his dedication to craft, and his desire to
    integrate artistic expression into his professional life.
attributes:
  skills: '[''Physical stamina and endurance'', ''Basic carpentry and framing'', ''Concrete mixing and finishing'', ''Operation of power tools (drills, saws, nail guns)'', ''Blueprint and schematic interpretation'',
    ''Construction site safety compliance'', ''Team coordination and communication'', ''Problem solving and on‑site improvisation'', ''Basic knowledge of sustainable building materials'']'
  hobbies: '[''Sketching and drawing architectural details'', ''Photography of industrial and natural landscapes'', ''Hiking and exploring local trails'', ''Playing acoustic guitar'', ''DIY home improvement
    and woodworking projects'', ''Volunteering with Habitat for Humanity'', ''Attending local art galleries and community theater'', ''Reading about sustainable building practices'']'
  career_goals: Richard aims to progress from a laborer to a certified journeyman carpenter within the next two years, then pursue additional certifications in site supervision and construction management.
    He plans to enroll in a bachelor's program in Construction Management to deepen his technical and leadership skills. Long‑term, he envisions launching his own boutique construction firm that specializes
    in eco‑friendly residential projects, integrating his love for art and design into custom homes that reflect both function and aesthetic appeal. He also hopes to mentor younger workers and contribute
    to community building initiatives like Habitat for Humanity.
