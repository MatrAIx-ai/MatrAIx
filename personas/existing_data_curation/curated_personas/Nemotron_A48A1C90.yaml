  hobbies: '[''Hunting'', ''Fishing'', ''Competitive video gaming (FPS and strategy)'', ''Woodworking'', ''Reading mystery novels'', ''Listening to classic rock music'', ''Weightlifting'', ''Hiking in local
    trails'']'
  career_goals: Joseph aims to progress from a front-line sales representative to a senior sales manager within the next five years, overseeing a small team of reps serving St. Lawrence County. He plans
    to earn his high-school equivalency (GED) and complete a sales certification program (e.g., Certified Professional Sales Person) to bolster his credentials. Long-term, he hopes to launch his own home-services
    franchise, allowing him to blend his practical know-how with entrepreneurial ambition while maintaining a stable, predictable income that supports independent living.
