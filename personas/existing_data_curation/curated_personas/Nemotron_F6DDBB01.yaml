  career_goals: Laura aims to convert her organizational strengths and caring nature into a part-time role that benefits her community, such as a volunteer coordinator at the local senior center or a home
    health aide. She plans to complete a caregiver certification and learn basic business skills to launch a small home-based operation selling homemade preserves and crafts. Additionally, she is committed
    to developing a consistent self-care routine, including yoga and mindfulness, to better manage her anxiety and eventually lead a peer-support group for others facing emotional distress.
