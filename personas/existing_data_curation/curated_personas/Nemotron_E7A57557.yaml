  hobbies: '[''Cooking traditional Japanese and Chinese dishes'', ''Balcony gardening'', ''Knitting and crocheting'', ''Volunteering at community center'', ''Yoga and mindfulness meditation'', ''Exploring
    Brooklyn art scene'', ''Listening to J-Pop and Mandopop'', ''Collecting vintage tea sets'']'
  career_goals: Naoki aims to formalize her expertise by earning a certified professional cleaning credential and leveraging that qualification to move into a supervisory role within a reputable cleaning
    agency. Long‑term, she envisions launching her own boutique cleaning service that emphasizes eco‑friendly practices and flexible scheduling, offering a supportive work environment for other immigrant
    domestic workers. She hopes to build a modest network of like‑minded professionals, create a cooperative model that balances clear operational structure with the autonomy her team values, and ultimately
    save enough to purchase a home in Brooklyn while also providing financial support to her aging parents abroad.
