  hobbies: '[''Pick‑up basketball'', ''Weekend soccer league'', ''Live music concerts'', ''Grilling and BBQ'', ''DIY home‑improvement projects'', ''Community park clean‑ups'', ''Video gaming'', ''Streaming
    sports'']'
  career_goals: Philip aims to move up the management ladder within the rental and property services industry. His short‑term goal is to obtain his GED and complete a certification in property management,
    positioning himself for a floor supervisor role. In the medium term he plans to earn a real‑estate license and take leadership training, ultimately aspiring to own a small equipment‑rental business
    that emphasizes efficiency and customer satisfaction.
