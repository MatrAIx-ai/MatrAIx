  career_goals: Paula is motivated to advance within the retail sector by moving into a supervisory or managerial role. Over the next few years she aims to become a shift supervisor, then a store manager,
    where she can implement efficient processes and lead a small team. To support this transition, she plans to complete a Bachelor's degree in Business Management, building on her associate's credential.
    She is also interested in earning a certification in retail management or supply chain basics. Long-term, Paula envisions using her expertise to perhaps open a small neighborhood general store or a
    niche boutique that emphasizes organized product layout and community service. Financial stability for her family and the ability to contribute to local community projects are key drivers of her ambition.
