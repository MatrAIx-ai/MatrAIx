personas:
  professional: Janet Brown, a curious four‑year‑old, imagines herself as a future veterinarian, using her spontaneous play to rearrange stuffed animals into "patient" lists while negotiating the "clinic"
    schedule with friends, showcasing early teamwork, empathy and a comfort with unstructured role‑play.
  sports: Janet Brown, an energetic four‑year‑old, dashes around the Little Lions preschool soccer club, cheers loudly for the Chicago Cubs during family game nights, and eagerly mimics Serena Williams’
    forehand in backyard tennis drills.
  arts: Janet Brown delights in finger‑painting giant canvases, dancing to the whimsical songs of Sesame Street and the playful melodies of Laurie Anderson, while proudly reciting lines from the animated
    film ‘Moana’.
  travel: Janet Brown loves short trips to the nearby zoo and local aquarium, and dreams of visiting the magical castles of Disneyland and the towering red rocks of the Grand Canyon for the next family
    adventure.
  culinary: Janet Brown savors mac and cheese with a sprinkle of cheddar, adds crunchy carrot sticks, attempts to stir spaghetti sauce in a toy kitchen, but often forgets to wash their hands before grabbing
    a bite of a peanut‑butter‑and‑jelly sandwich.
  core: Janet Brown is a relentlessly curious four‑year‑old who blends spontaneous imagination with boundless energy, thriving on group play, vivid art, and a sweet tooth that often leads to mischievous
    snack raids.
background:
  cultural: Janet is raised in a white, middle‑class family in Minneapolis, Minnesota. Her upbringing blends Midwestern values of community, modesty, and respect for nature with the city’s vibrant arts
    scene. Frequent family trips to the Minneapolis Institute of Art and the Walker Art Center expose her to contemporary and classic works, encouraging her open‑minded appreciation for unconventional ideas.
    The family participates in local traditions such as the Minnesota State Fair, community potlucks, and neighborhood block parties, fostering her sociable and outgoing nature. Seasonal changes are celebrated
    through activities like ice‑skating in winter and picnics by the Mississippi River in summer, reinforcing her love of varied experiences and her emotional stability in the face of new challenges.
