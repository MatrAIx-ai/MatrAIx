  career_goals: Janet’s daydreams include becoming a painter who creates bright, unconventional pictures, an explorer who discovers new worlds in stories, or a teacher who shares music and art with other
    children. She often talks about wanting to design a colorful mural for her school, travel on a rocket to see the stars, or lead a neighborhood dance circle. Though she is only four, these ambitions
    reflect her desire to blend creativity, discovery, and social connection.
