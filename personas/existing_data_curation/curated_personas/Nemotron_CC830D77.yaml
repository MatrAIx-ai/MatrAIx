  hobbies: '[''Puzzle solving (Sudoku, crosswords)'', ''Hiking and nature photography'', ''Yoga and mindfulness practice'', ''Cooking regional recipes'', ''Community softball league'', ''Reading contemporary
    fiction'', ''DIY crafts (knitting, basic woodworking)'']'
  career_goals: Kay aims to complete her associate degree in Early Childhood Education and obtain a Child Development Associate (CDA) credential within the next two years. She aspires to become a lead teacher
    at a licensed preschool, where she can implement evidence-based curricula and mentor newer staff. Long-term, she envisions opening a small, family-run daycare that emphasizes structured yet flexible
    learning environments, and she hopes to pursue a bachelor’s degree in Child Development to expand into child advocacy or policy work.
