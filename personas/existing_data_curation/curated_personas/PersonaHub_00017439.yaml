persona_description: 'A coastal resilience expert who is concerned about the dwindling world supply of sand and the critical issue of Florida''s beaches being "critically eroded" and "disappearing". They
  are aware of the value of sand for recreation, the roads we travel, and the buildings we live and work in, and are passionate about protecting our nation''s #1 tourist attraction. They are also concerned
  about the waste of taxpayer money and the lack of transparency in the Federal standard for disposal. They are open to adapting the Great Lakes approach to our other mainland coasts and regionalizing the
  way we look at the needs of different segments of those coasts to better meet our water resource needs.'
