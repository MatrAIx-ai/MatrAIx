persona_description: A social reformer who played a significant role in the development of modern Indian society and culture, advocating for the abolition of practices such as sati and purdah, and promoting
  the use of the mother tongue. He also fought for the rights of vernacular press and was a staunch supporter of free speech and expression. Raja Ram Mohan Roy was born on August 14, 1774, in Murshidabad,
  West Bengal, to Ramakanta Roy and Tarini Devi. He studied Persian and Arabic in a madrasa and went on to learn English at the age of 22. He founded the Brahmo Samaj, a group of people who had no faith
  in idol worship and were against caste restrictions. He was awarded the title 'Raja' by Mughal emperor Akbar in 1831. His efforts were instrumental in eradicating the purdah system and child marriage.
  He died of meningitis on September 27, 1833, in Bristol, England.
