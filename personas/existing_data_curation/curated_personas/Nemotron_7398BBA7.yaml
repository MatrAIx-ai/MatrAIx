  hobbies: '[''Playing soccer with local community'', ''Attending live music concerts and festivals'', ''Exploring street art and murals'', ''DIY electronics and Arduino projects'', ''3D printing personal
    designs'', ''Multiplayer video gaming'', ''Cooking Mexican cuisine'', ''Learning acoustic guitar'', ''Participating in community festivals and cultural celebrations'', ''Hiking in East Texas forests'']'
  career_goals: Octavio aims to earn NIMS certification as a CNC machinist and later become a certified CNC programmer. He plans to enroll in an associate’s program in Manufacturing Technology to deepen
    his knowledge of advanced machining and automation. Long‑term, he envisions opening a small custom metal‑art studio where he can blend his technical expertise with his love of Mexican folk art, creating
    decorative sculptures and functional art pieces for local businesses and community projects. He prefers a flexible, entrepreneurial path that lets him avoid overly rigid corporate structures while maintaining
    a steady income to ease his stress about financial security.
