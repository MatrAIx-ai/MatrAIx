personas:
  professional: Octavio Mella is an aspiring CNC machinist who leverages his hands-on expertise with lathes, milling machines, and Fusion 360 CAD to prototype functional art, while their relaxed attitude
    to deadlines and competitive drive often lead them to juggle multiple shop projects simultaneously, balancing a craving for creative freedom with a pragmatic focus on earning NIMS certification.
  sports: Octavio Mella plays forward on the Kilgore Youth Soccer League, hikes with the East Texas Piney Woods Trail Club every other weekend, and follows the Houston Dynamo and Texas Rangers, channeling
    competitive energy into both the field and the trail while often forgetting to hydrate.
  arts: Octavio Mella is a regular at live corridos shows featuring Los Tigres del Norte and country concerts headlined by Carrie Underwood, contributes to community mural projects inspired by vibrant talavera
    tiles, and spends evenings learning acoustic guitar chords from YouTube lessons, weaving artistic heritage into daily life.
  travel: Octavio Mella dreams of exploring the mural-rich streets of Barcelona, has already taken a weekend road trip to San Antonio's River Walk and a backpacking adventure in the piney woods of Oklahoma,
    favoring spontaneous itineraries over meticulous planning, though limited funds sometimes curb longer overseas voyages.
  culinary: Octavio Mella enjoys cooking carnitas tacos and chiles en nogada, experimenting with homemade salsa verde using fresh tomatillos, and often merges them with Texas-style smoked brisket, showcasing
    a modest but confident kitchen skill set that balances traditional flavors with bold BBQ twists.
  core: Octavio Mella is a curious, socially driven 20-year-old who blends hands-on machining with vibrant folk art, yet their laid-back, sometimes disorganized habits and competitive streak fuel both creative
    breakthroughs and occasional financial jitters.
background:
  cultural: Octavio grew up in a Mexican‑American household in Kilgore, Texas, where Spanish and English were spoken interchangeably. Family traditions such as Día de los Muertos altars, Cinco de Mayo celebrations,
    and weekly Sunday Mass are central to his identity. He takes pride in Mexican folk art, especially the bright colors and intricate metalwork found in traditional talavera and alebrijes, which inspire
    his creative projects. At the same time, he embraces Texan customs like barbecue gatherings and local rodeos, creating a blended cultural perspective that values strong family ties, community support,
    and a hardy work ethic common to both cultures.
