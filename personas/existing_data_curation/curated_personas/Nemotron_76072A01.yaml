  hobbies: '["Fishing","Woodworking","Reading (business & Southern literature)","Chess","STEM mentorship volunteering","Gardening","Barbecue cooking","Church community involvement"]'
  career_goals: Approaching retirement, Ernest aims to leverage his experience into a regional supervisory role where he can mentor multiple store managers and spearhead a data‑centric transformation across
    the chain. He is also exploring the possibility of launching a consulting boutique that helps midsize retailers implement technology‑enabled inventory and staffing solutions. Ultimately, he wants to
    leave a legacy of higher sales performance, improved employee retention, and a culture of disciplined continuous improvement.
