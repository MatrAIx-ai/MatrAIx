personas:
  professional: Maria Pham, a budding early‑childhood organizer, already shows a knack for sorting blocks, planning pretend play scenarios, and negotiating toy sharing with peers, hinting at a future career
    as a kindergarten teacher where their curiosity, practicality, and a healthy competitive spirit will drive lesson planning.
  sports: Maria Pham, a lively two‑year‑old, loves sprinting around the neighborhood park, participates in a parent‑and‑child soccer circle that cheers on the Las Vegas Aces, and frequently practices mini‑basketball
    throws with a toddler‑sized hoop, displaying boundless energy and a competitive streak even in play.
  arts: Maria Pham, an enthusiastic little artist, spends hours drawing rainbow dinosaurs with thick crayons, dances to the upbeat tunes of The Wiggles and Sesame Street’s Elmo, and eagerly watches Yo Gabba Gabba
    episodes, letting these vibrant performances shape her playful imagination.
  travel: Maria Pham, who has already marveled at the red cliffs of the Grand Canyon on a family road trip and enjoyed a weekend splash at Red Rock Canyon, now dreams of a lantern‑filled night in Taiwan
    and snowy sled rides in Hokkaido, preferring trips that blend adventurous sights with familiar family routines.
  culinary: Maria Pham, a two‑year‑old with a selective palate, adores the sweet, sticky rice cake (bánh chưng) served during lunar New Year celebrations, delights in cheesy macaroni with cheddar, and proudly
    assembles peanut‑butter‑banana sandwiches, often insisting on using bright‑colored plates for her meals.
  core: Maria Pham is a curious, organized, and energetic toddler who balances playful competition with a love for community traditions, bright toys, and spontaneous group games.
background:
  cultural: Maria comes from a Vietnamese‑American family that settled in Las Vegas. At home, she hears both English and Vietnamese, and her parents celebrate traditional holidays such as Tet, serving dishes
    like bánh chưng and teaching her simple Vietnamese greetings. The family participates in the local Vietnamese community centre’s cultural events, where she interacts with other children of similar heritage.
    Growing up in a multicultural city, Maria blends Southeast Asian customs with the broader American environment, shaping her worldview and daily routines.
