  career_goals: Even at this early age, Maria expresses budding aspirations shaped by her curiosity and competitive spirit. She often says she wants to "help the teacher" and shows interest in caring for
    animals, imagining herself as a future veterinarian. She also enjoys leading simple games and hopes to be the "best runner" on the playground. Her parents nurture these interests by providing science
    kits, animal-themed books, and opportunities to assist in classroom‑like activities, laying a foundation for future ambitions in caregiving and leadership roles.
