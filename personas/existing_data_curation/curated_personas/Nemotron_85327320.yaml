personas:
  professional: Amy Cain is a seasoned commercial driver and sales strategist who fuses meticulous vehicle maintenance with an improvisational storytelling style, turning each delivery run into a spontaneous
    community showcase—even if their relaxed attitude toward strict schedules sometimes leads to last‑minute route adjustments.
  sports: Amy Cain is an avid hiker with the Boise River Greenbelt Trail Club, a devoted fan of the Boise State Broncos football team, and joins a local community softball league during summer weekends,
    preferring sunrise treks over regimented gym workouts.
  arts: Amy Cain immerses themselves in the arts by performing with a local improv theater troupe, curating vintage travel posters, and drawing inspiration from abstract expressionist Mark Rothko and folk
    musicians The Avett Brothers, while regularly attending art fairs featuring painter Sarah Garrison.
  travel: Amy Cain's travel style blends spontaneous road‑trip adventures with nostalgic detours, having driven the historic Route 66 from Chicago to Los Angeles, photographed sunrise over the Grand Canyon,
    and now dreaming of a pilgrimage along New Zealand's Southern Scenic Route so they can capture rugged coastlines for their next mixed‑media series.
  culinary: Amy Cain's culinary adventures range from whipping up Idaho potato au gratin with rosemary and sharp cheddar to crafting lavender‑infused lemonades, and they often experiment with watercolor‑inspired
    dishes like beet‑colored risotto, reflecting an intermediate cooking skill set fueled by a love for fresh, vivid ingredients.
  core: Amy Cain is a talkative, art‑obsessed road‑warrior whose imaginative mind and love for community keep them constantly juggling creative projects, occasional financial splurges, and a habit of postponing
    strict deadlines in favor of spontaneous inspiration.
background:
  cultural: Amy grew up in a small Midwestern town before relocating to Idaho in her early thirties. Her white American heritage reflects a blend of Midwestern values—practical self‑reliance, modesty, and
    a strong work ethic—and the frontier spirit, love of outdoor life, and neighborly ethos that define Idaho’s culture. Raised in a Protestant household that emphasized community service and regular church
    gatherings, she developed a cooperative yet assertive demeanor. Living in Meridian, she participates in county fairs, volunteer clean‑up projects, and neighborhood potlucks, embodying the region’s close‑knit
    community spirit while appreciating the state’s rugged natural beauty.
attributes:
  skills: '[''Commercial driving'', ''Vehicle maintenance'', ''Flexible route optimization'', ''Customer relationship management'', ''Sales negotiation'', ''Storytelling'', ''Creative problem solving'',
