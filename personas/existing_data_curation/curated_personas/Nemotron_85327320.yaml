  hobbies: '[''Watercolor painting'', ''Mixed‑media abstract art'', ''Landscape photography'', ''Improv theater'', ''Attending community art fairs'', ''Folk‑music jam sessions'', ''Reading speculative fiction'',
    ''Collecting vintage travel posters'', ''Hiking the Boise foothills'', ''Volunteering as a charity road‑trip host'']'
  career_goals: Amy aims to leverage her decades behind the wheel into a leadership role that blends logistics with community‑oriented commerce. She aspires to become a regional sales manager for a transportation
    firm, where she can mentor younger drivers, design customer‑centric delivery solutions, and introduce more flexible, creative service offerings. Alternatively, she is exploring the launch of a boutique
    "art‑on‑the‑move" delivery service that partners with local galleries and craftsmen, combining her love of novelty and art with her driving expertise. Over the next five years she plans to earn a Certified
    Transportation Manager credential, expand her professional network, and secure a position that offers autonomy, creativity, and ample social interaction.
