  career_goals: Thanh aims to advance from basic housekeeping to a supervisory role in a boutique hotel or a residential management company within the next three years. She plans to enroll in a community
    college program for hospitality management to earn a certification, eventually starting her own eco‑friendly cleaning business that incorporates sustainable practices and offers personalized home‑organizing
    services. Her long‑term ambition includes mentoring other young immigrants entering the workforce, helping them develop professional skills and confidence.
