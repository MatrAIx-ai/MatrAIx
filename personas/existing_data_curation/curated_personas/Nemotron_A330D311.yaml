  hobbies: '[''Visiting Art Galleries'', ''Exploring Street Art'', ''Cooking Fusion Recipes'', ''Hip‑Hop and Salsa Dancing'', ''Community Volunteering'', ''Attending Cultural Festivals'', ''Yoga and Meditation'',
