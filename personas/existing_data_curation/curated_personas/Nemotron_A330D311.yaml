personas:
  professional: Thanh Saengphaxay, an 18‑year‑old housekeeping professional, combines meticulous deep‑cleaning expertise, strong time‑management, and bilingual communication with a curious eye for interior
    aesthetics, turning each client space into an organized canvas while balancing assertive problem‑solving with a friendly, socially engaging approach that they bring to every interaction.
  sports: Thanh Saengphaxay maintains fitness by playing in a local co‑ed soccer league each spring, attending weekly yoga classes at a Bay Area studio, cheering on the Golden Warriors and the Oakland Athletics,
    and they also hone cardio through community hip‑hop dance workshops.
  arts: Thanh Saengphaxay immerses themselves in Oakland’s mural culture, drawing inspiration from the bold colors of street artists like Shepard Fairey and local painter Sable, while vibing to the soulful
    beats of Anderson .Paak and the lyrical flow of J Cole, and they regularly attend experimental theater productions at the Oakland Playhouse, letting that eclectic blend fuel their own creative energy.
  travel: Thanh Saengphaxay favors budget‑friendly, spur‑of‑the‑moment road trips along the Pacific Coast, having already backpacked from Oakland to Portland and taken a short study‑abroad stint in Chiang Mai,
    while dreaming of a future solo adventure to the ancient temples of Angkor Wat and the island cafés of Bali.
  culinary: Thanh Saengphaxay, an intermediate home chef, loves fusing Southeast Asian staples like fish sauce, lemongrass, and kaffir lime with Californian produce such as avocado and kale, creating dishes
    like grilled chicken with tamarind glaze, mango sticky rice parfaits, and kimchi‑infused tacos, and they also savor the vibrant food‑truck scene at Oakland’s First Fridays.
  core: Thanh Saengphaxay, an 18‑year‑old hyper‑organized housekeeping whiz who jots endless journal entries, craves late‑night street‑art walks, and occasionally over‑caffeinates during cleaning gigs,
    channels their anxiety into meticulous service, and they secretly dream of launching a sustainable cleaning startup.
background:
  cultural: Thanh is a first‑generation Southeast Asian American of Lao descent. Raised in a bilingual household, she grew up celebrating Lao traditions such as Pi Mai (Lao New Year) and Buddhist holidays,
    while also embracing the multicultural environment of Oakland. Her family cuisine—sticky rice, papaya salad, and grilled fish—continues to influence her cooking experiments. Thanh maintains close ties
    with the Lao community in the Bay Area, often participating in cultural gatherings, but she also actively engages with the broader American cultural landscape, blending her heritage with contemporary
    urban life.
