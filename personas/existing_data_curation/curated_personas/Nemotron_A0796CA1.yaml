personas:
  professional: Leila Dalton, a 21‑year‑old aspiring electrician‑technician, blends hands‑on troubleshooting of home wiring and HVAC systems with a knack for creating clear DIY tutorials on YouTube, where
    their analytical curiosity and relaxed, sometimes disorganized, scheduling style let them experiment freely while building a flexible side‑income.
  sports: Leila Dalton enjoys weekend hikes in the foothills surrounding Anniston and joins the local Anniston Trail Club for seasonal trail runs, while cheering on the Birmingham Barons in baseball and
    the Alabama Crimson Tide during football season, and they keep a modest home gym for strength training to complement their outdoor activities.
  arts: Leila Dalton immerses themselves in speculative fiction by authors like N.K. Jemisin and Neil Gaiman, curates playlists featuring bluegrass virtuoso Molly Tuttle and country‑rocker Sturgill Simpson,
    and refines their visual storytelling through photo‑editing of project documentation inspired by the aesthetic of photographer Ansel Adams.
  travel: Leila Dalton prefers low‑key, budget‑friendly road trips that combine hiking in places like the Great Smoky Mountains and music‑café evenings in Nashville, planning each outing on a spreadsheet
    rather than spur‑of‑the‑moment spontaneity, while dreaming of an eventual backpacking adventure through the Scottish Highlands when finances allow.
  culinary: Leila Dalton, an enthusiastic home baker, experiments with sour‑dough starters and Southern‑inspired twists such as buttermilk biscuits with honey‑glazed peach compote, often incorporating locally
    sourced honey, cane sugar, and fresh herbs, and they document each creation with polished photos before sharing the recipes on their YouTube channel.
  core: Leila Dalton is a pragmatic yet curious 21‑year‑old who balances a love for hands‑on tech projects and baking with a laid‑back, slightly disorganized lifestyle, a skeptical streak that fuels continual
    learning, and a habit of turning everyday challenges into YouTube content.
background:
  cultural: Leila grew up in Anniston, a small city in Calhoun County, Alabama, in a middle‑class family that prized self‑reliance and community ties. The Southern setting exposed her to regional customs
    such as home‑cooked Southern meals, hospitality, and a slower‑paced lifestyle that values practical skills. While she attended a local Baptist church as a child, her critical and skeptical disposition
    led her to adopt a more secular, individualist worldview as she entered adulthood. Nevertheless, she retains an appreciation for Southern hospitality in personal interactions and enjoys elements of
    regional culture—such as country and bluegrass music and the communal spirit of high school football weekends—without feeling compelled to conform to group expectations. This blend of regional heritage
    and personal independence shapes her pragmatic outlook and her comfort with solitary or small‑group pursuits.
attributes:
  skills: '[''Computer assembly and troubleshooting'', ''Photo editing (Lightroom, Photoshop)'', ''Basic plumbing and electrical repairs'', ''Woodworking and small‑scale furniture construction'', ''Culinary
    experimentation and baking'', ''Critical analysis and fact‑checking'', ''Strategic competitive gaming'']'
  hobbies: '[''Reading speculative fiction and popular science'', ''Baking and experimental cooking'', ''Arduino and DIY electronics projects'', ''Competitive online strategy gaming'', ''Hiking local trails'',
    ''Maintaining a vegetable garden'']'
  career_goals: Leila aims to turn her practical skill set into a sustainable career that offers flexibility and autonomy. Over the next two years she plans to enroll in a community‑college apprenticeship
    program to earn certification as an electrician or HVAC technician, fields that combine her technical curiosity with hands‑on work. While studying, she intends to grow a modest YouTube channel that
    showcases her DIY home‑improvement tutorials and recipe experiments, gradually building a side‑income stream. In the longer term, she envisions launching her own small contracting business that allows
    her to select projects aligned with her interests and set her own schedule, while continuing to create online content that merges her technical expertise with creative pursuits.
