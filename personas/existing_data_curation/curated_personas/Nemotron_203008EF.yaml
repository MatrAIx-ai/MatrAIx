  hobbies: '[''Hiking'', ''Mountain biking'', ''Acoustic guitar'', ''Cooking'', ''Science‑fiction reading'', ''Board games'', ''Community tech mentoring'']'
  career_goals: Joshua aims to transition from a senior developer to a technical leadership role, such as Lead Engineer or Principal Architect, where he can shape system design while nurturing a collaborative
    team culture. He wants to deepen his expertise in cloud‑native architectures and scalable microservices, and eventually lead initiatives that align technology with community impact—perhaps building
    a health‑tech platform that serves local residents of Berks County. Maintaining a healthy work‑life balance and preserving the flexibility he values are key components of his long‑term career vision.
