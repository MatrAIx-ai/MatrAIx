  hobbies: '[''Video gaming (strategy & competitive)'', ''Cycling (Erie Canal Trail)'', ''Woodworking'', ''Buffalo Bills football fandom'', ''Tech gadget tinkering'', ''Reading non-fiction (psychology,
    business)'', ''Trivia nights'']'
  career_goals: Bradley aims to move from front‑line customer service to a supervisory role within the next two years, leveraging his knack for process analysis and his competitive drive. He hopes to become
    a team lead or shift manager, overseeing a small group of reps and implementing efficiency initiatives. Long‑term, he is interested in transitioning into a training or quality‑assurance position where
    he can design curricula and evaluate performance metrics. He also entertains the idea of earning an associate's degree in business administration to broaden his career options, potentially moving into
    sales or account management with greater autonomy and flexible work arrangements.
