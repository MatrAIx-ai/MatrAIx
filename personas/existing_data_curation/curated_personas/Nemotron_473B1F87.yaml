  career_goals: Sarah aims to turn her eclectic skill set into a sustainable remote career that preserves her preference for solitude. She plans to build a freelance portfolio offering research and writing
    services for niche publications, create and sell original artwork through online platforms, and launch a blog that explores mental‑health coping strategies and the intersection of art and cognition.
    To support these ambitions, she is enrolled in an online associate's degree program in humanities and is studying advanced digital design. Her ultimate ambition is financial independence while maintaining
    a quiet, self‑directed lifestyle, and perhaps publishing a memoir about her journey through anxiety and creative discovery.
