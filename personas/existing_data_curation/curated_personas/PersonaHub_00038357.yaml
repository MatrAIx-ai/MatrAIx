persona_description: A graduate of the library technology program who is well-prepared for employment in a library or information center. The library technician is responsible for managing a vast collection
  of recorded knowledge and helping people find the information they need. The library technician gains an in-depth understanding of information organization and retrieval through both classroom coursework
  and occupational work experience. The library technician is important and satisfying work, connecting people with the information they need. The library technician has exciting and dynamic careers working
  with ever-changing technologies, including books, newspapers, magazines, the Internet, film and audio recordings, photographs, professional journals, and government documents.
