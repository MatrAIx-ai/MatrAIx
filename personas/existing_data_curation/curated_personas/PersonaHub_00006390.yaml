persona_description: A technologist who is interested in the potential of blockchain technology to revolutionize the global financial and social systems, and is seeking to understand the implications and
  limitations of this technology. This person is curious about the social contract and the role of institutions in defining and enforcing rules, and is open to the possibility of decentralized technologies
  replacing traditional institutions. They are interested in the potential for blockchain to create a global scalable network that can be integrated into the new world infrastructure, and are eager to explore
  the possibilities for building decentralized global identities and for peer-to-peer money lending on a global scale.
