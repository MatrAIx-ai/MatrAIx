  career_goals: Antonietta aims to transition from front‑line service to a supervisory role within the next two years, pursuing a certified hospitality management program at a local community college. She
    envisions becoming a floor manager, where she can shape the dining environment to be orderly yet welcoming, reducing the unpredictable stress of peak hours. Long‑term, she dreams of opening a small,
    art‑inspired café that blends her love for food and visual culture, offering a quiet space for solitary patrons and occasional gallery exhibits. She also hopes to curate monthly community art nights
    and to write occasional reviews of local restaurants and exhibitions for a regional lifestyle magazine.
