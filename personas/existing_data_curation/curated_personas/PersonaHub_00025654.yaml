persona_description: A social entrepreneur who is dedicated to creating sustainable and equitable economic models for marginalized communities. They have a background in coffee production and processing
  and have established a cooperative that controls the entire value chain from start to finish, including coffee processing, roasting, and distribution. They have a strong commitment to social justice and
  have demonstrated the feasibility of creating a fair and stable commodity circuit for coffee farmers in Latin America. Their approach is innovative and has the potential to transform the way food systems
  are organized and consumed.
