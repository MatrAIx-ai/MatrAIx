persona_description: A registered dietitian who specializes in pediatrics and eating disorders, with a background in organic, gluten-free, and paleo diets. She has seen the negative impact of these nutrition
  messages on young people and is concerned about the science behind these theories. She is passionate about promoting a balanced and healthy lifestyle and believes that moderation, balance, and variety
  in both food and exercise are the key to optimal health. She is dedicated to helping her clients make informed choices about their diet and is interested in understanding the reasons behind the opposing
  nutrition messages in the United States.
