personas:
  professional: Justin King is a freelance concept artist and visual storyteller who blends abstract painting, modular synth soundscapes, and rapid digital prototyping to craft immersive worlds for indie
    game developers, while their spontaneous, competition‑driven mindset fuels bold ideas but often clashes with project deadlines.
  sports: Justin King loyally follows the Cincinnati Bengals and Reds, plays pickup basketball at Smale Riverfront Park on weekends, and channels their competitive edge into occasional indoor climbing sessions
    at Earth Treks while avoiding structured gym routines.
  arts: Justin King immerses themselves in the local DIY art scene, drawing inspiration from Aphex Twin’s modular experiments, Yayoi Kusama’s immersive installations, and Cincinnati’s Over‑the‑River market
    vibe, while their evenings often involve spontaneous jam sessions at The Blind Pig and abstract painting marathons in their loft.
  travel: Justin King prefers spur‑of‑the‑moment road trips to Hocking Hills, Berlin’s techno festivals, and Portland’s maker fairs, balancing a tight freelance budget with a love for discovering off‑beat
    galleries and industrial ruins that spark new project ideas.
  culinary: Justin King savors Cincinnati chili, craft‑brew rye ales, and experimental ramen bowls spiced with szechuan peppercorn, cooking at a moderate skill level using fresh market finds from Findlay
    Market, yet often opts for late‑night bites at The Eagle BBQ after a studio session.
  core: Justin King is a restless creative visionary who trades structure for spontaneity, constantly chasing novel ideas while juggling erratic finances, chronic back aches, and a competitive streak that
    fuels both brilliance and procrastination.
background:
  cultural: Justin grew up in a middle‑class white family in the Cincinnati metropolitan area, absorbing a blend of Midwestern pragmatism and the city’s vibrant arts culture. He is familiar with the local
    DIY art community, the Over‑the‑River market scene, and the region’s industrial heritage, which informs his aesthetic appreciation for gritty, repurposed materials. His cultural outlook reflects a mixture
    of traditional American values and a strong affinity for subcultural creativity, such as indie music venues, craft‑beer gatherings, and community art festivals.
attributes:
  skills: '["Conceptual Ideation", "Digital Illustration", "Creative Writing", "Improvisational Acting", "DIY Electronics Prototyping", "Basic Video Editing"]'
  hobbies: '["Abstract Painting", "Experimental Music Production", "Speculative Fiction Reading", "Urban Exploration", "Improv Comedy", "Board Game Design"]'
  career_goals: He aims to turn his imagination into a sustainable freelance career, focusing on concept art, illustration, and creative consulting for indie game developers and start‑ups. Over the next
    five years, he hopes to build a personal brand as a “conceptual visionary,” secure regular commissions, and eventually launch a small creative collective that supports other unapologetically experimental
    artists. He also considers returning to a formal art program to refine his technique without compromising his spontaneous style.
