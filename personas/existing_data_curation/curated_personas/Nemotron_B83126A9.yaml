    of junior technologists'']'
  hobbies: '[''Gardening'', ''Reading historical mystery novels'', ''Watching medical documentaries'', ''Yoga'', ''Hiking local trails'', ''Bird watching'', ''Quilting circle'', ''Volunteering at community
    health fairs'']'
  career_goals: Looking ahead, Sue aims to transition into a supervisory role such as Lead Surgical Technologist or OR Educator, where she can shape best‑practice standards and oversee staff development.
    She plans to obtain the Certified Nurse First‑Assistant (CNFA) credential and pursue additional certifications in peri‑operative safety and health technology. Ultimately, she hopes to design a mentorship
    program for aspiring technologists at her hospital and, later, consult on instrument management for regional surgical centers, all while maintaining her balanced work‑life rhythm.
