personas:
  professional: Sue Houck is a seasoned surgical technologist with over thirty years of fast‑paced OR experience, known for their sharp sterile‑instrument preparation, anticipatory patient positioning,
    and hands‑on mentorship of new techs, all driven by practical curiosity and a steady, cooperative nature as they eye a lead technologist or OR educator role.
  sports: Sue Houck enjoys weekend hikes on the Tracy Hills with the Tracy Trails Hiking Club, follows the Sacramento Kings and the Los Angeles Dodgers, and joins a casual pickleball league at the local
    community center, balancing low‑impact cardio with friendly competition.
  arts: Sue Houck spends Thursday evenings in a quilting circle where traditional Americana patterns mingle with bright Mexican folk colors, finds comfort listening to Bill Evans’ piano trio, and regularly
    watches Ken Burns documentaries on American art to fuel their quiet creativity.
  travel: Sue Houck prefers road‑trip itineraries that blend agritourism stays in the Central Valley with historic stops like Williamsburg, Virginia, and they favor family‑run B&Bs where they can garden
    with hosts, though a dream visit to the lavender fields of Provence remains on their travel wishlist.
  culinary: Sue Houck’s kitchen revolves around garden‑fresh tomatoes, rosemary, heirloom corn, and they regularly prepare caprese salads, rosemary‑infused grilled chicken, and a peach cobbler spiced with
    nutmeg and cinnamon, while their occasional over‑zealous preserve‑making leads to an overflowing basement fridge of jars.
  core: Sue Houck balances meticulous OR precision with a quiet love for gardening, quilting, and community care, blending practical self‑reliance with a soft spot for diverse flavors and steady, low‑key
    ambition, even if they sometimes forget to water a plant while lost in a mystery novel.
background:
  cultural: Sue grew up in a small Midwestern farming community before moving to California’s Central Valley, where she has lived for the past two decades. Her white, generational American upbringing emphasizes
    self‑reliance, practicality, and respect for community cooperation. Living in Tracy, she is immersed in a region that blends agricultural heritage with a growing multicultural population, including
    Latino farmworkers and Asian‑American neighbors. This mix has broadened her appreciation for diverse traditions, influencing her cooking, gardening choices, and community involvement, while her personal
    values remain anchored in kindness, cooperation, and a steady, pragmatic outlook.
attributes:
  skills: '[''Surgical instrumentation'', ''Sterile field management'', ''Instrument tray assembly and accountability'', ''Patient positioning and safety'', ''Operating room protocol compliance'', ''Equipment
