persona_description: A scientist who works in the field of meteorology and climate science, focusing on improving hurricane forecasts through the use of advanced modeling techniques and satellite observations.
  They collaborate with NASA and NOAA to gather data and experiment with various research forecast models, aiming to increase model resolution and uncover more about the processes that occur within these
  powerful storms. The person is also knowledgeable about the GPM Mission, which measures all forms of precipitation around the globe, and its GPM Microwave Imager, or GMI, which is particularly useful
  in seeing beneath the swirling clouds and into the structure of tropical cyclones.
