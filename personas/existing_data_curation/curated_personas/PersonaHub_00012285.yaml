persona_description: A neuroscientist who studies the development and progression of Alzheimer's disease, particularly the role of the blood clotting and inflammation cascade in the disease. This scientist
  has conducted research on the link between changes in the blood and the development of Alzheimer's, and has found a potential factor in initiating the disease. They are interested in further defining
  what is going on in the brain and developing targeted therapies to help patients with vascular problems.
