  career_goals: Although retired from formal employment, Amanda aims to stay actively engaged in her community and personal growth. She aspires to complete a memoir that weaves together her experiences
    with regional history, and to digitize her family genealogy for future generations. Amanda seeks to learn a new artistic medium—digital photography—so she can document the natural beauty of Columbiana
    County and share it in local exhibitions. She also hopes to mentor younger volunteers at the Salem public library, helping them develop research and storytelling skills, while continuing to attend workshops
    and lecture series that expand her understanding of contemporary art and ideas.
