  hobbies: '[''DIY home improvement'', ''Adult softball league'', ''College basketball fandom'', ''Fishing'', ''Car shows'', ''Personal finance reading'', ''Community church events'']'
  career_goals: Charles aims to move into a supervisory role within the next two years, targeting a shift‑lead position that will allow him to formalize his training expertise and oversee scheduling. To
    support this transition, he plans to obtain his GED and enroll in a community‑college business management program, focusing on retail operations and supply‑chain basics. His longer‑term ambition is
    to become a store manager, and eventually to open a small convenience‑store franchise in Indian Trail that can provide greater financial stability for his family and leverage his practical experience
    in inventory control and customer relations. He also hopes to pay off his mortgage early and fund a college fund for his children.
