  hobbies: '["Visiting Art Galleries", "Street Photography", "Reading African American Literature", "Cooking Soul Food", "Gardening", "Attending Community Festivals", "Sketching", "Jazz and Hip-Hop Listening",
    "Volunteer Youth Arts Programs", "Playing Chess"]'
  career_goals: Tyree aspires to become a regional director for a boutique hotel chain that emphasizes art and cultural immersion, eventually opening his own boutique hotel in Pearland that doubles as a
    local art gallery and community hub. He wants to develop hospitality consulting services focused on creating inclusive, Black-friendly travel experiences across Texas. Additionally, he plans to mentor
    emerging hospitality professionals, especially those from underrepresented backgrounds, and to continue his education with a master’s in hospitality management or a certificate in cultural tourism.
