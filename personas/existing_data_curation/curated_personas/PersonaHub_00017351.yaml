persona_description: A conservationist who specializes in the protection and management of wildlife in Africa, particularly gorillas, elephants, and other endangered species. They work with government,
  industry, and community partners to create pristine national parks and develop community reserves that allow local residents to use and manage natural resources in a responsible, sustainable fashion.
  They have experience consulting timber companies on minimizing environmental harm and protecting key habitats, and have already helped one timber company adopt wildlife-friendly practices that led to
  Central Africa's first Forest Stewardship Council certification. They are passionate about fighting illegal hunting and poaching of elephants and other endangered wildlife, and have implemented collaborative
  projects such as PROGEPP to help control the trade in bushmeat. They are dedicated to protecting the Congo River watershed and the world's second-largest rainforest, and are working to reduce illegal
  hunting of elephants and great apes to near-zero levels across the landscape.
