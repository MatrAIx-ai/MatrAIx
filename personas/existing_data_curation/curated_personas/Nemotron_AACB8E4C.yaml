personas:
  professional: Paula Correa is a budding junior naturalist who channels their curiosity and practical mindset into leading the school’s Eco‑Explorers club, and they write concise field notes that help
    classmates understand local ecosystems while maintaining a reliable, organized approach.
  sports: Paula Correa plays midfield for the River Rangers youth soccer team, admires the strategic play of FC Barcelona’s women’s squad, balances team drills with solo skill sessions on the community
    park’s grass field, and they join the school’s cross‑country club in the fall to stay fit and enjoy the seasonal change.
  arts: Paula Correa creates digital Minecraft characters inspired by the pixel art of ‘Mojang’ and illustrator Loish, hand‑crafts intricate papel picado during school celebrations, and they practice folklorico
    dance steps taught by the cultural club, weaving together modern and traditional arts in a way that reflects their cooperative and imaginative nature.
  travel: Paula Correa loves family road trips to Redwood National Park, where they fill a nature journal with trail observations, prefers itineraries that blend scheduled ranger talks with spontaneous
    creek explorations, and they dream of backpacking the Inca Trail to Machu Picchu after saving for the adventure.
  culinary: Paula Correa helps prepare tamales with masa, seasoned pork, and chile sauce, rolls empanadas stuffed with seasoned beef and potatoes, perfects a mango‑lime salsa with cilantro as a favorite
    side, and they enjoy the hands‑on cooking sessions that bring the family together despite occasional over‑seasoning.
  core: Paula Correa balances curiosity and practicality, diving into mystery books, soccer drills, and kitchen experiments while sometimes forgetting their water bottle, and they turn each day into a blend
    of adventure and careful planning.
background:
  cultural: Paula comes from a Mexican family that maintains strong ties to its heritage while living in Midland, North Carolina. She grew up hearing Spanish at home and English at school, creating a bilingual
    environment that enriches her cultural identity. Family traditions such as Día de los Muertos altars, festive music, and cooking homemade Mexican meals are central to her daily life, fostering a sense
    of community and continuity. While she embraces Southern U.S. customs—participating in local fairs, supporting her school’s soccer team, and engaging with neighborhood friends—she also celebrates Mexican
    customs through school cultural clubs, folklorico dance, and events organized by the local Hispanic cultural center. This bicultural upbringing shapes Paula’s values of family solidarity, respect for
    others, and a desire to share her heritage with peers.
attributes:
