  hobbies: '["Reading mystery and adventure books", "Exploring nature trails and journaling", "Playing soccer", "Family cooking and baking traditional Mexican dishes", "Crafting papel picado for celebrations",
    "Minecraft building and design", "Drawing and digital illustration", "Folklorico dancing", "Community garden volunteering"]'
  career_goals: Paula dreams of a future that blends her curiosity about living things with her desire to help others. She aspires to become a veterinary technician or a wildlife biologist, hoping to protect
    local animals and educate her community about conservation. Parallel to this, she envisions possibly becoming a bilingual elementary school teacher, using her language skills to support students from
    diverse backgrounds. In the short term, Paula aims to earn top grades in science and Spanish, win a place at the regional STEM fair, and volunteer regularly at the local animal shelter to gain hands‑on
    experience.
