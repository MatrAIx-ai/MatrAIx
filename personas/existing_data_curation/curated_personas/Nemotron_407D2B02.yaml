  career_goals: Looking ahead, Michaelin aims to transition from full‑time audit work to a senior advisory role where she can leverage her experience to help small‑to‑mid‑size Colorado businesses improve
    financial governance. She plans to obtain her CPA license within the next two years, deepen her expertise in sustainability reporting, and serve as a mentor for women entering the accounting profession.
    Ultimately, she hopes to contribute to a local nonprofit board as a volunteer chief financial officer, using her skills to ensure fiscal responsibility while creating a lasting professional legacy.
