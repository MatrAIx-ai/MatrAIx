persona_description: A historian who specializes in the study of the cultural-historical region of Turko-Persia, focusing on the interactions and relations between the Turkic-speaking peoples and the Persian-speaking
  ones. They are knowledgeable about the socio-political foundations of this region, the policies of the Pahlavi dynasty, and the transformations in ethnic relations under the Islamic Republic of Iran.
  They have a deep understanding of the complex dynamics of power, politics, and language in this region. They are also interested in the impact of foreign pressures and influences on the cultural-historical
  region.
