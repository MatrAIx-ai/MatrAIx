personas:
  professional: Sallie Lee, a veteran STEM teacher approaching retirement, designs rigorously sequenced curricula and data‑driven lesson plans, integrates educational technology with methodical precision,
    mentors new instructors and leads grant‑writing workshops, and champions inclusive science instruction by highlighting contributions of historically overlooked scientists.
  sports: Sallie Lee enjoys walking the Portsmouth waterfront for cardio, follows the local minor‑league baseball team, occasionally attends the regional high‑school football games, and participates in
    a community bird‑watching club that meets on weekends, treating these activities as both recreation and low‑impact fitness.
  arts: Sallie Lee spends evenings quilting intricate patterns inspired by traditional motifs while listening to gospel choirs and classic blues artists such as Etta James and B.B. King, and reads historical
    fiction by authors like Walter Dean Myers and Ann Petry that foreground underrepresented voices.
  travel: Sallie Lee prefers short, well‑planned trips to historically rich destinations such as Williamsburg, the Chesapeake Bay islands, and Charleston, often traveling by car with a detailed itinerary
    that includes visits to local museums, waterfront cafés, and genealogy archives, while budgeting carefully to keep travel within retirement income constraints.
  culinary: Sallie Lee excels at cooking Southern comfort fare, regularly preparing dishes like fried chicken, collard greens seasoned with smoked turkey, cornbread, and sweet‑potato pie, and incorporates
    heirloom tomatoes from their garden into sauces, while occasionally over‑salting the gumbo in the excitement of hosting family gatherings.
  core: Sallie Lee blends disciplined teaching expertise, routine‑driven finances, and a love for gardening, quilting, and genealogy into a life that balances community service with a steadfast commitment
    to order, even if they occasionally forget to water the garden before a weekend trip.
background:
  cultural: 'Sallie’s cultural heritage is rooted in the African American experience of Virginia’s Tidewater region. Raised by parents who were active members of a historically Black church and participants
    in the civil rights movement, she grew up with a strong sense of community, respect for elders, and a commitment to education. Family traditions include Sunday gospel singing, soul‑food cooking, storytelling,
    and celebrating Juneteenth and Kwanzaa. These cultural influences shape her teaching philosophy: she regularly incorporates the achievements of Black scientists into her curriculum, mentors students
    from underrepresented backgrounds, and champions equity in STEM. Her personal identity as a Black woman informs her dedication to creating supportive, inclusive learning environments for all her students.'
attributes:
  skills: '["STEM subject-matter expertise", "Curriculum development", "Lesson planning", "Data-driven instruction", "Educational technology integration", "Classroom management", "Laboratory safety compliance",
