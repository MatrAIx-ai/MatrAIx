    responsive teaching"]'
  hobbies: '["Gardening", "Quilting", "Reading historical fiction", "Cooking Southern cuisine", "Attending gospel services", "Playing bridge", "Walking along the waterfront", "Birdwatching", "Crossword
    puzzles", "Genealogy research", "Volunteering for after‑school STEM clubs"]'
  career_goals: Approaching retirement, Sallie aims to leave a lasting impact on her school and community. She plans to secure a grant that modernizes the school's STEM labs, establish a mentorship program
    pairing high‑school students with local engineers, and author a guidebook on culturally responsive STEM instruction. Additionally, she hopes to serve as department chair for a final year, mentor a cohort
    of novice teachers, and create a scholarship supporting Black students pursuing STEM degrees. Post‑retirement, she envisions volunteering as a consultant for neighboring schools and continuing her outreach
    work through the local community center.
