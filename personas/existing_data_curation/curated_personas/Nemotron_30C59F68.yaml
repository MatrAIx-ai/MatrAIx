  career_goals: Donald aims to transition from his current clerk role into a senior accounting position where he can mentor younger staff and lead small‑business financial strategy projects. He plans to
    complete his Certified Public Accountant (CPA) credential within the next two years, focusing on emerging fintech tools such as blockchain‑based ledgers. In the long term he hopes to open a boutique
    bookkeeping consultancy that serves artists, designers, and creative freelancers, blending his financial expertise with his passion for the arts. He also wishes to teach part‑time courses on accounting
    fundamentals at the local community college, sharing his practical knowledge while staying connected to the academic community.
