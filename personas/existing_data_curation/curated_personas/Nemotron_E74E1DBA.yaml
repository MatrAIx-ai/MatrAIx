  career_goals: Luthenia aims to transition from full‑time floor work to a mentorship and consulting role within the retail sector, leveraging her extensive knowledge to train younger staff and help small
    local shops adopt best practices. She also aspires to open a modest community boutique that showcases African‑American artisans, providing a stable income stream as she moves toward retirement. Additionally,
    she hopes to contribute to financial‑literacy workshops for seniors at her local community center, sharing her practical budgeting skills and resilient mindset.
