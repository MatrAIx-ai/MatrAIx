personas:
  professional: William Pennell is an aspiring architect who spends hours arranging LEGO® bricks into precise, miniature cityscapes, and they showcase an early knack for systematic planning, reliable follow‑through,
    and a curious eye for unconventional design.
  sports: William Pennell is a budding athlete who attends the Queens Little Kickers soccer clinic on Saturday mornings, enthusiastically cheers for the New York Yankees and New York Knicks, and they enjoy
    the rhythmic routines of toddler gymnastics, demonstrating a reserved but focused approach to fitness.
  arts: William Pennell is an eager art explorer who delights in storytime sessions at the local library featuring Dr. Seuss’s whimsical illustrations, loves the colorful murals of Pablo Picasso at the
    Queens Museum, and they often sing along to Disney’s ‘Let It Go,’ reflecting a curious, solitary appreciation for diverse creative expressions.
  travel: William Pennell is a small‑world traveler who has taken family outings to Coney Island’s amusement pier, the Bronx Zoo, and a weekend ferry cruise to Staten Island, and they dream of visiting
    Disneyland and the Eiffel Tower someday, favoring short car rides and guided stroller tours over long flights.
  culinary: William Pennell is a budding food lover who adores spaghetti with meatballs, cheesy macaroni, and pizza topped with mozzarella and pepperoni, and they often help stir batter for banana muffins
    while delighting in the sweet taste of fresh apple slices, showcasing a playful yet selective palate.
  core: William Pennell is a curious, methodical three‑year‑old who spends hours building meticulous LEGO towers, saves every coin in a pink piggy bank, battles seasonal allergies with nasal spray, and
    sometimes refuses bedtime brushing, embodying a blend of quiet independence and adorable stubbornness.
background:
  cultural: William is a white child raised in Middle Village, a residential neighborhood in Queens, New York. His family blends Italian and Irish ancestry, common in the area, and they celebrate mainstream
    American holidays such as Thanksgiving and Christmas while also honoring family traditions like Easter egg hunts and Sunday family meals featuring familiar European dishes. Growing up in the culturally
    diverse borough of Queens, William is exposed to a variety of languages, foods, and community festivals, fostering his openness to new ideas and artistic expression. He often visits the nearby Queens
    Museum, local libraries for storytime, and community parks where multicultural events are held, further enriching his cultural perspective.
