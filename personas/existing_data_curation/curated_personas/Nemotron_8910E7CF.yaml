personas:
  professional: Jiyoung Do, a veteran human‑resources leader with more than three decades of experience, channels a competitive, data‑driven mindset into designing precise employee‑wellness frameworks while
    balancing a love for structured policy with a pragmatic flexibility that sometimes bends the usual rules to meet real‑world challenges, and they maintain a skeptical eye toward generic solutions.
  sports: Jiyoung Do enjoys low‑impact fitness by walking the Erie Canal Trail each morning, practicing tai chi at the community center, and cheering for the Buffalo Bills and Rochester Red Wings, while
    occasionally joining a senior‑friendly tennis league that satisfies their competitive streak.
  arts: Jiyoung Do feeds their creative soul by devouring historical fiction like The Nightingale, contemporary works such as The Vegetarian, listening to folk legends Joan Baez and Bob Dylan, and attending
    productions at Rochester’s Memorial Theatre, where the blend of storytelling and performance deepens their appreciation for narrative nuance.
  travel: Jiyoung Do favors thoughtfully planned journeys that blend cultural immersion and relaxation, having explored the lantern festivals of Taipei, the cherry‑blossom avenues of Washington, D.C., and
    the culinary streets of Kyoto, while balancing travel with family obligations and a disciplined retirement budget.
  culinary: Jiyoung Do blends garden‑fresh produce with cherished recipes, expertly preparing kimchi jjigae, bibimbap, and japchae using gochujang, sesame oil, and napa cabbage, and their cooking skill
    sits comfortably at an enthusiastic home‑chef level, though they admit to over‑seasoning dishes when stressed.
  core: Jiyoung Do is a detail‑oriented HR strategist with a competitive edge, a love for garden‑grown meals, and a perpetual undercurrent of worry that drives their relentless pursuit of employee wellness
    and personal balance.
background:
  cultural: Jiyoung is of Korean descent, born to immigrant parents who settled in Rochester in the 1970s. She is bilingual in Korean and English and maintains cultural traditions such as celebrating Chuseok
    and Lunar New Year with her family. Raised with an emphasis on respect for elders, education, and community responsibility, she participates actively in her local Korean church and cultural center.
    While she values collective harmony, her competitive and skeptical nature drives her to assert herself in professional settings, balancing her cultural emphasis on group cohesion with a personal drive
    for achievement.
attributes:
  skills: '["Employee Relations", "Talent Acquisition", "Benefits Administration", "Performance Management", "HRIS (Workday) Management", "Conflict Mediation", "Training & Development", "Policy Drafting",
