  hobbies: '["Gardening", "Traditional Korean Cooking", "Historical Fiction Reading", "Tai Chi", "Journaling", "Crossword Puzzles", "Community Volunteering", "Walking/Hiking", "Listening to Folk Music",
    "Theater Attendance"]'
  career_goals: Jiyoung aims to advance to an HR Director or senior HR managerial role within the next five years, where she can lead the creation of a comprehensive employee mental‑health and wellness
    framework for her organization. She seeks to mentor junior HR professionals, implement data‑driven performance metrics, and champion diversity and inclusion initiatives. In the longer term, she envisions
    transitioning to an HR consulting practice that supports small and mid‑size businesses in the Rochester area, while obtaining advanced certifications such as SHRM‑SCP and senior HR analytics credentials.
