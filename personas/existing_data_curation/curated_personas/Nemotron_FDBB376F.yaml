personas:
  professional: Tanvi Panchal is an aspiring visual storyteller who blends hand‑drawn sketches with digital illustration on a tablet, leveraging their curiosity and love for unconventional ideas to craft
    vibrant characters while thriving on the collaborative energy of school art clubs, even though they often procrastinate on deadlines.
  sports: Tanvi Panchal channels their boundless energy into Bhangra dance sessions at the community center, cheers on the local high school soccer team and the Chicago Bulls, and they occasionally join
    the school’s intramural volleyball club, balancing cultural movement with mainstream American sports.
  arts: Tanvi Panchal immerses themselves in the world of graphic novels, drawing inspiration from the cinematic storytelling of Hayao Miyazaki, the bold lines of comic artist Fiona Staples, and the lyrical
    lyricism of indie musician Mitski, while they regularly attend the downtown art fair to discover emerging street artists.
  travel: Tanvi Panchal dreams of backpacking through Kyoto's temples, tasting sushi in Tokyo, and exploring the vibrant murals of Mexico City, but they currently plan weekend trips to nearby state fairs
    and historic downtown Chicago, balancing wanderlust with a modest family budget.
  culinary: Tanvi Panchal loves experimenting in the kitchen, crafting fusion dishes like tandoori chicken mac and cheese, mango‑chili quesadillas, and paneer‑topped avocado toast, while they consider a
    spicy mango lassi their favorite snack that reminds them of flavors at neighborhood food festivals.
  core: Tanvi Panchal is a talkative, art‑obsessed teen who fuses cultural dance with digital illustration, splurges on creative whims, manages a teen‑friendly budget, and they navigate teenage health with
    a mix of proactive care and occasional neglect.
background:
  cultural: Tanvi comes from a South Asian Sikh family originally from the Punjab region of India. Her parents immigrated to the United States before she was born, and she grew up in Milwaukee’s diverse
    neighborhoods, balancing traditional cultural practices with American life. At home, Punjabi and English are spoken interchangeably, and she participates in Gurdwara services, celebrating festivals
    like Vaisakhi and Diwali with family and community members. These experiences have instilled in her a deep appreciation for her heritage—such as the values of humility, service (seva), and community—while
    also fostering an openness to new ideas and multicultural perspectives. She often blends South Asian culinary traditions with local Midwestern dishes, and she enjoys sharing her culture through art,
    music, and storytelling with friends from various backgrounds.
