  career_goals: Tanvi dreams of turning her creative passion into a career that bridges art and community empowerment. She aims to pursue a high-school art program and later study graphic design or visual
    communications in college. Her long-term ambition is to become a multimedia content creator and cultural liaison for Milwaukee’s South Asian youth, producing videos, illustrations, and social campaigns
    that celebrate diversity and foster intercultural dialogue. She also hopes to mentor younger teens, organize inclusive art workshops, and eventually help establish a community art hub where students
    can showcase their work and share cultural stories.
