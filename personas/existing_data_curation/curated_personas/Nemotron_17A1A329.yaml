  hobbies: '[''Bridge club'', ''Community theater'', ''Gardening'', ''Walking group'', ''Cooking classes'', ''Genealogy research'', ''Traveling with spouse'', ''Knitting'', ''Water aerobics'', ''Volunteer
    work at senior center'']'
  career_goals: Cynthia’s primary ambition is to deepen her impact on the Hudson community through expanded volunteer leadership. She aims to mentor younger volunteers in nonprofit management, launch a
    modest scholarship fund for local high‑school students interested in business, and document her family’s genealogy as a legacy project. Maintaining her health, staying socially active, and channeling
    her competitive drive into meaningful community initiatives also remain central to her goals.
