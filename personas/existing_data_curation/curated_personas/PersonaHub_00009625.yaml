persona_description: A historian and economist who specializes in the study of the American Revolution and the role of money in the formation of American identity. He is particularly interested in the impact
  of the British monetary system on the American colonies and the causes of the American Revolution. He is a vocal advocate for the repeal of the Federal Reserve Act and the implementation of a system of
  national currency based on gold and silver. He is also a critic of the current financial system in America and Europe, and advocates for the restoration of the gold standard and the protection of purchasing
  power. He is a strong advocate for the protection of the rights of the people and the establishment of a government that is accountable to the people.
