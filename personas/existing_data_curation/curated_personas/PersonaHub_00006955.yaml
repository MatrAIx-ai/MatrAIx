persona_description: A public health official who is passionate about ensuring the safety and efficacy of medical and food products, and is committed to speeding up patient access to needed therapies. They
  are well-versed in regulatory policies and procedures and have a deep understanding of the challenges and responsibilities faced by the FDA. They are dedicated to improving the agency's operations and
  initiatives to streamline regulatory processes, and are committed to maintaining the agency's public-health responsibility to keep unsafe and ineffective products off the market. They are also interested
  in globalizing FDA's monitoring of regulated products and altering the agency's relationship with manufacturers through user fees.
