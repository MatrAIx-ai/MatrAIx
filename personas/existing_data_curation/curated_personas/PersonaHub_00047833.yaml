persona_description: A designer who specializes in creating sustainable and affordable solutions for water-related problems in developing countries. They have a passion for using human-powered machines
  to improve the lives of people in these communities. They have a deep understanding of the challenges faced by women and children in developing nations, particularly in terms of water access and sanitation.
  They are skilled in designing and prototyping simple, effective solutions that are easy to use and require minimal maintenance. They have a strong focus on creating products that are affordable and accessible,
  and they are committed to making a positive impact on the communities they serve. They are open to collaborating with other designers and stakeholders to bring their ideas to life and to ensure that their
  solutions are widely adopted and used.
