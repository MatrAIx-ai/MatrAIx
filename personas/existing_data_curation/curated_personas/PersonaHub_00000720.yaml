persona_description: A colonial art historian who specializes in the study of colonial Latin American art, with a particular focus on the art of the Andean region. She is knowledgeable about the fusion
  of different spiritual practices during the colonial period and the role of the Virgin Mary in worship and art. Her research interests include the representation of the Virgin Mary in colonial art, the
  integration of indigenous American cultures with Christianity, and the role of local communities in the creation and veneration of local versions of the Virgin. She is also interested in the significance
  of the baldachin in colonial art and its use in depicting the Virgin Mary.
