persona_description: A professor of public policy who specializes in understanding and advocating for policies that benefit children and families, particularly those with a focus on the living arrangements
  of low-income children, especially those who live with grandparents. Her research interests include the dynamics of family and household structures, the impact of policy on child development, and the
  intersection of social policy and family dynamics. She is known for her advocacy for policies that support parents and children, and for her efforts to better understand and address the needs of families
  in need.
