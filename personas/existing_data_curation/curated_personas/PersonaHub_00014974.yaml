persona_description: A development economist who is concerned about the economic and health impacts of the COVID-19 pandemic on developing countries, particularly those in South America, Africa, and the
  Middle East. They are aware of the interconnectedness of global economies and the importance of supporting these countries to prevent a global recession and to ensure the stability of the global financial
  system. They believe that the current crisis is a triple whammy that has closed borders, shut down entire economies, and resulted in massive unemployment, and they are advocating for a global bailout
  to help these countries stabilize their economies, stem financial outflows, and finance domestic stimulus packages.
