  hobbies: '[''Abstract painting'', ''Sketching'', ''Speculative fiction reading'', ''Philosophy and poetry'', ''Poetry writing'', ''Native‑plant gardening'', ''Birdwatching'', ''Acoustic guitar playing'',
    ''Woodworking'', ''Community volunteering'', ''STEM club facilitation'', ''Attending art exhibitions'', ''Participating in heritage festivals'']'
  career_goals: Although officially retired, Marlon is driven to leave a lasting impact on his hometown. His primary ambition is to establish a community makerspace that blends art, science, and technology,
    providing a collaborative venue for both youth and seniors. He aims to design interdisciplinary workshops that encourage creative problem solving and foster intergenerational harmony. Additionally,
    he hopes to author a series of reflective essays and a memoir that explore the intersection of abstract art and scientific inquiry, thereby inspiring others to embrace lifelong curiosity. Volunteering
    as a mentor and occasional guest lecturer at the local community college also feature prominently in his plans, allowing him to channel his compassion and expertise into meaningful guidance.
