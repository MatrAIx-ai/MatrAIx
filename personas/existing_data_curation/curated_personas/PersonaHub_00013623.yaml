persona_description: A climate scientist who specializes in the reconstruction and analysis of global temperature data during the Last Glacial Maximum period, using paleoclimate data assimilation techniques
  to optimize the integration of state-of-the-art climate models with marine geochemical proxy records. Their research aims to constrain the mechanisms and timescales of large-scale climate change and understand
  the evolution of global surface temperatures since that time. They are currently working on a pre-print titled "Globally resolved surface temperatures since the Last Glacial Maximum" and are excited about
  the results, which are currently under review.
