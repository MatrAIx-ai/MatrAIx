persona_description: A businessman who was the founder and president of the Yale & Towne Manufacturing Company, a prominent manufacturing firm in Stamford, Connecticut, and a key player in the development
  of the lock industry in the United States. He was known for his organizational skills and for instituting a modern factory system to replace what had formerly been done by hand. The success of the company
  was based on the cylinder or five-pin tumbler lock patented by Linus Yale in 1861. The company rapidly expanded its physical plant and work force during its first three years of operation and by 1916
  it had reached 5,000 employees. The city's largest single employer manufacturing firm, Yale & Towne dominated Stamford's economy within 25 years of its establishment and continued to do so until it departed
  in the 1950s.
