  career_goals: Alannah aspires to pursue a career that offers clear structure and tangible outcomes. She is interested in graphic design or user‑interface design, where she can blend her artistic hobby
    of sketching with her technical skills in basic coding and digital tools. She also considers a future in office administration or project coordination because of her love for organizing workflows and
    meeting deadlines. Her short‑term goal is to enroll in a specialized high‑school program or summer workshop that deepens her design and computer‑science foundation, positioning her for a college degree
    in visual communication or information systems.
