  hobbies: '[''kayaking in the Everglades'', ''open‑mic poetry'', ''vintage surf poster collecting'', ''reading contemporary art theory'', ''attending live jazz and experimental music shows'', ''gardening
    native Florida plants'', ''experimenting with Caribbean‑inspired cooking'']'
  career_goals: Philip aims to expand his presence in the South Florida art scene by securing a permanent studio‑gallery space where he can both create and showcase his work. He hopes to develop a series
    of site‑specific installations that reflect the coastal environment of Fort Lauderdale and to collaborate with municipal programs for public art. Over the next five years, he plans to mentor emerging
    artists through regular workshops, publish a coffee‑table book of his mixed‑media series, and eventually transition into a part‑time curator role at a local museum, all while preserving the flexible,
    unstructured schedule he values.
