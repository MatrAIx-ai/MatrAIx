personas:
  professional: Philip Reed is a self‑taught visual artist and muralist who blends mixed‑media painting, digital illustration, and woodworking to create community‑focused installations, leveraging his curiosity
    and relaxed approach to turn disorganized brainstorming sessions into vibrant public art projects while actively mentoring emerging creators.
  sports: Philip Reed is an avid kayaker who belongs to the Everglades Paddle Club, a casual fan of the Miami Heat and Tampa Bay Buccaneers, and a seasonal participant in community beach volleyball leagues,
    preferring low‑key exercise that meshes with their love of the outdoors.
  arts: Philip Reed is a frequent attendee of Fort Lauderdale open‑mic poetry nights, a collector of vintage surf posters, and a devotee of experimental musicians like Flying Lotus and avant‑garde jazz
    drummer Christian McBride, while drawing inspiration from contemporary art theorists such as Hito Steiner in their mixed‑media practice.
  travel: Philip Reed is an impromptu traveler who explores the Florida Keys and the Everglades by kayak, has trekked to Jamaica and Cartagena for their Caribbean culinary scenes, and dreams of a slow‑paced
    study tour in Bali’s coastal art villages, juggling limited vacation time with spontaneous weekend getaways.
  culinary: Philip Reed is a home chef who mixes Caribbean flavors like scotch bonnet peppers, plantains, and jerk seasoning into dishes such as mango‑infused conch ceviche and rum‑marinated pork ribs,
    while cultivating fresh herbs and okra in their garden to elevate both simple salads and experimental fusion plates.
  core: Philip Reed is a curious, laid‑back visual artist whose love for kayaking, vintage surf culture, and Caribbean cooking fuels a flexible, community‑centric art practice despite a habit of overdue
    paperwork.
background:
  cultural: Philip’s cultural background is that of a white American raised in the Midwest who relocated to South Florida in his thirties. The laid‑back coastal lifestyle, multicultural milieu of Fort Lauderdale,
    and the region’s vibrant arts community have shaped his aesthetic sensibilities. He integrates the relaxed, sun‑infused atmosphere of the Gulf Coast with influences from Caribbean and Latin American
    art traditions, while maintaining a distinctly American individualist perspective rooted in self‑directed learning and community engagement.
