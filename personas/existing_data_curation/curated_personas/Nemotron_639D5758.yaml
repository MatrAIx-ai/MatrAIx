personas:
  professional: Sharah Itayem, a 49‑year‑old veteran shuttle driver in Las Vegas, blends defensive‑driving expertise with hospitality‑focused service, leverages her curiosity to scout fresh tourist routes
    and new attractions, and uses her competitive edge to consistently rack up high tips and five‑star reviews, all while maintaining a practical approach to vehicle upkeep and schedule flexibility.
  sports: Sharah Itayem channels her competitive spirit into desert hiking at Red Rock Canyon and weekly dance rehearsals, proudly supports the Vegas Golden Knights and the Las Vegas Raiders, belongs to
    the “Desert Trails Explorers” hiking club, and joins a recreational co‑ed softball league on Sunday afternoons, using sport both for social connection and personal challenge.
  arts: Sharah Itayem commands the spotlight at The Neon Boneyard Lounge’s karaoke nights, stars in community theatre productions such as 'The Music Man', dazzles audiences with her cultural dance troupe
    performances, draws inspiration from icons like Whitney Houston, Elvis Presley, and local singer‑songwriter Brigette Frances, and volunteers for after‑hours jam sessions at The Smith Center, weaving
    her love of performance into every social gathering.
  travel: Sharah Itayem favors spontaneous weekend getaways, often packing a day‑pack for hikes in 'Zion National Park' or catching a quick flight to 'Honolulu' for a taste of island breezes, while day‑dreaming
    about an ambitious cross‑country road trip along the Pacific Northwest coast in her future shuttle fleet, balancing her wanderlust with a modest travel budget and a flexible planning style.
  culinary: Sharah Itayem delights in cooking coconut‑infused taro mash, grilled mahi‑mahi with pineapple salsa, and a signature kalua‑style pork seasoned with sea salt and smoked paprika, pairing each
    dish with fresh mango slices and a chili‑lime dressing, yet she readily admits that late‑night theatre rehearsals often end with a take‑out pepperoni pizza and a soda.
  core: Sharah Itayem is a charismatic 49‑year‑old shuttle driver who thrives on the spotlight, blends competitive ambition with a relaxed planning habit, and can’t resist a karaoke mic, a desert trail,
    or a generous tip.
background:
  cultural: Sharah comes from a Pacific Islander background, growing up in a close‑knit family that places high value on hospitality, respect for elders, and communal celebration. Her cultural heritage
    influences her warm, welcoming demeanor and her love for music, dance, and storytelling. She brings these traditions into her everyday interactions, sharing island songs and offering a culturally infused
    sense of hospitality to passengers, while also participating in local cultural events that keep her connection to her roots alive.
attributes:
  skills: '[''Customer service'', ''Effective communication'', ''Local knowledge of Las Vegas attractions'', ''Vehicle maintenance and troubleshooting'', ''Safe driving and defensive driving'', ''Flexible
