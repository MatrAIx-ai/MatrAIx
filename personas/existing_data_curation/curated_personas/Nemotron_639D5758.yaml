  hobbies: '[''Karaoke singing'', ''Cooking traditional Pacific Islander cuisine'', ''Community theater acting'', ''Exploring local museums and shows'', ''Desert hiking'', ''Dancing in cultural groups'',
    ''Volunteering at cultural festivals'', ''Collecting postcards from travel destinations'', ''Playing ukulele'']'
  career_goals: Sharah aims to obtain a commercial driver's license (CDL) and expand her role from driver to owner‑operator of a small shuttle fleet serving hotels and event venues in Las Vegas. She plans
    to develop a reputation as a reliable contractor for corporate clients, eventually offering driver‑training workshops that blend safety protocols with her hospitality expertise. Long‑term, she hopes
    to secure a stable retirement income through her own transportation business while mentoring other Pacific Islander drivers in the community.
