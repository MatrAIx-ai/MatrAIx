  career_goals: Pedro dreams of turning his passion for art and technology into a career as a multimedia artist or UI/UX designer, where he can blend Mexican cultural motifs with modern digital experiences.
    He aims to earn a scholarship to a specialized high‑school arts program, later pursue a bachelor's degree in Graphic Design or Interactive Media, and eventually work for a creative agency that values
    cultural storytelling. In the long term, he hopes to create a community‑focused art studio that offers workshops for young people, especially those dealing with stress and anxiety, using creative expression
    as a tool for emotional resilience.
