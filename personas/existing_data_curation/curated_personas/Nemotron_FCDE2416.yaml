personas:
  professional: Pedro Fuentes, a 13‑year‑old aspiring multimedia storyteller, channels his curiosity and meticulous bullet‑journal planning into vibrant Día de los Muertos murals and TikTok video edits
    that blend traditional motifs with contemporary pop beats, while also coding Python games for his school debate club.
  sports: Pedro Fuentes, a member of the Southern Valley Juniors soccer club, trains twice a week, idolizes professional teams like FC Barcelona and LA Galaxy, and spends weekends cheering for the local
    high‑school team, the River City Rams, while balancing their disciplined practice schedule with academic and artistic commitments.
  arts: Pedro Fuentes draws inspiration from Frida Kahlo’s bold colors, Diego Rivera’s mural narratives, and the modern beats of Bad Bunny and Ariana Grande, channeling this eclectic mix into their own
    large‑scale Día de los Muertos murals, TikTok animations, and sci‑fi‑themed Python game graphics.
  travel: Pedro Fuentes has explored nearby historic towns like Santa Fe, dreams of attending the Day of the Dead celebrations in Oaxaca, hopes to visit the futuristic city of Tokyo for its anime culture,
    and plans a family road trip to the Grand Canyon, balancing their love for vivid scenery with a tight allowance and school schedule.
  culinary: Pedro Fuentes enjoys devouring tacos al pastore, churros dusted with cinnamon sugar, and homemade guacamole with ripe avocados, while their budding cooking skills let them whip up simple quesadillas
    and experiment with spicy salsas, though they often burn the edges of pans in their eagerness to perfect flavors.
  core: Pedro Fuentes is a hyper‑organized, creatively curious teen who juggles vibrant mural art, soccer, and tech projects while battling a persistent worry‑driven anxiety that fuels both their discipline
    and occasional over‑thinking.
background:
  cultural: Pedro is the son of Mexican immigrants who settled in Columbia, South Carolina. He grew up celebrating traditional Mexican holidays such as Día de los Muertos and Cinco de Mayo, often helping
    his family prepare tamales and mole. At the same time, he embraces Southern hospitality and local customs, attending community picnics and high‑school football games. Bilingual at home, he navigates
    both Spanish and English with ease, which enriches his storytelling and artistic style. This bicultural upbringing fosters a deep respect for his Mexican roots while encouraging him to blend those influences
    with the diverse Southern milieu of his neighborhood.
