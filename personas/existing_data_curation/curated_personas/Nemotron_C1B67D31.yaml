personas:
  professional: Jeremy Moock, a veteran mechanical engineer with over three decades of product design, systems integration, and lean manufacturing expertise, channels their methodical planning, curiosity
    for aesthetics, and community‑first mindset into senior technical consulting roles that blend sustainable mechanics with functional art, while mentoring junior engineers and delivering conference talks.
  sports: Jeremy Moock, a dedicated outdoor enthusiast, they cycle weekly with the Madison Cycling Club on the Kettle Moraine trails, cheer for the Milwaukee Bucks and Green Bay Packers, enjoy ice‑fishing
    on Lake Winnebago each winter, participate in the annual Wisconsin deer hunt in the fall, and maintain a balanced strength routine at the local gym to stay fit for outdoor adventures.
  arts: Jeremy Moock, an avid art lover, they regularly attend openings at the Milwaukee Art Museum featuring works by Dale Chihuly and Georgia O'Keeffe, paint watercolors of Kettle Moraine vistas, play
    acoustic guitar in a folk band covering Bob Dylan and Joan Baez, and volunteer at the New Berlin library’s STEAM‑art workshops alongside local theater productions of August Wilson's plays.
  travel: Jeremy Moock, a methodical planner, they map weekend road trips to Door County’s lighthouse trails, schedule summer cycling tours through the Austrian Alps, have explored Kyoto’s robotics hubs,
    dream of trekking Patagonia’s Torres del Paine, and balance these adventures by allocating a modest travel budget that prioritizes cultural festivals over luxury accommodations.
  culinary: Jeremy Moock, a curious home chef, they experiment with international dishes such as Thai green curry, Ethiopian injera with berbere‑spiced lentils, and classic Italian risotto, while their
    pantry staple includes fresh dill, juniper berries, and Wisconsin cheese curds, though they occasionally over‑salt dishes in their enthusiasm for bold flavors.
  core: Jeremy Moock blends a Midwestern work ethic with a restless artistic curiosity, turning engineering challenges into sustainable, aesthetically pleasing solutions while juggling cycling, folk music,
    and global cuisine, yet they can’t resist over‑checking their inbox late into the night.
background:
  cultural: Jeremy grew up in a Midwestern white family with deep German‑Scandinavian roots typical of Waukesha County. His upbringing emphasized hard work, community involvement, and modesty, shaped by
    participation in local Lutheran church activities and county fairs. He developed an early appreciation for Wisconsin’s outdoors—fishing, hunting, and winter sports—alongside a curiosity for the arts
    fostered by family trips to Milwaukee’s museums and community theater. This blend of pragmatic Midwestern values and a longstanding exposure to cultural and artistic experiences informs his balanced,
    open‑minded perspective.
