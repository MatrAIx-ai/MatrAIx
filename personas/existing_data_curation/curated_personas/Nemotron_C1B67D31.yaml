  career_goals: Jeremy aims to transition into a senior technical consulting role where he can lead interdisciplinary teams focused on sustainable mechanical systems, such as renewable energy installations
    and eco‑friendly product design. He aspires to establish a boutique engineering firm that partners with local arts communities to create functional art pieces and public installations. Additionally,
    he seeks to become a recognized speaker at industry conferences, publish thought pieces on the integration of engineering and aesthetics, and mentor the next generation of engineers through workshops
    and university adjunct teaching.
