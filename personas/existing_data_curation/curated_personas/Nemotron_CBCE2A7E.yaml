  hobbies: '[''fishing in Puget Sound'', ''kayaking on local waterways'', ''hiking in Skagit Valley'', ''building model ships'', ''coding simple games (Scratch, Python)'', ''playing acoustic guitar'', ''reading
    science‑fiction and fantasy novels'', ''volunteering for beach clean‑ups'', ''participating in community service projects'']'
  career_goals: He aims to complete his high‑school equivalency (GED) within the next two years, then enroll in a community‑college program focused on environmental technology or marine science. His long‑term
    ambition is to work as a marine technician or park ranger, integrating his practical skills with his curiosity about marine ecosystems. He also considers an apprenticeship in renewable energy installations,
    seeing it as a way to combine technical work with his interest in sustainable practices.
