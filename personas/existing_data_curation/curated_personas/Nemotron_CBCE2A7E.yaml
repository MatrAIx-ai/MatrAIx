personas:
  professional: Oben Heidelberg, a 16‑year‑old aspiring marine technician, blends hands‑on woodworking, basic coding in Python, and local marine‑life knowledge to lead community beach‑clean projects, and
    they plan a future in environmental technology.
  sports: Oben Heidelberg, an avid kayaker and weekend fisherman who hikes the Skagit trails, is a season ticket holder for the Seattle Seahawks, follows the Seattle Mariners, and they train with the local
    Skagit River Kayak Club while occasionally joining a high‑school cross‑country team.
  arts: Oben Heidelberg, who spends evenings crafting detailed model ships, strumming acoustic renditions of Fleetwood Mac and Mumford & Sons, and devouring the works of N.K. Jemisin and Brandon Sanderson,
    channels a love of narrative and craftsmanship into both their music and reading habits, and they often share these creations with friends.
  travel: Oben Heidelberg, who plans budget‑friendly weekend getaways to the San Juan Islands and Olympic National Park, enjoys spontaneous kayaking adventures on the Puget Sound, and they dream of future
    eco‑tourism trips to the Galápagos, all while balancing school responsibilities and limited family funds.
  culinary: Oben Heidelberg, an intermediate cook who revels in grilling salmon with lemon‑dill glaze, whipping up fish‑and‑chips on a portable stove, and experimenting with garlic‑infused roasted veggies,
    often pairs meals with a cold root‑beer while they occasionally burn the toast.
  core: Oben Heidelberg, a pragmatic, curiosity‑driven teen who balances a love of water‑based adventures with hands‑on making, kindness, and steady composure, is always ready to swap a fishing line for
    a coding project.
background:
  cultural: Oben Ernest was raised in Anacortes, a tight‑knit maritime town in Washington’s Skagit County. The local culture emphasizes a strong connection to the sea, outdoor recreation, and community
    involvement. His white, Pacific‑Northwest upbringing reflects a blend of Scandinavian and broader American frontier values—self‑reliance, respect for nature, and a cooperative spirit. Family traditions
    include seasonal fishing trips, celebrating holidays with community potlucks, and an appreciation for sustainable living, all of which shape his worldview.
attributes:
  skills: '[''basic computer operation and troubleshooting'', ''introductory coding (Scratch, Python)'', ''DIY woodworking and small‑scale carpentry'', ''basic fishing techniques and tide‑pool identification'',
