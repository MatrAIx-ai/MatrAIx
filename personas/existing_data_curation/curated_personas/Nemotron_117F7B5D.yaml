  career_goals: Jonathan aims to secure a supervisory position in his warehouse within the next three years, leveraging his reliability and organizational skills. He plans to obtain his GED and pursue an
    associate degree in supply‑chain management to strengthen his technical knowledge. Long‑term, he hopes to launch a small side business creating custom reclaimed‑wood furniture, combining his practical
    trades with his artistic interests. He also wants to publish a collection of speculative short stories, reflecting his imaginative side, and ensure financial stability for his family by buying a larger
    home in a suburban neighborhood of Jacksonville.
