personas:
  professional: Angelica Quarles is a production line operator at a Clearwater manufacturing firm, leveraging her meticulous quality‑inspection skills, hands‑on equipment maintenance, and curiosity for
    process improvement to propose lean initiatives while compassionately mediating shift‑day conflicts and documenting product aesthetics with her self‑taught digital illustration talent.
  sports: Angelica Quarles enjoys sunrise yoga at Bayside Yoga Studio, runs with the Fort De Soto Trail Club on weekends, plays casual beach volleyball with friends, and cheers for the Tampa Bay Buccaneers,
    Lightning, and Rays while occasionally attending a Tampa Bay Rowdies soccer match.
  arts: Angelica Quarles spends evenings sketching coastal landscapes inspired by Ansel Adams and Georgia O’Keeffe, creates digital illustrations in Procreate that capture product aesthetics, curates visits
    to the Salvador Dalí Museum and local art galleries, and unwinds to indie folk playlists featuring Sufjan Stevens and Ólafur Arnalds.
  travel: Angelica Quarles prefers spontaneous weekend road trips to nearby Gulf Coast gems like Siesta Key and St. Augustine, saves travel points for a future European escape to Santorini and Lisbon, balances
    a modest student‑loan budget with careful planning, and relishes the mix of adventure and relaxation that each coastal sunrise offers.
  culinary: Angelica Quarles enjoys cooking fresh Gulf seafood, often preparing blackened mahi‑mahi tacos with lime, cilantro, and Old Bay seasoning, experimenting with a lemon‑butter sauce for grouper,
    and occasionally over‑salts dishes when stress spikes, while also savoring sushi rolls at local eateries.
  core: Angelica Quarles fuses factory precision with a beach‑comber’s love for color, turning anxiety into detailed sketches, yet habitually forgets to water houseplants and sometimes over‑spends on art
    supplies.
background:
  cultural: Angelica identifies as a white American raised in Pinellas County, Florida. Growing up in a middle‑class, coastal community, she was shaped by the laid‑back beach lifestyle, tourism‑driven economy,
    and the values of hard work and community cooperation common to the area. Her family’s background reflects a typical suburban upbringing with an emphasis on reliability, modest education, and religious
    or civic involvement, which fostered her compassionate and cooperative nature. Exposure to the diverse visitors and cultural events of Clearwater, such as art festivals and music concerts, nurtured
    her curiosity about art and new ideas while reinforcing a respect for both tradition and unconventional thinking. The mixture of Southern hospitality and the multicultural vibe of Central Florida informs
    her preference for small, close‑knit groups and her desire to maintain harmony in interpersonal relationships.
