  career_goals: Angelica aims to advance from production worker to shift supervisor within the next two years, pursuing OSHA forklift certification and a Lean Six Sigma Yellow Belt. She plans to enroll
    in a community college associate program in Industrial Technology to solidify her technical foundation. Long‑term, she aspires to become a quality assurance specialist or product development coordinator,
    blending her production expertise with her artistic eye to contribute to the design of consumer goods. She also hopes to champion mental‑health initiatives in the workplace, leveraging her empathy to
    create supportive team environments.
