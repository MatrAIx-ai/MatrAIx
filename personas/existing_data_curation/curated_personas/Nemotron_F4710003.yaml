personas:
  professional: Howard Shores, a master carpenter who blends hand‑tool craftsmanship with CNC precision, designs and builds high‑end residential interiors while rigorously applying OSHA standards, leading
    disciplined crews, and treating every blueprint like a puzzle to be solved before the deadline; they insist on meeting each milestone with exacting precision.
  sports: Howard Shores fuels his competitive edge by cycling to work with the local Greenway Riders club, tackling the Columbia River Gorge’s trails on weekends, and cheering the Seattle Seahawks, Portland
    Timbers, and Seattle Mariners, all while they chronicle every mile in a disciplined logbook.
  arts: Howard Shores captures the misty evergreen forests through a Nikon D850 like Ansel Adams, rolls a craft‑beer‑themed board‑game night featuring Settlers of Catan with his spouse, and unwinds to the
    gritty blues of Jack White, a soundtrack that fuels his detailed woodworking sessions, and they often discuss the visual composition of each shot over a pint.
  travel: Howard Shores prefers meticulously planned trips, favoring a weekend road‑trip to Mount Hood’s volcanic landscapes, a summer trek through Banff National Park, and a future immersive workshop in
    Japan’s traditional carpentry towns, always booking lodgings and routes down to the last mile, and they rely on spreadsheets to map every stop.
  culinary: Howard Shores brews a hop‑forward IPA in a home‑brew kit while perfecting a smoked salmon tartine seasoned with dill and a side of hand‑crafted sourdough, showcasing intermediate cooking skills
    that blend his love for precise measurement with flavor experimentation, and they relish pairing the brew with artisanal cheese for a post‑build dinner.
  core: Howard Shores is a disciplined carpenter‑entrepreneur who balances structured ambition with a meticulous hobbyist’s eye, yet occasionally lets a stubborn need for perfection spill over into over‑planned
    weekends and an ever‑growing collection of specialized tools, and they don’t mind the occasional chaos that follows.
background:
  cultural: Howard is a White American raised in the Pacific Northwest, where a cultural emphasis on self‑reliance, environmental stewardship, and practical craftsmanship is prevalent. His family background
    values hard work, modesty, and community involvement, which aligns with the region’s tradition of hands‑on trade professions. These cultural influences shape his respect for sustainable building practices,
    disciplined work ethic, and the importance of contributing to local community projects.
attributes:
  skills: '["Custom framing", "Finish carpentry", "Cabinetry", "Blueprint interpretation", "Cost estimation", "Project scheduling", "Power tool operation", "CNC routing", "Safety compliance", "Quality control",
