  hobbies: '["Personal woodworking", "Model ship building", "Hiking in Columbia River Gorge", "Cycling", "Landscape photography", "Home brewing", "Reading technical manuals", "Board game nights with close
    friends", "Volunteering with Habitat for Humanity"]'
  career_goals: Howard aims to achieve journeyman certification within the next two years and secure a contractor's license within five years, positioning himself to launch a boutique construction firm
    that specializes in sustainable, high‑end residential projects in the Pacific Northwest. He plans to develop a signature line of artisanal furniture, gain recognition at regional trade shows, and become
    a mentor for apprentices in his community. His ambition is driven by a desire for structured career progression, measurable milestones, and maintaining the highest standards of craftsmanship.
