persona_description: A cultural historian and literary critic who is interested in the study of the middlebrow, its meanings and its impact on contemporary and historical cultures of reading and entertainment.
  They are knowledgeable about the history and evolution of the middlebrow and its relation to different cultural practices and institutions, and they are skilled in analyzing and interpreting the works
  of writers who are often labeled as middlebrow. They are also aware of the debates and discussions surrounding the use of the term "middlebrow" and the ways in which it can be used to critique and question
  the status quo.
