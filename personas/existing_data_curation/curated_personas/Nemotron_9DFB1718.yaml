  hobbies: '[''Arduino and electronics tinkering'', ''Cycling and hiking in the Bay Area'', ''Cooking traditional Latin American dishes'', ''Family gatherings and cultural celebrations'', ''Recreational
    soccer in a local league'', ''Reading sci-fi and education-technology books'', ''Volunteering at community STEM events'']'
  career_goals: Looking ahead, Pablo aims to translate his systematic teaching philosophy into broader impact by moving into STEM leadership. He plans to pursue a master’s degree in Educational Leadership
    and seek a role as STEM department chair or district curriculum specialist, where he can standardize high-quality, equity-focused curricula. He is committed to launching a bilingual STEM program that
    closes the achievement gap for Latino students, and he intends to partner with Silicon Valley tech firms to secure mentorship opportunities, internships, and grant funding for a makerspace and after-school
    coding academy at his school. Over the long term, Pablo hopes to contribute to research on effective STEM pedagogy, publish case studies, and mentor new teachers to adopt structured, data-informed instructional
    practices.
