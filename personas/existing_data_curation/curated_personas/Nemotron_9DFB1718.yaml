personas:
  professional: Pablo Arzayus is a high‑school mathematics and physics teacher who designs data‑driven, bilingual curricula, leads after‑school STEM clubs, and delivers structured professional‑development
    workshops, and they blend methodical planning, compassionate communication, and a commitment to equity‑focused instruction.
  sports: Pablo Arzayus plays forward on a local community soccer league, cycles the Bay Area’s shoreline trails with the Bay Area Cycling Club, hikes the Santa Cruz Mountains on weekends, roots for the
    San Francisco Giants and the Las Vegas Raiders, and they routinely log mileage in a training journal to balance competition and personal fitness.
  arts: Pablo Arzayus is a sci‑fi film aficionado who watches classics like Blade Runner and The Matrix, attends the San Jose International Film Festival, enjoys live performances of classic rock bands
    such as Pink Floyd and The Who, and they occasionally join a local theater workshop to explore storytelling techniques.
  travel: Pablo Arzayus prefers meticulously planned trips that blend professional development with leisure, having attended a tech conference in Seattle, explored the redwoods of Humboldt County, taken
    a family culinary tour of Oaxaca to study traditional dishes, and they now dream of hiking the Inca Trail while maintaining a detailed itinerary and budget.
  culinary: Pablo Arzayus delights in cooking tamales, ceviche, and mole with their family, mastering corn masa, fresh fish, chilies, and cacao, using fresh market ingredients to create complex sauces,
    hosting holiday gatherings for Día de los Muertos, and they demonstrate an intermediate skill level punctuated by occasional over‑seasoning experiments.
  core: Pablo Arzayus merges a systematic teaching philosophy, disciplined financial habits, proactive health management, and a hands‑on maker spirit, while they balance family traditions, community sports,
    and a love for sci‑fi cinema.
background:
  cultural: Pablo is a first-generation Mexican-American who grew up in a bilingual household in Southern California, where his parents emphasized education, hard work, and close family ties. He maintains
    fluency in both English and Spanish, allowing him to bridge cultural gaps in his classroom and within the wider community. His family celebrates Latino traditions such as Día de los Muertos, Cinco de
    Mayo, and religious holidays, often incorporating music, food, and storytelling into home life. Living in Cupertino, he blends his rich Hispanic heritage with the innovative tech culture of Silicon
    Valley, leveraging local resources and multilingual networks to support his students and promote equity in STEM education.
attributes:
  skills: '[''Mathematics instruction'', ''Physics curriculum development'', ''Computer Science coding instruction'', ''Bilingual communication (English/Spanish)'', ''Educational technology integration'',
