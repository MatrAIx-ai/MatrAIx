  hobbies: '[''Hiking'', ''Basketball'', ''Community volunteering'', ''Live music concerts'', ''Electronics tinkering'', ''Cooking southwestern cuisine'', ''Tabletop role‑playing games'']'
  career_goals: Johnnie aims to become a registered nurse (RN) within the next three years by completing an RN program and earning a BSN, with a long‑term ambition to specialize in emergency department
    nursing and health informatics. He seeks leadership positions such as charge nurse or unit manager, plans to mentor new nursing assistants, and hopes to launch community health outreach programs that
    serve underserved populations in Mesa. Leveraging his STEM background, he also wants to contribute to evidence‑based practice and workflow optimization within his health system.
