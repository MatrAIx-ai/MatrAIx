persona_description: A healthcare professional who specializes in the diagnosis and treatment of cardiovascular diseases, particularly those related to arrhythmias, heart valve problems, and heart disease.
  They are knowledgeable about the risks and complications associated with impaired fasting glucose, impaired glucose tolerance, and endocarditis, and are skilled in the use of implantable cardioverter
  defibrillators and other medical devices for treatment. They are also familiar with the signs and symptoms of intermittent claudication and other vascular disorders, and have experience in performing
  invasive procedures such as intraaortic balloon pumps and invasive surgeries.
