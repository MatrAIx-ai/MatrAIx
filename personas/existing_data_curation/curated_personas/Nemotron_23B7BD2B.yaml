personas:
  professional: Regenia Jackson, an aspiring young naturalist, they blend their fascination with rocks, leaves, and insects with a practical habit of documenting observations in a field journal, while occasionally
    battling the urge to skip a clean‑up to explore a new idea.
  sports: Regenia Jackson prefers solitary hikes along the local creek and participates in the community’s youth nature explorer club, while they occasionally cheer for the hometown baseball team, the Riverdale
    Rockets, during weekend games.
  arts: 'Regenia Jackson sketches woodland creatures in a Beatrix Potter‑inspired style, composes simple piano melodies echoing Debussy’s Clair de Lune, and crafts interactive stories on Scratch that blend
    the fantasy worlds of J.K. Rowling and the animation of ''Avatar: The Last Airbender'', all while they experiment with new coding loops.'
  travel: Regenia Jackson enjoys quiet weekend trips to the nearby state park for leaf‑collecting expeditions, dreams of exploring the geysers of Yellowstone, and prefers carefully planned itineraries that
    allow ample time for solitary observation rather than bustling tourist attractions, which they find overwhelming.
  culinary: Regenia Jackson loves baking chocolate chip cookies with a pinch of sea salt and experiments with adding fresh blueberries to banana bread, often timing the oven while they listen to the soft
    chords of their piano practice.
  core: Regenia Jackson is a quietly curious ten‑year‑old who balances a love for solitary exploration with bursts of spontaneous creativity, often trading structured projects for spontaneous adventures,
    and occasionally struggles with organization and impulse spending, which they sometimes attribute to a love of new ideas.
background:
  cultural: Regenia is an African-American girl growing up in Franklin, a historic town in Williamson County, Tennessee. Her family maintains strong ties to the local Black community and the Methodist church,
    where Sunday services and community gatherings provide a cultural anchor. She celebrates Juneteenth with family potlucks featuring Southern soul food—collard greens, sweet potato pie, and fried catfish—while
    listening to a blend of gospel hymns, classic R&B, and contemporary hip-hop that reflects her cultural heritage. Storytelling evenings with grandparents expose her to oral histories of the Great Migration
    and local civil-rights milestones, fostering a sense of pride and resilience. The neighborhood’s annual summer block parties and library reading programs offer opportunities for quiet learning within
    a supportive community, reinforcing her values of self-reliance, compassion, and cultural continuity.
attributes:
  skills: '["Fluent reading", "Creative writing", "Digital illustration", "Scratch programming", "Puzzle solving", "Basic gardening", "Simple cooking", "Empathetic listening"]'
  hobbies: '["Reading fantasy and science books", "Exploring nature trails and collecting natural specimens", "LEGO building", "Scratch game creation", "Sketching animals and landscapes", "Playing piano",
    "Baking with family", "Church youth choir participation"]'
  career_goals: Although still in elementary school, Regenia already envisions a future where her curiosity and practicality intersect. She dreams of becoming a wildlife biologist or environmental conservationist
    who spends time in quiet field labs studying local ecosystems, especially the diverse wildlife of Tennessee. She also imagines herself as a community educator, sharing what she discovers through workshops
    at her local library or church youth center. At the same time, she harbors a quieter ambition to design educational games that teach other kids about science, blending her love for technology with her
    desire to help others learn in a low-pressure, self-directed environment.
