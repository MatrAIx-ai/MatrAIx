  career_goals: Even though he is no longer in the formal workforce, Edward aims to leave a lasting legacy in his community. He plans to organize a series of free watercolor workshops for seniors, complete
    a collaborative mural that celebrates Earlville's agricultural heritage, and volunteer as a local historian to document oral histories for the county museum. He also hopes to write a memoir that intertwines
    his personal story with the town's evolution, and to learn digital photography so he can archive his artwork and community events for future generations.
