  career_goals: Maribel aspires to channel her love for art and storytelling into a career as a graphic designer or animator, where she can blend visual creativity with cultural storytelling. She dreams
    of attending a specialized high school for the arts, followed by a university program in visual communications or digital media. Long‑term, she hopes to create culturally rich media projects that celebrate
    her Mexican heritage, possibly working on cartoon series, video games, or community-based art initiatives. She also envisions mentoring younger students in art clubs and leading community murals that
    reflect the vibrant spirit of Mexican‑American traditions.
