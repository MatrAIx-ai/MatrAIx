  career_goals: He aims to advance from front-line surveillance to a supervisory position, eventually becoming a security manager for a regional casino or a director of surveillance operations. Completing
    his GED and earning a Certified Protection Professional (CPP) certification are top priorities. Paul also hopes to blend his art interest with his career by curating security-aware art installations
    in public spaces or advising venues on integrating aesthetic design with safety protocols.
