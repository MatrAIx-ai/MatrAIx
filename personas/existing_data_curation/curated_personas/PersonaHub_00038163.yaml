persona_description: A Renaissance man who is interested in the history of banking and the early development of financial institutions. This individual is fascinated by the history of banking in Europe,
  particularly in the Italian city-states, and how the Banco di San Giorgio in Genoa was the first bank. This person is also interested in the role of banking in the recovery of Genoa from its financial
  crisis and the principles that governed the bank's operations. This person is likely to be a historian, a financial historian, or a scholar of early banking.
