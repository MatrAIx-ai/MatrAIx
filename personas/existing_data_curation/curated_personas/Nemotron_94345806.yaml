personas:
  professional: A budding engineering enthusiast, Jorge Alvarezfernandez, they channel their methodical planning and curiosity into designing intricate LEGO creations and coding simple games in Scratch,
    foreshadowing a future in robotics or aerospace engineering.
  sports: An enthusiastic youth soccer player, Jorge Alvarezfernandez, they practice with the East Austin Tigers youth soccer club after school, cheer for Austin FC during MLS matches, and spend weekends
    playing pickup games on the community field, valuing teamwork and close‑knit friendships.
  arts: A budding creator, Jorge Alvarezfernandez, they listen to the melodic riffs of Carlos Santana and the vibrant storytelling of Lila Downs while sketching dinosaur scenes, admire the animated wonder
    of Pixar’s WALL‑E, and use Scratch to animate short narratives that blend sci‑fi concepts with cultural rhythms.
  travel: An inquisitive traveler, Jorge Alvarezfernandez, they prefer family outings that mix cultural immersion and adventure, often planning weekend trips to nearby spots like the San Antonio River Walk
    and Lake Travis, while dreaming of future journeys to the pyramids of Teotihuacan and the Grand Canyon, balancing a modest allowance with parental support.
  culinary: A kitchen helper, Jorge Alvarezfernandez, they love preparing tacos al pastor with marinated pork, pineapple, and a smoky chipotle glaze, blend guacamole with ripe avocados, lime, cilantro,
    and diced tomato, and proudly experiment with homemade tortilla dough, all while humming classic folk tunes that echo family gatherings.
  core: A methodical, curiosity‑driven ten‑year‑old, Jorge Alvarezfernandez, they balance quiet LEGO engineering, modest savings, diligent health habits, and family‑rooted traditions, all while navigating
    school life with a blend of reserved confidence and occasional assertiveness.
background:
  cultural: Jorge is a Mexican‑American growing up in Austin, Texas. At home, his parents speak Spanish, and family gatherings are often filled with Mexican traditions such as celebrating Dia de los Muertos,
    cooking home‑cooked meals, and sharing stories of ancestors. He attends a culturally diverse public elementary school where he interacts with peers from various backgrounds, but his family maintains
    strong ties to their heritage through bilingual education, weekly visits to the local Mexican cultural center, and participation in community festivals like Fiesta de la Familia. The blend of Mexican
    customs and the vibrant Austin environment influences his values of hard work, community support, and respect for both his heritage and his wider community.
