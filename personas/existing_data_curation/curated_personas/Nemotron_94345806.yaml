  career_goals: Inspired by his love of building and problem‑solving, Jorge dreams of becoming an engineer—specifically a civil or robotics engineer—who can design safe, sustainable structures for his community.
    He envisions creating parks or playgrounds that blend modern technology with traditional Mexican design elements. While still focused on school, he aims to deepen his programming skills, earn a robotics
    badge through his scout troop, and later attend a high school STEM program in Austin. He also hopes to help his family’s small business by applying his practical ideas to improve efficiency.
