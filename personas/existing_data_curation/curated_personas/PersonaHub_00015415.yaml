persona_description: A soil and sediment researcher who specializes in terrestrial agrienvironmental assessments. They are familiar with the Fine Increment Soil Collector (FISC), a device developed by the
  Soil and Water Management and Crop Nutrition Laboratory, IAEA, Seibersdorf (Austria). They have experience with using the FISC to perform detailed analysis of physical, geochemical, and biological properties
  of soil and sediment profiles, including the ability to collect soil/sediment increments at millimetre resolution. They have worked on applications of the FISC in two IAEA Coordinated Research Projects,
  CRP D1.20.11 and CRP D1.50.15.
