personas:
  professional: Catherine Thomas, a budding explorer of cause-and-effect, spends hours arranging shape-sorter pieces into systematic patterns and they approach each play session with the methodical precision
    of a miniature engineer.
  sports: Catherine Thomas, a tiny member of the preschool T-ball league, idolizes the Chicago Cubs and enthusiastically practices throwing a soft foam ball, preferring one-on-one drills over crowded game
    sessions.
  arts: Catherine Thomas, a tiny aficionado of color and sound, spends afternoons finger-painting abstract shapes while humming along to Raffi's 'Baby Beluga', and they collect plush versions of famous
    artists' faces as a quirky tribute to the creative world.
  travel: Catherine Thomas, an adventurous stroller-rider, prefers short family road trips to the nearby zoo where they can observe giraffes up close, yet they also dream of a seaside vacation at Clearwater
    Beach, Florida, with a meticulously sticker-labeled itinerary they help create.
  culinary: Catherine Thomas, a picky yet curious eater, delights in buttered noodles with parmesan, loves diced strawberries and banana slices, and occasionally attempts to stir a pot of oatmeal under
    adult supervision, though they stubbornly refuse broccoli.
  core: Catherine Thomas, a three-year-old with boundless imagination and a competitive streak, turns every routine into a meticulously organized adventure, even if it means clutching a piggy bank while
    demanding the last cookie.
background:
  cultural: Catherine is raised in a white, middle‑class family in Pittsburgh, Pennsylvania. Her cultural experiences include celebrating common American holidays such as Thanksgiving, Christmas, and the
    Fourth of July, attending community library story hours, and occasional family trips to local parks and the nearby countryside. Her family enjoys regional foods like pretzels and apple pie, and she
    is exposed to the city's industrial heritage through visits to museums and local events.
attributes:
  skills: '["drawing with crayons", "building block structures", "solving simple puzzles", "sorting objects by color and size", "reciting short stories", "basic counting up to ten", "following daily routines"]'
  hobbies: '["drawing", "building block towers", "listening to stories", "exploring nature", "puzzle solving", "pretend play", "watching educational videos", "singing simple songs"]'
  career_goals: Catherine dreams of turning her vivid imagination into a future profession. She imagines herself as an artist who paints bright pictures, a storyteller who creates picture books, or an explorer
    who discovers new worlds. She aims to learn to read and write fluently so she can share her ideas, and she hopes to develop her artistic skills enough to one day work as a professional illustrator.
