  career_goals: Lucia plans to transition from full‑time flight attendant duties to a mentorship and training role within her airline, aiming to develop the next generation of cabin crew through hands‑on
    safety drills and scenario‑based workshops. She also hopes to contribute a chapter on resilience and calm under pressure to the airline’s internal training manual. In the longer term, she wishes to
    volunteer with a regional aviation museum, sharing her practical knowledge and fostering community interest in aviation, while maintaining a flexible schedule that allows her to travel for personal
    curiosity.
