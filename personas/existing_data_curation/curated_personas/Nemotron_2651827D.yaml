personas:
  professional: Diana Martinez, a 26‑year‑old aspiring front‑desk professional, leverages their meticulous household scheduling, bilingual communication, and basic spreadsheet skills to keep office operations
    orderly and welcoming, thriving on routine tasks that let them support coworkers and visitors alike.
  sports: Diana Martinez enjoys daily walks in local parks, plays in a co‑ed adult soccer league at the Plainfield Community Sports Club during spring, follows the New York Knicks and New York Yankees,
    and they favor light, routine exercise over intense competition.
  arts: Diana Martinez finds creative release in crocheting colorful blankets, delights in Latin pop hits by Marc Anthony and Carlos Vives, spends evenings watching family‑friendly series like 'Bluey' and
    'Full House', draws occasional inspiration from Frida Kahlo’s folk art motifs, and they often share their handmade pieces with friends at community gatherings.
  travel: Diana Martinez prefers short, well‑planned trips that balance cultural immersion and relaxation, has explored historic Cartagena and the vibrant food markets of Oaxaca, dreams of a road‑trip along
    the Pacific coast to enjoy seaside towns while staying within a modest travel budget, and they carefully map out itineraries using travel forums and family recommendations.
  culinary: Diana Martinez, an enthusiastic home cook, masters traditional corn‑masa pupusas stuffed with cheese and beans, seasonal garden vegetables like zucchini and heirloom tomatoes, experiments with
    fresh herbs, chilies, and homemade salsas, enjoys occasional meals at local taquerias that serve authentic carne asada tacos, and they love hosting family dinner nights to share their culinary creations.
  core: Diana Martinez blends a love for orderly routines, garden‑fresh flavors, and community‑center volunteering, all while juggling a habit of checking their email every five minutes and a notorious
    tendency to over‑crochet scarves, and they never miss a chance to lend a helping hand.
background:
  cultural: Diana was raised in a Salvadoran household that values close family bonds, hospitality, and Catholic traditions. At home, Spanish is spoken daily, and she celebrates Salvadoran holidays such
    as Independence Day (Sept 15) and the annual pupusa festivals with relatives. She maintains regular video calls with extended family in El Salvador and participates in local cultural gatherings that
    feature traditional music, dance, and food. While assimilated into the broader Plainfield community, she preserves Salvadoran culinary practices, religious observances, and the emphasis on mutual support
    within her neighborhood.
attributes:
  skills: '["Household management", "Budgeting and financial tracking", "Salvadoran cooking", "Bilingual Spanish‑English communication", "Basic computer literacy (email, word processing, spreadsheets)",
