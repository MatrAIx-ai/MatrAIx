  hobbies: '["Cooking Salvadoran cuisine", "Gardening", "Crocheting and knitting", "Church involvement", "Listening to Latin music", "Walking in parks", "Volunteering at community center"]'
  career_goals: Diana aims to secure a part‑time, routine‑focused role that builds on her organizational strengths, such as a receptionist, office assistant, or front‑desk position at a local business or
    healthcare facility. She plans to enroll in a community‑college certificate program for office administration to formalize her skills while maintaining her responsibilities at home. In the longer term,
    she hopes to contribute steadily to her family’s income, support her husband’s career growth, and eventually volunteer as a cultural liaison for Salvadoran community events in Plainfield.
