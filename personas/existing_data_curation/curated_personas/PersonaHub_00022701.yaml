persona_description: A poultry farmer in Nigeria who is interested in improving the vaccination efficacy of indigenous chickens against Newcastle disease using suitable delivery systems. He is looking for
  a practical and effective means of vaccination that can be easily implemented in his farm. He is also interested in exploring the potential of staple grains as delivery systems for live vaccines, especially
  La Sota and V4 vaccines. He is open to trying different delivery methods and is willing to experiment with different grains and brans to find the most suitable ones for his farm.
