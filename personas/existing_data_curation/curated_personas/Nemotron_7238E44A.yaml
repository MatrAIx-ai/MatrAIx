  career_goals: Jadwiga aims to guide her company through a sustainable growth phase that expands its market presence in the Southeast while maintaining operational consistency. Over the next five years,
    she plans to implement a clear succession roadmap that promotes emerging leaders, ultimately transitioning to a board advisory role. She also wishes to mentor women executives within her industry and
    increase her philanthropic involvement in local education and health initiatives, solidifying a lasting legacy of community impact and responsible leadership.
