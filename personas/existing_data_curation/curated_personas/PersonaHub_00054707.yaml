persona_description: A forensic examiner who is interested in creating disk images to ensure the integrity of the evidence and to reproduce forensic test results with an exact reproduction of analysis methods
  on the original evidence. They are also interested in capturing information invisible to the operating system in use, such as hidden partitions and ext3 partitions on a Windows machine. They prefer using
  popular software like Norton Ghost to create disk images and may not use the default settings on the software.
