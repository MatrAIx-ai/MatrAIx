  career_goals: She aims to graduate high school with honors and attend a university known for its education and public health programs, ultimately becoming a bilingual elementary school teacher or community
    health advocate. She is motivated to design after-school programs that blend academic support with cultural enrichment for Puerto Rican and other Latinx youth in Brooklyn. In the longer term, she envisions
    a role in municipal youth services, using her organizational talent to shape policies that improve educational outcomes and health resources for underserved neighborhoods.
