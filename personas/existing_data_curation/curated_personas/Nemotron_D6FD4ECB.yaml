personas:
  professional: Trinidad Pena, a budding youth organizer, channels their structured planning and outgoing energy into coordinating school dance showcases and basketball tournaments, ensuring every rehearsal
    follows a detailed schedule.
  sports: Trinidad Pena, a dedicated 14‑year‑old basketball player, spends afternoons in the neighborhood street league, practices drills with the Eastside Hoops Club, roots for the city’s professional
    NBA team the Thunderhawks, and balances training with weekend swim sessions for cross‑training.
  arts: Trinidad Pena, a lively creator, fuses salsa, reggaeton and bachata moves into self‑choreographed routines set to Bad Bunny and Shakira tracks, sketches intricate geometric patterns inspired by
    Mondrian, crafts short video edits for school projects using Adobe Premiere Rush, and devours YA novels by Angie Thomas and Jason Reynolds.
  travel: Trinidad Pena, with a love for both adventure and family, frequently explores nearby coastal towns like Santa Marina, has taken a school field trip to Washington DC’s museums, longs to wander
    the historic streets of Seville and the bustling markets of Bangkok, and prefers planning trips with a meticulous itinerary shared on a Google Sheet.
  culinary: Trinidad Pena, who enjoys experimenting in the kitchen, often whips up chicken tacos with fresh cilantro and lime, perfects mango sticky rice for dessert, hones their skill making avocado toast
    with cherry tomatoes, while occasionally indulging in sugary energy drinks after late‑night rehearsals.
  core: Trinidad Pena blends relentless organization with a zest for dance and basketball, balancing a meticulous chore‑sheet for every activity with a habit of staying up late editing videos and snacking
    on chips.
background:
  cultural: As a first-generation Puerto Rican raised in Brooklyn’s culturally diverse Kings County, Trinidad’s family preserves rich Puerto Rican traditions—from celebrating the annual Puerto Rican Day
    Parade in Manhattan to cooking classic dishes like arroz con gandules, pasteles, and flan. Spanish is spoken at home, fostering her bilingual fluency, while she also embraces New York’s urban rhythm
    through hip-hop music and city festivals. Her community involvement with local Latino youth organizations reinforces a strong sense of pride in her heritage and a commitment to giving back to the neighborhood
    that shaped her.
