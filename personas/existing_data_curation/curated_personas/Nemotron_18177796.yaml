personas:
  professional: Juan Velez is an aspiring aerospace tinkerer who spends weekends designing model rockets, applying principles of physics learned in school, while their critical, solitary nature drives them
    to meticulously document each test and iteratively refine designs.
  sports: Juan Velez enjoys hiking the local desert trails with a lightweight backpack, follows the regional junior soccer club called Desert Scorpions United, and participates in a weekly after‑school
    swimming class, while their competitive nature makes them track personal bests in each session.
  arts: Juan Velez creates digital illustrations inspired by the epic worlds of Brandon Sanderson and classic graphic novels, often weaving in patterns reminiscent of traditional folk art they observed
    during community festivals, and they admire the works of Hayao Miyazaki, N. K. Jemisin, and the muralist Diego Rivera.
  travel: Juan Velez prefers self‑guided road trips to nearby national parks where they can collect rock samples and observe weather shifts, dreams of visiting the Atacama Desert for its night sky, and
    plans future family vacations around science museums like the Smithsonian, balancing budget constraints with a thirst for exploratory learning.
  culinary: Juan Velez favors snacks that fuel long reading sessions, reaching for spiced trail mix with almonds, dried apricots, and dark chocolate, enjoys attempting simple recipes like homemade quesadillas
    with shredded cheese and salsa, yet they often forget to wash their hands before cooking, a quirk they’re learning to improve.
  core: Juan Velez is a solitary, curiosity‑driven 12‑year‑old who blends strategic gaming, rocket science, and digital art into a hobbyist lifestyle, while battling occasional late‑night reading fatigue
    and a penchant for impulsive gaming purchases.
background:
  cultural: Juan grows up in Belen, New Mexico, within a family of Mexican descent that maintains strong bilingual ties. At home, Spanish is spoken daily, and family gatherings feature traditional dishes
    such as tamales, enchiladas, and posole, often prepared for celebrations like Día de los Muertos and Cinco de Mayo. The regional influence of New Mexico's Pueblo and Spanish colonial history is evident
    in the architecture, local festivals, and the community's emphasis on hospitality. Catholic traditions shape many of his family's rituals, from attending Mass on holidays to observing the rosary before
    meals. While he embraces modern technology and mainstream pop culture, Juan also feels a deep connection to his heritage, which informs his artistic themes and his respect for community values.
