  career_goals: Juan aims to channel his curiosity and competitive drive into a future career in technology. In the short term, he wants to join his school's robotics club, earn a spot in regional competitions,
    and develop a simple app or game that solves a real‑world problem he cares about, such as tracking local water usage. Long‑term, he aspires to study computer science or aerospace engineering, eventually
    working as a software engineer or robotics designer. He envisions himself creating tools that blend practical solutions with innovative ideas, while maintaining a disciplined yet adaptable work style.
