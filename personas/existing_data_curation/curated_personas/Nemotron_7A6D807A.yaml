personas:
  professional: Maria Sena, a 23‑year‑old bioinformatics graduate with a flair for visual storytelling, works as a research assistant at a local biotech startup where she creates data visualizations and
    scientific illustrations for internal reports, merging Python‑driven analysis with hand‑drawn graphics, while also freelancing for science magazines to make complex concepts accessible.
  sports: Maria Sena enjoys weekend hikes on the Allegheny River Trail and is a member of the local outdoor club that organizes monthly group treks, roots for the Pittsburgh Steelers in football and the
    Penguins in hockey, and participates in an intramural ultimate frisbee league, balancing her love of nature with light competitive play.
  arts: Maria Sena spends evenings painting Pennsylvania landscapes in the style of Andrew Wyeth, creates digital illustrations inspired by Shaun Tan’s whimsical narratives, snaps black‑and‑white photographs
    of rust‑stained steel bridges, and draws speculative‑fiction fan art of N. K. Jemisin’s worlds, channeling her imaginative curiosity into both traditional and digital media.
  travel: Maria Sena favors road‑trip adventures that blend scenic hikes with cultural stops, having explored the historic charm of Fallingwater, taken a weekend photo tour of the Strip District in Pittsburgh,
    and booked a future backpacking trip to the Scottish Highlands to connect with loch‑filled landscapes that echo her home region’s rolling hills.
  culinary: Maria Sena is an intermediate home‑cook who loves perfecting pierogies stuffed with sauerkraut and potato, enjoys pepperoni rolls from local bakeries, and experiments with global dishes like
    Korean bibimbap using gochujang, Indian dal with turmeric, and Mediterranean hummus with roasted red peppers, often sharing her creations at community art‑workshop potlucks.
  core: Maria Sena fuses science and art with a curious, organized spirit, balancing data‑driven projects, modest finances, seasonal allergies, nature‑focused fitness, eclectic creative pursuits, and budget‑friendly
    travel while occasionally indulging in spontaneous art‑supply splurges.
background:
  cultural: Maria grew up in Irwin, a small borough in Allegheny County, Pennsylvania, within a middle‑class family of primarily German and Irish ancestry. The region’s blend of Appalachian heritage and
    industrial history shaped her appreciation for community, self‑reliance, and modest traditions. She celebrates local events such as the annual Iron City Festival, enjoys regional foods like pierogies
    and pepperoni rolls, and was raised with values emphasizing education, cooperation, and respect for nature. While identifying as white American, she also embraces the diverse cultural fabric of western
    Pennsylvania, including influences from neighboring immigrant communities.
attributes:
  skills: '[''Molecular biology lab techniques'', ''Data analysis and statistical modeling (Python, R)'', ''Scientific research and experimental design'', ''Technical writing and scientific communication'',
    ''Graphic design and digital illustration'', ''Photography'', ''Project planning and organization'', ''Critical thinking and interdisciplinary problem solving'']'
  hobbies: '[''Painting and watercolor'', ''Digital illustration and graphic design'', ''Photography (landscape and portrait)'', ''Reading speculative fiction and philosophy'', ''Hiking in the Allegheny
    foothills'', ''Volunteering at science fairs and art workshops'', ''Cooking and trying international recipes'', ''Tabletop board games and puzzles'']'
  career_goals: Maria aspires to pursue a role that merges scientific insight with creative communication, such as scientific illustration, data visualization, or science communication. She plans to obtain
    a master's degree in bioinformatics or science communication within the next few years, aiming to work at a biotech startup or academic lab while creating accessible visual content for broader audiences.
    Long‑term, she hopes to lead interdisciplinary projects that translate complex scientific concepts into engaging media and possibly launch a freelance consultancy blending data science and visual storytelling.
