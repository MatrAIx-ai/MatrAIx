  career_goals: Abigail plans to deepen her clinical expertise by attaining a Veterinary Technician Specialty in anesthesia, allowing her to lead the clinic’s anesthesia team and improve patient safety.
    She also seeks certification as a practice manager to formalize her organizational strengths and mentor a new generation of technicians. Passionate about community education, she hopes to expand her
    outreach workshops into a seasonal pet‑health series for senior citizens, integrating her love of art by offering simple art‑based stress‑relief activities for both owners and their pets. Over the next
    few years she envisions authoring a monthly column in the Eau Claire Weekly on practical pet‑care tips, and possibly curating a traveling exhibit of pet‑inspired artwork at local senior centers. While
    remaining active in the clinic, she plans a phased transition toward part‑time work and volunteer leadership in the Wisconsin Veterinary Technicians Association, ensuring a smooth handover and preserving
    her legacy of compassionate, organized care.
