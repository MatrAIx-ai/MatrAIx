  and homophones in writing. They may have a background in education or language learning, and are able to apply their knowledge to identify and correct errors in written communication. They are also likely
  to be aware of the impact of language on social and cultural contexts, and are able to use this knowledge to identify and correct errors that may have cultural or social implications.
