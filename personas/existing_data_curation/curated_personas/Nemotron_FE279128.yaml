personas:
  professional: Sarah Jacobs, a retired business strategist turned community arts catalyst, blends seasoned financial planning expertise with imaginative event coordination and grant‑writing acumen to launch
    cultural programs, while they meticulously balance budgets and occasionally fret over every detail.
  sports: Sarah Jacobs, an enthusiastic bridge player and weekend walker, follows the Louisville Cardinals basketball team, joins the Bardstown Senior Stroll Club for gentle river‑trail hikes, participates
    in a local lawn‑bowling league during spring, and they often cheer loudly at community softball games.
  arts: Sarah Jacobs, an abstract watercolorist inspired by Georgia O'Keeffe and a mixed‑media crafts enthusiast who reveres the improvisational spirit of Bill Monroe's bluegrass jams, regularly attends
    community theater rehearsals, devours speculative fiction by Neil Gaiman, collects prints by Andy Warhol, and they frequently organize art‑themed discussions at the local library.
  travel: Sarah Jacobs, a modest‑budget traveler, has road‑tripped to the Kentucky Derby Museum in Louisville, explored the vineyards of France’s Bordeaux region, enjoys yearly weekend retreats to Shenandoah
    National Park for bird‑watching, dreams of a cultural pilgrimage to the Van Gogh Museum in Amsterdam, and they plan each trip with a detailed itinerary and a spare day for unexpected discoveries.
  culinary: Sarah Jacobs, a self‑taught herb gardener, delights in seasoning bourbon‑glazed pork shoulder with fresh thyme and rosemary, whips up herb‑infused gnocchi for bridge club potlucks, pairs meals
    with locally distilled bourbon flights, and they occasionally over‑salt dishes when excitement about new recipes overtakes caution.
  core: Sarah Jacobs, a 71‑year‑old bourbon‑loving watercolorist whose boundless curiosity fuels community projects, yet a worry‑prone mind often over‑analyzes every grant and garden seed, and they habitually
    check their to‑do list before bedtime.
background:
  cultural: Sarah was born and raised in Bardstown, Kentucky, a town known for its bourbon heritage, horse farms, and Southern hospitality. Her family, of English-Irish descent, owned a small insurance
    office and were active members of the historic St. Joseph's Catholic Church. Growing up amid Appalachian folk music, annual festivals, and close-knit community gatherings fostered her love for storytelling,
    craft, and civic service. These cultural roots, blended with a lifelong curiosity for abstract ideas and artistic expression, shape her values of hospitality, service, and creative exploration.
