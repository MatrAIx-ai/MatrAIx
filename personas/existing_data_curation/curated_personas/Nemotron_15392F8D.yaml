personas:
  professional: Juan Silva, a budding automotive technician pursuing a community-college certification, they blend bilingual fluency, meticulous organization, and hands-on mechanical know-how to deliver
    precise, routine-focused repairs while providing courteous customer service.
  sports: Juan Silva, a dedicated fitness enthusiast who hits the local gym three times a week, they cheer on the Houston Texans in the NFL, the Houston Astros in MLB, the Houston Dynamo in MLS, follow
    Liga MX club C.F. Monterrey's matches, and spend weekends angling at Lake Conroe with their community fishing group, balancing screen-based sports gaming with real-world activity.
  arts: Juan Silva, an avid consumer of music and film, they unwind to the electrifying riffs of AC DC, the pop anthems of Taylor Swift, and the lyrical flow of Kendrick Lamar, regularly attend church youth
    group performances featuring gospel choirs, and enjoy action blockbusters starring Dwayne Johnson, which together shape their routine-oriented yet expressive outlook.
  travel: Juan Silva, a methodical planner who prefers budget-friendly short trips, they have already road-tripped to Austin for live music festivals and to Galveston's Gulf Coast beaches, aspire to drive
    cross-country to Detroit's automotive museums, and dream of an international excursion to Tokyo's car-culture districts, always mapping itineraries in detail to balance adventure with financial prudence.
  culinary: Juan Silva, an enthusiastic home cook who loves crafting family-style meals, they frequently prepare corn-based flatbreads stuffed with slow-cooked pork, grilled chicken marinated in smoky spices,
    and fresh salsa made from ripe tomatoes, cilantro, and jalapeños, while also experimenting with chipotle-infused sauces and homemade guacamole for added flavor.
  core: Juan Silva, a routine-driven 19-year-old who balances car tinkering, video-game marathons, and weekend fishing trips, they often stay up late binge-watching football highlights and occasionally
    forget to water their houseplants.
background:
  cultural: Juan is a first‑generation Mexican‑American raised in Conroe, Texas. His household is bilingual, and his family upholds Mexican traditions such as celebrating Día de los Muertos, quinceañeras,
    and festive holidays, while also embracing Texan customs like tailgate parties and local community events. The family’s Catholic faith shapes his values of loyalty, responsibility, and community service.
    This cultural blend influences his food preferences, music tastes, and the importance he places on family cohesion and practical work ethics.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Basic automotive maintenance'', ''Minor home repair skills'', ''Organizational and time‑management abilities'', ''Customer service experience'',
