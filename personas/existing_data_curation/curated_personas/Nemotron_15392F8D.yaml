  hobbies: '[''Playing strategy and sports video games'', ''Watching Liga MX soccer and NFL football'', ''Fishing at Lake Conroe'', ''Cooking Mexican cuisine with family'', ''Gym workouts'', ''Car maintenance
    and modification projects'', ''Participating in church youth group'']'
  career_goals: Juan plans to enroll in a community college program in HVAC technology or automotive technology, seeking a certification that leads to a stable, well‑structured career. He aims to secure
    a full‑time position with regular hours where he can apply his practical skills, support his family financially, and eventually open his own small service business. Long‑term, he hopes to combine his
    technical expertise with his organizational strengths to become a reliable supervisor or manager in his field.
