  hobbies: '[''potluck cooking'', ''church choir singing'', ''gardening'', ''card games'', ''bridge'', ''book club (African American literature)'', ''hiking desert trails'', ''photography'', ''quilting'',
    ''knitting'', ''dance classes (line dancing, swing)'']'
  career_goals: Nancy aims to deepen her impact on the Victorville community by taking on a formal volunteer leadership role at the local senior center, where she can mentor younger volunteers and develop
    programs that promote intergenerational connection. She dreams of establishing a community garden that supplies fresh produce to low‑income families and provides a gathering place for neighbors. With
    her passion for cooking, she hopes to launch a small home‑based catering service specializing in healthy soul food for events and church functions. Nancy also intends to enroll in a community college
    continuing‑education class on digital literacy and senior caregiving, ensuring she stays current and can provide professional‑grade support to elders. Ultimately, she aspires to leave a legacy of kindness,
    cooperation, and practical knowledge for her grandchildren and the broader community.
