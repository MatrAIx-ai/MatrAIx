  hobbies: '[''Basketball (Rec League)'', ''Fishing on Lake Erie'', ''Volunteer at Food Bank'', ''Community Event Organization'', ''Classic Rock Concerts'', ''Karaoke Nights'', ''DIY Woodworking'', ''Hiking'',
    ''Cooking for Friends'', ''Erie County Fair'']'
  career_goals: He aims to secure a full‑time position that provides clear structure and a predictable schedule, such as a warehouse associate, forklift operator, or entry‑level commercial driver. Christopher
    plans to obtain a forklift certification and a Commercial Driver’s License (CDL) within the next year, and later pursue an apprenticeship in HVAC or plumbing to build a long‑term skilled‑trade career.
    His ultimate ambition is to become a reliable supervisor or lead technician, offering stability for himself and the ability to give back to his community.
