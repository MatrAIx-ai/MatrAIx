personas:
  professional: Ricardo Rivera, a veteran bilingual secondary-school teacher with three decades of experience, designs culturally responsive Spanish curricula, leverages Google Classroom and data‑driven
    assessments, and balances his curiosity for new tech with a pragmatic, flexible approach to classroom routines while mentoring new teachers.
  sports: Ricardo Rivera enjoys weekend hikes along the Santa Rosa and San Jacinto desert trails, is a member of the local senior walking club, and roots for the Los Angeles Dodgers while occasionally joining
    a community pickleball league.
  arts: Ricardo Rivera spends evenings watching classic Mexican cinema such as "Los Olvidados" and "María Candelaria," listening to the ranchera voices of Vicente Fernández and the folk sounds of Lila Downs,
    and participates in Southwest cultural festivals that showcase traditional dance and artisan crafts.
  travel: Ricardo Rivera favors relaxed road trips to desert destinations like Joshua Tree and the Grand Canyon, has explored Oaxaca’s historic markets for culinary inspiration, and dreams of a guided pilgrimage
    to Machu Picchu that balances adventure with a comfortable travel pace.
  culinary: Ricardo Rivera crafts traditional tamales, rich mole, and hearty pozole using fresh chilies, tomatoes, and herbs from their garden, often experimenting with modern twists like quinoa stuffing
    or dark chocolate mole, while also enjoying finger‑licking street‑taco evenings with fresh cilantro and lime.
  core: Ricardo Rivera blends a lifelong passion for bilingual education, garden‑fresh cooking, and desert hiking with a relaxed, sometimes disorganized outlook that fuels both curiosity and occasional
    stress.
background:
  cultural: Ricardo was born in Jalisco, Mexico, and moved to the United States as a teenager. Raised in a bilingual household, he maintains fluency in both Spanish and English and deeply values the traditions
    of his Mexican heritage, including Día de los Muertos, Semana Santa, and local mariachi music. He remains actively involved in his Catholic parish and celebrates family holidays with extended relatives,
    emphasizing community and respect for elders. Living in Indio, California, he blends his Mexican roots with the multicultural desert environment, incorporating Mexican folklore, foods, and linguistic
    nuances into his teaching to create a relatable and inclusive classroom experience for his diverse student body.
