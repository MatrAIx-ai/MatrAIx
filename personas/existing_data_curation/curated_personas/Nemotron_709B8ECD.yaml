  career_goals: Daniel dreams of a future where he can combine his love of structure, problem solving, and helping others. He aspires to become a marine environmental scientist or engineer who designs sustainable
    solutions to protect the Santa Monica coastline. He imagines conducting field research, developing data‑driven conservation plans, and teaching younger students about ocean health. His high standards
    drive him to aim for academic excellence in science and mathematics, while his compassion motivates him to mentor peers and volunteer in community education programs. Ultimately, he wants a career that
    balances precise, organized work with tangible, caring impact on both people and the planet.
