personas:
  professional: Daniel Johnson is an 11-year-old budding engineer who meticulously builds LEGO machines, documents each step in a notebook, and they channel that precision into coding simple Scratch games,
    reflecting a disciplined, achievement-driven mindset.
  sports: Daniel Johnson is a dedicated swimmer who practices laps at the community pool three times a week, cheers for the Los Angeles Dodgers during spring training, and they occasionally join a local
    beach-volleyball pick-up game, balancing personal discipline with teamwork.
  arts: Daniel Johnson finds solace at the piano, practicing Beethoven's "Für Elise" daily, while they also admire the environmental storytelling in Pixar's "Finding Nemo" and enjoy board-game strategy
    sessions with friends that feature titles like Settlers of Catan.
  travel: Daniel Johnson prefers meticulously planned mini-adventures, such as weekend trips to the tide pools of Catalina Island and family visits to the Monterey Bay Aquarium, favoring nature-focused
    destinations that align with their eco-values, and they budget each outing in a travel notebook.
  culinary: Daniel Johnson loves cooking simple, garden-fresh meals like avocado-lime quinoa bowls and grilled fish tacos, often experimenting with cilantro, lime, and fresh cherry tomatoes, and they occasionally
    sneak a sugary cereal snack when stress spikes.
  core: Daniel Johnson blends laser-focused organization, a compassionate drive to help, and a persistent undercurrent of worry, and they create a uniquely disciplined yet emotionally sensitive young mind.
background:
  cultural: Daniel grows up in a white, middle‑class family in Santa Monica, California. His parents work in professional fields (his mother in education, his father in engineering), and they place a strong
    emphasis on academic achievement, personal responsibility, and community involvement. The coastal West Coast culture immerses him in an environmentally conscious community that values outdoor activities,
    sustainability, and volunteerism. While he celebrates traditional American holidays, his household also embraces the diverse cultural fabric of Los Angeles County through multicultural school events,
    shared community festivals, and friendships with peers from many backgrounds. This blend of progressive, eco‑focused regional values and a family tradition of disciplined study shapes his worldview
    and daily habits.
