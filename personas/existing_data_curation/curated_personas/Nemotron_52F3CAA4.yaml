personas:
  professional: Gust Trott, a 17‑year‑old aspiring freelance concept artist, blends meticulous project planning with a curiosity for speculative fiction, using Photoshop, Procreate, watercolor, and charcoal
    to craft intricate visual narratives that reflect their introspective mood and methodical nature.
  sports: Gust Trott prefers solitary outdoor activity, regularly hiking the foothills near Peyton with the local 'Peyton Trails Club,' and follows the Colorado Rockies baseball team for a touch of community
    connection while occasionally dabbling in weekend rock‑climbing at nearby crags.
  arts: Gust Trott immerses themselves in creative solitude, filling sketchbooks with abstract watercolor studies, composing reflective acoustic guitar pieces inspired by Sufjan Stevens, and citing artists
    like Yayoi Kusama and musicians such as Brian Eno as key influences on their evolving visual storytelling.
  travel: Gust Trott dreams of solo trips to the misty redwood forests of California and the luminous night markets of Taipei, planning each journey with meticulous itineraries on Notion, yet they remain
    budget‑conscious, often opting for weekend road trips to nearby state parks instead of costly international flights.
  culinary: Gust Trott enjoys experimenting in the kitchen, especially crafting vegetarian ramen bowls with miso broth, fresh sriracha, and homemade garlic‑infused tofu, while their cooking skill hovers
    between confident sauce‑making and occasional burnt toast mishaps.
  core: Gust Trott is a meticulous, introspective teen who channels anxiety into detailed art, saves cautiously, hikes alone, and sauces ramen with a side of existential wonder.
background:
  cultural: Gust grew up in a small, predominantly white, rural community in Peyton, Colorado, where a blend of front‑range outdoor culture and a modest working‑class ethos shaped his worldview. His family
    values self‑reliance and quiet perseverance, reinforcing his preference for solitude and methodical work. While formal education ended before ninth grade, a strong DIY spirit and access to online resources
    allowed him to pursue his artistic interests independently. The local culture—characterized by an appreciation for nature, community festivals, and modest religious traditions—has instilled in him a
    respect for personal space and a grounded sense of responsibility, while also exposing him to regional art fairs that sparked his curiosity about unconventional ideas.
