  career_goals: Gust aspires to become a freelance concept artist and visual storyteller, building a portfolio that blends his love of unconventional ideas with meticulous execution. He plans to obtain
    his GED, then enroll in a community college art program to refine his technical skills while maintaining the independence he values. Long‑term, he hopes to launch an online boutique selling original
    prints and custom commissions, allowing him to work from his quiet studio in Peyton and collaborate remotely with clients worldwide. He also wishes to develop a personal brand that promotes mental‑health
    awareness through art, using his own experiences with anxiety as a source of authentic expression.
