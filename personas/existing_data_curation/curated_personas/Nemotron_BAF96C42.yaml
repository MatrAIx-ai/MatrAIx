  career_goals: Shaheen aims to leverage her extensive frontline experience to transition into a supervisory or training role within the customer service department, eventually becoming a Team Lead or Quality
    Assurance Manager. She is motivated to develop structured training modules that incorporate her love for art and innovative thinking, helping colleagues think creatively about customer interactions.
    Long‑term, Shaheen envisions moving into community outreach or arts administration, possibly managing programs that bridge local arts organizations with corporate social responsibility initiatives,
    allowing her to blend her professional expertise with her cultural and artistic passions. She also plans to pursue an associate degree in Business Administration or Arts Management to solidify her credentials
    while balancing family responsibilities.
