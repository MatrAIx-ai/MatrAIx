persona_description: A NASA scientist who specializes in the development and testing of 3-D printing technology in zero-gravity environments. She is leading the project to test a 3-D printer on the International
  Space Station and has extensive experience in spaceflight and 3-D printing. Her expertise includes understanding the effects of zero gravity on 3-D printing processes and developing strategies to overcome
  these challenges. She is also interested in exploring the potential applications of 3-D printing in space exploration and the potential impact on the future of space travel.
