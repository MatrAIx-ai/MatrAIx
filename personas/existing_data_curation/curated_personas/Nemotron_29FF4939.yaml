  hobbies: '[''painting'', ''quilt making'', ''gardening'', ''cooking'', ''museum visits'', ''birdwatching'', ''reading historical fiction'', ''community theater'', ''volunteering at senior center'', ''traveling'']'
  career_goals: Although retired from formal employment, Joan remains driven by personal aspirations. She hopes to complete a memoir that weaves together her memories of mid‑century Texas, family life,
    and the many community projects she has championed. She aims to expand her mentorship role by leading a weekly intergenerational art circle at the local senior center, fostering creative exchange between
    seniors and school‑age children. Joan also wishes to stay physically active by maintaining her garden and participating in walking groups. Travel remains a goal—she plans to visit historic sites across
    Texas, such as the Alamo and the Texas State Capitol, and to attend at least one major art festival each year. Her overarching ambition is to keep learning, sharing, and contributing to her community
    while enjoying a vibrant, socially rich lifestyle.
