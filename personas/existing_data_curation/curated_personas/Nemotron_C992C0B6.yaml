  hobbies: '[''sailing'', ''birdwatching'', ''gardening'', ''quilting'', ''bridge'', ''bingo'', ''dance socials'', ''library volunteering'', ''historical fiction reading'', ''genealogy research'', ''tablet
    use for oral history'']'
  career_goals: Although retired from formal employment, Ginny aims to continue shaping community education by establishing a sustainable gardening and history curriculum for the island’s school and senior
    center. She aspires to publish a memoir that weaves personal narratives with Nantucket’s maritime heritage, and she hopes to mentor a new generation of educators through informal workshops and a peer‑learning
    network. Her competitive streak motivates her to lead a local bridge league and champion a senior‑youth reading challenge.
