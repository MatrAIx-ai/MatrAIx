persona_description: A multidisciplinary graduate research and teaching institution of environmental studies in Israel, focusing on sustainable building practices and methodologies. The school hopes to
  achieve LEED platinum status upon completion of its new building, which features a standalone EcoWall that aims to provide vertical garden space and research facilities for its faculty. The school is
  the only such institution in Israel and is the only LEED-certified building in the country. The building's design incorporates sustainable features such as a cost-effective chilled beam cooling system,
  passive ventilation scheme, and 50kw solar panels. The school's focus on sustainable building practices and its LEED certification make it a target for individuals interested in sustainable building and
  environmental studies.
