    circles","Exploring Philadelphia’s historic neighborhoods"]'
  career_goals: Alex's long‑term ambition is to move into a senior supervisory role such as Lead Maintenance Technician or Maintenance Manager at a major airline or MRO facility in the Philadelphia region.
    Over the next five years she plans to complete an advanced FAA safety-management certification, obtain a Certified Aviation Manager (CAM) credential, and lead a cross‑functional safety‑culture improvement
    project. She is passionate about increasing gender diversity in aviation mechanics and aims to establish a mentorship program for women and under‑represented youth at local technical schools. Ultimately,
    she envisions using her practical expertise and curiosity for emerging technologies—such as electric-propulsion aircraft and advanced drone maintenance—to guide her organization through the next generation
    of aerospace innovation.
