personas:
  professional: Alexanderia Kennedy, a seasoned aircraft maintenance technician with over 30 years of hands‑on experience on Boeing 737 and Airbus A320 fleets, applies their methodical, safety‑first mindset
    and collaborative leadership to troubleshoot complex systems, mentor apprentices, and drive quality‑control audits that keep the shop running like clockwork.
  sports: Alexanderia Kennedy, a regular attendee of Zumba and yoga classes and an avid weekend hiker on the Wissahickon Trail, proudly roots for the Philadelphia Eagles, Phillies, and Flyers while also
    participating in the local Wissahickon Hiking Club and a community running group that meets for Saturday mile runs.
  arts: Alexanderia Kennedy, who unwinds by listening to the classic rock sounds of The Rolling Stones and the orchestral performances of the Philadelphia Orchestra, spends evenings devouring historical
    fiction by Ken Follett and mystery novels by Agatha Christie, and frequently visits the Aviation Hall of Fame to admire aircraft paintings by R. G. Smith.
  travel: Alexanderia Kennedy, a meticulous planner, has explored the extensive exhibits at Oshkosh AirVenture, toured Airbus’s Toulouse assembly line, trekked the Scottish Highlands, and now dreams of
    visiting Japan’s JAXA Tsukuba facility, preferring itineraries that blend aviation heritage sites with scenic hikes and family‑friendly stays.
  culinary: Alexanderia Kennedy, an accomplished home chef, regularly prepares hearty lasagna, chicken parmigiana, and Sunday meatball soup seasoned with garlic, oregano, and fresh basil, often pairing
    the meals with a glass of Chianti while hosting lively dinner parties that showcase their love for generous, family‑style Italian‑American cooking.
  core: Alexanderia Kennedy, a 52‑year‑old aircraft maintenance veteran, balances precise technical rigour with an energized social calendar, tackling complex jet systems by day, leading Zumba classes and
    woodworking projects by night, and never missing the weekly aviation magazine release—though they sometimes leave a screwdriver in the skillet when juggling dinner prep.
background:
  cultural: Alexanderia grew up in a blue‑collar, middle‑class family in suburban Philadelphia, where a strong work ethic and community involvement were core values. Her family’s roots are tied to the historic
    industrial neighborhoods of the city, and she was raised with an appreciation for practical skills, reliability, and teamwork. The multicultural environment of Philadelphia exposed her to diverse perspectives,
    fostering her cooperative and considerate nature. While identifying with mainstream American white cultural traditions—such as celebrating holidays like Thanksgiving and the Fourth of July—she also
    embraces the city’s vibrant sports culture, often supporting the Philadelphia Eagles and Phillies. Her heritage, combined with a career in a traditionally male‑dominated field, fuels her commitment
    to gender equity and mentorship within the aviation community.
