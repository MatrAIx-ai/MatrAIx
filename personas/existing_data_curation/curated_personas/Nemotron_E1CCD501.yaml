personas:
  professional: Linda Chandler is a meticulous technical support specialist who excels at diagnosing hardware failures, documenting repeatable procedures, and automating routine tasks with Python, while
    they channel their curiosity and disciplined organization into reliable, client‑focused solutions and are actively pursuing CompTIA Network+ and Security+ certifications to transition into a senior
    systems analyst role.
  sports: Linda Chandler is an avid jogger who runs three times weekly along the Milwaukee lakefront, attends a local yoga studio on Wednesdays, supports the Milwaukee Brewers and Bucks, and belongs to
    a community running club that meets for weekend trail runs.
  arts: Linda Chandler indulges in puzzle‑solving as a mental art, regularly contributes to crosswords at the library, and enjoys listening to folk‑rock—particularly the music of Mumford & Sons—and classical
    works by Johann Sebastian Bach, while they occasionally attend performances by the Milwaukee Symphony Orchestra and catch local theater productions at the Pabst Mansion.
  travel: Linda Chandler prefers carefully planned weekend getaways that balance budget and adventure, such as cycling trips through Door County, a recent road trip to the Upper Peninsula’s Pictured Rocks,
    and a future pilgrimage to Seattle’s tech hubs, while they often rely on Airbnb rentals and use public transport to keep costs low.
  culinary: Linda Chandler loves cooking herb‑infused dishes using basil, rosemary, and thyme harvested from their balcony garden, frequently preparing pesto pasta, roasted vegetable quinoa bowls, and grilled
    salmon with dill, while they also enjoy sampling local craft beers like those from Lakefront Brewery and treating themselves to a slice of deep‑dish pizza from a beloved Milwaukee pizzeria on occasional
    cheat days.
  core: Linda Chandler blends disciplined curiosity with meticulous organization, turning tech challenges into structured solutions while juggling stress‑prone perfectionism, a budget‑focused life, and
    a quiet love for puzzles, jogs, and home‑grown herbs.
background:
  cultural: Linda grew up in a middle‑class, white family in Milwaukee's south side, a city with strong German and Polish roots. Her parents emphasized hard work, reliability, and community involvement,
    values typical of the Midwestern work ethic. She attended the local public high school, where she participated in the robotics club and community service projects, reinforcing a practical, hands‑on
    approach to learning. Family traditions include summer fish fries, attending local festivals like Summerfest, and weekly Sunday gatherings at a nearby Lutheran church. This cultural backdrop has shaped
    her organized, disciplined nature and her blend of curiosity with practicality.
attributes:
  skills: '["Hardware troubleshooting", "Software installation", "Network setup and maintenance", "Technical support ticket management", "System documentation", "Basic scripting (Python)", "Cybersecurity
    best practices", "Data backup and recovery", "User training", "Computer hardware assembly"]'
  hobbies: '["Custom PC building", "Crossword and Sudoku puzzles", "Jogging along the Milwaukee lakefront", "Yoga for stress management", "Balcony gardening", "Volunteering at library tech workshops"]'
  career_goals: Linda aims to progress from her current technical support role into a senior systems analyst position within the next three years, pursuing CompTIA Network+ and Security+ certifications
    to solidify her networking and security expertise. She envisions eventually leading a small IT team, where she can apply her organizational strengths to streamline workflow, develop standardized procedures,
    and mentor junior staff. Long‑term, she hopes to launch her own freelance IT consulting practice focused on cybersecurity hygiene for small businesses in the Milwaukee area, allowing her to blend her
    practical problem‑solving skills with her desire for independent, client‑focused work.
