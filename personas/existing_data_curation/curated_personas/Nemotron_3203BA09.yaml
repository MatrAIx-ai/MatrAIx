  hobbies: '["Sketching in a personal journal", "Visiting art museums and galleries", "Reading YA and classic literature", "Listening to indie folk music", "Writing poetry", "Photography (DSLR and phone)",
    "Learning guitar chords", "Volunteering at community garden", "Animal shelter volunteer work", "Hiking local nature trails"]'
  career_goals: She envisions pursuing a visual‑arts or graphic‑design degree at a liberal‑arts college, such as Davidson College or an art‑focused university. Her long‑term ambition is to become a multimedia
    storyteller or museum curator who designs inclusive exhibitions and community‑based art programs. Barbara hopes to combine her love for drawing, digital media, and writing to create projects that spark
    dialogue and promote cultural understanding, and she also aspires to mentor younger students through arts‑education initiatives.
