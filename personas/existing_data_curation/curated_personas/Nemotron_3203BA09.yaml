personas:
  professional: An aspiring visual storyteller, Barbara Mendoza sketches Nashville’s neighborhoods and curates a digital portfolio, blending their keen curiosity and organized workflow with a love for indie
    folk rhythms that inspire their emerging illustration style.
  sports: A regular at Centennial Park’s walking trails, Barbara Mendoza enjoys casual soccer with a local youth club, follows the Nashville Predators and Tennessee Titans, and practices yoga twice a week
    to stay flexible, balancing a love for low‑key activity with occasional competitive spark.
  arts: A devoted visitor of the Frist Art Museum, Barbara Mendoza draws inspiration from contemporary painter Kerry James Marshall and indie folk icons like Sufjan Stevens, weaving those influences into
    poetry and guitar chords while they volunteer at community art workshops.
  travel: Preferring thoughtful itineraries, Barbara Mendoza has explored Asheville’s blue‑ridge hikes and the historic streets of New Orleans, and dreams of backpacking through Portland’s indie cafés and
    the Scottish Highlands, balancing budget constraints with a yearning for quiet, culture‑rich escapes.
  culinary: A budding home‑chef, Barbara Mendoza loves crafting avocado‑toast topped with heirloom tomatoes, experimenting with quinoa‑salads flavored by fresh basil and lime, and treats themselves to Nashville
    hot chicken on weekends, though they occasionally over‑indulge in sugary smoothies.
  core: Barbara Mendoza blends a quiet, art‑obsessed soul with a habit of over‑organizing sketchbooks, a love for indie music, and a tendency to forget to water their garden plants when caught up in a new
    creative project.
background:
  cultural: Barbara is a white teenager raised in the suburban neighborhoods of Nashville, Tennessee. Her family blends Midwestern roots with Southern cultural influences, such as a strong sense of hospitality,
    community participation, and an appreciation for music. Growing up, she celebrates holidays like Thanksgiving, Fourth of July, and local events such as the Nashville Film Festival and community farmers’
    markets. The city’s vibrant music scene and its support for the arts have shaped her artistic interests, while school and community programs have reinforced values of collaboration, civic responsibility,
    and respect for diverse perspectives.
attributes:
  skills: '["Charcoal and watercolor sketching", "Digital illustration (Procreate)", "Creative writing (poetry, short stories)", "Basic coding (Scratch, introductory Python)", "Public speaking (class presentations)",
