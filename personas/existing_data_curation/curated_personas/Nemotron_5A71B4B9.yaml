personas:
  professional: A budding junior marine illustrator and LEGO architect, Elizabeth Bauerle channels her curious, organized yet flexible nature into detailed beach scene drawings and meticulously constructed
    ship models, while her competitive streak drives her to perfect each project before sharing with peers.
  sports: Elizabeth Bauerle thrives on the neighborhood soccer field, proudly wearing her Sunlight Soccer Club jersey while cheering for the Houston Dynamo youth team, and she balances her competitive drive
    with teamwork, often challenging friends to score the winning goal before the final whistle.
  arts: Elizabeth Bauerle's artistic world is colored by the swirling seashell patterns of Claude Monet's water lilies, the bold outlines of Georgia O'Keeffe's desert blossoms, and the playful rhythms of
    Jack Johnson's acoustic songs, inspiring her to blend watercolor beach panoramas with hand-crafted cupcake decorations.
  travel: Elizabeth Bauerle loves family road trips along the Texas Gulf Coast, especially exploring the sandy dunes of Galveston Island and the colorful floats of the local Mardi Gras parade, and she dreams
    of diving among coral reefs in Australia's Great Barrier Reef and trekking the ancient dinosaur sites of Patagonia.
  culinary: Elizabeth Bauerle channels her artistic flair into kitchen creations, expertly frosting cupcakes with swirls of vanilla buttercream and edible glitter, while delighting in the tangy zest of
    lime in fish tacos, the crunch of fresh avocado slices, and the sweet aroma of cinnamon-spiced apple crumble.
  core: Elizabeth Bauerle is a curious, art-obsessed seven-year-old who balances a competitive soccer spirit with meticulous shell-collecting, a knack for turning cupcakes into canvases, and a habit of
    leaving LEGO bricks scattered across her room, all while staying skeptical of strangers' motives.
background:
  cultural: Elizabeth is a white American growing up in Galveston, Texas, a coastal Southern city known for its beaches, seafood, and historic maritime heritage. Her family embraces Southern hospitality,
    celebrating holidays like Thanksgiving and Christmas with traditional meals and community gatherings. Frequent beach trips, shrimp boils, and participation in local clean‑up projects connect her to
    the Gulf’s natural environment. She attends a diverse public elementary school, where she interacts with classmates from Hispanic, African‑American, and Asian backgrounds, exposing her to bilingual
    greetings and multicultural events such as Cinco de Mayo. Community festivals like Galveston Mardi Gras and the Dickens Christmas Festival shape her love for costumes, music, and art. The region’s history,
    including stories of the 1900 hurricane, and the presence of the Port of Galveston influence her appreciation for resilience and exploration.
