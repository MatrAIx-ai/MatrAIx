  career_goals: Inspired by her love of art and the sea, Elizabeth dreams of becoming a marine artist who sketches underwater creatures and shares their stories. She also imagines herself as a scientist
    exploring the Gulf Coast’s ecosystems, hoping to win a school science fair one day. Her competitive spirit fuels a desire to be top of her class, earn a ribbon in a local drawing competition, and perhaps
    join a junior soccer team where she can lead. In the long term, she entertains whimsical ideas of becoming an astronaut or a marine biologist, seeing these careers as ways to explore new frontiers and
    create something beautiful.
