    fiction and mental-health self-help books'', ''nature walks and photography'', ''playing ukulele'']'
  career_goals: Carelyn plans to earn her GED within the next year and then enroll in a community college program in social work or public health. She aims to become a youth outreach coordinator for a local
    nonprofit, designing workshops that address anxiety, stress management, and peer support for teens in rural areas. Her long-term ambition is to open a community hub in Gridley that offers after-school
    tutoring, art and music classes, and a safe space for mental-health counseling. She also hopes to expand her online presence as a mental-health advocate, collaborating with professionals to produce
    relatable content that helps other teenagers cope with emotional challenges.
