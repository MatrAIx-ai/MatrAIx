  career_goals: Malachi hopes to translate his extensive hands‑on experience into a part‑time maintenance or handyman position at a community center or local non‑profit, providing the structure he appreciates
    while preserving the flexibility he values. He aims to earn a certification in home renovation to expand his service offerings and eventually launch a modest, neighborhood‑focused repair business. Alongside
    his work goals, he is committed to mentoring younger men in his church, fostering leadership and life‑skill development. He also wants to secure a modest retirement nest‑egg, stay physically active,
    and remain a reliable pillar for his family and community.
