persona_description: A historian who is interested in the history and architecture of Tibet, particularly the cultural and architectural significance of Norbulingka, a UNESCO World Heritage Site located
  in the western suburb of Lhasa. They are knowledgeable about Tibetan palace architecture, the construction and purpose of Norbulingka, and its role in the Tibetan government administration. They are also
  familiar with the history of the Potala Palace and the Historic Ensemble of the Potala Palace, which Norbulingka is part of. They have a keen interest in exploring the gardens, streams, birds, and animals
  within the park, and are likely to appreciate the peaceful and serene atmosphere of the place.
