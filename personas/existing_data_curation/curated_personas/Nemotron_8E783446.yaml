  hobbies: '[''Reading contemporary Mexican literature'', ''Cooking family recipes'', ''Photography'', ''Dog walking'', ''DIY crafts'', ''Curating Latin music playlists'', ''Volunteer tutoring for Spanish‑speaking
    children'']'
  career_goals: She aims to advance from sales associate to shift supervisor within the next two years, eventually pursuing a store manager role. In parallel, Michelle plans to enroll in part‑time community
    college courses in business administration and digital marketing, with a long‑term ambition to open a boutique that blends Mexican‑inspired fashion with online retail. Her practical outlook and calm
    resilience motivate her to seek leadership opportunities that allow flexibility and the ability to mentor newer employees.
