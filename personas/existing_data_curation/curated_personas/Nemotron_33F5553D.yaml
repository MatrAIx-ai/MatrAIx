personas:
  professional: Aramis Casallas is a community-oriented art historian and photographer who leverages bilingual fluency, creative writing, and a relaxed, improvisational style; they curate pop-up exhibitions,
    lead senior art-appreciation workshops, and narrate local visual culture with an unconventional, open-minded twist.
  sports: Aramis Casallas follows the Dallas Mavericks and the Dallas Stars with fervor, joins the Rowlett Senior Bowling League every Thursday night, and maintains a gentle fitness regimen of daily walks
    around their herb garden and occasional Saturday yoga classes at the local senior center, preferring low-impact activities that fit a relaxed schedule; they relish the social camaraderie of the bowling
    night as much as the quiet moments on the trail.
  arts: Aramis Casallas immerses themselves in visual culture, sketching observations at local galleries, photographing community festivals, curating pop-up shows that juxtapose folk crafts with contemporary
    works by artists such as Frida Kahlo, Diego Rivera, and Dallas-based painter Sarah L. Mirazo, and regularly engages in museum lectures on modernist movements and regional folk art; they often weave
    storytelling into exhibition tours to make the art resonate across generations.
  travel: Aramis Casallas favors leisurely road trips through the Texas Hill Country, often stopping at historic towns like Fredericksburg and Waco, dreams of revisiting the vibrant festivals of Oaxaca
    and exploring the colonial streets of Antigua Guatemala, and prefers to plan trips months in advance while leaving room for spontaneous photo excursions in local markets; they consider each journey
    an opportunity to capture cultural nuances through their lens.
  culinary: Aramis Casallas delights in preparing authentic mole poblano with ground ancho chilies, toasted sesame seeds, and a hint of dark chocolate, rolling tamales stuffed with pork and masa in banana
    leaves, and cultivating fresh cilantro, epazote, and oregano in a small herb garden that fuels their weekly family-style meals and occasional community cooking demonstrations; they treat each dish as
    a living archive of tradition and flavor.
  core: Aramis Casallas blends an inquisitive, flexible spirit with a lifelong love for art, photography, and heritage recipes, turning their relaxed, slightly disorganized nature into a bridge between
    generations in the Dallas-Rowlett arts community; they are constantly seeking new ways to merge past and present through creative expression.
background:
  cultural: Raised in a Mexican household and now residing in Rowlett, Texas, Aramis blends his Mexican heritage with the cultural tapestry of the American South. He maintains fluency in Spanish, celebrates
    traditions such as Día de los Muertos and Mexican Independence Day, and incorporates Mexican folk art motifs into his personal projects. He participates in local Hispanic community events, often sharing
    stories of his family's roots in Veracruz and their migration journey. While he embraces Texan hospitality and the broader multicultural environment of Dallas‑Fort Worth, his identity remains firmly
    anchored in the values, music, cuisine, and artistic expressions of his Mexican ancestry.
attributes:
  skills: '[''Art history knowledge'', ''Bilingual Spanish–English communication'', ''Creative writing and storytelling'', ''Photography and visual documentation'', ''Community outreach and workshop facilitation'',
