  hobbies: '[''Cooking traditional Mexican meals'', ''Tending to a vegetable and herb garden'', ''Crocheting and knitting'', ''Listening to Mexican folk and regional music'', ''Watching classic telenovelas'',
    ''Attending church services'', ''Playing bingo and card games at the senior center'', ''Walking in the neighborhood'']'
  career_goals: Even though she is retired, Carmen aims to preserve her family’s culinary and cultural heritage by compiling a handwritten recipe book for future generations. She hopes to volunteer regularly
    at the local senior center, teaching simple cooking classes and sharing gardening tips. Carmen also wants to remain financially independent by managing her modest savings wisely and possibly selling
    homemade baked goods at community fairs. Ultimately, her ambition is to leave a lasting legacy of practical skills and cultural traditions for her descendants and neighbors.
