  career_goals: Kim aspires to advance from a support role to a senior office‑management position within the next two to three years. She plans to earn the Certified Administrative Professional (CAP) credential
    to formalize her expertise and increase her marketability. To complement her practical experience, Kim intends to complete an associate's degree in Business Administration at a local community college,
    focusing on project management and human resources. Ultimately, she envisions becoming an Executive Assistant to a senior leader, where she can blend strategic support with her organizational talents,
    and eventually transition into a project coordinator role within a nonprofit organization that aligns with her community‑service interests. Alongside professional growth, she hopes to develop more structured
    work habits to better manage stress and maintain a healthier work‑life balance.
