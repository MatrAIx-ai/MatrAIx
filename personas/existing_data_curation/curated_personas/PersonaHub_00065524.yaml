persona_description: A member of the UK natural health sector who is actively engaged in the regulation and regulation of herbal medicines. This individual is knowledgeable about the current regulatory
  regime for herbal medicines, including the need for improvement and the challenges faced by companies seeking a licence. This person is likely to be familiar with the European Commission's initiatives
  on herbal medicinal products, including the Well Established Medicines Directive and the Traditional Use Medicines Directive. This person is also likely to be interested in the potential for improvement
  in the regulatory regime for herbal medicines and the role of the MHRA in this process.
