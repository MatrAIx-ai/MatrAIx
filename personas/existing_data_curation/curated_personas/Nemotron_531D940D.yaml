  career_goals: Chelsea aims to transition from day‑to‑day management to a senior advisory and mentorship role within the next three years, using her experience to coach emerging managers in the Midwest.
    She plans to launch a nonprofit arts center in Moberly that provides exhibition space, workshops, and entrepreneurship training for local artists, blending her managerial expertise with her passion
    for creativity. Concurrently, she seeks a seat on the Randolph County Chamber of Commerce board to champion economic development that honors the town’s cultural heritage. Ultimately, she hopes to author
    a memoir that interweaves her career insights with reflections on art, curiosity, and community.
