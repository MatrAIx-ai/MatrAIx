persona_description: A researcher and technologist working on the development of low-cost, micro-integrated wireless sensor nodes for monitoring and controlling energy efficiency and smart infrastructure
  in California. They are part of a multi-disciplinary group at the University of California, Berkeley, and are collaborating with industry partners to create commercial products. The persona is skilled
  in low-power radio research and energy-scavenging technologies, and has expertise in developing new generations of sensors that are smaller, cheaper, and more efficient. They are also familiar with the
  application of wireless-based technologies in monitoring energy use and reducing peak demand in California, and have experience in using smart thermostats and thermostats made by collaborators.
