  career_goals: She often talks about becoming someone who can combine her love of art and the natural world. Jessica imagines growing up as a wildlife illustrator, traveling to draw animals in their habitats,
    or as a museum curator who designs interactive exhibits that let kids explore science and art. She also dreams of writing and illustrating her own picture books, hoping her stories can inspire other
    curious children. Though she sometimes worries about getting everything perfect, her competitive side pushes her to aim for top honors in school art contests and science fairs. Ultimately, she wants
    a future that lets her stay flexible, explore new ideas, and create beautiful, meaningful work.
