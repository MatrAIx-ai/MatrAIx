personas:
  professional: An aspiring junior environmental illustrator, Jessica Beesley blends their fascination with watercolors, mandalas, and nature collages into vivid sketches that reveal a curious mind and
    competitive streak, while their laid-back, often disorganized approach leads them to favor spontaneous drawing sessions over rigid deadlines.
  sports: An energetic backyard explorer, Jessica Beesley joins the Bayou Breeze youth soccer club in the fall, eagerly roots for the New Orleans Saints in football and the New Orleans Pelicans in basketball,
    and balances a competitive drive with occasional reluctance to share the ball during practice.
  arts: A zealous young creator, Jessica Beesley spends afternoons painting mandalas inspired by Henri Matisse's bold color palettes, sketching whimsical characters reminiscent of Dr. Seuss, and listening
    to the lively fiddle rhythms their parents enjoy, all of which shape their emerging artistic voice.
  travel: A curious little wanderer, Jessica Beesley delights in spontaneous day trips to the nearby bayou and the historic French Quarter, dreams of a family road-trip to the Grand Canyon, but often negotiates
    with parents over budget constraints to perhaps visit Disney World someday.
  culinary: A budding kitchen helper, Jessica Beesley relishes tasting and stirring a steaming bowl of shrimp and andouille gumbo thickened with a dark roux and seasoned with bell pepper, celery, and okra,
    proudly attempts to roll sushi with sticky rice despite occasional splatters, and adores buttery grilled cheese made with sharp cheddar on sourdough.
  core: Jessica Beesley is a bright, art-obsessed eight-year-old whose competitive streak fuels their sketchbook adventures, yet lingering worries and a laid-back habit of misplacing supplies keep their
    creative world both vibrant and slightly chaotic.
background:
  cultural: Jessica lives in Cottonport, a quiet community in Avoyelles Parish along the Bayou Teche. Her family is part of the local white Southern community, attending a Methodist church where Sunday
    gatherings include gospel singing and potluck meals. The town’s rhythm follows the seasonal cycles of the farmland and the nearby bayou, with annual events like the Avoyelles Parish Festival celebrating
    Cajun food, music, and craft. Though her heritage is primarily Anglo‑American, the region’s Cajun and Creole culture seeps into her life—she hears French‑derived place names, enjoys the sound of accordions
    at community dances, and tastes dishes like gumbo and jambalaya at family celebrations. The close‑knit nature of Cottonport fosters a strong sense of community, neighborly help, and appreciation for
    the outdoors that shapes Jessica’s worldview.
