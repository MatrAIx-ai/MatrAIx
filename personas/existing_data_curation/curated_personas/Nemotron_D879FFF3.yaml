  hobbies: '["Reading Bilingual Books","Drawing and Coloring","LEGO Building","Puzzles (Jigsaw, Sudoku)","Soccer","Dancing (Salsa, Reggaeton)","Family Cooking (Puerto Rican Dishes)","Exploring Bronx Parks","Listening
