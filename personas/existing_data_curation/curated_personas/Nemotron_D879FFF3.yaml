  career_goals: Naila aspires to channel her love for helping others and her methodical nature into a future career as a teacher or community educator, where she can design organized lesson plans and support
    younger students. She is also fascinated by the ocean and marine life, dreaming of becoming a marine biologist who studies and protects coastal ecosystems, reflecting her Puerto Rican roots. While she
    enjoys these big ideas, she remains practical, aiming to excel academically, lead class projects, and earn a reputation as a reliable peer. She hopes that her bilingual abilities will allow her to serve
    both English‑ and Spanish‑speaking members of her Bronx community.
