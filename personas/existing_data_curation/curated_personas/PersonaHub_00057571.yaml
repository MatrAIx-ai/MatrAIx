persona_description: A historian or legal scholar who is interested in the legal and social structures of Ireland after 1937, particularly the role of women and the family in Irish society. This individual
  is likely to be familiar with the Constitution of Ireland, which was enacted in 1937 and replaced the 1922 Constitution. This person is interested in the sections of the Constitution that deal with fundamental
  rights and the role of women, and may have a particular interest in the article that defines the family as the natural primary and fundamental unit of society. This individual may also have a keen interest
  in the Irish Referendum Results of 1937, as they relate to the passage of the new constitution.
