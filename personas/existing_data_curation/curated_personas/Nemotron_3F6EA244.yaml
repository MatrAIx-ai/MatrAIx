  hobbies: '["Drawing and coloring with vibrant palettes", "Reading picture books and fairy tales", "Collecting natural items (leaves, rocks, insects)", "Building with LEGO bricks", "Singing and dancing
    to children''s music", "Participating in church youth activities", "Helping bake cookies with mom", "Playing educational tablet games"]'
  career_goals: Although she is still exploring her interests, Jennifer frequently talks about wanting to help people and create beautiful things. She dreams of becoming an artist who paints stories, a
    teacher who shares books with children, or a veterinarian who cares for animals she finds in the woods. In the near term, she aspires to be the "helper" at school, assisting teachers with classroom
    tasks and mentoring younger classmates, reflecting her compassionate and cooperative nature.
