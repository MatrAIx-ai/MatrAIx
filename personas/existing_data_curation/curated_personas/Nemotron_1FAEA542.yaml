  hobbies: '["Drawing and coloring", "Building with Duplo bricks", "Listening to children’s music and dancing", "Exploring the park and collecting natural items", "Feeding ducks at the pond", "Playing hide‑and‑seek",
    "Preschool crafts (collages, pom‑pom decorations)", "Helping with simple cooking (decorating cupcakes)"]'
  career_goals: Jacquelyn often dreams of becoming a teacher because she loves reading stories to friends and helping classmates learn new things. She also expresses a strong desire to be a veterinarian,
    inspired by her affection for neighborhood dogs and farm animals, and wants to care for sick pets. Occasionally, she talks about being a scientist who explores nature, collecting bugs and studying how
    plants grow, showing an early ambition to discover and protect the world around her.
