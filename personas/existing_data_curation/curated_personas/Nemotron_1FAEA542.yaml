personas:
  professional: Jacquelyn Shurling, a budding junior scientist, applies their methodical curiosity to building simple experiments with building blocks, carefully planning each step and sharing results with
    peers in the preschool class.
  sports: Jacquelyn Shurling enjoys organized gymnastic classes at the local Kids' Gym, cheers for the hometown baseball team the Chicago Cubs, and participates in a community soccer league that meets on
    Saturdays.
  arts: Jacquelyn Shurling loves coloring books featuring Disney characters, especially Mickey Mouse, often sings along to kid‑friendly Taylor Swift songs, and attends Saturday storytime sessions at the
    public library where they admire the illustrations of Eric Carle.
  travel: Jacquelyn Shurling delights in family trips to Disney World and the beach town of Myrtle Beach, preferring a well‑planned itinerary with scheduled snack breaks, yet also enjoys spontaneous nature
    walks in nearby state parks.
  culinary: Jacquelyn Shurling prefers macaroni and cheese, chicken nuggets, and apple slices, often helps in the kitchen to stir sauce with a wooden spoon, yet has a guilty habit of sneaking extra chocolate
    chip cookies before bedtime.
  core: Jacquelyn Shurling is a methodical, curious five‑year‑old who balances organized play with a love for stickers, gymnastics, and occasional cookie theft.
background:
  cultural: Jacquelyn is raised in a middle‑class, White American family of mixed German and Irish ancestry in Canton, Ohio. Her family emphasizes community, modesty, and hard work, values typical of the
    Midwestern Midwest. She regularly attends a local Methodist church, where she participates in family‑friendly events and seasonal celebrations. Holidays such as Thanksgiving, Christmas, and the Fourth
    of July are marked with family gatherings, traditional foods, and community parades. She frequents the Canton public library for storytime and enjoys local festival activities, like the annual Classic
    Car Show and summer park concerts, which foster a sense of belonging and cultural continuity.
attributes:
  skills: '["Counting to 20", "Letter recognition (uppercase)", "Reading simple sight words", "Fine motor skills (coloring, cutting)", "Building with Duplo bricks", "Following multi‑step routines", "Organizing
