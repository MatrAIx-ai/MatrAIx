  hobbies: '[''conga and bongo drumming'', ''salsa dancing'', ''abstract painting'', ''watercolor art'', ''Arduino DIY projects'', ''vintage radio restoration'', ''quadcopter drone building'', ''fishing'',
    ''weight lifting'', ''attending folk‑art fairs and open‑mic nights'']'
  career_goals: Gil aims to earn an FCC‑approved Electronics Technician certification and subsequently move into a lead‑assembler or production‑supervisor role at his plant. He is driven to develop a reputation
    for innovative problem‑solving, which he hopes will open doors to managing a small team. In the longer term, Gil dreams of launching his own boutique electronics‑repair shop that also offers custom
    Arduino‑based hobby projects, leveraging his love of tinkering and his competitive streak to become a recognized local business. He also sees the growing renewable‑energy market as an opportunity to
    transition into solar‑panel installation, providing a steadier, less stressful work environment for his family life.
