    clean‑up and historic preservation projects'' ]'
  career_goals: Donald aims to transform his hands‑on expertise into a niche business that offers high‑end decorative concrete and terrazzo solutions for residential and commercial clients in the Pocono
    region. Over the next five years he plans to obtain Certified Concrete Finisher (CCF) and Certified Terrazzo Installer (CTI) credentials, attend workshops on sustainable concrete mixes, and mentor apprentices
    through the local union. He hopes to expand his portfolio by collaborating with architects and artists, eventually opening a studio‑shop where he can experiment with mixed‑media installations that blend
    his love for craftsmanship and visual art. In the long term, he envisions becoming a recognized authority in environmentally‑friendly concrete design and contributing to community revitalization projects.
