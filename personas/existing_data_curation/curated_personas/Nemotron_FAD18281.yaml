  hobbies: '["Cooking Vietnamese and Thai dishes", "Hiking in Percy Warner Park and Natchez Trace", "Attending live music shows in Nashville", "Practicing yoga", "Gardening", "Volunteering at local Vietnamese
    cultural festivals", "Reading historical fiction and poetry", "Modding indie video games", "Playing digital piano"]'
  career_goals: Khue aims to move into a senior technical lead or solution architect role where she can shape products that serve diverse user groups, especially the Southeast Asian diaspora. Over the next
    five years she plans to earn AWS Solutions Architect and Certified ScrumMaster credentials, deepen her expertise in machine‑learning APIs for language translation, and lead a small team focused on inclusive
    design. She values a flexible schedule that lets her balance family life, so she is exploring part‑time consulting opportunities that allow her to advise startups on culturally aware UI/UX and multilingual
    support. Ultimately, Khue hopes to launch a community‑driven platform that connects Southeast Asian heritage learners with educational resources and mentors in the U.S.
