personas:
  professional: Khue Yap is a senior full‑stack web developer who leverages a humanities background to craft inclusive, user‑centered interfaces, writing clean Python, JavaScript, and Java code while mentoring
    juniors and documenting in both English and Vietnamese, thriving in flexible Agile teams despite a tendency toward relaxed scheduling.
  sports: Khue Yap’s athletic pursuits revolve around hiking the Percy Warner Park and Natchez Trace trails with the Nashville Women’s Hiking Club, cheering on the Nashville Predators and Tennessee Titans
    on game nights, and occasionally joining the Midtown Run Club for weekend 5K runs, balancing active weekends with a flexible schedule.
  arts: Khue Yap’s artistic life is anchored by attending live shows at the Ryman Auditorium—from country star Sturgill Simpson to indie folk favorites Bon Iver—playing digital piano covers of The Avett
    Brothers, and immersing themselves in historical fiction like Kristin Hannah’s 'The Nightingale' and poetry by Rainer Maria Rilke, all of which enrich their creative outlook.
  travel: Khue Yap prefers a blend of spontaneous road trips to Asheville’s Blue Ridge Mountains and carefully planned overseas adventures to Kyoto and Chiang Mai, typically traveling with a modest budget
    that still allows occasional indulgences in culinary tours, reflecting a desire for cultural discovery balanced with family and work commitments.
  culinary: Khue Yap delights in cooking aromatic pho with star anise, lemongrass, and rice noodles, simmering Thai green curry with coconut milk, galangal, and fresh basil, and fermenting crunchy kimchi
    with napa cabbage and gochujang, often sharing these dishes at family gatherings while experimenting with seasonal vegetables from their backyard garden.
  core: Khue Yap is a curiosity‑driven, flexible technologist who blends meticulous code with relaxed planning, nurtures wellness through yoga and hiking, and spices life with multilingual cooking, community
    volunteering, and a love for live music.
background:
  cultural: Khue is a first‑generation Vietnamese American; her parents immigrated to the United States in the early 1990s and settled in the South. Growing up in a bilingual household in the South, she
    celebrates Tet, Mid‑Autumn Festival, and Vietnamese family traditions while also embracing Southern hospitality and community life in Mount Juliet. Her upbringing emphasized collectivism, respect for
    elders, and the importance of education, which influences her collaborative work style. Khue stays connected to the diaspora through a local Vietnamese cultural association, where she mentors youth,
    participates in language‑exchange groups, and serves traditional dishes at community events. This blend of Southeast Asian heritage and Southern American culture gives her a unique perspective that
    she often brings to her professional projects.
