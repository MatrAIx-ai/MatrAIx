personas:
  professional: Joshua Nunez is an aspiring operations coordinator who leverages Excel wizardry, basic Python automation, and meticulous project planning to streamline hospitality workflows, while they
    balance curiosity about sustainable tech with a methodical, reliable approach to ensure every process is both efficient and eco‑conscious.
  sports: Joshua Nunez rides the Atlantic waves with the South Florida Surfers Club, paddles a kayak on weekend trips, joins beach‑volleyball pick‑up games at local parks, and avidly follows the Miami Heat,
    Tampa Bay Rays, and the Florida Gators, balancing a laid‑back surf lifestyle with structured fitness plans.
  arts: Joshua Nunez relaxes after a surf session by listening to Jack Johnson and Bon Iver, attends occasional art shows featuring local muralists, enjoys the documentary “Before the Flood,” and indulges
    in the podcast “The Future of Everything” while they dissect emerging ideas through a creative lens.
  travel: Joshua Nunez prefers spontaneous weekend getaways to coastal spots like Key West, the Bahamas, and Costa Rica for kayaking adventures, yet meticulously plans a dream trip to Iceland’s geothermal
    springs and Patagonia’s fjords, balancing limited student funds with a desire for immersive eco‑tourism experiences.
  culinary: Joshua Nunez has a moderate cooking skill set, often whipping up grilled mahi‑mahi with mango salsa, avocado toast with microgreens, and a weekend poke bowl, while they favor fresh fish, lime,
    cilantro, and locally sourced quinoa, and occasionally treat themselves to a slice of New York‑style pizza after a long surf session.
  core: Joshua Nunez blends an analytically sharp mind with a surfer’s soul, obsessively tracks spreadsheets by day and tides by dawn, and occasionally forgets to water their houseplants while planning
    the next sustainable‑tourism venture.
background:
  cultural: Joshua is a 22‑year‑old white American raised in West Palm Beach, Florida. His family bears a Spanish surname, reflecting ancestral roots from Spain, and his upbringing blends mainstream American
    traditions with the vibrant, multicultural atmosphere of South Florida. Growing up near the coast, he was exposed to tourism‑driven culture, diverse communities, and a strong emphasis on environmental
    stewardship, all of which have shaped his appreciation for hospitality, diversity, and practical, community‑focused initiatives.
