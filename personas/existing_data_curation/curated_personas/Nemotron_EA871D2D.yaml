  career_goals: Robert aims to move into a senior sales operations or director role within the next three to five years, where he can lead digital transformation of sales processes, mentor the next generation
    of supervisors, and achieve top‑tier performance metrics for his division. He is also interested in establishing a part‑time consulting practice to help small businesses optimize their sales operations,
    while planning a phased retirement that includes a smooth handover of his supervisory responsibilities.
