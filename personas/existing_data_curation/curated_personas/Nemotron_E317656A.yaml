  career_goals: David aims to secure a promotion to an assistant manager or store manager position within the next two years, leveraging his deep product knowledge and practical curiosity to introduce small‑scale
    e‑commerce initiatives for the store. He also wants to mentor younger employees, helping them develop reliable sales techniques while creating a more organized work environment that reduces his own
    stress. In the longer term, David envisions opening a modest family‑run boutique that combines his retail expertise with Filipino specialty goods, providing a stable retirement income and preserving
    his cultural heritage.
