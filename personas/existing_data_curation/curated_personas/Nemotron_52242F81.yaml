personas:
  professional: Silkia Fuentes is a budding marine biologist who channels their meticulous nature into cataloguing tide‑pool creatures in a color‑coded journal, builds LEGO models of coral reefs to test
    hypotheses, and relies on the disciplined practice habits honed at the piano to approach scientific inquiry methodically.
  sports: Silkia Fuentes loves swimming in the Pacific surf, participates in the local junior soccer league, cheers for the Portland Timbers and Seattle Seahawks, and maintains a structured fitness routine
    that includes daily tide‑pool walks, weekend bike rides, and occasional beach‑run sprints, balancing their competitive drive with a love for solitary outdoor activity.
  arts: Silkia Fuentes expresses their creativity through detailed sketches of sea creatures inspired by Ernst Haeckel, practices piano pieces by Ludwig van Beethoven and Yann Tiersen, and enjoys animated
    films by Hayao Miyazaki, weaving these artistic influences into their school science projects and bedtime storytelling.
  travel: Silkia Fuentes dreams of snorkeling among the giant kelp forests of the Galápagos Islands and exploring the tide pools of New Zealand’s Bay of Islands, while they also cherish family road trips
    to Oregon’s Cannon Beach and weekend hikes in the Redwood forests, planning each adventure with a hand‑drawn map and a checklist of shells to collect.
  culinary: Silkia Fuentes delights in helping their family prepare paella with saffron rice, empanadas stuffed with cheese, and churros dusted with cinnamon, while also mastering simple fish tacos with
    lime, showcasing a budding kitchen skill set that balances savory and sweet flavors.
  core: Silkia Fuentes is a nine‑year‑old perfectionist who blends a love for marine life, disciplined piano practice, and meticulous budgeting, yet often worries about missing a detail and can’t resist
    an extra churro after a beach clean‑up.
background:
  cultural: Silkia’s family is of Spanish descent, and the household blends Spanish traditions with the coastal Oregon lifestyle. At home they speak both Spanish and English, celebrate holidays such as
    Día de los Reyes and Día de la Madre, and enjoy foods like paella, empanadas, and churros. These cultural practices nurture her bilingual abilities and her appreciation for family gatherings. Living
    in Nehalem, she also embraces the Pacific Northwest’s love of the outdoors, which complements her Spanish heritage’s emphasis on community, music, and storytelling. This multicultural environment shapes
    her identity, values, and curiosity about the natural world.
attributes:
  skills: '[''Multilingual (English & Spanish)'', ''Advanced reading comprehension'', ''Early math problem solving'', ''Scratch coding'', ''Meticulous scientific note‑taking'', ''Marine life identification'',
