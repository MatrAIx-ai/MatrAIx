  hobbies: '[''Tide‑pool exploration and shell collecting'', ''Nature journaling'', ''Reading science and adventure books'', ''Illustrating marine life'', ''LEGO model building'', ''Piano practice'', ''Participating
    in school science club'', ''Community beach clean‑ups'']'
  career_goals: She aspires to become a marine biologist or oceanographer who studies and protects the Pacific coastal ecosystems of Oregon. Her long‑term goal is to lead research projects that combine
    scientific rigor with practical conservation solutions. She envisions attending a top university, earning a scholarship, and eventually becoming an environmental educator who inspires other children
    to care for the ocean. Her disciplined approach drives her to set high academic standards and seek leadership roles in school science clubs.
