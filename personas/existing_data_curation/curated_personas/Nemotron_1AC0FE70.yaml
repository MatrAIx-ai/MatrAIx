  career_goals: Jessica aims to leverage her extensive experience to mentor the next generation of financial advisors, focusing on ethical sales practices and client education. She aspires to earn a Certified
    Financial Planner (CFP) designation to complement her existing expertise and enhance her advisory capabilities. Over the next few years, she plans to develop a community outreach program that provides
    financial literacy workshops for seniors in Montgomery County, reducing the risk of fraud and improving financial confidence. Additionally, she seeks to maintain a high client satisfaction rating and
    achieve senior advisory status within her firm, while gradually transitioning toward a semi‑retirement role that balances professional engagement with personal interests.
