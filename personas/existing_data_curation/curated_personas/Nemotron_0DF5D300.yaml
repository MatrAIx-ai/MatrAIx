  career_goals: At 60, Zeyla aims to transition from a hands‑on stocker to a floor supervisor, where she can formalize her mentorship role and influence store efficiency on a larger scale. She hopes to
    earn a certification in supply‑chain fundamentals offered by a community college to validate her extensive on‑the‑job knowledge. Beyond promotion, Zeyla is passionate about creating a supportive environment
    for younger workers, especially those from immigrant backgrounds, by establishing a peer‑support program that blends practical training with stress‑management workshops. She also plans to negotiate
    a flexible schedule that allows her to continue contributing at work while dedicating more time to community outreach and family gatherings before she fully retires.
