personas:
  professional: Zeyla Rodriguez is a seasoned retail logistics specialist who leverages three decades of inventory management, forklift operation, and bilingual communication to streamline store operations,
    mentoring new staff with the same methodical reliability and sociable energy that defines their work ethic.
  sports: Zeyla Rodriguez enjoys low‑impact fitness through leading morning walks at the senior center, participating in a local senior softball league each spring, and cheering for the Philadelphia Eagles,
    balancing community camaraderie with a disciplined routine that satisfies their energetic, sociable spirit.
  arts: Zeyla Rodriguez’s artistic palate includes dancing to lively marimba ensembles at neighborhood festivals, listening to the soulful melodies of Carlos Vives, and attending performances by the Delaware
    Theatre Company, especially productions featuring classic actors like James Earl Jones, which nourish their curiosity and love for communal storytelling.
  travel: Zeyla Rodriguez favors organized, moderate‑length trips, often taking weekend road trips to historic towns like St. Michaels, Maryland, and has a long‑standing dream of exploring the coastal charms
    of Lisbon, Portugal, while ensuring travel plans accommodate flexible scheduling for community commitments.
  culinary: Zeyla Rodriguez’s cooking blends traditional stews such as pepian and handcrafted tamales with fresh garden herbs like cilantro and oregano, experimenting with turmeric and roasted pumpkin seeds
    for depth, while they relish tasting new flavors at the local farmers market before sharing meals with family and friends.
  core: Zeyla Rodriguez is a methodical, community‑driven mentor whose love for classic recipes, organized routines, and lively social circles is occasionally interrupted by bouts of anxiety that drive
    them to over‑plan every detail.
background:
  cultural: 'Zeyla was born to Guatemalan parents who settled in the United States in the 1970s. Growing up, she absorbed the rich traditions of her heritage: Catholic celebrations, the vibrant Día de los
    Muertos customs, and a deep respect for family reciprocity. Though her formal education ended before high school, her household emphasized bilingual fluency and the preservation of native recipes passed
    down through generations. Living in Georgetown, DE, she stays connected to a close‑knit Guatemalan community that gathers for quinceañeras, church events, and food fairs, where she contributes her cooking
    skills and cultural stories. This blend of Guatemalan values and Mid‑Atlantic life shapes Zeyla’s identity, fostering a strong sense of belonging, generosity, and an enduring curiosity about how traditions
    adapt in new surroundings.'
