  career_goals: Eager to combine his love for art and technology, Thomas hopes to eventually design and program his own video games, perhaps as a game developer or interactive storyteller. He envisions
    studying graphic design or computer science in high school and beyond, with a long‑term ambition of creating immersive digital experiences that challenge players' thinking. Occasionally, he imagines
    a career in engineering or robotics, where his problem‑solving skills could be applied to building functional prototypes.
