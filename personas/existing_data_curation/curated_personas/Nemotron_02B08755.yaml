personas:
  professional: Thomas Latif, an 11‑year‑old aspiring indie game developer, merges his love for sketching wildlife with strategic gameplay from Minecraft and Civilization V to prototype imaginative level
    designs, and they often let projects evolve organically because a relaxed attitude toward deadlines outweighs strict planning.
  sports: Thomas Latif, a member of the community youth hiking club and an avid fan of the Colorado Avalanche, spends weekends trekking the Pikes Peak trail and training at the local climbing gym, where
    their competitive streak pushes them to beat personal best times on the junior trail‑run leaderboard.
  arts: Thomas Latif, inspired by digital artists Ross Tran and Loish, graphic novelists Jeff Lemire and Marjorie Liu, and musicians John Mayer and Taylor Swift, sketches animals at the Colorado Springs
    Fine Arts Center, creates digital paintings of Rocky Mountain vistas, and strums guitar covers on the porch while they blend visual and musical influences into short stories.
  travel: Thomas Latif, who saves a portion of their allowance for travel, has taken family road trips to the Grand Canyon and Yosemite, enjoyed a winter ski weekend in Park City, and now dreams of exploring
    the rugged trails of Patagonia and the historic streets of Edinburgh, preferring self‑planned itineraries that balance adventure photography with downtime.
  culinary: Thomas Latif, a budding home chef, enjoys baking spiced gingerbread cookies during holiday traditions, whipping up quick ramen bowls with fresh bok choy and soft‑boiled eggs, and experimenting
    with bite‑size sushi rolls shaped like LEGO bricks, though they often leave the kitchen a mess by forgetting to put away utensils after cooking.
  core: Thomas Latif, an 11‑year‑old creative explorer, blends mountain solitude, sketching, and strategic gaming into imaginative worlds while occasionally losing track of chores, finances, and health
    reminders.
background:
  cultural: Thomas was born and raised in Colorado Springs, a city marked by its proximity to the Rocky Mountains and a sizable military presence. He comes from a middle‑class, white American family with
    roots traced back to German and Scandinavian immigrants, which influences family traditions like holiday baking and outdoor recreation. The region's outdoor culture—hiking, skiing, and camping—has shaped
    his appreciation for nature, while the local arts scene, including the Colorado Springs Fine Arts Center and regular community art fairs, nurtures his artistic curiosity. Growing up in a community that
    values independence and self‑reliance, Thomas often balances solitary pursuits with occasional small‑group activities among friends and classmates.
