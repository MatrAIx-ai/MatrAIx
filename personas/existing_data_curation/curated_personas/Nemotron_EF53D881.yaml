  career_goals: Although retired, Raquel is driven to preserve her family’s oral histories and to create a bilingual STEM mentorship program for Puerto Rican youth in Rockland County. She aims to launch
    a community workshop where seniors teach basic coding, digital storytelling, and electronics repair, fostering intergenerational learning. In parallel, she plans to complete a memoir chronicling her
    experience as one of the early women engineers and to travel back to Puerto Rico to reconnect with her hometown and its cultural traditions.
