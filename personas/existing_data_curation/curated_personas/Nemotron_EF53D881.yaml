personas:
  professional: Raquel Castillo, a retired electrical engineer who spent three decades designing telecommunications systems for a leading research lab and later taught introductory engineering at a community
    college, now channels her boundless curiosity and pragmatic problem‑solving into building a bilingual STEM mentorship program for local youth while juggling project details with a relaxed, occasionally
    disorganized style that still yields inventive outcomes.
  sports: Raquel Castillo stays fit by salsa dancing at the senior center and taking regular walks along the Hudson River, while cheering on the New York Yankees in baseball season and the New York Knicks
    during basketball, and occasionally joins the Hudson Valley Walking Club’s senior‑friendly group outings.
  arts: Raquel Castillo nurtures her creative side through photographing local festivals and river scenery in the style of Steve McCurry, devouring historical fiction by Ken Follett and Hilary Mantel, and
    listening to the storytelling lyrics of Bob Dylan, all of which enrich her weekends at the community library’s cultural programs.
  travel: Raquel Castillo prefers leisurely travel, enjoying day trips to Sleepy Hollow and the vineyards of the Hudson Valley, while dreaming of a pilgrimage to the Caribbean island where they spent their
    youth, planning the journey around family gatherings and modest savings.
  culinary: Raquel Castillo showcases their seasoned cooking skills by preparing traditional arroz con gandules, hand‑rolled pasteles, and herb‑infused sofrito using fresh cilantro, oregano, and bell peppers,
    while experimenting with new spice blends in their garden‑to‑table dishes.
  core: Raquel Castillo blends engineering precision with salsa rhythm, juggling community mentorship projects, occasional financial impulsivity, and a garden of tropical herbs, all while forgetting where
    they parked their car but never missing a family dinner.
background:
  cultural: Raquel was born in San Juan, Puerto Rico in 1945 and moved to New York in the early 1960s to pursue higher education. She grew up in a close‑knit Catholic family that celebrated traditional
    festivities like La Fiesta de San Juan, and she retained strong ties to the island’s music, dance, and cuisine. Over the decades she has blended her Puerto Rican heritage with the suburban culture of
    West Nyack, participating in local cultural events while preserving Spanish language through community programs. Her bilingual fluency, deep respect for family and community, and pride in her Caribbean
    roots remain central to her identity.
