personas:
  professional: Carmen Miller, a four‑year‑old mini‑project manager who runs a meticulously organized pretend lemonade stand, schedules play‑dates on a hand‑drawn calendar, and insists every cup is measured
    to the exact ounce, turning sandbox construction into a disciplined, high‑standard endeavor.
  sports: Carmen Miller, a budding soccer enthusiast who attends a local children’s soccer club on Saturdays and watches the Premier League’s Manchester United matches with a mini‑turf blanket, also enjoys
    swim lessons in the summer, and approaches each drill with a competitive streak, often trying to out‑run teammates while preferring small practice groups over large tournaments.
  arts: Carmen Miller, a curious little art lover, spends afternoons drawing with Crayola crayons while humming the lullabies of Raffi, flips through picture books illustrated by Eric Carle, and is fascinated
    by the vibrant costumes of Disney’s ‘Frozen’ characters, often insisting on recreating the colors in their own wall art.
  travel: Carmen Miller, an imaginative four‑year‑old traveler, delights in family road trips to the aquarium in San Diego, the interactive Children’s Museum in Boston, and eagerly dreams of future visits
    to Disneyland Paris, always packing a tiny suitcase with their favorite stuffed rabbit and a map of the park drawn in crayon.
  culinary: Carmen Miller, a selective eater who insists on buttery macaroni‑and‑cheese with a sprinkle of cheddar, devours crunchy chicken nuggets seasoned with a dash of paprika, enjoys sliced strawberries
    and banana slices, and pretends to stir pancake batter with a wooden spoon, yet often refuses broccoli, claiming the tiny trees look like monsters.
  core: Carmen Miller, a meticulously organized four‑year‑old whose curiosity fuels high‑standard play while their competitive edge and lingering worries turn every sandbox adventure into a carefully measured,
    sometimes anxious, quest.
background:
  cultural: Carmen grows up in Saint Paris, a small town in Champaign County, Ohio, within a white, Midwestern family that values community, church involvement, and a structured routine. Family gatherings
    often include potluck meals, county‑fair outings, and church picnics, exposing her to local folk music and traditional celebrations. Her parents emphasize order, punctuality, and academic achievement,
    aligning with her disciplined personality. The local public preschool encourages curiosity through art and nature exploration, providing a supportive environment for her developing interests.
attributes:
  skills: '["counting to twenty","recognizing uppercase letters","coloring within lines","assembling simple jigsaw puzzles","building basic block structures","following multi‑step art projects"]'
  hobbies: '["watercolor painting","drawing animals and landscapes","building LEGO Duplo structures","solving wooden puzzles","listening to classical music","attending library story time"]'
  career_goals: Carmen imagines herself as a museum curator who arranges exhibits with precision, or an artist who creates detailed paintings. She also dreams of becoming a teacher who sets high standards
    for her students. Her competitive nature fuels a desire to win art contests, be praised for flawless organization, and one day lead a classroom or gallery where she can share her love of art and order.
