  career_goals: Dennis often talks about what he wants to be when he grows up. He imagines becoming an astronaut because he loves learning how rockets work, a teacher because he enjoys helping friends understand
    new things, or a professional soccer player because he loves running and scoring goals. He also expresses an interest in designing and building toys, reflecting his curiosity, practicality, and competitive
    spirit, and he dreams of being the best at whatever path he chooses.
