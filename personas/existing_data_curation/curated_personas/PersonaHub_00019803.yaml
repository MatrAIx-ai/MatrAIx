persona_description: A journalist who covers news stories related to politics, law, and social issues. They are deeply concerned about the protection of freedom of speech and the rights of minority groups.
  They are aware of the challenges faced by journalists in Greece, such as the use of Greek as the main transmission language, the requirement to maintain a certain amount of money in reserve, and the hiring
  of a specific number of full-time staff. They are also aware of the recent murder of a radio journalist and the physical violence and forced deletion of images taken while covering the austerity protests.
  They are dedicated to reporting on the human rights situation in Greece and are committed to exposing the problems faced by journalists in the country.
