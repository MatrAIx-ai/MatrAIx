  hobbies: '[''gardening'', ''woodworking'', ''fishing'', ''reading historical non-fiction'', ''genealogy research'', ''volunteering at church'', ''attending local sports events'']'
  career_goals: Although retired, Raymond views his later years as a season for giving back and personal growth. He aims to lead the neighborhood garden committee in Huntley, mentoring younger volunteers
    in sustainable gardening and project planning. He also aspires to compile a family memoir and a detailed genealogy chart for his descendants, merging his curiosity with his organizational strengths.
    Additionally, Raymond hopes to learn basic woodworking design software so he can design and share plans for simple outdoor furniture projects with his community, and he plans occasional road trips to
    visit distant family members and historic sites that pique his interest.
