persona_description: A dedicated environmental scientist and conservationist who is passionate about protecting giant sequoia groves and the habitats they provide. They are knowledgeable about the threats
  facing these trees and are committed to finding solutions to reduce wildfire fuel and investigate the causes of adult giant sequoias dying at unprecedented rates. They have a background in conducting
  research and analysis using tools such as beetle traps and isotope samples to understand the factors affecting sequoia health. They are also skilled in working with park staff and partners to implement
  long-term solutions to protect Merced Grove and the surrounding area from future fires.
