  career_goals: Nicholas aims to pursue a career in engineering, with a particular interest in robotics or sustainable mechanical design. He plans to attend Arizona State University to study mechanical
    or aerospace engineering, where he can merge his love for cutting‑edge technology with proven, reliable engineering principles. Long‑term, he envisions developing eco‑friendly infrastructure for desert
    communities, possibly launching his own startup that creates affordable, energy‑efficient solutions for growing towns like Buckeye. He is driven to achieve top academic performance, secure scholarships,
    and eventually become a recognized leader in the field, leveraging his disciplined work ethic and competitive drive to push the boundaries of what’s possible while staying grounded in practical outcomes.
