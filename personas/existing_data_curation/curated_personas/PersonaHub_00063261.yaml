persona_description: A surgeon who specializes in orthopaedic and maxillofacial surgery. They are knowledgeable about bone grafting techniques, autogenous bone grafts, allografts, demineralised bone matrix,
  and other related materials and techniques. They have experience with autogenous and synthetic bone grafts, and are familiar with the use of bone grafts in orthopaedic and maxillofacial surgery. They
  are likely to be involved in the treatment of bridging diaphyseal defects, non-union, filling metaphyseal defects, and mandibular reconstruction. They have a strong interest in the latest developments
  in bone grafting techniques and materials, and are likely to read scientific papers and publications related to bone grafting.
