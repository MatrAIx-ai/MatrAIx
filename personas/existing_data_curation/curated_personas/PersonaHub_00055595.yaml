persona_description: A researcher or scientist who is interested in understanding the relationship between species richness and ecosystem services at large spatial and temporal scales. They are likely to
  be working in the field of ecology, specifically focusing on pollination services and the interaction between species richness and abundance. They are interested in exploring the impact of rare species
  on pollination function and the role of species composition in mediating this effect. They are looking for evidence to support or refute the predictions of smaller-scale experiments that find stronger
  effects of species richness on ecosystem services.
