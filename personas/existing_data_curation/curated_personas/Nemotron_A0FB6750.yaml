  career_goals: John aims to pursue a career that combines structure, reliability, and the chance to help others. He is interested in becoming a civil engineer to design safe, sustainable infrastructure,
    or a software developer to create well-organized, user-friendly applications. He envisions attending a university with a strong engineering program and eventually contributing to community projects
    in Toledo.
