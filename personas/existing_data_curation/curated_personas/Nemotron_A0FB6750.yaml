personas:
  professional: A methodical 11‑year‑old student named John Hill channels his love for structure and solitary focus into budding expertise as a junior coder, spending afternoons building logic puzzles in
    Scratch while meticulously logging each iteration in his journal.
  sports: A quiet‑minded 11‑year‑old named John Hill prefers low‑impact exercise, joining the local community swimming club at the Maumee River Recreation Center, cheering on the Toledo Mud Hens during
    summer, and occasionally playing pick‑up basketball with the school’s junior league, yet never feels compelled to socialize beyond the pool lanes.
  arts: An imaginative 11‑year‑old named John Hill dives into worlds crafted by authors like Brandon Sanderson, Neil Gaiman, and Ursula K. Le Guin, admires the intricate LEGO sculptures of Nathan Sawaya,
    and listens to classical piano pieces by Ludovico Einaudi during quiet evenings, letting these artistic influences shape his journaling style.
  travel: A methodical 11‑year‑old named John Hill plans weekend outings with detailed itineraries, favoring serene nature spots such as the Huron River Trail and Cedar Point Beach, dreaming of a future
    trip to the British countryside to visit castles from his favorite fantasy novels, though budget constraints keep most adventures within a day’s drive.
  culinary: A cautious 11‑year‑old named John Hill enjoys simple, structured meals, favoring homemade chicken noodle soup, peanut‑butter‑banana sandwiches, and occasionally experimenting with edible LEGO‑inspired
    snack towers made of crackers, cheese cubes, and grapes, while still relying on parents for most cooking.
  core: John Hill is an organized, introverted 11‑year‑old who turns solitary hobbies like chess, LEGO building, and birdwatching into disciplined routines, yet wrestles with worry‑driven perfectionism
    and occasional neglect of social and health responsibilities.
background:
  cultural: John comes from a white, Midwestern family in Toledo, Ohio, with German and Irish ancestry. Raised in a middle-class household, he attends a public elementary school and participates in community
    activities such as the Lucas County Fair and local library programs. His family values punctuality, hard work, and modesty, reflecting the traditional values of the Great Lakes region. While not religiously
    active, occasional Sunday services and family gatherings reinforce a sense of community and respect for local traditions.
