personas:
  professional: Brian Boivin, a 15‑year‑old high‑school junior who captains the varsity soccer squad and spends evenings coding Python scripts and assembling LEGO Technic models, blends methodical planning
    with contagious enthusiasm, making them a natural leader in group projects while quietly battling performance‑related nerves.
  sports: Brian Boivin shines as a forward on the high‑school varsity soccer team, follows professional matches of the local club City United FC, trains with the school’s after‑school conditioning club,
    and mixes cardio runs with weekly pick‑up basketball games at the community rec center to maintain stamina.
  arts: Brian Boivin devotes weekends to photographing sunrise over the nearby river with a DSLR, curls up reading Isaac Asimov and Andy Weir novels, and gets inspired by the visual storytelling of director
    Christopher Nolan and the synth‑heavy scores of Daft Punk, which they often mimic while building custom LEGO dioramas.
  travel: Brian Boivin dreams of a road trip to the Kennedy Space Center in Florida, has already explored the historic Old Town district of their hometown on school field trips, and prefers low‑budget,
    adventure‑filled travel that includes camping under the stars and visiting local science museums.
  culinary: Brian Boivin is a novice cook who can reliably whip up a pepperoni pizza using pre‑made dough and mozzarella, but eagerly experiments with homemade sushi rolls featuring avocado, crab meat,
    and pickled ginger, while also savoring pineapple‑topped Hawaiian pizza from the neighborhood pizzeria.
  core: Brian Boivin is an energetic, methodical teen who channels curiosity into building and coding, loves team sports and games, yet wrestles with anxiety that fuels both meticulous planning and occasional
    overthinking.
background:
  cultural: Brian grew up in Brighton, a small, close‑knit town in rural Madison County, Illinois. His family traces its roots to European immigrants, primarily German and Irish, reflecting the typical
    heritage of the region. The Midwestern cultural milieu emphasizes hard work, modesty, community involvement, and a pragmatic outlook, all of which shape his balanced curiosity and reliable nature. Local
    traditions such as county fairs, 4th of July celebrations, and church gatherings have reinforced a sense of neighborliness and cooperation. Growing up, he participated in school events, youth sports
    leagues, and volunteer programs at the community center, experiences that instilled a strong appreciation for harmony, teamwork, and service to others.
