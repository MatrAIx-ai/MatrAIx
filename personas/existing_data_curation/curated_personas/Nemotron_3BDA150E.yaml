  career_goals: Brian aspires to study engineering at a university, aiming to become a civil engineer who designs safe, sustainable community infrastructure. He is drawn to the blend of creativity and practicality
    inherent in engineering, seeing it as a way to turn his curiosity into tangible solutions. He also hopes to incorporate his compassionate side by advocating for mental‑health awareness within schools
    and local communities, perhaps through mentorship programs. To achieve these goals, he plans to excel academically, pursue advanced coursework in math and science, seek internships or summer programs
    related to engineering, and continue developing leadership and communication skills.
