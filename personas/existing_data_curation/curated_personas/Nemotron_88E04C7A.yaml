  hobbies: '[''building block construction (Duplo)'', ''coloring and drawing'', ''listening to bilingual storybooks'', ''singing and dancing to Latin music'', ''pretend play (teacher, doctor, chef)'', ''helping
    in the kitchen (stirring, mixing)'', ''memory matching and pattern puzzles'']'
  career_goals: Though still very young, Vilma often talks about wanting to help others and to become a teacher or a caregiver when she grows up. She is drawn to roles that offer clear structure and immediate
    impact, such as assisting younger children in a classroom or helping at her family’s kitchen. Short‑term ambitions include mastering reading, learning to tie her shoes, and winning puzzles or games,
    reflecting her competitive streak and practical focus on achievable, tangible milestones.
