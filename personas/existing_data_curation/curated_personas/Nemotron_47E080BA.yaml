  hobbies: '[''Home gardening'', ''Traditional Mexican cooking'', ''Desert hiking'', ''Nature photography'', ''Reading agricultural and sustainability literature'', ''Volunteering at community gardens'',
    ''Attending cultural festivals'']'
  career_goals: Gloria aims to advance from a miscellaneous agricultural worker to a farm manager within the next three years, leveraging her organizational strengths and critical eye for efficiency. She
    plans to enroll in a community‑college certification program in agronomy or sustainable agriculture to deepen her technical knowledge. Long‑term, she hopes to launch a small boutique organic produce
    operation that showcases water‑conserving practices suited to the Southwest, positioning herself as a leader in desert‑friendly farming while earning recognition for her competitive drive and pragmatic
    innovations.
