  hobbies: '["painting", "knitting", "herb gardening", "folk music gatherings", "historical fiction reading", "genealogy research", "senior dance socials", "library volunteering", "trail walking", "recipe
    experimentation"]'
  career_goals: Although retired, Angela aims to become a catalyst for community enrichment. She plans to launch an intergenerational art circle at the Middlesboro community center, teaching painting and
    quilting while fostering connections between seniors and youth. She aspires to train volunteers in supportive listening techniques to improve local hospice and senior services. Angela also hopes to
    document oral histories of Bell County, preserving Appalachian stories for future generations, and to author a memoir that weaves her personal journey with the cultural heritage of the region.
