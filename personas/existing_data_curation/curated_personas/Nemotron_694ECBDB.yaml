personas:
  professional: Se Park, a 25‑year‑old finance professional, blends rigorous financial analysis using Excel, SQL, and data‑visualisation with a humanities‑driven knack for storytelling, delivering clear
    stakeholder presentations for cultural nonprofits while leading cross‑functional projects with methodical precision and compassionate mentorship.
  sports: Se Park energises their week with dance‑cardio classes at Philadelphia Powerhouse Yoga, weekly yoga sessions, and occasional runs with the Philadelphia Runners club, while cheering on the Philadelphia
    Eagles and 76ers, embodying a sociable and health‑conscious athletic routine.
  arts: Se Park immerses themselves in Philadelphia’s art scene, frequenting the Barnes Foundation, the Philadelphia Museum of Art, and gallery openings showcasing contemporary Asian‑American artists such
    as Il Lee, while sketching watercolor studies of installations and listening to music by Ólafur Arnalds and Sufjan Stevens to fuel creative inspiration.
  travel: Se Park plans trips with detailed itineraries, favouring cultural immersion like a week in Seoul for Lunar New Year festivities, a weekend wandering the historic streets of Berlin’s Museum Island,
    and a spring pilgrimage to Kyoto’s cherry‑blossom temples, balancing adventure with a modest travel budget.
  culinary: Se Park cooks Korean staples such as bibimbap, kimchi jjigae, and bulgogi with confidence, experiments with fusion dishes like gochujang‑marinated tacos, and relishes fresh ingredients like
    gochujang, sesame oil, and napa cabbage, while also exploring Ethiopian injera at local food festivals.
  core: Se Park is a detail‑oriented finance whiz who channels curiosity and compassion into art‑focused stewardship, balances disciplined budgeting with spontaneous cultural splurges, and keeps life vibrant
    through yoga, music, and world‑spanning cuisine.
background:
  cultural: Se Park is a second‑generation Korean American raised in a multicultural neighborhood of Philadelphia. She grew up celebrating Korean holidays such as Chuseok and Lunar New Year while also participating
    in American traditions, giving her a bicultural identity that values family cohesion, respect for elders, and communal harmony. Fluent in Korean and English, she maintains active ties with the local
    Korean community center, engages in Korean cultural events, and incorporates Korean aesthetic sensibilities into her appreciation of art. This blend of East Asian heritage and the vibrant Philadelphia
    arts scene informs her collaborative work style, compassionate leadership, and her interest in bridging cultural narratives through finance and creativity.
