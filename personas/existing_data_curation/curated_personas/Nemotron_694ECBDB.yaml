    Chuseok)'']'
  career_goals: In the next three years Se plans to obtain CPA certification and enroll in a part‑time MBA program to deepen her strategic management expertise. Her medium‑term goal is to advance to senior
    finance manager or director of finance within a cultural nonprofit, museum, or arts‑focused organization where she can integrate her passion for art with financial stewardship. Long‑term, she aspires
    to become chief financial officer of a major arts institution, lead innovative funding models for cultural projects, and mentor emerging women professionals in finance, championing diversity and inclusive
    leadership.
