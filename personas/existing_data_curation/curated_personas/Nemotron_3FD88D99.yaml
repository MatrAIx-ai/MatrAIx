  career_goals: She aspires to advance from hands‑on maintenance work to a supervisory role in facilities management, aiming to lead a team of technicians and oversee the maintenance of larger, more complex
    infrastructure in a cultural institution such as a museum or gallery where she can merge her technical expertise with her love of art. She plans to earn certifications like OSHA safety, HVAC specialization,
    and a journeyman’s certificate within the next few years, and eventually pursue a technician‑manager position that offers greater responsibility, higher wage, and the opportunity to influence sustainability
    practices in building operations.
