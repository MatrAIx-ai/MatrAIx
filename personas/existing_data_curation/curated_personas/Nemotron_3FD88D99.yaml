personas:
  professional: An experienced industrial maintenance technician named Susan Stormant leverages their hands-on expertise with hydraulic and pneumatic systems to keep Washington, DC's facilities humming,
    while their natural curiosity and love of design drive them to propose innovative, sustainability-focused upgrades for museum spaces they hope to manage.
  sports: A community-oriented athlete named Susan Stormant plays forward for the DC United Intramural Soccer League, joins the local Rock Creek Trail Running Club for weekend hikes, and cheers for the
    Washington Capitals, balancing their love for group exercise with a laid-back approach to fitness that favors social interaction over solitary gym routines.
  arts: An enthusiastic watercolorist named Susan Stormant attends openings at the Hirshhorn Museum, sketches live at the Capitol Riverfront's community art workshops, and draws inspiration from Georgia
    O'Keeffe's bold forms and Kehinde Wiley's contemporary portraiture, while they also binge-listen to the ambient scores of Brian Eno and the indie rock of Tame Impala during late-night painting sessions.
  travel: A curious explorer named Susan Stormant prefers short, spontaneous trips that blend culture and nature, such as a weekend hike in Shenandoah followed by a museum crawl in Philadelphia, and a dream
    itinerary that includes strolling the galleries of Paris's Musee d'Orsay and sampling street food in Lisbon, all while budgeting carefully to fund their upcoming certifications.
  culinary: A moderately skilled home cook named Susan Stormant enjoys crafting Mediterranean-inspired quinoa bowls with fresh basil, lemon zest, and smoked salmon, perfecting avocado toast for brunch,
    and experimenting with seasonal dishes like roasted root vegetables during fall evenings, yet they often resort to quick microwave meals when a maintenance emergency calls them back to work.
  core: Susan Stormant mixes industrial precision with artistic curiosity, tackling machinery by day and watercolors by night, all while navigating anxiety with meditation, budgeting for both tools and
    tickets, and staying socially energized through soccer and museum visits.
background:
  cultural: Susan was raised in a middle‑class white family in the United States and grew up with modest educational expectations, which led her to enter the workforce early. Living in Washington, DC, she
    has been shaped by the city’s blend of historic institutions, diverse communities, and a strong public‑arts presence. Her background values hard work, reliability, and community service, while her exposure
    to the capital’s cultural offerings fuels her appreciation for the arts and open‑minded outlook. She identifies with mainstream American cultural norms but also embraces the progressive, multicultural
    atmosphere of the District.
