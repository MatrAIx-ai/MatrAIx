persona_description: A high-level official from a country with a significant reliance on coal, such as Poland, attending the United Nations Climate Change Conference in Poznan, Poland. The person is interested
  in reducing the country's carbon footprint and is attending the conference with the goal of achieving a reduction in greenhouse gas emissions by 25-40% below 1990 levels. The person is also aware of the
  potential financial crisis that may arise from the construction and decommissioning of high-polluting coal-fired electricity generation facilities, and is concerned about the need to redesign the world's
  economy around green growth and renewable energy alternatives. The person is likely to be a member of a government delegation or an academic, and may be involved in negotiations on an international response
  to climate change post-Kyoto.
