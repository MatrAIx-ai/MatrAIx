  career_goals: Jason aims to open a small, art‑inspired bistro—“Sparks’ Canvas Kitchen”—that showcases innovative dishes rooted in Oklahoma tradition while incorporating international flavors. He also
    aspires to become a regional director of operations for a mid‑size hospitality chain, enabling him to mentor emerging talent across multiple locations. In the longer term, Jason hopes to launch a community
    culinary apprenticeship program that provides hands‑on training for local youth, and to achieve certification as a Certified Food Safety Manager while implementing sustainable, farm‑to‑table sourcing
    practices in his future ventures.
