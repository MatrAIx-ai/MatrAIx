  hobbies: '[''Painting'', ''Pottery'', ''Basket Weaving'', ''Gardening'', ''Reading Historical Fiction'', ''Genealogy Research'', ''Documentary Watching'', ''Cooking Traditional Recipes'', ''Volunteer
    Community Service'', ''Attending Cultural Festivals'']'
  career_goals: She aims to leverage her managerial expertise to enhance the operations of the community center in Lockport, creating sustainable programs that celebrate American Indian art and traditions.
    Her ambition is to mentor younger staff members, establish an intergenerational apprenticeship program for traditional crafts, and secure grant funding to expand cultural education initiatives. Additionally,
    she hopes to be recognized as a leader who bridges modern business practices with indigenous cultural values, ultimately contributing to the economic and cultural vitality of Lafourche Parish.
