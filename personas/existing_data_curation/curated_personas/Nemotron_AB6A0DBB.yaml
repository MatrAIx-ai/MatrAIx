personas:
  professional: Mariadelourdes Chang, a seasoned community center director, leverages their strategic planning, budget oversight, staff training, and conflict mediation expertise to design meticulously
    organized cultural programs while nurturing intergenerational collaboration and honoring regional heritage.
  sports: Mariadelourdes Chang, an active community member, stays fit through a weekly walking club at the local park, occasional low‑impact yoga classes, and by cheering on the New Orleans Pelicans and
    LSU Tigers football teams, while also competing in a senior bowling league at the community center.
  arts: Mariadelourdes Chang, an avid arts enthusiast, immerses themselves in the arts by attending gallery openings featuring works by Georgia O'Keeffe and contemporary folk artist Emily Harsdorf, participating
    in pottery workshops led by local ceramicist Jane Morin, and weaving baskets inspired by traditional designs, all of which reinforce their appreciation for both classic and modern creative expression.
  travel: Mariadelourdes Chang, a methodical traveler, prefers organized, culturally immersive trips, such as a guided historical tour of New Orleans' French Quarter, a genealogical research expedition
    to the Boston Public Library, and a weekend retreat at Asheville's Folk Art Museum, traveling primarily by car to stay within their modest budget.
  culinary: Mariadelourdes Chang, a dedicated home cook, delights in preparing regional traditional dishes like gumbo, shrimp étouffée, and cornbread, frequently incorporating garden‑grown okra, thyme,
    and sweet potatoes, and they take pride in perfecting a dark, velvety roux that they share with family during festive gatherings.
  core: Mariadelourdes Chang blends meticulous organization with boundless curiosity, turning garden plots, genealogy charts, and community workshops into living archives of heritage, though they occasionally
    hoard spare craft supplies like a reluctant collector.
background:
  cultural: Born into an American Indian family with deep roots in the Gulf Coast region, Mariadelourdes grew up immersed in tribal traditions, oral storytelling, and reverence for the natural environment.
    The cultural values of community solidarity, respect for elders, and stewardship of the land have shaped her worldview. Though she did not complete a formal high school diploma, she pursued informal
    learning through tribal mentorship, participation in ceremonies, and involvement in local cultural preservation efforts. Her heritage informs both her personal identity and professional approach, as
    she strives to honor and integrate indigenous perspectives within her managerial role.
attributes:
