  hobbies: '[''Sketching and watercolor painting'', ''Digital illustration with Procreate'', ''Reading speculative fiction'', ''Writing short stories'', ''Visiting art museums and community workshops'',
    ''Hiking Portland area trails'', ''Practicing mindfulness meditation'', ''Tutoring peers in math and writing'', ''Attending small indie music gigs'', ''Participating in school peer‑mediation program'']'
  career_goals: Susan aspires to combine her love for art and her desire to help others by pursuing a future career in art therapy or community arts education. She envisions studying psychology and fine
    arts in college, eventually working in schools or community centers to use creative expression as a tool for emotional healing and social harmony. In the shorter term, she aims to deepen her peer‑mediation
    training, earn a youth leadership certificate, and build a portfolio of artwork that could be showcased in local galleries.
