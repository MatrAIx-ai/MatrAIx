personas:
  professional: Susan Thompson, a budding teen illustrator who creates watercolor and digital artwork for school newsletters and community murals, leverages their curiosity and cooperative nature to blend
    eco‑friendly themes with meticulous yet flexible planning in every project.
  sports: Susan Thompson, an avid bike‑commuter who joins the middle‑school soccer team in fall and hikes the Forest Park trails each weekend, follows the Portland Timbers with fervor and prefers low‑impact
    cardio over high‑intensity workouts, balancing sport with a love for nature.
  arts: Susan Thompson, a sketch‑and‑watercolor enthusiast who frequently visits the Portland Art Museum, draws inspiration from artists like Olafur Eliasson and animators such as Hayao Miyazaki, and curates
    indie playlists featuring Sufjan Stevens and The National during creative sessions, letting the arts shape both their identity and leisure.
  travel: Susan Thompson, who loves planning eco‑friendly weekend getaways to the Columbia River Gorge and occasional trips to Seattle’s vibrant music scene, dreams of attending a summer anime convention
    in Tokyo, and always maps routes by bike or public transit to minimize carbon footprint.
  culinary: Susan Thompson, a moderately skilled home cook, frequently whips up avocado toast with roasted cherry tomatoes, savors sushi rolls from the local Japanese market, and perfects a matcha latte
    at the corner coffee shop, while their favorite ingredients remain fresh herbs, seasonal mushrooms, and locally sourced honey.
  core: Susan Thompson, a 14‑year‑old art‑obsessed introvert with a penchant for mindfulness, eco‑conscious creativity, and occasional over‑worrying, navigates teenage life by turning curiosity into colorful
    expression and community connection.
background:
  cultural: Susan comes from a white, middle‑class family rooted in the Pacific Northwest. Growing up in Portland, Washington County, she is influenced by the region's strong emphasis on environmental stewardship,
    progressive social values, and a vibrant independent arts scene. Her family encourages curiosity, education, and community involvement, reflecting the city’s culture of bike‑friendly living, coffeehouse
    gatherings, and support for local artists. These regional influences shape her appreciation for nature, her collaborative spirit, and her desire to use creativity to foster connection and wellbeing.
attributes:
  skills: '[''Sketching and watercolor painting'', ''Digital illustration (Procreate)'', ''Peer mediation and conflict resolution'', ''Project organization and note‑taking'', ''Creative writing'', ''Basic
