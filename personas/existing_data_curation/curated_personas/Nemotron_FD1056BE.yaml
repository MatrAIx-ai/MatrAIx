  hobbies: '[''Social dancing (hip‑hop & Latin)'',''Pick‑up basketball games'',''Church choir singing'',''Cooking Southern comfort dishes'',''Community clean‑up volunteering'',''Backyard gardening'',''Listening
    to R&B and gospel music'',''Journaling and mindfulness'']'
  career_goals: Vanessa aims to move from her current janitorial role into a supervisory position within the next two years, seeking certification as a Certified Professional Cleaner (CPC) and completing
    an OSHA 10‑hour safety course. She hopes to become a lead janitor responsible for scheduling crews, managing budgets, and overseeing quality control across multiple facilities. In the longer term, she
    envisions transitioning to a facilities‑management role or launching her own small cleaning business that can provide stable employment for her family and give back to her community. Achieving these
    goals will allow her to combine her practical expertise with her desire for structure, leadership, and financial security.
