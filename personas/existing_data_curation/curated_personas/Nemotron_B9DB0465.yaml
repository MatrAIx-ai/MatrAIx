  hobbies: '[''drawing and painting'', ''collecting natural items from hikes'', ''making nature collages'', ''listening to Mexican music'', ''dancing to folkloric rhythms'', ''reading picture books'', ''playing
    educational tablet games'', ''building with LEGO'', ''playing the recorder'']'
  career_goals: Lilia imagines growing up as a mural artist who blends the bright colors and patterns of Mexican folk art with the green scenery of the Pacific Northwest. She hopes to one day teach art
    workshops for other kids in community centers, sharing storytelling, crafts, and music. She also dreams of learning about forests and wildlife, wondering if she might combine art with environmental
    stewardship to protect the natural places she loves.
