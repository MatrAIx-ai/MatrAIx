personas:
  professional: A budding junior naturalist and storyteller, Lilia Dejesusflores channels their boundless curiosity into detailed drawings of flora and fauna, crafts whimsical nature collages from pinecones
    and leaves, and seamlessly weaves these artistic pursuits with spontaneous LEGO constructions and recorder melodies, all while maintaining a relaxed stance toward chores and schedules.
  sports: Lilia Dejesusflores plays forward for their neighborhood under-8 soccer team, cheers on the local junior basketball league, and loves exploring the hill trails during weekend hikes, though they
    often prefer informal nature games with pinecone tosses over rigid practice drills.
  arts: Lilia Dejesusflores draws inspiration from the vivid illustrations of Dr. Seuss, the pastel landscapes of Monet, and the lively rhythm of traditional folk lullabies, channeling these influences
    into flower and animal sketches, nature collages, LEGO creations, and cheerful recorder tunes.
  travel: Lilia Dejesusflores treasures family trips to the nearby waterfall state park and the interactive children's museum downtown, dreams of exploring the towering canyons of the national park next
    summer, yet their adventures are guided by school calendars and the modest savings in their travel piggy bank.
  culinary: Lilia Dejesusflores relishes crunchy carrot sticks with hummus, cheesy grilled cheese sandwiches, and strawberry-banana smoothies, often helping wash veggies and sprinkle cheese in the kitchen,
    while occasionally refusing to try unfamiliar vegetables like broccoli despite their parents' encouragement.
  core: Lilia Dejesusflores is a bright, curious seven-year-old who blends artistic flair with a love for nature, yet wrestles with occasional worries and a tendency toward delightful disorganization.
background:
  cultural: Lilia comes from a Mexican family that originally hails from the state of Jalisco. At home, she hears both Spanish and English, celebrates Dia de los Muertos with altars and papel picado, and
    enjoys homemade tacos and tamales. Living in Eagle Point, Oregon, she also embraces the local outdoor culture, joining school nature walks and exploring the surrounding forests. Her bicultural upbringing
    weaves Mexican traditions—colorful art, music, and storytelling—into the fabric of her daily life in the Pacific Northwest, shaping her love for creativity and the natural world.
attributes:
  skills: '[''basic reading'', ''basic arithmetic'', ''drawing and coloring'', ''creative storytelling'', ''simple recorder playing'', ''tablet navigation for educational games'', ''collaborative play'',
