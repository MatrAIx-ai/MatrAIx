personas:
  professional: Daisy Prado, a budding robotics enthusiast who spends her afternoons troubleshooting Arduino projects at the after-school club, blends her curiosity for new ideas with a practical, organized
    approach, preferring to design simple, reliable solutions while quietly collaborating with a small group of peers.
  sports: Daisy Prado enjoys weekend hikes in the high desert, follows the New Mexico State Aggies basketball team, and participates in a local co-ed soccer league, preferring low-intensity fitness that
    lets her appreciate the landscape while staying socially engaged with a small circle of teammates.
  arts: Daisy Prado, an avid sketcher and digital illustrator, draws inspiration from the dramatic New Mexico sunsets and the work of Georgia O'Keeffe and Frida Kahlo, often integrating traditional patterns
    from family celebrations like Dia de los Muertos into her art, which she shares on a personal online gallery.
  travel: Daisy Prado, whose travel style blends careful planning with a love of spontaneous adventure, has explored Santa Fe's historic plaza, camped under the stars at Carlsbad Caverns, dreams of stargazing
    in Chile's Atacama Desert, and prefers low-cost trips that include family visits to nearby Pueblo communities.
  culinary: Daisy Prado, a junior kitchen apprentice with her grandmother, reheats classic paella and flan while experimenting with quinoa-based twists and fresh garden herbs, favors dishes like gazpacho
    with cilantro, and enjoys crafting empanadas stuffed with roasted pumpkin, reflecting her blend of tradition and health-conscious curiosity.
  core: Daisy Prado is a quiet, curiosity-driven teen who balances solitary sketching and astronomy with small-group robotics projects, family cooking rituals, and a thoughtful approach to money and health.
background:
  cultural: Daisy’s cultural background is rooted in her Spanish‑American family, who trace their ancestry to Spain and generations of settlers in New Mexico. At home, Spanish is spoken daily, and she celebrates
    holidays such as Día de los Muertos, Las Posadas, and Spanish National Day, often helping to prepare foods like tamales, churros, and gazpacho. The family’s Catholic traditions blend with the local
    New Mexican customs, giving her a sense of continuity and community. Living in Grants, she is exposed to a multicultural environment that includes Native American Pueblo cultures, migrant farmworkers,
    and a small‑town Western lifestyle, which broadens her perspective and fosters respect for diverse traditions. This rich cultural tapestry informs her interests in bilingual communication, heritage
    cooking, and a desire to preserve the natural landscape of the high desert.
attributes:
