  hobbies: '[''Reading (literature, YA, natural-history)'', ''Sketching and digital illustration of desert scenes'', ''Stargazing and astronomy journaling'', ''Cooking traditional Spanish family recipes'',
    ''Gardening and water-wise planting'', ''Participating in a small robotics club (Arduino projects)'']'
  career_goals: Daisy dreams of combining her love for science, animals, and language in a career that serves her community. In the short term she aims to graduate high school with honors, earn a scholarship
    for a STEM program, and volunteer at the nearby wildlife rehabilitation center to gain hands‑on experience with wildlife care. Long‑term, she envisions becoming a bilingual wildlife biologist or a conservation
    educator, conducting research on New Mexico’s desert ecosystems while teaching science and Spanish to younger students. She also hopes to write a short story collection that celebrates the cultural
    heritage of her Spanish‑American family. Her ambition is grounded in practicality—she plans to pursue a bachelor’s degree in Environmental Science and possibly a teaching credential, ensuring a stable
    path to achieve her passion for both science and cultural advocacy.
