personas:
  professional: Carolyn Cutler, a 31‑year‑old interior designer specializing in functional, sustainable residential spaces, leverages her meticulous space‑planning and color‑theory expertise along with
    an outgoing client‑consultation style to translate lifestyle narratives into harmonious, budget‑friendly interiors while meticulously coordinating contractors and vendors.
  sports: Carolyn Cutler hikes Lookout Mountain with the local Trailblazers Hiking Club each spring, cheers on the Atlanta Falcons in football and the Atlanta Braves in baseball, and dedicates weekend evenings
    to dancing at church socials, viewing fitness as a social, community‑driven activity.
  arts: Carolyn Cutler frequents the annual Chattanooga Art and Craft Fair, collects works by contemporary folk artist Priscilla James, and channels her love for jazz and gospel by listening to Miles Davis,
    Ella Fitzgerald, and local choir director Rev. Jameson, occasionally attending performances at the Tivoli Theatre.
  travel: Carolyn Cutler prefers meticulously planned weekend getaways that blend cultural immersion and relaxation, having explored Savannah’s historic squares, Asheville’s mountain art scene, and dreaming
    of a road trip through the Blue Ridge Parkway, while balancing family commitments and a pending trip to New Orleans for its music festivals.
  culinary: Carolyn Cutler, an avid home cook, perfects shrimp‑and‑grits with stone‑ground grits, smoked paprika, and locally sourced shrimp, frequently prepares fried chicken with a buttermilk brine, collard
    greens simmered with smoked turkey, and sweet‑potato pie spiced with nutmeg, and enjoys sourcing heirloom tomatoes from the farmer’s market to garnish her creations.
  core: Carolyn Cutler couples an unwavering love for routine and community service with a flair for Southern hospitality, often juggling client deadlines, garden projects, and impromptu dinner parties
    while occasionally forgetting to water her patio succulents.
background:
  cultural: Carolyn is an African-American woman raised in Chattanooga’s historic Hill City neighborhood, where her family’s deep roots in church, community service, and Southern hospitality shaped her
    worldview. Her mother, a seamstress, taught her the value of handmade textiles, while her grandmother’s home, filled with heirloom furniture and vibrant kente throws, sparked her love for blending cultural
    patterns with classic Southern décor. A bachelor’s degree in arts and humanities deepened her appreciation for African-American art history, which she often weaves into her design narratives. These
    experiences give her a strong sense of cultural pride and a commitment to creating inclusive, welcoming spaces that honor both her heritage and the local community.
attributes:
  skills: '["Space planning", "Color theory", "Material sourcing", "Sustainable design practices", "Budget management", "Project scheduling", "Building code compliance", "AutoCAD and SketchUp drafting",
    "Client consultation", "Vendor negotiation", "Team leadership", "Presentation and communication", "Documentation and record-keeping", "Detail-oriented organization"]'
  hobbies: '["Hosting dinner parties", "Attending art and craft fairs", "Community volunteering (e.g., Habitat for Humanity)", "Gardening and patio design", "Cooking Southern cuisine", "Listening to jazz
    and gospel music", "Hiking on Lookout Mountain", "Dancing at church socials", "Reading design magazines", "Participating in book clubs"]'
  career_goals: Carolyn aims to become a senior partner at a reputable interior design firm in the Southeast, eventually opening her own boutique studio that specializes in residential and community projects
    that celebrate African-American heritage and Southern charm. She plans to earn her NCIDQ certification, develop expertise in universal design, and mentor emerging designers, while maintaining a balanced
    family life.
