personas:
  professional: Rodney Sasnett, a retired mechanical engineer with deep expertise in thermodynamics and fluid dynamics, applies their methodical project management skills, CAD mastery, and data‑analysis
    prowess to mentor younger STEM enthusiasts, author technical articles, and design a backyard observatory with precision.
  sports: Rodney Sasnett, an avid follower of the Albuquerque Isotopes baseball team and the New Mexico United soccer club, enjoys leisurely sunrise hikes in the Sandia Mountains, participates in a senior
    walking group at the local park, and practices light resistance training at home to maintain mobility, while shunning high‑impact sports that could aggravate their knees.
  arts: Rodney Sasnett, a dedicated watercolorist and landscape photographer, draws inspiration from the works of Ansel Adams, Georgia O'Keeffe, and the desert light of the Southwest, curates a personal
    collection of fine‑art prints, and spends quiet evenings composing reflective essays that weave together scientific concepts and visual art, though they occasionally get frustrated when paint pigments
    dry too quickly.
  travel: Rodney Sasnett, who prefers meticulously planned itineraries, often travels during off‑peak seasons to explore nearby destinations like Carlsbad Caverns, the Great Basin National Park, and the
    dark‑sky preserve at Cherry Springs, balancing a love for sunrise photography with the practical need to manage modest travel budgets and occasional joint discomfort.
  culinary: Rodney Sasnett, a modest home cook with a penchant for Southwestern flavors, delights in preparing green chile stew, roasted prickly pear salad, and freshly baked cornbread, while skillfully
    using fresh herbs like cilantro and oregano in their dishes, and they occasionally experiment with brewing cold‑brew coffee using locally sourced beans.
  core: Rodney Sasnett, a curious and methodical septuagenarian who blends engineering precision with artistic tranquility, spends sunrise hours painting desert vistas, meticulously tracks citizen‑science
    data, and habitually hums vintage radio jingles while neglecting to water their backyard garden.
background:
  cultural: Rodney grew up in a middle‑class family in central Kansas, with German and Irish ancestry, within a Protestant community that emphasized self‑reliance and hard work. His upbringing fostered
    a respect for quiet, open landscapes, a value that resonates with his later move to Albuquerque after retirement. Living in New Mexico has introduced him to the rich cultural tapestry of the Southwest,
    where he appreciates Pueblo art, Spanish‑Mexican culinary traditions, and the region’s reverence for the natural environment. While his primary cultural identity remains rooted in mainstream American
    white heritage, he integrates these Southwestern influences into his artistic work and his respect for local history and community.
attributes:
  skills: '[''Mechanical engineering'', ''Thermodynamics'', ''Fluid dynamics'', ''CAD (SolidWorks, AutoCAD)'', ''Data analysis (Python, MATLAB)'', ''Technical writing'', ''Project management'', ''Watercolor
    painting'', ''Landscape photography'', ''Model building'', ''Citizen science'', ''Programming (Python scripts)'']'
  hobbies: '[''Watercolor painting'', ''Landscape photography'', ''Scale model building'', ''Birdwatching'', ''Astronomy (stargazing, astrophotography)'', ''Reading (science fiction, popular science, philosophy)'',
    ''Walking/hiking in the Sandia Mountains'', ''Citizen science projects (moth monitoring, water quality testing)'', ''Writing reflective essays'']'
  career_goals: Rodney aims to continue expanding his knowledge and creative output throughout his retirement. He plans to complete a personal research project on the microclimate variations in the Albuquerque
    desert, documenting findings in a series of technical articles for a local science outreach newsletter. He also aspires to compile a collection of his watercolor paintings and photographs into a self‑published
    book that celebrates the interplay of natural light and the Southwestern landscape. Additionally, he seeks to mentor younger adults interested in STEM through remote tutoring sessions and serve as a
    volunteer advisor for the local museum's science education programs. Long‑term, he hopes to design and construct a modest backyard observatory, enabling regular stargazing and participation in citizen‑astronomy
    projects.
