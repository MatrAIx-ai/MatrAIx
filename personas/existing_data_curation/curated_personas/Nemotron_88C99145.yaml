  career_goals: Patricia aims to complete her bachelor’s degree in Business Administration while earning a Certified Administrative Professional (CAP) credential to solidify her expertise. She envisions
    moving from a first‑line supervisor role to an office manager position that offers greater autonomy and the ability to spearhead digital workflow initiatives. Long‑term, she hopes to become an operations
    consultant for small‑business offices in the Midwest, leveraging her blend of curiosity and practicality to design efficient, low‑maintenance systems. Improving her organizational habits and adopting
    data‑driven decision‑making are personal milestones she plans to achieve within the next few years.
