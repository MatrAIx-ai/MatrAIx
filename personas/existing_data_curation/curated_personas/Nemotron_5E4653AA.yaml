personas:
  professional: Robert Leventhal, a teenage visual artist and aspiring freelance illustrator, leverages a blend of digital illustration mastery in Procreate, a solid grasp of graphic design fundamentals,
    and basic web development skills to craft concept art for indie games while organizing community mural initiatives, balancing their curiosity‑driven experimentation with a surprisingly reliable work
    ethic amid a non‑traditional schooling path.
  sports: Robert Leventhal, an outdoor‑oriented teen, spends his weekends hiking the winding paths of Forest Park, attends the Portland Rock Club for indoor climbing, passionately follows the Portland Timbers
    and the Portland Trail Blazers, and participates in the local skateboarding crew at Burnside Skatepark, using physical activity as both creative inspiration and a grounding counterbalance to screen
    time.
  arts: Robert Leventhal, an avid illustrator and graphic‑novel enthusiast, devotes evenings to sketching characters influenced by the stark line work of Junji Ito, the narrative complexity of Alan Moore,
    and the vibrant color sensibilities of Studio Ghibli, while listening to indie folk artists like Iron & Wine and frequenting intimate shows at the Doug Fir Lounge to absorb live performance energy.
  travel: Robert Leventhal, a 16‑year‑old explorer, favors short, nature‑focused escapades such as weekend camping in the Columbia River Gorge and sunrise photo sessions at Multnomah Falls, harbors a long‑term
    dream of wandering Tokyo’s Akihabara districts for manga inspiration, and plans a future trip to Valparaíso, Chile, to study its famed street murals.
  culinary: Robert Leventhal, a budding home chef, relishes assembling avocado toast with chili flakes and poached eggs, experimenting with homemade ramen featuring miso broth, pork chashu, and soft‑boiled
    noodles, and perfecting a crunchy granola blend of oats, honey, toasted almonds, and dried cranberries, although they sometimes over‑season dishes in their enthusiasm.
  core: Robert Leventhal, a curious, self‑directed teen who melds sketching, digital art, guitar, and indie culture into a disciplined yet improvisational creative rhythm, often sacrificing sleep to meet
    commission deadlines.
background:
  cultural: Robert comes from a family with Ashkenazi Jewish roots, celebrating holidays such as Hanukkah and Passover while also embracing the secular, progressive culture of the Portland area. Growing
    up in Washington County has exposed him to the Pacific Northwest's love of outdoor recreation, environmental awareness, and a vibrant indie arts scene. This blend of cultural traditions encourages a
    respect for community, a penchant for creative expression, and an openness to new ideas.
attributes:
  skills: '[''Digital illustration (Procreate, Photoshop)'', ''Basic graphic design'', ''HTML/CSS web page creation'', ''Acoustic guitar (intermediate)'', ''Photography composition'', ''Woodworking basics'',
    ''Self‑directed learning and research'', ''Small‑group project coordination'']'
  hobbies: '[''Sketching'', ''Digital art (tablet)'', ''Acoustic guitar playing'', ''Hiking in Forest Park'', ''Photography'', ''Reading graphic novels'', ''Creating zines'', ''Coding simple interactive
    stories'', ''Attending local art exhibitions'']'
  career_goals: Robert aims to obtain his GED within the next year and enroll in a community college program focused on graphic design or visual arts. He dreams of becoming a freelance illustrator and concept
    artist for indie video games, while also contributing to public murals and community art projects in Portland. Long term, he envisions opening a collaborative studio where he can mentor other young
    artists and integrate art with social activism.
