personas:
  professional: David Miranda, the self‑appointed neighborhood soccer referee and LEGO city planner, blends a practical love of order with a relaxed attitude toward strict schedules, often improvising rules
    on the fly while channeling a competitive spark into designing functional playsets that mirror real‑world infrastructure, and they relish the feeling of turning chaos into order.
  sports: David Miranda, a 7‑year‑old soccer enthusiast, captains impromptu matches with the City Kids Soccer League, idolizes LA Galaxy’s star forward and models play after professional tactics, and balances
    organized training drills with spontaneous kick‑abouts, favoring flexible play over strict regimens, and they enjoy analyzing opponent moves for strategic advantage.
  arts: David Miranda, who devours adventure comics like "The Adventures of Tintin" and animated series such as "Adventure Time" and "Coco", channels their critical eye into crafting intricate LEGO cityscapes
    and papel picado for Día de los Muertos, while admiring the visual storytelling of Studio Ghibli’s Hayao Miyazaki and the musical flair of performer Luis Miguel, and they often critique the artistic
    choices in the shows they watch.
  travel: David Miranda, who dreams of exploring the bustling markets of Oaxaca during Día de los Muertos and the awe‑inspiring cliffs of the Grand Canyon on family road trips, prefers a loosely planned
    itinerary that allows spontaneous stops at ice‑cream shops, yet often worries about missing out on key sights, and they keep a scrapbook of postcards for future reference.
  culinary: David Miranda, an eager kitchen helper, proudly assembles tacos al pastor with fresh cilantro, lime, and pineapple, whips up guacamole with ripe avocados and jalapeños, and often asks about
    the stories behind each traditional dish, showing curiosity tempered by a tendency to rush when excited, and they love to share their homemade snacks with friends.
  core: David Miranda is a rule‑making soccer captain, meticulous LEGO city architect, cautious allowance saver, health‑aware yet sometimes forgetful kid, and culturally curious creator who balances fierce
    competition with a lingering worry about staying ahead, and they constantly seek new ways to improve their game.
background:
  cultural: David grows up in a bilingual Mexican-American household in Whittier, where Spanish is spoken at home and English at school. His parents celebrate Mexican traditions, such as Día de los Muertos,
    Cinco de Mayo, and family gatherings centered around home-cooked meals like tacos, tamales, and pozole. He attends a local elementary school with a sizable Latino student body, which reinforces his
    cultural identity through Spanish language classes and cultural events. Community festivals in Whittier expose him to mariachi music, folkloric dance, and local artisans, fostering a strong sense of
    pride in his heritage while also integrating the broader Southern California multicultural environment.
attributes:
  skills: '["Reading comprehension (grade-2 level)", "Basic addition and subtraction (up to 20)", "Bilingual English-Spanish basics", "LEGO and model kit construction", "Digital literacy with educational
    apps", "Soccer dribbling and basic tactics", "Board game strategy"]'
  hobbies: '["Soccer (informal neighborhood matches)", "LEGO construction", "Strategic video gaming", "Reading adventure comics", "Bilingual TV shows", "Cooking Mexican dishes with family", "Crafting for
    Día de los Muertos"]'
  career_goals: David envisions a future where he can combine his love of competition, hands-on building, and technology. He dreams of becoming a professional soccer player who leads his team, and also
    imagines designing video games or robotics as a software engineer, hoping to create puzzles that challenge others. He occasionally mentions wanting to be a mechanic or a civil engineer, attracted by
    the idea of constructing tangible things that follow clear rules and plans. Although his ambitions are still fluid, they consistently reflect his desire for clear pathways, personal achievement, and
    the ability to showcase his skills.
