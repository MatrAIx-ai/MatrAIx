personas:
  professional: Steven Palmer, a budding digital artist, leverages his methodical approach honed from chess and model building to craft intricate sci‑fi illustrations, often volunteering to assist with
    the town community center’s graphics for local festivals and church events.
  sports: Steven Palmer, an avid hiker of the Appalachian foothills, joins the town youth cross‑country club for disciplined trail runs, roots for the Tennessee Titans and Nashville Predators, and occasionally
    participates in Saturday morning basketball pickup games at the community center, preferring solitary exercise but still valuing the competitive edge of team play.
  arts: Steven Palmer immerses himself in speculative storytelling, drawing inspiration from authors Neil Gaiman and N.K. Jemisin while listening to synth‑wave musician Carpenter Brut and admiring the intricate
    line work of illustrator Junji Ito, and he often creates digital fan‑art tributes to the indie film 'The Fall' and the video game StarCraft as part of his personal creative outlet.
  travel: Steven Palmer prefers meticulously planning family weekend trips, having hiked the Great Smoky Mountains and explored historic Washington, D.C., and dreams of a solo pilgrimage to Kyoto to attend
    a cosplay convention, balancing modest family finances with an appetite for immersive cultural experiences that reflect both his small‑town roots and global curiosity.
  culinary: Steven Palmer enjoys the comfort of classic Southern dishes like fried chicken with biscuits and collard greens, yet he frequently experiments in his modest kitchen with quick miso ramen featuring
    shiitake mushrooms and a dash of Sriracha, showcasing a budding chef level that favors bold flavors such as smoked paprika and maple‑syrup‑drizzled pancake stacks for weekend brunches.
  core: Steven Palmer is a methodical teen who channels his competitive chess mindset into intricate digital fantasy art, yet habitually worries about unseen failures, often staying up late puzzling over
    crosswords while snacking on sugary cereal.
background:
  cultural: Steven grew up in Livingston, a small town in Overton County, Tennessee, where Appalachian cultural influences shape daily life. His family participates in local church activities, reflecting
    a traditional Southern Protestant upbringing that values community, modesty, and self‑reliance. Rural customs, such as seasonal festivals, outdoor recreation, and storytelling, are familiar to him,
    and he often hears folk music and regional anecdotes at family gatherings. While these roots provide a strong sense of belonging, Steven's access to the internet and digital media has broadened his
    horizons, exposing him to global art trends, tech communities, and diverse ideas. This blend of modest, close‑knit Southern values and contemporary digital culture informs his worldview and artistic
    sensibilities.
attributes:
  skills: '["Digital illustration", "Sketching (charcoal & pencil)", "Photography", "Python programming", "Mathematical problem solving", "Chess strategy", "Project planning", "Audio editing"]'
  hobbies: '["Drawing and digital art", "Reading sci‑fi & fantasy literature", "Strategic video gaming", "Chess", "Model building (RC planes, wooden puzzles)", "Nature sketching", "Puzzle solving (crosswords,
    Sudoku, logic riddles)", "Creative writing", "Audio podcast creation"]'
  career_goals: Steven aims to blend his artistic eye with technical expertise by pursuing a career in video game concept art and interactive media development. He plans to apply to a specialized high‑school
    program that emphasizes both STEM and visual arts, building a strong portfolio of digital paintings and modest coding projects. In the long term, he envisions working as a concept artist or UI/UX designer
    at a game studio, where he can contribute original visuals while leveraging his coding knowledge to prototype interactive experiences. To mitigate his tendency toward worry, he sets incremental milestones—such
    as entering local art contests, contributing to open‑source game mods, and completing online courses in graphic design—so he can track progress and maintain confidence.
