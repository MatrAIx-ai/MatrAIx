  career_goals: Francine aims to deepen her impact by becoming a lead teacher for a small grade team, mentoring new teachers, and designing a school‑wide reading initiative that emphasizes consistent routines
    and student well‑being. She hopes to earn an endorsement in educational leadership within the next three years, allowing her to influence curriculum development while maintaining a manageable workload.
    Ultimately, she plans to transition into a part‑time advisory role that lets her continue supporting students and colleagues without the full demands of a daily classroom schedule.
