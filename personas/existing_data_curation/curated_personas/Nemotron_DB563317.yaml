  hobbies: '[''Gardening'', ''Beach walking'', ''Reading historical fiction and mysteries'', ''Crocheting'', ''Volunteering at food bank'', ''Church activities'', ''Mindfulness meditation'', ''Gentle yoga'',
    ''Birdwatching'', ''Cooking comfort meals'']'
  career_goals: Approaching retirement, Sherly intends to shift from full‑time bedside nursing to part‑time mentorship and case‑management roles. She plans to obtain a certification in palliative care,
    lead a community health education program for seniors in St. Lucie County, and eventually volunteer full‑time with local hospice and senior support services, allowing her to use her expertise while
    maintaining a structured, lower‑stress schedule that supports her emotional well‑being.
