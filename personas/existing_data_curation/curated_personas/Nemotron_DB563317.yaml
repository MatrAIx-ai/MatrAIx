personas:
  professional: Sherly Walls, a veteran bedside nurse with over three decades of experience, leverages their meticulous documentation skills, expertise in geriatric and hospice care, and calm, organized
    demeanor to mentor younger staff and coordinate patient care, while their heightened emotional reactivity drives them to provide compassionate emotional support to anxious patients.
  sports: Sherly Walls enjoys early sunrise walks on the St. Lucie beaches as their primary low‑impact exercise, participates in a local senior swimming club at the St. Lucie Aquatic Center during summer,
    and tracks the Tampa Bay Buccaneers and the Miami Heat, cheering them from their porch while occasionally joining a community sand‑volleyball group at the summer beach festivals.
  arts: Sherly Walls, an avid crocheter, finds inspiration in the works of folk singer Joan Baez and the impressionist paintings of Claude Monet, regularly attends the St. Lucie Community Theater’s productions
    of classic mysteries, and collects vintage mystery novels by Agatha Christie, weaving their lyrical narratives into their own hand‑crafted blanket designs.
  travel: Sherly Walls prefers relaxed, culturally enriching trips, favoring short weekend drives to historic St. Augustine and Savannah for tours, while dreaming of a pilgrimage to the English countryside
    to visit the gardens of Kent, and they meticulously plan each outing with a printed itinerary and a small travel journal.
  culinary: Sherly Walls, an enthusiastic herb gardener, delights in cooking fresh rosemary‑infused grilled salmon, herb‑filled summer salads with heirloom tomatoes, and has mastered a comforting chicken
    and dumpling stew using home‑grown thyme, yet they occasionally indulge in a sugary slice of store‑bought key lime pie after a long day of volunteering.
  core: Sherly Walls blends decades of compassionate nursing with a structured love of gardening, mindfulness, and community service, navigating anxiety through routine and generosity while occasionally
    succumbing to sweet cravings and forgetfulness about prescriptions.
background:
  cultural: Sherly is a White American who grew up in a modest, working‑class family in the southeastern United States before settling in coastal Florida. Her upbringing reflects Southern hospitality, a
    strong sense of community, and an emphasis on family, faith, and service. Regular church attendance, participation in local volunteer initiatives, and a love for traditional Southern cuisine have shaped
    her cultural identity, reinforcing values of kindness, cooperation, and responsibility toward others.
