personas:
  professional: Clara Davalos, a detail‑oriented payroll and timekeeping clerk with over twenty years at a Fort Bend manufacturing plant, blends their practical curiosity with organized flexibility to streamline
    payroll cycles, mentor junior staff, and champion automation while pursuing a CPP credential.
  sports: Clara Davalos, a devoted fan of the Houston Astros and Houston Rockets, rounds out their week with brisk walks alongside their Labrador, joins a sunrise hiking group at Brazos Bend State Park,
    and participates in a community yoga class that blends light stretching with mindfulness.
  arts: Clara Davalos immerses themselves in contemporary mystery novels by Tana French, enjoys listening to regional performers such as Los Lobos and Natalia Lafourcade, and regularly attends the Fort
    Bend Cultural Festival where folk dancers and live mariachis create a vibrant arts scene.
  travel: Clara Davalos plans travel with meticulous itineraries, favoring culturally rich trips like a culinary tour of Oaxaca’s bustling markets and a weekend wine‑tasting escape to Texas Hill Country’s
    Fredericksburg, while balancing a modest budget that still allows yearly visits to Austin’s music festivals.
  culinary: Clara Davalos delights in crafting traditional tamales and mole poblano, layering home‑grown chilies, tomatoes, and fresh cilantro from their garden, and often experiments by adding smoked paprika
    or goat cheese to create a modern twist that surprises family guests.
  core: Clara Davalos is a meticulous payroll specialist whose practical curiosity and family‑centered hospitality steer both their precise number‑crunching and flavorful kitchen experiments.
background:
  cultural: Clara was born and raised in Fresno, Texas, in a close‑knit Mexican‑American family. Her parents immigrated from Jalisco, and she grew up bilingual, speaking Spanish at home while attending
    English‑language schools. The household celebrates Mexican holidays such as Día de los Muertos and Las Posadas, and family gatherings often revolve around shared meals and music. Living in Fort Bend
    County, she also embraces Texan customs, enjoys local farmers’ markets, and participates in community events that blend both cultures, reflecting a strong sense of family, hospitality, and work ethic.
attributes:
  skills: '[''Payroll processing'', ''Timekeeping coordination'', ''ADP Workforce Now'', ''QuickBooks Payroll'', ''Microsoft Excel (advanced)'', ''Data entry and validation'', ''Confidential records management'',
