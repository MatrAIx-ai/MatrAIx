  hobbies: '[''Cooking Mexican dishes'', ''Gardening'', ''Reading mystery novels'', ''Volunteering at adult literacy program'', ''Walking dog'', ''Attending cultural festivals'', ''Yoga'', ''Listening to
    regional music'', ''DIY home projects'']'
  career_goals: Clara aims to earn the Certified Payroll Professional (CPP) credential within the next two years and advance to a senior payroll specialist or payroll supervisor role where she can lead
    a small team. She plans to implement automated payroll workflows to reduce manual entry errors, mentor newer clerks, and eventually complete an associate’s degree in business administration to broaden
    her career prospects.
