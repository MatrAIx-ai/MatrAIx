personas:
  professional: Glennis Andy, a 24‑year‑old full‑stack software engineer, blends a business‑savvy mindset with a love for creative technology, designing data‑driven web apps for art‑focused platforms while
    channeling their curiosity into leading cross‑functional teams and preparing for a future product‑management role.
  sports: Glennis Andy, an energetic outdoor enthusiast, hikes the Chesapeake Bay trail on weekends, kayaks with friends on the Potomac River, and roots for the Washington Capitals and Washington Wizards,
    while also playing casual soccer in a local D.C. United fan club league.
  arts: Glennis Andy, an avid contemporary art explorer, frequents galleries featuring artists like Kehinde Wiley and Banksy, attends the annual Baltimore Visual Arts Festival, plays electric guitar in
    a rotating jam band that covers Radiohead and The Strokes, and hones improvisational comedy at a weekly Sketch Comedy Workshop, allowing spontaneous creativity to inform both work and leisure.
  travel: Glennis Andy prefers spontaneous, short‑haul trips, often road‑tripping to Philadelphia’s Museum of Art and the historic streets of Boston, while dreaming of a future immersion in Berlin’s vibrant
    street‑art scene and the minimalist galleries of Tokyo, balancing limited student‑budget constraints with a desire for cultural enrichment.
  culinary: Glennis Andy experiments in the kitchen by combining sous‑vide salmon with miso‑glaze and Szechuan pepper, loves crafting fermented kimchi tacos for friends, yet they occasionally binge on frozen
    pizza and sugary cereal after late‑night coding marathons, showcasing a playful but inconsistent culinary discipline.
  core: Glennis Andy is a curious, socially vibrant tech creator who battles anxiety with mindfulness while constantly mixing art, code, and experimental cooking into a uniquely driven yet occasionally
    impulsive lifestyle.
background:
  cultural: Glennis was born and raised in the suburban neighborhoods surrounding Norfolk, Virginia, within a middle‑class family that values community, education, and a connection to the region’s maritime
    heritage. Growing up near the Chesapeake Bay, he absorbed the blend of Southern hospitality and the vibrant, arts‑focused atmosphere of nearby coastal towns. His cultural identity reflects a typical
    white American upbringing in the Mid‑Atlantic, characterized by a respect for tradition, an appreciation for emerging cultural scenes, and a strong sense of regional pride.
