  career_goals: Glennis aspires to become a senior software engineer within the next three years, focusing on leading cross‑functional teams on innovative projects. Ultimately, he aims to transition into
    a product management role where he can leverage his technical expertise and business education to shape product strategy for creative‑tech platforms. He also dreams of launching a startup that merges
    software with the visual arts, positioning himself at the intersection of technology and culture.
