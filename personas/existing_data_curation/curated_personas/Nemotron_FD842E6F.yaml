personas:
  professional: Joel Williams is a budding junior naturalist who blends a boundless curiosity for rocks and wildlife with a practical habit of cataloguing his finds in a hand‑drawn field notebook, though
    his relaxed attitude toward organization often leaves his sketch pages scattered around the living room.
  sports: Joel Williams is a member of the local Eastside Sprouts Soccer Club, where he enjoys the afternoon kick‑around sessions on the grass fields, cheering for the Seattle Sounders FC on weekends while
    preferring the flexibility of informal park games over rigid league schedules.
  arts: Joel Williams spends afternoons constructing elaborate LEGO cityscapes inspired by the architectural designs of Antoni Gaudí, while sketching comic panels of imagined creatures that echo the whimsical
    style of Dr. Seuss, and he often watches ‘The LEGO Movie’ and the Minecraft YouTube channel ‘Dream’ for creative sparks.
  travel: Joel Williams loves weekend excursions to nearby state parks like Redwood Canyon, where he hikes short trails and collects rocks, and he dreams of exploring the Grand Canyon and the dinosaur fossil
    beds of the Badlands, preferring spontaneous day trips over meticulously planned vacations due to his relaxed approach to scheduling.
  culinary: Joel Williams favors hearty, kid‑friendly meals such as cheesy macaroni, pepperoni pizza, and peanut‑butter‑banana sandwiches, enjoys building his own trail‑mix with dried cranberries and pretzel
    sticks, and though his cooking skills are limited to assembling pantry staples, he takes pride in helping melt cheese on a mini‑grill for his friends.
  core: Joel Williams is a curious, nature‑loving 7‑year‑old who balances adventurous imagination with a laid‑back, sometimes disorganized streak, often worrying about the next hike or LEGO build while
    delighting in simple pleasures.
background:
  cultural: Joel grew up in Santaquin, a small city in Utah County, surrounded by the rugged landscape of the Intermountain West. His family lives in a predominantly white, middle‑class community where
    outdoor recreation, neighborly gatherings, and values such as self‑reliance and cooperation are emphasized. Local traditions include family picnics, community events at churches, and seasonal activities
    like camping in nearby state parks. This environment has shaped his appreciation for nature, his practical mindset, and his preference for small, familiar social circles.
attributes:
