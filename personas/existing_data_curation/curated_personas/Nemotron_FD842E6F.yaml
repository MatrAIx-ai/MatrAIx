  hobbies: '["Hiking", "Rock collecting", "Reading adventure books", "LEGO building", "Drawing comics", "Minecraft", "Educational videos (space, dinosaurs)", "Soccer with friends"]'
  career_goals: He dreams of becoming a wildlife biologist or park ranger who can study and protect Utah's natural landscapes, combining his love of nature with a practical desire to help others. Joel also
    imagines inventing simple tools or gadgets that solve everyday problems, reflecting his hands‑on curiosity. While he sometimes worries about making mistakes, he is determined to keep learning and hopes
    to work in a job that lets him explore, build, and contribute to his community.
