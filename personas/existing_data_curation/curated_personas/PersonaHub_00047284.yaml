persona_description: A historian of the Manhattan Project who has studied the history of the atomic bomb and its development, particularly the role of Los Alamos in the project. The historian has a deep
  understanding of the technical details of the project and the ethical and moral implications of its development. They have visited many of the sites associated with the project and have a wealth of knowledge
  and firsthand accounts to draw from. They are also a keen observer of the human impact of the project and have written extensively about the experiences of the workers and the scientists involved.
