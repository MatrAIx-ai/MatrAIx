  career_goals: Jeancarlo aims to transition from independent contracting to owning a boutique finishing company that specializes in high‑end residential interiors and historic restoration projects in Miami’s
    Cuban‑heritage neighborhoods. He plans to earn professional certifications in decorative painting and mural art, develop a small team of trusted artisans, and offer design‑consultation services that
    blend contemporary aesthetics with traditional Cuban motifs. Long‑term, he hopes to mentor the next generation of Latino tradespeople and establish a scholarship fund for apprentices from his community.
