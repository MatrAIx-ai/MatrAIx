personas:
  professional: An accomplished painter and paperhanger, Jeancarlo Boles leverages meticulous surface preparation and bilingual communication to deliver high‑end residential interiors and historic restorations
    while mentoring apprentices and planning to launch a boutique finishing firm.
  sports: An avid weekend fisherman and early‑morning beach walker, Jeancarlo Boles also cheers for the Miami Heat and Miami Dolphins, participates in a local sailing club’s seasonal regattas, and maintains
    a modest fitness routine of bi‑weekly pick‑up basketball games.
  arts: A dedicated connoisseur of Cuban musical heritage, Jeancarlo Boles spends quiet evenings listening to Celía Cruz, Benny Moré, and classic salsa while practicing modest dance steps, and draws artistic
    inspiration from the vibrant murals of Wifredo Lam and contemporary street art in Miami’s Wynwood district.
  travel: A reflective traveler, Jeancarlo Boles enjoys planning short getaways to nearby Key West and weekend fishing trips in the Gulf, has explored Havana and Cartagena to deepen his cultural roots,
    and dreams of a future boutique renovation project in Barcelona’s historic neighborhoods.
  culinary: A passionate home chef, Jeancarlo Boles excels at preparing ropa vieja with a rich sofrito base, perfects arroz con pollo using aromatic cilantro and cumin, and often experiments with plantain‑based
    sides, though they sometimes over‑season the sauce in their enthusiasm.
  core: Balancing meticulous craftsmanship with quiet curiosity, Jeancarlo Boles weaves Cuban rhythms into a disciplined work ethic, mentoring apprentices while chasing sunrise walks and occasional over‑seasoned
    meals.
background:
  cultural: Jeancarlo is a first‑generation Cuban‑American raised in Miami’s vibrant Little Havana district. His family maintains strong ties to Cuban traditions, including Catholic celebrations, community
    festivals, and a deep appreciation for Spanish language and cuisine. Growing up amidst a tight‑knit diaspora, he values community solidarity, respects the legacy of Cuban craftsmanship, and incorporates
    subtle cultural references—such as pastel color palettes and tropical motifs—into his work. His cultural identity shapes his professional ethos, emphasizing reliability, personal pride, and a calm resilience
    that reflects both his heritage and his Miami upbringing.
