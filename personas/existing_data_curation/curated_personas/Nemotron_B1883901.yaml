personas:
  professional: Katherine Kuroda, an eight-year-old budding scientist, brings their methodical mindset to the school science club, where they design simple experiments with the same precision they apply
    to building LEGO sets and solving brain teasers.
  sports: Katherine Kuroda, a competitive soccer player on the local park’s junior league, favors the jersey of the city’s professional team, the Thunderbolts, and complements weekly matches with weekend
    nature-trail hikes that double as rock-collecting expeditions, reflecting their love for both teamwork and independent exploration.
  arts: Katherine Kuroda, an avid reader of mystery series like 'The Secret of the Hidden Key,' a disciplined pianist who practices Beethoven’s 'Für Elise' each evening, and a LEGO builder who recreates
    scenes from favorite books while listening to the orchestral scores of 'Star Wars,' channels their creativity into every hobby.
  travel: Katherine Kuroda, an inquisitive explorer, enjoys day trips to nearby Redwood Trail Park and the regional science museum, and dreams of a future family vacation to the Grand Canyon to collect
    its iconic red rocks, planning each outing with the same detail they apply to LEGO instructions.
  culinary: Katherine Kuroda, a kitchen enthusiast, loves crafting simple snack plates of apple slices with peanut butter, assembling homemade mini pizzas topped with mozzarella and pepperoni, and experimenting
    with granola bars that blend oats, dried apricots, and sunflower seeds, always tasting each creation before declaring it a success.
  core: Katherine Kuroda, a methodical eight-year-old detective of mysteries, balances competitive soccer, meticulous LEGO builds, disciplined piano practice, and a carefully managed allowance while vigilantly
    tracking their seasonal allergies.
background:
  cultural: Katherine grew up in Odessa, Texas, a West Texas community known for its oil industry heritage, wide‑open landscapes, and strong emphasis on self‑reliance. Her family celebrates traditional
    Texas holidays with barbecues, Fourth of July fireworks, and community rodeos, while also attending a local Methodist church where she participates in youth activities. She is exposed to diverse cultures
    through school, including Spanish language lessons and multicultural festivals, which broaden her appreciation for Tex‑Mex cuisine and the region’s Hispanic influence. The blend of small‑town Texas
    values, a love for the outdoors, and exposure to scientific curiosity through school programs shapes her worldview.
