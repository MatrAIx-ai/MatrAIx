  hobbies: '[''Reading Historical Fiction'', ''Poetry'', ''Gardening'', ''Mexican Cooking'', ''Small‑Group Cultural Gatherings'', ''Mexican Folk Music'', ''Día de los Muertos Celebrations'', ''Gentle Latin
    Dance'', ''Walking in Parks'', ''Crossword Puzzles'']'
  career_goals: Although retired from formal employment, Dalia aims to continue sharing her knowledge by volunteering as a mentor for novice teachers in Chicago's public schools and by leading bilingual
    reading circles at the local library. She aspires to author a guidebook on practical bilingual teaching strategies, blending her curiosity for new ideas with her pragmatic experience. Dalia also hopes
    to collaborate with community organizations to launch a small intergenerational garden program that links Mexican cultural traditions with urban sustainability, providing a space for seniors and youth
    to connect.
