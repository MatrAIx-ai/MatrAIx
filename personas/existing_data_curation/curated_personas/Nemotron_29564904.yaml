personas:
  professional: Julie Cuaresma, a 94‑year‑old retired community organizer and church event planner, leverages her love of structure and spontaneous adaptability to coordinate potlucks, bingo nights, and
    bridge tournaments while using her competitive edge and cautious mediation skills to navigate social dynamics.
  sports: Julie Cuaresma enjoys gentle daily walks along the Tennessee River, follows the Alabama Crimson Tide football and the Memphis Grizzlies basketball teams, and treats senior bridge and bingo leagues
    as mental sports where their competitive nature shines, while also participating in the Muscle Shoals Senior Walking Club for regular exercise.
  arts: Julie Cuaresma, an avid choir member, finds solace in classic soul and rock recordings from the Muscle Shoals Sound Studio—especially Aretha Franklin’s "Respect" and Otis Redding’s "Sittin' On The
    Dock of the Bay"—and channels that inspiration into intricate quilting, crocheting, and attending the annual Muscle Shoals Folk Arts Festival, even as they remain skeptical of fleeting artistic trends.
  travel: Julie Cuaresma prefers low‑key, family‑oriented trips, such as weekend visits to historic Natchez, nostalgic excursions to Memphis’ Beale Street blues scene, and cherished pilgrimages to the Muscle
    Shoals museum, planning itineraries meticulously to accommodate their walking stamina, budget, and lingering worry about travel logistics.
  culinary: Julie Cuaresma delights in crafting Southern comfort foods like shrimp and grits, fried chicken, collard greens seasoned with smoked turkey, and peach cobbler, skillfully improvising recipes
    with fresh garden tomatoes, okra, and sweet corn while sharing their dishes at church potlucks, even though they sometimes forget a key spice midway through cooking.
  core: Julie Cuaresma blends a strict love of routine with a surprising impulsive streak, letting competitive bingo wins and spontaneous quilting projects define a worry‑prone yet deeply community‑rooted
    life at 94.
background:
  cultural: Julie was born in the early 1930s in rural Alabama to a modest white, working‑class family. Her upbringing was steeped in Southern hospitality, Christian faith, and the traditions of the Bible
    Belt, which emphasized community service, self‑reliance, and family bonds. She lived through the post‑World War II economic shifts, the civil‑rights era, and the rise of Muscle Shoals as a musical hub,
    which fostered her love for gospel and soul music. These cultural threads shape her daily routines, from daily prayer and sweet‑tea gatherings to a deep respect for preserving family recipes and local
    stories.
