persona_description: A college professor who specializes in the study of alcohol and its effects on college students, particularly among high school graduates. He has conducted research on the protective
  effects of parental involvement in high school on college students' drinking habits and the negative consequences of alcohol-related harm. He has developed an intervention to reduce the increases in drinking
  and negative consequences during matriculation and into college, and has published the results of his study in the Journal of Consulting and Clinical Psychology. He is known for his expertise in motivational
  interventions and the importance of internalizing values, attitudes, and expectations in college students.
