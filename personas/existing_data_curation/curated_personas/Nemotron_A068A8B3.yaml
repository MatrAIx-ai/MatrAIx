personas:
  professional: Jacqueline Lee, a seasoned financial strategist with over 30 years of experience in budgeting, forecasting, and ESG-focused risk analysis, they leverage advanced Excel, Python, and Tableau
    to craft clear financial narratives while their calm, relaxed demeanor and love of abstract art foster a collaborative, mentorship-rich environment that tolerates occasional disorganization as they
    mentor cross-functional teams toward a CFO trajectory.
  sports: Jacqueline Lee enjoys low-impact fitness like weekend walking in Eden Park, occasional tennis at the local community club, and follows the Cincinnati Bengals and Cincinnati Reds from the comfort
    of their living room, they prefer small-group exercise over crowded gyms while occasionally joining a friendly adult softball league in the spring.
  arts: Jacqueline Lee nurtures their creative side by painting abstract watercolors, photographing urban street scenes, and regularly attending exhibitions featuring artists such as Kehinde Wiley and Amy
    Sherald, while they find inspiration in the music of The Roots, Nina Simone, and the soulful poetry of Langston Hughes during intimate gallery openings.
  travel: Jacqueline Lee's travel style blends spontaneous road trips to nearby music towns like Nashville and Asheville with carefully planned visits to cultural festivals in New Orleans and Charleston,
    they balance a love for relaxed exploration with occasional international aspirations to wander the historic streets of Paris and the art-rich neighborhoods of Florence.
  culinary: Jacqueline Lee, a confident home cook, delights in Southern-style dishes such as collard greens seasoned with smoked paprika, shrimp and grits enhanced with fresh okra, and sweet-potato pie,
    they often incorporate garden-grown tomatoes, basil, and hot sauce into their meals while occasionally treating themselves to a fine-dining tasting menu at Cincinnati's Sotto.
  core: Jacqueline Lee blends calm, resilient leadership with a love for art and community, they navigate corporate finance while embracing occasional disorganization, mindful meditation, and a steadfast
    commitment to uplifting under-represented voices.
background:
  cultural: Jacqueline grew up in Cincinnati’s historically Black neighborhoods where family, church, and community solidarity were central. Her African‑American heritage informs her worldview, emphasizing
    resilience, collective advancement, and the celebration of Black artistic contributions. She remains active in local Black professional networks, participates in Juneteenth events, and supports initiatives
    that promote financial literacy among underserved populations. Her cultural identity also enriches her appreciation for the arts, as she frequently collaborates with African‑American artists and mentors
    young creators. This blend of professional expertise and cultural grounding shapes her commitment to inclusive leadership and community empowerment.
attributes:
  skills: '[''Financial Planning & Analysis'', ''Budgeting & Forecasting'', ''Risk Management'', ''Financial Reporting'', ''Regulatory Compliance'', ''Data Analysis (Excel, Python, Tableau, Power BI)'',
    ''ERP Systems (SAP, Oracle)'', ''ESG & Sustainable Investing'', ''Leadership & Mentoring'', ''Cross‑functional Team Coordination'', ''Corporate Art Program Management'']'
  hobbies: '[''Visiting art museums and galleries'', ''Painting (abstract watercolors)'', ''Photography (urban and nature)'', ''Reading (philosophy, tech, African‑American literature)'', ''Book club (small
    group)'', ''Mindfulness meditation and yoga'', ''Gardening (vegetable garden)'', ''Cooking (Southern cuisine)'', ''Attending local music and cultural festivals'']'
  career_goals: Jacqueline’s primary ambition is to advance to a chief financial officer role within the next five years, where she can shape long‑term fiscal strategy and embed sustainability and community
    impact into the company’s financial DNA. She also aims to launch a mentorship program for Black women and other under‑represented professionals in finance, leveraging her network in Cincinnati to provide
    scholarships, workshops, and one‑on‑one coaching. In parallel, she wishes to develop a boutique advisory practice focused on helping Black‑owned businesses secure capital and implement robust financial
    controls. Her long‑term vision includes contributing to local economic empowerment initiatives and serving on the board of a regional arts organization to bridge finance and cultural development.
