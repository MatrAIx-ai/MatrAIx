personas:
  professional: Parbhubhai Cowart, a budding young inventor-artist, channels curiosity into building elaborate LEGO cities and concocting backyard volcano experiments, showing a laid-back yet imaginative
    approach to early STEM exploration.
  sports: Parbhubhai Cowart drills with the Villa Rica Youth Soccer Club, cheers for the 'Atlanta Braves' and 'Atlanta Falcons', and spends weekends hiking local nature trails, showing a playful yet slightly
    unorganized commitment to staying active.
  arts: Parbhubhai Cowart fills sketchbooks with dragons and constellations inspired by Dr. Seuss and Studio Ghibli, practices simple melodies on a tiny keyboard echoing 'The Beatles', and eagerly collects
    picture books by Mo Willems, weaving imagination into daily creative play.
  travel: Parbhubhai Cowart enjoys spontaneous family road trips to the Atlanta Botanical Garden and Disney World, dreams of exploring the Kennedy Space Center, and prefers short, adventure-filled journeys
    over long, structured vacations.
  culinary: Parbhubhai Cowart loves helping stir spaghetti sauce, topping pizza with mozzarella and pepperoni, and whipping up strawberry-banana smoothies with a dash of cinnamon, yet they often forget
    to wash their hands before meals.
  core: Parbhubhai Cowart is a 7-year-old imagination powerhouse who juggles LEGO mastering, volcanic experiments, and sketching fantastic beasts, while habitually misplacing crayons and negotiating bedtime
    extensions.
background:
  cultural: Parbhubhai grows up in a close‑knit, predominantly white community in Villa Rica, Georgia. His family embraces Southern hospitality, community gatherings, and traditional holidays like Thanksgiving
    and Christmas, as well as local festivals such as the county fair. While his name reflects a multicultural heritage, his upbringing blends classic Southern customs—Sunday family meals, church attendance,
    and participation in community events—with exposure to diverse stories and artistic influences that nurture his imagination.
