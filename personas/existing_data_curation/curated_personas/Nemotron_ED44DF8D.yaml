  hobbies: '[''Birdwatching'', ''Gardening'', ''Knitting'', ''Quilting'', ''Historical fiction reading'', ''Crossword puzzles'', ''Cooking Midwestern cuisine'', ''Lakefront walks'', ''Folk music listening'',
    ''Church choir participation'']'
  career_goals: Although officially retired, Jessica aims to deepen her involvement in local volunteer work, particularly with the hospice and community garden programs. She aspires to mentor younger volunteers,
    lead a series of workshops on sustainable gardening and textile crafts, and document the oral histories of Duluth's senior residents in a memoir. She also plans to enroll in a short genealogy course
    at the community college to trace her family’s Scandinavian roots, while maintaining her personal health and supporting her spouse’s well‑being.
