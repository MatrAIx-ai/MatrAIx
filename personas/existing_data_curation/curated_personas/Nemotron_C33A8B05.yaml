personas:
  professional: Annie Baham, a budding digital storyteller who channels a love of structured journaling and solitary sketching into short TikTok videos that experiment with visual narrative while balancing
    school assignments with a preference for predictable routines, and they often schedule content releases in advance to maintain a sense of order.
  sports: Annie Baham enjoys casual weekend swims at the community pool, follows the local NBA team, the Chicago Bulls, as a loyal fan, participates in a high‑school after‑school yoga club for flexibility,
    and they occasionally join friends for pickup basketball games despite a general preference for low‑key, structured physical activity.
  arts: Annie Baham immerses themselves in R&B and neo‑soul artists like SZA, H.E.R., and Kendrick Lamar while sketching watercolor scenes inspired by contemporary fiction, and they curate a personal playlist
    that fuels short‑form TikTok storytelling and weekly book‑club discussions.
  travel: Annie Baham favors short, planned road trips to nearby state parks like Shenandoah, relishes the predictability of booked campsite reservations, dreams of visiting New York City’s iconic bookstores,
    and they balance the desire for adventure with budget‑conscious choices tied to parental allowance.
  culinary: Annie Baham likes to whip up quick avocado toast with chili flakes, experiment with spicy chicken ramen using miso paste and sriracha, and unwind with matcha lattes topped with honey, and they
    occasionally over‑cook pasta due to a forgetful timer habit.
  core: Annie Baham blends a love of solitary creative work with a restless emotional core, navigating teenage anxieties through structured journaling, spontaneous TikTok experiments, and occasional budget‑driven
    splurges on art supplies, and they often battle intense feelings of sadness.
background:
  cultural: Annie is a Black teenager raised in Washington, D.C., where her family maintains deep ties to the city’s African‑American cultural heritage. Her parents regularly celebrate Juneteenth and honor
    African‑American history through community events, museum visits, and storytelling evenings that feature the city’s legacy of civil‑rights activism. She grew up attending a local church that emphasizes
    community service and the arts, which has nurtured her love for music and poetry. The multicultural neighborhood she lives in exposes her to a vibrant mix of flavors, rhythms, and traditions, influencing
    her tastes in food, fashion, and creative expression. Her upbringing blends the strong communal bonds of DC’s Black neighborhoods with a modern, youthful perspective on identity and social responsibility.
