  hobbies: '[''journaling'', ''reading African‑American literature'', ''sketching'', ''listening to R&B/neo‑soul'', ''creating short TikTok videos'', ''small‑group board games'', ''book club'', ''mindfulness
    meditation'', ''caring for houseplants'', ''volunteering at the library'']'
  career_goals: Annie aspires to pursue a career that blends structured mental‑health support with creative expression. In the long term she hopes to earn a degree in psychology or social work and become
    a youth counselor or therapist, focusing on anxiety and emotional wellbeing for adolescents in urban communities. She also dreams of building a portfolio that could lead to work as a graphic designer
    or art therapist, allowing her to use visual art as a therapeutic tool. In the near term she plans to complete her high‑school education, develop a strong academic foundation in science and social studies,
    and volunteer at local community centers to gain experience in youth mentorship.
