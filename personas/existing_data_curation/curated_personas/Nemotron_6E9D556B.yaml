  hobbies: '[''Reading (non-fiction)'',''Hiking'',''Birdwatching'',''Landscape Photography'',''Yoga'',''Meditation'',''Plant-based Cooking'',''Home Gardening'',''Woodworking'']'
  career_goals: Christine aims to progress to a senior leadership role such as Director of Operations or Vice President of Clinical Services within a regional health system. She plans to deepen expertise
    in health informatics and population health management, pursuing certifications like FACHE and possibly a Master’s in Healthcare Administration. Over the next five years, she intends to lead a hospital‑wide
    quality improvement initiative that reduces readmission rates by at least 15% and to implement an integrated telehealth platform that expands access while improving cost efficiency. Additionally, she
    seeks to mentor emerging managers, fostering a culture of operational excellence paired with compassionate patient care.
