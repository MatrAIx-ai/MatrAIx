  career_goals: Although content in her current analyst role, Aline aspires to move into senior management, targeting a Director of Strategic Initiatives position within the next five years. She aims to
    lead cross‑functional teams, shape high‑impact operational strategies, and mentor junior analysts. Long‑term, she envisions founding her own boutique consulting firm specializing in process efficiency
    for mid‑size manufacturers in Pennsylvania. She also seeks to develop certifications in Lean Six Sigma and Advanced Data Analytics to reinforce her credibility. Balancing her competitive drive, she
    wants recognition for delivering measurable cost reductions and driving growth.
