personas:
  professional: Loan Phan is a dental‑hygiene educator‑in‑training who blends meticulous clinical expertise with a passion for community health, designing evidence‑based oral‑health curricula for rural
    schools while mentoring students and planning a mobile clinic in Jefferson County.
  sports: Loan Phan enjoys early‑morning hikes on the local Jefferson County trails, practices yoga twice weekly at Serenity Flow studio, and follows the Houston Texans (NFL) and Dallas Mavericks (NBA)
    while playing recreational softball with the Jefferson County Community League during summer.
  arts: Loan Phan finds creative release in sketching natural scenes inspired by the works of Ansel Adams, attends pottery workshops that echo the tactile style of Bernard Leach, and relaxes to the music
    of Norah Jones and the indie folk band The Paper Kites while occasionally binge‑watching classic films by Akira Kurosawa.
  travel: Loan Phan prefers low‑key, culturally immersive trips, having explored the historic temples of Angkor Wat, the tea plantations of Cameron Highlands, and weekend escapes to Asheville’s Blue Ridge
    Mountains, while dreaming of a solo trek through Patagonia’s Torres del Paine and a culinary tour of the Mediterranean.
  culinary: Loan Phan is an avid home cook who masterfully prepares pho broth, lemongrass‑infused chicken, and crisp spring rolls, often experimenting with basil, kaffir lime, and coconut milk to fuse Southeast
    Asian flavors with Mediterranean olive oil and feta, while their intermediate skill level shines in the weekly community potluck.
  core: Loan Phan is a curiosity‑driven, quietly assertive dental‑hygiene educator who balances meticulous planning with spontaneous creativity, loves solitary hikes and sketching, and quietly curates a
    life of purposeful community service sprinkled with occasional pottery indulgence.
background:
  cultural: Loan was raised in a Southeast Asian immigrant family that values education, respect for elders, and community reciprocity. Her parents instilled bilingual fluency (English and her heritage
    language) and celebrated cultural festivals such as Lunar New Year and Mid‑Autumn, which fostered a deep appreciation for family traditions and culinary heritage. Living in Fairfield, IA, she blends
    these cultural roots with Midwestern values of pragmatism and community involvement, often participating in local health fairs and cultural exchange events. This bicultural perspective informs her compassionate
    patient care and her desire to improve oral health equity.
attributes:
