  hobbies: '[''Reading historical non‑fiction'', ''Herb gardening'', ''Cooking Southeast Asian cuisine'', ''Hiking'', ''Yoga'', ''Sketching'', ''Pottery'', ''Volunteer reading program'']'
  career_goals: Loan aims to transition into a dental‑hygiene educator role at a community college while completing a master's degree in public health. She plans to develop an evidence‑based oral‑health
    curriculum for rural schools and launch a mobile clinic that provides preventive services to underserved populations in Jefferson County. She also aspires to present research on integrative dental‑hygiene
    practices at national conferences and mentor aspiring hygienists.
