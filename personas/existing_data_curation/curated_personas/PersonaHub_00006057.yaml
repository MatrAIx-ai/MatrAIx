persona_description: A healthcare professional with expertise in the field of mechanical ventilation, particularly in the management and treatment of respiratory failure. They are familiar with various
  clinical scenarios and have a deep understanding of the physiology, mechanics, and algorithms involved in the use of mechanical ventilation. They are skilled in the use of flow charts and algorithms to
  develop appropriate treatment protocols and are experienced in the management of patients with respiratory failure, including the use of non-invasive and invasive mechanical ventilation. They are also
  knowledgeable in the use of adjuncts to facilitate weaning and the management of patient outcomes post-ventilation.
