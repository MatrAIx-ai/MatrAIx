  career_goals: Kenneth aims to earn his GED within the next year and pursue vocational training as an EMT or firefighter, driven by his desire to help and protect his community. In the long term, he envisions
    creating a community safety outreach program that educates youth about emergency preparedness, health, and career pathways. He also contemplates expanding his hands‑on skills into a licensed electrician
    or auto technician role, leveraging his practical aptitude while maintaining a focus on service and community improvement.
