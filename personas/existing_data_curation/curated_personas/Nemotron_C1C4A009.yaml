  career_goals: Amanda aims to leverage her experience to transition into a supervisory or training role within her organization, where she can mentor younger staff and lead initiatives to modernize office
    processes. She plans to obtain a certification in office administration and become proficient in emerging project management tools. In the next few years, she also hopes to devote more time to community
    service, possibly coordinating events at the local senior center or library, and eventually move into a part‑time consulting role that helps small businesses in Nitro improve their administrative efficiency
    while allowing her to maintain a balanced, fulfilling retirement.
