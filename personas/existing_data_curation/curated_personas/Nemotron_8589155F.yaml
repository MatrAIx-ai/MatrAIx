  hobbies: '[''LEGO building'', ''Soccer'', ''Exploring Elk Grove Regional Park (rock collecting, insect observation)'', ''Reading adventure/science‑fiction books'', ''Minecraft and educational coding games'',
    ''Drawing cartoons and storytelling'', ''School robotics club'']'
  career_goals: Henry often imagines building things that help people, so he says he wants to become a robotics engineer or an astronaut one day. He also dreams of being a professional soccer player because
    he loves the competition on the field. After watching nature documentaries, he has expressed interest in becoming a wildlife veterinarian to care for animals. These goals blend his curiosity about how
    things work, his practical desire to create, and his competitive spirit.
