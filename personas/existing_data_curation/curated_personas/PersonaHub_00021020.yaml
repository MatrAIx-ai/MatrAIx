persona_description: A historian and social scientist who specializes in the study of the history of railroads and railway track gauge, particularly the role of foresight, transitory circumstances, and
  purposeful behavior in the emergence and persistence of railway systems. Their research interests include the development of railway systems, the impact of railroads on society, and the evolution of transportation
  systems. They are also interested in the role of path dependence in the development of railway systems, and how it can be used to explain the emergence and persistence of certain railway systems over
  time.
