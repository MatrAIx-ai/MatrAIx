  hobbies: '[''Reading historical biographies'', ''Poetry appreciation'', ''Desert gardening'', ''Fusion cooking (South Asian meets Southwestern)'', ''Mindfulness meditation'', ''Reflective journaling'',
    ''Volunteer tutoring for seniors'', ''Facilitating small literary discussion groups'', ''Short nature hikes'', ''Attending intimate cultural gatherings'']'
  career_goals: Rakesh aims to channel his organizational strengths and cultural knowledge into preserving and sharing South Asian heritage within his Arizona community. He plans to establish a monthly
    intergenerational storytelling circle, create a digitized archive of his family’s history, and mentor younger members through small workshops on literature and language. On a personal level, he seeks
    to build emotional resilience by continuing mindfulness practice, completing a memoir that reflects his life’s journey, and maintaining an active, supportive role for his spouse and extended family.
    He also hopes to remain a reliable volunteer for local non‑profits, helping them plan and execute community programs efficiently.
