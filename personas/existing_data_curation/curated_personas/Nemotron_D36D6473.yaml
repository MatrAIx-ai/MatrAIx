  hobbies: '[''Gardening'', ''Woodworking'', ''Fishing'', ''Church Choir Participation'', ''Community Theater Attendance'', ''Bridge and Gin‑Rummy Games'', ''Reading Historical Fiction'', ''Genealogy Research'',
