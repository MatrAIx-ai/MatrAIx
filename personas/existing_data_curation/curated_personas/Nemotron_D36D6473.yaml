personas:
  professional: Derek Laberge, a retired community handyman turned senior‑center activity coordinator, blends his carpentry, plumbing, and horticultural expertise with meticulous planning and a sociable,
    assertive demeanor to keep local events running smoothly.
  sports: Derek Laberge spends crisp mornings fishing with the Pee Dee Anglers Club on the river, cheers on the Carolina Panthers on Sundays, and joins a weekly senior golf league at Pinehurst Country Club,
    favoring low‑impact exercise that complements his woodworking stamina.
  arts: Derek Laberge’s artistic life revolves around singing in St. Paul’s Church choir, attending productions at the Marlboro Community Playhouse starring veteran actor James McCarthy, and listening to
    folk legends like John Hartford while he sands his wooden birdhouses.
  travel: Derek Laberge prefers well‑planned road trips that blend quiet relaxation with historical discovery, often revisiting the cobblestone streets of Charleston, the moss‑draped squares of Savannah,
    and the National Archives in Washington, D.C., while budgeting carefully to keep his senior‑center duties covered.
  culinary: Derek Laberge, a capable home chef, delights in slow‑smoked pulled pork glazed with mustard‑based South Carolina barbecue sauce, paired with peach cobbler made from garden‑grown fruit and a
    side of collard greens seasoned with smoked ham hocks.
  core: Derek Laberge is a diligent gardener‑carpenter whose curiosity fuels endless projects, yet a chronic worry often shadows their otherwise warm, community‑centered spirit.
background:
  cultural: Derek’s cultural background reflects a blend of deep Southern roots and a family lineage that traces back to French‑Canadian settlers who migrated to the Carolinas in the early 20th century.
    Raised in Darlington, SC, he grew up with the values of Southern hospitality, close‑knit church life, and a strong sense of community responsibility. He embraces regional traditions such as attending
    the Darlington County Peach Festival, cooking low‑and‑slow barbecue, and participating in church pot‑lucks. His upbringing emphasized self‑reliance, respect for elders, and a practical work ethic, while
    his curiosity led him to explore his family's genealogical ties to Quebec, integrating a modest multicultural awareness into his identity.
