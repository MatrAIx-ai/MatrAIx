  career_goals: Although retired from formal employment, Angel remains driven by personal growth and community contribution. She aims to become a volunteer docent at the Albright–Knox Art Museum, where
    she can share her enthusiasm for modern art with visitors. She also plans to complete and self‑publish a memoir that weaves together her family’s immigrant history with reflections on Buffalo’s cultural
    evolution. Angel hopes to mentor younger volunteers in research methods and event organization, and she aspires to lead a local history reading group that encourages intergenerational dialogue. Ultimately,
    her ambition is to leave a lasting intellectual legacy that celebrates curiosity and disciplined inquiry.
