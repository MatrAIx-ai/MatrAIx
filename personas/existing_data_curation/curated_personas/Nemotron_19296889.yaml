    drafting basics'']'
  career_goals: Luis aspires to move into a senior advisory role where he can blend his technical drafting expertise with his passion for cultural and artistic design. Over the next five years, he aims
    to obtain BIM certification and become a BIM coordinator for projects that involve historic preservation or culturally significant architecture in the Los Angeles area. He also wishes to lead community
    outreach programs that teach drafting and design basics to underserved youth, leveraging his sociable nature and commitment to kindness. Additionally, he hopes to transition to a part‑time consulting
    position that allows him to mentor younger professionals while maintaining a healthier work‑life balance, reducing stress and giving him more time to pursue his artistic interests.
