personas:
  professional: Luis Scrivano, a 57‑year‑old technical drafter with three decades of architectural and mechanical drafting expertise, merges meticulous AutoCAD, Revit, and BIM skills with an art historian’s
    eye, leads drafting workshops, mentors junior drafters, and infuses heritage‑inspired folk motifs into construction documents while they pursue a senior BIM coordinator advisory role.
  sports: Luis Scrivano enjoys casual fitness through Saturday hikes in the Santa Monica Mountains, participates in a local adult soccer league called the Santa Monica Strikers, and they avidly follow the
    Los Angeles Lakers, Dodgers, and LA Galaxy, preferring social play and team camaraderie over intense competition.
  arts: Luis Scrivano immerses themselves in Los Angeles’s vibrant art scene by frequenting LACMA, the Getty, and neighborhood galleries, collecting limited‑edition prints by Frida Kahlo and Diego Rivera,
    painting watercolors that echo folk motifs, they volunteer as a docent at a historic mission, and they dance salsa to the rhythms of Los Amigos de los Ritmos.
  travel: Luis Scrivano’s travel appetite blends cultural curiosity and modest budgeting, having explored the colonial streets of Oaxaca and Cartagena, dreaming of a Pacific Coast Highway road trip to visit
    coastal vineyards, and they meticulously plan each journey with a mix of online research, travel blogs, and a personal photography itinerary.
  culinary: Luis Scrivano’s kitchen is a hub of flavor where they master dishes like tamales, mole poblano, and chiles rellenos, savor the aroma of roasted chilies, cilantro, and fresh garden herbs, pair
    meals with a robust Malbec, and occasionally over‑season to impress dinner guests while proudly growing key ingredients in their backyard garden.
  core: Luis Scrivano is a detail‑driven drafting veteran turned cultural design advocate, whose sociable nature, art‑infused work, garden‑to‑table cooking, and chronic worry about deadlines combine into
    a lively yet slightly anxious, community‑centered life, and they constantly seek opportunities to mentor others.
background:
  cultural: Luis is a first‑generation Mexican American whose family originated from Jalisco, Mexico. Growing up in a bilingual household, he was immersed in Mexican traditions, language, and Catholic values,
    while also navigating the multicultural environment of Los Angeles. He actively participates in cultural celebrations such as Día de los Muertos, Mexican Independence Day parades, and local folk art
    festivals, often incorporating traditional motifs into his artistic and professional work. His Mexican heritage informs his appreciation for vibrant colors, intricate patterns, and community‑oriented
    values, which he brings to both his drafting projects and his interpersonal relationships.
