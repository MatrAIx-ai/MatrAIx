personas:
  professional: Kevin Ahouse, a retired handyman and community‑event organizer, they combine their hands‑on home‑repair expertise with a storyteller’s curiosity to spearhead senior‑center bingo nights,
    neighborhood block parties, and a fledgling safety‑watch program, all while their spontaneous nature and occasional difficulty meeting deadlines keep the planning process lively and a bit chaotic.
  sports: Kevin Ahouse, a devoted fan of the Providence Bruins and the New England Patriots, they spend mornings strolling the Blackstone River walkway, join a senior shuffleboard league at the community
    center, and occasionally volunteer at local 5K charity runs, though their spontaneous schedule sometimes causes them to miss a game or practice.
  arts: Kevin Ahouse, an avid listener of 1960s folk legends like Bob Dylan and Joan Baez and classic‑rock icons such as The Rolling Stones, they frequently revel in Providence’s WaterFire festivals and
    enjoy attending productions at Trinity Rep, often humming along while recounting neighborhood histories to fellow attendees.
  travel: Kevin Ahouse, who delights in spontaneous short drives to historic sites such as Newport’s mansions, the Mystic Seaport Museum, and Boston’s Freedom Trail, they dream of a summer road trip to
    Acadia National Park, always planning itineraries around community commitments and a modest travel budget.
  culinary: Kevin Ahouse, a proficient cook of classic New England dishes like clam chowder, baked beans, and lobster rolls, they cultivate tomatoes, zucchini, and herbs in a modest garden and regularly
    volunteer at a community kitchen where they serve hearty stews flavored with fresh rosemary and thyme, though they occasionally over‑season in an enthusiastic burst of flavor.
  core: Kevin Ahouse, a 78‑year‑old curious handyman with a heart for community, they balance spontaneous generosity with anxiety‑driven forgetfulness, forever humming classic‑rock tunes while fixing leaky
    faucets.
background:
  cultural: Kevin grew up in a modest, working‑class white family in Rhode Island, attending the local public high school before entering the workforce. His upbringing was shaped by New England values of
    self‑reliance, community involvement, and pragmatism, reinforced by the close‑knit neighborhoods of Central Falls and nearby Providence. He maintains strong ties to local traditions such as Fourth of
    July parades, church gatherings, and neighborhood block parties. His cultural identity reflects a blend of mid‑20th‑century American upbringing, a lifelong appreciation for the region’s maritime and
    industrial heritage, and a deep commitment to the multi‑generational fabric of his community.
attributes:
  skills: '["Home repair (plumbing, electrical, carpentry)", "Automotive troubleshooting and maintenance", "Cooking classic New England dishes", "Community event coordination", "Mentoring and storytelling
