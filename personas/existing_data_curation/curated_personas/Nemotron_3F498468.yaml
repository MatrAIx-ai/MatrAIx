personas:
  professional: Catherine Briganti, a retired office administrator now volunteering part-time at the local church's food pantry, leverages their sharp Excel budgeting, meticulous inventory control, and
    methodical approach to keep pantry supplies organized while preserving the quiet routine that steadies their day.
  sports: Catherine Briganti finds low-impact fitness in daily garden walks and a senior walking club that meets at the community center, while quietly cheering the New York Yankees and following the local
    high-school basketball team during weekend games.
  arts: Catherine Briganti immerses themselves in 1950s and 1960s jazz and swing, listening to Ella Fitzgerald, Louis Armstrong, and Duke Ellington, while devouring classics like Tolstoy's War and Peace,
    Jane Austen's Pride and Prejudice, and solving crossword puzzles that feed their love of language and structure.
  travel: Catherine Briganti prefers carefully planned, low-stress trips, such as weekend stays in historic Williamsburg, a day-trip ferry to Block Island, and a dreamed-for visit to a quiet village near
    Florence, always returning home to their garden and routine.
  culinary: Catherine Briganti delights in preparing traditional Italian-American fare like homemade Bolognese sauce, chicken parmigiana, and garlic-and-basil pesto, skillfully using fresh basil, oregano,
    and ripe tomatoes from their garden while humbly perfecting each recipe.
  core: Catherine Briganti is a meticulous, routine-loving retiree who balances quiet solitude with practical creativity, from garden-to-table cooking to hand-knit blankets, all while cautiously guarding
    their financial and health stability.
background:
  cultural: Catherine is a third‑generation Texan of Italian descent; her family name Briganti reflects roots in southern Italy, where family meals and Catholic traditions were central. Growing up in the
    coastal communities of Galveston County, she absorbed a blend of Southern hospitality, Christian church involvement, and the pragmatic work ethic common to the Gulf Coast. Her cultural identity is shaped
    by a respect for tradition, a strong sense of family responsibility, and an appreciation for simple, home‑cooked meals and community service, all of which are reflected in her daily routines and values.
attributes:
  skills: '[''Office administration'', ''Schedule management'', ''Record-keeping'', ''Basic accounting'', ''Microsoft Office (Word, Excel, Outlook)'', ''Home budgeting'', ''Gardening'', ''Traditional cooking'',
