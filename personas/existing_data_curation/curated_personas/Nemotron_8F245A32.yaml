personas:
  professional: Harry Medina, a seasoned painting and paperhanging contractor with a graduate STEM background, merges scientific precision with hands‑on Texan workmanship to deliver low‑VOC, custom decorative
    finishes while they juggle a competitive drive and a laid‑back, sometimes disorganized, project schedule.
  sports: Harry Medina, a member of the Temple Softball Club and a regular participant in the Central Texas Paintball League, spends Saturdays catching flies on the Guadalupe River, cheering on the Dallas
    Cowboys and Texas Rangers, and hitting the trails for hikes to Enchanted Rock, all while they maintain a competitive edge that often outweighs a cooperative team spirit.
  arts: Harry Medina, the lead guitarist of a local cover band that riffs on George Strait, Willie Nelson, and Johnny Cash hits, also captures Hill Country sunsets with their DSLR, and finds inspiration
    in the works of Ansel Adams and the storytelling of Texas‑born playwright Lanford Wilson, weaving music and photography into their community gatherings.
  travel: Harry Medina prefers spontaneous road trips across the Texas Hill Country, cruising to the Hill Country wineries, weekend camping at Pedernales Falls, and occasional out‑of‑state trips to New
    Mexico’s Santa Fe for art festivals, and they balance their love for low‑key adventure with a modest budget funded by their painting business profits.
  culinary: Harry Medina, an avid pitmaster, frequently fires up a smoker for Texas‑style brisket, pork ribs, and jalapeño cornbread, while also whipping up chicken‑fried steak with homemade gravy, and
    their pantry is stocked with hickory chips, mesquite seasoning, and fresh local produce for their beloved pecan pie.
  core: Harry Medina, a 47‑year‑old Texas‑rooted painter‑scientist, blends analytical curiosity with a relaxed, competitive spirit, thriving on community, music, and a DIY mindset, even if they sometimes
    let a disorganized schedule get in the way.
background:
  cultural: Harry grew up in a traditional Central Texas environment, where southern hospitality, community involvement, and a love for the outdoors are core values. His family roots trace back to Anglo‑American
    settlers, and he identifies strongly with Texan culture—pride in state heritage, appreciation for country music, high school football weekends, and a hearty fondness for barbecue. Raised in a Christian
    community, he maintains ties to his local church and regularly participates in neighborhood festivals. His graduate STEM education, likely obtained at a Texas state university, adds a layer of analytical
    perspective to his practical trade, bridging the inventive curiosity of scientific study with the grounded, hands‑on ethos of Texan workmanship.
attributes:
  skills: '[''Advanced interior and exterior painting techniques'', ''Precision paper hanging and wallpaper installation'', ''Surface preparation including lead‑safe removal and moisture detection'', ''Color
    theory and custom decorative finishes'', ''Interpretation of technical drawings and layout plans'', ''Knowledge of building codes and safety regulations'', ''Project estimating and budgeting with software
    tools'', ''Problem solving for material compatibility and sustainable paint solutions'', ''Client communication, negotiation, and team coordination'']'
  hobbies: '[''Playing guitar in a local cover band'', ''Amateur softball leagues and paintball matches'', ''Fishing and hiking in the Texas Hill Country'', ''DIY home‑renovation and woodworking projects'',
    ''Attending painting trade shows and technology workshops'', ''Reading popular‑science books and listening to podcasts'', ''Landscape and architectural photography'', ''Hosting backyard barbecues'',
    ''Volunteering on the Temple Chamber of Commerce event committee'']'
  career_goals: Harry aims to transition from subcontractor to owner of a thriving painting and finishing company serving Central Texas. He plans to differentiate his business by offering certified low‑VOC,
    eco‑friendly paint options and high‑end decorative finishes for both residential and commercial projects. Leveraging his scientific background, he aspires to develop proprietary paint‑mixing formulas
    that boost durability and reduce environmental impact. He seeks to mentor apprentices, build a reputation that earns local trade awards, and become a go‑to consultant for industry workshops. Ultimately,
    Harry envisions using his profits to support community projects such as restoring historic buildings in Temple while maintaining a work‑life balance that allows time for family and hobbies.
