  hobbies: '[''Abstract painting'', ''Reading philosophy and poetry'', ''Attending jazz and gospel concerts'', ''Gardening'', ''Cooking Creole dishes'', ''Bridge'', ''Genealogy research'', ''Volunteer mentoring'',
    ''Community theater'']'
  career_goals: Although fully retired, Breana aims to leave a lasting cultural legacy in her community. She plans to curate a traveling exhibition of senior‑generated artworks, publish an illustrated memoir
    that weaves family history with Baton Rouge’s civil‑rights narrative, and establish a weekly storytelling circle at the local senior center. She also aspires to become proficient in digital photography
    to archive community events and hopes to serve on the parish’s cultural advisory board, where she can champion arts education and intergenerational programs.
