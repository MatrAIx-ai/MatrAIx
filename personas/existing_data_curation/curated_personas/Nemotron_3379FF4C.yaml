personas:
  professional: Breana Ward, a retired church and senior‑center event coordinator, merges their organized mindset with a vivid imagination to design community art exhibitions, mentor younger neighbors in
    digital storytelling, and produce abstract mixed‑media works that reflect Baton Rouge’s cultural tapestry.
  sports: Breana Ward, an avid bridge competitor and line‑dancing enthusiast, walks three times a week with the Baton Rouge senior walking club, follows the LSU Tigers football schedule, and occasionally
    roots for the New Orleans Saints, treating each activity as a friendly contest.
  arts: Breana Ward, an abstract painter who draws inspiration from Frida Kahlo’s bold palettes, John Coltrane’s improvisational spirit, and B.B. King’s soulful blues, attends weekly jazz, gospel, and swing
    dance nights, and curates a monthly collage showcase at the local library.
  travel: Breana Ward, a culturally curious traveler who favors immersive, modestly budgeted trips, has explored New Orleans’ culinary scene, Savannah’s historic districts, Montreal’s jazz festivals, and
    dreams of studying plein‑air painting in Paris’s Montmartre.
  culinary: Breana Ward, a beloved home chef, reimagines classic Creole staples such as gumbo, étouffée, and red beans and rice by incorporating garden‑fresh thyme, bay leaf, and crisp okra, while mastering
    the balance of Cajun spice and artistic plating.
  core: Breana Ward is a fiercely competitive, endlessly curious 75‑year‑old whose artistic imagination fuels community activism, garden stewardship, and a relentless pursuit of cultural legacy, even as
    they sometimes indulge in skeptical doubts and an over‑packed schedule.
background:
  cultural: Breana’s cultural identity is rooted in the rich tapestry of African‑American life in the Deep South. Raised in Baton Rouge during the desegregation era, she carries memories of the civil‑rights
    movement, church choirs, and community solidarity. Her family traditions blend Southern hospitality with Creole culinary flavors, and she grew up listening to gospel, jazz, and blues that shaped her
    artistic sensibility. The city’s French‑Creole heritage influences her cooking and love of local festivals, while the African‑American church remains a central pillar of her social network. Her oral‑history
    work reflects a deep respect for preserving the stories of older Black residents and honoring the intergenerational resilience that defines her community.
