  career_goals: Olga dreams of becoming a marine biologist and bilingual science communicator, focusing on protecting coastal ecosystems around Puerto Rico while sharing her discoveries with both English‑
    and Spanish‑speaking audiences. She envisions a career that blends her deep curiosity about marine life with practical fieldwork, offering flexible schedules for research trips and opportunities for
    competitive scientific inquiry. By leveraging her bilingual abilities, she hopes to mentor other Latino children in science and inspire them to explore the natural world.
