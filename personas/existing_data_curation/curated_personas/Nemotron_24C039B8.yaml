personas:
  professional: Olga Cifuentes is a budding game developer who merges her love for drawing vivid scenes, building complex LEGO creations, and coding simple Scratch games, tackling each project with a curious
    yet practical mindset and a competitive edge that drives her to polish prototypes despite a relaxed attitude toward strict deadlines.
  sports: Olga Cifuentes plays for the neighborhood youth soccer club ‘Sunrise Sprinters’, competes in Saturday morning matches, roots for the professional soccer team FC Stars, and channels their competitive
    spirit into video game tournaments for Minecraft and Mario Kart, maintaining a lively balance between physical activity and digital challenges.
  arts: Olga Cifuentes channels their imagination into vibrant drawings, LEGO sculptures, and weekly comic strips, drawing inspiration from artists like Kazu Kibuishi and the whimsical worlds of Hayao Miyazaki’s
    Spirited Away, while they groove to salsa legend Celia Cruz and reggaeton hitmaker Bad Bunny during family gatherings, shaping a playful yet disciplined artistic identity.
  travel: Olga Cifuentes loves family road trips that blend spontaneous ice‑cream stops with planned visits to museums, having already explored the local science center and the beach town of Santa Monica,
    and they dream of a future adventure to Tokyo’s Akihabara district to hunt for rare manga and video game collectibles.
  culinary: Olga Cifuentes enjoys the comforting flavors of homemade cheese pizza, chicken nuggets with honey‑glazed carrots, and sweet mango smoothies, often helping their parents mix batter for cupcakes
    and sprinkle chocolate chips, while proudly claiming their favorite snack of peanut‑butter‑and‑jelly sandwiches.
  core: Olga Cifuentes is a creative, competitive nine‑year‑old who turns anxiety into art, balances a love for LEGO and coding with spontaneous soccer games, and habitually overpacks their backpack with
    sketchbooks, snack wrappers, and stray LEGO bricks.
background:
  cultural: Olga grows up in a Puerto Rican household in Buffalo, NY, where Spanish is spoken at home and English dominates at school. Family traditions such as preparing arroz con gandules, celebrating
    Three Kings Day, and listening to plena and bomba music keep her connected to her island roots. She participates in local Latino festivals and community events, which blend Caribbean rhythms with the
    seasonal rhythms of upstate New York. This bicultural experience enriches her identity, giving her a strong sense of community, bilingual confidence, and a deep appreciation for both her Puerto Rican
    heritage and her American surroundings.
