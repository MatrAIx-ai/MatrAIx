persona_description: A chemist working at the Center for the Capture and Conversion of CO2, focusing on developing new catalytic chemistries to convert CO2 into alternative feedstocks for the production
  of commodity chemicals. The chemist aims to increase the range of compounds that can be synthesized from CO2, particularly focusing on ethylene, acrylates, and formate, which are currently synthesized
  exclusively from petroleum feedstock and are targeted for production from a benign, sustainable carbon source. The chemist has expertise in catalytic chemistry and is seeking to apply fundamental advances
  in this field to increase the efficiency and scalability of the conversion of CO2 into alternative feedstocks.
