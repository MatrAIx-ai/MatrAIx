  career_goals: Dennis aims to earn a bachelor's degree in fire science and public administration within the next three years, positioning himself for promotion to Battalion Chief and, ultimately, Fire
    Chief. He plans to obtain advanced NFPA certifications in Incident Command System and fire investigation, and to spearhead the department's adoption of modern technologies such as drones and predictive
    analytics for response optimization. A personal ambition is to launch a community‑wide fire‑safety art program that uses his artistic talents to create murals, story‑books, and interactive workshops
    for children, blending creativity with public education. He also seeks to develop a comprehensive training curriculum that integrates stress‑management and mental‑health support for first responders.
