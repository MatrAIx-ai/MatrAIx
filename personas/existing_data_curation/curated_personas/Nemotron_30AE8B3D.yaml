  hobbies: '[''Journaling'', ''Reading (YA fiction, self‑help)'', ''Baking and cooking'', ''Gardening'', ''Listening to music'', ''Crafting (knitting, crocheting)'', ''Walking in local parks'', ''Pet sitting'',
    ''Playing team‑based video games'', ''Volunteer work at community center'']'
  career_goals: Awilda aims to complete her GED within the next year and then enroll in a community‑college program that offers a clear, structured pathway—such as a Certified Nursing Assistant credential
    or a culinary arts certificate. She seeks a stable job that provides a predictable schedule and the opportunity to help others, ideally in a local healthcare setting or a kitchen environment. In the
    longer term, she hopes to become a peer counselor or volunteer coordinator, using her empathy and cooperative spirit to support other teens dealing with anxiety and emotional distress. Financial independence
    and the ability to support her family are also central to her ambitions.
