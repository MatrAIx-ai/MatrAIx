personas:
  professional: Giselle Alvarado, a seasoned construction specialist known for precise concrete formwork, adept operation of small‑to‑medium heavy machinery, and bilingual blueprint reading, consistently
    applies her practical mindset and organized scheduling to keep job sites safe and on time while actively pursuing OSHA certification and a foreman role.
  sports: Giselle Alvarado stays active by hiking the hills surrounding Caguas on weekends, participates in a local women’s hiking club, follows the Caguas Sabuesos baseball team, enjoys occasional pick‑up
    basketball games at the community center, and incorporates salsa dancing as a cardio workout, balancing structured cardio sessions with spontaneous social sports.
  arts: Giselle Alvarado nurtures her creative side by attending salsa and bachata nights featuring artists like Marc Anthony and Eddie Santiago, reading historical fiction such as Laila Lalami’s “The Moor’s
    Account,” and collecting vibrant folk art prints from local craftsmen, which together inform her appreciation for rhythm, story, and visual culture.
  travel: Giselle Alvarado plans trips with detailed itineraries yet leaves room for spontaneous detours, having explored Old San Juan, the rainforest trails of Costa Rica, and the historic streets of Barcelona,
    while dreaming of a future eco‑tourism hike through the Andes, always balancing budget constraints with a desire for cultural immersion.
  culinary: Giselle Alvarado, an accomplished home cook, expertly prepares mofongo with crispy plantains, sofrito, and chicharrón, seasons arroz con gandules with recao, cilantro, and pigeon peas, enjoys
    experimenting with a fusion pastelón that blends tropical fruit salsa, and often finishes meals with a drizzle of homemade piña colada glaze.
  core: Giselle Alvarado builds safe structures by day, dances to salsa beats by night, runs a tight budget, monitors her blood pressure, and occasionally forgets to water her garden, embodying a pragmatic
    yet rhythm‑driven approach to life.
background:
  cultural: Giselle is a proud Puerto Rican native of Caguas, a city known for its vibrant festivals and strong sense of community. She grew up immersed in the island’s music, from plena to bomba, and the
    Catholic traditions that shape local celebrations. Family gatherings centered around food, storytelling, and music have taught her the importance of cooperation and harmony—values she carries into her
    professional life. Bilingual in Spanish and English, she navigates both island culture and broader American influences, blending resilience and optimism that reflect Puerto Rico’s enduring spirit.
