  career_goals: Giselle aspires to move into a supervisory role, such as foreman or site safety officer, within the next few years. She plans to earn an OSHA certification and complete a certificate program
    in construction management to complement her real‑world experience. Long‑term, she hopes to lead community‑focused renovation projects in Caguas, eventually establishing a small contracting firm that
    emphasizes affordable housing and sustainable building practices while mentoring younger workers from her neighborhood.
