  hobbies: '[''Knitting'', ''Gardening'', ''Yoga and Mindfulness Meditation'', ''Reading (fiction and self‑help)'', ''Nature Walks and Photography'', ''Community Volunteering at Food Pantry'', ''Cooking
    Healthy Meals'']'
  career_goals: Emily aims to become a Lead Teacher and eventually a Program Director at a licensed early childhood center in Minneapolis. She plans to complete her associate degree in Early Childhood Education
    and pursue a state teaching credential, allowing her to advocate for higher standards in childcare. Long‑term, she envisions opening a small, family‑run daycare that emphasizes structured yet nurturing
    environments, offering professional development workshops for fellow childcare workers to improve stress‑management and organizational skills. She is also interested in participating in local policy
    initiatives that support affordable, high‑quality childcare for working families.
