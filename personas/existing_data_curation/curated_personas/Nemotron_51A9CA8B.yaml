  hobbies: '[''Reading non‑fiction'', ''Indoor herb gardening'', ''Cooking South Asian cuisine'', ''Morning beach walks'', ''Birdwatching'', ''Crossword puzzles'', ''Yoga'', ''Photography'']'
  career_goals: Rizalina aims to move into a supervisory or facilities‑management role within the next three years. She plans to earn professional certifications such as the ISSA Cleaning Management Technician
    and to expand her expertise in green building standards. Her long‑term ambition is to lead a sustainability program for a large property, where she can train a team, introduce low‑impact cleaning solutions,
    and improve operational efficiency. She also hopes to complete a bachelor’s degree in environmental studies to complement her practical experience.
