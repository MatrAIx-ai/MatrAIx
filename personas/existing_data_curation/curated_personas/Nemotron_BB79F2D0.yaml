personas:
  professional: America Velezvalentin, an organized middle‑school student who follows a self‑made schedule to create daily digital illustrations in Procreate, write beginner Python scripts, and contribute
    to the school’s art club, turning their heightened emotional sensitivity into compelling character designs.
  sports: America Velezvalentin, a quiet participant in the Riverside Aquatics Club’s junior swimming program who also dabbles in cross‑country running during the fall, follows the Los Angeles Lakers for
    basketball inspiration and the Chicago Cubs for baseball, and they prefer solitary laps and long runs over team drills.
  arts: America Velezvalentin, a passionate visual artist who devours graphic novels such as Saga, Monstress, and Fullmetal Alchemist, draws inspiration from the line work of Kadir Nelson and the whimsical
    palettes of Hayao Miyazaki’s Studio Ghibli, spends weekends at the city art museum’s teen workshop program, and they curate personal playlists featuring Max Richter’s ambient scores and Claude Debussy’s
    piano preludes while sketching.
  travel: America Velezvalentin, a meticulous planner who delights in short family trips to Washington, D.C.’s National Gallery and New York City’s Met Museum, dreams of exploring Kyoto’s historic temples
    and the Studio Ghibli Museum, and they currently limit travel to weekend drives to nearby state parks due to school commitments and a modest allowance.
  culinary: America Velezvalentin, a modest home chef with a moderate skill level who enjoys crafting homemade miso ramen bowls, avocado toast sprinkled with furikake, and fluffy blueberry pancakes, often
    experiments with matcha powder and lavender honey for artistic plating, and they balance meals with a soothing green tea latte.
  core: America Velezvalentin, an introspective 11‑year‑old whose disciplined pursuit of art and coding masks intense anxiety, a habit of over‑planning every spare minute, and a tendency to retreat into
    solitary creative worlds, and they often find solace in sketchbooks.
background:
  cultural: America comes from a Nicaraguan family that speaks Spanish at home and preserves traditions such as celebrating La Purísima, preparing gallo pinto, and participating in community dance events.
    Growing up in Valencia, California, he blends this heritage with the multicultural atmosphere of Southern California, often attending local cultural festivals that showcase Central American art and
    music. His bilingual upbringing influences his artistic perspective, prompting him to incorporate Nicaraguan motifs and stories into his drawings.
attributes:
  skills: '[''Traditional drawing'', ''Digital illustration'', ''Sketchbook organization'', ''Basic Python programming'', ''Research and reference gathering'', ''Creative writing'', ''Emotional self‑awareness'']'
  hobbies: '[''Sketching'', ''Digital painting'', ''Reading graphic novels'', ''Journaling'', ''Playing chess'', ''Coding with Scratch and Python'', ''Visiting art museums'', ''Listening to ambient music'']'
  career_goals: He aspires to build a professional portfolio that could earn him admission to a specialized arts high school or a youth mentorship program in illustration. His long‑term ambition is to become
    a concept artist for video games or animated films, where he can merge his love of storytelling, visual art, and technology. He also dreams of using his artistic voice to raise awareness about mental‑health
    issues and Nicaraguan cultural heritage, hoping to exhibit his work in community galleries.
