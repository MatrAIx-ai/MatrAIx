  career_goals: Sandy aims to earn her GED within the next year and then enroll in a community college to study business administration. In the short term, she plans to secure a part‑time administrative
    assistant position at a local clinic or small business to gain practical experience and develop a stable routine. Long‑term, she aspires to become an office manager or launch an online Etsy shop selling
    hand‑crafted home décor, valuing a structured work environment that helps mitigate stress and provides reliable income.
