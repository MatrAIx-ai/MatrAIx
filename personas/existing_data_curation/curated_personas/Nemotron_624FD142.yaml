personas:
  professional: A meticulous aspiring administrative assistant, Sandy Perry leverages their Excel budgeting prowess and methodical planning to keep a local clinic’s schedules running like clockwork, while
    they let their competitive streak drive them to perfect every detail and their cautious skepticism guarantees no slip‑ups.
  sports: Sandy Perry fuels their competitive spirit by cheering on the Mississippi State Bulldogs during fall football, supporting the New Orleans Saints in the winter, and joining a casual community softball
    league on Saturdays, while they also stay active by walking their dog along forest trails near Poplarville.
  arts: Sandy Perry immerses themselves in the soulful twang of country legends like Dolly Parton and modern storyteller Luke Combs, while the smooth blues of B.B. King and the harmonious hymns of their
    church choir provide the soundtrack for their nightly knitting sessions.
  travel: Sandy Perry prefers budget‑friendly road trips that blend scenic nature with cultural stops, orchestrating weekend getaways to the Gulf Coast’s sandy shores and dreaming of a future pilgrimage
    to Nashville’s music scene, all while they juggle a modest student budget from their part‑time job.
  culinary: Sandy Perry’s culinary talent shines in the kitchen where they master Southern staples like crispy fried catfish, smoky pulled‑pork barbecue, and collard greens seasoned with garden‑grown thyme
    and hot sauce, often showcasing these dishes at church potlucks that double as community bonding events.
  core: A detail‑obsessed planner with a competitive streak and a habit of journaling every worry, Sandy Perry balances a love for structured work with secret late‑night video‑game marathons that they treat
    as their stress‑relief outlet.
background:
  cultural: Sandy was raised in Poplarville, a small town in Pearl River County, Mississippi, where Southern traditions shape daily life. Her family places high value on hospitality, church involvement,
    and community gatherings centered around food, high‑school football games, and local festivals. She grew up with a love for country and blues music, Southern cuisine such as fried catfish and barbecue,
    and a strong sense of self‑reliance and family loyalty that characterize the region’s cultural fabric.
attributes:
  skills: '["Time management", "Event planning", "Microsoft Excel", "Microsoft Word", "Basic bookkeeping", "Household budgeting", "Meal preparation", "Gardening", "Data entry", "Critical thinking"]'
