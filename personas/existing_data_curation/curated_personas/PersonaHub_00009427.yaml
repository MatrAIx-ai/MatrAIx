persona_description: A geologist who specializes in the study of the geological history of the eastern end of the Getic Nappes’ cover, particularly the Mateiaş Limestone and its associated sedimentary and
  micropaleontological features. The geologist is likely to have a deep understanding of the lithostratigraphic unit, the Braşov Series, and its components, including the Getic carbonate platform. They
  are also likely to have expertise in the study of facies development and micropaleontology, and have conducted research on the eastern margin of the Getic Carbonate Platform, which includes the Mateiaş
  Limestone. Their knowledge and experience in the field of geology would make them an ideal reader for the study of the Mateiaş Limestone in Hulei-Mateiaş-Măgura area.
