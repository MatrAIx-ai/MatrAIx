personas:
  professional: Blake Knight is a budding architectural technologist who blends AutoCAD, Revit, and SketchUp expertise with hands-on construction site experience, leveraging a curious yet laid-back mindset
    to innovate desert-adapted designs while occasionally letting loose organization slip under tight deadlines.
  sports: Blake Knight fuels their fitness by kayaking on Lake Havasu, tackling desert trail hikes with the Havasu Hiking Club, and cheering on the Arizona Cardinals and Phoenix Suns, while they occasionally
    join a local pickup basketball league at the Havasu Community Center.
  arts: Blake Knight captures sunrise-lit landscapes with a DSLR, draws inspiration from sci-fi authors like Neal Stephenson and visualizes cityscapes while playing SimCity, and unwinds at local venues
    listening to The Strokes and Tame Impala live, all of which shape their creative design language.
  travel: Blake Knight dreams of weekend road trips that blend desert exploration and cultural immersion, having already explored Sedona's red rocks, the Grand Canyon's South Rim, and Las Vegas's neon nights,
    while they aspire to trek Iceland's volcanic terrain for its stark, sustainable architecture inspiration.
  culinary: Blake Knight enjoys cooking grilled fish tacos with fresh lime, cilantro, and chipotle salsa, boasts a solid intermediate skill level in the kitchen, and experiments with 3D-printed chocolate
    garnish, while they frequently indulge in hearty breakfast burritos on lazy mornings.
  core: Blake Knight is a curiosity-driven, sun-soaked architect-in-training who habitually juggles loose organization with a passion for sustainable desert design, often worrying about deadlines yet finding
    solace in sunrise photography and impulsive weekend adventures.
background:
  cultural: Blake grew up in a middle‑class family in the Southwest, where the desert environment and outdoor recreation shaped his worldview. His upbringing emphasized self‑reliance, a strong work ethic,
    and community ties common to small‑town Arizona. Family gatherings featured classic American traditions—barbecues, Fourth of July fireworks, and a love for sports—while weekend trips to nearby national
    parks fostered an appreciation for natural beauty. This regional culture influences his aesthetic preferences for open, sun‑filled spaces and his desire to create architecture that respects the arid
    landscape. Although his ethnic background is white, he identifies strongly with the laid‑back, rugged spirit of the Arizona desert, blending it with a modern curiosity for technology and sustainable
    design.
attributes:
