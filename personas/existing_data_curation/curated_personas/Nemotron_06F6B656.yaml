  hobbies: '["Boating on Lake Havasu", "Desert hiking", "Landscape photography", "Arduino tinkering", "3D‑printing model building", "Architecture simulation video games", "Science‑fiction reading", "Live‑music
    concerts", "Community habitat restoration volunteering"]'
  career_goals: Blake aims to earn a professional architecture license within the next three years while pursuing a bachelor’s degree in architecture or engineering part‑time. He envisions leading larger,
    more complex desert‑adapted projects that blend sustainable design with the unique aesthetic of the Southwest. In the longer term, he hopes to open his own boutique firm that specializes in low‑impact
    residential developments around Lake Havasu. To support these goals, Blake plans to improve his project management workflow, adopt more structured planning tools to reduce his stress, and attend industry
    conferences to expand his professional network. He also aspires to mentor younger apprentices, sharing the practical, curiosity‑driven approach that has shaped his own career.
