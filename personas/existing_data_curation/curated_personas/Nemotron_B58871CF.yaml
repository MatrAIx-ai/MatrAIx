personas:
  professional: June Keith, a 60-year-old veteran truck driver and delivery sales representative in central North Carolina, blends three decades of route-optimization savvy, hands-on vehicle maintenance,
    and personable customer negotiation to mentor younger drivers, while their preference for routine and relaxed approach to paperwork sometimes leads to loosely organized records.
  sports: June Keith follows the Carolina Panthers avidly, enjoys cheering on the local high-school football team on Saturdays, participates in senior center dance nights for light cardio, and occasionally
    joins a community bowling league, combining fandom with low-impact activity to stay active.
  arts: June Keith sings in the church choir, relishes classic R&B shows featuring Aretha Franklin, Otis Redding, and Marvin Gaye, and finds creative release crafting quilts alongside friends, with their
    love of soulful music and textile art shaping evenings at community gatherings.
  travel: June Keith prefers road-trip adventures within the Southeast, having explored the Blue Ridge Parkway, the historic streets of Savannah, and the beaches of Myrtle Beach, while dreaming of a pilgrimage
    to New Orleans for its jazz heritage and Cajun cuisine, all planned around modest savings and family commitments.
  culinary: June Keith cultivates tomatoes, collard greens, and roses in the backyard, prepares Southern staples like fried chicken, collard greens with smoked turkey, and peach cobbler, enjoys swapping
    recipes at potlucks, and while proficient in home cooking, they often indulge in sweet tea and occasionally over-salt a dish in haste.
  core: June Keith is a sociable, routine-loving 60-year-old truck driver turned mentor who balances a warm, community-centered life with occasional disorganized paperwork, impulsive car-part purchases,
    and a steadfast love for gospel choir, quilting, and classic R&B.
background:
  cultural: June grew up in a close‑knit African‑American community in Winston‑Salem, where family, church, and neighborhood ties have shaped her values. Her parents were active members of the First Baptist
    Church, instilling a tradition of gospel music, communal service, and soulful cooking. She learned the art of soul food recipes—like fried chicken, collard greens, and cornbread—from her grandmother,
    and these meals remain central to family gatherings. The historic Black neighborhoods of East Forsyth and Bethany have provided a supportive network that emphasizes resilience, mutual aid, and celebration
    of heritage. Through her life, June has blended Southern Black cultural customs with the practical demands of her work, maintaining a strong sense of identity while adapting to the evolving social landscape
    of the Triad region.
