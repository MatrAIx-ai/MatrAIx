  hobbies: '[''Church choir and gospel events'', ''Community potlucks'', ''Backyard gardening'', ''Quilting circles'', ''Card games and bridge club'', ''Senior center dance nights'', ''Watching R&B and
    soul music shows'', ''Following Carolina Panthers football'', ''Volunteering to drive seniors to appointments'', ''Attending local car and truck shows'']'
  career_goals: June aims to secure a stable, well‑compensated position that allows her to maintain a predictable routine while she transitions toward retirement. She hopes to achieve a supervisory role
    overseeing a small team of drivers, where she can mentor younger workers in safety practices and customer relations. She also plans to obtain a forklift certification to broaden her logistical capabilities
    and to explore a part‑time consulting role with a local community college’s transportation program. Ultimately, she wants to ensure she retires with sufficient savings and health benefits, while remaining
    actively involved in her church’s outreach programs that sometimes require transportation logistics.
