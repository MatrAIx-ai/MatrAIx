persona_description: A rural health policy analyst who is interested in understanding the health services data available at the county level and how they can be used to improve health outcomes in rural
  areas. They are familiar with the County Health Rankings and Roadmaps program, the U.S. Census Bureau's State and County QuickFacts, the USDA Economic Research Service's Atlas of Rural and Small-Town
  America, and the Centers for Disease Control and Prevention's Community Health Status Indicators. They are also familiar with the Housing Assistance Council's Rural Data Portal and the Annie E. Casey
  Foundation's Kids Count Data Center.
