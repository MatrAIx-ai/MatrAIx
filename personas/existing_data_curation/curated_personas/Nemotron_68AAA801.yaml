  career_goals: John aims to become a senior leader in the field of operations research, directing high‑impact projects that improve urban sustainability and public welfare in the Denver region. He aspires
    to earn a master's degree in applied analytics or a PhD to deepen his expertise and publish research on renewable‑energy optimization and equitable transportation systems. Over the next five years,
    he envisions leading a multidisciplinary team that blends data science with design thinking to create interactive decision‑support tools for city planners and non‑profit organizations. He also hopes
    to mentor emerging analysts, champion inclusive data practices, and eventually transition into a policy‑advisory role where his analytical insights can shape regional and national strategies for climate
    resilience.
