personas:
  professional: Shannon Shova is a middle‑school science communicator who blends hands‑on robotics tinkering, Python scripting, and video editing to create engaging experiment demos for their YouTube channel,
    leveraging their competitive debate style, and they argue scientific concepts clearly.
  sports: Shannon Shova plays forward on the middle‑school soccer team, hikes the Cascade trails on weekends with the local youth outdoor club, cheers for the Seattle Sounders FC and the Seattle Kraken,
    and they channel their competitive drive into both team sports and individual endurance challenges.
  arts: Shannon Shova edits science experiment videos with a flair for cinematic cuts inspired by Christopher Nolan, draws detailed nature sketches of Cascade vistas, reads Brandon Sanderson and N.K. Jemisin,
    and they stream Grimes and Tame Impala to fuel their creative mood.
  travel: Shannon Shova loves weekend trips to Mount Rainier and day hikes in the Cascades, has visited Vancouver on a school trip, dreams of exploring Kyoto’s robotics museums and the sci‑fi conventions
    in Tokyo, and they prefer budget‑friendly hostels and excursions with friends.
  culinary: Shannon Shova prefers quick, energizing meals like ramen with extra veggies, homemade trail mix with dried berries and nuts, and occasionally attempts to bake chocolate chip cookies, but they
    often grab snack‑sized chips and soda during late‑night gaming sessions.
  core: Shannon Shova is a curiosity‑driven teen who, despite intense gaming sessions and occasional anxiety, they manage to balance robotics and debate with a habit of late‑night snack binges.
background:
  cultural: Shannon comes from a White, middle‑class family that has lived in Burlington, WA for several generations. The region’s strong connection to the outdoors—fishing, hiking, and a community focus
    on environmental stewardship—has shaped her values of practicality and respect for nature. Her household celebrates typical American traditions such as Thanksgiving, Fourth of July fireworks, and local
    festivals that highlight the Skagit River’s salmon runs. Exposure to the Pacific Northwest’s tech scene, through school’s STEM programs and community events, has fostered her curiosity about science
    and technology while keeping her grounded in the collaborative, community‑oriented culture of a small town.
