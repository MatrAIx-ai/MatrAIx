  career_goals: Shannon dreams of turning her curiosity about the natural world into a career that blends scientific discovery with practical solutions. She hopes to study environmental science or marine
    biology in college and eventually work on conservation projects that protect the Skagit River ecosystem. At the same time, she is intrigued by technology and plans to learn advanced programming and
    robotics, aiming for a role as a software engineer or technologist who designs tools for sustainable agriculture. She wants a career that challenges her competitively, lets her lead projects, and offers
    the independence to follow her own ideas.
