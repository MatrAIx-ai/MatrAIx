  hobbies: '[''Abstract painting'', ''Experimental photography'', ''Digital collage'', ''Speculative fiction reading'', ''Art gallery visits'', ''Hiking'', ''Gardening'', ''Book club'', ''3D printing'',
    ''Amateur astronomy'', ''Sketching celestial maps'']'
  career_goals: She aims to transition into a senior supervisory role where she can lead a radiology department in adopting cutting‑edge imaging technologies, such as AI‑assisted diagnostic tools. She also
    wishes to pursue a certification in advanced MRI techniques and to spearhead a research project exploring the intersection of medical imaging and visual arts, culminating in an exhibition of clinically
    derived imagery. Long‑term, she envisions teaching part‑time at a community college, mentoring the next generation of technologists, and perhaps establishing a small studio where she fuses her radiologic
    expertise with experimental photography.
