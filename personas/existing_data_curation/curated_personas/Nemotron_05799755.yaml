  career_goals: Marilyn aims to advance to an Office Manager or Operations Manager role within the next three to five years, leveraging her on‑the‑job experience to oversee larger teams and more complex
    projects. She plans to earn a GED followed by a certification in project management (PMP) to strengthen her credentials. Long‑term, she envisions launching a consulting practice that helps small businesses
    improve office efficiency and productivity, positioning herself as a recognized expert in pragmatic workflow solutions.
