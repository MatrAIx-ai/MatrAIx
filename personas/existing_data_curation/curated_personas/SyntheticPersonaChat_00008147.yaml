    User 2: It is! And it''s also a great way to get away from the hustle and bustle of everyday life.

    User 1: That''s true. I could definitely use a break from all the stress of work.

    User 2: So what are you waiting for? Book a trip to the desert and go camping!

    User 1: I will! Thanks for the suggestion!

    User 2: You''re welcome!

    User 1: So what do you do for a living?

    User 2: I''m a nurse.

    User 1: Oh, that''s cool! I''ve always thought about being a nurse.

    User 2: It''s a great job! I love helping people.

    User 1: That''s what I''ve heard. I think it''s a really rewarding career.

    User 2: It is! I get to make a difference in people''s lives every day.

    User 1: That''s amazing! I''m sure you''re a great nurse.

    User 2: Thanks! I try my best.

    User 1: So what''s your favorite thing about being a nurse?

    User 2: My favorite thing is being able to help people and make a difference in their lives.

    User 1: That''s really great! I''m sure you''re a great nurse.

    User 2: Thanks! I try my best.'
