personas:
  professional: Shan Mitchell, an 81‑year‑old community arts facilitator, leverages decades of oral storytelling, event coordination, and a vivid imagination to curate intergenerational workshops, while
    their relaxed planning style and healthy skepticism keep projects both spontaneous and grounded.
  sports: Shan Mitchell, an avid member of the East Baltimore Senior Fitness Club, embraces weekly low‑impact dance classes, morning walks in the community garden, and seasonal cheering for the Baltimore
    Orioles baseball team, preferring gentle movement over high‑intensity sports.
  arts: Shan Mitchell, a devoted painter and poet, draws inspiration from Mark Rothko’s abstract color fields, Miles Davis’s improvisational jazz, and spoken‑word artist Saul Williams, regularly attending
    the local Creative Arts Center’s open‑mic nights and curating book‑club discussions featuring magical realism works by Isabel Allende.
  travel: Shan Mitchell prefers relaxed, culturally immersive trips, often joining senior‑friendly guided tours to historic Charleston, savoring live jazz in New Orleans, and strolling the gardens of the
    Biltmore Estate in Asheville, balancing wanderlust with a modest travel budget and a penchant for staying with friends or at community‑run B&Bs.
  culinary: Shan Mitchell, a passionate home cook, excels at crafting soulful dishes such as braised collard greens, spiced sweet‑potato casserole, and slow‑cooked pork shoulder glazed with honey‑chipotle,
    often pairing them with fresh herbs from their garden and sprinkling in unexpected ingredients like smoked paprika or miso.
  core: Shan Mitchell, an 81‑year‑old storytelling dynamo, blends relentless curiosity for abstract art with a relaxed, sometimes chaotic approach to life, turning community gatherings into vibrant tapestries
    of poetry, paint, and pragmatic skepticism.
background:
  cultural: Eldest of a close-knit African-American family that migrated from rural Virginia to Baltimore during the 1950s Great Migration, Shan grew up in the heart of West Baltimore's vibrant black community.
    Her upbringing was steeped in the rhythms of church gospel, the storytelling traditions of the neighborhood, and the civil-rights activism that shaped her generation. She celebrates cultural milestones
    such as Juneteenth and Black History Month, and maintains strong ties to local black institutions like the Baltimore African-American Museum and historic churches. Her culinary palate reflects beloved
    soul-food dishes passed down through generations, while her artistic sensibilities are influenced by African-American visual masters and the city's street art scene. This rich cultural tapestry informs
    her worldview, fuels her creative output, and drives her commitment to preserving and sharing Baltimore's black heritage.
