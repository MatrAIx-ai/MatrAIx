  career_goals: At 81, Shan's ambitions focus on leaving a lasting cultural imprint rather than formal career advancement. She aims to earn her high school equivalency to solidify her educational foundation
    and to author a memoir that intertwines her life story with the evolving tapestry of Baltimore's black neighborhoods. She plans to organize a solo exhibition of her abstract watercolors at a local community
    gallery, and to launch a weekly intergenerational storytelling program at the senior center, where she will mentor emerging Black artists. Additionally, she aspires to champion a community garden project
    that provides fresh produce and a creative gathering space for seniors, and to be recognized as a cultural elder who preserves and celebrates the city's African-American artistic heritage.
