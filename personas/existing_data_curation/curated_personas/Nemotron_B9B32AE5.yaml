  hobbies: '[''Abstract painting'', ''Street photography'', ''Reading speculative fiction'', ''Writing poetry'', ''Jazz and soul music listening'', ''Creative cooking'', ''Balcony herb gardening'', ''Community
    mural painting'']'
  career_goals: Hugh aims to transition from employee to owner of a boutique cleaning service that highlights sustainable, green‑cleaning practices and caters to historic homes in Philadelphia. He plans
    to obtain formal certification in eco‑friendly cleaning and to finish his college coursework, possibly in environmental studies or visual arts, to blend his practical expertise with his creative interests.
    Over the next five years he hopes to build a small, trusted team, develop a reputation for meticulous care of antique interiors, and offer consulting services to other cleaners. Parallel to his business
    ambitions, Hugh wants to mentor at‑risk youth in his community, teaching them reliable housekeeping skills and fostering work ethic. Long‑term, he envisions authoring a guidebook that weaves together
    cleaning hacks with artistic expression, securing financial stability for his family and a comfortable retirement.
