persona_description: A public health advocate who specializes in maternal and child health and nutrition. The individual is deeply committed to addressing the impact of maternal nutrition on a child's wellbeing
  and advocating for policies that support pre-conception care in the context of maternal- and child-health services. They are skilled in using evidence-based interventions such as conditional cash transfers,
  text-message-based initiatives, school-based food programs, vitamin-fortification schemes, and local leadership to improve maternal nutrition and are confident in the solutions available to address the
  inter-generational biological connections between maternal nutrition and female children's health.
