  career_goals: At this developmental stage, Elizabeth’s primary ambitions revolve around exploration, language development, and social connection. She delights in learning new words, mastering walking
    and running, and participating in group play. Over the longer term, she imitates roles she observes at home—such as caring for dolls like a doctor or counting objects—hinting at future interests in
    caregiving or teaching. For now, her goal is to grow confident, curious, and socially connected, laying a strong foundation for future schooling.
