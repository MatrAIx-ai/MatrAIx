personas:
  professional: Elizabeth Varnum, a two‑year‑old with an insatiable curiosity, builds towering block structures while also delighting in the predictable rhythm of her favorite picture‑book stories, showcasing
    a blend of exploratory play and comfort with routine.
  sports: Elizabeth Varnum loves the feel of the swing at the neighborhood park, joins the 'Tiny Tigers' toddler soccer club on Sundays, and eagerly cheers for the local professional baseball team, the
    Springfield Sluggers, while maintaining a spontaneous, energetic approach to fitness.
  arts: Elizabeth Varnum hums along to the whimsical tunes of 'Sesame Street', splashes bright watercolor paints on large paper during free‑play sessions, and imitates the dances of her favorite animated
    character, Moana, weaving artistic expression into everyday fun.
  travel: Elizabeth Varnum enjoys weekend road trips to her grandparents' farm, where she delights in feeding gentle goats, and she dreams of a future family vacation to Disney World, balancing a love for
    familiar family outings with a budding curiosity about far‑off destinations.
  culinary: Elizabeth Varnum favors the cheesy comfort of mac and cheese, giggles when sprinkling cinnamon sugar on toast, and shows an early knack for tasting textures, often insisting on mashed sweet
    potatoes alongside crunchy apple slices.
  core: Elizabeth Varnum is a curious, energetic toddler who blends spontaneous block building with a love for predictable storytime, often scattering toys yet never missing a chance to join a group.
background:
  cultural: Elizabeth is raised in Des Arc, a small town in Prairie County, Arkansas. Her family follows the regional Southern tradition of close‑knit community life, involving regular church attendance,
    family‑centered gatherings, and an appreciation for the outdoors and local festivities like county fairs. The household reflects a blend of classic Southern hospitality—home‑cooked meals, storytelling,
    and seasonal celebrations—while also embracing contemporary parenting practices that encourage early childhood development and inclusive play. Growing up in this setting gives her a grounding in modest,
    community‑oriented values and an awareness of the rhythms of rural life.
