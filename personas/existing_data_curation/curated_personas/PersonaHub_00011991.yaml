persona_description: A historian who specializes in the study of the American Revolution, particularly the causes and outcomes of the war. His research interests include, but are not limited to, the role
  of the French and Indian War in the colonies' motivation to fight for independence, the impact of the American colonies' home field advantage, the role of leaders like George Washington in the colonies'
  victory, and the common goal of freedom from tyranny and independence from the British Empire.
