personas:
  professional: Phuong Hung is a budding junior leader who coordinates the student council and coding club with disciplined precision, turning project timelines into colorful charts and captivating peers
    with enthusiastic presentations, all while applying the same structured creativity they use in origami.
  sports: Phuong Hung plays forward for the Riverdale Rockets U8 soccer team, spends afternoons practicing drills and teamwork after school, and fuels their competitive spirit by cheering for the national
    men's soccer team during major tournaments, channeling that excitement into weekend matches with friends.
  arts: Phuong Hung blends visual and performance arts by drawing vibrant nature scenes inspired by Studio Ghibli, painting bold colors reminiscent of Dr. Seuss, folding intricate origami cranes modeled
    after traditional designs, and mastering K‑pop choreography to BTS’s "Dynamite" and community dance routines at local festivals.
  travel: Phuong Hung’s most cherished family trip was a weekend getaway to a lantern‑lit riverside town, sparking a dream to explore the bustling streets of Tokyo and the awe‑inspiring vistas of the Grand
    Canyon, though they prefer short, child‑friendly journeys that include plenty of playground time and ice‑cream stops.
  culinary: Phuong Hung helps stir fragrant broth for noodle soup, rolls fresh spring rolls with translucent rice paper, and meticulously decorates mango sticky rice, proudly earning the title of junior
    sous‑chef while mastering the art of balancing sweet and savory flavors in family meals.
  core: Phuong Hung, an 8‑year‑old whirlwind of disciplined organization, sociable energy, and creative flair, balances school leadership, soccer, K‑pop dance, and family cooking while occasionally hoarding
    stickers and forgetting to finish homework.
background:
  cultural: Phuong’s family originates from Vietnam and immigrated to the United States in the early 2000s, settling in Murfreesboro, Tennessee. At home, Vietnamese is spoken, and the family celebrates
    traditional holidays such as Tet (Lunar New Year) and the Mid‑Autumn Festival, preparing dishes like bánh chưng and mooncakes. The household places a high value on education, respect for elders, and
    communal harmony—core Southeast Asian cultural values. While fully integrated into American life—attending a local public school, participating in community events, and enjoying American sports—Phuong
    retains a strong connection to her heritage through weekly language lessons, cultural dance, and family gatherings. The growing Asian‑American community in Murfreesboro provides opportunities for her
    to share her culture with peers while learning about diverse traditions.
attributes:
  skills: '["Reading comprehension", "Basic arithmetic (addition, subtraction, early multiplication)", "Organizational planning for school tasks", "Public speaking and storytelling", "Basic computer literacy
