  hobbies: '["Reading adventure books and fairy tales", "Dancing to K‑pop and community music", "Drawing and painting", "Origami and craft making", "Playing soccer with friends", "Participating in school
    clubs (student council, coding club)", "Helping cook traditional Vietnamese dishes", "Solving puzzles and interactive math games"]'
  career_goals: Phuong envisions a future where she can combine her love for organization, helping others, and cultural heritage. She dreams of becoming an elementary school teacher who designs structured,
    inclusive lessons and a classroom environment that fosters kindness and cooperation. She is also fascinated by the idea of working as a community event organizer, especially for cultural festivals like
    Tet, where she can bring people together and celebrate her Southeast Asian roots. In the longer term, she expresses interest in becoming a pediatric nurse or child psychologist, motivated by her desire
    to support children’s wellbeing and create safe, nurturing spaces.
