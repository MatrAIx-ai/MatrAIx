personas:
  professional: Dustin Holmes is an aspiring junior engineer who blends curiosity with practicality as they construct intricate LEGO models and program Raspberry‑Pi LED projects, often taking charge of
    school tech clubs with enthusiastic, talkative leadership while ensuring deadlines are met.
  sports: Dustin Holmes plays forward for the Eagle Trail Soccer Club, thrives on the competitive rush of weekend matches at the neighborhood park, idolizes Lionel Messi and follows FC Barcelona, and supplements
    soccer practice with occasional junior basketball pick‑up games, always pushing for faster footwork and sharper teamwork.
  arts: Dustin Holmes showcases storytelling flair in school talent shows by presenting animated Scratch shorts inspired by Pixar’s Toy Story and narrating episodes of Percy Jackson, while their music playlist
    features energetic tracks by Imagine Dragons and catchy Disney soundtracks that loop while they assemble LEGO scenes.
  travel: Dustin Holmes loves family hikes in the Sierra foothills, where they collect rocks and spot wildlife, dreams of backpacking through Yellowstone National Park, and often plans trips using a handheld
    map, balancing the allure of adventure with the comfort of familiar playgrounds in nearby towns.
  culinary: Dustin Holmes enjoys snacking on pepperoni pizza slices and crafting easy DIY nachos with cheddar cheese and jalapeños, occasionally attempts simple microwave mac and cheese, and relishes the
    bright crunch of sour gummy candies as a post‑game treat.
  core: Dustin Holmes is a socially charged, competitively curious eight‑year‑old who merges LEGO engineering, soccer strategy, and animated storytelling into a self‑driven quest to out‑learn and out‑play
    peers while juggling a healthy dose of snack‑induced impulsivity.
background:
  cultural: Dustin grew up in Inman, a small town in Spartanburg County, South Carolina, in a family that values Southern hospitality, community gatherings, and church involvement. His upbringing includes
    frequent family barbecues, Sunday morning worship at a local Baptist church, and participation in community events like the Inman Heritage Festival. The rural surroundings give him a close connection
    to nature, while the local school emphasizes both academic achievement and extracurricular teamwork, reflecting broader Southern cultural norms of modesty, resilience, and friendliness.
