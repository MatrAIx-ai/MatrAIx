  career_goals: Dustin dreams of becoming an astronaut one day, motivated by his fascination with space and his practical desire to build tools that help explore it. He also imagines himself as a professional
    soccer player because he loves competition and teamwork. In the near future, he aspires to design his own video games or simple gadgets, hoping to lead a community club where he can teach other kids
    how to build and code, reflecting his blend of curiosity, practicality, and sociable leadership.
