  hobbies: '[''Fishing'', ''Gardening'', ''Woodworking'', ''Baseball (Philadelphia Phillies)'', ''Acoustic Guitar Playing'', ''Reading Historical Non-Fiction'', ''Volunteering at Church Food Pantry'', ''Cooking
    Traditional Pennsylvania Dishes'', ''Dog Walking'', ''Community Events'']'
  career_goals: Ken aims to leverage his combined business and healthcare experience to transition into a supervisory role within the nursing home or assisted living sector. He plans to obtain a Certified
    Nursing Assistant (CNA) certification and eventually pursue a healthcare administration certificate to qualify for a unit manager position. Long‑term, he envisions opening a small home‑health agency
    that provides personalized in‑home care, allowing him to design a structured yet flexible work environment for his family. He also seeks to improve his stress‑management skills and achieve a more predictable
    schedule that balances professional responsibilities with his personal well‑being.
