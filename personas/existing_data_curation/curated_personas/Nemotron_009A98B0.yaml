  career_goals: Marcia dreams of a future in STEM, ideally becoming an aerospace engineer who designs spacecraft and contributes to space exploration. She also envisions leading a youth science outreach
    program in her community, combining her love of organization, teamwork, and sharing knowledge. Her long‑term ambition includes earning scholarships for a strong STEM university program and eventually
    using her skills to inspire other children to pursue science and engineering.
