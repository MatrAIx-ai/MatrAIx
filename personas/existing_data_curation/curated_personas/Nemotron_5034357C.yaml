personas:
  professional: Justin Harrison, a freelance writer and editor focusing on local history, leverages analytical research and a calming woodworking mindset to produce persuasive, narrative‑driven pieces while
    navigating anxiety with structured daily routines.
  sports: Justin Harrison supports the Clemson Tigers football and Carolina Hurricanes hockey teams, participates in the Tar River Angling Club for weekend fishing, and occasionally joins a local recreation
    softball league, finding balance between competitive scoring and relaxed camaraderie.
  arts: Justin Harrison engages with the arts by playing acoustic renditions of Bob Dylan and James Taylor on his guitar at community‑theater gatherings, attending local productions that pay tribute to
    classic actors, and collecting vintage folk vinyls, allowing his storytelling instincts to flow into his creative pursuits.
  travel: Justin Harrison prefers low‑key road trips with careful itinerary planning, spending summers exploring the pine‑forested Outer Banks and historic Savannah, Georgia, while dreaming of a literary
    pilgrimage to Edinburgh, Scotland, where he hopes to walk the same streets that inspired Robert Louis Stevenson.
  culinary: Justin Harrison enjoys cooking heirloom tomato bruschetta, pepper‑spiced shrimp and grits, and occasional fried chicken with collard greens, boasting a competent home‑cooking skill set that
    blends Southern comfort flavors with a love for fresh garden produce.
  core: Justin Harrison balances a structured freelance writing career with a penchant for woodworking, intense anxiety that fuels meticulous journaling, a competitive streak in casual sports, and a deep
    reverence for Southern traditions, all while occasionally letting disorganization sneak in.
background:
  cultural: Justin grew up in a small town in Eastern North Carolina, steeped in Southern traditions of hospitality, church fellowship, and strong community ties. His family celebrated classic regional
    holidays with barbecues, fried chicken, and collard greens, and he was raised with a respect for self‑reliance and modesty. While his upbringing emphasized a steady, predictable lifestyle, his later
    humanities education broadened his perspective on Southern history and culture, fostering a critical yet appreciative view of his roots. He maintains a moderate political stance, values the close‑knit
    nature of his town, and often participates in local events such as the Grifton Gator Festival and church potlucks, blending his cultural heritage with an ongoing quest for personal growth.
