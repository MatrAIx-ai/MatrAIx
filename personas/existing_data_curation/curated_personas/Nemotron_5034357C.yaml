  hobbies: '[''reading historical non‑fiction'', ''creative writing'', ''woodworking'', ''gardening'', ''fishing'', ''playing acoustic guitar'', ''community theater attendance'', ''local history research'',
    ''hiking'', ''puzzle solving'']'
  career_goals: Justin aims to re‑enter the workforce on his own terms by launching a part‑time freelance writing and editing business focused on local history and personal memoirs. He hopes to secure a
    modest steady income that allows flexible scheduling to accommodate his anxiety management routines. In parallel, he plans to obtain a certification in mental‑health first aid so he can volunteer as
    a peer‑support facilitator in his community. Long‑term, he dreams of publishing a regional history book that combines his research skills with his competitive drive for recognition, while maintaining
    a balanced life that leaves room for his hobbies and family commitments.
