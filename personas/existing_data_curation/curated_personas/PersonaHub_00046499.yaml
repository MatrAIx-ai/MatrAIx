persona_description: A scientist at the Swedish medical university Karolinska Institutet who specializes in the development of DNA-vaccines against cancer and infectious diseases, with a particular focus
  on the regulation of blood vessel formation in tumours. The scientist has developed a vaccine against a protein known as Delta-like ligand 4 (DLL4), which is important in regulating the formation of new
  blood vessels in tumours, and has shown that vaccination against DLL4 can slow the growth of breast cancer tumours in mice.
