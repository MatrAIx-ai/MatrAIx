  hobbies: '[''Museum and gallery visits'', ''Live music attendance (jazz, blues, gospel)'', ''Reading (history, fiction)'', ''Gardening'', ''Woodworking'', ''Community group participation (bridge, fitness
    classes)'', ''Volunteer clean‑up events'', ''Photography (street and portrait)'', ''Cooking soul food'', ''Traveling to art exhibitions'']'
  career_goals: Although retired from full‑time work, Jonathan aims to deepen his involvement in the Buffalo arts scene by volunteering as a docent at the Albright‑Knox Art Gallery and assisting in community
    mural projects. He hopes to complete an introductory museum studies certificate at a local community college, which will empower him to lead senior art workshops. He also aspires to mentor younger members
    of the African‑American community, sharing both his life experiences and his enthusiasm for art and cultural heritage. In the longer term, Jonathan dreams of writing a memoir that weaves his personal
    history with the evolving story of Black Buffalo, and of traveling to major American art museums to broaden his artistic perspective.
