  hobbies: '[''Bluegrass music festivals'', ''Playing mandolin in local jam sessions'', ''Hiking Appalachian trails'', ''Fishing in the Licking River'', ''Volunteering at after‑school coding club'', ''Reading
    classic literature'', ''Writing short stories and poetry'', ''Raspberry Pi DIY projects'', ''Hosting board‑game nights'', ''Attending pottery workshops'', ''Spontaneous road trips across Kentucky'']'
  career_goals: Rida aims to transition into a senior engineering or technical lead role where she can shape the architecture of products that blend technology with storytelling and community impact. She
    envisions launching a regional tech initiative that creates digital platforms for local artisans, historians, and small businesses, leveraging her dual expertise in software and the humanities. Additionally,
    she seeks to become a visible mentor and advocate for women entering tech in Appalachia, speaking at regional conferences and organizing hackathons that celebrate innovative, user‑centric solutions.
    To support these ambitions, she plans to earn an AWS Solutions Architect certification and deepen her knowledge of serverless architectures while maintaining the flexible, spontaneous work style that
    keeps her creativity alive.
