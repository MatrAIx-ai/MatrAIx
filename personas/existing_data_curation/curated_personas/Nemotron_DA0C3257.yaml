  hobbies: '[''Sketching and drawing'', ''Digital art creation (Procreate)'', ''Reading (fantasy, science, biographies)'', ''Coding simple games (Scratch)'', ''Playing soccer'', ''Traditional Salvadoran
    dance'', ''Journaling and idea mapping'', ''Visiting museums and cultural festivals'']'
  career_goals: Cindy dreams of a future career that unites her love for art, design, and community impact. She hopes to attend a specialized high school for visual arts and engineering, then study architecture
    or graphic/UX design at university. Her long‑term ambition is to become an architect who designs culturally vibrant community spaces that celebrate Salvadoran heritage and foster cross‑cultural dialogue.
    She also envisions creating bilingual educational materials that inspire other Latino youth to explore creativity and STEM fields.
