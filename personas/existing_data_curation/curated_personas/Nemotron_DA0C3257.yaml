personas:
  professional: Cindy Garcia, an aspiring young game designer, merges her curiosity for storytelling with disciplined practice in Scratch, crafting pixelated adventures while rigorously polishing her digital
    illustrations in Procreate to meet the high standards they set for themselves.
  sports: Cindy Garcia, a forward for the Westside Youth Soccer Club, trains twice a week at the community park, balances team drills with her love for traditional dance, and meticulously tracks her performance
    stats in a hand‑drawn logbook, though they sometimes skip stretching to rush home for art projects.
  arts: Cindy Garcia, a budding illustrator, spends weekends sketching fantasy landscapes inspired by the works of Hayao Miyazaki, the bold colors of Frida Kahlo, and digital pieces by Loish, while eagerly
    visiting the local modern art museum to study contemporary installations, and they often incorporate elements of the traditional dances they practice into their art.
  travel: Cindy Garcia, who loves museum trips, frequently explores the city’s science museum and the historic district of Old Town, has taken a family road trip to the Grand Canyon, and dreams of visiting
    the interactive exhibits at the Louvre in Paris and the ancient ruins of Teotihuacan next summer, where they hope to sketch the architecture and capture the atmosphere.
  culinary: Cindy Garcia, an enthusiastic home‑chef, adores making avocado‑lime guacamole, whipping up fruit‑filled smoothies with mango, banana, and spinach, and customizing pepperoni pizza with extra
    cheese, while occasionally sneaking extra chocolate chip cookies before bedtime, a guilty pleasure they try to balance with their disciplined schedule.
  core: Cindy Garcia blends fierce organization with boundless curiosity, turning sketchbooks, soccer fields, and a meticulously kept allowance ledger into a vibrant playground of disciplined creativity,
    though they sometimes stay up late perfecting digital art at the expense of a good night’s sleep.
background:
  cultural: Cindy is a second‑generation Salvadoran‑American raised in Tucson, Arizona. Her household is bilingual, with Spanish spoken by her parents and grandparents, and English used at school and with
    friends. She celebrates Salvadoran traditions such as Día de la Madre, the vibrant Feast of San Salvador, and enjoys cooking and eating pupusas, tamales, and horchata with family. The rich Latino community
    in Tucson, including murals, cultural festivals like Festival del Sol, and community centers, provides her with opportunities to engage in cultural art projects and share her heritage. These experiences
    shape her identity, fostering pride in her Salvadoran roots while encouraging her to blend cultural motifs into her artistic and future professional work.
attributes:
  skills: '[''Organizational planning'', ''Academic writing'', ''Mathematics problem solving'', ''Digital illustration'', ''Bilingual communication (Spanish-English)'', ''Basic coding (Scratch)'', ''Team
