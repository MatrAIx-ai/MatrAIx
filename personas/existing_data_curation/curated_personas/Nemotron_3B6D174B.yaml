  hobbies: '[''Gardening and orchard care'', ''Woodworking and furniture making'', ''Classic car restoration'', ''Fishing on the Susquehanna River'', ''Hiking in nearby mountain trails'', ''Reading historical
    biographies and industry publications'', ''Volunteering with Habitat for Humanity'']'
  career_goals: Looking ahead, Kyle aims to step into a regional operations director role, overseeing multiple construction sites across Pennsylvania and neighboring states. He plans to obtain his Project
    Management Professional (PMP) certification and pursue LEED Accredited Professional status to integrate sustainable building practices into his projects. Kyle is committed to mentoring junior foremen
    and aspiring managers within his company, creating a structured apprenticeship program that emphasizes safety, quality, and ethical work habits. In the longer term, he envisions gradually transitioning
    to ownership of a small general contracting firm that can serve the Waynesboro community, focusing on custom residential builds that reflect local architectural heritage while meeting modern energy
    standards.
