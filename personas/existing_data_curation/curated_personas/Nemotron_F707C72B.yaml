  career_goals: Katherine aims to transition from senior software engineer to technical lead within the next two years, guiding a multidisciplinary team to deliver high‑impact, user‑centric products. She
    is passionate about leveraging technology to address environmental challenges, so she hopes to spearhead projects that improve energy efficiency or support sustainable urban planning. Long‑term, she
    envisions moving into a director‑level engineering role where she can shape organisational culture—promoting inclusive hiring, continuous learning, and evidence‑based decision‑making. Alongside leadership,
    she plans to contribute to open‑source initiatives and mentor women entering tech, aligning her career growth with community impact.
