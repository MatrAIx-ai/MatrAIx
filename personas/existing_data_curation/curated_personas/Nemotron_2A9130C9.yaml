  hobbies: '[''sketching'', ''watercolor painting'', ''digital illustration'', ''listening to diverse music'', ''dancing'', ''basketball'', ''reading graphic novels'', ''watching art documentaries'', ''volunteering
    at community center'']'
  career_goals: In the short term, Damaris wants to build a professional portfolio that highlights her illustration and mixed-media work, and she aims to earn a spot in the county’s summer art camp. Over
    the next few years, she hopes to attend a specialized high‑school program for visual arts, secure a scholarship, and develop deeper skills in graphic design and animation. Her long‑term ambition is
    to become a freelance illustrator or concept artist for games and comics, while also using her talents to mentor younger students through community art workshops in Gibsonton. She envisions creating
    a safe creative space where local youth can explore art as a form of expression and empowerment.
