personas:
  professional: A budding visual storyteller, Damaris Hicks channels her love for church gatherings and neighborhood murals into mixed-media illustrations for school projects, leveraging her adept watercolor
    technique, digital painting skills, and organized yet flexible workflow, while their social energy fuels collaborative art workshops and their occasional worry about perfection pushes them to double-check
    every line.
  sports: A pick-up basketball enthusiast, Damaris Hicks joins the Gibsonton Youth Basketball League, cheers for the Miami Heat during the NBA season, and spends weekends shooting hoops at the local park
    while balancing school workouts and an occasional rivalry with the Tampa Bay Lightning fans they jokingly tease.
  arts: An avid creator and fan, Damaris Hicks devotes their free time to sketching street scenes, drawing inspiration from the vibrant beats of Kendrick Lamar and the visual storytelling of graphic-novel
    artist Marjane Satrapi, while they also attend community art showcases featuring local muralists and explore new techniques via art documentaries starring Ai Weiwei.
  travel: A weekend wanderer, Damaris Hicks plans low-budget road trips to nearby Orlando's art museums, dreams of a cultural pilgrimage to New Orleans for jazz and Creole cuisine, and alternates between
    spontaneous visits to family barbecues in the Florida countryside and organized school exchanges to Washington, D.C., where they explore Black history exhibits.
  culinary: A budding home chef, Damaris Hicks loves whipping up Southern-style barbecue ribs with their family's secret rub, perfecting a creamy mac and cheese, and experimenting with fresh watermelon
    salad topped with feta and mint, while they also savor R&B playlists as background while blending smoothies with mango, pineapple, and spinach.
  core: Damaris Hicks blends a community-rooted love for music and art with a restless creative drive, but their persistent worry about perfection and late-night snack cravings keep them both energized
    and anxiously over-prepared.
background:
  cultural: Damaris is a Black teenager growing up in Gibsonton, Florida, where her family maintains strong ties to African‑American Southern traditions. Church gatherings, gospel music, and family barbecues
    are central to her cultural life, and she celebrates holidays like Juneteenth with community events that highlight Black history and resilience. The vibrant rhythm of hip‑hop and R&B that fills her
    home reflects both contemporary Black culture and the local influence of nearby Tampa’s music scene. Her family values education, storytelling, and community service, encouraging her to express herself
    through art while staying connected to her heritage. This cultural backdrop informs her artistic voice, blending Southern Black aesthetics with modern digital media.
