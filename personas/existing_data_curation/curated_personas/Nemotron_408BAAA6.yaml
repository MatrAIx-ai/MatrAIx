  career_goals: Jessica aims to build a long‑term career in transportation while pursuing further education in logistics or automotive technology. In the next few years, she hopes to become a certified
    transportation safety coordinator for her school district, overseeing bus fleet maintenance and driver training programs. She also dreams of taking leadership courses to move into a supervisory role
    where she can mentor new drivers and advocate for student safety initiatives. Long‑term, she envisions opening a small community shuttle service that provides flexible transportation for seniors and
    rural residents, combining her practical driving expertise with her desire to give back to the Comanche community.
