persona_description: A cognitive psychologist who studies the neural mechanisms underlying emotion, particularly the role of the facial muscles in the production of expressive behaviors. She is interested
  in the differences in the ability to fake Duchenne smiles between individuals and the factors that may influence this ability, such as stage and emotional context. Her research focuses on the neural substrates
  of facial expression and the neural networks involved in emotional regulation.
