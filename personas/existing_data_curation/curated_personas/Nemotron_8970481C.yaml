    ''Yoga and mindfulness meditation'', ''Hiking in the Blue Ridge Mountains'', ''Journaling and creative writing'', ''Volunteering for community mural projects'', ''Listening to indie folk and alternative
    music'']'
  career_goals: Erin aims to complete a Bachelor of Fine Arts with a focus on interdisciplinary and community‑based art, building a portfolio that blends illustration, photography, and mixed‑media work.
    In the short term she plans to secure a mentorship or apprenticeship at a local gallery or design studio in the Virginia Piedmont, while also developing a modest freelance illustration practice for
    indie book covers and zines. Long‑term, she aspires to curate pop‑up exhibits in small towns, lead art‑therapy workshops that integrate mindfulness, and eventually travel to artist residencies that
    allow her to explore new media and cultural perspectives. Her overarching ambition is to use her creative skills to foster connection and harmony within her community and beyond.
