personas:
  professional: Erin Riviere, an aspiring interdisciplinary visual artist, blends watercolor, digital illustration, and photography while seeking a mentorship at a local gallery to hone their portfolio
    and launch a modest freelance illustration practice for indie book covers and zines.
  sports: Erin Riviere enjoys leisurely hikes along the Blue Ridge Mountains, they join a local weekend Friends of the Trail walking club, and they support the Virginia Tech Hokies football team, but they
    prefer low‑impact activity over competitive sports.
  arts: Erin Riviere immerses themselves in the arts by attending the Virginia Museum of Contemporary Art, sketching at community art fairs, and finding inspiration from artists like Yayoi Kusama, James
    Jean, and Sebastião Salgado, while they also volunteer to paint murals with local youth.
  travel: Erin Riviere likes spontaneous week‑long road trips to historic towns such as Charlottesville, Asheville, and Savannah, they prioritize scenic drives and affordable B&B stays over rigid itineraries,
    though student finances sometimes limit longer overseas adventures.
  culinary: Erin Riviere prefers simple, plant‑forward meals, often preparing fresh garden salads with heirloom tomatoes, feta, and balsamic glaze, they also indulge in occasional ramen bowls and artisanal
    cheese boards during late‑night creative sessions.
  core: Erin Riviere is a curiously relaxed 19‑year‑old artist who blends watercolor with digital media, they live for spontaneous hikes and mural projects, and they habitually forget to file taxes on time.
background:
  cultural: Erin is a White American raised in Radford, Virginia, a small city nestled near the New River in Pulaski County. Her family’s roots trace back to English and German ancestors who settled in
    the Appalachian region generations ago, imparting a subtle appreciation for Southern hospitality, modesty, and a close‑knit community ethos. Growing up, she participated in regional events such as county
    fairs, local folk‑music gatherings, and outdoor festivals that celebrate Appalachian crafts and storytelling. Although she values these traditions, Erin’s time at a nearby community college exposed
    her to a broader spectrum of cultures, contemporary art movements, and global perspectives. This blend of small‑town Southern background and expanding world view informs her artistic sensibility, fostering
    a respect for both local heritage and innovative, unconventional ideas.
