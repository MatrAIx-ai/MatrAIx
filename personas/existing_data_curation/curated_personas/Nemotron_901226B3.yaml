personas:
  professional: David Kimbrell is a seasoned handyman whose methodical project planning and practical curiosity drive him to launch a part‑time home‑repair service while pursuing an HVAC certification,
    ensuring reliable, on‑time repairs for neighbors and positioning himself for future leadership in community infrastructure projects.
  sports: David Kimbrell is a devoted supporter of the New Orleans Saints and Pelicans, participates in a weekend recreational softball league, and spends early mornings fishing for catfish in the bayous,
    treating the sport as both a workout and a meditative escape.
  arts: David Kimbrell immerses himself in the region’s artistic pulse by attending jazz performances by Dr. John and zydeco shows featuring Buckwheat Zydeco, while his woodworking projects—hand‑crafted
    tables and décor—echo the rustic aesthetic celebrated at local blues festivals.
  travel: David Kimbrell prefers road‑trip adventures that blend nature and music, having driven the Gulf Coast to soak in the historic French Quarter’s Mardi Gras parades and now eyeing a future journey
    to New Brunswick’s Acadian coast to experience its own festive traditions, all while coordinating travel around family commitments.
  culinary: David Kimbrell delights in preparing Cajun staples such as gumbo and étouffée, seasoning them with fresh tomatoes, bell peppers, and basil from his garden, and often grills his catch of catfish
    with a homemade rub of paprika, garlic, and cayenne.
  core: David Kimbrell blends meticulous organization with a love for hands‑on craftsmanship, community service, and classic Southern flavors, all while juggling a disciplined budget, health routines, and
    an occasional impulsive tool splurge.
background:
  cultural: 'David comes from a Southern white family with deep roots in Jefferson Parish and the Greater New Orleans area. His upbringing reflects a blend of Anglo‑American and regional Creole influences
    typical of Louisiana: strong family ties, regular attendance at a local Baptist church, and a love for the state’s culinary traditions and music. Growing up in Marrero gave him an intimate familiarity
    with the bayou landscape, Gulf Coast lifestyle, and the communal spirit that characterizes the parish. He values hard work, modesty, hospitality, and the close‑knit community ethos of Southern Louisiana.'
attributes:
  skills: '[''Home Maintenance'', ''Automotive Repair'', ''Basic Carpentry'', ''Electrical Troubleshooting'', ''Budgeting and Financial Planning'', ''Project Management'', ''Event Coordination'', ''Spreadsheet
