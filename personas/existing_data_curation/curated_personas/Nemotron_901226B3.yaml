  hobbies: '[''Fishing'', ''Woodworking'', ''Gardening'', ''Attending Mardi Gras and Blues Festivals'', ''Reading Historical Non‑Fiction'', ''Listening to Jazz and Zydeco Music'', ''Community Volunteering
    (Neighborhood Clean‑up)'', ''Cooking Cajun Cuisine'']'
  career_goals: David’s immediate goal is to launch a part‑time home‑repair service that leverages his hands‑on expertise while allowing flexibility for family commitments. Over the next five years he plans
    to earn an HVAC certification to broaden his service offerings and increase earnings potential. He also aspires to take on a leadership role within his neighborhood association or local church council,
    applying his organizational strengths to improve community infrastructure. Long‑term, he seeks to build a modest retirement fund that secures financial stability for his family and enables him to mentor
    younger relatives interested in trade skills.
