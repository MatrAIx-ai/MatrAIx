  career_goals: 'He plans to channel his educational background into a community-focused venture: launching a volunteer tutoring network for Spanish-speaking elementary and middle-school students in Stanislaus
    County. Alejandro aims to earn a certification in special education, secure grant funding for after-school programs, and eventually offer consulting services on bilingual curriculum design. While he
    remains open to completing a master’s degree in educational leadership, his primary ambition is to improve literacy and academic outcomes for local Latino youth and to become a recognized advocate for
    educational equity in the region.'
