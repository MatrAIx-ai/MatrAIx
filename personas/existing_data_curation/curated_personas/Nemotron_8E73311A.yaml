  career_goals: Curtis wants a future that blends his love for structure, reliability, and helping others. He aspires to become a civil engineer, designing safe bridges and roads that serve his community,
    and is also interested in software development that creates dependable, user-friendly tools. He plans to attend a STEM-focused high school, pursue a degree in engineering, and eventually work for a
    firm that values teamwork and detailed planning. In the long term, he hopes to contribute to projects that improve the local infrastructure of the Asheville region while maintaining a steady, predictable
    work routine.
