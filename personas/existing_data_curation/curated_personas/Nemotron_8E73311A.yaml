personas:
  professional: Curtis Obrien, a budding robotics enthusiast, channels their love for structure and meticulous construction into designing small‑scale automatons for the school robotics club, applying strategic
    thinking from games like Civilization VI, methodical problem‑solving from Lego builds, and a cooperative spirit to lead a tight‑knit team.
  sports: Curtis Obrien enjoys solo hikes along the Blue Ridge trails and participates in a local youth cross‑country running club, while cheering for the Atlanta Braves and Georgia Bulldogs, preferring
    low‑key, nature‑based activity over crowded team sports.
  arts: Curtis Obrien cultivates a quiet artistic side through methodical piano practice, favoring pieces by Johann Sebastian Bach and Ludovico Einaudi, and also admires the ambient video‑game scores of
    C418 in Minecraft and Christopher Tin’s orchestral themes in Civilization VI.
  travel: Curtis Obrien prefers meticulously planned family trips that blend adventure with routine, having trekked the Blue Ridge and Great Smoky Mountains National Parks and dreaming of a guided tour
    of New Zealand’s Hobbiton to experience the fantasy landscapes that echo their LEGO worlds.
  culinary: Curtis Obrien has a practical palate, favoring homemade pepperoni pizza and classic mac and cheese, skillfully assembling the ingredients—tomato sauce, mozzarella, and pepperoni—like a Lego
    set, while occasionally experimenting with homemade granola bars for a healthier snack.
  core: Curtis Obrien, a methodical teen builder, balances a love for structured creativity with quiet anxiety, turning Lego bricks, piano keys, and strategic games into a personal sanctuary.
background:
  cultural: Curtis was raised in a white, middle-class family in Arden, an unincorporated community near Asheville, North Carolina. His upbringing reflects a blend of Southern Appalachian modesty and contemporary
    suburban life. Family gatherings often emphasize community, responsibility, and respect for the natural environment of the mountains. He attends a local public middle school where regional traditions,
    such as seasonal festivals and church activities, are part of community life. These cultural influences shape his appreciation for reliable routines, cooperative teamwork, and a connection to the outdoors.
