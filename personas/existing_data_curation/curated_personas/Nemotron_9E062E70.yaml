  career_goals: Although only six, Sigmund already dreams of becoming an astronaut to explore the stars, a cartoonist to bring his wild ideas to life, and a scientist who solves mysteries. He also imagines
    winning a local soccer championship, reflecting his competitive streak. He hopes to use his curiosity and artistic talent to invent new games or gadgets that make his friends smile, and he aspires to
    make a positive impact on his community someday.
