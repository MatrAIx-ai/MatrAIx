personas:
  professional: Najwa Jones, a 47‑year‑old physical therapist assistant in Memphis, blends hands‑on manual therapy expertise with a charismatic, talkative style, using curiosity to adopt new rehabilitation
    techniques while keeping treatment plans flexible and patient‑focused.
  sports: Najwa Jones stays active through line‑dancing at the community center, joins a church softball league in spring, follows the Memphis Grizzlies NBA team fervently, and attends Memphis Redbirds
    baseball games as a weekend ritual, while preferring low‑impact home workouts like yoga to accommodate her busy schedule.
  arts: Najwa Jones immerses herself in Memphis’s vibrant music scene, regularly attending blues performances by B.B. King tribute bands, gospel concerts featuring the Staple Singers, and R&B shows by Al
    Green, while also enjoying karaoke nights where she belts out classics by Aretha Franklin and Whitney Houston.
  travel: Najwa Jones favors short road trips that blend culture and cuisine, having explored New Orleans’ French Quarter, Savannah’s historic squares, and the Great Smoky Mountains, and she dreams of a
    community‑service trip to rural Alabama to expand her mobile therapy idea, while balancing travel with family responsibilities.
  culinary: Najwa Jones is an adept home chef who specializes in soul‑food staples like slow‑cooked collard greens seasoned with smoked turkey, sweet potato pie spiced with nutmeg, and fried catfish fried
    in seasoned cornmeal, frequently incorporating fresh herbs and tomatoes from her garden into dishes such as tomato‑based BBQ sauce.
  core: Najwa Jones blends Southern hospitality, a love for community music, and a practical, curiosity‑driven approach to rehab, all while juggling occasional disorganization and a habit of turning every
    conversation into a mini‑karaoke session.
background:
  cultural: Najwa grew up in the heart of Memphis, Tennessee, steeped in the traditions of the African‑American South. Her upbringing was shaped by the soulful sounds of blues and gospel that resonated
    from local churches and the historic Beale Street. The close‑knit church community taught her the values of hospitality, mutual support, and the power of oral storytelling—traits she carries into her
    daily interactions. Family gatherings featuring shared meals, music, and laughter reinforced a sense of collective identity and resilience in the face of systemic challenges. As a Black woman navigating
    a predominantly white healthcare environment, Najwa has cultivated a strong sense of pride in her heritage and uses her platform to advocate for equitable access to care in Shelby County. Her cultural
    roots inform her empathetic approach to patients, her love of community events, and her commitment to uplifting the health and wellbeing of her neighbors.
attributes:
  skills: '[''Manual therapy'', ''Gait training'', ''Therapeutic exercise prescription'', ''Patient assessment and functional evaluation'', ''Motivational interviewing'', ''Effective patient communication'',
    ''SOAP note documentation'', ''Assistive device fitting'', ''Team collaboration'', ''Community health outreach'']'
  hobbies: '[''Soul‑food cooking'', ''Attending blues and gospel concerts'', ''Karaoke'', ''Gardening'', ''Volunteering with church health ministry'', ''Reading motivational biographies'', ''Line‑dancing'',
    ''Hosting community game nights'']'
  career_goals: Najwa aims to deepen her clinical expertise by earning an advanced certification in orthopedic and sports rehabilitation, positioning herself to handle more complex cases. She dreams of
    eventually stepping into a supervisory or lead PTA role within a busy outpatient clinic, where she can mentor newcomers and shape a patient‑centered culture. Passionate about her community, she envisions
    launching a mobile therapy service that brings low‑cost rehabilitation to underserved neighborhoods in Shelby County. Additionally, Najwa hopes to become a recognized health educator, speaking at local
    churches, schools, and community centers about injury prevention, especially for seniors, and to use her outgoing personality to inspire health‑positive behaviors.
