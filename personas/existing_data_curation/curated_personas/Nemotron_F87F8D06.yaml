personas:
  professional: Patricia Wagner is a budding junior artist who treats every coloring page like a design project, applying bold hues and a methodical layout that reveals their organized, curious mind and
    their love for sharing creations with friends.
  sports: Patricia Wagner plays energetic soccer with the Little Kicks Club, dances to upbeat kids' choreography, and proudly shouts for the local professional soccer team the Seattle Sounders whenever
    family game night comes around, demonstrating they thrive on group activity.
  arts: Patricia Wagner draws inspiration from the whimsical worlds of Dr. Seuss and the bright palettes of Henri Matisse, spending afternoons painting bold pictures, collecting crayons, and humming the
    scores from Disney's Frozen while they proudly display their artwork on the fridge.
  travel: Patricia Wagner delights in family road trips to the nearby state park where they collect leaves, weekend visits to the city museum's interactive exhibit, and dreams of seeing the Eiffel Tower
    and the Great Barrier Reef on future adventures.
  culinary: Patricia Wagner loves munching on cheesy macaroni, nibbling carrot sticks, crafting strawberry-banana smoothies with a splash of orange juice, and occasionally helping Mom sprinkle rainbow sprinkles
    on cupcakes, always eager to taste bright, colorful dishes that they find as exciting as a fresh canvas.
  core: Patricia Wagner is a curiosity-driven, meticulously organized whirlwind of bold colors and occasional worries, turning everyday moments into vibrant, purposeful play that they cherish.
background:
  cultural: Patricia is raised in a white, middle‑class family in Mableton, a suburban community in Cobb County, Georgia. Her family participates in Southern traditions like weekend barbecues, community
    festivals, and church gatherings, fostering a sense of hospitality and neighborly support. At school, she is exposed to the cultural diversity of the Atlanta metropolitan area, including multicultural
    events and holiday celebrations. This blend of Southern values and broader regional influences shapes her appreciation for community, education, and artistic expression.
