  career_goals: Marie aims to move from an entry‑level interviewer to a senior qualitative researcher or market insights manager within the next five years. She plans to complete her bachelor's degree in
    communications, earn a professional certification in research methods, and build a portfolio of published case studies. In the longer term, she hopes to lead cross‑functional research teams, shape strategic
    decision‑making for consumer brands, and eventually launch her own research consultancy that emphasizes ethical, participant‑centred approaches. She also seeks to strengthen her quantitative analysis
    skills to complement her interview expertise.
