personas:
  professional: C Wilson is a budding qualitative researcher at a market insights firm, expertly designing interview guides, conducting Zoom and Teams sessions, transcribing with Otter.ai, and synthesizing
    findings in concise reports, all while balancing deep curiosity with a practical, flexible workflow that tolerates occasional disorganization.
  sports: C Wilson fuels their love for the outdoors by hiking Hill Country trails with the Texas Hill Country Hiking Club, practicing yoga three times a week, cheering for the San Antonio Spurs, and joining
    a weekend recreational flag‑football league at the local community field.
  arts: C Wilson fills their free time attending live gigs at Austin’s Mohawk, reveling in the sounds of St. Vincent, Kacey Musgraves, and The Strokes, while their book club debates contemporary fiction
    like The Midnight Library and psychology classics such as Thinking, Fast and Slow, and they also volunteer at the annual Texas Folklife Festival celebrating local arts.
  travel: C Wilson prefers low‑key road trips that blend hiking and cultural immersion, having explored Austin, Marfa, Santa Fe, Oaxaca, and dreaming of Patagonia’s glaciers, always planning itineraries
    on a spreadsheet but leaving room for spontaneous detours that satisfy their curiosity and need for flexibility.
  culinary: C Wilson experiments with Tex‑Mex flavors at home, frequently whipping up carne asada tacos, chili rellenos, and homemade salsa verde while mastering perfect guacamole, though they sometimes
    overcook tortillas, revealing a playful yet imperfect cooking style.
  core: C Wilson is a curiosity‑driven, slightly disorganized research enthusiast who worries about the future, finds solace in hiking, yoga, and spicy Tex‑Mex cuisine, and lives by a flexible, pragmatic
    motto.
background:
  cultural: Marie was raised in a middle‑class, suburban setting in Central Texas. Her family’s cultural roots are primarily Anglo‑American, with traditions that emphasize Southern hospitality, community
    involvement, and a strong work ethic. Growing up near San Marcos, she was exposed to the blend of Texan and Hispanic influences that characterize the region—through local music, food, and bilingual
    neighborhoods—which shaped her appreciation for cultural diversity. She attended public schools, where extracurricular activities such as the school newspaper helped nurture her collaborative spirit.
    While she does not actively practice a specific religion, family gatherings occasionally include church‑related events reflecting the area's modest Christian presence. The local emphasis on outdoor
    recreation and a laid‑back lifestyle informs her own values of flexibility and balance.
attributes:
