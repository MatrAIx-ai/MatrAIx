persona_description: 'A research professor in the field of nanoscience and nanotechnology, with a passion for education and outreach, who has developed unique and innovative methods to inspire young students
  through hands-on experience and simple, low-cost approaches. He is an Associate Professor at the National University of Singapore, with a team of 15-20 researchers and students, and is also an Assistant
  Dean for Outreach in the Science Faculty and a member of the NUS Nanoscience & Nanotechnology Initiative (NUSNNI). His teaching aspirations are to fuel students'' enthusiasm in the discovery of scientific
  truths and nurture their creative and innovative spirit in tackling fascinating problems. He is one of the collaborators of a newly awarded SGD 10M Competitive Research Programme project led by Prof Subodh
  Mhaisalkar from NTU entitled Nanonets: New Materials, Devices for Integrated Energy Harnessing & Storage, funded by the National Research Foundation (NRF) of Singapore.'
