  career_goals: Michael aims to secure an AWS Certified Welding Supervisor credential within two years and transition into a foreman role where he can lead a team of welders. He is also planning to launch
    a part‑time custom metal‑fabrication business, offering handcrafted railings, decorative panels, and repair services to local contractors and homeowners. Long‑term, he hopes to mentor apprentices through
    the regional union program and ensure a stable retirement funded by his pension and his own small business.
