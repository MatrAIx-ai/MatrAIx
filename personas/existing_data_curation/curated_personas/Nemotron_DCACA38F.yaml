personas:
  professional: Michael Mcneal, a 57‑year‑old certified welder and brazing specialist with over three decades of experience in MIG, TIG, stick, flux‑cored and aluminum welding, applies his meticulous, safety‑first
    mindset and natural leadership to mentor junior welders, operate CNC plasma and laser cutters, and pursue an American Welding Society Certified Welding Supervisor credential as he prepares to step into
    a foreman role and launch a part‑time custom metal‑fabrication business.
  sports: Michael Mcneal, a member of the Capitol Softball League’s District Dingers team and a devoted Washington Nationals fan, also hikes the rugged trails of Rock Creek Park, fishes the Potomac River
    for largemouth bass, and follows the Washington Commanders and DC United with season tickets.
  arts: Michael Mcneal, who finds creative inspiration while woodworking and restoring his vintage motorcycle, regularly attends live performances by blues guitarist Joe Bonamassa, enjoys the classic rock
    of Bruce Springsteen and the folk harmonies of The Avett Brothers, and collects issues of Fine Woodworking and The Smithsonian Magazine to stay connected to craftsmanship and cultural heritage.
  travel: Michael Mcneal, who balances his love of local adventure with a curiosity for global craftsmanship, often road‑trips to Shenandoah National Park for weekend hikes, has visited the historic streets
    of Old Town Alexandria, and dreams of a future cultural pilgrimage to Kyoto, Japan, to study traditional Japanese metal‑working and tea‑house architecture.
  culinary: Michael Mcneal, a practical home‑cook with a penchant for hearty fare, frequently grills Maryland crab cakes seasoned with Old Bay, smokes pork ribs using hickory chips, whips up a Sunday pot
    roast with carrots and rosemary, and experiments with a mustard‑glazed salmon topped with fresh dill, all while proudly showcasing his self‑made cedar‑plank grill.
  core: Michael Mcneal blends a disciplined, safety‑obsessed work ethic with a lively community spirit, turning his hands‑on love for metalwork, sports, and cooking into a balanced life that values structure,
    camaraderie, and the occasional indulgent hobby.
background:
  cultural: Michael comes from an Irish‑American working‑class family that settled in the Maryland suburbs of Washington, D.C. He was raised in a Catholic household where family gatherings and community
    involvement were emphasized, and he maintains close ties with the local trade union. While rooted in traditional American customs such as holiday barbecues and baseball, he appreciates the multicultural
    atmosphere of the nation's capital and often engages with neighbors from diverse backgrounds.
