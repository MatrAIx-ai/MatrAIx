personas:
  professional: Angelique Culley, an aspiring journeyman carpenter who blends hands‑on framing expertise with a curiosity for reclaimed‑wood furniture, uses SketchUp to prototype eco‑friendly designs, and
    thrives in small‑team build‑days while occasionally juggling tools and plans in a delightfully disorganized but solution‑oriented manner.
  sports: Angelique Culley, a nature‑loving hiker who joins the Hill Country Trails Club for weekend treks, follows the Austin FC soccer team’s schedule religiously, occasionally attends a local yoga studio
    to improve flexibility for carpentry work, and prefers solo or small‑group activities over crowded gym sessions.
  arts: Angelique Culley, an acoustic folk aficionado who spins Bon Iver, The Lumineers, and Joan Baez while sketching vernacular architecture, frequents the South Texas Art Fair to discover handmade ceramics,
    and finds inspiration in the works of architect Christopher Alexander, letting music and visual art color her woodworking designs.
  travel: Angelique Culley, an adventurous road‑tripper who has hiked the Enchanted Rock loop, explored the historic streets of Fredericksburg, plans a weekend getaway to Santa Fe for its adobe workshops,
    and dreams of a future trek through the Blue Ridge Mountains to study Appalachian timber framing, all while budgeting trips through a mix of saved cash and occasional rideshare deals.
  culinary: Angelique Culley, a budding home chef who cultivates rosemary, thyme, and oregano on a balcony garden, whips up herb‑infused focaccia, salsa verde with locally sourced tomatillos, and grilled
    salmon topped with dill‑lemon butter, and enjoys experimenting with sustainable cooking techniques like solar‑oven baking, though she sometimes forgets to defrost meat in time.
  core: Angelique Culley merges hands‑on carpentry with eco‑conscious design, balances a relaxed yet purposeful lifestyle, and pursues her love of nature, music, and community through modest budgets, steady
    health routines, and a quiet determination to someday run a boutique workshop.
background:
  cultural: Angelique comes from a White Texan background, raised near San Antonio in a suburban-rural environment. Her family has deep roots in the region, with generations of tradespeople who value hard
    work, self-reliance, and community service. Growing up, she was immersed in the diverse cultural tapestry of South Central Texas, regularly encountering Hispanic influences through local cuisine, bilingual
    signage, and neighborhood festivals. This blend of traditional Anglo-American values with the vibrant multicultural atmosphere has shaped her appreciation for practicality, hospitality, and respect
    for diverse perspectives. She identifies strongly with Texas's independent spirit while also embracing the collaborative ethos of the local community.
attributes:
  skills: '[''Accurate measurement and layout'', ''Operation of hand and power tools (saws, drills, routers)'', ''Basic joinery (mortise and tenon, dovetail, pocket holes)'', ''Reading and interpreting
    simple construction blueprints'', ''Material selection with emphasis on reclaimed and sustainable wood'', ''Adherence to OSHA safety standards and personal protective equipment'', ''Basic proficiency
    in SketchUp for 3D visualization'', ''Improvisational problem-solving and on-site adjustments'', ''Project budgeting and cost estimation'', ''Collaboration in small teams and independent work'']'
  hobbies: '[''Woodworking and furniture making'', ''Sketching architectural designs'', ''Hiking in the Texas Hill Country'', ''Landscape photography'', ''Reading historical fiction'', ''Gardening herbs
    on a balcony'', ''Listening to acoustic folk music'', ''DIY home improvement projects'', ''Volunteering for community building projects'']'
  career_goals: Angelique aims to complete a formal apprenticeship and earn her Texas journeyman carpenter certification within the next three years. She plans to deepen her knowledge of sustainable construction
    through workshops on green building and reclaimed-material furniture design. While attending her remaining college courses in construction management, she intends to develop a portfolio of custom furniture
    pieces. Long-term, she envisions opening a small boutique workshop near Medina County that serves residential clients and offers handcrafted, eco-friendly furniture. She also hopes to mentor other young
    women entering the trade and eventually earn a bachelor's degree in construction management to expand her business operations.
