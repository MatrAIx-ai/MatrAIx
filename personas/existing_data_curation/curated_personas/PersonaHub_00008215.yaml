persona_description: A government official or environmentalist who is dedicated to the protection and recovery of salmon populations in the Columbia and Snake River basins in Oregon, Washington, and Idaho.
  This individual is likely to have a background in fisheries management, hydrology, or environmental law. They are knowledgeable about the impacts of damming on river flow and the importance of maintaining
  healthy river ecosystems for salmon survival. This person is likely to be interested in tracking and monitoring salmon recovery efforts, and is aware of the costs associated with salmon recovery projects.
