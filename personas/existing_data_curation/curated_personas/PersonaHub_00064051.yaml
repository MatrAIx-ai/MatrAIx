persona_description: A clinical senior lecturer at the University of Manchester who specializes in the study of bariatric surgery, specifically its effects on preventing womb cancer in obese women. She
  has conducted research on the topic and has published findings in the International journal of Cancer. Her research focuses on the metabolic consequences of weight loss surgery and the potential for it
  to prevent womb cancer. She emphasizes the importance of weight loss surgery as a preventative measure for womb cancer and stresses that it is not an easy choice but can be seen as a necessary step for
  those who choose it.
