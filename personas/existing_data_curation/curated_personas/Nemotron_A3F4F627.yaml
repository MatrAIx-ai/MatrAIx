personas:
  professional: Elizabeth Perezmanso, a 28‑year‑old operations research analyst, blends Python, Gurobi, and Tableau into supply‑chain optimization projects while channeling her competitive drive into internal
    hackathons and tolerating her own laid‑back, sometimes disorganized, approach to deadlines.
  sports: Elizabeth Perezmanso spends her weekends cycling the Lake St. Clair trail with the St. Clair Cycling Collective and tackling seasonal hikes with a local outdoor club, while cheering on the Detroit
    Red Wings during hockey season and joining a casual intramural basketball league that satisfies her competitive streak.
  arts: Elizabeth Perezmanso captures urban architecture through street‑photography inspired by Henri Cartier‑Bresson, curates an eclectic vinyl collection that includes Sufjan Stevens and The National,
    and unwinds by dissecting Agatha Christie mysteries and attending monthly documentary screenings at the downtown art‑house cinema.
  travel: Elizabeth Perezmanso favors spontaneous weekend getaways, hopping on a train to explore Detroit’s street art scene or kayaking the Great Lakes, while keeping a bucket list that includes hiking
    Norway’s fjords in the summer and cycling through the Dutch countryside in the spring.
  culinary: Elizabeth Perezmanso balances culinary experimentation with comfort cooking, whipping up a mushroom risotto featuring fresh porcini and truffle oil on Saturdays while perfecting her family’s
    classic chicken pot pie, and she regularly tries recipes inspired by the molecular gastronomy documentaries she watches.
  core: Elizabeth Perezmanso fuses relentless analytical curiosity with a laid‑back, puzzle‑loving lifestyle, thriving on competitive board‑games and data‑driven problem solving while occasionally forgetting
    to file her taxes until the deadline.
background:
  cultural: Elizabeth grew up in a middle‑class, predominantly white suburb of Oakland County, Michigan. Her family traces its roots to Irish and Italian immigrants who settled in the Midwest in the early
    20th century. The region’s blend of industrial heritage and emerging tech scene instilled in her a pragmatic work ethic, self‑reliance, and an appreciation for continuous learning. Local traditions—such
    as community festivals, weekend trips to the Great Lakes, and a strong emphasis on education—shaped her values of flexibility, competition, and balanced social interaction. While identifying as white
    American, she remains aware of the diverse cultural landscape of the Detroit metropolitan area, which informs her collaborative yet discerning professional approach.
attributes:
  skills: '[''Mathematical Modeling'', ''Optimization (Linear, Integer, Nonlinear)'', ''Statistical Analysis'', ''Simulation (Monte Carlo, Discrete Event)'', ''Python programming'', ''R programming'', ''SQL'',
    ''Advanced Excel modeling'', ''Data Visualization (Tableau, PowerBI)'', ''Supply Chain & Logistics Analysis'', ''Business Process Improvement'', ''Project Management'']'
  hobbies: '[''Puzzle solving (Sudoku, cryptic crosswords)'', ''Strategy board games (Settlers of Catan, Chess)'', ''Cycling on Lake St. Clair trails'', ''Hiking in local nature preserves'', ''Experimental
    cooking'', ''Photography (urban and nature)'', ''Reading mystery and science‑fiction novels'', ''Attending local craft‑brewery events'']'
  career_goals: Elizabeth aims to progress to a senior operations research analyst role within three years, eventually leading a multidisciplinary analytics team that drives strategic decisions for a major
    manufacturing or logistics firm in the Great Lakes region. She plans to earn a professional certification such as the Certified Analytics Professional (CAP) and to deepen her expertise in machine‑learning‑enhanced
    optimization. Long‑term, she envisions becoming a director of operations analytics or a chief data officer, shaping the company's competitive edge through data‑driven innovation while maintaining a
    balance between creative problem‑solving and reliable, evidence‑based practices.
