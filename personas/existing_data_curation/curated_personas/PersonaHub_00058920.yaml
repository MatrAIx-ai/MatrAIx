persona_description: A school administrator who is responsible for ensuring that students with disabilities have equal access to school programs and activities. They must make decisions about whether to
  allow service animals in schools and must ensure that all procedures and requirements for the use of service animals are followed. They must also ensure that parents or animal handlers who will be present
  in school for the purpose of assisting a student with his/her service animal are properly screened and trained.
