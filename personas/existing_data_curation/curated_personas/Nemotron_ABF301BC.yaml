  career_goals: Nabil aims to move from line cook to kitchen supervisor within the next two years, pursuing the Certified Chef de Cuisine credential while enrolling in a part‑time culinary arts program
    at a local community college. He plans to deepen his expertise in regional Indian cuisines and modern plating techniques. Ultimately, he aspires to open a family‑owned Indian restaurant in the Chicago
    suburbs that blends tradition with efficient service, emphasizing consistency, hygiene, and a reliable dining experience. He also intends to develop a small catering business focused on local cultural
    events, weddings, and community gatherings, leveraging his reputation for reliability and high‑quality home‑cooked meals.
