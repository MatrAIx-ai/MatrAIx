    ''Problem solving under pressure'']'
  hobbies: '[''Basketball (local league)'', ''Urban photography'', ''Gallery and museum visits'', ''Street‑art tours'', ''Live music (jazz, hip‑hop) attendance'', ''Group hiking'', ''Cooking workshops (soul
    food fusion)'', ''Mentoring youth in trades'', ''Traveling to experience diverse cultures'', ''Reading about sustainable design'']'
  career_goals: Curtis plans to complete his bachelor's degree in construction management within the next two years and obtain professional certifications such as the Certified Construction Manager (CCM)
    or PMP. He aims to lead larger, high‑profile projects that blend innovative design with sustainable building methods, eventually advancing to senior project manager or director of construction. Long‑term,
    he hopes to launch his own construction firm focused on mentorship for young workers from under‑represented backgrounds and on creating spaces that combine functional architecture with artistic expression.
