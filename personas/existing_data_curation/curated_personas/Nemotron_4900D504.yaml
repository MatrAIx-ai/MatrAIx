personas:
  professional: Curtis Jean is a construction management student and rising site supervisor who leverages their keen eye for design, strong leadership, and competitive drive to coordinate subcontractors,
    budget projects, and ensure safety while integrating sustainable practices and artistic vision on urban builds, and they consistently balance meticulous planning with on‑site flexibility.
  sports: Curtis Jean plays forward for the Atlanta Community Basketball League, avidly follows the Atlanta Hawks and Atlanta United, and participates in the Stone Mountain Trail Runners Club for weekend
    hikes and cardio sessions, and they thrive on the competitive camaraderie of team sports.
  arts: Curtis Jean frequents the Atlanta Contemporary Art Center, collects limited‑edition prints by Shepard Fairey, captures urban architecture on film during street‑art tours featuring murals by Dario
    Martinez, and attends live shows by jazz saxophonist Marcus Strickland, neo‑soul singer H.E.R., and hip‑hop artist Anderson .Paak, and they often draw inspiration from these experiences to inform their
    construction designs.
  travel: Curtis Jean has weekended in Savannah’s historic district, taken a road trip to New Orleans for its music festivals, dreams of exploring Lisbon’s tile‑laden neighborhoods, and hopes to hike the
    Inca Trail in Peru once they graduate, and they plan each trip with a blend of meticulous budgeting and spontaneous adventure.
  culinary: Curtis Jean experiments with soul‑food twists such as miso‑glazed collard greens, shrimp and grits infused with smoked paprika, and sweet‑potato pie topped with a ginger‑crunch, often sourcing
    heirloom cornmeal and locally sourced okra from farmers’ markets, and they enjoy perfecting each dish while occasionally over‑seasoning in the excitement of creative cooking.
  core: Curtis Jean blends a competitive edge in construction with a vibrant social life, a love for art‑inspired cooking, and a pragmatic yet curious approach to money and health, and they constantly seek
    to marry structure with creativity.
background:
  cultural: Curtis grew up in an African‑American family that blends Southern roots with the multicultural environment of Connecticut. Family gatherings emphasized storytelling, music, and soulful cooking,
    instilling a strong sense of community, resilience, and pride in his heritage. He regularly participates in the local Black Heritage Festival and remains active in his church youth group, where he helps
    organize events that celebrate Black art and history. These cultural experiences shape his appreciation for both tradition and contemporary expression, influencing his work ethic, his desire to create
    inclusive spaces, and his commitment to uplifting his community through construction and mentorship.
attributes:
  skills: '[''Project scheduling (MS Project, Primavera)'', ''Blueprint and drawing interpretation'', ''Cost estimation and budgeting'', ''Site supervision and safety compliance (OSHA)'', ''Subcontractor
