    outreach program development'']'
  hobbies: '[''Watercolor painting'', ''Sketching abstract art'', ''Visiting art galleries and museums'', ''Attending live theater and improv comedy'', ''Reading philosophy and contemporary literature'',
    ''Traveling to cultural festivals'', ''Experimental cooking and culinary classes'', ''Gardening (herb garden)'', ''Volunteering for financial literacy workshops'', ''Blogging about art and finance'',
    ''Abstract photography'', ''Hosting social board game nights'']'
  career_goals: Sophia aims to transition into a senior leadership role—such as regional branch manager or director of financial education—where she can shape policy and mentor junior counselors. She envisions
    launching a boutique consulting practice that serves artists, freelancers, and other creative professionals, offering financial services framed through an artistic lens. Over the next five years, she
    plans to develop a county‑wide financial literacy initiative that blends workshops with interactive art installations, author a book that connects abstract thinking with personal finance, and become
    a sought‑after speaker at conferences and community events across the Mid‑Atlantic region.
