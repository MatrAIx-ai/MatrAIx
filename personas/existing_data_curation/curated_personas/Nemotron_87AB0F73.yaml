personas:
  professional: Paris Rivenburg, a seasoned community event coordinator turned volunteer curator at the Cedar Rapids Museum of Art, leverages meticulous project‑management skills, a critical eye for art
    appraisal, and a competitive drive to craft rigorously researched exhibitions, while their organized, skeptical nature keeps them vigilant against budget overruns and their frequent worries push them
    to double‑check every detail.
  sports: Paris Rivenburg enjoys low‑impact fitness through morning walks with the Cedar Rapids Walking Club and seasonal gardening workouts, follows the Iowa Hawkeyes football and baseball teams and cheers
    for the RoughRiders hockey squad, while their methodical nature keeps a detailed step‑count log, even if occasional stress makes them skip a session.
  arts: Paris Rivenburg immerses themselves in the arts by curating gallery tours featuring Grant Wood and Ansel Adams, attending Playhouse Theatre productions of August Wilson’s dramas, and collecting
    vinyl records of Beethoven and Joni Mitchell, all of which fuel their meticulous research and competitive drive to produce insightful exhibition catalogues.
  travel: Paris Rivenburg crafts their travel agenda around art‑centric locales— from the historic Amana Colonies in Iowa to Florence’s Uffizi, the Musée d’Orsay in Paris, and Kyoto’s ancient temples— using
    detailed spreadsheets and senior discounts, though unexpected museum grant deadlines sometimes force them to delay a coveted European workshop.
  culinary: Paris Rivenburg prefers farm‑to‑table Midwestern fare, often preparing heirloom tomato and basil bruschetta, roasted beet and goat‑cheese salad with local honey, and a weekend apple crisp, while
    their modest cooking skill yields occasional burnt edges but fuels their love for tasting new dishes at the Cedar Rapids Downtown Farmers Market.
  core: Paris Rivenburg is a detail‑obsessed art lover who juggles meticulous curatorial projects, chronic worry, and a secret habit of binge‑watching nature documentaries after midnight, often convincing
    themselves that the late‑night viewing is research for a future exhibition.
background:
  cultural: Paris grew up in the Midwestern town of Cedar Rapids, Iowa, within a white, largely German‑Scandinavian heritage that values community, modesty, and hard work. Her upbringing emphasized participation
    in local events such as the Iowa State Fair and community volunteerism, fostering a strong sense of civic responsibility. The region's rich agricultural history and growing arts scene influenced her
    love for both the natural landscape and creative expression. Her cultural roots combine traditional Midwestern values—reliability, practicality, and modesty—with an openness to new ideas cultivated
    by the city's vibrant arts community.
attributes:
  skills: '[''Event Planning and Coordination'', ''Budget Management and Financial Tracking'', ''Art Curation and Appraisal'', ''Research and Documentation (local history & genealogy)'', ''Digital Photography'',
    ''Computer Literacy (Microsoft Office, basic photo editing)'', ''Community Outreach and Volunteer Management'', ''Writing and Editing for newsletters'', ''Public Speaking'', ''Critical Analysis and
    Evaluation'']'
  hobbies: '[''Visiting art museums and galleries'', ''Reading art‑history books and biographies'', ''Digital photography of local scenery and historic sites'', ''Gardening'', ''Genealogy research'', ''Knitting
    and crocheting'', ''Attending local theater productions'', ''Traveling to cultural exhibitions and workshops'', ''Yoga and meditation'']'
  career_goals: Paris aims to deepen her involvement in Cedar Rapids' arts scene by securing a volunteer curator position at the Cedar Rapids Museum of Art, eventually contributing to exhibition planning
    and community programming. She plans to enroll in adult‑education courses in art history to formalize her expertise and hopes to launch an online platform that shares her research on regional art and
    genealogy. Additionally, she seeks to integrate regular mindfulness practices to better manage stress, enabling her to mentor younger volunteers and perhaps take on a board‑member role at a local cultural
    nonprofit.
