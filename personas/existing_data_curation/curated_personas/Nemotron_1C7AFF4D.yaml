  hobbies: '[''Building LEGO models'', ''Reading adventure books'', ''Playing soccer in a small team'', ''Exploring local nature trails'', ''Gardening with family'', ''Playing structured video games (Minecraft,
    Mario Kart)'', ''Collecting baseball cards'', ''Sketching and drawing'']'
  career_goals: Logan dreams of a career that combines his love of routine, hands‑on problem solving, and helping others. He hopes to become an automotive mechanic, working in a well‑structured shop where
    he can diagnose and fix vehicles day after day. He also imagines one day running his own small garage, offering reliable service to his community. Additionally, he is intrigued by the idea of becoming
    a park ranger, where his steady temperament and care for nature could contribute to preserving local green spaces.
