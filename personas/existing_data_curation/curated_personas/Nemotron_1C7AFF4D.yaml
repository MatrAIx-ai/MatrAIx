personas:
  professional: Logan Edlund, a budding young LEGO architect and aspiring engineer, showcases meticulous building skills and a practical, hands‑on problem‑solving style while thriving in the familiar routine
    of classroom projects and group assignments, though they sometimes let disorganization slip when deadlines loom.
  sports: Logan Edlund plays midfield for the Eastside Youth Soccer Club, enjoys the structured drills and regular weekend matches, cheers for the local professional baseball team the Springfield Sox, and
    balances their active routine with quiet afternoons sketching player movements.
  arts: Logan Edlund immerses themselves in creative expression by sketching characters from the Percy Jackson series, listening to the whimsical scores of the "Minecraft" soundtrack and the uplifting pop
    hits of Taylor Swift, and collecting original comic strips by Ben Hatke, which fuel their imagination during quiet evenings.
  travel: Logan Edlund prefers family‑planned trips with clear itineraries, such as weekend camping at Blue Ridge State Park and a spring visit to the Grand Canyon, while dreaming of an organized cultural
    tour of Kyoto’s bamboo forests once they turn twelve.
  culinary: Logan Edlund enjoys simple, comforting foods like homemade mac and cheese with extra cheddar, can confidently assemble a peanut butter‑banana sandwich, loves helping in the backyard garden to
    harvest fresh tomatoes for a DIY pizza topped with pepperoni, and delights in treating themselves to chocolate chip cookies after a LEGO session.
  core: Logan Edlund is a routine‑loving, quietly kind ten‑year‑old who balances a love for structured LEGO builds and soccer with occasional forgetfulness about chores and a habit of stashing spare change
    in every pocket.
background:
  cultural: Logan was raised in a middle‑class, white family in the Charlotte suburbs of Mecklenburg County. His upbringing blends traditional Southern values—such as hospitality, a strong sense of community,
    and family gatherings around holidays—with the broader, multicultural environment of a growing urban area. He attends a public elementary school where he experiences a mix of cultural perspectives,
    participates in local community events like the Charlotte Summer Festival, and enjoys regional foods like barbecue and sweet tea at family gatherings. His family’s routine includes church attendance
    on Sundays and seasonal outdoor activities, reflecting a blend of Southern customs and modern suburban life.
