personas:
  professional: David Kearney, an experienced consultative sales specialist who leverages HubSpot and Salesforce to drive pipeline growth, blends meticulous daily planning with a calm, assertive presence
    in client meetings, and uses his natural curiosity to explore new service technologies while mentoring new hires with patience and clear communication.
  sports: David Kearney, a low‑key outdoor enthusiast who spends weekends fishing on Lake Martin and hiking the nearby trails, follows the Alabama Crimson Tide football team, plays recreational softball
    with a local club, and squeezes in early morning jogs on the trail during spring while prioritizing functional fitness over high‑intensity workouts.
  arts: David Kearney, a hands‑on creator who finds artistic expression in woodworking furniture, enjoys strategic board games like Settlers of Catan at small gatherings, unwinds to classic rock icons such
    as Led Zeppelin and Lynyrd Skynyrd and country storytellers like Johnny Cash, and frequently reads non‑fiction on psychology and business strategy to fuel his creative problem‑solving.
  travel: David Kearney, a planner‑oriented traveler who prefers short, purposeful trips that blend leisure and learning, has explored the historic streets of New Orleans, the mountain scenery of Asheville,
    and the serene lakes of Ontario, while dreaming of a future road‑trip through the Rocky Mountains, all while balancing travel costs with his family's budgeting goals.
  culinary: David Kearney, a competent home chef who specializes in simple grilled Southern dishes such as smoked chicken thighs, collard greens, and cornbread, enjoys experimenting with dry rubs and hot
    sauces, pairs meals with craft beers, and occasionally dines at local barbecue joints to gather new flavor ideas.
  core: David Kearney, a methodical sales professional with a love for quiet outdoor retreats, meticulous budgeting, spontaneous anxiety spikes, and a habit of turning woodworking flaws into learning moments.
background:
  cultural: David grew up in a small town in Alabama and now lives in Tallassee, Elmore County. His upbringing reflects the values of Southern hospitality, community reliance, and a strong work ethic typical
    of the region, while his family traditions include regular church attendance and participation in local festivals. He respects the deep roots of his white Southern heritage, such as close‑knit family
    ties and a preference for modest, understated celebrations. At the same time, David embraces modern influences—technology, contemporary self‑development literature, and progressive mental‑health perspectives—blending
    them with his conventional background to create a balanced cultural identity.
attributes:
  skills: '[''Consultative sales'', ''Customer relationship management (CRM)'', ''Lead generation and qualification'', ''Negotiation and contract closing'', ''Sales forecasting and data analysis'', ''Project
