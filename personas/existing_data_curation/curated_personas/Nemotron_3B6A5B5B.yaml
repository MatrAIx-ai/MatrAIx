  hobbies: '[''Fishing'', ''Hiking'', ''Woodworking'', ''Strategic board games (e.g., Settlers of Catan)'', ''Reading non-fiction (psychology, business)'', ''Mindfulness meditation and journaling'', ''Community
    volunteering (food drives)'', ''Cooking (grilling Southern cuisine)'', ''Listening to classic rock and country music'']'
  career_goals: David aims to move into a formal leadership role within the next three to five years, targeting a sales manager position where he can oversee a small team and shape regional sales strategies.
    He plans to earn a Certified Professional Sales Leader credential to solidify his expertise and increase his credibility. Long‑term, he envisions a transition to a regional sales director role or launching
    a consulting side‑business that helps local small enterprises improve their sales processes. He also wants to champion mental‑health awareness in his workplace, advocating for resources and supportive
    policies that benefit both himself and his colleagues. Balancing practicality with curiosity, David seeks continuous learning opportunities—especially in emerging service technologies—to stay ahead
    of market trends while ensuring a stable, family‑friendly income.
