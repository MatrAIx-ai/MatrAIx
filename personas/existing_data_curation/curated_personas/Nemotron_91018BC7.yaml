  hobbies: '[''building blocks'', ''drawing and coloring'', ''listening to storybooks'', ''playing in the backyard'', ''nature exploration with magnifying glass'', ''singing nursery rhymes'', ''dancing
    to music'', ''pretend play (kitchen, doctor)'', ''sticker collecting'']'
  career_goals: Even at three, Bryanna dreams big. She often says she wants to be a teacher so she can help other kids learn, a veterinarian to care for animals, or an astronaut to explore space. She also
    imagines helping her family around the house and learning to read all the books in the library. These ambitions reflect her curiosity about the world and a practical desire to be useful and dependable.
