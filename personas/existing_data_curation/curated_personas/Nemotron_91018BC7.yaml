personas:
  professional: Bryanna Neal, a pint‑sized builder‑in‑training, loves constructing block towers with neat geometry, demonstrating early architectural curiosity and a practical eye for balance, while they
    eagerly share their creations with peers in a cooperative yet assertive manner.
  sports: Bryanna Neal delights in toddler soccer drills at the local community center and joins a mini gymnastics class, cheering for the hometown baseball team the Seattle Mariners while proudly wearing
    a tiny jersey from the local youth swimming club, and they often imitate the players’ victory dances.
  arts: Bryanna Neal loves watching animated classics like The Lion King and dancing to songs from Disney’s sing‑along soundtracks, often recreating scenes with crayons and plush toys, while their favorite
    artwork includes vibrant pictures of bright rainbows by Eric Carle.
  travel: Bryanna Neal enjoys family trips to the sandy shores of Clearwater Beach, the magical realms of Walt Disney World in Orlando, and weekend visits to Grandma’s countryside farm, favoring pint‑sized
    travel backpacks and colourful story‑books to soothe their curiosity during the journey.
  culinary: Bryanna Neal prefers buttery toast with strawberry jam, mac and cheese topped with a sprinkle of cheddar, and crafts tiny fruit kebabs with grapes and banana slices, although they often sneak
    extra chocolate chips into their frozen yogurt when no one watches.
  core: Bryanna Neal is a three‑year‑old explorer who balances bold imagination with practical routines, yet they sometimes get tangled in worries over bedtime and the occasional sticky‑fingered snack theft.
background:
  cultural: Bryanna is raised in a white, middle‑class family in Cochranville, a small community in Chester County, Pennsylvania. Her parents have German and Irish ancestry and emphasize early education,
    family meals, and outdoor activities. The family celebrates typical American holidays such as Thanksgiving, Christmas, and Easter, and participates in local community events like the county fair and
    church gatherings. Exposure to the rural setting fosters a love of nature, while the preschool environment supports her social and academic development.
attributes:
  skills: '[''fine motor coordination (cutting, coloring)'', ''basic counting and number recognition'', ''vocabulary development and storytelling'', ''simple problem solving (puzzles, shape sorting)'',
