personas:
  professional: Chase White is a mid‑level architect who blends rigorous parametric modeling in Grasshopper and Python with a hands‑on love of sustainable timber construction, leveraging their curiosity
    and pragmatic Midwestern sensibility to deliver community‑centric, code‑compliant designs while often juggling project deadlines with a relaxed, flexible work rhythm.
  sports: Chase White supports the Wisconsin Badgers football and the Milwaukee Brewers baseball teams, hits the Olin Woods trail for weekend hikes, joins the Madison Cycling Club for lakefront rides during
    summer, and swaps winter cross‑country skiing with occasional pickup basketball games at the community center.
  arts: Chase White spends evenings sketching architectural details at a downtown coffee shop, curates a growing Instagram series of geometric urban photography inspired by Ansel Adams and local photographer
    Greg Hobbs, and unwinds at the Madison Museum of Contemporary Art while listening to folk‑indie acts like Bon Iver and Sufjan Stevens, which subtly shape their design aesthetic.
  travel: Chase White favors low‑key road trips that blend scenic hikes with modest lodging, having explored the North Shore of Lake Superior, spent a rainy weekend in Minneapolis, and dreaming of a summer
    bike tour through Denmark’s coastal towns, always packing a sketchbook for spur‑of‑the‑moment site studies while balancing a modest travel budget.
  culinary: Chase White enjoys cooking farm‑to‑table meals such as smoked Lake Trout with fresh dill, seasonal heirloom tomato salad drizzled with locally produced apple‑cider vinaigrette, and a creamy
    Wisconsin cheddar cheese soup, demonstrating a competent yet exploratory kitchen hand that favors locally sourced ingredients and occasional craft‑brew pairings.
  core: Chase White is a quietly ambitious, nature‑inspired architect whose love of sustainable design, relaxed budgeting, and solitary sketching fuels a pragmatic yet curious worldview, seasoned with a
    penchant for spontaneous craft‑beer outings and occasional disorganization.
background:
  cultural: Chase grew up in a predominantly white, middle‑class family with deep roots in the Upper Midwest, tracing part of his ancestry to German and Scandinavian immigrants who settled in Wisconsin
    in the late 19th century. The regional culture—marked by practicality, modesty, and a strong sense of community—shaped his pragmatic outlook and appreciation for well‑engineered, functional design.
    At the University of Wisconsin‑Madison, he was immersed in a progressive, academically rigorous environment that encouraged interdisciplinary collaboration between architecture, engineering, and environmental
    studies. The city’s vibrant arts scene, abundant lakes, and seasonal extremes further influenced his aesthetic sensibility, fostering a preference for sustainable, nature‑integrated architecture that
    respects the local climate and cultural heritage.
attributes:
  skills: '["AutoCAD", "Revit", "BIM Management", "Grasshopper (parametric design)", "Python (for computational design)", "Sustainable design principles", "LEED Accredited Professional (in progress)", "Building
    code compliance (Wisconsin)", "Structural analysis basics", "3D modeling (SketchUp, Rhino)", "Physical model making", "Construction documentation", "Project coordination"]'
  hobbies: '["Sketching architectural details", "Hiking in Olin Woods and Ice Age Trail", "Urban photography", "Visiting local microbreweries with friends", "Woodworking DIY projects", "Playing strategy
    video games (Civilization VI)", "Cycling around Madison Lakes", "Cooking seasonal farm-to-table meals"]'
  career_goals: Chase aims to become a leading voice in sustainable, community‑centric architecture in the Upper Midwest. Over the next five years, he plans to earn his LEED Accredited Professional rating
    and to spearhead projects that integrate cross‑laminated timber and net‑zero energy strategies, leveraging his parametric design skills to optimize material use. He envisions launching a small boutique
    practice that can offer tailored design services to local non‑profit housing initiatives while maintaining the flexibility to explore experimental research collaborations with the University of Wisconsin.
    Ultimately, he hopes to influence regional building standards and mentor junior designers, balancing his desire for innovation with a pragmatic, locally grounded approach.
