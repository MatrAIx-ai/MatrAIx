  hobbies: '["Cooking traditional South Asian cuisine", "Gardening", "Reading literary fiction and Urdu poetry", "Knitting", "Yoga and meditation", "Volunteering at community center", "Walking nature trails",
    "Listening to classical music", "Participating in small book clubs"]'
  career_goals: Nighat aims to advance to a senior administrative or office manager role within the next five years and to obtain the Certified Administrative Professional (CAP) credential. She seeks to
    develop leadership skills to supervise a small team and to serve as a cultural liaison between her workplace and the local South Asian community by organizing awareness workshops. Improving workplace
    well‑being, reducing stress, and incorporating mindfulness practices are personal priorities, and she plans to pursue stress‑management training to support herself and her colleagues.
