persona_description: A researcher and scientist who specializes in the field of environmental science, specifically focused on the recycling and conversion of plastic waste into hydrogen gas and carbon
  nanotubes. They are part of a team from the U.K., China, and Saudi Arabia that has developed a process for this purpose. Their research aims to find a way to recycle ordinary consumer plastics into a
  useable energy source and a useable carbon nanotube source, which could help mitigate the impact of plastic pollution on the environment. They have tested their process and found that the conversion process
  lasted just 30 to 90 seconds, and resulted in recovery of 97% of the hydrogen in the plastic. They acknowledge that there are currently other large-scale applications that involve the use of microwaves
  in commercial venues, suggesting that such use for recycling plastics might be possible.
