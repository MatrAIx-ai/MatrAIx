  career_goals: Geraldine aims to launch a series of interdisciplinary workshops that blend abstract art, philosophy, and critical thinking for adult learners in Overland Park. She hopes to publish a collection
    of reflective essays and poems that explore her lifelong curiosity, and to serve as a mentor and consultant for newer teachers seeking innovative pedagogical approaches. Additionally, she aspires to
    contribute to local museum programming and to earn recognition as a speaker on lifelong learning and creative cognition.
