  hobbies: '["Gardening (vegetables, herbs)","Quilting and textile crafts","Knitting and crocheting","Historical fiction reading","Baking breads and pies","Preserving and canning","Church choir singing","Walking
    nature trails","Genealogy research"]'
  career_goals: Although she is not currently part of the formal workforce, Suzanne remains motivated to contribute meaningfully to her family and community. She aims to expand her volunteer leadership
    role at the local church by chairing the outreach committee, which will allow her to organize regular assistance for neighbors in need. She also hopes to turn her quilting hobby into a modest home‑based
    venture, selling handmade blankets and quilts at the county fair and through an online marketplace, thereby generating a supplemental income. Suzanne is committed to maintaining her health and independence,
    so she plans to attend a weekly senior fitness class and continue learning new technology skills, such as video calling and digital photo organization, to stay connected with her grandchildren. Her
    long‑term ambition is to ensure a stable, comfortable environment for herself and her husband as they age, while fostering a sense of belonging and support within her small‑town community.
