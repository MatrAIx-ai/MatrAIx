personas:
  professional: An aspiring junior tinkerer, George Bourne spends afternoons dismantling toy cars and reassembling them with a screwdriver, showing the curiosity of a budding engineer while applying the
    practical, self‑reliant mindset learned from weekend projects with dad.
  sports: George Bourne plays in a local Little League baseball team, cheers loudly for the nearby high school Eagles during Saturday games, and enjoys weekend family hikes through the nearby state park,
    where their competitive spirit shines when racing up the trails but they also cherish the camaraderie of group picnics after a match.
  arts: George Bourne loves drawing cartoon farm animals inspired by picture books, sings along to Disney classics like 'Let It Go', and collects stickers of Pixar characters, often creating elaborate storyboards
    that blend imagination with the practical habit of organizing their art supplies in neat rows.
  travel: George Bourne has visited the Pocono Mountains for a family camping trip, explored the historic streets of Gettysburg on a school field trip, and dreams of riding the roller coasters at Disney
    World, favoring organized itineraries that include a new playground each day and a brief rest period for nap time.
  culinary: George Bourne prefers chicken nuggets, macaroni & cheese, and corn on the cob, but also enjoys helping grandma roll out dough for homemade apple pie, often insisting on adding extra cinnamon
    while refusing to eat peas, showcasing a selective yet curious palate.
  core: George Bourne is a curious yet practical five‑year‑old who balances a competitive drive with community spirit, often juggling a LEGO set while eyeing the candy store, and never misses a Fourth of
    July fireworks show with the family.
background:
  cultural: George is raised in a white family in Derry, a small community in Westmoreland County, Pennsylvania. His ancestry includes Irish and German roots, reflecting the historical immigration patterns
    of the region. The household values self‑reliance, community involvement, and modest, practical living. They attend a local Methodist church, celebrate traditional American holidays such as the Fourth
    of July with fireworks and picnics, and support local sports teams. The cultural environment blends rural Pennsylvania’s appreciation for the outdoors, a strong work ethic, and a close‑knit neighborhood
    camaraderie.
