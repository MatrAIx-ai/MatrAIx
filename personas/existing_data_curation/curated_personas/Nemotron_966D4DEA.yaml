  career_goals: George dreams of becoming an astronaut to explore space, yet he also expresses a practical desire to be a firefighter who helps his community. In the short term, he aims to win his school’s
    science fair, learn to ride his bike without training wheels, and improve his soccer skills. His competitive streak drives him to excel in LEGO building contests and classroom challenges, reflecting
    his blend of curiosity, practicality, and ambition.
