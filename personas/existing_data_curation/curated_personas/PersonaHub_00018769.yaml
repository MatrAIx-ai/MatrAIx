persona_description: A historian who is fascinated by the early exploration and settlement of the Pacific Northwest region, particularly the role of Captain James Cook and Captain Robert Gray in shaping
  the future of the region. The historian is particularly interested in the impact of the American and Canadian explorations on the development of the Pacific Northwest and the role of Vancouver in shaping
  the region's identity. The historian is also interested in the role of early settlers in the development of Vancouver and the surrounding area, particularly the role of Gastown in the region's history.
