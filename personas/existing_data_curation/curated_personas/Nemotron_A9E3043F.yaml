  hobbies: '[''Cumbia and salsa dancing'', ''Cooking Colombian cuisine'', ''Attending church services'', ''Volunteering at senior center'', ''Gardening tropical plants'', ''Walking on the beach'', ''Watching
    classic telenovelas'', ''Bingo nights'', ''Storytelling with friends'']'
  career_goals: At 75, Josefina aims to keep driving part‑time to stay active and maintain financial independence for her healthcare needs. She hopes to obtain a defensive‑driving certification and, over
    the next few years, transition into a mentorship role, guiding younger drivers in safe, courteous practices. Ultimately, she dreams of launching a small, community‑focused transport service that offers
    reliable rides for seniors and new Colombian immigrants in Broward County, preserving her cultural ties while giving back to the neighborhood that supports her.
