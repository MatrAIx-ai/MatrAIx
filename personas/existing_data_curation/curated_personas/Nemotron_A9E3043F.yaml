personas:
  professional: Josefina Levy, a veteran Class A truck driver with bilingual sales expertise, leverages meticulous route planning, routine safety inspections, and a warm, talk‑ative approach to customer
    service while mentoring new drivers and laying groundwork for a senior‑focused community transport venture.
  sports: Josefina Levy, a devoted fan of the Miami Dolphins and Inter Miami CF, blends weekend bingo with beachside walks and weekly salsa dance classes to keep her joints limber, and participates in a
    local senior fitness club’s low‑impact aqua‑aerobics to manage her arthritis.
  arts: Josefina Levy, a passionate lover of classic telenovelas like María la del Barrio starring Thalía, and an avid attendee of community cumbia and salsa nights featuring live bands such as Grupo Niche,
    often ends evenings sharing animated stories that weave music, drama, and family memories together.
  travel: Josefina Levy favors leisurely travel, meticulously planning short trips to the Florida Keys and longer vacations to the Bahamas and Seville, Spain, where she can explore historic neighborhoods
    at a comfortable pace while ensuring travel costs fit within her healthcare budgeting.
  culinary: Josefina Levy delights in preparing arepas stuffed with cheese and shredded chicken, hearty sancocho brimming with yucca, plantains, and corn, and crisp empanadas flavored with cumin and cilantro,
    often spicing her kitchen with achiote and sharing meals that double as community gatherings.
  core: Josefina Levy blends routine‑driven independence with a magnetic sociability, telling animated stories at bingo while nursing a sweet‑tooth habit that sometimes undermines their diabetes plan.
background:
  cultural: Josefina was born and raised in Colombia, growing up in a close‑knit family that celebrated Catholic traditions, vibrant music, and communal meals. She carries the warmth and hospitality typical
    of Colombian culture, speaking fluent Spanish and preserving customs such as Sunday family lunches featuring bandeja paisa and lively celebrations of Carnaval. Since moving to Hollywood, Florida, she
    has blended her Colombian roots with local Floridian life, attending community festivals, sharing her cuisine with neighbors, and maintaining a strong sense of identity while adapting to her new surroundings.
attributes:
  skills: '[''Class A truck operation'', ''Vehicle safety inspection and basic maintenance'', ''Load securing and cargo handling'', ''Route planning and GPS navigation'', ''Bilingual communication (Spanish/English)'',
