personas:
  professional: Haiyan Lor, an aspiring robotics programmer, blends a natural curiosity for code with a practical knack for building functional prototypes, while balancing organized study sessions with
    the flexibility to tinker late into the night.
  sports: Haiyan Lor dabbles in youth soccer with the local Midtown Tigers, cheers for the national women's rising star team during televised matches, follows the professional e‑sports scene especially
    the League of Legends World Championship, and maintains a personal goal of mastering a daily 20‑minute conditioning routine.
  arts: Haiyan Lor spends weekends sketching manga heroes inspired by the dynamic style of Masashi Kishimoto, while their playlist cycles between BTS, Blackpink, and Vietnamese pop star Son Tung M-TP, and
    they binge‑watch Studio Ghibli films for artistic motivation.
  travel: Haiyan Lor prefers short, purposeful trips—like weekend beach clean‑up missions in the coastal town of Seaview and a planned visit to the robotics exhibit at the city’s tech museum—while day‑dreaming
    about a future backpacking adventure through the historic streets of Kyoto and the bustling gaming districts of Seoul, constrained by family budget and school schedule.
  culinary: Haiyan Lor whips up family‑style pho broth with star anise and rice noodles, rolls fresh spring rolls using rice paper, cilantro, and shrimp, and experiments with adding spicy sriracha drizzle
    to pizza, albeit occasionally over‑salting the broth in pursuit of the perfect flavor.
  core: Haiyan Lor is a competitively curious teen who balances code, soccer, and sketchbooks, meticulously saves for tech dreams while fighting occasional allergy flare‑ups, all underscored by a skeptical
    edge and a penchant for late‑night gaming marathons.
background:
  cultural: Haiyan was born and raised in Pompano Beach, Florida, to immigrant parents of Vietnamese descent who emigrated from Ho Chi Minh City. At home, Vietnamese language and cultural traditions are
    woven into everyday life—her family celebrates Tet with traditional foods, lanterns, and ancestor veneration, and they observe the Mid‑Autumn Festival with mooncakes and family gatherings. This bicultural
    upbringing blends the collectivist values and emphasis on education common in Vietnamese culture with the diverse, open‑air lifestyle of coastal Florida. Growing up in Broward County, Haiyan is also
    exposed to a mosaic of cultures, including Haitian, Latino, and other Asian communities, which has broadened her social perspective and sparked an appreciation for multicultural collaboration. Her parents
    encourage academic achievement and community service, shaping her practical outlook and competitive spirit while fostering a deep respect for her heritage.
