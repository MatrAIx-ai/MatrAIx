    e-sports"]'
  career_goals: Haiyan aspires to blend her love for technology with real‑world impact. In the short term, she aims to earn a spot in a competitive high‑school STEM program, lead her middle‑school robotics
    team to a regional championship, and develop a mobile app that helps students track assignments and study goals. She dreams of pursuing a bachelor’s degree in Computer Science or Electrical Engineering,
    eventually becoming a software engineer or product designer who creates educational tools and sustainable tech solutions. Her long‑term ambition includes contributing to community projects in Pompano
    Beach, such as designing low‑cost water‑quality sensors for local beach clean‑up initiatives.
