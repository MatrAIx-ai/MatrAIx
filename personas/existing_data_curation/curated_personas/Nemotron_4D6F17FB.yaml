  career_goals: Although currently not part of the formal workforce, Sonny aims to deepen his community involvement as a mentor for local art programs and to launch a modest woodworking side business that
    sells handcrafted items to support his family’s financial stability. He hopes to travel to major art museums across the United States to broaden his artistic perspective, and he aspires to write a memoir
    that weaves together his Southern heritage, personal growth, and love for the arts. Additionally, he seeks to nurture intergenerational harmony in Cookeville by organizing workshops that bring together
    seniors, youth, and families.
