personas:
  professional: Sonny Denno, a 52‑year‑old community‑focused handyman turned budding woodworking entrepreneur, blends meticulous event planning from the Putnam County Art Walk with a calm, collaborative
    demeanor to turn reclaimed lumber into bespoke furniture while mentoring local art programs and coordinating intergenerational workshops.
  sports: Sonny Denno hikes the Appalachian ridgelines most weekends with the local Cookeville Trail Club, watches the Nashville Predators hockey games and the Tennessee Tech Golden Eagles basketball team,
    and plays catch‑up softball in a senior league that meets at the municipal park every Thursday.
  arts: Sonny Denno frequents the Putnam County Gallery for regional painters, sings folk songs from Old Crow Medicine Show in community theater productions, captures rural vistas inspired by Ansel Adams
    in black‑and‑white photography, and draws inspiration from the improvisational storytelling of playwright August Wilson.
  travel: Sonny Denno prefers road‑trip itineraries that blend museum stops—like the Museum of Modern Art in New York and the Getty Museum in Los Angeles—with Appalachian trail detours, has already visited
    Asheville’s River Arts District and Austin’s South Congress, and dreams of a cross‑country train ride to see the Art Institute of Chicago and the National Gallery of Art in Washington, D.C.
  culinary: Sonny Denno cooks Southern classics such as shrimp and grits, fried green tomatoes, and collard greens, but habitually experiments by adding miso glaze, smoked paprika, or ancho chili, often
    sourcing fresh heirloom tomatoes, locally milled cornmeal, and bourbon‑infused maple syrup for signature brunch plates.
  core: Sonny Denno is a curiosity‑driven handyman‑artist who curates community harmony through woodworking, photography, and theater, all while juggling a disciplined budget, a mild health regime, and
    a penchant for spicy Southern twists.
background:
  cultural: Sonny is a white American who grew up in central Tennessee, surrounded by the values of Southern hospitality, community cohesion, and a respect for tradition. His upbringing in a modest, close‑knit
    town exposed him to Appalachian folk arts such as quilting, woodworking, and gospel music, while his local church and family gatherings reinforced a cooperative spirit and an emphasis on harmony. These
    cultural influences shape his appreciation for art, his dedication to community service, and his balanced approach to organization and flexibility.
