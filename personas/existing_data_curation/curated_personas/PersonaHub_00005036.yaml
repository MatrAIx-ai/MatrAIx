persona_description: A researcher or social scientist who is interested in understanding the social impacts of global economic shocks, particularly those experienced by communities in developing countries.
  They are likely to be familiar with rapid participatory research methods and have experience working with qualitative data. They may have a background in sociology, anthropology, or economics, and may
  be particularly interested in exploring the impacts of the 'Triple F' crises on people's lives and livelihoods. They may also be interested in how official responses to the crisis have affected these
  communities and the long-term effects of the crisis on their well-being.
