personas:
  professional: Jorge Perezperez, a 19‑year‑old industrial maintenance trainee, leverages their methodical troubleshooting, precision welding, and blueprint‑reading expertise to swiftly diagnose high‑temperature
    refractory equipment failures, while their competitive drive fuels a relentless pursuit of CMRT and CWI certifications and a mentorship role in a community workshop.
  sports: Jorge Perezperez fuels their competitive spirit by playing weekly pickup soccer matches with the Portales Rangers, cheering for New Mexico United in the USL Championship, and joining seasonal
    sand‑dune hikes that double as endurance training sessions.
  arts: Jorge Perezperez’s evenings often feature listening to norteño legends like Los Tigres del Norte and Ramón Ayala on a vintage stereo, a habit that deepens their appreciation for rhythm and storytelling
    and subtly informs the precise timing they apply to welding and robotics projects.
  travel: Jorge Perezperez prefers low‑cost road adventures, having road‑tripped to Carlsbad Caverns and the Texas Hill Country during spring break, while dreaming of a solo trek across the Atacama Desert
    to study extreme high‑temperature furnace designs in harsh climates.
  culinary: Jorge Perezperez regularly prepares hearty pozole with hominy, pork shoulder, and dried guajillo chilies, perfects tamales wrapped in corn husks, and experiments with grilled carne asada seasoned
    with cilantro, lime, and cumin, showcasing a moderate culinary skill that blends tradition with a tinkerer’s improvisation.
  core: Jorge Perezperez channels a competitive, methodical mind into both industrial maintenance and midnight car restorations, juggling a love for high‑octane mechanics with impromptu soccer scrimmages,
    while occasionally sacrificing sleep to tinker on Arduino robots.
background:
  cultural: Jorge was raised in a bilingual Mexican‑American household in Portales, NM. His family maintains strong ties to Mexican traditions, celebrating holidays such as Día de los Muertos and Mexican
    Independence Day, and attending weekly Mass at the local Catholic church. Spanish is spoken at home, and he often helps translate for older relatives. The blend of Mexican cultural values—respect for
    hard work, family cohesion, and community involvement—with the frontier spirit of New Mexico shapes his identity. He participates in local Hispanic festivals, enjoys regional cuisine, and upholds the
    craftsmanship ethic passed down from his father's work as a construction laborer.
attributes:
  skills: '[''precision welding'', ''hydraulic system repair'', ''pneumatic troubleshooting'', ''blueprint reading'', ''preventative maintenance planning'', ''OSHA safety compliance'', ''diagnostic software
    usage'', ''CNC machine operation'', ''refractory lining inspection'', ''team coordination'']'
  hobbies: '[''classic car restoration'', ''scale model engine building'', ''Arduino robotics projects'', ''soccer (playing and watching)'', ''hiking in New Mexico'', ''cooking Mexican dishes'', ''listening
    to norteño music'', ''reading technical magazines'', ''community welding workshops'']'
  career_goals: Jorge aims to become a certified lead mechanic specializing in high‑temperature refractory equipment, pursuing credentials such as the Certified Maintenance & Reliability Technician (CMRT)
    and Certified Welding Inspector (CWI). He envisions advancing to a supervisory role at a regional petrochemical plant or large manufacturing facility, where he can lead a team, implement lean maintenance
    practices, and mentor younger technicians. In the longer term, he aspires to launch his own mobile industrial equipment repair service, leveraging his competitive drive to build a reputation for rapid,
    reliable service across New Mexico and neighboring Texas.
