  hobbies: '[''Hosting multicultural potluck gatherings'', ''Playing cajón and leading Afro‑Peruvian dance circles'', ''Experimenting with modern twists on traditional Peruvian recipes'', ''Urban herb gardening'',
    ''Storytelling for seniors at the community center'', ''Mindfulness breathing and senior‑focused yoga'', ''Smartphone photography and video‑calling with family abroad'']'
  career_goals: Inti aims to deepen his role as a cultural ambassador for the Peruvian community in Contra Costa County, leading cooking workshops that blend Andean flavors with California produce and organizing
    spontaneous cultural gatherings that celebrate heritage. He aspires to publish a memoir‑style cookbook that interweaves personal stories, family recipes, and reflections on migration. A parallel ambition
    is to advocate for mental‑health awareness among older Latino adults, using his own experience with anxiety to develop peer‑support groups. While he is retired from formal employment, he seeks to mentor
    younger volunteers, help them navigate bicultural identities, and eventually become a recognized elder voice in local multicultural councils.
