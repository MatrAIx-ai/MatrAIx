personas:
  professional: Zonna Bailey, a veteran community‑service professional with three decades of case management, resource navigation, and emergency response experience, blends an arts‑humanities education
    to communicate persuasively with funders while designing routine‑based programs, and despite a preference for structured processes, they can spontaneously adapt to client crises—though tight deadlines
    often provoke anxiety—as they pursue a senior program director role.
  sports: Zonna Bailey, a faithful member of the Belton Senior Walking Club who clocks daily bird‑watching strolls around Belton Lake and tunes in to the Dallas Cowboys, Texas Rangers, and Austin FC for
    her seasonal sports fix, embraces low‑impact exercise as a stress‑relief routine while occasionally joining community softball games despite limited athletic ambition.
  arts: Zonna Bailey, a dedicated Methodist choir member who savors Southern gospel harmonies like those of the Carter Family, spends evenings quilting classic hexagon patterns inspired by traditional folk
    art, and devours historical novels by Ken Follett and biographies of Maya Angelou, while occasionally slipping into Austin’s Continental Club to listen to live blues from artists such as Gary Clark
    Jr., blending cultural heritage with creative expression.
  travel: Zonna Bailey, a spontaneous weekend explorer who often packs a car for impromptu drives to nearby Austin to hunt antiques and catch live music, dreams of wandering Savannah’s historic squares
    and New Orleans’ French Quarter, preferring flexible itineraries over rigid schedules while balancing a modest retirement budget that favors short road trips over costly overseas vacations.
  culinary: Zonna Bailey, a seasoned home cook who masters Southern classics like fried chicken with a crispy buttermilk batter, buttery collard greens seasoned with smoked paprika, and buttery cornbread
    dotted with honey, frequently canners her garden’s tomatoes and okra for winter soups, and delights in pairing meals with homemade peach cobbler, reflecting a deep‑rooted love for comfort cuisine.
  core: Zonna Bailey is a routine‑driven community advocate who quietly battles deadline‑induced anxiety, yet bursts into spontaneous road trips, quilting sessions, and heartfelt choir singing, embodying
    a blend of steadfast practicality and gentle wanderlust.
background:
  cultural: Zonna was raised in a middle-class, white family in the Midwest before moving to Texas in her early adulthood, and she carries the blend of Midwestern modesty and Southern hospitality that defines
    many longtime residents of Bell County. Her cultural identity is shaped by Protestant (Methodist) traditions, small-town community values, and a respect for family and local heritage. She participates
    in church events, regional festivals such as the Belton Art & Wine Walk, and values practical, down-to-earth approaches to problem-solving, reflecting a pragmatic, traditionally rooted worldview.
attributes:
  skills: '["Case Management", "Resource Coordination", "Crisis Intervention", "Community Outreach", "Program Development", "Grant Writing", "Public Speaking", "Cross-Cultural Communication", "Conflict
    Resolution", "Client Advocacy", "Report Writing", "Volunteer Supervision"]'
  hobbies: '["Gardening", "Vegetable Preservation", "Quilting", "Cooking Southern Cuisine", "Church Choir Singing", "Reading Historical Fiction", "Reading Biographies", "Walking Nature Trails", "Birdwatching",
    "Spontaneous Weekend Road Trips", "Exploring Antique Shops"]'
  career_goals: Zonna aims to deepen her impact by advancing to a senior program director role within a regional non-profit, where she can design and oversee long-term support services for seniors and low-income
    families. She hopes to secure stable grant funding to expand routine-based programs such as weekly food drives and health-screening workshops, and to mentor newer community-service workers, passing
    on her practical knowledge while cultivating a supportive, low-stress workplace culture. In the next five years she also plans to earn a certification in gerontology to better address the aging population’s
    needs and to ensure her initiatives remain grounded in proven, community-centered practices.
