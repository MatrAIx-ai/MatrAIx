  hobbies: '["Reading science non‑fiction", "Watching technology and nature documentaries", "Building LEGO Technic and model kits", "Playing chess (online and in‑person)", "Solo hiking and nature photography",
    "Practicing piano (classical repertoire)", "DIY electronics tinkering"]'
  career_goals: Aaron aims to pursue a career that merges his love of problem‑solving with tangible, real‑world applications. He is drawn to engineering—particularly mechanical or electrical engineering
    with a focus on robotics and sustainable technology. In the short term, he plans to enroll in advanced STEM courses, attend a summer engineering camp, and seek a mentorship or apprenticeship at a local
    maker space or manufacturing shop. Long‑term, he hopes to earn a scholarship to a university with a strong engineering program, eventually working on product design that improves everyday life while
    allowing him to apply his organized, methodical work style.
