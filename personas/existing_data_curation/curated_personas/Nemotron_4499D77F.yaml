personas:
  professional: Aaron Lapointe, a 15‑year‑old self‑taught budding astrophysics enthusiast, applies his methodical mind to building LEGO Technic challenges and designing solar‑powered model prototypes while
    documenting each experiment for future science fair projects.
  sports: Aaron Lapointe enjoys solitary hikes along Wachusett Mountain, participates in his high school cross‑country team during the fall season, and follows New England sports enthusiastically, especially
    cheering for the Boston Red Sox and the Celtics while tracking team statistics on his phone.
  arts: Aaron Lapointe cultivates a refined artistic palate by practicing Beethoven's 'Moonlight Sonata' on piano, studying Ansel Adams' black‑and‑white photography for compositional insight, and streaming
    atmospheric scores by Ludovico Einaudi to accompany his LEGO building sessions.
  travel: Aaron Lapointe dreams of visiting the Kennedy Space Center for a firsthand look at launch facilities, has trekked the Appalachian Trail's southern section, and plans a future solo trip to Iceland
    to photograph volcanic patterns and midnight sun phenomena.
  culinary: Aaron Lapointe enjoys precision cooking, often preparing perfect al dente spaghetti carbonara with pancetta, Pecorino Romano, and fresh cracked pepper, while also experimenting with matcha‑green
    tea scones that showcase his attention to measured ingredients.
  core: Aaron Lapointe, a methodical 15‑year‑old explorer of science and solitude, balances his curiosity for space and renewable energy with disciplined habits, occasional piano perfectionism, and a steadfast
    commitment to saving for his next LEGO masterpiece.
background:
  cultural: Aaron comes from a New England family with French‑Canadian roots; the Lapointe surname reflects ancestors who migrated from Quebec to Massachusetts in the early 20th century, settling in the
    Fitchburg area. His household blends traditional Catholic values with the practical work ethic typical of the region’s blue‑collar families. Community events such as the annual Franco‑American Festival
    in nearby Leominster and local church gatherings have shaped his appreciation for cultural heritage and communal harmony. Growing up in Fitchburg, he has been exposed to a mix of industrial history
    and a revitalizing arts scene, informing his balanced view of innovation and tradition.
attributes:
  skills: '["Advanced mathematics for grade level", "Fundamental physics concepts", "Basic Python programming", "Arduino and Raspberry Pi prototyping", "DIY electronics troubleshooting", "Project planning
