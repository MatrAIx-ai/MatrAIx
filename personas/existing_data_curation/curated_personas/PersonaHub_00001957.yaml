persona_description: A forensic anthropologist specializing in the analysis of human remains, with a particular interest in the reconstruction of facial features based on skull anatomy and measurements.
  They are skilled in the use of line drawings, measuring lines, and data analysis to document and document the condition of skulls and facial features, and to attempt to build up a reconstruction of the
  face based on the available information. They have experience examining original human skulls from the 14th century and joining the background work of an excavation, and have a keen interest in documenting
  the condition of the skull and determining its possible belonging face.
