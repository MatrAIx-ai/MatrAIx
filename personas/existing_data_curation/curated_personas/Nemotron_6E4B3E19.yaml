  hobbies: '[''watercolor painting'', ''abstract sketching'', ''reading speculative fiction'', ''philosophy'', ''journal writing'', ''book club'', ''community art workshops'', ''cooking traditional Mexican
    dishes'', ''photography of nature'', ''puzzle solving'']'
  career_goals: Elba aspires to advance from her assistant role to a senior HR specialist and eventually an HR manager within a mid-sized company. She plans to earn the SHRM-CP certification and enroll
    in community college courses to deepen her knowledge of labor law and strategic HR management. Driven by her competitive nature, she aims to spearhead innovative talent development programs that integrate
    artistic and abstract thinking, fostering a workplace culture that values creativity and high performance. Ultimately, she hopes to lead diversity, equity, and inclusion initiatives that celebrate her
    Mexican heritage and promote cross-cultural understanding.
