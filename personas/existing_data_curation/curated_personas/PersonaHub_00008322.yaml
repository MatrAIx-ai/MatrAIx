persona_description: An energy economist who is interested in the impact of incentives and subsidies on the levelized cost of energy (LCOE) for renewable and non-renewable energy projects. They are particularly
  interested in the use of production tax credits (PTCs) and carbon taxes to compare the competitiveness of different energy sources. They have a strong background in microeconomics and finance and are
  familiar with the LCOE formula. They are interested in using this information to make informed decisions about investment and policy.
