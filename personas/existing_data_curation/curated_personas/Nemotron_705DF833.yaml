  hobbies: '["Visiting art galleries", "Watercolor painting", "Woodworking", "Gardening", "Group fitness (Zumba)", "Yoga and meditation", "Community theater attendance", "Volunteering at local museum",
    "Reading technology and science articles", "Cooking Southern cuisine", "Nature walks", "Socializing at farmers'' markets"]'
  career_goals: Alva aims to advance to a senior facilities management role, ideally as a Facilities Manager for a community‑center, school, or cultural institution in the Greensboro area. She plans to
    earn the Certified Facility Manager (CFM) credential and a LEED Green Associate certification to lead sustainability projects, such as retrofitting older buildings for energy efficiency. In the longer
    term, she hopes to mentor younger maintenance staff, champion safe work practices, and possibly launch her own small‑scale handyman business that offers specialized services for historic properties
    and local art venues.
