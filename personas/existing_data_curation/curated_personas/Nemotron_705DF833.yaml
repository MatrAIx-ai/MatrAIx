personas:
  professional: Alva Ellis, a veteran facilities maintenance professional with 25+ years of hands‑on experience across HVAC, electrical, plumbing, and carpentry, blends methodical organization and a curiosity
    for emerging green technologies to design and execute proactive maintenance programs that keep Greensboro’s cultural venues running safely and sustainably.
  sports: Alva Ellis, a regular participant in weekly Zumba classes and a weekend hiker along the Blue Ridge Trail, roots for the Greensboro Grasshoppers baseball team and the Carolina Panthers, while maintaining
    a home‑gym routine that balances cardio with light weight‑training to offset the physical demands of their maintenance work.
  arts: Alva Ellis, an avid watercolorist who frequents the Greensboro Arts Alliance galleries, draws inspiration from artists like Georgia O'Keeffe and Henri Matisse, volunteers beside conservators at
    the Greensboro Historical Museum, and never misses a community‑theatre production starring the local troupe TheatreWorks, often quoting lines from classic plays by Arthur Miller.
  travel: Alva Ellis enjoys meticulously planned road trips that combine art and nature, having explored the vibrant murals of New Orleans, the historic districts of Charleston, the scenic vistas of the
    Blue Ridge Parkway, and dreaming of a cultural pilgrimage to Kyoto's temples, all while balancing travel costs with a modest savings plan.
  culinary: Alva Ellis loves cooking Southern comfort dishes such as shrimp‑and‑grits, fried chicken with collard greens, and peach cobbler, skillfully balancing a well‑worn cast‑iron skillet with a growing
    repertoire of heirloom tomatoes from their garden, and often swaps recipes at Greensboro’s farmers’ markets while seasoning with smoked paprika and fresh basil.
  core: Alva Ellis merges methodical, eco‑focused facilities expertise with a vibrant love for art, community, and Southern cooking, navigating stress through yoga and Zumba while occasionally splurging
    on craft supplies and forgetting to water the begonias.
background:
  cultural: Alva grew up in a small town in central North Carolina, immersed in the traditions of Southern hospitality, church‑centered community life, and a strong work ethic passed down through generations.
    Her family has long‑standing ties to the region’s agricultural and manufacturing heritage, and she attended a Baptist church throughout her youth. Relocating to Greensboro exposed her to a diverse,
    evolving arts scene, which nurtured her appreciation for both folk art and contemporary creativity. She identifies with Southern cultural values—family, faith, and service—while embracing progressive
    ideas and the multicultural vibrancy of modern Greensboro.
attributes:
  skills: '["HVAC maintenance", "Electrical wiring and troubleshooting", "Plumbing repairs", "Carpentry and fixture installation", "Preventative maintenance scheduling", "Safety compliance (OSHA)", "Inventory
