personas:
  professional: Soon Qu is a budding LEGO architect who blends meticulous step‑by‑step planning with spur‑of‑the‑moment creative twists, often challenging peers in friendly building contests and proudly
    displaying detailed instruction manuals alongside spontaneous block experiments, and they thrive on the sense of accomplishment that follows each completed design.
  sports: Soon Qu is an enthusiastic participant in Austin youth soccer leagues, sprinting for the local Austin Youth Soccer Club, rides a bright blue bike around Zilker Park, and cheers for the professional
    Austin FC team, balancing competitive scrimmages with casual pick‑up games that fuel their love of running and teamwork, and they love the thrill of scoring a goal.
  arts: Soon Qu immerses themselves in drawing vibrant cartoon characters inspired by Disney and Pixar, crafts pixelated worlds in Minecraft, and sings along to upbeat pop tracks by artists like Taylor Swift
    and Ed Sheeran while practicing a favorite bedtime lullaby, turning each activity into a personal showcase during family gatherings, and they love sharing their creations with friends.
  travel: Soon Qu loves weekend adventures to Zilker Park's botanical garden and the nearby swimming holes of Barton Springs, dreams of visiting Disneyland in California and the towering Grand Canyon, and
    prefers short, family‑planned trips with a packed snack bag, balancing curiosity for new places with a need for familiar routines, and they eagerly collect postcards from each stop.
  culinary: Soon Qu favors cheesy pizza slices, crispy chicken nuggets, and buttery mac and cheese, and they proudly attempt to assemble a simple peanut butter‑jelly sandwich, and they delight in sprinkling
    extra parmesan on spaghetti, often pairing meals with a cold chocolate milk or a fruity juice box.
  core: Soon Qu is a fiercely competitive six‑year‑old who thrives on structured LEGO building yet bursts into spontaneous soccer runs, hoards allowance in a piggy bank, battles spring allergies, and mixes
    cartoon sketches with pop songs, all while clutching a favorite bedtime story, and they cherish their bedtime story as a nightly anchor.
background:
  cultural: Born to East Asian parents in Austin, Texas, Soon Im Qu grows up in a bilingual household where Korean (or Chinese) is spoken alongside English. His family celebrates Lunar New Year with traditional
    foods and decorations, participates in local cultural festivals, and teaches him respect for elders and the value of education. While embracing his heritage through language lessons and cultural customs,
    he also enjoys Texan activities like visiting Zilker Park and attending community events, creating a blended cultural identity.
