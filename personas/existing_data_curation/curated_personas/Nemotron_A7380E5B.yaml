personas:
  professional: Anna Collazzo is a seasoned janitor and facilities caretaker who channels her exceptional organization, green‑cleaning knowledge, and hands‑on repair skills into maintaining spotless commercial
    spaces, and they are actively pursuing a CMI certification to step into a supervisory role where they can train staff and embed eco‑friendly protocols.
  sports: Anna Collazzo enjoys weekly brisk walks through the piney woods, occasionally joins a community walking club that meets at the local senior center, and they root for the Dallas Cowboys, Houston
    Astros, and Dallas Mavericks, balancing disciplined exercise with casual fan enthusiasm.
  arts: Anna Collazzo finds creative solace in knitting practical blankets while listening to classic country icons like George Strait, Merle Haggard, and Dolly Parton, and they occasionally attend the
    small‑town community theatre’s productions of classic plays such as "You Can’t Take It With You".
  travel: Anna Collazzo prefers slow‑paced, budget‑friendly road trips that blend history and nature, such as annual visits to Garner State Park, the historic forts of San Antonio, and a memorable weekend
    in New Orleans for its music and cuisine, and they always plan itineraries with a handwritten checklist.
  culinary: Anna Collazzo enjoys cooking garden‑fresh meals like tomato‑basil soup, collard‑green stew, and chicken fried steak with homemade biscuits, favors ingredients such as heirloom tomatoes, sweet
    corn, and pecans, and they are skilled enough to expertly preserve seasonal produce by canning.
  core: Anna Collazzo blends methodical practicality with quiet curiosity, habitually cataloguing garden harvests, tote‑bagging coupons for cleaning supplies, and humming classic country ballads while they
    meticulously tend to both their vegetable patch and well‑ordered career plans.
background:
  cultural: Anna grew up in Crockett, a small town in East Texas known for its close‑knit, working‑class community. As a white Texan from a family of modest means, she was raised with the values of self‑reliance,
    humility, and a strong work ethic common to the region. Though she left school before completing ninth grade to help support her family, she absorbed the practical wisdom of her parents and neighbors,
    who emphasized perseverance and community service. The local Methodist church and regional traditions of hospitality and respect for the outdoors have subtly shaped her worldview, fostering a balance
    between personal independence and a quiet sense of duty to her neighbors.
attributes:
  skills: '["Commercial cleaning", "Floor care (stripping, waxing, buffing)", "Restroom sanitation", "Carpet cleaning", "Basic plumbing repairs", "HVAC filter replacement", "Inventory management of cleaning
    supplies", "Scheduling and time management", "Safety compliance (OSHA)", "Green cleaning methods", "Record-keeping"]'
  hobbies: '["Reading historical non-fiction", "Gardening (vegetable and flower beds)", "Knitting and crocheting", "Bird-watching", "Listening to classic country music", "DIY home repair projects", "Participating
    in small community events", "Cooking traditional Texan dishes", "Volunteering at the local senior center", "Collecting and preserving family genealogy records"]'
  career_goals: Anna aspires to transition from a hands‑on cleaning role to a supervisory position within the next two years. She aims to become a lead facilities coordinator for a local school or municipal
    building, where she can implement systematic, environmentally friendly cleaning protocols and train new staff. Her practical mindset pushes her toward obtaining a Cleaning Management Institute (CMI)
    certification, which will legitimize her expertise and open pathways to a part‑time consulting role. Long‑term, she dreams of launching a small, family‑owned cleaning service focused on cost‑efficient,
    green cleaning for the small‑business community in Crockett, providing stable income for her retirement while mentoring younger workers.
