  hobbies: '[''Gardening'', ''Knitting'', ''Crossword puzzles'', ''Sudoku'', ''Birdwatching'', ''Reading mystery novels'', ''Listening to big band music'', ''Building simple Arduino projects'', ''Restoring
    vintage radios'', ''Volunteering at the local library'', ''Teaching basic computer skills to seniors'', ''Cooking family recipes'']'
  career_goals: She aims to leverage her STEM background to become a valued resource for her retail employer, seeking a shift‑supervisor role where she can implement efficient cash management protocols
    and mentor younger staff. Outside the store, Lorraine aspires to volunteer as a data‑analysis consultant for local non‑profits, helping them interpret program metrics and improve outreach. She also
    plans to develop a modest home‑automation project, such as a Raspberry Pi‑based climate monitor, that merges her curiosity with practical benefits. Recognizing the importance of financial security,
    she wants to maintain her employment until she can comfortably transition to part‑time consultancy and mentorship, preserving her independence and leaving a legacy of technical skill to her grandchildren.
