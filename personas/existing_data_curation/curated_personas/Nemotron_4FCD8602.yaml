personas:
  professional: Staci Mallard is a 31‑year‑old civil engineer who combines expertise in CAD, numerical simulation, and lean‑agile project management with a compassionate mentorship style, making them the
    go‑to troubleshooter for multidisciplinary sustainability projects in her hometown.
  sports: Staci Mallard spends Saturday mornings hiking the Natchez Trace Trail with the local outdoor club, sponsors the high‑school track team, and is a devoted fan of the New Orleans Saints, often catching
    games at the community center's big‑screen TV.
  arts: Staci Mallard finds creative release strumming an acoustic guitar to John Prine and Dolly Parton tunes, devours science‑fiction by Octavia Butler and historical sagas by Hilary Mantel, and crafts
    small wooden coffee tables inspired by southern craft fairs.
  travel: Staci Mallard plans leisurely road trips that blend nature and culture, having explored the Great Smoky Mountains and Savannah's historic district, while dreaming of a summer pilgrimage to the
    Oregon Coast but balancing mortgage responsibilities and church commitments.
  culinary: Staci Mallard cooks Southern classics like fried catfish, collard greens, and pecan pie using garden‑fresh vegetables and heirloom spices, perfects a tangy sweet‑tea brew, and experiments with
    pickled okra, though they admit to over‑indulging in biscuits during weekend brunches.
  core: Staci Mallard balances engineering rigor with a porch‑swing calm, often humming a guitar riff while planting tomatoes, and never skips a chance to mentor the next generation.
background:
  cultural: Staci was raised in a close‑knit Southern family in Mississippi, where community, hospitality, and church involvement are central values. Her upbringing emphasized modesty, respect for tradition,
    and a strong sense of responsibility to neighbors. While she honors these cultural roots—enjoying Southern food, music, and outdoor recreation—she also embraces progressive views, actively supporting
    gender equity in engineering and encouraging youth participation in STEM. This blend of Southern heritage and forward‑looking ambition shapes her personal and professional outlook.
attributes:
  skills: '[''SolidWorks (CAD)'', ''AutoCAD'', ''MATLAB'', ''Python programming'', ''Project Management (Agile & Waterfall)'', ''Lean Six Sigma methodology'', ''Data analysis and visualization (Excel, Tableau)'',
    ''Technical writing'', ''Mentorship and coaching'', ''Team leadership'', ''Problem solving under pressure'', ''Quality assurance and testing'']'
  hobbies: '[''Hiking on the Natchez Trace Trail'', ''Gardening (vegetable garden)'', ''Reading science‑fiction and historical fiction'', ''Playing acoustic guitar'', ''Cooking Southern cuisine (fried catfish,
    cornbread, collard greens)'', ''Volunteer STEM tutoring for high‑school students'', ''DIY woodworking projects'', ''Attending church community events'']'
  career_goals: Staci aims to obtain her Professional Engineer (PE) license within the next two years and transition into a senior engineering role that oversees multidisciplinary teams. She aspires to
    lead sustainability‑focused infrastructure projects that benefit her hometown of Pontotoc, such as improving water management and incorporating renewable energy solutions. Long‑term, she envisions becoming
    an engineering manager who champions diversity, creates mentorship programs for women and underrepresented groups in STEM, and nurtures a culture of collaboration and community service within her organization.
