persona_description: A psychologist or cognitive scientist who is interested in the development of human reasoning abilities, particularly in infants and children. The individual is likely to have a background
  in psychology, cognitive science, and/or neuroscience. They are interested in studying how infants and children develop their ability to make probabilistic predictions and how this ability relates to
  their overall cognitive development. The individual may have experience working with infants and children, and may have conducted research on the topic. They are likely to be interested in the implications
  of their findings for understanding human cognition and behavior.
