personas:
  professional: Rateb Micheli, a veteran landscaper turned boutique garden artist, leverages three decades of hardscape expertise, organic irrigation design, and an abstract‑painting eye to pitch bold,
    theme‑driven installations, while their relaxed, sometimes disorganized workflow reflects a preference for creative spontaneity over rigid scheduling.
  sports: Rateb Micheli, a casual athlete, spends weekends hiking with the Orlando Trailblazers club, shoots occasional rounds of golf at Lake Nona Golf Club, follows the Orlando Magic with fervent loyalty,
    and prefers early morning walks in the Everglades over high‑intensity gym sessions.
  arts: Rateb Micheli frequently paints abstract watercolors reminiscent of Georgia O'Keeffe's flora, sketches speculative garden visions in a battered Moleskine notebook, writes short prose that echo Jorge
    Luis Borges' labyrinthine style, and strums acoustic renditions of Neil Young and local folk tunes at intimate gatherings.
  travel: Rateb Micheli favors low‑key road trips, often charting spontaneous routes through Florida's coastal preserves and the Everglades, has taken weekend jaunts to the Great Smoky Mountains and the
    Sonoran Desert, and dreams of a slow‑paced pilgrimage along Italy's Amalfi Coast terraced gardens, balancing a modest travel budget with occasional splurges on boutique eco‑lodges.
  culinary: Rateb Micheli enjoys cooking a mix of Southern‑style barbecue ribs, fresh Caribbean‑inspired mango salsa, and herb‑infused grilled snapper, boasts a competent but not professional cooking skill
    set, frequently experiments with heirloom tomatoes, fresh basil, and kaffir lime leaves, and delights in savoring a well‑balanced hibiscus‑infused iced tea after a day on the job.
  core: Rateb Micheli is a wandering garden poet who forgets appointments but never forgets the scent of wet soil, channeling relentless curiosity into abstract designs while battling a chronic habit of
    leaving tools out in the rain.
background:
  cultural: Rateb was raised in a middle‑class, white American family in Central Florida, where the climate and the region’s strong outdoor lifestyle shaped his early appreciation for nature. His upbringing
    reflected a blend of traditional Southern hospitality—family barbecues, community service, and a respect for self‑reliance—and the multicultural vibrancy of the Sunshine State, exposing him to Hispanic
    and Caribbean influences through local festivals and cuisine. While he identifies with mainstream American cultural norms, his personal aesthetic is informed by the region’s emphasis on bright, tropical
    landscaping and a laid‑back, flexible approach to daily life. He values the quiet solitude of Florida’s natural spaces, which aligns with his reserved temperament, while also appreciating the occasional
    small‑group gatherings characteristic of his community.
attributes:
  skills: '[''Landscape design and conceptualization'', ''Plant identification and care for subtropical species'', ''Irrigation system planning and troubleshooting'', ''Hardscape construction (pavers, retaining
