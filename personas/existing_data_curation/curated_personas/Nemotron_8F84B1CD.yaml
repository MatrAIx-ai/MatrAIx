    design'', ''Client communication and negotiation'', ''Project coordination and flexible scheduling'', ''Sustainable landscaping practices'', ''Basic carpentry and masonry'', ''Visual sketching and presentation'',
    ''Competitive bidding and contract acquisition'']'
  hobbies: '[''Abstract watercolor painting'', ''Landscape sketching and concept drawing'', ''Reading philosophy and speculative fiction'', ''Writing short prose and poetry'', ''Birdwatching and nature
    photography'', ''Drone piloting for aerial garden documentation'', ''Hiking in state parks'', ''Woodworking and model boat building'', ''Playing acoustic guitar in intimate groups'', ''Experimenting
    with sustainable gardening techniques'']'
  career_goals: Rateb aims to transition from day‑to‑day groundskeeping to running his own boutique landscape‑design studio that specializes in artistic, theme‑driven gardens. He plans to earn a Certified
    Landscape Professional (CLP) credential within the next two years, develop a portfolio of experimental installations—such as rain‑garden sculptures and nocturnal light‑and‑shadow spaces—and enter regional
    design competitions to showcase his work. As he ages, he also hopes to mentor a small team of apprentices, passing on both his practical expertise and his imaginative design philosophy. Ultimately,
    he envisions publishing a coffee‑table book that explores the intersection of horticulture, abstract art, and environmental stewardship.
