personas:
  professional: A community interpreter named Julisa Persaud, 31, leverages fluency in English, Spanish and Haitian Creole to provide simultaneous and consecutive interpreting for health, legal and social‑service
    contexts, coupling meticulous terminology management with structured workflows while embracing the fluid flexibility needed for real‑time crisis calls and workshop design, and they are driven by a competitive
    streak that pushes them toward ATA certification and a future UN assignment.
  sports: Julisa Persaud, 31, stays fit by dancing soca and dancehall routines that double as cardio, joins a Saturday morning pick‑up basketball league with local Brooklyn Nets fans, and roots for the
    Brooklyn Nets and New York Yankees, balancing a competitive drive with a laid‑back approach to organized sports, and they relish the social camaraderie of the games.
  arts: Julisa Persaud, 31, captures Brooklyn's vibrant street art through nightly photography sessions, curates playlists featuring Bob Marley, Erykah Badu and Kendrick Lamar, reads magical realism by
    Isabel Allende and contemporary slam poetry by Claudia Rankine, and they draw creative inspiration from the rhythmic storytelling of neighborhood block parties.
  travel: Julisa Persaud, 31, blends structured itinerary planning with spontaneous detours, having explored the Carnival of Trinidad, a literary tour of Lisbon’s historic cafés and a weekend retreat in
    New Orleans’ French Quarter, while dreaming of a future trip to the spice‑laden markets of Marrakech to study multilingual signage, and they cherish the way each journey expands their linguistic repertoire.
  culinary: Julisa Persaud, 31, cooks pepperpot and roti for family gatherings, experiments with aromatic spices like cumin and allspice, perfects weekend brunches featuring ackee and saltfish, and they
    enjoy occasional indulgence in caramelized banana fritters after stressful interpreting sessions.
  core: Julisa Persaud, 31, channels a structured yet flexible mindset, competitive drive and creative soul into interpreting, dancing and community activism while wrestling with anxiety that fuels both
    impulsive coffee splurges and relentless self‑improvement, and they keep pushing forward despite the occasional emotional overload.
background:
  cultural: Julisa is a first-generation Black Caribbean American whose parents immigrated from Guyana, bringing a blend of African and Indo-Caribbean heritage. Growing up in Brooklyn’s vibrant diaspora
    neighborhoods, she was immersed in Creole language, Caribbean festivals such as Crop Over and Diwali, and the rhythms of reggae, calypso, and soca. Family traditions emphasize communal solidarity, storytelling,
    and a strong sense of social justice, shaping her commitment to language access for marginalized groups. While she embraces American urban culture—street art, hip-hop, and diverse culinary scenes—her
    cultural identity remains anchored in the oral histories, spiritual practices, and culinary flavors of the Caribbean, influencing both her professional ethos and personal passions.
attributes:
  skills: '[''English-Spanish simultaneous interpreting'', ''English-Haitian Creole consecutive interpreting'', ''Legal and medical document translation'', ''Cultural mediation for immigrant communities'',
    ''Computer-Assisted Translation (SDL Trados, memoQ)'', ''Crisis hotline language support'', ''Language instruction and tutoring'', ''Multimedia localization (subtitles, voice-over)'', ''Cross-cultural
    negotiation facilitation'', ''Translation project management'']'
  hobbies: '[''Afro-Caribbean dance (soca, dancehall)'', ''Cooking Caribbean and Indo-Caribbean dishes'', ''Street-art photography during Brooklyn walks'', ''Reading magical realism and contemporary poetry'',
    ''Listening to reggae, jazz, neo-soul'', ''Yoga and mindfulness meditation'', ''Journaling'', ''Playing chess'', ''Volunteering at community language workshops'']'
  career_goals: Julisa aims to earn ATA certification and NAJIT accreditation, become a certified conference interpreter for UN and NGO events, and lead a language-access team at a nonprofit focused on
    mental-health services for migrants. In the long term she plans to launch a boutique translation agency that prioritizes ethical work for underrepresented languages and to author a guide on trauma-informed
    interpreting. She also seeks to establish a sustainable work routine that mitigates her anxiety and to mentor emerging Black and Caribbean interpreters, building a supportive professional network.
