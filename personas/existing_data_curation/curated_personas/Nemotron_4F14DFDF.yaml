  career_goals: Miriam's long-term ambition is to shape the built environment of Puerto Rico's coastal communities by leading a boutique practice that specializes in climate-resilient, culturally rooted
    architecture. She aims to earn the LEED Accredited Professional credential within the next two years and to become a principal partner at her current firm, guiding projects that blend modern sustainable
    technologies with traditional Caribbean design motifs. Miriam is passionate about mentoring the next generation of women architects, and she plans to establish a mentorship program in collaboration
    with local universities. Over the next five years, she envisions spearheading a municipal initiative in Cabo Rojo that creates affordable, hurricane-proof housing and community hubs, while also publishing
    case studies on adaptive design to influence regional policy.
