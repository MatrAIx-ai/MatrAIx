personas:
  professional: Miriam Hamideh, a 43‑year‑old licensed architect, blends advanced BIM expertise with a pragmatic eye for climate‑resilient design, leading multidisciplinary teams to embed sustainable, vernacular
    elements into coastal projects while mentoring young women architects and navigating client relations with a collaborative, energetic style.
  sports: Miriam Hamideh plays beach volleyball on the sand courts of Playa Buye with the local Cabo Rojo Volleyball Club, follows the San Juan Mets baseball team, enjoys weekend salsa dancing as cardio,
    and evidences a competitive spirit while prioritizing social camaraderie.
  arts: Miriam Hamideh captures the island’s historic architecture through photography shared on Instagram, draws inspiration from photographer Sebastião Salgado and salsa legend Marc Anthony, attends community
    art festivals, and finds creative renewal in blending visual and musical arts.
  travel: Miriam Hamideh prefers immersive, culturally rich trips, having explored Old San Juan’s forts, Cartagena’s colonial streets, and Barcelona’s Gaudí architecture, while planning a future pilgrimage
    to Kyoto’s temples and the Moroccan desert, balancing spontaneous weekend getaways with careful budgeting.
  culinary: Miriam Hamideh cooks traditional arroz con gandules and mofongo with inventive twists like quinoa‑infused rice and roasted plantain garnish, delights in fresh cilantro, adobo, and tropical fruits,
    and rates herself a competent home chef who occasionally over‑spices in pursuit of bold flavors.
  core: Miriam Hamideh is a community‑oriented, climate‑focused architect who channels boundless energy into salsa, volleyball, and photography, yet wrestles with worry‑driven overthinking and a habit of
    over‑investing in dance gear.
background:
  cultural: Miriam was born and raised in Lajas, a small town on the southwestern tip of Puerto Rico, where the rhythms of the sea and the legacy of Spanish colonial architecture shape daily life. Her family
    is deeply rooted in the island's Afro-Spanish traditions, celebrating holidays such as Three Kings' Day and the vibrant Feria de la Virgen del Carmen with music, dance, and communal meals. Bilingual
    in Spanish and English, Miriam grew up hearing stories of her grandparents' resilience after Hurricane Hugo, which instilled in her a strong sense of community responsibility. The local cuisine, the
    cadence of bomba and plena music, and the island's emphasis on family closeness have all influenced her worldview. This cultural tapestry informs her architectural sensibility, driving her to integrate
    vernacular elements - such as shaded patios, vibrant color palettes, and wind-catching designs - into modern, sustainable buildings that honor Puerto Rican heritage while addressing contemporary challenges.
