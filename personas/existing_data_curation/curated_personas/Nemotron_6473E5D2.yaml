  hobbies: '[''Sketching'', ''Visiting Art Galleries'', ''Photography'', ''Reading Science Fiction'', ''Philosophy'', ''Board Game Nights'', ''Yoga'', ''Hiking'', ''Museum Visits'']'
  career_goals: Elizabeth aims to translate her operational experience into a supply chain analyst position within the next two years, planning to enroll in an associate's program in Business Administration
    or Logistics while continuing to work part‑time. Her medium‑term goal is to become a logistics coordinator for a retail or art‑related organization, and her long‑term ambition is to manage a distribution
    center or oversee inventory for a gallery or museum, merging her logistical expertise with her passion for the arts.
