  career_goals: Elizabeth dreams of turning her love for art and stories into a career as a children’s book author and illustrator, where she can combine vivid pictures with imaginative tales. She is also
    fascinated by technology and envisions becoming a concept artist for animated films or video games, using her budding coding skills to create interactive narratives. Ultimately, she hopes to be a creative
    problem‑solver who helps others understand complex ideas through visual storytelling, and she occasionally imagines herself as a future astronaut or scientist who explores the abstract wonders of the
    universe.
