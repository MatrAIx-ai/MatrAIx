persona_description: A professional development educator who specializes in the study of sustainability and resource management, particularly in secondary education. They have experience designing and implementing
  curriculum that complements and enhances existing curriculum and lesson plans, and have a passion for sharing knowledge and skills with a wide range of age and educational levels, including primary education
  and adult education for professional development. They are skilled in developing modular units on sustainability and effective resource management, as well as shorter week-long and day-long programs to
  encourage the conversation around resourcefulness on many different age and educational levels.
