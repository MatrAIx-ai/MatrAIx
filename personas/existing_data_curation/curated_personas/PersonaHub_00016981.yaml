persona_description: A researcher or scientist interested in the study of plant ecology, particularly the relationship between weather conditions, snow-lie, and snowbed vegetation in the Scottish Highlands.
  They are likely to be interested in the hypothesis that snowbed loyalty in the Scottish Highlands is high, while duration of snow cover is variable, and the potential effects of global warming on the
  late snowbed bryophytes. They may also be interested in the adaptations and acclimation responses of vascular and bryophyte species in the snowbed core and periphery.
