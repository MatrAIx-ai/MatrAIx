personas:
  professional: Mayra Depaul is a systems analyst turned tech strategist who blends rigorous data modeling and cybersecurity expertise with design‑thinking flair, leading agile teams to craft user‑centric
    cloud solutions while orchestrating clear technical documentation that mirrors their love for artful precision.
  sports: Mayra Depaul is an avid weekend hiker in the Ohio River Valley, a member of the Indy Road Runners club, a fan of the Indianapolis Colts and Pacers, and a regular participant in a co‑ed recreational
    soccer league, balancing competitive spirit with mindfulness through consistent yoga practice.
  arts: Mayra Depaul channels their creative drive into acrylic paintings inspired by contemporary artists like Kehinde Wiley and folk legends such as Grant Wood, captures Indiana’s rolling fields through
    photography reminiscent of Ansel Adams, and provides piano accompaniment for community theater productions, while regularly attending exhibitions at the Indianapolis Museum of Art and listening to Sufjan
    Stevens.
  travel: Mayra Depaul plans meticulously yet leaves room for spontaneity, favoring weekend road trips to the Ohio River Valley and cultural escapes to Chicago and Nashville, while dreaming of immersive
    trips to Kyoto’s temples and Iceland’s glaciers, always balancing budget constraints with a thirst for artistic and natural experiences.
  culinary: Mayra Depaul enjoys confident kitchen experiments like mushroom risotto, Indian butter chicken, and Indiana pork tenderloin with apple chutney, favoring fresh herbs such as thyme and rosemary,
    and often pairs meals with local craft cider, though their habit of juggling paintbrushes while cooking occasionally leaves sauces slightly over‑reduced.
  core: Mayra Depaul is a curiosity‑driven tech strategist who harmonizes data, design, and art, balancing disciplined financial habits with a love for yoga, hiking, and spontaneous culinary experiments,
    while occasionally overlooking flu shots and over‑painting dinner plates.
background:
  cultural: Mayra's cultural background reflects the Midwestern small-town heritage of Versailles, Indiana. Raised in a predominantly white, close-knit community with strong Catholic roots - her family's
    French-origin surname 'Depaul' hints at French-Canadian ancestry - she grew up valuing modesty, self-reliance, and community service. Local traditions such as county fairs, church gatherings, and volunteerism
    shaped her cooperative nature. While her STEM education and career in technology embody contemporary American aspirations for upward mobility and innovation, she remains grounded in the region's emphasis
    on hospitality, practical problem-solving, and a steady work-life balance.
