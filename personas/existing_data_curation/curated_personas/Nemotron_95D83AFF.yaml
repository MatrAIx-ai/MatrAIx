  career_goals: Mayra aims to advance to a senior systems architect or IT director role where she can shape enterprise-wide technology strategy and drive digital transformation initiatives. She is focused
    on deepening her expertise in cloud computing, AI-enabled analytics, and cybersecurity, planning to earn certifications such as AWS Solutions Architect, CISSP, and TOGAF. Over the next five years, she
    hopes to lead cross-functional teams on projects that improve operational efficiency while incorporating user-centered design. Mayra also aspires to mentor junior analysts, promote inclusive workplace
    practices, and possibly pursue an MBA to broaden her strategic and business acumen, all while maintaining a healthy work-life balance that supports her family and community involvement.
