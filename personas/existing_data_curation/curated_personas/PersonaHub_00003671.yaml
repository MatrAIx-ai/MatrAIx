persona_description: A neuroscientist and researcher who specializes in the study of brain fields, particularly the local field potentials that arise from neural circuits composed of just a few rat brain
  cells. His research focuses on the impact of weak but common extracellular fields on neural activity and the potential cognitive and behavioral effects of ephaptic coupling. He is particularly interested
  in how these fields affect the firing of individual neurons and the synchronicity of neuron firing with the field. His work has implications for understanding brain computation and the potential effects
  of external electric fields on the brain.
