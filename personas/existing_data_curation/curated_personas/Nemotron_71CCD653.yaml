    making'']'
  hobbies: '[''Visiting art galleries and museums'', ''Participating in community mural projects'', ''Learning and dancing Mexican folk and salsa'', ''Cooking regional Mexican cuisine'', ''Gardening desert-native
    plants'', ''Hiking the Franklin Mountains'', ''Biking along the Rio Grande'', ''Mentoring girls in STEM'', ''Reading contemporary fiction'', ''Traveling to border-region cultural festivals'']'
  career_goals: Looking ahead, Ivelisse aims to step into a senior program-directorship role where she can shape strategic initiatives that blend infrastructure development with public art and community
    engagement across the border region. She is committed to championing diversity in project teams, specifically mentoring Latinx women entering STEM fields, and hopes to launch a mentorship pipeline in
    partnership with local universities. Over the next five years, she plans to earn the Program Management Professional (PgMP) credential and to lead a multi-year, cross-border public-space revitalization
    project that showcases sustainable design and cultural heritage. Ultimately, she envisions transitioning to a consulting capacity that allows her to advise nonprofit organizations on project governance
    while continuing to give back to her community.
