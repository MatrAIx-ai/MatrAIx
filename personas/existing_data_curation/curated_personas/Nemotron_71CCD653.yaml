personas:
  professional: Ivelisse Calandriello is a seasoned project manager with over three decades of experience leading engineering, construction, and technology initiatives, wielding PMP and Six Sigma Green
    Belt credentials to combine meticulous scheduling, budget control, and data‑driven risk assessment with a creative, art‑infused problem‑solving style that champions community engagement, and they consistently
    apply empathetic communication to cross‑cultural teams.
  sports: Ivelisse Calandriello stays active by hiking the Franklin Mountains, biking along the Rio Grande on weekends, participating in the El Paso Trail Runners club, cheering for the El Paso Locomotive
    FC soccer team, and enjoying occasional salsa dancing classes that double as cardio workouts, and they view physical activity as a social extension of their community involvement.
  arts: Ivelisse Calandriello immerses themselves in El Paso’s vibrant art scene, frequenting exhibitions at the Museum of Art featuring local painter Carlos Ruiz, contributing to community mural projects
    that celebrate regional heritage, and dancing zapateado and salsa at their neighborhood dance club where they draw inspiration from the bold colors of muralist Diego Rivera, and they often integrate
    artistic concepts into their professional problem‑solving.
  travel: Ivelisse Calandriello curates travel experiences that blend cultural immersion and adventure, having attended the Guelaguetza festival in Oaxaca, explored the Santa Fe Indian Market, taken weekend
    trips to historic San Antonio, and now dreaming of Barcelona’s Mercè Festival, all while preferring itineraries that mix guided tours with free time for spontaneous art discoveries, and they often travel
    with their adult daughter and occasionally grandchildren.
  culinary: Ivelisse Calandriello honors family traditions by cooking mole poblano and pozole rojo using dried chilies, masa, epazote, and nopales from their succulent garden, enjoys experimenting with
    salsa sauces, and they treat themselves to late‑night café de olla sweetened with piloncillo, though they sometimes over‑indulge in spicy street tacos from Taquería La Fama.
  core: Ivelisse Calandriello blends disciplined project leadership, a love of community arts, and an active outdoor lifestyle, navigating retirement finances with careful budgeting while mentoring emerging
    STEM talent and savoring traditional desert‑inspired cuisine, and they remain a pillar of cultural connection in their community.
background:
  cultural: Born to Mexican immigrant parents and raised in El Paso, Ivelisse grew up immersed in a bicultural environment that blends Mexican traditions with the dynamics of a border city. She is bilingual
    in Spanish and English, celebrating Dia de los Muertos, Las Posadas, and family gatherings centered on food, musica, and respeto. Her upbringing emphasized familismo and community solidarity, values
    that continue to shape her collaborative work style. As a Mexican-American woman in STEM, she has navigated challenges that deepened her commitment to diversity and inclusion, and she actively supports
    initiatives that empower underrepresented groups in technical fields. Her cultural identity informs her appreciation for art, music, and storytelling, which she weaves into both her professional projects
    and personal pursuits.
