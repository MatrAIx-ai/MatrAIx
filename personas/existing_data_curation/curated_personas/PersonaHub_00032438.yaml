persona_description: A maintenance technician who is responsible for the daily operation and maintenance of welding equipment, specifically for resist welding machines. This individual is knowledgeable
  about the electrical, mechanical, pneumatic, and water-cooling systems of these machines, and is skilled in disassembling, cleaning, and buffing mating copper, low-voltage secondary electrical connections,
  and conducting preventive maintenance on the machine. They are also familiar with the proper forging force required for good weld quality and the common problems found in RW pneumatic systems. Additionally,
  they are aware of the importance of regular air cylinder disassembly and rebuilding, as well as the environmental impact of electric servo-actuated force delivery systems.
