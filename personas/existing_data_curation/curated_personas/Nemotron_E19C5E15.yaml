  hobbies: '[''volleyball'', ''theater club'', ''community service'', ''baking'', ''reading mystery novels'', ''gardening'', ''jigsaw puzzles'', ''school council'']'
  career_goals: Erica aspires to attend a university in Virginia, major in education or counseling, and become a school counselor or community outreach coordinator. She wants to create supportive, structured
    environments for students, using her organizational talents and empathetic nature to promote mental health and academic success. Long-term, she hopes to lead school-wide wellness programs and mentor
    younger students, while also remaining involved in local community service initiatives.
