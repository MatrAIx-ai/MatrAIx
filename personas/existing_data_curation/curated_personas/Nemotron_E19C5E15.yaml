personas:
  professional: Erica Pettus is a proactive high school junior who channels her methodical planning and sociable energy into leading varsity volleyball as a setter and coordinating backstage logistics for
    the school theater, and they demonstrate a budding blend of athletic strategy and creative production.
  sports: Erica Pettus is the starting setter for Eastview High's varsity volleyball team, training five days a week, and spends weekends cheering for the New York Knicks and the US Women's National Volleyball
    Team while also playing in a community youth soccer league during the spring, and they thrive on the structured competition and team camaraderie.
  arts: Erica Pettus contributes to the school theater as a versatile stagehand and occasional lead—most recently starring in 'A Midsummer Night's Dream'—drawing creative inspiration from Lin‑Manuel Miranda's
    musical storytelling and Agatha Christie's mystery novels, and they let this blend of performance and meticulous backstage planning shape their artistic identity.
  travel: Erica Pettus prefers meticulously planned family road trips, having explored Yellowstone National Park and the historic streets of Boston on school outings, and they dream of an organized summer
    exchange to Kyoto, Japan, balancing their love of educational enrichment with a desire for new cultural experiences.
  culinary: Erica Pettus loves baking precise desserts, from classic New York‑style cheesecake to experimental matcha almond cookies, meticulously measuring ingredients like cream cheese, fresh raspberries,
    and dark cocoa while documenting each trial in a handwritten recipe journal, and they treat each bake as a disciplined experiment.
  core: Erica Pettus is a hyper‑organized teen who blends competitive volleyball energy with a perfectionist’s love for flawless desserts, yet occasionally spends hours rearranging their study notes for
    the slightest sense of order, and they sometimes miss out on spontaneous fun.
background:
  cultural: Erica comes from a white, middle-class family that has lived in the suburban Chesterfield County area of Richmond, Virginia for generations. Her family embraces Southern cultural traditions,
    including frequent gatherings for meals featuring comfort foods such as fried chicken, collard greens, and sweet tea, and participating in local events like the Richmond Folk Festival and county fairs.
    Raised in a United Methodist household, she regularly attends church services and community outreach programs, reinforcing values of hospitality, service, and respect for tradition. Growing up in this
    environment has instilled in Erica a strong sense of community, an appreciation for regional history, and a preference for structured, cooperative activities.
