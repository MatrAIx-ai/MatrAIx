personas:
  professional: Victoria Zander is an aspiring teen engineer who merges her love for building intricate LEGO structures with tinkering on small electronics, applying her skeptical and competitive mindset
    to solve problems while balancing practicality with creative experimentation.
  sports: Victoria Zander plays midfield for the Riverside Rockets youth soccer club, thrives on weekend matches against rival teams, chants for the national women's team during World Cup broadcasts, and
    balances competitive drive with teamwork.
  arts: Victoria Zander practices piano pieces by Ludwig van Beethoven, devours mystery novels by Agatha Christie, debates passionately in the school club, and finds inspiration listening to contemporary
    pop artist Billie Eilish while sketching LEGO designs.
  travel: Victoria Zander prefers school‑organized field trips to museums and science centers, dreams of visiting the LEGO House in Billund, Denmark, and enjoys annual family road trips to the Grand Canyon,
    where they collect rock samples for the science club.
  culinary: Victoria Zander loves making homemade pepperoni pizza, experimenting with spaghetti carbonara, and occasionally tries sushi rolls with avocado and cucumber under Mom’s guidance, though they
    often forget to finish their vegetables.
  core: Victoria Zander is a curious, competitive, and socially vibrant 11‑year‑old who balances inventive tinkering and rigorous soccer drills, never missing a debate argument, yet sometimes hoarding LEGO
    bricks into the night.
background:
  cultural: 'Victoria was raised in Austell, a suburban community in Douglas County, Georgia. Her family reflects typical Southern middle‑class values: close‑knit family ties, regular church attendance,
    and participation in community events like local fairs and high‑school football games. The region’s emphasis on hospitality, politeness, and a love of outdoor activities has shaped her sociable and
    outgoing nature. Growing up with access to public libraries, after‑school programs, and a supportive school system, she benefits from both the cultural traditions of the South and the modern educational
    resources available to her.'
