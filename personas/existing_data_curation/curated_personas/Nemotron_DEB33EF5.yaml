  career_goals: Victoria dreams of a career that lets her blend curiosity with practical problem‑solving. She is aspiring to become an engineer—perhaps a robotics or aerospace engineer—so she can design
    innovative machines while seeing tangible results. She also entertains the idea of becoming a veterinarian, driven by her love for animals and competitive spirit to excel in science. In the short term
    she hopes to win a regional science‑fair award and earn a spot on her middle school's robotics team, paving the way for future academic scholarships.
