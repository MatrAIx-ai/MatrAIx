    Sudoku)'', ''Nature photography'', ''Cycling on local trails'']'
  career_goals: In the short term, Joseph aims to earn advanced nursing certifications such as the Critical Care Registered Nurse (CCRN) and complete a Master of Science in Nursing with a focus on nursing
    informatics. He plans to lead a quality‑improvement initiative on reducing hospital readmissions for chronic disease patients within his unit. Over the next five years, he envisions stepping into a
    nurse manager role, where he can mentor junior staff, integrate data‑driven decision‑making into daily workflow, and expand community outreach programs. Long‑term, Joseph aspires to become a nurse educator
    or director of clinical services, combining his love for research, technology, and compassionate care to shape the next generation of nurses and improve population health outcomes.
