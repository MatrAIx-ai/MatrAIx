personas:
  professional: John Savoie, a 47‑year‑old aspiring home‑based handyman‑consultant in Sedgwick County, blends his hands‑on problem‑solving knack for plumbing, electrical, and woodworking with a relaxed,
    sometimes disorganized work style, channeling their competitive drive to become the most reliable local contractor while pursuing an associate degree in business administration.
  sports: John Savoie channels his solitary focus into early‑morning lake fishing with the Wichita Anglers Club, stays fit with weekend jogs while cheering the Wichita Thunder and the Kansas City Chiefs,
    and enjoys low‑key pool and chess evenings at the Sedgwick Community Center as a relaxed way to unwind.
  arts: John Savoie finds artistic inspiration in the folk storytelling of Bob Dylan, the minimalist woodwork of Sam Maloof, and the night skies of Van Gogh, often listening to Neil Young while carving,
    and they occasionally attend productions at the Wichita Community Playhouse to savor classic American theater.
  travel: John Savoie prefers meticulously planned road trips that combine stargazing spots with quiet relaxation, having driven to Yellowstone for its night skies, camped at the Grand Canyon, and they
    now aspire to trek the Atacama Desert’s crystal‑clear horizons for a solo astronomy expedition.
  culinary: John Savoie enjoys preparing simple, hearty meals such as pan‑seared trout with fresh dill, homemade sourdough bread, and apple‑cinnamon crumble, seasoning with rosemary and thyme from their
    sustainable garden, though they sometimes skip meals when caught up in a new woodworking project.
  core: John Savoie is a meticulous yet worry‑prone tinkerer who finds peace in quiet pursuits, balances a competitive streak with a love for solitary craftsmanship, and occasionally lets their disorganization
    sidetrack plans.
background:
  cultural: John grew up in the wheat and corn fields of central Kansas, part of a longstanding white, Midwestern farming community. The region’s cultural emphasis on self‑reliance, modesty, and neighborly
    assistance shaped his practical outlook and his preference for quiet, solitary activities. Local traditions of community potlucks, church gatherings, and county fairs introduced him to small‑group social
    norms, though his reserved nature makes him more comfortable with one‑on‑one interactions. The plains’ expansive skies fostered his fascination with astronomy, while the work ethic of the area reinforced
    his hands‑on approach to problem‑solving. Though unswayed by strong religious affiliation, he respects the region’s conservative values and often reflects the Midwestern ethos of frugality and straightforward
    communication.
attributes:
  skills: '[''DIY home repair'', ''Basic carpentry'', ''Woodworking'', ''Small engine maintenance'', ''Mechanical troubleshooting'', ''Electronics tinkering'', ''Arduino prototyping'', ''Spreadsheet data
    analysis'', ''Astronomy equipment handling'']'
  hobbies: '[''Amateur astronomy'', ''Woodworking'', ''Fishing'', ''Reading popular science'', ''Casual chess'', ''Pool'', ''Listening to tech and gardening podcasts'', ''Gardening'']'
  career_goals: He aims to turn his practical abilities into a modest home‑based consultancy, offering handyman services and custom woodworking to residents of Sedgwick County. Completing an associate degree
    in business administration, even part‑time, is a priority to give his venture a formal foundation. While he values flexibility, he is motivated by the competitive desire to be recognized as the most
    reliable contractor in his small community. He also hopes to build a modest passive‑income stream by selling handcrafted furniture online and by renting a small plot for community gardening, thereby
    providing financial stability without the constraints of a full‑time schedule. Lastly, he wants to volunteer as a mentor for at‑risk youth in local trades programs, combining his pragmatic skill set
    with a sense of responsibility.
