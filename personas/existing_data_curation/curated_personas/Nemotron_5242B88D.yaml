personas:
  professional: Nicole Ashley, a retired community volunteer, uses their lifelong practical skills in cooking, gardening, and handcrafts to conduct digital‑literacy and quilting workshops at the senior
    center, embodying their calm, curious, and organized nature.
  sports: Nicole Ashley, an avid supporter of the Paris High School Panthers football team and the Dallas Cowboys, gathers with friends at the community center’s senior walking club every Thursday, combining
    their love for hometown sports with a personal routine of low‑impact exercise.
  arts: Nicole Ashley nurtures their artistic side through a deep appreciation for classic country icons like Dolly Parton and Johnny Cash, gospel legends such as The Clark Sisters, and Southern literary
    voices like Barbara Kingsolver, while channeling that inspiration into hand‑stitched quilts that often feature pine tree motifs.
  travel: Nicole Ashley favors relaxed travel, often taking short road trips to nearby Austin for live music, revisiting their cherished family cabin near the Texas Hill Country, and dreaming of a future
    Gulf Coast cruise, always planning with a careful budget and a handwritten itinerary.
  culinary: Nicole Ashley excels in Southern cooking, regularly preparing fried catfish with hushpuppies, collard greens simmered with smoked turkey, and pecan pie topped with a lattice of whipped cream,
    while fresh garden tomatoes and basil inspire occasional homemade tomato‑basil pasta for special family gatherings.
  core: Nicole Ashley blends a calm, curiosity‑driven spirit with timeless Southern hospitality, turning their love for quilting, community service, and digital storytelling into a vibrant, intergenerational
    legacy.
background:
  cultural: Nicole was born and raised in Paris, Texas, in a multi‑generational white family that valued Southern hospitality, church life, and community service. Her upbringing in the post‑World War II
    era emphasized modesty, hard work, and respect for tradition, while also exposing her to the rhythms of small‑town life—high school football Saturdays, county fairs, and Thursday night choir rehearsals.
    She identifies with the Baptist faith, enjoys country and gospel music, and holds a deep appreciation for regional cuisine such as fried catfish, pecan pie, and collard greens. Over the decades she
    has witnessed demographic changes in Lamar County and remains committed to fostering intergenerational connections and preserving the local heritage.
