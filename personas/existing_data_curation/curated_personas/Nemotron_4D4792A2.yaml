    ''Creative visual communication (designing safety posters)'', ''Basic carpentry and property salvage techniques'', ''Physical fitness and stamina'']'
  hobbies: '[''Oil and acrylic painting'', ''Black‑and‑white photography'', ''Reading (history, art theory, autobiographies)'', ''Woodworking'', ''Gardening'', ''Fishing'', ''Hiking (local trails)'', ''Listening
    to jazz and blues'', ''Attending local museum exhibitions'', ''Participating in a small book club'', ''Volunteer fire safety workshops'']'
  career_goals: Approaching retirement, Nathaniel aims to transition into a senior leadership role within the Danville Fire Department. He aspires to become a fire captain and, eventually, a fire inspector,
    focusing on proactive community risk reduction. He plans to develop an integrated fire‑prevention and arts program that uses visual storytelling and local murals to teach safety concepts, leveraging
    his artistic curiosity to engage diverse audiences. Nathaniel is also committed to mentoring the next generation of firefighters, advocating for mental‑health awareness, and strengthening partnerships
    between the firehouse and local cultural organizations.
