  hobbies: '[''Watercolor painting'', ''Calligraphy'', ''Reading speculative fiction and philosophy'', ''Solving puzzles (Sudoku, cryptic crosswords)'', ''Mindfulness meditation'', ''Bonsai gardening'',
    ''Curating small art exhibitions'', ''Attending digital storytelling workshops'', ''Participating in a small book club'']'
  career_goals: Looking ahead, Ki aims to become a senior strategic communications advisor for a leading biotech or technology firm, where she can shape corporate narratives around breakthrough research.
    She aspires to author a guidebook on integrating scientific insights into public relations, and to speak at international conferences on ethical communication in emerging tech. She also seeks to mentor
    the next generation of PR professionals, especially women of Asian descent, and to establish a boutique consultancy that offers data-driven, culturally nuanced PR strategies for startups seeking rapid
    market entry. Achieving regional recognition as a top-tier PR specialist and receiving industry awards are key milestones in her competitive drive.
