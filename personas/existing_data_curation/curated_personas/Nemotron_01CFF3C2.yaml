personas:
  professional: Amy Hinkle is an aspiring young scientist and coder who combines the hands-on curiosity of building backyard volcanoes with the practical discipline of documenting experiments, and they
    channel their sociable, team-oriented nature by leading group projects in the school science club while keeping a tidy lab notebook.
  sports: Amy Hinkle is a spirited member of the Allegheny Youth Soccer League's U12 team, cheers for the Pittsburgh Steelers during football season, follows the Pittsburgh Penguins for hockey inspiration,
    and spends weekends hiking the trails of Ohiopyle State Park, where they practice trail-running and volunteer to clean up litter, reflecting their energetic, group-focused spirit.
  arts: Amy Hinkle explores the arts through piano lessons - mastering Beethoven's 'Für Elise' and playing pop hits like 'Shake It Off' - and draws fantasy characters inspired by J.K. Rowling and Studio
    Ghibli's Hayao Miyazaki, they also experiment with slime videos on YouTube, blending creativity with a structured practice schedule that satisfies their curiosity and need for organization.
  travel: Amy Hinkle loves nature-centric travel, having hiked Frick Park's waterfalls, visited Washington, D.C.'s Smithsonian museums with family, and dreaming of a future trip to the Grand Canyon, they
    plan each outing with hand-drawn maps and a checklist, balancing their adventurous curiosity with practical packing habits.
  culinary: Amy Hinkle enjoys cooking simple meals like pepperoni pizza and strawberry-banana smoothies, experiments with edible slime made from gummy bears, and often adds a dash of cinnamon to pancakes,
    they keep a sticky-note recipe collection on the fridge, reflecting both a playful palate and organized kitchen habits.
  core: Amy Hinkle is a curious, compassionate 11-year-old who blends science, soccer, and slime while juggling a tidy planner, occasional forgetfulness about homework, and a love for helping animals.
background:
  cultural: 'Amy is raised in a predominantly white, middle‑class family in Valencia, a community in Allegheny County, Pennsylvania. Her upbringing reflects typical American suburban culture: celebrating
    holidays such as Thanksgiving, Christmas, and the Fourth of July with family gatherings, enjoying local community events like seasonal festivals and school fundraisers. Her family’s heritage includes
    roots in German and Irish ancestry, which occasionally surface in weekend meals (e.g., homemade potato salad or corned beef) and stories about relatives. The local public school emphasizes collaborative
    learning, sports, and community service, reinforcing values of teamwork, responsibility, and helping others—principles that align with Amy’s compassionate personality. She attends a public elementary
    school where she interacts with a diverse group of peers, and the community’s emphasis on neighborliness and volunteerism shapes her outlook and interests.'
