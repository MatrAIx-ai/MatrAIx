  hobbies: '[''soccer'', ''school science club projects'', ''reading adventure and fantasy novels'', ''drawing and illustration'', ''DIY slime and craft experiments'', ''nature hikes in local parks'', ''volunteering
    at animal shelter'', ''coding interactive stories with Scratch'', ''piano lessons'', ''baking cookies with family'']'
  career_goals: Amy dreams of a future where she can combine her love of animals, science, and helping others. She aspires to become a veterinarian, motivated by her compassion for pets and wildlife. She
    also envisions leading community science or environmental projects, perhaps as a youth mentor or a science teacher, where she can share her curiosity and practical problem‑solving with other kids. She
    hopes to join a robotics or coding club in middle school to build a strong technical foundation, and ultimately pursue a career that lets her make a positive impact on both people and the planet.
