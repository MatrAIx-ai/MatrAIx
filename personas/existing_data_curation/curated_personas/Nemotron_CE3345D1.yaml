personas:
  professional: Kenneth Toland, a 35-year-old full-stack software developer, merges their curiosity for generative art with methodical engineering, delivering cloud-native platforms on AWS and GCP while
    leading agile teams toward immersive AR/VR installations for cultural venues.
  sports: Kenneth Toland competes in the Skyline Soccer Club’s Saturday league, treks the coastal Trail Hikers group along the Pacific shoreline, rides with the San Francisco Cycling Club on weekend rides,
    and roots for the Golden State Warriors and San Francisco 49ers during the season.
  arts: Kenneth Toland frequents the San Francisco Museum of Modern Art, draws inspiration from the digital works of Bee Bee Cannon and Refik Anadol, curates personal generative installations using p5.js,
    captures urban street scenes with their Sony A7III, and revels in live shows by Kamasi Washington and the indie band Parquet Courts.
  travel: Kenneth Toland prefers meticulously planned trips that blend culture and adventure, such as a weekend art-focused getaway to Barcelona’s museums, a tech-conference meet-up in Tokyo, and yearly
    hikes along Oregon’s Columbia River Gorge, always budgeting trips through a shared spreadsheet with their spouse.
  culinary: Kenneth Toland experiments with global flavors at home, mastering Thai green curry with fresh lemongrass, crafting hand-rolled sushi with wild-caught toro, and perfecting Mexican street-style
    tacos al pastor, while their favorite kitchen gadget is a sous-vide precision cooker.
  core: Kenneth Toland is a 35-year-old developer-artist who blends methodical code with bold creative experiments, fuels their curiosity with art, sports, and world cuisines, and balances disciplined budgeting
    with occasional instinctive splurges.
background:
  cultural: Kenneth grew up in a middle-class family of European descent in the United States and has spent his adult life in the Bay Area, a cultural melting pot that blends high-tech innovation with a
    rich artistic scene. His upbringing emphasized education, community involvement, and an appreciation for diverse perspectives. While he celebrates traditional American holidays such as Thanksgiving
    and the Fourth of July, he also regularly participates in multicultural events in San Francisco, from Asian lantern festivals to Latin-American street fairs. His exposure to the city's progressive values
    and its vibrant art community has shaped a worldview that values creativity, inclusivity, and the continuous pursuit of new ideas.
