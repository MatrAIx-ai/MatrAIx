  career_goals: Kenneth aims to progress from senior developer to a technical lead where he can shape product architecture and drive innovation at the intersection of technology and art. He hopes to spearhead
    projects that create immersive AR/VR experiences or interactive installations for cultural institutions. Over the next five years, he plans to earn an advanced certification in cloud architecture, publish
    talks at tech-art conferences, and mentor a diverse team of engineers. Long-term, he envisions launching his own startup that offers software tools for artists to create generative digital works, while
    also taking on a board-level role to advocate for inclusive hiring practices in the tech industry.
