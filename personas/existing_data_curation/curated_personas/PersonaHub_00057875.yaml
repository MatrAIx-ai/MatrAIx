persona_description: A historian who is particularly interested in the history of the United States, particularly the contributions and struggles of African Americans. They are fascinated by the story of
  the Frederick Douglass Monument and its journey from the Soldiers and Sailors Monument in Washington Square Park to its current location in Highland Park, and are curious to learn more about the life
  and legacy of Frederick Douglass. They are also interested in the historical context of the monument's placement and the impact it has had on the city of Rochester.
