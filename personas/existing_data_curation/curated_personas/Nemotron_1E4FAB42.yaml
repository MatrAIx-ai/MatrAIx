personas:
  professional: A budding junior engineer, Brad Salgado blends their curiosity for how things work with a practical knack for building sturdy LEGO bridges and functional Minecraft houses, and their organized
    yet flexible mindset lets them sketch blueprints that balance imaginative flair with real‑world stability.
  sports: An enthusiastic youth soccer player, Brad Salgado practices after school with the local under‑10 team, cheers for the city's professional club, the Boulder Rapids, and rides their bike around
    the neighborhood, balancing teamwork, competitive drive, and a considerate attitude toward teammates.
  arts: A creative storyteller, Brad Salgado draws weekly comic strips featuring heroic dinosaurs and futuristic knights, devours graphic novels by Raina Telgemeier and the “Percy Jackson” series, and looks
    to illustrators such as Kazu Kibuishi for inspiration, channeling their kindness into sharing copies with friends.
  travel: A curious explorer, Brad Salgado enjoys family trips to the nearby national park where they collect rocks and leaves, dreams of seeing the Grand Canyon and the ancient castles of Sweden, and prefers
    itineraries that blend scheduled museum visits with free‑form scavenger hunts, balancing structure and spontaneity.
  culinary: A budding kitchen helper, Brad Salgado loves assembling mini‑pizzas topped with pepperoni, pineapple, and extra cheese, blends strawberry‑banana smoothies, and sometimes attempts chocolate‑chip
    cookies—though they often forget to set a timer, reflecting their practical curiosity mixed with occasional forgetfulness.
  core: Brad Salgado is a curiosity‑driven nine‑year‑old who balances imaginative builds and practical tinkering, saves part of their allowance while treating themselves, manages mild allergies, and fills
    life with soccer, comics, and adventurous travel.
background:
  cultural: Brad was raised in Broken Arrow, Oklahoma, a suburban community in Tulsa County that blends Midwestern values with Southern hospitality. His family participates in local traditions such as the
    annual Tulsa County Fair, community church events, and weekend barbecues. He attends a public elementary school where school spirit, high school football games, and community service projects are emphasized.
    The cultural environment emphasizes kindness, cooperation, and a practical work ethic, which aligns with Brad's personality of being considerate and reliable.
