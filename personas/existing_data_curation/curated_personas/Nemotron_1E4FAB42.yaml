  career_goals: Brad dreams of one day designing bridges or structures that help his community, inspired by his love of building with LEGO and his practical mindset. He also imagines becoming a veterinarian
    to care for animals, reflecting his empathy and curiosity about the natural world. In the short term, he aims to improve his coding skills and win a local science fair, seeing these steps as stepping
    stones toward a future career in engineering or animal care.
