personas:
  professional: Angela Hojnacki, a veteran accountant and auditor with over three decades of experience, leverages meticulous GAAP expertise and emerging tax knowledge while balancing curiosity and practicality,
    training junior staff in modern tools like Power BI and embracing flexible problem-solving that reflects their relaxed, sometimes disorganized, but sociable approach to work.
  sports: Angela Hojnacki, an avid walker who logs daily miles along the Lake Michigan shoreline, participates in a senior-friendly yoga class at the community center, and cheers for the Milwaukee Brewers
    during summer baseball while maintaining informal membership in the Lake Michigan Walking Club that doubles as a low-key competitive hobby.
  arts: Angela Hojnacki, as a soprano in her parish choir, delights in singing Bach chorales and contemporary folk hymns, spends evenings quilting with friends while listening to Andrea Bocelli, reads historical
    novels by Philippa Gregory, and enjoys attending community theater productions of 'Our Town' and local art exhibits featuring regional painters like Alice Nyberg.
  travel: Angela Hojnacki, who favors leisurely road trips and scenic stays, has visited Door County's shoreline, spent a weekend on Mackinac Island exploring its historic forts, dreams of driving the Blue
    Ridge Parkway in Virginia during autumn, and hopes to attend a genealogy conference in Boston, always booking senior-friendly accommodations and using a modest travel fund.
  culinary: Angela Hojnacki, a confident home cook who delights in preparing pierogi filled with potato and cheese, nurturing tomatoes from her garden into fresh bruschetta, simmering wildflower honey glaze
    for roasted carrots, and sharing hearty borscht with family gatherings, balances her skillful kitchen experiments with a habit of occasionally over-salting dishes and leaving leftovers uncovered.
  core: Angela Hojnacki, a 67-year-old accountant with a love for community, spreadsheets, and stitch-work, balances curiosity and practicality while occasionally misplacing receipts, favoring flexible
    schedules, and weaving her vibrant social life into every facet of her days.
background:
  cultural: Angela grew up in a tight‑knit Polish‑American family in Kewaunee County, Wisconsin, where Catholic traditions, hard‑working Midwestern values, and a strong sense of community shaped her outlook.
    Family celebrations like Wigilia, making pierogi, and parish picnics reinforced a spirit of hospitality and cooperation. The region’s connection to agriculture and the Great Lakes fostered her appreciation
    for nature and seasonal rhythms. These cultural influences underpin her pragmatic yet curious mindset, her preference for flexible planning, and her dedication to supporting others in her hometown.
attributes:
  skills: '[''GAAP compliance'',''Tax preparation and planning'',''Financial reporting'',''Internal controls and risk assessment'',''Budgeting and forecasting'',''QuickBooks'',''Microsoft Dynamics GP'',''Advanced
