  career_goals: Chris aspires to progress from senior credit analyst to credit risk manager within the next five years, overseeing a small team that integrates data science techniques into traditional credit
    evaluation. He plans to earn the Financial Risk Manager (FRM) certification and eventually the Chartered Financial Analyst (CFA) designation to deepen his expertise in risk and investment analysis.
    Passionate about emerging ESG (environmental, social, governance) metrics, he hopes to lead initiatives that embed sustainable criteria into the bank’s credit decisions, bridging his analytical rigor
    with his appreciation for ethical and artistic values. Long‑term, Chris envisions mentoring junior analysts, sharing both technical knowledge and the habit of reflective, solitary inquiry, and possibly
    teaching part‑time at a local university’s finance program.
