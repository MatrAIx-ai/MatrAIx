personas:
  professional: Jeremy Santiago, a retired electrical engineer who spent four decades troubleshooting utility and telecom infrastructure, now devotes his systematic mind to mentoring high‑school STEM students
    and drafting a senior‑focused home electrical safety guide, while his love of predictability clashes with a relaxed approach to paperwork, causing them to sometimes misplace drafts.
  sports: Jeremy Santiago follows the Clemson Tigers football team and the Atlanta Braves baseball club, participates in a senior walking group that meets twice weekly on the Blue Ridge foothills trails,
    and occasionally joins the local community's low‑impact pickleball league, embracing predictable, low‑intensity exercise while occasionally skipping sessions when anxiety spikes.
  arts: Jeremy Santiago enjoys listening to folk legends like Doc Watson and contemporary singer‑songwriters such as The Avett Brothers, attends regional Appalachian craft fairs featuring woodcarvers and
    quilt makers, and finds solace in reading historic biographies by David McCullough and classic engineering texts by Claude Shannon, all of which weave a quiet appreciation for tradition and precision
    into his leisure.
  travel: Jeremy Santiago favors low‑key, well‑planned trips such as weekend drives to Asheville, NC, historic tours of Savannah, GA, and annual visits to the Great Smoky Mountains National Park, while
    dreaming of a leisurely fall foliage road trip through New England, balancing a modest travel budget with a desire for gentle adventure and meaningful community connections.
  culinary: Jeremy Santiago delights in preparing garden‑fresh collard greens sautéed with smoked ham hocks, buttery buttermilk biscuits, shrimp and grits seasoned with cayenne and garlic, and a seasonal
    apple‑cinnamon crumble, cooking at a moderate skill level but habitually forgetting to turn off the stovetop after simmering his tomato‑basil soup.
  core: Jeremy Santiago, a 76‑year‑old retired engineer, blends meticulous problem‑solving with a laid‑back attitude, managing anxiety through meditation while occasionally losing track of paperwork and
    overindulging in hobby supplies.
background:
  cultural: Jeremy grew up in the Upstate region of South Carolina, where a blend of Southern hospitality, church involvement, and a strong sense of community shaped his values. His family emphasized self‑reliance,
    practicality, and respect for the natural surroundings of the Blue Ridge foothills. Although identifying as white, he acknowledges the diverse cultural threads woven into the region's history, from
    Native American roots to African‑American traditions, and he strives to honor that heritage through community service and intergenerational connections. His upbringing instilled a quiet kindness, a
    preference for harmonious relationships, and a deep appreciation for modest, orderly ways of life.
