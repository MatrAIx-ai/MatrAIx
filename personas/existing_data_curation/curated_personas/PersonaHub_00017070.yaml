persona_description: Jeremy Wiseman, a family practitioner at Wiseman Family Practice, is interested in the topic of fluoridation of water and its potential health effects. He is concerned about the lack
  of informed consent for medical treatment and the dosage control of medications, especially in the case of fluoridation. He is a proponent of topical fluoride and believes in the dental benefits of doing
  so, but is opposed to the systemic absorption of fluoride into the public water supply. Wiseman is a family practitioner who is passionate about public health and is willing to take a stand against unnecessary
  and potentially unsafe health risks.
