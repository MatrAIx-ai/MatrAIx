  hobbies: '[''Reading non‑fiction (technology, history)'', ''Urban photography'', ''Podcast listening (science, history)'', ''Strategy video games'', ''Board‑game nights with friends'', ''Jogging along
    the Inner Harbor'', ''Blogging about Baltimore’s architecture'']'
  career_goals: Bonner aims to leverage his receptionist experience into a supervisory role within the municipal or private sector. He plans to enroll in a part‑time associate’s program in Business Administration
    to strengthen his organizational and leadership skills. His long‑term ambition is to become an Office Manager or Information Services Coordinator, possibly earning the Certified Administrative Professional
    (CAP) credential. While he values flexibility, he also wants a stable career path that permits him to explore emerging technologies and contribute to community‑focused projects in Baltimore.
