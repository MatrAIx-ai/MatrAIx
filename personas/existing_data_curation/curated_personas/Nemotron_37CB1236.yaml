personas:
  professional: Bonner Lee, a 21‑year‑old front‑desk specialist at Baltimore’s municipal office, leverages meticulous data‑entry accuracy, quick phone etiquette, and a curiosity‑driven knack for exploring
    new digital tools to streamline daily operations, and they constantly seek opportunities to take on supervisory tasks.
  sports: Bonner Lee enjoys low‑key jogs along the Inner Harbor three times a week, follows the Baltimore Ravens football season religiously, participates in a casual weekend pick‑up basketball group at
    the community center, and they prefer solo endurance activities over competitive leagues.
  arts: Bonner Lee captures Baltimore’s historic brick facades with a DSLR, shares the photos on a personal blog, unwinds listening to Brian Eno’s ambient soundscapes while occasionally attending indie
    film screenings featuring Jim Jarmusch, and they admire Ansel Adams’s monochrome compositions.
  travel: Bonner Lee favors weekend road trips to nearby historic towns such as Annapolis and Gettysburg, plans itineraries around free museum days, dreams of a solo backpacking adventure through the Scottish
    Highlands once savings permit, and they often map routes using open‑source navigation tools.
  culinary: Bonner Lee, a self‑taught home cook, favors simple yet flavorful meals like shrimp étouffée seasoned with creole spices and hearty oatmeal bowls topped with fresh berries, frequently stops at
    local coffee shops for a perfectly pulled espresso, and they experiment with seasonal produce whenever time allows.
  core: Bonner Lee blends quiet curiosity with a laid‑back approach, juggling meticulous front‑desk duties and spontaneous camera outings, yet habitually misplaces keys, forgets to refill the office coffee
    pot, and they thrive on small‑group board‑game nights.
background:
  cultural: Bonner grew up as a white American in Baltimore’s working‑class neighborhoods, absorbing a blend of Mid‑Atlantic cultural norms and the city’s diverse urban vibe. His family emphasized self‑reliance,
    community involvement, and respect for local traditions such as crab feasts and Orioles games. He celebrates mainstream American holidays while also appreciating Baltimore’s unique events like the Baltimore
    Pride Parade and the annual Maryland Seafood Festival. Exposure to a multicultural environment has fostered an open but pragmatic outlook, shaping his balanced curiosity and practical approach to life.
attributes:
  skills: '[''Customer service'', ''Telephone etiquette'', ''Front‑desk operations'', ''Information retrieval'', ''Data entry'', ''Scheduling and calendar management'', ''Microsoft Office (Word, Excel,
