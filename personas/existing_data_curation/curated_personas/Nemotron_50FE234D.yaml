    Traditional Recipes'']'
  career_goals: She aims to advance to a senior program manager role overseeing multiple large‑scale initiatives within a regional healthcare or infrastructure organization. Her ambition includes establishing
    and directing a Project Management Office (PMO) to implement pragmatic yet innovative governance frameworks, mentoring junior project managers, and eventually transitioning into consulting to help small
    businesses in upstate New York adopt best‑practice project strategies. Alongside professional growth, she seeks to strengthen her stress‑management skills and maintain a healthy work‑life balance.
