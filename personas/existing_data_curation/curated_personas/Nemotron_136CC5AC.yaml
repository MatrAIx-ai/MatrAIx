personas:
  professional: A budding little architect, Alexander Grullon assembles LEGO skyscrapers with meticulous precision, balancing their boundless curiosity for new building techniques with a disciplined, organized
    approach that sets high standards even in play, and they proudly showcase each finished model to family.
  sports: A junior soccer enthusiast, Alexander Grullon plays for the Little Lions U‑5 team, practices dribbling after school, idolizes Lionel Messi, and they thrive on the structured drills of the weekly
    practice, preferring routine over chaotic free play, reflecting their disciplined yet socially selective style.
  arts: An imaginative little artist, Alexander Grullon spends afternoons drawing Pixar characters like Buzz Lightyear, sings along to Disney's Let It Go from Frozen, attends a weekly Kids’ Craft Club where
    their meticulous nature shines through perfectly aligned stickers, and they relish the quiet moments of creativity that balance their curiosity with a desire for order.
  travel: A curious young explorer, Alexander Grullon has already visited the beach in San Diego with his family, dreams of returning to the Magic Kingdom at Walt Disney World, prefers meticulously planned
    itineraries with clear maps, and they feel secure when each activity is scheduled, balancing their practicality with a love of new experiences.
  culinary: A selective eater, Alexander Grullon adores crispy chicken nuggets and creamy mac and cheese, often requests extra honey‑glazed carrots for their bright color, can be stubborn about trying new
    vegetables, and they meticulously arrange their plate so the favorite foods are at the front, reflecting an organized palate and occasional worry about unfamiliar foods.
  core: Alexander Grullon is a five‑year‑old who meticulously lines up his toys, worries about tiny details, passionately explores the world through LEGO, crayons, and carefully planned playdates, and they
    balance curiosity with a disciplined routine.
background:
  cultural: Alexander comes from a Cuban immigrant family living in Dania, Florida. Spanish is spoken at home alongside English, and he celebrates Cuban traditions such as Nochebuena and enjoys foods like
    plantain fritters, empanadas, and arroz con pollo. His grandparents share stories of life in Cuba, and community events in the local Cuban neighborhood expose him to lively salsa and son music, traditional
    dances, and Spanish‑language children's songs, all of which shape his sense of identity and cultural pride.
