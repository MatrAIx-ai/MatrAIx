  hobbies: '[''Gardening'', ''Reading contemporary fiction and self-help books'', ''Journaling'', ''Gentle yoga (small groups)'', ''Lakefront walking'', ''Knitting'', ''Cooking soul food recipes'', ''Volunteer
    mentoring at after-school programs'']'
  career_goals: Mary aims to advance to a supervisory role within Chicago's Parks and Recreation Department, overseeing multiple community centers. She plans to earn her GED within the next year and pursue
    an associate's degree in Recreation Management, followed by a certification in Recreational Therapy. Long term, she wants to develop a citywide structured wellness program that integrates mental health
    resources and stress reduction workshops for adults, especially in underserved neighborhoods. She also aspires to mentor new recreation staff and advocate for policies that promote predictable scheduling
    and safe, supportive environments.
