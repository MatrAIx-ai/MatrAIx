personas:
  professional: Mary Lampkin, a seasoned recreational program manager at Chicago community centers, blends their decade‑long expertise in structured activity design, meticulous budgeting, and inclusive
    facilitation to craft safe, predictable programs while quietly championing mental‑health resources for underserved adults.
  sports: Mary Lampkin, a devoted Chicago lakefront walker, participates in early‑morning group yoga and joins the local Chicago Park District rowing club for seasonal paddling, while cheering for the Chicago
    Bears, White Sox, and Bulls as their favorite professional sports teams.
  arts: Mary Lampkin, an avid reader of contemporary fiction, devours novels by Sally Rooney and Chimamanda Ngozi Adichie, enjoys the soulful jazz of Norah Jones, attends Steppenwolf Theatre productions,
    and follows actress Frances McDormand’s latest films for artistic inspiration.
  travel: Mary Lampkin, a meticulous planner, prefers short domestic trips that blend cultural immersion and relaxation, such as a soul‑food pilgrimage to New Orleans, a serene weekend in Asheville’s Blue
    Ridge Mountains, and a sunrise hike at Grand Canyon’s South Rim, while budgeting for future international travel to Kyoto after the GED is completed.
  culinary: Mary Lampkin, an enthusiastic home cook, experiments with soul‑food classics like smoked turkey collard greens, sweet potato pie, and black-eyed pea jambalaya, seasoning dishes with garden‑fresh
    herbs like thyme, rosemary, and basil, and has a moderate skill level—confident with stovetop meals but still learning baking techniques.
  core: Mary Lampkin, a detail‑oriented community‑wellness advocate, balances structured program leadership with nightly journaling, garden‑scented cooking, and a looming worry‑driven habit of over‑planning
    even their leisure time.
background:
  cultural: Mary is an African American woman whose family roots trace back to the Great Migration families that settled on Chicago's South Side. Growing up in a close-knit neighborhood, she was immersed
    in a culture that values community solidarity, church fellowship, and the rich traditions of Black Chicago, including music, storytelling, and home-cooked cuisine. These influences shaped her commitment
    to public service and her appreciation for creating inclusive, safe spaces where residents can connect and thrive. She draws strength from intergenerational family values that emphasize resilience,
    mutual support, and the importance of giving back.
attributes:
  skills: '[''Program Planning'', ''Activity Scheduling'', ''First Aid'', ''CPR'', ''Recreational Therapy Basics'', ''Risk Assessment'', ''Conflict Resolution'', ''Small-Group Facilitation'', ''Community
