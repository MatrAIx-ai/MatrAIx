personas:
  professional: Andrew Weber is a methodical yet charismatic sales professional who leverages consultative selling, data‑driven pipeline management, and Salesforce expertise to exceed quotas while they
    channel their sociable, calm demeanor into leadership‑ready storytelling and team mentorship.
  sports: Andrew Weber is a die‑hard Kansas City Chiefs fan who attends every home game, follows the Kansas City Royals during baseball season, and they supplement their fandom with weekend bike rides,
    hikes in nearby parks, and occasional participation in a local adult recreational soccer league.
  arts: Andrew Weber nurtures their creative side by strumming acoustic guitar renditions of Bob Dylan and Neil Young, capturing urban street scenes and forest vistas with a Canon EOS, and diving into historical
    biographies by David McCullough and classic novels by Herman Melville, often sharing their finds at Toastmasters meet‑ups.
  travel: Andrew Weber plans trips with meticulous itineraries, favoring road‑trip adventures to culinary hotspots like New Orleans for gumbo and Memphis for BBQ, while they also enjoy weekend getaways
    to the Ozarks for hiking, balancing family time with their networking schedule and a modest travel budget.
  culinary: Andrew Weber enjoys mastering Kansas City‑style BBQ, perfecting burnt‑end rubs, slow‑smoked ribs, and hickory‑infused brisket, while they also experiment with craft beer pairings and host lively
    backyard feasts featuring sides like coleslaw and baked beans for friends and family.
  core: Andrew Weber blends a love for structured sales pipelines, Chiefs fandom, and BBQ experiments with a calm, talkative flair, and they occasionally over‑commit to networking events at the expense
    of sleep.
background:
  cultural: 'Andrew grew up in the heart of the Midwest, raised in a close‑knit community in Kansas City, KS. His upbringing reflects traditional Midwestern values of hard work, modesty, community service,
    and a strong sense of personal responsibility. A childhood in a predominantly white, middle‑class neighborhood exposed him to the region''s cultural staples: local fairs, high school and college sports,
    and a love of barbecue cuisine. He attended a public high school where participation in team sports and community projects was encouraged, fostering his sociable nature. Though not strictly religious,
    his family attended a Methodist church, instilling a respect for communal gatherings and charitable outreach. His bachelor''s degree in humanities broadened his cultural awareness, allowing him to connect
    with diverse clients while retaining his Midwestern communication style—direct, friendly, and supportive. This blend of regional heritage and academic perspective shapes his approach to both personal
    relationships and professional interactions.'
attributes:
  skills: '[''Consultative selling'', ''Structured pipeline management'', ''Data-driven prospecting'', ''CRM proficiency (Salesforce, HubSpot)'', ''Persuasive storytelling'', ''Public speaking and presentation'',
