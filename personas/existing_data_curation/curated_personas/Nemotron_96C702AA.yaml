    under rejection and stress management'']'
  hobbies: '[''Kansas City Chiefs games'', ''Toastmasters public speaking club'', ''Volunteer work at local food bank'', ''Cooking and BBQ experimentation'', ''Hosting social gatherings'', ''Biking and
    hiking in nearby parks'', ''Mindfulness meditation'', ''Reading historical biographies and classic literature'', ''Playing acoustic guitar'', ''Urban and nature photography'']'
  career_goals: Andrew aims to progress from a front‑line sales representative to a sales leadership role within the next five years, targeting a position such as Regional Sales Manager or Director of Services
    Sales. He seeks to master complex service solutions and become the go‑to strategist for high‑value accounts, while also earning certifications like Certified Professional Sales Leader. Passionate about
    mentoring, he plans to lead a high‑performing team, develop training programs that emphasize structured processes and interpersonal excellence, and ultimately shape the strategic direction of the sales
    organization. Financially, he aspires to secure sufficient stability for his family and potentially invest in a small consulting firm focused on sales enablement for midsize businesses.
