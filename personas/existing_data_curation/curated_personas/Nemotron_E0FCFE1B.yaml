personas:
  professional: Andrew Simmons is a veteran precision metalworking expert who blends deep technical curiosity with pragmatic workflow optimization, leading shop floor teams with an assertive yet collaborative
    style while constantly worrying about meeting safety and quality standards.
  sports: Andrew Simmons enjoys a blend of low‑impact athletics, spending Saturday mornings fishing on the Ohio River, competing in a weekly bowling league at Riverside Lanes, and cheering on the Louisville
    Cardinals men’s basketball team and the Cincinnati Bengals, while also holding a modest membership in the Ohio River Anglers Association.
  arts: Andrew Simmons expresses his creative side through home‑brewing craft beers and crafting small wooden furniture, while his free time includes listening to classic rock legends like The Rolling Stones,
    blues guitar virtuoso Stevie Ray Vaughan, and jazz trumpeter Miles Davis, and he occasionally attends community theater productions at the local playhouse.
  travel: Andrew Simmons prefers road‑trip adventures that combine classic car shows and craft‑beer festivals, having driven to the Stuttgart Auto Show in Germany and explored the bourbon trails of Kentucky,
    while his dream destinations include a scenic cruise along the Mississippi River and a heritage tour of the Scottish Highlands.
  culinary: Andrew Simmons favors hearty Midwestern fare such as Cincinnati chili, smoked brisket, and catfish po’boys, he enjoys crafting his own malt‑infused IPAs with hops like Citra and Simcoe, and
    he often experiments with grilling fish while seasoning it with fresh dill and lemon zest, showcasing his moderate cooking skills and a passion for bold flavors.
  core: Andrew Simmons is a meticulous metalworking veteran who balances a love for classic cars, home‑brewing, and community service with a perpetual worry‑driven drive for safety, quality, and financial
    prudence.
background:
  cultural: Andrew grew up in a middle‑class white family in Louisville, Kentucky, where Southern hospitality and Midwestern pragmatism intersect. Rooted in a Protestant (Methodist) upbringing, his community
    values emphasize hard work, self‑reliance, and strong family ties. He celebrates regional traditions such as bourbon tasting, local music festivals, and the annual Kentucky Derby, while also maintaining
    a deep respect for the city's industrial heritage. This cultural blend informs his balanced outlook—practical yet curious, community‑oriented yet assertive.
