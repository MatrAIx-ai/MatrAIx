  hobbies: '[''Classic car restoration'', ''Community college metalworking instructor'', ''Fishing on the Ohio River'', ''Bowling league'', ''Charity event organization'', ''Homebrewing'', ''Woodworking'',
    ''Louisville Cardinals basketball fandom'']'
  career_goals: Andrew aims to transition into a supervisory role where he can lead a cross‑functional production team and spearhead the integration of advanced automation within the tool‑making shop. He
    aspires to obtain a Certified CNC Machinist credential and eventually launch a small boutique die‑making business that offers custom solutions for regional manufacturers. Mentoring the next generation
    of skilled tradespeople and contributing to industry safety standards are also key components of his long‑term professional vision.
