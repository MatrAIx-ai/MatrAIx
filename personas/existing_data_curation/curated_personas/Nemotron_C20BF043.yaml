personas:
  professional: Raul Matilla, a 32-year-old maintenance technician in Monterey County, combines OSHA-certified safety expertise and a methodical checklist habit with a friendly, team-oriented style as they
    troubleshoot HVAC, plumbing, and electrical issues, positioning themselves for a supervisory role within the next five years.
  sports: Raul Matilla plays forward for the Salinas Community Soccer Club, hikes the Salinas Hills every weekend, casts line at Monterey Bay for lingcod, and roots for the San Jose Earthquakes and San
    Jose Sharks while also belonging to a local cycling club.
  arts: Raul Matilla unwinds by blasting Banda El Recodo, revisiting classic films like Casablanca and The Godfather, and joining community karaoke nights where they channel the same energy they bring to
    vintage motorcycle restoration.
  travel: Raul Matilla prefers road-trip adventures that fit a modest budget, having driven the Pacific Coast Highway to Big Sur, explored Yosemite National Park on a weekend, and planning a future getaway
    to Oaxaca to sample regional cuisine and festivals.
  culinary: Raul Matilla's culinary repertoire centers on grilling carne asada tacos, simmering tamales with fresh chiles and tomatoes from their garden, and whipping up pico de gallo, reflecting a moderate
    cooking skill that shines at neighborhood barbecues.
  core: Raul Matilla balances a methodical, routine-loving work ethic with a sociable, worry-prone personality, channeling energy into hands-on maintenance, community soccer, and vibrant backyard cooking
    while vigilantly planning a future business.
background:
  cultural: Raul was raised in a bilingual Mexican‑American household in Salinas, where Spanish and English are spoken interchangeably at home and in the community. He identifies strongly with Mexican cultural
    values such as familismo, respeto, and a strong work ethic, which influence his dedication to reliable service and community involvement. He celebrates traditional holidays like Día de los Muertos and
    Mexican Independence Day, often preparing family recipes and participating in local parades. His Catholic upbringing informs his sense of responsibility and compassion toward neighbors. While fully
    integrated into the broader Californian milieu, he maintains close ties to the local Latino community through church activities, volunteer work, and regular visits to family in nearby agricultural towns.
attributes:
  skills: '[''HVAC maintenance and repair'', ''Plumbing troubleshooting'', ''Electrical system diagnostics'', ''Carpentry and minor construction'', ''Preventative maintenance scheduling'', ''Technical blueprint
    reading'', ''Hand and power tool operation'', ''Safety compliance (OSHA, EPA)'', ''Inventory and parts management'', ''Team coordination and customer communication'']'
  hobbies: '[''Soccer (amateur league)'', ''Cooking Mexican cuisine'', ''Gardening (vegetable garden)'', ''Hiking Salinas hills'', ''Fishing at Monterey Bay'', ''Attending local cultural festivals'', ''Listening
    to banda music'', ''Restoring a vintage motorcycle'', ''Barbecue gatherings with friends'']'
  career_goals: Raul aims to advance from a hands‑on maintenance technician to a supervisory role within the next five years. He plans to earn an HVAC specialist certification and obtain a California Electrical
    Contractor license to broaden his technical qualifications. With his strong organizational skills and knack for mentoring, he aspires to become a lead maintenance manager, overseeing a team of technicians
    and implementing preventive maintenance programs for larger property portfolios. Ultimately, he hopes to launch his own small property‑maintenance business that serves residential complexes and local
    businesses in Monterey County, providing reliable, culturally‑aware service.
