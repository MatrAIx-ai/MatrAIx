persona_description: A researcher and scientist who specializes in the field of robotics, particularly in the development of interactive intelligent robots aimed at aiding the diagnosis and treatment of
  Autism Spectrum Disorders (ASD). She has been working in this field for years and has a track record of developing innovative treatments for ASD. Her interdisciplinary team is collaborating with experts
  in the field of electrical engineering, psychology, and medicine to develop interactive intelligent robots that can assist children with ASD in various aspects of their lives, such as social interaction,
  communication, and therapy. The research funded by the USC Provost's Center for Interdisciplinary Research, the Okawa Foundation, and an NSF Computing Research Infrastructure Grant is an extension of
  her ongoing work in the field of socially assisted robots.
