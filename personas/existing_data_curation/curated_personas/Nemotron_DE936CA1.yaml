  hobbies: '["Painting (acrylic)", "Sketching", "Digital illustration", "Photography", "Acoustic guitar", "Creative writing (short stories, poetry)", "Reading science‑fiction and fantasy", "Hiking in state
    parks", "Community theater improv", "Volunteering at health fairs", "Experimenting with fusion cooking", "Attending local art workshops", "Running club", "Tabletop RPGs (D&D)", "Tech tinkering (Arduino,
    Raspberry Pi)"]'
  career_goals: Jonathan aims to transition from his current LPN role to become a registered nurse, earn a Bachelor of Science in Nursing, and then pursue a Master’s degree in Nursing Education or Health
    Informatics. His long‑term ambition is to serve as a clinical educator and eventually assume a director‑of‑nursing position at a community health center. Parallel to his formal nursing trajectory, he
    plans to launch a local wellness hub that integrates art‑therapy sessions for patients with chronic conditions, offering workshops that blend visual arts, music, and creative writing with evidence‑based
    health education. He also seeks certification in art therapy and hopes to become a speaker at national conferences on interdisciplinary health innovation.
