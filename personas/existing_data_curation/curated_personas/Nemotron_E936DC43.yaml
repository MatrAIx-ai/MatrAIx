    Mural Volunteering'', ''3D Modeling'']'
  career_goals: John aspires to fuse his artistic talents with his love of community building. Over the next few years he plans to enroll in a Master of Fine Arts program—focused on either creative writing
    or visual storytelling—to deepen his craft. After completing his graduate studies, he aims to work as an independent writer/editor while also taking on a role as a program coordinator for a nonprofit
    art organization in the Pittsburgh area. He envisions establishing a collaborative art space where local creators can exhibit work, run workshops, and engage the public. Leveraging his social‑media
    expertise, John wants to develop a digital platform that curates emerging speculative fiction and visual art. Ultimately, his career ambition is to create, mentor, and foster cultural dialogue in ways
    that blend personal creativity with community impact.
