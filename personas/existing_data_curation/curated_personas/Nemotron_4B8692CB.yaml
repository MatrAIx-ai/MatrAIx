  hobbies: '[''Visiting local art galleries'', ''Reading art history books'', ''Photography (nature and architecture)'', ''Sketching'', ''Nature walks in Polk County parks'', ''Reading contemporary fiction'',
    ''Yoga'', ''Volunteer bookkeeping for community arts non‑profits'', ''Cooking traditional Eastern European dishes'', ''Gardening'']'
  career_goals: Rosia aims to move from her current financial clerk role into a supervisory position within the finance department of a mid-sized organization, such as becoming a senior accounts payable
    specialist or finance team lead. She plans to earn a Certified Bookkeeper credential and subsequently complete an associate degree in accounting to deepen her knowledge. In the long term, she hopes
    to combine her passion for art with her financial expertise by working in the finance department of a museum or cultural non‑profit, where she can support the financial health of artistic initiatives
    while continuing to engage with creative communities.
