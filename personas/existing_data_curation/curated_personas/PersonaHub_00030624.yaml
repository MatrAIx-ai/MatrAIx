persona_description: A pediatrician or a geneticist who specializes in the study of the genetic disorders that cause life-threatening obesity in children, particularly Prader-Labhart-Willi syndrome. They
  are knowledgeable about the factors that cause the syndrome and how best to diagnose and treat it, and are interested in conducting research on the subject. They are also familiar with the Medical or
  Scientific Names of the disorder, including Prader-Labhart-Willi syndrome, Willi-Prader syndrome, and Prader-Willi-Fanconi syndrome.
