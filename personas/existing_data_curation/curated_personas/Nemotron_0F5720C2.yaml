personas:
  professional: Scott Richter is a budding junior soccer captain at his elementary school, orchestrating plays with a love for clear rules and structure, while they channel their competitive nature and
    sense of responsibility into organizing class projects and Boy Scout badge workshops.
  sports: Scott Richter is an enthusiastic member of the South Sound Youth Soccer League, cheering on the Seattle Sounders FC and the Seattle Seahawks, while they also organize weekly pickup games with
    friends and scout new hiking trails in Olympic National Park for off‑season fitness.
  arts: Scott Richter loves building intricate LEGO cityscapes, sketching superhero comic strips inspired by Stan Lee and the animated series 'Adventure Time,' and they immerse themselves in Mario Kart
    races featuring characters like Bowser and Yoshi, which fuels their imaginative storytelling.
  travel: Scott Richter enjoys weekend family adventures to tidepools at the Dungeness Peninsula, forest hikes in the Mt. Rainier area, and they dream of a future trip to Disney World in Orlando, balancing
    a love for nature quests with the excitement of theme‑park thrills.
  culinary: Scott Richter favors classic kid‑friendly dishes like pepperoni pizza, cheesy macaroni, and chocolate chip cookies, can proudly butter a grilled cheese on their own, and they delight in sprinkling
    LEGO‑themed rainbow sprinkles on cupcakes for birthday parties.
  core: Scott Richter is a structure‑loving, worry‑prone 7‑year‑old who channels competitive energy into soccer, LEGO builds, and comic art, and they obsessively count allowance pennies.
background:
  cultural: Scott is a white American child raised in the suburban community of Silverdale, Washington. His upbringing reflects the Pacific Northwest’s blend of outdoor recreation and community-oriented
    values. Family weekends often involve camping trips to nearby forests, fishing at local waterways, and attending community events such as the Fourth of July parade and the Kitsap County fair. He attends
    a public elementary school that emphasizes teamwork and structured learning. Local influences include the maritime heritage of Kitsap County, with occasional family outings to watch naval vessels or
    learn about the region’s timber history. These experiences shape his appreciation for nature, teamwork, and a reliable, organized lifestyle.
