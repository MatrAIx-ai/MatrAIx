personas:
  professional: Mark Lau is an aspiring digital artist and budding robotics enthusiast who channels curiosity and collaborative energy into creating vibrant tablet illustrations while designing simple Arduino‑powered
    gadgets, and they balance meticulous planning with spontaneous experimentation.
  sports: Mark Lau fuels their love for movement through daily skateboarding with the local youth club 'Board Riders United' and weekend bike rides on the city trail network, while cheering on the Golden
    State Warriors in the NBA and the San Francisco Giants in MLB, and they balance casual street sport with fandom for professional teams.
  arts: Mark Lau channels artistic energy into vibrant digital illustrations reminiscent of Studio Ghibli’s Hayao Miyazaki and the bold color palettes of contemporary artist Takashi Murakami, while strumming
    guitar covers of Arctic Monkeys and Tame Impala during jam sessions, and they share a love for sci‑fi storytelling inspired by authors like Neal Stephenson and Philip K. Dick.
  travel: Mark Lau prefers spontaneous weekend getaways with friends, savoring bike tours through the nearby coastal trail and day trips to the regional state park, while dreaming of an immersive cultural
    adventure in Tokyo’s Akihabara district and a winter trek across Iceland’s volcanic landscapes, and they balance local exploration with big‑picture travel fantasies.
  culinary: Mark Lau boasts a budding cooking skill, often whipping up quick ramen bowls flavored with miso paste, soy sauce, and soft‑boiled eggs, alongside homemade pepperoni pizza slices topped with
    mozzarella and fresh basil, and they relish indulgent snack runs for cheese‑filled sushi rolls and cinnamon‑sugar churros during gaming marathons.
  core: Mark Lau blends a restless curiosity for art and tech with a love for group adventures, and they occasionally sacrifice sleep for gaming marathons, yet always sketching new ideas on the back of
    a skateboard deck.
background:
  cultural: Mark grew up in a suburban white American family in Vancouver, Washington, where the Pacific Northwest lifestyle emphasizes outdoor recreation, community involvement, and appreciation for the
    arts. His household celebrates typical American holidays and embraces local traditions such as weekend hikes in the nearby forests. Exposure to the diverse cultural scene of the Portland metropolitan
    area has broadened his interests, allowing him to blend mainstream American pop culture with a curiosity for new artistic and technological ideas.
