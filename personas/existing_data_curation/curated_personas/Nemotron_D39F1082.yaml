personas:
  professional: Ysabel Rodriguez, a senior data scientist and data‑driven strategist, merges advanced statistical modeling in Python, R, and SQL with a designer’s eye for visual narratives, delivering predictive
    consumer insights for Spanish‑speaking markets while they thrive on solitary deep‑work sessions and prefer flexible project‑based contracts over rigid corporate schedules.
  sports: Ysabel Rodriguez stays active through early‑morning beach jogs, weekly yoga at a quiet studio, and cheering for the Miami Heat during the basketball season, while they maintain a casual membership
    at a local rowing club and occasionally join a co‑ed volleyball pickup at South Beach; they favor solitary fitness routines over team sports but enjoy the communal excitement of game days.
  arts: Ysabel Rodriguez immerses themselves in the arts by wandering Miami’s Wynwood Walls and contemporary galleries at dawn, creating generative art pieces with Python and Processing, and devouring literature
    from poet Gabriela Mistral and novelist José Martí, while they listen to the vibrant sounds of Afro‑Caribbean vocalist Celia Cruz and Juan Luis Guerra on quiet evenings; they blend analytical precision
    with artistic flair, often sketching data visualizations that echo the bold colors of muralist Alex Martínez.
  travel: Ysabel Rodriguez favors solo, loosely planned travels that blend cultural immersion with seaside relaxation, having savored sunrise vistas in Key West, explored the historic plazas of Old San Juan,
    strolled the cobblestone streets of Cartagena, and dreamed of wandering Barcelona’s Gothic Quarter, while they prioritize flexible itineraries that accommodate spontaneous beach walks and often allocate
    a modest budget to experience local food markets and community festivals.
  culinary: Ysabel Rodriguez finds solace in cooking slow‑cooked pork stew with black beans, plantains, garlic, cumin, and a splash of sour orange juice, perfecting the caramelized base for weeks, while
    they also whip up fresh yuca frita and mango‑lime salad, and occasionally treat themselves to a night out at a nearby Latin‑fusion bistro for grilled fish tacos with avocado crema; they view the kitchen
    as a meditative studio where meticulous seasoning meets occasional improvisation.
  core: Ysabel Rodriguez is a curiosity‑driven data strategist who balances solitary deep‑analysis with vibrant cultural passions, navigating a relaxed yet occasionally chaotic schedule and turning art,
    food, and meditation into essential companions to their professional pursuits, and they often blend analytical rigor with spontaneous creativity.
background:
  cultural: Ysabel is a first‑generation Cuban‑American whose parents immigrated to Miami in the 1970s. She grew up bilingual, speaking Spanish at home and English in school, and was steeped in Cuban traditions—music,
    dance, food, and a strong sense of community. The vibrant Cuban diaspora in Miami shaped her identity, and she remains active in local cultural events such as the Calle Ocho festival and community gatherings
    at Little Havana. Her Catholic upbringing instilled values of resilience and family loyalty, while her personal experiences as a divorced mother have fostered independence. These cultural roots inform
    her professional lens, especially her focus on consumer insights within Hispanic markets, and they also enrich her artistic appreciation and culinary passions.
