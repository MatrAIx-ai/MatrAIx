  career_goals: She aims to transition into a senior data scientist or consultant role that offers flexible, project‑based work, allowing her to dive deep into research while maintaining the solitude she
    values. Ysabel dreams of launching a boutique analytics consultancy that specializes in cultural market insights for the Cuban and broader Latin American diaspora. She also aspires to publish interdisciplinary
    research that bridges mathematical modeling with artistic expression, such as generative art projects. Long‑term, she hopes to mentor emerging analysts, especially women of Hispanic heritage, and to
    teach part‑time courses on applied statistics at a community college.
