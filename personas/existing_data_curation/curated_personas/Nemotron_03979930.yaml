  hobbies: '[''Hiking'', ''Cooking Traditional Puerto Rican Dishes'', ''Salsa Dancing'', ''Yoga'', ''Nature Photography'', ''Reading Historical Fiction'', ''Volunteering for Digital Literacy'', ''Exploring
    Emerging Social Media Platforms'']'
  career_goals: She aims to advance to a senior marketing leadership role within the next three years, oversee regional campaigns that blend modern digital tactics with authentic Puerto Rican cultural elements,
    complete her bachelor’s degree in Marketing, and eventually launch a boutique consultancy that helps local businesses amplify their stories on global platforms while maintaining a flexible, people‑first
    work style.
