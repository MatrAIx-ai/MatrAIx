personas:
  professional: Thais Maldonado, 26, is a bilingual marketing strategist who blends data‑driven digital tactics with the island’s rhythmic storytelling, balancing pragmatic budgeting with creative collaborations
    to help local brands resonate authentically.
  sports: Thais Maldonado enjoys early‑morning trail hikes in the nearby mountains, plays pick‑up soccer on Saturdays, and passionately follows the Cangrejeros de Santurce baseball team, joining community
    runs when motivation strikes.
  arts: Thais Maldonado frequents local salsa clubs, dances to the vibrant beats of Marc Anthony and Héctor Lavoe, curates a vinyl collection of classic plena and salsa, and occasionally paints sunrise
    vistas captured during hikes.
  travel: Thais Maldonado prefers spontaneous weekend escapes to the misty highland villages and the turquoise shores of neighboring islands, uses travel apps to book last‑minute stays, and dreams of exploring
    Cartagena’s historic walled city and the waterfalls of Cueva del Indio on a future vacation.
  culinary: Thais Maldonado loves crafting mofongo with fried plantains, garlic, and chicharrón, perfecting pasteles filled with seasoned pork and olives, and pairing these dishes with a splash of aguardiente,
    while their cooking skill ranges from home‑cooked feasts to occasional experimental attempts at paella.
  core: Thais Maldonado is a curiosity‑driven yet laid‑back marketer who stitches cultural rhythms into data‑rich campaigns while juggling a love for hiking, salsa dancing, and impulsive, yet heartfelt,
    spending.
background:
  cultural: Thais was born and raised in Adjuntas, a close‑knit community in the heart of Puerto Rico. Her upbringing was steeped in family gatherings, Catholic celebrations, and the island’s vibrant music
    traditions such as plena and salsa. Bilingual at home and school, she feels a strong responsibility to preserve and promote Puerto Rican heritage, which she weaves into both her personal life and professional
    endeavors, especially through community‑focused marketing and storytelling.
attributes:
  skills: '[''Digital Marketing Strategy'', ''Social Media Management (Instagram, Facebook, TikTok)'', ''Content Creation & Copywriting'', ''Bilingual Communication (English/Spanish)'', ''Google Analytics
