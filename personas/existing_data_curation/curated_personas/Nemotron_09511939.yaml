  career_goals: Sylvana dreams of a career that blends her curiosity about the natural world with a practical, community‑focused role. She is leaning toward becoming a veterinarian to care for animals on
    her family's farm and in her town, while also keeping an eye on environmental science or wildlife conservation as a way to protect Minnesota's prairie ecosystems. She hopes to continue learning, earn
    a high school diploma, and eventually pursue a college degree in a science‑related field.
