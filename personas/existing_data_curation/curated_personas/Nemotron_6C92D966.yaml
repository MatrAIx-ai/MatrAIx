  hobbies: '[''Soccer'', ''LEGO building'', ''Exploring desert trails'', ''Drawing'', ''Educational tablet games (block coding)'', ''Reading adventure books'', ''Helping in the kitchen (measuring ingredients)'',
    ''Watching nature documentaries'']'
  career_goals: Bruce dreams of becoming a firefighter when he grows up because he admires the clear routines, teamwork, and the chance to help people in immediate, real‑world situations. He also enjoys
    imagining himself as a builder or construction worker, designing and constructing things with his hands. His short‑term ambition is to earn the "Junior Firefighter" badge offered by the local Boy Scouts
    and to learn more about fire safety and rescue techniques.
