  hobbies: '[''Art Gallery Visits'', ''Watercolor Sketching'', ''Indie Music Concerts'', ''Yoga'', ''Hiking'', ''Experimental Cooking'', ''Reading Contemporary Fiction'', ''Improv Comedy Workshop'']'
  career_goals: Laney aims to advance into a senior production planner or supply‑chain supervisor role within a tech‑manufacturing firm, where she can shape workflow strategies and mentor junior staff.
    She plans to earn a CPIM (Certified in Production and Inventory Management) certification to formalize her expertise. Long‑term, she hopes to transition into a consultancy that blends efficiency with
    sustainable and artistic product development, allowing her to apply her curiosity and love of unconventional ideas to broader industry challenges.
