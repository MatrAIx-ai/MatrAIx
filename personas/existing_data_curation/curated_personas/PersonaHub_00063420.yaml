persona_description: A user who is not fluent in XML code and needs to enter information in XML based documents. They may also be a developer or administrator who needs to work with XML files and needs
  an editor that can handle syntax highlighting, element completion, and other features. They are looking for an editor that can verify the XML source based on an XML schema or XML DTD, and provide features
  such as element word completion, automatic appending of a closing tag, and the ability to run an XSLT transform or series of transforms over a document. They are also looking for a text editor that presents
  exactly the information that is stored in the XML file, provides a more granular way to control the formatting of the file, and allows low-level operations such as find/replace on element names. They
  may also be interested in a graphical editor that is easier to use than a text editor and provides features such as displaying line numbers, reformatting a document to conform to a particular style of
  indenture, and displaying the actual meaning of XML elements.
