persona_description: A systems architect who specializes in the design and implementation of BLE mesh networks for smart home applications, using PSoC 4 BLE solution. They are experienced in creating custom
  sensor interfaces, implementing control units, and dynamically changing BLE GAP roles between Central and Peripheral nodes. They are proficient in using free software tools, low-cost development kits,
  and hundreds of design examples to implement BLE-compatible Profiles for custom applications. They have a deep understanding of BLE's role in making the IoT successful and its current limitations in network
  topologies, and are looking for a solution that integrates all requirements for IoT applications while being easy-to-implement.
