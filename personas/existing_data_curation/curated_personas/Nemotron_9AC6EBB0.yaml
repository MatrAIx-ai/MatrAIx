personas:
  professional: Edilberto Iturbe is a hands‑on tinkerer who blends curiosity‑driven electronics projects with solid automotive repair expertise, and they are pursuing either automotive service technician
    or journeyman electrician certification while plotting to launch a low‑cost, community‑oriented handyman service that capitalizes on their reputation as the go‑to fixer in Maricopa, all while they often
    juggle projects without strict timelines to preserve flexibility.
  sports: Edilberto Iturbe is an avid desert hiker who joins a local Pinal County trail club, follows the Arizona Diamondbacks and Phoenix Suns on television, and they schedule weekend treks through the
    Sonoran landscape for solitary reflection rather than organized team sports.
  arts: Edilberto Iturbe is a quiet collector of speculative fiction, favoring authors like Brandon Sanderson and N.K. Jemisin, and they unwind to the heartfelt strains of regional folk groups such as Los
    Tigres del Norte while occasionally indulging in strategic board‑game sessions that double as social theater.
  travel: Edilberto Iturbe prefers low‑key, spontaneous road trips that blend desert camping with occasional city visits, they have explored the Grand Canyon and Sedona, and they dream of trekking Patagonia’s
    Torres del Paine during a future gap‑year while balancing budget constraints.
  culinary: Edilberto Iturbe enjoys cooking traditional Mexican fare such as carnitas, pozole, and chilaquiles, they possess moderate culinary skill, often seasoning with chipotle, cilantro, and lime, and
    they relish pairing their meals with homemade salsa while listening to folk music, though they occasionally order takeout when a project deadline looms.
  core: Edilberto Iturbe is a solitary, curiosity‑driven fixer who blends hands‑on tinkering, frugal pragmatism, and a quiet competitive streak into a life of flexible, community‑focused problem solving.
background:
  cultural: Edilberto’s Mexican heritage is a core part of his identity. He grew up in a bilingual household where Spanish was spoken at home and English at school, giving him a deep appreciation for Mexican
    customs such as Día de los Muertos, Mexican Independence Day celebrations, and family‑centered meals. Living in Maricopa, Arizona, he experiences a blend of Mexican‑American culture, often attending
    community festivals that feature mariachi music and traditional food. His upbringing emphasized self‑reliance, respect for hard work, and a sense of communal responsibility, values he carries into his
    everyday interactions and future ambitions.
attributes:
  skills: '[''Automotive maintenance and repair'', ''Basic electrical and plumbing troubleshooting'', ''DIY carpentry and woodworking'', ''Computer hardware and software troubleshooting'', ''Bilingual communication
    (Spanish‑English)'', ''Electronics tinkering'']'
  hobbies: '[''Woodworking projects'', ''Arduino/electronics tinkering'', ''Strategy video gaming'', ''Desert hiking'', ''Reading sci‑fi/fantasy'', ''Cooking Mexican cuisine'', ''Listening to Mexican folk
    music'', ''Small‑group board‑game evenings'']'
  career_goals: He aims to translate his curiosity and practical skill set into a stable trade. Over the next few years, Edilberto plans to obtain a certification as an automotive service technician or
    a journeyman electrician, whichever aligns better with his growing interest, and eventually launch his own small handyman service that offers affordable repairs to his community. He is motivated by
    the competitive desire to be recognized as the go‑to fixer in Maricopa while preserving the flexibility to set his own schedule.
