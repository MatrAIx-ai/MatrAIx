  career_goals: Michael often dreams about careers that combine structure, helping others, and teamwork. He says he wants to become an astronaut because he loves building rockets with his LEGO and enjoys
    the idea of exploring space in a systematic way. He also admires firefighters for their organized response to emergencies and has expressed a desire to be a firefighter one day. Additionally, his love
    for school group projects makes him think about becoming a teacher or a community coach, where he can lead and support his peers.
