personas:
  professional: Michael Jones, a budding LEGO engineer who treats each brick build like a miniature construction project, methodically follows step‑by‑step instructions and proudly showcases finished models
    at the Boy Scouts troop showcase, reflecting their organized, reliable nature and love for structured teamwork.
  sports: Michael Jones, a spirited member of the Midland Community Soccer Club's U‑7 team who idolizes the Detroit Lions and cheers for the Detroit Tigers, spends weekend afternoons sprinting across the
    local field and balances competition with teamwork by always passing the ball, reflecting their energetic sociability and cooperative assertiveness.
  arts: Michael Jones, an enthusiastic doodler who fills sketchbooks with bright illustrations of Spider‑Man, Pixar characters, and the local fairgrounds, eagerly sings along to Raffi’s “Baby Beluga” and
    the Wiggles’ “Fruit Salad,” and participates in library story hour featuring Mo Willems, nurturing their creative expression and love for community arts.
  travel: Michael Jones, a curious explorer who has visited Mackinac Island’s historic carriage rides, camped near the shores of Lake Huron, and dreams of a family road trip to Washington, D.C.’s National
    Air and Space Museum, preferring well‑planned itineraries that blend outdoor adventure with learning, yet occasionally worries about leaving their beloved LEGO set at home.
  culinary: Michael Jones, a self‑appointed kitchen helper who can whip up a picture‑perfect peanut‑butter‑jelly sandwich, enjoys digging into homemade macaroni and cheese topped with extra cheddar, and
    experiments with tiny pine‑cone toppings for his ‘forest‑themed’ pizza, reflecting a playful yet structured approach to food.
  core: Michael Jones, a methodical LEGO builder with a savings jar for every coin, a chronic allergy sneezer who still dashes onto the soccer field, and a junior artist who never misses story hour, embodies
    Midwest diligence mixed with a vivid, organized imagination.
background:
  cultural: Michael is raised in a middle‑class white family in Midland, Michigan, a small Midwestern town known for its close‑knit community and ties to the chemical industry. His upbringing reflects typical
    Midwestern values of hard work, politeness, and community involvement. He attends a local church with his family, celebrates holidays such as Thanksgiving, Christmas, and the Fourth of July with neighborhood
    gatherings, and participates in school and community events like the Bay County fair, youth soccer leagues, and Boy Scouts. The region’s cultural heritage, including a mix of German and Polish ancestry
    common in the area, influences family traditions, food, and his exposure to both local history and the outdoors around the Great Lakes.
