persona_description: A marine biologist and researcher who specializes in the study of hydrodynamic signatures in marine organisms, particularly in the context of jet propulsion in hydromedusae. Her work
  involves evaluating swimming ability and efficiency of hydromedusae as they grow, and quantifying vortex formation characteristics. She is particularly interested in the implications of jet propulsion
  proficiency and efficiency with different bell diameters.
