personas:
  professional: Andy Byrd, a 32‑year‑old IT support specialist at a regional health network, blends methodical ticket triage, PowerShell and Bash automation, and empathetic user communication with a flair
    for digital illustration and 3‑D mockups, making them the go‑to bridge between technical problem‑solving and user‑friendly UI design.
  sports: Andy Byrd joins a local pickup basketball league, roots for the Green Bay Packers and Milwaukee Bucks, paddles a kayak on Lake Winnebago each summer, and straps on snowshoes for weekend treks
    through nearby state forests during the winter months.
  arts: Andy Byrd creates abstract digital paintings in Photoshop, sculpts 3‑D concepts in Blender, attends the Madison Museum of Contemporary Art for shows by artists like Yayoi Kusama and Banksy, and
    they unwind listening to Sufjan Stevens, Bon Iver, and catching community theater productions of classic plays.
  travel: Andy Byrd favors road‑trip explorations of the Upper Midwest—having camped among Door County’s cherry orchards, kayaked the Boundary Waters, and visited the Apostle Islands—while they nurture
    a bucket‑list dream of Iceland’s volcanic fields and a summer music fest in Austin, Texas.
  culinary: Andy Byrd delights in Wisconsin staples such as cheese curds, bratwurst with sauerkraut, and pan‑seared trout almandine, yet also experiments with homemade ramen broth, raspberry‑infused sorbet,
    and occasional vegan lentil stew, reflecting a competent home cook who mixes comfort fare with adventurous flavors.
  core: Andy Byrd is a disciplined tech professional with a vivid artistic streak, community‑focused heart, and a habit of over‑thinking that drives both meticulous planning and occasional sleepless nights.
background:
  cultural: Andy was raised in Neosho, a small town in Dodge County, Wisconsin, within a predominantly white, Midwestern community with strong German‑Scottish heritage. The region's cultural values emphasize
    hard work, self‑reliance, and community involvement. Growing up, he participated in local church gatherings, high school sports, and county fairs, which fostered a cooperative spirit and a connection
    to rural traditions such as dairy farming and outdoor recreation. These influences combine with contemporary American cultural exposure, shaping his balanced outlook that blends practicality with an
    appreciation for creativity and social harmony.
