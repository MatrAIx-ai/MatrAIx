  career_goals: Andy aims to transition from a support specialist to a senior systems engineer or IT manager within the next five years. He plans to obtain certifications such as CompTIA Network+, Security+,
    and Microsoft Azure Administrator, and eventually pursue a master's degree in information technology management. He is also interested in integrating his creative side into his career by exploring UX/UI
    design or data visualization projects, possibly leading cross-functional teams that blend technology and design. Long‑term, he hopes to mentor junior staff, contribute to community tech education, and
    achieve a balanced role that allows time for his family and artistic pursuits.
