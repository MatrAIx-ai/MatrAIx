  hobbies: '[''Gardening'', ''Woodworking'', ''Electronics restoration'', ''Reading popular-science books'', ''Birdwatching'', ''Chess'', ''Mentoring high-school students in STEM'', ''Participating in Polish
    cultural festivals'']'
  career_goals: Peter's post-retirement ambitions center on staying intellectually active while giving back to his community. He plans to enroll in short online courses in renewable energy and data science,
    integrating new knowledge into personal projects like designing a solar-powered irrigation system for his garden. He is committed to mentoring high-school students in STEM through the Willowbrook library's
    after-school program, aiming to spark their curiosity with hands-on experiments that balance theory and practicality. Additionally, he hopes to compile his life stories and family history into a memoir
    that honors his Polish-American roots and illustrates how lifelong learning can coexist with a relaxed, flexible lifestyle.
