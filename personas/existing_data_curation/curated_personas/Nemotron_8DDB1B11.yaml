personas:
  professional: Chad Southwell is a seasoned hairdresser with three decades of hands‑on expertise in cutting, coloring, and scalp health, who blends a practical, results‑focused mindset with a curiosity
    for low‑chemical, eco‑friendly techniques, and they are now steering their salon toward a boutique model featuring locally sourced products, apprenticeships, and regional master stylist recognition.
  sports: Chad Southwell enjoys seasonal hiking on the Appalachian Trail and occasional bird‑watching hikes, follows the Pittsburgh Steelers for football and the Philadelphia 76ers for basketball, and they
    participate in a senior‑center’s weekly chess league rather than traditional team sports, using walking as their primary fitness routine.
  arts: Chad Southwell cultivates a rich artistic side by listening to classic rock records from The Rolling Stones and Led Zeppelin on vinyl, capturing Appalachian vistas with a vintage Canon AE-1 inspired
    by Ansel Adams, and they unwind with historical fiction by Hilary Mantel and psychology works by Daniel Kahneman, while occasionally attending performances at the local Pennsylvania Shakespeare Festival.
  travel: Chad Southwell favours solo, low‑key road trips that blend nature and heritage, having explored the Blue Ridge Parkway, the historic streets of Gettysburg, and dreaming of a culinary pilgrimage
    to Provence’s lavender fields, and they plan trips around off‑season discounts to keep retirement savings intact.
  culinary: Chad Southwell is an enthusiastic home cook who grows rosemary, sage, and lavender for both hair‑care experiments and cuisine, frequently preparing herb‑crusted roasted chicken, grilled trout
    with dill, and a rustic vegetable stew, and they enjoy experimenting with wild mushroom foraging and crafting wooden serving boards in their workshop.
  core: Chad Southwell blends meticulous craftsmanship, sustainable hair‑care innovation, and solitary reflection into a life where vintage vinyl, herb‑infused shampoos, and weekly chess matches coexist
    with a quiet worry about the future, and they navigate each day with a mix of curiosity and careful pragmatism.
background:
  cultural: Chad grew up in a modest, middle‑class family in rural central Pennsylvania, the son of German‑Irish ancestry who valued hard work, self‑reliance, and community service. Raised in a Methodist
    household, he participated in neighborhood gatherings, church events, and local festivals that celebrate Pennsylvania’s Appalachian heritage. This upbringing instilled in him a respect for tradition
    and a practical outlook, while also fostering an appreciation for the region’s natural beauty and close‑knit social fabric. His professional identity as a hairstylist reflects the area’s emphasis on
    personal service, craftsmanship, and building lasting relationships.
attributes:
  skills: '[''Hair cutting (men, women, children)'', ''Precision coloring (balayage, ombre, foil highlights)'', ''Chemical texturizing (perm, relaxer, keratin treatments)'', ''Scalp health analysis and
