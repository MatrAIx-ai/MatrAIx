persona_description: A historian who specializes in the study of world history, particularly the maritime trade routes of ancient China and the significance of the Tang Dynasty in global trade. This persona
  is interested in the discovery of the Belitung wreck and the significance of the artifacts recovered, particularly the rare blue-and-white ceramics and the gold and silver objects. They are also interested
  in the cultural and economic significance of the Tang Dynasty in global trade and the role of the Silk Road in connecting Asia and Europe.
