personas:
  professional: Shirley Gwin, an aspiring junior illustrator and storyteller, blends watercolor techniques with vivid nature journal entries, channeling their curiosity and love for the Cumberland Plateau
    into original sketchbooks that capture both flora and personal reflections, while their relaxed approach to deadlines sometimes leads to unfinished pages.
  sports: Shirley Gwin enjoys playing forward on the local youth soccer club, the Cumberland Trailblazers, while cheering for the Nashville Predators and Tennessee Titans on weekends, though their flexible
    schedule and occasional forgetfulness cause occasional missed practices.
  arts: Shirley Gwin immerses themselves in drawing watercolor scenes inspired by Hayao Miyazaki’s animated films, practices piano pieces by Yiruma, and collaborates on church youth group mural projects,
    where their kind, cooperative nature shines despite a tendency to keep supplies scattered.
  travel: Shirley Gwin dreams of hiking the Appalachian Trail after exploring nearby Lookout Mountain and has already trekked the Great Smoky Mountains, while saving allowance for a future family trip to
    Kyoto’s bamboo forest, balancing their modest budget with a craving for adventure and occasional worry about travel costs.
  culinary: Shirley Gwin loves baking chocolate chip cookies with a pinch of sea salt, perfecting the crumb by carefully measuring flour, butter, and brown sugar, and often experiments by folding fresh
    blueberries into muffins, documenting each recipe with doodles in their sketchbook.
  core: Shirley Gwin is a curious 11‑year‑old artist who balances sketching nature, baking sweet treats, and occasional anxiety with a love for spontaneous adventures, and they often misplace LEGO pieces
    while chasing new ideas.
background:
  cultural: Shirley is a white girl raised in Jasper, Tennessee, a small town nestled in the Appalachian foothills of Marion County. Her family embodies Southern hospitality and strong community ties, often
    attending the local Methodist church and participating in county fairs, the annual Shiloh Frog Fest, and church potlucks featuring biscuits, fried chicken, and homemade pies. Growing up near the Cumberland
    Plateau, she was introduced early to outdoor traditions like hiking, camping, and fishing, and she enjoys the region’s folk music and storytelling heritage. These Appalachian influences blend with her
    school’s multicultural curriculum, giving her a balanced view of both local customs and broader cultural ideas.
attributes:
  skills: '["drawing", "mixed‑media art", "creative writing", "basic digital illustration", "basic computer literacy (PowerPoint, Word)", "empathic listening", "conflict mediation", "nature observation"]'
  hobbies: '["drawing and sketching", "watercolor painting", "creative writing", "nature hikes and wildlife observation", "rock and leaf collecting", "photography (basic)", "baking with family", "piano
    practice", "LEGO building", "church youth art projects", "watching animated films"]'
  career_goals: Shirley dreams of turning her love for art and nature into a career. She envisions herself as a wildlife illustrator or environmental artist, creating paintings and drawings that raise awareness
    about conservation. She also admires teachers and veterinarians, hoping one day to combine education and care for animals, perhaps by teaching kids about the natural world through art workshops. Her
    overarching ambition is to make the world a more beautiful and compassionate place.
