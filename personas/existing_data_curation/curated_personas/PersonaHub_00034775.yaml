persona_description: A professor of mechanical engineering and materials science and engineering who is involved in computational simulations to predict the behavior of materials and structures, particularly
  in aerospace, thermal barrier coatings, aluminum sheeting, aluminum castings, and nanocomposites. He has conducted complex research that has resulted in significant savings for companies such as ALCOA,
  and has developed software to help students simulate real-world aerodynamics and design cooling systems. He is also interested in using computational fluid dynamics to advance science and economic development,
  and has created an infrastructure for cancer research and is working with the center to develop a system for remote control and use of powerful microscopes.
