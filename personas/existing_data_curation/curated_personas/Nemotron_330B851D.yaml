  hobbies: '[''Gardening (tomatoes, pecans, native wildflowers)'', ''Quilting'', ''Reading historical novels and biographies'', ''Traditional cooking and recipe preservation'', ''Listening to classic country
    and folk music'', ''Crossword puzzles'', ''Small church group gatherings'']'
  career_goals: At 82, Jodi’s primary ambition is to remain healthy, independent, and engaged in her community. She aims to continue her volunteer leadership at the First Baptist Church, mentor younger
    volunteers, preserve family recipes and quilting traditions for future generations, and ensure her grandchildren have a stable support system. She also hopes to maintain her garden as a source of nourishment
    and relaxation.
