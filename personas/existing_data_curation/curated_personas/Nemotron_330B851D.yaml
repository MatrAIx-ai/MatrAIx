personas:
  professional: Jodi Batson, an 82‑year‑old volunteer coordinator at First Baptist Church in Texas, channels their methodical nature and decades of household budgeting into meticulously planning senior‑center
    programs, keeping inventory of supplies, and mentoring the next generation of volunteers with a steady, reliable hand.
  sports: Jodi Batson follows the Dallas Cowboys and the Texas Rangers on TV, enjoys attending the local senior walking club’s morning strolls around the community garden, and they participate in gentle
    stretch sessions in the church fellowship hall, preferring low‑impact activity over competitive sports.
  arts: Jodi Batson expresses their creativity through intricate quilting projects that echo early Texas motifs, devours historical novels by authors like Willa Cather, tunes into classic country legends
    such as Johnny Cash and folk troubadours like Woody Guthrie, and they occasionally attend a small local theater’s matinee performances of classic plays.
  travel: Jodi Batson favors short, purposeful trips, often traveling with their grandchildren to historic sites like the Alamo, enjoying scenic drives through the Texas Hill Country to Fredericksburg’s
    vineyards, and they dream of a carefully planned road trip to Washington, D.C., where they could walk the National Mall and read about the nation’s founding.
  culinary: Jodi Batson delights in preparing comfort classics such as chicken fried steak, pecan pie, fried catfish with hush‑puppy cornmeal, and collard greens flavored with smoked ham, frequently incorporating
    garden‑fresh tomatoes and basil into sauces, while they hover between confident home cook and occasional improviser when a recipe runs low on ingredients.
  core: Jodi Batson is a steadfast guardian of routine, blending organized volunteer leadership with a quiet love for quilting, crossword puzzles, and classic country melodies, all while they navigate the
    small rebellions of age‑related health quirks.
background:
  cultural: Jodi is a white Texan who grew up in the post‑World War II era and was shaped by Southern‑influenced, Protestant values. Her upbringing emphasized self‑reliance, modesty, and community service.
    She identifies strongly with the traditions of Bryan, Texas, including its agricultural heritage, church‑centric social life, and appreciation for regional cuisine. This cultural backdrop informs her
    respect for routine, dedication to family, and commitment to preserving local customs.
attributes:
  skills: '[''Budgeting and financial record‑keeping'', ''Meal planning and traditional cooking'', ''Gardening (native Texas plants)'', ''Sewing and quilting'', ''Volunteer coordination and event planning'',
