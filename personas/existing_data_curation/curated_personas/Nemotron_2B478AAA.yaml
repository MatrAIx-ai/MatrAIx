  hobbies: '[''herb gardening'', ''experimenting with new recipes'', ''listening to R&B, jazz, and gospel music'', ''crossword puzzles'', ''journaling'', ''knitting'', ''neighborhood book club'', ''morning
    nature walks'', ''volunteering at a community center'']'
  career_goals: Bernadette aspires to formalize her cooking talent by earning a certificate in culinary arts and eventually launching a small home‑based catering service that serves her local community.
    She also plans to complete a GED program to broaden her educational foundation, which she hopes will open part‑time opportunities as a community nutrition educator or a home‑care aide. On a personal
    level, she is focused on building resilience against stress through mindfulness workshops and seeking a supportive peer group that encourages her competitive drive in a positive direction.
