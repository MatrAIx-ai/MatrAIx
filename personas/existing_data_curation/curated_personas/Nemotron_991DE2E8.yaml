personas:
  professional: Mattie Garriott, a seasoned payroll specialist with three decades of experience mastering ADP Workforce Now and QuickBooks Payroll, channels a competitive drive and meticulous attention
    to detail into automating routine tasks, even as they occasionally drift into disorganized habits and prefer flexible scheduling.
  sports: Mattie Garriott follows the Clemson Tigers football team with devotion, catches Atlanta Braves games on weekends, and hikes regularly with the Blue Ridge Strollers club at Oconee State Park, using
    the trails to counter knee discomfort from osteoarthritis while they stay modestly active.
  arts: Mattie Garriott, an avid watercolorist who studies at the Oconee County Arts Center, draws inspiration from the serene palettes of Georgia O’Keeffe and the melancholic lines of Andrew Wyeth, frequents
    the Greenville County Museum of Art and the Asheville River Arts District, and delights in folk concerts featuring the Avett Brothers and local bluegrass ensembles that they attend frequently.
  travel: Mattie Garriott favors relaxed road trips along the Blue Ridge Parkway that blend scenic overlooks with stops at historic towns like Asheville, Savannah, and Charleston, while daydreaming about
    a culinary pilgrimage to Tuscany, planning itineraries on a handwritten notebook but they always leave room for spontaneous detours when a local festival appears.
  culinary: Mattie Garriott loves reimagining classic Southern dishes, turning shrimp and grits into a miso‑glazed version, tossing kimchi into collard greens, and finishing meals with a ginger‑spiced peach
    cobbler, all while they confidently sprinkle fresh basil, thyme, and a pinch of cayenne for bold flavor.
  core: Mattie Garriott is a curious, competitive payroll veteran who balances meticulous number‑crunching with a laid‑back, occasionally disorganized lifestyle, channels Southern‑rooted community values
    into artistic pursuits, and habitually worries about both work deadlines and personal health.
background:
  cultural: Mattie was raised in a small, close‑knit community near Seneca, South Carolina, where Southern hospitality and Appalachian heritage shaped her upbringing. Her family has deep roots in the Upstate
    region, with traditions of church involvement, community festivals, and a strong connection to the natural surroundings of the Blue Ridge Mountains. These cultural influences fostered an appreciation
    for storytelling, folk music, and seasonal farming cycles, while also instilling a respect for self‑reliance and hard work. Although she identifies with this Southern White cultural backdrop, Mattie's
    curiosity has broadened her perspective, leading her to embrace diverse artistic expressions and unconventional ideas beyond her hometown.
attributes:
  skills: '[''Payroll processing'', ''Timekeeping management'', ''ADP Workforce Now'', ''QuickBooks Payroll'', ''Excel spreadsheet design'', ''Data entry'', ''Confidential record handling'', ''Employee
    inquiry resolution'', ''Training and mentorship'', ''Problem solving'', ''Adaptability to software updates'']'
  hobbies: '[''Watercolor painting'', ''Sketching landscapes'', ''Photography'', ''Visiting art exhibits'', ''Reading art history and contemporary fiction'', ''Gardening'', ''Cooking Southern and experimental
    cuisine'', ''Hiking Oconee State Park'', ''Attending folk music festivals'', ''Volunteer reading program at senior center'', ''Genealogy research'']'
  career_goals: Mattie aims to earn the Certified Payroll Professional (CPP) credential within the next two years, positioning herself for a senior payroll supervisor role. She wants to spearhead a project
    to automate routine payroll tasks using macros and cloud‑based solutions, thereby reducing manual workload and lowering her own stress levels. Long‑term, she envisions transitioning to a part‑time freelance
    bookkeeping consultancy serving small local businesses, allowing her to maintain flexibility while sharing her expertise. Additionally, she hopes to mentor at least two junior clerks, fostering a supportive
    environment and leaving a lasting professional legacy before retirement.
