persona_description: A historian of drama who specializes in the study of ancient Greek and Roman plays, particularly focusing on the works of Sophocles, Euripides, and Aeschylus. He is an expert in the
  classical models of drama and has a keen interest in the evolution of the genre from its ancient origins to the modern era. He is also an advocate of the use of classical models in modern drama, and is
  known for his strong defense of the supremacy of the ancient writers in the field of drama. He is critical of the modern writers who have failed to adhere to the classical rules of drama, and believes
  that the ancient writers have a superior understanding of human nature and the world around us. He is also an advocate of the importance of the three unities of time, place, and action in the construction
  of a successful play, and believes that the modern writers have failed to achieve this.
