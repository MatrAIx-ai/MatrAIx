  career_goals: Meadow aims to secure her California cosmetology license, deepen her expertise in sustainable and natural hair care, and eventually open a small boutique salon that reflects Imperial Beach’s
    relaxed, beach‑side vibe. She envisions a space where clients feel both pampered and mentally supported, incorporating quiet zones for anxiety‑relief and offering workshops on self‑care. Long‑term,
    she hopes to become an educator for other stylists, develop her own line of eco‑friendly hair products, and partner with local wellness initiatives to promote holistic beauty.
