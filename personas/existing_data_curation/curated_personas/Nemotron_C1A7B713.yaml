personas:
  professional: A dedicated cosmetology professional named Meadow Bean blends artistic precision in balayage and ombre with a keen eye for sustainable, natural hair‑care solutions, balancing meticulous
    salon sanitation and client empathy while assertively setting boundaries to protect both their own mental space and client expectations.
  sports: A surf enthusiast named Meadow Bean catches early morning breaks at Imperial Beach as a member of the Imperial Beach Surf Club, competes in the local beach‑volleyball circuit at Torrey Pines,
    practices weekly yoga flow at Ocean Loft, and faithfully follows the San Diego Wave FC and the LA Dodgers.
  arts: A creatively inclined individual named Meadow Bean spends free evenings photographing sunrise over the Pacific, sketching beach scenes in a battered journal, draws inspiration from indie artists
    like Tame Impala and Phoebe Bridgers, and volunteers at community art fairs where they help curate pop‑up galleries featuring muralists and street performers.
  travel: A wanderlust‑filled 29‑year‑old named Meadow Bean prefers weekend road trips along the Pacific Coast Highway to Joshua Tree and Ojai for solo reflection, enjoys occasional spur‑of‑the‑moment getaways
    to Baja California for fresh seafood, and dreams of exploring the sun‑kissed coastal villages of Greece for their laid‑back vibe.
  culinary: A culinary explorer named Meadow Bean loves crafting avocado‑lime toast, devouring fish tacos topped with pickled radishes, blending poke bowls with mango and seaweed, while at home they experiment
    with DIY natural hair‑care masks using coconut oil, shea butter, and aloe vera, boasting a solid intermediate cooking skill set.
  core: Meadow Bean, a 29‑year‑old surf‑side cosmetician, balances a relentless creative drive with anxiety‑fueled perfectionism, turning every sunrise into a fresh canvas for both hair and life.
background:
  cultural: Meadow grew up in a middle‑class white family in the coastal suburbs of San Diego. The laid‑back beach culture of Imperial Beach, combined with the region’s multicultural influences—particularly
    Mexican and Asian communities—shaped her appreciation for diverse lifestyles and cuisines. While her family traditions reflect typical American middle‑class values, she embraces the eclectic, outdoorsy
    spirit of Southern California, celebrating community festivals, enjoying beach gatherings, and valuing personal expression through fashion and beauty.
