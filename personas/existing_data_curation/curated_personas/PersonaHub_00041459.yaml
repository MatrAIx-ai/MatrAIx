persona_description: A production manager who is responsible for overseeing the organization and management of a large animation project. The production manager is responsible for creating a naming convention
  chart and file storage structure for the project. They are also responsible for ensuring that everyone involved in the project follows the naming convention and file storage structure, and that they understand
  the organization and where to find the files. The production manager is expected to be knowledgeable about animation production and have experience in managing large-scale projects. They should have strong
  organizational skills and be able to communicate effectively with team members and stakeholders.
