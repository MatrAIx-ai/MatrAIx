persona_description: A backyard inventor and experimentator who is interested in developing and testing high R value thermal shades for windows. They are also interested in the potential of these shades
  to reduce heat loss and improve the performance of passive solar homes and super insulated homes. They are open to learning about the various designs and materials used in these shades, and are willing
  to share their findings with others. They are interested in finding sources of reflective film and may be interested in starting their own project.
