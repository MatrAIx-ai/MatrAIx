  hobbies: '[''Playing guitar (self‑taught)'', ''Listening to classic rock and country music'', ''Hang out with friends at skate park and basketball court'', ''Attending high‑school football games'', ''4‑H
    projects (building chicken coops, gardening)'', ''Engine tinkering'', ''Fishing at Washita River'', ''Video gaming (multiplayer shooters)'', ''Creating TikTok DIY videos'', ''Volunteering at church
    youth group'']'
  career_goals: Miles plans to obtain his high school equivalency and then enroll in a vocational program for automotive technology or welding at a nearby community college or through an apprenticeship.
    He dreams of opening his own auto‑repair shop that also serves as a hands‑on learning hub for local teens, combining his love for practical problem‑solving with community mentorship. He is also open
    to joining the Army's mechanical engineering track as a pathway to further technical training. In the longer term, he hopes to acquire a small piece of land to run a mixed‑use farm or ranch, integrating
    his interest in livestock care and sustainable living, while remaining an active, supportive figure in Pauls Valley's community.
