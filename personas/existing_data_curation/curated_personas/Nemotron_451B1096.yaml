personas:
  professional: An ambitious middle school robotics enthusiast, Liz Gonzalez channels their curiosity and disciplined organization into building and programming simple robots for the school club, where
    they proudly lead projects and meticulously document every step.
  sports: Liz Gonzalez spends Saturday afternoons on the soccer field as a forward for the middle‑school Eagles, training with friends to sharpen teamwork and competitive drive, while they also follow the
    national women's soccer team and cheer for the local professional club City United FC, balancing rigorous practice with a disciplined warm‑up routine and a weekly jog.
  arts: Liz Gonzalez channels creativity by sketching detailed nature scenes in a well‑worn sketchbook, immersing themselves in the lyrical worlds of fantasy authors like Sarah J. Masala, swaying to the
    salsa beats of Celia Cruz during family dance gatherings, and vibing to pop icons such as Ariana Grande and BTS, while they also cherish the animated artistry of Hayao Miyazaki and the folk melodies
    of Simon & Garfunkel.
  travel: Liz Gonzalez approaches travel with a meticulous itinerary, using their journal to map out each day, and has already explored the regional science museum and the state fair, but they eagerly anticipate
    a family adventure to the Galápagos Islands and a future road trip along the Pacific Coast, balancing a love for hands‑on learning with a yearning for awe‑inspiring natural wonders.
  culinary: Liz Gonzalez enjoys a hands‑on approach to cooking, confidently rolling homemade empanadas stuffed with seasoned beef and cheese, zesting fresh lime into a bright ceviche, and experimenting
    with fragrant herbs like cilantro and oregano, while also savoring classic pepperoni pizza and sushi rolls, reflecting a palate that loves both bold tropical flavors and familiar comfort foods.
  core: Liz Gonzalez is a disciplined, curiosity‑driven 11‑year‑old who balances a love for robotics, fantasy worlds, and cultural dance with a penchant for over‑organizing their planner and staying up
    late to journal.
background:
  cultural: Liz comes from an Ecuadorian family that preserved strong ties to their heritage while adapting to life in Belleville, New Jersey. She grew up bilingual, speaking Spanish at home and English
    at school, which gives her a fluid cultural perspective. Family traditions such as celebrating Día de la Madre, Carnaval, and sharing meals of arroz con menestra and ceviche are central to her identity.
    Her parents emphasize the value of education, hard work, and community support, values that echo both Ecuadorian cultural norms and the aspirations of immigrant families in the U.S. Through community
    events, dance classes, and participation in local cultural festivals, she maintains a proud connection to her Ecuadorian roots while engaging with the diverse fabric of her New Jersey community.
attributes:
  skills: '[''Project planning'', ''Time management'', ''Bilingual communication (Spanish & English)'', ''Mathematical problem solving'', ''Reading comprehension'', ''Basic coding (Scratch)'', ''Scientific
    experimentation'', ''Team collaboration'', ''Leadership in class projects'']'
  hobbies: '[''Reading fantasy novels and science books'', ''School robotics club and Scratch coding'', ''Playing soccer'', ''Cooking traditional Ecuadorian dishes with family'', ''Dancing salsa and folk
    dances'', ''Sketching nature scenes'', ''Journaling and planner use'', ''Exploring local parks and nature'', ''Volunteering at the community library'']'
  career_goals: Liz aspires to pursue a future in STEM, specifically envisioning a career as a biomedical engineer or environmental scientist. She dreams of designing low‑cost medical devices that could
    benefit underserved communities, perhaps even those in Ecuador’s rural regions. In the short term, she aims to win her middle‑school science fair, secure a spot in a competitive summer STEM program,
    and earn top grades that will allow her to attend a specialized high‑school engineering academy. Long‑term, she hopes to study engineering at a top university, conduct research that merges technology
    with sustainable health solutions, and later mentor other young girls from immigrant backgrounds to pursue science.
