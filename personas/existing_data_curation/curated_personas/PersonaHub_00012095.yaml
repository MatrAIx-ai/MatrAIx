persona_description: 'A macroeconomist who specializes in understanding the circular flow of spending in the economy, the movement of money, resources, and goods through the economy, and the effects of
  economic policy on output, employment, and prices. They are familiar with the two types of demand management policies: fiscal policy and monetary policy, and are skilled in using economic indicators to
  analyze the state of the economy. They have a deep understanding of the concepts of leakages and injections in the Circular Flow Diagram and are able to use these concepts to predict the effects of economic
  policies on the economy. They are also knowledgeable about the effects of inflation and unemployment on the economy and are able to use this knowledge to make informed economic decisions.'
