  career_goals: Edgar aims to blend his artistic sensibility with his technical aptitude by pursuing a career in user experience (UX) design or interactive media development. He plans to attend a college
    with strong programs in visual arts and computer science, where he hopes to specialize in creating immersive digital experiences such as video games or AR/VR applications. In the short term, he intends
    to win state‑level robotics or coding competitions, secure a summer internship at a local tech startup, and build a portfolio of digital artwork and prototype apps. Long‑term, he envisions working for
    a cutting‑edge design firm or founding his own studio that crafts innovative, aesthetically driven technology solutions.
