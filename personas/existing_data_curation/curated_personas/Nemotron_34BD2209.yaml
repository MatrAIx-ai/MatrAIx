personas:
  professional: Edgar Schinelli is an aspiring robotics enthusiast who leads his high‑school robotics club, combining methodical programming skills with a competitive edge that drives him to perfect autonomous
    navigation challenges.
  sports: Edgar Schinelli is a dedicated fan of the Tennessee Volunteers football team and follows the Knoxville Youth Soccer League, hitting the local park for weekend pickup games while also hiking the
    Great Smoky Mountains for cardio, preferring a mix of team spirit and solitary trail runs.
  arts: Edgar Schinelli immerses themselves in creative expression through sketching murals inspired by local artist Michael D. Campbell, listening to folk‑indie musicians like Sufjan Stevens and The Avett
    Brothers on acoustic guitar, and streaming indie game soundtracks by Supergiant Games while attending exhibitions featuring works by Yayoi Kusama.
  travel: Edgar Schinelli loves planning weekend road trips to nearby destinations such as the Great Smoky Mountains and Nashville, while dreaming of a future backpacking adventure through Kyoto and the
    Japanese Alps, balancing their modest family budget with a carefully researched itinerary and a spontaneous urge to capture sunrise shots.
  culinary: Edgar Schinelli enjoys Southern comfort foods like smoked barbecue ribs and fried green tomatoes, but also experiments with cooking mac and cheese with sharp cheddar and smoked paprika, and
    they take pride in preparing a simple cilantro‑lime quinoa bowl after a hike, showcasing a growing kitchen confidence.
  core: Edgar Schinelli is a methodical, art‑loving teen who balances a competitive robotics drive with a love for Southern traditions, late‑night gaming, and spontaneous mountain hikes.
background:
  cultural: Edgar was raised in a middle‑class, white family in the suburban outskirts of Knoxville, Tennessee. His upbringing reflects a blend of traditional Southern culture—such as community gatherings,
    local high‑school football Saturdays, and family meals featuring regional dishes like barbeque and fried green tomatoes—and the contemporary influences of a digitally connected generation. His family
    likely attended a local Methodist or Baptist church, celebrating holidays and community service. Growing up near the Great Smoky Mountains fostered an appreciation for outdoor recreation, including
    hiking, camping, and wildlife observation. The region’s robust arts scene, with the Knoxville Museum of Art, local music festivals, and a thriving indie gaming community, has nurtured his curiosity
    for creative expression. While rooted in Southern hospitality and a value of self‑reliance, Edgar’s worldview is also shaped by internet culture, exposure to diverse artistic media, and a desire to
    explore ideas beyond his immediate environment.
