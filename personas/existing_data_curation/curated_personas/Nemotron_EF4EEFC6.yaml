personas:
  professional: Kenisha Santiago, a detail‑oriented 19‑year‑old aspiring medical assistant, leverages Excel mastery, bilingual fluency, and precise scheduling abilities, and they consistently streamline
    patient intake and office logistics while maintaining a calm, predictable work environment.
  sports: Kenisha Santiago enjoys low‑impact fitness, spending weekends on solitary hikes with the Fort Collins Hiking Club, quietly supporting the Colorado Rockies during summer baseball, and they supplement
    their routine with beginner yoga sessions at the community center rather than participating in competitive team sports.
  arts: Kenisha Santiago finds comfort in the melodic storytelling of regional Mexican groups like Los Tigres del Norte and the soulful voice of Natalia Lafourcade, while immersing themselves in contemporary
    novels by Sally Rooney and self‑help guides by Brené Brown, and they often translate that inspiration into hand‑knit scarves featuring colors reminiscent of traditional Mexican textiles.
  travel: Kenisha Santiago prefers meticulously planned, low‑key escapes such as solo backpacking trips to Rocky Mountain National Park or weekend bus rides to Santa Fe’s art markets, and they dream of
    an immersive culinary tour of Oaxaca, though limited budget keeps the trip on their long‑term wish list.
  culinary: Kenisha Santiago, a confident home cook, regularly prepares authentic Mexican meals like chicken mole poblano, hand‑made carnitas tacos with freshly baked corn tortillas, and homemade salsa
    verde using tomatillos and cilantro, while also experimenting with fusion dishes such as quinoa‑filled chiles rellenos and sourcing heirloom chilies at the local farmers market, and they delight in
    sharing these dishes with close friends.
  core: Kenisha Santiago is a meticulously organized 19‑year‑old who balances a love for solitary creativity—knitting, journaling, and cooking Mexican comfort food—with a persistent anxiety that drives
    relentless spreadsheet tracking, and they occasionally indulge in binge‑watching true‑crime documentaries when stress spikes.
background:
  cultural: Kenisha is a second-generation Mexican-American raised in a bilingual home where Spanish is spoken daily. Her family observes traditions such as Día de los Muertos, making tamales for holidays,
    and participating in local Latino festivals in Fort Collins. She values the strong family ties, respect for elders, and communal support central to Mexican culture, while also embracing the individualistic
    and outdoors-oriented lifestyle of Colorado. This blend of heritage and regional influences shapes her identity, worldview, and everyday practices.
