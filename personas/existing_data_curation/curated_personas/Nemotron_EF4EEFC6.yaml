    music"]'
  career_goals: Kenisha aims to complete her associate degree in Business Administration or Health Services within the next two years and obtain a certification as a medical assistant or office manager.
    She seeks a stable, structured role in a healthcare office or municipal department where predictable routines match her preference for order. In the medium term she hopes to become a community health
    coordinator, linking resources for the Mexican-American community in Fort Collins. Her long-term ambition is financial independence and the ability to support her family while maintaining a balanced,
    low-stress lifestyle.
