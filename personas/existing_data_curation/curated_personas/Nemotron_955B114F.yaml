  career_goals: David aims to open his own boutique bakery in Los Angeles within the next three years, featuring a fusion of traditional Latin American pastries and contemporary baking techniques. He plans
    to earn recognition through local bakery awards and media features, expand to a second location, and eventually publish a cookbook showcasing his innovative recipes. Additionally, he hopes to mentor
    young bakers from underrepresented communities and launch a community baking education program.
