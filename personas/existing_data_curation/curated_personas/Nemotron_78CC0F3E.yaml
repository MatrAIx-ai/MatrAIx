  career_goals: As he approaches retirement, Kenny aims to transition from day-to-day management into a strategic advisory role, establishing a boutique consultancy that helps mid-size companies integrate
    storytelling into their sales processes. He also plans to develop a sales-training curriculum that blends data-driven techniques with artistic narrative, and to publish a memoir-style guide on sales
    through the lens of the humanities. Additionally, Kenny is dedicated to mentoring the next generation of sales leaders within his organization, ensuring a smooth succession while remaining an occasional
    guest speaker at industry conferences and local community events.
