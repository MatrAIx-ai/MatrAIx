personas:
  professional: Jacob Ho, a 35-year-old aspiring program coordinator, blends hands-on carpentry and small-engine repair expertise with meticulous budgeting and event-planning skills, channeling their organized,
    methodical nature and sociable energy into designing community workshops that preserve traditional crafts while mentoring youth.
  sports: Jacob Ho, an avid weekend hiker and pickup basketball player, belongs to the Meridian Trail Hikers club and the local fishing league, cheerfully roots for the Boise State Broncos football and
    the Seattle Seahawks while also following the Portland Trail Blazers, and balances a casual fitness regime of trail runs and basketball games with occasional neglect of structured gym workouts.
  arts: Jacob Ho immerses themselves in creative expression through tribal drumming circles that echo the rhythms of Carlos Nakai, attends storytelling evenings inspired by the narrative style of Maya Angelou,
    and finds solace in the acoustic folk sounds of Gillian Watson, all of which enrich their woodworking designs and community workshops.
  travel: Jacob Ho prefers spontaneous weekend getaways to nearby natural wonders like Yellowstone and the Columbia River Gorge, while budgeting carefully for longer adventures such as a planned summer
    trek through Banff National Park and a cultural immersion trip to Oaxaca, balancing their love of outdoor exploration with the financial realities of supporting a growing family.
  culinary: Jacob Ho enjoys cooking over an open fire, expertly preparing cedar-plank salmon and campfire chili with locally sourced trout, sage, rosemary, and wild mushrooms, while their woodworking precision
    translates into a modest but confident skill set for crafting custom cutting boards and occasionally experimenting with traditional corn-bread recipes featuring blue cornmeal.
  core: Jacob Ho merges a meticulous, worry-prone mind with a sociable, hands-on spirit, turning every community drumming circle, DIY project, and nature hike into a lesson in sustainable living, even if
    their nightly journal sometimes doubles as a worry log.
background:
  cultural: Jacob identifies as an American Indian of the Shoshone‑Bannock heritage, a community with deep roots in Idaho’s high desert and river valleys. Growing up in Meridian, he spent summers on the
    reservation, learning traditional woodworking, oral storytelling, and the value of communal responsibility. His cultural background instills a respect for land, an emphasis on collective well‑being,
    and a commitment to preserving his tribe’s language and customs. These influences shape his worldview, encouraging both curiosity about new ideas and a practical reverence for time‑tested practices.
    He remains active in local tribal events, volunteers at cultural festivals, and mentors younger members in traditional crafts.
