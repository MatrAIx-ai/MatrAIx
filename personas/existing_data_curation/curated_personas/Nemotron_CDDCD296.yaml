  hobbies: '[''Hiking'', ''Fishing'', ''Pickup basketball'', ''Tribal drumming and singing'', ''Storytelling gatherings'', ''Woodworking projects'', ''DIY home repairs'', ''Reading historical nonfiction'',
    ''Mindfulness breathing exercises'']'
  career_goals: Jacob aims to secure a stable, full‑time position that leverages his practical skills and community experience. He aspires to become a program coordinator for a tribal cultural center, where
    he can design workshops, manage resources, and mentor youth in traditional crafts. Alternatively, he is exploring launching a small business that sells handcrafted wooden items and eco‑friendly outdoor
    gear, with the goal of achieving financial independence and supporting his family. To reach these goals, he plans to enroll in a vocational welding certification and take leadership courses offered
    by local community colleges.
