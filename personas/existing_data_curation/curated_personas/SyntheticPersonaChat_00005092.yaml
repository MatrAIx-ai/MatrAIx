    User 1: Oh, I love Grand Theft Auto and Call of Duty too! I haven''t played Minecraft in a while, but I used to love it.

    User 2: We should play some games together sometime!

    User 1: That would be fun! I''m free most weekends.

    User 2: Great! I''ll send you my gamertag.

    User 1: Awesome! I can''t wait to play with you.

    User 2: Me neither!

    User 1: So, what do you do for work?

    User 2: I work at Scrubway, but I''m going back to college in a few weeks to study business.

    User 1: Oh, nice! What made you decide to go back to school?

    User 2: I wanted to get a better job and make more money.

    User 1: That''s great! I''m sure you''ll do well.

    User 2: Thanks! I''m excited about it.

    User 1: Me too! I''m sure you''ll be great.'
