personas:
  professional: Carlton Petros, a restaurant floor supervisor with a business degree, leverages their routine‑driven leadership, and they enforce food‑safety protocols, control costs, and coach a diverse
    kitchen crew while balancing assertiveness with compassionate mentorship.
  sports: Carlton Petros hits the early‑morning beach run with the Malibu Beach Runners, cheers on the Los Angeles Dodgers at Dodger Stadium, and follows the Los Angeles Lakers in the off‑season, and they
    treat each jog as both cardio and a quiet mental reset.
  arts: Carlton Petros unwinds on weekends watching classic films by Alfred Hitchcock and Cary Grant while sipping Earl Grey tea, curates a vinyl collection featuring Ella Fitzgerald and Miles Davis, and
    they display a rotating shelf of 1950s kitchen gadget replicas that double as decorative art.
  travel: Carlton Petros plans weekend escapes with spreadsheet precision, favoring coastal retreats in Santa Barbara and wine‑country tours in Napa Valley, while they dream of a culinary pilgrimage to
    Tuscany that balances their desire for relaxation with a clear budget timeline.
  culinary: Carlton Petros is a competent home chef who batches herb‑infused dishes like rosemary‑roasted chicken and thyme‑seasoned ratatouille on a set schedule, confidently uses a vintage French press
    for coffee, and they treat each dinner as a controlled experiment in flavor consistency.
  core: Carlton Petros runs life like a meticulously timed kitchen shift—organized, slightly anxious, and always reserving a moment for herb‑watering rituals and classic movie marathons, and they never
    skip their morning jog.
background:
  cultural: Carlton grew up in a middle‑class, Anglo‑American family in Los Angeles, where traditional American values of hard work, practicality, and community celebration shaped his outlook. While his
    heritage traces back to English and Irish roots, the multicultural environment of Southern California exposed him to diverse culinary traditions, which he respects but balances with his own family’s
    longstanding customs around holidays like Thanksgiving and the Fourth of July.
attributes:
  skills: '[''Food Safety & Compliance'', ''Team Supervision & Training'', ''Inventory & Cost Control'', ''Scheduling & Workforce Management'', ''Customer Service'', ''Basic Culinary Techniques'', ''Point‑of‑Sale
    Systems'', ''Budgeting & Financial Reporting'', ''Vendor Relations'', ''Process Optimization'']'
  hobbies: '[''Home Cooking'', ''Herb Gardening'', ''Classic Film Viewing'', ''Los Angeles Dodgers Games'', ''Jogging'', ''DIY Home Improvement'', ''Meditation'', ''Reading Business Management Books'',
    ''Collecting Vintage Kitchen Gadgets'', ''Community Barbecue Events'']'
  career_goals: Carlton aims to advance from his current supervisory role to a regional operations manager for a family‑oriented restaurant chain, where he can apply his systematic mindset to streamline
    multiple locations. He seeks certification in ServSafe and HACCP to reinforce his expertise, and hopes to mentor staff in ways that reduce turnover and workplace stress. Long‑term, he envisions opening
    his own modest, reliably run eatery that offers consistent, high‑quality meals and provides a stable, supportive environment for his employees.
