  career_goals: Although retired, Walter aims to apply his analytical mind and competitive spirit to preserving Nantucket’s maritime heritage. He hopes to compile a multi‑volume oral‑history of local fishermen,
    mentor his grandchildren in practical skills, and complete a personal project of restoring a historic lighthouse lantern. He also aspires to publish a memoir that blends personal anecdotes with the
    island’s history, using his curiosity for new ideas while valuing pragmatic documentation.
