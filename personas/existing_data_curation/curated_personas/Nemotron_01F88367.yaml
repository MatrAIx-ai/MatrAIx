personas:
  professional: Shandell Bullard, a data analyst turned digital humanities specialist, leverages Python, R, and Tableau to craft data-driven exhibitions that translate complex cultural datasets into immersive
    visual narratives, while their methodical planning and competitive drive push projects toward measurable impact on underrepresented artists.
  sports: Shandell Bullard enjoys solo morning yoga sessions, joins a small Brooklyn cycling club for weekend rides, follows the Brooklyn Nets and New York Knicks for basketball inspiration, and participates
    in local 5K runs organized by community STEM workshops.
  arts: Shandell Bullard immerses in the Brooklyn art scene by curating visits to galleries featuring street artists like JR and Shepard Fairey, attends jazz evenings spotlighting Kamasi Washington, and
    draws inspiration from speculative fiction authors such as Naomi Novak and philosophers like Slavoj Žižek for creative coding projects.
  travel: Shandell Bullard prefers curated cultural trips that balance thoughtful itineraries with spontaneous art discoveries, having explored the mural‑rich neighborhoods of Mexico City, the museum corridors
    of Washington, D.C., and planning a future pilgrimage to the tech‑art festival in Berlin while budgeting each journey through a dedicated travel spreadsheet.
  culinary: Shandell Bullard enjoys experimenting with plant‑based cuisine, frequently preparing miso‑glazed eggplant bowls, mastering the art of perfect sushi rice, and indulging in specialty coffee, yet
    often forgets to eat regular meals during intense coding marathons.
  core: Shandell Bullard merges analytical precision with artistic curiosity, thriving in solitary creative labs while navigating intense emotional tides, competitive instincts, and a healthy dose of skepticism
    toward assumptions.
background:
  cultural: Raised in Brooklyn by a family that values education, resilience, and community activism, Shandell’s Black cultural heritage shapes her worldview. She draws inspiration from the legacy of the
    Harlem Renaissance, contemporary Black artists, and the vibrant Brooklyn street culture. Her upbringing emphasized collective uplift, which informs her desire to use data and technology to amplify Black
    voices in the arts. She remains connected to local cultural events, mentors youth in STEM programs, and incorporates narratives of Black history and identity into her creative and professional pursuits.
attributes:
  skills: '[''Python programming'', ''Statistical analysis'', ''Machine learning'', ''Data visualization (Tableau, D3.js)'', ''Research design'', ''Scientific writing'', ''Project management'', ''Critical
    thinking'', ''Digital illustration'', ''Art curation'']'
  hobbies: '[''Visiting independent art galleries'', ''Street photography'', ''Creative coding (generative art)'', ''Reading speculative fiction and philosophy'', ''Journaling'', ''Yoga and mindfulness
    meditation'', ''Attending small jazz or poetry sessions'', ''Volunteering at community STEM workshops'']'
  career_goals: Shandell aims to re-enter the professional sphere in a role that merges her STEM expertise with her passion for art and culture. She is targeting positions such as a data-driven curator,
    digital humanities analyst, or research consultant for museums and cultural institutions in New York. Long‑term, she envisions founding a nonprofit that leverages data science to highlight underrepresented
    Black artists and to create evidence‑based programs that support youth participation in STEAM fields. She also hopes to publish interdisciplinary research that bridges technology, aesthetics, and social
    equity.
