  career_goals: Shayan is fascinated by how things work and wants to apply his curiosity in a practical way. He dreams of becoming an engineer—perhaps designing bridges or roads that suit the Appalachian
    terrain—or a wildlife biologist who protects the forests of West Virginia. In the near term he aims to win his school’s science fair, earn a trophy in a LEGO building competition, and achieve a Boy
    Scouts merit badge in environmental stewardship.
