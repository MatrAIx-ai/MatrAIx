personas:
  professional: Shayan Tavenner, a budding junior naturalist, treats every weekend hike into the Arbovale woods as a field study, meticulously cataloging rocks, leaves, and animal tracks in a notebook,
    blending a love of curiosity with the practical habit of organized record‑keeping.
  sports: Shayan Tavenner, a lively member of the Arbovale Youth Soccer Club who drills on the field after school, idolizes the local professional team the Riverdale Rovers, and spends Saturday afternoons
    cycling the rural trail network, always timing laps against personal bests.
  arts: Shayan Tavenner, an avid LEGO architect and Minecraft designer, draws inspiration from the whimsical art of Studio Ghibli’s Totoro and the adventurous storytelling of J.K. Rowling, while humming
    along to the upbeat tunes of the Kidz Bop version of “Happy” when building puzzles.
  travel: Shayan Tavenner, an explorer at heart, has already trekked the pine‑scented trails of Redwood State Park and the rocky cliffs of Grand Canyon’s South Rim with family, and dreams of journeying
    to the snowy peaks of the Swiss Alps, preferring hands‑on map planning over spontaneous trips.
  culinary: Shayan Tavenner, a self‑declared “junior chef,” loves assembling crunchy veggie wraps with carrots, cucumber, and hummus, perfecting a homemade peanut butter‑banana sandwich, and occasionally
    sneaks chocolate chips into their favorite oatmeal after a day of outdoor adventures.
  core: Shayan Tavenner, the organized 7‑year‑old explorer, balances boundless curiosity with a competitive edge, keeping detailed notebooks of nature finds while racing friends on bike trails and saving
    pocket money for the next LEGO masterpiece.
background:
  cultural: Shayan grew up in Arbovale, a small Appalachian community in Pocahontas County, West Virginia. The local culture values self‑reliance, close family ties, and a deep respect for the surrounding
    mountains and forests. Traditions include church gatherings, seasonal festivals like the fall harvest celebration, and a strong oral storytelling heritage. His family participates in community events,
    encourages outdoor activities such as hiking, fishing, and camping, and blends typical American customs with regional Appalachian customs, fostering a practical, community‑oriented mindset.
