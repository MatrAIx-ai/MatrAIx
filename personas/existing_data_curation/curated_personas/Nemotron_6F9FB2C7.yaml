  hobbies: '[''Traditional Mexican folk dancing'', ''Youth league soccer'', ''Drawing and painting'', ''Reading adventure and mystery books'', ''Cooking Mexican family recipes with grandmother'', ''Block-based
    coding for interactive stories'']'
  career_goals: Regla dreams of becoming a teacher or a youth mentor who can create structured, supportive environments for younger students. She is passionate about fostering cultural pride and hopes to
    lead school clubs that celebrate Mexican heritage while promoting academic excellence. In the future, she also envisions working in community health education, using her organizational skills to plan
    health workshops for families in Kent. Her ambition is to combine her love for teaching, cultural advocacy, and her knack for keeping projects orderly and on schedule.
