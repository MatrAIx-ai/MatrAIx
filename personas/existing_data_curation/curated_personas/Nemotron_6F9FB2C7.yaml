personas:
  professional: Regla Vasquez, an aspiring young coder and dancer, applies their organized, methodical mindset to design block‑based interactive stories and to coordinate the school dance troupe’s rehearsals,
    thriving on the predictable structure of choreography while energizing peers with a lively presence.
  sports: Regla Vasquez, a dedicated midfielder for the Kent Youth Soccer Club, embraces a regimented training schedule that mirrors the disciplined routines of the Seattle Sounders FC, and they eagerly
    watch the Seattle Seahawks on Sundays while cheering for the Seattle Storm’s basketball prowess.
  arts: Regla Vasquez channels their vibrant imagination into daily sketchbook drawings inspired by Diego Rivera’s murals and Frida Kahlo’s bold colors, while their love for traditional folk dance is set
    to the melodies of mariachi and the modern pop beats of J Balvin, and they often reenact scenes from Disney’s Coco and Pixar’s Luca with friends.
  travel: Regla Vasquez loves family road trips that blend a structured itinerary with spontaneous stop‑overs, having already explored the coastal charms of San Diego and the bustling streets of Mexico
    City, while they dream of future adventures to the historic plazas of Seville and the beaches of Cancún, always planning each outing with a colorful map.
  culinary: Regla Vasquez enjoys cooking alongside their grandmother, mastering the detailed process of shaping tamales with masa dough and stuffing them with pork and chilies, perfecting enchiladas with
    homemade salsa verde, and they often experiment with fresh cilantro, queso fresco, and roasted corn to add authentic flavor to their meals.
  core: Regla Vasquez blends a love for orderly routines with an infectious sociability, never missing a dance rehearsal or a soccer practice, yet occasionally misplaces their sketchbook in the rush of
    multitasking.
background:
  cultural: Regla grows up in a Mexican-American household in Kent, Washington, where Spanish is spoken at home and cultural traditions are celebrated year-round. Her family observes Día de los Muertos,
    Mexican Independence Day, and weekly family gatherings featuring music, dance, and homemade cuisine. She participates in a local Mexican community center, attending language classes and cultural festivals
    that reinforce her heritage. The blend of Mexican customs with the multicultural environment of the Pacific Northwest shapes her identity, fostering a strong sense of pride in her roots while encouraging
    inclusive community involvement.
