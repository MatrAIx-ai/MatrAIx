persona_description: A lime producer and purifier who specializes in the use of lime products for flue gas desulphurization, drinking water purification, process water treatment, and remediation of contaminated
  sites. They are responsible for adjusting the pH value and removing naturally occurring heavy metals from drinking water. They also have expertise in the use of milk of lime for the purification of industrial
  water and sewage treatment. They have experience in creating an adequate acid capacity for biological sewage treatment processes and stabilizing and efficiently controlling biological sewage treatment
  processes. They have a unique knowledge of the use of lime products for remediation of contaminated sites and the treatment of effluent and sludge.
