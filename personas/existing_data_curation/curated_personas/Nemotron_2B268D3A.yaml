  career_goals: Miguel likes to think about what he wants to be when he grows up. He dreams of becoming a scientist or engineer who can design things that help people, inspired by his love of building and
    his desire to make his family and community proud. He also expresses an interest in helping animals, imagining a future as a veterinarian. In the short term, his goal is to become a confident reader,
    master basic math, and continue being a helpful member of his family and school.
