personas:
  professional: Miguel Rodriguez, a budding LEGO architect, applies methodical planning and a compassionate mindset to every construction project, turning colorful animal and landscape designs into miniature
    fortresses that delight classmates and teachers alike, and they take pride in sharing their creations during show‑and‑tell.
  sports: Miguel Rodriguez, a spirited member of the Lafayette Lions Soccer Club, dashes after the ball during weekend practices, cheers for the Golden State Warriors on game nights, and enjoys the autumn
    tradition of watching the San Francisco Giants at home, all while preferring short, fun bursts of activity over long endurance drills, and they always celebrate a goal with a high‑five to teammates.
  arts: Miguel Rodriguez, a budding illustrator, spends afternoons sketching vibrant animals inspired by Frida Kahlo’s folk motifs, sings along to the lively tunes of Los Tigres del Norte while drawing,
    and eagerly watches Pixar’s animated films, especially ‘Coco’ for its celebration of family stories, and they love to hum the melodies while they draw.
  travel: Miguel Rodriguez, an inquisitive traveler, loves family road trips to the Monterey Bay Aquarium and annual visits to a cultural festival in Oaxaca where they marvel at elaborate altar displays,
    and dreams of exploring the Grand Canyon’s red cliffs with a backpack full of collected stones and shells.
  culinary: Miguel Rodriguez, a junior kitchen assistant, delights in preparing guacamole with fresh avocados, lime, and cilantro, carefully rolling quesadillas on the stovetop, and tasting warm tamales
    during festive gatherings, while they proudly share their favorite snack of mango slices with chili powder.
  core: Miguel Rodriguez is a curious, organized six‑year‑old who builds LEGO fortresses, saves every coin, and balances quiet study with vibrant family traditions, all while they keep a pocketful of smooth
    stones for good luck.
background:
  cultural: Miguel’s family maintains strong Mexican roots while living in Lafayette, California. He grows up speaking both Spanish and English, celebrating Día de los Muertos with altars at home, and enjoying
    festive foods such as tamales and pozole during holidays. Family gatherings are centered around music, dance, and storytelling, which foster his appreciation for community and compassion. The blend
    of Mexican cultural values—respect for elders, importance of family cohesion, and a spirit of generosity—shapes his cooperative nature. At school, Miguel participates in Spanish language classes, and
    his parents encourage him to share his heritage with peers, reinforcing a bicultural identity that balances his Mexican traditions with the diverse environment of the Bay Area.
