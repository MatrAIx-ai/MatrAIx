persona_description: A development professional with expertise in governance and development projects, particularly in the context of Nepal. This individual has a deep understanding of the country's political
  transition process and the challenges it faces in terms of democratic governance, service delivery, and community development. They are skilled in advocating, advising, fostering dialogue, achieving consensus,
  and building institutions to deliver effective and equitable public services. They have experience working on national and international programmes to promote democratic governance, poverty reduction,
  and community development in Nepal. They are interested in bridging the gap between humanitarian, peacebuilding, and longer-term development efforts and are committed to helping countries in peaceful
  settlement of disputes and progress towards democratic governance.
