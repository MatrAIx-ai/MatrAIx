  career_goals: Jalynn aspires to become a regional operations director for a sustainable restaurant group, where she can scale her data-centric approach across multiple locations. She also dreams of opening
    a community-focused café that blends technology with locally sourced menu items and provides a supportive workplace for mental-health awareness. In the next five years, she plans to earn a master's
    in hospitality management, champion a company-wide staff wellness program, and lead initiatives that reduce food waste by 30%.
