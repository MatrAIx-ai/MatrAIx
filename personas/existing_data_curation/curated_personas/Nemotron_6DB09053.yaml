personas:
  professional: A budding junior designer in the making, Michelle Jolley blends a love for whimsical drawing with strategic thinking from chess, dreaming of creating interactive storybooks and video games
    that let players explore imaginative worlds.
  sports: A determined young athlete, Michelle Jolley practices with the Sunnyvale Youth Soccer Club as a forward, and passionately supports the San Francisco Giants and the Golden State Warriors during
    baseball and basketball seasons.
  arts: A creative explorer, Michelle Jolley spends afternoons watercoloring whimsical forest creatures inspired by Studio Ghibli's Totoro and reading the fantastical worlds of J.K. Rowling and Neil Gaiman,
    often sketching characters that later appear in their Minecraft builds.
  travel: A curious adventure‑seeker, Michelle Jolley loves family road trips to a national park’s junior ranger programs, especially exploring Zion National Park’s easy trails, and dreams of visiting Tokyo
    to see the anime district and sample authentic ramen.
  culinary: A budding kitchen collaborator, Michelle Jolley delights in baking chocolate chip cookies, meticulously decorating them with colorful sprinkles and tiny fondant characters, and enjoys experimenting
    with adding matcha powder to cupcakes for a pastel twist.
  core: A curious, competitive ten‑year‑old artist and gamer, Michelle Jolley balances whimsical creation with strategic play, a saved‑up allowance, and a slight allergy‑driven routine, always seeking new
    worlds to explore.
background:
  cultural: Michelle grew up in Commerce Township, a suburban community in Oakland County, Michigan, where Midwestern values of friendliness, modesty, and community involvement are prominent. Her family,
    whose roots trace back to Irish and German ancestry, celebrates typical American holidays such as Thanksgiving, Halloween, and the Fourth of July with family gatherings and local community events. Proximity
    to Detroit’s vibrant art scene provides her with occasional museum visits and art workshops, shaping her appreciation for diverse artistic expressions. The local public school system emphasizes collaborative
    projects and extracurricular activities, offering Michelle exposure to a mix of cultural traditions within her diverse school environment.
