  career_goals: Michelle dreams of turning her love for art and storytelling into a career as an illustrator or animator, ideally creating visual narratives that highlight scientific ideas and environmental
    issues. She aspires to attend a specialized art high school where she can deepen her drawing skills and learn digital media. In the long term, she imagines working in a museum or a creative department
    of a scientific organization, using her artistic talent to communicate complex concepts to the public. Her competitive drive also fuels a goal to win school-level art competitions and, eventually, national
    contests such as the Scholastic Art & Writing Awards. Michelle’s organized approach to her schoolwork reinforces her ambition to excel academically, aiming for scholarships that would support her artistic
    education.
