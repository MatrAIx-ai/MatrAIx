  career_goals: Hubert aims to advance to a district manager or regional operations director role within the next five years, overseeing multiple stores across Arizona. He also aspires to open a boutique
    that showcases Native American crafts and contemporary art, providing a platform for local artisans. Additionally, he wishes to mentor younger employees by developing a corporate mentorship program
    focused on cultural competency and to complete a bachelor’s degree in Business Administration. Balancing these professional ambitions with personal well‑being, he plans to learn stress‑management techniques
    and incorporate mindfulness practices into his daily routine.
