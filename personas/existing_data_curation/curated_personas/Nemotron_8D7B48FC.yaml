  hobbies: '[''Hiking local trails'', ''Cycling around the East Bay'', ''Reading science‑fiction and self‑help books'', ''Playing strategic video games'', ''Mindfulness meditation'', ''Journaling'', ''Cooking
    simple Italian dishes'', ''Volunteering at a community garden'']'
  career_goals: Bradley aspires to move beyond handling individual calls toward a supervisory position within the customer support department. He aims to become a team lead in the next two to three years,
    using his balanced curiosity to implement process improvements and his practical mindset to maintain high service standards. Long‑term, he envisions transitioning into a training or operations role
    where he can design onboarding programs, mentor new agents, and contribute to the development of customer experience strategies. He also plans to enroll in part‑time courses on business communication
    and project management to support these ambitions while prioritizing his mental‑health resilience.
