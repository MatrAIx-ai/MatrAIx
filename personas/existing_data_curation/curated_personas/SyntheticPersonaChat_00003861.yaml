    User 2: I''m not sure I have a favorite book, but I really like the Harry Potter series.

    User 1: Me too! I''m a big fan of Harry Potter.

    User 2: What''s your favorite book in the series?

    User 1: I think my favorite book is The Prisoner of Azkaban.

    User 2: That''s a great book. I like the way it''s set in the summer.

    User 1: Me too! I also like the way the Dementors are introduced.

    User 2: Yeah, they''re really creepy.

    User 1: So, what are you doing this weekend?

    User 2: I''m not sure yet. What are you doing?

    User 1: I''m going to the beach with my friends.

    User 2: That sounds fun! I love the beach.

    User 1: Me too! I''m going to miss California when I move away.

    User 2: Where are you moving to?

    User 1: I''m moving to New York.

    User 2: Oh, that''s exciting! I''ve never been to New York.

    User 1: It''s a great city! I''m excited to explore it.'
