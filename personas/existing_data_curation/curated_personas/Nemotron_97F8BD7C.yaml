personas:
  professional: Glen Crawford, an aspiring junior engineer who transforms household gadgets into DIY experiments and builds intricate LEGO robots, channels a sci-fi fueled imagination and a practical problem-solving
    mindset while often jumping between projects without a set schedule.
  sports: Glen Crawford enjoys weekend bike rides along the Genesee River Trail with family, plays pick-up soccer at the community center under the watchful eye of the local youth league, and cheers for
    the Buffalo Bills during football season, preferring low-key activity over organized training sessions.
  arts: Glen Crawford spends free afternoons sketching comic strips inspired by the kinetic style of Kazu Kibuishi and the wit of Bill Watterson, while listening to the cinematic scores of Hans Zimmer and
    the indie pop of Imagine Dragons, and they regularly binge-watch classic sci-fi series like Star Trek to fuel their storytelling.
  travel: Glen Crawford loves exploring local nature, having hiked the Genesee River Trail with family, and dreams of visiting the Smithsonian National Air and Space Museum in Washington, D.C., and the
    Kennedy Space Center in Florida, while their most cherished trip so far was a weekend getaway to Niagara Falls where they photographed the mist and collected geodes.
  culinary: Glen Crawford favors the comforting taste of cheese-laden pepperoni pizza and homemade mac and cheese, enjoys tinkering with snack creations like galaxy-glazed cupcakes topped with edible glitter,
    and occasionally helps their parent whisk together a simple veggie stir-fry using soy sauce, garlic, and broccoli, though they often forget to eat breakfast before school.
  core: Glen Crawford, an inquisitive 11-year-old with a sci-fi imagination and a habit of turning everyday objects into tinkering projects, battles persistent worry with mindful breaths while juggling
    impulsive spending and a love for LEGO-built worlds.
background:
  cultural: Glen was raised in Rochester, NY, in a middle‑class white family that values practicality, education, and independence. His household blends traditional American customs—such as celebrating
    Thanksgiving and Fourth of July—with local Rochester traditions like the Lilac Festival and community snow‑day activities. He attends a public elementary school that emphasizes both academic achievement
    and hands‑on projects, reflecting the city’s legacy of innovation from the early tech and imaging industries. Glen’s upbringing includes exposure to diverse seasonal weather, prompting a love for indoor
    creative pursuits during winter and outdoor exploration during the brief summers.
attributes:
  skills: '[''Hands‑on tinkering (LEGO, model building)'', ''Basic coding in Scratch'', ''Strong factual memory (science, history)'', ''Creative drawing and illustration'', ''Explaining concepts clearly'',
    ''Small‑group collaboration and occasional assertive leadership'']'
  hobbies: '[''Reading science‑fiction and invention biographies'', ''LEGO construction and gadget tinkering'', ''Scratch coding and game design'', ''Sketching comic strips'', ''Hiking the Genesee River
    Trail'', ''Playing chess in a small community club'', ''Mindfulness breathing exercises'']'
  career_goals: Glen dreams of turning his curiosity into a career that makes tangible differences. He envisions becoming a mechanical or robotics engineer who designs practical inventions for everyday
    problems, such as eco‑friendly gadgets or assistive devices for people with disabilities. He also entertains the idea of working as a wildlife biologist, combining his love for nature with his compassionate
    side. In the near future, he aims to join a school robotics club, earn a certification in basic programming, and later attend a high‑school STEM academy that balances creative projects with real‑world
    applications.
