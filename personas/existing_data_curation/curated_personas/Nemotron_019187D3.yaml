  hobbies: '[''Abstract Watercolor Painting'', ''Poetry Writing'', ''Culinary Exploration (Salvadoran Cuisine)'', ''Philosophical Reading'', ''Puzzle Solving'', ''Mindful Journaling'', ''Small Book Club
    Participation'', ''Art Workshop Attendance'']'
  career_goals: Ysel aims to become a lead qualitative research strategist within the next five years, guiding a team of interviewers and shaping research methodologies that integrate artistic and abstract
    thinking. She plans to pursue a bachelor's degree in Communications or Anthropology to deepen her theoretical foundation, and eventually earn a certification in Human-Centered Design. She aspires to
    publish thought‑leadership pieces on innovative interviewing techniques and to launch her own consultancy that offers culturally‑attuned research services for brands targeting diverse Hispanic markets.
    Her competitive drive pushes her to be recognized as a top performer in her firm and to win industry awards for excellence in research.
