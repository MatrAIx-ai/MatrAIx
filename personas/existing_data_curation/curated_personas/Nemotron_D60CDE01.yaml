    Building Practices", "Regulatory Knowledge (Illinois Building Codes)", "Public Speaking & Presentation", "Community Liaison"]'
  hobbies: '["Gospel Choir & Church Activities", "Community Block Party Organization", "Youth Mentorship in Trades", "Soul-Food Cooking & Barbecuing", "Basketball (Watching & Playing)", "Golf", "Woodworking",
    "Traveling to Family Gatherings", "Reading Business Biographies", "Staying Updated with Construction Industry Publications"]'
  career_goals: At 55, Willie is focused on transitioning from daily site management to a strategic consulting and mentorship role. He plans to earn the Certified Construction Manager (CCM) credential and
    a Project Management Professional (PMP) certification to formalize his expertise. His ambition is to launch his own consultancy that advises developers on sustainable construction, efficient project
    delivery, and workforce development for underrepresented groups. He also aims to mentor the next generation of Black construction professionals, serve on local industry boards, and contribute to community‑driven
    redevelopment projects in Lemont and the greater Chicago area, positioning himself as a thought leader through speaking engagements at industry conferences.
