personas:
  professional: Willie Prophet is a veteran construction manager who leverages three decades of hands‑on project oversight, advanced scheduling with the Critical Path Method, and a business‑focused mindset
    to transition into a consulting practice that guides developers on sustainable building, workforce inclusion, and strategic cost control, and they apply their structured, pragmatic style to every client
    engagement.
  sports: Willie Prophet follows the Chicago Bulls closely, participates in the Community Center 5‑on‑5 pickup league every Saturday, and maintains a steady weekly routine at the Oak Brook Golf Club where
    they enjoy a blend of competitive swing practice and social networking.
  arts: Willie Prophet is a lead tenor in the local church choir, relishing gospel classics by Kirk Franklin and traditional hymns, and after rehearsals they often unwind listening to legends like Aretha
    Franklin and contemporary soul artists such as John Legend, while occasionally attending productions at the Chicago Theatre.
  travel: Willie Prophet favors road‑trip visits to family in Chicago, St. Louis, and Indianapolis, appreciating the familiar Midwestern landscape and reunion meals, yet they also dream of a cultural getaway
    to New Orleans to explore its music scene, usually planning trips around work lull periods and balancing budget constraints with a desire for meaningful connection.
  culinary: Willie Prophet loves crafting weekend barbecues featuring smoked pork ribs seasoned with a homemade rub, crispy fried catfish, collard greens simmered with smoked ham hocks, and buttery cornbread,
    and they take pride in their ability to blend traditional soul‑food flavors with a touch of contemporary grilling technique.
  core: Willie Prophet blends a pragmatic, structure‑driven mindset with an infectious sociability, turning community mentorship, gospel singing, and hands‑on construction expertise into a lifelong mission
    of practical impact and personal connection.
background:
  cultural: Willie grew up on Chicago’s South Side, immersed in a vibrant African‑American community that valued family, faith, and resilience. The cultural traditions of church, soul music, and communal
    gatherings have shaped his worldview, fostering a strong sense of responsibility toward his community. As a Black professional in a historically white‑dominated construction sector, he has navigated
    both opportunities and challenges, sharpening his commitment to mentorship and diversity advocacy. He takes pride in his heritage, celebrating Juneteenth, contributing to local cultural festivals, and
    maintaining close ties with extended family across Cook County.
attributes:
  skills: '["Construction Project Management", "Budgeting & Cost Control", "Scheduling (Critical Path Method)", "Safety Compliance & OSHA Regulations", "Contract Negotiation", "Stakeholder Communication",
