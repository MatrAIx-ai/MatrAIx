  hobbies: '[''Woodworking'', ''Classic car restoration'', ''Fishing'', ''Gardening'', ''College football fandom'', ''Church outreach volunteering'', ''Technical magazine reading'', ''Puzzle solving'']'
  career_goals: Randall aims to advance to a supervisory role within the fabrication shop, such as lead fabricator or shift supervisor, where he can leverage his reliability and planning skills to guide
    a small team and improve workflow efficiency. He plans to earn advanced welding certifications (AWS Certified Welder) and a CNC programming credential, and eventually explore opening a modest custom
    metalwork workshop that blends his practical expertise with his curiosity for innovative fabrication techniques. Maintaining a stable income and reducing workplace stress to support his family remain
    central to his ambitions.
