  hobbies: '[''Gardening (native coastal plants)'', ''Birdwatching'', ''Puzzle Solving (Crosswords, Sudoku, Logic Games)'', ''Reading Historical Non-fiction'', ''Cooking (Mediterranean cuisine)'', ''Volunteer
    STEM Outreach'', ''Coastal Hiking'', ''Photography (nature)'', ''Playing Piano (casual)'']'
  career_goals: Marinela aims to secure a full professorship with tenure, establishing herself as a leading voice in applied mathematics education. She plans to launch an interdisciplinary research hub
    that integrates data science with environmental modeling, seeking external funding to support graduate student scholarships. Over the next five years, she hopes to author a widely adopted textbook on
    computational methods and expand community outreach programs that introduce STEM concepts to underrepresented youth in the Virginia Beach area. As she approaches retirement, she envisions transitioning
    to an emeritus advisory role while continuing to mentor junior faculty and shape curriculum innovation.
