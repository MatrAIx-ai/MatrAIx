  career_goals: Albertine's career ambition centers on securing a stable, organized role that allows her to serve others and apply her methodical strengths. In the short term she plans to finish high school
    with a solid GPA and obtain a GED if needed, then enroll in a community-college associate program in business administration or health information management. She is attracted to professions such as
    medical records specialist, administrative assistant, or library technician, where clear procedures and attention to detail are paramount. Long-term, Albertine hopes to earn professional certification
    (e.g., Certified Coding Specialist) and eventually occupy a supervisory position that lets her mentor younger colleagues while contributing to the efficiency of a healthcare or educational institution.
