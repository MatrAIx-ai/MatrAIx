  hobbies: '[''Soccer'', ''Ballet folklórico'', ''Digital illustration'', ''Listening to regional Mexican music'', ''Community volunteer work'', ''Reading sci‑fi novels'', ''Multiplayer online gaming'']'
  career_goals: Alexis aspires to become a bilingual educator or community health advocate, aiming to bridge the gap between her Mexican heritage and the broader Dallas community. She dreams of earning
    a scholarship to study education or public health at a Texas university, where she can develop programs that support under‑represented youth. In the short term, she plans to gain leadership experience
    through the student council and volunteer at local health fairs, building a foundation for a career focused on service, cultural empowerment, and practical problem‑solving.
