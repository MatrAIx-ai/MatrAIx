personas:
  professional: Alexis Arcos, an aspiring digital illustrator at fifteen, blends sci‑fi novel motifs with traditional folk imagery, turning curiosity into disciplined sketch sessions while staying flexible
    enough to juggle school assignments and team practices.
  sports: Alexis Arcos plays forward on the mixed‑gender Middletown Middle School Soccer team, idolizing the local professional club LA Galaxy while also dancing with a Ballet Folklórico troupe, which keeps
    them limber and adds a disciplined rhythm to their athletic routine.
  arts: Alexis Arcos spends evenings creating digital illustrations inspired by authors like Liu Cixin and folk legends, practices Ballet Folklórico to the sounds of Lila Downs and Los Tigres del Norte,
    and regularly attends community festivals where they admire muralists such as Diego Rivera.
  travel: Alexis Arcos dreams of visiting the historic streets of Oaxaca for its Day of the Dead celebrations and hopes to explore the vibrant markets of Mexico City, yet they currently plan weekend trips
    to nearby state parks with friends, balancing a limited family budget with a love for cultural immersion.
  culinary: Alexis Arcos enjoys cooking tacos al pastor with pineapple and cilantro at home, perfecting the caramelized pork using achiote and chilies, while also savoring tamales rojo with masa and roasted
    corn on the cob (elote) during family gatherings.
  core: Alexis Arcos is a high‑energy teen who balances soccer, folk dance, and digital art with a practical streak, a habit of saving allowance for creative tools, occasional night‑owl gaming marathons,
    and a tendency to forget their sketchbook until the last minute.
background:
  cultural: Alexis comes from a Mexican‑American family that maintains strong ties to Mexican traditions while embracing life in Dallas. She celebrates Día de los Muertos and other cultural holidays at
    home, helping prepare traditional foods like tamales and pozole with her grandparents. Bilingualism is a daily practice, as she speaks Spanish with family and English at school. Her community involvement
    includes attending local Mexican heritage festivals in Dallas, where she volunteers to set up cultural booths and performs in dance showcases, reinforcing a sense of cultural pride and social responsibility.
attributes:
  skills: '[''Bilingual communication (English/Spanish)'', ''Team collaboration'', ''Basic coding (Scratch)'', ''Public speaking'', ''Organizational planning for school projects'', ''Creative writing'',
