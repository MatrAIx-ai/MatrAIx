  hobbies: '[''karaoke'', ''salsa/line dancing'', ''cooking traditional Chinese and Taiwanese cuisine'', ''beach walks'', ''volunteering at blood‑donation events'', ''community gardening'', ''calligraphy'',
    ''reading mystery novels'', ''participating in senior center social games'']'
  career_goals: While approaching retirement, Xinyu aims to leverage her extensive clinical experience by becoming a senior phlebotomy trainer and quality‑assurance coordinator within her health system.
    She plans to obtain a Certified Phlebotomy Technician credential and complete a GED to formalize her education. Additionally, she hopes to lead community blood‑donation drives and mentor younger staff
    from diverse backgrounds, fostering a supportive workplace culture. In the longer term, Xinyu envisions transitioning to a part‑time health‑education role focused on promoting preventive care in the
    East Asian immigrant community of Queens.
