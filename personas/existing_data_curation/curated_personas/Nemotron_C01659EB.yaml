personas:
  professional: Jeffery Woodard works as an entertainment venue technician, harnessing a STEM foundation and meticulous problem‑solving to maintain audio‑visual, lighting, and mechanical stage systems,
    and they apply their preference for structured, solitary work and calm under pressure to keep backstage operations predictable while pursuing certifications for a future technical supervisor role.
  sports: Jeffery Woodard finds solace in solo hikes up the Sandia Mountains and occasional trail runs, follows the Albuquerque Isotopes and New Mexico United to stay connected to local sports culture,
    and they maintain fitness with a mix of cardio on mountain paths and body‑weight strength circuits designed for flexible scheduling.
  arts: Jeffery Woodard immerses in ambient and instrumental soundtracks by artists like Tycho and Vangelis while editing astrophotography, devours hard science‑fiction by Arthur C. Clarke and watches Christopher
    Nolan’s filmography for narrative inspiration, and they occasionally attend local art installations that blend technology with visual art.
  travel: Jeffery Woodard prefers meticulously planned trips that combine dark‑sky stargazing and solitude, having already camped at Chile’s Atacama Desert, trekked to Mauna Kea in Hawai‘i, and explored
    the quiet expanse of White Sands National Park, while dreaming of next‑year’s meteor‑shower excursion to the remote Faroe Islands.
  culinary: Jeffery Woodard experiments with New Mexican cuisine by roasting Hatch green chile for a smoky salsa, perfecting a slow‑cooked pork shoulder seasoned with cumin and ancho chile, and they balance
    these solitary cooking sessions with occasional visits to the local farmer’s market for fresh corn tortillas and heirloom beans.
  core: Jeffery Woodard is a methodical night owl who turns solitary technical challenges into precise solutions, yet habitually forgets to water houseplants, leading to an ever‑growing indoor jungle of
    wilted greens.
background:
  cultural: Jeffery was born and raised in a middle‑class white family in Albuquerque, with German and Irish ancestry. Growing up in the Southwest, he was exposed to the region’s distinctive blend of Native
    American, Hispanic, and Anglo‑American traditions—attending the International Balloon Fiesta, tasting green chile, and appreciating the wide open desert landscape. While his family celebrated the standard
    American holidays, Jeffery also developed an appreciation for local customs, such as the annual Sandía Harvest Festival and community art events at the KiMo Theatre. He respects the cultural mosaic
    of Bernalillo County and quietly contributes by volunteering for data‑entry projects at the local community center. His personal identity is rooted in self‑reliance, a love of quiet reflection in the
    desert, and a pragmatic, service‑oriented outlook shaped by both his STEM education and the practical demands of his entertainment‑venue role.
attributes:
  skills: '[''Audio‑visual equipment troubleshooting'', ''Lighting rig operation and maintenance'', ''Stage mechanical systems preventive maintenance'', ''Safety compliance (OSHA, NFPA) enforcement'', ''Inventory
    and asset management'', ''Event scheduling and resource allocation'', ''Python scripting for equipment automation'', ''Data analysis of venue operations'', ''Procedural documentation and SOP creation'',
    ''Calm problem solving under pressure'']'
  hobbies: '[''Astrophotography'', ''Model rocketry'', ''Hiking in the Sandia Mountains'', ''Solo board games and puzzles'', ''Reading hard science‑fiction'', ''DIY electronics and Arduino projects'', ''Technical
    blogging on venue operations'', ''Cooking New Mexican cuisine for one'']'
  career_goals: Jeffery aims to build a career that leverages his technical expertise while providing the structured, predictable environment he values. In the next 1‑2 years he plans to earn certifications
    such as Certified Entertainment Technician (CET) and complete an OSHA 30‑hour safety course. He seeks promotion to a technical supervisor role, overseeing backstage technology, safety inspections, and
    maintenance planning for the Albuquerque Convention Center or similar venues. Long‑term, he aspires to become a Facility Operations Manager, responsible for the full lifecycle of venue infrastructure,
    possibly supplemented by a master’s degree in Engineering Management. He also envisions offering consulting services to smaller event spaces across New Mexico, helping them implement reliable technical
    and safety protocols.
