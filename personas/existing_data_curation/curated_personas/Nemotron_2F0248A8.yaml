personas:
  professional: Miguel Shen is a budding LEGO architect whose curiosity and practical mindset drive them to sketch detailed blueprints for elaborate creations, yet they prefer a relaxed, flexible building
    process that accommodates spontaneous ideas.
  sports: Miguel Shen thrives as a forward on the local "Sunset Strikers" youth soccer team, channeling their cooperative spirit and love for teamwork, and they idolize Lionel Messi while cheering for the
    national team during big matches.
  arts: Miguel Shen spends free afternoons sketching cartoon heroes from "The Simpsons" and "Dragon Ball", drawing inspiration from the vibrant storytelling of Hayao Miyazaki and the playful melodies of
    Imagine Dragons that play during their creative sessions.
  travel: Miguel Shen enjoys spontaneous weekend adventures, from backyard insect hunts to family road trips to Yellowstone National Park, and they dream of exploring the Amazon rainforest and building
    a LEGO model of the Eiffel Tower when they travel abroad.
  culinary: Miguel Shen favors crunchy carrot sticks, cheesy mini‑pizza bites, and the occasional homemade "LEGO lasagna" they assemble with parents, but they often forget to finish their vegetables, leading
    to gentle reminders from their mother.
  core: Miguel Shen blends boundless curiosity with a laid‑back attitude, turning LEGO bricks, soccer fields, and backyard expeditions into a playful, compassionate world where kindness and spontaneous
    creativity guide every choice.
background:
  cultural: Miguel grows up in suburban Carrollton, Texas, a community that blends traditional Texan values with a diverse, growing population. His family participates in typical American celebrations such
    as Thanksgiving, Fourth of July fireworks, and local community events like the Collin County Fair. He attends a public elementary school that encourages community service, and his upbringing reflects
    a middle‑class, English‑speaking, white American background with influences from nearby multicultural neighborhoods, giving him exposure to a mix of cultures while mainly embodying mainstream suburban
    U.S. customs.
attributes:
  skills: '["Reading comprehension", "Basic arithmetic", "Block‑based coding (Scratch)", "LEGO building and spatial reasoning", "Cooperative teamwork", "Empathy and peer support"]'
  hobbies: '["Building LEGO", "Reading adventure/animal books", "Playing soccer", "Exploring nature and insect collecting", "Caring for pets", "Drawing cartoons", "Participating in school Kindness Club"]'
  career_goals: Miguel dreams of a future where he can combine his love of animals, his knack for problem solving, and his desire to help others. He aspires to become a veterinarian or a science teacher,
    hoping to care for pets, educate children about compassion for living beings, and maybe one day run a community clinic or school program that blends hands‑on science with kindness. In the short term
    he aims to excel in school, especially in science and reading, and to volunteer with local animal‑shelter projects with his family.
