    research'', ''Accessibility compliance (WCAG)'', ''Technical documentation'', ''Collaborative teamwork'', ''Empathetic communication'']'
  hobbies: '[''Hiking'', ''Urban photography'', ''Reading speculative fiction and philosophy'', ''Acoustic guitar playing'', ''Creative writing'', ''Mentoring youth in coding'', ''Board games'', ''Coffee
    brewing'', ''Attending local tech and sustainability meetups'', ''Exploring indie video games'']'
  career_goals: He aims to become a lead engineer or product strategist who bridges technology and social impact. He wants to develop inclusive digital platforms, especially for mental-health support and
    educational equity. Over the next five years he plans to deepen expertise in human-computer interaction, pursue a master's degree in HCI or a related field, and mentor junior developers through community
    coding workshops. Ultimately he envisions founding or joining a mission-driven tech startup that prioritizes ethical design and community empowerment.
