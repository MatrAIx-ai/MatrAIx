personas:
  professional: Alexis Doumas drives revenue growth in wholesale manufacturing sales by coupling a meticulous, data‑driven pipeline approach with vivid, story‑focused pitches that turn technical specs into
    compelling narratives, all while mentoring junior reps with the same disciplined enthusiasm they bring to every client meeting.
  sports: Alexis Doumas keeps fit by playing catcher for the co‑ed Jefferson County Firefighters Softball Club, roots for the Denver Broncos, Colorado Rockies, and Colorado Avalanche, and hikes the trails
    of Mount Falcon Park on Saturdays, treating each ascent as a moving meditation.
  arts: Alexis Doumas channels their love of abstraction into weekly painting sessions at The Art Loft while drawing inspiration from Frida Kahlo, Yayoi Kusama, and local muralist Maria Rodriguez, and they
    never miss a performance by Lin‑Manuel Miranda’s Hamilton when it tours nearby.
  travel: Alexis Doumas plans weekend road trips that blend adventure with culinary discovery, having explored the vineyards of Napa Valley, trekked the peaks of Rocky Mountain National Park, and now dreams
    of a week‑long food tour through Tuscany’s Tuscan hills while balancing family and work commitments.
  culinary: Alexis Doumas experiments with global flavors by perfecting miso‑glazed Colorado trout, crafting homemade sourdough starter loaves, and whipping up a spicy kimchi‑infused quinoa bowl, always
    keeping a well‑stocked spice rack of harissa, sumac, and smoked paprika at the ready.
  core: Alexis Doumas blends disciplined sales leadership with a restless imagination, turning every client deal into a creative venture while mastering spreadsheets, salsa, and spontaneous weekend hikes.
background:
  cultural: Alexis grew up in the Birmingham metropolitan area, steeped in traditional Southern culture while witnessing the city's evolution into an industrial hub. Her family's modest, middle-class background
    emphasized hard work, hospitality, and community involvement, values that continue to shape her personal and professional life. She maintains strong ties to local churches and civic organizations, and
    she celebrates regional customs such as Southern cooking, community festivals, and a deep appreciation for the outdoors. At the same time, her openness to new ideas and her pursuit of innovative sales
    practices reflect a blend of classic Southern values with a forward-looking, eclectic worldview.
