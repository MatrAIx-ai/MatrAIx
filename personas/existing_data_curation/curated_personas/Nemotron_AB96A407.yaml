  career_goals: Looking ahead, Alexis aims to transition into a senior leadership role within her company, such as Regional Sales Manager or Director of Sales Operations, where she can shape strategy and
    mentor emerging talent. She is pursuing a Certified Professional Sales Leader (CPSL) credential and plans to complete an associate degree in business administration to complement her practical experience.
    Her long-term ambition includes spearheading the adoption of digital sales tools and AI-driven analytics to open new market segments, as well as eventually launching a boutique consulting practice that
    helps regional manufacturers modernize their sales processes.
