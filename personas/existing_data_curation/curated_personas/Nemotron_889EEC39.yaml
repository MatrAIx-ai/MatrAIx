personas:
  professional: Miesha Evans is an aspiring creator who blends a passion for adventure novels with a knack for building intricate LEGO structures and sketching original comic characters, showing early signs
    of a future in game design or storytelling engineering.
  sports: Miesha Evans plays forward for the C3 Soccer Club's under 11 girls team, cheers on Charlotte FC during the MLS season and the Charlotte Hornets in the NBA playoffs, and spends weekends at Freedom
    Park practicing dribbling drills and joining the community center's after school basketball league.
  arts: Miesha Evans draws inspiration from comic legends like Stan Lee and manga artist Akira Toriyama, jams to R&B icons SZA and H.E.R. while sketching, sings gospel classics by Kirk Franklin in their
    church choir, and watches animated films by Hayao Miyazaki for storytelling ideas.
  travel: Miesha Evans prefers spontaneous weekend road trips over carefully planned vacations, often biking to Charlotte's Freedom Park or taking family drives to the Blue Ridge Mountains in Asheville,
    while dreaming of visiting the bustling streets of New York City and the magical realms of Orlando's Disney World, though their disorganized backpack sometimes leaves them forgetting snacks.
  culinary: Miesha Evans loves helping bake sweet potato pies with cinnamon and nutmeg, mixes up peanut butter banana smoothies after soccer, and frequently munches on homemade mac and cheese bites, yet
    their kitchen experiments sometimes end in a flour covered floor because they get so absorbed in building LEGO that they forget to turn off the oven.
  core: Miesha Evans, a 10 year old explorer of LEGO realms, soccer fields, and comic panels, balances boundless curiosity with a relaxed, sometimes messy, approach to life, often misplacing half finished
    redstone circuits while humming R&B tunes.
background:
  cultural: Miesha was raised in Charlotte’s vibrant African‑American community, where family, church, and local traditions play a central role. She celebrates Juneteenth and Kwanzaa with her family, attending
    community festivals that highlight black art, music, and history. Frequent visits to the Charlotte Black History Museum and storytelling evenings with grandparents connect her to the legacy of civil‑rights
    leaders from the region. The neighborhood emphasizes educational achievement and mutual support, encouraging her to be curious, resilient, and proud of her heritage.
attributes:
  skills: '["LEGO building and design", "Basic Scratch coding", "Reading comprehension and storytelling", "Visual math problem explanation", "Beginner piano playing", "Collaborative group project assistance"]'
  hobbies: '["Reading adventure books", "Playing soccer", "Drawing and comic creation", "LEGO building", "Minecraft", "Listening to music (R&B, hip‑hop)", "Church choir", "Exploring parks and nature"]'
  career_goals: Miesha dreams of one day designing safe, fun spaces for other children, so she hopes to become an engineer who creates sustainable playgrounds and community parks. She also imagines herself
    as a teacher who inspires curiosity in science and reading, especially for kids in her neighborhood. In the short term, she wants to start a small after‑school club where she can combine her love for
    technology, building, and storytelling to help peers learn new skills.
