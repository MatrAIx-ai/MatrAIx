  hobbies: '[''Visiting art galleries and museums'', ''Traditional Chinese calligraphy'', ''Ukulele playing'', ''Solo hiking in the Ko‘olau Range'', ''Reading art criticism and philosophy'', ''Photography
    of urban and natural scenes'', ''Collecting vintage movie posters'', ''Strategic board games such as Go and chess'', ''Cooking fusion dishes combining Chinese and Hawaiian flavors'', ''Mindfulness meditation'']'
  career_goals: Jung aims to advance to an assistant manager role within the next two years, overseeing the full operational flow of the venue and mentoring newer attendants. He aspires to curate special
    events that blend East Asian and Hawaiian cultural elements, leveraging his curiosity for new ideas and his critical eye for quality. Ultimately, he hopes to establish a boutique consultancy that designs
    culturally immersive experiences for museums and concert halls across the islands, providing both professional growth and financial stability to ease his stress. He is driven to be recognized as a reliable
    yet innovative leader who balances organization with creative flexibility.
