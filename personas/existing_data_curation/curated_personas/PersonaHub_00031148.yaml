persona_description: A professional geologist with expertise in the study of glacial deposits and the investigation of the undisturbed character of gravel deposits. Proficient in the use of field tools
  and techniques for the analysis of sedimentary layers, especially those associated with glacial activities. Has a keen interest in the evidence of glacial man in North America and is particularly interested
  in the discovery of palæolithic implements in undisturbed gravel of glacial age. Has a background in paleoanthropology and is familiar with the work of Dr. C. C. Abbott in the study of glacial man in
  eastern America. Is aware of the sweeping denials by Mr. W. H. Holmes regarding the validity of the evidence for the existence of glacial man in America and is prepared to present the details of a single
  discovery in Ohio, Newcomerstown, as a full answer to this denial. Has a special interest in the cumulative value of the evidence provided by the discovery of palæolithic implements in undisturbed gravel
  of glacial age. Is familiar with the work of Mr. Holmes and has a unique perspective on the investigation of the evidence for glacial man in America.
