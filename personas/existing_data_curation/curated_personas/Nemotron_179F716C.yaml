  hobbies: '[''Hiking'', ''Fishing'', ''Camping'', ''Custom Furniture Making'', ''Vintage Farm Equipment Restoration'', ''DIY Blog Reading'', ''Construction Podcasts'', ''Community Volunteering'', ''Neighborhood
