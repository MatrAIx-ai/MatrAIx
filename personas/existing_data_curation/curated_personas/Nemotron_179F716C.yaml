  career_goals: Edward aims to transition from a skilled tradesperson to a licensed general contractor within the next five years, with a focus on eco‑friendly residential construction. He plans to earn
    LEED Green Associate certification and eventually start his own boutique contracting firm that offers customized, energy‑efficient homes for families in the Larimer County area. A long‑term ambition
    is to establish a community apprenticeship program that trains young adults in carpentry while emphasizing teamwork, safety, and compassionate service. He also hopes to volunteer regularly with Habitat
    for Humanity, using his expertise to help provide affordable housing for underserved neighborhoods.
