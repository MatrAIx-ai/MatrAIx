personas:
  professional: Daniel Jones, a budding junior engineer and soccer enthusiast, combines his love for structure, competitive drive, and sociable energy to lead LEGO build sessions, organize his team's defensive
    plays, and spearhead systematic experiments in his school's science club.
  sports: Daniel Jones, a midfielder for the Maplewood Strikers youth soccer league, trains twice weekly with a disciplined drill schedule, cycles around his neighborhood after school, and cheers for Manchester
    United, channeling his competitive spirit into both team play and personal fitness.
  arts: Daniel Jones spends afternoons sketching comic-style heroes inspired by Jack Kirby, builds narrative scenes with LEGO City sets, and enjoys listening to the Jonas Brothers while drawing, letting
    his imagination blend structure with storytelling.
  travel: Daniel Jones prefers meticulously planned weekend trips, such as a family camping adventure in Yellowstone National Park and a day-long visit to the interactive Science Museum in Chicago, yet
    dreams of exploring the ancient ruins of Machu Picchu when school breaks allow, balancing his structured itinerary cravings with a yearning for grand adventures.
  culinary: Daniel Jones favors classic kid-friendly fare like pepperoni pizza, cheesy mac and cheese, and chicken nuggets, often assembling his own snack plates with LEGO-shaped cookie cutters and sprinkling
    extra mozzarella, while occasionally indulging in strawberry-banana smoothies for post-soccer refuel.
  core: Daniel Jones is a competitively spirited, structure-loving eight-year-old who balances relentless LEGO building, soccer drills, and baseball-card trades with occasional worry-induced snack binges
    and a habit of double-checking his allowance ledger before bedtime.
background:
  cultural: Daniel is raised in a white, Midwestern family in Stoughton, Wisconsin, a town known for its strong German‑American heritage and community traditions. His family partakes in local events such
    as the Stoughton Oktoberfest, visits the nearby farmers market, and attends a Lutheran church on Sundays. Growing up in Dane County, he has been taught values of punctuality, community involvement,
    and appreciation for outdoor activities like biking and team sports, which shape his everyday life and outlook.
