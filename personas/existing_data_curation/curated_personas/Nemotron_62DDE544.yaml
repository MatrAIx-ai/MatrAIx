  career_goals: Daniel imagines a future where he can blend his love for building, teamwork, and helping others. He aspires to become an engineer, picturing himself designing bridges or machines, or a firefighter,
    attracted by the clear procedures, community service, and teamwork the role offers. In the near term, he aims to maintain his responsibilities as class monitor, earn a "Student of the Month" recognition,
    improve his soccer skills to make his school’s varsity team, and develop his Scratch projects into more complex creations.
