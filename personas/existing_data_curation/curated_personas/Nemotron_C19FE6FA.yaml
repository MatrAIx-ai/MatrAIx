  career_goals: Although officially retired, Steven aims to remain an active contributor to both scientific and artistic communities. His primary goals are to mentor emerging students in STEM fields, publish
    a series of interdisciplinary essays that explore the synergy between science, art, and philosophy, and help establish a scholarship for under‑represented high‑school students pursuing STEAM education.
    He also aspires to serve as an advisory board member for a local Brooklyn museum’s education program, curating exhibitions that highlight the aesthetic dimensions of scientific discovery. Ultimately,
    he seeks to leave a lasting legacy of lifelong learning, community empowerment, and the celebration of curiosity-driven creativity.
