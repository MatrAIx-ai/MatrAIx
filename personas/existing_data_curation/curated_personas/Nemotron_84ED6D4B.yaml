personas:
  professional: Dolores Pettersen, a food‑service manager at a regional restaurant chain, leverages their practical hospitality know‑how and humanities‑sharpened communication to craft flexible staff schedules,
    enforce rigorous cost controls, design seasonal, locally‑sourced menus, and mentor a diverse crew—all while they let curiosity drive menu experimentation and accept a relaxed, sometimes disorganized
    approach to paperwork.
  sports: Dolores Pettersen, a regular member of the Prior Lake Trail Hikers club, finds that they jog along the lake’s paths each weekend, enjoy casual pickup soccer in the summer, and root for Minnesota’s
    professional teams—the Twins in baseball, the Vikings in football, and the Timberwolves in basketball—using group activities to blend socializing with fitness.
  arts: Dolores Pettersen frequently visits regional art exhibitions, often admiring works by local painter Maria Lopez, attends community theatre productions such as the recent staging of Our Town featuring
    actor James Owens, and they fill their playlists with folk‑rock duo The Milk Carton Kids and classic singer‑songwriter Joni Mitchell, using these creative experiences to fuel their own culinary storytelling.
  travel: Dolores Pettersen prefers low‑key weekend road trips that combine culinary discovery with scenic hikes, having already explored the farm‑to‑table market scene in Asheville’s West Asheville Market
    and the vineyard tours of Napa Valley, while they dream of a summer visit to the lavender fields of Provence to inspire new café menu concepts.
  culinary: Dolores Pettersen, an avid home cook with intermediate skill, experiments with dishes such as heirloom tomato gazpacho, rye‑crusted pan‑seared trout with dill and lemon, and a seasonal vegetable
    ratatouille built from garden‑grown zucchini, carrots, and basil, and they treat themselves to artisanal cheese boards featuring aged Gouda and locally made goat cheese, all while swapping recipe ideas
    with friends at potluck evenings.
  core: Dolores Pettersen blends a sociable, curiosity‑driven spirit with a laid‑back, occasionally disorganized approach to planning, they often forget to file tax paperwork until the deadline while still
    rallying their team with spontaneous menu ideas and community‑focused events.
background:
  cultural: Dolores grew up in the Twin Cities suburbs of Minnesota in a family with Norwegian‑Swedish ancestry, a heritage that values modesty, community, and a close connection to nature. Her upbringing
    emphasized hospitality—family gatherings, church potlucks, and shared meals were central. Living in Prior Lake, she embraces the Midwestern ethos of friendliness, cooperation, and a pragmatic approach
    to life while also cherishing the region’s strong seasonal rhythms, which influence her cooking and outdoor pursuits.
