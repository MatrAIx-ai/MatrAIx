  career_goals: Dolores aims to move into a regional food‑service director role within the next five years, overseeing multiple locations while championing a workplace culture that values employee well‑being
    and creativity. She plans to earn a certificate in hospitality management to deepen her strategic skills, and eventually launch a boutique café that showcases Midwestern farm‑to‑table cuisine with a
    rotating menu inspired by her travels and curiosity for new culinary ideas. A core ambition is to mentor emerging hospitality talent, especially women, and to implement sustainable sourcing practices
    across the establishments she leads.
