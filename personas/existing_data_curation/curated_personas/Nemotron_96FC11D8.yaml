personas:
  professional: Alice Banta, a retired community organizer and certified first‑aider, channels their methodical planning, competitive edge, and curiosity into coordinating volunteer events, managing modest
    nonprofit budgets, and teaching digital‑literacy classes to seniors, all while weaving local history into the fabric of every project.
  sports: Alice Banta, a steadfast member of the Greenville Walking Club, embraces low‑impact cardio through four‑mile group walks each morning and occasional community yoga classes, while cheering enthusiastically
    for the Greenville Drive minor‑league baseball team and following the Clemson Tigers football season with a competitive spirit; they avoid high‑intensity sports due to knee arthritis but never miss
    the annual senior softball tournament at the community center.
  arts: Alice Banta, a loyal patron of the Greenville Community Theater, relishes productions of classics like 'Our Town' and contemporary shows such as 'The Music Man,' while listening to Ella Fitzgerald’s
    jazz standards, the Beatles’ early catalog, and reading historical fiction by Philippa Gregory; they incorporate the soft colors of Georgia O'Keeffe's watercolors into their quilting designs, and enjoy
    attending local art exhibits featuring regional painters.
  travel: Alice Banta, a keen yet comfort‑oriented traveler, plans meticulously organized road trips that have taken them to the historic districts of Savannah and Charleston, the serene gardens of the
    Biltmore Estate, and a weekend cruise along the Ohio River; they dream of exploring the Smithsonian museums in Washington, D.C., and always travel with a portable recorder to capture oral histories
    of the places they visit, balancing family companionship with gentle adventure.
  culinary: Alice Banta, an adept home cook, blends treasured family recipes—such as the great‑grandmother’s chicken and dumplings and a sweet‑potato casserole passed down through generations—with fresh
    produce from their own garden, favoring dishes like heirloom tomato bruschetta, rosemary‑infused roasted chicken, and sage‑garlic quinoa; they occasionally treat themselves to a slice of New York cheesecake
    as a rare indulgence, and are known for their precise measuring and meticulous plating on special occasions.
  core: Alice Banta, an 81‑year‑old civic‑minded storyteller, fuses relentless organization, competitive bridge acumen, and garden‑grown wisdom into a purposeful life of community service, peppered with
    a gentle stubbornness for tradition and a soft spot for historic novels.
background:
  cultural: Alice was raised in a mid‑western, white, European‑American family in Michigan, with roots tracing back to German and English settlers. Her upbringing emphasized self‑reliance, community service,
    and church involvement, values typical of the Great Lakes region’s post‑World‑War II generation. She grew up attending a Protestant congregation, where fellowship and volunteerism were central. The
    cultural norm of close‑knit neighborhoods, seasonal agricultural activities, and a pragmatic approach to life shaped her practical curiosity and organized outlook. While she respects traditional customs,
    she also embraces new ideas, reflecting a balance between heritage and adaptability.
