  hobbies: '[''Gardening'', ''Bridge (competitive play)'', ''Reading historical fiction and biographies'', ''Digital‑literacy tutoring'', ''Walking clubs'', ''Local historical society involvement'', ''Quilting'',
    ''Cooking family recipes'', ''Community theater attendance'']'
  career_goals: Although retired, Alice aims to expand her community impact by serving on the senior advisory board of the Greenville public library, leading intergenerational mentorship programs, and spearheading
    a local oral‑history project that records the stories of long‑time residents. She also plans to complete a memoir that weaves her family’s genealogy with the town’s history, and to maintain her health
    so she can continue participating in volunteer activities and friendly competitions such as bridge tournaments.
