personas:
  professional: Steven Myrick, a remote data analyst and technical writer, leverages advanced Python, pandas, SQL, and meticulous documentation skills to build streamlined workflows for small businesses,
    while their need for structure and solitude drives them to design highly organized SOPs and avoid chaotic team meetings.
  sports: Steven Myrick, a dedicated solo hiker who frequents the Laguna Canyon trails and is a member of the Laguna Trail Runners club, follows the Los Angeles Lakers and Los Angeles Dodgers for seasonal
    excitement, and incorporates weekly yoga sessions to balance their low‑intensity fitness regimen with the need for calm.
  arts: Steven Myrick, an avid science‑fiction reader who devours works by Isaac Asimov and Liu Cixin, curates a quiet home library of classic films by Christopher Nolan, listens to ambient composer Brian
    Eno while editing photos inspired by Ansel Adams, and occasionally sketches model railroad layouts as a creative outlet.
  travel: Steven Myrick, a meticulous planner, prefers low‑key nature getaways such as solo road trips along the Pacific Coast Highway, weekend hikes in Yosemite, and a month‑long photographic expedition
    to Iceland’s volcanic landscapes, always booking accommodations through a spreadsheet and avoiding crowded tourist hubs.
  culinary: Steven Myrick, a competent home cook, favors Mediterranean dishes like grilled salmon with quinoa and roasted cauliflower, enjoys experimenting with fresh herbs and olive oil, and often pairs
    meals with a glass of Pinot Grigio while using a Raspberry Pi‑controlled sous‑vide to perfect temperature precision.
  core: Steven Myrick blends analytical rigor with a love for solitary pursuits, channeling their structured mindset into data work, model railroads, and mindful routines while navigating intense anxiety
    through disciplined habits and occasional over‑cautiousness.
background:
  cultural: Steven grew up in a middle‑class, suburban Californian family with a strong emphasis on self‑reliance and practical problem solving. His father's career as an electrical engineer and his mother's
    work as a high‑school teacher reinforced a value for education, technical competence, and personal responsibility. Living in Irvine, he has been exposed to the region's tech‑focused culture and the
    wellness‑oriented lifestyle common in Orange County, which together shape his pragmatic outlook, appreciation for structured environments, and interest in health‑related practices such as meditation.
attributes:
  skills: '[''Python programming'', ''Data analysis (pandas, NumPy)'', ''Statistical modeling'', ''SQL database design'', ''Technical writing'', ''Process optimization'', ''CAD (SolidWorks)'', ''Hardware
    troubleshooting'', ''Raspberry Pi electronics'', ''Agile project management basics'']'
  hobbies: '[''Solo hiking'', ''Science‑fiction reading'', ''Model railroading'', ''Strategy video gaming (Civilization)'', ''Raspberry Pi tinkering'', ''Mindfulness meditation'', ''Journaling'', ''Nature
    photography'']'
  career_goals: Steven aims to re‑enter the workforce through a remote, part‑time data‑analysis or technical‑writing position that offers a predictable schedule and limited direct social interaction. He
    plans to build a freelance consultancy focused on data visualization and workflow automation for small businesses, leveraging his strength in creating structured processes. Over the next few years he
    hopes to obtain a professional certification in data science and complete a mental‑health first‑aid training to better manage his anxiety and emotional reactivity, ultimately achieving a stable, self‑directed
    career that aligns with his need for solitude and structure.
