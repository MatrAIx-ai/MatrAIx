    mindfulness practice'']'
  career_goals: Brenda aims to advance into a senior sales leadership role, such as Sales Manager or Regional Director, where she can mentor a high‑performing team and shape the company's growth strategy.
    She envisions expanding the company's market share in sustainable manufacturing solutions and establishing partnerships that prioritize ethical sourcing. Over the next five years, she plans to complete
    a Certified Professional Sales Leader (CPSL) credential, spearhead a regional sales training program, and earn recognition as a top sales performer. Parallel to her professional ambitions, she seeks
    to introduce wellness initiatives within her department to mitigate stress and foster a supportive work culture.
