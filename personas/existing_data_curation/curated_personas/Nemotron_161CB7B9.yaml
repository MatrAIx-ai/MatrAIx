  hobbies: '[''Knitting'', ''Gardening'', ''Bird watching'', ''Reading mystery novels'', ''Coastal walks'', ''Canning and preserving'', ''Cooking traditional meals'', ''Small‑group church gatherings'',
    ''Volunteer work at senior center'']'
  career_goals: Susan aims to continue working part‑time at the local grocery store for financial stability while gradually reducing hours as she approaches retirement. She hopes to be promoted to a shift‑supervisor
    role where she can mentor younger cashiers and share her practical expertise. In the longer term, Susan plans to transition into a volunteer coordinator position at the senior center, using her organizational
    skills to arrange activities for seniors in Gold Beach.
