personas:
  professional: Susan Anderson, a 65‑year‑old long‑time grocery store cashier, leverages their meticulous cash‑handling and inventory skills to keep the checkout line humming while quietly mentoring newer
    staff, applying their love of routine and calm conflict‑resolution to aim for a shift‑supervisor role before retirement.
  sports: Susan Anderson follows the local minor‑league baseball team, the Gold Beach Seafarers, and participates in a weekly senior‑friendly walking club that meets at the harbor, preferring low‑impact
    exercise over competitive sports while they still cheer passionately from the stands.
  arts: Susan Anderson enjoys classic mystery novels by Agatha Christie and Ken Follett, attends community theater productions of "Our Town" and "The Glass Menagerie," and knits while listening to the folk
    duo The Avett Brothers, finding solace in the familiar rhythm of their melodies.
  travel: Susan Anderson favors short, well‑planned trips to nearby coastal towns like Cannon Beach and the historic lighthouse at Cape Meares, opting for drive‑through inns and simple itineraries that
    let them explore tide pools and local birdwatching spots without the stress of crowded airports.
  culinary: Susan Anderson cooks family‑style meals featuring honey‑glazed carrots, roasted chicken with rosemary, and their beloved homemade strawberry jam, often preserving garden produce in mason jars,
    while they enjoy a steaming mug of chamomile tea during knitting sessions.
  core: Susan Anderson blends a steadfast love of routine with a quiet competitive edge, channeling their meticulous cash‑handling expertise into mentoring younger coworkers while tending a modest garden
    and preserving seasonal bounty, all under a calm, skeptical exterior.
background:
  cultural: Susan identifies as a white American with German and Irish ancestry. Raised in a small town on the Oregon coast, she embraces the Pacific Northwest's appreciation for nature, self‑reliance,
    and community. Her upbringing reflected traditional mid‑western values—practicality, thrift, and a strong focus on family. She participates in local cultural traditions such as seasonal canning, holiday
    community potlucks, and the annual Gold Beach coastal festival, and remains active in her local church.
