  hobbies: '[''Soccer'', ''Ballet/Folk Dance'', ''Robotics Club (Scratch)'', ''Adventure Reading'', ''Puzzle Solving'', ''Cooking Mexican Recipes'', ''Cultural Festival Participation'', ''LEGO Building'']'
  career_goals: Monica dreams of becoming a robotics engineer or software developer who can create interactive machines that help her community. She also hopes to continue playing soccer competitively at
    the high‑school and collegiate levels, and envisions studying engineering at a university where she can blend her love of technology with her practical, problem‑solving mindset.
