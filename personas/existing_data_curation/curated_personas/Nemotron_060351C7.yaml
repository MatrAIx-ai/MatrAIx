personas:
  professional: Monica Parada, an aspiring young technologist, leverages their curiosity and organized, methodical mindset to design Scratch robotics programs for their school club, where their competitive
    streak pushes them to fine‑tune every line of code while their tendency to worry fuels relentless testing.
  sports: Monica Parada drills with the Brookside Strikers youth soccer team, balances their training with after‑school ballet and folk dance classes, tracks their fitness using a simple step‑counter, and
    passionately roots for Metro FC in the national league, often analyzing match statistics to improve their own game while occasionally fretting over missed goals.
  arts: Monica Parada enjoys practicing ballet inspired by Misty Copeland’s poise, learns traditional folk choreography alongside their community’s heritage troupe, devours adventure series such as Rick
    Riordan’s Percy Jackson, and swears by the upbeat rhythms of Taylor Swift’s ‘Shake It Off’ while sketching scenes from ‘The Nutcracker’ during free moments.
  travel: Monica Parada prefers family‑oriented trips, often planning day‑long outings to the nearby state park’s nature trails and the city aquarium, while dreaming of a future adventure to Paris’s Eiffel
    Tower and a sun‑kissed Caribbean island beach, balancing their love for exploration with the practical limits of school schedules and their parents’ budget.
  culinary: Monica Parada loves the creamy tang of guacamole made with ripe avocados, lime, cilantro, and a pinch of jalapeño, proudly assists with cheese quesadillas on the stovetop, experiments with simple
    pasta alfredo dishes, and, while still a novice chef, relies on their organized checklists to measure ingredients and eagerly samples the results at family gatherings.
  core: Monica Parada is a competitively curious ten‑year‑old who channels their organized, worry‑prone mind into building Scratch robots, scoring soccer goals, and meticulously saving allowance for future
    dreams, all while never missing a chance to dance before bedtime.
background:
  cultural: Monica is a Mexican‑American growing up in Milwaukee. At home she speaks Spanish with her parents and grandparents, enjoys traditional foods such as tamales, mole, and fresh salsa, and participates
    in community celebrations like Día de los Muertos parades and Cinco de Mayo festivals. Her family blends Mexican customs—strong family ties, respect for elders, and festive traditions—with Midwestern
    values of community involvement and school participation, shaping a bicultural identity that influences her daily life and aspirations.
