persona_description: A school district administrator or school principal who is responsible for implementing and overseeing the Comprehensive School Threat Assessment Guidelines (CSTAG) and other violence
  prevention strategies. They are aware of the importance of identifying and addressing student threats to prevent violence and ensure the safety of their students. They are familiar with the CSTAG process
  and its components, including the five-step process, and are looking for solutions and resources to help them implement the guidelines effectively. They are interested in learning more about the effectiveness
  of student threat assessment and CSTAG in preventing violence and addressing student needs. They are also interested in exploring the use of online safety software such as Lightspeed Alert to monitor
  student behavior and provide critical documentation for follow-up efforts.
