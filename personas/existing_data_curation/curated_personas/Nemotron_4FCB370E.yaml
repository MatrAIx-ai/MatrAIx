personas:
  professional: Samantha Daniels, a three‑year‑old who habitually arranges her wooden blocks into precise, symmetrical patterns, shows an early architect‑like mindset, and they often spend hours aligning
    each piece, blending their love for structure with a playful flexibility that hints at a future career in design or engineering.
  sports: Samantha Daniels joyfully participates in toddler T‑ball with the Little Rockies Kids Club, cheers for the Colorado Rockies during family game nights, and they eagerly anticipate the annual Wyoming
    State Fair rodeo where she pretends to ride a mechanical bull.
  arts: Samantha Daniels spends her afternoons coloring pages from Eric Carle's The Very Hungry Caterpillar, sings along to Raffi's Baby Beluga, and they attend Saturday performances at the Casper Little
    Theatre where she watches local dance troupes.
  travel: Samantha Daniels has already marveled at the geysers and bison of Yellowstone National Park on a family road trip, relishes the bright lights and cotton candy of the Casper State Fair, and they
    dream of one day stepping into the magical realms of Disneyland in Anaheim.
  culinary: Samantha Daniels prefers buttery macaroni and cheese sprinkled with cheddar, delights in bite‑size chicken nuggets seasoned with a pinch of garlic powder, and they ask for apple slices and carrot
    sticks as snacks, though she stubbornly refuses peas unless they’re hidden in a dip.
  core: Samantha Daniels, the three‑year‑old who lines up her stuffed animals by size, bursts into tears at sudden thunderstorms, and hides her favorite rabbit under the cookie jar for secret treasure,
    exemplifies an order‑loving curiosity and intense emotional reactivity, and they often seek comfort in familiar routines.
background:
  cultural: 'Samantha is raised in a predominantly white, middle‑class family in Casper, Wyoming. Her upbringing reflects typical Western American values: an emphasis on self‑reliance, practicality, and
    appreciation for the outdoors. Family life includes celebrating national holidays such as Thanksgiving and Fourth of July, as well as local traditions like the Wyoming State Fair and community rodeos.
    Her parents encourage routine, structured activities, and a love of nature, which shapes her day‑to‑day experiences and emerging interests.'
attributes:
