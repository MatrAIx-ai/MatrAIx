  career_goals: At this early stage, Samantha often talks about wanting to "help people" and "take care of animals" in her pretend play. She imagines herself as a teacher who reads stories to other children,
    a veterinarian caring for pets, and occasionally as a firefighter who rescues people. These ambitions reflect her preference for structured, predictable roles where she can be useful and organized,
    while also satisfying her natural empathy and occasional assertiveness.
