  career_goals: Although retired from formal teaching, Mirna aims to expand her impact by launching an adult‑literacy program for Spanish‑speaking seniors in Los Angeles. She wishes to serve on the board
    of her local senior center to shape policies that support aging in place. Mentoring new educators and documenting her family’s migration story in a memoir or cookbook are also key ambitions, allowing
    her to blend her love of learning with cultural preservation.
