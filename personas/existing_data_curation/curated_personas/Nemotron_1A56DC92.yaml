  hobbies: '[''Gardening'', ''Cooking traditional Colombian dishes'', ''Salsa and Cumbia dancing'', ''Reading Colombian literature'', ''Genealogy research'', ''Hiking in the Santa Monica Mountains'', ''Volunteering
