personas:
  professional: Mirna Reyes is a retired bilingual curriculum specialist who now orchestrates senior‑center programs, mentors novice teachers, and mobilizes volunteers to launch an adult‑literacy initiative
    for Spanish‑speaking elders, leveraging their methodical planning, public‑speaking flair, and deep experience in community outreach.
  sports: Mirna Reyes is an avid hiker who leads a weekly senior walking group through the Santa Monica Mountains, cheers season tickets for the Los Angeles Dodgers, enjoys occasional bocce league games
    at the senior center, and participates in low‑impact tai‑chi classes, combining community spirit with gentle fitness.
  arts: Mirna Reyes immerses themselves in literary classics such as Gabriel García Márquez’s "One Hundred Years of Solitude," attends monthly performances by the Los Angeles Philharmonic, enjoys salsa
    nights featuring music by Carlos Vives and Shakira, and volunteers as a choir soloist for church services, letting the arts shape their social circles and personal reflection.
  travel: Mirna Reyes favors purposeful travel, planning trips that blend family heritage and scenic relaxation; they have explored Cartagena’s historic walled city, trekked the Andean highlands around
    Bogotá, and regularly escape to Ojai and the Joshua Tree desert for weekend retreats, while budgeting carefully to prioritize cultural pilgrimages and avoid overextending their fixed income.
  culinary: Mirna Reyes delights in cooking traditional dishes like arepas stuffed with queso fresco and avocado, pork‑and‑olive empanadas, and hearty sancocho soup seasoned with cumin, cilantro, and plantain;
    they are a confident home chef who gardens heirloom tomatoes for fresh sauces, yet occasionally forget to label leftovers, leading to occasional food‑safety mix‑ups.
  core: Mirna Reyes is a charismatic, methodical senior who blends community activism, cultural stewardship, and lifelong curiosity into a vibrant, talkative life marked by garden‑fresh meals, spirited
    salsa steps, and a steadfast commitment to senior literacy.
background:
  cultural: Mirna is a first‑generation Colombian immigrant who grew up in a close‑knit family that valued Catholic traditions, Spanish language, and communal celebrations. She maintains strong ties to
    the Colombian diaspora in Los Angeles, frequently attending cultural festivals, supporting local Colombian businesses, and sharing folk music and dance with her community. Her upbringing on the Caribbean
    coast of Colombia infused her with a love for seafood, vibrant rhythms, and storytelling, which she now weaves into her daily life and community initiatives.
