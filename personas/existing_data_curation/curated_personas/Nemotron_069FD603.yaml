personas:
  professional: Crystal Wilkins leverages her three‑decade electrical engineering tenure to craft data‑driven community art projects, mentor senior learners in digital media, and write precise grant proposals,
    and they bring the same analytical clarity to every intergenerational workshop.
  sports: Crystal Wilkins enjoys daily garden walks and weekly pickleball games at the Locust Valley Recreation Center, and they cheer on the Long Island Ducks during summer baseball season while occasionally
    attending New York Mets games in spring.
  arts: Crystal Wilkins spends weekends at the Long Island Shakespeare Company, collects prints by Ansel Adams, cites Ocean Vuong and Tracy K. Smith as favorite poets, and they find inspiration in the ambient
    scores of Philip Glass while sketching museum exhibits.
  travel: Crystal Wilkins prefers senior‑friendly group tours to historic Williamsburg, the Finger Lakes vineyards, and the Greek islands, and they also relish spontaneous weekend drives to Montauk for
    lighthouse photography.
  culinary: Crystal Wilkins, an avid home cook, regularly prepares heirloom tomato bruschetta, lavender‑infused panna cotta, and masterfully executes Indian chana masala and Japanese ramen, and they source
    fresh basil, garlic, and locally harvested lavender from the neighborhood farmer’s market.
  core: Crystal Wilkins is a curious, art‑loving octogenarian who swaps circuit diagrams for sketchbooks, forgets her keys but never misplaces a lavender sprig, and they constantly blend tech and creativity
    in community projects.
background:
  cultural: Crystal grew up in a middle-class suburban family in New York during the post-war era, where education and community service were highly valued. Her cultural upbringing blends traditional American
    heritage with a strong appreciation for lifelong learning and the arts. Living in Locust Valley, a historically affluent Long Island community, she has been exposed to a vibrant cultural scene that
    includes local philanthropy, seasonal arts festivals, and a close-knit senior network. This environment, combined with her STEM education, has fostered a worldview that celebrates the intersection of
    scientific inquiry and creative expression.
attributes:
  skills: '[''Electrical engineering'', ''Control system design'', ''Data analysis (R, SPSS)'', ''Technical writing'', ''Digital photography'', ''Creative coding (Processing)'', ''Mentoring'', ''Project
    management'', ''Grant writing'', ''Scientific illustration'']'
  hobbies: '[''Visiting museums and galleries'', ''Sketching and journaling'', ''Gardening'', ''Macro photography'', ''Reading science-fiction and poetry'', ''Book club'', ''Theater attendance'', ''Cooking
    international recipes'', ''Volunteering to teach computers'']'
  career_goals: Although formally retired, Crystal aims to amplify her impact by establishing a senior-led Tech & Art fellowship at the Locust Valley Public Library, where she will train adults on digital
    media tools and guide intergenerational art installations. She is also working on a memoir that intertwines her experiences as a pioneering woman in engineering with reflections on art and cultural
    change. Additionally, she hopes to contribute her analytical skills to citizen-science projects on local biodiversity and to serve as an informal advisor for nonprofit boards seeking to integrate technology
    into community programs.
