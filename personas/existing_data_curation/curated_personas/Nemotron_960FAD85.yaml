  career_goals: James aims to advance to a regional operations manager role within the next five years, overseeing multiple locations while maintaining the reliable, routine‑driven environment he thrives
    in. He plans to earn the Certified Food Service Manager (CFSM) credential and develop expertise in supply‑chain optimization to improve margins across the chain. Long‑term, he dreams of opening a small,
    family‑style bistro that emphasizes seasonal, locally sourced dishes, allowing him to blend his managerial expertise with his passion for practical, community‑focused dining. He values a stable work‑life
    balance that leaves space for personal pursuits and regular downtime.
