personas:
  professional: Juan Figueroamolina, a retired handyman turned senior‑center volunteer, channels their decades of practical repair skills and culinary expertise into organizing small cultural cooking workshops
    and serving as a beloved tech‑support buddy for grandchildren’s online school needs.
  sports: Juan Figueroamolina enjoys leisurely walks along Pompano Beach at sunset, is a devoted fan of the Miami Dolphins and Miami Heat, and participates in the local senior fitness club’s weekly low‑impact
    aerobics sessions, favoring gentle activity over competitive sports.
  arts: Juan Figueroamolina listens to timeless salsa, bolero, and Bomba tunes from artists like Celia Cruz, Tito Puente, and Rubén Blades while cooking, and occasionally attends community performances
    of traditional dance troupes that celebrate the island’s musical heritage.
  travel: Juan Figueroamolina prefers relaxed, culturally rich trips, having visited the historic streets of Old San Juan and the sun‑kissed beaches of the Dominican Republic, and dreams of a serene cruise
    through the Caribbean islands that fit their modest budget and desire for family‑friendly destinations.
  culinary: Juan Figueroamolina excels at preparing traditional island dishes such as sofrito‑based rice with beans, plantain mofongo, and slow‑cooked pork stew, skillfully combining tomatoes, plantains,
    and aromatic herbs, and often shares these meals with the senior center’s potluck gatherings.
  core: Juan Figueroamolina blends a hands‑on curiosity with a relaxed, occasionally haphazard approach to life, finding purpose in garden harvests, modest community cooking, and quietly supporting family
    through tech‑savvy assistance.
background:
  cultural: Juan David was born in Puerto Rico and moved to Florida in his early adulthood, carrying with him a strong sense of island identity. He speaks fluent Spanish and English, celebrates Puerto Rican
    holidays such as San Juan and the Three Kings Day, and participates in local diaspora festivals in Broward County. Catholic traditions and family gatherings, even after his divorce, remain important
    cultural touchstones. His culinary heritage, love for island music, and storytelling reflect a deep-rooted connection to his Puerto Rican roots while also embracing the multicultural environment of
    Pompano Beach.
