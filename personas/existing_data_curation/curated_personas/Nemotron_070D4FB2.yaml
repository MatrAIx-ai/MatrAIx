  career_goals: At 75, Juan David’s ambition is less about formal employment and more about staying useful and connected. He aims to volunteer at the local senior center, sharing his cooking knowledge and
    helping organize small cultural events for the Puerto Rican community. He also hopes to become a reliable tech‑support buddy for his grandchildren, mastering simple video‑chat tools and helping them
    navigate online school portals. Preserving and passing on family recipes and stories to younger relatives is a personal goal that gives him a sense of purpose.
