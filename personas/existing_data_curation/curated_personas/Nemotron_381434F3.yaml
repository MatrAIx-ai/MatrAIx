  hobbies: '[''Pickup basketball'', ''Group hiking'', ''Attending art walks and gallery openings'', ''Volunteering with Habitat for Humanity'', ''DIY woodworking'', ''Mural painting'', ''Landscape photography'',
    ''Cooking Mexican‑American cuisine'', ''Listening to live music at local festivals'', ''Participating in community sports leagues'']'
  career_goals: John aims to move from laborer to crew foreman within the next three years, pursuing OSHA 30‑hour certification, a Certified Construction Manager (CCM) credential, and specialized training
    in LEED‑green building practices. He envisions eventually launching his own boutique construction firm that blends sustainable techniques with artistic finishes, allowing him to apply his curiosity
    for new ideas and craftsmanship. In the short term, he seeks supervisory positions that offer higher responsibility, mentorship opportunities, and a pathway to home ownership.
