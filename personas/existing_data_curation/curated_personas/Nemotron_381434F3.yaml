personas:
  professional: John Bryant is a seasoned construction professional specializing in concrete mixing, framing, drywall finishing, and heavy equipment operation, whose methodical, organized mindset and artistic
    curiosity drive him toward crew‑foreman positions that integrate sustainable LEED practices with creative, finish‑focused builds.
  sports: John Bryant is a regular at the Salinas Community Center pickup basketball league, a member of the Monterey Bay Trail Association for weekend hikes, and a passionate fan of the Golden State Warriors,
    San Francisco Giants, and San Jose Earthquakes, often cheering them on while balancing competitive play on the court.
  arts: John Bryant frequently attends Salinas art walks, where they admire murals by local painter Michael Smiley, visit gallery openings showcasing emerging California artist Luna Ortiz, and enjoy music
    festivals featuring Los Lobos and Brian Wilson, while also creating community murals inspired by the street art style of Banksy.
  travel: John Bryant prefers road‑trip adventures along the California coast, having hiked the Big Sur stretch of the Pacific Coast Trail, explored the historic streets of San Francisco, taken a weekend
    getaway to Portland, Oregon, and dreaming of visiting the ancient ruins of Machu Picchu once their home‑ownership goals are secured.
  culinary: John Bryant loves cooking Mexican‑American cuisine, mastering dishes like carne asada tacos with fresh cilantro and lime, chipotle‑marinated chicken, and homemade salsa verde with tomatillos,
    while also experimenting with Monterey Bay seafood such as grilled sardines seasoned with garlic and olive oil.
  core: John Bryant is a methodical construction expert with a competitive edge who channels artistic curiosity into community builds, never misses a basketball game, and often stays up late perfecting
    murals at the expense of consistent sleep.
background:
  cultural: John grew up in a working‑class family in Salinas, California, where the agricultural and construction economies fostered a practical, self‑reliant ethos. As a white Californian, his cultural
    identity is rooted in mid‑20th‑century American middle‑class traditions that value hard work, punctuality, and community responsibility. Living in a city with a strong Mexican‑American presence, he
    has absorbed local customs such as family‑style meals, community festivals (e.g., Feria de Salinas), and a love for the coastal lifestyle. His upbringing emphasized respect for skilled trades, modest
    educational aspirations, and an openness to the diverse cultural expressions found throughout Monterey County.
attributes:
