personas:
  professional: Maritza Yero is a hands‑on mechanical assembler and metal‑fabrication specialist who blends precise blueprint reading, MIG/TIG welding, and CNC milling expertise with an artistic curiosity,
    using spare‑time sketches to inspire process improvements as they pursue CNC programming certification and a Lean Six Sigma Yellow Belt.
  sports: Maritza Yero enjoys weekend hikes with the Trailblazers Hiking Club in the San Bernardino Mountains, roots for the LA Galaxy soccer team, intermittently joins a local indoor rock‑climbing group,
    preferring small‑group physical activities over large‑scale spectator events, and they relish these outings as a break from solitary work.
  arts: Maritza Yero is a sketch‑loving metal‑craft enthusiast who draws inspiration from street murals by artists like Banksy and Regina Ortiz, channels the bold colors of Frida Kahlo and geometric motifs
    of indigenous textile art into welded sculptures, and regularly visits the Riverside Art Museum and community galleries for fresh ideas, and they often share their latest sketches with fellow artists.
  travel: Maritza Yero plans spontaneous getaways, often spending long weekends exploring Joshua Tree, soaking the sun in Laguna Beach, wandering the historic streets of Santa Fe, and occasionally venturing
    to Portland for its indie music scene, all while maintaining a modest travel fund that favors experience over luxury, and they prioritize authenticity over comfort.
  culinary: Maritza Yero delights in cooking family‑style dishes such as tamales, pozole, and salsa verde, experimenting with smoked sea salt and roasted chilies to perfect flavor, and while they confidently
    handle stovetop sautéing, they sometimes over‑season sauces, using cooking as a creative outlet after a hike.
  core: Maritza Yero is a curious, art‑driven metal fabricator who balances precise craftsmanship with spontaneous creativity, prefers solitary work punctuated by small‑group adventures, and navigates life
    with relaxed planning, occasional disorganization, and a steady pursuit of technical mastery, all while they lean on both curiosity and discipline to shape their path.
background:
  cultural: Maritza is a first‑generation Mexican‑American who grew up in a bilingual household where Spanish and English were spoken interchangeably. Her family maintains strong ties to Mexican traditions,
    celebrating Día de los Muertos, Mexican Independence Day, and holiday gatherings centered around homemade tamales and pozole. The vibrant Mexican‑American community of the Inland Empire has shaped her
    identity, exposing her to regional art forms such as tin‑work, papel picado, and muralism, which she admires and often references in her creative projects. While she embraces the work ethic and resilience
    common in her cultural background, she also values the individualistic and exploratory mindset fostered by her American upbringing, allowing her to blend heritage with contemporary craftsmanship.
attributes:
  skills: '[''Mechanical assembly'', ''Metal fabrication'', ''Blueprint reading'', ''CNC milling operation'', ''MIG/TIG welding'', ''Basic electrical wiring'', ''Quality inspection'', ''Safety compliance
    (OSHA)'', ''Lean manufacturing fundamentals'', ''Basic SolidWorks CAD'', ''3D printing prototyping'', ''Troubleshooting'', ''Process documentation'', ''Small‑team collaboration'', ''Assertive problem
    solving'']'
  hobbies: '[''Sketching'', ''Visiting art galleries'', ''Photography of murals and nature'', ''DIY metal‑craft projects'', ''3D printing prototypes'', ''Hiking in the San Bernardino mountains'', ''Cooking
    Mexican cuisine'', ''Listening to regional Mexican and indie music'', ''Reading sci‑fi and speculative fiction'', ''Attending local cultural festivals'']'
  career_goals: Maritza aims to transition from line assembly to a more technical role, such as CNC programmer or production lead, within the next three to five years. She plans to enroll in a community
    college certification program for CNC programming and earn a Lean Six Sigma Yellow Belt to strengthen her process‑improvement credentials. Long‑term, she dreams of launching her own boutique metal‑art
    studio that fuses her fabrication skills with her love for visual art, creating custom sculptures and functional pieces that reflect her Mexican heritage. She also hopes to mentor other young women
    entering manufacturing, promoting diversity and inclusion in the trades.
