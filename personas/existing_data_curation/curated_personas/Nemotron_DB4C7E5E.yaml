  hobbies: '[''Pick‑up basketball'', ''Car‑enthusiast club meet‑ups'', ''DIY car restoration projects'', ''Racing simulation video games'', ''Hiking and camping trips'', ''Live music concerts'', ''Chess
    club'']'
  career_goals: James aims to become an ASE Master Technician within the next three years and then move into a supervisory role such as service foreman or shop manager. He wants to lead a high‑performing
    team, implement efficient workflow systems, and eventually open his own independent garage focused on quality service and community involvement. He is motivated by clear career milestones, competitive
    performance metrics, and the prospect of earning a reputation as a top‑rated technician in the Greater Boston area.
