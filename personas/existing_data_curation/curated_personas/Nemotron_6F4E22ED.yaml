  career_goals: Beth dreams of turning her passion for art and storytelling into a career that offers flexibility and continual creative exploration. She hopes to enroll in a community college or online
    art program to earn a certificate in graphic design or illustration, eventually working as a freelance illustrator for books, games, or indie projects. She also envisions building a personal online
    portfolio and possibly publishing a collection of poems and short stories that reflect her imaginative worldview. While she values creative freedom, she wants to achieve enough professional stability
    to ease her worries about finances and stress.
