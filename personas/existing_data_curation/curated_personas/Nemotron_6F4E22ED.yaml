personas:
  professional: Beth Fraites is an aspiring freelance illustrator who leverages self‑taught sketching, digital illustration, and basic coding skills to craft whimsical book covers and concept art, while
    their imaginative curiosity drives experimental projects and their relaxed, often disorganized workflow means deadlines are sometimes tackled at the last minute.
  sports: Beth Fraites enjoys casual weekend pick‑up soccer at the community park, follows the New Orleans Pelicans for basketball and the LSU Tigers for college football, and occasionally joins a local
    kayaking group that explores nearby bayous, though they prefer low‑intensity activity over structured workouts.
  arts: Beth Fraites immerses themselves in ambient soundscapes by Brian Eno, indie pop from Alvvays, graphic novels by Junji Ito, and the whimsical storytelling of Neil Gaiman, regularly sharing self‑made
    digital illustrations on DeviantArt while drawing inspiration from the surreal paintings of Salvador Dalí.
  travel: Beth Fraites dreams of spontaneous road trips along the Gulf Coast, has already backpacked through the historic streets of New Orleans and visited the misty cliffs of the English Lake District,
    and prefers low‑budget hostels or camping under the stars to the rigidity of pre‑planned itineraries.
  culinary: Beth Fraites, a novice home cook, loves whipping up spicy shrimp étouffée with fresh Cajun spices, crafting avocado toast topped with radish sprouts, and indulging in matcha‑flavored dark chocolate
    mousse, though they often abandon recipes mid‑way to experiment with impromptu flavor combos.
  core: Beth Fraites is a dreamy, anxiety‑prone teen who channels relentless imagination into eclectic art while juggling last‑minute deadlines and a habit of over‑thinking every creative choice.
background:
  cultural: Beth grew up in Pasadena, Texas, a suburban community near Houston with a blend of Southern hospitality and multicultural influences. Her family’s traditions include weekend barbecues, community
    events, and an emphasis on personal expression through music and art. Though she identifies as white, her upbringing exposed her to the diversity of Harris County, sparking curiosity about different
    perspectives and fueling her interest in abstract and novel ideas. The Texan environment, with its open spaces and local art workshops, has shaped her appreciation for independence, creativity, and
    informal learning.
attributes:
  skills: '[''Sketching'', ''Digital illustration'', ''Creative writing'', ''Basic photo editing'', ''Introductory Python coding'', ''Idea brainstorming'', ''Storytelling'']'
