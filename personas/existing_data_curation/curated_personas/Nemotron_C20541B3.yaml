personas:
  professional: Nancy Charleston blends her retail sales acumen with a solid STEM foundation to thrive as a technical sales associate, using data‑driven insights, Python scripting, and assertive communication
    to bridge customers and product teams while thriving in structured yet adaptable work environments, and they excel at turning customer feedback into actionable product improvements.
  sports: Nancy Charleston stays active through weekend kayaking with the Galveston Kayak Club, occasional beach volleyball games, and follows the Houston Astros, Rockets, and Texans, preferring low‑impact
    cardio over intense gym sessions and they often schedule workouts around their flexible work hours.
  arts: Nancy Charleston fuels her creative side by devouring science‑fiction novels by Neal Stephenson, attending live shows by indie artists like St. Vincent and country star Kacey Musgraves, and tinkering
    with Arduino projects that double as interactive art installations, and they find inspiration in these diverse outlets for their problem‑solving mindset.
  travel: Nancy Charleston prefers spontaneous weekend getaways, often exploring Gulf Coast towns such as Corpus Crisp and New Orleans, while dreaming of a road trip to Iceland’s volcanic landscapes when
    finances allow, and they balance limited planning with a love for off‑the‑beaten‑path experiences.
  culinary: Nancy Charleston enjoys crafting Tex‑Mex dishes like fish tacos with mango salsa, homemade guacamole with fresh cilantro and lime, and spicy carne asada, showcasing an intermediate cooking skill
    that blends experimentation with favorite ingredients such as jalapeños and corn tortillas, and they often experiment with new spice blends during their weekly cooking sessions.
  core: Nancy Charleston is a tech‑savvy retail professional who balances structured ambition with spontaneous beach outings, occasional budget slip‑ups, and a penchant for sci‑fi storytelling and spicy
    Tex‑Mex cuisine, and they frequently channel their curiosity into DIY electronics projects.
background:
  cultural: Nancy grew up in a middle‑class, white family in the Greater Houston area, with deep roots in the Texas Gulf Coast region. Her upbringing blended traditional Southern hospitality—valuing friendliness,
    community involvement, and a strong work ethic—with modern, progressive attitudes fostered by her STEM education. Exposed to both the coastal lifestyle of fishing and beach culture and the suburban
    environment of League City, she appreciates independence and self‑reliance while maintaining close ties to family and local traditions. Her cultural identity is shaped by a mix of Texan pride, a pragmatic
    outlook, and an openness to diverse ideas.
attributes:
  skills: '["Customer service & communication", "Retail sales & upselling", "POS system operation", "Inventory management", "Merchandising & visual display", "Basic data analysis (Excel, Google Sheets)",
