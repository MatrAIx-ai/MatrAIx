  hobbies: '["Hiking and beach walks along Galveston Coast", "Kayaking on local waterways", "Reading sci‑fi novels and tech blogs", "DIY electronics projects (Arduino, Raspberry Pi)", "Casual puzzle gaming",
    "Cooking Tex‑Mex dishes", "Attending live music shows (country, indie)", "Volunteering at community food drives"]'
  career_goals: Nancy aims to leverage her STEM background to transition from retail into a technical sales or product specialist role within a technology or manufacturing firm. Over the next three to five
    years, she plans to earn certifications such as a Certified Sales Engineer and deepen her data analytics skills, positioning herself as a bridge between customers and product development teams. She
    aspires to advance into leadership, becoming a sales team lead or regional product manager, where she can blend her collaborative nature with assertiveness to drive performance. Achieving financial
    independence while maintaining a balanced work‑life schedule that accommodates her personal interests remains a core ambition.
