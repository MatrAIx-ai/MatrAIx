persona_description: An archaeologist interested in the study of pre-Columbian cultures in North America, particularly those from the Woodland period, which spanned from 1000 BCE to European contact in
  the eastern part of North America. The individual is knowledgeable about the various technological adaptations and cultural manifestations of the Woodland period, and is interested in the diversification
  of pottery forms, decorations, and manufacturing practices. They are also interested in the increasing use of horticulture and the development of the Eastern Agricultural Complex, and how these changes
  led to less mobile Eastern Woodlands peoples living in permanently occupied villages and cities.
