  career_goals: Although retired from formal employment, Dat aims to channel his experience into mentorship and community development. He aspires to establish a local STEM outreach program for middle‑school
    students, author a reflective book that combines his technical background with philosophical musings, and serve as an elder advisor for his cultural community. He also hopes to contribute to preserving
    and sharing South Asian artistic traditions in Texas, and to stay engaged in lifelong learning through workshops and collaborations.
