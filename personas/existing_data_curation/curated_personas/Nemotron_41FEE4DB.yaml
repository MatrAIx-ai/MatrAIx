personas:
  professional: Jessica Smyth, a dental and ophthalmic laboratory technician who blends meticulous craftsmanship with cutting‑edge CAD/CAM expertise, channels their competitive, skeptical nature into tightening
    quality‑control protocols, mentoring junior staff, and driving their lab toward a fully digital workflow despite a relaxed approach to scheduling.
  sports: Jessica Smyth clocks regular miles walking the Jersey Shore and joins a community 5K run group in the spring, while cheering for the New York Giants and the New Jersey Devils, and they occasionally
    play beach volleyball in the summer to stay active.
  arts: Jessica Smyth nurtures their creative side by attending monthly art exhibitions at the Montclair Art Museum, admiring the work of contemporary painter Yayoi Kusama, dabbling in pottery inspired
    by Bernard Leach, and unwinding with simulation games like The Sims, often drawing parallels between digital design and fine art.
  travel: Jessica Smyth prefers spontaneous weekend getaways to coastal towns like Cape May and Long Beach Island, while also dreaming of a carefully planned culinary tour of Tuscany, balancing their love
    for relaxation with a modest travel budget that still allows for a few annual foreign excursions.
  culinary: Jessica Smyth experiments with healthy cuisine, frequently preparing quinoa‑crusted salmon with a turmeric‑ginger glaze, avocado‑lime toast topped with hemp seeds, and kale chips seasoned with
    smoked paprika, while sourcing ingredients from farmers’ markets and testing new recipes from nutrition blogs.
  core: Jessica Smyth is a detail‑obsessed lab technician who balances a competitive drive with a laid‑back lifestyle, channeling stress into yoga, puzzles, and a relentless pursuit of digital perfection,
    even as their calendar often resembles a scattered crossword.
background:
  cultural: Jessica grew up in a suburban New Jersey community as a second-generation American of Irish and German descent. Raised in a modest Catholic household, she was taught the values of hard work,
    practicality, and self-reliance. Living near the Atlantic coast gave her a strong connection to local beach culture and community events such as county fairs and beach clean-ups. While she identifies
    with broader American cultural norms, she also cherishes family traditions around holidays and enjoys the diverse tapestry of Ocean County, which blends suburban, coastal, and multicultural influences
    into her everyday life.
attributes:
  skills: '[''Dental prosthesis fabrication'', ''Orthodontic appliance construction'', ''Ocular prosthetic fitting'', ''CAD/CAM software (3Shape, exocad)'', ''3D printing of dental appliances'', ''Material
