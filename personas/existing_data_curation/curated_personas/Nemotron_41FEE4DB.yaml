    training and mentorship'', ''Problem solving and troubleshooting'']'
  hobbies: '[''Coastal walking and birdwatching'', ''Cooking and recipe experimentation'', ''Reading popular science and medical journals'', ''Crossword puzzles and Sudoku'', ''DIY crafts (pottery, woodworking)'',
    ''Yoga and meditation'', ''Attending local art exhibitions'', ''Simulation video games (e.g., The Sims)'', ''Gardening'']'
  career_goals: Jessica aims to become a senior lab manager who leads a fully digital workflow and sets the benchmark for quality in her region. She plans to earn certifications such as Certified Dental
    Technician (CDT) and Certified Ophthalmic Assistant (COA), and to specialize in implant-supported prosthetics. Long-term, she envisions opening a boutique lab that offers customized, high-precision
    prosthetics while maintaining a flexible schedule that protects her family time and reduces stress. She also hopes to mentor a new generation of technicians, champion evidence-based adoption of emerging
    technologies, and gain recognition through industry awards for innovation and accuracy.
