  hobbies: '[''Sketching'', ''Photography'', ''Playing Acoustic Guitar'', ''Reading Fiction'', ''Volunteering at Community Soup Kitchen'', ''Organizing Block Parties'', ''Exploring Cleveland Metroparks'',
    ''Debate Club'', ''Creating TikTok Content on Art and Mental Health'', ''Cooking and Baking'']'
  career_goals: Tatiana envisions a future where she can blend her love for art with her drive to help others. She aims to pursue a college degree in arts administration or social work, ultimately becoming
    a program director for a community arts nonprofit that offers workshops and mentorship for at‑risk youth. She also dreams of creating a local youth center that uses creative expression—painting, music,
    and digital media—to foster emotional resilience and community cohesion. In the long term, she hopes to influence public policy that supports arts education and mental‑health services in schools across
    Ohio.
