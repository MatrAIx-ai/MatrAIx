  career_goals: Augustus aims to stay engaged, healthy, and useful in his community. He plans to volunteer as a mentor for youth and seniors at the local community center, spearhead a project to document
    Salamanca's industrial and Native American heritage, and cultivate a community garden where he can share his gardening expertise. He also wishes to deepen his digital literacy by learning to use cloud‑based
    archival tools and to author a memoir of his life experiences for his family and the local historical society.
