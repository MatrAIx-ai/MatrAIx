    and mindfulness meditation'', ''Experimental cooking'', ''Collecting vintage vinyl records'']'
  career_goals: Joyce aims to transition from day-to-day support to a role that leverages her experience as a mentor and thought leader. She plans to earn advanced certifications (ITIL, CompTIA Security+,
    and cloud credentials) and to spearhead a community tech‑training program for seniors and underrepresented groups in Dallas County. She also aspires to consult part‑time, helping small businesses streamline
    their IT operations with a focus on stress‑reduction and user‑friendly design. Ultimately, she hopes to be recognized as a top‑tier tech advisor who blends business insight with cutting‑edge technology,
    while maintaining the flexibility to pursue artistic interests and personal growth.
