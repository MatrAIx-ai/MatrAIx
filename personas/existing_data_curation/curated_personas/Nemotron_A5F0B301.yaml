personas:
  professional: Joyce Fletcher combines decades of hands‑on technical support expertise with a business degree to mentor senior staff and small business owners, thriving on spontaneous problem‑solving and
    critical evaluation, though they often wrestle with rigid deadlines due to a dislike of overly structured schedules.
  sports: Joyce Fletcher follows the local football team enthusiastically, plays casual tennis at a community senior league, and attends weekly salsa dancing classes, valuing the camaraderie and social
    interaction of group sports, though they sometimes prioritize socializing over rigorous training.
  arts: Joyce Fletcher frequently visits the city museum of art, captures urban scenes through street photography, creates watercolors of city skylines, and enjoys live jazz performances by artists like
    Esperanza Spalding, weaving these creative experiences into their daily routine, and they often credit these moments for keeping their tech work fresh.
  travel: Joyce Fletcher’s travel style blends spontaneous weekend getaways to music‑rich New Orleans with carefully planned cultural tours of Savannah’s historic districts and occasional trips to London’s
    heritage festivals, and they balance a modest retirement budget with a deep love for immersive experiences.
  culinary: Joyce Fletcher enjoys cooking Southern comfort dishes like gumbo and collard greens while also experimenting with Thai green curry and smoked paprika, and they showcase a moderate cooking skill
    that complements their penchant for discovering new flavors at eclectic local restaurants.
  core: Joyce Fletcher is a curious, art‑savvy tech mentor who channels spontaneous energy into community empowerment, yet they often battle deadline anxiety and occasional over‑spending on cultural indulgences.
background:
  cultural: Joyce grew up in a close‑knit African‑American community in Dallas, where church, soulful music, and community activism were central to family life. Her parents emphasized education and resilience,
    guiding her to pursue a business degree at a historically Black university. As a Black woman in tech, she has navigated both the challenges and the rich networks of the Dallas Black cultural scene,
    regularly supporting local Black artists, participating in the Dallas Black Cultural Center’s events, and volunteering for programs that bridge the digital divide for seniors. Her cultural identity
    informs her appreciation for art, her commitment to mentorship, and her drive to create inclusive technology solutions.
