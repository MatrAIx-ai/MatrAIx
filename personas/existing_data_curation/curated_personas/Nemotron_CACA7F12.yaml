  hobbies: '["Watercolor painting", "Woodworking", "Gardening", "Reading philosophy and local history", "Collecting vintage postcards", "Chess", "Volunteer garden coordination", "Writing memoirs and journaling"]'
  career_goals: Retired but still driven, Johnathan has set several meaningful goals that reflect his high standards and creative spirit. He aims to complete a richly illustrated memoir that intertwines
    his personal story with the history of Pine Grove, and to see it published through a local historical society. He plans to hold a small exhibition of his watercolor paintings, focusing on abstract interpretations
    of the Pennsylvania landscape. He wishes to earn the Certified Master Gardener designation, mastering sustainable horticultural practices and sharing them in a community-garden workshop he will lead
    at the senior center. In addition, he hopes to organize a quarterly woodworking and craft class for seniors, fostering skill-sharing and intergenerational mentorship. Recognizing his emotional sensitivity,
    he also intends to establish a peer-support group for older adults dealing with anxiety and sadness, using his listening and mediation abilities to create a safe space for sharing.
