personas:
  professional: Harold Richards blends a business degree with visual design expertise, excelling in UI/UX, brand development, and strategic design planning; their meticulous project‑management style and
    collaborative spirit drive on-time, high‑quality deliverables while mentoring junior designers toward a supportive studio culture.
  sports: Harold Richards leads a community basketball league in Fort Wayne, plays pick‑up games at the local YMCA, and follows the Indiana Pacers and Indianapolis Colts as a season ticket holder for the
    Pacers and a dedicated Sunday fan for the Colts, while regularly hiking Shades Shore State Park trails as part of their fitness routine.
  arts: Harold Richards enjoys exploring Midwestern art fairs and design meet‑ups, drawing inspiration from graphic designer Paula Scher, photographer Ansel Adams, and folk musician Sufjan Stevens; they
    host dinner parties featuring indie‑film screenings and often sketch in a leather‑bound notebook during museum visits.
  travel: Harold Richards prefers well‑planned road trips that blend brewery tours with scenic hikes, having mapped out a favorite route through the Great Lakes region with stops in Milwaukee, Grand Rapids,
    and Door County, while also dreaming of a summer vacation in the Black Forest to sample German craft beers and medieval towns.
  culinary: Harold Richards favors hearty Midwestern fare—such as pork tenderloin with apple‑butter glaze, chicken and wild‑rice soup, and a homemade sourdough pizza topped with heirloom tomatoes and locally
    sourced mozzarella—cooking with a confident hand yet occasionally over‑salting dishes when experimenting with new spice blends.
  core: Harold Richards is a pragmatic yet sociable design leader who balances meticulous project discipline with community‑focused creativity, all while indulging in craft‑brew adventures and DIY home
    makeovers.
background:
  cultural: Harold was raised in a Midwestern white American family deeply rooted in Fort Wayne, Indiana. His upbringing emphasizes practicality, strong work ethic, community involvement, and Midwestern
    hospitality. These cultural influences have shaped his preference for structure, collaborative spirit, and a balanced blend of disciplined business practice with approachable, compassionate design work.
