  career_goals: Harold aims to move into a senior creative leadership position—such as Creative Director or Design Manager—where he can shape design strategy while cultivating a supportive, high‑performing
    team culture. He also seeks to mentor emerging designers, spearhead community‑oriented design initiatives, and eventually launch his own boutique design studio that leverages his business acumen to
    deliver purposeful, client‑focused solutions.
