persona_description: A coastal scientist who specializes in the study of coastal erosion, storm events, and the impact of climate change on coastal communities. They use advanced geophysical techniques
  such as Ground Penetrating Radar (GPR) to reconstruct past coastal surfaces and understand the dynamics of coastal systems. They are interested in the evolution of coastal environments, the impact of
  extreme events such as storms and tsunamis, and the potential for future coastal change. They are also interested in the use of GPR in identifying and mapping historical and relict coastal features, such
  as buried channels and inlets, and the potential for using GPR to mitigate the impact of future storms on coastal communities. They are also interested in the use of GPR in understanding the dynamics
