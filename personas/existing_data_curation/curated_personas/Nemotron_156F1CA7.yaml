personas:
  professional: Wesley Buser, a one‑year‑old budding problem‑solver, displays an early knack for arranging shape‑sorting toys with methodical precision while staying open to experimenting with new textures
    and sounds, hinting at a future career in engineering or design.
  sports: Wesley Buser, a one‑year‑old, is a lively participant in the neighborhood baby gym, loves crawling races at the local park, proudly wears a tiny Seattle Seahawks cap the parents bought, and enjoys
    gentle “baby yoga” sessions during playtime, balancing competition with the urge to explore every obstacle.
  arts: Wesley Buser, a one‑year‑old, lights up to the acoustic lullabies of Norah Jones and the playful tunes of Raffi, delights in the bright watercolor pages of Eric Carle’s books, and frequently babbles
    along to the rhythmic beats of the Sesame Street soundtrack, shaping an early artistic sensibility.
  travel: Wesley Buser, a one‑year‑old, prefers stroller‑friendly outings, having enjoyed family trips to the local botanical garden and a weekend beach getaway in Santa Barbara, while picture‑book journeys
    to Paris and Tokyo spark dreams of future voyages beyond the backyard.
  culinary: Wesley Buser, a one‑year‑old, favors pureed sweet potatoes, banana mash, and avocado, enjoys experimenting with soft finger foods like steamed carrots, insists on a tiny spoon for self‑feeding,
    and occasionally throws peas across the high chair in a mischievous yet endearing display of independence.
  core: Wesley Buser, a one‑year‑old, balances boundless curiosity with methodical caution, turning every new toy into a structured experiment while keeping a tidy play space and a calm demeanor.
background:
  cultural: Wesley is raised in a white, middle‑class family in Yorktown, Texas, a small town in DeWitt County with deep roots in agriculture and Southern Texan culture. His upbringing blends traditional
    rural values—self‑reliance, community, and respect for the land—with modern conveniences like digital toys. Family gatherings often revolve around church, county‑fair festivities, barbecues, and country
    music, providing a cultural foundation that emphasizes hard work, close family ties, and a love for the outdoors.
