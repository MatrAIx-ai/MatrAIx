  hobbies: '[''Reading scientific journals'', ''Indoor herb gardening'', ''Cooking traditional Vietnamese dishes'', ''Puzzle solving (crosswords, sudoku)'', ''Walking in local parks'', ''Meditation and
    mindfulness'', ''Listening to classical music'', ''Nature photography'']'
  career_goals: Hoa aims to transition from community pharmacy to a clinical leadership role within a large health system. She plans to obtain Board Certification in Pharmacotherapy, develop expertise in
    pharmacogenomics, and eventually become a pharmacy manager overseeing medication safety programs. Long‑term, she aspires to launch a consultancy that provides medication therapy management services
    tailored to underserved Asian‑American populations and to contribute research on drug‑herb interactions prevalent in her cultural community.
