personas:
  professional: Sherry Bantle, a four-year-old aspiring architect, constructs elaborate block castles with meticulous organization yet adds whimsical, unconventional elements, reflecting their curious and
    balanced nature.
  sports: Sherry Bantle joins the Little Lions preschool soccer club, cheers for the Chicago Cubs on game nights, and spends afternoons on the playground swing set, mixing their love of competition with
    a preference for small-group play.
  arts: Sherry Bantle loves drawing bright dinosaurs, humming the tunes of Raffi, The Wiggles and Sesame Street, and attending weekly storytime with the librarian Miss Patel, reflecting their curiosity
    for new ideas and appreciation for artistic expression.
  travel: Sherry Bantle has visited Grandma's farm in Ohio and the family's weekend lake cabin, and dreams of seeing the Eiffel Tower in Paris, preferring carefully planned short trips with familiar faces
    over spontaneous long voyages.
  culinary: Sherry Bantle enjoys macaroni and cheese topped with peas, can whisk batter for banana pancakes unaided, yet insists on eating only chicken nuggets that are perfectly crisp, showcasing a mix
    of culinary curiosity and picky-eating quirks.
  core: Sherry Bantle is a four-year-old curious builder who balances meticulous organization with whimsical imagination, competitive play, and a quietly determined streak.
background:
  cultural: Sherry is raised in a white, middle‑class family in Shushan, a rural hamlet in Washington County, New York. Her family observes typical American traditions such as Thanksgiving, Christmas, Easter,
    and Halloween, often celebrating with church gatherings, potluck meals, and community fairs. The local culture emphasizes a close connection to the land, with seasonal activities like apple picking
    in fall, leaf‑collecting, and summer trips to nearby lakes. She attends a local preschool where she participates in small‑group activities, and she regularly visits the town library for storytime and
    craft sessions. These community experiences foster her appreciation for nature, art, and shared storytelling while reinforcing values of reliability, modest competition, and comfort with solitude.
attributes:
  skills: '[''fine‑motor coordination (drawing, coloring, using safety scissors)'', ''basic numeracy (counting to ten)'', ''pattern recognition'', ''simple problem solving (jigsaw puzzles)'', ''following
    multi‑step instructions'', ''empathetic listening'', ''organized yet flexible artistic expression'']'
  hobbies: '[''drawing and coloring'', ''watercolor painting'', ''collecting natural objects (leaves, stones, pinecones)'', ''listening to library storytime'', ''singing children’s songs'', ''building with
    blocks'', ''solitary imaginative play'']'
  career_goals: Sherry imagines herself as an artist who paints bright, whimsical pictures, a scientist who discovers hidden treasures in her backyard, or a teacher who shares stories with other children.
    She aspires to combine her love for art and curiosity about how things work, hoping to become the 'best' at drawing the most colorful pictures in her class and perhaps win a local kids' art contest.
    Her competitive streak fuels a desire to excel in any activity she pursues, while her appreciation for new ideas fuels a dream of exploring unconventional careers like an 'explorer of ideas' when she
    grows older.
