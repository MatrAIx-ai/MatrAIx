personas:
  professional: Prince Francillon, a retired handyman and lifelong community steward, blends meticulous carpentry, garden expertise, and event‑coordinating skills to mentor neighbors and keep the local
    church’s facilities in top shape, and they approach every project with a methodical, community‑first mindset.
  sports: Prince Francillon, an avid fisherman and weekend walker, enjoys early‑evening casts at Lake Marion, follows the Clemson Tigers football team and the Charleston Battery soccer club, and they participate
    in a senior bowling league at the local community center, maintaining a modest but steady fitness routine.
  arts: Prince Francillon, a dedicated member of the church choir, finds solace in listening to gospel legends like Mahalia Jackson and blues icons such as B.B. King, often sharing stories of local musicians
    at community gatherings, and they occasionally attend the annual Charleston Blues Festival, which fuels their love for oral storytelling.
  travel: Prince Francillon, a lover of modest road trips, has driven the scenic byways to historic Charleston to explore Gullah culture sites, trekked the Blue Ridge Mountains for a weekend of nature photography,
    and they dream of a future pilgrimage to New Orleans to experience its vibrant music scene, all while balancing a limited travel budget and health considerations.
  culinary: Prince Francillon, a seasoned cook of soul‑food classics, prepares collard greens seasoned with smoked turkey, sweet potato pie spiced with nutmeg, and black‑eyed pea salads with a modern twist
    of quinoa, and they delight in tweaking recipes for lower sodium while never compromising on the comforting flavors of their heritage.
  core: Prince Francillon embodies a practical curiosity, quietly weaving tradition and innovation into community service, gardening, cooking, and storytelling, all while juggling meticulous budgeting and
    a lingering worry about health.
background:
  cultural: Prince Trevor is an African‑American who grew up in the rural Black Belt of South Carolina during the civil‑rights era. His upbringing was steeped in the traditions of the local church, family
    gatherings, and a strong sense of community resilience. He carries forward the oral storytelling tradition of his ancestors, preserving family lore and local history. His culinary skills reflect the
    soul‑food heritage of the region, and his involvement in church and community events underscores the central role of the Black church in fostering social bonds and mutual support. Trevor’s cultural
    identity blends respect for long‑standing customs with a quiet curiosity about new ideas, which he integrates into his daily life.
