personas:
  professional: Abigail Edwards, a seasoned liberal‑arts professor at a mid‑sized university, blends rigorous curriculum design with student‑centered, technology‑enhanced pedagogy; they are pioneering an
    interdisciplinary minor that weaves visual arts, literature, and digital media while mentoring junior faculty and championing innovative teaching grants.
  sports: Abigail Edwards enjoys low‑impact fitness, joining a local senior walking club that meets on the river trail every Saturday, occasionally playing a weekly gentle tennis match at the community
    center, and follows the hometown baseball team, the River City Royals, cheering quietly from the stands; they find the rhythmic step of walking a perfect complement to their reflective temperament.
  arts: Abigail Edwards cultivates an intimate artistic life, painting watercolors inspired by Monet and O’Keeffe, journaling to the rhythm of Debussy’s Clair de Lune, composing piano pieces reminiscent
    of Philip Glass, and regularly attending recitals featuring violinist Hilary Hahn; they also immerse themselves in contemporary poetry by Ocean Vuong and photography by Ansel Adams.
  travel: Abigail Edwards prefers slow, contemplative travel, favoring weekend train trips to historic towns like Oxford and Salzburg where they can wander museums and gardens, while planning a long‑awaited
    pilgrimage to the ancient temples of Kyoto; they balance modest retirement savings with a love for cultural immersion, often choosing boutique B&Bs over crowded hotels.
  culinary: Abigail Edwards delights in herb‑forward cooking, frequently preparing dishes such as rosemary‑infused grilled salmon, ratatouille with fresh basil from the garden, and lavender honey scones,
    and they enjoy pairing meals with crisp Pinot Grigio; they admit to over‑indulging in artisanal cheese platters during gallery openings.
  core: Abigail Edwards is a quietly imaginative scholar who weaves art into academia, balances disciplined finances with occasional splurges on creative tools, manages health with a blend of medicine and
    garden remedies, and they often find solace in solitary walks, watercolor hues, and well‑planned cultural journeys.
background:
  cultural: Abigail was born and raised in Central Tennessee, growing up in the rolling hills and close-knit communities of the region. Her family lineage extends back several generations to early 20th-century
    settlers in Middle Tennessee, embedding her in the Southern storytelling tradition, folk music, and a deep appreciation for the natural landscape. While identifying with the broader White Anglo-American
    heritage of the South, her upbringing emphasized modesty, self-reliance, and a reverence for the arts, particularly Southern literature and visual art. Living in Franklin, a historic town known for
    preserving its heritage, she participates in local cultural events, supports community-based arts initiatives, and balances Southern hospitality with a reflective, solitary disposition.
attributes:
  skills: '[''Curriculum development for liberal arts courses'', ''Instructional design using LMS platforms'', ''Creative writing instruction'', ''Art history and visual culture analysis'', ''Facilitating
    critical-thinking workshops'', ''Academic advising and mentorship'', ''Research on innovative teaching methods'', ''Adult learning theory application'', ''Interdisciplinary program development'', ''Public
    speaking and seminar leadership'']'
  hobbies: '[''Watercolor painting'', ''Reading contemporary poetry and speculative fiction'', ''Classical piano practice'', ''Nature walks and birdwatching'', ''Journaling and creative writing'', ''Abstract
    photography'', ''Herb and flower gardening'', ''Visiting local art galleries and historic museums'']'
  career_goals: Abigail aims to design and launch an interdisciplinary minor that merges visual arts, literature, and digital media, fostering creative synthesis among students. She hopes to publish a collection
    of essays exploring the intersection of imagination and pedagogy, and to secure a grant for a pilot program that uses immersive technologies to teach abstract concepts. In the longer term she plans
    to mentor emerging faculty, expand community-outreach art workshops for seniors, and eventually transition to a part-time advisory role that allows her to continue influencing curricula while preserving
    her time for independent scholarship.
