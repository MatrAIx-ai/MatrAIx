persona_description: A geologist or a researcher in the field of Quaternary Science who is interested in the study of ice sheets, sea level rise, and the dynamics of the cryosphere. This individual is likely
  to be knowledgeable about the Palaeo constraints on sea level rise (PALSEA) working group and the special issue of Quaternary Science Reviews, which focuses on the timescale of glaciations during the
  late Pliocene, the magnitude of ice-sheet fluctuations and volume leading up to and during the last glacial maximum, the timing and persistence of ice-sheet impacts on deglacial and future relative sea-level
  change, and relative sea-level change during peak interglacial climate. The persona is also likely to be interested in the more dynamic cryosphere under both late Pliocene and last glacial cycle climate
  conditions, and in the fluctuations in relative sea-level change during the last deglaciation and peak interglacial conditions.
