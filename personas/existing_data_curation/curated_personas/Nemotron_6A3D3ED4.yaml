  hobbies: '[''sketching and drawing'', ''digital painting'', ''photography of natural landscapes'', ''hiking local trails'', ''reading graphic novels'', ''listening to indie and alternative music'', ''playing
    ukulele'', ''creating short video blogs'', ''attending community art workshops'', ''exploring new cuisines'']'
  career_goals: In the short term, Sonia aims to complete her high‑school education (or earn a GED) while building a strong portfolio of artwork and digital projects. She plans to take online courses in
    advanced illustration and graphic design, and to seek a mentorship or internship at a local art studio. Long‑term, she envisions a career as a freelance visual storyteller—working as an illustrator,
    graphic designer, or multimedia content creator—where she can blend her love of art, technology, and cultural narratives. She hopes to eventually travel, document diverse cultures through her art, and
    perhaps collaborate with indie game developers as a concept artist.
