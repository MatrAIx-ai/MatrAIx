personas:
  professional: Sonia Theodorakis, an aspiring visual storyteller, blends sketchbook doodles, digital illustration in Photoshop and Canva, and narrative writing to craft compelling storyboards while juggling
    high‑school coursework, a growing portfolio, and a search for mentorship at a local art studio.
  sports: Sonia Theodorakis enjoys weekend hikes in the Wasatch foothills, participates in a school cross‑country team, follows Real Salt Lake in MLS and the Utah Jazz, and belongs to a local climbing club
    that meets at a nearby indoor wall, using a mix of cardio runs and yoga to stay fit.
  arts: Sonia Theodorakis immerses herself in indie music from Tame Impala, Mitski, and Phoebe Bridgers, draws inspiration from graphic novels like Saga and the artwork of Loish, and frequently visits the
    Utah Museum of Contemporary Art and local art fairs to soak up contemporary visual influences.
  travel: Sonia Theodorakis dreams of photographing sunrise over Crete’s white‑washed villages while also planning a summer road‑trip to Zion and Bryce Canyon, balancing a backpack‑light approach with school
    deadlines and a limited budget that steers her toward affordable hostels and volunteer‑based travel programs.
  culinary: Sonia Theodorakis loves cooking family Mediterranean dishes such as spanakopita with feta, dill, and spinach, experimenting with fresh olives and lemon zest, while also whipping up quick veggie‑laden
    ramen bowls and baking chocolate chip cookies during late‑night study sessions.
  core: Sonia Theodorakis is a curious teen artist who balances creative bursts with scattered organization, indulges in spontaneous art supplies splurges, and channels her heritage’s communal cooking into
    vivid visual storytelling.
background:
  cultural: Sonia grows up in Woods Cross, Utah, a suburban community framed by the Wasatch Range. Her family maintains Greek‑American traditions, celebrating holidays with homemade spanakopita, sharing
    stories of their ancestors, and playing Greek music at family gatherings. At the same time, the local culture emphasizes outdoor recreation, volunteerism, and close‑knit community events, which have
    shaped her appreciation for nature, collaboration, and flexible, experience‑driven learning. This blend of Greek heritage and Utah’s intermountain lifestyle informs her values of creativity, independence,
    and connection to both people and place.
attributes:
  skills: '[''digital illustration'', ''sketching'', ''photography'', ''basic graphic design (Adobe Photoshop, Canva)'', ''content creation for social media'', ''creative writing'', ''storyboarding'', ''collaborative
