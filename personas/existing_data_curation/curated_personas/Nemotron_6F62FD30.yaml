  hobbies: '[''Reading historical and technology non‑fiction'', ''Vegetable gardening'', ''Hiking local trails'', ''Woodworking'', ''Acoustic guitar playing'', ''Small‑group book club'']'
  career_goals: Narriman aims to advance from a front‑line sales representative to a regional sales manager within the next three years, leveraging his organized, methodical style to lead a small, high‑performing
    team. He seeks to deepen his expertise in enterprise service solutions and acquire certifications in solution architecture, positioning himself for a future role as a director of sales operations. Additionally,
    he wants to develop a balanced work routine that reduces stress, such as delegating tasks and implementing efficient time‑management practices, thereby enhancing both personal well‑being and professional
    performance.
