personas:
  professional: A diligent IT services sales specialist, Narriman Johns leverages consultative selling, meticulous pipeline management in Salesforce, and a calm, harmony‑focused demeanor to build lasting
    client relationships while navigating the pressures of ambitious targets.
  sports: An outdoor enthusiast, Narriman Johns hikes the rolling Osage County trails with the local Osage Trails Club, follows the Oklahoma City Thunder and Dallas Cowboys closely, and occasionally joins
    a pickup basketball game at the community center.
  arts: An avid reader and acoustic‑guitar player, Narriman Johns enjoys evenings with the works of Doris Kearns Goodwin and Malcolm Gladwell, strums folk classics by Bob Dylan and Gillian Welch, and refines
    woodworking skills while listening to blue‑grass legend Bill Monroe.
  travel: Methodical and budget‑conscious, Narriman Johns prefers well‑planned road trips to nearby natural sites—such as weekend hikes in Yellowstone and family pilgrimages through the historic towns of
    the Texas Hill Country—while dreaming of an Icelandic adventure to witness geysers and the northern lights.
  culinary: A modest home chef, Narriman Johns tends a vegetable garden of tomatoes, sweet corn, and heirloom carrots, enjoys crafting rustic roasted vegetable medleys and hearty chicken pot pie seasoned
    with rosemary and thyme, and treats themselves to an occasional steak‑fry or local barbecue rib plate.
  core: Narriman Johns is a diligent, quiet achiever who balances a relentless curiosity for history and technology with a cautious, methodical lifestyle, often wrestling with worry‑driven insomnia but
    finding solace in gardening, woodworking, and soulful folk tunes.
background:
  cultural: Narriman grew up in a small‑town, white Midwestern family in Oklahoma, where community values, self‑reliance, and a pragmatic work ethic are emphasized. His upbringing was shaped by the modest,
    close‑knit culture of Bartlesville and the surrounding Osage County, where local traditions blend Midwestern customs with an awareness of the neighboring Osage Nation’s heritage. He was raised in a
    modest evangelical Protestant household that instilled a sense of service, kindness, and respect for others, while also encouraging practical problem‑solving and personal responsibility. These cultural
    influences have reinforced his methodical, reliable nature and his desire to maintain harmonious relationships both at work and in his personal life.
