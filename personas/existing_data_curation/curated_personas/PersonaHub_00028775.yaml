persona_description: A physicist who specializes in fluid dynamics, particularly the study of the interaction between moving and stationary fluid volumes. They have experience in applying Newton's Second
  Law of Motion to fluid mechanics and have a keen interest in the mechanics of plumes and their impact on the dispersion of silt or algii in a pond. They have a strong background in mathematics and physics,
  and are skilled in solving problems using the governing equations for fluid mechanics. They are also interested in exploring the effects of flow rate and nozzle configuration on the dispersion rate.
