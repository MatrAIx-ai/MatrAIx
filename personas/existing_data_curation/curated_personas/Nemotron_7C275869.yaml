  hobbies: '[''Skiing'', ''Snowshoeing'', ''Mountain Hiking'', ''Woodworking'', ''Reading Historical Nonfiction'', ''Community Theater'', ''Volunteering at Senior Center'', ''STEM Outreach Mentoring'',
    ''Historical Society Participation'']'
  career_goals: In retirement, William aims to leverage his expertise to support the local community and the next generation of engineers. He seeks to mentor high school and college students through STEM
    outreach programs, assist the town’s planning commission with sustainable infrastructure projects, and document his professional experiences in a memoir that highlights engineering best practices. He
    also hopes to continue learning emerging technologies such as renewable energy systems and apply his disciplined approach to volunteer leadership roles that enhance the quality of life for seniors in
    Silverthorne.
