  hobbies: '[''Gardening'', ''Woodworking'', ''Chess'', ''Reading (historical fiction and engineering journals)'', ''Cooking Cuban cuisine'', ''Listening to Cuban music'', ''Walking in local parks'', ''Volunteering
    at senior center'', ''Attending small cultural gatherings'']'
  career_goals: In the next few years, Johan aims to transition from full‑time site management to a senior advisory role where he can shape policy‑driven infrastructure projects that prioritize resilience
    to flooding and aging populations in Bergen County. He hopes to mentor a new generation of engineers through workshops at the local community college, and to serve on the board of a regional engineering
    society to promote ethical, community‑focused practice. Ultimately, he wants to leave a legacy of safer, more sustainable public works that improve quality of life for his neighbors while still maintaining
    a flexible schedule that allows him to spend more time with his family.
