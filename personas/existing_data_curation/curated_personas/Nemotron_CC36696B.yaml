personas:
  professional: Johan Alvarez, a senior civil engineer with three decades of experience in structural analysis, bridge design, and BIM coordination, leverages his curiosity and safety‑first mindset to champion
    resilient, flood‑ready public works while mentoring junior staff in a quietly disciplined, community‑oriented way.
  sports: Johan Alvarez enjoys low‑impact fitness by playing weekly pickleball at the senior center, cheerfully roots for the New York Giants during football season, follows the New York Yankees as a devoted
    baseball fan, and maintains a daily park‑walk routine with his spouse to stay active.
  arts: Johan Alvarez regularly listens to classic salsa groups like the Buena Vista Social Club and the vibrant trumpet lines of Arturo Sandoval, attends occasional performances of the local community
    theater, and appreciates paintings by early 20th‑century Caribbean artists, which together nourish his sense of identity.
  travel: Johan Alvarez prefers well‑planned, relaxed trips that blend cultural immersion with family time, having already toured Old San Juan’s cobblestone streets and the historic plazas of Seville, and
    now dreams of a quiet river cruise through the Douro Valley, all while balancing a modest retirement budget and his commitments at home.
  culinary: Johan Alvarez, an avid home cook, delights in preparing traditional dishes such as ropa vieja, tostones, and arroz con pollo, often incorporating fresh tomatoes, cilantro, and plantains from
    his backyard garden, and relishes sharing these meals with close friends over a modest cup of café con leche.
  core: Johan Alvarez balances a meticulous, safety‑driven engineering career with a quiet love of gardening, woodworking, and community cooking, all while wrestling with a tendency to over‑worry and a
    steadfast commitment to family and neighborhood harmony.
background:
  cultural: Johan was born to Cuban parents who fled Havana during the early 1970s. Raised in a bilingual household, he spent his early childhood immersed in Cuban traditions—music, food, and the strong
    emphasis on family solidarity (familismo). After moving to the United States for college, he settled in New Jersey, where he blended his Cuban heritage with the local community’s values. He remains
    fluent in Spanish, celebrates Cuban holidays such as Día de la Independencia with his family, and actively participates in the modest Cuban diaspora network in Bergen County. This cultural grounding
    informs his compassionate outlook, his desire to give back through community projects, and his preference for close‑knit social circles.
