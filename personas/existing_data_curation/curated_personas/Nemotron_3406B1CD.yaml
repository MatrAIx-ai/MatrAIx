personas:
  professional: Alan Kutner, a 15-year-old high school sophomore, channels their curiosity and methodical nature into a budding career as a junior electronics enthusiast, designing Arduino experiments and
    crafting 4-H agricultural gadgets while reliably collaborating with peers in the school robotics club.
  sports: Alan Kutner, a 15-year-old athlete, stars on their school's varsity soccer and basketball squads, models their play after LAFC's quick-passing style and the Golden State Warriors' fast-break tactics,
    and adheres to a structured fitness routine that includes daily stretching, strength drills, and scheduled rest to mitigate the occasional sprained ankle.
  arts: Alan Kutner, a 15-year-old choir member, delights in harmonizing to Eric Whitacre's choral pieces, fuels creative breaks by listening to Imagine Dragons and Billie Eilish, and draws inspiration
    from Pixar's storytelling to enhance their own musical expression.
  travel: Alan Kutner, a 15-year-old travel enthusiast, has explored the county fair and the Smithsonian Air and Space Museum on school trips, dreams of a summer road-trip to Silicon Valley and a cultural
    excursion to Kyoto, and meticulously budgets each outing using a spreadsheet to balance family constraints with wanderlust.
  culinary: Alan Kutner, a 15-year-old with a budding palate, alternates between grabbing pepperoni pizza after basketball practice, whipping up chicken quesadillas and strawberry-banana smoothies at home,
    and occasionally experiments with fresh corn and carrot salads harvested from their 4-H garden.
  core: Alan Kutner, a 15-year-old tech-tinkerer and team-spirit athlete, meticulously color-codes their gaming PC cables while secretly fearing missed assignments, turning anxiety into a relentless drive
    for flawless organization.
background:
  cultural: Alan grew up in Charleston, Illinois, a small Midwestern town with deep agricultural roots and a close‑knit community. His family, who have lived in the area for several generations, embodies
    Midwestern values of hard work, self‑reliance, and community service. Local culture emphasizes participation in school events, county fairs, and church activities; Alan attends a Protestant congregation
    that stresses fellowship and volunteerism. These influences have shaped his sense of responsibility, cooperation, and practical outlook, while also fostering a desire to contribute positively to his
    community and maintain the modest, dependable lifestyle typical of his region.
