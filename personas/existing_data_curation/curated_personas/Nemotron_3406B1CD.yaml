  career_goals: Alan aims to finish his secondary education by obtaining a GED within the next two years, then enroll in a community‑college technical program focused on automotive technology or mechanical
    engineering. He envisions a hands‑on career that blends his curiosity about how things work with his practical problem‑solving skills, such as becoming an automotive technician, CNC machinist, or robotics
    technician. In the short term, he hopes to secure a part‑time apprenticeship at a local auto shop to gain real‑world experience, save money for further schooling, and build a professional network. Alan
    also dreams of helping start a youth robotics club at his school, combining his leadership, cooperation, and passion for technology.
