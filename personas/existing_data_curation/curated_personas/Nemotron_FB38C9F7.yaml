personas:
  professional: Teresa Alcantar, a veteran housekeeping supervisor with three decades of hands‑on experience in hotel and senior‑care facilities, combines relentless curiosity about eco‑friendly cleaning
    technologies with a practical, data‑driven approach to scheduling, safety compliance, and staff mentorship, balancing meticulous organization with the flexibility to adapt on the fly while skeptically
    negotiating vendor contracts to secure the best value, and they consistently mentor bilingual staff toward leadership.
  sports: Teresa Alcantar embraces low‑impact fitness through daily walks along the Katy Trail, often joining a local walking club that logs mileage against other seniors, and shows spirited support for
    the Houston Astros and Houston Dynamo, occasionally entering friendly step‑count challenges that feed their competitive streak, and they view each walk as both exercise and meditation.
  arts: Teresa Alcantar finds inspiration in the lively sounds of norteña and banda legends like Los Tigres del Norte and Banda El Recodo while crocheting blankets for charity, savors historical fiction
    by authors such as Arturo Pérez‑Reverte, and contributes as a choir usher at their parish, where moderate sociability and love of tradition shape artistic engagement, and they often share favorite playlists
    with neighbors.
  travel: Teresa Alcantar prefers thoughtfully planned road trips with their husband, favoring destinations like the Hill Country vineyards of Fredericksburg, the historic pueblo of San Antonio, and the
    cultural festivals of New Orleans, while dreaming of a future pilgrimage to a Day of the Dead celebration abroad, balancing budget consciousness with a yearning for immersive experiences, and they keep
    a travel journal to record each adventure.
  culinary: Teresa Alcantar cultivates a modest vegetable patch of tomatoes, chilies, and cilantro, channeling those fresh ingredients into family‑style mole, tamales, and salsa verde, whose aromatic complexity
    they perfect with a pinch of cumin and epazote, showcasing a solid cooking skill that blends tradition with occasional experimental twists, and they often host neighborhood potlucks to share the bounty.
  core: Teresa Alcantar is a pragmatic, curiosity‑driven housekeeping veteran who balances meticulous organization with flexible problem‑solving, mentors bilingual staff, saves aggressively for their future,
    and relishes garden‑fresh cooking, morning banda music, and daily walks, and they embody a quiet competitive spirit.
background:
  cultural: Teresa was born to Mexican immigrant parents who settled in Texas’s Rio Grande Valley before moving to the Houston suburbs. Her upbringing fused Mexican family traditions—celebrations of Día
    de los Muertos, quinceañeras, and holiday feasts—with the bilingual, close‑knit community life of Katy, Texas. She grew up speaking Spanish at home and English at school, giving her a natural fluency
    that informs her supervisory style. Deeply rooted Catholic values shape her sense of responsibility, hospitality, and service to others. Teresa’s Mexican heritage also colors her culinary tastes, festive
    customs, and preference for music that rhythms her daily routine. While fully integrated into the multicultural fabric of Harris County, she remains a cultural ambassador, often sharing her heritage
    through food, language, and community events.
