  career_goals: Teresa aims to leverage her practical curiosity by becoming a regional housekeeping manager for a multi‑property hospitality group in the Greater Houston area. She plans to earn the Certified
    Executive Housekeeper (CEH) credential within the next two years and to pilot a sustainability program that reduces chemical usage by 30 % across all sites she oversees. Concurrently, she is passionate
    about mentoring the next generation of supervisors, especially bilingual women, and hopes to develop a formal apprenticeship curriculum for entry‑level custodial staff. Long‑term, she envisions transitioning
    to a consultancy role that advises facilities on safety compliance, workforce empowerment, and cost‑efficient cleaning innovations, allowing her to secure a comfortable retirement while remaining professionally
    active.
