  hobbies: '[''Beachcombing'', ''Kayaking'', ''Volunteer work at animal shelter'', ''Local historical society involvement'', ''Community theater'', ''Gardening'', ''Yoga'', ''Cooking seafood dishes'', ''Hosting
    potluck gatherings'', ''Reading mystery novels'', ''Playing board games'']'
  career_goals: Gwendolyn aims to transition into a part‑time role in community outreach or tourism, leveraging her event‑planning experience and local knowledge. She plans to complete a certification in
    hospitality management and explore opportunities as a community liaison for the Somers Point Boardwalk Association. Long‑term, she dreams of launching a small business offering curated beach‑themed
    crafts and guided local tours, combining her creativity with her passion for the coastal community.
