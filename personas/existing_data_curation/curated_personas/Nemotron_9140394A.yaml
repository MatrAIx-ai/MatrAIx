  career_goals: Chris aims to deepen his expertise in test automation and earn an ISTQB Advanced Test Analyst certification within the next two years. He envisions moving into a Software Development Engineer
    in Test (SDET) role, where he can combine his coding skills with quality engineering practices. In the longer term (5‑7 years), he hopes to lead a small QA team or serve as a product quality champion
    for a company that values innovative design and user experience. He also plans to pursue a bachelor’s degree in Computer Science, explore AI‑driven testing tools, and eventually mentor junior testers,
    sharing his curiosity for new ideas and unconventional problem‑solving approaches.
