  career_goals: Wayne aims to advance to senior audit manager within the next three years, positioning himself for eventual partnership at a regional CPA firm or a CFO role in a mid-size enterprise. He
    is motivated to develop a niche practice in forensic accounting and data-driven audit methodology, seeking to publish articles in professional journals and present at industry conferences. Additionally,
    he aspires to mentor junior accountants from underrepresented backgrounds, using his own journey to promote diversity in the accounting profession.
