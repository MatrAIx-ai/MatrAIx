personas:
  professional: Jocelyn Onkey is a compliance officer with over two decades of experience navigating OSHA, EPA, and financial reporting regulations, who blends a meticulous analytical mindset with a natural
    flair for social interaction; they lead internal audits using MetricStream and SAP GRC, translate data trends into actionable Power BI dashboards, and excel at delivering persuasive training sessions
    that keep colleagues engaged, all while steering cross‑departmental projects with a balanced mix of organization and flexibility.
  sports: Jocelyn Onkey is a regular on the Red River walking trail, logging three‑mile strolls three times a week and joining a seasonal fishing club that meets every Saturday for catfish trips on the
    nearby lake; they cheer for the Dallas Cowboys on Sundays, follow the Texas Rangers in the summer, and occasionally play pick‑up volleyball at the community center, balancing competitive spirit with
    a laid‑back love of the outdoors.
  arts: Jocelyn Onkey thrives in the regional theater where they alternate between playing lead roles in productions of August Wilson’s 'Fences' and coordinating set changes backstage, while also serving
    as a moderator in a book club that dissects contemporary fiction like Colson Whitehead’s 'The Underground Railroad' and leadership non‑fiction such as Brené Brown’s 'Dare to Lead'; their artistic palate
    includes a fondness for live jazz at the local blues bar while sipping on a classic mint julep.
  travel: Jocelyn Onkey prefers purposeful travel that blends cultural immersion with relaxation, having spent a long weekend exploring the historic French Quarter of New Orleans, a weekend retreat at the
    Hill Country vineyards in Texas, and a recent solo road trip along the Texas Gulf Coast to catch sunrise at Padre Island; they favor a mix of detailed itineraries for museum visits and spontaneous detours
    to local diners, always budgeting enough to keep the compliance seminars they run back home.
  culinary: Jocelyn Onkey cooks Southern comfort food with a health‑conscious twist, frequently turning fried catfish into oven‑baked fillets seasoned with smoked paprika and almond flour, swapping traditional
    white gravy for a cauliflower‑based sauce, and mastering dishes like shrimp and grits enriched with quinoa and kale; they love the aroma of fresh rosemary and sweet onions, and often showcase these
    creations in community center workshops that attract a lively crowd.
  core: Jocelyn Onkey blends a compliance‑driven analytical mind with a gregarious love for theater, cooking, and community, navigating health quirks and occasional impulse buys while staying grounded in
    organized flexibility and a zest for helping others.
background:
  cultural: Jocelyn grew up in a modest, middle‑class White family in the Deep South, where church gatherings, community picnics, and Southern hospitality were everyday norms. Raised in a Baptist household,
    she internalized values of respect, modesty, and service to others, which continue to shape her collaborative and considerate approach at work. Living in Bossier City, she has absorbed Louisiana’s eclectic
    cultural mix—enjoying Cajun cuisine, local music festivals, and the region’s blend of Southern and Creole traditions. Her experience as a divorced mother in a close‑knit community has reinforced her
    independence and her commitment to fostering supportive relationships.
attributes:
  skills: '[''Regulatory analysis'', ''Risk assessment'', ''Policy development'', ''Internal audit management'', ''Compliance software (MetricStream, SAP GRC)'', ''Data analysis (Excel, Power BI)'', ''Stakeholder
