  hobbies: '[''Book club participation'', ''Cooking and hosting workshops'', ''River walks and fishing'', ''Community theater acting and stage management'', ''Mentoring at‑risk youth'', ''Organizing small‑business
    compliance seminars'']'
  career_goals: Jocelyn aims to move from her current role as a compliance officer to a senior compliance manager position within the next three years, ultimately positioning herself as a director of compliance
    for a regional energy or manufacturing firm. She plans to earn the Certified Compliance & Ethics Professional (CCEP) credential and deepen her expertise in emerging regulatory technologies such as AI‑driven
    monitoring tools. Her ambition includes building a mentorship program for junior compliance staff, fostering a culture of ethical decision‑making across the organization, and contributing thought leadership
    at industry conferences in the Gulf Coast region. Balancing career advancement with personal well‑being, she also seeks a role that allows her to maintain flexible hours to support her community involvement.
