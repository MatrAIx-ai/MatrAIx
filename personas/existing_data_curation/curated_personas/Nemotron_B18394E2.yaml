  career_goals: Katelyn aims to advance to a senior leadership role such such as Audit Practice Manager or CFO within a regional firm, where she can shape audit strategy and drive ethical financial practices.
    She also hopes to expand her mentorship program for junior accountants and to establish a community advisory board that guides local non-profits on sound financial management.
