personas:
  professional: Katelyn Mckenzie is a senior accountant with deep expertise in financial reporting, tax compliance, audit procedures, and internal control design, who leverages advanced Excel, data visualization,
    and ERP systems to lead precise projects and mentor junior staff, and they blend curiosity for new tools with a methodical, organized approach to shape audit strategy and drive ethical practices.
  sports: Katelyn Mckenzie is an avid hiker on the Appalachian trails, a regular participant in the Charleston Pickleball Club, and a devoted fan of the West Virginia Mountaineers football and the Charleston
    Dirty Birds baseball team, and they schedule weekend runs and yoga sessions to stay energetic and balanced.
  arts: Katelyn Mckenzie actively engages in the local book club, sings in the church choir, and captures West Virginia scenery through photography, drawing inspiration from folk musicians Rhiannon Giddens
    and The Avett Brothers as well as novelist Alice Walker, and they often discuss artistic themes at community gatherings.
  travel: Katelyn Mckenzie prefers well‑researched road trips, meticulously planning weekend escapes to Shenandoah National Park, the Great Smoky Mountains, and occasional visits to Asheville's arts district,
    while dreaming of a cultural tour of the Irish Midlands, and they balance travel costs with a modest travel fund to support their family and volunteer commitments.
  culinary: Katelyn Mckenzie enjoys cooking traditional Appalachian fare such as soup beans, cornbread, and apple stack cake, skillfully using ingredients like sorghum, heirloom tomatoes, and locally foraged
    mushrooms, and they often host potluck dinners for the book club and choir, while occasionally indulging in a takeout pizza as a guilty pleasure.
  core: Katelyn Mckenzie blends analytical precision with heartfelt community service, habitually juggling spreadsheets and garden plots, and they never miss a Sunday choir rehearsal, though they have a
    secret habit of snoozing the alarm twice every morning.
background:
  cultural: Katelyn grew up in a close-knit Appalachian community in West Virginia, rooted in a heritage of English and Scottish settlers. Her upbringing emphasized self-reliance, hospitality, and community
    service, traditions she carries into her adult life. She identifies with the cultural values of the Appalachian region—practicality, storytelling, and a strong sense of place—while also embracing broader
    American folk traditions and a supportive, inclusive church community.
