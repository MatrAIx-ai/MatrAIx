personas:
  professional: Ashley Booker, an aspiring multimedia storyteller, blends sketching the St. Louis skyline, digital music production, and short‑fiction writing into a cohesive creative practice, applying
    the analytical rigor of debate club to craft unconventional narratives that reflect their curious, organized yet flexible mindset.
  sports: Ashley Booker, a fan of the St. Louis Cardinals and St. Louis Blues, enjoys watching baseball and hockey games on weekends, participates in school soccer during the fall season, and occasionally
    climbs at a local bouldering gym, balancing competitive spirit with a laid‑back approach to fitness.
  arts: Ashley Booker, an avid visitor of the Contemporary Art Museum, draws inspiration from artists such as Yayoi Kusama and Banksy, creates playlists featuring Björk, Aphex Twin, and Sufjan Stevens,
    and writes short stories that echo the narrative twists of Neil Gaiman, weaving visual and auditory influences into their personal aesthetic.
  travel: Ashley Booker, who has road‑tripped to Austin for the South by Southwest festival and taken a weekend train ride to Chicago’s Art Institute, dreams of exploring Kyoto’s cherry‑blossom gardens
    and Barcelona’s modernist architecture, preferring curated itineraries that blend cultural immersion with opportunities for photography.
  culinary: Ashley Booker, who delights in the tangy crunch of toasted ravioli, the cheesy pull of St. Louis‑style pizza, and experimenting with homemade ramen broth seasoned with miso and pork, frequently
    crafts avocado toast topped with radish sprouts and enjoys blending tropical fruits into smoothies for post‑yoga refuel.
  core: Ashley Booker, a curious teen who fuses art, debate, and mindfulness to navigate frequent worries, often over‑organizes sketchbooks while forgetting to silence phone notifications during study sessions.
background:
  cultural: Ashley comes from a White, Midwestern family rooted in St. Louis, Missouri. Her upbringing reflects a blend of traditional American holidays—like Thanksgiving and Christmas—and the city’s rich
    cultural tapestry, including exposure to blues, jazz, and local theater. Her parents, who value education and community involvement, encourage her curiosity and artistic pursuits. Growing up near the
    Gateway Arch and the historic neighborhoods of St. Louis, she internalizes a sense of pride in the city’s history while embracing its diverse artistic expressions. This background nurtures her appreciation
    for both conventional values and unconventional, creative thinking.
