  career_goals: Ashley aspires to turn her love for art and new ideas into a career that blends creativity with impact. She envisions studying visual arts or graphic design at a university, eventually working
    as a multimedia storyteller for museums, cultural nonprofits, or socially‑focused media outlets. She also hopes to develop a platform that combines art and mental‑health advocacy, using her own experiences
    with worry and stress to help other teens find expressive outlets. Short‑term, she plans to build a portfolio, attend summer art workshops, and seek mentorship from local artists in St. Louis.
