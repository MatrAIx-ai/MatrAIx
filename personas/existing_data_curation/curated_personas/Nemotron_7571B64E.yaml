personas:
  professional: Terrence Pham, a one‑year‑old budding explorer in the realm of sensory discovery, showcases an organized curiosity through methodical block‑building and pattern recognition, and they already
    demonstrate problem‑solving instincts suited for an eventual career in engineering.
  sports: Terrence Pham, a high‑energy one‑year‑old who loves crawling races and parent‑guided toddler gymnastics, proudly dons a Los Angeles Dodgers cap while watching the team’s highlights with his family,
    and they enthusiastically join neighborhood mini‑soccer sessions at the community center.
  arts: Terrence Pham, an inquisitive infant, is captivated by the swirling colors of Van Gogh’s Starry Night displayed on his nursery wall, sways to Beatles melodies and Sesame Street jingles, and enjoys
    the animated storytelling of Pixar’s Toy Story, reflecting a budding appreciation for visual and auditory art.
  travel: Terrence Pham, a curious one‑year‑old, delights in the sensory adventure of family outings to the city’s Children’s Museum, weekend trips to the local aquarium, and his parents hope to someday
    explore the interactive exhibits of Tokyo’s Miraikan and the sandy shores of Bali.
  culinary: Terrence Pham, a developing palate, favors smooth pureed sweet potatoes seasoned with a pinch of cinnamon, creamy avocado mash, ripe banana slices, and occasionally bites into soft chicken nuggets,
    while his caregivers experiment with homemade oatmeal sprinkled with blueberries.
  core: Terrence Pham, a curiously organized and sociable one‑year‑old who thrives on routine, builds towering block structures, clinks coins into a piggy bank, giggles loudly at surprise noises, and stubbornly
    resists nap time, creating a lively yet predictable presence.
background:
