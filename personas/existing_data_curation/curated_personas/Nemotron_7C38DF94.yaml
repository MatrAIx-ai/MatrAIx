  career_goals: Man aims to transition from an entry‑level clerk to a senior operations or office manager role within the next five years, ideally at an organization that blends cultural programming with
    community outreach, such as a local arts center or museum. He plans to complete his bachelor's degree in Business Administration or Arts Management at Oregon State University, leveraging his disciplined
    work ethic and curiosity to excel academically. Long‑term, he aspires to lead multidisciplinary teams that design innovative cultural events and streamline administrative processes, ultimately becoming
    a director of community engagement where he can fuse his organizational strengths with his passion for the arts.
