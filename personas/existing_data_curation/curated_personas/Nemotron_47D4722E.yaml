personas:
  professional: Jeremiah Fell, a 24-year-old retail supervisor at a regional department store, leverages their knack for schedule precision, visual merchandising, and conflict resolution to keep the floor
    humming, while their outgoing, team-oriented nature fuels their ambition to become store manager within two years and eventually a regional leader.
  sports: Jeremiah Fell, a 24-year-old participant in the Lakeview Legends amateur basketball league, blends a love for pickup-court competition with loyal fandom for the Charlotte Hornets and Carolina
    Panthers, while weekend fishing keeps their stress low and occasional morning jogs at the town park sustain their fitness, and they routinely track performance stats using a smartwatch.
  arts: Jeremiah Fell, a 24-year-old who curates a mixtape of Luke Bryan, Dolly Parton, and classic rock legends like Led Zeppelin and The Rolling Stones for weekend BBQs, often strums an acoustic guitar
    during church youth group gatherings, and steals moments to binge-watch country-themed films, letting music steer both their mood and community vibe.
  travel: Jeremiah Fell, a 24-year-old road-trip enthusiast, spends spare weekends cruising the coastline in their restored pickup to spots like the Florida Keys and Charleston, while dreaming of a music
    pilgrimage to Nashville's Grand Ole Opry and a quick getaway to Mexico's Riviera Maya, planning trips with a mix of spontaneous detours and a spreadsheet itinerary that balances fuel costs with adventure.
  culinary: Jeremiah Fell, a 24-year-old self-taught grillmaster, savors smoking pulled pork with a tangy apple-cider-vinegar glaze, perfecting buttermilk fried chicken seasoned with cayenne and paprika,
    and experiments with side dishes like hush puppies and pimento cheese, often sourcing hickory chips and fresh herbs from the local farmer's market for weekend banquets.
  core: Jeremiah Fell is a structured, people-pleasing 24-year-old who channels his love for community BBQs, pickup-truck restoration, and classic rock into a diligent retail career - though they secretly
    binge video games late into the night, neglect dental flossing, and hoard coupons for barbecue sauce.
background:
  cultural: Jeremiah grew up in Whiteville, a close‑knit town in Fayette County, Tennessee. His upbringing reflects traditional Southern values of hospitality, hard work, and community involvement. Raised
    in a working‑class family and actively participating in a local Baptist church, he internalized the region’s emphasis on family, faith, and respect for tradition. The cultural fabric of the American
    South—its love for country music, high school football, and communal gatherings—shapes his friendly demeanor, strong sense of responsibility, and appreciation for collaborative activities.
