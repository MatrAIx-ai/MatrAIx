  career_goals: Jeremiah aims to be promoted to store manager within the next two years and eventually advance to a regional manager role within five to seven years. He plans to earn an associate degree
    in business administration and obtain a Certified Retail Manager credential to strengthen his qualifications. Long‑term, he envisions opening his own boutique or small retail venture in Whiteville,
    leveraging his community ties and leadership experience. He also seeks mentorship opportunities to help develop the next generation of retail professionals.
