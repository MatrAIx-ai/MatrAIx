  hobbies: '[''volunteering at the local food pantry'', ''community gardening'', ''book club'', ''cooking new recipes'', ''DIY home‑improvement projects'', ''aerobics classes'', ''hiking with family'',
    ''playing volleyball'', ''listening to classic rock music'']'
  career_goals: Judith aims to advance from a material mover to a supervisory role, such as Shift Lead or Warehouse Operations Supervisor, within the next three years. She plans to complete a certification
    in Warehouse Management and attend leadership workshops offered by her union. Her long‑term ambition includes becoming a Safety Trainer, mentoring younger workers, and eventually consulting for local
    logistics firms on efficient, safety‑first operations. She also hopes to balance career growth with financial stability for her family’s future and a comfortable retirement.
