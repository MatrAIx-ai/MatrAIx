personas:
  professional: Angela Morin is a meticulous administrative specialist whose expertise in Excel, budgeting, and volunteer-led workflow optimization translates their calm, stress-resilient demeanor into
    smooth office operations and proactive team support.
  sports: Angela Morin cycles the Erie Canal towpath with the Buffalo Cycling Club, roots for the Buffalo Bills on Sundays, and follows the Sabres, and they balance active weekends with community game-day
    gatherings.
  arts: Angela Morin deepens their love for contemporary fiction through the local book club, devouring novels by Sally Rooney and Colson Whitehead, while they unwind to indie folk artist Sufjan Stevens
    and attend the Buffalo Philharmonic Orchestra's seasonal concerts.
  travel: Angela Morin has explored Niagara Falls and Toronto on quick road trips, dreams of wandering Kyoto's zen gardens and Dublin's literary pubs, and they prefer meticulously planned itineraries that
    balance budget-friendly stays with occasional splurges on boutique bed-and-breakfasts.
  culinary: Angela Morin experiments with regional cuisine by perfecting Buffalo wing sauces using cayenne, garlic powder, and honey, while they also whip up roasted beet salad with goat cheese and balsamic
    glaze, showcasing a modest yet inventive cooking skill set.
  core: Angela Morin blends a love for order with bursts of creativity—solving puzzles, tending a balcony garden, and cooking spiced wings—while they occasionally procrastinate on job applications and hoard
    a stash of crossword books.
background:
  cultural: Angela is a third‑generation White American whose familial roots trace back to Irish and German immigrants who settled in Western New York during the early 20th century. Raised in a middle‑class
    suburb of Buffalo, she experienced the region’s distinct seasonal rhythms, from harsh winters to vibrant lake‑effect summers, fostering a practical, self‑reliant outlook. Her family values emphasized
    hard work, community involvement, and modest living, which are reflected in her participation in local volunteer initiatives. She identifies with the cultural touchstones of the Buffalo area—support
    for the Bills, love of regional foods such as beef on weck and Buffalo wings, and appreciation for the city’s rich industrial heritage. While she embraces mainstream American cultural norms, she also
    respects and incorporates the traditions of her Irish and German ancestry, such as celebrating St. Patrick’s Day and occasionally preparing German‑style holiday dishes.
attributes:
  skills: '[''Office administration'', ''Microsoft Office (Excel, Word, Outlook)'', ''Data entry and record keeping'', ''Basic bookkeeping'', ''Event planning and coordination'', ''Customer service'', ''Time
