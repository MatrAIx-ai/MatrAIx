  hobbies: '[''Crossword and Sudoku puzzles'', ''Balcony gardening'', ''Book club participation'', ''Cycling on the Erie Canal trail'', ''Attending Buffalo Bills games'', ''Cooking regional recipes'', ''Volunteer
    work at a food pantry'']'
  career_goals: Angela is aiming to re‑enter the paid workforce within the next year, focusing on roles that value structure, reliability, and detail orientation. She plans to leverage her associate’s degree
    and volunteer experience to secure an entry‑level administrative or office manager position, preferably within a nonprofit organization or a small‑to‑medium business in the Buffalo area. To broaden
    her qualifications, she intends to enroll in a part‑time bachelor’s program in Business Administration or Human Resources over the next two years. Her long‑term ambition is to advance into a supervisory
    role where she can design and implement efficient office systems, mentor junior staff, and contribute to organizational improvement initiatives. Angela also remains open to remote administrative opportunities
    that would allow her to balance work with personal development pursuits.
