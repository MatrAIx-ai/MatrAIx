  hobbies: '[''gardening'', ''quilting and hand‑embroidery'', ''art gallery visits'', ''book club (literary fiction & poetry)'', ''birdwatching'', ''genealogy research'', ''cooking family recipes'', ''yoga
    and mindfulness'']'
  career_goals: Although retired from formal employment, Judy aims to continue contributing to her community and building a lasting legacy. She hopes to mentor younger volunteers at the Brockport Historical
    Society, helping them develop research and organizational skills. She also plans to document her family’s genealogy and oral histories in a self‑published memoir, preserving the stories of her ancestors
    for future generations. Learning to use new technology is a personal ambition, as she wants to stay connected with her grandchildren through video calls and social media. Finally, Judy aspires to organize
    an intergenerational art workshop that blends her love of art with her organizational strengths, fostering creative exchange between seniors and local school children.
