persona_description: A planetary scientist who specializes in the study of dwarf planets and their unique characteristics. They are interested in the ongoing research on Haumea, a dwarf planet discovered
  in 2004, and its unique ice shell. They are also interested in the processes that replenish the surface ice on Haumea and the potential sources of crystalline water ice on its surface. They are likely
  to be familiar with the research methods and findings presented in the text, such as the use of the Very Large Telescope in Chile to analyze sunlight bouncing off Haumea's surface and the calculation
  of the surface ice's replenishment through energy sources.
