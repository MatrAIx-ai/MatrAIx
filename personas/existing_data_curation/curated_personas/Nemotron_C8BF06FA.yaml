  career_goals: Alexander aspires to realign his professional life toward roles that fuse scientific insight with creative communication. In the next 12 months, he plans to build a portfolio of data‑driven
    visual stories and secure freelance contracts with regional non‑profits, startups, and educational organizations. Over the next three years, he aims to launch a boutique consultancy that helps small
    businesses and community groups translate complex data into compelling infographics and interactive media, while also offering workshops that teach STEM concepts through art. Long‑term, he envisions
    establishing a community makerspace in Spearfish where interdisciplinary projects—ranging from citizen‑science monitoring to generative art installations—can thrive, positioning the town as a regional
    hub for creative technology. He is also considering a part‑time master’s degree in Human‑Computer Interaction to deepen his expertise at the intersection of design and data.
