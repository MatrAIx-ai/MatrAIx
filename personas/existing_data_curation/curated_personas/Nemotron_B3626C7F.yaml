  career_goals: He aims to transition into a technical leadership role—such as Engineering Manager or Principal Engineer—where he can shape product strategy, champion innovative engineering practices, and
    nurture a culture of continuous learning. Kwang is drawn to projects that blend cutting‑edge technology with tangible impact, like building AI‑driven developer tools or sustainable cloud solutions.
    At the same time, his desire for flexibility and personal growth fuels an aspiration to eventually launch his own startup focused on collaborative coding experiences. He also seeks to become a recognized
    speaker in the Bay Area tech community, advocating for diversity, mentorship, and inclusive workplace culture.
