  career_goals: Judy aims to transition from a general office clerk to a senior administrative specialist or office manager within the next two years. She plans to earn the Certified Administrative Professional
    (CAP) credential to formalize her expertise and position herself as a go‑to resource for operational efficiency. Leveraging her competitive drive, she seeks to lead a department‑wide workflow redesign
    project that reduces processing time by at least 15%, earning recognition for measurable improvement. Long‑term, Judy envisions offering freelance consultancy to small businesses in Essex County, helping
    them establish reliable administrative systems that mirror the structure and predictability she values. She also intends to secure a stable, predictable schedule that supports her desire for work‑life
    balance as she approaches retirement.
