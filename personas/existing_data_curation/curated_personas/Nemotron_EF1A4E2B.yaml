  career_goals: At 46, Reed aims to move from a hands‑on batchmaker role into a supervisory or product‑development position within the food industry. He plans to earn a Certified Food Safety Professional
    credential and complete a short certificate in food product development at a community college. Long‑term, he hopes to launch a small artisanal line of specialty sauces that blend his French‑Canadian
    heritage with Pacific Northwest ingredients. He also wants to mentor younger employees, fostering a collaborative and harmonious workplace.
