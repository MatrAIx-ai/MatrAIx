  hobbies: '[''Gardening'', ''Fishing'', ''Hiking'', ''Woodworking'', ''Neighborhood association volunteering'', ''Church community events'', ''Reading historical non‑fiction'', ''Watching classic movies'']'
  career_goals: Jigisha aims to advance to a senior or lead inspector position within Fairfax County, obtain the Certified Building Official (CBO) designation, and mentor junior inspectors. He aspires to
    transition into consulting to help developers and contractors streamline code compliance and to contribute to local building‑safety policy development. Additionally, he hopes to lead community education
    programs on home safety and eventually oversee a regional inspection team.
