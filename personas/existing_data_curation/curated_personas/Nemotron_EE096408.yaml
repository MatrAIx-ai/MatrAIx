  hobbies: '[''Community Theater'', ''Salsa Dancing'', ''Hiking'', ''Volunteer Beach Clean‑ups'', ''Tech Hackathons for Social Good'', ''Puzzle Solving'', ''Reading Crime and Science Fiction'', ''Exploring
    Salem Historical Sites'', ''Cooking Themed Dinner Parties'', ''Yoga'']'
  career_goals: Josephine aims to become a licensed clinical social worker and pursue a Master’s in Social Work within the next two years. She envisions leading a regional community health program that
    integrates technology and evidence‑based practices to improve outcomes for at‑risk families. Long‑term, she hopes to influence public policy by developing data‑driven advocacy initiatives and eventually
    serve as a program director for a statewide nonprofit focused on mental health and social equity.
