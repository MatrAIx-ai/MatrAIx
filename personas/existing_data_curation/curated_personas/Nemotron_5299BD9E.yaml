personas:
  professional: Jimmy Sherman, a bright four-year-old preschooler who loves building with blocks, blends curious questions about how things work with a practical habit of sorting pieces by size and color;
    they demonstrate early problem-solving skills while favoring the flexibility of free play over rigid schedules.
  sports: Jimmy Sherman rushes onto the field for the Sunnybrook Sprouts, the neighborhood Little League soccer team, and loudly cheers for the Chicago Cubs on TV; they love the thrill of scoring a goal
    and often claim they are the best, preferring spontaneous playground scrambles to structured drills.
  arts: Jimmy Sherman hums the Disney Moana soundtrack, watches Paw Patrol, and draws whimsical pictures inspired by Dr. Seuss, yet they often offer critical remarks about new cartoon episodes, displaying
    a playful yet discerning artistic taste.
  travel: Jimmy Sherman enjoys spontaneous road trips to the beach and the sensory frenzy of Disneyland, dreaming of a future visit to the Grand Canyon; they favor flexible itineraries that allow plenty
    of snack breaks.
  culinary: Jimmy Sherman favors cheesy macaroni, chicken nuggets, apple slices, and peanut-butter sandwiches, proudly spreading their own peanut butter with a plastic knife but turning away from broccoli
    and green peas, showcasing a developing yet picky palate.
  core: Jimmy Sherman is a curious-yet-practical four-year-old who balances imaginative play with a need for flexibility, shows occasional anxiety, and navigates the world with a mix of skepticism, competitiveness,
    and endearing quirks; they approach each new activity with both questioning and enthusiasm.
background:
  cultural: Jimmy is raised in a white, middle‑class family in Pawtucket, Rhode Island. His parents have mixed Irish and Italian heritage, and the household blends New England and Celtic traditions. He
    attends a local public preschool that incorporates the state's curriculum and enjoys recess along the historic Riverwalk. Family gatherings often feature Rhode Island staples like clam chowder, coffee
    milk, and homemade pizza. Community events such as the Fourth of July fireworks on the Providence River, the annual St. Patrick’s Day parade, and the Pawtucket Arts Festival are regular parts of his
    upbringing. At home they speak American English with a subtle Rhode Island twang, emphasizing self‑reliance, friendly competition, and a love for the outdoors.
attributes:
  skills: '["assembling block structures", "solving simple puzzles", "sorting by size, shape, and colour", "counting to 20", "recognizing letters and his name", "independent self‑care tasks", "efficient
    snack‑tray setup", "quick rule acquisition in games", "strategic play in competitive games"]'
  hobbies: '["building LEGO structures", "drawing dinosaurs and space rockets", "exploring the local park and riverbank", "watching kid‑friendly science shows (e.g., ''Wild Kratts'')", "playing memory matching
    games", "riding his tricycle", "collecting shells and rocks", "listening to children''s music (e.g., ''The Beatles Yellow Submarine'')"]'
  career_goals: Even at four, Jimmy talks about future roles that match his curiosity and competitive streak. He dreams of becoming a "science explorer" who builds robots or invents gadgets, a "sports champion"
    who wins the kindergarten soccer tournament, and a "detective" solving neighborhood mysteries. As a short‑term ambition, he aims to win the upcoming preschool science‑fair by creating a simple water‑wheel
    model and to be the first in his class to master the new alphabet puzzle.
