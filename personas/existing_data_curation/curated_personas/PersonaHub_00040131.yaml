persona_description: A military psychologist who specializes in mindfulness and meditation training, particularly in its effects on reducing stress and improving cognitive function in soldiers. Her research
  has been funded by the Department of Defense and has been published in peer-reviewed journals. Her work has attracted the attention of military leaders, including the commander of all allied forces in
  Afghanistan. She has conducted pilot studies on the effects of mindfulness meditation on soldiers and has published findings on the improvement of working memory and retention of new information in soldiers.
  She has also conducted follow-up research on the effects of mindfulness meditation on soldiers after their deployment to Iraq and Afghanistan. Her work has been described as groundbreaking and has had
  a significant impact on the field of military psychology.
