personas:
  professional: Loistene Hayden is a community‑oriented caregiver‑organizer who leverages a practical eye for budgeting, hands‑on home‑repair skills, and a love for structured yet flexible support to work
    as a part‑time home health aide while studying for a Certified Nursing Assistant credential; they balance predictability with occasional spontaneous problem‑solving in the homes they serve.
  sports: Loistene Hayden enjoys recreational softball in the church league, follows the Alabama Crimson Tide football team and the Birmingham Barons baseball club, and incorporates daily garden walks and
    evening yoga into a fitness routine that balances team spirit with personal well‑being.
  arts: Loistene Hayden finds creative expression in singing gospel hymns with the church choir, reading historical novels like "The Warmth of Other Suns," and attending community theatre productions at
    the historic Montgomery Playhouse, often quoting Aretha Franklin lyrics while they quilt in their spare time.
  travel: Loistene Hayden favors spontaneous weekend road trips to nearby Southern gems such as Savannah, Charleston, and Nashville, planning the routes loosely while keeping an eye on fuel costs, and they
    dream of a future culinary tour of New Orleans to study Creole cooking firsthand.
  culinary: Loistene Hayden delights in cooking soul‑food classics like fried chicken, collard greens seasoned with smoked turkey, and tomato‑based gumbo using heirloom tomatoes from their garden, while
    they experiment with spice blends and occasionally over‑salt dishes, reflecting a love for both tradition and culinary adventure.
  core: Loistene Hayden is a resilient, structure‑loving community caretaker who balances soulful cooking, spontaneous road trips, and diligent budgeting with a gentle devotion to family, faith, and grassroots
    activism; they embody a blend of predictability and improvisation.
background:
  cultural: Loistene is an African‑American woman who grew up in Montgomery, Alabama, a city with a deep civil‑rights legacy. She was raised in a close‑knit extended family and a vibrant Black church community
    that emphasized mutual support, perseverance, and cultural pride. The traditions of Southern hospitality, soul food, gospel music, and storytelling have shaped her identity. She carries forward the
    legacy of community activism she witnessed during local commemorations of historic events, which fuels her commitment to helping neighbors and preserving cultural heritage. Her experiences as a Black
    woman in the South inform her worldview on resilience, social justice, and the importance of intergenerational bonds.
