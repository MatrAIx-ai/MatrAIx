  career_goals: She aspires to secure a reliable part‑time position that leverages her caregiving and organizational strengths, such as a home health aide or community outreach role. She plans to complete
    her GED within the next year and enroll in a Certified Nursing Assistant (CNA) program to formalize her caregiving skills. In the longer term, she hopes to launch a small catering business focusing
    on Southern comfort food, allowing her to blend her love of cooking with entrepreneurial independence. Additionally, she wants to contribute more actively to local mentorship programs for at‑risk youth,
    drawing on her own experiences to inspire resilience and community empowerment.
