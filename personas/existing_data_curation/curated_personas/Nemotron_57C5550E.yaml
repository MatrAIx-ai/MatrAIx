  hobbies: '["Urban photography", "Collecting vintage Dominican vinyl records", "Cooking traditional Dominican dishes with creative twists", "Visiting art museums and contemporary exhibitions", "Board game
    nights with a small group of friends", "Solitary walks along the Lehigh River", "Reading historical non‑fiction and travel literature", "Traveling to the Dominican Republic to visit family and cultural
    festivals"]'
  career_goals: Juan aims to step into a senior leadership position, such as Compliance Manager or Director, within the next five years. He plans to deepen expertise in emerging regulatory areas like fintech
    and AI‑driven risk, earn certifications such as Certified Regulatory Compliance Manager (CRCM) and Certified Anti‑Money Laundering Specialist (CAMS), and mentor junior staff. He also seeks to shape
    a compliance culture that balances rigorous standards with the operational flexibility he values, allowing him to maintain a balanced schedule for his family and personal interests.
