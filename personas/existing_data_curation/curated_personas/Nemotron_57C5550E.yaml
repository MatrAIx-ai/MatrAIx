personas:
  professional: Juan Gonzalez is a seasoned regulatory compliance specialist in the financial services sector, using bilingual fluency and an analytical mindset to navigate AML, GDPR, and CCPA requirements
    while drafting clear policies and mentoring junior staff, and they often rely on a relaxed, occasionally disorganized work style that prioritizes flexibility over strict scheduling.
  sports: Juan Gonzalez enjoys weekend jogs along the Lehigh River, follows the Lehigh Valley IronPigs baseball season and roots for the Philadelphia Eagles, participates in a local five‑a‑side soccer league,
    yet they often skip group gym classes, preferring solitary exercise and the occasional pickup game.
  arts: Juan Gonzalez captures the industrial skyline of the Lehigh River with a vintage Leica, curates a vinyl shelf with classic merengue and bachata records from Juan Luis Guerra and Aventura, and they
    spend Thursday evenings at the Allentown Art Museum admiring works by Picasso and contemporary local artists like James K. Walker.
  travel: Juan Gonzalez plans trips with a blend of spontaneity and nostalgia, returning each summer to the Caribbean island of their parents' upbringing for family festivals while also exploring historic
    European cities such as Granada and Lisbon, often mixing meticulous flight‑tracking apps with last‑minute hostel bookings.
  culinary: Juan Gonzalez experiments in the kitchen by blending traditional sancocho and mangú with unexpected ingredients like smoked paprika, quinoa, and plantain chips, treating each dish as a flavor
    canvas while mastering arroz con pollo and crafting a signature coconut‑lime sauce.
  core: Juan Gonzalez balances meticulous compliance work with a laid‑back love of photography, vintage vinyl, and experimental cooking, navigating life’s regulations and flavors with equal curiosity, occasional
    procrastination, and a deep respect for family traditions.
background:
  cultural: Juan was raised by Dominican immigrant parents who moved from the Dominican Republic to the Northeastern United States before settling in Allentown when he was a teenager. He grew up bilingual,
    celebrating Dominican traditions such as Carnaval, Día de la Independencia, and family gatherings centered around music, dance, and hearty meals. These cultural roots instilled a strong sense of family
    loyalty, respect for elders, and a love for rhythmic arts, which continue to influence his culinary experiments and music collection. While fully integrated into the local community, Juan remains active
    in the Dominican diaspora through the local church, cultural festivals, and a network of Dominican professionals in Lehigh County.
attributes:
  skills: '["Regulatory compliance (financial services)", "Anti‑money laundering (AML) monitoring", "Data privacy (GDPR, CCPA) compliance", "Risk assessment and mitigation", "Internal audit and controls",
