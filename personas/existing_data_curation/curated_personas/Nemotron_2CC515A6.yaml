  hobbies: '[''Minecraft building'', ''Strategy video games'', ''Python coding'', ''Reading fantasy novels'', ''Short story writing'', ''Sketching coastal scenes'', ''Swimming'', ''Bicycle maintenance'',
    ''Model ship kits'', ''Acoustic guitar practice'']'
  career_goals: Joseph aims to turn his love of solitary, structured work into a career in software development, with a focus on indie game design. Over the next few years he plans to expand his Python
    skills, build a portfolio of small games, and participate in his high school's robotics club. He hopes to attend a STEM-focused high school, later pursue a computer science degree, and eventually create
    immersive, story-driven games that allow players to explore quiet, detailed worlds. In parallel, he is interested in learning basic marine electronics, envisioning a future where he could combine his
    coastal upbringing with technical expertise.
