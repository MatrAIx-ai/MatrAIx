  career_goals: Even at five, Williams dreams of a future where he can create and organize. He often talks about becoming an engineer or an architect, envisioning himself designing structures that are tidy
    and functional. He also imagines helping others by organizing books as a librarian, reflecting his love for order and quiet spaces.
