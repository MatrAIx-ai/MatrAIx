persona_description: A scientist or engineer working at GMT, likely specializing in heat flux measurement and related studies. This person has expertise in infrared thermography, flux meters, and other
  thermographic techniques. They are familiar with the S3MA and S4MA flow conditions used in the wind tunnel, as well as the materials and conditions required for accurate thermography measurements. They
  have experience in determining heat flux on model surfaces using thermocouples and have a deep understanding of the thermal properties of materials used in the wind tunnel. They are skilled in setting
  up and maintaining the wind tunnel and have a keen interest in improving the efficiency and accuracy of heat flux measurements.
