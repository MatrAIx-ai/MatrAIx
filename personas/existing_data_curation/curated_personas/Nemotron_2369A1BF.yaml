  hobbies: '["Reading technology and business books", "Hiking local trails", "Solving puzzles (crosswords, Sudoku)", "Playing strategy video games (e.g., Civilization)", "Cooking (Southern and experimental
    recipes)", "Photography (nature and urban)", "Attending small tech meetups", "Volunteering for community computer skill workshops"]'
  career_goals: Over the next five years, Nicholas aims to advance to a senior systems analyst or solutions architect role, leading digital transformation initiatives within his organization or a healthcare-focused
    company in the Nashville area. He plans to obtain certifications such as CBAP, PMP, and TOGAF, and deepen his expertise in cloud architecture and data analytics. His long-term ambition is to manage
    a small cross-functional team, mentor junior analysts, and contribute to building technology solutions that improve operational efficiency while maintaining a balanced work-life rhythm.
