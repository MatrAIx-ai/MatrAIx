  hobbies: '[''Reading picture books and early chapter books'', ''Drawing and coloring detailed illustrations'', ''Building structures with LEGO or magnetic tiles'', ''Collecting shells and leaves during
    nature walks'', ''Listening to children’s audiobooks in a quiet space'', ''Playing quiet board games such as Candy Land or Memory'']'
  career_goals: Although only six, Judy often talks about future dreams that echo her caring and orderly personality. She imagines becoming a teacher who creates calm, well‑structured classrooms for younger
    children, or a veterinarian who gently cares for animals. She also expresses fascination with how things work, hinting at a future interest in science or engineering where she can apply her meticulous
    thinking to solve problems.
