personas:
  professional: Judy Mckoy, a six-year-old budding architect of imagination, delights in constructing intricate LEGO cities and magnetic tile structures, applying their organized, methodical mindset and
    reliable planning to every miniature masterpiece.
  sports: Judy Mckoy, a six-year-old who favors gentle outdoor activities such as nature walks in the city park and a weekly children’s swimming class at the community pool, quietly cheers for the local
    soccer team, the Seattle Sounders FC youth club, and participates in the Little Explorers hiking club during spring.
  arts: Judy Mckoy, a six-year-old art enthusiast who spends hours drawing detailed scenes inspired by Eric Carle’s vivid collages, Dr. Seuss’s playful rhymes, and Studio Ghibli’s enchanting worlds, while
    also crafting narrative dioramas with LEGO to bring their favorite storybook characters to life.
  travel: Judy Mckoy, a six-year-old explorer who loves short family trips to the nearby botanical garden and the sandy beaches of Cape Cod, dreams of future adventures to the Grand Canyon and the Great
    Barrier Reef, and prefers carefully planned itineraries that include plenty of quiet reading nooks.
  culinary: Judy Mckoy, a six-year-old budding chef who enjoys assembling colorful fruit skewers with strawberries, grapes, and melon, relishes a cheesy pepperoni pizza with extra mozzarella, and takes
    pride in drawing elaborate plate designs using colored pencils while occasionally sneaking extra cookies before dinner.
  core: Judy Mckoy, a six-year-old quiet explorer who balances a vivid imagination with methodical planning, thriving in solitary creative pursuits while quietly battling a tendency toward worry.
background:
  cultural: Judy is raised in a close‑knit African‑American family in Lanett, Alabama. Her household centers on church gatherings, Sunday potlucks, and community events like Juneteenth celebrations, which
    teach her the value of harmony, respect, and communal support. Gospel music, storytelling traditions, and Southern cooking are woven into daily life, and her parents stress the importance of education,
    kindness, and perseverance within the local Black community.
attributes:
  skills: '[''Reading simple picture and early chapter books'', ''Basic addition and subtraction (up to 20)'', ''Following multi‑step routines independently'', ''Organizing school supplies and personal
