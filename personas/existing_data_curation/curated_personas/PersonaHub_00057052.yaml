persona_description: A school administrator who prioritizes social-emotional and well-being in the classroom and is skilled in using various strategies to regulate emotions, find inner calm, and be socially
  connected with students throughout the day. They are experienced in using short breaks, brain breaks, dance parties, and other activities to keep students engaged and focused. They are also knowledgeable
  about mindfulness and its benefits for students and have implemented mindfulness practices in their classroom. They are proactive in seeking out the underlying causes of student behavior and teaching
  students how to return to calmness. They are also skilled in setting up a peace corner in the classroom for students to calm themselves down or name and describe their feelings.
