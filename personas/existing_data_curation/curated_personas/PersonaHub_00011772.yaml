persona_description: A zoologist who specializes in the study of animal behavior, particularly in zoos and wildlife conservation. This persona is interested in understanding the behavior and well-being
  of animals in captivity, and how to design enrichment programs that promote natural behaviors and improve animal welfare. They are also interested in the impact of changing environments on animal behavior
  and how to mitigate any negative effects. This persona has extensive knowledge of animal behavior and has conducted research on topics such as predator avoidance, reproductive behavior, and habitat preferences.
  They have experience designing and implementing enrichment programs for animals in zoos and have published research on the efficacy of enrichment devices.
