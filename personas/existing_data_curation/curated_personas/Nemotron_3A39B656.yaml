  career_goals: Hai Ho aims to establish a boutique workshop that produces sustainable, high‑end furniture while preserving traditional East Asian joinery methods. He wishes to become a recognized authority
    in historic preservation projects across Washington, DC, and to publish a practical guide on woodworking techniques that blend old‑world craftsmanship with modern efficiency. Over the next five years,
    he plans to mentor a small cohort of apprentices, expand his client base to include custom commissions for historic homes, and transition gradually to a consulting role that allows him to share his
    expertise while maintaining a hands‑on connection to his craft.
