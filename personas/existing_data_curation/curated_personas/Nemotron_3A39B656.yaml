personas:
  professional: Hai Ho, a master carpenter celebrated for precision and a deep respect for historic wood joinery, runs a boutique workshop where they blend advanced mortise‑and‑tenon techniques with sustainable
    sourcing, mentor apprentices with exacting standards, and aim to become the go‑to consultant for historic preservation projects across Washington, DC.
  sports: Hai Ho enjoys hiking the rugged nature trails of Rock Creek Park and participates in the Washington DC Woodworkers Hiking Club, where they jog a gentle five‑kilometer loop each weekend, while
    cheering on the Washington Capitals during the hockey season and playing casual badminton at the community center.
  arts: Hai Ho finds creative balance in practicing traditional East Asian calligraphy with a bamboo brush, tending bonsai trees on their balcony, and attending intimate diaspora gatherings where they play
    the đàn tranh alongside performances of Noh theater, while also drawing inspiration from the woodworking illustrations of Charles Eastlake and the minimalist sculptures of Isamu Noguchi.
  travel: Hai Ho prefers thoughtful travel itineraries that combine cultural immersion with craftsmanship study, having explored the historic timber towns of Sapporo, the bamboo forests of Arashiyama, and
    the colonial‑era carpentry workshops of Savannah, Georgia, while planning future trips to the ancient timber bridges of Hokkaido and a quiet retreat at Shenandoah National Park for sketching and model‑ship
    design.
  culinary: Hai Ho delights in preparing intricate East Asian dishes such as hand‑rolled sushi with vinegared rice, fragrant lemongrass‑infused pho broth, and delicate tempura featuring shiso‑seasoned vegetables,
    mastering the balance of umami and subtle spice while often hosting dinner gatherings for friends where they serve homemade pickled daikon and jasmine tea.
  core: Hai Ho, a disciplined 61‑year‑old master carpenter, channels an almost ritualistic precision into every joinery project, but secretly hoards stray screws like treasure, and balances a quiet, solitary
    life with a generous mentorship spirit.
background:
  cultural: Hai Ho is of Vietnamese descent, raised in a family that emphasized meticulous craftsmanship, respect for elders, and communal harmony—values rooted in Confucian tradition. His upbringing instilled
    an appreciation for precision joinery and the aesthetic simplicity often found in East Asian woodworking. While living in Washington, DC, he remains connected to the Vietnamese diaspora through language,
    festivals, and community groups, integrating those cultural practices with the practical demands of American carpentry. This blend of heritage and adaptability shapes his disciplined work ethic, his
    preference for small, harmonious collaborations, and his commitment to preserving traditional techniques within a modern context.
