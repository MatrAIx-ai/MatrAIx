  career_goals: At 87, Heon’s professional aspirations have pivoted toward legacy building and community contribution. He aims to preserve and share his engineering knowledge by continuing as a mentor for
    youth STEM programs and by documenting his experiences in a memoir focused on mid‑20th‑century infrastructure development in the Rust Belt. He also seeks to support his grandchildren’s education through
    tutoring in math and physics, and he hopes to fund a scholarship for Korean‑American students pursuing engineering degrees. Maintaining his health and independence is a personal ambition that underpins
    his ability to stay active in these endeavors.
