personas:
  professional: Heon Lee, a retired structural engineer who spent four decades designing bridges and roadways in the Rust Belt, blends methodical structural analysis with spontaneous, hands‑on problem solving
    as he mentors high‑school robotics teams, authors a memoir on mid‑20th‑century infrastructure, and funds a scholarship for aspiring engineers.
  sports: Heon Lee, an avid supporter of the Pittsburgh Steelers and the Pittsburgh Penguins, maintains his fitness through daily walks along the Allegheny Riverfront and participates in a weekly senior
    pickleball league at the community center.
  arts: Heon Lee delights in attending Korean cultural festivals featuring pansori and traditional dance, while also savoring the classical piano performances of Lang Lang and the jazz improvisations of
    Miles Davis, and cherishes regular mahjong evenings with longtime friends as both a cultural and strategic pastime.
  travel: Heon Lee prefers well‑organized, low‑stress trips that balance cultural enrichment and gentle adventure, such as his annual visits to historic Old Pittsburgh, a weekend road trip to Niagara Falls,
    and his upcoming leisurely Hudson River cruise to explore nearby museums and gardens.
  culinary: Heon Lee, a skilled home cook, merges classic kimchi‑jjigae and bibimbap with fresh zucchini, kale, and radish from his balcony garden, occasionally experimenting with unconventional flavors
    like truffle oil while sometimes over‑seasoning with gochujang.
  core: Heon Lee, an 87‑year‑old former structural engineer, balances disciplined pragmatism with spontaneous creativity, turning his balcony garden, woodworking bench, and kitchen into daily labs for hands‑on
    problem solving while mentoring youth and preserving his legacy.
background:
  cultural: Heon Lee grew up in a Korean immigrant household that valued respect for elders, education, and communal responsibility, traits rooted in Confucian traditions. While he fully embraced American
    life, attending local schools and later earning a STEM degree, he retained fluency in Korean and participated in the Korean church community, which remains a social anchor. His cultural identity blends
    Korean culinary practices, holidays such as Chuseok and Seollal, and participation in Pittsburgh’s multicultural mosaic. This bicultural perspective informs his mentorship style—combining a disciplined
    work ethic with a flexible, supportive approach—and his dedication to preserving Korean heritage for younger generations.
