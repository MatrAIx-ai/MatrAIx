  career_goals: Silvana aims to become a senior project director overseeing large‑scale, environmentally resilient infrastructure projects in underserved New York neighborhoods. She plans to obtain her
    Professional Engineer license, lead multidisciplinary teams that integrate community input, and mentor emerging Latinx and women engineers. In the longer term she hopes to launch a nonprofit engineering
    consultancy that provides pro‑bono technical assistance for affordable housing and climate‑adaptation initiatives, while fostering a workplace culture that prioritizes well‑being and collaboration.
