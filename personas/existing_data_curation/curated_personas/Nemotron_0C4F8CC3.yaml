  hobbies: '[''Salsa dancing'', ''Cooking Nicaraguan cuisine'', ''Volunteer work (Habitat for Humanity, food banks)'', ''Urban gardening'', ''Hiking'', ''Yoga'', ''Tech meetups'', ''Reading fiction and
