personas:
  professional: Silvana Arroyo, a 36-year-old civil and structural engineer in New York City, blends deep expertise in sustainable design and BIM tools with a community-focused leadership style; they turn
    innovative concepts into code-compliant realities while occasionally letting flexibility override strict scheduling.
  sports: Silvana Arroyo enjoys salsa dancing twice a week, plays forward for a community soccer team in Queens, hikes the Hudson River Valley on weekends, and attends morning yoga at a local studio, though
    they sometimes skip a session when stress peaks.
  arts: Silvana Arroyo immerses themselves in the arts through vibrant salsa nights, photographing city street life, curating playlists featuring Rubén Blades, Manu Chao, and contemporary jazz pianist Brad
    Mehldau, and attending off-Broadway productions of modern playwrights like Sarah Ruhl, all of which fuel their creative outlook.
  travel: Silvana Arroyo prefers flexible, experience-driven travel, having explored the culinary festivals of Oaxaca, the historic streets of Cartagena during Carnival, and the coastal hiking trails of
    the Pacific Northwest, while planning future trips to the Amalfi coast and a music-focused weekend in New Orleans.
  culinary: Silvana Arroyo delights in preparing a fragrant rice-and-bean base topped with plantains, mojo-marinated chicken, and aromatic herbs; they often host neighborhood potlucks where they share these
    dishes alongside fresh ceviche and homemade salsa, balancing moderate cooking skills with a passionate desire to preserve family recipes.
  core: Silvana Arroyo is a community-oriented, sustainability-focused engineer who balances generous spontaneity with occasional disorganization, channels stress into yoga and salsa, and strives to merge
    technical excellence with cultural richness; they bring an infectious optimism to every project.
background:
  cultural: Silvana was born to Nicaraguan parents and grew up immersed in a bilingual household that celebrated traditional festivals, music, and cuisine. Her family’s emphasis on community solidarity
    and hospitality shaped her compassionate outlook. In New York City she remains active in the Nicaraguan diaspora, participating in cultural events such as Fiesta de la Independencia and contributing
    to local Latinx community organizations. She blends her Central American heritage with the multicultural fabric of NYC, maintaining fluency in Spanish and English and drawing on both cultures to inform
    her collaborative and socially conscious engineering approach.
