  hobbies: '[''Drawing and sketching'', ''Reading adventure and science fiction books'', ''Building LEGO models'', ''Exploring nature (collecting rocks, leaves)'', ''Using Scratch for interactive stories'',
    ''Attending weekend art classes'', ''Participating in school robotics club'', ''Playing keyboard'', ''Visiting local museums and fairs'']'
  career_goals: Adil dreams of a future where he can blend his curiosity for new ideas with his methodical, organized approach. He is fascinated by space and technology, imagining himself as an aerospace
    engineer designing spacecraft or a robotics developer creating interactive machines. He also feels drawn to the world of art and museums, picturing a role as a museum curator or exhibit designer who
    crafts immersive, educational experiences that spark imagination in visitors. Ultimately, he hopes to pursue a career that lets him innovate, solve complex problems, and share his love of creativity
    and discovery with others.
