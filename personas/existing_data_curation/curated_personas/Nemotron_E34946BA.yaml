personas:
  professional: Adil Capps, a budding comic‑strip creator and junior robotics enthusiast, blends a curious imagination with methodical planning as they sketch vivid adventures, script Scratch games, and
    help program the school’s entry‑level bots, often insisting on tidy code and vivid storyboards.
  sports: Adil Capps, a member of the Homeworth Hurricanes youth soccer club who also enjoys weekend bike rides through the woods, cheerfully roots for the Cleveland Browns in the fall and the Cleveland
    Guardians in the summer, and dutifully stretches before each practice to keep their asthma in check.
  arts: Adil Capps, an avid sketcher of comic heroes inspired by Stan Lee’s bold panels and Hayao Miyazaki’s whimsical worlds, regularly visits the Stark County Museum to study Monet’s watercolors, while
    experimenting with mixed‑media techniques learned at weekend art classes.
  travel: Adil Capps, who prefers family road trips that blend exploration and imagination, has camped under the stars in Cuyahoga Valley National Park, toured the interactive science exhibits at the Columbus
    Museum of Science, and dreams of someday stepping onto the bustling streets of New York City to sketch its skyline.
  culinary: Adil Capps, a self‑declared pizza aficionado who can whip up a passable cheese‑and‑pepperoni slice and loves baking chocolate‑chip cookies with LEGO‑shaped cutters, frequently swaps recipes
    for cherry‑tomato‑topped pasta and experiments with bright red bell peppers as a crunchy snack.
  core: Adil Capps, a nine‑year‑old imagination engine, balances meticulous sketchbooks with spontaneous LEGO building sprees, often forgetting to finish a comic before launching into a new robotics code,
    yet always carries a pocket‑size sketchpad to capture sudden bursts of inspiration.
background:
  cultural: Adil is raised in a middle‑class white family in Homeworth, a small town in Stark County, Ohio. His family’s heritage includes German and Irish roots, and household traditions blend standard
    American holidays with occasional celebrations of that European ancestry, such as making pretzels for St. Patrick’s Day or sharing family stories of ancestors who settled in the Midwest. He attends
    a public elementary school where community involvement and school spirit are emphasized. The town’s culture values modesty, neighborliness, and a strong work ethic, which align with Adil’s organized
    and reliable nature. He participates in church youth activities and community events like the Stark County Fair, where he experiences local crafts, agriculture, and performances. Outdoor activities,
    such as exploring the nearby Cuyahoga Valley and attending local sports games, further shape his appreciation for nature and teamwork. This Midwestern backdrop nurtures a sense of belonging, cooperation,
    and a love for learning that informs his everyday life.
