  hobbies: '[''Hiking coastal trails'', ''Cooking Mexican cuisine'', ''Volunteer tutoring for bilingual students'', ''Model bridge building'', ''Woodworking'', ''Landscape photography'', ''Reading non-fiction
    on engineering and folklore'']'
  career_goals: His career ambition is to deepen his impact on community infrastructure by leading projects that improve affordable housing and public transportation in underserved neighborhoods of San
    Diego. He plans to obtain his Professional Engineer (PE) license within the next two years and pursue a master’s degree in Sustainable Engineering. Ultimately, he aspires to become a senior project
    manager or director of community development, where he can mentor junior engineers, integrate environmentally responsible practices, and ensure projects foster social harmony and accessibility. He seeks
    a stable, routine-driven work environment that still allows flexibility for volunteer work and community service.
