personas:
  professional: Josue Garciamontes is a methodical civil engineer who leverages his structural design, cost‑estimation, and bilingual stakeholder communication expertise within a routine‑focused workflow,
    delivering safety‑compliant infrastructure while accommodating flexible community‑service commitments.
  sports: Josue Garciamontes enjoys hiking the coastal trails of La Jolla and Torrey Pines, participates in a local running club that schedules weekend 5K runs, and follows the San Diego Padres and the
    San Diego Wave FC, attending games when his schedule permits.
  arts: Josue Garciamontes expresses his artistic side through landscape photography of Southern California’s cliffs and dunes, deepens his appreciation by reading engineering history and folklore, and
    regularly visits the Museum of Contemporary Art San Diego to view works by Anselm Kiefer and local muralists, often listening to folk‑rock artists such as Bruce Springsteen while cooking.
  travel: Josue Garciamontes prefers low‑key road trips to nearby natural escapes like Joshua Tree and Big Bear, occasionally blends travel with volunteer tutoring workshops in neighboring towns, and dreams
    of exploring historic civic architecture in European cities such as Barcelona and Prague, all while budgeting carefully to keep trips within his modest savings.
  culinary: Josue Garciamontes finds solace in the kitchen, mastering family recipes of mole, tamales, and pozole, experimenting with chilies, masa, and chocolate, and often prepares intimate dinner gatherings
    for close friends, balancing his moderate cooking skill with a passion for preserving culinary traditions.
  core: Josue Garciamontes is a routine‑driven yet compassion‑focused civil engineer who balances meticulous work, modest health vigilance, and a love for quiet hikes, thoughtful cooking, and community
    service.
background:
  cultural: Josue is a first-generation Mexican-American whose family roots trace back to Jalisco. Raised in a bilingual household, he celebrates Mexican traditions such as Día de los Muertos, Mexican Independence
    Day, and family gatherings centered around shared meals. Living in San Diego, he navigates a bicultural identity, participating in both the local Mexican community and broader American civic life. His
    cultural values emphasize family solidarity, community service, and respect for elders, which shape his compassionate approach to both personal relationships and professional collaborations.
attributes:
  skills: '[''Structural design'', ''Construction management'', ''Cost estimation'', ''AutoCAD'', ''Revit'', ''Civil 3D'', ''Site inspection'', ''Building code compliance'', ''Sustainable design'', ''Stakeholder
