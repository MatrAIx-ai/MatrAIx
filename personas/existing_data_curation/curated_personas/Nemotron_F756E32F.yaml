  career_goals: Morris often imagines himself as a scientist or engineer who discovers how things work and builds tidy, organized creations. He expresses a wish to read whole picture books by himself and
    to solve larger, more challenging puzzles. He also enjoys helping his parents with simple chores, seeing them as early steps toward becoming responsible and reliable in any future role.
