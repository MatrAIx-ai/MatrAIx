  career_goals: Rajiv dreams of turning his love for art and narrative into a career as a multimedia storyteller—he imagines becoming a graphic novelist, video-game concept artist, or a digital content
    creator who blends visual art with interactive experiences. He hopes to earn a scholarship to an arts-focused high school, win youth art competitions, and eventually work at a studio where he can bring
    his imaginative worlds to life. He also aspires to use his storytelling skills to inspire other kids and address social issues he cares about.
