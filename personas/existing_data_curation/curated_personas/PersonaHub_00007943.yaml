persona_description: A team of researchers from Northern Illinois University (NIU) who specialize in nanotechnology and materials science, particularly in the field of hydrogen sensors. They have developed
  a new, inexpensive and fast way to make high-performance hydrogen sensors using palladium nanowires. Their research has been published in the prestigious American Chemical Society journal Nano Letters.
  The team includes Ph.D. students and faculty members from both NIU and Argonne National Laboratory. The research team has also found that the speed of the sensors increases with decreasing thicknesses
  of the palladium nanowires. The research team has received recognition for their contributions, including the NIU Nanoscience Fellowship and the prestigious Nano Letters journal. The team is interdisciplinary,
  with expertise in chemistry and physics.
