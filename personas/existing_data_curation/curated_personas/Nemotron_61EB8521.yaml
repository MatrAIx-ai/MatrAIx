  hobbies: '[''Reading speculative fiction'', ''Journaling'', ''Sketching'', ''Hiking in Manassas National Battlefield Park'', ''Cooking Salvadoran cuisine'', ''Exploring new recipes'', ''Listening to Cumbia
    and folk music'', ''Yoga and meditation'', ''Learning French'']'
  career_goals: Carmen aims to complete a bachelor’s degree in communications or community health through flexible online programs, allowing her to study while maintaining her independent lifestyle. Concurrently,
    she is building a freelance portfolio in digital content creation that highlights Salvadoran culture, language, and food. Her long‑term ambition is to launch a remote consulting service that combines
    bilingual translation, cultural storytelling, and culinary content for NGOs, small businesses, and digital platforms. This path offers the flexibility she values, lets her work primarily from home,
    and enables her to support immigrant communities using her practical skills and cultural insight.
