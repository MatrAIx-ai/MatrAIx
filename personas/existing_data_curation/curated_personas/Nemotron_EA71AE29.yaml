personas:
  professional: Lissette Stites, a budding cognitive explorer at age one, channels their innate curiosity and emerging organizational habits into building simple block towers, sorting colorful shape sorters,
    and experimenting with cause-and-effect toys, laying early foundations for future problem-solving and engineering skills while balancing structured playtime with spontaneous discovery.
  sports: Lissette Stites, a one-year-old movement enthusiast, attends a local parent-child gymnastics class where they practice crawling drills and gentle tumbling, idolizes the Reno Aces baseball team
    on weekend TV broadcasts, and loves sprinting to the sandbox at Meadowbrook Park during weekend family outings.
  arts: Lissette Stites, a one-year-old art aficionado, regularly joins story hour at the Sparks Library, delights in finger-painting sessions featuring bright Van Gogh sunflowers, bounces to the lullabies
    of Brahms and the upbeat tunes of Raffi, and enjoys watching the community theatre’s weekend puppet shows.
  travel: Lissette Stites, a one-year-old with a budding sense of adventure, enjoys short family trips to the nearby Lake Tahoe shoreline, weekend visits to the Sparks Community Park splash pad, and the
    annual ride on the Reno-Sparks seasonal train during the holiday festival, while parents plan future longer vacations to Disneyland, balancing the desire for new sights with the need for familiar routines.
  culinary: Lissette Stites, a one-year-old budding foodie, prefers smooth sweet potato puree with a pinch of cinnamon, mashed avocado with a squeeze of lime, and soft rice cereal mixed with oat milk, occasionally
    indulging in star-shaped teething biscuits, and delights in a homemade carrot-apple applesauce for a sweet snack.
  core: Lissette Stites, a curious, energetic one-year-old who blends organized play with spontaneous creativity, often worries over loud noises, competes with stuffed animals for attention, and stubbornly
    refuses bedtime stories unless they involve bright colors.
background:
  cultural: Lissette was born and raised in Sparks, Nevada, within a white American family that blends traditional home routines with an openness to diverse cultural experiences. Her parents prioritize
    a balanced upbringing, offering structured daily schedules for meals, naps, and play while leaving room for spontaneous creative exploration. They actively engage her with community resources such as
    the Sparks Library’s story hour, local art workshops, and family‑friendly cultural festivals that reflect the broader Reno‑Sparks multicultural landscape. This environment nurtures her appreciation
    for varied experiences, artistic expression, and social interaction while grounding her in the values and traditions of her familial heritage.
