personas:
  professional: David Morris, a 33‑year‑old front‑of‑house operations specialist at a Nashville concert venue, marries meticulous schedule‑crafting with a hands‑on curiosity for AV tech, leading teams with
    calm authority while constantly testing new ticket‑scanning apps that they evaluate for efficiency.
  sports: David Morris is a devoted fan of the Nashville Predators and the Tennessee Titans, participates in a local adult dodgeball league every Saturday, and joins a weekend hiking club that meets at
    Percy Warner Park, blending competitive spirit with outdoor fitness.
  arts: David Morris immerses themselves in Nashville’s creative pulse, drumming in a garage band that covers Led Zeppelin and modern indie acts like St. Vincent, volunteering at the community theater to
    set up productions of 'Hamilton' and 'The Glass Menagerie', and frequenting live shows headlined by Jason Isbell, all of which they absorb as creative inspiration.
  travel: David Morris prefers road‑trip adventures that blend music festivals and scenic hikes, having driven to Austin for SXSW, explored the Blue Ridge Mountains, and dreaming of a future pilgrimage
    to Europe’s Glastonbury Festival and the historic streets of Dublin, which they schedule meticulously during off‑season months.
  culinary: David Morris enjoys experimenting with craft beer brewing, mastering an IPA that features Cascade hops and citrus zest, while also cooking Nashville hot chicken with a side of coleslaw, and
    they consider themselves an intermediate home‑cook who often pairs their brews with smoky barbecued ribs.
  core: David Morris is an organized, sociable venue ops professional who drums, brews, and hustles toward a management career while occasionally over‑budgeting on gear and battling a stubborn back, a drive
    they channel into relentless self‑improvement.
background:
  cultural: David grew up in a middle‑class white family in the Nashville metropolitan area, absorbing Southern hospitality, a strong work ethic, and a deep appreciation for community gatherings. His upbringing
    included regular church attendance, family barbecues, and exposure to the region's rich musical heritage—from country and rock to blues and gospel. Living in Antioch, he experiences a blend of suburban
    stability and the vibrant cultural diversity of downtown Nashville, shaping a worldview that values tradition while remaining open to new ideas and innovations in entertainment.
attributes:
  skills: '[''Customer service'',''Crowd management'',''Ticketing systems operation'',''POS cash handling'',''Inventory control'',''Safety and emergency protocols'',''Event logistics coordination'',''Basic
