  hobbies: '[''Playing drums in a garage band'',''Attending live concerts'',''Adult dodgeball league'',''Home brewing craft beer'',''Hiking in Percy Warner Park'',''Volunteer work at community theater'',''Video
    gaming (MMOs)'',''Exploring new audio‑visual tech'']'
  career_goals: David aims to earn his GED within the next year and complete a hospitality management certification to bolster his credentials. He plans to move from attendant to shift supervisor within
    two years, then to venue manager or operations director at a major Nashville concert hall in five to seven years. Long‑term, he aspires to start his own boutique event‑staffing firm that specializes
    in large‑scale music festivals and community theater productions, leveraging his deep knowledge of both practical venue operations and emerging entertainment technology.
