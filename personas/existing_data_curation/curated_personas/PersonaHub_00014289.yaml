persona_description: A marine biologist and microscopist who is curious about the marine ecosystem and its microscopic life forms. They are particularly interested in the study of Phaeocystis, a species
  of Haptophyta, and its role in the formation of foam on the sea shore. They are also interested in the impact of pollution on marine ecosystems and the potential role of Phaeocystis in global warming.
  They are likely to be a research scientist or a marine biologist who spends a lot of time in the ocean and is interested in the study of marine life.
