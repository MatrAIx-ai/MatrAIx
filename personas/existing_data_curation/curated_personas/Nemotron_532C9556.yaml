  career_goals: Although retired, Lisa aims to preserve her professional legacy by authoring a memoir that chronicles her experiences and insights from decades in education. She plans to develop a concise,
    structured workbook for local elementary teachers focusing on effective assessment techniques. Lisa also aspires to volunteer as a one‑on‑one tutor for adult learners in the College Park community,
    offering individualized support that aligns with her preference for solitary, focused interaction. A personal ambition is to ensure the financial stability of her descendants by completing her estate
    planning and establishing a modest scholarship fund for students pursuing education degrees. Finally, she seeks to stay cognitively active through continuous learning and contribution to a community
    archive documenting the history of public schooling in Prince George’s County.
