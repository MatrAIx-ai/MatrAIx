  hobbies: '[''Reading historical and Mexican literature'', ''Cooking traditional and contemporary dishes'', ''Organic gardening'', ''Knitting and crochet'', ''Genealogy research'', ''Listening to mariachi
    and folk music'', ''Volunteering at the senior center (storytelling circle)'']'
  career_goals: Although retired from formal employment, Ana Lucia remains driven to make a meaningful impact in her community and family. She aims to compile a family recipe book that preserves culinary
    traditions for future generations, and to teach cooking workshops at the local senior center. She hopes to expand her garden into a small community plot where she can mentor younger neighbors in sustainable
    growing practices. Additionally, she aspires to support her grandchildren’s education by providing tutoring in Spanish and financial advice. In the long term, she plans a cultural trip to her hometown
    in Jalisco to reconnect with her roots and document stories for a personal memoir. These goals balance her competitive desire to excel and her practical focus on tangible contributions.
