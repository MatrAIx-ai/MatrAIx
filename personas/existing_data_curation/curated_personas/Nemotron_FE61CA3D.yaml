  hobbies: '["Urban Exploration", "Street Photography", "Cooking Indian Cuisine", "Yoga", "Reading Technology Articles", "Learning Automotive Diagnostics", "Volunteering at Local Community Events", "Bollywood
    Dance"]'
  career_goals: Priya aims to obtain a Commercial Driver's License (CDL) and advance to a supervisory role such as fleet coordinator or driver trainer within the next three years. She envisions transitioning
    into logistics planning, leveraging her curiosity for technology to improve route efficiency. Long‑term, she aspires to start her own transportation or last‑mile delivery business that blends practical
    operations with innovative tech solutions, while possibly completing a degree in logistics or business management.
