personas:
  professional: Priya Moudgil, a 23‑year‑old driver‑operator in Atlanta, merges a curiosity for tech‑driven route optimization with a practical, safety‑first mindset, using bilingual communication and meticulous
    GPS planning to consistently exceed dispatch targets while eyeing a CDL and future fleet‑coordination leadership.
  sports: Priya Moudgil fuels fitness through early‑morning jogs, weekend hikes with the Atlanta Trails Club, and cheering on the Atlanta Falcons, Hawks, and United FC, while joining a local indoor rock‑climbing
    group that satisfies their competitive streak.
  arts: Priya Moudgil channels their love for storytelling into street photography inspired by Sebastião Salgado, attends Bollywood dance workshops featuring choreographies set to A.R. Rahman’s scores,
    and frequents the High Museum to explore contemporary installations, balancing structured creativity with spontaneous visual experiments.
  travel: Priya Moudgil plans trips with meticulous itineraries, savoring urban explorations of Atlanta’s historic districts and weekend getaways to Savannah and Asheville, while dreaming of immersive cultural
    tours in Kyoto, a biking adventure across Amsterdam’s canals, and a rugged trek through Iceland’s volcanic landscapes.
  culinary: Priya Moudgil delights in crafting aromatic spiced lentil stews, chicken tikka masala, and buttery naan using cumin, turmeric, and garam masala, experimenting with fusion twists like tofu tikka
    tacos, yet often over‑seasoning in the quest for bold flavor, while also indulging in flavor‑focused food festivals.
  core: Priya Moudgil blends meticulous, data‑driven planning with a restless cultural curiosity, juggling a disciplined driver career, coffee‑fueled late‑night cooking experiments, and a competitive edge
    that sometimes leaves little time for rest.
background:
  cultural: Priya is a second‑generation South Asian American, with her parents originally from Punjab, India. She grew up in a household that values education, family loyalty, and cultural traditions,
    celebrating festivals like Diwali and Holi. While she embraces her Indian heritage—speaking Hindi at home, enjoying regional foods, and participating in community gatherings—she also fully engages with
    the diverse culture of Atlanta, blending both worlds in her daily life.
