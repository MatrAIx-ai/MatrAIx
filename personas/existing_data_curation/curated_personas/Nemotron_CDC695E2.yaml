personas:
  professional: A veteran administrative professional, Savitree Green leverages three decades of secretarial expertise, meticulous record‑keeping, and budget‑tracking acumen to streamline office workflows
    while mentoring junior staff with a competitive edge and a flair for community‑focused efficiency.
  sports: An active participant in senior fitness circles, Savitree Green plays weekly bridge tournaments, competes in a local chess club, attends morning walking groups at the community park, and cheerfully
    supports the regional baseball team, the Lakeside Hawks.
  arts: A vibrant community artist, Savitree Green sings in the local church choir, dances to classic soul and funk tracks by Marvin Gaye and James Brown at heritage festivals, and loses herself in Agatha
    Christie mystery novels and crossword puzzles, often quoting favorite lines during potluck gatherings.
  travel: A purposeful traveler, Savitree Green prefers well‑planned heritage trips, has explored historic districts in Charleston and Savannah, enjoys weekend drives to the Great Lakes shoreline, and dreams
    of a guided tour of European botanical gardens.
  culinary: A garden‑to‑table enthusiast, Savitree Green cultivates rosemary, thyme, and heirloom tomatoes, often whipping up herb‑infused chicken soup, fresh pesto pasta, and seasonal ratatouille for community
    potlucks, though they occasionally forget to refrigerate leftovers.
  core: Savitree Green blends methodical administrative mastery with a competitive spirit, community‑centered hobbies, and a love for gardening and heritage, all while navigating retirement planning with
    a mix of discipline and occasional indulgence.
background:
  cultural: Savitree identifies as African‑American, with family roots that trace back to the Southern United States and the Great Migration to the Midwest. Growing up in the Detroit metropolitan area,
    she was shaped by the rich musical, culinary, and activist traditions of the Black community. Her faith and church involvement have reinforced values of resilience, mutual support, and communal service.
    As a Black woman navigating the administrative workforce, she has cultivated a keen awareness of subtle biases and has leveraged her sociable, organized nature to build inclusive networks within her
    workplace and community. Her cultural heritage informs her love of soulful music, traditional soul‑food cooking, storytelling, and a deep commitment to mentorship and community empowerment.
