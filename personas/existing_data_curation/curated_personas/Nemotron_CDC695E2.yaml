  career_goals: Savitree aims to transition into a mentorship role within her organization, training newer administrative staff on best practices and efficiency strategies. She is interested in pursuing
    a part‑time consulting position for small nonprofit groups in Oakland County, helping them streamline their administrative processes and improve grant reporting. Additionally, she hopes to secure a
    supervisory role that allows her to influence office policies, promote inclusive workplace practices, and eventually prepare for a comfortable retirement while leaving a legacy of organized, community‑focused
    work environments.
