persona_description: A pilot who specializes in the operation and maintenance of large aircraft, particularly in the design, development, and implementation of propeller systems and engine management. This
  pilot is likely to be familiar with the technical specifications and operations of large commercial and military aircraft, as well as the maintenance and repair of their propellers and engines. They may
  also have experience in the design and implementation of propeller systems and engine management for specific aircraft models, and may have a deep understanding of the factors that affect the performance
  and efficiency of these systems. Additionally, this pilot may have expertise in the use of propeller systems and engine management in various flight situations, such as full feathering, reversing, and
  beta control, and may have experience in the implementation of these systems for various aircraft models.
