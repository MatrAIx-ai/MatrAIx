  career_goals: Betty Sue aims to advance from host to floor supervisor and ultimately to restaurant manager within the next three years. She plans to earn a hospitality management certificate through a
    community college program and obtain ServSafe certification. Her long-term ambition is to open a boutique coffee shop in Bellevue that blends a welcoming lounge atmosphere with locally sourced beans
    and community events. She envisions her establishment as a model of operational excellence, sustainability, and customer loyalty, positioning it among the top-rated venues in Sarpy County.
