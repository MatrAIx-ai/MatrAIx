personas:
  professional: Betty Mcglone, a high‑volume restaurant host renowned for flawless seating logistics and conflict‑resolution finesse, leverages her disciplined, organized nature and competitive edge to
    streamline staff schedules, train new hires, and pursue her goal of becoming a floor supervisor and eventually opening a boutique coffee shop in Bellevue.
  sports: Betty Mcglone, an avid jogger along the Spring Creek Trail, follows the Kansas City Chiefs for football and the Omaha Mavericks for basketball, while participating in the local Bellevue Running
    Club’s weekend group runs and occasionally joining a seasonal adult softball league, balancing competitive pacing with disciplined training.
  arts: Betty Mcglone, a dedicated pottery class participant, draws creative inspiration from ceramicist Edmund de Waal, relaxes to the mellow jazz of Norah Jones, and regularly attends gallery openings
    featuring contemporary artists like Julie Mehretu, weaving artistic appreciation into her leisure time.
  travel: Betty Mcglone, a spreadsheet‑oriented planner, prefers structured weekend escapes to nearby Lincoln wine country and weekend road trips to the Rocky Mountains, while dreaming of an immersive coffee‑culture
    tour in Portland, Oregon, and a historic culinary pilgrimage to Florence, Italy, balancing adventure with budget‑conscious itineraries.
  culinary: Betty Mcglone, a home‑brew coffee aficionado and herb gardener, perfects pour‑over espresso using beans sourced from a local roaster, seasons a rosemary‑infused roasted chicken with a side of
    basil pesto pasta, and experiments with mint‑enhanced cold brew cocktails, reflecting her meticulous cooking style and love for fresh, aromatic ingredients.
  core: Betty Mcglone, a spreadsheet‑obsessed host who obsessively tracks coffee brew ratios and over‑schedules her days, balances a competitive ambition with a calm, methodical outlook, even if she occasionally
    forgets to water her herb garden.
background:
  cultural: Betty Sue was raised in Bellevue, Nebraska, part of the Midwestern United States, within a White American cultural context that values hard work, community involvement, and modesty. Her family
    emphasized self-reliance, punctuality, and courteous interaction, reflecting the region’s practical and optimistic ethos. She grew up attending local schools and community events, gaining an appreciation
    for regional agricultural practices and the evolving food scene in the Omaha metropolitan area. These influences shape her disciplined approach to work, her curiosity about new ideas tempered by practicality,
    and her desire to contribute positively to her local community.
