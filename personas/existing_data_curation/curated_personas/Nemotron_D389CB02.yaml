personas:
  professional: Tracy Drew is an experienced bakery specialist who combines precise, methodical baking techniques with a compassionate leadership style, guiding a small team through disciplined schedules
    while they mentor newcomers to uphold both quality and community values.
  sports: Tracy Drew enjoys low-key fitness, joining the Minster Women's Cycling Club for weekend rides, cheering on the Cleveland Browns during football season, and attending the local high school basketball
    games, while they maintain a routine of brisk walks after bakery shifts.
  arts: Tracy Drew finds solace in classic American literature, often rereading Willa Cather's *My Antonia* beside the oven, and they listen to folk legends like Bob Dylan and classic country singers such
    as Dolly Parton while kneading dough, occasionally attending a community theatre performance of *Our Town*.
  travel: Tracy Drew prefers well-planned, short getaways that balance relaxation with community service, frequently visiting nearby Amish country for quiet countryside walks, scheduling annual pilgrimages
    to Nashville's Country Music Hall of Fame, and they budget for a modest family trip to Charleston, South Carolina, when the bakery's finances allow.
  culinary: Tracy Drew's culinary passion centers on artisanal breads flavored with home-grown herbs - rosemary focaccia, thyme-infused sourdough, and sage-spiced banana loaf - and they excel at hand-kneading
    techniques, while always reserving a portion of the day for experimenting with butter-rich pastries like almond croissants, though they occasionally over-salt their dough in a rush.
  core: Tracy Drew balances a meticulous, routine-loving baking craft with a deep-seated compassion that drives nightly charity bake-sales, yet they often worry excessively and have a habit of double-checking
    every recipe measurement twice.
background:
  cultural: Tracy grew up in Minster, Ohio, a town with deep German‑American roots and a strong Catholic community. Her family’s heritage includes generations of farm and small‑business work, emphasizing
    reliability, modesty, and community service. Local traditions such as the annual Maifest, church potlucks, and emphasis on home‑cooked meals have shaped her practical outlook and love for traditional
    recipes. While she identifies as white American, her cultural identity is closely tied to Midwestern values of hard work, neighborliness, and maintaining harmonious relationships within her close‑knit
    community.
attributes:
