  hobbies: '[''Home herb gardening'', ''Knitting and crocheting'', ''Reading classic literature'', ''Listening to folk and country music'', ''Baking for friends and family'', ''Volunteering at the local
    food bank'', ''Participating in church charity bake‑sales'']'
  career_goals: Tracy aims to become the head baker at her current bakery within the next two years, securing a culinary certification to deepen her technical knowledge. Long‑term, she hopes to open a modest
    community‑focused bakery in Minster that offers affordable, wholesome baked goods and provides free baking workshops for seniors and low‑income families. She also aspires to partner with local food
    banks, using surplus products to combat hunger. Her ambition is to blend her practical expertise with her compassionate drive, creating a stable, supportive environment for both staff and customers.
