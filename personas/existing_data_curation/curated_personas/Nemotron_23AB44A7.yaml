personas:
  professional: Charles Burch, a 53‑year‑old secondary‑school STEM teacher, designs interdisciplinary curricula that weave physics, mathematics, and environmental science with hands‑on labs and technology,
    and they leverage their practical problem‑solving skills, compassionate mentorship, and balance of curiosity and organization to inspire diverse learners and mentor novice educators.
  sports: Charles Burch sails a small catamaran with the Key West Sailing Club, fishes for grouper in the Florida Keys, snorkels coral reefs, bird‑watches migratory species in the Everglades, and supports
    the Miami Dolphins and the Florida Gators, blending active outdoor pursuits with loyal fandom for local teams, and they relish weekend challenges on the water.
  arts: Charles Burch captures Everglades sunsets in nature photography, admires the work of Ansel Adams and Michael Melford, reads science‑fiction titles like "The Expanse" and "Neuromancer", and enjoys
    listening to "The Decemberists" while attending the Key West Literary Seminar, weaving artistic appreciation into their leisurely routine, and they often share their photos on community boards.
  travel: Charles Burch prefers low‑impact weekend getaways, having snorkeled the Belize Barrier Reef, dream‑planned a trip to Palau’s Blue Corner, and regularly visited the Dry Tortugas, balancing adventure
    with a modest travel budget and a love for sustainable marine tourism, and they meticulously plan itineraries to minimize carbon footprints.
  culinary: Charles Burch enjoys cooking fresh grouper ceviche with lime and cilantro, grilling stone crab for key lime pie‑paired dessert, and experimenting with mango salsa on fish tacos, though they
    sometimes over‑season in their enthusiasm for bold coastal flavors, and they occasionally burn toast while multitasking between lesson planning and dinner prep.
  core: Charles Burch blends a teacher’s curiosity with a sailor’s practical mindset, championing interdisciplinary STEM and marine stewardship while occasionally forgetting dentist appointments and over‑seasoning
    dinner, and they navigate life with steady calm and a pinch of organized chaos.
background:
  cultural: Charles grew up in a middle-class white family in the Midwest, where a strong emphasis on education and outdoor recreation shaped his values. After completing a B.S. in engineering, he relocated
    to the Florida Keys in his early thirties, drawn by the region’s unique marine environment and laid-back community spirit. Over the years he has adopted the Keys’ coastal culture—participating in local
    festivals, savoring seafood cuisine, and engaging in community service—while maintaining his Midwestern work ethic and respect for diverse perspectives.
attributes:
  skills: '[''Curriculum development'', ''Differentiated instruction'', ''STEM project coordination'', ''Laboratory safety management'', ''Data-driven assessment'', ''Educational technology integration'',
    ''Student mentorship'', ''Collaborative teamwork'', ''Public speaking'']'
  hobbies: '[''Sailing'', ''Fishing'', ''Snorkeling'', ''Birdwatching'', ''Nature photography'', ''Reading science fiction'', ''Volunteering at community garden'', ''Marine conservation activism'']'
  career_goals: Charles aims to become a lead curriculum specialist for his school district, champion interdisciplinary STEAM initiatives, and develop a school-wide marine science program that leverages
    the local coral reef ecosystem. He also wishes to mentor younger teachers, publish a guide on contextual STEM teaching, and eventually influence educational policy at the Monroe County level.
