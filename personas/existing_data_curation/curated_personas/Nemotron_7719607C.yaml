  career_goals: Rebecca dreams of turning her curiosity for how things work into a career in engineering or environmental science. She hopes to attend a STEM-focused high school where she can deepen her
    coding and robotics skills, eventually studying civil or environmental engineering at university. Her practical side drives her to envision designing sustainable infrastructure—like energy-efficient
    bridges or green community spaces—that benefits her hometown of Lansdale. She also entertains the idea of working as a software developer to create educational apps that make learning fun for other
    kids. In the short term, she aims to win her middle-school science fair, earn a leadership role in her robotics team, and secure a scholarship for a summer engineering camp.
