  career_goals: Dilan aims to leverage his extensive production knowledge into a supervisory role within the next two years, seeking certification in Six Sigma Green Belt to formalize his process-improvement
    expertise. He envisions becoming the go-to problem-solver on his shift, leading safety initiatives, and mentoring younger workers. Long-term, he hopes to transition into a consultancy capacity where
    he can help multiple plants adopt more efficient workflows, while still maintaining a stable work-life balance that allows him to support his family and community activities.
