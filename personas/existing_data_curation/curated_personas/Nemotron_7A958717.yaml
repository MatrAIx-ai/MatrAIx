personas:
  professional: Marsha Wildrick, a diligent kindergarten student, organizes classroom storytime circles and eagerly drafts imaginative tales about space dragons, impressing teachers with their methodical
    project plans.
  sports: Marsha Wildrick participates in the local under‑5 soccer club, cheers for the hometown team the River City Rovers, and follows the professional baseball team the Chicago Cubs, often mimicking
    their heroes during backyard play.
  arts: Marsha Wildrick spends afternoons sketching abstract shapes inspired by Pablo Picasso’s child‑friendly paintings, sings along to Disney's 'Let It Go' and 'How Far I\'ll Go', and proudly displays
    a hand‑made glitter collage at the school art fair.
  travel: Marsha Wildrick loves family trips to the local aquarium and a magical weekend at Disneyland, dreams of visiting the Eiffel Tower in Paris, and often plans itineraries with sticky notes and colored
    crayons while parents handle logistics.
  culinary: Marsha Wildrick favors cheese‑laden macaroni, chicken nuggets, and strawberry‑topped pancakes, enjoys sprinkling rainbow sprinkles on cupcakes they help bake, but stubbornly refuses broccoli,
    insisting it looks like tiny trees.
  core: Marsha Wildrick is a vivid, methodical 5‑year‑old who blends boundless imagination with a need for order, often worrying about the small things while channeling that energy into creative play.
background:
  cultural: Marsha comes from a white, New England family in Greene, Maine. Her upbringing reflects a small‑town, close‑knit community where seasonal outdoor activities such as leaf‑peeping, snow play,
    and local fairs are common. Family traditions include Sunday family meals, participation in community events, and a supportive school environment that encourages curiosity and imagination.
attributes:
  skills: '[''creative storytelling'', ''drawing and coloring'', ''early literacy'', ''basic numeracy'', ''puzzle solving'', ''building with blocks'', ''organizing toys'', ''cooperative play'']'
  hobbies: '[''drawing'', ''building with LEGO'', ''reading picture books'', ''nature collection'', ''listening to music'', ''dancing'', ''inventing stories'']'
  career_goals: Marsha often imagines becoming an illustrator who brings her vivid fantasy worlds to life, a scientist who explores how things work, an author of magical stories, or an explorer who travels
    to new places. She aspires to grow up creating art that inspires others and solving real‑world puzzles.
