persona_description: A historian and experienced sea-kayaker who is interested in exploring the Atlantic coastlines of Britain and Ireland. They are drawn to the rhythms of the sea and coast, seeking to
  gain new perspectives on the history and geographies of the region from the perspective of the sea. The author draws on archival and literary sources to weave together an account of these Atlantic coastlines
  that challenges dominant narratives of the peripherality and marginality of coastal and island places. The persona is likely to be interested in maritime history, geographies, and literature, and may
  have a particular interest in the Atlantic coastlines of Britain and Ireland.
