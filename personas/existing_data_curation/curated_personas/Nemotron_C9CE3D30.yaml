personas:
  professional: Sheila Sloat is a budding marine explorer who spends weekends cataloguing tide‑pool critters and designing LEGO habitats with meticulous detail; they blend curiosity with practicality, using
    methodical planning to prototype future marine‑biology projects while maintaining a healthy skepticism toward unverified facts.
  sports: Sheila Sloat dives into the Gulf Breeze Aquatic Center with the Navarre Junior Swim Team, where they chase personal bests with a competitive edge, cheer on the Tampa Bay Buccaneers and Miami Dolphins
    from the sidelines, and occasionally kick a ball for the Pensacola Panthers U‑8 soccer squad, always approaching each practice with calm focus and methodical improvement.
  arts: Sheila Sloat devours wildlife documentaries narrated by David Attenborough and sketches tide‑pool scenes in a spiral‑bound journal, while they hum along to Raffi’s “Baby Beluga” and binge‑watch
    The Magic School Bus, turning solitary curiosity into creative expression.
  travel: Sheila Sloat’s travel scrapbook features sunny days at Destin Beach, a family road‑trip to Washington, D.C., and a weekend at the Gulf Islands National Seashore, and they now dream of snorkeling
    the Great Barrier Reef and cataloguing Pacific Northwest tide‑pool fossils, always packing a detailed shell‑collection checklist and preferring structured itineraries over spontaneous adventures.
  culinary: Sheila Sloat relishes tangy barbecue chicken, crispy shrimp po’boys, and warm clam chowder, and they often assemble shell‑shaped sugar cookies in the kitchen, proudly noting the perfect pinch
    of sea‑salt in their recipes while occasionally sneaking a gummy fish snack when no one is looking.
  core: Sheila Sloat is a methodical, curiosity‑driven 7‑year‑old who blends solitary shell‑collecting with competitive LEGO building, manages finances with a diligent piggy bank, and navigates life with
    calm resilience and a skeptical eye toward new strangers.
background:
  cultural: 'Sheila comes from a white, middle‑class family in Navarre, Florida. Her upbringing blends typical Gulf‑Coast suburban culture with Southern hospitality: family gatherings often feature barbecue,
    church attendance, and community events like local fairs. The coastal environment has fostered an appreciation for marine life and outdoor recreation, while her parents emphasize academic achievement
    and personal responsibility.'
attributes:
  skills: '["Reading comprehension (2nd grade)", "Basic addition and subtraction", "Puzzle solving (jigsaw, kid-sudoku)", "Digital literacy (educational apps)", "Organizational planning (simple planner)",
    "Board game strategy (checkers)"]'
  hobbies: '["Reading adventure books", "LEGO building", "Tide-pool exploration", "Shell collecting and cataloguing", "Chess club (small group)", "Science kits (basic experiments)", "Watching wildlife documentaries"]'
  career_goals: Sheila dreams of becoming a marine scientist who studies ocean life along the Gulf Coast, inspired by beach trips and tide‑pool explorations. She also envisions designing safe and fun structures
    for children, hinting at an interest in civil engineering. Her pragmatic curiosity leads her to set short‑term goals like winning her school’s science fair and acquiring a beginner’s robotics kit, believing
    these steps will bring her closer to a future in scientific research or engineering.
