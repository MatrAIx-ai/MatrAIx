persona_description: A council member who is advocating for the renaming of Columbus Day to Indigenous Peoples' Day in Baltimore, Maryland. This council member is a Democrat and represents the West Baltimore
  district. They have introduced a bill to change the name of the holiday and have the support of other council members and indigenous community members. The council member believes that the renaming of
  the holiday is necessary to acknowledge and honor indigenous peoples.
