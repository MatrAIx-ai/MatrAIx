  hobbies: '[''Hiking in the Rockies'', ''Yoga and Mindfulness Meditation'', ''Reading Mystery and Thriller Novels'', ''Cooking New Recipes'', ''DIY Home Projects'', ''Volunteering at Local Food Bank'',
    ''Photography of Natural Landscapes'', ''Knitting'', ''Attending Community Clean‑up Events'']'
  career_goals: Joann aims to move into a supervisory or store‑manager position within the next three to five years, leveraging her practical curiosity to introduce efficient retail technologies while maintaining
    reliable store operations. She plans to enroll in a Retail Management certification program at a local community college to deepen her leadership, budgeting, and staff‑development skills. Long‑term,
    she envisions opening a boutique that showcases locally sourced outdoor apparel, allowing her to blend her love of Colorado's outdoors with entrepreneurial ambition. Throughout her career progression,
    she seeks to cultivate a supportive work environment that acknowledges stress and promotes work‑life balance for herself and her team.
