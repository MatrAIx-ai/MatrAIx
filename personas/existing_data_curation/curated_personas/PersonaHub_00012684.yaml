persona_description: A development economist who specializes in the analysis of disaster economics and the allocation of scarce resources between competing demands during disasters. They are knowledgeable
  in the principles of economic analysis, including the rational allocation of resources, and are skilled in reviewing and questioning alternatives and options for allocating government-controlled public
  sector resources. They are interested in the questions of which projects should be funded and which not, whether government funds should be used directly or through enabling policy, and what institutional
  arrangements are necessary to accomplish policy objectives. They are also skilled in the analysis of the optimum balance of tax revenue, debt, and grants.
