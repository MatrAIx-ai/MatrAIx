personas:
  professional: Larenda Pease, a 20-year-old commercial cleaning specialist in Cookeville, blends their mastery of eco-friendly cleaning protocols, inventory management, and minor maintenance with a keen
    aesthetic eye and calm, collaborative demeanor, positioning themselves for a future facilities-manager role at a cultural institution.
  sports: Larenda Pease, an active member of Cookeville's community recreation center, plays intramural volleyball for the Plateau Spikers club, attends weekly dance-fit classes, hikes the Cumberland Plateau
    each weekend, and roots for the Tennessee Tech Golden Eagles, Nashville Predators, and Memphis Grizzlies during their respective seasons; they thrive on the camaraderie and outdoor challenge these activities
    provide.
  arts: Larenda Pease, an avid participant in Cookeville's art workshops, spends weekends sketching Cumberland Plateau vistas in a style reminiscent of Albert Bierstadt, regularly visits the local museum
    to study works by regional painter Mary V. Ritchie, and unwinds to live performances by Tennessee singer-songwriter Jason Isbell and the Bluegrass group The Infamous Stringdusters, which they consider
    essential for creative recharge.
  travel: Larenda Pease, a 20-year-old explorer from Cookeville, favors affordable road-trip adventures such as weekend getaways to the Great Smoky Mountains, cultural immersion in Asheville's art scene,
    and a long-desired visit to Florence, Italy to study Renaissance masterpieces, while balancing travel budgeting with upcoming wedding expenses, and they often plan trips with friends to share the experience.
  culinary: Larenda Pease, an enthusiastic home cook, excels at preparing Southern comfort dishes such as creamy collard greens, smoked brisket, and buttermilk-fried chicken, often incorporates native herbs
    like sweet-grass and wild basil into experimental salads, and occasionally over-seasons with extra cayenne during late-night cooking sprees, which they claim adds a lively kick to their meals.
  core: Larenda Pease, a 20-year-old cleaning professional with an artist's eye, balances eco-friendly janitorial mastery and community art activism, yet secretly hoards spare cleaning supplies like a squirrel
    and never misses a local concert, because they love the lively atmosphere.
background:
  cultural: Larenda comes from a predominantly white, small‑town Southern background in Cookeville, Tennessee. She grew up in a close‑knit community where family, church, and neighborly support are central
    values. The region’s traditions—such as Southern hospitality, country and bluegrass music, and community festivals—have shaped her outlook. Her early marriage reflects a cultural emphasis on family
    stability. While rooted in these traditions, she also embraces the growing artistic and progressive currents in Overton County, participating in local cultural events and supporting sustainable practices.
    This blend of conventional Southern values and a forward‑looking curiosity informs her identity and aspirations.
