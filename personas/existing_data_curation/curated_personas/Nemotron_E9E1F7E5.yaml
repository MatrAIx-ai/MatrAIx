  hobbies: '[''Attending local art workshops'', ''Sketching and painting'', ''Visiting galleries and museums'', ''Intramural volleyball'', ''Community dance nights'', ''Volunteering at town festivals'',
    ''Hiking in the Cumberland Plateau'', ''Gardening with native plants'', ''Cooking Southern cuisine'', ''Listening to live music at local venues'']'
  career_goals: Larenda aims to advance from a janitor to a supervisory role within facility management, eventually becoming a Facilities Manager for a cultural institution such as a museum, art gallery,
    or community college. She plans to obtain certifications in Environmental Health & Safety and Sustainable Facility Operations, and to develop expertise in managing larger cleaning teams and budgeting.
    In the longer term, she dreams of launching her own cleaning business that emphasizes green practices and collaborates with local artists to create aesthetically pleasing environments. She also hopes
    to support her marriage by providing financial stability while continuing to explore artistic interests.
