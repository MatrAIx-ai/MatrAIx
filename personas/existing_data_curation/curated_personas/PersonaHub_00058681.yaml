persona_description: A theater lighting designer who specializes in the restoration and modern development of theatrical lighting systems. They are knowledgeable about the various lighting techniques and
  technologies used in the English theater industry during the 17th and 18th centuries, as well as the innovations brought by the French and English stages. They have a deep understanding of the functions
  of lighting in theater, including its ability to select visibility, reveal form, focus attention, set the mood, establish or alter location and time, and project or act as scenery. They are skilled in
  using mechanical filters and gobos to create specific lighting effects, and are familiar with the use of colored lights and lasers in modern theater lighting. They have a keen eye for detail and a passion
  for creating visually stunning and effective lighting designs for theater productions.
