personas:
  professional: Donna Welborn, a licensed substance‑abuse counselor in Phoenix, blends rigorous CBT/DBT protocols with expressive painting exercises, delivering meticulously organized case plans while leading
    dynamic group workshops that draw on their sociable energy and calm demeanor.
  sports: Donna Welborn, an enthusiastic member of the Phoenix Trail Runners club, spends weekends hiking the Sonoran desert, cheers for the Phoenix Suns and Arizona Cardinals, and incorporates weekly yoga
    sessions as their primary fitness routine.
  arts: Donna Welborn, a community‑theater enthusiast, regularly stages productions of classics like 'Our Town' and paints mixed‑media pieces inspired by Frida Kahlo and Georgia O'Keeffe, while attending
    live performances by Los Lobos and Joni Mitchell tributes, and they love to discuss the artistic process with audience members afterwards.
  travel: Donna Welborn, a detail‑oriented explorer, plans trips with itineraries down to the hour, has already trekked the Grand Canyon and explored Oaxaca’s markets, and they dream of a solo backpacking
    journey through Patagonia’s Patagonian steppe.
  culinary: Donna Welborn, an intermediate home cook, favors healthy Southwestern dishes such as grilled cactus tacos, quinoa‑black bean bowls with chipotle lime dressing, and homemade salsa verde, sourcing
    ingredients from local farmer’s markets, and they often host potluck gatherings for friends.
  core: Donna Welborn balances a meticulously scheduled life with spontaneous creative bursts, always carrying a sketchbook, thriving on social connection, and they maintain calm resilience while occasionally
    succumbing to late‑night art‑supply splurges.
background:
  cultural: Donna is a white woman raised in the multicultural environment of Phoenix, Arizona. Her upbringing blended suburban Midwestern values of practicality and self‑reliance with the vibrant Southwestern
    culture that celebrates Native American heritage, Mexican traditions, and a strong sense of community. Exposure to diverse neighborhoods fostered her appreciation for cultural nuance, which she incorporates
    into her counseling practice. While English is her primary language, she has basic conversational Spanish skills and a deep respect for the region’s diverse linguistic and cultural landscape. Her arts‑humanities
    education further enriches her worldview, encouraging an interdisciplinary perspective that bridges literature, history, and creative expression with her professional commitment to holistic, client‑centered
    care.
attributes:
  skills: '[''Motivational Interviewing'', ''Crisis Intervention'', ''Individual Counseling'', ''Group Facilitation'', ''Treatment Planning'', ''Case Management'', ''Documentation and Record Keeping'',
    ''Psychoeducation'', ''Harm Reduction Strategies'', ''Relapse Prevention'', ''Cognitive Behavioral Therapy (CBT)'', ''Dialectical Behavior Therapy (DBT)'', ''Cultural Competence'', ''Creative Arts Integration'',
    ''Public Speaking'', ''Program Development'']'
  hobbies: '[''Hiking in the Sonoran Desert'', ''Painting and Mixed Media Art'', ''Community Theater Acting'', ''Yoga and Mindfulness'', ''Cooking Healthy Southwestern Cuisine'', ''Reading Contemporary
    Literature'', ''Hosting Book Club Meetings'', ''Volunteering at Local Shelters'', ''Organizing Community Wellness Workshops'', ''Photography'']'
  career_goals: Donna aims to become a fully licensed professional counselor with a specialization in addiction treatment, obtaining certifications such as Certified Addiction Counselor and DBT Trainer
    within the next three years. She envisions designing and directing a community‑based program that merges structured evidence‑based therapies with creative arts interventions to engage underserved youth
    in Phoenix. Long‑term, she aspires to influence regional health policy on substance‑abuse prevention, mentor emerging counselors, and establish a nonprofit that offers culturally responsive, arts‑infused
    recovery services while maintaining a balanced, sustainable lifestyle.
