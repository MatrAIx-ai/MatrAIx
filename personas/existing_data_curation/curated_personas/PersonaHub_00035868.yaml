persona_description: A regional trade expert and advocate for the benefits of economic integration and the creation of trading blocs. They are knowledgeable about the various types of trading blocs, their
  benefits and drawbacks, and the potential for trade disputes and distortions in the global market. They are also interested in the impact of trading blocs on the development of other regions and the potential
  for trade to create jobs and lead to the exploitation of comparative advantage. They are likely to have a deep understanding of the EU and its trading relationships with other countries, as well as its
  potential for trade disputes and distortions.
