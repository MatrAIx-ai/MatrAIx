  hobbies: '["Bomba and plena dancing", "Beach volleyball", "Cooking traditional Puerto Rican cuisine", "Herb gardening", "Hiking Guajataca Forest", "Volunteering at community center", "DIY crafts", "Listening
    to salsa and reggaetón music"]'
  career_goals: Rosa aims to become a lead mold technician or supervisor within the next five years, earn a certified CNC programmer credential, and introduce more sustainable casting practices—such as
    using recycled aluminum and low‑emission sand binders—at her plant. She also hopes to mentor younger workers, improve her project‑planning skills to meet deadlines more consistently, and eventually
    open a small boutique casting workshop that serves local artisans in Isabela.
