personas:
  professional: Rosa Carabeo, a seasoned mold technician at a metal foundry, blends meticulous pattern‑making and CNC programming expertise with a hands‑on curiosity that drives her to experiment with recycled
    aluminum alloys, while her spontaneous, flexible approach often leads her to improvise on‑the‑fly solutions, making her the go‑to teammate for troubleshooting and training new staff.
  sports: Rosa Carabeo, an avid beach‑volleyball player with the Coastal Spikers club, spends weekends competing on sun‑kissed sand courts, follows the regional soccer team Harbor FC with enthusiastic loyalty,
    and incorporates daily sunrise jogs along the coastal trail to stay fit and energized.
  arts: Rosa Carabeo, a lifelong aficionado of rhythmic expression, spends evenings dancing bomba and plena to the classic salsa sounds of Héctor Lavoe and modern reggaetón beats from Bad Bunny, while also
    attending local theater productions featuring performers like Lin‑Manuel Miranda and collecting vibrant Frida Kahlo prints that echo her energetic spirit.
  travel: Rosa Carabeo, whose travel style balances spontaneous weekend getaways to nearby beach towns with occasional longer adventures to Caribbean islands such as Jamaica and cultural capitals like Barcelona,
    prefers a mix of relaxed beach lounging and active exploration, all while budgeting within a modest savings plan that leaves room for family obligations.
  culinary: Rosa Carabeo, a confident home chef, delights in preparing traditional island dishes such as mofongo made with fried plantains, garlic, and chicharrón, and pasteles wrapped in banana leaves,
    while seasoning her creations with fresh herb blends—cilantro, oregano, and chiltepin—from her rooftop garden to elevate grilled fish and hearty soups.
  core: Rosa Carabeo blends a hands‑on curiosity for metal casting with a spontaneous, community‑driven spirit, juggling rooftop herb gardening, beach volleyball, and late‑night dancing while constantly
    battling the chaos of missed deadlines and the allure of impulse spending.
background:
  cultural: Rosa was born and raised in Isabela, a coastal municipality of Puerto Rico known for its beaches, agriculture, and vibrant festivals. She grew up in a close‑knit family that placed great value
    on community, music, and food, celebrating events such as the patron saint fiesta and the annual Kite Festival. Her cultural identity blends Spanish, Taíno, and African influences evident in the island’s
    cuisine, rhythm, and strong sense of 'familismo'. Fluent in Spanish and comfortable with English, she navigated the aftermath of recent hurricanes, showing resilience while preserving the island’s traditions
    and communal spirit.
attributes:
