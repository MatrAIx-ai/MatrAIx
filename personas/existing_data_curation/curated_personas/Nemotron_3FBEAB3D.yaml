  hobbies: '[''LEGO Technic building'', ''Robotics club (FIRST LEGO League)'', ''Scratch coding'', ''Reading science-fiction (e.g., "The Wild Robot")'', ''Chess'', ''Technical sketching'', ''Hiking in White
    River State Park'', ''Volunteer storytime assistant at Anderson Public Library'', ''Small-group community service (park clean-ups)'']'
  career_goals: Steven aspires to become a biomedical engineer or medical‑device designer, motivated by his desire to help others and apply his curiosity to practical solutions. He dreams of creating assistive
    technologies that improve everyday life for people with disabilities. In the longer term, he also envisions teaching STEM subjects to younger students, sharing his love of organized learning and compassionate
    mentorship. He plans to earn a scholarship for a specialized engineering high school, pursue an engineering degree, and ultimately work on innovative health‑tech projects.
