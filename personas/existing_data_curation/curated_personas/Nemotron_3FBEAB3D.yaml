personas:
  professional: Steven Lesnikoski, an aspiring robotics engineer at age 11, channels meticulous design skills honed through LEGO Technic builds into Scratch and Python projects while they lead a small build
    club that values precision, compassion, and practical problem‑solving.
  sports: Steven Lesnikoski enjoys weekend hikes on the loop trail at White River State Park, plays midfield for the Indy Explorers youth soccer club, and cheers on the Indianapolis Colts and Indiana Pacers,
    balancing low‑impact cardio with team camaraderie and strategic thinking.
  arts: Steven Lesnikoski, a budding storyteller, creates interactive Scratch adventures inspired by Peter Brown’s "The Wild Robot" and the cinematic scores of John Williams, while they sketch detailed
    technical drawings of their inventions during art workshops at the Indianapolis Museum of Art.
  travel: Steven Lesnikoski prefers day‑trips that blend learning and adventure, such as outings to the Indianapolis Zoo or a family road‑trip to the Great Smoky Mountains, planning each itinerary in a
    notebook they meticulously annotate with budget estimates and must‑see elevations.
  culinary: Steven Lesnikoski delights in assembling homemade pizza with a crisp crust, mozzarella, pepperoni, and a daring drizzle of pineapple, while they also love whipping up chocolate‑chip cookies
    and experimenting with fruit‑skewer kebabs shaped like tiny robots.
  core: Steven Lesnikoski is an organized, compassionate 11‑year‑old who fuses LEGO engineering with Python coding, thrives in small‑group collaborations, and keeps a precise allowance ledger for future
    robotics projects.
background:
  cultural: Steven was raised in Anderson, Indiana, a close‑knit Midwestern community that values hard work, self‑reliance, and neighborly support. His family carries Polish heritage, reflected in occasional
    celebrations of Polish holidays, traditional dishes like pierogi, and participation in a local Catholic parish that reinforces community service and family values. He embraces typical American customs—Thanksgiving,
    Fourth of July fireworks, and local high‑school spirit—while also honoring his Polish roots through language snippets and cultural traditions shared at home. This blend of Midwestern pragmatism and
    Polish cultural richness shapes his identity and influences his compassionate, organized outlook.
