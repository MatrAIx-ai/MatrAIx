personas:
  professional: Sawat, a ten‑year‑old budding architect, constructs intricate LEGO cities and designs sprawling Minecraft realms, channeling their curious practicality into step‑by‑step creations while
    they often overlook deadlines due to a spontaneous streak.
  sports: Sawat plays forward for the Riverbrook youth soccer club, enjoys cheering on the Seattle Seahawks and Portland Timbers during family TV nights, and they join a community basketball clinic in the
    summer, preferring the camaraderie of informal kick‑around games over rigid training drills.
  arts: Sawat draws vibrant comic strips inspired by family folklore, listens to pop artists like Billie Eilish and Harry Styles alongside traditional folk songs, and creates short LEGO build videos that
    echo the storytelling flair of Adventure Time, with they often quoting lines from Naruto for comedic effect.
  travel: Sawat loves weekend hikes through Columbia parks, has explored the Columbia River Gorge and the Oregon Museum of Science and Industry, and they dream of visiting the Grand Canyon and the coastal
    city of Vancouver, balancing school obligations with family‑friendly adventure trips.
  culinary: Sawat helps prepare family meals, mastering the flavors of spicy noodle soup with rice noodles, chili, basil, and ginger, sweet sticky rice dessert, and stir‑fried vegetables with garlic, often
    experimenting by adding finely crushed LEGO‑shaped carrot sticks for fun presentation, and they take pride in plating each dish with a splash of creativity.
  core: Sawat is a curiosity‑driven ten‑year‑old who transforms LEGO bricks and insect sketches into imaginative worlds, juggling spontaneous creativity with occasional disorganization, and they never miss
    a chance to share their latest build on a family video chat.
background:
  cultural: Sawat’s family originates from Laos, a Southeast Asian country with rich Buddhist traditions and a strong emphasis on family and community. At home, Lao is spoken alongside English, and cultural
    practices such as celebrating Pi Mai (Lao New Year) with water‑sprinkling rituals and preparing sticky rice dishes are maintained. The household values respect for elders, modesty, and collective well‑being,
    which shape Sawat’s cooperative and considerate nature. Living in Columbia, Missouri, he attends a multicultural elementary school where he blends his heritage with Midwestern American customs, participating
    in community events like the Boone County Fair while still honoring his family’s festivals and cuisine.
attributes:
  skills: '[''LEGO construction'', ''Basic Scratch programming'', ''Bilingual communication (English & Lao)'', ''Advanced reading comprehension'', ''Group teamwork and mediation'', ''Basic cooking skills'',
