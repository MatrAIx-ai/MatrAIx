  hobbies: '[''LEGO building'', ''Minecraft'', ''Insect collecting and sketching'', ''Reading adventure/science fiction'', ''Comic strip drawing'', ''Soccer'', ''Cooking traditional Lao dishes'', ''Listening
    to music'', ''Creating short video showcases'']'
  career_goals: He dreams of becoming a creator of practical inventions, especially in robotics and environmental tech. Sawat hopes to design simple devices that make everyday life easier for his family
    and community, such as a low‑cost water‑filter or a garden‑monitoring robot. He is also fascinated by space exploration and imagines a future where he could work as an astronaut‑engineer. While his
    interests are broad, he consistently aims to blend his love for technology with his desire to help others, planning to study engineering in high school and later pursue a degree that lets him develop
    tools for sustainable living.
