  career_goals: Kolby envisions a future where he can apply his love for structure, practicality, and systematic thinking to a career in civil engineering or software development. He aims to join his high
    school's advanced STEM program, earn a robotics competition certificate, and later pursue a degree in civil engineering with a focus on designing sustainable community infrastructure such as bridges
    and roads. In the short term, he hopes to achieve a coding certification through a local after‑school program, secure a summer internship with a construction or tech firm that offers structured, hands‑on
    projects, and continue building a portfolio of practical, reliable designs.
