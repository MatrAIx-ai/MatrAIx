personas:
  professional: A budding engineer-in-training who converts LEGO building sessions and Scratch game design into real-world problem-solving practice, Kolby Kennedy applies methodical planning and a love
    of concrete results to every school project.
  sports: A disciplined soccer midfielder who thrives on a fixed practice schedule, Kolby Kennedy logs personal performance stats after each drill, models his teamwork after FC Barcelona's fluid play, and
    never misses the weekend match.
  arts: A dedicated guitarist who hones scales to the cadence of The Beatles and John Mayer, Kolby Kennedy also volunteers at the local community theater's backstage crew, finding rhythm in both music and
    stagecraft.
  travel: A methodical explorer who maps out every trip on a spreadsheet, Kolby Kennedy has already toured the Smithsonian Air and Space Museum in Washington, D.C., camped in Yellowstone National Park,
    and now dreams of a carefully planned itinerary to Tokyo's Akihabara district, balancing school schedule with family vacations.
  culinary: A pragmatic home-cook who enjoys assembling homemade pepperoni pizza on a stone crust, whipping up banana-flour pancakes, and seasoning grilled chicken with garlic and rosemary, Kolby Kennedy
    follows step-by-step recipes with the same precision they apply to LEGO instructions.
  core: Kolby Kennedy is a routine-oriented, detail-driven 13-year-old who transforms hobbies like LEGO building, guitar practice, and soccer into structured pursuits, even if it means occasionally rearranging
    the entire bedroom for optimal workflow.
background:
  cultural: Kolby was raised in Sicklerville, a suburban community in Gloucester County, New Jersey. His family’s heritage traces back to Northern European roots—primarily German, Irish, and English—common
    among many white families in the area. He grew up attending public schools, celebrating mainstream American holidays such as Independence Day, Thanksgiving, and Christmas, often with family traditions
    like backyard barbecues and holiday meals. Community life centers on school events, local sports, and neighborhood gatherings, reinforcing values of reliability, practicality, and community involvement.
    These cultural influences shape his appreciation for order, routine, and collaborative activities.
attributes:
  skills: '["Organizational abilities", "Time management", "Basic coding (Scratch/Python)", "Methodical problem‑solving", "Model building (LEGO Technic, airplane kits)", "Teamwork and reliable task execution",
