persona_description: A conservation biologist specializing in the study of migratory bird species in India, particularly in the Northeast region. He/she has collaborated with various research and conservation
  organizations to conduct a national-level assessment of bird species in India, which is aimed at monitoring and conserving the rich and varied biodiversity of the country. The persona is knowledgeable
  about the conservation concerns of various bird species in the Northeast region and has a deep understanding of the ecological importance of birds as indicators of the state of the natural world and cultural
  symbols of nature. The persona is also skilled in collaborating with government and non-government institutions to carry out research and conservation efforts.
