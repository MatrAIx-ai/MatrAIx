personas:
  professional: A curious four-year-old named Dat Lakhani loves to play pretend scientist, building LEGO experiments and inviting friends to explore colors and simple cause‑effect ideas, always improvising
    with whatever toys are at hand.
  sports: Dat Lakhani kicks around a soccer ball with the neighborhood junior soccer club, eagerly watches the local professional baseball team, the River City Runners, during weekend games, and splashes
    through swim lessons every Thursday, preferring spontaneous playground tag over structured workouts.
  arts: Dat Lakhani delights in the lively tunes of Raffi, the animated adventures of Disney’s Frozen, and the colorful illustrations of Dr. Seuss, often sketching bright crayon pictures of snowflakes and
    friendly monsters during arts‑and‑craft time.
  travel: Dat Lakhani loves weekend trips to the city zoo, sunny days at Brighton Beach, and family vacations to Disney World, while daydreaming about an upcoming adventure to the Grand Canyon.
  culinary: Dat Lakhani adores cheesy mac and cheese, chicken nuggets with ketchup, strawberry slices, and peanut butter‑banana sandwiches, often mixing crayons‑colored sprinkles into their plate for extra
    fun.
  core: A boundlessly curious four‑year‑old named Dat Lakhani constantly swaps crayons for toys and stickers, turning everyday moments into bright, improvisational adventures, though they sometimes lose
    track of snack time in their whirlwind of play.
background:
  cultural: Dat was born to Indian parents who migrated to the United States. He grows up in Jersey City's multicultural neighborhood, speaking English at preschool and hearing Hindi or Gujarati at home.
    The family celebrates Diwali, Holi, and other South‑Asian festivals with lights, sweets, and traditional music, which he enjoys dancing to. He is exposed to Bollywood songs, Indian folktales, and spicy
    home‑cooked meals, while also engaging with the diverse community around him. This bicultural upbringing shapes his appreciation for vibrant colours, rhythmic music, and storytelling.
