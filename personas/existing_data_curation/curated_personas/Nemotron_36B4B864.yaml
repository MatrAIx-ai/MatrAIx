  career_goals: Dat imagines himself in colorful, creative roles. He often says he wants to be a painting superhero who makes pictures come alive, an explorer who finds new stories, or a storyteller who
    shares adventures with friends. He also dreams of traveling to space, reflecting his curiosity, love of art, and desire to connect with others.
