  hobbies: '[''Cooking Puerto Rican cuisine'', ''Watching soccer'', ''Playing video games'', ''Jogging'', ''Volunteering at community food drives'', ''Indoor herb gardening'', ''Listening to salsa and reggaeton'']'
  career_goals: Mario seeks a stable, routine‑focused position such as an administrative assistant, logistics coordinator, or operations associate where he can apply his organizational abilities and bilingual
    communication. Over the next two years he plans to obtain a professional certification—such as Certified Administrative Professional—to strengthen his qualifications. His longer‑term ambition is to
    advance into a supervisory role that allows him to mentor new staff and help create a supportive, harmonious workplace.
