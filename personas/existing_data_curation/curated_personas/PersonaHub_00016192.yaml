persona_description: A microbiologist who specializes in the study of environmental microbiology, particularly in the areas of molecular biology, environmental microbiology, and bioremediation. They are
  knowledgeable in the use of DNA-based technologies and new methods for the study of RNA and proteins extracted from environmental samples. They have a strong interest in the diversity and impact of microorganisms
  in different environments, including the roles they play in biogeochemical cycles and their potential applications in in-situ remediation of domestic, agricultural, and industrial wastes. They are also
  interested in the degradation of toxic waste by microorganisms, particularly in the degradation of aromatic compounds by Acinetobacter, and in the use of bioreactors in the design of biotreatment processes.
