personas:
  professional: Rhoda Bradley, a two‑year‑old future architect in the making, stacks block towers with meticulous order yet freely rearranges them when inspiration strikes, showing how they balance a love
    of predictability with a desire for flexible play.
  sports: Rhoda Bradley loves watching the Chicago Cubs on weekend family TV time, often mimicking the cheering crowd with a squeaky toy, and participates in a toddler‑friendly gymnastics club called Tiny
    Movers, which satisfies their energetic and sociable nature.
  arts: Rhoda Bradley delights in the music of Raffi and The Wiggles, dances to the upbeat rhythm during playtime, and flips through Eric Carle's 'The Very Hungry Caterpillar', showing how they weave music
    and picture books into their daily creative expression.
  travel: Rhoda Bradley enjoys car‑seat adventures to the nearby city zoo and the sandy shores of Santa Monica Beach, and they dream of a future family trip to Disneyland Paris, combining the comfort of
    familiar routines with the excitement of new sights.
  culinary: Rhoda Bradley favors mashed sweet potatoes seasoned with a pinch of cinnamon and banana oat pancakes drizzled with a thin layer of maple syrup, eagerly smearing a bit of avocado on toast as
    they explore flavors through messy, hands‑on meals.
  core: Rhoda Bradley is a structured‑yet‑flexible, sociable toddler who balances cooperative play with assertive curiosity, turning every routine into a small adventure while occasionally succumbing to
    sticky‑finger snack cravings.
background:
  cultural: Rhoda grows up in a white, middle-class family in Hemet, California, a city in Riverside County known for its blend of suburban and agricultural surroundings. Her household celebrates typical
    American holidays—Thanksgiving, Christmas, Independence Day—and participates in community events such as the local county fair and school festivals. While her immediate cultural heritage is rooted in
    European-American traditions, living in Southern California exposes her to a multicultural environment, including occasional Spanish language exposure and regional cuisine. Family values emphasize community
    involvement, neighborly kindness, and a strong support network that encourages participation in group activities and communal celebrations.
