  career_goals: Although still in the early stages of self-concept, Rhoda often expresses enthusiasm for role-play that hints at future aspirations. She enjoys pretending to be a teacher, leading pretend
    classroom songs, and caring for stuffed animals, suggesting an early interest in nurturing occupations. She also shows fascination with animal care when visiting a local pet store, pointing toward a
    potential wish to become a veterinarian or animal caretaker. Additionally, her love for group games and helping classmates hints at an eventual desire to work in a community-focused role such as a preschool
    teacher, daycare assistant, or community volunteer. These budding ambitions reflect her sociable nature, preference for structured yet flexible environments, and desire to help others.
