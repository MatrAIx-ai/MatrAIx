personas:
  professional: David Bruno, a 16‑year‑old budding trades enthusiast, blends his knack for hands‑on problem solving on bikes, skateboards, and simple electronics with a love of strategy‑heavy video games,
    using practical curiosity to tinker, troubleshoot, and mediate friends’ tech disputes while often resisting rigid schedules and occasionally missing deadlines.
  sports: David Bruno enjoys riding his mountain bike on Cherokee County trails, skateboarding at the local concrete park, and cheering for the Woodstock High School Warriors football team, while they also
    fish at Lake Allatoona on weekends and occasionally join a teen cycling club.
  arts: David Bruno spends evenings strumming acoustic guitar chords inspired by John Mayer and listening to country‑rock stations like KISS 92, while they create short TikTok videos showcasing DIY hacks
    set to tracks by Lil Nas X and practice basic video editing as a creative outlet.
  travel: David Bruno prefers short road trips to nearby spots such as historic Savannah and the Georgia Aquarium in Atlanta, yet dreams of a summer camping adventure in the Great Smoky Mountains, often
    planning itineraries on a phone app but sometimes forgetting to pack essential gear.
  culinary: David Bruno favors backyard barbecues featuring pulled‑pork sandwiches, corn on the cob, and sweet tea, while they occasionally experiment by seasoning freshly caught catfish with a lemon‑pepper
    rub, yet their cooking skill is limited to grilling and microwaving mac & cheese.
  core: David Bruno is a curious, hands‑on teen who balances spontaneous tinkering with practical ambitions, occasionally disorganized but always ready to lend a wrench, a guitar pick, or a quick hack video.
background:
  cultural: David grew up in a white, Southern‑midwest family in Woodstock, GA, where community events like county fairs, high‑school football games, and church gatherings shape daily life. His family values
    self‑reliance and neighborly help, a trait reflected in his willingness to lend a hand with repairs. Southern hospitality influences his friendly, cooperative demeanor, while the region’s mix of rural
    and suburban settings gives him access to both outdoor trails and small‑town shops. He’s familiar with local traditions such as backyard barbecues, country‑rock radio, and the emphasis on practicality
    that is common in Cherokee County households.
attributes:
  skills: '[''Basic bike and skateboard repair'', ''Smartphone troubleshooting'', ''Introductory Arduino/LED projects'', ''Video game strategy analysis'', ''Peer conflict mediation'', ''Social media video
    editing (mobile)'', ''Basic woodworking (simple projects)'']'
  hobbies: '[''Playing strategy video games (Fortnite, Minecraft)'', ''Bicycle riding and customization'', ''Skateboarding at local park'', ''DIY electronics (Arduino, LED circuits)'', ''Acoustic guitar
    practice'', ''Hiking and fishing at Lake Allatoona'', ''Creating TikTok DIY videos'', ''Watching science and maker‑channel YouTube videos'']'
  career_goals: David envisions a future where his practical skills turn into a trade. He plans to earn his GED by age 18 and then enroll in a local automotive‑technician apprenticeship or a community‑college
    program in electrical work. He hopes to combine his love for tinkering with a stable career, eventually opening a small garage where he can customize bikes and run a modest side‑business creating DIY
    video tutorials. He also keeps an open mind about enlisting in the Army Reserve if it offers a structured path to technical training, balancing his desire for independence with practical security.
