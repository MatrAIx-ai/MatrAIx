personas:
  professional: Diane Branton is a newborn whose early environment already hints at a future career in project coordination, as they already show a knack for order in the way their parents meticulously
    schedule naps, feedings, and diaper changes using color‑coded charts.
  sports: Diane Branton is a newborn who, despite their age, is already part of weekend family rituals of watching the Buffalo Bills on Sundays and occasionally attends a parent‑led infant swimming class
    at the local community pool.
  arts: Diane Branton is a newborn enchanted by the gentle lullabies of Sarah McLachlan and classic bedtime stories like 'Goodnight Moon', often hearing live folk music performances at the county fair that
    spark their early imagination.
  travel: Diane Branton is a newborn who has already enjoyed family road trips to the Finger Lakes and seasonal visits to the county fair, preferring car‑seat comfort and the rhythmic scenery of rolling
    hills over bustling airports, which they observe with wide‑eyed curiosity.
  culinary: Diane Branton is a newborn who delights in the warm aroma of apple‑cinnamon porridge their mother prepares during the apple‑picking season and occasionally experiences the subtle sweetness of
    breastmilk that reminds them of fresh farm produce.
  core: Diane Branton, a newborn from a modest upstate New York town, displays a rare blend of vivid curiosity, methodical calm, and social warmth, though they often fuss when overstimulated.
