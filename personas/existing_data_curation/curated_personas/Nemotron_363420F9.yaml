personas:
  professional: Julie Goodman is a Certified School Bus Driver in Fort Bend County known for her strong defensive driving and vehicle maintenance skills, who leverages her imagination and storytelling to
    keep students engaged during trips while dreaming of training new drivers and coordinating transportation safety programs.
  sports: Julie Goodman enjoys casual fitness by walking the bus routes and joining the Fort Bend Trails walking club, supports the Houston Astros, Rockets, and Texans, and occasionally plays in a co‑ed
    adult soccer league called the Richmond Rovers, though they often skip scheduled workouts when route changes disrupt their routine.
  arts: Julie Goodman is a watercolor enthusiast who admires the soft palettes of John Singer Sargent, draws inspiration from the candid street photography of Vivian Maier, relishes the fantasy worlds of
    Brandon Sanderson and the sci‑fi twists of Neil Gaiman, and finds community theater magic backstage alongside the bluesy guitar work of local musician Samantha Lee.
  travel: Julie Goodman loves weekend road trips to Hill Country towns like Fredericksburg, long drives to Santa Fe for its art markets, and dreams of a photography expedition to Marrakech's spice souks,
    but they usually plan trips on a whim and must balance bus schedule and family commitments.
  culinary: Julie Goodman delights in crafting Tex‑Mex fusion dishes such as chipotle‑marinated shrimp tacos with fresh cilantro‑lime slaw and roasted corn, while their garden yields crisp zucchini for
    quick ratatouille; they consider themselves an intermediate home cook who experiments with smoked paprika, ancho chilies, and queso fresco, and often share their creations at community potlucks.
  core: Julie Goodman blends a creative spirit with a compassionate drive, turning bus routes into moving classrooms while juggling art, garden, and a worry‑prone mind.
background:
  cultural: Julie was raised in a traditional Southern, middle‑class family in Richmond, Texas. Her family’s Anglo‑American heritage blends classic Texan values—hard work, community gatherings, and a love
    of local cuisine—with an appreciation for the arts nurtured by her parents’ encouragement of creative pursuits. She identifies as a White American, stays active in her local church, and enjoys the multicultural
    atmosphere of Fort Bend County, often sharing experiences with neighbors from diverse backgrounds while preserving the warm hospitality characteristic of her Texas upbringing.
attributes:
  skills: '[''Class B CDL with School Bus Endorsement'', ''Defensive Driving'', ''Vehicle Maintenance'', ''Route Planning'', ''GPS Navigation'', ''Student Supervision'', ''Behavior Management'', ''First
    Aid/CPR'', ''Conflict De‑escalation'', ''Creative Storytelling'', ''Community Engagement'']'
  hobbies: '[''Watercolor painting'', ''Sketching'', ''Photography'', ''Reading fantasy novels'', ''Writing short stories'', ''Experimenting with Tex‑Mex recipes'', ''Gardening'', ''Volunteering at school
    events'', ''Community theater backstage work'', ''Attending art walks and craft fairs'']'
  career_goals: Julie aims to become a Certified Bus Driver Trainer and eventually move into a Transportation Safety Coordinator role within the Fort Bend County school district. She hopes to design and
    lead safety workshops for new drivers, develop an after‑school art program that uses the bus as a mobile studio, and advocate for student mental‑health resources on routes. To support these ambitions,
    she plans to complete online courses in transportation logistics and attend local art‑education seminars, while also seeking mentorship opportunities that blend her love of creativity with her dedication
    to student well‑being.
