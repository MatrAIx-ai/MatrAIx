  career_goals: Noah dreams of turning his practical curiosity into a career that blends engineering and creativity. He aspires to study robotics or mechanical engineering, designing functional machines
    that solve everyday problems. He also imagines creating interactive educational games that teach other kids problem‑solving skills, reflecting his desire to merge technology with learning.
