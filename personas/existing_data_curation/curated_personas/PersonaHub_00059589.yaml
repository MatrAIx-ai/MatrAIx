persona_description: A prominent French painter from the late 18th century, known for his contributions to the history of art and his innovative style. David was committed to artistic freedom and saw himself
  as a visual historian of his time, striving to enlighten the public and present role models of heroism and virtue. He was a deeply emotional person, close to his wife and greatly concerned for the welfare
  of their children. David was also known for his competitiveness, confidence, and boastfulness. Despite his flaws, he was admired by many of his students, who found him difficult but also highly talented.
