  career_goals: Desiree aims to transition into a part‑time consulting role that assists small businesses and nonprofit organizations in the Upstate South Carolina area with administrative efficiency and
    workplace harmony. She seeks to develop a mentorship program for junior administrative staff, champion the integration of art and wellbeing in office spaces, and create workshops that teach essential
    office skills to community members, especially seniors and youth. Long‑term, she envisions establishing a modest community art space that also serves as a learning hub for best‑practice office management,
    allowing her to blend her professional expertise with her passion for the arts while gradually reducing her formal workload.
