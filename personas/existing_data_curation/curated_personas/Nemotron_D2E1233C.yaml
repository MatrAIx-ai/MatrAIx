    ''Book club member'', ''DIY home improvement projects'']'
  career_goals: Georgina aims to deepen her clinical expertise while moving into a leadership role within her practice. She plans to obtain advanced certifications such as the Certified Dispensing Optician
    (CDO) and pursue a master's degree in education to blend her teaching background with optometric care. Her long‑term ambition is to launch a boutique optical studio that integrates personalized eye‑care
    services with community education programs, including school‑based vision screenings and public health workshops. She also hopes to become a recognized speaker at regional health‑fair conferences and
    to influence local policy on vision care accessibility.
