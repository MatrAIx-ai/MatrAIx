personas:
  professional: Frances Bares, a seasoned advertising sales consultant, leverages three decades of relationship‑building and market‑research expertise to craft empathetic, impact‑driven campaigns for non‑profit
    arts groups and small community businesses while mentoring younger sales professionals with a collaborative, flexible approach.
  sports: Frances Bares enjoys gentle morning walks with the Elbridge Birdwatchers Club, attends Rochester Red Wings baseball games in the summer, follows the New York Knicks during the NBA season, and
    prefers low‑impact activities like yoga and gardening over competitive team sports, often citing occasional joint pain as a limiting factor.
  arts: Frances Bares immerses herself in visual arts by sketching in the Rochester Museum of Arts, collecting Monet prints, listening to Miles Davis and Debussy on her vintage turntable, and volunteering
    to design flyers for local community theatre, finding these creative rituals central to her solitary yet compassionate outlook.
  travel: Frances Bares favors low‑key, nature‑focused getaways, planning spontaneous weekend trips to the Finger Lakes and Acadia National Park while dreaming of a leisurely tour through the Tuscan countryside,
    yet she balances travel ambitions with a modest consulting income and a preference for quiet, solitary experiences.
  culinary: Frances Bares enjoys preparing simple yet elegant garden‑to‑table meals such as herb‑crusted chicken with roasted beets and goat‑cheese salad, often seasoning with fresh rosemary and thyme from
    her own garden, while occasionally treating herself to a classic New York‑style bagel with lox and artisanal coffee at the local bistro.
  core: Frances Bares, a 63‑year‑old former ad‑sales professional, blends quiet artistic pursuits with a compassionate, slightly disorganized work ethic, channeling her curiosity into solitary sketching
    sessions and part‑time consulting for local arts nonprofits, all while occasionally forgetting to water her garden.
background:
  cultural: Frances grew up in a middle-class, white family in upstate New York, where the values of self-reliance, modesty, and community involvement were emphasized. Her upbringing in the rural-suburban
    mix of Cayuga County exposed her to both agricultural traditions and small-town commercial life, fostering an appreciation for hard work and local heritage. Although she did not pursue higher education
    beyond high school, she has cultivated a lifelong curiosity through community lectures, library programs, and informal self-study, especially in the arts. Her cultural identity is shaped by the region's
    New England-derived traditions, a modest Protestant background, and a deep respect for the natural environment that surrounds her hometown. These influences combine with her compassionate nature, prompting
    her to give back to her community through volunteer work and supportive professional relationships.
