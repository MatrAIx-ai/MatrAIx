  career_goals: Approaching retirement, Frances aims to transition from a full-time sales role to a part-time consulting practice that focuses on supporting non-profit arts groups and small community businesses
    in the Elbridge area. She hopes to become a trusted advisor who can help these organizations craft ethical, impact-driven advertising campaigns while preserving their unique voice. Frances also wishes
    to mentor younger sales professionals, sharing her decades of experience and emphasizing empathy and creativity in client work. Financial stability remains important, so she plans to maintain a modest
    income stream through freelance projects, allowing her the flexibility to pursue solitary hobbies and volunteer work without the pressure of a rigid schedule.
