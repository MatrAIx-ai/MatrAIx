  career_goals: Eduardo aims to progress from field technician to senior lead technician within the next three years, gaining certifications in electronics and IoT integration. He aspires to manage a service
    team, overseeing scheduling, training, and quality control while maintaining a balanced workload that reduces his anxiety. In the longer term, he envisions launching his own small fleet of modern, cash‑less
    vending machines that combine Mexican‑style snack offerings with cutting‑edge remote monitoring. To achieve this, he plans to enroll in an associate’s program in electrical‑technology and build a network
    of reliable suppliers.
