  career_goals: Jacques imagines a future where he works in a field that offers clear procedures and tangible outcomes. He is drawn to careers such as civil engineering or software development, where he
    can design safe structures or create computer programs that solve real‑world problems. He also dreams of participating in robotics or coding competitions, seeing success as a way to prove his abilities
    and earn recognition.
