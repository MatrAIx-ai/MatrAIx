personas:
  professional: Khoan Nguyen is a senior property appraiser specializing in historic and culturally significant real estate, leveraging GIS, drone imaging, and AI‑driven valuation while channeling a curiosity
    for art into nuanced market analyses that balance meticulous data with creative insight.
  sports: Khoan Nguyen enjoys weekend hikes through the Sandhills with the local Trailblazers Hiking Club, follows the Nebraska Cornhuskers football and Omaha Storm Chasers baseball, and maintains a weekly
    yoga routine at the community center to counterbalance desk work.
  arts: Khoan Nguyen frequents the Sheldon Museum of Art to admire works by Ai Weiwei and Yayoi Kusama, curates a personal photography portfolio of Lincoln’s historic neighborhoods, and regularly attends
    Nebraska Repertory Theatre productions starring Dean Winters.
  travel: Khoan Nguyen prefers meticulously planned trips blending cultural immersion and adventure, having explored Kyoto’s temples, the coastal town of Hoi An for its lantern festivals, and the rugged
    Badlands, while dreaming of a road‑trip along Route 66 to capture Midwest horizons.
  culinary: Khoan Nguyen is an avid home chef who perfects pho broth, experiments with lemongrass‑infused grilled chicken, and regularly hosts dinner parties featuring bánh mì sliders, yet admits to a guilty
    love for ultra‑spicy sriracha‑drizzled tacos.
  core: Khoan Nguyen is a data‑driven appraisal expert whose love for art, drone tech, and community festivals fuels a meticulous yet creatively curious approach to both work and life, tempered by a habit
    of late‑night coffee and occasional over‑booking.
background:
  cultural: Khoan is a second‑generation Southeast Asian American whose family originates from Vietnam. He was raised in a bilingual household, integrating collectivist values such as respect for elders,
    community solidarity, and a deep appreciation for cultural arts with the entrepreneurial spirit of American society. Living in Lincoln, NE, he actively participates in local Vietnamese community events
    like Tet celebrations and contributes to cultural exchange programs, blending his heritage with his professional work in property appraisal. His background informs his nuanced perspective on historic
    property preservation and his commitment to inclusive community development.
attributes:
  skills: '[''Residential property valuation'',''Commercial property appraisal'',''GIS mapping and spatial analysis'',''Data analytics and financial modeling'',''Report writing and documentation'',''Negotiation
