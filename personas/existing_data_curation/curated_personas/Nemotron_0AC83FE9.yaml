  hobbies: '[''Visiting art museums and galleries'',''Photography (architectural and landscape)'',''Cooking Southeast Asian cuisine'',''Reading business and innovation books'',''Hiking in the Sandhills'',''Volunteering
    at Vietnamese cultural association'',''Attending community theater'',''Drone piloting and 3D modeling of properties'']'
  career_goals: Khoan aims to become a senior regional appraiser for Lancaster County, leading a team that integrates cutting‑edge technology into the appraisal process. He plans to obtain the MAI designation
    from the Appraisal Institute and develop a niche consulting practice focused on historic and culturally significant properties. In the long term, he hopes to teach appraisal courses at a local community
    college, mentor emerging professionals, and contribute to community planning initiatives that balance development with cultural preservation.
