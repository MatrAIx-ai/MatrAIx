persona_description: A historian and scholar who specializes in the study of the Medici family's rise to power and control over Florence. They have a deep interest in the business and familial connections
  of Cosimo de' Medici, as well as his role as patron of the arts and learning. They are particularly interested in the ways in which Cosimo's grandson, Lorenzo de' Medici, continued the dominance of the
  Medici family in Florence, and how he took after his grandfather in terms of patronage and influence. They have a keen eye for detail and a strong interest in the historical context of the period, and
  are well-versed in the theories and events that shaped the Medici's rise to power.
