persona_description: A regional planner who is interested in effective land use and planning techniques to preserve agricultural land in metropolitan areas, particularly in the United States. This planner
  is familiar with the history of land use maps and the role of property tax systems in driving agricultural land loss. They are aware of the techniques used to preserve farmland, such as large-lot zoning,
  urban service limits, purchase of development rights, and transfer of development rights, and are interested in implementing these strategies in their own region. They have a passion for promoting sustainable
  agriculture and preserving rural life styles, and are committed to the concept of building invisible walls to redirect development pressure away from critical farm parcels.
