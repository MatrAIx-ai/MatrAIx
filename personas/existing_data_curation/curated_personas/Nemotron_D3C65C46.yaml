personas:
  professional: Makayla Crowley, a 56‑year‑old veteran structural iron and steel worker with over three decades of hands‑on MIG and TIG welding, blueprint mastery, and OSHA‑driven safety enforcement, channels
    their disciplined, routine‑loving nature into meticulous crew supervision and is now pursuing a Certified Welding Inspector credential and a foreman role while planning a modest custom metal‑fabrication
    side venture for local homeowners.
  sports: Makayla Crowley starts each sunrise with quiet lake fishing, logs the occasional 5K with the River Run Runners club, and cheers on the Milwaukee Brewers, Green Bay Packers, and Milwaukee Bucks,
    while they maintain a modest competitive edge by timing their runs against local age‑group peers.
  arts: Makayla Crowley finds solace in quilting patterns inspired by the works of Faith Ringgold and the folk melodies of Bob Dylan, and they often pair their hand‑stitched creations with evenings spent
    reading Ken Burns’ Civil War documentaries and admiring the landscape paintings of Andrew Wyeth, which together reinforce their appreciation for craftsmanship and historical narrative.
  travel: Makayla Crowley prefers meticulously planned road trips that combine historical immersion with quiet nature, having recently driven to Gettysburg and Antietam to walk battlefields featured in
    their favorite war biographies, and they dream of a slow‑paced visit to the Scottish Highlands’ Isle of Skye to fish its lochs, all scheduled around work shutdowns and the seasonal fruit of their garden.
  culinary: Makayla Crowley cooks primarily from the bounty of their vegetable garden, creating hearty ratatouille, fresh garden salad with heirloom tomatoes and basil, and a rustic trout almandine from
    their early‑morning catches, while they indulge in weekly apple‑cinnamon pie for dessert, and they consider themselves a modest but meticulous home chef.
  core: Makayla Crowley is a methodical, solitary steelworker who blends routine‑driven discipline with a quiet love for gardening, history, and hand‑crafted creations, and they competitively manage finances
    and health into a balanced, self‑sufficient life.
background:
  cultural: Makayla grew up in a middle‑class, blue‑collar family in the American South, with Irish and English ancestry. Her upbringing emphasized hard work, self‑reliance, and traditional family values.
    She has been an active member of her local Protestant church and a lifelong union participant, which shaped her practical outlook and sense of community duty. Living in Punta Gorda on Florida’s Gulf
    Coast, she embraces the modest, coastal lifestyle while maintaining strong ties to her family and the close‑knit working‑class culture of the region.
attributes:
  skills: '[''MIG welding'', ''TIG welding'', ''Structural steel erection'', ''Blueprint reading'', ''OSHA safety compliance'', ''Heavy equipment operation'', ''Crew supervision'', ''Quality inspection'']'
  hobbies: '[''Gardening'', ''Historical nonfiction reading'', ''Quilting'', ''Fishing'', ''5K runs'', ''Church volunteer work'']'
  career_goals: Makayla aims to advance to a foreman or lead supervisor position on large‑scale construction projects, earn a Certified Welding Inspector (CWI) credential, and formally mentor apprentices
    within her union. She also plans to secure a comfortable retirement through her union pension while exploring a modest side business offering custom metal‑fabrication services for local homeowners.
