    at public library'', ''Hiking and birdwatching in Hill Country'', ''Quilting'']'
  career_goals: Natalie aims to advance to an office manager or senior administrative role within the next five years, taking on greater supervisory responsibilities and overseeing a small team of assistants.
    She is interested in specializing in human resources support, such as onboarding new hires and coordinating employee training, leveraging her strong interpersonal skills. Additionally, she wishes to
    deepen her knowledge of digital workflow automation—learning tools like Zapier or Power Automate—to streamline office processes and reduce manual workload. Long term, she envisions transitioning into
    a part‑time virtual assistant role that offers flexibility, allowing her to balance work with community involvement and family commitments.
