  career_goals: He aims to transition into a regional supervisory role within the next two years, where he can mentor a broader network of store managers and drive strategic initiatives across multiple
    locations. He also aspires to develop a consultancy practice helping small businesses in the border region enhance their retail strategies, with a focus on integrating cultural elements into their branding.
    As retirement approaches, he plans to gradually shift responsibilities while ensuring a legacy of strong leadership and community connection within his current store.
