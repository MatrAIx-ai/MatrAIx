personas:
  professional: Charles Araujo, a 37‑year‑old full‑stack software engineer, blends methodical architecture with a curiosity for emerging AI, delivering robust AWS‑based solutions while they meticulously
    plan a path toward senior lead architect certification and a future boutique consultancy.
  sports: Charles Araujo, an avid weekend hiker of the Congaree River trails, they also follow the Carolina Panthers and the Clemson Tigers, and participate in a low‑key local running club that meets for
    early‑morning jogs, combining solitary outdoor activity with occasional team spirit.
  arts: Charles Araujo, a devoted reader of science‑fiction authors like Alastair Reynolds and Ted Chiang, they enjoy board‑gaming evenings with titles such as Terraforming Mars, and find inspiration in
    the ambient soundscapes of Tycho and the storytelling of the indie band The Dear Hunter.
  travel: Charles Araujo, who prefers meticulously planned trips, they escape to the quiet woods of the Blue Ridge Mountains for weekend hikes, have explored Porto’s historic cafés, and hope to trek Iceland’s
    volcanic landscapes, balancing a love for solitary nature immersion with occasional cultural deep dives.
  culinary: Charles Araujo, a home‑brew enthusiast, they craft a seasonal Portuguese‑infused pale ale using orange zest and locally sourced honey, and cook Southern classics like shrimp étouffée seasoned
    with chouriço, showcasing a moderate culinary skill set that blends comfort food with experimental twists.
  core: Charles Araujo, 37, blends methodical engineering rigor with a solitary love of hiking, craft‑brewing, and sci‑fi reading, while they occasionally neglect sleep and indulge in impulsive hobby spending.
background:
  cultural: Charles is a white American of Portuguese descent, raised in the suburbs of Columbia, South Carolina. His family blended traditional Portuguese customs—such as seasonal festas, modest hospitality,
    and a love of seafood and pastries—with the Southern values of community, respect for tradition, and a relaxed pace of life. He grew up attending a Catholic church, which instilled a sense of responsibility
    and community service that carries over into his volunteer work. The regional emphasis on modesty and reliability aligns with his organized, methodical personality, while his Portuguese heritage nurtures
    his curiosity about diverse cultures, languages, and cuisines. This dual cultural lens shapes his worldview, balancing a respect for established methods with an openness to new ideas.
