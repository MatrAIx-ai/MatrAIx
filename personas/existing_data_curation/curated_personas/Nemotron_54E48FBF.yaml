  career_goals: Charles aims to advance to a senior or lead architect role within the next three years, guiding cross‑functional teams to deliver scalable, high‑performance software solutions. He plans
    to obtain the AWS Solutions Architect certification and deepen his expertise in machine‑learning integration to bring practical AI capabilities to legacy systems. Long‑term, he envisions founding a
    boutique consultancy that helps small‑to‑mid‑size businesses modernize their technology stack while maintaining cost‑effectiveness. He also hopes to mentor junior developers, fostering a collaborative
    culture that balances technical rigor with creative problem‑solving. Flexibility and a stable work‑life balance are important to him as he navigates post‑divorce responsibilities.
