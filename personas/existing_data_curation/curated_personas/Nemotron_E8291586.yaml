personas:
  professional: A seasoned adult‑education tutor and program designer, Sheela Oneal leverages decades of tutoring experience, bilingual fluency in English and Hindi, and a pragmatic curiosity to craft personalized
    learning plans that blend evidence‑based methods with culturally resonant teaching, while mentoring new tutors in a flexible, results‑oriented way, and they often experiment with digital tools despite
    a sometimes relaxed approach to scheduling.
  sports: Sheela Oneal follows the New York Knicks during basketball season, cheers the New York Yankees in the summer, participates in a senior walking club through Queens Parks, and they occasionally
    join a local bowling league at the community center.
  arts: Sheela Oneal regularly attends Diwali cultural performances featuring tabla virtuoso Zakir Hussain, reads classic novels by Rabindranath Tagore and contemporary works by Jhumpa Lahiri, and enjoys
    the Broadway revival of 'Hamilton' starring Lin‑Manuel Miranda, and they find inspiration for their tutoring from these artistic narratives.
  travel: Sheela Oneal blends purposeful family visits to Delhi and Kerala with weekend getaways to the Hudson Valley, prefers flexible itineraries booked on short notice, and they dream of a future pilgrimage
    to Kyoto’s Zen gardens despite budgeting constraints.
  culinary: Sheela Oneal cultivates cilantro, mint, and turmeric in her Queens rooftop garden to craft authentic dal makhani, chicken tikka masala, and refreshing mango lassi, while also experimenting with
    basil‑pesto pasta and roasted eggplant, and they take pride in serving these dishes at community potlucks.
  core: Sheela Oneal is a pragmatic lifelong learner who balances a competitive edge in tutoring with a relaxed, occasionally disorganized planning habit, channeling curiosity into gardening, puzzles, and
    community mentorship, while they occasionally splurge on festive decorations.
background:
  cultural: Sheela Prabha Oneal is a second‑generation South Asian American whose parents immigrated from the Indian subcontinent, bringing with them traditions of Hindu festivals, multilingual household
    life, and a strong emphasis on education. Married to John O'Neal, she blends Indian cultural practices with the diverse, multicultural environment of Queens, New York. She celebrates Diwali, Holi, and
    Navratri while also participating in American holidays, and she maintains ties to her heritage through language, cuisine, and involvement in local South Asian community organizations. This bicultural
    background informs her inclusive teaching style and her commitment to supporting immigrant and senior learners.
attributes:
  skills: '[''One-on-one tutoring in mathematics, science, and English'', ''Personalized curriculum development for high school and adult learners'', ''SAT and GED exam preparation'', ''Bilingual instruction
    in English and Hindi'', ''Integration of digital tutoring platforms and interactive whiteboards'', ''Study skills coaching and learning strategies'', ''Cultural competency mentoring for diverse student
    populations'', ''Mentoring and training of junior tutors'']'
  hobbies: '[''Gardening and herbal cooking'', ''Preparing traditional South Asian cuisine'', ''Reading Indian literature and educational research'', ''Attending community cultural festivals (Diwali, etc.)'',
    ''Solving puzzles (crosswords, Sudoku)'', ''Practicing yoga and meditation'', ''Traveling to India to visit family'', ''Volunteering at the senior center'']'
  career_goals: Sheela hopes to formalize her tutoring approach into a community‑based adult‑education program in Queens that targets first‑generation immigrants and senior learners. She aspires to publish
    a guide on practical tutoring techniques that blend cultural sensitivity with evidence‑based methods. She wants to secure a mentorship role at a local non‑profit, training a new generation of tutors.
    Additionally, she dreams of establishing a modest tutoring centre that serves as a hub for lifelong learning and cultural exchange, leaving a lasting impact on her community.
