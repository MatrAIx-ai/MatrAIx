persona_description: A researcher and policy maker who is interested in the implementation of natural resource management policies in Indonesia, particularly those related to mining and environmental aspects.
  They are looking for ways to improve the management of natural resources and the welfare of the community. They are also interested in the role of local communities in the management of natural resources
  and the challenges they face in doing so. They are likely to be interested in the study of natural resource management under the Article 33 of the 1945 Constitution and its impact on economic justice
  and environmental protection.
