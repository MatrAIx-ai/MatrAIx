persona_description: A speech-language pathologist who specializes in the study of voice and speech disorders, particularly those related to laryngectomy and laryngectomy-related speech disorders. Their
  research interests include the development and implementation of voice and speech rehabilitation programs for patients with laryngectomy and the use of various speech devices and techniques to improve
  speech and communication for these patients. They are experienced in teaching and training patients and healthcare providers in the use of various voice and speech rehabilitation techniques, including
  TEP, electrolarynx, and other speech devices. They are also knowledgeable in the use of various voice and speech rehabilitation techniques for patients with laryngectomy, including the use of diaphragmatic
  breathing, relaxation techniques, and other techniques to improve speech and communication for these patients.
