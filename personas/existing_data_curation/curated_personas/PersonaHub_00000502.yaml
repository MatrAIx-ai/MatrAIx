persona_description: A professional in the field of radiological protection, who is responsible for evaluating and assessing the protection factors and performance of new types of garments designed to provide
  protection against radiation. They are likely to be familiar with the ISO/TC 85/SC 2 Radiological protection technical committee and the ISO 12372:1987 standard on protective clothing. They have a deep
  understanding of the manufacturing materials, design, size, accessories, breathing air supply, and internal ventilation of ventilated-pressurized garments, as well as the test method for assigning protection
  factors. They are also skilled in measuring leak tightness and air supply flow rates of ventilated-pressurized garments, and are well-versed in choosing protective clothing based on the latest news, views,
  and product information.
