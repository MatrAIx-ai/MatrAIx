    Coordination (Spanish/English)", "Quality Assurance and Control"]'
  hobbies: '["Playing dominoes", "Attending local baseball games", "Fishing", "Cooking traditional Puerto Rican cuisine", "Gardening", "Volunteering with Habitat for Humanity", "Participating in community
    festivals (Hatillo Yuca Festival)", "Listening to plena and salsa music"]'
  career_goals: David aims to transition into a senior advisory role within his company, mentoring the next generation of construction managers and championing best practices in safety and sustainable building.
    He is committed to completing a flagship community housing project in Hatillo that provides affordable, hurricane‑resilient homes for families. Over the next five years, he aspires to establish his
    own consulting firm focused on construction project risk management and community‑based development, while ensuring a stable financial future for his family.
