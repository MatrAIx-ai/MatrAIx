personas:
  professional: David Aranda, a 56‑year‑old construction management veteran, leverages three decades of project planning, budgeting, and hurricane‑resilient building expertise while channeling their routine‑driven,
    collaborative nature into mentoring junior managers and championing safety and sustainable practices.
  sports: David Aranda passionately follows the Cangrejeros de Santurce baseball team, participates in a local senior softball league, and maintains their fitness with early‑morning coastal walks and weekend
    fishing tournaments that keep their stamina in check.
  arts: David Aranda immerses themselves in plena and salsa rhythms, especially the works of Willie Colón, Rubén Blades, and Ismael Rivera, and regularly attends the Hatillo Yuca Festival where live music
    and traditional performances reinforce their cultural ties.
  travel: David Aranda prefers road‑trip adventures to nearby coastal towns and occasional flights to Florida for fishing expeditions, while keeping their bucket‑list destination of St. Lucia for its pristine
    reefs and relaxed island vibe.
  culinary: David Aranda is a confident home cook who perfects mofongo with plantains, chicharrón, and sofrito, delights in arroz con gandules seasoned with sofrito and annatto, and enjoys experimenting
    with fresh herbs from their garden such as cilantro and oregano.
  core: David Aranda blends meticulous construction expertise with a love for community festivals, fishing, and hearty home‑cooked meals, even if their dedication to routine sometimes leads them to forget
    their nightly medication.
background:
  cultural: David was born and raised in Hatillo, a coastal town in Puerto Rico known for its agricultural heritage and vibrant festivals. He grew up in a close‑knit, bilingual (Spanish‑English) household
    where family, Catholic traditions, and community solidarity were central values. His upbringing immersed him in local customs such as the annual patron saint festivities, parranda music, and the communal
    preparation of yuca‑based dishes. The island’s emphasis on resilience, especially in the face of frequent hurricanes, shaped his practical outlook and dedication to building safe, durable structures.
    He maintains strong ties to his extended family and participates actively in church and neighborhood activities, reflecting the collectivist spirit of Puerto Rican culture.
attributes:
  skills: '["Project Planning and Scheduling", "Budgeting and Cost Control", "Construction Site Supervision", "Blueprint and Technical Drawing Interpretation", "Puerto Rican Building Code Compliance", "Hurricane-Resistant
