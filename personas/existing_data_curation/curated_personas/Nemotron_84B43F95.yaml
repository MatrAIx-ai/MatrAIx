personas:
  professional: An aspiring young architect and LEGO builder, Mikal Cook channels their curiosity, love of murals, and knack for organization into designing intricate brick structures and sketching neighborhood
    street art, showing early signs of spatial reasoning and collaborative problem‑solving.
  sports: Mikal Cook bolts around the local park with the Brooklyn Youth Soccer Club, idolizes the Brooklyn Nets for their fast‑paced teamwork, cheers on the New York Yankees during family outings, and
    balances high‑energy play with quick intervals of stretching after each game.
  arts: Mikal Cook frequents the Brooklyn Museum’s family workshops, draws inspiration from muralists like Banksy and Shepard Fairey, enjoys the playful melodies of Charlie Parker’s jazz and the pop rhythm
    of Billie Eilish while practicing keyboard basics, and thrills to performing in after‑school drama club productions of classics like "The Wizard of Oz."
  travel: Mikal Cook loves weekend adventures to Coney Island’s boardwalk, dreams of exploring the street art of Berlin’s East Side Gallery, prefers family‑planned itineraries that combine museum visits
    with hands‑on workshops, and eagerly saves pocket money for future trips to Tokyo’s interactive science museums.
  culinary: Mikal Cook’s palate mixes classic New York pizza and bagels with a fascination for making homemade chocolate chip cookies, enjoys helping whisk together marinara sauce for spaghetti while sprinkling
    fresh basil, and often requests colorful fruit salads featuring mango, kiwi, and blueberries, though they stubbornly refuse broccoli.
  core: Mikal Cook is a curious, organized, and sociable 8‑year‑old who builds LEGO cities, sketches murals, scores goals on the soccer field, and balances a love for art, science, and teamwork with a charmingly
    picky appetite and a habit of turning every spare minute into a mini‑project.
background:
  cultural: Mikal is raised in a white family living in the vibrant, multicultural borough of Brooklyn, New York. His neighborhood reflects a tapestry of cultures, languages, and artistic expressions—from
    street art to diverse culinary traditions. While his household celebrates typical American holidays and values education, his daily experiences at local parks, community centers, and school expose him
    to the city's rich diversity, fostering an open‑minded, inclusive worldview.
