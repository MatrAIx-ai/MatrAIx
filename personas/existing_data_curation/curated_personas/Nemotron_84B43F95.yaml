  career_goals: Mikal dreams of growing into a creator who blends science and art—perhaps as a museum curator, interactive exhibit designer, or STEM educator—so he can share his love of discovery with other
    children. He also imagines becoming an astronaut or engineer who solves real‑world problems, while keeping his community spirit by organizing workshops or youth clubs that encourage teamwork and creativity.
