personas:
  professional: A certified radiologic technologist who excels at operating X‑ray, CT, and mammography equipment, Alexis Madl applies a methodical precision and gentle bedside manner to deliver high‑quality
    diagnostic images while easing patient anxiety.
  sports: An outdoor‑oriented fitness enthusiast who hikes the Red River Gorge, runs weekend 5Ks with a local club, roots for the Kentucky Wildcats men’s basketball team, and enjoys occasional matches of
    Louisville City FC soccer, Alexis Madl blends structured cardio with community sport participation.
  arts: An avid visual storyteller who draws inspiration from Ansel Adams, captures candid moments in Kentucky’s landscapes, listens to indie folk icons like The Avett Brothers and Gillian Welch, and attends
    seasonal performances at the Kentucky Center featuring actors such as Meryl Streep, Alexis Madl’s artistic pursuits enrich their creative baking presentations.
  travel: A budget‑conscious explorer who has road‑tripped to Asheville, NC, trekked Great Sand Dunes National Park, and dreams of a winter stay in Quebec City’s Old Town, Alexis Madl favors meticulously
    planned itineraries that mix scenic hikes with culinary stops while juggling limited vacation days and family obligations.
  culinary: A home baker with a flair for sourdough and rosemary focaccia, who experiments with Kentucky bourbon caramel swirls in pastries, pairs creations with locally harvested honey and garden vegetables,
    and delights in occasional German pretzels and French cheese plates at community potlucks, Alexis Madl showcases a palate that blends regional comfort with European flair.
  core: Alexis Madl, a 26‑year‑old radiologic technologist, merges methodical precision with quiet compassion, habitually schedules each day to the minute, yet can’t resist late‑night sourdough experiments
    and the occasional binge‑reading marathon of mystery novels.
background:
  cultural: Alexis was raised in Winchester, Kentucky, in a middle‑class, predominantly white community where Southern hospitality and close‑knit neighborhood ties are valued. Her family traces its roots
    to French‑Canadian and German ancestors, and she grew up with a blend of cultural traditions, including occasional family gatherings featuring a mix of European foods and local Kentucky cuisine. Active
    in her local Baptist church, she participates in community service projects and regional events such as the Winchester Fall Festival. The region’s emphasis on community, self‑reliance, and appreciation
    for the outdoors has shaped her practical outlook and her commitment to helping others.
attributes:
  skills: '[''Radiographic imaging operation'', ''CT and mammography equipment handling'', ''Patient positioning and comfort'', ''Radiation safety and dose optimization'', ''Anatomy and imaging physics
