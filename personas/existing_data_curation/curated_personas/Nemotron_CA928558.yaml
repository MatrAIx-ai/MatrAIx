    regulatory standards'']'
  hobbies: '[''Reading fiction and scientific journals'', ''Hiking in local parks and trails'', ''Gardening and vegetable cultivation'', ''Baking breads and pastries'', ''Landscape photography'', ''Volunteering
    at community health fairs'', ''Puzzle solving (crosswords, Sudoku)'', ''Attending small yoga classes'']'
  career_goals: Alexis aims to advance her career by obtaining advanced certifications in MRI and radiology informatics, positioning herself for a senior technologist or imaging coordinator role within
    a hospital setting. She is motivated to lead quality‑improvement projects that enhance patient safety and image quality, and hopes to mentor junior technologists, fostering a collaborative and compassionate
    work environment. Long‑term, she envisions pursuing a master's degree in health informatics or radiologic education to broaden her impact on radiology services and contribute to community health outreach
    programs.
