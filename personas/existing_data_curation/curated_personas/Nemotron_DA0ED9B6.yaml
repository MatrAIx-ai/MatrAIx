personas:
  professional: Georgina Hough is a field technician who maintains ATMs and office equipment, using her quick diagnostic instincts, love of emerging tech, and talent for translating complex fixes into friendly
    explanations while juggling a habit of misplacing her daily planner.
  sports: Georgina Hough is an avid weekend hiker on the Rockies, a member of a local rock‑climbing club, an occasional snowboarding enthusiast in winter, and a fan of the Denver Broncos and Colorado Avalanche
    who squeezes in a Thursday night yoga class at the Denver Yoga Collective.
  arts: Georgina Hough channels her creative energy into acrylic landscapes and digital illustrations, fills open‑mic evenings with acoustic covers of Fleet Foxes and Sufjan Stevens, and finds inspiration
    in the photographs of Ansel Adams and the paintings of Colorado artist Christina Hagan.
  travel: Georgina Hough prefers spontaneous road trips to the red sandstone of Utah’s Canyonlands and the alpine lakes of Banff, while dreaming of a summer backpacking adventure across Japan’s Kansai region
    to soak up both cutting‑edge tech expos and historic temples.
  culinary: Georgina Hough loves whipping up fast quinoa‑black bean bowls seasoned with cilantro and lime, savoring Colorado lamb burgers at a local farm‑to‑table BBQ, and treating herself to a perfectly
    poured oat‑milk latte from the downtown espresso bar.
  core: Georgina Hough blends mountain hikes, tech tinkering, and open‑mic guitar jams into a relentlessly curious, socially magnetic life that thrives on spontaneity despite a habit of forgetting to schedule
    routine appointments.
background:
  cultural: Georgina is a White American whose family roots trace back to German and Irish immigrants who settled in the Midwest before moving to Colorado. She grew up in Evans, a small town in Weld County
    that blends a rural farming heritage with the cultural spill‑over of the nearby Front Range cities. The local culture emphasizes independence, neighborly cooperation, and a strong community spirit,
    reflected in seasonal barbecues, county fairs, and support for school arts programs. At the same time, proximity to Denver exposes her to a diverse arts scene, progressive social values, and tech‑focused
    events. Georgina identifies with mainstream American culture while valuing the inclusive, collaborative ethos of her Evans community and the outdoor lifestyle encouraged by Colorado’s mountains and
    open spaces.
