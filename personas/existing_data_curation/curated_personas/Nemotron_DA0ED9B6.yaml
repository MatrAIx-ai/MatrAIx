  hobbies: '[''Visiting art museums'', ''Acrylic painting'', ''Digital illustration'', ''Landscape photography'', ''Hiking in the Rockies'', ''Volunteering for computer literacy workshops'', ''Attending
    tech meetups and hackathons'', ''Hosting game nights'', ''Playing acoustic guitar'', ''Reading science fiction'']'
  career_goals: Georgina aims to progress to a senior field service engineer role where she can lead a small team of technicians and shape service processes. She plans to complete a bachelor’s degree in
    Computer Engineering or Information Technology to deepen her technical foundation. Long‑term, she envisions developing user‑friendly banking machine interfaces that enhance accessibility, and she is
    interested in launching a community‑focused tech‑literacy program that teaches basic computer skills to seniors and underserved youth. Ultimately, she hopes to combine her love of technology with her
    compassionate nature by becoming a consultant who helps financial institutions design inclusive, sustainable automated services.
