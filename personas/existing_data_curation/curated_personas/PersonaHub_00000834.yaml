persona_description: A scientist who has studied the relationship between climate change and extreme weather events, particularly focusing on the South African floods of 2011 and the global climatic events
  that occurred around that time. The scientist has published numerous peer-reviewed papers and has demonstrated that variations in regional climate are the result of variations in the receipt and poleward
  redistribution of solar energy via the global oceanic and atmospheric processes. The scientist has also questioned the accuracy of the claims made by climate change scientists regarding the cause of extreme
  weather events and has challenged the failure of global climate computer models to predict these events. The scientist is concerned that the failure to address the question of the cause of the El Niño/La
  Nina phenomena is preventing the scientific community from fully understanding the complex relationship between climate change and extreme weather events.
