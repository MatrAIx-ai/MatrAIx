  career_goals: Although officially retired, Michael aims to stay professionally engaged by expanding his mentorship role within local STEM education programs and by serving as an advisory board member
    for a regional start‑up incubator focused on clean‑energy technologies. He hopes to author a practical guide on project management for hobbyist engineers, combining his love of structure with his desire
    to give back to the community. On a personal level, he aspires to maintain his health and energy so he can travel with his wife to historic engineering sites across the United States, while continuing
    to contribute his expertise to neighborhood improvement projects such as senior‑center renovations and community garden planning.
