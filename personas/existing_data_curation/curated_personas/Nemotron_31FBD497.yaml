personas:
  professional: Michael Bonett is a retired aerospace engineer who now mentors high‑school robotics teams, serves on a clean‑energy startup advisory board, and channels his project‑management expertise
    into authoring a practical guide for hobbyist engineers, all while applying his methodical, competitive edge to ensure every initiative meets stringent timelines.
  sports: Michael Bonett competes in the Orlando Senior Golf Association’s tournament circuit, sails with the Lake Bryan Yacht Club’s race crew, and avidly follows the Orlando Magic and Orlando City SC,
    often strategizing game tactics with the same analytical precision he applied to aerospace systems.
  arts: Michael Bonett regularly enjoys productions at the Dr. Phillips Center for the Performing Arts, such as the recent staging of ‘The Music Man’ starring Michael Cerveris, and attends classical concerts
    featuring the Orlando Philharmonic, while his model ship hobby reflects an appreciation for maritime art and historical engineering illustrations.
  travel: Michael Bonett plans meticulous road trips to historic engineering sites like the Hoover Dam, the Wright Brothers National Memorial, and the Glen Canyon Dam, while also savoring weekend getaways
    to St. Augustine’s colonial district, always booking senior discounts and drafting detailed itineraries months ahead.
  culinary: Michael Bonett cultivates a Mediterranean‑style herb garden featuring basil, oregano, rosemary, and thyme, which he uses to whip up homemade pesto pasta, grilled lamb chops, and Greek salads,
    yet occasionally over‑salts dishes due to their hypertension‑driven craving for bold flavors.
  core: Michael Bonett blends a lifelong love of precision engineering with a competitive spirit, finding joy in senior golf tournaments, model shipbuilding, and structured volunteerism, all while juggling
    a habit of over‑planning even simple grocery trips and a mischievous tendency to brag about their perfect “to‑do” list.
background:
  cultural: Michael is a white American whose family roots trace back to the Midwestern United States, with a blend of German and Irish ancestry. Raised in a middle‑class household that valued education,
    hard work, and community service, he internalized a pragmatic, results‑oriented outlook. His upbringing emphasized civic participation, a respect for tradition, and a love for outdoor recreation, all
    of which continue to shape his lifestyle in Orlando. While he appreciates the diverse cultural tapestry of Central Florida, his personal identity remains anchored in a mainstream American work ethic,
    a belief in the importance of scientific progress, and a commitment to family and local community involvement.
