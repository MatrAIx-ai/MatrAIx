personas:
  professional: Maricon Dang, a seasoned carpenter with over three decades of experience, blends masterful framing and custom cabinetry with a vivid artistic sensibility, using SketchUp and CNC routing
    to carve intricate dragon‑scale motifs into eco‑friendly furniture while leading a weekly community woodworking club, and they mentor apprentices with a relaxed yet passionate approach.
  sports: Maricon Dang stays active by hiking the Watchung Reservation each weekend, joining a local adult softball league, cheering for the Giants and the Knicks, and attending community yoga classes when
    time permits, although they occasionally skip workouts when a new woodworking commission demands extra hours.
  arts: Maricon Dang immerses themselves in the rhythm of a neighborhood cajón circle, paints abstract mixed‑media pieces inspired by Jackson Pollock’s drip technique and the flowing lines of traditional
    lacquerware, and showcases functional sculptures at local art fairs, often citing Mark Rothko’s color fields as a key influence.
  travel: Maricon Dang enjoys spontaneous road trips that blend nature and craft, having driven the Appalachian Trail scenic byways, explored the historic wood markets of Chiang Mai, and planning a future
    pilgrimage to Kyoto’s temples to study traditional joinery, all while balancing travel costs with their workshop savings plan.
  culinary: Maricon Dang loves cooking for friends, expertly rolling fresh spring rolls with rice paper, rice noodles, mint, and lemongrass, simmering aromatic pho broth infused with star anise, ginger,
    and cinnamon, and experimenting with caramelized banana leaf desserts, though they occasionally over‑salt their dishes in enthusiasm.
  core: Maricon Dang is a 52‑year‑old master carpenter who melds eco‑friendly woodworking with cultural motifs, treats finances like modular design, and balances community art, spontaneous travel, and a
    love of food with a relaxed, curious spirit.
background:
  cultural: Maricon’s parents emigrated from Vietnam in the early 1970s, and he grew up in a bilingual household in New Jersey, speaking both Vietnamese and English. He celebrates Vietnamese holidays such
    as Tet and Mid‑Autumn Festival, and the decorative traditions of Vietnamese woodcarving and lacquerware have profoundly shaped his aesthetic taste. He remains active in the local Vietnamese community,
    attending language classes at the nearby cultural association, contributing his woodworking skills to community events, and infusing his projects with subtle motifs like dragon scales or intricate lattice
    patterns that honor his heritage while resonating with a broader audience.
attributes:
  skills: '[''Framing'', ''Finish Carpentry'', ''Custom Cabinetry'', ''Furniture Design'', ''Wood Sculpture'', ''Tool Maintenance'', ''Blueprint Interpretation'', ''Sustainable Material Selection'', ''Apprentice
    Mentorship'', ''Basic CAD (SketchUp)'', ''CNC Routing'']'
  hobbies: '[''Woodworking Club Leadership'', ''Community Drumming (cajón)'', ''Abstract Painting'', ''Cooking Vietnamese Cuisine'', ''Hiking and Nature Sketching'', ''Participating in Local Art Fairs'',
    ''Mentoring Young Carpenters'']'
  career_goals: Maricon aims to transition from project‑by‑project contracting to establishing a boutique workshop that produces handcrafted furniture and functional art inspired by Southeast Asian motifs
    and eco‑friendly practices. Within the next five years, he plans to earn a green building certification, expand his client base to include interior designers, host regular community woodworking classes,
    and collaborate with local galleries to showcase his pieces. He also hopes to document his design process in a guidebook that blends cultural heritage with modern woodworking techniques, and to mentor
    a new generation of craftsmen in his neighborhood.
