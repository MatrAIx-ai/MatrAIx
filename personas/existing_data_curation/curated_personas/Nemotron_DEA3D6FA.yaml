  career_goals: Jacob wants to turn his creative hobbies into a flexible source of income that lets him explore new ideas without the constraints of a traditional 9‑to‑5 job. He aims to build a modest portfolio
    of photography and illustration that he can market to local businesses, like cafés, surf shops, and community events for murals or promotional graphics. Over the next few years he plans to enroll in
    a community‑college certificate program in graphic design or digital media, while also developing a freelance presence on platforms such as Instagram and Etsy. He hopes to achieve a balance between
    financial stability and the freedom to experiment, and to eventually be recognized in the Okaloosa County arts scene for his distinctive, slightly unconventional style.
