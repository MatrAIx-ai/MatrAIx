  career_goals: Cecilia aims to move into a sales management role within the next two years, targeting a regional sales manager position where she can mentor a team and drive revenue growth through both
    innovative service offerings and disciplined sales strategies. She plans to complete her bachelor’s degree in Business Administration, earn a Certified Professional Sales Leader (CPSL) certification,
    and lead a corporate initiative that integrates AI‑driven analytics into the sales workflow. Long‑term, she hopes to create a community‑focused training program that supports aspiring sales professionals
    from the Puerto Rican diaspora in Pennsylvania, while also exploring the possibility of launching her own consultancy after gaining senior leadership experience.
