persona_description: A federal government employee working in the public health department, specifically in the field of rabies prevention and control. This person is responsible for managing and updating
  the federal government's website on vaccines to prevent rabies, including providing information on the vaccine schedule, risks of exposure, and the importance of seeking medical attention after an animal
  bite. They may also be involved in conducting research on rabies prevention and working with other government agencies to coordinate efforts in rabies control and awareness campaigns. This person is knowledgeable
  about the virus and its transmission, the symptoms of rabies, and the importance of vaccination as a preventive measure.
