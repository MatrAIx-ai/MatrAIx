persona_description: A pharmaceutical company executive who is responsible for ensuring the supply chain security and compliance with the Drug Supply Chain and Security Act (DSCSA) and is looking for a
  robust and scalable track and trace solution for their global supply network. They are interested in a platform that offers a network-based global traceability platform for the life sciences industry,
  hosted by Amazon Web Services, that connects over 250,000 trading partners and tracks over 2 billion units of medicine. They are also looking for a solution that helps combat counterfeit drugs by connecting
  all players across the supply chain to work together to keep medicines moving safely.
