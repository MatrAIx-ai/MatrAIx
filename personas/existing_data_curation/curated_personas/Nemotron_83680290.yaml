  hobbies: '[''Landscape painting'', ''Macro photography of natural textures'', ''Hiking on local trails'', ''Gardening'', ''Reading contemporary fiction'', ''Molecular gastronomy experiments'', ''Mentoring
    at regional science museum'', ''Playing piano'']'
  career_goals: Margaret aims to become a leading figure in sustainable materials research, driving the development of eco-friendly polymers and composites for the agricultural sector in Arkansas. Over
    the next five years she seeks to spearhead a multidisciplinary project that replaces conventional petrochemical inputs with bio-derived alternatives, collaborating with local farmers, biotech firms,
    and the University of Arkansas. She also aspires to obtain a Ph.D. in Materials Science to deepen her expertise and broaden her impact. In parallel Margaret wishes to establish a regional STEM outreach
    program that encourages middle-school girls to explore chemistry and engineering, leveraging her mentorship skills and love for community harmony. Long-term she envisions founding a consultancy that
    translates academic innovations into commercial, low-impact manufacturing processes while maintaining a balanced work-life schedule that honors her family and personal creative pursuits.
