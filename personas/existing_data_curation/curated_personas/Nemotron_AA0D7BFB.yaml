  hobbies: '[''Industrial and nature photography'', ''Sketching and watercolor painting'', ''Arduino and DIY electronics projects'', ''Hiking and birdwatching'', ''Visiting art galleries and museums'',
    ''Acoustic guitar playing'', ''Reading science‑fiction and engineering literature'', ''Small‑group woodworking workshops'', ''Cooking experimental fusion recipes'', ''Participating in community STEM
    outreach'']'
  career_goals: Lee aims to transition from full‑time plant engineering to a consultancy role that lets him focus on sustainable product design and mentorship of underrepresented youth in STEM. He wants
    to launch a boutique engineering studio that creates low‑cost, environmentally friendly solutions for local community projects, such as modular solar water heaters for low‑income neighborhoods. To support
    this shift, he plans to earn a Project Management Professional (PMP) certification and develop stronger organizational habits, recognizing his tendency to resist rigid structures. Long‑term, Lee hopes
    to author a book that explores the intersection of engineering functionality and artistic expression, establishing a legacy that reflects both his technical expertise and his appreciation for the arts.
