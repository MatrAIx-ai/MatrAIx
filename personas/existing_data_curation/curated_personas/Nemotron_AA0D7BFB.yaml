personas:
  professional: Lee Claybrooks is a veteran mechanical engineer with thirty‑plus years of hands‑on experience, known for merging solid‑state design in SolidWorks with an artist’s eye for form, leading small
    interdisciplinary teams on sustainable product prototypes while resisting rigid project structures, and now charting a path toward a consultancy that mentors underrepresented youth and creates low‑cost
    solar water heaters for community projects.
  sports: Lee Claybrooks spends weekend mornings trekking the Front Range, is a member of the Colorado Mountain Hikers Club, occasionally joins local bird‑watching outings, and supports the Colorado Avalanche
    and Denver Broncos, preferring personal endurance over team sports while keeping a modest routine of bodyweight exercises at home.
  arts: Lee Claybrooks captures the stark contrast of industrial machinery against mountain vistas through black‑and‑white photography inspired by Ansel Adams, experiments with watercolor landscapes echoing
    Georgia O'Keeffe, plays acoustic guitar to the folk‑rock stylings of Neil Young, and immerses themselves in sci‑fi novels by Octavia Butler, drawing creative fuel from quarterly visits to the Denver
    Art Museum.
  travel: Lee Claybrooks favors road‑trip adventures that blend photography and solitude, having driven the iconic Route 66 to capture desert sunsets, hiked the arches of Utah’s Arches National Park, and
    dreamt of a spring pilgrimage to Japan’s cherry‑blossom gardens for macro‑photography, all while balancing travel costs against funding the upcoming consultancy.
  culinary: Lee Claybrooks enjoys experimenting in the kitchen, merging Southern‑style smoked brisket chili with Colorado’s heirloom corn and jalapeño, perfecting shrimp‑and‑grits with a quinoa twist, and
    often adds a dash of smoked paprika to roasted trout, yet their tendency to get lost in design sketches sometimes leads to over‑cooked meals.
  core: Lee Claybrooks is a meticulous engineer‑artist who balances sustainable invention with spontaneous creativity, wrestles with structure‑aversion, and channels stress into hands‑on projects and quiet
    hikes.
background:
  cultural: Lee grew up in a predominantly African‑American neighborhood in the Midwest before moving to Denver for work. His cultural identity is shaped by the traditions of Black family gatherings, gospel
    and jazz music, and a strong emphasis on community uplift. He remains connected to his roots by celebrating Juneteenth, cooking soul‑food dishes passed down through generations, and mentoring Black
    youth through a local STEM program. At the same time, Colorado’s outdoor culture has influenced his appreciation for nature, which he expresses through hiking and landscape photography. Lee’s perspective
    blends the resilience and communal values of his Black heritage with the individualistic, exploratory spirit of the Rocky Mountain region, informing both his engineering approach and his artistic interests.
attributes:
  skills: '[''Mechanical design (SolidWorks, AutoCAD)'', ''CNC machining and prototyping'', ''Additive manufacturing (3D printing)'', ''Hydraulic and pneumatic system troubleshooting'', ''Renewable energy
