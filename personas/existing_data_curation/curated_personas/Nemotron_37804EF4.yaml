  career_goals: Tenesha aims to expand her influence beyond individual sales. She plans to launch a boutique real estate firm that specializes in preserving historic African American neighborhoods and developing
    affordable housing units. She wants to become a regional sales manager for her brokerage, achieving top‑producer status for three consecutive years. She also seeks to mentor at least twenty emerging
    agents, especially women of color, and to partner with local cultural institutions to integrate art and history into property marketing. Additionally, she aspires to serve on the Birmingham Board of
    Realtors and contribute to policy advocacy for fair housing.
