  career_goals: Manrique aims to leverage his technical and business expertise to move into senior leadership roles within technology strategy. In the next three years, he plans to earn certifications such
    as TOGAF, PMP, and AWS Solutions Architect, and to take on responsibilities as a lead systems architect overseeing large‑scale digital transformation projects. He aspires to integrate his passion for
    art into technology by championing user‑experience driven initiatives and possibly launching a startup that provides a digital platform for Cuban and broader Latin American artists to showcase their
    work. Long‑term, he envisions becoming a chief technology officer or chief innovation officer where he can shape organizational culture, promote interdisciplinary collaboration, and mentor emerging
    talent while maintaining a healthy work‑life balance to mitigate stress.
