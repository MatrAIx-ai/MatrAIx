personas:
  professional: Manrique Rodriguez is a 26‑year‑old computer systems analyst in Miami who blends rigorous data‑analytics and Agile project leadership with a curiosity for visual design, using their disciplined
    organization and sociable communication style to translate complex business needs into user‑centric digital solutions while they often steer cross‑functional teams through meticulous documentation and
    lively stakeholder workshops.
  sports: Manrique Rodriguez fuels their sociable energy by playing pick‑up basketball at a local Miami court, cheering for the Miami Heat and Inter Miami CF during the season, and joining the Everglades
    Hiking Club for weekend trail runs, though they sometimes overcommit to social game nights and feel lingering fatigue.
  arts: Manrique Rodriguez immerses themselves in Miami’s thriving visual scene, regularly visiting PAMM and street‑mural tours, curating playlists featuring Celia Cruz, Bad Bunny, and classic jazz legend
    Herbie Hancock, and they draw inspiration from the works of Jean‑Michel Basquiat and local muralist Kamarion Wilson for their own urban photography projects.
  travel: Manrique Rodriguez prefers spontaneous weekend getaways, often planning last‑minute trips to the Florida Keys or New Orleans for Mardi Gras, while they also save for longer adventures to Barcelona,
    Cartagena, and Tokyo, balancing a modest travel budget with occasional splurges funded by credit‑card points.
  culinary: Manrique Rodriguez enjoys cooking family recipes like ropa vieja and lechón, they experiment with aromatic cumin, orange zest, and plantain mash, while they also explore modern twists such as
    sous‑vide pork shoulder paired with quinoa and tropical fruit salsa, reflecting a blend of tradition and culinary curiosity.
  core: Manrique Rodriguez is a detail‑driven tech analyst who channels a love for art and community into every project, yet they habitually over‑schedule social events, leading to late‑night coffee binges
    and occasional stress‑induced insomnia.
background:
  cultural: Manrique’s cultural identity is shaped by his Cuban heritage and the vibrant Cuban‑American community of Miami. Raised in a bilingual household, he speaks both Spanish and English fluently,
    and his family traditions—such as sharing meals, celebrating Carnaval, and listening to a diverse range of Cuban music—have instilled a strong sense of community and resilience. The island’s history
    of artistic expression influences his appreciation for visual arts and rhythm, while the diaspora’s emphasis on family cohesion informs his cooperative and considerate nature. He participates in local
    cultural events, supports Cuban artists, and draws inspiration from the blend of Caribbean warmth and American ambition that defines his upbringing. This background enriches his worldview, encouraging
    him to bridge cultural perspectives in both his professional collaborations and personal pursuits.
