persona_description: A researcher with a background in climate science, economics, and environmental impact assessment. This person is highly skilled in integrating the latest research on climate impacts
  across various disciplines, using economic analysis to derive insights for climate adaptation. They have a keen interest in understanding the potential economic burden of climate change on specific sectors
  and regions, and have developed impact modelling capabilities and high-resolution climate scenarios for Europe. Their expertise lies in the analysis of weather-related extremes, including heat-related
  deaths, river flood damages, forest fires, and coastal damage due to sea-level rise. This person benefits greatly from past DG Research projects that have developed impact modeling capabilities and high-resolution
  climate scenarios for Europe.
