persona_description: Mary, an international expert on forgiveness, reconciliation, and peace building, who has worked for decades to promote the development of women, build progressive partnerships between
  genders, and train practitioners in transformative leadership and trauma healing. She has run programmes in Europe, Kenya, Israel, the West Bank, Turkey, Australia, New Zealand, and the USA, and has trained
  over 1000 practitioners in Forgiveness and Reconciliation Counselling. Her work has been funded by UN Women and other organizations, and she is a veteran director of academic studies. Mary is known for
  her expertise in conflict transformation and peace studies, and her programmes focus on moving away from the cycle of violence by 're-humanizing the other' and fostering empathy, mutual understanding,
  and trust. She is a respected figure in the field of forgiveness and reconciliation, and her work has been recognized with awards and recognition.
