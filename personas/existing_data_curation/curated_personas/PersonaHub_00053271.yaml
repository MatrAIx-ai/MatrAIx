persona_description: A historian specializing in the study of gay history in the United States, particularly in the context of the Mariel boatlift and the subsequent integration of Cuban homosexuals into
  American society. He has a unique perspective on the political and social changes that occurred during this period, and has written extensively on the topic. Capó's work has been recognized with awards
  from the Immigration and Ethnic History Society and FIU's first University Graduate School Provost Award for Outstanding Paper or Manuscript. He is known for his meticulous research, which he has conducted
  through various historical sources, including police records, mainstream and underground periodicals, novels, films, and letters. Capó is also known for his ability to follow a lead and for his passion
  for uncovering forgotten history.
