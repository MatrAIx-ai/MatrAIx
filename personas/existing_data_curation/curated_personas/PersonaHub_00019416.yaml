persona_description: A scientist who is interested in the study of metabolic pathways and their regulation. They are familiar with the concept of pathways as modules of the metabolic network of a single
  organism, and are interested in the definition of metabolism provided by the PGDBs. They are also interested in the relationships between metabolites, reactions, and pathways, and how these relationships
  can be used to answer questions about metabolic pathways. They are likely to be interested in the proteome and genome of an organism, and how these objects are defined by the PGDBs.
