personas:
  professional: Kevin Waldrop, a 13‑year‑old self‑taught digital artist and budding game programmer, channels their vivid imagination and methodical planning into creating intricate fantasy landscapes in
    Procreate and quirky Scratch games, often impressing classmates with polished prototypes they proudly showcase.
  sports: Kevin Waldrop, a 13‑year‑old who enjoys beach volleyball on the Palos Verdes shoreline and swims with the local Palos Verdes Youth Aquatics Club, cheers for the Los Angeles Dodgers and LA Lakers,
    and occasionally joins their school’s cross‑country team, though they prefer the calm of tide‑pool exploration over competitive sports.
  arts: Kevin Waldrop, a 13‑year‑old digital illustrator, draws inspiration from the atmospheric paintings of J.M.W. Turner and the whimsical worlds of Studio Ghibli, listens to classical piano pieces by
    Debussy while sketching, and admires contemporary artists like loish and Sakimichan, often staying up late to experiment with color palettes in Procreate, trusting their intuition to guide each brushstroke
    and they feel a deep personal connection to every piece.
  travel: Kevin Waldrop, a 13‑year‑old with a penchant for coastal getaways, has explored Catalina Island’s underwater trails, spent a family weekend in San Diego’s Balboa Park, and dreams of backpacking
    through New Zealand’s fjordland and visiting the night‑sky observatory in Mauna Kea, always planning trips with Google Maps and a detailed checklist of must‑see tide pools and stargazing spots, trusting
    their curiosity to shape each itinerary, while they map each route with a meticulous eye.
  culinary: Kevin Waldrop, a 13‑year‑old with modest cooking skills, prefers simple but flavorful meals like avocado sushi rolls, pepperoni pizza topped with extra olives, and homemade tacos with fresh
    cilantro, often experimenting with seaweed snacks and microgreens in their kitchen and indulging in a well‑earned ice‑cream treat after a long night of coding, and they love trying new spice blends
    whenever inspiration strikes.
  core: Kevin Waldrop is a quietly ambitious 13‑year‑old who blends methodical planning with boundless imagination, turning solitary art and coding projects into vivid creations while they juggle a meticulous
    budget and a love for night‑time beach adventures.
background:
  cultural: Kevin grew up in the Palos Verdes Peninsula, an affluent coastal enclave in Los Angeles County. His family’s middle‑class, white American background emphasizes education, community involvement,
    and a respect for nature. The area’s proximity to beaches, maritime museums, and the Los Angeles cultural scene has exposed him to a blend of local coastal traditions and broader artistic influences.
    Participation in school‑based art clubs, local library workshops, and community science programs reflects a typical suburban American upbringing that values both academic achievement and creative expression.
