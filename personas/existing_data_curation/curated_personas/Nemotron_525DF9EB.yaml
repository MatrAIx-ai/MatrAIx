  career_goals: Kevin dreams of a future where he can blend his love for art, science, and storytelling. He envisions studying at a top university to become a concept artist for video games or an aerospace
    researcher who designs visual simulations for space missions. He aims to develop immersive educational tools that make complex scientific ideas accessible and engaging. In the long term, Kevin hopes
    to lead interdisciplinary teams that create innovative media experiences, while also contributing original artworks to galleries and publications.
