persona_description: A transit-oriented development (TOD) advocate who is interested in supporting the development of communities and economic growth in Phoenix, Tempe, and Mesa through the implementation
  of TOD principles. This individual is passionate about promoting high-quality, more intensive development on and near properties adjacent to the light rail alignment, and has a deep understanding of the
  benefits of TOD for improving access to public transportation, making communities more pedestrian and bicycle friendly, and creating new living spaces that better serve the daily activities of the region.
  This persona is highly knowledgeable about the purpose of TOD and its impact on the cities of Phoenix, Tempe, and Mesa, and is committed to supporting the development of TOD projects that will help achieve
  the community and economic development goals of these cities.
