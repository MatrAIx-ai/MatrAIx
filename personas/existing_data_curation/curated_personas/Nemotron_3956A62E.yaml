personas:
  professional: An HR business partner specialist, Eric Weir leverages bilingual mediation, data‑driven analytics, and a pragmatic yet flexible approach to employee relations, while they prefer structure
    but balance it with a relaxed attitude toward strict planning and a competitive drive to optimize talent outcomes.
  sports: Eric Weir spends early mornings trail‑running in the Santa Cruz foothills, supports the San Jose Sharks and the San Francisco Giants, and belongs to a local hiking club that meets monthly for
    weekend ascents, preferring solitary endurance over team sports, and they relish the quiet after each climb.
  arts: Eric Weir captures the morning mist over red‑wood forests with his DSLR, drawing inspiration from Ansel Adams and Frida Kahlo, while unwinding with Radiohead’s OK Computer and the indie game Celeste,
    which together shape their quiet yet creative aesthetic.
  travel: Eric Weir prefers low‑key, self‑planned trips that blend hiking in Yosemite with cultural immersion in Oaxaca’s Day of the Dead celebrations, often scrolling through TripIt to map routes while
    balancing limited vacation days with the need for solitary recharge, and they savor the blend of nature and tradition in each journey.
  culinary: Eric Weir excels at preparing mole poblano and tamales using fresh chilies, corn masa, and chocolate, treating the kitchen as a lab where they experiment with traditional spices while favoring
    farm‑to‑table markets for the freshest ingredients.
  core: Eric Weir is a data‑savvy HR professional who channels competitive precision into solo hikes, mindful meditation, and spicy cooking, while they quietly juggle a relaxed stance on planning and occasional
    impulse buys.
background:
  cultural: Eric is a first‑generation Mexican‑American who grew up in a bilingual household in the San Jose area. His parents immigrated from Jalisco, bringing with them traditions such as Día de los Muertos
    celebrations, Mexican cuisine, and a strong emphasis on family loyalty. While he embraces the entrepreneurial spirit and cultural diversity of Silicon Valley, he maintains close ties to his Mexican
    roots through language, food, and community events. This bicultural experience informs his empathetic approach to workplace diversity and his ability to bridge cultural differences in a corporate setting.
attributes:
  skills: '["Employee Relations", "Talent Acquisition & Recruitment", "Onboarding & Training", "Benefits Administration", "California Labor Law Compliance", "HRIS (Workday, ADP) Management", "HR Data Analytics",
