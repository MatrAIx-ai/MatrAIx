  hobbies: '["Solo hiking in the Santa Cruz foothills", "Digital photography", "Reading non‑fiction (psychology, behavioral economics)", "Cooking traditional Mexican cuisine", "Playing single‑player video
    games", "Meditation"]'
  career_goals: Eric aims to transition from a generalist HR role to a strategic HR Business Partner position within a mid‑size tech company in the Bay Area, where he can influence organizational design
    and talent strategy. Over the next five years, he aspires to become an HR Director, overseeing a data‑focused HR function that balances rigorous policy frameworks with adaptable, results‑oriented initiatives.
    He is motivated by the prospect of leading performance‑management programs that reward high achievers and by earning recognition as a competitive, results‑driven HR leader.
