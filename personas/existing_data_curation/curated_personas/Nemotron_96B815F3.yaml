  career_goals: Nigel aims to deepen his involvement in the local arts scene by volunteering as a docent at the Norton Museum of Art and leading a senior art‑workshop series. He aspires to curate an intergenerational
    traveling exhibition that showcases senior artists' work. To support his peers' mental‑health needs, he plans to complete a certificate in community health education. Although retired, he wishes to
    continue contributing his organizational expertise to nearby non‑profits and eventually publish a collection of his watercolor paintings accompanied by reflections on his life in Florida.
