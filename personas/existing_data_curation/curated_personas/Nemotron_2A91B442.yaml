personas:
  professional: A seasoned hospitality executive, Jessica Mcmath leverages four decades of strategic leadership to embed sustainable tourism practices while mentoring emerging leaders and championing historic
    preservation, and they consistently align operational metrics with community values.
  sports: A dedicated fitness enthusiast, Jessica Mcmath rows in the St. Johns River with the local sailing club, plays pickleball in winter leagues, and roots for the Jacksonville Jaguars and Orlando Magic
    while maintaining a weekly yoga regimen, and they also attend the St. Augustine Golf Association's monthly outings.
  arts: A vibrant community theater participant, Jessica Mcmath performs in historically themed productions, admires the works of Tennessee Williams and Lin-Manuel Miranda, and fills evenings with classic
    jazz from Nina Simone and live piano recitals by Lang Lang, and they occasionally volunteer to design set pieces using reclaimed wood.
  travel: An avid traveler, Jessica Mcmath prefers immersive heritage trips, having explored the historic districts of Savannah, the Roman ruins of Tuscany, and the coastal islands of the Florida Keys,
    while planning future sailing adventures to the Bahamas, and they keep a detailed travel journal for every journey.
  culinary: A proficient home chef, Jessica Mcmath blends Southern comfort with Mediterranean flair, regularly preparing shrimp and grits, ratatouille, and oregano-infused lamb, while sourcing fresh basil,
    heirloom tomatoes, and locally harvested citrus from her garden, and they enjoy experimenting with spice blends even if the results sometimes surprise the palate.
  core: Jessica Mcmath balances disciplined executive ambition with a love for native gardens, historic storytelling, and mindful sailing, and they occasionally indulge in a midnight slice of pizza while
    forgetting to water their cactus.
background:
  cultural: Jessica is a third‑generation white American from the Southeast, with ancestral roots in England and Ireland. Raised in a suburban Floridian community, she internalized Southern hospitality,
    a strong work ethic, and a deep respect for the diverse cultural tapestry of St. Augustine—an area shaped by Spanish colonial history and a vibrant African‑American legacy. Though she identifies as
    Protestant (Methodist), she actively participates in ecumenical community events and embraces the region’s historic preservation ethos.
