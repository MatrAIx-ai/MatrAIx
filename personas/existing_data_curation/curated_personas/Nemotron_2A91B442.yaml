  hobbies: '[''Gardening (native Florida plants)'', ''Historical preservation volunteering'', ''Birdwatching'', ''Reading historical fiction and biographies'', ''Cooking Southern and Mediterranean cuisine'',
    ''Yoga and meditation'', ''Sailing on the St. Johns River'', ''Mentoring local entrepreneurs'', ''Attending community theater'', ''Volunteering at local food banks'']'
  career_goals: Jessica’s primary ambition is to position her company as a benchmark for sustainable tourism in the Southeast while fostering a culture of mentorship and inclusive leadership. She aims to
    expand the organization’s regional footprint, integrate green technologies, and launch a philanthropic foundation that supports historic preservation and youth entrepreneurship in St. Johns County.
    Over the next five years she is focused on succession planning, ensuring a smooth transition to the next generation of leaders, and leaving a lasting legacy of community impact.
