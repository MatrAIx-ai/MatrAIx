  hobbies: '["Reading (science & self-help)", "Crossword puzzles", "Sudoku", "Gardening", "Baking bread", "Landscape photography", "Listening to podcasts", "Knitting", "Walking in nature", "Volunteering
    at animal shelter"]'
  career_goals: Zara aims to become a store manager within the next two years, leveraging her data‑driven approach to improve store performance. She is also considering a transition to a regional operations
    analyst role, where she can apply her STEM skills to broader supply‑chain challenges while reducing daily frontline interaction. To support these goals, she plans to complete a part‑time MBA or a certificate
    in business analytics. Ultimately, she hopes to lead a team in a way that fosters a calm, collaborative environment and to eventually mentor other introverted supervisors.
