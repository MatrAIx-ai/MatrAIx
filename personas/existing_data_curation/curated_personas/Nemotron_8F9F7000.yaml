personas:
  professional: Zara Starnes, a retail supervisor known for data‑driven staff scheduling and visual merchandising, leverages strong Excel and basic SQL skills to quietly optimize inventory and sales while
    they nurture a calm, collaborative floor atmosphere despite occasional disorganization.
  sports: Zara Starnes enjoys low‑impact weekend cycling on the Columbia River Gorge trails, follows the Seattle Seahawks and the Portland Trail Blazers on TV, and participates in the Willowbrook Hiking
    Club’s monthly group walks, preferring solitary, steady‑state cardio over competitive team sports.
  arts: Zara Starnes finds solace in landscape photography inspired by Ansel Adams, relaxes while listening to Joni Mitchell’s folk albums, and unwinds knitting scarves while admiring the minimalist installations
    of Yayoi Kusama, reflecting a quiet, introspective appreciation for visual and auditory art.
  travel: Zara Starnes prefers self‑planned, quiet getaways such as a sunrise road trip along the Oregon Coast and a serene retreat to the lavender fields of Provence, France, balancing a love for solitary
    exploration with a modest travel budget that limits frequent long‑haul flights.
  culinary: Zara Starnes delights in baking artisan sourdough with rye flour and whole‑grain spelt, preparing roasted beet and carrot salads seasoned with thyme and balsamic glaze, and experimenting with
    a lentil‑turmeric stew that showcases their methodical yet occasionally messy kitchen style.
  core: Zara Starnes is a data‑savvy, introverted retail leader who channels curiosity into quiet efficiency, battles lingering anxiety with meticulous routines, and finds comfort in baking, photography,
    and solo pursuits that blend precision with occasional disarray.
background:
  cultural: Zara grew up in Moncks Corner, a small town in Berkeley County, South Carolina, where close‑knit community ties and Southern hospitality were central to daily life. Raised in a middle‑class
    white family that valued hard work and education, she attended local public schools before earning a Bachelor’s degree in a STEM field at a state university. Her upbringing exposed her to traditional
    Southern customs—such as family gatherings around the dinner table, a love for home‑cooked meals, and participation in church‑based community events—while her academic experiences encouraged a more
    analytical and forward‑looking worldview. This blend of Southern cultural roots and scientific training shapes her pragmatic yet curious outlook.
