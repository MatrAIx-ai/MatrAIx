personas:
  professional: Luis Terry, a 16‑year‑old high‑school junior, they blend grease‑stained hands and soldering skills to run a weekend snack stall, create custom gaming accessories, and tackle DIY automotive
    repairs, a pragmatic yet loosely organized hustle that mirrors their competitive curiosity as they work toward a GED and a future mobile auto‑repair business.
  sports: Luis Terry, an energetic teenager, they dive into local pickup soccer games after school while cheering for the Houston Dynamo, spend evenings at Houston skate parks perfecting tricks, and occasionally
    catch Houston Astros games on weekends, a competitive yet flexible fitness routine that balances team play with solo pursuits.
  arts: Luis Terry, a music‑loving teen, they groove to reggaeton hits by Bad Bunny, bachata verses by Romeo Santos, and traditional folk rhythms from their heritage while wandering Houston’s street‑art
    corridors adorned with murals by Burnout and Rita Alma, weaving sound and visual culture into daily life.
  travel: Luis Terry, a spontaneous traveler, they favor weekend road trips to Galveston’s beach or Austin’s live‑music scene, dream of an affordable family visit to Central America, and hope to someday
    explore Berlin’s street‑art districts, balancing low‑budget adventure with teen schedule constraints.
  culinary: Luis Terry, a budding kitchen aide, they help prepare beloved baleadas and tamales at home, often experimenting by adding Sriracha, mango salsa, or cheese‑filled quesadillas, showcasing a moderate
    cooking skill level that blends heritage flavors with teenage boldness for creative fusion dishes.
  core: Luis Terry, a competitive yet curious 16‑year‑old, they juggle soccer, skateboarding, DIY electronics, and a fledgling snack‑stall business, navigating teenage life with a relaxed, slightly disorganized
    hustle and a healthy dose of skepticism.
background:
  cultural: Luis is a first‑generation Honduran‑American. His parents emigrated from Honduras in the early 2000s, bringing a close‑knit family culture, strong respect for elders, and a love for traditional
    foods and celebrations like Feria de San Isidro and Día de los Madres. Growing up in Houston’s diverse Hispanic community, he has been exposed to both Central American customs and broader Texan culture,
    blending Spanish and English in daily life. He attends community events at the local Honduran cultural center, participates in dance workshops, and helps organize gatherings. His background informs
    his bilingual communication style, his enjoyment of Honduran cuisine, and his sense of responsibility toward supporting his extended family.
attributes:
  skills: '[''Basic automotive repair'', ''DIY electronics tinkering'', ''Bilingual communication (Spanish/English)'', ''Street vending basics'', ''Problem solving'']'
  hobbies: '[''Playing soccer'', ''Skateboarding'', ''Competitive video gaming'', ''DIY electronics projects'', ''Cooking Honduran dishes'', ''Listening to reggaeton and Latin music'', ''Exploring street
    art'']'
  career_goals: Luis aims to earn his GED within the next year and then enroll in a local automotive technology program or community‑college apprenticeship. He hopes to become a certified automotive technician
    and eventually open a mobile repair service that offers quick, affordable fixes to neighbors in his Houston community. He also dreams of curating a small online shop selling custom‑modified gaming accessories
    he builds himself, turning his DIY electronics hobby into a side business. In the long term, he wants to be financially stable enough to support his family and possibly bring relatives from Honduras
    to the United States.
