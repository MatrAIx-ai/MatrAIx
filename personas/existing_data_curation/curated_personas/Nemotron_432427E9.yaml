    parks'']'
  career_goals: As he approaches retirement age, Claudio aims to transition his extensive front-desk experience into a part-time mentorship role within his workplace, training younger clerks in customer
    service and bilingual communication. He also hopes to volunteer as a community liaison for the local senior center, helping Spanish-speaking seniors access municipal services and cultural programs.
    A personal ambition is to enroll in a community-college course on art history or museum studies, expanding his appreciation for the arts and possibly leading guided tours at the nearby Kern County Museum.
    Ultimately, he desires to maintain a steady, meaningful engagement that blends his reliable work ethic with his love for culture and community service.
