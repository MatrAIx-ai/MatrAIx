  hobbies: '[''Soccer'', ''After‑school clubs (science/robotics)'', ''LEGO building'', ''Scratch programming'', ''Reading adventure comics'', ''Nature walks'', ''Listening to upbeat music'']'
  career_goals: Ulrich dreams of becoming a firefighter, drawn to the structured teamwork and community service the role offers, or a wildlife biologist, reflecting his interest in nature and helping animals.
    He also expresses curiosity about engineering and robotics, imagining a future where he can design and build things that solve real‑world problems.
