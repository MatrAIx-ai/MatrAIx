personas:
  professional: Ulrich Finch, an aspiring junior engineer, leverages their love for structure and immediate realities to meticulously construct LEGO space stations and craft interactive Scratch games, and
    they demonstrate early teamwork and a reliable, detail‑oriented approach.
  sports: 'Ulrich Finch thrives on the local grass of the Riverdale Junior Soccer Club, donning the #10 jersey while emulating the City Lions'' forward tactics, and they balance structured practice drills
    with spontaneous tag games during recess to stay energetic and coordinated.'
  arts: Ulrich Finch channels creative energy into sketching dynamic comic panels inspired by Spider‑Man and Studio Ghibli, while blasting upbeat tracks by Imagine Dragons during LEGO building sessions,
    and they make the arts a vibrant backdrop for both play and personal expression.
  travel: Ulrich Finch plans weekend family outings with a simple hand‑drawn map, favoring adventure hikes in Green Valley State Park and interactive visits to the Capital City Science Museum, and they
    nurture a long‑term dream of traveling to the Kennedy Space Center to see real rockets.
  culinary: Ulrich Finch favors pizza with pepperoni, secretly adds extra mozzarella for extra stretch, smiles while assembling 'LEGO taco towers' using soft tortillas, shredded cheese, and salsa, and they
    can blend a quick breakfast smoothie with bananas, oats, and honey all by themselves.
  core: Ulrich Finch is a structure‑loving, soccer‑obsessed nine‑year‑old who balances meticulous LEGO engineering with a lively social spirit, yet they sometimes hoard spare change and forget to wash hands
    after games.
background:
  cultural: Ulrich comes from a middle‑class white American family in the suburban community of Sparks Glencoe, Maryland. His upbringing reflects typical East Coast suburban values that emphasize education,
    community involvement, and family togetherness. He attends a local public elementary school, participates in neighborhood youth sports leagues, and engages in community events such as fairs and park
    clean‑up days, shaping a sense of belonging and shared cultural identity.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''Writing simple sentences'', ''Organizational skills'', ''Teamwork'', ''Conflict resolution'', ''Leadership in group games'', ''Block‑based
