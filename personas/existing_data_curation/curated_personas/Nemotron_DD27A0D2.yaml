personas:
  professional: Gay Walton is a budding little scientist who loves mixing water, sand, and glitter in playful experiments, showing boundless curiosity and a tendency to abandon structured steps in favor
    of spontaneous discovery.
  sports: Gay Walton plays in a neighborhood tee‑ball league, idolizes the New York Yankees, and enjoys Saturday morning soccer drills with the Mini‑Kick Club, preferring spontaneous scrimmages over rigid
    drills.
  arts: Gay Walton loves drawing with Crayola crayons, especially bright reinterpretations of Van Gogh’s Starry Night, and sings along to the soundtracks of Pixar’s "Toy Story" and Disney’s "Frozen" while
    dancing in the living room.
  travel: Gay Walton dreams of a family trip to Disney World after a memorable day at the local aquarium, prefers unplanned road trips with music blasting, and is fascinated by the colorful street art in
    San Diego’s Balboa Park.
  culinary: Gay Walton’s favorite dish is mac and cheese with hidden peas, loves strawberry slices, and enjoys helping mash bananas for banana pancakes, though they often leave a crumb trail behind.
  core: Gay Walton is a wildly curious five‑year‑old whose imagination roams freely, balancing spontaneous creativity with a skeptical streak, leaving a trail of crayons and candy wrappers.
background:
  cultural: Gay Nicole grows up in Fayetteville, Arkansas, a small city surrounded by the Ozark foothills. Her family embraces a blend of Southern hospitality and the progressive vibe of a university town,
    often attending community festivals that feature folk music, local crafts, and outdoor activities. Frequent visits to the park, local library, and family gatherings at church have introduced her to
    traditional Arkansas stories and a love for nature. This environment nurtures her curiosity and appreciation for both the arts and the natural world.
