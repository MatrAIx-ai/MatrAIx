data:
  user 1 personas: 'I recently lost both my parents to an automobile accident.

    I love going to comedy clubs.

    I am originally from london , england.

    I am a model building enthusiast.

    I like camping and the outdoors in general.'
  user 2 personas: 'I work at a museum.

    I read a lot.

    I am stuck in a wheel chair.

    I like to go to the park.

    I do not have a lot of friends.'
  Best Generated Conversation: 'User 1: Hi, my name is [user 1''s name].

    User 2: Hi, my name is [user 2''s name].

    User 1: What do you like to do for fun?

    User 2: I like to read, go to the park, and work at the museum.

    User 1: That''s cool. I like to go to comedy clubs, model build, and camp.

    User 2: I''ve never been to a comedy club. What''s it like?

    User 1: It''s a lot of fun! You get to see comedians tell jokes and make you laugh.

    User 2: That sounds like it would be a good time.

    User 1: It is! I''m going to see a comedy show next weekend.

    User 2: Maybe I''ll come with you!

    User 1: That would be great!

    User 2: Thanks for the offer.

    User 1: You''re welcome.

    User 2: So, what do you like about model building?

    User 1: I like the challenge of it. It''s also really rewarding to see a model come together.

    User 2: I can see why that would be rewarding.

    User 1: Yeah, it is. I''ve been building models since I was a kid.

    User 2: That''s a long time!

    User 1: Yeah, it is. I''ve built a lot of different models over the years.

    User 2: Do you have any favorites?

    User 1: I have a few favorites. I like my model of the Titanic.

    User 2: That''s a cool model.

    User 1: Yeah, it is. I also like my model of the Eiffel Tower.

    User 2: I''ve seen the Eiffel Tower in person. It''s really impressive.

    User 1: It is. I''m glad I got to see it in person.

    User 2: Me too.

    User 1: So, what do you like about camping?

    User 2: I like being outdoors. I also like the challenge of it.

    User 1: I can see why that would be a challenge.

    User 2: Yeah, it is. But it''s also a lot of fun.

    User 1: It sounds like you''re a really outdoorsy person.

    User 2: I am. I love being in nature.

    User 1: I can see why. It''s really peaceful and relaxing.

    User 2: Yeah, it is. I''m glad I got to talk to you today.

    User 1: Me too. It was nice to meet you.'
