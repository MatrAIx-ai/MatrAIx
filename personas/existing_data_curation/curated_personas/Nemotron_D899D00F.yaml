  career_goals: Eric aims to move into a senior operations or facilities management role within the next three to five years, leveraging his supervisory experience to oversee larger teams and multi‑site
    operations. He plans to pursue an MBA or a specialized certification such as PMP or Six Sigma to deepen his strategic and analytical capabilities. Long‑term, he hopes to mentor emerging leaders, champion
    diversity and inclusion initiatives at his organization, and perhaps launch a small consulting practice focused on workflow optimization for nonprofit and community‑based entities.
