personas:
  professional: Eric Sledge, a 42‑year‑old office supervisor with a business degree, excels at leading small administrative teams, streamlining workflows, and managing budgets, while their sociable, cooperative
    nature creates a harmonious workplace and their preference for flexible structure fuels their ambition to pursue an MBA and transition into senior operations management.
  sports: Eric Sledge stays active by playing pickup basketball at the Ruskin community center, fishing the Hillsborough waterways, jogging the Alafia River State Park trails, and cheering on the Tampa
    Bay Buccaneers, while they hold a seasonal membership at a local sports club that organizes weekend pickup games.
  arts: Eric Sledge finds inspiration at live blues and jazz venues, regularly enjoying the soulful sounds of Buddy Guy, John Coltrane, and contemporary guitarist Keb' Mo', and their appreciation for theater
    leads them to attend productions at the Straz Center for the Performing Arts.
  travel: Eric Sledge blends spontaneous weekend road trips with thoughtfully planned family vacations, having fished in the Florida Keys, explored New Orleans for its jazz heritage, and dreaming of a cultural
    tour of Jamaica to experience authentic cuisine and island festivals while juggling a modest travel budget.
  culinary: Eric Sledge is a confident home chef who specializes in Southern‑style barbecues, slow‑cooking pork shoulder with a dry rub of smoked paprika, brown sugar, and cayenne, perfecting collard greens
    simmered with ham hocks, and pairing meals with homemade bourbon‑glazed peach sauce, while they love to host neighborhood potlucks featuring these dishes.
  core: Eric Sledge, a 42‑year‑old office supervisor and community‑focused BBQ enthusiast, balances a love for structure with a laid‑back lifestyle, often forgetting to file receipts but always remembering
    the perfect smoky rub for a neighborhood gathering.
background:
  cultural: Eric is an African‑American who grew up in the Tampa Bay area, with family roots extending to the Southern United States and the Caribbean. His upbringing was shaped by a close‑knit church community,
    celebratory traditions such as Juneteenth, soul‑food gatherings, and a strong emphasis on mutual support. Living in Ruskin, a diverse suburb of Hillsborough County, he has absorbed the multicultural
    vibrancy of the region, participating in local festivals, cultural events, and neighborhood initiatives that reflect both his heritage and the broader community.
