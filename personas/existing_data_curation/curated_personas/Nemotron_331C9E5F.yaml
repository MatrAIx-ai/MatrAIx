  career_goals: Jessica dreams of becoming a veterinarian because she loves caring for animals and values the clear, practical routine of daily animal care. She also imagines herself as an engineer, designing
    functional tools and structures that solve everyday problems. Her short‑term goals include excelling in school, winning the upcoming district spelling bee, and becoming captain of the school soccer
    team. She aims to maintain her top‑of‑class status, earn science fair awards, and eventually attend a high school with strong STEM programs to pave the way toward a career in veterinary science or mechanical
    engineering.
