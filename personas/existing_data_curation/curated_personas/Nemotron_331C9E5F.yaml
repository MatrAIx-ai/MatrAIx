personas:
  professional: Jessica Maxwell is an aspiring architect who spends weekends constructing intricate LEGO structures and meticulously follows building instructions, channeling their methodical, routine‑loving
    nature into a future career that blends creativity with precision.
  sports: Jessica Maxwell is a dedicated member of their elementary school soccer team, training after school and competing in local leagues with a fierce competitive spirit, while also cheering for the
    Portland Sea Dogs during summer weekends and joining family snowshoe walks in winter, viewing every activity as a chance to stay fit and sharpen teamwork.
  arts: Jessica Maxwell practices piano three times a week following a strict schedule, devours the Nancy Drew mystery series for adventure, draws inspiration from performers like Taylor Swift and Lang
    Lang, and spends evenings crafting friendship bracelets and playing Scrabble with friends, which satisfies their love of strategy and routine.
  travel: Jessica Maxwell prefers family road trips that blend adventure with familiar comforts, such as yearly hikes in Acadia National Park to explore the Ocean Path and occasional visits to Disney World
    for a week‑long break, always planning itineraries with a checklist of must‑see spots and packing a snack of blueberry muffins for the ride.
  culinary: Jessica Maxwell loves the comfort of homemade mac & cheese and the seasonal taste of fresh blueberry pancakes, often helping their mother bake apple‑cinnamon crumble for the harvest festival,
    yet stubbornly refuses to eat brussels sprouts, preferring instead trail mix made with locally sourced peanuts and dried cranberries.
  core: Jessica Maxwell is a routine‑driven, competitively spirited eight‑year‑old who balances structured LEGO building and piano practice with lively soccer matches and community festivals, all while
    proudly preserving small‑town traditions.
background:
  cultural: Jessica was born and raised in Kenduskeag, a small town in Penobscot County, Maine. Her family reflects the predominantly white New England demographic, with deep roots in the region’s agricultural
    and small‑town traditions. Community life centers around school events, seasonal festivals, and outdoor activities such as fishing, hiking, and snowshoeing. Her upbringing emphasizes practicality, self‑reliance,
    and a respect for routines, mirroring the broader cultural values of rural Maine. Thanksgiving, Fourth of July celebrations, and the local harvest fair are important family traditions. The local school
    curriculum incorporates regional history, including the heritage of the Penobscot Nation, fostering an awareness of the area’s indigenous roots. Jessica’s cultural background blends classic American
    values with the specific rhythms of a close‑knit New England community.
