    User 1: Oh, that''s cute.

    User 2: Thanks.

    User 1: So, what''s it like being a Hindu in Louisiana?

    User 2: It''s fine. There''s a small community here, so I don''t feel isolated.

    User 1: That''s good.

    User 2: Yeah'
