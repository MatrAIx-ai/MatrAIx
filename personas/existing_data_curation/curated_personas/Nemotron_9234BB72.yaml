  hobbies: '[''Habitat for Humanity volunteering'', ''Acoustic guitar playing'', ''Attending regional art fairs'', ''Watercolor painting'', ''Fishing'', ''Hiking in Caprock Canyons'', ''Participating in
    the Childress County Rodeo'']'
  career_goals: Ryan aspires to move from laborer to foreman within the next three years, leveraging his organizational strengths to lead larger crews and oversee more complex projects. He aims to obtain
    a certification in construction management and eventually start his own small contracting firm that specializes in eco‑friendly residential builds with a distinct aesthetic flair. His long‑term ambition
    is to blend his love of art with construction by offering clients bespoke design‑build services that emphasize both functionality and visual harmony.
