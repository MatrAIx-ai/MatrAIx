  career_goals: Kendal aims to enroll in a STEM‑focused high‑school program and ultimately pursue a degree in civil engineering or computer science. She is motivated to contribute to sustainable infrastructure
    projects that improve Pittsburgh’s neighborhoods, and she hopes to develop community‑oriented tech solutions, such as low‑cost environmental monitoring tools, while balancing her academic ambitions
    with personal growth.
