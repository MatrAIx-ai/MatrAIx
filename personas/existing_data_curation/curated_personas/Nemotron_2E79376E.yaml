personas:
  professional: Kendal Maree is a budding teen technologist who blends a love for science magazines and hands‑on electronic kits with methodical project planning, crafting simple games in Scratch and Python
    while they quietly contribute to the school robotics club and dream of designing educational software.
  sports: Kendal Maree follows the Pittsburgh Steelers and Penguins with enthusiastic yet solitary devotion, hikes the trails of Frick Park as a member of the local youth hiking club, and they occasionally
    join the middle school cross‑country team, preferring early morning runs that balance fitness with quiet reflection.
  arts: Kendal Maree expresses creativity through piano practice of Yiruma and Debussy pieces, sketching urban Pittsburgh scenes inspired by Andrew Wyeth, and attending occasional performances at the Pittsburgh
    Public Theater, while they also listen to Billie Eilish and immerse in graphic novels like 'Maus' for artistic inspiration.
  travel: Kendal Maree plans trips with meticulous spreadsheets, cherishes weekend hikes at Ohiopyle State Park, day visits to Fallingwater, and dreams of a future solo adventure to Tokyo’s Akihabara district,
    all while they balance family budget constraints and a love for discovering industrial heritage sites.
  culinary: Kendal Maree enjoys baking chewy chocolate‑chip cookies with sea salt and experimenting with homemade pretzel bites, shows moderate cooking skill by whipping up a quick mac and cheese with sharp
    cheddar, and savors a classic Primanti Brothers sandwich, though they sometimes overindulge in sugary energy drinks after late‑night coding sessions.
  core: Kendal Maree blends methodical curiosity with a quiet love for tech tinkering, community traditions, and solo creative pursuits, often juggling disciplined budgeting and health routines while they
    occasionally succumb to late‑night snack cravings and a habit of over‑planning every detail.
background:
  cultural: Kendal comes from a third‑generation white American family of mixed German‑Irish heritage in Pittsburgh. Raised in a middle‑class neighborhood of Allegheny County, she was taught the value of
    hard work, modesty, and community involvement. Her family celebrates local traditions, such as attending Steelers games and participating in community clean‑up events, while also encouraging appreciation
    for the city’s industrial history and its evolving cultural landscape.
