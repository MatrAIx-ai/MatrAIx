personas:
  professional: Shelley Jackson, a budding data analyst, leverages deep expertise in statistical modeling, Python, R, and SQL to translate complex health and policy datasets into actionable Tableau visualizations,
    while they thrive in collaborative research settings with their sociable, energetic demeanor, even though a penchant for flexibility sometimes leads to spontaneous project pivots.
  sports: Shelley Jackson stays active by playing on the “City Spikers” recreational volleyball league, cheering for the Baltimore Ravens and Philadelphia 76ers, and they keep their energy high by fitting
    in weekly Afro‑beat and hip‑hop dance sessions.
  arts: Shelley Jackson immerses themselves in live jazz at venues like the Blue Note, draws inspiration from artists such as Nina Simone, John Coltrane, Erykah Badu, and Burna Boy, and they showcase vocal
    flair at karaoke nights belting out Whitney Houston classics, all of which shape their creative outlook.
  travel: Shelley Jackson prefers loosely planned city escapes—like weekend trips to New Orleans for its music scene, Charleston for historic streets, and Lisbon for coastal charm—balancing a love for cultural
    immersion with a modest travel budget and occasional family responsibilities, and they often book last‑minute Airbnb stays.
  culinary: Shelley Jackson, an avid home cook, experiments with soul‑food staples such as smoked collard greens, shrimp‑and‑grits, and sweet‑potato pie using fresh herbs from their urban garden, while
    they also appreciate occasional visits to local eateries for gourmet ramen bowls.
  core: Shelley Jackson, 27, blends a data‑driven mind with a love for dancing, community mentorship, and spontaneous karaoke, all while juggling a flexible work ethic and a habit of occasionally misplacing
    their planner.
background:
  cultural: Shelley grew up in a close‑knit African‑American family in the Chesapeake Bay area. Her upbringing combined Southern traditions, church community values, and a strong emphasis on education and
    resilience. She celebrates cultural holidays like Juneteenth and Kwanzaa, participates in local Black professional networking groups, and maintains ties to the broader African diaspora through music,
    food, and storytelling. The cultural richness of her community informs her collaborative approach and her commitment to giving back.
