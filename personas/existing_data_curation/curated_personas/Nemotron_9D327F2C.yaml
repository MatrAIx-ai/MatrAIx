  hobbies: '[''Book club'', ''STEM mentoring for girls'', ''Community theater'', ''Hiking with friends'', ''Yoga'', ''Cooking and recipe experimentation'', ''DIY home improvement'', ''Exploring new tech
    gadgets'']'
  career_goals: Gloria’s primary ambition is to move into a senior operations or administrative management role, such as Operations Manager or Director of Administrative Services, within the next five years.
    She plans to earn a Lean Six Sigma Black Belt certification and complete a part‑time MBA to strengthen her strategic planning capabilities. In the longer term, she hopes to lead large‑scale digital
    transformation projects that modernize office functions while maintaining the human‑centered, collaborative culture she values. She also aims to mentor emerging female leaders in the field of office
    administration and STEM outreach.
