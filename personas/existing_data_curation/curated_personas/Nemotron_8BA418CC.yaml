personas:
  professional: Julie Garry, a retail visual merchandiser with a knack for empathetic customer service, leverages her imaginative eye for design and strong conflict‑resolution skills to craft engaging store
    layouts while using her organized yet flexible approach to lead team brainstorming sessions and pilot sustainable merchandising technology.
  sports: Julie Garry, a seasonal hiker and weekend yoga enthusiast, joins the Rochester Hiking Society for spring and fall treks along the Zumbro River Trail, while cheering on the Minnesota Twins and
    Vikings and occasionally attending local ultimate‑frisbee pick‑up games as a way to blend low‑impact cardio with social interaction.
  arts: Julie Garry channels her love for abstract expression into watercolors inspired by Wassily Kandinsky and Georgia O'Keeffe, regularly attending workshops at the Rochester Art Center where they discuss
    the works of Yayoi Kusama, and unwind by listening to Sufjan Stevens and The National while sketching downtown Rochester's brick facades.
  travel: Julie Garry, an adventure‑curated traveler who favors meticulously planned road trips through national parks like Yellowstone and Glacier, has already explored Vancouver’s art scene and now dreams
    of wandering Kyoto’s historic temples and Barcelona’s bustling La Rambla, balancing scenic hikes with cultural immersion.
  culinary: Julie Garry, a self‑taught experimental cook, delights in crafting lavender‑infused shortbread, miso‑glazed eggplant, and spiced kimchi tacos, wielding a well‑stocked pantry of fresh herbs,
    miso paste, and heirloom tomatoes while often sourcing ingredients from local farmers’ markets and the occasional specialty spice shop.
  core: Julie Garry blends a vivid imagination with pragmatic retail expertise, often found sketching store windows between customer interactions, yet occasionally succumbs to spontaneous impulse buys of
    exotic spices and extra watercolor sets that clutter their studio.
background:
  cultural: Julie grew up in suburban Rochester, Minnesota, within a family of Northern European descent (German and Scandinavian roots) typical of the region. The Midwestern values of politeness, community
    involvement, and modesty shaped her upbringing. Exposure to the “Minnesota nice” ethos fostered her cooperative and compassionate nature. She attended a public high school that emphasized extracurricular
    arts, and she is aware of the local Dakota heritage, often participating in cultural awareness events. Her cultural experience blends traditional Midwestern customs with a strong appreciation for the
    arts and community service.
