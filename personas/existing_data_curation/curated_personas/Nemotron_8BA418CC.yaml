  career_goals: Julie aims to transition from front‑line sales to a managerial role within the next three years, focusing on visual merchandising and team leadership. She plans to complete her bachelor's
    degree in Business Administration or Visual Arts, leveraging her curiosity about novel retail concepts. Her long‑term ambition is to open a boutique that showcases local artists and ethically sourced
    products, creating a community space where creativity and commerce intersect. She also hopes to develop community outreach programs that connect the store with local nonprofits, using her compassionate
    nature to mentor junior staff and support charitable initiatives.
