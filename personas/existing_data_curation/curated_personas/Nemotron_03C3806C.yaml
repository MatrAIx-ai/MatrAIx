  hobbies: '[''Reading classic literature'', ''Journaling'', ''Vegetable gardening'', ''Knitwear crafting'', ''Crochet'', ''Crossword puzzles'', ''Sudoku'', ''Bird watching'', ''Nature walks'', ''Listening
    to podcasts'']'
  career_goals: She aims to translate her organizational strengths into a reliable remote position, such as part‑time bookkeeping or virtual assistant work, where she can maintain a structured schedule
    and minimize in‑person interaction. Over the next few years she plans to complete a QuickBooks certification and secure a steady freelance clientele. Parallel to this, she hopes to develop a modest
    home‑based craft business selling her knitted and crocheted items through an online marketplace, targeting a niche audience that appreciates quality and precision. Achieving financial stability and
    a predictable income stream is central to reducing her chronic worry and allowing her to maintain her preferred low‑stress lifestyle.
