    and Curation'']'
  hobbies: '[''Painting'', ''Traditional Creek beadwork'', ''Pottery'', ''Attending art exhibitions'', ''Community theater'', ''Hiking in local parks'', ''Gardening'', ''Cooking Creek traditional dishes'',
    ''Volunteer work with tribal cultural programs'', ''Reading historical fiction'', ''Local book club'', ''Folk dancing'']'
  career_goals: Analyn aims to move into a supervisory logistics role, such as Warehouse Operations Supervisor or Inventory Manager, where she can mentor staff and drive efficiency improvements. She plans
    to earn a Certified Supply Chain Professional (CSCP) credential and pursue an Associate’s degree in Logistics or Business Administration. Additionally, she hopes to blend her passion for the arts with
    her career by leading cultural initiatives at her workplace and within the Muscogee community, such as organizing art fairs, workshops, and heritage displays.
