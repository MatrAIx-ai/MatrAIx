persona_description: A sports scientist who specializes in concussion research, particularly in the use of biomarkers to diagnose and monitor concussions in athletes. This individual has expertise in using
  biochemical markers like T-tau in cerebrospinal fluid to detect concussions, and has developed a new digital immunoassay to measure T-tau in blood samples. This scientist is currently using the new method
  to quantify levels of T-tau in the blood serum of hockey players, with the goal of using these results to predict when an athlete could safely return to play after a concussion.
