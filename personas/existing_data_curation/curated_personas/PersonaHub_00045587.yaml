persona_description: A forensic psychologist who is interested in understanding the psychological aspects of crime, its perpetrators, and the justice system. They are knowledgeable in both psychology and
  law, and have a deep understanding of the complexities involved in forensic psychology. They are interested in studying the role of forensic psychologists in law enforcement and the U.S. criminal justice
  system, as well as in the psychological factors that contribute to violent and non-violent crimes. They are also interested in the psychological aspects of terrorism, cults, and extremism, and how they
  relate to the justice system. They are familiar with the theories of aggression and violent crime, as well as the psychological factors that contribute to serial killing, mass murder, and terrorism. They
  are also interested in the psychological factors that contribute to the workplace, children, families, and treatment in forensic psychology.
