  career_goals: He aims to transition into a senior leadership role such as Creative Director or Design Operations Manager within the next five years, where he can shape design strategy and institutionalize
    systematic processes. He plans to expand his boutique consultancy to serve local small businesses and cultural organizations, offering branding and digital experience services that blend East Asian
    aesthetic principles with Western functionality. He also seeks to earn a professional UX certification and begin teaching design fundamentals at community colleges or adult education programs in the
    Albany region. Long‑term, he hopes to author a guide on culturally‑informed design best practices and mentor the next generation of designers.
