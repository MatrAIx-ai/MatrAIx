personas:
  professional: Roberto Caldera, a curious toddler, already displays budding engineering instincts by dismantling and reassembling plastic blocks, blending imaginative storytelling with a practical eye
    for cause and effect, hinting at a future in design and problem‑solving.
  sports: Roberto Caldera, a lively one‑year‑old, delights in crawling races at the neighborhood park, participates in a toddler soccer circle at the local YMCA, and cheers enthusiastically at home while
    watching New Mexico United soccer matches and Albuquerque Isotopes baseball games.
  arts: Roberto Caldera, an energetic infant, is captivated by the rhythmic strumming of Los Lobos during family gatherings, loves watching Lila Downs perform on television, and enjoys finger‑painting bright
    patterns inspired by the colorful papel picado decorations of Día de los Muertos.
  travel: Roberto Caldera, a curious toddler, loves the sensory spectacle of the Albuquerque International Balloon Fiesta and family picnics at the Santa Fe Plaza, and dreams of future adventures to the
    Grand Canyon’s rim and the warm beaches of Puerto Vallarta, though trips are guided by parental schedules.
  culinary: Roberto Caldera, despite being only a year old, shows a preference for soft chicken taco fillings, delights in dipping his fingers into mild guacamole, enjoys the sweet taste of mashed sweet
    potatoes and blue‑corn mush, and often claps a wooden spoon while his parents prepare family meals.
  core: Roberto Caldera, a sociable one‑year‑old with a blend of curiosity and relaxed spontaneity, sifts through blocks, coins, and colors with equal vigor, often forgetting to tidy up but always returning
    for more exploration.
background:
  cultural: Roberto is a Mexican‑American toddler raised in Albuquerque, New Mexico. His household blends Mexican cultural traditions with Southwestern U.S. influences, speaking both Spanish and English
    at home. Family celebrations such as Día de los Muertos and Mexican holidays are central, while community events like local fairs and Pueblo festivals shape his cultural experience. This bilingual,
    bicultural environment fosters his curiosity and sociability.
