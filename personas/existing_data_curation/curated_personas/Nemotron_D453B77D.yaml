    testing (pytest, JUnit)'', ''Data analysis with pandas'', ''Accessibility compliance (WCAG)'', ''Technical writing'', ''Software architecture design'', ''Project planning'']'
  hobbies: '[''Hiking in the Ouachita National Forest'', ''Nature and cultural photography'', ''Traditional Choctaw beadwork and basket weaving'', ''Reading science fiction and speculative fiction'', ''Crossword
