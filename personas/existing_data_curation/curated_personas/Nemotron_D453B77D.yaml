personas:
  professional: Petra Ramanathan, a 29‑year‑old full‑stack software engineer, they leverage meticulous documentation, clean code, and a strong focus on accessibility to build scalable cloud‑based solutions,
    while quietly mentoring teammates and championing reliable, user‑friendly applications for community projects.
  sports: Petra Ramanathan, a 29‑year‑old avid hiker of the Ouachita foothills and member of the Little Rock Trailblazers running club, they follow the Oklahoma City Thunder for basketball and the Arkansas
    Razorbacks during college football season, and spend Saturday mornings paddling a kayak at Lake Ouachita, balancing solitary endurance activities with occasional community soccer matches.
  arts: Petra Ramanathan, a 29‑year‑old enthusiast of photographic storytelling of natural landscapes and cultural gatherings, they practice traditional beadwork and basket weaving, draw inspiration from
    speculative fiction authors N.K. Jemisin and Becky Chambers, admire the cinematic works of Hayao Miyazaki, and listen to the experimental music of Björk.
  travel: Petra Ramanathan, a 29‑year‑old who prefers well‑planned trips, they have trekked the Great Smoky Mountains and explored Austin’s live‑music scene, dream of witnessing Iceland’s aurora borealis
    and hiking New Zealand’s Tongariro Alpine Crossing, and often book budget‑friendly eco‑lodges that align with their sustainability values.
  culinary: Petra Ramanathan, a 29‑year‑old lover of seasonal farm‑to‑table meals, they favor dishes like smoked trout with wild mushroom risotto and peach cobbler with locally sourced honey, occasionally
    indulge in late‑night cheese‑and‑crackers while debugging code, and skillfully incorporate heirloom tomatoes and fresh cilantro into their favorite fish tacos.
  core: Petra Ramanathan, a 29‑year‑old methodical coder and nature‑centric creator, they balance a love for precise engineering with quiet curiosity, routine‑driven discipline, and an occasional tendency
    to hoard exotic beads and late‑night snacks.
background:
  cultural: Petra is of Choctaw descent and was raised in Choctaw, Oklahoma, where tribal traditions and community values are integral to daily life. Growing up bilingual in English and Choctaw, she participated
    in powwows, cultural workshops, and tribal council events, gaining a deep appreciation for her heritage. Her family emphasizes harmony, cooperation, and service to the community, which shapes Petra's
    considerate and collaborative approach at work and in volunteer activities. She regularly engages with elders to learn oral histories and supports initiatives that preserve and modernize Choctaw cultural
    knowledge.
