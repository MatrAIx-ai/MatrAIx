  career_goals: Petra aims to progress to a senior software engineer role within the next two years, targeting leadership of small, cross‑functional teams that develop technology solutions for the Choctaw
    Nation. She plans to earn AWS and Azure certifications, deepen her expertise in cloud architecture, and lead a project to create a digital archive for Choctaw language and cultural artifacts. Long‑term,
    she envisions becoming an engineering manager or technical lead, shaping the tribe’s digital strategy for health, education, and economic development while mentoring emerging Indigenous technologists.
