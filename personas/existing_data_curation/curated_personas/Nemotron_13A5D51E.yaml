  hobbies: '[''Watercolor painting'', ''Abstract sketching'', ''Reading speculative fiction and philosophy'', ''Journaling'', ''Gardening'', ''Nature photography'', ''Attending small art workshops'', ''Local
    history talks'']'
  career_goals: Mary aims to transition from routine janitorial duties to a supervisory role that allows her to influence the aesthetics and upkeep of a community space, such as a local art center or senior
    living facility. She envisions establishing a niche cleaning service that caters to galleries and museums, leveraging her knowledge of art handling and preservation. While she values flexibility and
    a relaxed schedule, she seeks a position that offers mentorship opportunities to share her practical expertise with younger staff. Ultimately, she hopes for a gradual retirement that balances part‑time
    consulting work with dedicated time for her own artistic practice.
