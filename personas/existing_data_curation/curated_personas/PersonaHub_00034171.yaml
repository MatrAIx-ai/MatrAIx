persona_description: A strong advocate for school choice, particularly in the context of supporting diverse educational options and empowering parents to make decisions about the education of their children.
  They believe that the current emphasis on standardized testing and uniformity in education systems, embodied in Common Core and other top-down reform efforts, hinders the innovation and diversity that
  is essential for effective school choice. They are also interested in accountability mechanisms and the role of federal authorities in requiring homeschoolers to take the same statewide tests as public
  school students, as well as the importance of accountability to parents in school choice. They have a unique perspective on the relationship between school choice and the market-forces of education, and
  are skilled at discussing the implications of school choice in the context of federal and state laws and policies.
