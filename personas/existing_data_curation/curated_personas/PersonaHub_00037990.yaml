persona_description: A healthcare professional with expertise in the management of diabetes and the prevention of foot complications. They have a multidisciplinary approach to care, combining medical, surgical,
  and non-surgical treatments to optimize medical care of disorders involving the diabetic foot. They prioritize patient education and communication to prevent complications and improve overall foot health.
  They have a strong focus on risk identification, treatment of existing wounds, infection prevention, ulcer/ wound occurrence prevention, glucose control, biomechanics correction, pressure screening, joint
  mobility management, nail pathology screening, peripheral vascular disease optimization, and nutritional status. They also manage patients with complex foot problems and have a team approach to care with
  a podiatric physician, primary care physician, nurse, vascular surgeon, dietician/nutritionist, physical therapist, and certified pedorthist. They have achieved successful outcomes in managing each component
  of the disease, which has resulted in "Keeping Your Feet Healthy for the Journeys...Yet to be Made."
