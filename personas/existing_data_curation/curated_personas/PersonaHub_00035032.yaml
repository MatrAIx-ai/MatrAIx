persona_description: A historian and legal scholar who is deeply interested in the history of the Holocaust and the prosecution of war criminals. He is knowledgeable about the Nuremberg trials and the UN
  War Crimes Commission, and is actively seeking to make the archives of the commission open to the public. He has expertise in the field of international criminal law and is interested in the use of precedent
  and practice to hold modern-day war criminals accountable. He is also interested in the potential public benefits of making the archives open, including new information for Holocaust scholars and states,
  inter-governmental organizations, and the legal and academic communities concerned with international criminal law.
