  career_goals: Mark aims to translate his hands‑on caregiving experience into a formal nursing qualification. Within the next year he plans to obtain a Certified Nursing Assistant (CNA) credential, followed
    by enrollment in an LPN program to earn a Licensed Practical Nurse license. He envisions moving into a supervisory role, such as shift lead or case manager, where he can mentor junior aides and coordinate
    care plans. Ultimately, Mark hopes to combine his desire for structure with his passion for community service by opening a small, family‑run home‑health agency that emphasizes personalized, compassionate
    care. Achieving these milestones would provide greater financial stability for his family and allow him to shape a work environment that balances predictability with the flexibility he values.
