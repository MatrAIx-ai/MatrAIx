personas:
  professional: Mark Jackson, a personal care aide with a talent for meticulous record‑keeping and compassionate client interaction, is leveraging their hands‑on caregiving experience and certifications
    in CPR and first aid to pursue a CNA credential, enroll in an LPN program, aim for a shift‑lead supervisory role, and eventually launch a family‑run home‑health agency that balances structured care
    plans with flexible community service.
  sports: Mark Jackson, a midfielder for the local Granite Hill Strikers adult soccer league and a regular participant in weekend hikes through the White Mountains, roots for the Boston Red Sox, New England
    Patriots, and New England Revolution, and balances the love of competition with a laid‑back approach to fitness by joining a community yoga class during the off‑season.
  arts: Mark Jackson, who unwinds after a shift by streaming classic rock legends like Bruce Springsteen and folk duo The Avett Brothers, attending occasional performances at the town’s community theater,
    and playing strategic video games such as Civilization VI, finds that these creative outlets shape their problem‑solving mindset and provide a soothing contrast to their caregiving responsibilities.
  travel: Mark Jackson, who prefers weekend road trips over long‑haul flights, has explored Acadia National Park, the historic streets of Boston, and the vibrant markets of Montreal, dreams of backpacking
    the Swiss Alps while carefully planning each itinerary to stay within a modest travel fund, yet they often leave room for spontaneous detours to local festivals.
  culinary: Mark Jackson, an enthusiastic home‑cook who loves experimenting with rosemary‑infused roasted chicken, fresh homemade pizza topped with mozzarella and sundried tomatoes, and a hearty New England
    clam chowder, balances a moderate cooking skill set with a love for hosting small dinner gatherings, though they sometimes over‑season dishes in the excitement of trying new recipes.
  core: Mark Jackson is a sociable, structure‑loving caregiver who juggles community service, competitive soccer, and a growing passion for entrepreneurship while constantly battling the worry that comes
    with balancing ambition and personal well‑being.
background:
  cultural: Mark was raised in a middle‑class, white New England family with deep roots in the rural towns of southern New Hampshire. His ancestry is a blend of Irish and English heritage, and he grew up
    attending a modest Protestant congregation that emphasized community service and mutual support. The cultural rhythm of his upbringing highlighted self‑reliance, respect for personal space, and the
    importance of contributing to the well‑being of neighbors. Annual traditions such as Thanksgiving potlucks, Fourth of July parades, and local high‑school sports events have reinforced his sociable,
    communal outlook. Although he appreciates the region’s historic emphasis on order and punctuality, he also values the New England spirit of flexibility and resilience that has guided him through personal
    challenges.
