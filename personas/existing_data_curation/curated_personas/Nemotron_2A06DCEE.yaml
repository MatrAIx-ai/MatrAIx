  hobbies: '[''playing soccer with friends'', ''building LEGO and block structures'', ''reading picture books about animals and space'', ''drawing and coloring'', ''exploring parks and nature trails'',
    ''participating in group games at school or community center'', ''watching educational cartoons'']'
  career_goals: William dreams of becoming someone who explores, helps, and teaches. He is fascinated by astronauts and space, imagines helping as a firefighter, and loves the idea of a scientist who discovers
    new things. While he knows school is where he will learn, his biggest ambition now is to lead fun games with his friends, learn new skills each day, and someday use his curiosity to solve real‑world
    problems.
