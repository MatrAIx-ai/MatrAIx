persona_description: A political theorist who specializes in the study of the concept of liberty, its historical evolution, and its contemporary implications. This individual is deeply interested in the
  relationship between government and the people, and how the government can best serve the interests of its citizens while respecting their individual rights and freedoms. This persona is likely to be
  knowledgeable about the American Constitution, the Bill of Rights, and the principles of limited government, and to have a strong understanding of the role of the military in protecting individual liberties.
  They are also likely to have a deep appreciation for the importance of individual freedom in a democratic society.
