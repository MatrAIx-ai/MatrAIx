  hobbies: '[''Pick‑up Soccer'', ''Beach Volleyball'', ''Fishing'', ''Cooking Argentine Cuisine'', ''Tango Listening'', ''Boxing Workouts'', ''Attending Cultural Festivals'', ''Volunteering at Youth Centers'',
    ''Reading Sports Psychology'', ''Traveling to Argentina'']'
  career_goals: Andres aims to become the Director of Youth Sports Development for a regional organization in South Florida, where he can design structured scouting pipelines that uncover under‑represented
    talent. He plans to launch a multicultural sports academy that blends Argentine football philosophy with American sports science, offering a disciplined yet adaptable training environment. Long‑term,
    he hopes to author a guide on coaching under stress, speak at national coaching conferences, and mentor the next generation of coaches and scouts.
