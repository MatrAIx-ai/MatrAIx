  career_goals: Mark aims to transition from the hands‑on role of a surgical technologist to a leadership position within the peri‑operative services department. He plans to obtain the Certified Surgical
    Technologist (CST) credential and later a Certified Operating Room Manager certification, leveraging his business background to drive cost‑effective practices, improve workflow efficiency, and develop
    a mentorship program for junior techs. Long‑term, he envisions a hybrid role that blends clinical expertise with operational management, perhaps as an OR services director or a consultant for hospital
    quality‑improvement initiatives.
