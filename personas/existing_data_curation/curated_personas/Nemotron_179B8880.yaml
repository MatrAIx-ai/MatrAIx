personas:
  professional: Mark Moreno, a 42‑year‑old surgical technologist with a business degree, blends meticulous sterile‑room expertise and real‑time instrument anticipation with a cost‑analysis mindset, leveraging
    his practical, structure‑oriented nature while occasionally battling self‑imposed deadlines and disorganization to mentor junior techs and drive OR workflow improvements.
  sports: Mark Moreno follows the Houston Astros and the Texas Longhorns with a loyal Friday‑night ritual, occasionally joins a local adult softball league, and maintains a seasonal fishing schedule on
    Lake Houston, blending team fandom with hands‑on outdoor competition.
  arts: Mark Moreno relaxes after shift by strumming acoustic renditions of Johnny Cash and listening to Lila Downs, indulges in mystery novels by Agatha Christie, and sharpens spontaneity through monthly
    improv comedy workshops at a downtown Houston theater.
  travel: Mark Moreno favors spontaneous weekend road trips through the Texas Hill Country, explores new BBQ spots in Austin and New Orleans, and plots a future adventure to Patagonia during a sabbatical,
    balancing a modest travel budget with a love for culinary discovery.
  culinary: Mark Moreno hones his culinary repertoire by mastering carne asada tacos, slow‑cooked Texas brisket, and homemade guacamole, while experimenting with craft‑beer brewing using coriander and orange
    peel hops, blending Tex‑Mex flavors with home‑brew artistry.
  core: Mark Moreno balances surgical precision with spontaneous Southern hospitality, melding disciplined cost‑efficiency, a love for fishing and improv, and a penchant for Tex‑Mex cooking into a steady,
    community‑focused life.
background:
  cultural: Mark grew up in a middle‑class suburb of Houston, absorbing the Southern hospitality and laid‑back lifestyle typical of Texas. Although his surname reflects a Spanish heritage, his family identifies
    culturally as white American, with family traditions that blend Texan customs—such as annual Fourth of July cookouts and football Saturdays—with occasional celebrations of Hispanic holidays like Día
    de los Muertos, introduced by extended relatives. Living in Houston's multicultural mosaic has given him an appreciation for diverse cuisines, music, and community events, shaping a culturally inclusive
    outlook while maintaining a strong sense of local Texan identity.
