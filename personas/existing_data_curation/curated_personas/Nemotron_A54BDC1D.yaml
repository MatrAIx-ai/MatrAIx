  career_goals: 'Jessenia aims to progress from a computer support specialist to a senior technical support engineer and eventually into an IT operations or systems engineering role. She plans to earn industry
    certifications such as CompTIA Network+, Microsoft Certified: Azure Administrator Associate, and ITIL Foundation to broaden her technical credibility. Over the next five years she hopes to lead a small
    support team, mentor junior technicians, and influence service‑delivery processes to be more user‑centric. She is also interested in bridging her technical expertise with her artistic curiosity by targeting
    support positions within creative studios or firms that develop immersive media, where she can explore emerging technologies like AR/VR and AI‑driven help desks.'
