personas:
  professional: A diligent IT support specialist named Jessenia Noronha leverages their multi‑platform troubleshooting expertise, scripting chops, and empathetic training style to streamline user experiences,
    while they quietly dream of steering a tech‑savvy creative studio toward AR/VR‑enabled help desks.
  sports: Jessenia Noronha is an avid member of the East Bay Hiking Club, tackles the Livermore Hills on weekends, cheers for the Golden State Warriors and the San Francisco 49ers on game nights, and they
    join a co‑ed soccer pick‑up at the local park every spring with a casual yet consistent fitness routine.
  arts: A dedicated art aficionado named Jessenia Noronha immerses themselves in the Bay Area’s contemporary scene by frequenting galleries showcasing Refik Anadol and Kara Walker, crafting digital illustrations
    on a drawing tablet inspired by Beeple’s hyperrealism, and they wind down evenings strumming acoustic guitar to Bon Iver and João Gilberto recordings.
  travel: A culturally curious traveler named Jessenia Noronha prefers meticulously planned cultural trips, having already explored Lisbon’s pastel de nata cafés, Reykjavik’s geothermal baths, and the art
    districts of Tokyo, while they dream of a slow‑travel itinerary through the vineyards of Rioja during the next year’s sabbatical.
  culinary: A home‑cooking enthusiast named Jessenia Noronha whips up hearty caldo verde with kale and chorizo, perfects bacalhau à Brás using salted cod, olive oil, and finely chopped onions, and they
    master pastel de nata with caramelized custard, often experimenting by adding fresh rosemary or smoked paprika to traditional Portuguese fare.
  core: Jessenia Noronha is a curiosity‑driven tech support ace who balances meticulous troubleshooting with a quiet love for art, herbs, and late‑night guitar riffs, all while they juggle a habit of over‑ordering
    specialty coffee beans.
background:
  cultural: Jessenia is a white American with deep Portuguese roots, reflected in her family name, Noronha. Her grandparents emigrated from Portugal to California, preserving elements of Portuguese culture
    such as language, cuisine, and festive traditions. Growing up in Tracy, California, she experienced a blend of the region’s agricultural heritage and the high‑tech vibe of nearby Silicon Valley. She
    speaks English fluently and maintains conversational Portuguese, which she occasionally uses when preparing family recipes or celebrating community events like the Portuguese Festival of Our Lady of
    Fatima in Fremont. Her cultural upbringing emphasizes hospitality, modesty, and a strong appreciation for the arts, values that align with the diverse, progressive atmosphere of the Bay Area and the
    vibrant local art scene. These influences shape her worldview, fostering both a respect for tradition and an openness to innovative, unconventional experiences.
