persona_description: A Duke biologist who specializes in the study of lizards and their cognitive abilities, particularly in the area of food acquisition. His research interests include the use of lizards
  in cognitive experiments and the development of new methods for studying their cognitive functions. He is known for his groundbreaking work on the use of lizards in cognitive experiments and for his unique
  observation of lizards' ability to solve problems that would be difficult for birds.
