  career_goals: Although officially retired, Krista aims to deepen her impact on the Houston senior community by leading the neighborhood seniors’ activity center, launching intergenerational mentorship
    programs that connect seniors with local school students, and completing her associate degree in community health. She also hopes to organize a city‑wide volunteer network that supports food‑insecurity
    initiatives and to become a recognized mentor for younger volunteers seeking guidance in community service.
