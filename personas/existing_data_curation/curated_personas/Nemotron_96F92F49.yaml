personas:
  professional: Krista Nelms, a retired community volunteer and aspiring community health associate, leverages her strong interpersonal and organizational abilities to coordinate senior center events, recruit
    and train volunteers, and mediate group dynamics, blending her preference for predictable structures with a flexible, people‑centered approach.
  sports: Krista Nelms keeps fit by joining a Hermann Park walking club each morning, cheering on the Houston Astros during baseball season and the Houston Rockets on game nights, while occasionally attending
    senior‑friendly yoga classes, embodying her energetic, sociable approach to staying active.
  arts: Krista Nelms embraces the arts by lending her warm alto voice to the church choir’s renditions of classics like "Amazing Grace," quilting intricate patterns inspired by Georgia O’Keeffe’s paintings,
    attending productions at Houston’s Theatre Under the Stars, and devouring historical fiction novels by Philippa Gregory and Ken Follett, which together nurture her creative spirit and community connections.
  travel: Krista Nelms favors organized, short‑haul road trips with friends, having already toured the Texas Hill Country wineries, explored New Orleans’ historic French Quarter, and visited San Antonio’s
    River Walk, while dreaming of a leisurely cruise to the Mexican Caribbean and a guided pilgrimage to the Grand Canyon, reflecting her blend of structured planning and spontaneous curiosity.
  culinary: Krista Nelms delights in preparing Tex‑Mex staples like chicken enchiladas topped with fresh cilantro and jalapeño salsa, alongside Southern comfort foods such as slow‑cooked brisket, collard
    greens, and buttery cornbread, showcasing her confident kitchen skills and love for gathering friends around a bountiful table.
  core: Krista Nelms is a community‑oriented retiree who balances meticulous event planning with a relaxed, spontaneous streak, finding joy in choir harmonies, native‑herb gardening, and the occasional
    habit of misplacing her glasses.
background:
  cultural: Krista is a third‑generation Anglo‑American Texan raised in a middle‑class Protestant (United Methodist) family in Houston. Her upbringing emphasized Southern hospitality, community service,
    and strong family ties. Living in a culturally diverse city, she has embraced the blend of Southern and Mexican influences that define Houston’s food, music, and festivals. She maintains traditions
    such as Thanksgiving feasts, Christmas caroling, and celebrating Texas Independence Day, while also participating in multicultural events like the Houston Livestock Show & Rodeo and local cultural fairs,
    reflecting her respect for the city’s rich diversity.
