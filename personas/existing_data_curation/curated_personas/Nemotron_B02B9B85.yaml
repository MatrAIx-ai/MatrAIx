  career_goals: Approaching retirement, Philip aims to transition from full‑time protective service work to a mentorship and consultancy role. He plans to obtain the Certified Protection Professional (CPP)
    credential and leverage his business background to advise local schools, municipalities, and small businesses on developing structured emergency‑preparedness programs. He also hopes to lead a community
    safety outreach initiative that trains volunteers in basic first aid and situational awareness, while prioritizing his own stress‑management through regular counseling and wellness practices. Ultimately,
    he wants to leave a lasting legacy of organized, compassionate security practices in Hanford and the surrounding county.
