  hobbies: '[''Pickup basketball'', ''Competitive video gaming'', ''Board‑game nights'', ''Hiking and fishing'', ''County fair volunteering'', ''DIY automotive tinkering'', ''Acoustic guitar playing'',
    ''Barbecue cooking'']'
  career_goals: Rene aims to turn his love of people, competition, and practical work into a flexible, locally rooted career. Over the next two years he plans to enroll in a community‑college automotive
    technology program while working part‑time as a sales associate at a local auto‑parts store to gain industry experience. His long‑term ambition is to open a small sports‑gear and community‑hub shop
    that rents equipment, runs youth leagues, and offers weekend clinics, blending his entrepreneurial drive with his passion for team sports. He also envisions becoming an assistant basketball coach at
    the local high school, using his competitive edge and leadership to mentor younger athletes.
