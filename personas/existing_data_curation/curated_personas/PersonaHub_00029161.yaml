persona_description: A historian who specializes in the study of Jewish history, particularly the development of Jewish knowledge and authority in Babylonia from the 2nd century CE to the 11th century.
  His research interests include the evolution of Jewish law, the growth of Jewish centers of learning and authority, and the impact of these centers on Jewish communities around the world. He is particularly
  interested in the rise of Jewish legal academies in Spain, North Africa, and Germany, and the emergence of a new authority in German Jewry after the fall of Babylonia's academies. He is also interested
  in the cultural and religious differences between Ashkenazic and Sephardic Jews, and the role of Jewish legal academies in shaping these differences.
