personas:
  professional: Wahida Singh is a mid‑career architect in Buffalo who integrates BIM, Rhino, and Grasshopper into sustainable, culturally resonant projects, balances meticulous project management with fluid
    creative exploration, mentors emerging designers, and pursues AI‑assisted design tools while maintaining an organized yet flexible workflow.
  sports: Wahida Singh supports the Buffalo Bills on game days, follows the Buffalo Sabres through the hockey season, joins a local hiking club that explores the Allegheny foothills on weekends, and practices
    yoga at a downtown studio three times a week to maintain mindful fitness.
  arts: Wahida Singh cultivates an active arts life by painting watercolors inspired by Mary Heilmann’s abstract forms, creating digital illustrations influenced by N.K. Jemisin’s speculative fiction, frequenting
    the Albright‑Knox Art Gallery to admire Olafur Eliasson’s installations, and attending design talks featuring Rem Koolhaas.
  travel: Wahida Singh favors weekend getaways to the Adirondack Mountains for hiking and yoga retreats, enjoys cultural excursions to Toronto’s design districts, dreams of exploring Barcelona’s modernist
    architecture, and plans trips with a focus on sustainable travel options while adhering to a disciplined budget.
  culinary: Wahida Singh delights in crafting fusion dishes such as garam masala‑spiced roasted cauliflower tacos with locally sourced kale and butternut squash, experimenting with ingredients like fenugreek,
    black mustard seeds, and heirloom tomatoes, and often dines at Buffalo’s farm‑to‑table venues like Hearth and Silo.
  core: Wahida Singh merges architectural rigor with watercolor whimsy, balances meticulous project schedules with spontaneous spice experiments, and can’t resist buying a fresh sketchbook at every gallery
    opening—even if it means skipping their favorite latte.
background:
  cultural: Wahida was raised in a multicultural South Asian household that blends Indian Sikh and Muslim traditions. Fluent in English, Punjabi, and Hindi, she celebrates Diwali, Eid, and other cultural
    festivals with family and the broader Buffalo South Asian community. Her upbringing emphasized hospitality, harmony, and reverence for artistic expression, influencing both her personal style and professional
    designs. She actively participates in local diaspora events, mentors younger South Asian professionals, and often incorporates subtle South Asian motifs—such as intricate latticework and vibrant color
    palettes—into her architectural projects, creating a dialogue between her heritage and the regional context.
