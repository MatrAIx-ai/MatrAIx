  hobbies: '[''Watercolor painting'', ''Digital illustration'', ''Photography'', ''Hiking'', ''Yoga'', ''Reading speculative fiction'', ''Cooking fusion cuisine'', ''Attending art galleries'', ''Architecture
    meet‑ups'', ''Volunteering at community design workshops'', ''Traveling to study historic architecture'', ''Exploring new materials and technologies'']'
  career_goals: Wahida aims to launch her own boutique architecture studio that champions sustainable, culturally responsive design and serves both private clients and community projects in the Buffalo
    region. She plans to obtain LEED AP certification, lead a multidisciplinary team that incorporates emerging technologies such as AI‑assisted design, and secure a flagship public commission—such as a
    community cultural center—that weaves South Asian architectural motifs with local heritage. Additionally, she is committed to mentoring emerging architects from underrepresented backgrounds and influencing
    regional policy toward greener building practices.
