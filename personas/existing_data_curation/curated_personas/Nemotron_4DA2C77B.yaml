personas:
  professional: Maria Ramirez, a college senior majoring in Fine Arts with a strong command of digital illustration, photography, and bilingual communication, channels her love for visual storytelling and
    her island heritage into freelance commissions for cultural publications while they juggle a relaxed, often‑disorganized schedule that prioritizes creative freedom over rigid planning.
  sports: Maria Ramirez, an avid solo hiker, spends weekends trekking Shenandoah Valley trails with the Virginia Trailblazers club and they keep a casual allegiance to the Washington Capitals, while using
    yoga stretches as their primary fitness routine to counterbalance the sedentary aspects of their digital art work.
  arts: Maria Ramirez, a digital illustrator and photographer, draws aesthetic cues from magical‑realist novelist Gabriel García Márquez and visual pioneer James Turrell, fuels their creative process with
    ambient playlists by Tycho and occasional guitar practice echoing Andrés Segovia, and they stay tuned to the Art History Babes podcast and the Every Frame a Painting video essay series for fresh perspectives.
  travel: Maria Ramirez, a 19‑year‑old wanderer, prefers low‑key, solo trips that weave Appalachian hikes in Shenandoah with spontaneous weekend flights to the Caribbean island tied to their family's culinary
    roots, and they plan most getaways on the fly using student travel discounts and a handwritten list of quiet cafés and hidden murals.
  culinary: Maria Ramirez, an experimental home chef, often crafts aromatic arroz con gandules infused with fresh cilantro, diced sofrito, and a pinch of adobo spice while they nurture an indoor herb garden
    of basil, thyme, and oregano that they harvest to garnish their spontaneous twists on traditional island comfort food.
  core: Maria Ramirez, a 19‑year‑old solitary creator, channels curiosity into sketch‑filled nights, impulsive hikes, and a habit of leaving half‑finished art projects strewn across their dorm, all while
    they dream of launching a digital platform that amplifies Caribbean diaspora voices.
background:
  cultural: Maria grew up in a bicultural household where Puerto Rican traditions—music, food, and storytelling—were celebrated alongside mainstream American culture. At home Spanish was spoken daily, and
    family gatherings featured salsa, bomba rhythms, and dishes such as mofongo, pasteles, and arroz con gandules. Living in Harrisonburg, she engages with a modest Latinx community, attending cultural
    festivals, volunteering at the local Hispanic Resource Center, and supporting Caribbean art events. Her identity is shaped by navigating the diaspora experience, which fuels her interest in preserving
    and sharing Puerto Rican artistic narratives within a broader American context.
