  career_goals: Maria aims to build a career that lets her combine her love for visual storytelling with her Puerto Rican heritage while preserving a flexible, self‑directed schedule. In the short term
    she plans to complete a B.A. in Fine Arts or Visual Communication, develop a professional portfolio, and begin freelancing as an illustrator and visual content creator for cultural publications. Long‑term,
    she envisions launching a digital platform that showcases Caribbean diaspora artists or working as a museum educator/curator specializing in Latinx art, potentially pursuing a graduate degree in Museum
    Studies. She seeks remote‑friendly roles that allow independent work and occasional travel for inspiration.
