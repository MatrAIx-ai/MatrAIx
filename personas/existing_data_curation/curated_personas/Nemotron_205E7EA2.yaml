  hobbies: '[''Woodworking'', ''Gardening'', ''Model railroading'', ''Reading historical non-fiction'', ''Fishing'', ''Chess'', ''Attending local sports events'', ''Volunteer computer tutoring'', ''Community
    service'']'
  career_goals: Allen aims to finish his industrial engineering degree through online courses, expand the senior center’s computer literacy program, document the oral histories of Kalamazoo’s manufacturing
    workers, and continue building custom woodworking projects for his grandchildren. He also wants to stay physically active through regular gardening and walking, and maintain a balanced social life with
    his wife and close friends.
