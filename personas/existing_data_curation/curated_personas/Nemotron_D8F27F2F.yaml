  hobbies: '["Gujarati cooking", "Herb and vegetable gardening", "Yoga and meditation", "Reading historical fiction and mystery novels", "Teaching Gujarati language to children", "Solving Sudoku puzzles",
    "Walking the dog", "Attending community theater"]'
  career_goals: Vidisha aims to transition from teller to a supervisory role, such as Lead Teller or Assistant Branch Manager, where she can shape customer experience and staff development. She plans to
    earn a certification in financial planning or community banking to broaden her expertise. Passionate about digital inclusion, she hopes to lead workshops that help older customers adopt online banking.
    In the longer term, she envisions part‑time consulting on financial literacy for the South Asian community while preparing for a comfortable retirement within the next five years. Managing stress and
    maintaining work‑life balance remain central to her ambitions.
