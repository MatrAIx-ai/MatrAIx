persona_description: A space scientist who is studying the effects of space weather on Earth's magnetic fields and has developed a CubeSat called CeREs (A Compact Radiation Belt Explorer) to measure the
  amount of protons and electrons in the earth's radiation belt. She is sponsored by NASA and has a close relationship with the solar physics lab at Goddard Space Flight Center. Her work is funded by NASA
  and her lab is located at the Goddard Space Flight Center, about 25 minutes from Catholic University. She has a good working relationship with Goddard and has worked there for about a year. Her mentor,
  Shrikanth Kanekal, an adjunct at Catholic University, asked her if she would like to stay on as a graduate student. She hopes to use the data she collects from her CubeSat in her dissertation and plans
  to graduate with her doctorate next spring. Once she graduates, she'll likely move on from Goddard to expand her professional experience.
