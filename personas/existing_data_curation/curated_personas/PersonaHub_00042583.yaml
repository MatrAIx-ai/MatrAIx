persona_description: A climate scientist who specializes in the study of climate change impacts on energy and transport systems, particularly in Europe. They have extensive knowledge and experience in forecasting
  and modeling the effects of future climate change on energy demand, heating and cooling needs, and the distribution of energy resources. They are likely to be working in a research or academic institution,
  and are highly skilled in using data analysis and modeling techniques to understand the complex interactions between climate change and energy systems. They are also likely to be involved in policy development
  and advocacy, working to inform policymakers and stakeholders about the potential impacts of climate change on energy systems and the need for adaptation and mitigation measures.
