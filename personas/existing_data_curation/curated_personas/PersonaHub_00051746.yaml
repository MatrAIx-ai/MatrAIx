persona_description: A scientist who specializes in the study of diabetes, specifically focusing on the genetic and environmental factors that contribute to the development of type-1 diabetes. Her research
  interests include the impact of endocrine-disrupting chemicals on hormonal systems, the role of vitamin D in immune function, and the development of self-test blood glucose kits for individuals at risk
  of developing diabetes. She is also interested in the psychological impact of diabetes and the role of counselling in managing the emotional toll of the disease.
