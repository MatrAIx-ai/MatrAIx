personas:
  professional: Olive Corriher, a retired homemaker turned senior‑community leader, leverages her lifelong expertise in budgeting, event planning, and gardening to spearhead a historic society board and
    a neighborhood garden for elders, channeling her meticulous, competitive nature into organized, results‑driven volunteering.
  sports: Olive Corriher enjoys low‑impact outdoor activities, regularly hiking the foothills of the Missouri River and participating in a senior walking club that roots for the Great Falls Chargers football
    team and the Montana Grizzlies football, balancing her love of nature with a spirited loyalty to local sports.
  arts: Olive Corriher blends artistry and precision through quilting inspired by the bold patterns of Gee's Bend, captures river wildlife with digital photos echoing Ansel Adams’ compositions, and indulges
    in historical biographies by David McCullough, letting these creative outlets shape her reflective yet competitive mindset.
  travel: Olive Corriher prefers well‑planned, leisurely road trips that combine scenic drives through Yellowstone National Park and visits to historic sites like the Little Bighorn Battlefield, often scheduling
    these outings around her grandchildren’s school breaks to blend family bonding with her love of heritage travel.
  culinary: Olive Corriher delights in cooking classic American fare such as chicken pot pie, homemade cornbread, and pickled beets, skillfully preserving seasonal produce in her cellar while modestly bragging
    about her perfect crust, though she sometimes over‑salts her soups in the rush of a busy family gathering.
  core: Olive Corriher is a methodical, curiosity‑driven septuagenarian whose competitive spirit fuels community leadership, meticulous budgeting, and creative pursuits, all tempered by an unflappable calm
    and occasional indulgence in extra salt.
background:
  cultural: Olive grew up in mid‑20th‑century Great Falls, Montana, a town shaped by agriculture, the railroad, and the Missouri River. Her family’s German‑Scandinavian roots emphasized self‑reliance, punctuality,
    and community service. Raised in a modest, church‑centered home, she internalized values of practicality, modesty, and calm stoicism. The expansive landscapes and seasonal cycles fostered her love of
    gardening and outdoor activity, while the close‑knit town culture encouraged participation in volunteer groups, local history projects, and church events. These influences blend traditional Midwestern
    values of hard work, thrift, and quiet determination with the independent spirit of the American West.
