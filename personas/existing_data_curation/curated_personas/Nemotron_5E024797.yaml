  career_goals: Although retired from formal employment, Olive aims to remain purposeful by taking on leadership roles in local volunteer organizations. She plans to join the board of the Great Falls Historical
    Society and spearhead a community garden project that provides fresh produce to senior residents. She also hopes to compile and publish a memoir and family genealogy that preserves her family’s story
    for future generations. Improving her digital fluency so she can stay connected with her grandchildren through video calls and social media is another priority. Additionally, Olive aspires to mentor
    teenagers in practical life skills, organize an annual senior health fair, and achieve a basic proficiency in piano playing for personal enjoyment.
