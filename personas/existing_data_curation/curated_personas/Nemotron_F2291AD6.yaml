personas:
  professional: John Eason, a preschool architect who meticulously organizes his Lego bricks by size and color before building elaborate block towers, often deviates mid‑construction to incorporate a toy
    dinosaur, showcasing his blend of love for structure and spontaneous curiosity.
  sports: John Eason, an enthusiastic member of the Tiny Tots Soccer League, follows the coach’s structured drill schedule and proudly cheers for the Seattle Seahawks and Seattle Mariners during family
    game nights, yet often darts off to chase a butterfly during practice, balancing his competitive drive with spontaneous bursts.
  arts: John Eason, a budding artist who fills his sketchbook with vivid watercolors inspired by Dr. Seuss and sings along to The Wiggles, eagerly shares his creations in preschool art show, and obsessively
    lines up his crayons in rainbow order before each drawing session, reflecting his sociable nature and penchant for order.
  travel: John Eason, an inquisitive traveler who has visited the Monterey Bay Aquarium, spent a weekend at a cabin in the Catskills, and enjoyed a day at Disneyland, prefers meticulously planned itineraries
    with his parents yet daydreams about an unstructured treasure hunt on a desert island.
  culinary: John Eason, a selective eater who delights in buttery mac and cheese, dinosaur‑shaped chicken nuggets, and apple slices with peanut butter, occasionally experiments by adding a dab of ketchup
    to peas, but frequently worries about new textures, leading him to politely decline broccoli.
  core: John Eason navigates childhood with a blend of methodical curiosity and spontaneous bursts, thriving in group play while quietly fretting over the unknown.
background:
  cultural: John lives in Nampa, Idaho, a growing suburban community in Canyon County with strong ties to agriculture and a close‑knit family environment. His family’s white, middle‑class background reflects
    typical Pacific Northwest and Midwestern American values of self‑reliance, community involvement, and an appreciation for the outdoors. Local cultural influences include school‑based activities, youth
    sports leagues, church gatherings, and seasonal events like county fairs, all of which shape his daily experiences.
