  career_goals: Although still young, John often talks about becoming a firefighter or a police officer because he likes the clear routines and teamwork these jobs provide, while also enjoying the chance
    for spontaneous action in emergencies. He also dreams of a future as a professional soccer player, reflecting his competitive streak and love for group sports. These aspirations give him a sense of
    control over his worries and a way to help others.
