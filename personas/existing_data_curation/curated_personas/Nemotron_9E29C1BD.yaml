    mentorship'', ''Creative problem-solving'']'
  hobbies: '[''Community drumming circles'', ''Improv theater'', ''Abstract painting'', ''Photography'', ''Hiking in the San Bernardino foothills'', ''Powwow participation and traditional crafts'', ''Reading
    speculative fiction and philosophy'', ''DIY electronics projects'', ''Volunteer digital-literacy tutoring'']'
  career_goals: Martimiano aims to progress from field technician to senior supervisor, eventually managing large-scale fiber-to-the-home deployments across Riverside County and neighboring regions. He
    plans to earn advanced certifications in fiber optics (CFOT) and network engineering (CCNA/CCNP) to broaden his technical authority. In the long term, he envisions founding a consultancy that partners
    with tribal governments and rural municipalities to expand broadband access using sustainable practices and culturally responsive approaches. He also aspires to mentor Native American youth interested
    in STEM fields, offering apprenticeships that combine hands-on telecom training with community development.
