personas:
  professional: Hsiaoling Wang, a seasoned electrician with decades of hands‑on experience repairing power systems for trucks, generators, and small marine vessels across the islands, merges meticulous
    schematic reading with a pragmatic curiosity, mentoring apprentices while navigating a relaxed, flexible workflow that still delivers reliable, code‑compliant solutions and positions her for a journeyman
    license and a future EV‑charging business.
  sports: Hsiaoling Wang embraces moderate fitness through weekend hikes on volcanic trails, sporadic beach volleyball matches with friends, a regular yoga class at the local senior center, and cheering
    for the University of Hawaii Rainbow Warriors football team, balancing a love of outdoor adventure with low‑impact activities that suit her age and energy.
  arts: Hsiaoling Wang’s artistic life revolves around low‑key mahjong evenings, storytelling circles that weave family histories, listening to Israel Kamakawiwoʻole’s slack‑key guitar alongside Yo‑Yo Ma’s
    cello sonatas, cultivating orchid photography inspired by local botanist works, and attending community cultural festivals that showcase hula and traditional drum performances.
  travel: Hsiaoling Wang prefers spontaneous, low‑budget weekend getaways, often exploring neighboring islands like Maui’s Haleakalā crater or Lanai’s secluded beaches, while dreaming of a leisurely road
    trip through New Zealand’s volcanic landscapes and a cultural immersion tour of Kyoto, balancing her love of nature with flexible planning that accommodates family and community commitments.
  culinary: Hsiaoling Wang blends inherited family recipes with island flavors, mastering dishes such as pineapple‑glazed pork belly with five‑spice, taro mash topped with soy‑ginger gravy, and coconut‑curry
    fish tacos featuring fresh mahi‑mahi, while delighting guests with freshly brewed jasmine tea and using local ingredients like ti leaf and macadamia nuts to create a unique fusion cuisine.
  core: Hsiaoling Wang is a curious yet relaxed hands‑on electrician who gardens, hikes, and cooks with a spontaneous spirit, a touch of disorganization, and a habit of collecting vintage radios between
    client calls.
background:
  cultural: Hsiaoling is a second‑generation Chinese‑American whose parents immigrated to Hawaii in the mid‑20th century. Raised in Honokaa, she grew up speaking both English and Mandarin at home, while
    also picking up Hawaiian Pidgin and the values of the local aloha spirit. Her family observes traditional Chinese holidays such as Lunar New Year and the Mid‑Autumn Festival, yet they also participate
    in Hawaiian cultural events like lei‑making workshops and community luaus. This blended heritage informs her pragmatic work ethic, her respect for community, and her appreciation for both the disciplined
    aspects of her Chinese roots and the relaxed, flexible approach of island life.
attributes:
  skills: '[''Electrical wiring and repairs'', ''Diagnostic troubleshooting for transportation equipment'', ''Installation of lighting and power systems'', ''Routine maintenance of generators and diesel
    engines'', ''Interpretation of technical schematics'', ''Safety compliance (OSHA) and local Hawaiian electrical codes'', ''Tool selection and usage'', ''Customer communication and service'', ''Basic
    marine corrosion prevention'', ''Mentoring junior apprentices'']'
  hobbies: '[''Hiking volcanic trails'', ''Gardening and caring for tropical fruit trees'', ''Cooking Chinese‑Hawaiian fusion meals'', ''Playing mahjong with friends'', ''Fishing and canoe paddling'', ''Volunteer
    work at the senior center'', ''DIY home improvement projects'', ''Listening to classic rock and Hawaiian music'', ''Learning basic Mandarin characters'', ''Attending local cultural festivals'']'
  career_goals: At this stage Hsiaoling aims to formalize her expertise by obtaining a journeyman electrician license in Hawaii, which would give her greater job security and the ability to bid on larger
    contracts. She hopes to expand her services into emerging areas like electric‑vehicle charging station installation and renewable‑energy integrations for rural homes. Additionally, she wishes to start
    a small family‑run maintenance shop where she can train younger technicians, ensuring her practical knowledge is passed on while providing a stable income for her household.
