personas:
  professional: Shae March, a ten‑year‑old aspiring coder and LEGO engineer, blends their love for adventure stories with practical problem‑solving by designing Scratch games and building structurally sound
    LEGO models that often serve as prototypes for imaginative community projects.
  sports: Shae March, a forward on the Oakland Dragons youth soccer team, trains twice weekly, cheers for the Golden State Warriors and the San Francisco Giants, and supplements soccer with weekend hikes
    at Redwood Regional Park, approaching fitness with a mix of teamwork enthusiasm and personal challenge.
  arts: Shae March, an avid cartoonist, spends evenings sketching characters inspired by Stan Lee and Studio Ghibli, keeps a sketchbook next to their favorite adventure books, and frequently visits the
    Oakland Museum of California where they admire works by contemporary illustrator Yuko Shimizu.
  travel: Shae March, a curious explorer of both urban green spaces and distant wonderlands, loves weekend trips to Muir Woods and annual family visits to Disneyland, plans outings using colorful maps and
    a simple checklist, balancing a love for nature trails with a dream to one day see the pyramids of Egypt.
  culinary: Shae March, a budding home chef, delights in assembling pepperoni pizza with extra cheese, whipping up quick spaghetti carbonara for soccer teammates, and baking chocolate chip cookies for garden
    volunteers, favoring ingredients like mozzarella, tomatoes, and fresh basil.
  core: Shae March is a ten‑year‑old whose boundless curiosity fuels LEGO engineering, Scratch coding, and community kindness, all while maintaining a pragmatic eye on budgets, health, and teamwork.
background:
  cultural: Shae Michelle March is a 10‑year‑old white girl growing up in Oakland, California, within a middle‑class family that embraces the Bay Area’s progressive and multicultural spirit. While she celebrates
    typical American holidays such as Thanksgiving and the Fourth of July, she is also regularly exposed to the cultural diversity of her neighborhood through school programs, local festivals, and community
    events. Her parents emphasize education, community service, and environmental stewardship, fostering an inclusive worldview that blends traditional American values with the rich tapestry of Oakland’s
    varied cultures.
