  career_goals: Shae dreams of a future where she can help others while using her curiosity to solve real‑world problems. She imagines becoming a pediatric doctor or a teacher who nurtures young minds,
    and she also feels drawn to environmental science to protect nature. Her ambition is to blend compassion with practical knowledge, eventually working in community health, education, or conservation
    to make a positive impact.
