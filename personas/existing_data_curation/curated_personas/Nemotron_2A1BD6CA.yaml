  hobbies: '[''Tai chi'', ''Yoga'', ''Cooking (Chinese‑Californian fusion)'', ''Gardening'', ''Community volunteering (Lunar New Year events, tutoring)'', ''Reading historical fiction'', ''Calligraphy'',
    ''Line dancing'']'
  career_goals: Say Xiong aspires to transition from her current school‑level administrative role to a district‑wide leadership position where she can shape early‑learning policy for a broader community.
    She plans to pursue a master’s degree in educational leadership to deepen her strategic and policy expertise. Her ambition includes designing and scaling STEM‑focused early‑childhood curricula that
    also embed social‑emotional learning and mental‑health supports, particularly for bilingual families. She hopes to mentor emerging educators, champion equity for Asian and Hispanic families in Los Angeles
    County, and eventually establish a community learning hub that offers after‑school STEM enrichment and family wellness resources.
