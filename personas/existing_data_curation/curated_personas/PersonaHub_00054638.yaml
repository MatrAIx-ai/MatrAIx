persona_description: A researcher at the Max Planck Institute (MPI) of Biochemistry in Martinsried, Germany, who specializes in neurochip technology and has developed a unique neurochip with 16,384 sensory
  transistors on an area of just one square millimetre. The neurochip technology is now being transferred to the NMI in Reutlingen, Germany, with the goal of further developing the technology and maintaining
  and expanding Germany's outstanding international position in the field of neurochip technology. The researcher is highly skilled in neurochip technology, has published research in the field, and has
  developed a powerful measurement system for applications in basic neurophysiological research. The researcher is looking for a new opportunity to apply their knowledge and skills in the field of neurochip
  technology, and is interested in collaborating with other experts in the field.
