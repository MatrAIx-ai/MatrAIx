personas:
  professional: Hannah Moore is a ten‑year‑old budding game designer who builds simple Scratch games and strategic chess puzzles, channeling their curiosity and competitive spirit into inventive coding
    projects while often juggling a relaxed attitude toward obligations and a habit of misplacing project files.
  sports: Hannah Moore cheers for the Chicago Cubs and the Chicago Blackhawks while playing for the River Valley Tigers U10 soccer team, enjoys low‑impact family hikes on winter trails to watch wildlife,
    and participates in a community cross‑country running club during the spring, preferring solitary practice over large‑group sports due to their reserved nature.
  arts: Hannah Moore draws comic strips inspired by Raina Telgemeier and XKCD, curates a playlist of indie pop hits from Billie Eilish and Tame Impala while coding, and devours mystery novels like The Mysterious
    Benedict Society, letting artistic expression and music shape their creative identity.
  travel: Hannah Moore loves planning weekend family trips to Yellowstone’s snowy vistas and dreams of touring Copenhagen’s original LEGO House and Tokyo’s Akihabara district, favoring a mix of nature exploration
    and pop‑culture immersion while balancing a modest allowance that limits long‑haul travel.
  culinary: Hannah Moore prefers pizza topped with pepperoni and extra cheese, enjoys sushi rolls with avocado and soy sauce, whips up DIY ramen bowls with broth, noodles, and sliced pork, and snacks on
    gummy bears while solving chess puzzles, though they often forget to eat a balanced lunch.
  core: Hannah Moore is a curious, competitive ten‑year‑old who balances a love for puzzles, coding, and solitary hobbies with a tendency toward disorganization, anxiety‑driven worry, and a quiet, introspective
    streak.
background:
  cultural: Hannah comes from a White, Midwestern American family with a blend of German, Scandinavian, and Irish ancestry. Raised in Minneapolis, Minnesota, she experiences the region’s distinct seasons,
    from hot summers to snowy winters, and participates in local traditions such as the Minnesota State Fair, ice‑skating, and winter festivals. Her household celebrates major U.S. holidays—Thanksgiving,
    Christmas, and the Fourth of July—while also honoring community events that highlight the city’s cultural diversity, including exposure to the histories of the Dakota people and neighboring immigrant
    communities. Her family places a high value on education, personal independence, and friendly competition, encouraging her to pursue academic excellence and practical, hands‑on activities that reflect
    the pragmatic spirit of the Upper Midwest.
