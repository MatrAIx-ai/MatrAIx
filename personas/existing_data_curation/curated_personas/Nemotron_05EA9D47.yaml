  career_goals: Hannah envisions a future where she creates and designs technology that solves everyday problems. She aspires to become a robotics engineer or software developer, building interactive kits
    and simple apps for children. Her analytical nature also fuels an interest in forensic science, where she could apply her critical thinking to solve mysteries. She aims to excel academically, win science
    fair awards, and earn scholarships that will enable her to study engineering or computer science in college. Ultimately, she wants to be recognized for innovative problem‑solving while maintaining a
    practical, hands‑on approach to her work.
