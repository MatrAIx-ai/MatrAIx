persona_description: A researcher at Fraunhofer IGB who specializes in the development of biodegradable polymers and their applications in the cosmetics industry. They are passionate about establishing
  a green value chain and improving the sustainability of the entire process chain. They are interested in the development of new PHAs with different structures and characteristics, and their research focuses
  on the use of microorganisms to produce PHAs. They have a deep understanding of the purification process and the use of pressure change technology to extract PHAs from microorganisms. They are also interested
  in the potential of PHAs for small items of disposable packaging and the potential for them to be used in the cosmetics industry.
