  hobbies: '[''Gardening'', ''Church choir singing'', ''Quilting'', ''Reading historical fiction'', ''Genealogy research'', ''Cooking Southern cuisine'', ''Walking nature trails'', ''Puzzle solving (crosswords,
    sudoku)'', ''DIY home improvement projects'', ''Mentoring local youth in technical skills'']'
  career_goals: Victoria aspires to move into a supervisory or lead position within the manufacturing plant, where she can shape safety protocols and training programs for newer staff. She plans to obtain
    a certification in CNC operations and a short course in occupational health and safety to broaden her technical expertise and reduce the physical strain of her current role. Over the next few years,
    she hopes to mentor a cohort of trainees, implement a streamlined inventory tracking system, and eventually transition to a part‑time consultancy role that allows her to share her practical knowledge
    with local community colleges or vocational programs. Balancing her ambition with practicality, she also envisions gradually reducing her on‑floor hours to focus more on family and personal well‑being.
