personas:
  professional: A seasoned machine feeder, Victoria Nana expertly coordinates material handling on the shop floor, leveraging meticulous record‑keeping and calm, assertive communication to keep CNC operations
    running smoothly while they mentor new staff.
  sports: Victoria Nana enjoys gentle fitness pursuits such as weekly walks with the Horry County Senior Walking Club and cheering on the Carolina Panthers, while occasional participation in a low‑impact
    bowling league keeps them engaged in light competition.
  arts: Victoria Nana finds artistic expression in sewing quilts inspired by traditional patterns, singing gospel arrangements of Mahalia Jackson in a church choir, and immersing themselves in historical
    novels by Charles Frazier and Elizabeth Spencer, which together shape an appreciation for Southern storytelling.
  travel: Victoria Nana prefers well‑planned road trips to nearby coastal retreats like Wilmington, North Carolina, and historic cities such as Savannah, Georgia, savoring the blend of relaxation and cultural
    enrichment while always packing a spare set of gardening gloves for spontaneous stops.
  culinary: Victoria Nana’s cooking is anchored in soulful Southern fare—regularly preparing skillet‑fried catfish with collard greens seasoned with smoked turkey, simmered okra gumbo featuring home‑grown
    tomatoes, and a buttery peach cobbler—while modest culinary skill lets them experiment with fresh herbs like thyme and bay leaves.
  core: Victoria Nana is a methodical, garden‑loving CNC feeder who balances a meticulous work ethic with a warm, choir‑filled community life, yet they often worry about the future enough to double‑check
    every ledger entry and garden seed packet alike.
background:
  cultural: Victoria’s cultural background is rooted in the African‑American community of coastal South Carolina. Her family traces its ancestry to the Gullah‑Geechee traditions of the Sea Islands, preserving
    a rich heritage of storytelling, music, and cuisine that blends African rhythms with Southern flavors. Growing up in Longs, she was shaped by the close‑knit church community, where gospel music, communal
    meals, and mutual support were central. The legacy of resilience and self‑reliance that characterized many Black families in Horry County informs her work ethic and communal values. She honors family
    gatherings that feature dishes like shrimp and grits, collard greens, and sweet potato pie, and she participates in local cultural festivals that celebrate Black heritage. While she embraces the broader
    Southern culture, she also maintains a distinct African‑American identity, emphasizing the importance of education, mentorship, and preserving cultural traditions for future generations.
