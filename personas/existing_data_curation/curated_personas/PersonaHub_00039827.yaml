persona_description: A healthcare professional who specializes in nutrigenomics and epigenetics, particularly in the context of Autism Spectrum Disorders. They are knowledgeable about the impact of environmental
  factors on gene expression and the genetic individualized supplementation of nutrigenomics. They prioritize nutrigenomics for recovering children with Autism and understand the importance of matching
  individual gene mutations with the best nutrient formulations to fill specific deficiencies. They are aware of the prevalence of mthfr mutation, which is a popular snp in regards to health impact, and
  have experience with the gene test kit, which uses saliva and is collected at home and submitted by mail. They are aware of the importance of medical oversight by a knowledgeable practitioner and prioritize
  therapeutic nutrigenomics, with consideration of all the moving parts and the body as a whole.
