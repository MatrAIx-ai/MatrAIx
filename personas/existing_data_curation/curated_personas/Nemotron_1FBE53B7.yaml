personas:
  professional: An experienced project manager, Wildo Glover merges Agile and Waterfall expertise with a humanities‑driven storytelling approach, steering cross‑cultural initiatives for Indigenous arts
    through meticulous risk assessment, stakeholder engagement, and digital tools like Asana, while they thrive on solitary reflection and occasionally let disorganization creep into deadline tracking.
  sports: An avid solo hiker, Wildo Glover spends winter cross‑country skiing at Bridger Bowl, follows the Billings Mustangs minor‑league baseball team, supports the Denver Broncos for NFL excitement, and
    belongs to the Yellowstone Trails Hiking Club, preferring low‑impact endurance over crowded gyms, and they relish the quiet solitude of the trails.
  arts: Passionate about visual and auditory expression, Wildo Glover paints Montana vistas inspired by Ansel Adams, sketches in the style of Georgia O'Keeffe, captures wildlife photography echoing Sebastião Salgado,
    plays Native American flute tunes from R. Carlos Nakai, and regularly attends MoMA exhibitions featuring Ai Weiwei to fuel their poetry, while they often stay after hours to contemplate each piece alone.
  travel: Preferring reflective solitary journeys, Wildo Glover has trekked Yellowstone and Banff, dreamed of the Lofoten Islands' midnight sun, plans a future pilgrimage to Machu Picchu, and balances itinerary
    planning on Google Trips with spontaneous detours to local hot springs, as they savor the freedom of wander without the constraints of group travel.
  culinary: Energetic in the kitchen, Wildo Glover enjoys crafting bison stew with juniper berries, mastering wild mushroom risotto with hazelnut oil, and experimenting with huckleberry jam on rye bread,
    while they let their moderate cooking skill shine in seasonal foraging trips and improvisational campfire meals.
  core: Wildo Glover is a solitary, creatively driven project strategist who blends meticulous planning with occasional disorganization, finds balance through art, nature, and meditation, and they unapologetically
    pursue personal passions regardless of conventional expectations.
background:
  cultural: Wildo is a member of a Northern Cheyenne community with deep roots in the Montana region. Raised on the reservation before moving to Billings for university, he carries forward traditions of
    oral storytelling, reverence for the land, and communal stewardship. His American Indian heritage informs his worldview, emphasizing relational approaches, respect for cultural memory, and a commitment
    to preserving Indigenous arts. He regularly participates in tribal gatherings, supports local powwows, and incorporates Indigenous perspectives into his professional work, advocating for culturally
    responsive project practices.
attributes:
  skills: '[''Agile Project Management'', ''Waterfall Project Management'', ''Stakeholder Engagement'', ''Risk Assessment and Mitigation'', ''Budget Management'', ''Cross-cultural Communication'', ''Creative
    Problem Solving'', ''Strategic Planning'', ''Process Improvement'', ''Mediation and Conflict Resolution'', ''Digital Collaboration Tools (Asana, Trello, MS Project)'', ''Presentation and Reporting'',
    ''Adaptive Workflow Design'', ''Cultural Research'', ''Art History Knowledge'']'
  hobbies: '[''Painting'', ''Sketching'', ''Wildlife Photography'', ''Hiking'', ''Birdwatching'', ''Reading Philosophy'', ''Reading Contemporary Art Theory'', ''Poetry Writing'', ''Playing Native American
    Flute'', ''Beadwork'', ''Traditional Cooking'', ''Attending Art Exhibitions'', ''Meditation'']'
  career_goals: Wildo aims to become a recognized leader in project management for cultural and Indigenous initiatives. Over the next five years he plans to earn PMP and Agile Scrum Master certifications,
    lead multidisciplinary teams on large‑scale projects that preserve and promote Native American arts in the Yellowstone region, and eventually launch his own consultancy that partners tribal communities
    with museums, NGOs, and government agencies. He also seeks to mentor emerging project managers from underrepresented backgrounds and influence policy around sustainable cultural tourism.
