  hobbies: '[''Golf'', ''Hiking'', ''Community Theater'', ''Volunteering at Local Food Banks'', ''Business Memoir Book Club'', ''Gardening'', ''Bridge (Card Game)'', ''Music Festivals'', ''Cooking'', ''Wine
    Tasting'', ''Yoga'']'
  career_goals: Even in retirement, William aims to stay actively involved in his community by serving on the board of a local nonprofit, mentoring emerging entrepreneurs, and establishing a scholarship
    for business students in Denver. He also hopes to maintain his health, manage his anxiety through regular wellness practices, and create a lasting legacy of compassion and cooperation for his family
    and friends.
