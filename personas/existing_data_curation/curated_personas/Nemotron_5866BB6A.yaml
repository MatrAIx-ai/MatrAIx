  hobbies: '[''Visiting art museums and galleries'', ''Reading contemporary and classic literature'', ''Writing memoirs and poetry'', ''Attending jazz concerts'', ''Gardening'', ''Knitting'', ''Cooking
    traditional soul food recipes'', ''Volunteer storytelling sessions at a local senior center'']'
  career_goals: Although retired from formal employment, Viola aims to launch a community oral‑history project that records the stories of older African‑American residents in New York City, and to curate
    a travelling exhibition showcasing those narratives alongside local artworks. She also aspires to publish a memoir reflecting on her lifelong engagement with the arts, serve as a volunteer coordinator
    for museum education programs, and mentor emerging artists from underrepresented backgrounds.
