personas:
  professional: Viola Prater, a retired art historian and literary theorist, combines meticulous archival research with a flexible, small‑group facilitation style to lead a community oral‑history project
    that records elder narratives, curates a traveling exhibition of those stories alongside local artwork, and mentors emerging artists in intimate workshops, reflecting their curiosity, reliability, and
    deep compassion.
  sports: Viola Prater, a steadfast fan of the New York Yankees and New York Knicks, keeps fit by walking with the Harlem Seniors’ Walking Club along the Hudson River Greenway three times weekly, attends
    low‑impact yoga sessions at the community center to ease their knee osteoarthritis, and enjoys occasional pick‑up badminton at the senior center during the spring, reflecting their preference for modest,
    social activity over competitive sports.
  arts: Viola Prater, an avid patron of the local arts scene, regularly attends jazz concerts at the Blue Note featuring Wynton Marsalis, delights in listening to B.B. King and Billie Holiday recordings,
    explores poetry by Langston Hughes, Toni Morrison, and Claudia Rankine, curates modest gallery visits to view Jacob Lawrence’s paintings, and leads intimate storytelling circles where their own memoir
    verses find a receptive audience, reflecting their love of quiet creative expression and compassionate sharing.
  travel: Viola Prater, who prefers thoughtfully paced journeys with a close companion, has explored New Orleans’s French Quarter for its jazz heritage, wandered the historic streets of Charleston, spent
    a leisurely week in the Hudson Valley’s vineyards, visited Paris’s Musée d’Orsay to study Impressionist art, and dreams of a heritage pilgrimage to Ghana’s Cape Coast, all while budgeting through a
    high‑yield savings account and booking senior‑discounted accommodations well in advance, reflecting their careful, curiosity‑driven approach to travel.
  culinary: Viola Prater, an accomplished home cook, specializes in soul‑food classics such as collard greens simmered with smoked turkey, shrimp and grits seasoned with thyme and smoked paprika, and sweet
    potato pie glazed with nutmeg, delights in sourcing fresh vegetables at the local farmers market, and occasionally treats themselves to dinner at the historic Red Rooster restaurant for its burnt‑end
    ribs and cornbread, though they sometimes indulge in extra‑rich pecan pie after a knitting session.
  core: Viola Prater, a 68‑year‑old retired art historian, blends quiet curiosity and deep compassion into a life devoted to preserving community memory, mentoring emerging creators, and savoring soulful
    artistry, even as they navigate occasional knee pain and a penchant for late‑night jazz vinyl hunting.
background:
  cultural: Viola is an African‑American woman whose family participated in the Great Migration, settling in Harlem where she grew up amidst a vibrant cultural renaissance. Her upbringing immersed her in
    the legacy of African‑American literature, jazz, and community activism, shaping her deep appreciation for Black artistic expression and her commitment to intergenerational solidarity. These cultural
    roots inform her artistic interests, community service, and the narratives she seeks to preserve and share.
attributes:
  skills: '[''Art history'', ''Literary analysis'', ''Creative writing'', ''Community outreach'', ''Intergenerational mentorship'', ''Program coordination'', ''Research and archival documentation'', ''Facilitation
