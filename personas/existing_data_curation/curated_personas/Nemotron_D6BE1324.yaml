  career_goals: Brian dreams of a future career that blends clear structure, service to the community, and problem‑solving. He imagines becoming a civil engineer or a firefighter—roles that rely on strict
    procedures, teamwork, and helping others. He also hopes to learn computer programming to design simple games, seeing it as a way to combine his love of order with creative building.
