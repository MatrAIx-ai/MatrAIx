personas:
  professional: Brian Harwell, a meticulous LEGO architect in the making, channels their methodical mindset into constructing complex sets and drafting digital structures in Minecraft, laying the groundwork
    for a future in design or engineering.
  sports: Brian Harwell, a spirited midfielder for the Rock Hill Youth Soccer Club, devotes weekends to drills, cheers for the Carolina Panthers on game nights, and idolizes Lionel Messi’s ball control,
    while they also join occasional pickup basketball at the community center.
  arts: Brian Harwell, a budding storyteller, immerses themselves in adventure novels by Rick Riordan and J.K. Rowling, builds LEGO worlds to the soundtrack of Hans Zimmer’s film scores, and collects Minecraft
    fan art from creators like Grian, shaping a vivid creative outlet.
  travel: Brian Harwell, an eager explorer, has visited Charleston’s historic waterfront, collected shells at Myrtle Beach, yearned to trek the Blue Ridge Mountains, and dreams of a family road trip to
    Washington, D.C., while they balance school schedules with weekend getaways.
  culinary: Brian Harwell, a budding chef, loves whipping up cheesy macaroni, grilling corn on the cob at backyard barbecues, and experimenting with shrimp tacos seasoned with lime and cilantro, while they
    occasionally sneak extra chocolate chip cookies despite a parental rule limiting sweets.
  core: Brian Harwell, a methodical 10‑year‑old with a penchant for LEGO precision, a habit of over‑worrying about school tests, and a secret stash of cookie crumbs behind the couch, charts their day with
    organized curiosity and occasional impulsive cravings.
background:
  cultural: Brian was raised in a middle‑class white family in Rock Hill, South Carolina. His upbringing reflects Southern values of community, family, and modest religious participation, with occasional
    involvement in church youth groups and local school events. He is familiar with regional traditions such as high‑school football games, backyard barbecues, and community service projects like 4‑H and
    Boy Scouts, which emphasize responsibility and teamwork. The public‑school environment’s emphasis on routine and structure aligns with his preference for predictability and order.
