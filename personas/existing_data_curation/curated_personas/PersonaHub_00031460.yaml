persona_description: A planetary scientist who specializes in the study of the formation and evolution of planets and their moons, particularly in the context of the New Horizons mission to explore the
  Kuiper Belt. She is particularly interested in the streaming instability theory of planetary formation, which proposes that boulder-size "pebbles" clump together like a pack of racing cyclists due to
  the churn of the early solar system's primordial disk, leading to pairs of orbiting objects that line up like MU69. Her expertise extends to the study of planetesimals, their characteristics, and their
  role in the formation of planets.
