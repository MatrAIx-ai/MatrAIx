persona_description: A science teacher who is passionate about engaging students in real science experiences and promoting their self-assessment skills through journaling. The teacher is experienced in
  using a variety of journals, including large project books, A3 paper, and interactive whiteboards, to model and facilitate journal entries. The teacher emphasizes the importance of pictorial representations
  and encourages students to provide evidence that supports their ideas, reasons, and reflections. The teacher is also skilled in using the science journal to assess student learning in both science and
  literacy, and demonstrates how the information in the journal will help students develop literacy products such as posters, brochures, letters, and oral or written presentations.
