personas:
  professional: Frances Hebbar, a budding robotics enthusiast who combines her love for structured teamwork with a practical mindset, leads after‑school robotics club projects by meticulously planning build
    schedules, delegating tasks, and ensuring the group stays on track while welcoming creative tweaks.
  sports: Frances Hebbar, a lively middle school soccer player who practices twice weekly under Coach Ramirez, supports the city’s professional team the Thunderbirds, and joins the local youth soccer club
    City Strikers during the summer season.
  arts: Frances Hebbar, an avid reader of the Harry Potter and Percy Jackson fantasy series who discusses plot twists with friends, sketches animals in a spiral‑bound sketchbook, draws inspiration from
    Studio Ghibli films such as My Neighbor Totoro, and enjoys pop songs by Taylor Swift.
  travel: Frances Hebbar, an organized weekend explorer who has visited the coastal town of Santa Cruz, dreams of a summer trip to the historic castle in Edinburgh, and plans each outing in her planner
    with a detailed packing list and a pre‑approved budget.
  culinary: Frances Hebbar, a budding baker who loves whipping up chocolate chip cookies and banana bread with oat flour and dark chocolate chunks, often adds a pinch of sea salt for extra flavor, and occasionally
    sneaks extra sprinkles onto cupcakes despite the family’s health‑conscious rule.
  core: Frances Hebbar is a structured, sociable eleven‑year‑old who balances a love for collaborative projects, meticulous planning, and occasional worry, turning group activities into thriving experiences
    while navigating teenage quirks.
background:
  cultural: Frances comes from a white Midwestern family rooted in Chicago’s diverse neighborhoods. Her household blends traditions from European ancestry—such as celebrating holidays like St. Patrick’s
    Day and Thanksgiving with a focus on community meals and seasonal crafts. Growing up in Chicago, she is exposed to the city’s vibrant cultural festivals, visits to the Chicago Public Library, and occasional
    trips to the Museum of Science and Industry. These experiences foster a sense of civic pride and an appreciation for the multicultural environment of the city while reinforcing Midwestern values of
    reliability, friendliness, and community involvement.
