    a personal planner/journal'']'
  career_goals: Though still in elementary school, Frances dreams of a future where she can combine her love for structure, helping others, and working with living beings. She envisions herself as a pediatric
    nurse or a teacher in a well‑organized classroom, where she can use her practical problem‑solving and caring nature daily. She is also fascinated by wildlife and occasionally imagines becoming a veterinarian,
    as she enjoys caring for pets and learning about animal health. These ambitions reflect her desire for a stable, service‑oriented career that allows her to create order and support wellbeing.
