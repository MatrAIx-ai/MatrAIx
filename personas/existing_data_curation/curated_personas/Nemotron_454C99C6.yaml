personas:
  professional: Carolyn Zitello volunteers at the Xenia County Library, where they mentor younger volunteers in genealogical research and share their deep knowledge of American art history, applying their
    meticulous organization, quiet curiosity, and preference for solitary, purposeful work.
  sports: Carolyn Zitello enjoys gentle morning walks among their garden rows, follows the Cincinnati Reds and Ohio State Buckeyes on television, and they occasionally join a senior walking club for light
    exercise, reflecting a preference for low‑impact, community‑connected activity.
  arts: Carolyn Zitello delights in listening to Beethoven symphonies and Duke Ellington’s early jazz on their vintage record player, annotates art books on American Regionalism, and weaves Grant Wood’s
    brushstrokes into knitting patterns, embodying a quiet appreciation of classic art and music.
  travel: Carolyn Zitello fondly recalls a 1970s cross‑country train journey to the Library of Congress in Washington, DC, now prefers day trips to nearby historic sites like the Greene County Courthouse,
    yet they still dream of a gentle river cruise along the Danube to connect with distant ancestral roots.
  culinary: Carolyn Zitello cultivates tomatoes, beans, and basil in a modest backyard plot, uses them to craft a beloved tomato‑basil soup and homemade cornbread, and they relish the autumn ritual of canning
    preserves, though they sometimes over‑salt the pickles in their zeal to perfect the flavor.
  core: Carolyn Zitello is a quietly diligent centenarian who weaves history, horticulture, and harmony into daily life, balancing meticulous organization with a lingering worry that fuels their gentle,
    solitary pursuits.
background:
  cultural: Carolyn grew up in post‑war Xenia, Ohio, within a predominantly white, Midwestern community where Protestant values and small‑town customs shaped everyday life. Her family’s roots trace back
    to German and Irish immigrants who settled in the region, bringing traditions of thrift, hard work, and community celebration. The county fair, church potlucks, and local library events were central
    to her upbringing, fostering a sense of belonging and civic responsibility. The cultural emphasis on modesty, self‑reliance, and respect for elders influenced her worldview, encouraging a quiet dedication
    to learning, kindness, and the preservation of local heritage.
attributes:
  skills: '["Genealogical research", "Quilting and crocheting", "Household budgeting and record‑keeping", "Storytelling and oral history", "Art appreciation and knowledge of American art", "Home gardening
