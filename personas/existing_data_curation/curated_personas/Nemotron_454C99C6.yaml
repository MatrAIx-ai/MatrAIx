  hobbies: '["Reading classic literature and art books", "Knitting and quilting", "Home gardening (vegetables and herbs)", "Listening to classical music and early jazz", "Creating a family scrapbook", "Crossword
    and jigsaw puzzles"]'
  career_goals: At 99, Carolyn’s ambitions are centered on legacy and the well‑being of her close family and community. She hopes to complete a memoir that weaves together her personal memories, family
    stories, and the history of Xenia, preserving them for future generations. She aspires to donate her curated genealogy files and handwritten recipes to the local historical society, ensuring the cultural
    fabric of her town is documented. Though no longer in the workforce, she volunteers to mentor younger volunteers at the county library, offering guidance on research methods and encouraging curiosity
    about art and history. Her ultimate goal is to leave a quiet but lasting imprint of kindness, knowledge, and resilience in the lives of those she touches.
