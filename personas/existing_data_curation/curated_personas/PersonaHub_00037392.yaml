persona_description: A scientist who is passionate about promoting science education and is committed to increasing the number of minority students pursuing biomedical careers. They believe that exposure
  to the challenges of medical science and the inquiry-based scientific method can improve students' science literacy and increase the number who will pursue biomedical careers. The persona is interested
  in developing and evaluating biomedical and/or behavioral science education models that are based on health-related research and is committed to broad dissemination of established, successful, and innovative
  biomedical and/or behavioral science education models. They are also interested in expanding and increasing distribution of their HEADS-UP health science curriculum to include sections on the immune system
  and advanced genetics.
