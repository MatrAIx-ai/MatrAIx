personas:
  professional: Stephanie Evans, an aspiring youth sports coordinator, leverages her practical love of structure and her sociable, harmony‑seeking nature to organize the school soccer and cheer squad schedules,
    painstakingly double‑checking every detail to ease her own worry while they keep their teammates motivated.
  sports: Stephanie Evans, a dedicated member of her middle‑school soccer and cheer squads, trains five days a week with the local youth soccer club, follows a structured fitness routine inspired by the
    U.S. Women’s National Soccer Team and the Cleveland Browns, and they proudly wear the school’s colors while cheering on the varsity basketball team.
  arts: Stephanie Evans, an enthusiastic member of the community youth choir, spends her free time devouring Agatha Christie mysteries and crafting short stories that they share at lunchtime, while their
    playlist cycles through Taylor Swift, BTS, and the Broadway soundtrack of Hamilton, shaping a vibrant artistic identity.
  travel: Stephanie Evans enjoys family road trips to the nearby state park for weekend gardening picnics, has visited the Grand Canyon on a school field trip, and dreams of a future vacation to Disney
    World and the Eiffel Tower, favoring a balanced itinerary that blends carefully planned activities with spontaneous friends‑only stops at local ice‑cream shops.
  culinary: Stephanie Evans, a budding baker, often whips up chocolate chip cookies and lemon‑blueberry muffins using fresh herbs from the backyard garden, skillfully mixes sugar and butter with a dash
    of impatience when waiting for frosting to set, and they love pairing their treats with a glass of chilled milk.
  core: Stephanie Evans balances a love for structured teamwork with a habit of over‑thinking, turning everyday school life into a blend of precise choreography and spontaneous storytelling.
background:
  cultural: Stephanie comes from a long‑standing white, Southern family rooted in the Catahoula Parish region of rural Louisiana. Her family’s heritage includes generations of farming and small‑town community
    life, with deep ties to local churches, school events, and regional festivals such as the Jonesville Fall Festival. The cultural fabric emphasizes hospitality, self‑reliance, and close‑knit neighborhood
    relationships, all of which shape Stephanie’s cooperative, community‑oriented outlook.
attributes:
  skills: '["Organizational planning", "Basic computer proficiency (Word, Excel, PowerPoint)", "Team coordination", "Junior gardening and animal care", "Community event assistance", "Peer tutoring in reading/math"]'
  hobbies: '["Soccer", "Cheerleading", "Youth choir", "Backyard gardening", "Baking", "Crafting friendship bracelets", "Reading mystery novels", "Creative writing"]'
  career_goals: Stephanie hopes to pursue a career that blends her love of helping others with her practical, organized nature. She dreams of becoming a teacher or school counselor, where she can create
    structured, supportive environments for younger students. In the longer term she also envisions working in community health or nursing, allowing her to use her caring disposition and attention to detail
    to improve the well‑being of families in Jonesville.
