persona_description: A scientist who studies the connection between finger length and Covid severity, particularly in men. She is interested in the hormonal factors that may affect the risk of severe Covid-19
  in men and how these factors can be identified through digit ratio measurements. She is a researcher at Swansea University and has previously studied the relationship between testosterone levels and the
  development of the ring finger. Her work has been published in peer-reviewed journals and has been cited by other researchers.
