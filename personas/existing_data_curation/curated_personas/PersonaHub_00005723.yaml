persona_description: A historian of English architecture, particularly interested in the work of John Wood, Jr. and his son, John Wood, Sr., who were influential architects in the city of Bath, England.
  Their work is known for its grand scale, formal design, and charm, setting a standard for future architects and inspiring modern city planners. The persona is interested in the details of their work,
  including the civic layouts, the execution of schemes, and the charm and imagination that they brought to their designs. They appreciate the historical and cultural context of their work and are knowledgeable
  about the broader context of English architecture and urban planning.
