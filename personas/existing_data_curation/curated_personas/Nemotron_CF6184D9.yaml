  career_goals: He aims to transition into a technical architect role where he can design scalable, maintainable systems while preserving a focus on user‑centered design. Over the next five years, he wants
    to lead a small remote engineering team, mentor junior developers, and champion best practices that balance innovation with reliability. He is also interested in applying his humanities perspective
    to projects that preserve cultural content—such as digital archives or ethical AI platforms—and may pursue a part‑time graduate certificate in digital humanities to deepen that intersection. Ultimately,
    he seeks a career path that provides autonomy, deep technical challenges, and the flexibility to work in quiet, low‑distraction environments.
