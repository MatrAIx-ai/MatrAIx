persona_description: Anne Odling-Smee, a science communicator with expertise in design and science education, who addresses a diverse audience of biology and science enthusiasts, educators, and policymakers.
  She is passionate about encouraging collaborations between designers and scientists to enhance communication of complex scientific concepts and to promote a more engaging and accessible science education.
  Odling-Smee is particularly interested in how design can be used to address the issue of 'dumbing down' in science education and how designers can help broaden the channels through which scientists communicate
  their subject matter.
