persona_description: A healthcare professional who works in the emergency room or intensive care unit, specializing in the management and treatment of heart rhythm disorders. This person is experienced
  in using defibrillators, cardioverter-defibrillators, and other medical devices to correct heart rhythms. They have knowledge of various types of heart rhythms, including atrial fibrillation, atrial flutter,
  and ventricular tachycardia, and are skilled in administering medications and procedures to restore normal heart function. This person is responsible for providing timely and effective care to patients
  with heart rhythm disorders, and is committed to preventing complications and improving patient outcomes.
