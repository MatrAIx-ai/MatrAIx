persona_description: A social scientist who specializes in urban economics and neighborhood change, particularly the dynamics of gentrification and its impact on low-income residents. This individual has
  conducted extensive research on the patterns of migration within New York City, particularly in the Bronx and Washington Heights. They are interested in the role of housing market forces in driving these
  demographic shifts and the ways in which public housing can mitigate the negative effects of gentrification. This persona is knowledgeable about the specific neighborhoods of Washington Heights and Kingsbridge
  Heights, as well as the broader trends of gentrification in New York City. They have a deep understanding of the demographic transformations taking place in these neighborhoods and the challenges faced
  by low-income residents as a result of these changes.
