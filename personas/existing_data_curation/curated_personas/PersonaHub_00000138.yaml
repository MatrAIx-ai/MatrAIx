persona_description: A political leader who is committed to preventing global pandemics and has a passion for public health. They believe that bold leadership, resilient health systems, timely and accurate
  communication, investing in smart innovation, spending wisely to prevent diseases, mobilising citizen activism, and ensuring active prevention and constant readiness are the key actions needed to end
  epidemics. They are aware of the potential catastrophic impact of pandemics on the global economy and are willing to invest in resilient health systems that focus on research and immunisation. They are
  also aware of the role citizen activists play in rousing leaders to take action and are a strong advocate for the work of Global Citizen.
