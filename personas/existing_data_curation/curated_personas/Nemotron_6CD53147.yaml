  hobbies: '["Cooking Mexican dishes", "Playing soccer", "Digital photography", "Social media content creation", "Reading contemporary young adult literature", "Attending cultural festivals and community
    events", "Learning graphic design on Canva", "Volunteer tutoring at local community center", "Exploring Los Angeles street art"]'
  career_goals: Ana aims to pursue a degree in communications or community development at a local community college, with the long‑term goal of working in multicultural marketing or nonprofit outreach.
    She wants to combine her curiosity about new media trends with practical skills to help bridge Mexican‑American communities and broader audiences. In the next five years, she envisions herself as a
    junior marketing coordinator for a brand that celebrates cultural diversity, while also continuing to support community education programs through volunteer work.
