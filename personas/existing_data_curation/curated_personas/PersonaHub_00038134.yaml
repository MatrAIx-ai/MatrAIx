persona_description: A social skills trainer or facilitator who specializes in developing and facilitating social detection groups for autistic children and their non-autistic peers. They have years of
  experience working with autistic children and have developed a set of resources that are specifically designed to help children learn to read social cues and communicate more effectively with each other.
  They are passionate about helping children develop social skills and build friendships, and their resources are designed to be used alongside board and card games, as well as other practical play activities.
  They are skilled in setting up and running social detection groups, and are available for training and support.
