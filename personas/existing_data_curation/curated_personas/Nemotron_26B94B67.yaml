personas:
  professional: Angel Garciarodriguez is a bilingual sales associate with a knack for visual storytelling, using their door‑to‑door experience and basic graphic‑design skills to craft eye‑catching flyers
    and social‑media posts that drive foot traffic for a local pop‑up stall, while simultaneously juggling college marketing coursework and dreaming of a future community‑outreach role.
  sports: Angel Garciarodriguez enjoys early‑morning runs with the Durham City Runners, plays casual pickleball in the summer, follows the Durham Bulls baseball team and the North Carolina Tar Heels basketball
    squad religiously, and treats fitness as a flexible ritual that balances yoga sessions with occasional weekend hikes in the Blue Ridge.
  arts: Angel Garciarodriguez immerses themselves in Durham’s street‑art scene, draws inspiration from Frida Kahlo’s color palette and Banksy’s subversive stencils, curates indie playlists featuring Vampire Weekend
    and Café Tacvba, and regularly attends live shows at Motorco, where they absorb performance energy to inform their own watercolor sketches of urban landscapes.
  travel: Angel Garciarodriguez prefers low‑cost, culturally immersive trips—such as weekend explorations of Asheville’s craft breweries, a solo backpacking stint through Mexico City’s historic markets,
    and a group road‑trip to Barcelona’s art museums—planning most journeys on a spreadsheet but leaving room for spontaneous street‑food detours, all while balancing a limited student budget.
  culinary: Angel Garciarodriguez cooks at an intermediate level, reinventing tacos al pastor with North Carolina sweet potatoes and locally sourced chipotle, mastering chiles en nogada using fresh walnuts
    and a splash of regional pecan oil, and hosts intimate tasting evenings where guests savor mezcal‑infused guacamole alongside experimental mole sauces.
  core: Angel Garciarodriguez blends bilingual street‑sales savvy with a watercolor‑filled love for urban art, turning every market booth into a mini‑gallery while juggling student loans, yoga mats, and
    an ever‑growing playlist of indie‑Latin beats.
background:
  cultural: Angel is a first‑generation Mexican‑American who grew up in a bilingual household that celebrated traditions such as Día de los Muertos, Mexican holidays, and family gatherings centered around
    home‑cooked meals. Her upbringing instilled a deep respect for community, storytelling, and the vibrant colors of Mexican culture, which she weaves into her personal and professional life. Living in
    Durham, she actively participates in local Mexican cultural festivals, collaborates with fellow Latino entrepreneurs, and incorporates elements of her heritage into her street‑vendor offerings and artistic
    pursuits. This blend of Mexican roots and American experiences shapes her identity, communication style, and entrepreneurial vision.
attributes:
  skills: '["Bilingual communication (Spanish/English)", "Persuasive selling and negotiation", "Active listening and rapport building", "Cash handling and point‑of‑sale systems", "Inventory management",
    "Time management and scheduling", "Basic graphic‑design and visual storytelling", "Social‑media content creation", "Small‑business operations knowledge", "Problem‑solving under dynamic conditions"]'
  hobbies: '["Visiting local art galleries and street‑art tours", "Sketching and watercolor painting", "Cooking and experimenting with Mexican fusion recipes", "Attending indie and Latin‑fusion concerts",
    "Practicing yoga", "Volunteering to teach Spanish and organize cultural events"]'
  career_goals: Angel aims to leverage her on‑the‑ground sales experience into a formal role in marketing or community outreach within the next three years. She plans to complete a bachelor's degree in
    Business Administration while continuing part‑time work, with the long‑term ambition of launching a culturally‑infused pop‑up market that showcases contemporary Mexican cuisine and art. In the meantime,
    she seeks a sales‑associate position at a locally owned retailer that values bilingual staff and community engagement, allowing her to develop mentorship skills and eventually move into a supervisory
    or store‑manager role. Angel also hopes to become an advocate for small‑business owners in Durham, offering workshops that blend entrepreneurial tactics with cultural storytelling.
