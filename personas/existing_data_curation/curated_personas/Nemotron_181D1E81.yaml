  career_goals: Michael aims to become a crew supervisor within his current firm and eventually launch his own small landscaping business focused on eco‑friendly, low‑impact designs. He plans to earn additional
    certifications in native plant restoration and organic pest management, positioning himself as a regional expert in sustainable groundskeeping. Long‑term, he hopes to mentor younger workers, expand
    service offerings to municipal park maintenance, and secure a stable financial foundation for his family while maintaining a strong presence in the Donora community.
