    ''Adaptability to new technologies'']'
  hobbies: '[''Crocheting'', ''Knitting'', ''Pattern design'', ''Reading mystery novels'', ''Reading historical fiction'', ''Crossword puzzles'', ''Sudoku'', ''Vegetable gardening'', ''Hiking'', ''Bird-watching'',
    ''Woodworking'', ''Volunteer book sorting at the library'']'
  career_goals: Rose aims to advance into a supervisory role within the cutting department over the next three to five years, positioning herself as a shift lead who can coordinate workflow and mentor new
    employees. She plans to complete her associate degree in industrial technology, focusing on CNC programming and production management, to strengthen her technical foundation. Long‑term, she hopes to
    combine her cutting expertise with her love for fabrics by launching a small custom tailoring and fabric‑cutting boutique that serves local designers and hobbyists. Financially, she intends to purchase
    a modest home in Prosperity, ensuring stability for the future. Throughout her career progression, Rose remains committed to continuous learning, practical problem solving, and contributing to the efficiency
    and safety of her workplace.
