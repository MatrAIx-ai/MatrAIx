  hobbies: '[''Arduino home automation'', ''Woodworking'', ''Hiking and nature photography'', ''Mindfulness meditation'', ''Journaling'', ''Chess puzzles'', ''Model train building'']'
  career_goals: James aims to transition into a senior technologist role where he can lead multidisciplinary R&D projects focused on sustainable energy solutions, such as wind turbine control systems or
    renewable power integration. He seeks to obtain his Professional Engineer (PE) license and eventually establish a boutique consulting practice that helps small manufacturers adopt advanced automation
    while maintaining rigorous safety standards. Additionally, he wishes to contribute to knowledge sharing through occasional teaching adjunct positions at local community colleges and publishing technical
    articles.
