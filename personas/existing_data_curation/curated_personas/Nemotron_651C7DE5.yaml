  career_goals: Sherman dreams of becoming someone who designs and builds useful tools for his community. He imagines a future as a robotics or mechanical engineer who creates gadgets that help farmers
    and nature enthusiasts in Marathon County. He also fantasizes about being a top player on a baseball team, hoping to combine his competitive spirit with teamwork. In the short term, he is eager to win
    his school's science fair and earn a spot in a regional robotics competition, seeing these milestones as stepping stones toward his larger ambition of inventing practical solutions for everyday problems.
