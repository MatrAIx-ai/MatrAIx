personas:
  professional: Sherman Bradfield, an aspiring young engineer, builds intricate LEGO vehicles and experiments with Scratch, blending curiosity with practicality as they prototype mechanical solutions, while
    their relaxed approach to deadlines lets ideas flow freely, albeit sometimes at the expense of tidy organization.
  sports: Sherman Bradfield plays on the local youth baseball team, practices soccer with the Maple Ridge Juniors, and cycles rugged countryside trails on weekends, cheering for the Chicago Cubs while idolizing
    baseball star Shohei Ohtani for his competitive drive, yet often prefers solo biking adventures over team drills.
  arts: Sherman Bradfield spends free afternoons sketching woodland animals, enjoys the vibrant colors of Van Gogh’s "Starry Night", watches animated adventures like Pixar’s "Toy Story", and blasts Imagine
    Dragons songs while building LEGO creations, letting music and visual art fuel their imagination and competitive spirit.
  travel: Sherman Bradfield loves spontaneous weekend camping trips to the nearby state park, dreams of hiking the Grand Canyon and visiting Japan’s cherry blossom festivals, prefers planning trips with
    a rough map drawn on notebook paper rather than detailed itineraries, and balances family budget constraints with a desire for adventurous exploration.
  culinary: Sherman Bradfield favors cheesy macaroni, homemade pizza with pepperoni and olives, snack‑sized fruit kebabs of grapes and strawberries, and enjoys experimenting with simple no‑bake cookie recipes,
    though they often forget to clean the kitchen after cooking, leaving LEGO pieces scattered among the dishes.
  core: Sherman Bradfield is a curiosity‑driven LEGO architect and budding coder whose competitive edge fuels a habit of hoarding spare change, while their relaxed, sometimes disorganized nature leads to
    scattered LEGO bricks and occasional missed medication refills.
background:
  cultural: Sherman grew up in Wittenberg, a small, predominantly white, rural community in central Wisconsin with deep German‑American roots. Family gatherings often center around traditional Midwestern
    values of self‑reliance, practicality, and community involvement. He attends a local Lutheran church, participates in county fairs, and enjoys seasonal activities such as ice skating in winter and fishing
    in summer. His upbringing blends the modest, hardworking ethos of the farming region with exposure to contemporary American pop culture through school, the internet, and video games.
