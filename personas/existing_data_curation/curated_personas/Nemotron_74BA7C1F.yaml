  career_goals: Edgardo dreams of becoming a creator who can blend art and technology. He aspires to be a video game designer or interactive storyteller, envisioning a future where he builds immersive worlds.
    He also expresses interest in becoming an architect or a robotics engineer, fascinated by how abstract ideas become tangible structures. Ultimately, his ambition is to use his imagination and methodical
    skills to invent innovative designs that inspire others and achieve top recognition in creative competitions.
