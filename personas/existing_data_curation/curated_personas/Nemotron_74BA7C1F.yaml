personas:
  professional: A budding junior coder and LEGO architect, Edgardo Roses builds intricate brick creations and programs simple Scratch games, channeling their vivid imagination and methodical planning into
    projects that often become friendly competitions with peers.
  sports: An enthusiastic soccer enthusiast, Edgardo Roses plays for the Oakridge Youth Soccer Club, frequently practices drills after school, follows the Portland Timbers for inspiration, and they treat
    each match as a strategic contest, balancing competitive drive with organized training.
  arts: A creative visual storyteller, Edgardo Roses sketches fantastical creatures in sketchbooks, produces digital art on a tablet, devours graphic novels like "Bone" by Jeff Smith, enjoys listening to
    traditional Mexican harp ensemble Los Folkloristas alongside modern pop group Imagine Dragons, and they help design costumes for community Día de los Muertos celebrations.
  travel: An adventurous day‑tripper, Edgardo Roses explores local nature trails at Elmwood Regional Park, recalls a family road trip to the Grand Canyon, dreams of visiting the ancient ruins of Chichen
    Itzá, and they plan a future solo‑readiness trip to Tokyo’s Akihabara to soak in manga and video‑game culture, all while using colorful maps to plot each journey.
  culinary: A budding kitchen helper, Edgardo Roses loves assisting with tamales de elote, mixing salsa verde, and shaping quesadillas, enjoys the taste of fresh cilantro and corn masa, and they can whip
    up perfect chocolate‑chip cookies from a child‑friendly recipe book, yet occasionally forget to clean up after cooking.
  core: Edgardo Roses is a methodical dream‑er who builds LEGO kingdoms, codes quirky Scratch games, and they skeptically save allowance while never missing a chance to draw a dragon or dance to a mariachi
    tune.
background:
  cultural: Edgardo grows up in a Mexican-American household in Tulsa, where Spanish is spoken at home and English at school. His family maintains Mexican traditions, celebrating holidays such as Día de
    los Muertos and Mexican Independence Day with altar-building, traditional foods, and music. He participates in local Mexican community events at the Oklahoma Mexican American Chamber and attends language
    classes that reinforce his bilingualism. His cultural heritage influences his love for vibrant colors in art, rhythmic patterns in music, and storytelling that blends Mexican folklore with his own imagination.
    The blend of Mexican customs and the Midwestern environment shapes his identity, fostering a respect for both cultures.
