  hobbies: '[''Gardening and mushroom cultivation'', ''Birdwatching'', ''Historical trail walking'', ''Bridge club'', ''Volunteer teaching at senior center'', ''Craft workshops'', ''Intergenerational storytelling'',
    ''Reading scientific biographies and history'', ''Participating in local community theater'']'
  career_goals: Although officially retired, Raed aims to leave a lasting legacy by establishing a scholarship fund for under‑privileged STEM students at a nearby university and authoring a guidebook on
    sustainable home gardening that blends scientific insight with practical advice. He aspires to expand his volunteer work with local health organizations, creating support programs for seniors dealing
    with anxiety and depression. His ambition also includes leading a community‑wide initiative to preserve historic farmland in Kennett Square, merging his curiosity about environmental science with his
    pragmatic planning skills.
