personas:
  professional: Maria Madariaga, a budding ten‑year‑old digital storyteller, channels their curiosity into Scratch programming, creating interactive animated tales while sketching storyboards to accompany
    their code, revealing a blend of artistic flair and tech‑savvy spontaneity.
  sports: Maria Madariaga cheerfully joins the community’s Junior Swim Club at the local aquatic center, sprouts a fondness for the regional professional baseball team, the Coastal Mariners, and enjoys
    spontaneous games of tag in the park, balancing their love for water splashes with occasional kicks of a soccer ball.
  arts: Maria Madariaga immerses themselves in vibrant coloring books, models fantastical worlds with LEGO, and reveres the whimsical illustrations of Dr. Seuss and the bold street art of Banksy, while
    dancing to the rhythmic beats of reggaeton icons like Bad Bunny and salsa classics by Celia Cruz, letting music color their creative process.
  travel: Maria Madariaga eagerly explores nearby seaside coves and the city’s historic park, collects shells as souvenirs, dreams of a future trip to the crystal‑clear waters of the Bahamas and a cultural
    adventure to Barcelona's whimsical Park Güell, planning each outing with a hand‑drawn map in their notebook.
  culinary: Maria Madariaga assists their family in cooking aromatic island dishes, savoring the sweet scent of caramelized plantains, the tang of citrus‑marinated seafood, and the comforting richness of
    rice and beans, while they chow down on homemade empanadas and experiment with simple fruit smoothies using mango and passion fruit.
  core: Maria Madariaga is a ten‑year‑old curiosity‑driven creator who blends scribbles, LEGO, and Scratch code into spontaneous stories, dazzles with salsa moves, hoards shiny stickers, and navigates allergies
    with a mix of impulsive spending and earnest saving.
background:
  cultural: Maria is a first-generation American of Puerto Rican descent. She grows up in a bilingual household where Spanish is spoken alongside English, and her family maintains cultural traditions such
    as celebrating Three Kings Day, cooking dishes like mofongo and arroz con gandules, and listening to salsa, plena, and reggaeton. Living in Indianapolis, she blends Midwestern experiences with her Caribbean
    heritage, participating in the local Hispanic community center's events and sharing her culture during school multicultural days. Her parents emphasize the values of family closeness, respect, and community
    service, which shape her identity and daily life. Maria's cultural background gives her a rich appreciation for music, food, and storytelling that she often incorporates into her art and school projects.
