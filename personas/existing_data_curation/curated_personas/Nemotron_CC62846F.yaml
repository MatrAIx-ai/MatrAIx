  career_goals: Maria dreams of combining her love for art and science. She imagines becoming a marine biologist who can draw and illustrate marine life, or an environmental artist who creates murals to
    raise awareness about ocean conservation. She is also fascinated by astronauts and hopes one day to explore space, but her immediate goal is to learn more about animals and plants through school science
    projects and museum visits. Her caring nature fuels an ambition to help others, so she often envisions a future as a teacher or community leader who can share her knowledge and celebrate her cultural
    heritage. Though still young, she sets short-term goals such as winning her school's art contest and joining a youth science club.
