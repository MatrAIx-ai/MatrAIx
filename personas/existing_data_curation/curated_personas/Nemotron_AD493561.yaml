personas:
  professional: Jose Osorio, a retired electrical engineer and applied physicist with a reputation for precise technical writing, now devotes their expertise to mentoring underrepresented undergraduate
    engineers, delivering guest lectures at local universities, and meticulously reviewing scientific manuscripts and exhibition catalogues.
  sports: Jose Osorio, an avid walker of the Pennsylvania countryside, joins the Lancaster Senior Hiking Club for weekly treks, follows the Philadelphia Eagles and Philadelphia Phillies with enthusiastic
    game‑day gatherings, and competes in local senior chess tournaments, treating them as a mental sport to keep their analytical edge sharp.
  arts: Jose Osorio, a devoted aficionado of avant‑garde literature and modernist painters from South America, spends weekends perfecting the interplay of light in their digital photographs of rural Pennsylvania,
    studies works by Frida Kahlo, Diego Rivera, and Fernando Botero, and contributes reflective essays to the village art newsletter.
  travel: Jose Osorio, a methodical traveler who prefers curated itineraries, annually journeys to the Andean highlands to photograph cloud forests, alternates with cultural tours of European capitals such
    as Paris and Madrid, and meticulously budgets each trip in a spreadsheet, favoring boutique guesthouses over chain hotels; they plan each adventure with the same analytical precision they apply to circuit
    design.
  culinary: Jose Osorio, an accomplished home chef, spends afternoons preparing encebollado, a tangy coastal fish stew, and fanesca, a hearty bean and vegetable soup, carefully seasoning with cumin, coriander,
    and fresh herbs while applying their photographer’s eye to plating, and documenting each variation in their culinary journal.
  core: Jose Osorio, an 81‑year‑old retired engineer whose relentless curiosity fuses analytical rigor with artistic sensitivity, balances disciplined routines with occasional anxiety‑driven perfectionism,
    and channels their competitive spirit into chess, photography, and mentoring.
background:
  cultural: Born in Quito, Ecuador, Jose grew up in a household that celebrated Andean traditions, Catholic holidays, and the vibrant music of the Sierra. He emigrated to the United States as a teenager,
    becoming bilingual and carrying forward his family's stories of Quito's historic plazas and the country's diverse ecosystems. His Ecuadorian heritage informs his palate, his appreciation for Latin American
    modernist art, and his deep respect for community and familial bonds. In Villanova, he remains active in the local Ecuadorian diaspora, attending cultural gatherings organized by the Pennsylvania Latino
    Association, sharing recipes, and teaching younger members about Ecuador's folklore. These cultural threads weave through his worldview, shaping his curiosity about the natural world, his artistic sensibilities,
    and his desire to preserve and transmit his heritage to future generations.
attributes:
  skills: '["Circuit Design", "Signal Processing", "MATLAB", "Python Programming", "Statistical Data Analysis", "Technical Writing", "Art History (Latin American Modernism)", "Digital Photography", "Bilingual
