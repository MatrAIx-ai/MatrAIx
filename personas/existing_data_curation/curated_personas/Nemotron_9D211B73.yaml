personas:
  professional: Sang Fan, a 33‑year‑old instructional designer, blends a methodical, data‑driven approach with a charismatic, talk‑heavy style to craft STEM curricula and lead tech‑focused workshops, leveraging
    bilingual communication, Excel/SPSS analysis, and a competitive drive to exceed learning outcomes.
  sports: Sang Fan, an avid hiker of the Potomac Gorge, joins the Montgomery County Trailblazers club for weekend treks, roots for the Washington Capitals and the DC United, and squeezes in a weekly pickup
    basketball game at the local YMCA to balance competitive spirit with outdoor fitness.
  arts: Sang Fan, a board‑game night host, frequently cites the strategic brilliance of 'Terraforming Mars' while also jamming to karaoke renditions of Taylor Swift’s 'Blank Space', attends Studio Ghibli
    film marathons, and collects limited‑edition prints by Japanese artist Yoshitaka Amano, weaving these artistic passions into their social gatherings.
  travel: Sang Fan’s travel style blends meticulous planning with spontaneous side trips, having explored Kyoto’s historic shrines, hiked Iceland’s volcanic trails, and attended the lantern festival in
    Taiwan, while they keep a savings goal to fund a future trek through the Patagonian Andes.
  culinary: Sang Fan, a confident home chef, perfects dishes like Sichuan mapo tofu, hand‑folded jiaozi dumplings, and miso ramen, experimenting with ingredients such as doubanjiang, fresh ginger, and kombu,
    yet occasionally burns the scallions when multitasking between a board‑game setup and kitchen prep.
  core: Sang Fan channels a competitive, talk‑driven energy into designing data‑rich curricula, overschedules board‑games, obsessively tracks every expense, while occasional skepticism and a tendency to
    over‑cook garnish reveal a delightfully imperfect perfectionist.
background:
  cultural: Sang is a first‑generation Chinese‑American raised in the Washington, D.C. metropolitan area. He grew up in a bilingual household where Mandarin and English were spoken interchangeably, and
    his family celebrated Lunar New Year, the Mid‑Autumn Festival, and other Chinese customs while embracing the multicultural environment of Montgomery County. The strong emphasis his parents placed on
    education, discipline, and respect for elders shaped his methodical and achievement‑driven mindset. He remains actively involved in the local Chinese community, frequently attending events at the Chinese
    Cultural Center and serving as a cultural bridge by translating and interpreting for community programs.
attributes:
  skills: '[''Curriculum Development'', ''Lesson Planning'', ''Classroom Management'', ''Assessment Design'', ''Educational Technology Integration (Google Classroom, Canvas, Interactive Whiteboards)'',
    ''Bilingual Communication (English‑Mandarin)'', ''Public Speaking'', ''Workshop Facilitation'', ''Event Coordination'', ''Data Analysis (Excel, SPSS)'', ''Community Outreach'', ''Mentoring and Tutoring'']'
  hobbies: '[''Hosting board game nights'', ''Cooking Chinese cuisine'', ''Hiking on local trails'', ''Playing chess'', ''Participating in Toastmasters'', ''Volunteering as a mentor for after‑school tutoring
    programs'', ''Karaoke and singing'', ''Learning Japanese'', ''Exploring educational technology trends via podcasts and blogs'']'
  career_goals: Sang aims to re‑enter the education sector as an instructional designer or educational consultant for a technology firm, while also building a community‑focused tutoring center in Montgomery
    County. He plans to earn a Master’s degree in Instructional Design & Technology within the next two years and eventually serve on the Montgomery County Board of Education to influence curriculum policy.
    His longer‑term ambition includes publishing a guide on culturally responsive teaching, speaking at national education conferences, and leveraging his competitive drive to develop innovative e‑learning
    solutions that improve student outcomes.
