  career_goals: He aspires to become a senior director of analytics, leading a multidisciplinary team that designs innovative, sustainable supply-chain solutions. He aims to publish research on applying
    machine-learning-augmented optimization in healthcare logistics, and to mentor underrepresented students in STEM. He also seeks to develop personal strategies to manage his intense emotional reactivity,
    aiming for a balanced work environment that supports mental well-being and allows him to integrate his artistic interests into his professional presentations.
