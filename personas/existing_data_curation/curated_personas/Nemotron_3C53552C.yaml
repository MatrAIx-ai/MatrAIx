  career_goals: Although still four, William often talks about wanting to become an astronaut who designs his own spacecraft or a cartoonist who brings his imaginative worlds to life. He envisions a future
    where he can blend art and science, building inventions that are both beautiful and functional. His calm confidence and competitive spirit drive him to set personal challenges, such as mastering new
    building techniques or learning the names of constellations, as stepping stones toward those dreams.
