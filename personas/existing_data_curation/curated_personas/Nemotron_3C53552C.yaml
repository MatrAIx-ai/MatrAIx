personas:
  professional: William Adas, a four‑year‑old aspiring mini‑architect, spends afternoons arranging Lego towers and scribbling blueprints for imaginary tree‑house cities, showing an early blend of organization
    and creative flexibility while they eagerly share their designs with a trusted circle of friends.
  sports: William Adas loves the kinetic rush of preschool soccer with the Tiny Turtles club, proudly chants for the local minor league baseball team, the River City Rovers, and eagerly practices balancing
    on a junior trampoline, blending a competitive spirit with a preference for solitary play and small‑group activities.
  arts: William Adas devotes quiet afternoons to drawing whimsical creatures inspired by Picasso’s line art, sings along to Jack Johnson’s acoustic lullabies, and collects Disney soundtrack vinyls, letting
    their imagination shape a unique artistic identity while they occasionally critique the colors of peers’ drawings.
  travel: William Adas dreams of revisiting Orlando’s Walt Disney World, exploring the Grand Canyon’s breathtaking vistas on a family road trip, and discovering the fairy‑tale streets of Bruges, preferring
    well‑planned itineraries that balance novelty with familiar comforts and small‑group excursions.
  culinary: William Adas favors buttery mac and cheese, crunchy carrot sticks, and ketchup‑glazed chicken nuggets, delights in stacking fruit kebabs with strawberry slices, and often insists on stirring
    the pancake batter themselves, showing both curiosity for new flavors and a picky, texture‑sensitive palate.
  core: William Adas is a four‑year‑old imaginative explorer who balances competitive curiosity with serene composure, turning everyday play into miniature adventures while rarely showing frustration.
background:
  cultural: William is raised in a white, middle‑class family in Tonkawa, Oklahoma, a small town in Kay County. His upbringing blends typical Midwestern values—such as respect for personal space, an appreciation
    for the outdoors, and community involvement in school and church events—with exposure to the diverse cultural heritage of the region, including local history lessons about Native American peoples and
    the frontier. Family traditions include celebrating national holidays with picnics, attending community fairs, and visiting the local library’s storytime program, all of which nurture his love for novelty
    and art.
