persona_description: A livestock producer who is interested in implementing technology to improve pasture management and grazing operations. Trotter is looking for practical solutions to enhance productivity
  and efficiency in small and mid-size cattle farming operations. He recognizes the limitations of traditional methods and is eager to explore new technologies to bring in younger generations to farms and
  encourage those raised on farms to continue farming. Trotter is also interested in the evaluation of on-animal sensors for early detection of disease and beef bull performance during the research project
  he is currently working on.
