personas:
  professional: Jasmin Ortega is a veteran community kitchen coordinator who blends their deep knowledge of traditional family recipes with Southern comfort cooking, using meticulous inventory control and
    flexible menu planning to serve seniors and community events, while mentoring younger staff with patience and a pragmatic curiosity.
  sports: Jasmin Ortega enjoys weekly line‑dancing sessions at the community center, participates in a local birdwatching walking club, and passionately supports the nearby high school basketball team,
    the Laurens County Lions, as well as the Atlanta Braves during baseball season.
  arts: Jasmin Ortega indulges in traditional folk dance, creates intricate quilts inspired by heritage patterns, and relaxes to the sounds of Pete Seeger, Dolly Parton, and lively accordion tunes that
    echo their family's musical traditions.
  travel: Jasmin Ortega prefers travel that balances relaxation with cultural immersion, having explored the historic streets of Charleston, the culinary scene of New Orleans, and the art galleries of Santa
    Fe, while planning a future road trip to the Great Smoky Mountains to combine birdwatching with family outings.
  culinary: Jasmin Ortega cultivates cilantro, oregano, and chilies in their garden to craft dishes like cilantro‑lime grilled fish tacos, smoky Southern collard greens with ham hocks, and a spicy chicken
    enchilada casserole that merges familiar family flavors with fresh, seasonal produce.
  core: Jasmin Ortega is a socially vibrant, organized senior who turns their herb garden into a culinary laboratory, mentors aspiring cooks with a blend of curiosity and practicality, and never says no
    to a line‑dance call‑out, even if it means a late‑night stroll to the pantry for fresh chilies.
background:
  cultural: Jasmin is a second‑generation Mexican American whose parents emigrated from Oaxaca in the 1950s. Raised in a bilingual household, she grew up celebrating Día de los Muertos, quinceañeras, and
    Mexican holidays while integrating Southern hospitality traditions from her South Carolina community. Her Catholic faith informs many of her family gatherings, and she maintains strong ties to the local
    Hispanic community through cultural festivals and a neighborhood association. Jasmin’s cooking reflects a blend of her Oaxaca roots—rich mole sauces, chilies, and corn‑based dishes—and the hearty, soulful
    flavors of Southern cuisine, embodying a lifelong balance of curiosity, practicality, and cultural pride.
