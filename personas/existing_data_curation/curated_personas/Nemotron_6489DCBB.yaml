  hobbies: '[''Herb gardening'', ''Traditional Mexican folk dancing'', ''Community potluck organization'', ''Reading historical biographies'', ''Church volunteer cooking'', ''Quilting'', ''Birdwatching'',
    ''Family genealogy research'', ''Latin music listening'', ''Café visits with friends'']'
  career_goals: Even at 71, Jasmin aims to preserve and celebrate her culinary heritage. She plans to compile a community cookbook that blends Mexican family recipes with Southern flavors, and to host regular
    cooking workshops at the local senior center and community college. Jasmin also hopes to mentor a new generation of cooks from the Hispanic community, fostering pride in cultural foods. In the longer
    term, she envisions a seasonal pop‑up stall at the Simpsonville farmer’s market, offering a fusion menu that showcases her curiosity for new flavor pairings while staying practical with seasonal produce.
    Her overarching ambition is to be recognized as a cultural ambassador who bridges Mexican and Southern food traditions in Laurens County.
