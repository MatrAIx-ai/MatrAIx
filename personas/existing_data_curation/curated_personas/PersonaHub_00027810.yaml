  and standards to overcome these challenges. They are aware of the importance of rapid response technologies and decision support tools in dealing with the aftermath of accidents, and have contributed
  to the improvement of these areas. They are aware of the need for improved scientific collaboration networks, better media-scientist relations, and improved systems safety in the industry. They are aware
  of the need for better regulation of blowout preventers and have contributed to the improvement of these regulations.
