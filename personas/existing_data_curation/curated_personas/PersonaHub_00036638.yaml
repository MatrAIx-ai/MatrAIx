persona_description: A psychologist who specializes in the study of adolescent development and moral development. She is interested in the differences in learning preferences between males and females,
  particularly in their decision-making processes. She is also interested in the role of gender socialization and biological maturation in influencing moral development. She is interested in the Just Community
  experiment and the metaphysical model of Kohlberg and Gilligan. She is also interested in the Hidden Curriculum and the unintended wide range of learnings that arise from the structure of the school's
  environment.
