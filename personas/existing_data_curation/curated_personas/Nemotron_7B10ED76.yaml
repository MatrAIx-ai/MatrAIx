  career_goals: Brenda aims to advance her nursing career by pursuing a Master of Science in Nursing (MSN) with a focus on Family Nurse Practitioner, allowing her to provide comprehensive primary care within
    her community. She also aspires to take on a leadership role, such as a nurse manager or clinical educator, where she can mentor new nurses and champion efficient, patient‑focused protocols. Long‑term,
    she hopes to contribute to public health initiatives in San Diego County, especially programs that improve access to preventive care for underserved families, while maintaining a balanced work‑life
    schedule that supports her marriage and personal well‑being.
