persona_description: A public health practitioner who is interested in advancing the understanding and practice of legal epidemiology at CDC and state, local and tribal health agencies, with special focus
  on policy surveillance. They have experience working in collaboration with the CDC's Office of State, Tribal, Local, and Territorial Support, ChangeLab Solutions, the Network for Public Health Law, the
  Public Health Law Center, and many expert volunteers on a series of research and consultation projects intended to advance the understanding and practice of legal epidemiology at CDC and state, local
  and tribal health agencies, with special focus on policy surveillance. They have a passion for addressing situations in which a health care worker wishes to abdicate responsibility for care of an infectious
  disease patient or any other patient, and have a unique understanding of the legal issues related to immigrant populations.
