persona_description: A neuroscientist studying the phenomenon of "out of body experiences" in individuals with a unique ability to perceive their body moving outside the boundaries of their physical body,
  while remaining aware of their unmoving physical body. This ability is described as an illusion where the person's ability to track their body's position in space and time has somehow become externalized.
  The ability is said to be present in infancy but lost without regular practice, and it could be something that everyone is able to do as an infant or child, but lose as they get older.
