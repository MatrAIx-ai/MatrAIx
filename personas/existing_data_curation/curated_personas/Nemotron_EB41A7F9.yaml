personas:
  professional: Diana Vallejo, a seasoned front‑of‑house manager with a razor‑sharp eye for detail, leverages fluency in Spanish and English, masterful POS operation, and a disciplined, organized approach
    to orchestrate seamless service while subtly curating art displays that elevate the dining ambiance, and they consistently mentor staff in both efficiency and aesthetic sensibility.
  sports: Diana Vallejo maintains fitness through sunrise yoga at Orlando Yoga Flow studio, occasionally joins a recreational softball league in the spring, supports Orlando City SC and the Orlando Magic,
    and they prefer low‑impact cardio like swimming at the city Aquatics Center over high‑intensity gym sessions.
  arts: Diana Vallejo immerses themselves in Orlando's cultural scene, attending monthly gallery openings featuring artists like Kehinde Wiley and local muralist Marco Ruiz, while their personal sketchbook
    reflects influences from Frida Kahlo and Diego Rivera, and they regularly volunteer to curate mini‑exhibitions at community cafés.
  travel: Diana Vallejo's travel style blends meticulous planning with spontaneous curiosity, having explored Oaxaca's culinary markets, Barcelona's Gaudí architecture, and the serene beaches of Tulum,
    while they keep a travel journal to fine‑tune future trips to Kyoto's temples and the desert festivals of New Mexico.
  culinary: Diana Vallejo excels at crafting authentic mole poblano with toasted chilies, chocolate, and almonds, experiments with corn masa for handmade tortillas, and they host intimate tasting evenings
    showcasing dishes like chiles en nogada and tamarind‑glazed pork, all while balancing a moderate fondness for occasional late‑night tacos.
  core: Diana Vallejo orchestrates life like a well‑curated gallery—precision‑driven, art‑obsessed, budgeting disciplined, yet they are prone to skipping physiotherapy in favor of extra yoga sessions and
    indulging in midnight taco cravings.
background:
  cultural: Diana was raised in a Mexican‑American household in Orlando, the daughter of immigrants who arrived from Jalisco. She grew up speaking Spanish at home and celebrating Mexican customs such as
    Día de los Muertos, Semana Santa, and family gatherings centered around traditional foods like mole and tamales. These cultural roots shape her identity and inform her culinary tastes, her love for
    vibrant colors, and her appreciation for folk art. While she embraces the multicultural atmosphere of central Florida, she remains connected to her Mexican heritage through community events at local
    cultural centers, bilingual church services, and ongoing relationships with her extended family in Mexico. This blend of Mexican traditions and Floridian influences provides a rich backdrop for her
    personal and professional aspirations.
attributes:
  skills: '[''Customer service'', ''Bilingual communication (Spanish-English)'', ''Point-of-sale system operation'', ''Table turnover and time management'', ''Staff scheduling'', ''Inventory management'',
