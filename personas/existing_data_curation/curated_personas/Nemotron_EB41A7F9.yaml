  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting and sketching'', ''Cooking traditional Mexican dishes'', ''Reading art history and artist biographies'', ''Attending small theater
    productions and poetry readings'', ''Practicing yoga and meditation'', ''Photography of street art and cultural festivals'', ''Participating in small‑group book clubs'', ''Volunteering at community
    art workshops'', ''Exploring local culinary scenes'']'
  career_goals: Driven by her disciplined nature and love for achievement, Diana aims to advance into a supervisory role within the next two years, targeting a floor‑manager position at a high‑volume dining
    establishment. She plans to complete a hospitality management certificate at a local community college and earn the Certified Food and Beverage Manager credential. In the longer term, she envisions
    opening a boutique Mexican‑inspired café that doubles as a community art space, where she can showcase local artists and host cultural events. Her goal is to blend her culinary passion with her appreciation
    for art, creating a venue that reflects both her Mexican heritage and her commitment to high standards of service.
