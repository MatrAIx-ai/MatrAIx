  professional: Jorge Torrez, a five‑year‑old budding builder, treats their LEGO sets like a miniature engineering workshop, and they apply methodical planning, a practical curiosity, and a competitive
    drive to construct towering structures that outshine their classmates.
  sports: Jorge Torrez, a five‑year‑old member of the local kids’ soccer club, favors the forward position, idolizes the play style of Lionel Messi, practices dribbling after school, and they compete fiercely
    in mini‑tournaments while balancing solo practice with friendly team drills.
  arts: Jorge Torrez, a five‑year‑old who delights in drawing vivid dinosaur scenes with Crayola crayons, admires Pixar’s “Toy Story” for its imaginative storytelling, and they occasionally mimic the rhythmic
    clapping of their favorite children’s song by The Wiggles, using art as both expression and friendly competition.
  travel: Jorge Torrez, a five‑year‑old who enjoys family road trips to the beach in Destin and occasional visits to Disney World, prefers organized itineraries with short museum stops, loves riding the
    carousel, and they dream of exploring the ancient ruins of Machu Picchu once they’re older.
  culinary: Jorge Torrez, a five‑year‑old with a palate for homemade cheese pizza topped with pepperoni and olives, delights in banana splits with chocolate syrup, enjoys helping their parents stir mac
    and cheese, yet they often sneak extra grapes when no one is watching.
  core: Jorge Torrez, a five‑year‑old curiosity‑driven planner who balances methodical play with a competitive edge, often hides their favorite markers and challenges peers to building contests while they
    still need quiet moments alone.
background:
  cultural: Jorge comes from a Mexican family in Mercedes, Texas, where Spanish and English are spoken daily. His household celebrates traditional holidays such as Día de los Muertos, Cinco de Mayo, and
    Christmas Posadas, with vibrant decorations, family gatherings, and homemade foods like tamales and enchiladas. He grows up surrounded by the values of familismo, respect for elders, and a strong sense
    of community. Local influences include attending a bilingual preschool, participating in neighborhood soccer games, and listening to regional music like norteño and mariachi, all of which shape his
    cultural identity and everyday experiences.
