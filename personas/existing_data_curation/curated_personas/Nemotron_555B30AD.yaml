  hobbies: '[''Abstract painting'', ''Experimental photography'', ''Short‑story writing'', ''Visiting local art galleries'', ''Improv theater participation'', ''Attending tech meetups'', ''Reading speculative
    fiction and philosophy'', ''Listening to cognitive science podcasts'', ''Volunteering at senior center'', ''Mentoring high‑school coders'', ''Leading mindfulness support group'', ''Hiking'', ''Yoga'',
    ''Gardening'']'
  career_goals: Geraldine aims to progress into a QA Lead or Test Architecture role where she can shape testing strategies that prioritize both product quality and user inclusivity. She plans to earn the
    ISTQB Advanced Test Manager certification and deepen expertise in AI‑driven testing tools. Ultimately, she envisions establishing a consultancy that helps mid‑size companies embed empathy‑focused testing
    practices and robust automation pipelines, while also fostering a supportive, low‑stress work environment for her team. Balancing ambition with well‑being, she seeks a hybrid or remote work model that
    allows her to stay connected to her Tiffin community and maintain her creative pursuits.
