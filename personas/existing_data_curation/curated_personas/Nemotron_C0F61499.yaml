personas:
  professional: Mario Iturbe, an accounting clerk with a knack for streamlining ledgers, leverages QuickBooks, Xero, advanced Excel macros, and emerging data‑visualization tools like Tableau to spot discrepancies,
    while their curious, competitive nature drives them to integrate data‑driven solutions despite occasional worry about meeting deadlines.
  sports: Mario Iturbe fuels fitness by playing in a local recreational soccer league that supports the Colorado Rapids, hitting the trails for weekend hikes in the Rocky Mountains, and cheering for the
    Denver Nuggets during basketball season, yet their competitive streak sometimes leads them to skip rest days when stress spikes.
  arts: Mario Iturbe immerses themselves in the vibrant Aurora street‑art scene, often sketching murals inspired by Frida Kahlo and local artist Justin Bower, strums acoustic renditions of 'Cielito Lindo'
    and 'Hotel California' on their guitar, and devours philosophical texts by Slavoj Žižek, reflecting a curiosity that blends visual storytelling with reflective music.
  travel: Mario Iturbe prefers road‑trip adventures that balance budget and discovery, having hiked the peaks of Rocky Mountain National Park, trekked the historic streets of Oaxaca during spring break,
    and now daydreams about Patagonia’s glaciers while carefully saving for future travel between CPA exam prep sessions.
  culinary: Mario Iturbe experiments in the kitchen by reinventing tacos al pastor with pineapple‑infused carnitas and mole poblano using roasted chiles ancho and cacao, enjoys sourcing fresh cilantro and
    corn masa at local farmers’ markets, and frequents family‑style eateries like El Rincón for their signature chiles en nogada.
  core: Mario Iturbe blends a data‑driven accounting career with a love for art, music, and spicy cuisine, balancing meticulous budgeting against a habit of over‑thinking that fuels both creative projects
    and occasional stress‑induced coffee binges.
background:
  cultural: Mario was raised in a Mexican‑American household where Spanish was spoken alongside English, and family traditions such as Día de los Muertos, quinceañeras, and Sunday tamale gatherings were
    central to his upbringing. He maintains strong ties to the local Mexican community in Aurora, attending cultural festivals, supporting Mexican restaurants, and following Liga MX soccer. His bicultural
    identity informs his worldview, blending Mexican values of family cohesion and hospitality with the entrepreneurial spirit he observes in his Colorado surroundings. This heritage also enriches his culinary
    interests and his appreciation for vibrant art forms that reflect his roots.
attributes:
  skills: '[''Bookkeeping'', ''Financial Reconciliation'', ''QuickBooks'', ''Xero'', ''Microsoft Excel (advanced)'', ''US GAAP basics'', ''Tax compliance fundamentals'', ''Audit procedures'', ''Data analytics
