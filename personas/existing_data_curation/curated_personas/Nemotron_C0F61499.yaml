  hobbies: '[''Visiting art galleries'', ''Sketching'', ''Photography (landscape and urban)'', ''Hiking in the Rockies'', ''Cooking Mexican cuisine with modern twists'', ''Playing acoustic guitar'', ''Reading
    philosophy and social theory'', ''Community soccer'', ''Mindfulness meditation'', ''Journaling'']'
  career_goals: Mario intends to complete his bachelor’s degree in accounting and obtain his CPA license within the next three years, seeing certification as a gateway to senior accounting or audit supervisory
    roles. He aspires to lead a team that integrates data‑driven solutions into traditional accounting workflows, positioning himself as a forward‑thinking professional in the Denver metropolitan market.
    Long‑term, he dreams of launching a boutique accounting firm that serves small businesses with personalized, technology‑enhanced services, while also developing expertise in forensic accounting and
    financial risk assessment. Amid these ambitions, he is mindful of managing his stress and emotional wellbeing, seeking a balanced career trajectory.
