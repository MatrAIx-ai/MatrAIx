  hobbies: '[''Visiting art galleries'', ''Attending theatre productions'', ''Participating in literary book‑clubs'', ''Photography'', ''Hiking in local parks'', ''Cycling'', ''Cooking seasonal meals'',
    ''Wine tasting and pairing'', ''Cultural travel to European art capitals'', ''Volunteering with community arts nonprofits'']'
  career_goals: Anthony aims to advance to a senior leadership role such as Chief Compliance Officer within the next five years, overseeing enterprise‑wide compliance strategy across multiple regulated
    sectors. He plans to earn the Certified Compliance & Ethics Professional (CCEP) credential and to contribute thought leadership through white papers and industry panels on integrating technology with
    ethical governance. A long‑term ambition is to apply his compliance expertise to the cultural sector, helping museums or performing‑arts organizations navigate donor regulations and intellectual‑property
    issues while preserving artistic integrity. He also seeks to mentor emerging compliance professionals and to build a cross‑functional compliance culture that values curiosity, ethical rigor, and innovative
    problem‑solving.
