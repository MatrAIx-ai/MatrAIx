personas:
  professional: Robert Bolli is a budding concept artist who blends hand‑drawn sketches with digital tools like Clip Studio Paint, leveraging their spontaneous idea generation and collaborative feedback
    skills to create striking character designs, while they wrestle with self‑imposed deadlines and organization.
  sports: Robert Bolli is a casual skateboarder and cyclist who rides through the La Grange neighborhoods, joins a local skate club on weekends, follows the Chicago Bulls for basketball, the Chicago Bears
    for football, and the Chicago Fire for soccer, and they use bike rides as a break from screen time.
  arts: Robert Bolli is an avid explorer of visual culture, sketching characters inspired by the surreal panels of Junji Ito, the vibrant murals of Banksy, listening to indie rock bands like Arctic Monkeys
    and experimental jazz from Kamasi Washington, and they attend local gallery openings featuring emerging illustrators.
  travel: Robert Bolli is an adventurous teen whose weekend trips include biking to the Art Institute of Chicago, a day trip to Milwaukee’s street‑art district, dreaming of a solo backpacking journey through
    Kyoto’s temples and Akihabara’s pop‑culture scene, while they balance limited funds and school commitments.
  culinary: Robert Bolli is a self‑taught home cook who favors making avocado toast with feta and poached eggs, whipping up spicy tuna poke bowls with sesame oil and rice, enjoys a slice of deep‑dish Chicago
    pizza, and they experiment with basil‑infused pasta sauces despite occasional over‑salting.
  core: Robert Bolli is a restless creative soul who channels spontaneous curiosity into sketches, music, and bike rides, yet they habitually battle disorganization and deadline avoidance.
background:
  cultural: Robert grew up in a middle‑class, white family in La Grange, a suburban community in Cook County, Illinois. The Midwestern environment gave him a blend of small‑town community values and easy
    access to Chicago’s cultural scene. Family gatherings often featured simple backyard barbecues and holidays rooted in Midwestern traditions. He was exposed to a mix of European‑American cultural influences—chiefly
    German, Irish, and Polish ancestry common in the region—reflected in community festivals, local cuisine, and an appreciation for practicality balanced with creativity. The proximity to Chicago’s museums,
    music venues, and street art has broadened his artistic outlook, while the region’s emphasis on self‑reliance and friendly informality encourages his independent spirit.
