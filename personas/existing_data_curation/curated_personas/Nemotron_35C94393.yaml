  career_goals: Robert dreams of turning his love for visual storytelling into a career. He wants to complete his GED, enroll in a community‑college program in illustration or game‑design, and eventually
    work as a concept artist or freelance designer for independent video‑game studios. In the short term, he hopes to build a personal website to sell prints and custom commissions, and to develop a portfolio
    strong enough to earn a mentorship or apprenticeship with a local studio. He is drawn to flexible, project‑based work that lets him explore new ideas, travel for inspiration, and avoid the rigidity
    of a 9‑to‑5 schedule.
