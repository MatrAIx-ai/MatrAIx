  career_goals: Michael aims to transition from a laborer role into a supervisory position within warehouse logistics, such as a shift lead or warehouse supervisor, within the next three years. He plans
    to obtain a supply chain certification and eventually pursue a bachelor’s degree in logistics or business administration. His long‑term ambition is to become a logistics manager or start his own small
    freight and material‑moving business, where he can blend his appreciation for efficient, well‑designed spaces with his creative interest in visual aesthetics. He is competitive and motivated to be recognized
    for operational improvements that boost productivity while maintaining safety.
