  career_goals: Eddy dreams of becoming a scientist who studies volcanoes and marine life. In the short term, he wants to join the junior ranger program at Hawaii Volcanoes National Park and win a local
    soccer tournament. Long‑term, he hopes to attend a high school with a strong STEM focus and eventually work as a marine biologist or volcanologist, helping protect Hawaii's unique natural environments.
