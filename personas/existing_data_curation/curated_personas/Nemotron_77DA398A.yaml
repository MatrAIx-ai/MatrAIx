personas:
  professional: Eddy Lawwell is an aspiring junior marine biologist who channels their fascination with tide pools and volcano documentaries into structured LEGO research projects, using their practical
    mindset and love for organization to catalog sea‑creature specimens and draft mini‑reports for school, while they eagerly share findings with friends during beach clean‑ups.
  sports: Eddy Lawwell is a devoted member of the Hilo Hurricanes U10 soccer team, swims laps at the local beach pool, and tracks the Hawaii Rainbow Warriors football games, combining their energetic group
    spirit with a disciplined training routine that includes weekly beach clean‑up jogs.
  arts: Eddy Lawwell spends afternoons sketching sea turtles, strumming the ukulele to classic tracks by Israel Kamakawiwo'ole and Jack Johnson, and building elaborate LEGO dioramas inspired by Moana’s
    ocean scenes, drawing artistic inspiration from both island rhythms and popular Disney soundtracks.
  travel: Eddy Lawwell enjoys day trips to Hawaii Volcanoes National Park to explore lava tubes, weekend visits to Maui’s Hana Highway for waterfall hikes, and dreams of a family vacation to Japan’s Aso
    volcano region to compare volcanic activity, balancing adventure with the modest budget of a 9‑year‑old’s allowance.
  culinary: Eddy Lawwell delights in poke bowls topped with fresh ahi tuna, pineapple‑glazed chicken, and kimchi, often helping to slice pineapples for family meals while experimenting with making their
    own LEGO‑shaped fruit smoothies, though they sometimes over‑season the dishes, craving bold island flavors.
  core: Eddy Lawwell is a pragmatic, upbeat explorer who blends a love for structured LEGO projects with a keen appetite for ocean adventures, community beach clean‑ups, and spontaneous ukulele jams, all
    while juggling allowance savings and occasional sunscreen lapses.
background:
  cultural: Eddy is a white boy raised in Hilo, Hawaii. His family has lived on the island for two generations, blending typical mainland American customs with Hawaiian influences. He celebrates U.S. holidays
    and also participates in local traditions such as Lei Day and King Kamehameha Day, learns basic Hawaiian greetings, and enjoys local foods like pineapple and poke. Growing up near the ocean and volcanoes,
    Eddy’s cultural environment emphasizes respect for nature, community volunteer events like beach clean‑ups, and a strong sense of aloha that shapes his interests and values.
