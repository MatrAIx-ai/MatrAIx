  hobbies: '[''Mexican cooking and recipe experimentation'', ''Salsa and merengue dancing'', ''Community gardening'', ''Walking in Rochester parks'', ''Watching classic Mexican cinema'', ''Listening to
    traditional Mexican music'', ''Reading historical fiction'', ''Attending church services and choir'', ''Volunteering at local senior center'', ''Learning digital tools (tablet, video calls)'']'
  career_goals: Marta aims to keep her cultural heritage alive by teaching Mexican cooking classes at the local senior center and organizing intergenerational recipe sharing events. She wants to improve
    her digital skills to stay connected with her family in Mexico, volunteer regularly at the community food bank, and mentor bilingual youth in navigating school and community resources. Additionally,
    she hopes to travel back to Mexico to visit her hometown and eventually compile a memoir of her life stories for future generations.
