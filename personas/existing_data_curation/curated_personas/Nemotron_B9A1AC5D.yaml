personas:
  professional: A seasoned senior‑center program coordinator, Marta Sarria blends bilingual translation expertise and culinary talent to lead cooking workshops, while their love of spontaneity sometimes
    leads them to improvise lesson plans on the fly, balancing their innate desire for structure with a flexible, people‑focused approach.
  sports: An enthusiastic member of the local senior walking club, Marta Sarria enjoys brisk strolls in Highland Park, participates in a weekly lawn‑bowling league, and cheerfully supports the Rochester
    Red Wings baseball team while also dancing salsa at community festivals, keeping active despite occasional joint stiffness.
  arts: A passionate lover of classic cinema and traditional music, Marta Sarria relishes re‑watching films by Emilio Fernández and listening to mariachi recordings by Mariachi Vargas de Tecalitlán, while
    they lend their voice to the church choir performing works by John Rutter, and they often dance to salsa icons like Celia Cruz during community gatherings.
  travel: A nostalgic traveler with a modest budget, Marta Sarria has already visited the Finger Lakes wine region and the Adirondack foothills, plans a pilgrimage to their hometown in Jalisco’s highlands
    next summer, and favors organized group tours that include cultural immersion and opportunities for video calls with distant relatives.
  culinary: An adept home chef, Marta Sarria expertly prepares mole poblano, pozole rojo, fresh tamales, and salsa verde using garden‑grown tomatillos and cilantro, flavors their dishes with epazote, and
    enjoys teaching these recipes in senior‑center classes while occasionally treating themselves to store‑bought churros as a sweet indulgence.
  core: Marta Sarria, a vibrant 70‑year‑old bilingual community advocate, balances meticulous planning with spontaneous salsa flair, maintaining frugality while sharing generous hospitality through food,
    faith, and family.
background:
  cultural: Marta was born to Mexican immigrant parents from the state of Jalisco who settled in upstate New York in the 1960s. Raised in a bilingual household, she grew up celebrating Mexican traditions
    such as Dia de los Muertos, quinceañeras, and the vibrant cuisine of her heritage while also adopting the rhythms of American life in Rochester. Her Catholic faith, close family ties, and community
    involvement have shaped a blended identity that honors Mexican cultural values—family, hospitality, and respect for elders—while actively engaging in the local multicultural landscape.
