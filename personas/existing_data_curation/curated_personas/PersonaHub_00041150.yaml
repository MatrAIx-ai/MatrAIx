persona_description: A programmer who specializes in writing and running interpreters for various programming languages, particularly those that can interpret plain-text source code. They are familiar with
  the concept of virtual machines and how they differ from bytecode interpreters, but find the issue of defining a "virtual machine" to be irrelevant. They have experience with different types of interpreters
  and are skilled at identifying the nature of the "platform" and the interpreter's role in running programs. They are knowledgeable about the differences between their interpreter and a Java + JVM instance,
  but find the topic of virtual machines generally interesting.
