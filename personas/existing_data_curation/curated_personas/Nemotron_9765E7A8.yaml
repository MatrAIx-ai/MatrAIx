personas:
  professional: Latisha Davis is an aspiring CPA who leverages her arts‑humanities education and tax‑preparation experience to translate complex tax codes into plain language, using modern software like
    TurboTax Business and thriving on spontaneous problem‑solving, though she sometimes wrestles with meeting filing deadlines because of her aversion to rigid structures.
  sports: Latisha Davis participates in a local co‑ed softball league and follows the Chicago Bulls, Milwaukee Brewers, and the University of Wisconsin Badgers, she fits quick HIIT workouts into her schedule
    and prefers weekend group hikes over solitary gym sessions, but she often forgets to stretch after dancing at community events.
  arts: Latisha Davis expresses herself through soulful R&B covers of H.E.R. and gospel renditions of Kirk Franklin, writes poetry inspired by Rupi Kaur’s candid style, and hones her improv skills at a
    Second City‑affiliated workshop, all while curating a playlist that also includes Anderson .Paak and classic Motown hits.
  travel: Latisha Davis favors spontaneous weekend getaways, having already explored the vibrant neighborhoods of New Orleans, the art galleries of Chicago’s Wicker Park, and the scenic shores of Door County,
    while dreaming of a cultural immersion trip to Ghana’s Cape Coast, yet she balances these ambitions against a modest student budget and the need to return home for family responsibilities.
  culinary: Latisha Davis enjoys cooking intermediate‑level soul‑food dishes like shrimp and grits, collard greens with smoked turkey, and sweet potato pie, and she delights in pairing them with a perfectly
    brewed pour‑over coffee from Stumptown, though she sometimes burns the first batch of cornbread when rushing to meet a rehearsal.
  core: Latisha Davis is a charismatic, spontaneously creative finance whiz with a love for soulful music, a penchant for last‑minute budgeting, and a habit of turning anxiety into yoga‑powered productivity.
background:
  cultural: Latisha is a Black woman raised in the Midwest, with deep roots in her family’s church community and local cultural organizations in Dwight, Illinois. Her upbringing emphasized resilience, collective
    support, and a strong sense of identity rooted in African‑American history and traditions. She celebrates cultural milestones such as Juneteenth and Black History Month, often participating in community
    storytelling events that highlight Black achievements. Her family's values of education, faith, and communal responsibility influence her drive to give back, particularly through financial empowerment
    initiatives for other Black families. While she embraces contemporary Black music, literature, and cuisine, she also navigates the nuances of a small‑town environment, blending Southern hospitality
    with Midwestern practicality.
