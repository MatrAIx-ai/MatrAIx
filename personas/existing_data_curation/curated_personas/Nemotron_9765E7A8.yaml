  hobbies: '[''R&B and gospel singing'', ''Contemporary dance'', ''Creative writing (poetry)'', ''Reading African American literature'', ''Community volunteering at local church'', ''Cooking and experimenting
    with soul food recipes'', ''Improvisational theatre'', ''Yoga and mindfulness meditation'', ''Road trips with friends'', ''Photography'']'
  career_goals: Latisha aims to become a Certified Public Accountant within the next three years, leveraging her humanities background to launch a community‑focused tax consulting practice that offers free
    financial‑education workshops for low‑income families in Grundy County. She envisions expanding her services to include small‑business advisory, mentoring young Black women interested in finance, and
    eventually influencing state tax policy to promote greater equity. Her long‑term ambition is to blend her passion for social impact with professional expertise, creating a trusted hub where practical
    tax guidance meets cultural empowerment.
