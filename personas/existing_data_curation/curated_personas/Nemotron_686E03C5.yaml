  hobbies: '[''Custom furniture making'', ''Wood carving'', ''Nature photography'', ''Hiking in coastal forests'', ''Reading design and art history'', ''Playing acoustic guitar'', ''Participating in regional
    woodworking competitions'']'
  career_goals: Gary aims to advance from machine operator to shift supervisor within the next three years, pursuing certifications in advanced CNC operation and lean manufacturing. He plans to enroll in
    a community college program in industrial technology to broaden his technical knowledge. Long-term, he envisions opening a boutique woodworking studio that blends functional craftsmanship with artistic
    design, leveraging his curiosity for new ideas and his competitive drive to create distinctive pieces.
