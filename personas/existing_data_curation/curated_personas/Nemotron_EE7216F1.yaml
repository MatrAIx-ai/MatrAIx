  hobbies: '["Community Soccer League", "Gospel Choir Volunteering", "Soul Food Cooking", "Reading Business & Self‑Improvement Books", "Jogging", "Hip‑Hop Dance Classes", "Attending Georgia Folk Festival"]'
  career_goals: Jontell aims to advance to a regional sales manager position within the next three years, overseeing multiple districts across the Southeast. To prepare, she plans to earn a Certified Professional
    Sales Leader credential and enroll in part‑time business courses to obtain an associate’s degree in Business Administration. She also intends to launch a mentorship program for women in her community,
    leveraging her experience to help them secure entry‑level sales roles. Long‑term, Jontell envisions starting her own consulting boutique that assists small businesses in building effective sales pipelines,
    combining her practical expertise with entrepreneurial ambition. Throughout her career progression, she seeks to maintain a healthy work‑life balance to devote quality time to her husband, family, and
    community involvement.
