personas:
  professional: Jontell Harris is a first‑line supervisor of non‑retail sales workers who blends data‑driven coaching, pragmatic adoption of sales tech, and empathetic conflict resolution to lift team performance
    while methodically preparing for a regional sales manager role.
  sports: Jontell Harris coordinates the local "River City FC" community soccer league as both player and scheduler, follows the Atlanta United MLS team and the Atlanta Falcons NFL franchise, hits the nearby
    river trail for morning jogs, and attends hip‑hop dance classes that merge cardio with cultural expression.
  arts: Jontell Harris sings backup in a lively gospel choir, regularly enjoys the Georgia Folk Festival, draws inspiration from artists like Kirk Franklin and Jennifer Hudson, curates playlists featuring
    contemporary R&B and classic Southern blues, and devours books by Ta‑Nehisi Coates and Michelle Obama for creative and historical insight.
  travel: Jontell Harris prefers weekend road trips to nearby cultural hotspots such as Savannah's historic district and New Orleans' music scene, dreams of a mountain retreat in Asheville for hiking and
    folk workshops, and plans a future overseas visit to the Montreux Jazz Festival in Switzerland, balancing careful budgeting with occasional splurges on unique culinary experiences.
  culinary: Jontell Harris is an advanced home cook who reimagines Southern soul‑food classics—serving collard‑green spring rolls, smoked‑paprika shrimp and grits, and sweet‑potato pie with a pinch of chipotle—while
    sourcing locally grown greens, hot sauce, and fresh herbs to host lively family potlucks.
  core: Jontell Harris is a community‑driven sales leader who channels curiosity into practical tech choices, fuels a bustling social calendar with music and sports, and balances disciplined finance and
    health habits with a playful penchant for culinary experiments.
background:
  cultural: Jontell was raised in Homerville, a small town in Clinch County where the African‑American community has deep roots dating back generations. Her family’s history reflects the resilience and
    close‑knit family ties that characterize many Black families in the rural South. Church life has been a cornerstone, offering both spiritual guidance and a network of support that reinforces communal
    values such as hospitality, storytelling, and collective progress. Traditional Southern cuisine—collard greens, smoked meats, and sweet potato pies—has been passed down through family gatherings, shaping
    her appreciation for food as a cultural bridge. Music, from gospel choirs to blues and contemporary hip‑hop, is woven into daily life, influencing her love for rhythm and dance. Growing up amid the
    legacy of the civil‑rights movement in Georgia, she values education, self‑advocacy, and community uplift, which motivates her mentorship efforts. While she embraces modern influences, she remains grounded
    in the customs, oral histories, and intergenerational solidarity that define her cultural identity in the Black Southern experience.
attributes:
  skills: '["Team Leadership", "Sales Coaching", "CRM Software Management", "Data Analysis", "Negotiation", "Conflict Resolution", "Schedule and Resource Planning", "Performance Metrics Tracking", "Compliance
