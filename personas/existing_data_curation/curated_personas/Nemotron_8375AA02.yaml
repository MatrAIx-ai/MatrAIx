personas:
  professional: Melissa Sellers, an aspiring junior scientist who loves assembling intricate LEGO inventions, channels her methodical curiosity and competitive edge into science experiment kits, treating
    each project like a carefully planned mission.
  sports: Melissa Sellers, a spirited member of the Largo Youth Soccer Club who also attends community pool swim lessons, cheers for the Tampa Bay Buccaneers and the Tampa Bay Rays, and blends competitive
    drills on the field with weekend beach volleyball games with friends.
  arts: Melissa Sellers, a budding cartoon illustrator who spends free afternoons sketching characters inspired by Matt Groening’s “The Simpsons” and drawing scenes from “Harry Potter,” while devouring
    mystery novels by Enid Blyton and listening to the Disney classics soundtrack.
  travel: Melissa Sellers, an enthusiastic road‑trip explorer who loves family visits to the historic streets of St. Augustine, day trips to Disney World in Orlando, and collecting seashells on Clearwater
    Beach, while dreaming of a future adventure to the Grand Canyon and a weekend getaway to Washington, D.C.’s Smithsonian museums.
  culinary: Melissa Sellers, a junior baker who expertly mixes chocolate chip cookie dough with a dash of sea salt, enjoys whipping up homemade mac & cheese, and proudly adds fresh strawberries and shredded
    coconut to fruit parfaits, though they sometimes over‑bake the cookies and forget to clean the kitchen.
  core: Melissa Sellers blends a curious, methodical mind with a competitive spirit, turning every LEGO build, soccer game, and cookie batch into a disciplined adventure, even if they occasionally forget
    to tidy up.
background:
  cultural: Melissa grows up in a middle‑class, suburban family in Largo, Florida. Her household celebrates typical American holidays such as Thanksgiving, Christmas, and the Fourth of July, and she occasionally
    participates in community events like the Pinellas County fair and local beach clean‑ups. Her family’s cultural roots are primarily European‑American, and she attends a public elementary school that
    includes multicultural curricula. Weekly visits to a local Methodist church provide a sense of community, and the warm, coastal environment of the Gulf of Mexico influences her love for swimming and
    beach‑related activities.
