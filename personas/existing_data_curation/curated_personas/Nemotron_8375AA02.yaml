  career_goals: Melissa dreams of a future where she can explore the ocean as a marine biologist, investigating sea turtles and coral reefs. She also imagines herself as a teacher who can share knowledge
    in a clear, organized way. Her competitive spirit pushes her to aim for winning a science fair or a regional spelling competition. Another ambition is to become a veterinarian to care for animals, reflecting
    her love for pets and wildlife.
