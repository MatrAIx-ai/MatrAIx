persona_description: A professional in the field of urban planning and design, who is interested in implementing and evaluating crime prevention strategies through environmental design. They are likely
  to be familiar with the concepts and methods of CPTED (Crime Prevention Through Environmental Design) and have experience in the application of design-based approaches to crime prevention. They may have
  a background in sociology, criminology, or urban studies, and be interested in the ethical and practical implications of these approaches. They may also be interested in the broader implications of design-based
  approaches to crime prevention, such as their potential to reduce fear of crime but not address the root causes of crime.
