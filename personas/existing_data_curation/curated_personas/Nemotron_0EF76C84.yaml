    compassionate interaction'', ''First aid for animals'', ''Flexible scheduling and quick problem solving'']'
  hobbies: '[''Gardening (vegetable and flower beds)'', ''Reading historical fiction'', ''Cooking comfort foods with a traditional touch'', ''Biking local trails'', ''Birdwatching'', ''Knitting'', ''Occasional
    weekend road trips with spouse'', ''Participating in community fairs and craft stalls'']'
  career_goals: Elizabeth aims to deepen her expertise by obtaining the Veterinary Assistant Certified (VA‑C) credential and completing an associate degree in animal science at a community college. Her
    medium‑term goal is to become a lead animal caretaker, supervising a small team and overseeing lab animal welfare programs. She envisions taking on more administrative responsibilities—such as managing
    inventory, scheduling, and staff training—while preserving a work‑life balance that allows quality time with her husband. Long‑term, she hopes to open a modest, home‑based pet‑care service that offers
    boarding, grooming, and basic health checks for local families, leveraging her practical skills and community connections.
