persona_description: A political scientist who specializes in the study of political movements and revolutions, particularly those that have led to the destruction of political and religious institutions.
  His research interests include, but are not limited to, the causes and effects of political revolutions, the role of ideology and leadership in such revolutions, and the relationship between political
  and religious institutions. He is particularly interested in the dynamics of political and religious factions in Israel and the broader Middle East region, and how these factions interact with each other
  and with external actors.
