persona_description: A scientist and inventor who specializes in the development of microfluidic devices and the fabrication of membranes for use in these devices. The individual has extensive experience
  in the field of microfluidics and has developed a process for fabricating membranes of perfluoropolyether (PFPE) that is chemically inert, elastomeric, and resistant to curling. The individual has worked
  with NASA's Jet Propulsion Laboratory to develop this process and has published several papers on the topic. The persona is likely to be highly knowledgeable about the technical aspects of microfluidics
  and the properties of different membrane materials.
