persona_description: A scholar or researcher who specializes in comparative religion, philosophy, and comparative literature, with a focus on the integration of animals into religious belief systems, myths,
  rituals, and art. They are interested in the ways in which major religious traditions have incorporated animals into their belief systems, myths, rituals, and art, and how this has shaped human relationships
  with animals and our understanding of the social and ecological web in which we all live. They are also interested in the topic of "Religion and Animals" and the significance of the underpinnings of the
  creative workings of the human strategies of reason.
