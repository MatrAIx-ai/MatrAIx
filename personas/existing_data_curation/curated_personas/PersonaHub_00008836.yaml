persona_description: A historian or archaeologist who specializes in the study of ancient Greek art and sculpture, particularly focusing on the kore type of statue. They are interested in the development
  of the kore type in Greek sculpture, the meanings behind the different features and details of the statues, and the cultural and social context in which they were created. They are also knowledgeable
  about the Acropolis of Athens and the Korai of the Acropolis, and are interested in the theories surrounding the representation of mortals or deities in the statues. They may have a background in art
  history, archaeology, or related fields and have a strong interest in ancient Greek art and culture.
