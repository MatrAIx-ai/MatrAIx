personas:
  professional: Michael Melton is a budding LEGO architect who blends imaginative builds with meticulous sorting, turning curiosity into practical creations while they eagerly share models with friends
    to foster cooperative play.
  sports: Michael Melton kicks the ball for the Raleigh Juniors Soccer Club, pedals their bike along neighborhood trails every Saturday, and they enthusiastically cheer for Charlotte FC during televised
    matches, balancing structured practice with spontaneous backyard games to stay fit.
  arts: Michael Melton draws whimsical comic strips inspired by Calvin and Hobbes, builds LEGO dioramas that double as mini‑stage sets, and they hum along to Disney soundtracks like "Let It Go," merging
    their love of storytelling with visual creativity.
  travel: Michael Melton enjoys family road trips to the Outer Banks for beachcombing, weekend visits to the Children’s Museum in Durham, and they dream of seeing the fireworks over the National Mall in
    Washington, D.C., preferring itineraries that blend educational stops with playful exploration.
  culinary: Michael Melton relishes Sunday fried chicken with collard greens, helps harvest tomatoes from the backyard garden for fresh salsa, and they proudly assemble their own mac‑and‑cheese bowls, albeit
    sometimes sneaking extra cookies when no one’s looking.
  core: Michael Melton mixes a curious mind, Southern community spirit, and a penchant for organized play into a life of building, sharing, and caring, even if that sometimes means they forget to finish
    homework before LEGO time.
background:
  cultural: Michael grew up in Raleigh, North Carolina, within a middle-class, predominantly white family that embraces Southern hospitality and community values. His upbringing includes regular celebrations
    of regional traditions such as Fourth of July fireworks, local farmers' market visits, and Sunday family meals featuring Southern comfort foods like fried chicken and collard greens. The community emphasizes
    kindness, cooperation, and respect for nature, which aligns with Michael's compassionate and cooperative personality.
