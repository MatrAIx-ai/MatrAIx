personas:
  professional: Yen Ho, a seasoned secondary humanities educator, designs meticulously structured lesson plans and data-driven curricula that blend classic literature with quiet, reflective classroom environments,
    leveraging their fluency in English and Mandarin to support diverse learners while they quietly steer toward instructional leadership.
  sports: Yen Ho, a solitary hiker who frequents Angeles National Forest trails, supplements the quiet walks with weekly yoga and occasional pick-up basketball at a local community center, avidly follows
    the Los Angeles Lakers and Dodgers, and is a member of the Angeles Hiking Club, preferring low-impact exercise that aligns with their need for calm.
  arts: Yen Ho finds solace in the cadence of Shakespearean sonnets and the brushstrokes of traditional calligraphy, regularly reads poetry by Li Bai and writes essays in a private journal, while their
    musical palate includes the cello works of Yo-Yo Ma, ambient compositions by Nils Frahm, and the films of Hayao Miyazaki, which together shape a reflective artistic identity.
  travel: Yen Ho prefers meticulously planned trips to tranquil destinations, such as a solo pilgrimage to Kyoto’s Zen gardens, a weekend retreat at the Canadian Rockies, and a cultural immersion in Lisbon’s
    historic neighborhoods, balancing a modest budget with a desire for contemplative experiences while avoiding crowded tourist hotspots.
  culinary: Yen Ho, a competent home cook, delights in hand-rolling dim sum dumplings, simmering aromatic pho broth with star anise, ginger, and fresh basil, and they often experiment with fermented tofu
    and shiitake mushrooms, while savoring the quiet ritual of plating each dish as a meditative practice.
  core: Yen Ho is a meticulously organized, introverted educator who channels anxiety into disciplined routines, solitary hikes, and quiet creative pursuits, often juggling a penchant for control with a
    secret love for spontaneous midnight poetry.
background:
  cultural: Yen Nua Ho is a second-generation East Asian American, born to parents who emigrated from Taiwan in the late 1980s. Growing up in the multicultural environment of Southern California, she was
    raised in a bilingual household that celebrated Lunar New Year, the Mid-Autumn Festival, and traditional values emphasizing education, family duty, and respect for elders. Her parents instilled a strong
    work ethic and a reverence for academic achievement, which shaped Yen's practical, structured approach to teaching. While fully integrated into American culture, she maintains ties to her heritage through
    language use, culinary traditions, and participation in local Taiwanese community events in the Los Angeles area. This bicultural perspective informs her teaching, allowing her to incorporate East Asian
    historical and literary viewpoints into her humanities curriculum.
attributes:
  skills: '[''Lesson Planning'',''Curriculum Development'',''Classroom Management'',''Assessment Design'',''Data-Driven Instruction'',''Educational Technology Integration'',''Bilingual Communication (English
