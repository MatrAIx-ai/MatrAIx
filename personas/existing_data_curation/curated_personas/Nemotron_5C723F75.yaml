  hobbies: '[''Reading classical literature'',''Creative writing (poetry & essays)'',''Chinese calligraphy'',''Solo hiking in Angeles National Forest'',''Yoga and meditation'',''Cooking traditional East
    Asian dishes'',''Learning Japanese'',''Puzzle solving (crosswords, Sudoku)'',''Listening to instrumental music'']'
  career_goals: Yen aims to advance into instructional leadership within her district, seeking a department chair or curriculum specialist role that will allow her to shape humanities programs at a systemic
    level. She plans to earn a Master's degree in Education with a focus on curriculum design and student mental health integration, intending to develop a school-wide framework for supporting anxious learners.
    Yen is also passionate about creating a specialized elective on Asian diaspora literature, hoping to publish her curriculum guide and present at regional education conferences. Ultimately, she aspires
    to influence policy that fosters quieter, more predictable classroom environments, while balancing her professional ambitions with strategies for managing her own emotional reactivity.
