personas:
  professional: Johnnie Ager, a seasoned pastor with a background in STEM, merges theological scholarship and scientific literacy to deliver sermons that entwine speculative philosophy, heads interfaith
    dialogues, writes persuasive grant proposals, and oversees church operations with methodical precision, while they mentor emerging clergy and nurture compassionate community leadership.
  sports: Johnnie Ager stays active by leading a senior walking hike group through the rolling hills of Jackson County, cheering on the Cleveland Guardians during baseball season, and participating in the
    local bridge club, which they treat as a mental sport that sharpens strategic thinking.
  arts: Johnnie Ager spends weekends painting watercolors of the Ohio countryside inspired by John James Audubon and Andrew Wyeth, practices organ repertoire ranging from J.S. Bach to Olivier Messiaen,
    and volunteers at the community theater where they relish productions starring Meryl Streep and the musical dynamism of Lin‑Manuel Miranda’s Hamilton.
  travel: Johnnie Ager favors travel that blends curiosity with comfort, often exploring the scenic trails of Hocking Hills State Park and planning pilgrimages to historic sites like Canterbury Cathedral
    in England, while they prioritize low‑cost train journeys over expensive flights to keep travel expenses modest.
  culinary: Johnnie Ager enjoys farm‑to‑table cooking, frequently preparing a hearty chicken and wild rice soup seasoned with rosemary and thyme harvested from the church garden, and delighting in a seasonal
    apple crisp topped with a crunchy oat crumble and a dash of cinnamon.
  core: Johnnie Ager is a contemplative pastor‑scientist who swaps hymn books for star charts, tends a garden by day and a watercolor canvas by night, and never misses a chess move, even if it means staying
    up past bedtime.
background:
  cultural: Johnnie grew up in a Midwestern, white, Protestant family in rural Ohio, with ancestry tracing back to German and Irish immigrants. The values of self‑reliance, modesty, community service, and
    a strong work ethic are deeply ingrained. His upbringing in the close‑knit towns of Jackson County fostered a sense of collective responsibility and respect for tradition, while his higher education
    in STEM and later ministry broadened his worldview, allowing him to blend scientific curiosity with spiritual practice in a way that resonates with the local community.
