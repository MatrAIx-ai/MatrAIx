personas:
  professional: Carmen Brito, a bilingual elementary and middle school teacher in Bayamón who blends curiosity for cutting‑edge pedagogical research with a practical focus on meeting curriculum standards,
    leverages data‑driven assessments and technology like Google Classroom, and competes fiercely for excellence, aiming for Teacher of the Year and a future role as curriculum specialist.
  sports: Carmen Brito, an avid participant in community yoga sessions, a regular early‑morning walker along the Bayamón River, and a seasonal fan of Bayamón FC soccer who joins weekend pickup basketball
    games, balances a love for low‑impact fitness with occasional competitive spirit when tracking personal step counts against friends.
  arts: Carmen Brito, who finds creative release dancing salsa and plena at local festivals, attends live performances by artists such as Marc Anthony and Celia Cruz, and collects works by Frida Kahlo and
    Pablo Picasso, integrates these cultural and artistic inspirations into lesson plans, and occasionally sketches in a journal as a way to unwind.
  travel: Carmen Brito, a planner who prefers fully mapped itineraries, has explored the historic streets of Old San Juan and the beaches of Culebra, dreams of visiting Seville’s Alcázar for its Moorish
    architecture, and balances travel cost constraints by pairing weekend trips with budget‑friendly homestays.
  culinary: Carmen Brito, a confident home cook who perfects arroz con gandules using sofrito, adobo, and green peas, layers plantain mofongo with garlic and pork cracklings for intimate dinner parties,
    experiments with coconut milk in sauces, and still struggles to master tempering chocolate for desserts.
  core: Carmen Brito is a driven, detail‑oriented educator who channels competitive curiosity into both classroom innovation and meticulously planned personal pursuits, from budgeting and wellness routines
    to culturally rich cooking and community involvement.
background:
  cultural: Carmen was raised in Bayamón, a lively municipality known for its bustling markets, vibrant street festivals, and strong sense of community. Growing up in a bilingual household, she navigated
    both Spanish and English daily, which shaped her appreciation for cultural duality and informed her teaching philosophy. Family gatherings centered around traditional foods, music, and storytelling
    reinforced her connection to Puerto Rican heritage, while her school experience exposed her to the island's educational challenges and the resilience of its students. This background fuels her commitment
    to honor local culture in the classroom, promote bilingual proficiency, and celebrate the island's rhythmic traditions, all while remaining attuned to contemporary educational standards.
attributes:
  skills: '[''Classroom management'', ''Differentiated instruction'', ''Bilingual education (Spanish‑English)'', ''Curriculum development'', ''Assessment design'', ''Technology integration (Google Classroom,
    interactive whiteboards)'', ''Data‑driven instruction'', ''Special education support (IEP implementation)'', ''Parent‑teacher communication'', ''Professional development facilitation'', ''Conflict resolution'',
    ''Project‑based learning'', ''Cultural competency'']'
  hobbies: '[''Reading educational psychology'', ''Journaling classroom reflections'', ''Cooking Puerto Rican cuisine'', ''Salsa and plena dancing'', ''Walking by the Bayamón River'', ''Yoga for stress
    management'', ''Volunteering as a tutor'']'
  career_goals: Carmen aims to complete her bachelor's degree in Education within the next two years and pursue a master's in Curriculum and Instruction. She aspires to become a lead teacher and eventually
    a curriculum specialist for the Bayamón school district, leading initiatives that embed bilingual and culturally responsive practices. Her competitive nature fuels a desire to earn the "Teacher of the
    Year" accolade and present research on stress‑reduction strategies for teachers at regional conferences. She also plans to develop a community after‑school program that blends STEM projects with Puerto
    Rican cultural themes, leveraging her curiosity for innovative curricula while remaining grounded in practical outcomes for student achievement.
