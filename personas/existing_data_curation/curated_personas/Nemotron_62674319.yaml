  hobbies: '[''Digital Painting'', ''Mixed Media Art'', ''Pottery'', ''Hiking'', ''Yoga'', ''Science Fiction Reading'', ''Philosophy Reading'', ''Community Health Volunteering'', ''Molecular Gastronomy'',
    ''Photography'']'
  career_goals: Over the next five to ten years, Jessica aims to earn a certification in health informatics and transition into a senior clinical technologist role where she can lead a multidisciplinary
    team to design patient‑centered imaging workflows. She is passionate about integrating AI‑driven analysis tools into routine diagnostics to enhance accuracy and efficiency. Jessica hopes to mentor emerging
    technologists, spearhead quality‑improvement initiatives, and eventually serve as a clinical applications specialist for a leading medical‑device manufacturer, bridging technology development with patient
    advocacy. Additionally, she intends to expand her involvement in community health education by organizing workshops on health‑technology literacy for residents of Dububin​e and surrounding areas.
