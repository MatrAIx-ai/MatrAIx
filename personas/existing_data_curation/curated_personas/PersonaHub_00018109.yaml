persona_description: An archaeologist who specializes in the study of Roman villas and their evolution, particularly in the context of the early Roman period. She is a keen observer of the evidence and
  is not afraid to challenge the traditional narratives that have been accepted for too long. Her expertise extends to the use of new evidence, such as forensic archaeology, to shed light on the violent
  assault in the Neolithic period. She is also interested in the transformation of the landscape from 17th century farmland to squalid, overcrowded 19th century urban slums, and in the survival of Roman
  culture in the aftermath of the Germanic takeover of Eastern England.
