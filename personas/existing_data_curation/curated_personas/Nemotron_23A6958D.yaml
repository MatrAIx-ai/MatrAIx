personas:
  professional: Kah Marumoto is a veteran court reporter and simultaneous captioner who delivers real-time transcripts at over 225 wpm for high‑stakes legal proceedings and live performances, blending meticulous
    legal knowledge with a curiosity for AI‑assisted tools, while their laid‑back attitude toward deadlines sometimes leads to last‑minute workflow adjustments.
  sports: Kah Marumoto enjoys hiking the trails of Red Rock Canyon with the local Vegas Hikers club and practices sunrise yoga at Sunset Park, while cheering on the Las Vegas Raiders in football season
    and the Vegas Golden Knights during the NHL playoffs, rarely participating in organized team sports.
  arts: Kah Marumoto immerses themselves in Las Vegas’s avant‑garde theatre scene, attending productions by Punchdrunk and What‑If Studio, regularly visits contemporary galleries featuring artists like
    Ai Weiwei and Banksy, and refines their own creativity through sumi‑e ink painting and calligraphy, often drawing inspiration from the rhythmic compositions of Brian Eno.
  travel: Kah Marumoto prefers spontaneous, flexible trips that blend cultural immersion and natural scenery, having recently explored the deserts of Sedona, the historic streets of Barcelona, and the tea
    houses of Kyoto, while keeping a wish list that includes the vineyards of Tuscany and a week‑long retreat in Iceland’s geothermal spas.
  culinary: Kah Marumoto is an adept home chef who finds meditative calm in preparing traditional dishes such as miso soup, sushi rolls with tamari, and tempura vegetables, favoring ingredients like kombu,
    tofu, and fresh shiso, and occasionally dines out at upscale ramen spots for a taste of authentic broth.
  core: Kah Marumoto blends razor‑sharp transcription expertise with a wandering artistic soul, navigating deadlines and desert hikes alike, all while juggling a love for spontaneous art ventures, mindful
    yoga, and occasional financial oversights.
background:
  cultural: Kah Kan Marumoto is a second‑generation Japanese‑American whose parents immigrated from Osaka in the 1970s. Raised in the suburban communities of Southern Nevada, she attended a bilingual weekend
    school that kept her fluent in both Japanese and English. Family traditions—such as preparing sushi and mochi, celebrating Japanese New Year, and practicing tea ceremony—instilled a respect for discipline,
    subtlety, and quiet contemplation. While she maintains strong ties to her heritage through participation in Nisei Week, calligraphy workshops, and regular communication with relatives in Japan, she
    also embraces the eclectic, vibrant culture of Las Vegas, especially its thriving entertainment and arts sectors. Her East Asian background informs her meticulous work ethic and attention to detail,
    whereas her American upbringing nurtures independence and openness to unconventional experiences, shaping her unique blend of professional precision and artistic curiosity.
attributes:
  skills: '[''Stenography'', ''Real-time Captioning'', ''Legal Terminology'', ''Fast Typing (225+ wpm)'', ''Captioning Software (WinCAP, ATP, EZ Access)'', ''Audio Quality Troubleshooting'', ''Accessibility
    Standards (ADA)'', ''Multilingual Captioning (Japanese/English)'', ''Technical Editing'', ''Stress Management under Pressure'']'
  hobbies: '[''Photography'', ''Sumi-e Ink Painting'', ''Japanese Cooking'', ''Yoga and Meditation'', ''Reading Contemporary Literature'', ''Hiking in Red Rock Canyon'', ''Visiting Art Galleries'', ''Learning
    Spanish'', ''Calligraphy'', ''Playing Shogi'']'
  career_goals: Kah Kan aims to evolve from a freelance captioner into a strategic leader in accessibility services. She plans to launch a boutique consultancy that partners with Las Vegas productions,
    conferences, and courts to embed real-time captioning and AI‑enhanced transcription solutions. Pursuing the NCRA Certified Real‑Time Reporter credential, she intends to develop training modules for
    emerging captioners and expand multilingual offerings, particularly Japanese‑English, to serve Nevada's growing Asian‑Pacific audience. Leveraging her business degree, she will build sustainable revenue
    models through subscription‑based captioning platforms and advocate for comprehensive accessibility policies within the entertainment industry.
