  hobbies: '[''Salsa dancing'', ''Cuban cultural festivals'', ''Pickup soccer'', ''Beach volleyball'', ''Exploring restaurants'', ''Spontaneous weekend trips'', ''Morning runs'', ''Meditation'', ''Cooking
    Cuban cuisine'']'
  career_goals: Eduardo aims to progress to a senior underwriting manager position within the next five years, overseeing a team and shaping underwriting guidelines for his agency. He plans to earn the
    Chartered Property Casualty Underwriter (CPCU) designation to deepen his technical knowledge. He is also interested in leading the implementation of a more flexible, digital underwriting workflow that
    balances his love of routine with the need for rapid decision-making on complex cases. He seeks to improve his stress-management and time‑management skills to better handle the pressures of high‑stakes
    underwriting. Ultimately, he aspires to move into a strategic risk‑management role where he can influence product development while ensuring financial stability for his family.
