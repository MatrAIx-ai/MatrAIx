  career_goals: Mohammed aims to earn a bachelor’s degree in education and subsequently a master’s in applied arts or instructional design, positioning himself for a future role as a department chair or
    program director. He aspires to develop an interdisciplinary curriculum that merges visual arts with emerging digital media, secure grant funding for community‑based art initiatives, and become a recognized
    speaker on innovative teaching practices for adult learners. Long‑term, he hopes to influence regional education policy to broaden access to arts education in underserved parts of Alabama.
