personas:
  professional: Mohammed Coats, a 39‑year‑old postsecondary instructor, blends adult‑learning theory, curriculum design, and multimedia production into flexible yet meticulously organized visual‑arts courses,
    and their skeptical eye and competitive streak constantly push them to refine teaching methods and outpace peer benchmarks.
  sports: Mohammed Coats, a 39‑year‑old outdoor enthusiast, roots their fandom in the Alabama Crimson Tide and the local Bibb County High School football team, they participate in the Cahaba River Bass
    Club for seasonal fishing and join a regional trail‑running group for weekend hikes, and they prefer low‑key cardio over high‑intensity competition.
  arts: Mohammed Coats, a 39‑year‑old visual artist and musician, spends evenings sketching in the style of William H. Johnson, photographing Southern marshes with an eye toward Georgia O'Keeffe's motifs,
    playing acoustic renditions of Sturgill Simpson at the downtown open‑mic venue, and they volunteer at community art workshops inspired by Kehinde Wiley's inclusive practice.
  travel: Mohammed Coats, a 39‑year‑old aspiring cultural explorer, has road‑tripped to New Orleans, Asheville, and Savannah, they meticulously plan weekend escapes while leaving room for spontaneous detours,
    and they dream of studying Renaissance art in Florence and contemporary design in Amsterdam, balancing a modest travel budget with a desire for global perspective.
  culinary: Mohammed Coats, a 39‑year‑old home chef, reimagines classic shrimp and grits with miso glaze, slow‑cooks collard greens with smoked paprika, experiments with gochujang‑marinated barbecue ribs,
    perfects banana pudding using fresh vanilla bean, and they showcase intermediate cooking skills that blend Southern roots with global flavors.
  core: Mohammed Coats, at 39, blends Southern hospitality with an unquenchable curiosity, they teach with organized flexibility, compete fiercely in art and finance, and habitually over‑indulge in premium
    supplies while maintaining a skeptical yet resilient outlook.
background:
  cultural: Mohammed is a white Southern man who grew up in rural Alabama. His upbringing is steeped in Deep South traditions—church gatherings, high‑school football culture, family barbecues, and a strong
    sense of community hospitality. While he values these regional roots, his innate curiosity has led him to blend Southern values with broader artistic and intellectual influences. He navigates the conservative
    norms of his hometown while embracing progressive ideas through his work in education and the arts. This combination of modest, self‑reliant Southern ethos and openness to new perspectives shapes his
    worldview and interpersonal style.
