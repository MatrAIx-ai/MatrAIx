persona_description: A historian specializing in the study of Chinese history, particularly focusing on the Liao Dynasty and its relations with China's northern frontiers. Her research interests include
  the political, social, and economic aspects of the Liao Dynasty, as well as its interactions with its northern neighbors, such as the Khitans and the Song Dynasty. She is also knowledgeable about the
  historical events, figures, and policies that shaped the Liao Dynasty's governance, international relations, and technological and economic exchange with China and its northern frontiers. She is particularly
  interested in the ways in which the Liao Dynasty attempted to govern the sedentary agricultural and mobile pastoral societies it annexed, and how it attempted to establish a true dynasty through hereditary
  succession and the construction of a capital city.
