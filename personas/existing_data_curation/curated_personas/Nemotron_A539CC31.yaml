  hobbies: '["Vegetable gardening","Woodworking","Model train building","Reading technical journals and historical nonfiction","Playing chess","Cooking Vietnamese cuisine","Walking the Delaware River trail","Volunteering
    teaching seniors basic computer skills"]'
  career_goals: Approaching retirement, Tho aims to shift from day‑to‑day operations to a consulting and mentorship role. He plans to provide part‑time IT consulting for small businesses in Warren County,
    helping them implement secure, well‑documented systems while preserving operational stability. He also aspires to teach introductory computer science and cybersecurity courses at the local community
    college, sharing his structured approach with the next generation. Additionally, Tho hopes to volunteer his technical expertise for non‑profit organizations that serve senior citizens, ensuring they
    have reliable access to technology. His ultimate ambition is to leave a legacy of well‑organized, resilient IT practices that continue to benefit his community after he steps back from full‑time work.
