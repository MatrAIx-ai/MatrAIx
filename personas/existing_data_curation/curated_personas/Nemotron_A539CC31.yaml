personas:
  professional: A seasoned IT consultant, Tho Tieu, translates three and a half decades of network architecture, cybersecurity, and automation scripting into part‑time mentorship for small Warren County
    businesses, obsessively drafting SOPs, disaster‑recovery playbooks, and training manuals that reflect their love of structure, predictability, and community service.
  sports: A low‑impact fitness enthusiast, Tho Tieu, walks the Delaware River trail three times a week, participates in a senior walking club, follows the New York Giants during football season, and enjoys
    occasional rounds of lawn bowling at the local community center, all while maintaining a disciplined routine that balances activity with ample rest, which they consider essential for longevity.
  arts: An avid creator, Tho Tieu, spends weekends woodworking benches inspired by Frank Lloyd Wright, assembles model‑train dioramas to the soundtrack of traditional folk singer Trịnh Công Sơn, reads historical
    nonfiction by Doris Kearns Goodwin, and attends community theater productions of Shakespeare, finding solace in structured artistic expression that they cherish.
  travel: A methodical traveler, Tho Tieu, plans each trip on a spreadsheet, has already explored historic Williamsburg, Virginia, and Shenandoah National Park, dreams of attending a lunar‑new‑year temple
    festival in Taipei, and prefers weekend getaways that combine cultural immersion with manageable driving distances, all within a modest budget that they guard jealously.
  culinary: A seasoned home chef, Tho Tieu, prepares bánh chưng, phở broth, and fresh rice‑paper rolls using herbs like cilantro, Thai basil, and star anise harvested from their own garden, balances traditional
    techniques with modern tools like a sous‑vide circulator, and, despite occasional over‑salting, delights family members each Tet and other celebrations with meticulously timed meals that they consider
    a culinary homage to their ancestors.
  core: Tho Tieu, a detail‑oriented technophile with a green thumb and a heart rooted in seasonal rituals, blends disciplined planning with quiet generosity, though they sometimes hoard spare change for
    future model‑train projects.
background:
  cultural: Born to Vietnamese immigrant parents who settled in New Jersey after the Vietnam War, Tho grew up in a bilingual household that valued both Vietnamese traditions and American values. He celebrates
    Tet each year, preparing traditional dishes such as bánh chưng and phở, and participates in local Vietnamese community gatherings at the nearby cultural center. He maintains fluency in Vietnamese, which
    he uses when conversing with older relatives and neighbors, and he frequently shares stories of his heritage with his grandchildren. While fully integrated into the broader Phillipsburg community, he
    retains a strong sense of cultural identity through food, language, and participation in Buddhist temple events and community service projects that benefit both Vietnamese and non‑Vietnamese residents.
