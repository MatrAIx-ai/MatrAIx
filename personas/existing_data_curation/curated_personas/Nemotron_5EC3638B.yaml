  career_goals: Napoleon aims to turn his solo barbershop into a community landmark in Fresno. Over the next five years he plans to expand the space, add a training corner for aspiring barbers, and launch
    his own line of natural grooming products that cater to textured hair. He intends to formalize his business knowledge by completing a short business‑management certificate at a local community college,
    which will help him streamline bookkeeping and reduce financial stress. Building a strong online presence through Instagram and TikTok is also a priority, as he wants to showcase his work, attract a
    broader clientele, and stay competitive. Ultimately, he aspires to achieve financial stability that will allow him to support his teenage daughter and retire with a solid legacy in the local African‑American
    barbering tradition.
