  hobbies: '[''Visiting art galleries'', ''Sketching and life drawing'', ''Community art fairs volunteering'', ''Outdoor concerts and festivals'', ''Potluck gatherings'', ''Acrylic painting on canvas'',
    ''Mixed-media collages'', ''Gardening'', ''Cooking experimental meals'', ''DIY home decor projects'']'
  career_goals: Katie aims to transition from subcontractor to owner‑operator of a boutique painting and decorative‑finishes company that emphasizes custom mural work and environmentally friendly paints.
    She wants to build a reputation for creative solutions, mentoring apprentices, and collaborating with local artists on community projects. Over the next five years, she hopes to secure contracts with
    schools and small businesses, host occasional workshops on DIY wall art, and eventually open a small studio where she can sell her own canvas paintings alongside her service offerings.
