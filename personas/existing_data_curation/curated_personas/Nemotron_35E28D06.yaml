personas:
  professional: Katie Benton is a seasoned painting contractor who has turned her applied arts associate degree into a thriving hands‑on business, blending technical expertise in surface preparation, faux
    finishes, and specialty wall coverings with an innate knack for color storytelling; they run a boutique service focused on custom murals and eco‑friendly paints, mentor apprentices on the job site,
    and routinely collaborate with local Chicago artists on community school projects, all while juggling a relaxed, flexible schedule that leaves room for spontaneous creative bursts.
  sports: Katie Benton is a die‑hard fan of the Chicago Bulls and cheers for the Chicago Cubs each summer, while their own fitness routine consists of weekend bike rides along the Lakefront Trail, casual
    volleyball matches with the community center's "Lakeview Spikers" club, and a seasonal commitment to a local adult softball league that runs from May to September.
  arts: Katie Benton immerses herself in the Chicago art scene, regularly attending exhibitions at the Art Institute of Chicago and the Museum of Contemporary Art, where they draw inspiration from artists
    like Georgia O'Keeffe, Theaster Gates, and contemporary muralist Maya Hayuk; they also host monthly sketch meet‑ups at the Logan Square community garden, curate a pop‑up collage showcase featuring works
    by local high school students, and keep a personal playlist of indie folk and lo‑fi beats from artists such as Bon Iver and Khruangbin while painting.
  travel: Travel for Katie Benton is a blend of curated art pilgrimages and spontaneous road trips; they have visited the vibrant murals of Barcelona, explored the historic art colonies of Santa Fe, and
    taken a weekend escape to the secluded lakeside town of Galena, Illinois, where they participated in a community art fair, while dreaming of a future getaway to Marrakech to study its tilework and color
    palettes, all planned on a flexible itinerary that balances budget constraints with the desire to capture new inspiration.
  culinary: In the kitchen, Katie Benton experiments with farm‑to‑table dishes, often turning garden harvests into rustic roasted beet and goat cheese salads, a spicy quinoa‑stuffed bell pepper stew seasoned
    with smoked paprika, and a weekend indulgence—hand‑rolled ravioli filled with ricotta, spinach, and fresh basil; they favor high‑quality olive oil, heirloom tomatoes, and locally sourced artisanal sourdough,
    yet they have a guilty pleasure of occasionally over‑seasoning a dish with extra chili flakes while listening to classic jazz records.
  core: Katie Benton is a 42‑year‑old painting entrepreneur who blends artistic curiosity with a relaxed, slightly disorganized approach, loves community art, occasionally splurges on pigments, and juggles
    garden‑fresh meals with a penchant for spontaneous mural projects.
background:
  cultural: Katie grew up in a small Midwestern town in Illinois, part of a close‑knit white, working‑class community where church gatherings and local sports events shaped social life. The region’s emphasis
    on practicality, self‑reliance, and neighborly support influenced her values of cooperation and flexibility. While she embraces mainstream American cultural norms, she also appreciates the diverse artistic
    influences that flow through nearby urban centers, integrating those ideas into her work and community involvement.
attributes:
