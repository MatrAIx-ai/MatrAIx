  hobbies: '[''Low‑Impact Aerobics Classes'', ''Line Dancing'', ''Gardening'', ''Fishing on the Potomac River'', ''Card Game Nights (Poker, Bridge)'', ''Washington Capitals Hockey Fan'', ''Washington Football
    Team Supporter'', ''Volunteer Food Pantry Work'', ''Local Civil War History Tours'', ''Reading Mystery Novels'', ''Listening to Classic Rock Music'']'
  career_goals: Looking ahead, Marcus aims to transition into a senior inventory supervisor role where he can apply his deep operational knowledge to oversee multiple warehouse sections and mentor a larger
    team. He plans to earn a Certified in Production and Inventory Management (CPIM) credential within the next two years to formalize his expertise and boost his confidence. Reducing workplace stress is
    a priority, so he wants to implement streamlined SOPs that eliminate bottlenecks and improve safety records. Over the next five years he hopes to secure a stable, part‑time consulting position that
    allows him to share best‑practice insights while maintaining work‑life balance, ultimately leading to a comfortable retirement with the ability to continue volunteer work in his community.
