persona_description: A biologist who specializes in the study of endochemistry and exochemistry, particularly in the evolution of multicellular organisms and the role of toxins and pheromones in communication.
  Their research interests include, but are not limited to, the structure and function of cell membranes, the role of proteins in transport and communication, and the role of exochemicals in evolution and
  communication. They are also interested in the classification of viruses as living organisms and the ways in which they evade detection by the immune system.
