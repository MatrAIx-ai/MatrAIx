  career_goals: In the short term, Maci aims to win the upcoming regional art competition, become the anchor of her middle school's news broadcast, and earn a spot in the competitive STEM and arts magnet
    program at a nearby high school. Long‑term, she dreams of turning her love for art and storytelling into a career as a museum curator or documentary filmmaker, combining her curiosity for new ideas
    with her knack for organizing exhibitions and presenting them to the public. She also envisions speaking at youth conferences to inspire other students to explore creative pursuits and community leadership.
