personas:
  professional: Maci Jones, an aspiring graphic novelist and debate enthusiast, channels curiosity and methodical planning into weekly storyboard drafts that blend fantasy world‑building with razor‑sharp
    argument structures, often captivating classmates during open‑mic art nights.
  sports: Maci Jones, a midfield enthusiast on the Willow Spring United U12 soccer squad, follows a disciplined after‑school conditioning routine, while cheering for Charlotte FC and the UNC Tar Heels;
    they often organize mini‑tournaments with friends to satisfy a competitive streak.
  arts: Maci Jones cultivates a vibrant artistic identity by sketching characters inspired by graphic novelists Adrian Alphona and Joëlle Jones, experimenting with digital brushwork reminiscent of Hayao
    Miyazaki’s Studio Ghibli style, and curating stop‑motion shorts that debut at the community art fair; they capture everyday Southern life with a keen eye for color.
  travel: Maci Jones prefers weekend escapades to Raleigh’s museum of art and science, cherishes family road trips to Washington D.C.’s National Air and Space Museum, and dreams of an international backpacking
    adventure to Kyoto’s historic temples to gather inspiration for future fantasy worlds; they often sketch travel diaries on their tablet.
  culinary: Maci Jones enjoys crafting buttery biscuits and southern fried chicken for family brunch, whips up creamy carrot‑ginger soup during winter, and spends Saturday afternoons perfecting homemade
    pepperoni pizza topped with fresh mozzarella, basil, and a sprinkle of smoked paprika; they love experimenting with new spice blends whenever a recipe catches their eye.
  core: Maci Jones is a talkative, competition‑driven 12‑year‑old who fills every spare surface with doodles, meticulously plans art projects, and habitually checks group chats for hidden agendas, often
    questioning peers’ intentions.
background:
  cultural: Maci grew up in Willow Spring, a suburban community in Wake County, North Carolina. Her family lives in a predominantly white neighborhood where Southern hospitality and a close‑knit sense of
    community are common. She attends a local public middle school that emphasizes both academic achievement and extracurricular involvement, such as art, debate, and sports. Community traditions like county
    fairs, Fourth of July parades, and local church youth gatherings shape her social experiences. While she enjoys the slower pace of suburban life, the proximity to Raleigh provides exposure to larger
    cultural events, museums, and tech workshops, which feed her curiosity for new ideas and artistic expression. Her upbringing balances a respect for traditional values with encouragement to explore diverse
    creative avenues.
