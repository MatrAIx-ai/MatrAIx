persona_description: A historian who specializes in the study of the history of racial violence and lynchings in the United States. This historian is interested in understanding the motivations, methods,
  and consequences of lynching, and how it affected the lives of African Americans during the era of racial segregation and discrimination. This historian is particularly interested in the role of the media,
  law enforcement, and local communities in perpetuating the lynching phenomenon, and how it contributed to the perpetuation of racial inequality and oppression. This historian is also interested in the
  broader social and political context of lynching, and how it relates to the larger history of racial violence and discrimination in the United States.
