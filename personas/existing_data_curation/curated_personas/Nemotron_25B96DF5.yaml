personas:
  professional: Kayla Menon, a veteran volunteer historian at the Kinston Historical Society, leverages her storytelling flair, meticulous oral‑recording skills, and practical bookkeeping experience to
    curate community archives, mentor youth, and orchestrate heritage events, all while their spontaneous nature leads them to improvise exhibit layouts on the fly.
  sports: Kayla Menon, a member of the Kinston RiverWalkers senior walking club, enjoys leisurely strolls along the Neuse River, participates in low‑impact water‑aerobics at the community center, and passionately
    supports the Carolina Hurricanes and East Carolina Pirates, while treating bridge tournaments as a mentally competitive sport.
  arts: Kayla Menon, a choir‑singer and craft enthusiast, blends gospel hymns from the Oak Ridge Boys, classic country ballads by Dolly Parton, and hand‑knit scarves inspired by Appalachian motifs, and
    their spontaneous creativity often drives them to improvise quilting patterns mid‑project.
  travel: Kayla Menon, a budget‑conscious senior traveler, favors day‑trips by car to nearby historic sites such as the Wright Brothers National Memorial, the Blue Ridge Parkway vistas, and occasional visits
    to the Outer Bays, where they savor seaside breezes, but they avoid long‑haul flights due to health concerns.
  culinary: Kayla Menon, a master of Southern comfort cooking, delights in canning heirloom tomatoes, pickling okra, and simmering collard greens with smoked turkey, frequently improvising dishes like fried
    green tomatoes with a splash of buttermilk, and their competitive spirit drives them to perfect each family recipe.
  core: Kayla Menon, a 93‑year‑old garden‑loving historian with a sharp mind, a love of gospel choirs, and a relentless competitive streak, balances relentless curiosity with chronic worry and a habit of
    spontaneous creativity.
background:
  cultural: Kayla comes from a long‑standing white Southern family rooted in rural Lenoir County, North Carolina. Raised during the Great Depression and World War II, she grew up with values of thrift,
    self‑reliance, and strong community ties. Her upbringing was centered around the Baptist church, which provided moral guidance and a social hub. The cultural rhythm of Kinston—from its modest downtown
    to the surrounding farmlands—instilled in her a deep connection to the land, seasonal cycles, and Southern culinary traditions. Over the decades she witnessed the civil‑rights movement and the economic
    shifts that transformed eastern North Carolina, experiences that tempered her natural skepticism with an awareness of broader social change. These influences blend a respect for tradition with a lasting
    curiosity about the wider world.
