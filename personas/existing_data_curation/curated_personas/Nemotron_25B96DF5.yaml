  career_goals: Kayla’s ambitions remain focused on legacy, health, and continued contribution to her community despite her advanced age. She aims to complete a handwritten memoir that weaves together personal
    anecdotes, cherished recipes, and detailed family genealogies for her grandchildren and future generations. She wishes to continue volunteering at the local historical society, sharing oral histories
    of Kinston’s mid‑20th‑century life. Maintaining physical independence is a daily goal, so she tends her garden, walks the neighborhood, and follows a gentle exercise routine. Additionally, Kayla hopes
    to master digital photography to document her garden, family gatherings, and historic sites, creating a visual archive to accompany her written stories.
