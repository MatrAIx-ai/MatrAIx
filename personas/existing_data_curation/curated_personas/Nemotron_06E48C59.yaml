  hobbies: '["Quilting and hand‑sewing projects","Line dancing at community events","Volunteering at the county food pantry","Spontaneous weekend road trips with friends","Hiking local trails in Cooper
    County","Cooking family recipes","Reading contemporary romance novels","Playing intramural softball","Attending church potlucks"]'
  career_goals: Connie aims to advance from machine operator to lead seamstress or production supervisor within the next five years, seeking certification in apparel technology and a deeper understanding
    of textile engineering. She plans to leverage her some‑college studies in fashion design to eventually launch a small boutique offering custom‑tailored clothing and locally‑produced garments. Long‑term,
    she hopes to mentor younger workers in her community and possibly open a community sewing studio that provides skill‑building workshops.
