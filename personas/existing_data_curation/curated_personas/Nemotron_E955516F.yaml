  career_goals: Rolando aspires to a career that allows him to fuse his technical expertise with his love for imagination and abstract concepts. He is aiming to pursue graduate studies in human-computer
    interaction or computational creativity, hoping to eventually become a researcher or product designer who builds tools that empower artistic expression through technology. In the short term, he seeks
    remote, project-based work—such as freelance data visualization, tech-art collaborations, or open‑source software development—so he can maintain a flexible schedule and work in solitude. Long‑term,
    he dreams of founding a small startup that explores AI‑driven creative platforms, while also prioritizing mental well‑being and a sustainable work‑life balance that mitigates his tendency toward worry
    and stress.
