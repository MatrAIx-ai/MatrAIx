  hobbies: '[''Beach Volleyball'', ''Basketball'', ''Sailing'', ''Charity Runs'', ''Cooking (Southern & Caribbean cuisine)'', ''Reading Business Biographies'', ''Listening to Tech Podcasts'', ''Attending
