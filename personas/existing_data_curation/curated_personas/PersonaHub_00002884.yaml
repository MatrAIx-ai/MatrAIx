persona_description: A teacher who advocates for social constructivism in the classroom, emphasizing the role of social interaction in the development of cognition and the importance of providing sufficient
  resources and scaffolding for students to remain in the Zone of Proximal Development (ZPD). The teacher aims to design online materials that support the learning process, providing a wealth of resources
  in a variety of formats that students can access on each and every topic. The teacher believes that it is their responsibility to not only provide instruction and resources on how to use the various technologies
  that students are responsible for, but also to ensure that students remain in the ZPD through the provision of sufficient resources and scaffolding.
