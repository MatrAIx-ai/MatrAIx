personas:
  professional: Herman Pugh, a retired handyman and community center coordinator, applies his meticulous carpentry, plumbing, and budgeting expertise to mentor volunteers and preserve a historic church,
    embodying his methodical and assertive yet cooperative nature.
  sports: Herman Pugh enjoys leisurely morning walks through Riverside Park, follows the Atlanta Hawks and the local high school football team with fervor, and participates in a senior bowling league that
    meets every Thursday, keeping his activity level steady without overexertion.
  arts: Herman Pugh immerses himself in gospel choirs at his church, collects vintage blues records from B.B. King to Muddy Waters, regularly reads biographies of civil‑rights leaders, and expresses his
    creativity through woodworking projects that echo the rhythmic patterns of Southern jazz.
  travel: Herman Pugh prefers road trips in his restored classic sedan to historically rich destinations like Savannah, Charleston, and Washington, D.C., where he photographs civil‑rights landmarks, while
    his modest budget keeps trips short and often centered on family visits and local state fairs.
  culinary: Herman Pugh delights in preparing collard greens, cornbread, and black‑eyed peas seasoned with smoked ham from his garden’s fresh herbs, cooks with a well‑worn cast‑iron skillet, and enjoys
    pairing the meals with sweet tea and homemade pecan pie for church gatherings.
  core: Herman Pugh blends disciplined practicality with quiet curiosity, preserving community heritage through hands‑on mentorship, careful budgeting, and soulful Southern traditions.
background:
  cultural: Herman grew up as an African‑American in the rural‑suburban South during the civil‑rights era, deeply rooted in the traditions of the Black community in Georgia. The church has been a central
    pillar of his life, shaping his values of service, resilience, and communal solidarity. Family gatherings, soul food, and storytelling are integral to his identity, as are Southern gospel and blues
    music that accompany daily routines. He carries the pride of his ancestors' perseverance while embracing the evolving culture of Mableton, a town with a rich African‑American heritage. His background
    informs his commitment to mentorship, community involvement, and preserving the cultural memory of his neighborhood.
attributes:
  skills: '[''Home maintenance and repair'', ''Carpentry and woodworking'', ''Vehicle maintenance'', ''Personal budgeting and financial record keeping'', ''Community volunteer coordination'', ''Genealogy
