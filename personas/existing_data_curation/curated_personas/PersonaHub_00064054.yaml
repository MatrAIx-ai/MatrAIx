persona_description: A researcher and scientist who specializes in the study of avian phenology and survival, focusing on the interactive effects of climate and habitat on bird populations in California,
  Hawaii, Costa Rica, and Brazil. The persona uses long-term bird monitoring data to measure changes in breeding and molting phenology, and survival relative to climate. They often rely on model species
  to disentangle the interactive effects of climate and habitat on survival, and identify putative climatic refugia. The persona is interested in developing theories and models to predict avian richness
  in mainland habitat "patches" and studying bird communities within human-dominated landscapes and adjacent habitat patches. The persona has experience using technologies such as geolocators and other
  monitoring tools to study long-distance migration and short-distance and upslope migration of temperate birds.
