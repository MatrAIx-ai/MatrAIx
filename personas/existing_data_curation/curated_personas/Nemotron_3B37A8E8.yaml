personas:
  professional: At 25, Dwayne Davis is a retail salesperson in Enid who leverages their curiosity about product trends and practical problem‑solving to drive sales, while flexibly juggling training duties
    and inventory audits as they aim for a supervisory role within two years.
  sports: At 25, Dwayne Davis regularly joins pickup basketball games at the Enid community center, plays in a weekend softball league, roots for the Oklahoma City Thunder and the Dallas Cowboys, and maintains
    a casual fitness routine driven more by social camaraderie than structured training.
  arts: At 25, Dwayne Davis enjoys live music shows in Tulsa, often cheering on Chris Stapleton or the Avett Brothers, listens to entrepreneurship podcasts like "How I Built This", and unwinds with casual
    gaming sessions featuring "Fortnite" and "Mario Kart" with friends.
  travel: At 25, Dwayne Davis favors spontaneous road trips to nearby state parks such as Robbers Cave and Turner Falls, dreams of attending the Austin City Limits Festival, and balances travel budgeting
    with occasional splurges on boutique hotels during family getaways.
  culinary: At 25, Dwayne Davis loves Oklahoma‑style smoked brisket, pulled pork sandwiches, and onion burgers, experiments with quick sheet‑pan chicken fajitas at home, and frequently seeks out regional
    BBQ joints that serve sweet‑heat rubs featuring brown sugar and cayenne.
  core: At 25, Dwayne Davis blends a laid‑back, community‑focused lifestyle with entrepreneurial curiosity, juggling retail ambitions, spontaneous road trips, and a love of BBQ while battling occasional
    disorganization and a penchant for late‑night gaming.
background:
  cultural: Dwayne grew up in Enid, Oklahoma, a small Midwestern town with a tight‑knit community. As a white American from a working‑class family, he was raised with values of self‑reliance, hospitality,
    and civic involvement. Local traditions such as high school football games, county fairs, and church gatherings shaped his social life. Attending Northern Oklahoma College for a few semesters, he pursued
    business courses while working part‑time in retail, reinforcing a practical, hands‑on approach to learning. His marriage and connections to the local community influence his preference for flexible,
    family‑friendly career paths.
