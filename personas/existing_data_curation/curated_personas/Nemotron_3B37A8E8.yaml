  career_goals: Dwayne aims to move from floor associate to a supervisory role within the next two years, eventually becoming a store manager. He wants to leverage his curiosity about retail analytics to
    oversee inventory optimization and sales forecasting. In the longer term, he aspires to manage multiple stores as a regional manager or open his own boutique that blends his love for practical products
    with emerging consumer trends. He plans to complete his bachelor's degree in Business Administration part‑time, balancing his studies with his married life and the flexibility he values.
