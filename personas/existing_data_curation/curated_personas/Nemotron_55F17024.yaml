  career_goals: Although retired from formal employment, Joan aims to deepen her impact on Myrtle Beach’s cultural and health landscape. She plans to lead the local historical society’s oral‑history project,
    author a memoir about her decades on the coastal community, and develop a mentorship program for younger volunteers. By securing a small grant, she hopes to launch a seasonal beach‑cleanup initiative
    that combines her organizational skill with her competitive desire to set measurable environmental goals. Joan also intends to complete a certificate in community health counseling so she can facilitate
    peer‑support groups for seniors coping with anxiety and depression, turning her own emotional reactivity into a source of empathy and leadership. Ultimately, she envisions being recognized as a catalyst
    for preserving local heritage while fostering resilient, connected neighborhoods.
