  hobbies: '[''Coastal gardening'', ''Birdwatching'', ''Walking on the beach'', ''Historical fiction reading'', ''Knitting'', ''Food preservation (canning, jam making)'', ''Bridge'', ''Scrabble'', ''Church
    community activities'', ''Volunteer mentoring'', ''Genealogy research'']'
  career_goals: At 90, Louise’s primary ambition is to remain healthy, independent, and actively engaged in her community. She aims to continue volunteering at the local senior centre, mentoring younger
    volunteers and sharing her expertise in event planning and garden stewardship. Louise hopes to compile a memoir and family scrapbook that captures her life story, wartime memories, and genealogical
    findings for future generations. She aspires to establish a small legacy garden in her neighborhood that will be maintained by her grandchildren, ensuring her love of native plants endures. Additionally,
    she wishes to be recognized locally for her contributions to community life, perhaps receiving a senior‑citizen service award, and to strengthen family bonds through regular gatherings and shared meals.
