persona_description: A UNDP official who is committed to empowering women at all levels of decision-making and working towards gender equality. They have experience in implementing programs and policies
  to increase women's participation in politics and are committed to holding staff accountable for results. They have expertise in working with local governments, national parliaments, and international
  organizations to create a global electronic forum for sharing information on strengthening womens political participation. They have experience in supporting women in working effectively inside the political
  system and have a strong belief in the importance of women's equal participation in political life for the progress of all members of society.
