  career_goals: Bruce aims to transition from a regional manager to a senior executive role such as Vice President of Innovation or Chief Innovation Officer, where he can shape the company’s strategic direction
    and champion a culture of creativity. He is also exploring the possibility of launching his own consultancy focused on helping mid‑size firms integrate artistic thinking into their business models.
    In parallel, Bruce wants to develop stronger organizational habits to mitigate stress, achieve a healthier work‑life balance, and become a mentor for emerging leaders in his community.
