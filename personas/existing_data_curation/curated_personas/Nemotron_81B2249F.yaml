  career_goals: Although retired, Scott aims to remain actively engaged in the arts community. He aspires to become a volunteer docent at the Nassau County Museum of Art, curate a traveling exhibition of
    senior artists, and publish a collection of essays reflecting on abstract art and its emotional impact. He also hopes to launch a weekly senior art club that encourages intergenerational collaboration
    and to contribute his expertise to grant writing for community arts programs.
