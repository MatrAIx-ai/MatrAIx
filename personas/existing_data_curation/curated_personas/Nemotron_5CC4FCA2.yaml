personas:
  professional: Kevin Moody, a seasoned IT support specialist with a knack for hardware repair, network configuration, and scripting automation, leverages his practical mindset and preference for structured,
    reliable solutions to develop clear step‑by‑step guides while tolerating occasional disorganization in scheduling.
  sports: Kevin Moody stays active by fishing at Lakeport Lake during summer, plays in a local adult softball league, follows the Seattle Seahawks and Seattle Mariners avidly, and hits the gym three times
    a week for weight training, preferring low‑key, routine‑based fitness over competitive sports.
  arts: Kevin Moody immerses himself in classic westerns starring Clint Eastwood and John Wayne, devours science‑fiction novels by Isaac Asimov and William Gibson, and keeps a vinyl collection of Ennio Morricone
    soundtracks, using these cultural touchstones to unwind and spark creative PC‑build ideas.
  travel: Kevin Moody prefers meticulously planned road trips that blend fishing and tech‑savvy stops, having recently explored the Canadian Rockies and dreaming of a future fishing expedition to New Zealand’s
    South Island, while family responsibilities and a modest budget keep most vacations within a few‑hour drive radius.
  culinary: Kevin Moody boasts a solid grill game, regularly seasoning baby‑back ribs with smoky paprika, brown sugar, and garlic before slow‑cooking them to a caramelized finish, enjoys cooking simple
    stir‑fry meals like garlic‑shrimp with broccoli, and frequents local diners for a well‑earned steak after a long day of hardware troubleshooting.
  core: Kevin Moody balances a methodical, hands‑on tech career with a solitary love of fishing, custom PC builds, and low‑key barbecues, all while navigating a relaxed approach to planning that sometimes
    borders on disarray.
background:
  cultural: Kevin was raised in East Texas, a region characterized by its Southern hospitality, strong work ethic, and close‑knit community values. As a white Texan, his upbringing reflects a blend of rural
    traditions and modest suburban life, including participation in local church activities and community events. The cultural emphasis on self‑reliance and practical problem solving has shaped his hands‑on
    approach to both work and leisure, while his marriage and family life align with the region’s focus on family stability and modest prosperity.
attributes:
  skills: '[''Hardware troubleshooting'', ''PC assembly and custom builds'', ''Network setup and configuration'', ''Technical support for Windows/macOS'', ''Basic scripting (PowerShell, Bash)'', ''User
    training and documentation'']'
  hobbies: '[''Fishing'', ''Custom PC building'', ''Reading science‑fiction'', ''Watching classic western movies'', ''Backyard grilling and small‑group barbecues'']'
  career_goals: Kevin aims to formalize his expertise by earning CompTIA A+ and Network+ certifications within the next year, positioning himself for a senior technician or IT manager role at a regional
    firm. He also hopes to transition his part‑time freelancing into a full‑time computer‑repair shop that serves Longview and surrounding communities, offering reliable service with transparent pricing.
    While he values a predictable work schedule to support his family, he wants enough flexibility to continue hands‑on projects and mentor junior techs, balancing stability with his love for practical
    problem solving.
