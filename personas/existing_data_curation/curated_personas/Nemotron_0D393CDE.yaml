  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Cooking traditional Mexican cuisine'', ''Reading art history and non-fiction'', ''Meditative journaling'', ''Crossword
    and Sudoku puzzles'', ''Participating in small-group book clubs'', ''Attending craft and art workshops'', ''Volunteering at local cultural festivals'']'
  career_goals: Griselle aims to move from her current role as a general office clerk to a supervisory position such as office manager or administrative coordinator within the next three to five years.
    She plans to enroll in an associate degree program in business administration and earn certifications in office management and project coordination, building on her disciplined work ethic and love for
    organized systems. In the longer term, she hopes to combine her administrative expertise with her passion for the arts by taking on a managerial role at a cultural institution or community arts organization
    in Baton Rouge, where she can contribute to program planning while fostering inclusive and harmonious environments. Achieving financial stability for her family and mentoring emerging professionals,
    especially those from underrepresented backgrounds, are also central to her ambitions.
