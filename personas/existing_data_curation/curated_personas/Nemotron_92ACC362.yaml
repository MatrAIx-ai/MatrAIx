  career_goals: Lisa aims to move from direct caregiving into a leadership position within the home‑health field. In the next three years she plans to earn a Certified Nursing Assistant (CNA) credential
    and complete a graduate certificate in gerontology, positioning herself for a care‑manager or supervisor role at her agency. Long‑term, she envisions launching her own community‑based home‑care business
    that emphasizes personalized care plans, family education, and culturally sensitive services for the growing senior population in Crawford County. She also hopes to develop a regional training curriculum
    for personal care aides, leveraging her education background to raise professional standards and become a recognized speaker at Midwest health‑care conferences.
