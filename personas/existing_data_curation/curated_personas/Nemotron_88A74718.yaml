  career_goals: Although retired from full‑time employment, Heidi aims to remain actively engaged by mentoring emerging engineers, leading local STEM outreach programs for K‑12 students, and contributing
    her organizational talents to community service boards. She also aspires to author a practical guide on senior‑friendly gardening, learn advanced digital photography to document regional nature, and
    travel to national parks while maintaining her health and personal growth.
