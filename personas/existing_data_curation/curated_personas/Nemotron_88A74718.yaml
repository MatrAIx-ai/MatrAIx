personas:
  professional: Heidi Riles, a retired senior engineering project manager turned community STEM mentor, applies their data-driven problem solving, meticulous planning, and assertive yet collaborative leadership
    to guide emerging engineers and organize local outreach projects with infectious enthusiasm.
  sports: Heidi Riles channels the active spirit of their 65-year-old self into weekend hikes on Cuyamaca and Cowles peaks, a membership in the San Diego Hiking Club, and avid support for the Padres and
    San Diego State Aztecs, balancing low-impact cardio with occasional yoga classes at the community center.
  arts: Heidi Riles cultivates a love of visual and literary arts through digital photography excursions inspired by Ansel Adams, frequent visits to the Museum of Contemporary Art San Diego, enjoying historical
    fiction by Hilary Mantel, and listening to John Mayer while knitting scarves for charity.
  travel: Heidi Riles plans their travel with the same meticulousness they apply to projects, opting for guided tours of historic sites like Gettysburg and national parks such as Yosemite and Crater Lake,
    preferring a blend of adventure hiking and comfortable lodging that accommodates their health needs.
  culinary: Heidi Riles experiments with senior-friendly, health-focused recipes, often preparing Mediterranean quinoa salad with roasted cherry tomatoes and lemon-tahini dressing or grilled salmon with
    avocado salsa, leveraging their intermediate cooking skills and a pantry stocked with kale, chickpeas, and olive oil.
  core: Heidi Riles blends an engineer's precision with a gardener's patience, turning curiosity into community service while occasionally misplacing their reading glasses on hiking trails.
background:
  cultural: Heidi grew up in a middle‑class suburb of Southern California during the post‑war boom, absorbing mainstream American values of independence, hard work, and community involvement. Her upbringing
    was shaped by the social changes of the 1960s‑70s, including the women’s movement, which encouraged her pursuit of a STEM degree. Though culturally white and raised in a traditionally Christian environment,
    she now embraces the diverse, multicultural setting of San Diego County, participating in local community events and respecting a broad spectrum of cultural perspectives.
attributes:
  skills: '[''Project Management'', ''Data Analysis'', ''Technical Troubleshooting'', ''Process Optimization'', ''Event Planning'', ''Community Outreach Coordination'', ''Public Speaking'', ''Mentoring'']'
