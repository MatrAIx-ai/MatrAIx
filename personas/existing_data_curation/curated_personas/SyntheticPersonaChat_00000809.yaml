    User 1: Oh, that''s interesting! What''s that like?

    User 2: It''s a lot of fun! I get to meet a lot of people and I get to help people out.

    User 1: That''s great! I''m glad you like your job.

    User 2: I do! It''s the best job I''ve ever had.'
