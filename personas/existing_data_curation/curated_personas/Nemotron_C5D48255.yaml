personas:
  professional: Jack Macaraig is a retired maintenance supervisor turned community leader who leverages his mechanical troubleshooting skills, budgeting acumen, and knack for organizing volunteers to mentor
    retirees on DIY projects, advise the town planning commission, and provide low‑cost maintenance consulting to local businesses, all while maintaining a meticulous schedule and a competitive edge in
    every project, and they pride themselves on delivering results with precision.
  sports: Jack Macaraig competes in the Chittenango Strike Force bowling league, captains a senior fishing crew on the Erie Canal, follows the Buffalo Bills with avid loyalty, and attends the Syracuse Orange
    basketball games whenever possible, blending the social camaraderie of team sports with a personal routine of morning walks and occasional gardening‑yard work to stay fit, and they view each match as
    another opportunity to sharpen their strategic mind.
  arts: Jack Macaraig enjoys listening to folk legends like Bob Dylan and classics such as Neil Diamond on his porch while tending his garden, attends the annual Syracuse Stage productions of Shakespeare,
    collects vintage black‑and‑white photographs of early 20th‑century town life, and they let these artistic pursuits inform his historic preservation work.
  travel: Jack Macaraig prefers meticulously planned road trips that balance historical exploration with comfort, having already visited the Freedom Trail in Boston, the colonial streets of Williamsburg,
    and the Revolutionary War sites in Philadelphia, and they now aim to tour the historic lighthouses of Maine and the Adirondack museums with their wife during the fall season.
  culinary: Jack Macaraig favors hearty, farm‑to‑table meals, often cooking vegetable stew with carrots, potatoes, and kale from his garden, pairing it with roasted chicken seasoned with rosemary and garlic,
    and indulging in homemade apple pie topped with a scoop of vanilla ice cream, while they occasionally treat themselves to smoked trout caught on the Erie Canal.
  core: Jack Macaraig is a structured, competitively spirited retiree who transforms his love of routine, hands‑on problem solving, and community service into a life of organized volunteerism, diligent
    budgeting, and carefully curated hobbies ranging from bowling to historic travel, and they keep a pocket ruler on hand to measure every new project.
background:
  cultural: Jack is a white American with deep roots in upstate New York. His family heritage traces back to early 20th‑century European immigrants who settled in the Mohawk Valley, working in agriculture
    and small‑scale manufacturing. He grew up in a close‑knit town where community involvement, self‑reliance, and respect for tradition were emphasized. A lifelong resident of Madison County, Jack’s cultural
    identity blends a modest, practical work ethic with a strong sense of civic duty and a love for local customs such as town fairs and church gatherings.
attributes:
  skills: '[''Mechanical troubleshooting'', ''Small‑engine repair'', ''Carpentry and home renovation'', ''Budget and expense management'', ''Project coordination'', ''Community volunteer leadership'', ''Board
