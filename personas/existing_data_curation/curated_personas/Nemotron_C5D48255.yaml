  hobbies: '[''Bowling league'', ''Bridge club'', ''Vegetable gardening'', ''Historical preservation society'', ''Senior fishing crew'', ''Volunteer woodworking workshops'', ''Community center event organizing'']'
  career_goals: Although no longer employed full‑time, Jack aims to deepen his impact on the Chittenango community. He plans to serve as a senior advisor on the town’s planning commission, mentor retirees
    interested in DIY home projects, and launch a modest consulting service offering maintenance advice to local small businesses. Additionally, he aspires to preserve his health through regular activity,
    ensure financial stability for his wife, and travel with her to historic sites across the Northeast.
