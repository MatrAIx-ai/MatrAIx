  hobbies: '[''Community theater'', ''Softball league'', ''Hiking'', ''Community gardening'', ''Book club'', ''Animal shelter volunteering'', ''Bridge (competitive)'', ''Yoga'', ''Puzzle solving'']'
  career_goals: Harriett aims to advance to the role of Regional Director of Social and Community Services for York County, overseeing a portfolio of programs that serve vulnerable populations. She intends
    to launch a county‑wide integrated service hub that coordinates health, housing, and employment resources using a data‑driven approach. Securing stable, multi‑year funding streams and expanding partnerships
    with private sector innovators are top priorities. Additionally, she aspires to mentor emerging women leaders in the nonprofit sector, publish case studies on resilient community models, and eventually
    transition to a consulting practice that helps rural municipalities replicate successful service frameworks.
