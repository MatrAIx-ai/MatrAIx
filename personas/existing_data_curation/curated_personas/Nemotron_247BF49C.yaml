  hobbies: '[''Philosophy and art theory reading'', ''Sketchbook journaling'', ''Traditional calligraphy practice'', ''Indoor herb gardening'', ''Quiet hiking on local trails'', ''Experimental East Asian
    cooking'', ''Watching foreign arthouse films'', ''Exploring VR art platforms'', ''Listening to ambient/electronic music'', ''Meditative breathing exercises'']'
  career_goals: Liu aims to secure a solo exhibition at a respected Chicago gallery within the next three years, showcasing a series that fuses East Asian calligraphic gestures with contemporary social
    commentary on urban isolation. He seeks a regional arts grant to fund a limited‑edition print run and to establish a modest studio space in Naperville that doubles as a quiet creative retreat. Long‑term,
    he aspires to publish an artist monograph that documents his interdisciplinary practice and to win an emerging‑artist award that positions him competitively in the Midwestern art scene. While preserving
    his need for flexibility, he plans to build an online platform for selling limited prints, allowing a sustainable income without compromising his solitary working style.
