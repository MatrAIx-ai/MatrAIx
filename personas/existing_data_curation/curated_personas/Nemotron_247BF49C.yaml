personas:
  professional: Soon Liu, a 45‑year‑old multidisciplinary visual artist in Chicago, blends traditional East Asian ink‑wash calligraphy with contemporary mixed‑media painting and 3D digital modeling, curates
    intimate exhibitions, mentors emerging creators, and manages freelance commissions with a relaxed, often improvised workflow.
  sports: Soon Liu, who prefers quiet movement over crowds, joins the Chicago River Trail Hikers Association for weekend treks along the Fox River, follows the Chicago Cubs season religiously, and occasionally
    attends a yoga class at a local studio to stretch stiff shoulders from long painting sessions.
  arts: Soon Liu immerses themselves in the works of Mark Rothko, Ai Weiwei, and the poetic cinema of Andrei Tarkovsky, curates personal VR art galleries featuring experimental digital collages, and writes
    critical essays that reference both Taoist philosophy and existentialist theory.
  travel: Soon Liu favors contemplative travel, having spent solitary weeks exploring the tea gardens of Kyoto, the bamboo forests of Taiwan, and the rice terraces of Ubud, while planning future trips to
    the misty cliffs of Cinque Terre to sketch sunrise light and to the deserts of Mongolia for silence.
  culinary: Soon Liu experiments with experimental cooking at home, mastering dishes like Mapo tofu, hand‑rolled sushi with shiso and shiitake mushrooms, and fermented kimchi, while treating each meal as
    a tactile study in flavor textures and often documenting the process in a sketchbook.
  core: Soon Liu, a 45‑year‑old solitary artist, channels curiosity into eclectic art practice, cautious finances, self‑managed health, and quiet adventures, all while battling procrastination and a tendency
    to overthink.
background:
  cultural: Liu is a second‑generation East Asian American, born to immigrant parents who emigrated from Taiwan in the late 1970s. Raised in a bilingual household in the Chicago suburbs, he grew up celebrating
    Lunar New Year, practicing tea ceremony, and learning traditional brush painting from his grandfather. The family emphasized academic achievement, but Liu pursued a Bachelor of Arts in Humanities with
    a focus on Studio Art and Art History, navigating the tension between cultural expectations and his creative drive. Living in Naperville, he balances Midwestern suburban life with a strong connection
    to his heritage, often incorporating motifs from Chinese folklore and calligraphic aesthetics into his contemporary work. His marriage to a fellow artist of similar background reinforces shared cultural
    practices, while also allowing him to explore a hybrid identity that merges East Asian traditions with the American art landscape.
