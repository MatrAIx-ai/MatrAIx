personas:
  professional: Alicia Martin is an aspiring young scientist who blends curiosity with practicality, building simple robots in the school science club and meticulously logging each experiment, which showcases
    their balanced approach to learning, reliability, and thoughtful problem‑solving.
  sports: Alicia Martin plays forward on the Desert Valley Middle School Eagles soccer team, follows the Phoenix Suns and the U.S. Women’s National Soccer Team, balances team practice with solo dribbling
    drills after school, and occasionally attends weekend track meets, illustrating their love of collaboration, self‑discipline, and seasonal fitness variety.
  arts: Alicia Martin devotes weekend afternoons to sketching desert canyons and painting fantasy scenes while listening to Taylor Swift’s Folklore and Imagine Dragons, and reads J.K. Rowling and Tolkien
    for narrative inspiration, integrating storytelling into visual art and forming a vibrant, creative identity.
  travel: Alicia Martin dreams of exploring the Grand Canyon’s red rock cliffs and the crystal caves of Carlsbad, plans trips with a hand‑drawn map and their family’s modest budget, yet balances adventurous
    wanderlust with the comfort of familiar school field trips to nearby museums and state parks.
  culinary: Alicia Martin enjoys crafting veggie quesadillas with avocado and cherry tomatoes, mixing homemade salsa, baking chocolate chip cookies with their mom, and occasionally forgetting to set a timer,
    showcasing a budding kitchen confidence tempered by occasional absent‑mindedness.
  core: Alicia Martin is a curious, organized ten‑year‑old who seamlessly blends science, storytelling, and soccer while juggling a love of nature and occasional sticker splurges.
background:
  cultural: Alicia comes from a white, middle‑class family that has lived in the suburban community of Gilbert, Arizona for several generations. Growing up in the desert Southwest, she is accustomed to
    warm weather, wide open spaces, and a community that values outdoor activities and neighborly cooperation. Her family celebrates traditional American holidays such as Thanksgiving and Christmas, while
    also embracing regional customs like Fourth of July fireworks and local festivals that showcase Hispanic and Native American influences in the area. The multicultural environment of Maricopa County
    has broadened her awareness of diverse cultures, though her home life emphasizes kindness, cooperation, and a practical, down‑to‑earth approach to everyday tasks.
