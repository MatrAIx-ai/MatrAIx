  career_goals: Alicia dreams of a career that lets her explore the natural world while making a tangible difference. She aspires to become a wildlife biologist or veterinarian, motivated by her love of
    animals and her practical desire to help them stay healthy. She also envisions herself as a teacher who can share knowledge with others, or as a developer who creates educational games. Her immediate
    ambitions involve deepening her coding skills, participating in science fairs, and gaining hands‑on experience with animals through volunteer work at local shelters.
