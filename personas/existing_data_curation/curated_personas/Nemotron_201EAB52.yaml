personas:
  professional: Hazel Allen, a meticulous carpenter with a knack for reading technical drawings, runs a tightly organized workshop where safety checks and precise measurements are routine, and leverages
    project‑management skills to deliver sustainable remodels on schedule despite an undercurrent of stress‑induced worry.
  sports: Hazel Allen, a member of the Augusta Running Club and occasional adult softball player, jogs the Savannah River trail each morning, practices yoga twice weekly to offset carpentry’s physical toll,
    and loyally follows the Atlanta Braves, the Savannah Bananas, and the Georgia Bulldogs for weekend sport thrills.
  arts: Hazel Allen, a regular in the local church choir, sings gospel classics by Kirk Franklin and Aretha Franklin, devours historical fiction by Charles Frazier, attends regional theater productions
    featuring Billy Porter, and appreciates folk paintings by Mose Tolliver, weaving artistic inspiration into both work and leisure.
  travel: Hazel Allen prefers meticulously planned road trips that blend Southern history with nature, having explored Savannah’s historic district, hiked the Blue Ridge Parkway, and yearning to immerse
    in New Orleans’ jazz scene and the tulip fields of Lisse, Netherlands.
  culinary: Hazel Allen’s culinary repertoire showcases Southern comfort with garden freshness, expertly preparing shrimp and grits with Gulf shrimp, collard greens simmered with smoked ham hocks, and peach
    cobbler made from heirloom garden peaches, while seasoning dishes with thyme, rosemary, and a pinch of cayenne for a personal twist.
  core: Hazel Allen is a detail‑obsessed carpenter who channels precision into timber, garden, and choir, balances a cautious budget with occasional splurges, and wrestles a persistent worry that drives
    both their meticulousness and their drive to mentor others.
background:
  cultural: Hazel grew up in a close‑knit African‑American community in Augusta, Georgia, where church, family gatherings, and neighborhood support networks played central roles. Her cultural identity is
    shaped by Southern Black traditions—such as soulful gospel music, communal barbecues, and storytelling—that emphasize resilience, mutual aid, and pride in one’s heritage. Though she left high school
    without a diploma, she learned the value of hands‑on craftsmanship from local mentors and family members who emphasized self‑reliance and the dignity of skilled labor. These influences inform her work
    ethic, her desire to give back through mentorship, and her appreciation for preserving cultural practices through tangible, everyday creations.
attributes:
  skills: '["Technical Blueprint Interpretation","Precise Measuring and Cutting","Framing and Structural Carpentry","Finish Carpentry and Trim Work","Power Tool Proficiency","Construction Safety Compliance","Project
    Budgeting and Scheduling","Small Team Coordination"]'
  hobbies: '["Custom Furniture Making","Vintage Wood Restoration","Gardening","Church Choir Singing","River Walks for Mindfulness","Reading Southern Historical Fiction","Cooking Traditional Southern Cuisine"]'
  career_goals: Hazel aims to become a certified master carpenter within the next five years, pursuing NCCER or local union credentials to formalize her expertise. She aspires to open her own boutique carpentry
    and remodeling firm focused on sustainable, locally sourced materials, allowing her to control project timelines and maintain the structured environment she thrives in. Additionally, she hopes to mentor
    young people in Augusta, especially from under‑represented backgrounds, by offering workshops that combine technical skill development with life‑skill coaching to help others navigate stress and achieve
    stable careers in the trades.
