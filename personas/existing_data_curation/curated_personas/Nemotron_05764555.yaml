personas:
  professional: Antonia Frankowski is a seasoned industrial valve technician whose meticulous schematics reading and safety‑first mindset make her the go‑to troubleshooter on the shop floor, and her natural
    inclination for structured processes translates into clear documentation and effective training of junior staff.
  sports: Antonia Frankowski plays for the Riverside Intramural Softball Club, rallies behind the Chicago Cubs during baseball season, and supplements her game with weekly indoor rowing sessions at the
    community gym to maintain fitness year‑round.
  arts: Antonia Frankowski immerses herself in mystery novels like Agatha Christie’s *Murder on the Orient Express* and historical fiction such as Ken Follett’s *The Pillars of the Earth*, attends local
    Polish cultural festivals featuring folk music and dance, and enjoys live jazz evenings at the downtown Blue Note club, often quoting classic film lines in conversation.
  travel: Antonia Frankowski prefers well‑planned weekend getaways to nearby state parks such as Shenandoah for hiking and photography, dreams of a cultural tour of Kraków to explore the heritage showcased
    at festivals she loves, and balances travel budgeting with a loyalty program for a mid‑scale airline, opting for short, purposeful trips that fit around her work schedule.
  culinary: Antonia Frankowski loves hearty, home‑cooked meals, often preparing pierogi stuffed with potato and cheese, grilling marinated pork chops with rosemary, and incorporating fresh tomatoes and
    basil from her community garden into a rustic caprese salad, while rating herself an intermediate cook who enjoys experimenting with sous‑vide techniques on weekends.
  core: Antonia Frankowski blends a methodical, hands‑on mindset with a love for community gardening and mystery novels, balancing structured work ambitions with weekend woodcraft, occasional tool‑splurges,
    and a disciplined yet flexible approach to health and finances.
background:
  cultural: Antonia is of Polish descent, a heritage reflected in her family name and occasional participation in Polish festivals and church gatherings in Flint. Growing up in a working‑class, Midwestern
    community, she internalized values of hard work, reliability, and community solidarity. The recent water crisis in Flint heightened her awareness of public infrastructure and fostered a deeper commitment
    to ensuring safety and reliability in the systems she works on. Her cultural identity combines traditional Polish customs—such as shared meals and holiday celebrations—with the broader Michigan ethos
    of resilience, practicality, and collective responsibility.
attributes:
  skills: '["Valve installation and repair", "Hydraulic and pneumatic system troubleshooting", "Blueprint and schematic interpretation", "Preventive maintenance scheduling", "Safety compliance and lockout/tagout
    procedures", "Precision measuring and calibration", "Technical documentation and reporting", "Team coordination and on‑the‑job training", "Basic electrical wiring for control systems", "Use of diagnostic
    tools and software"]'
  hobbies: '["DIY home repair projects", "Woodworking", "Community gardening", "Reading mystery and historical fiction", "Participating in local Polish cultural events", "Intramural softball", "Volunteering
    for home‑repair workshops"]'
  career_goals: Antonia aims to earn advanced certifications in industrial instrumentation and become a senior valve technician or a shift supervisor within the next five years. She plans to enroll in community
    college courses for PLC programming and obtain a Journeyman certification to broaden her technical expertise. Long‑term, she hopes to transition into a training role where she can mentor new installers,
    and eventually consider starting her own small contracting business focused on reliable valve and control system services for local manufacturers and municipal utilities. She also seeks a stable, well‑structured
    work environment that offers clear advancement pathways and benefits.
