  hobbies: '[''Church choir'', ''Community gardening'', ''Southern cooking'', ''Quilting'', ''Playing card games (bridge/spades)'', ''Walking groups'', ''Volunteer tutoring'', ''Attending gospel music concerts'',
    ''DIY home repair projects'', ''Family reunions'']'
  career_goals: Nakisha hopes to transition into a supervisory or lead‑technician role within her maintenance crew, where she can formalize a training program for new hires and pass on her practical knowledge.
    She is interested in earning certifications in HVAC and OSHA safety standards to enhance her credibility. Long‑term, she envisions starting a small, community‑oriented maintenance service that offers
    discounted or pro‑bono repairs for low‑income seniors in Coldwater, allowing her to blend her skill set with her deep desire to help others and maintain harmony in her neighborhood.
