    ''Watching movies with his spouse'']'
  career_goals: Luis aims to advance within the facilities management field. In the next few years he plans to earn a certification in Facility Management and move into a supervisory role as a cleaning
    team lead. He envisions becoming a Facilities Manager for a larger commercial property, where he can oversee broader maintenance operations and implement sustainability initiatives such as green cleaning
    programs. Eventually, he hopes to launch his own small cleaning business to secure stable income for his family and leverage his routine‑oriented work ethic.
