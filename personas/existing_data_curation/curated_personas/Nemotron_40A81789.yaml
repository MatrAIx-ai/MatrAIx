personas:
  professional: Luis Lugo, a 26‑year‑old janitor in a commercial office complex, leverages their meticulous floor‑care expertise, bilingual communication, and OSHA‑compliant safety practices to streamline
    daily cleaning schedules while mentoring new staff, all with an eye toward earning a Facility Management certification and eventually leading a green‑cleaning team.
  sports: Luis Lugo plays forward for the local Albuquerque Soccer Club’s recreational league, cheers on New Mexico United and the Denver Nuggets, and maintains fitness by jogging the Bosque Trail three
    times a week, mixing competitive sport with community camaraderie.
  arts: Luis Lugo embraces salsa and traditional New Mexican folk dance classes at the community center, enjoys live performances by the Mariachi Los Camperos and the folk band Calexico, and they collect
    vinyl records of Carlos Santana and Marty Robbins, letting music shape their vibrant social life.
  travel: Luis Lugo prefers short road trips that blend adventure with family time, having explored Santa Fe’s art districts, the historic adobe towns of Taos, and dreaming of a culinary pilgrimage to Oaxaca,
    while they budget travel through a dedicated account that caps spontaneity spending.
  culinary: Luis Lugo cooks hearty green‑chile enchiladas, chicken posole, and chiles rellenos using Hatch chilies, fresh cilantro, and homemade corn masa, boasting a moderate skill level that shines when
    they and their wife experiment with traditional family recipes and host neighborhood potlucks.
  core: Luis Lugo thrives on routine, channels high energy into dance and community events, and they constantly balance their anxious mind with diligent planning and occasional impulsive indulgences.
background:
  cultural: Luis grew up in a Hispanic family deeply rooted in the New Mexican cultural tapestry. He is bilingual, speaking Spanish at home and English in daily life. His upbringing blended Mexican traditions—such
    as celebrating Día de los Muertos, Cinco de Mayo, and Catholic holidays like Las Posadas—with the unique customs of northern New Mexico, including the annual fiesta of San Juan and a love for New Mexican
    cuisine centered on green chile. He maintains close ties with extended family and values communal gatherings, church involvement, and respect for elders. The mix of Mexican, Spanish colonial, and Pueblo
    influences in Albuquerque shapes his identity, fostering a strong sense of community, family loyalty, and pride in his heritage.
