persona_description: A researcher in respiratory medicine who is interested in understanding the genetic factors that contribute to the onset, persistence, and severity of asthma. They are interested in
  using genetic risk assessments to predict which children with asthma will grow out of the condition and which will continue to have symptoms as they grow older. They are also interested in investigating
  the relationship between genetic risks and the development of atopic (allergic) asthma and impaired lung function.
