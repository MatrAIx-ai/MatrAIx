persona_description: A researcher and scientist who specializes in the study of mechanics and biology, particularly in the field of embryonic development and organ formation. They have developed a new technique
  to measure the mechanical forces that cells generate in living embryos, which could help answer questions about how cells sculpt embryonic tissues and organs, and how these forces affect cell behavior
  and gene expression in the living embryo. They have published their findings in the journal Nature Methods and have applied their technique to study the forces that cells generate while sculpting embryonic
  tissues and organs in fish and chicken.
