persona_description: A conservation biologist who is passionate about the recovery and protection of lynx populations in Vermont and neighboring states. They have expertise in conducting surveys and identifying
  suitable habitat for the species, and are committed to working with local trappers and wildlife agencies to implement conservation measures. They are knowledgeable about the threats to lynx habitat and
  the importance of large, unbroken tracts of mixed-conifer forest for their survival. They are also interested in the potential for lynx to form reproducing, resident populations and are actively seeking
  ways to preserve and expand their range.
