persona_description: A scientist who studies plant invasion, particularly the effects of exotic herbaceous legumes like yellow sweetclover on nitrogen cycle processes and ecosystem dynamics. She is interested
  in understanding the contingent nature of plant invasion and the impact of nutrient availability on plant communities. Her research interests include the effects of exotic legumes on nitrogen fixation
  and the role of water and nutrients in shaping plant invasion.
