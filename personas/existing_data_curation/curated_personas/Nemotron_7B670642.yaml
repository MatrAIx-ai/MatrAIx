personas:
  professional: Richard Dixon, a 41‑year‑old aspiring licensed handyman, leverages his hands‑on expertise in automotive repair, small‑engine tinkering, and woodworking to serve his rural community, applying
    a competitive edge honed from hunting tournaments to win local service contracts while tolerating a clutter‑filled workshop that mirrors his relaxed attitude toward strict planning.
  sports: Richard Dixon follows the Alabama Crimson Tide with fervor, supports the Birmingham Barons minor‑league baseball team, participates in local catch‑and‑release fishing tournaments on Lake Guntersville,
    and maintains fitness through regular hunting trips and weekend carpentry projects rather than structured gym workouts.
  arts: Richard Dixon strums an acoustic guitar to classics from Johnny Cash, Lynyrd Skynyrd, and Neil Young, enjoys watching classic country films on Friday evenings at the community center, and occasionally
    volunteers to set up sound equipment for the county fair’s live performances.
  travel: Richard Dixon prefers road‑trip getaways that blend outdoor adventure with a taste for local flavor, spending summers fishing in the Ozarks, dreaming of a spring drive to the Florida Keys, and
    planning most trips around affordable fuel costs and limited time away from work and family commitments.
  culinary: Richard Dixon masters comfort dishes like fried chicken, smoked barbecue pork shoulder, and collard greens seasoned with smoked ham hocks, often cooking these on a charcoal grill while seasoning
    with buttermilk brine and hickory wood chips, and they relish sharing the meals at neighborhood potlucks.
  core: Richard Dixon is a self‑reliant, moderately skeptical handyman who balances a competitive streak in hunting with a laid‑back approach to life, frequently juggling a messy workshop, a budget spreadsheet,
    and a guitar in the same day.
background:
  cultural: Raised in the close‑knit, rural South, Richard's cultural outlook is shaped by the traditions of a small Alabama town. He grew up in a Protestant (Methodist) family where church, high‑school
    football, and community gatherings were central. Southern hospitality, a love for home‑cooked comfort food (fried chicken, barbecued pork, collard greens), and a respect for self‑reliance and neighborly
    help are core to his identity. While his upbringing was conservative, his divorce and experiences have broadened his view, making him more pragmatic yet still grounded in southern values.
attributes:
