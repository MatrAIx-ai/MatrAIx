  career_goals: Francella aims to transition into a part‑time mentorship role within the retail sector, where she can share her seasoned cash‑handling and customer‑service knowledge with younger colleagues.
    She also hopes to volunteer as a docent at the Kansas Historical Society museum, using her love of art and local history to guide visitors. Over the next few years, she plans to develop her own small
    art‑related side venture—perhaps offering curated displays or selling her own watercolor pieces at local fairs—while maintaining a balanced schedule that allows for continued community engagement and
    personal enrichment.
