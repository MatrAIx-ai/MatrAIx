personas:
  professional: Francella Wambles, a seasoned retail cashier with over three decades of POS mastery, uses their precise inventory control, training expertise, and competitive drive to mentor younger staff
    while curating eye‑catching store displays that echo prairie motifs.
  sports: Francella Wambles follows the Kansas City Royals and Kansas City Chiefs from the comfort of their living room, but prefers low‑impact activities such as weekly hikes on the Flint Hills, a gentle
    walking group that targets 7,000 steps a day, and senior‑friendly yoga sessions at the community center.
  arts: Francella Wambles immerses themselves in creative pursuits, painting watercolors of Kansas prairie landscapes inspired by Georgia O'Keeffe, quilting with traditional barn‑painting patterns, attending
    community theatre productions of Susan Glaspell’s plays, and curating local library art exhibits that showcase vintage Monet prints.
  travel: Francella Wambles favors road‑trip adventures that blend scenic drives through the Badlands, a weekend retreat in the Ozarks, and pilgrimage to the Grand Canyon, planning months ahead yet leaving
    room for spontaneous stops at small‑town art fairs, and they travel modestly by staying in historic B&Bs and using their trusted 1998 Subaru.
  culinary: Francella Wambles delights in hearty Midwest cooking, expertly baking apple‑rhubarb pies with a flaky crust, preparing chicken‑fried steak seasoned with locally milled salt, and brewing herbal
    tea sweetened with wildflower honey harvested from their garden, while they experiment with seasonal vegetables like heirloom tomatoes and asparagus.
  core: Francella Wambles is a diligent, art‑loving mentor who balances frugality with occasional indulgences, finds calm in solitary watercolor painting and prairie walks, and approaches life with a skeptical
    yet steady optimism.
background:
  cultural: Francella grew up in a multi‑generational white Midwestern family rooted in Bourbon County, Kansas. The cultural fabric of her upbringing blends the practical, self‑reliant values of rural Kansas—hard
    work, modesty, and community service—with a deep appreciation for regional folk arts such as quilting, barn‑painting, and prairie‑inspired crafts. She identifies with the Midwest’s emphasis on neighborliness
    and hospitality, often contributing to local festivals and historical society events. Though she was raised in a Protestant (Methodist) environment, she now embraces a broader, secular appreciation
    for cultural diversity, drawing inspiration from both the local landscape and the wider art world.
