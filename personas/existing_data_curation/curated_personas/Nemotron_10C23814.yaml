personas:
  professional: Debra Riley is a methodical nutritional and ophthalmic clinical support specialist who leverages her structured workflow, data‑analysis expertise, and compassionate bedside manner to conduct
    precise vision assessments, design personalized diet plans, and lead interdisciplinary community health outreach, all while pursuing RD and Certified Ophthalmic Technician Specialist credentials.
  sports: Debra Riley fuels their active lifestyle by hiking the Hoosier State Trails each weekend, leading a community Zumba‑Pilates class, cheering for the Indianapolis Colts and Indiana Pacers, and maintaining
    membership in the Starke County Trail Riders club, which blends social interaction with fitness.
  arts: Debra Riley captures Indiana’s seasonal landscapes with Ansel Adams‑inspired black‑and‑white photography, knits vibrant scarves while listening to Gillian Welch, quilts patterns reminiscent of Faith
    Ringgold’s folk motifs, and stays inspired by Michael Pollan’s latest health‑science book, weaving artistic expression into their daily routine.
  travel: Debra Riley plans weekend getaways with the precision of a research protocol, favoring nearby Brown County State Park for hiking, the Indiana Dunes for sunrise photography, and dreaming of a spring
    retreat in Asheville, North Carolina’s Blue Ridge Mountains to attend a farm‑to‑table workshop, all while balancing travel costs against upcoming graduate school expenses.
  culinary: Debra Riley’s kitchen is a laboratory of farm‑fresh flavors where they routinely create roasted beet and goat‑cheese salads, quinoa pilaf studded with local corn and heirloom carrots, ferment
    kimchi for gut health, and occasionally surrender to a peach cobbler made with orchard‑fresh peaches and an oat‑crumble topping, all seasoned with a dash of curiosity and a habit of collecting quirky
    kitchen gadgets.
  core: Debra Riley blends clinical precision with rustic creativity, meticulously charting diet and vision data by day while they obsessively organize their quilting stash by night, and they never miss
    a community health fair or Sunday potluck.
background:
  cultural: Debra grew up in a mid‑western white family with deep roots in the agricultural towns of northern Indiana. Her ancestry includes German and Irish heritage, reflected in family gatherings centered
    around hearty home‑cooked meals and seasonal celebrations. The community’s values of hard work, modesty, and neighborly support shaped her compassionate outlook. Church and local events like the Knox
    county fair reinforced a sense of togetherness and civic pride. This cultural backdrop nurtured her love for community service, appreciation for rural traditions, and a practical yet warm approach to
    both her personal life and professional responsibilities.
attributes:
  skills: '[''Nutritional assessment and counseling'', ''Clinical diet planning'', ''Menu development for institutional settings'', ''Ophthalmic patient triage'', ''Visual acuity and refraction testing'',
    ''Operating slit‑lamp and OCT imaging equipment'', ''Tonometry and intraocular pressure measurement'', ''Electronic medical record documentation'', ''Quality assurance and infection control protocols'',
    ''Team coordination and interdisciplinary collaboration'', ''Community health education program development'', ''Basic lab techniques and sample handling'']'
  hobbies: '[''Healthy cooking'', ''Community gardening'', ''Hiking and trail walking'', ''Group fitness classes (Zumba, Pilates)'', ''Volunteering at local food bank'', ''Nature photography'', ''DIY crafts
    (knitting, quilting)'', ''Reading health & wellness literature'', ''Attending local fairs and festivals'']'
  career_goals: Debra aims to become a registered dietitian while also attaining Certified Ophthalmic Technician Specialist status. She plans to pursue a Master’s in Public Health to deepen her expertise
    in community-based preventive care. Long‑term, she aspires to lead an integrated health services department in a rural hospital or health district, designing programs that address nutrition and eye‑health
    disparities in Starke County. She is motivated to launch a county‑wide outreach initiative that offers free vision screenings paired with nutrition workshops, and eventually hopes to mentor new health
    technicians and dietitians in her region.
