  career_goals: Bessie plans to earn her GED within the next year and then enroll in a vocational program that aligns with her practical interests, such as cosmetology or culinary arts. She hopes to become
    a certified hairstylist, offering mobile braiding services to her neighborhood, while also exploring freelance graphic-design work for local small businesses. In the longer term she envisions opening
    a modest home-based studio where she can combine her love of food, fashion, and visual art, providing a flexible source of income that supports her family and lets her stay rooted in her community.
