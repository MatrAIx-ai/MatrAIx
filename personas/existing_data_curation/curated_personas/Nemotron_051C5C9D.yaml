personas:
  professional: A budding cosmetology and graphic-design enthusiast, Bessie Hines blends their self‑taught hairstyling chops with a flair for digital sketches, offering mobile braiding appointments while
    freelancing logo work for local businesses.
  sports: An occasional fan of the Indianapolis Colts and Indiana Pacers, Bessie Hines enjoys strolling along the White River State Park where they jog lightly, participates in a local community basketball
    pick‑up league with friends, and follows high school track meets, preferring low‑key activity over competitive leagues.
  arts: A creative mixtape curator and sketch artist, Bessie Hines draws inspiration from artists like H.E.R., J. Cole, and SZA while compiling R&B‑hip‑hop playlists, spends evenings sketching street scenes
    on the Indianapolis Canal, and experiments with digital illustration software to design album‑cover‑style graphics that reflect their personal aesthetic.
  travel: A weekend‑wanderer, Bessie Hines has explored the Indianapolis Cultural Trail, taken a road trip to Chicago’s Millennium Park, dreams of sampling New Orleans’ food markets, and hopes to backpack
    through the Scottish Highlands after high school, always balancing travel costs with modest savings.
  culinary: A home‑cooking enthusiast, Bessie Hines loves whipping up family‑favorite baked mac and cheese with sharp cheddar, sautéed garlic‑spinach quinoa bowls, and pepper‑crusted salmon, often seasoning
    dishes with smoked paprika, lemon zest, and fresh herbs to elevate familiar flavors.
  core: Bessie Hines is a resilient teen who blends DIY hairstyling, digital art, and playlist curation into a flexible hustle, juggling modest savings, acne care, and low‑key sports while dreaming of a
    home studio that fuses food, fashion, and design.
background:
  cultural: Bessie is a 17-year-old African-American growing up in Indianapolis’s historic Black neighborhoods. Her family places strong emphasis on church life, music, and shared meals, with regular participation
    in Union Baptist Church’s youth programs and community celebrations such as the Indiana Black Expo and Juneteenth. She has absorbed cooking traditions, oral storytelling, and a sense of collective resilience
    from older relatives who migrated from the South during the Great Migration. Indianapolis’s vibrant arts scene, local block parties, and neighborhood support networks have shaped her identity, fostering
    a pride in her heritage and a commitment to contributing to her community.
