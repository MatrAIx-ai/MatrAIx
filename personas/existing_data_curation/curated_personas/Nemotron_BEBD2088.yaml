  career_goals: Although retired, Robert’s ambition is to leave a lasting intellectual legacy for Yorkville. He aims to author a comprehensive memoir that weaves personal memories with the town’s transformation
    over the past eight decades, and to publish a detailed genealogy of his family that can serve as a resource for future generations. He also aspires to spearhead a small‑scale community art initiative
    that pairs local seniors with high‑school students for collaborative mural projects, hoping to foster inter‑generational dialogue and nurture appreciation for the visual arts. In parallel, he wishes
    to continue mentoring new volunteers at the historical society, ensuring the preservation of Yorkville’s heritage is carried forward with rigor and curiosity.
