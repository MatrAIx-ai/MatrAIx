  career_goals: Sadia aims to advance to a regional operations manager role within the next five years, overseeing multiple locations and implementing standardized training programs that emphasize employee
    well‑being. She plans to pursue a professional certification in hospitality management and eventually enroll in a part‑time MBA to strengthen her strategic and financial acumen. Long‑term, she envisions
    opening a boutique restaurant that fuses contemporary American dining with authentic Gujarati flavors, serving as a cultural bridge and a mentoring hub for young South‑Asian cooks. She also hopes to
    develop a community kitchen initiative in Chicago that provides culinary training and job placement for recent immigrants.
