personas:
  professional: Carolyn Olivieri, a 59‑year‑old retired business manager, applies three decades of project‑management, budgeting, and grant‑writing expertise to design and lead Bedford senior‑center programs,
    community art exhibitions, and fundraising initiatives, while they mentor volunteers with a calm, organized, and sociable approach.
  sports: Carolyn Olivieri enjoys weekend nature walks with the Bedford Senior Walkers Club, follows the Boston Red Sox and Boston Celtics loyally, occasionally joins a community kayaking group in the summer,
    and they stay fit through weekly ballroom‑dance classes and low‑impact yoga.
  arts: Carolyn Olivieri, an avid gallery‑goer and watercolor enthusiast, draws inspiration from contemporary artists like Julie Mehretu and Mark Rothko, discusses the works of writers such as Zadie Smith
    in a monthly book club, and they regularly attend piano recitals featuring Yo‑Yo Ma, which fuels their own creative painting sessions.
  travel: Carolyn Olivieri prefers thoughtfully planned trips that blend cultural immersion with relaxation, having explored Cape Cod’s coastal towns, visited the historic streets of Mystic, taken a weekend
    art tour of Florence, and they dream of a future pilgrimage to Kyoto’s temples, all while managing travel costs within a modest retirement budget.
  culinary: Carolyn Olivieri, a competent home chef, delights in mastering Italian classics such as risotto alla Milanese and fresh basil pesto while experimenting with seasonal New England produce like
    heirloom tomatoes and locally caught clams, and they often host themed dinner evenings that showcase a blend of traditional techniques and inventive flavor pairings.
  core: Carolyn Olivieri, a curious yet meticulously organized social butterfly, balances a love for art, garden walks, and spontaneous cooking experiments with a habit of over‑booking community events,
    and they often forget to water their own potted plants.
background:
  cultural: Carolyn is a first‑generation Italian‑American whose family settled in Greater Boston before moving to Bedford, NH. Raised in a Catholic household, she grew up celebrating traditional Italian
    holidays—such as Festa della Repubblica and Christmas Eve feasts—while also embracing quintessential New England customs like Thanksgiving and summer town meetings. Her upbringing emphasized family
    cohesion, respect for elders, and community involvement, values that continue to shape her volunteer work and social interactions. Fluent in conversational Italian, she frequently incorporates family
    recipes and cultural stories into her cooking and storytelling, bridging her heritage with the broader American cultural landscape of the region.
