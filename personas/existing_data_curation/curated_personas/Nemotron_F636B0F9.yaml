  hobbies: '[''Fishing'', ''Hunting'', ''Woodworking'', ''Youth baseball coaching'', ''Rotary Club involvement'', ''Spotted Dinosaur Festival volunteer'', ''Road trips'', ''Barbecue cooking'', ''Classic
    rock concerts'', ''Bridge'', ''Landscape photography'']'
  career_goals: Alexander aims to transition from his current analyst role into a senior advisory position focused on regional operational excellence, where he can mentor emerging analysts and influence
    strategic decisions across multiple sites. He hopes to achieve certification as a Lean Six Sigma Black Belt within the next two years, and eventually launch a boutique consulting practice that assists
    small manufacturers in Dubois County with efficiency and growth initiatives. His long‑term ambition includes serving on the board of his local Chamber of Commerce to shape economic development policies
    in Jasper.
