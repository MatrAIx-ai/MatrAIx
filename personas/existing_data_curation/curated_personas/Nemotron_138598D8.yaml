  hobbies: '[''Vegetable gardening'', ''Fishing'', ''Woodworking'', ''Southeast Asian cooking'', ''Reading classic literature'', ''Local history research'', ''Journaling'', ''Attending community workshops'']'
  career_goals: Phat aims to publish a three-volume series on the maritime history of the Pamlico region, securing a regional literary award and establishing a small independent press focused on local authors.
    He also plans to secure a literary agent for a historical novel set in 19th‑century North Carolina and to launch a quarterly writing workshop for aspiring writers in New Bern. Long-term, he hopes to
    become a recognized authority on Southern coastal heritage and to mentor the next generation of writers through community college courses.
