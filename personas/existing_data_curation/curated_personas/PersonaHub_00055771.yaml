persona_description: A scientist who specializes in studying volcanic eruptions, particularly the effects of large-scale volcanic eruptions on air travel and global air traffic. She is particularly interested
  in the effects of large-scale volcanic eruptions on North America and Europe, and has used a computer model called Puff to simulate the effects of a modern-day Novarupta eruption. She is a British graduate
  student who has visited Alaska's Valley of 10,000 Smokes and has written about the potential effects of a modern-day Novarupta eruption on today's air travel.
