  career_goals: He aims to transition into a senior supervisory role within his agency, overseeing a team of interviewers and developing training materials to streamline the eligibility process. He wants
    to lead a project to implement a digital workflow that reduces manual paperwork, improving efficiency and accuracy. Over the next five years, he plans to achieve certification as a Certified Eligibility
    Professional and secure a pension‑eligible position that will allow a stable retirement. He also hopes to mentor new staff, sharing his methodical approach and commitment to service quality.
