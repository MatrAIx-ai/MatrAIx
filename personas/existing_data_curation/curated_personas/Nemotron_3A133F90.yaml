personas:
  professional: David Greiner, a 33‑year‑old mental health counselor in DuPage County, blends evidence‑based therapeutic techniques with street photography and sketching, and they design art‑infused sessions
    that help adolescents untangle trauma while occasionally misplacing session notes due to their relaxed, flexible schedule.
  sports: David Greiner, a fan of the Chicago Bulls and Cubs, spends Saturday mornings hiking the Illinois prairie with the local Nature Walkers club, joins a casual adult softball league on weeknights,
    and occasionally hits the ski slopes in Wisconsin during winter, preferring low‑pressure, community‑oriented activity over intense competition, though they sometimes forget to bring water on hikes.
  arts: David Greiner, an avid visitor of the Art Institute of Chicago, sketches cityscapes in a notebook while listening to Sufjan Stevens and The National, participates in improv workshops at The Second
    City, and collects folk music recordings that echo the seasonal storytelling traditions of their family gatherings, even though their sketchbook often ends up stacked haphazardly in a coffee‑stained
    tote.
  travel: David Greiner, who plans trips on a whim yet values cultural immersion, has explored the historic streets of Edinburgh during the Fringe Festival, enjoys weekend drives to the Shawnee National
    Forest, dreams of a sunrise hike in Kyoto’s Arashiyama bamboo grove, and balances their travel budget with occasional splurges on indie music festivals, though they sometimes overpack, filling a small
    backpack with too many books.
  culinary: David Greiner, an experimental home cook, delights in crafting beet‑root risotto, pierogi stuffed with smoked cheddar, and miso‑glazed salmon, frequently using fresh herbs from their backyard
    garden and seeking out artisanal cheese at local farmer’s markets, while still ordering takeout pizza on busy counseling days, and they occasionally leave a half‑cooked dish simmering too long, resulting
    in a charred edge they consider “creative flair.”
  core: David Greiner blends a curious, art‑driven mind with a flexible, slightly chaotic lifestyle, and they turn therapeutic sessions into creative experiments while juggling sporadic spending splurges,
    a penchant for spontaneous hikes, and the occasional forgotten appointment.
background:
  cultural: David is a second‑generation white American of mixed German‑Irish heritage, raised in the suburban environment of Villa Park, IL. His upbringing combined Midwestern values of modesty, community
    service, and a pragmatic work ethic with family traditions that emphasized storytelling, folk music, and seasonal holidays. This blend fostered an appreciation for diverse cultural expressions, a comfort
    navigating both rural and urban settings, and a lifelong interest in the arts and progressive ideas.
attributes:
  skills: '[''Individual counseling'', ''Group therapy facilitation'', ''Cognitive Behavioral Therapy (CBT)'', ''Motivational Interviewing'', ''Art therapy'', ''Crisis intervention'', ''Psychoeducation'',
    ''Client assessment and case management'', ''Cultural competency'', ''Program development'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Street photography'', ''Hiking in nature'', ''Reading philosophy and neuroscience'', ''Playing board games'',
    ''Improvisational theater'', ''Attending indie music concerts'', ''Experimental cooking'']'
  career_goals: David plans to obtain a Licensed Mental Health Counselor (LMHC) credential and pursue a master's in counseling psychology within the next two years. His long‑term ambition is to launch a
    private practice that integrates traditional psychotherapy with art‑based interventions, targeting adolescents and adults dealing with trauma and anxiety. He also hopes to become a certified clinical
    supervisor, develop community outreach programs in DuPage County, and eventually author a guidebook on using creative expression in mental‑health treatment.
