    services'', ''Community networking and relationship building'']'
  hobbies: '[''Hiking coastal trails in Mendocino County'', ''Organic gardening'', ''Traditional Mexican cooking'', ''Playing acoustic guitar at community events'', ''Meditation and mindfulness practice'',
    ''Reading historical biographies'', ''Volunteering with bilingual youth mentorship programs'']'
  career_goals: Jorge aims to transition from a territory sales representative to a regional sales manager within the next three years, overseeing a team of junior reps and mentoring them on both technical
    selling skills and emotional resilience. He plans to complete a bachelor’s degree in business administration to supplement his associate’s credential and strengthen his strategic leadership foundation.
    Additionally, he aspires to launch a small consulting practice that helps local service providers adopt culturally responsive sales strategies, especially for bilingual neighborhoods. Balancing ambition
    with his desire for emotional stability, Jorge also intends to incorporate regular mindfulness practices into his work routine to sustain his well‑being and model healthy coping for his team.
