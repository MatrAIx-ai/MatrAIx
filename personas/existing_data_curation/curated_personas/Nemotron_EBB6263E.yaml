personas:
  professional: James Pittman, a retired classroom teacher and former curriculum coordinator, leverages four decades of educational design expertise to volunteer as an adult tutor, mentor novice teachers,
    and craft a memoir on Texas education, balancing his innate curiosity with a practical, organized approach that shines in his meticulous lesson plans and community outreach.
  sports: James Pittman, a lifelong fan of Texas sports, cheers for the San Antonio Spurs and Texas Rangers, follows the San Antonio FC when possible, participates in a senior softball league, and maintains
    fitness through daily River Walk strolls, blending competitive spirit with low‑impact exercise.
  arts: James Pittman, who regularly spins classic jazz recordings by Miles Davis, John Coltrane, and Count Basie while attending occasional performances at the Majestic Theatre, adores the paintings of
    Texas artist Julian Onderdonk, and enjoys classic western films starring John Wayne, letting these cultural touchstones color his evenings and inspire his rose‑garden aesthetic.
  travel: James Pittman, who prefers leisurely road trips over long flights, has driven to Fredericksburg for wine tasting, visited the Alamo and other historic Texas sites, taken a family cruise to the
    Caribbean in his seventies, and now enjoys day trips to the Hill Country and occasional visits to his grandchildren in Dallas, balancing a love of adventure with the comfort of familiar routes.
  culinary: James Pittman, an avid home cook, blends his love of Tex‑Mex flavors by preparing enchiladas, chile rellenos, and homemade guacamole with garden‑fresh heirloom tomatoes for salads, while his
    signature side dish is a slow‑cooked pork barbacoa, though he occasionally over‑salts his dishes and compensates by sipping sweet tea.
  core: James Pittman, a 90‑year‑old educator‑turned‑volunteer, balances curiosity with practicality, lives modestly on a pension, manages age‑related health quirks with disciplined care, and finds joy
    in rose gardening, bridge, jazz, and preserving Texas heritage for future generations.
background:
  cultural: James grew up in post‑war Texas in a middle‑class Anglo‑American family that valued hard work, community service, and modest religious practice. His upbringing combined traditional Texan hospitality
    with exposure to the rich multicultural atmosphere of San Antonio, where Spanish language, Mexican cuisine, and local festivals were part of everyday life. These experiences shaped his respect for diverse
    traditions, a strong sense of local identity, and a balanced perspective that blends practicality with an openness to new ideas.
