  career_goals: Guided by a blend of curiosity for innovative mental-health solutions and a practical commitment to community well-being, Dorothy aims to expand her impact in several focused ways. She plans
    to establish a private practice in Horton that specializes in resilience and coping skills for adults, integrating telehealth to reach the wider rural population. She intends to publish a research monograph
    on the neurobiological underpinnings of emotional resilience, leveraging her STEM background. Securing a state grant to launch a community mental-health initiative that partners with local churches
    and schools is a priority, as is developing a digital assessment tool that combines traditional psychometrics with machine-learning insights. Over the next decade, she also aspires to serve as an adjunct
    professor, mentoring emerging psychologists and contributing to curricula that emphasize data-driven clinical practice.
