personas:
  professional: Dorothy Leblanc, a seasoned clinical psychologist in her late forties, blends rigorous neuropsychological assessment expertise with a calm, methodical approach, leveraging her proficiency
    in SPSS and R to translate statistical findings into individualized CBT, ACT, and resilience training interventions while reliably supervising junior clinicians and managing telehealth platforms.
  sports: Dorothy Leblanc, a solitary fitness enthusiast, favors low‑impact weekend hikes along the Tennessee River, occasional sunrise yoga at the local community center, follows the Nashville Predators,
    Tennessee Titans, and Nashville Sounds, and participates in the Horton Trail Runners Club’s organized walks, blending personal exercise with modest sports fandom.
  arts: Dorothy Leblanc, an avid amateur pianist, regularly practices Chopin’s Nocturnes and Debussy’s Arabesques, draws inspiration from Monet’s garden paintings and Virginia Woolf’s novels, and attends
    performances by the Knoxville Symphony, weaving these cultural experiences into her quiet evenings of creative expression.
  travel: Dorothy Leblanc, a methodical solo traveler, meticulously plans trips to tranquil destinations such as Asheville’s Blue Ridge Mountains, Charleston’s historic waterfront, Edinburgh’s stargazing
    festivals, and Kyoto’s zen gardens, balancing her love for nature with a conservative travel budget and a preference for low‑key accommodations.
  culinary: Dorothy Leblanc, a skilled home baker, delights in crafting Southern biscuits, peach cobbler, and blackberry preserves using fresh rosemary and vanilla bean, experiments with occasional croissant
    turnovers that sometimes over‑brown, and savors farm‑to‑table dinners featuring grilled catfish with lemon‑dill sauce, treating the kitchen as a quiet laboratory.
  core: Dorothy Leblanc, a calm, curiosity‑driven clinician, finds solace in roses, piano, and data, yet admits to hoarding rare seed packets and sidestepping social calls like a true introvert.
background:
  cultural: Dorothy's cultural roots are a blend of French-Canadian ancestry--reflected in her family name Leblanc--and the deep-southern traditions of Alabama where she was raised. Growing up in the small
    town of Horton, she absorbed the values of modesty, self-reliance, and community hospitality common to rural Marshall County. While her early life involved participation in local church events and county
    fairs, her adult worldview has become largely secular, emphasizing individual responsibility and evidence-based understanding of human behavior. The Southern culinary heritage, love of the natural landscape,
    and a respect for historical preservation continue to shape her daily rhythms, from the dishes she prepares to the local history societies she supports. This cultural tapestry informs both her compassionate
    approach to clients and her preference for quiet, reflective environments.
