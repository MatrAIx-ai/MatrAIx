  hobbies: '["Drawing and digital illustration", "Street photography", "Playing guitar and beat-making", "Acting and set design in drama club", "Collaborative video games", "Reading sci-fi, graphic novels,
    and design blogs", "Volunteering for mural projects and arts workshops", "Journaling for self-reflection", "Cooking diverse cultural dishes"]'
  career_goals: Looking ahead, Daemon aspires to turn his passion for art and community into a professional career. He plans to pursue a bachelor’s degree in visual communications or digital media, focusing
    on graphic design and multimedia storytelling. Ultimately, he hopes to work as a community‑focused creative director, producing campaigns and public artworks that amplify underrepresented voices and
    promote mental‑health awareness. In the long term, Daemon envisions establishing a youth arts nonprofit in the Silver Spring area, where he can mentor younger students and provide safe spaces for creative
    expression. He also aims to further develop his technical skills to integrate interactive media into his projects, bridging art and technology.
