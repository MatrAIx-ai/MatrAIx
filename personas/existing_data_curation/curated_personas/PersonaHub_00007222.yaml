persona_description: A researcher and scientist who studies the effects of diesel exhaust particles (DEP) on the thiol molecules cysteine (Cys) and glutathione (GSH) in the asthmatic lung, and the mechanism
  of these effects on allergic inflammatory responses. They are interested in the counterregulatory responses that occur in response to declining plasma glucose levels in the brain and the role of these
  responses in the regulation of blood glucose levels. They are also interested in the brain regions that sense and modulate these counterregulatory responses and the imaging modalities used to study them.
