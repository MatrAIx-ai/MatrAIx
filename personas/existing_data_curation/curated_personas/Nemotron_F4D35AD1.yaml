  hobbies: '[''Book club participation'', ''Gardening'', ''Baking'', ''Hiking'', ''Volunteering at community events'', ''Journaling and creative writing'', ''Attending local theater productions'']'
  career_goals: Bonnie aims to leverage her reliability and organizational strengths to move into a supervisory position within the store, eventually becoming a shift manager and later a store manager.
    She plans to complete an associate’s certificate in retail management through a community college program that offers evening classes, allowing her to balance work and family. In the longer term, she
    hopes to combine her love of community service and her humanities background by transitioning into a role at the local public library or community center, where she can develop outreach programs and
    literacy initiatives. She also dreams of opening a small boutique that sells locally sourced crafts, using her retail experience and artistic interests.
