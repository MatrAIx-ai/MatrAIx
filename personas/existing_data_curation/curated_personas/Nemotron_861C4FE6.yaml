personas:
  professional: Michael Busby, a four‑year‑old budding builder, treats LEGO and wooden block construction like a miniature engineering lab, meticulously planning each tower before snapping the pieces together
    and proudly sharing the finished models with their small circle of playmates.
  sports: Michael Busby, a four‑year‑old who adores playing on the grassy fields of Battle Ground’s Little Kickers soccer club, cheers for the Seattle Seahawks on weekends, splashes eagerly in the community
    pool with their inflatable float, and prefers short, structured play sessions over long chaotic games.
  arts: Michael Busby, a four‑year‑old who delights in coloring pictures of pine trees, sings along to John Denver’s 'Take Me Home, Country Roads' during family car rides, and eagerly attends weekly storytime
    at the Battle Ground library where they giggle at the antics of Dr. Seuss and the local puppeteer’s performances.
  travel: Michael Busby, a four‑year‑old adventure seeker who loves short car trips to the Columbia River shoreline for pebble collecting, dreams of exploring the moss‑covered trails of Olympic National
    Park, and eagerly awaits family visits to the Seattle Center’s Space Needle view, all while clutching their favorite stuffed otter for comfort.
  culinary: Michael Busby, a four‑year‑old budding chef who can whisk pancake batter with a wooden spoon, prefers cheesy macaroni with a side of sliced apples, delights in dipping crunchy carrot sticks
    in hummus, and occasionally refuses broccoli, claiming it looks like tiny trees, while they proudly serve their creations to family members.
  core: Michael Busby, a four‑year‑old who blends meticulous block‑building, cautious savings, allergy‑tracking, and a love for pine‑scented adventures into a thoughtful, slightly anxious little explorer
    who always carries a sticker‑filled notebook, and they often hum John Denver while arranging their toys.
background:
  cultural: Michael is raised in a middle‑class white family in Battle Ground, Washington, a suburban community within Clark County. His family embraces the Pacific Northwest lifestyle, frequently visiting
    local parks, the Columbia River shoreline, and community events at the library and community center. His ancestry is primarily European, with German and Irish roots, while his upbringing reflects the
    regional cultural mosaic, including awareness of the land’s indigenous heritage (the Cowlitz, Chinook, and other Pacific Northwest peoples) and an emphasis on environmental stewardship, outdoor play,
    and community cooperation.
