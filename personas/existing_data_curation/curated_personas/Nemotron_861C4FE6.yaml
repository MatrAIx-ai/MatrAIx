  career_goals: Even at his young age, Michael often talks about wanting to help people when he grows up. He imagines becoming a teacher or a pediatric nurse—roles that blend his curiosity about how things
    work with his strong desire to keep others safe and cared for. In the near term, his goals are to learn to tie his shoes, read simple picture books independently, and continue building his ability to
    work calmly with others, steps he sees as preparation for a future career dedicated to helping others.
