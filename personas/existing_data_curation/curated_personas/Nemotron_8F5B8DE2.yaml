personas:
  professional: Jordan Collins, a 29‑year‑old advertising and promotions manager in the Pacific Northwest, transforms abstract concepts into omnichannel brand narratives using copywriting, art direction,
    data analytics, and emerging AR experiences, while their laid‑back, disorganized work style lets them pivot on creative whims and thrive on collaborative brainstorming sessions.
  sports: Jordan Collins, an avid outdoors enthusiast, spends weekends hiking the Columbia River Gorge and kayaking on the Columbia River, supports the Portland Timbers in MLS, and belongs to a local rock‑climbing
    gym crew that meets every Thursday for bouldering practice.
  arts: Jordan Collins immerses themselves in analog photography, curating black‑and‑white street series inspired by Nan Goldin, attends Portland’s experimental music nights featuring Oneohtrix Point Never,
    and draws speculative fiction themes from N.K. Jemisin while regularly volunteering at community art workshops to teach collage techniques.
  travel: Jordan Collins prefers spur‑of‑the‑moment road trips along the Pacific Coast Highway, yet they’ve meticulously planned a solo trek to Iceland’s highlands for its waterfalls and basalt formations,
    balancing a love for rugged nature with occasional urban retreats in Kyoto for its art districts.
  culinary: Jordan Collins crafts artisanal coffee blends using Ethiopian Yirgacheffe beans and Colombian Supremo, enjoys cooking miso‑ramen with shiitake mushrooms and pork belly, and often indulges in
    grilled wild salmon topped with dill and lemon at local farmer’s markets.
  core: Jordan Collins, a 29‑year‑old creative nomad, blends an unstructured, curiosity‑driven work ethic with a passion for outdoor adventure, experimental art, and spontaneous coffee experiments, all
    while juggling a chaotic schedule and an ever‑growing collection of camera gear.
background:
  cultural: Jordan’s cultural background reflects a white, middle‑class upbringing in the Pacific Northwest, with family roots tracing back to German and Irish ancestry. Growing up near Washougal and the
    greater Portland area, he absorbed the region’s strong connection to nature, sustainability, and a thriving indie arts scene. The local coffee culture, craft breweries, and progressive community values
    have shaped his collaborative spirit and aesthetic sensibilities, while his broader American heritage provides a foundation of respect for hard work and community involvement.
attributes:
  skills: '[''Creative concept development'', ''Strategic campaign planning'', ''Copywriting'', ''Art direction'', ''Visual storytelling'', ''Market research and consumer insights'', ''Social media strategy'',
