  hobbies: '[''Hiking and trail running'', ''Kayaking'', ''Digital illustration and sketching'', ''Analog photography'', ''Independent film festival attendance'', ''Experimental music listening'', ''Tabletop
    role‑playing games'', ''Reading speculative fiction'', ''Home coffee brewing'', ''Volunteering at community art workshops'']'
  career_goals: Jordan aims to progress to a senior creative director or head of brand strategy position within the next five years, where he can lead larger, interdisciplinary teams and shape bold, culturally
    relevant campaigns. He aspires to build a portfolio of award‑winning work that merges art and technology, possibly exploring AR/VR experiences for social impact brands. In the long term, he envisions
    launching his own boutique creative studio that emphasizes collaborative culture, sustainability, and experimental storytelling, while also mentoring emerging talent and contributing to the local arts
    community.
