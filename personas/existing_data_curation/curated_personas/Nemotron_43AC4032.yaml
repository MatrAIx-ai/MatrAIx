  hobbies: '[''Gardening (herbs & vegetables)'', ''Cooking Peruvian cuisine'', ''Reading historical fiction and non-fiction'', ''Hiking in Shenandoah National Park'', ''Playing chess (strategic games)'',
    ''Volunteer driver for community seniors'']'
  career_goals: Lissette aims to transition from day-to-day driving to a supervisory role, aspiring to become a regional operations manager for a logistics firm in Virginia where she can oversee driver
    performance, safety compliance, and route efficiency. She also envisions launching a small independent freight brokerage that leverages her sales expertise and industry contacts, providing tailored
    shipping solutions for local businesses. To support this, she plans to earn a certification in commercial driver management and eventually offer driver training and consulting services, especially mentoring
    women entering the trucking industry. Her long‑term ambition includes securing a stable retirement income through a blend of consulting, training, and her own brokerage.
