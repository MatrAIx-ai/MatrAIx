persona_description: A WUSC (World United for Strong Communities) worker who focuses on improving health systems and promoting access to health and wellness. They are dedicated to strengthening the capacity
  of local non-governmental organizations and governments to provide quality health care services to marginalized and disadvantaged populations. They work towards ensuring equitable and inclusive access
  to treatment for those affected by HIV and AIDS, and providing care and support to those living with and affected by illness. Their approach includes building the capacity of partner organizations to
  better provide quality prevention, treatment, and care, and enhancing the quality of care and support for mothers and children under 5.
