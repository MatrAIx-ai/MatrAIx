  hobbies: '[''Painting'', ''Visiting Art Galleries'', ''Creative Writing (Poetry)'', ''Reading Non-fiction (Science, Philosophy)'', ''Yoga'', ''Hiking'', ''Gardening'', ''Experimental Cooking'', ''Travel'',
    ''Community Volunteering'']'
  career_goals: Meagan aims to advance to a regional director or chief operating officer role within a major health system, where she can champion patient‑centered innovations and expand community health
    initiatives across Orange County. She plans to complete her bachelor's degree in health administration and earn the FACHE credential, while also launching a pilot program that integrates art therapy
    into chronic disease management. Mentoring emerging health administrators and building partnerships with local nonprofit organizations are also central to her long‑term vision.
