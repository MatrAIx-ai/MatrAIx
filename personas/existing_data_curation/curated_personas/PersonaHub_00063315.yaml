  resolve, humility, and intelligence to achieve remarkable results. This person is aware of the importance of health and food security in times of crisis, and is well-versed in the principles of the Green
  Revolution. They are aware of the inter-state variation in health spending and food security, and have a clear understanding of the importance of investing in health infrastructure and food security.
  This person is aware of the potential for India to replicate the success of the Green Revolution in the current crisis, and is prepared to take bold and decisive action to address the health and food
  security challenges facing the country.
