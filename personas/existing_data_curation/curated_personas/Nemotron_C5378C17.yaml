personas:
  professional: Linda Thompson, a meticulous quality assurance engineer at a mid‑size manufacturing firm, channels their love for structure, precise sampling, and statistical process control into building
    bullet‑proof compliance programs while mentoring teammates with a compassionate, harmony‑focused approach that keeps the lab humming like a well‑tuned symphony.
  sports: Linda Thompson fuels their love of the outdoors by hiking the North Georgia mountains with the North Georgia Trailblazers Hiking Club each weekend, cheering on the Atlanta Braves during baseball
    season, and occasionally joining a local adult recreational softball league, all while keeping a disciplined regime of morning walks that echo the rhythm of their structured workday.
  arts: Linda Thompson channels their creative side through nightly mystery novel marathons featuring Agatha Christie and Gillian Flynn, captures sunrise‑lit mountain vistas in the style of Ansel Adams
    with their DSLR, knits cozy scarves while listening to The Lumineers, and occasionally volunteers as a set painter for the local community theater’s production of Arthur Miller’s The Crucible.
  travel: Linda Thompson prefers meticulously planned weekend getaways to scenic destinations like the Blue Ridge Parkway and Asheville, NC, while dreaming of a future trek through the Scottish Highlands,
    balancing a love for restorative nature hikes with occasional urban explorations of historic European capitals.
  culinary: Linda Thompson enjoys cooking at an intermediate level, favoring farm‑to‑table dishes such as butternut squash risotto, grilled peach salad with fresh basil and local honey, and often experiments
    with seasonal produce from their community garden while occasionally indulging in a well‑crafted cheese board after a long hike.
  core: Linda Thompson blends a razor‑sharp eye for detail with a soft spot for cozy crafts, often over‑planning both work audits and knitting projects, and can't resist buying an extra skein of yarn when
    a sale pops up, despite knowing it will add to their growing stash.
background:
  cultural: Linda grew up in Cleveland, a close‑knit town in White County, Georgia, within a Southern Appalachian cultural milieu that emphasizes community support, modesty, and self‑reliance. Her family
    traditions include church gatherings, seasonal harvest festivals, and a respect for the natural environment of the nearby hills. These influences fostered her compassionate outlook and collaborative
    spirit, while the region’s emphasis on hard work and practical problem solving shaped her methodical, organized approach to both professional and personal life.
attributes:
  skills: '["Quality Assurance Inspection", "Statistical Process Control (SPC)", "Data Logging & Analysis", "Regulatory Compliance (FDA/USDA)", "Equipment Calibration", "Root Cause Analysis", "Process Documentation",
