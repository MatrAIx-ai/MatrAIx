  hobbies: '["Trail hiking in the North Georgia mountains", "Knitting and crocheting for charity", "Reading classic mystery novels", "Community gardening", "Volunteer work at the local animal rescue", "Nature
    and industrial landscape photography"]'
  career_goals: Driven by her practical nature and desire to help others, Linda aims to advance to a senior quality manager role within the next five years, overseeing a cross‑functional team and shaping
    company‑wide quality strategies. She plans to earn an ASQ Certified Quality Engineer (CQE) credential and eventually transition into a consultancy position where she can mentor smaller manufacturers
    in establishing robust quality systems. Her long‑term ambition includes spearheading community workshops on food safety and sustainable production practices.
