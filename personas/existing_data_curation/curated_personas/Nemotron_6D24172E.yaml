personas:
  professional: Christopher Mahon is a seasoned office equipment operator with over three decades of experience in copier maintenance, preventative troubleshooting, and staff training, who channels their
    love of routine and hands‑on problem solving into a reliable, no‑nonsense work ethic that makes them the go‑to person for keeping the facility's machines humming, and they are now pursuing certification
    as a Maintenance Technician to formalize their expertise.
  sports: Christopher Mahon spends Saturdays at the local bowling alley as a competitive member of the River City Bowlers league, they also cheer on the Indianapolis Colts and their hometown high‑school
    football team each fall, and they keep fit through fishing trips and light gardening rather than formal gym workouts.
  arts: Christopher Mahon enjoys classic rock and country tunes from artists like Bruce Springsteen, Johnny Cash, and John Denver, they often listen to these songs while tinkering in the garage or mowing
    the garden, and they occasionally attend community theater productions of classic American westerns, which they find both nostalgic and soothing.
  travel: Christopher Mahon prefers low‑key road trips in their restored pickup, planning most stops on the fly, they have taken memorable drives to the Upper Peninsula of Michigan’s rugged shorelines,
    the BBQ‑rich streets of Nashville, and the sunny beaches of the Outer Banks, while dreaming of a future cruise along the Pacific Northwest coastline.
  culinary: Christopher Mahon, a modestly skilled home cook, whips up Midwestern comfort dishes such as hearty beef chili with home‑grown tomatoes, grilled pork ribs glazed with brown sugar and mustard,
    and buttery cornbread, they also love a fresh‑caught trout grilled with lemon and herbs from their lake hauls.
  core: Christopher Mahon is a practical, routine‑loving handyman who balances competitive bowling and truck restoration with a laid‑back approach to obligations, a touch of skepticism, and a steady commitment
    to family stability, and they always make sure their garden yields enough vegetables for the holidays.
background:
  cultural: Christopher grew up in Bedford, Indiana, a small Midwestern town with deep family roots in Monroe County. Raised in a Protestant (Methodist) household, he internalized traditional Hoosier values
    of self‑reliance, community involvement, and a strong work ethic. Local customs such as county fairs, high‑school football games, and 4th of July celebrations shaped his social life. His cultural identity
    blends modest conservatism with a practical, no‑nonsense outlook, emphasizing family, routine, and the importance of dependable, hands‑on work.
