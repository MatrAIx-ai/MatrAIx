persona_description: A concerned official responsible for fire safety and prevention, who is aware of the dangers posed by natural cover fires and brush fires in dry, warm weather conditions. They are aware
  of the common causes of these fires, including barbecuing, setting off fireworks, and improperly disposing of smoking materials. They are also aware of the importance of calling 911 in the event of a
  fire that quickly spreads or spreads to a building. They are responsible for educating the public on how to properly extinguish small fires and encourage them to call them in the event of a fire.
