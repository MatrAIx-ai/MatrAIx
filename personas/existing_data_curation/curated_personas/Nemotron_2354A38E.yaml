personas:
  professional: Construction manager Brien Barbour leads multi‑million‑dollar commercial builds with meticulous schedule precision, BIM‑driven designs, and tight budget stewardship, channeling their competitive
    drive and love of artistic form into every blueprint.
  sports: A regular on the community YMCA intramural basketball league and an avid hiker on the Piedmont Trail, Brien Barbour roots for the Atlanta Hawks and Atlanta Braves, combining weekly pick‑up games
    with sunrise Oconee River fishing trips to balance cardio bursts with serene endurance workouts.
  arts: When not on a job site, Brien Barbour wanders Savannah’s historic art district, sketches downtown skylines in watercolor, attends live shows by The Avett Brothers and St. Paul’s choir, and collects
    limited‑edition prints by contemporary muralist Maya Hayuk.
  travel: Mixing structured itineraries with spur‑of‑the‑moment detours, Brien Barbour has road‑tripped through the Appalachian foothills to Asheville, sipped coffee in Charleston’s historic district, and
    dreams of swapping a construction site for a week‑long design tour of Copenhagen’s sustainable neighborhoods.
  culinary: A self‑proclaimed ‘food‑festival connoisseur,’ Brien Barbour alternates between devouring smoky Georgia‑style barbecue ribs, savoring fresh stone‑fruit salads with locally sourced pecans, and
    experimenting with fermenting kombucha at home, all while perfecting a go‑to skillet‑seared salmon seasoned with lemon‑dill and smoked paprika.
  core: Construction‑savvy Brien Barbour blends a Southern work ethic with a restless curiosity, obsessively color‑coding every to‑do list while habitually doodling bridge designs on napkins between coffee
    breaks.
background:
  cultural: 'Brien grew up in the close‑knit community of Haddock, GA, a small town in Baldwin County with deep Southern roots. His family emphasized hard work, self‑reliance, and community service, values
    reinforced by regular participation in local church events and town festivals. While he was immersed in traditional Southern hospitality, country music, and home‑cooked meals, Brien also embraced a
    broader worldview through school art programs, regional museums, and online exposure to diverse cultures. This blend of regional heritage and openness to new ideas shapes his identity: a pragmatic,
    disciplined professional who respects his Southern upbringing yet actively seeks unconventional perspectives in both his career and personal life.'
attributes:
  skills: '[''Project management'', ''Construction site supervision'', ''Blueprint interpretation'', ''Budget forecasting'', ''Scheduling (MS Project, Primavera)'', ''Safety compliance (OSHA 30)'', ''Contract
    negotiation'', ''Team leadership'', ''Quality control'', ''Sustainable building practices'', ''BIM basics (Revit)'', ''Vendor management'', ''Problem solving'']'
  hobbies: '[''Attending local art exhibitions'', ''Sketching and watercolor painting'', ''Playing pick‑up basketball'', ''Hiking and river fishing'', ''Volunteer work with Habitat for Humanity'', ''Exploring
    new restaurants and food trends'', ''Playing construction simulation video games (e.g., Cities: Skylines)'', ''Reading books on architecture and sustainable design'', ''Collecting vintage hand tools'']'
  career_goals: Brien aims to advance to senior project management roles overseeing multi‑million‑dollar commercial developments across the Southeast, while earning LEED AP credentials to champion green
    construction. He plans to supplement his high‑school education with industry certifications and an associate degree in construction management, eventually launching his own firm that merges innovative
    building technologies with artistic design concepts. Long‑term, he hopes to become a respected speaker at regional construction conferences, mentor apprentices, and serve on the board of the local Home
    Builders Association to influence sustainable building policies.
