personas:
  professional: Samuel Gilliard, a five‑year‑old aspiring ‘CEO’ of his LEGO empire, channels his love for structure and practical problem‑solving into meticulously planning building projects, assigning
    tidy‑up duties to his stuffed‑animal staff, and adjusting on the fly when a tower collapses, showcasing early leadership and reliability.
  sports: Samuel Gilliard, a five‑year‑old member of the Riverdale Junior Soccer Club, avidly cheers for the local professional team the Riverdale Rangers, practices dribbling after school, and eagerly
    participates in weekend T‑ball games, balancing structured practice with spontaneous backyard races.
  arts: Samuel Gilliard, a five‑year‑old who loves drawing cartoon superheroes, sings along to Disney’s Let It Go, watches the animated series Bluey, and draws inspiration from artists such as Walt Disney
    and children’s author‑illustrator Mo Willems, making art a daily ritual that fuels his imagination.
  travel: Samuel Gilliard, a five‑year‑old who dreams of revisiting the interactive exhibits at the Children’s Museum of Houston and plans a future family trip to Disneyland in California after his last
    adventure at the local zoo, balances his love for structured educational tours with the excitement of new playgrounds.
  culinary: Samuel Gilliard, a five‑year‑old who delights in crunchy carrot sticks, cheesy macaroni with cheddar, honey‑glazed chicken nuggets, proudly helps stir batter for banana pancakes, insists on
    sprinkling cinnamon, yet stubbornly refuses broccoli, reflecting a selective palate tempered by curiosity.
  core: Samuel Gilliard, a five‑year‑old who thrives on tidy LEGO regimes, saves every coin, battles allergies, scores goals for his junior soccer team, sings Disney melodies, plans museum trips, and stubbornly
    refuses broccoli, embodies a charming blend of order, curiosity, and childlike determination.
background:
  cultural: Samuel’s family is of white American heritage living in Campbell, a suburban city in Santa Clara County. The neighborhood is culturally diverse, with many Asian and Hispanic neighbors, but his
    household celebrates traditional American holidays such as Thanksgiving, Christmas, and the Fourth of July with family gatherings and community potlucks. Growing up near Silicon Valley, he has early
    exposure to technology and values structure, punctuality, and community involvement fostered by his parents.
