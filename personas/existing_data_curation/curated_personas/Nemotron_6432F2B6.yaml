  career_goals: Samuel’s emerging ambitions center on roles that provide clear structure and the chance to help others. He often talks about becoming an astronaut, fascinated by rockets and space, or a
    firefighter, attracted to routine drills and community service. He also expresses interest in teaching because he enjoys sharing what he learns with friends.
