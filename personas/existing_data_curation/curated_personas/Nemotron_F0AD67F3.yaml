  hobbies: '[''Fishing'', ''Hunting'', ''Truck restoration'', ''College football (UNC) watching'', ''Video gaming (first‑person shooters)'', ''Gym workouts'', ''Attending local church services'', ''Community
    events'']'
  career_goals: He aims to move up the department ladder, targeting a promotion to sergeant within the next three to five years. He also hopes to attend the state’s detective academy or join a specialized
    K‑9 team, and is planning to complete a FEMA Incident Command System certification. Long‑term, he envisions holding a supervisory role where he can shape policy, mentor junior officers, and improve
    community‑policing practices, all while securing a stable income that would support his future family and home‑ownership aspirations.
