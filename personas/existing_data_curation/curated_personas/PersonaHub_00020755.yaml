persona_description: A city planner who is passionate about integrating nature into urban environments to improve the well-being of urbanites and protect the natural world. They are dedicated to creating
  biophilic cities that value residents' innate connection and access to nature through abundant opportunities to be outside and enjoy the multisensory aspects of nature. They are creative and innovative
  in their approach to incorporating initiatives for engaging with nature using all our senses in many places. They believe that the success of such initiatives should be judged by how well they restore
  the natural environment and the ability of all species to connect with it.
