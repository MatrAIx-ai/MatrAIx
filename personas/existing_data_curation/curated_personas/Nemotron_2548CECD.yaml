  hobbies: '[''Experimenting with new recipes at home'', ''Grilling and seafood cooking'', ''Pickup basketball'', ''Attending live music gigs'', ''Volunteering at a community food pantry'', ''Watching cooking
    shows'', ''Reading food‑history books'', ''Weekend trips to explore local culinary traditions'']'
  career_goals: Robert aims to progress from line cook to sous chef within the next two years, focusing on expanding his knowledge of regional Mid‑Atlantic cuisine and developing leadership abilities. He
    dreams of eventually opening his own neighborhood restaurant that emphasizes community, seasonal local ingredients, and an inclusive, lively dining experience where he can combine his love for cooking
    with his sociable personality.
