personas:
  professional: Robert Brown is a diligent line cook in Baltimore’s bustling kitchen scene, leveraging precise knife work, sauce mastery, and strict food‑safety standards while coordinating a tight‑knit
    team with the reliability and sociability that drives their ambition to become a sous chef within two years and eventually open a community‑focused restaurant.
  sports: Robert Brown is a regular on the Westport community park basketball court, cheering for the Baltimore Ravens and occasionally joining a local amateur basketball league that practices on Saturday
    evenings, and they also follow the Baltimore Blast indoor soccer team for inspiration.
  arts: Robert Brown frequents live music venues in the Inner Harbor, especially enjoying the soulful blues of local guitarist Johnny Green, the upbeat folk tunes of the Maryland Bluegrass Band, and the
    occasional jazz sets at the legendary Keystone Korner, which fuel their sociable energy and conversation starter at the kitchen.
  travel: Robert Brown prefers short, budget‑friendly road trips that combine culinary discovery with a dash of history, having explored Annapolis’s crab shacks, Frederick’s farm‑to‑table restaurants, and
    the vibrant food markets of Washington, D.C., always planning itineraries that leave room for spontaneous detours to roadside diners.
  culinary: Robert Brown experiments with Baltimore‑style dishes at home, mastering the perfect Old Bay‑seasoned crab cake, a charcoal‑grilled salmon drizzled with lemon‑butter sauce, and a sizzling BBQ
    pork rib with a secret mustard glaze, while they maintain a meticulous inventory of spices, knives, and fresh seafood sourced from the Inner Harbor fish markets.
  core: Robert Brown blends a structured work ethic with an outgoing love of community, juggling meticulous kitchen discipline, budget‑savvy habits, occasional midnight snacks, and a habit of overscheduling
    social events that sometimes leaves them short on sleep.
background:
  cultural: Robert grew up in a working‑class white family of Irish‑German descent in Baltimore’s East Baltimore neighborhood. His family celebrated traditional holidays with hearty home‑cooked meals and
    backyard barbecues, and he was exposed early to the city’s diverse food scene, from crab cakes to soul‑food dishes. This blend of his ethnic heritage and the multicultural urban environment shaped his
    appreciation for regional flavors, community hospitality, and the value of hard work.
attributes:
  skills: '[''Knife skills'', ''Sauce preparation'', ''Food safety compliance (ServSafe)'', ''Menu development'', ''Inventory control'', ''Time management'', ''Team coordination'', ''Customer service'',
