persona_description: A technology and ethics researcher who is interested in the development of autonomous machines and their ethical implications. They are knowledgeable about the potential harm that can
  come from automated agents integrating into modern life and the importance of employing ethical subroutines to evaluate their possible actions before carrying them out. They are also familiar with the
  interplay between ethical sensitivity and increasingly complex autonomy and the importance of full moral agency in designing Automated Moral Agents. They have a background in computer science and have
  experience with various models of automated moral agency, including those presented in the text.
