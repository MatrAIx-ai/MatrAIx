  hobbies: '[''Fishing'', ''Hunting'', ''Woodworking'', ''Gardening'', ''High School Football Spectating'', ''Listening to Classic Rock and Country Music'', ''Playing Strategy Video Games'', ''Community
    Event Participation'']'
  career_goals: Jason aims to leverage his hands‑on experience into a shift‑lead position within the next two years. He plans to obtain a forklift trainer certification and enroll in the local community
    college to earn an associate degree in logistics or business administration. Long‑term, he aspires to become a warehouse manager overseeing multiple sites, with a focus on improving process efficiency
    and employee engagement. He also entertains the idea of starting a small side venture selling locally produced goods online, providing additional financial stability for his family.
