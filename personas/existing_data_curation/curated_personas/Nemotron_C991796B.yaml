  hobbies: '[''Oil painting'', ''Landscape photography'', ''Visiting contemporary art galleries and museums'', ''Reading speculative fiction and philosophy'', ''Writing poetry'', ''Hiking in the Rocky Mountains'',
    ''Playing chess'', ''Listening to jazz and practicing saxophone'', ''Mindfulness meditation'', ''Collecting vintage vinyl records'']'
  career_goals: Jayden aims to ascend to a C‑suite role—preferably Chief Financial Officer—within an organization that values innovation, sustainability, and interdisciplinary thinking. He is driven to
    establish a boutique advisory firm that merges traditional finance with emerging sectors such as art investment, sustainable assets, and fintech, positioning himself as a thought leader at the intersection
    of finance and creativity. Parallel to his professional ascent, he plans to author a book that explores how aesthetic principles can inform strategic financial decision‑making, thereby cementing his
    reputation as a competitive pioneer in the field.
