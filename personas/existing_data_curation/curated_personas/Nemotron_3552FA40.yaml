  career_goals: Albert aspires to advance to detective rank within the next three years, focusing on homicide and cybercrime investigations. He also plans to complete the state's Leadership Academy to qualify
    for a future precinct commander or chief position. A key ambition is to develop a community-arts initiative that uses local artists to strengthen police-public relationships, reducing crime through
    cultural engagement. He seeks advanced training in forensic technology and crisis negotiation to broaden his impact.
