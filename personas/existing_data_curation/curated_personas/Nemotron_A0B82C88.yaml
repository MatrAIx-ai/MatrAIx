  career_goals: Sean aims to solidify a lasting legacy for his company by driving sustainable growth and preparing a smooth succession within the next five years. He seeks to transition into a board advisory
    role while mentoring emerging leaders, and to expand his philanthropic impact in Knoxville, especially through support for local arts, education, and historical preservation. Concurrently, he is committed
    to enhancing his emotional resilience through executive coaching, mindfulness practice, and targeted stress‑management strategies.
