persona_description: A researcher who studies the process of naming and publishing new species, particularly those that have been discovered more than 20 years ago and may be at risk of extinction. They
  are interested in the reasons behind the delay in naming and publishing and the potential impact on biodiversity estimates. They are also interested in the factors that contribute to the delay, such as
  the time required for extensive literature searches and the lack of attention given to new species by high profile journals.
