personas:
  professional: Zoila Velazquez is a budding visual storyteller who merges cartoon sketching with beginner‑level coding, using Scratch to animate her characters while leading art‑club projects, reflecting
    her curiosity, organized yet flexible mindset, and love for collaborative creation.
  sports: Zoila Velazquez thrives on the after‑school soccer field as a midfielder for the Rising Stars Youth Soccer Club, cheering for the LA Galaxy during family match viewings, and they approach fitness
    with enthusiastic group drills, weekend park runs, and a habit of stretching before practice to stay agile.
  arts: Zoila Velazquez devotes free time to drawing characters inspired by classic Disney animator Glen Keane and contemporary creator Rebecca Sugar, while listening to pop icons Taylor Swift and the traditional
    Mexican ballads of Luis Miguel, and they regularly attend museum workshops to experiment with mixed‑media techniques like paper‑mâché, guided by resident artists.
  travel: Zoila Velazquez loves family road trips to nearby state parks such as Redwood National Forest and cultural day visits to museums in Washington, D.C., while dreaming of a future adventure to Barcelona's
    historic streets, balancing careful budgeting with a passion for vibrant street art and local cuisine.
  culinary: Zoila Velazquez eagerly assists in making homemade tamales with masa, pork, and chili peppers, enjoys crafting guacamole with ripe avocados, cilantro, and lime, and also delights in baking chocolate‑chip
    cookies, showcasing a budding intermediate cooking skill set flavored by both traditional Mexican dishes and classic comfort foods.
  core: Zoila Velazquez is a curious, socially vibrant 11‑year‑old who blends artistic imagination with tech curiosity, worries a bit too often, but channels that energy into caring community projects and
    vibrant creations.
background:
  cultural: Zoila is a first‑generation Mexican‑American growing up in Houston’s vibrant multicultural community. At home, Spanish is spoken alongside English, and family traditions such as celebrating
    Día de los Muertos, cooking tamales, and listening to mariachi music are central to her life. Her parents emphasize respect for elders, community solidarity, and the importance of helping others, which
    aligns with her compassionate nature. The diverse neighborhoods of Houston expose her to a blend of Latin American festivals, Tex‑Mex cuisine, and multicultural arts, shaping her identity as someone
    who proudly embraces both Mexican heritage and American experiences.
