  career_goals: Zoila dreams of one day becoming an art teacher who can blend creativity with cultural storytelling, using her bilingual skills to inspire students from diverse backgrounds. She also imagines
    creating community murals that celebrate Mexican heritage and promote unity. In the longer term, she is interested in studying child psychology or social work to help children cope with stress, drawing
    on her own experiences of worry. She aims to combine her love for art and compassion for others into a career that fosters emotional well‑being and cultural pride.
