personas:
  professional: Adriane Garcia is an aspiring junior software developer and avid PC builder who applies their love for strategy games to algorithm design, leverages their practical, detail‑oriented approach
    when assembling hardware, yet often leaves parts of their project schedule to chance, reflecting a blend of structure‑seeking and flexible, solitary work style.
  sports: Adriane Garcia prefers solitary hikes on Austin’s Greenbelt and Lone Star Park trails, occasionally joins the Austin Trails Association’s weekend runs, while cheering on Austin FC in MLS and the
    Texas Longhorns football team from the comfort of their bedroom, rarely participating in team sports but keeping a modest cardio routine guided by lo‑fi playlists.
  arts: Adriane Garcia immerses themselves in sci‑fi and fantasy worlds by rereading classics like Frank Herbert’s Dune and Brandon Sanderson’s Mistborn, sketches digital fan‑art inspired by the aesthetic
    of Studio Ghibli’s Miyazaki, and curates chill playlists featuring instrumental composers such as Yiruma and lo‑fi streamers like Lofi Girl, while occasionally visiting the Blanton Museum of Art for
    modern installations.
  travel: Adriane Garcia favors low‑key, solo backpacking trips that blend hiking with cultural immersion, having explored the Hill Country towns of Wimberley and Fredericksburg on weekend getaways, dreaming
    of trekking the emerald trails of Iceland’s Þingvellir National Park and visiting Kyoto’s Arashiyama bamboo forest once they save enough from their part‑time coding gigs.
  culinary: Adriane Garcia, a pragmatic kitchen experimenter, enjoys crafting quick meals like spicy chicken tacos with fresh cilantro and lime, whipping up avocado toast topped with feta and chili flakes,
    and occasionally attempts homemade ramen—complete with miso broth and soft‑boiled eggs—while still favoring the convenience of locally sourced food trucks for late‑night gaming snacks.
  core: Adriane Garcia is a solitary, strategically‑minded teen who builds PCs with meticulous check‑lists yet forgets to back up their game saves, shuns large social scenes, and balances a competitive
    drive with a penchant for spontaneous snack runs at midnight.
background:
  cultural: Adriane is a white Texan, likely of mixed European ancestry (e.g., German and Irish heritage), raised in a suburban neighborhood of Austin, Texas. Her family observes traditional Texan customs
    such as Thanksgiving dinners and Fourth of July fireworks, but the city’s vibrant tech scene and diverse cultural landscape have shaped her interests in coding, indie gaming, and multicultural cuisine.
    While she lives in a region where football and barbecue are popular, she gravitated toward quieter, solitary pursuits, finding community online and through individual creative projects rather than local
    group activities.
