  career_goals: Adriane aspires to pursue a career in software development, with a particular interest in indie game design that allows her to work independently and apply her strategic thinking. She plans
    to enroll in a community college’s computer science program after completing high school equivalency, build a portfolio of apps and small games, and eventually launch a solo consultancy that offers
    custom software solutions. Her competitive drive fuels a goal of contributing to open‑source projects and earning recognition for clean, efficient code.
