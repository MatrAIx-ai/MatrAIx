  hobbies: '[''Hiking in the Berkeley hills'', ''Bollywood dance classes'', ''Cooking South Asian meals'', ''Volunteering at local food banks'', ''Yoga for stress management'', ''Reading contemporary fiction'',
    ''Board game nights'', ''STEM mentorship for high school students'', ''Participating in sustainability meetups'']'
  career_goals: Rehana aims to advance into senior logistics leadership within the next five years, targeting roles such as Logistics Manager or Supply Chain Operations Lead at a technology-driven company.
    She plans to earn the Certified Supply Chain Professional (CSCP) credential and later pursue an MBA to broaden her strategic perspective. Passionate about sustainability, she envisions leading initiatives
    that reduce carbon footprints in distribution networks and eventually establishing a consultancy that helps small South Asian businesses adopt green logistics practices. Throughout her career, she seeks
    to balance high-impact performance with a collaborative, supportive workplace culture.
