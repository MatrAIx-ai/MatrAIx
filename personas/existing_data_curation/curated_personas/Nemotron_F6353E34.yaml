personas:
  professional: Rehana Ahmad, a logistics analyst specializing in data‑driven supply chain optimization, channels their methodical, organized nature and sociable teamwork style into end‑to‑end planning,
    demand forecasting, and cross‑functional coordination using Python, SQL, SAP, and Oracle, consistently delivering on‑time results while nurturing collaborative vendor relationships.
  sports: Rehana Ahmad hikes the Berkeley Hills with the Bay Area Hiking Collective, plays recreational co‑ed volleyball, follows the Golden State Warriors and San Francisco 49ers, and incorporates thrice‑weekly
    yoga sessions to balance their structured fitness routine and stay energized for group activities.
  arts: Rehana Ahmad, an enthusiastic Bollywood dance participant inspired by Shiamak Davar, devours contemporary fiction by Sally Rooney and Chimamanda Ngozi Adichie, and savors board‑game nights featuring
    Settlers of Catan while occasionally streaming films starring Priyanka Chopra.
  travel: Rehana Ahmad prefers meticulously planned weekend escapes, alternating adventurous hikes in Yosemite with relaxing wine tours in Napa Valley, while dreaming of culturally immersive trips to Bali’s
    rice terraces and a future backpacking journey through Istanbul’s historic neighborhoods.
  culinary: Rehana Ahmad, a confident home chef, regularly hosts potluck dinners showcasing aromatic chicken tikka masala, vegetable biryani, and crisp samosas seasoned with cumin, turmeric, and cardamom,
    and enjoys experimenting with fusion twists like mango‑chili salsa.
  core: Rehana Ahmad blends analytical precision with vibrant community energy, yet often over‑plans and wrestles with anxiety, leading them to double‑check spreadsheets while humming Bollywood rhythms
    during a hike.
background:
  cultural: Rehana grew up in a South Asian immigrant family in the Bay Area, blending the collectivist values of her heritage with the individualistic ethos of the United States. Fluent in English and
    her family’s native language (e.g., Hindi or Bengali), she maintains strong ties to cultural traditions, celebrating festivals such as Diwali and Eid with her extended family and community. Her upbringing
    emphasized education, respect for elders, and the importance of contributing to the community, shaping her cooperative nature and sense of responsibility. In Berkeley, she actively participates in South
    Asian cultural organizations, using her background to foster inclusive, cross-cultural dialogue within her workplace and social circles.
attributes:
  skills: '[''Supply chain planning'', ''Inventory management'', ''Demand forecasting'', ''Data analysis (Python, SQL, Excel)'', ''ERP system operation (SAP, Oracle)'', ''Process optimization'', ''Project
