  career_goals: Although retired, Josette remains ambitious about her personal legacy. She aspires to document the oral histories of Dixon’s longtime residents, compiling a community memoir that could be
    donated to the local library. She hopes to become a volunteer docent at the Lee County Historical Museum, sharing her art appreciation and historical insights with visitors. Josette also plans to master
    a new artistic medium, such as watercolor painting, and to exhibit a small collection at the senior‑center’s annual showcase. Continuing her learning journey, she wants to complete an online certificate
    in genealogy to deepen her research skills. Ultimately, she seeks to mentor younger volunteers, passing on her organizational know‑how and love of community storytelling, while staying physically active
    through gardening and regular walks along the Rock River.
