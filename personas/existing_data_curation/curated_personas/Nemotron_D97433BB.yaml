personas:
  professional: Sacha Edwards, a 21‑year‑old telecommunications field technician in Baton Rouge, blends expert fiber‑optic splicing, aerial line work, and customer‑facing troubleshooting with a laid‑back,
    improvisational style that lets them stay calm under pressure while occasionally letting organization slip in favor of on‑the‑spot problem solving.
  sports: Sacha Edwards, a devoted LSU Tigers fan, tailgates with friends for football and basketball while also belonging to a local kayaking club that meets on weekends at the Atchafalaya Basin, competes
    in a community flag‑football league, and favors functional workouts like rope climbs over structured gym routines, always chasing the next personal record.
  arts: Sacha Edwards channels rhythmic energy by playing djembe in a neighborhood youth circle inspired by West African beats and freestyling rap verses after listening to Kendrick Lamar and Nipsey Hussle,
    while their love for sci‑fi novels from N.K. Jemisin to Ann Leckie fuels occasional cosplay at local conventions, making the arts a vibrant outlet for creative problem‑solving.
  travel: Sacha Edwards prefers spontaneous road trips that blend swamp exploration and city culture, regularly weekend‑hiking the Bayou Cane, dreaming of kayaking the fjords of Norway, and saving for a
    budget‑friendly spring break in Austin’s music scene, all while balancing a modest student‑loan budget.
  culinary: Sacha Edwards boasts a knack for whipping up authentic gumbo and po’boy sandwiches, seasoning with Andouille sausage, okra, and filé powder, and while their cooking skill hovers at intermediate,
    they love experimenting with Creole‑inspired shrimp étouffée and swapping recipes with fellow sci‑fi fans at book club potlucks.
  core: Sacha Edwards is a calm, competition‑driven tech whiz who fuses fiber‑optic expertise with djembe rhythms, while occasionally misplacing tools, splurging on gadgets, and chasing tailgate triumphs.
background:
  cultural: Sacha’s identity is shaped by the rich tapestry of African‑American life in Baton Rouge. Growing up in a close‑knit extended family, Sunday church services, gospel choirs, and community picnics
    have instilled in her a sense of collective responsibility and spiritual resilience. The city’s blend of Creole, Cajun, and Southern Black culinary traditions informs her love for gumbo, jambalaya,
    and po’boys, while local music venues expose her to blues, jazz, and hip‑hop that echo her cultural roots. She is aware of the historic civil‑rights struggles in Louisiana, and this awareness fuels
    her ambition to improve broadband access for marginalized neighborhoods. Her cultural background provides a foundation of perseverance, a practical outlook toward work, and a deep appreciation for community
    solidarity.
attributes:
  skills: '[''Fiber optic splicing'', ''Coaxial cable installation'', ''Signal testing (OTDR, spectrum analyzer)'', ''Electrical safety compliance'', ''Reading technical schematics'', ''Pole climbing and
    aerial line work'', ''Customer communication'', ''Basic network troubleshooting'', ''Use of hand and power tools'', ''Rapid problem‑solving under pressure'']'
  hobbies: '[''Playing djembe'', ''Freestyle rap at open‑mic nights'', ''Watching LSU Tigers football and basketball'', ''Fishing in Bayou Cane'', ''Kayaking in Atchafalaya Basin'', ''DIY electronics with
    Arduino and Raspberry Pi'', ''Reading science‑fiction'', ''Cooking Cajun and Creole dishes'', ''Volunteering at church youth tech workshops'']'
  career_goals: Short‑term, Sacha aims to earn the Certified Fiber Optic Technician (CFOT) credential and complete a formal apprenticeship that will qualify her for senior installer positions. She wants
    to lead a crew on large‑scale fiber deployments for the city’s expanding 5G and broadband initiatives, building a reputation for impeccable safety records and on‑time project delivery. Over the next
    five years she plans to attend night classes at Baton Rouge Community College to obtain an associate degree in telecommunications technology, positioning herself for a transition to project management.
    Ultimately she dreams of launching her own contracting firm that prioritizes digital‑equity projects in underserved neighborhoods, and she hopes to become a mentor for other young Black women entering
    skilled trades.
