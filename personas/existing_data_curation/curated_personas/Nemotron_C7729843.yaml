  hobbies: '[''Recreational basketball league'', ''Community volunteer work (clean‑ups, food pantry)'', ''DIY home‑improvement projects'', ''Gardening (vegetable garden)'', ''Reading (DIY manuals, self‑help)'',
    ''Classic rock music'', ''Socializing with friends (game nights, barbecues)'', ''Local history and genealogy research'']'
  career_goals: Jonathan aims to transform his practical skill set into a certified trade career, seeking an apprenticeship or certification as an electrician or plumber so he can launch a small, community‑focused
    contracting business. He also aspires to secure a stable full‑time role in community outreach or local government where his organizational talent, sociable nature, and problem‑solving abilities can
    improve neighborhood services. Financial independence, reduced stress, and recognition as a reliable pillar of the Bellwood community drive his ambitions.
