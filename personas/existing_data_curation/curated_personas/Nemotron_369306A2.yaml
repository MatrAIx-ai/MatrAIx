personas:
  professional: Kendrick Cummings is an aspiring junior soccer forward who thrives on the immediate challenge of scoring goals at the Philly Juniors Soccer Club, balancing a practical, hands‑on approach
    to building LEGO towers while occasionally letting the day's schedule drift when a spontaneous block‑party call interrupts practice.
  sports: Kendrick Cummings loves playing soccer at the local park, cheering for the Philadelphia Union, and participates in the Philly Juniors Soccer Club, while also joining weekend basketball pick‑up
    games and rooting for the Philadelphia 76ers with friends at the neighborhood recreation center.
  arts: Kendrick Cummings immerses themselves in animated series like "Spider‑Man" and "Miraculous Ladybug," sketches heroic cityscapes inspired by the Philadelphia skyline, and sings along to songs by
    Lin‑Manuel Miranda and Beyoncé during Sunday church celebrations.
  travel: Kendrick Cummings dreams of visiting Orlando’s theme parks after school holidays, loves weekend trips to the historic Liberty Bell and Independence Hall in Philadelphia, and wishes to explore
    the vibrant streets of New Orleans during a family vacation.
  culinary: Kendrick Cummings adores cheesy macaroni, chicken nuggets, and pepperoni pizza, often helping to stir in shredded cheddar and sprinkle herbs while their mom cooks, and they proudly claim the
    perfect peanut butter‑and‑jelly sandwich as their go‑to snack.
  core: Kendrick Cummings is a competitive, structure‑loving six‑year‑old who balances restless anxiety with creative LEGO builds, soccer drills, and community rhythm, yet often succumbs to impulsive candy
    cravings and occasional meltdowns.
background:
  cultural: Kendrick grows up in a close‑knit African‑American family in Philadelphia, where community ties, church involvement, and neighborhood gatherings shape his daily life. He learns about Black history
    through picture books and school programs, enjoys listening to family stories about cultural traditions, and participates in local youth sports leagues that emphasize both teamwork and personal achievement.
