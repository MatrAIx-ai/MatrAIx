  hobbies: '[''Hiking'', ''Kayaking'', ''Nature Photography'', ''Reading (historical nonfiction, philosophy, fiction)'', ''Poetry Writing'', ''Independent Film & Live Music'', ''Seasonal Cooking'', ''Community
    Gardening'', ''Environmental Clean‑up Volunteering'', ''Board Game Strategy Nights'', ''DIY Sustainable Home Improvements'']'
  career_goals: Wilma aims to move into a senior cost management role within the next three to five years, seeking AACE I‑CE and PMP certifications to solidify her expertise. She aspires to lead a team
    of estimators focused on sustainable and affordable‑housing projects in the Pacific Northwest, integrating ESG metrics and green‑building cost analysis into standard practice. Long‑term, she envisions
    launching her own consulting boutique that provides cost‑estimation and budgeting services to community‑driven development initiatives, while also teaching introductory construction economics courses
    at a local community college to mentor the next generation of professionals.
