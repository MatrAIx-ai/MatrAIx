personas:
  professional: Wilma Hills is a meticulous cost estimator who leverages RS Means, ProEst, and Sage Estimating to build detailed Excel‑driven budgets and risk analyses while weaving LEED sustainability
    metrics into every bid, channeling her curiosity for green solutions through a pragmatic, competitive lens that drives her toward senior leadership.
  sports: Wilma Hills conquers weekend hikes in the Cascades, paddles with the Bellingham Kayak Club, joins a local cross‑country ski group each winter, and follows the Seattle Sounders FC and Seattle Seahawks,
    treating her personal fitness routine as a competitive challenge that mirrors her professional drive.
  arts: Wilma Hills curates her creative life by attending intimate Bellingham shows featuring indie artists like Mitski and Phoebe Bridgers, catching independent screenings of Greta Gerwig’s films, and
    drawing poetic inspiration from Mary Oliver and philosophical insight from Simone de Beauvoir, blending these influences into her own short stories and verses.
  travel: Wilma Hills favors low‑key, nature‑centric escapes, planning weekend backpacking trips through the Olympic Peninsula and Sierra Nevada while dreaming of an Icelandic aurora chase and a cultural
    immersion in Kyoto’s historic temples, balancing meticulous itineraries with spontaneous detours.
  culinary: Wilma Hills, a confident home cook, crafts seasonal plates such as cedar‑plank salmon with pickled ramps, wild mushroom barley risotto and a blackberry‑lavender crumble, sourcing fresh produce
    and foraged herbs from her community garden and local farmer’s market.
  core: Wilma Hills balances razor‑sharp cost spreadsheets with nightly bursts of poetry, often sacrificing sleep for a perfect estimate while secretly hoarding an ever‑growing collection of lenses that
    rarely leave her backpack.
background:
  cultural: Wilma was raised in a middle‑class family in the Pacific Northwest, where a blend of practical, self‑reliant values and a strong appreciation for the natural environment shaped her outlook.
    Her white ethnic heritage includes a mix of Scandinavian and Anglo‑American roots common in Washington State, influencing a cultural affinity for outdoorsmanship, modesty and community engagement. Her
    bachelor's degree in arts and humanities broadened her cultural perspective, fostering a curiosity for literature, history and social issues, which she integrates into her professional life. Living
    in Bellingham, a progressive and environmentally conscious city, she embraces regional customs such as supporting local farms, participating in neighborhood sustainability initiatives, and valuing inclusive,
    collaborative community spaces, while maintaining an independent, competitive drive in her career.
