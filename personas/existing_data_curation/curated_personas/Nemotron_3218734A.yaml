  hobbies: '["Woodworking", "Scale model train building", "Hiking and nature photography", "Fishing", "Reading historical and travel literature", "Crossword puzzles", "Gardening", "DIY home improvement"]'
  career_goals: Frank aims to transition from front‑line concierge work to a supervisory role within hotel operations, such as Guest Services Supervisor or Operations Coordinator, where he can apply his
    methodical planning and organizational talent. He is pursuing a hospitality certification (e.g., Certified Guest Service Professional) and hopes to eventually manage a boutique hotel or develop a private
    concierge service for high‑net‑worth clients who value discretion and quiet efficiency. His long‑term ambition includes mentoring new staff while maintaining a work environment that respects his preference
    for low‑noise, focused settings.
