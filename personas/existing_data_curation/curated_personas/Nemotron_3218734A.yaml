personas:
  professional: Frank Blancaneaux, a meticulous hotel concierge with a knack for efficient luggage handling and a curiosity for reservation systems, leverages their methodical planning and quiet demeanor
    to deliver seamless guest experiences while eyeing a transition to Guest Services Supervisor.
  sports: Frank Blancaneaux, an early‑morning fisherman and weekend hiker around Anoka’s lakes, also follows the Minnesota Vikings, Twins, and Wild with avid enthusiasm and is a member of the local adult
    softball league, preferring low‑impact cardio over competitive sports.
  arts: Frank Blancaneaux, a quiet admirer of historic photography, draws inspiration from Ansel Adams and collects vintage model train schematics while listening to folk legends like Bob Dylan and reading
    works by Erik Larson, finding solace in the blend of visual and literary arts.
  travel: Frank Blancaneaux, a self‑planned traveler who favors off‑peak trips, has explored New England’s coastal towns, trekked the Canadian Rockies, and dreams of photographing Norway’s fjords, always
    balancing adventure with the need for low‑noise, restorative settings.
  culinary: Frank Blancaneaux, a competent home cook who favors seasonal Midwestern fare—pan‑seared walleye with wild rice pilaf, fresh garden herbs, and a weekend habit of baking sourdough—while occasionally
    indulging in a hearty beef stew during cold Minnesota winters.
  core: Frank Blancaneaux combines a quiet, methodical work ethic with a love for solitary crafts, careful savings, and early‑morning fishing, yet occasionally lets back pain and a tendency to over‑organize
    dictate their day.
background:
  cultural: Frank comes from a white, Midwestern family with deep roots in the Anoka region. His surname, Blancaneaux, reflects a French‑Canadian ancestry that his parents have kept alive through occasional
    French language phrases and culinary traditions such as poutine and tourtière during family gatherings. Raised in a close‑knit community, he embodies the region's values of hard work, modesty, and neighborly
    cooperation. Local customs—celebrating holidays like Thanksgiving, attending county fairs, and participating in community volunteer clean‑up events—have shaped his considerate and cooperative nature.
attributes:
  skills: '["Luggage handling", "Guest service", "Reservation system operation", "Time management", "Problem solving", "Local area knowledge", "Physical stamina", "Attention to detail", "Confidentiality
