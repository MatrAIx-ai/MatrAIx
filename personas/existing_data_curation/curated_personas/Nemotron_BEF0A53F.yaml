    and dancing'', ''simple home science experiments'' ]'
  career_goals: Melanie dreams of turning her love for art into a future career as an artist, an art teacher, or a museum guide who can share creative experiences with other children. She also imagines
    opening a community art space where kids can explore creativity together, and she is drawn to the idea of using art to help others feel calm and expressive, perhaps as a pediatric art therapist someday.
