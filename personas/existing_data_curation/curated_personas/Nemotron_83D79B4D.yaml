  career_goals: Although retired, Boris aims to keep expanding his horizons. He plans to enroll in a community‑college art‑appreciation course, develop a small portfolio of watercolor paintings, and write
    a locally focused memoir that weaves together Chesapeake’s history with his family’s Portuguese roots. He hopes to mentor youth through a weekend craft‑and‑art workshop, contribute to the board of the
    Chesapeake Historical Society, and establish a modest neighborhood garden that blends native plants with Mediterranean herbs.
