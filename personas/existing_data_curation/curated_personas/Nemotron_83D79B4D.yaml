  hobbies: '[''Gardening'', ''Birdwatching'', ''Coastal Walking'', ''Watercolor Painting'', ''Photography'', ''Reading Art History'', ''Attending Gallery Openings'', ''Chess'', ''Cooking Portuguese Cuisine'',
