  hobbies: '[''Crossword puzzles'', ''Bridge'', ''Vegetable gardening'', ''Woodworking'', ''Classic jazz and big‑band music'', ''Reading New York City history'', ''Church attendance'', ''Walking in Forest
    Park'', ''Community block parties'', ''Bingo nights'']'
  career_goals: Even in retirement, Emanuel aims to remain a reliable pillar for his family and community. He wishes to document his life story and family heritage through a memoir and video recordings
    for his grandchildren. He plans to continue mentoring younger relatives on practical life skills, such as home maintenance and financial responsibility. Within his community, Emanuel hopes to serve
    as an advisory member of the senior center and the local historical society, helping to preserve neighborhood history. Maintaining his health so he can enjoy regular visits with family and occasional
    short trips—like a cruise to visit a grandchild in Florida—remains a top personal ambition.
