    of Southeast Asian dishes'', ''Basic first aid'']'
  hobbies: '[''Experimenting with fusion cooking'', ''Hosting game nights and karaoke gatherings'', ''Participating in local cooking competitions'', ''Online trivia and puzzle contests'', ''Yoga and mindfulness
    meditation'', ''Sketch journaling for creative ideas'', ''Watching Vietnamese cinema and contemporary series'', ''Exploring new tech gadgets for content creation'']'
  career_goals: Diemtrang aims to turn her love of food and social media into a small home‑based catering business that blends traditional Vietnamese flavors with contemporary twists. To make this viable,
    she plans to earn a certification in digital marketing within the next year, giving her the practical skills to promote her brand while maintaining flexibility. She also hopes to enroll part‑time in
    a community college business program, where she can develop more structured project‑management abilities to counter her natural aversion to rigid deadlines. Long‑term, she envisions expanding her venture
    into a community‑focused culinary workshop series, helping other immigrant families share their food heritage while building a modest, stable income that eases her chronic worry about financial stress.
