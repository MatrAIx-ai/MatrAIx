personas:
  professional: Iris Perez is a 33‑year‑old registered nurse in a rural Texas hospital, blending meticulous clinical expertise—sharp at IV therapy, wound care, and EHR management—with bilingual communication
    and a data‑driven mindset, channeling their competitive drive to mentor peers and spearhead quality‑improvement projects aimed at reducing readmissions.
  sports: Iris Perez enjoys weekend hikes on the Woodard Lake trails and participates in a local walking club that meets monthly, while cheering for the Dallas Cowboys on Sundays and occasionally attending
    Dallas Rangers games when family schedules allow.
  arts: Iris Perez finds solace in strumming acoustic guitar to the melodies of Lila Downs and Juanes, dives into historical fiction by Hilary Mantel during quiet evenings, and occasionally attends the
    Sanger Community Center’s productions of classic folk plays, all of which nurture a deep, albeit private, appreciation for the arts.
  travel: Iris Perez prefers low‑key road trips that fit around a busy nursing schedule, having explored the Hill Country vineyards of Fredericksburg and the historic plazas of Santa Fe, while dreaming
    of a future culinary pilgrimage to a celebrated coastal hub known for its traditional mole preparation.
  culinary: Iris Perez, an adept home cook, cultivates cilantro and sage in a modest backyard herb garden and transforms them into vibrant salsas for mole poblano and hand‑rolled tamales, while occasionally
    perfecting fresh corn tortillas and savoring the aroma of roasted chilies in the kitchen.
  core: Iris Perez is a disciplined, data‑driven nurse who balances a competitive ambition with a quiet love for family, herbs, and heritage‑rich cooking, all while maintaining a healthy skepticism toward
    easy shortcuts.
background:
  cultural: Iris is a first‑generation Mexican‑American whose parents immigrated to Texas in the early 1990s. Raised in a bilingual household, she grew up celebrating Día de los Muertos, quinceañeras, and
    family reunions centered around shared meals. The values of respeto, family loyalty, and hard work imparted by her heritage shape her professional demeanor—she approaches patient care with deep empathy
    for Spanish‑speaking patients and feels a strong responsibility to give back to the community that supported her family. While she has assimilated to the Texan rural lifestyle, she continues to weave
    Mexican culinary traditions and folk music into her personal life, preserving her cultural identity alongside her career ambitions.
attributes:
  skills: '[''Patient assessment'', ''IV therapy'', ''Wound care'', ''Medication reconciliation'', ''Infection control'', ''Bilingual Spanish-English communication'', ''Electronic Health Record (Epic) management'',
