  hobbies: '[''Reading historical fiction'', ''Keeping up with medical journals'', ''Gardening herbs'', ''Cooking traditional Mexican dishes'', ''Hiking local trails'', ''Playing acoustic guitar'', ''Volunteering
    at small health fairs'']'
  career_goals: Guided by her competitive drive and pragmatic curiosity, Iris aims to advance to a Nurse Practitioner role with a focus on primary care for underserved rural Hispanic populations. She plans
    to enroll in a Master of Science in Nursing program emphasizing health informatics, so she can lead the integration of telehealth solutions in her clinic. In the short term, she seeks a charge nurse
    position that will allow her to spearhead a quality improvement initiative to reduce hospital readmission rates for chronic‑disease patients. Long‑term, she envisions establishing a community health
    center in Sanger that blends culturally competent care with data‑driven outcomes, while mentoring upcoming nurses from similar backgrounds.
