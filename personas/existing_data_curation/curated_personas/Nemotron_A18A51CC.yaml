  hobbies: '[''Watercolor painting'', ''Ceramic pottery'', ''Hiking in Daniel Beau National Forest'', ''Gardening'', ''Experimental cooking'', ''Reading art and psychology books'', ''Community choir singing'',
    ''Volunteering as an art tutor'', ''Yoga and mindfulness meditation'', ''Attending local art exhibitions'']'
  career_goals: Rosa aims to transition from frontline childcare work to a leadership role where she can shape program philosophy and policy. She plans to complete a bachelor’s degree in Child Development
    or Early Childhood Education within the next three years, obtaining the credentials needed to become a licensed director of a community daycare center. Her long-term ambition is to open a small, arts-centric
    early learning center in Pulaski County that emphasizes creativity, cultural awareness, and evidence-based developmental practices. Additionally, she hopes to mentor aspiring childcare professionals
    through workshops and to collaborate with local schools to integrate preschool-ready arts curricula. Rosa also envisions advocating for increased support for affordable, high-quality early childhood
    programs at the county level.
