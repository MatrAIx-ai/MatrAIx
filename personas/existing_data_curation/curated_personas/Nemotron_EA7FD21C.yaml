  hobbies: '[''Gardening'', ''Cooking (Southern cuisine)'', ''Reading (historical fiction, mystery)'', ''Hiking'', ''Volunteering at food bank'', ''Knitting and quilting'', ''Listening to supply‑chain podcasts'',
    ''Attending community events'']'
  career_goals: Jennifer aims to advance into a senior procurement leadership role, such as Procurement Manager or Director, where she can lead a team and drive organization‑wide sourcing strategies. She
    plans to earn the Certified Professional in Supply Management (CPSM) credential and expand her expertise in sustainable and ethical sourcing. Over the next five years, she hopes to implement technology‑driven
    procurement solutions that reduce costs by at least 10%, mentor junior staff, and shape company policies that balance efficiency with vendor partnership harmony. Ultimately, she envisions a career that
    combines her curiosity for emerging supply‑chain practices with her practical, results‑oriented mindset while maintaining a healthy work‑life balance.
