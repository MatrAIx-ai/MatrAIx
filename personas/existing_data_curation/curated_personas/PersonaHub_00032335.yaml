persona_description: A scientist or researcher interested in ecology, particularly in the study of pollination and the interaction between crops and their pollinators. This individual is particularly interested
  in the role of ruderal vegetation in supporting pollinator communities and has a personal interest in the use of native vegetation in agricultural practices. They are likely to be involved in the planning
  and implementation of revegetation projects on farms and have a keen interest in balancing fire prevention with crop-native vegetation ratios that maximize pollination. They are also likely to have a
  background in ecology and have a strong interest in the impact of natural and agricultural environments on crop productivity.
