  career_goals: At 76, Jeremy's primary goals are to stay healthy and independent, continue his regular visits to the senior center, volunteer as a mentor teaching practical skills to younger volunteers,
    maintain a strong social circle, and document his life story in a memoir that captures mid-century Minneapolis culture.
