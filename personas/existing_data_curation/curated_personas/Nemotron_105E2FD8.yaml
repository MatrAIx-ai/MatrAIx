personas:
  professional: Jeremy Mitchell, a retired handyman turned community mentor, blends decades of home‑repair, woodworking, and small‑engine expertise with a natural gift for storytelling, using their sociable,
    routine‑loving yet flexible approach to teach younger volunteers at the senior center while chronicling mid‑century Minneapolis culture in a memoir.
  sports: Jeremy Mitchell, a devoted Minnesota Vikings fan who watches every game at the local bar, follows the Minnesota Twins baseball season, enjoys fishing as a leisurely sport, and participates in
    a senior bowling league at the community center, cheering for the Vikings and Twins while also being a member of the Lakeside Anglers Club.
  arts: Jeremy Mitchell, an avid listener of classic rock bands like The Rolling Stones and Led Zeppelin and big‑band swing icons such as Benny Goodman, frequently attends local community theater productions
    and storytelling nights, and considers the music of Glenn Miller the soundtrack to their gardening afternoons.
  travel: Jeremy Mitchell, who prefers low‑key road trips over long flights, enjoys seasonal visits to the Boundary Waters for fishing, revisits family in Florida each winter, dreams of a nostalgic tour
    of Route 66, and balances travel plans with a modest budget and senior center commitments, often planning trips around church holidays.
  culinary: Jeremy Mitchell, a competent home cook who excels at hearty Midwestern dishes like meatloaf with mushroom gravy, buttery mashed potatoes, and apple crisp, regularly seasons with fresh garden
    herbs such as rosemary and thyme, and loves hosting friends for Sunday potluck dinners featuring classic comfort foods and homemade biscuits.
  core: Jeremy Mitchell, a sociable, routine‑loving 76‑year‑old who mixes handyman expertise with a knack for storytelling, often forgets appointments but never misses a church bingo night, and cherishes
    simple pleasures like gardening, card games, and classic rock.
background:
  cultural: Jeremy was raised in a working-class, Scandinavian-German neighborhood in Minneapolis during the post-World War II era. His family's values emphasized thrift, hard work, and community service,
    reflecting typical Midwestern cultural norms. He grew up attending a Protestant church, celebrating holidays with potluck meals, and participating in local outdoor activities such as fishing and snowshoeing,
    which have shaped his practical and sociable outlook.
