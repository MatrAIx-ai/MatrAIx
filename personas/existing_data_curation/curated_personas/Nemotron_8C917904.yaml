  career_goals: Vera aims to pursue a bachelor’s degree in biomedical engineering or computer science, fields that satisfy her curiosity about how technology can address real‑world health challenges. She
    plans to secure a summer internship at a local biotech or tech company to gain hands‑on experience and build professional networks. In the long term, she envisions developing affordable medical devices
    or health‑tech solutions for underserved communities in Florida, while mentoring younger students through STEM outreach programs and community service initiatives.
