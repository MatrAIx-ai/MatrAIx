  career_goals: Alan aims to progress from his current sales role to store manager within the next two years, leveraging his leadership and merchandising strengths. Long‑term, he envisions moving into regional
    retail management or opening a boutique that merges his love of art with community‑focused retail experiences. He plans to pursue a professional certification in retail management and attend workshops
    on experiential store design to support these ambitions.
