  hobbies: '[''Brunches and food tours in Brooklyn'', ''Live music concerts and salsa dancing'', ''Yoga and mindfulness practice'', ''Urban hiking and park runs'', ''Community theatre acting'', ''Volunteering
    at local shelters'', ''Mentoring college business students'', ''Reading contemporary fiction and business leadership books'', ''Trivia nights'', ''Board‑game meetups'']'
  career_goals: Angela aims to advance from senior management analyst to director of strategic operations within the next five years, positioning herself as a catalyst for data‑driven transformation in
    a large corporation. She plans to earn a PMP certification and pursue a Six Sigma Black Belt to deepen her expertise in continuous improvement. Long‑term, she envisions leading a cross‑functional team
    that shapes organizational culture, fostering collaboration while maintaining clear, structured processes. Balancing ambition with family life, she also seeks flexible work arrangements that allow her
    to mentor emerging analysts and contribute to community outreach programs.
