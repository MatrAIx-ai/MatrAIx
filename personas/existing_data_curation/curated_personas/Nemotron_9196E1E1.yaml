personas:
  professional: Angela Madrazo, a senior management analyst in a large corporation, blends razor‑sharp data modeling and agile change‑management skills with their natural sociability, designing structured
    yet adaptable strategy roadmaps that keep stakeholders aligned while they casually mentor junior analysts over coffee.
  sports: Angela Madrazo fuels their fitness routine with morning yoga sessions at a local studio, weekend urban hikes in Prospect Park, and a membership in the Brooklyn Rowing Club, while cheering on the
    Brooklyn Nets and the New York Yankees during the season.
  arts: Angela Madrazo immerses themselves in Brooklyn’s cultural pulse by performing in community theatre productions of ‘Our Town’, dancing to live salsa nights at the Knickerbocker, and attending concerts
    by Alicia Keys and the Jazz at Lincoln Center Orchestra, often swapping show tickets with friends after trivia night.
  travel: Angela Madrazo prefers short, well‑planned getaways that balance adventure and relaxation, such as hiking the Catskills in autumn, exploring the historic streets of Cartagena during a solo trip,
    and taking weekend road trips to the Hudson Valley, all while juggling family commitments and a modest travel budget.
  culinary: Angela Madrazo delights in Brooklyn’s eclectic food scene, savoring ramen at Totto Ramen, falafel wraps from Tanoreen, and craft coffee at Devoción, while at home they whip up quick quinoa bowls
    with avocado and miso‑glazed salmon, occasionally experimenting with homemade kimchi for their weekly dinner parties.
  core: Angela Madrazo balances data‑driven ambition with a love for spontaneous social gatherings, turning spreadsheets into social calendars and strategic plans into weekend adventures, all while never
    missing a yoga class.
background:
  cultural: Angela was raised in a middle‑class, white family of mixed Irish and Italian descent in Brooklyn, New York. Growing up in a culturally vibrant borough, she absorbed the city's diverse traditions
    while maintaining her family's emphasis on reliability, punctuality, and community gatherings. Holiday celebrations blend classic American customs—Thanksgiving and Christmas—with Mediterranean culinary
    influences from her heritage. Her upbringing fostered a value for both structure and flexibility, shaping her pragmatic outlook and openness to varied perspectives, which she carries into her professional
    and social life.
attributes:
  skills: '[''Data analysis'', ''Financial modeling'', ''Process optimization'', ''Strategic planning'', ''Project management'', ''Stakeholder communication'', ''Change management'', ''Agile methodology'',
