personas:
  professional: Lou Truong, an aspiring junior wildlife tracker, toddles across the icy tundra of their remote Alaskan community, cataloguing caribou footprints with crayons, mimicking seasoned hunters,
    and eagerly absorbing the rhythms of the land while learning to ask questions and think outside the box.
  sports: Lou Truong, a pint‑sized snow enthusiast, spends mornings building snow forts with the local Little Polar Cubs club, watches the Anchorage Sea Dogs junior hockey team on TV, and eagerly joins
    community sled‑pull competitions during winter, all while preferring solo play on the frozen pond to large group games.
  arts: Lou Truong, a curious little creator, loves drawing bright caribou and swirling auroras with thick crayons, sings along to the melodic throat‑singing of Pamyua and the indie folk tunes of The Shins,
    and eagerly watches local storytelling evenings where elders animate ancient legends through dance and music.
  travel: Lou Truong, a wide‑eyed explorer, enjoys family trips to the nearby town of Utqiaġvik to watch the midnight sun, loves short plane rides to Fairbanks where they can see the towering aurora borealis,
    and dreams of visiting the warm sands of Hawaii for a future birthday getaway.
  culinary: Lou Truong, a budding food adventurer, prefers the sweet aroma of fresh baked blueberry muffins, delights in tasting melt‑in‑your‑mouth akutaq made with reindeer milk, and proudly helps stir
    the pot when their family prepares hearty salmon stew, while always insisting on a side of crunchy carrot sticks.
  core: Lou Truong, the three‑year‑old Alaskan wanderer who catalogs caribou tracks with crayons, hoards glitter stickers in a pink piggy bank, swears by warm mugs of chicken soup, and can spend hours lost
    in the quiet hush of the snow‑covered tundra, all while occasionally misplacing toys in the most unexpected places.
background:
  cultural: Lou is raised in a white American family living in the remote community of Wainwright on Alaska’s North Slope. While his heritage is primarily European‑American, his upbringing is deeply intertwined
    with the local Arctic environment and the Inupiat cultural practices of the area. He participates in community events that celebrate the seasonal migrations of wildlife, shares stories passed down by
    elders, and learns respect for the land and its cycles. The cold, expansive landscape, the close‑knit nature of the small community, and exposure to both mainstream American and indigenous traditions
    shape his worldview, fostering a strong appreciation for nature, self‑reliance, and artistic expression.
attributes:
  skills: '[''Drawing with crayons'', ''Stacking blocks'', ''Recognizing colors and shapes'', ''Identifying local wildlife'', ''Basic vocabulary and questioning'', ''Cooperative play'', ''Solitary exploration'']'
  hobbies: '[''Crayon drawing'', ''Block building and deconstruction'', ''Snow play'', ''Watching the aurora'', ''Listening to storytelling'', ''Texture and sensory exploration'', ''Simple nature observation'']'
  career_goals: Lou imagines himself growing up as an Arctic explorer who sketches the landscape and captures images of wildlife. He dreams of becoming an artist who paints the aurora borealis, a wildlife
    photographer, or even a guide who shares stories of the North Slope with visitors. His current ambitions focus on learning more about the animals and the natural world around him, and on mastering drawing
    and storytelling skills that will help him tell those stories later.
