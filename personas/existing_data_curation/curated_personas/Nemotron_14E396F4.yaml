  hobbies: '[''Gardening'', ''Bridge (card game)'', ''Historical fiction reading'', ''Woodworking'', ''Knitting'', ''Volunteer archival research'', ''Walking along river trail'', ''Community mentoring'']'
  career_goals: As she approaches retirement, Christina aims to codify a mentorship program for emerging supervisors, documenting best‑practice sales processes that reflect her structured approach. She
    targets a final fiscal year that exceeds her department’s sales growth goal by at least five percent, demonstrating the impact of her data‑driven strategies. Post‑retirement, she plans to offer part‑time
    consulting to small businesses in the Evansville area, helping them implement efficient sales workflows. She also hopes to volunteer as a business‑skills mentor at the local community college, channeling
    her competitive drive into empowering the next generation of professionals.
