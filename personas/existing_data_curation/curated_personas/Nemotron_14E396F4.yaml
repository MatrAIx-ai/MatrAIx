personas:
  professional: Christina Hollis, a veteran non‑retail sales manager, leverages three decades of supervising sales teams, expertise in Excel and PowerBI, and a pragmatic, data‑driven style to design structured
    workflows, coach staff, and chase cost‑efficient results, while their competitive edge pushes them to exceed departmental growth targets by at least five percent before retirement.
  sports: Christina Hollis, a dedicated walker who logs daily strolls along the Ohio River Trail with their dog as part of the River Trailwalkers Club, supplements the routine with senior yoga classes at
    the Evansville YMCA in winter, cheerfully follows the Indiana Pacers, the Evansville Purple Aces men’s basketball team, and the Chicago Cubs, and occasionally joins a community pickleball league in
    the summer, maintaining a balanced approach to fitness that blends low‑impact cardio with light competitive play.
  arts: Christina Hollis, an avid reader of historical fiction by Philippa Gregory and Ken Follett and biographies by Walter Isaacson, they find inspiration in the melodies of Johann Sebastian Bach and
    the storytelling of Bob Dylan, they frequently attend performances at the Evansville Museum of Arts & Science’s concert series, and they channel their love of preservation into archival work for the
    Evansville Historical Society, allowing the arts to shape their reflective leisure time.
  travel: Christina Hollis, a planner who prefers moderate‑budget itineraries that blend garden tours, historic downtown strolls, and relaxed evenings, they have explored Charleston’s historic district,
    the lavender fields of Provence, Kyoto’s Zen gardens, and the River Road vineyards of Missouri, while dreaming of visiting the Majorelle Garden in Marrakech and the Blue Ridge Parkway in autumn, often
    coordinating trips around their grandchildren’s school calendar to balance family time with personal curiosity.
  culinary: Christina Hollis, a confident gardener‑chef who transforms heirloom tomatoes, fresh rosemary, and home‑grown carrots into dishes like roasted beet and goat‑cheese salad, herb‑infused chicken
    pot pie, and a flaky sourdough loaf, they relish occasional shrimp étouffée for a taste of the local river, yet they sometimes over‑salt their sauces when excited about a new recipe, reflecting a pragmatic
    yet playful approach to home cooking.
  core: Christina Hollis blends a lifelong command of structured sales leadership with a garden‑rooted love for precision, competitive bridge, and a habit of over‑checking spreadsheets even after retirement,
    they embody a pragmatic yet curious spirit.
background:
  cultural: Christina grew up in a middle‑class white family in southwestern Indiana, rooted in the small‑city culture of Evansville. Her upbringing was shaped by Protestant church values emphasizing hard
    work, self‑reliance, and community service. She reflects the practical, straightforward ethos typical of the Midwest, while also cherishing the region’s agricultural heritage and local history. Throughout
    her adult life, she has prioritized maintaining a stable, structured environment for her family and career, aligning with the cultural emphasis on reliability and community involvement.
