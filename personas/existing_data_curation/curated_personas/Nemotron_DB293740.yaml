  career_goals: Armanda dreams of a future where she can explore the world and help others. She is fascinated by space and often talks about becoming an astronaut who discovers new planets. She also admires
    teachers who make learning fun and imagines herself as a scientist‑educator who conducts experiments with classmates. In the longer term, she thinks about becoming a pediatric doctor who can care for
    children, combining her caring nature with her curiosity about how things work.
