personas:
  professional: Armanda Daughtry is an aspiring young problem-solver who channels her organized curiosity into building intricate LEGO creations, leading her after-school science club with reliable, methodical
    planning and naturally taking charge when challenges arise.
  sports: Armanda Daughtry sprints across the Navarre Kids Soccer Club field after school, eagerly practices her dribbling drills with organized precision, signs up for the local swimming class each summer,
    and cheers passionately for the Cleveland Guardians and Cincinnati Bengals on game nights, treating every match as a chance to learn teamwork and push her own stamina.
  arts: Armanda Daughtry fills sketchbooks with rockets, jungle creatures, and family portraits while humming gospel classics from The Winans and upbeat pop hits by Taylor Swift, and she devours The Magic
    Tree House adventure novels, letting the rhythmic beats of both church choirs and her favorite cartoons inspire her imaginative LEGO world-building.
  travel: Armanda Daughtry loves weekend road trips to Hocking Hills State Park where she explores hidden waterfalls, eagerly anticipates family vacations to Washington, D.C. for museum days, and dreams
    of an upcoming adventure to Disney World, always drawing colorful itineraries on her bedroom wall while balancing school homework and the limited allowance her parents set for travel.
  culinary: Armanda Daughtry enjoys measuring out flour for chocolate chip cookies, mastering the perfect swirl of cinnamon in oatmeal, and proudly makes simple grilled cheese sandwiches with cheddar, yet
    she sometimes burns the edges when she gets distracted by a story.
  core: Armanda Daughtry is an organized, curiosity-driven whirlwind who piles LEGO bricks into elaborate spaceships, worries about forgetting her inhaler before soccer, and cannot resist a fresh batch
    of chocolate chip cookies even after a long day of reading.
background:
  cultural: Armanda is a Black child raised in Navarre, Ohio, within a supportive family that honors African‑American heritage through stories, music, and community gatherings. Her parents regularly share
    family histories, celebrate Juneteenth and Kwanzaa, and attend a local church where gospel music and fellowship reinforce cultural pride. The family’s involvement in neighborhood events, library reading
    programs, and after‑school clubs exposes her to diverse perspectives while keeping her grounded in her cultural identity. This blend of community support and cultural awareness nurtures her curiosity
    and practical mindset.
