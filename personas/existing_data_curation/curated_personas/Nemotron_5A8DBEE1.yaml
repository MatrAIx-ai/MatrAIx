  hobbies: '[''Gardening (roses, azaleas, native wildflowers)'', ''Southern cooking (fried chicken, collard greens, peach cobbler)'', ''Reading historical fiction'', ''Genealogical research'', ''Quilting
    and crochet'', ''Community theater attendance'', ''Senior line-dance classes'', ''Birdwatching'', ''Digital nature photography'', ''Walking and low-impact fitness classes'']'
  career_goals: Earlene’s post‑retirement goals focus on enriching her community while continuing personal growth. She plans to launch a community garden that supplies fresh produce to local seniors and
    to develop a digital archive of Cherokee County’s oral histories, combining her gardening expertise, photography skills, and interest in local heritage. She aspires to complete an advanced digital photography
    course to document seasonal changes in the Coosa River region and to publish a memoir that weaves her family’s story with the broader Southern narrative. Additionally, she aims to mentor a new generation
    of volunteers in grant writing, event planning, and program evaluation to ensure the longevity of community initiatives. Maintaining her health through daily walks, senior fitness classes, and regular
    medical check‑ups remains a personal priority.
