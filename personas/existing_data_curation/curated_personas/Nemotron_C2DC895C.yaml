  hobbies: '["Visiting Art Museums and Galleries", "Sketching and Watercolor Painting", "Reading Historical Fiction and Nonfiction", "Gardening (perennials and vegetable)", "Volunteering for Literacy Programs",
    "Small Book Club Participation", "Quilting and Needlework", "Bird Watching", "Local History Research", "Cooking and Baking Traditional Midwestern Recipes", "Jigsaw Puzzles and Brain Games"]'
  career_goals: Although retired from formal employment, Peggy aims to continue making a meaningful impact through volunteerism and lifelong learning. She hopes to mentor emerging educators, contribute
    to the local school board's advisory committees, and launch an intergenerational art program that pairs seniors with school‑age children. She also aspires to author a memoir that intertwines personal
    stories with the educational history of West Lafayette, and to secure funding for a community garden that serves as a learning space for sustainable horticulture.
