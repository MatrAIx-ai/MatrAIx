  career_goals: Brian aims to advance to a regional director of sales within the next three years, overseeing multiple markets in the Midwest and Southwest. He is focused on leading digital transformation
    of the sales organization, integrating AI‑driven analytics to refine prospecting and pipeline management. Additionally, he plans to mentor emerging sales talent and eventually launch a boutique sales‑consulting
    firm that helps midsize manufacturers modernize their go‑to‑market strategies, while maintaining a balanced lifestyle that allows time for his personal interests.
