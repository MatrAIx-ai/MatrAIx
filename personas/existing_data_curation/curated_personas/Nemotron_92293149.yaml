personas:
  professional: Katerina Millican, a 59‑year‑old retail veteran in Goodyear, they combine two decades of customer‑service expertise with a love of art to spearhead visual merchandising and now pursue a
    store‑manager position that will let them mentor staff and curate local‑artist collaborations.
  sports: Katerina Millican, a desert‑dwelling enthusiast, they attend weekly yoga classes at the community center, walk the Arizona Desert Botanical Garden trails with a local seniors' walking club, and
    cheer for the Arizona Diamondbacks while occasionally joining a casual pickleball group at their neighborhood park.
  arts: Katerina Millican, a watercolor aficionado, they immerse themselves in Phoenix’s art scene by sketching desert vistas, attending openings featuring Native‑inspired artist Jaune Quick‑to‑See Smith
    and contemporary painter R. S. Austrian, and leading senior‑focused art workshops that blend art history with hands‑on creativity.
  travel: Katerina Millican, a thoughtful traveler, they plan weekend getaways to Sedona’s red rocks, explore Santa Fe’s art markets, and dream of a pilgrimage to Florence to study Renaissance frescoes,
    always balancing cost‑effective itineraries with the desire for cultural enrichment.
  culinary: Katerina Millican, a modest home cook, they favor desert‑adapted dishes like grilled cactus tacos with prickly‑pear salsa and roasted quinoa salads, enjoy experimenting with pomegranate‑glazed
    salmon, and regularly visit the farm‑to‑table restaurant The Farm at South Mountain for inspiration.
  core: Katerina Millican, a curious and organized art‑loving retiree, they temper a natural tendency toward worry with daily mindfulness, blending disciplined retail expertise with a passion for desert
    beauty and community creativity.
background:
  cultural: Katerina grew up in a middle‑class white family in the Midwest, where community ties and a pragmatic work ethic were emphasized. She completed an associate degree in Business Administration,
    which laid the groundwork for her retail career. After moving to the Southwest in her early 30s, she embraced the region’s diverse cultural influences, from Native American motifs to the vibrant contemporary
    art scene of Phoenix. Living in Goodyear, AZ, she balances the suburban lifestyle with a love for the desert’s natural beauty. As a Baby Boomer, her experiences reflect the social changes of her generation,
    including a commitment to lifelong learning, an appreciation for both tradition and innovation, and an evolving perspective on independence after her divorce.
