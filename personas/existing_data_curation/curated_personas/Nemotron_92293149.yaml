  career_goals: Katerina aims to transition from floor sales to a managerial role within the next two years, leveraging her organizational strengths to oversee store operations and mentor younger employees.
    She also hopes to integrate her passion for art into the retail environment, establishing regular collaborations with local artists and creating a curated boutique space that blends everyday goods with
    artistic expression. As she approaches retirement, she plans to develop a part‑time consulting practice for small retailers, focusing on visual merchandising and customer experience improvement. Additionally,
    she is committed to building a stable financial foundation, reducing work‑related stress, and eventually dedicating more time to community art projects.
