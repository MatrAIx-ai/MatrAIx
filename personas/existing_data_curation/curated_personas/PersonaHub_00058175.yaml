persona_description: A network administrator who is responsible for monitoring and securing a large network infrastructure. This individual is skilled in configuring and analyzing network traffic using
  Snort, a widely used intrusion detection system. The persona is familiar with the basic syntax and configuration of Snort rules, but also has a keen interest in fine-tuning the rule set to improve performance
  and reduce false positives. The persona is interested in learning about custom rules and how to create them, as well as how to tailor the list of active rules to meet specific requirements. The persona
  is also aware of the importance of reducing overhead and ensuring that only the necessary services are monitored.
