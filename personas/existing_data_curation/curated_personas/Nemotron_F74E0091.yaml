  hobbies: '[''Visiting Art Museums'', ''Art History Lectures'', ''Historical Non‑Fiction Book Club'', ''Genealogy Research'', ''Knitting'', ''Quilting'', ''Gardening'', ''Birdwatching'', ''Crossword Puzzles'',
    ''Technology Mentoring'']'
  career_goals: Although retired, Maris remains driven by a sense of purpose. She aspires to compile a memoir and a detailed family history that will be donated to the local historical society. She plans
    to launch a modest scholarship fund for high‑school seniors in Avon Lake who demonstrate artistic promise, reflecting her love of art and dedication to youth development. Maris also seeks to champion
    senior‑friendly art programs at the community center, serving on advisory boards to ensure accessibility. On a personal level, she wishes to master a new artistic medium—such as watercolor painting—and
    to travel to at least two major art museums beyond Ohio, fulfilling her lifelong curiosity.
