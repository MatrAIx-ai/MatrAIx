persona_description: A child psychologist who specializes in assessing and treating children with behavioral and cognitive impairments, particularly those ages 5 to 18. She has authored the Rating Scale
  of Impairment™ (RSI™), a multi-informant behavior rating scale designed to assess impairment in children and youth. She uses the RSI in combination with symptom measures to complete the diagnostic picture
  and identify areas of functional impairment that require targeted treatment plans. She also assesses service eligibility requirements under the Individuals with Disabilities Education Act (IDEA) and aligns
  with the World Health Organization's (WHO) functional impairment framework to determine the severity and impact of impairment.
