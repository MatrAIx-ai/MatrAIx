  hobbies: '[''Cooking Vietnamese family recipes'', ''Gardening'', ''Playing chess'', ''Playing bridge'', ''Walking in parks'', ''Volunteering at the Asian Cultural Center'', ''Attending temple ceremonies'',
    ''Knitting blankets'', ''Reading historical novels'', ''Organizing senior group outings'']'
  career_goals: Although retired, Phi aims to continue leading the planning committee for the annual Tet Festival at the Everett Asian Cultural Center, launch a community garden program for seniors in Snohomish
    County, author a family cookbook preserving Vietnamese recipes, and serve as a mentor for younger volunteers in event management. She also hopes to advocate for senior‑friendly policies at the county
    council, ensuring that practical resources and routine activities are available for the older population.
