personas:
  professional: A seasoned facilities specialist, Iris Martin leverages her meticulous cleaning expertise and innate curiosity to transform ordinary building lobbies into miniature galleries, while mentoring
    staff, navigating occasional worries about performance, and pursuing CPC and OSHA trainer certifications for a supervisory role at a cultural institution.
  sports: An active community participant, Iris Martin roots for the Indianapolis Colts and the Indiana Pacers while maintaining fitness through weekly runs with the Indy Road Runners, occasional yoga at
    a downtown studio, and volunteering as a scoreboard assistant for a local recreational softball league.
  arts: A devoted art enthusiast, Iris Martin spends evenings painting acrylic canvases inspired by Frida Kahlo and the vibrant murals of Indianapolis artist James Phoenix, volunteers backstage for community
    theater productions, and fuels her creative soul by attending live shows featuring Leon Bridges and The Milk Carton Kids.
  travel: An adventurous weekend explorer, Iris Martin plans budget‑friendly road trips to the Amish countryside of Lancaster, savors seasonal exhibits at the Indianapolis Museum of Art, and nurtures a
    long‑standing dream of traveling to Florence, Italy to study Renaissance fresco techniques, balancing a love of cultural immersion with practical itinerary planning.
  culinary: A culinary hobbyist, Iris Martin enjoys cultivating basil, oregano, and heirloom tomatoes on her balcony to whip up fragrant spaghetti aglio‑olio, perfects Southern‑style chicken and dumplings
    on slow Sundays, and indulges in weekend brunches featuring avocado toast topped with radish slices, all while experimenting with new recipes from Cook’s Illustrated.
  core: Iris Martin blends a tireless work ethic with an insatiable curiosity for art, a habit of over‑talking in meetings, a lingering worry that fuels meticulous planning, and a nightly ritual of journaling
    over a strong cup of coffee.
background:
  cultural: Iris grew up in a working‑class, white Midwestern family in Indiana, where values of hard work, self‑reliance, and community involvement were emphasized. She left formal schooling before completing
    ninth grade to help support her family, but she has continued learning through community college workshops, vocational training, and local cultural programs. Her upbringing included regular participation
    in church activities, fostering a sense of compassion and service. Living in Indianapolis has exposed her to a vibrant mix of cultural events, from museum exhibits to music festivals, shaping her appreciation
    for diverse artistic experiences while retaining a strong Midwestern sense of hospitality and practicality.
attributes:
  skills: '[''Facility cleaning and sanitation'', ''Floor care (stripping, waxing, buffing)'', ''Restroom maintenance and supply management'', ''Safety compliance (OSHA standards)'', ''Customer service
    and tenant relations'', ''Inventory control and ordering'', ''Team training and mentorship'', ''Effective verbal communication'', ''Conflict resolution'', ''Community art display coordination'']'
  hobbies: '[''Visiting art museums and galleries'', ''Attending community theater productions'', ''Painting (acrylic)'', ''Reading art history books'', ''Participating in local Toastmasters club'', ''Gardening
    on her balcony'', ''Cooking and trying new recipes'', ''Volunteering at a community center'', ''Walking in local parks'', ''DIY home décor projects'']'
  career_goals: Iris aims to advance into a supervisory or facilities‑management role within the next few years, seeking certifications such as the Certified Professional Cleaner (CPC) and OSHA safety trainer
    credentials. She hopes to lead a team, oversee larger building operations, and eventually transition into a facilities coordinator position at a cultural institution like a museum or community arts
    center, where she can merge her love of art with her expertise in building maintenance. In the longer term, Iris is considering launching her own boutique cleaning business that offers specialized services
    for artistic venues, allowing her to combine entrepreneurship with her passion for supporting the local arts scene.
