  career_goals: Tionna aims to advance to a regional sales manager role within the next two years, overseeing a larger team and expanding market share across multiple territories. She plans to obtain a
    sales leadership certification to formalize her expertise and to develop a mentorship program that empowers younger sales staff, especially women of color, in the industry. Looking ahead, she envisions
    transitioning to a consulting role that assists small manufacturers in optimizing their sales strategies, ultimately leveraging her decades of experience to give back to the community while maintaining
    a balanced, structured work life as she approaches retirement.
