personas:
  professional: Angela Ashton is a high‑school junior who leverages her quick on‑the‑fly organization and social savvy to lead school clubs, produce short Instagram videos of local fashion and Southern
    lifestyle, scout pop‑up event ideas for her future as a lifestyle influencer and marketing specialist, and constantly juggles a competitive drive with a restless need for spontaneous projects that often
    clash with school deadlines.
  sports: Angela Ashton plays forward for her school’s soccer club, chants on the varsity cheerleading squad, roots for the local MLS team Atlanta United FC, and joins the high‑school track club for sprint
    drills, approaching every practice with a competitive mindset and a habit of rallying teammates with pep talks.
  arts: Angela Ashton channels her love for hip‑hop dance, DIY tie‑dye fashion, and candid photography into weekly Instagram reels featuring songs by Ariana Grande, Billie Eilish, and local indie band The
    Joint, while attending community fairs where she watches performances by Beyoncé and Post Malone, shaping her aesthetic of vibrant Southern street culture.
  travel: Angela Ashton prefers spur‑of‑the‑moment road trips to nearby beaches like Myrtle Beach, hikes the Blue Ridge Trail, and dreams of a spring break in Nashville’s music scene and a summer adventure
    in the Caribbean, planning each escape on a shared Google Doc with friends but often letting spontaneity dictate the final itinerary.
  culinary: Angela Ashton loves cooking Southern comfort staples such as fried chicken, mac and cheese, collard greens, and shrimp & grits, often adding a homemade sweet‑tea glaze to her BBQ ribs, while
    experimenting with tie‑dye inspired fruit smoothies and mastering the art of perfect biscuit dough at the family’s weekend barbecue stand.
  core: Angela Ashton is a socially charged, competition‑driven teen who balances structured digital storytelling ambitions with impulsive, off‑beat adventures, a love for Southern flavors, and occasional
    lapses in organization.
background:
  cultural: Angela was raised in Greer, South Carolina, a suburban community in Greenville County that blends Southern hospitality with a growing, youthful vibe. Her family’s roots are in the traditional
    Upstate South, emphasizing close‑knit family ties, church involvement, and community participation at local events like the Greer Strawberry Festival. Growing up, she absorbed Southern culinary traditions—fried
    chicken, biscuits, and barbecue—while also being exposed to the region’s evolving music scene, from country classics to modern pop and hip‑hop. The multicultural influx in the area has given her a broader
    perspective, yet the core values of politeness, resilience, and a strong sense of local pride remain central to her identity. Her upbringing reflects both the modest, hard‑working ethos of the South
    and the contemporary, digitally connected lifestyle of today’s teenagers.
