  hobbies: '["Soccer", "Hip‑hop dance", "Cheerleading", "Video gaming (multiplayer)", "Streaming reality TV", "DIY crafts (tie‑dye, jewelry)", "Photography", "Cooking Southern cuisine", "Attending music
    festivals and community fairs", "Road trips to local nature spots"]'
  career_goals: Angela aspires to turn her love for community engagement and digital storytelling into a career as a lifestyle influencer and marketing specialist focused on Southern culture. In the next
    five years she aims to earn her GED, enroll in a vocational program for digital media, and secure an internship with a local boutique or tourism board where she can blend content creation with event
    promotion. Long‑term, she envisions launching her own brand that curates fashion, food, and music experiences for teens in the Upstate South, leveraging her competitive drive to grow a loyal following
    and eventually transition into a full‑time entrepreneur or regional media host.
