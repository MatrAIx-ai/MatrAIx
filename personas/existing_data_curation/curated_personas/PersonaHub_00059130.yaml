persona_description: A teacher or educator who uses the online tool MindMeister to facilitate classroom activities such as brainstorming, group collaboration, and mind mapping. They are interested in using
  the tool to engage students in creative and interactive learning experiences, and to promote critical thinking, problem-solving, and collaboration. They are familiar with the limitations of the tool,
  such as the limitations on the number of maps that can be created for free and the need for individual email accounts for collaboration. They are interested in using the tool for a variety of subjects,
  including literature, research projects, social studies, and science, and for use in the classroom, on the interactive whiteboard, and for group projects. They are interested in the possibility of embedding
  and sharing the products created using the tool, and in the possibility of using the tool for parent permission. They are interested in the possibility of using the tool to create family trees, to collaborate
  with other students, and to review charts before tests on a given subject.
