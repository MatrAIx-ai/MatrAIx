personas:
  professional: Jesus Pinzon, a 14‑year‑old aspiring game developer, leverages his love for strategic video games to design puzzle‑oriented mini‑programs in Python, while his bullet‑journal precision and
    competitive drive ensure tight project timelines and meticulous code reviews.
  sports: Jesus Pinzon follows the local high‑school soccer team, the Blue Jays, participates in a community futsal league during winter, and maintains a solitary cardio routine of treadmill intervals,
    while cheering for the NBA’s Denver Nuggets during the playoffs.
  arts: Jesus Pinzon crafts detailed model kits of historic aircraft, draws tactical game maps, and immerses himself in soundtracks by Daft Punk and Nobuo Uematsu, letting his methodical flair and competitive
    spirit shape his artistic expression.
  travel: Jesus Pinzon plans trips with bullet‑journal precision, favoring budget‑friendly science museum tours like the Exploratorium in San Francisco, dreaming of a future tech pilgrimage to Tokyo’s Akihabara,
    and occasionally embarking on solo weekend hikes in the nearby national park.
  culinary: Jesus Pinzon approaches cooking with methodical rigor, perfecting tacos al pastor, homemade guacamole, and mole sauce by measuring spices to the gram, yet sometimes over‑seasoning in pursuit
    of the ultimate flavor profile.
  core: Jesus Pinzon is an organized, competitively minded teen who applies his love for strategy to coding, gaming, and cooking, balances disciplined savings with occasional impulse purchases, and manages
    health quirks through tech‑driven monitoring.
background:
  cultural: Jesus is a Mexican‑American teen growing up in Melrose, Minnesota. He was raised in a bilingual household where Spanish is spoken alongside English, and his family maintains Mexican traditions
    such as celebrating Día de los Muertos, enjoying home‑cooked dishes like tamales and mole, and observing Catholic holidays. While embracing his heritage, he also participates in Midwestern community
    life, attending the local public school and engaging with rural cultural norms. This dual cultural exposure shapes his worldview, giving him a strong sense of family responsibility, respect for hard
    work, and an appreciation for both Mexican and American customs.
