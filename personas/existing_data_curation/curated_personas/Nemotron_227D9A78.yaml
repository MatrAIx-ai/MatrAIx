  hobbies: '["vegetable gardening", "woodworking", "fishing", "reading historical non-fiction", "model railroading", "crossword puzzles", "genealogy research", "small-group Bible study"]'
  career_goals: Although retired, Terry aims to stay actively engaged in his community by volunteering as a mentor for local high‑school STEM clubs and serving as an advisor on the Madisonville planning
    commission. He hopes to document his professional experiences in a memoir for future engineers, contribute to the local historical society, and maintain his health through regular walking, gardening,
    and routine health check‑ups. His goals reflect his preference for structured, purposeful activities that benefit both himself and his community.
