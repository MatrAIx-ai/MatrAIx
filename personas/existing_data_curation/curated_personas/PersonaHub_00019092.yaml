persona_description: A linguist who specializes in the study of Warlpiri, an aboriginal language spoken in the Northern Territory of Australia. She is interested in the development of the language, its
  syntax, and its relationship to English and Kriol. She is also interested in the social and cultural context in which the language has developed, as well as the impact of contact with English and Kriol
  on the language. She is dedicated to preserving the language and promoting its use among the local community.
