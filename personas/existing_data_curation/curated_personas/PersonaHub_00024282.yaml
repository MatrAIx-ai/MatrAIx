persona_description: A materials scientist specializing in the evaluation and selection of materials for use in construction, specifically in the production of aggregate and soil-aggregate subbase, base,
  and surface courses. This individual is knowledgeable about the testing and evaluation of rock types and properties, as well as the use of natural sand, manufactured sand, and crushed stone in concrete
  production. They are likely to be interested in the latest industry standards and regulations for materials selection in construction, as well as the economic and environmental impacts of different materials
  on a project's success. They may also be interested in the use of pozzolanic materials in concrete and the potential for reducing the cost of concrete construction through the use of such materials.
