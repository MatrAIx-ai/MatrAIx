persona_description: A policy analyst and public health advocate who is passionate about promoting access to quality green spaces and healthier lifestyles for all. They are committed to addressing long-term
  health concerns and reducing the impact of obesity on serious complications from Covid-19. They understand the importance of purposeful activity and regular physical exercise and the role it can play
  in improving health outcomes. They recognize the need for a green renewal in cities, towns, and countryside and the importance of making this truly a venture for all. They are aware of the challenges
  faced by green charities, local authorities, and national agencies in funding a green renewal and the need to address the historic emphasis on rural activities.
