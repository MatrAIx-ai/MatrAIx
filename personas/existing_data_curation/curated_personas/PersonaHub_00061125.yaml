persona_description: A medical professional with expertise in nephrology and hypertension, specifically focusing on the treatment and prevention of kidney failure and related disorders. They are familiar
  with the causes and symptoms of rhabdomyolysis, a rare condition that occurs when muscle cells break down and release myoglobin into the bloodstream, leading to kidney failure and potential kidney damage.
  They are also aware of the risk factors for rhabdomyolysis, including injuries, medications, and performance-enhancing substances, and the symptoms of the condition, such as muscle aches, weakness, and
  dark or cola-colored urine. They are skilled in recognizing the signs of rhabdomyolysis and providing appropriate medical treatment, including intravenous fluids, rehydration, and treatment to prevent
  kidney failure. They are also aware of the importance of prevention, such as staying within physical limits, drinking fluids, and being cautious with supplements and performance-enhancing substances.
