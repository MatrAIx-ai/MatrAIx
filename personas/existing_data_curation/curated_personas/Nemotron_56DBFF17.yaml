  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Sketching'', ''Cooking Puerto Rican cuisine'', ''Salsa dancing'', ''Yoga'', ''Meditation'', ''Jogging'', ''Reading contemporary fiction
    and tech books'', ''Volunteering to teach computer basics'']'
  career_goals: Elisa aims to move from first‑line supervision to a district‑manager role within the next three years, overseeing multiple stores and driving regional performance. She plans to deepen her
    expertise in retail analytics, potentially earning an MBA or a certification in data science. A long‑term ambition is to shape a mentorship program for women and Latino employees, fostering inclusive
    leadership. Ultimately, she envisions transitioning into a senior operations strategist position where she can integrate technology and creative merchandising to innovate the customer journey.
