personas:
  professional: Elisa Mateo is a data‑driven retail operations supervisor in Boston who blends analytical rigor with a creative eye, leveraging Excel, SQL, and Tableau to forecast demand while designing
    visually compelling store displays that reflect her love of contemporary art.
  sports: Elisa Mateo jogs three times a week along the Charles River, participates in the local Boston Road Runners club, follows the Boston Red Sox and the Boston Celtics avidly, and attends occasional
    yoga workshops hosted by the Boston Athletic Club.
  arts: Elisa Mateo immerses themselves in Boston’s art scene, sketching watercolors at the Institute of Contemporary Art, admiring street murals by local artist R. Hack, collecting limited‑edition prints
    by Shepard Fairey, and attending performances by the Boston Symphony Orchestra that feature composers like Philip Glass.
  travel: Elisa Mateo prefers carefully planned trips that combine culture and relaxation, having explored the historic neighborhoods of New Orleans, the modern art museums of Barcelona, and the beaches
    of Cartagena, while dreaming of a future solo adventure to Kyoto’s cherry‑blossom festivals.
  culinary: Elisa Mateo enjoys cooking aromatic arroz con gandules with sofrito, plantains, and cilantro, perfecting a weekend batch of homemade tostones, and experimenting with seasonal ingredients like
    roasted butternut squash in a velvety pumpkin bisque, yet occasionally neglects meal prep when work demands peak.
  core: Elisa Mateo fuses a methodical analytical mind with an artistic soul, balancing data‑driven retail leadership with watercolor sketching, mindful stress‑management, and a penchant for budgeting precision,
    all while wrestling with a chronic worry habit.
background:
  cultural: Elisa is a first‑generation American of Puerto Rican descent. Raised in a bilingual household, she fluently speaks both Spanish and English and carries forward traditions such as celebrating
    Noche Buena, the Puerto Rican Day Parade in Boston, and the island’s musical heritage of plena and salsa. Her family emphasizes community support and collective well‑being, shaping her cooperative nature.
    Living in Allston, she melds her Caribbean roots with the neighborhood’s multicultural vibe, often participating in local festivals and supporting Puerto Rican artists in the area.
attributes:
  skills: '[''Data analysis'', ''Sales forecasting'', ''Inventory management'', ''Excel'', ''SQL'', ''Tableau'', ''Team leadership'', ''Staff coaching'', ''Conflict resolution'', ''Visual merchandising'',
