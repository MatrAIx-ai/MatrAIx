  hobbies: '[''Abstract Sketching'', ''Digital Illustration'', ''Reading Speculative Fiction'', ''Philosophical Literature'', ''Indie Music Venues'', ''Small Poetry Readings'', ''Hiking Mount Rainier Foothills'',
    ''Kayaking Puget Sound'', ''Indie Narrative Video Games'', ''Journaling'', ''Design Thinking Podcasts'']'
  career_goals: Johnna aims to advance to a team lead position within his call center within the next two years, leveraging his organizational strengths and collaborative style. He plans to pursue a bachelor’s
    degree in Communication or User Experience Design to transition into a customer experience analyst role, where he can blend his analytical abilities with his love for abstract concepts. Long‑term, he
    aspires to launch a freelance design studio focused on creating visual assets for tech startups and to develop an online platform that showcases his own digital artwork and written reflections on art
    and philosophy.
