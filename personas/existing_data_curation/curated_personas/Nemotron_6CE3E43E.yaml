personas:
  professional: Johnna Roach, a 23‑year‑old customer service representative with a flair for visual storytelling, leverages their strong verbal communication, CRM mastery (Zendesk and Salesforce) and an
    imaginative problem‑solving style to design clear, abstract‑focused FAQ visuals while mentoring teammates toward a future user‑experience analyst role.
  sports: Johnna Roach hikes the foothills of Mount Rainier with the Seattle Hiking Society on weekends, paddles a small sustainable kayak on Puget Sound through a local club, and follows the Seattle Sounders
    FC and Seattle Kraken for a dash of team spirit, while preferring solitary cardio trails over crowded gym sessions.
  arts: Johnna Roach sketches mist‑shrouded Pacific Northwest forests and creates digital abstractions on an iPad, drawing aesthetic cues from James Turrell and Anselm Kiefer, curates playlists featuring
    Bon Iver and Fleet Foxes, and immerses themselves in the speculative worlds of Ted Chiang and Jorge Luis Borges, allowing those narratives to shape each new artwork.
  travel: Johnna Roach favors low‑key, solo travel, having trekked the Oregon Coast, explored Vancouver’s Granville Island, and day‑dreamed about wandering the moss‑covered temples of Kyoto, planning trips
    with Hostelworld and prioritizing art‑filled cafés over crowded resorts despite a modest student budget.
  culinary: Johnna Roach enjoys modest home cooking, often preparing cedar‑plank smoked salmon paired with wild mushroom risotto and finishing dishes with a drizzle of locally sourced rosemary oil, while
    frequently sipping a matcha latte at a downtown third‑wave café and collecting specialty coffee beans for occasional brewing experiments.
  core: Johnna Roach blends a solitary, imagination‑driven mindset with disciplined organization, balancing nightly sketch sessions with an occasional neglect of exercise and a habit of doodling cryptic
    diagrams in every customer ticket.
background:
  cultural: Johnna grew up in a middle‑class white family in Tacoma, Washington, immersed in the Pacific Northwest’s blend of urban culture and rugged natural landscapes. His upbringing reflects the region’s
    appreciation for outdoor recreation, environmental stewardship, and a vibrant indie arts scene. He frequents local coffee shops that serve as community hubs, values the region’s laid‑back yet progressive
    ethos, and respects the area's Indigenous history, often learning about the local Puyallup and Nisqually peoples through community events. This cultural backdrop informs his balanced outlook—drawing
    on both individual independence and collaborative community values.
attributes:
  skills: '[''Customer Service Communication'', ''Active Listening'', ''Empathy'', ''CRM Software (Zendesk, Salesforce)'', ''Data Entry'', ''Ticket Management'', ''Performance Reporting'', ''Creative Problem
