    User 2: That''s all that matters.

    User 1: So, what else do you like to do for fun?

    User 2: I like to watch cartoons, especially South Park.

    User 1: I love South Park! What''s your favorite episode?

    User 2: I don''t know if I can pick just one, but I love the episode where they go to Canada.

    User 1: That''s a good one! I also love the episode where they make fun of hippies.

    User 2: I''m not a huge fan of hippies, so that''s one of my favorites too.

    User 1: What do you think about the new season of South Park?

    User 2: I think it''s great! They''re always so funny.

    User 1: I agree! I''ve been watching it since the beginning, and I''ve never been disappointed.

    User 2: Me neither! It''s one of my favorite shows.'
