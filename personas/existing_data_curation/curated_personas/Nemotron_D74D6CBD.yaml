personas:
  professional: A bilingual insurance sales associate, Janet Castillo leverages their customer‑service flair, Salesforce and HubSpot expertise, and creative marketing skills to connect with a diverse clientele
    while pursuing life and health licensing and aiming for a senior sales consultant role.
  sports: A weekend hiker and salsa dancer, Janet Castillo frequents Rock Creek Park trails, follows the Washington Wizards, Washington Capitals, and Washington Commanders, and plays in a local community
    salsa league that doubles as cardio while also attending D.C. United matches with friends.
  arts: An avid gallery‑goer, Janet Castillo regularly visits the Hirshhorn Museum and the National Gallery of Art, draws inspiration from contemporary artists like Kehinde Wiley and Ai Weiwei, and curates
    a visual blog featuring street photography of D.C.’s vibrant murals, all while enjoying science‑fiction reads such as the "Expanse" series.
  travel: A curious traveler, Janet Castillo has explored the historic streets of Old San Juan, hiked the Blue Ridge Mountains, savors weekend trips to New York’s art districts, and dreams of backpacking
    through Caribbean islands and discovering the markets of Marrakech.
  culinary: In the kitchen, Janet Castillo masterfully prepares family‑heritage dishes like hearty sancocho stew and creamy mangú made from ripe plantains, experiments with spices such as cumin and oregano,
    and eagerly samples eclectic offerings at local eateries like Ben’s Chili Bowl and Le Diplomate.
  core: Janet Castillo blends a keen curiosity for fintech, a passion for cultural arts, and a disciplined yet flexible approach to life, balancing ambitious career goals with salsa rhythms, yoga flows,
    and spontaneous photography expeditions.
background:
  cultural: Janet is a first‑generation Dominican American raised in a close‑knit family that values community, music, and culinary traditions. Bilingual in Spanish and English, she regularly participates
    in local Dominican cultural events such as Carnaval Dominicano and church celebrations, preserving the rhythms of merengue and bachata. Her upbringing emphasized respect for hard work, hospitality,
    and mutual support, which informs her compassionate yet driven approach to client relationships. Janet’s ties to the Dominican diaspora in Prince George’s County provide her with a deep understanding
    of the challenges faced by recent immigrants, motivating her to offer culturally sensitive financial guidance and to serve as a bridge between her heritage and professional aspirations.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Customer service'', ''Sales negotiation'', ''Insurance product knowledge (life, health, auto)'', ''CRM software proficiency (Salesforce, HubSpot)'',
    ''Data analysis (Excel, PowerBI basics)'', ''Risk assessment fundamentals'', ''Financial literacy counseling'', ''Creative problem solving'', ''Digital content creation (Canva, social media)'', ''Event
    planning and community outreach'', ''Time management and organization'', ''Stress management and resilience'']'
  hobbies: '[''Visiting art galleries and museums'', ''Salsa and bachata dancing'', ''Photography (street and cultural subjects)'', ''Cooking Dominican cuisine'', ''Exploring new restaurants and cuisines'',
    ''Reading science fiction and fintech literature'', ''Listening to personal finance podcasts'', ''Hiking on local nature trails'', ''Yoga and mindfulness practice'', ''Volunteering at community immigrant
    support centers'', ''Maintaining a cultural blog'']'
  career_goals: Janet aims to obtain her full Life & Health insurance licenses within the next year and advance to a senior sales consultant role, eventually leading a team of agents as a branch manager.
    She plans to complete a bachelor's degree in Business Administration and later pursue an MBA to deepen her strategic and managerial expertise. Long‑term, Janet is interested in integrating emerging
    fintech and insure‑tech solutions into traditional insurance offerings, possibly moving into product development or launching her own boutique brokerage focused on serving underserved Hispanic communities.
    Alongside her professional growth, she hopes to become a recognized advocate for financial literacy, conducting workshops and mentorship programs for Dominican immigrants in the Prince George’s County
    area.
