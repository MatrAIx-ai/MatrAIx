persona_description: A microbiologist who specializes in the study of bacterial ecology and is interested in the use of microfluidics as a tool for studying microbial behavior in the ocean. The persona
  is familiar with the chronic Salmonella-infected mouse model and has established a chronic bacterial infected mouse model with Salmonella typhimurium colonization in the mouse intestine over 6 months.
  The persona is also interested in the progressive-ratio responding for palatable high-fat and high-sugar food in mice, and has detailed the materials and procedures used to train mice to respond for a
  high-fat and high-sugar food pellets on a PR schedule.
