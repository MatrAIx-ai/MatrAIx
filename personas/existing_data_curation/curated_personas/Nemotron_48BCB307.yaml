personas:
  professional: Bobby Lucas is an aspiring junior naturalist who channels a fascination with dinosaurs and space into meticulous LEGO ecosystems, drafting detailed sketches of prehistoric habitats while
    reliably sharing the finished models and explanatory notes with classmates during science club.
  sports: Bobby Lucas loves soccer, proudly wears the Maple Grove Kickers under‑8 jersey, participates in weekend matches at the community field, enjoys informal ball games in the park during summer, and
    practices basic gymnastics in winter to stay agile while favoring friendly play over intense competition.
  arts: Bobby Lucas finds inspiration in the whimsical illustrations of Beatrix Potter and the vivid palette of Claude Monet’s Water Lilies, spends afternoons painting countryside scenes with watercolors,
    folds intricate origami cranes after watching videos by paper artist Robert J. Lang, and often draws animals while listening to classical music.
  travel: Bobby Lucas enjoys weekend outings to the nearby orchard and the state natural history museum, dreams of exploring Dinosaur National Monument in Utah, hopes to trek the lush rainforests of Costa
    Rica on a future family vacation, and prefers hands‑on exploration over guided tours.
  culinary: Bobby Lucas favors hearty spaghetti with meatballs, loves the crisp snap of carrot sticks paired with hummus, can proudly assemble a fruit salad of apples, grapes, and blueberries, and eagerly
    anticipates the family’s annual homemade apple pie, often insisting on sprinkling extra cinnamon for extra flavor.
  core: Bobby Lucas is a curious, art‑driven eight‑year‑old who balances meticulous LEGO engineering with a tender, anxiety‑prone heart, often channeling feelings into creative projects and compassionate
    acts.
background:
  cultural: Bobby is raised in Caruthers, a small agricultural community in Fresno County, California’s Central Valley, where strawberry farms and other crops shape daily life. His white American family
    values hard work, community, and a close connection to the land. He attends a local elementary school with a diverse student body and participates in community events such as harvest festivals, farmer’s
    markets, and holiday celebrations like Independence Day and Thanksgiving. The regional culture emphasizes environmental awareness, outdoor recreation, and appreciation for the arts, all of which influence
    Bobby’s worldview.
attributes:
  skills: '["Drawing and sketching", "Reading comprehension (grade 3 level)", "Basic computer literacy (educational software)", "Organizing school supplies and projects", "Empathetic listening", "Nature
