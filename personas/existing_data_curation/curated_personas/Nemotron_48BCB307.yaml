  hobbies: '["Drawing/painting", "LEGO building", "Reading adventure and science books", "Nature walks and collecting specimens", "Playing soccer", "Caring for family pet", "Crafts (origami, paper mache)",
    "Puzzle and board games", "Music listening and dancing"]'
  career_goals: Bobby dreams of a future where he can blend his love of art, animals, and helping people. He hopes to become a wildlife artist who paints the farms and fields of his hometown, a veterinarian
    who cares for farm animals, or an environmental scientist who protects the local ecosystem. He also talks about wanting to be a teacher who encourages kindness or an astronaut exploring new worlds,
    because he wants to bring joy and safety to others.
