personas:
  professional: Ernestina Cruz, a budding coder and puzzle enthusiast, channels their disciplined, competitive nature into creating Scratch games that blend scientific curiosity with structured storytelling,
    while leveraging their strategic chess skills to design logical game mechanics.
  sports: Ernestina Cruz enjoys playing organized soccer with their local U12 girls' team, spending summer afternoons swimming at the community pool, and avidly follows the Chicago Cubs while cheering for
    the hometown high school basketball team, reflecting their disciplined yet competitive athletic spirit.
  arts: Ernestina Cruz spends their after‑school hours sketching detailed images of local birds and juniper trees, drawing inspiration from John James Audubon and Beatrix Potter, while also enjoying the
    cinematic scores of John Williams and classic adventure tales by Jules Verne, which shape their imaginative narratives.
  travel: Ernestina Cruz plans their trips meticulously, favoring short, well‑organized family outings such as weekend visits to the Grand Canyon and school field trips to the Smithsonian, yet dreams of
    a future adventure exploring the Amazon rainforest and ancient ruins on the Yucatán Peninsula, balancing curiosity with a cautious budget.
  culinary: Ernestina Cruz enjoys helping their grandmother craft tamales using corn masa, pork shoulder, ancho chilies, and fresh oregano, and builds their beginner cooking confidence by perfecting avocado‑lime
    salsa and assembling cheese‑filled quesadillas, though they often forget to clean their workspace after a messy cooking session.
  core: Ernestina Cruz blends a razor‑sharp curiosity for science with a disciplined, competitive streak, often losing sleep over chess tournaments while secretly hoarding a stash of riddles and unfinished
    Scratch projects.
background:
  cultural: Ernestina grows up in a close‑knit Mexican‑American family in Pharr, Texas, where Spanish is spoken at home and English at school. Her household celebrates Dia de los Muertos, Cinco de Mayo,
    and religious holidays with vibrant traditions, music, and food. Family gatherings often feature homemade mole, pozole, and fresh tortillas, fostering a strong sense of heritage. She attends a local
    Catholic parish, which reinforces community ties and cultural values. The proximity to the U.S.-Mexico border exposes her to bilingual commerce and cross‑cultural events, shaping her identity as a proud
    Mexican descendant who navigates both American and Mexican worlds with curiosity and practicality.
attributes:
  skills: '[''Organized study habits using planners and color‑coded notebooks'', ''Bilingual communication (Spanish/English)'', ''Elementary mathematics problem‑solving'', ''Basic coding in Scratch (interactive
    stories and games)'', ''Research and note‑taking for school projects'', ''Time‑management and meeting academic deadlines'', ''Precise following of traditional Mexican recipes'']'
  hobbies: '[''Reading science nonfiction and adventure novels'', ''Solving Sudoku and crossword puzzles'', ''Playing chess in a small school club'', ''Creating interactive games with Scratch'', ''Drawing
    illustrations of wildlife and cultural themes'', ''Assisting with traditional Mexican cooking (e.g., tamales)'']'
  career_goals: Ernestina dreams of earning a scholarship to a top university where she can study biomedical engineering or public health, fields that combine her love of science, problem‑solving, and helping
    underserved communities. She is determined to be the first in her family to graduate college and hopes to develop affordable medical devices or health‑education tools tailored for Hispanic neighborhoods
    along the Texas‑Mexico border. While she is competitive and seeks high academic standards, she also wants to serve as a role model for younger Mexican‑American children, showing them that disciplined
    effort and curiosity can open doors to impactful careers.
