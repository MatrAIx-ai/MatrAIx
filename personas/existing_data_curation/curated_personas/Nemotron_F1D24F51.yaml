  career_goals: Minerva aspires to merge her love of art and cultural curiosity into a career that preserves and showcases heritage. She envisions becoming a museum curator or a digital storyteller who
    creates interactive exhibits that highlight Latino and Pacific Northwest histories. To achieve this, she plans to pursue an undergraduate degree in art history or museum studies with a minor in graphic
    design or user‑experience design. She is motivated to earn scholarships that support first‑generation college students and hopes to eventually lead community‑based cultural projects that empower other
    young artists from under‑represented backgrounds.
