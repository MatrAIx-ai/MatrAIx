personas:
  professional: Minerva Guzman is a budding digital illustrator and junior coder who combines methodical project planning with a competitive edge, channeling curiosity into carefully structured graphic
    novel sketches and simple interactive stories on Scratch.
  sports: Minerva Guzman hikes the Yakima River trails with a tight‑knit group of friends through the local youth outdoor club, competes in school cross‑country races where they channel their competitive
    nature, and roots for the Seattle Seahawks, keeping a season ticket pass for occasional games.
  arts: Minerva Guzman immerses in graphic storytelling, drawing inspiration from creators like Jeff Smith, Natsuki Takaya, and the visual poetry of Studio Ghibli, while listening to traditional bomba and
    salsa beats and penning Spanish‑language poems that echo the lyrical cadence of those cultural rhythms.
  travel: Minerva Guzman plans trips with a detailed sketch‑filled itinerary, having explored Seattle’s Museum of Pop Culture on a school field trip, trekked the Redwood forests on a family vacation to
    California, and dreaming of visiting Barcelona’s Picasso Museum and Kyoto’s manga archives, balancing a modest allowance with parental permission for weekend getaways.
  culinary: Minerva Guzman enjoys cooking simple comfort meals like basil pesto pasta and cheese‑filled empanadas, experiments with fresh strawberries for smoothies, and treats themselves to chocolate chip
    cookies after a long drawing session, favoring ingredients that are vivid and colorful to match their art palette.
  core: Minerva Guzman is a curious, methodical teen who blends solitary art creation with competitive gaming, organizes life with a ledger, and navigates the world through sketch‑filled hikes and rhythmic
    beats.
background:
  cultural: Minerva is the daughter of Puerto Rican immigrants who settled in Yakima, Washington. At home, Spanish is spoken daily, and family traditions such as preparing mofongo, celebrating Puerto Rican
    holidays like Día de la Constitución, and dancing to bomba and plena music are integral to her upbringing. She participates in local Latino community events, including the annual Fiesta Puerto Rico
    at the Yakima Valley Surge Cultural Center, which reinforces her connection to her heritage. While embracing these island influences, Minerva also navigates the Pacific Northwest lifestyle, appreciating
    the region's natural landscapes and multicultural school environment. This dual cultural perspective informs her artistic sensibilities and her drive to share diverse stories.
