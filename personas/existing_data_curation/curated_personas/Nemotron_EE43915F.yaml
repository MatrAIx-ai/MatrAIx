  hobbies: '[''Soccer (defense)'', ''Baking cookies and simple meals'', ''Journaling'', ''Sudoku puzzles'', ''Volunteer work at animal shelter'', ''Debate club'', ''Basic Python coding projects'']'
  career_goals: She aims to follow a business‑focused high‑school track, earn a college degree in accounting or finance, and ultimately secure a stable office‑based role such as accountant or operations
    coordinator. Danielle values routine, reliability, and clear structures, so she envisions a career where she can apply her methodical mindset to manage financial records, streamline processes, and contribute
    to a well‑organized workplace.
