persona_description: A geologist who studies the geology of coastal Maine, specifically focusing on the source of lead and arsenic in the soil and near-surface till. This geologist is interested in the
  geological and mineralogical processes that have contributed to the high concentrations of lead and arsenic in the area, as well as the potential sources of these contaminants. They are likely to be interested
  in the chemical and isotopic compositions of the soil and till horizons, as well as the regional bedrock and its mineralogy. They may also be interested in the recent weathering and pedogenic processes
  that have led to the formation of secondary minerals in the area.
