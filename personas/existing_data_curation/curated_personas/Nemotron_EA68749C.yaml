personas:
  professional: Roberto Garcia, a precocious two‑year‑old who loves to role‑play as a tiny entrepreneur, sets up a makeshift lemonade stand in the backyard, organizing their crayons and toy cash register
    with surprising focus, while they channel boundless curiosity into imaginative negotiations with stuffed‑animal customers.
  sports: Roberto Garcia bursts with energy at the local park, chasing a soft soccer ball with their friends while they cheer for the Dallas Cowboys on cartoon TV, and they proudly wear a tiny cap from
    the Houston Astros during family outings to the community splash pad.
  arts: Roberto Garcia delights in splashing vibrant watercolors on large sheets of paper, dancing to lively mariachi tunes during family gatherings, and they often reenact scenes from their favorite animated
    series featuring a brave niño explorer, inspiring their own imaginative storytelling with plush companions.
  travel: Roberto Garcia loves family road trips to their grandparents’ house where they explore a backyard garden of marigolds, and their most recent adventure to the Dallas Zoo left them fascinated by
    the playful otters, sparking a desire to collect souvenir postcards from each visited city.
  culinary: Roberto Garcia shows a picky palate, insisting on soft avocado slices and crunchy taco shells with mild cheese, while they delight in helping their mother stir warm atole and proudly lick the
    spoon, though they often refuse broccoli, leading to occasional kitchen messes.
  core: Roberto Garcia is an exuberant toddler who blends boundless imagination with a love for bright colors, tiny entrepreneurial dreams, and lively family traditions, all while they navigate the occasional
    tantrum over broccoli.
background:
  cultural: Roberto grows up in a Mexican‑American household in Irving, Texas. His family speaks Spanish at home while also using English, giving him early bilingual exposure. Cultural traditions such as
    celebrating Día de los Muertos, sharing family meals that feature tacos, tamales, and atole, and listening to mariachi and ranchera music are woven into his daily life. The vibrant Hispanic community
    in Dallas County provides opportunities for community festivals, dance classes, and bilingual story‑time events at the local library. These experiences nurture his appreciation for Mexican heritage
    while also integrating the multicultural environment of the Dallas region.
