personas:
  professional: Serbando Guzman is a 32‑year‑old shop‑floor assembler and fabricator who leverages their hands‑on expertise in MIG/TIG welding, CNC basics, and CAD sketching to troubleshoot mechanical issues
    while their spontaneous curiosity drives them to experiment with process improvements, even as their competitive streak and cautious skepticism of management directives push them to mentor peers toward
    faster production without a formal supervisory title yet.
  sports: Serbando Guzman fuels their competitive spirit playing pickup basketball at the Kenner Community Center and cheers for the New Orleans Pelicans, New Orleans Saints, and LSU Tigers, treating weekly
    gym sessions as both a personal challenge and a social ritual, and they relish the camaraderie of the court.
  arts: Serbando Guzman channels their love for vibrant street culture into graffiti murals inspired by the bold colors of Frida Kahlo and the rhythmic tags of Detroit’s Write Club, while their salsa and
    cumbia nights echo the sounds of Carlos Vives, Los Lobos, and funk legends like James Brown, and they occasionally jam on guitar with local jam sessions.
  travel: Serbando Guzman prefers spontaneous, low‑cost road trips that blend music festivals with cultural immersion, having already hit the streets of New Orleans Mardi Gras, a weekend food‑truck crawl
    in Austin, and a memorable Día de los Muertos celebration in Oaxaca, while they dream of exploring the historic plazas of Cartagena and the desert art installations of Marfa.
  culinary: Serbando Guzman enjoys a hybrid palate that swaps between smoky street‑taco al pastor, crisp New Orleans po’boy with shrimp, and their own hand‑rolled mole and tamales, often cooking arroz con
    pollo on weekends with cumin, chipotle, and fresh cilantro while they grill ribs seasoned with Creole jambalaya spices.
  core: Serbando Guzman is a 32‑year‑old creative fix‑it enthusiast who balances a love for metal‑craft, vibrant street art, and spontaneous gatherings, yet they often battle disorganization and impulsive
    spending while staying emotionally steady under pressure.
background:
  cultural: Serbando is a first‑generation Mexican‑American who grew up in a bilingual household, speaking both Spanish and English. He maintains strong ties to Mexican traditions, celebrating Día de los
    Muertos, Cinco de Mayo, and Christmas with family gatherings centered around home‑cooked mole, tamales, and arroz con pollo. The Catholic faith plays a role in his life, with regular attendance at local
    Mass and participation in parish festivals. Living in Kenner, Louisiana, he blends his Mexican heritage with Southern influences—enjoying Cajun and Creole cuisine, attending Mardi Gras parades, and
    incorporating local music styles into his dance repertoire. His cultural identity is a source of pride, informing his artistic themes and his desire to give back to the community through public art
    projects that reflect the multicultural fabric of his neighborhood.
attributes:
  skills: '[''Manual assembly'', ''Basic metal welding'', ''Power tool operation'', ''Simple schematic reading'', ''Mechanical troubleshooting'', ''Quality inspection'', ''Safety compliance'', ''Introductory
