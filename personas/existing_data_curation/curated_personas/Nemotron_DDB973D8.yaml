  hobbies: '[''Graffiti and mural art'', ''Pickup basketball'', ''Salsa and cumbia dancing'', ''Custom bike building'', ''Food‑truck tasting'', ''DIY metal projects'', ''Podcast listening'', ''Live music
    jam sessions'', ''Guitar playing'']'
  career_goals: Serbando aims to leverage his practical expertise into a supervisory role on the production floor, such as shift lead or team foreman, where he can mentor newer workers while still engaging
    in hands‑on work. He plans to obtain a GED within the next year and pursue certifications in advanced welding (AWS) and CNC programming to broaden his technical credentials. Long‑term, he dreams of
    opening a small custom metal‑art studio that fuses his fabrication skills with his love for street art and mural creation, allowing him to produce functional art pieces and collaborate on community
    projects in Kenner and the greater New Orleans area.
