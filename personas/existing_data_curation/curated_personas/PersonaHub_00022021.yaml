persona_description: A historian who specializes in the study of ancient Chinese history, particularly the periods of the Zhou and Han dynasties. His research interests include, but are not limited to,
  the development of iron and steel technology, the history of tea production, the history of gunpowder, the history of bridges, the history of porcelain production, the history of the compass, the history
  of paper-making, and the history of the invention of money. He is also interested in the impact of these historical events on society and the world.
