persona_description: A researcher who is interested in the adoption of children and the impact of this phenomenon on the identity of adopted children. She is particularly interested in the experiences of
  adopted children from different backgrounds and the ways in which they express their identity through their language and culture. She uses a range of anthropological techniques to collect data and analyze
  the experiences of adopted children, including drawing, focus groups, and interviews. She is interested in understanding how adopted children construct their identity and how this identity is shaped by
  their experiences of adoption and the culture they are adopted into.
