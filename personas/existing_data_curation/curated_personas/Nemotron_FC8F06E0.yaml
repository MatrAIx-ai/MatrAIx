  career_goals: At 86, Jimmy’s primary ambition is to preserve his personal and family legacy. He aims to finish a memoir that chronicles his life in the logging and fishing communities of Grays Harbor,
    document his genealogy, and contribute oral histories to the local museum. He also hopes to mentor his grandchildren and other younger community members in practical skills like woodworking and safe
    fishing practices, ensuring that his knowledge is passed on. Maintaining his health and independence to continue his projects, and supporting his wife’s comfort and wellbeing, remain his core personal
    goals.
