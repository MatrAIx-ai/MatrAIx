personas:
  professional: Thomas Interlandi is a veteran full‑stack software architect whose three‑decade mastery of Python, Java, C++ and cloud‑native microservices is disciplined by his methodical, organized approach,
    letting him reliably orchestrate CI/CD pipelines while mentoring junior developers through systematic code reviews.
  sports: Thomas Interlandi is a devoted fan of the Philadelphia Eagles, Phillies, and 76ers, rides with the Chester County Cycling Club on the weekend’s scenic trails, competes in the senior chess league,
    and maintains fitness through regular cycling sessions and light gardening work that doubles as low‑impact cardio.
  arts: Thomas Interlandi channels creative energy into board‑game design evenings with friends, devours contemporary science‑fiction by authors such as Becky Chambers, Neal Stephenson, and Nnedi Okorafor,
    and captures the rolling hills of the Pennsylvania countryside with a Nikon D850, while occasionally attending performances by the Philadelphia Orchestra at the Kimmel Center.
  travel: Thomas Interlandi prefers meticulously planned road trips through the Pennsylvania Dutch Country—like weekend visits to Lancaster and New Hope—yet also savors spontaneous overseas escapes to Kyoto’s
    temple gardens and the Scottish Highlands, balancing a modest travel budget with a desire for both cultural immersion and scenic photography.
  culinary: Thomas Interlandi combines garden‑grown heirloom tomatoes, crisp cucumbers, and fresh herbs into a signature roasted beet and goat cheese salad, pairs it with a perfectly seared trout dish seasoned
    with dill, and finishes meals with a warm apple crumble, all while discovering new flavors at the local farmers market and occasionally indulging in a classic Philly cheesesteak for nostalgia.
  core: Thomas Interlandi, a methodical yet curious full‑stack architect, balances his love of cycling, community board‑game gatherings, and garden‑to‑table cooking with a habit of checking GitHub pull
    requests at midnight, all while nurturing a gentle, cooperative spirit.
background:
  cultural: Thomas was raised in a middle‑class family in suburban Pennsylvania, where a strong emphasis on practical education, community involvement, and self‑reliance shaped his outlook. His family’s
    European roots—primarily German and Irish—instilled a respect for craftsmanship and punctuality, while the region’s blend of historic towns and modern tech hubs gave him a balanced perspective on tradition
    and innovation. Living in Malvern, he enjoys the close‑knit community atmosphere, the proximity to Philadelphia’s tech ecosystem, and the cultural heritage of the Mid‑Atlantic, which together inform
    his collaborative, considerate, and pragmatic approach to work and life.
attributes:
  skills: '["Full‑stack web development (React, Node.js, Django)", "Microservices architecture", "Cloud platforms (AWS, Azure)", "Database design and optimization (PostgreSQL, MySQL)", "Legacy system migration
    (COBOL to modern stack)", "DevOps CI/CD pipelines (Jenkins, GitHub Actions)", "Agile Scrum leadership", "Technical mentorship and code review", "System performance tuning", "Data analytics with Python",
    "IoT prototyping (Raspberry Pi, Arduino)"]'
  hobbies: '["Cycling on Chester County trails", "Vegetable gardening", "Volunteer coding instructor at community library", "Board‑game evenings", "Senior chess club", "DIY home‑automation with Raspberry
    Pi", "Reading science‑fiction literature", "Landscape photography"]'
  career_goals: Thomas aims to transition into a senior solutions architect role where he can guide digital transformation initiatives for mid‑size enterprises in the Greater Philadelphia area. He also
    wants to formalize his mentorship by establishing a community coding boot‑camp for adult learners and to author a series of practical articles on modernizing legacy systems. Over the next five years,
    he plans to launch a SaaS tool that streamlines small‑business inventory management, while gradually scaling back full‑time coding responsibilities to achieve a balanced semi‑retirement.
