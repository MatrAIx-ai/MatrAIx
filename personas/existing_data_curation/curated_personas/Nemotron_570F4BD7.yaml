personas:
  professional: Johnny Lee is a dependable telecommunications customer‑service representative who excels at active listening and precise script adherence, using CRM platforms like Zendesk and Salesforce
    to de‑escalate calls, and they aim to transition into a supervisory role where they can mentor new agents and streamline workflows.
  sports: Johnny Lee is a low‑key sports enthusiast who follows the New Orleans Saints during the NFL season, roots for the LSU Tigers on Saturdays, joins a weekend fishing club at Lake Pontchartrain for
    relaxed competition, and they keep fit by hiking modest trails rather than formal gym routines.
  arts: Johnny Lee is an avid reader of contemporary science‑fiction novels by authors such as N.K. Jemisin and Ann Leckie, enjoys the atmospheric scores of video games composed by Jeremy Soule, and they
    occasionally attend intimate church choir performances featuring traditional gospel hymns while appreciating the storytelling of director Denis Villeneuve.
  travel: Johnny Lee prefers low‑key road trips with a clear itinerary, having explored the French Quarter of New Orleans and the Ozark Trail, and they hope to one day hike the Scottish Highlands while
    savoring the local whisky and fishing the lochs.
  culinary: Johnny Lee enjoys cooking traditional Louisiana dishes like gumbo thickened with roux, shrimp, and the holy trinity of celery, bell pepper, and onion, and they find satisfaction in perfectly
    fried catfish seasoned with Cajun spice, while their culinary skill remains at a comfortable home‑cook level, often pairing meals with a cold sweet tea and occasional espresso.
  core: Johnny Lee is a structure‑loving yet anxiety‑prone twenty‑two‑year‑old who finds calm in solitary fishing trips and meticulous journaling, but they often let disorganization creep into finances
    and overlook medication refills during busy weeks.
background:
  cultural: Johnny grew up in Sarepta, a small community in Bossier Parish, northwest Louisiana. His family is of Anglo‑American descent, with roots tracing back to early 20th‑century migrants who worked
    in regional agriculture and later the oil and gas industry that shaped the area. The local culture blends traditional Southern Protestant values—family gatherings, church potlucks, and community high‑school
    sports—with subtle Cajun and Creole influences seen in regional music (Zydeco) and cuisine (gumbo, jambalaya). Johnny’s upbringing emphasized hospitality, modesty, and a strong sense of local identity,
    while also exposing him to the rhythms of rural Louisiana life.
