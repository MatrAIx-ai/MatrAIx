    music'']'
  career_goals: Johnny aims to advance within the customer‑service field by moving into a supervisory or quality‑assurance role where he can mentor newer agents and shape workflow improvements. He plans
    to complete his bachelor's degree in business administration through online courses while continuing to work, positioning himself for a future transition to a customer‑success manager or account‑management
    position that offers more strategic responsibilities and a steadier schedule. A personal ambition is to develop stronger self‑management techniques to handle his anxiety, ultimately becoming an advocate
    for mental‑health resources in his workplace.
