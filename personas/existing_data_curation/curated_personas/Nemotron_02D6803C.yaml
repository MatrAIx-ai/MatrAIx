personas:
  professional: Lindsey Griffin, a senior financial planning and analysis manager at a mid‑size corporation, blends rigorous Excel, SQL, and Python modeling with a big‑picture, artistic sensibility, turning
    cross‑functional data into narrative‑driven insights while navigating the occasional chaos of their relaxed, disorganized work style.
  sports: Lindsey Griffin, an occasional member of the Passyunk River Runners club, cycles on brisk spring mornings, roots for the Philadelphia Eagles and 76ers, and squeezes in weekend yoga flow sessions
    to counterbalance the stress of their high‑pressure finance role.
  arts: Lindsey Griffin, who sketches urban scenes in pocket‑size sketchbooks and captures street moments with a vintage Fuji X‑100, frequents exhibitions by contemporary artists at the Philadelphia Museum
    of Art and feels revitalized by live shows from musicians like St. Vincent and Jacob Collier.
  travel: Lindsey Griffin prefers culturally immersive trips over beach resorts, having explored the murals of Mexico City, the jazz clubs of New Orleans, and the historic markets of Marrakech, while meticulously
    planning itineraries in an eclectic notebook that sometimes gets abandoned for spontaneous detours.
  culinary: Lindsey Griffin delights in experimental dining, favoring dishes like kimchi‑infused tacos, roasted beet and goat cheese salads, and slow‑cooked lamb shank with harissa, and their home cooking
    skill hovers at competent—enough to whip up a decent pot of homemade ramen broth.
  core: Lindsey Griffin is a 42‑year‑old finance leader whose artistic curiosity fuels innovative cost strategies, yet their relaxed, sometimes chaotic habits and vivid anxiety drive a relentless pursuit
    of balance between numbers and creativity.
background:
  cultural: Lindsey grew up in a middle‑class white family in the Philadelphia suburbs, where a blend of traditional American values and the city’s rich historical and artistic heritage shaped her worldview.
    Her parents, both engineers, encouraged a strong STEM education, leading her to pursue a bachelor’s degree in a scientific discipline. The proximity to Philadelphia’s museums, theaters, and multicultural
    neighborhoods exposed her early to diverse artistic expressions, fueling her curiosity and appreciation for unconventional ideas. This mixed environment fostered a balance of analytical rigor and creative
    openness that informs both her professional and personal life.
