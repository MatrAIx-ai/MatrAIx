  career_goals: Lindsey aims to ascend to a chief financial officer role within the next five years, ideally at an organization that integrates sustainable finance and supports cultural initiatives. She
    intends to champion flexible work policies and mental‑health supportive practices, drawing on her own experiences with anxiety to create a healthier workplace culture. To strengthen her strategic leadership,
    she plans to obtain the CFA charter and complete an executive MBA. In the longer term, she envisions founding a boutique consulting firm that helps arts organizations and creative enterprises develop
    financially resilient business models.
