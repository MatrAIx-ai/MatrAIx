  career_goals: Jimmy often talks about growing up to work in a job where he can build and fix things in a quiet, orderly setting. He imagines becoming a carpenter or a mechanic, because he enjoys using
    tools, following step‑by‑step instructions, and seeing tangible results. He also likes the idea of a library or workshop where he can focus alone, so his long‑term ambition blends hands‑on craftsmanship
    with a calm, predictable environment.
