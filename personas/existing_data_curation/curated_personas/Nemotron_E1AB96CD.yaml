personas:
  professional: Tien Avera, a high‑school junior with a budding career in environmental illustration, blends meticulous planning with artistic curiosity, using their methodical approach to sketch detailed
    Ozark landscapes while they lead the school’s art club and draft concepts for future sustainable design projects.
  sports: Tien Avera, an avid hiker who joins the Ozark Trail Club and runs on the school’s varsity cross‑country team, follows the St. Louis Cardinals for baseball and the Arkansas Razorbacks for college
    football, and prefers weekend trail runs to organized sports, satisfying the way they balance solitary exercise with team camaraderie.
  arts: Tien Avera, a passionate member of the school’s art club and community theater, draws inspiration from the vivid landscapes of Albert Bierstadt, the lyrical storytelling of Bob Dylan, and the atmospheric
    soundscapes of Bon Iver, channeling this eclectic mix into watercolor paintings of the Ozarks and acoustic guitar covers they perform at local open‑mic nights.
  travel: Tien Avera, who plans trips with the same detailed checklists they use for model kits, dreams of trekking the Redwood forests after exploring the nearby Ozark National Scenic Riverways, and hopes
    to someday photograph the cherry blossoms in Kyoto while balancing a limited allowance and school commitments.
  culinary: Tien Avera, an experimental home cook who can whip up a quesadilla with smoked cheddar and cilantro, favors hearty Midwestern comfort foods like chicken pot pie and sweet potato chili, and often
    pairs their meals with a vintage bottle of root beer, reflecting the way they blend bold flavors with dependable home‑cooked staples.
  core: Tien Avera, a 15‑year‑old creative strategist, blends meticulous planning with boundless curiosity, juggling sketchbooks, guitar strings, and micro‑investments while occasionally staying up too
    late perfecting a model kit, which shows the way they balance disciplined tasks with spontaneous artistic bursts.
background:
  cultural: Tien grew up in Gassville, Arkansas, a small, close‑knit town in the Ozark region. His family maintains Southern traditions such as church gatherings, Sunday barbecues, and attending high school
    football games and local county fairs. He was exposed to Appalachian folk music, country cooking, and the communal spirit of rural Arkansas. While his community is predominantly white, Tien broadens
    his cultural perspective through school programs, online media, and friendships that introduce diverse ideas and experiences.
