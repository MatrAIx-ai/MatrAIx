  career_goals: Tien aspires to pursue a career that merges his artistic passion with his methodical mindset. He aims to attend a specialized high‑school arts program or a college with a strong graphic
    design or multimedia arts curriculum, ultimately working as a graphic designer, multimedia artist, or creative director. He is also intrigued by architecture and video game design, dreaming of leading
    creative projects that blend visual storytelling with structured planning.
