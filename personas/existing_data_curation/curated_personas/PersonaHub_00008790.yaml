persona_description: A geographer who is interested in exploring the physical and environmental aspects of the world, and how human activities affect the Earth's ecosystems. They are likely to be passionate
  about understanding the complex relationships between landforms, water features, and the elements that make up most living things. They are skilled in using spatial concepts and representations to solve
  complex human and environmental problems, and engage in work that is challenging, rewarding, and relevant to human existence. They are likely to have a deep understanding of the importance of environmental
  conservation and the need to address issues such as overpopulation, pollution, burning fossil fuels, and deforestation. They are also likely to be aware of the six most common elements of life on Earth,
  including carbon, hydrogen, oxygen, nitrogen, sulphur and phosphorus, and are familiar with the essential elements of life on Earth.
