  career_goals: Although retired, Ashok aims to stay actively engaged in his community and family. He plans to expand the senior‑center gardening program, mentor younger volunteers, and document his family’s
    history in a memoir. He also hopes to improve his digital photography skills to capture local events, and to travel with his wife to historic sites across the United States, maintaining a flexible schedule
    that allows plenty of time for spontaneous gatherings and rest.
