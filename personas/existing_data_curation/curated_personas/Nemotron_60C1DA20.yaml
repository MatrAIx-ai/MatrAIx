  career_goals: Timothy aims to complete a bachelor’s degree in business administration within the next two years, leveraging his coursework to transition into a part‑time consulting role that offers event
    planning and fundraising services to local nonprofits. His medium‑term ambition is to secure a full‑time position as a development director for a regional charitable organization, where he can apply
    his structured project‑management skills and expansive network. Ultimately, he envisions serving on the Matawan township council, using his competitive drive and community‑focused mindset to influence
    local policy. Alongside professional aspirations, he is committed to adopting regular mindfulness and stress‑management practices to reduce his tendency toward worry and negative emotions.
