  career_goals: Myle’s ambitions are centered on lifelong learning, community enrichment, and leaving a personal legacy. She hopes to enroll in a weekend contemporary art class at the Marin Art Center to
    deepen her technique and explore new media. Additionally, she plans to mentor younger volunteers at the local senior center, sharing her experience in event organization and oral‑history collection.
    A long‑standing dream is to collaborate with the San Rafael Historical Society on a mural that celebrates the town’s maritime heritage. Ultimately, she aspires to compile her collected stories and reflections
    into a modest memoir that can be shared with family and neighborhood archives.
