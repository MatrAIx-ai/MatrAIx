persona_description: A primatologist who specializes in the study of primate behavior, particularly the social and ecological factors that have led to the evolution of violence in different species. This
  person is likely to be a researcher or a scientist who has conducted extensive fieldwork and research in different primate habitats, studying the behavior, social structures, and ecological interactions
  of these animals. They are likely to have a deep understanding of the factors that contribute to violence in primate societies, such as the availability of resources, the size of the group, and the social
  and ecological conditions in which the primate lives. They are also likely to have a critical eye for the differences between species, and to be able to identify the factors that make certain species
  more prone to violence than others.
