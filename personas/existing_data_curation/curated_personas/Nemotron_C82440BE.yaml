personas:
  professional: Melissa Cadagan, a retired homemaker turned community cooking mentor, leverages her decades of household management, budgetary acumen, and bilingual translation skills to design affordable,
    authentic Mexican cooking workshops, blending practical cost‑control with a curious flair for culinary experimentation.
  sports: Melissa Cadagan enjoys low‑impact fitness such as brisk morning walks, a weekly senior yoga class, and cheering on the Arizona Diamondbacks while maintaining her bridge club schedule as a social
    sport, though she avoids high‑intensity competition.
  arts: Melissa Cadagan’s artistic palate delights in the lilting strains of mariachi legends like Vicente Fernández and José Alfredo Jiménez, the classic mysteries of Agatha Christie, and historical nonfiction
    by Doris Kearns Goodwin, often weaving these cultural threads into her storytelling and cooking.
  travel: Melissa Cadagan favors culturally immersive road trips that blend relaxed itineraries with festival attendance in Oaxaca, Mexico, and leisurely stays at historic inns in Santa Fe, New Mexico,
    all while carefully watching her budget and family commitments.
  culinary: Melissa Cadagan masterfully prepares chicken mole poblano, hand‑made corn tortillas, and sweet potato tamales, blending traditional ingredients such as chiles ancho, fresh cilantro, and masa
    harina with frugal techniques that keep costs low yet flavors vibrant.
  core: Melissa Cadagan, a 65‑year‑old culinary storyteller, balances a competitive streak and chronic worry with a love of garden‑grown herbs, budget‑savvy cooking, and a quirky habit of misplacing her
    crossword clues.
background:
  cultural: Melissa was born and raised in Houston to Mexican immigrant parents who settled in the city's East End. Growing up in a bilingual household, she learned Spanish from her parents and English
    at school, fostering a bicultural identity that blends Mexican traditions—such as Día de los Muertos, family‑centered holiday meals, and Catholic rituals—with the diverse, urban life of Houston. She
    remains actively involved in the local Mexican-American community, participating in cultural associations, neighborhood celebrations, and church gatherings, which keep her connected to her heritage
    while navigating contemporary American society.
