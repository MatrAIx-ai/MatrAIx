  career_goals: Albert aims to solidify his informal skill set into a sustainable income stream while preserving his love for flexibility. He plans to earn a GED within the next year, followed by a certification
    in building maintenance or bike repair. His longer‑term ambition is to launch a small freelance handyman service or a neighborhood bike‑fix pop‑up, allowing him to work on his own schedule, build modest
    savings, and eventually transition to a stable, yet autonomous, livelihood.
