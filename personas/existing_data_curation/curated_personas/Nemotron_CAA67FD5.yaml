  hobbies: '[''Sketching'', ''Digital painting (Procreate)'', ''Listening to bachata and salsa music'', ''Salsa dancing'', ''Cooking Dominican dishes'', ''Reading speculative fiction'', ''Science podcasts'',
    ''Journaling'', ''Strategy video games'', ''Volunteering at community center'']'
  career_goals: Lizzette aspires to study visual arts and graphic design in college, with the long‑term ambition of becoming a professional artist who creates culturally resonant work that celebrates her
    Dominican heritage. She hopes to combine her artistic skills with digital media to produce illustrations, murals, and branding for community organizations. A core part of her vision is to use her platform
    to advocate for youth mental health, offering workshops that blend creative expression with coping strategies. Ultimately, she dreams of contributing to cultural festivals and educational programs that
    inspire other young people to embrace both their creativity and their identity.
