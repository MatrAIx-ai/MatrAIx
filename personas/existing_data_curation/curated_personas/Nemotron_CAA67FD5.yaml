personas:
  professional: Lizzette Mayorga, a budding digital illustrator and middle-school art club leader, blends traditional sketching with experimental digital painting, channeling curiosity into fresh character
    designs while juggling school assignments and the occasional stress about meeting project deadlines.
  sports: Lizzette Mayorga channels energy into salsa dancing lessons at the community center, joins the school’s track team for the 400‑meter dash, and occasionally plays pick‑up basketball, balancing
    a love for rhythmic movement with a tendency to feel self‑conscious in larger crowds.
  arts: Lizzette Mayorga immerses herself in speculative fiction art, drawing inspiration from fantasy novel covers, while vibing to bachata legends like Juan Luis Guerra, contemporary pop icon Billie Eilish,
    and salsa classics from Celia Cruz, often recreating album covers in their sketchbook.
  travel: Lizzette Mayorga dreams of returning to their family’s coastal hometown to savor the sea breeze, has explored nearby national parks on school trips, and hopes to attend the annual Comic‑Con in
    San Diego next summer, balancing budget constraints with a craving for cultural immersion.
  culinary: Lizzette Mayorga enjoys preparing family‑recipe mangú and hearty sancocho, perfecting the balance of plantains and root vegetables, while also experimenting with homemade pizza topped with mozzarella,
    basil, and a splash of hot sauce, though they sometimes over‑season the salsa due to excitement.
  core: Lizzette Mayorga is a curious teen artist who sketches worlds, savors family flavors, worries about money, and dances through stress with a journal in hand.
background:
  cultural: Lizzette is a second‑generation Dominican‑American raised in a close‑knit family in Bridgeport, Connecticut. She grew up bilingual, speaking Spanish at home and English at school, and she actively
    participates in Dominican cultural celebrations such as Carnaval, Día de la Independencia, and the annual Dominican Festival at the local cultural center. Family traditions like cooking together, sharing
    stories of the Dominican Republic, and listening to classic merengue and bachata music are central to her identity. These cultural influences shape her artistic style, her values of community responsibility,
    and her desire to preserve and share her heritage through creative projects.
attributes:
