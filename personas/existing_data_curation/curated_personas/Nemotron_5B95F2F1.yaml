  hobbies: '[''desert gardening'', ''traditional New Mexican cooking'', ''knitting and crochet'', ''reading historical fiction'', ''birdwatching and nature walks'', ''volunteering at senior community center'',
    ''listening to folk music'']'
  career_goals: Looking ahead, Zenaida hopes to transition from full‑time production work to a part‑time mentorship role where she can pass her practical knowledge onto newer employees and champion safety
    initiatives. She is interested in obtaining a certification in occupational health and safety to formalize her expertise, and she plans to volunteer at a local community center to teach basic mechanical
    skills and Spanish language basics to seniors. Ultimately, she aims to maintain a balanced, low‑stress routine that honors her curiosity for new techniques while preserving the reliable standards she
    values.
