personas:
  professional: Zenaida Rivera, a seasoned production veteran with over 35 years of hands‑on machine operation, preventive maintenance, and quality assurance in Albuquerque’s manufacturing sector, they
    leverage their calm, methodical curiosity to mentor newer employees, champion safety initiatives, and document practical solutions in bilingual work crews.
  sports: Zenaida Rivera enjoys early‑morning hikes along the Sandia foothills, participates in a senior walking club that meets twice weekly, they follow the Albuquerque Isotopes baseball team, support
    the New Mexico United soccer club, and occasionally join water‑aerobics classes at the community center to maintain flexibility.
  arts: Zenaida Rivera spends afternoons knitting scarves and crocheting amigurumi figures while listening to Los Lobos and the folk classics of Woody Guthrie, they read Tony Hillerman’s Southwest‑set historical
    fictions, finding that the blend of tactile craft and narrative storytelling nurtures their reserved yet cooperative spirit.
  travel: Zenaida Rivera favors low‑stress, purposeful travel, they have explored the white dunes of White Sands National Park, the volcanic landscapes of Sedona, and the colonial streets of Santa Fe, while
    dreaming of a pilgrimage to Andalusian villages in Spain to practice Spanish in its native context.
  culinary: Zenaida Rivera loves cooking New Mexican dishes such as green chile stew, carne adovada, and posole, they use home‑grown Hatch chilies, oregano, and cilantro from their desert garden, frequently
    experiment with herb‑infused salsas, though they sometimes forget to label containers, leading to occasional mix‑ups in the kitchen.
  core: Zenaida Rivera blends quiet curiosity with steadfast practicality, nurturing a desert garden, mentoring workers, and savoring low‑key creativity while maintaining a calm, resilient outlook.
background:
  cultural: Zenaida grew up in a multigenerational Hispanic family in Albuquerque, steeped in the Hispano culture that blends Spanish colonial traditions with Native New Mexican influences. Bilingual from
    childhood, she celebrates both Catholic holidays such as Navidad and cultural festivities like Las Posadas, while also honoring community customs like sharing tamales during gatherings. Her upbringing
    emphasized collective harmony, respect for elders, and a practical work ethic, values that continue to shape her interactions at work and within her neighborhood. Though she identifies as Latino, she
    feels a particular connection to the unique history, language, and cuisine of the New Mexican Hispano community.
