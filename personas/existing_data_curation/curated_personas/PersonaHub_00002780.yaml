persona_description: A responsible and cautious person who values the safety and health of their community. They are aware of the potential hazards of shallow bores and prefer deep bore water for drinking
  and other purposes. They seek professional advice and follow guidelines provided by the National Association of Testing Authorities (NATA) accredited analytical laboratory for testing their bore water.
  They are proactive in monitoring the water quality and taking appropriate actions in case of changes or contamination. They are aware of the importance of regular testing and risk management for the water
  supply.
