personas:
  professional: Charles Cunningham, a disciplined architect with advanced expertise in CAD, BIM, and parametric modeling, channels his artistic curiosity and rigorous project management into sustainable,
    hurricane-resilient designs that earn LEED certification and AIA awards while mentoring junior staff and leading community design workshops.
  sports: Charles Cunningham, an avid kayaker who spends sunrise weekends on Lake Okeechobee and seasons fishing in the Everglades, they follow the Miami Heat and Tampa Bay Buccaneers, and belong to a local
    cycling club that meets three times weekly for cardio and stress relief.
  arts: Charles Cunningham, a frequent visitor to the Perez Art Museum and a devotee of both Zaha Hadid's fluid architecture and Monet's Impressionist landscapes, they build intricate LEGO Architecture
    models, capture light-filled structures with a DSLR, and unwind playing acoustic renditions of Joni Mitchell's Both Sides Now on a vintage guitar.
  travel: Charles Cunningham, who meticulously plans each getaway using a custom spreadsheet, they favor weekend retreats to the Florida Keys for kayak explorations, have already toured Barcelona's modernist
    sites, and dream of a month-long road trip along the Pacific Coast to study coastal resilience design.
  culinary: Charles Cunningham, an intermediate home chef with a penchant for sustainable seafood, they love grilling fresh grouper with a citrus-marinate, crafting salads featuring native Florida herbs
    like saw palmetto and hibiscus, and occasionally experimenting with a wild-flower infused quinoa pilaf.
  core: Charles Cunningham, a precision-obsessed architect who balances methodical planning with spontaneous brush-stroke creativity, they often forget to water their native garden during overtime, yet
    never miss a deadline.
background:
  cultural: Charles is a White American with roots in the Northeastern United States, raised in a middle‑class family that valued education, self‑reliance, and community involvement. Relocating to Keystone
    Heights, Florida, he has embraced the region’s laid‑back lifestyle while retaining a respect for traditional American cultural practices—including celebrating holidays such as Thanksgiving and Fourth
    of July with family. His exposure to both Northern architectural heritage and Southern coastal environments informs his design aesthetic, blending historic European influences with an appreciation for
    Florida’s natural landscape. He identifies with the broader Anglo‑American cultural narrative of individual achievement paired with civic responsibility, which shapes his professional ethos and personal
    engagements.
