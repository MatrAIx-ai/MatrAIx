  hobbies: '[''Visiting art museums and galleries'', ''Kayaking and fishing on local lakes'', ''Building architectural models (LEGO Architecture kits)'', ''Photography of built environments'', ''Playing
    acoustic guitar'', ''Volunteering in community design workshops'', ''Reading architectural theory and environmental literature'', ''Gardening native Florida plants'']'
  career_goals: Charles aspires to establish his own architecture practice focused on sustainable, hurricane‑resilient design tailored to the unique climate of Florida. He aims to become a LEED Accredited
    Professional and lead projects that achieve AIA awards for innovation and environmental stewardship. Over the next decade, he envisions expanding his firm to include a multidisciplinary team that integrates
    advanced technologies such as VR visualization and parametric fabrication. He also seeks to contribute to the professional community by speaking at industry conferences, publishing articles on resilient
    design, and mentoring emerging architects. Ultimately, Charles hopes to leave a tangible legacy of buildings that blend artistic expression, functional excellence, and ecological responsibility while
    fostering vibrant, harmonious neighborhoods.
