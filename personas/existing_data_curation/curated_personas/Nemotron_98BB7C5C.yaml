  hobbies: '["Drawing and painting", "Coloring to manage emotions", "Listening to music and dancing", "Reading picture books at the library", "Building with Lego bricks", "Solving puzzles and shape-sorting
    games", "Exploring nature and collecting leaves"]'
  career_goals: Gwendolyn dreams of becoming an artist‑teacher who creates colorful books that help children understand their feelings, and she also imagines exploring space as an astronaut who discovers
    new worlds. She sets high standards for herself, hoping to win school art competitions and earn recognition for her thoughtful projects. Ultimately, she wants a career that blends creativity, learning,
    and the chance to inspire other kids to express themselves confidently.
