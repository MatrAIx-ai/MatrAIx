persona_description: A pediatrician who specializes in the diagnosis and treatment of severe protein-calorie malnutrition, particularly kwashiorkor, a severe form of malnutrition caused by a deficiency
  in dietary protein. She is highly knowledgeable in the clinical presentation, diagnosis, and treatment of kwashiorkor, as well as in the prevention and management of other malnutrition syndromes. She
  is also aware of the importance of considering the underlying causes and risk factors in the treatment of kwashiorkor and other malnutrition syndromes.
