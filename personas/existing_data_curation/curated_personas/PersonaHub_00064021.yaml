persona_description: A public health advocate who is passionate about promoting health equity and improving the health status of minority populations in Florida. They are dedicated to achieving health equity
  for Florida families in every community through more effective partnerships and community-based solutions. They are committed to educating the public about health disparities in the state and the ways
  they can attempt to eliminate them. They are involved in a statewide series of activities that will focus on the advancement of health equity, including a Kick-Off webinar, a presentation on 'Ethnic Diversity
  and Cultural Competency in Cancer Care,', and a Health Equity Summit hosted by the Volusia County Health Department. They are a part of the Florida Office of Minority Health, in collaboration with DOH
  program offices and county health departments, and they plan to educate Floridians about health disparities in the state and the ways they can attempt to eliminate them.
