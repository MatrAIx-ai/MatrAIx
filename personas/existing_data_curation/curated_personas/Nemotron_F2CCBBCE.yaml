personas:
  professional: Jasmine Alliman, a 32‑year‑old retail operations manager, merges rigorous data analysis with a curated visual aesthetic, leading front‑line teams through disciplined coaching and innovative
    loss‑prevention tactics while championing customer‑experience projects that reflect their curiosity for unconventional store concepts.
  sports: Jasmine Alliman keeps fit by attending weekly Zumba classes at CorePower Yoga, sprinting along the Lakefront Trail on Saturday mornings, competing in the South Loop Softball League, and passionately
    follows the Chicago Bulls, White Sox, Bears, and Fire, using team victories as social fuel for their own workouts.
  arts: Jasmine Alliman immerses themselves in Chicago’s vibrant arts scene by regularly touring the Art Institute to study works by Georgia O’Keeffe and Keith Haring, capturing candid street murals for
    their personal blog, and attending live jazz sets by Wynton Marsalis, hip‑hop performances by Kendrick Lamar, and gospel choirs such as the Blind Boys of Alabama, which together shape their visual storytelling.
  travel: Jasmine Alliman prefers curated city escapes that blend art, food, and culture, having explored the mural‑rich neighborhoods of New Orleans, the historic cafes of Montreal, and the bustling markets
    of Mexico City, while dreaming of a study‑focused pilgrimage to Kyoto’s temples and an immersive art‑festival adventure in Barcelona, all balanced against the financial discipline required for their
    MBA plans.
  culinary: Jasmine Alliman enjoys cooking at an intermediate level, frequently preparing Southern‑inspired comfort dishes such as shrimp and grits, sweet‑potato collard wraps, and spiced black‑eyed pea
    salads, favoring ingredients like smoked paprika, fresh cilantro, and aged cheddar, while also indulging in Chicago‑style deep‑dish pizza on busy evenings.
  core: Jasmine Alliman is a disciplined retail leader whose curiosity fuels a vibrant art‑filled lifestyle, yet their perfectionism often spirals into late‑night worry, prompting compulsive spreadsheet
    updates even during social gatherings.
background:
  cultural: Jasmine was raised in Chicago’s South Side, where a close‑knit African‑American community shaped her identity and values. Family gatherings centered around soulful cooking, gospel music, and
    storytelling, instilling a deep respect for tradition and communal support. Annual celebrations of Juneteenth and local cultural festivals reinforced her connection to Black history and contemporary
    artistic expression. Growing up near vibrant murals and community art projects sparked her appreciation for visual storytelling, which later influenced her career in retail merchandising. She remains
    actively involved in neighborhood initiatives, supporting youth mentorship programs and contributing to citywide conversations about inclusion in the workplace. Her cultural heritage fuels both her
    creative outlook and her commitment to paving the way for future generations of Black professionals.
attributes:
