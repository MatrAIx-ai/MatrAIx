    Management & Process Improvement'', ''Stress Management & Resilience Coaching'']'
  hobbies: '[''Visiting art museums'', ''Street photography'', ''Curating a personal art blog'', ''Attending live music performances'', ''Dancing (salsa, house)'', ''Volunteering in youth art programs'',
    ''Exploring Chicago neighborhoods'', ''Cooking soul food with creative twists'', ''Group fitness classes (Zumba, yoga)'', ''Participating in trivia nights and board games'', ''Reading contemporary fiction
    and psychology non-fiction'']'
  career_goals: Jasmine aims to progress from first‑line supervisor to regional retail manager within the next three to five years, overseeing multiple stores across the Midwest. She plans to pursue an
    MBA part‑time to broaden her strategic perspective and eventually step into a director‑level role focused on customer experience innovation. Long‑term, she envisions launching her own boutique that
    melds contemporary fashion with curated art displays, creating a space that celebrates Black creativity. Alongside her professional ascent, she is committed to mentoring women of color in retail, establishing
    a quarterly leadership circle to share best practices and support career growth.
