  career_goals: Eugene aspires to turn his artistic passion into a sustainable career. He plans to build a strong portfolio of concept art and illustration, enroll in a community college art program or
    a vocational certificate in graphic design, and secure a part‑time job at a local coffee shop or bookstore to support himself financially. In the long term, he hopes to work as a freelance illustrator
    or join a game‑studio’s art department, while also maintaining enough stability to manage his anxiety about finances and stress.
