persona_description: A community leader who is passionate about building safety and resilience, and is committed to improving the infrastructure of their community. They are aware of the importance of building
  codes and the role they play in supporting a resilient building stock. They are dedicated to promoting and implementing the ANCR's Buildings Benchmark, which is a comprehensive approach to building safety
  and resilience. They understand the nine criteria in the ANCR's Buildings Benchmark and can grade communities on their level of enforcement and compliance with these requirements. They are interested
  in the study of building codes and how they can be used to improve the safety and resilience of a community.
