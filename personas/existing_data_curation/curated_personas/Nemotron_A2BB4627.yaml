personas:
  professional: Mary Cruz, an inquisitive two-year-old who spends hours arranging blocks and picture books, exhibits an early affinity for structured learning environments that hints at a future as an early-childhood
    educator; they thrive on predictable routines while still delighting in spontaneous moments of play.
  sports: Mary Cruz loves the neighborhood park's tiny slide and chases the inflatable soccer ball at the local playground, cheering on the nearby minor-league baseball team during family outings and preferring
    spontaneous play over organized team practice.
  arts: Mary Cruz delights in the vibrant tunes of Sesame Street and the animated adventures of Peppa Pig, often dancing to "Rubber Duckie" while they hum along, showcasing a budding love for simple musical
    and visual storytelling.
  travel: Mary Cruz enjoys short family trips to the city zoo and a nearby beach, where they relish the predictable routine of a stroller ride followed by building sandcastles, preferring familiar surroundings
    to far-off destinations.
  culinary: Mary Cruz favors creamy mac and cheese, chicken nuggets, and sweet bananas, proudly feeding themselves with a small plastic fork while they occasionally reject broccoli, reflecting a developing
    palate that leans toward mild, comforting flavors.
  core: Mary Cruz is a structured-yet-easygoing two-year-old who loves routine, tiny coins, bright songs, and messy play, yet they can be surprisingly disorganized with their toys and food.
background:
  cultural: Mary is raised in a bilingual Dominican household in Raleigh, NC. Her parents speak Spanish at home and expose her to Dominican traditions such as merengue music, bachata dance, and family meals
    featuring mangú, plantains, and arroz con pollo. She celebrates Dominican holidays like Dia de la Independencia with live music and colorful decorations, and also participates in local community events
    and Sunday church services. This rich cultural blend shapes her love of rhythm, food, storytelling, and close family ties while she also learns about the broader American culture around her.
attributes:
  skills: '[''bilingual basic vocabulary'', ''simple sentence formation'', ''hand‑eye coordination'', ''fine motor skill with crayons'', ''basic problem solving'', ''cooperative play'', ''following routines'',
