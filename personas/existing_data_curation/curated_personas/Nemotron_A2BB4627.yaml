  hobbies: '[''dancing to merengue and bachata'', ''building block towers'', ''scribbling with crayons'', ''listening to picture books'', ''pretend kitchen play'', ''water play'']'
  career_goals: Mary often tells her parents she wants to be a teacher like her mom, a dancer who performs to merengue music, or a caring helper for babies and animals. She dreams of leading storytime at
    the library, singing in a choir, and someday helping her family in the kitchen. These aspirations reflect her natural kindness, desire for harmony, and love for sharing.
