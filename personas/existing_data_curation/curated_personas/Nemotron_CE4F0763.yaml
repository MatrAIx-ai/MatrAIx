personas:
  professional: Jose Pineda, a special education teacher at a Lea County elementary school, designs data‑driven IEPs, leverages bilingual communication and classroom technology, and channels their competitive
    streak into meticulously tracking student progress, even as their relaxed approach to paperwork sometimes leads to last‑minute planning.
  sports: Jose Pineda, an avid member of the Hobbs Greenfield FC soccer league and a regular hiker on the Caprock trails, supports New Mexico United in the USL Championship, enjoys fishing at Lake McClellan,
    and follows the Los Angeles Dodgers for baseball, blending their love of team competition with solo outdoor workouts.
  arts: Jose Pineda, who spends their free evenings salsa‑dancing at community celebrations and attending the Hummingbird Music Festival, draws inspiration from the rhythms of Carlos Vives, the storytelling
    of Dolly Parton, and the choreography of Tito Puente, while also unwinding with multiplayer sessions of Call of Duty with friends.
  travel: Jose Pineda, a spontaneous traveler who favors weekend road trips to Santa Fe’s art markets, long‑distance hikes in Sedona, and cultural immersion in Guadalajara’s street festivals, balances their
    love of adventure with budget constraints by using travel‑deal apps and often postpones overseas trips to Costa Rica until their certification tuition is paid.
  culinary: Jose Pineda, a confident home cook, prepares weekly meals of ropa vieja, picadillo, and crispy fried plantains seasoned with cumin, garlic, and fresh cilantro, while experimenting with lime‑marinated
    grilled chicken and pairing dishes with a splash of dark rum reduction, yet they sometimes over‑spice in their competitive quest to impress friends.
  core: Jose Pineda, a bilingual special‑education advocate with a competitive edge, balances structured data‑driven teaching, lively community hobbies, and a flexible, sometimes disorganized lifestyle
    that fuels both their professional ambition and their love for group‑centred fun.
background:
  cultural: Jose is the son of Cuban immigrants who settled in the Southwest after leaving Havana in the early 1990s. Growing up, he was immersed in Cuban traditions—family gatherings, lively music, and
    a strong emphasis on community solidarity. He speaks fluent Spanish at home and celebrates cultural holidays such as Cuban Independence Day and San Juan, while also observing Catholic rituals that shape
    his values. This heritage informs his teaching style, encouraging inclusion of multicultural perspectives and bilingual resources. His Cuban roots blend with the ranching and Hispanic culture of Hobbs,
    NM, giving him a unique bicultural lens that he brings to both his classroom and community involvement.
attributes:
  skills: '["Individualized Education Program (IEP) development", "Differentiated instruction", "Behavior management", "Bilingual communication (Spanish/English)", "Classroom technology integration", "Data‑driven
    assessment", "Parent and community liaison", "Collaborative team teaching"]'
  hobbies: '["Salsa dancing", "Soccer (community league)", "Cooking Cuban cuisine", "Hiking in New Mexico", "Fishing", "Video gaming", "Volunteer work with immigrant support groups", "Attending local music
    festivals"]'
  career_goals: Jose aims to earn a bachelor's degree in Special Education within the next two years and obtain state certification to qualify for leadership roles. He aspires to become a Special Education
    Coordinator for Lea County schools, where he can design district‑wide inclusion initiatives and lead professional development for teachers. He also hopes to create a bilingual resource center that provides
    culturally relevant materials for Cuban‑American and other Latino families. Long‑term, Jose envisions moving into district administration to influence policy and advocate for greater support for students
    with disabilities, while maintaining a hands‑on role in mentorship and community outreach.
