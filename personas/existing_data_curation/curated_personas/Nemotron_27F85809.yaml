personas:
  professional: Ruby Simpson, a trauma‑informed case manager in rural Louisiana, blends a strong arts‑and‑humanities background with hands‑on social‑work practice, leveraging creative arts‑based interventions
    for low‑income families while navigating a spontaneous, flexible approach that sometimes threatens deadline adherence as they work toward LCSW licensure and a supervisory role in a community mental‑health
    hub.
  sports: Ruby Simpson, an avid paddler on the Atchafalaya Basin who belongs to the Baton Rouge Kayak Club, supports the LSU Tigers football team and the New Orleans Saints, and squeezes in community volleyball
    games at the local recreation center, using yoga sessions to stay flexible and balancing their competitive drive with the seasonal rhythm of river paddling.
  arts: Ruby Simpson, a dedicated fan of Southern blues and jazz who regularly attends impromptu jam sessions at venues like the Red River Bar, curates community art installations inspired by local histories,
    and reads contemporary Southern literature by authors who weave the region's cultural narratives, allowing them to weave musical and literary influences into their therapeutic work and personal downtime.
  travel: Ruby Simpson, a spontaneous road‑tripper who plans short getaways rather than rigid itineraries, frequently escapes to the Gulf Coast beaches of Gulf Shores, the historic streets of New Orleans,
    and the pine‑laden hills of the Natchez Trace, while dreaming of a week‑long immersion in the music‑rich streets of Austin and a future adventure to the misty fjords of New Zealand, all balanced against
    their modest budget and family responsibilities.
  culinary: Ruby Simpson, a health‑conscious home chef who experiments with Creole staples—spicing up gumbo with turkey andouille, swapping white rice for quinoa in jambalaya, and adding kale and okra to
    étouffée—enjoys sourcing fresh shrimp at the local fish market and often blends traditional spices like filé and cayenne with modern superfoods, yet occasionally overindulges in rich beignets as a comfort
    after a stressful day.
  core: Ruby Simpson blends spontaneous, nature‑driven creativity with pragmatic trauma‑focused social work, all while wrestling with chronic worry, a competitive edge, and a tendency toward occasional
    disorganization.
background:
  cultural: Ruby was raised in the close‑knit African‑American community of Port Allen, where Southern gospel music, church fellowship, and strong family ties shaped her early worldview. Growing up near
    the Mississippi River, she internalized the rhythms of the Delta South—its stories, food, and resilience in the face of historic inequities. Her heritage includes a blend of African‑American traditions
    and the multicultural influences of Louisiana’s Creole and Cajun neighbors, informing both her empathy for marginalized populations and her commitment to preserving cultural narratives through social
    work.
attributes:
  skills: '[''Case Management'', ''Crisis Intervention'', ''Trauma‑Informed Care'', ''Community Resource Navigation'', ''Advocacy'', ''Interdisciplinary Collaboration'', ''Cultural Competency'', ''Policy
    Analysis'', ''Grant Writing'', ''Client Assessment'', ''Electronic Health Record (EHR) Management'', ''Public Speaking'', ''Program Development'', ''Creative Arts Therapy Integration'']'
  hobbies: '[''Canoeing in the Atchafalaya Basin'', ''Photography'', ''Attending Blues and Jazz Sessions'', ''Community Art Installation Curation'', ''Reading African‑American Literature'', ''Journaling'',
    ''Yoga and Mindfulness Practice'', ''Native Plant Gardening'', ''Cooking Creative Creole Dishes'']'
  career_goals: Ruby aims to obtain her Licensed Clinical Social Worker (LCSW) credential within the next year and transition into a supervisory role overseeing a regional community health program. She
    envisions developing a culturally resonant mental‑health hub in West Baton Rouge Parish that combines traditional counseling with community arts initiatives. Long‑term, Ruby aspires to influence state
    health policy to reduce racial disparities in access to care and to secure sustainable funding for grassroots mental‑health services targeting Black rural populations.
