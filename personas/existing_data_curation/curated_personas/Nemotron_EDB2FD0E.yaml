  hobbies: '[''Model Shipbuilding'', ''Abstract Painting'', ''Creative Writing (Poetry & Short Stories)'', ''Chess'', ''Sailing'', ''Fishing'', ''Native‑Plant Gardening'', ''Art Museum Volunteering'', ''Reading
    Speculative Fiction'']'
  career_goals: Although he is no longer employed full‑time, Randy has set several personal career‑type goals. He plans to complete a series of abstract watercolor paintings for a local gallery exhibition,
    compile his poems and short stories into a self‑published chapbook, and launch a monthly ‘Art & Navigation’ workshop at the community center where he can teach children and retirees basic woodworking
    and small‑boat handling. He also hopes to earn a certification in horticultural design to improve his garden and contribute to a neighborhood beautification project. Ultimately, Randy aims to leave
    a lasting creative legacy in Virginia Beach while continuing to expand his knowledge of maritime history and contemporary art.
