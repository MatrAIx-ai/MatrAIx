personas:
  professional: Nicolas Castillo is an experienced postsecondary educator who, through bilingual expertise and a balance of curiosity and practicality, designs inclusive interdisciplinary curricula, and
    they quietly guide first‑generation students toward scholarly success.
  sports: Nicolas Castillo enjoys weekend hikes on the Appalachian Trail, often joining the local Appalachian Adventurers club, and they cheer for the Asheville City SC while occasionally playing casual
    soccer with the book club members.
  arts: Nicolas Castillo reads Latin American literature—from Octavio Paz to Valeria Luiselli—plays acoustic guitar to folk and contemporary Mexican ballads, and they regularly attend museum exhibits featuring
    Diego Rivera’s murals, while their book club discusses works by Elena Poniatowska.
  travel: Nicolas Castillo prefers low‑stress, purpose‑driven travel, having trekked through historic towns in the Appalachians, explored Oaxaca during Día de los Muertos, and they dream of visiting the
    ancient ruins of Teotihuacan on a modest budget.
  culinary: Nicolas Castillo finds joy in cooking mole poblano, tamales de olla, and pan de muerto, favoring dried chilies, epazote, and masa harina, and they consider their kitchen a sanctuary where culinary
    tradition meets mindful celebration.
  core: Nicolas Castillo, a 36‑year‑old humanities scholar, balances meticulous academic ambition with solitary creative pursuits and a persistent undercurrent of worry that fuels both their dedication
    and their occasional overthinking.
background:
  cultural: Nicolas is a first-generation Mexican-American who grew up navigating both Mexican family traditions and American academic expectations. His upbringing emphasized the importance of community,
    shared meals, and cultural celebrations such as Día de los Muertos and Mexican Independence Day, instilling in him a deep appreciation for heritage and storytelling. Living in Center Valley, PA, he
    engages with a local Mexican diaspora network that helps preserve linguistic ties and cultural practices. This bicultural perspective informs his teaching philosophy, driving him to incorporate culturally
    relevant pedagogy, promote linguistic diversity, and foster a classroom environment where multicultural voices are valued.
attributes:
  skills: '[''Instructional Design'', ''Curriculum Development'', ''Bilingual Communication (Spanish/English)'', ''Academic Research'', ''Student Advising'', ''Conflict Mediation'', ''Critical Writing'',
    ''Digital Pedagogy'', ''Grant Writing'']'
  hobbies: '[''Reading Mexican literature'', ''Acoustic guitar playing'', ''Photography of historic architecture'', ''Hiking in Appalachian trails'', ''Cooking traditional Mexican dishes'', ''Yoga and mindfulness
    meditation'', ''Journaling for stress relief'', ''Small book club on Latin American authors'', ''Tutoring community college students'']'
  career_goals: Nicolas aims to achieve tenure and eventually serve as department chair, using his leadership to broaden interdisciplinary offerings that bridge Mexican cultural studies with broader humanities
    curricula. He aspires to publish a monograph on contemporary Mexican narrative forms and secure external funding for a community-focused research center that supports first-generation college students.
    Balancing his curiosity with practicality, he also plans to develop online courses that make specialized humanities content accessible to a wider audience while maintaining a supportive, low-stress
    environment for himself and his students.
