personas:
  professional: Sharon Woodard, a retired business administrator turned senior volunteer coordinator, channels her meticulous bookkeeping, event‑planning expertise, and disciplined work ethic into leading
    her church’s volunteer committee, where her preference for structured small‑group collaboration ensures every fundraiser runs on schedule and within budget.
  sports: Sharon Woodard, a devoted member of the Stafford Senior Walking Club, pursues a daily goal of 10,000 steps, enjoys low‑impact tai chi classes at the community center, and quietly supports the
    Dallas Cowboys in football season while rooting for the Houston Astros in baseball.
  arts: Sharon Woodard, an avid reader of Jane Austen and a faithful participant in her church choir, finds inspiration in the violin of Itzhak Perlman and the classic films of Audrey Hepburn, often weaving
    these artistic influences into the intricate patterns of her knitting.
  travel: Sharon Woodard prefers well‑planned, leisurely trips, delights in annual weekend getaways to the Texas Hill Country vineyards, cherishes memories of a guided tour of Colonial Williamsburg, and
    hopes to explore the historic gardens of England’s Cotswolds before turning eighty‑five.
  culinary: Sharon Woodard, a skilled baker, delights in crafting sourdough loaves with rye starter, whipping up pecan pies with a flaky crust, and seasoning hearty vegetable soups with garden‑grown rosemary
    and thyme, while occasionally enjoying a modest serving of brisket at the local church potluck.
  core: Sharon Woodard, a disciplined 79‑year‑old who balances meticulous garden planning with a love of vintage crosswords, lives by a daily checklist that blends community service, step‑count goals, and
    a strict bedtime, yet secretly indulges in late‑night episodes of classic TV dramas.
background:
  cultural: Sharon’s cultural background is rooted in a Midwestern‑Texan upbringing that blends practical independence with Southern hospitality. Born and raised in Texas, she grew up in a close‑knit, middle‑class
    family that valued hard work, community service, and faith. Her family attended a Protestant church, where rituals of weekly worship, holiday celebrations, and volunteer service shaped her sense of
    belonging. Over the years, she absorbed the local customs of Stafford—such as community potlucks, local fairs, and a respect for neighborhood cohesion—while also embracing the broader Texan ethos of
    self‑reliance. Her white ethnic heritage aligns with the region’s cultural narratives, but she remains open and respectful of the growing diversity in Fort Bend County, often participating in multicultural
    events at the senior center.
