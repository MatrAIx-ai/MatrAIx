personas:
  professional: Aleida Figueroaberrios is a hands‑on building maintenance specialist whose mastery of mechanical, electrical, plumbing, and HVAC systems is matched by a talent for meticulous scheduling
    and bilingual communication, and they leverage this structured expertise to drive sustainable upgrades and position themselves for a future supervisory role.
  sports: Aleida Figueroaberrios is a devoted recreational soccer player in a multicultural Saturday league and a regular attendee of the New York Yankees games, the New Jersey Devils hockey matches, and
    local Cumbia dance nights that double as cardio, they blend team spirit with personal fitness by jogging the nearby Passaic River trail after shifts.
  arts: Aleida Figueroaberrios enjoys vibrant cultural expression through weekly Cumbia and salsa dance nights, where they spin to the rhythms of Carlos Vives, Shakira, and Celia Cruz, and they unwind by
    listening to folk guitar albums by Juanes, attending community art fairs featuring local muralists, and binge‑watching classic telenovelas for a dose of drama.
  travel: Aleida Figueroaberrios favors a blend of structured itineraries and spontaneous detours, often planning weekend getaways to the historic streets of Cartagena, the coffee farms of the Andes, and
    the bustling markets of New York City, while dreaming of a future road trip along the Pacific Coast to soak in coastal sunsets and surf lessons.
  culinary: Aleida Figueroaberrios loves cooking hearty bandeja paisa and fragrant ajiaco for family gatherings, seasoning dishes with cilantro, cumin, and ají dulce, and they take pride in growing fresh
    herbs and cherry tomatoes on their balcony, though they sometimes over‑salt the rice in a rush before work.
  core: Aleida Figueroaberrios balances meticulous organization with lively community involvement, turning every maintenance log, soccer match, and family feast into a testament to disciplined ambition
    and vibrant cultural joy, even if they occasionally forget to water their balcony garden.
background:
  cultural: Aleida was born to Colombian immigrants and grew up in a bilingual household where Spanish was spoken daily and Colombian customs were celebrated. Her family places a high value on close‑knit
    relationships, shared meals, and music, especially Vallenato, Cumbia, and salsa, which she carries into her social life in Wayne, New Jersey. She retains a strong connection to Colombian culinary traditions,
    coffee rituals, and the festive spirit of holidays like Día de la Independencia. At the same time, she has embraced the multicultural fabric of Passaic County, integrating into local community events,
    while maintaining her Colombian Catholic heritage, which influences her emphasis on family solidarity and community service.
attributes:
  skills: '[''Mechanical troubleshooting'', ''Electrical wiring and circuit repair'', ''Plumbing installations and leak detection'', ''HVAC system servicing'', ''Carpentry for structural repairs'', ''Preventive
    maintenance scheduling'', ''Technical schematics interpretation'', ''Safety compliance (OSHA)'', ''Inventory management'', ''Bilingual communication (Spanish/English)'', ''Team training and coordination'']'
  hobbies: '[''Cumbia and salsa dancing'', ''Recreational soccer'', ''Balcony gardening'', ''Community center volunteer teaching home‑repair'', ''Cooking Colombian dishes'', ''Reading self‑improvement books'',
    ''Organizing group outings'']'
  career_goals: Aleida aims to transition from a hands‑on maintenance role to a supervisory position within the next three years, targeting a Maintenance Manager or Facilities Operations Lead role at a
    large residential complex or corporate campus. She plans to obtain certifications such as the Certified Maintenance & Reliability Professional (CMRP) and an EPA‑approved HVAC technician credential.
    She is also interested in specializing in sustainable building practices, integrating energy‑efficiency upgrades, and leading a green‑maintenance initiative. Longer‑term, she envisions starting her
    own small maintenance consultancy focused on serving small property owners in Passaic County, capitalizing on her reputation for reliability and her strong network in the community.
