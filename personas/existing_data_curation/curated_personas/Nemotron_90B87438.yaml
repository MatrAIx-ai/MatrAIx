personas:
  professional: Edward Ingram, a 30‑year‑old aspiring journeyman carpenter and freelance landscape photographer, combines his meticulous woodworking, digital imaging, and self‑taught troubleshooting abilities
    with a skeptical, competitive edge to launch a bespoke furniture studio while offering event photography services, balancing organized planning with the flexibility needed for creative projects.
  sports: Edward Ingram, a regular member of the Antigo Outdoors Club, spends weekends hiking the North Woods, roots for the Green Bay Packers and Milwaukee Brewers, and joins the local Antigo Friday Night
    Basketball League for a quick competitive workout after work.
  arts: Edward Ingram frequents the Loom Gallery in Antigo and the Milwaukee Art Museum, attends independent screenings of films such as 'Moonlight,' curates a vintage‑vinyl collection featuring David Bowie,
    The Velvet Underground, and Miles Davis, and draws creative fuel from Ansel Adams’ photographs and Octavia Butler’s speculative novels.
  travel: Edward Ingram plans trips with meticulous spreadsheets, has trekked the Apostle Islands and road‑tripped to Portland’s indie music scene, and now aims to photograph Iceland’s volcanic terrain
    and Japan’s cherry blossoms, balancing a modest budget with the desire to capture fleeting natural moments.
  culinary: Edward Ingram enjoys crafting rustic wood‑fire pizza topped with locally sourced mozzarella and wild mushrooms, perfecting a hearty chicken pot pie for board‑game evenings, and fuels hikes with
    homemade trail mix of almonds, dried cranberries, and dark chocolate, though they often over‑salt their soups in pursuit of bold flavor.
  core: Edward Ingram is a methodical yet adventurous craft‑lover who balances solitary hikes and vintage‑vinyl reveries with a competitive drive, and they channel that energy into building a thriving local
    studio for woodworking and photography.
background:
  cultural: Edward grew up in Antigo, Wisconsin, in a family whose roots trace back to German and Norwegian immigrants who settled the Upper Midwest in the late 19th century. Raised in a modest, middle‑class
    household with Lutheran influences, he experienced the region’s strong emphasis on self‑reliance, community fairs, and appreciation for the natural environment. The Midwestern values of practicality,
    modest ambition, and a quiet work ethic, combined with exposure to local crafts and seasonal outdoor activities, shape his worldview and cultural identity.
