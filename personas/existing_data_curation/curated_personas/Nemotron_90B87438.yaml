  hobbies: '[''Hiking'', ''Digital Photography'', ''Science‑Fiction Reading'', ''Visiting Small Art Galleries'', ''Independent Film Viewing'', ''Electronics Tinkering'', ''Collecting Vintage Vinyl'', ''Intimate
    Book‑Club Discussions'', ''Competitive Board Games'']'
  career_goals: Edward aims to formalize his carpentry skills by earning a journeyman certification and launching a small custom‑furniture business that blends functional design with artistic flair. He
    also plans to develop a freelance photography side gig focused on documenting regional events and natural landscapes. Long‑term, he hopes to combine his analytical mindset and creative interests by
    curating a modest community art space or gallery that showcases local talent while offering educational workshops.
