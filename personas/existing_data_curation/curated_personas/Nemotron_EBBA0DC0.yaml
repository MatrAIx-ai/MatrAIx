  career_goals: Angel aims to advance to a regional director position within the hospitality sector, overseeing multiple venues across Central Florida. She plans to earn a Bachelor’s degree in Business
    Administration and acquire PMP and Six Sigma Green Belt certifications to strengthen her strategic and analytical capabilities. Passionate about staff well‑being, she wants to design and implement a
    comprehensive employee wellness program that integrates mental‑health resources, regular mindfulness workshops, and peer‑support circles. Long‑term, she envisions launching a community‑focused boutique
    restaurant that celebrates Dominican culinary traditions while providing mentorship and job training for young immigrants from her neighborhood.
