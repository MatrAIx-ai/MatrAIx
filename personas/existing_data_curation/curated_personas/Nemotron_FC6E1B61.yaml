    training & mentorship", "Creative marketing material design", "Problem solving under pressure", "Organizational planning", "Community liaison"]'
  hobbies: '["Watercolor and acrylic painting", "Sketching vintage trucks", "Reading speculative and science fiction", "Short story writing", "Gardening", "Folk music jam sessions", "Church choir singing",
    "Volunteer driver safety education", "Collecting antique road maps", "Cooking Ohio comfort food", "DIY quilting and crafts", "Hiking local trails"]'
  career_goals: Heather aims to transition from front‑line driving to a regional logistics management role where she can oversee a fleet of drivers and shape routing strategies. She plans to earn a Certified
    Transportation Professional (CTP) credential and complete an associate degree in Business Administration at a nearby community college. Leveraging her artistic flair, she hopes to launch a side business
    offering hand‑painted truck decals and locally branded merchandise that reflect Ohio’s landscape and heritage. Heather also wants to mentor younger drivers through a formal safety‑education program
    at her local community center, and she is committed to integrating stress‑reduction techniques—such as mindfulness and regular exercise—into her daily routine to lessen worry and improve overall well‑being.
