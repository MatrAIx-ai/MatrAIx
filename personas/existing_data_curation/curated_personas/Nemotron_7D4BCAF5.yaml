  career_goals: George dreams of becoming a marine biologist who studies the Gulf Coast's marine life, combining his love of the beach and his fascination with practical tasks like cataloguing shell collections.
    He also aspires to be a professional baseball player, aiming to be the best on his team and compete at higher levels. In the longer term, he imagines working as a skilled fisherman or boat mechanic,
    harnessing his hands‑on problem‑solving nature. His ambitions reflect a desire for tangible, structured careers where he can apply his competitive drive and practicality.
