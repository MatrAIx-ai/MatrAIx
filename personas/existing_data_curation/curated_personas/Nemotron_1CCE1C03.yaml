personas:
  professional: Cesar Gonzalez, a 7‑year‑old budding engineer‑in‑training, channels curiosity and practicality into building LEGO sets and model cars, approaching each project with organized planning yet
    flexible creativity, and often volunteers to help classmates with construction challenges.
  sports: Cesar Gonzalez plays forward for the local youth soccer club, the Riverside Tigers, cheers on the LA Galaxy during weekends, and joins neighborhood clean‑up jogs as a fun cardio activity, balancing
    competitive matches in the fall with informal backyard soccer games in summer.
  arts: Cesar Gonzalez draws whimsical cartoons inspired by Matt Groening, enjoys adventure series like J.K. Rowling's Harry Potter in both English and Spanish, and crafts vibrant papel picado for Día de
    los Muertos, blending artistic flair with cultural tradition.
  travel: Cesar Gonzalez prefers day‑trip adventures to nearby state parks such as Joshua Tree, where they collect rocks and leaves, and dreams of a family road trip to the Grand Canyon, balancing curiosity‑driven
    exploration with the comfort of familiar neighborhood routes.
  culinary: Cesar Gonzalez enjoys assembling mini cheese‑and‑pepperoni pizzas, snacking on fresh mango slices, and helping slice colorful papel picado alongside family while preparing simple dishes like
    spaghetti with meatballs, showing a budding enthusiasm for cooking despite occasional over‑salting of sauces.
  core: Cesar Gonzalez is a curious, compassionate 7‑year‑old who balances organized LEGO building with spontaneous soccer games, saves allowance earnestly yet splurges on candy, and brightens every day
    with colorful papel picado and adventurous storybooks.
background:
  cultural: Cesar is a first‑generation Mexican‑American raised in West Covina, California. At home, Spanish is spoken alongside English, and his family celebrates Mexican traditions such as Día de los
    Muertos, Mexican Independence Day, and enjoys foods like tamales and tacos. The close‑knit family environment emphasizes respect, hospitality, and community support. Living in a diverse Los Angeles
    County suburb, Cesar blends these cultural values with the multicultural experiences of his school and neighborhood, fostering a strong sense of pride in his heritage while embracing the broader American
    culture.
