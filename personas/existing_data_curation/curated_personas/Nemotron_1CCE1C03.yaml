  career_goals: Cesar dreams of becoming someone who helps others learn and stay healthy. He imagines himself as a teacher who can share his love for reading and science, or a community health worker who
    supports families in his neighborhood. He also loves exploring how things work, so he hopes to study engineering or science one day to create useful inventions for his community.
