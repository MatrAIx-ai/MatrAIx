  hobbies: '["Fishing", "Boating/Kayaking", "Hiking", "Camping & Barbecuing", "Model Building", "DIY Home Improvement", "Watching Football (Seahawks & Local Teams)", "Podcasts on Manufacturing & Lean",
    "Community Volunteering", "Gardening", "Playing Guitar"]'
  career_goals: Gregory aims to move up to a shift‑supervisor role within the next two to three years, overseeing a small team and taking on more responsibility for line performance. He plans to earn an
    OSHA 30‑hour certification and a Certified Production Technician (CPT) credential, and is considering an associate degree in industrial technology from a local community college to broaden his engineering
    knowledge. In the longer term he envisions either becoming a plant manager or launching a modest side business offering equipment repair and process‑consulting services for small manufacturers in the
    Tri‑Cities area. These goals reflect his desire for greater stability for his family and his curiosity about new manufacturing technologies.
