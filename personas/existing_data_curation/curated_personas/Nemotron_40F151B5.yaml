personas:
  professional: Ellen Muwwakkil, an aspiring visual narrative artist, merges hand‑sketched character designs with digital illustration tools, channeling her curious and organized mindset to experiment with
    science‑fiction themes while competitively seeking early recognition in online art contests.
  sports: Ellen Muwwakkil joins the weekend pick‑up basketball games at Riverside Park, cheering for the NBA’s Golden State Warriors, while also hiking with her local youth nature club, documenting wildlife
    for her photography blog and staying active in school’s intramural league.
  arts: Ellen Muwwakkil immerses herself in a blend of visual and musical arts, drawing inspiration from graphic novels like "Saga," indie films such as "Moonrise Kingdom," and emerging musicians like Arlo
    Parks, while regularly contributing illustrations and ukulele songs at community art workshops.
  travel: Ellen Muwwakkil prefers low‑budget nature trips, having photographed wildlife in Acadia National Park and dreaming of trekking the bamboo groves of Kyoto, planning future adventures via Instagram
    travel guides while respecting her parents' travel budget.
  culinary: Ellen Muwwakkil enjoys crafting quick avocado toast topped with feta and chili flakes, occasionally attempting beginner sushi rolls with cucumber and tuna, and her go‑to comfort food remains
    a cheesy macaroni casserole sprinkled with crispy bacon bits.
  core: Ellen Muwwakkil is a fiercely curious teen artist who balances a competitive drive and skeptical outlook with a love for sketching, ukulele songwriting, and weekend basketball, often channeling
    her competitive streak into art contests while occasionally sacrificing sleep for creative marathons.
background:
  cultural: 'Ellen comes from a close‑knit African‑American family in Thompson''s Station, where Southern hospitality meets rich Black cultural traditions. Her household celebrates Juneteenth, Black History
    Month, and church gatherings that blend gospel music with contemporary R&B. The family’s Southern roots are reflected in home‑cooked meals like fried chicken, collard greens, and sweet potato pie, while
    also honoring ancestral stories through oral history sessions. Growing up in a predominantly white suburb, Ellen navigates a dual identity: she values the community cohesion of her neighborhood and
    the proud heritage and resilience of the Black diaspora. These experiences shape her worldview, encouraging her to seek representation in art and technology while staying grounded in family values and
    cultural pride.'
attributes:
