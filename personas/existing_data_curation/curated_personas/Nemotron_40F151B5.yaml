  hobbies: '[''sketching and watercolor painting'', ''digital illustration with Procreate'', ''ukulele playing'', ''basketball'', ''nature photography'', ''community art workshops'', ''reading graphic novels'',
    ''watching indie films'']'
  career_goals: Ellen aims to blend her love for art and technology by becoming a multimedia creator or UX designer who crafts engaging visual experiences. She dreams of attending a specialized art‑tech
    academy where she can deepen her coding and design skills, and ultimately work on projects that celebrate underrepresented voices. In the longer term, she hopes to mentor other Black girls in STEM and
    the arts, using her own journey to break barriers and inspire confidence in competitive fields.
