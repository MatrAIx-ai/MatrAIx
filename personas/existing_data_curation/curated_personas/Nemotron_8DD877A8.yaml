  hobbies: '[''Competitive video gaming (RTS and esports)'', ''Basketball (school and community leagues)'', ''Electronics tinkering'', ''Basic coding projects'', ''Music listening (hip‑hop, R&B)'', ''Beat
    making with free software'', ''Reading graphic novels'', ''Skateboarding'']'
  career_goals: His short‑term goal is to obtain his GED within the next two years, followed by enrolling in a vocational apprenticeship in automotive technology or computer networking. Long‑term, he aspires
    to become a certified technician—either repairing vehicles or managing network infrastructure—and eventually run his own repair shop or IT consultancy, allowing him to merge his practical skills with
    his curiosity about emerging technologies.
