personas:
  professional: Stefanie Depaul, a senior full‑stack engineer with a talent for turning complex cloud infrastructure into reliable, data‑driven products, leverages their methodical planning, Scrum Master
    certification, and assertive yet collaborative leadership style to guide cross‑functional teams through agile sprints while mentoring junior developers.
  sports: Stefanie Depaul hits Colorado’s Rocky Mountain trails every weekend, logging runs with Strava and competing in the Boulder Trail‑Running Club’s 10K series, balances structured cross‑training at
    a yoga studio, and passionately supports the Colorado Avalanche, Denver Broncos, and Colorado Rockies while joining the local indoor climbing gym during winter.
  arts: Stefanie Depaul curates a personal soundtrack of The Lumineers and other Colorado folk‑rock acts, frequents the Denver Art Museum’s exhibitions, recreates Ansel Adams‑style landscape photography
    on hikes, and hosts board‑game nights featuring Settlers of Catan and Ticket to Ride, reflecting a love for strategic creativity.
  travel: Stefanie Depaul plans meticulous weekend getaways to Colorado’s high country, mapping routes to Rocky Mountain National Park and Glacier National Park with topographic apps, and keeps a bucket
    list that includes a spring trek through Patagonia’s Torres del Paine and a summer drive along the Pacific Coast Highway, balancing travel budget constraints with a desire to share cultural experiences
    with high‑school mentees.
  culinary: Stefanie Depaul crafts balanced meal‑preps featuring Colorado trout with lemon‑rosemary, quinoa‑kale salads with roasted beets, and seasonal roasted squash soup, sourcing fresh ingredients from
    the Denver farmers’ market and pairing dishes with local craft brews from the annual Denver Beer Fest, though they sometimes over‑season meals while experimenting with new spice blends.
  core: Stefanie Depaul merges a rigorously structured engineering mindset with meticulously planned mountain hikes, yet habitually fills downtime with coffee instead of genuine rest.
background:
  cultural: Stefanie grew up in a middle‑class, white American family in the Midwest, with German‑Irish ancestry. Her parents emphasized education, punctuality, and community service, values that shaped
    her methodical approach to life. After moving to Denver for a tech career, she embraced the city’s outdoor‑centric lifestyle and progressive, environmentally conscious culture. She participates in local
    traditions such as seasonal farmers’ markets, community clean‑ups, and the annual Denver Beer Fest, while maintaining family customs like holiday gatherings and church attendance. Her cultural identity
    blends a classic American work ethic with the collaborative, health‑focused ethos of Colorado’s tech community.
