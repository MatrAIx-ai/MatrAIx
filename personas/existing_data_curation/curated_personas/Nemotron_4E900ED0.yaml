  hobbies: '[''Hiking'', ''Trail running'', ''Yoga'', ''Cooking'', ''Meal prepping'', ''Reading (technology & science fiction)'', ''Puzzle solving'', ''Photography'', ''Volunteering (STEM outreach for youth)'',
