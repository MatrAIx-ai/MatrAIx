  career_goals: Stefanie's immediate goal is to transition into a senior engineering role that includes technical leadership responsibilities. Over the next five years she aims to become an engineering
    manager overseeing a product line that serves the renewable‑energy sector, leveraging her cloud and data experience. She plans to earn an AWS Solutions Architect Professional certification and a PMP
    to solidify her project‑management credentials. Passionate about fostering inclusive teams, she hopes to establish a mentorship program for women in tech within her company and to speak at Denver’s
    Women in Technology meet‑ups. Long‑term, she envisions launching a boutique consulting firm that helps mid‑size enterprises adopt sustainable cloud practices while maintaining rigorous security standards.
