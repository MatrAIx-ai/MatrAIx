personas:
  professional: Jamee Mikulinsky, a retired data analyst turned community science mentor, blends their solid STEM foundation in data analysis, experimental design, and technical writing with a relaxed,
    flexible approach to organizing intergenerational workshops, leveraging their knack for explaining complex ideas in plain language while navigating occasional disorganization with humor.
  sports: Jamee Mikulinsky, an energetic senior line‑dancer at the Irving Senior Center, stays fit through weekly line‑dancing classes, walks with the Irving Walking Club, and passionately follows the Dallas
    Cowboys, Dallas Mavericks, and Texas Rangers, often cheering them on at local sports bars while proudly wearing their vintage Cowboys cap.
  arts: Jamee Mikulinsky regularly attends local concerts featuring Willie Nelson and community theater productions of classic historical dramas, delights in listening to Frank Sinatra on her vintage record
    player, and finds inspiration for her memoir in the works of historical‑fiction authors Ken Follett and Philippa Gregory, all of which enrich her sense of cultural continuity.
  travel: Jamee Mikulinsky enjoys traveling to regional heritage festivals such as the Texas State Fair and the Santa Fe Indian Market, plans trips around family gatherings with flexible itineraries, dreams
    of visiting the Kennedy Space Center to connect with her space‑race memories, and occasionally embarks on short road trips to Nashville for music festivals, mindful of budgeting constraints common for
    seniors.
  culinary: Jamee Mikulinsky loves cooking Southern comfort dishes like chicken‑fried steak, collard greens seasoned with garden rosemary and thyme, and pecan pie, confidently preparing hearty bowls of
    chili using home‑grown jalapeños and cilantro, while sharing these meals at neighborhood potlucks where their signature herb‑infused lemonade is always a hit.
  core: Jamee Mikulinsky is a spirited 87‑year‑old who balances curiosity about new tech with a laid‑back, occasionally forgetful lifestyle, line‑dances, gardens herbs, mentors teens in STEM, and never
    says no to a good story or a slice of pecan pie.
background:
  cultural: Jamee grew up in a mid‑century American household in the Midwest before moving to Texas, absorbing values of hard work, community service, and Southern hospitality. As a white member of the
    post‑World War II generation, she witnessed the civil‑rights movement, the space race, and rapid technological change, which fueled her fascination with STEM. Living in Irving, she embraces the city’s
    multicultural environment while maintaining traditions such as church gatherings, family meals, and participation in local events like the State Fair of Texas.
