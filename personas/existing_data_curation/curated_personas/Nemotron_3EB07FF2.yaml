  hobbies: '[''Gardening (community plot)'', ''Knitting and crocheting'', ''Reading (mystery and historical fiction)'', ''Walking in Prospect Park'', ''Puzzle solving (crosswords, sudoku)'', ''Cooking traditional
    family recipes'', ''Volunteering at local senior center'']'
  career_goals: Adele aims to leverage her experience into a supervisory role, such as Shift Lead or Inventory Control Specialist, where she can oversee daily operations and mentor newer employees. She
    plans to obtain a certification in inventory management (e.g., APICS CPIM) to formalize her expertise and to ensure continued employability as she approaches retirement. Her long‑term ambition is to
    leave a legacy of reliability and to help maintain a smooth, organized warehouse environment that supports her family’s financial stability.
