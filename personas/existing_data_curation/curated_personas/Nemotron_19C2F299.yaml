personas:
  professional: Fredric Raymond is a budding robotics enthusiast who spends afternoons assembling and programming model robots for the school’s science club, and they apply a practical curiosity and competitive
    edge to troubleshoot hardware glitches and outscore peers in regional challenges.
  sports: Fredric Raymond thrives on the soccer field with the local Thunder Youth Soccer Academy and dominates the basketball court at the community center while cheering for the Dallas Mavericks and Dallas
    Cowboys, and they maintain a rigorous after‑school fitness routine that includes weekend fishing trips to stay relaxed.
  arts: Fredric Raymond fuels their creative side by listening to pop icons like Billie Eilish and classic Texas country legends such as George Strait while they build intricate LEGO sculptures and participate
    in school talent shows, often mimicking favorite guitar riffs on a borrowed ukulele.
  travel: Fredric Raymond prefers family-oriented road trips, having fished on Lake Travis and explored the Grand Canyon on a school field trip, and they dream of visiting the Kennedy Space Center in Florida
    to see real rockets up close.
  culinary: Fredric Raymond enjoys a mix of classic comfort foods—pizza, chicken nuggets, macaroni and cheese—and grilled fish from weekend catches, experimenting with simple recipes like taco night but
    they rely heavily on take‑out for convenience, often adding hot sauce for an extra kick.
  core: Fredric Raymond is an energetic, competition‑driven pre‑teen who channels curiosity into robotics and sports, and they stay up late perfecting Rocket League strategies, yet habitually forget to
    finish homework before bedtime.
background:
  cultural: Fredric grew up in Belton, Texas, a small-city community that blends suburban life with rural traditions. His family participates in local events such as high-school football rallies, county
