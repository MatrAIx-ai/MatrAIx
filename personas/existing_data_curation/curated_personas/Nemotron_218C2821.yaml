personas:
  professional: Connie Hollis, a seasoned registered nurse with over three decades of acute‑care, chronic disease management, and community health expertise, blends their practical curiosity with deep cultural
    competence to mentor new nurses, lead interdisciplinary rounds, and champion evidence‑based practices while preparing for a transition into a nurse educator role and a community hypertension and diabetes
    initiative in Katy.
  sports: Connie Hollis enjoys cheering on the Houston Astros and supporting the Houston Texans while participating in line‑dancing classes at the Katy Senior Center and joining a weekly walking club that
    meets at Terry Hershey Park to stay active.
  arts: Connie Hollis sings in their church’s St. Mary’s choir, finds solace in the soulful piano of Nina Simone, reads historical fiction by Annette Gordon‑Reed, and creates intricate quilts inspired by
    traditional patterns while attending local theater productions featuring performances by the Houston Grand Opera.
  travel: Connie Hollis favors relaxed road‑trips with family, having explored New Orleans for its music and cuisine, hiked the Great Smoky Mountains on a spring getaway, and planning a future visit to
    Savannah’s historic squares, balancing their travel budget around retirement savings and occasional group tours with the church choir.
  culinary: Connie Hollis delights in cooking soul‑food classics such as fried catfish, collard greens seasoned with smoked turkey, and sweet potato pie, often using fresh tomatoes, peppers, and herbs from
    their backyard garden while occasionally over‑frying for crispiness and proudly serving large family gatherings.
  core: Connie Hollis, a sociable yet worry‑prone 59‑year‑old nurse, blends their love of group music, soulful cooking, and community health advocacy with a relaxed but occasionally scattered approach to
    life.
background:
  cultural: Connie grew up in a close‑knit African‑American family in the Houston metropolitan area, where church, family, and community were central pillars of life. Her cultural identity is shaped by
    the traditions of Southern Black cuisine, gospel music, and the legacy of civil‑rights activism. Living in Katy, she remains deeply connected to the local Black community, often volunteering at health
    fairs and advocating for equitable healthcare access. Her experiences navigating both the challenges and strengths of being a Black woman in Texas inform her compassionate approach to patient care and
    her commitment to addressing health disparities.
attributes:
  skills: '["Patient Assessment","IV Therapy","Wound Care","Chronic Disease Management","Health Education & Community Outreach","Cultural Competence","Mentoring & Precepting","Discharge Planning","Evidence-Based
    Practice Integration","Team Collaboration"]'
  hobbies: '["Church choir singing","Community health discussion group","Soul-food cooking","Gardening","Line dancing","Historical fiction reading","Quilting","Juneteenth celebrations","Yoga and meditation"]'
  career_goals: Connie hopes to transition into a nurse educator role at a local community college or hospital training program, where she can share her practical knowledge and foster the next generation
    of culturally competent nurses. She is also interested in developing a community health initiative in Katy that addresses hypertension and diabetes disparities among African‑American residents. Over
    the next few years, she aims to obtain a certification as a Certified Diabetes Educator and to take on a part‑time leadership position that allows her to mentor staff while maintaining flexibility for
    personal pursuits.
