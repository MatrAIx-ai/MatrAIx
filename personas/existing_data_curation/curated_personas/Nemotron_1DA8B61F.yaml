  career_goals: Lee aims to transition from a senior software developer to a technical lead who can shape product strategy while maintaining a collaborative, people‑centric team environment. He aspires
    to mentor junior engineers, champion diverse hiring practices, and spearhead projects that have a positive social impact—such as building community‑focused apps for local nonprofits in the El Paso region.
    Over the next five years, he envisions earning advanced certifications in cloud architecture, contributing to open‑source initiatives that improve software accessibility, and eventually moving into
    a product‑management role that blends his technical curiosity with a desire to serve the community.
