personas:
  professional: G Simpson is a senior full‑stack software engineer who blends methodical design patterns with an insatiable curiosity for emerging APIs, leads cross‑functional teams through calm yet occasionally
    chaotic hackathon‑style sprints, champions inclusive hiring and community‑focused product ideas, and they constantly mentor peers while juggling a flexible, sometimes disorganized, project timeline.
  sports: G Simpson is an avid hiker who conquers the trails of the Franklin Mountains on weekends, watches the El Paso Chihuahuas baseball team, plays pickup basketball at the local community center, belongs
    to the El Paso Northside Trek Club, and they balance solo endurance with occasional team sports to stay fit.
  arts: G Simpson indulges in narrative‑driven indie video games like "Disco Elysium" and "Hades," streams occasional gaming sessions while discussing soundtracks by Gustavo Santaolalla, attends live jazz
    nights featuring local saxophonist Maria Guerra, and they regularly recommend sci‑fi authors such as N.K. Jemisin to friends during dinner gatherings.
  travel: G Simpson prefers low‑key road trips that blend desert stargazing near White Sands with short cultural stops in Santa Fe, has a bucket‑list destination of Kyoto for its tech‑culture festivals,
    usually books last‑minute flights to keep costs low, and they balance modest savings with a love for spontaneous adventure.
  culinary: G Simpson is a self‑taught home‑cook who loves to perfect Tex‑Mex dishes like carne asada tacos with fresh cilantro and lime, experiments with homemade salsa verde using tomatillos, often hosts
    weekly dinner parties where friends sample their latest fusion attempts, though they sometimes over‑salt meals in their quest for bold flavor, and they enjoy swapping recipes on local maker meetups.
  core: G Simpson is a curiosity‑driven yet easy‑going software engineer who hikes, cooks spicy Tex‑Mex, mentors kids, and occasionally lets disorganization slip into their budgeting and workout routine.
background:
  cultural: Although Lee is white and grew up in a middle‑class family from the Midwest, he has lived in El Paso since college and has absorbed the city's rich border culture. He is comfortable navigating
    bilingual environments, often picking up Spanish phrases from coworkers and neighbors. The community’s strong emphasis on hospitality, family gatherings, and mutual support resonates with his compassionate
    personality, influencing his love for communal meals and volunteer work. Lee regularly participates in local festivals such as Cinco de Mayo celebrations and Juneteenth parades, appreciating the region’s
    blend of American and Mexican traditions while maintaining his own cultural roots.
