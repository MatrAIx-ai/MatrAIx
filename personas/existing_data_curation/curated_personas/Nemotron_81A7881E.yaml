personas:
  professional: Brooke Buchanan is an aspiring junior software creator who builds simple games in Scratch, applying a methodical, organized workflow that balances their curiosity about new coding tricks
    with a practical, step‑by‑step debugging routine, and they relish the feeling of solving a bug as a small victory.
  sports: Brooke Buchanan plays midfield for the local Eastside Tigers youth soccer team, practices twice a week at the community park, cheers for the Los Angeles Lakers during basketball season, and they
    complement the sport with weekend bike rides and occasional yoga to stay flexible, reflecting their organized and reliable nature.
  arts: Brooke Buchanan creates vibrant comic strips inspired by the storytelling style of Stan Sakai, practices piano pieces by Yiruma and Beethoven with a disciplined schedule, and they often draw while
    listening to the Moana soundtrack, showing how their curiosity and methodical planning fuel artistic expression.
  travel: Brooke Buchanan enjoys family road trips to the Grand Canyon and beach days in Santa Monica, dreams of visiting Disney World and Kyoto, carefully maps out itineraries and saves allowance for tickets,
    and they balance the excitement of adventure with a careful budgeting mindset.
  culinary: Brooke Buchanan bakes chocolate cupcakes with vanilla frosting and colorful sprinkles, precisely measuring each ingredient with a kitchen scale, while they also experiment with simple vegetable
    stir‑fry using carrots and zucchini from the family garden, revealing a methodical yet playful approach to cooking.
  core: Brooke Buchanan is a ten‑year‑old puzzle‑solver who blends curious exploration with meticulous planning in every hobby, from coding games to scoring goals, while they occasionally give in to impulsive
    candy cravings.
background:
  cultural: Brooke was raised in a white, middle‑class family in North Little Rock, Arkansas. Her upbringing blends Southern hospitality and community values with modern, tech‑savvy influences. She attends
    a local Baptist church, where she participates in holiday programs and community outreach. Family traditions include celebrating Thanksgiving with a big roast turkey, enjoying Arkansas‑style barbecue
    in the summer, and attending the Arkansas State Fair each year. Growing up near the Arkansas River, she loves outdoor activities like fishing and hiking, which reinforce her appreciation for the natural
    environment.
