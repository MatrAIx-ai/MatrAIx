  career_goals: Although still very young, Reinaldo shows an emerging desire to help others and maintain harmony. He often mimics caring roles he observes at home, such as pretending to be a nurse or a
    teacher. His future aspirations may gravitate toward professions that involve nurturing and service, like becoming a caregiver, a pediatric doctor, or a community helper. These ambitions align with
    his compassionate nature and his enjoyment of routine tasks that support others.
