  and have a deep understanding of the rigging and sail plan details of the Dutch boyer rig type. They are skilled in maritime history, architecture, and art history, and have a passion for preserving and
  understanding the cultural and historical significance of colonial vessels. They are knowledgeable about the maritime history of the Dutch Golden Age and have a strong interest in the history and architecture
  of colonial vessels.
