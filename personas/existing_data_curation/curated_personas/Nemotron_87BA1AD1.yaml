personas:
  professional: Mary Dupree, a data‑savvy STEM outreach strategist with advanced Excel, SPSS, and Tableau expertise, leverages their innate curiosity and compassionate drive to construct inclusive science
    fairs and educational programs that translate complex statistical concepts into vivid community narratives.
  sports: Mary Dupree, an avid weekend hiker with the Allegheny Mountain Hiking Club and a seasonal fan of the Pittsburgh Steelers, Penguins, and Pirates, blends brisk trail treks across the Laurel Highlands
    with occasional community softball games, using their energetic, sociable nature to motivate friends and keep a steady cardio routine.
  arts: Mary Dupree, a watercolor enthusiast who recreates the misty tones of Andrew Wyeth’s Pennsylvania landscapes while performing in community theater productions of 'Our Town' and quoting poetry from
    Ocean Vuong, regularly frequents the Carnegie Museum of Art and streams indie folk playlists featuring Sufjan Stevens and Iron & Wine, letting the arts shape their empathetic and unconventional outlook.
  travel: Mary Dupree, a meticulous planner who favours weekend road trips to the historic streets of Gettysburg and the craft breweries of Asheville but dreams of a month‑long art pilgrimage through Barcelona,
    Florence, and Kyoto, balances their travel budget by using points from a travel rewards credit card and often travels with a small group of fellow volunteers to combine service and sightseeing.
  culinary: Mary Dupree, whose cooking skill hovers between confident sauté‑master for Mediterranean dishes like ratatouille and hesitant baker of sourdough loaves, delights in tasting artisanal cheeses,
    truffle‑infused risotto, and locally sourced apple pie, while they regularly explore new eateries for dishes such as Korean bibimbap and Ethiopian injera.
  core: Mary Dupree is a curiosity‑fuelled data analyst turned community advocate, whose knack for turning numbers into stories is matched only by a habit of over‑committing to projects that occasionally
    leaves them anxiously juggling deadlines, yoga mats, and watercolor brushes.
background:
  cultural: Mary Marie Dupree grew up in a small, working-class town in western Pennsylvania, where her family’s French-Canadian roots mingle with the broader Appalachian culture of the region. Raised in
    a close-knit community that values hard work, self-reliance, and neighborly support, she was exposed early to both the practical side of life—farmers’ markets, local festivals, church gatherings—and
    the arts through school programs and community centers. The blend of her French-Canadian heritage, with its emphasis on family and cultural traditions, and the Pennsylvanian emphasis on community involvement
    and modesty, has shaped her compassionate, collaborative nature and her curiosity about the wider world.
attributes:
  skills: '["Advanced Excel", "SPSS statistical modeling", "Basic Python", "Basic R", "Laboratory data management", "Scientific instrumentation calibration", "Technical troubleshooting", "Data visualization
    (Tableau, PowerPoint)", "STEM outreach coordination", "Interpersonal communication", "Event planning"]'
  hobbies: '["Watercolor painting", "Photography", "Hiking", "Community theater", "Math tutoring", "Food bank volunteering", "Art museum visits", "Science talks", "Reading contemporary fiction and poetry",
    "Exploring new cuisines"]'
  career_goals: Mary aims to transition into a STEM outreach coordinator role for a regional community college or non-profit, designing programs that bring math and science to underrepresented youth. She
    plans to earn certifications in data analytics and project management, lead community science fairs, and eventually assume a managerial position that blends her analytical abilities with her passion
    for helping others and fostering community harmony.
