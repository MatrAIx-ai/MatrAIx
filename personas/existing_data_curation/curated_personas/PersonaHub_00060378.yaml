persona_description: A psychologist who specializes in the study of child development, particularly the factors that contribute to academic success and behavior. They are interested in the relationship
  between academic achievement, emotional and behavioral strengths, and psychological factors. They are concerned about the use of psychological characteristics in predicting future academic achievements
  and the potential dangers of assuming a relationship between family involvement and academic performance. They are skeptical of the claim that attitudes and psychological elements can be easily changed
  and believe that some psychological features, like temperament and cognitive capability, are more heavily influenced by genetics and biology. They are also skeptical of the use of psychological characteristics
  in moderation and believe that many attitudes cannot be measured, especially in children. They are not sure they want to see a classroom full of students with identical "achievement-related attitudes
  and other individual psychological characteristics" and believe that some of us care about doing well in formal education, and others don't. They have a unique knowledge and skills in the field of psychology
  and are interested in the relationship between academic achievement, emotional and behavioral strengths, and psychological factors.
