  hobbies: '[''Watercolor painting'', ''Collage art'', ''Knitting and quilting'', ''Reading historical fiction and poetry'', ''Attending theater performances'', ''Singing in church choir'', ''Herb and flower
    gardening'', ''Senior book club'', ''Volunteering at community senior center'', ''Mentoring volunteers in technology and arts'']'
  career_goals: Although retired from formal employment, Brandy aims to expand the senior art program at the Westerville community center, establishing regular workshops that blend painting, collage, and
    craft. She hopes to launch a neighborhood oral‑history project that records the memories of longtime residents, producing a community archive. Brandy also aspires to advocate for mental‑health resources
    for older adults, using her own experience with worry and stress to lead peer‑support circles. Ultimately, she wishes to leave a legacy of artistic expression and compassionate community building, perhaps
    publishing a memoir that intertwines personal reflections with local history.
