  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Bonsai and vegetable gardening'', ''Cooking Vietnamese cuisine'', ''Reading world history and philosophy'', ''Volunteering
    at Tet festivals'', ''Playing Mahjong'', ''Photography of local landscapes'']'
  career_goals: Although approaching retirement, Phu aims to transform his decades of experience into a mentorship role, officially becoming a senior sales advisor for his current employer and a volunteer
    trainer for new hires in the neighborhood. He hopes to launch a modest boutique—perhaps a pop-up shop—dedicated to showcasing Southeast Asian crafts, traditional textiles, and contemporary art pieces,
    blending his love of culturally rich merchandise with his retail acumen. In parallel, he wishes to expand his influence by consulting small, family-run stores on improving customer engagement and visual
    storytelling, ultimately leaving a legacy of both profitable business practices and enriched community cultural awareness.
