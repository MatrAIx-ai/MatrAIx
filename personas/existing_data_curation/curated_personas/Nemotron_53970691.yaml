personas:
  professional: Raniel Rodriguez is a budding preschool explorer who spends mornings arranging block towers in neat rows, eagerly following the daily schedule, yet often diverges into spontaneous play when
    a new toy catches their eye, displaying early practical problem‑solving skills and a competitive streak when racing to finish puzzles.
  sports: Raniel Rodriguez loves sprinting across the backyard, shouting cheers for the Miami Dolphins' blue and aqua jerseys they see on a nearby TV, and attends a local toddler soccer session where they
    enthusiastically chase the ball, often turning the game into a friendly competition to see who can dribble first.
  arts: Raniel Rodriguez wiggles to the rhythm of lively salsa and Latin pop playing at family gatherings, mimicking dance steps from the living room, and delights in picture books by Mo Willems, often
    loudly reciting their favorite lines, revealing a strong artistic inclination nurtured by bilingual storytelling.
  travel: Raniel Rodriguez accompanies their family on weekend trips to the Florida Keys, marveling at the turquoise water and collecting shells, while day‑long car rides to Orlando's theme parks ignite
    a fascination with bright lights and rides, a travel style that balances parental planning with the toddler's spontaneous curiosity.
  culinary: Raniel Rodriguez shows an early palate for the fragrant arroz con pollo their mother prepares, eagerly slurps sweet maduros with their fingers, yet insists on pureed peas for breakfast, revealing
    a selective eater who loves familiar flavors but often throws tantrums when presented with new textures.
  core: Raniel Rodriguez is a lively two‑year‑old who thrives on predictable routines, bursts into spirited group play, and turns even simple block‑stacking into a competitive showdown, all while juggling
    a tendency to scatter toys in delightful chaos.
background:
  cultural: Raniel is raised in a Cuban‑American household in Homestead, Florida. Spanish is spoken at home alongside English, and he is immersed in Cuban traditions such as celebrating Carnaval, listening
    to salsa, son, and Latin pop, and eating family‑favorite dishes like arroz con pollo, croquetas, and maduros. The vibrant Cuban community in Miami‑Dade provides him with cultural festivals, bilingual
    preschool interactions, and a strong sense of heritage that shapes his daily life.
