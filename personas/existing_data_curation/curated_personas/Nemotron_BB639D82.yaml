  hobbies: '[''Cooking traditional Mexican recipes'', ''Solo hiking in the Sandia Mountains'', ''Reading non-fiction (history, personal development, data science)'', ''Gardening'', ''Knitting'', ''Meditation
    and journaling'']'
  career_goals: Marfa aims to become a senior management analyst leading cross‑functional improvement initiatives within a government agency or large corporation that serves the New Mexico community. She
    plans to earn PMP and Six Sigma Black Belt certifications to deepen her expertise in structured project delivery. Over the next five years, she hopes to spearhead the creation of enterprise‑wide performance
    dashboards, mentor junior analysts, and eventually transition into a director‑level role where she can shape policy‑informed operational strategies that improve public services. Throughout her career,
    she remains committed to maintaining a predictable routine, high standards of quality, and a compassionate focus on outcomes that benefit underserved populations.
