  hobbies: '[''Hiking in Hudson Valley'', ''Reading (classics, contemporary Black literature, biographies)'', ''Listening to jazz and soul music'', ''Genealogy research'', ''Volunteer tutoring for literacy
    programs'']'
  career_goals: Larry aims to publish a critically acclaimed novel that interweaves themes of personal resilience and community heritage, leveraging his business savvy to launch his own independent press
    focused on underrepresented voices. He also aspires to author a series of non‑fiction works documenting the cultural history of Orange County’s African‑American communities, and to mentor emerging writers
    through workshops and small‑group coaching. Over the next five years, he envisions expanding his author platform into speaking engagements at literary festivals and local schools, while building sustainable
    revenue streams that balance artistic integrity with practical financial stability.
