persona_description: A dedicated and experienced primatologist who specializes in the study of primates, particularly the red slender loris. His research focuses on understanding the life and ecology of
  these unique primates, their distribution and conservation status, and the threats they face. He is a member of a large-scale study team working in Sri Lanka, collaborating with the Zoological Society
  of London and the Open University of Sri Lanka. His work is crucial in providing a comprehensive understanding of the red slender loris and its place in the Sri Lankan biodiversity hotspot.
