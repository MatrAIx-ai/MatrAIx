personas:
  professional: John Machen is a budding junior coder who spends afternoons turning Scratch ideas into simple games, while also organizing his church youth group's events, channeling his talkative energy
    into leading group activities and sharing his practical curiosity with peers.
  sports: John Machen plays on the school basketball team and a local Little League baseball club, while cheering for the Los Angeles Lakers and the New York Yankees on TV, and they spend free time practicing
    jump shots at the neighborhood park and pitching in the sandlot.
  arts: John Machen devours adventure comics like "Bone" and "Amulet", enjoys listening to country hits by Dolly Parton and gospel choruses from his church choir, and they love watching animated films starring
    Tom Hanks, which fuels their creative storytelling in Scratch projects.
  travel: John Machen has explored the nearby state forest, taken a family trip to Disney World in Florida, and they dream of backpacking through the Grand Canyon and spotting the ancient stones of Stonehenge
    in England.
  culinary: John Machen favors pepperoni pizza, chicken nuggets, mac and cheese, and homemade trail mix with peanuts and dried fruit, and they can whip up a quick peanut‑butter‑jelly sandwich, though they
    often forget to clean up the crumbs after snacking.
  core: John Machen is a sociable, curiosity‑driven ten‑year‑old who blends a love of outdoor adventure, creative coding, and community fellowship, all while they juggle a charmingly chaotic knack for misplacing
    their homework.
background:
  cultural: John grew up in Sumrall, a small town in Lamar County, Mississippi, surrounded by a close‑knit community that values Southern hospitality, family gatherings, and local traditions. His family
    participates regularly in church services and community events such as county fairs, high school football games, and neighborhood barbecues, which have instilled in him a strong sense of belonging and
    community service. He has been raised with a blend of traditional Southern values—like respect for elders and a love for the outdoors—and an openness to new ideas, encouraged by his curiosity and practical
    mindset. The regional culture, including a love for country music, storytelling, and outdoor recreation, plays a central role in shaping his daily life and future aspirations.
