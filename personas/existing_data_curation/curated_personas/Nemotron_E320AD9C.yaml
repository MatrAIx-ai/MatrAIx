  career_goals: John imagines a future where he can combine his love for helping people, his curiosity about how things work, and his talent for talking and performing. He dreams of becoming a firefighter
    or emergency medical technician because he wants to protect his community and work as part of a team. At the same time, his interest in nature and wildlife leads him to consider a career as a wildlife
    biologist or conservation volunteer, where he could explore the outdoors and protect local ecosystems. He also enjoys the idea of creating a kid‑friendly YouTube channel that shares his adventures in
    sports, outdoor exploration, and simple DIY projects, blending creativity with practical knowledge.
