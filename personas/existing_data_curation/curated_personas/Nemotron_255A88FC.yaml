personas:
  professional: Charlotte Tarlton, a detail‑oriented cleaning specialist with expertise in OSHA‑compliant chemical handling and floor‑care equipment, leverages her meticulous logging habits and emerging
    green‑cleaning knowledge to lead small service teams and chase a supervisory role within two years.
  sports: Charlotte Tarlton, a low‑impact fitness enthusiast, logs daily walks with the Brevard County Walking Club along the Indian River Lagoon, follows the Orlando Magic and the Tampa Bay Rays for occasional
    game days, and joins a seasonal beach‑volleyball pick‑up group in the summer, preferring structured cardio over high‑intensity workouts.
  arts: Charlotte Tarlton, an avid reader of historical fiction and self‑help titles, also finds inspiration in the period dramas of Kate Winslet, the paintings of Andrew Wyeth, and the piano compositions
    of Ludovico Einaudi, often pairing a quiet evening of a Hilary Mantel novel with a glass of Pinot Noir.
  travel: Charlotte Tarlton, an organized weekend traveler, prefers meticulously planned road trips to nearby coastal gems such as Key West and St. Augustine, while dreaming of a solo eco‑tour of Utah's
    Zion and Bryce Canyon National Parks, balancing a modest travel budget with occasional family visits to grandparents in North Carolina.
  culinary: Charlotte Tarlton, a methodical home cook, frequently prepares rosemary‑infused focaccia, lemon‑garlic quinoa, and classic blueberry crumble using fresh herbs from their garden, follows recipes
    to the minute, yet occasionally over‑bakes pastries when multitasking between cleaning shifts and puzzle solving.
  core: Charlotte Tarlton merges disciplined structure with a quiet love of nature, turning routine cleaning into a launchpad for an eco‑friendly business while nurturing a penchant for puzzles, precise
    cooking, and well‑planned weekends.
background:
  cultural: Charlotte identifies as White American, with family roots in German and English ancestry. Growing up in Melbourne, Florida, she experienced a blend of Southern hospitality and coastal lifestyle.
    Her community emphasized hard work, personal responsibility, and modesty, values reinforced by local traditions of neighborly assistance and outdoor recreation. This cultural backdrop shapes her practical,
    reliable nature and her commitment to both family stability and community involvement.
attributes:
  skills: '[''Commercial cleaning'', ''Floor‑care equipment operation'', ''Hazardous chemical handling'', ''OSHA safety compliance'', ''Time management'', ''Inventory control'', ''Cleaning documentation'',
    ''Minor maintenance'', ''Customer service'', ''Green cleaning practices'']'
  hobbies: '[''Gardening'', ''Cooking/Baking'', ''Reading historical fiction'', ''Puzzle solving (crosswords, sudoku)'', ''Nature walking'', ''Community clean‑up volunteering'', ''DIY home projects'']'
  career_goals: Charlotte aims to advance to a lead janitorial or cleaning supervisor role within the next two years, securing certifications such as Certified Professional Cleaner and the OSHA 10‑Hour
    Safety course. She plans to develop supervisory and budgeting skills to transition into facility management, with a long‑term ambition of launching a small, eco‑friendly cleaning business that offers
    predictable hours and stable income to support her family. She values a structured career path that aligns with her practical mindset and desire for reliability.
