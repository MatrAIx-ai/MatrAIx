personas:
  professional: An emerging visual storyteller and future art therapist, Wendy Rozo channels bilingual fluency and self‑taught Photoshop and Canva expertise into leading high school art club events, crafting
    social‑media campaigns for community programs, and mentoring peers, often juggling deadlines with a flexible, last‑minute approach while building a portfolio aimed at a Fine Arts degree.
  sports: Wendy Rozo enjoys casual weekend soccer games with friends, follows the Atlanta Falcons (NFL) and Atlanta Hawks (NBA) religiously, participates in a local hiking club that tackles nearby trails
    in the summer, and practices yoga twice a week to balance their energetic social life with moments of calm.
  arts: Wendy Rozo spends afternoons sketching mixed‑media collages, visits the High Museum of Art and the 21c Museum Hotel for inspiration, cites Frida Kahlo’s autobiographical symbolism and Banksy’s street‑level
    commentary as artistic anchors, and runs a personal blog where they dissect the intersection of visual art and mental health.
  travel: Wendy Rozo prefers spontaneous road trips, has explored Asheville’s mountain art scene and Savannah’s historic riverfront, dreams of wandering the colorful alleys of Oaxaca for its vibrant murals,
    and balances travel ambitions with a modest student budget and family responsibilities.
  culinary: Wendy Rozo loves preparing aromatic arroz con gandules with sofrito, caramelizing sweet plantains, experimenting with homemade chorizo, and pairing these dishes with a fresh avocado salad, while
    also indulging in quick avocado toast or sushi rolls when friends gather for movie nights.
  core: Wendy Rozo is a restless, emotionally intense creator who channels anxiety into bold art, drifts between organized bursts and chaotic spontaneity, thrives on social connections, and often loses
    track of deadlines while chasing the next inspiring moment.
background:
  cultural: Wendy grew up in a Puerto Rican household in Hephzibah, Georgia. Her parents immigrated from Puerto Rico and preserve traditions such as celebrating Noche Buena, San Juan festivals, and cooking
    classic dishes like mofongo and arroz con gandules. Bilingual at home, she speaks Spanish with her family and English in school and the broader community. The blend of Caribbean warmth and Southern
    hospitality has shaped her values of community, generosity, and vibrant self‑expression, influencing both her artistic style and her social interactions.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Digital photography'', ''Graphic design basics (Adobe Photoshop, Canva)'', ''Social media content creation'', ''Public speaking'', ''Event coordination
    (school clubs)'', ''Creative writing and journaling'', ''Peer counseling and empathy'']'
  hobbies: '[''Sketching and painting'', ''Mixed‑media art experiments'', ''Visiting galleries and museums'', ''Listening to and dancing to Latin music'', ''Journaling and blog writing'', ''Group hikes
    and outdoor activities'', ''Cooking Puerto Rican cuisine'', ''Socializing at community events'', ''Volunteering at local art workshops'']'
  career_goals: Wendy aims to pursue a bachelor’s degree in Fine Arts with a minor in Psychology, with the long‑term ambition of becoming an art therapist who blends creative expression with emotional support.
    In the short term, she plans to build a professional portfolio, volunteer at local community art programs, and secure a part‑time role as a photography assistant. Eventually she hopes to open a community
    art studio in Hephzibah that offers workshops, exhibitions, and mental‑health resources for youth and adults alike.
