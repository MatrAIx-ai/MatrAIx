  career_goals: Sang aspires to transition into a senior management role, such as Operations Director, where he can drive strategic initiatives and mentor emerging leaders. He plans to earn a bachelor's
    degree in Business Administration and pursue PMP certification within the next three years. He also aims to spearhead diversity and inclusion programs within his organization, leveraging his cultural
    insights to foster a collaborative workplace. Long‑term, he envisions establishing his own consultancy that helps small Asian‑owned businesses streamline operations and expand into broader markets.
