  hobbies: '[''Weightlifting and cardio workouts'', ''DIY woodworking'', ''Watching soccer (Liga MX) and NFL'', ''Cooking Mexican cuisine'', ''Hiking on marked Colorado Springs trails'', ''Reading non-fiction
