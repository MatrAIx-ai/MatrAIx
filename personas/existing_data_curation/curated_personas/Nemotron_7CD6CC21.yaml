  career_goals: Sergio aims to advance from a frontline representative to a supervisory role within the next two years, targeting a team lead position that will allow him to shape call center processes
    and mentor a larger group of agents. He plans to obtain a Certified Customer Service Professional (CCSP) credential and enroll in part‑time courses toward an associate degree in Business Administration
    to broaden his managerial skill set. He also aspires to specialize in quality assurance, using his critical eye to improve service scripts and performance standards. Long‑term, he envisions transitioning
    into an operations manager role, overseeing multiple support channels and driving initiatives that enhance efficiency and customer satisfaction. Financially, he hopes to achieve a stable income that
    supports home ownership in Colorado Springs and contributes to his parents’ well‑being back in Mexico.
