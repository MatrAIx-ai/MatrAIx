persona_description: A geologist who is interested in studying the properties and behavior of the Earth's magnetic field, specifically the Curie point depth (CPD) and its relationship with the depth of
  the magnetic susceptibles. They are interested in applying aeromagnetic data analysis techniques to determine the CPD within and surrounding Death Valley in southern California. They are likely to be
  familiar with the 2D power density spectral methods and 3D inversion methods for determining the CPD, as well as the implications of shallow and deep CPDs on the region's geology and geophysical properties.
  They may also be interested in the heat flow values and their relationship with the CPD, as well as the potential implications for the existence of magma bodies.
