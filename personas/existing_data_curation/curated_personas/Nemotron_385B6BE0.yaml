  hobbies: '[''building block towers'', ''coloring and drawing'', ''singing nursery rhymes'', ''dancing to music'', ''listening to storytime at the library'', ''playing hide-and-seek with friends'', ''organizing
    toys'', ''helping with simple chores'', ''participating in Sunday school activities'']'
  career_goals: Even though Sherry is only four, she already talks about what she wants to be when she grows up. She dreams of becoming a teacher or a preschool aide because she loves helping friends learn,
    keeping things organized, and having a predictable classroom routine. She also imagines herself as a kind nurse or community helper who can take care of others, reflecting her caring and practical nature.
    In the future, she hopes to work in a small-town school where she can maintain a steady schedule and make a positive difference in her community.
