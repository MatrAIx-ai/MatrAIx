  hobbies: '[''Gardening'', ''Quilting'', ''Crochet'', ''Hiking local trails'', ''DIY home improvement projects'', ''Reading historical fiction'', ''Attending community fairs'']'
  career_goals: Gay Leigh aims to formalize her drafting expertise through a recognized CAD certification within the next year, positioning herself for a senior drafter role at her current firm. She envisions
    taking on project coordination responsibilities, where her blend of structured workflow and flexible problem‑solving can improve project timelines. Long‑term, she hopes to mentor new hires—especially
    those without traditional academic backgrounds—and perhaps launch a small consulting service that offers affordable drafting support to local contractors, balancing stability with entrepreneurial flexibility.
