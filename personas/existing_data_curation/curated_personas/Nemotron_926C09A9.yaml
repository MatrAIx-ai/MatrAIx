personas:
  professional: Gay Shuster, a practical architectural drafter proficient in both hand drafting and cutting‑edge CAD platforms, brings a meticulous, repeatable workflow to design projects while staying
    flexible enough to re‑configure layouts on the fly, making them an assertive yet cooperative collaborator eyeing a senior coordination role.
  sports: Gay Shuster enjoys weekend hikes with the Adams County Hiking Club, plays casual co‑ed softball for the Biglerville Bees, and avidly follows the Philadelphia Eagles, the Philadelphia 76ers, and
    the Harrisburg Senators, blending low‑key local activity with passionate regional fandom.
  arts: Gay Shuster finds creative solace in quilting patterns inspired by Georgia O’Keeffe, enjoys folk‑rock from Bob Dylan and the Avett Brothers, and regularly reads historical fiction by Ken Follett
    and Philippa Gregory, weaving artistic appreciation into everyday leisure.
  travel: Gay Shuster prefers flexible road‑trips across Pennsylvania’s rolling hills, has explored Gettysburg, the Lancaster Amish countryside, and a weekend getaway in Asheville, NC, while dreaming of
    a leisurely tour of the Scottish Highlands, balancing spontaneous detours with modest planning.
  culinary: Gay Shuster delights in farm‑to‑table meals, often preparing ratatouille with heirloom tomatoes, kale, and zucchini harvested from their garden, and seasoned chicken thighs marinated in locally
    sourced honey and rosemary, cooking at a confident home‑chef level and savoring seasonal flavors.
  core: Gay Shuster is a structurally minded drafter who balances meticulous planning with spontaneous garden whims, a pragmatic budgeter who occasionally indulges in craft‑store splurges, and a community‑rooted
    adventurer who finds peace in patterns, hills, and quiet reflection.
background:
  cultural: Gay Leigh grew up in Biglerville, a tight‑knit, predominantly white rural community in Adams County, Pennsylvania. The local culture emphasizes modesty, self‑reliance, and a strong work ethic,
    reinforced by family, church, and seasonal community gatherings such as the county fair. Her family valued practical, hands‑on skills over formal schooling, encouraging her to learn trades directly
    on the job. This background fostered her pragmatic outlook, her comfort with manual and technical work, and her appreciation for both structured routines and the flexibility needed in small‑town life.
attributes:
  skills: '[''AutoCAD'', ''SolidWorks'', ''Manual drafting'', ''Blueprint interpretation'', ''Construction code knowledge'', ''Measurement and layout'', ''Team collaboration'', ''Problem solving'', ''Basic
