  career_goals: Jonna aims to transition into a senior operations leadership role, such as Director of Administration or Vice President of Operations, where she can shape organization‑wide efficiency initiatives
    and champion digital transformation. She is interested in mentoring emerging female leaders, driving sustainability practices in office environments, and eventually launching her own consulting firm
    that helps mid‑size companies integrate pragmatic process improvements with innovative technologies. Balancing ambition with personal well‑being, she also seeks to secure a board seat on a nonprofit
    focused on community development in Los Angeles.
