  career_goals: Even at 85, Inger remains driven by purposeful pursuits. She aims to complete a memoir that intertwines her personal narrative with the cultural shifts she has witnessed in Missouri. She
    plans to curate a small exhibition of senior‑artist works at the Springfield Community Center, showcasing innovative pieces that challenge conventional aesthetics. Inger also wishes to establish a modest
    scholarship for local high‑school students who demonstrate artistic promise, ensuring her love for novelty and learning endures beyond her lifetime. Finally, she aspires to continue mentoring emerging
    writers and artists, fostering a collaborative environment that balances her cooperative spirit with her assertive guidance.
