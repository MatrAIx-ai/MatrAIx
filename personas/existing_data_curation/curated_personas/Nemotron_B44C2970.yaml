  career_goals: As he approaches the later stage of his professional life, Anthony aims to transition from full‑time employment to a selective consulting role that bridges technology and the arts. He intends
    to help local museums and cultural institutions digitize their collections, ensuring long‑term accessibility. He also hopes to author a memoir or series of essays reflecting on the evolution of computing
    from the mainframe era to the present, providing historical context for future technologists. Serving on advisory boards for community tech‑education programs and establishing a mentorship network for
    retirees re‑entering the tech workforce are additional ambitions. Lastly, he wishes to continue learning, particularly in emerging fields like AI‑assisted art creation, to keep his curiosity alive.
