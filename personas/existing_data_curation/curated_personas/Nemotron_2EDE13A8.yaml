personas:
  professional: Carolyn Frazer, a five‑year‑old budding mini‑librarian, already arranges her picture books by height and genre with color‑coded stickers, using a small ruler for perfect alignment, and their
    love of structure, practical focus, and calm resilience turn this playful activity into a miniature professional pursuit.
  sports: Carolyn Frazer, a five‑year‑old energetic kid who eagerly attends the Little Tigers soccer clinic on Saturdays, idolizes the Los Angeles Lakers, and cheers for the Chicago Cubs during family game
    nights, balances their competitive spirit with a structured practice routine that mirrors their love of predictability.
  arts: Carolyn Frazer, a five‑year‑old budding storyteller who splashes watercolor crayons to recreate scenes from Dr. Seuss’s ‘The Cat in the Hat’, sings along to Disney’s ‘Let It Go’ from Frozen, and
    hums Pharrell Williams’ ‘Happy’ when asked to sit still, reflecting a calm yet discerning artistic palate.
  travel: Carolyn Frazer, a five‑year‑old whose travel diary boasts a trip to the Children’s Museum in Boston, a weekend ferry ride to a nearby lighthouse, and a yearning to explore the Grand Canyon’s rim,
    plans each outing with a crayon‑drawn checklist and map, preferring organized excursions over spontaneous wanderings.
  culinary: Carolyn Frazer, a five‑year‑old who insists on crunchy apple slices dusted with cinnamon, devours cheesy macaroni baked with sharp cheddar, and occasionally experiments with butter‑toasted toast
    topped with strawberry jam, shows a taste for familiar comfort foods while subtly seeking texture variety.
  core: Carolyn Frazer, a five‑year‑old calm and methodical dream‑planner, meticulously lines up toy soldiers each night, hoards spare pennies in a secret pocket, and refuses to share the last slice of
    pizza, embodying a uniquely competitive yet serenely organized spirit.
background:
  cultural: Carolyn comes from a middle‑class white family living in Pittsburgh, Pennsylvania. Her parents participate in community activities typical of the region, such as attending local sports events
    (e.g., Steelers games) and celebrating American holidays like Thanksgiving and the Fourth of July. The family attends a Catholic parish, which provides a rhythm of weekly rituals and seasonal celebrations
    that reinforce her preference for routine. Pittsburgh’s cultural heritage, including its historic emphasis on steel manufacturing and neighborhood festivals, subtly shapes her worldview, while the city’s
    diverse neighborhoods expose her to a variety of cuisines and traditions.
