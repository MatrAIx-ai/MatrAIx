  career_goals: Even at five, Carolyn often talks about the future. She imagines herself in a career that offers clear rules and predictable outcomes. She expresses a strong interest in becoming an elementary
    school teacher because she likes the idea of helping children learn step‑by‑step and maintaining an orderly classroom. She also dreams of designing simple machines or structures, envisioning a role
    as a junior engineer or architect where she can build reliable things. Her competitive streak fuels a desire to be “the best” at whichever path she chooses.
