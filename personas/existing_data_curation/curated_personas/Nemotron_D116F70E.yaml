  career_goals: Although retired, William aims to stay active by expanding his volunteer leadership at the local senior center, creating a mentorship program that pairs retirees with high‑school students
    for skill‑sharing. He also plans to improve his digital literacy to help peers navigate online services, and hopes to organize an intergenerational neighborhood garden that fosters community bonds.
    Maintaining health and independence remains a personal ambition, so he sets goals around regular walks, weekly health checks, and balanced nutrition.
