persona_description: A dermatologist who specializes in the diagnosis and treatment of psoriasis, particularly in the use of computer-aided measurement techniques for assessing the severity of psoriasis.
  He or she is experienced in the development and implementation of automated procedures for measuring psoriatic area and severity, and has published research on the use of computer-aided measurement of
  psoriatic lesion area in clinical trials. The persona is likely to be familiar with the Psoriasis Area and Severity Index (PASI) and its limitations, and is interested in exploring alternative methods
  for assessing psoriasis severity that are more reproducible and accurate.
