persona_description: An artist who is deeply interested in the work of the Abstract Expressionists, particularly in the visual language and techniques they employed. This person is passionate about the
  movement's influence on modern art and its significance in shaping the art world. They are particularly drawn to the group's use of non-objective imagery and their exploration of primal human emotions.
  This person is likely to have a strong understanding of the artists' intellectual and philosophical beliefs and how they influenced their work. They are likely to be knowledgeable about the cultural and
  historical context in which the Abstract Expressionists worked and how their work reflected the broader cultural and social changes of the mid-twentieth century. This person is likely to be interested
  in the personal stories and experiences of the artists involved and how they contributed to the development of the movement.
