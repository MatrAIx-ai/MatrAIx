personas:
  professional: Milagros Hernandez, a three‑year‑old with a penchant for order, runs the sandbox economy as a self‑appointed “preschool CEO,” meticulously assigning roles, negotiating toy trades, and keeping
    a tiny spreadsheet of block inventories, all while delighting peers with confident chatter.
  sports: Milagros Hernandez, a devoted mini‑soccer fan, proudly wears a tiny Manchester United jersey to the local park's toddler league, practices dribbling with a foam ball every afternoon, and cheers
    loudly for their favorite team during weekend TV broadcasts, channeling competitive energy into friendly scrimmages.
  arts: Milagros Hernandez, an avid fan of animated classics, sings along to the “Toy Story” soundtrack, reenacts scenes from “Moana” with hand‑made costumes, and collects figurines of characters like Buzz
    Lightyear and Simba, using these artistic outlets to channel their talkative personality.
  travel: Milagros Hernandez, after a memorable family trip to the Denver Zoo and a short cruise to the Bahamas, now dreams of exploring the Eiffel Tower’s glittering lights and insists on packing a favorite
    stuffed llama for every adventure, preferring well‑planned itineraries over spontaneous detours.
  culinary: Milagros Hernandez, who relishes buttery macaroni‑and‑cheese, crunchy apple slices, and the occasional bite of sushi roll (with the rice peeled off), proudly assists in stirring pancake batter
    despite frequent flour spills and passionately declares the sweet taste of honey a “perfect ingredient”.
  core: Milagros Hernandez, a three‑year‑old whirlwind of organization, chatter, and competitive play, navigates toddler life with disciplined routines, a love for structured games, and an unabashed habit
    of hogging the spotlight.
background:
  cultural: Milagros is raised in a Colombian‑American household in Orlando, Florida, where Spanish and English are spoken daily. Her family observes Colombian traditions such as celebrating Día de la Independencia,
    Carnaval de Barranquilla, and sharing foods like arepas, empanadas, and buñuelos. She listens to Colombian music at home, learns basic dance steps, and participates in community events at the local
    Latino cultural center, which reinforces a strong sense of heritage while integrating the multicultural environment of Orange County.
attributes:
  skills: '[''Advanced verbal communication'', ''Precise routine adherence'', ''Systematic block building'', ''Leadership in group play'', ''Basic numeracy and counting'', ''Early letter recognition'',
    ''Emotional resilience'']'
  hobbies: '[''Block building'', ''Karaoke singing'', ''Dancing to Colombian music'', ''Storytime reading'', ''Organized coloring'', ''Hide-and‑seek with friends'', ''Assisting in cooking'']'
  career_goals: Milagros dreams of becoming a teacher or a kindergarten guide who can organize classrooms and inspire children. She imagines herself leading school performances, winning preschool competitions,
    and later, as an adult, directing community events that celebrate Colombian culture. Her ambition is to achieve high standards in her studies, become a role model for peers, and blend her love for teaching
    with her vibrant personality.
