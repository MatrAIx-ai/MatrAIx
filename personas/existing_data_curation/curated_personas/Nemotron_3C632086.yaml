personas:
  professional: Deangleo Grant, a seasoned construction manager with two decades of steering multimillion‑dollar residential and commercial builds, blends meticulous budgeting and schedule mastery with
    a deep appreciation for public art and sustainable design, routinely integrating BIM models, LEED standards, and culturally resonant community spaces while championing inclusive hiring and mentorship.
  sports: Deangleo Grant fuels his fitness by sprinting along the Pacific shoreline before sunrise, participates in the Los Angeles Road Runners club, joins a five‑a‑side soccer league on weekends, and
    follows the Los Angeles Lakers, Dodgers, and Galaxy with spirited loyalty throughout each season.
  arts: Deangleo Grant immerses himself in contemporary art by frequenting The Broad and MOCA, collecting limited‑edition prints from Kehinde Wiley, enjoying spoken‑word nights at The Poetry Lounge, and
    regularly attending Kamasi Washington jazz sets and Broadway‑style productions at the Pantages Theatre, allowing these experiences to inform his design sensibility.
  travel: Deangleo Grant prefers thoughtfully curated city escapes, having explored the jazz heritage of New Orleans, the modernist architecture of Barcelona, and the bustling souks of Marrakech, while
    budgeting for weekend hikes in the Sierra Nevada and planning a future solo trip to Iceland to photograph stark glacial landscapes.
  culinary: Deangleo Grant’s kitchen is a laboratory where he reimagines soul‑food classics like collard greens with preserved lemon and smoked paprika, pairing them with Mediterranean staples such as toasted
    pine nuts and feta‑infused couscous, and showcases his culinary confidence in a signature sweet‑potato gnocchi topped with caramelized onion‑brûlée served at intimate rooftop dinner gatherings.
  core: Deangleo Grant merges disciplined construction leadership with a restless curiosity for art and culture, balancing meticulous project execution and inclusive mentorship against a backdrop of chronic
    worry, beach‑side runs, and a perpetual quest for culinary fusion.
background:
  cultural: Deangleo is a second‑generation African‑American who grew up in South Los Angeles, where his parents were active participants in the civil‑rights movement and emphasized education, community
    service, and cultural pride. The rich tradition of Black storytelling, music, and craftsmanship shaped his worldview and instilled a deep respect for collective progress. Relocating to West Hollywood
    introduced him to a mosaic of cultures, LGBTQ+ activism, and a thriving arts scene that broadened his perspective on inclusion and creativity. He celebrates Juneteenth and Kwanzaa with his family, supports
    local Black artists by commissioning works for his projects, and actively promotes diversity in hiring within the construction industry. This blend of rooted Black heritage and the cosmopolitan influence
    of West Hollywood informs both his professional ethos and personal life.
