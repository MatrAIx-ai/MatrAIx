  career_goals: Deangleo aims to transition from site‑level management to a strategic leadership role, such as Director of Construction or Vice President of Development at a forward‑thinking firm that prioritises
    sustainable, culturally resonant projects. He envisions launching his own boutique construction company that integrates art, green building standards, and community‑driven design, especially in historically
    under‑served neighborhoods of Los Angeles. Professional milestones include earning PMP and LEED AP credentials, becoming a recognized speaker on the intersection of art and construction, and establishing
    a mentorship pipeline for Black and other under‑represented talent in the trades. Ultimately, he seeks to balance his ambition with greater personal well‑being, cultivating a work‑life rhythm that mitigates
    stress while allowing him to remain an active advocate for inclusive, creative development.
