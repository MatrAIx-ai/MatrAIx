personas:
  professional: Kurt Boyle, a 17‑year‑old aspiring bike mechanic and seasonal outdoor guide, blends a love of clear, rule‑based tasks like diagnosing bike issues with a spontaneous knack for carving new
    trail routes during weekend hikes, while they use their cooperative nature to mediate shop team dynamics.
  sports: Kurt Boyle rides with the Bend Bike Club, frequents the Bend skate park for sessions with the local skate crew, follows the Portland Trail Blazers and the Oregon State Beavers, and spends Saturday
    mornings hiking at Smith Rock State Park to stay fit.
  arts: Kurt Boyle channels a passion for nature photography into capturing sunrise over the Deschutes River, drawing inspiration from Ansel Adams and Chris Burkard, and they unwind by listening to Jeremy
    Soule’s video game scores and indie folk acts like The Lumineers.
  travel: Kurt Boyle dreams of road‑tripping to Moab’s red canyons and backpacking through Banff National Park, but currently plans day‑long hikes to Smith Rock and occasional weekend camping trips with
    friends, balancing school commitments with a tight travel budget.
  culinary: Kurt Boyle favors simple, high‑energy meals like peanut‑butter banana smoothies, homemade fish tacos with fresh salmon, and occasional pepperoni pizza from the local pizzeria, while they are
    still learning to perfect a carbonara after watching YouTube tutorials.
  core: Kurt Boyle is a structured‑yet‑spontaneous teen who balances a love for mechanics and the outdoors with a quirky habit of gaming‑induced impulse buys and a relentless drive to help others.
background:
  cultural: Kurt comes from a middle‑class white American family rooted in the Pacific Northwest. Growing up in Bend, he has been immersed in the region’s outdoors‑centric culture, valuing environmental
    stewardship, self‑reliance, and a laid‑back community vibe. His family celebrates local traditions such as seasonal festivals, craft‑beer tastings, and weekend trips to the Cascade Mountains. While
    generally non‑religious, he respects diverse perspectives and participates in community service, reflecting the area’s progressive and cooperative ethos.
attributes:
  skills: '[''Bicycle and skateboard repair'', ''Basic carpentry'', ''Computer troubleshooting'', ''First Aid & CPR certified'', ''Customer service'', ''Teamwork and conflict mediation'']'
  hobbies: '[''Strategy video gaming'', ''Mountain biking'', ''Hiking'', ''Skateboarding'', ''Nature photography'', ''Volunteering at animal shelter'']'
  career_goals: Kurt aims to complete his GED within the next year and pursue a vocational program in outdoor recreation or a trade such as bike mechanics. He envisions a career that offers a reliable routine—like
    a scheduled shift at a local bike shop or a seasonal guide position at a nearby ski resort—while still allowing him the flexibility to explore the outdoors and engage with community projects. Long‑term,
    he hopes to combine his practical skills and cooperative nature by managing a community‑focused outdoor gear rental service or leading environmental education tours in the Deschutes region.
