  career_goals: Although retired, Mausam aims to leave a lasting legacy by documenting his family's oral histories and recipes in a memoir that can be shared with future generations. He aspires to mentor
    younger members of his community, especially through intergenerational programs at the local senior center. Additionally, he hopes to continue supporting his spouse by managing household finances responsibly
    and ensuring their home remains a comfortable, well‑maintained space.
