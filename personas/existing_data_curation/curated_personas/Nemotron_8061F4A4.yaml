  career_goals: Patsy aims to transform her love of art and abstract concepts into a career that blends creativity with technology. She hopes to attend a specialized visual‑arts high school or a college
    program in animation, concept art, or game design, and eventually work as a concept artist or narrative designer for video games or animated films. Her competitive streak pushes her to seek scholarships
    and competitions that showcase her portfolio. Long‑term, she envisions leading a creative studio where she can direct interdisciplinary projects that explore futuristic worlds and thought‑provoking
    stories, while also mentoring younger artists who share her curiosity.
