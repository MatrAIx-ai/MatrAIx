  career_goals: Although retired from formal employment, Toni remains focused on personal artistic development and community impact. She aims to refine her technique in mixed‑media art and produce a cohesive
    portfolio for a solo exhibition at the Butler County Arts Center within the next two years. She aspires to author a collection of short stories inspired by her hometown’s history and to mentor emerging
    local artists through a weekly workshop series. Additionally, Toni hopes to travel to at least three major art museums in the United States to broaden her aesthetic horizons and to win a regional bridge
    tournament, reflecting her competitive drive.
