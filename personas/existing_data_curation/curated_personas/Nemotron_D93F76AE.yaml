    and Mindfulness Practice'', ''Reading Science Fiction & Contemporary Nonfiction'', ''Live Music and Local Concerts'', ''Community Volunteer for Art Workshops'']'
  career_goals: She aims to move into senior sales leadership, targeting a regional director role where she can shape sales strategy across multiple markets. Mary is also interested in spearheading digital
    transformation initiatives, integrating AI‑driven analytics into the sales pipeline. Her long‑term ambition includes founding a consultancy that helps tech firms embed creative thinking and design thinking
    into their sales culture. Additionally, she aspires to mentor women in STEM and sales, contributing to a more inclusive industry.
