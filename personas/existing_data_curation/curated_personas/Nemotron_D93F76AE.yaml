personas:
  professional: Mary Macgregor, a 40‑year‑old strategic sales manager with a STEM background, leverages data analytics and Salesforce to craft data‑driven value propositions for B2B clients while fostering
    a collaborative, flexible team culture that mirrors her curiosity and penchant for unconventional thinking.
  sports: Mary Macgregor enjoys hiking the Cascade foothills with the Bend Trail Hikers club, follows the Portland Trail Blazers and Oregon Ducks with fervor, and maintains fitness through weekly yoga sessions
    and a flexible running routine that she adapts to her unpredictable schedule.
  arts: Mary Macgregor channels her artistic side by capturing sunrise vistas with her Nikon D850, painting watercolors inspired by Georgia O'Keeffe, and attending live shows featuring classic rock legends
    like Fleetwood Mac alongside indie folk acts such as Mumford & Sons at Bend’s eclectic galleries and music venues.
  travel: Mary Macgregor prefers loosely planned road trips that blend adventure and relaxation, having explored Iceland’s volcanic landscapes, trekked New Zealand’s Southern Alps, and frequently escapes
    to nearby Oregon wine country, while still dreaming of a future sailing expedition through the Greek isles.
  culinary: Mary Macgregor experiments with seasonal cooking, often preparing cedar‑plank salmon with local hazelnut pesto, beet‑goat‑cheese salads, and mushroom risotto, and enjoys sourcing fresh ingredients
    at farmer’s markets, though she occasionally burns the tops of her roasted vegetables when she gets lost in a new playlist.
  core: Mary Macgregor is a curious, art‑loving sales strategist who balances data‑driven leadership with spontaneous outdoor adventures, a love for craft brews, and a habit of juggling organized plans
    with delightful chaos.
background:
  cultural: Mary is a white American whose family roots trace back to Scottish and English ancestors who settled in the Pacific Northwest in the mid‑20th century. Growing up in Oregon, she was immersed
    in a culture that blends rugged outdoor appreciation with a progressive, community‑oriented mindset. Her parents emphasized education in science and a love for the arts, encouraging her to pursue a
    STEM degree while exposing her to local theater and music scenes. Living in Bend, she embraces the region’s values of environmental stewardship, self‑reliance, and creative expression, which shape her
    personal and professional outlook.
