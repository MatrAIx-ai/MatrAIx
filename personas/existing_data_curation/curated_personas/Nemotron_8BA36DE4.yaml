  hobbies: '[''Yoga'', ''Book club (personal development)'', ''Volunteering at cultural festivals'', ''Hiking'', ''Gardening'', ''Photography'', ''Cooking Vietnamese cuisine'', ''Community dancing'', ''Reading
    self‑help literature'']'
  career_goals: She aims to elevate her organization to a regional hub for integrated social services, expanding outreach to underserved Southeast Asian immigrant families and seniors. Anh envisions creating
    a trauma‑informed, flexible service model that balances structure with personalized support. Over the next five years, she plans to secure multi‑year funding partnerships, mentor emerging community
    leaders, and ultimately step into an executive director role where she can influence policy and advocate for mental‑health resources at the county level.
