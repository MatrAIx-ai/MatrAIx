  hobbies: '[''Reading historical fiction and biographies'', ''Gardening (vegetables and herbs)'', ''Quilting'', ''Attending local art exhibits'', ''Volunteering at the community library'', ''Walking in
    parks'', ''Cooking Midwestern comfort food'', ''Listening to folk music'']'
  career_goals: Approaching the later stage of her career, Latosha aims to shift from day‑to‑day store operations to a mentorship‑focused role. She plans to design a structured training program for new
    supervisors and eventually move into part‑time consulting, helping small independent retailers enhance customer experience. She also hopes to volunteer her expertise at local community centers and perhaps
    teach a retail‑management course at a community college, allowing her to stay engaged while preserving flexibility and personal time.
