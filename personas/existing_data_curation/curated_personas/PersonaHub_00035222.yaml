persona_description: A researcher who specializes in the study of motor skills and developmental disabilities in children with autism spectrum disorder. She is particularly interested in the assessment
  and intervention strategies for improving motor skills in these children. She has published findings on the correlation between motor skills difficulties and social and communication deficits in children
  with autism. Her work has led to the recognition of the importance of incorporating a focus on motor skills development into treatment plans for young children with autism.
