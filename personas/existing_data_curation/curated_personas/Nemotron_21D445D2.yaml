personas:
  professional: Patrecia Shepard merges a solid STEM foundation with a passion for the arts to lead cross‑functional technology teams, leveraging advanced Excel, SQL, and design‑thinking to turn data insights
    into human‑centered product strategies while mentoring emerging women leaders and positioning themselves for a Director of Operations or Vice President role after earning PMP and MBA credentials.
  sports: Patrecia Shepard stays active by cycling the Chicago Lakefront Trail five times a week, joining the North Shore Women’s Volleyball League in summer, hiking the Shawnee National Forest in fall,
    and cheering on the Chicago Bears, Chicago Bulls, and Chicago Sky, while they occasionally slip on a yoga mat for mindfulness‑focused workouts at a downtown studio.
  arts: Patrecia Shepard frequents the Art Institute of Chicago and Museum of Contemporary Art, attends Chicago Shakespeare Theater productions, collects limited‑edition prints by Kehinde Wiley and Amy
    Sherald, and they fill their playlists with the improvisational jazz of Joshua Redman, the experimental sounds of Flying Lotus, and the soulful tones of Nina Simone, letting these experiences shape
    their creative worldview.
  travel: Patrecia Shepard prefers thoughtfully curated trips that blend cultural immersion with culinary discovery, having explored Kyoto’s temples, Barcelona’s Gaudí architecture, and Reykjavik’s geothermal
    spas, while dreaming of a Tuscan cooking retreat in Florence and a wildlife safari in Patagonia, and they balance their travel schedule between weekend Midwest getaways and annual month‑long overseas
    expeditions funded by diligent savings.
  culinary: Patrecia Shepard enjoys an intermediate level of home cooking, mastering ramen broth, harissa‑spiced lamb tagine, and fermented sourdough, delights in sourcing fresh miso, truffle oil, and black
    garlic at Chicago’s West Loop farmers market, and often pairs their meals with a glass of biodynamic Pinot Noir from Oregon, while occasionally indulging in deep‑dish pizza as a nostalgic cheat meal.
  core: Patrecia Shepard is a curiosity‑driven, 38‑year‑old tech manager who fuses analytical rigor with artistic flair, steadies their life with yoga, fuels community leadership with enthusiasm, and quietly
    battles a sweet‑tooth impulse that jeopardizes their disciplined budgeting.
background:
  cultural: Patrecia was raised in the suburban Midwest, growing up in Frankfort, Illinois, a close-knit community within Cook County. Her family traces its roots to German and Irish immigrants, and she
    was brought up with values of hard work, modesty, and community service that are characteristic of the region. She attended public schools that emphasized both academic rigor and civic responsibility,
    and she continues to participate in local traditions such as Fourth of July parades and neighborhood block parties. Proximity to Chicago has exposed her to a vibrant, multicultural arts scene, shaping
    a cultural identity that blends Midwestern sensibility with an appreciation for diverse artistic and intellectual perspectives.
