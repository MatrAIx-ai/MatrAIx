  career_goals: Patrecia aims to advance to senior executive leadership, targeting a Director of Operations or Vice President role within a technology-focused organization that values interdisciplinary
    innovation. She plans to obtain a PMP certification and eventually an MBA to deepen her strategic and financial acumen. Long-term, she aspires to launch a consultancy that helps companies integrate
    artistic thinking into their product development cycles, fostering sustainable and human-centered solutions. She also envisions mentoring emerging women leaders in STEM and championing diversity, equity,
    and inclusion initiatives at the corporate level.
