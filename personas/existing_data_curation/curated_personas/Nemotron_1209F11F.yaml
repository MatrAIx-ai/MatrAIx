personas:
  professional: Maria Roman, a 20‑year‑old home health aide, they combine compassionate patient care with meticulous vital‑sign monitoring, bilingual communication, basic wound‑care and CPR expertise, while
    their curiosity drives them to explore evidence‑based techniques alongside established caregiving protocols.
  sports: Maria Roman, who thrives on movement, they attend weekly salsa and Zumba classes, hike the coastal trail park every weekend, cheer for the Los Angeles Lakers (NBA), the Los Angeles Dodgers (MLB)
    and the LA Galaxy (MLS), and belong to the local Trailblazers Hiking Club.
  arts: Maria Roman, a 20‑year‑old arts enthusiast, they unwind to Latin pop hits by Bad Bunny and Shakira, binge‑watch the telenovela "La Reina del Sur," and discuss works by Isabel Allende and Junot Díaz
    in a Spanish‑language book club, letting vibrant rhythms and storytelling fuel their creativity.
  travel: Maria Roman, with a modest student budget, they prioritize affordable weekend road trips to the Sierra Nevada wilderness, occasional flights to Austin for its live‑music festivals, and nurture
    a long‑term dream of wandering the historic plazas of Barcelona and later trekking Peru’s Inca Trail, balancing costs through Airbnb stays and hostel dorms.
  culinary: Maria Roman, a 20‑year‑old culinary hobbyist, they love perfecting tacos al pastor and chiles en nogada while experimenting with gochujang‑infused marinades, keep staples such as corn masa,
    chipotle peppers, fresh cilantro and ripe avocados on hand, and never miss a Saturday night taco‑making session with friends.
  core: Maria Roman, a 20‑year‑old home health aide, blends compassionate caregiving with a vibrant social life, spontaneous dance‑shoe splurges, disciplined budgeting, and a resilient yet occasionally
    forgetful approach to health management.
background:
  cultural: Maria is a second‑generation Mexican American raised in a bilingual household in Rowland Heights, California. Her family celebrates Día de los Muertos, Cinco de Mayo, and other Mexican traditions,
    and she grew up with a strong emphasis on family unity, respect for elders, and communal responsibility. While embracing Mexican customs—like cooking family recipes and listening to regional music—Maria
    also navigates a multicultural environment that blends Asian influences from her surrounding community. This bicultural experience has shaped her identity, giving her a deep appreciation for cultural
    diversity and a desire to bridge gaps in healthcare access for Hispanic populations.
attributes:
  skills: '[''Patient care assistance'', ''Vital signs monitoring'', ''Basic wound care'', ''Medication reminder and assistance'', ''Bilingual communication (English/Spanish)'', ''Empathy and active listening'',
    ''Conflict resolution and de‑escalation'', ''Electronic health record documentation'', ''Time management and scheduling'', ''CPR and First Aid certified'', ''Cultural competency in Hispanic healthcare'',
    ''Team collaboration'', ''Health education basics (nutrition, exercise)'']'
  hobbies: '[''Salsa dancing'', ''Zumba classes'', ''Hiking with friends'', ''Attending Mexican cultural festivals'', ''Cooking traditional Mexican cuisine'', ''Volunteering at community health fairs'',
    ''Spanish-language book club'', ''Yoga practice'', ''Listening to Latin pop music'', ''Watching telenovelas'']'
  career_goals: Maria plans to complete her associate's degree in nursing at a local community college within the next two years and then transfer to a BSN program. Her ultimate ambition is to become a
    registered nurse specializing in geriatric and community health, where she can serve bilingual patients in underserved Mexican‑American neighborhoods. She also hopes to lead health‑education outreach
    initiatives that combine her caring nature with her curiosity for new health ideas. Long‑term, Maria envisions taking on a supervisory role in a home‑health agency or even launching her own culturally
    responsive home‑care service to empower other young Latina professionals.
