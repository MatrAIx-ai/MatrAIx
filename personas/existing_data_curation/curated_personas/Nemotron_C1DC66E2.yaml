  career_goals: Dave aspires to transition from a lone janitor to a senior facilities coordinator where he can influence building‑wide sustainability practices, such as introducing eco‑friendly cleaning
    agents and energy‑saving maintenance schedules. He dreams of eventually launching a boutique cleaning service that integrates his artistic flair by offering subtle, site‑specific visual installations
    in client spaces. Parallel to his professional ambitions, he hopes to publish a collection of illustrated short stories that blend his love of abstract concepts with everyday observations, combining
    his practical experience with his creative imagination.
