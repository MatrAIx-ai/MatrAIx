persona_description: A French-based company's research scientist specializing in the development and improvement of a new analytical tool, the NeOse, which can detect, classify, compare, and visualize odorous
  volatile compounds in air samples. The NeOse uses Surface Plasmon Resonance Imaging technology and has the potential to identify at least 300 odors and can be used for various applications such as medicine,
  food industry, and daily use for anosmic individuals. The scientist is part of a multidisciplinary research project called "Wellness & Medical Olfactory Sensors" (WISE) and works with diverse scientific
  partners and financiers.
