persona_description: A researcher who is interested in studying the impact of elevation on the prevalence, phenology, and infection intensity of Crithidia and Nosema infections among bumblebee species living
  at different elevations in Northern Arizona. The researcher is particularly interested in the differences in patterns of infection among these parasites and between elevation zones, as well as the phenology
  of Crithidia and Nosema at different elevations in Northern Arizona bumble bees. The researcher has experience in collecting and analyzing data on bumblebees and their parasites, as well as in using microscopy
  and other methods to detect and quantify the presence of pathogens. The researcher is also interested in the use of statistical analysis to compare the results of different studies and to identify patterns
  and trends in the data.
