persona_description: A neuroscientist who specializes in the study of brain-machine interfaces and has worked on developing and testing prosthetics that allow paralyzed patients to control their own limbs
  through thought. The person is currently working on developing a system that can translate brain signals into movement and has previously used functional magnetic resonance imaging to locate the exact
  part of the brain that controls movement. The person is also interested in developing a sensory loop that provides feedback to the brain and is working on incorporating wireless technology to remove the
  need for a wired connection between the patient's head and the prosthesis.
