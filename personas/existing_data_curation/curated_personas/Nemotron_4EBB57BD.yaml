  hobbies: '[''Visiting Art Galleries'', ''Exploring Street Murals'', ''Live Music Events'', ''Playing Basketball'', ''Beach Activities'', ''Cooking with Family'', ''Community Volunteering'', ''Listening
    to Hip-Hop and Jazz'', ''Attending Local Festivals'', ''Spontaneous Road Trips'']'
  career_goals: Vashon aims to advance within the United States Postal Service, targeting a supervisory role such as a Post Office Manager within the next five years. He plans to enroll in night courses
    in logistics and management at a local community college to strengthen his leadership and organizational capabilities. Parallel to his USPS career, he dreams of establishing a small side venture that
    connects local artists with collectors, leveraging his love of art and his network in the community. He also hopes to become a mentor for younger coworkers and to contribute to neighborhood outreach
    programs.
