  hobbies: '["Yoga", "Mindfulness Meditation", "Beach Walks", "Reading (fiction & self‑help)", "Cooking (seafood recipes)", "Volunteering at animal shelter", "Coffee shop meet‑ups", "Journaling", "Listening
    to music", "Attending local art shows"]'
  career_goals: Patricia aims to move from a first‑line supervisor role to store manager within the next two years, and ultimately to a district manager position overseeing multiple locations in South Florida.
    She plans to enroll in an MBA program to deepen her strategic management skills and to gain a stronger foundation in retail analytics. In the short term, she wants to design a structured onboarding
    program for new associates that balances clear procedures with flexibility, improving employee retention and morale. She also aspires to become a mentor for other women in retail leadership, and eventually
    to open her own boutique that blends curated fashion with a relaxed, community‑focused atmosphere.
