  career_goals: Richard aims to transition into a senior regional manager role overseeing multiple sites, while also pursuing a part‑time position in arts administration to blend his managerial expertise
    with his passion for culture. He plans to obtain his GED and complete leadership courses, and eventually launch a community arts and entrepreneurship center in Grand Prairie. Additionally, he aspires
    to mentor younger managers and reduce his work‑related stress by implementing better work‑life balance practices.
