  hobbies: '[''Visiting Art Galleries'', ''Street‑Art Photography'', ''Custom Car Restoration'', ''Local Car Shows'', ''Pickup Soccer League'', ''Cooking Salvadoran Cuisine'', ''Listening to Reggaeton/Salsa/Cumbia'',
    ''Exploring Food Trucks'', ''Collecting Vintage Auto Parts'', ''Racing Video Games'']'
  career_goals: Samy aims to become an ASE Master Technician and to earn specialized certification in hybrid and electric vehicle service within the next three years. He dreams of opening his own independent
    garage that doubles as a community space where local artists can showcase murals and enthusiasts can gather for car‑modding workshops. By building a reputation as Houston’s go‑to expert for EV repairs
    and custom performance builds, he hopes to secure financial stability for his wife and children while creating mentorship opportunities for young people from the Salvadoran neighbourhood. His competitive
    nature fuels his desire to beat regional service benchmarks and to win recognitions such as the Texas Automotive Excellence Award.
