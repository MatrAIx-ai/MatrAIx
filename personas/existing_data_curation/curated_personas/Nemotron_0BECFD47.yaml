personas:
  professional: Romelie Roman is a veteran landscape architect with over twenty years of experience in sustainable site design, who uses AutoCAD, SketchUp, Rhino, and GIS to craft climate‑resilient urban
    green spaces while balancing a disciplined, structured workflow with a flexible, client‑first attitude as they prepare to launch a boutique firm focused on community‑oriented parks and LEED‑certified
    projects.
  sports: Romelie Roman is an avid hiker who tackles the Sierra Nevada trails with the local Sierra Nevada Hikers Association, supports Sacramento’s Kings and Republic FC from the stands, and incorporates
    weekly yoga sessions into their fitness routine to balance strength and flexibility.
  arts: Romelie Roman immerses themselves in salsa dancing classes for cultural connection, devours historical fiction by Ken Follett and Philippa Gregory, and finds inspiration in the murals of Diego Rivera
    and the music of Celia Cruz, often attending the Crocker Art Museum’s rotating exhibitions to feed their creative soul.
  travel: Romelie Roman prefers nature‑rich getaways, having trekked the Sierra Nevada, explored Oaxaca’s historic center and its bustling markets, savored a wine‑tour in Napa Valley, and dreamed of a sustainable
    farm retreat in Monteverde, Costa Rica, while balancing travel budgets with family commitments.
  culinary: Romelie Roman cultivates heirloom corn, pasilla chilies, and epazote in their backyard garden, then whips up authentic dishes like pozole, tamales, salsa verde, and mole from scratch, delighting
    family with fresh farm‑to‑table meals while occasionally over‑spicing a batch in the excitement of experimentation.
  core: Romelie Roman blends a structured, detail‑oriented professional mindset with a flexible, family‑centered lifestyle, channeling stress‑relief through yoga, garden work, and salsa, while juggling
    financial worries, health monitoring, and a relentless pursuit of sustainable design.
background:
  cultural: Romelie is a first-generation Mexican-American who grew up in a bilingual household, celebrating both Mexican traditions and American holidays. Her family maintains strong ties to their Mexican
    roots through language, cuisine, and cultural festivities such as Día de los Muertos and Cinco de Mayo. Living in Sacramento, she participates in the local Mexican-American community, supports cultural
    organizations, and integrates elements of Mexican design—like vibrant color palettes, native plant motifs, and traditional courtyard concepts—into her professional work. She values family cohesion,
    respect for elders, and the balance between cultural heritage and contemporary Californian lifestyle.
attributes:
  skills: '[''Sustainable site design'', ''Native plant selection'', ''Water-efficient irrigation'', ''AutoCAD'', ''SketchUp'', ''Rhino'', ''GIS mapping'', ''Project management'', ''Budgeting and cost control'',
