  hobbies: '[''Vegetable gardening'', ''Cooking Mexican cuisine'', ''Hiking'', ''Yoga'', ''Nature photography'', ''Community garden volunteering'', ''Dia de los Muertos event organization'', ''Salsa dancing'',
    ''Reading historical fiction'', ''Journaling'']'
  career_goals: She aims to establish her own boutique landscape architecture firm focused on resilient, community-oriented green spaces in Sacramento and surrounding areas. Romelie seeks LEED AP certification
    and hopes to lead large-scale public park projects that incorporate both Californian and Mexican cultural motifs. She also wants to mentor young designers, especially women and Latinx professionals,
    and to publish a guide on low-water landscaping for homeowners. Balancing family and work, she envisions a schedule that allows regular time for her children and husband while pursuing professional
    growth.
