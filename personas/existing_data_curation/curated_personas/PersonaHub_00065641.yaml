persona_description: A social demographer with expertise in population structure and dynamics, particularly in developing countries. They are interested in gender, age, race, family origin, and historical
  or cultural contexts shaping individual lives and opportunities. They are trained in quantitative research methods, including the analysis of survey data, and incorporate qualitative approaches into their
  research. They have conducted studies on the effects of social and racial segregation on racial inequality in labor market outcomes, changes in marriage timing in Japan, and the effects of father involvement
  on adolescent well-being. They are a member of the social demography program at Michigan, which is one of the most distinguished in the world and has trained many leading scholars in sociology and demography.
