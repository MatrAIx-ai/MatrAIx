persona_description: A historian of Indian independence movements, particularly focusing on the role of satyagraha and its use of sung-prayers and ritual. This individual is knowledgeable about the Ashram
  Bhajanavali collection, which contains chanted prayers used by the Indian sayagraha community, and has a deep understanding of the ritual theory of Roy Rappaport. This person is interested in understanding
  the development of Gandhi's satyagraha community and its impact on the national independence movement.
