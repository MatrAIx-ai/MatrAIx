personas:
  professional: Carla Miller, a 16‑year‑old aspiring practical nurse with a basic first‑aid certification, leverages a knack for troubleshooting everyday tech, a competitive drive from soccer, and strong
    interpersonal skills to organize school events, lead her church youth group, and volunteer at the animal shelter, all while eyeing a future that blends hands‑on repair work with compassionate patient
    care.
  sports: Carla Miller fuels their competitive spirit as a starting midfielder on the Flint High School soccer team, cheerfully follows the Detroit Lions and Detroit Pistons, and participates in community
    pick‑up games and weekend runs, using a personalized fitness tracker to balance seasonal training with schoolwork.
  arts: Carla Miller curates eclectic playlists that blend Dolly Parton's country classics with Ariana Grande's pop hits, dives into mystery novels by Agatha Christie, crafts friendship bracelets and simple
    wooden keychains, and finds inspiration from artists like Andy Warhol in their DIY projects, all of which shape a vibrant, creative outlet for stress relief.
  travel: Carla Miller enjoys spontaneous weekend road trips to Michigan's Great Lakes shores, memories of family vacations at Disney World in Florida, and dreams of a study‑abroad stint in London, planning
    each adventure with a frugal budget, a travel checklist app, and a desire to experience new cultures while staying close to home for school.
  culinary: Carla Miller favors comfort foods such as crispy chicken nuggets, cheesy mac and cheese, and homemade pepperoni pizza, often adding a personal twist by sprinkling extra cheddar and jalapeños,
    while they also experiment with simple baked goods like chocolate chip cookies decorated with friendship‑bracelet‑inspired patterns during after‑school gaming sessions.
  core: Carla Miller is a socially driven, anxiety‑prone teen who channels competitive energy into soccer and hands‑on problem‑solving, while constantly juggling school, volunteering, and a budding passion
    for nursing.
background:
  cultural: Carla grew up in Flint, a small town in Smith County, Texas, within a white, working‑class family that values community, family gatherings, and local traditions such as high school football
    games and county fairs. Her upbringing reflects Southern hospitality and a strong sense of neighborliness, reinforced by regular church attendance and participation in community events. While she embraces
    the rural Texan lifestyle—enjoying outdoor activities, BBQs, and country music—she also stays connected to broader cultural influences through the internet, social media, and popular media, giving her
    a blended perspective that combines traditional values with contemporary interests.
attributes:
  skills: '[''Effective verbal communication'', ''Group event coordination'', ''Basic computer and social media management'', ''First‑aid certification'', ''Team sports (soccer) proficiency'', ''Basic mechanical
    troubleshooting'', ''Critical thinking and healthy skepticism'', ''Time management and organization'']'
  hobbies: '[''Soccer (team sport)'', ''Church youth group involvement'', ''Volunteering at animal shelter'', ''Listening to country and pop music'', ''Strategy video gaming'', ''Reading mystery and thriller
    novels'', ''DIY crafts (friendship bracelets, woodworking)'', ''Cheerleading/dance'']'
  career_goals: Carla aims to obtain her GED within the next year and pursue a career that blends her practical skills with her desire to help others. She is drawn to the healthcare field, specifically
    training to become a licensed practical nurse or a certified nursing assistant, where she can apply her first‑aid knowledge and compassionate nature. Simultaneously, she entertains the idea of learning
    a trade such as automotive or appliance repair, valuing the hands‑on problem‑solving aspect. Carla is motivated to earn a scholarship, excel in her studies, and secure a stable, community‑focused job
    that allows her to remain close to family while contributing meaningfully to Flint’s local health clinic or service industry.
