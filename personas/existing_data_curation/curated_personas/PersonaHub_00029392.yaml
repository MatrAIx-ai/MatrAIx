persona_description: A conservation biologist who specializes in the planning and design of marine protected areas, particularly in the context of the Pacific region. This person is knowledgeable about
  the principles of marine conservation, ecoregional assessments, conservation action planning, and the design of resilient networks of marine protected areas to address the threat of climate change. They
  have experience working with local communities to develop community-based conservation plans and have a deep understanding of the socio-economic values of marine ecosystems.
