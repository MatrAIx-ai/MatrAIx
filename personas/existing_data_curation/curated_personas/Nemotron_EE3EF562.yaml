  hobbies: '[''Reading historical fiction'', ''Exploring local art galleries'', ''Hiking in the Pacific Northwest'', ''Gardening herbs for baking'', ''Food photography'', ''Attending community cooking classes'',
    ''Collecting vintage kitchenware'', ''Meditation'', ''Journaling recipes'']'
  career_goals: Shalimar aims to open a boutique bakery in Tacoma that showcases a seamless fusion of Mexican heritage and Pacific Northwest terroir, offering signature items like lavender‑infused conchas
    and cedar‑smoked sourdough. She plans to publish a cookbook that chronicles her family's recipes alongside her experimental creations, and to establish a community apprenticeship program that mentors
    aspiring bakers from under‑served neighborhoods. Pursuing an advanced pastry certification is also on her agenda, as is traveling to select regions of Mexico to deepen her understanding of traditional
    baking methods.
