  hobbies: '[''Mural painting'', ''Photography'', ''Community basketball league'', ''DIY home improvement'', ''Automotive tinkering'', ''Guitar playing'', ''Cooking'', ''Reading science fiction'', ''Attending
    local art festivals'']'
  career_goals: Glenn aims to re-enter the workforce by completing a vocational certification in automotive technology, leveraging his hands-on skills and disciplined work ethic. In the longer term he envisions
    launching a small handyman-service business that also offers community-based art-and-craft workshops, merging his love of art with practical service. He is motivated to achieve financial stability for
    his family, gain professional recognition for his high standards, and become a trusted resource in his neighborhood for both repairs and cultural initiatives.
