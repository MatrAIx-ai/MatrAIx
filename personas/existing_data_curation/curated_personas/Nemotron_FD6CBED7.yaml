personas:
  professional: Eugene Davis, a three‑year‑old with a penchant for order, spends hours arranging LEGO bricks by color and size, and they treat each build like a miniature project that satisfies their practical,
    competitive streak and foreshadows a future in design or engineering.
  sports: Eugene Davis, a member of a neighborhood toddlers' soccer group, cheers for the city's professional baseball team, the Mariners, and they prefer structured games of “catch” with a soft ball, showing
    a focused, resilient attitude on the playground.
  arts: Eugene Davis, an avid fan of the animated series ‘Bluey’, often hums the theme song from Disney’s “Moana” soundtrack and they delight in drawing detailed pictures of their favorite characters, channeling
    their critical eye into perfecting the shapes of each line.
  travel: Eugene Davis enjoys meticulously planned weekend trips to the local zoo, where they request the giraffe enclosure first, and they daydream about a future family vacation to Disney World, appreciating
    the predictability of scheduled ride times and snack breaks.
  culinary: Eugene Davis, a self‑declared connoisseur of macaroni‑and‑cheese and chicken nuggets, insists that their chicken nuggets be cut into perfect squares, relishes apple slices with a dash of cinnamon,
    and they pretend to stir an imaginary pot of soup with a wooden spoon, showing a mix of practicality and selective taste.
  core: Eugene Davis is a calm, structure‑loving three‑year‑old who quietly competes through careful sorting of toys, avoids chaos, and they live by a personal rule that every snack must be measured before
    it’s eaten.
background:
  cultural: Eugene is a Black child raised in Pompano Beach, Florida, where his family blends African‑American traditions with the diverse, coastal culture of South Florida. He participates in community
    celebrations such as Juneteenth and local beach festivals, enjoys music ranging from reggae and hip‑hop to regional beach rhythms, and is exposed to stories and foods that reflect both his heritage
    and the multicultural environment of Broward County.
attributes:
  skills: '["color sorting", "block structure building", "following two‑step routines", "counting to ten", "letter identification", "simple puzzle solving"]'
  hobbies: '["building block towers", "color‑sorting games", "picture book reading", "singing repetitive nursery rhymes", "collecting shells at the beach", "simple jigsaw puzzles"]'
  career_goals: Even at three, Eugene talks about future jobs that reflect his love of structure and competition. He often says he wants to be a builder or engineer because he enjoys constructing towers,
    and he imagines being a firefighter because of the clear rules and teamwork involved. These aspirations show his desire for predictable, organized roles where he can excel and be recognized for his
    achievements.
