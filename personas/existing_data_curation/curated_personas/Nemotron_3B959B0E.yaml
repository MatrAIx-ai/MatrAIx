personas:
  professional: A correctional officer named Jacqueline Carter, 23, blends rigorous physical fitness with meticulous report writing, bringing New England‑rooted punctuality and a calm, assertive de‑escalation
    style to her daily duties in the Massachusetts prison system.
  sports: Jacqueline Carter hits the early‑morning trails of Maynard for jogs, lifts weights at the local gym, and cheers on the Boston Red Sox and New England Patriots while participating in the community
    running club that meets every Saturday.
  arts: Jacqueline Carter unwinds with Agatha Christie mysteries, solves crosswords, knits scarves while listening to classic films starring Humphrey Bogart and Ingrid Bergman, and occasionally attends
    a small-town theater production of a Shakespearean play.
  travel: Jacqueline Carter prefers short, well‑planned trips, having explored the historic streets of Boston, the rocky coast of Acadia National Park, and dreaming of a road‑trip along the Blue Ridge Parkway
    while balancing a tight budget and a desire for quiet scenery.
  culinary: Jacqueline Carter favors home‑cooked comfort dishes like chicken pot pie, baked mac & cheese, and apple crumble, seasoning with thyme and rosemary harvested from her balcony garden, and experiments
    with simple sautéed kale for a healthy twist.
  core: Jacqueline Carter is a routine‑driven, detail‑obsessed correctional officer who balances disciplined fitness, modest savings, and a quiet love for mysteries and classic comforts.
background:
  cultural: Jacqueline was born and raised in Maynard, a small suburban town in Middlesex County, Massachusetts. Her family is of European descent, primarily English and Irish ancestry, reflecting the demographic
    makeup of many New England communities. Growing up in a predominantly white, middle‑class neighborhood, she was immersed in the region’s cultural emphasis on practicality, self‑reliance, and community
    involvement. Local traditions such as attending town events, participating in volunteer activities, and observing mainstream American holidays shaped her sense of duty and routine. While her cultural
    upbringing is fundamentally American, she carries subtle influences of her New England heritage—an appreciation for modesty, punctuality, and a strong work ethic.
attributes:
  skills: '["Physical fitness and endurance", "Surveillance and observation", "De‑escalation and conflict‑resolution", "Report writing and documentation", "Knowledge of correctional policies and regulations",
    "Shift scheduling and time management", "Team coordination and communication", "Emergency response and first‑aid basics"]'
  hobbies: '["Jogging on local trails", "Weight training at gym", "Reading mystery and true‑crime novels", "Knitting and crochet", "Balcony vegetable gardening", "Crossword and Sudoku puzzles", "Volunteering
    at animal shelter", "Cooking comfort meals", "Watching classic films with close friends"]'
  career_goals: Jacqueline aims to solidify her career within the Massachusetts correctional system. In the short term, she plans to earn her GED and enroll in an associate‑degree program in criminal justice,
    positioning herself for promotion to senior correctional officer. Over the next five years, she hopes to become a shift supervisor, overseeing a team of officers and ensuring strict compliance with
    security protocols. Long‑term, she aspires to transition into a training or administrative role—such as a corrections instructor or unit manager—where she can share her practical experience and help
    shape policy. She values job security and seeks a stable work schedule that aligns with her preference for routine and predictability.
