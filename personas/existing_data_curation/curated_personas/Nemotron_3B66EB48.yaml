personas:
  professional: A dedicated student leader of the school’s Eco‑Club, Anita Landry channels her curiosity and practicality into organizing weekly bird‑watching expeditions, coordinating recycling drives,
    and presenting findings at the classroom science fair, all while balancing schoolwork and her love of soccer.
  sports: Anita Landry thrives on the soccer field with the school team, hones strokes in swim lessons at the community pool, cheers for the New Orleans Saints and the New Orleans Pelicans, and squeezes
    in backyard pick‑up games with friends, blending structured training with spontaneous play.
  arts: Anita Landry brings bright, Haring‑inspired sketches to life, crafts friendship bracelets while dancing to Clifton Chenier’s zydeco tunes, and has begun learning simple fiddle melodies, weaving
    music and visual art into her everyday play.
  travel: Anita Landry enjoys weekend road trips to the Gulf Coast’s white‑sand beaches, roams the historic alleyways of New Orleans with her grandparents, dreams of the magical fireworks at Disney World,
    and documents each journey in a scrapbook filled with crayon‑drawn maps and pressed leaves.
  culinary: Anita Landry proudly helps stir the simmering gumbo pot, adds a pinch of cayenne to jambalaya, rolls beignets for the family gathering, and experiments with chocolate chip cookie dough, delighting
    in the sizzling aromas of andouille sausage and the sweet dusting of powdered sugar on cupcakes.
  core: Anita Landry, a ten‑year‑old dynamo, balances soccer drills, splashy swimming lessons, crafty bracelet making, fiddle strings, and a secret stash of glitter glue beneath her pillow.
background:
  cultural: Anita was raised in Labadieville, a small, close‑knit town in Assumption Parish, Louisiana. Her family’s white Southern heritage blends with the region’s rich Cajun and Creole influences, exposing
    her to French‑derived phrases, Catholic traditions, and lively communal celebrations such as Mardi Gras and the Courir de Cochon. She attends a local public school where community values, respect for
    nature, and a love of regional cuisine—gumbo, jambalaya, and beignets—are emphasized. Family gatherings often involve music, dance, and storytelling that reflect the cultural mosaic of rural Louisiana,
    fostering her sense of belonging and her appreciation for both tradition and new ideas.
