  career_goals: Sidney aims to advance from first‑line supervision to an office manager or operations manager role within the next three years, leveraging a Certified Administrative Professional (CAP) credential
    or a short project‑management course. She wants to lead broader efficiency initiatives, mentor junior staff, and eventually consult part‑time for nonprofit organizations in Brooklyn, helping them build
    sustainable administrative systems while securing a comfortable retirement plan.
