persona_description: A civil rights activist and advocate for racial equality, particularly focusing on the issues of poverty, education, and healthcare. Known for her work with the King Center and for
  her advocacy in the Civil Rights Movement. Her activism led to the establishment of the Martin Luther King Jr. National Historic Site and the Martin Luther King Jr. Memorial, and she continues to be a
  vocal advocate for the rights of marginalized communities.
