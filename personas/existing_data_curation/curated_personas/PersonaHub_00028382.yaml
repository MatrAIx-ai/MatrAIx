persona_description: A Tohono O’odham activist fighting for cultural and religious rights against the United States government's actions and the construction of a border wall, while also preserving her
  traditional way of life and homelands. She is an O’odham activist working to halt the cultural and environmental devastation caused by the government's policies and the ongoing exodus of people moving
  north. She is an active member of the Tohono O’odham Nation in southern Arizona and has been involved in the fight against the wall and other government actions against her people. She is a vocal advocate
  for the preservation of her culture and way of life, and is dedicated to fighting for the rights of her people against the injustices they face.
