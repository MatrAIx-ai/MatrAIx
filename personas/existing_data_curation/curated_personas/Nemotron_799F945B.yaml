  career_goals: Benny aims to move into a senior leadership role within Portland’s EMS department, such as Shift Supervisor or Operations Manager, where he can shape protocols and improve response efficiency.
    He is also interested in pursuing a degree in Health Administration to blend his technical expertise with organizational strategy. Long‑term, he hopes to develop a community‑focused outreach program
    that trains volunteers in first aid and promotes data‑driven emergency preparedness across Multnomah County.
