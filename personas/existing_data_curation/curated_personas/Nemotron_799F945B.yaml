personas:
  professional: Benny Chappell, a 35‑year‑old Portland paramedic, leverages their STEM‑rooted analytical mindset and meticulous documentation skills to excel in rapid trauma care while routinely spearheading
    protocol reviews and team briefings, embodying an organized, talkative nature and a desire for routine leadership in emergency services.
  sports: Benny Chappell, a dedicated pickup‑basketball player in Portland’s local league, also hikes the Forest Park trail system every weekend with their wife and dog, avidly supports the Portland Trail Blazers
    and Timbers, and maintains a disciplined fitness routine that includes weekly strength training at the neighborhood gym.
  arts: Benny Chappell frequently attends Portland Center Stage productions, enjoys live performances by the indie folk group The Decemberists, and collects vintage playbills, finding that their talkative,
    sociable side thrives in theater lobbies where they debate plot twists over craft‑beer.
  travel: Benny Chappell plans their travel with a blend of structured itineraries and spontaneous road trips, having explored the Oregon Coast, Seattle, and a brewing tour in Bavaria, while eyeing future
    visits to Tokyo for a medical conference and the Grand Canyon for a family hiking adventure, always booking lodging through rewards points to stay within their budget.
  culinary: Benny Chappell’s culinary pursuits feature weekend experiments with heirloom tomato bruschetta, rosemary‑infused roast chicken, and pairing their seasonal home‑brews—often flavored with coriander,
    orange peel, and pumpkin—with hearty dishes like beef stew, reflecting an organized approach to recipe testing and a love for tangible, flavorful results.
  core: Benny Chappell, a 35‑year‑old paramedic who blends routine‑driven emergency expertise with a bustling social life of basketball, brewing, and theater, is a meticulous planner who sometimes forgets
    to stretch after shifts and hoards an ever‑growing collection of craft‑beer mugs, yet they always find time to rally friends for a spontaneous game.
background:
  cultural: Benny comes from a middle‑class white American family with roots in the Pacific Northwest. His upbringing emphasized practicality, self‑reliance, and community service, values reinforced by
    his STEM education and paramedic career. Living in Portland, he embraces the region’s outdoor lifestyle and environmental awareness while maintaining traditional family rituals such as holiday gatherings
    and weekend barbecues. He participates in local events like the Portland Rose Festival and supports neighborhood initiatives that blend communal spirit with pragmatic problem‑solving.
