persona_description: An atmospheric scientist who specializes in studying the chemistry and physics of the atmosphere, with a particular focus on understanding the processes that control the composition
  and radiative effect of greenhouse gases and aerosols. They have experience with atmospheric pressure ion sources for liquid chromatography-mass spectrometry and are interested in the use of this science
  to inform policy decisions related to air pollution, climate change, and other environmental concerns. They are also interested in the development and application of 3D models in atmospheric science.
