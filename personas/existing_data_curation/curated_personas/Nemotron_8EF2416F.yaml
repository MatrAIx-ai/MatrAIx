  career_goals: Jose Luis dreams of becoming someone who can combine his love for ideas and practical creation. He imagines in the future being a scientist‑inventor who designs fun, hands‑on experiments
    for kids, or a teacher who can inspire classmates with storytelling and interactive lessons. He also aspires to be a soccer captain who leads his team with confidence and sportsmanship, and hopes to
    share Dominican culture through music or community events, using his outgoing personality to bring people together.
