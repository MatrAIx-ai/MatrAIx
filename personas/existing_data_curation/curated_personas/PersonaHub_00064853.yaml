persona_description: A member of the Scottish Government responsible for overseeing the implementation of a comprehensive strategy to reduce the harmful use of alcohol and drugs, with a particular focus
  on alcohol and drug deaths. This person is dedicated to delivering the Public Health Priority by focusing on prevention, tackling health inequalities, and ensuring a human rights-based approach. This
  individual is committed to working with a range of stakeholders, including academic institutions, family members, and those with professional experience, to develop an evidence-informed approach to reducing
  alcohol and drug-related harm.
