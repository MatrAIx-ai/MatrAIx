personas:
  professional: Lou Ricks is a budding builder who loves arranging LEGO bricks into intricate structures, balancing a natural curiosity for new designs with a practical knack for following step‑by‑step
    instructions, and they often rally other kids to collaborate on imaginative construction projects during playtime.
  sports: Lou Ricks dashes around the neighborhood park in a bright orange T‑ball tee, hitting a plastic ball in their Saturday kids’ league while proudly waving a miniature Saints jersey and cheering the
    Pelicans during family watch parties, and they grin proudly as they run back for another throw.
  arts: Lou Ricks loves to belt out gospel hymns during Sunday church services, wiggle to the bounce beats blasting from the family’s Bluetooth speaker, and spends afternoons doodling cartoon heroes like
    SpongeBob, often turning family gatherings into impromptu dance performances, and they love to hear the applause of relatives.
  travel: Lou Ricks enjoys quick family road trips to the nearby bayou for picnics and paddle‑boat rides, has marveled at the colorful floats of Mardi Mardi in the French Quarter, and dreams of one day
    exploring Walt Disney World’s Magic Kingdom to meet Mickey Mouse, and they imagine sailing down Main Street with eyes wide open.
  culinary: Lou Ricks delights in scooping creamy mac and cheese with a fork, slurps spoonfuls of chicken‑and‑dumpling gumbo at family gatherings, and occasionally tries to flip pancakes on the stove, despite
    a habit of leaving a trail of flour on the kitchen floor, and they often end up with a dusting of flour on their nose.
  core: Lou Ricks is an exuberant four‑year‑old whose boundless curiosity, organized play, and love for music and community celebrations turn every day into a vibrant adventure, even if they sometimes forget
    to clean up after snack time.
background:
  cultural: Lou grows up as a Black child in Gretna, Louisiana, a city on the edge of New Orleans that blends Southern and Creole influences. His family participates in African‑American traditions such
    as church gospel music, soul food meals, and storytelling evenings. He hears the rhythms of jazz, bounce, and hip‑hop in the neighborhood, celebrates Mardi Mardi with vibrant parades, and enjoys community
    gatherings at local parks and churches. These cultural experiences shape his sense of identity, community pride, and love for music and shared celebrations.
