    parades and festivals"]'
  career_goals: Though still young, Lou already imagines future roles where he can help others and work with teams. He dreams of becoming a firefighter because he loves the idea of rescuing people and using
    tools, a builder or construction worker to create things he sees in his play, and a community leader like a teacher or coach who can share stories and guide friends. He also likes the idea of performing
    music, inspired by the local jazz sounds, hoping to play an instrument one day.
