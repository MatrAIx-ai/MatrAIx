personas:
  professional: Jitendra Sookdeo, a seasoned barber with over forty years of precision haircutting, straight‑razor shaves, and beard sculpting, blends traditional scalp‑massage rituals with modern styling
    while they mentor younger barbers, reflecting a curious yet relaxed approach that values flexibility over strict planning and occasionally worries about preserving the shop’s historic wooden fixtures.
  sports: Jitendra Sookdeo follows the Colorado Avalanche and the Denver Broncos with loyal enthusiasm, they join a weekend walking group in City Park for gentle cardio, occasionally practice yoga for flexibility,
    and sometimes forget to stretch after a busy day, reflecting a laid‑back yet health‑conscious attitude.
  arts: Jitendra Sookdeo paints watercolors of the Rockies, they frequent local galleries to see works by artists like Jeremy Mann and Georgia O’Keeffe, enjoy listening to raga performances by Ravi Shankar
    alongside Colorado jazz pianist Jeremy Pelt, and collect vintage barber tools as functional art, embodying their love of aesthetic detail and cultural fusion.
  travel: Jitendra Sookdeo has trekked the Canadian Rockies, explored the streets of Old Delhi during Diwali, they dream of visiting the Maori cultural sites of New Zealand, and plan future trips around
    community festivals that align with their love for art and traditional rituals, balancing travel excitement with the need for a predictable schedule.
  culinary: Jitendra Sookdeo cooks spiced lentil dal with cumin, coriander, and turmeric, pairs it with garlic naan brushed with ghee, they also experiment with masala chai infused with cardamom and fresh
    cilantro garnish, although their tendency to misplace pantry items sometimes leads to spontaneous improvisations.
  core: Jitendra Sookdeo is a curious, slightly disorganized 60‑year‑old barber who blends artistic expression, cultural traditions, and mentorship, while juggling occasional worry and a relaxed approach
    to both work and life.
background:
  cultural: Jitendra was born to a family of Indo‑Caribbean (Indo‑Guyanese) descent that migrated to the United States in the early 1970s. Raised in a household that celebrated Diwali, Holi, and Eid, he
    grew up speaking a blend of English and Gujarati at home and was taught the values of hospitality, respect for elders, and community cohesion. These traditions inform his approach to client service—viewing
    each haircut as a personal ritual of care. While he now primarily speaks English and embraces the eclectic culture of Denver, he retains a strong connection to his heritage through cuisine, music, and
    participation in Denver’s South Asian cultural events, where he often volunteers to demonstrate traditional grooming practices.
