  career_goals: Eric aims to move into a supervisory or operations‑management role within the next three years, leveraging his competitive drive to achieve top‑team performance metrics and earn recognition
    as a high‑performing leader. He plans to obtain a Certified Customer Service Professional (CCSP) credential and lead a cross‑functional team that implements customer‑experience enhancements while maintaining
    cost‑effectiveness. Long‑term, he envisions overseeing an entire customer‑service department, influencing company‑wide policies, and securing a stable retirement for his family.
