  career_goals: Shane aims to move into a senior IT management role within the next few years, overseeing a team that implements structured, predictable support processes. He hopes to become a recognized
    subject‑matter expert on emerging technologies, mentor junior staff, and eventually launch a boutique consulting firm focused on small‑business IT solutions. Reducing workplace stress for himself and
    his team while maintaining high performance is a key ambition.
