personas:
  professional: Shane Poventud, a seasoned computer support specialist who excels in hardware troubleshooting, network configuration, and system administration across Windows and Linux, blends a methodical,
    structure‑focused mindset with a sociable, talkative style to produce precise documentation and engaging user training, and they channel their competitive drive into continuous process improvement while
    mentoring junior staff on the path toward senior IT management.
  sports: Shane Poventud, a lifelong Boston Red Sox fan who faithfully watches every game and cheers for the Boston Celtics in winter, participates in the local senior walking club and the Boston Chess
    Club, enjoys seasonal baseball and hockey, and they keep fit through daily park strolls while occasionally joining a weekend bowling league for a competitive edge.
  arts: Shane Poventud, an active participant in community theater who both acts in and organizes productions, delights in the works of William Shakespeare and the sci‑fi novels of Isaac Asimov, regularly
    attends performances by the Boston Symphony Orchestra and enjoys listening to Neil Young, and they find their sociable energy and competitive spirit thriving in rehearsals and post‑show gatherings.
  travel: Shane Poventud, who favors structured itineraries, enjoys weekend getaways to historic coastal towns like Nantucket and Portland, Maine, has a dream trip to Barcelona for a theater festival, and
    they balance travel cost with family budget constraints while still seeking occasional spontaneous detours during daily walks that inspire future road‑trip plans.
  culinary: Shane Poventud, a passionate home cook who regularly prepares New England clam chowder, herb‑crusted lamb, and homemade apple pie for dinner gatherings, blends their woodworking skill to craft
    custom cutting boards and enjoys using fresh thyme, rosemary, and aged cheddar, and they occasionally over‑season dishes when nervous, revealing a quirky habit linked to their anxiety.
  core: Shane Poventud, a methodical yet talkative IT veteran whose competitive streak fuels community theater, trivia nights, and meticulous budgeting, and they battle anxiety that drives both disciplined
    routines and occasional impulsive splurges.
background:
  cultural: Shane is a white American raised in the Boston suburbs of New England. His upbringing reflects the region's emphasis on education, practicality, and community involvement. He grew up participating
    in local traditions such as town fairs and seasonal celebrations, values hard work and reliability, and maintains connections to a modest middle‑class, possibly Irish‑American heritage, which influences
    his strong sense of family, civic duty, and appreciation for regional history.
