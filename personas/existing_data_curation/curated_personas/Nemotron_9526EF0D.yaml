  hobbies: '[''Reading classic literature'', ''Historical non‑fiction'', ''Backyard gardening'', ''Hiking'', ''Experimental cooking'', ''Fermentation'', ''Visiting small art galleries'', ''Attending indie
    music shows'', ''Book club'', ''Yoga'', ''DIY pottery'']'
  career_goals: Kirsten aims to transition from her current informal role into a professional trajectory that leverages her research, writing, and organizational strengths. Over the next year she plans
    to launch a freelance writing and content‑strategy business focused on cultural commentary, sustainable living, and Portland's local arts scene. To formalize her skill set, she intends to enroll in
    a part‑time project‑management certification program. Her five‑year ambition is to become a recognized contributor to regional magazines and non‑profit cultural organizations, secure recurring editorial
    contracts, and expand her venture to offer consulting services for small enterprises seeking strategic communication and efficient project execution.
