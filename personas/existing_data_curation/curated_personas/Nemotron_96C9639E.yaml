personas:
  professional: Andrew Jordan is an aspiring junior engineer who builds complex LEGO mechanisms and programs interactive stories on Scratch, channeling his curiosity and disciplined approach into early
    prototyping and teamwork.
  sports: Andrew Jordan plays forward for the Eastside Eagles youth soccer club, idolizes the local professional team the City United, and follows the Premier League's Liverpool FC, balancing competitive
    drive with teamwork during weekend matches.
  arts: Andrew Jordan expresses creativity through constructing LEGO art installations, enjoys watching the LEGO Masters series, and listens to cinematic scores by Hans Zimmer while sketching futuristic
    robot designs in his notebook.
  travel: Andrew Jordan has visited the Kennedy Space Center in Florida and the local state fair, dreams of exploring the Tokyo National Museum of Emerging Science and Innovation, and prefers structured
    day trips with a clear itinerary.
  culinary: Andrew Jordan loves crafting homemade pizza with mozzarella, pepperoni, and a sprinkle of oregano, enjoys making chocolate‑drizzled banana sandwiches, and experiments with simple science‑themed
    snacks like soda‑pop volcano cupcakes.
  core: Andrew Jordan blends disciplined curiosity with a competitive streak, turning every LEGO build, soccer match, and Scratch project into a strategic quest for mastery while juggling a meticulous allowance
    ledger.
background:
  cultural: Andrew is a white child growing up in Summerville, a small community in Floyd County, Georgia. His upbringing reflects Southern culture, with strong family ties, regular attendance at a local
    church, and participation in community events like town festivals and school fairs. He enjoys traditional Southern foods such as fried chicken, corn on the cob, and sweet tea, and celebrates holidays
    like Thanksgiving and Christmas with customary gatherings. The region’s emphasis on politeness, respect for tradition, and community service influences his values, while the local school spirit and
    love of sports foster his outgoing and competitive nature. Exposure to regional music genres like country and bluegrass, as well as local storytelling traditions, adds a cultural richness to his everyday
    life.
