  career_goals: While still in elementary school, Andrew dreams of a future where he can combine his love of discovery with his disciplined work ethic. He aspires to become an engineer or astronaut, imagining
    himself designing rockets or building innovative tools that help people. He also envisions leading a competitive sports team, aiming to become the captain of his school soccer squad and guide it to
