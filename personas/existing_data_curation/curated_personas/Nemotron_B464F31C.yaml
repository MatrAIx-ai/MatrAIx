personas:
  professional: Sarah Levey, a seasoned property and community association manager with fifteen years of experience, leverages data analytics, budgeting expertise, and a keen eye for historic preservation
    to drive sustainable, art‑integrated mixed‑use developments across Colorado's Front Range, while maintaining a competitive edge through KPI tracking and smart‑building tech adoption.
  sports: Sarah Levey, an avid hiker and seasonal skier, joins the Colorado Mountain Club for weekend trail climbs, tracks her mileage on Strava, and roots for the Denver Broncos, Colorado Rockies, and
    Colorado Avalanche, while balancing her competitive nature with disciplined training routines.
  arts: Sarah Levey, a watercolor enthusiast and amateur architectural photographer, frequents intimate exhibitions at the Boulder Museum of Contemporary Art, draws inspiration from Ansel Adams and Georgia
    O'Keeffe, and playlists include Bon Iver and The National during her creative sessions.
  travel: Sarah Levey, a detail‑oriented traveler, plans eco‑focused itineraries that blend adventure and relaxation, such as hiking Zion National Park, exploring Iceland's geothermal sites, and savoring
    a weekend stay at an off‑grid cabin in Patagonia, while budgeting for sustainable accommodations.
  culinary: Sarah Levey, a competent home cook, prefers farm‑to‑table dishes like quinoa‑crusted Colorado trout with roasted beets and goat cheese, enjoys experimenting with seasonal herbs such as sage
    and rosemary, but sometimes skips meals when deep into renovation projects.
  core: Sarah Levey, a data‑driven, solitary yet curious professional, balances a competitive drive for sustainable real‑estate excellence with a penchant for watercolor painting, mountain hikes, and methodical
    budgeting, while occasionally neglecting meals during intense work phases.
background:
  cultural: Sarah grew up in a middle‑class white family in the rural town of Howard, Colorado, where the legacy of ranching and mining intermingles with a growing emphasis on outdoor recreation and environmental
    stewardship. Her upbringing blended Midwestern values of self‑reliance and community service with the progressive, sustainability‑oriented culture that characterizes much of modern Colorado. She attended
    the University of Colorado for a bachelor's degree in a STEM field, where she was exposed to both rigorous scientific training and a vibrant campus art scene. While her cultural roots include traditional
    Protestant influences, she now identifies as secular, drawing on the region’s appreciation for individualism, nature, and innovative thinking to shape her personal and professional outlook.
