  career_goals: Sarah aims to become a senior regional portfolio manager overseeing multiple mixed‑use developments across the Front Range, with a focus on sustainable design and integrated public art.
    She plans to earn the Certified Property Manager (CPM) designation and develop expertise in smart‑building technology to enhance energy efficiency. Within five years, she hopes to launch her own consultancy
    that advises homeowner associations on data‑driven governance and environmentally responsible upgrades. Ultimately, she aspires to influence local zoning policy to support innovative, community‑focused
    projects that blend modern amenities with Colorado’s natural landscape.
