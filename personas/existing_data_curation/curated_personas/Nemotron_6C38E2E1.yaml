  career_goals: She aims to release a full-length debut album that blends contemporary pop with New Orleans jazz and zydeco influences within the next two years. Angela seeks a regular residency at a prominent
    Metairie venue, wants to write songs for regional artists, and plans to open a small community music studio where she can teach and mentor aspiring musicians. Long-term, she hopes to become a recognized
    voice in the Gulf Coast music scene while maintaining a stable, diversified income through performance, teaching, and production work.
