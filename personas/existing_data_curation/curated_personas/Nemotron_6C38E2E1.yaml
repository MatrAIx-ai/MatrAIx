personas:
  professional: Angela Green, a 34‑year‑old singer‑songwriter and studio producer, harnesses her precise vocal technique, piano and guitar mastery, and savvy digital‑audio‑workstation skills to craft pop
    songs layered with swing‑time jazz and zydeco rhythms, while her methodical planning and community‑focused temperament keep each rehearsal, gig, and social‑media launch running on schedule.
  sports: Angela Green stays fit by hiking the swamps of Jean Lafitte National Historical Park on weekends, attending weekly Vinyasa classes at Metairie Yoga Studio, cheering the New Orleans Saints on Sundays,
    and joining the local recreational softball league that plays at St. Mary’s Park each summer.
  arts: Angela Green delights in performing with her community choir, studying the phrasing of Wynton Marsalis and the storytelling of Harry Connick Jr., while frequently attending Mardi Gras parades and
    savoring the stagecraft of Broadway revivals starring Patti LuPone, and she collects vintage concert posters of Ella Fitzgerald and Beyoncé for inspiration.
  travel: Angela Green prefers well‑planned road trips that weave music festivals and culinary stops, having explored Nashville’s songwriting scene and Savannah’s historic squares, while dreaming of a spring
    crawl through the jazz cafés of Paris and a week‑long swamp‑boat adventure in the Everglades, all balanced against a modest budget and family commitments.
  culinary: Angela Green, an avid home chef, perfects Creole classics like gumbo with a dark roux, Andouille sausage, okra, and a pinch of file powder, whips up spicy étouffée using shrimp and fresh tarragon,
    and treats friends to beignets dusted with powdered sugar, while still experimenting with farm‑to‑table salads featuring home‑grown herbs and heirloom tomatoes.
  core: Angela Green blends structured ambition with spontaneous jam sessions, channeling the rhythm of Gulf Coast festivals into disciplined songwriting, yet habitually leaves their favorite acoustic guitar
    unplugged on the kitchen counter, forever losing a string to the dog’s mischievous chew.
background:
  cultural: Angela is a white Southern American who grew up in the Greater New Orleans area. Her upbringing was shaped by the region's rich musical heritage—jazz, blues, zydeco, and the festive spirit of
    Mardi Gras—while her family traditions reflect a blend of French, Irish, and German ancestry. She was raised in a Catholic household that emphasized community and choir singing, and she embraces the
    multicultural flavors, language rhythms, and hospitality characteristic of Gulf Coast culture.
