  career_goals: Karina aims to transition into a senior HR leadership role, such as HR Manager or HR Business Partner, where she can shape strategic workforce planning and champion an inclusive culture.
    She plans to earn a SHRM‑CP certification within the next two years and to lead a company‑wide employee wellness program that integrates flexible work options. Long‑term, she hopes to mentor emerging
    HR professionals in the Indianapolis community and to collaborate with local Mexican‑American organizations on workforce development initiatives.
