personas:
  professional: Karina March, a seasoned HR professional with over two decades of experience in employee relations and talent acquisition, blends a curious eye for emerging HR technology with a practical,
    compliance-driven approach, using their calm mediation style to build inclusive workplaces while embracing a flexible, occasionally disorganized workflow.
  sports: Karina March supports the Indianapolis Colts and Indiana Pacers fervently, joins a local adult softball league on summer weekends, practices yoga three times a week at a downtown studio, and hikes
    the Indiana Dunes trail for cardio, balancing competitive spirit with a community-oriented fitness outlook.
  arts: Karina March immerses themselves in the arts by attending salsa nights featuring live bands playing Tito Puente and Celia Cruz, knitting intricate shawls while listening to spoken-word podcasts,
    and drawing inspiration from the vibrant murals of Diego Rivera and Frida Kahlo during local cultural festivals.
  travel: Karina March’s travel style blends purposeful family reunions in Oaxaca during Día de los Muertos with spontaneous weekend getaways to the Indiana Dunes and the Blue Ridge Parkway, favoring a
    mix of cultural immersion and nature-centric relaxation while navigating budget constraints and a busy work schedule.
  culinary: Karina March delights in crafting traditional tamales and complex mole sauces, often adding unexpected twists like dark chocolate or dried chilies from their garden’s oregano and epazote, yet
    their habit of leaving unfinished batches on the counter reflects a slightly chaotic kitchen organization despite their love for culinary perfection.
  core: Karina March is a kind, community-focused HR leader who balances curiosity with practicality, embraces flexible routines, occasionally lets disorganization slip, and finds grounding in yoga, salsa,
    and the aroma of simmering mole.
background:
  cultural: Karina is a second‑generation Mexican‑American who grew up in a bilingual household in the Midwest. Her family maintained traditions such as Día de los Muertos, Sunday tamale cooking, and festive
    gatherings that emphasized community and respect for elders. She is fluent in both Spanish and English and remains active in Indianapolis's Mexican cultural scene, volunteering at the Mexican American
    Cultural Center of Indiana and participating in local festivals. The collectivist values and hospitality of her heritage inform her cooperative work style and her dedication to fostering inclusive environments.
