personas:
  professional: Timothy Petersen, a curious infant who marvels at patterns and sounds, displays early observational skills that hint at a future in creative design or early childhood education, while their
    naturally relaxed, somewhat disorganized play style reflects a preference for flexibility over strict structure.
  sports: Timothy Petersen enjoys toddling in the neighborhood park, giggling while watching Charlotte FC highlights on family evenings, and participating in a baby splash swim class where they splash enthusiastically
    with peers, embodying a playful, low‑pressure approach to early physical activity.
  arts: Timothy Petersen delights in the colorful downtown murals, sings along during community music sessions at the public library, and claps to the rhythmic beats of local folk bands, weaving an early
    love for artistic expression into daily routines.
  travel: Timothy Petersen’s family has taken short road trips to the Outer Banks for sand play, visited the interactive Children’s Museum of the Arts in Charlotte, and plans a future visit to Washington
    D.C.’s National Air and Space Museum, balancing adventurous curiosity with the comfort of familiar home gatherings.
  culinary: Timothy Petersen favors smooth sweet potato mash, buttery macaroni and cheese, and soft banana slices, often engaging in messy self‑feeding that leaves a colorful splatter on the high chair,
    while parents encourage tasting new textures and flavors within the familiar warmth of family meals.
  core: Timothy Petersen is a curious, art‑loving toddler who balances playful messiness with gentle kindness, embraces family traditions, and explores the world one sensory experience at a time.
background:
  cultural: Timothy is a white child raised in Charlotte, North Carolina, within a family that blends traditional Southern values—such as close‑knit family meals and community gatherings—with an appreciation
    for the region's vibrant arts scene. His parents encourage curiosity and expose him to local museums, public murals, and community music programs, fostering an early love for artistic expression while
    grounding him in the cultural fabric of the American South.
