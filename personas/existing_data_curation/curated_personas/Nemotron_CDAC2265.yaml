personas:
  professional: Angela Abner, a 31‑year‑old social worker based in Brooklyn, they combine meticulous needs‑assessment and crisis‑intervention expertise with a compassionate, flexible mindset, maintaining
    precise documentation while allowing room for spontaneous community outreach, all in pursuit of an LCSW credential and a future program‑director role.
  sports: Angela Abner, a 31‑year‑old Brooklynite, they practice yoga three times a week at a local studio, join a neighborhood running club for weekend 5K runs, play casual basketball at the community
    center, cheer passionately for the Brooklyn Nets and the New York Yankees, and during winter they also compete in an indoor soccer league at the YMCA.
  arts: Angela Abner, a 31‑year‑old creative enthusiast, they attend weekly spoken‑word events featuring poets like Danez Smith, enjoy live jazz sets by Christian McBride at the Blue Note, immerse themselves
    in contemporary works by Ta‑Nehisi Coates and Angie Thomas, and channel that inspiration into watercolor paintings of Brooklyn streets.
  travel: Angela Abner, a 31‑year‑old urban explorer, they favor a blend of low‑key weekend trips to nearby spots like Coney Island and the Hamptons with occasional long‑haul journeys to New Orleans for
    its music and cuisine, Savannah for its historic charm, and Ghana to connect with ancestral roots, planning most trips on a flexible budget while still using travel‑reward points for flights.
  culinary: Angela Abner, a 31‑year‑old food lover, they relish cooking Southern classics like collard greens seasoned with smoked turkey, fried catfish with a cornmeal crust, and sweet potato pie, often
    adding modern twists such as quinoa‑infused collard greens or kale‑enhanced gumbo, while also treating themselves to brunch at Jacob's Pickles and exploring Brooklyn’s food‑truck scene for innovative
    dishes.
  core: Angela Abner, a 31‑year‑old Brooklyn social worker, they blend structured advocacy with spontaneous community‑garden harvests, yoga calm, and midnight jazz, always juggling a disciplined budget
    with occasional impulse splurges on concert tickets.
background:
  cultural: Angela is a second‑generation African‑American who grew up in a close‑knit Brooklyn family whose ancestors participated in the Great Migration. Her upbringing was infused with Black cultural
    traditions—Sunday church services, soulful cooking, storytelling, and participation in community festivals such as the West Indian Day Parade and Juneteenth celebrations. Her graduate studies in arts
    and humanities deepened her appreciation for Black history, literature, and diaspora arts, shaping her culturally competent practice as a social worker. Angela actively engages with local Afro‑centric
    community centers, mentors youth from historically Black neighborhoods, and incorporates an understanding of systemic racism and community resilience into her professional advocacy.
attributes:
  skills: '[''Needs assessment'', ''Crisis intervention'', ''Individualized service planning'', ''Active listening'', ''Conflict resolution'', ''Resource navigation'', ''Community outreach'', ''Cultural
    competency'', ''Case documentation'', ''Supervision & mentorship'']'
  hobbies: '[''Yoga'', ''Community gardening'', ''Reading (African-American literature)'', ''Spoken‑word poetry events'', ''Cooking (Southern‑inspired cuisine)'', ''Watercolor painting'', ''Journaling'',
    ''Walking in Prospect Park'', ''Listening to jazz'']'
  career_goals: Angela aspires to obtain her Licensed Clinical Social Worker (LCSW) credential within the next two years and to transition into a program‑director role at a community mental‑health center
    serving underserved Black families in Brooklyn. She aims to design and lead a flexible, evidence‑based after‑school and family‑support program that integrates trauma‑informed care, cultural empowerment,
    and skill‑building workshops. Long‑term, she envisions influencing local policy by serving on city advisory boards, securing equitable funding for community resources, and eventually establishing a
    nonprofit hub that offers integrated services—counseling, legal aid, and job training—grounded in the strengths of the Black diaspora.
