  hobbies: '[''Watercolor painting'', ''Photography'', ''Hiking'', ''Reading mystery novels'', ''Writing short fiction'', ''Acoustic guitar'', ''Chess'', ''Attending art exhibitions'', ''Volunteer rodeo
    patrol'', ''Gardening'', ''Woodworking'']'
  career_goals: Robert aspires to advance to a detective sergeant position within the Kittitas County Sheriff's Office, where he can lead a specialized unit focusing on cold cases and art‑theft investigations.
    He plans to complete a bachelor's degree in criminal justice part‑time to deepen his theoretical understanding and enhance his eligibility for promotion. He also intends to develop a mentorship program
    for junior investigators and to champion mental‑health resources for detectives, reflecting his awareness of stress and emotional strain in the profession. Ultimately, he hopes to author a reflective
    memoir that blends investigative insight with his artistic sensibility, contributing to both law‑enforcement literature and creative writing.
