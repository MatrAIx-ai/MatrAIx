personas:
  professional: Robert Mann, a seasoned detective in Kittitas County with a meticulous eye for detail and a creative flair, they leverage their systematic crime‑scene processing, forensic acumen, and artistic
    imagination to solve complex cases while methodically pursuing a promotion to detective sergeant and championing mental‑health resources for their peers.
  sports: Robert Mann, an avid hiker and member of the Ellensburg Trail Club, they follow the Seattle Seahawks and Washington State Cougars, participate in weekend rides on their mountain bike through the
    Cascades, and volunteer as a safety patrol on the annual Ellensburg Rodeo, blending a love of the outdoors with a modest commitment to local sports culture.
  arts: Robert Mann, a watercolor enthusiast who captures the Columbia River's misty hues, they spend evenings strumming acoustic guitar to the melodies of Neil Young and John Prine, visit the downtown
    gallery to study contemporary photography, and draw inspiration from mystery authors like Agatha Christie for their own short fiction.
  travel: Robert Mann, a methodical planner who prefers road trips to nearby natural wonders such as the San Juan Islands and the Alpine Lakes Wilderness, they have a bucket list that includes a photography
    pilgrimage to Florence's Uffizi Gallery and an art‑theft symposium in Paris, balancing travel expenses with their part‑time college tuition.
  culinary: Robert Mann, a home‑cooking enthusiast who favors pan‑seared salmon with dill, wild mushroom risotto, and a hearty pea soup seasoned with rosemary, they enjoy pairing their meals with locally
    roasted coffee, and occasionally experiment with smoked brisket after attending the rodeo’s charity cook‑outs.
  core: Robert Mann, a methodical detective with a creative soul, they channel stress into watercolor, guitar, and relentless pursuit of cold cases while juggling budget constraints and occasional impulsive
    splurges on hobby gear.
background:
  cultural: Robert grew up in a modest, working‑class family in the Pacific Northwest, the son of a logging foreman and a public‑school teacher. His upbringing in a small town similar to Ellensburg emphasized
    self‑reliance, community involvement, and respect for the region’s natural environment. He identifies with mainstream Anglo‑American cultural traditions—celebrating holidays such as Thanksgiving and
    the Fourth of July, enjoying high‑school football games, and participating in local potlucks—but also acknowledges the area's Indigenous heritage, often attending cultural events hosted by the Yakama
    Nation. He values the blend of rugged frontier spirit and progressive, university‑influenced ideas that characterize Ellensburg’s community.
attributes:
  skills: '[''Crime‑scene processing'', ''Forensic evidence collection'', ''Interview and interrogation'', ''Case documentation'', ''Data synthesis and pattern analysis'', ''Digital evidence handling'',
