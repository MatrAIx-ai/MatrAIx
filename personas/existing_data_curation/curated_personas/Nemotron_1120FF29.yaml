  hobbies: '["Reading historical and literary novels","Cooking traditional and experimental Mexican dishes","Gardening herbs, tomatoes, and chilies","Knitting scarves and blankets","Walking in local parks
    and nature trails","Participating in senior center book club and bridge games","Attending Dia de los Muertos and folk dance events","Teaching informal Spanish conversation circles","Collecting Mexican
    pottery and crafts","Learning digital photography to document family and community"]'
  career_goals: Maria aims to preserve and share her cultural heritage by completing a family oral‑history project and publishing a bilingual cookbook that pairs recipes with personal stories. She hopes
    to be recognized as a cultural resource for the Chino Hills senior center, offering weekly Spanish conversation circles and art‑history talks. Additionally, she seeks to maintain her health through
    regular walking and gardening, and wishes to travel to her hometown in Jalisco, Mexico, to reconnect with relatives and document local traditions for future generations.
