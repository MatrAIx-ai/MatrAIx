persona_description: A researcher in clinical trials who is interested in understanding the assumptions and limitations of different methods for handling missing data, and is looking for methods that provide
  valid type I error rates under explicitly stated assumptions taking missing data status into account. They are open to more robust and reliable models and are willing to collect auxiliary data, information
  about reason for drop-out, and follow up on drop-outs to obtain efficacy outcome data. They are also interested in sensitivity analyses to assess the sensitivity of the results to the assumptions about
  the missing data mechanism.
