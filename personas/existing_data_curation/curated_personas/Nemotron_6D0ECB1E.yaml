  hobbies: '[''gardening'', ''woodworking'', ''photography'', ''playing harmonica'', ''listening to blues and gospel music'', ''attending local art exhibitions'', ''visiting museums'', ''playing chess'',
    ''cooking Southern recipes'', ''genealogical research'', ''writing memoirs'', ''volunteering at church and senior center'']'
  career_goals: At 82, Shawn aims to leave a lasting legacy by documenting the oral histories of Mount Olive, creating a community archive, and completing a memoir that captures his family’s journey and
    the region’s cultural shifts. He aspires to mentor younger volunteers at the local historical society, raise funds for a modest scholarship for high‑school seniors interested in the arts or preservation,
    and maintain his health through regular walks. He also plans to continue attending art exhibits, learning new techniques, and perhaps taking a community‑college class in digital photography.
