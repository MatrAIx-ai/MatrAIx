personas:
  professional: Shawn Lica, a veteran community archivist and home‑repair enthusiast, leverages decades of hands‑on problem‑solving, meticulous record‑keeping, and charismatic public speaking to coordinate
    church events, mentor youth volunteers, and preserve Mount Olive’s oral histories, all while applying a skeptical eye that pushes them to fact‑check every story before it goes into the community archive.
  sports: Shawn Lica, an avid follower of the Mississippi State Bulldogs football and the New Orleans Saints, participates in the senior center’s morning walking club and tends to their garden as a daily
    low‑impact workout, while keeping a competitive streak alive by tracking personal step counts against teammates on a digital pedometer.
  arts: Shawn Lica, a dedicated harmonica player and frequent visitor to the Mississippi State University Museum, immerses themselves in the blues of B.B. King, the gospel tones of The Blind Boys of Alabama,
    and the impressionist landscapes of Winslow Homer, often photographing local moss‑draped oaks to inspire their own sketchbook.
  travel: Shawn Lica prefers slow, purposeful road trips that blend history and nature, having driven to the historic Natchez Trace Parkway, the coastal town of Gulfport for fresh seafood, and a weekend
    pilgrimage to New Orleans’ French Quarter, yet they dream of photographing the mist‑shrouded Blue Ridge Mountains in autumn.
  culinary: Shawn Lica, an accomplished Southern home cook, expertly prepares heirloom collard greens seasoned with smoked turkey, crispy fried catfish using cornmeal, and buttery peach cobbler, often experimenting
    with heirloom varieties of sweet potatoes and okra harvested from their own garden, and they relish sharing leftovers at community potlucks.
  core: Shawn Lica is a meticulous, curiosity‑driven octogenarian who balances a fierce competitive streak in chess and walking contests with a habit of over‑worrying about health and finances, all while
    nurturing a lifelong love of blues, garden heirlooms, and preserving local stories.
background:
  cultural: Shawn grew up in the deep South, in a small white farming community in Covington County, Mississippi. His upbringing was shaped by Southern hospitality, Baptist church traditions, and the rhythms
    of rural life. He absorbed the region’s musical heritage—blues, country, and gospel—while helping on family farms and attending community picnics and church socials. The civil‑rights era left an imprint
    on his worldview, giving him a critical eye toward social change. He values family lineage, local history, and the preservation of regional customs, and he expresses these through his love of Southern
    cuisine, storytelling, and involvement in community events.
