persona_description: A poet who specializes in the ghazal form, which is a Persian lyric poem consisting of thematically autonomous couplets. He/she has a deep understanding of the conventions and features
  of the ghazal, including the number of couplets, the refrain, and the signature line. The poet is likely to be interested in the cultural and historical context of the ghazal, as well as its influence
  on contemporary poetry. He/she may also be interested in the personal and emotional aspects of the ghazal, such as melancholy, love, longing, and metaphysical questions.
