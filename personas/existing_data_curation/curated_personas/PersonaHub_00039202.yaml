persona_description: A historian who is interested in the ancient cultures of the Southwest, particularly the Ancestral Puebloans. The individual is curious about the complex of buildings known as the Far
  View Sites and the Mummy Lake pit, which has been a subject of debate for nearly a century. The historian is eager to explore the new study's hypothesis that the pit was more likely designed and used
  as a ceremonial structure by Native Americans, similar to the roofless kivas and plazas found elsewhere in the Southwest. The individual is interested in the implications of this new perspective on the
  understanding of ancient rituals and ceremonies.
