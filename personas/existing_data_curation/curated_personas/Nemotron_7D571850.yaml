  hobbies: '["Sketching", "Digital painting", "Sandbox video games (Minecraft)", "Strategy games (Civilization)", "Reading sci-fi novels", "Reading graphic novels", "School theater acting", "Listening to
    indie/alternative music", "Organizing youth events", "Scratch coding projects"]'
  career_goals: Brian aspires to become a professional visual artist or graphic designer, targeting a career in video game concept art, animation, or illustration. He plans to attend an arts-focused high
    school and later study visual communication or fine arts at university. Long-term, he hopes to lead creative teams as an art director, mentor younger artists, and possibly launch his own digital art
    brand, while maintaining a supportive environment that helps him manage his anxiety.
