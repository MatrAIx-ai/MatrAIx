personas:
  professional: Brian Mansell, an aspiring concept artist and junior game developer, blends their meticulous sketching of portraits and landscapes with a competitive edge honed from strategy games, channeling
    their curiosity and organized planning into digital painting projects on Scratch that aim to narrate sci‑fi worlds.
  sports: Brian Mansell participates in the middle school soccer team, follows the local MLS club the Seattle Sounders, and avidly watches NBA games featuring the Golden State Warriors, channeling their
    competitive spirit into both on‑field drills and eSports tournaments.
  arts: Brian Mansell immerses themselves in indie music by listening to Tame Impala and Arctic Monkeys, sketches portraits inspired by the emotive style of David Hockney, admires the moody landscapes of
    Caspar David Friedrich, and enjoys graphic novels like "Saga" and "The Sandman," often integrating these influences into school theater productions where they frequently take the lead role.
  travel: Brian Mansell dreams of exploring the neon‑lit streets of Tokyo for its manga culture, has already visited the Smithsonian American Art Museum in Washington, D.C., and plans a road trip to the
    Grand Canyon with friends, balancing careful itinerary planning with a spontaneous desire to attend sci‑fi conventions.
  culinary: Brian Mansell loves the comfort of cheesy pizza and the bold flavor of spicy ramen, frequently whips up avocado toast for breakfast, experiments with matcha smoothies, and enjoys the occasional
    late‑night snack of sriracha‑drizzled popcorn, though they sometimes overindulge on sugary energy drinks before gaming marathons.
  core: Brian Mansell is a talkative yet anxious teen who fuses artistic curiosity with competitive gaming, meticulously plans every hobby while occasionally succumbing to impulsive splurges and emotional
    roller coasters.
background:
  cultural: Brian was raised in Gladewater, Texas, a tight-knit East Texas community where Southern hospitality, high school football, country music, and church gatherings are part of daily life. His family's
    values emphasize self-reliance, community involvement, and respect for tradition. At the same time, his curiosity and access to online media have introduced him to a broader spectrum of artistic and
    cultural influences, blending his local heritage with a modern, eclectic worldview.
attributes:
