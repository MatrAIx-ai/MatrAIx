personas:
  professional: Larry Bennett is an aspiring junior inventor who channels his love for LEGO and model kits into creative school projects, frequently leading his class's robotics club and applying methodical,
    step-by-step planning that reflects they value routine and practical problem-solving.
  sports: Larry Bennett plays second base for the Willow Creek Little League baseball team, practices batting drills every Saturday, and cheers for the Chicago Cubs while also following the local youth
    soccer club, the Greenfield Tigers, balancing a love for team sports with a routine of daily stretching to stay flexible.
  arts: Larry Bennett builds intricate LEGO sculptures inspired by the angular designs of Frank Lloyd Wright and enjoys listening to the whimsical soundtracks of Studio Ghibli films, especially 'My Neighbor
    Totoro', while they occasionally sketch comic panels in the style of Jeff Smith's 'Bone' series.
  travel: Larry Bennett’s travel style favors carefully planned weekend road trips with family, preferring destinations like historic Williamsburg, Virginia for its hands-on colonial reenactments, and dreaming
    of a future visit to Tokyo's interactive science museums, while they always map out daily activities in a printable itinerary.
  culinary: Larry Bennett prefers classic comfort foods, often cooking spaghetti carbonara with freshly grated Parmesan and crisp pancetta under the watchful eye of their mother, yet they stubbornly refuse
    to eat anything with visible green vegetables, earning a reputation for sneaking peas into their mac and cheese.
  core: Larry Bennett is a routine-loving, puzzle-obsessed 11-year-old who balances a neat LEGO-built world with a secret stash of video-game snacks hidden under their bed.
background:
  cultural: Larry grows up in a middle-class white family in suburban Cincinnati, Ohio, a region known for Midwestern values of hard work, community, and modesty. His family observes common American traditions—celebrating
    Thanksgiving, Fourth of July, and holiday gatherings with relatives. He attends a local church where he learns the importance of cooperation and service. The local sports culture, especially the Cincinnati
    Reds and little-league baseball, influences his love for the game. Weekly trips to the farmers’ market, summer visits to nearby state parks, and participation in school and community service projects
    reinforce his sense of belonging to the Cincinnati community.
attributes:
  skills: '[''Reading fluency'', ''Basic arithmetic'', ''Organizational skills'', ''Teamwork in baseball'', ''Pet care'', ''Basic computer use'', ''Scratch coding'']'
