  career_goals: Larry looks ahead to a career that blends structure, teamwork, and service to his community. He dreams of becoming a firefighter or a civil engineer, roles that involve clear procedures,
    reliable collaboration, and contributing to public safety and city infrastructure. He also imagines working as an automotive mechanic, attracted by routine maintenance schedules and hands-on problem
    solving. In any path he chooses, Larry hopes to continue helping others while using his practical, organized mindset.
