  career_goals: Chaim aims to leverage his strong organizational abilities and people-oriented skills to move into supervisory roles within the hospitality industry. In the next three years he plans to
    obtain a certification in restaurant management and take on a shift-lead position, eventually becoming a venue manager. His longer-term ambition is to open his own boutique coffee shop in Muncie that
    combines community space with specialty coffee, where he can apply his practical curiosity to craft unique brews and create an inclusive gathering spot. He also hopes to mentor younger staff and contribute
    to local hospitality training programs.
