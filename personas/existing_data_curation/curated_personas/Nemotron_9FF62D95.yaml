  career_goals: Elizabeth is driven to advance into a senior purchasing leadership role, ideally as a regional buying director for a statewide retail chain. She aims to build a high‑performing strategic
    sourcing team that consistently outperforms competitors on cost savings and product innovation metrics. To bolster her credibility, she plans to earn the Certified Professional in Supply Management
    (CPSM) designation. While her competitive streak pushes her to exceed peer benchmarks, she also seeks to streamline processes that reduce daily stress, creating a more balanced workload that supports
    her family life. Long‑term, she envisions consulting for small‑town retailers, helping them adopt data‑driven buying practices.
