  career_goals: Depaul aspires to transform his eclectic skill set into a sustainable, low‑key business that lets him stay flexible. He aims to complete a certificate in small‑business management within
    the next year and launch a mobile coffee‑and‑craft‑brew service that can operate at local farmers’ markets and beach events. He also wants to eventually open a modest workshop where he can offer custom
    car detailing and electronics repair services, balancing his competitive drive to be financially independent with his love for hands‑on creation.
