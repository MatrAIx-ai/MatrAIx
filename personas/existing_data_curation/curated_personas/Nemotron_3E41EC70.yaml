personas:
  professional: Depaul Garcia is a hands‑on tech enthusiast who channels their curiosity and practical mindset into building a low‑key mobile coffee‑and‑craft‑brew service, leveraging their DIY electronics,
    small‑engine repair, and graphic‑design skills while maintaining a flexible, sometimes disorganized schedule that fuels their competitive drive for financial independence.
  sports: Depaul Garcia is a surf‑first athlete who hits Pacific Beach at dawn, laces up for the local intramural soccer league on Tuesdays, hikes the Torrey Pines trails on weekends, roots for the San
    Diego Wave FC and the LA Dodgers, and they treat fitness as a competitive outlet while sometimes skipping workouts when the allure of a new brewing experiment takes precedence.
  arts: Depaul Garcia is a self‑taught creator who blends graphic‑design flair with home‑brewing artistry, drawing inspiration from musicians like Jack White and Tame Impala, streaming indie game soundtracks
    while coding Raspberry Pi projects, and they often showcase their craft‑beer labels at local meet‑ups, balancing competitive perfectionism with a laid‑back, sometimes skeptical view of mainstream trends.
  travel: Depaul Garcia prefers spontaneous coastal road trips, having already chased sunrise surf in Baja California and explored the craft‑beer scene in Portland, while dreaming of a surf‑centric adventure
    in New Zealand’s North Island, and they plan trips loosely, favoring flexibility over rigid itineraries due to budget constraints and a competitive urge to discover hidden spots before friends.
  culinary: Depaul Garcia enjoys cooking fusion dishes like miso‑glazed salmon tacos and jalapeño‑lime avocado toast, often incorporating home‑brewed IPA into marinades, and their pantry staples include
    fresh cilantro, smoked paprika, and citrus zest, reflecting a moderately skilled home chef who experiments late at night while occasionally burning the edges due to a relaxed, disorganized kitchen workflow.
  core: Depaul Garcia is a curious yet practical 32‑year‑old who balances competitive ambition with a laid‑back, sometimes disorganized lifestyle, channeling a love of surf, tech tinkering, and home‑brewing
    into a flexible entrepreneurial vision while staying skeptical of others’ motives and occasionally neglecting routine chores, and they often rely on spontaneous inspiration over strict planning.
background:
  cultural: Depaul grew up in a middle‑class white family in the San Diego suburbs during the 1990s. His upbringing was shaped by the laid‑back Southern‑California lifestyle—surf culture, car culture, and
    a strong outdoor ethic—while also absorbing the multicultural flavor of Chula Vista, where Mexican food, festivals, and bilingual signage are part of everyday life. His family celebrated traditional
    American holidays with a focus on community gatherings, and he continues to value the inclusive, eclectic community spirit of the region.
