  hobbies: '["Reading adventure/mystery books", "Building LEGO sets", "Coding with Scratch", "Nature walks in Redwood Shores", "Playing piano", "Drawing cartoons", "Chess club", "Community youth theater",
    "Nature photography"]'
  career_goals: Lessie dreams of a future where she can combine her love for nature, helping others, and problem‑solving. She aspires to become a marine biologist or environmental scientist who designs
    practical solutions to protect coastal ecosystems. In the short term, she aims to maintain top grades, win a regional science fair, join the robotics club, and develop a leadership role in her school's
    environmental club. Her caring nature also fuels an interest in possibly becoming a teacher or community educator who can inspire younger students.
