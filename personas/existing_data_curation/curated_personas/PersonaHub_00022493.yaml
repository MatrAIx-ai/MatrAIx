persona_description: A science educator who is interested in evaluating and selecting effective online resources for teaching and learning science. They are familiar with the design criteria for evaluating
  such resources, particularly in terms of their relevance for science inquiry learning and their link to authentic science practices. They are looking for high-quality, engaging, and relevant online resources
  that can support authentic science inquiry tasks. They have a background in science education research and are familiar with the use of online resources in science classrooms. They are interested in learning
  about the latest developments in the field of science education and are open to new and innovative approaches to teaching and learning science.
