personas:
  professional: A budding nonprofit project coordinator, Angelica Singh leverages their associate degree in Business Administration, bilingual fluency in Spanish and English, and event‑planning expertise
    to organize community outreach programs for a local nonprofit serving Mexican‑American families, while they blend a methodical, deadline‑driven mindset with an outgoing, sociable energy.
  sports: An energetic athlete and community sports enthusiast, Angelica Singh plays midfield for the local women's Arizona Heat Soccer Club, follows the Phoenix Suns and Arizona Cardinals faithfully, and
    they incorporate weekend hikes through the Sonoran desert into their fitness routine to stay balanced.
  arts: A culturally attuned creator, Angelica Singh captures candid festival moments with a camera inspired by Steve McCurry, curates Instagram reels set to the lively rhythms of Celia Cruz and Carlos
    Vives, dedicates weekends to practicing salsa and folkloric dance, and they draw artistic inspiration from Frida Kahlo’s vibrant paintings and Alfonso Cuarón’s storytelling in contemporary fiction podcasts.
  travel: A curious wanderer with a taste for both adventure and relaxation, Angelica Singh has hiked the Red Rock trails near Sedona, explored the historic streets of Tucson, spent a spring break weekend
    in Mexico City’s vibrant markets, and dreams of backpacking through Patagonia and visiting the cherry blossoms in Kyoto, and they often plan trips months in advance to balance school commitments and
    a modest travel budget.
  culinary: A passionate home chef, Angelica Singh enjoys preparing traditional Mexican dishes such as mole poblano, pork tamales, and fresh fish tacos, skillfully balancing smoky chipotle, bright cilantro,
    and ripe avocado, while occasionally experimenting with fusion twists like quinoa‑filled enchiladas, and they love sharing these meals at family gatherings.
  core: A methodical yet spontaneous 18‑year‑old, Angelica Singh channels boundless energy into community projects, salsa rhythms, and meticulous spreadsheets, while they habitually worry about deadlines
    and secretly indulge in late‑night coffee runs.
background:
  cultural: Angelica grew up in a Mexican-American household in Glendale, Arizona, where family gatherings, religious celebrations, and community festivals are central to daily life. She speaks Spanish
    fluently at home and English at school, giving her a bicultural perspective that informs her worldview. Her family emphasizes loyalty, respect for elders, and the tradition of sharing food, particularly
    during Día de los Muertos and Cinco de Mayo. Living in a city with a vibrant Hispanic community, Angelica participates in local cultural events and volunteers at organizations that support recent immigrants.
    This cultural heritage shapes her values of community service, strong family ties, and a deep appreciation for Mexican culinary and artistic traditions.
