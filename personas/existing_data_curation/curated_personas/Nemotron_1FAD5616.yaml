  hobbies: '["Salsa and folkloric dance classes", "Women''s soccer league", "Hiking in the Sonoran Desert", "Cooking traditional Mexican cuisine", "Volunteering at a community food bank", "Photography and
    short-form video creation", "Social media content creation", "Yoga and meditation", "Reading contemporary fiction and listening to podcasts"]'
  career_goals: Angelica aims to complete a bachelor's degree in Business Management within the next two years and secure a junior project coordinator role in a nonprofit organization that serves the Mexican-American
    community in Arizona. She is particularly interested in program development and community outreach, where she can combine her organizational talents with her sociable nature. Long-term, she hopes to
    become a program director or start her own small business offering culturally-focused event planning services. To support these ambitions, she plans to earn a Certified Associate in Project Management
    (CAPM) credential and improve her digital marketing skills.
