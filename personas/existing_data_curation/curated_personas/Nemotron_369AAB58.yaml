  career_goals: Although retired, Adelle is focused on leaving a lasting legacy for her family and community. She aims to mentor younger volunteers at the local senior center, compile a family cookbook
    that captures her heritage recipes, and author a short memoir of her life in mid‑century Colorado. Maintaining her health and supporting her husband remain top priorities, as does ensuring her home
    is organized for eventual downsizing.
