  hobbies: '[''building LEGO sets'', ''reading adventure books'', ''drawing nature scenes'', ''exploring nearby woods'', ''collecting rocks and leaves'', ''playing board games with siblings'', ''fishing
    with dad'', ''playing educational computer games'']'
  career_goals: Phillip dreams of one day working as a forest ranger or wildlife caretaker, roles that combine his love of routine outdoor tasks with the chance to protect the natural areas around Ronan.
    He also imagines becoming a teacher, where he can share practical knowledge in a structured classroom setting. His ambitions are shaped by a desire for stable, purposeful work that lets him spend time
    in nature while helping others.
