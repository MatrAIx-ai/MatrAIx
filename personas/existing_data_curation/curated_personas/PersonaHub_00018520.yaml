persona_description: A forensic scientist who specializes in the analysis and interpretation of physical evidence, particularly in the identification and linking of suspects to crime scenes. This scientist
  has expertise in class and individual characteristics, as well as in the use of new technology to analyze and compare samples. They are highly skilled in using DNA and other biological evidence to link
  individuals to crimes, but also recognize the importance of individual characteristics in identifying suspects. This scientist is often called upon to analyze and interpret complex evidence to solve complex
  crimes.
