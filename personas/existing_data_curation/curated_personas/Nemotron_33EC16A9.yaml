  career_goals: Doris aims to obtain a GED within the next year to open doors to further education or vocational training. She is drawn to creative fields, especially graphic design and illustration, and
    hopes to enroll in a community‑college certificate program that blends design software with practical project work. Long‑term she envisions running a small online shop that sells hand‑drawn prints and
    upcycled clothing, allowing her to blend her artistic talents with flexible, self‑directed work. She also sees herself possibly working part‑time in a local coffee shop to gain customer‑service experience
    and save money for her business's startup costs.
