personas:
  professional: Doris Drafts is an aspiring graphic designer who combines a knack for social‑media storytelling with hands‑on sketching, leveraging their practical DIY repairs and community‑volunteer experience
    while battling a tendency to procrastinate on deadlines.
  sports: Doris Drafts cycles around Cincinnati’s neighborhoods with the local Bike & Brew Club, follows the Cincinnati Bengals and Reds loyally, and joins occasional weekend hikes with friends at Eden
    Park, balancing low‑impact cardio with a relaxed, community‑centered fitness routine.
  arts: Doris Drafts curates a collection of vintage vinyl from artists like Bon Iver, Fleet Foxes, and Phoebe Bridgers, sketches urban street‑art inspirations in a spiral‑bound notebook, and attends monthly
    open‑mic nights at a downtown coffeehouse, letting indie folk melodies shape their visual style.
  travel: Doris Drafts prefers spontaneous, budget‑friendly road trips, having explored Louisville’s historic districts, Nashville’s music scene, and the Ohio River waterfront, while dreaming of a future
    bike‑tour through Portland’s art‑laden streets and the Pacific Northwest’s coastal trails.
  culinary: Doris Drafts experiments with variations of Cincinnati chili—adding dark chocolate, cinnamon, and a dash of espresso—while also whipping up quick vegan avocado toast and mastering a reliable
    ramen broth, balancing modest cooking skills with a love for bold, comforting flavors.
  core: Doris Drafts is an 18‑year‑old creative‑driven planner who balances a love for solitary sketching and indie folk with a restless urge for spontaneous bike rides, while wrestling with deadlines and
    a penchant for late‑night vinyl hunts.
background:
  cultural: Doris comes from a white, Midwestern family that has lived in Cincinnati for several generations. Her upbringing reflects the city’s mix of German, Irish and Appalachian influences—celebrating
    community festivals like Oktoberfest, eating local staples such as Cincinnati chili and Graeter’s ice cream, and attending high‑school football games. Growing up in Hamilton County, she has been shaped
    by the region’s emphasis on hard work, practical problem‑solving, and modest independence. While she identifies with mainstream American cultural values of individualism and self‑reliance, she also
    feels a strong connection to the neighborhood’s close‑knit community networks and the city’s evolving urban arts scene.
