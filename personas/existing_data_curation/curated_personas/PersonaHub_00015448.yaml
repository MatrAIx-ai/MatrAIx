persona_description: A chemistry professor who specializes in rare-earth metals recycling and ligand separation, particularly the development of simplified processes to reduce energy use and waste generated
  during recycling. His research interests include the separation of rare-earth metals from cell phones, magnets used in motors, and other products, and the development of a complete recycling process to
  recover the two metals. His work has the potential to minimize new rare-earth mining, reduce energy use and waste, and offer an easier, less expensive alternative to redox chemistry, acid-leaching processes,
  and ionic liquid extraction currently being used and explored for recycling rare earths.
