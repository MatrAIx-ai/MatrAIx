  career_goals: Although retired, Rianna is driven to leave a lasting cultural legacy in her hometown. She aims to establish an intergenerational art mentorship program that pairs senior artists with local
    youth, curate a traveling exhibition showcasing both Midwestern folk art and contemporary pieces, and publish a memoir reflecting on her artistic journey and the evolution of American art across the
    20th century. Additionally, she aspires to become a recognized cultural ambassador for Peosta, inviting guest artists and scholars, and to ensure her series of watercolor paintings exploring abstract
    concepts are archived in the Dubuque County Historical Society.
