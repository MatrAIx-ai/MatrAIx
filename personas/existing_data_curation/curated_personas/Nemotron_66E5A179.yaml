personas:
  professional: Rianna Freret, an 80‑year‑old painter and community arts facilitator, they blend watercolor virtuosity with a poet’s eye to lead intergenerational workshops, curate traveling exhibitions
    that juxtapose folk quilting with modern abstraction, and serve as a charismatic speaker at local museums, though they often resist strict timelines, preferring spontaneous creative bursts over rigid
    schedules.
  sports: Rianna Freret, a lifelong lover of gentle movement, they participate in a weekly walking club at the local riverfront, cheer passionately for the Iowa Cubs during summer games, and enjoy occasional
    senior softball matches, while favoring low‑impact activities that keep their joints comfortable and mind vivid.
  arts: Rianna Freret, a watercolor aficionado and seasoned art critic, they draw inspiration from Georgia O'Keeffe’s desert palettes, Claude Monet’s impressionist light, and local folk quilt motifs, regularly
    attend exhibitions at the Figge Art Museum, and host lively tea‑party discussions where they weave poetry, philosophy, and contemporary critiques into spirited dialogues.
  travel: Rianna Freret, a curious explorer of the Midwest, they favor leisurely road trips to historic sites like the Amana Colonies, Mackinac Island, and the historic downtown of Galena, staying in charming
    B&Bs that serve afternoon tea, while dreaming of a future pilgrimage to Charleston’s cobblestone streets for its rich architectural heritage.
  culinary: Rianna Freret, a seasoned home chef, they relish crafting seasonal dishes such as sauerkraut‑infused potato dumplings, apple‑cinnamon crumb cake, and herb‑infused tea blends, often experimenting
    with flavors from Julia Child’s classic French techniques while maintaining a modest skill level that favors hearty, comforting Midwestern fare.
  core: Rianna Freret, an 80‑year‑old watercolor painter and community mentor, they fuse spontaneous creativity with a love of classic folk traditions, balancing thriftiness and occasional artistic splurges,
    while staying physically active, culturally engaged, and philosophically curious.
background:
  cultural: Rianna grew up in the Midwestern heartland of Iowa, within a predominantly white community that values independence, self‑reliance, and close‑knit social ties. Her family traces its roots to
    German and Irish immigrants who settled in Dubuque County in the 19th century. Raised in a Catholic household, she was exposed early to church music, community festivals, and a respect for tradition.
    Over the decades she embraced both the region’s folk art heritage—such as quilting and prairie landscape painting—and broader contemporary art movements encountered through her liberal‑arts education.
    This blend of Midwestern cultural foundations and lifelong intellectual curiosity shapes her identity as a creative, sociable, and forward‑looking elder in her community.
