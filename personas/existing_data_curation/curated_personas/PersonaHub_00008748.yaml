persona_description: Dr. Adithya Cattamanchi, MD, is a clinician and assistant adjunct professor at the UCSF School of Medicine. He is currently working on improving the diagnosis and treatment of tuberculosis
  (TB) in developing countries by applying techniques of implementation science (ImS) learned through the Training in Clinical Research Program provided by UCSF's Clinical and Translational Science Institute
  (CTSI). Cattamanchi is also a CTSI KL2 Scholar and is testing several interventions in Uganda and Vietnam to improve the quality of TB diagnosis and treatment.
