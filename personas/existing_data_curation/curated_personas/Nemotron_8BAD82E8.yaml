personas:
  professional: Morgana Wang, a 14‑year‑old aspiring visual artist and robotics hobbyist, channels her vivid imagination and methodical planning into leading the middle‑school art club’s weekly projects
    and programming competition robots, while also spearheading a community mural at the town library, showcasing a collaborative yet assertive approach.
  sports: Morgana Wang cheers for the local North Lawrence High School Panthers football team and the Ohio State Buckeyes, plays on a community U‑14 girls soccer league, hikes the nearby Hueston Woods State
    Park every weekend, and follows the Cleveland Browns' season, embodying a balanced love for team spirit and personal outdoor fitness.
  arts: Morgana Wang fills sketchbooks with watercolor landscapes inspired by the rolling hills of Stark County, designs digital characters reminiscent of Studio Ghibli's Hayao Miyazaki and Loish’s ethereal
    style, enjoys listening to indie folk band The Lumineers while playing keyboard, and volunteers at the library’s storytime, where they reenact scenes from their favorite animated films.
  travel: Morgana Wang has road‑tripped to Cleveland’s Rock & Roll Hall of Fame, spent a summer night camping at Hocking Hills State Park, visited the vibrant streets of Chicago for a weekend art festival,
    and dreams of exploring the cherry‑blossom canals of Kyoto and the historic alleys of Paris, preferring mixed itineraries that blend family outings with independent sketch‑inspired excursions.
  culinary: Morgana Wang loves crafting strawberry shortcake with fresh local berries, mastering the perfect mac and cheese using a secret family cheese blend, experimenting with homemade pesto from basil
    and pine nuts, and occasionally indulges in spicy ramen from the town’s Asian market, all while balancing a modest appetite for school cafeteria pizza on busy days.
  core: Morgana Wang blends a vivid, imaginative spirit with Midwestern diligence, channeling artistic curiosity, organized leadership, and community‑focused projects into a lively teen life punctuated
    by occasional impulse splurges and a love for outdoor adventure.
background:
  cultural: 'Morgana grew up in North Lawrence, a small village in Stark County, Ohio, within a White, primarily Midwestern family of mixed German and Irish ancestry. Her upbringing reflects typical Midwestern
    values: community involvement, modesty, and a strong work ethic. Family traditions include attending local church events, participating in county fairs, and supporting the town’s high school football
    games. The region’s Rust‑belt history and close‑knit community spirit have fostered a sense of resilience and pride, which influence her collaborative nature and her desire to give back through local
    arts initiatives.'
attributes:
  skills: '[''Drawing (pencil & watercolor)'', ''Digital illustration (Procreate, Canva)'', ''Creative writing (short stories, poetry)'', ''Science research and project planning'', ''Public speaking and
