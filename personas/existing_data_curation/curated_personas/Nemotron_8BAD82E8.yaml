  hobbies: '[''Sketching and character design'', ''Watercolor painting'', ''Digital art creation'', ''Reading fantasy/science‑fiction novels'', ''Playing strategy board games'', ''Art club participation'',
    ''Robotics team involvement'', ''Volunteering at library storytime'', ''Hiking in local parks'', ''Watching animated films'', ''Listening to indie music'', ''Playing keyboard'']'
  career_goals: Morgana aspires to turn her love for visual storytelling into a career as a concept artist or graphic designer, eventually creating her own illustration studio. She hopes to attend an arts‑focused
    high school and later earn a degree in illustration, animation, or industrial design. She also dreams of combining her artistic skills with community service by leading youth art workshops and contributing
    to local cultural events. In the long term, she envisions publishing a graphic novel that blends fantasy themes with scientific concepts, and she aims to become a mentor for other creative teens in
    her hometown.
