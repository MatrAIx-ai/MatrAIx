  career_goals: Although retired from formal employment, Jasmine aims to preserve and share her cultural heritage by recording oral histories and mentoring younger tribal members. She hopes to compile a
    memoir that weaves together her personal experiences with Cherokee traditions, and to develop a small digital archive of stories and recipes for future generations. Additionally, she aspires to advocate
    for community health initiatives that incorporate traditional herbal practices and native gardening, using her calm, resilient nature to lead by example.
