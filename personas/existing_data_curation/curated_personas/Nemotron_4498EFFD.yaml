personas:
  professional: Jasmine Singh, a retired community organizer, leverages their blend of curiosity and practicality to coordinate cultural events, preserve oral histories, and mentor younger members through
    digital archives and storytelling workshops.
  sports: Jasmine Singh enjoys gentle fitness through daily nature walks, birdwatching, and weekly community yoga sessions, while cheering for the Springfield Wildcats high school soccer team and the River
    City Raptors minor‑league baseball club.
  arts: Jasmine Singh finds creative fulfillment in knitting, basket weaving, and photographing sunrise over the meadow, while listening to folk legend Joan Baez, gospel powerhouse Mahalia Jackson, and
    watching classic films featuring Meryl Streep, weaving these artistic threads into daily life.
  travel: Jasmine Singh favors relaxed, culturally immersive trips, having enjoyed a quiet road‑trip through the Great Smoky Mountains, a week exploring the historic temples of Kyoto, and a planned future
    visit to the coastal town of Cinque Terre to capture sunrise vistas.
  culinary: Jasmine Singh delights in cooking herb‑infused chicken broth, sweet potato and black‑eyed pea stew, and hand‑rolled flatbread seasoned with rosemary and sage, often gathering fresh ingredients
    from their garden and swapping recipes at the local farmers’ market.
  core: Jasmine Singh’s calm resilience, practical curiosity, and love of nature‑infused creativity shape a life where gentle routines, community storytelling, and modest indulgences coexist.
background:
  cultural: Jasmine Michelle Singh is a member of the Cherokee Nation, rooted in the traditions of her ancestors who have lived in the Sequoyah County region for generations. Growing up in Sallisaw, Oklahoma,
    she was immersed in a community where Cherokee language, storytelling, and seasonal ceremonies are woven into daily life. Her cultural identity blends respect for tribal customs—such as participation
    in powwows, preparation of traditional foods, and the practice of herbal medicine—with the broader American experience of rural Oklahoma, creating a rich, nuanced background that informs her values
    of cooperation, resilience, and curiosity.
