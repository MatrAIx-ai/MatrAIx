personas:
  professional: Taylor Schneider, a retired elementary educator with five decades of curriculum development experience, channels their organized, curiosity‑driven nature into mentoring senior and novice
    teachers, spearheading an intergenerational art workshop series at the Albuquerque Museum, and authoring a memoir on the evolution of education while volunteering as a museum docent.
  sports: Taylor Schneider hikes the Sandia Mountains with a sturdy walking stick, competes in weekly chess and bridge tournaments at the senior center, and cheers for New Mexico United soccer matches,
    balancing the mental rigor of strategy games with the physical challenge of desert trail walking.
  arts: Taylor Schneider paints delicate watercolors of the High Desert inspired by Georgia O'Keeffe, curates visits to the Indian Pueblo Cultural Center, quilts intricate traditional patterns while listening
    to classical guitarist Andrés Segovia, and immerses in contemporary literature like "The Night Circus," reflecting a lifelong devotion to artistic exploration.
  travel: Taylor Schneider prefers thoughtfully planned road trips across the Southwest—having explored Santa Fe, Taos, and the Grand Canyon—while dreaming of a culturally rich pilgrimage to Barcelona to
    practice Spanish, balancing the desire for adventure with senior-friendly pacing and budget constraints.
  culinary: Taylor Schneider delights in cooking New Mexican green chile stew with roasted corn and sage, savors biscochitos dusted with cinnamon, and experiments with quinoa‑cactus salad, yet tends to
    over‑season dishes due to a habit of adding a pinch of every spice in the pantry.
  core: Taylor Schneider is a methodical, curiosity‑driven lifelong learner whose competitive edge fuels a disciplined blend of art, education, and community service, even as they occasionally over‑plan
    and hoard supplies.
background:
  cultural: Taylor was raised in a Midwestern, white, German‑Irish family that emphasized community, self‑reliance, and a strong work ethic. She moved to Albuquerque in her forties and has since embraced
    the Southwest’s blend of Native American, Hispanic, and Anglo traditions. Her home reflects this mix through an appreciation for Pueblo pottery, New Mexican cuisine, and participation in local festivals,
    while she retains the values of her upbringing, such as punctuality, organization, and respect for personal privacy.
