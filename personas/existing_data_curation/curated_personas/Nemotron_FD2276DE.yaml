  career_goals: Although retired from formal teaching, Taylor aims to remain active in the educational community. Her goals include mentoring retired and early‑career teachers through a local senior‑teacher
    network, developing an intergenerational art workshop series at the Albuquerque Museum, authoring a memoir that reflects on changes in education over the past five decades, completing a certificate
    in Spanish language to better engage with the diverse local community, and contributing her organizational skills to a historic preservation project that documents the stories of longtime Albuquerque
    residents.
