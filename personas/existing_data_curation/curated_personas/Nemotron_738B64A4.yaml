personas:
  professional: Carlos Rolong, a seasoned metal fabricator with over three decades mastering MIG, TIG, and stick welding, they channel their methodical mindset and competitive drive into foreman responsibilities—meticulously
    scheduling jobs, training apprentices, enforcing OSHA standards, and pursuing the AWS Certified Master Welder credential to position themselves for a future independent workshop.
  sports: Carlos Rolong, an avid bowler in the Hudson Valley league and weekend fisherman on the Hudson River's tributaries, they cheer for the New York Giants in the fall, the New York Rangers during hockey
    season, and follow the New York Knicks, while also coaching a local youth bowling club, blending competitive spirit with community involvement.
  arts: Carlos Rolong, a hobbyist vintage-radio restorer who spends evenings watching classic action movies starring Bruce Lee, Sylvester Stallone, and Arnold Schwarzenegger, they also enjoy the rhythmic
    folk tunes of Central America and occasional community theater productions featuring performers like Lin-Manuel Miranda, weaving a personal soundtrack into their creative downtime.
  travel: Carlos Rolong, who balances a structured retirement plan with a love for cultural immersion, they favor meticulously planned trips that combine family visits to their relatives' hometown on the
    Caribbean coast with relaxed weekend getaways to the Catskill Mountains, while dreaming of a historic Route 66 road trip and a future cruise to the Caribbean islands.
  culinary: Carlos Rolong, a proficient home chef with a deep appreciation for traditional flavors, they regularly prepare baleadas layered with refried beans, cheese, and crema, simmer hearty sopa de caracol
    with coconut milk and plantains, and experiment with marinades featuring achiote and lime, often pairing meals with fresh vegetables harvested from their backyard garden.
  core: Carlos Rolong, a meticulous foreman whose competitive edge shines on the bowling lanes and whose evenings are spent restoring vintage radios, fishing at dawn, and occasionally splurging on high-end
    fishing gear, epitomizes a life of structured reliability, cultural devotion, and a hint of stubborn independence.
background:
  cultural: Carlos grew up in a small town near San Pedro Sula in Honduras, where family, Catholic traditions, and community festivals shaped his early life. He emigrated to the United States in his early
    twenties, bringing with him a strong work ethic and love for his homeland’s music, food, and customs. Bilingual in Spanish and English, he participates in local Honduran celebrations such as Semana
    Santa and Día de la Independencia, and he remains connected to relatives in Honduras through regular visits and remittances. His cultural identity blends the practical resilience of his Central‑American
    roots with the structured, punctual ethos of his American workplace, influencing both his professional reliability and his dedication to preserving his heritage.
attributes:
  skills: '[''MIG welding'', ''TIG welding'', ''Arc welding'', ''Brazing'', ''Soldering'', ''Blueprint reading'', ''Metal fabrication'', ''Equipment maintenance'', ''Safety compliance (OSHA)'', ''Quality
