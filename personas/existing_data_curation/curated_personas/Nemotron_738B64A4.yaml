  hobbies: '[''Bowling league'', ''Fishing'', ''Garden vegetables'', ''Cooking Honduran dishes'', ''Volunteering at Honduran cultural association'', ''Restoring vintage radios'', ''Woodworking projects'',
    ''Watching classic movies'', ''Playing dominoes'', ''Reading technical manuals'']'
  career_goals: Approaching retirement, Carlos aims to secure a foreman or lead‑welder position that leverages his extensive expertise, earn the AWS Certified Master Welder credential, and eventually open
    a modest independent workshop offering custom metalwork for local contractors and residential clients. He also wishes to mentor younger welders through an apprenticeship program, solidify a reliable
    pension plan, and achieve financial stability to support his family and remittances back to Honduras.
