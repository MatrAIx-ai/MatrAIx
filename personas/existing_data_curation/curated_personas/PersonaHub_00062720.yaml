persona_description: A physicist who specializes in the study of X-ray astronomy and space exploration. They are familiar with the principles and techniques involved in conducting experiments related to
  X-rays and space travel, and have a keen interest in comparing the effects of X-rays on films taken to the Moon and those exposed to X-rays directly. They have conducted their own tests and are familiar
  with the limitations and shortcomings of the tests presented by Mary Bennett and David Percy. They are also knowledgeable about the shielding required for X-rays and the energy levels of X-rays in space.
