persona_description: A sociologist who specializes in the study of small town societies, particularly those where people know each other well and the behavior of individuals can have an impact on the functioning
  of the community. The individual is interested in understanding how social norms and expectations are maintained in such communities, and how they can be influenced by the presence of freeloaders. They
  are also interested in the role of reputation and social status in maintaining social order in small towns.
