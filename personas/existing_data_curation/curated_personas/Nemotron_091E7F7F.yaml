  career_goals: Sinthia aims to advance from a line‑supervisor role to a full restaurant manager position within the next two years, eventually seeking a regional supervisory role overseeing multiple sites
    in Southern California. She is also planning to complete her associate degree in Hospitality Management and obtain a small‑business management certification, with the long‑term ambition of opening her
    own community‑focused catering service that highlights authentic Mexican flavors while providing job training for at‑risk youth. Networking with local culinary associations and participating in leadership
    workshops are part of her strategy to achieve these goals.
