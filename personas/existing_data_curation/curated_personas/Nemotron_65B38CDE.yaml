personas:
  professional: Barbara Wright is a budding junior wildlife illustrator who spends hours sketching animals and landscapes, channeling their natural curiosity and competitive drive into perfecting line work
    and color blending, while also volunteering to lead art projects at school with organized yet flexible enthusiasm.
  sports: Barbara Wright loves climbing trees and hiking the nearby Cedar City trails, participates in the local Cedar City Kids' Nature Club where they practice junior cross‑country drills, and cheers
    for the Utah Jazz and Real Salt Lake, showing a high‑energy approach to staying fit.
  arts: Barbara Wright immerses themselves in creative expression by drawing animals after visiting the Southern Utah Museum of Art, painting watercolors inspired by Georgia O'Keeffe’s desert blossoms,
    and performing dramatic monologues in school drama class, and they frequently cite Eric Carle and local folk singer Kate Kelly as favorite artistic influences.
  travel: Barbara Wright dreams of exploring the red rock wonders of Zion and Bryce Canyon after already trekking through the Iron County Fair’s petting zoo and a family road trip to Disneyland, preferring
    hands‑on adventures over passive tours while meticulously packing a tiny backpack of crayons and snacks.
  culinary: Barbara Wright enjoys snacking on apple slices with peanut butter, helping to whisk together a simple strawberry‑banana smoothie using fresh berries, and attempts to bake cinnamon sugar cookies
    with parental guidance, favoring bright, sweet flavors and occasionally over‑indulging in sugary treats.
  core: Barbara Wright is a talkative, curiosity‑driven six‑year‑old who blends artistic talent, nature love, and a competitive spark into a vibrant, slightly messy, yet organized daily life.
background:
  cultural: Barbara is raised in Cedar City, a small, predominantly white community in southern Utah. Her family participates in local traditions such as the Iron County Fair, holiday parades, and community
    service events. The region’s strong connection to outdoor recreation and the nearby national parks influences her love for nature. While many families in the area share a heritage of Mormon cultural
    values, Barbara’s upbringing also reflects broader American suburban influences, encouraging curiosity, community involvement, and appreciation for both traditional and contemporary arts.
