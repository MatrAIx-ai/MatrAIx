  career_goals: Barbara dreams of becoming someone who can share her love of art and ideas with others. She imagines working as an artist who creates imaginative illustrations, or as a science communicator
    who explains new discoveries in fun ways. She also thinks about leading a school club where she can organize activities, present projects, and inspire her peers.
