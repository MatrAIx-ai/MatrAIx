personas:
  professional: Marwan Cates, a budding junior game developer who mixes self‑taught coding with a love for digital painting, channels their curiosity and competitive spirit into creating Minecraft‑style
    mods and sketching game concepts, while they balance school assignments with after‑school art projects and occasional robotics tinkering.
  sports: Marwan Cates, a midfielder on the Winchester Youth Soccer League team who spends weekends hiking the Blue Ridge trail, proudly sports a Virginia Tech Hokies hoodie, and watches Washington Capitals
    games with friends, they blend a competitive drive on the field with a love for exploring the outdoors.
  arts: Marwan Cates, a self‑directed visual storyteller, sketches characters inspired by Studio Ghibli’s Spirited Away and digital‑paints fan tributes to video‑game composer Jeremy Soule, collects Alex
    Ross prints for reference, and they weave these artistic influences into their game‑design narratives.
  travel: Marwan Cates, after exploring the historic battlefields of Antietam on a school field trip and hiking the scenic overlooks of Shenandoah National Park, dreams of wandering Kyoto’s ancient temples
    and Seoul’s vibrant gaming cafés, they favor DIY itineraries that mix cultural heritage with tech hotspots, though family budgeting keeps international travel a future goal.
  culinary: Marwan Cates, a budding home‑chef, whips up a go‑to mac‑and‑cheese spiced with smoked paprika, experiments with cucumber‑avocado sushi rolls for lunch, savors Appalachian trout baked with lemon‑thyme
    on occasional family outings, and they often skip breakfast in favor of a quick cereal before school.
  core: Marwan Cates, a curious 13‑year‑old who blends a competitive edge with artistic flair, spends evenings crafting game mods, sketching fantasy worlds, and trekking local trails, all while they navigate
    a modest allowance and occasional screen‑induced headaches.
background:
  cultural: Marwan grew up in Winchester, Virginia, a small city nestled in the Shenandoah Valley. His family is part of a predominantly white, middle‑class community that values education, self‑reliance,
    and an appreciation for the region's rich history. Local traditions such as county fairs, historic battlefield tours, and community service projects have shaped his sense of place. The blend of Appalachian
    heritage and modern suburban life gives him exposure to both the region's emphasis on independence and contemporary cultural influences like technology and pop art. This environment has nurtured his
    curiosity, balanced respect for tradition with openness to new ideas, and contributed to his competitive yet collaborative outlook.
attributes:
  skills: '[''Digital illustration (Procreate, Photoshop)'', ''Creative writing (short stories, poetry)'', ''Introductory Python programming'', ''Critical thinking and problem solving'', ''Basic photography'',
