  hobbies: '[''Sketching and drawing'', ''Digital painting'', ''Playing Minecraft and strategy games'', ''Reading science fiction & fantasy novels'', ''Hiking and nature walks'', ''DIY robotics kits'',
    ''Writing short stories'']'
  career_goals: Marwan dreams of turning his love of art and technology into a career that lets him create immersive experiences. He aims to study graphic design, game development, or user‑experience (UX)
    design in college, with the long‑term ambition of becoming a multimedia designer or interactive storyteller. He also entertains the idea of working in a creative technology startup where he can blend
    coding, visual art, and narrative to develop innovative digital products. While he remains open to various paths, his competitive drive pushes him to seek roles where he can continually improve his
    craft and stand out in a fast‑moving industry.
