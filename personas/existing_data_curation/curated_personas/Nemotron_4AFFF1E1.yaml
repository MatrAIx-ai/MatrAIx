personas:
  professional: Joshua Shelton, a 17‑year‑old aspiring concept artist, blends hand‑drawn sketches of fantastical landscapes with digital illustration tools while volunteering at local art workshops, leveraging
    their organized yet imaginative nature to build a portfolio aimed at a future scholarship in graphic design.
  sports: Joshua Shelton enjoys hiking the winding trails of the nearby Cumberland Mountains, plays pickup basketball with friends at the community center, supports the Nashville Predators and Tennessee
    Titans, and maintains a low‑key fitness routine through the high school cross‑country club while favoring the tranquility of nature over gym workouts.
  arts: Joshua Shelton immerses themselves in folk melodies by Gillian Welch, indie soundscapes of Bon Iver, and the animated storytelling of Studio Ghibli, while drawing inspiration from concept artists
    such as Ryan Burton and the speculative fiction of Neil Gaiman to fuel their own sketchbooks and digital art experiments.
  travel: Joshua Shelton dreams of exploring the misty forests of the Great Smoky Mountains, wandering the historic streets of Asheville and New Orleans, and someday trekking the bamboo groves of Kyoto,
    favoring spontaneous weekend road trips over elaborate itineraries while navigating a tight teenage budget.
  culinary: Joshua Shelton, whose kitchen skills range from cooking Southern staples like cornbread and fried catfish to experimenting with ramen broth and homemade chili, delights in the flavor of fresh
    thyme and cracked black pepper, and often trades recipes at church potlucks for new inspiration.
  core: Joshua Shelton is a dreamy, organized teen who channels Appalachian‑influenced folk roots into digital fantasy art while juggling school, part‑time gigs, and a penchant for late‑night sketch marathons
    and occasional snack raids.
background:
  cultural: Joshua’s cultural background is rooted in the Appalachian‑influenced rural community of Pioneer, Tennessee. Growing up in Scott County, he has been shaped by a close‑knit family environment,
    local church traditions, and community gatherings such as county fairs and church potlucks. The region’s folk music, storytelling, and handcrafted arts (e.g., quilting, simple woodworking) are part
    of his upbringing. At the same time, the internet gives him exposure to a wider spectrum of contemporary art and media, allowing him to blend his local heritage with global artistic trends. This mix
    of modest, self‑reliant community values and a curiosity for novel ideas informs his perspective and aspirations.
