  career_goals: Joshua aspires to turn his love for visual storytelling into a professional career. He plans to build a strong portfolio of illustration and digital art, seek a scholarship to study graphic
    design or animation at a community college, and eventually work as a concept artist for video games or as a freelance illustrator. He also hopes to combine his creative practice with community service
    by leading youth art workshops in his hometown, and possibly launch an online comic series that explores speculative themes. Over the long term, he envisions a career that blends artistic creation with
    technology, allowing him to remain connected to his rural roots while engaging with broader creative networks.
