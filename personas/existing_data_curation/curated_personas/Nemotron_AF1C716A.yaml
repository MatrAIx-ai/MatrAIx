    "Data analysis (Minitab, Python)"]'
  hobbies: '["Hiking on local trails", "Nature photography", "DIY home improvement projects", "Reading science and technology non-fiction", "Board games with friends", "Volunteer work at the community food
    co‑op", "Cycling around Oneida", "Gardening in her backyard"]'
  career_goals: Patricia aims to advance to a senior safety engineering role where she can lead a multi‑site safety program and embed data‑driven risk mitigation into the core of manufacturing operations.
    She plans to earn the Certified Safety Professional (CSP) credential and to champion the adoption of wearable sensor technology and predictive analytics for injury prevention. Over the next five years
    she hopes to mentor junior engineers, shape company‑wide safety culture, and eventually launch her own consultancy focused on integrating sustainable practices with occupational health and safety.
