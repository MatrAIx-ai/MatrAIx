  hobbies: '[''Hiking and trail-running in the Rockies'', ''Backcountry skiing'', ''Craft beer brewing'', ''Reading non-fiction (business, sustainability, classic literature)'', ''Volunteer mentoring for
    high-school students'', ''Photography of mountain landscapes'', ''Woodworking'']'
  career_goals: John aims to move into a regional sales leadership role within the next three years, where he can mentor junior representatives and shape the strategic direction of his product line. He
    is particularly interested in leading initiatives that introduce greener manufacturing solutions to wholesale clients, aligning his sales expertise with Colorado's sustainability values. Over the longer
    term, he envisions establishing a boutique consultancy that helps mid-size manufacturers optimize their distribution channels while fostering collaborative partnerships. He also hopes to earn a recognized
    industry certification in supply-chain sales to bolster his credibility.
