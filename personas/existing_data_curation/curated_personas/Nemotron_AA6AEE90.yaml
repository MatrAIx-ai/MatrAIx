personas:
  professional: Rosa George, a 52‑year‑old cyber‑defense veteran who has spent twenty years fortifying financial, healthcare and governmental networks, blends deep expertise in NIST‑based risk management,
    SIEM hunting on Splunk and QRadar, and cloud security on AWS and Azure with a curious drive to explore AI‑powered threat analytics, and despite a habit of misplacing notes, they excel at translating
    complex security concepts into clear guidance for executives and mentoring emerging talent.
  sports: Rosa George stays fit by hiking the cypress‑lined trails of Congaree National Park, playing weekly pick‑up softball with the Richland County Recreational League, and cheering on the Carolina Panthers
    in the NFL and the Clemson Tigers during college football season, embodying a relaxed but consistent fitness philosophy that prioritizes community over competition.
  arts: Rosa George channels their curiosity into acrylic painting inspired by the vivid hues of Southern landscapes, frequently visits galleries featuring works by contemporary Southern artists like John
    McCray, enjoys live jazz from legends such as Miles Davis and modern gospel ensembles like The Spirituals, participates in a local drum circle that blends Afro‑Cuban rhythms, and hones improvisational
    skills in community theater classes that celebrate unconventional storytelling.
  travel: Rosa George prefers spontaneous, culturally immersive trips, often escaping to historic Charleston or Savannah for weekend art walks, venturing to New Orleans for jazz festivals, and planning
    longer adventures to the Yucatán Peninsula’s cenotes or Tuscany’s vineyards, balancing a modest travel budget with a love for photography and a willingness to adjust itineraries when community commitments
    arise.
  culinary: Rosa George enjoys experimenting in the kitchen, mastering Southern classics like shrimp‑and‑grits and collard greens while infusing them with North‑African spices such as harissa and berbere,
    often preparing sweet potato pie spiked with cardamom and serving these creations at vibrant community potlucks that celebrate culinary cross‑pollination.
  core: Rosa George, a 52‑year‑old cyber‑security expert with a habit of over‑committing to community art, music, and mentorship, balances high‑stakes threat hunting with spontaneous painting sessions,
    drum‑circle nights, and a penchant for meticulous—but sometimes haphazard—budgeting.
background:
  cultural: Rosa grew up in the heart of South Carolina as a Black woman, shaped by the region’s rich tapestry of African-American heritage and Southern hospitality. Her family’s Sunday church gatherings
    instilled a sense of community, storytelling, and resilience that has guided her throughout life. Attending a historically Black high school and later a STEM-focused university, she navigated the challenges
    of underrepresentation in tech while drawing strength from a supportive network of mentors and peers. The culinary traditions of soul food, the rhythms of gospel and jazz, and the annual celebration
    of Juneteenth in her community remain central to her identity. Rosa’s cultural perspective informs her professional ethos, encouraging her to champion diversity in cybersecurity and to infuse her work
    with the collaborative spirit characteristic of her upbringing.
