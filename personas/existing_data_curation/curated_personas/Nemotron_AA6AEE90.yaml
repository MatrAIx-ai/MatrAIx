  career_goals: Rosa aims to transition into a senior leadership role where she can shape an organization’s security strategy on a broader scale. Within the next five years she plans to attain CISM and
    AWS Security Specialty certifications, deepen her expertise in AI-based threat detection, and lead the development of a zero-trust architecture for a regional healthcare network. She is committed to
    building a pipeline for Black women in cybersecurity by establishing a mentorship program in Richland County. To balance her high-stress profession with personal well‑being, Rosa also seeks a flexible
    consulting arrangement that allows her to allocate dedicated time for community outreach and creative pursuits.
