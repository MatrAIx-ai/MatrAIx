personas:
  professional: James Eng, a seasoned rural Maine educator with 25+ years of experience, leverages their curiosity and love of art to design interdisciplinary curricula that weave visual arts, literature,
    and local history into core subjects, while mentoring new teachers and championing flexible yet structured classroom environments as they pursue a master’s degree and a district Arts Integration Specialist
    role.
  sports: James Eng, an avid hiker, spends Saturday mornings trekking the Appalachian Trail sections near their town, supports the Boston Red Sox by watching games at a local bar, and occasionally joins
    a senior kayaking club on the Penobscot River, balancing low‑impact cardio with a love for the outdoors.
  arts: James Eng, an accomplished painter inspired by Winslow Homer and Andrew Wyeth, creates oil and watercolor landscapes of Maine’s shoreline, plays acoustic guitar at community gatherings swinging
    between Bob Dylan and Neil Young, volunteers as a set designer for the local theater, and frequently discusses literary fiction like Marilynne Robinson with their book club.
  travel: James Eng prefers meticulously planned road trips along New England’s historic routes, revisiting Acadia National Park, exploring the cobblestone streets of Portland, Maine, and dreaming of a
    future wander through the Scottish Highlands to photograph rugged coastlines, while balancing travel costs with a modest family budget.
  culinary: James Eng enjoys farm‑to‑table cooking, regularly preparing lobster rolls, clam chowder, and roasted root vegetable medleys seasoned with rosemary from their garden, while their secret indulgence
    is a late‑night blueberry crisp baked with locally sourced butter and a splash of bourbon.
  core: James Eng, a 53‑year‑old teacher‑turned‑arts‑integration advocate, merges a love for painting, gardening, and community theater with a disciplined yet flexible approach to life, often juggling budget
    spreadsheets, back‑pain exercises, and spontaneous hikes.
background:
  cultural: James was raised in a small New England town in Maine, steeped in Anglo‑American traditions that emphasize community, self‑reliance, and a deep connection to the natural environment. His family’s
    roots trace back to early settlers of the region, and community rituals such as lobster festivals, church gatherings, and town meetings have shaped his sense of belonging. The New England value placed
    on education and civic involvement fuels his commitment to teaching and community service. While identifying as white, he acknowledges the cultural mosaic of Maine, including the influence of Indigenous
    place names and the maritime heritage that informs his appreciation for local stories and art.
