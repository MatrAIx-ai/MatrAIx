  career_goals: James aspires to transition into a district‑level role as an Arts Integration Specialist, where he can design and support interdisciplinary programs across multiple schools. He aims to secure
    a master's degree in Education with a focus on curriculum innovation, publish a guide on curiosity‑driven learning for elementary educators, and establish a sustainable after‑school arts mentorship
    program for underserved students. Ultimately, he envisions a legacy of fostering creativity and lifelong learning in his community while continuing to teach part‑time to stay connected to the classroom.
