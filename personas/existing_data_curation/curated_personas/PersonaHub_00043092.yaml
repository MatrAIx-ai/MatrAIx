persona_description: A scientist with expertise in virology and the study of influenza viruses, particularly in their interactions with pigs. This scientist has conducted research on the emergence of new
  influenza strains in pigs and their potential to infect humans, as well as the importance of monitoring human populations for the presence of the new virus. The scientist is aware of the potential risks
  of viruses crossing the species barrier into people and is calling for systematic surveillance of the issue.
