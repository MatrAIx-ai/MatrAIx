personas:
  professional: Amy Valdes is a full‑stack web developer proficient in React, Node.js, Python/Django, AWS, Docker, and UI/UX design, who channels their curiosity and love for visual art into rapid prototyping
    of interactive digital experiences, while their relaxed attitude toward deadlines often leads them to embrace spontaneous pivots and occasional last‑minute code pushes.
  sports: Amy Valdes enjoys solo hikes through Hocking Hills and the Scioto Mile for reflection, follows the Columbus Blue Jackets in the NHL and the Columbus Crew SC in MLS, and stays active by joining
    the Columbus Running Club’s monthly 5K sessions, although their love for spontaneous creativity sometimes causes them to miss scheduled gym workouts and they often skip them when a new art project captures
    their attention.
  arts: Amy Valdes immerses themselves in Columbus’s arts scene by frequenting the Columbus Museum of Art to study works by Yayoi Kusama and Frida Kahlo, drawing digital illustrations inspired by Salvador
    Dalí’s surrealism, snapping urban photos in the style of Henri Cartier‑Bresson, and attending intimate indie gigs featuring Tame Impala and local post‑punk band The Digits while digging through vinyl
    crates for rare pressings of Björk and Radiohead, all while they seek fresh visual and auditory inspiration.
  travel: Amy Valdes prefers spontaneous, low‑budget city trips that blend cultural immersion with creative inspiration, having already roamed Berlin’s street‑art districts and Portland’s third‑wave coffee
    scene, while dreaming of a solo trek through Norway’s fjords and a week‑long digital‑detox retreat in Kyoto’s bamboo forests, and they plan itineraries on a whim, balancing each adventure against their
    freelance side income and flexible remote schedule.
  culinary: Amy Valdes is an adventurous home cook who often prepares spicy Korean bibimbap with gochujang, experiments with vegan mushroom risotto enhanced by truffle oil, crafts pizza topped with smoked
    mozzarella, roasted figs, and fresh basil, and indulges in tacos al pastor with pineapple and matcha‑infused macaroons during weekend brunches, all while they experiment with flavor pairings and share
    their creations on social media.
  core: Amy Valdes is a curiosity‑driven full‑stack developer who fuses art and code into immersive experiences, but their laid‑back, sometimes chaotic workflow often triggers last‑minute scrambles and
    an endless hunt for the perfect vinyl soundtrack, and they constantly juggle deadlines with creative side‑projects.
background:
  cultural: Amy grew up in a suburban neighborhood of Columbus, Ohio, in a family with European (German/Irish) ancestry and a hint of Hispanic heritage reflected in her surname. The Midwestern culture of
    modesty, community, and practicality blended with her family's emphasis on curiosity and artistic appreciation. She celebrates traditional American holidays such as Thanksgiving and the Fourth of July,
    and also participates in local cultural events like Latin music festivals and museum exhibitions that showcase the city's diversity. This mix of roots and regional influences informs her open‑minded
    worldview, her appreciation for both classic and contemporary art, and her flexible approach to work and life.
