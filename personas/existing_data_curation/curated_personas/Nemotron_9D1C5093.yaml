  career_goals: Amy aims to move into a lead software engineering or technical product management role where she can guide product strategy that fuses technology with artistic expression. Over the next
    five years she hopes to mentor junior developers, champion inclusive design practices, and contribute to open‑source projects that explore creative tech. Ultimately she envisions launching her own startup
    that offers immersive digital art tools, while maintaining a flexible remote work arrangement that supports her well‑being and reduces stress.
