personas:
  professional: Raquel Cortorreal, a 36‑year‑old organized home‑based caterer and budding community liaison, blends her bilingual communication, meticulous budgeting, and talent for orchestrating family‑style
    events into a part‑time venture that respects her household routine while positioning them for an administrative assistant role.
  sports: Raquel Cortorreal enjoys weekly hill walks with the Hilltop Striders club, follows the River Valley Bears baseball team and the City United soccer club, and channels their sociable energy into
    occasional friendly matches at the community center.
  arts: Raquel Cortorreal is an avid reader of romance novels by authors like Nicholas Sparks, delights in practicing folkloric dance, and fills their home with classic ballads from artists such as Adele
    and Ed Sheeran, while they occasionally attend local theater productions of contemporary dramas.
  travel: Raquel Cortorreal has traveled to Asheville, North Carolina for a folk arts festival, enjoys weekend getaways to the historic coastal town of Carmel‑by‑the‑Sea, and dreams of exploring the vibrant
    music scene of New Orleans, always planning trips that fit their budget and family schedule, and they prioritize travel that offers both cultural immersion and relaxation.
  culinary: Raquel Cortorreal passionately prepares family recipes such as tamales, pozole, enchiladas with mole sauce, and fresh pico de gallo using corn masa, dried chilies, cilantro, avocados, and lime,
    while also experimenting with seasonal vegetables from their garden to add a personal touch to each dish, and they love sharing these meals at neighborhood potlucks.
  core: Raquel Cortorreal, 36, blends routine‑driven organization, boundless sociability, and heartfelt anxiety into a life centered on community cooking, faithful caregiving, and lively storytelling, and
    they often find themselves juggling multiple events at once.
background:
  cultural: Raquel comes from a Mexican‑American family originally from Jalisco, and she grew up with strong ties to Mexican traditions, Catholic faith, and a bilingual environment. She celebrates holidays
    such as Día de los Muertos, Cinco de Mayo, and family quinceañeras, and she maintains a close relationship with extended family across the U.S.-Mexico border. Living in Banning, California, she balances
    these cultural roots with the multicultural fabric of Riverside County, frequently engaging in community events at the local parish and Hispanic centers.
attributes:
  skills: '["Household budgeting","Bill payment management","Meal planning and traditional Mexican cooking","Spanish‑English bilingual communication","Community event coordination","Basic computer literacy
    (email, social media)","Childcare","Basic first aid","Emotional support facilitation"]'
  hobbies: '["Preparing traditional Mexican dishes","Gardening vegetable herbs","Attending church services and cultural festivals","Folkloric dance classes","Hosting neighborhood potlucks","Reading romance
    novels","Walking local nature trails","Volunteering at senior center"]'
  career_goals: Raquel hopes to turn her organizational strengths and sociable nature into a part‑time role that respects her family routine. She is considering launching a home‑based catering service featuring
    family recipes, obtaining a certification in early childhood education to support local after‑school programs, and completing her GED with an eye toward an administrative assistant position. In the
    longer term she would like to become a community liaison at the local church, helping bridge Spanish‑speaking families with civic resources.
