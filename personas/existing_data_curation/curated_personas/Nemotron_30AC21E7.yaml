personas:
  professional: Jaya Tumlin is a seasoned food‑batch production specialist who leverages two decades of hands‑on expertise in scaling recipes, HACCP compliance, and Lean Six Sigma Yellow Belt methodology
    to drive continuous‑improvement projects, while their artistic curiosity pushes them to experiment with unconventional ingredient pairings and champion innovative, waste‑reducing processes as they pursue
    a supervisory role and a future Green Belt certification.
  sports: Jaya Tumlin stays fit by tackling weekly hikes with the Chugach Mountain Hiking Club, occasionally hitting the cross‑country ski trails in winter, and cheers on the Seattle Kraken and Seattle
    Seahawks on game days, while approaching exercise with a disciplined yet flexible mindset that mirrors their Lean Six Sigma approach to production.
  arts: Jaya Tumlin channels their creative drive into oil paintings of the Matanuska‑Susitna valleys, often inspired by the bold palettes of Georgia O'Keeffe and the atmospheric contrasts of Ansel Adams,
    while also capturing Alaskan wildlife through a Nikon D850 and regularly attending workshops led by local artist Maya Kaur, and finds quiet joy listening to the folk sounds of Bon Iver during studio
    sessions.
  travel: Jaya Tumlin prefers thoughtfully planned, nature‑focused getaways, having trekked the fjords of Norway and explored the glaciers of Patagonia, while dreaming of a future solo expedition to the
    wilds of New Zealand’s South Island, balancing the desire for adventure with a modest travel budget and occasional family commitments.
  culinary: Jaya Tumlin boasts a high‑intermediate culinary skillset, regularly crafting sourdough loaves, home‑brewed kombucha, and smoked salmon rubs featuring cedar, juniper berries, and wild rosemary,
    while relishing heirloom berry preserves with a drizzle of honey and often experimenting with unconventional flavor pairings like blueberry‑lavender vinaigrette on roasted beet salads.
  core: Jaya Tumlin blends scientific rigor with artistic wanderlust, channeling a competitive drive into process improvements while secretly hoarding half‑finished paint canvases and worrying over every
    detail from batch yields to the next hike’s trail map.
background:
  cultural: Jaya grew up in a small Midwestern town in the United States, descended from German‑Scandinavian immigrant families who emphasized hard work, self‑reliance, and community involvement. After
    earning her STEM degree, she moved to Alaska drawn by the state’s rugged wilderness and the opportunity to apply her food‑science expertise to locally sourced ingredients. Living in Sutton, she has
    embraced the frontier spirit of the Matanuska‑Susitna region—valuing independence, respect for the natural environment, and a practical, hands‑on approach to problem solving. While identifying as white,
    Jaya makes a conscious effort to learn about and respect the Dena’ina and other Indigenous cultures of the area, often participating in local cultural events and supporting initiatives that promote
    sustainable use of regional food resources.
attributes:
  skills: '[''Food batch formulation and scaling'', ''Industrial equipment operation'', ''HACCP and food safety compliance'', ''Statistical process control and data analysis'', ''Lean Six Sigma Yellow Belt'',
    ''Quality assurance and record-keeping'', ''Root-cause troubleshooting'', ''Training and mentoring of operators'', ''Process optimization and workflow design'', ''Problem solving and experimental formulation'']'
  hobbies: '[''Oil painting landscapes'', ''Landscape photography'', ''Home fermentation experiments'', ''Hiking and nature journaling'', ''Attending community art workshops'', ''Volunteering at local food
    bank'', ''Reading science and art literature'']'
  career_goals: Jaya aims to move from a hands‑on batchmaker to a production supervisory role within the next two years, leveraging her Lean Six Sigma training to spearhead efficiency initiatives and reduce
    waste. She hopes to earn a Green Belt certification and become the plant’s go‑to expert for new product development, especially projects that blend traditional Alaskan ingredients with innovative processing
    methods. Long‑term, Jaya envisions launching her own small‑scale artisanal food line—perhaps a line of heirloom berry preserves or fermented sauces—allowing her to apply her scientific background while
    exercising creative freedom. To achieve this, she plans to enroll in a short‑term business management course, build a network of local producers, and gradually transition her role to accommodate more
    strategic responsibilities, reducing the day‑to‑day operational stress that currently impacts her well‑being.
