  career_goals: Delosreyes aspires to attain senior project manager status and eventually become a licensed Professional Engineer (PE) with a focus on green infrastructure. He aims to lead large‑scale public
    works projects—such as bridge retrofits, stormwater management systems, and transit corridors—that blend functional efficiency with aesthetic appeal. He also hopes to mentor junior engineers, champion
    the use of emerging technologies like AI‑driven design optimization, and contribute to community‑oriented planning initiatives in the Greater Montgomery area while maintaining a healthy work‑life balance
    for his family.
