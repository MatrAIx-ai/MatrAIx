personas:
  professional: You Delosreyes, a 42‑year‑old civil engineer, merges rigorous structural design with an artistic sensibility, using AutoCAD, Revit, and SAP2000 to deliver sustainable bridge retrofits and
    stormwater solutions while leading multidisciplinary teams with methodical precision and a collaborative, curiosity‑driven mindset.
  sports: You Delosreyes avidly hikes the trails of Cheaha State Park and participates in the Montgomery Runners Club’s weekend long runs, roots for the Alabama Crimson Tide football team and enjoys attending
    Montgomery Biscuits baseball games, while also volunteering as a coach for a local youth soccer league, blending solitary outdoor activity with communal sports enthusiasm.
  arts: You Delosreyes nurtures their artistic side through landscape photography of the Deep South’s river valleys, sketches the intricate façades of historic Montgomery buildings, frequents the Montgomery
    Museum of Fine Arts and a contemporary gallery showcasing works by Kehinde Wiley, and regularly attends live jazz nights featuring performances of John Coltrane tributes, allowing creative appreciation
    to infuse their engineering projects with aesthetic nuance.
  travel: You Delosreyes prefers thoughtfully planned trips that balance family time and personal exploration, having photographed the lantern‑lit streets of Kyoto, hiked the Great Sand Dunes in Colorado,
    and taken a weekend road‑trip to Savannah’s historic squares, while saving for a future photography workshop in Patagonia and always budgeting for a modest stay in a locally‑run bed‑and‑breakfast.
  culinary: You Delosreyes enjoys cooking at an intermediate level, perfecting Thai Pad Krapow with fresh basil and gochujang, mastering Alabama white‑sauce BBQ chicken, and experimenting with fusion dishes
    like miso‑glazed pork ribs, often sourcing heirloom tomatoes, smoked paprika, and locally‑caught catfish, and they relish sharing these meals at small dinner gatherings while occasionally over‑salting
    dishes in pursuit of bold flavor.
  core: You Delosreyes, a 42‑year‑old civil engineer with a methodical mind and a curiosity for art, balances disciplined budgeting and health monitoring with spontaneous photography hikes, jazz nights,
    and experimental cooking, even if they sometimes forget their dentist appointments.
background:
  cultural: Delosreyes descends from a mixed Asian heritage that incorporates both East Asian traditions and broader diaspora influences. Growing up in a multicultural household, he celebrated lunar festivals,
    practiced respect for elders, and was encouraged to pursue academic excellence. Relocating to Prattville, AL, he integrated Southern hospitality and community involvement into his identity, shaping
    a hybrid cultural perspective that values family cohesion, communal harmony, and openness to diverse ideas. This blend informs both his professional collaboration style—prioritizing teamwork and consensus—and
    his personal pursuits, which often merge artistic expression with technical precision.
