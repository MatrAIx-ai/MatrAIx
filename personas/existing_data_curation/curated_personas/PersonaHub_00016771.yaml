persona_description: A historian who is interested in the history of Acadia and the Acadian community, particularly focusing on the events surrounding the Deportation of the Acadians from the Annapolis
  River. The individual is knowledgeable about the period between 1714 and 1748, the increase in population of Belle-Isle Marsh, the close relationship between the officials responsible for the Deportation
  and their victims, and the efforts of the inhabitants of the Annapolis River to escape. They are also interested in the history of the parish of Saint-Laurent and the role of Belle-Isle Marsh in its development.
