    time organization'', ''Data‑driven decision making'', ''Adaptability to market fluctuations'', ''Emotional resilience under pressure'']'
  hobbies: '[''Visiting contemporary art galleries'', ''Architectural photography walks'', ''Hiking in the Santa Ana Mountains'', ''Solo meditation and yoga'', ''Listening to real estate and design podcasts'',
    ''Reading urban planning and design books'', ''Experimenting with culinary recipes'', ''Playing strategy video games (e.g., Cities: Skylines, The Sims)'', ''Collecting limited‑edition vinyl records'']'
  career_goals: Johnny aims to become one of the top‑producing agents in Orange County within the next three years, targeting the luxury residential segment and integrating his art interest to specialize
    in high‑end properties with notable architectural and artistic features. He plans to obtain his real estate broker’s license, pursue the Certified Residential Specialist (CRS) designation, and later
    launch his own boutique brokerage that emphasizes sustainable, design‑forward homes. Long‑term, he envisions expanding into property development, creating a small portfolio of boutique apartments that
    incorporate curated art installations, and mentoring emerging agents who share his analytical mindset.
