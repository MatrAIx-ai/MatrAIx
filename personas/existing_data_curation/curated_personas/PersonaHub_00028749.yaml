persona_description: A cannabis physician who specializes in the use of cannabis medicine for inflammatory conditions, particularly for patients with high blood pressure, heart failure, or chronic kidney
  disease. The physician is knowledgeable about the anti-inflammatory benefits of phytocannabinoids and terpenoids found in cannabis, including the blockage of pro-inflammatory compounds that are made in
  the body as a result of injury or illness. The physician is also knowledgeable about the combination of cannabinoids that can be used to provide balanced and nontoxic medicinal effects, and has seen thousands
  of patients benefit from using cannabis medicine.
