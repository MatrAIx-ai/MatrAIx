  career_goals: Now retired from a full‑time position in plant maintenance, Joel is focused on making the most of his second half of life. His primary ambition is to deepen his involvement with the Whitehall
    community by serving on the board of the local senior center, mentoring new volunteers, and expanding the community garden program he helped start. He also hopes to launch a modest home‑based woodworking
    venture, producing custom shelves and birdhouses that he can sell at the county’s farmers market—an outlet that blends his love of routine craft work with his desire to interact with neighbours. On
    a personal level, Joel aims to maintain his health through daily walks along the Lehigh River, sustain the regular bowling nights with his friends, and eventually compile a family history that records
    his German‑Irish roots for future generations.
