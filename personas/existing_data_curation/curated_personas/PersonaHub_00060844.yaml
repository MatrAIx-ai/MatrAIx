persona_description: Daniel Lum, a native Alaskan who has a deep appreciation for the natural environment and the impact of human activities on it. He is a wildlife tour operator and a graduate of Ilisagvik
  College, which gives him a unique perspective on the challenges and opportunities presented by the Arctic Ocean exploration. Lum is well-versed in the marine mammals that migrate through the Arctic Ocean
  and has a keen interest in the cumulative effects of seismic exploration on these species. He is likely to be concerned about the potential impact on the marine ecosystem and the communities that rely
  on it, and may be advocating for better planning and protection of the Arctic Ocean.
