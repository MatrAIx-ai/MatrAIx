persona_description: A materials scientist and engineer specializing in the field of stretchable 3D shape-changing materials. He has expertise in the use of bio-inspiration and mathematics to develop novel
  methods for precise shape transformation. His work focuses on the fabrication of stretchable surfaces with programmable texture morphing for synthetic camouflage skins, with a particular emphasis on developing
  a simple and effective method for precisely inflating objects into targeted shapes. He is also interested in the potential applications of this technology in robotics, particularly in the design of inflatable
  structures for repetitive tasks. His work has been funded by the Army Research Office and he is currently working on developing more precise shapes with higher-resolution laser patterning.
