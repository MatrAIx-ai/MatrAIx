persona_description: A medical professional who specializes in the diagnosis and treatment of glaucoma, particularly in African-American populations. Dr. Kevin Greenidge is the chairman of the Department
  of Ophthalmology at Long Island College Hospital in Brooklyn, N.Y. He has conducted extensive research on the causes and prevention of glaucoma, and is known for his efforts to raise awareness about the
  disease and its impact on African-Americans. Dr. Greenidge is a highly respected figure in the medical community and has made significant contributions to the field of ophthalmology.
