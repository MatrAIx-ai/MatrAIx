    reporting'', ''Process improvement methodologies (Lean, Six Sigma)'', ''Bilingual communication (Mandarin, Vietnamese, English)'', ''Conflict resolution and team building'', ''Community outreach and
    health education program development'']'
  hobbies: '[''Tai chi'', ''Cooking traditional Chinese and Vietnamese dishes'', ''Gardening herbs and vegetables'', ''Hiking coastal trails'', ''Volunteering at senior center (computer skills and health
    literacy)'', ''Reading historical biographies'', ''Exploring contemporary Chinese literature'', ''Calligraphy'']'
  career_goals: Looking ahead, Xuemei aims to obtain the Certified Medical Manager (CMM) credential and enroll in an executive health administration program to deepen her leadership expertise. She aspires
    to advance to a senior director role overseeing multiple clinics, with a focus on expanding culturally competent services for East Asian immigrant populations in Los Angeles. Additionally, she plans
    to mentor emerging health managers, lead a hospital‑wide patient experience transformation, and eventually launch a nonprofit community health center that integrates preventive care, traditional health
    practices, and bilingual support.
