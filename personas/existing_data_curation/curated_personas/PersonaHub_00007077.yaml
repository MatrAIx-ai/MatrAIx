persona_description: A professional with expertise in environmental policy and management, specifically focusing on the integration of environmental values into decision-making processes. They are knowledgeable
  in the analysis of environmental impacts of proposed actions, reasonable alternatives, and the use of NEPA to make decisions. The individual is responsible for taking actions that protect, restore, and
  enhance the environment, and manages potential environmental consequences through a proactive, systematic approach under their Environmental Management System (EMS). They have a deep understanding of
  Executive Order 13148, Greening the Government through Leadership in Environmental Management, and are well-versed in the requirements for all Federal agencies to implement an Environmental Management
  System. They are likely to be involved in the development and implementation of environmental policies and programs, and work closely with stakeholders to ensure that environmental considerations are
  incorporated into all aspects of their work.
