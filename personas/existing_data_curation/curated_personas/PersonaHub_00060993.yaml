persona_description: A researcher and academic with a keen interest in the consumption and distribution of food, particularly its impact on wider society. They are knowledgeable about the factors that influence
  food consumption and retailing, and are interested in exploring the ethical and social implications of food consumption. They are also interested in the effects of food on health and nutrition, and are
  looking for ways to improve access to healthy food for all. They are likely to be interested in the book "The Consuming Geographies of Food" and its analysis of food access, ethics, and consumption in
  different regions of the world.
