  hobbies: '[''Sketching and painting'', ''Photography (especially landscape)'', ''Digital illustration'', ''Reading sci‑fi and art history'', ''Volunteering at local library art workshops'', ''Playing
    volleyball'', ''Participating in drama club'', ''Attending community fairs and festivals'', ''Exploring new cuisines'', ''Learning about cultural traditions through film'']'
  career_goals: Dena plans to enroll in a university program that merges her love for visual arts and community engagement, such as a B.A. in Graphic Design, Marketing, or Arts Administration at North Dakota
    State University or a regional college. In the short term, she aims to secure internships with local non‑profits, agricultural cooperatives, or small design agencies to build a professional portfolio.
    Long‑term, she aspires to become a creative director or community outreach specialist who uses art and digital storytelling to revitalize rural towns, organize cultural festivals, and help local businesses
    market sustainably. She also envisions pursuing a Master’s degree in Arts Management to deepen her impact on community cultural development.
