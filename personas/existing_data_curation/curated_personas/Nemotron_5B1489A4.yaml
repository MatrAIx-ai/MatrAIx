personas:
  professional: An aspiring graphic designer and community outreach specialist, Dena Culbreth leverages their Adobe Photoshop and Illustrator skills, strong public speaking, and meticulous event-planning
    experience to craft visual campaigns for local nonprofits, and they channel their organized, sociable nature and love for prairie landscapes into fresh, place‑based storytelling.
  sports: An energetic participant in high school volleyball and intramural soccer, Dena Culbreth also cheers for the North Dakota State Bison football team and follows the Minnesota Twins, while they maintain
    a routine of early‑morning jogs across the prairie fields and occasional weekend hikes with the Oakes Community Outdoor Club.
  arts: Passionate about visual storytelling, Dena Culbreth spends weekends sketching prairie sunsets, curating digital illustrations inspired by Ansel Adams, and they find inspiration in the music of Fleet
    Foxes, the paintings of Georgia O'Keeffe, and the poetry of Margaret Atwood.
  travel: With a love for both local discovery and distant horizons, Dena Culbreth has explored the historic streets of St. Paul, plans a future road‑trip to the Badlands National Park, and they dream of
    a study‑abroad semester in Copenhagen to experience Scandinavian design, all while budgeting travel through part‑time farm chores and student‑discount platforms.
  culinary: An enthusiastic home‑cook, Dena Culbreth enjoys whipping up hearty beet soup, fresh corn succotash, and experimenting with herb‑infused honey‑glazed chicken, while they savor farm‑fresh strawberries
    and indulge in occasional cheese‑curd fries from the county fair.
  core: Creative, organized, and community‑focused, Dena Culbreth blends prairie‑inspired art with digital design, saves wisely, manages mild health quirks, stays active in school sports, and they fuel
    their curiosity through travel and food adventures.
background:
  cultural: Dena comes from a predominantly white, Midwestern rural community in Oakes, North Dakota, where German and Scandinavian ancestry are common. Her upbringing reflects the values of self‑reliance,
    modesty, and strong community ties characteristic of the region. Living in an agricultural county, she has been immersed in the rhythms of farm life, county fairs, and close‑knit social networks. The
    local culture emphasizes hard work, volunteerism, and collective celebrations such as potluck meals and church gatherings. These influences shape her collaborative nature, appreciation for community
    arts, and desire to blend traditional values with fresh, creative ideas.
attributes:
  skills: '[''Event planning and coordination'', ''Public speaking and presentation'', ''Digital graphic design (Photoshop, Canva)'', ''Social media content creation'', ''Photography and photo editing'',
