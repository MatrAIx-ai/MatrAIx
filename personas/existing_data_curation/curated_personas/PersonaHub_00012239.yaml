persona_description: A skilled and experienced metal stamping engineer who specializes in the design, development, and implementation of stamping processes for various materials and parts. They are familiar
  with the general stamping process, including single operation forming, progressive die stamping, and high speed stamping. They have a deep understanding of the advantages and limitations of general stamping,
  as well as its applications in producing a wide range of simple and complex parts in sheet metal. They are proficient in using the text to understand and analyze the various aspects of general stamping
  and its potential applications.
