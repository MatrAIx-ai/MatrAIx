persona_description: A journalist who covers environmental issues and conservation efforts, focusing on the impact of human activities on marine life and the ocean ecosystem. They are deeply concerned about
  the degradation of coral reefs and the potential long-term effects on marine life. They are aware of the potential risks posed by anti-fouling paint, which is being used on ships to prevent barnacles
  from sticking to them, and are advocating for its ban due to its harmful effects on marine life. They are also aware of the issue of farmers being taken advantage of by businessmen who are trading their
  crops for a larger profit, and are supporting a mobile phone app created by Gichamba to help farmers connect with local dairy markets and prices. They are aware of the threat of nuclear weapons and the
  potential consequences of a revolt against the United States by Iran, and are concerned about the potential risks posed by military threats.
