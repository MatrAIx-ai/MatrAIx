persona_description: A scientist or researcher who specializes in the study of phytoplankton blooms in the North Pacific Subtropical Gyre, particularly focusing on the interactions between diatoms and their
  symbiotic dinoflagellates. This individual is likely to have expertise in fieldwork, analytical chemistry, and biological oceanography, and is interested in understanding the dynamics of these blooms,
  their impact on the ecosystem, and the role of diatom-diazotroph associations in nutrient cycling. They would be interested in comparing the characteristics of different blooms, identifying changes in
  phytoplankton size structure, and investigating the potential carbon export mechanisms in these blooms.
