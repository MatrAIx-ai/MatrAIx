    ''Attending improv theater performances'', ''Reading non‑fiction on media trends and psychology'', ''Hosting group board‑game nights'']'
  career_goals: Luis aims to advance to a Director of Communications role within a leading cultural institution or government agency in Puerto Rico, where he can shape public narratives on a larger scale.
    He aspires to obtain the APR (Accreditation in Public Relations) credential and eventually launch his own boutique PR consultancy focused on the arts, music, and cultural festivals. Luis also seeks
    to become a recognized speaker at regional PR conferences, mentor emerging PR professionals, and integrate emerging technologies—such as AR experiences and AI‑driven media monitoring—into his practice.
