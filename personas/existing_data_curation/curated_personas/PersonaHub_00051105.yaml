persona_description: A business professional who is responsible for conducting SWOT analysis for the organization. This person has experience in conducting SWOT analysis and is familiar with the process
  and its applications. They are skilled in identifying strengths, weaknesses, opportunities, and threats related to the organization and its functions and activities. This person is aware of the importance
  of the structure for identifying and analyzing strengths, weaknesses, opportunities, and threats, and the need to review a situation and develop appropriate strategies and plans. They are also aware of
  the importance of assessing primary capabilities and competences and the confirmation for business alterations. This person is likely to engage and participate in group experiences and utilize group experience
  to gather information on Strengths and Weaknesses, Opportunities and Threats.
