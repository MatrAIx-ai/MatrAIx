  career_goals: Jaime aims to obtain her GED within the next year, followed by enrollment in a community‑college associate program in computer science or information technology. She aspires to become a
    remote front‑end web developer, where she can leverage her solitary work style and competitive drive. Parallel to her tech ambitions, she envisions eventually opening a modest home‑based bakery that
    specializes in Guatemalan pastries and baked goods, combining her cultural cooking expertise with entrepreneurial independence. Throughout her career path, she seeks stable, self‑directed work that
    reduces social strain and supports her emotional well‑being.
