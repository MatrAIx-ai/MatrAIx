personas:
  professional: Jaime Delgado is an aspiring front‑end web developer who leverages their methodical problem‑solving, fluency in HTML, CSS, and introductory JavaScript, and love of solitary focused work,
    and they craft clean, responsive sites while competitively aiming to out‑perform peers in coding challenges.
  sports: Jaime Delgado follows the Minnesota Timberwolves and the Minnesota Twins avidly, joins the Twin Cities Road Runners for early‑morning jogs on the LeBoeuf Lake trail, and prefers solo cycling along
    the Mississippi River bluffs over team sports, and they maintain a fitness regimen that balances quiet endurance with occasional fan enthusiasm.
  arts: Jaime Delgado curates lo‑fi study playlists featuring Chillhop Essentials and classical pieces by Debussy and Philip Glass, draws inspiration from digital illustrators like Ross Tran and anime storyboard
    artist Kazuhiro Hara, and spends evenings absorbed in speculative fiction by N. K. Jemisin, and they let the arts shape a quiet yet vibrant personal world.
  travel: Jaime Delgado, who prefers meticulously planned solo trips laid out in bullet‑journal itineraries, has explored Chicago’s lakefront parks and New York’s literary cafés, and dreams of wandering
    Kyoto’s cherry‑blossom avenues and Utah’s red‑rock canyons, and they balance a modest travel budget with a yearning for tranquil, culturally rich experiences.
  culinary: Jaime Delgado delights in mastering traditional dishes such as hand‑rolled pork tamales with roasted tomato salsa, slow‑cooked pepian enriched with pumpkin seeds and annatto, and sweetbread
    (pan de fruta) spiced with cinnamon and guava jam, while also experimenting with fresh herbs like cilantro, oregano, and basil from their balcony garden, and they elevate every bite with careful seasoning.
  core: Jaime Delgado is a methodical, solitary teen whose relentless curiosity fuels both code and cuisine, yet their intense anxiety drives them to over‑schedule every minute, and they secretly binge‑watch
    late‑night lo‑fi streams.
background:
  cultural: Jaime was born to Guatemalan immigrant parents who settled in Farmington, Minnesota. Her household is bilingual, with Spanish spoken daily and English used outside the home, fostering fluency
    in both languages. The family maintains cultural traditions such as preparing tamales and other Guatemalan staples, celebrating Día de los Muertos with altars and community gatherings, and attending
    a local Catholic parish that serves as a cultural hub. They participate in the regional Guatemalan association, which organizes festivals and cultural events, reinforcing a sense of belonging and cultural
    pride. While Jaime values solitude, the strong family orientation and communal celebrations influence her love for cooking and preserving her heritage through food and storytelling.
