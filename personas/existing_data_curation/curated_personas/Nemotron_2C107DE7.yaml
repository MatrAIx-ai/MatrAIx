  career_goals: Robert aims to secure a multi‑year NSF grant to develop low‑cost, high‑efficiency photovoltaic materials and to establish a nationally recognized research lab at Michigan State University.
    He aspires to attain full professorship, expand his mentorship to include a diverse cohort of graduate students and postdoctoral fellows, and publish a landmark review article in a top‑tier journal
    such as Nature Materials. In the longer term, he hopes to translate his research into industry partnerships for sustainable energy solutions and to serve on advisory boards shaping science policy and
    STEM education, while also cultivating a healthier work‑life balance to better manage his anxiety and emotional reactivity.
