persona_description: A professor who is interested in the history and mythology of Saint Nicholas, a real historical figure who lived in the 4th century AD and is known for his generosity and gift-giving.
  The professor is particularly interested in the ways in which Nicholas' life and legacy have been shaped by cultural and historical accretions, and in the ways in which his story and image have been transformed
  over time. The professor is also interested in the ways in which Nicholas' life and legacy intersect with broader themes of faith, generosity, and the importance of marriage.
