personas:
  professional: Carlos Moreno, a 22‑year‑old construction specialist with hands‑on experience in residential framing, concrete formwork and finish carpentry, leverages his bilingual ability and OSHA‑trained
    safety mindset to keep job sites meticulously organized, troubleshoot problems swiftly, and lead crews with the reliable, structured approach that his personality favors.
  sports: Carlos Moreno maintains a rigorous fitness regimen that combines strength training at his neighborhood gym and weekly pick‑up basketball games, cheering on the Atlanta Hawks during the NBA season
    while also supporting Atlanta United soccer and the Atlanta Falcons football teams, and he is a member of the local youth sports center’s adult basketball league, reflecting his love for structured,
    low‑key competition.
  arts: Carlos Moreno finds creative inspiration in watching renovation series like Fixer Upper and Property Brothers, strumming acoustic covers of John Legend and Gustavo Santaolalla while mentoring kids
    in woodworking, and attending live performances by the Atlanta Symphony Orchestra and regional folk bands, which together enrich his appreciation for both visual and auditory arts.
  travel: Carlos Moreno favors budget‑friendly road trips that blend adventure and relaxation, having explored Asheville’s mountain retreats and New Orleans’ vibrant music scene, while dreaming of a future
    solo backpacking journey through Portugal’s historic Alentejo villages, all planned around his work schedule and modest savings.
  culinary: Carlos Moreno, an enthusiastic home cook, expertly prepares family‑style tamales wrapped in corn husks and rich mole sauce simmered with chilies, chocolate, roasted peanuts and fresh cilantro,
    often sharing these hearty meals with friends during casual dinner parties.
  core: Carlos Moreno is a detail‑driven, pragmatic builder who balances his love for structured projects, spirited basketball games, and hearty home‑cooked meals, all while occasionally over‑scheduling
    himself and obsessively checking off to‑do lists.
background:
  cultural: Carlos is a second‑generation Mexican‑American; his parents emigrated from Jalisco and raised him in a Spanish‑speaking household in the Atlanta metropolitan area. He grew up celebrating Día
    de los Muertos, Semana Santa, and other Mexican holidays, and he remains active in the local Latino community through church gatherings and cultural events. His upbringing instilled a strong work ethic,
    respect for family, and a blend of Mexican traditions with Southern American influences, which is reflected in his bilingual communication, love of Mexican cuisine, and community‑oriented values.
attributes:
  skills: '[''Concrete formwork'', ''Framing'', ''Finish carpentry'', ''Blueprint reading'', ''OSHA safety compliance'', ''Skid‑steer & back‑hoe operation'', ''Bilingual Spanish‑English communication'',
    ''Team coordination'', ''Problem solving'']'
  hobbies: '[''Strength training'', ''Pickup basketball'', ''Cooking Mexican dishes'', ''Watching renovation TV shows'', ''Volunteering teaching woodworking'', ''Attending cultural festivals'']'
  career_goals: Over the next few years, Carlos aims to obtain a journeyman carpenter certification and complete an OSHA 30‑hour safety program. He plans to enroll in a construction management associate
    program at a local community college, earn a heavy‑equipment operator license, and eventually move into a crew‑lead or project‑supervisor role. His long‑term ambition is to become a certified construction
    manager so he can oversee larger residential projects and provide a stable income for his family.
