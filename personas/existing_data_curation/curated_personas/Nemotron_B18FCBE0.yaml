  hobbies: '[''landscape photography'', ''model railroading'', ''hiking'', ''woodworking'', ''reading railway history'', ''puzzle solving'', ''visiting art galleries'', ''journal writing'']'
  career_goals: Approaching retirement, Justin aims to transition from daily conductorship to a senior safety auditor role, leveraging his impeccable safety record to mentor younger engineers and conductors.
    He hopes to obtain formal certification as a railroad safety trainer and to consult for regional rail operators on risk reduction. Parallel to his professional aspirations, he plans to author a memoir
    that weaves his rail experiences with his photography and sketches, and to volunteer as a docent at a local railway museum, preserving the Skagit County rail heritage for future generations.
