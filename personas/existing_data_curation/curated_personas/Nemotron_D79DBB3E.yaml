  career_goals: Teresa aims to transition from an individual contributor to a leadership role in IT service management within the next three years. She plans to obtain ITIL Expert and PMP certifications,
    positioning herself for an IT Service Manager or IT Business Analyst position where she can shape service delivery strategy and drive digital transformation initiatives. Leveraging her business background,
    she envisions leading cross‑functional teams that integrate technology solutions with creative business processes, such as implementing user‑centric support portals that incorporate visual design and
    AI‑enhanced self‑service. In the longer term, Teresa aspires to launch a boutique consulting practice that helps mid‑size companies blend technology, design thinking, and process optimization, while
    also mentoring women in tech to foster a more diverse and innovative workforce.
