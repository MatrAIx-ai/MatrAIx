persona_description: A scientist who specializes in the study of nutrient transport and water quality, particularly in the context of regional and basin-scale assessments. This person is likely to have
  expertise in watershed modeling techniques, particularly SPARROW (Spatially Referenced Regressions On Watershed attributes), and has conducted research in the USGS National Water Quality Assessment (NAWQA)
  project. This person is interested in investigating nutrient contributions to declining water quality in rivers and streams, and is likely to have experience in developing and implementing models to predict
  nutrient loads, concentrations, yields, and source contributions. This person is also likely to have knowledge of the Mississippi/Atchafalaya River Basin (MARB), the US portion of the Great Lakes Basin
  and the Ohio, Upper Mississippi and Red River Basins (MRB3), and the Mid-Continental Region of North America.
