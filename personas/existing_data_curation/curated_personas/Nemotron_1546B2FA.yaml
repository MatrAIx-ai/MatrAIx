personas:
  professional: Jeanette Offord, a seasoned cutting operator with over a decade of experience calibrating fabric, composite, and metal cutting machines, leverages her artist’s eye for detail and collaborative
    spirit to mentor new hires, streamline production, and pursue CNC programming certification on the path to a supervisory role, where they hope to blend technical precision with team cohesion.
  sports: Jeanette Offord channels her love of the Connecticut shoreline into regular hikes on the Coastal Trail, plays on a co‑ed recreational softball league, and roots for the New England Patriots and
    Boston Red Sox, while they also volunteer as a set‑builder for the local sailing club’s regatta crew.
  arts: Jeanette Offord, a watercolor enthusiast who captures the Atlantic mist in palettes reminiscent of Winslow Homer and Claude Monet, regularly volunteers at community art workshops for children, performs
    in Westbrook’s community theater both on stage and behind set design, and they find inspiration in contemporary author Sally Rooney and musician Joni Mitchell.
  travel: Jeanette Offord prefers thoughtfully planned weekend getaways that blend coastal hikes with cultural immersion, often escaping to Block Island or Martha’s Vineyard for sea‑air inspiration, while
    their wishlist includes a literary pilgrimage to Galway, Ireland, and a spring stroll through the gardens of Kyoto, all balanced against a modest travel budget and family commitments.
  culinary: Jeanette Offord, an experimental home cook, delights in crafting lobster bisque with a splash of sherry, perfecting saffron risotto for dinner parties, and improvising kimchi fried rice with
    leftover quinoa, while their go‑to pantry staples include fresh basil, black garlic, and a well‑worn cast‑iron skillet.
  core: Jeanette Offord is a curious, community‑oriented cutter‑operator‑turned‑artist who balances precise craftsmanship with spontaneous creativity, often swapping a safety checklist for a watercolor
    brush when inspiration strikes, and they thrive on turning collaborative projects into vibrant, tactile experiences.
background:
  cultural: Jeanette grew up in a white, New England family with deep roots in the coastal towns of Connecticut. Her grandparents emigrated from Ireland and England in the early 20th century, bringing a
    blend of Anglo‑Irish traditions that are still celebrated during local festivals and family gatherings. Raised in Westbrook, she has a strong connection to the maritime heritage of the area, often participating
    in town parades, summer fairs, and community service events. The region’s emphasis on community solidarity, support for the arts, and appreciation for the outdoors has shaped her values of cooperation,
    harmony, and curiosity about new experiences.
