  career_goals: Jeanette aims to advance to a supervisory role within the cutting department, eventually becoming a shift lead or production manager where she can blend her technical expertise with her
    talent for fostering team cohesion. She plans to earn a certification in CNC programming to broaden her skill set and introduce more efficient, creative cutting techniques. Long‑term, she hopes to spearhead
    a continuous‑improvement program that integrates design thinking into the production line, and she dreams of launching a small side venture selling handcrafted fabric art pieces that reflect her love
    for visual aesthetics.
