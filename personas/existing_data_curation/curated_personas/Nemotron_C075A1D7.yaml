  career_goals: Mandy aims to leverage her extensive experience toward a supervisory role within the store, such as shift manager, where she can mentor younger associates and streamline operational processes.
    She also envisions launching a small home‑based online shop selling hand‑knit blankets and garden herbs, blending her practical skills with her curiosity about e‑commerce. While she values stability,
    she seeks to leave a legacy of professionalism and community involvement before retirement.
