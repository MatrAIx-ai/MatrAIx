  career_goals: Laurie aims to progress from her current billing clerk role to a senior billing analyst position within the next two to three years, focusing on leading process improvement projects and
    mentorship of new staff. She plans to pursue the Certified Management Accountant (CMA) credential and eventually a part‑time MBA to broaden her strategic business knowledge. In the longer term, she
    envisions moving into a financial operations manager role where she can shape organizational financial policies, drive efficiency initiatives, and contribute to community-focused financial outreach
    programs.
