  career_goals: Christopher aims to transition from a labor role to a construction management position within the next three years, targeting a site supervisor or project manager role on mid‑size commercial
    projects in Richmond. He plans to obtain OSHA certification and a Project Management Professional (PMP) credential, while completing a LEED Green Building training to deepen his expertise in sustainable
    construction. Over the longer term, he aspires to start his own construction consultancy that blends the rigor of business strategy with innovative, art‑inspired design, focusing on revitalizing underserved
    neighborhoods and creating culturally resonant, environmentally responsible structures. His competitive nature drives him to be recognized as a leader who consistently delivers projects on time, under
    budget, and with a distinctive aesthetic edge.
