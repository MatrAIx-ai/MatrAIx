persona_description: A Wisconsin School District Teacher with a focus on education policy and the evaluation of teacher qualifications. The persona is interested in analyzing data related to teacher qualifications,
  specifically the percentage of teachers teaching core subjects who are ESEA qualified. They are also interested in understanding the associations between teacher qualifications and factors such as school
  demographic characteristics, district spending, high-quality professional development opportunities, and staff climate. Additionally, the persona is interested in learning about the impact of teacher
  qualifications on student academic performance, graduation rates, and other outcomes in their school or district. They are also interested in identifying schools with high teacher qualifications and how
  these schools can be used as models for recruiting and retaining qualified teachers.
