persona_description: A researcher at the International Food Policy Research Institute (IFPRI) who is passionate about improving agricultural productivity and environmental sustainability in developing countries.
  This individual is highly knowledgeable in the field of agriculture, having worked with IFPRI's International Model for Policy Analysis of Agricultural Commodities and Trade (IMPACT) to assess the effects
  of climate change and water availability on future agricultural production, consumption, and trade. They are skilled in collaborating with scientists from the Consultative Group on International Agricultural
  Research (CGIAR) to improve the capacity of CGIAR centers to prioritize research investments. The researcher is interested in understanding how changes in global trading regimes, mandates for biofuels,
  and energy prices, as well as land degradation and climate change, affect human well-being.
