personas:
  professional: Teny Soto, a seasoned construction specialist with an associate’s degree in construction technology, combines bilingual communication, meticulous blueprint interpretation, and hands‑on expertise
    in concrete mixing, formwork, and heavy‑equipment operation to keep projects on schedule and safe, and they are actively pursuing OSHA 30‑hour certification and a heavy‑equipment operator license to
    step into a foreman role within three years.
  sports: Teny Soto enjoys sunrise walks along the Vista coastal trail, plays weekend beach volleyball with a small group of friends, follows the San Diego Padres with avid enthusiasm – often wearing the
    team cap during site breaks – and they occasionally join a community cycling club for longer rides on the Pacific Coast Highway.
  arts: Teny Soto finds artistic inspiration at the local mural walk, where they admire vibrant wall paintings that echo Rivera‑style social scenes, listen regularly to the soulful vocals of Lila Downs
    and the guitar strums of Juan Gabriel, collect hand‑woven blankets, and they spend quiet evenings reading historical fiction novels like 'The Nightingale' to unwind.
  travel: Teny Soto prefers road trips that combine cultural immersion with coastal relaxation, having driven the Pacific Coast Highway to explore the historic mission in San Juan Capistrano and the seaside
    town of Santa Barbara, dreams of visiting the colonial towns of Guanajuato and Oaxaca to experience local festivals, and they budget carefully to keep travel modest and family‑friendly.
  culinary: Teny Soto specializes in making tamales al pastor and simmering pozole rojo, seasoning them with dried guajillo chilies, epazote, and hominy, tends a small vegetable garden that yields heirloom
    tomatoes and jalapeños for fresh toppings, proudly knits corn‑husks blankets for family gatherings, and they occasionally over‑spice dishes, leading to an extra glass of water for guests.
  core: Teny Soto, a methodical construction forewoman who blends routine‑driven work ethic with a love for traditional cooking, garden‑grown herbs, and disciplined budgeting, they balance a quiet, solitary
    lifestyle with a fierce commitment to mentoring new crews.
background:
  cultural: Teny grew up in a bilingual Mexican‑American household in the San Diego area, where family, Catholic faith, and cultural traditions were central. Celebrations like Día de los Muertos and Las
    Posadas, frequent visits to family‑run taquerías, and the preservation of traditional recipes have shaped her identity. Fluent in Spanish and English, she remains actively involved in the local Mexican
    community, valuing hard work, respect for elders, and close‑knit family ties.
attributes:
  skills: '[''Concrete mixing and pouring'', ''Formwork construction'', ''Framing and sheathing'', ''Blueprint reading'', ''Equipment operation (forklift, scissor lift, backhoe)'', ''Safety compliance and
    OSHA training'', ''Materials inventory management'', ''Site cleanup and waste disposal'', ''Documentation and project tracking'', ''Bilingual communication (Spanish-English)'']'
  hobbies: '[''Mexican cooking'', ''Gardening'', ''Knitting'', ''Beach walks'', ''Reading historical fiction'', ''Attending small church gatherings'', ''Community clean-up volunteering'']'
  career_goals: Her immediate goal is to become a foreman or crew leader within the next three years, obtaining OSHA 30‑hour certification and a heavy‑equipment operator license. She plans to leverage her
    associate’s degree to transition into supervisory roles that blend field work with project planning. Long‑term, she aspires to complete a bachelor’s degree in construction management, positioning herself
    for project coordinator or site manager positions that provide stable income and the opportunity to mentor new workers.
