  hobbies: '["vegetable gardening", "heirloom seed cultivation", "woodworking", "vintage radio restoration", "reading historical nonfiction", "church participation", "chess", "walking on nature trails"]'
  career_goals: Although retired from formal employment, John aims to deepen his impact on the Central community. He plans to lead a senior‑focused mentorship program at the local community center, sharing
    practical skills and life lessons with younger residents. He also hopes to compile a memoir of mid‑20th‑century life in Harrison County, preserving local history for future generations. Managing his
    anxiety, he seeks to maintain a regular routine of meditation, counseling, and supportive group sessions, ensuring his emotional well‑being while remaining a dependable partner to his wife.
