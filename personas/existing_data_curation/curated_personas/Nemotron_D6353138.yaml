  hobbies: '[''reading (art history, philosophy)'', ''art gallery visits'', ''sketching'', ''landscape photography'', ''hiking'', ''birdwatching'', ''classical piano playing'', ''vinyl jazz listening'',
    ''journaling'', ''woodworking'', ''attending lecture series'', ''digital art experimentation'']'
  career_goals: Martin aims to transition into a senior HR leadership role within a small non‑profit arts organization in northern New Hampshire, allowing him to blend his HR expertise with his love of
    the arts. Alternatively, he plans to establish himself as a freelance HR consultant specializing in tailored people‑management solutions for rural businesses and community groups, emphasizing mindful
    work practices and creative well‑being programs. Over the next year, he intends to earn a SHRM‑CP certification to formalize his professional credentials. Long‑term, Martin hopes to mentor emerging
    HR staff, develop a succession plan for his current employer, and eventually scale back his day‑to‑day responsibilities to devote more time to solitary pursuits before moving into semi‑retirement.
