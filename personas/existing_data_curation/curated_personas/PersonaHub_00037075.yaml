persona_description: A finance professor who specializes in the analysis of international capital flows, currency crises, and the impact of economic liberalization on emerging market economies. His research
  interests include the role of foreign investment, the effects of capital controls on economic growth, and the regulation of financial markets. He is particularly interested in understanding the factors
  that have contributed to the success of India's economy in avoiding financial crises, and the potential implications of cross-border flows of capital for the Indian economy.
