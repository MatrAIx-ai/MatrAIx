  career_goals: Although retired from the formal workforce, Otis aims to continue contributing intellectually and creatively. He plans to author a series of interdisciplinary essays that weave together
    concepts from physics, mathematics, and visual art, and to compile a memoir that chronicles the evolution of aerospace engineering through the perspective of a Black veteran engineer. He also aspires
    to develop a community outreach program that pairs STEM mentorship with art workshops for under‑privileged youth in Brevard County, ensuring his compassion and collaborative spirit benefit the next
    generation. Maintaining his health and lifelong learning, he hopes to explore emerging topics like quantum computing and to exhibit his abstract paintings in local galleries.
