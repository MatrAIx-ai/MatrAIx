  hobbies: '[''Building block towers'', ''Drawing tropical scenes'', ''Dancing to salsa and zydeco'', ''Exploring nature trails'', ''Collecting pinecones and identifying birds'', ''Baking pan de coco with
    family'', ''Reading picture books about animals and space'', ''Playing organized games with friends'', ''Singing Cuban children’s songs'', ''Practicing basic Spanish phrases through games'']'
  career_goals: Zoraida dreams of exploring nature and helping animals; she often says she wants to become a veterinarian or a wildlife scientist who studies the local wetlands. She also loves storytelling
    and imagines opening a community reading corner where other kids can discover books in both English and Spanish. Her ambitions reflect her love for learning, her organized approach to projects, and
    her desire to share her Cuban heritage with friends.
