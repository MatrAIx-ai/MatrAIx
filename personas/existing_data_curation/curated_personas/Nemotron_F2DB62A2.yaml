personas:
  professional: Zoraida Salcedo, a budding little architect, constructs colorful block towers with practiced precision, applying methodical planning and a curiosity for patterns that mirrors a future engineer's
    mindset; they often sketch a quick blueprint before each build, ensuring every piece fits into the grand design.
  sports: Zoraida Salcedo enjoys sprinting along the nearby nature trail and plays with the Gulf Coast Kids Soccer Club, cheering for the New Orleans Pelicans during basketball season and the New Orleans
    Saints when football arrives, while their rhythmic salsa dancing doubles as a playful cardio routine that keeps them agile.
  arts: Zoraida Salcedo's artistic world bursts with vivid drawings of tropical bays inspired by the vivid palettes of Henri Matisse, while they hum along to the energetic beats of Celia Cruz and zydeco
    legend Clifton Chenier, and they often perform beloved Cuban children's songs at family gatherings, echoing the vocal stylings of young performer Ana Sofia.
  travel: Zoraida Salcedo approaches travel like a treasure hunt, sketching simple maps before weekend trips to the Atchafalaya Basin's canoe routes, dreaming of a future family vacation to Varadero's sandy
    shores and to the towering redwoods of California, yet they balance these wanderlust plans with the practical limits of school schedules and parental guidance.
  culinary: Zoraida Salcedo eagerly helps whisk batter for pan de coco, loves spreading sweet coconut jam on toast, and often adds diced mango and a pinch of cinnamon to their morning oatmeal, while their
    favorite dishes include platano frito and a creamy coconut-lime smoothie that they insist on sipping after a block-building session.
  core: Zoraida Salcedo is a meticulous six-year-old architect-in-training who balances towering block creations with diligent savings, sings lively rhythms, and explores nature with an organized curiosity
    that makes every day a structured adventure; they also have a habit of losing their favorite purple crayon under the couch.
background:
  cultural: Zoraida grows up in a bilingual Cuban household that proudly maintains traditions from her parents’ island roots while also embracing the Southern charm of Mandeville, Louisiana. Spanish is
    spoken at home and she celebrates Cuban holidays such as Nochebuena with festive meals, music, and dance. At school she participates in a multicultural program that includes Cajun and Creole influences,
    exposing her to zydeco rhythms and gumbo cooking alongside Cuban rhythms and cuisine. Her Catholic upbringing adds to family rituals, and community gatherings often blend Cuban salsa with local brass
    bands, giving her a rich, layered cultural identity.
attributes:
  skills: '[''Reading simple sentences'', ''Counting to 100'', ''Basic Spanish vocabulary'', ''Fine motor skills (cutting, drawing)'', ''Following multi-step instructions'', ''Organizing toys and art supplies'',
