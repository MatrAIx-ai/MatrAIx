persona_description: A business owner or manager who is responsible for managing a metal stamping company that generates hazardous waste and must comply with specific guidelines and regulations set by the
  U.S. Occupational Safety and Health Administration (OSHA) and the U.S. Environmental Protection Agency (EPA). The persona must determine how much waste the company generates, assess current practices,
  and decide on the method(s) to treat the waste, all while considering the types of waste generated and the extent of on-site resources. This person must also know how to recycle certain types of waste
  and must be able to decide if the compliance program will be managed internally or turned to an outside provider for assistance.
