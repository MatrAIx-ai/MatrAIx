  career_goals: Approaching retirement, Laura aims to transition from day‑to‑day press operation to a mentorship and training role. She hopes to formalize a small‑group apprenticeships program at her plant,
    passing on her extensive practical knowledge to younger operators. Additionally, she aspires to document the history of Chicago’s printing industry through a community‑focused oral‑history project,
    preserving stories of veteran press workers. On a personal level, she intends to stay current with sustainable printing practices and occasional digital press certifications to remain adaptable and
    valuable in the evolving field.
