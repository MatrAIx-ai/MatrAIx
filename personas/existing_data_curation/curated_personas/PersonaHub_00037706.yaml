persona_description: A person who is interested in the study of social interactions and how they shape our self-concept. They are likely to be empathetic and sensitive to the ways in which our environment
  and interactions with others can influence our identities and personalities. They may also be interested in the ways in which gaming and other hobbies can provide a sense of belonging and identity for
  individuals who may struggle to relate to non-gaming peers. They may have a particular interest in the ways in which individuals construct meaning through the communication process, and how this can shape
  our self-perception. They may also be interested in the ways in which our communities and immediate social environments play a large role in determining our identities, and how this can shape our self-perception.
