personas:
  professional: Debbie Crawford is a seasoned physical therapist with deep expertise in musculoskeletal and neurological rehabilitation who combines evidence-based manual therapy, gait analysis, and data-driven
    outcome measurement with inventive VR and art-based activities that reflect her imaginative curiosity, while navigating a flexible but occasionally disorganized schedule that she balances with assertive
    communication and a compassionate mentorship style.
  sports: Debbie Crawford stays active by practicing yoga three times a week, playing gentle tennis at the Fairfax Community Center's senior league, and cheering on the Washington Capitals during hockey
    season, while also enjoying leisurely walks with the D.C. Senior Walking Club that blend social interaction with low-impact fitness.
  arts: Debbie Crawford channels her creativity through abstract watercolor paintings inspired by Mark Rothko and digital collages echoing Agnes Martin, while she regularly attends jazz concerts featuring
    Wynton Marsalis, enjoys performances at the Kennedy Center and local productions at the Arlington Shakespeare Theatre, and finds inspiration in speculative fiction novels by authors such as Octavia
    Butler.
  travel: Debbie Crawford favors purposeful yet relaxed travel, often joining small-group guided tours to destinations like the Irish countryside for St. Patrick's celebrations, the German Christmas markets
    in Nuremberg, and the serene landscapes of Shenandoah National Park, balancing her love of cultural immersion with the comfort of senior-friendly accommodations.
  culinary: Debbie Crawford delights in experimenting with world-cuisine dishes such as Thai green curry, Moroccan lamb tagine, and Mediterranean falafel, skillfully incorporating fresh herbs like rosemary,
    mint, and basil from her own garden, while also crafting comforting herb-infused soups that echo the communal meals of her Thanksgiving and holiday gatherings.
  core: Debbie Crawford blends a lifelong commitment to community service with a boundless imagination, using art, technology, and a flexible, sometimes disorganized, approach to turn senior rehabilitation
    into a vibrant, compassionate experience.
background:
  cultural: Debbie grew up in a middle‑class suburban environment in Virginia, raised by parents of Irish and German ancestry who emphasized education, hard work, and community service. Her family traditions
    include celebrating holidays such as Thanksgiving, Christmas, and St. Patrick’s Day, and she attended public schools that fostered a respect for diversity. Living in Fairfax County’s multicultural setting
    has broadened her cultural awareness, leading her to value inclusivity and to incorporate varied artistic and therapeutic perspectives into her practice. She maintains ties to her church community,
    participates in local volunteer initiatives, and blends her European heritage with the rich, diverse influences of the Washington‑DC metropolitan area.
