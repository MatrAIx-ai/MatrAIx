  hobbies: '["Landscape photography","Astrophotography","Oil painting","Hiking and trail running","Experimental cooking (molecular gastronomy)","Reading science-fiction and philosophy","Playing chess (online)","Woodworking","Collecting
    meteorite fragments","Listening to ambient and classical music"]'
  career_goals: Jeremy aims to secure an independent faculty position where he can lead a small, high-impact team focused on personalized immunotherapies for cancer. Over the next five years he plans to
    obtain a major NIH grant, file patents on novel CRISPR-based delivery platforms, and translate his discoveries into a spin-out biotech company. Ultimately he envisions becoming a recognized thought
    leader who mentors a select group of inquisitive researchers while maintaining the freedom to explore unconventional scientific avenues.
