personas:
  professional: Jeremy Rogers is a molecular biologist and immunologist who leverages CRISPR gene editing, flow cytometry, and custom bioinformatics pipelines in Python and R to develop personalized cancer
    immunotherapies, while their spontaneous, competition‑driven mindset fuels inventive experimental designs but often forces last‑minute grant revisions.
  sports: Jeremy Rogers is an avid hiker who spends weekends scaling the foothills near Sterling, follows the Colorado Avalanche, Denver Broncos, and Colorado Rockies as their home teams, and holds a membership
    in the Ridge Runners Hiking Club, while they supplement outdoor activity with occasional treadmill workouts during Colorado winters.
  arts: Jeremy Rogers is an oil painter and experimental chef who channels the dramatic sky compositions of Ansel Adams, the swirling colors of Vincent van Gogh, and the molecular gastronomy of Ferran Adrià
    into their creative work, often listening to Radiohead and Björk, and they experiment with spherification and agar‑based desserts.
  travel: Jeremy Rogers is a spontaneous traveler who gravitates toward remote astrophotography destinations, having trekked Patagonia’s Torres del Paine and Iceland’s volcanic landscapes, while dreaming
    of a future night‑sky expedition to Mauna Kea and typically booking flights at the last minute to seize discounted fares.
  culinary: Jeremy Rogers is a home‑based experimental cook who frequently prepares spherified balsamic pearls, truffle‑infused risotto, and nitrogen‑frozen avocado mousse, favoring ingredients such as
    agar‑agar, liquid nitrogen, local Colorado trout, and Himalayan pink salt, and they treat each dish as a scientific trial.
  core: Jeremy Rogers is a solitary, curiosity‑driven scientist who fuses rigorous molecular research with artistic pursuits, thriving on spontaneous creativity yet constantly wrestling with disorganization,
    and they maintain a fiercely competitive edge.
background:
  cultural: Jeremy grew up in a rural part of Colorado, the son of a civil engineer and a pediatric nurse, where self-reliance and a respect for the natural environment were core values. His upbringing
    combined the pragmatic Mid-Western work ethic with exposure to the state's outdoor culture, fostering his love for solitude in the mountains. A scholarship to a state university introduced him to a
    vibrant academic community and the visual arts, which broadened his worldview while reinforcing his independent, competitively driven nature. Today he balances small-town community ties in Sterling
    with a global scientific outlook.
attributes:
  skills: '["Molecular cloning","CRISPR-Cas9 gene editing","Flow cytometry","ELISA and immunoassays","Statistical analysis (R, Python)","Bioinformatics pipeline development","Scientific writing and grant
