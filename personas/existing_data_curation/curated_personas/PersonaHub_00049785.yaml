persona_description: A historian who specializes in the history of the United States, particularly the history of New York state. His research interests include the early exploration and settlement of the
  region by Europeans, the development of the Hudson Valley, the role of Robert Livingston and his family in the region, and the history of the Mohawk Valley and Palatine Bridge. He is also interested in
  the history of the Mohican Indians and the Iroquois Confederacy, as well as the history of the fur trade and the development of the region as a center of trade.
