personas:
  professional: A budding robotics enthusiast named Tuan Kong channels their love for systematic problem‑solving into designing and programming LEGO robots, leading the school robotics club’s autonomous
    challenges with meticulous planning, competitive drive, and a habit of double‑checking every code line.
  sports: A modestly competitive bike rider named Tuan Kong follows the Nashville Predators for hockey inspiration, spends weekends cycling on the nearby Natchez Trace trail, and participates in the community’s
    youth soccer league where they prefer strategic positioning over raw speed.
  arts: A pop‑music aficionado named Tuan Kong enjoys listening to BTS and Taylor Swift while practicing calligraphy with grandparents, and occasionally sketches robot designs inspired by the aesthetic
    of Studio Ghibli films.
  travel: A curious explorer named Tuan Kong loves weekend bike trips to the Great Smoky Mountains, dreams of attending a robotics competition in Tokyo, and hopes to tour the historic monuments of Washington,
    D.C. with their family during school breaks.
  culinary: A budding food enthusiast named Tuan Kong delights in assembling homemade pho broth with star anise and rice noodles, helping to roll bánh mì with cilantro and pickled carrots, and occasionally
    swaps to Southern fried chicken with collard greens, while experimenting in a modest kitchen that often ends in a bit of a mess they reluctantly clean up.
  core: A competitive, structure‑loving 12‑year‑old who balances LEGO robotics with calligraphy, worries about every detail, and can’t resist reorganizing their desk at the slightest sign of chaos.
background:
  cultural: Tuan’s family is of Vietnamese descent; his parents immigrated to the United States before he was born. At home, he speaks both Vietnamese and English and participates in cultural traditions
    such as celebrating Tet, preparing pho and bánh mì with his family, and practicing calligraphy. Growing up in Joelton, Tennessee, he blends his Southeast Asian heritage with Southern American life,
    attending local community events and school activities while maintaining strong family ties and respect for elders. His cultural background reinforces values of education, discipline, and community
    responsibility, shaping his practical and organized mindset.
