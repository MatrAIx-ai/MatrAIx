  hobbies: '[''LEGO Mindstorms robotics'', ''Strategy video gaming'', ''Chess'', ''Robotics club'', ''Puzzle solving'', ''Model airplane assembly'', ''Reading science magazines'', ''Vietnamese calligraphy'',
