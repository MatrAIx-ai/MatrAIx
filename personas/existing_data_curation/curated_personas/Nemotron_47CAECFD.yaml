  career_goals: Tuan aims to become a robotics engineer or software developer, envisioning a career where he can design intelligent machines that solve concrete problems. He plans to attend a university
    with a strong engineering program, compete in robotics contests, and earn scholarships that provide a clear, step‑by‑step pathway to professional success. His competitive drive pushes him to win science
    fairs and coding competitions, and he hopes to eventually lead a tech team that creates educational tools for youth, valuing a structured work environment that reduces uncertainty and stress.
