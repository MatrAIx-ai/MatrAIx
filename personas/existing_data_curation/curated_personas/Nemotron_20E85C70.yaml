  hobbies: '[''Reading Literary Fiction'', ''Writing Personal Essays'', ''Hiking in Finger Lakes Region'', ''Photography'', ''Vegetable Gardening'', ''Playing Chess'', ''Mindfulness Meditation'', ''Yoga'',
    ''Volunteering at Public Library'', ''Organizing Small Literary Workshops'']'
  career_goals: Corey aims to secure tenure at his institution while expanding the humanities program to include interdisciplinary and community‑engaged courses. He seeks to publish a monograph on modern
    American poetry, obtain a research grant for a digital archive project, and eventually move into academic leadership as a department chair or dean. Additionally, he hopes to develop a mentorship network
    for first‑generation college students and refine strategies to reduce student stress and promote well‑being.
