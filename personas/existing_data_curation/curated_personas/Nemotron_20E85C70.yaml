personas:
  professional: Corey Jesson is a dedicated 38‑year‑old literature professor who blends interdisciplinary curriculum design with a practical, student‑centered teaching style, leveraging their strong conflict‑resolution
    skills to foster harmonious classroom dynamics while quietly steering the humanities program toward community‑engaged courses.
  sports: Corey Jesson is an avid hiker who spends weekends trekking the Finger Lakes trails, volunteers as a line‑cook for the local trail maintenance crew, follows the Buffalo Bills and the New York Knicks
    with modest enthusiasm, and belongs to a small regional hiking club that meets monthly for “hard‑rock” walks.
  arts: Corey Jesson is a quietly creative soul who devours literary fiction by Marilynne Robinson, poems by Ocean Vuong, and essays by Susan Sontag, while curating a personal photography portfolio inspired
    by Ansel Adams, and finds solace in the melancholic guitar work of Nick Drake and the indie folk of Sufjan Stevens.
  travel: Corey Jesson is a low‑key traveler who prefers meticulously planned weekend getaways to nearby destinations like the Adirondacks and the historic streets of Savannah, while dreaming of a solo
    cultural immersion in Kyoto’s Zen gardens and a week‑long hiking expedition in Iceland’s highlands, always budgeting travel around the academic calendar.
  culinary: Corey Jesson is a modest home chef who enjoys preparing farm‑to‑table dishes such as roasted beet and quinoa salad with goat cheese, seasonal pumpkin soup spiced with sage, and experimenting
    with heirloom tomato bruschetta, often sourcing produce from their own vegetable garden and local farmers’ markets.
  core: Corey Jesson is a thoughtful, mildly anxious academic who balances a love of solitary creativity with a pragmatic drive for community impact, often over‑planning while still leaving room for spontaneous
    garden meditations.
background:
  cultural: Corey grew up in a middle‑class family in upstate New York, where education and community involvement were emphasized. His upbringing exposed him to a broad spectrum of American cultural traditions,
    from classic European literature to the local history of the Iroquois Confederacy that shapes the Syracuse area. He values egalitarian ideals, respects the indigenous heritage of Onondaga County, and
    frequently incorporates diverse cultural perspectives into his teaching. While identifying as white American, he remains mindful of the multicultural fabric of his community and strives to foster inclusive
    dialogue in the classroom.
