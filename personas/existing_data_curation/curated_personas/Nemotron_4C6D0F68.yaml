personas:
  professional: Geraldine Doty, a seasoned market research leader with three decades of expertise in survey design, quantitative analysis (SPSS, R, Excel), and strategic branding; they apply their structured,
    practical mindset and community‑oriented values to mentor junior analysts, translate data into visual insights with Tableau and PowerBI, and steer regional firms toward data‑driven growth.
  sports: Geraldine Doty enjoys kayaking on Lake Minnetonka, hikes Lebanon Hills State Park trails with the local Women’s Trail Club, and avidly follows the Minnesota Vikings, Timberwolves, and Twins while
    they cheer for the Minnesota Wild during the hockey season.
  arts: Geraldine Doty channels their creative side through photography of the North Shore’s sunrise, knits traditional mittens while listening to Bob Dylan and Fleetwood Mac, participates in the Minneapolis
    Institute of Art’s monthly tours, and regularly attends performances at the Guthrie Theater, especially productions of classic American playwrights.
  travel: Geraldine Doty favors carefully planned road trips that blend nature and culture, such as a fall foliage drive through the Apostle Islands, a weekend getaway to Door County’s cherry orchards,
    and past visits to Copenhagen and Oslo to explore their ancestral roots, all while they balance a modest travel budget and family commitments.
  culinary: Geraldine Doty delights in seasonal cooking, often preparing garden‑fresh roasted asparagus, homemade blueberry pie, and their signature walleye with a dill butter sauce, pairing meals with
    a beloved Minnesota Pinot Noir or a crisp Riesling, while they occasionally experiment with lingonberry jam in dessert recipes.
  core: Geraldine Doty blends data‑driven precision with Midwestern hospitality, navigating life with structured pragmatism, community‑centric generosity, and a penchant for weekend wine, garden, and kayak
    adventures; they embody a warm, analytical spirit that comforts friends and colleagues alike.
background:
  cultural: Geraldine was raised in a middle‑class family in the Twin Cities area, with ancestry primarily German and Swedish, reflecting the broader Scandinavian heritage of Minnesota. Her upbringing emphasized
    modesty, hard work, community cooperation, and a deep appreciation for the natural landscape. She maintains ties to her local Lutheran church and regularly engages in community events like the Excelsior
    summer festival, embodying the "Minnesota nice" ethos of politeness and helpfulness while valuing self‑reliance and practicality.
attributes:
  skills: '[''Survey Design'', ''Focus‑Group Facilitation'', ''Quantitative Data Analysis (SPSS, Excel, R)'', ''Qualitative Research Methods'', ''Consumer Behavior Analysis'', ''Market Segmentation'', ''Brand
    Strategy Development'', ''Digital Marketing (SEO, SEM, Social Media)'', ''Data Visualization (Tableau, PowerBI)'', ''Project Management'', ''Stakeholder Communication'', ''Report Writing and Presentation'',
    ''CRM & Marketing Automation (HubSpot)'', ''Cross‑Functional Team Collaboration'', ''Public Speaking'', ''Mentoring Junior Analysts'']'
  hobbies: '[''Kayaking on Lake Minnetonka'', ''Hiking in state parks'', ''Gardening'', ''Knitting and crochet'', ''Photography (nature and community events)'', ''Book club participation'', ''Volunteering
    at community center'', ''Cooking and hosting dinner parties'', ''Wine tasting with friends'', ''Yoga classes'']'
  career_goals: Geraldine aims to step into a senior leadership role such as Director of Market Insights or Vice President of Marketing within the next five years, where she can shape long‑term brand strategy
    for a regional firm. She is passionate about leveraging data‑driven decision‑making to help local small businesses thrive, and she envisions launching a consulting practice that combines strategic marketing
    with community outreach. Additionally, she seeks to mentor more women in data and marketing fields and to contribute thought‑leadership articles to industry publications.
