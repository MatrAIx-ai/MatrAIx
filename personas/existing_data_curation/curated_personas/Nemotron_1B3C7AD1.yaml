personas:
  professional: Johanna Reynolds, a ten‑year‑old aspiring game designer, channels their vivid imagination and disciplined mindset into coding short animations on Scratch, meticulously planning storyboards
    and integrating hand‑drawn fantastical creatures into interactive scenes.
  sports: Johanna Reynolds darts through Saturday soccer practice with the town’s U‑11 Tigers, splashes laps in the community pool as a member of the junior swim squad, and passionately roots for the national
    women’s soccer team during televised matches.
  arts: Johanna Reynolds sketches dragons inspired by Studio Ghibli’s Totoro, they bring them to life in Scratch animations set to John Williams’ orchestral scores, they dazzle their drama club with a rendition
    of Matilda starring Eleanor Audley, and they practice piano pieces like Beethoven’s Fur Élise and Disney’s Let It Go after school.
  travel: Johanna Reynolds prefers family‑friendly adventures, planning day trips to nearby botanical gardens and the municipal zoo, dreaming of weekend visits to Disneyland Paris and a future school field
    trip to the towering redwoods of California, while often mapping out treasure hunts for friends using Google Maps.
  culinary: Johanna Reynolds loves swapping stories over pepperoni pizza and homemade chocolate brownies, eagerly mixes fruit smoothies with mango, kiwi, and spinach for snack time, and delights in assembling
    simple no‑cook sushi rolls for school fairs, though they often forget to clean up the kitchen afterward.
  core: Johanna Reynolds blends a fierce imagination with meticulous planning, turning every LEGO set, Scratch animation, and school drama into a grand quest, yet they habitually leave a trail of crayons
    and snack crumbs behind.
background:
  cultural: Johanna was raised in Mooresville, a suburban town in Iredell County, North Carolina. Her family values community involvement, education, and Southern hospitality. She attends a local public
    elementary school, participates in church youth activities, and enjoys family gatherings that feature traditional Southern foods and storytelling. The region’s proximity to the motorsports industry
    and the presence of local museums have sparked her interest in engineering and interactive learning, while her upbringing in a close‑knit community nurtures her outgoing, cooperative nature.
