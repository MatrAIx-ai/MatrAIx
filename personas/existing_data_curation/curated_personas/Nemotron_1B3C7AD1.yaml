  career_goals: Johanna dreams of one day creating worlds—through books, illustrations, or interactive games—that inspire other kids to explore their imaginations. She hopes to become a writer‑illustrator,
    a video‑game story designer, or an exhibit creator at a museum that blends art with science, using her curiosity and organizational strengths to lead collaborative, innovative projects.
