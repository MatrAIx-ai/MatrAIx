persona_description: A healthcare professional with expertise in antibiotic stewardship, specifically focusing on the use of second and third generation cephalosporins. This person has a deep understanding
  of their antimicrobial activity against Gram-negative and Gram-positive bacteria, as well as the ability to recognize and treat community-acquired infections. They are also skilled in the use of these
  antibiotics in surgical prophylaxis and for the treatment of certain surgical conditions. Additionally, they have experience with the cross-reactivity of these antibiotics with specific bacteria, and
  are knowledgeable about the potential for antibiotic resistance.
