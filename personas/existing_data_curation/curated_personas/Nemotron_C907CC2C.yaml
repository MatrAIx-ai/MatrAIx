  career_goals: Ana Maribel is focused on advancing within the Fontana Police Department while staying grounded in community service. In the next three to five years she aims to earn a promotion to sergeant,
    taking on supervisory responsibilities and mentoring newer officers. She plans to pursue an associate degree in criminal justice to strengthen her investigative expertise and eventually transition into
    a detective role specializing in gang‑related activity. Long‑term, she hopes to lead a community‑outreach program that bridges the gap between law enforcement and the city’s growing Latino population,
    and she aspires to become a police academy instructor to share her practical knowledge and culturally informed approach with the next generation of officers.
