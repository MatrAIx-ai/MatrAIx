personas:
  professional: Marilyn Harkins is a seasoned residential carpenter known for precise framing, cabinet installation, and finish work, who blends her love of structure with a laid‑back approach to paperwork,
    often juggling multiple job sites while still finding time to mentor apprentices and champion sustainable, energy‑efficient building practices.
  sports: Marilyn Harkins spends Saturdays playing beach volleyball with the Pompano Beach Wave Riders club, follows the Miami Heat and the Miami Dolphins, and squeezes in high‑energy Zumba dance classes
    that keep them fit and socially connected.
  arts: Marilyn Harkins regularly attends live shows at The Blue Rooster and The Grotto, where they enjoy indie folk acts like The Lumineers and soulful R&B from Anderson .Paak, while their woodworking
    hobby lets them channel their creativity into crafting mid‑century‑modern coffee tables inspired by Charles Eames.
  travel: Marilyn Harkins prefers spontaneous weekend road trips, having explored the Florida Keys, Asheville’s craft breweries, and a brief escape to Barcelona’s Gothic Quarter, yet they balance their
    wanderlust with the budget constraints of saving for their future sustainable renovation business.
  culinary: Marilyn Harkins delights in cooking Mediterranean‑style meals such as grilled sea bass with lemon‑olive oil, herb‑laden falafel, and a fresh Greek salad topped with feta and oregano, often hosting
    friends for shared feasts that showcase their knack for balancing bold flavors with health‑conscious choices.
  core: Marilyn Harkins is an outgoing, structure‑loving carpenter who thrives on group sports, Mediterranean cooking, and spontaneous woodworking projects, even if their toolbox sometimes resembles a chaotic
    art studio.
background:
  cultural: Marilyn grew up in a middle‑class white family in South Florida, absorbing a blend of suburban American values and the laid‑back coastal lifestyle of Broward County. Her upbringing emphasized
    hard work, practical skills, and community involvement. The diverse cultural tapestry of the area—particularly the influence of nearby Caribbean and Latin communities—has shaped her appreciation for
    vibrant music, outdoor recreation, and inclusive social gatherings. She identifies with the American working‑class ethos, valuing independence, craftsmanship, and a collaborative spirit.
attributes:
  skills: '[''Residential framing'', ''Cabinet & trim installation'', ''Finish carpentry'', ''Blueprint reading'', ''Material estimation'', ''Basic electrical wiring'', ''Basic plumbing fixture installation'',
