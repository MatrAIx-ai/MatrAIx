  hobbies: '[''Beach volleyball'', ''Group dance classes'', ''DIY woodworking projects'', ''Cooking for friends'', ''Listening to live music'', ''Volunteering at community garden'', ''Group fitness classes'',
    ''Hiking in nearby nature preserves'']'
  career_goals: Marilyn aims to become a certified journeyman carpenter within the next three years and later take on the role of lead carpenter on larger multi‑family projects. She hopes to start her own
    small renovation business focused on sustainable, energy‑efficient upgrades for homes in the Pompano Beach area. In addition, she is interested in mentoring apprentices, expanding her knowledge of green
    building practices, and eventually earning a project management certification to oversee larger construction teams.
