  hobbies: '[''Salsa dancing'', ''Community choir singing'', ''Beach yoga'', ''Organic gardening'', ''Volunteering at public library'', ''Book club (Caribbean literature)'', ''Cooking traditional Puerto
    Rican dishes'', ''Visiting Puerto Rico (family trips)'', ''Bridge (card game)'', ''Genealogy research'', ''Acrylic painting'']'
  career_goals: Although officially retired, Elena remains driven to make a lasting impact. She aims to lead a senior‑center volunteer program that connects older adults with cultural activities, develop
    a community garden that celebrates Caribbean plant heritage, and author a memoir that intertwines personal stories with Puerto Rican history. She also seeks to become a docent at the Pompano Beach Museum
    of Art, curating exhibits on Caribbean art, and to maintain personal health through regular yoga and walking.
