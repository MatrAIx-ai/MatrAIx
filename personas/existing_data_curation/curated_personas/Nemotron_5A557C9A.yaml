personas:
  professional: Elena Santiago, a retired educator and community organizer, channels her bilingual expertise and talent for curriculum design into leading senior‑center volunteer programs, where they blend
    meticulous planning with a friendly competitive spirit to create intergenerational cultural workshops while staying practically tech‑savvy.
  sports: Elena Santiago enjoys early‑morning beach yoga, weekly walking clubs along the Atlantic shoreline, and passionately follows the Miami Heat and Tampa Bay Buccaneers, while their membership in the
    local senior tennis league fuels a competitive edge despite occasional fatigue.
  arts: Elena Santiago finds creative fulfillment singing in a senior choir, painting vibrant seascapes inspired by local sunsets, and studying the works of Frida Kahlo, Nina Simone, and contemporary Caribbean
    muralists, letting the arts shape their identity and offering a soothing counterbalance to daily worries.
  travel: Elena Santiago prefers purposeful travel, planning a yearly visit to family on a Caribbean island and dreaming of a cultural immersion tour of Cuba's historic towns, while they favor well‑organized
    itineraries that combine heritage sites with relaxed beach stays.
  culinary: Elena Santiago delights in preparing arroz con gandules, pasteles, and plantain‑based dishes, expertly using sofrito and adobo, and their cooking gatherings serve as social hubs, though they
    occasionally over‑season dishes in a playful quest to outshine neighboring friends.
  core: Elena Santiago blends seasoned teaching expertise with a vibrant social life, balancing meticulous organization and a competitive spark, yet often wrestles with worry and a sweet tooth for extra
    dessert.
background:
  cultural: Elena was born in Puerto Rico and moved to Florida in her early thirties. She grew up immersed in the island’s rich traditions—music, folklore, Catholic celebrations, and a strong family network—and
    carries those values into her daily life in Pompano Beach. Fluent in Spanish and English, she serves as a cultural bridge for the growing Puerto Rican diaspora in South Florida, participating in local
    festivals, supporting Spanish-language programs, and preserving culinary and artistic heritage. Her identity is shaped by the blend of Caribbean warmth and the multicultural vibrancy of Broward County,
    fostering a deep respect for community solidarity while navigating the challenges of adaptation.
