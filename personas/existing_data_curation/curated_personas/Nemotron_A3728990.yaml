personas:
  professional: An aspiring visual artist and storyteller, Carol Hughes, blends watercolor sketches with digital concept art, excels in improvisational theater and short‑form video creation, and is driven
    to join a specialized high‑school art program before carving out a freelance career illustrating graphic novels and video games while running community art workshops.
  sports: A skate‑park enthusiast, Carol Hughes spends weekends rolling at the local Kenner skate spot, cheers loudly for the New Orleans Saints and the Pelicans, jogs with the school cross‑country team,
    and occasionally joins a community youth basketball league, embracing an energetic but unstructured approach to fitness.
  arts: A mural‑loving creative, Carol Hughes immerses themselves in New Orleans street‑art festivals, draws inspiration from artists like Banksy and Kehinde Wiley, curates eclectic playlists featuring
    Miles Davis, Trombone Shorty, and funk legends, writes flash fiction for online zines, and shines on stage during school improv comedy nights.
  travel: An adventurous weekend traveler, Carol Hughes explores nearby gems such as Biloxi’s beach towns, takes spontaneous day trips to the historic French Quarter, and dreams of wandering the art museums
    of Paris; they favor impromptu road trips with friends, using a family car and a shared music playlist over rigid itineraries.
  culinary: A comfort‑food aficionado, Carol Hughes delights in hearty mac and cheese, fried chicken, shrimp po’boy sandwiches, and warm beignets paired with café au lait, occasionally experimenting with
    watercolor‑inspired plating and fresh mint‑lemonade while swapping vintage postcards that depict classic regional dishes.
  core: Carol Hughes is an imaginative, sociable teen who fuses watercolor sketches with digital storytelling, thrives on spontaneous creativity, and balances skate‑park antics with a laid‑back approach
    to budgeting and health.
background:
  cultural: Carol grew up in Kenner, a suburb of New Orleans in Jefferson Parish, within a predominantly white, middle‑class family that celebrates traditional Southern holidays while also embracing the
    city’s multicultural vibe. Her household honors classic Southern customs—home‑cooked comfort food, church gatherings, and community picnics—yet her exposure to the nearby Cajun, Creole, and jazz scenes
    has fostered an appreciation for rhythmic music, vibrant street art, and festive parades. This blend of Southern heritage and the eclectic cultural currents of the Greater New Orleans area informs her
    artistic sensibility and community‑oriented outlook.
