  hobbies: '[''Sketching and watercolor painting'', ''Digital illustration and video editing'', ''Attending street‑art and music festivals'', ''Improvisational theater'', ''Skate‑park hangouts'', ''Collaborative
    mural projects'', ''Reading science‑fiction'', ''Flash fiction writing'', ''Collecting vintage postcards'', ''Exploring jazz and funk music'']'
  career_goals: Carol hopes to transform her artistic passions into a sustainable career. In the short term she plans to enroll in a specialized high‑school art program and build an online portfolio that
    showcases her illustration, animation, and storytelling work. Long‑term, she aspires to become a freelance visual artist and illustrator for graphic novels or video games, while also running community
    art workshops that bring together young people in her neighborhood. She envisions a future where her creativity not only supports her livelihood but also enriches the cultural life of Kenner and the
    wider New Orleans area.
