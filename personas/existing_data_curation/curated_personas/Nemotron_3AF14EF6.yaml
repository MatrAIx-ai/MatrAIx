  career_goals: Bart aims to transition into a mentorship and supervisory role over the next few years, sharing his extensive clinical knowledge with younger PTAs and aiding the clinic’s transition during
    staff turnover. He is considering completing his associate degree to obtain PT assistant certification, which would formalize his expertise. He also hopes to develop a community-based fall-prevention
    program for seniors in Minot, combining his hands-on experience with his desire to give back. While still valuing routine, he aspires to balance his workload to reduce stress, perhaps moving to part-time
    status while remaining an integral part of the clinic’s patient care team.
