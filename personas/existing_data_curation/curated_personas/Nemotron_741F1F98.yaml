  career_goals: Although retired, Richard aims to leave a lasting artistic legacy in his hometown. He plans to complete a memoir that intertwines his personal journey with Youngstown’s industrial history,
    publish a collection of poems and short stories, and organize a community exhibition that showcases the work of local seniors and young artists alike. Additionally, he hopes to mentor a mentoring circle
    at the local cultural center, ensuring that his passion for curiosity and novelty continues to inspire future generations.
