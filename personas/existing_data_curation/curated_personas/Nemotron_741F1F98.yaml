personas:
  professional: Richard Pruitt, a retired art historian and community arts facilitator in Youngstown, they weave their deep literary analysis and curatorial expertise into lively workshops and exhibitions,
    while their spontaneous nature often leads them to reorder schedules on a whim, making deadlines a gentle suggestion rather than a rule.
  sports: Richard Pruitt enjoys low‑impact activity such as walking the Mahoning River trail and playing daily chess matches at the community center, they cheer for the Cleveland Browns and follow the Youngstown
    State Penguins basketball team, and they occasionally join a local senior walking club that meets on Saturday mornings.
  arts: Richard Pruitt’s artistic life bursts with watercolor landscapes of the Mahoning River, digital illustrations of urban ruins, weekly poetry readings with the senior writers’ circle, and nightly
    listening sessions of avant‑garde jazz icons like Ornette Coleman and Sun Ra, they regularly cite the influence of Georgia O’Keeffe and Charles Simic while curating micro‑exhibitions at the Miller Performing
    Arts Center.
  travel: Richard Pruitt prefers deliberate, train‑linked journeys that let them linger over river views, they have taken weekend trips to the Upper Peninsula of Michigan, spent a nostalgic weekend in New
    York City’s MoMA, and dream of a quiet pilgrimage to Florence’s Renaissance galleries, all while budgeting travel around their modest pension.
  culinary: Richard Pruitt’s culinary pursuits blend herb‑infused chicken with rosemary potatoes, hand‑crafted herbal tea blends of mint and chamomile from their garden, and a guilty love for sweet apple
    pie, they often over‑season dishes due to a failing sense of taste from medication, yet they delight in experimenting with risotto flavored by sage and wild mushrooms using a food processor to ease
    arthritis‑related chopping.
  core: Richard Pruitt is a 79‑year‑old curious curatorial spirit who balances spontaneous creativity with a tendency to overlook schedules, splurges on art supplies, and finds solace in chess, herb gardening,
    and avant‑garde jazz, they often drift into day‑dreams while arranging their studio.
background:
  cultural: Richard grew up in post‑war Youngstown, Ohio, a predominantly white, working‑class community shaped by the rise and fall of the steel industry. His family’s roots trace back to German and Irish
    immigrants who settled in the region, bringing a mix of Protestant‑Calvinist values and a strong work ethic. Exposure to Midwestern modesty, community solidarity, and the cultural turbulence of the
    1960s fostered in him both a practical sensibility and an appetite for artistic experimentation. Today, his identity blends heartland resilience with a lifelong fascination for abstract concepts, positioning
    him as a bridge between the town’s industrial heritage and its evolving creative scene.
