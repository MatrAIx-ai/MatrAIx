  career_goals: Gene aims to remain engaged in his community by leading a senior‑citizen outreach program at the local library, mentoring high‑school students interested in trades, and completing a personal
    memoir that captures the history of Leavenworth. He also plans to take a semester of classes in local history and digital photography to broaden his creative skills, and hopes to travel on a historic
    railway tour across the Midwest.
