  hobbies: '[''Gardening'', ''Knitting'', ''Local history volunteering'', ''Community theater'', ''Bowling'', ''Bridge'', ''Walking'', ''Reading historical non-fiction'', ''Space exploration news'']'
  career_goals: 'Cheryl aims to deepen her impact on the Wapakoneta community by pursuing a leadership role on the senior center board, where she can apply her event‑planning and budgeting expertise. She
    hopes to launch an oral‑history project that records the stories of longtime residents, preserving the town’s heritage for future generations. Personally, she is focused on staying physically and mentally
    sharp: she plans to complete a CPR certification, learn digital photography to document local landmarks, and write a memoir that blends her love of space history with her own life lessons. Travel to
    NASA‑related museums and space exhibits is also on her bucket list, reflecting her enduring curiosity about the cosmos.'
