  career_goals: Oscar aims to re‑enter the workforce within the next two years, targeting a supervisory role in construction or facilities management where his organizational and technical skills can shine.
    He plans to obtain a New Mexico Contractor's License and a Certified Associate in Project Management (CAPM) credential. Ultimately, he hopes to launch a small family‑owned home renovation business that
    offers reliable, affordable services to his community, providing financial stability for his wife and future children while building a modest portfolio of rental properties for long‑term security.
