personas:
  professional: Oscar Moreno, a 37‑year‑old construction supervisor‑in‑training with an associate degree in Business Administration, combines their precise carpentry and project‑management abilities with
    a competitive edge, using QuickBooks and Excel to meticulously budget renovation projects while channeling a love for hands‑on problem solving into reliable, affordable community services, and they
    take pride in delivering projects on schedule.
  sports: Oscar Moreno, a 37‑year‑old amateur soccer enthusiast who captains a local Albuquerque Heat league team, cheers for New Mexico United during professional matches, spends weekends fishing at Lake
    Vallecito and hiking with the Sandia Mountain Hiking Club, and they approach fitness with a practical mix of team drills, trail runs, and occasional classic‑car restoration workouts.
  arts: Oscar Moreno, a 37‑year‑old lover of Southwestern art, finds inspiration in Georgia O'Keeffe's desert landscapes, enjoys listening to Carlos Santana's soulful guitar during woodworking sessions,
    watches classic films starring Edward James Olmos, and they attend monthly performances at the Albuquerque Community Cultural Center, weaving artistic appreciation into their daily routine.
  travel: Oscar Moreno, a 37‑year‑old road‑trip planner who balances family commitments with a love for exploration, frequently drives the historic Route 66 to Santa Fe and Taos for cultural festivals,
    dreams of a pilgrimage to Mexico City’s historic center during Día de los Muertos, and they prefer staying at boutique B&Bs that showcase local Pueblo art while keeping travel costs within a modest
    budget.
  culinary: Oscar Moreno, a 37‑year‑old home chef who masterfully blends traditional Mexican flavors with New Mexican Hatch green chile, regularly prepares dishes like carne asada tacos, green chile stew,
    and chile relleno stuffed with queso fresco, experiments with fusion recipes such as chile‑infused barbecue ribs, and they proudly host family gatherings where homemade salsa roja and fresh corn tortillas
    are the stars.
  core: Oscar Moreno, a methodical 37‑year‑old who balances a competitive drive with practical curiosity, channels their woodworking and car‑restoration passions into reliable community service, budgets
    like a renovation project, and they occasionally forget dental appointments while savoring spicy fusion meals.
background:
  cultural: Oscar was raised in a bicultural Mexican‑American household in New Mexico, where Spanish was spoken at home and English at school. He celebrates traditional Mexican holidays such as Día de los
    Muertos, Las Posadas, and Mexican Independence Day, while also participating in regional New Mexican festivities that highlight the blend of Pueblo, Spanish, and Anglo cultures. Family ties remain strong,
    with frequent visits to relatives in Mexico and close connections to the local Hispanic community. He actively engages in community events at the local church and cultural center, and his cooking reflects
    a fusion of Mexican flavors with the distinctive New Mexican chile, embodying his blended heritage.
