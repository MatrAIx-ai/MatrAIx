  hobbies: '[''Running Club (twice weekly)'', ''Business Book Discussion Group'', ''Community STEM Tutoring Volunteering'', ''Vegetable Gardening'', ''Home-Improvement Projects'', ''Country Music Concerts'',
    ''Tennessee Volunteers Football Fan'']'
  career_goals: Sara’s primary ambition is to become a top‑performing sales leader within her manufacturing firm, aiming for a regional sales manager position within the next three years and eventually
    a director of sales role. She seeks to build a high‑performing team known for consistently exceeding targets, implementing systematic sales processes, and earning recognition such as the company’s President’s
    Club. She also plans to pursue professional certifications like the Certified Professional Sales Leader (CPSL) and to develop a proprietary sales workflow that could be offered as a consulting service
    for other wholesale companies. Ultimately, she envisions leveraging her expertise to launch her own boutique distribution business, combining her love of order with entrepreneurial drive.
