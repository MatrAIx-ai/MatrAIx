personas:
  professional: Sara Rose is a data‑driven wholesale sales specialist who leverages her engineering background, Salesforce mastery, and obsessive pipeline discipline to exceed B2B targets, while they keep
    a competitive edge and skeptical nature that makes them vigilant against overpromising clients.
  sports: Sara Rose commits to twice‑weekly runs with the Midtown Running Club, follows the Tennessee Volunteers football season with fervor, and blends their competitive streak into a disciplined fitness
    regimen that includes weekend hikes and occasional yoga for recovery.
  arts: Sara Rose finds balance in listening to country‑music icons like Chris Stapleton and Dolly Parton at local venues, while their weekly book‑club discussions revolve around titles by Jim Collins and
    Brené Brown, feeding a love of structured narratives and fostering a creative yet analytical mindset.
  travel: Sara Rose plans vacations with the same spreadsheet precision they use at work, favoring curated weekend road trips to the Great Smoky Mountains and Asheville for hiking and farm‑to‑table dining,
    while keeping a bucket‑list of European cities like Copenhagen and Zurich for future business‑leisure combos.
  culinary: Sara Rose enjoys farm‑fresh cooking, regularly harvesting tomatoes, zucchini, and heirloom carrots to craft hearty roasted vegetable quinoa bowls, often seasoning with rosemary and smoked paprika,
    while they treat occasional steak‑frites outings at the downtown bistro as a well‑earned reward.
  core: Sara Rose’s life is a meticulously organized choreography of sales metrics, running routes, garden rows, and country‑music playlists, punctuated by a relentless need to check every box, and they
    often worry about the next deadline.
background:
  cultural: Sara grew up in a middle‑class, predominantly white family in East Tennessee, where Southern hospitality and a strong work ethic were core values. Her upbringing emphasized community involvement,
    church attendance, and family gatherings centered around shared meals. The region’s blend of rural traditions and expanding urban influences in Knoxville shaped her practical, no‑nonsense outlook and
    her appreciation for routine. Her STEM education reinforced a logical, data‑driven mindset, while her career in wholesale manufacturing aligns with the area’s historical ties to industry and trade.
    These cultural threads combine to give Sara a grounded, collaborative yet competitive personality rooted in Southern modesty and professionalism.
