  hobbies: '[''drawing sea creatures and dinosaurs'', ''building with Duplo bricks'', ''reading picture books about animals and nature'', ''exploring the shoreline and collecting shells'', ''watching boats
    in the harbor'', ''listening to and singing nursery rhymes'', ''solitary puzzle play'', ''participating in small‑group storytime'']'
  career_goals: Kenneth often talks about wanting to be a firefighter because he wants to help people in emergencies, a teacher because he enjoys showing friends how things work, and a veterinarian because
    he loves animals and wants to keep them healthy. He also mentions being a park ranger to protect the beach and tide pools he explores. These aspirations reflect his desire to contribute to the well‑being
    of others and maintain harmony in his community.
