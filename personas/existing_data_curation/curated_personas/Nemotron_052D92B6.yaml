personas:
  professional: Kenneth Sargent, a budding junior builder, constructs elaborate block towers and cardboard rockets, balancing boundless curiosity with a surprising knack for figuring out which pieces actually
    hold together, while stubbornly refusing to follow the step‑by‑step instructions his parents lay out.
  sports: Kenneth Sargent attends the Neighborhood Rangers Tiny Soccer team on Saturdays, loves spontaneous tag during recess, and cheers with glee for the local MLB club, the Chicago Cubs, while habitually
    leaving his water bottle behind.
  arts: Kenneth Sargent delights in drawing dinosaurs with crayon, sings along to Raffi’s “Baby Beluga,” and is enchanted by the animated film “Moana,” often re‑enacting scenes with his stuffed animal audience.
  travel: Kenneth Sargent thrills at family road trips to the seaside, especially the visit to Monterey Bay Aquarium, and dreams of seeing the towering redwoods of California’s national parks someday.
  culinary: Kenneth Sargent favors cheesy macaroni, chicken nuggets, and strawberry milk, can successfully stir pancake batter with a wooden spoon, and proudly insists on adding a sprinkle of cinnamon to
    his oatmeal.
  core: Kenneth Sargent is an inquisitive five‑year‑old who builds brick marvels, saves pennies, sneezes on pollen, dashes through tag, draws dinos, and dreams of redwoods, all while gently resisting adult‑imposed
    routines.
background:
  cultural: Kenneth is a white child raised in Portsmouth, Rhode Island, a small coastal community with deep New England roots. His family’s heritage includes generations of Irish‑American and Italian‑American
    ancestors who have lived in the area for decades. He grows up surrounded by maritime traditions—family outings to the harbor, seasonal clam bakes, and school field trips to tide pools. The community
    emphasizes mutual assistance, respect for nature, and participation in local events such as the Portsmouth Summerfest and library storytime. These cultural influences shape his compassionate, cooperative
    demeanor and his practical curiosity about the world.
attributes:
  skills: '[''basic literacy (letter and word recognition)'', ''early numeracy (counting to 20)'', ''simple puzzle solving'', ''block building and spatial reasoning'', ''fine‑motor coordination (cutting,
