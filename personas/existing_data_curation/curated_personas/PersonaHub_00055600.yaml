persona_description: A marine biologist who is interested in monitoring the health and condition of the coastal zone of Belize, as well as understanding the impact of marine pollution on the marine ecosystem.
  This person is likely to be familiar with satellite ocean colour imagery and the principles of marine ecology, and may have a background in environmental science or conservation. They are interested in
  understanding the relationship between water temperature, chlorophyll concentration, and the abundance of phytoplankton in the coastal zone, as well as the potential impacts of pollution on these systems.
