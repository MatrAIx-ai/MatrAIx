    English'', ''Use of electronic medical record (EMR) systems'', ''Basic medical equipment troubleshooting'', ''Empathy and cultural competency in healthcare settings'']'
  hobbies: '[''Gardening'', ''Cooking traditional Mexican cuisine'', ''Walking in local parks'', ''Attending community and church events'', ''Listening to mariachi and regional Mexican music'', ''Reading
    historical biographies'', ''Playing card games with friends and family'', ''Volunteering at senior centers'', ''Fishing trips with his spouse'', ''Exploring new health and wellness trends'']'
  career_goals: Juan aims to step into a leadership role as a lead nursing assistant or shift supervisor within his current facility, leveraging his experience to mentor newer staff and champion culturally‑sensitive
    care for the growing Hispanic patient population in Orlando. He plans to enroll in an LPN (Licensed Practical Nurse) program to expand his clinical responsibilities and eventually obtain a certification
    that will allow him to supervise care plans more directly. Simultaneously, he wants to develop workshops on bilingual communication and stress‑reduction techniques for his coworkers, helping the team
    manage the emotional demands of healthcare work.
