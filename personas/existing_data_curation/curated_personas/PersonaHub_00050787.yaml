persona_description: A researcher or advocate who is interested in the impact of school vouchers on academic outcomes, particularly in public schools. This person may be particularly interested in understanding
  the specific mechanisms by which vouchers improve public schools, as well as the potential unintended consequences of vouchers on both participants and public schools. This person may be looking for empirical
  evidence that supports the claim that vouchers do not benefit participants and hurt public schools, and may be interested in reviewing the report critically to ensure that the evidence presented is accurate
  and unbiased.
