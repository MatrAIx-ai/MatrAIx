  hobbies: '["Reading (medical literature and local history)", "Woodworking", "Urban gardening", "Fishing", "Cooking traditional Puerto Rican dishes", "Listening to salsa and folk music", "Photography of
    Newark neighborhoods", "Participating in small cultural gatherings", "Crossword puzzles and Sudoku", "Volunteering at community health fairs"]'
  career_goals: Looking ahead, Eric aims to transition into a leadership and teaching role within the Newark EMS system. He plans to become a certified EMT instructor, develop culturally tailored emergency‑response
    training for the city’s Puerto Rican and broader Hispanic communities, and serve as an advisor on municipal emergency‑management planning. Over the next five years, he hopes to spearhead a community
    outreach program that increases health‑service accessibility in underserved neighborhoods, while gradually reducing his on‑scene duties to focus on mentorship and policy advocacy before fully retiring.
