personas:
  professional: Eric Motta, a veteran emergency medical technician with three decades of high‑stress frontline experience in Newark, leverages their meticulous documentation skills, bilingual communication,
    and calm under pressure to design culturally mindful training modules and mentor aspiring EMTs as they transition toward a leadership role within the city’s EMS system.
  sports: Eric Motta stays active by joining a local weekend rowing club on the Passaic River, watching the New York Giants and New York Knicks on television, and participating in a seasonal senior‑citizen
    walk‑run group that meets at Branch Brook Park each Saturday morning, balancing their love of gentle competition with a preference for low‑key social settings.
  arts: Eric Motta captures Newark’s street rhythm through black‑and‑white photography, while their evenings echo with the sounds of Celia Cruz, Rubén Blades, and local plena bands, and they collect vintage
    vinyl records that inspire occasional handmade album covers for friends’ community events.
  travel: Eric Motta prefers meticulously planned, low‑key vacations, often choosing heritage‑rich destinations like the island of Puerto Rico for its historic plazas and family recipes, weekend road trips
    to the Catskills for quiet hiking, and occasional day trips to Philadelphia’s historic sites, balancing a modest travel budget with their love of cultural immersion.
  culinary: Eric Motta cooks traditional dishes such as arroz con gandules, pastelón, and sofrito‑spiced roasted chicken using basil and oregano harvested from their rooftop garden, and while their culinary
    skills are solid, they admit to over‑salting occasional stews when trying to perfect the flavor balance.
  core: Eric Motta merges a life‑long emergency‑response career with a quiet love of gardening, woodworking, and salsa rhythms, and they maintain a methodical, low‑risk financial routine alongside a diligent
    yet occasionally lax health regimen.
background:
  cultural: Born to Puerto Rican parents who settled in Newark, Eric grew up in a bilingual household that blended Caribbean traditions with the urban fabric of New Jersey. Spanish is his first language,
    and he retains a deep connection to Puerto Rican cultural practices, celebrating holidays such as Noche de San Juan and participating in local festivals that feature bomba, plena, and sazón cuisine.
    His Catholic upbringing instilled values of service, humility, and community solidarity, which guide his compassionate approach to emergency care. Eric’s heritage informs his commitment to delivering
    culturally competent medical assistance, ensuring that language barriers never impede critical treatment for the island‑descendant population in Essex County.
attributes:
  skills: '["Advanced patient assessment", "Trauma life support", "CPR and AED certification", "Bilingual communication (English/Spanish)", "Emergency incident command", "Medical equipment operation", "EMS
