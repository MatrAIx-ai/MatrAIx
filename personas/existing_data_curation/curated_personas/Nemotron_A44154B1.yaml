  hobbies: '[''Collecting Swedish folk art'', ''Woodworking'', ''Garden maintenance'', ''Reading art history'', ''Photography'', ''Volunteer archival work'', ''Chess'', ''Crossword puzzles'', ''Attending
    small cultural gatherings'']'
  career_goals: Pablo aims to compile a comprehensive digital archive of Lindsborg’s historical records and produce a traveling exhibit of his folk‑art collection for regional museums. He intends to author
    a memoir that recounts his personal journey and the town’s cultural evolution, and to mentor at least two younger volunteers each year in archival and curation practices. He also aspires to design a
    sustainable community garden that serves as a living classroom for horticultural heritage, and to continue expanding his knowledge of contemporary art movements, integrating new ideas into his curatorial
    work. Ultimately, he hopes his contributions will be recognized as part of preserving the town’s Swedish‑American identity, ensuring future generations have access to both tangible artifacts and the
    stories behind them.
