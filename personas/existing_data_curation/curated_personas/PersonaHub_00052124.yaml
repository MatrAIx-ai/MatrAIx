persona_description: A healthcare professional who uses their PDA for medical record management, drug selection, and communication with hospitals. They are interested in using PDAs for digital note taking,
  conducting research, and connecting to a central server for data storage and synchronization. They are also interested in the potential for wearable sensors to monitor ongoing conditions and alert medical
  staff or patients. They are concerned with issues related to internet connectivity, such as sharing test answers or gossiping during class time, and have modernized their computer policies to address
  these concerns. They are interested in the development of Sensor Web technology and the use of PDAs for digital note taking, and are interested in the potential for PDAs to be used by music enthusiasts
  and road rally enthusiasts.
