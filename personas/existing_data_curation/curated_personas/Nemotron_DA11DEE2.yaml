  hobbies: '[''painting (watercolors & oil)'', ''photography (landscape)'', ''hiking in Gila National Forest'', ''bird watching'', ''gardening (native plants)'', ''volunteering at the Silver City Art Center'',
    ''attending poetry readings and jazz concerts'', ''exploring world cuisines (cooking)'', ''reading science & art history books'', ''participating in community festivals (Fiesta)'', ''pottery and weaving
    workshops'']'
  career_goals: Brenda aims to elevate the role of evidence‑based, arts‑integrated interventions within Grant County’s social service network, eventually stepping into a senior leadership position such
    as Director of Community Engagement. She seeks to mentor the next generation of social workers, develop a community arts‑and‑wellness hub, and author a practitioner’s handbook on combining quantitative
    program evaluation with creative therapeutic approaches. Over the next five years she plans to secure regional funding for a holistic wellness center and transition to a part‑time consultancy role that
    provides strategic guidance to nonprofit agencies across New Mexico.
