  career_goals: Earnest aims to become a Director of Procurement within the next five years and ultimately a Chief Procurement Officer, guiding an organization toward data‑driven, sustainable supply chains.
    He plans to earn professional certifications such as CPSM and CPM, master AI‑enabled procurement analytics, and lead initiatives that cut carbon emissions across the supplier network. Recognizing his
    sensitivity to stress, he also seeks to create a balanced work‑life rhythm that preserves his well‑being while achieving ambitious performance targets.
