personas:
  professional: Katherine Rogers, a 19‑year‑old apprentice carpenter with a flair for artistic design, blends hand‑tool joinery expertise, SketchUp prototyping, and a vivid imagination to craft bespoke
    sustainable furniture while navigating client expectations with clear communication and occasional over‑perfectionism.
  sports: Katherine Rogers, an avid hiker and member of the Ann Arbor Outdoor Club, trains with seasonal runs in the Upper Peninsula, follows the Detroit Lions and Michigan State Spartans, and balances
    low‑impact yoga sessions with occasional intramural ultimate frisbee to stay fit while avoiding over‑exertion.
  arts: Katherine Rogers draws inspiration from Joni Mitchell’s folk guitar, the ambient textures of Brian Eno, and the surreal sketches of Hokusai, regularly attends the Ann Arbor Art Fair, and spends
    evenings painting watercolor landscapes of Michigan’s northern woods, channeling a love for both classic and contemporary art.
  travel: Katherine Rogers prefers off‑the‑beaten‑path road trips, often planning weekend escapes to Michigan’s Upper Peninsula, has trekked the Algonquin Provincial Park trails, dreams of exploring the
    fjords of Norway and the bamboo forests of Kyoto, yet balances travel ambitions with a limited student budget.
  culinary: Katherine Rogers enjoys cooking at a moderate skill level, whipping up wild mushroom risotto with locally foraged chanterelles, cedar‑smoked trout seasoned with maple glaze, and experimenting
    with spruce‑tip‑infused sorbet, while keeping a stash of high‑quality cedar planks and fresh herbs for wood‑inspired dishes.
  core: Katherine Rogers is a 19‑year‑old woodcraft dreamer who toggles between meticulous carpentry projects, anxiety‑fuelled late‑night sketching, and a habit of over‑budgeting for fleeting artistic pleasures.
background:
  cultural: Katherine grew up in a middle‑class Midwest family of primarily German‑Irish heritage, which instilled a strong work ethic, modesty, and appreciation for practical craftsmanship. Living in East
    Lansing—a college town—has exposed her to a diverse, academic environment that values both intellectual curiosity and community collaboration. She balances the traditional Midwestern values of reliability
    and hands‑on skill with a modern, multicultural outlook shaped by campus events, art festivals, and the inclusive ethos of the university community.
attributes:
  skills: '[''Furniture making'', ''Custom cabinetry'', ''Blueprint reading'', ''Power tool operation'', ''Hand tool mastery'', ''Wood finishing techniques'', ''Basic SketchUp modeling'', ''Project planning'',
    ''Safety compliance'', ''Creative design translation'']'
  hobbies: '[''Sketching'', ''Watercolor painting'', ''Digital illustration'', ''Reading speculative fiction'', ''Philosophy'', ''Playing acoustic guitar'', ''Hiking'', ''Foraging'', ''Maker space volunteering'',
    ''Open‑mic performances'']'
  career_goals: Katherine aims to merge her carpentry trade with her passion for artistic design. In the next five years she plans to complete her associate degree in Construction Technology, then launch
    a small studio specializing in bespoke, sustainably sourced furniture and art installations for both private clients and campus spaces at Michigan State University. She hopes to gain certification as
    a Green Building Professional, allowing her to advise on eco‑friendly material choices. Long‑term, she envisions owning a workshop where she mentors apprentices and collaborates with local artists on
    community projects, balancing financial stability with creative fulfillment.
