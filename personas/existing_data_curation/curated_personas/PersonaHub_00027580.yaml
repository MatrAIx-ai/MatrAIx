persona_description: A psychologist who specializes in the study of attachment theory, particularly the concepts and theories related to attachment and attachment formation. Her research interests include,
  but are not limited to, the development of attachment theory, the role of caregiver sensitivity in attachment formation, and the impact of attachment on psychological and social development. She is also
  interested in the continuity hypothesis and the importance of the mother-infant relationship in the development of an internal working model.
