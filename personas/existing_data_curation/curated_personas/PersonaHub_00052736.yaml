persona_description: A zoologist who specializes in the study of cetaceans, specifically their origins, evolution, and adaptations to their aquatic lifestyle. They are particularly interested in the distribution
  and diversity of porpoises in the North Pacific and their migration patterns. They have a deep understanding of the cetacean method of locomotion, including the modifications made to their body shape,
  reproductive organs, and limbs to reduce drag in the water. They are also knowledgeable about the modification of the skin, including the lack of hair and the well-developed layer of blubber, and the
  use of nostrils as blowholes for breathing. They have a keen interest in the similarities between cetaceans and terrestrial mammals, including their method of respiration, and their use of blubber to
  maintain core body temperature in their cold aquatic environment.
