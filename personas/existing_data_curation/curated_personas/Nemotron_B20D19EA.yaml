  hobbies: '[''gardening'', ''cross‑stitching'', ''reading mystery novels'', ''reading self‑help books'', ''journaling'', ''birdwatching'', ''volunteering at senior center'', ''walking'', ''listening to
    classic country and folk music'']'
  career_goals: Laura aims to advance to a lead facilities manager or cleaning services supervisor role within the next few years. She plans to earn industry certifications such as the ISSA CleanTech and
    OSHA 10 to strengthen her credibility. Ultimately, she hopes to either lead a small, employee‑owned cleaning business that emphasizes eco‑friendly practices or mentor younger workers in her current
    organization, all while securing a stable retirement for her family and maintaining the high standards she values.
