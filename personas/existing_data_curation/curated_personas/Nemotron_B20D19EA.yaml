personas:
  professional: Laura Moore is a seasoned commercial cleaning professional who leverages their meticulous floor‑care expertise, rigorous chemical‑safety protocols, and disciplined scheduling to lead small
    crews, channeling their natural preference for structure and an assertive yet compassionate management style into consistently exceeding facility cleanliness standards.
  sports: Laura Moore keeps fit through daily walks on the Sacramento River trail, participates in the local Sacramento Hiking Club’s weekend outings, and follows the Sacramento Kings (NBA) and Sacramento
    Republic FC (USL) with a loyal but measured fandom, while they prefer low‑impact exercise over competitive sports.
  arts: Laura Moore finds solace in classic country and folk music—repeatedly listening to Johnny Cash, Dolly Parton, and Bob Dylan—while devoting evenings to cross‑stitching, reading Agatha Christie mysteries,
    and occasionally attending a community‑theatre production of "Our Town", allowing the arts to anchor their structured routine with creative expression.
  travel: Laura Moore prefers meticulously planned weekend getaways to nearby destinations such as Napa Valley, Lake Tahoe, and the historic gold‑rush town of Columbia, while they dream of a summer road
    trip through Yosemite’s high country, balancing a limited travel budget with a desire for relaxed nature immersion.
  culinary: Laura Moore cultivates a modest vegetable garden and enjoys preparing roasted seasonal squash, quinoa‑kale salads with lemon‑garlic dressing, and classic comfort dishes like chicken pot pie,
    demonstrating moderate cooking skills and a penchant for fresh, earthy ingredients that they savor during quiet evenings.
  core: Laura Moore is a disciplined, detail‑oriented facilities manager who channels their love of order and quiet creativity into gardening, cross‑stitching, and vigilant financial planning, all while
    wrestling with a penchant for worry and a habit of over‑scheduling.
background:
  cultural: Laura grew up in a middle‑class white family in Northern California, where values of hard work, reliability, and community service were strongly emphasized. Her upbringing in a modest suburban
    environment exposed her to DIY home maintenance and a respect for practical, hands‑on skills. The region’s agricultural roots and close‑knit small‑town culture shaped her preference for routine, modest
    gatherings, and a strong sense of responsibility toward family and neighbors.
