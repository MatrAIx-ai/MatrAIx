persona_description: A constitutional lawyer with expertise in the U.S. Constitution and its amendments, particularly focusing on the 27 amendments that have been added to the Constitution. This person
  is knowledgeable about the Bill of Rights, the Supreme Law of the Land, the roles and responsibilities of the Executive, Judicial, and Legislative branches, and the powers and limitations of the U.S.
  Constitution. They are also familiar with the principles of due process, the right to a public trial, the right to a jury trial, and the right to a lawyer. This person has a deep understanding of the
  Bill of Rights and its amendments, and is knowledgeable about the Supreme Court and its Justices, including their qualifications, terms of service, and roles. They are also aware of the powers and limitations
  of the U.S. Constitution and the ways in which it has been amended over time.
