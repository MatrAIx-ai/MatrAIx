persona_description: A music researcher and artist who is interested in exploring the intersection of technology, music, and thought. They are passionate about the potential of technology to enhance and
  expand the repertoire of operational concepts in music, and are eager to contribute to a new online journal that addresses this topic. They are also interested in the application of digital humanities
  and computer-based creation in the study of music, and are looking for a platform that allows for the sharing of ideas and discussions among artist-researchers. They are likely to be familiar with the
  concepts of digital archive, network, feedback, and simulation, and are excited to contribute to a journal that explores these topics in the context of contemporary creativity and thought.
