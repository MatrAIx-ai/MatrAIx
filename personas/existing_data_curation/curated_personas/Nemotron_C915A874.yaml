  career_goals: Although retired from formal employment, Alexis aims to remain an active contributor to her community. She aspires to serve on the board of a local non-profit focused on economic development,
    mentor emerging entrepreneurs through the Traverse City Small Business Center, and lead a seniors’ advisory committee. She also plans to complete a certificate in digital marketing to enhance her volunteer
    work and to author a memoir documenting her family’s Midwestern heritage.
