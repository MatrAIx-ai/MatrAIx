  hobbies: '[''Visiting art museums and galleries'', ''Architectural photography'', ''Gardening'', ''Yoga'', ''Cooking experimental recipes'', ''Historical preservation volunteering'', ''Walking/hiking
    in Shenandaah and local parks'', ''Attending design talks and lectures'', ''Reading architectural history books'']'
  career_goals: Shari aims to advance into a senior BIM coordinator role where she can lead cross‑disciplinary teams on large‑scale public infrastructure projects. She plans to earn her LEED Green Associate
    credential within the next two years and eventually pursue LEED AP certification to deepen her expertise in sustainable design. In the longer term, she hopes to establish a boutique consulting practice
    that supports historic preservation projects in Northern Virginia, offering both technical drafting services and artistic design guidance. She also enjoys sharing her knowledge through part‑time teaching
    at a community college and mentoring women entering the drafting field.
