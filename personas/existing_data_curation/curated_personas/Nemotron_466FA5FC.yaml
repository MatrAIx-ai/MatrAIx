personas:
  professional: Shari Mitchell, a veteran architectural and civil drafter with 25 years of experience, harnesses mastery of AutoCAD, Revit, and Civil 3D to produce precise construction documents and immersive
    3‑D models while infusing artistic nuance, and their curious, organized and emotionally stable nature drives them to lead cross‑disciplinary BIM coordination on large public infrastructure projects
    and mentor junior drafters with patience.
  sports: Shari Mitchell maintains fitness through low‑impact activities such as weekend jogs with the Northern Virginia Senior Runners Club, weekly pickleball matches at the Fairfax Community Center, and
    occasional tennis lessons, all while cheering for the Washington Nationals, the Washington Commanders, and the Washington Capitals as their hometown sports teams.
  arts: Shari Mitchell enriches her leisure with visits to the Smithsonian American Art Museum, studies the monochrome landscapes of Ansel Adams, draws inspiration from the organic forms of Frank Lloyd Wright,
    enjoys evening concerts featuring the music of Béla Bartók performed by the National Symphony Orchestra, and occasionally attends off‑Broadway productions starring Lin‑Manuel Miranda.
  travel: Shari Mitchell prefers meticulously planned heritage trips, having explored the colonial streets of Williamsburg, the historic gardens of Kyoto’s Kinkaku‑ji, the modernist avenues of Barcelona,
    and the breathtaking vistas of the Shenandoah Valley, where she often blends photography excursions with weekend getaways.
  culinary: Shari Mitchell delights in crafting inventive family meals, from herb‑crusted lamb with rosemary and thyme to a miso‑glazed salmon served over sautéed bok choy, complemented by a seasonal beet‑and‑goat‑cheese
    salad topped with pistachios and a splash of aged balsamic.
  core: Shari Mitchell is a methodical, art‑infused BIM coordinator who balances meticulous budgeting with a green‑thumbed garden retreat, a habit of reorganizing their drafting library by color, and a
    quiet tendency to linger over coffee while sketching historic facades.
background:
  cultural: Shari grew up in the Mid‑Atlantic region of the United States, steeped in the colonial and Federal architectural heritage that defines much of Virginia’s built environment. Her family values
    education, community service, and an appreciation for both American and European cultural traditions, reflecting a typical middle‑class white American upbringing with Germanic ancestry common in the
    area. Living in Fairfax County, she is exposed to a diverse population and often incorporates multicultural perspectives into her design sensibility, while maintaining a strong connection to local historic
    preservation initiatives and regional arts programs.
attributes:
  skills: '[''AutoCAD'', ''Revit'', ''Civil 3D'', ''BIM coordination'', ''Construction documentation'', ''Building code compliance (Virginia)'', ''Sustainable design principles'', ''Project scheduling (MS
