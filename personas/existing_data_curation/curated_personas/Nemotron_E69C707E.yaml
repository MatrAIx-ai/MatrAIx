personas:
  professional: David Santiesteban, a retired community organizer and cultural liaison, uses their bilingual storytelling, event‑planning expertise, and gentle mentoring style to coordinate senior storytelling
    circles, heritage exhibits, and neighborhood festivals while favoring a laid‑back, adaptable approach that balances their preference for structure with spontaneous flexibility, and they easily switch
    between careful budgeting and impromptu improvisation.
  sports: David Santiesteban enjoys weekly salsa and bachata sessions at the senior center, treks the Blue Ridge foothills on Saturday mornings, cheers on the local Caldwell County High School Warriors
    football team, and they also join a community bridge club that doubles as a mental‑exercise sport.
  arts: David Santiesteban finds creative fulfillment in reciting poetry at church, dancing to the vibrant sounds of Celia Cruz and Tito Puente, and attending classic film screenings of Casablanca and The
    Godfather at the town theater, often quoting Humphrey Bogart lines with a nostalgic grin, and they cherish these artistic moments as a way to stay emotionally connected.
  travel: David Santiesteban plans trips that blend heritage research and nature, having trekked the Blue Ridge trail in Asheville, toured the historic coastal town of San Juan for ancestral records, and
    they dream of a leisurely cruise through the Caribbean islands to sample local cuisine while adhering to a modest travel budget.
  culinary: David Santiesteban delights in preparing traditional island staples such as arroz con gandules, pasteles wrapped in plantain leaves, and mofongo, their kitchen skills range from seasoned sautéing
    of sofrito to meticulous wrapping of pasteles, and they frequently share these dishes at community potlucks while hand‑picking fresh cilantro, garlic, and ripe plantains at the farmers’ market.
  core: David Santiesteban is a socially vibrant 75‑year‑old whose structured yet easy‑going nature fuels a lifelong mission to preserve cultural stories, nurture community through dance, food, and gardening,
    and they navigate anxiety with mindfulness and occasional forgetfulness.
background:
  cultural: David's cultural background is rooted in Puerto Rican heritage; his grandparents were born on the island and his parents migrated to the mainland in the late 1950s seeking work, eventually settling
    in the Carolinas. He grew up bilingual, with family gatherings featuring bomba and plena rhythms, and a strong emphasis on family cohesion, respect for elders, and Catholic traditions. The move to Morganton,
    NC introduced him to Appalachian culture, which he blended with his Caribbean roots, creating a unique hybrid identity. He maintains ties to the Puerto Rican community through participation in local
    festivals, cooking, and preserving oral histories of diaspora families. His cultural sensibility is reflected in his love for music, storytelling, and communal meals, and he values passing these traditions
    to younger generations while adapting to his Southern environment.
