personas:
  professional: Jessica Sebastiao, a retired business administration professional, leverages their budgeting expertise, bilingual communication, and hands‑on DIY skills to design free cooking and budgeting
    workshops for the local community while steering the planning of a neighborhood garden, often improvising when timelines slip and preferring spontaneous, hands‑on problem solving over rigid structures.
  sports: Jessica Sebastiao enjoys low‑impact activities such as weekly walks in Hermann Park, occasional community shuffleboard matches where they play competitively, and cheering on the Houston Astros,
    blending their love of the outdoors with a light competitive edge.
  arts: Jessica Sebastiao participates in local Día de los Muertos festivals, volunteers as a costume‑making assistant for traditional performances, quilts intricate patterns inspired by folk motifs, and
    finds inspiration in the music of regional folk singers like Lila Downs and the melodies of classic film scores.
  travel: Jessica Sebastiao prefers spontaneous day trips to the Texas Hill Country, exploring historic wineries in Fredericksburg and the scenic vistas of the Enchanted Rock area, while dreaming of a future
    pilgrimage to the colorful streets of Oaxaca to study its vibrant crafts and culinary traditions.
  culinary: Jessica Sebastiao blends heirloom chilies from their rooftop garden with Texan BBQ techniques to create dishes such as chipotle‑marinated pork al pastor tacos and smoked corn‑and‑black bean
    enchiladas, while their signature sweet‑spiced tamale filling with pine nuts reflects a commitment to honoring family recipes and experimenting with new flavor pairings.
  core: Jessica Sebastiao is a curious, hands‑on retiree who balances spontaneous creativity with practical budgeting, channeling their love of gardening, cooking, and community mentorship into vibrant,
    albeit occasionally improvised, projects.
background:
  cultural: Jessica was born to Mexican immigrant parents who settled in Houston’s East End. Growing up, she was immersed in a bilingual household where Spanish was spoken at home and English at school,
    giving her a bicultural perspective. Family traditions such as celebrating Día de los Muertos, preparing tamales for holidays, and attending mass at the local Catholic parish remain central to her identity.
    She carries forward her cultural heritage through her cooking, using recipes passed down from her grandmother, and by participating in community events that showcase Mexican music, dance, and art. Houston’s
    vibrant Mexican community has provided a supportive network, shaping her values of resilience, hospitality, and communal responsibility. Her cultural background informs her curiosity about blending
    old and new practices, her practical approach to everyday challenges, and her desire to mentor the next generation in preserving these traditions.
