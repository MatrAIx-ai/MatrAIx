  hobbies: '[''Rooftop organic gardening'', ''Traditional Mexican and Tex-Mex cooking'', ''Attending cultural festivals and community events'', ''Teaching basic computer skills at senior center'', ''Reading
    historical fiction and biographies'', ''Spontaneous day trips around Texas'', ''Quilting'', ''Birdwatching at Hermann Park'']'
  career_goals: Although officially retired, Jessica aims to channel her skills into mentoring younger members of Houston’s Mexican community. She plans to develop a series of free cooking workshops that
    highlight traditional recipes and modern healthy twists, while also offering workshops on budgeting and DIY home upkeep. Her long-term ambition is to co-lead a community garden that provides fresh produce
    to low-income families and serves as an educational hub. She also hopes to compile her life stories and family recipes into a memoir that celebrates Mexican heritage in Texas, preserving cultural knowledge
    for future generations.
