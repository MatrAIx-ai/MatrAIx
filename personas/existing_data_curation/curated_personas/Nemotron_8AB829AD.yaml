    ''Project scheduling and timeline management'', ''Newsletter writing and editing'', ''First‑aid certification'', ''Basic desert horticulture'']'
  hobbies: '[''Visiting art galleries and museum exhibitions'', ''Watercolor painting'', ''Digital photography of desert scenes'', ''Volunteer coordination for community arts festivals'', ''Bridge and other
    card games with friends'', ''Senior yoga and wellness classes'', ''Bird‑watching in the Sonoran Desert'', ''Cultivating desert succulents and garden projects'', ''Reading mystery and historical fiction'',
    ''Traveling to nearby national parks and historic sites'']'
  career_goals: Although retired, Mena aims to deepen her impact on Tucson’s cultural life by becoming a senior volunteer coordinator for the Tucson Museum of Art, organizing a traveling exhibition that
    highlights local artists, and establishing a mentorship program for younger women interested in arts administration. She also aspires to complete an online certificate in art history, publish a memoir
    that weaves personal stories with the history of the Southwest, and launch a quarterly community‑run guide to regional arts and heritage events.
