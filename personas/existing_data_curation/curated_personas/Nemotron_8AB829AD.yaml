personas:
  professional: Mena Scoggin, a retired community‑events veteran with a knack for precision and people, channels her disciplined organization and sociable energy into coordinating volunteer programs at
    the Tucson Museum of Art, planning a traveling exhibition of local artists, and mentoring young women in arts administration while drafting clear newsletters and tight budgets.
  sports: Mena Scoggin embraces low‑impact fitness through twice‑weekly senior yoga, weekend bird‑watching hikes in Saguaro National Park, and cheering on the Arizona Diamondbacks and Tucson Roadrunners
    while keeping a modest membership with the local walking club that meets at sunrise.
  arts: Mena Scoggin, an avid watercolorist of desert sunsets and frequent gallery‑opening attendee, captures the Southwest’s light in her photographs, draws inspiration from the vibrant canvases of local
    painter Lila Hernández, and unwinds with Agatha Christie mystery novels in her cozy reading nook.
  travel: Mena Scoggin delights in meticulously planned road trips across the Southwest, from sunrise drives through Monument Valley to evening stays in Santa Fe’s historic plaza, while daydreaming about
    a future cultural pilgrimage to Kyoto, Japan, balancing her love of adventure with senior‑discount budgeting and a need to stay close to family in Tucson.
  culinary: Mena Scoggin’s palate leans toward Southwestern flavors, favoring dishes like roasted nopales tacos, prickly‑pear margaritas, and chile‑relleno casserole, and she enjoys experimenting with fresh
    succulents in salads, though her cooking skill remains comfortably mid‑level—she can whip up a reliable sourdough loaf but often relies on pre‑made salsa verde for speed.
  core: Mena Scoggin blends her relentless organizational zeal with a boundless curiosity for art and desert life, turning every bridge game, yoga class, and succulents‑tending session into a chance to
    nurture community, even if she sometimes forgets to water the plants during long photo outings.
background:
  cultural: Mena grew up in a middle‑class white family in the Midwest before moving to Tucson in the early 1970s. Over the past five decades she has embraced the eclectic Southwest, absorbing influences
    from Pueblo art, Mexican traditions, and the desert’s natural rhythms. While her heritage is rooted in European‑American values of hard work and community service, she is fluent in English, has conversational
    Spanish skills, and actively participates in local cultural events such as the Tucson Festival of Books and All Souls Procession. Her long residence in Arizona has blended her Midwestern upbringing
    with a deep appreciation for the region’s diverse artistic and ecological heritage.
