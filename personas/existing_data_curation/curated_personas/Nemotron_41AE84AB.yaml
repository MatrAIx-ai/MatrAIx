  career_goals: While still in elementary school, Melody dreams of turning her love for art and technology into a future career. She envisions becoming an animated film creator or video‑game designer where
    she can craft worlds and narratives. She also imagines writing science‑fiction stories and hopes to attend a specialized arts‑technology magnet program in middle school to deepen her skills.
