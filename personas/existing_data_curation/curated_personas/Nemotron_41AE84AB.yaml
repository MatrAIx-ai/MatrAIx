personas:
  professional: Melody Ritchey, an aspiring young game designer and stop-motion storyteller, blends a love for drawing whimsical characters with Scratch programming to craft interactive narratives, while
    they compete in school coding contests and meticulously document each project.
  sports: Melody Ritchey, an occasional participant in community swimming lessons and after-school gymnastics, prefers solo activities like bike rides and has a loyalty to the local youth soccer club, the
    Riverdale Rovers, but they mostly stay active through imaginative backyard obstacle courses inspired by their favorite fantasy books.
  arts: Melody Ritchey, a dedicated young artist, spends afternoons painting watercolor landscapes and drawing characters reminiscent of Studio Ghibli and Dr. Seuss, regularly contributes to a small after-school
    art club where they admire the works of Hayao Miyazaki, Tim Burton, and contemporary cartoonist Noelle Stevenson, and channels that inspiration into stop-motion animations of their own LEGO creations.
  travel: Melody Ritchey, an avid day-trip explorer, loves planning weekend visits to nearby science museums and the local amusement park where they ride the dragon coaster, dreams of traveling to the Wizarding
    World in London and Japan's Ghibli Museum, and balances this wanderlust with school schedules and a parent-imposed budget.
  culinary: Melody Ritchey, a budding home-chef, delights in making rainbow cupcakes topped with buttercream and sprinkles, enjoys assembling sushi rolls with cucumber and avocado for fun, and frequently
    snacks on carrot sticks with hummus while they sketch, showing a palate that mixes sweet treats with playful, healthy bites.
  core: Melody Ritchey—a imaginative, slightly competitive ten-year-old—turns solitary puzzles and LEGO builds into vibrant stories, while they occasionally overindulge in late-night animations and impulsive
    sticker purchases.
background:
  cultural: Melody comes from a White, middle‑class family living in Encino, a suburban neighborhood of Los Angeles. Her upbringing blends typical American suburban values—emphasis on education, personal
    responsibility, and community involvement—with the cultural richness of Southern California. She has been exposed to a diverse array of artistic influences from nearby museums, film studios, and technology
    hubs, which have nurtured her curiosity for novelty and abstract concepts. Family traditions include celebrating holidays like Thanksgiving and Halloween, and occasional participation in local community
    events that highlight the multicultural fabric of the LA area.
