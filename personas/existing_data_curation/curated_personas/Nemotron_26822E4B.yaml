  hobbies: '["Attending live music shows", "Visiting art openings", "Improv and community theatre workshops", "Weekly dance classes (hip‑hop, salsa)", "Volunteering at community centers", "Exploring NYC
    neighborhoods", "Photography", "Journaling", "Reading contemporary literature", "Yoga and mindfulness meditation", "Board games and escape rooms", "Cooking new recipes"]'
  career_goals: Vanessa aims to leverage her BA in humanities to enter the cultural sector, ideally as a program coordinator or outreach specialist at a museum or community arts organization in New York
    City. She plans to pursue a graduate certificate in Museum Studies or Arts Administration within the next two years to deepen her practical expertise. Her short‑term goal is to secure an internship
    that blends research with public programming, allowing her to design educational events that are both intellectually rigorous and accessible. Long‑term, she envisions a leadership role where she can
    develop innovative, community‑focused exhibitions and educational initiatives that bridge scholarly curiosity with real‑world impact. She also hopes to cultivate a personal blog/podcast that explores
    the intersection of art, mental health, and social issues, thereby using her own emotional experiences to help others.
