personas:
  professional: Vanessa May, an aspiring museum program coordinator, channels her methodical research, debate‑sharp strategic thinking, and vibrant public‑speaking skills into designing community‑focused
    exhibitions, while they competitively vet collaborators to ensure authenticity.
  sports: Vanessa May stays active by attending weekly hip‑hop and salsa classes at the Midtown Dance Studio, playing co‑ed soccer with the Staten Island Community League, and cheering for the New York
    Knicks, Yankees, and Rangers, while they treat fitness as a social outlet rather than a strict regimen.
  arts: Vanessa May regularly immerses themselves in NYC’s cultural scene, attending live shows by artists like Mitski and The National, exploring pop‑up galleries featuring works by Banksy, and participating
    in improv workshops at the Upright Citizens Brigade, which fuels their creative outlook.
  travel: Vanessa May prefers spontaneous, photogenic weekend trips, having explored Brooklyn’s Williamsburg, taken a day‑long ferry ride to Staten Island’s Snug Harbor, and dreaming of a cultural pilgrimage
    to Dublin and a sun‑soaked getaway to Barcelona, while they meticulously document each journey in a hybrid journal and Instagram story.
  culinary: Vanessa May’s kitchen experiments span Irish stew with fresh rosemary, spicy Pad Thai with tamarind sauce, and a weekly brunch of avocado toast topped with smoked salmon, reflecting their love
    for diverse flavors and a confidence level that oscillates between novice and daring home‑chef.
  core: Vanessa May, a 19‑year‑old cultural enthusiast, blends relentless curiosity with meticulous planning, and they often over‑schedule their calendar while battling waves of anxiety.
background:
  cultural: Vanessa comes from a white, Irish‑American family that has lived in Staten Island for three generations. Growing up in the suburban borough, she experienced a blend of close‑knit neighborhood
    values and the cultural dynamism of nearby New York City. Family traditions include celebrating Irish holidays such as St. Patrick’s Day with music and storytelling, as well as typical American holidays
    like Thanksgiving and the Fourth of July. The multicultural environment of Staten Island and the broader NYC area exposed her to diverse cuisines, arts festivals, and public institutions, fostering
    an appreciation for varied cultural expressions while maintaining a strong sense of community and family heritage.
