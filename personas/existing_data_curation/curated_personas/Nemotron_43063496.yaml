personas:
  professional: Emily Brust, a veteran cutting‑room specialist with decades of manual and CNC machine expertise, blends their meticulous attention to detail and love for art into flawless production workflows
    while assertively mentoring younger staff and gradually learning basic CNC programming to expand their technical repertoire.
  sports: Emily Brust, an avid weekend hiker and member of the Columbia Gorge Hiking Club, supports the Portland Timbers with passionate game‑day rituals and enjoys strolling the Gorge trails as a low‑impact
    fitness regimen that keeps their joints supple during the cooler seasons.
  arts: Emily Brust, a watercolor enthusiast who draws inspiration from Claude Monet and Ansel Adams, regularly attends the Portland Art Museum’s watercolor workshops, listens to the Art History Babes podcast,
    and curates a private collection of vintage sketchbooks and handcrafted tools that shape their creative identity.
  travel: Emily Brust, an organized explorer, favors scenic road trips to places like Cannon Beach, Crater Lake, and the Oregon Coast while dreaming of overseas journeys to Tuscany’s vineyards and Kyoto’s
    cherry blossoms, always planning itineraries around quiet, nature‑rich destinations and budgeting carefully for each adventure.
  culinary: Emily Brust, a garden‑to‑table cook, delights in preparing ratatouille with heirloom tomatoes, zucchini, and fresh rosemary, crafts herb‑infused quinoa bowls using basil and thyme from their
    vegetable patch, and enjoys the occasional indulgence of goat cheese on a crisp salad, all while maintaining a modest yet confident cooking skill level.
  core: Emily Brust, a solitary, detail‑oriented craftsman and nature lover, blends precise cutting expertise with a quiet passion for watercolor, gardening, and knitting intricate scarves, often spending
    evenings sketching the Gorge while planning their next peaceful hike.
background:
  cultural: Emily grew up in a white, working‑class family in the Pacific Northwest, where self‑reliance, respect for the outdoors, and community involvement are core values. Her upbringing emphasized hard
    work, modesty, and appreciation for local traditions such as regional festivals and farmers' markets. Though raised with a modest religious background, she now identifies more with secular humanist
    values, cherishing personal curiosity and lifelong learning. The cultural mix of rural Oregon life and a modest educational path has shaped her pragmatic yet open‑minded worldview.
