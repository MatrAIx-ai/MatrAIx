  career_goals: Emily aims to continue contributing reliably at her current job while gradually taking on a mentorship role, helping younger coworkers master cutting techniques and safety standards. She
    is interested in learning basic CNC programming to expand her technical skill set. As she nears retirement, Emily hopes to transition to part‑time work that allows more time for personal projects, such
    as creating handcrafted wooden art pieces, and to volunteer at the local community center teaching basic tool use and craft skills to seniors and youth.
