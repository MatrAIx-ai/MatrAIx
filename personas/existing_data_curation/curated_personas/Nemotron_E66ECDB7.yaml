personas:
  professional: Nanette Barreto, a licensed electrician with deep expertise in smart‑home automation and solar photovoltaic installations, leverages their competitive drive to solve wiring puzzles on the
    fly, often improvising when standard NEC protocols clash with creative lighting designs, while mentoring apprentices with a mix of rigorous safety standards and encouragement to think outside the box.
  sports: Nanette Barreto chases the sunrise with weekend hikes through the Texas Hill Country, slots in occasional pickup soccer games with friends, proudly supports the Houston Astros and participates
    in the Houston Runners club, yet often foregoes scheduled gym sessions in favor of spontaneous bike rides fueled by their love of competition.
  arts: Nanette Barreto wanders Houston's vibrant mural corridors, often pausing to photograph works by street artist JR and local muralist Serra Maldonado, draws design inspiration from Frida Kahlo's color
    palettes, and loses themselves on salsa nights dancing to Celia Cruz and Marc Anthony, letting those artistic pulses shape their custom lighting concepts.
  travel: Nanette Barreto prefers spontaneous road trips that combine rugged hiking in the Texas Hill Country with cultural pit‑stops in Santa Fe and Oaxaca, dreams of a future bike‑tour across the Pacific
    Northwest, and keeps travel budgets lean by hunting last‑minute Airbnb deals while occasionally postponing overseas ambitions due to certification costs.
  culinary: Nanette Barreto whips up heritage dishes like mole poblano with dark chocolate, pasilla chiles, and toasted sesame seeds, perfects crispy fish tacos using corn tortillas and pickled radish,
    and experiments with smoky chipotle‑infused guacamole, all while balancing a moderate skill level that blends precise voltage timing in their kitchen gadgets with spontaneous flavor improvisation.
  core: Nanette Barreto fuses an electrician’s precision with an artist’s wanderlust, racing against deadlines and anxiety alike, while hoarding screwdriver sets, binge‑photographing murals at midnight,
    and occasionally losing track of meetings in creative daydreams.
background:
  cultural: Nanette grew up in a Mexican‑American household in Houston, where Spanish was spoken at home and cultural traditions were celebrated. Family gatherings centered around communal meals, música
    ranchera, and the annual Día de los Muertos altar, instilling a strong sense of community and pride in her heritage. This background informs her aesthetic sensibility, leading her to incorporate vibrant
    colors and folkloric motifs into her lighting projects. Being part of a bicultural community has taught her resilience and a pragmatic work ethic, while nurturing an appreciation for Mexican art, cuisine,
    and dance. She maintains close ties with local Mexican cultural organizations and volunteers at community events, often using her trade skills to support neighborhood initiatives.
attributes:
  skills: '["Residential wiring", "Commercial electrical systems", "Blueprint reading", "Load calculation", "Conduit bending", "Electrical fault troubleshooting", "Smart home automation installation", "Solar
    photovoltaic system integration", "Custom decorative lighting design", "NEC safety compliance", "Technical documentation", "Improvisational problem solving", "Apprentice mentoring"]'
  hobbies: '["Urban and industrial photography", "Visiting art galleries and mural tours", "DIY electronics and Arduino projects", "Smart-home tinkering", "Cooking Mexican cuisine", "Salsa dancing", "Spontaneous
    weekend road trips", "Reading science-fiction novels", "Sketching lighting designs", "Attending Día de los Muertos celebrations"]'
  career_goals: She aims to become a Master Electrician and obtain NABCEP certification for solar installations. She wants to launch her own contracting firm that specializes in sustainable smart‑home solutions
    and artistic lighting installations for residential and boutique commercial spaces in Houston. Nanette is driven to be recognized as a go‑to specialist for high‑end projects, and she plans to build
    a network of local artists and designers for collaborative installations. She also hopes to create workshops that empower other women and members of the Mexican‑American community to enter the trades,
    turning her competitive drive into community impact. To support these ambitions she is working on improving her time‑management skills and establishing routine practices that help her manage anxiety.
