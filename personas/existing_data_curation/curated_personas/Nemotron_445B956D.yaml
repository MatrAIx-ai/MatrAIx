personas:
  professional: Mildred Robinson is a seasoned travel agent who leverages fifteen years of experience, mastery of Sabre and Amadeus, and a natural flair for storytelling to craft art-centric itineraries
    while they competitively drive sales quotas and thrive as the charismatic star of agency showcases.
  sports: Mildred Robinson stays energized by joining the Central Florida Hiking Society for weekend treks in Ocala National Forest, and they cheer on the Orlando Magic during basketball season, follow
    the Tampa Bay Rays in the summer, and occasionally play recreational beach volleyball with friends.
  arts: Mildred Robinson immerses themselves in the works of Claude Monet and Frida Kahlo during watercolor workshops, they capture sunrise over the Everglades inspired by Ansel Adams, and they fill evenings
    with live jazz at the House of Blues Orlando featuring artists like Kamasi Washington and vocalist Lila Downs.
  travel: Mildred Robinson curates spontaneous art-focused trips, favoring flexible itineraries that blend iconic sites like Barcelona's Gothic Quarter and Kyoto's Gion district with off-beat galleries
    in Marrakech, while they dream of future adventures to Reykjavik's design museums and Buenos Aires' street-art scene, often balancing travel planning around their busy agency schedule and occasional
    family commitments.
  culinary: Mildred Robinson delights in whipping up intermediate-level Mediterranean meals like grilled mahi-mahi with lemon-basil vinaigrette and Thai green curry with coconut milk and fresh chilies,
    while their palate also craves avocado toast topped with poached egg, and they frequently explore Central Florida's farm-to-table eateries such as the Winter Park cafe "The Ravenous Pig" for innovative
    dishes like pork belly ramen.
  core: Mildred Robinson balances a love for spontaneous travel and garden yoga with a habit of over-booking their calendar and occasionally forgetting to pay utility bills on time, yet they always bounce
    back with a bright smile.
background:
  cultural: Mildred grew up in a middle‑class white family in Central Florida, where the blend of Southern hospitality and the state’s multicultural tourism scene shaped her worldview. She celebrates traditional
    American holidays but also embraces the diverse cultural flavors that visitors bring to Lake Wales, from Caribbean cuisine to Latin music. Her upbringing in a community that values friendliness, flexibility,
    and a relaxed pace is reflected in her easygoing style, while her exposure to the region’s thriving arts scene—museums, local festivals, and public murals—has fostered a lifelong appreciation for visual
    and performing arts.
attributes:
