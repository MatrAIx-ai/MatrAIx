  hobbies: '[''watercolor painting'', ''travel photography'', ''visiting art galleries'', ''attending local theater performances'', ''gardening'', ''yoga'', ''hiking in Myakka River State Park'', ''exploring
    new restaurants'', ''live‑music venues'', ''board game nights with friends'', ''volunteering at community art festivals'']'
  career_goals: Mildred aims to become the top‑selling agent in her region and eventually launch her own boutique travel consultancy that specializes in art‑focused and experiential tours for independent
    travelers. She plans to earn the Certified Travel Associate (CTA) and Certified Travel Counselor (CTC) designations, expand her expertise in sustainable tourism, and mentor younger agents in her agency.
    Long‑term, she envisions publishing a travel column and curating annual themed travel events that showcase emerging artists and cultural destinations.
