persona_description: A wildlife biologist who studies the behavior and genetics of wild boars, particularly their stripes and their evolutionary history. They are interested in the survival advantages of
  the camouflage patterns and the reasons behind the loss of these patterns in adult pigs. They are curious about the genetics of the striping patterns and the potential impact on the piglets' survival.
  They are also interested in the role of genetics in the domestication process and the ways in which domestication has influenced the evolution of piglets' stripes.
