persona_description: A scientist or researcher in the field of immunology, particularly focusing on the role of CD8+ T cells in the immune response and the mechanisms of protection against viral infections.
  They are interested in understanding the early activation of CD8+ T cells in the lymph nodes and the priming of these cells in the skin-draining lymph nodes, and how this priming affects the protection
  against malaria. They are also interested in the differences between ectromelia and malaria in terms of the route of infection and the protection mechanisms, and how these differences impact the interpretation
  of the protective CD8+ T cell response.
