persona_description: A cotton producer who is concerned about the growing threat of herbicide resistance in cotton production in the Mid-South and Southeast. They are actively seeking educational resources
  and strategies to manage this issue and are looking for information on how to deal with weed resistance in their own operations. They are interested in learning more about the NCC-hosted free online course,
  weed resistance videos, and the document published by Cotton Incorporated on managing herbicide resistance in cotton cropping systems.
