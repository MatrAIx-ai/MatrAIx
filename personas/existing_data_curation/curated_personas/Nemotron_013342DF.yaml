    repair'', ''Inventory management and material tracking'', ''Shift scheduling and small team coordination'', ''Data-driven performance analysis'']'
  hobbies: '[''Fly fishing'', ''Woodworking'', ''Scale model building'', ''Historical non-fiction reading'', ''Grilling and BBQ'', ''Attending county fairs'', ''Hiking prairie trails'', ''Puzzling (crosswords,
    Sudoku)'']'
  career_goals: In the next two years Walter plans to earn the Certified Foundry Technician credential, deepening his expertise in advanced alloys and process control. His medium‑term objective is to become
    a shift supervisor, where he can implement lean initiatives that lower scrap rates and improve cycle time while mentoring new operators. Over the longer horizon he aspires to advance into a plant‑wide
    managerial role or launch a boutique specialty casting business that serves local agricultural equipment manufacturers, allowing him to combine technical mastery with entrepreneurial ambition while
    maintaining a stable, family‑centered lifestyle.
