  career_goals: Juan Rafael aims to transition from freelance development to a senior or lead engineering role where he can mentor junior developers and champion the integration of technology and art. He
    dreams of launching a boutique studio that creates interactive digital experiences for museums, galleries, and community events, leveraging his multicultural background to produce work that resonates
    across cultures. In the longer term, he hopes to contribute to open‑source creative‑coding libraries and organize regional hackathons that bring together artists and technologists in Appalachia and
    the Colombian diaspora.
