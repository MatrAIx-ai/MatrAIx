personas:
  professional: Juan Bautista is a self‑taught full‑stack developer who merges creative coding with robust engineering, leveraging JavaScript, Python, and cloud platforms to build interactive experiences
    while mentoring junior teammates with calm resilience despite a habit of keeping a cluttered workspace.
  sports: Juan Bautista regularly hikes with the Allegheny Trail Club, cheers on the Pittsburgh Steelers and Penguins, and joins a community pickup soccer league on weekends, balancing a love for outdoor
    endurance with a laid‑back approach to structured fitness.
  arts: Juan Bautista is an avid guitarist who blends Appalachian bluegrass and traditional folk melodies while creating digital illustrations inspired by Beeple, James Turrell, and the lyrical storytelling
    of Bob Dylan and Joni Mitchell, frequently showcasing work at local art walks and improvisational theater sessions.
  travel: Juan Bautista prefers spontaneous road trips, having explored the Great Smoky Mountains, the Blue Ridge Parkway, and Asheville’s craft scene, while dreaming of an immersive cultural visit to the
    Scottish Highlands and a photography expedition to Patagonia’s glaciers.
  culinary: Juan Bautista enjoys cooking hearty dishes like cheese‑filled arepas, seasoned beef empanadas, and vegetable‑rich sancocho, while experimenting with Appalachian spice blends such as smoked paprika
    and sage, often pairing meals with a home‑brewed kombucha and a playlist of bluegrass tunes.
  core: Juan Bautista is a 44‑year‑old full‑stack developer, guitarist, and digital artist who balances a relaxed, slightly chaotic lifestyle with a calm, resilient drive to fuse technology and creativity.
background:
  cultural: Juan Rafael was raised in a Colombian immigrant family that preserved strong ties to their heritage through language, music, and food. He grew up bilingual, celebrating festivals such as Carnaval
    de Barranquilla and sharing traditional meals of bandeja paisa and arepas with relatives. After moving to Paw Paw, West Virginia, he blended his Colombian roots with the Appalachian culture—participating
    in local fairs, learning folk music, and developing a deep appreciation for the region’s mountains and forests. He regularly travels back to Colombia to visit family and stay connected to the vibrant
    art scenes of Bogotá and Medellín, while also engaging with the Colombian diaspora in nearby cities. This bicultural experience informs his worldview, fostering openness to diverse ideas and a collaborative
    spirit that bridges tech, art, and community.
