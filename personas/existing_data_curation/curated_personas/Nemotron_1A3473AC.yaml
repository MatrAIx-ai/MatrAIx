personas:
  professional: Paula Trevino, a two‑year‑old who already treats playtime with the precision of a budding project manager, demonstrates emerging leadership, organization, and methodical planning, hinting
    at a future path in early childhood education.
  sports: Paula Trevino, a two‑year‑old who idolizes the City Lions mascot and attends weekly toddler tumble classes at the local YMCA, passionately swings on the park set and prefers structured team‑oriented
    play over free‑form wandering.
  arts: Paula Trevino, a two‑year‑old who loves banging the toy drum to the rhythm of Raffi’s Baby Beluga and proudly displays finger‑painted rainbow circles, finds comfort in repetitive musical beats and
    bright visual patterns, often humming the tune while stacking blocks.
  travel: Paula Trevino, a two‑year‑old who enjoys family road trips to the seaside boardwalk and the nearby mountain cabin, thrives on itineraries that schedule nap times and familiar snack stops, and
    dreams of seeing the bright lights of New York City.
  culinary: Paula Trevino, a two‑year‑old who prefers soft avocado toast cut into bite‑size squares, delights in stirring mashed potatoes with a child‑safe spoon, and repeatedly asks for extra applesauce,
    yet can be fussy about any unexpected textures.
  core: Paula Trevino, a two‑year‑old who balances meticulous routine with relentless energy, worries over the smallest details while sprinting through playrooms, and never leaves a puzzle piece unexamined.
background:
  cultural: Paula is a white American child raised in Bowling Green, Kentucky, within the largely rural setting of Butler County. Her household reflects the Southern Kentucky values of close‑family ties,
    community gatherings, and a modest, hospitable lifestyle. Family routines often include church‑related events, potluck meals featuring regional dishes such as biscuits and fried chicken, and regular
    visits to the local library and community park. While these traditions emphasize politeness, reliability, and respect for routine, Paula also experiences the broader, modern influences of a growing
    small city, giving her exposure to diverse activities, educational programs, and a blend of traditional Southern customs with contemporary suburban life.
