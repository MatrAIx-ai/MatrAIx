  career_goals: Although still very young, Paula already imagines herself in roles that let her organize and guide others. She talks about wanting to become a 'teacher' who makes a schedule for the class,
    a 'play‑leader' who decides which games are played at the park, and someday a small business owner who runs a tidy shop where everything is in its right place. Her ambitions reflect a desire for predictability,
    leadership, and the ability to shape group activities, all expressed through child‑like fantasies of leading storytime and arranging toys for others.
