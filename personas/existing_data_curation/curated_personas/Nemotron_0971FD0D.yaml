  career_goals: In the short term, Elizabeth aims to maintain high grades, take on leadership roles in her school’s student council and yearbook club, and earn a part‑time volunteer certification at the
    local library. Looking ahead, she envisions a career that combines organization, helping others, and practical service—such as becoming a middle‑school teacher specializing in math or science, a registered
    nurse, or an office manager for a community health clinic. She plans to attend a college that offers strong education or health‑sciences programs and values a clear, step‑by‑step career path.
