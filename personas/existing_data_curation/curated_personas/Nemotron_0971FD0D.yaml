personas:
  professional: Elizabeth Tarrance, an organized middle-school student, balances her role as a piano section member in the school band with her volunteer work at the town library, applying meticulous attention
    to detail and a calm, routine‑driven approach to all tasks they undertake.
  sports: Elizabeth Tarrance, an active teenager, rides with the Warren County Cyclists bike club, hikes local trails with the Trailblazers Hiking Club, roots for the Cleveland Cavaliers and Cincinnati
    Bengals, and they prefer structured, low‑impact exercise that fits their routine.
  arts: Elizabeth Tarrance, a creative yet practical teen, performs piano pieces by Ludwig van Beethoven and Lindsey Stirling in her school band, devours the "Percy Jackson" and "Harry Potter" series, and
    enjoys strategy board games like Catan with friends, letting music and literature shape their identity.
  travel: Elizabeth Tarrance, a detail‑oriented traveler, plans weekend outings to Cuyahoga Valley National Park and a school field trip to Washington, D.C., dreams of exploring Edinburgh’s historic Old
    Town, and they balance adventure with the modest budget constraints of a teenage traveler.
  culinary: Elizabeth Tarrance, a budding home chef, bakes chocolate‑chip and oatmeal‑raisin cookies using butter, brown sugar, and cinnamon, whips up simple spaghetti marinara with fresh basil and mozzarella,
    and they enjoy measuring out ingredients with a practiced hand, finding comfort in the predictable rhythm of cooking.
  core: Elizabeth Tarrance is a rhythm‑driven, routine‑loving teen who blends piano practice, coding, hiking, and careful budgeting into a calm, organized life dotted with quiet self‑reflection, and they
    seldom succumb to stress.
background:
  cultural: Elizabeth was raised in Phillipsburg, a small town in Warren County, New Jersey, within a family that values hard work, education, and community involvement. Her household celebrates traditional
    American holidays such as Thanksgiving and Fourth of July with family gatherings and local parade participation. The community’s East‑Coast small‑town culture, with its close‑knit neighborhoods and
    emphasis on mutual support, has shaped her practical outlook and love for routine. Although her ancestry includes roots in the broader Mid‑Atlantic region, her upbringing reflects a blend of contemporary
    suburban life and longstanding local customs.
