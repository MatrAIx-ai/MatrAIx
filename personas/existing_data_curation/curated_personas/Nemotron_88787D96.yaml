  career_goals: Alexis aims to obtain the Certified Administrative Professional (CAP) credential and pursue a bachelor’s degree in business administration within the next two years. She aspires to transition
    into an Office Manager or Operations Manager role, where she can lead process‑optimization projects and oversee a team of administrative professionals. Long‑term, she envisions leveraging her expertise
    to support senior leadership in a nonprofit organization, aligning her career with her passion for community service and collaborative work environments.
