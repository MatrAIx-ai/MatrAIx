  career_goals: Anthony aims to earn an automotive technology certification within the next year and secure a position as a service technician at a local dealership or independent garage. He is also interested
    in pursuing a vocational certificate in project management to expand his ability to coordinate larger community events or work in logistics for a regional employer. Over the longer term, he hopes to
    launch a small side business offering home‑repair, landscaping, and handyman services, providing financial stability and the flexibility to support a future family. He wants to continue developing his
    leadership and stress‑coping skills while gaining steady, practical work experience.
