  career_goals: William aims to become a senior partner within his firm, leading the corporate litigation practice and expanding the firm’s client base in the Chicago metropolitan area. He seeks to mentor
    junior associates, establish a reputation for strategic wins in high‑stakes cases, and eventually launch a boutique firm focusing on predictable, high‑value corporate work that offers a better work‑life
    balance. He also desires to attain a position on the firm’s governance board and contribute to pro bono initiatives that address local community needs.
