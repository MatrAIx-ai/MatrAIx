personas:
  professional: Franklyn Michel, a 25‑year‑old business scholar and visual storyteller, leverages data analytics and hand‑drawn illustrations to redesign curricula that fuse design thinking with quantitative
    rigor, while they consult start‑ups to embed artistic experimentation into business models.
  sports: Franklyn Michel, an avid hiker of the Texas Hill Country, partners with the Austin Keep A Trail club and follows the Dallas Mavericks and the Texas Rangers, preferring solitary trail runs over
    team sports, and they occasionally join a local chess‑themed fitness group.
  arts: Franklyn Michel, a sketch‑and‑illustration enthusiast, draws inspiration from speculative fiction authors Octavia Butler and Neil Gaiman, listens to jazz legends Miles Davis and contemporary jazz‑soul
    artists Kamasi Washington and H.E.R., and they regularly survey solo exhibitions by Yayoi Kusama and Kerry James Marshall at small local galleries.
  travel: Franklyn Michel, a contemplative wanderer, has trekked Iceland’s basalt columns, explored the surreal salt flats of Uyuni, and they dream of strolling Kyoto’s zen gardens, balancing a modest travel
    fund and a demanding graduate schedule.
  culinary: Franklyn Michel experiments in the kitchen, mastering Szechuan peppercorn‑infused ramen, hand‑rolled gnocchi, and smoked brisket, often seasoning dishes with cilantro, sumac, and smoked paprika,
    and they improvise recipes inspired by sci‑fi narratives.
  core: Franklyn Michel is a quantum‑thinking business scholar who sketches ideas at midnight, hoards sketchbooks, worries about deadlines, and they find calm only on hilltop hikes.
background:
  cultural: Franklyn is a Black American who grew up in the Dallas‑Fort Worth metroplex, with family roots tracing back to the Southern United States. His upbringing blended mainstream Texan culture with
    rich African‑American traditions, such as church community gatherings, storytelling, and a deep appreciation for music ranging from gospel to hip‑hop. Living in Plano, a predominantly white suburb,
    he has navigated the nuances of cultural identity while maintaining strong ties to his heritage. He actively participates in local mentorship programs for Black youth, draws inspiration from contemporary
    Black artists, and values the entrepreneurial spirit that characterizes his community.
attributes:
  skills: '[''Business analytics'', ''Financial modeling'', ''Data visualization (Tableau, PowerBI)'', ''Statistical analysis (R, SPSS)'', ''Curriculum development'', ''Academic mentorship'', ''Public speaking'',
    ''Creative writing'', ''Graphic design (Adobe Illustrator)'', ''Digital illustration'', ''Python programming'']'
  hobbies: '[''Sketching'', ''Digital illustration'', ''Reading speculative fiction'', ''Philosophy'', ''Short story writing'', ''Chess'', ''Jazz listening'', ''Art gallery visits'', ''Hiking'', ''Cooking'']'
  career_goals: Franklyn aims to pursue a PhD in Business Administration with a focus on innovation and design thinking, eventually securing a tenure‑track faculty position where he can blend scholarly
    research with creative pedagogy. In the short term, he plans to develop interdisciplinary courses that integrate art, technology, and business strategy, and to launch a boutique consulting practice
    that helps startups embed design‑centered thinking into their models. He also aspires to become a mentor and advocate for underrepresented Black students in business, fostering a more inclusive academic
    environment.
