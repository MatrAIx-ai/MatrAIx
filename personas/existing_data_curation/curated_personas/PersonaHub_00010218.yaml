persona_description: A dental researcher who specializes in the study of the Sonic hedgehog signaling pathway in tooth development and its role in the formation of tooth roots. She is particularly interested
  in the molecular mechanisms underlying the regulation of epithelial proliferation and cell survival in the developing tooth germ and the signaling centers involved in the formation of enamel knots and
  odontoblast differentiation. Her research is focused on understanding the genetic input to phenotypic variation in molar intercuspal dimensions and the role of genetic factors in the development of teeth
  and their associated diseases.
