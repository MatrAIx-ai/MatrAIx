personas:
  professional: Jean Baxter is a 23‑year‑old mechanical engineer from a close‑knit Alabama town who merges hands‑on CAD and CNC machining with a relaxed, improvisational workflow, and they routinely apply
    lean principles to improve small‑scale prototypes while mentoring fellow makers at the local maker space.
  sports: Jean Baxter is an avid outdoors enthusiast who spends Saturdays fishing at local ponds and trekking the nearby Appalachian foothills, they cheer for the Alabama Crimson Tide, the Atlanta Falcons,
    and the New Orleans Pelicans, and they belong to the Jackson County Hiking Club that meets monthly for trail clean‑ups.
  arts: Jean Baxter enjoys sci‑fi literature and indie game soundtracks, they frequently quote Isaac Asimov and are a fan of the ambient scores from the game “Mass Effect,” and they unwind listening to
    the soulful blues of St. Paul and the Broken Bones and the country storytelling of Chris Stapleton.
  travel: Jean Baxter prefers spontaneous road trips that blend work and leisure, they have explored the historic streets of Savannah, the vibrant eateries of New Orleans, and the scenic Blue Ridge Parkway,
    and they dream of a future tech‑tour of Japan’s robotics hubs and a winter hike in Iceland’s volcanic terrain.
  culinary: Jean Baxter loves twisting classic Southern comfort food, they regularly serve bourbon‑glazed BBQ chicken with a side of collard‑green risotto, and they relish cooking with fresh thyme, smoked
    paprika, and a splash of hot sauce on a well‑seasoned cast‑iron skillet.
  core: Jean Baxter balances a laid‑back Southern charm with a fierce curiosity for drones and robotics, they thrive on hands‑on problem‑solving, yet their habit of leaving tools scattered on the workbench
    reveals a charmingly disorganized streak.
background:
  cultural: Jean grew up in a modest, white, southern family in Elmore, Alabama, where community ties and self‑reliance were emphasized. Influenced by the region’s emphasis on hospitality, church gatherings,
    and a love for outdoor activities like fishing and hiking, she values practical problem‑solving and a laid‑back approach to life. Her upbringing in a small‑town setting fostered a strong work ethic,
    a respect for tradition, and an appreciation for the blend of curiosity and pragmatism that characterizes her personal and professional outlook.
attributes:
  skills: '[''Mechanical design (SolidWorks, AutoCAD)'', ''CNC machining'', ''Microcontroller programming (Arduino, Raspberry Pi, Python, C++)'', ''Industrial equipment troubleshooting'', ''Lean manufacturing
    and process improvement'', ''Project coordination and team leadership'']'
  hobbies: '[''DIY drone building and flying'', ''Robotics tinkering'', ''Home automation projects'', ''Hiking and spontaneous road trips'', ''Cooking Southern cuisine with experimental twists'', ''Reading
    sci‑fi novels'', ''Playing strategy video games'', ''Mentoring at local maker space'']'
  career_goals: Jean aims to become a senior mechanical engineer within the next five years, leading design projects that incorporate sustainable materials and advanced automation. She plans to earn her
    Professional Engineer (PE) license and eventually head a product‑development team at a regional manufacturing firm or launch her own boutique startup that creates modular, eco‑friendly housing components.
    Her competitive drive pushes her to win industry design competitions and secure patents for innovative solutions.
