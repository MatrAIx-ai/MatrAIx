  career_goals: Approaching retirement, Jesse aims to codify his decades of operational knowledge into a mentorship program for emerging supervisors, improve the plant’s safety record to achieve zero‑incident
    status, and implement sustainable production practices that reduce waste. He hopes to be promoted to plant manager within the next two years to oversee broader strategic initiatives, and after stepping
    down he plans to consult locally for small manufacturing firms while volunteering as a safety trainer at the community college.
