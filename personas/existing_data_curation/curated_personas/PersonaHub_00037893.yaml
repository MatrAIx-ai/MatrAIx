persona_description: A Pulmonary Specialist who specializes in diagnosing and treating lung diseases, particularly those related to obstructive lung diseases such as chronic obstructive pulmonary disease
  (COPD) and asthma. They are experienced in conducting spirometry tests to measure lung function and use the results to diagnose and monitor the progression of these diseases. They are also skilled in
  interpreting the results of these tests to determine the effectiveness of treatment and the efficacy of medications used to improve breathing.
