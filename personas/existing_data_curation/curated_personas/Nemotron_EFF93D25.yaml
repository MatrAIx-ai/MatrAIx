  career_goals: Luis dreams of turning his love for art and technology into a future career. He aspires to become a graphic novelist or video game designer, creating worlds that blend visual art, narrative,
    and interactive elements. He also imagines studying architecture or industrial design to bring his imaginative concepts into tangible forms. In the longer term, he hopes to share his cultural heritage
    through his work, perhaps illustrating stories that celebrate Mexican traditions while resonating with diverse audiences.
