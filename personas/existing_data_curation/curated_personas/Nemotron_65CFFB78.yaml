  career_goals: Lany aims to progress from senior engineer to staff engineer and eventually an engineering leadership role where she can shape technical strategy and cultivate inclusive, high‑performing
    teams. She wants to champion cloud‑native architecture and AI‑augmented development tools within her organization while maintaining a focus on delivering reliable, customer‑centric products. Over the
    next five years, she plans to earn an AWS Solutions Architect Professional certification, contribute to open‑source projects related to developer productivity, and mentor underrepresented groups—particularly
    Spanish‑speaking women—in tech. Long‑term, she envisions launching her own startup that leverages AI to streamline collaborative coding workflows.
