personas:
  professional: Dinah Duplessis, a budding home‑based horticultural consultant and textile artisan, leverages her meticulous budgeting, carpentry know‑how, and community‑development studies to launch a
    modest venture offering garden design advice and handcrafted quilts while volunteering as a senior‑center counselor.
  sports: Dinah Duplessis, a devoted fan of the Atlanta Falcons, enjoys watching the Georgia Bulldogs football games with her book club, participates in the local senior center's weekly walking group, and
    tends to skip intense workouts, preferring gentle bird‑watching hikes and occasional community softball matches with neighbors.
  arts: Dinah Duplessis, an admirer of historic novels by Hilary Mantel and the soulful melodies of Dolly Parton, regularly attends the community theater’s performances of classic Southern plays, and draws
    inspiration for her quilting patterns from the paintings of Winslow Homer.
  travel: Dinah Duplessis, who favors low‑key, heritage‑focused trips, has explored historic Savannah, strolling the squares and sampling local cuisine, dreams of visiting Edinburgh’s Royal Botanic Garden,
    and often plans weekend getaways to nearby state parks for birdwatching.
  culinary: Dinah Duplessis, a passionate home cook, perfects Southern classics like shrimp‑and‑grits, collard greens with smoked turkey, and pecan pie, while experimenting with heirloom tomatoes, fresh
    thyme, and wild mushrooms from her garden to create farm‑to‑table meals.
  core: Dinah Duplessis, a 48‑year‑old organized and curiosity‑driven caretaker, deftly balances gardening, quilting, and community service, yet often gets lost in genealogy rabbit holes and hoards coupons
    like treasure.
background:
  cultural: Dinah is a white Southern woman with deep roots in rural Georgia, growing up in a modest, church‑centered household in Chester, Bleckley County. Her family name, Duplessis, hints at French‑Canadian
    ancestry, which she honors through occasional cultural celebrations and a love for preserving family stories. The Southern tradition of hospitality, community service, and respect for the land shapes
    her values, and she maintains a strong sense of regional identity through participation in local festivals, church activities, and preservation of community heritage.
