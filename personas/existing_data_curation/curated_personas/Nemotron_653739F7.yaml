  hobbies: '["Reading historical novels", "Botanical gardening", "Knitting scarves and blankets", "Genealogy research", "Cooking Southern cuisine", "Birdwatching", "Small book club gatherings", "Volunteering
    at church outreach programs"]'
  career_goals: While currently not part of the formal workforce, Dinah aspires to turn her horticultural knowledge and crafting abilities into a modest home‑based venture, offering handcrafted quilts and
    garden consulting to neighbors. She also hopes to complete her college coursework in community development, enabling her to take on a leadership role in the local historical society. Ultimately, she
    seeks to blend her love of practical service with her curiosity by mentoring younger volunteers and preserving regional heritage.
