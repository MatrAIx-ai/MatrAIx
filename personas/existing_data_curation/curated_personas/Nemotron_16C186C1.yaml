  hobbies: '[''Watercolor painting'', ''Sketching'', ''Digital illustration'', ''Hiking'', ''Photography'', ''Reading graphic novels'', ''Board games'', ''Community art volunteering'']'
  career_goals: Leigh aims to advance from entry‑level packing to a supervisory or logistics‑coordination role within the next three to five years. She plans to enroll in an associate’s degree program in
    supply chain management or logistics while continuing to work, to deepen her understanding of warehouse optimization and sustainable packaging practices. In the long term, she hopes to blend her creative
    interests with her logistics expertise by becoming a packaging designer focused on eco‑friendly solutions for consumer goods. She also aspires to travel to major art capitals such as New York, Paris,
    and Berlin to study contemporary design trends and bring innovative ideas back to her work in Minnesota.
