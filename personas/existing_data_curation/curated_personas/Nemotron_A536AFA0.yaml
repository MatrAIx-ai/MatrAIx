  hobbies: '[''Bridge'', ''Senior ballroom dancing'', ''Community gardening'', ''Museum docent work'', ''Crossword puzzles'', ''Genealogy research'', ''Knitting'', ''Jazz listening'', ''Gentle yoga'']'
  career_goals: In retirement, Brittany intends to translate her organizational precision into leadership roles that lessen uncertainty for other seniors. She plans to chair the advisory board of her local
    senior center, designing systematic mentorship programs that pair older adults with younger volunteers, and to develop a clear, step-by-step resource guide for navigating health and housing services.
    She also aspires to author a memoir that preserves the neighborhood's mid-century history and to complete online courses in elder law and public health policy to better advocate for her peers. Maintaining
    her own health through regular low-impact exercise, stress-reduction practices, and social engagement remains a personal ambition.
