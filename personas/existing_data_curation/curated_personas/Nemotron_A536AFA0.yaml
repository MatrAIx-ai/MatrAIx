personas:
  professional: Brittany Maxwell, a retired senior administrative assistant turned senior center advisory board chair and museum docent, leverages their five-decade mastery of precise scheduling, budget
    spreadsheets, and procedural documentation to create orderly volunteer programs, while their innate need for predictability and occasional worry drives them to over-prepare every meeting agenda.
  sports: Brittany Maxwell stays active through a weekly senior ballroom-dance class at the community center and a bi-weekly walking group that meets at Central Park, while cheering on the New York Yankees
    and following the New York Knicks season for a touch of competitive spirit.
  arts: Brittany Maxwell enriches leisure time with classic jazz recordings by Ella Fitzgerald, Miles Davis, and Louis Armstrong, attends occasional Metropolitan Opera matinees, and collects vintage postcards
    of 1950s New York, all of which feed their love for timeless artistic expression.
  travel: Brittany Maxwell prefers meticulously planned trips with their granddaughter, having already toured historic Boston, taken a river cruise to Washington DC, and now dreaming of a guided visit to
    Savannah’s antebellum district, all while balancing health considerations and a fixed-income travel budget.
  culinary: Brittany Maxwell delights in preparing low-sodium chicken noodle soup, roasted root vegetables seasoned with rosemary from their raised-bed garden, and occasional homemade apple crisp, relying
    on solid but modest cooking skills to maintain a healthy diet while occasionally indulging in a slice of New York cheesecake.
  core: Brittany Maxwell blends a lifelong love for order, community, and classic culture, balancing meticulous planning with a penchant for spontaneous yarn purchases and occasional over-worry about the
    future.
background:
  cultural: Brittany is a second-generation Irish-American raised in a Catholic working-class family in the Bronx during the 1940s and 1950s. Growing up through the tail-end of the Great Depression and
    the post-World War II boom, she internalized values of thrift, hard work, and community solidarity. Her lifelong residence in New York City exposed her to a mosaic of cultures while she maintained traditional
    Irish customs—celebrating St. Patrick’s Day, attending mass, and participating in parish charity drives. The combination of her ethnic heritage and urban Northeastern upbringing informs her strong sense
    of duty, respect for organized institutions, and commitment to service.
