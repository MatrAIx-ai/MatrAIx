personas:
  professional: Elizabeth Ford, a 26-year-old aspiring art historian and teaching assistant, combines their methodical organization, relentless curiosity, and competitive drive to produce rigorously researched
    scholarly articles, design interdisciplinary digital humanities courses, and actively chase research grants that could pave the way to a tenure-track professorship.
  sports: Elizabeth Ford, a 26-year-old outdoor enthusiast, spends weekends hiking the Lake Michigan shoreline with the Lake Michigan Trail Hikers club, joins a local co-ed softball league in summer, and
    follows Detroit's professional teams - the Lions, Pistons, and Tigers - while maintaining a disciplined, competence-driven training routine that balances their academic workload.
  arts: Elizabeth Ford, a 26-year-old watercolourist and frequent visitor to local galleries, draws inspiration from Claude Monet, Ai Weiwei, and photographer Sally Mann, regularly attends open-mic poetry
    nights featuring spoken-word artists such as Sarah Kay while listening to Bon Iver, and channels their competitive curiosity into interdisciplinary projects that merge analog photography with digital
    media.
  travel: Elizabeth Ford, a 26-year-old who alternates meticulously planned art-focused European trips to Paris, Florence, and Amsterdam each summer with weekend getaways to Midwest gems like Mackinac Island
    and Door County, favors a blend of cultural immersion and leisurely wine tasting, and they balance travel budgets through smart use of student discounts and early-bird airfare deals.
  culinary: Elizabeth Ford, a 26-year-old vegetarian home chef, adores crafting wild mushroom risotto with locally foraged chanterelles, plus a seasonal roasted beet and goat-cheese salad drizzled with
    balsamic reduction, often pairing these dishes with a glass of Pinot Noir from Chateau Grand Traverse, and they occasionally treat themselves to cheese boards featuring artisanal brie and aged cheddar.
  core: Elizabeth Ford, a 26-year-old art-history scholar with a competitive streak, balances methodical research and relentless curiosity with a quirky habit of amassing an ever-growing collection of watercolour
    tubes, an occasional habit of over-booking weekend hikes, and a tendency to double-check every grant deadline while forgetting to floss, and they often laugh at their own perfectionism.
background:
  cultural: Elizabeth hails from a middle‑class white Midwestern family with English and Irish ancestry. Raised in the Great Lakes region, she grew up amidst the seasonal cycles, community festivals such
    as the Cherry Festival, and a vibrant local arts scene. Her upbringing emphasized education, civic involvement, and a deep appreciation for nature and the arts, shaping her values of curiosity, reliability,
    and thoughtful competition. While identifying with mainstream American culture, she remains attentive to cultural diversity and strives to incorporate inclusive perspectives into her academic and community
    work.
attributes:
  skills: '["Art history research", "Critical theory analysis", "Academic writing", "Curriculum design", "Classroom facilitation", "Digital media production", "Project management", "Data organization",
    "Public speaking", "Interdisciplinary collaboration"]'
  hobbies: '["Watercolor painting", "Visiting art galleries", "Lake Michigan shoreline hiking", "Open mic poetry nights", "Reading modern philosophy", "Analog photography", "Strategic board games", "Volunteering
    at community art center", "Traveling to European art capitals", "Wine tasting and vegetarian cooking"]'
  career_goals: Elizabeth aims to pursue a Ph.D. in Art History with a focus on contemporary visual culture, ultimately securing a tenure‑track professorship at a liberal arts college where she can blend
    teaching with research. She envisions developing interdisciplinary digital humanities projects that merge art, technology, and community engagement, curating traveling exhibitions, and authoring a monograph
    on emerging art movements. Additionally, she hopes to lead a regional museum or cultural center in the Great Lakes area, obtain research grants, and establish a nonprofit dedicated to bringing accessible
    arts programming to underserved communities in Traverse City.
