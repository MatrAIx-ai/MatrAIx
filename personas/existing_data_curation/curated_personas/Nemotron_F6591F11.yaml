  career_goals: Margaret aims to channel her curiosity and disciplined work ethic into a future career in scientific research. She hopes to win a regional science fair with a project on local ecosystems,
    ultimately aspiring to become a marine biologist or environmental scientist who combines field work with data analysis. She also envisions studying engineering to design sustainable solutions for her
    community.
