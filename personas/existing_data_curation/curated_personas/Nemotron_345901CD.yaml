  career_goals: Anthony aims to advance from industrial production manager to plant manager within the next three years, positioning himself as the operational leader of a mid‑size manufacturing facility
    in the Midwest. He plans to earn a professional engineering (PE) license and obtain a PMP certification to broaden his strategic project‑management credentials. His long‑term ambition is to become a
    director of operations or VP of manufacturing, where he can champion company‑wide digital transformation initiatives, embed a culture of lean excellence, and mentor the next generation of production
    leaders. He also envisions launching a boutique consulting practice focused on helping small and medium manufacturers adopt sustainable, data‑driven production processes, leveraging his network of industry
    contacts and his reputation for practical innovation.
