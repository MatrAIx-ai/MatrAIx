persona_description: A researcher and psychologist who studies auditory processing in children, particularly the effects of masking on speech recognition in school-age children. She has conducted studies
  on the benefits of a forced-choice context for speech recognition and the impact of masker type on this effect. She is interested in understanding how young children process speech in a noisy environment
  and how this knowledge can be applied to improve teaching and learning strategies.
