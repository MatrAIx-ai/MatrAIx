background:
  cultural: Darwin is a child of Southeast Asian descent, with parents whose roots trace back to Vietnam and the Philippines. Raised in Aiea, Hawaii, he grows up in a multicultural environment where Hawaiian
    traditions, Asian family customs, and broader American influences intersect. He is exposed to bilingual language use—English alongside Vietnamese and Tagalog—traditional foods such as pho, lumpia, and
    Hawaiian plate lunches, and community celebrations like Tet, Lunar New Year, and local Hawaiian festivals. This rich cultural tapestry shapes his artistic sensibilities, his appreciation for varied
    experiences, and his sense of community.
