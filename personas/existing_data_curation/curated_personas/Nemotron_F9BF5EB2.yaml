  career_goals: Francis dreams of a future where his curiosity for how things work meets his desire to help others. He aims to become an engineer or scientist who designs practical solutions, such as building
    bridges or inventing eco‑friendly gadgets. He is also fascinated by emergency services and imagines a career as a firefighter or wildlife rescue worker. At his age, his ambitions focus on exploring
    science experiments, joining robotics or science clubs, and eventually pursuing a profession that lets him solve real‑world problems while collaborating with a team. He also harbors a playful ambition
    to excel in athletics, hoping one day to play soccer at a competitive level.
