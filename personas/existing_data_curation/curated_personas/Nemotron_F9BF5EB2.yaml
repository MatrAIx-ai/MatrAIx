personas:
  professional: An aspiring young scientist, Francis To blends his love for intricate LEGO builds with hands‑on experiments in the school science club, and they often organize peers to design simple water‑filter
    prototypes, demonstrating a balance of curiosity, practicality, and a competitive drive to out‑engineer classmates.
  sports: A spirited team athlete, Francis To shines on the field with the Tigers Youth Soccer Club and at bat for the school’s baseball league, cheering on the New York Yankees and Manchester United, and
    they schedule weekend pick‑up games around schoolwork, preferring group drills over solitary practice.
  arts: A budding digital creator, Francis To crafts Scratch animations inspired by the whimsical style of The LEGO Movie and the rhythmic beats of Billie Eilish, and they spend weekends sketching fan art
    of Marvel’s Spider‑Man, blending electronic storytelling with traditional drawing.
  travel: An eager explorer, Francis To has trekked the red rock trails of Red Rock Canyon, camped under the stars at Yosemite, and dreams of visiting the ancient ruins of Machu Picchu, planning trips with
    family using color‑coded maps and a spreadsheet, yet they sometimes protest long car rides.
  culinary: A kitchen enthusiast, Francis To whips up spaghetti bolognese with fresh tomatoes, basil, and mozzarella, loves crafting pepperoni pizza slices shaped like LEGO bricks, and they especially relish
    mango salsa on tacos, while occasional midnight chocolate bar binges reveal a sweet tooth.
  core: Francis To is a curiosity‑driven 10‑year‑old who merges LEGO engineering, soccer tactics, and a competitive spirit, yet they often battle impatience when losing and hoard coins for the next big
    set.
background:
  cultural: Francis was raised in a typical Midwestern American environment in Sioux Falls, South Dakota. His family’s heritage is primarily Northern European, and cultural traditions emphasize community,
    self‑reliance, modesty, and respect for nature. He lives in a suburban neighborhood where school events, local sports, and church gatherings are central to community life. Seasonal customs include summer
    barbecues, attending the county fair, and winter snow play. Values such as hard work, politeness, and participation in community service are woven into his upbringing, giving him a strong sense of shared
    identity and regional pride.
