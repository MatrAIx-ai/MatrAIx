  hobbies: '[''Reading speculative fiction'', ''Acrylic painting'', ''Photography'', ''Art and education blogging'', ''Visiting local galleries'', ''Attending experimental theater performances'', ''Playing
    chess'', ''Gardening'', ''Woodworking'']'
  career_goals: Although retired from formal teaching, Derick aims to channel his curiosity and competitive spirit into tangible creative achievements. He plans to publish a collection of short stories
    that blend speculative ideas with personal reflections, and to curate a community art exhibition featuring local seniors. He also hopes to launch a volunteer‑run art‑and‑literacy program for older adults
    in Perrysburg, positioning himself as a mentor for younger educators and emerging artists. In the longer term, he aspires to win a regional art contest, gain recognition for his digital illustrations,
    and complete a memoir that captures his lifelong love of novelty and learning.
