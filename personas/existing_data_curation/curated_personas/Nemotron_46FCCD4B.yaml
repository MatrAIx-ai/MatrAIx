  career_goals: Although retired from formal employment, Eugene’s ambition is to become a catalyst for cultural enrichment in Lockport. He plans to launch a senior‑led arts workshop series that introduces
    photography, painting, and storytelling to the neighborhood, while also volunteering as a liaison between the senior center and local schools to mentor at‑risk teens. He hopes to travel to several historically
    Black museums and art festivals across the Midwest, and ultimately compile a memoir that weaves together his personal history with the broader story of the Black community in Will County.
