  career_goals: Inspired by her curiosity about how things work and her love for orderly design, Carmen dreams of becoming an engineer or architect when she grows up. She envisions building structures that
    are both beautiful and functional, and she is already practicing by drawing detailed floor plans of her dollhouse. Her competitive streak fuels a desire to excel in science fairs and math competitions,
    and she plans to keep her high standards to eventually lead projects that improve her community.
