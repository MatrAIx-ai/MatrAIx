personas:
  professional: Carmen Moreno, a budding little architect who loves building LEGO sets with precise instructions, channels their exceptional organization and discipline into meticulously planning each construction,
    balancing curiosity about new designs with practical step‑by‑step execution, and they eagerly dream of designing structures one day.
  sports: Carmen Moreno, a spirited fan of soccer who cheers for Los Angeles FC and follows the Bakersfield Youth Soccer Club, plays organized soccer in the spring, attends after‑school gymnastics for agility,
    and idolizes the Los Angeles Dodgers as a summer baseball pastime, balancing competitive drive with structured team activities, and they love sprint drills that test speed.
  arts: Carmen Moreno, who delights in the lively sounds of Mariachi Vargas de Tecalitlán and the animated melodies of The Wiggles, frequently sings Spanish rhymes like “La Cucaracha,” enjoys drawing colorful
    scenes inspired by Frida Kahlo’s vibrant palettes, and they channel creative energy into assembling LEGO masterpieces and puzzling over intricate jigsaw images.
  travel: Carmen Moreno, who loves family road trips, has visited Disneyland in Anaheim and attended local community festivals, dreams of exploring the ancient pyramids of Teotihuacan, and they prefer planning
    trips with crayons and stickers while navigating the budget constraints set by parents.
  culinary: Carmen Moreno, a budding kitchen assistant, expertly rolls tortillas, garnishes tacos with cilantro, lime, and salsa verde, enjoys making guacamole and chilaquiles, and they savor sweet churros
    dusted with cinnamon sugar, though they occasionally over‑salt dishes in eager experimentation.
  core: Carmen Moreno, a fiercely organized six‑year‑old with a love for LEGO precision, disciplined allowance management, seasonal allergies, and lively mariachi rhythms, balances curiosity and practicality
    while occasionally splurging on sweets and forgetting to wash hands, and they approach each new challenge with a competitive spark.
background:
  cultural: Carmen comes from a Mexican‑American family rooted in Bakersfield’s vibrant Latino community. She speaks both English and Spanish at home, celebrates holidays such as Día de los Muertos, Las
    Posadas, and Mexican Independence Day, and participates in community festivals that feature traditional music, dance, and food. Her family values respect for elders, close familial ties, and the sharing
    of cultural stories, which shape her identity and daily life.
