  hobbies: '[''Gardening'', ''Korean cooking'', ''Reading historical non-fiction'', ''Walking in local parks'', ''Attending Korean cultural festivals'', ''Digital photography'', ''Playing Go'', ''Volunteer
    work at senior center'']'
  career_goals: Dong Ho aspires to remain active in his community by mentoring younger Korean‑American volunteers, documenting family recipes and stories in a small memoir, and expanding his digital literacy
    to capture and share his garden and cooking experiences through a personal blog. He hopes to travel to South Korea to visit his extended family and attend cultural festivals, while also learning a simple
    coding skill to create a family genealogy website. He seeks to maintain his health and independence, setting modest fitness goals such as regular walks and gardening, and to continue contributing his
    practical expertise to neighborhood improvement projects.
