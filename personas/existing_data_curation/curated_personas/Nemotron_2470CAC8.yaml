  career_goals: In retirement, Robert aims to apply his organizational acumen to enrich Greenville’s cultural life. He plans to serve on the board of the local arts council, launch a community oral‑history
    project, mentor nonprofit leaders, and author a series of essays on art and local history. He also aspires to travel to major museums and share his experiences with school groups, while supporting initiatives
    that preserve regional heritage.
