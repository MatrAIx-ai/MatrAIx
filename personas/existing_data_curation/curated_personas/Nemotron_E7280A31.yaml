personas:
  professional: Ok Li, an aspiring IT support specialist with an associate's degree in Computer Information Systems, combines practical Python and JavaScript scripting, hands‑on hardware troubleshooting,
    and bilingual communication to calmly resolve user tickets, though their relaxed approach sometimes leaves the ticket queue a bit untidy.
  sports: Ok Li, a solitary yet nature‑loving hiker, spends weekends exploring the trails of Stone Mountain Park and the Appalachian foothills with the Georgia Trailblazers Hiking Club, follows the Atlanta
    Falcons (NFL) and Atlanta Hawks (NBA) for a dose of city sports, and occasionally joins a local pick‑up soccer game despite a generally relaxed fitness routine.
  arts: Ok Li, a quiet digital illustrator, draws inspiration from Studio Ghibli’s Hayao Miyazaki and the pixel art of indie game 'Celeste,' while losing themselves in lo‑fi playlists by Nujabes and J Dilla
    and devouring speculative novels like Neuromancer and 'The Three‑Body Problem,' shaping both their creative projects and their personal aesthetic.
  travel: Ok Li, an introverted explorer, prefers spontaneous solo trips to natural retreats such as the Great Smoky Mountains and Japan’s Kyoto, often planning on the fly using budget airline deals, while
    keeping a bucket‑list that includes a culinary pilgrimage to Taiwan’s night markets and a weekend getaway to Savannah’s historic squares.
  culinary: Ok Li, a budding home chef, experiments with traditional Asian dishes like mapo tofu, char siu pork, and hand‑rolled jiaozi, mastering the balance of soy sauce, ginger, and Sichuan peppercorns,
    yet frequently forgets to clean the kitchen after cooking while enjoying lo‑fi beats as background.
  core: Ok Li, a curious yet laid‑back 21‑year‑old tech enthusiast, quietly balances solitary creative pursuits with a gentle drive toward a future in IT and a budding online food venture, all while occasionally
    forgetting to tidy up after a gaming marathon.
background:
  cultural: Ok was born to Chinese immigrant parents and raised in a bilingual household in Norcross, Georgia. He celebrates cultural traditions such as Chinese New Year and the Mid‑Autumn Festival, and
    maintains close ties with the local Asian community. The emphasis his family places on education, respect for elders, and collective harmony shapes his cooperative and considerate demeanor. While he
    identifies as American, he navigates a bicultural identity, blending Eastern values of modesty and group cohesion with Western individualism and curiosity.
