  career_goals: In the short term, Ok aims to secure an entry‑level IT support or help‑desk position where he can apply his troubleshooting and communication skills while continuing to learn new technologies.
    Over the next few years, he plans to pursue a bachelor's degree in computer science or information technology and earn certifications such as CompTIA A+ and Network+. His long‑term ambition is to transition
    into a system administrator or junior developer role, and eventually launch a small online venture that blends his technical abilities with his cultural heritage, such as an e‑commerce platform for
    Asian food products.
