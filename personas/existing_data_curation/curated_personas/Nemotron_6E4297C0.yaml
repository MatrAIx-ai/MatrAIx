  career_goals: Gladys aims to transition into a supervisory role within the fabrication shop, leveraging her methodical work style to lead a small team focused on efficiency and quality. She plans to earn
    certifications in CNC programming and advanced welding to broaden her technical repertoire. Long‑term, she envisions launching a side venture that creates custom decorative metal art for local businesses
    and community spaces, blending her assembly expertise with her artistic interests. Mentoring younger workers and fostering a culture of continuous improvement also rank high on her professional aspirations.
