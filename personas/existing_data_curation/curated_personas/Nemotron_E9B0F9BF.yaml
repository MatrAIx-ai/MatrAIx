  career_goals: Chang aims to advance from a server to a supervisory role within a vibrant, art‑centric restaurant, using his hospitality background and artistic interests to influence concept development.
    In the next five years he plans to enroll in a bachelor’s program in Hospitality Management and eventually open his own boutique café that fuses Korean flavors with local contemporary art exhibits.
    He also envisions leveraging his outgoing personality to coordinate cultural events and festivals, positioning himself as a bridge between culinary and artistic communities.
