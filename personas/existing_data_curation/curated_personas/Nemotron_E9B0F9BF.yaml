personas:
  professional: Chang Kim is a front‑of‑house specialist at a bustling art‑centric bistro, and they leverage polished POS expertise, talent for smoothing customer conflicts, and a love of visual storytelling
    to craft memorable dining experiences while charting a path toward opening a boutique café that fuses Korean flavors with contemporary art exhibits.
  sports: Chang Kim enjoys weekend hikes in the Santa Monica Mountains, and they join a casual LA Lakers fan club for basketball viewings, play pick‑up soccer while sporting a LA Galaxy jersey, and occasionally
    attend beach‑volleyball meetups, though their laid‑back attitude sometimes leads to missed gym sessions.
  arts: Chang Kim explores LA’s contemporary art scene through gallery hops featuring works by Kara Walker and Shepard Fairey, captures street moments with a Leica M camera while channeling the aesthetic
    of photographer Nan Goldin, and fuels weekend nights with indie performances by Tame Impala, Phoebe Bridgers, and the local experimental collective Hobo Noise, and they always seek fresh visual inspiration.
  travel: Chang Kim loves spontaneous weekend wanderings, and they often jet‑set to Seoul for authentic kimchi‑filled night market snacks, road‑trip to Santa Barbara for beach picnics, and dream of an art‑focused
    tour of Barcelona, all while balancing a modest server’s salary with occasional indie‑music festival splurges.
  culinary: Chang Kim enjoys experimenting in the kitchen, and they whip up kimchi‑fried rice with avocado and quinoa, craft bulgogi‑tacos topped with gochujang mayo and California micro‑greens, and perfect
    a fermented kimchi stew that balances spicy pepper flakes with fresh citrus zest, though occasional burnt‑onion mishaps remind them of the learning curve.
  core: Chang Kim blends restless curiosity for art and flavor with a laid‑back, occasionally chaotic approach to planning, often juggling multiple side projects while forgetting to refill their coffee
    cup, yet they consistently show up with a warm smile and a fresh idea for the next cultural event.
background:
  cultural: Chang is a second‑generation Korean‑American raised in Southern California. His household blended Korean traditions—such as celebrating Chuseok, preparing kimchi, and speaking Korean at the
    dinner table—with the eclectic, multicultural environment of Thousand Oaks. This bicultural upbringing instilled respect for communal values, a strong work ethic, and a love for both Korean cuisine
    and the diverse art scene of the West Coast, shaping his personal identity and professional aspirations.
