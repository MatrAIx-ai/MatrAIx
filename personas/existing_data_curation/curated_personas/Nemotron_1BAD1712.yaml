  career_goals: Although retired from formal employment, Rachel aims to deepen her impact on the Mansfield community. She plans to spearhead a senior‑center mentorship program that pairs experienced seniors
    with younger adults seeking career guidance, using her organizational talents and competitive drive to set measurable outcomes. Rachel also aspires to launch a community oral‑history archive, collecting
    and curating stories from longtime residents, which satisfies her curiosity while preserving local heritage. A long‑term ambition is to secure a position on the board of the regional food‑bank, where
    she can influence policy, improve efficiency, and champion transparent, evidence‑based decision making. Finally, she hopes to author a memoir that intertwines her personal genealogy with broader Midwestern
    narratives, offering both personal fulfillment and a resource for future generations.
