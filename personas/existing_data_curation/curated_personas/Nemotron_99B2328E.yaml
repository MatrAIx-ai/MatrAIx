  hobbies: '[''Hiking and birdwatching'', ''Reading true‑crime and historical mystery books'', ''Genealogy research'', ''Cooking New England seafood dishes'', ''Woodworking and furniture restoration'',
    ''Playing piano in a small community ensemble'', ''Volunteer card‑game facilitator at a senior center'', ''Member of a local non‑fiction book club'', ''Coastal landscape photography'', ''Gardening a
    vegetable plot'']'
  career_goals: Jillian aims to secure a promotion to sergeant within the next two years, focusing on leading a detective squad or a community‑relations unit that leverages her systematic mindset. She intends
    to formalize a mentorship program for newer officers, particularly women, and to complete an associate’s degree in criminal justice to complement her practical knowledge. Long‑term, she envisions a
    smooth transition to a part‑time advisory role, such as a security consultant for local businesses or a trainer for the state police academy, while staying active in neighborhood‑watch and volunteer
    initiatives.
