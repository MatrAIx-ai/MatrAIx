personas:
  professional: Jillian Maples is a veteran police officer with over three decades of patrol and investigative experience, renowned for their methodical evidence‑based approach, meticulous report writing,
    crisis de‑escalation skill, and data‑driven resource allocation, now targeting a sergeant promotion to lead a detective squad while mentoring newer officers, especially women, with a competitive drive
    and a healthy dose of skepticism toward unverified intel.
  sports: Jillian Maples is an avid hiker of Bellingham’s coastal trails, a seasonal bird‑watching enthusiast, and a devoted fan of the Seattle Seahawks and Seattle Kraken, regularly participates in the
    local Bellingham Hiking Club and joins a friendly pick‑up volleyball game at the senior center, where their competitive streak surfaces in a good‑natured rivalry.
  arts: Jillian Maples is a community piano player who delights in interpreting Mozart’s sonatas, a landscape photographer inspired by Ansel Adams, and a true‑crime book club member who admires the works
    of Michael Connelly and the storytelling of the Seattle Symphony, weaving these artistic pursuits into a reflective personal rhythm.
  travel: Jillian Maples prefers solo road trips that blend photography and quiet reflection, having explored the San Juan Islands, the rugged Oregon coast, and dreaming of a New England lobster‑festival
    tour, always planning itineraries down to lodging, tide charts, and local birding hotspots.
  culinary: Jillian Maples delights in cooking classic New England clam chowder with fresh clams, diced potatoes, and cream, experiments with lobster rolls and baked haddock, and supplements meals with
    vegetables from their garden, though they sometimes over‑salt dishes and rely heavily on a well‑worn cast‑iron pot for most recipes.
  core: Jillian Maples, a 59‑year‑old methodical investigator and solitary hobbyist, balances a disciplined career with quiet passions for hiking, woodworking, and piano, yet can be skeptical and fiercely
    competitive, even as they savor a daily cup of black coffee.
background:
  cultural: Jillian comes from a multigenerational New England family that settled in the Norfolk County region in the early 20th century. Her heritage blends English and Irish ancestry, and she was raised
    in a middle‑class, small‑town environment that prized self‑reliance, civic duty, and community participation. Local customs—such as town meetings, honoring veterans on Memorial Day, and seasonal events
    like clam bakes—have shaped her sense of belonging. While she respects the traditional holidays of her upbringing (Thanksgiving, Independence Day, and Christmas), she also values the modest, pragmatic
    ethos of the region, which informs both her personal life and her approach to policing.
attributes:
  skills: '[''Patrol operations'', ''Investigative interviewing'', ''Evidence collection and preservation'', ''Crisis de‑escalation'', ''Report writing'', ''Data‑driven crime analysis'', ''Firearms proficiency'',
