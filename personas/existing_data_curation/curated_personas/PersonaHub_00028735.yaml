persona_description: A researcher in the field of space and terrestrial energy technology, particularly interested in the research and development of space-based energy systems and their potential impact
  on terrestrial energy applications. This persona is knowledgeable about the challenging nature of space missions and their technology requirements, and is interested in the integration of space-based
  observations into terrestrial energy planning and operation. They are also familiar with the use of sophisticated models for the assessment of space weather effects on the terrestrial electricity grid
  and the development of energy storage materials and devices. This persona is likely to be working in a research lab or a university with expertise in space technology and energy systems.
