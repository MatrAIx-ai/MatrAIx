personas:
  professional: Jerry Haviland, a 72‑year‑old veteran construction manager, leverages four decades of blueprint mastery, BIM and LEED expertise, and a meticulous checklist‑driven style to mentor emerging
    managers while integrating artistic design into sustainable projects, and they balance assertive negotiation with calm, methodical planning.
  sports: Jerry Haviland, a lifelong fan of the Miami Dolphins and Miami Heat, spends spring mornings rowing with the Jupiter Yacht Club, sails the Intracoastal in summer, joins a weekend fishing crew for
    tarpon on the waterway, and keeps fit with low‑impact tai chi classes at the local Palm Beach senior center, viewing physical activity as a restorative extension of his outdoor artistry.
  arts: Jerry Haviland immerses himself in the Jupiter Museum of Art, regularly reproducing Monet’s water lilies in watercolor, photographing historic Florida homes with a nod to Edward Hopper’s framing,
    and unwinding to the mellow saxophone of John Coltrane, all of which inform his handcrafted furniture designs and community work.
  travel: Jerry Haviland favors low‑key, slow‑travel itineraries, revisiting the historic streets of St. Augustine and the art‑filled alleys of Santa Fe, while dreaming of a guided tour of the Tuscan countryside
    to study vernacular architecture, always booking modest eco‑lodges and timing trips around his garden’s blooming season.
  culinary: Jerry Haviland, an adept home cook, relishes grilling freshly caught grouper with a mango‑chili glaze, simmering stone crab legs in garlic butter, and infusing hibiscus tea with fresh lime,
    while they often toss garden‑harvested heirloom tomatoes into a simple pesto pasta, showcasing a taste for bright tropical flavors and modest culinary experimentation.
  core: Jerry Haviland, a 72‑year‑old construction veteran turned art‑loving gardener, balances meticulous project checklists with spontaneous watercolor splashes, still hoards a drawer of unused blueprints,
    and they occasionally forget to take their blood pressure medication after an afternoon fishing trip.
background:
  cultural: Jerry grew up in a middle‑class white American family in the Midwest during the post‑World War II era, where a strong work ethic, self‑reliance, and community responsibility were core values.
    His upbringing emphasized practical skills, respect for craftsmanship, and participation in neighborhood activities such as local fairs and church gatherings. After moving to Florida in his thirties,
    he absorbed the coastal lifestyle—enjoying beach outings, boat trips, and seasonal festivals—while retaining the traditional American holiday customs that shaped his identity. This blend of Midwestern
    roots and Floridian leisure informs his appreciation for sturdy, functional construction paired with an openness to the artistic and ecological influences that characterize the region.
