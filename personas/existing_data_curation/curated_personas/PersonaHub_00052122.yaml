persona_description: A cooperative expert who is interested in the strategies and practices used by agricultural cooperatives to maintain their markets, finance their activities, and mobilize member funds.
  They are knowledgeable about the legal framework and support available for cooperatives and have experience in improving member services and patronage. They are familiar with the benefits of member financing
  and how it builds sense of member ownership. They are also aware of the importance of improving operating efficiency and giving priority to mobilizing member funds.
