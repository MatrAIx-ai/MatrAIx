  career_goals: Jordan aims to transition from a line operator to a supervisory role within the next three to five years, targeting a shift‑manager position that lets him blend his technical skills with
    leadership responsibilities. He plans to earn an Associate’s degree in Environmental Technology and acquire certifications such as Certified Plant Operator (CPO) and OSHA Forklift/Heavy‑Equipment Training.
    A long‑term ambition is to champion sustainable upgrades at his facility—integrating renewable energy sources, implementing water‑reuse initiatives, and introducing smart‑monitoring systems that reduce
    both operational costs and environmental impact. He also hopes to develop a mentorship program for younger employees, especially those from underrepresented backgrounds, to foster a more inclusive and
    supportive workplace culture.
