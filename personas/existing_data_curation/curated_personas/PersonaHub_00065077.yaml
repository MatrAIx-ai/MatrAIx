persona_description: A historian who is interested in the history of Russia and its territories, particularly the Asian part of the Russian Empire. They are interested in the agrarian reforms of the time,
  including the establishment of the Resettlement Department of the Land Regulation and Agriculture Administration, and the efforts to assist peasants moving from densely populated areas in European Russia
  to sparsely populated places in Siberia and Central Asia. They are also interested in the development of Asiatic Russia and the cartography of the region.
