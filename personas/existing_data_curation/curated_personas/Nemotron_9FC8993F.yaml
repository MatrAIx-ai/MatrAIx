personas:
  professional: Nelly Perezrivera, a seasoned computer systems analyst with a background in education, leverages meticulous project management, bilingual communication, and a calm‑yet‑reactive mindset to
    translate complex educational technology needs into clear data models and user‑friendly training materials.
  sports: Nelly Perezrivera, an avid hiker of the Wasatch Mountains, also cycles with the American Fork Trail Club during summer, follows the Utah Jazz for basketball and supports Real Salt Lake in the
    MLS, and schedules weekly yoga sessions to balance high emotional reactivity with steady fitness.
  arts: Nelly Perezrivera finds artistic inspiration in the murals of Diego Rivera, the soulful ballads of Vicente Fernández, the contemporary storytelling of Guillermo del Toro’s film Pan’s Labyrinth,
    and the lyrical poetry of Maya Angelou, weaving these influences into her cooking and tutoring sessions.
  travel: Nelly Perezrivera prefers purposeful travel that blends adventure and cultural immersion, meticulously planning weekend trips to Utah’s Zion and Bryce Canyon while saving for a longer pilgrimage
    to Oaxaca, Mexico to explore indigenous markets and culinary traditions, all balanced against family commitments.
  culinary: Nelly Perezrivera is a confident home chef who masters the slow‑cooked complexity of mole poblano, the precise layering of masa in tamales, and the vibrant zing of fresh salsa verde made with
    jalapeños, cilantro, and toasted pumpkin seeds, often garnishing dishes with home‑grown oregano and lavender from her garden.
  core: Nelly Perezrivera blends analytical precision with high emotional sensitivity, channeling a competitive edge into tech leadership while habitually over‑planning weekend hikes and occasionally succumbing
    to late‑night puzzle marathons that delay bedtime.
background:
  cultural: Nelly’s Mexican heritage is a central part of her identity. Raised in a bilingual household, she grew up celebrating Día de los Muertos, Semana Santa, and other Mexican traditions, and she continues
    to prepare family recipes passed down through generations. Her Catholic upbringing instilled a sense of community and respect for family elders. Living in American Fork, Utah, Nelly has woven together
    Mexican customs with the local culture, participating in both Hispanic community events and Utah’s outdoor and volunteer traditions. She values education highly, a principle reinforced by both her Mexican
    family’s emphasis on learning and her own academic journey. This blend of cultures enriches her perspectives, allowing her to navigate multicultural workplaces with empathy and adaptability.
