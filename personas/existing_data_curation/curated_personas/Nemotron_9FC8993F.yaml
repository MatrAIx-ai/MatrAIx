  career_goals: Nelly aims to advance into a senior or lead analyst role where she can guide cross‑functional teams and shape technology strategy for educational institutions. She plans to earn certifications
    such as CBAP, PMP, and a Microsoft data analytics credential to solidify her expertise. Long‑term, she aspires to become a Director of Educational Technology, leveraging her dual background to drive
    digital transformation in K‑12 schools and community colleges. Nelly is also passionate about fostering inclusive workplaces; she intends to mentor emerging Latinx women in tech and champion mental‑health
    initiatives that provide resources for employees dealing with anxiety and stress.
