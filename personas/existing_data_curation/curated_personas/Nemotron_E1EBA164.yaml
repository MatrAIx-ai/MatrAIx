personas:
  professional: Susan Goodson, they apply their meticulous eye for detail and love of structured workflows as a medical records manager, leveraging expertise in Epic and Cerner to lead compliance initiatives,
    mentoring junior staff with the same gentle, community‑service ethos cultivated at their local Lutheran church, while balancing high emotional reactivity with disciplined self‑care routines.
  sports: Susan Goodson, they enjoy low‑impact fitness by walking the Fox River Trail three times a week, belong to the Fox Valley Pedestrians walking club, cheer for the Chicago Bears and Chicago Cubs
    from a distance, and practice gentle yoga at home with a well‑worn yoga mat.
  arts: Susan Goodson, they immerse themselves in historical non‑fiction by authors like Doris Kearns Goodwin, find inspiration in classic folk musicians such as Pete Seeger, attend the occasional Chicago
    Symphony Orchestra concert when the program is calm, knit intricate patterns while solving crossword puzzles featuring American history clues, and collect vintage crossword books.
  travel: Susan Goodson, they prefer meticulously planned road trips to historic Midwestern towns like Galena and Cedar Rapids, keep a detailed itinerary and a pocket journal, dream of quiet pilgrimages
    to European castles and monasteries, but avoid crowded tourist hubs by traveling off‑season with their husband.
  culinary: Susan Goodson, they delight in herb‑infused dishes from their garden, often preparing rosemary‑and‑thyme roasted chicken, homemade apple‑cinnamon crumble for holiday potlucks, a comforting lentil
    soup occasionally over‑seasoned with fresh basil, and baking gingerbread cookies that echo family festive traditions.
  core: Susan Goodson, they are a detail‑driven, garden‑loving medical records specialist whose structured life is softened by bouts of anxiety, solitary crafts, and a love for quiet routines.
background:
  cultural: Susan grew up in a modest, middle‑class family in the Midwest, with deep roots in the agricultural communities of Illinois. Her ancestry is primarily German and Irish, reflected in family traditions
    such as holiday baked goods and community potlucks. The region’s emphasis on reliability, modesty, and community service shaped her value system. She and her husband actively participate in their local
    Lutheran church, where volunteerism and mutual support are encouraged. The quiet, orderly nature of suburban Huntley, combined with a strong work ethic typical of Midwestern cultures, reinforces Susan’s
    preference for structure, predictability, and harmonious relationships.
attributes:
  skills: '["Medical records management","HIPAA privacy and security compliance","Electronic health record (EHR) system operation (Epic, Cerner)","ICD‑10 coding and clinical documentation","Internal auditing
    and quality assurance","Accurate data entry and verification","Workflow optimization and process documentation","Records archiving and retrieval","Staff training and onboarding on record‑keeping protocols","Confidentiality
    and ethical handling of patient information"]'
  hobbies: '["Gardening (perennials, herbs)","Reading historical non‑fiction","Knitting and crocheting","Crossword puzzles and Sudoku","Walking the Fox River Trail","Guided meditation and gentle yoga","Journaling
    for emotional processing","Volunteer data transcription for local health charity"]'
  career_goals: Susan aims to obtain the Certified Registered Health Information Administrator (RHIA) credential within the next two years to solidify her professional standing. She aspires to lead the
    medical records department, introducing a paperless, fully integrated records system that reduces errors and improves retrieval speed. Recognizing her collaborative nature, she plans to mentor junior
    staff, fostering a supportive and compliant workplace culture. To balance her high emotional reactivity, Susan also intends to implement structured self‑care routines—such as scheduled mindfulness breaks
    and workload buffers—to maintain her well‑being while delivering consistent, high‑quality service.
