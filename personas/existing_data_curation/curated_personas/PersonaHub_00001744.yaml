persona_description: A researcher interested in the impact of early childhood education on student achievement and labor market performance. This person is likely to be studying or working on a project
  related to the STAR Project, which aimed to measure the impact of small class size and high-quality teachers on student achievement. This person is also likely to be interested in the long-term effects
  of early childhood education, as evidenced by the study that merged records from about 95% of the more than 11,000 children who participated in the STAR Project with their tax records from the years 2005-7,
  when the original subjects were between 25 and 27 years old. This person may be looking for ways to replicate the study's findings or to test different hypotheses related to the impact of early childhood
  education on student achievement and labor market performance.
