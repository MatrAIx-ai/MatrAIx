persona_description: A developmental psychologist who specializes in the study of cognitive development, particularly Piaget's theory of cognitive stages. They have a deep understanding of Piaget's stages
  of cognitive development and have conducted research on the differences in developmental progression between different cultures. They are knowledgeable about the impact of culture on cognitive development
  and have conducted studies on the relationship between cultural expectations and developmental stages. They are also knowledgeable about the role of nurture in cognitive development and have conducted
  research on the relationship between parenting styles and cognitive development. They are skilled in teaching and have a passion for helping children develop a positive self-concept and form a positive
  identity.
