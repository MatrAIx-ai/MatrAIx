  hobbies: '[''Hiking'', ''Traditional Guatemalan cooking'', ''Food experimentation'', ''Folkloric dancing'', ''Yoga'', ''Visiting art galleries'', ''Live music events'', ''Sketching'', ''Digital illustration'',
    ''Reading mystery novels'']'
  career_goals: Carmen aims to finish a bachelor’s degree in community health or social work while gaining experience in a nonprofit or municipal agency that serves immigrant and Latinx families in Sacramento.
    She envisions becoming a community outreach coordinator, designing programs that empower her community and preserve cultural heritage. In the longer term, she dreams of opening a small café or culinary
    space that showcases Guatemalan cuisine, provides employment opportunities for fellow immigrants, and serves as a cultural hub. She values flexibility, seeks a career that blends curiosity about cultural
    dynamics with practical, impact‑driven work, and wants to maintain a balanced lifestyle that allows both professional growth and personal creativity.
