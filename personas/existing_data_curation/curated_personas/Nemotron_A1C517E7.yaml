personas:
  professional: Lisa Santiago, a 16‑year‑old digital media enthusiast, leverages their Canva graphic design chops, iMovie video editing flair, and knack for mediating peer conflicts to run their school
    club’s social media and produce community outreach visuals, all while embracing a laid‑back, flexible work style that tolerates occasional missed deadlines.
  sports: Lisa Santiago hits the local River Valley Hiking Club’s weekend trails, dribbles a basketball at the community center for fun, and cheers on the Seattle Sounders FC in MLS and the Golden State
    Warriors in the NBA, preferring low‑key exercise over regimented team sports.
  arts: Lisa Santiago curates a digital sketchbook inspired by the bold street‑art of Banksy, playlists looping Phoebe Bridgers and Tame Impala while they edit short videos, and fans contemporary YA novels
    like They Both Die at the End and indie films by Greta Gerwig, letting these creative influences color their visual storytelling.
  travel: Lisa Santiago’s travel style blends spontaneous weekend road trips to places like the Grand Canyon and New Orleans with meticulous planning for a dream backpacking trek through Kyoto and Iceland,
    balancing a tight teen budget with occasional family‑funded getaways.
  culinary: Lisa Santiago experiments in the kitchen with simple yet satisfying dishes—avocado toast drizzled with chili oil, a one‑pot miso ramen, chicken tacos seasoned with chipotle, and fudgy dark‑chocolate
    brownies—showcasing a beginner’s cooking confidence that pairs well with their love of food‑centric social media posts.
  core: Lisa Santiago blends a creative spark and a helpful heart with a laid‑back, occasionally disorganized streak, often swapping homework deadlines for impromptu sketch sessions or shelter walks, and
    thrives on spontaneous inspiration.
background:
  cultural: Lisa comes from a white, middle‑class family in suburban Norcross, Georgia. Her upbringing reflects a blend of Southern American traditions—such as celebrating Thanksgiving, enjoying barbecue
    and sweet tea—and the diverse cultural influences of Gwinnett County, where she interacts with neighbors from many backgrounds. Although her surname hints at Hispanic roots, her household primarily
    follows mainstream U.S. customs while occasionally incorporating family recipes and occasional Spanish phrases.
