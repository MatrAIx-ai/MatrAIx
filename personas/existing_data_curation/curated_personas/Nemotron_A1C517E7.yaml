  career_goals: Lisa hopes to pursue a career that blends creativity with helping others, such as digital media design, community outreach, or a health‑related field like nursing or allied health. She aims
    to attend college to study communications or visual arts, while staying open to flexible pathways that allow her to balance personal interests and practical concerns.
