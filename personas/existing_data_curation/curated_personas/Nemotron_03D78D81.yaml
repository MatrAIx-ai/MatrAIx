  hobbies: '[''cooperative video gaming (Minecraft, Overwatch)'', ''reading sci‑fi and fantasy novels'', ''sketching and digital art'', ''soccer practice and informal matches'', ''walking and nature observation
    in local parks'', ''gardening with family'', ''volunteering at the local animal shelter'', ''building LEGO models'']'
  career_goals: Wesley dreams of a future where he can combine his compassion with his curiosity about the natural world and technology. In the long term, he hopes to become a veterinarian or an environmental
    science researcher, allowing him to protect animals and ecosystems while applying his practical problem‑solving skills. In the near term, he aims to join a youth leadership program at his middle school,
    develop stronger organizational habits, and volunteer as a junior mentor for younger students, using his cooperative nature to foster a supportive community. He also aspires to take part in a community
    health outreach project to learn about mental‑wellness support for peers, reflecting his sensitivity to stress and desire to help others manage emotional challenges.
