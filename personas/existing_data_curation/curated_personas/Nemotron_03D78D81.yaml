personas:
  professional: Wesley Happy is an aspiring teen game developer who channels their curiosity and practicality into building elaborate Minecraft worlds, learning basic Java and 3D modeling, while their relaxed
    approach to deadlines leads to spontaneous, collaborative coding sessions with friends.
  sports: Wesley Happy plays forward for the Dallas Texans U‑13 soccer team, idolizes Dallas Cowboys quarterback Dak Prescott, enjoys cheering on FC Dallas in MLS, and balances team practice with solitary
    walks in Klyde Warren Park to clear their mind and release stress.
  arts: Wesley Happy spends weekends sketching digital fan art of characters from The Legend of Zelda and reading Brandon Sanderson's Mistborn series, while their playlist features Imagine Dragons and the
    orchestral scores of Hans Zimmer, reflecting how fantasy narratives and vibrant music fuel their creative storytelling in LEGO builds.
  travel: Wesley Happy loves planning low‑budget weekend trips to nearby destinations like the Dallas Arboretum, while dreaming of an adventure to Kyoto, Japan to explore anime culture and a sunrise hike
    in the Grand Canyon, preferring spontaneity over meticulous itineraries due to their flexible nature.
  culinary: Wesley Happy, an enthusiastic beginner in the kitchen, loves whipping up pepperoni pizza with extra mozzarella, slicing fresh garden tomatoes for homemade salsa, and indulging in classic mac
    and cheese, yet often forgets to clean the kitchen after experiments.
  core: Wesley Happy is a compassionate, curiosity‑driven teen who balances teamwork in Minecraft and soccer with quiet park walks, yet wrestles with worry and a habit of procrastinating on chores and budgeting.
background:
  cultural: Wesley grows up in a middle‑class, primarily white family in Dallas, Texas, where Southern hospitality and community ties are strong. His family celebrates traditional American holidays like
    Thanksgiving and Fourth of July with gatherings that often include barbecues and local Texan foods. Though rooted in a Christian upbringing that emphasizes service and empathy, his neighborhood's cultural
    mosaic—featuring Latino, African‑American, and Asian neighbors—exposes him to diverse music, cuisine, and community events. This blend cultivates his cooperative spirit and openness, while the school's
    emphasis on extracurricular clubs offers avenues for his curiosity and compassionate outreach.
attributes:
  skills: '[''basic computer troubleshooting'', ''creative writing (short stories and fan‑fiction)'', ''team coordination in soccer'', ''plant care and gardening basics'', ''peer mediation and conflict
