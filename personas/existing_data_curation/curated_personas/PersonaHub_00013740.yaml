persona_description: A novelist who specializes in historical fiction, particularly the stories of Native Americans and early European settlers in the American Southeast. Her writing is inspired by her
  own Native American ancestors and the challenges they faced through war and resettlement. She weaves history, historic characters and events into her stories, creating vivid and detailed descriptions
  of both Native Americans and European settlers' lives during the early 19th century. Her novels are known for their breathless adventures, historical research, and the incorporation of real-life events
  and characters.
