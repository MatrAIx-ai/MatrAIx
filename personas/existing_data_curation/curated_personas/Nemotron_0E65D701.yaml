  hobbies: '[''Restoring vintage arcade machines'', ''Gardening (heirloom tomatoes)'', "Women''s crochet circle", ''Volunteering at the Clarksville library tech help desk'', ''Community theater involvement'',
    ''Playing bridge at the senior center'', ''Group hikes in nearby state parks'', ''Hosting Southern‑style potluck gatherings'']'
  career_goals: Jennifer aims to transition from an independent contractor to the owner‑operator of a small, family‑run service shop serving the Upper Cumberland region. Over the next five years she plans
    to expand her client portfolio to include regional amusement centers, gyms, schools, and local businesses, while integrating remote monitoring and diagnostics into her service offerings. She is committed
    to mentoring a younger apprentice to preserve hands‑on craftsmanship in an increasingly digital market, and hopes to collaborate with a community college to develop short courses on vending‑machine
    maintenance. Ultimately, she envisions launching a modest community heritage project that showcases and restores vintage arcade equipment, highlighting the region’s cultural history.
