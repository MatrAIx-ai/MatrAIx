personas:
  professional: Dustin Tirrell, a 22‑year‑old police officer in Saint Anthony, blends methodical report‑writing and community‑first policing with a deep sense of personal integrity cultivated through seasonal
    agricultural work and 4‑H projects, using his organizational talent to keep patrol logs precise and mentor junior deputies as he works toward a future sergeant rank.
  sports: Dustin Tirrell enjoys target shooting at the St. Anthony Rifle Club, fly‑fishing on the Henrys Fork, and hiking the Sawtooth foothills, while cheering on the Idaho State Bengals football team
    and the Boise State Broncos, and he participates in the local Sawtooth Mountain Running Club during summer months.
  arts: Dustin Tirrell finds solace in acoustic guitar sessions with a close circle of friends, often covering songs by Chris Stapleton and Sturgill Simpson, alternates his downtime with crime novels by
    Michael Connelly, and appreciates western art exemplified by Frederic Remington prints displayed in his garage.
  travel: Dustin Tirrell favors low‑key road trips that blend outdoor recreation with modest budgets, having driven the scenic byway to Yellowstone National Park for a weekend fishing expedition, dreaming
    of a future trek through Glacier National Park, and regularly visiting Boise’s farmers market for fresh produce.
  culinary: Dustin Tirrell prefers hearty, locally sourced meals such as smoked trout with huckleberry glaze, bison stew spiced with sage, and homemade jerky, often preparing these dishes on his portable
    grill while complementing them with Idaho potatoes and a cold craft beer from a Boise brewery.
  core: Dustin Tirrell is a disciplined young law‑enforcement officer who balances methodical patrol duties with solitary hikes, meticulous woodworking, and a quiet passion for acoustic country tunes, yet
    occasionally forgets to floss and oversleeps on weekend mornings.
background:
  cultural: Dustin grew up in a white, family‑oriented community in rural Idaho, where self‑reliance, hard work, and respect for law are core values. His upbringing involved seasonal agricultural work,
    participation in local 4‑H projects, and regular attendance at a small evangelical church, shaping a worldview that blends conservative social norms with a strong sense of community responsibility.
    The region’s outdoor culture—fishing, hunting, and mountain recreation—has ingrained an appreciation for nature and disciplined leisure. As a police officer in Saint Anthony, he internalizes the department’s
    hierarchical, teamwork‑focused culture while also drawing on his hometown’s emphasis on personal integrity, cooperative problem‑solving, and maintaining harmony within tight‑knit social circles.
