  career_goals: Dustin aims to build a steady career within the Fremont County Sheriff's Office, first by gaining experience in patrol and community outreach. Over the next five years he plans to complete
    the Idaho Law Enforcement Academy’s advanced courses and pursue an associate degree in criminal justice. His short‑term goal is to earn the rank of Sergeant, where he can apply his organizational talent
    to mentor junior officers and lead structured community‑safety initiatives. Long‑term, Dustin aspires to become a police lieutenant or chief, focusing on improving rural policing models, strengthening
    partnerships with local schools and youth programs, and implementing data‑driven strategies for crime prevention while maintaining the personal, harmonious approach he values.
