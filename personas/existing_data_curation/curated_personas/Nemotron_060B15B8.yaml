  hobbies: '[''Building Custom Furniture'', ''Guitar Making'', ''Sketching Architectural Details'', ''Visiting Art Galleries'', ''Photography'', ''Hiking'', ''Fishing'', ''Playing Acoustic Guitar'', ''Grilling
    Barbecue'', ''Reading Architectural History'']'
  career_goals: James aims to transition from contract carpentry to owning a boutique studio that specializes in artistically‑inspired custom furniture and small‑scale architectural restorations. He plans
    to obtain certification in green building (LEED) to incorporate more eco‑friendly materials and methods. Over the next five years he hopes to mentor a small team of apprentices, expand his client base
    throughout the Greater Houston area, and collaborate with local visual artists on mixed‑media installations that blend woodwork with sculpture.
