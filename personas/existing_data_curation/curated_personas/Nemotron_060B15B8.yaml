personas:
  professional: James Doran, a veteran carpenter with over two decades of framing, finish work, and custom cabinetry, they combine meticulous blueprint reading and SketchUp visualization with a curiosity
    for visual art, allowing their balanced organization and occasional assertiveness to shape a boutique studio that crafts artistically‑inspired furniture and small‑scale architectural restorations while
    mentoring apprentices and pursuing LEED certification.
  sports: James Doran, an avid weekend hiker and occasional angler, they maintain fitness by trekking trails in Sam Houston National Forest and playing pick‑up basketball with the Houston Trail Club, while
    proudly cheering on the Astros in baseball, the Rockets in basketball, and the Texans during football season.
  arts: James Doran, a regular at the Museum of Fine Arts Houston and downtown galleries, they draw creative fuel from the sculptural abstractions of Alexander Calder, the stark photography of Ansel Adams,
    and the storytelling songs of Townes Van Zandt, often collaborating with local muralist Ana Teresa Fernández on mixed‑media installations that blend woodwork with visual art.
  travel: James Doran, who balances detailed trip planning with spontaneous road‑trip impulses, they enjoy seasonal getaways to the Texas Hill Country vineyards, a recent woodworking retreat in Asheville,
    North Carolina, and a family‑friendly fishing excursion at Lake Lanier, while dreaming of exploring the bamboo forests of Kyoto, Japan, and they fund these adventures through a dedicated travel savings
    account.
  culinary: James Doran, an adept grill master, they relish slow‑smoked brisket seasoned with mesquite wood, a dash of smoked paprika, and a side of homemade coleslaw, often pairing it with cedar‑planked
    salmon and experimenting with reclaimed walnut shavings as garnish on artisanal cheeses, while occasionally over‑indulging in late‑night sweet tea.
  core: A 43‑year‑old carpenter‑artist, James Doran channels restless curiosity into handcrafted guitars and sculptural furniture, they habitually delay finishing a piece until the perfect walnut grain
    emerges, and they never miss a Saturday barbecue contest despite a tendency to stay up late sketching designs.
background:
  cultural: James was raised in a middle‑class, white suburban family in the Greater Houston area, where Southern hospitality, a strong work ethic, and community involvement were emphasized. His upbringing
    blended traditional Texan values—self‑reliance, respect for craftsmanship, and appreciation of outdoor life—with exposure to the city’s cultural diversity. Growing up near Houston’s vibrant art scene
    sparked his curiosity for visual arts, while the regional emphasis on practical skills steered him toward carpentry. Though he never married, he maintains close ties to family and local trade circles,
    and frequently participates in neighborhood events that celebrate regional traditions and multicultural influences.
