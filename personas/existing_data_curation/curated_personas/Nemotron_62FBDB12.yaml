personas:
  professional: Kevin Wilburn is a seasoned accountant and auditor who leverages meticulous risk-assessment skills and a love for unstructured problem-solving to translate complex financial data into clear,
    actionable insights for art-focused nonprofits, while quietly battling deadline-driven stress with a habit of late-night coffee and occasional spreadsheet-tinkering marathons.
  sports: Kevin Wilburn is an avid member of the Milwaukee Hiking Club, logs regular weekend treks in state parks such as Devil's Lake and Kettle Moraine, follows the Milwaukee Bucks and Brewers faithfully,
    and squeezes in seasonal cross-country skiing in winter as a mindfulness-driven fitness routine.
  arts: Kevin Wilburn spends weekends wandering the Milwaukee Art Museum and local galleries, draws inspiration from contemporary artists such as Ai Weiwei and Mark Rothko, and occasionally channels the
    moods of Sufjan Stevens' orchestral albums into their watercolor landscapes.
  travel: Kevin Wilburn prefers spontaneous, low-key road trips to Wisconsin's state parks and the Upper Peninsula, but also dreams of a curated pilgrimage to Florence's Uffizi Gallery and a weekend getaway
    to Portland, Oregon's food-truck scene, balancing limited vacation days with a modest travel budget.
  culinary: Kevin Wilburn experiments with fusion dishes like Korean-style bibimbap topped with locally sourced Lake Michigan trout, perfects a rustic rosemary-infused mushroom risotto, and enjoys deep-dive
    ingredient sourcing at farmers' markets, though they sometimes over-salt their sauces in the excitement of trying new flavors.
  core: Kevin Wilburn is a detail-oriented accountant who channels artistic curiosity into solitary creative pursuits, battles stress with meditation, and wrestles with a penchant for last-minute deadlines
    and spontaneous adventures.
background:
  cultural: Kevin was raised in a modest, middle‑class family in the Menomonee Falls area, a community rooted in traditional Midwestern values of humility, hard work, and self‑reliance. His ancestry includes
    German and Scandinavian heritage common to the region, and his upbringing was influenced by a close‑knit church congregation that emphasized community service and modesty. The cultural climate of Waukesha
    County—characterized by quiet neighborhoods, strong civic involvement, and an appreciation for local arts and outdoor recreation—has shaped Kevin’s preference for solitude, small‑group interactions,
    and a pragmatic yet open‑minded outlook. While he embodies the reserved, dependable Midwestern temperament, his curiosity about new ideas and varied experiences reflects a desire to blend this cultural
    foundation with a broader, more eclectic worldview.
attributes:
  skills: '[''Financial statement preparation'', ''GAAP and IFRS compliance'', ''Tax filing and planning'', ''Audit planning and execution'', ''Risk assessment and internal controls'', ''Data analytics
