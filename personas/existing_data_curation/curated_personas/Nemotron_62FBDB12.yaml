    ''Budget forecasting'', ''Cost analysis'', ''Document management'']'
  hobbies: '[''Visiting art galleries and museums'', ''Landscape photography'', ''Watercolor painting'', ''Reading non‑fiction (philosophy, economics, contemporary art)'', ''Spontaneous road trips to Wisconsin
    state parks'', ''Hiking and nature walks'', ''Cooking experimental dishes'', ''Chess and strategic board games'', ''Journaling'', ''Guided meditation'']'
  career_goals: Kevin aims to earn his Certified Public Accountant (CPA) license within the next two years, positioning himself as a trusted advisor for small businesses and nonprofit arts organizations
    in the Midwest. He aspires to develop a niche expertise in financial management for galleries, museums, and creative enterprises, blending his love of art with his accounting acumen. Long‑term, he envisions
    launching a boutique consulting practice that offers flexible, client‑focused services while allowing him to work independently and maintain a balanced lifestyle. He also hopes to mentor younger accountants,
    sharing his unconventional problem‑solving approaches and helping them navigate the pressures of the profession.
