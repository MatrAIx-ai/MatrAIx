  hobbies: '[''Reading historical fiction'', ''Crocheting and knitting'', ''Herb gardening'', ''Listening to Latin American radio'', ''Playing chess'', ''Church choir participation'', ''Exploring new cooking
    techniques'']'
  career_goals: Yarelis aims to stay physically and mentally independent while deepening her role as a cultural ambassador within her community. She hopes to compile a family cookbook that records treasured
    Salvadoran recipes and to continue mentoring her grandchildren and neighborhood youth in both practical life skills and cultural traditions. Additionally, she aspires to volunteer periodically at the
    local senior center, sharing her expertise in organizing activities and teaching basic computer skills.
