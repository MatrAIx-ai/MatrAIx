personas:
  professional: Nathan Costello is a budding junior LEGO architect who merges their love for adventure stories and strategic puzzles, channeling their curiosity and practical problem‑solving into building
    complex brick models that they refine with disciplined, step‑by‑step methods learned from family service projects and church youth outings.
  sports: Nathan Costello spends weekends hiking the foothills near the Great Salt Lake, attending practice with the Clearfield Jr. Soccer Club, cheering for the Utah Jazz on game nights, and joining their
    school’s chess club where their competitive mindset rivals their athletic pursuits, yet they prefer solo trail explorations over crowded team sports.
  arts: Nathan Costello dives into creative worlds by constructing intricate LEGO dioramas inspired by Jules Verne’s voyages, listening to the orchestral scores of Hans Zimmer while coding Scratch games
    that challenge their friends, and flipping through the graphic novels of Hiroshi Yamamoto, all of which satisfy their love for solitary artistic expression.
  travel: Nathan Costello dreams of trading the local Salt Lake shoreline for a trek through Yellowstone’s geysers and the towering cliffs of Zion, while their family’s modest road trips to neighboring
    Idaho’s Craters of the Moon feed their curiosity for geology, though they always pack a rock‑identification guide and a spare LEGO pack for the journey.
  culinary: Nathan Costello prefers hearty meals like homemade chicken noodle soup with carrots and noodles, enjoys building their own pizza topped with pepperoni, mushrooms, and extra cheese, and takes
    pride in crafting trail‑mix snacks of pretzels, dried cranberries, and almond slivers for their hikes, though they sometimes sneak a few extra chocolate chips into the cookie dough when no one watches.
  core: Nathan Costello is a quiet, curiosity‑driven 8‑year‑old whose love for LEGO, strategic games, and solitary exploration is balanced by a competitive edge and a habit of meticulously tracking every
    allowance penny.
background:
  cultural: Nathan is raised in a predominantly white, Mormon‑influenced community in Clearfield, Utah. His family emphasizes modesty, self‑reliance, and service—values echoed in church activities, youth
    groups, and community service projects. Growing up in a close‑knit small town, he participates in family gatherings, church youth outings, and local school events, which reinforce a sense of belonging
    while also respecting his natural preference for solitude. The cultural emphasis on education, hard work, and respect for tradition shapes his practical outlook and his respect for established methods,
    even as he explores new ideas.
