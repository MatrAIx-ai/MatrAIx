  career_goals: Nathan dreams of one day becoming a designer of machines that help people—perhaps an engineer, an astronaut, or a wildlife technology specialist. He is fascinated by rockets and the idea
    of exploring space, but he also thinks about practical ways to improve life in his hometown, such as designing a better irrigation system for local farms or creating a simple app to track wildlife in
    nearby parks. His ambition is guided by his competitive streak; he wants to be the best in science fairs and to earn recognition for innovative projects, while staying grounded in the step‑by‑step process
    he values.
