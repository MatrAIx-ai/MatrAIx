personas:
  professional: Riddhi Jawaharlal, a retired technical project coordinator, leverages strong analytical and problem-solving abilities, data-analysis expertise in Python and Excel, and meticulous organization
    to design and lead community STEM workshops for seniors, while their curiosity and methodical nature enable seamless inclusion of emerging technologies such as artificial intelligence and 3D printing
    into mentorship programs for local high-school girls.
  sports: Riddhi Jawaharlal stays active through gentle morning walks with the Port Washington Senior Strollers club, follows the Milwaukee Brewers in baseball and the Milwaukee Bucks in basketball, and
    enjoys occasional low-impact yoga classes at the community center, preferring small-group activities over large sporting events.
  arts: Riddhi Jawaharlal frequents the Milwaukee Art Museum, drawing inspiration from Monet's water lilies, Frida Kahlo's expressive portraits, and the contemporary installations of local painter Sarah
    Evans, while channeling that appreciation into detailed watercolor landscapes and a growing portfolio of digital photographs of garden flora.
  travel: Riddhi Jawaharlal meticulously plans culturally immersive trips, favoring slower-paced visits to historic locales such as Bruges, the zen gardens of Kyoto, and the ruins of Machu Picchu, often
    traveling with a small circle of fellow retirees to balance companionship with budget constraints.
  culinary: Riddhi Jawaharlal, an experienced home chef, expertly prepares aromatic spiced lentil stew with cumin and mustard seeds, fragrant saffron rice, tangy mango chutney, and seasonal vegetable curries
    harvested from their garden, while occasionally attending cooking workshops to refine plating techniques and explore fusion flavors.
  core: Riddhi Jawaharlal blends a methodical, curiosity-driven mind with a love for solitary art, gardening, and mentorship, but they often forget to water indoor succulents and hoard vintage science journals
    they never finish reading.
background:
  cultural: Riddhi was born in Gujarat, India, into a family that prized education and cultural traditions. She immigrated to the United States in the early 1970s, first living in New York before moving
    to Wisconsin after marriage. Over the decades she has blended Gujarati customs—celebrating Navratri, Diwali, and preparing traditional dishes—with Midwestern life. Fluent in both Gujarati and English,
    she participates in the local Hindu temple’s cultural events and serves as a bridge between her South‑Asian heritage and the Ozaukee County community, introducing neighbors to Indian art, music, and
    cuisine while embracing local traditions such as the county fair.
attributes:
  skills: '[''Data analysis (Python, Excel)'', ''Scientific research methodology'', ''Laboratory instrumentation (spectroscopy, chromatography)'', ''Technical writing'', ''Project planning and coordination'',
    ''Community event organization'', ''Digital photography'', ''Basic graphic design (Adobe Photoshop)'', ''Mentoring and tutoring in STEM'', ''South Asian culinary arts'']'
  hobbies: '[''Watercolor painting'', ''Reading (historical fiction, science topics)'', ''Gardening (vegetable and herb garden)'', ''Visiting art museums and galleries'', ''Cooking Indian cuisine'', ''Participating
    in a small book club'', ''Leading technology workshops for seniors'', ''Collecting and preserving oral histories of immigrants'']'
  career_goals: Even in retirement, Riddhi aims to create a mentorship program for local high‑school girls interested in STEM, to document and share the narratives of South‑Asian immigrants in Ozaukee County
    through oral‑history recordings, and to continue learning emerging technologies such as artificial intelligence and 3D printing. She also hopes to curate a community exhibition that blends traditional
    South‑Asian art with contemporary works by local artists, fostering cross‑cultural dialogue.
