personas:
  professional: Doris Shaw is a food‑service associate who leverages solid ServSafe knowledge, precise POS cash‑handling, and a data‑driven, skeptical mindset to streamline high‑volume operations while
    eyeing a shift‑lead role and a future in hospitality management.
  sports: Doris Shaw trains for 5K races with the Birmingham 5K Fitness Club, follows the Alabama Crimson Tide football team and the Birmingham Barons baseball club, and balances her competitive spirit
    on the online chess board with a weekly yoga session at the Bham Yoga Studio.
  arts: Doris Shaw channels her curiosity into photographing Birmingham’s historic districts and nearby nature trails, draws inspiration from Ansel Adams and Dorothea Lange, reads contemporary mystery novels
    by Tana French, and devours true‑crime podcasts like Serial and My Favorite Murder to fuel her analytical mind.
  travel: Doris Shaw prefers weekend road trips that blend photography and culinary discovery, having already explored the Great Smoky Mountains, Nashville’s music scene, and Charleston’s historic waterfront,
    while dreaming of a study‑abroad culinary tour in Barcelona to refine her modern Southern catering vision.
  culinary: Doris Shaw experiments with Southern‑fusion dishes such as quinoa‑based shrimp and grits, cauliflower‑rice jambalaya, and turmeric‑glazed chicken wings, favors ingredients like sweet potatoes,
    collard greens, and locally sourced heirloom tomatoes, and cooks with an eye toward nutrition, sustainability, and the occasional over‑ambitious plating that results in a messy kitchen.
  core: Doris Shaw is a data‑driven, stress‑sensitive 18‑year‑old hospitality hopeful who balances a competitive edge in chess and running with a love for experimental Southern cooking, photography, and
    meticulous budgeting, all while navigating the anxiety of early adulthood.
background:
  cultural: Doris grew up in a suburban neighborhood of Birmingham, Alabama, where Southern hospitality and community ties are woven into daily life. Her family’s traditions include frequent gatherings
    centered around home‑cooked meals such as barbecued chicken, collard greens, and biscuits, giving her an early appreciation for regional cuisine. Attending a local public high school and now taking
    courses at a community college, she has been exposed to the city’s evolving cultural scene—college football Saturdays, live blues and country music at local venues, and a growing emphasis on social
    awareness among her peers. The blend of traditional Southern values, a strong work ethic, and an increasingly diverse, progressive community shapes her outlook on food, service, and personal ambition.
attributes:
  skills: '[''ServSafe food safety certification'', ''POS cash handling'', ''High-volume customer service'', ''Multitasking in fast-paced environments'', ''Inventory management'', ''Basic nutrition knowledge'',
    ''Workflow analysis and process improvement'', ''Team coordination'', ''Digital scheduling tools (When I Work)'', ''Effective communication'']'
  hobbies: '[''Cooking experimental dishes'', ''Morning running (5K training)'', ''Competitive online chess'', ''Reading mystery novels'', ''Listening to true‑crime podcasts'', ''Yoga for stress management'',
    ''Photography of Birmingham’s historic neighborhoods'']'
  career_goals: Doris aims to leverage her hands‑on experience in non-restaurant food service to move into a supervisory or management role within the hospitality sector, ultimately earning a degree in
    hospitality or culinary arts and establishing her own modern Southern catering business that emphasizes nutrition and sustainability. In the short term, she plans to obtain a ServSafe certification,
    take on additional responsibilities as a shift lead, and enroll in a community‑college program in hospitality management, targeting a promotion to assistant manager within the next two years while carefully
    monitoring stress and performance expectations.
