persona_description: A programmer who is interested in parallel programming and has experience with OpenMP and MPI. They are looking to scale up their algorithm to 10,000 processor cores and are seeking
  guidance on how to implement an efficient parallel algorithm. They are familiar with the concepts of data layout and communication between processors, and are eager to learn more about distributed memory
  models. They are also interested in the use of MPI and want to understand the benefits and limitations of using asynchronous MPI_Isend and MPI_Irecv for communication between processors. They are looking
  for a hands-on approach to learning and are willing to put in the effort to understand the algorithm on paper and then translate it into code.
