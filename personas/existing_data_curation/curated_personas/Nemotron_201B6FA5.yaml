  hobbies: '[''Visiting art museums'', ''Listening to Motown and jazz'', ''Gardening'', ''Woodworking'', ''Reading science-fiction'', ''Photography'', ''Cooking soul-food'', ''Volunteering for youth STEM
    programs'']'
  career_goals: Although formally retired, Akim aims to channel his professional experience into community impact. He plans to establish a monthly mentoring program for Detroit high-school students interested
    in engineering, co-lead a partnership between the local museum and a tech lab to create interdisciplinary workshops that blend art and engineering, and author a memoir that captures the cultural and
    industrial transformation of Detroit from the 1960s to today. He also aspires to serve on the board of a community arts organization to help shape inclusive programming.
