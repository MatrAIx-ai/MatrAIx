persona_description: A mathematics teacher who specializes in the study of pseudodifferential operators, Fourier integral operators, and oscillatory integral operators. Her research interests include the
  properties of various operators arising from solving partial differential equations, as well as the direct study of solutions to these equations. She is passionate about fostering the learning and understanding
  of mathematics, particularly in the context of teaching, and is committed to dispelling the myth that mathematics is a hard subject. She is also interested in the role of collegiality in the functioning
  of a university and its importance in advancing technology, testing ideas, and speaking truth to power.
