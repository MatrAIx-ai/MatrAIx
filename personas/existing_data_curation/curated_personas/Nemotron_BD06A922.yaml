  career_goals: His primary ambition is to preserve his independence and self‑reliance well into his senior years. He plans to expand his vegetable garden, construct a modest woodworking studio in his backyard,
    and complete a series of handcrafted furniture pieces that reflect his Mexican‑American heritage. He also aims to keep his finances in order, ensuring a stable retirement income, and occasionally share
    his practical expertise with younger neighbors by offering informal mentorship. On a personal level, Hector sets incremental challenges for himself, such as mastering more complex carpentry joints and
    learning basic coding to automate garden irrigation.
