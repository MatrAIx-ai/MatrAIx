personas:
  professional: Hector Perez, a retired handyman‑turned informal mentor, channels decades of practical expertise in automotive repair, small‑engine maintenance, carpentry, plumbing and electrical troubleshooting
    into structured, solution‑focused assistance for neighbors, keeping detailed project logs and budgets while carefully vetting requests to preserve their independence and self‑reliance.
  sports: Hector Perez enjoys low‑impact fitness through regular hikes on the nearby San Antonio Canyon Trail and participates in a senior walking group, while cheering on the Los Angeles Dodgers and Los
    Angeles Lakers from his porch, and occasionally joins a neighborhood-friendly softball league for light competition.
  arts: Hector Perez cultivates artistic expression by photographing local wildflowers and rolling hills in the style of Ansel Adams, filling evenings with recordings of Mariachi Vargas de Tecalitlán and
    Pedro Infante while reading biographies of historical leaders, and unwinding with classic Western films such as The Magnificent Seven.
  travel: Hector Perez favors meticulously planned road trips to scenic destinations like Yosemite National Park, the historic town of Santa Fe and the coastal vineyards of Napa Valley, balancing a modest
    travel budget with a desire for immersive cultural experiences, and dreams of a future visit to Japan’s traditional tea gardens to study horticulture.
  culinary: Hector Perez delights in preparing traditional dishes such as pozole and tamales, skillfully combining home‑grown cilantro, oregano, and chilies with hominy, pork shoulder, and masa to create
    authentic flavors, while occasionally experimenting with modern twists like quinoa‑stuffed chilies.
  core: Hector Perez blends solitary craftsmanship with disciplined self‑reliance, channeling a competitive edge into meticulous woodworking and budgeting, while occasionally succumbing to a stubborn reluctance
    to delegate even routine tasks.
background:
  cultural: Hector is a first‑generation Mexican‑American who grew up in a bilingual household where Spanish was spoken daily and Mexican customs were celebrated. Though he never married, he maintains close
    ties with extended family, regularly attending community gatherings at the local Catholic church and participating in cultural events such as Día de los Muertos, where he creates simple ofrendas to
    honor ancestors. His culinary tastes are shaped by traditional Mexican cuisine, and he continues to observe holidays like Las Posadas and Mexican Independence Day, often preparing foods for neighbors.
    Living in La Verne, he blends his heritage with the Southern California lifestyle, appreciating the region’s agricultural roots and multicultural community.
