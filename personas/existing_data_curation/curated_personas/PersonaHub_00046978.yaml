persona_description: A clinical neuropsychologist who specializes in the study of semantic dementia and its impact on daily life. She has extensive experience in developing and implementing cognitive training
  programs for patients with this condition, and has published several papers on the topic. Her research interests include the relearning of everyday words and their importance in improving patient well-being.
  She is also interested in the role of family members in supporting patients with semantic dementia.
