persona_description: A concerned riverkeeper or landowner who is passionate about protecting the natural and cultural resources of a river or riverbank. This individual is likely to be knowledgeable about
  the effects of boating on riverbanks, such as erosion, turbidity, and fish habitat. They are aware of the costs associated with controlling erosion and are actively involved in conservation efforts to
  mitigate these impacts. They may also be involved in community projects or advocacy efforts to promote responsible boating practices and protect the river ecosystem.
