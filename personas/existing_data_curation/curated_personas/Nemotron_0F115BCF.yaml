personas:
  professional: An 80‑year‑old retired teacher and curriculum specialist named Sharon Brashear channels their lifelong curiosity and practical organization into designing age‑appropriate educational kits,
    leading senior‑focused professional‑development workshops, and spearheading community history‑preservation projects that blend traditional storytelling with digital archiving.
  sports: A passionate hiker and bird‑watcher, Sharon Brashear spends mornings trekking the Adirondack High Peaks with the Piseco Senior Trail Club, roots for the New York Mets during baseball season, and
    joins a gentle yoga class to complement their love of low‑impact fitness.
  arts: An avid quilter and budding potter, Sharon Brashear draws inspiration from the nature‑focused paintings of Georgia O’Keeffe and the folk melodies of Joan Baez, regularly attending the local senior
    arts center’s craft workshops and the historic Adirondack Playhouse’s seasonal productions.
  travel: A careful planner who prefers escorted group trips, Sharon Brashear has explored Acadia National Park and historic Boston, and dreams of a leisurely road‑trip to the Cape Breton Highlands to photograph
    wildflowers, budgeting each journey in their trusty ledger while balancing senior travel discounts.
  culinary: A seasoned home‑cook, Sharon Brashear delights in preparing garden‑fresh ratatouille, strawberry‑filled pies, and fermented pickles, often swapping recipes at community potlucks while occasionally
    treating themselves to a slice of New York‑style cheesecake at the local diner.
  core: Sharon Brashear is an 80‑year‑old lifelong educator who merges curiosity with practicality, obsessively cataloging birds and community stories, yet habitually worries about every detail from garden
    yields to bill payments.
background:
  cultural: Sharon comes from a white, Mid-Atlantic American family that valued education, community service, and self-reliance. Raised during the post-World War II era in a small New York town, she internalized
    the work ethic of the 1950s and the communal spirit of tight-knit neighborhoods. Her upbringing included regular church gatherings, seasonal traditions, and a deep appreciation for the natural beauty
    of the Adirondacks. This cultural foundation informs her respect for tradition, commitment to civic engagement, and desire to preserve local heritage while remaining open to new ideas.
