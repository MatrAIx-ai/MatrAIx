  hobbies: '[''Sketching and Painting'', ''Spoken‑Word Poetry'', ''Experimental Film'', ''Speculative Fiction Reading'', ''Pick‑up Basketball'', ''Pop‑up Art Show Curation'', ''Cooking African Diaspora
    Cuisine'']'
  career_goals: Ronald aspires to become a cultural program manager or curator within a museum or community arts organization in the Washington, D.C. metropolitan area. In the short term, he aims to secure
    an entry‑level position or internship that allows him to design and execute public exhibitions highlighting emerging Black artists. Long‑term, he envisions founding a nonprofit that provides mentorship
    and creative workshops for underserved youth in Prince George’s County, leveraging his network and organizational talents to build sustainable community arts initiatives.
