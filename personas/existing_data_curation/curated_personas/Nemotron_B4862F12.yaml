personas:
  professional: Lynette Harjo, a 31‑year‑old elementary teacher in the Tampa Bay area, blends meticulous lesson planning with interactive whiteboard technology and data‑driven assessment to create inclusive,
    project‑based classrooms while they mentor new educators and coordinate after‑school STEAM initiatives.
  sports: Lynette Harjo, a 31‑year‑old beach‑volleyball enthusiast with the St. Pete Beach Volleyball Club, paddle‑boards on weekends, practices yoga weekly, and they passionately support the Tampa Bay
    Buccaneers, Lightning, and Rays.
  arts: Lynette Harjo, a 31‑year‑old who captures coastal sunsets with her DSLR, reads historical fiction by Ken Follett and true‑crime memoirs by Michelle McNamara, visits the Salvador Dalí Museum, and
    they curate playlists featuring Aretha Franklin and Rodrigo y Gabriela.
  travel: Lynette Harjo, a 31‑year‑old who prefers road‑tripping along the Gulf Coast—stopping in Gulf Shores, Pensacola, and New Orleans—plans itineraries in a travel app, yet they occasionally daydream
    about a spontaneous surf‑camp in Costa Rica when budget permits.
  culinary: Lynette Harjo, a 31‑year‑old intermediate home chef, skillfully blends Southern comforts like shrimp and grits with Mediterranean flavors such as roasted eggplant and feta, seasons dishes with
    smoked paprika and fresh basil, and they delight friends with dinner parties featuring jambalaya and baklava.
  core: Lynette Harjo, a 31‑year‑old organized educator, balances meticulous budgeting, community‑focused teaching, beach sports, and spontaneous culinary experiments, though they sometimes overlook dental
    appointments and give in to impulse kitchen‑gadget purchases.
background:
  cultural: Lynette grew up in a middle‑class white family in the Tampa Bay region, where southern hospitality and a relaxed coastal lifestyle shaped her values. Her upbringing emphasized community involvement,
    education, and celebrating traditional American holidays such as Thanksgiving and the Fourth of July. Exposure to the multicultural atmosphere of Pinellas County, including the vibrant arts scene and
    diverse culinary influences, cultivated her appreciation for inclusivity and cultural exchange. This blend of suburban Floridian roots and the region’s eclectic vibe informs her teaching philosophy
    and social engagements.
attributes:
  skills: '["Lesson planning", "Curriculum development", "Student assessment and data analysis", "Educational technology integration", "Classroom management", "Collaborative project facilitation", "Public
    speaking", "Event and extracurricular program coordination", "Community outreach", "Mentoring and professional development"]'
  hobbies: '["Beach volleyball", "Paddle‑boarding", "Yoga", "Volunteering at animal rescue", "Cooking and hosting dinner parties", "Reading historical fiction and true‑crime memoirs", "Photography (coastal
    sunsets)", "Road‑tripping along the Gulf Coast"]'
  career_goals: Lynette aims to complete a bachelor's degree in elementary education and obtain full state certification within the next two years. She aspires to become a lead teacher or curriculum specialist,
    where she can shape district-wide instructional strategies and mentor new educators. Long-term, she envisions moving into an instructional coordinator or assistant principal role, focusing on innovative,
    evidence-based teaching practices that balance creativity with accountability. She also hopes to launch a community-based after-school enrichment program that blends STEAM projects with local environmental
    stewardship.
