  career_goals: She aims to leverage her experience to become a trusted community advisor, leading local initiatives like the Bedford Arts Festival and chairing the Monroe County volunteer board. Xenia
    also hopes to start a part‑time consulting practice helping small, family‑owned businesses with marketing and financial basics. Long‑term, she dreams of writing a community‑focused memoir and traveling
    to historic sites across the U.S., sharing stories that connect generations.
