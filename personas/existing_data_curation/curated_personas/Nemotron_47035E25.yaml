personas:
  professional: Xenia Brown blends her business education with a talent for people, orchestrating Bedford’s Arts Festival and local fundraising drives by negotiating sponsorships, managing tight budgets,
    and rallying volunteers, all while they relax and let improvisational planning sometimes turn into a scramble the night before a big event.
  sports: Xenia Brown enjoys watching the Indianapolis Colts and the Indiana Pacers on game nights, plays weekly pickleball at the community center, and volunteers as a scoreboard operator for the local
    high school baseball team, while their competitive streak sometimes leads them to overcommit to weekend tournaments.
  arts: Xenia Brown draws creative energy from the local theater where they act in community productions of Our Town and coordinate backstage lighting, while in their book club they discuss works by Harper
    Lee and Toni Morrison, and they regularly attend performances by the Indianapolis Symphony Orchestra featuring Mozart and contemporary composer Philip Glass.
  travel: Xenia Brown prefers spontaneous road trips that combine historic pit stops with limestone quarry tours, having visited the historic town of Corydon, the well‑preserved Mammoth caves, and planning
    a future pilgrimage to Savannah, Georgia’s historic district and the National Museum of American History in Washington, D.C.
  culinary: Xenia Brown’s farm‑to‑table kitchen showcases heirloom tomatoes, roasted beet salads with goat cheese, and a signature slow‑cooked pork shoulder glazed with apple cider reduction, while they
    love making fresh cornbread with buttermilk and listening to the crackle of a cast‑iron skillet, though they occasionally burn the edges when juggling a garden watering schedule.
  core: Xenia Brown is a sociable, curiosity‑driven community catalyst who balances a relaxed approach with occasional disorganization, turning every local gathering into a lively, purpose‑filled event
    while never missing a chance to chat over a steaming bowl of tomato bisque.
background:
  cultural: Xenia was raised in the heart of Indiana’s Midwest, where community ties, modesty, and a strong work ethic are core values. Growing up in Bedford, known as the “Limestone Capital,” she was surrounded
    by the town’s quarrying heritage and annual festivals that celebrate local craftsmanship. Her family’s Protestant background and involvement in the local church have reinforced a tradition of service
    and fellowship. These Midwestern influences shape her practical outlook, love of community gatherings, and appreciation for both tradition and new ideas.
