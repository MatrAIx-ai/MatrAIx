personas:
  professional: Drake Hickingbottom, a 41‑year‑old aspiring journeyman carpenter and electrician‑in‑training, translates their methodical woodworking, home‑maintenance, budgeting, and digital project‑management
    abilities into a reliable local handyman service while also orchestrating community volunteer initiatives with calm precision.
  sports: Drake Hickingbottom, a devoted fisherman on Mendota Lake, avid hiker of the Minnesota River Valley trails, and loyal supporter of the Minnesota Twins, Vikings, and Timberwolves, also joins a local
    summer softball league and participates in weekend ice‑fishing trips.
  arts: Drake Hickingbottom, who frequents the Walker Art Center and treasures regionalist paintings by Grant Wood, immerses themselves in folk music from John Prine and the storytelling of Bob Dylan, reads
    historical nonfiction by Lyman Draper, and casually strums an acoustic guitar at church potlucks.
  travel: Drake Hickingbottom prefers modest, well‑planned road trips, having explored the historic sites of Chicago, the waterfalls of Wisconsin Dells, and the rugged coastline of Door County, while dreaming
    of a seasonal cabin retreat in the Adirondacks for future family getaways.
  culinary: Drake Hickingbottom, a garden‑to‑table enthusiast, delights in cooking fresh perch fillets with lemon butter, beet and goat‑cheese salads, corn succotash, and apple‑crumble pie, wielding herbs
    like dill and rosemary with the same precision they apply to their woodworking projects.
  core: Drake Hickingbottom, a methodical, community‑oriented handyman with a penchant for over‑planning, gentle compassion, and a habit of scrolling through tool‑review videos late into the night, balances
    their love for quiet solitude with small, purposeful gatherings.
background:
  cultural: Drake was raised in the Upper Midwest, in a predominantly white, small‑town environment with deep German‑Scandinavian roots common to Sauk Rapids, Minnesota. The region’s cultural emphasis on
    self‑reliance, modesty, and strong communal ties shaped his values. He grew up participating in local traditions such as the summer county fair, holiday church gatherings, and community service projects,
    reflecting a blend of practical Midwestern sensibility and a quiet, cooperative spirit.
attributes:
  skills: '["home maintenance", "woodworking", "basic auto repair", "budgeting", "financial planning", "volunteer coordination", "digital organization"]'
  hobbies: '["woodworking", "fishing", "hiking", "reading historical non-fiction", "gardening", "volunteering at the local food bank", "attending community potlucks"]'
  career_goals: Drake aims to translate his hands‑on skills into a certified trade, such as becoming an electrician or a licensed journeyman carpenter, so he can offer reliable handyman services locally.
    He also hopes to secure part‑time work that leverages his organizational talent, perhaps as a property manager for a small rental portfolio or as a coordinator for community programs. Ultimately, he
    wants to achieve enough financial stability to support his family’s long‑term goals, including modest travel and the ability to mentor younger community members in practical skills.
