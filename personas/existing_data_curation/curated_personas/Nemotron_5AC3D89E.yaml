  career_goals: Alen aims to earn his A&P certification and progress to a lead maintenance supervisor role at a major airline hub in the Denver metropolitan area. He envisions obtaining FAA Repair Station
    certification to oversee comprehensive maintenance operations and eventually transition into an aircraft maintenance instructor position, where he can blend his technical expertise with his passion
    for mentoring. Long‑term, Alen dreams of launching his own boutique maintenance shop that services both traditional aircraft and emerging drone platforms, while also advocating for mental‑health resources
    for aviation technicians to reduce workplace stress and anxiety.
