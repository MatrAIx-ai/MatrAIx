persona_description: A neuroscientist who studies the brain and its function, particularly in the context of stroke recovery and rehabilitation. She is interested in understanding how the brain adapts and
  changes in response to new tasks, and how this adaptation might be used to improve post-stroke rehabilitation. Her research focuses on functional magnetic resonance imaging (fMRI) and the study of brain
  mapping and remapping in stroke victims. She is also interested in the role of specific neurological areas in controlling hand movement and learning new tasks.
