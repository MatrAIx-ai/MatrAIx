  hobbies: '["Fishing", "Gardening", "Barbecue grilling", "Listening to classic rock", "Reading DIY and practical manuals", "Playing cards", "Volunteering for community clean‑up events", "Attending church
    services", "Walking in local parks", "Woodworking"]'
  career_goals: Approaching retirement, Chad aims to solidify his legacy by earning a Certified Professional Cleaner credential and gaining expertise in environmentally sustainable (green) cleaning practices.
    He aspires to be promoted to shift supervisor, where he can mentor younger custodial staff and streamline operations with his organized approach. Over the next few years, he plans to transition to a
    part‑time consulting role or launch a small, family‑run cleaning business that leverages his extensive practical knowledge while allowing a gradual reduction in hours for a comfortable retirement.
