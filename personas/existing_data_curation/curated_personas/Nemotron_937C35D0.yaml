personas:
  professional: Chad Ryan, a veteran janitorial supervisor with an associate degree, leverages his meticulous floor-care expertise, safety compliance knowledge, and methodical leadership style to streamline
    building maintenance while mentoring younger staff and championing green cleaning initiatives.
  sports: Chad Ryan is a dedicated fan of the Texas Longhorns football team and the Austin FC soccer club, spends Saturday mornings fishing at Lake Travis, and participates in low-impact fitness activities
    like walking in Zilker Park and occasional pickleball games at the community center.
  arts: Chad Ryan’s cultural palate includes classic rock icons such as Led Zeppelin, The Rolling Stones, and The Eagles, regular attendance at Austin’s community theater productions, and a habit of collecting
    vintage DIY manuals that double as decorative coffee-table books.
  travel: Chad Ryan prefers road-trip itineraries that blend fishing expeditions on Hill Country lakes with visits to historic towns like Fredericksburg and seasonal festivals in New Orleans, planning trips
    well in advance to stay within his retirement budget while dreaming of a future national-park cruise to Yellowstone.
  culinary: Chad Ryan’s culinary pursuits center on mastering Texas-style barbecue—smoking brisket with mesquite wood, crafting homemade rubs, and pairing dishes with grilled garden vegetables like zucchini
    and heirloom tomatoes—while his grilling skill ranges from competent to occasionally over-charred when he rushes a weekend cookout.
  core: Chad Ryan is a methodical, routine-driven retiree who blends green-cleaning expertise, classic-rock devotion, backyard BBQ mastery, and community volunteerism into a steady, slightly stubborn, yet
    reliably dependable lifestyle.
background:
  cultural: Chad was raised in a middle‑class, Anglo‑American family in central Texas, where Southern‑Western values of hard work, self‑reliance, and community responsibility were emphasized. He identifies
    with the pragmatic, traditional culture of Austin’s surrounding neighborhoods, valuing family ties, church involvement, and local customs such as Texan cuisine and outdoor recreation. While he appreciates
    the city’s vibrant music and cultural diversity, his worldview remains rooted in the practical, routine‑oriented ethos that shaped his upbringing.
attributes:
  skills: '["Commercial floor care", "Carpet and upholstery cleaning", "Restroom sanitation", "Hazardous material handling", "Supply inventory management", "Cleaning schedule planning", "Basic plumbing
