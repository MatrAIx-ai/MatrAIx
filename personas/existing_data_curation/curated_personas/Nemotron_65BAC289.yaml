  hobbies: '[''Reading contemporary fiction'',''Playing chess'',''Urban photography'',''Running 5K'',''Visiting museums and galleries'',''Volunteering at community food banks'',''Cooking simple meals'',''Exploring
    Chicago neighborhoods on weekend bike rides'']'
  career_goals: Johnny aims to advance from front‑line courier duties to a supervisory logistics role within the next three years, eventually becoming a fleet manager or logistics coordinator for a larger
    delivery firm. He plans to pursue a part‑time MBA or a master's in urban planning to deepen his strategic and operational expertise. Long‑term, he envisions launching his own small‑scale, eco‑friendly
    courier business focused on same‑day deliveries in the Chicago metropolitan area, while achieving enough financial stability to purchase a condo in his hometown.
