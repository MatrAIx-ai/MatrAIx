personas:
  professional: Angelia Lamar, a 20‑year‑old customer service representative at a busy call center, leverages their rapid curiosity and practical mindset to master Zendesk and Salesforce, and they turn
    high‑volume inbound calls into friendly, solution‑focused conversations while delighting callers with energetic empathy, positioning themselves for a future team‑lead role.
  sports: Angelia Lamar hikes the Metacomet Trail on Saturday mornings for cardio, joins a co‑ed indoor soccer league at the Agawam Community Center, passionately roots for the Springfield Thunderbirds
    and New England Patriots, and they balance occasional yoga sessions with a habit of stretching after each long call shift.
  arts: Angelia Lamar shines on stage with the Agawam Improv Collective, channeling the quick‑witted styles of Tina Fey and Keegan‑Michael Key into spontaneous sketches, curates Instagram Stories that spotlight
    local theater productions and flyer‑designs for community art fairs, and they make the arts a vibrant backdrop to their social life.
  travel: Angelia Lamar prefers spontaneous weekend road trips, often cruising Route 2 to the rustic charm of Woodstock, Vermont, or hopping a bus to the bustling streets of Boston for a food‑tour, and
    they maintain a tight travel fund that postpones longer vacations until their café savings goal is met.
  culinary: Angelia Lamar is an avid baker who perfects New England classics such as cranberry‑orange scones, apple‑cider doughnuts, and pumpkin‑spice cheesecake, favors locally sourced butter, honey, and
    fresh berries, shares recipes on Instagram, and they occasionally indulge in a late‑night pizza slice from the neighborhood pizzeria after a long shift.
  core: Angelia Lamar is a talkative, curiosity‑driven 20‑year‑old who juggles high‑energy customer service, improv comedy, and seasonal baking, they dream of a community café despite a habit of over‑committing
    to every new project.
background:
  cultural: Angelia was raised in a middle‑class, predominantly White New England family in Agawam, Massachusetts. Her upbringing reflects the region’s values of self‑reliance, community involvement, and
    a strong work ethic. Family traditions include celebrating Thanksgiving with a large gathering, attending local fairs, and enjoying seasonal activities such as leaf‑peeping in autumn and ice‑skating
    in winter. Influences from Irish and Italian heritage appear in family recipes and occasional cultural festivals, while the broader New England culture emphasizes politeness, punctuality, and an appreciation
    for local history, all of which shape Angelia’s cooperative and considerate demeanor.
