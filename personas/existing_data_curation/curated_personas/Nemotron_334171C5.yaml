  career_goals: Angelia aims to advance from her current customer service representative role to a team lead or supervisor position within the next two to three years, where she can mentor newer representatives
    and help shape service standards. In the longer term, she plans to complete her GED and pursue a bachelor's degree in Business Administration or Communications, using her customer‑service background
    to transition into client relationship management, marketing, or community outreach. Ultimately, she dreams of opening a small café or co‑working space that fosters community connection, aligning with
    her sociable nature and desire to create harmonious environments.
