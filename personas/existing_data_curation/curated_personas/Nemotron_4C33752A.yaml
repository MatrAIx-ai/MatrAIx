  career_goals: Although retired from formal employment, Ivette aims to deepen her impact on the Savannah community. She aspires to become the lead volunteer coordinator for a senior arts program, championing
    accessible art workshops and exhibitions for older adults. She hopes to author a series of memoir-style essays documenting Savannah’s historic neighborhoods, preserving memories for future generations.
    Additionally, she seeks to expand her mentorship role, helping younger volunteers develop leadership skills and fostering intergenerational connections within local cultural institutions.
