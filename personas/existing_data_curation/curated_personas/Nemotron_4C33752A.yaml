personas:
  professional: Ivette Batista, a retired liberal arts aficionado, channels decades of community involvement into orchestrating senior arts workshops and leading docent tours in Savannah’s historic districts,
    balancing precise planning with a flexible, personable style that inspires volunteers and participants alike.
  sports: Ivette Batista stays active through weekly line‑dancing classes at the community center, participates in a senior walking club that trails the Savannah Riverfront, and passionately roots for the
    Savannah Bananas baseball team and the Atlanta Braves, viewing sport as both social engagement and gentle fitness.
  arts: Ivette Batista immerses themselves in the visual arts by sketching at the SCAD Museum of Art, drawing inspiration from Monet’s water lilies and the vibrant works of Savannah artist Ralph Middleton,
    while also curating docent tours that weave historical narratives with artistic appreciation, and devotes evenings to watercolor painting of magnolia‑laden porches.
  travel: Ivette Batista favors relaxed, culturally rich getaways, planning meticulous day trips along the Lowcountry coastal highways to Beaufort, Charleston, and Tybee Island, often joining fellow book‑club
    members for weekend retreats that blend historic walking tours with low‑key beachside picnics, and dreams of a future pilgrimage to New Orleans for its jazz heritage.
  culinary: Ivette Batista delights in cooking classic Southern fare such as shrimp and grits, collard greens seasoned with garden herbs, and pecan pie, expertly using fresh magnolia blossoms for a fragrant
    tea infusion, yet they sometimes rely on store‑bought biscuits when tired after a busy volunteer schedule.
  core: Ivette Batista blends a lifelong love of art, community, and Southern tradition into a vibrant senior life, balancing meticulous organization with spontaneous line‑dancing, occasional indulgent
    splurges on watercolor supplies, and a gentle stubbornness about dental visits.
background:
  cultural: Ivette was born and raised in the South, growing up in a close‑knit, middle‑class white family that valued Southern hospitality, community service, and a deep appreciation for Savannah’s historic
    charm. Her upbringing in the mid‑20th century infused her with traditional Southern customs—church gatherings, seasonal festivals, and a love for regional cuisine—while her later life experiences in
    the diverse, artistic environment of modern Savannah broadened her worldview. She embraces the city’s blend of historic preservation, contemporary art, and multicultural influences, reflecting a cultural
    identity rooted in Southern tradition yet open to new ideas and experiences.
