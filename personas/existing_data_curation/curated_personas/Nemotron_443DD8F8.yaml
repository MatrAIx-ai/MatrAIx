  hobbies: '[''Reading contemporary YA novels'', ''Journaling and reflective writing'', ''Baking Dominican pastries (empanadas, pastelitos)'', ''Nature and architectural photography'', ''Participating in
    the school robotics club'', ''Volunteering to tutor younger children in math and Spanish'']'
  career_goals: Francys aspires to combine her love of structure, science, and helping others by pursuing a career in biomedical engineering. She wants to earn a scholarship to a university with a strong
    engineering program, eventually contributing to the design of medical devices that improve patient care. In the short term, she plans to take advanced STEM courses, join the robotics club, and seek
    summer internships or mentorships in health-tech fields.
