personas:
  professional: A budding illustrator named Chiquitta Lim spends afternoons in after‑school art workshops, where they volunteer at the local library to help younger children with crafts, and channel their
    compassionate, collaborative nature into creating bright watercolor scenes that celebrate community traditions like Juneteenth and Kwanzaa.
  sports: An enthusiastic participant named Chiquitta Lim plays in the Spring Valley Soccer Club during spring, cheers for the New York Knicks on cold evenings, and enjoys informal games at the neighborhood
    park, though they often skip practice when feeling stressed or disorganized.
  arts: A creative storyteller named Chiquitta Lim thrives on drawing fantasy characters with watercolors, drawing inspiration from artists like Basquiat and Miyazaki, listening to Beyoncé and Kendrick
    Lamar while they sketch, and writing short adventures in a journal that reflect their love of community service.
  travel: An adventurous explorer named Chiquitta Lim loves weekend trips to Central Park, the Bronx Zoo, and Bear Mountain State Park, dreams of visiting Paris and Disney World, and they prefer relaxed,
    family‑oriented travel that balances curiosity with the comfort of familiar routines.
  culinary: A budding home chef named Chiquitta Lim enjoys helping prepare collard greens, black‑eyed peas, and baked fish during family gatherings, experiments with making mac and cheese and banana‑strawberry
    smoothies, and they often use colorful watercolors to illustrate recipe ideas in a personal cookbook.
  core: Chiquitta Lim is a curious, art‑obsessed 10‑year‑old who balances watercolor sketches and LEGO builds with a habit of misplacing supplies, yet they always find time to volunteer at the library and
    care for friends.
background:
  cultural: Chiquitta is a Black girl raised in the diverse community of Spring Valley, NY, where African‑American cultural traditions are a vibrant part of daily life. Her family celebrates holidays such
    as Juneteenth and Kwanzaa, shares meals that feature dishes like collard greens, black‑eyed peas, and baked fish, and participates in local church activities that emphasize service and community cohesion.
    She is exposed to African‑American literature, music, and art through school programs and community events, which nurture her appreciation for creativity and her desire to help others.
