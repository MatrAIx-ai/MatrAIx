  career_goals: She dreams of becoming an illustrator or children's author, using her art and stories to inspire and comfort other kids. She also hopes to work as an elementary school teacher or youth mentor,
    where she can help children manage their emotions and foster a supportive community. In the long term, she envisions contributing to community art programs that promote mental‑health awareness, kindness,
    and cooperation.
