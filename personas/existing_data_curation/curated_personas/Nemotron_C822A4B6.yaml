  career_goals: Thomas is fascinated by community helpers and often imagines himself as a firefighter, drawn to the routine drills, teamwork, and the chance to protect his town. He also dreams of coaching
    a youth soccer team one day, seeing it as a way to combine his love for sports, leadership, and helping others. In the near term, he aims to earn his Boy Scout First Aid badge, become the captain of
    his school’s soccer team, and learn basic emergency safety skills, all steps toward his long‑term goal of joining the local fire department when he is older.
