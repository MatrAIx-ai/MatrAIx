personas:
  professional: Thomas is a budding LEGO architect and soccer enthusiast who spends afternoons organizing neighborhood games and dreams of one day designing playgrounds, combining their love of structure
    and teamwork with a practical, hands‑on mindset.
  sports: Thomas plays forward for the Larkspur Youth Soccer League, cheers for the Colorado Rapids during family game nights, rides a mountain bike on local trails every weekend, and values the camaraderie
    of team sports while maintaining a disciplined practice schedule.
  arts: Thomas draws whimsical cartoon characters inspired by classic Saturday morning shows, builds intricate LEGO cityscapes, and devours adventure books by authors like Rick Riordan, letting creative
    storytelling and tactile construction shape their playtime.
  travel: Thomas loves weekend trips to Rocky Mountain National Park for hiking, dreams of visiting Yellowstone with the family, and eagerly anticipates a future visit to Disneyland, balancing structured
    itinerary planning with spontaneous exploratory hikes.
  culinary: Thomas favors homemade mac and cheese, grilled cheese with cheddar, and enjoys helping prepare Thanksgiving turkey and cranberry sauce, while also savoring s’mores over campfires, reflecting
    a hearty palate anchored in family‑centric meals.
  core: Thomas is an energetic, routine‑loving 7‑year‑old who blends a practical outlook with imaginative play, thriving on outdoor adventures, LEGO creations, and community teamwork, all while occasionally
    indulging in candy impulsively.
background:
  cultural: Thomas comes from a white, middle‑class family that has deep roots in the Rocky Mountain region. His grandparents moved to Colorado from the Midwest in the 1950s, bringing a blend of Midwestern
    work ethic and western frontier spirit. The family values practicality, self‑reliance, and community involvement, often spending weekends hiking, fishing, or attending local festivals in Larkspur. They
    celebrate typical American traditions such as Fourth of July fireworks, Thanksgiving feasts, and seasonal holidays with extended family. Thomas attends a public elementary school where the curriculum
    emphasizes reading, math, and basic American history, and he participates in community activities like the Boy Scouts, reflecting the region’s emphasis on outdoor recreation and civic responsibility.
