personas:
  professional: Tabitha Isaacson, a seasoned community volunteer coordinator and neighborhood garden planner, they bring a practical, structured approach to budgeting, event organization, and mentoring
    new volunteers at the Auburndale senior center.
  sports: Tabitha Isaacson, an early‑morning birdwatcher and gentle exerciser, they stay active through leisurely walks on local nature trails, participate in a senior walking club, and cheerfully support
    the Atlanta Braves, Falcons, and Hawks while occasionally joining a low‑key community bowling league.
  arts: Tabitha Isaacson, an avid reader and music lover, they immerse themselves in Agatha Christie mysteries and Hilary Mantel historical novels, enjoy the gospel harmonies of Mahalia Jackson and folk
    tunes of Joan Baez, and attend monthly community theater productions while knitting a scarf during intermission.
  travel: Tabitha Isaacson, a methodical traveler, they favor low‑stress, heritage‑focused trips such as historic Savannah, the Blue Ridge Parkway, and a genealogical research tour in Oxford, England, and
    dream of a relaxed Mississippi River cruise, always budgeting travel expenses within their modest allowance.
  culinary: Tabitha Isaacson, a Southern comfort cooking enthusiast, they expertly prepare fried chicken, collard greens, buttery cornbread, and shrimp and grits using fresh garden produce like sweet potatoes
    and okra, and they enjoy sharing these meals at family gatherings despite a quirky habit of over‑salting a pot of beans when “just a pinch more” seems right.
  core: Tabitha Isaacson blends disciplined organization with solitary garden walks, charity knitting, and Southern cooking, they safeguard a modest budget, and they habitually misplace their reading glasses
    on the kitchen counter.
background:
  cultural: Tabitha was raised in a mid‑century white, Protestant family in the American South before relocating to central Florida. Her upbringing emphasized self‑reliance, community service, and traditional
    celebrations. She maintains Southern hospitality values, participates in her local church's activities, honors holidays like Thanksgiving and Christmas with family recipes, and respects the multicultural
    fabric of her Floridian community while holding onto the practical, modest ethos of her early life.
