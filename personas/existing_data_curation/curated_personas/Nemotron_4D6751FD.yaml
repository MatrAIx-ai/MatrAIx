  hobbies: '["Journaling", "Reading Young Adult fiction", "Sketching/drawing", "Listening to R&B and soul music", "Debate club", "Volunteering at church youth group", "Softball"]'
  career_goals: She aims to earn her GED within the next year, attend community college to study psychology or social work, and eventually become a school counselor or community mental health advocate.
    She values a stable, structured work environment where she can help peers navigate academic and emotional challenges, and she aspires to obtain certifications in counseling and youth mentorship. In
    the interim, she hopes to secure a part‑time internship at a local community center or youth program.
