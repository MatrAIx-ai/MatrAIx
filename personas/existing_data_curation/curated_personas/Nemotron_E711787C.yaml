  career_goals: Nida aims to transition from a solo real‑estate broker to establishing a boutique agency that blends sustainable housing with artistic design, positioning it as a regional leader in eco‑friendly
    property sales. She plans to mentor younger agents, develop a community workshop series on homeownership and design, and integrate virtual‑tour technology to broaden her market reach. In the long term,
    she envisions investing in small‑scale property development projects that reflect her cultural heritage and support local artisans.
