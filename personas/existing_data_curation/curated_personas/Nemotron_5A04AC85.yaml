    management and irrigation design'', ''Team leadership and staff training'', ''Regulatory compliance (USDA, NYS)'', ''Community outreach and educational program development'']'
  hobbies: '[''Birdwatching and nature photography'', ''Drone piloting for aerial scouting'', ''Farm‑to‑table cooking and fermentation'', ''Hiking and trail exploration'', ''Volunteering at community gardens
    and teaching sustainable gardening'', ''Attending farmer’s markets and local food festivals'', ''Reading science‑fiction and agritech literature'', ''Road trips to historic farms and agricultural heritage
    sites'']'
  career_goals: Erick aims to transform his operation into a model of regenerative, technology‑enabled agriculture that supplies premium produce to New York City markets while reducing carbon footprint.
    Over the next five years he plans to expand the farm’s acreage by 40 %, integrate a vertical‑farm greenhouse on an urban rooftop, and achieve full organic and carbon‑neutral certification. He also aspires
    to mentor emerging farmers through a regional apprenticeship program, publish case studies on data‑driven sustainability, and take on a leadership role within the New York State Sustainable Agriculture
    Council. Ultimately, Erick envisions his farm becoming a community hub that connects urban consumers with transparent, locally grown food.
