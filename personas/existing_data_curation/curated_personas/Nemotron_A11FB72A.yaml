  hobbies: '[''Visiting Art Galleries'', ''Street Photography'', ''Collecting Mexican Folk Art'', ''Playing Classical Guitar'', ''Gardening'', ''Reading Architecture and Design Books'', ''Volunteer Construction
    with Habitat for Humanity'', ''Cooking Traditional Mexican Cuisine'', ''Meditation'', ''Journaling'']'
  career_goals: Fidel aspires to advance to a senior construction director role, overseeing large‑scale mixed‑use developments that prioritize sustainable design and community impact. He plans to obtain
    the Certified Construction Manager (CCM) credential and ultimately launch his own consulting firm that partners with non‑profits to deliver affordable housing for underserved neighborhoods in Denver.
    He also seeks to formalize a mentorship program for young Mexican‑American tradespeople, fostering career growth and cultural pride within the industry.
