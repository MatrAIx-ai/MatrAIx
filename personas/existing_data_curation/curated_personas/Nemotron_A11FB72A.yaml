personas:
  professional: Fidel Calderon is a seasoned construction manager who blends fifteen years of on‑site leadership with a designer’s eye, leveraging bilingual communication, rigorous OSHA compliance, and
    sustainable material expertise to deliver complex mixed‑use projects while mentoring a diverse crew.
  sports: Fidel Calderon follows the Denver Broncos in the fall, cheers for the Colorado Avalanche during winter, supports the Denver Nuggets in the spring, and spends Saturday mornings hiking with the
    Denver Mountain Club while occasionally joining a local recreational soccer league.
  arts: Fidel Calderon nourishes his artistic side by sketching Denver’s street murals after visits to the Denver Art Museum, collecting vibrant Mexican folk art, and finding inspiration in the works of
    Frida Kahlo, Diego Rivera, and contemporary muralist Shepard Fairey, while unwinding at the piano playing classical guitar pieces by Andres Segovia.
  travel: Fidel Calderon prefers meticulously planned trips that blend cultural immersion with architectural discovery, having explored the historic neighborhoods of Guanajuato, the colonial charm of Oaxaca,
    and the modernist streets of Barcelona, while dreaming of a future hiking expedition through Patagonia’s Patagonian Andes.
  culinary: Fidel Calderon enjoys cooking authentic mole poblano, tamales, and fresh ceviche, skillfully combining roasted chilies, chocolate, and locally grown cilantro from his garden, yet admits to over‑seasoning
    his dishes when stress spikes.
  core: Fidel Calderon balances a meticulous professional mindset with a spontaneous love for street art, often juggling late‑night guitar sessions and occasional coffee‑filled insomnia caused by project
    worries.
background:
  cultural: Fidel was raised in Denver by Mexican immigrant parents, growing up in a bilingual household where Spanish was spoken daily and Mexican cultural celebrations—such as Día de los Muertos and Las
    Posadas—were central to family life. The strong sense of community and family solidarity characteristic of Mexican culture shaped his compassionate and cooperative nature. His heritage informs his appreciation
    for craftsmanship, vibrant color palettes, and traditional folk art, which he often incorporates into his personal and professional life. Maintaining close ties with the local Mexican‑American community,
    Fidel values collectivism, respect for elders, and the importance of giving back through community service.
attributes:
