personas:
  professional: Ryan Ortego, a 54‑year‑old practical craftsman turned aspiring mentor, channels decades of carpentry, automotive restoration, and farm equipment repair expertise into hands‑on community
    workshops while meticulously budgeting projects, selectively testing new tools, and channeling their competitive edge into local car‑show contests—all while maintaining a reliable, organized approach
    that balances curiosity with grounded practicality.
  sports: Ryan Ortego chews on a Packers‑themed snack while rooting for the Green Bay Packers each fall, joins the Milwaukee Bucks fan club for occasional pickup basketball games, spends weekends tracking
    deer with the Black Creek Hunting Association, and seasons their fitness by early‑morning trout fishing trips on Black Creek, blending competitive spirit with practical outdoor stamina.
  arts: Ryan Ortego unwinds after a long workshop day by listening to the gritty storytelling of Johnny Cash, the folk narratives of Bob Dylan, and the blue‑grass twang of Alison Krauss, while admiring
    the sleek lines of mids‑century modern furniture by Hans Wegner and occasionally catching a community theater staging of a classic John Steinbeck play featuring local talent like actor Mark Johnson,
    allowing them to draw creative inspiration for their woodworking designs.
  travel: Ryan Ortego prefers self‑planned, budget‑friendly road trips, charting weekend routes through Wisconsin’s Driftless Region to hike the picturesque bluffs of Door County, venturing north to Minnesota’s
    Boundary Waters for canoe‑fishing, and dreaming of an autumn pilgrimage to the historic shipyards of Gdańsk, Poland, to explore European woodworking heritage, all while they balance the desire for adventure
    with the practical constraints of family responsibilities.
  culinary: Ryan Ortego showcases solid cooking chops by slow‑smoking pork ribs with a rub of paprika, brown sugar, and hickory chips, simmering a hearty venison stew seasoned with juniper berries, garlic,
    and carrots, and topping off weekend barbecues with melted cheese‑curd fondue, all while they relish the tactile precision of their seasoned cast‑iron skillet.
  core: Ryan Ortego is a sturdy, 54‑year‑old hands‑on mentor who balances a love of vintage cars, hunting, and woodworking with a competitive edge, a skeptical eye on new trends, and a habit of hoarding
    spare parts in their cluttered workshop.
background:
  cultural: Ryan comes from a multi‑generational Midwest family with roots in German and Polish immigrants who settled in Wisconsin in the early 1900s. Raised in a rural, predominantly Lutheran community,
    he values self‑reliance, modesty, and community service. Traditions such as summer barn dances, cheese‑making festivals, and weekly church potlucks are a regular part of his life, reflecting the region's
    strong cultural emphasis on family and local heritage.
attributes:
  skills: '[''carpentry'', ''basic electrical work'', ''plumbing'', ''automotive maintenance'', ''small‑scale animal husbandry'', ''equipment troubleshooting'', ''budgeting and project planning'', ''outdoor
