  career_goals: Jacob aims to transition from student projects to professional independent filmmaking, targeting regional and national film festivals with socially relevant documentaries that spotlight
    Midwestern stories. In the next five years, he plans to launch his own modest production company, secure larger budgets, and collaborate with television networks to produce episodic content. He also
    aspires to mentor younger creators in his community, using his organizational skills to build supportive production pipelines while continually refining his artistic voice.
