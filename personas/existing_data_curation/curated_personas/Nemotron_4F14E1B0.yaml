personas:
  professional: Jacob Watts, a 20‑year‑old emerging filmmaker, merges a curiosity‑driven storytelling style with practical budgeting and tight scheduling expertise, leveraging Adobe Premiere, Final Cut
    Pro, and DaVinci Resolve while leading diverse shoot crews in a collaborative yet assertive manner that balances creative flexibility with reliable execution.
  sports: Jacob Watts, a 20‑year‑old filmmaker, stays active by playing pick‑up basketball at the Kalamazoo Rec Center and cheering on the Michigan Wolverines men’s basketball team while also joining the
    Kalamazoo Hoops Club for weekend games, and they complement this with regular hikes in Van Buren County parks during the summer months.
  arts: Jacob Watts, a 20‑year‑old video creator, channels a love for street photography inspired by Henri Cartier‑Bresson and a passion for indie cinema ranging from Ava DuVernay’s documentaries to Wes
    Anderson’s stylized narratives, while regularly attending live shows featuring Bon Iver and The War on Drugs at Kalamazoo’s Downtown Shell, and they often volunteer at community theater productions
    of Shakespeare’s Midsummer Night’s Dream.
  travel: Jacob Watts, a 20‑year‑old budding filmmaker, prefers spontaneous, budget‑friendly road trips with friends—such as weekend getaways to Chicago’s music scene, a summer hike at Sleeping Bear Dunes,
    and a spring visit to Nashville’s honky‑tonk bars—while dreaming of attending the Cannes Film Festival and exploring Iceland’s volcanic landscapes when finances allow.
  culinary: Jacob Watts, a 20‑year‑old film enthusiast, enjoys moderate cooking where they frequently grill fresh Lake Michigan perch tacos with lime‑quickened cabbage slaw, whip up avocado toast topped
    with radish and smoked paprika, and indulge in Friday night pizza slices topped with arugula and prosciutto while occasionally treating themselves to craft‑brew Belgian ales at downtown Kalamazoo bars.
  core: Jacob Watts bridges relentless curiosity and social energy with a tendency to over‑plan, turning worry into meticulous pre‑production checklists while still embracing spontaneous outings.
background:
  cultural: Jacob grew up in Kalamazoo, Michigan, within a predominantly white Midwestern upbringing that values community, modesty, and hard work. The local culture—shaped by the university environment,
    a vibrant arts scene, and strong sports traditions—has fostered his sociable, cooperative demeanor. Exposure to regional music festivals, craft brewing culture, and grassroots filmmaking events has
    instilled a blend of traditional Midwestern pragmatism and a curiosity for new artistic ideas. His background informs both his storytelling perspective and his collaborative approach to production.
