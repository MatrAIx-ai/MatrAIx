personas:
  professional: Evelyn Roper, an 80‑year‑old community volunteer and seasoned event planner in Venice, Florida, uses their associate’s degree in budgeting, natural empathy, and assertive storytelling to
    orchestrate senior‑center workshops, mentor younger volunteers, and spearhead a senior‑artist community mural project, all while embracing a relaxed, occasionally disorganized approach that highlights
    their love of flexibility.
  sports: Evelyn Roper, an 80‑year‑old active senior, enjoys gentle fitness through weekly yoga, walks along the beach with the Venice Senior Walking Club, and occasionally joins a pickleball group at the
    local community center, while cheering on the Tampa Bay Buccaneers in the fall and the Miami Heat during the NBA season, balancing relaxed enthusiasm with occasional competitive spirit.
  arts: Evelyn Roper, an 80‑year‑old art enthusiast, frequents the Venice Museum of Art to study Monet’s water lilies and local painter Maria Gonzales’ botanical canvases, attends community theater productions
    of Tennessee Williams’ The Glass Menagerie, swears by the soulful crooning of Joni Mitchell and the rhythmic jazz of the Papa John’s Legacy Band, and captures their own visual stories through digital
    photography of Gulf Coast sunsets, weaving these experiences into their charismatic storytelling.
  travel: Evelyn Roper, an 80‑year‑old retiree, prefers meticulously planned yet leisurely weekend cruises to the Florida Keys, Sanibel Island, and occasionally the Bahamas, while also cherishing longer
    road trips to historic Savannah, Georgia, and a nostalgic pilgrimage to Florence, Italy, balancing their love for relaxed coastal scenery with a curiosity for cultural heritage.
  culinary: Evelyn Roper, an 80‑year‑old culinary hobbyist, delights in preparing Mediterranean‑inspired feasts such as grilled branzino with lemon‑oregano drizzle, roasted vegetable ratatouille layered
    with zucchini, eggplant, and fresh basil, as well as saffron‑infused seafood paella rich with clams, shrimp, and smoked paprika, often pairing them with a glass of crisp rosé while inviting friends
    to their garden for relaxed al fresco dining.
  core: Evelyn Roper, an 80‑year‑old lifelong learner, blends a laid‑back coastal vibe with relentless curiosity, juggling community mural dreams, occasional disorganized calendars, and a habit of worrying
    about every detail, while they still find joy in sunrise bird‑watching and Mediterranean cooking.
background:
  cultural: Evelyn grew up in the post‑World War II Midwest before moving to Florida in the early 1970s. Her white American heritage is rooted in mid‑century suburban values, tempered by the social upheavals
    of the 1960s that sparked her curiosity and openness to unconventional ideas. Living in Venice, Florida for the past four decades has infused her with a coastal, laid‑back lifestyle that values community,
    art, and the outdoors. She identifies with the broader Southern‑Florida retiree culture, which blends a love for beach life, volunteerism, and a diverse artistic scene, while retaining an appreciation
    for traditional American holidays and family gatherings.
