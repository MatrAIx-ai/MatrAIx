  hobbies: '[ ''Visiting art museums and galleries'', ''Attending community theater and concerts'', ''Gardening (roses, hibiscus, vegetable garden)'', ''Book club (contemporary fiction & memoirs)'', ''Cooking
    Mediterranean‑inspired meals'', ''Bird‑watching along the Gulf Coast'', ''Gentle yoga classes'', ''Weekend cruises to nearby islands'', ''Volunteering as a docent at a historic lighthouse'', ''Digital
    photography'' ]'
  career_goals: Even in retirement, Evelyn remains driven to expand her horizons. She hopes to launch a community mural project that brings together seniors and local artists, documenting the cultural heritage
    of Venice. She also aspires to write a memoir that weaves together her experiences from the civil rights era, the 1960s counterculture, and her present‑day reflections, potentially publishing it as
    a small press book. Evelyn wishes to continue learning, taking a digital photography class to capture the coastal landscapes and share them in a monthly exhibition at the local senior center. She aims
    to mentor younger volunteers, passing on her knowledge of event coordination and arts appreciation. Finally, she hopes to maintain her health and social connections by participating regularly in group
    exercise classes and social clubs.
