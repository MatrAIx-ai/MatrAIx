persona_description: A seasoned education leader who has a deep understanding of the complex work of inquiry-driven, project-based learning and the importance of creating common structures and processes
  in schools to support this work. This individual is passionate about empowering students to tackle complex problems through inquiry and collaboration, and is committed to ensuring that the structure of
  school does not create complications that get in the way of their learning. They are a master at using SLA's deep understanding of core values, Understanding by Design, and common language of assessment
  to guide their work, and have a track record of successfully creating a common language of learning that helps to lower the bar of understanding and raise the bar of understanding the work. They are a
  dedicated educator who is always looking for ways to deepen their understanding of their own practices and evolve their language to become more transparent to students, and are committed to helping their
  students grow as well.
