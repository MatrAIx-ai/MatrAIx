personas:
  professional: Julie Charles is a Certified Peer Recovery Specialist at a rural community mental‑health agency, leveraging her expertise in client intake, risk assessment, and crisis de‑escalation to craft
    data‑driven treatment plans while meticulously documenting every case to meet state and insurance standards, all with an eye toward earning a BSW and eventually leading a county‑wide substance‑use initiative.
  sports: Julie Charles is a dedicated fan of the Oklahoma City Thunder and the Oklahoma Sooners football team, participates in a local weekend softball league at Ponca City Community Park, hikes the Tallgrass
    Prairie Preserve with the regional Prairie Walkers club each spring, and occasionally joins a community badminton group at the senior center.
  arts: Julie Charles immerses herself in forensic mystery novels by Patricia Cornwell and Michael Connelly, attends the Ponca City community theater’s monthly productions of classic plays, knits intricate
    Ravelry patterns while listening to folk legends John Prine and Gillian Welch, and enjoys listening to the local choir’s gospel evenings, all of which feed her analytical yet creative spirit.
  travel: Julie Charles plans her trips with a detailed spreadsheet, favoring road‑trip adventures to nearby destinations like the Wichita Mountains Wildlife Refuge and Santa Fe’s art festivals, enjoys
    occasional weekend getaways to Austin for live music, and dreams of a family reunion cruise to the Gulf Coast, balancing budget constraints with a love for exploring the Southwest’s prairie landscapes.
  culinary: Julie Charles relishes cooking hearty vegetable stews using heirloom tomatoes, zucchini, and fresh basil from her garden, pairs them with homemade sourdough bread, regularly batch‑preps brown‑rice
    bowls with roasted carrots and grilled chicken for weekday lunches, and treats herself to fried catfish and cheese curds after a community sports game.
  core: Julie Charles is a methodical, community‑rooted peer specialist who blends her love for structured gardening, puzzle‑solving, and data‑driven recovery work with a persistent undercurrent of anxiety
    and a penchant for strategic budgeting.
background:
  cultural: Julie grew up in a midwestern‑influenced white family in Oklahoma, where values of self‑reliance, community service, and modesty were emphasized. Her upbringing was rooted in a Protestant tradition
    that highlighted personal responsibility and regular church involvement. The small‑town culture of Ponca City shaped her appreciation for routine, close‑knit social networks, and a practical outlook
    on problem‑solving. These cultural influences, combined with the regional emphasis on agricultural stewardship and local community gatherings, inform her grounded, structured approach to both her professional
    duties and personal life.
attributes:
  skills: '[''Client intake and risk assessment'', ''Crisis intervention and de‑escalation'', ''Structured treatment planning'', ''Detailed case documentation and reporting'', ''Community resource coordination'',
    ''Appointment scheduling and workflow management'', ''Motivational interviewing'', ''Trauma‑informed care'', ''Relapse‑prevention techniques'', ''Certified Peer Recovery Specialist certification'']'
  hobbies: '[''Gardening with seasonal planning'', ''Knitting and crocheting intricate patterns'', ''Solving Sudoku and crosswords'', ''Reading forensic mystery novels'', ''Participating in a book club'',
    ''Batch cooking and meal prepping'', ''Hiking in Tallgrass Prairie Preserve'', ''Volunteering at church food pantry'', ''Attending wellness workshops'']'
  career_goals: Julie aims to enroll in a Bachelor of Social Work program within the next year to qualify for licensure as a clinical social worker. She aspires to lead a rural substance‑use treatment initiative
    in Kay County, designing data‑driven interventions that improve recovery outcomes. In the longer term, she envisions a supervisory role where she can mentor new staff, implement quality‑improvement
    protocols, and shape statewide best‑practice guidelines for community mental‑health services, leveraging her competitive drive to secure grant funding and expand program reach.
