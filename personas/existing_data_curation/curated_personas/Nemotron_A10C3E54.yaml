personas:
  professional: Patsy Bragg, a meticulous bookkeeper and associate‑level accountant proficient in QuickBooks Online, Xero, and advanced Excel, leverages their methodical nature and love of structure, and
    they maintain flawless ledgers, execute month‑end closes, and communicate clear financial statements for small teams, all while planning their path toward CPA certification.
  sports: Patsy Bragg enjoys early morning walks around Lake Eola Park, supports the Orlando City SC soccer team by attending games with a small fan group, participates in monthly yoga sessions at a downtown
    studio, and they prefer low‑impact, routine‑driven fitness over high‑intensity sports, occasionally catching an Orlando Magic basketball game on TV.
  arts: Patsy Bragg finds artistic renewal in knitting patterns inspired by the geometric works of M.C. Escher, delights in the mystery novels of Agatha Christie at their book club, unwinds to the cello
    sonatas of Yo‑Yo Ma, and they occasionally attend community theatre productions of Shakespeare’s comedies performed by The Orlando Players.
  travel: Patsy Bragg favors meticulously planned short getaways, having already explored the historic streets of Savannah, Georgia, and the botanical gardens of Kyoto, Japan, while future travel dreams
    include a quiet retreat to the Blue Ridge Mountains and a scheduled kayaking expedition in Minnesota’s Boundary Waters.
  culinary: Patsy Bragg, a confident home cook who loves following precise recipes, regularly prepares classic Mediterranean dishes such as lemon‑herb roasted chicken and a perfectly timed risotto with
    Arborio rice, saffron, and Parmesan, and they occasionally indulge in a meticulously measured batch of chocolate chip cookies that require exact oven timing.
  core: Patsy Bragg is a detail‑driven, puzzle‑loving accountant who balances a love for structured routines with quiet creative pursuits, occasionally letting a spontaneous knitting project or a missed
    flossing session slip through their otherwise meticulous schedule.
background:
  cultural: Patsy grew up in a suburban, middle‑class family in Central Florida, immersed in mainstream American cultural traditions. Her upbringing emphasized hard work, education, and community involvement,
    values common to many white, middle‑class families in the region. She celebrates holidays such as Thanksgiving and Christmas, enjoys outdoor activities typical of Florida life, and values close‑knit
    friendships. While Orlando's multicultural environment informs her appreciation for diversity, Patsy's cultural identity remains rooted in a modest, family‑oriented American context, shaping her practical
    outlook and cooperative spirit.
attributes:
  skills: '[''General ledger maintenance'', ''Bank reconciliation'', ''Month‑end close procedures'', ''Financial statement preparation'', ''GAAP knowledge'', ''Basic tax filing'', ''Internal control implementation'',
