    with finance teams'', ''Regulatory compliance awareness'']'
  hobbies: '[''Puzzle solving (crosswords, Sudoku)'', ''Knitting'', ''Gardening'', ''Cooking (structured recipes)'', ''Morning walks in local parks'', ''Kayaking on nearby lakes'', ''Reading mystery novels'',
    ''Small book club participation'', ''Yoga'', ''Volunteer math tutoring'']'
  career_goals: Patsy aims to deepen her technical expertise and assume greater responsibility within the accounting field. Over the next two to three years she plans to enroll in a bachelor's program in
    accounting and pursue the Certified Public Accountant (CPA) certification. Achieving CPA will enable her to transition into a senior accountant or audit supervisor role at a mid‑sized firm. Long‑term,
    she envisions leading a small team or establishing her own boutique bookkeeping consultancy, while maintaining a stable work‑life balance and continuing to provide reliable, detail‑oriented financial
    services.
