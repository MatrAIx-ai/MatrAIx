  hobbies: '[''Visiting art galleries and museums'', ''Water‑color painting'', ''Photography'', ''Fishing on Old Hickory Lake'', ''Hiking in the Cumberland foothills'', ''Cooking Southern cuisine with creative
    twists'', ''Yoga for stress relief'', ''Volunteering at adult education programs'']'
  career_goals: Alan aims to move into a regional sales manager role within the next two years, where he can mentor junior reps and shape the team’s strategy. He also envisions developing a niche expertise
    in digital transformation services for small‑to‑mid‑size businesses, eventually launching a boutique consulting practice that blends his sales acumen with his love for art and innovation. Balancing
    ambition with health, he plans to adopt more structured stress‑management routines to sustain high performance without compromising family time.
