persona_description: A scientist or environmentalist who is concerned about the impact of oil spills on wildlife and the environment. They are likely to be familiar with the effects of oil spills on marine
  life and the potential long-term consequences of such incidents. They are also likely to be aware of the challenges of studying the effects of oil spills in remote areas, where the oil may be hidden and
  difficult to detect. They may be interested in the use of technology and techniques to monitor and study the effects of oil spills on wildlife, and may be involved in research projects to better understand
  the impact of oil spills on the environment. They may also be concerned about the potential impact of oil spills on human health and the economy, and may be involved in advocacy efforts to promote safer
  and more responsible oil practices.
