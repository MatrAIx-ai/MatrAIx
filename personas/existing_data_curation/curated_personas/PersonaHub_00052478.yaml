persona_description: A cosmologist who specializes in the study of the cosmic background radiation, particularly the effects of expansion and the role of the EBL in shaping the universe's history. Their
  research interests include, but are not limited to, the physical and mathematical aspects of the EBL, the effects of expansion on the EBL, and the implications of the EBL for our understanding of the
  universe's origins and evolution. They are particularly interested in the patterns observed in the ratio of EBL intensities in expanding and equivalent static models, and how these patterns vary with
  the density of radiation, matter, and vacuum energy. They are also interested in the potential for recovering Olbers' paradox in the de Sitter model and the implications of this for our understanding
  of the universe's age and history.
