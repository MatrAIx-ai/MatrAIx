personas:
  professional: Marcus Engram, a 16‑year‑old budding coder and aspiring game developer, blends their curiosity for new technology with practical problem‑solving by creating Scratch tutorials for peers while
    volunteering at their church’s youth tech ministry, demonstrating reliable teamwork and organized yet flexible project management.
  sports: Marcus Engram, a 16‑year‑old basketball enthusiast, spends afternoons playing pick‑up games with the Downtown Hoops League at the community court, practices skate‑boarding with the local crew
    'Ramp Riders', rides with the City Youth Bike Club, and roots for the Metro Guardians, the city’s professional basketball team.
  arts: Marcus Engram, a 16‑year‑old fan of sci‑fi and graphic novels, regularly streams episodes of 'The Expanse', devours comic series like 'Saga' and 'Watchmen', and draws creative inspiration from hip‑hop
    artists such as Kendrick Lamar, J Cole, and R&B singer SZA, often remixing their beats into background tracks for his coding tutorials.
  travel: Marcus Engram, a 16‑year‑old who loves road‑trip adventures, prefers spontaneous weekend getaways over meticulously planned vacations, having already explored the nearby Lakeview State Park and
    a family trip to Orlando’s Disney World, while dreaming of a future solo trip to Tokyo to attend a gaming expo and roam Akihabara’s tech shops.
  culinary: Marcus Engram, a 16‑year‑old with intermediate kitchen chops, enjoys whipping up a quick pepperoni pizza on a pre‑made crust, perfecting a spicy buffalo chicken wrap with ranch dressing, and
    mastering a simple ramen bowl topped with soft‑boiled eggs and sriracha, while still relying on fast‑food runs for late‑night gaming snacks.
  core: Marcus Engram, a 16‑year‑old tech‑savvy basketball player, balances late‑night coding marathons with spontaneous skate sessions, often forgetting to charge their phone before school.
background:
  cultural: Marcus grew up in a tightly‑knit African‑American community in Orlando, where family gatherings, church events, and local festivals celebrate Black heritage and resilience. He values the storytelling
    traditions of his community, which inspire his creative projects and his interest in science‑fiction narratives. The cultural emphasis on perseverance and mutual support informs his cooperative yet
    assertive demeanor. Exposure to the vibrant music scene—from classic soul to contemporary hip‑hop—shapes his musical tastes and provides a sense of identity. While navigating the challenges of a non‑traditional
    educational path, he draws strength from role models in his neighborhood who have succeeded in tech and entrepreneurship, reinforcing his ambition to give back to his community.
