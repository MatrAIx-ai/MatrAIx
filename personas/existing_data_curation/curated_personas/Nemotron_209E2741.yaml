  career_goals: Marcus aims to earn his GED within the next year and enroll in a community college program focused on computer science or network engineering. He dreams of turning his love for coding into
    a career as a game developer or IT support specialist, where he can blend creativity with practical problem‑solving. He also envisions working part‑time in a local tech repair shop to gain real‑world
    experience while supporting his family. Long‑term, he hopes to obtain industry certifications (such as CompTIA A+ and Cisco CCNA) and eventually lead a team that designs user‑friendly software solutions
    for everyday problems.
