personas:
  professional: Breanna Dantzler blends her occupational health and safety expertise with a humanities‑inspired people‑centered lens, delivering ergonomic risk assessments, OSHA‑compliant programs, and
    creatively designed safety signage while championing mentorship for women in the field.
  sports: Breanna Dantzler hikes the Appalachian Trail sections in New Jersey state parks, follows a local running club that meets for weekend 5Ks, roots for the New York Giants and New Jersey Devils, and
    incorporates yoga sessions twice a week to balance strength and flexibility.
  arts: Breanna Dantzler spends evenings sketching watercolor scenes of Newark’s waterfront, curates a small Instagram feed of street photography, attends independent productions at the Montclair Theatre
    Company, and finds inspiration in the works of Georgia O'Keeffe, Marina Abramović, and contemporary novelist Sally Rooney.
  travel: Breanna Dantzler prefers meticulously planned weekend road trips to nearby destinations like the Catskills and Cape Cod, dreams of a solo cultural immersion in Kyoto’s temples, and balances travel
    ambitions with a modest budget that prioritizes experiences over luxury accommodations.
  culinary: Breanna Dantzler enjoys experimenting with Mediterranean cuisine, frequently prepares homemade hummus with fresh lemon and tahini, perfects a weeknight avocado‑basil pasta, and treats herself
    to artisanal cheese boards featuring goat cheese and aged cheddar while occasionally over‑seasoning in the pursuit of bold flavors.
  core: Breanna Dantzler is a curious safety professional who mixes creative arts with data‑driven ergonomics, channels her community‑spirit into mentorship, and balances disciplined budgeting with a love
    for spontaneous cultural adventures.
background:
  cultural: Breanna grew up in a middle‑class, suburban setting in New Jersey, immersed in mainstream American culture while benefiting from the state’s ethnic and cultural diversity. Her family emphasized
    education, curiosity, and community involvement, encouraging visits to cultural institutions and participation in local volunteer efforts. As a white woman entering the traditionally male‑dominated
    field of occupational safety, she carries an awareness of gender dynamics, which fuels her commitment to mentorship and inclusive workplace practices. Her humanities education and exposure to both urban
    and natural New Jersey environments shape a worldview that values creativity, social responsibility, and personal well‑being.
attributes:
  skills: '["OSHA regulations","Risk assessment","Ergonomic evaluations","Incident investigation","Safety training design","Compliance auditing","Report writing","Data analysis (Excel, PowerBI)","Effective
