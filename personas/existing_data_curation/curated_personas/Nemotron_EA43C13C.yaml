  hobbies: '["Visiting art museums and galleries","Sketching and watercolor painting","Photography of urban and natural subjects","Reading contemporary fiction and philosophy","Hiking in local state parks","Yoga
    and mindfulness practice","Cooking experimental recipes","Volunteering for workplace safety workshops in community centers","DIY home improvement projects","Attending live music and theater performances"]'
  career_goals: Breanna aspires to earn the Certified Safety Professional (CSP) credential within the next three years and advance to a safety manager role overseeing a medium‑size manufacturing or healthcare
    facility. She plans to pursue a master’s degree in Occupational Safety and Health or Public Health to deepen her expertise in health promotion. Long‑term, she wants to lead the development of innovative,
    ergonomically‑informed safety programs that blend creative design with evidence‑based practices, and to become a speaker at national safety conferences while mentoring other women entering the field.
