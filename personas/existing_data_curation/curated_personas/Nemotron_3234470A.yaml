  career_goals: Dexie dreams of one day becoming an elementary school teacher because she values a structured, supportive classroom environment and enjoys guiding younger children. She also feels drawn
    to the idea of working as a pediatric nurse in the future, where she could combine her practical nature with a caring role that helps keep children healthy.
