personas:
  professional: Dexie Pok, an 11-year-old aspiring programmer, channels their methodical nature and love for puzzles into creating simple, well-structured games in Scratch, often meticulously documenting
    each step and meeting project deadlines with dependable consistency.
  sports: Dexie Pok enjoys swimming at the local community pool during summer and plays in the after-school youth soccer league with the 'Stars United' club, while cheering for the US Women's National Soccer
    Team and the Chicago Bulls whenever games air on TV.
  arts: Dexie Pok immerses themselves in storytelling by devouring J.K. Rowling's Harry Potter series and Rick Riordan's Percy Jackson books, practices the disciplined brush strokes of traditional calligraphy,
    brings Beethoven's Moonlight Sonata to life on piano, and constructs intricate LEGO Architecture models, all while finding inspiration from the cinematic worlds of Pixar's Toy Story and the visual poetry
    of Studio Ghibli's Spirited Away.
  travel: Dexie Pok prefers short, well-planned trips such as weekend visits to the Discovery Museum and a family vacation to the historic Kyoto Imperial Palace Gardens, while dreaming of future adventures
    to the Great Wall of China and the Grand Canyon, balancing detailed itinerary maps with spontaneous stops at local ice-cream parlors.
  culinary: Dexie Pok enjoys hands-on cooking, helping family prepare dumplings filled with pork and cabbage, steaming sticky rice balls flavored with ginger and soy sauce for Lunar New Year, and experimenting
    with herb-infused pasta using basil and mint from their indoor garden, while also savoring pizza topped with mozzarella and pepperoni and occasional sushi rolls with avocado and cucumber.
  core: Dexie Pok is a methodical 11-year-old who blends a love for puzzles, coding, and cultural traditions into a quietly driven life, often humming piano melodies while assembling LEGO sets and meticulously
    tracking every allowance cent.
background:
  cultural: Dexie is a Chinese‑American growing up in the vibrant neighborhoods of Brooklyn, Kings County. Her parents emigrated from Guangdong province and maintain many family traditions, including speaking
    Mandarin at home, celebrating Lunar New Year with dumplings and red envelopes, and attending a local weekend Chinese language school. The household values education, respect for elders, and harmony,
    which influence her disciplined routine and collaborative spirit. She also blends typical American childhood experiences—school, extracurricular clubs, and city life—with these cultural practices, creating
    a bicultural identity.
