persona_description: A psychologist who studies the effects of ancestral identity on cognitive performance and is skeptical of the idea that it can be used as a performance-enhancer. This persona is likely
  to have a background in social psychology and research on the effects of identity on behavior and cognition. They may have experience with priming and experimental design, and may be interested in the
  intersection of identity and cognitive abilities. This persona may also be concerned about the potential misuse of ancestral identity in educational settings and may seek to promote more balanced and
  inclusive approaches to identity and achievement.
