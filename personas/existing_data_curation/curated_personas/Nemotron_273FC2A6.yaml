personas:
  professional: Sunasia Johnson, a seasoned manager with over three decades of experience in retail and community‑service settings, leverages her talent for inclusive team leadership, data‑driven budgeting,
    and creative program design to champion regional arts initiatives and mentor emerging leaders.
  sports: Sunasia Johnson is an avid member of the Adairsville Walking Club, follows the Atlanta Braves during baseball season, plays recreational tennis at the local country club, and enjoys cheering on
    the Carroll County high school football team on Friday nights.
  arts: Sunasia Johnson immerses herself in the arts by curating visits to the Southern Museum of Art, creating vivid acrylic paintings inspired by Georgia O'Keeffe, capturing everyday moments through street
    photography, and performing in community theater productions ranging from classic dramas to contemporary comedies, while also leading a book club that explores modern fiction and voices from diverse
    cultural perspectives.
  travel: Sunasia Johnson plans her travel with a mix of detailed itineraries and spur‑of‑the‑moment excursions, favoring cultural festivals such as the Savannah Music Festival, New Orleans Mardi Gras,
    and the National Folk Festival, while also enjoying weekend road trips to the Blue Ridge Mountains and dreaming of a future art‑focused retreat in Santa Fe, New Mexico.
  culinary: Sunasia Johnson experiments with Southern‑inspired cuisine—crafting dishes like shrimp étouffée, collard greens with smoked turkey, and sweet‑potato pie—using fresh heirloom vegetables from
    her garden and aromatics like smoked paprika and fresh basil, though she occasionally over‑season or forgets to set timers, leading to a few charred attempts.
  core: Sunasia Johnson blends veteran managerial savvy with a restless creative spirit, championing inclusive community arts while juggling budget spreadsheets, health checkpoints, and a lively social
    calendar, all powered by a love of painting, gardening, and spontaneous cultural adventures.
background:
  cultural: Sunasia grew up in a close‑knit African‑American family in rural Georgia, steeped in the traditions of Southern Black churches, gospel music, and community cohesion. Her upbringing emphasized
    storytelling, respect for elders, and participation in cultural celebrations such as Juneteenth and Black History Month. These roots inspire her commitment to fostering inclusive spaces and highlighting
    Black artistic expression. She carries forward the legacy of the civil‑rights era through volunteer work, mentorship, and the promotion of cultural events that honor the African‑American experience
    in the South.
