  career_goals: Sunasia aims to advance into a regional director position where she can shape inclusive community‑arts initiatives across Floyd County and neighboring areas. She envisions launching a sustainable
    nonprofit that offers intergenerational art workshops, celebrates African‑American heritage, and provides mentorship pathways for young women of color entering leadership roles. Completing her bachelor's
    degree in nonprofit management is a near‑term goal, and she hopes to secure grant funding that expands cultural programming in underserved neighborhoods, leaving a lasting legacy of artistic empowerment
    and community cohesion.
