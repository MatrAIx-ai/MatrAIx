personas:
  professional: Shirley Bryant is a detail‑oriented aspiring health information manager who leverages her retail cash‑handling experience and bullet‑journal discipline to master medical billing and coding,
    aiming to secure a medical records specialist role while laying the groundwork for a home‑based natural‑hair business.
  sports: Shirley Bryant is a regular at her local gym’s HIIT and weight‑training sessions, follows the Los Angeles Lakers for basketball inspiration, and competes in online strategy gaming tournaments
    to keep her competitive edge sharp.
  arts: Shirley Bryant immerses herself in live jazz and blues shows, enthralled by artists like Kamasi Washington, Norah Jones, and B.B. King, while also lending her voice to the church choir and reading
    personal‑development titles such as Atomic Habits.
  travel: Shirley Bryant prefers curated short getaways, having explored New Orleans for its vibrant jazz scene and Savannah for Southern cuisine, while her bullet‑journal planning guides future trips to
    the coastal towns of the Carolinas and a cultural pilgrimage to Lagos to study African culinary roots.
  culinary: Shirley Bryant experiments with soul‑food classics like collard greens with smoked turkey and African-inspired dishes such as jollof rice and plantain‑tagine, often juggling sweet‑potato mash
    and Cajun spices, and enjoys perfecting braids while the kitchen smells of garlic and paprika.
  core: Shirley Bryant balances a skeptical, competitive drive with structured planning, turning bullet‑journaling, weight‑training, and strategic gaming into tools for achieving a future in health information
    management and a side hustle in natural‑hair styling, all while occasionally indulging in a spontaneous jazz night.
background:
  cultural: Shirley is rooted in the African‑American community of Kansas City, drawing on family traditions that blend Southern heritage, gospel music, and the vibrant local Black culture. Growing up,
    church gatherings, community festivals, and family storytelling shaped her sense of identity. She celebrates Juneteenth, engages with local Black cultural events such as the Kansas City Black History
    Month exhibits, and embraces natural‑hair care as a cultural expression. Her outlook is informed by the resilience and solidarity of the Black neighborhoods in Jackson County, and she values contributing
    back through volunteerism and cultural preservation.
attributes:
  skills: '[''Customer Service'', ''Cash Handling'', ''Basic Computer Literacy (MS Office, Google Suite)'', ''Spreadsheet Budgeting'', ''Time Management'', ''Event Coordination'', ''Hair Braiding and Natural
    Hair Care'', ''Meal Planning and Cooking'', ''Basic First Aid'', ''Conflict Resolution'']'
  hobbies: '[''Bullet Journaling'', ''Cooking (Southern and African‑inspired recipes)'', ''Competitive Online Gaming (strategy games)'', ''Fitness (weight training and HIIT)'', ''Reading Personal Development
    Books'', ''Volunteer Work (community center event coordination)'', ''Live Jazz and Blues Music'', ''Church Choir Singing'']'
  career_goals: Shirley aims to translate her knack for organization and detail into a stable, structured career in health information management. She plans to enroll in a community‑college associate program
    in medical billing and coding, obtain a Certified Professional Coder (CPC) credential within two years, and secure a position as a medical records specialist at a local hospital or clinic. Parallel
    to this, she dreams of launching a modest home‑based hair‑care business that offers braiding and natural‑hair styling services, leveraging her expertise while building financial independence and the
    ability to support her family.
