  career_goals: Barbara aspires to turn her curiosity about how things work and her practical mindset into a career that improves her community’s resilience and sustainability. She aims to study environmental
    engineering or sustainable urban planning at a university, focusing on green infrastructure, flood mitigation, and the integration of natural spaces into suburban development. She plans to secure internships
    with local engineering firms or the town’s planning department to gain hands‑on experience. Long‑term, Barbara hopes to become a civil engineer who designs eco‑friendly neighborhoods in the Research
    Triangle area, advocating for policies that balance growth with environmental stewardship. She also wants to mentor younger students through programs like 4‑H, sharing her love for science and practical
    problem‑solving.
