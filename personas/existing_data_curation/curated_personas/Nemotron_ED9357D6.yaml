  career_goals: Judy aims to complete her undergraduate studies in communications or public health while gaining hands‑on experience in community outreach. Her short‑term goal is to secure an internship
    or entry‑level role within a nonprofit organization that focuses on youth wellness or educational programming, where she can apply her event‑planning and networking strengths. Long‑term, she envisions
    becoming a program manager or community engagement specialist, designing inclusive events and outreach initiatives that promote health, education, and social cohesion. She values career paths that offer
    flexibility, collaborative environments, and the opportunity to make a tangible positive impact on her community.
