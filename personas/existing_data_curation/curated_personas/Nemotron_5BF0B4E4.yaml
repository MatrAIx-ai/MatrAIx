  hobbies: '[''Gardening'', ''Knitting'', ''Japanese‑American cooking'', ''Birdwatching'', ''Reading historical fiction'', ''Playing mahjong'', ''Attending cultural festivals'']'
  career_goals: Although retired from formal employment, Thu Eiko aims to preserve and share her cultural heritage. She plans to launch a weekly cooking class at the local community center focused on traditional
    Japanese recipes with accessible ingredients, and to mentor younger volunteers in organizing cultural events. She hopes to document her family's migration story and favorite recipes in a memoir that
    could be donated to the local historical society. Maintaining health and independence is a priority, so she aspires to stay active through gardening and light exercise, and she dreams of a short, senior‑friendly
    trip to Japan to visit her ancestral hometown and attend a seasonal festival.
