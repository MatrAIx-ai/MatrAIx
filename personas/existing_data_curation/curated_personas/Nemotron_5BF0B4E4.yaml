personas:
  professional: Thu Su, an 83‑year‑old retired cultural liaison, blends their bilingual fluency and decades of expertise in heritage cooking, garden stewardship, and sashiko stitching to volunteer at the
    Westland senior center, where they organize tea‑ceremony demos, intergenerational storytelling, and plan a weekly fusion‑cooking class, all while embracing a relaxed, flexible schedule that reflects
    their curiosity‑practical balance.
  sports: Thu Su enjoys leisurely walks in nearby parks for birdwatching, occasionally joins the Westland senior walking club, and cheerfully follows the Detroit Tigers and the University of Michigan Wolverines
    during baseball season, favoring gentle, social exercise over competitive sports.
  arts: Thu Su relaxes with classic Hollywood films such as 'Casablanca' and 'Singin’ in the Rain', reads historical novels by Ken Follett and James Clavell, and expresses creativity through knitting scarves
    and sashiko‑embellished wall hangings while listening to Louis Armstrong and admiring the impressionist paintings of Claude Monet.
  travel: Thu Su dreams of a senior‑friendly pilgrimage to their ancestral hometown during a seasonal festival, while also cherishing day trips to Michigan’s Mackinac Island and the cherry‑blossom festivities
    in Grand Rapids, preferring itineraries that balance cultural immersion with comfortable accommodations and flexible pacing.
  culinary: Thu Su’s culinary creativity shines in dishes like miso‑infused beet salad, salmon teriyaki paired with locally harvested fingerling potatoes, and matcha‑spiced pork tenderloin glazed with an
    apple‑cider reduction, all crafted from fresh herbs, lettuce, and tomatoes grown in their raised‑bed garden.
  core: Thu Su blends a love of garden, tea‑ceremony, and storytelling into a relaxed, inquisitive life, juggling gentle forgetfulness with a fierce commitment to preserving heritage and nurturing community.
background:
  cultural: Thu Eiko is a second‑generation Japanese American whose parents emigrated to the United States after World War II and settled in the Detroit metropolitan area. Growing up in Westland, Michigan,
    she was raised with a blend of Japanese traditions—such as tea ceremony, seasonal festivals, and cuisine—and Midwestern American customs, including community picnics and local sports events. She remains
    an active member of the local Japanese cultural association, participating in Obon dances, cherry‑blossom viewings, and language preservation programs. Her identity reflects a harmonious integration
    of her East Asian heritage with the values and lifestyle of the American Midwest.
attributes:
