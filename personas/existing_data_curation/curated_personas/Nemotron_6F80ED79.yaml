  career_goals: Stefan aims to advance to a senior records manager or administrative supervisor within the Vigo County Clerk’s Office, where he can apply his practical expertise to oversee larger teams
    and improve filing processes. He plans to obtain a Certified Records Manager (CRM) credential and to lead training workshops for new staff. Eventually, he envisions a stable, phased retirement that
    includes part‑time consulting on records best practices for local businesses and continued community volunteering.
