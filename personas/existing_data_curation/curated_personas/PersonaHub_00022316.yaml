persona_description: Katie Bouman is a postdoctoral researcher at the Event Horizon Telescope and future professor at Caltech, known for her role in the project to photograph the black hole, led by the
  astronomer and Harvard professor, Shep Doeleman. She has completed her undergraduate degree in electrical engineering at the University of Michigan, Ann Arbor, and has two masters degrees, one in engineering
  from the same university and another in electrical engineering and computer science from the Massachusetts Institute of Technology (MIT). Her research has helped to verify physical theories based on mathematical
  models and has contributed to the development of new technologies.
