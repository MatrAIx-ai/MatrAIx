    architecture competitions'', ''Yoga'', ''Journaling'', ''Mentoring aspiring architects'', ''Reading sci‑fi novels'', ''Volunteering for community design workshops'', ''Organizing networking events'']'
  career_goals: Camille’s primary ambition is to become a senior project lead and eventually a partner at her firm, steering flagship sustainable housing and public‑realm projects that address Phoenix’s
    extreme heat and water‑scarcity challenges. She aims to win national architecture competitions, secure LEED Platinum certifications for her projects, and earn AIA awards that showcase her innovative
    use of parametric and generative design. Over the next five years, she plans to build and lead a multidisciplinary design team, champion diversity by mentoring emerging Black architects, and serve on
    AIA committees that influence regional planning policy. Ultimately, she envisions launching her own boutique practice dedicated to affordable, culturally responsive, and climate‑resilient design, while
    leveraging her public‑speaking strengths to advocate for inclusive urban development.
