personas:
  professional: Camille Brown is a technically proficient architect who blends climate‑responsive massing and parametric design with a highly sociable, competitive edge, leveraging advanced BIM, Revit,
    Rhino and Grasshopper to deliver sustainable Phoenix projects while leading interdisciplinary teams and mentoring junior designers.
  sports: Camille Brown’s athletic interests revolve around desert hiking on trails like Camelback Mountain and the McDowell Sonoran Preserve, weekly salsa and hip‑hop dance classes that double as cardio,
    and a membership in the Phoenix Suns fandom, regularly attending basketball games and cheering for the Arizona Cardinals during football season, while also belonging to a local hiking meetup group called
    Desert Explorers.
  arts: Camille Brown expresses creative drive through photography of desert architecture—capturing the play of light on adobe walls à la Ansel Adams—and by performing in community salsa nights, while regularly
    attending exhibitions at the Phoenix Art Museum and drawing inspiration from musicians like Beyoncé and the band Calexico, whose Southwest‑infused sounds echo their fusion cooking style.
  travel: Camille Brown favors purposeful travel that blends architectural exploration with nature, having trekked the White Sands National Park, visited the historic adobe towns of Santa Fe, and scouted
    the modern glass towers of Dubai, while planning a future solo retreat to the Moroccan desert to study vernacular design and attend a design summit in Tokyo.
  culinary: Camille Brown enjoys crafting fusion dishes that marry Southern soul food with Southwestern flavors—such as chipotle‑glazed fried chicken with collard green‑poblano gnocchi, smoky black‑eyed
    pea tamales topped with pecan crumble, and mezcal‑infused cornbread—relying on ingredients like chiles, okra, smoked paprika, and hominy, and they regularly host dinner parties to showcase these experiments.
  core: Camille Brown is a fiercely competitive, socially magnetic architect whose love for desert light, dance, and fusion cuisine fuels an energetic, sometimes anxious drive to lead sustainable design
    projects while juggling intense emotional highs and occasional overindulgence in gear and gastronomy.
background:
  cultural: Camille is a second‑generation African‑American whose parents migrated from the Deep South to Phoenix in the 1990s, bringing with them a rich tradition of storytelling, music, and soul food.
    Growing up in a vibrant Black community, she participated in local cultural festivals and church choirs, fostering a strong sense of identity and resilience. She actively affiliates with the National
    Organization of Minority Architects (NOMA) and mentors youth through programs that encourage minorities to pursue STEM and design careers. Camille often incorporates subtle cultural motifs—such as geometric
    patterns inspired by African textiles—into her projects, aiming to create spaces that reflect both her heritage and the Southwestern context. Her lived experience as a Black woman in a predominantly
    white profession informs her advocacy for diversity, equity, and inclusion within architecture and urban planning.
