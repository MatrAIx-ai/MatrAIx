  career_goals: Prudence aims to enroll in an LPN program within the next two years to build on her nursing assistant experience and eventually qualify for a Registered Nurse license. She aspires to become
    a patient care coordinator in her current healthcare facility, where she can leverage her strong communication skills to improve patient flow and satisfaction. Additionally, she hopes to mentor new
    nursing assistants, lead community health workshops focused on preventive care for seniors, and stay engaged with emerging healthcare technologies. She envisions a balanced career that allows her to
    continue hands-on patient interaction while taking on leadership responsibilities that promote harmony and teamwork.
