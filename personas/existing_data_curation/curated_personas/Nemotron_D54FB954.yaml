personas:
  professional: Prudence Baker, a seasoned nursing assistant at Riverfront Medical Center, blends meticulous vital‑sign monitoring, EMR documentation, and CPR certification with a naturally sociable bedside
    manner, using their curiosity for emerging care techniques to mentor new aides while balancing the practical demands of a fast‑paced unit and eyeing an LPN program to become a patient‑care coordinator.
  sports: Prudence Baker, who enjoys weekly walks along the Huron River trail with the Riverwalk Walking Club, participates in lively line‑dancing sessions at the Rockwood Community Center, and proudly
    roots for the Detroit Tigers, Detroit Lions, and Michigan State Spartans, treats their modest cardio routine as a social ritual rather than a rigorous workout.
  arts: Prudence Baker, who devotes weekend evenings to reading contemporary fiction by authors such as Celeste Ng and historical biographies of figures like Rosalind Franklin, enjoys the melodic storytelling
    of Dolly Parton and the soothing piano works of Yiruma, and frequently attends the Ann Arbor Community Theatre’s productions of classic plays, letting these cultural experiences shape their leisurely
    gatherings.
  travel: Prudence Baker, who prefers well‑planned road trips that blend genealogy research with scenic relaxation, has explored Michigan’s Mackinac Island and the historic streets of Washington, D.C.,
    and dreams of a summer pilgrimage to an ancestral hometown in Ireland, all while budgeting trips to fit their family’s commitments.
  culinary: Prudence Baker, an enthusiastic home cook who rates themselves a solid comfort‑food chef, regularly whips up their signature chicken pot pie with a flaky crust, herb‑roasted carrots harvested
    from their garden, and a creamy apple crisp topped with locally sourced brown butter, while occasionally experimenting with a spicy Thai basil stir‑fry using fresh basil and chilies from the farmers’
    market.
  core: Prudence Baker, a talkative, garden‑tending nursing assistant who balances curiosity with practicality, can be found orchestrating community pot‑luck meals while meticulously tracking their blood
    pressure and budgeting for retirement.
background:
  cultural: Prudence was raised in a small town in Michigan’s Wayne County, where Midwestern values of hard work, modesty, and community support shaped her outlook. Her family’s heritage includes German
    and Irish ancestors who settled in the Great Lakes region in the early 20th century. Growing up, she was immersed in a close‑knit community that emphasized church involvement, family gatherings, and
    seasonal traditions such as county fairs and outdoor picnics. These cultural influences fostered her appreciation for cooperation, hospitality, and a practical yet curious approach to life.
