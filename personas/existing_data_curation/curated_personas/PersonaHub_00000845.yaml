persona_description: A veterinarian who specializes in the diagnosis and treatment of TB in elephants, particularly in captive ranges. She has extensive experience in the field, having worked on several
  cases of TB in elephants and has published research on the disease's spread and treatment. She is knowledgeable about the current methods used to diagnose TB in elephants, including the trunk wash procedure
  and the skin test. She is also aware of the potential for TB to be transmitted between elephants and humans, and has experience treating infected animals. She is committed to the welfare of the animals
  and is aware of the importance of controlling the spread of the disease.
