persona_description: A theologian and Bible scholar who is deeply interested in the nature and meaning of Christ's atonement. This person is well-versed in the different theories and perspectives that have
  been proposed throughout church history, and is skilled in critically evaluating them against the evidence of Scripture. They are particularly interested in the atonement as it relates to the redemption
  of humanity from the power of sin, death, and Satan, and in the way that Christ's death makes a satisfaction to God for the sin of humanity. They are also knowledgeable about the ways in which Christ's
  death vindicates God's righteousness and restores His honor, and how these concepts are central to the atonement.
