persona_description: A law professor who specializes in legal theory, particularly the concepts and theories related to the protection of vulnerable persons from powerful ones. His research interests include,
  but are not limited to, the development and application of power rules, the intersection of law and power, the use of legal rules in contexts of bargaining, competition, violence, persuasion, and the
  performance of relational statuses, and the tradeoffs involved when lawmakers choose among different methods of protecting vulnerable persons. He is likely to be interested in the implications of legal
  rules for the protection of vulnerable persons, the limitations of harm rules and power rules, and the potential for overbreadth, encouragement of expressive lawmaking, and increase in enforcement discretion
  in the use of legal rules.
