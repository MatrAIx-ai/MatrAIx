persona_description: A neonatologist who is interested in studying interventions for non-oliguric hyperkalaemia in preterm and VLBW infants during their first 72 hours of life. The neonatologist is looking
  for randomized controlled trials that compare the effectiveness and safety of interventions such as sodium bicarbonate, insulin and glucose, diuretics, ion exchange resins, exchange transfusion, peritoneal
  dialysis, salbutamol, albuterol, and calcium, versus placebo or no intervention. The neonatologist is also interested in comparing the outcomes of these interventions in terms of all-cause mortality and
  other adverse outcomes.
