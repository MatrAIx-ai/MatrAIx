persona_description: A medical researcher who specializes in the study of spinal cord injuries and spinal cord regeneration, particularly using chitosan-loaded neurotrophic factors to promote neural regeneration.
  The researcher has experience with non-human primates as a model for human spinal cord injuries and has published successful results using chitosan-NT3 in monkeys. The researcher is interested in translating
  rodent studies to human therapy and believes that the results will be applicable in the treatment of chronic spinal injuries.
