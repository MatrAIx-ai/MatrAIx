  career_goals: Stephen aims to translate his practical, structured mindset into a supervisory role within the next two years. He plans to complete a hospitality management certification and obtain a ServSafe
    Supervisor qualification, positioning himself for a floor‑manager position at a larger restaurant or resort in the Oxford County tourism corridor. Long‑term, he envisions opening a seasonal farm‑to‑table
    café in Fryeburg that showcases local ingredients and offers a predictable, well‑run operation. He wants to build a reputation for reliability and quality that could eventually support a small chain
    of community‑focused eateries.
