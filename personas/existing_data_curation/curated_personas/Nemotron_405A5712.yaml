personas:
  professional: Ezra Moore, a meticulous handyman‑in‑training, leverages disciplined project‑planning expertise and a love for both traditional carpentry and modern techniques, and they consistently deliver
    reliable home‑repair services while maintaining rigorous quality standards.
  sports: Ezra Moore stays fit by tending the garden and carving wood, boosts cardio with weekly jogs along the Willamette River trail, roots for the Portland Timbers and the Portland Trail Blazers, and
    they belong to the local Portland Hiking Club that organizes weekend hikes in the Columbia River Gorge.
  arts: Ezra Moore finds artistic solace in the tactile rhythm of woodworking, while evenings echo folk tunes from Woody Guthrie and The Avett Brothers, podcasts featuring design strategist Marie Kondo,
    and they enjoy board‑game nights with Settlers of Catan and Ticket to Ride.
  travel: Ezra Moore plans trips with spreadsheet precision, favoring low‑key road trips to the Oregon coast and the Columbia River Gorge, yet a long‑standing wish to explore Japan’s historic cedar forests
    of Yakushima and the zen gardens of Kyoto drives their next vacation savings goal, and they allocate a dedicated “travel” line item in their budget.
  culinary: Ezra Moore enjoys farm‑to‑table cooking, expertly canning heirloom tomatoes, pickled cucumbers, and homemade apple butter, while weekend meals often feature a rustic rosemary‑infused sourdough
    loaf topped with locally sourced smoked trout and fresh garden herbs, and they relish the ritual of tasting each preserved jar to fine‑tune the seasoning.
  core: Ezra Moore blends relentless organization with hands‑on curiosity, turning everyday chores into meticulous projects, yet they battle chronic worry that fuels late‑night spreadsheet checks and occasional
    over‑cooking of pantry staples.
background:
  cultural: Ezra was raised in a multi‑generational Midwestern family with German‑Polish roots in the Sheboygan County area. The region’s strong work ethic, modesty, and community‑centered values shaped
    his practical outlook and deep respect for family and church traditions. He grew up attending a Lutheran congregation, celebrating local festivals such as the county fair, and embracing the seasonal
    rhythms of rural life, which continue to influence his everyday habits and sense of identity.
attributes:
  skills: '["Home maintenance","Carpentry and woodworking","Budgeting and personal finance management","Project planning and scheduling","Community organization and volunteer coordination","Basic automotive
    repair and troubleshooting","Garden horticulture and organic gardening","IT troubleshooting and basic computer maintenance"]'
  hobbies: '["Woodworking","Organic gardening","Canning and food preservation","Reading DIY and non-fiction books","Listening to personal development and tech podcasts","Playing board games with friends","Volunteer
    work at local food bank","Birdwatching"]'
  career_goals: Ezra aims to translate his organizational talent and hands‑on skills into a sustainable small‑business venture, such as a handyman or landscaping service, while pursuing certification in
    home‑building trades. He also aspires to obtain an associate degree in business administration to strengthen his managerial capabilities, and to take on a leadership role on the local planning board,
    contributing to community development. To address his tendency toward worry, he plans to set realistic milestones and build resilience through structured personal‑growth routines.
