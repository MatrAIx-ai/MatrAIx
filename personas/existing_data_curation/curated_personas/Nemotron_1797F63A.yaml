personas:
  professional: Tammy Rosenbaum, an 85‑year‑old retired pilot‑engineer, leverages their methodical, competitive nature and decades of hands‑on experience in instrument and multi‑engine flight, turboprop
    and jet troubleshooting, and FAA compliance to mentor young aviators, author safety case studies, and they keep their pilot credentials current through occasional cross‑state flights.
  sports: Tammy Rosenbaum, an avid supporter of local teams, follows the Orlando Magic and the Tampa Bay Buccaneers on television, participates in a senior walking club that explores nearby nature trails
    twice weekly, and they occasionally pilot a community‑organized kite‑flying event at the local park, balancing their competitive spirit with low‑impact fitness.
  arts: Tammy Rosenbaum, an enthusiastic chronicler of aviation history, photographs vintage aircraft at airshows, immerses themselves in biographies of Amelia Earhart and Antoine de Saint‑Exupéry during
    the senior center book club, and they listen to classic crooners like Frank Sinatra while knitting a small scarf for their grandson.
  travel: Tammy Rosenbaum, a detail‑oriented traveler, prefers meticulously planned trips, favoring short‑duration visits to historic aviation sites such as the EAA AirVenture in Oshkosh, the Smithsonian
    National Air and Space Museum, and the historic Wright Brother’s bicycle shop in Dayton, while they rely on senior‑friendly accommodations and travel mostly with their medically cleared companion.
  culinary: Tammy Rosenbaum, a hearty home‑cook, enjoys preparing chicken pot pie and fresh garden salads with basil, thyme, and heirloom tomatoes from their plot, but occasionally forgets to refrigerate
    leftovers, leading to small food‑safety mishaps they laugh off after a quick cleanup.
  core: Tammy Rosenbaum is a fiercely organized, aviation‑obsessed octogenarian who channels their competitive edge into mentoring pilots, they meticulously track every penny, battle health anxieties, and
    find solace in vintage aircraft photography and well‑planned travel.
background:
  cultural: Tammy grew up in a post‑World War II middle‑class American family in the Midwest, where values of self‑reliance, punctuality, and respect for authority were emphasized. As a white woman coming
    of age during the 1950s and 1960s, she experienced the societal shifts of the civil‑rights and women’s‑liberation movements, which fueled her determination to pursue a career in a traditionally male‑dominated
    field. Her cultural upbringing combined a pragmatic, structured approach to life with a deep appreciation for community service and historical preservation, shaping her lifelong dedication to aviation
    and mentorship.
attributes:
