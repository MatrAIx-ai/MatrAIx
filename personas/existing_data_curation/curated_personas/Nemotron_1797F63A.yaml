  hobbies: '["Model aircraft construction","Flight simulation (Microsoft Flight Simulator)","Crossword puzzles and Sudoku","Community gardening","Photography of vintage aircraft","Walking nature trails","Volunteer
    storytelling at senior centers","Aviation history book club","Volunteer safety educator at local museum"]'
  career_goals: Even in retirement, Tammy aims to stay actively involved in aviation by maintaining her pilot credentials and logging occasional cross‑state flights to demonstrate that age does not diminish
    competence. She plans to mentor young pilots through local flight schools and the Experimental Aircraft Association, contribute safety case studies to industry publications, and serve as a volunteer
    safety educator at the Orlando Aviation History Museum. Additionally, she aspires to document her experiences in a memoir that highlights the challenges and breakthroughs of women in aviation during
    the mid‑20th century, preserving her legacy for future generations.
