persona_description: A meteorologist who specializes in tracking and predicting atmospheric rivers, specifically those responsible for high rainfall events and flooding potential. They have a deep understanding
  of the dynamic and energetic effects of moisture and have used new techniques and concepts to analyze and forecast these events. They are knowledgeable about the Earth System Research Laboratory's water
  vapour imagery and have used it to track and analyze atmospheric rivers and their impacts on coastal rainfall events, cyclone development, and flooding potential. They are also familiar with the Constellation
  Observing System for Meteorology, Ionosphere, and Climate (COSMIC) mission and the GFS projection.
