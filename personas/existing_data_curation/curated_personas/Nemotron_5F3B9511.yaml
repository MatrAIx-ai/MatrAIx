  career_goals: In her retirement, Mira aspires to channel her sociable energy and competitive spirit into leading a vibrant community arts initiative. She aims to establish a monthly art‑and‑craft workshop
    at the local community center, mentor younger volunteers in event planning, and eventually become a docent for the nearby historical museum where she can share her oral‑history expertise. A personal
    ambition is to travel to three renowned art museums—such as the Art Institute of Chicago, the Metropolitan Museum of Art, and the Smithsonian American Art Museum—while documenting her experiences in
    a memoir that celebrates lifelong learning and the richness of Midwestern culture.
