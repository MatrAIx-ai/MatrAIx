personas:
  professional: Mira Edney, an enterprising community arts catalyst, leverages her charismatic public speaking, competitive drive, and flexible, occasionally chaotic planning style to launch monthly art‑and‑craft
    workshops, mentor volunteer event planners, and pursue a docent role at the local historical museum, all while weaving oral‑history narratives into every program.
  sports: Mira Edney stays active by joining the local senior walking club that explores natural parks each Saturday, dabbling in a low‑key community badminton league during winter, and proudly cheering
    for the Chicago Cubs and the Milwaukee Bucks when televised, balancing casual fitness with a competitive spirit that loves a good home‑run rally.
  arts: Mira Edney devotes weekends to watercolor workshops inspired by Claude Monet, attends community theatre productions of Tennessee Williams plays, collects prints by local Midwestern painter Jenna
    Hart, and unwinds to the soulful jazz of Esperanza Spalding, all of which feed her lifelong narrative‑rich storytelling.
  travel: Mira Edney prefers spontaneous weekend getaways to historic towns like Savannah and nature retreats such as Acadia National Park, while meticulously planning yearly pilgrimages to the Art Institute
    of Chicago, the Metropolitan Museum of Art, and the Smithsonian American Art Museum, blending relaxed itineraries with a competitive urge to check every gallery off her bucket list.
  culinary: Mira Edney, a seasoned home chef, revels in crafting Thai green curry with fresh basil from her garden, perfecting ratatouille using sun‑kissed tomatoes and zucchini, and mastering sourdough
    bread in a community cooking class, often seasoning dishes with heirloom rosemary and peppercorns she grows herself.
  core: Mira Edney’s zest for community art, competitive spark, and love of spontaneous adventures is balanced by a delightfully haphazard approach to planning that leaves their kitchen counters cluttered
    with watercolor palettes, seed packets, and half‑finished travel itineraries.
background:
  cultural: Mira grew up in post‑war Illinois, absorbing the values of Midwestern small‑town life—community cohesion, modest independence, and a pragmatic yet generous outlook. Her family’s heritage is
    rooted in the broader white, European‑American tradition of the region, with deep ties to local churches, county fairs, and agricultural cycles. Though educated through high school, she has consistently
    engaged with cultural institutions such as museums, public libraries, and community theaters, reflecting a lifelong appreciation for art and learning. This background informs her strong sense of place,
    her commitment to preserving local history, and her keen interest in sharing cultural experiences across generations.
