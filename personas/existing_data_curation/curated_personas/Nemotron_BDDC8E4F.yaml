personas:
  professional: Raymond Ceci, a curious toddler who spends hours building block skyscrapers, demonstrates early engineering instincts and a practical problem-solving style, though they often abandon projects
    mid-construction in favor of newer ideas.
  sports: Raymond Ceci, a budding miniature soccer enthusiast who joins a local toddler soccer club on Saturday mornings, cheers for the hometown team the Seattle Sounders, and prefers gentle, unstructured
    play in the park over competitive matches, while they happily chase a soft ball with peers.
  arts: Raymond Ceci, an imaginative little artist who colors with Crayola crayons, especially loves drawing dinosaurs, and enjoys listening to the soothing lullabies of Israel Kamakawiwo'ole and the playful
    tunes of Randy Newman, and they often hum along, shaping their calm and compassionate demeanor.
  travel: Raymond Ceci, a tiny explorer who has visited Grandma's farmhouse in the countryside, taken a family road trip to the Grand Canyon, and dreams of seeing the colorful streets of Lisbon, favoring
    relaxed, short journeys with familiar adults over long flights, and they love snuggling in the car seat during short trips.
  culinary: Raymond Ceci, a picky yet adventurous eater who adores peanut butter on whole grain toast, sweet potato macaroni, and the occasional slice of ripe mango, often insists on using a small spoon
    to feed themselves, reflecting both curiosity and practicality, and they proudly claim the spoon as their own tool.
  core: Raymond Ceci is a calm, curious toddler who balances imaginative play with spontaneous generosity, prefers cozy routines over strict schedules, and navigates the world with a gentle, resilient spirit;
    they approach each new experience with quiet confidence.
background:
  cultural: Raymond comes from a white, middle-class family in Austin, Texas. His upbringing blends traditional Texan values—friendliness, a love for outdoor activities, and community spirit—with the city's
    diverse cultural scene, where he is exposed to live music, multicultural festivals, and a supportive neighborhood. His family celebrates classic American holidays and often participates in local events
    like the Austin City Limits Music Festival, fostering an early appreciation for music, community, and inclusive play.
