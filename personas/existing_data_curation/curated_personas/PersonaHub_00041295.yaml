persona_description: A nuclear engineer who specializes in the design and development of deep geologic repositories for the disposal of high-level radioactive waste. This persona is responsible for overseeing
  the planning and execution of the Yucca Mountain repository project, which is the DOE's chosen site for disposing of spent fuel and high-level radioactive waste. The persona is skilled in geologic and
  hydrologic conditions evaluation, repository design, and meeting NRC and EPA protection and safety requirements. They are also involved in the development of plans for a potential Monitored Retrievable
  Storage (MRS) facility, which could be used to receive and store spent fuel from commercial power reactors for subsequent shipment to a repository when such a facility becomes operational.
