persona_description: A historian or archaeologist interested in the prehistoric settlement of Butuan, the discovery and analysis of shell middens, and the cultural and historical significance of these findings.
  They are particularly interested in the radiocarbon dating analysis of the shell middens and how it pushes back the cultural chronology of Butuan's early settlement. They are also interested in the artifacts
  found at the site, including the stone flake tools and human remains, and how they contribute to our understanding of prehistoric life in the region.
