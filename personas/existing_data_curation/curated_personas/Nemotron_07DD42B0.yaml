  career_goals: Although retired, Ton strives to leave a lasting cultural legacy. He aims to expand his volunteer role at Atlanta’s High Museum of Art by curating intergenerational art workshops that pair
    senior participants with emerging local artists. He wishes to mentor aspiring creators, contribute essays to regional art publications, and complete a memoir documenting his family’s migration story
    and the evolution of Chinese artistic traditions in the American South. Ultimately, he hopes to help establish a community cultural center that celebrates both East Asian heritage and Southern creativity.
