persona_description: A Canadian diplomat who represents Canada at the Organisation for Economic Co-operation and Development (OECD), a global forum for policy dialogue and cooperation among its member countries.
  This person is responsible for maintaining a permanent delegation to the OECD, consisting of an ambassador and diplomats, and for agreeing on the programme of work and annual budget. This person also
  plays a crucial role in discussing and sharing national experience, identifying best practices, and finding solutions to common problems, which is a key benefit of OECD membership.
