  career_goals: Even though he is only seven, Jose already dreams about a future where he can combine his love for art and curiosity about how things work. He imagines becoming an artist‑inventor who designs
    colorful toys, or a community muralist who tells stories of his Salvadoran heritage. He also mentions wanting to help other kids learn, hinting at a possible aspiration to be a teacher or mentor in
    the future.
