personas:
  professional: Jose Marquez, a seven‑year‑old aspiring junior architect, blends a vivid imagination with meticulous planning by sketching fantastical scenes and constructing elaborate LEGO models, turning
    each creation into a miniature blueprint that showcases both curiosity and methodical precision.
  sports: Jose Marquez enthusiastically plays on the River Rangers youth soccer team, attends weekly practices with the local Thunder Cubs junior basketball club, avidly follows the hometown professional
    baseball team the City Dragons, and spends weekend afternoons riding a bike or scooter at the park, balancing structured team training with spontaneous outdoor games.
  arts: Jose Marquez immerses themselves in the arts by drawing colorful worlds inspired by Dr. Seuss, Oliver Jeffers, and neighborhood muralists, humming classic Disney soundtracks and Joan Baez folk songs,
    and attending community festivals where vibrant folkloric dances are performed, all of which fuel their storytelling and creative expression.
  travel: Jose Marquez dreams of exploring nearby attractions like the city’s botanical garden and Pine Lake camping site, cherishes a family beach getaway to San Diego, and longs to someday wander the
    ancient ruins of Machu Picchu, planning each outing with a hand‑drawn map and a packed backpack of sketching tools, snacks, and a magnifying glass.
  culinary: Jose Marquez delights in tasting festival staples such as cheese‑filled pupusas and sweet tamales, helps whisk arroz con leche with a grandparent, confidently assembles a peanut‑free grilled
    cheese sandwich with fresh tomato slices, and occasionally sneaks extra chocolate chips into homemade cookies, despite a habit of over‑indulging on sugary treats.
  core: Jose Marquez is a curious, organized seven‑year‑old who transforms each LEGO set, sketch, and snack into a meticulously planned adventure, while worrying over tiny details and thriving on both solitary
    creation and community celebration.
background:
  cultural: Jose comes from a Salvadoran family that maintains strong ties to their cultural roots while living in East Boston. At home, Spanish is spoken alongside English, and family gatherings often
    feature traditional foods like pupusas and tamales. He celebrates holidays such as Three Kings Day and enjoys folkloric dance and music passed down from his grandparents. The vibrant Latino community
    in East Boston provides a supportive environment where he can see fellow Salvadoran children, attend bilingual school programs, and take part in local cultural events that reinforce his heritage.
