personas:
  professional: Duc Nguyen is a curious elementary school student who channels a budding engineer mindset into building intricate LEGO vehicles and futuristic cityscapes while nurturing artistic flair through
    watercolor sketches and disciplined recorder practice, balancing meticulous project planning with an open‑minded love of new ideas.
  sports: Duc Nguyen enjoys playing soccer with the neighborhood Junior Strikers team during the spring, taking swimming lessons at the Community Aquatics Club in the summer, and cheering for professional
    teams such as the New York Knicks (NBA) and the New York Yankees (MLB), often quoting their favorite players' names while practicing his own drills.
  arts: Duc Nguyen spends afternoons blending watercolors inspired by the vivid palettes of artist Mary Blair while humming folk melodies from the group The Little Folk, and they eagerly watch educational
    cartoons like "Octonauts" and "Wild Kratts" that spark their imagination for storytelling and illustration.
  travel: Duc Nguyen has explored the nearby state park's dinosaur fossil exhibit, taken a family road trip to the seaside town of Oceanview, and dreams of visiting the Great Barrier Reef in Australia and
    the planetarium in Tokyo to see real stars up close.
  culinary: Duc Nguyen loves rolling rice paper into fresh spring rolls filled with shrimp, carrots, cilantro, and rice noodles, enjoys devouring cheesy pizza topped with mozzarella, pepperoni, and basil,
    and often helps whisk together chocolate chip cookies using butter, brown sugar, and vanilla.
  core: Duc Nguyen is a bright, organized yet imaginative 7‑year‑old who balances a love for building LEGO worlds with a habit of leaving scattered bricks around the living room, turning each cleanup into
    a mini adventure.
background:
  cultural: Duc is a first‑generation Vietnamese‑American living in Buffalo, New York. At home, his family speaks Vietnamese, celebrates traditional holidays such as Tet (Lunar New Year) and the Mid‑Autumn
    Festival, and prepares Vietnamese dishes like pho and bánh bò. He attends a public elementary school where he experiences American customs, holidays, and sports. The blend of his Vietnamese heritage
    and American environment shapes his values of respect for elders, community involvement, and curiosity about the wider world.
attributes:
  skills: '["drawing and sketching", "basic reading comprehension", "elementary arithmetic (addition and subtraction)", "LEGO building", "introductory coding with Scratch Jr.", "bilingual communication
