  hobbies: '["drawing and painting", "LEGO model building", "reading picture books about science and nature", "recorder playing", "exploring nature and collecting specimens", "solving jigsaw puzzles", "watching
    educational cartoons", "learning Vietnamese folk songs", "participating in Tet celebrations"]'
  career_goals: Duc dreams of becoming a creative engineer or designer who can blend art and technology. He imagines building robots that can paint or designing video games that tell stories about space
    exploration. He also likes the idea of an astronaut who discovers new worlds. In the longer term, he hopes to use his bilingual abilities to help bridge cultural gaps and inspire other kids to explore
    both science and art.
