personas:
  professional: Donald Cabrera, an aspiring game designer and LEGO engineer, blends curiosity with practicality in their creative projects, balancing open‑world gaming strategies with hands‑on building
    while staying relaxed about deadlines.
  sports: Donald Cabrera, a 13‑year‑old skateboarding enthusiast who frequents the local skate park and follows the Los Angeles Lakers, participates in a community youth fishing club and occasionally joins
    a middle‑school soccer team, balancing a love for freestyle movement with team sports.
  arts: Donald Cabrera, a 13‑year‑old digital illustrator who sketches sci‑fi comic characters in the school’s art club, draws inspiration from creators like Stan Lee and Alex Ross, and jams to pop hits
    from Billie Eilish, rap tracks by Lil Nas X, and zydeco tunes by Clifton Chenier, letting music shape their artistic style.
  travel: Donald Cabrera, a 13‑year‑old adventure‑leaning teen who has camped at Yosemite National Park and visited Disney World, dreams of exploring Tokyo’s Akihabara district for anime culture, preferring
    low‑cost family road trips but occasionally saving up for a larger international trip.
  culinary: Donald Cabrera, a 13‑year‑old with a budding interest in cooking, enjoys assembling pepperoni pizza at home, crafting fish tacos from weekend catches, and snacking on mac & cheese while experimenting
    with simple LEGO‑themed cookie designs, though they often rely on quick microwave meals.
  core: Donald Cabrera, a 13‑year‑old who blends gaming strategy, LEGO engineering, skateboarding freedom, and comic‑book creativity into a laid‑back yet curious outlook, often misplacing pieces and forgetting
    chores while dreaming of future game‑design fame.
background:
  cultural: Donald grew up in Broussard, a small town in Lafayette Parish, Louisiana, an area where Southern, Cajun, and Creole cultures intertwine. Although his family is of white, non‑Cajun heritage,
    they have embraced local traditions such as attending community festivals like the Broussard Catfish Festival, enjoying crawfish boils, and hearing zydeco music. Church gatherings, family meals, and
    the region's warm hospitality have shaped his sense of belonging. At his local public middle school, he interacts with peers from diverse backgrounds, exposing him to French‑derived place names, Creole
    cuisine, and the friendly, communal spirit characteristic of Acadiana. These cultural influences subtly inform his interests in music, food, and community activities.
