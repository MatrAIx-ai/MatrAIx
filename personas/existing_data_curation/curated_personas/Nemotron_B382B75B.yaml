  career_goals: Donald is fascinated by how video games are made and imagines a future as a game developer, where he can merge storytelling with programming. He is also intrigued by building physical things,
    so he aims to study engineering—especially mechanical or robotics—so he can turn ideas into working prototypes. He hopes to start or join a school tech club to share his coding and making enthusiasm,
    taking on a cooperative yet assertive role in guiding peers. Ultimately, he wants a career that lets him stay creative, solve practical problems, and maintain a flexible schedule that respects his need
    for both social interaction and alone time.
