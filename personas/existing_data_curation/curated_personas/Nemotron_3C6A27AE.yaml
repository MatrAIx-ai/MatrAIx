  hobbies: '[''Hiking (Pine Barrens and coastal trails)'', ''Yoga and mindfulness meditation'', ''Reading (science fiction and popular science)'', ''Cooking (Mediterranean cuisine)'', ''Volunteering at
    blood donation drives'', ''Community gardening'', ''Puzzle solving (crosswords, logic puzzles)'']'
  career_goals: Rosalin aspires to advance to a senior technologist or supervisory role within the laboratory, overseeing the molecular diagnostics unit. She plans to pursue a master’s degree in Clinical
    Laboratory Science or Public Health to deepen her expertise in genomic testing and epidemiology. Obtaining additional certifications, such as a Molecular Biology Specialist credential, is a key milestone.
    She is motivated to lead quality-improvement projects that reduce turnaround times and enhance patient safety. Long-term, she hopes to mentor junior technologists, contribute to research on infectious
    disease diagnostics, and become an advocate for integrating precision medicine into everyday clinical practice, all while maintaining a balanced lifestyle that supports her mental well-being.
