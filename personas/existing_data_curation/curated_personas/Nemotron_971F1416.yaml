  hobbies: '[''Gardening'', ''Woodworking/Carpentry Projects'', ''Cooking Ecuadorian Cuisine'', ''Latin Dance (Cumbia/Salsa)'', ''Participating in Community Festivals'', ''Volunteering at Local Senior Center'',
