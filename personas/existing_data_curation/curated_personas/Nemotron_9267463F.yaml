  hobbies: '["hiking", "birdwatching", "nature photography", "reading historical nonfiction", "knitting", "gardening", "participating in park clean‑ups", "attending local history lectures"]'
  career_goals: Jennifer aims to advance into a supervisory role within her department, such as a senior crossing guard or traffic safety coordinator, where she can influence policy and training programs.
    She plans to obtain an OSHA certification in occupational safety and health to broaden her expertise and eventually transition into a city‑wide safety inspection position. Long‑term, she envisions developing
    a community outreach initiative that educates schools and local businesses about pedestrian safety and stress‑reduction strategies for frontline workers.
