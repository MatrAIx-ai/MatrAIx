    at community health fairs'']'
  career_goals: Patricia aims to advance her nursing career by earning a Bachelor of Science in Nursing followed by a Master’s degree to become a Family Nurse Practitioner with a focus on mental health
    and integrative therapies. She hopes to lead a unit as a charge nurse, design and implement a hospital-based art-therapy program, and eventually open a community wellness center that blends conventional
    nursing care with creative expression. In parallel, she is committed to strengthening her time-management and organizational abilities to meet professional deadlines more consistently while maintaining
    her compassionate, patient-centered approach.
