personas:
  professional: Scott Carter is a seasoned financial manager in the Las Vegas hospitality and gaming sector, leveraging advanced Excel modeling, Oracle NetSuite, and rigorous risk management to drive strategic
    fiscal planning while channeling their curiosity and disciplined nature into integrating emerging fintech solutions for operational excellence.
  sports: Scott Carter spends Saturday mornings playing 18-hole golf at the Las Vegas Golf Club, participates in the club’s senior league, hikes the sandstone cliffs of Red Rock Canyon to stay active, and
    avidly follows the Las Vegas Raiders, Vegas Golden Knights, and Las Vegas Aces, cheering from his home’s big-screen TV.
  arts: Scott Carter frequents the Bellagio Gallery of Fine Art, collects emerging works by Tschabalala Self and Njideka Akunyili-Crosby, admires installations by Yayoi Kusama and Jeff Koons, paints experimental
    watercolors of desert sunrises, and enjoys experimental theater productions at The Smith Center featuring playwrights like Sarah Rudin and actors such as Tilda Swinton.
  travel: Scott Carter prefers meticulously planned luxury trips that blend art and adventure, having visited Florence’s Uffizi, Barcelona’s Picasso Museum, and the vineyards of Bordeaux, while also enjoying
    weekend desert escapes to Joshua Tree and a dream itinerary that includes a sunrise photography tour of the Sahara.
  culinary: Scott Carter is a moderate home cook who excels at preparing risotto with saffron and rosemary-infused lamb, savors expertly seared ahi tuna with wasabi mayo, enjoys beet and goat-cheese salads,
    and frequently pairs meals with pinot noir or vintage Cabernet Sauvignon during wine-tasting evenings.
  core: Scott Carter merges a disciplined financial mind with a voracious curiosity for art, desert landscapes, and fine wine, balancing meticulous planning with occasional impulsive gallery splurges and
    a penchant for early-morning sunrise hikes.
background:
  cultural: Scott grew up in a middle‑class Midwestern family before relocating to Las Vegas in his thirties. His white American heritage blends a traditional work ethic with the eclectic, hospitality‑driven
    culture of Nevada's desert city. Exposure to the city’s multicultural clientele and vibrant entertainment scene has opened him to diverse artistic expressions, while his Midwestern roots instilled values
    of diligence, community, and modesty. This mix informs his professional discipline, his appreciation for both classic American art and contemporary global works, and his balanced outlook on personal
    ambition and social responsibility.
