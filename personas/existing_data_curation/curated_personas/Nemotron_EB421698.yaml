personas:
  professional: Cameron Lachica is an aspiring digital illustrator and junior robotics enthusiast who blends hand-drawn character sketches with Scratch-coded animations, using their curiosity and organized
    work habits to prototype LEGO-based robots for school competitions.
  sports: Cameron Lachica enjoys hiking the nearby trails with the school's outdoor club, follows the local youth soccer team the Riverdale Rovers, and cheers for the professional baseball team the Seattle
    Mariners, while occasionally joining weekend bike rides and keeping a modest collection of collected rocks as trophies of their outdoor adventures.
  arts: Cameron Lachica immerses themselves in art by drawing comic panels inspired by Hayao Miyazaki’s films, painting miniature nature scenes after observing local birds, playing piano pieces from John
    Williams’ movie scores, and admiring the graphic novels of Neil Gaiman, all of which shape their creative voice and fuel their after-school art club projects.
  travel: Cameron Lachica loves exploring the countryside, has trekked the Blue Ridge Mountains and bird-watched in a nearby state park, dreams of camping under the Northern Lights in Iceland, and plans
    a future family trip to the geysers of Yellowstone, balancing a love for nature with the modest budget of a family of three.
  culinary: Cameron Lachica favors simple, colorful meals, often mixing fruit smoothies with strawberries, bananas, and a splash of almond milk, enjoys building homemade pizza topped with pepperoni and
    extra cheese, and delights in baking chocolate-chip cookies where they carefully measure flour and sugar, yet they sometimes forget to clean the kitchen after cooking.
  core: Cameron Lachica is an endlessly curious 11-year‑old who blends artistic imagination with a love for building robots, but habitually postpones homework for late‑night Minecraft sessions.
background:
  cultural: Cameron is raised in a close‑knit family in Jackson, Tennessee, where Southern hospitality, community involvement, and respect for tradition shape daily life. His family attends a local Baptist
    church, which offers youth groups and service projects that reinforce his sense of responsibility. The area’s agricultural roots and seasonal festivals—such as the West Tennessee Fair—expose him to
    rural landscapes, farm life, and regional foods like BBQ and fried green tomatoes. He enjoys local music, especially bluegrass and country tunes his grandparents play on the radio. At school, he benefits
    from community‑supported arts programs and participates in area events that celebrate Southern storytelling and craftsmanship. These cultural influences blend with his curiosity, encouraging him to
    explore new ideas while staying grounded in the values of his hometown.
