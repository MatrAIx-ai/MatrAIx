  career_goals: Cameron dreams of blending his love for art and technology by becoming a video game designer or interactive storyteller who creates worlds that inspire curiosity and imagination. In the
    short term, he aims to win a regional middle‑school art competition and to develop a more complex Scratch game that teaches scientific concepts. Long‑term, he hopes to attend a high school with strong
    arts and STEM programs, study graphic design or computer science, and eventually work on educational games that help children explore science and creativity. He also envisions contributing to his community
    by volunteering to teach art basics at the local library’s after‑school program.
