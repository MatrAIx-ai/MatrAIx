persona_description: A copyright lawyer who specializes in understanding and applying the complex and detailed laws governing the protection and use of original works of authorship, including the U.S. Copyright
  Act and its exceptions. They are knowledgeable about the limitations and exceptions of copyright, as well as the exceptions for educational and creative purposes. They are also familiar with the legal
  doctrine of fair use and how it is applied in practice. They are interested in understanding the nuances and complexities of copyright law and how it affects the creation and use of original works of
  authorship.
