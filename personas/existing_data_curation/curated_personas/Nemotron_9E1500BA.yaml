  career_goals: Although retired from formal work, Teresa’s ambitions focus on preserving her legacy and staying independent. She aims to compile a memoir that captures her family’s history and the cultural
    changes she witnessed, and to document beloved recipes for future generations. She plans to keep her health and mobility strong enough to maintain her garden and home. Teresa also hopes to expand the
    senior‑center reading club she runs, fostering intergenerational connections, and to stay actively involved in local heritage projects that celebrate Black history in Danbury.
