  hobbies: '[''Gardening'', ''Woodworking'', ''Salsa dancing'', ''Church choir participation'', ''Fishing'', ''Reading historical nonfiction'', ''Watching baseball'', ''Traveling to Puerto Rico'']'
  career_goals: Although officially retired, Enrique aims to deepen his impact on the Blue Ridge community by mentoring younger volunteers, preserving his Puerto Rican heritage through regular cooking workshops,
    and documenting his family's oral histories for future generations. He also aspires to stay physically active through gardening and light woodworking, and hopes to organize a multi‑generational cultural
    festival that celebrates both Puerto Rican and Texan traditions. A personal ambition is to make a pilgrimage back to Puerto Rico for a family reunion and to bring back stories and recipes that enrich
    his local community.
