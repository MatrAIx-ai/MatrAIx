  hobbies: '[''Recreational softball'', ''Potluck cooking'', ''Hiking'', ''Gardening'', ''DIY home‑improvement projects'', ''Yoga'', ''Reading mystery novels'', ''Volunteer work at senior center'']'
  career_goals: Looking ahead, Ashley aims to advance from laborer to crew foreperson and eventually launch her own small subcontracting business focused on energy‑efficient home renovations. She plans
    to earn an OSHA 30‑hour certification, obtain a commercial heavy‑equipment operator license, and complete a community‑college construction management associate degree. Over the next five years she hopes
    to lead her own crew, improve site safety culture, and build a reputation for reliability and practical innovation. Achieving these milestones will also provide greater financial stability, helping
    reduce the worry that often accompanies her work life.
