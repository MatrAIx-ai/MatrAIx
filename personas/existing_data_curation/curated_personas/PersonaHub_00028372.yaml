persona_description: A geneticist and researcher who specializes in the study of equine genetics and the history of the thoroughbred breed. They are highly knowledgeable about the traditional organization
  of female lines in thoroughbred pedigrees and the impact of recent research on this topic. They are likely to be familiar with the work of Dr. Emmeline Hill and her colleagues at the Smurfit Institute
  of Genetics, Trinity College, Dublin, Ireland, and have a keen interest in the implications of their findings for the pedigrees of thoroughbred horses. They may also have a background in genetics and
  have a strong interest in the development of new research methods and techniques in the field.
