personas:
  professional: Mary Lemoine, a 59‑year‑old custodial veteran, blends three decades of floor‑care mastery with an artist’s eye for aesthetics, using eco‑friendly chemicals and hands‑on troubleshooting to
    keep the facility spotless while fostering a relaxed, team‑centric atmosphere as they pursue a lead supervisor certification.
  sports: Mary Lemoine enjoys line‑dancing classes at the community center, cheers on the Orlando Magic and Orlando City SC, and occasionally joins a local walking group that meets every Saturday morning
    at Lake Eola.
  arts: Mary Lemoine devotes their free time to browsing the Kissimmee Arts Center, catching community theater productions of classics like 'Our Town,' and filling their playlist with The Beatles, Bob Dylan,
    and Joan Baez, while crocheting vibrant blankets inspired by the colors of local murals.
  travel: Mary Lemoine prefers spontaneous short‑haul getaways, often packing a tote for a one‑day adventure to Disney’s Magic Kingdom or the Florida Strawberry Festival, while dreaming of a future road
    trip to Savannah’s historic squares and New Orleans’ jazz streets.
  culinary: Mary Lemoine experiments in the kitchen with garden‑fresh basil pesto, Cuban picadillo, Haitian griot, and a Sunday batch of pho, favoring a seasoned cast‑iron skillet and relishing the occasional
    over‑simmered pot that they later transform into a flavorful soup base.
  core: Mary Lemoine, a 59‑year‑old eco‑conscious custodian with a flair for art, community theater, and line‑dancing, juggles a relaxed, occasionally disorganized life by anchoring themselves in mentorship,
    garden‑grown recipes, and spontaneous weekend outings.
background:
  cultural: Mary grew up in a middle‑class, predominantly white suburb of central Florida during the 1960s and 1970s, raised in a Christian family with European‑American heritage. Southern hospitality and
    a strong sense of community shaped her values. Living in Kissimmee, she has been immersed in a culturally rich environment where Hispanic, Caribbean, and other traditions mingle, fostering her openness
    to varied experiences. She participates in church activities, local festivals, and community gatherings, blending her traditional roots with the multicultural vibrancy of her region.
