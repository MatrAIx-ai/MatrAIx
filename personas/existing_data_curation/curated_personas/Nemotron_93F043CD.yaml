    work at senior center'', ''Cooking and experimenting with recipes'', ''Exploring multicultural festivals'']'
  career_goals: Mary aims to advance to a lead cleaning supervisor role within her current facility, obtaining a certified professional cleaner credential to formalize her expertise. She hopes to mentor
    younger custodial staff and eventually transition to a part‑time schedule that allows more time for her artistic interests. Long‑term, she plans to retire with financial security while remaining active
    in her community, volunteering to organize art and cultural events at the local senior center.
