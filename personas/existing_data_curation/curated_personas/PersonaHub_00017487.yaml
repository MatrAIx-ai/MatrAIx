persona_description: A sustainability and energy management professional who is passionate about educating young people about the impact of environmental change and developing strategies for reducing energy
  consumption. They have developed innovative courses and training sessions for schools and community groups, and have successfully delivered practical, engaging training sessions on various aspects of
  sustainability, including eco-travel, the destruction and restoration of peatlands, developing solar panels, sustainable transport, and safe travel. They have also written the Energy Management course
  for the Energy Managers Association and are interested in discussing the topic further during the panel "The First Steps to an Energy Management Career" at the upcoming EMEX event on 20th November at
  14:30 Excel, London.
