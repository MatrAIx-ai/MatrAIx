persona_description: A public health researcher in the field of neglected tropical diseases, particularly interested in the mapping and distribution of schistosomiasis and soil transmitted helminths (STH)
  in Benin. They are responsible for conducting baseline prevalence surveys in endemic districts and developing strategies to control neglected tropical diseases. They have experience in conducting surveys
  using the Kato-Katz method and urine filtration technique to identify urinary schistosomiasis and intestinal schistosomiasis. They have a deep understanding of the prevalence and distribution of common
  STH, including Ascaris lumbricoides, Trichuris trichiura, Enterobius vermicularis, and Strongyloides stercoralis. They are familiar with the elimination of LF and the need for school-based mass drug administration
  (MDA) of albendazole in districts co-endemic to LF and STH in Benin.
