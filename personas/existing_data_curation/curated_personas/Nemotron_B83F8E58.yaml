  career_goals: He aims to transition from client‑driven projects to purpose‑driven design, focusing on socially responsible and accessible visual solutions. Over the next five years, he plans to mentor
    emerging designers, especially those from underrepresented backgrounds, by leading workshops at local community centers and tech meet‑ups. He aspires to establish a boutique studio that merges art,
    technology, and social impact, producing educational visual content for STEM outreach and accessibility tools for non‑profit organizations. Additionally, he is exploring immersive media—AR/VR and interactive
    installations—so he can keep his practice at the frontier of creative technology while maintaining a flexible, low‑stress work rhythm that respects his preference for autonomy.
