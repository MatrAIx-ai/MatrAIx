personas:
  professional: Qian Mak, a seasoned graphic designer and data visualizer, combines two decades of expertise in UI/UX, generative art, and statistical storytelling with an open‑minded, relaxed work style
    that values flexibility and collaborative empathy, enabling them to translate complex concepts into accessible visual experiences while occasionally missing tight deadlines.
  sports: Qian Mak, an avid trail enthusiast and Sierra Club Bay Chapter member, follows the Golden State Warriors and the San Francisco Giants, and they incorporate weekend hikes along the Santa Cruz Mountains,
    occasional yoga, and casual frisbee games with friends into a low‑impact fitness routine that prioritizes mental clarity over competitive athletics.
  arts: Qian Mak, a frequent visitor to the San Francisco Museum of Modern Art and the de Young Museum, draws creative fuel from the immersive light installations of James Turrell and the whimsical patterns
    of Yayoi Kusama, while their evenings are filled with the improvisational sounds of Miles Davis and Kamasi Washington, which often echo in their generative Python art projects that blend algorithmic
    precision with calligraphic brushstrokes.
  travel: Qian Mak favors thoughtful, low‑stress travel, having trekked the cliffs of Big Sur, sampled farm‑to‑table cuisine in Napa Valley, and participated in a calligraphy workshop in Kyoto, while they
    keep a running wish‑list that includes the Milford Track in New Zealand and the historic port city of Lisbon for its pastel de nata and coastal vistas.
  culinary: Qian Mak, a self‑taught home chef, enjoys crafting fusion dishes like miso‑glazed salmon with sautéed bok choy, Szechuan‑pepper avocado toast, and hand‑rolled vegetable dim sum featuring California
    avocado, balancing moderate cooking confidence with a penchant for experimenting in the kitchen during weekend gatherings.
  core: Qian Mak, a curiosity‑driven designer who balances artistic exploration with a habit of misplacing deadlines, finds equilibrium in solitary hikes, calligraphy, and repeatedly reheated coffee.
background:
  cultural: Qian Dan Mak is a first‑generation American of Chinese heritage. His parents immigrated from Taiwan in the early 1970s, bringing with them Confucian values that emphasize harmony, respect for
    elders, and the importance of education. He grew up bilingual, speaking Mandarin at home while attending English‑language schools in the Bay Area. The family celebrates Lunar New Year and Mid‑Autumn
    Festival, and he maintains a connection to traditional arts such as ink painting and calligraphy. At the same time, his professional life in Palo Alto immersed him in the fast‑paced, innovation‑driven
    culture of Silicon Valley. This blend of Eastern emphasis on community and humility with Western openness to experimentation informs his compassionate, collaborative approach to design and his desire
    to create work that bridges cultural perspectives.
attributes:
