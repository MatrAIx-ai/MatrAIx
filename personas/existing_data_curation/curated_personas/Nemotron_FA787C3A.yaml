  hobbies: '[''Visiting art galleries and museums'', ''Sketching and digital illustration'', ''Photography'', ''Listening to jazz, hip‑hop, and soul music'', ''Reading speculative fiction and philosophy'',
    ''Journaling and poetry'', ''Cooking Southern comfort food'', ''Playing narrative‑driven video games'', ''Attending small live music events'', ''Participating in community art projects'']'
  career_goals: Johnnie aims to turn his creative passions into a sustainable freelance career that offers both artistic freedom and financial stability. He envisions establishing a modest design studio
    that serves local small businesses, non‑profits, and community arts projects, focusing on socially‑aware branding, murals, and digital storytelling that reflect Birmingham's cultural heritage. In the
    next few years he hopes to complete a certificate in graphic design to formalize his skill set, expand his client base, and eventually hire a small team of like‑minded creators. He also plans to incorporate
    regular mindfulness practices into his routine to manage stress and maintain the flexibility he values.
