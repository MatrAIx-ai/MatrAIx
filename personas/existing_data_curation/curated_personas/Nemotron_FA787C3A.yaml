personas:
  professional: Johnnie Bynum is a freelance graphic designer and visual storyteller who blends Adobe Photoshop, Illustrator, and web basics to craft socially‑aware branding, murals, and digital narratives
    for Birmingham’s small businesses and community projects, channeling a curious, relaxed approach while occasionally juggling deadlines in a delightfully disorganized fashion.
  sports: Johnnie Bynum is a weekend jogger along the Birmingham Riverwalk, an occasional pickup basketball player at the local YMCA, and a faithful fan of the Alabama Crimson Tide football and Birmingham
    Barons baseball, though they prefer low‑key fitness over organized league commitments.
  arts: Johnnie Bynum immerses themselves in Birmingham’s art scene, drawing inspiration from the Civil Rights Institute and murals by local street artists, while curating playlists featuring Miles Davis,
    Kendrick Lamar, and Solange, reading Octavia Butler and Nietzsche, and penning poetry that echoes the lyrical cadence of Langston Hughes.
  travel: Johnnie Bynum favors spontaneous road trips to nearby cultural gems like Savannah’s moss‑draped squares, New Orleans’ jazz districts, and Nashville’s music venues, while dreaming of a future visit
    to Marrakesh’s vibrant souks and Accra’s coastal markets, budgeting each adventure with a mix of Airbnb and Greyhound tickets.
  culinary: Johnnie Bynum delights in cooking Southern comfort dishes such as buttermilk‑fried chicken, collard greens simmered with smoked turkey, shrimp and grits spiked with cayenne, and sweet‑potato
    pie topped with toasted pecans, wielding ingredients like smoked paprika, fresh thyme, and hot sauce with a confident skillet‑hand but occasionally leaving the kitchen a mess.
  core: Johnnie Bynum is a creatively curious 25‑year‑old who merges soulful Southern roots with modern design, juggling freelance deadlines, anxiety spikes, and midnight art sessions while habitually forgetting
    to file taxes on time.
background:
  cultural: Johnnie grew up as a Black young adult in Birmingham, Alabama, a city steeped in civil‑rights history and vibrant Southern culture. His family traditions include church gatherings, soulful music,
    and home‑cooked Southern meals that carry stories of resilience and community. He was raised amid a neighborhood where storytelling, oral history, and community art projects are common, shaping his
    appreciation for visual expression as a form of cultural dialogue. While he embraces contemporary urban art and digital media, he also respects the legacy of African‑American artists from the South,
    seeing his own creative work as a continuation of that narrative. These cultural influences inform his aesthetic sensibilities, his commitment to community‑focused projects, and his desire to contribute
    positively to Birmingham's evolving cultural landscape.
