  career_goals: Cynthia aims to transition from contract work to establishing a boutique studio that specializes in high‑end decorative painting and sustainable interior finishes for discerning clients
    in Lincoln and the surrounding region. She envisions building a reputation as a go‑to artisan for custom murals and eco‑friendly paint solutions, eventually earning recognition from the Nebraska Arts
    Council. In the longer term, Cynthia hopes to share her expertise by offering limited‑capacity workshops on decorative techniques, mentoring emerging painters, and publishing a modest guide on sustainable
    interior aesthetics. While she values independence, she also aspires to secure a steady stream of premium commissions that allow her to work on her own terms and maintain a balanced, low‑stress lifestyle
    as she approaches retirement.
