persona_description: A systems thinker and STEM education advocate who is passionate about empowering African American youth to engage in STEM learning opportunities. The person is interested in building
  a model for community engagement in STEM education and is looking for a way to scale up their approach to other neighborhoods in Chicago and beyond. They have experience in facilitating community conversations,
  collaborating with diverse stakeholders, and developing community-driven strategies for broadening participation in STEM learning opportunities. The person is eager to share their model with the STEM
  Ecosystems Initiative and hopes to make a significant impact in the field of STEM education.
