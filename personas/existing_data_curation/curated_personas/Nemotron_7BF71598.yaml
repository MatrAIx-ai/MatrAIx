  hobbies: '[''visiting art galleries'', ''creating digital artwork'', ''attending open mic nights'', ''photography'', ''yoga and meditation'', ''hiking local trails'', ''cooking and hosting dinner parties'',
    ''volunteering at community events'', ''reading psychology and self‑help books'', ''creative journaling'', ''learning new languages'']'
  career_goals: Cheryl aims to complete a bachelor’s degree in communications or arts administration while gaining practical experience through internships at local museums, galleries, or non‑profit cultural
    organizations. She aspires to secure a role as a community outreach coordinator or marketing specialist where she can merge her organizational strengths with her passion for art and new ideas. In the
    longer term, she hopes to launch her own boutique event‑planning and art‑workshop business that offers innovative, community‑focused experiences while also advocating for mental‑health awareness in
    creative spaces.
