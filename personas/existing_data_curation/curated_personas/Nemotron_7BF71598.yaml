personas:
  professional: Cheryl Zeledon, a 22‑year‑old communications student, blends meticulous event‑planning prowess with a vibrant, talkative flair, so they design museum outreach programs that champion community
    engagement and mental‑health awareness.
  sports: Cheryl Zeledon fuels their weekend adrenaline by hiking the Blue Ridge Trail and attending sunrise yoga classes at the community studio, and they cheer loudly for the Seattle Seahawks during football
    season and the Seattle Sounders in every soccer match.
  arts: Cheryl Zeledon curates a vibrant personal gallery of digital collages inspired by Yayoi Kusama’s polka‑dot motifs, captures street portraits reminiscent of Sebastião Salgado, and they light up open‑mic
    nights with spoken‑word pieces that echo the rhythm of Maya Angelou’s prose.
  travel: Cheryl Zeledon spares a long weekend for road trips to Asheville’s eclectic art scene and dreams of strolling Kyoto’s temple gardens, and they plan each itinerary with a shared spreadsheet that
    lists budget‑friendly hostels, language‑exchange cafés, and must‑see museum exhibitions.
  culinary: Cheryl Zeledon whips up Mediterranean feasts like lamb souvlaki with tzatziki, seasons them with fresh oregano and lemon zest, and they host intimate dinner parties where they pair the dishes
    with a crisp rosé, though they sometimes over‑indulge in late‑night chocolate mousse.
  core: Cheryl Zeledon is a relentlessly organized social butterfly who turns anxiety into creative fuel, juggling art, yoga, and budget spreadsheets while occasionally hoarding artisanal cheese for midnight
    snack raids.
background:
  cultural: Cheryl is a White American raised in the upstate New York region, specifically Johnson City, Broome County. Her middle‑class family emphasizes education, community involvement, and appreciation
    for the arts. Growing up near a university town exposed her to a blend of small‑town sensibilities and vibrant campus culture. Her family’s European heritage—primarily Irish and German roots—combined
    with local traditions has shaped a cultural identity that values both regional customs and broader American cultural diversity.
attributes:
  skills: '[''event planning'', ''project coordination'', ''public speaking'', ''social media management'', ''basic graphic design'', ''creative writing'', ''research and analysis'', ''time management'',
