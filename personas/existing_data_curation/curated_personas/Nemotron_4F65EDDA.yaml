  hobbies: '[''Gardening'', ''Sketching and painting'', ''Visiting art galleries and museums'', ''Listening to jazz'', ''Birdwatching'', ''Hiking'', ''Reading historical biographies'', ''Volunteer work
    at senior center'']'
  career_goals: Though retired from formal employment, Oris is driven to leave a lasting cultural imprint on his neighborhood. He aims to establish a senior‑led art program at the local community center,
    mentor younger residents in both gardening and art appreciation, and compile a illustrated guide to the region’s artistic and natural history. He also hopes to deepen his own knowledge through online
    art‑history courses and to contribute volunteer hours to the local library’s heritage archive.
