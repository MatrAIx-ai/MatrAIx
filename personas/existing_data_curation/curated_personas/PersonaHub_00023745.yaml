persona_description: A fisheries expert with a deep understanding of the sustainable management practices, conservation efforts, and illegal fishing activities in various countries. They have extensive
  knowledge of the Indian Ocean Tuna Commission and its regulations, as well as the Inter-American Tropical Tuna Commission. They are familiar with the impacts of illegal small-scale fishing, shark finning,
  and overfishing on marine ecosystems. They have experience in monitoring and reporting on bycatch, and they are well-versed in the use of sustainable fishing gear and the challenges of implementing and
  enforcing regulations. They are dedicated to promoting sustainable fisheries practices and advocating for the protection of endangered species.
