  career_goals: Looking ahead, Calvin dreams of a career that lets him design and build things that work reliably. He is fascinated by bridges, buildings, and machines, and hopes to become a civil or mechanical
    engineer. He also expresses interest in computer programming, imagining a future where he could develop software tools that help organize projects. At this stage, his ambition is to excel in school,
    especially in STEM subjects, to lay a solid foundation for a future in engineering or technology.
