  career_goals: Even in retirement, Chasity aims to leave a lasting legacy by fostering interdisciplinary learning. She intends to develop a community science‑arts outreach program that brings together
    local schools, senior centers, and art galleries to explore scientific themes through visual media. She also hopes to curate a traveling exhibition that juxtaposes historical engineering achievements
    with contemporary Hawaiian art, highlighting themes of innovation and environmental stewardship. Additionally, she is working on a memoir that reflects on her experiences as a woman in STEM across the
    latter half of the 20th century, hoping it will inspire future generations.
