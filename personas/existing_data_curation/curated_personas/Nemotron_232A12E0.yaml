  hobbies: '[''Listening to R&B, hip‑hop, and Afrobeat'', ''Dancing (freestyle and hip‑hop)'', ''Sketching and drawing'', ''Creative writing (poetry and short stories)'', ''Cooking family recipes (collard
    greens, jambalaya, jollof rice)'', ''Volunteering at local food bank'', ''Bike riding and hiking local trails'', ''Participating in church events and community festivals'']'
  career_goals: In the short term, Latoya plans to enroll in a community college in Baltimore County to pursue an associate degree in Health Sciences with a focus on Certified Nursing Assistant (CNA) training.
    She aims to secure a CNA position at a local senior care facility to gain hands‑on experience and financial stability. Long‑term, she aspires to become a licensed practical nurse or health educator,
    enabling her to support the health needs of her neighborhood. At the same time, she dreams of launching a small online boutique that sells handmade accessories inspired by her West African heritage,
    blending her practical skills with creative entrepreneurship. Throughout her career, she wants to give back by mentoring younger teens in her community and organizing health‑awareness workshops.
