personas:
  professional: Latoya Sesay, a 19‑year‑old aspiring certified nursing assistant, they leverage their solid computer literacy, event‑planning experience, and pragmatic mindset to excel in structured clinical
    settings while occasionally letting their love for flexibility and social interaction guide spontaneous patient‑care initiatives and volunteer health workshops.
  sports: Latoya Sesay stays active by cycling the Patapsco River trails with the Baltimore Bike Club, cheering on the Baltimore Ravens during football season, catching Orioles games at Camden Yards in
    the summer, and squeezing in weekend pickup basketball at the community center whenever their study schedule permits.
  arts: Latoya Sesay channels their love of R&B and Afrobeat by curating playlists featuring H.E.R., SZA, Burna Boy, and Wizkid while sketching urban scenes in a Banksy‑inspired style and penning poetry
    influenced by Maya Angelou and spoken‑word artist Shane Koyczan, frequently sharing short video reels on their art club’s Instagram.
  travel: Latoya Sesay prefers low‑cost weekend escapades, hopping on a commuter train to explore Washington, D.C.’s museums, biking the Chesapeake Bay Loop, and soaking up the cultural festivals of New
    Orleans, all while keeping a travel journal of dream destinations like Marrakech and Lisbon for future design inspiration.
  culinary: Latoya Sesay, a competent home chef, whips up weekend family staples such as collard greens simmered with smoked turkey, spicy jambalaya brimming with rice, tomatoes, and Andouille sausage,
    and fragrant jollof rice seasoned with thyme, bell peppers, and Scotch bonnet chilies, while also experimenting with avocado toast topped with chili flakes for quick meals.
  core: Latoya Sesay is a practical yet free‑spirited teen who balances structured CNA studies with spontaneous accessory crafting, occasionally neglects minor budgeting details, and energizes their world
    with late‑night dancing to R&B beats in their bedroom.
background:
  cultural: Latoya is a second‑generation African American whose family traces its roots to Sierra Leone; the surname Sesay reflects this West African heritage. Her parents blend West African traditions—such
    as celebrating Kwanzaa, preparing dishes like jollof rice and groundnut stew, and sharing oral storytelling—with broader African‑American cultural practices, including church involvement, Juneteenth
    observances, and community gatherings in Middle River, Maryland. Growing up in a diverse, working‑class neighborhood, she participates in local youth mentorship programs and church youth groups, which
    emphasize mutual support, cultural pride, and community service. These experiences shape her identity, giving her a strong sense of belonging to both her ancestral heritage and the contemporary Black
    community of Baltimore County.
attributes:
  skills: '[''Microsoft Office (Word, Excel, PowerPoint)'', ''Google Workspace'', ''Social media content creation'', ''Event planning'', ''Effective communication'', ''Conflict mediation'', ''Basic budgeting'',
