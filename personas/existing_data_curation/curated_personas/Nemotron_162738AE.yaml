  hobbies: '[''Watercolor Painting'', ''Reading Historical Fiction'', ''Genealogy Research'', ''Community Theater Participation'', ''Gardening'', ''Cooking Soul Food'', ''Traveling to Cultural Festivals'',
    ''Learning Digital Photography'', ''Volunteering at Local Library'', ''Attending Jazz Concerts'']'
  career_goals: Although retired from formal employment, Diana is passionate about expanding cultural and educational opportunities in her hometown of Port Byron. She aims to launch a community art series
    that showcases local artists and offers free workshops for seniors and youth. She also hopes to serve on the board of the regional library to champion adult education initiatives and to mentor younger
    teachers through a volunteer tutoring network. In the longer term, Diana aspires to compile a memoir that weaves together her own life story with the broader African‑American history of the Midwest,
    preserving oral histories for future generations.
