  hobbies: '[''Playing bongo drums'', ''Painting landscapes'', ''Cooking Dominican cuisine'', ''Attending art exhibitions'', ''Hiking'', ''Reading sports analytics literature'', ''Volunteering at cultural
    festivals'']'
  career_goals: Rodolfo aims to transition from local coaching to becoming a regional scouting director for a major league baseball organization, leveraging his data‑driven approach. He also aspires to
    establish a multi‑sport youth academy in Orange County that blends athletic training with creative arts, providing underserved children with holistic development opportunities. Ultimately, he seeks
    recognition as a community leader who bridges sports, culture, and education.
