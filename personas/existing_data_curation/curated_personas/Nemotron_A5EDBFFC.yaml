  hobbies: '[''Vegetable gardening'', ''Chess'', ''Woodworking'', ''Reading historical biographies'', ''Church choir participation'', ''Cooking Southern cuisine'', ''Mentoring youth in coding'', ''Walking
    in Lauritzen Gardens'', ''Listening to jazz and soul music'']'
  career_goals: Ryan aims to transition into a consulting and mentorship role that supports small businesses in Omaha with sustainable technology solutions and guides emerging Black software engineers.
    He plans to establish a community coding mentorship program, partner with local colleges to create internship pipelines, and advocate for mental‑health awareness within tech workplaces. Additionally,
    he aspires to author a memoir chronicling his journey through the evolving tech industry and the Civil Rights era, preserving his experiences for future generations.
