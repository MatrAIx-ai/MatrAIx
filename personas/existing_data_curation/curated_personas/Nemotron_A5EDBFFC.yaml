personas:
  professional: Veteran full‑stack software architect Ryan Ashman uses four decades of enterprise application design, legacy migration, and relational database mastery to methodically translate business
    strategy into reliable code; their disciplined, organized nature drives rigorous standards, exhaustive documentation, and a nurturing mentorship approach for Omaha’s emerging technologists.
  sports: Active senior Ryan Ashman supports the Omaha Storm Chasers and Nebraska Cornhuskers, joins the Omaha Senior Walking Club for daily strolls through Lauritzen Gardens, and occasionally plays recreational
    bowling at the community center, favoring low‑impact activities that match their methodical, health‑conscious routine.
  arts: Culturally engaged Ryan Ashman sings in his church choir, attends jazz nights featuring works by Miles Davis and John Coltrane, and finds inspiration in the prose of James Baldwin and Toni Morrison,
    weaving these artistic influences into everyday life.
  travel: Curious traveler Ryan Ashman prefers organized, moderate‑length road trips, having explored Washington, D.C. for its historic museums and Savannah for its Southern charm, while they aspire to
    a relaxed cultural tour of New Orleans' jazz scene and a future visit to London’s historic music venues, balancing travel plans with a fixed retirement budget.
  culinary: Seasoned home cook Ryan Ashman delights in preparing Southern comfort dishes such as crispy fried chicken, buttery collard greens with smoked ham hocks, and honey‑glazed sweet potatoes, using
    fresh vegetables from their garden and valuing generous, family‑style dining experiences.
  core: Methodical yet emotionally sensitive, Ryan Ashman balances a love for precision woodworking and jazz improvisation while battling occasional anxiety‑driven procrastination and a habit of over‑watering
    their garden.
background:
  cultural: Ryan grew up within Omaha’s close‑knit Black community during the Civil Rights era, shaping his values of perseverance, collective uplift, and cultural pride. He was deeply involved in his local
    Baptist church, which served as both a spiritual haven and a hub for community activism. His family’s roots trace back to the Great Migration, bringing Southern culinary traditions and gospel music
    to Nebraska. Over the years, Ryan has been active in the Omaha chapter of the NAACP and the Black Chamber of Commerce, mentoring young professionals and championing economic empowerment initiatives.
