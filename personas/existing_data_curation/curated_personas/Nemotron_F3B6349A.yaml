personas:
  professional: Julie Workneh, a diligent retail associate with a knack for visual storytelling, they leverage precise cash‑handling, POS mastery, and data entry expertise while using their curious, relaxed
    approach to transform store aisles into ever‑changing art installations, positioning themselves for a future supervisory role.
  sports: Julie Workneh, an avid yoga enthusiast who also enjoys weekend beach volleyball at Fort Lauderdale Beach and participates in the local Sunrise Run Club’s 5K training sessions, they cheer for the
    Miami Heat and Inter Miami CF, and prefer low‑pressure, community‑oriented fitness over competitive leagues.
  arts: Julie Workneh, a passionate sketcher and street‑photographer who roams the Riverwalk to capture urban textures, they regularly attend gallery openings featuring artists like Kehinde Wiley, Yinka Shonibare,
    and local muralist Maya Hernandez, and draw inspiration from their vibrant narratives to inform both personal art and retail displays.
  travel: Julie Workneh, a spontaneous yet budget‑conscious traveler, they spend long weekends exploring the historic streets of Charleston and the bustling food markets of Marrakech, plan annual trips
    to attend the New Orleans Jazz & Heritage Festival, and dream of a future immersion in the coffee‑growing hills of East Africa to trace the origins of their favorite brew.
  culinary: Julie Workneh, a relaxed home cook who delights in preparing traditional injera with teff flour, spicing doro wat with berbere and cardamom, and sharing aromatic coffee ceremonies using freshly
    roasted beans, while also experimenting with avocado toast topped with feta and cherry tomatoes for brunch gatherings.
  core: Julie Workneh, a curious curator of everyday aesthetics who balances a laid‑back, slightly disorganized lifestyle with a sharp eye for visual detail, they turn routine retail tasks into miniature
    art exhibitions while nurturing community ties through coffee rituals and spontaneous creativity.
background:
  cultural: Julie is an African‑American of Ethiopian descent, growing up in a bicultural household where Amharic language, Ethiopian Orthodox traditions, and community gatherings were central. In Fort
    Lauderdale’s diverse environment, she blends her heritage with the broader Black diaspora experience, celebrating holidays like Enkutatash and participating in local cultural festivals. This multicultural
    upbringing informs her taste in music, food, and visual arts, and she often incorporates Ethiopian motifs into her personal style and creative projects.
