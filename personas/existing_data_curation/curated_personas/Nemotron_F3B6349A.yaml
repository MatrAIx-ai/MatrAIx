  hobbies: '[''Art gallery visits'', ''Sketching'', ''Photography'', ''Reading about modern art and entrepreneurship'', ''Yoga and meditation'', ''Cooking Ethiopian cuisine'', ''Volunteer financial literacy
    tutoring'', ''Attending local art walks'']'
  career_goals: Julie aims to transition from a cashier role to a supervisory or store‑manager position within the next three years, using her business degree to improve operational efficiency and staff
    training. Long‑term, she aspires to open a boutique or an online marketplace that showcases contemporary African art and handmade crafts, merging her commercial expertise with her passion for art. She
    also plans to acquire certifications in retail management and explore a part‑time role in a local gallery to gain curatorial experience.
