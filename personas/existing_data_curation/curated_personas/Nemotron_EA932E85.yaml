  career_goals: Roger aims to transition into a mentorship and process‑improvement role within the next two years, leveraging his experience to coach newer representatives and help design more flexible
    service workflows that reflect his value of adaptability. He hopes to earn a Customer Experience Team Lead position, where he can influence policy, introduce new customer‑engagement tools, and champion
    a more human‑centered service culture. Concurrently, he plans to gradually reduce his hours to pursue volunteer work on the board of a local art museum and eventually write a series of reflective essays
    on his career and love of art.
