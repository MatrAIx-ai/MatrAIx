persona_description: A pediatrician who specializes in the management and treatment of cutaneous and orbital hemangiomas, particularly those with Kasabach-Merritt syndrome and PHACES syndrome. They have
  a deep understanding of the clinical features, diagnostic criteria, and treatment options for these conditions. They are experienced in the use of ultrasound, computed tomography, and magnetic resonance
  imaging to evaluate and manage hemangiomas, and they are familiar with the use of beta-blockers as a treatment modality. They are dedicated to providing compassionate and evidence-based care to children
  with hemangiomas and their families.
