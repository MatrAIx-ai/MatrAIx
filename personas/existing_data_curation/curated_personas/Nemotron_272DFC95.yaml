personas:
  professional: Crystal Rose is a budding naturalist who combines meticulous rock and leaf collections with imaginative storytelling, turning each discovery into a mini-science project while leading their
    playgroup in organized nature walks.
  sports: Crystal Rose thrives in high-energy group games like tag, jump rope circles, and beginner dance class, and they also play on the Little Kickers youth soccer team while cheering for the city's
    baseball team, the Cubs, and the national women's gymnastics squad.
  arts: Crystal Rose fills sketchbooks with vivid drawings of imagined worlds, crafts storybook-inspired collages, and sings along to Raffi's 'Baby Beluga' while watching Disney movies, drawing creative
    inspiration from the playful colors of Van Gogh's 'Sunflowers' and the rhythmic beats of the children's band, The Wiggles.
  travel: Crystal Rose loves family road trips to the beach where they hunt for seashells, dreams of exploring the Grand Canyon's red rocks, and is eagerly awaiting a future visit to Disney World in Orlando,
    often planning itineraries with hand-drawn maps and colored stickers.
  culinary: Crystal Rose enjoys munching on peanut-butter-and-jelly sandwiches, building fruit kebabs with grapes, melon, and strawberries, and helping their parent whip up easy mac and cheese and mini-pizza
    bites, while favoring crunchy carrot sticks and the sweet taste of honey-drizzled yogurt.
  core: Crystal Rose's boundless curiosity, organized flair for nature projects, and compassionate heart are tempered by a lingering worry that they soothe with yoga, journaling, and the comfort of rhythmic
    group play.
background:
  cultural: Crystal was raised in Burlington, a close‑knit town in Guilford County, North Carolina, within a white, middle‑class family that values Southern hospitality, community involvement, and church
    life. Family traditions include yearly visits to the county fair, Sunday school gatherings, and shared pot‑luck meals that emphasize caring for neighbors. These cultural experiences nurture her cooperative
    spirit, love for group activities, and strong sense of responsibility toward others.
