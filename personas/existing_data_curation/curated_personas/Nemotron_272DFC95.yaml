  hobbies: '[''playing tag'', ''dance class'', ''rock and leaf collection'', ''creative drawing and painting'', ''pet hamster care'', ''kid-friendly yoga'', ''keeping a feelings journal'', ''participating
    in school community projects'', ''church pot‑luck events'']'
  career_goals: Crystal imagines a future where she can help others every day. She dreams of becoming a teacher or a pediatric nurse, roles that let her share knowledge and care for kids. In the short term
    she aims to improve her school grades, make more friends, and become more confident in handling her worries. She also hopes to start a small community garden at school where children can learn about
    plants and teamwork.
