  hobbies: '[''Sketching'', ''Digital illustration'', ''Photography (landscape and urban)'', ''Visiting art galleries and museums'', ''Reading art history and philosophy'', ''Journaling and creative writing'',
    ''Listening to ambient and indie music'', ''Hiking in Minnesota state parks'', ''DIY woodworking and crafts'', ''Curating vintage print collection'']'
  career_goals: Leroy aims to transition from frontline retail to a role that blends commerce with creativity, such as visual merchandiser or e‑commerce manager for an arts‑focused brand. Over the next
    three years he plans to complete a bachelor's degree in marketing or art management, obtain certifications in digital marketing and web design, and deepen his expertise in social media retail strategies.
    His long‑term ambition is to launch his own boutique or online platform that showcases curated artworks and handcrafted goods, while holding a leadership position that offers autonomy and a quiet, focused
    work environment.
