  career_goals: Debra aims to re‑enter the workforce in a role that blends her people‑focused strengths with her organizational talent. She plans to obtain a Certified Nursing Assistant (CNA) or Personal
    Support Worker credential so she can work part‑time in home health care, providing stable income while maintaining flexible hours. Concurrently, she hopes to launch a modest home‑based business selling
    locally grown herbs and produce, using her gardening expertise. Over the next five years, she also intends to complete a bachelor’s degree in Business Administration online to eventually manage a small
    community‑focused boutique or co‑op. Her ambitions are grounded in a desire for financial security, a supportive work environment, and the ability to contribute positively to her Oakdale community.
