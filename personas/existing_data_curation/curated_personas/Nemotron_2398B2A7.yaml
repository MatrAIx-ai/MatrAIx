  career_goals: Elizabeth dreams of becoming someone who designs and builds solutions that help people, such as an engineer, a wildlife biologist, or a tech innovator. She aims to excel in school science
    fairs and robotics competitions, seeking recognition for inventive projects that blend her curiosity with real‑world impact. In the longer term, she hopes to study engineering or environmental science,
    eventually creating practical tools for sustainability and community well‑being.
