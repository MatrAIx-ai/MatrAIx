personas:
  professional: Elizabeth Lewis, an aspiring young engineer, channels her curiosity and practicality into designing functional LEGO mechanisms while meticulously cataloguing her woodland discoveries in
    a nature journal, and they often let their flexible, disorganized planning style and competitive spirit guide projects more than strict schedules.
  sports: Elizabeth Lewis, a spirited member of the Wolcott Youth Soccer League, dashes across the fall soccer field with a competitive edge, cheers for the New England Patriots on weekends, idolizes US
    Women’s National Team forward Alex Morgan, and they supplement formal practice with spontaneous backyard sprint drills and weekend hikes to keep fit.
  arts: Elizabeth Lewis, an avid young creator, spends evenings sketching detailed leaf studies while listening to Billie Eilish, immerses herself in Agatha Christie mystery novels, builds whimsical Scratch
    animations inspired by Pixar’s Toy Story, and they draw inspiration from LEGO artist Nathan Sawaya’s sculptural work.
  travel: Elizabeth Lewis prefers spontaneous day‑trips to nearby woods and the Connecticut River, enjoys the occasional family weekend at Mystic Seaport, dreams of exploring Yosemite National Park’s granite
    cliffs, and they plan each outing with a loose checklist rather than a rigid itinerary, balancing adventure with the comfort of familiar home base.
  culinary: Elizabeth Lewis loves helping her family bake chocolate chip cookies and simple apple crumble, experiments with adding raisins to oatmeal muffins, enjoys crafting homemade pizza with a variety
    of toppings like pepperoni and bell peppers, and they relish the tactile joy of kneading dough while often forgetting to tidy the kitchen afterward.
  core: Elizabeth Lewis is a curiosity‑driven, competitive ten‑year‑old who balances woodland explorations and LEGO engineering with a habit of misplacing her allowance and a skeptical eye toward others’
    motives, and they often juggle social games with solitary projects.
background:
  cultural: Elizabeth is raised in a white, middle‑class family in Wolcott, Connecticut, embodying typical New England suburban culture. Her household celebrates traditional American holidays such as Thanksgiving
    and Independence Day, and she is familiar with her family's Irish and English ancestry, which adds subtle cultural nuances to family stories and meals. The community places a strong emphasis on education,
    outdoor recreation, and participation in local library programs and town events, shaping her values of curiosity, practical learning, and modest competitiveness.
