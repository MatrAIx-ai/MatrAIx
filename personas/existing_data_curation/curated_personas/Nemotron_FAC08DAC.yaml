  hobbies: '[''Running'', ''Chess'', ''Sudoku'', ''Contemporary American Literature'', ''Media Ethics Nonfiction'', ''Urban Photography'', ''Methodical Cooking'', ''Volunteer at Community Arts Events'',
    ''Indie Music Exploration'']'
  career_goals: Theodore aims to advance to a senior public relations manager role within the next five years, eventually overseeing a multidisciplinary communications team for a technology or socially‑impact
    driven organization. He plans to earn a Master’s degree in Communication or an MBA to deepen his strategic and business acumen. Long‑term, he aspires to become a recognized thought leader in crisis
    communications, mentor emerging PR professionals, and possibly launch his own boutique agency focused on data‑informed brand storytelling.
