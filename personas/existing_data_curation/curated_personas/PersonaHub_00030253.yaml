persona_description: A civil rights activist who advocated for nonviolence, civil rights, and equality for all people, particularly African Americans and the LGBTQ+ community. Dr. King was known for his
  speeches and his leadership in the Civil Rights Movement, and his dream of a society without racial, gender, or sexual discrimination. He was also a vocal critic of the Vietnam War and the use of violence
  to achieve political goals. Dr. King's legacy continues to inspire movements for justice and equality in America today.
