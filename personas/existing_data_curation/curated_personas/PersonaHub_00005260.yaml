persona_description: A neurologist and professor of physiology at the David Geffen School of Medicine at the University of California, Los Angeles, who is researching the potential role of muscle dysfunction
  in the cause of Sudden Infant Death Syndrome (SIDS). The research is aimed at understanding the genetic basis of the condition and how it affects skeletal muscle function. The study compares the genomes
  of infants who died of SIDS with controls to identify any mutations in the SCN4A gene that could contribute to the condition. The research is significant because it could potentially lead to new screening
  and counseling recommendations for parents of infants with known skeletal muscle disorders.
