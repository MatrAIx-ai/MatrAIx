personas:
  professional: Vivian Morgen is a hands‑on construction professional who blends concrete finishing, framing, and site‑grade equipment operation with a methodical, visualization‑driven approach, using their
    imaginative flair to propose design tweaks, lead crew scheduling, and they ensure safety protocols are strictly followed while mentoring new hires.
  sports: Vivian Morgen enjoys hiking the Natchez Trace, playing pickup basketball with the Memphis Grizzlies fan club, cheering for the Memphis Redbirds and the University of Memphis Tigers, and maintains
    a weekly regimen of yoga and trail runs, though after long construction weeks they often skip the gym and rely on weekends to catch up on cardio.
  arts: Vivian Morgen spends evenings sketching downtown Memphis skylines, paints large‑scale murals inspired by B.B. King and Al Green, captures vintage‑style photographs of historic venues using a Leica
    M6, and draws creative energy from the works of street artist Shepard Fairey and musician Prince, which fuel their artistic identity.
  travel: Vivian Morgen prefers short, road‑trip adventures across the South, having driven to New Orleans for its jazz heritage, Asheville for its vibrant arts scene, and dreaming of a week‑long creative
    retreat in Santa Fe, they plan trips around weekend windows and balance travel costs with their long‑term savings goals.
  culinary: Vivian Morgen cooks Southern comfort dishes like shrimp and grits, smoked collard greens, and buttermilk fried chicken for friends, enjoys experimenting with smoked paprika, sweet‑potato mash,
    and occasionally challenges themselves with Korean BBQ kimchi pancakes, showcasing an intermediate culinary skill set.
  core: Vivian Morgen is a 30‑year‑old construction manager who merges tactile artistry with disciplined project leadership, worries about deadlines yet finds calm in yoga, and can’t resist a midnight mural
    session after a long day on the job.
background:
  cultural: Vivian grew up in a middle‑class household on the outskirts of Memphis, Tennessee. Her family’s roots trace back to German and Anglo‑American ancestry, reflected in her surname, but her everyday
    life is shaped by Southern culture—community gatherings, a strong work ethic, and a love for the city’s musical heritage. She was raised in a Baptist environment that emphasized service, which later
    manifested in her volunteer work. The blend of industrial neighborhoods and vibrant artistic scenes in Memphis sparked her fascination with how built environments can both function and inspire. As a
    woman working in a traditionally male‑dominated trade, Vivian navigates both the expectations of her regional upbringing and the progressive values of the city’s growing art and equity movements.
