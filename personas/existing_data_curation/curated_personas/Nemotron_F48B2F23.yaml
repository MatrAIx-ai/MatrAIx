  career_goals: In the next five years Vivian aims to earn a Construction Management certification and an OSHA Supervisor credential, positioning herself for a crew‑lead or site‑supervisor role. She wants
    to blend her technical expertise with her artistic inclination by leading community‑focused renovation projects that incorporate public murals and sustainable design elements. Ultimately she plans to
    launch a small, women‑owned contracting firm that specializes in revitalizing aging Memphis neighborhoods while providing apprenticeship opportunities for other under‑represented workers. Mentoring
    aspiring women in the trades and promoting environmentally responsible building practices are central to her long‑term vision.
