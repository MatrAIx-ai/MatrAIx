  hobbies: '[''watercolor painting'', ''abstract mixed media art'', ''Chinese calligraphy'', ''reading classic poetry'', ''historical fiction'', ''community gardening'', ''volunteer storytelling sessions'',
    ''cooking traditional East Asian dishes'', ''attending local art fairs'', ''learning digital illustration'']'
  career_goals: Although retired, Ka Tan Iang aims to leave a lasting cultural legacy in Columbus. She hopes to establish an intergenerational arts program that pairs senior artists with local youth to
    teach calligraphy and abstract painting, and to create a community archive of oral histories that captures the experiences of East Asian immigrants in Indiana. She also aspires to author a memoir that
    weaves together her personal journey, artistic explorations, and reflections on aging, and to mentor emerging volunteers in senior advocacy and program management.
