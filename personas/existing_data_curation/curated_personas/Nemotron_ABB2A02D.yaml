personas:
  professional: Ka Iang, a retired senior program director in Columbus, Indiana, blends meticulous event planning with a vivid artistic imagination, orchestrating intergenerational arts workshops and community
    archives while leveraging bilingual fluency to bridge elders and youth.
  sports: Ka Iang enjoys playing in the local seniors’ softball league, cheers for the Indiana Pacers, and maintains a daily walking routine through the community garden’s paths, treating each stroll as
    both exercise and meditation.
  arts: Ka Iang immerses themselves in abstract watercolor experiments, traditional calligraphy strokes, and digital illustration tutorials, regularly attending exhibitions by artists like Yayoi Kusama
    and Thomas K. Emerson, while sharing stories of historic festivals at the senior center to weave cultural narratives into contemporary art.
  travel: Ka Iang prefers purposeful travel, planning weekend trips to nearby historic sites such as the Indianapolis Museum of Art and the Shenandoah Valley, while dreaming of a pilgrimage to the lantern
    festivals of Taiwan, all balanced with a modest travel allowance and a desire to stay close to family responsibilities.
  culinary: Ka Iang delights in preparing hand‑rolled dumplings, silky soy‑braised fish, and fragrant jasmine tea, often sourcing fresh herbs from the community garden, and occasionally indulges in a hot
    pot gathering with friends, though they admit to over‑salting dishes when stressed.
  core: Ka Iang is a methodical, imaginative elder who channels their meticulous nature into vibrant art and community building, yet battles persistent worry that fuels both their relentless productivity
    and occasional self‑criticism.
background:
  cultural: Ka Tan Iang’s heritage is rooted in East Asian traditions, shaped by a family that valued education, respect for elders, and the preservation of cultural rituals. Growing up, she participated
    in Lunar New Year celebrations, traditional festivals, and community tea ceremonies, which fostered a deep appreciation for symbolic art and communal harmony. After moving to Columbus, Indiana, she
    adapted these values to the Midwestern context, becoming an active bridge between her cultural roots and the surrounding community. Her bilingual fluency and knowledge of classic East Asian artistic
    techniques enable her to introduce these practices to local residents, while her respect for family and community informs her volunteer work and mentorship of younger generations.
