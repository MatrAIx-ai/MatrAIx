personas:
  professional: Joani Mostafa, a veteran commercial driver transitioning toward a mentorship and consulting role, applies three decades of route‑planning precision, DOT safety compliance, and front‑line
    sales expertise to coach new drivers, using a competitive, detail‑driven mindset to secure favorable contracts and streamline local logistics for small businesses.
  sports: Joani Mostafa stays active through early‑morning birdwatching walks and weekly yoga sessions with the Crawford County Senior Activity Club, while loyally cheering the Cleveland Browns in football
    season and following the Cincinnati Reds during baseball, embodying a measured yet community‑spirit sports enthusiasm.
  arts: Joani Mostafa weaves creative satisfaction into quilting patterns inspired by Mary Button’s geometric designs, devours Agatha Christie mystery novels, hums along to Patsy Cline’s country ballads,
    and occasionally attends local productions of Arthur Miller’s 'The Crucible' at the community theater, illustrating a modest but richly textured artistic life.
  travel: Joani Mostafa prefers meticulously planned road trips that blend scenic drives with quiet stops, favoring destinations such as the Blue Ridge Parkway, the historic town of Marquette, Michigan,
    and the Grand Canyon, while balancing travel expenses against the goal of preserving savings for grandchildren’s education.
  culinary: Joani Mostafa enjoys farm‑to‑table meals centered on fresh garden harvests, regularly preparing roasted zucchini, heirloom tomato salad with basil vinaigrette, and hearty chicken pot pie, while
    indulging in weekend visits to the county fair for deep‑fried butter‑bread and corn dogs, reflecting a modest yet comforting culinary palate.
  core: Joani Mostafa is a meticulous, puzzle‑loving former trucker who balances a competitive drive for efficiency with a quiet love for gardening, quilting, and birdwatching, yet sometimes lets sleepless
    nights on the road interfere with their bedtime routine.
background:
  cultural: Joani grew up in the deep‑south milieu of rural Georgia, where Southern Baptist values, modesty, and a strong sense of community shaped her early years. Though she identifies as white and embraces
    traditional Southern hospitality, her career on the road fostered a pragmatic, self‑reliant outlook that often contrasts with the more collective expectations of her local culture. Her family traditions
    include church attendance, country cooking, and seasonal celebrations tied to the agricultural calendar. Over the decades, her exposure to diverse regions through trucking broadened her perspective,
    granting her a skeptical view of assumptions while retaining a grounded, family‑oriented identity that values hard work, independence, and modest success.
