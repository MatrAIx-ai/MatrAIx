  career_goals: Approaching retirement, Joani aims to transition from full‑time driving to a mentorship and consulting role within the trucking industry. She plans to obtain a Certified Driver Trainer (CDT)
    credential so she can coach new drivers on safety, efficiency, and customer service. Simultaneously, she envisions launching a modest, family‑run logistics service focused on local deliveries for small
    businesses in Crawford County, allowing her to leverage her sales background while maintaining a predictable schedule. Financial stability for her grandchildren’s education and the ability to write
    a memoir about life on the road are also personal ambitions that align with her desire for independence and legacy building.
