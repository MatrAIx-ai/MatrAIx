  hobbies: '[''Landscape Painting'', ''Acoustic Guitar (Bluegrass)'', ''Hiking and Birdwatching'', ''Gardening'', ''Cooking Appalachian Cuisine'', ''Visiting Art Galleries'', ''Reading Historical and Philosophical
    Non‑fiction'', ''Volunteering with Community Theater'']'
  career_goals: Rory aims to re‑enter the workforce as a freelance curriculum consultant, focusing on arts‑integrated learning programs for schools and community centers in western North Carolina. He dreams
    of establishing a locally‑run learning hub in Jefferson that offers intergenerational art workshops, nature‑based education, and mentorship for aspiring teachers. Securing grant funding to sustain these
    initiatives and mentoring younger educators are key components of his long‑term ambition, as is authoring a guidebook on Appalachian cultural preservation through creative education.
