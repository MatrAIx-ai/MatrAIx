personas:
  professional: Ivan Berroa is a budding junior technologist who spends weekends turning elaborate LEGO sets into functional structures and coding mini games on Scratch, merging curiosity with practicality
    while thriving in collaborative settings, thanks to their organized yet flexible approach and strong sense of responsibility.
  sports: Ivan Berroa lives for the thrill of Saturday morning soccer with the Westside Strikers youth club, idolizes FC Barcelona’s Lionel Messi, and never misses a match of the local high‑school team,
    balancing energetic training with a love for teamwork and friendly competition.
  arts: Ivan Berroa lights up the after‑school salsa floor, copying moves from legendary performer Marc Anthony, flips through Spider‑Man and The Avengers comics, and treats LEGO building as a form of sculptural
    art, weaving together music, visual storytelling, and hands‑on creation.
  travel: Ivan Berroa enjoys family road trips to nearby beaches and has already explored San Juan’s historic Old Town, dreaming of a future visit to Disney World in Orlando and a summer adventure in Barcelona
    to see the Camp Nou stadium, preferring group travel that blends excitement with learning.
  culinary: Ivan Berroa loves helping whisk together arroz con gandules and mash plantains for mofongo, proudly adds a sprinkle of sofrito to every dish, and eagerly munches on pizza margherita and mango
    smoothies, showing an intermediate cooking skill level fueled by curiosity and family tradition.
  core: Ivan Berroa is an energetic 10‑year‑old who blends curiosity with compassion, turning LEGO and Scratch projects into group adventures, saving allowance with a purpose, and tackling allergies while
    dancing salsa and dreaming of soccer fields abroad.
background:
  cultural: Ivan’s Puerto Rican heritage is a vibrant part of his daily life in Philadelphia. At home, Spanish is spoken alongside English, and family gatherings feature dishes such as arroz con gandules,
    pasteles, and flan. He celebrates cultural holidays like Noche Buena and participates in the city’s annual Puerto Rican Day Parade, where he feels a strong sense of pride. The rhythmic sounds of salsa
    and reggaeton shape his love for dance, while stories from his grandparents about the island’s history deepen his appreciation for community and resilience. This cultural foundation nurtures his compassion,
    cooperative spirit, and desire to give back to both his local and cultural communities.
