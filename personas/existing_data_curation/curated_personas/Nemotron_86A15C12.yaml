  career_goals: Inspired by his desire to help others and apply practical problem‑solving, Ivan dreams of growing into a career that blends community service with technical skills. He imagines becoming
    a youth mentor or a teacher who encourages curiosity, or a civil engineer who designs safe playgrounds for neighborhoods. In the short term, he looks up to firefighters and soccer coaches as role models
    for teamwork and caring for the community.
