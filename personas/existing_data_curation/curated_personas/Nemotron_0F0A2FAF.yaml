  hobbies: '[''Reading African American literature'', ''Poetry writing'', ''Yoga and mindfulness meditation'', ''Volunteer gardening'', ''Community art projects'', ''Cooking soul food'', ''Acoustic guitar'',
    ''Attending spoken word events'', ''Following Indiana Pacers'']'
  career_goals: Phyllis aims to translate her empathy and organizational strengths into a career that directly supports her community. She aspires to become a program coordinator for a nonprofit focused
    on youth empowerment and mental health in Indianapolis, or a case manager within a social services agency. Recognizing the value of formal training, she plans to pursue a graduate degree in social work
    or counseling to become a licensed therapist. Her long‑term ambition is to design and lead preventative mental‑health initiatives that blend cultural education with holistic support for underserved
    Black youth, ultimately becoming a trusted resource and leader in community wellbeing.
