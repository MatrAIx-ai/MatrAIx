  hobbies: '["Book Club", "Gardening", "Church Choir", "Volunteer at Local Library", "Quilting", "Walking Trails", "Bridge (Card Game)", "Cooking for Community Events", "Historical Documentary Viewing",
    "Community Theater"]'
  career_goals: Ellen aims to transition from full‑time newsroom duties to a mentorship role, guiding emerging journalists while championing a multi‑year oral‑history initiative that documents the stories
    of longtime Wentzville residents. She plans to partner with the St. Charles Historical Society to create a searchable digital archive of photographs, newspaper clippings, and recorded interviews, preserving
    the community’s heritage for future generations. Concurrently, she wishes to continue writing a weekly column celebrating local traditions and to serve as a communications advisor for regional charities,
    leveraging her expertise to amplify their outreach. Ultimately, she hopes to leave a lasting legacy of informed, connected community storytelling as she moves toward a semi‑retired, advisory capacity.
