    User 2: It was! But I was able to get it fixed eventually.

    User 1: That''s good to hear.

    User 2: Yeah, it was a close call.

    User 1: Do you have any other interesting stories?

    User 2: I once had to fix a burst pipe in a house that was on fire.

    User 1: Oh my gosh! That sounds dangerous.

    User 2: It was! But I was able to get it fixed before the house burned down.

    User 1: That''s amazing! You''re a hero!

    User 2: Thanks! I just did my job.

    User 1: Well, you did a great job.

    User 2: Thanks! I''m glad you think so.'
