personas:
  professional: Ruth Cribbet, a retired educator renowned for her curriculum development expertise, channels her methodical, punctual nature into mentoring former teachers and guiding the local school district
    advisory board, ensuring every lesson plan follows a clear, heritage‑inspired structure.
  sports: Ruth Cribbet enjoys morning walks on the local trail, participates in the senior walking club at the community center, and supports the Boston Red Sox, New England Patriots, and Boston Celtics,
    often cheering from the comfort of her living room while sipping tea after a quilting session.
  arts: Ruth Cribbet frequently attends performances at the Raymond community theater, especially productions of Shakespeare’s *Much Ado About Nothing*, delights in listening to the Boston Symphony Orchestra’s
    recordings of Mahler, and knits quilts inspired by the delicate color palettes of Monet’s *Water Lilies*.
  travel: Ruth Cribbet plans meticulously detailed road trips to historic New England sites like Plymouth and the Litchfield Hills, balancing scenic walks with visits to colonial museums, and they also
    dream of a guided tour of the Scottish Highlands to explore ancestral ties.
  culinary: Ruth Cribbet delights in preparing herb‑infused roasted chicken with fresh thyme from her garden, a classic New England clam chowder, and an apple‑cinnamon crumble, showcasing solid yet modest
    cooking skills that blend tradition with seasonal ingredients.
  core: Ruth Cribbet blends a lifelong love of organized learning, community service, and seasonal rituals into a steady, slightly stubborn, yet warm‑hearted presence that champions tradition while quietly
    embracing new ideas.
background:
  cultural: Ruth descends from a multi‑generational New England family of Anglo‑American heritage, with roots tracing back to early colonial settlers in New Hampshire. Raised in a modest, middle‑class environment,
    she embodies New England values of self‑reliance, thrift, punctuality, and community service. Her upbringing emphasized the importance of education, respect for tradition, and civic participation, reflected
    in her involvement with local churches, town meetings, and seasonal celebrations such as Thanksgiving and Fourth of July parades. While she identifies culturally as white American, her worldview is
    shaped by the region's historic Puritan work ethic and a deep appreciation for the natural landscape of New England.
attributes:
  skills: '[''Curriculum Development'', ''Lesson Planning'', ''Classroom Management'', ''Differentiated Instruction'', ''Educational Assessment'', ''Mentoring'', ''Volunteer Program Coordination'', ''Event
