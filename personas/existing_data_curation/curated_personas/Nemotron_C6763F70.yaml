  career_goals: Frehiwot aims to transition into a leadership role that bridges clinical practice and health administration, such as a nurse manager or director of community health programs within Prince
    George’s County. She hopes to develop a mentorship program for newly licensed nurses, champion quality‑improvement projects that reduce readmission rates, and influence policy on staffing ratios for
    underserved populations. Leveraging her business education, she plans to pursue certification in healthcare management and eventually consult for community clinics to improve operational efficiency
    and patient outcomes, while maintaining a sustainable work‑life balance to manage stress.
