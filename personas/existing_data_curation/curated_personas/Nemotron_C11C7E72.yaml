  hobbies: '[''Home Cooking'', ''Gardening'', ''Kayaking'', ''Hiking'', ''Community Volunteering'', ''Live Music Events'', ''Yoga'', ''Reading Science & Culinary Magazines'', ''Adult Soccer'', ''Space Center
    Tours'']'
  career_goals: Bailey aims to move into a regional management role where she can oversee multiple locations and implement data-driven operational strategies across the chain. She plans to earn advanced
    certifications in hospitality management and sustainability, leading initiatives to reduce waste and source locally. In the long term, she dreams of opening her own boutique café that blends healthy,
    locally sourced cuisine with technology‑enhanced kitchen operations. She also wants to mentor young women interested in both hospitality and STEM, and eventually transition into a consulting role that
    allows her to share her expertise while achieving a healthier work‑life balance and reducing stress.
