personas:
  professional: Bailey Christie is a food‑service operations manager who leverages lean methodology, Excel analytics, and basic SQL to streamline multi‑site workflows while balancing a practical, structured
    approach with a sociable, people‑centric leadership style.
  sports: Bailey Christie plays in an adult league for the Space Coast Soccer Club, enjoys weekend kayaking on the Indian River Lagoon and hiking the Space Coast Trail, and roots for the Orlando Magic and
    Tampa Bay Rays while staying fit through yoga and Pilates.
  arts: Bailey Christie attends live performances by Jack Johnson and The Lumineers, regularly supports community theater productions at the Playhouse at the Space Coast, and finds inspiration for their
    experimental cooking in the visual art of contemporary impressionist painters.
  travel: Bailey Christie prefers flexible, spontaneous trips that balance family time at the Kennedy Space Center and local beach outings with occasional escapes to Maui and Kyoto, using a modest travel
    budget and a simple spreadsheet to ensure affordability.
  culinary: Bailey Christie cooks experimental, health‑focused meals such as quinoa bowls with roasted seasonal vegetables and cilantro‑lime dressing, zucchini noodles tossed in garden basil‑pesto, and
    turmeric‑ginger smoothies, showcasing advanced culinary skills and a penchant for sourcing fresh herbs from their own vegetable garden.
  core: Bailey Christie is an outgoing, data‑driven food‑service leader who battles anxiety with yoga, channels curiosity into experimental healthy cooking, and balances structured ambition with a delightfully
    spontaneous social life.
background:
  cultural: Bailey identifies as white American with roots in the Midwest, reflecting a blend of Anglo‑Irish heritage and the laid‑back, community‑oriented culture of suburban Florida. Growing up in a middle‑class
    family, she embraced traditional celebrations like Thanksgiving, family barbecues, and community potlucks. Living in Melbourne, Brevard County, she has adopted the coastal lifestyle—frequent beach visits,
    a love for marine recreation, and an enthusiasm for the region’s space exploration legacy. She values Southern hospitality’s emphasis on kindness and cooperation, which informs her collaborative approach
    at work and in community activities.
