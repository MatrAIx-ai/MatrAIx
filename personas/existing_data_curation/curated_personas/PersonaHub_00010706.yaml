persona_description: A nuclear medicine physician who specializes in the use of technetium-99 for imaging and treatment of various diseases. She has experience with scheduling patients to obtain isotopes
  when they are more available and longer scanning times to reduce the amount of isotope used. She is aware of the potential cost increases due to the shortage and the need for alternatives to some heart
  and kidney function tests. She is concerned about the potential impact of the shortage on the vulnerable population with cancer and is seeking alternative options for imaging and treatment.
