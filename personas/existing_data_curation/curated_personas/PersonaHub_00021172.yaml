persona_description: A neuroscientist and mathematician who specializes in the study of pattern formation in biology, particularly oscillating chemical systems and the role of these rhythms in sensory processing,
  motor planning, behavior, and cognition. She has a background in chemistry and mathematical biology, and has a keen interest in the potential implications of these rhythms in neurological diseases like
  Parkinson's disease. She is also interested in the effects of anesthesia on the elderly brain and has experience in creating mathematical models of the effects of various anesthetics.
