persona_description: A dental surgeon who specializes in the placement and restoration of dental implants, particularly in the use of titanium implants. She is skilled in the genetic code that allows the
  body to allow bone cells to attach to the titanium surface and the result is a firm and permanent anchorage for a prosthetic reconstruction. Her work involves careful placement of the dental implant into
  the bone, and the use of genetic engineering to ensure the bone cells can attach to the titanium surface. She has extensive experience in the use of implants to restore teeth and make dental implant dentures.
