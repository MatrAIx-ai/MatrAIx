  hobbies: '[''Reading historical fiction'', ''Gardening'', ''Quilting'', ''Watercolor painting'', ''Birdwatching'', ''Bridge (card game)'', ''Attending small community art exhibitions'', ''Cooking and
    baking'', ''Genealogy research'', ''Virtual museum tours'']'
  career_goals: Evelin aims to remain an active contributor to her community by leading a weekly art and craft circle for seniors, documenting and publishing a short oral‑history collection of longtime
    Rochester residents, and completing a community‑college course in digital photography. She also hopes to finish a memoir that weaves together her family genealogy with reflections on the cultural changes
    she has witnessed. While she is content with a retired lifestyle, she aspires to stay physically independent, expand her digital literacy, and mentor younger volunteers interested in preserving local
    heritage.
