personas:
  professional: A budding digital artist, Kenneth Carson channels his curiosity and knack for organization into a growing portfolio of indie game concepts, graphic illustrations, and original album artwork,
    while his sociable nature drives collaborations with classmates on school theatre set designs.
  sports: Kenneth Carson plays midfield for the Granite Falls Rapids youth soccer club, follows Seattle Sounders FC with avid enthusiasm, supplements training with weekend hikes in the Cascades and bike
    rides on local trails, and occasionally watches Seattle Kraken games as a seasonal winter pastime.
  arts: Kenneth Carson draws digital art inspired by creators like sakimichan on DeviantArt and indie musicians such as Phoebe Bridgers and The Shins, writes original songs on acoustic guitar, and frequently
    volunteers to design sets and costumes for his school’s theatre productions.
  travel: Kenneth Carson favors short, budget‑friendly road trips to nearby alpine destinations like Mount Rainier and the Olympic Peninsula, has camped under the stars at the Cascades, and aspires to backpack
    through the Canadian Rockies and explore Kyoto’s cherry‑blossom festivals.
  culinary: Kenneth Carson enjoys whipping up simple salmon‑and‑quinoa bowls with locally sourced wild salmon and kale, baking chocolate‑chip cookies for after‑practice snacks, and savoring a perfectly
    brewed cup of Seattle‑roasted coffee during afternoon study sessions.
  core: Kenneth Carson is a curious, artistic teen who balances soccer, digital sketches, and late‑night gaming with a habit of obsessively checking weather forecasts before each hike and a tendency toward
    stress‑induced overthinking.
background:
  cultural: Kenneth grew up in Granite Falls, a small town in Snohomish County, Washington, shaped by the Pacific Northwest’s blend of suburban life and outdoor culture. His family reflects mainstream middle‑class
    American values, celebrating holidays like Thanksgiving, Christmas, and the Fourth of July, while also appreciating the region’s emphasis on nature, sustainability, and community events such as local
    farmers’ markets and high‑school sports nights. Exposure to a diverse school environment and online communities has broadened his perspective, yet his day‑to‑day life is rooted in the local customs
    of the Pacific Northwest, including a love for hiking, biking, and a casual appreciation for indie music and art scenes in nearby Seattle.
