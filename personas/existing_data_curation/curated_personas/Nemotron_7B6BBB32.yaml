  career_goals: Kenneth hopes to turn his passion for art and technology into a career. He aims to attend a university with a strong visual arts program, eventually becoming a concept artist or graphic
    designer for video games or animation studios. He also dreams of creating an online portfolio and possibly launching a freelance illustration business while staying connected to his community by offering
    art workshops for younger kids.
