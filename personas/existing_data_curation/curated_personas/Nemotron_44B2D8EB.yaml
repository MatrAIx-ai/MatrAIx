personas:
  professional: Michael Ranson, a 25‑year‑old aspiring journeyman electrician, leverages his hands‑on home‑repair expertise, meticulous budgeting and scheduling abilities, and calm, methodical problem‑solving
    to excel in a community‑college apprenticeship while informally mentoring fellow apprentices in workshop projects.
  sports: Michael Ranson maintains a low‑key fitness routine centered on his Saturday night bowling league, avidly follows the Nebraska Cornhuskers football team, and spends Sundays fishing at nearby Standing
    Rock Lake, preferring steady, modest activity over intense gym workouts.
  arts: Michael Ranson relaxes to the classic country melodies of John Denver and the modern Americana of Jason Isbell, enjoys occasional community‑theater productions of classic plays, and channels his
    creative impulse into building detailed scale model kits.
  travel: Michael Ranson favors practical, self‑planned road trips that blend outdoor adventure with family visits, having recently driven to Badlands National Park and dreaming of a weekend getaway to
    the Ozark Mountains while balancing travel costs with his contractor‑savings goal.
  culinary: Michael Ranson displays competent, no‑frills cooking skills, favoring hearty dishes like skillet‑seared pork chops, garden‑fresh vegetable stir‑fry, and slow‑cooked beef chili, and his weekly
    menu often incorporates produce harvested from his modest backyard garden.
  core: Michael Ranson is a steady, community‑focused 25‑year‑old who blends meticulous DIY craftsmanship with a calm, methodical outlook, quietly building a future in the trades while keeping his home
    garden thriving and his budget balanced.
background:
  cultural: Michael grew up in a middle‑class, largely white, Midwestern community in Omaha, Nebraska. The local culture emphasizes self‑reliance, practicality, and a strong sense of community. He was raised
    with values of hard work, modesty, and respect for tradition, often reinforced by church involvement and neighborhood gatherings. These influences shape his preference for structure, his dependable
    work ethic, and his commitment to contributing to his local community.
attributes:
  skills: '[''home maintenance'', ''basic carpentry'', ''plumbing repairs'', ''electrical safety checks'', ''vehicle maintenance'', ''budgeting'', ''household organization'', ''basic computer literacy'',
    ''problem solving'']'
  hobbies: '[''DIY home projects'', ''model building'', ''vegetable gardening'', ''fishing'', ''reading DIY manuals'', ''bowling league'', ''community center volunteering'']'
  career_goals: Michael aims to transition into a stable trade career that leverages his practical strengths and desire for predictable work environments. He plans to obtain his GED within the next year,
    then enroll in a community college apprenticeship program in electrical or plumbing trades. His longer‑term ambition is to become a certified journeyman and eventually start his own small contracting
    business, providing reliable services to his community while ensuring financial security for his family. He also wishes to develop leadership skills to mentor other young adults facing similar educational
    challenges.
