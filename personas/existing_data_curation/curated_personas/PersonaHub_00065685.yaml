persona_description: A college instructor in the United States who is responsible for managing a classroom and is bound by federal privacy guidelines regarding the protection of student information. This
  persona is likely to have a background in education, specifically in teaching and managing a classroom. They are likely to be aware of the complex and specific requirements of FERPA, which governs the
  handling of student information in a college setting. They are also likely to be knowledgeable about online security protocols and have experience with the use of institution-sanctioned servers for storing
  and sharing student information. They may have a background in technology and have experience with using tools such as Microsoft Enterprise Services, GSuite for Education, and Course Management Systems.
  They may also have experience with using Google Docs for teaching purposes, but are unlikely to use it for sharing grades, as they are aware of the potential risks of using a consumer Google account for
  such purposes.
