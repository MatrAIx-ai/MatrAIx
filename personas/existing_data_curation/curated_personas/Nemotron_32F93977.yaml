  hobbies: '[''building Duplo structures'', ''drawing animals and plants'', ''listening to storybooks'', ''exploring the creek'', ''collecting smooth stones'', ''watching nature documentaries'', ''quiet
    instrumental and folk music'', ''solving simple puzzles'', ''basic water flow experiments'']'
  career_goals: Irby often imagines himself as a quiet explorer of nature, dreaming of someday becoming a wildlife researcher, a museum curator, or a librarian—roles that let him observe, organize, and
    protect collections of natural objects. He loves the idea of cataloguing rocks, leaves, and insects he finds in his backyard with a magnifying glass. Occasionally he envisions teaching younger children
    how to build with blocks in a calm classroom setting. His immediate ambition is to read simple picture books on his own, mastering each page without help.
