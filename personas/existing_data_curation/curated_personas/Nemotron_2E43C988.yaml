personas:
  professional: Madeline Doig balances curiosity with practicality as a retail sales associate at a busy department store, using quick product learning and upbeat communication to turn hesitant shoppers
    into loyal customers while they meticulously handle inventory, loss‑prevention checks, and visual merchandising, all the while dreaming of running a community‑focused boutique that hosts local craft
    fairs.
  sports: Madeline Doig spikes on the Cedar Rapids Vixens women's volleyball team during the fall, follows the Iowa Hawkeyes football and Cedar Rapids RoughRiders hockey for hometown pride, hikes the Cedar
    River Trail on weekends, and maintains a flexible fitness routine that blends group workouts with solo yoga, though they sometimes skip the yoga when schoolwork piles up.
  arts: Madeline Doig lights up community theater workshops at Theatre Cedar Rapids with a flair for improvisation, devours contemporary fiction by Sally Rooney and Chimamanda Ngozi Adichie, curates indie
    playlists featuring Sufjan Stevens and Hozier while sipping cold brew, and collects vintage concert posters they upcycle into wall art, though they can spend hours scrolling through streaming services
    at the expense of sleep.
  travel: Madeline Doig prefers budget‑friendly weekend getaways, has explored Mackinac Island’s Victorian streets and Chicago’s vibrant lakefront, dreams of a road trip to Portland, Oregon to chase its
    famed food‑truck scene, but balances wanderlust with a part‑time job that limits long‑haul travel until they graduate.
  culinary: Madeline Doig enjoys discovering new coffee roasts at local cafés like Grassroots Coffeehouse, whips up quick weeknight meals such as spicy chickpea pasta with fresh basil, experiments with
    upcycling stale bread into croutons, and treats themselves to homemade cinnamon rolls on Sundays, though they sometimes over‑season dishes in excitement.
  core: Madeline Doig is a sociable, community‑oriented retail associate whose curiosity fuels a love for upcycling and craft, yet persistent worry drives them to a nightly journal ritual and occasional
    impulse coffee splurges.
background:
  cultural: Madeline grew up in Cedar Rapids, a mid-western city with a strong sense of community and modest, work-oriented values. Her family background reflects typical Midwestern influences, emphasizing
    self-reliance, cooperative spirit, and participation in local events such as county fairs and community clean-up days. While she identifies as white, she has been exposed to a diverse range of cultural
    activities through school and community programs, fostering an appreciation for inclusivity and collaboration. These experiences shape her emphasis on harmony, kindness, and practical problem-solving
    in both personal and professional settings.
attributes:
  skills: '[''Customer service'', ''Product knowledge acquisition'', ''Cash register operation'', ''Transaction reconciliation'', ''Inventory stocking and organization'', ''Merchandising and visual displays'',
    ''Effective communication'', ''Conflict resolution'', ''Time management'', ''Team collaboration'']'
  hobbies: '[''Volleyball'', ''Community theater'', ''DIY upcycling crafts'', ''Reading contemporary fiction'', ''Exploring local cafés'', ''Hiking'', ''Yoga'', ''Journaling'']'
  career_goals: Madeline aims to complete her GED within the next year, then enroll in a community college program in business administration or retail management. She hopes to progress from sales associate
    to shift supervisor and eventually store manager, gaining leadership experience and learning advanced merchandising and loss-prevention strategies. In the longer term, she is interested in opening a
    small boutique that blends curated fashion with community events, using the hands-on experience she gains now. Alongside career advancement, she wants to develop stronger financial literacy and stress-management
    skills to balance her ambitious goals with personal well-being.
