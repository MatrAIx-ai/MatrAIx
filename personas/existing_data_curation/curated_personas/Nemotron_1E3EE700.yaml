personas:
  professional: Mikenzie Reynolds, a budding junior wildlife photographer and Minecraft world‑builder, combines a keen eye for desert ecosystems with a spontaneous, curiosity‑driven approach to documenting
    nature, often blending practical field sketches with digital creations despite a tendency to lose track of deadlines.
  sports: Mikenzie Reynolds, an avid hiker and occasional youth soccer player for the Elko Thunder U‑12 team, enjoys tracking sunrise runs on local trails while cheering for the Nevada Wolf Pack football
    team, and balances a love of solitary cardio with occasional group drills despite a laid‑back attitude toward structured training.
  arts: Mikenzie Reynolds, a sketch‑and‑paint enthusiast of desert vistas, spends after‑school hours reproducing the luminous tones of artists like Georgia O'Keeffe and Andy Warhol in practice notebooks,
    while also listening to the folk‑rock sounds of John Denver and the orchestral scores of Hans Zimmer that fuel their creative imagination.
  travel: Mikenzie Reynolds prefers spontaneous, nature‑focused weekend trips, having explored Great Basin National Park’s limestone caves and camped near Lake Tahoe, while dreaming of a future family road‑trip
    across the Pacific Northwest to see the volcanic landscapes of Oregon’s Crater Lake, balancing limited family budget with a thirst for adventure.
  culinary: Mikenzie Reynolds enjoys hearty backyard barbecues featuring chili con carne with jalapeño and black bean toppings, experiments with desert‑inspired salsas using prickly pear and cilantro, and
    often attempts simple baking like chocolate chip cookies, though they sometimes forget to preheat the oven, resulting in uneven batches.
  core: Mikenzie Reynolds is a curiosity‑driven desert explorer who blends artistic sketches with digital worlds, hoards rocks like treasure, impulsively splurges on Minecraft upgrades, and can forget a
    sunscreen bottle on the trail but never forget a sunrise.
background:
  cultural: Mikenzie comes from a white, multi-generational family rooted in Elko’s high-desert ranching and mining community. The region’s culture emphasizes self-reliance, respect for the rugged landscape,
    and close‑knit neighborly ties. Local traditions such as the annual Ruby State Festival, county fair, and school‑based outdoors clubs reinforce a practical appreciation for nature. She also experiences
    the modest influence of nearby Native American heritage through museum visits and school lessons, shaping her curiosity about ecosystems while maintaining a grounded, community‑oriented outlook.
attributes:
  skills: '[''Basic computer operation'', ''Scratch programming'', ''Digital illustration'', ''Photography'', ''Reading comprehension'', ''Mathematical problem solving'', ''Small animal care'', ''Gardening'',
