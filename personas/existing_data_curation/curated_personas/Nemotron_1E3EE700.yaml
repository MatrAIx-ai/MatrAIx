  hobbies: '[''Reading fantasy novels'', ''Digital drawing and watercolor painting'', ''Hiking and trail exploration'', ''Rock and mineral collecting'', ''Playing guitar'', ''Minecraft building'', ''Photography
    of desert scenery'', ''Volunteering at the animal shelter'']'
  career_goals: In the short term she wants to finish high school with good grades, win a science fair project on local desert ecology, and earn a Red Cross CPR certification. Over the next few years she
    hopes to volunteer at the regional wildlife rehabilitation center and join a junior ranger program. Ultimately she aspires to study environmental science or wildlife biology in college and work as a
    park ranger or conservation specialist, helping protect Nevada’s high desert ecosystems while staying connected to her community.
