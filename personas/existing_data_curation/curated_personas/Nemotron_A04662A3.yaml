personas:
  professional: Santiago Armas, a disciplined police officer with a sharp investigative acumen, blends their meticulous organizational skills, bilingual communication, and curiosity about art to pursue
    a career as a detective specializing in art theft while leading patrol teams and promoting mental‑health initiatives within the department.
  sports: Santiago Armas hikes the San Gabriel Mountains on weekends, runs with the Los Angeles Road Runners Club, and avidly follows the Los Angeles Lakers and LA Galaxy, weaving cardio workouts into their
    demanding schedule to sustain field readiness.
  arts: Santiago Armas frequently photographs street murals, tours exhibitions at the Getty Museum, strums Mexican folk songs and jazz on guitar, volunteers as a mentor in youth art programs, and devours
    contemporary art literature, making visual culture a core part of their identity.
  travel: Santiago Armas plans purposeful trips that align with work breaks, exploring art‑rich destinations like Santa Barbara’s historic mission, Oaxaca’s vibrant galleries, and Florence’s Renaissance
    museums, often pairing cultural tours with culinary tastings.
  culinary: Santiago Armas delights in cooking traditional Mexican dishes such as mole poblano, chilaquiles, and tamales, savoring ingredients like dried chilies, corn masa, and cacao, while occasionally
    resorting to late‑night takeout after overtime shifts, though they sometimes neglect balanced nutrition.
  core: Santiago Armas is a methodical detective who merges a passion for art with disciplined policing, channels stress into yoga and cooking, and occasionally over‑analyzes every clue like a masterpiece.
background:
  cultural: Santiago was raised in a Mexican‑American household in the Los Angeles area, with parents who immigrated from Michoacán. Bilingual English‑Spanish fluency and regular participation in cultural
    traditions like Día de los Muertos, quinceañeras, and neighborhood fiestas have shaped his worldview. He draws pride from Mexican artistic heritage—murals, folk art, and music—and integrates this appreciation
    into his policing style, emphasizing respect for cultural expression and community ties. His upbringing instilled values of family solidarity, resilience, and a strong sense of civic duty, which motivate
    his commitment to public service and community outreach.
attributes:
  skills: '[''Criminal investigation'', ''De-escalation techniques'', ''Community policing'', ''Evidence collection and preservation'', ''Firearms proficiency'', ''Crisis negotiation'', ''Spanish language
