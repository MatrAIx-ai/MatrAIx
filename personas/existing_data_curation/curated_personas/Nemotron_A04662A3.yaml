  hobbies: '[''Visiting art galleries and street art tours'', ''Photography (urban landscapes and cultural events)'', ''Reading about contemporary art and crime literature'', ''Playing guitar and listening
    to Mexican folk and jazz music'', ''Hiking in the San Gabriel Mountains'', ''Practicing yoga and mindfulness meditation'', ''Cooking traditional Mexican cuisine'', ''Volunteering in youth art mentorship
    programs'']'
  career_goals: Santiago aims to become a detective specializing in art theft and cultural‑property crimes, joining the precinct’s Special Investigations Unit. He plans to complete his bachelor's degree
    in criminal justice or forensic science while pursuing certifications in digital forensics and crisis intervention. Long‑term, he aspires to lead a multidisciplinary task force that bridges law enforcement,
    museum security, and community outreach, and eventually move into a precinct commander role where he can mentor new officers and promote culturally sensitive policing practices. Additionally, he seeks
    to champion mental‑health initiatives within the department to support officers coping with stress.
