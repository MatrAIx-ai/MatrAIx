personas:
  professional: Gretel Schaubroeck, a senior operations research specialist with advanced quantitative expertise, leverages Python, R, and AI‑driven optimization to transform ambiguous supply‑chain challenges
    into data‑driven, ethically aware solutions while championing cross‑functional collaboration and mentoring.
  sports: Gretel Schaubroeck enjoys low‑key physical activity, spending Saturday mornings kayaking on Lake Houston, cheering for the Houston Astros in spring, and participating in a local hiking club that
    meets at Brazos Bend State Park, while avoiding structured gym routines.
  arts: Gretel Schaubroeck immerses herself in the arts by curating intimate book‑discussion circles featuring contemporary fiction by Sally Rooney, attending gallery openings showcasing works by Kehinde
    Wiley, and slipping into smoky jazz sessions that play classics by Miles Davis, all of which fuel her watercolor sketches of Texas skies.
  travel: Gretel Schaubroeck prefers reflective travel, often planning spontaneous weekend trips to nearby Hill Country vineyards or a quiet cabin in the Ozarks, while dreaming of a longer stay in Kyoto
    to study traditional tea ceremonies and capture sunrise over the Kamo River.
  culinary: Gretel Schaubroeck experiments in the kitchen, blending Texas smoked brisket with Korean gochujang to create brisket bibimbap, mastering the balance of cumin, smoked paprika, and miso in her
    dishes, though she occasionally forgets to pre‑heat the oven, leading to improvised fire‑roasted vegetables.
  core: Gretel Schaubroeck is a curious, art‑loving operations researcher who thrives on flexible problem‑solving, balances disciplined analytics with spontaneous watercolor sessions, and occasionally lets
    disorganization slip into her budgeting and cooking.
background:
  cultural: Gretel grew up in a middle‑class family in the Houston metropolitan area, with deep roots in the American South and a heritage that traces back to German immigrants who settled in Texas in the
    early 20th century. Her upbringing blended traditional Texan values—community gatherings, hospitality, and a love of food—with an appreciation for the diverse cultural mosaic of Harris County. Frequent
    visits to the Museum of Fine Arts, Houston, and exposure to bilingual environments through friends gave her a broad worldview. Though she identifies as culturally American, she honors her family’s seasonal
    Oktoberfest celebrations and incorporates both Southern comfort and European curiosity into her lifestyle.
attributes:
  skills: '[''Mathematical modeling'', ''Linear programming'', ''Stochastic simulation'', ''Data mining'', ''Statistical analysis'', ''Optimization algorithms'', ''Python programming'', ''R programming'',
