  hobbies: '[''Watercolor painting'', ''Nature hiking and wildlife photography'', ''Reading contemporary fiction and philosophy'', ''Curating small book clubs'', ''Experimental cooking'', ''Attending local
    art gallery openings'', ''Listening to science and art podcasts'', ''Mentoring high‑school girls in STEM'', ''Yoga practice'', ''Playing board games with close friends'']'
  career_goals: She aims to progress to a senior operations research manager role within the next five years, leading cross‑functional teams that develop data‑driven solutions for supply‑chain resilience
    and sustainability. Gretel plans to deepen her expertise in AI‑enhanced optimization, earn a professional certification such as the Certified Analytics Professional, and publish case studies in industry
    journals. Long‑term, she envisions founding a boutique consulting practice that helps mid‑size firms adopt flexible, ethically informed decision‑support tools while maintaining a work‑life balance that
    allows her to mentor young women entering STEM.
