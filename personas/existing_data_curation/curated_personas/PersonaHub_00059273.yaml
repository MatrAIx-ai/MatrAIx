persona_description: A researcher in Public Health who is interested in the underregistration of live births in Brazil, particularly in the city of Piripiri, Piauí. This researcher has a background in statistics
  and data analysis, and is interested in studying the factors that contribute to underregistration, such as education, making the population aware of the importance of the birth certificate, and removing
  the charge on registration. This researcher is likely to be interested in the impact of underregistration on public health planning and the benefits that could result from reducing underregistration.
