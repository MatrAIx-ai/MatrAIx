personas:
  professional: Mary Davitt, a 37‑year‑old police officer with a STEM background, excels in data‑driven investigations, forensic evidence handling, and rapid decision‑making, while her curiosity drives
    constant learning in digital forensics and her spontaneous nature sometimes clashes with rigid departmental paperwork deadlines.
  sports: Mary Davitt stays fit by hiking the Big Lake trail system, kayaking weekly, and running with the local Big Lake Trailblazers club, while cheering for the Minnesota Vikings, Timberwolves, and Wild
    during the season and joining community kayak races each summer.
  arts: Mary Davitt enjoys the cerebral thrills of mystery novels by Tana French and sci‑fi epics by Neal Stephenson, relaxes to the atmospheric sounds of The National and Björk, and attends occasional
    performances by the regional theater troupe, while occasionally sketching bird silhouettes during hikes.
  travel: Mary Davitt prefers spontaneous road trips that blend adventure and nature, often planning last‑minute getaways to places like Acadia National Park, Banff, or Iceland, yet balances these trips
    with family commitments and a modest travel budget.
  culinary: Mary Davitt experiments in the kitchen with dishes such as wild‑rice risotto with smoked salmon, pan‑seared duck breast seasoned with star anise, and homemade sourdough, favoring fresh lake
    fish, smoked paprika, and locally sourced herbs to create meals that surprise her family.
  core: Mary Davitt is a methodical detective who thrives on puzzles, yet her love of spontaneity often leaves her juggling deadlines and a lingering coffee habit.
background:
  cultural: Mary grew up in the Midwestern lake region of Minnesota, steeped in the practical, community‑oriented values typical of the area. Her family traces its roots to Scandinavian (primarily Swedish)
    immigrants, influencing her appreciation for seasonal outdoor activities, modesty, and a strong work ethic. While raised with a Protestant cultural backdrop, she identifies more with secular community
    service, often volunteering for local safety initiatives and neighborhood clean‑ups. This blend of regional pride, ancestral heritage, and a commitment to public service shapes her identity and informs
    both her professional dedication and personal pursuits.
attributes:
  skills: '[''Criminal investigation'', ''Forensic evidence collection'', ''Digital forensics'', ''Crime data analysis and mapping'', ''Conflict de‑escalation'', ''Firearms and defensive tactics'', ''First
    aid/CPR'', ''Report writing and documentation'', ''Improvisational decision‑making'', ''Community outreach and relationship building'']'
  hobbies: '[''Hiking and trail walking'', ''Kayaking on Big Lake'', ''Bird watching'', ''DIY electronics and home‑automation projects'', ''Reading mystery and science‑fiction novels'', ''Crosswords and
    sudoku puzzles'', ''Board‑game nights with close friends'', ''Cooking experimental meals for family'']'
  career_goals: Mary aims to transition into a specialized investigative unit—ideally a cyber‑crime or cold‑case squad—where she can leverage her data‑analysis skills and forensic knowledge. She also aspires
    to become a training officer, mentoring new recruits on both practical tactics and analytical thinking. Over the next five years she plans to pursue a master's degree in criminal justice or forensic
    science to deepen her expertise, while seeking leadership roles that allow her to shape data‑driven policing policies without sacrificing her preference for flexible, autonomous work environments.
