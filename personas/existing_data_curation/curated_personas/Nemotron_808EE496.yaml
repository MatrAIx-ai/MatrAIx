personas:
  professional: Ruben Martinez, a newborn who instinctively lines up his soft toys in neat rows, thrives on the predictable rhythm of his feeding schedule yet occasionally resists strict timing when a new
    caregiver arrives, and whose gurgling chatter steals the attention of any room, hinting at a future in a people‑centric, competitive field such as sales or event coordination.
  sports: Ruben Martinez, though still in diapers, delights in tummy‑time gymnastics, eagerly watches his parents cheer for FC Barcelona on TV, and attends a local parent‑baby swimming class, showcasing
    his sociable energy and budding competitive spirit even in early play.
  arts: Ruben Martinez, a newborn, hums along to classic lullabies like Brahms' Lullaby and modern nursery tunes by Raffi such as "Baby Beluga," and his eyes light up at the vibrant illustrations of "Brown
    Bear, Brown Bear, What Do You See?" during storytime, feeding his talkative, attention‑seeking nature.
  travel: Ruben Martinez, accustomed to stroller‑sized adventures, enjoys frequent trips to the neighborhood park’s sensory garden, a yearly family road trip to the Grand Canyon, and a weekend beach getaway
    in San Diego where his parents practice sun‑safe lounging, balancing his love for predictable routines with occasional spontaneous excursions.
  culinary: Ruben Martinez, fed primarily on breastmilk and fortified formula, has developed a palate for smooth avocado purée, sweet potato mash lightly seasoned with cinnamon, and iron‑fortified oatmeal,
    often eating at a high‑chair tray adorned with cartoon whales, reflecting his preference for structured meals yet occasional playful messes.
  core: Ruben Martinez, a newborn who thrives on routine while delighting in spontaneous cuddles, radiates sociable charm, shows early signs of competitive curiosity, and occasionally tests boundaries with
    skeptical eye‑contact.
