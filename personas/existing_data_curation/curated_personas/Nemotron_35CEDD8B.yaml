  career_goals: James aims to secure a senior position within his current delivery company, such as a shift lead or trainer, leveraging his extensive local knowledge to mentor newer drivers. He also envisions
    eventually launching a modest independent delivery service that focuses on serving local businesses and the community, allowing him to maintain his routine while gaining greater control over his schedule.
    In the longer term, he hopes to transition to a less physically demanding role, such as dispatcher or logistics coordinator, ensuring a steady income as he approaches retirement.
