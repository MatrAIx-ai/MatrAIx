  career_goals: Krystal aims to transition from a first‑line supervisory role to a senior administrative leadership position, such as Office Manager or Operations Manager, within the next three to five
    years. She seeks to lead organization‑wide efficiency initiatives that reduce costs and improve employee satisfaction. She plans to earn a Lean Six Sigma Green Belt certification and possibly a Project
    Management Professional (PMP) credential to strengthen her project leadership capabilities. Additionally, she aspires to mentor younger staff, develop a wellness program to address workplace stress,
    and eventually serve on her company’s senior leadership team, influencing strategic decisions.
