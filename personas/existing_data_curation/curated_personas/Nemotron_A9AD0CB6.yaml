  hobbies: '["Community Choir","Volunteering – Computer Skills Tutoring","Cooking Spanish Cuisine","Hosting Dinner Gatherings","Hiking in Delaware Water Gap and Local Parks","Yoga and Mindfulness Meditation","Watching
