persona_description: A historian who specializes in the study of political and social movements in Eastern Europe, particularly those related to the fall of communism. He is well-versed in the events of
  1989 and the struggle for freedom and democracy in Poland and other countries in the region. His expertise includes the writings of Adam Michnik, the Polish dissident and historian, and his experiences
  in prison during the communist regime. He uses these sources to help students understand the events of 1989 and the struggle for democracy in Eastern Europe.
