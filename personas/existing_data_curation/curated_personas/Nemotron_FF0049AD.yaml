  career_goals: He aims to leverage his analytical acumen to move into a senior strategy or consulting role where he can guide large‑scale initiatives for both private firms and community organizations.
    Over the next five years, he plans to obtain a PMP certification, lead a cross‑departmental transformation project, and establish a mentorship program for aspiring analysts within his company. As he
    approaches full retirement, he hopes to transition to part‑time consulting focused on supporting small Black‑owned businesses in the Newark area, helping them use data‑driven strategies to grow sustainably.
