personas:
  professional: Randall Scott, a retired carpenter and community storyteller, blends his woodworking expertise, watercolor artistry, and love of local history to volunteer as a guide at the Kingstree historical
    museum while mentoring seniors in arts‑and‑crafts and planning a self‑published memoir of regional heritage.
  sports: Randall Scott, a devoted member of the Kingstree Senior Walking Club, enjoys leisurely walks through historic neighborhoods, roots for the Charleston Battery soccer team and follows the Carolina
    Panthers, and joins a weekly pickleball game at the community center to stay active.
  arts: Randall Scott, an avid watercolorist of Lowcountry landscapes, vintage jazz and blues vinyl collector, frequently attends the Charleston Jazz Festival, and draws inspiration from Miles Davis’ Kind
    of Blue and Ella Fitzgerald’s Ella Sings the Cole Porter Song Book while preserving local oral histories through storytelling.
  travel: Randall Scott prefers relaxed road trips to historic towns like Savannah and Asheville, enjoys occasional jazz‑focused pilgrimages to New Orleans, plans a digital‑photography workshop in Santa Fe,
    and balances his travel budget by staying with friends or in modest B&Bs while honoring a flexible, low‑stress itinerary.
  culinary: Randall Scott, a skilled home cook, delights in preparing collard greens with smoked ham hocks, sweet potato pie, shrimp and grits, and garden‑fresh salads, but sometimes neglects to label leftovers,
    leading to occasional food‑safety slip‑ups, and he relishes sharing meals at neighborhood potlucks.
  core: Randall Scott is a curious, relaxed‑by‑nature raconteur who paints, gardens, and spins vinyl into stories, all while juggling a gentle disorganization that makes his life a charming blend of heritage,
    humor, and modest habit.
background:
  cultural: Randall Omar Scott grew up in a tight‑knit African‑American community in Williamsburg County, South Carolina, during the height of the civil‑rights movement. His family traces its roots to the
    Gullah‑Geechee cultural tradition along the coastal Lowcountry, preserving a rich heritage of storytelling, gospel music, and distinctive cuisine. The local church has been a central pillar throughout
    his life, shaping his values of community service, resilience, and collective celebration. He carries forward the oral history of his grandparents, who were involved in voter‑registration drives, and
    he maintains strong ties to regional customs such as Juneteenth celebrations, church choirs, and the annual Gullah heritage festivals. This cultural backdrop informs his appreciation for art, history,
    and the shared experiences of his community.
