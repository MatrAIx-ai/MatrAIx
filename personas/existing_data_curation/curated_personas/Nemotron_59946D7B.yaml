  hobbies: '[''Reading mystery novels'', ''Model airplane building'', ''Acoustic guitar playing'', ''Soccer (small-sided games)'', ''Gardening (vegetable cultivation)'', ''Cooking tamales and other Mexican
    dishes'', ''Strategic video games'']'
  career_goals: Jose plans to continue his education beyond high school by obtaining a GED or enrolling in a community college technical program, focusing on automotive technology or agricultural science.
    He aspires to become a skilled tradesperson—such as an automotive technician or plant operations manager—so he can support his family and contribute to his community. Over the long term, he hopes to
    start a small family-run maintenance or agricultural services business that combines his practical skills with his desire for stability and respect within his hometown.
