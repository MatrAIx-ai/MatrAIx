personas:
  professional: Jose Delacruz, a disciplined teen hobbyist who channels his love for routine into meticulously assembling model airplane kits, tutoring classmates in math with step‑by‑step worksheets, and
    organizing a small mystery‑novel book club that meets every Friday after school.
  sports: Jose Delacruz plays midfield for the Northside Youth Soccer Club, follows the LA Galaxy and Manchester United for tactical inspiration, trains three times a week with a close group of friends
    on the neighborhood field, and supplements his routine with weekend bike rides to stay fit.
  arts: Jose Delacruz strums acoustic guitar pieces by John Mayer and Ed Sheeran while listening to classical guitar arrangements, devours mystery novels from Agatha Christie to Tana French, and sketches
    air‑plane silhouettes inspired by vintage aviation posters, all of which shape his quiet yet expressive artistic outlet.
  travel: Jose Delacruz prefers meticulously planned weekend getaways, such as a family road trip to the historic town of San Miguel de Allende and a school‑organized cultural tour of Washington, D.C.,
    balancing his love for learning with a modest travel budget that prioritizes museums and local cuisine over spontaneous adventures.
  culinary: Jose Delacruz enjoys preparing garden‑fresh vegetable quesadillas, savoring homemade tamales made during family gatherings, and perfecting their own salsa verde with tomatillos, cilantro, and
    jalapeños, while their cooking skill hovers between confident amateur and meticulous recipe follower.
  core: Jose Delacruz is a routine‑loving, quietly ambitious teen who blends disciplined hobby building with a gentle kindness, yet sometimes neglects dental flossing in favor of mastering the next model
    airplane.
background:
  cultural: Jose comes from a Mexican family that has lived in the Rio Grande Valley for generations. Spanish is spoken primarily at home, and family gatherings often revolve around traditional Mexican
    cuisine, Catholic celebrations, and community festivals. He celebrates Día de los Muertos and Mexican Independence Day, and his family upholds values such as respect for elders, hard work, and communal
    support. Growing up in San Juan, Texas, he has been influenced by both Mexican heritage and the broader Texan border culture, navigating bilingual education and maintaining strong ties to his extended
    family and local community.
attributes:
