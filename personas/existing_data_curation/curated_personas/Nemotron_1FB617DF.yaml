  career_goals: Shobana is aiming to earn a master’s degree in Educational Leadership within the next three years to qualify for higher administrative roles. She intends to transition into a lead teaching
    assistant or instructional coordinator position, where she can design and oversee culturally responsive curriculum resources. Her long‑term ambition is to become a school administrator or program director,
    leveraging her competitive drive and critical perspective to improve academic outcomes. Additionally, she plans to launch an after‑school tutoring program focused on STEM subjects for underserved students
    in her community, combining her practical expertise with her passion for education equity.
