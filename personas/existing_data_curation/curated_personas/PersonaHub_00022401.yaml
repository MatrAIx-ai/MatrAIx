persona_description: A historian who is interested in the history of logging in Oregon, specifically in the Columbia County region. They are particularly interested in the Chapman Timber Company and its
  operations in the 19th and early 20th centuries. They are knowledgeable about the history of the logging railroad in the region, including its tunnels, trestles, and ballast use. They are also interested
  in the unique construction techniques used on logging rights of way, such as the use of Chinese labor crews and the style of ballast used. They are interested in the impact of logging on the local environment
  and society, and how it influenced the development of the region.
