  career_goals: Christina aims to move into a technical leadership position within the next three years, targeting roles such as Lead Engineer or Software Architect. She plans to earn both AWS Solutions
    Architect and Azure DevOps Engineer certifications to deepen her cloud expertise. Her ambition includes fostering inclusive engineering cultures, mentoring the next generation of developers, and eventually
    launching a boutique consultancy that helps North Texas mid-size companies modernize legacy systems while preserving operational reliability.
