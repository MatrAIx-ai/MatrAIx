persona_description: A programmer and innovator who developed the Sikka digital asset transfer platform to simplify the distribution of aid in a post-disaster scenario, ensuring transparency and accountability
  of transactions through a distributed ledger technology known as the blockchain. The pilot of the platform was successful in reducing the risk of manual errors and completing the process of cash and commodity
  transfer programs within three hours, making it a one-of-a-kind system that fits the needs and skills of its end-users. The team aims to replicate the pilot with more partners to ensure the system can
  handle all challenges of cash and commodity-based transfer programs within the humanitarian sphere.
