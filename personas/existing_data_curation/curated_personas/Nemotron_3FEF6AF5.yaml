  hobbies: '[''Watercolor painting'', ''Speculative fiction reading'', ''Philosophy and popular science books'', ''Book club participation'', ''Community theater acting'', ''Choir singing'', ''Trivia nights'',
    ''Gardening (wildflowers)'', ''Birdwatching'', ''Puzzle solving (crosswords, jigsaws)'', ''Digital photography'', ''Docent volunteering at maritime museum'', ''Science outreach workshops'', ''Attending
    local lectures'', ''Travel to art museums'']'
  career_goals: Michelle aims to fuse her scientific knowledge with her artistic curiosity to enrich her community and create a lasting creative legacy. She plans to design and launch an intergenerational
    STEM‑art program at the Brick senior center that pairs hands‑on experiments with visual‑art workshops. She also seeks to mentor teenage girls interested in STEM, author an illustrated memoir that weaves
    personal narratives with reflections on abstract scientific concepts, and become a peer facilitator for anxiety‑support groups among seniors. Continuing her own lifelong learning, she hopes to study
    quantum mechanics and digital art through online courses.
