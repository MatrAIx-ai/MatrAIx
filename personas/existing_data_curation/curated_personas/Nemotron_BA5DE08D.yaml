personas:
  professional: Edgar Mccullar is a seasoned front‑of‑house professional whose polished customer‑service instincts, mastery of POS systems, and talent for orchestrating bustling restaurant floors now fuel
    their ambition to become a floor manager and eventually launch a boutique café‑gallery that blends their hospitality expertise with a love for contemporary art.
  sports: Edgar Mccullar fuels their weekend energy by hiking the Hill Country with the Austin Trails Club, cheering on Austin FC in MLS matches, occasionally joining a co‑ed softball league at Zilker Park,
    and maintaining a modest personal fitness routine that mixes trail runs with yoga to keep stress‑induced tension headaches at bay.
  arts: Edgar Mccullar’s artistic pulse is tuned to contemporary galleries featuring works by Kerry James Marshall and local Texas muralist James C. Langley, while their vinyl collection spins Joni Mitchell,
    The Velvet Underground, and modern jazz pianist Brad Mehldau, and evenings often find them strumming acoustic covers of Neil Young at open‑mic nights, all of which deepen their curatorial vision for
    the future café‑gallery.
  travel: Edgar Mccullar plans travel around long‑weekend road trips that blend art pilgrimages—like the Marfa installations and the Dallas Museum of Art—with culinary adventures in Oaxaca, Mexico, favoring
    a mix of meticulous itineraries for museum passes and spontaneous detours for street‑food photo shoots, while balancing a modest family budget that limits overseas excursions to once per year.
  culinary: Edgar Mccullar cooks at an intermediate level, remixing classic Texan staples such as smoked brisket by adding Korean gochujang glaze and pickled daikon, crafting jalapeño cornbread infused
    with Oaxaca cheese, and perfecting a coffee‑braised short‑rib ramen that showcases their love for smoky paprika, chipotle, and fresh cilantro.
  core: Edgar Mccullar is a socially‑charged hospitality veteran who channels relentless curiosity and a competitive edge into a dream of a café‑gallery, while they juggle anxiety‑fuelled stress and a penchant
    for late‑night vinyl listening.
background:
  cultural: Edgar grew up in a working‑class family in the Dallas‑Fort Worth suburbs of Texas, steeped in Southern hospitality and community traditions like neighborhood barbecues and church socials. His
    family’s European ancestry (primarily Anglo‑American) blended with the regional Texan culture, fostering a strong sense of pride in local customs while encouraging openness to broader artistic and intellectual
    pursuits. This duality—rooted in Texan modesty yet eager for new experiences—shapes his worldview, informing both his professional demeanor and his eclectic personal interests.
