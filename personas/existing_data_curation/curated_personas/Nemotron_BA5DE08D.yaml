  career_goals: Edgar aims to move into a supervisory role within the next two years, targeting a floor manager or assistant manager position at a reputable restaurant. He plans to enroll part‑time in a
    hospitality‑management program to formalize his expertise and eventually open a boutique café that doubles as a local art gallery, offering a curated menu that reflects his love for eclectic flavors
    and visual creativity. He also wants to build a modest online presence sharing food stories and art reviews, positioning himself as a trusted voice in the regional culinary scene while ensuring financial
    stability for his family.
