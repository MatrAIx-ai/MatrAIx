personas:
  professional: Shannon Smalley is a retail associate who uses their cash handling and POS expertise, combined with business coursework, to keep shift schedules meticulously organized, resolve customer
    conflicts calmly, and pursue a shift‑supervisor promotion within two years while championing a supportive team environment.
  sports: Shannon Smalley enjoys high‑energy Zumba and boot‑camp workouts, hikes the trails around Lake Norman on weekends, supports the Charlotte Hornets and Carolina Panthers, and participates in a local
    hiking club that meets monthly.
  arts: Shannon Smalley is an avid member of a coffee‑shop book club where they dissect contemporary novels like Sally Rooney’s *Normal People*, unwind with playlists featuring Beyoncé and Liz Lizzo, and
    regularly stream indie films from directors such as Greta Gerwig.
  travel: Shannon Smalley plans spontaneous road trips to Asheville’s Blue Ridge Parkway and the Outer Banks, balancing a student budget with a love for scenic drives, local craft breweries, and occasional
    stays in boutique Airbnbs.
  culinary: Shannon Smalley delights in cooking Southern comfort foods such as fried chicken, collard greens, and shrimp and grits, often experimenting with hot‑sauce blends and buttermilk batters while
    hosting intimate dinner parties for friends.
  core: Shannon Smalley merges a love for meticulous planning with energetic group fitness, yet occasionally forgets to water houseplants and binge‑watches reality TV late into the night.
background:
  cultural: Shannon was raised in suburban Charlotte, North Carolina, in a middle‑class white family with deep Southern roots. Her upbringing emphasized hospitality, community involvement, and respect for
    tradition, including regular participation in church events and family Sunday barbecues. While she values these regional customs—such as appreciation for Southern cuisine, polite conversation, and a
    strong sense of neighborly responsibility—she has also been exposed to Charlotte’s growing cultural diversity through school and her part‑time work. This blend of Southern heritage and contemporary
    urban influences shapes her worldview, fostering both an appreciation for community cohesion and an openness to new ideas.
