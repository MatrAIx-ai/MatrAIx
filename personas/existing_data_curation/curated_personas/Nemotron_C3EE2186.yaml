  career_goals: Shannon aims to leverage her practical experience and business coursework to advance within the retail sector. In the next two years she plans to earn a promotion to shift supervisor, and
    then pursue an assistant manager role while completing her bachelor's degree in Business Administration. Her long‑term ambition is to become a store or district manager for a regional chain, where she
    can apply her organized approach, leadership skills, and ability to foster a supportive, team‑focused environment. She also hopes to develop expertise in operations management, enabling her to contribute
    to process improvements and employee development.
