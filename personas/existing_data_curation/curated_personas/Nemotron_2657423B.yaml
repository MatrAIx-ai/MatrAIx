  career_goals: James hopes to turn his love for art and technology into a career in multimedia design or video game development. He dreams of attending a specialized high‑school program in graphic arts,
    earning a scholarship for a Bachelor of Fine Arts, and eventually working as a concept artist or indie game creator. His competitive nature pushes him to win local art contests and coding hackathons,
    while his curiosity fuels a desire to experiment with virtual reality storytelling. He also keeps a backup ambition of becoming a journalist or documentary filmmaker, using his skeptical eye to investigate
    and present compelling stories.
