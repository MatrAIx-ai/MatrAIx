personas:
  professional: James Brown, a 13‑year‑old budding game developer and digital illustrator, channels their curiosity and competitive edge into creating simple tabletop‑style games on a tablet while applying
    the organization learned from debate club to meet tight deadlines and the skeptical eye from peers to fine‑tune gameplay.
  sports: James Brown dominates the local Haymarket Hoops youth league, idolizes the Washington Wizards and the Virginia Cavaliers, practices shooting drills after school, and approaches fitness with a
    competitive mindset that pushes them to improve while still joining weekend pick‑up games at the community park.
  arts: James Brown devotes evenings to sketching comic characters, experimenting with digital brushes in Procreate, and binge‑watching art history documentaries featuring Van Gogh and Street Art legends
    like Banksy, while their love for Studio Ghibli’s animation fuels weekly art‑swap meetups with friends.
  travel: James Brown plans weekend hikes through Shenandoah National Park’s Skyline Drive and day trips to the historic Manassas battlefield, while dreaming of a future spring visit to Washington, D.C.’s
    Smithsonian museums, balancing family budget limits with a yearning for immersive, educational travel.
  culinary: James Brown favors pepperoni pizza and late‑night grilled cheese with sharp cheddar, often refines their cooking by adding fresh basil to homemade spaghetti sauce and experimenting with smooth
    berry‑banana smoothies after watching cooking tutorials online.
  core: James Brown, a 13‑year‑old blend of artistic curiosity, competitive drive, and occasional stress‑induced overthinking, navigates school, sports, and creative projects with organized enthusiasm that
    sometimes spirals into worrying perfectionism.
background:
  cultural: James is a white American raised in Haymarket, Virginia, a suburban community in Prince William County that blends a modest, middle‑class lifestyle with a strong sense of local history. His
    family participates in community events like the Haymarket Fall Festival and local 4th‑of‑July fireworks, reflecting the region’s patriotic traditions. Growing up near historic sites such as Manassas
    National Battlefield Park and within commuting distance to Washington, D.C., he has been exposed to American Civil War history and contemporary political discourse, which feed his curiosity and critical
    thinking. The cultural environment emphasizes both academic achievement and extracurricular involvement, encouraging James to pursue diverse interests while maintaining a balanced, organized approach
    to his responsibilities.
