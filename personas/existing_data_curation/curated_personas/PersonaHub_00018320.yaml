persona_description: Annie Jump Cannon, a pioneering female astronomer and mathematician, was born in Dover, Delaware in 1863. Her father, Wilson Cannon, was a state senator and shipbuilder, while her mother,
  Mary Jump, taught her about constellations. Cannon studied astronomy and physics at Wellesley College and helped develop the Henry Draper Catalog at Harvard, which catalogued about 500,000 stars and was
  adopted by the International Astronomical Union as the official system for stellar spectra classification. Despite being accepted begrudgingly in the field, Cannon was the first female to earn an honorary
  doctorate from Oxford and the first woman officer of the American Astronomical Society. She was deaf, but this did not prevent her from making significant contributions to the field of astronomy. Cannon's
  disability was not considered a barrier to her success, and she was nominated for election to the National Academy of Sciences but not elected due to a colleague's concern about her disability.
