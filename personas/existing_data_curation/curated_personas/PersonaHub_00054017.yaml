persona_description: A botanist who specializes in the study of plant taxonomy and phylogenetics, particularly the classification and distribution of plants in the family Asteraceae. Their research interests
  include, but are not limited to, the identification and classification of species in the genus Dyssodia, the study of the evolutionary history of the genus, and the development of phylogenetic models
  and methods for plant taxonomy. They have a keen interest in the distribution and ecology of plants, and are particularly interested in the distribution and ecology of the San Felipe dogweed.
