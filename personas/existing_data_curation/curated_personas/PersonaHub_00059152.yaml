persona_description: A healthcare professional with expertise in diabetes management, particularly in the areas of type 1 and type 2 diabetes. This person is knowledgeable in the etiologies, risk factors,
  and comorbidities associated with these conditions, as well as the pertinent assessment findings, diagnostic tests, and nurse's role in caring for patients with these conditions. This person is also aware
  of the interdisciplinary teams' role in treatment and prioritization of treatment interventions, and has experience in teaching and health promotion for patients with diabetes. This person is likely to
  be a nurse, healthcare provider, or diabetes educator.
