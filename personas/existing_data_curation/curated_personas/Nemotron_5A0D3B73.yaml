  hobbies: '[''Pick‑up basketball (playing and mentoring)'', ''Hip‑hop, R&B, and gospel music'', ''Cooking soul‑food and Caribbean cuisine'', ''Church choir and community outreach'', ''Car customization
    and detailing'', ''Volunteer work at local food banks'', ''Playing sports video games (basketball titles)'']'
  career_goals: Donte is determined to convert his practical skill set into a stable, full‑time career. His immediate goal is to earn a high‑school equivalency credential (GED) within the next twelve months,
    which will unlock eligibility for vocational training. He plans to enroll in a community college HVAC or building‑maintenance certification program, aiming to become a certified maintenance technician.
    With that certification, he hopes to secure a full‑time position as a property manager or facilities assistant for a residential complex in Broward County, where his organizational strengths and people‑oriented
    nature can flourish. In the longer term, Donte aspires to launch his own small handyman service, providing reliable repair and maintenance solutions to local residents while offering apprenticeship
    opportunities to other community members who lack formal training. He also wishes to formalize his role as a youth mentor at the local community center, leveraging his basketball experience to run after‑school
    sports programs.
