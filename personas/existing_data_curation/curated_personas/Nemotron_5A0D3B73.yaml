personas:
  professional: Donte Gordon, a 42‑year‑old aspiring maintenance technician, leverages his hands‑on home‑repair, automotive, and event‑coordination skills to juggle part‑time handyman gigs while studying
    for his GED and planning a future in property management, and they approach each task with a blend of structure and community spirit.
  sports: Donte Gordon dominates the Fort Lauderdale community courts each evening, playing pick‑up basketball with the local Miami Heat fan club, coaching younger teammates, and cheering for the Miami
    Heat while also volunteering at the Broward County food bank after games, and they relish the camaraderie and competition.
  arts: Donte Gordon blends his love for hip‑hop, R&B, and contemporary gospel by performing with his church choir, blasting Kendrick Lamar and Kirk Franklin at block parties, and breaking into spontaneous
    dance moves whenever Mary J. Blige’s verses drop, and they use music as a bridge for community connection.
  travel: Donte Gordon prefers short, budget‑friendly road trips, often cruising down the I‑95 to the Florida Keys for a weekend beach escape, while dreaming of a culturally rich pilgrimage to Kingston,
    Jamaica to explore its music and cuisine, and they balance travel ambition with practical financial constraints.
  culinary: Donte Gordon’s kitchen is a crossroads of soul‑food and Caribbean flavors, regularly whipping up fried chicken with collard greens, jerk‑spiced pork, and rice‑and‑peas, seasoning dishes with
    Scotch bonnet pepper and all‑purpose seasoning, while they oscillate between confident skillet sear and experimental sauce maker, often sharing the meals at church potlucks.
  core: Donte Gordon, a 42‑year‑old community‑focused handyman‑in‑training, balances structured ambition with lively social rhythms, all while constantly juggling basketball, car tweaks, and soulful cooking,
    and they never miss a chance to mentor a younger neighbor.
background:
  cultural: Donte grew up in the culturally rich Black neighborhoods of Fort Lauderdale, where African‑American traditions intersect with Caribbean influences from Haitian, Jamaican, and Trinidadian communities.
    Family gatherings often feature soul food, reggae, and calypso rhythms, while church life provides a strong sense of community, mutual aid, and gospel music. He celebrates milestones such as Juneteenth
    and participates in local Caribbean festivals that showcase music, dance, and cuisine. The multicultural environment has shaped his bilingual abilities (English and conversational Spanish) and his appreciation
    for diverse culinary flavors. His identity as a Black man in South Florida informs his worldview, fostering resilience and a commitment to uplifting his community through mentorship and service.
attributes:
  skills: '[''Basic home repairs (plumbing, painting, drywall)'', ''Vehicle maintenance (oil changes, tire rotation, basic troubleshooting)'', ''Event coordination and volunteer management'', ''Basic computer
