persona_description: 'A researcher or advocate for sustainable agriculture and environmental conservation, particularly focused on the development and promotion of alternative protein industries. They are
  interested in the economic and environmental benefits of continued R&D and production in the alternative protein industry, and are aware of the challenges and risks associated with this industry during
  economic downturns. They are passionate about mitigating issues related to animal welfare, zoonotic disease risk, tropical deforestation, and microbial contamination, and are committed to promoting technological
  solutions to environmental and human development challenges. They are knowledgeable about the research centre The Breakthrough Institute, which focuses on identifying and promoting technological solutions
  to environmental and human development challenges in three areas: energy, conservation, and food and farming.'
