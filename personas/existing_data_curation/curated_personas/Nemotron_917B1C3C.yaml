  career_goals: Jason aims to transition into a senior engineering role where he can lead architecture decisions for scalable cloud‑native applications. He aspires to become a technical team lead, guiding
    cross‑functional squads with his organized and reliable style, while fostering a collaborative culture that values harmony and personal development. Over the next five years, he plans to deepen his
    expertise in serverless architectures, contribute to open‑source projects, and eventually mentor emerging developers both at work and in community programs, all while maintaining a balanced life with
    his family.
