personas:
  professional: Gerald Perry is a seasoned glazier with expertise in precision cutting, energy‑efficient window retrofits, and project coordination, who applies his methodical, structured mindset to deliver
    reliable installations and is actively pursuing master glazier certification to launch a sustainable glazing contractor business.
  sports: Gerald Perry is an avid supporter of local high‑school football, cheering for the Riverbank Raiders every Friday night, a dedicated fan of the San Francisco Giants, a member of the Modesto Cycling
    Club who rides the regional trail network on weekends, and they incorporate occasional fishing trips on the Tuolumne River as a form of low‑impact sport.
  arts: Gerald Perry is a woodworking hobbyist who admires the craftsmanship of makers like Sam Maloof, enjoys listening to classic rock artists such as The Eagles and John Denver while shaping pine chairs,
    and attends the annual Modesto Art Walk where they appreciate works by local muralist Carlos Rivera; their appreciation for functional art informs their design choices in glazing projects.
  travel: Gerald Perry is a weekend explorer who frequently hikes the Sierra Nevada trails near Lake Tahoe, has taken a family road‑trip to Yosemite National Park to photograph granite cliffs, and dreams
    of touring the glass museums of Murano, Italy, though they currently prioritize trips that fit within a modest budget and family schedule.
  culinary: Gerald Perry is a backyard grill master who specializes in cedar‑plank salmon from their recent fishing hauls, pairs it with rosemary‑infused potatoes, enjoys crafting homemade barbecue sauce
    with smoked paprika and brown sugar, and occasionally prepares tri‑tip steak using a dry rub of garlic and cumin while sipping a cold craft beer.
  core: Gerald Perry is a methodical 34‑year‑old glazier who balances precise glasswork with fishing, woodworking, and family barbecues, yet sometimes overlooks routine health checks in favor of project
    deadlines.
background:
  cultural: Gerald grew up in a modest, working‑class family in California's Central Valley, where agricultural roots and small‑town values emphasized hard work, self‑reliance, and community involvement.
    Though ethnically white with German and Irish ancestry, he was shaped by the multicultural environment of Stanislaus County, participating in county fairs, local festivals, and neighborhood gatherings.
    This background instilled a pragmatic, down‑to‑earth outlook, a respect for diverse cultural influences, and a strong sense of responsibility toward family and community.
attributes:
  skills: '[''Glass cutting'', ''Glass installation'', ''Glass repair and replacement'', ''Energy‑efficient window retrofitting'', ''Interpretation of architectural drawings'', ''Building code and safety
    compliance'', ''Use of hand and power glazing tools'', ''Project estimation and budgeting'', ''Small team supervision'', ''Customer communication and service'']'
  hobbies: '[''Fishing'', ''Woodworking'', ''Community volunteering'', ''Attending local sports events'', ''DIY home improvement'', ''Cycling'', ''Reading construction manuals'', ''Barbecue cooking'']'
  career_goals: Gerald aims to achieve master glazier certification and eventually launch his own glazing contractor business that serves both residential and commercial clients throughout the Central Valley.
    He wants to specialize in high‑rise commercial projects, low‑E and smart‑glass installations, and integrated solar‑panel glazing. Obtaining advanced industry certifications, mentoring apprentices, and
    expanding his service offerings to include energy‑efficiency consulting are key milestones. Underlying all of these ambitions is the desire to secure long‑term financial stability for his family and
    to own a sustainably upgraded home.
