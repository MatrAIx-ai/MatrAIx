persona_description: A political economist who specializes in the study of the value of commodities and the regulation of their exchange. He has a deep understanding of the principles of economics and the
  social function of commodities. He is particularly interested in the concept of labour and its role in the production of commodities. He is a skilled communicator and has a keen interest in the practical
  implications of his research. He is a member of the political economy community and has a passion for the field. He is a member of a group of scholars who are working on a project to develop a new economic
  theory.
