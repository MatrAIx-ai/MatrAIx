  career_goals: Looking ahead, Ruben aims to transition from a frontline cashier role to a supervisory position where he can mentor newer employees and improve store processes. He plans to complete his
    associate’s degree in Business Administration, which will reinforce his organizational strengths and open opportunities for part‑time management responsibilities. Parallel to his professional goals,
    Ruben hopes to launch a small side venture selling handcrafted Mexican‑inspired décor, allowing him to merge his art appreciation with entrepreneurship. He also envisions volunteering as an art‑history
    educator at the local community center, sharing his love of varied experiences with seniors and youth before he fully retires.
