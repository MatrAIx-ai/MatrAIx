persona_description: A facility manager who is responsible for planning and managing cryogenic storage systems for vaccines and other high-temperature-sensitive materials. The persona is knowledgeable about
  the technical aspects of cryogenic storage, including the selection of appropriate systems, the evaluation of utilities and safety procedures, and the life cycle costs associated with the system. The
  persona has experience in evaluating the space requirements for a cryogenic storage system, and is familiar with the potential risks and challenges associated with using flammable refrigerants in cryogenic
  storage systems. The persona is also aware of the importance of monitoring and controlling the rejected heat from cryogenic systems, and is responsible for ensuring that the system meets the necessary
  safety and environmental requirements.
