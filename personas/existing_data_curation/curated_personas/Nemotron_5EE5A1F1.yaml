personas:
  professional: Steven Stock is a retail operations manager who leverages his knack for routine‑driven scheduling, meticulous inventory control, and empathetic staff supervision to drive efficiency while
    fostering a supportive, harmonious workplace, and they consistently model calm conflict resolution.
  sports: Steven Stock plays in a Southern Division recreational softball league, follows the Detroit Tigers, Lions, Pistons, and Red Wings with fervor, and stays active through weekly family bike rides
    and weekend fishing trips, preferring low‑impact exercise over gym workouts but never missing a community softball game on Saturdays, and they view teamwork as a vital extension of their community values.
  arts: Steven Stock enjoys attending community theater productions and local live music nights, especially when the stage features Detroit‑born musicians like Bob Seger, The White Stripes, and folk legend
    John Prine, and finds solace in reading self‑improvement authors such as Brené Brown and Stephen Covey, which subtly informs his appreciation for storytelling and personal growth, and they often discuss
    these works with their church group.
  travel: Steven Stock prefers well‑planned weekend getaways to Michigan’s inland lakes for fishing and biking, has explored the Upper Peninsula’s Pictured Rocks and spent evenings on Mackinac Island, dreams
    of a road trip along the Pacific Coast Highway, and balances family obligations with budget‑conscious travel, favoring familiar routes over spontaneous overseas adventures, and they keep a travel journal
    to capture each lake sunrise.
  culinary: Steven Stock is a confident backyard griller who regularly cooks smoked ribs, cedar‑plank trout, corn on the cob, and Detroit‑style pizza topped with pepperoni and mozzarella, delights in seasoning
    with smoked paprika and fresh herbs from the farmer’s market, and enjoys pairing meals with locally brewed craft beer, though they sometimes over‑salt their marinades in a quest for bold flavor, and
    they pride themselves on mastering the perfect char.
  core: Steven Stock is a routine‑loving, community‑focused retail manager who battles stress with self‑help books, fuels their days with fish‑filled weekends, and they can’t resist a perfectly charred
    burger, even if it means occasional over‑cooking.
background:
  cultural: Steven was raised in the Midwest in a working-class, white family with German-Polish ancestry common to Macomb County. His upbringing emphasized hard work, practicality, community involvement,
    and traditional family values. He maintains close ties to his local community, regularly attending church, participating in neighborhood events, and valuing the cooperative, pragmatic spirit of the
    region.
