personas:
  professional: Snehal is a veteran dietitian and ophthalmic technician who merges precise nutritional assessments with artistic visual storytelling, and they use their imaginative curiosity and organized
    flexibility to design bilingual, art‑infused health workshops for senior patients.
  sports: Snehal is a loyal fan of the Seattle Seahawks, Mariners, and Sounders, and they maintain fitness through a weekly senior tai chi circle, occasional gentle yoga sessions at the community center,
    and brisk walks with the local walking club through the arboretum, preferring low‑impact exercise that nurtures balance and joint health.
  arts: Snehal engages deeply with the arts, immersing themselves in sitar performances by Ravi Shankar, exploring abstract watercolor techniques inspired by Wassily Kandinsky, and debating speculative
    novels by Ursula K. Le Guin and philosophical works by Friedrich Nietzsche during the local book club, and they let these experiences fuel their creative worldview.
  travel: Snehal favors meticulously planned journeys that blend cultural immersion with artistic inspiration, such as a summer retreat to the Scottish Highlands, a reflective visit to Kyoto’s Zen gardens,
    weekend getaways to the San Juan Islands, and occasional pilgrimages to the Mediterranean island of Crete to sketch coastal vistas, and they balance a modest travel budget with health considerations.
  culinary: Snehal is an adept home cook who delights in reimagining classic dishes like turmeric‑infused lentil dal and low‑sugar kheer, and they use fresh garden herbs such as basil, cilantro, and mint,
    incorporating spices like cumin and ginger to create nutritious meals that satisfy both palate and health goals.
  core: Snehal balances a disciplined health career with a moonlit habit of sketching late‑night visions, and they occasionally lose track of time in the herb garden and procrastinate on updating retirement
    paperwork.
background:
  cultural: Snehal was born in Pune, Maharashtra, India, into a multilingual Marathi‑speaking family that valued education, communal meals, and Ayurveda‑inspired wellness. She moved to the United States
    in the early 1970s to pursue her STEM degree, eventually settling in the Seattle metropolitan area. Her cultural identity blends traditional South Asian customs—celebrating Diwali, observing fasts,
    and preparing festive meals—with the progressive, multicultural environment of the Pacific Northwest. As a widowed senior, she maintains close ties with the local Indian diaspora, participating in temple
    events and volunteering at a community health clinic serving immigrants. Her heritage informs her professional ethos, prompting her to integrate Ayurvedic dietary principles with contemporary clinical
    nutrition, and to ensure that health information is accessible in both English and Marathi. She respects intergenerational wisdom, values humility, and embodies a resilient, adaptive outlook shaped
    by both her Indian upbringing and her American experiences.
attributes:
  skills: '[''Nutritional assessment and counseling'', ''Dietary planning for chronic disease management'', ''Proficiency with diet analysis software (e.g., NutriBase, Food Processor)'', ''Conducting visual
    acuity, refraction, and ocular health screenings'', ''Operating retinal imaging equipment (OCT, fundus photography)'', ''Calibration and maintenance of ophthalmic diagnostic instruments'', ''Electronic
    medical record management (Epic, Cerner)'', ''Cross‑cultural patient communication (English, Marathi/Hindi)'', ''Designing and leading health‑education workshops integrating art'', ''Mentoring junior
    technicians and volunteers'']'
  hobbies: '[''Abstract watercolor painting'', ''Reading speculative fiction and philosophy'', ''Cultivating a herb garden'', ''Cooking healthy adaptations of traditional South Asian dishes'', ''Listening
    to and playing Hindustani classical music (sitar)'', ''Practicing tai chi and yoga'', ''Leading nutrition workshops at a senior center'', ''Participating in a small book club on art and ideas'', ''Exploring
    basic Python programming for health data analysis'', ''Creating visual art‑therapy activities for patients'']'
  career_goals: 'Snehal aims to deepen her expertise by obtaining the Certified Ophthalmic Technician (COT) credential and pursuing a master''s‑level certification in clinical nutrition. She aspires to
    lead a community outreach program in King County that educates senior South Asian immigrants about the interplay between diet and eye health, producing bilingual educational pamphlets that blend traditional
    Ayurvedic principles with evidence‑based recommendations. In the next five years she hopes to publish a guidebook titled ''Vision and Vitality: Nutrition for Healthy Eyes'' and to mentor a cohort of
    young health‑service professionals, championing diversity and cultural competence in the clinical setting. Additionally, she envisions collaborating with local art centers to develop a pilot art‑therapy
    module that supports patients coping with visual impairment.'
