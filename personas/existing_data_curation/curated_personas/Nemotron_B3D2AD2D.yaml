  career_goals: Karen aims to channel her competitive drive and practical curiosity into a future career in robotics or aerospace engineering. She plans to join her school's robotics club, win regional
    STEM competitions, and earn a scholarship to a specialized STEM high school. In the long term she envisions designing sustainable technology solutions, such as energy‑efficient drones or eco‑friendly
    robotics, and hopes to study engineering at a leading university where she can continue to apply her calm, resilient mindset to complex challenges.
