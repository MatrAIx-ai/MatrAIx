persona_description: A psychologist with extensive experience in treating individuals who have experienced complex trauma, particularly in the context of childhood sexual abuse. This professional is skilled
  in identifying and treating the specific symptoms and effects of complex trauma, including emotional regulation, consciousness, self-perception, distorted perceptions of the perpetrator, relations with
  others, one's system of meanings, and the avoidance of discussing trauma-related topics. The psychologist is also skilled in helping survivors develop coping mechanisms and strategies to manage their
  symptoms, including the use of alcohol or other substances as a way to avoid and numb feelings and thoughts related to the trauma, and engaging in self-mutilation and other forms of self-harm as a way
  to cope with overwhelming emotion and/or to numb out pain.
