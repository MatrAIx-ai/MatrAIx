  hobbies: '[''Hiking'', ''Landscape Photography'', ''Home Cooking (Greek & Southern fusion)'', ''Volunteer work (Greek Orthodox festival, youth mentorship)'', ''Fishing'', ''Classic Rock Vinyl Listening'',
    ''Woodworking'']'
  career_goals: Cultivating his expertise into a senior HR leadership role, Panagiotis aims to become an HR Manager or Director within the next five years, focusing on building a culture of collaboration,
    continuous learning, and employee well‑being. He wants to lead initiatives that integrate practical HR tech solutions, mentor junior HR staff, and champion mental‑health resources that reflect his belief
    in harmony and emotional resilience. Additionally, he hopes to earn a SHRM‑CP certification to formalize his knowledge and eventually provide consulting services to small businesses in Chesterfield
    County, helping them develop fair and flexible work practices.
