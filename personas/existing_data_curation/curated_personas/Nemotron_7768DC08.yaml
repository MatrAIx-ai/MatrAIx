  hobbies: '[''photography (street murals)'', ''visiting art galleries'', ''reading contemporary fiction and poetry'', ''attending spoken‑word poetry events'', ''yoga and mindfulness meditation'', ''urban
    balcony gardening'', ''cooking traditional soul‑food'', ''collecting vintage vinyl records (jazz, hip‑hop)'']'
  career_goals: Kimberly aims to transition from her current managerial role to a senior district manager position within a regional retail chain, where she can influence broader operational strategies
    and mentor emerging leaders. She plans to earn an associate degree in business administration to supplement her practical experience and strengthen her credentials. Long‑term, she aspires to launch
    a consulting practice that helps small Bronx businesses integrate efficient management practices with community‑focused art initiatives, thereby creating culturally resonant spaces that reflect her
    appreciation for unconventional ideas. Additionally, she is motivated to champion professional development programs for women of color, fostering greater representation in leadership roles.
