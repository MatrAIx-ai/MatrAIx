persona_description: A conservation biologist who specializes in Chinook salmon management, specifically focusing on the Nechako River and its Chinook salmon populations. The individual is knowledgeable
  about the history and trends of Chinook salmon in the Nechako River, as well as the impact of the 1952 Kenney Dam closure and the subsequent decline in Chinook salmon escapements. The person is also skilled
  in conducting overflights of the Nechako River to enumerate the spawner population and is familiar with the Conservation Goal established in the 1987 Settlement Agreement. The individual is interested
  in maintaining annual Nechako Chinook escapement monitoring to continue tracking the future status of the population and is concerned about the impact of the High Bar slide on the survival of Nechako
  Chinook spawners in 2019.
