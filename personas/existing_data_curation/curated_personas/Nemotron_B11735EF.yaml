  career_goals: Arthur aims to transition into senior leadership within operations, targeting a Director of Business Operations role in a fast‑growing technology or manufacturing firm in the Southeast.
    Over the next five years, he plans to earn an MBA to complement his practical experience and to spearhead an enterprise‑wide initiative that integrates AI‑driven analytics into operational workflows.
    He is motivated to build a high‑performance operations team that consistently exceeds KPIs, earn industry recognition for innovative process redesign, and eventually launch his own consultancy that
    helps midsize companies achieve scalable efficiency through creative, data‑backed strategies.
