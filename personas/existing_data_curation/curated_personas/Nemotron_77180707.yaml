  career_goals: Joshua aspires to turn his passion for art and technology into a career. His short‑term goal is to earn a scholarship to a community college program in graphic design or multimedia arts,
    where he can refine his technical skills and build a professional portfolio. Long‑term, he dreams of becoming a freelance visual designer who collaborates with local nonprofits to produce culturally
    resonant campaigns, and eventually establishing a youth art and tech hub in the Joliet area to mentor other creative teenagers from under‑represented backgrounds.
