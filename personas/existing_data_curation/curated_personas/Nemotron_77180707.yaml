personas:
  professional: Joshua Pettaway is a 16‑year‑old aspiring visual designer who leverages his proficiency in Procreate, Canva, and basic HTML/CSS to produce eye‑catching graphics for his school’s social media
    and the local community center, channeling his methodical planning and calm under pressure into reliable project delivery while they often stay up late sketching ideas for future freelance work.
  sports: Joshua Pettaway plays pick‑up basketball at the community recreation center, follows the Chicago Bulls and Chicago White Sox for inspiration, and is a member of his high school’s off‑season workout
    club that meets at the local YMCA, while they also enjoy weekend runs along the Des Plaines River Trail during the spring.
  arts: Joshua Pettaway curates playlists that weave together Marvin Gaye’s soul classics, Kendrick Lamar’s contemporary hip‑hop, and Miles Davis’s jazz, while drawing visual influence from street artists
    like Banksy and Basquiat, and they channel their poetic voice through short verses reminiscent of Rupi Kaur and Langston Hughes.
  travel: Joshua Pettaway dreams of a weekend art‑tour in New York City’s Lower East Side to study graffiti, a cultural trek to Mexico City’s UNESCO‑listed murals, and a short road trip to Chicago’s Art
    Institute for inspiration, but they keep travel plans bounded by a modest student budget and school‑year obligations.
  culinary: Joshua Pettaway enjoys making loaded nachos with jalapeños, black beans, and sharp cheddar, while experimenting with homemade smoothie bowls featuring banana, spinach, and spirulina, and they
    often pair their meals with a mixtape of classic soul tracks that they say "taste better with rhythm."
  core: Joshua Pettaway is a methodical teen artist‑tech hybrid who blends community service with creative ambition, constantly balancing school, volunteer art projects, and a budget‑centric lifestyle while
    they occasionally succumb to impulse sneaker buys.
background:
  cultural: Joshua identifies as African American, rooted in a family that values community, church gatherings, and storytelling. Growing up in Joliet, part of the broader Chicago metropolitan area, he
    has been shaped by the city’s rich Black cultural heritage—from the blues and gospel choirs of his church to the vibrant street art and hip‑hop scenes that circulate through his neighborhood. Family
    traditions of Sunday picnics, soul food meals, and seasonal celebrations keep him connected to his ancestry, while his school and community center experiences expose him to a diverse tapestry of cultures
    that inform his artistic perspective.
