  hobbies: '[''Watercolor Painting'', ''Sketching'', ''Reading Speculative Fiction and Poetry'', ''Creative Writing (Short Stories, Journaling)'', ''Photography'', ''Board Games (e.g., Catan)'', ''Herb
    Gardening'', ''Visiting Art Galleries and Community Theatre'', ''Listening to Ambient and Classical Music'', ''DIY Crafts (Hand‑bound Notebooks)'']'
  career_goals: In the near term, Emily aims to step into a supervisory or team‑lead role within her call‑center, where she can coach colleagues, develop training programs that incorporate creative problem‑solving
    techniques, and drive higher customer satisfaction scores. Over the next five years, she hopes to transition into a user‑experience or customer‑experience design position that blends her service background
    with her artistic interests. Long‑term, Emily envisions launching a community‑focused boutique art studio or a small café that offers creative workshops, providing a space for local residents to explore
    painting, writing, and photography while leveraging her organizational and interpersonal strengths.
