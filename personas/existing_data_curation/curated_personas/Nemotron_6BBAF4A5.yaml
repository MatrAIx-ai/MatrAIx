personas:
  professional: William Devore is a full‑stack software developer who leverages a Midwestern work ethic and love for systematic problem‑solving; they architect clean, scalable web applications, champion
    Agile Scrum practices, and mentor junior engineers with clear, practical guidance.
  sports: William Devore fuels their fitness by cycling the Kickapoo State Park loop, hiking weekend treks, and cheering on the Chicago Cubs, Chicago Bears, and the local Peoria Chiefs while belonging to
    a neighborhood cycling club that meets every Saturday.
  arts: William Devore indulges in contemporary science‑fiction authors like Neal Stephenson and Liu Cixin, enjoys strategy board‑games with friends, attends performances at the Peoria Playhouse starring
    local talent, and unwinds to the indie folk sounds of Fleet Foxes and the classic rock of The Who.
  travel: William Devore plans their travel with spreadsheet precision, opting for budget‑friendly weekend getaways to Chicago’s deep‑dish pizza scene, a yearly hike through Yellowstone National Park, and
    a dream trip to Japan’s tech hubs to experience both leisure and innovation.
  culinary: William Devore’s culinary palette blends practical home‑brewing of a crisp American IPA using Cascade hops with a love for Midwest comfort foods such as pork tenderloin with apple butter, Chicago‑style
    deep‑dish pizza, and a Sunday roast featuring rosemary‑seasoned potatoes.
  core: William Devore embodies a pragmatic Midwestern mindset, balancing methodical tinkering with community‑focused teamwork, while occasionally letting a love for high‑tech gadgets spark spontaneous
    late‑night coding marathons.
background:
  cultural: William grew up in Peoria Heights, Illinois, a Midwestern community known for its modest, pragmatic values. His upbringing reflected the region’s strong work ethic, emphasis on reliability,
    and a community‑first mindset. He was exposed to Midwestern cultural staples such as local county fairs, high school sports (especially football and baseball), and family gatherings centered around
    hearty, home‑cooked meals. The area's blend of industrial heritage and agricultural surroundings fostered his appreciation for hands‑on craftsmanship and practical problem‑solving. While his ethnic
    background is White, his cultural identity is shaped by the modest, straightforward, and collaborative spirit characteristic of the Midwest.
