  career_goals: William aims to progress into a senior engineering role within the next three years, eventually taking on a technical lead or architect position where he can shape development processes
    and ensure product reliability. He is interested in obtaining cloud certifications (AWS Solutions Architect) and deepening his expertise in container orchestration (Kubernetes) to lead large‑scale deployments.
    Long‑term, he aspires to mentor a cohesive engineering team, champion data‑driven decision‑making, and contribute to open‑source projects that align with his values of practicality and community impact.
