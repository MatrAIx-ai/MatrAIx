    library"]'
  career_goals: Ashley dreams of turning her love for art into a career as a visual artist or illustrator, ideally working in graphic design, concept art for video games, or environmental illustration that
    raises awareness about nature conservation. She hopes to attend a high‑school program focused on the arts, then pursue a Bachelor of Fine Arts or a related degree. Over the long term, she envisions
    combining her creative talents with advocacy, perhaps collaborating with local environmental groups to produce compelling visual campaigns, and someday mentoring younger students through community art
    workshops.
