  career_goals: Joel aims to earn his GED and later complete an associate degree in criminal justice, positioning himself for promotion to Sergeant and eventually Detective within the gang‑units of the
    LAPD. He is particularly interested in specializing in investigations that affect the Salvadoran and broader Central‑American communities, using his cultural insight to improve intelligence gathering
    and community relations. Long‑term, he hopes to lead a community liaison program that mentors at‑risk youth, fostering trust between law enforcement and local immigrant families. He also wants to influence
    departmental policy toward more culturally responsive policing practices.
