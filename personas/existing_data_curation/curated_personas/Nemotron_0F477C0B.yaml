  career_goals: Mariateresa aims to transition into a senior art director role where she can lead a creative team and shape the visual strategy for socially responsible brands. She plans to earn a UX certification
    and incorporate emerging technologies like AR and interactive media into her portfolio. Long‑term, she envisions launching a boutique design studio focused on community‑centered projects in the greater
    Phoenix area, partnering with non‑profits and local businesses to promote sustainable branding. She also aspires to publish articles on design empathy, mentor emerging designers, and cultivate a work‑life
    balance that mitigates stress through mindfulness practices.
