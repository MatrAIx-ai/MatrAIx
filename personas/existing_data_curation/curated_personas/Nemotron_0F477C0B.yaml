  hobbies: '[''Acrylic and watercolor painting'', ''Pottery'', ''Desert landscape photography'', ''Hiking Sonoran trails'', ''Succulent gardening'', ''Southwestern cooking'', ''Jazz and zydeco music appreciation'',
