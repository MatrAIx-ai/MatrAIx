  career_goals: Grace aims to transition into a senior leadership role, such as Director of Communications for a regional arts council or nonprofit, where she can shape public perception of cultural initiatives.
    She is driven to develop award‑winning integrated campaigns that blend traditional PR with innovative digital storytelling, and to mentor emerging PR professionals, especially women over 40. In the
    next five years she plans to launch a boutique consulting practice focused on crisis preparedness and community engagement for small municipalities and arts organizations, and to author a guidebook
    on effective public relations for community arts.
