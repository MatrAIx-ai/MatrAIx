personas:
  professional: Jenna Shanker, a 30‑year‑old front‑line retail specialist, leverages her innate curiosity and practical mindset to streamline store operations, adeptly handling POS systems, inventory management,
    and visual merchandising while flexibly adapting to shifting priorities, and her cooperative yet assertive style shines when mentoring new staff and resolving customer conflicts.
  sports: Jenna Shanker, a 30‑year‑old outdoor enthusiast, hikes the Cascade foothills weekly with the North Cascades Hiking Club, roots for the Seattle Seahawks and Seattle Sounders, and balances this
    passion with occasional yoga sessions at a local studio to maintain flexibility and mental calm.
  arts: Jenna Shanker, a 30‑year‑old hobbyist photographer and knitter, captures misty mountain vistas in a style reminiscent of Ansel Adams, knits while listening to Maggie Rogers, devours mystery novels
    by Tana French, and regularly hosts board‑game nights featuring Catan and Ticket to Ride.
  travel: Jenna Shanker, a 30‑year‑old weekend explorer, plans spontaneous getaways to Oregon Coast towns like Cannon Beach, has trekked through Vancouver’s Stanley Park, and dreams of backpacking New Zealand’s
    South Island, all while juggling travel costs through discount airlines and budget‑friendly Airbnb stays.
  culinary: Jenna Shanker, a 30‑year‑old passionate home cook, experiments with seasonal vegetable ratatouille, rosemary focaccia, and lemon‑blueberry scones using fresh basil and thyme harvested from their
    garden, and delights friends at board‑game gatherings with these treats, despite a tendency to over‑indulge in sugary baked goods.
  core: Jenna Shanker, a 30‑year‑old pragmatic dreamer, blends curiosity with a relaxed, sometimes disorganized approach, finds solace in garden soil and photography, and constantly worries about the little
    details while nurturing a cooperative spirit.
background:
  cultural: Jenna identifies as a white American with roots in the Pacific Northwest. Raised in a middle‑class family in Washington, she blends a Midwestern work ethic with the region’s love of the outdoors.
    Her family traditions include celebrating holidays such as Thanksgiving and the Fourth of July with local foods and community gatherings. Living in Puyallup, she participates in regional events like
    the Washington State Fair and supports the local farmers market, reflecting the area’s agricultural heritage. Her cultural outlook is shaped by a pragmatic, community‑oriented mindset, valuing self‑reliance
    while staying connected to her neighborhood and its diverse traditions.
