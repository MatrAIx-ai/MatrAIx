  career_goals: Jenna aims to advance into retail management within the next few years, targeting roles such as assistant store manager and eventually store manager. She plans to complete a bachelor’s degree
    in business administration while working, to acquire strategic and financial expertise for higher‑level operations. Additionally, she is interested in developing e‑commerce capabilities to integrate
    online sales with her current store. Balancing career growth with family life, Jenna seeks a position that offers predictable scheduling, a supportive team environment, and opportunities to apply her
    curiosity for new retail technologies while maintaining a low‑stress workplace.
