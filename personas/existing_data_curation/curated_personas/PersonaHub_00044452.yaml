persona_description: An Italian researcher and engineer with expertise in the field of Carbon Dioxide Capture and Storage (CCS). This individual is particularly interested in the development and implementation
  of innovative monitoring and assessment tools for CCS, as well as in the study of the mechanisms of transport and storage of CO2 in the upper layers of the soil. This researcher is also looking for opportunities
  to collaborate with other experts in the field and to contribute to the development of a pan-European multi-centre infrastructure for CCS. They are interested in the potential impact of CCS on terrestrial
  and marine ecosystems and are seeking to develop monitoring strategies that can be used in both short and long term.
