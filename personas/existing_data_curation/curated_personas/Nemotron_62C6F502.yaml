  career_goals: Diana aims to ascend to an executive technology role, such as Chief Information Officer or Vice President of Technology, within the next five years. She is focused on driving digital transformation
    initiatives that leverage AI and advanced analytics to create competitive advantage. Her ambition includes building a robust cybersecurity framework for the organization, championing data‑driven decision
    making, and establishing a mentorship program that supports the development of women in tech. She also strives to balance her high‑achievement drive with personal well‑being by integrating stress‑reduction
    practices into her leadership style.
