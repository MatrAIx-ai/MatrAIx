persona_description: A business owner or operator who is responsible for the operation and management of a CHP plant or a combined heat and power system. This person is likely to be interested in understanding
  the data exchange process required for connecting the generation assets to the local network, especially in the context of low-capacity generators and the European Requirements for Generators (RfG) Code.
  They are also interested in the specific application forms and the guidelines provided by the Energy Networks Association (ENA) for connection applications, including the ENA EREC G99 Standard Application
  Form, which is tailored for larger generators. Additionally, they may be looking for guidance on the process of connecting generation assets to the UK and Ireland electrical network and the role of Distribution
  Network Operators (DNOs) in this process.
