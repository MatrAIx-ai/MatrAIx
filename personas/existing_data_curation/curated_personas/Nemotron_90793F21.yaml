    Research and Usability Testing'', ''Accessibility (WCAG) Compliance'', ''Design Systems Development'', ''Graphic Design'', ''Project Management'', ''Cross‑functional Team Collaboration'']'
  hobbies: '[''Gardening'', ''Reading historical fiction and biographies'', ''Attending jazz and gospel concerts'', ''Volunteering at community tech education programs'', ''Photography'', ''Cooking Southern
    cuisine'', ''Walking the trails at Panola Mountain State Park'']'
  career_goals: Sueellen aims to transition into a senior leadership role, such as Director of UX or Design Manager, where she can shape inclusive digital experiences for diverse audiences. She is passionate
    about mentoring emerging Black designers and establishing community workshops that bridge the digital divide. Over the next five years, she plans to lead large‑scale redesign projects that prioritize
    accessibility, and eventually launch her own consultancy focused on culturally responsive design.
