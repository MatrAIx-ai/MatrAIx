persona_description: A healthcare provider who specializes in treating depression in teenagers. They have experience with adult research on antidepressants and are familiar with the FDA's requirements for
  black box warnings. They are knowledgeable about the benefits and risks of antidepressants, including the increased risk of suicidal thoughts and behavior in children and adolescents. They are experienced
  in monitoring the use of medications and adjusting dosages as needed. They may also be familiar with genetic testing for specific genes that affect how the body processes antidepressants and may recommend
  psychotherapy as a treatment option.
