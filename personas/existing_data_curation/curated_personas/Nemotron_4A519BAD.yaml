personas:
  professional: Faith Amos combines her knack for step‑by‑step event coordination with a bright, talkative presence; they are the go‑to organizer for community fairs and campus debates while methodically
    balancing budgets and schedules to ensure every gathering runs smoothly.
  sports: Faith Amos is a loyal fan of the local high‑school football team, regularly tailgates at Friday night games, follows the Atlanta Falcons and Atlanta United FC, and plays on a weekend intramural
    softball league with friends from the debate club; they wear team colors proudly and treat each game as an opportunity to connect with the community.
  arts: Faith Amos shines on stage with the community‑theatre improv troupe, draws inspiration from country‑pop artists like Luke Bryan and Kelsea Ballerini, and spends evenings curating karaoke playlists
    featuring classic hits and modern pop for her friends’ gatherings; they relish the chance to be the center of attention while crafting memorable moments for the audience.
  travel: Faith Amos prefers short road‑trip adventures to southern gems such as Savannah, Charleston, and Nashville, planning each itinerary in detail while saving for a future spring break visit to New Orleans
    to experience its music and cuisine; they balance a limited student budget with a love for discovery, often hitchhiking rides with family friends to stretch their travel miles.
  culinary: Faith Amos enjoys experimenting with Southern comfort dishes like shrimp and grits, peach cobbler, and fried chicken, using ingredients such as buttermilk, hot sauce, and fresh garden herbs,
    and their intermediate cooking skills shine at family potlucks and community events; they love sharing recipes online and sometimes over‑season the food when nervous about impressing guests.
  core: Faith Amos is an 18‑year‑old social butterfly with a meticulous mind who turns nervous energy into organized celebrations while juggling a love for Southern food, sports, and community theater;
    they thrive on connecting with people yet constantly battle a worry‑driven inner critic.
background:
  cultural: Faith grew up in Commerce, Georgia, a small town steeped in Southern hospitality and close‑knit community values. Her family has deep ties to the local Baptist church, where she regularly participates
    in fellowship events and service projects. Traditions such as Sunday family dinners, church potlucks, high‑school football tailgates, and Fourth of July fireworks celebrations have shaped her appreciation
    for communal gatherings. The regional emphasis on politeness, generosity, and a strong work ethic informs her approach to both personal relationships and professional ambitions.
