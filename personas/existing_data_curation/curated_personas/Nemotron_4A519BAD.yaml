  hobbies: '[''Community Theatre'', ''Karaoke'', ''Volunteering at local food bank'', ''DIY home décor'', ''Cooking Southern recipes'', ''Yoga'', ''College debate club'', ''Listening to country music'']'
  career_goals: Faith aims to turn her passion for organized social gatherings into a career in event planning or hospitality management. In the short term she plans to complete an associate’s degree in
    Business Administration and secure an internship with a local hotel or event venue in the Atlanta metro area. She wants to develop a reputation for delivering smooth, memorable events while maintaining
    a supportive, inclusive atmosphere for all attendees. Long‑term, she envisions launching her own boutique event‑planning firm that specializes in community celebrations, weddings, and small corporate
    functions, allowing her to blend her structured approach with her love of connecting with people.
