  career_goals: Although only six, Daniel already expresses a vivid imagination about his future. He often says he wants to become an astronaut so he can explore space, a wildlife photographer to capture
    animals in their natural habitats, or an artist who travels the world to paint the scenes he discovers. His goals are guided by a love of curiosity and a desire to keep learning, and he prefers a path
    that remains flexible and allows him to follow new ideas rather than a rigid career plan. He also dreams of sharing his discoveries with a small group of friends or family, hoping to inspire them as
    he has been inspired.
