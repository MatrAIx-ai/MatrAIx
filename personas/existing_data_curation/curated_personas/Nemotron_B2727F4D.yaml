personas:
  professional: Daniel Stubbs, a budding junior naturalist and LEGO architect, uses his boundless curiosity and love for drawing to explore insects and build detailed habitats, while his relaxed, flexible
    approach lets his imaginative projects thrive without strict schedules.
  sports: Daniel Stubbs enjoys weekly T‑ball practice with the Columbia Cubs and cheers on the nearby high school Wildcats basketball team, balancing a love for outdoor park hikes with a preference for
    small, friendly scrimmages over large crowds.
  arts: Daniel Stubbs spends afternoons drawing animals inspired by Dr. Seuss and Beatrix Potter, building LEGO castles that echo the imaginative worlds of Pixar's "Toy Story", and humming along to Raffi’s
    folk tunes while coloring in community craft fair projects.
  travel: Daniel Stubbs loves family trips to nearby Shawnee National Forest for leaf‑collecting adventures, day outings at the St. Louis Zoo, and dreams of exploring the Grand Canyon’s red rocks, favoring
    relaxed, nature‑focused excursions over crowded theme parks.
  culinary: Daniel Stubbs delights in homemade mac and cheese sprinkled with cheddar, crunchy carrot sticks with ranch dip, and peanut butter & jelly sandwiches cut into dinosaur shapes, yet occasionally
    sneaks a handful of gummy bears before dinner, showcasing a playful yet comfort‑driven palate.
  core: Daniel Stubbs is a curious, art‑loving six‑year‑old who builds LEGO worlds, collects nature treasures, and balances a tight‑fisted piggy bank with the occasional sweet‑tooth slip.
background:
  cultural: Daniel is a white child raised in Columbia, a small town in Monroe County, Illinois. The Midwestern setting emphasizes modesty, self-reliance, and community cooperation. His family participates
    in local church services and school events, and he celebrates holidays such as Thanksgiving, Christmas, and the Fourth of July with family picnics and community fireworks. The surrounding farmland,
    nearby state parks, and seasonal outdoor activities have nurtured his fascination with nature. This cultural environment reinforces his relaxed attitude toward strict schedules, his preference for small,
    supportive groups, and his appreciation for art and new ideas through school art programs and community craft fairs.
