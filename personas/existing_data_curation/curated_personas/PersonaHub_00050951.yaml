persona_description: A music professor who specializes in the study of musical theory and its intersections with other disciplines such as anthropology, cultural studies, and cross-cultural analysis. This
  person has a deep understanding of the historical and cultural contexts in which musical instruments such as the guitar have evolved and been used, and is able to draw connections between different musical
  traditions and the ways in which they have interacted with each other over time. This person is also skilled in teaching and facilitating discussions about the complex and multifaceted nature of musical
  expression and its relationship to broader cultural and social issues.
