personas:
  professional: Eric Basti is an aspiring young engineer who turns each LEGO set into a step‑by‑step engineering challenge, methodically planning each brick placement while proudly showcasing completed
    builds to classmates, reflecting their organized, achievement‑driven mindset and love for being the center of attention.
  sports: Eric Basti is a midfielder for the Eagleton Tigers Youth Soccer Club, loves watching FC Barcelona for their precise passing, follows a structured weekly practice schedule, and uses their natural
    teamwork skills on the field while occasionally feeling intense nervousness before big matches, which they calm by reciting a personal victory chant.
  arts: Eric Basti dazzles classmates as a lead soloist in the school choir, revels in performing songs by Ariana Grande and the classic "Let It Go" from Frozen, sketches comic strips of daily adventures
    in a notebook full of bright markers, and draws inspiration from artists like Stan Lee, while occasionally staying up late to rehearse for talent shows, reflecting their love of attention and creative
    structure.
  travel: Eric Basti enjoys meticulously planned family road trips to nearby state parks like Yellowstone, has already visited Orlando’s Disney World where they mapped out the park’s attractions like a
    treasure hunt, and dreams of traveling to London to explore the Natural History Museum and practice map‑reading on historic streets, always packing extra snack rounds for comfort and security.
  culinary: Eric Basti prefers comfort foods such as cheesy pizza and mac and cheese, can follow a simple recipe to make no‑bake chocolate oat cookies with precise measurements of cocoa powder and honey,
    enjoys building spaghetti "puzzle" plates where each noodle follows a pattern, but they sometimes sneak a handful of gummy bears during study time, revealing a sweet‑tooth quirk.
  core: Eric Basti blends methodical LEGO engineering, sociable leadership on the soccer field, and heartfelt stage performances into a personality that craves structure, thrives on attention, yet wrestles
    with bouts of anxiety and occasional impulsive spending.
background:
  cultural: Eric was raised in Elmwood Park, a suburban community in Cook County, Illinois, where his family participates in typical Midwestern American customs such as Thanksgiving, Halloween, and summer
    block parties. His household reflects a middle‑class, predominantly white cultural setting with exposure to public school values, community volunteer activities, and occasional involvement in local
    church youth programs. The neighborhood’s emphasis on neighborhood safety, school involvement, and celebrating seasonal holidays has shaped his sense of community, responsibility, and appreciation for
    organized group activities.
