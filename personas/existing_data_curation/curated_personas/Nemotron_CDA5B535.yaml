  career_goals: Eric dreams of becoming a teacher or school leader one day, envisioning himself designing structured lesson plans, creating a friendly classroom atmosphere, and helping other children feel
    safe and supported. He also imagines organizing community events like school fairs or neighborhood clean‑up days, because he loves planning activities that bring people together. Ultimately, his ambition
    is to hold a role that blends organization, teamwork, and the chance to make a positive impact on others while maintaining a calm, predictable environment for himself and those around him.
