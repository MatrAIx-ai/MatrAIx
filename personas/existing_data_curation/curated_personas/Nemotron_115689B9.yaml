    urban landscapes'', ''Playing tabletop board games'', ''Volunteering at multicultural festivals, especially Vietnamese Tet celebrations'']'
  career_goals: Phouvong aims to translate her receptionist experience into a role that bridges administration and the arts. In the next two years she plans to obtain a certificate in museum studies or
    arts administration, while volunteering at local galleries to deepen her curatorial skills. Her medium-term ambition is to become an assistant curator or program coordinator at a Portland-based art
    institution, where she can apply her research acumen, bilingual communication, and organizational strengths to develop community-focused exhibitions. Ultimately, she envisions leading her own multidisciplinary
    arts program that highlights Southeast Asian narratives, and she is open to pursuing a master’s degree in arts management to solidify her expertise. Her competitive drive pushes her to set measurable
    milestones, such as managing at least three public events annually and publishing a quarterly blog on contemporary art trends.
