personas:
  professional: Nora Primeaux, a veteran residential cleaning specialist known for her systematic deep‑cleaning techniques and eco‑friendly stain removal, blends her practical curiosity with a competitive
    streak to train new hires, manage client schedules efficiently, and pursue a supervisory role within her Queens‑based cleaning company.
  sports: Nora Primeaux, a dedicated salsa dancer who hits the community center three times a week, joins a local walking club for weekend cardio, cheers on the New York Mets and the New York Knicks, and
    competes in a neighborhood bowling league on Tuesday nights.
  arts: Nora Primeaux, a mystery‑thriller aficionado who debates plot twists with her book club while humming to the salsa rhythms of Celia Cruz, regularly watches the home‑improvement shows “Tidying Up
    with Marie Kondo” and “This Old House,” and delights in community theater performances of classic noir plays, weaving these artistic threads into her social gatherings.
  travel: Nora Primeaux, who prefers meticulously planned weekend road trips to nearby escapes like the Hudson Valley and the Finger Lakes, dreams of a summer retreat in Costa Rica’s eco‑lodges, balances
    wanderlust with a modest travel budget, and often mixes cultural immersion—such as salsa nights in New Orleans—with relaxed family reunions on Long Island.
  culinary: Nora Primeaux, an enthusiastic home‑cook who tends a herb garden of cilantro, thyme, and rosemary, experiments with recipes ranging from herb‑crusted salmon to pollo a la salsa, often prepares
    large family meals featuring arroz con pollo and fresh guacamole, and treats each dish as a chance to showcase her eco‑friendly cleaning routine before and after the feast.
  core: Nora Primeaux, a socially vibrant yet competitively driven 47‑year‑old cleaning expert, balances her eco‑conscious hustle with a persistent worry about perfection, a penchant for salsa dancing,
    and a habit of turning every household chore into a classroom for others.
background:
  cultural: Nora grew up in a working‑class, predominantly white neighborhood in Queens, with family roots tracing back to French‑Canadian ancestors who settled in the New York area generations ago. Raised
    Catholic, she embraces traditional holidays such as Christmas and Thanksgiving while also participating in the multicultural festivals common to Ozone Park. Fluent in English and familiar with basic
    Spanish from interacting with a diverse clientele, she values hard work, community solidarity, and practical resourcefulness. Her upbringing amid a mosaic of Irish, Italian, and other immigrant cultures
    shaped her sociable yet skeptical demeanor, fostering both a competitive drive and a pragmatic approach to everyday challenges.
