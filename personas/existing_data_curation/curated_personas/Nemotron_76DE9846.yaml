  career_goals: Nora aims to move into a supervisory role within her cleaning company, leveraging her reliability and leadership to oversee a small crew. She plans to obtain a professional certification,
    such as the IICRC Green Cleaning Certification, to enhance her expertise and marketability. Long‑term, she dreams of launching her own boutique, environmentally conscious residential cleaning service
    that serves the Queens community, creating flexible jobs for other women. She also intends to complete a GED and take community‑college courses in business management to support her entrepreneurial
    ambitions, while securing a stable retirement through consistent savings and possible home ownership.
