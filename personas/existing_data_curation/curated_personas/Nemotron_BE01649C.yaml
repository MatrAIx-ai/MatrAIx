  career_goals: In the short term Nigina aims to complete her GED within the next two years and earn a certification in office administration or community program coordination. She wants to leverage her
    organizational strengths and sociable nature to secure a role as a program assistant at a local non‑profit or community center, eventually progressing to a program manager position where she can design
    and lead youth mentorship initiatives. Long‑term she dreams of founding her own community‑focused event planning service that helps local churches, schools, and small businesses create structured, impactful
    gatherings. She also envisions becoming a speaker or mentor who shares strategies for personal organization and resilience with other young people facing similar challenges, while continuously managing
    her own stress and perfectionist tendencies.
