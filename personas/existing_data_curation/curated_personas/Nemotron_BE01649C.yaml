personas:
  professional: Nigina Bolton, a newborn currently without a formal occupation, is being raised in a highly structured household where daily routines emphasize disciplined scheduling and achievement, and
    they already display a nascent appetite for meticulous organization that hints at future strengths in project coordination and people‑focused leadership.
  sports: Nigina Bolton, an infant who brightens during weekly swimming lessons at Riverdale Aquatics and giggles while watching the Chicago Cubs on television, is also part of the Little Sprouts Soccer
    Club, and they display early enthusiasm for structured, team‑oriented physical activity.
  arts: Nigina Bolton, a newborn, shows a calming response to the lullabies of Yo Yo Ma and the soothing piano pieces of Ludwig van Beethoven, while the family frequently attends live performances by the
    local theatre troupe featuring actors like Lin‑Manuel Miranda, and they develop an early appreciation for classical music and vibrant storytelling.
  travel: Nigina Bolton, an infant who has already spent time at the family’s beach house in Myrtle Beach and a weekend getaway to the Grand Canyon, dreams of future family trips to Kyoto’s cherry‑blossom
    festivals and the Swiss Alps, and they balance the parents’ love for adventure with careful planning to accommodate the baby’s routine.
  culinary: Nigina Bolton, a newborn, enjoys breast milk flavored with the subtle vanilla notes from the mother’s diet and, after starting solids, prefers pureed sweet potatoes, ripe bananas, and soft avocado
    toast bites, and they reflect a nascent palate for mildly sweet, nutrient‑rich foods.
  core: Nigina Bolton, a newborn raised in a meticulously organized home, already displays a blend of disciplined routine, social curiosity, and occasional stress‑induced fussiness, and they paint a portrait
    of a future high‑achiever with a heart for people.
background:
  cultural: Nigina identifies as African American and was raised in Ellenwood, a suburb of Atlanta with a strong Southern Black community. Her family maintains traditions rooted in church fellowship, multi‑generational
    family meals, and storytelling through music and oral history. She grew up listening to gospel, soul, and contemporary R&B, which influence her social gatherings and dance interests. The local culture
    emphasizes resilience, community support, and a vibrant church life, all of which shape her values of cooperation, compassion, and a desire to give back through community‑based activities.
