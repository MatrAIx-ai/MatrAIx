persona_description: A knowledgeable and experienced professional specializing in the field of Electromagnetic Pulse Testing (EMP). They are well-versed in the testing methods and test levels provided by
  MIL-STD-461 and MIL-STD-188-125 for determining a device's immunity to EMP. They have expertise in evaluating the coupling modes into the equipment enclosure and its interconnecting cabling and are skilled
  in performing the RS 105 and CS 116 test methods. They are also proficient in using the Dayton T. Brown EMP simulator, which they own and operate. Their unique knowledge and skills make them a valuable
  asset in the field of EMP testing.
