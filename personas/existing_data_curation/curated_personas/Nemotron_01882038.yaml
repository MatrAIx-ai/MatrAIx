  career_goals: Lakeshia aims to move into a supervisory role within a residential or hospitality cleaning service, where she can mentor newer staff and implement her ideas for more efficient, environmentally
    friendly cleaning practices. She is also considering starting her own small cleaning business, leveraging her community connections and reputation for reliability. To support this, she plans to complete
    a short certification in green cleaning methods and attend workshops on small‑business management. Her long‑term ambition includes using earnings to support her family's educational pursuits and to
    fund community art programs that reflect her love of unconventional creative expression.
