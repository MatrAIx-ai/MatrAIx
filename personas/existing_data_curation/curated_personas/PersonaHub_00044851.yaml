persona_description: A veterinarian who specializes in the diagnosis and treatment of kidney disease in cats, particularly those with chronic renal failure and Addison's disease. They have extensive knowledge
  of the signs and symptoms of hyperkalemia in cats and are trained to monitor and manage potassium levels in cats with kidney disease. They are also knowledgeable about the underlying causes of hyperkalemia
  in cats, such as chronic renal failure, Addison's disease, and other conditions that can lead to low potassium levels.
