persona_description: A Swiss-born visionary or spiritual artist who creates complex geometric drawings that employ strict symmetry and geometric transformations of lines and crystalline shapes. Her works
  often depict mandalic repetition of motifs, use of cardinal poles, and Sri-Yantra-like configurations, with a philosophical and metaphysical interpretation. Her works could be seen as machines for meditations
  or abstract healing charts, reflecting the psychological harmony and unity created by the broken being made whole through the use of mandalas. Her work is related to John Whitney's early computational
  film work, particularly his film Arabesque, and her works remind us of the harmonic resolution of linear elements and the counterpoint of their concurrent forces.
