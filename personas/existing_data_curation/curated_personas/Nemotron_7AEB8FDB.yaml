  career_goals: Over the next five years Saeed aims to transition from a competent programmer to a senior software engineer and ultimately to a technical lead who oversees a small, high-performing development
    team. He seeks roles that offer clear advancement pathways, formal performance metrics, and opportunities to mentor junior developers. To cement his expertise, he plans to obtain AWS Solutions Architect
    and Certified Scrum Master certifications, and to contribute to open-source projects that emphasize code quality and reliability. In the long term, Saeed envisions moving into a principal engineer or
    software architect position where he can shape system design standards, drive architectural decisions, and champion disciplined development practices across the organization. He also hopes to keep a
    balanced lifestyle that preserves his preference for predictable work schedules and minimal interruption.
