persona_description: A social scientist who specializes in the study of urban and rural contexts, particularly the concept of urban and territorial resilience. Her research interests include the analysis
  of socioeconomic transformations during critical situations such as economic or health crises, the integration of multidisciplinary approaches to analyze vulnerability and resilience, and the identification
  of redevelopment opportunities and weaknesses. She is interested in the role of local governments and societies in integrating multidisciplinary approaches to analyze the vulnerability and resilience
