personas:
  professional: A retired school secretary and community volunteer coordinator, Suzette Oneal leverages her decades of record‑keeping and budgeting expertise to mentor junior volunteers at the senior center
    and spearhead heritage preservation projects, approaching each task with meticulous planning, a quiet confidence, and a steadfast commitment to reliability.
  sports: An active member of the local senior walking club, Suzette Oneal enjoys leisurely nature hikes on the lower segments of the Appalachian Trail, follows the Philadelphia Eagles and Pittsburgh Steelers
    on Sundays, and participates in a weekly low‑impact water aerobics class at the community center, favoring routine over competition.
  arts: A devoted quilter and choir singer, Suzette Oneal draws inspiration from folk painter Grandma Moses, enjoys the poetry of Maya Angelou, listens to the warm crooning of Norah Jones, and occasionally
    attends a community theater production of "Our Town" starring local veteran actors, all of which deepen her love for storytelling and craft.
  travel: A meticulous planner, Suzette Oneal prefers short, well‑organized trips to historic sites such as Gettysburg National Military Park, the Amish country of Lancaster, and the colonial streets of
    Williamsburg, often traveling with her church’s senior outreach group and budgeting each outing in her travel ledger.
  culinary: A home‑cooking enthusiast, Suzette Oneal often prepares a hearty vegetable stew with fresh carrots, potatoes, and thyme from her garden, bakes buttery apple pies using Granny Smith apples and
    a flaky crust, and enjoys experimenting with a sourdough starter, always serving meals to intimate gatherings of friends and relatives.
  core: Suzette Oneal blends meticulous organization with a quiet love for heritage, tending gardens, quilts, and genealogical archives while mentoring her community, all while indulging in occasional green‑thumb
    splurges and modest forgetfulness about medication refills.
background:
  cultural: Suzette is a white American with deep roots in western Pennsylvania. Raised in a predominantly Irish‑Catholic and German‑heritage community, she was imbued with values of modesty, hard work,
    and strong neighborhood ties. The industrial‑era atmosphere of Allegheny County and the region’s Appalachian influences emphasized self‑reliance, respect for tradition, and communal support. These cultural
    currents are reflected in her dedication to family history, her involvement in local church activities, and her preference for structured, small‑scale community engagement.
