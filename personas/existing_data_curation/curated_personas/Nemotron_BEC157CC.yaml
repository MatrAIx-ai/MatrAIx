personas:
  professional: Darlene Drawdy, a budding Lego architect who thrives on systematic planning and precise block placement, channels their love of structure and competitive spirit into timed building challenges,
    yet they remain calmly resilient when towers tumble.
  sports: Darlene Drawdy, a member of the Sunnybrook Strikers under-6 soccer club who loves structured drills and competitive scrimmages, also cheers for the Los Angeles Dodgers during baseball season,
    and they balance team play with solitary trampoline sessions to satisfy their need for predictable movement.
  arts: Darlene Drawdy, an enthusiastic participant in preschool art class who passionately draws with Crayola markers, especially recreating Sesame Street's Elmo and Dr. Seuss's whimsical characters, and
    they regularly watch Mister Rogers' Neighborhood as a structured, calming artistic ritual.
  travel: Darlene Drawdy, a bright-eyed traveler who enjoys family road trips to the nearby beach, has visited Disneyland and the Grand Canyon, prefers itineraries drawn in crayons for predictability, and
    they dream of exploring the snow-capped Swiss Alps one day.
  culinary: Darlene Drawdy, a picky eater who adores creamy macaroni and cheese with extra cheddar, loves crunchy carrot sticks and sweet strawberry slices, can assemble a peanut butter and jelly sandwich
    using measured scoops of peanut butter, and they treat mealtime as a structured activity while occasionally sneaking chocolate chips into their broccoli.
  core: Darlene Drawdy, a calm and competitive five-year-old who thrives on structure, meticulously organizes toys, saves allowance with precision, monitors mild health issues without fuss, and delights
    in predictable play and routine.
background:
  cultural: Darlene comes from a white, Southern‑American background in Hector, Arkansas. She is raised in a close‑knit, predominantly Protestant community where family gatherings and church events play
    a central role. Local traditions such as outdoor gatherings, homemade meals, seasonal holidays like Thanksgiving, and participation in community fairs shape her sense of belonging. The rural setting
    fosters an appreciation for nature, simple country life, and values of hospitality, hard work, and respect for others.
