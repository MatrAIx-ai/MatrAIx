    and visual documentation'', ''Community health outreach coordination'']'
  hobbies: '[''Hiking coastal and mountain trails in San Diego County'', ''Visiting contemporary art museums and street‑art exhibitions'', ''Sketching and watercolor painting'', ''Playing acoustic guitar
    and informal jam sessions'', ''DIY electronics projects (Arduino, Raspberry Pi) focused on health monitoring'', ''Practicing yoga and meditation for stress relief'', ''Reading science‑fiction and philosophy'',
    ''Volunteering at community health fairs and education workshops'', ''Participating in local improv theater workshops'', ''Cooking experimental recipes'']'
  career_goals: Jeffery aims to advance from EMT to paramedic and eventually become a flight medic, integrating his technical expertise with cutting‑edge pre‑hospital technologies. He plans to pursue a
    Master’s degree in Health Informatics or Public Health to develop data‑driven protocols that improve emergency response efficiency. In the long term, he envisions leading a community‑based emergency
    preparedness program in San Diego County, incorporating interdisciplinary training that blends medical care with mental‑health support and creative therapeutic approaches such as art‑based stress relief
    for patients and first responders. He also hopes to contribute to research on wearable health monitors and low‑cost medical devices for underserved populations.
