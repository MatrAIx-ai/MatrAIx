personas:
  professional: David Collins is an aspiring environmental artist who blends watercolor depictions of Maui’s volcanic hills with interactive Python sketches, using their methodical planning and compassionate
    storytelling to raise awareness about marine ecosystems while navigating the solitary nature of their creative process.
  sports: David Collins spends weekends hiking Haleakalā trails and training with the school’s cross‑country team, follows the Hawaii Rainbow Warriors basketball for inspiration, occasionally plays pick‑up
    soccer with the Maui United Soccer Club, and maintains a disciplined fitness routine that balances cardio hikes with gentle yoga, though they sometimes skip a workout after a rainy day.
  arts: David Collins immerses themselves in the quiet study of Claude Monet’s pastel skies and Georgia O’Keeffe’s desert forms while practicing watercolor on Maui’s volcanic vistas, curates indie folk
    playlists featuring Bon Iver, Sufjan Stevens, and local legend Israel Kamakawiwo’ole, writes short stories inspired by the narrative style of Haruki Murakami, and attends monthly community art shows
    that showcase emerging Hawaiian painters.
  travel: David Collins prefers low‑key eco adventures, planning weekend hikes along Maui’s Hana Highway and snorkeling at Molokini before dreaming of a solo cultural trek through Kyoto’s temples and a
    summer surf camp in Sydney, yet their travel budget often limits trips to family‑sponsored island getaways and school field trips.
  culinary: David Collins, a budding home cook, enjoys assembling fresh ahi tuna poke bowls with sushi rice, limu seaweed, avocado, and a drizzle of ponzu, occasionally attempts a beginner‑level pineapple‑glazed
    salmon while humming indie folk tunes, and often multitasks by sketching the dish’s color palette, which sometimes leads to over‑cooking the rice.
  core: David Collins is a solitary, curiosity‑driven teen who channels their meticulous creativity into watercolor landscapes, code‑crafted art, and gentle activism, all while wrestling with a penchant
    for worry and a love for quiet harmony.
background:
  cultural: David is a white American who was raised in the rural town of Kula on the island of Maui. Although his family’s roots trace back to the continental United States, his upbringing is deeply woven
    into Hawai‘i’s unique cultural tapestry. Living among working farms and volcanic landscapes has fostered a strong connection to the land (malama ʻāina) and an appreciation for the Hawaiian value of
    ‘ohana,’ the sense of extended family and community. At school he receives instruction in basic ʻŌlelo Hawaiʻi, learns about Hawaiian history and mythology, and participates in cultural events such
    as lei‑making workshops and community luaus. He respects traditional practices like sustainable farming and beach clean‑ups, often incorporating local symbols and stories into his artwork. While celebrating
    typical American holidays at home, the island’s laid‑back lifestyle and emphasis on harmony with nature profoundly shape his worldview and his desire to contribute positively to his community.
