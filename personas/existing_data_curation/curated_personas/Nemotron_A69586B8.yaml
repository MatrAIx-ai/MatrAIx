  career_goals: David aspires to forge a career that melds his artistic passion, love of nature, and desire to help others. He plans to study environmental science or marine biology while also developing
    graphic‑design and visual‑communication skills at a university that offers strong programs in both fields. His long‑term goal is to become an environmental educator or conservation communicator for
    a Hawaiian nonprofit, creating illustrated educational materials, leading youth outreach programs, and organizing community projects that promote sustainable land and ocean stewardship. Complementing
    this, he hopes to serve as a peer counselor or mental‑health advocate in his school or community, using his empathy and organized approach to support fellow students coping with stress. David intends
    to build a portfolio of nature‑focused artwork, volunteer experience, and coding projects to strengthen his college applications and future career.
