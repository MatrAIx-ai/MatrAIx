    Excel'', ''OSHA safety compliance'']'
  hobbies: '[''Intramural basketball'', ''Youth baseball coaching'', ''Playing electric guitar in a local jam group'', ''Fishing at Lake Longview'', ''Camping and hiking in the Piney Woods'', ''CNC hobby
    projects (woodworking, metal art)'', ''Video gaming (Satisfactory, Factorio, Team Fortress 2)'', ''Volunteering at community events'', ''Attending local country music festivals'', ''DIY home improvement
    projects'', ''Mindfulness meditation and journaling'']'
  career_goals: Tyler aims to advance from his current CNC operator/programmer role to a CNC programming lead, where he can design more complex multi‑axis machining strategies and mentor a larger team.
    He plans to earn industry certifications such as NIMS CNC Programmer, Six Sigma Yellow Belt, and eventually a bachelor’s degree in Manufacturing Engineering. Over the next five years, he hopes to spearhead
    the integration of Industry 4.0 technologies—IoT sensors, predictive maintenance, and real‑time analytics—into his shop’s workflow. Long‑term, he envisions opening a boutique CNC machining business
    that serves local producers and hobbyists, combining his technical expertise with his desire to create a collaborative, community‑focused workplace.
