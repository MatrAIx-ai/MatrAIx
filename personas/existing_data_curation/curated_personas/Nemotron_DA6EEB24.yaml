personas:
  professional: Tyler Price, a 24‑year‑old CNC operator/programmer known for marrying meticulous Lean practices with a collaborative, curiosity‑driven mindset, applies their mastery of Fusion 360, G‑code,
    and statistical process control to reduce cycle times while mentoring peers, and they experiment with new multi‑axis strategies.
  sports: Tyler Price stays active by playing center in the Midtown Hoops intramural basketball league, coaching the Little League Tigers youth baseball team, and cheering on the Chicago Bulls and Green
    Bay Packers at local sports bars, and they also hold membership in the Piney Woods Outdoor Club for seasonal hiking and fishing trips.
  arts: Tyler Price, an enthusiastic guitarist, joins a weekly acoustic circle that jams on songs by John Mayer and Gillian Welch, while also devouring indie folk acts like Phoebe Briggs, and they frequently
    attend live performances at the community theater featuring local playwrights.
  travel: Tyler Price prefers spontaneous weekend getaways—camping under the stars in the Piney Woods, fishing at Lake Longview, and exploring nearby state parks—while saving for a dream trip to Munich’s
    Deutsches Museum to study Industry 4.0 innovations and a future backpacking tour of Japan’s historic machining districts, and they regularly map out routes using a hybrid of paper maps and digital apps.
  culinary: Tyler Price, a competent home cook, often grills smoked trout on cedar planks seasoned with dill and lemon, crafts BBQ ribs coated in a rub of smoked paprika, brown sugar, and garlic, and bakes
    jalapeño‑cheddar cornbread, and they routinely pair these meals with craft IPAs from local breweries.
  core: Tyler Price blends hands‑on engineering precision with a sociable, community‑focused vibe, they constantly juggle CNC projects, group sports, and mindfulness hacks to keep their chronic worry in
    check.
background:
  cultural: Tyler grew up in a working‑class white family in East Texas, where community gatherings, church, and high‑school football were central to daily life. The region’s Southern hospitality, modest
    expectations, and a strong work ethic shaped his values. He attended public school in Longview, participated in the marching band, and spent weekends at family BBQs, church potlucks, and fishing trips
    on nearby lakes. The growing manufacturing corridor of the area introduced him early to CNC technology, reinforcing his practical, hands‑on mindset. While he respects traditional values such as self‑reliance
    and loyalty, his curiosity drives him to adopt new tools and ideas, giving him a modern, forward‑looking East Texas identity that balances heritage with innovation.
attributes:
