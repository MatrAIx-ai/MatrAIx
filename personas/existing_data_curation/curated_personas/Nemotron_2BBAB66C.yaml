  hobbies: '[''Acoustic Guitar'', ''Watercolor Painting'', ''Photography'', ''Speculative-Fiction Book Club'', ''Intramural Basketball'', ''Hiking'', ''Community Theater (Acting & Set Design)'', ''DIY Home
    Improvement Projects'', ''Attending Live Music Events'']'
  career_goals: He aims to move from his current supervisory role to a senior plant-manager position within the next five years, overseeing multiple production lines and driving strategic growth. To support
    this, he plans to pursue an associate’s degree in business management and earn Lean Six Sigma Green Belt certification. He is passionate about embedding a culture of continuous innovation, so he hopes
    to lead cross-functional teams in implementing sustainable manufacturing practices and digital workflow tools. Ultimately, he envisions a career that balances operational excellence with opportunities
    to mentor younger employees and champion creative problem-solving across the organization, while maintaining a healthy work-life balance for his family.
