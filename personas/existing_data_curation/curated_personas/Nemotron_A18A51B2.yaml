  career_goals: With retirement on the horizon, Lauren aims to transition from day-to-day machine operation to a supervisory and mentorship role on the shop floor. She hopes to formalize her knowledge by
    completing a short certification in automation safety and lean manufacturing, which will allow her to lead continuous-improvement projects that streamline changeovers and reduce waste. Lauren also envisions
    sharing her practical experience with younger coworkers through structured training sessions, and she is open to part-time consulting for nearby small manufacturers who need guidance on equipment selection
    and maintenance best practices. Ultimately, she wants to leave a lasting imprint on the plant’s safety culture while maintaining the flexibility to enjoy her personal interests.
