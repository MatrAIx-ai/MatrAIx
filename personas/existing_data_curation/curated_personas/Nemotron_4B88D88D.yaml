personas:
  professional: Ezekiel Little is a budding robotics enthusiast who leverages their methodical planning, competitive drive, and sociable energy to design, program, and lead autonomous robot projects for
    their school's robotics club.
  sports: Ezekiel Little plays point guard for the Gastonia High Tigers basketball team, trains with the local youth football league in the fall, follows the Charlotte Hornets and the North Carolina Tar
    Heels, and approaches each practice with a competitive edge and a methodical drill schedule that reflects their organized nature.
  arts: Ezekiel Little immerses themselves in hip‑hop and R&B, frequently streaming tracks by Kendrick Lamar, Anderson .Paak, and J. Cole while penning their own verses, and balances this musical passion
    with a love for science‑fiction novels by authors like Neal Stephenson, shaping their creative identity.
  travel: Ezekiel Little enjoys weekend road trips with their family to nearby Asheville for hikes, has visited Washington, D.C. on a school field trip to explore civil‑rights landmarks, and dreams of attending
    a gaming convention in Las Vegas, planning each journey with a detailed itinerary on their phone despite occasional last‑minute detours.
  culinary: Ezekiel Little prefers Southern comfort foods like smoked pulled pork, collard greens, and spicy chicken wings, often helping to grill at family barbecues while experimenting with extra hot
    sauce blends, and enjoys cooking simple pasta dishes such as garlic‑butter shrimp linguine on their own.
  core: Ezekiel Little is a methodical, competitive teen who blends a love for robotics and basketball with a penchant for late‑night gaming marathons and a habit of over‑seasoning their barbecue.
background:
  cultural: Ezekiel is an African‑American teen raised in Gastonia, North Carolina, within a close‑knit family that values education, community, and faith. He regularly attends a historically Black Pentecostal
    church, where gospel music and weekly fellowship have shaped his appreciation for soulful rhythms and community service. Family traditions include celebrating Juneteenth, sharing stories of the civil‑rights
    movement, and gathering for Southern‑style barbecues that reinforce strong intergenerational bonds. Growing up in the Southern town of Gastonia, he enjoys local sports culture—especially high‑school
    basketball and football—while also participating in city‑wide cultural events that highlight Black heritage. This blend of Southern hospitality, church involvement, and a strong sense of Black identity
    informs his worldview, fuels his competitive spirit, and motivates his ambition to succeed academically and athletically.
