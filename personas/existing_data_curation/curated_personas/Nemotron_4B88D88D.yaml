  career_goals: Ezekiel aims to earn a merit‑based scholarship to study engineering or computer science at a North Carolina university, such as UNC Charlotte or NC State, where he can deepen his robotics
    expertise and potentially compete in national competitions. He also dreams of playing varsity basketball in college, hoping a combination of academic and athletic excellence could open doors to a full‑ride
    scholarship. In the long term, he envisions a career as a robotics engineer or software developer who designs affordable technology solutions for his community, reflecting his practical mindset and
    desire to give back to the neighborhoods that shaped him.
