personas:
  professional: Johnnie Stephens, an aspiring LEGO architect with a knack for turning step‑by‑step instructions into original creations, already applies engineering logic and teamwork skills to imagined
    future projects, displaying a blend of curiosity and practicality.
  sports: Johnnie Stephens thrills on the soccer field with the local youth team, the River Valley Tigers, where they compete in spring league matches while cheering for the national favorite Chicago Bulls
    and New York Yankees, training twice a week and channeling a competitive streak into both organized drills and impromptu tag games at the park.
  arts: Johnnie Stephens immerses in creative realms, building intricate LEGO worlds, sketching dinosaurs inspired by Jurassic Park, watching Pixar animations like Toy Story, listening to the catchy tunes
    of Imagine Dragons, and exploring Minecraft servers, all of which fuel a vivid imagination and a love for storytelling.
  travel: Johnnie Stephens prefers family road trips that blend scheduled museum stops—such as the natural history museum in Washington D.C.—with spontaneous campground nights under the stars, dreaming
    of future adventures to the Grand Canyon and the Giant's Causeway, while balancing parental budget constraints with a boundless curiosity for new landscapes.
  culinary: Johnnie Stephens enjoys pepperoni pizza, cheesy macaroni, and chocolate chip cookies, often helping to stir batter for homemade brownies and eagerly adding extra cheese to spaghetti, yet has
    a notorious habit of dropping crumbs everywhere and demanding a second serving of any dessert.
  core: Johnnie Stephens is an eight‑year‑old LEGO builder and soccer enthusiast whose blend of curiosity, competitive drive, and occasional impulsiveness shapes a world of imagined structures, strategic
    play, and sugar‑driven snack raids.
background:
  cultural: Johnnie grows up in Pryor, a small town in Mayes County, Oklahoma, within a white, middle‑class family. His daily life is shaped by the close‑knit community, local school events, and frequent
    church gatherings. Family traditions include weekend barbecues, trips to nearby lakes for fishing with his dad, and attending high school football games. The region’s proximity to the Cherokee Nation
    introduces him to local Native American history and cultural celebrations at the county fair. He also participates in 4‑H club activities, learning about agriculture and animal care, reflecting the
    rural character of his surroundings.
