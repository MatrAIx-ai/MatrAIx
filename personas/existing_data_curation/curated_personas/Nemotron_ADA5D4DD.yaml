  career_goals: Johnnie is already thinking about how he can turn his curiosity into a future career. He dreams of becoming a mechanical engineer or an inventor who creates practical gadgets that help people
    in everyday life, especially inspired by building things with LEGO and watching his dad fix things around the house. He also expresses an interest in exploring space, hoping one day to work on robotics
    or as an astronaut. He aims to attend a STEM‑focused high school, earn scholarships, and eventually study engineering at a university.
