  hobbies: '[''Hiking in Contra Costa trails'', ''Cooking Asian‑fusion cuisine'', ''Yoga and mindfulness practices'', ''Reading science‑fiction and technology articles'', ''Language exchange (Vietnamese
    & beginner Mandarin)'', ''Volunteering for STEM outreach programs'', ''Gardening'', ''Attending local art exhibitions'', ''Spontaneous weekend road trips'']'
  career_goals: Ve aspires to move into a senior HR business partner role where she can shape strategic workforce decisions for a fast‑growing tech company. She aims to build a robust HR analytics framework
    that ties employee data to business outcomes, and to lead a company‑wide DEI strategy that improves representation of underrepresented groups, especially in STEM fields. Long‑term, she envisions launching
    her own consultancy that helps mid‑size tech firms design flexible, data‑informed talent programs while mentoring emerging HR professionals, particularly those from immigrant backgrounds.
