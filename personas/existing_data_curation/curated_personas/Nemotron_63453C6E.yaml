  career_goals: Mary dreams of becoming a children's book author and illustrator, creating stories that combine art, imagination, and gentle lessons about handling worries and emotions. She is also fascinated
    by interactive museum exhibits and hopes to design educational experiences that make abstract concepts tangible for other kids. In the long term, she envisions using technology to develop games that
    spark curiosity and support emotional resilience.
