personas:
  professional: Mary O'Donnell is an aspiring young game creator who combines her love of fantasy novels, digital drawing, and LEGO building into Scratch programming projects, channeling her vivid imagination,
    organized yet flexible approach, and sociable leadership in the school drama club into collaborative, story-driven games, though they often worry about meeting their own high standards.
  sports: Mary O'Donnell plays forward on her elementary school soccer team, cheering on the Manchester United youth academy as their favorite professional club while also joining a local Kids Hiking Club
    for weekend hikes in the nearby hills, balancing competitive team spirit with a love for nature, though they sometimes overexert themselves and end up with sore knees after intense practice.
  arts: Mary O'Donnell immerses herself in drawing fantastical scenes inspired by J.K. Rowling's Harry Potter series, Hayao Miyazaki's animated worlds, and the vibrant colors of Studio Ghibli, while also
    performing in the school drama club where they emulate the expressive acting style of Lin‑Manuel Miranda's musical numbers, blending visual art and performance to fuel their creative identity.
  travel: Mary O'Donnell dreams of visiting the magical castles of Scotland and the interactive Harry Potter Studio Tour in London, but for now enjoys family road trips to nearby national parks like Yellowstone
    and weekend hikes in the local hills, planning each outing with a hand‑drawn map and a list of “must‑see” nature spots, while occasionally feeling anxious about unfamiliar environments.
  culinary: Mary O'Donnell loves baking chocolate chip cookies with oat flour and a pinch of sea salt, often experimenting with extra ingredients like peanut butter or espresso powder, and they eagerly
    document each recipe in a colorful notebook, though they sometimes forget to clean the kitchen afterward, leaving a trail of flour on the floor.
  core: Mary O'Donnell is an imaginative ten‑year‑old who channels boundless curiosity into digital art, LEGO building and Scratch game design, balances organized responsibilities with a love for group
    activities, and navigates frequent worries with a blend of creativity and occasional procrastination.
background:
  cultural: Mary lives in Fyffe, a small rural community in northern Alabama's DeKalb County. Her family shares many Southern cultural traditions, such as attending Sunday services at the local church,
    enjoying community festivals, and gathering for family meals featuring Southern comfort foods. The region's close-knit atmosphere and the surrounding Appalachian foothills nurture her love of outdoor
    exploration and storytelling, while the emphasis on hospitality and community involvement shapes her sociable and cooperative nature.
