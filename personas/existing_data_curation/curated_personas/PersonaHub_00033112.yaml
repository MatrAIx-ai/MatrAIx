persona_description: A healthcare professional who is passionate about early intervention for children with cerebral palsy, particularly in South Africa where the diagnosis and treatment of CP is often
  delayed. They are aware of the latest evidence-based practices and are committed to applying them in their practice. They are creative problem solvers and are willing to think outside the box to provide
  effective early services to children who are at risk of developing CP. They are dedicated to improving the lives of children and their families in South Africa and are not satisfied with the current state
  of early intervention services in the country.
