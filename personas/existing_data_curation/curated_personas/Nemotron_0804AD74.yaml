personas:
  professional: Raul Orrego, a 63‑year‑old seasoned professor of electrical engineering, blends three decades of power‑systems expertise with a hands‑on, curiosity‑driven teaching style that favors flexible,
    project‑based curricula and assertive leadership on faculty committees while quietly mentoring students and colleagues.
  sports: Raul Orrego enjoys leisurely weekend walks along the Harris County bayou trails, toggles between cheering for the Houston Astros and the Houston Rockets at the local sports bar, and participates
    in a low‑impact senior fitness class at the community center, preferring steady, low‑stress activity over competitive sports.
  arts: Raul Orrego, an avid fingerstyle guitarist, spends evenings practicing pieces by Tommy Emmanuel and Andrés Segovia while also attending Houston Symphony concerts featuring works by John Williams
    and watching classic Mexican cinema starring Dolores del Río, allowing music and film to balance their solitary scholarly life.
  travel: Raul Orrego favors self‑planned road trips that blend cultural curiosity with relaxation, having already explored New Mexico’s historic Santa Fe and the vineyards of Texas Hill Country, while
    dreaming of a future pilgrimage to Kyoto’s ancient temples and the solar research labs of Freiburg, Germany, all within a modest travel budget constrained by their semi‑retired status.
  culinary: Raul Orrego, an enthusiastic home cook, blends traditional dishes like pozole, mole, and tamales with Texan staples such as smoked brisket and jalapeño‑infused queso, routinely harvesting home‑grown
    tomatoes, chilies, and cilantro to create vibrant salsas, yet sometimes forgets to label jars, leading to occasional kitchen mishaps.
  core: Raul Orrego is a curiously pragmatic academic who balances solitary hobbies, a relaxed approach to obligations, and a penchant for improvising both in the kitchen and the lab, even if their occasional
    disorganization leads to missed appointments and unlabeled spice jars.
background:
  cultural: Raul was born in a small town in the state of Jalisco, Mexico, and moved to the United States as a teenager, settling first in Houston before eventually establishing his family in Kingwood,
    TX. He grew up bilingual, speaking Spanish at home and English at school, which has given him a deep appreciation for both Mexican and American cultures. Family gatherings often feature traditional
    celebrations such as Día de los Muertos, where he helps prepare ofrendas and shares stories of his ancestors. He maintains close ties with the local Mexican‑American community, participating in church
    festivals, supporting a neighborhood food pantry, and advocating for bilingual STEM outreach programs. His Mexican heritage informs his values of familial responsibility, respect for educators, and
    a commitment to community service, all of which are reflected in his teaching philosophy and personal life.
