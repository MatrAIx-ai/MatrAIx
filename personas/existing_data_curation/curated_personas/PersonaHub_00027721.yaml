persona_description: A physicist and researcher who specializes in the study of the quark-gluon plasma, a state of matter discovered at the Relativistic Heavy Ion Collider. His research involves studying
  strong interactions using high-energy versions of X-rays, such as direct photons, and comparing them with quarks produced at similar high energies. He has led the development and analysis of the PHENIX
  detector system, which is one of two large detector systems in the Relativistic Heavy Ion Collider. He has also been involved in the management of the Ohio University College of Arts & Sciences, and has
  developed and maintained organizations in the state of Ohio and beyond to exchange knowledge within the field of Relativistic Heavy Ion collisions.
