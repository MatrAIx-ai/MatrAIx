personas:
  professional: Ian Ugbo is a retired automotive and small‑engine mechanic who now devotes his methodical, competition‑driven mindset to woodworking projects and weekly volunteer repair workshops at the
    local senior center, ensuring every piece is finished flawlessly the first time.
  sports: Ian Ugbo enjoys low‑impact fitness through daily walks along the lake trail, follows the regional baseball team—the Springfield Sox—and the NFL’s Chicago Bears for occasional excitement, and participates
    in a senior fishing club that meets every Saturday at Lake Willow.
  arts: Ian Ugbo finds comfort in classic literature like "War and Peace" and "Moby‑Dick", listens to Beethoven’s Ninth Symphony during woodworking, and occasionally attends community theater performances
    starring local actors such as Margaret Hale, while collecting landscape prints by Thomas Kinkade.
  travel: Ian Ugbo prefers carefully planned, slow‑paced trips, having taken a nostalgic road trip to the historic town of Williamsburg, a serene boat cruise on the Hudson River, and dreaming of a quiet
    railway tour through the English Cotswolds once health permits.
  culinary: Ian Ugbo enjoys simple, home‑cooked meals centered on his garden’s harvest—roasted chicken with rosemary, fresh tomato‑basil soup, and apple‑cinnamon pie—while occasionally treating himself
    to a local diner’s fish‑and‑chips and exhibiting a modest knack for baking.
  core: Ian Ugbo blends a stubborn devotion to routine with a quiet competitive streak, turning solitary hobbies like crossword puzzles and model trains into measured achievements, all while carefully guarding
    their independence.
background:
  cultural: Ian was born in the Deep South during the early 1940s and moved north with his family in the 1960s seeking better employment opportunities. He grew up steeped in African‑American traditions
    of church fellowship, gospel music, and soul‑food cooking, which he continues to honor through occasional gatherings and home‑cooked meals. Living in Sioux Falls, he is part of a small, close‑knit Black
    community where he participates in local Juneteenth celebrations and church events, preserving cultural heritage while navigating the broader, predominantly white environment of South Dakota.
