persona_description: A historian and theologian who specializes in the study of the history of Christianity under the rule of Adolf Hitler, particularly the rise and fall of the German Evangelical Church
  under Nazi control. His research interests include the role of religion and politics in shaping national identity, the impact of religion on society during periods of political oppression, and the development
  of Christian doctrine and practice under the influence of totalitarian regimes. He is particularly interested in the work of Karl Barth, Dietrich Bonhoeffer, and other theologians who played a significant
  role in the history of the German Evangelical Church during the Third Reich. He is also interested in the role of the German Evangelical Church in shaping national identity and the impact of religion
  on society during periods of political oppression.
