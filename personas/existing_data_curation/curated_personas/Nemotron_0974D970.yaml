personas:
  professional: Jacqueline Warren is a bright second‑grader who spends recess building intricate LEGO structures, dreaming of becoming a junior architect, and they approach each mini‑construction with meticulous
    organization and a quiet, focused determination.
  sports: Jacqueline Warren enjoys cheering for the local high school basketball team, the Marshalltown Mavericks, and the Iowa State Cyclones football team, while also swimming at the community center
    three times a week, preferring low‑key activities like walking the family rabbit in the park over noisy team sports.
  arts: Jacqueline Warren loves flipping through picture books by Mo Willems, drawing detailed scenes inspired by the church choir’s gospel songs, and listening to classic R&B legends like Aretha Franklin
    and Mahalia Jackson while they color intricate patterns, making the arts a soothing part of daily life.
  travel: Jacqueline Warren delights in family road trips to the historic Juneteenth parade in Des Moines and dreams of visiting New Orleans to experience its vibrant music scene, yet their travel plans
    remain short, parent‑organized, and focused on safe, familiar destinations.
  culinary: Jacqueline Warren enjoys helping her mother bake buttery cornbread and seasoned collard greens, relishes crispy fried chicken with a side of mashed sweet potatoes, and often snacks on apple
    slices with caramel dip, showcasing a budding palate for soulful comfort foods.
  core: Jacqueline Warren is a quiet, routine‑loving 7‑year‑old who balances creative solitude with deep compassion, preferring puzzles and LEGO over noisy play while occasionally overindulging in candy
    treats.
background:
  cultural: Jacqueline is raised in an African‑American family that lives in Marshalltown, Iowa. Her parents maintain traditions rooted in Black Midwestern culture, such as attending the local African‑American
    Baptist church, celebrating Juneteenth and Kwanzaa, and sharing soul‑food meals like fried chicken, collard greens, and cornbread. Music from gospel choirs and classic R&B fills the home, and she participates
    in community events like the county's Black History Month celebrations and school cultural days. Her upbringing blends the values of close‑knit family, community harmony, and a respect for both heritage
    and the Midwestern environment.
attributes:
  skills: '["Organizational/routine management", "Reading fluency", "Empathy and peer support", "Household chores assistance", "Pet care", "Simple drawing and crafts"]'
