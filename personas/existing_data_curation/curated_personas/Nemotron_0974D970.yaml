  career_goals: Jacqueline dreams of a future where she can help others learn and stay healthy. She imagines becoming a teacher who creates a calm, organized classroom where each child feels supported,
    or a pediatric nurse who cares for children in a compassionate, orderly way. She also thinks about caring for animals as a veterinarian, reflecting her love for her rabbit and her desire to nurture
    living beings. Her career aspirations combine her love for routine, her caring personality, and her wish to make a positive impact in her community.
