  career_goals: Gladys dreams of becoming a wildlife veterinarian so she can care for the animals she loves and explore how living things work. She also envisions a future as a civil engineer who designs
    sustainable solutions to keep Parkers Lake and its surrounding environment healthy. In the short term, she aims to win the school science fair, qualify for the regional math competition, and maintain
    top grades that will help her earn a scholarship to a specialized STEM high school. Her ambition blends her methodical nature with a desire to make a tangible, positive impact on both people and animals
    in her community.
