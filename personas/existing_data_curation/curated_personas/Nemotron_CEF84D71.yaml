personas:
  professional: A junior inventor and budding environmental scientist named Gladys Harris combines methodical LEGO engineering, Scratch coding, and chess strategy to design nature‑inspired projects, channeling
    curiosity and meticulous planning while responsibly tackling school science challenges, and they eagerly share findings with the church youth group.
  sports: An enthusiastic but selective athlete named Gladys Harris plays on the Parkers Lake Cubs youth baseball team and occasionally joins the school's track club for long jump, cheering for the Louisville
    Cardinals basketball squad, and they fiercely compete with friends in neighborhood sprint races, though they sometimes skip team drills when they feel the routine lacks challenge.
  arts: A creatively expressive kid named Gladys Harris plays piano at the church's gospel choir, mimics the soulful stylings of Aretha Franklin and the folk twang of Dolly Parton in their sketches of Parkers
    Lake, and they devote spare time to reading Nancy Drew mysteries, letting the narratives fuel their own storytelling art.
  travel: An adventurous traveler named Gladys Harris loves weekend family trips to the nearby Mammoth Cave and dreamily plans a future road trip to the Great Smoky Mountains, while they meticulously map
    each destination in a colored notebook, yet they sometimes feel anxious about unfamiliar crowds at larger attractions.
  culinary: A budding culinary enthusiast named Gladys Harris assists grandparents in baking fluffy buttermilk biscuits topped with crisp bacon, enjoys collard greens, cornbread, and cherry pie, and they
    often experiment by adding a pinch of cinnamon to the brownie mix for extra flavor.
  core: Gladys Harris is a meticulously curious nine‑year‑old who blends competitive brainy pursuits with soulful community traditions, often worrying about details yet they thrive on disciplined creativity.
background:
  cultural: Gladys comes from an African‑American family rooted in the rural Appalachian region of eastern Kentucky. Her grandparents moved to McCreary County during the Great Migration, and the family
    maintains a blend of Southern Black cultural traditions—such as church‑centered community life, soulful music, and oral storytelling—alongside the local Appalachian heritage of close‑knit neighborliness
    and a deep connection to the natural landscape around Parkers Lake. Family gatherings often feature home‑cooked soul food, gospel hymns, and conversations about perseverance and pride in their history.
    Growing up in this environment, Gladys has internalized values of resilience, mutual support, and a strong sense of identity, which shape her practical curiosity and her desire to contribute positively
    to her community.
