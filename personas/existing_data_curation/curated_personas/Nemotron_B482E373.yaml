  hobbies: '[''Watercolor painting'', ''Sketching historic architecture'', ''Reading speculative fiction & poetry'', ''Creative writing (short stories & poems)'', ''Birdwatching along the Tuscarawas River'',
    ''Herb garden cultivation'', ''Knitting scarves'', ''Genealogy research'', ''Senior book club (small‑group discussions)'']'
  career_goals: Although approaching retirement, Christina plans to leverage her expertise into a mentorship role, guiding younger custodial staff and advocating for a greener cleaning program at the Coshocton
    Area School District. She hopes to win the county’s 'Best Maintained Facility' award for her current workplace, and to channel her creative side by curating a small exhibit of resident‑created art in
    the community center, using her cleaning hours to prepare the space. In the longer term, she dreams of publishing a collection of short stories that capture the quiet rhythms of small‑town Ohio and
    of volunteering part‑time with the Coshocton County Historical Society to preserve historic building interiors.
