personas:
  professional: Christina Darty, a seasoned custodial specialist with over thirty years of hands‑on experience in systematic cleaning, floor polishing, hazardous‑material handling, and OSHA compliance,
    now channels her meticulous eye and competitive spirit into mentoring junior staff and spearheading a greener cleaning initiative at the Coshocton Area School District while eyeing the county's Best
    Maintained Facility award.
  sports: Christina Darty enjoys gentle morning walks along the Tuscarawas River for fitness, volunteers with the Coshocton Senior Walking Club, and follows the Cleveland Browns, Cincinnati Reds, and Columbus
    Blue Jackets on game days, occasionally attending local high‑school basketball games to support community youth.
  arts: Christina Darty spends evenings crafting watercolor landscapes inspired by the Ohio River, often studying the fluid techniques of John Singer Sargent and the bird illustrations of Audubon, while
    finding poetic resonance in the verses of Mary Oliver and the speculative worlds of Octavia Butler, and occasionally watches classic films starring fellow Ohioan Holly Hunter for a cinematic escape.
  travel: Christina Darty prefers low‑key, self‑guided road trips that combine scenic river drives through the Ohio countryside with weekend stays in historic inns, having explored the covered bridges of
    Madison County and dreaming of a leisurely pilgrimage to the Scottish Highlands for landscape inspiration, all while budgeting trips around her modest retirement stipend.
  culinary: Christina Darty enjoys simple, garden‑fresh meals like herb‑infused roasted chicken seasoned with rosemary and thyme, creamy tomato‑basil soup, and occasional Ohio‑style buckeye treats, though
    she admits a habit of over‑cooking rice and relies on local farmers’ markets for the freshest produce.
  core: Christina Darty blends a lifelong dedication to clean, orderly spaces with an imaginative love for watercolor rivers, preferring flexible routines, skeptic curiosity, and a quiet competitiveness
    that fuels both her custodial mentorship and artistic pursuits.
background:
  cultural: Christina is a lifelong resident of Coshocton, Ohio, a small Midwestern town shaped by a blend of German, Irish, and early Appalachian settlers. Raised in a working‑class family that valued
    hard work, modesty, and community service, she attended the local public high school and participated in county fair traditions, church potlucks, and volunteer clean‑up days. Her cultural identity reflects
    the modest, self‑reliant ethos of central Ohio, with a strong sense of belonging to the close‑knit Coshocton community and an appreciation for the region’s agricultural heritage and local craftsmanship.
attributes:
  skills: '[''Commercial cleaning & sanitation'', ''Floor stripping & polishing'', ''Basic facilities maintenance'', ''Hazardous material handling'', ''Health & safety compliance (OSHA)'', ''Inventory control
