persona_description: A Stanford mathematics education professor who advocates for the importance of math education and the potential for all students to excel in math, especially by providing resources
  and ideas to inspire and excite students about mathematics. She is known for her groundbreaking research on the brain's response to math and her co-founding of YouCubed, a platform that provides resources
  and ideas to inspire and excite students about mathematics. She has also received recognition for her work in mathematics teaching and learning, and is a recipient of a National Science Foundation "early
  career award".
