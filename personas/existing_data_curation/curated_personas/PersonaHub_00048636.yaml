persona_description: A NASA scientist who specializes in the study of cloud formation and aerosol particles, particularly their role in cloud properties and the formation of clouds. The scientist has experience
  with coordinated flights above, through, and below clouds and hopes to use the data collected to better understand how different kinds of aerosol particles affect the formation and development of clouds.
  The scientist is interested in understanding the impact of aerosol particles on climate and weather modelers, and is looking for unique and detailed information about the region of the western North Atlantic
  Ocean where the flights will take place.
