personas:
  professional: Sarah Agha leverages three decades of Glenview real-estate expertise, meticulous market analysis, and disciplined negotiation tactics to close high-value deals, while they mentor junior
    agents within a boutique firm that mirrors their love of routine and community service.
  sports: Sarah Agha supports the Chicago Cubs and Chicago Bears, joins the Glenview Senior Walking Club for Saturday walks in the forest preserve, and they attend a low-impact Pilates class at the community
    center twice a month to maintain flexibility, favoring routine-based, low-stress exercise over competitive sports.
  arts: Sarah Agha delights in quilting inspired by Harriet Krause's patterns, enjoys listening to the timeless voices of Johnny Cash and Ella Fitzgerald, and they regularly attend productions at the North
    Shore Center for the Performing Arts, such as the recent staging of The Music Man.
  travel: Sarah Agha prefers well-planned road trips to historic locales, having toured Colonial Williamsburg, the cobblestone streets of Bruges, and the gardens of Stratford-upon-Avon, and they dream of
    a leisurely cruise along the Greek Islands but typically choose family-friendly, budget-conscious itineraries in the Midwest.
  culinary: Sarah Agha, a methodical home cook, prepares herb-roasted chicken with rosemary and garlic, slow-cooked lamb stew spiced with cumin and chickpeas for holiday gatherings, and they love experimenting
    with seasonal produce like heirloom tomatoes and fresh basil.
  core: Sarah Agha is a disciplined, community-oriented real-estate veteran whose love for routine, meticulous planning, and quiet generosity shape every facet of her life, from the garden to the boardroom,
    even as they occasionally indulge in a spontaneous slice of chocolate cake.
background:
  cultural: Sarah grew up in the suburban Midwest, raised in a white, middle‑class family that valued stability, community involvement, and practical education. Her upbringing in the Chicago area emphasized
    a blend of Midwestern hospitality and a strong work ethic. She regularly partakes in regional traditions such as Thanksgiving turkey dinners, Fourth of July fireworks, and community potlucks, which
    reinforce her appreciation for harmony and shared experiences. Her cultural background also includes a modest religious affiliation, attending a Protestant church that fosters service and fellowship.
    These influences shape her preference for routine, her organized approach to both professional and personal life, and her commitment to nurturing relationships within her neighborhood.
attributes:
  skills: '[''Local market analysis'', ''Zoning and property law expertise'', ''Negotiation and contract drafting'', ''Meticulous client file management'', ''Traditional and digital property marketing'',
