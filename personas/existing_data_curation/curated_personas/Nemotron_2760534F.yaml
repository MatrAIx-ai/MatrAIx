  hobbies: '["drawing cartoons", "watercolour painting", "listening to salsa and bomba music", "simple dancing", "building LEGO structures", "reading picture books", "exploring parks and nature", "collecting
    leaves and rocks", "helping with cooking traditional dishes", "attending library storytime"]'
  career_goals: Moises dreams of becoming someone who can turn his love for art and music into a career that helps others feel safe and understood. He imagines himself as a visual artist who creates bright,
    calming illustrations for children's books, a teacher who uses art and music to help kids manage strong emotions, or even an inventor of playful learning tools that blend storytelling with tactile activities.
    He is also fascinated by space and nature, so he sometimes pictures being an explorer who draws the world’s wonders. His ambitions are guided by his desire to share creativity, support friends who feel
    anxious, and celebrate his cultural heritage.
