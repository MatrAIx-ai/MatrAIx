personas:
  professional: Moises Rios, a budding junior illustrator, blends vivid imagination with an emerging sense of order to produce lively cartoon drawings and watercolour projects, channeling their curiosity
    and structured playfulness into early artistic storytelling, and they eagerly share each piece with family members.
  sports: Moises Rios enjoys playground games, swims at the community pool during summer, plays on the Lake County Lightning youth soccer team in the fall, and cheers for the Chicago Cubs while dreaming
    of trying baseball someday, and they often practice kicking a soccer ball at home after school.
  arts: Moises Rios, inspired by the bold murals of Diego Rivera and the rhythmic beats of salsa legends like Celia Cruz, spends afternoons sketching cartoons, painting watercolours, and practicing tiny
    dance steps to lively music, often humming early‑childhood TV themes, and they love turning everyday sounds into creative rhythms.
  travel: Moises Rios loves weekend outings to the nearby state park to collect leaves and rocks for art, delights in library field trips to museums, and hopes to visit Disneyland in Anaheim for the magical
    rides and bright parades, and they imagine packing a tiny backpack filled with crayons for the journey.
  culinary: Moises Rios eagerly helps roll dough for sweet pastries, favouring buttery dough scented with cinnamon and coconut, enjoys tasting fresh fruit dipped in honey, and often adds a pinch of sugar
    to their own snack creations, and they sometimes forget to clean the flour spill, leaving a snowy trail across the kitchen counter.
  core: Moises Rios is a curious six‑year‑old who balances colourful creativity with meticulous organization, yet can swing from intense excitement to sudden anxiety, and they are a vibrant but emotionally
    sensitive little explorer.
background:
  cultural: Moises comes from a proud Puerto Rican family that maintains strong cultural ties while living in Madison, Ohio. At home, Spanish is spoken alongside English, and he grows up hearing stories
    about the island’s history, music, and folklore. Family gatherings feature traditional dishes such as arroz con gandules, mofongo, and pastelitos, and the kitchen often fills with the aroma of sofrito.
    He celebrates cultural holidays like Three Kings’ Day (Día de los Reyes) and the vibrant Puerto Rican Christmas traditions, including music, dancing, and crafting handmade ornaments. The local Hispanic
    community centre offers him lessons in basic percussion instruments and opportunities to participate in cultural festivals, reinforcing his identity. These experiences shape his artistic expressions,
    his love for rhythmic music, and his bilingual communication style.
