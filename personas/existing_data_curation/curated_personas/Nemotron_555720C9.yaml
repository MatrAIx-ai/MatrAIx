  hobbies: '[''Reading (non-fiction, nature, technology)'', ''Gardening'', ''Hiking on local trails'', ''Birdwatching'', ''Crossword puzzles and Sudoku'', ''Knitting'', ''Volunteering at the community library'',
    ''Cooking and baking'', ''Landscape photography'']'
  career_goals: Connie aims to earn her PMP certification and transition into a senior program management role, overseeing complex, cross‑functional technology initiatives in the manufacturing sector. She
    wants to become a trusted advisor on process improvement, mentor junior project coordinators, and implement sustainable, low‑stress project practices that allow her to maintain a healthy work‑life balance
    while contributing to her company's strategic growth.
