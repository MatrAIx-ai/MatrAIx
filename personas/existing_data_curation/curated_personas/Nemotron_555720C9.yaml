personas:
  professional: Connie Rich is a meticulous project management specialist with a solid STEM foundation who excels at crafting detailed plans, conducting risk assessments, and managing budgets using Agile
    and Scrum; they blend curiosity-driven innovation with proven methodologies while thriving in quiet, solitary work environments and fostering cooperative stakeholder relationships.
  sports: Connie Rich indulges in low-impact fitness through weekend hikes on the Northwoods Trail and cross-country skiing in winter, holds season tickets for the Milwaukee Brewers and a loyal heart for
    the Green Bay Packers, and they belong to the Wausau Hiking Club where they prefer solitary trail runs over crowded gym sessions.
  arts: Connie Rich enjoys landscape photography inspired by Ansel Adams, relaxes while listening to classical pieces by Johann Sebastian Bach and folk tunes by Sufjan Stevens, and they occasionally attend
    local gallery openings featuring works by Wisconsin artist Jeff Ganz.
  travel: Connie Rich favors meticulously planned nature-focused getaways, having already explored Door County's cherry orchards, the Apostle Islands' sea caves, and a solo trekking adventure in Iceland's
    volcanic landscapes, while they continue to dream of a quiet retreat in New Zealand's South Island that balances photographic opportunities with solitude.
  culinary: Connie Rich, an adept home cook, often transforms garden harvests into hearty dishes such as roasted beet and goat-cheese salad with fresh thyme, wild mushroom risotto featuring locally sourced
    porcini, and a comforting carrot-ginger soup, relishing the simple pleasure of farm-to-table flavors.
  core: Connie Rich is a quietly curious perfectionist who balances methodical project mastery with solitary outdoor pursuits, a penchant for puzzle-solving, and a lingering worry that fuels their relentless
    quest for order.
background:
  cultural: Connie grew up in a Midwestern white family with German‑Scandinavian roots in Wausau, Wisconsin. The community’s emphasis on hard work, punctuality, modesty, and mutual support shaped her pragmatic
    outlook. Local Lutheran traditions and a strong sense of small‑town community fostered her cooperative spirit and respect for harmony. Her upbringing in the Upper Midwest also instilled a love for nature,
    seasonal change, and the quiet rhythms of rural life.
attributes:
  skills: '[''Project Planning'', ''Risk Management'', ''Data Analysis (Excel, SQL)'', ''Agile & Scrum'', ''Budgeting & Cost Control'', ''Stakeholder Communication'', ''Process Optimization'', ''Technical
