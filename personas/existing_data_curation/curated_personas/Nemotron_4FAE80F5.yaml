personas:
  professional: Mott Blackmon, a lively kindergarten student who eagerly leads circle time and organizes the snack line, showcases early leadership and organizational skills, thrives on familiar classroom
    routines, and uses their talkative, competitive nature to keep classmates engaged while occasionally questioning new classroom rules.
  sports: Mott Blackmon, a member of the Wilmette Tiny Tots Soccer Club who eagerly dribbles the ball after each practice, idolizes the Chicago Cubs and chants their names during weekend games, and channels
    their competitive spark into scoring goals while still preferring the familiar rhythm of after‑school drills.
  arts: Mott Blackmon, who loves belting out Idina Menzel’s “Let It Go” from Frozen and drawing Spider‑Man comics during free play, frequently puts on mini‑concerts for family gatherings, channeling their
    talkative energy into creative performances while their routine of sketching after dinner provides a comforting structure.
  travel: Mott Blackmon, who has visited Grandma’s lake house in Michigan and taken a family road trip to Chicago’s Navy Pier, prefers short car rides with familiar playlists and scheduled snack breaks,
    but dreams of the colorful thrills of Orlando’s theme parks, balancing a love for routine with bursts of adventurous excitement.
  culinary: Mott Blackmon, who delights in creamy mac and cheese topped with extra cheddar and relishes warm apple pie slices after Thanksgiving, often helps stir batter for banana muffins, yet they sometimes
    sneak a cookie before dinner, showing a practical yet flexible approach to food.
  core: Mott Blackmon is an exuberant 5‑year‑old who thrives on routine, loves being the center of attention, and navigates the world with a playful mix of competitive spirit and easygoing charm.
background:
  cultural: Mott was born and raised in Wilmette, Illinois, a suburban community in Cook County known for its safe neighborhoods, good schools, and family-oriented culture. His family follows typical Midwestern
    American customs, celebrating holidays like Thanksgiving and Fourth of July with community gatherings, and participating in local events such as the Wilmette Summer Fest. The cultural environment emphasizes
    politeness, community involvement, and a respect for routine, all of which shape his early experiences.
attributes:
