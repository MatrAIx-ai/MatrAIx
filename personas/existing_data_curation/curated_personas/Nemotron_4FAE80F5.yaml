  hobbies: '["Building with blocks and Lego", "Drawing and coloring", "Listening to library storytime", "Playing soccer at the park", "Singing and performing short skits", "Collecting stickers", "Playing
    competitive board games (e.g., Candy Land)", "Watching favorite cartoon on a set schedule"]'
  career_goals: Mott often imagines himself as a leader who can organize fun activities for his friends. He talks about becoming a youth soccer coach, a classroom teacher, or a children's TV host because
    these roles let him be the center of attention, give structure to a group, and involve friendly competition. He also mentions wanting to be a police officer or firefighter, drawn to the clear routines
    and community service they provide.
