  career_goals: Patty's long‑term ambition is to combine her love of art with her curiosity about the natural world. She hopes to attend a specialized high‑school program in visual arts and later study
    illustration or environmental design at college. Her ultimate career goal is to become a wildlife illustrator or an environmental educator who creates visually engaging materials to teach others about
    local ecosystems. She also dreams of publishing her own illustrated children’s books, using her storytelling talent to inspire other kids. Her calm, resilient nature and methodical approach to projects
    give her confidence that she can achieve these goals.
