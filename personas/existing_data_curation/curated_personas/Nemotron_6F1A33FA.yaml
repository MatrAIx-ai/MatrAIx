personas:
  professional: Patty Barnes, an aspiring junior digital storyteller, blends methodical Scratch coding with a vivid imagination for watercolor and sketching, channeling their curious, organized nature into
    creating interactive narrative art projects.
  sports: Patty Barnes, a member of the Beldenville Youth Soccer Club and an avid fan of the Chicago Cubs, enjoys hiking the Willow Creek Trail in spring and playing friendly soccer matches with the local
    Beldenville Bears, approaching fitness with disciplined practice and a quiet confidence.
  arts: Patty Barnes, an avid sketchbook artist, draws inspiration from the graphic novels of Kazu Kibuishi’s “Amulet,” the animated films of Hayao Miyazaki, and the piano compositions of Yiruma, often
    blending watercolor washes with digital layers to create personal tributes to these creators.
  travel: Patty Barnes, a curious weekend explorer, plans trips with a detailed notebook, often visits the nearby Beldenville State Park for birdwatching and rock collecting, dreams of a school‑field trip
    to the Smithsonian National Museum of Natural History in Washington, D.C., and hopes to someday travel to Kyoto, Japan to see its traditional gardens and anime culture, balancing school schedules with
    family budget constraints.
  culinary: Patty Barnes, a budding kitchen experimenter, loves preparing simple dishes like avocado toast with lemon zest, homemade pizza topped with fresh basil from the community garden, and berry smoothies
    that combine strawberries, blueberries, and a splash of almond milk, while still relying on their parents for most cooking.
  core: Patty Barnes, a calm, organized 11‑year‑old who fuses art, coding, and nature into every hobby, never lets anxiety cloud their curiosity, but often forgets to finish a sketch before starting a new
    one.
background:
  cultural: Patty grew up in Beldenville, a small rural community in Pierce County, Wisconsin, where a predominantly white Midwestern culture shaped daily life. Her family’s heritage includes German and
    Scandinavian roots common to the region, and community values emphasize self‑reliance, appreciation of nature, modesty, and a strong work ethic. She participates in local traditions such as the county
    fair, school field trips to nearby museums, and church‑based service projects. The surrounding landscape of farms, forests, and lakes offers abundant opportunities for outdoor exploration, which reinforces
    her connection to the environment and fuels her artistic inspiration.
