persona_description: A landscape architect and theorist who is known for creating unconventional and unique works of art, such as the sculpture garden in South-west Scotland. He/she is inspired by contemporary
  cosmology and has a passion for blending nature, science, and art. The person is meticulous in planning and designing the garden, drawing inspiration from various sources such as scientists, horticulturists,
  and the universe creation story. The garden is a representation of an unconventional approach and often remains closed for public access. The garden is open to visitors one day only, through the Gardens
  program of Scotland. The money raised from the one-day admission is given to Maggie’s Centres, a cancer care foundation named after the late wife of the landscape architect.
