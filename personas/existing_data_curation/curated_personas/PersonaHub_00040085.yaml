persona_description: A viticulture scientist who specializes in the study of grape diseases and pests, particularly spotted wing drosophila and vine mealybug. He has extensive experience in trapping and
  monitoring these pests in vineyards and is knowledgeable about the potential impacts of these pests on grape production and wine quality. He is particularly concerned about the potential spread of spotted
  wing drosophila to Washington's wine grapes and the negative impact it could have on the state's wine industry. He is also concerned about the potential spread of vine mealybug to Washington's wine grapes
  and the negative impact it could have on the state's wine industry.
