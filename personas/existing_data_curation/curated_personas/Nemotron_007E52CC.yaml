  hobbies: '[''Painting watercolors'', ''Listening to merengue and bachata'', ''Cooking Dominican dishes'', ''Walking in Bronx parks'', ''Reading historical biographies'', ''Attending local art exhibitions'',
    ''Practicing yoga and mindfulness'', ''Participating in community dance nights'', ''Volunteer tutoring for youth'']'
  career_goals: Mirella aims to formalize her expertise by earning Certified Nursing Assistant (CNA) credentials within the next year, positioning herself for a supervisory role in her agency. She dreams
    of launching a community‑based art‑therapy program that serves Bronx seniors, blending her curiosity for unconventional ideas with her caregiving. Additionally, she hopes to become a mentor/trainer
    for junior home health aides, sharing both clinical best practices and culturally sensitive care approaches. Long‑term, she envisions partnering with local cultural centers to secure funding for workshops
    that celebrate Dominican heritage while promoting senior wellness.
