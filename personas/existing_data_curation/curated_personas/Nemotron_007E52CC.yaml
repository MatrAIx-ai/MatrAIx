personas:
  professional: Mirella Cepero, a 58‑year‑old home health aide, blends three decades of compassionate personal care, bilingual communication, and basic wound management with a curious, flexible approach
    that often injects spontaneous watercolor sessions and merengue‑infused reminiscence into senior care, while eyeing a CNA certification and a supervisory role that will let her champion an art‑therapy
    program for older adults.
  sports: Mirella Cepero enjoys daily walks through Bronx’s Van Cortlandt Park, participates in community yoga sessions at the local recreation center, and roots for the New York Yankees and Knicks while
    occasionally cheering on the Bronx Boulders youth basketball league.
  arts: Mirella Cepero spends evenings painting Caribbean‑inspired watercolors of breezy shorelines, finds rhythm in merengue tracks by Juan Luis Guerra and bachata classics by Aventura, and frequents the
    Bronx Museum’s monthly art openings featuring artists like Kehinde Wiley and Romare Bearden, letting those experiences inform her own creative practice.
  travel: Mirella Cepero balances a love of short weekend escapes to the Hudson Valley’s vineyards with occasional trips to the Caribbean island of her grandparents, where she revisits family homesteads
    and savors coastal breezes, while also planning a future cultural pilgrimage to New Orleans for its jazz heritage.
  culinary: Mirella Cepero delights in crafting fragrant sancocho with yucca, plantains, and pork broth, mastering the art of mofongo with garlic‑infused mashed plantains and chicharrón, and she often pairs
    her meals with fresh avocado cilantro salsa, while savoring occasional evenings at the neighborhood spot Casa del Sol for a side of tostones and a glass of passion‑fruit juice.
  core: Mirella Cepero is a resilient, curiosity‑driven caregiver who fuses artistic spontaneity with a flexible, occasionally scattered approach to life, constantly balancing cultural roots, community
    service, and personal ambition.
background:
  cultural: Mirella is a first‑generation Dominican American who grew up in the Bronx's vibrant Dominican enclave. Her upbringing was steeped in the rhythms of Caribbean music, the flavors of island cuisine,
    and the close‑knit familial ties that characterize Dominican culture. While she never married, she maintains strong connections with an extended network of relatives, neighbors, and community members
    who support and celebrate each other's milestones. Her bilingual fluency and deep respect for cultural traditions enable her to bridge generational gaps, especially when caring for older adults who
    cherish their heritage. Mirella’s identity is shaped by a blend of Dominican pride, urban New York resilience, and an ever‑present curiosity for artistic expression.
attributes:
  skills: '[''Patient care'', ''Medication reminders'', ''Mobility assistance'', ''Basic wound care'', ''Infection control'', ''Bilingual Spanish‑English communication'', ''Cultural competency in Dominican
