persona_description: A biochemist who specializes in the study of biomass feedstocks and their properties, particularly in relation to their heating values, moisture content, and chemical composition. They
  are knowledgeable in the use of Excel spreadsheets to analyze and compare these properties across different feedstocks and fuels, and are interested in the potential uses of biomass fuels in confined
  spaces and engine starting at cold temperatures. They may have experience with the DOE Biomass Feedstock Composition and Property Database and the Nordin, A. (1994) Chemical elemental characteristics
  of biomass fuels fact sheet.
