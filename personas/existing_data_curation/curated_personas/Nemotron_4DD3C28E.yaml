personas:
  professional: Adriana Zamoyski is a seasoned New York City building inspector whose expertise in the NYC Building Code, fire-safety standards, and LEED retrofitting is amplified by their meticulous organization,
    love of quiet analysis, and bilingual communication that turns complex code compliance into harmonious solutions for diverse contractors.
  sports: Adriana Zamoyski roots for the New York Knicks and New York City FC, but prefers solitary early-morning walks in Forest Park, a weekly yoga class with the Queens Green Wellness club, and occasional
    weekend paddle-boarding on Port Jefferson to maintain fitness without the noise of crowded gyms.
  arts: Adriana Zamoyski spends quiet afternoons at the Queens Museum studying works by Kehinde Wiley, Tania Bruguera, and Faith Ringgold, sketches New York facades in a leather-bound notebook, and finds
    solace listening to Chopin recordings by Maurizio Pollini on a vintage turntable.
  travel: Adriana Zamoyski designs low-stimulus itineraries that blend architectural wonder with cultural immersion, having toured the colonial streets of Antigua and the Art Nouveau districts of Barcelona,
    while setting her sights on a serene garden retreat in Kyoto and weekend escapes to Fire Island.
  culinary: Adriana Zamoyski masters pepian using roasted chiles, cacao, pumpkin seeds, and masa, experiments with kak’ik broth flavored by coriander, plantains, and achiote, and weekends include baking
    rosemary focaccia with locally sourced olive oil, reflecting a skillful yet experimental kitchen style.
  core: Adriana Zamoyski balances a methodical, code-driven career with a quiet love of vintage textiles, meticulous budgeting, occasional health neglect, and a habit of arranging every bookshelf alphabetically
    while worrying about the next inspection deadline.
background:
  cultural: Adriana is a first‑generation Guatemalan‑American who grew up in a bilingual household in Queens. Her parents emigrated from Guatemala in the early 1990s, bringing with them rich traditions
    of Maya‑inspired textiles, folk music, and a strong sense of community. She celebrates Día de los Muertos and Guatemalan Independence Day with family gatherings and traditional foods. Living in Springfield
    Gardens, she balances these cultural roots with the multicultural vibrancy of New York City, often participating in local Latin American festivals and supporting community initiatives that preserve
    the heritage of immigrant neighborhoods. Her cultural heritage informs her appreciation for craftsmanship, intricate design, and the value of collaborative, harmonious relationships.
attributes:
  skills: '[''Building Code Interpretation'', ''Structural & Fire‑Safety Inspection'', ''Report Writing & Documentation'', ''Digital Inspection Tools (iAuditor, Bluebeam)'', ''Project Coordination'', ''Bilingual
    Communication (English/Spanish)'', ''Sustainable Building Practices (LEED)'', ''Historic Preservation Guidelines'', ''Safety Training (OSHA)'', ''Data Analysis and Trend Reporting'']'
  hobbies: '[''Sketching architectural details'', ''Visiting art galleries and museums'', ''Collecting Guatemalan textiles'', ''Cooking traditional Guatemalan cuisine'', ''Reading architectural and art
    history'', ''Solving jigsaw puzzles'', ''Balcony gardening'', ''Listening to classical music'', ''Attending public lectures on sustainability'']'
  career_goals: Adriana aims to advance to a senior inspection role or become a certified LEED Green Associate within the next three years, positioning herself as an expert in sustainable and historic building
    compliance. She plans to obtain the NYC Department of Buildings senior inspector certification and eventually start a boutique consulting firm that helps small developers navigate code requirements
    while integrating environmentally friendly design. She also hopes to mentor newer inspectors, creating a supportive network that addresses the stress and emotional challenges of the job.
