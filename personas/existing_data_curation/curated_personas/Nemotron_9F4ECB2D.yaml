personas:
  professional: Daniel Campbell is a meticulous toddler who organizes his building blocks by color and size, turning playtime into a structured mini‑architecture project that reflects an early penchant
    for planning and reliability.
  sports: Daniel Campbell is an enthusiastic member of the local toddlers' soccer club, cheering for the City Lions, and enjoys weekly playground swing sessions that satisfy his need for predictable routines
    and active play.
  arts: Daniel Campbell loves drawing cartoon dinosaurs, humming the tunes of "The Wheels on the Bus" and "Baby Shark," and eagerly attends storytime at the neighborhood library, where the rhythmic storytelling
    fuels his imaginative yet structured creative expression.
  travel: Daniel Campbell enjoys short family road trips to the nearby lake, where he can methodically collect smooth stones, and dreams of visiting Disney World to experience the magical rides with the
    same sense of order and excitement.
  culinary: Daniel Campbell prefers chicken nuggets, mac and cheese, and apple slices, skillfully arranging his plate into neat sections, though he stubbornly refuses broccoli, highlighting his picky yet
    organized eating habits.
  core: Daniel Campbell is a detail‑oriented three‑year‑old who balances a love for orderly play with occasional worry‑driven meltdowns, a penchant for saving coins, and a stubborn refusal of certain foods.
background:
  cultural: Daniel is raised in a white, middle‑class family in Buffalo, New York. His upbringing reflects the typical American suburban experience of the Great Lakes region, with exposure to the city’s
    seasonal climate—cold, snowy winters and warm summers—as well as community events such as local parades and neighborhood gatherings. He celebrates common U.S. holidays, enjoys family meals that sometimes
    feature regional foods like chicken wings (adapted for his age), and speaks English as his primary language. The local culture’s emphasis on community service, sports (especially hockey), and appreciation
    for the outdoors influences his daily life.
