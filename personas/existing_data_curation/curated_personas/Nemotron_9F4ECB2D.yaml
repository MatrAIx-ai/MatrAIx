  career_goals: Daniel often talks about wanting to be a firefighter because he likes the bright red trucks he sees in the neighborhood, and he enjoys pretending to help put out imaginary fires with a toy
    hose. He also shows interest in building things, saying he wants to ‘fix houses’ like the construction workers he watches on TV, reflecting his love for orderly, purposeful tasks. Occasionally he mentions
    becoming a teacher because he enjoys storytime and helping his peers count. These ambitions are shaped by his preference for structured roles and his desire to be helpful.
