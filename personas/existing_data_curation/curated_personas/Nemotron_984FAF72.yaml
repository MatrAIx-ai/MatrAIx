personas:
  professional: Stefan is an aspiring marine illustrator who merges beach‑side tide‑pool discoveries with graphic‑novel storytelling, leveraging sketching, digital art, and an open‑minded creative process
    while navigating schoolwork with a relaxed, sometimes chaotic, schedule.
  sports: Stefan is a regular player for the Coastal Kickers youth soccer team, avidly supports the Harbour FC professional club, and spends free hours perfecting tricks at the local skate park, preferring
    spontaneous high‑energy play over structured training sessions.
  arts: Stefan devotes free time to street‑mural workshops, drawing inspiration from artists like Banksy, Keith Haring, and Jean‑Michel Basquiat, while voraciously reading graphic novels by Alan Moore and
    Neil Gaiman, and they often translate these influences into bold, colorful sketches of marine life.
  travel: Stefan has explored the tide pools of Monterey Bay, camped in Redwood National Park, and dreams of snorkeling among the coral reefs of the Great Barrier Reef, favoring spontaneous coastal adventures,
    though their family's budget sometimes curtails longer trips.
  culinary: Stefan loves the salty tang of fish tacos with cilantro‑lime slaw, regularly enjoys a bowl of clam chowder at the seaside café, and dabbles in simple home‑cooked snacks like grilled shrimp quesadillas,
    though they often burn toast when distracted by music.
  core: Stefan is a curious, art‑obsessed 12‑year‑old who bounces between tide‑pool sketches, skate‑park flips, and comic‑book quests, yet habitually misplaces homework and worries about upcoming school
    projects.
background:
  cultural: Stefan comes from a white, middle‑class family rooted in the coastal community of San Pedro, California. His upbringing blends typical suburban Southern Californian life with the diverse cultural
    tapestry of Los Angeles County. He is exposed to the vibrant street‑art scene of the nearby waterfront, the maritime traditions of the local harbor, and the multicultural influences of neighboring Latino
    neighborhoods, which introduce him to basic Spanish phrases and community festivals. Family values emphasize kindness, community involvement, and an appreciation for artistic expression, shaping Stefan’s
    collaborative and open‑minded outlook.
