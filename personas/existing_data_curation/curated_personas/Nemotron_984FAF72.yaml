    at the local library for craft activities"]'
  career_goals: Stefan dreams of turning his love for art and storytelling into a career as an animator or digital illustrator, ideally creating videos that teach others about marine life and environmental
    stewardship—topics sparked by his frequent explorations of tide pools in San Pedro. He hopes to attend an arts‑focused high school, study animation or graphic design in college, and later work at a
    studio that blends creativity with community outreach. While he sometimes worries about meeting deadlines and handling stress, he aspires to develop a supportive creative routine that balances flexibility
    with enough structure to bring his ideas to life.
