    for actuarial models", "Effective communication and stakeholder presentation", "Mentorship and team leadership", "Project management in cross‑functional settings"]'
  hobbies: '["Salsa and folklórico dancing", "Weekly Zumba classes", "Community cooking workshops (Mexican cuisine)", "Gardening (herb and vegetable garden)", "Trivia nights at local cafés", "Chess club",
    "Historical fiction book club", "Mindfulness meditation", "Gratitude journaling", "Weekend trips to historic sites in Mexico", "Volunteering for immigrant support charities"]'
  career_goals: Tanisha aims to step into a chief actuary or director of risk management role within the next three years, where she can shape the firm’s strategic risk framework and champion the integration
    of AI‑driven predictive modeling. She is passionate about establishing a mentorship program for Latino and women actuaries across California and plans to launch a boutique consultancy that provides
    tailored risk solutions for small agricultural businesses in Kern County. Personally, she seeks a balanced retirement that still allows her to contribute to professional societies, publish research
    on the ethical use of machine learning in actuarial practice, and remain an active community mentor.
