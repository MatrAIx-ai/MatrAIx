personas:
  professional: Donald Wedgeworth, a budding 13‑year‑old aspiring wildlife caretaker, leverages his routine‑loving nature, meticulous model‑building skills, and hands‑on experience from 4‑H animal projects
    to become a reliable helper during church youth events and family hunting outings.
  sports: Donald Wedgeworth, a 13‑year‑old outdoor enthusiast, follows the Minnesota Vikings, Twins, and Wild, participates in his community’s youth fishing league and the local 4‑H hunting and conservation
    club, and hits the snow‑mobile trails each winter, favoring structured practice sessions over spontaneous competition.
  arts: Donald Wedgeworth, a 13‑year‑old creative builder, spends his free time crafting detailed model airplanes and RC cars, draws design inspiration from Revell kits and Minecraft YouTube creators like
    Mumbo Jumbo, and relaxes listening to classic country artist Willie Nelson while sketching new project plans.
  travel: Donald Wedgeworth, a 13‑year‑old who prefers meticulously planned trips, enjoys weekend fishing getaways to familiar spots such as Lake Mille Lacs and Lake of the Woods, dreams of a family road
    adventure to Yellowstone National Park, and avoids spontaneous travel due to his worry about the unknown.
  culinary: Donald Wedgeworth, a 13‑year‑old who loves cooking his catch, often fillets fresh walleye with butter and lemon, favors hearty Minnesota hot dish and classic peanut butter‑jelly sandwiches,
    and keeps a stash of trail mix, beef jerky, and granola bars for long snow‑mobile rides, though he sometimes over‑cooks his fish out of nervousness.
  core: Donald Wedgeworth is a routine‑driven 13‑year‑old teen who balances meticulous outdoor hobbies and model building with a persistent undercurrent of worry, finding comfort in predictable projects
    and the calm of nature.
background:
  cultural: Donald grew up in a small, predominantly white, Midwestern town in Minnesota, where community ties and seasonal outdoor life shape daily routines. His family values practicality, self‑reliance,
    and modest leisure, emphasizing participation in local traditions such as county fairs, 4‑H exhibitions, and church gatherings. The region’s culture of hunting, fishing, and winter sports informs his
    interests, while the emphasis on hard work and reliable friendships underlies his cooperative yet self‑protective personality.
attributes:
  skills: '["basic computer literacy (word processing, spreadsheets)", "model kit assembly (airplane, car)", "small‑mechanical repairs (bicycles, lawn‑mowers)", "organizing school assignments", "helping
    peers with mathematics", "basic first‑aid and outdoor safety knowledge"]'
  hobbies: '["fishing on local lakes", "seasonal hunting with family", "snowmobiling", "model airplane and RC car building", "strategy video games (Minecraft)", "4‑H club projects (animal care, small-scale
    farming)", "church youth group activities"]'
  career_goals: Donald aspires to a stable, hands‑on career where he can apply his practical skills and enjoy a predictable routine. He is leaning toward becoming a skilled tradesperson—either an automotive
    mechanic, a farm equipment technician, or an electrician—so he can work in a clear, step‑by‑step environment. He also hopes to attend a vocational high‑school program and eventually earn certifications
    that will let him work locally, supporting his family and community without the uncertainty he sometimes worries about.
