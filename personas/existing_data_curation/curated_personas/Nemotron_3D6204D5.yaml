personas:
  professional: Susan Holt, a veteran IT and information systems manager turned pro‑bono tech consultant, leverages three decades of strategic planning, ERP implementation, and cybersecurity expertise to
    translate complex digital concepts into accessible language for arts nonprofits, and they are a natural workshop facilitator whose talkative, sociable nature makes them a beloved community‑center speaker.
  sports: Susan Holt enjoys attending Philadelphia Eagles football games and Lehigh Valley IronPigs baseball outings with friends, participates in a weekly walking club at the Bethlehem Senior Center, and
    they practice gentle water aerobics at the local YMCA during summer months to maintain flexibility and cardiovascular health.
  arts: Susan Holt, an avid patron of the Moravian Museum and Lehigh Valley Art Museum, regularly engages with curators over exhibitions featuring Monet's water lilies and contemporary installations by
    local artist Sean Pinder, enjoys live performances by the Philadelphia Orchestra and folk singer Joan Baez, and they channel their own creativity through watercolor landscapes and experimental VR art
    pieces.
  travel: Susan Holt prefers flexible, low‑key travel, often joining friends for weekend road trips to historic sites such as Gettysburg and the Liberty Bell in Philadelphia, they delight in attending Mid‑Atlantic
    cultural festivals like the Virginia Folk Festival and the Maryland Chesapeake Bay Wine & Food Festival, and they dream of a summer visit to the art‑rich streets of Florence, Italy, though budgeting
    constraints sometimes postpone that ambition.
  culinary: Susan Holt, a modest home chef, delights in preparing herb‑infused dishes such as rosemary‑roasted chicken, lemon‑basil pasta, and lavender scones for her tea gatherings, favoring fresh garden
    produce like basil, thyme, and mint, and they occasionally treat themselves to a slice of Philly cheesesteak from Pat's King of Steaks when exploring the city.
  core: Susan Holt is a curious, socially vibrant 73‑year‑old technophile who blends her love of art, gardening, and mentorship into a lively, sometimes disorganized lifestyle marked by an ever‑present
    tea cup, a penchant for bridge, and a lingering worry about the future, and they constantly seek new ways to stay intellectually engaged.
background:
  cultural: Susan grew up in a middle‑class, Protestant family in the Lehigh Valley, an area shaped by its German‑Swiss Moravian heritage and the legacy of Bethlehem Steel. Her family's cultural traditions
    blend typical American celebrations—Thanksgiving, Fourth of July, Christmas—with occasional observances of German customs such as Oktoberfest gatherings and traditional holiday foods passed down through
    generations. The region's strong emphasis on community, hard work, and appreciation for the arts—exemplified by institutions like the Bethlehem SteelStacks and the Moravian Book Shop—has deeply influenced
    Susan's worldview. She values the modesty, self‑reliance, and communal spirit characteristic of her upbringing, while also embracing the broader cultural diversity of the Lehigh Valley.
attributes:
  skills: '[''Strategic IT Planning'', ''Project Management'', ''Team Leadership'', ''Budget Management'', ''Vendor Relations'', ''Systems Integration'', ''Cybersecurity Awareness'', ''Data Analysis'',
