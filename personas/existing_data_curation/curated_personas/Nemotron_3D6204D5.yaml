  hobbies: '[''Visiting art museums and galleries'', ''Community theater attendance'', ''Traveling to cultural festivals'', ''Senior technology mentorship'', ''Digital photography'', ''Painting with watercolors'',
    ''Gardening'', ''Bridge (card game)'', ''Local history research'', ''Volunteering at the Bethlehem Arts Center'', ''Listening to classical music'', ''Exploring VR art experiences'']'
  career_goals: Susan's current career aspirations revolve around giving back and staying intellectually active rather than climbing a corporate ladder. She plans to transition fully into mentorship and
    consultancy, offering pro‑bono guidance to small nonprofits and local arts groups navigating digital transformation. A primary ambition is to spearhead a volunteer‑driven project that digitally preserves
    Bethlehem's historic steel industry archives, combining her IT expertise with her love of history and art. She also hopes to lead a senior‑focused technology workshop series at the local community center,
    helping older adults overcome digital anxiety—a cause close to her heart given her own sensitivity to stress. Additionally, Susan envisions writing a memoir that captures her experiences as a woman
    navigating the tech industry in mid‑century America, hoping to inspire future generations.
