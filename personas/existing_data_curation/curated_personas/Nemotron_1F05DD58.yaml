  hobbies: '[''Salsa and Bachata Dancing'', ''Cooking Colombian Cuisine'', ''Listening to Latin Music'', ''Reading Urban-Fiction'', ''Exploring Newark Street Art'', ''Volunteering at ESL Community Center'']'
  career_goals: Olga aims to build a career in retail management. In the next two years she plans to enroll in a community‑college associate program in Business Administration while continuing to work part‑time,
    so she can qualify for a shift‑lead or assistant manager position at her current store. Her longer‑term ambition is to become a store manager, overseeing a team and shaping the customer experience,
    and eventually to open a boutique that highlights Colombian‑inspired fashion and accessories. She also hopes to use her bilingual skills to mentor other Latino employees and to serve as a cultural liaison
    between the store and the local Colombian community.
