personas:
  professional: Ramiro Perez, a 29-year-old surgeon, merges methodical organization with boundless curiosity, excelling in laparoscopic, robotic, and microsurgical vascular procedures while they lead interdisciplinary
    OR teams, mentor residents, and drive evidence-based research that reflects their compassionate, collaborative ethos.
  sports: Ramiro Perez fuels their competitive spirit on a weekly co-ed recreational soccer league with the Eastside Tigers while they passionately follow Dallas FC in MLS and the Dallas Mavericks during
    the NBA season, regularly hiking the Texas Hill Country to maintain fitness between matches.
  arts: Ramiro Perez strums an acoustic guitar at community gatherings, revels in salsa and bachata nights dancing to the rhythms of Marc Anthony and Celia Cruz, and escapes into science-fiction worlds
    crafted by Isaac Asimov and N.K. Jemisin, with they channeling that energy into every chord they play.
  travel: Ramiro Perez balances meticulous itinerary planning with spontaneous detours, having trekked the ruins of Machu Picchu, sampled street food in Oaxaca, and hiked the Texas Hill Country on weekends,
    while they dream of exploring Patagonia's glaciers on a future long-haul adventure.
  culinary: Ramiro Perez crafts homemade tacos al pastor, hand-made tamales, and rich mole poblano using dried ancho chilies, epazote, and fresh masa, their cooking skill hovering between enthusiastic home-chef
    and budding culinary artist, and they delight in sourcing ingredients from local farmer's markets and Saturday night potlucks with friends.
  core: Ramiro Perez, 29, blends surgical precision with salsa flair, turning their organized curiosity and sociable compassion into a life of operating rooms, guitar strings, and community kitchens where
    they never miss a chance to mentor, dance, or solve a crossword.
background:
  cultural: Ramiro was raised in a Mexican‑American household in the Dallas‑Fort Worth metroplex. His parents emigrated from northern Mexico and emphasized education, hard work, and strong family ties.
    Bilingual from childhood, he speaks Spanish fluently and celebrates cultural traditions such as Día de los Muertos, Cinco de Mayo, and local fiestas, often cooking family recipes and gathering for soccer
    matches. His community involvement reflects a collectivist Latino ethos—valuing cooperation, respect for elders, and service to the neighborhood. This bicultural upbringing has shaped his compassionate
    bedside manner and motivates his commitment to improving health outcomes for the Hispanic community while navigating the pragmatic, individualistic aspects of American professional life.
