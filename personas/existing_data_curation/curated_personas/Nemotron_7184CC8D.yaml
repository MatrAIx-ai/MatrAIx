  career_goals: Ramiro aims to complete a fellowship in minimally invasive surgery within the next two years, after which he plans to secure an attending position at a major academic hospital in the Dallas‑Fort
    Worth area. He aspires to become chief of surgery, where he can shape departmental culture toward collaborative, patient‑centered care. A core ambition is to develop a community‑outreach program that
    provides free surgical screenings and health education to underserved Hispanic neighborhoods, reducing disparities in cancer detection and postoperative outcomes. He also seeks to lead research on health
    inequities affecting Latinx patients and to mentor underrepresented medical students, ultimately earning a faculty appointment as a professor of surgery and authoring a textbook that integrates cultural
    competency into surgical education.
