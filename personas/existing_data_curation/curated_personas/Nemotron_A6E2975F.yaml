  career_goals: Kyle dreams of a career that combines his love of community service, teamwork, and practical hands‑on work. He aspires to become a firefighter in Racine, attracted by the job’s tangible
    impact and reliable, structured nature. Alongside that, he hopes to stay involved in sports by coaching youth soccer, allowing him to use his leadership and communication strengths to mentor younger
    players. To ensure a solid practical foundation, he also plans to learn trade skills such as basic automotive repair or mechanical work, reflecting his preference for practical, routine‑based occupations.
