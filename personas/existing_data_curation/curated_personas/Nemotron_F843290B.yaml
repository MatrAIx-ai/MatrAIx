personas:
  professional: Joan Capehart, a diligent retail cashier with a business degree, leverages their meticulous record‑keeping, calm conflict‑resolution style, and strong Excel skills to keep store operations
    humming and to position themselves for a shift‑supervisor role.
  sports: Joan Capehart stays fit by joining the Wilson Hiking Club for weekend treks, cheering on the Milwaukee Brewers in summer and the Green Bay Packers in fall, and occasionally playing casual softball
    with the county fair’s volunteer crew, all while favoring low‑impact cardio over high‑intensity gym sessions.
  arts: Joan Capehart immerses themselves in the arts by painting Wisconsin lake vistas in watercolor after channeling the subtle tones of Winslow Homer, attending pottery workshops that echo the earthy
    textures of Georgia O'Keeffe, and curating local craft exhibitions while humming along to folk legends like Bob Dylan and Gillian Welch.
  travel: Joan Capehart prefers meticulously planned road trips that blend gentle adventure with quiet reflection, having recently explored the art‑laden streets of Door County and the culinary scene of
    Asheville, NC, while dreaming of a summer pilgrimage to the Lake District in England where they can sketch serene lakes and sample local cheese.
  culinary: Joan Capehart, a confident home cook, transforms herbs from their garden into fragrant dishes such as rosemary‑roasted chicken, wild rice and chanterelle soup, and a vibrant beet salad with
    balsamic vinaigrette, while occasionally over‑salting the broth in their enthusiasm for bold flavors.
  core: Joan Capehart blends methodical business acumen with a quiet artistic soul, juggling spreadsheets and watercolor palettes while habitually checking their garden for new growth before the day's first
    coffee.
background:
  cultural: Joan grew up in a modest, farming‑oriented family in rural Dunn County, Wisconsin. Her ancestry is primarily German and Scandinavian, common to the region, and she was raised in a Lutheran community
    that values hard work, humility, and neighborly support. The Midwestern cultural emphasis on politeness, community involvement, and a connection to the land shaped her outlook. Local traditions—such
    as the county cheese festival, church potlucks, and the annual fair—have fostered a deep appreciation for regional crafts, agricultural heritage, and collective harmony. These cultural roots influence
    both her personal interests in folk art and her professional dedication to reliable, people‑focused service.
attributes:
  skills: '["Customer Service","Cash Handling","Point‑of‑Sale System Operation","Inventory Management","Basic Bookkeeping","Excel and Data Entry","Scheduling and Time Management","Conflict Resolution","Organizational
    Planning","Community Event Coordination","Small‑scale Budget Management"]'
  hobbies: '["Watercolor Painting","Pottery Workshops","Herb and Flower Gardening","Knitting","Birdwatching","Hiking","Mystery Novel Reading","Volunteering at Public Library","Organizing County Fair Arts
    & Crafts Exhibit","Listening to Folk and Americana Music"]'
  career_goals: Joan aims to leverage her reliability and business knowledge to advance to a shift‑supervisor position and eventually become an assistant manager at the retail store where she works. She
    also dreams of launching a part‑time boutique that showcases local artisans' crafts and her own watercolor paintings, using her business degree to handle marketing, inventory, and finances. To support
    this ambition, she plans to complete a short certification in small‑business accounting and to develop a modest online presence for her boutique. Ultimately, she hopes to combine her love of art, community
    service, and business acumen to create a sustainable side venture that enriches the cultural life of Wilson, WI.
