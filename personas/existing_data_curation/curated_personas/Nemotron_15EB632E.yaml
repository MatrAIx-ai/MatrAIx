  career_goals: Olga’s primary goal is to earn her GED, providing a foundation for future personal development. She aspires to launch a home‑based catering or meal‑prep business that showcases traditional
    Hispanic cuisine, blending her culinary curiosity with practical entrepreneurship. Additionally, she aims to take on a leadership role within a local community organization, where she can apply her
    organizational talents to benefit small groups and support neighborhood initiatives.
