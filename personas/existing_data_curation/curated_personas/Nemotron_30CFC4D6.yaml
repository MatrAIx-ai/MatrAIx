personas:
  professional: Robert Martinez, a ten‑year‑old aspiring coder and LEGO architect, blends curiosity with practicality by turning Scratch projects into tiny programmable robots, while their organized yet
    flexible nature helps them juggle school assignments, soccer practice, and elaborate LEGO builds.
  sports: Robert Martinez runs midfield for the Cedar Creek Youth Soccer Club, spends weekends hiking the Appalachian trails, practices dribbling drills after school, and loyally follows the Chicago Cubs
    and the New England Patriots while they maintain a balanced fitness routine alongside schoolwork.
  arts: Robert Martinez delights in drawing cartoon characters like SpongeBob and creating comic strips, while their playlist swings between Taylor Swift’s pop hits and Shania Twain’s country classics,
    and they eagerly binge‑watch animated series such as "Adventure Time" for inspiration.
  travel: Robert Martinez loves spontaneous weekend camping trips to the Great Smoky Mountains, dreams of visiting the Grand Canyon and the ancient ruins of Machu Picchu, and they prefer family‑planned
    itineraries that mix adventure hiking with relaxed days at amusement parks.
  culinary: Robert Martinez, a budding kitchen assistant, chops cilantro and onions for the family’s beloved tacos and guacamole, enjoys sprinkling fresh lime juice over the salsa, can bake a simple chocolate‑chip
    cookie, yet often over‑seasones the guacamole in their enthusiasm.
  core: Robert Martinez fuses boundless curiosity with a practical streak, building LEGO fortresses while sometimes forgetting to finish homework until the last minute, and never misses a chance to chase
    a soccer ball or tinker with a new Scratch script.
background:
  cultural: Robert is raised in a bicultural household where Mexican traditions blend with the Appalachian community of eastern Kentucky. At home, Spanish is spoken regularly, and his family celebrates
    holidays such as Día de los Muertos and Cinco de Mayo with food, music, and storytelling. The neighborhood’s local customs, like community fairs, bluegrass music, and a love for outdoor activities,
    also shape his daily life. This mix gives him a strong sense of pride in his heritage while fostering an appreciation for the values of hard work and community that characterize both cultures.
