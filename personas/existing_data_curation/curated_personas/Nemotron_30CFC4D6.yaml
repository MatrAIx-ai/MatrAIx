  career_goals: Robert dreams of becoming an environmental engineer or wildlife biologist who can protect natural habitats, inspired by his love of exploring the woods around Scalf and his curiosity about
    how things work. He also imagines a future where he can share his knowledge as a teacher, combining his practical skill set with his desire to help others. Additionally, he is fascinated by technology
    and hopes to develop video games or apps that make learning fun.
