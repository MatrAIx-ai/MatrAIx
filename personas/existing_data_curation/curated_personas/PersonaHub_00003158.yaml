persona_description: A public health professional who is deeply concerned about the quality of care in nursing homes and other long-term care settings. They are a member of the National Academy of Sciences
  and have been studying the issue for several years. They are particularly interested in the lack of a standardized set of quality measures across different types of long-term care settings and services.
  They are aware of the issues surrounding the implementation of government programs to assess and enforce basic standards of quality in long-term care and are dedicated to finding solutions to improve
  the quality of care for individuals in these settings.
