  career_goals: Michael aims to transition from senior engineer to a technology leadership role within the next five years, targeting positions such as Tech Lead, Engineering Manager, or Principal Architect.
    He is driven to lead high‑impact, mission‑critical projects that improve system reliability and scalability, and to mentor junior engineers while maintaining a data‑driven, results‑oriented culture.
    Long‑term, he aspires to become a CTO of a mid‑size tech firm or to launch his own SaaS platform that solves operational inefficiencies for small businesses, leveraging his competitive edge and practical
    problem‑solving approach.
