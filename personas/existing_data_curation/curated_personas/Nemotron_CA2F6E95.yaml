  career_goals: John aims to deepen his expertise by earning a nationally recognized CNC certification within the next year and to move into a supervisory role as a lead machinist or shift foreman within
    three to five years. He plans to introduce standardized work‑order procedures at his current plant to reduce downtime and improve predictability, aligning with his preference for routine. Long‑term,
    he hopes to open a small, family‑run machining shop in Worth County that can service local agricultural equipment and provide stable jobs for his community. Financial stability, early home ownership,
    and the ability to plan a secure retirement are also central to his ambitions.
