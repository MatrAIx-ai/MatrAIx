    "Adaptable time management (ad‑hoc)"]'
  hobbies: '["Fixie bike riding", "Urban photography", "Arduino/Raspberry Pi tinkering", "Strategy video gaming", "Acoustic guitar playing", "Hiking in Wissahickon Valley Park", "Experimental cooking",
    "Indie music concerts", "Science‑fiction reading"]'
  career_goals: Daniel’s career vision is anchored in both his curiosity for technology and his desire for a flexible, practical livelihood. In the next year, he plans to enroll in a certified electrician
    program at the Community College of Philadelphia to gain formal credentials in electrical systems and safety. Concurrently, he aims to expand his digital media portfolio by producing a series of DIY
    repair tutorials and short documentaries on local culture, leveraging his video editing and photography expertise. His medium‑term goal is to launch a small, mobile service offering on‑site electronic
    repairs and minor home‑maintenance jobs, supported by an online presence that monetizes his instructional content. Ultimately, Daniel aspires to transition into freelance digital media production for
    indie game developers and tech startups, allowing him to blend technical problem‑solving with creative storytelling while preserving a schedule that accommodates his need for occasional solitary work
    and spontaneous exploration.
