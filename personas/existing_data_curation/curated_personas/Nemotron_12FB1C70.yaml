personas:
  professional: Daniel Prosser is a 25‑year‑old aspiring mobile electrician‑technician who blends hands‑on repair work with digital storytelling, using his self‑taught video editing and street photography
    skills to produce DIY tutorial series while completing a certified electrician program and laying the groundwork for a freelance media service that caters to indie game developers and tech startups.
  sports: Daniel Prosser fuels his active lifestyle by navigating Philadelphia’s streets on a fixie bike, hiking the Wissahickon Valley trails on weekends, cheering for the Eagles and the 76ers at local
    sports bars, and joining informal pick‑up basketball games at the community center, though they prefer spontaneous rides and hikes over regimented gym workouts.
  arts: Daniel Prosser channels his creative side through street photography that captures murals by local artists like Shepard Fairey, acoustic guitar sessions where they riff on folk and blues tunes inspired
    by Mississippi John Hurt and modern indie acts such as Phoebe Bridgers, and nightly sci‑fi reading marathons featuring Neal Stephenson and Liu Cixin, while curating playlists that blend the soundtracks
    of Blade Runner with indie rock.
  travel: Daniel Prosser enjoys weekend escapades that blend urban exploration and nature, taking the train to New York City for indie concerts, driving to the Amish Country for farm‑to‑table meals, and
    planning a future trek through the Rocky Mountains, all while budgeting trips with a mix of spontaneous fixes and a modest travel fund.
  culinary: Daniel Prosser experiments in the kitchen with dishes like cheesesteak ramen, kimchi‑infused soft pretzels, and pickled radish slaw, they blend Philly market finds—such as local peppers and
    artisanal cheese—with intermediate cooking techniques, and frequently document the process in short video tutorials for their growing online audience.
  core: Daniel Prosser is a curious yet practical 25‑year‑old who balances self‑directed tech tinkering, spontaneous urban adventures, and relaxed financial habits with an undercurrent of calm resilience
    and occasional disorganization.
background:
  cultural: Daniel grew up in a working‑class neighborhood in North Philadelphia, where the city’s layered history and cultural diversity left a lasting imprint. His family’s Anglo‑American roots are reflected
    in traditional celebrations of holidays like Thanksgiving, the Fourth of July, and local events such as the annual Mummers Parade. He frequented community centers and public libraries, which exposed
    him to the city’s rich tapestry of African‑American, Irish, Italian, and other immigrant cultures. This environment fostered a strong sense of local pride, with regular visits to historic sites like
    Independence Hall and casual gatherings at neighborhood cheesesteak shops. While identifying as white American, Daniel values Philadelphia’s multicultural ethos and incorporates elements of the city’s
    artistic, culinary, and sporting traditions into his daily life.
attributes:
  skills: '["Video editing (Adobe Premiere, DaVinci Resolve)", "Basic web development (HTML/CSS)", "Photography and Lightroom post‑processing", "DIY home repair (carpentry, basic electrical, plumbing)",
