personas:
  professional: Jacqueline Wong is a diligent business administration major whose fluency in Excel, Notion, and Google Workspace allows them to design precise financial models and impress senior analysts
    with spreadsheets that break massive budgets down into actionable weekly tasks.
  sports: Jacqueline Wong jogs with the Shenandoah Trail Runners club on Saturday mornings, follows the Washington Capitals and the Washington Nationals with a data‑driven enthusiasm, and supplements the
    impact of trail runs with bi‑weekly Vinyasa yoga sessions at a quiet local studio to preserve balance and prevent injury.
  arts: Jacqueline Wong captures the solemn lines of historic courthouses in grayscale photography inspired by Ansel Adams, enjoys the narrative depth of Malcolm Gladwell’s podcasts, and attends the Virginia
    Symphony Orchestra’s performances of Beethoven’s Fifth to unwind after a day of spreadsheet analysis.
  travel: Jacqueline Wong meticulously plans weekend escapes using a shared travel spreadsheet, has trekked the Shenandoah National Park and explored the colonial streets of Williamsburg, and dreams of
    an organized solo itinerary to the fjords of Norway and the cherry blossoms of Kyoto, though a modest student budget keeps them focused on nearby state parks for now.
  culinary: Jacqueline Wong prefers a Sunday meal‑prep ritual that assembles balanced quinoa‑kale bowls with roasted chickpeas, lemon‑tahini dressing, and seasonal heirloom tomatoes, loves the aromatic
    snap of fresh basil, yet frequently skips their own breakfast while re‑checking a budgeting report before heading to class.
  core: Jacqueline Wong lives by a rigorously scheduled routine, obsessively tracks every minute in a digital planner, and secretly battles a compulsive habit of double‑checking emails until midnight, even
    on weekends.
background:
  cultural: Jacqueline grew up in a middle‑class, suburban White family in the Fredericksburg‑Spotsylvania area of Virginia. Her upbringing blended a modest Southern sensibility with exposure to the region’s
    rich Civil‑War heritage and a supportive church community. Family traditions emphasize education, self‑discipline, and community service, shaping her practical outlook and organizational mindset. Local
    festivals, volunteer opportunities at the county library, and weekend trips to historic sites have reinforced a strong sense of place and civic responsibility.
