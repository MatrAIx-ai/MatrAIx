  career_goals: Jacqueline aims to complete a bachelor's degree in Business Administration with a focus on finance, graduate with honors, and obtain a CPA certification. She envisions starting her career
    as a financial analyst at a reputable firm or a government agency in Virginia, where she can apply her disciplined approach to budgeting and data‑driven decision‑making. Over the next decade, she aspires
    to advance to senior analyst and eventually finance manager, overseeing strategic financial planning while maintaining high standards of accuracy and accountability.
