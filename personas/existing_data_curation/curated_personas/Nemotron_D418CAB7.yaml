personas:
  professional: An aspiring young game developer, Dana Hardin, they channel their love for fantasy landscapes, LEGO engineering, and Scratch programming into creating interactive stories that blend the
    mythic tales told at local community gatherings with the futuristic worlds of their sci‑fi novels.
  sports: A spirited youth athlete, Dana Hardin, they play forward for the Russell Springs Little League baseball team, cheer for the Kentucky Wildcats during basketball season, spend weekend hikes along
    the Green River with friends, and secretly train footwork by mimicking moves from the Cincinnati Bengals practice videos.
  arts: A creative explorer, Dana Hardin, they spend afternoons sketching dragons inspired by fiddle tunes heard at county fairs, practice piano pieces by Ludovico Einaudi, follow the animation work of
    Hayao Miyazaki and the fantasy art of John Howe on virtual forums, and often mix bluegrass rhythms into their digital storyboards.
  travel: A curious family traveler, Dana Hardin, they have camped under the stars at Mammoth Cave, taken a weekend road‑trip to Nashville to visit a country‑music museum, dream of exploring Disney World
    and European castles, and plan itineraries using a blend of their grandfather’s compass lessons and online video guides.
  culinary: A budding home chef, Dana Hardin, they love whipping up fluffy biscuit‑sandwiches with honey‑glazed ham, experimenting with blueberry pancakes topped with garden strawberries, crafting s’mores
    over a backyard fire pit while listening to bluegrass jam sessions, yet often forget to clean the kitchen after enthusiastic cooking marathons.
  core: Dana Hardin, an 11‑year‑old imagination powerhouse, they blend community storytelling, competitive LEGO building, and digital creativity into a uniquely curious, slightly skeptical, and delightfully
    organized worldview.
background:
  cultural: Dana is raised in a white, middle‑class family in Russell Springs, Adair County, Kentucky. Her upbringing reflects Appalachian cultural influences such as community church events, county fairs,
    bluegrass music, and a deep appreciation for the outdoors. While she cherishes local traditions like storytelling and seasonal celebrations, she also embraces digital culture through online tutorials,
    global media, and virtual art communities, blending her rural roots with a curiosity for broader artistic and technological trends.
attributes:
  skills: '[''creative writing'', ''digital illustration'', ''basic programming (Scratch)'', ''critical thinking'', ''problem solving'', ''project organization'', ''storyboarding'']'
  hobbies: '[''sketching'', ''reading sci‑fi/fantasy'', ''LEGO building'', ''chemistry experiments'', ''piano playing'', ''digital animation'', ''game design (Scratch)'']'
  career_goals: She dreams of becoming a multimedia artist or video game designer who can blend storytelling, visual art, and interactive technology into immersive experiences. In the longer term, Dana
    hopes to create educational games or animated series that spark curiosity and encourage other children to explore art and science.
