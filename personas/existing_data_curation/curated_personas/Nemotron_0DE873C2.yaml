personas:
  professional: James Jarboe, a 66‑year‑old veteran Pacific Northwest tour guide with four decades of experience, blends meticulous itinerary planning, expert storytelling on regional history and ecology,
    and a knack for inclusive group logistics to create immersive, culturally respectful tours.
  sports: James Jarboe enjoys seasonal hiking in the Cascades with The Mountaineers club, follows the Seattle Seahawks and Seattle Kraken, participates in weekly birdwatching walks, and maintains fitness
    through low‑impact trail treks and a monthly senior‑friendly yoga class at the community center.
  arts: James Jarboe delights in photographing Pacific Northwest landscapes, frequents live music nights at The Crocodile featuring folk‑rock acts like Fleet Foxes and Joni Mitchell covers, and engages
    in the local historical society’s lecture series, while also reading travel memoirs by Bruce Chatwin and regional histories.
  travel: James Jarboe prefers meticulously planned trips that balance adventure and comfort, has explored coastal British Columbia, the Alpine Lakes Wilderness, and an Alaskan cruise, and dreams of revisiting
    the historic port town of Skagway, always using a combination of printed maps and digital itineraries to stay organized.
  culinary: James Jarboe loves cooking coastal seafood, often preparing cedar‑plank salmon with dill, lemon, and crushed mustard seeds, simmering Dungeness crab chowder with cream and fennel, and occasionally
    over‑salsas his fish tacos, while sourcing fresh oysters from the local farmers' market.
  core: James Jarboe is a methodical, sociable 66‑year‑old guide who merges curiosity with practicality, leading inclusive tours while juggling a disciplined budget, health routines, and a love for hiking,
    photography, and seafood cuisine.
background:
  cultural: James grew up in a suburban community of the Pacific Northwest, descended from families that settled in the American Midwest before moving west in the mid‑20th century. His upbringing blended
    the practical work ethic of his Midwestern roots with the progressive, environmentally conscious culture of Seattle. He respects the region’s Indigenous heritage, having spent years learning about Lushootseed
    language and local tribal histories, which he weaves into his tours. As a married man with adult children, he values family traditions, community involvement, and the inclusive, collaborative spirit
    that characterizes Seattle’s multicultural landscape.
attributes:
  skills: '["Pacific Northwest geography and ecology", "Seattle and regional history", "Storytelling and public speaking", "Multilingual communication (Spanish, basic Lushootseed)", "Itinerary planning
    and logistics", "First aid/CPR certification", "Group management and conflict resolution", "Sustainable tourism practices", "Digital tour tools (GPS, scheduling software)", "Customer service and hospitality"]'
  hobbies: '["Hiking and birdwatching", "Photography", "Historical society volunteering", "Cooking seafood", "Live music appreciation", "Book club participation", "Learning basic Lushootseed", "Gardening
    (native plants)", "Kayaking on Lake Union", "Crafting wooden walking sticks"]'
  career_goals: James aims to transition from daily guiding to mentorship and program development, training the next generation of guides on sustainable and culturally respectful tourism. He plans to earn
    an advanced certification in heritage interpretation and launch a niche series of senior‑friendly eco‑tours that highlight Indigenous narratives and low‑impact hiking routes. In the longer term, he
    hopes to author a guidebook on the hidden histories of Seattle’s neighborhoods and collaborate with local museums on curated walking exhibitions.
