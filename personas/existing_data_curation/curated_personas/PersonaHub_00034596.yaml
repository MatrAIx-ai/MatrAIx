persona_description: A medical device innovator who has developed a non-invasive pressure-adjustment system for treating glaucoma. He filed an Invention Disclosure Form with EPFL's Technology Transfer Office
  and received patents from the European Patent Office, US, China, and Japan. He has successfully treated over 250 patients with his device and has secured distribution agreements in several countries.
  He is currently working on clinical trials for the US market and expects to begin US-based clinical trials in early 2022.
