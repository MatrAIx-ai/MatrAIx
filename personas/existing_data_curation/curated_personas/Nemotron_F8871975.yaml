personas:
  professional: Jenny Carrillo, a seasoned nursing assistant with 15 years of acute‑care and long‑term‑care experience, applies precise vital‑sign monitoring, diligent infection‑control, and bilingual patient
    education while quietly pursuing an ADN to shift into geriatric and palliative nursing, balancing curiosity for new practices with a pragmatic, organized work style.
  sports: Jenny Carrillo enjoys low‑impact fitness, attending a weekly senior‑friendly yoga class at the community center and taking brisk walks with their grandchildren, while they follow the Houston Astros
    for baseball and the Houston Dynamo for soccer on TV, preferring solitary viewing over crowded stadiums.
  arts: Jenny Carrillo weaves crocheted blankets for their grandchildren while listening to folk legends like Joan Baez and bolero crooners such as Luis Miguel, and they unwind with historical fiction novels
    like Kristin Hannah’s The Nightingale and Anthony Doerr’s All the Light We Cannot See, finding these artistic threads essential to their quiet, reflective lifestyle.
  travel: Jenny Carrillo favors low‑key travel, having explored Oaxaca’s historic markets and the desert succulents of Tucson, while dreaming of a quiet retreat to the lavender fields of Provence, always
    planning trips months ahead to accommodate family responsibilities and a modest travel budget.
  culinary: Jenny Carrillo cooks traditional Mexican dishes like chicken mole with ancho chilies, pork pozole with hominy, and hand‑rolled tamales filled with pork and salsa verde, using fresh cilantro,
    lime, and corn masa, balancing moderate culinary skill with a heartfelt devotion to preserving family recipes.
  core: Jenny Carrillo is a diligent, solitary caregiver who finds solace in herbs, crocheting, and quiet reading, yet wrestles with persistent worries and a tendency to over‑plan even as they cherish small
    comforts and cultural roots.
background:
  cultural: Jenny was raised in a Mexican‑American household in Chicago’s Little Village neighbourhood, where Spanish was spoken at home and English at school. Her family maintains strong ties to Mexican
    traditions, celebrating Día de los Muertos, quinceañeras, and weekly family meals that feature dishes like pozole and tamales. This bicultural upbringing imbues her with a deep respect for family solidarity,
    communal support, and the value of hard work. As a nursing assistant, she draws on her cultural empathy to connect with older Mexican patients, often incorporating familiar phrases or customs to ease
    their hospital experience. Her heritage also influences her culinary hobbies and her commitment to serving the local Latino community through volunteer health initiatives.
attributes:
  skills: '[''Vital sign monitoring'', ''Basic wound dressing'', ''Infection control adherence'', ''Electronic health record documentation'', ''Bilingual Spanish–English communication'', ''Patient education
    on medication and self‑care'', ''Assistance with phlebotomy and specimen collection'', ''Emergency response support'', ''Team collaboration and shift handoff coordination'']'
  hobbies: '[''Herb and succulent gardening'', ''Cooking traditional Mexican cuisine'', ''Reading historical fiction and mysteries'', ''Small‑group book club participation'', ''Volunteering as a health‑literacy
    translator'', ''Listening to folk and bolero music'', ''Crocheting blankets and scarves'']'
  career_goals: Jenny aims to advance her clinical credentials by enrolling in an Associate Degree in Nursing (ADN) program within the next two years, with the long‑term goal of becoming a registered nurse
    specializing in geriatric and palliative care. She also plans to obtain certification as a Certified Nursing Assistant (CNA) instructor so she can mentor new aides. Balancing her family responsibilities,
    she seeks flexible study options and hopes to eventually take on a supervisory role on her unit, where she can influence patient‑centered policies and improve the work environment for her colleagues.
