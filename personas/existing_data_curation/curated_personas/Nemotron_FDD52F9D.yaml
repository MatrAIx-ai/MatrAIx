  career_goals: Michelle aims to advance to a senior design leadership role where she can shape the visual strategy of an organization that prioritizes community impact and sustainability. She envisions
    guiding a multidisciplinary design team, establishing cohesive brand frameworks, and mentoring junior designers to cultivate a collaborative and harmonious workplace. Over the next five years, she plans
    to spearhead design initiatives for local non‑profits and socially responsible businesses, integrating her practical design sensibility with her deep commitment to helping others and fostering inclusive
    experiences.
