personas:
  professional: Michelle Nazworth, a versatile visual and UX designer, leverages her mastery of Adobe Creative Suite, Figma, and design systems to craft accessible, community‑focused brand experiences,
    channeling her methodical planning and deep compassion into collaborative, mission‑driven projects.
  sports: Michelle Nazworth enjoys gentle weekend hikes along the Sherwood trail network, participates in the Portland Trail Blazers fan club for occasional game viewings, plays casual softball with the
    local community recreational league, and attends yoga classes at a nearby studio to maintain flexibility and stress balance.
  arts: Michelle Nazworth volunteers at the neighborhood arts center, leads a quilting circle that draws inspiration from American folk patterns, captures nature shots in the style of Ansel Adams, reads
    historical fiction by Hilary Mantel and classic works by Jane Austen, and frequently listens to Brandi Carlile and folk‑rock playlists while designing.
  travel: Michelle Nazworth prefers carefully planned short escapes that blend relaxation with local culture, such as a weekend tour of the Columbia River Gorge, a coastal road trip to Cannon Beach to sample
    fresh seafood, and a summer pilgrimage to the historic castles of England, always budgeting for modest lodging and using public transport where possible.
  culinary: Michelle Nazworth is an avid home baker who perfects sourdough starter, crafts rosemary focaccia, and whips up apple crumble using organic orchard apples, delights in seasonal farm‑to‑table
    dishes like roasted beet salad with goat cheese, and regularly experiments with heirloom tomatoes, kale, and local honey in their kitchen.
  core: Michelle Nazworth blends methodical design expertise with a love for garden‑fresh baking, steady budgeting, and community‑centric hobbies, while quietly wrestling with occasional allergy flare‑ups
    and a perfectionist streak that makes them double‑check every pixel.
background:
  cultural: Michelle comes from a White American background with family roots in the Pacific Northwest. Raised in Oregon, she has been shaped by the region’s emphasis on environmental stewardship, outdoor
    recreation, and community involvement. Her upbringing blends a mid‑western work ethic with a love for local traditions such as seasonal celebrations, farmer’s markets, and volunteer service, reflecting
    a practical yet compassionate cultural outlook.
