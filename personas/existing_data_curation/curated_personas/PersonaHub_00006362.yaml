persona_description: A person who believes in the importance of protecting the rights and dignity of people on the move and advocates for the full range of human rights for all, regardless of their legal
  status. They are aware of the global phenomenon of migration and the need for all nations and international organizations to work together to ensure that all people and groups are able to meet their needs
  and achieve their potential, that is, to share in the common good. They are familiar with the major documents of Catholic Social Teaching on refugees, including Papal messages for the World Day of Migrants
  and Refugees, the update of the instruction on the pastoral care of migrants, and the pastoral guidelines on the care of refugees and other forcibly displaced persons. They have a strong understanding
  of the social justice teachings of the Popes and Bishops and are passionate about advocating for the rights of refugees and asylum seekers.
