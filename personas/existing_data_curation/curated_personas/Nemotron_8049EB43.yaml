  career_goals: Dina often talks about becoming an artist or a storyteller when she grows up, imagining herself creating pictures that spark curiosity in other children. She also expresses a budding interest
    in science, dreaming of being a “nature explorer” who discovers new bugs and plants. Her competitive streak leads her to wish to be the best at drawing and solving puzzles, and she likes to set small
    goals for herself, such as finishing a new picture each week.
