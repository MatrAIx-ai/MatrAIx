personas:
  professional: A budding five‑year‑old scientist‑in‑training, Dina Mitchell loves exploring how things work, frequently building simple experiments with building blocks and magnifying glasses, and they
    channel their methodical planning and skeptical curiosity into meticulously documenting each result in a colorful notebook.
  sports: A competitive mini‑athlete, Dina Mitchell participates in the neighborhood T‑Ball league that dons the iconic red and blue Chicago Cubs uniform, eagerly watches Cubs games on television, and prefers
    practicing batting drills alone over group scrimmages, reflecting their competitive edge and organized mindset.
  arts: A curious young art enthusiast, Dina Mitchell spends afternoons drawing whimsical characters inspired by Dr. Seuss and watching the vibrant animation of Disney’s Frozen, singing along to Idina Menzel’s
    'Let It Go', and they often arrange their crayons by color before creating new masterpieces.
  travel: An imaginative little explorer, Dina Mitchell has visited Disneyland in California and the beach in Florida with family, dreams of seeing the Eiffel Tower in Paris, and prefers trips that include
    structured itineraries with designated “art discovery” stops, while they sometimes get restless on long car rides.
  culinary: A budding kitchen helper, Dina Mitchell enjoys mixing orange‑scented carrots into homemade mac and cheese, loves peeling bananas for a strawberry‑banana smoothie with a splash of almond milk,
    and they proudly assist in stirring pancake batter, though they occasionally over‑season their scrambled eggs with too much salt.
  core: Dina Mitchell is a curious, methodical five‑year‑old who loves art, competes quietly in games, meticulously saves allowance, and balances a blend of independence and skepticism in daily life.
background:
  cultural: Dina lives in the rural community of Kosciusko, Mississippi, where Southern hospitality, church life, and family gatherings shape daily routines. She attends a local Baptist church with her
    family, participating in Sunday school and seasonal celebrations such as Christmas pageants and community picnics. Local traditions like attending the Attala County fair, enjoying Southern comfort food,
    and observing holidays like Thanksgiving and Independence Day contribute to her cultural experience. While her household reflects a middle‑class white Southern upbringing, her parents encourage curiosity
    and exposure to the arts, often taking her to the nearby regional art museum and library programs. These influences blend traditional Southern values with a growing appreciation for creative expression
    and new ideas.
