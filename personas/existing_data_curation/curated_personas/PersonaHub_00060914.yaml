persona_description: A historian who is interested in the social and legal aspects of the Great War, particularly the role of the magistracy in dealing with the new burdens resulting from the need for greater
  government control over its citizens in time of war. The author's wealth of legal and statistical detail is balanced by individual case histories which throw a fascinating, sympathetic light on the social
  history of the times. The book covers a whole new aspect of the war and as such makes for highly recommended reading.
