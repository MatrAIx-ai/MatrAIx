personas:
  professional: Stedman Mckenzie, a two-year-old who spends hours arranging building-block towers with meticulous order, already shows the spatial reasoning and structured mindset that will one day define
    a career as a civil architect, while their cooperative yet assertive play style hints at natural project-leadership abilities.
  sports: Stedman Mckenzie, a lively toddler who gleefully kicks a soft soccer ball at BrightKids Play Club and claps excitedly while watching the New York Yankees on family TV, balances structured practise
    sessions with spontaneous backyard races.
  arts: Stedman Mckenzie, a curious two-year-old who sings along to The Wiggles' 'Fruit Salad' and hums the 'Let It Go' melody by Idina Menzel, finds joy in vibrant picture books and the bright colours
    of local children's theatre performances.
  travel: Stedman Mckenzie, a wandering-spirit toddler who delights in family trips to the San Diego Zoo and the sensory wonder of Disneyland, now dreams of feeling the sand between his toes on a future
    getaway to Maui's Ka'anapali Beach.
  culinary: Stedman Mckenzie, a budding foodie who prefers the comforting melt of cheddar mac-and-cheese, the sweet bite of banana slices, and the gentle crunch of steamed carrot sticks, can confidently
    mash peas with a tiny fork but still relies on parents for most meal preparation.
  core: Stedman Mckenzie, a two-year-old with an uncanny love for orderly block towers, a disciplined piggy-bank habit, and a habit of humming The Wiggles long after bedtime, balances toddler curiosity
    with surprising steadiness.
background:
  cultural: Stedman is part of an African‑American family rooted in the Southern traditions of Arkansas. His family regularly attends a local Black Baptist church where gospel music, communal worship, and
    neighborhood gatherings are central to life. He experiences Southern cuisine at family meals—fried catfish, collard greens, and sweet potato pie—and participates in cultural celebrations such as Juneteenth
    and community festivals. The close‑knit extended family and church community provide a supportive environment that reinforces values of cooperation, respect for routine, and emotional resilience.
