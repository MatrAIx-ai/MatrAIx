persona_description: A biologist who specializes in the recovery and conservation of endangered species, particularly the Southern Resident killer whales. They have extensive knowledge and experience in
  marine biology, ecology, and conservation biology. They are committed to the recovery and protection of these whales and have developed a special Action Plan to address the threats they face. They are
  also knowledgeable about the importance of habitat restoration and the use of fish hatcheries to boost the supply of prey for the whales. They have a deep understanding of the latest research and data
  on the diet and behavior of the Southern Residents, which they use to inform recovery efforts and prioritize salmon stocks for the whales. They have collaborated with other partners, including the National
  Fish and Wildlife Foundation and the Washington Department of Fish and Wildlife, to develop and implement recovery strategies.
