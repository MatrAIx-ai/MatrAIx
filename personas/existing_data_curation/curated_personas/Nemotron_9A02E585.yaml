  career_goals: Lilian dreams of becoming an artist who creates colorful murals that tell stories, inspired by museum visits and her love of drawing. She also imagines exploring space as an astronaut, fascinated
    by the idea of discovering new worlds. Occasionally, she envisions herself as a teacher who shares books and art projects with other children, combining her sociable nature with her passion for creativity.
