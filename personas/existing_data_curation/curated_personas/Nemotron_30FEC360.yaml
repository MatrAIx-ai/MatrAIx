  career_goals: Kristine aims to transition from a senior systems analyst role into a solutions architect position within the next three years, where she can design end‑to‑end technology ecosystems that
    bridge business needs with innovative user experiences. She intends to deepen her expertise in cloud architecture (pursuing AWS Solutions Architect certification) and expand her repertoire in data engineering
    and machine‑learning pipelines. Long‑term, she envisions leading a multidisciplinary technology hub that partners with Nashville’s vibrant arts community to develop immersive digital installations and
    interactive platforms. She also aspires to mentor emerging women technologists, speak at regional tech meet‑ups, and author thought‑leadership pieces on the convergence of technology, creativity, and
    inclusive design.
