  career_goals: Christina aims to advance from a frontline surveillance officer to a senior security manager within the regional casino circuit, eventually overseeing a team of analysts and guaranteeing
    compliance with state gaming laws. She plans to obtain professional certifications in security management, advanced video analytics, and criminal justice, and considers enrolling in a community college
    program to earn an associate degree in occupational safety. Long‑term, she hopes to combine her love for art with her expertise by moving into museum or gallery security leadership, where she can protect
    cultural assets while curating educational outreach programs. Additionally, she aspires to mentor new guards, fostering a supportive work environment that balances high performance with wellbeing.
