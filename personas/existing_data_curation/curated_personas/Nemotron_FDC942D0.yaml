  hobbies: '[''drawing'', ''digital painting'', ''multicultural club activities'', ''soccer'', ''listening to diverse music'', ''cooking Vietnamese dishes'', ''visiting museums'', ''attending art workshops'',
    ''DIY electronics projects'', ''creating short video blogs'']'
  career_goals: Tsui aspires to become a multimedia artist and graphic designer who uses visual media to share stories about his Southeast Asian heritage and the immigrant experience. He hopes to study
    visual arts or digital media at a university, develop a portfolio that blends traditional Vietnamese motifs with contemporary design, and eventually work in animation, game design, or cultural advocacy.
    He also dreams of mentoring younger students in his community, helping them discover creative outlets and navigate bicultural identities.
