  hobbies: '[''Gardening'', ''Knitting/crocheting'', ''Reading mystery novels'', ''Walking on local nature trails'', ''Puzzles (crosswords, sudoku)'', ''Attending small community gatherings'', ''Volunteer
    cleaning at the local church'', ''Cooking simple home‑cooked meals'', ''Listening to classic rock and folk music'']'
  career_goals: Approaching retirement, Mary aims to leverage her extensive experience into a senior supervisory role where she can oversee a small cleaning team and formalize training programs. She plans
    to obtain a Certified Professional Cleaner (CPC) credential to validate her expertise and explore part‑time consulting for local businesses seeking efficient, sustainable cleaning practices. Additionally,
    Mary hopes to secure a stable, benefits‑eligible position that provides financial security for the next few years while allowing her to give back to the community through volunteer cleaning projects
    at the neighborhood church and senior center.
