personas:
  professional: Mary Cook, a seasoned janitorial supervisor with over three decades of hands‑on experience, applies meticulous inventory control, OSHA‑compliant safety practices, and practical troubleshooting
    skills to lead small cleaning teams toward efficient, sustainable operations while embodying the steady, community‑oriented work ethic cultivated in a close‑knit town.
  sports: Mary Cook, a devoted member of the local senior walking club, enjoys low‑impact cardio on the town’s nature trails, follows the Chicago Cubs during baseball season, and occasionally joins community‑center
    bowling leagues, reflecting their preference for predictable, socially modest athletic activities.
  arts: Mary Cook finds creative solace knitting intricate folk‑inspired patterns while listening to classic rock legends like Bob Dylan and The Eagles, and they regularly escape into Agatha Christie mystery
    novels, occasionally attending the small town’s community theater productions of classic American plays.
  travel: Mary Cook favors short, well‑planned road trips to nearby state parks such as Starved Rock and the Shawnee National Forest, delights in weekend visits to family in neighboring towns, and dreams
    of a relaxed Great Lakes cruise, all while balancing a modest travel budget and a desire for restful, predictable itineraries that they carefully map out.
  culinary: Mary Cook cooks simple, hearty meals—like chicken pot pie, garden‑fresh vegetable soup seasoned with basil, and apple crumble made from home‑grown apples—showcasing moderate culinary skill that
    blends comfort food with seasonal produce from their modest vegetable garden.
  core: Mary Cook is a pragmatic, community‑focused janitorial veteran who harmonizes disciplined routines with quiet hobbies, modest financial habits, and a gentle, structured approach to health, fitness,
    and everyday pleasures that they maintain with quiet confidence.
background:
  cultural: Mary was raised in a working‑class, Midwestern white family in Illinois, where values of hard work, modesty, and community cooperation were emphasized. Her cultural upbringing includes regular
    participation in a Protestant (Methodist) church, which reinforces a sense of service and harmony. The small‑town environment of Pulaski, with its close‑knit neighborhoods and seasonal agricultural
    rhythms, shaped Mary's preference for structure, predictability, and practical problem‑solving. These cultural influences are reflected in her reliable work ethic, her dedication to community service,
    and her appreciation for simple, hands‑on hobbies.
attributes:
  skills: '[''Commercial floor cleaning'', ''Restroom sanitation'', ''Waste disposal management'', ''Inventory control of cleaning supplies'', ''Safety compliance and OSHA regulations'', ''Basic plumbing
