personas:
  professional: Terrance Smiley, a seasoned computer support specialist with 35 years of experience, blends meticulous system‑administration expertise and clear, step‑by‑step documentation with a gentle
    mentorship style, translating complex tech jargon into accessible language while they channel a lifelong curiosity for visual arts into engaging instructional graphics and community workshops.
  sports: Terrance Smiley, an avid recreational fisherman and weekend gardener, grounds their fitness routine in early morning walks along the St. Johns River, cheers for the Jacksonville Jaguars and the
    Jacksonville Jumbo Shrimp, and belongs to the local rowing club where they paddle leisurely on the river during summer months.
  arts: Terrance Smiley, a devoted museum‑goer and street‑photographer, curates playlists featuring Miles Davis, B.B. King, Aretha Franklin, and contemporary R&B artist H.E.R., draws visual inspiration
    from artists like Kerry James Marshall and Yayoi Kusama, captures the vibrancy of Jacksonville’s murals on a vintage Nikon, and regularly attends innovative productions at Riverside Theatre where they
    appreciate experimental storytelling.
  travel: Terrance Smiley, an inquisitive traveler who favors reflective road trips, spends summers exploring historic Southern towns such as Savannah, Charleston, and St. Augustine, has a wishlist that
    includes photographing the street murals of Berlin, wandering the gardens of Kyoto, and enjoys planning a senior‑friendly Caribbean cruise that combines island hopping with local culinary tours where
    they can sample fresh seafood.
  culinary: Terrance Smiley, an enthusiastic home cook with intermediate skill, loves simmering Southern classics like shrimp and grits, gumbo, and collard greens while experimenting with Caribbean flavors
    such as scotch bonnet pepper, allspice, and coconut milk to create a signature jerk‑infused catfish, and frequently pairs meals with a glass of sweet tea or a crisp Riesling where they unwind after
    a day of photography.
  core: Terrance Smiley, a tech‑savvy retiree who never leaves home without a camera, balances methodical problem‑solving with spontaneous jazz improvisation, habitually organizes their bookshelf by color,
    and they occasionally forget to water their garden until a reminder ping from their smartwatch.
background:
  cultural: Terrance grew up in historic African‑American neighborhoods of Jacksonville during the 1960s and 70s, a period shaped by the civil‑rights movement and a flourishing of Black cultural expression
    in the South. Family gatherings centered around soulful gospel music, lively storytelling, and home‑cooked soul food, embedding in him a deep appreciation for communal harmony and resilience. His parents
    emphasized education and community service, values that guided his pursuit of a STEM degree and his later career in tech support. He maintains strong ties to the local Black church, where he participates
    in outreach programs that blend technical assistance with faith‑based community building. Terrance’s heritage also informs his love for jazz, blues, and contemporary R&B, as well as his passion for
    preserving African‑American history through volunteering at museums and participating in Juneteenth celebrations. He draws on this cultural foundation to mentor younger generations, believing that sharing
    knowledge and fostering access to technology can empower his community and honor the legacy of those who forged the path before him.
