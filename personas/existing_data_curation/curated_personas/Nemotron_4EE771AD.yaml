personas:
  professional: Steven Davis, a seasoned computer support specialist with four decades of hands‑on experience, applies meticulous organization and curiosity for new ideas to diagnose hardware failures,
    configure software across Windows, macOS, and Linux, and mentor seniors through clear, step‑by‑step workshops, and they take pride in documenting every solution for future reference.
  sports: Steven Davis follows the New England Patriots and Boston Red Sox avidly, participates in the local senior center’s weekly pickleball games, and they walk the seacoast trail near their garden three
    times a week, though they often forego the community yoga class when joint pain flares.
  arts: Steven Davis, a passionate digital photographer, frequents the Portland Museum of Art and the Museum of Fine Arts, Boston, curates a modest collection of vintage computer manuals alongside jazz
    vinyl from Miles Davis and The Beatles, and they volunteer at community theater productions to merge their love of technology with live performance.
  travel: Steven Davis enjoys low‑key road trips to coastal New England sites such as Acadia National Park and historic Newport, Rhode Island, and they take occasional train rides to Boston for museum visits,
    preferring destinations where they can capture sunrise photographs without the stress of long‑haul flights.
  culinary: Steven Davis relishes cooking classic New England clam chowder, seared scallops seasoned with herbs from their garden, and homemade pumpkin pie, often experimenting with locally sourced maple
    syrup as a glaze, and they savor a vinyl‑spun cup of dark roast coffee while reviewing a new photography edit.
  core: Steven Davis is a tech‑savvy, art‑curious senior who balances meticulous mentorship with quiet, worry‑laden introspection, and they turn vintage computers into community tools while tending a garden
    and vinyl collection.
background:
  cultural: Steven grew up in a modest, middle‑class family in the post‑war suburbs of New England, where self‑reliance, community responsibility, and a pragmatic work ethic were core values. His upbringing
    in the small towns of Rockingham County exposed him to a strong public‑library tradition and a vibrant local arts scene, fostering his lifelong appreciation for both technology and creative expression.
    As a white male of his generation, he experienced the rapid shift from analog to digital life, which reinforced his curiosity about new ideas and his commitment to staying current. Though he completed
    only a high‑school diploma, he entered the workforce early, gaining practical expertise that complemented his formal education. His divorce later in life added a layer of personal resilience and independence,
    while his New Hampshire roots keep him connected to the region’s seasonal rhythms, town meetings, and the collaborative spirit of local community initiatives.
attributes:
  skills: '[''Hardware troubleshooting and repair'', ''Software installation and configuration (Windows, macOS, Linux)'', ''Network troubleshooting and basic router configuration'', ''Remote support via
    TeamViewer and Remote Desktop'', ''Data backup, recovery, and migration'', ''Basic cybersecurity: malware removal, password management'', ''Technical documentation and knowledge‑base authoring'', ''User
    training and workshop facilitation'', ''Process improvement and workflow automation (scripting)'', ''Digital media handling and basic photo editing'', ''Assistive technology support for seniors'']'
  hobbies: '[''Visiting local art galleries and museums'', ''Digital photography and photo editing'', ''Playing chess at the senior center'', ''Reading science‑fiction and historical non‑fiction'', ''Volunteering
    to teach computer basics at the public library'', ''Woodworking and small furniture projects'', ''Gardening with native New England plants'', ''Listening to jazz and classic rock vinyl records'', ''Collecting
    vintage computers and software manuals'', ''Attending community theater productions'']'
  career_goals: At 71, Steven aims to transition from full‑time computer support to a part‑time consulting role that lets him focus on mentorship and community outreach. He plans to earn the CompTIA Network+
    certification to formalize his networking expertise, and to develop a series of free workshops for older adults at the Raymond public library, merging his technical background with his appreciation
    for art by teaching participants how to digitize and organize family photographs. He also hopes to author a concise guide titled “Computers for the Curious Senior,” which will blend practical troubleshooting
    tips with creative uses of technology, such as exploring digital art tools. Ultimately, Steven wants to leave a legacy of reliable, well‑documented support practices and to stay intellectually engaged
    by exploring emerging technologies like AI‑assisted photo editing.
