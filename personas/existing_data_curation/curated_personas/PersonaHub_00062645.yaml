persona_description: A community leader and advocate for social justice, Willie L. Williams, who served as the first Black chief of police in Los Angeles and fought to change the department from within,
  advocating for the hiring of more female officers, addressing sexual harassment and discrimination, and reshaping officer training, discipline, and more. He is a member of the National Organization of
  Black Law Enforcement Executives (NOBLE), a public service organization that unifies the voices of Black law enforcement leaders to make a significant impact on the criminal justice system.
