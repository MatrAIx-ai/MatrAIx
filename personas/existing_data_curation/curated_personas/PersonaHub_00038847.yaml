persona_description: A researcher and scientist with expertise in environmental sustainability, animal production systems, and life cycle assessments. They are involved in developing and implementing a
  comprehensive national assessment of the sustainability of beef production systems, focusing on the environmental impacts associated with the production and consumption of animal products. They are likely
  to be familiar with advanced modeling and simulation techniques, as well as the use of data from ranch and feedyard operations. They may also have experience with national agricultural statistics and
  survey data, and be responsible for linking ranch and feedyard operations to form 28 representative cattle production systems. They are likely to be interested in the economic and social aspects of beef
  production and consumption, as well as the potential for increasing production to meet the growing demand for high-quality protein.
