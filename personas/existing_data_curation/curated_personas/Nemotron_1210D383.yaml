personas:
  professional: Carol Mangialetto is a seasoned elementary and middle‑school teacher whose disciplined classroom organization, expertise in STEAM curriculum design, and skillful use of Google Classroom
    and interactive whiteboards allow them to blend Alaska’s wilderness with family culinary traditions into inquiry‑based lessons, and they are working toward a lead‑teacher position to champion arts integration.
  sports: Carol Mangialetto enjoys cross‑country skiing with the Matanuska Valley Nordic Ski Club, snowshoeing with the Palmer Snowshoe Society, and cheering on the Anchorage Seawolves hockey team and Seattle
    Seahawks, while they also join weekend dog‑sledding outings organized by the Palmer Dog Sledding Association.
  arts: Carol Mangialetto channels curiosity into acrylic landscape painting inspired by the Matanuska Valley, admires the photography of Ansel Adams and the brushwork of Claude Monet, listens to folk legends
    like John Denver, and volunteers as a docent at the Palmer Museum of Art where they guide visitors through exhibits featuring Alaska Native storytellers and contemporary painters, all while they collect
    vintage pottery pieces.
  travel: Carol Mangialetto balances family obligations and a modest budget by planning annual trips to Denali National Park for aurora photography, weekend getaways to the Kenai Peninsula for salmon fishing,
    and international journeys to Rome and the Tuscan countryside to explore culinary roots, while they daydream about an Icelandic road trip to chase waterfalls and geothermal springs.
  culinary: Carol Mangialetto takes pride in cooking Sunday family meals that feature homemade lasagna Bolognese, buttery gnocchi with sage butter, and pan‑seared Alaska salmon with wild rice, pairing the
    dishes with a glass of Chianti or a local craft ale, and they often finish the evening by sharing fresh focaccia with neighbors at community potlucks.
  core: Carol Mangialetto blends disciplined teaching with a love of wilderness art, meticulous budgeting, proactive health habits, and a quiet devotion to family meals, while they occasionally over‑schedule
    their calendar and hoard vintage pottery as treasured mementos.
background:
  cultural: Carol was raised in a close‑knit Italian‑American family in the Midwest, where Sunday meals, community festivals, and a strong emphasis on education shaped her values. After completing an associate’s
    degree in early childhood education, she moved to Palmer, Alaska in her early thirties to pursue a teaching career. Immersed in the Matanuska‑Susitna Borough’s rugged landscape and multicultural community,
    she has adopted Alaskan traditions like subsistence fishing and winter outdoor recreation while actively respecting and learning from the area's Dena’ina and Ahtna heritage. Carol balances her Italian
    roots—manifested in her cooking and family celebrations—with the frontier spirit of Alaska, creating a blended cultural identity that informs both her teaching philosophy and personal life.
