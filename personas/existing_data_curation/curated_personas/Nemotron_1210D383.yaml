    ''Grant writing'', ''Professional learning community leadership'']'
  hobbies: '[''Acrylic painting'', ''Pottery'', ''Wildlife photography'', ''Hiking'', ''Cross‑country skiing'', ''Dog‑sledding'', ''Knitting'', ''Cooking Italian cuisine'', ''Reading historical fiction
    and mystery novels'', ''Volunteering at the local museum'']'
  career_goals: In the next two years Carol aims to complete a bachelor’s degree in Education and assume a lead‑teacher role at her Palmer elementary school, where she can mentor new faculty and spearhead
    a school‑wide arts‑integration initiative. She envisions establishing a community partnership program that brings local artisans and indigenous storytellers into the curriculum, enriching students’
    cultural awareness. Long‑term, Carol aspires to earn a master’s in Curriculum and Instruction, positioning herself for a district‑level curriculum specialist role focused on STEAM and environmental
    education. She also hopes to develop a regional professional development workshop series that trains teachers in leveraging Alaska’s natural landscape for experiential learning.
