  career_goals: Douglas frequently imagines roles where he can help others, reflecting his strong compassion and cooperative spirit. He often says he wants to grow up to be a firefighter or a teacher, professions
    that blend practical action with caring for the community. In the short term, his ambitions focus on mastering reading simple words, learning to ride his tricycle confidently, and being able to assist
    his parents with small chores like setting the table, all of which fit his preference for familiar, achievable tasks.
