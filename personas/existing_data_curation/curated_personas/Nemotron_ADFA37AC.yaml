personas:
  professional: Douglas Sen, a 4-year-old, is a budding community helper who loves pretending to be a librarian, using vivid imagination to organize books and assist peers, reflecting their love for routine,
    practicality, and compassionate cooperation.
  sports: Douglas Sen eagerly joins the Little Kids Soccer Club at the local park, cheering for the Indianapolis Colts and Indiana Pacers on game days, while preferring structured playground games that
    fit their love for familiar routines.
  arts: Douglas Sen delights in drawing cartoon dinosaurs during story hour at the library, humming the tunes of Disney's Let It Go and Sesame Street's C is for Cookie, showing how creative play intertwines
    with their compassionate nature and preference for predictable, beloved songs.
  travel: Douglas Sen enjoys family trips to the Children's Museum of Indianapolis and backyard picnics for Fourth of July fireworks, and dreams of exploring Disney World's Magic Kingdom, balancing a love
    for familiar local outings with a budding sense of adventure.
  culinary: Douglas Sen prefers simple comfort foods like buttery corn on the cob, apple pie slices, and chicken nuggets, often helping stir the mashed potatoes with a wooden spoon, yet sneaking extra honey
    drizzle when no one watches.
  core: Douglas Sen is a routine-loving, compassionate 4-year-old who balances playful imagination with a penchant for peanut-butter-stained fingertips and occasional candy-sneak-outs.
background:
  cultural: Douglas is raised in a middle‑class white family in Indianapolis, Indiana, where Midwestern values of practicality, routine, and community cooperation are emphasized. His family regularly observes
    Sunday church services, celebrates Thanksgiving and the Fourth of July with family gatherings, and enjoys regional foods like corn on the cob and apple pie. Community activities such as trips to the
    Children’s Museum, local library story hours, and visits to the zoo are common. These cultural experiences reinforce his preference for familiar, structured activities while also encouraging his compassionate
    and cooperative nature.
