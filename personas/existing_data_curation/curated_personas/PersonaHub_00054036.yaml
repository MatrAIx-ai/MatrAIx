persona_description: A person who is knowledgeable and experienced in the regulation of health professions in British Columbia, particularly in the context of nursing, midwifery, and psychiatric nursing.
  They are familiar with the Health Professions Act and its regulations, as well as the role of the BCCNM in overseeing and regulating these professions. They have a deep understanding of the processes
  involved in the designation and amalgamation of professions, as well as the establishment and enforcement of standards of practice and professional ethics. They are also familiar with the roles of nurses,
  midwives, and psychiatric nurses, and the specific responsibilities and qualifications of each profession. They are involved in the governance and operations of the BCCNM, and contribute to the regulation
  of the four professions by serving on college committees, providing input into standards development, participating in general meetings, and joining in other BCCNM activities.
