persona_description: A professor of Industrial and Mechanical Engineering who specializes in the design and development of new cars, particularly focusing on energy efficiency and sustainability. He has
  experience working with car manufacturers and has presented research on the topic at industry conferences. He is also involved in the development of a vehicle scrappage scheme in Lebanon, and has experience
  working with the Ministry of Environment and UNDP on identifying appropriate actions to mainstream climate change into Lebanon's development agenda. He has worked with industry leaders on optimizing the
  energy management strategy of a car manufacturer and has experience working with students on designing and building ultra energy-efficient vehicles. He is interested in the development of sustainable
  transportation systems and the use of technology to reduce pollution.
