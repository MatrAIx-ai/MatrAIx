personas:
  professional: Rose Lowery is a retired county clerk turned community volunteer coordinator whose methodical budgeting, record‑keeping, and event‑planning skills now drive the senior‑citizen mentorship
    program they are launching, while they also draft proposals to improve local services for older adults.
  sports: Rose Lowery enjoys strolling the Brandywine River trails several mornings a week, cheering on the Wilmington Blue Rocks during the summer and following the Philadelphia Eagles in the NFL season,
    while they supplement walking with light garden‑yard work that serves as low‑impact fitness.
  arts: Rose Lowery finds quiet creative fulfillment quilting intricate patchwork quilts inspired by the patterns of traditional Southern storytelling, listening to the timeless jazz of Duke Ellington while
    they solve daily crossword puzzles, and attending community choir rehearsals where they sing hymns by composers such as John Rutter.
  travel: Rose Lowery prefers low‑key, well‑planned trips and has cherished weekend getaways to historic Wilmington, a year‑long tradition of visiting the Smithsonian museums in Washington, D.C., and a
    recent relaxing cruise to the Bahamas with their grandchildren, always choosing accessible accommodations and an itinerary that balances gentle exploration with rest, and they always pack a foldable
    walking stick for comfort.
  culinary: Rose Lowery delights in cooking classic Southern comfort foods such as smoked collard greens, fried catfish with a cornmeal crust, and peach cobbler, expertly seasoning with smoked paprika and
    old‑bay leaves, while they can be a confident stovetop master yet occasionally over‑salt soups.
  core: Rose Lowery blends a disciplined love of gardening, quilting, and community service with a quiet, methodical nature, occasional forgetfulness about appointments, and a habit of hoarding coupons
    for future use, and they often rely on sticky‑note reminders.
background:
  cultural: Rose grew up as a Black woman in the mid-Atlantic during the height of the civil-rights movement, shaping a strong sense of community and resilience. Her family roots trace back to the Great
    Migration, with grandparents who moved from the rural South to Delaware seeking better opportunities. The church has been a cornerstone of her cultural identity, providing social support and a platform
    for activism. Rose's cultural background blends Southern culinary traditions with the maritime heritage of the Delaware River region, and she remains connected to the legacy of Black educators and community
    leaders who inspired her commitment to service and structured advocacy.
attributes:
  skills: '[''Administrative coordination'', ''Budgeting and financial management'', ''Event planning'', ''Record-keeping'', ''Scheduling'', ''Basic computer literacy (Microsoft Office, online banking)'',
