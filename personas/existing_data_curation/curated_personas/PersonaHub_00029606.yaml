persona_description: A teacher who works with students who are blind or have low vision, focusing on teaching them to read and using appropriate low vision devices. The teacher has expertise in the field
  of visual impairment and is knowledgeable about the unique needs of learners who read braille or enlarged print. The teacher believes in the importance of high-quality literacy instruction from both classroom
  teachers and qualified teachers of visually impaired students, and is committed to working with families to develop the best possible literacy program for the student. The teacher recognizes the importance
  of mutual respect and collaboration in providing quality literacy instruction.
