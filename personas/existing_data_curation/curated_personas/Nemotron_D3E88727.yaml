  career_goals: Raul aspires to become a civil or environmental engineer, focusing on designing resilient infrastructure for flood-prone coastal communities like Tampa. He wants to combine his analytical
    strengths and practical mindset to develop sustainable solutions that protect both the local environment and the Venezuelan diaspora families he cares about. In the longer term, he imagines leading
    projects that integrate smart technology with community planning, while also mentoring younger students in coding and STEM subjects.
