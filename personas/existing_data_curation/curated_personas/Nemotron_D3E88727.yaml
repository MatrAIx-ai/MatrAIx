personas:
  professional: Raul Zavala, a budding coder who designs simple games in Scratch and experiments with Python, channels their methodical nature into building functional tools while they dream of a future
    engineering career.
  sports: Raul Zavala, a passionate youngster on the local youth soccer club, idolizes the Tampa Bay Rowdies, spends weekend mornings rucking at Al Lopez Park, and they mix team drills with solo skill challenges
    to balance competition and camaraderie.
  arts: Raul Zavala, an avid reader of classic science‑fiction authors like Isaac Asimov and a sketcher of Tampa’s riverfront flora, regularly listens to the alternative rock band Tame Impala and the K‑pop
    group BTS, finding inspiration in modern music while they attend community art workshops.
  travel: Raul Zavala, who loves exploring Tampa’s parks such as Lettuce Lake and the Riverwalk, dreams of a summer road‑trip to the Everglades and a future visit to the Space Center in Houston, and they
    prefer low‑cost, friends‑along adventures over guided tours.
  culinary: Raul Zavala, who assists in preparing arepas filled with cheese and black beans at family gatherings, also experiments with homemade pizza dough using a sourdough starter, and they frequently
    catalog favorite ingredients like plantains, mozzarella, and fresh cilantro in a personal recipe notebook.
  core: Raul Zavala blends a calm, methodical mindset with a fierce love for soccer and coding, while they juggle a disciplined savings habit, proactive health care for mild asthma, and a creative streak
    that thrives on sci‑fi reads and sketching Tampa’s nature.
background:
  cultural: Raul grew up in a Venezuelan-American household in Tampa, Florida. His parents immigrated from Venezuela during the recent economic crisis, bringing rich traditions of music, food, and community
    solidarity. At home, Spanish is spoken daily, and he celebrates Venezuelan holidays such as Día de la Independencia with family meals and folkloric music, while also participating in local American
    holidays. The vibrant Venezuelan diaspora in Hillsborough County provides a support network, influencing his bilingual fluency and cultural pride. This blend of Latin American heritage and Floridian
    lifestyle shapes his worldview, fostering a deep appreciation for both his roots and the diverse community around him.
