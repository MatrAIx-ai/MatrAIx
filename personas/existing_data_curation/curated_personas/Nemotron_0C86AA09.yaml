  hobbies: '[''watercolor painting'', ''sketching'', ''museum visits'', ''reading speculative fiction'', ''poetry workshops'', ''hiking'', ''yoga'', ''STEM outreach volunteering'', ''jazz listening'', ''cooking
    Southern and Caribbean cuisine'']'
  career_goals: Marcille aims to become a lead systems engineer on sustainable aerospace projects, guiding the development of next‑generation, environmentally responsible aircraft and spacecraft. She aspires
    to embed artistic design principles into spacecraft interiors to improve crew well‑being on long‑duration missions. A long‑term ambition is to earn a Ph.D. that bridges engineering and humanities, researching
    how narrative and visual storytelling can enhance complex engineering communication. Marcille also seeks to champion diversity and inclusion within the aerospace sector by establishing mentorship programs
    and speaking at conferences about the value of interdisciplinary perspectives.
