personas:
  professional: Marcille Steele is a systems aerospace engineer who leverages computational fluid dynamics, CAD modeling, and design thinking to lead sustainable aircraft projects, while their curiosity
    and collaborative nature foster innovative, interdisciplinary solutions in small, iterative teams.
  sports: Marcille Steele is an avid hiker with the Potomac Trails Club, follows the Washington Capitals and DC United, and caps their weekly routine with sunrise yoga, occasional pickup volleyball at the
    local community center, occasional cross‑country skiing with a winter group on the Blue Ridge, preferring low‑impact endurance activities over high‑intensity gym workouts.
  arts: Marcille Steele immerses themselves in the visual arts by painting aircraft silhouettes in watercolor, attending the Smithsonian’s African diaspora exhibition and modernist collections featuring
    artists such as Kara Walker, Henri Matisse, and Jean‑Michel Basquiat, and listening to jazz legends like Miles Davis and contemporary saxophonist Kamasi Washington, while regularly participating in
    poetry workshops that showcase spoken‑word poets such as Sarah Kay.
  travel: Marcille Steele favors eco‑conscious travel, planning detailed weekend hikes in Shenandoah National Park and a yearly pilgrimage to Iceland’s volcanic landscapes for inspiration, while also dreaming
    of a research tour of ESA’s facilities in France and a culinary trip to the Caribbean islands, balancing a modest travel budget with a love for immersive cultural experiences.
  culinary: Marcille Steele enjoys cooking at an intermediate skill level, often preparing Southern classics like collard greens and shrimp gumbo alongside Caribbean dishes such as jerk chicken and callaloo,
    experimenting with spices like scotch bonnet pepper, allspice, smoked paprika, and fresh thyme, and occasionally hosts small dinner gatherings to share these fusion meals.
  core: Marcille Steele is a detail‑driven aerospace engineer who finds balance in watercolor sketches, poetry, and yoga, yet habitually forgets to water their houseplants, overbooks their calendar with
    a mix of technical work and creative pursuits, and occasionally fuels late‑night coding sessions with too many cups of coffee.
background:
  cultural: Marcille is a first‑generation African American professional rooted in Washington, D.C.'s vibrant Black community. She grew up listening to stories of the Civil Rights Movement and participating
    in local cultural festivals that celebrate African diaspora art, music, and cuisine. Her family’s emphasis on education and community service inspired her pursuit of both the arts and engineering. She
    actively engages with organizations that preserve Black heritage in STEM, such as the National Society of Black Engineers, and attends cultural events at the Anacostia Community Museum. Her cultural
    identity informs her commitment to fostering inclusive spaces in both the aerospace field and the artistic circles she cherishes.
attributes:
  skills: '[''aerospace structural analysis'', ''computational fluid dynamics'', ''finite element modeling'', ''CAD (SolidWorks, CATIA)'', ''Python programming'', ''MATLAB'', ''systems engineering'', ''project
