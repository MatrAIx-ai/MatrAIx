  career_goals: Alston aims to complete his associate degree, secure a full‑time position in operations or community development, and eventually launch a small family‑run agribusiness that leverages his
    organizational strengths and local networks. He is also interested in taking a leadership role in the town's economic development council, balancing his career growth with his commitment to his family
    and community.
