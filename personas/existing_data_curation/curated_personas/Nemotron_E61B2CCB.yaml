  hobbies: '["Sketching and Painting", "Reading Fantasy and Sci‑Fi", "Creative Writing", "Scratch Game Development", "Listening to Music (Soul, Hip‑Hop)", "Museum Visits", "After‑School Art Club"]'
  career_goals: Leola aspires to become a visual storyteller, combining illustration and narrative to create graphic novels or animated films. She dreams of attending an arts-focused high school and later
    studying illustration or animation at a university. She hopes her work will celebrate African American culture and inspire other kids to express themselves creatively. In the long term, she envisions
    using her art to contribute to community projects and perhaps teach art workshops for youth.
