personas:
  professional: Leola Joseph, a budding digital illustrator and junior coder, merges watercolor techniques with Scratch programming to craft interactive storybooks, and their vivid imagination paired with
    a balanced mix of organization and flexibility makes classroom projects consistently stand out.
  sports: Leola Joseph, an avid fan of the Cleveland Browns and Guardians, participates in a community youth basketball league, attends after‑school hip‑hop dance classes, and spends Saturday afternoons
    shooting hoops at the local park while cheering on their favorite Cleveland Cavaliers during televised games.
  arts: Leola Joseph, a passionate watercolorist and digital storyteller, spends weekends sketching murals at the Boys & Girls Club, draws creative fuel from listening to Marvin Gaye’s soulful classics
    and Kendrick Lamar’s modern beats, and frequently cites Octavia Butler and Jason Reynolds as literary inspirations for their short stories and poems.
  travel: Leola Joseph loves weekend outings to Lake Erie for paddle‑boarding, dreams of a family trip to Washington, D.C. to explore the National Museum of American History and the renowned Smithsonian
    museums, and hopes to one day wander the historic cobblestone streets of Savannah, Georgia, while they meticulously plan each adventure with a scrapbook of maps and doodles.
  culinary: Leola Joseph enjoys cooking soulful comfort foods like sweet potato pie and collard greens, experiments with spice‑infused ramen bowls, and adds a splash of fresh lemon to their smoothie creations,
    often listening to classic soul tracks while they whisk, and they have a penchant for treating themselves to a slice of homemade cornbread after art sessions.
  core: Leola Joseph, a quietly inventive 12‑year‑old who fills sketchbooks with vivid worlds, balances a disciplined allowance routine with occasional sticker splurges, and navigates school life with a
    blend of cautious resilience and artistic curiosity, they occasionally forget to bring homework but always remember to bring a fresh set of colored pencils.
background:
  cultural: Leola is a Black American growing up in Cleveland’s East Side community, where she experiences a blend of urban Midwestern life and rich African‑American heritage. Her family maintains traditions
    of storytelling, gospel music, and celebrating cultural holidays such as Juneteenth. She attends a local public school that emphasizes multicultural education and participates in community programs
    like the Boys & Girls Club’s art workshops. The city’s vibrant arts scene—museums, local murals, and neighborhood festivals—provides inspiration for her creative pursuits, while her roots in the Black
    church and close‑knit family reinforce values of cooperation, harmony, and resilience.
