personas:
  professional: Kee Torreda is an emerging community‑outreach communicator who leverages an associate degree in Business Administration, bilingual fluency, and self‑taught Canva and Photoshop skills to
    design engaging flyers for nonprofit events while coordinating volunteer initiatives and laying the groundwork for a future handcrafted home‑decor boutique.
  sports: Kee Torreda spends Saturdays hiking the Ramapo and Watchung trails, plays on a recreational soccer team linked to the New Jersey Soccer Club, and follows the New York Giants, New York Knicks,
    and New Jersey Devils, balancing active outdoor pursuits with seasonal couch‑surfing for basketball games.
  arts: Kee Torreda nurtures creative expression through a weekly knitting circle, devours mystery novels by Agatha Christie, draws entrepreneurial insights from the "How I Built This" podcast, and relaxes
    to the sounds of Tame Impala while admiring street art by Banksy at local galleries.
  travel: Kee Torreda blends meticulous spreadsheet planning with spur‑of‑the‑moment decisions, having trekked the historic Freedom Trail in Boston, wandered the souks of Marrakech, kayaked the Adirondack
    lakes, and dreaming of a culinary road‑trip across the Mediterranean islands.
  culinary: Kee Torreda, proficient in meal planning, regularly cooks stir‑fried noodles with shiitake mushrooms, ginger, and soy sauce, prepares miso‑glazed salmon, and experiments with fusion dishes like
    quinoa‑filled dumplings drizzled with sriracha, always aiming for health‑forward yet flavorful plates.
  core: Kee Torreda navigates life by marrying curiosity with practicality, juggling community outreach, creative hobbies, and disciplined self‑care, though they sometimes over‑schedule their weeks and
    succumb to late‑night snack cravings.
background:
  cultural: Mai was raised in a bilingual household with Chinese and Korean roots in New Jersey. Her family celebrates Lunar New Year, Mid‑Autumn Festival, and Korean Chuseok, blending traditional customs
    with American holidays. This mixed heritage fostered a respect for harmony, cooperation, and communal responsibility, which she carries into her daily life. She is actively involved in local Asian American
    community groups, supporting cultural education initiatives and serving as a bridge between her cultural background and the broader Dunellen community.
attributes:
  skills: '["Household budgeting", "Meal planning and cooking", "Basic graphic design (Canva, Photoshop)", "Bilingual communication (English, Mandarin)", "Community event coordination", "Time management",
    "Digital literacy (MS Office, social media)"]'
  hobbies: '["Cooking traditional East Asian dishes", "Fusion recipe experimentation", "Hiking local trails", "Knitting circle", "Reading mystery novels", "Listening to entrepreneurship podcasts", "Attending
    cultural festivals", "Volunteering at multicultural reading program"]'
  career_goals: Mai aims to turn her practical skills into a part‑time role in community outreach or nonprofit communications while completing a bachelor's degree in Business Management. She plans to launch
    a small online boutique that offers handcrafted, culturally inspired home‑decor items, utilizing her design abilities and culinary creativity for branding. Over the next five years, she aspires to become
    a community liaison who bridges local Asian American organizations with municipal programs, eventually moving into a leadership position within a social‑enterprise focused on cultural education and
    entrepreneurship.
