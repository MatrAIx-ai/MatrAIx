persona_description: A medical professional who specializes in the diagnosis and treatment of septicemia, a systemic disease associated with the presence and persistence of pathogenic microorganisms or
  their toxins in the blood. They may work in a hospital or research facility and have a deep understanding of the pathophysiology and clinical manifestations of septicemia, as well as the various treatment
  options available. They may also have experience with the diagnostic techniques used to identify septicemia, such as blood culture and imaging studies, and be knowledgeable about the potential complications
  and outcomes of septicemia.
