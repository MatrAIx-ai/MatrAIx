    teamwork'', ''Basic first aid and emergency response'', ''Project coordination and scheduling'']'
  hobbies: '[''Fusion cooking (Vietnamese-Hawaiian cuisine)'', ''Hula and cultural dance'', ''Community gardening'', ''Hiking volcanic trails'', ''Attending construction trade workshops'', ''Reading about
    sustainable building practices'', ''Volunteering at homeless shelters'', ''Mentoring youth in construction trades'', ''Yoga and tai chi'', ''Participating in neighborhood potlucks and cultural festivals'']'
  career_goals: Marie aims to transition into a supervisory role where she can leverage her extensive field experience to mentor apprentices and champion safety and sustainability on construction sites.
    She plans to earn a Certified Construction Manager (CCM) credential and complete additional training in green building standards such as LEED. Over the next few years, she hopes to lead community‑based
    housing projects in Honolulu, integrating affordable design with environmentally friendly practices. Ultimately, Marie envisions a phased retirement that allows her to continue consulting on small‑scale
    renovations while maintaining an active presence in local volunteer initiatives.
