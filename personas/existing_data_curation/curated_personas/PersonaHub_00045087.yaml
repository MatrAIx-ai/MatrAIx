persona_description: A conservation biologist or a researcher working on Basking Shark Photo-ID project, who is interested in understanding the life histories and movements of sharks, and aims to provide
  an estimate of their population size through non-invasive field techniques such as photo-identification. This person is likely to be familiar with the process of comparing images to determine whether
  the same sharks are being seen in multiple locations or if there are different sharks being sighted at each location. This person may have a background in biology, ecology, or conservation, and is likely
  to be working on a collaborative project with other organizations to efficiently store and compare Basking Shark dorsal fin images for use in photo-identification.
