  career_goals: Inspired by the Bay Area’s vibrant creative scene, Kayla aims to transition from general office work to a role that blends administration with arts and culture. In the next three to five
    years, she hopes to become a marketing or events coordinator for a local gallery, museum, or cultural nonprofit, leveraging her organizational background while tapping into her artistic curiosity. She
    plans to supplement her associate’s degree with a certificate in digital marketing or event management and eventually pursue a bachelor’s degree in communications. Long‑term, she dreams of launching
    her own pop‑up art space or boutique that showcases emerging artists and offers community workshops, allowing her competitive drive to flourish in an entrepreneurial setting.
