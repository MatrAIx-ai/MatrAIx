persona_description: A historical figure who played a significant role in the development of Latin American and African politics during the Cold War, known for his leadership in the Non-Aligned Movement
  and his support for anti-imperialist movements in Latin America. His influence extended beyond his own country, with a focus on Africa, where he offered support to the decolonisation process and was involved
  in military interventions. His stance on the Soviet invasion of Afghanistan and his later changes in leadership positions were characterized by a catalogue of mistakes that led to more than one "rectification
  of errors" campaign. His policies were bound to failure from the start, and he was involved in world affairs, especially those concerning Latin America, as a thorn in the side of US policies. His alliance
  with Soviet leader Nikita Khrushchev, which brought the USSR and US to the brink of nuclear war in 1962, was an early red flag that Castro was not about to back off when it came to confronting US imperialism.
