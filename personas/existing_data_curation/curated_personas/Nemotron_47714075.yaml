  hobbies: '[''LEGO building'', ''Jigsaw puzzles'', ''Soccer'', ''Reading adventure books (English and Spanish)'', ''Cooking traditional Nicaraguan dishes'', ''Spanish language storytime'']'
  career_goals: Ramon dreams of a career where he can help others while using his love of order and structure. He often says he wants to become a firefighter because he admires the teamwork, clear procedures,
    and the chance to protect his community. He is also curious about computer programming, imagining himself designing games that follow logical rules. Ultimately, he hopes to work in a role that combines
    safety, organization, and problem-solving.
