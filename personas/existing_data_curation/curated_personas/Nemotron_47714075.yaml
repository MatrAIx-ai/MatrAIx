personas:
  professional: Ramon Rojas is an aspiring junior engineer who channels his love for LEGO construction, model kits, and jigsaw puzzles into early tinkering projects, demonstrating organized planning and
    reliable execution even in school science fairs.
  sports: Ramon Rojas plays midfield for the Durham Youth Soccer Club, follows the North Carolina FC season, and cheers for the Durham Bulls, approaching fitness with structured drills, weekly practices,
    and a habit of tracking personal stats on a handwritten log.
  arts: Ramon Rojas delights in adventure stories by J.K. Rowling and Rick Riordan, enjoys the animated films of Pixar such as ‘Toy Story’, and can often be found humming Taylor Swift’s ‘Shake It Off’ while
    assembling LEGO creations, showing how imaginative narratives feed their creative play.
  travel: Ramon Rojas prefers well‑planned trips, having visited the Smithsonian in Washington D.C., the beaches of San Diego, and a family road‑trip to the Grand Canyon, while dreaming of exploring Barcelona’s
    architecture and the Galápagos Islands, always mapping out daily activities in advance.
  culinary: Ramon Rojas loves cooking alongside family, measuring rice and black beans for gallo pinto with precision, chopping cilantro for salsa, and experimenting with spaghetti carbonara, displaying
    an intermediate cooking skill level and a penchant for exact ingredient ratios.
  core: Ramon Rojas is a methodical eight‑year‑old who thrives on structure, balances teamwork on the soccer field with solitary LEGO builds, and keeps a meticulous ledger for every allowance cent while
    occasionally forgetting to tidy up their room.
background:
  cultural: Ramon comes from a Nicaraguan family that maintains strong cultural ties while living in Durham, North Carolina. At home, Spanish is spoken daily, and he celebrates Nicaraguan holidays such
    as La Purísima and Día de la Madre with traditional foods, music, and family gatherings. He participates in the local Nicaraguan community center’s events, where he learns folk dances and enjoys listening
    to marimba and salsa music. His upbringing blends the values of his heritage—family closeness, respect for elders, and a love for food—with the diverse, multicultural environment of Durham.
