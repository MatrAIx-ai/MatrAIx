    improvement"]'
  hobbies: '["Reading non‑fiction (medical, self‑improvement, local history)","Woodworking and furniture restoration","Fishing in the Ozarks","Strategy board games with small groups","Italian cooking and
    recipe development"]'
  career_goals: Christopher aims to transition from personal care aide to a certified nursing assistant (CNA) within the next year, completing the required coursework and certification while maintaining
    his current responsibilities. His long‑term ambition is to earn an associate’s degree in nursing to become a registered nurse (RN) and eventually specialize in geriatric care. He envisions opening a
    small, family‑run home‑care agency that emphasizes meticulous documentation, evidence‑based practices, and competitive standards for employee performance. By leveraging his organizational strengths
    and desire for measurable success, he hopes to become a recognized leader in the Arkansas senior‑care community, ultimately improving service quality and expanding access for underserved rural populations.
