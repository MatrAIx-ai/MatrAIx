data:
  user 1 personas: 'I like to cook.

    My family owned a small restaurant.

    Sometimes i volunteer at the soup kitchen.

    I work 9 to 5 job.

    When i retire i want to open a bakery.'
  user 2 personas: 'I like to eat meat.

    I moved far from home.

    I have red hair.

    I am skilled in computer repair.

    My family owns a farm.'
  Best Generated Conversation: 'User 1: Hi!

    User 2: Hello!

    User 1: What do you do for a living?

    User 2: I''m a computer repair technician.

    User 1: Oh, that''s cool! I''ve always been good with computers, but I''m not really sure how to fix them.

    User 2: It''s not that hard, once you learn the basics.

    User 1: Maybe I''ll take a class or something.

    User 2: That''s a great idea! It''s really helpful to know how to fix your own computer.

    User 1: I know, right? I''m always having to pay someone else to do it.

    User 2: Well, if you ever need help, just let me know.

    User 1: Thanks, I will!

    User 2: So, what do you do for fun?

    User 1: I like to cook. I''ve always loved to cook, and I''m pretty good at it.

    User 2: Oh, that''s awesome! I love to eat, but I''m not very good at cooking.

    User 1: Well, you can always come over for dinner sometime.

    User 2: I''d love that!

    User 1: Great! I''ll make something special.

    User 2: Sounds delicious!

    User 1: So, what''s your favorite food?

    User 2: I love steak.

    User 1: Me too! I love a good steak.

    User 2: I''m from the Midwest, so steak is a big part of our culture.

    User 1: Oh, I see. I''m from the East Coast, so we don''t have as much steak.

    User 2: Well, you''re missing out! Steak is the best!

    User 1: I''ll have to try it sometime.

    User 2: You won''t be disappointed.

    User 1: I''m sure I won''t.

    User 2: So, what do you do for a living?

    User 1: I work in a 9-to-5 job. I''m not really passionate about it, but it pays the bills.

    User 2: Oh, that''s too bad. What would you rather be doing?

    User 1: I''d love to open a bakery. I love to bake, and I think it would be really fun to own my own business.

    User 2: That would be awesome! I''m sure you''d be a great baker.

    User 1: Thanks! I think I would too.

    User 2: So, what are your plans for the future?

    User 1: I''m not sure yet. I''m still trying to figure out what I want to do with my life.

    User 2: Well, you have plenty of time to figure it out.

    User 1: I know, right? I''m just excited to see what the future holds.

    User 2: Me too! I think you''re going to do great things.

    User 1: Thanks! That means a lot.

    User 2: No problem!'
