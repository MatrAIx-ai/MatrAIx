personas:
  professional: Brittany Rider, a seasoned hospitality operations manager with a knack for staff development and meticulous budgeting, channels her vivid imagination into themed guest experiences and art‑infused
    décor, quietly leading her boutique inn to become a local cultural hub while maintaining operational excellence.
  sports: Brittany Rider walks with the Milford Senior Walking Club each morning, cheers the Boston Red Sox and Boston Celtics from her modest living room, and plays doubles in the local senior tennis league,
    favoring low‑impact, socially engaging activities over high‑intensity workouts.
  arts: Brittany Rider creates watercolor abstractions inspired by the color fields of Mark Rothko and the brushwork of Monet, devours magical realism novels by Isabel Allende and Jorge Luis Borges, and
    regularly attends community theater productions starring local talent such as Kevin Kline, weaving these artistic threads into her daily life.
  travel: Brittany Rider plans weekend getaways to historic New England gems like Salem, Newport, and Mystic with detailed itineraries, dreams of strolling through the gardens of Versailles, and balances
    her love of heritage travel with a modest budget that favors roadside inns over luxury hotels.
  culinary: Brittany Rider delights in crafting unconventional dishes like lavender‑infused honey‑glazed salmon and rosemary‑scented beet risotto, harvests native herbs from her garden for fresh seasoning,
    prefers intimate home‑cooked meals over restaurant outings, yet sometimes over‑spices in pursuit of novelty.
  core: Brittany Rider blends methodical precision with a boundless artistic imagination, turning every guest stay into a curated experience while quietly battling mild arthritis and a habit of splurging
    on premium art supplies.
background:
  cultural: Brittany’s cultural background is rooted in the traditions of New England’s white, Anglo‑American middle‑class families. She grew up in suburban Connecticut during the 1960s and 70s, experiencing
    the region’s emphasis on hard work, modesty, and community involvement. Her family attended a Protestant church, celebrated traditional holidays with a focus on family gatherings, and valued education
    and civic duty. Living her adult life in Milford, she identifies with the coastal town’s maritime heritage, local historic preservation efforts, and the region’s seasonal rhythms.
