  career_goals: Brittany aims to transform her current lodging operation into a boutique destination that showcases local art and innovative guest experiences, leveraging her imaginative flair. She aspires
    to mentor emerging hospitality managers, offering workshops on creative problem‑solving and sustainable practices. In the next five years, she plans to launch a small bed‑and‑breakfast that merges her
    love for abstract art with New England heritage, incorporating eco‑friendly initiatives and partnerships with regional artists. Ultimately, she envisions transitioning to a consulting role that helps
    other independent hotels infuse novelty and thoughtful design into their services while maintaining operational excellence.
