  career_goals: Michael aims to transition into a senior executive role—such as Chief Financial Officer—within a forward‑thinking organization that embraces innovative financial solutions and creative thinking.
    Parallel to this, he plans to launch a boutique consultancy that integrates finance with artistic concepts, offering clients novel investment strategies framed through visual storytelling. He seeks
    to earn the CFA charter, publish a book on imaginative portfolio design, and become a sought‑after speaker at finance and art conferences, thereby leaving a lasting legacy that bridges his analytical
    expertise with his artistic curiosity.
