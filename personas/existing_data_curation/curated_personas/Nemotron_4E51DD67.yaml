  arts: Jose Ahedo, a baby enchanted by the gentle cello sonatas of Yo‑Yo Ma and the playful lullabies of Raffi, they often tap tiny hands to the beat of Baby Beluga and delight in the pastel illustrations
    of Eric Carle's picture books.
  travel: Jose Ahedo, a stroller‑bound explorer who has already visited the bright indoor aquarium in town and enjoyed a sunny weekend beach getaway in Gulf Shores, they look forward to future adventures,
    and their parents hope to one day take them to the cherry blossom festivals in Tokyo.
  culinary: Jose Ahedo, a picky eater who prefers smooth pureed carrots, ripe banana mash, and occasional mild avocado, they delight in chewing on cinnamon‑flavored teething biscuits and enjoy the occasional
    family dinner of mashed sweet potatoes seasoned with a hint of rosemary.
  core: Jose Ahedo embodies a serene, curious infant who balances a practical approach to play, a measured interest in money, and a calm resilience that keeps them content even when routine changes.
background:
