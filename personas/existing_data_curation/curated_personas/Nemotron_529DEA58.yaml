  career_goals: Even at 64, David aims to transition from active firefighting to a full‑time training and safety leadership role within the Easton fire district. He hopes to earn certification as a fire
    inspector, chair the department’s safety committee, and author a practical handbook on community fire‑prevention strategies. He also wants to mentor the next generation of firefighters, ensuring that
    his decades of knowledge are preserved while reducing the personal stress that comes from watching the field evolve.
