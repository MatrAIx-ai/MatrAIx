personas:
  professional: Alain Tristani, a budding digital storyteller, blends their curiosity for new ideas with a practical knack for coding in Scratch and drawing comic‑style characters, showing how their relaxed
    yet imaginative nature fuels a future in game design.
  sports: Alain Tristani, a member of the El Paso Youth Soccer Club, enjoys weekend scrimmages with a small circle of friends, cheers for El Paso Locomotive FC, and balances the thrill of soccer with occasional
    hikes up the Franklin Mountains, preferring the freedom of informal play over structured leagues.
  arts: Alain Tristani draws inspiration from Stan Lee’s comic heroes and Los Tigres del Norte’s regional Mexican tunes, channeling that blend of visual storytelling and rhythmic narrative into elaborate
    Lego dioramas and Scratch animations that reimagine local legends.
  travel: Alain Tristani prefers short, flexible family trips that let them explore the outdoors, having already trekked to Carlsbad Caverns and dreamed of visiting Tokyo’s anime districts, all while meticulously
    (or occasionally haphazardly) packing a notebook for sketching new ideas.
  culinary: Alain Tristani loves helping in the kitchen, especially when preparing tamales and quesadillas with fresh corn masa, chilies, and queso fresco, and while their cooking skills are still budding,
    they take pride in seasoning dishes just the right amount of spice.
  core: Alain Tristani, an imaginative yet laid‑back creator, turns curiosity into comic sketches, Lego masterpieces, and spirited soccer games, while juggling a loosely managed allowance and seasonal allergies
    with a quirky mix of organization and chaos.
background:
  cultural: Alain grows up in a Mexican‑American household in El Paso, where Spanish is spoken at home and English dominates school. Family gatherings revolve around Mexican traditions such as Día de los
    Muertos altars, festive foods like tamales and pozole, and music ranging from rancheras to norteña. His parents instill respect for both American and Mexican customs, fostering a bicultural identity
    that blends border‑crossing experiences, community festivals, and a strong emphasis on family cohesion. This cultural tapestry shapes his values, language proficiency, and his appreciation for community‑focused
    projects.
attributes:
  skills: '[''Bilingual English‑Spanish communication'', ''Basic arithmetic (addition, subtraction, multiplication, division)'', ''Grade‑level reading comprehension'', ''Lego and model building'', ''Scratch
