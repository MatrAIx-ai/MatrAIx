  hobbies: '[''Lego building'', ''Scratch coding'', ''Comic drawing'', ''Small‑group soccer games'', ''Short hikes in the Franklin Mountains'', ''Listening to regional Mexican music'', ''Assisting with
    family cooking during cultural celebrations'']'
  career_goals: Alain dreams of becoming an engineer who designs practical solutions for his community, such as flood‑resistant playgrounds or sustainable bike racks. He is drawn to the idea of mixing creativity
    with real‑world impact, and envisions studying robotics or civil engineering in the future. Alongside this technical ambition, he would like to be a mentor for younger kids in his neighborhood, sharing
    his love for building and coding in informal, small‑group settings.
