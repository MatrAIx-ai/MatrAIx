persona_description: A Program Analyst who is responsible for developing, testing, and training employees on how to use a computer program. They have a strong background in computer programming and have
  experience in planning, development, and testing computer programs. They are highly skilled in analyzing business needs and designing effective computer programs to meet those needs. They have a bachelor's
  degree in a computer science-related field and have at least 5 years of experience in program analysis. They are responsible for training staff on software and reporting systems, supporting requirements
  and metrics development, and analyzing data to produce forecasts, assessments, recommendations, and reports.
