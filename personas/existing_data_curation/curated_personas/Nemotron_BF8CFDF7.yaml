personas:
  professional: Gilberto Flores is an elementary and middle‑school teacher who blends data‑driven instruction with bilingual, culturally responsive curricula, using their practical mindset and calm assertiveness
    to swiftly adapt lessons while maintaining a structured classroom environment.
  sports: Gilberto Flores follows Liga MX passionately, cheering for Club América while also joining neighborhood pickup soccer games on Sundays; they spend early mornings fishing the Colorado River and
    hike the Anza‑Borrego desert trails, balancing team loyalty with personal outdoor fitness.
  arts: Gilberto Flores enjoys listening to mariachi bands and classic corridos during family gatherings, unwinds with mystery novels by Agatha Christie, and volunteers at community Dia de los Muertos art
    installations, letting the blend of music, literature, and visual tradition shape their leisure.
  travel: Gilberto Flores prefers spontaneous weekend road trips to nearby desert escapes like Joshua Tree and cultural pilgrimages such as San Diego’s Old Town or Oaxaca’s Day of the Dead festivities;
    they balance limited vacation time with a desire to expose their children to cross‑border experiences.
  culinary: Gilberto Flores, an avid home cook, perfects tacos al pastor using pineapple, achiote, and chilies, slowly simmers mole poblano with chocolate and assorted chiles, and experiments with fresh
    garden herbs like cilantro and epazote to create family‑style meals that celebrate traditional flavors while inviting new twists; they love sharing these dishes at community gatherings.
  core: Gilberto Flores blends structured classroom leadership with a laid‑back, flexible home life, juggling meticulous lesson plans alongside a habit of forgetting to water their potted plants until the
    last minute, all while championing family rituals and community celebrations.
background:
  cultural: Gilberto was raised in a Mexican immigrant family on the U.S.–Mexico border, making Spanish his first language and exposing him to a blend of Mexican customs and Southern California culture.
    He values family cohesion, respeto, and communal celebrations, and maintains strong ties to his heritage through food, music, and participation in local cultural events. His bicultural experience informs
    his teaching philosophy, emphasizing bilingual education, cultural pride, and bridging cross‑border perspectives for his students.
