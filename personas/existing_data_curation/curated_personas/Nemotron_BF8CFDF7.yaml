  hobbies: '[''Gardening'', ''Cooking Mexican cuisine'', ''Watching soccer'', ''Playing pickup soccer'', ''Fishing'', ''Desert hiking'', ''Reading mystery novels'', ''Attending community festivals'', ''Participating
    in Dia de los Muertos events'']'
  career_goals: Gilberto aims to move into a leadership role within his district, such as curriculum coordinator or bilingual program director, where he can shape systemic support for English‑language learners.
    He plans to pursue a master's in educational leadership while continuing to mentor new teachers. In the long term, he hopes to spearhead a cross‑border partnership that brings resources and cultural
    exchanges between Calexico schools and Mexican counterpart schools, enhancing student engagement and community ties.
