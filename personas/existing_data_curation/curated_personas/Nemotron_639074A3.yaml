personas:
  professional: Eric Faulkenberry, a one‑year‑old budding explorer, treats every block tower as a research project, methodically aligning each piece while also delighting in sudden, unplanned collapses
    that keep the playroom both orderly and chaotic, and they giggle whenever a tower falls.
  sports: Eric Faulkenberry, a one‑year‑old who explores the living room with energetic crawling sessions, attends weekly parent‑child swimming lessons at the local community pool and giggles with delight
    whenever the Red Sox game plays on the TV, and they often splash water droplets in cheerful, unstructured bursts.
  arts: Eric Faulkenberry, a one‑year‑old who delights in the animated melodies of Sesame Street and the gentle guitar strums of folk artist Raffi, spends quiet moments gazing at picture books by Dr. Seuss,
    and they hum along, clapping tiny hands to rhythmic tunes.
  travel: Eric Faulkenberry, a one‑year‑old who has already taken family road trips to the Grand Canyon and a weekend stay at a beachfront resort in Florida, prefers stroller‑friendly attractions and the
    comforting routine of familiar bedtime stories while traveling, and they often stare wide‑eyed at open skies, absorbing new sensory experiences.
  culinary: Eric Faulkenberry, a one‑year‑old with a developing palate, enjoys smooth sweet‑potato puree, avocado mash, and banana cereal, consistently refuses peas, can skillfully self‑feed with a sippy
    cup despite occasional splatters, and they brighten when presented with a new texture to explore.
  core: Eric Faulkenberry, a one‑year‑old balancing a love for predictable routines with sudden bursts of curiosity, often charms caregivers while quietly battling mild worries about new experiences, and
    they seek comfort in familiar patterns.
