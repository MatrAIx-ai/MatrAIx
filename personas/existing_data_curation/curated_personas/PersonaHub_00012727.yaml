persona_description: A molecular biologist who is interested in studying the dynamic changes in the composition of viral replication complexes during infection and how these changes are linked to altered
  replication complex function. The person is also interested in understanding how heterogenous this process is on a single-cell level and how heterogenous viral proteases can interact with cellular proteins
  to subvert cellular processes and inhibit immune signaling. The individual is using mass spectrometry-based approaches to track cleavage over time, identify protease substrates, and monitor subcellular
  localization. The person is also interested in applying more traditional microscopy-based and molecular biology approaches to investigate this phenomenon.
