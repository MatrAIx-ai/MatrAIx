  hobbies: '[''Woodworking'', ''Model railroad building'', ''Desert hiking'', ''Reading technical non-fiction'', ''Online chess'', ''Home-brewing craft beer'']'
  career_goals: He aims to advance to a senior sales operations manager role within the next three years, overseeing multiple regional teams and driving strategic initiatives that increase revenue efficiency.
    Long-term, Tommy envisions a director-level position where he can shape corporate sales processes, integrate advanced analytics, and mentor emerging leaders. He is also considering establishing a boutique
    consulting firm focused on operational efficiency for B2B sales organizations, leveraging his expertise in data-driven process improvement while maintaining a structured, solitary work style.
