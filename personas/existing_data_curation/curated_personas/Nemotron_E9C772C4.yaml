  hobbies: '[''Sketching'', ''Photography'', ''3D Printing'', ''Arduino tinkering'', ''Metal sculpture'', ''Reading science-fiction'', ''Philosophy'', ''Acoustic guitar'', ''Hiking'', ''Volunteering at
    art fairs'']'
  career_goals: Firas aims to transition from standard assembly work to a role that merges his fabrication expertise with his artistic inclinations. He plans to obtain advanced certifications in CNC programming
    and welding, develop a portfolio of custom metal and mixed‑media sculptures, and eventually launch a small studio where he can design and produce one‑of‑a‑kind pieces for local businesses and private
    clients. He also hopes to teach workshops on creative fabrication, sharing his knowledge while maintaining a flexible schedule that supports his imaginative pursuits.
