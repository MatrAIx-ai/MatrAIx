personas:
  professional: Firas Kent is a seasoned metal fabricator who leverages their welding and CNC expertise to create avant‑garde mixed‑media sculptures, while their imagination and love of abstract concepts
    drive them to pursue a freelance studio and teach improvisational fabrication workshops, even if their loose scheduling sometimes threatens deadlines.
  sports: Firas Kent enjoys weekend hikes with the West Texas Hiking Club across the Chihuahuan Desert, follows the Dallas Cowboys and Houston Rockets passionately, and squeezes in occasional pickup basketball
    at the local community center, but their disorganized routine sometimes leaves their gym membership underused.
  arts: Firas Kent finds inspiration in the surreal paintings of Salvador Dalí, the night‑photography of Ansel Adams, and the haunting metalwork of Alexander Calder, frequently performing acoustic renditions
    of Neil Young at jam sessions while sketching speculative sci‑fi scenes that blend philosophical musings with organic forms.
  travel: Firas Kent prefers off‑the‑beaten‑path road trips, having explored the rugged canyons of Big Bend, the aurora‑lit skies of Iceland, and the ancient metalwork markets of Fez, yet they favor planning
    only key stops while leaving ample room for spontaneous detours, balancing limited studio downtime with their wanderlust.
  culinary: Firas Kent enjoys cooking smoky chipotle‑brisket tacos topped with pickled red onions and fresh cilantro, experiments with hand‑rolled avocado‑filled sushi on weekends, and relishes the occasional
    craft‑brew tasting, although their improvisational cooking style sometimes results in over‑seasoned experiments.
  core: Firas Kent is a 44‑year‑old maker who fuses metal‑working precision with a dreamy artistic vision, juggling a chaotic schedule, a modest financial plan, and a love for night skies, all while humming
    guitar chords between welding sparks.
background:
  cultural: Firas grew up in the West Texas region, where the blend of rural simplicity and the open‑range frontier has shaped his values of self‑reliance and flexibility. His family’s heritage traces back
    to Midwestern roots with Lutheran/Protestant traditions that emphasized community service and modesty. Living in Abilene has exposed him to Texan cultural elements such as country music, barbecue gatherings,
    and a strong local crafts scene, which have fed his appreciation for hands‑on creation while allowing him to pursue his imaginative interests.
