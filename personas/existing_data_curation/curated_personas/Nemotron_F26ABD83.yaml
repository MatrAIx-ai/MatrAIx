personas:
  professional: Jesse Stephens is a pragmatic hands‑on maintenance specialist who blends street‑wise problem solving with a budding interest in community coordination; they leverage carpentry, basic electrical,
    and simple plumbing skills to keep neighborhood facilities running while navigating the tension between a love for structure and spontaneous, on‑the‑fly fixes.
  sports: Jesse Stephens is a dedicated pick‑up basketball player at the local recreation center and an avid fan of the Baltimore Ravens, the Baltimore Orioles, and the Boston Celtics; they also jog with
    a community running club in the spring and join a recreational volleyball league during the summer.
  arts: Jesse Stephens is a rhythm‑obsessed percussionist who blends classic Motown (Marvin Gaye), modern hip‑hop (Kendrick Lamar), and jazz (Miles Davis) into nightly jam sessions on the djembe; they frequent
    local block parties and attend live performances at the Keystone while curating vinyl collections of Stevie Wonder and A Tribe Called Quest.
  travel: Jesse Stephens is an adventurous weekend traveler who prefers spontaneous road trips to Chesapeake Bay and the Outer Banks, and holds a bucket‑list wish to explore New Orleans for its jazz scene
    and Mexico City for its street food; they usually budget via a dedicated travel fund but often delay bookings until the last minute.
  culinary: Jesse Stephens is a soulful home‑cook who prepares collard greens, fried chicken, shrimp and grits, and mac & cheese for friends, blending cayenne pepper and smoked turkey into dishes while
    experimenting with homemade spice blends; they sometimes over‑season due to listening to loud music while cooking.
  core: Jesse Stephens balances a love for structured, hands‑on repair work with spontaneous community jam sessions, a budgeting habit that mixes careful saving with impulsive vintage gadget purchases,
    mild health quirks, and a relentless drive to mentor at‑risk youth despite occasional forgetfulness.
background:
  cultural: Jesse grew up in a close‑knit African‑American community on Baltimore's East Side. His upbringing immersed him in the city's rich musical legacy, community resilience, and a strong sense of
    neighborhood solidarity. He identifies with the traditions of local churches, street festivals, and the oral storytelling culture that emphasizes mutual support and perseverance amid urban challenges.
