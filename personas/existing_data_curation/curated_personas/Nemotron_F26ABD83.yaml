  career_goals: Jesse aims to earn his GED within the next year and secure a stable position in a skilled trade such as maintenance or security. He hopes to combine his practical repair skills with his
    knack for community coordination to work as a facilities manager for a local youth center. Longer‑term, he aspires to launch a mentorship program that helps at‑risk Baltimore youth develop job‑ready
    skills while preserving neighborhood culture.
