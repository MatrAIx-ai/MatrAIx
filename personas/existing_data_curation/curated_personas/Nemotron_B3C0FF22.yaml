  hobbies: '[''Visiting the Toledo Museum of Art'', ''Sketching architectural and industrial forms'', ''Photography of industrial landscapes'', ''Metal sculpture creation'', ''Restoring vintage motorcycles'',
    ''Reading historical biographies and technical literature'', ''Attending live jazz and R&B concerts'', ''Mentoring high‑school students in STEM'', ''Gardening in her backyard'', ''Cooking traditional
    Southern and soul‑food dishes'']'
  career_goals: Betty aspires to move into a supervisory role within the plant’s maintenance department, aiming to become a Maintenance Supervisor or Reliability Engineer over the next five years. She plans
    to earn certifications such as the Certified Maintenance & Reliability Technician (CMRT) and an advanced welding certification to deepen her credibility. Driven by her love for continuous learning,
    she also intends to pursue coursework in industrial automation and robotics to bridge traditional mechanical work with modern smart‑factory technologies. Long‑term, Betty envisions opening a community‑focused
    repair shop that offers affordable equipment servicing and apprenticeships for local youth, especially underrepresented minorities, thereby giving back to the Toledo community that shaped her career.
