personas:
  professional: Betty Prater, a veteran industrial and refractory machinery mechanic with over twenty years of hands‑on experience, blends meticulous troubleshooting of hydraulic and pneumatic systems with
    a collaborative mentorship style that fosters junior technicians while charting a path toward a supervisory role in reliability engineering, and they consistently apply methodical planning to every
    maintenance schedule.
  sports: Betty Prater roots for the Detroit Lions, tracks the Cleveland Guardians, and joins a church‑organized adult softball league each Saturday, finding the regular competition a perfect blend of physical
    activity and community connection that they value.
  arts: Betty Prater immerses in the arts by sketching architectural details at the Toledo Museum of Art, attending live jazz nights at Huber’s Backyard, collecting vintage jazz vinyls from artists like
    John Coltrane and Ella Fitzgerald, and showcasing personal metal sculptures at community art fairs, where they merge technical precision with creative expression.
  travel: Betty Prater favors road trips that blend cultural immersion and industrial curiosity, having driven the historic Route 66 to explore vintage factories in Chicago and planning a future visit to
    the Smithsonian’s National Museum of American History in Washington, D.C., yet they often postpone international travel because the upcoming community repair shop demands most of their time and resources.
  culinary: Betty Prater’s palate gravitates toward soul‑food classics like smoked brisket, collard greens, and cornbread, which they often recreate from family recipes using fresh herbs and spice blends,
    while they also experiment with aromatic rubs on restored motorcycle frames for a quirky, sensory twist.
  core: Betty Prater is a disciplined mechanic‑artist who balances precision work with jazz‑filled creativity, mentors youth, meticulously plans their financial future, and occasionally indulges in spontaneous
    vintage‑motorcycle projects.
background:
  cultural: Betty identifies as an African‑American woman whose roots trace back to the Great Migration families that settled in the Midwest during the early 20th century. Growing up in Toledo’s vibrant
    Black community, she was deeply influenced by the church’s emphasis on service, resilience, and education, which helped shape her strong work ethic and collaborative spirit. Her cultural heritage celebrates
    storytelling, music, and creativity; these traditions inspire her love for jazz, soul food, and the visual arts. As a Black mechanic in a traditionally male‑dominated field, Betty has navigated both
    challenges and pride, often drawing strength from community organizations that champion minority representation in skilled trades. This background fuels her commitment to mentorship and to creating
    pathways for other Black youth to pursue technical careers while preserving the cultural richness of her family’s history.
attributes:
  skills: '[''Industrial machinery maintenance'', ''Refractory furnace repair'', ''Hydraulic and pneumatic system troubleshooting'', ''MIG/TIG welding'', ''Blueprint and schematic interpretation'', ''Preventive
