  hobbies: '[''Soccer and tag games'', ''LEGO building'', ''Reading adventure and animal books'', ''Drawing and watercolor painting'', ''Exploring local nature trails and lakes'', ''Singing in the church
    children’s choir'', ''Playing board games with family'']'
  career_goals: Theresa dreams of becoming an elementary school teacher so she can share her love of reading, storytelling, and collaborative games with other children. She also harbors a budding interest
    in caring for animals and imagines studying to become a veterinarian one day. Her ideal career would blend creativity, interaction, and flexibility, allowing her to stay active, work with peers, and
    keep a schedule that lets her explore new ideas while staying grounded in practical, hands‑on work.
