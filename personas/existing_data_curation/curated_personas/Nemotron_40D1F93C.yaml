  hobbies: '[''Watercolor painting'', ''Mixed-media art projects'', ''Quilting'', ''Visiting art galleries and museums'', ''Book club participation'', ''Community theater volunteering'', ''Gardening'',
    ''Hiking nature trails'', ''Cooking experimental recipes'', ''Yoga and mindfulness practice'', ''Facilitating group craft sessions'']'
  career_goals: Alexandra aims to transform her love of art and community into a series of local arts-and-wellness workshops, possibly as a volunteer facilitator at the Saginaw community center. She is
    interested in pursuing a certification in peer counseling or art therapy to better support others while also learning coping strategies for her own anxiety. Long-term, she hopes to mentor younger volunteers,
    expand the workshop program, and perhaps launch a small home-based studio selling her handmade crafts.
