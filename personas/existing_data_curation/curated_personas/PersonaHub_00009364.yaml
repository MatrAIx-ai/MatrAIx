persona_description: A passionate advocate for Indigenous rights and reconciliation, with a deep understanding of the cultural, social, and economic issues facing Indigenous communities in Australia. This
  individual has a strong commitment to supporting the development of a sustainable National Indigenous Representative Body that provides independent and well-resourced Aboriginal representation to the
  government of the day. They are also knowledgeable about the importance of rights to resources, and have supported the NSW Aboriginal Fishing Rights Group's bid to secure cultural and commercial access
  to marine resources on the NSW coast. Additionally, they have a unique understanding of the connection between traditional Indigenous rights and the incarceration of Aboriginal people for customary fishing,
  and have supported the production of identity cards that confirm the bona fide native title rights of each holder.
