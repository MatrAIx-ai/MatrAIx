persona_description: A high school mathematics teacher who advocates for the importance of STEM education and encourages girls to pursue careers in science, technology, engineering, and mathematics. The
  individual is passionate about promoting gender equality in STEM fields and believes that by addressing the gaps in participation and opportunities, we can close the gender gap in technical jobs for the
  future. The teacher is also knowledgeable about the challenges faced by women in STEM fields, such as the lack of career opportunities and the bias in favor of boys in science classes. The individual
  is committed to improving the education system to better prepare young girls for STEM careers and is open to trying new practices and resources to achieve this goal.
