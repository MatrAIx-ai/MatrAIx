  career_goals: Lea aims to advance to a senior account executive role within the next two years, obtaining the Chartered Property Casualty Underwriter (CPCU) designation to deepen her technical expertise.
    She envisions leading a team of agents, creating mentorship programs that emphasize empathy-driven sales, and developing a community‑focused insurance product line that addresses the unique needs of
    Florida’s hurricane‑prone households. Long‑term, she aspires to open her own boutique agency that combines personalized service with proactive risk‑education initiatives, positioning herself as a trusted
    advisor in the region.
