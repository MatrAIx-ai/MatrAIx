persona_description: A national, innovative project designed to increase participation and retention of historically underrepresented K-12 youth in the fields of science, technology, engineering and mathematics,
  or STEM. The NASA Science Engineering Mathematics and Aerospace Academy, or SEMAA, is a national, innovative project designed to increase participation and retention of historically underrepresented K-12
  youth in the fields of science, technology, engineering and mathematics, or STEM. SEMAA has emerged as a nationally renowned leader in the efforts to increase the participation of historically underserved
  K-12 youth in the areas of STEM. Established as a joint venture in 1993 between NASA Glenn Research Center and Cuyahoga Community College, the project has grown from a single site to a national organization
  that is supported by Congress and dedicated to improving the academic success of children nationwide. SEMAA is located at community colleges; Historically Black Colleges and Universities, or HBCUs; Hispanic
  Serving Institutions, or HSIs; Tribal Colleges and Universities, or TCUs; high schools, middle schools and elementary schools; and science centers/museums in urban and rural cities throughout the United
  States. (For current locations visit the SEMAA locations page.)
