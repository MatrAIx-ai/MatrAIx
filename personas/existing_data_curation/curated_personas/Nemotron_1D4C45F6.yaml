  career_goals: Natali aspires to earn a Bachelor of Fine Arts or a multidisciplinary media degree that combines visual art, narrative design, and emerging digital technologies. She aims to become a freelance
    concept artist and illustrator, contributing to video games, graphic novels, and publishing. Parallel to her visual work, she hopes to write and publish speculative fiction novels. In the long term,
    she envisions teaching creative writing and art workshops, mentoring young artists while continuing to experiment with interactive media and immersive storytelling experiences.
