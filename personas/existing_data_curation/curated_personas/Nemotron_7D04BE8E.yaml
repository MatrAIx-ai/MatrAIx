  career_goals: Evelin dreams of becoming a marine biologist so she can explore tide pools and study sea life up close, a goal inspired by her frequent beach visits. She also imagines herself as an engineer
    who designs sustainable ocean‑friendly structures, combining her love of building and practical problem‑solving. Her competitive nature fuels a desire to excel in school science fairs and, in the future,
    possibly play soccer at a high level.
