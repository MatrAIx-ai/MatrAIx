personas:
  professional: Evelin Slaker, an aspiring marine biologist in training, blends a practical love for tide‑pool exploration with the patience required to follow LEGO instructions, showing a structured yet
    flexible mindset that thrives on hands‑on investigation.
  sports: Evelin Slaker, a budding surfer and junior soccer player for the Encinitas Falcons youth league, spends afternoons riding waves at Swami’s Beach and Saturdays kicking balls with friends, while
    cheering for the LA Dodgers and Los Angeles Galaxy, illustrating a love of both coastal and team sports.
  arts: Evelin Slaker, an enthusiastic drawer of sea creatures, frequently sketches kelp forests inspired by National Geographic Kids and watches Studio Ghibli films like Princess Mononoke and Spirited
    Away, while humming tunes from Jack Johnson and singing along at the beach bonfire.
  travel: Evelin Slaker, an adventurous planner, prefers day trips to nearby tide‑pools at La Jolla and weekend family outings to the San Diego Zoo, while dreaming of snorkeling in the Great Barrier Reef
    and exploring the coastal cliffs of Cornwall, balancing structured itineraries with spontaneous beach discoveries.
  culinary: Evelin Slaker, a budding home chef, loves assembling fish tacos with fresh cilantro, lime, and avocado, enjoys making fruit‑laden smoothies with banana and mango, and proudly helps stir mac & cheese
    on the stove, though they sometimes over‑season their dishes in a burst of excitement.
  core: Evelin Slaker, a pragmatic eight‑year‑old who blends structured curiosity with occasional beach‑side impulsiveness, navigates life with a mix of disciplined routines and laid‑back spontaneity.
background:
  cultural: Evelin was raised in Encinitas, a laid‑back coastal community in Southern California. Her family, of primarily Anglo‑American ancestry, values outdoor recreation, environmental stewardship,
    and community involvement. She participates in local beach clean‑ups, surf lessons, and school activities that emphasize nature and sustainability. She celebrates typical American holidays and enjoys
    a blend of regional coastal culture and broader American traditions.
