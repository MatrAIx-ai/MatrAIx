personas:
  professional: Marcella West, an 18‑year‑old production floor operator with expertise in packaging and filling machine setup, calibration, and preventive maintenance, leverages her strong organizational
    skills and artistic curiosity to suggest aesthetic improvements while reliably meeting OSHA safety standards and documenting quality control data.
  sports: Marcella West, an avid hiker who weekends with the Blue Ridge Trail Club, plays pick‑up soccer at the county recreation center, and cheers for the Charlotte Hornets and Carolina Panthers, uses
    outdoor activity as a grounding technique for anxiety while staying fit.
  arts: Marcella West, a watercolor enthusiast who paints the misty Blue Ridge peaks, captures industrial textures in black‑and‑white photography inspired by Ansel Adams, sketches folk‑inspired album covers
    in the style of Joanna Newsom, volunteers in set design for the Ashe County Playhouse, and draws graphic‑design concepts for local boutique shops, finds solace and identity in creative expression.
  travel: Marcella West, who prefers budget-friendly road trips that blend hiking in Shenandoah National Park and visiting indie art festivals in Asheville, dreams of trekking New Zealand’s South Island
    during a gap year, and meticulously plans itineraries on a spreadsheet while balancing limited student funds.
  culinary: Marcella West, a modest home cook who enjoys rustically seasoning roasted root vegetables with rosemary, whipping up quick pesto pasta, baking blueberry muffins with fresh farm berries, and
    treats herself to a seasonal pumpkin latte from the local roaster, often experiments with simple plating inspired by her packaging design interests.
  core: Marcella West is a hyper‑creative, anxiety‑prone 18‑year‑old who balances precise machine maintenance with spontaneous watercolor sessions, budgets tightly yet splurges on art supplies, and finds
    calm in hiking and journaling while occasionally neglecting sleep.
background:
  cultural: Marcella grew up in Glade Spring, a small Appalachian town in southwestern Virginia, within a predominantly white, rural community that values self‑reliance, close‑knit family ties, church gatherings,
    and county fairs. Her family’s roots in local agriculture and manufacturing have instilled a strong work ethic and respect for tradition. The region’s cultural fabric includes folk music, storytelling,
    and an appreciation for the natural landscape. While she embraces these traditions, her curiosity and exposure to broader artistic influences through school, the internet, and local art clubs have shaped
    an eclectic worldview that blends Appalachian heritage with contemporary artistic sensibilities.
attributes:
