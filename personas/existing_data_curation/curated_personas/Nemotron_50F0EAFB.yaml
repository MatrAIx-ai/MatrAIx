    Photoshop)'', ''Creative visual thinking'']'
  hobbies: '[''Watercolor painting'', ''Sketching'', ''Nature photography'', ''Hiking in the Blue Ridge'', ''Listening to folk/indie music'', ''Reading poetry and self‑help books'', ''Journaling'', ''Attending
    community theater'', ''Volunteering at animal shelter'', ''DIY crafts'', ''Exploring graphic design software'']'
  career_goals: Marcella aims to earn an Industrial Maintenance Technician certification through a community college, which will allow her to transition into a maintenance or engineering support role within
    manufacturing. In the longer term she hopes to combine her operational experience with her artistic interests by moving into packaging design or product development, influencing both the functionality
    and visual appeal of consumer goods. She also aspires to lead a small shift team, using her reliability and cooperative nature, and to deepen her understanding of mental health so she can become a peer‑support
    advocate for anxiety awareness.
