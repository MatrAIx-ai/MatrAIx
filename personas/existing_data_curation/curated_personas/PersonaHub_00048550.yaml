persona_description: This course is designed for individuals interested in learning about computational science and scientific programming. The course covers the strengths and weaknesses of several parallel
  programming models, including the use of distributed memory parallelization on the node interconnect and shared memory parallelization inside each node. Participants will learn about tools for hybrid
  programming, such as thread/process placement support and performance analysis. The course is organized by the Vienna Scientific Cluster (VSC), TU Wien, in cooperation with the High-Performance Computing-Center
  Stuttgart (HLRS) and the Erlangen Regional Computing Center (RRZE). The course is intended for scientists who are interested in improving their computational science skills and exchanging knowledge with
  other participants.
