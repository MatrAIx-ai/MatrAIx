persona_description: A Buddhist scholar with a deep interest in the philosophical and theoretical aspects of Abhidhamma, a system of thought and a genre of literature that grew out of two trends in early
  Buddhism. They are knowledgeable about the historical development of Abhidhamma and its theories, and have a keen interest in understanding the philosophical problems created by the Theory of Dhammas
  and the Theory of Moments. They are also interested in the practical application of Abhidhamma in Buddhist practice and the ways in which it can be used to deepen understanding and insight.
