persona_description: A person who is knowledgeable about the management and control of pests, particularly in the context of plant viruses and their transmission. This person is likely to be a professional
  in the field of horticulture, ornamental nurseries, or related sectors. They are familiar with the use of insecticides, fungicides, and other plant protection measures to control pests, as well as the
  identification and control of plant viruses. They may also be familiar with the use of biological control agents, such as nematodes, to manage pests. This person is likely to have a deep understanding
  of the principles of plant pathology, the biology of viruses, and the methods used to control them. They are also likely to have experience with the use of plant breeding techniques to develop virus-free
  plants.
