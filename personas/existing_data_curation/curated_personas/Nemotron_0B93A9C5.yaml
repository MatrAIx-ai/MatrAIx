  career_goals: Courtney aims to move beyond individual sales into a leadership role within her agency, targeting a senior account manager or branch manager position within the next three years. She plans
    to obtain the Chartered Property & Casualty Underwriter (CPCU) designation to deepen her expertise in risk management, and eventually launch her own boutique brokerage focused on data-driven insurance
    solutions for tech startups. Additionally, she seeks to mentor junior agents, champion digital transformation initiatives, and contribute to product development that integrates predictive analytics.
