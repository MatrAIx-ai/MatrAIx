personas:
  professional: Courtney Stoltz blends rigorous STEM training with seasoned insurance sales expertise, leveraging advanced Excel modeling and SQL to create data‑driven underwriting solutions while mentoring
    junior agents with a calm, competitive edge.
  sports: Courtney Stoltz tackles the Columbia River Gorge on weekend trail runs with the Oregon Track Club, follows the Portland Trail Blazers for basketball, and participates in a local weekend hiking
    group that meets at Forest Park, maintaining fitness through solo endurance activities rather than team sports.
  arts: Courtney Stoltz curates quiet evenings of mystery novels by Tana French and science non‑fiction by Carl Sagan, enjoys the atmospheric guitar work of The Decemberists, and visits the Portland Art
    Museum to study Pacific Northwest landscape paintings, allowing artistic appreciation to complement analytical pursuits.
  travel: Courtney Stoltz prefers meticulously planned eco‑friendly trips, having trekked the rugged coast of Iceland, explored the alpine trails of Banff, and longing to wander the lavender fields of Provence,
    yet always returns home to the Pacific Northwest to recharge in familiar forests.
  culinary: Courtney Stoltz brews a precise pour‑over with 92 °C water using Ethiopian Yirgacheffe beans, tends a balcony garden of rosemary and heirloom tomatoes, and experiments with a simple miso‑glazed
    salmon dish, while indulging in occasional wine tastings at local microbreweries like BridgePort.
  core: Courtney Stoltz is a calm, data‑driven insurance strategist who channels a love of solitary hikes, meticulous coffee brewing, and competitive ambition into a disciplined professional and personal
    life, even if they sometimes skip flossing.
background:
  cultural: Courtney grew up in a middle-class family in the Pacific Northwest, immersed in the region's outdoors-oriented, environmentally conscious culture. Her white American background includes a blend
    of progressive Portland values--sustainability, self-reliance, and pragmatic problem-solving--shaped by a solid public-school education and a STEM graduate degree from a regional university. While she
    appreciates the city's cultural diversity, her reserved nature leads her to adopt a more individualistic worldview that emphasizes personal accountability, curiosity tempered with practicality, and
    a calm, resilient approach to challenges.
