  career_goals: Patricia aims to move from a purchasing agent role to a senior procurement manager position within the next three years, focusing on building a data‑driven sourcing function that emphasizes
    sustainability and supplier diversity. She is eager to lead strategic initiatives that integrate AI‑based spend analysis and automated contract management. Long‑term, she envisions becoming a director
    of supply chain operations, where she can mentor younger professionals, champion process improvements, and shape corporate procurement policy. To support these goals, she plans to earn a Certified Professional
    in Supply Management (CPSM) credential and pursue leadership training to improve organization and stress‑management skills.
