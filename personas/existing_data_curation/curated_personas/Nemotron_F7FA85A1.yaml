personas:
  professional: Rico Mckinney is a preschool‑aged builder who, while quietly preferring solitary play, meticulously arranges LEGO sets into intricate cityscapes, flexibly improvises when pieces are missing,
    and fiercely competes with peers to complete designs first, often feeling a surge of frustration when a tower collapses.
  sports: Rico Mckinney loves swimming lessons at the community pool in summer, plays on the Sunnyville Tigers Little League T‑ball team in spring, cheers on the Chicago Cubs during televised games, yet
    prefers solitary practice with a mini‑basketball hoop at home over large group matches.
  arts: Rico Mckinney spends afternoons finger‑painting to the whimsical tunes of The Wiggles, flips through picture books by Eric Carle, and watches the animated short "Piper," finding bright colors and
    simple melodies a soothing escape when anxiety spikes.
  travel: Rico Mckinney enjoys short family road trips to the local zoo and the beach, eagerly counts seashells on the Atlantic shore, and dreams of a colorful train ride to Disneyland Paris where meeting
    beloved cartoon characters feels both thrilling and comforting.
  culinary: Rico Mckinney prefers simple, familiar bites like chicken nuggets with honey‑mustard, creamy mac and cheese sprinkled with cheddar, and apple slices dipped in peanut butter, but occasionally
    experiments by mixing peas into pancake batter, showing a budding curiosity for flavor combos despite a stubborn aversion to broccoli.
  core: Rico Mckinney is a curious yet anxious four‑year‑old whose love of art and structured play collides with intense emotional swings, making them a meticulous little builder who sometimes retreats
    into solitary worlds when overwhelmed.
background:
  cultural: Rico comes from an African‑American family that values storytelling, music, and community gatherings. His parents incorporate gospel and jazz rhythms at home, and they celebrate cultural holidays
    such as Kwanzaa, teaching him the principles of unity, self‑determination, and collective work. Living in Aurora, Colorado, he participates in neighborhood events that blend his family’s heritage with
    the diverse cultural fabric of the city, including community picnics, children’s festivals, and local art programs that expose him to both traditional African art and contemporary American influences.
