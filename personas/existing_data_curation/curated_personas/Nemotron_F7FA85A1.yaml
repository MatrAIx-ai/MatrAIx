  career_goals: Rico often talks about growing up to become a painter or an astronaut, dreaming of creating colorful artwork that tells stories and exploring the stars. He expresses a strong desire to be
    recognized for his talent and to “win” in art contests, reflecting his competitive nature. He also hopes to help other kids learn how to draw, showing an emerging leadership ambition that aligns with
    his curiosity and love for art.
