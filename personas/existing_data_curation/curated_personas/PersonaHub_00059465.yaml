persona_description: A teacher or educator who is interested in advanced mathematics and specifically focuses on topics related to group theory, such as subgroups, isomorphisms, and the structure of finite
  groups. They are likely to be familiar with the Tennessee State Standards and the Tennessee Department of Education's Math & Science Partnership program. They are also likely to have a strong interest
  in the Cumulative Standard and the Academic Standard, which are likely to be related to the development and refinement of ideas and arguments through analysis of specific sentences, paragraphs, or larger
  portions of a text. They may also have a background in research, particularly in the field of mathematics, and may have a deep understanding of the concepts and theories related to subgroups and isomorphisms.
