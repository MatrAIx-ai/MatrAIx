  hobbies: '[''Visiting art galleries'', ''Painting and mixed media'', ''DIY craft projects'', ''Exploring Austin’s live music scene'', ''Hiking and nature walks'', ''Yoga and meditation'', ''Experimenting
    with fusion cooking'', ''Attending STEAM workshops and tech meetups'', ''Reading science fiction and educational theory'', ''Photography'', ''Board games'', ''Volunteer tutoring in bilingual programs'']'
  career_goals: Marisol aims to become a district director of early‑childhood education, leading the implementation of inclusive, bilingual STEAM programs across Austin schools. She plans to pursue a master's
    degree in education administration, expand her expertise in policy advocacy, and eventually launch a community‑based makerspace preschool that blends art, technology, and Spanish cultural experiences.
    Securing sustainable funding and influencing state‑wide early‑learning standards are key milestones in her career trajectory.
