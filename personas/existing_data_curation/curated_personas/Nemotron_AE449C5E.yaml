personas:
  professional: Marisol Correa leverages her STEM background and bilingual fluency as an early‑childhood education administrator in Austin, designing innovative STEAM curricula, securing grants through
    persuasive writing, and fostering collaborative, flexible team cultures while occasionally letting loose scheduling become chaotic due to her relaxed stance on rigid planning.
  sports: Marisol Correa enjoys weekend hikes on Hill Country trails, practices yoga at the local studio, cheers for Austin FC in MLS matches, follows the Texas Longhorns basketball team, and belongs to
    a community running club that meets twice a week, preferring low‑impact cardio over competitive sports.
  arts: Marisol Correa immerses herself in Austin’s vibrant arts scene, painting mixed‑media pieces inspired by the street murals of Shepard Fairey, attending live shows featuring St. Vincent and The Flaming
    Lips, and curating a personal photo collection of urban graffiti, while occasionally staying up late to sketch after concerts.
  travel: Marisol Correa’s travel style mixes spontaneous weekend road trips to Hill Country wineries with deliberate wanderlust for Barcelona’s architecture, the bustling markets of Oaxaca, and a recent
    solo backpacking adventure through Kyoto’s temples, always budgeting enough for occasional splurges on local art workshops.
  culinary: Marisol Correa’s kitchen experiments fuse Spanish paella with Tex‑Mex tacos, layering saffron‑infused rice with chipotle‑marinated carne asada and topping with fresh pico de gallo and smoked
    paprika, reflecting a moderate cooking skill that balances careful recipe following with creative improvisation.
  core: Marisol Correa is a curious, art‑loving early‑education leader who thrives on flexible collaboration, occasionally lets deadlines slip, and channels her competitive edge into designing bold, bilingual
    STEAM experiences.
background:
  cultural: Marisol is a second‑generation Spanish‑American who grew up speaking both Spanish and English at home. Family traditions such as Semana Santa, Día de los Reyes, and shared meals of paella and
    tapas remain central to her identity. Living in Austin, she blends her Spanish heritage with the city’s vibrant, multicultural vibe, participating in local Hispanic festivals like Fiesta Noche del Rio
    and incorporating bilingual storytelling and cultural art projects into her educational programs. Her cultural roots foster a strong sense of community, resilience, and appreciation for diverse artistic
    expressions.
