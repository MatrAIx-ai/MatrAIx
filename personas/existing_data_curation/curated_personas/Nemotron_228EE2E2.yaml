  hobbies: '["Sketching and illustration", "Reading fantasy and adventure novels", "Listening to and dancing to regional Mexican music", "Cooking traditional Mexican dishes with family", "Hiking local trails",
    "Practicing yoga at home", "Designing digital posters for school and community events"]'
  career_goals: Aurea aspires to pursue a career that blends her compassion for others with practical impact. She envisions becoming a bilingual community health worker or physician assistant, allowing
    her to provide culturally sensitive health education and support to families in the Rio Grande Valley. She also hopes to study biomedical engineering or health informatics, integrating her interest
    in technology and problem solving to develop tools that improve access to care. Her long‑term ambition is to create community workshops that combine health literacy with digital resources, empowering
    her hometown while maintaining a stable, respected profession.
