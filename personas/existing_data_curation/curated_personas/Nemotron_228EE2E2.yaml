personas:
  professional: Aurea Gallegos, a budding visual storyteller, combines hand‑drawn folklore sketches with digital poster design for school clubs, channeling her curiosity and practicality to meet deadlines
    while nurturing imaginative narratives.
  sports: Aurea Gallegos participates in a local hiking group called Sierra Ridge Hikers, practices yoga at home for flexibility, cheers for the Seattle Seahawks in football and the Portland Timbers in
    soccer, and joins the middle‑school varsity track team during the spring, balancing team spirit with solitary workouts.
  arts: Aurea Gallegos sketches folklore‑inspired characters in a weathered notebook, admires the illustration style of Shaun Tan and the storytelling songs of Ben Harper, and enjoys listening to regional
    folk music while practicing folclórico dance steps, letting artistic expression shape both leisure and school projects.
  travel: Aurea Gallegos favors structured weekend trips, having explored the nearby Sierra foothills and dreaming of hiking the Appalachian Trail and visiting the historic city of Machu Picchu, preferring
    itineraries that blend adventure with cultural storytelling.
  culinary: Aurea Gallegos helps in the kitchen preparing tamales with masa, pork, and chilies, whips up salsa roja using tomatoes, onions, and jalapeños, and enjoys crafting chilaquiles topped with queso
    fresco and avocado, showcasing moderate cooking skill and a penchant for bold, layered flavors.
  core: Aurea Gallegos blends quiet curiosity with practical organization, turning folklore art into digital designs while balancing cautious saving, occasional impulsive treats, and a health routine that
    juggles seasonal allergies and yoga.
background:
  cultural: Aurea comes from a Mexican‑American family rooted in Pharr, Texas, a city on the U.S.–Mexico border. Her household is bilingual, speaking Spanish at home and English at school, and she celebrates
    both Mexican traditions and American holidays. She participates in Día de los Muertos altar building, enjoys quinceañera celebrations, and attends local festivals like Charro Days, which blend Mexican
    folklore with Texan influences. Family ties are strong; respect for elders and communal support are central values. Growing up near the Rio Grande, she is attuned to cross‑border dynamics, hearing stories
    of migration and witnessing the blend of cultures that shape daily life. This bicultural environment informs her worldview, fostering a sense of responsibility to give back to her community while preserving
    her heritage.
