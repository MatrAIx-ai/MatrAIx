  career_goals: Rene aims to transition from a senior administrative support role to an Office Manager position within the next two years, focusing on process‑improvement initiatives that increase efficiency
    and reduce workplace stress. He plans to earn the Certified Administrative Professional (CAP) credential to formalize his expertise. Long‑term, he envisions mentoring younger staff and serving as a
    liaison between management and front‑line employees, leveraging his sociable nature to foster a collaborative office culture. As retirement approaches, Rene hopes to launch a small family‑owned grocery‑café
    that showcases Guatemalan cuisine, using his bilingual skills and community connections to attract both local residents and the growing Central American diaspora in Fairfax County. Throughout, he prioritizes
    work‑life balance to mitigate stress and support his family.
