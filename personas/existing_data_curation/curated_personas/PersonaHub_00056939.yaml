persona_description: A scientist and engineer who specializes in the development of innovative materials and technologies for use in photovoltaic modules and flexible electronic devices. She is particularly
  interested in the use of transparent polycarbonate films and inorganic quantum dots to improve the performance and durability of these materials. She is also interested in the integration of solar modules
  into roof constructions and the development of cost-effective assembly systems. She is highly skilled in the use of polyurethane sheathing and in the design of innovative solutions for integrating solar
  modules into electronic devices. She is also interested in the use of polycarbonate in portable electronic devices and in the development of flexible organic solar cells.
