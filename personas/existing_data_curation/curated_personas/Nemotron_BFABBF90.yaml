    relationships, respect for elders, and a strong appreciation for music, dance, and visual arts. Growing up near the city’s vibrant mural scene and Mexican cultural centers, Lazaro’s identity is shaped
    by a rich tapestry of heritage, community involvement, and urban creativity.
