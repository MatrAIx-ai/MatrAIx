  career_goals: Jerry aims to turn his mechanical aptitude into a career as a certified automotive technician, planning to enroll in a community‑college program after obtaining his high school equivalency.
    In the short term, he wants to establish a small freelance repair service for neighbors, offering bike repairs, computer troubleshooting, and basic appliance fixes. He also hopes to secure an apprenticeship
    with a local park service or wildlife rehabilitation center, blending his love of the outdoors with steady employment. Over the next decade, he envisions opening his own garage where he can combine
    hands‑on work with mentoring other youths interested in practical trades.
