personas:
  professional: Michael George is a seasoned custodial specialist with over twenty years of hands‑on experience in commercial cleaning, now channeling their meticulous eye for detail—sharpened by a passion
    for photography and sketching—into a strategic push toward facilities management, seeking Certified Facility Manager (CFM) and green‑cleaning credentials, while envisioning a boutique service that tailors
    delicate cleaning for galleries, studios, and performance spaces, and they regularly critique standard operating procedures to enhance efficiency.
  sports: Michael George enjoys weekend hikes along the Mount Evans and Red Rocks trails, participates in trail‑running events with the local Colorado Mountain Club, quietly supports the Denver Broncos,
    Colorado Rockies, and Denver Nuggets—cheering at the stadium or a neighborhood bar—and they occasionally join a co‑ed softball league for light competition.
  arts: Michael George immerses themselves in Denver’s vibrant art scene, frequenting the Denver Art Museum, RedLine Contemporary Art Center, and community mural tours where they follow the work of street‑art
    collective The Denver Muralists, admire contemporary painter Ernesto Lani and photographer Laura Poole, regularly attend open‑mic nights to champion indie musicians such as The Lumineers and Phoebe
    Bridgers, and they fuel personal creativity through charcoal sketches of murals and the Front Range’s shifting light.
  travel: Michael George favors spontaneous road‑trip adventures that blend photography, hiking, and mural hunting, having captured the vast dunes of Great Sand Dunes National Park, explored Santa Fe’s
    historic murals, and now they are planning a cross‑country itinerary that includes Portland’s street‑art districts and a weekend trek to Yosemite, all organized with a compact gear list and a flexible
    budget that accommodates last‑minute detours.
  culinary: Michael George relishes hearty Colorado cuisine—bison burgers with smoked gouda, pan‑seared trout with lemon‑caper butter, and spicy green chili—while honing their cooking skills on a cast‑iron
    skillet, experimenting with spices like smoked paprika and harissa, brewing pour‑over coffee from a local roaster, and they occasionally treat themselves to farm‑to‑table meals at Denver Harvest Kitchen,
    though their dinner schedule often shifts around late‑night photography sessions.
  core: Michael George blends a curious, art‑driven eye with a pragmatic, hands‑on cleaning expertise, and they navigate life with competitive zeal, flexible budgeting, and a penchant for spontaneous DIY
    projects and scenic hikes.
background:
  cultural: Michael hails from a middle‑class, white working‑family lineage with roots in the Midwest, where values of self‑reliance, hard work, and community responsibility were emphasized. Growing up,
    family gatherings centered around modest celebrations, holiday traditions, and a shared appreciation for practical skills. Relocating to Aurora, Colorado, introduced him to a more diverse cultural tapestry
    and the expansive outdoor lifestyle of the Front Range. He embraces the local ethos of environmental stewardship and outdoor recreation while maintaining a pragmatic, skeptical outlook shaped by his
    upbringing. His exposure to Aurora’s multicultural neighborhoods has broadened his artistic palate, leading him to appreciate a range of cultural expressions—from street art to folk music—without abandoning
    his grounded, working‑class identity.
attributes:
  skills: '[''Commercial Floor Care (stripping, waxing, buffing)'', ''Carpet Extraction and Spot Treatment'', ''Industrial Equipment Operation and Maintenance'', ''Cleaning Chemical Formulation and Safety'',
    ''OSHA and Health Code Compliance'', ''Supply Inventory Management'', ''Work Schedule Coordination'', ''Minor Facilities Repairs (electrical, plumbing, hardware)'', ''Tenant Communication and Conflict
    Resolution'', ''Detail‑Oriented Aesthetic Inspection'', ''Process Evaluation and Continuous Improvement'', ''Sustainable/Green Cleaning Practices'']'
  hobbies: '[''Street and Landscape Photography'', ''Sketching and Pencil Drawing'', ''Visiting Art Galleries and Murals'', ''DIY Home Improvement Projects'', ''Woodworking and Small‑Scale Carpentry'',
    ''Hiking the Rocky Mountains'', ''Reading Science Fiction and Design Journals'', ''Competitive Trivia Nights'', ''Local Live Music and Open Mic Events'']'
  career_goals: Michael aims to translate his extensive custodial background into a supervisory role as a facilities manager within the next five years. He plans to earn a Certified Facility Manager (CFM)
    credential and complete a green‑cleaning certification to champion sustainable practices in his building. Leveraging his curiosity about art and design, he hopes to launch a niche cleaning service that
    specializes in galleries, studios, and performance spaces, offering delicate handling of artworks and climate‑controlled environments. Michael also wants to mentor junior custodial staff, sharing his
    process‑improvement mindset, and eventually mentor a small team that integrates environmental stewardship with aesthetic excellence. Long‑term, he envisions a retirement plan that includes part‑time
    consulting for arts‑focused venues while pursuing personal DIY renovation projects at home.
