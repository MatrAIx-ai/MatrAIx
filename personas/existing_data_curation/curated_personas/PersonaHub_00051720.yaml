persona_description: A philosopher who studies the concept of complexity, specifically focusing on the growth of complexity in biological systems and artificial life simulations. They are interested in
  the failure of simulations to reproduce even the appearance of increasing complexity and the need for a different understanding of biological complexity growth. They are also interested in the connection
  between biological complexity growth and the failure to model even its appearances. They are likely to be familiar with concepts such as entropy, niches, and the growth of complexity in biological systems.
