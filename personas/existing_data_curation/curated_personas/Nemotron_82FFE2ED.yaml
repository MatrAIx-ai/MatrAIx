personas:
  professional: Latonya Oseni thrives as a high‑energy waitress in Jackson’s downtown dining scene, leveraging razor‑sharp organizational skills to juggle shift schedules, inventory, and POS systems while
    they curate on‑the‑fly menu displays that echo the visual storytelling of local gallery openings.
  sports: Latonya Oseni stays fit by salsa dancing twice a week at a local studio, jogging with the Jackson community running club through LeFleur’s Bluff State Park each Saturday, and cheering for the
    Mississippi State Bulldogs football team and the New Orleans Saints during the fall season, while they also enjoy occasional pick‑up basketball games at the neighborhood rec center.
  arts: Latonya Oseni immerses herself in the arts by sketching watercolors of the Mississippi Arts Festival, photographing street scenes that capture the city’s rhythm, curating pop‑up exhibitions featuring
    works by Jacob Lawrence and contemporary muralists, and attending live jazz gigs that inspire their improv comedy sessions, all while they continuously seek fresh visual inspiration.
  travel: Latonya Oseni plans trips with a meticulous spreadsheet, preferring weekend getaways to culturally rich Southern spots like New Orleans for its music scene, Savannah’s historic squares for storytelling
    tours, and occasional visits to New York City’s gallery districts, while they dream of a culinary road trip along the Gulf Coast to sample regional specialties.
  culinary: Latonya Oseni blends Southern comfort with global flair, mastering shrimp and grits with miso‑infused broth, crafting collard‑green tacos topped with kimchi, and documenting each experimental
    dish—such as her signature bourbon‑glazed fried chicken—on a food‑and‑culture blog that also reviews local eateries, while they constantly refine recipes based on feedback from friends and patrons.
  core: Latonya Oseni is a fiercely organized hospitality pro whose curiosity fuels a weekend habit of sketching, salsa dancing, and constantly tweaking Southern‑fusion recipes, even as they battle stress‑induced
    worry and a competitive streak that pushes them toward entrepreneurial dreams.
background:
  cultural: Latonya grew up in a close-knit African-American community in Jackson, where church gatherings, family potlucks, and storytelling evenings were integral to daily life. The region's rich history
    of civil-rights activism and its deep musical roots in blues and gospel have shaped her outlook on social responsibility and artistic expression. She cherishes the traditions of Southern soul food,
    using those flavors as a foundation for her experimental cooking. Her cultural identity also informs her appreciation for Black visual artists, and she often champions local creators by curating pop-up
    exhibitions in the cafes where she works. Community solidarity, respect for elders, and a strong work ethic passed down through generations remain central to her sense of self.
attributes:
  skills: '[''Efficient high-volume service'', ''Accurate order taking and memory recall'', ''POS systems and cash handling'', ''Customer relationship building'', ''Conflict de-escalation'', ''Shift scheduling
    and team coordination'', ''Food safety and sanitation compliance'', ''Basic mixology and cocktail crafting'', ''Menu design input and flavor pairing'', ''Social-media content creation for promotions'',
    ''Photography for promotional material'', ''Art exhibition curation basics'', ''Time management and productivity'', ''Conversational Spanish'', ''Inventory tracking and cost control'']'
  hobbies: '[''Watercolor painting'', ''Street photography'', ''Visiting art galleries and museums'', ''Live jazz and blues concerts'', ''Salsa dancing'', ''Experimenting with Southern fusion recipes'',
    ''Reading contemporary fiction and speculative novels'', ''Blogging about restaurant experiences'', ''Volunteering at youth art programs'', ''Participating in improv comedy workshops'']'
  career_goals: Latonya aspires to move beyond front-of-house service into a leadership role. Within the next two years she plans to earn an associate degree in hospitality management and secure a restaurant
    manager position at a venue that values community engagement. Her long-term ambition is to open a hybrid cafe-gallery that showcases emerging Black artists from the Delta while offering a menu that
    blends Southern comfort food with contemporary twists. She also hopes to develop a mentorship program that brings culinary and arts training to underserved youth in Jackson, using her organizational
    strengths and industry experience to build a sustainable, culturally resonant enterprise.
