personas:
  professional: Eilene Godeaux, a certified medical coder and health records specialist, leverages meticulous organization, relentless curiosity, and a calm, resilient demeanor to optimize Epic and Cerner
    workflows, spearhead clinical documentation improvement initiatives, and mentor staff toward data‑driven excellence, and they consistently model disciplined precision for their team.
  sports: Eilene Godeaux follows the Chicago Bears and Chicago Cubs with a data‑driven enthusiasm, plays in a weekday adult tennis league at the local YMCA, and completes a seasonal 5 K charity run each
    spring, viewing fitness as a structured regimen that fuels the same precision they apply to clinical metrics.
  arts: Eilene Godeaux finds solace in the intricate brushwork of Vermeer, the minimalist compositions of Philip Glass, and the lyrical storytelling of folk singer‑songwriter Laura Marling, while regularly
    attending the city's contemporary art exhibitions and solving crossword puzzles themed after classic literature, and they often reflect on how visual rhythm parallels healthcare workflow patterns.
  travel: Eilene Godeaux prefers meticulously planned solo trips that balance quiet reflection with cultural immersion, having documented a week‑long itinerary through Kyoto’s temples, a culinary tour of
    Tuscany’s vineyards, and a hiking expedition in Iceland’s volcanic landscapes, yet they schedule each journey months in advance to align with fiscal and professional constraints.
  culinary: Eilene Godeaux experiments with farm‑to‑table cooking, regularly crafting herb‑infused quinoa salads with rosemary, thyme, and lemon zest, fermenting homemade kimchi using garden‑grown cabbage,
    and perfecting a pistachio‑pesto pasta that blends precise measurements with spontaneous flavor pairings, and they occasionally indulge in a lavish tasting menu to celebrate a project milestone.
  core: Eilene Godeaux is a disciplined, curiosity‑driven health informatics specialist whose calm, competitive edge fuels a love for puzzles, precise culinary experiments, and meticulous self‑management,
    and they never shy away from a well‑earned indulgence.
background:
  cultural: Eilene’s family traces its roots to French‑Canadian ancestors who settled in the Northeastern United States before moving to California in the 1960s. Raised in Anaheim, she grew up in a middle‑class
    Catholic household that emphasized hard work, self‑reliance, and community service. The multicultural tapestry of Orange County exposed her to a blend of mainstream American values and diverse cultural
    influences, yet she continues traditional family customs such as Sunday family meals, holiday baking, and active participation in her local parish. This background fosters a pragmatic yet curious worldview,
    aligning with her disciplined and achievement‑oriented personality.
attributes:
  skills: '["Certified Medical Coder (CPC)", "Epic and Cerner EHR proficiency", "Clinical documentation improvement", "Quality assurance and performance metrics", "Infection‑control protocol implementation",
    "Phlebotomy and specimen collection", "Patient triage and intake", "Medical office management", "Inventory control for medical supplies", "Data analysis with Excel and Power BI", "HIPAA and OSHA compliance",
    "Staff training and mentorship", "Medical equipment troubleshooting", "Workflow optimization and process design"]'
  hobbies: '["Reading medical journals and science magazines", "Crossword puzzles and Sudoku", "Urban gardening and vegetable cultivation", "Experimental cooking with seasonal produce", "Gentle yoga and
    mindfulness meditation", "Volunteering at local health outreach events"]'
  career_goals: Eilene aims to advance from a specialist role to a senior health informatics manager, leading a team that drives quality‑improvement initiatives across the healthcare network. She plans
    to earn the Certified Professional in Healthcare Quality (CPHQ) credential and eventually become a director of clinical operations, where she can shape policy, implement cutting‑edge technology, and
    mentor the next generation of disciplined, detail‑oriented practitioners. Her long‑term ambition includes establishing a mentorship program for under‑represented individuals entering technical health
    careers, reflecting her belief in merit‑based advancement and practical excellence.
