  hobbies: '[''Reading mystery/adventure books'', ''Building LEGO models'', ''Puzzle solving (jigsaw, Sudoku)'', ''Nature walks and bird watching'', ''Rock collecting'', ''Playing beginner piano'', ''Diary
    writing'', ''Basic Scratch animation'', ''Small‑group board games (chess, storytelling)'']'
  career_goals: Andrea dreams of becoming a veterinarian because she loves animals and wants to apply her curiosity about biology in a practical way that helps her community. She also hopes to be a top
    student, earn scholarships, and eventually attend a university with a strong pre‑veterinary program. Her competitive streak drives her to set academic goals, such as winning science fair awards and
    becoming class valedictorian. Long‑term, she envisions herself working in a rural clinic, combining her love for animals with the practical skills she values.
