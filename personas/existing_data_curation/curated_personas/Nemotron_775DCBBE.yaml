  career_goals: Although traditionally retired, Thomas aims to transition into a part‑time advisory role, focusing on supporting small businesses and cultural institutions in Monterey County. He wants to
    create a legacy by documenting best practices for integrating artistic thinking into business strategy, authoring articles, and delivering community workshops. Thomas also aspires to mentor the next
    generation of analysts, particularly those with interdisciplinary interests, and to collaborate on a regional initiative that blends economic development with arts programming.
