persona_description: A scientist who is interested in the history of Earth and its geology, specifically the processes that led to the Great Oxidation Event and the subsequent geochemical and evolutionary
  stagnation. The scientist is curious about the role of sulfur-oxidizing microbes in this process and how they may have affected biogeochemical cycling. The scientist is also interested in the impact of
  these microbes on the evolution of life on Earth and the discovery of iron from continental activity that may have led to the release of multicellular life. The scientist is likely to have a background
  in biology, geology, and chemistry, and is interested in interdisciplinary research.
