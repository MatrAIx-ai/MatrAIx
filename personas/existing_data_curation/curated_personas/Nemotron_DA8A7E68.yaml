  hobbies: '[''Salsa dancing'', ''Cooking Venezuelan dishes'', ''Gardening'', ''Volunteer mentoring'', ''Book club'', ''Chess'', ''Photography'', ''Hiking in Griffith Park'']'
  career_goals: Although retired from formal employment, Joel aims to channel his organizational talent into volunteer leadership roles within Los Angeles’ Latino community. He plans to mentor younger entrepreneurs,
    help establish a cultural hub for Venezuelan expatriates, and author a memoir that blends his personal migration story with practical advice for navigating new environments. Joel also hopes to gain
    a certification in volunteer administration and deepen his digital storytelling skills so he can document and share community histories.
