  career_goals: Jesus aims to advance from his current surveillance officer role to a senior security manager for a regional casino or a municipal security director position. He plans to leverage his STEM
    background to develop data‑driven security analytics, implement predictive monitoring tools, and lead training programs that emphasize both technical competence and compassionate customer service. Over
    the next five years, he hopes to earn a Certified Protection Professional (CPP) credential, mentor junior officers, and eventually oversee security operations for multiple venues across the Upper Midwest.
