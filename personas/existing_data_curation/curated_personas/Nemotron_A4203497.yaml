personas:
  professional: Kirkwood Johnson, a 20‑year‑old aspiring secondary‑school teacher, designs interdisciplinary STEAM lessons that blend urban sketching, jazz‑inspired creative writing, and digital game‑based
    learning, leveraging their calm, resilient nature and strong empathy to foster inclusive classrooms and provide mental‑health first‑aid support.
  sports: Kirkwood Johnson enjoys weekend pick‑up basketball games at the community center, follows the Baltimore Orioles and Ravens loyally, squeezes in early‑morning jogs along the Inner Harbor while
    listening to jazz, and occasionally signs up for a local 5K charity run, balancing a relaxed fitness routine with team spirit.
  arts: Kirkwood Johnson thrives as a visual storyteller, sketching Baltimore’s street scenes, painting acrylic cityscapes, playing occasional improvisations on a jazz piano, and drawing inspiration from
    artists like Jacob Lawrence and musicians such as Miles Davis, while volunteering to lead art workshops for middle‑schoolers.
  travel: Kirkwood Johnson prefers short, affordable trips, such as a weekend train ride to Philadelphia’s art museums, a road trip to New Orleans for live jazz and gumbo, and a planned future backpacking
    tour of Tokyo’s galleries to study contemporary urban art, balancing curiosity with a tight student budget.
  culinary: Kirkwood Johnson experiments in the kitchen by fusing Southern staples like collard greens and cornbread with global flavors—creating dishes such as jambalaya‑styled ramen, shrimp‑and‑grits
    sushi rolls, and hot‑sauce‑marinated kimchi—while habitually listening to jazz and sometimes forgetting to clean the stovetop before moving on.
  core: Kirkwood Johnson is a calm, art‑driven future educator who channels curiosity into interdisciplinary teaching, vibrant street photography, experimental cooking, and community mentorship, all while
    juggling modest finances and a tendency to hoard sketchbooks and forget dental floss.
background:
  cultural: Kirkwood grew up in Baltimore’s historic African‑American neighborhoods, where church, music, and oral storytelling shaped his worldview. His family maintains a strong connection to West African
    roots, with traditions passed down from Ghanaian ancestors that inform his appreciation for rhythm, pattern, and community. He experienced the vibrant local culture of jazz, hip‑hop, and visual art
    collectives, and he actively participates in community events that celebrate Black heritage. These experiences fostered a deep respect for education as a vehicle for empowerment, motivating him to serve
    as a cultural bridge in his school, integrating African‑American history and artistic contributions into his curriculum.
attributes:
  skills: '[''Lesson planning and curriculum design'', ''Classroom management with empathy'', ''Differentiated instruction'', ''Art integration in STEM (STEAM)'', ''Digital literacy (Google Classroom, interactive
