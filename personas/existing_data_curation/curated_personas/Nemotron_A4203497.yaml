    ''Mentoring peer teachers'']'
  hobbies: '[''Sketching and painting'', ''Visiting art galleries and museums'', ''Playing jazz piano'', ''Reading contemporary fiction and African‑American poetry'', ''Street photography'', ''Volunteering
    in community art workshops'', ''Building simple educational apps'', ''Experimenting with fusion cooking'']'
  career_goals: Kirkwood intends to complete a Bachelor’s in Education, followed by a Master’s in Curriculum and Instruction within the next five years. He aims to become a lead teacher and curriculum coordinator
    for STEAM initiatives, designing interdisciplinary units that bring art into science and math. He aspires to launch a community‑based after‑school art program that provides mentorship for under‑represented
    youth. In the long term, he envisions moving into educational leadership as a principal or district specialist, advocating for equity and mental‑wellness policies across schools in Baltimore County.
