personas:
  professional: Robert Moorehouse, a 50-year-old pastor-engineer hybrid, blends systematic scientific analysis with evangelical ministry, delivering meticulously organized sermons, overseeing a data-driven
    church growth platform, and leading a robotics club that mentors middle-schoolers, and they coordinate community events with precision.
  sports: Robert Moorehouse starts each sunrise with a 3-mile beach jog, plays weekly at the Ormond Beach Golf Club's 18-hole league, follows the Jacksonville Jaguars and Tampa Bay Rays avidly, and they
    join an annual charity fishing tournament that doubles as a community fitness challenge.
  arts: Robert Moorehouse finds balance in the chords of Bach's cantatas and the soulful gospel of Kirk Franklin while volunteering as piano accompanist at Sunday services, and they unwind crafting detailed
    scale model ships inspired by classic naval paintings by Howard N. Lippincott.
  travel: Robert Moorehouse plans each vacation months in advance, opting for a family week-long stay at the Florida Keys' Key West to enjoy snorkeling and sunset fishing, a yearly Disney cruise to the
    Bahamas for relaxed bonding, and occasional trips to Nashville for church leadership conferences, balancing leisure with ministry networking.
  culinary: Robert Moorehouse's palate gravitates toward fresh Gulf seafood—grilled grouper with lemon butter, stone crab claws, and Key West pink shrimp tacos—while they reliably fall back on classic Southern
    comfort like fried catfish, collard greens, and homemade peach cobbler, a culinary range they manage with competent grilling skills but a confessed weakness for over-seasoned BBQ ribs.
  core: Robert Moorehouse is a methodical, community-driven pastor-engineer who harmonizes Sunday sermons with Saturday fishing trips, meticulous budgets, and a steady rhythm of volunteer leadership, and
    they stay anchored to routine, family, and Southern-styled hospitality.
background:
  cultural: Robert grew up in a middle‑class, Protestant family in the American South before relocating to central Florida. His cultural identity is shaped by traditional evangelical values—weekly worship,
    community service, and an emphasis on family—combined with the relaxed, outdoor‑oriented lifestyle of the Daytona Beach region. The blend of his STEM education and church heritage fosters a pragmatic,
    orderly worldview, while the local coastal culture influences his love for fishing, beach activities, and community festivals.
attributes:
  skills: '["Public speaking", "Sermon preparation and biblical exegesis", "Pastoral counseling", "Community outreach program development", "Volunteer recruitment and management", "Fundraising and stewardship
