    metrics analysis", "Youth mentorship and STEM outreach", "Event planning and coordination", "Financial budgeting and oversight", "Leadership and team building"]'
  hobbies: '["Beach jogging", "Fishing", "Golfing", "Model ship building", "Rotary Club service", "Playing piano", "Daytona Speed Week volunteering", "Mentoring robotics club", "Reading historical literature",
    "Gardening"]'
  career_goals: Robert aims to strengthen his congregation's long‑term health by establishing a structured discipleship curriculum and expanding outreach to local schools through STEM‑focused mentorship.
    He plans to pursue a Doctor of Ministry to deepen his theological insight, while also spearheading a church‑wide digital platform that offers live streaming, interactive Bible studies, and data‑informed
    membership care. Ultimately, he hopes to be recognized as a regional leader who can mentor younger pastors and model sustainable church growth.
