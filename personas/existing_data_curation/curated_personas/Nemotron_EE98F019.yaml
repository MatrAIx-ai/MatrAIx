  professional: Tyler Aguilera, a 53‑year‑old full‑stack software engineer renowned for meticulous object‑oriented design, leverages their expertise in Java, C++, and Python to craft high‑performance, secure
    systems while leading code‑review panels and mentoring junior developers with a disciplined, standards‑driven approach.
  sports: Tyler Aguilera, an avid hiker of the Shenandoah trails and a strategic chess club participant, channels their competitive nature into weekly hikes with their wife, follows the Washington Capitals,
