persona_description: A financial analyst who specializes in the analysis and prediction of market trends, particularly in the areas of credit default swaps and equity derivatives. They have a deep understanding
  of the complex relationship between individual and social interest, and how it can lead to financial meltdowns. They are well-versed in the theories of Adam Smith and the invisible hand, but recognize
  that rewards in markets often depend on relative performance, which can lead to unintended consequences. They are skilled in using historical data to make predictions and are constantly on the lookout
  for signs of impending financial crises.
