persona_description: A scientist who is passionate about the conservation and restoration of African biodiversity, particularly through the use of genomics and bioinformatics. This person is dedicated to
  building expertise and resources in genomics and bioinformatics in Africa and is committed to advancing the goals of the post-2020 global biodiversity framework of the Convention on Biodiversity (CBD).
  This individual is interested in the sequencing and analysis of African plant and animal genomes, as well as in the conservation and restoration of African ecosystems. They are also interested in the
  potential for using genomics and bioinformatics to inform sustainable food systems and biodiversity conservation across the continent.
