personas:
  professional: Linda Delacruz is a seasoned IT strategist with over three decades of experience designing cloud migrations, securing networks, and aligning technology budgets with business goals, leveraging
    a pragmatic curiosity and bilingual communication to mentor staff and foster community partnerships.
  sports: Linda Delacruz enjoys gentle morning walks and birdwatching along the San Antonio River Walk with the River Walk Walking Club, follows the San Antonio Spurs and Texas Rangers for their competitive
    spirit, and participates in a senior softball league where they play first base.
  arts: Linda Delacruz indulges in historical fiction by Ken Follett and Hilary Mantel, stays current with technology insights from Wired and MIT Technology Review, listens to classic mariachi performances
    by Mariachi Vargas de Tecalitlán and songs by Vicente Fernández, and expresses creativity through quilting projects shared at their church fellowship.
  travel: Linda Delacruz prefers thoughtfully planned trips that blend cultural immersion and relaxation, often exploring Texas Hill Country towns like Fredericksburg and Wimberley, attending the Austin
    music festivals, and dreaming of leisurely visits to Barcelona and Lisbon to savor historic architecture and seaside cafés.
  culinary: Linda Delacruz enjoys preparing family‑style dishes such as tamales, pozole, and fresh salsa using garden‑grown tomatoes, peppers, and marigolds, and they consider themselves a competent home
    cook who balances authentic flavors with practical, time‑saving techniques.
  core: Linda Delacruz blends a quiet curiosity with practical expertise, nurturing a modest garden, mentoring seniors in tech, and quietly orchestrating a balanced life of community service, lifelong learning,
    and occasional indulgence in rich, spice‑laden meals.
background:
  cultural: Linda was born to Mexican immigrant parents who settled in Texas in the 1960s. Raised in a bilingual household, she grew up celebrating Día de los Muertos, Cinco de Mayo, and the vibrant traditions
    of her heritage, such as making tamales with her grandmother. Her Catholic faith, nurtured by regular attendance at the local parish, reinforces her emphasis on community, family, and service. These
    cultural roots shape her collaborative work style, where personal relationships (personalismo) and respect for elders are paramount. Living in Floresville, a city with a strong Mexican‑American presence,
    Linda maintains close ties with extended family and participates in neighborhood festivals, where she often contributes homemade dishes. Her bilingual ability and cultural sensitivity have been assets
    in building trust with both Spanish‑speaking staff and the broader community in Atascosa County.
attributes:
  skills: '[''IT strategic planning'', ''Network architecture and infrastructure design'', ''Cloud services (Azure, AWS) implementation'', ''Cybersecurity risk assessment and mitigation'', ''Legacy system
    migration and integration'', ''Project management (Agile and Waterfall)'', ''Budget forecasting and cost optimization'', ''Vendor negotiation and contract management'', ''Team leadership and mentorship'',
    ''Bilingual communication (English/Spanish)'', ''Disaster recovery and business continuity planning'', ''Compliance with HIPAA and other regulations'', ''Data analysis and reporting'', ''Stakeholder
    collaboration'']'
  hobbies: '[''Gardening (vegetables and ornamental plants)'', ''Cooking traditional Mexican cuisine'', ''Reading historical fiction and tech journals'', ''Volunteering for digital literacy workshops for
    seniors'', ''Walking and birdwatching along local nature trails'', ''Quilting and crocheting'', ''Listening to mariachi and ranchera music'', ''Participating in small church fellowship gatherings'']'
  career_goals: Approaching retirement, Linda aims to consolidate her legacy by mentoring the next generation of IT leaders within her organization and the broader Atascosa County community. She plans to
    spearhead a regional digital‑inclusion initiative that equips seniors and low‑income families with basic computer skills, drawing on her experience and compassionate nature. Over the next few years,
    she hopes to transition into an advisory consulting role, providing strategic guidance on cloud migration and cybersecurity for local non‑profits, while ensuring that any new technology adoption remains
    practical and cost‑effective. Additionally, Linda wishes to author a practical handbook on managing small‑scale IT environments in rural Texas, sharing lessons learned from her career.
