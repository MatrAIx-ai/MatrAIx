  career_goals: Approaching the culmination of her professional career, Zahra aims to leave a lasting imprint on Prince George’s County’s built environment by championing projects that fuse sustainability,
    cultural relevance, and aesthetic richness. She seeks to mentor the next generation of under‑represented engineers, establishing a formal apprenticeship program within her firm. Zahra also aspires to
    serve on the county’s transportation and public works advisory board, where she can influence policy toward equity‑focused infrastructure. In parallel, she plans to author a multidisciplinary guide
    on integrating art with civil engineering, and to achieve Fellow status with the American Society of Civil Engineers. Ultimately, she envisions a legacy of public spaces that reflect the community’s
    diverse narratives while meeting rigorous engineering standards.
