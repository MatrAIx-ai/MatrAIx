personas:
  professional: Zahra Chin, a veteran civil engineer with three decades of infrastructure design expertise, blends rigorous structural analysis with watercolor sketches and community storytelling to champion
    sustainable, culturally resonant public works in Prince George’s County.
  sports: Zahra Chin enjoys weekend walks along the Anacostia River trail, follows the Washington Capitals hockey team, participates in a local senior softball league, and incorporates low‑impact tai chi
    classes at the community center, balancing active exploration with gentle fitness.
  arts: Zahra Chin channels imagination into watercolor paintings of bridges, calligraphy practice inspired by East‑Asian brushwork, and collaborations on neighborhood murals alongside artists like Shepard Fairey,
    while drawing speculative fiction influences from authors such as Margaret Atwood and Neil Stephenson to fuel her creative vision.
  travel: Zahra Chin favors train‑linked cultural trips, having explored the historic architecture of Barcelona, the garden terraces of Kyoto, and the riverfront promenades of New Orleans, while planning
    a future visit to the Mediterranean to study ancient stone bridges for her upcoming guidebook.
  culinary: Zahra Chin experiments with Afro‑Asian fusion dishes, often combining ingredients like fermented kimchi, sweet plantains, and coconut milk into a signature Jollof‑kimchi stew, while harvesting
    herbs from her urban vegetable beds to season her Saturday brunches.
  core: Zahra Chin is an imaginative civil engineer‑artist who balances meticulous project deadlines with spontaneous water‑color sketches, habitually misplaces garden tools but never forgets her yoga mat,
    and prefers quiet evenings with speculative fiction over noisy gatherings.
background:
  cultural: Zahra is a Black American with a multicultural lineage that includes Chinese ancestry, reflected in her surname. Raised in the Washington, D.C. metropolitan area, she grew up immersed in the
    vibrant tapestry of African‑American cultural traditions—music, storytelling, community activism—as well as the disciplined respect for education prevalent in her Chinese heritage. This blended background
    informs her inclusive worldview and its expression in her engineering practice. Zahra participates in Juneteenth celebrations, Black History Month events, and Chinese New Year gatherings, often bringing
    the two cultures together through food, art, and dialogue. Her identity as a Black woman in a historically male‑dominant field drives her commitment to equity, mentorship, and design solutions that
    honor the histories and aspirations of diverse communities.
