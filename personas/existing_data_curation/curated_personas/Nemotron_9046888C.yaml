  hobbies: '[''Hiking'', ''Mountain biking'', ''Woodworking'', ''Technical reading (fire science, survival, historical nonfiction)'', ''Journaling'', ''Strength training'', ''Landscape photography'']'
  career_goals: Scott aims to earn Fire Officer I and II certifications and advance to a fire captain position within the next three to five years, with a longer-term goal of becoming a battalion chief.
    He plans to introduce data-driven resource allocation and pilot a peer-support mental-health program for his crew, addressing the stress he personally experiences. He also wants to formalize a school-based
    fire-prevention curriculum for Elbert County and explore the integration of drone technology for rapid scene assessment, balancing his curiosity for new ideas with the practical constraints of his department.
