  learning difficulties and use multi-sensory learning techniques to support their pupils. They are committed to supporting pupils' emotional needs and have a proven track record of success in raising pupils'
  self-esteem and understanding their emotions. They are dedicated to providing a positive and inclusive learning environment for all pupils.
