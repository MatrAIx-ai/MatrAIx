persona_description: A scientist at the International Centre for Insect Physiology and Ecology (icipe) who specializes in the nutritional and health benefits of edible insects, particularly the edible stink
  bug. His research focuses on the development of methods for mass rearing, processing and use of edible insects to improve nutrition in deficient communities in Africa. He is passionate about promoting
  traditional foods such as insects consumed by some communities across the African continent as a source of high-quality proteins, fats, vitamins and minerals.
