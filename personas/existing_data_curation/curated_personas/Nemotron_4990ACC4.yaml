  hobbies: '[''Electronics tinkering'', ''Robotics building'', ''Casual soccer'', ''Cuban music listening'', ''Cooking traditional Cuban dishes'', ''Beach walking'', ''Science-fiction reading'', ''Urban
    photography'', ''Puzzle games'']'
  career_goals: In the next five years, Guillermo aims to earn a Master’s degree in STEM Education, become the STEM department chair at his school, and launch a robotics club that partners with local community
    centers. He seeks grant funding to expand hands-on laboratories, develop culturally responsive STEM curricula that reflect his Cuban heritage, and eventually influence district-wide policy on inclusive
    STEM instruction. He values flexible scheduling that allows him to balance teaching innovation with personal creative projects.
