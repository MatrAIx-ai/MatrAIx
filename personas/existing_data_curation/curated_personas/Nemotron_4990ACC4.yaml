personas:
  professional: Guillermo Bailey, a 23‑year‑old secondary‑school mathematics and physics teacher, weaves Python‑coded robotics projects into culturally resonant lessons, balancing a love for new ideas with
    practical curriculum constraints, while their relaxed approach to planning sometimes leaves lesson preparations to the last minute.
  sports: Guillermo Bailey, an avid pickup‑soccer player in Little Havana, supports Inter Miami CF and follows the Miami Heat, regularly joining a community soccer club on Saturday mornings while they prefer
    low‑key jogs along the beachfront over intense gym sessions.
  arts: Guillermo Bailey, a lover of son, salsa, and timba, spins tracks by Celia Cruz and Los Van Van while they capture vibrant street murals by local artists like Jorge Rodríguez on their phone, and
    they unwind with science‑fiction novels such as Neuromancer and The Three‑Body Problem.
  travel: Guillermo Bailey, a spontaneous weekend traveler, has explored the Florida Keys and Old San Juan, dreams of strolling Barcelona’s Gothic Quarter, and often plans last‑minute trips using discount
    airlines while balancing a modest travel budget.
  culinary: Guillermo Bailey, a moderately skilled home cook, delights in preparing ropa vieja with garlic, cumin, and mojo sauce and picadillo with olives and raisins, often sourcing plantains and yuca
    at the local farmer’s market before experimenting with fusion tacos that blend Caribbean spices.
  core: Guillermo Bailey is a 23‑year‑old teacher‑inventor who fuses curiosity‑driven robotics with laid‑back, community‑oriented living, juggling disorganized schedules, occasional overspending on gadgets,
    and a penchant for late‑night beach walks.
background:
  cultural: Guillermo grew up in a bilingual Cuban-American household in Miami’s Little Havana, where family gatherings, Cuban cuisine, and Afro-Cuban rhythms shaped his identity. He celebrates traditions
    such as Noche Buena, Carnaval, and the May 1st workers’ parade, and he incorporates cultural references—like using local maritime data for physics problems or discussing Cuban inventors—in his lessons
    to make STEM relatable. His community ties foster a strong sense of solidarity and an emphasis on helping other Latino students succeed in science.
