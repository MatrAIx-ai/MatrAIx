  hobbies: '[''Cooking Mexican Cuisine'', ''Salsa Dancing'', ''Yoga'', ''Hiking'', ''Street Photography'', ''Acoustic Guitar'', ''Songwriting'', ''Reading Contemporary Fiction'', ''STEM Volunteering'',
