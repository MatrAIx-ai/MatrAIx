  career_goals: Salvadora aims to advance from her current role as an operations research analyst to a senior analyst position within the next three to five years, eventually leading a strategic analytics
    team. She plans to pursue a master's degree in data science or industrial engineering to deepen her expertise in machine‑learning‑driven optimization. Her long‑term ambition is to specialize in sustainable
    supply‑chain solutions that reduce waste and improve equity, particularly for underserved communities in Los Angeles. She also seeks professional certifications such as PMP and CBIP to strengthen her
    project‑leadership credentials.
