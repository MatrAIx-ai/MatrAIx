personas:
  professional: Salvadora Coto is a meticulous operations research analyst who applies linear and integer programming, network‑flow modeling, and Tableau visualizations to solve complex supply‑chain puzzles,
    channeling their love of structure and cooperative teamwork into tight project timelines and clear stakeholder communication, and they thrive on cross‑functional collaboration.
  sports: Salvadora Coto stays active through twice‑weekly yoga sessions at a community studio, weekend hikes with the Los Angeles Hiking Club in the Angeles National Forest, and cheering for the LA Lakers
    and LA Galaxy while occasionally joining co‑ed beach volleyball games at Santa Monica, and they prioritize a balanced fitness schedule that mixes cardio and mindfulness.
  arts: Salvadora Coto captures the vibrant street murals of Los Angeles with a vintage Nikon, strums acoustic renditions of Celia Cruz and Marc Anthony on their guitar, and dives into contemporary fiction
    by Sally Rooney, curating a Spotify playlist that blends salsa rhythms with indie folk, and they often share their photos on a visual art blog.
  travel: Salvadora Coto prefers budget‑friendly road trips, having explored Santa Barbara’s wine lanes, San Diego’s coastal trails, and a memorable weekend in Oaxaca for its market colors, balancing spontaneous
    detours with carefully plotted itineraries to fit a student’s limited funds, and they use a combination of hostels and couch‑surfing to stretch their travel budget.
  culinary: Salvadora Coto enjoys reimagining classic tamales with quinoa and chipotle‑infused mole, whipping up cauliflower al pastor tacos topped with pickled red onion, and experimenting with ingredients
    like huitlacoche and roasted corn, boasting an intermediate cooking skill that shines during impromptu dinner parties, and they love documenting recipes in a handwritten journal.
  core: Salvadora Coto blends a penchant for organized problem‑solving with a love of salsa beats, yoga flow, and spontaneous photography, yet often forgets to water their houseplants while meticulously
    tracking every spreadsheet cell, and they bargain for discount codes whenever possible.
background:
  cultural: Salvadora grew up in a Mexican‑American household in Los Angeles, navigating both Spanish and English languages fluently. Her family places high value on education, mutual support, and cultural
    traditions, which she honors through celebrations like Día de los Muertos and cooking family recipes. The multicultural vibrancy of LA has shaped her worldview, fostering an appreciation for diverse
    perspectives and a commitment to social responsibility. She actively participates in community events organized by local Mexican cultural centers, which reinforce her connection to heritage while expanding
    her network within the city's tech and creative scenes.
