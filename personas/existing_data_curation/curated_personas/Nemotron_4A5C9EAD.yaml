personas:
  professional: Shea Meier is a middle‑school physics and mathematics teacher who blends rigorous data‑driven curriculum design, differentiated instruction, and interactive simulations into inclusive STEM
    programs, while methodically leading professional‑development workshops and drafting grant proposals to pave a path toward a department‑chair or district curriculum‑coordinator role.
  sports: Shea Meier is an avid member of the Shenandoah Trailblazers hiking club, tracks the Washington Capitals hockey season religiously, and participates in weekend trail‑run meetups organized by the
    local running group, balancing a love of endurance activities with occasional game‑day viewing parties.
  arts: Shea Meier curates Instagram posts featuring landscape photographs inspired by Ansel Adams, enjoys listening to folk‑rock artist Brandi Carlile while cooking, and regularly attends performances
    by the National Symphony Orchestra, finding artistic inspiration that fuels both their classroom and personal creativity.
  travel: Shea Meier prefers meticulously planned weekend escapes to U.S. national parks like Acadia and Shenandoah, yet dreams of a month‑long slow‑travel immersion in Kyoto’s gardens, balancing a modest
    travel budget with a desire for culturally rich, nature‑focused experiences.
  culinary: Shea Meier frequently prepares nutrient‑dense dishes such as quinoa‑seeded roasted vegetable bowls featuring heirloom carrots, kale, and fresh basil, experiments with seasonal squash soups and
    homemade kimchi, and occasionally indulges in a decadent chocolate mousse after a particularly stressful grading period.
  core: Shea Meier is a hyper‑organized STEM educator who channels anxiety into meticulously curated hiking photo journals, yet can’t resist a late‑night slice of pizza after a tough grading session.
background:
  cultural: She was raised in a middle‑class suburban community in Northern Virginia, where a blend of traditional American values and the proximity to the nation’s capital fostered an appreciation for
    civic engagement and cultural diversity. Her family’s European ancestry (German and Irish) informs a few culinary traditions and holiday customs, but she identifies primarily with the broader American
    cultural milieu. She actively participates in local multicultural festivals, supports inclusive school initiatives, and values education as a cornerstone of her community identity.
attributes:
  skills: '[''STEM subject mastery (physics, mathematics)'', ''Curriculum development aligned with NGSS'', ''Backward design lesson planning'', ''Differentiated instruction'', ''Classroom management'',
    ''Educational technology integration (LMS, interactive simulations)'', ''Data-driven assessment analysis'', ''Project‑based learning facilitation'', ''Robotics and coding instruction (Python, Scratch)'',
    ''Professional development facilitation'', ''Team leadership and committee coordination'', ''Grant writing for STEM resources'', ''Public speaking and workshop facilitation'']'
  hobbies: '[''Hiking and nature photography'', ''Gardening'', ''Cooking and meal prepping'', ''Yoga and mindfulness'', ''Mentoring robotics club'', ''Book club participation'', ''Organizing community science
    outreach'']'
  career_goals: She aims to advance into a leadership role such as STEM department chair or curriculum coordinator at the district level, where she can shape inclusive, inquiry‑based STEM programs across
    multiple schools. Her ambition includes securing sustainable funding for state‑of‑the‑art labs, mentoring early‑career teachers, publishing curriculum guides, and presenting her work at national education
    conferences. Over the longer term, she envisions pursuing an Ed.D. in Educational Leadership to influence policy and promote equity in STEM education.
