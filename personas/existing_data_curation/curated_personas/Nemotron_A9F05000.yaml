personas:
  professional: Desiree Bailey, a 32‑year‑old postsecondary instructor in liberal arts, blends their methodical curriculum design skills with a curiosity for interdisciplinary art integration, using instructional
    technology to create compassionate, collaborative classrooms where they regularly mentor students and secure community grant partnerships.
  sports: Desiree Bailey channels their love of the outdoors into seasonal kayaking on the Calcasieu River and early‑morning runs with the Lake Charles Community Runners, while cheering for the New Orleans
    Saints on Sundays and the LSU Tigers during football season, balancing these activities with a yoga practice that helps them unwind after stressful grading weeks.
  arts: Desiree Bailey cultivates their artistic side by photographing the vibrant Mardi Gras parades, curating visits to the Louisiana Art & Science Museum to study works by George Rodrigue and contemporary
    photographer Lelia Lecapitaine, and attending live zydeco performances by Clifton Chenier’s tribute band, all of which feed their curiosity and inspire interdisciplinary classroom projects.
  travel: Desiree Bailey prefers thoughtfully planned road trips that combine cultural immersion and nature, having explored the historic French Quarter of New Orleans, the bayous of Atchafalaya, and a
    weekend retreat in Austin’s music scene, while dreaming of a solo adventure to the lavender fields of Provence and a family‑friendly cruise to the Gulf Islands, always budgeting carefully to accommodate
    their graduate school tuition goals.
  culinary: Desiree Bailey enjoys cooking Cajun and Creole classics such as gumbo with Andouille sausage, shrimp étouffée flavored with filé powder, and jambalaya rich in bell peppers and cayenne, demonstrating
    an intermediate skill level that lets them experiment with fresh local produce like okra and crawfish, and they relish dining out at the waterfront restaurant The Landing for its blackened catfish and
    beignets.
  core: Desiree Bailey is a compassionate educator who balances meticulous planning with artistic curiosity, often worrying about details yet finding calm in yoga, photography, and the simmering pot of
    a well‑spiced gumbo.
background:
  cultural: Desiree is a white Southern American who grew up in Lake Charles, Louisiana. Her upbringing was shaped by the region's blend of Southern hospitality, Cajun and Creole cultural influences, and
    a strong emphasis on community and education. She participated in local traditions such as Mardi Gras, the Louisiana Pirate Festival, and community fairs, developing a deep appreciation for regional
    music, cuisine, and natural landscapes. While her heritage aligns with mainstream American traditions, she actively embraces the multicultural tapestry of Louisiana, integrating its art, history, and
    values of cooperation and compassion into both her personal life and professional practice.
attributes:
  skills: '[''Curriculum design'', ''Lesson planning'', ''Assessment development'', ''Instructional technology integration'', ''Academic advising'', ''Student mentorship'', ''Grant writing'', ''Community
