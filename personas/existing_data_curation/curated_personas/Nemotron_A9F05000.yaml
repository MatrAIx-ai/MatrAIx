  hobbies: '[''Visiting art galleries and museums'', ''Photography'', ''Reading contemporary fiction and poetry'', ''Cooking Cajun and Creole cuisine'', ''Yoga and meditation'', ''Hiking and kayaking in
    wetlands'', ''Journaling'', ''Volunteer tutoring at community centers'', ''Attending live music events'', ''Exploring local festivals'']'
  career_goals: Desiree aims to advance into a leadership role such as department chair or program director, where she can shape interdisciplinary curricula that blend the arts, social sciences, and community
    engagement. She plans to earn a bachelor's degree followed by a master's in education to strengthen her scholarly credentials. She seeks research funding to investigate the impact of interdisciplinary
    teaching on student well‑being and retention, with the goal of publishing her findings. Additionally, she aspires to develop outreach initiatives that connect the college with local schools, cultural
    institutions, and community organizations in Lake Charles, enhancing access to higher education and the arts.
