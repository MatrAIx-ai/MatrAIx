persona_description: A scientist who is leading a team to develop new materials for 3D printing, specifically focusing on the use of liquid crystal elastomers (LCEs) to create complex, porous lattice structures
  that mimic biological tissues. The scientist has a background in mechanical engineering and has received funding from the NSF to develop LCEs as a shock absorber for football helmets. The scientist's
  team has reported significant progress in the development of LCEs and has created the largest LCE device with the most detail, leading to up to 27 times greater strain-energy dissipation compared to those
  printed from a commercially available photocurable elastomer resin. The scientist is most excited about the possibilities of using LCEs in the spine and is looking forward to taking the next step in the
  development of synthetic spinal tissue discs.
