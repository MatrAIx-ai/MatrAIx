  career_goals: Louis aims to leverage his engineering background to mentor youth in STEM, especially underrepresented Black students in the St. Louis area. He plans to volunteer as a consultant for local
    community technology workshops, help secure grants for after‑school programs, and possibly author a memoir that highlights his professional journey and the importance of resilience. He also hopes to
    be recognized as a bridge‑builder between older and younger generations in his community.
