  hobbies: '[''Model Shipbuilding'', ''Woodturning'', ''Fishing'', ''Chess'', ''Technical Reading'', ''Gardening'', ''Southern Cooking'', ''Small-Group Gospel Choir Participation'']'
  career_goals: As a retired professional, Faizan focuses on preserving his legacy and staying mentally sharp. He aims to compile a detailed autobiography and a collection of technical manuals to pass to
    his grandchildren, mentor his son and younger relatives in trade skills, and create a modest weekend workshop where he can teach woodworking and basic repairs. He also seeks to maintain a disciplined
    health routine, manage his finances carefully to ensure a stress‑free retirement, and expand his involvement in a small community service group at his church.
