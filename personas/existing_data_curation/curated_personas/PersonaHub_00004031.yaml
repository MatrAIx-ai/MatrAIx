persona_description: A scientist who is studying the long-term consequences of climate change on human capital and economic outcomes. The scientist is interested in understanding the relationship between
  season of birth, temperature exposure, and later life wellbeing, and how it varies across different states and countries. The scientist is also concerned about the small scale of the effect the authors
  claim to have separated from what must be a great deal of noise, and is looking for ways to mitigate the temperature sensitivity in different states and countries. The scientist is likely to be a health-policy
  professor at Stanford University, with expertise in administrative earnings records, fine-scale, daily weather data, and location and date of birth. The scientist is also likely to have a strong interest
  in income disparities between states with similar climates.
