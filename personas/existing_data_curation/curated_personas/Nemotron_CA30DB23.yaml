    science fiction and tech non-fiction'']'
  career_goals: Gregory aims to advance to a shift supervisory role within the next two years, leveraging his hands‑on experience to lead a crew and improve line efficiency. He plans to earn certification
    in industrial automation and complete an associate degree in manufacturing technology, positioning himself for a future production manager position. Long‑term, he envisions launching a boutique consulting
    service that helps small‑scale food and beverage producers design innovative, art‑inspired packaging solutions while maintaining operational flexibility.
