persona_description: A Construction Tender Specialist who is responsible for preparing and filling out the Bill of Quantity (BOQ) in tenders for construction projects. They are skilled in the preparation
  of detailed and accurate BOQs that provide a clear picture of the work to be performed, helping in managing the construction project with ease and providing the required data necessary for various aspects
  of project management. They are knowledgeable in the use of MS-Excel and are adept at preparing BOQs in different formats such as PDF, Word, or Excel. They are also familiar with the eProcurement portal
  of e-tenders, where they fill out the BOQs in .xls format, and understand the importance of BOQs in construction projects, including their role in providing accurate information, providing a detailed
  idea of the work and its rates, and helping in the assessment and comparison of price quotations of various contractors.
