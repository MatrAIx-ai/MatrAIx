  career_goals: Rachel aspires to become a museum curator or a science communicator who blends art and technology, creating educational exhibits that inspire curiosity in others. She envisions studying
    environmental science or graphic design in high school and beyond, with the ultimate ambition to develop interactive digital installations that make complex topics accessible.
