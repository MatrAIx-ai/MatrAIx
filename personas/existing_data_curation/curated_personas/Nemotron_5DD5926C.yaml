personas:
  professional: Ivan Sanders is a licensed pipefitter and steamfitter whose meticulous blueprint reading, MIG/TIG welding expertise, and rigorous OSHA compliance enable them to lead complex high‑pressure
    steam projects while mentoring apprentices with a disciplined, results‑focused approach.
  sports: Ivan Sanders maintains a disciplined five‑day weightlifting split at the local Ironworks Gym, joins weekly pickup basketball games at the East Atlanta Community Center, and roots for the Atlanta
    Hawks while occasionally cheering the Atlanta Falcons during football season, blending structured strength training with social sport participation.
  arts: Ivan Sanders finds balance in the rhythmic cadence of classic soul legends like Marvin Gaye, gospel powerhouses such as Kirk Franklin, and contemporary hip‑hop artists like J. Cole, while their
    hands‑on hobby of building scale model trains and restoring vintage cars fuels an appreciation for the craftsmanship of visual artisans like the late Charles “Buck” Fox.
  travel: Ivan Sanders plans meticulous weekend road trips that alternate between exploring the engineering marvels of the Grand Canyon’s water management system and visiting the historic Union Station
    steam locomotives in St. Louis, using a detailed itinerary app to maximize efficiency while respecting their limited budget and demanding work schedule.
  culinary: Ivan Sanders cooks Southern comfort meals such as crispy fried chicken, collard greens seasoned with smoked paprika, and shrimp‑and‑grits, perfecting meal‑prep portions that hit macro goals
    for weightlifting, yet they occasionally over‑salt their dishes in the pursuit of flavor intensity.
  core: Ivan Sanders blends meticulous engineering precision with a competitive streak, channeling stress into disciplined workouts, detailed budgeting, and hands‑on hobbies while wrestling with occasional
    over‑worry and a reluctance to unwind fully.
background:
  cultural: Ivan grew up in Riverdale, Georgia, within a close‑knit African‑American community that blends Southern traditions with Black cultural heritage. Family and church have been central pillars;
    he attended a local Baptist congregation where gospel music and community service were integral parts of life. The neighborhood’s strong emphasis on resilience and mutual support shaped his competitive
    drive and disciplined work ethic. Culinary traditions such as fried chicken, collard greens, and peach cobbler are part of his family’s gatherings, while music ranging from church choirs to modern hip‑hop
    reflects his cultural roots. A legacy of trades work runs in his family—his father and several relatives were plumbers and electricians—providing both mentorship and a sense of pride in skilled manual
    labor.
attributes:
  skills: '[''pipe installation & layout'', ''blueprint reading'', ''welding (MIG/TIG)'', ''pipe threading and brazing'', ''hydrostatic testing'', ''system diagnostics'', ''preventive maintenance scheduling'',
    ''OSHA safety compliance'', ''project management software (Microsoft Project, Fieldwire)'', ''mentoring apprentices'']'
  hobbies: '[''building scale models (trains)'', ''classic car restoration'', ''weightlifting and strength training'', ''basketball'', ''listening to hip‑hop and soul music'', ''reading technical manuals
    and self‑help books'', ''cooking Southern cuisine'', ''DIY home improvement projects'']'
  career_goals: Ivan aims to obtain his journeyman certification within the next year and progress to a master steamfitter credential within five years. He aspires to secure a supervisory role on large
    commercial and industrial projects in the Atlanta metro area, eventually launching his own contracting business focused on energy‑efficient steam heating and green retrofits. To support these goals,
    he plans to earn advanced certifications in fusion welding and LEED‑aligned construction, and to complete an associate degree in construction management at a community college. He also hopes to become
    a union delegate to influence safety standards and advocate for his fellow tradespeople.
