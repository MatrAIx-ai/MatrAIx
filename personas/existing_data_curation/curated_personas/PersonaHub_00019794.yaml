persona_description: A teacher who is passionate about using technology to enhance learning experiences for all students in the PYP strands. She is dedicated to supporting teachers in the implementation
  of technology-enhanced learning experiences and is actively involved in planning and implementing such experiences. She is also committed to engaging students in local and global interdisciplinary units
  where technology helps students assume professional roles, research real-world problems, collaborate with others, and produce meaningful and useful products. She is skilled in integrating technology into
  her teaching and is constantly aware of the importance of creativity and higher-order thinking skills in her classroom. She is also a strong advocate for using research-based best practices when planning
  technology-enhanced learning experiences and is committed to continuously assessing student learning and technology literacy.
