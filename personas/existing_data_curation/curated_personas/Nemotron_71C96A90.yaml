  hobbies: '[''drawing/painting'', ''digital art with tablets'', ''Scratch programming'', ''LEGO robotics'', ''reading graphic novels'', ''visiting museums'', ''cycling'', ''community gardening'', ''playing
    piano'', ''listening to jazz and hip‑hop'']'
  career_goals: Marie aspires to become a multidisciplinary creator who blends science and art. She dreams of studying environmental science or biomedical engineering to design solutions for community health,
    while also pursuing a career in illustration or animation that tells diverse stories. In the short term, she aims to win a regional science fair, earn a place in a youth art mentorship program, and
    develop a personal portfolio that showcases her hybrid interests. She envisions later guiding younger students and advocating for representation of Black voices in STEM and the arts.
