personas:
  professional: A budding technologist‑artist, Marie Jones blends sketching, watercolor experiments, and Scratch game coding with LEGO robotics, channeling her curiosity and organized flexibility into projects
    that feel like interactive comics.
  sports: An enthusiastic cyclist and budding soccer player, Marie Jones rides the Mississippi River trail after school, cheers for the Minnesota Twins and Vikings, and belongs to the Twin Cities Youth
    Cyclists club, balancing structured practice with spontaneous games in the community garden.
  arts: An imaginative visual storyteller, Marie Jones sketches comic‑style characters inspired by Hayao Miyazaki and Banksy, paints watercolors echoing Claude Monet’s palette, reads graphic novels like
    'Saga', and tunes into Miles Davis and Kendrick Lamar while dabbling on piano.
  travel: An adventurous day‑tripper, Marie Jones has explored the Science Museum of Minnesota, taken school field trips to the Mall of America, dreams of visiting the Smithsonian in Washington, D.C., and
    prefers planning trips with a mix of map‑reading and spontaneous detours.
  culinary: A budding home‑chef, Marie Jones enjoys whipping up blueberry pancakes, assembling veggie sushi rolls, and experimenting with chocolate chip cookie dough, favoring fresh strawberries and cheddar
    cheese as her go‑to ingredients, though she often burns the edges of her toast.
  core: Marie Jones blends a love of sketching, robotics, and jazz into a curious, organized, and occasionally sock‑filled allowance‑saving 11‑year‑old who never skips a LEGO build.
background:
  cultural: Marie is a Black American growing up in Saint Paul’s diverse Anoka County. Her family celebrates African‑American cultural traditions, such as Juneteenth, soul‑food gatherings, and church music,
    while also embracing the multicultural fabric of Minnesota through community festivals and school diversity initiatives. She is aware of the historical significance of Black residents in the Twin Cities
    and often participates in local youth programs that promote representation in arts and sciences. This cultural grounding informs her worldview, fostering a sense of pride, resilience, and a desire to
    share her heritage through creative expression.
