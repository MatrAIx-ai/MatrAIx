personas:
  professional: Michael Knox, a budding backyard inventor who spends afternoons building simple contraptions from LEGO bricks and recycled items, demonstrates early engineering curiosity, meticulous organization,
    and a willingness to experiment, hinting at a future in design or mechanical engineering, and they often ask adults for extra parts to expand their projects.
  sports: Michael Knox loves the local soccer drills at the community field, cheers for the New York Knicks during family TV night, and they are a tiny member of the Saratoga Little League Tigers, where
    their energetic yet organized play reflects a balance of teamwork and independent problem‑solving.
  arts: Michael Knox delights in vibrant crayons, rehearses favorite tunes from the Disney soundtrack of 'Moana', and they attend the Stillwater Children's Art Workshop where they sketch scenes from the
    Albany Museum exhibits, often emulating the bold colors of Van Gogh’s 'Sunflowers'.
  travel: Michael Knox’s favorite excursions include the school field trip to the New York State Museum in Albany, a family weekend getaway to the Adirondack Lakes where they camp under the stars, and a
    whimsical visit to the local summer fair, where they eagerly ride the Ferris wheel and sample funnel cake.
  culinary: Michael Knox’s palate is a mix of classic kid favorites—cheese pizza, chicken nuggets, and buttery popcorn—paired with a growing curiosity for homemade oatmeal with honey and sliced strawberries,
    and they proudly eat the “rainbow” veggie sticks their mother prepares after a quick 'taste test' challenge.
  core: Michael Knox, a curious five‑year‑old, blends their love for building, art, and community outings with a sprinkle of impulsive snack cravings and a resilient spirit that tackles allergies and routine
    doctor visits, and they often turn to a trusty storybook for comfort.
background:
  cultural: Michael is a White child raised in Stillwater, Saratoga County, New York. His family participates in community traditions such as the summer fair, local library story hours, and school field
    trips to nearby Albany museums. This upbringing blends modest, middle‑class American values with exposure to diverse cultural experiences offered by the region's art and educational institutions, fostering
    his curiosity and appreciation for varied ideas.
