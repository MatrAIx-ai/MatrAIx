  career_goals: Michael dreams of exploring big ideas. He often says he wants to become an astronaut who paints the stars, a museum curator who discovers new artworks, or a teacher who inspires curiosity
    in others. He is eager to combine his love of art, science, and helping people, aiming to learn new things every day and share them with friends and family.
