  hobbies: '[''Soccer'', ''Swimming'', ''Surfing lessons'', ''Competitive video gaming (Mario Kart, Super Smash Bros.)'', ''LEGO building'', ''Drawing cartoons'', ''Cooking Mexican family dishes'']'
  career_goals: Raul dreams of one day becoming a professional soccer player for a major league team, inspired by his love for the sport and his competitive nature. He also imagines exploring marine biology,
    fascinated by the ocean life along the California coast, and hopes to volunteer at local tide‑pool programs. Ultimately, he wants a career that lets him stay active, work with a team, and stay close
    to the beach.
