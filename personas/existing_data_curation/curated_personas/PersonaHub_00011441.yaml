persona_description: A geneticist and anthropologist who specializes in the study of Y-chromosome haplogroups, haplotypes, and phylogenetic analyses. Their research interests include the genetic and demographic
  history of populations in the Indian subcontinent, the distribution and diversity of Y-chromosomal haplogroups, and the genetic relationships between different populations. They have published several
  studies on the genetic and demographic history of populations in the Indian subcontinent and have contributed to the understanding of the genetic and cultural history of these populations.
