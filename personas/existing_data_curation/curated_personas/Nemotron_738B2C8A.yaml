  career_goals: Jean aims to transition into a school‑wide leadership role within the next five years, targeting positions such as Assistant Principal or Curriculum Coordinator. She wants to spearhead a
    district‑level STEM literacy initiative that pairs classroom learning with local industry partnerships. Additionally, she plans to earn an Ed.D. in Educational Leadership to deepen her knowledge of
    systemic change and policy. She aspires to publish a textbook on adolescent literacy strategies and to mentor a cohort of teachers through a structured professional‑learning community. Recognizing her
    own sensitivity to stress, she also intends to develop a wellness program for staff that incorporates structured reflection, data‑driven goal setting, and mindfulness practices.
