  career_goals: Spencer dreams of exploring the far reaches of space as an astronaut because he loves new ideas and the unknown. He also wishes to become an artist so he can share his colorful imagination
    with the world. Inspired by his caring nature, he imagines himself as a teacher who helps younger children feel confident and safe, especially when they feel worried or stressed. His ultimate ambition
    is to combine his love for discovery, creativity, and kindness to make a positive impact on his community.
