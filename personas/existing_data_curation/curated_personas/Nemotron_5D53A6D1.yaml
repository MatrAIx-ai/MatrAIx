personas:
  professional: Spencer Mcknight, a budding junior architect, channels their curiosity and love for intricate LEGO constructions into early design sketches, applies their organized yet flexible approach
    to building sturdy towers, and delights in turning everyday playground observations into unconventional ideas for future cityscapes.
  sports: Spencer Mcknight, a lively fan of the Orlando Magic basketball team and the Tampa Bay Lightning hockey squad, spends afternoons kicking a soccer ball with the Kissimmee Youth Soccer Club, splashes
    around the community pool’s shallow lane, and proudly waves a team flag during weekend family game nights.
  arts: Spencer Mcknight, an enthusiastic admirer of The Wiggles' upbeat tunes and Pixar's enchanting animation, spends Saturday mornings drawing swirling suns and quirky characters in the style of Pablo
    Picasso while humming along to familiar choruses that echo the lively gospel sing-alongs at church gatherings.
  travel: Spencer Mcknight, an adventurous little traveler, has already marveled at the magical Kingdom at Walt Disney World, collected seashells at Clearwater Beach, keeps a treasured postcard from the
    Everglades National Park, and dreams of holding a compass while exploring the ancient pyramids of Giza and wandering the cobblestone streets of Paris.
  culinary: Spencer Mcknight, a budding kitchen explorer, relishes creamy mac and cheese drizzled with buttery breadcrumbs, savors juicy mango slices, helps stir fragrant collard greens at family Juneteenth
    potlucks, and insists on sprinkling extra chocolate chips on every cookie, even when their parents remind them to keep portions small.
  core: Spencer Mcknight blends relentless curiosity, organized LEGO building, occasional worry‑filled bedtime thoughts, and unstoppable bursts of dance whenever The Wiggles play, turning each day into
    a colorful collage of learning, laughter, and heartfelt kindness.
background:
  cultural: Spencer is an African‑American child growing up in the vibrant, multicultural community of Kissimmee, Florida. His family celebrates traditions such as Juneteenth, soul food gatherings, and
    local church events that emphasize community support and music. He is also exposed to the diverse cultural tapestry of Central Florida, including Caribbean influences from nearby families, and participates
    in neighborhood festivals that highlight art, dance, and storytelling. This rich cultural environment nurtures his appreciation for art, new ideas, and the importance of caring for others.
