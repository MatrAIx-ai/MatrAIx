personas:
  professional: Juanita Cole is a full‑stack software engineer who leverages user‑centered design and data‑visualization expertise to build maintainable, inclusive digital products, balancing their curiosity
    for emerging frameworks with a disciplined, document‑driven workflow that keeps projects organized yet adaptable.
  sports: Juanita Cole enjoys early‑morning runs along the Brooklyn waterfront, plays pick‑up basketball with the Brooklyn Athletic Club during the summer, follows the Brooklyn Nets, New York Yankees, and
    New York Knicks, and supplements cardio with weekly yoga sessions that align with their need for flexibility and mindfulness.
  arts: Juanita Cole feeds their creative side by playing saxophone with a small jam circle, curating a blog that intertwines technology, street art, and cultural narratives, often attending exhibitions
    featuring contemporary visionaries such as Takashi Murakami, Julie Mehretu, and Jean‑Michel Basquiat, and drawing sonic inspiration from legends like John Coltrane and Miles Davis.
  travel: Juanita Cole prefers carefully planned week‑long trips that blend cultural immersion with creative stimulus, having explored the street‑art districts of Lisbon, the tech hubs of Seoul, and the
    historic music scene of New Orleans, while budgeting for occasional weekend getaways to the Hudson Valley vineyards close to home.
  culinary: Juanita Cole loves preparing hearty, family‑style comfort dishes—such as slow‑braised short ribs, sautéed collard greens with smoked turkey, and buttery cornbread—showcasing a confident yet
    experimental cooking style that incorporates bold ingredients like smoked paprika, okra, and black‑eyed peas, and enjoys pairing meals with craft beers from local Brooklyn breweries.
  core: Juanita Cole blends disciplined engineering with artistic curiosity, navigating life with a balance of meticulous planning, quiet resilience, and a penchant for soulful music and community mentorship.
background:
  cultural: Juanita was raised in a Black household with a Jamaican mother and a Southern‑U.S. father, exposing her to a blend of Caribbean rhythms, gospel music, and rich storytelling traditions. Growing
    up in the Bronx before moving to Brooklyn, she participated in community cultural events such as the African Diaspora Festival and local Black History Month celebrations. Her cultural heritage informs
    her worldview, her commitment to community empowerment, and her appreciation for art, music, and collective resilience.
attributes:
  skills: '[''Python'', ''JavaScript'', ''React'', ''Node.js'', ''SQL'', ''Data Visualization (D3.js, Tableau)'', ''Technical Writing'', ''Agile Scrum'', ''User Experience Design'', ''Cultural Competency'']'
  hobbies: '[''Reading contemporary African American fiction'', ''Street art and gallery tours'', ''Yoga'', ''Urban gardening'', ''Cooking soul‑food'', ''Mentoring women of color in tech'', ''Playing saxophone
    in a small ensemble'', ''Blogging about technology and culture'']'
  career_goals: She aspires to become a lead engineer or technical director at a company that builds inclusive digital products for underrepresented communities. Juanita plans to deepen her expertise in
    human‑computer interaction through a part‑time master's program, mentor Black women in tech through local coding bootcamps, and eventually launch a social‑impact startup that provides a platform for
    Black artists to showcase and monetize their work. She balances her ambition with a practical focus on sustainable codebases and work‑life balance.
