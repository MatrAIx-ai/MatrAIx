  hobbies: '[''Watercolor painting'', ''Reading historical fiction and poetry'', ''Gardening'', ''Listening to merengue and bachata'', ''Knitting, crocheting, and embroidery'', ''Genealogy research'', ''Volunteering
    at senior center'']'
  career_goals: Although retired from formal employment, Emperatriz aims to deepen her engagement with the arts and her cultural legacy. She hopes to start a small weekly cooking workshop at the local senior
    center, where she can teach traditional Dominican recipes to younger participants. She also plans to document her family’s migration story in a memoir, preserving oral histories for future generations.
    Additionally, she aspires to improve her digital photography skills to create a visual archive of the Dominican diaspora in upstate New York, and to volunteer as a cultural liaison for the town’s multicultural
    events.
