persona_description: 'A marine biologist who specializes in the study of fish behavior and physiology. Their research interests include, but are not limited to, the development of new techniques for studying
  fish behavior, the effects of stress on fish behavior, and the role of the nervous system in fish behavior. They are also interested in the ecological importance of fish populations and the conservation
  of fish species. They have conducted research on the physiological and behavioral differences between fish and birds and mammals, and have found that fish have fully developed brains and nervous systems
  and very sensitive mouths. They have observed that fish use their tongues and mouths as humans might use their hands to catch or gather food, build nests, and even hide their offspring from danger. They
  have also observed that fish experience fear, and that when fish are chased, confined, or otherwise threatened, they react as humans do to stress: with increased heart and breathing rates and a burst
  of adrenalin.'
