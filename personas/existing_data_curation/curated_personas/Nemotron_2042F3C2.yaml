personas:
  professional: Joffre Stone is an aspiring teenage technologist who blends a love for strategy video games with hands‑on building of LEGO, model rockets, and simple electronics, using that creative curiosity
    to prototype small‑scale gadgets and dreaming of a future career in mechanical engineering.
  sports: Joffre Stone frequents the Rock County Skate Park mastering flip tricks, follows the Milwaukee Bucks and Green Bay Packers, and participates in a local junior soccer league with the Janesville
    Jr. Knights, preferring spontaneous, outdoor activity over regimented gym workouts.
  arts: Joffre Stone captures wildlife on a DSLR during hikes, sketches pine‑forest vistas in a weathered sketchbook, devours sci‑fi novels by Neal Stephenson, and amps up creative brainstorming while listening
    to Arctic Monkeys, Tame Impala, and The Strokes.
  travel: Joffre Stone plans trips on a whim, favoring day hikes in Kettle Moraine State Forest, weekend family outings to Door County, and dreaming of a future backpacking adventure through Norway's fjords
    after being inspired by a travel documentary.
  culinary: Joffre Stone relishes pepperoni pizza, homemade mac & cheese, and occasional spicy ramen, tries to perfect a simple omelette after skate sessions, yet often gravitates toward greasy cheeseburgers
    as a post‑adventure reward.
  core: Joffre Stone is a curiosity‑driven teen who balances outdoor exploration, digital strategy gaming, and spontaneous creativity, while juggling a relaxed approach to obligations and occasional impulsive
    habits.
background:
  cultural: Joffre was raised in Evansville, Wisconsin, a small, close‑knit town in Rock County with a heritage that traces back to German and Scandinavian immigrants. His family upholds Midwestern values
    of hard work, self‑reliance, and community involvement, often participating in church potlucks, local high‑school sports events, and the annual county fair where traditional foods and crafts are celebrated.
    He grew up with a mix of rural life—spending weekends fishing, hunting, or helping with small‑scale farming tasks on a neighbor’s property—and modern media, which has given him a broad perspective.
    These cultural ties have shaped his practical mindset, respect for nature, and a strong sense of belonging to a supportive community.
attributes:
  skills: '[''computer troubleshooting'', ''basic Python scripting'', ''LEGO/model kit construction'', ''basic car maintenance'', ''skateboarding'', ''basketball team play'', ''DIY woodworking'', ''social
