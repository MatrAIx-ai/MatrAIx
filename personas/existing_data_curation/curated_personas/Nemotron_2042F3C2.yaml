  hobbies: '[''hiking local nature trails'', ''video gaming (strategy & simulation)'', ''skateboarding'', ''building LEGO and model kits'', ''DIY electronics projects'', ''reading science‑fiction'', ''listening
    to alternative‑rock music'', ''community service at county fair'']'
  career_goals: Joffre aims to finish high school with a GED and then enroll in a vocational technical program that trains automotive technicians, especially in electronic diagnostics and hybrid vehicle
    systems. He hopes to earn ASE certification and eventually work at a reputable garage or dealership where he can combine his love of hands‑on repair with the digital side of modern cars. In the longer
    term, he is intrigued by the possibility of designing software tools for automotive diagnostics, so he plans to keep building his programming skills alongside his trade training. He also wants to earn
    enough to support his family and have the flexibility to continue his personal projects and hobbies.
