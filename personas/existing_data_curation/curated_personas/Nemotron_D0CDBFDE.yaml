personas:
  professional: Rafael Hamze, a budding community arts coordinator, blends basic graphic design skills in Canva and GIMP with a keen eye for Mexican folk art to curate vibrant murals and social media campaigns
    for local festivals, while their relaxed approach to obligations leads them to juggle multiple projects with creative spontaneity.
  sports: Rafael Hamze, an outdoor‑enthusiast who follows the Oklahoma City Thunder and the Oklahoma Sooners football team, regularly hikes with the Oklahoma Trails Club, joins seasonal pickup basketball
    games at the community center, and prefers weekend trail runs over gym workouts, though they often skip scheduled training sessions when a new game release distracts them.
  arts: Rafael Hamze, an avid admirer of Diego Rivera’s murals and Frida Kahlo’s vivid self‑portraits, spends weekends exploring OKC’s street art, curates Instagram reels featuring local artist interviews,
    and finds inspiration in indie rock groups like Arctic Monkeys and Mexican bands such as Café Tacvba, while occasionally sketching whimsical illustrations for community flyers.
  travel: Rafael Hamze, a spontaneous road‑trip photographer, maps out weekend getaways to places like Santa Fe’s art markets, Sedona’s red rock trails, and Austin’s live‑music scene, balancing a love for
    unplanned photo stops with a mild anxiety about budgeting, which sometimes leads to last‑minute cancellations.
  culinary: Rafael Hamze, a self‑taught home cook, perfects classic dishes such as tacos al pastor, mole poblano, and chiles en nogada, while experimenting with fusion recipes like kimchi‑topped quesadillas
    and cilantro‑lime corn pudding, often sourcing fresh cilantro, ancho chilies, and avocado from the local farmer’s market.
  core: Rafael Hamze, a creatively curious 28‑year‑old, stitches together community art, spicy cuisine, and spontaneous hikes, all while battling mild disorganization and a penchant for last‑minute inspiration.
background:
  cultural: Rafael is a second‑generation Mexican American who grew up in a bilingual household in Oklahoma City. His parents emigrated from Jalisco and brought traditions such as Día de los Muertos altars,
    posadas, and authentic Mexican cuisine. He celebrates both American holidays and Mexican cultural events, blending them with local Oklahoman customs. Deeply rooted in Mexican values of family, community,
    and respect, he also embraces the Southern hospitality and love for outdoor activities common in Oklahoma. He participates in a local Mexican community association, helping organize events that fuse
    Mexican folk art with the regional art scene, and maintains connections with extended family across Texas and California.
