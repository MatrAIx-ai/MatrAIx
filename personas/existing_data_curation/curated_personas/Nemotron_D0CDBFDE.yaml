  career_goals: Rafael aims to turn his passion for art and community into a professional role, such as a community arts coordinator or cultural program assistant at a local museum or community center.
    He plans to enroll in a community college to earn an associate degree in Art and Design or a certificate in Museum Studies, while also building a portfolio of digital illustrations and event projects.
    In the longer term, he dreams of launching a pop‑up gallery or a small Mexican‑inspired food stall that showcases local artists. He also hopes to become a mentor for Mexican‑American youth, using art
    as a tool for self‑expression, and to develop better organizational habits to manage projects more effectively.
