  hobbies: '[''Reading mystery and historical fiction'', ''Journaling'', ''Landscape photography'', ''Hiking desert trails'', ''Knitting and crocheting'', ''Cooking and recipe experimentation'', ''Listening
    to science & tech podcasts'', ''Small‑group board game evenings'']'
  career_goals: Looking ahead, Sarah is determined to secure a stable and community‑oriented career that leverages her organizational strengths and caring nature. She plans to obtain her GED within the
    next year, followed by an associate’s degree in business administration or health services at a local community college. Her long‑term ambition is to become a medical office administrator or a logistics
    coordinator for a regional agricultural cooperative, roles that combine her love for detailed planning, reliable execution, and service to others. Sarah also hopes to continue her personal development
    by taking occasional vocational workshops in automotive technology, keeping her practical curiosity alive while building a reliable career foundation.
