  hobbies: '[''Museum and gallery visits'', ''Live theatre and concerts'', ''Reading art literature'', ''Poetry and essay writing'', ''Street photography'', ''Gardening'', ''Hosting tea gatherings'', ''Bridge
    and trivia games'', ''Volunteering in senior arts programs'', ''Traveling to cultural destinations'']'
  career_goals: Vanessa aims to stay actively involved in Atlanta’s arts community by volunteering as a guest curator for local museums and community centers, where she can shape exhibitions that highlight
    under‑represented Southern artists. She plans to launch an intergenerational mentorship program that pairs senior volunteers with emerging youth artists, fostering knowledge exchange and creative collaboration.
    Publishing a collection of her art essays and personal memoirs is a long‑term ambition, as is organizing a traveling pop‑up showcase of works by overlooked regional creators. Leveraging her competitive
    spirit, she hopes to earn recognition in senior arts competitions and use any award winnings to fund scholarships for art students. Vanessa also wants to explore emerging technologies, integrating virtual‑reality
    art experiences into workshops for seniors, thereby merging her curiosity for new ideas with her desire to enrich community life.
