persona_description: A paleontologist and early-mammal expert at the University of Chicago who specializes in the study of multituberculates, the earliest mammals. She is passionate about the discovery
  of Rugosodon eurasiaticus, a 160-million-year-old fossil of a rodent-like creature that bears a superficial resemblance to a small rat or a chipmunk and was an early member of the group of mammals known
  as multituberculates. The discovery of hyper-back-rotation ankles in such an early multituberculate supports the idea that this was a key reason they were so successful, and she is excited about studying
  other fossil discoveries related to multituberculates and the evolution of early mammals.
