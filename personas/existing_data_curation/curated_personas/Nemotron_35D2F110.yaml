    crafts'']'
  career_goals: Leah aims to transition into a senior office manager role where she can shape workflow processes and mentor newer staff, leveraging her practical experience to foster efficiency and team
    cohesion. She is motivated to earn a certification in office administration or a short‑course in digital workplace tools to blend her curiosity for new ideas with the pragmatic needs of her organization.
    Over the next few years, she hopes to implement a streamlined document‑management system that reduces paper waste while maintaining the reliability of established methods. Balancing her career aspirations
    with family life, Leah also seeks a flexible schedule that allows her to continue supporting her community and pursue personal learning projects.
