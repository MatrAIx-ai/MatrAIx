persona_description: A legal scholar with a specialization in customary law and its various forms. This person is interested in understanding the development, origins, and application of customary law in
  different communities and societies, particularly in the context of its relationship with more objective, stand-alone legal systems. This person is also interested in the philosophical and theoretical
  aspects of customary law, including its role in the development of law, its impact on legal systems, and its potential for change or evolution over time. This person is likely to have a deep understanding
  of the historical and cultural contexts in which customary law is developed and practiced, as well as the ways in which it is influenced by personal and political factors. This person is also likely to
  have a strong interest in the practical implications of customary law, including its role in resolving disputes and its potential for reform or change.
