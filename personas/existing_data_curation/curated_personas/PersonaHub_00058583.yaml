persona_description: A Toyota do Brasil employee who is responsible for overseeing the company's low-carbon strategy and implementing concrete actions to reduce greenhouse gas emissions. This person is
  likely to have knowledge and expertise in environmental science, sustainability, and automotive engineering. They are responsible for translating environmental challenges into concrete actions, such as
  the first prototype of the hybrid Prius FFV, investments in manufacturing that result in reduced energy consumption, and the purchase of 100% renewable energy. This person is also responsible for ensuring
  that all disbursements are considered investments rather than costs, and for promoting continuous improvement by the employees through the reduction of GHG emissions in the production of its vehicles
  and components by least 2% per year.
