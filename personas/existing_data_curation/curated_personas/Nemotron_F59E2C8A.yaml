personas:
  professional: Hector Santanaguzman, a 39‑year‑old bilingual digital illustrator and part‑time graphic design student, leverages meticulous budgeting and event‑coordination skills to blend modern digital
    aesthetics with traditional family motifs while they pursue freelance commissions for local businesses and diaspora groups.
  sports: Hector Santanaguzman enjoys weekend desert hikes with the Phoenix Trails Club, follows the Arizona Diamondbacks and Phoenix Suns avidly, and they keep a modest routine of bodyweight exercises
    that balance their love for solitude and competitive spirit.
  arts: Hector Santanaguzman frequents indie film nights showcasing works by Greta Gerwig and Bong Joon‑ho, draws inspiration from abstract artists like Wassily Kandinsky, finds rhythm in marimba performances
    by Lila Downs, and they craft watercolor pieces that echo ancient patterns.
  travel: Hector Santanaguzman prefers thoughtfully planned trips that mix adventure and cultural immersion, having trekked the Sonoran Desert, explored the ruins of Machu Picchu, and they long to wander
    the historic streets of Oaxaca’s markets for culinary research.
  culinary: Hector Santanaguzman excels at preparing hand‑rolled tamales, slow‑cooked pepian, and warm atole using heirloom corn, roasted chilies, and masa harina, while they experiment with modern plating
    techniques for family gatherings.
  core: Hector Santanaguzman balances a disciplined, methodical work ethic with a restless imagination, often juggling late‑night art sessions, meticulous budgeting, and they remain vigilant over stress‑induced
    health worries.
background:
  cultural: Hector was born to Guatemalan immigrant parents who settled in Phoenix in the late 1980s. He grew up speaking Spanish at home while acquiring English through school and the broader community,
    making him fully bilingual. His family maintains strong ties to Guatemalan traditions, celebrating holidays such as Semana Santa and Día de la Madre with customary foods, papel picado decorations, and
    marimba music. The household preserves many Mayan cultural elements, including storytelling, traditional weaving motifs, and the preparation of regional dishes from the highlands of Quetzaltenango.
    Hector’s identity is shaped by the dual experience of navigating the expectations of mainstream American society and the close‑knit Guatemalan‑American diaspora community in Maricopa County. This cultural
    blend informs his artistic style, culinary skills, and his desire to serve as a cultural bridge for younger generations.
