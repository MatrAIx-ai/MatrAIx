    marimba and folk music'', ''Participating in community art fairs'']'
  career_goals: Hector aims to turn his artistic talents and cultural knowledge into a sustainable freelance career. Over the next two years, he plans to enroll in a part‑time associate program in graphic
    design at a community college, build a professional portfolio that blends contemporary digital aesthetics with Guatemalan motifs, and secure regular commissions from local small businesses and diaspora
    organizations. He also dreams of launching a modest online store selling hand‑painted ceramics and custom illustrations, with the long‑term goal of generating enough income to support his family, provide
    financial assistance to relatives in Guatemala, and reduce the chronic stress that stems from job insecurity. Ultimately, Hector envisions establishing a community studio where he can mentor young Guatemalan‑American
    artists and host cultural workshops.
