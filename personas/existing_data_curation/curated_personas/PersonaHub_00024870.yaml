persona_description: A Soil Conservation Service professional who specializes in providing assistance to land users in planning and carrying out conservation programs that meet their needs and the needs
  of their land, and who also provides assistance to owners and operators of rural land to install and maintain best management practices to control nonpoint source pollution, thus improving water quality.
  The Soil Conservation Service professional has expertise in soil and water conservation, natural resource survey, and rural community protection and development, and is skilled in providing onsite assistance
  to land users in planning and carrying out conservation programs, providing basic soil information and interpretations of land conditions, and providing assistance to units of government in inventorying
  natural resources and planning their wise use.
