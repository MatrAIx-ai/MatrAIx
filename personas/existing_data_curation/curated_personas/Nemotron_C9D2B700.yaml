  career_goals: Julie aims to earn her CFA charter within the next two years and progress to a senior portfolio manager role at her firm. She aspires to lead a specialized investment team, shaping strategy
    for sustainable and community‑oriented assets. Over the long term, she envisions stepping into a director‑level position where she can integrate her passion for financial education by establishing a
    firm‑wide financial literacy program for clients and employees. She also seeks to contribute thought leadership through industry publications and conference speaking engagements, positioning herself
    as a trusted voice in responsible investing.
