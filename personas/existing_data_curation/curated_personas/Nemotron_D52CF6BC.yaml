  career_goals: Richard often talks about becoming an astronaut who can explore space and draw the planets he discovers, or a painter who can turn his vivid imagination into beautiful artwork. He also dreams
    of being a superhero who helps his friends and family, reflecting his caring nature. Even at his young age, he expresses a desire to keep learning new things, asking many questions, and sharing his
    ideas with others, showing an ambition to grow into a creative problem‑solver and a helpful community member.
