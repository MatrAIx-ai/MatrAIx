  hobbies: '["Fishing", "Woodworking", "Crossword Puzzles", "Western Novels", "Watching High School Football", "Card Games (Bridge)", "Birdwatching", "Gardening", "Attending Church Services"]'
  career_goals: Although retired, Idrees aims to preserve his independence and reduce the anxiety that often accompanies aging. His primary goals are to keep his home and finances orderly, complete a personal
    memoir that captures his family’s history, and continue sharing his practical knowledge through informal mentoring at the senior center. He also hopes to stay physically active enough to enjoy fishing
    trips and occasional woodworking projects, while gradually improving his organization to alleviate stress.
