  career_goals: Although she is only six, Samantha already dreams of a future where she can help others. She imagines herself as a kindergarten teacher who inspires curiosity and guides young minds, or
    as a veterinarian who cares for animals in her community. Her compassion also fuels a desire to volunteer at local events, perhaps organizing neighborhood clean‑ups or fun fairs that bring friends and
    families together. These ambitions reflect her blend of practical organization and heartfelt desire to make a positive impact.
