personas:
  professional: Samantha Zapata is an aspiring junior naturalist who turns backyard explorations into scientific mini‑projects, using their keen eye for detail and methodical cataloguing of leaves, rocks,
    and insects, while their organized, compassionate nature ensures they share findings with classmates during group activities.
  sports: Samantha Zapata runs on the third‑grade soccer team, the Community Lions, loves playing tag during recess, cheers loudly for the local professional baseball team, the Harbor Hawks, and practices
    basic dribbling drills at home, blending a love for energetic group movement with a disciplined practice schedule.
  arts: Samantha Zapata spends afternoons drawing detailed animal scenes inspired by Eric Carle, builds intricate LEGO cities while listening to upbeat tunes from The Wiggles, and eagerly attends library
    storytime featuring Mo Willems, allowing music and visual art to fuel their creative expression and collaborative storytelling.
  travel: Samantha Zapata enjoys weekend trips to the nearby state park to hunt for cool rocks, has visited the city zoo on a family vacation, and dreams of exploring Disney World, preferring hands‑on,
    family‑guided adventures that combine learning, excitement, and a chance to collect souvenirs like leaf pressings.
  culinary: Samantha Zapata loves pizza with extra cheese, colorful fruit kebabs made of strawberries, banana slices, and grapes, and proudly helps stir batter for simple cupcakes, yet they often forget
    to chew slowly, leading to occasional coughs after meals.
  core: Samantha Zapata mixes boundless curiosity with a tidy, team‑focused approach, turning every day into a playful, organized quest that occasionally ends in sticky fingerprints and a giggle.
background:
  cultural: 'Samantha grew up in Bolton, a small rural community in Bladen County, North Carolina. Her family’s cultural setting is rooted in Southern white traditions: frequent participation in church
    gatherings, school fairs, and community events that emphasize neighborliness and hospitality. Meals often feature regional favorites like fried chicken, sweet tea, and seasonal produce from local farms.
    While her surname, Zapata, hints at Hispanic ancestry, her immediate cultural experiences are shaped by the rhythms of small‑town life—outdoor play, storytelling, and close family ties. This blend of
    Southern community values and subtle multicultural awareness informs her respectful, cooperative, and curious outlook on the world.'
