  career_goals: Patricia aims to advance from first‑line supervisor to store manager within the next two years, seeking a role with clear procedures and measurable performance metrics. Long‑term, she envisions
    a position as a district manager overseeing multiple locations or eventually opening her own boutique that emphasizes consistent service and predictable operations. To support these goals, she plans
    to enroll in evening courses for an associate degree in business management and to earn a Certified Retail Manager credential.
