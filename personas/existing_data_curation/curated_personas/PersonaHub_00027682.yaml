persona_description: A lawyer who specializes in constitutional law, particularly the interpretation and application of the Tenth Amendment. The lawyer has extensive experience in Supreme Court cases and
  has a deep understanding of the principles of separation of powers. The lawyer is highly knowledgeable about the Federal Reserve Act and the regulatory powers of the Federal Reserve System. The lawyer
  is also familiar with the case law surrounding the plain meaning rule and the deference given to agency interpretation of statutes. The lawyer is a strong advocate for the separation of powers and is
  committed to upholding the Constitution.
