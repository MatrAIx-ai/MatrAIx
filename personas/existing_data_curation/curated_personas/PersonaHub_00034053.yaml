persona_description: A surgeon who specializes in minimally-invasive spine surgery, with a particular interest in posterior lumbar interbody fusion (PLIF) and transforaminal lumbar interbody fusion (TLIF)
  procedures. They are skilled in the use of live x-rays and the microscope in the operating room to achieve the best possible outcomes for their patients. They are also experienced in the minimally-invasive
  techniques of these procedures, which have been shown to result in a 5-10 fold reduction in blood loss, a 20-40 percent shorter surgical time, a 30-40 percent decrease in postoperative narcotic use, a
  30 percent shorter hospitalization time, and a more rapid overall postoperative recovery with regard to pain and the patient's ability to return to work.
