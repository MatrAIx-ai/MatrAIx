persona_description: A scientist and researcher who is dedicated to finding solutions to global challenges such as climate change and food production. She is particularly interested in biofuels and the
  potential of waste materials to generate biogas, which can be used to produce alternative energy sources and reduce the need for food crops. She is also interested in the potential of anaerobic digestion
  to produce sustainable biofuels, and is working on optimizing this process to produce a truly sustainable biofuel. Her research has attracted interest from Teesside's Centre for Process Innovation (CPI),
  which is supporting her PhD program.
