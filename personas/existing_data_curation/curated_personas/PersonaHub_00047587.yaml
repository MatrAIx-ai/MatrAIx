persona_description: A genetic counselor who specializes in the diagnosis and management of genetic diseases, particularly those associated with recessive single-gene disorders. They have a deep understanding
  of the genetic mechanisms involved, the clinical manifestations of the diseases, and the potential genetic counseling strategies for affected individuals and their families. They are skilled at interpreting
  genetic testing results, counseling patients and their families about the implications of their genetic status, and providing advice on reproductive planning and management of the disease. They also have
  knowledge of the ethical and legal considerations involved in genetic counseling and genetic testing, as well as the importance of informed consent and confidentiality.
