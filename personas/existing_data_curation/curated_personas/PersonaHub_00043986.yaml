persona_description: Assoc. Prof. Harry Zhu, an academic who has conducted research on financial literacy and education, particularly through computer science and game-based learning. He has led a research
  project that focuses on using personal financial issues as a way to make computer programming relevant and engaging to students, aiming for students to learn about managing money while mastering programming
  skills. Zhu has presented at various conferences and workshops and has developed a prototype game that is used as a teaching tool in a game development course taken by seniors and graduate students at
  Old Dominion University. His research has been evaluated for its effectiveness in integrating financial literacy into computing education, and he is interested in finding ways to tap into students' creativity
  and knowledge after the workshop.
