personas:
  professional: Jean Rogers, an aspiring wildlife photographer and sketch artist, channels a curious eye and practical framing skills into vivid Bayou‑inspired imagery, while their laid‑back attitude toward
    deadlines and penchant for spontaneous shoots sometimes result in a cluttered portfolio that they later tidy up in marathon editing sessions.
  sports: Jean Rogers, who joins the Lafayette High School cross‑country team for spring runs and casually cycles the Bayou Teche trails on weekends, roots for the New Orleans Saints in football and the
    New Orleans Pelicans in basketball, yet prefers low‑key, nature‑focused workouts over organized sports, often trading a structured training schedule for spontaneous canoe paddles.
  arts: Jean Rogers, a budding sketch artist and acoustic‑guitar enthusiast, finds inspiration in the raw rhythms of Zydeco legends Buckwheat Zydeco and the lyrical storytelling of folk‑rock icon John Mayer,
    while their love for science‑fiction fuels late‑night reads of authors like Ann Leckie and midnight viewings of classic Spielberg films, all of which help shape their creative voice in both visual and
    musical pursuits.
  travel: Jean Rogers, who favors impromptu road trips over rigid itineraries, spends summer weekends exploring nearby New Orleans festivals and the historic streets of Baton Rouge, dreams of backpacking
    through the Everglades and later trekking the Alpine trails of Switzerland, but limited teen allowance and school commitments often anchor their adventures to short, budget‑friendly getaways.
  culinary: Jean Rogers, an enthusiastic home‑cook with an intermediate flair, loves to stir a bubbling pot of gumbo seasoned with Andouille sausage, okra, and a dash of file powder, then experiment with
    jambalaya using shrimp, smoked sausage, and a pinch of cayenne, while also savoring quick bites like cheesy grits and fresh po’boy sandwiches on weekends.
  core: Jean Rogers blends a curious, nature‑obsessed eye with a laid‑back, community‑first spirit, juggling spontaneous photo shoots, guitar jams, and a habit of forgetting where they placed their sketchbook
    until a sudden inspiration strikes.
background:
  cultural: Jean Ann was raised in Lafayette, Louisiana, a city at the cultural crossroads of French-Cajun, Southern American, and Catholic traditions. Her family participates in local celebrations such
    as Mardi Gras and Courir de Mardi Gras, enjoys dishes like gumbo, jambalaya, and beignets, and speaks occasional French phrases inherited from the Acadien heritage. The region’s vibrant Zydeco and Cajun
    music scene, together with strong community ties centered around the church and family gatherings, have shaped her values of hospitality, cooperation, and preserving local customs.
