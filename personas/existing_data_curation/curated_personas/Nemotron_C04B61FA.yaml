  hobbies: '[''Exploring nature (bayou trails)'', ''Photography and sketching'', ''Playing acoustic guitar'', ''Listening to Zydeco/Cajun music'', ''Reading science-fiction and popular science'', ''Cooking
    Creole/Southern dishes'', ''Volunteering with church youth group'']'
  career_goals: Jean Ann aspires to study environmental science or marine biology so she can protect the Louisiana wetlands and bayous she loves exploring. She hopes to work on coastal restoration and conservation
    projects while also educating her community through workshops and social-media storytelling. In the long term, she imagines opening a pop-up cooking studio where she can share Creole recipes and combine
    her interests in science, sustainability, and cultural heritage.
