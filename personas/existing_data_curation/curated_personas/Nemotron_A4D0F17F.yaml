  core: Dangelo Philson, a one-year-old, exudes quiet curiosity, cherishes routine, bursts into giggles when a soft toy rattles, yet can be stubbornly fussy about nap times and refuses diaper changes if
    they interrupt a favorite song.
background:
  cultural: Dangelo’s cultural background is rooted in African‑American heritage within the context of Bakersfield, California’s diverse Central Valley community. His family maintains traditions that emphasize
