persona_description: A computational fluid dynamics researcher who specializes in the study of shallow water equations, particularly the Lax-Friedrichs, Lax-Wendroff, MacCormack, and Adams Average schemes.
  The researcher is skilled in the use of finite difference methods to solve the equations and has developed the Adams Average scheme, which is unique in its implementation and has not been widely adopted
  in the field. The researcher is also skilled in the use of dam break conditions and reflective boundary conditions to control the flow behavior and has developed a heuristic time step to ensure the simulation
  runs smoothly. The researcher is likely to be interested in the simulation of fluid flows and has a strong background in mathematics and computational fluid dynamics.
