  career_goals: Looking ahead, Andrew aims to advance to a senior regional operations director role, overseeing multiple locations across the Mid‑Atlantic. He wants to lead a company‑wide initiative to
    implement lean process improvements that cut operating costs by 10 % while improving employee satisfaction. He also plans to mentor emerging managers, eventually establishing a boutique consulting practice
    that helps small businesses adopt structured operational frameworks. A parallel goal is to achieve a healthier work‑life balance, reducing stress through better delegation and wellness programs for
    his team.
