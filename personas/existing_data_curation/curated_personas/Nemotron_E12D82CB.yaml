    management'', ''Certified Compliance and Ethics Professional (CCEP)'']'
  hobbies: '[''Vegetable gardening'', ''Woodworking'', ''Chess'', ''Morning jogging'', ''Golf'', ''Reading historical non-fiction'', ''Church community events'']'
  career_goals: Jack aims to advance to a Chief Compliance Officer role within a mid‑size financial services firm, where he can shape a proactive compliance culture and integrate automated monitoring tools
    to reduce manual workload and stress. He is committed to creating streamlined, repeatable processes that uphold regulatory standards while allowing his team a predictable, low‑stress work environment.
    Additionally, he hopes to mentor the next generation of compliance professionals and contribute thought leadership articles on practical compliance management for industry publications.
