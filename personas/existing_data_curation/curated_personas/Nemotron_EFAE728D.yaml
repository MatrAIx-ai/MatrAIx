  career_goals: Shahida aims to progress to a lead cutter or shift supervisor role where she can apply her practical expertise to improve workflow efficiency and safety protocols. She plans to obtain a
    certification in CNC programming to broaden her technical skill set and to mentor younger workers, fostering a supportive and harmonious work environment. Ultimately, she seeks a stable, well‑compensated
    position that will enable a comfortable retirement while allowing her to give back to her colleagues and community.
