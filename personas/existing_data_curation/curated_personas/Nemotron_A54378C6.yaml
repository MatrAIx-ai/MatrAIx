personas:
  professional: Cache Savoy is a seasoned community event coordinator who blends meticulous budget management, disciplined project‑planning, and a curious eye for the arts to orchestrate large‑scale festivals,
    curate local exhibitions, and mentor volunteer teams while pursuing a degree in Community Development.
  sports: Cache Savoy enjoys weekend hikes on the Blue Ridge trails, participates in the local Greenville Hiking Club, supports the Atlanta Braves in baseball, the Carolina Panthers in football, and the
    Clemson Tigers in college sports, and occasionally joins a community yoga class to stay flexible.
  arts: Cache Savoy spends afternoons quilting intricate patterns, paints acrylic landscapes inspired by rolling hills, visits galleries showcasing works by Claude Monet and Ai Weiwei, reads historical
    fiction and biographies of social‑justice leaders, sings in the church choir, and acts in community theater productions such as 'Our Town', while listening to podcasts featuring artists like Joni Mitchell.
  travel: Cache Savoy plans trips that balance adventure and relaxation, favoring road trips to the Blue Ridge Parkway, weekend getaways in Charleston’s historic district, culinary tours of Napa Valley,
    and cultural immersion in Tuscany, Italy, yet often constraints their travel budget to ensure funding for the community arts hub.
  culinary: Cache Savoy loves cooking soulful Southern dishes with spice‑infused twists—such as shrimp and grits seasoned with smoked paprika, collard greens with smoked turkey, and sweet potato pie—while
    experimenting with garden‑fresh ingredients like okra, sweet corn, and heirloom tomatoes, and boasts a moderately skilled kitchen that occasionally overcooks quinoa when multitasking.
  core: Cache Savoy is a detail‑driven community champion whose curiosity fuels a vibrant blend of art, gardening, and advocacy, even as a love for late‑night coffee and over‑planning sometimes leads to
    chaotic moments.
background:
  cultural: Cache was raised in Greenwood, South Carolina, a town with deep roots in African‑American history and a strong church community. Her grandparents were active in the local NAACP chapter during
    the civil‑rights movement, and family stories of perseverance and collective action shape her worldview. Traditions such as Sunday gospel services, family reunions featuring soul food and storytelling,
    quilting circles, and participation in the annual Juneteenth celebration are central to her identity. The blend of Southern hospitality with African diasporic customs informs her appreciation for food,
    music, and art. While she acknowledges the lingering effects of systemic racism in the region, she draws strength from her heritage, using it as a catalyst to uplift younger generations and preserve
    the cultural legacy of Black South Carolinians.
attributes:
