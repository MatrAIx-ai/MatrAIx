  hobbies: '[''Quilting'', ''Painting'', ''Visiting art galleries'', ''Reading historical fiction'', ''Gardening'', ''Cooking Southern cuisine with African influences'', ''Yoga'', ''Hiking'', ''Church choir'',
    ''Community theater'', ''Listening to podcasts on art and culture'', ''Exploring local heritage sites'']'
  career_goals: Cache aims to complete her undergraduate degree in Community Development or Business Administration within the next two years, leveraging her disciplined study habits. She envisions launching
    a community‑based arts hub in Greenwood that offers workshops, exhibition space, and mentorship for local youth, especially Black girls interested in creative fields. Simultaneously, she seeks a board
    position with the Greenwood Historical Preservation Society to help safeguard African‑American heritage sites. By combining her organizational talent with her passion for culture, she hopes to become
    a recognized advocate for community empowerment, possibly authoring a memoir that chronicles her family's journey through the civil‑rights era in the South.
