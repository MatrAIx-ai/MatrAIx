persona_description: A theoretical physicist who is fascinated by the idea of mind and consciousness, particularly the concept of intelligence and the role of mental agents in society. They are interested
  in the interaction of these mental agents in societies and how they lead to true intelligence. They have a working model for WikiMind and are familiar with the ideas of Niklas Luhmann, such as the system
  of index cards (Zettelkasten) and the idea of communication. They are also familiar with the concepts of abstracting from the fact that an agent doesn't need to be mindless and the idea of separating
  two parts of the brain that were designed to work together.
