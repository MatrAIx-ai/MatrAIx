  hobbies: '[''creative drawing and coloring'', ''pretend role‑play (space explorer, superhero, animal)'', ''building towers with blocks'', ''listening to music and dancing (Mexican folk, children songs)'',
    ''storytime reading and storytelling'', ''nature exploration in backyard'', ''crafting simple cultural items (e.g., papel picado)'']'
  career_goals: Felix dreams of becoming a giant artist who paints whole walls with bright, bold colors, an astronaut who explores sparkling planets, a storyteller who makes every child laugh, or even a
    friendly chef who creates giant, tasty tacos for his friends. His ambitions shift with his curiosity, gravitating toward roles that let him create, share joy, and engage others in playful adventures.
