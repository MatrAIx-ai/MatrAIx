personas:
  professional: Felix Torres, a budding preschool storyteller, uses their vivid imagination and talkative nature to lead circle time with improvised tales, while their relaxed approach to schedules means
    the day’s activities often drift into spontaneous art projects.
  sports: Felix Torres, a member of the Conroe Little Kickers soccer club, dashes around the neighborhood playground with boundless energy, cheering for the Houston Astros and Houston Rockets while preferring
    free‑play over structured drills, and they love bedtime stories about the Dallas Cowboys.
  arts: Felix Torres, who spends afternoons drawing colorful ponchos and dancing to the lively rhythms of Juan Gabriel and the playful tunes of Disney’s Let It Go, eagerly watches Spanish‑language cartoons
    like Pocoyó and crafts homemade masks for birthday celebrations.
  travel: Felix Torres, who loves car rides with the windows down, has visited the Houston Zoo and the sandy shores of Galveston, dreams of exploring the bright streets of Barcelona’s La Rambla, and eagerly
    anticipates a family trip to the amusement park in Disneyland, favoring packed snack boxes over long flights.
  culinary: Felix Torres, who adores cheesy quesadillas with flour tortillas, guacamole made from ripe avocados, and sweet mango slices, proudly helps stir pancake batter and spreads peanut butter on whole‑grain
    toast, though they stubbornly refuse broccoli while requesting extra chocolate chip cookies.
  core: Felix Torres is an exuberant, highly imaginative four‑year‑old who dazzles friends with spontaneous stories, loves being the center of attention, often surrenders to bouts of anxiety and forgetfulness,
    and finds comfort in vibrant family traditions and playful chaos.
background:
  cultural: Felix grows up in a bilingual Mexican‑American household in Conroe, Texas. Spanish flows through his home as he chats with grandparents and watches Spanish‑language cartoons, while English is
    used at school and with friends. Family traditions like celebrating Día de los Muertos with makeshift altars, Cinco de Mayo with music and dancing, and birthday parties with piñatas and tamales shape
    his cultural identity. The local community of Mexican‑American families and the broader Texan environment provide a mix of cultural festivals, church gatherings, and outdoor playgrounds, giving Felix
    a rich blend of Mexican heritage and Southern U.S. influences.
attributes:
  skills: '[''storytelling and imaginative narration'', ''basic bilingual communication (Spanish & English)'', ''color and shape identification'', ''fine motor drawing and coloring'', ''building block construction'',
