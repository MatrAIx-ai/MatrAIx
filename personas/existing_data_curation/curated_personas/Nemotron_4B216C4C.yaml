personas:
  professional: Ada Carter is an aspiring young scientist who spends afternoons turning cardboard boxes into rockets, using their boundless curiosity and imaginative storytelling to hypothesize how things
    work, though they often leave the playroom a delightful mess because they value flexibility over strict organization.
  sports: Ada Carter dashes around the backyard pretending to be a soccer star for the Saturday Sprinters youth club, eagerly joins the local toddler gymnastics class in the spring, and they are a fervent
    fan of the Chicago Cubs, often chanting the team's rally cry during family game nights.
  arts: Ada Carter pours vibrant colors onto paper while listening to the whimsical tunes of Disney's 'Let It Go' and Raffi's 'Baby Beluga', devours Dr. Seuss books nightly, and they idolize the animated
    adventures of Bluey, shaping a vivid inner world where imagination meets music and storytelling.
  travel: Ada Carter loves spontaneous family road trips to the nearby beach where they build sandcastles, cherishes the magical day spent at Disneyland in California, and they dream of flying to Paris
    to see the Eiffel Tower, preferring playful itineraries over rigid schedules.
  culinary: Ada Carter loves creamy mac and cheese, peanut butter and banana sandwiches, and giggles while stirring pancake batter with cinnamon and blueberries, and they often help their parent whisk eggs,
    though they sometimes sneak extra chocolate chips into the mix.
  core: Ada Carter is a whimsical five-year-old whose boundless imagination and love of novelty coexist with a delightfully messy, flexible approach to daily life, making them the kind of child who can
    turn a rainy day into a grand adventure while forgetting where they left their crayons.
background:
  cultural: Ada is raised in a typical Midwestern American family in Nauvoo, Illinois. Her upbringing reflects small-town values of community, family gatherings, and participation in local events like the
    county fair and church Sunday school. She is exposed to classic American children's media, local history of Nauvoo, and the warm, supportive environment of a close-knit neighborhood.
attributes:
  skills: '[''storytelling'', ''drawing'', ''basic literacy'', ''puzzle solving'', ''block building'', ''observational curiosity'']'
  hobbies: '[''coloring'', ''drawing'', ''pretend storytelling'', ''exploring nature'', ''building forts'', ''listening to music'', ''reading picture books'']'
  career_goals: Ada dreams of becoming an astronaut who paints the sky, a scientist who discovers new colors, and a writer who shares imaginative tales with children. She often says she wants to travel
    to the moon and bring back stories, or become a famous illustrator of fantastical books.
