  career_goals: John dreams of a future where he can combine his love for routine care and helping others by becoming a veterinarian, caring for animals in a steady, practical environment. He also hopes
    to serve his community as a youth soccer coach or a school club leader, using his sociable nature to inspire peers. While he enjoys the idea of a stable, hands‑on profession, he also imagines himself
    as a trusted member of his hometown, possibly working in a trade like carpentry where he can apply his practical skills daily.
