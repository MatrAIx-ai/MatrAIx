personas:
  professional: John Meyer is a budding digital strategist who runs their school's after‑school gaming club, using their love of routine to schedule weekly tournaments, their sociable flair to keep teammates
    engaged, and their relaxed attitude toward obligations, which sometimes leads to last‑minute schedule changes.
  sports: John Meyer plays forward on their community youth soccer team, idolizes the LA Galaxy and frequently watches their matches on TV, while also cheering for the New York Yankees during baseball season,
    balancing their enthusiastic participation with occasional bouts of laziness that cause them to skip warm‑ups.
  arts: John Meyer builds intricate LEGO sets inspired by the LEGO Architecture series, collects baseball card art featuring Alex Ross illustrations, and regularly watches Studio Ghibli films like My Neighbor
    Totoro for creative inspiration, letting their imagination fuel both play and storytelling.
  travel: John Meyer loves spontaneous weekend road trips to Shenandoah National Park and annual family vacations to Orlando’s theme parks, preferring the excitement of roadside fairs and local farmer’s
    markets over rigid itineraries, though their parents often have to rein in their tendency to wander off.
  culinary: John Meyer prefers classic grilled cheese with extra cheddar and a splash of hot sauce, adores pepperoni pizza, and enjoys crafting simple LEGO‑themed cookie designs, yet they frequently skip
    vegetables unless they’re marketed as 'power‑up' foods and sometimes forget to brush their teeth after sugary snacks.
  core: John Meyer thrives on familiar routines while bursting into talkative confidence among friends, balancing organized gaming sessions with occasional last‑minute chaos, and they habitually over‑worry
    about school tests and social performance.
background:
  cultural: John is a white American raised in Bentonville, Arkansas, where a blend of Midwestern practicality and Southern hospitality shapes his upbringing. His family participates in community traditions
    such as Fourth of July parades, church gatherings, and visits to the Bentonville Farmer's Market. He enjoys outdoor activities typical of his region, like hiking, fishing, and backyard BBQs. The local
    influence of Walmart and the town's emphasis on community service also inform his values of teamwork, modesty, and a strong sense of belonging.
