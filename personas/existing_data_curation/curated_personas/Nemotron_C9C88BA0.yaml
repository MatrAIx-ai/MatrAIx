personas:
  professional: Cole King is an aspiring robotics engineer who spends afternoons programing Arduino‑based bots for the school’s FIRST LEGO League team, and evenings crafting intricate redstone contraptions
    in Minecraft, blending curiosity with a methodical, practical mindset; their reliability and love for step‑by‑step planning make them the go‑to teammate for troubleshooting circuit designs and documenting
    build processes.
  sports: Cole King is a dedicated member of the Orlando Aquatic Club, swimming laps three times a week to stay fit, and they cheer for the Miami Heat and Tampa Bay Buccaneers on game nights, occasionally
    joining school‑organized pick‑up basketball games, while their methodical nature leads them to track personal swim times in a shared Google Sheet.
  arts: Cole King immerses in sci‑fi literature, devouring novels by Neal Stephenson and Liu Cixin, and they unwind to the soaring scores of Hans Zimmer and the ambient electronic tracks of C418 while building
    Minecraft worlds, often attending local library author talks and sketching futuristic vehicle designs inspired by their model‑building hobby.
  travel: Cole King loves family road trips to Disney World and the Florida Keys, has explored the Everglades on a guided airboat tour, and dreams of backpacking through Kyoto’s historic temples and hiking
    the Grand Canyon, preferring itineraries mapped out in advance with plenty of time for spontaneous photo stops at scenic overlooks.
  culinary: Cole King enjoys pizza topped with fresh basil and mozzarella, crafts simple veggie stir‑fry with bell peppers, snap peas, and soy sauce using carrots and zucchini harvested from the community
    garden, and blends mango‑spinach smoothies for after‑swim recovery, though they occasionally rely on microwave mac and cheese when homework piles up.
  core: Cole King is a methodical teen who balances building digital worlds, designing real‑world robots, and swimming laps, all while carefully budgeting their allowance and occasionally over‑organizing
    their schedule with a spreadsheet obsession.
background:
  cultural: Cole was raised in a middle‑class, White family in the suburban community of Deltona, Florida. His household celebrates traditional American holidays such as Thanksgiving, Fourth of July, and
    Christmas, and his parents emphasize the values of reliability, cooperation, and community service. Though his ancestry includes German and Irish roots, his day‑to‑day cultural experience reflects the
    diverse, Sunbelt environment of Central Florida, where outdoor activities like beach trips and local sports are common. He has been influenced by the region’s blend of Southern hospitality and multicultural
    neighbors, shaping a pragmatic yet open‑minded worldview.
