  career_goals: Looking ahead, Cole aims to enroll in a STEM‑focused high‑school program that will deepen his engineering and coding skills. He aspires to study civil engineering or computer science at
    a university, with the long‑term goal of designing sustainable infrastructure or developing user‑friendly software solutions. He envisions a career that blends his love for systematic planning with
    tangible, community‑benefiting projects, eventually taking on leadership roles such as project manager or lead designer.
