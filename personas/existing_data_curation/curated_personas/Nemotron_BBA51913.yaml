  career_goals: Although Lee is retired from formal employment, he aspires to deepen his involvement with the cultural life of Binghamton. His primary goal is to serve on the board of the Roberson Museum
    and Science Center, where he can apply his research and fundraising skills to support new exhibitions and community outreach. He also aims to author a regional art history book, documenting the evolution
    of public art in the Southern Tier. In addition, Lee hopes to establish a weekly lecture series at the local library, inviting scholars and artists to share unconventional ideas, thereby fostering lifelong
    learning for residents of all ages.
