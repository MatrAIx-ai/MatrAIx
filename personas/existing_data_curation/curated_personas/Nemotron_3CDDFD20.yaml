  career_goals: Although retired from formal employment, Sandra aims to expand her influence as a volunteer leader by launching a traveling exhibition that showcases artworks created by senior artists in
    North Carolina. She aspires to mentor a new generation of artists through regular workshops at the Raleigh Public Library and to co-author a memoir that reflects on cultural shifts she has witnessed
    over her lifetime. Additionally, Sandra seeks to serve on the board of the local historical society to promote preservation initiatives and to champion intergenerational art programs that foster collaboration
    between youth and seniors.
