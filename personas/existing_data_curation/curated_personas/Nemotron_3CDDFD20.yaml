personas:
  professional: An experienced volunteer leader and former museum docent, Sandra Sanders channels her curiosity and competitive edge into orchestrating intergenerational art workshops, curating traveling
    senior‑artist exhibitions, and mentoring emerging creatives through public speaking and digital outreach.
  sports: Sandra Sanders enjoys swing dancing lessons at the local community center, follows the Carolina Hurricanes NHL team, cheers for the North Carolina Tar Heels basketball squad, and participates
    in a weekend walking club through the Raleigh Greenway, balancing light aerobic activity with a competitive spirit for dance contests.
  arts: Sandra Sanders frequents the North Carolina Museum of Art, paints delicate watercolors inspired by Monet and O'Keeffe, discusses contemporary literature by Margaret Atwood and Yuval Harari in a
    lively book club, and attends theater productions starring Meryl Streep and Lin‑Manuel Miranda, weaving these experiences into her docent narratives.
  travel: Sandra Sanders has toured the vibrant Asheville River Arts Festival, soaked the rhythms of New Orleans' Jazz & Heritage Festival, explored the adobe architecture of Santa Fe's historic plaza,
    and taken a nostalgic train ride on Amtrak’s Crescent to visit the Smithsonian in Washington, D.C., planning each trip with a blend of cultural curiosity and budget‑savvy research.
  culinary: Sandra Sanders delights in cooking classes that teach her how to prepare Spanish paella, Korean kimchi jjigae, Ethiopian injera, and French ratatouille, favoring fresh basil, rosemary, and smoked
    paprika, and often experiments with these flavors in her small kitchen garden’s herb beds, though they sometimes forget to label jars, leading to occasional culinary mishaps.
  core: Sandra Sanders blends relentless curiosity with a competitive drive, juggling volunteer leadership, watercolor painting, and swing dancing while sometimes letting paperwork pile up and indulging
    in spontaneous gourmet experiments.
background:
  cultural: Sandra grew up in a middle‑class white family in the American South during the post‑World War II era, absorbing traditional Southern values of hospitality, community, and respect for history
    while also embracing the broader cultural shifts of the 1960s and beyond. Her upbringing instilled a strong work ethic and an appreciation for both classic and contemporary arts. Living her adult life
    in Raleigh, North Carolina, she has been shaped by the region’s vibrant cultural scene, including its rich history, strong emphasis on education, and growing diversity. Sandra’s cultural identity blends
    respect for her Southern heritage with an openness to new ideas and artistic expressions, informing her lifelong commitment to community involvement and lifelong learning.
