  hobbies: '[''Backyard gardening'', ''Traditional Mexican cooking'', ''Book club (historical fiction)'', ''Community theater attendance'', ''Yoga'', ''Hiking/walking in foothills'', ''Crocheting'', ''Volunteer
    tech tutorials for seniors'']'
  career_goals: Joanna aspires to lead the development of a multilingual community learning hub within her local branch, securing grant funding to expand digital access and language programs. She aims to
    become a senior education services librarian, mentor emerging librarians, and publish a guide on culturally responsive reading circles for older adults. Additionally, she hopes to influence city‑wide
    policies that prioritize library services for underserved Latino seniors, while maintaining a flexible schedule that respects her need for a balanced pace and personal well‑being.
