personas:
  professional: Joanna Rivera is a community‑focused education services librarian who designs bilingual adult learning programs with a blend of inventive curricula and tried‑and‑true teaching methods, while
    they maintain a relaxed, flexible approach that sometimes leads to a cluttered schedule but always keeps patron needs front‑and‑center.
  sports: Joanna Rivera enjoys gentle yoga, weekly hikes with the Foothills Walking Club, and plays in the Santa Barbara Senior Softball League while cheering on the Los Angeles Dodgers and the LA Lakers
    from their porch, treating fitness as a low‑pressure, social pastime that they share with friends.
  arts: Joanna Rivera is a devoted member of a historical‑fiction book club that devours Ken Follett and Hilary Mantel, volunteers backstage at community theatre productions of 'A Midsummer Night’s Dream,'
    and draws inspiration from the music of Lin‑Manuel Miranda and the paintings of Vincent van Gogh while they crochet blankets for local shelters.
  travel: Joanna Rivera favors spontaneous, budget‑friendly road trips to California gems like Yosemite, Napa Valley, and Santa Barbara, while also dreaming of a cultural immersion tour of Mexico City’s
    markets, balancing a love for scenic drives with a schedule that they adapt to accommodate family gatherings and limited vacation days.
  culinary: Joanna Rivera delights in crafting traditional Mexican staples such as tamales, pozole, and chipotle‑roasted chicken using fresh cilantro, ancho chilies, and locally harvested coyote mint, showcasing
    a solid home‑cook skill set that they showcase during family feasts and neighborhood potlucks.
  core: Joanna Rivera blends a gardener’s patience with a librarian’s curiosity, navigating life with flexible plans, a warm heart, and a habit of turning everyday moments into community‑building lessons
    that they share with friends and neighbors.
background:
  cultural: 'Joanna''s Mexican heritage is a cornerstone of her identity. Raised in a close‑knit Mexican‑American household in Los Angeles, she grew up speaking Spanish at home, celebrating Día de los Muertos,
    Cinco de Mayo, and honoring family traditions such as making tamales together. She remains connected to her extended family in Jalisco, traveling to visit relatives and bringing back stories and recipes
    that enrich her community work. Her cultural perspective informs her professional practice: she designs library programs that highlight Latino authors, curates Spanish‑language collections, and collaborates
    with local cultural organizations to host festivals and art exhibits. Joanna sees herself as a bridge between generations, preserving Mexican cultural heritage while fostering cross‑cultural understanding
    in the diverse Sylmar community.'
