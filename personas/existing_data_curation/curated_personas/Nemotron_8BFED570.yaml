    Mentoring'']'
  hobbies: '[''Desert hiking'', ''Birdwatching'', ''Stargazing'', ''Reading non-fiction (science & history)'', ''Chess'', ''Model building (airplane kits)'', ''Nature photography'', ''DIY electronics projects'',
    ''Podcast listening (technology & compliance)'', ''Journaling'']'
  career_goals: Gregory aims to advance to a senior leadership role, such as Chief Compliance Officer, within a mid‑size enterprise operating in the Southwest. He plans to deepen his expertise in emerging
    compliance technologies, including AI‑driven monitoring and automated risk scoring, and to obtain advanced certifications such as Certified Regulatory Compliance Manager (CRCM) and Certified Information
    Systems Auditor (CISA). Additionally, he seeks to mentor the next generation of compliance professionals, build a resilient compliance culture that balances rigorous controls with operational flexibility,
    and eventually transition to a consultancy where he can advise multiple organizations while maintaining a schedule that accommodates his preference for solitude and focused work.
