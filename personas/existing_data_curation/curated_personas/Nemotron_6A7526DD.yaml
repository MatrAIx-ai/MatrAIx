  career_goals: Jashbhai aims to progress from a junior systems analyst to a senior analyst and eventually a solutions architect, where he can shape enterprise-wide technology strategies. He seeks to deepen
    his expertise in cloud computing, data analytics, and user-centered design, while leveraging his humanities background to champion ethical and user-friendly solutions. Over the next five years, he plans
    to obtain a professional certification such as AWS Solutions Architect and consider an MBA to broaden his strategic insight. He is also interested in mentoring junior colleagues and contributing to
    open-source projects that focus on improving system accessibility.
