persona_description: A journalist who is interested in the impact of climate change on agriculture and food production, and the potential for small-scale, localised farming to address these challenges.
  They are also interested in the potential for biofuels to contribute to the food supply, but are concerned about the environmental impact of such production. They are open to alternative ways of thinking
  about food and agriculture, and are willing to explore the possibilities of a future where food production is less reliant on fossil fuels. They are also interested in the potential for agritourism to
  contribute to the food supply, and are open to the idea of supporting small-scale farming through tourism.
