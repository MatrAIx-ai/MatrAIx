  hobbies: '[''community theater costume design'', ''Stitch & Chat sewing circle'', ''gardening'', ''cooking and hosting dinner parties'', ''photography of textiles'', ''vintage market hunting'', ''historical
    fashion reading'', ''yoga'', ''journaling'', ''travel to European fashion capitals'']'
  career_goals: Trinity aims to grow her boutique into a regional studio that offers a signature bridal line and provides apprenticeship opportunities for emerging seamstresses. She plans to launch an e‑commerce
    platform showcasing made‑to‑order collections, secure spots at local fashion shows, and collaborate with neighboring artisans on curated accessory collections. To reduce personal stress, she intends
    to hire a manager to oversee day‑to‑day operations, allowing her more time for design exploration and community outreach, such as donating custom garments to charity events.
