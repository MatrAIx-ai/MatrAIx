  career_goals: In the next two years Jonathan plans to enroll in a trade apprenticeship—preferably as an electrician or HVAC technician—through the local community college, leveraging his practical skill
    set and desire for a routine, steady work schedule. While completing his apprenticeship, he hopes to work part‑time at a local café or restaurant to stay connected with the community and hone his service‑industry
    experience. His long‑term ambition is to own a small, family‑friendly coffee shop in Colfax where he can blend his love of routine, hands‑on work, and daily social interaction, creating a gathering
    spot that feels familiar and welcoming to his neighbors.
