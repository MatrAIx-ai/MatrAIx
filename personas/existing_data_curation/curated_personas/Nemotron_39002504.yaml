personas:
  professional: Jonathan Solano, a 19‑year‑old aspiring electrician or HVAC technician, combines his knack for hands‑on repairs, basic automotive maintenance, woodworking, and community event coordination
    with a sociable, routine‑loving approach that makes him a natural informal leader in team settings and a reliable problem‑solver on the job.
  sports: Jonathan Solano hits the basketball courts at the Colfax Community Center twice a week, supports the Washington State Cougars and Seattle Seahawks, enjoys seasonal fishing trips on the Snake River,
    and maintains a casual fitness routine that blends team sports with weekend hikes across the rolling Palouse hills.
  arts: Jonathan Solano curates classic‑rock playlists featuring Led Zeppelin, The Rolling Stones, and Pink Floyd for friends, attends occasional live shows at the local coffee shop where indie folk acts
    perform, and crafts simple wooden birdhouses that double as decorative art pieces, reflecting a blend of auditory and tactile creative expression.
  travel: Jonathan Solano prefers low‑key road trips, having explored Portland’s food scene, hiked in the Cascade Mountains, and taken a weekend fishing excursion to Idaho’s Snake River, while dreaming
    of a future adventure to the Canadian Rockies and a cultural getaway to Barcelona once their coffee‑shop finances allow.
  culinary: Jonathan Solano loves comfort food—grilling fresh trout from the Snake River, whipping up classic cheeseburgers with homemade pickles, and perfecting a frothy latte at their part‑time café job—while
    their cooking skill is solid enough for easy one‑pot meals yet still leans on familiar ingredients like potatoes, garlic, and cheese.
  core: Jonathan Solano, a 19‑year‑old social‑but‑routine‑driven hands‑on enthusiast, balances community‑center basketball, classic‑rock playlists, and a dream of a family‑friendly coffee shop, even if
    they procrastinate on paperwork and occasionally forget to stretch after games.
background:
  cultural: Jonathan grew up in a predominantly white, middle‑class family in Colfax, Washington. His parents have long‑standing ties to the area—his father works in agribusiness while his mother runs a
    small retail shop. The community values self‑reliance, hard work, and close family ties, with traditions rooted in seasonal harvests, local high‑school sports, and community gatherings at the town hall.
    He was raised with a practical, down‑to‑earth worldview, attending the local public high school where he participated in sports and the drama club. The Pacific Northwest's outdoor culture—fishing, hiking,
    and a love of the natural landscape—has shaped his recreational habits. While his upbringing has been largely homogenous, he embraces the small‑town camaraderie and the simplicity of familiar routines
    that characterize life in Whitman County.
