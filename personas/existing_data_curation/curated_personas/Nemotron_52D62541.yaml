  hobbies: '["Visiting art galleries and museums", "Watercolor painting", "Industrial landscape photography", "Hiking in local parks", "Cooking Southern cuisine", "Reading science-fiction novels", "DIY
    woodworking projects", "Yoga and meditation", "Journaling"]'
  career_goals: In the short term, Angela aims to obtain an advanced heavy‑equipment certification and transition into a safety‑supervisor role within her current facility. Over the next three to five years,
    she plans to pursue an associate degree in industrial technology or supply chain management, positioning herself for a logistics coordinator or shift‑supervisor position. Long‑term, she envisions managing
    a fleet of industrial vehicles or launching a small equipment‑rental business that blends her operational expertise with her creative flair for designing user‑friendly safety signage. Throughout her
    career progression, she seeks greater financial stability for her family and opportunities to mentor new operators, sharing her curiosity‑driven learning approach.
