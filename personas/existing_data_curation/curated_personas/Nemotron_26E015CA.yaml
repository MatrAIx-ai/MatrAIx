  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Reading historical fiction and poetry'', ''Cooking traditional Puerto Rican cuisine'', ''Listening to salsa, boleros, and jazz'', ''Herb
    gardening'', ''Small‑group book club participation'', ''Volunteering at senior center art workshops'', ''Nature walks with spouse'', ''Crocheting'']'
  career_goals: Victoria aims to transition from front‑line dispatch work to a supervisory and training role before retirement, focusing on mentoring the next generation of telecommunicators and promoting
    mental‑health resilience among dispatch staff. She is passionate about integrating her love of the arts with public safety, hoping to develop community outreach workshops that teach emergency preparedness
    through interactive art projects for seniors and small neighborhood groups. Additionally, she aspires to volunteer with local cultural organizations, leveraging her experience to improve communication
    between the public‑safety sector and the island‑heritage community in Harrisburg.
