persona_description: A scientist who specializes in the study of cellular transport and regulation, particularly the genes and regulatory networks involved in this process. She is likely to be interested
  in the discovery of molecular principles of cellular transport and the creation of a first global map of the regulatory control systems of the majority of transport routes in a cell. She is also likely
  to be interested in the potential of this map to predict how traffic jams in the cells, caused by de-regulated genes, lead to disease phenotypes, and to come up with possible drug combinations to target
  these traffic lights and switches.
