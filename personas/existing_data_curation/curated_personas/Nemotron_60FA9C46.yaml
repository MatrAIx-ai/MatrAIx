personas:
  professional: Jessica Isley, a five-year-old aspiring veterinarian who loves the predictable rhythm of caring for plush animals in pretend play, takes charge of the make‑believe clinic with practical
    organization yet delights in spontaneous role‑playing, balancing cooperation and assertiveness as they treat each stuffed patient with a gentle routine.
  sports: Jessica Isley, a five-year-old who proudly wears the Lil' Lions Soccer Club jersey and cheers for the New York Yankees on TV, darts between organized soccer drills and spontaneous tag games at
    the park, and they prefer a flexible fitness routine that mixes structure with free play.
  arts: Jessica Isley, a five-year-old who bursts into song with Raffi’s ‘Baby Beluga’, animates drawings in the style of Pixar’s Toy Story, and loves watching live Sesame Street puppet shows, channels
    their imagination into bright dinosaur sketches while they enjoy a blend of familiar melodies and lively storytelling.
  travel: Jessica Isley, a five-year-old who has explored the local aquarium and the family’s cabin by the lake, dreams of standing at the rim of the Grand Canyon and strolling through Kyoto’s cherry blossom
    gardens, and they favor family‑planned trips with predictable routines over spontaneous excursions.
  culinary: Jessica Isley, a five-year-old who adores creamy macaroni and cheese with sharp cheddar, crunchy apple slices with peanut butter, and fluffy pancake stacks topped with strawberries, enjoys helping
    stir batter but frequently refuses broccoli and sprouts, reflecting a love for familiar comfort foods and selective palate.
  core: Jessica Isley, a five-year-old who thrives on daily routines, balances practical play with spontaneous creativity, and navigates tiny challenges calmly with a quiet confidence.
background:
  cultural: Jessica lives in Manning, South Carolina, a small town in Clarendon County with a close‑knit, predominantly white Southern community. Her family observes traditional Southern customs, including
    weekly church attendance, holiday gatherings with classic dishes like biscuits and fried chicken, and participation in local fairs and school events that emphasize community values and practical skills.
    She is familiar with country and gospel music, enjoys outdoor play and gardening, and benefits from a down‑to‑earth, straightforward perspective shaped by her rural Southern environment.
