  career_goals: Although she is only five, Jessica often talks about future jobs where she can follow clear steps and help others. She dreams of becoming a kindergarten teacher because she loves routine
    and reading stories to younger children. She also imagines being a veterinarian, caring for animals with a practical approach, and sometimes mentions wanting to be a baker, enjoying the step‑by‑step
    nature of recipes. Her ambitions reflect a desire for stable, service‑oriented roles with predictable processes.
