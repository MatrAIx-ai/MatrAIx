  hobbies: '[''Sketching and drawing'', ''Nature photography'', ''Listening to jazz and hip‑hop'', ''Pickup basketball'', ''Video gaming'', ''Science‑fiction reading'', ''Volunteering at community garden'',
    ''Cooking soul food'', ''Visiting art galleries'']'
  career_goals: Quintin aims to earn a certification as a horticulturist and later pursue an associate’s degree in landscape architecture. He hopes to combine his love for art and nature by specializing
    in sustainable, community‑focused garden installations. In five years he envisions working for a regional landscaping firm that emphasizes eco‑friendly practices, and eventually he wants to launch his
    own business that offers artistic, low‑maintenance green spaces for schools and churches in North Richland Hills and the wider Dallas‑Fort Worth area.
