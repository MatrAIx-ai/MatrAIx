  career_goals: Diego aims to re-enter the education sector as a freelance consultant, focusing on developing bilingual curricula for adult learners and community programs in the Austin area. He hopes to
    launch a nonprofit community learning center that offers free language, job‑readiness, and life‑skills workshops for underserved Latino families. To deepen his impact, he plans to pursue a master's
    degree in counseling or social work, enabling him to provide mentorship and support to at‑risk youth. His career vision balances his desire for flexibility with a commitment to helping others and fostering
    harmony within his community.
