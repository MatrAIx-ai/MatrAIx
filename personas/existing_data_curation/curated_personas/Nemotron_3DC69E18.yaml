  hobbies: '[''car restoration'', ''soccer'', ''cooking Mexican cuisine'', ''model kit building'', ''reading technical manuals'', ''hiking'', ''video gaming'', ''participating in cultural festivals'']'
  career_goals: David aims to earn a certified machinist credential within the next year and advance to a shift supervisor position in three to five years. He plans to pursue an associate degree in Manufacturing
    Technology at a community college, deepen his CNC programming skills, and eventually transition into a process engineer role. Long‑term, he hopes to open a small, family‑run metal‑fabrication shop that
    can serve local businesses while providing stable employment for members of his community.
