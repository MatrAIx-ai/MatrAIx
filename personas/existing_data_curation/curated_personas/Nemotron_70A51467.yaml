  hobbies: '[''Visiting art galleries and museums'', ''Reading historical fiction and biographies'', ''Gardening'', ''Quilting'', ''Genealogy research'', ''Playing bridge'', ''Attending community theater'',
    ''Traveling to historic sites'', ''Listening to classical music'']'
  career_goals: Although she is retired, Alice remains ambitious about contributing her talents to the community. She aims to lead a senior-focused arts program that brings contemporary and unconventional
    art experiences to Greenville, and to serve on the board of the local historical museum to preserve regional heritage. She plans to complete a certificate in digital photography to expand her creative
    practice, and to author a memoir reflecting on her personal journey, the challenges she has faced, and the lessons learned from a life of high standards. Alice also wants to develop a mentorship network
    linking retirees with younger volunteers, and she commits to a daily walking routine combined with mindfulness exercises to mitigate stress and maintain her well-being.
