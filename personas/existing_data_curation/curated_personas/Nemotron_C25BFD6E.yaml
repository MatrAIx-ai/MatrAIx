    to Latin music playlists'']'
  career_goals: Aida aspires to transition from nursing assistant to a licensed practical nurse (LPN) within the next three years by completing the required certification program at a local community college.
    She is motivated to specialize in geriatric and community health, aiming to lead initiatives that improve health outcomes for older adults, particularly within the Dominican community in Hazleton. In
    the longer term, she hopes to become a certified nursing educator, training future nursing assistants and fostering culturally competent care. Aida also envisions creating a community outreach program
    that offers health workshops, nutrition counseling, and stress‑management resources tailored to bilingual seniors. While pursuing these professional milestones, she prioritizes maintaining a flexible
    schedule that allows her to stay present for her family and to continue her involvement in local cultural events.
