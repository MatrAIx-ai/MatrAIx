    and street)'', ''Meditation and mindfulness practice'', ''Participating in small book clubs'', ''Volunteering for tech mentorship programs'']'
  career_goals: Jose aims to become a senior software engineer or technical lead within the next three years, focusing on building products that amplify underrepresented voices and promote social inclusion.
    He aspires to lead small, cross-functional teams where his collaborative but assertive style can shape development practices and mentor junior developers. Long-term, he envisions launching his own venture
    that blends technology with cultural storytelling, while maintaining a flexible work arrangement that supports his mental-health needs.
