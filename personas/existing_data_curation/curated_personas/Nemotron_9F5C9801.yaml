  hobbies: '[''Bridge and card games'', ''Community toastmasters'', ''Gardening'', ''Barbecuing'', ''Chicago sports fandom'', ''Local theater'', ''Lakefront trail walking'', ''Classic car restoration'']'
  career_goals: Although retired from full-time employment, Larry aims to deepen his impact in the Schiller Park community by expanding the local senior mentorship program, creating a small grant fund for
    budding entrepreneurs, and delivering a series of workshops on financial literacy for young adults. He also hopes to co-author a guide on "Building Community Through Business Skills" with a former colleague,
    and travel with his wife to visit historic business districts across the United States, gathering stories for a future memoir.
