  career_goals: E Grace plans to earn her GED within the next year and then enroll in a community college program focused on hospitality management or digital media production. She aims to combine her love
    for people and events by eventually becoming an event planner for local festivals and community gatherings, or by opening a small boutique café that also serves as a maker space for DIY workshops. In
    parallel, she hopes to develop a personal brand on social media that shares easy‑to‑make recipes, home‑decor projects, and event‑planning tips, leveraging her practical skills and outgoing personality
    to build a regional audience.
