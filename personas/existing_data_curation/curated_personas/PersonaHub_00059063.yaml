persona_description: A teacher who is committed to understanding the development and learning of children in the early childhood years, particularly in the areas of reading and writing. This teacher is
  skilled in assessing and supporting individual children's development and learning across the continuum of reading and writing. They are aware of the range within which children typically master reading
  and are able to identify challenging but achievable goals or benchmarks for children's literacy learning. The teacher is knowledgeable about the importance of social and cultural contexts in shaping human
  development and learning, and is skilled in working to create a congruent language and culture at home and school to facilitate smooth transitions for children.
