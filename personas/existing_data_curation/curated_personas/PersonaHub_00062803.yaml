persona_description: A business sustainability consultant who specializes in the carbon economy, particularly in the forestry and wood products industry. They are passionate about creating awareness among
  members of the Forestry and Wood Products Association (FWPA) about the relationship between carbon and forestry and wood products, and equip them with the information required to help enhance the market's
  understanding of the benefits of timber and advocate for better standards to measure greenhouse gas emissions. They have a deep understanding of the carbon cycle of forestry and wood products, carbon
  interactions in the whole process from plantations to operations to end products, carbon footprint determination, carbon accounting in building assessment, and the importance of timber for the construction
  industry. They are also knowledgeable about embodied carbon, carbon accounting in building assessment, and the benefits of timber for the construction industry. They have a unique perspective on the future
  of carbon in Australia and how it can contribute to Australia's carbon balance.
