    troubleshooting'']'
  hobbies: '[''Restoring a 1978 Ford F‑250'', ''Hunting white‑tailed deer'', ''Fly‑fishing in the Shenandoah River'', ''Hiking the Blue Ridge Trail'', ''Woodworking'', ''Acoustic guitar playing'', ''Attending
    local bluegrass jam sessions'', ''Volunteer fire department service'', ''Reading technical magazines'', ''Home brewing'']'
  career_goals: Mitchell aims to earn the ASE Heavy‑Vehicle certification and an NCCER Level III technician credential within the next two years. He hopes to transition into a lead mechanic role, overseeing
    a team and shaping maintenance protocols for a regional construction fleet. Long‑term, he envisions opening a small independent service shop that specializes in modern telematics‑enabled equipment,
    while also offering apprenticeship training for local youth. He is interested in pursuing a bachelor's degree in mechanical engineering technology part‑time to broaden his engineering knowledge and
    eventually move into equipment design or fleet management.
