persona_description: A scientist or astrophotographer who is interested in imaging emission nebula and is looking for the right filter to enhance the contrast of the nebula while minimizing the background
  skyglow and light pollution. They are aware of the different types of filters available and the importance of choosing the right filter based on the imaging sensor used. They are likely to be familiar
  with the properties of contrast-enhancing and notch filters and the different types of glass used in the didymium doped glass filter. They may have experience with different types of filters and their
  use in imaging, including their impact on telescope artifacts and their suitability for different imaging scenarios. They are also likely to be aware of the importance of choosing the right filter based
  on the imaging sensor used and the target being imaged.
