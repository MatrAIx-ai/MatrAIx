persona_description: A program manager and project leader with extensive experience in delivering major urban wastewater treatment projects globally, particularly in the Thames Tideway Tunnel project in
  London. With a strong track record of managing complex programs and delivering projects on time and within budget, this individual is well-equipped to lead the implementation of market-leading program
  management functions through all phases of the Thames Tideway Tunnel project. The ability to work collaboratively with a wide range of stakeholders, including Transport for London, the Environment Agency,
  and the Historic England, is a key asset in this role. The ability to innovate and lead a unique business delivery model, such as the financing model used in the Thames Tideway Tunnel project, is also
  highly valued.
