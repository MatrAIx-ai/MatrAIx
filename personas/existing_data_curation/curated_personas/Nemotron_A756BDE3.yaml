personas:
  professional: Kyndahl Strong, a 44‑year‑old methodical program coordinator in training, applies their Excel mastery, meticulous scheduling, and warm interpersonal style to streamline youth development
    projects for a local nonprofit, while eyeing PMP certification within two years.
  sports: Kyndahl Strong, a 44‑year‑old community enthusiast, regularly volunteers as a scorekeeper for the Papillion Recreation Soccer League, jogs the local Big Papillion Trail with the neighborhood walking
    club, supports the Nebraska Cornhuskers football team and the Omaha Storm Chasers baseball club, and they enjoy occasional friendly pick‑up basketball games at the community center.
  arts: Kyndahl Strong, 44, sings lead alto in their church’s gospel choir, drawing inspiration from legends like Mahalia Jackson and modern icons such as Beyoncé, spends evenings at the Omaha Community
    Playhouse watching productions of August Wilson, and they nurture their literary side by devouring contemporary fiction by authors such as Jesmyn Ward and Colson Whitehead in a weekly book club.
  travel: Kyndahl Strong, a 44‑year‑old planner, maps trips with the same spreadsheet precision they use for budgeting, favoring weekend road‑trips to Memphis for its music scene and New Orleans for its
    soulful cuisine, has hiked the Rocky Mountains in Colorado, and they dream of a future Mediterranean cruise that blends cultural festivals with culinary tours.
  culinary: Kyndahl Strong, 44, is a culinary enthusiast who perfects classic soul‑food staples like collard greens with smoked turkey, sweet potato casserole, and honey‑glazed fried catfish, often adding
    modern twists such as quinoa‑stuffed collards or jackfruit‑based 'pulled pork', and they delight in sourcing fresh okra, smoked paprika, and locally milled cornmeal for their weekend potluck feasts.
  core: Kyndahl Strong, 44, is a schedule‑obsessed, community‑driven soul‑food lover whose habit of triple‑checking event timelines sometimes leaves them juggling a dozen potluck invitations, yet their
    inability to resist a Sunday slice of buttery cornbread keeps everyone smiling.
background:
  cultural: Kyndahl is an African‑American woman whose grandparents migrated from Mississippi to Omaha during the Great Migration, settling in the city’s historic Black neighborhood. She grew up immersed
    in the traditions of her church—Sunday gospel music, soul‑food cooking, and a strong emphasis on community service. Family celebrations of Juneteenth and participation in the Omaha Black Music Festival
    reflect her pride in her heritage. Living in Papillion, Nebraska, she blends Midwestern sensibilities with Southern roots, valuing hospitality, resilience, and the collective uplift of her community.
attributes:
  skills: '[''Household management'', ''Event planning'', ''Budgeting and financial tracking'', ''Volunteer coordination'', ''Community outreach'', ''Microsoft Office (Excel, Word, PowerPoint)'', ''Catering
    and large‑scale cooking'', ''Child tutoring'', ''Administrative support'']'
  hobbies: '[''Cooking and catering'', ''Hosting community potlucks'', ''Reading (contemporary fiction & African American literature)'', ''Community gardening'', ''Gospel choir singing'', ''Walking/jogging
    on local trails'', ''Quilting and knitting'', ''Attending local music festivals'']'
  career_goals: Kyndahl aims to re‑enter the workforce part‑time as a program coordinator for a local nonprofit, focusing on youth development and community engagement. Over the next two years she plans
    to earn a Project Management Professional (PMP) certification or become a Certified Professional Organizer, leveraging her natural knack for structure. Long‑term, she envisions launching a home‑based
    catering business that highlights soulful Southern dishes for corporate events while continuing to lead her church’s outreach committee and mentor younger volunteers.
