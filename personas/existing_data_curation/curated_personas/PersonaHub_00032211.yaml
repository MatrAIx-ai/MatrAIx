persona_description: A speleologist who is interested in the formation, study, and exploration of caves and speleothems. They are knowledgeable about the processes that lead to the formation of speleothems,
  such as the deposition of calcite rings around the tips of stalactites and stalagmites, and the formation of speleothems through the growth of water flowing inside the tubes. They are also interested
  in the subsurface zone between the surface of the land and the water table, the accumulation of dung in caves, the formation of knobby clusters of calcite or aragonite, and the use of echolocation by
  certain cave animals. They are also interested in the formation of speleothems in karst areas, such as the funnel-shaped depression created by dissolution or collapse of land into an underlying cave,
  and the formation of speleothems in speleothems, such as the flowstone, speleothem, and speleothem.
