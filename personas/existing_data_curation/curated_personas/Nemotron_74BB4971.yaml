  hobbies: '[''drawing and painting'', ''reading books about space, animals, and art'', ''playing beginner piano'', ''building puzzles'', ''simple science experiments'', ''participating in junior art club'',
    ''attending library storytime'', ''organizing figurine collections'']'
  career_goals: Laura often talks about the exciting things she might become when she grows up. She dreams of combining her love for art and curiosity about the world, imagining a future as a museum curator
    who discovers new ways to present art, a scientist who creates colorful experiments, or a teacher who inspires other kids. Currently, she sets short‑term goals like mastering a new piano piece, completing
    a sketchbook page each week, and reading a new book every month, seeing each achievement as a step toward those larger ambitions.
