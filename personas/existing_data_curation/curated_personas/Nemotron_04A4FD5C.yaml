  hobbies: '[''Classic car restoration'', ''Fishing on Galveston Bay'', ''Kayaking'', ''Reading historical biographies'', ''Community theater set construction'', ''Cycling'', ''Gardening'', ''Texas barbecue
    cooking'']'
  career_goals: Jean‑Christophe aims to formalize his academic credentials by earning a bachelor’s degree in automotive technology, positioning himself for tenure-track status. He plans to spearhead a new
    interdisciplinary program that merges sustainable transportation, electric vehicle maintenance, and traditional diesel mechanics. He also seeks to expand his department’s online offerings, secure grant
    funding for state‑of‑the‑art lab equipment, and eventually serve as department chair. Publishing a textbook on hybrid vehicle diagnostics and mentoring a cohort of first‑generation college students
    are long‑term ambitions.
