personas:
  professional: Jean‑Christophe May is a seasoned automotive technology instructor at a Houston‑area community college, blending deep industry expertise with a methodical, curriculum‑focused teaching style,
    and they use their organized curiosity to design rigorous labs, integrate emerging sustainable vehicle technologies, and mentor first‑generation students toward academic success.
  sports: Jean‑Christophe May stays fit by cycling on the Bayou Trail with the Houston Cycling Collective, kayaking with the Galveston Bay Paddle Club in spring, and they cheer on the Houston Astros, Houston
    Texans, and Houston Dynamo while occasionally joining a weekend fishing tournament on the Gulf.
  arts: Jean‑Christophe May channels their craftsmanship into set construction for the local community theater, where they admire the staging work of Julie Taymor, enjoy live music by Willie Nelson and
    blues guitarist Stevie Ray Vaughan, and regularly read historical biographies of automotive pioneers like Henry Ford for artistic inspiration.
  travel: Jean‑Christophe May prefers low‑key road trips along the Gulf Coast, having explored the historic French Quarter of New Orleans, the hill‑country vineyards of Fredericksburg, and the remote beaches
    of the Yucatán Peninsula, and they are planning a future pilgrimage to the automotive museums of Stuttgart and the electric‑vehicle hub of Oslo.
  culinary: Jean‑Christophe May, a competent pitmaster, delights in smoking a Texas‑style brisket with mesquite wood, mastering the perfect rub of black pepper, paprika, and brown sugar, and they pair it
    with Gulf shrimp po’boys and Cajun jambalaya seasoned with cayenne, thyme, and smoked sausage.
  core: Jean‑Christophe May is a meticulous gearhead who balances a love for classic cars, Gulf‑bay fishing, and smoky barbecue with a steadfast commitment to teaching, and they occasionally hoard spare
    parts like a modern‑day treasure hunter.
background:
  cultural: Jean‑Christophe grew up in a modest, working‑class white family in the Greater Houston area, where Gulf‑coast traditions and Southern hospitality shaped his values. The region’s blend of industrial
    pragmatism and coastal leisure fostered his respect for hard work, self‑reliance, and community involvement. He maintains close ties to his family and local church, and embraces the cultural rituals
    of Texas—such as backyard barbecues, weekend fishing trips, and supporting local high‑school sports—while also appreciating the diverse, multicultural influences of the Houston metropolitan area.
attributes:
  skills: '[''Curriculum development'', ''Instructional design for technical courses'', ''Hands‑on workshop facilitation'', ''Assessment and grading'', ''Student mentorship'', ''Program accreditation compliance'',
