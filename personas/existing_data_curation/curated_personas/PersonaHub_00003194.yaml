persona_description: A team of marine biologists and toxicologists, specializing in the research and development of field-ready tools for diagnosing and evaluating the effects of harmful algal blooms (HABs)
  on human and marine animal populations. They work on the pathways by which HAB toxins move up the food chain, and integrate their findings with emerging HAB forecasting and risk assessment models. Their
  research interests include the study of algal toxins and their impact on human and marine health, as well as the development of tools for evaluating the short and long-term prognosis for humans and animals
  exposed to HAB toxins.
