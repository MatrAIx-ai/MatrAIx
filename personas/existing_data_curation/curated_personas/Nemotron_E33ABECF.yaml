  career_goals: Trinidad aims to pursue a career in the health‑care field, aspiring to become a registered nurse or public health professional who can serve her community and improve access to care for
    bilingual families. She also envisions a future as an educator, particularly as a high‑school teacher for Spanish‑immersion or bilingual programs, blending her love for learning with her desire to mentor
    peers. Her short‑term goal is to earn a scholarship to a college with strong health‑sciences or education programs, and later she hopes to launch a community‑health outreach initiative that combines
    her organizational strengths with her commitment to cultural harmony.
