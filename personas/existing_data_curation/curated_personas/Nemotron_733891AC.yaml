personas:
  professional: Mary Rowe, a budding junior class organizer who loves drawing and orchestrating playtime activities, channels their love for structure and sociability by routinely arranging games for friends
    and taking the role of 'play captain', ensuring everyone's ideas are heard while keeping the schedule on track.
  sports: Mary Rowe, an enthusiastic participant in the Maple Grove Cubs mini soccer league, dreams of scoring goals for their team while cheering loudly for the hometown professional baseball team, the
    River City Rangers, and spends weekends practicing dribbling with friends at the local park, though they sometimes skip stretching, leading to occasional sore calves.
  arts: Mary Rowe, a budding illustrator who adores fairy‑tale books like 'The Little Mermaid' and delights in the music of Taylor Swift and Disney animated movies, spends afternoons sketching enchanted
    characters, dancing to 'Shake It Off,' and watching performances by the local children's theater, though they sometimes get distracted by glitter and leave a trail of sparkles on the living room floor.
  travel: Mary Rowe, an adventurous weekend explorer, loves family trips to the nearby Pine Ridge State Park for leaf‑collecting hikes, weekend visits to Grandma's farmhouse in the countryside, and dreams
    of seeing the Grand Canyon someday, preferring short, structured itineraries with plenty of time for nature walks, though they can get impatient on long car rides and fidget with their travel diary.
  culinary: Mary Rowe, a budding kitchen helper who enjoys whipping up peanut‑butter‑and‑jelly sandwiches, cheesy macaroni, and baking chocolate chip cookies with their mom, favors crunchy carrot sticks,
    apple slices, and occasionally adds a sprinkle of cinnamon to oatmeal, though they have a habit of sneaking extra grapes when no one is watching.
  core: Mary Rowe, a lively seven‑year‑old with a flair for organizing playtime, a meticulous allowance tracker, and a compassionate heart for their dog and chickens, balances structure with boundless imagination
    while occasionally leaving glitter trails and forgetting to moisturize their skin.
background:
  cultural: Mary was born and raised in Buna, a small town in Newton County, Texas. Her family embodies Southern hospitality and values community, faith, and family gatherings. She has grown up attending
    local church services, community picnics, and the county fair, where traditions like homemade pies and line dancing are celebrated. The rural setting instills an appreciation for nature and a close‑knit
    neighborhood where neighbors look out for each other. These cultural influences shape her compassionate, cooperative nature and her desire to contribute positively to her community.
attributes:
  skills: '["Reading simple chapter books", "Basic addition and subtraction", "Following routines and staying organized", "Strong verbal communication", "Cooperative group play and conflict resolution",
