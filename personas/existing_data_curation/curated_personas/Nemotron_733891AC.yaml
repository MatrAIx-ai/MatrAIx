  hobbies: '["Playing imaginative games with friends", "Reading fairy‑tale books", "Illustrated storytelling", "Drawing and painting", "Crafts and DIY projects", "Dancing", "Caring for the family dog and
    chickens", "Exploring nature (collecting leaves and rocks)", "Participating in church youth events", "Helping with household chores"]'
  career_goals: Mary dreams of growing up to be a teacher or a community helper, such as a nurse or a veterinarian, so she can continue caring for people and animals. She often talks about wanting to write
    stories for other kids and helping her classmates learn new things.
