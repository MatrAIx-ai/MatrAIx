  career_goals: Antoinette aims to advance from her current role as an education administrator to a district-wide Director of Early Childhood Education, where she can influence policy, expand inclusive
    programs, and foster stronger family-school partnerships. She is passionate about creating flexible scheduling models that support both staff wellbeing and high-quality learning environments. Long-term,
    she envisions establishing a consultancy that helps childcare centers improve operational efficiency while preserving a compassionate, child-centered culture.
