  career_goals: Robert dreams of becoming a firefighter because he loves helping people and the excitement of big red trucks, and he also imagines himself as an astronaut exploring space, reflecting his
    curiosity about how things work. His competitive streak fuels a desire to be the captain of his soccer team and to win a school spelling bee. He talks about wanting to earn top grades and be recognized
    as the "class star," showing his high personal standards. He aspires to someday build things like a real bridge or a robot, hinting at an early engineering ambition. These goals combine his love for
    community service, scientific discovery, and achievement.
