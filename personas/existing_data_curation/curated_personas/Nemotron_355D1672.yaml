personas:
  professional: Robert Henderson is a budding LEGO architect who meticulously plans and constructs elaborate sets, applying their natural curiosity and practicality while demanding high standards and organization
    in every build, and they take pride in completing each project on time.
  sports: Robert Henderson is a spirited member of the local under‑6 soccer team, cheering for Manchester United and practicing drills after school with disciplined enthusiasm, and they also enjoy seasonal
    activities like swimming lessons at the community pool.
  arts: Robert Henderson delights in drawing cartoon characters such as Mickey Mouse and Buzz Lightyear, frequently watching Disney Pixar films and imitating the music of Pixar’s You’ve Got a Friend in
    Me while proudly displaying their crayon masterpieces on the refrigerator, and they often sing along to the melodies.
  travel: Robert Henderson loves family road trips with meticulously mapped itineraries, having recently explored Disneyland in California and dreaming of a future adventure to the Grand Canyon, where they
    imagine packing their own snack bag.
  culinary: Robert Henderson enjoys the simple comfort of cheese pizza with pepperoni and a side of carrot sticks, can confidently bake banana muffins with their parents using ripe bananas, flour, sugar,
    and butter, yet they remain picky about broccoli.
  core: Robert Henderson is a highly organized, competitive five‑year‑old who balances curiosity with caution, thriving in group play while constantly worrying about meeting their own lofty standards, and
    they never miss a chance to tidy up their toys before bedtime.
background:
  cultural: Robert is raised in Dresser, a small rural community in Polk County, Wisconsin, where Midwestern values of hard work, community involvement, and modesty are prominent. His family has roots in
    local agriculture, with grandparents who still farm corn and dairy, and they often participate in seasonal activities such as planting, harvest festivals, ice-skating, and fishing. The Hendersons attend
    a Lutheran church, where Sunday school and a children’s choir reinforce a sense of fellowship and moral teaching. Local traditions like the county fair, church potlucks, and holiday parades shape his
    understanding of community celebration. This environment blends practical, hands-on experiences with a supportive, close-knit social fabric, reinforcing his organized, achievement-driven personality
    while also exposing him to group activities and competitive sports.
