  hobbies: '[''Hiking'', ''Nature Photography'', ''Woodworking'', ''Acoustic Guitar'', ''Reading Tech Blogs'', ''Gardening'', ''Volunteer Teaching'']'
  career_goals: Frederick aims to transition from contract work to a senior development role that allows him to mentor junior developers and lead small, purpose‑driven projects, especially for local non‑profits
    and community organizations. He wants to obtain a certified AWS Solutions Architect credential to broaden his cloud skills and eventually launch a boutique consultancy that builds affordable, accessible
    web platforms for charities, senior services, and mental‑health resources. While he values flexibility and work‑life balance, he also hopes to leave a lasting positive impact on his town by improving
    digital inclusion.
