persona_description: A healthcare professional who is knowledgeable about the traditional and liberal approaches to treating peptic ulcers, and who is critical of the traditional conservative approach for
  its rigid restrictions on food and medications. This person is likely to have experience with and knowledge of the effects of diet and medications on ulcer healing, and is open to the idea that healing
  may be related more to personal care and concern than to restrictive dietary and medication treatments. This person is also likely to be interested in research and evidence-based medicine, and may have
  a background in nutrition or gastroenterology.
