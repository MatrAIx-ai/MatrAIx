persona_description: This person is a teacher who is interested in applying Bloom's Digital Taxonomy to their teaching practices, particularly with children on the Autism Spectrum. They are familiar with
  the DOK model and how it can be used to differentiate and individualize educational programs for these students. They are also aware of the importance of understanding how children are acquiring knowledge
  and the need for educational programs that can be designed to suit each child's needs. They are looking for resources and information on how to use iPads for autism education and are interested in learning
  more about how Bloom's Digital Taxonomy can be applied to teaching strategies.
