personas:
  professional: Maria Adams, a two-year-old budding explorer of early learning, builds block towers and solves simple puzzles with a hands-on curiosity balanced by a practical sense of what fits, and they
    stay flexible and relaxed about the inevitable messes that accompany their play.
  sports: Maria Adams, a two-year-old who delights in toddling at the indoor playground and kicking a soft ball, cheers loudly for the Los Angeles Lakers during family viewing nights and participates in
    a parent-run toddler soccer club called Little Kickers.
  arts: Maria Adams, a two-year-old who happily sings along to Sesame Street's Elmo songs, adores Disney's Mickey Mouse cartoons, and they find wonder in the colourful illustrations of Eric Carle's books.
  travel: Maria Adams, a two-year-old who enjoyed a recent family trip to the local zoo and a sunny weekend at Disneyland, expresses a budding curiosity for future adventures to the Grand Canyon while preferring
    unstructured play over rigid itineraries.
  culinary: Maria Adams, a two-year-old with a growing love for creamy macaroni and cheese, mashed bananas, and crunchy carrot sticks, proudly sprinkles shredded cheddar on their plate but rarely helps
    beyond stirring with a plastic spoon.
  core: Maria Adams, a two-year-old blend of curious explorer and practical tinkerer, navigates their world with fearless playfulness, a relaxed approach to routines, and a surprisingly self-aware assertiveness
    that endears them to adults and toddlers alike.
background:
  cultural: Maria is a White child raised in Jefferson, Georgia, a small town in Jackson County. Her family is rooted in Southern Appalachian culture, attending a local Methodist church, celebrating holidays
    such as Thanksgiving and Christmas with extended family gatherings, and participating in community events like the county fair and church picnics. The community emphasizes close family ties, respect
    for nature, and a relaxed pace of life, which aligns with Maria's easygoing, flexible temperament and her balance of social interaction with moments of solitary play.
