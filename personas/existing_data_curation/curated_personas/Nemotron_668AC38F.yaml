  career_goals: Though only three years old, John often talks about wanting to become a community helper, imagining roles such as a firefighter, a park ranger, or a teacher. He expresses a desire to "help
    people" and "keep everyone safe", reflecting his kind and cooperative nature. He also enjoys building things with his blocks and sometimes says he wants to "make big houses for families", hinting at
    future interests in construction or design. His ambitions are guided by his curiosity about how things work and his practical approach to solving simple problems.
