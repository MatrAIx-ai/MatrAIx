personas:
  professional: John Mcqueen, a three‑year‑old budding builder, loves arranging colorful blocks into sturdy towers while carefully following the step‑by‑step guide they saw on a kids’ construction video,
    showcasing a blend of boundless curiosity and practical patience.
  sports: John Mcqueen attends a local ‘tiny tots’ soccer class on Saturday mornings, enthusiastically chasing the soft ball, while also cheering for the nearby professional baseball team, the City Guardians,
    during family outings, embodying a mix of organized play and spontaneous fandom.
  arts: John Mcqueen delights in drawing crayon dinosaurs and singing along to Raffi’s ‘Baby Beluga,’ their afternoons punctuated by repeat viewings of ‘Sesame Street,’ reflecting a love for creative expression
    that balances structured learning with free‑form imagination.
  travel: John Mcqueen has visited the city zoo and a sunny beach resort in Florida, preferring short, well‑planned trips with familiar adults, yet they show excitement for the prospect of a future adventure
    to Paris, balancing comfort with curiosity about new cultures.
  culinary: John Mcqueen favors macaroni and cheese with a sprinkle of cheddar, bite‑sized chicken nuggets, and strawberry slices, often insisting on plating food in neat rows, but occasionally rebels by
    hiding peas under the table, showcasing a picky appetite tempered by a nascent desire for order.
  core: John Mcqueen blends a toddler’s insatiable curiosity with a surprisingly disciplined approach to play, balancing kindness, structured routines, and occasional meltdowns over misplaced toys, making
    each day a mix of gentle cooperation and spirited exploration.
background:
  cultural: John belongs to a Black American family that honors African-American cultural traditions while also embracing the Southwest lifestyle of Arizona. His family celebrates holidays such as Kwanzaa
    and Juneteenth, sharing stories, music, and foods that connect him to his heritage. At home, he often hears soul and gospel music, which influences his rhythmic play. His parents also incorporate local
    customs like weekend hikes in the nearby McDowell Mountains and community events in Maricopa County, giving John a blended cultural perspective of urban Black culture and desert Southwest openness.
