personas:
  professional: Delia Mas, a seasoned building maintenance specialist with five decades of janitorial expertise, combines meticulous floor‑care techniques, chemical safety knowledge, and bilingual communication
    to mentor new staff, while their curiosity drives them to champion eco‑friendly cleaning innovations in their workplace.
  sports: Delia Mas enjoys low‑impact fitness, regularly walking the Passaic River Trail with the senior walking club, dancing bachata and merengue at weekly community center nights, and they cheer on the
    New York Knicks during basketball season while staying mindful of joint comfort.
  arts: Delia Mas delights in salsa and bolero classics from Celia Cruz and the Fania All‑Stars, attends church choir rehearsals featuring hymns by John Rutter, and participates in a book club that discusses
    works by Junot Díaz and Isabel Allende, finding inspiration for their knitting patterns.
  travel: Delia Mas prefers short, well‑planned trips, often visiting nearby cultural hubs like Philadelphia’s historic district or taking a weekend ferry to the vibrant streets of San Juan, while they
    dream of a leisurely cruise through the Caribbean islands once their health feels steady.
  culinary: Delia Mas enjoys cooking comforting family recipes such as mangú, sancocho, and pastelitos, skillfully seasoning with cilantro, recaito, and sweet peppers from their balcony garden, and they
    relish sharing these meals at neighborhood potlucks, though they occasionally over‑salt dishes while multitasking.
  core: Delia Mas is an energetic, detail‑oriented senior who balances a lifelong passion for green cleaning with a love for dance, cooking, and community, yet they can be prone to worry and occasional
    forgetfulness.
background:
  cultural: Delia was born in the Dominican Republic and moved to Paterson, New Jersey, as a teenager with her family, joining one of the city’s largest Dominican communities. She grew up bilingual, speaking
    Spanish at home and learning English at school, which has given her fluid cultural fluency. Catholic traditions shape her weekly life—she attends Mass, celebrates patron saint festivals, and participates
    in church choirs. Family ties are central; she regularly hosts gatherings for relatives and neighbors, serving homemade dishes and sharing stories of the island. The Dominican emphasis on hospitality,
    music, and dance informs her love for community events and her dedication to keeping her building clean and inviting. While she acknowledges the challenges of being an immigrant elder, Delia draws strength
    from the vibrant, supportive network of fellow Dominicans in Paterson, preserving her heritage through food, language, and cultural celebrations.
