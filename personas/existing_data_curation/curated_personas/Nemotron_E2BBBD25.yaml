  career_goals: Even at 72, Delia wants to deepen her professional impact before retirement. She plans to earn a Certified Professional Cleaner credential within the next year, which will formalize her
    extensive knowledge and open opportunities to advise other building managers on green cleaning initiatives. She hopes to lead a pilot program in her building to switch to biodegradable products, reducing
    health hazards for herself and coworkers—a goal motivated by her sensitivity to stress and health concerns. Delia also aspires to mentor a small cohort of younger janitorial staff, passing on practical
    skills and fostering a supportive, low‑stress work environment. Outside the workplace, she dreams of volunteering at the local senior center, teaching basic cleaning and home‑maintenance techniques
    to fellow seniors, thereby extending her expertise to the community she cherishes.
