  hobbies: '[''Soccer'', ''Bike riding'', ''Swimming'', ''Dance class'', ''Drawing animals'', ''Crafting friendship bracelets'', ''Reading picture books'', ''Nature journaling'', ''LEGO building'', ''Playing
    tag'']'
  career_goals: Misty dreams of helping others and exploring the world. She often tells her family she wants to become a teacher who can make learning fun for all kids, or a veterinarian caring for animals
    she loves in the woods near Walnutport. She also imagines herself as a future astronaut who can discover new planets, reflecting her curiosity about space. In the short term, she aims to lead her classroom
    group projects and become the 'Helper of the Day' at school, showing early leadership ambitions.
