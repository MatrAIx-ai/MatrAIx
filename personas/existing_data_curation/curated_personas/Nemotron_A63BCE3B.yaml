  career_goals: Although retired, William aims to stay intellectually active and leave a lasting mark on his community. He hopes to organize a traveling exhibit of local artists in the Coeur d’Alene area,
    mentor younger photographers and woodworkers through workshops, and publish a series of essays on the intersection of art and the natural landscapes of Idaho. He also plans to compete in regional photography
    contests, complete a self‑portrait series, and document the oral histories of longtime residents for a community archive. Long‑term, he wants to travel to three major art museums each year—such as the
    Metropolitan Museum of Art, the Getty, and the Musée d’Orsay—to broaden his aesthetic horizons.
