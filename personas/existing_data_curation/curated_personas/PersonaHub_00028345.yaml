persona_description: A historian who specializes in the study of the medieval period, particularly the Cistercian order and its contributions to Western civilization. Their research interests include the
  history of the Cistercian order, its impact on European society, and the technological advancements made by the order. They are particularly interested in the use of waterwheels and their role in transforming
  medieval life. Their writing style is informative and engaging, drawing on a wealth of historical and scholarly sources to provide a detailed and nuanced understanding of the Cistercian order and its
  legacy.
