personas:
  professional: Dylan Crawford is an aspiring indie game developer who blends sketch artistry, digital illustration, and beginner coding skills to prototype simple 2D games on their laptop, and they channel
    their curiosity and competitive drive into rapid iteration while balancing schoolwork and creative experimentation.
  sports: Dylan Crawford plays forward on the River Valley Youth Soccer team in the spring, joins pickup basketball games at the downtown gym in the fall where they model their moves after the Chicago Bulls,
    and supplements their competitive streak with disciplined fitness routines that include daily bike rides on nearby lake trails.
  arts: Dylan Crawford spends afternoons sketching Marvel comic heroes, experimenting with digital brushes in Procreate, strumming acoustic covers of Ed Sheeran and Tame Impala songs, and they draw inspiration
    from Studio Ghibli films and the storytelling techniques of Hayao Miyazaki, shaping their artistic identity.
  travel: Dylan Crawford loves weekend bike excursions to the nearby Whispering Pines Trail and Lake Oglethorpe, dreams of backpacking through the Canadian Rockies, and they prefer spontaneous, friend‑planned
    trips over rigid itineraries, though their family budget keeps their travels focused on affordable national parks and occasional city visits like a school field trip to Chicago.
  culinary: Dylan Crawford favors spicy tacos al pastor with pineapple, cilantro, and lime, enjoys whipping up fluffy banana pancakes on lazy Saturdays, and they occasionally experiment with simple sushi
    rolls, though their cooking remains at an enthusiastic beginner level guided by YouTube tutorials.
  core: Dylan Crawford is a curiosity‑driven 13‑year‑old who juggles sketchbooks, code, and soccer, channeling competitive fire into creative projects while battling a habit of staying up late editing videos
    until the early morning, and they often forget to set alarms for school.
background:
  cultural: Dylan was raised in Hudsonville, a small town in Allegan County, Michigan. His family's roots are a blend of Irish and German ancestry common to the region, and they practice a moderate Protestant
    faith that emphasizes community involvement. He grew up attending local events such as the annual Fourth of July parade, the county fair, and church youth gatherings, which fostered a strong sense of
    small-town camaraderie and work ethic. The local public school provides a mix of traditional curricula and extracurricular programs, exposing Dylan to a range of cultural influences, from art workshops
    to STEM clubs. While his upbringing reflects typical Midwestern values of reliability, politeness, and independence, his curiosity and exposure to diverse media through the internet have broadened his
    outlook, encouraging him to explore ideas beyond his immediate environment.
