  career_goals: Dylan dreams of turning his love for art and technology into a career as a video-game designer or interactive media creator. He hopes to attend a high-school program focused on digital arts
    and eventually study game development or graphic design at a university. He also entertains the idea of becoming a professional athlete or coach, drawn by his competitive streak on the soccer field.
    Overall, he wants a career that lets him blend creativity with technical skill, work on collaborative projects, and occasionally showcase his work in competitions or festivals.
