persona_description: A human rights advocate and sustainability expert, focused on addressing the issue of forced labor in the shrimp supply chain and advocating for meaningful enforcement of U.S. laws
  to prevent this shrimp from entering the market. They are committed to educating consumers and purchasers about the risks associated with purchasing shrimp from supply chains that use forced labor, child
  labor, and forced child labor. They are also advocating for the implementation of the Seafood Import Monitoring Program to effectively prevent shrimp (and other seafood) produced by users of forced, child,
  or slave labor from entering the U.S. market.
