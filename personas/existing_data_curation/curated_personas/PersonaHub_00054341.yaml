persona_description: A researcher studying the effects of air pollution on mental health, particularly in adolescents living in urban areas. They are interested in the mechanisms that link the urban environment
  with psychosis and are looking for ways to reduce air pollution to protect young people's mental and physical health. They are likely to be familiar with environmental and genetic factors that contribute
  to mental health problems, as well as the use of risk assessment databases to analyze the effects of air pollution on health. They may have a background in epidemiology or public health and be looking
  for ways to address the issue of air pollution in a rapidly developing world.
