personas:
  professional: Michelle Meixsell, a 40‑year‑old community‑oriented arts coordinator in the making, blends disciplined project‑management expertise, self‑taught digital illustration, and a love of abstract
    literature to curate vibrant local exhibitions while ensuring every detail aligns with the town’s tradition of collective harmony.
  sports: Michelle Meixsell, a 40‑year‑old who prefers gentle activity, participates in a local walking club that meets each Saturday for scenic hikes through the Iowa countryside, cheers on the Iowa Hawkeyes
    football team each fall, and occasionally joins a community yoga class to maintain flexibility.
  arts: Michelle Meixsell, an avid watercolorist and poet, draws inspiration from the dreamy landscapes of John Marin, the whimsical narratives of Beatrix Potter, and the introspective verses of Mary Oliver,
    regularly contributing to local craft fairs and curating a monthly blog featuring her own prints alongside regional folk art.
  travel: Michelle Meixsell, a 40‑year‑old who favors purposeful journeys, enjoys weekend drives to the historic town of Decorah for its Danish folk festivals, longs to explore the canals of Amsterdam to
    study Dutch quilting traditions, and plans a future literary pilgrimage to the Scottish Highlands to walk the locations that inspired Robert Louis Stevenson.
  culinary: Michelle Meixsell, a thoughtful home cook, favors simple Midwestern fare such as roasted beet salad with goat cheese and candied pecans, experiments with herb‑infused quinoa bowls, and indulges
    in occasionally baking a classic apple crisp with vanilla bean ice cream, often seasoning dishes with fresh rosemary harvested from their garden.
  core: Michelle Meixsell, a disciplined yet whimsical 40‑year‑old artist‑organizer, balances meticulous project planning with a restless imagination, often juggling quilting needles and spreadsheet tabs
    in equal measure.
background:
  cultural: Michelle was raised in Sidney, Iowa, a small Midwestern town where community cohesion, modesty, and a strong work ethic are deeply valued. Her white, European‑American heritage reflects a blend
    of German and Scandinavian ancestry typical of the region. The local culture fostered an appreciation for folk traditions such as quilting and county fairs, while also encouraging self‑reliance, lifelong
    learning, and a harmonious approach to relationships. These influences shape her grounded yet imaginative worldview, her disciplined pursuit of excellence, and her commitment to contributing positively
    to her community.
