  hobbies: '[''Watercolor painting'', ''Sketching'', ''Poetry writing'', ''Short story writing'', ''Philosophy reading'', ''Quilting'', ''Gardening'', ''Crossword puzzles'', ''Logic puzzles'', ''Book club
