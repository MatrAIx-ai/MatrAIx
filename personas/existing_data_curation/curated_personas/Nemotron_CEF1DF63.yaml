  career_goals: Michelle aims to channel her artistic passions and organizational talents into a part‑time role as a community arts coordinator or freelance creative consultant. She plans to complete an
    online certificate in museum studies within two years, build a portfolio of curated local exhibitions, and eventually launch an online boutique for her handcrafted textiles and prints. Additionally,
    she hopes to author a memoir that weaves personal narrative with reflections on art and rural Midwestern life.
