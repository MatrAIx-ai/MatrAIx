personas:
  professional: Sandra Petrovich, a master carpenter with three decades of expertise in custom cabinetry, furniture restoration, and artistic wood carving, blends her curious eye for sculpture with a laid‑back,
    improvisational work style, often juggling project deadlines with a tendency to prioritize creative flow over strict scheduling while confidently guiding apprentices and advocating for safety on the
    job site.
  sports: Sandra Petrovich is a devoted fan of the Dallas Cowboys and Texas Rangers, participates in a local senior walking club that meets each Saturday morning for brisk strolls around White Rock Lake,
    and occasionally picks up a paddle for seasonal recreational kayaking on Lake Ray Hubbard.
  arts: Sandra Petrovich frequents the Dallas Museum of Art’s sculpture wing, sketches ideas inspired by the works of Louise Nevelson and Henry Moore, and winds down evenings listening to blues legends
    B.B. King and country storytellers Willie Nelson while coaxing new patterns into her wood carvings.
  travel: Sandra Petrovich favors leisurely road‑trip plans that mix artistic inspiration with comfort, having already driven through Marfa and Fredericksburg’s hill‑country, savored the folk‑art vibe of
    Santa Fe’s festivals, and now dreaming of a summer workshop tour in Asheville, she deliberately books travel during off‑peak periods to dodge crowds.
  culinary: Sandra Petrovich showcases her culinary talent by preparing hearty family‑style dishes like slow‑braised pork shoulder with plum glaze, layered stuffed cabbage rolls, and rustic sour cream‑spiked
    pierogi, often sourcing fresh rosemary, wildflowers, and locally harvested honey to enrich her meals, while she enjoys experimental plating that mirrors her wood‑carving aesthetics.
  core: Sandra Petrovich is a curious, slightly disorganized artisan who merges a love for wood, blues music, and garden wildflowers into a flexible, hands‑on lifestyle peppered with occasional procrastination
    and relentless creativity.
background:
  cultural: Sandra grew up in Balch Springs, a suburb of Dallas, in a working‑class family with roots in the former Yugoslavia. Her parents immigrated in the 1960s and instilled a strong work ethic, reverence
    for handcrafted objects, and an appreciation for folk traditions. While she identifies as white American, she retains cultural ties through holiday meals featuring ćevapi and sarma, occasional attendance
    at the local Serbian Orthodox church, and a fondness for traditional music. At the same time, she embraces the diverse Texan culture around her, participating in community festivals, barbecues, and
    the vibrant DIY maker scene that flourishes in the Dallas area. This blend of Eastern European heritage and Southern hospitality informs her collaborative style and artistic sensibility.
