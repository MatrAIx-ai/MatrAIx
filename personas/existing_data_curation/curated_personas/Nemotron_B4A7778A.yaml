  hobbies: '[''Visiting art galleries'', ''Sketching design ideas'', ''Gardening'', ''Wood carving as a hobby'', ''Listening to blues and country music'', ''Cooking Serbian dishes'', ''Participating in
    a book club'', ''Volunteering for community woodworking projects'']'
  career_goals: Sandra envisions transitioning from full‑time employment to a small independent studio where she can design and produce bespoke furniture and artistic wood pieces for the Dallas‑Fort Worth
    community. She hopes to mentor a handful of younger carpenters, offering apprenticeships that blend traditional techniques with modern design thinking. Over the next few years she aims to secure a regular
    spot at the local artisan market, showcase her work at regional craft fairs, and eventually publish a short guide on practical carpentry for hobbyists. While she values flexibility, she wants to maintain
    a steady flow of projects that keep her creatively fulfilled without the pressure of a rigid schedule.
