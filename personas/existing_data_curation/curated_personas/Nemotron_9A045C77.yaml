  hobbies: '[''Badminton'', ''Zumba group fitness classes'', ''Cooking Vietnamese cuisine'', ''Tech tinkering with Arduino and Raspberry Pi'', ''Attending music and cultural festivals'', ''Reading business
    and self‑help books'', ''Volunteering at community youth programs'', ''Yoga and mindfulness practice'']'
  career_goals: Phuong aims to advance from first‑line supervisor to store manager within the next two years, leveraging her analytical background to improve sales performance and operational efficiency.
    She plans to obtain a supply‑chain certification or an MBA to transition into regional management or a data‑analytics role within a national retailer. Long‑term, she envisions launching her own technology‑enabled
    boutique that blends e‑commerce with personalized customer experiences. Alongside her professional ascent, she hopes to mentor other young immigrants in the Atlanta area and develop a community mentorship
    program that helps high‑school students pursue STEM and retail careers.
