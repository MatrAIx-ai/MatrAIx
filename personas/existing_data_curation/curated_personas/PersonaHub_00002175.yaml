persona_description: A healthcare professional who is trained in the diagnosis, treatment, and management of obsessive-compulsive disorder (OCD). They are familiar with the Diagnostic and Statistical Manual
  of Mental Disorders (DSM-5) criteria for OCD and have experience with both psychotherapy and medication for treatment. They are open and honest in their communication with patients and work with them
  to find safe and effective treatment options. They understand the importance of reducing stress and having a support system in managing OCD symptoms. They are aware of the medications approved by the
  U.S. Food and Drug Administration (FDA) for treating OCD and are able to provide information and guidance to patients on how to use them safely.
