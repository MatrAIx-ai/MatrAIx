personas:
  professional: David Small is a 23‑year‑old full‑stack developer who blends a solid business background with hands‑on JavaScript, React, and Node.js expertise, letting a curious yet compassionate mindset
    drive agile collaboration, while their spontaneous nature sometimes bends strict deadlines in favor of flexible, inclusive workflows.
  sports: David Small is an enthusiastic weekend cyclist who explores the Texas Hill Country trails, joins a local biking club for Saturday rides, follows the Dallas Cowboys for football, and supports Austin
    FC soccer, occasionally playing pickup basketball at the community center.
  arts: David Small strums acoustic folk‑rock tunes inspired by Jason Isbell and Gillian Welch, writes simple reflective lyrics about hill‑top vistas, devours sci‑fi novels like Becky Chambers’ "Wayfarers"
    series, and frequents open‑mic nights at a neighborhood coffee shop to share their songs.
  travel: David Small prefers spur‑of‑the‑moment road trips to Hill Country vineyards, ghost towns, and nearby state parks, yet dreams of backpacking through Patagonia’s rugged trails to source fresh culinary
    ideas for their future farm‑tech SaaS platform.
  culinary: David Small loves slow‑smoked brisket, homemade guacamole with fresh cilantro and lime, and experimenting with chorizo‑infused tacos al pastor, boasting decent grill‑master skills but often
    forgetting to let the meat rest before slicing.
  core: David Small is a tech‑savvy, guitar‑playing explorer who channels curiosity and compassion into building inclusive software for Texas small businesses, even as they wrestle with organization and
    occasional sleep deprivation.
background:
  cultural: David grew up in a small, close‑knit community in Wise County, Texas, where Southern hospitality and a strong work ethic are core values. His white, Texan upbringing blends traditional rural
    traditions—family gatherings, country music, and BBQ—with a modern, tech‑savvy outlook shaped by his business education and software career. The pragmatic, self‑reliant spirit of the Texas Hill Country
    fosters his curiosity and practical problem‑solving, while the community‑oriented culture fuels his compassionate, collaborative nature. He identifies with both the independent, “do‑it‑yourself” mindset
    common in East‑West Texas and the inclusive, service‑driven ethos of his local church and volunteer groups.
attributes:
  skills: '[''Full‑stack web development (React, Node.js)'', ''RESTful API design (Express, Flask)'', ''Database management (PostgreSQL, MySQL, MongoDB)'', ''Cloud deployment (AWS, Azure)'', ''Data analysis
    and visualization (Excel, Tableau)'', ''Version control (Git)'', ''Test automation (Jest, Cypress)'', ''Agile methodology (Scrum basics)'', ''User experience (UX) design'', ''Cross‑functional team collaboration'']'
  hobbies: '[''Hiking and biking in the Texas Hill Country'', ''Playing acoustic guitar and songwriting'', ''Cooperative video gaming'', ''Reading science‑fiction and tech podcasts'', ''Participating in
    hackathons and maker meetups'', ''Volunteering to teach coding at community centers'', ''Cooking barbecue and Tex‑Mex dishes'']'
  career_goals: David aims to become a technical leader who builds technology solutions that directly benefit small businesses and underserved communities in Texas. In the next three to five years he plans
    to deepen his expertise in cloud architecture and product management, eventually transitioning to a senior full‑stack engineer or tech lead role. He is passionate about creating inclusive, accessible
    software, and he hopes to launch a side project—a SaaS platform that helps local farms manage inventory and sales sustainably. He also wants to give back by mentoring high‑school students in coding
    through after‑school programs, and he aspires to bring a more structured, yet adaptable, workflow to his teams to improve deadline compliance while preserving creative flexibility.
