  hobbies: '[''Visiting art museums and galleries'', ''Participating in community painting classes'', ''Photographing street murals'', ''Volunteering at cultural museums'', ''Walking in Fairmount Park'',
    ''Gardening'', ''Reading historical and social-justice books'', ''Cooking soul-food for gatherings'', ''Salsa dancing'', ''Traveling to cultural festivals'', ''Blogging about HR and work-life balance'']'
  career_goals: As she approaches the next phase of her career, Maria aims to move into a senior HR leadership role where she can shape strategic workforce planning and champion employee well‑being across
    the organization. She hopes to mentor emerging HR professionals, launch a company‑wide stress‑management and resilience training program, and eventually transition to a consultancy role that partners
    with cultural institutions to embed inclusive HR practices. Her long‑term ambition is to leave a legacy of a more compassionate, diverse, and artistically vibrant workplace.
