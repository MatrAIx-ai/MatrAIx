personas:
  professional: A seasoned HR leader, Maria Brown leverages more than twenty years of recruitment, employee relations, benefits administration, and HRIS data analytics to design inclusive workforce strategies,
    channeling their methodical organization and empathetic, assertive approach into senior leadership initiatives.
  sports: A community‑oriented fitness enthusiast, Maria Brown walks the Fairmount Park trails five times a week, follows the Philadelphia Eagles and the Philadelphia 76ers, and joins a mixed‑age tennis
    league each spring, and they relish the camaraderie these activities bring.
  arts: An active participant in Philadelphia’s vibrant arts scene, Maria Brown paints in community classes, photographs colorful street murals, volunteers at the Museum of African American History to lead
    youth workshops, and they draw creative inspiration from artists like Kehinde Wiley, musicians Nina Simone and Stevie Wonder, and contemporary installations at the Philadelphia Museum of Art.
  travel: A culturally curious traveler, Maria Brown has attended the Trinidad Carnival, the New Orleans Jazz & Heritage Festival, and a heritage tour of Savannah’s historic districts, often planning trips
    months in advance to incorporate workshops on inclusive practices at cultural sites, and they cherish the blend of adventure and reflective learning these journeys provide.
  culinary: A soulful home chef, Maria Brown masters dishes such as collard greens seasoned with smoked paprika, sweet potato casserole, and pan‑seared catfish, sources fresh herbs from their vegetable
    garden, and they love hosting neighborhood potlucks, though they sometimes over‑salt their sauces in enthusiasm.
  core: Maria Brown, a 57‑year‑old HR strategist with a painter’s eye and salsa steps, channels meticulous organization into inclusive workplaces while they indulge in late‑night TV dramas and an extra
    cup of coffee.
background:
  cultural: Maria is a second‑generation African‑American who grew up in South Philadelphia, a neighborhood shaped by the Great Migration and rich in Black cultural traditions. Her family’s roots trace
    back to the Southern United States, and she was raised with the close‑knit community values of the local church, gospel music, and community activism. In Philadelphia she has been actively involved
    with the African American Museum, the Mural Arts Program, and neighborhood celebrations of Juneteenth and Kwanzaa. These experiences have cultivated a deep appreciation for Black history, resilience,
    and artistic expression, which she brings to her professional life and community involvement.
