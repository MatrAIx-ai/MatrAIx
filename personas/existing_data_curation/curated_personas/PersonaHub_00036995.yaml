persona_description: A researcher and advocate for gender equality, focusing on the intersection of gender, economic activity, and unpaid domestic and care work. They are interested in understanding the
  changing patterns of female economic activity and how it relates to the gender division of unpaid work. They are familiar with the evidence from the study on the feminization and informalization of labour,
  and are eager to explore the implications of these findings for the future of gender equality in the workplace. They are likely to be a member of a gender studies or sociology research group, and are
  interested in exploring the role of gender in shaping economic opportunities and outcomes.
