  hobbies: '[''Visiting contemporary art galleries'', ''Attending live music and indie film festivals'', ''Surfing and beach volleyball'', ''Hiking coastal trails'', ''Urban photography'', ''Mediterranean
    cooking'', ''Exploring wearable fitness technology'', ''Reading science‑fiction and popular science'', ''Meditation and mindfulness'', ''Improv comedy'']'
  career_goals: John aims to launch a boutique boutique fitness studio in Santa Monica that fuses movement with visual and auditory art, offering a signature "ArtFit" program that helps clients manage stress
    through creative workouts. He plans to earn advanced certifications such as the Certified Strength and Conditioning Specialist (CSCS) and to develop an online platform that shares his hybrid training
    philosophy worldwide. Over the next five years, he hopes to become a sought‑after speaker at industry conferences, author a guide on stress‑relief through integrative fitness, and mentor other trainers
    in blending scientific rigor with artistic expression.
