personas:
  professional: John Cade, a 38‑year‑old boutique fitness innovator in Santa Monica, blends exercise physiology, biomechanics, and wearable‑tech expertise to design data‑driven ArtFit classes that fuse
    music, mural visuals, and movement storytelling, while their relaxed, sometimes disorganized schedule reflects a preference for creative flexibility over rigid planning.
  sports: John Cade rides Santa Monica waves at sunrise, dominates weekend beach‑volleyball matches with the local Santa Monica Beach Volleyball Club, follows the Los Angeles Lakers and LA Galaxy loyally,
    and they blend this active lifestyle with data‑driven performance tracking from wearable tech to fine‑tune their workouts, despite a habit of occasionally skipping scheduled strength sessions when creative
    ideas pull them away.
  arts: John Cade spends evenings strolling through LACMA and the Arts District, drawing inspiration from muralist Shepard Fairey, photographer Catherine Opie, and the eclectic sounds of Kendrick Kendrick,
    while they occasionally improvise at local comedy nights, using those artistic bursts to fuel their ArtFit class narratives.
  travel: John Cade prefers spontaneous, sun‑filled getaways that blend surf sessions with cultural immersion—recently exploring the surf breaks of Costa Rica’s Nicoya Peninsula and the culinary markets
    of Florence, and they dream of a future retreat in Kyoto’s temple gardens, all arranged with flexible itineraries that accommodate their love for impromptu art festivals.
  culinary: John Cade, an avid home‑chef, experiments with Mediterranean‑style dishes like grilled branzino with preserved lemons, chickpea‑saffron risotto, and homemade tzatziki, favoring fresh herbs,
    extra‑virgin olive oil, and locally sourced figs, while they often trade a post‑workout protein shake for a shared mezze platter at beachfront pop‑up restaurants.
  core: John Cade is a creatively restless 38‑year‑old fitness visionary who fuses art and science in every workout, yet their habit of leaving class schedules in a perpetual state of flux and a persistent
    worry about future success keep them perpetually juggling inspiration with anxiety.
background:
  cultural: Raised in a middle‑class white family on the West Coast, John grew up immersed in Southern California's beach culture and the diverse, artistic vibe of Los Angeles. His family heritage includes
    European roots, but his worldview has been shaped by the multicultural environment of Santa Monica—embracing sustainability, health consciousness, and a laid‑back yet innovative spirit. He values community
    connection, environmental stewardship, and the open‑minded, eclectic cultural influences that the Pacific coastline and the LA art scene provide.
attributes:
  skills: '[''Exercise Physiology'', ''Biomechanics'', ''Personal Training'', ''Group Fitness Instruction'', ''Creative Choreography'', ''Class Programming'', ''Nutrition Counseling'', ''Fitness Technology
