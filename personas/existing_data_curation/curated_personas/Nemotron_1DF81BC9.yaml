    and public speaking","Negotiation and contract management","Team collaboration and coordination"]'
  hobbies: '["Visiting local art galleries and museums","Sketching and drawing","Street photography","Playing pickup basketball","Hiking the trails around Portage County","Listening to indie and alternative
    music","Reading contemporary fiction and design blogs","Creating and managing a personal Instagram portfolio","Participating in community theater workshops","Practicing mindfulness meditation and journaling"]'
  career_goals: Marvin aims to advance from his current role as an advertising sales agent to a senior account manager within the next three to five years, eventually stepping into a brand strategist or
    creative director position. He plans to complete a bachelor's degree in marketing, followed by an MBA, and to build a portfolio of high‑impact campaigns for regional and national brands. Ultimately,
    he hopes to launch his own boutique agency that blends data‑driven strategy with bold, art‑inspired storytelling.
