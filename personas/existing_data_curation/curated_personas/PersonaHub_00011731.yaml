persona_description: A biblical scholar and professor of Old Testament and Semitic languages at Asbury Theological Seminary. Bill T. Arnold is the co-editor of the New Cambridge Bible commentaries and has
  authored several books on biblical topics, including 1 & 2 Samuel and Encountering the Book of Genesis. He is also a co-editor of Readings from the Ancient Near East. His expertise lies in the areas of
  Old Testament studies and the historical books of the Bible.
