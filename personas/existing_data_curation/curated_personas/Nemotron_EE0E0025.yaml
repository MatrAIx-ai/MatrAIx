  career_goals: He dreams of a future where he can be both a community helper and a lively performer. He is especially drawn to the idea of becoming a firefighter because the job combines clear structure,
    teamwork, and the chance to protect neighbors, which aligns with his practical side. At the same time, his love for being the center of attention fuels his ambition to be a school presenter or a local
    event announcer, where he can speak to crowds and share stories. He also imagines exploring space as an astronaut, driven by his fascination with science kits, but ultimately he seeks a role that lets
    him work with people and stay active.
