personas:
  professional: William Riggins is an aspiring junior game developer who blends their love for structured Scratch coding with imaginative storytelling, thriving on the predictable logic of programming while
    relishing the social buzz of sharing their creations with friends.
  sports: William Riggins dashes across the local under‑9 soccer field after school, they idolize FC Barcelona’s midfield maestros while cheering for the New York Yankees during baseball card swaps, and
    they embrace a lively, spontaneous approach to fitness that mixes structured drills with free‑form backyard sprint races.
  arts: William Riggins thrives in the school drama club, where they perform scenes from 'Harry Potter' and belt out karaoke renditions of Disney’s 'Let It Go', while secretly admiring the animated adventures
    of Pixar’s 'Toy Story' and the epic space illustrations of artist Chris Foss.
  travel: William Riggins loves weekend hikes through the nearby pine‑covered woods and dreams of a future road trip to Orlando’s Disney World and the Kennedy Space Center, preferring itineraries that balance
    a parent‑planned route with spontaneous stops for ice‑cream, and they often sketch travel journals of imagined space voyages.
  culinary: William Riggins favors cheesy pepperoni pizza, crunchy chicken nuggets, and homemade mac and cheese, and they often attempt to ‘code’ snack plates by arranging mozzarella squares into LEGO‑style
    bricks, though their kitchen skills stay at the level of simple microwave meals.
  core: William Riggins is a sociable, structure‑loving 8‑year‑old who turns every game of soccer and Scratch coding session into a stage for storytelling, while they occasionally lose their LEGO pieces
    in the chaos of vivid imagination.
background:
  cultural: 'William grew up in Chambersburg, a modest town nestled in the rolling farmlands of south-central Pennsylvania. His family''s traditions reflect a typical American small-town upbringing: celebrating
    holidays such as Thanksgiving, Christmas, and the Fourth of July with community fireworks, enjoying local fairs, and participating in church or community gatherings. The region''s history, with nearby
    Civil War sites and a blend of Pennsylvania Dutch influences, adds a sense of heritage, though his immediate cultural experience is shaped by close-knit neighborhood relationships, school events, and
    weekend family outings to local parks and farms. This environment fosters a strong sense of community, modesty, and appreciation for both routine and the occasional spontaneous celebration.'
