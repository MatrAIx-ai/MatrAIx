  career_goals: Ashley aims to advance into a supervisory or facilities‑management role where she can lead a green‑cleaning initiative for her building. She plans to earn certifications in environmental
    health and facilities management, and eventually mentor new hires while advocating for eco‑friendly practices. Long‑term, she hopes to start a small consulting service that helps other local businesses
    adopt sustainable cleaning methods, securing both professional fulfillment and financial stability for her retirement.
