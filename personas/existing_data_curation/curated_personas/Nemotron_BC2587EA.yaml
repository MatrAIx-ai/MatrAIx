  hobbies: '[''Pickup basketball'', ''Desert hiking'', ''Live music concerts (classic rock, country)'', ''Amateur car club participation'', ''Barbecue grilling with friends and family'', ''Watching and
    discussing sports (MLB, NBA, NHL)'', ''DIY home improvement projects'']'
  career_goals: Ethan aims to transition from a frontline sales role to a leadership position, such as Sales Team Lead or Regional Sales Manager, where he can shape strategy while preserving the flexibility
    he values. He wants to become a top‑performing sales professional by mastering digital sales channels and earning a Certified Professional Sales Leader credential. Over the next five years, he hopes
    to launch a side consulting venture that helps small businesses improve their sales processes, allowing him to blend his curiosity for new ideas with a practical, family‑friendly work schedule.
