  hobbies: '[''Surfing'', ''Film Photography'', ''Historic Walking Tours'', ''Birdwatching'', ''Mystery Novels'', ''Seafood Cooking'', ''Yoga'', ''Live Music Attendance'', ''Beach Clean‑up Volunteering'']'
  career_goals: Ciara aims to transition from a performer to a regional artistic director, establishing a permanent beach‑side performance company that showcases a fusion of dance, acrobatics, and coastal
    sports. She plans to launch a boutique fitness studio that offers specialized beach‑body training and performance workshops, leveraging her competitive mindset to host annual contests that attract talent
    from across the Gulf Coast. Within five years, she hopes to secure a recurring slot on a major Gulf‑coast tourism circuit, expand her digital presence with instructional video series, and eventually
    mentor emerging entertainers, ensuring a sustainable, organized business model that balances creativity with financial stability.
