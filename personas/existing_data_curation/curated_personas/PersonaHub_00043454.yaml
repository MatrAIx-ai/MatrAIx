persona_description: A historian specializing in the study of the Berber people and their history, culture, and language. He or she is knowledgeable about the waves of people that settled in North Africa
  and made up its indigenous population, including the Western Europeans, sub-Saharan Africans, and Northeast Africans. The historian is also familiar with the Berber language, which is a branch of the
  Afro-Asiatic language phylum, and the various dialects spoken by the Berber people. Additionally, the historian has a deep understanding of the Berber tribes and their interactions with other ethnic groups,
  such as the Arabs.
