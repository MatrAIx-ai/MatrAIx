  career_goals: Cindy aspires to pursue a career in veterinary medicine or wildlife conservation, where she can combine her love of animals with her scientific curiosity. In the short term, she aims to
    excel in high school science courses, join the school’s science club, and volunteer at local animal shelters to gain hands‑on experience. She plans to earn a scholarship to a university with a strong
    pre‑veterinary or environmental science program, and she hopes to develop resilience strategies to manage her anxiety while helping other teens navigate stress. Ultimately, she envisions working as
    a veterinarian who also advocates for mental‑health awareness in her community.
