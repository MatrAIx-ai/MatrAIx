personas:
  professional: Keelie Gartman, a 24‑year‑old floor installer, blends precise measurement, layout planning, and mastery of power tools with a curious yet practical mindset, delivering flawless flooring
    projects while they assertively mentor apprentices and champion sustainable, eco‑friendly solutions.
  sports: Keelie Gartman's sports persona revolves around weekend hikes on Riddle Run and Northside Park with the Beaver County Hiking Club, avid support for the Pittsburgh Steelers, Penguins, and Pirates,
    and occasional participation in local charity 5K runs, where they enjoy cheering alongside friends.
  arts: Keelie Gartman's arts persona shines through acoustic guitar sessions at Stage 203, a love for folk musicians like Sufjan Stevens and local singer‑songwriter Claire Smith, knitting scarves while
    listening to classical piano playlists, and regular attendance at live music events, where they soak in the atmosphere.
  travel: Keelie Gartman's travel persona blends budget‑friendly road trips to Ohiopyle State Park and weekend getaways to Chicago with a dream to explore Copenhagen's sustainable architecture, they prefer
    DIY itinerary planning over packaged tours.
  culinary: Keelie Gartman's culinary persona features comfort‑food experiments such as roasted vegetable lasagna and carrot‑ginger soup using fresh farmers’ market produce, moderate cooking skill that
    sometimes leads to over‑salted dishes, and a habit of sharing homemade breads and cookies with neighbors, where they often exchange recipes.
  core: Keelie Gartman is a curious, practical 24‑year‑old floor installer who balances hands‑on work, DIY projects, hiking, and community mentorship while they juggle a careful budget and an occasional
    lower‑back ache.
background:
  cultural: Keelie grew up in Beaver County, Pennsylvania, a region shaped by its steel-mill and railroad heritage and a close-knit working-class community. Her family traces its roots to German and Irish
    immigrants who settled the area in the late-19th century, and the values of hard work, self-reliance, and community service were instilled in her from a young age. Local traditions such as the Beaver
    County Fair, seasonal festivals, and the Protestant work ethic influence her pragmatic outlook, while the gradual cultural shift toward sustainability and inclusion in the region has encouraged her
    curiosity about eco-friendly building practices. She frequently engages with community organizations like the Rotary Club and local trade unions, which reinforce a collective spirit and respect for
    apprenticeship learning.
attributes:
  skills: '["Flooring Installation", "Subfloor Preparation", "Material Estimation", "Power Tool Operation", "Blueprint Reading", "Safety Compliance", "Problem Solving", "Time Management", "Customer Communication",
    "Team Collaboration", "Basic Business Management", "Sustainable Flooring Knowledge"]'
  hobbies: '["Hiking", "DIY Home Improvement", "Design & Architecture Reading", "Knitting", "Cooking", "Acoustic Guitar", "Community Volunteering", "Live Music Attendance", "Documentary Watching", "Women’s
    Empowerment Group"]'
  career_goals: Keelie aims to earn a Certified Floor Covering Installer (CFI) credential within the next year and to become a team lead on larger commercial projects within two years. She plans to complete
    an online associate's program in Construction Management to transition into project management, and ultimately to launch her own small flooring business that specializes in eco-friendly and resilient
    floor solutions for residential clients in the Beaver County and greater Pittsburgh region. She also intends to mentor new apprentices—especially women—through local trade union programs, and to stay
    active in industry trade shows and workshops to keep her skills at the cutting edge of sustainable flooring technology.
