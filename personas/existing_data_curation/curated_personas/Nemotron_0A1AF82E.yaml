  hobbies: '[''Community volunteering'', ''Church choir'', ''Hiking'', ''Gardening'', ''Cooking'', ''Reading mystery novels'', ''Local history research'', ''Quilting'', ''Karaoke'', ''Attending farmer’s
    markets'']'
  career_goals: Joyce aims to move from independent street vending into a leadership role within a regional sales team, where she can mentor new salespeople and design training programs that blend her practical
    experience with fresh, curiosity‑driven techniques. She envisions increasing her earnings while maintaining the flexibility she values, eventually opening a small boutique stall at local farmer’s markets
    that showcases curated products she sources herself. Long‑term, Joyce hopes to leverage her community connections to launch a modest e‑commerce venture that complements her in‑person sales, allowing
    her to reach a broader customer base without sacrificing the personal touch that defines her brand.
