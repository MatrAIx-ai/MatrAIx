  hobbies: '["Abstract watercolor painting", "Digital collage creation", "Reading science‑fiction and speculative poetry", "Reflective journaling", "Bird‑watching", "Walking along the Monongahela River",
    "Bridge club", "Museum docent volunteering", "Attending community theater"]'
  career_goals: Although retired from formal employment, Vickie remains intellectually active and driven. She plans to complete a series of interdisciplinary essays that weave scientific concepts with abstract
    visual art, aiming to publish them in a regional literary journal. She hopes to launch a quarterly “Science Meets Art” workshop at the Fairmont public library, where she can mentor senior citizens and
    high‑school students, fostering curiosity and creativity. Vickie also intends to learn basic Python programming to explore data‑visualization techniques, and to finish a personal memoir documenting
    her experiences as a woman in STEM. Her broader ambition is to leave a lasting legacy of lifelong learning and creative inquiry in her community.
