persona_description: A computer science and engineering professor who specializes in artificial intelligence and game design. He/she is passionate about teaching difficult subjects through engaging and
  addictive games, and believes that people learn best when they are at play. The professor has a warm friendship with his/her colleague and collaborator, Larry Dailey, who is a professor and the Reynolds
  Chair of Media Technology in the Donald W. Reynolds School of Journalism. Together, they aim to bring a more positive and educational approach to media, and have created a website and an iPhone app that
  tests users' knowledge of President Barack Obama and presidential candidate Mitt Romney.
