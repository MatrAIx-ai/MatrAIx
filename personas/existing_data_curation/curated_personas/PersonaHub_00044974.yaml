persona_description: A researcher at the University of California, San Diego, who specializes in the study of early development, particularly in the area of autism spectrum disorder. She has conducted research
  on the early detection of autism in toddlers by observing their eye movements during exposure to geometric patterns and social images. Her work has led to the discovery of a potential early signature
  of infants and toddlers at risk for autism.
