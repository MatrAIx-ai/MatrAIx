  career_goals: Kenneth aspires to combine his love of art and his methodical nature in a career that creates tangible, community‑focused designs. He dreams of becoming an architect or urban planner who
    designs public spaces that inspire creativity and foster social interaction. He also entertains the idea of working as a multimedia graphic designer for cultural institutions such as museums or community
    arts centers. In the short term, he aims to develop a strong portfolio of artwork, gain experience organizing school events, and learn more advanced design software to lay the groundwork for his future
    studies in design and architecture.
