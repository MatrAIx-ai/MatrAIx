personas:
  professional: Kenneth Gregorio, a teenage digital artist and budding coder, channels their curiosity for cityscapes into methodical sketch projects while they collaborate with peers in school art workshops,
    and their sociable, energetic nature fuels group creativity.
  sports: Kenneth Gregorio plays pickup basketball at the community park and competes on the middle school team, supports the Atlanta Hawks and Atlanta Falcons, and they incorporate yoga sessions to balance
    their active lifestyle with stress relief.
  arts: Kenneth Gregorio regularly visits the High Museum of Art, draws inspiration from contemporary street artists such as Banksy and local murals, listens to indie musicians like Tame Impala and classic
    rock legends such as The Beatles while they create digital illustrations of Atlanta’s cityscape.
  travel: Kenneth Gregorio enjoys weekend road trips to historic Savannah and nature hikes at Stone Mountain, meticulously planning each outing on a shared Google Doc, and they dream of an art‑focused vacation
    to New York City’s Museum of Modern Art.
  culinary: Kenneth Gregorio’s palate leans toward Southern comfort foods such as fried chicken, peach cobbler, and homemade tacos, often experimenting with fresh cilantro, lime, and avocado in simple kitchen
    projects, but they rely on school lunches when time is limited.
  core: Kenneth Gregorio blends artistic curiosity, organized ambition, and a social spark with a tendency toward worry, and they craft a vibrant teen life balanced by mindful self‑care and disciplined
    budgeting.
background:
  cultural: Kenneth comes from a white, middle‑class Southern family in Clayton County, Atlanta. His upbringing reflects traditional Southern values such as hospitality, community involvement, and a strong
    emphasis on family and church. He celebrates holidays like Thanksgiving and Fourth of July with local barbecues and community festivals, and he is familiar with the blend of cultures that characterize
    Atlanta, including the rich African‑American music and art scenes. Exposure to the city's vibrant arts community, through school field trips and local galleries, has shaped his appreciation for diverse
    artistic expression while maintaining his own Southern identity.
