  hobbies: '[''drawing'', ''digital art'', ''photography'', ''speculative fiction reading'', ''journaling'', ''hiking'', ''yoga'', ''mindfulness meditation'', ''cooking experimental dishes'', ''animal shelter
    volunteering'']'
  career_goals: Lacey aims to obtain her GED within the next year and enroll in community college courses focused on graphic design and mental‑health advocacy. She aspires to combine her artistic talent
    with community service by becoming a multimedia artist and outreach coordinator for a local cultural center, developing public murals and digital campaigns that raise awareness about stress management
    and emotional well‑being. Long‑term, she hopes to travel for artist residencies, build a freelance portfolio, and perhaps pursue a bachelor's degree in visual communication or art therapy.
