personas:
  professional: Lacey Layrisson is a 17‑year‑old budding multimedia artist who leverages their Procreate and Photoshop skills to design community‑focused digital campaigns and mural concepts while balancing
    school responsibilities with a meticulous yet adaptable project schedule, often channeling their curiosity into learning new illustration techniques and their occasional anxiety into careful deadline
    planning.
  sports: Lacey Layrisson joins the local Santa Maria Pack Riders hiking club for weekend trail outings, attends yoga sessions at a community studio, passionately follows the Los Angeles Dodgers and Los
    Angeles Lakers, and occasionally plays pickup volleyball at the beach, balancing a love for low‑impact exercise with occasional binge‑watching of sports highlights when stress spikes.
  arts: Lacey Layrisson immerses themselves in a blend of watercolor landscapes, digital illustration tutorials from artists such as Loish and James R Eads, and visits to local gallery openings that showcase
    indigenous Californian creators, while their playlist cycles from Tame Impala to folk singer Sufjan Stevens, reflecting an eclectic taste that fuels both their sketchbook and community‑art activism.
  travel: Lacey Layrisson prefers spontaneous weekend road trips along the Pacific Coast Highway, cherishes sunrise hikes at Point Conception, dreams of an artist residency in Oaxaca Mexico, and saves for
    a future study tour to Kyoto, all while juggling a busy school schedule that limits long‑term travel.
  culinary: Lacey Layrisson enjoys experimenting with fusion dishes such as Santa Maria‑style tri‑tip tacos topped with kimchi slaw and cilantro lime crema, confidently chops herbs but sometimes forgets
    to set timers, and delights in sourcing fresh avocados, jalapeños and smoked paprika at the local farmers market for family gatherings.
  core: Lacey Layrisson is a creatively curious 17‑year‑old who blends art, community service and mindfulness, often juggling anxiety‑induced worry with an earnest drive to turn those concerns into colorful
    murals and caring outreach.
background:
  cultural: Lacey is a white American raised in Santa Maria, California, an agricultural and coastal community with a strong sense of local tradition. Her family values self‑reliance, community involvement,
    and appreciation for the region's food culture, such as the famous Santa Maria‑style barbecue. Growing up, she has been exposed to a diverse population, participating in multicultural festivals and
    school events that celebrate both Hispanic and Anglo‑American heritage. This environment has fostered an inclusive outlook, encouraging her to engage with varied artistic expressions and community projects.
attributes:
  skills: '[''sketching'', ''digital illustration'', ''photo editing'', ''basic HTML/CSS'', ''video montage'', ''event planning'', ''public speaking'', ''social media content creation'', ''self‑directed
