personas:
  professional: Noah Ariza is a pharmacy technician in a busy San Juan community pharmacy, leveraging meticulous prescription verification, inventory expertise, and conflict‑resolution skills while channeling
    their competitive drive and artistic curiosity into designing eye‑catching patient‑education graphics that keep the team on track.
  sports: Noah Ariza trains at the San Juan Boxing Club, follows the Cangrejeros de Santurce baseball season with fervor, catches Caciques de Humacao basketball games on weekends, and integrates high‑intensity
    interval boxing sessions into their routine to channel their energetic sociability and competitive spirit.
  arts: Noah Ariza spends evenings sketching acrylic murals inspired by the vibrant street art of San Juan while collecting vinyls of Bad Bunny, listening to the classic salsa of Héctor Lavoe, and attending
    gallery openings featuring works by local painter José Mendez, letting their curious, open‑minded nature infuse every brushstroke with the island’s rhythmic energy.
  travel: Noah Ariza plans meticulously for weekend escapes to El Yunque’s rainforest trails and saves for longer adventures like a solo backpacking trip to Barcelona and a cultural immersion week in Oaxaca,
    balancing a love for spontaneous art festivals with a frugal mindset that often leads to last‑minute flight deals.
  culinary: Noah Ariza cooks with confident flair, perfecting mofongo with green plantains, sofrito, and chicharrón, while frequently experimenting with adobo‑marinated pork shoulder for arroz con gandules,
    and they relish pairing each meal with a crisp glass of local sorrel agua fresca.
  core: Noah Ariza is a fiercely organized, art‑obsessed pharmacy technician whose competitive edge is balanced by bouts of anxiety that they chase away with nightly boxing sessions and occasional over‑caffeinated
    late‑night sketch marathons.
background:
  cultural: Noah was born and raised in Caguas, a city in the central mountain region of Puerto Rico, and now lives in the San Juan metropolitan area. He grew up in a bilingual household, speaking Spanish
    at home and English at school, and was immersed in the island’s rich traditions of music, dance, and culinary heritage. Family gatherings, celebrations of festivals such as San Juan Bautista and Carnaval
    de Ponce, and regular participation in community events have shaped his sense of identity. His Puerto Rican upbringing combines a strong communal spirit, Catholic values, and a resilient attitude shaped
    by the island’s economic challenges, which informs his commitment to service, his appreciation for local artistic expressions, and his drive to give back to his community.
attributes:
  skills: '["Prescription processing", "Medication compounding", "Pharmacy inventory control", "Pharmacy management software (QS/1, PioneerRx)", "Customer service and counseling", "Regulatory compliance
    (HIPAA, FDA)", "Data entry and record keeping", "Quality assurance and medication safety", "Process improvement and workflow optimization", "Team communication and collaboration", "Critical analysis
    and problem solving", "Basic graphic design (Adobe Photoshop, Canva)", "Art appreciation and visual storytelling", "Stress management and emotional regulation techniques"]'
  hobbies: '["Visiting art galleries and street murals", "Acrylic painting", "Playing guitar", "Salsa dancing", "Competitive board games (Settlers of Catan, Codenames)", "Volunteering at community health
    fairs", "Exploring Puerto Rican cuisine", "Reading science fiction and philosophy", "Boxing / Fitness training", "Hiking in El Yunque rainforest", "Attending live music concerts", "Journaling and mindfulness
    meditation"]'
  career_goals: Noah aims to obtain the Certified Pharmacy Technician (CPhT) credential within the next year and move into a supervisory role at his current pharmacy. He plans to enroll in a bachelor's
    program in pharmaceutical sciences to qualify for a pharmacy manager position within five years. Leveraging his artistic interests, he intends to design culturally resonant patient‑education campaigns
    and lead community health outreach programs that blend health information with visual storytelling. Ultimately, he aspires to become a pharmacy director who champions innovative, patient‑centered care
    while fostering a supportive, collaborative team environment.
