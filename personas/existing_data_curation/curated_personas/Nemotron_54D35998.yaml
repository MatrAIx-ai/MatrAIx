personas:
  professional: Nereida Dejesus, a 29‑year‑old early‑childhood educator in Los Angeles, fuses her STEM bachelor’s training with a love for abstract watercolor to craft inquiry‑based curricula that weave
    coding, LEGO robotics, and visual storytelling, while her methodical, competitive nature drives meticulous record‑keeping and a relentless push toward a future boutique STEM‑art learning studio.
  sports: Nereida Dejesus, an avid solo hiker and weekend climber, frequents the Griffith Park trails and trains at Stronghold Climbing Gym, while cheering for the Los Angeles Dodgers and Los Angeles Galaxy,
    and participates in a low‑key running club that meets for sunrise jogs along the beach.
  arts: Nereida Dejesus immerses herself in contemporary art by studying works of Mark Rothko and Yayoi Kusama at LA galleries, draws inspiration from Björk’s experimental soundscapes and Guillermo del
    Toro’s fantastical films, and channels this eclectic aesthetic into her abstract watercolor practice and flash‑fiction narratives.
  travel: Nereida Dejesus prefers meticulously planned solo trips that blend stargazing and cultural immersion, having trekked the Atacama Desert in Chile for astrophotography, explored Iceland’s aurora‑filled
    skies, and dreaming of a future journey to Japan’s art islands, all while balancing a modest travel budget that reserves funds for her upcoming boutique studio.
  culinary: Nereida Dejesus cooks with a disciplined yet experimental flair, mastering a slow‑cooked yucca‑plantain stew seasoned with cumin and cilantro, perfecting hand‑rolled corn tortillas for shrimp
    tacos, and occasionally crafting saffron risotto infused with fresh herbs, reflecting her ability to balance tradition and novelty in the kitchen.
  core: Nereida Dejesus is a solitary, competitively driven creator who channels her vivid imagination into early‑childhood STEM‑art education, meticulous budgeting, and night‑sky photography, all while
    habitually re‑watching the same sci‑fi series for comfort and neglecting routine social gatherings.
background:
  cultural: Nereida was raised in a bicultural Panamanian‑American household, speaking both Spanish and English fluently. Her family maintains Panama’s culinary traditions, celebrating dates such as Carnaval
    de Panamá and Día de la Madre with music, dance, and communal meals that feature dishes like sancocho and arroz con pollo. Though she values solitude, her cultural upbringing emphasized close family
    bonds and communal support, which she translates into nurturing, respectful relationships with the children and families she serves. She incorporates bilingual storytelling and simple cultural songs
    into her childcare routines, fostering early language exposure and cultural awareness. Living in Studio City, she remains active in the local Latino community, participating in cultural festivals and
    networking with other Latinx educators, while also adapting her Panamanian heritage to the diverse, creative environment of Los Angeles.
