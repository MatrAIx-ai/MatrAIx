  career_goals: Nereida aims to ascend to a leadership role within early childhood education, specifically by directing a STEM‑focused learning center that prioritizes imaginative, art‑infused curricula.
    To achieve this, she plans to pursue a Master’s degree in Early Childhood Education or Educational Leadership, attain the Child Development Associate (CDA) credential, and gain experience in program
    administration. Long‑term, she envisions launching her own boutique childcare studio in Los Angeles that blends technology, abstract art, and culturally responsive practices. Additionally, she aspires
    to develop a suite of proprietary educational modules and author a children’s book that merges scientific concepts with fantastical storytelling, positioning herself as a competitive innovator in the
    field.
