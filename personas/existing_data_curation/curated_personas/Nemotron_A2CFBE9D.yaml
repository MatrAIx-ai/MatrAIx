  hobbies: '[''Hiking and landscape photography'', ''Metal sculpture and small-scale art'', ''Listening to contemporary Indigenous music'', ''Reading welding and DIY magazines'', ''Bushcraft and trail navigation'',
    ''Attending small local art gatherings'', ''Stargazing'', ''Learning traditional tribal patterns'', ''DIY electronics repair'', ''Storytelling circles with friends'']'
  career_goals: Darius aims to become recognized as a master welder and metal artist within his community, eventually establishing a small studio that produces custom metalwork blending modern techniques
    with traditional designs. He plans to obtain advanced welding certifications, such as the Certified Welder program, and to develop a portfolio of commission pieces for local businesses, tribal events,
    and private collectors. Additionally, he hopes to teach welding basics and safety to interested youth at the community center, fostering skill development and cultural continuity. Darius also seeks
    to expand his service area by offering mobile repair services for ranchers across McKinley County, creating a reliable income stream that supports his eventual retirement while allowing time for creative
    pursuits and cultural engagement.
