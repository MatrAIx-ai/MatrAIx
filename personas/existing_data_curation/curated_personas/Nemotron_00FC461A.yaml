  hobbies: '[''Visiting art galleries and museums'', ''Attending live music concerts and festivals'', ''Playing pickup basketball'', ''Cooking Caribbean-inspired dishes'', ''Traveling to explore new cultures'',
    ''Improvisational storytelling and open‑mic nights'', ''Mentoring at‑risk youth'', ''Listening to podcasts on psychology and social justice'']'
  career_goals: Kobe aims to transition from a legal secretary to a paralegal role, pursuing an associate’s degree in paralegal studies to deepen his substantive legal knowledge. He aspires to become a
    legal project manager or office manager, where he can combine his organizational strengths with his passion for creative industries by supporting art galleries, artists, and cultural nonprofits. Long‑term,
    he envisions launching a community‑focused legal aid clinic that assists under‑represented minority creators in Chesapeake, while also offering consultancy services to law firms seeking to improve client
    engagement and internal communication. Reducing workplace stress and achieving greater financial stability are key motivations behind his career trajectory.
