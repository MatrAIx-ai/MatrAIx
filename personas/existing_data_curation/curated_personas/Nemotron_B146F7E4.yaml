  hobbies: '[''Community soccer league'', ''Cumbia and salsa dancing'', ''Cooking Mexican cuisine'', ''Volunteering at a food pantry'', ''Watching soccer and NFL games'', ''Attending cultural festivals'',
    ''Playing video and board games with friends'']'
  career_goals: Ismael aims to earn his GED within the next year and enroll in an associate's program for facilities management. He plans to obtain certifications such as Certified Professional Cleaner
    (CPC) and OSHA 30‑hour training, positioning himself for a supervisory role like lead janitor or facilities coordinator at a larger commercial property. Long‑term, he hopes to secure a stable, higher‑paying
    position that will allow him to support his family, purchase a home in a safe Chicago neighborhood, and possibly mentor new workers entering the cleaning field.
