personas:
  professional: Carla Walton is a production line operator who blends hands‑on machine setup and quality inspection with self‑taught Python scripts and Canva designs, using their imaginative, flexible mindset
    to propose creative process tweaks while assertively coordinating shift teams and eyeing a future as a Lean Six Sigma‑certified supervisor.
  sports: Carla Walton enjoys weekend nature walks and low‑key bike rides with the Hammond Bayou Bike Club, tunes into New Orleans Saints football on Sundays, follows LSU Tigers on college football season,
    and occasionally joins a local indoor volleyball league, preferring casual, community‑oriented fitness over regimented gym routines, and they relish the social vibe of team sports.
  arts: Carla Walton draws inspiration from jazz legends like John Coltrane and R&B icons such as Erykah Badu, today’s indie producer Tame Impala, and visual artists like Kehinde Wiley, while they regularly
    attend open‑mic nights that showcase spoken‑word poets like Mahogany Lynne and sketch abstractions of bayou scenes using digital tools.
  travel: Carla Walton favors spontaneous road trips along the Gulf Coast, piecing together itineraries that blend a weekend of gumbo tasting in New Orleans, a night of jazz at the French Quarter with a
    sunrise hike in the Atchafalaya Basin, while they save for a dream backpacking adventure in Oaxaca, Mexico, though student budget constraints keep their international travels occasional.
  culinary: Carla Walton loves cooking, experimenting with shrimp étouffée spiced with cajun roux, smoked collard greens with smoked paprika, and a fusion jambalaya that mixes African‑Caribbean allspice
    and scotch bonnet pepper, demonstrating a moderate cooking skill that ranges from confident sautéing to occasional over‑salting when they try new recipes.
  core: Carla Walton is a creatively restless 21‑year‑old who blends hands‑on factory work with art, lives for spontaneous bursts of inspiration, and they often trade meticulous planning for impromptu sketch
    sessions and late‑night coffee runs.
background:
  cultural: Carla is a Black woman raised in Hammond, Louisiana, a town steeped in Southern and Creole influences. Her family's traditions blend the rich storytelling and gospel music of African-American
    culture with the culinary and festive customs of the region, such as Mardi Gras celebrations and Cajun-inspired dishes. Growing up, she attended a local church that emphasized community service and
    resilience, shaping her cooperative yet assertive outlook. The multicultural environment of Tangipahoa Parish exposed her to a mosaic of music, art, and dialects, fostering an appreciation for both
    her heritage and the broader cultural tapestry of the Gulf South.
attributes:
  skills: '[''Machine operation and setup'', ''Routine equipment maintenance'', ''Quality control inspection'', ''Creative problem solving'', ''Team communication and collaboration'', ''Basic graphic design
    (Canva, Adobe Spark)'', ''Introductory Python scripting'', ''Adaptable workflow management'']'
  hobbies: '[''Drawing and digital illustration'', ''Reading speculative fiction and poetry'', ''Writing short stories'', ''Listening to jazz, R&B, and indie music'', ''Experimenting with fusion cooking'',
    ''Nature walks and photography'', ''Attending open-mic and local art events'']'
  career_goals: Carla aims to move beyond the shop floor into a role that blends her production experience with her creative interests. In the next few years she plans to earn certifications in Lean Six
    Sigma and OSHA safety, and to enroll in a community college program in industrial technology or visual arts. Her long-term ambition is to become a production supervisor or process improvement specialist
    at a company that values innovative design, or to launch her own small line of handcrafted accessories that combine functional manufacturing with artistic flair.
