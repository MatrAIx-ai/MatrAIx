  hobbies: '[''gardening'', ''cooking Vietnamese cuisine'', ''reading non-fiction'', ''model building'', ''walking/hiking'', ''mindfulness meditation'', ''volunteering at food pantry'']'
  career_goals: Hoang aims to translate his practical skill set into a stable, recognized profession. He plans to obtain certifications in carpentry or HVAC maintenance, which would allow him to launch
    a small handyman business serving the Modesto community. He also envisions a role where he can formalize his helping nature, such as becoming a volunteer coordinator or community support specialist
    at a local nonprofit. Long‑term, Hoang hopes to achieve financial independence for his family while continuing to contribute to the well‑being of his neighbors.
