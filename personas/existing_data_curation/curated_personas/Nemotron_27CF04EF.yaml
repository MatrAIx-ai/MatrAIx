  career_goals: Elisa hopes to transition into a supervisory role at her workplace, mentoring newer cashiers and sharing her best practices in customer care. She also aims to volunteer more frequently at
    the local community center, leading bilingual workshops and cultural events that celebrate Puerto Rican heritage. Long‑term, she dreams of opening a small weekend market stall where she can sell homemade
    Puerto Rican treats and crafts, combining her love of cooking with her entrepreneurial curiosity.
