  hobbies: '[''Reading contemporary non-fiction'', ''Historical biographies'', ''Literary fiction'', ''Logic puzzles'', ''Crossword puzzles'', ''Solo hiking'', ''Nature photography'', ''Chess'', ''Strategic
    board games (e.g., Settlers of Catan)'', ''Attending local art exhibitions'', ''Independent film screenings'']'
  career_goals: Alaina aims to advance into senior leadership within the analytics domain, ultimately becoming a chief strategy officer or leading a high‑impact analytics practice for a regional government
    or private firm. She seeks to deepen her expertise in performance improvement initiatives that drive measurable outcomes for organizations in Idaho and the broader Pacific Northwest. In the longer term,
    she envisions launching her own boutique consultancy focused on data‑driven decision‑making for small and mid‑size enterprises, positioning herself as a recognized thought leader through conference
    presentations, published case studies, and mentorship of junior analysts.
