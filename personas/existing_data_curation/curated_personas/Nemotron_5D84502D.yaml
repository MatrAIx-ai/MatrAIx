personas:
  professional: Alaina Gaddis, a 37‑year‑old analytics specialist, blends rigorous data‑driven methods with a humanities‑shaped critical eye to craft strategic dashboards in Power BI and Tableau, translating
    complex SQL queries into clear executive recommendations while habitually battling deadline pressure due to a love of spontaneous project pivots.
  sports: Alaina Gaddis pursues solo hikes across Idaho’s Sawtooth and Selway‑Bitterroot ranges, logs miles with a GPS watch, and supports the Boise State Broncos football team while holding a membership
    in the Idaho Alpine Club, balancing disciplined trail training with occasional impromptu weekend runs when a new summit beckons.
  arts: Alaina Gaddis frequents Boise’s art exhibitions at the Boise Art Museum and catches indie film screenings at the Egyptian Theatre, drawing inspiration from Ansel Adams’ landscape photography and
    the storytelling of Greta Gerwig, and she often debates the nuances of Frances McDormand’s performances with her small circle of board‑game friends.
  travel: Alaina Gaddis favors meticulously planned yet loosely timed solo trips, having trekked the glaciers of Patagonia, explored Reykjavik’s cafes, and wandered the vineyards of New Zealand’s South
    Island, while dreaming of a future hike through Japan’s Nakasendō, all while balancing a modest travel budget that prioritizes experience over luxury.
  culinary: Alaina Gaddis enjoys cooking hearty quinoa bowls with smoked Idaho trout, roasted root vegetables, and wild mushrooms, pairs meals with locally brewed IPA and lavender‑honey drizzles, and while
    her culinary confidence is moderate, she often experiments with sous‑vide techniques to perfect the perfect salmon almondine for post‑hike recovery.
  core: Alaina Gaddis is a data‑centric strategist who turns spreadsheets into adventure itineraries, balances a structured analytical mindset with an impulsive love for solo hikes, and navigates life with
    a critical, competitive edge tempered by occasional deadline‑driven chaos.
background:
  cultural: Alaina was raised in a middle‑class, suburban family in the Pacific Northwest, where a strong emphasis on education, self‑reliance, and community involvement shaped her values. As a White American,
    she aligns with mainstream cultural norms of individualism and personal responsibility, while also embracing Idaho's outdoors‑oriented lifestyle. Her upbringing exposed her to community events such
    as the Boise River Festival and local farmer’s markets, fostering a connection to regional traditions. Though not overtly religious, she respects the modest, culturally diverse environment of Boise,
    valuing privacy, personal space, and modest civic engagement in her social interactions.
attributes:
  skills: '[''Data analysis'', ''Statistical modeling'', ''Business process mapping'', ''Performance metrics development'', ''Strategic planning'', ''Report writing'', ''Stakeholder management'', ''Project
