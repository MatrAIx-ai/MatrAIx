persona_description: A medical researcher who specializes in the study of preterm birth, particularly the factors that contribute to the phenomenon. His research interests include, but are not limited to,
  the genetic and environmental factors that increase the risk of preterm delivery in African-American women, and the potential mechanisms by which these factors are transmitted from one generation to another.
  His studies are aimed at understanding the foundation for the increased risk of preterm delivery in African-American women and developing interventions to reduce the incidence of preterm birth.
