personas:
  professional: Ryan Foreman is a 19‑year‑old telecommunications line installer who blends meticulous fiber‑optic splicing and network troubleshooting expertise with a curious, collaborative mindset, quickly
    diagnosing line faults while they keep crew morale high and plan for CFOT certification and future foreman responsibilities.
  sports: Ryan Foreman hits the Northside High School gym for pickup basketball three nights a week, follows the Alabama Crimson Tide football season, roots for the Birmingham Barons minor‑league baseball
    team, and streams Atlanta Hawks games, and they approach fitness with a relaxed mix of cardio hikes in the Appalachian foothills and occasional strength‑training sessions.
  arts: Ryan Foreman channels his artistic side by strumming classic‑rock anthems from The Black Keys and indie tracks by Arcade Fire on guitar in his garage band, snapping Appalachian landscape photos
    inspired by Ansel Adams, and they volunteer backstage for community theater productions of Shakespeare’s A Midsummer Night’s Dream, all of which fuel their love for storytelling and raw creativity.
  travel: Ryan Foreman plans trips with a blend of spontaneous weekend drives to Asheville’s Blue Ridge Parkway and meticulously saved summer adventures to Berlin’s vibrant music scene, balancing a modest
    budget with a love for hiking, historic towns, and the chance to catch a live indie show abroad, and they often map routes on a phone app before setting out.
  culinary: Ryan Foreman’s culinary palate mixes Southern comfort—think smoky pulled‑pork sandwiches with coleslaw—and global flavors like Korean tacos with bulgogi beef, and they often whip up quick pasta
    carbonara using pancetta, parmesan, and free‑range eggs, though their cooking skill stays at a confident home‑cook level, preferring casual diners and food‑truck stalls over fine‑dining.
  core: Ryan Foreman is a 19‑year‑old tech‑savvy fiber‑optic enthusiast who balances restless curiosity with a laid‑back love for classic rock, weekend hikes, and occasional over‑caffeinated gaming marathons,
    all while they stubbornly forget to schedule regular dentist appointments.
background:
  cultural: Ryan grew up in Ragland, a close‑knit town in St. Clair County, Alabama. His upbringing reflects Southern hospitality, strong community ties, and a respect for tradition rooted in his family's
    Baptist church involvement. He celebrates local events like the annual Mule Day festival and enjoys Southern cooking staples such as fried green tomatoes and barbecue. While he values these regional
    customs, his curiosity and online exposure have broadened his perspective, drawing influences from modern art, indie music scenes, and digital culture. This blend of rural Southern heritage and contemporary
    interests shapes his worldview and interpersonal style.
attributes:
  skills: '["Fiber‑optic splicing", "Cable termination", "Copper and fiber network troubleshooting", "Use of hand and power tools", "Reading and interpreting technical schematics", "OSHA safety compliance",
    "Basic network testing with OTDR and signal meters", "Customer communication", "Team collaboration and crew coordination", "Introductory photography", "Basic graphic design"]'
  hobbies: '["Playing guitar in a local band", "Attending and volunteering at community theater", "Hiking and nature photography", "Digital photo editing", "Pickup basketball games", "Listening to classic
    rock and indie music", "Reading science‑fiction novels", "Streaming indie video games with friends", "Mentoring middle‑school students in STEM"]'
  career_goals: Ryan aims to earn Certified Fiber Optic Technician (CFOT) credentials within the next two years and advance to a crew foreman position, overseeing larger broadband deployment projects. He
    plans to enroll in a community college program for electrical engineering technology to broaden his knowledge of renewable‑energy‑integrated communications. Long‑term, he aspires to launch his own small
    contracting business focused on bringing high‑speed internet to underserved rural areas of Alabama, combining his technical expertise with a commitment to community development.
