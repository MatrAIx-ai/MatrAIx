personas:
  professional: Carlos Hatches is a seasoned mechanical designer and prototyping consultant who blends rigorous CAD expertise (SolidWorks, AutoCAD) with hands‑on CNC milling and 3‑D printing to deliver
    rapid‑turnaround parts for regional manufacturers, while leveraging his analytical Python and MATLAB skills to streamline product data; his competitive edge and community‑focused mindset drive him to
    translate complex technical concepts into clear documentation for both clients and the youth he mentors at the makerspace.
  sports: Carlos Hatches throws himself into weekly pickup basketball at the community center, idolizing the Cleveland Cavaliers and often debating player stats with friends, while maintaining a membership
    in the Cuyahoga Valley Trail Club for seasonal hikes and occasional trail runs, and he balances his competitive drive with a laid‑back attitude toward gym workouts, preferring quick HIIT sessions over
    long‑term routines.
  arts: Carlos Hatches channels his creative side through blues guitar improvisations inspired by B.B. King and Gary Clark Jr., spends quiet evenings absorbing science‑fiction works by Octavia Butler and
    contemporary African‑American playwrights like Kia Cortés, and regularly attends local gospel choir performances and the annual Ohio Black Arts Festival, where he finds inspiration for both his technical
    sketches and community workshops.
  travel: Carlos Hatches favors spontaneous weekend road trips that blend cultural immersion with technical curiosity, such as cruising to New Orleans for the Jazz & Heritage Festival to soak up live blues,
    driving up to Detroit’s Henry Ford Museum to study automotive history, and planning an annual pilgrimage to Hannover, Germany for the HIMM exhibition, while he balances these getaways with a modest
    travel budget that often requires him to scout affordable AirBnB stays and rely on saved vacation days.
  culinary: Carlos Hatches enjoys mastering soul‑food classics—slow‑cooked collard greens sautéed with smoked turkey, crispy fried chicken seasoned with a garlic‑and‑paprika rub, and buttery cornbread—while
    also experimenting with fusion dishes like a spicy BBQ‑marinated motorcycle‑themed taco, his cooking skill ranges from competent home chef to occasional culinary tornado when a new hot‑sauce blend sparks
    a midnight snack binge.
  core: Carlos Hatches is a mechanically gifted, community‑driven problem‑solver who balances a love for vintage motorcycles and blues guitar with a habit of over‑booking freelance gigs and forgetting to
    reply to emails.
background:
  cultural: Carlos was raised in an African‑American family in the Midwest, where his grandparents were part of the Great Migration that settled in Ohio. Family life centered around church gatherings, soul
    food, gospel, and R&B, grounding him in a rich cultural tradition that emphasizes community, resilience, and self‑reliance. Growing up, he witnessed both the challenges and the strengths of his community,
    shaping his skeptical yet competitive outlook. He actively participates in local cultural events such as Ohio's Black History Month celebrations, Juneteenth parades, and community clean‑up initiatives.
    These experiences have instilled a deep respect for education, mentorship, and giving back, influencing his desire to mentor youth in STEM and to serve as a technical resource for his neighborhood.
attributes:
  skills: '[''SolidWorks'', ''AutoCAD'', ''CNC machining'', ''3D printing'', ''Python'', ''MATLAB'', ''Data analysis'', ''Arduino prototyping'', ''Circuit troubleshooting'', ''Technical documentation'']'
  hobbies: '[''Motorcycle restoration'', ''Basketball'', ''Hiking'', ''Blues guitar'', ''Makerspace volunteering'', ''Science‑fiction reading'', ''Puzzle gaming'']'
  career_goals: Carlos aims to move from occasional freelance projects to a stable, contract‑based technical consulting role with a regional manufacturing firm, where he can apply his mechanical design
    and data‑analysis expertise to streamline product development and adopt digital manufacturing tools. In the longer term, he envisions launching his own boutique prototyping studio that offers affordable
    design‑to‑production services for small businesses and local makers. He also aspires to mentor youth in STEM through after‑school programs, turning his technical knowledge into a community asset. His
    ambitions reflect a desire for reliable income while preserving the flexibility to choose projects that match his practical, outcome‑focused mindset.
