  hobbies: '[''LEGO building'', ''Puzzle solving (jigsaw, Sudoku)'', ''Reading fantasy books'', ''Soccer'', ''Swimming'', ''Strategic board games (Chess, Settlers of Catan)'', ''Animal care (volunteering
