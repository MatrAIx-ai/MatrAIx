  career_goals: Luan dreams of turning her love for animals and her methodical nature into a future career as a veterinarian, where she can care for pets with a systematic approach. She also aims to excel
    academically, aspiring to win science fairs and eventually study biomedical research or engineering at a top university. Her competitive drive pushes her to become a top student in her school, and she
    hopes to attend a specialized STEM high school that offers structured, challenging coursework.
