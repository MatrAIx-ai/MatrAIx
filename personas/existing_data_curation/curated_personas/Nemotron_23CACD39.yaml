  hobbies: '["herb and vegetable gardening","making homemade preserves and sauces","reading mystery novels","quilting","birdwatching","volunteering at the local food pantry","attending the weekly farmers''
    market","listening to classic country and folk music"]'
  career_goals: Sonya aims to move into a supervisory or quality‑assurance role that lets her oversee batch production, mentor younger colleagues, and enhance safety standards. She plans to earn a Certified
    Food Safety Manager credential to deepen her expertise. Looking ahead, she hopes to start a small home‑based catering service focused on wholesome, locally‑sourced meals for her community, allowing
    her the flexibility she values while continuing to help others. Ultimately, she wants a position that balances a steady schedule with meaningful contributions to both her workplace and local charitable
    food initiatives.
