personas:
  professional: Sonya Swords, a seasoned food production supervisor with expertise in large‑scale batch scaling, HACCP compliance, and team mentorship, blends her practical curiosity with a relaxed approach
    to keep the plant running smoothly while they patiently guide new staff through complex safety protocols.
  sports: Sonya Swords follows the Dallas Cowboys and Dallas Mavericks with fervor, plays weekly softball for the Tyler Community Softball League, belongs to the East Texas Birdwatchers Hiking Group for
    low‑impact exercise, and they attend yoga sessions at the local gym every Saturday morning.
  arts: Sonya Swords is an avid fan of classic country and folk, frequently listening to Dolly Parton, Johnny Cash, and Gillian Welch while they quilt in their spare time, and they find comfort in reading
    Agatha Christie mysteries and attending the church choir’s monthly performances.
  travel: Sonya Swords enjoys relaxed road trips across the Hill Country, has spent weekends exploring Austin’s music scene and New Orleans’ culinary delights, and they dream of a future journey to the
    Grand Canyon and a quiet retreat in Asheville’s Blue Ridge Mountains.
  culinary: Sonya Swords excels at transforming brisket, chili con carne, and homemade peach preserves into both industrial batch productions and cozy family meals, favoring ingredients like smoked paprika,
    jalapeño, and fresh herbs from their garden, while they also savor Tex‑Mex tacos with cilantro‑lime rice on Saturday nights.
  core: Sonya Swords blends Southern hospitality with pragmatic curiosity, juggling large‑scale food production, a budding home catering venture, quilting, and classic country tunes, all while they occasionally
    let disorganization sneak into their schedule.
background:
  cultural: Sonya was raised in a small East Texas town, growing up in a predominantly white, working‑class community with strong Southern and Christian (Baptist) influences. Her family emphasized modesty,
    hospitality, and self‑reliance, values reflected in the regional cuisine she loves—BBQ, Tex‑Mex, and hearty casseroles. Attending a local community college, she earned an associate's degree in culinary
    arts, which anchored her career in food production. She participates in church events, values community service, and maintains a deep connection to the rhythms of rural Texas life while embracing the
    practical, curious spirit that guides her daily choices.
attributes:
  skills: '["large‑scale food batch production","recipe scaling and formulation","food safety compliance (HACCP, FSMA)","quality control and inspection","sanitation and hygiene management","industrial kitchen
