personas:
  professional: Sabrina Bates, a budding robotics enthusiast and comic-book storyteller, channels their practical mindset and love for structure into designing simple mechanisms for the school club while
    balancing teamwork during collaborative brainstorming sessions, and they thrive when sharing ideas with peers.
  sports: Sabrina Bates, a lively member of the Playmakers youth basketball league at the local park, also cheers for the Chicago Bulls and enjoys Saturday morning pick-up games while using the community
    gym's fitness circuit to stay agile and energized, and they eagerly follow the Bulls' games on television.
  arts: Sabrina Bates channels creativity through drawing comic-style heroes inspired by Jeff Smith and Marjane Satrapi, choreographs hip-hop routines to Ariana Grande tracks, and draws narrative ideas
    from the animated series Adventure Time, while they also audition for school theatre productions.
  travel: Sabrina Bates loves weekend road trips to nearby science museums such as the Smithsonian's National Air and Space Museum, dreams of a summer visit to Tokyo's Pokémon Center, and they plan each
    outing with a detailed checklist, balancing schoolwork constraints with family budget limits.
  culinary: In the family kitchen, Sabrina Bates confidently whips up quesadillas with cheddar and jalapenos, bakes chocolate chip cookies using her grandmother's vanilla extract, and experiments with mango-salsa
    tacos, though they often forget to clean the countertops afterward.
  core: Sabrina Bates is an organized, energetic 11-year-old who balances a love for robotics, basketball, and comic art with a habit of leaving unfinished sketches, a tendency to misplace half-finished
    homework, and they demonstrate fierce loyalty to friends.
background:
  cultural: Sabrina is a Black girl raised in the vibrant, multicultural community of Brooklyn, Kings County. She experiences a blend of African‑American cultural traditions, including neighborhood block
    parties, church gatherings, and celebrations of Black History Month that emphasize storytelling and resilience. Her family places high value on community support, music, and cuisine, sharing soulful
    gospel and contemporary R&B at home while cooking dishes that reflect their roots. These cultural influences shape her worldview, fostering a strong sense of belonging, pride, and a desire to give back
    to the neighborhoods that have nurtured her growth.
