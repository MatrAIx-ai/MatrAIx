  hobbies: '[''Basketball'', ''Community dance class (hip‑hop & contemporary)'', ''Drawing and comic illustration'', ''Scratch animation projects'', ''Reading graphic novels'', ''Cooking family recipes'',
    ''Robotics club activities'']'
  career_goals: Sabrina dreams of a career where she can combine her love for helping others with her structured, reliable nature. She is excited about becoming a teacher or a community health worker, roles
    that let her mentor younger children and support families in her Brooklyn neighborhood. Influenced by her sociable personality, she also envisions leading after‑school programs that blend academic tutoring
    with creative arts and dance. Her long‑term ambition is to advocate for equitable educational resources, using her organizational strengths to bring together volunteers, parents, and local organizations.
