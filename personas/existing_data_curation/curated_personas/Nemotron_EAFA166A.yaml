personas:
  professional: Olga Walker is a 22‑year‑old biomedical engineer turned occupational therapist who blends data‑driven Python analytics with hands‑on functional assessments to craft evidence‑based neurorehabilitation
    plans, balancing their insatiable curiosity for emerging assistive tech with a pragmatic, client‑centered approach, all while navigating their competitive drive and occasional worry about delivering
    perfect outcomes.
  sports: Olga Walker channels their competitive streak into early‑morning 5K runs with the Hudson Valley Runners club and seasonal hiking trips through the Catskills, while cheering on the Albany Great
    Danes basketball team and the New York Knicks, balancing solo endurance training with community‑spirit sports fandom.
  arts: Olga Walker expresses their creative side by capturing the Hudson River’s misty valleys with a vintage Nikon, devouring speculative fiction by N. K. Jemisin and classic works of Isaac Asimov, and
    hosting strategic board‑game nights featuring Terraforming Mars and Scythe, all while drawing inspiration from local art festivals that celebrate regional craftsmanship.
  travel: Olga Walker prefers meticulously planned road trips that blend hiking in the Adirondacks, weekend escapes to the historic town of Hudson for its farmers’ market, and occasional budget‑friendly
    overseas adventures to Kyoto for its tranquil temples, balancing their love for nature with a desire for cultural immersion despite a student‑budget constraint.
  culinary: Olga Walker enjoys cooking Mediterranean‑inspired dishes such as quinoa tabbouleh with fresh herbs and roasted root vegetables, while also savoring classic Hudson Valley apple pie, and they’re
    comfortable chopping and sautéing at an intermediate level, though they sometimes order takeout sushi when deadlines press.
  core: Olga Walker is a data‑savvy, nature‑loving occupational therapist who wrestles with anxiety, competes fiercely in board games and 5Ks, and can’t resist a new camera lens or a late‑night sci‑fi binge.
background:
  cultural: Olga is a White American of mixed Irish and German ancestry, raised in the rural‑suburban environment of Coeymans, NY. Growing up near the Hudson River, she was influenced by the region’s blend
    of historic Dutch heritage, outdoor recreation culture, and a strong community ethos that values hard work and education. Her family emphasized practicality and self‑reliance, while also encouraging
    curiosity and lifelong learning. Exposure to local arts festivals and community service initiatives shaped her appreciation for diverse perspectives, and the regional healthcare landscape fostered an
    early interest in supportive, evidence‑based care.
