  hobbies: '[''Hiking in Hudson Valley'', ''Landscape photography'', ''Reading science fiction'', ''Yoga and meditation'', ''Strategic board games'', ''Running 5K races'', ''Coding small Python projects'',
    ''Journaling'', ''Community gardening'']'
  career_goals: Olga aims to specialize in neurorehabilitation for pediatric and adult populations, pursuing certification as a Certified Hand Therapist within the next three years. She plans to earn a
    master's degree in occupational therapy to deepen her clinical expertise and eventually become a clinical supervisor. Long‑term, Olga envisions establishing a community‑focused telehealth program that
    supports stress‑management and resilience training for clients with chronic conditions, leveraging her technical skills to improve access to care. She is also driven to contribute to research on outcome
    measurement tools, hoping to publish findings that influence best‑practice guidelines.
