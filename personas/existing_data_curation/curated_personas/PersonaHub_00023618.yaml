persona_description: A conservation biologist who specializes in the study of sloths, particularly the maned three-toed sloth (Bradypus torquatus), and the threats they face due to habitat loss and fragmentation.
  She is interested in developing corridors of suitable habitat between fragmented populations and characterizing confiscated animals to determine the most appropriate release site. Her research interests
  include genetic diversity, population dynamics, and conservation planning and monitoring. She has experience working in protected areas and has developed an Action Recovery Plan for mammals of the Central
  Atlantic Forest.
