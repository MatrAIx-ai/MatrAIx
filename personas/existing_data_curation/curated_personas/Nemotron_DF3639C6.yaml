personas:
  professional: Richard Fitzsimmons, a 17‑year‑old aspiring automotive technician, leverages their practical mechanical know‑how, strong teamwork, and event‑organizing experience into a reliable volunteer
    role at the Woodway Community Center while they pursue an apprenticeship at a local auto shop, embodying a preference for structure and an outgoing, steady demeanor.
  sports: Richard Fitzsimmons, a 17‑year‑old athlete, splits time between shooting hoops at the Woodway Community Center, playing forward for the local Woodway Tigers soccer league, and cheering on the
    Dallas Cowboys, Texas Rangers, and Houston Rockets, approaching fitness with a structured team‑practice schedule and a penchant for weekend high‑school football games that blend socializing with physical
    activity.
  arts: Richard Fitzsimmons, a 17‑year‑old enthusiast, immerses themselves in classic rock and country by attending live shows featuring The Rolling Stones tribute acts at the Waco Majestic Theatre and
    listening to George Strait on the radio, while they showcase a surprisingly confident karaoke rendition of Johnny Cash’s “Folsom Prison Blues,” weaving music into their social identity.
  travel: Richard Fitzsimmons, at 17, prefers short‑term, budget‑friendly road trips—such as a weekend drive to Austin’s live‑music scene and an annual family visit to New Orleans for Creole cuisine—while
    they dream of a cross‑country crawl to Nashville’s honky‑tonk bars and a future solo drive through the Grand Canyon, balancing careful itinerary planning with spontaneous detours.
  culinary: Richard Fitzsimmons, a 17‑year‑old with a moderate cooking skill set, favors Texas‑style BBQ—grilling brisket seasoned with smoked paprika and cumin, whipping up chili con carne with jalapeños,
    and crafting homemade burgers topped with sharp cheddar—and they often combine a love for tinkering with engines with a knack for firing up the backyard smoker on weekend evenings.
  core: Richard Fitzsimmons, a 17‑year‑old multitasker, blends a practical love for cars with a sociable streak for sports, music, and community service, though they sometimes procrastinate on dental appointments
    and can’t resist a last‑minute gaming session.
background:
  cultural: Richard grew up in Woodway, a suburban town in McLennan County near Waco, Texas. His family reflects typical Central Texas values, emphasizing community participation, modest living, and a blend
    of Southern hospitality and Texan pragmatism. Raised in a predominantly white, Christian environment, he attended local churches and took part in community events such as county fairs, high school football
    games, and neighborhood gatherings. The regional culture of outdoor recreation, love for sports, and respect for tradition shapes his outlook and daily life.
