  career_goals: Richard plans to obtain his GED within the next year and then enroll in a vocational program for automotive technology at a community college. His short‑term goal is to secure an apprenticeship
    at a local auto repair shop to deepen his hands‑on skills. In the longer term, he aims to become a certified automotive technician and eventually open his own small repair business serving his neighborhood.
    He is also interested in contributing to public safety by joining a junior firefighter or EMT volunteer program, which aligns with his desire for structured, service‑oriented work and community involvement.
    Additionally, he hopes to acquire a commercial driver’s license to explore opportunities in logistics and transportation.
