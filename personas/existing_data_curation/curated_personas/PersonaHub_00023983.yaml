persona_description: A disaster preparedness specialist who is monitoring and analyzing the potential impact of Hurricane Sandy on coastal regions, focusing on the storm surge and its effects on land. They
  are using data from the National Hurricane Center and Google's crisis map to predict and prepare for the storm's impact on the East Coast. They are also aware of the significance of atmospheric pressure
  in relation to storm surge and are using this information to prepare for the storm's impact. They are using their expertise in disaster preparedness and risk management to ensure that communities are
  prepared for the storm's potential impact.
