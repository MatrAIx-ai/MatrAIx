  hobbies: '[''Reading (fiction and non‑fiction)'', ''Puzzle solving (Sudoku, crosswords)'', ''Hiking in Middlesex Fells'', ''Vegetable gardening'', ''Yoga and mindfulness meditation'', ''Seasonal cooking'',
    ''Landscape photography'', ''Tutoring high‑school students in mathematics'']'
  career_goals: Anna aims to transition into a senior strategic analytics role where she can lead a small, collaborative team on high‑impact optimization projects, particularly in sustainable logistics
    and public‑sector resource allocation. She seeks to obtain a certification in data science and contribute to peer‑reviewed publications that bridge theory and practice. Balancing her desire for flexibility,
    she hopes to shape a work environment that values outcome‑based performance over rigid schedules, allowing her to maintain her independent work style while mentoring junior analysts. Long‑term, she
    envisions influencing policy decisions through evidence‑based modeling and serving as a thought leader at the intersection of operations research and emerging technologies.
