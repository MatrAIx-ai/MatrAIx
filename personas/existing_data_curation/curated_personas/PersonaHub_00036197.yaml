persona_description: A geoscientist at Brown University who specializes in the study of the mineral composition of Mars and has co-authored three papers on the topic. He is part of a French-led team studying
  data from OMEGA, a spectrometer aboard Mars Express that uses visible and infrared light to map the surface composition of the planet. Mustard has designed a next-generation spectrometer that will be
  on board the Mars Reconnaissance Orbiter, which NASA plans to launch in August.
