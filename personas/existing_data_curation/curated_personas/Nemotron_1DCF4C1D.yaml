  career_goals: Although no longer part of the formal workforce, Juan’s ambitions center on personal fulfillment and community contribution. He hopes to compile a memoir of Coamo’s history and his own life
    experiences, preserving local stories for younger generations. He aims to complete a collaborative mural in the town’s community center that celebrates the island’s cultural heritage. Additionally,
    he wishes to mentor neighborhood youth in cooking and storytelling, sharing the skills that have sustained his own resilience. Managing his anxiety through mindfulness practices and continued artistic
    expression also forms a key part of his personal goals.
