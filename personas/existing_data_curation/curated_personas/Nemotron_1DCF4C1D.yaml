personas:
  professional: Juan Arevalo, a self-taught community historian and versatile artisan, blends their carpentry, gardening, and watercolor storytelling to preserve Coamo's heritage, and they approach projects
    with curious flexibility and an emotionally rich, sometimes anxious, mindset.
  sports: Juan Arevalo, who enjoys gentle hill walks with their garden tools and participates in the town's senior walking club, they follow the local baseball team Cangrejeros de Santurce and the soccer
    club Puerto Rico Islanders, and occasionally join a community softball game at the municipal field during the cooler evenings.
  arts: Juan Arevalo, an avid watercolor sketcher of Coamo's hills, they draw inspiration from the vibrant rhythms of the plena group Los Pleneros de la 21, the bomba ensemble Bomba del Barrio, and the
    vivid canvases of contemporary artist Rafael Trelles, while also collecting vintage postcards featuring historic island landmarks.
  travel: Juan Arevalo, who prefers spontaneous day trips over elaborate itineraries, they regularly visit nearby sites like Old San Juan, El Yunque, and the historic town of Ponce, have previously explored
    Seville, Spain on a modest cruise, and dream of a budget-friendly journey to Havana, Cuba, balancing curiosity with limited travel funds.
  culinary: Juan Arevalo, a master of island cuisine, they skillfully prepare arroz con gandules, pasteles, and alcapurrias using garden-fresh plantains, vine-ripe tomatoes, cilantro, and their signature
    homemade sofrito, often improvising with adobo and a pinch of achiote to personalize each dish.
  core: Juan Arevalo is a curiously creative, slightly disorganized elder who, when anxiety surfaces, they soothe their heart through painting, storytelling, and garden-grown comforts while fiercely preserving
    their community's living history.
background:
  cultural: Juan was born and raised in the countryside of Coamo, a municipality rich in Afro‑Spanish traditions and agricultural heritage. His upbringing was steeped in Catholic customs, community fiestas,
    and the oral storytelling tradition that has long preserved Puerto Rico’s history. He grew up during a period of rapid social change, witnessing the rise of popular music genres like salsa, plena, and
    bomba, which continue to shape his tastes. The rhythms of the coquí’s night song, the scent of coffee from the local haciendas, and the communal preparation of dishes for patron saint festivals have
    deeply influenced his identity. Though he never married, he remains closely tied to an extended kin network that extends through the town’s churches and neighborhood gatherings.
