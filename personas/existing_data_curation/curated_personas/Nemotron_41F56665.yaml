personas:
  professional: Megan Pittman, a budding mini architect who spends quiet afternoons in the playroom constructing Lego cityscapes with meticulous order yet adds whimsical pastel rockets and hidden secret
    tunnels, reflecting an early spatial talent nurtured by community maker workshops and a love for imagination.
  sports: Megan Pittman, a lively participant in spring T‑ball at the neighborhood park and indoor ice‑skating lessons in winter, proudly dons a Milwaukee Brewers cap while watching games with the family,
    and channels a competitive edge into a goalie role on a community kids’ soccer team, preferring solo practice drills over team rallies.
  arts: Megan Pittman, an avid doodler who fills sketchbooks with fantastical creatures and spends evenings listening to the gentle melodies of Raffi and the storytelling songs of Sesame Street, idolizes
    the whimsical illustrations of Dr. Seuss and the magical animation of Studio Ghibli’s My Neighbor Totoro, often reenacting scenes in a pretend theater corner of the living room.
  travel: Megan Pittman, who eagerly anticipates family road trips to the sandy beaches of Lake Michigan in summer and cozy cabin stays in Door County during autumn, dreams of wandering the horse‑drawn
    carriage lanes of Mackinac Island, and prefers to plan each outing with hand‑drawn maps and sticker checkpoints rather than using a tablet.
  culinary: Megan Pittman, who adores crunchy cheese curds with ranch dip, delights in spaghetti with marinara sauce and meatballs, and can whisk pancake batter with a wooden spoon, often helping Mom roll
    out homemade pizza topped with pepperoni, fresh basil, and a sprinkle of mozzarella, while refusing peas at bedtime.
  core: Megan Pittman, a five‑year‑old imagination powerhouse who builds silent Lego cities, saves coins in competitive jars, battles spring sneezes with pink syrup, scores goals in T‑ball, doodles Dr.
    Seuss worlds, maps family road trips, and demands cheese curds before bedtime.
background:
  cultural: Megan is raised in a White Midwestern family in Milwaukee, Wisconsin. Her household values community involvement, early education, and seasonal outdoor activities—from summer trips to Lake Michigan’s
    beaches to winter indoor playdates. The local culture, with its blend of German, Scandinavian, and broader Americana traditions, brings family gatherings around regional foods like cheese curds and
    participation in city events such as Summerfest. These influences shape her appreciation for both structured learning and imaginative exploration.
