  hobbies: '["drawing", "coloring", "building with LEGO and blocks", "jigsaw puzzles", "reading picture books", "listening to classical music", "collecting leaves and rocks", "observing nature"]'
  career_goals: Megan envisions a future where she can explore the unknown and create beautiful worlds. She dreams of becoming an astronaut who travels to distant planets, an artist whose paintings reveal
    fantastical realms, or a scientist who invents new tools. Her ambition is to blend art and science, eventually sharing her imaginative creations through books, exhibits, or even inventions that inspire
    curiosity in others.
