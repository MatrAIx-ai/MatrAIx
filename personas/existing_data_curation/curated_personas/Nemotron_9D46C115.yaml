  career_goals: Dang aims to complete his associate degree in Business Administration through online coursework, turning his unfinished college education into a formal credential. He envisions launching
    a modest catering venture that offers Vietnamese‑Philippine fusion dishes, leveraging his culinary passion and cultural heritage. Additionally, he aspires to become a regular mentor at the local Vietnamese
    community center, teaching DIY home‑repair workshops and sharing his practical knowledge with younger residents. Maintaining his health and active lifestyle remains a priority, so he plans to integrate
    regular fitness routines and mindfulness practices to better manage stress and worry.
