personas:
  professional: Herminia Ortez, a 30‑year‑old operations research analyst, crafts large‑scale optimization models for sustainable logistics using linear and mixed‑integer programming, Python and Tableau,
    while blending her curious, artistic mindset with a relaxed, flexible work style that favors intuitive visual storytelling over rigid project plans.
  sports: Herminia Ortez, a 30‑year‑old outdoor enthusiast, joins the Los Angeles Striders running club for weekend trail runs in the Santa Monica foothills, roots for the LA Dodgers in baseball season
    and the LA Lakers in winter, and follows the LA Galaxy soccer team, preferring spontaneous yoga sessions over regimented training schedules.
  arts: Herminia Ortez immerses in Los Angeles’s vibrant art scene by touring street‑art murals by Shepard Fairey and Banksy, curating indie gallery visits featuring works by contemporary Mexican‑inspired
    artists like Carlos Amorales, attending live jazz sets of Kamasi Washington and Esperanza Spalding, and participating in community Día de los Muertos celebrations that blend visual storytelling with
    cultural ritual.
  travel: Herminia Ortez prefers loosely planned weekend escapes, having already trekked the red rocks of Joshua Tree, explored the Dia de los Muertos altars of Mexico City, and marveled at the Northern
    Lights in Reykjavik, while dreaming of a multi‑day hike through Patagonia’s Torres del Paine, all balanced against a demanding analytics career that leaves only limited vacation days.
  culinary: Herminia Ortez, an avid home cook, experiments with Mexican‑fusion cuisine by perfecting tacos al pastor with caramelized pineapple, crafting smoky mole with ancho and pasilla chilies, and plating
    chilaquiles topped with queso fresco and avocado, while also seeking out street‑food tacos in L.A.’s Eastside and curating weekly dinner parties that showcase their intermediate-level sauté and grill
    skills.
  core: Herminia Ortez navigates life with a curious, artistic brain that blends rigorous data models and spontaneous street‑photography, embraces flexibility over strict schedules, and occasionally forgets
    appointments while staying remarkably calm and resilient.
background:
  cultural: Herminia grew up in a Mexican‑American household in East LA, speaking Spanish at home and English at school, which gave her a bicultural perspective that informs both her personal and professional
    life. Family gatherings revolve around traditional dishes like tamales and pozole, and she actively participates in cultural festivities such as Día de los Muertos, where she helps design altars that
    blend contemporary art motifs with ancestral symbolism. Her heritage fuels a deep respect for community solidarity and resilience, values she brings to collaborative projects and mentorship. She also
    draws artistic inspiration from Mexican muralists like Diego Rivera and Frida Kahlo, integrating that visual sensibility into her data storytelling and design thinking approach.
attributes:
  skills: '[''Linear programming'', ''Mixed-integer programming'', ''Stochastic simulation'', ''Supply chain optimization'', ''Data analysis (Python, R)'', ''SQL'', ''MATLAB'', ''Predictive analytics'',
    ''Data visualization (Tableau, PowerBI)'', ''Design thinking'', ''Creative problem solving'', ''Project coordination'', ''Stakeholder communication'', ''Bilingual (English/Spanish)'']'
  hobbies: '[''Visiting art museums and galleries'', ''Street photography'', ''Mural painting'', ''Cooking Mexican-fusion meals'', ''Hiking in the Santa Monica Mountains'', ''Yoga and meditation'', ''Reading
    speculative fiction'', ''Attending live music performances'', ''Participating in improv comedy workshops'', ''Solving escape rooms and logic puzzles'', ''Celebrating Día de los Muertos community events'']'
  career_goals: Herminia aims to become a senior leader in operations research, steering data‑driven strategy for sustainable logistics and circular‑economy initiatives. In the next five years she plans
    to earn a master's in analytics or an MBA to broaden her strategic perspective, publish research on green supply‑chain optimization, and secure a role as a director of analytics where she can mentor
    emerging talent, especially women and Latinx professionals. She also envisions launching a boutique consultancy that fuses rigorous quantitative methods with artistic data storytelling to help non‑profits
    and social enterprises maximize impact. Speaking at industry conferences, contributing to open‑source optimization libraries, and fostering a collaborative, inclusive research culture are long‑term
    ambitions.
