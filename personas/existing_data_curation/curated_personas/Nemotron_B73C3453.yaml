  career_goals: Although currently not employed, Frank aims to apply his expertise in volunteer and mentorship roles within his community. He aspires to lead local STEM education initiatives, serve on nonprofit
    boards, and provide pro bono consulting for small businesses seeking operational improvements. He also hopes to mentor younger professionals, develop a community workshop series on data-driven problem
    solving, and eventually transition into a part‑time teaching position at a community college. Ultimately, Frank seeks to combine his love for structured problem‑solving with his sociable nature to make
    a tangible impact on his neighborhood.
