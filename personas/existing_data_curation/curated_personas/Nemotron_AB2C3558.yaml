personas:
  professional: Robert Sookhai is a self‑taught teen tech enthusiast who merges his knack for assembling custom PCs with hands‑on automotive repair, leveraging his strategic gaming mindset to run a budding
    freelance service while preparing for an ASE apprenticeship and CompTIA A+ certification.
  sports: Robert Sookhai hits the local park for pick‑up basketball with the St. Louis Youth League, frequents the Tower Grove Skatepark as a member of the Skate St. Louis Club, and balances these sessions
    with quick HIIT workouts, all while cheering for the St. Louis Cardinals and St. Louis Blues and applying his competitive edge to both real‑world sports and esports tournaments.
  arts: Robert Sookhai curates an eclectic playlist featuring Daft Punk, Hans Zimmer soundtracks, and the synthwave vibes of Carpenter Palmer while devouring sci‑fi novels like Neal Stephenson’s 'Snow Crash'
    and attending the annual St. Louis Art Fair to draw inspiration for his custom PC case mods.
  travel: Robert Sookhai dreams of a tech‑centric road trip to Detroit’s automotive museums and a future solo trek to the Silicon Valley Tech Museum of Innovation, but for now he maximizes his modest travel
    budget by weekend visits to Chicago for esports conventions and occasional family camping trips at the Ozark National Forest.
  culinary: Robert Sookhai favors high‑protein comfort foods such as pepperoni pizza, chicken teriyaki bowls, and homemade ramen, often cooking spaghetti carbonara while his gaming rig heats up, and he’s
    notorious for snacking on energy drinks and forgetting to refrigerate leftovers.
  core: Robert Sookhai is a fiercely competitive, methodical teen who fuses tech tinkering with automotive know‑how, channels his calm resilience into disciplined project work, yet occasionally slips into
    late‑night gaming marathons and snack‑filled coding sprints.
background:
  cultural: Robert was raised in the city of St. Louis, Missouri, within a predominantly white, working‑class neighborhood on the north side. The Midwestern ethos of self‑reliance, hard work, and community
    involvement shaped his outlook. He grew up attending local schools, participating in youth clubs, and enjoying regional traditions such as Missouri‑style barbecue, Cardinals baseball games, and city
    festivals. Exposure to the city’s diverse cultural tapestry and socioeconomic challenges fostered his pragmatic mindset, competitive spirit, and calm resilience. While he values independence, he also
    respects the strong neighborhood ties and the practical, down‑to‑earth attitudes common among his peers and family.
attributes:
  skills: '["Computer hardware assembly & troubleshooting", "Basic Python scripting", "JavaScript basics", "Automotive maintenance & minor engine repair", "Woodworking & DIY construction", "Strategic gaming
    analysis", "Analytical problem‑solving", "Project planning & organization"]'
  hobbies: '["Custom PC building and upgrading", "Automotive tinkering and engine repair", "Woodworking projects", "Real‑time strategy video gaming (e.g., StarCraft, Age of Empires)", "First‑person shooter
    gaming (e.g., Valorant, Call of Duty)", "Chess and Sudoku puzzles", "Tech podcasts and science‑fiction reading", "Basketball and skateboarding with friends"]'
  career_goals: He aspires to earn his GED within the next year and pursue a certified apprenticeship as an automotive technician, while simultaneously launching a freelance tech‑services venture that offers
    custom PC builds and repairs for local gamers and small businesses. Driven by competition and a desire for independence, he plans to obtain industry certifications (such as ASE for automotive and CompTIA
    A+ for IT), ultimately establishing his own workshop where he can merge his mechanical and tech expertise, generate a sustainable income, and position himself as a leading service provider in the St. Louis
    community.
