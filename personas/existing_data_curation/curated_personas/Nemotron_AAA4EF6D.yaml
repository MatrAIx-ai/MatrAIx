personas:
  professional: Janet Fallin is a construction laborer transitioning toward a foreman role, leveraging OSHA certification, blueprint‑reading expertise, and a flair for artistic design to streamline site
    operations and champion sustainable building practices, while they methodically document progress with sketch notes that impress foremen.
  sports: Janet Fallin hikes the Sonoran Desert most weekends, participates in the Phoenix Trails Club for trail runs, keeps an eye on the Phoenix Suns and Arizona Cardinals, and they supplement their cardio
    with occasional pick‑up basketball games at a local community center.
  arts: Janet Fallin immerses themselves in urban mural photography, frequenting works by Shepard Fairey and Banksy, attends monthly gallery openings featuring contemporary artists such as Jenny Saville,
    and they channel their sketching abilities into visual concepts for sustainable home designs.
  travel: Janet Fallin prefers meticulously planned weekend getaways to desert destinations like Sedona and Monument Valley, dreams of exploring Kyoto’s historic streets and Oaxaca’s adobe architecture,
    and they travel on a modest budget, often using reward points and staying in boutique eco‑lodges.
  culinary: Janet Fallin enjoys cooking Southwest‑inspired dishes like cactus‑topped tacos and grilled elote, favors fresh avocados, cilantro, and pomegranate seeds, and they have an above‑average kitchen
    skill set, experimenting with smoky flavors while occasionally treating themselves to takeout at local art‑themed cafés.
  core: Janet Fallin blends a pragmatic construction mindset with a quiet passion for art, balancing methodical site management with late‑night mural photography, yet they can be overly skeptical of collaborators
    and hoard sand from every hike as a quirky reminder of desert explorations.
background:
  cultural: Janet grew up in suburban Phoenix, absorbing the Southwest’s blend of rugged desert landscapes and a rapidly expanding urban environment. Her cultural identity is rooted in a middle‑class, white
    American upbringing, shaped by the regional work ethic common among construction crews and the diverse, multicultural fabric of Maricopa County. Exposure to Mexican‑American cuisine, local festivals,
    and the vibrant street‑art scene has broadened her appreciation for the area’s cultural mosaic, while her personal values emphasize independence, reliability, and a pragmatic approach to life.
attributes:
  skills: '[''Concrete mixing and pouring'', ''Basic carpentry'', ''Heavy equipment operation (floor jacks, compactors)'', ''Blueprint reading'', ''Inventory management'', ''Task scheduling and documentation'',
    ''OSHA 10‑hour safety certification'', ''Forklift operation license'', ''First‑aid certification'', ''Basic sketching and visual communication'']'
  hobbies: '[''Desert hiking'', ''Sketching and drawing'', ''Photography of urban murals'', ''Visiting art galleries and street‑art tours'', ''Reading architecture and sustainable design books'', ''DIY
    home‑improvement projects'', ''Strategy‑building video games'', ''Monthly creative nonfiction book club'']'
  career_goals: Janet aims to advance to a foreman role within the next three years by completing an associate’s degree in Construction Management at a local community college and obtaining a lead‑carpenter
    apprenticeship. She is driven to become a certified construction manager and eventually launch her own small general‑contracting firm focused on sustainable residential projects that blend functional
    construction with artistic design elements. Long‑term, she also hopes to become an OSHA trainer to champion safety culture on job sites.
