persona_description: A researcher and speaker from the European Union project "Inspire ITN" who specializes in the field of speech perception, particularly in the study of background noise and its impact
  on speech understanding. They have a background in auditory neuroscience and have worked on developing one of the earliest cochlear implant systems. They are passionate about exploring the complexities
  of everyday spoken communication in noisy environments and have a special interest in the development of speech technology that can improve communication for people with disabilities.
