personas:
  professional: Roy Dattolo, a 44‑year‑old full‑stack web developer and cloud architect who leverages modern JavaScript, Python, and UI/UX aesthetics to translate market needs into immersive digital products,
    enjoys guiding interdisciplinary teams despite a relaxed, sometimes chaotic schedule, and aims to become a senior architect or VP of Engineering while launching a side venture that delivers custom software
    for artists.
  sports: Roy Dattolo spends weekends paddling a kayak on Lake St. Clair, hiking local state parks, cheering the Detroit Pistons and Detroit Red Wings, participates in a community kayak club, and occasionally
    joins midsummer pick‑up softball games for a brief screen‑free break.
  arts: Roy Dattolo creates generative visual installations using Processing, composes ambient electronic tracks in Ableton Live inspired by Aphex Twin and Brian Eno, photographs Michigan’s shoreline with
    a vintage Leica, engages in tabletop RPG sessions with friends, and regularly visits contemporary galleries featuring artists like Refik Anadol.
  travel: Roy Dattolo favors spontaneous weekend trips to Mackinac Island and Toronto’s Distillery District, dreams of a tech‑art immersion in Berlin’s Kreuzberg and a synth‑shopping pilgrimage to Kyoto,
    and balances these adventures with a modest budget aligned with his freelance side‑venture plans.
  culinary: Roy Dattolo enjoys cooking salmon with a honey‑saffron glaze, roasting sunchokes into a caramelized vegetable medley, sipping single‑origin pour‑over coffee while coding, and indulging in food‑truck
    tacos during hackathons, though they frequently skip breakfast as they dive into late‑night creative sessions.
  core: Roy Dattolo is a 44‑year‑old maker‑artist who fuses code, music, and visual art into experimental projects, leads tech teams with creative flair, navigates finances with occasional splurges, and
    balances restless curiosity with a laid‑back, slightly chaotic lifestyle.
background:
  cultural: Roy is a second‑generation Italian‑American raised in the Detroit metropolitan area. His family maintains traditional Italian customs such as Sunday pasta meals, holiday feasts, and a close‑knit
    community rooted in Catholic values, while also embracing the pragmatic, modest, and collaborative spirit of the Midwest. This blend of heritage and regional culture fuels his appreciation for both
    craftsmanship and creative expression, shaping his outlook on work, family, and leisure.
