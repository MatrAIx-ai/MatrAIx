  career_goals: Roy aims to step into a technical leadership role where he can guide interdisciplinary teams to create products that fuse technology with artistic experience, such as immersive digital installations
    or AI‑enhanced creative tools. Within five years, he envisions becoming a senior architect or VP of Engineering at an innovative firm while laying the foundation for a side venture that delivers custom
    software solutions for artists and cultural organizations. He also plans to deepen his expertise in machine‑learning‑driven design, earn cloud‑architecture certifications, and mentor emerging developers.
