personas:
  professional: Thomas Skinner, a seasoned retail veteran with three decades of cash‑handling and POS expertise, leverages his methodical organization, talkative charisma, and assertive conflict‑resolution
    skills to train new cashiers, streamline inventory tracking, and spearhead community‑centered store initiatives, all while pursuing a retail management certification to transition into a supervisory
    role.
  sports: Thomas Skinner, a devoted Cleveland Browns fan who never misses a Sunday game, also follows the Cleveland Guardians during baseball season, participates in a weekly walking group at Maple Heights
    Senior Fitness Club, and tends his garden as a low‑impact workout, balancing his love for team spirit with modest personal fitness.
  arts: Thomas Skinner, a board member of the community theater, immerses himself in classic rock icons such as The Rolling Stones and Bruce Springsteen, practices Japanese calligraphy at his kitchen table,
    and frequents local productions that showcase regional actors, allowing the arts to enrich his evenings and community events.
  travel: Thomas Skinner, who favors well‑planned road trips across the Midwest, has visited Kyoto to deepen his appreciation of Japanese festivals, dreams of strolling through the historic streets of Kyoto’s
    Gion district, and often retreats to nearby Niagara Falls and Mackinac Island for weekend getaways, balancing adventure with his modest retirement budget.
  culinary: Thomas Skinner, an avid home gardener, delights in cooking vegetable stir‑fry with fresh basil, soy sauce, and ginger, savors sushi rolls like salmon nigiri and California rolls at his favorite
    Cleveland spot, and occasionally whips up classic chicken pot pie, demonstrating his moderate cooking skill and love for both Japanese and comfort cuisine.
  core: Thomas Skinner blends Midwestern reliability with a curiosity for Japanese traditions, tackling every social invitation with talkative enthusiasm, yet often juggling too many commitments while meticulously
    planning his garden rows and Browns game watch parties.
background:
  cultural: Thomas grew up in Maple Heights, a blue‑collar suburb of Cleveland, immersed in Midwestern working‑class values that emphasize hard work, modesty, and community participation. His family has
    deep roots in the area and maintains ties to the local Catholic parish. Exposure to the city’s diverse immigrant neighborhoods sparked his interest in other cultures, and a high‑school friendship with
    a Japanese exchange student inspired his parents to give him the middle name 'Kenji.' This early fascination led him to study basic Japanese language and appreciate traditions such as calligraphy and
    seasonal festivals. His cultural identity blends a strong sense of American Midwestern community with an enduring curiosity and respect for Japanese cultural practices.
attributes:
  skills: '["Cash handling", "Point-of-sale systems operation (NCR, Square)", "Customer service and conflict resolution", "Inventory management", "Scheduling and shift coordination", "Data entry and Microsoft
