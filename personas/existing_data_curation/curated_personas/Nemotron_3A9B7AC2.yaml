  hobbies: '[''Building LEGO sets'', ''Playing Minecraft'', ''Soccer'', ''Taekwondo classes'', ''Piano lessons'', ''Reading graphic novels'', ''Drawing manga'', ''Collecting Pokémon cards'', ''Cooking simple
