personas:
  professional: Hung Chinquee is a budding builder who channels a love for LEGO and Minecraft into systematic design experiments, applying the disciplined routines from Taekwondo and the teamwork of soccer
    to develop practical, step‑by‑step problem‑solving skills.
  sports: Hung Chinquee plays forward for the local Under‑10 soccer club, cheers for the USA Men's National Soccer Team during World Cup matches, and attends Taekwondo classes twice a week at the community
    center, where they practice the 2‑gong form and follow the disciplined training routine of the martial art.
  arts: Hung Chinquee sketches original manga heroes inspired by Akira Toriyama, flips through My Hero Academia graphic novels, dabbles on the piano with simple Mozart preludes and Imagine Dragons songs,
    and collects limited‑edition Pokémon cards like Charizard as miniature works of art.
  travel: Hung Chinquee has explored the local science museum, spent a family weekend at Disneyland, toured the Great Wall on a school trip, and dreams of visiting Tokyo’s Pokémon Center and the LEGO House
    in Billund, combining curiosity with a love for structured itineraries.
  culinary: Hung Chinquee helps prepare egg fried rice and pork dumplings, proudly claims mastery over whisking eggs for an omelet, loves crunchy spring rolls with dipping sauce, and savors the sweet and
    tangy flavor of mango sticky rice as a favorite dessert.
  core: Hung Chinquee balances a meticulous love for building blocks with a sneaky habit of hiding extra LEGO pieces under the couch to keep their collection safe, all while juggling school, soccer, and
    a burgeoning manga dream.
background:
  cultural: Hung Li comes from an East Asian (Chinese) family that immigrated to the United States. At home, his parents speak Mandarin and uphold traditional values such as respect for elders, a strong
    emphasis on education, modesty, and family cohesion. The household celebrates Lunar New Year with dumplings, red envelopes, and visits to grandparents, and they attend a local Sunday Chinese school
    to maintain language skills. Living in Lexington, Kentucky, the family participates in community events, including the annual Lexington Asian Festival, where they share cultural performances and food.
    Hung Li navigates a multicultural environment, interacting with peers from diverse backgrounds while preserving his heritage, making him bilingual and comfortable blending Chinese customs with American
    life.
