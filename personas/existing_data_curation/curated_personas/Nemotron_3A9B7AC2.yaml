  career_goals: Hung Li dreams of becoming an engineer—specifically a civil or mechanical engineer—so he can design safe, fun playgrounds and community spaces where families gather. He is drawn to the practicality
    of solving real‑world problems with clear steps. He also finds block‑based coding exciting and hopes to create educational games that teach math while weaving in stories from his cultural background.
    He wants to honor his family's values of hard work and service by giving back to the Lexington community, perhaps by volunteering in school STEM clubs. Long‑term, he hopes to travel to visit relatives
    in China, blending his heritage with his future career.
