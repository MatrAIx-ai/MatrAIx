  career_goals: Although retired from formal employment, May Jean aims to deepen her expertise in contemporary art by enrolling in online art‑history courses and attending regional museum exhibitions. She
    aspires to volunteer as an art‑program coordinator at the Archbald community center, curating small showcases of local artists and leading occasional discussion circles on art theory. She also hopes
    to compile her life reflections and observations into a memoir that interweaves personal anecdotes with insights on the cultural shifts of her hometown. Another ambition is to document the disappearing
    coal‑region heritage through a series of photographs and short essays, eventually contributing the collection to the local historical society.
