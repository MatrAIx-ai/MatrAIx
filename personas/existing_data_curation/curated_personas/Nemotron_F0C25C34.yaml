personas:
  professional: Maria Diaz, a veteran electrician with over three decades of residential and small‑commercial experience, merges a code‑driven, safety‑first mindset with a restless curiosity for smart‑home
    technology, translating complex wiring schematics into plain‑language guidance while they calmly handle emergencies and mentor apprentices.
  sports: Maria Diaz stays active by joining a local pickleball league at the senior center, cheering for the Bell County Wildcats baseball team, and spending tranquil mornings fishing on Lake Bell, while
    they also tend to their garden daily as a low‑impact workout.
  arts: Maria Diaz expresses creativity through vibrant folkloric dance performances with their church group, enjoys listening to classic folk and rock artists such as Bob Dylan and Nina Simone, and attends
    regional theater productions starring actors like Michael Shannon, finding inspiration in the rhythmic drumbeats and colorful costumes that fuel both their hobby and professional problem‑solving, and
    they often discuss the shows with friends over coffee.
  travel: Maria Diaz favors spontaneous weekend getaways that blend nature and culture, such as a road trip to the historic town of Fredericksburg for its antique markets, a hike in the Hill Country state
    park, and a fishing excursion to the tranquil Lake Bell, often booking affordable cabins at the last minute while they keep an eye on a modest travel budget.
  culinary: Maria Diaz delights in preparing family‑run recipes that feature hand‑made corn masa dough filled with seasoned pork, spiced with chilies, cumin, and fresh cilantro, accompanied by a bright
    salsa of tomatoes, onions, and lime, and they often experiment with new spice blends while occasionally splurging on high‑quality cast‑iron cookware for their weekend feasts.
  core: Maria Diaz blends decades of electrical mastery with a curious, community‑driven spirit, juggling spontaneous DIY smart‑home projects, lively folkloric dance, competitive trivia, and occasional
    disorganization, all while they stay calm under pressure and cherish flexible, hands‑on learning.
background:
  cultural: Maria was born to Mexican immigrant parents and grew up in a bilingual household that celebrated both Mexican traditions—such as Día de los Muertos, Cinco de Mayo, and family-centric Catholic
    holidays—and the rural Texan lifestyle of Bell County. She preserves her heritage through food, music, and dance while also embracing the strong sense of community and self‑reliance that characterizes
    small‑town Texas. Her cultural identity informs her work ethic, her emphasis on family loyalty, and her commitment to giving back through local church activities and community service.
attributes:
  skills: '[''Residential wiring'', ''Commercial wiring'', ''Electrical code compliance (NEC)'', ''Troubleshooting and diagnostics'', ''Solar PV installation'', ''Smart home system integration'', ''Blueprint
    and schematic interpretation'', ''Safety inspections and risk assessments'', ''Mentoring apprentices'', ''Customer communication and conflict resolution'']'
  hobbies: '[''Folklórico dancing'', ''Mexican cooking'', ''Community trivia nights'', ''Volunteer electrical safety workshops'', ''DIY home‑automation projects'', ''Gardening'', ''Fishing with friends'',
    ''Chess and sudoku'']'
  career_goals: Maria aims to obtain her Master Electrician license within the next two years, launch her own contracting business focused on energy‑efficiency retrofits and renewable‑energy projects, and
    become a certified trainer at the local community college where she can share her practical knowledge with younger workers. She also hopes to expand her service offerings to include comprehensive home‑automation
    solutions for her growing client base in Bell County.
