persona_description: A professional environmental scientist with expertise in water quality monitoring, specifically focusing on the assessment and management of impaired waterbodies. They have experience
  conducting field seasons of water quality sampling, water quality assessments, and stormwater assessments, and are well-versed in the EPA's Total Maximum Daily Load water quality plan for Lake Lucille.
  They are currently working with the community, the City of Wasilla, and state DOT on Lake Lucille to achieve long-term water quality improvements. Their expertise in water quality monitoring and their
  ability to work collaboratively with various stakeholders make them a valuable asset in the management and protection of water resources.
