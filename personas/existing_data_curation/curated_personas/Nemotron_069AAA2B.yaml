  hobbies: '[''Sketching and drawing'', ''Photography (candid portraiture)'', ''Visiting art galleries and museums'', ''Reading speculative fiction and poetry'', ''Listening to experimental jazz and lo‑fi
    beats'', ''Playing strategy video games'', ''Journaling and creative writing'', ''Mindfulness meditation'', ''Attending local Black cultural events'', ''Volunteering at community art workshops'']'
  career_goals: Briana aims to turn her artistic talents into a sustainable career, pursuing a freelance visual‑artist path while completing a bachelor's degree in graphic design or visual communication.
    She hopes to specialize in UI/UX design for socially‑focused tech startups, allowing her to blend creativity with problem‑solving. Long‑term, she envisions launching an online platform that showcases
    emerging Black artists and curates virtual exhibitions, giving her community greater visibility. She also wants to secure a stable income that reduces financial stress and provides the flexibility to
    maintain her personal well‑being.
