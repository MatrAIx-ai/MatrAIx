personas:
  professional: Leslie Monteiro, a four‑year‑old mini‑organizer who runs the family’s block‑sorting game, insists on a daily routine for building towers, shows practical problem‑solving and a competitive
    streak when racing to finish puzzles, and balances organization with the occasional spontaneous rearrangement of their toy shelves.
  sports: Leslie Monteiro enjoys playing T‑ball at the neighborhood kids’ league, dances to the Detroit Lions’ fight song on game day, proudly wears a Detroit Tigers cap while practicing soccer drills with
    the Little Caesars Jr. Club, and balances a love of competition with a routine of weekly gymnastics class.
  arts: Leslie Monteiro delights in drawing bright Crayola pictures of mermaids and Mickey Mouse, sings along to Disney soundtracks and the lullabies their grandmother hums in Portuguese, and watches Sesame
    Street episodes featuring the beloved Mr. Rogers, which fuels their creative bursts during free play.
  travel: Leslie Monteiro’s travel scrapbook lists weekend trips to Grandma’s farm in Ohio, a magical visit to Walt Disney World in Florida, and a wish to see the towering sand dunes at Sleeping Bear Dunes,
    favoring short, familiar trips that fit neatly into their predictable routine.
  culinary: Leslie Monteiro loves macaroni and cheese topped with a sprinkle of cheddar, devours chicken nuggets with ketchup, eagerly helps spread butter on toast, and proudly claims the occasional pastéis
    de nata from Mom’s Sunday treat as their favorite sweet, showing a practical palate that prefers simple, familiar flavors.
  core: Leslie Monteiro is a routine‑loving four‑year‑old who mixes a competitive spirit with a practical love of block building, a picky yet earnest eater, and a habit of hoarding glitter stickers for
    future projects that never quite get finished.
background:
  cultural: Leslie comes from a white, Portuguese‑American family living in Madison Heights, Michigan. Her parents blend Midwestern American customs—celebrating Thanksgiving, Christmas, and the Fourth of
    July—with occasional Portuguese traditions such as serving pastéis de nata and saying a few Portuguese words at home. The family attends a nearby Catholic church, where Leslie participates in children’s
    liturgies. The suburban Midwest environment emphasizes community, school involvement, and practical values, all of which shape her everyday routine and social experiences.
attributes:
  skills: '[''Counting to ten'', ''Identifying colors and shapes'', ''Recognizing letters A‑F'', ''Drawing basic figures'', ''Using safety scissors'', ''Building block towers'', ''Basic self‑dressing'',
