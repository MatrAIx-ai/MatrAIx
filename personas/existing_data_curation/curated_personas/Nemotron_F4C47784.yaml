  hobbies: '[''Playing with dolls'', ''Dressing dolls'', ''Building block towers'', ''Coloring and drawing'', ''Storytime at the library'', ''Nature walks and leaf collection'', ''Simple board games (Candy
    Land)'', ''Puzzle solving'', ''Baking cookies with parents'']'
  career_goals: Even at four, Leslie enjoys dreaming about the future. She often says she wants to become a teacher so she can help younger children learn, reflecting her love for routine and organized
    activities. She also mentions being a veterinarian because she cares for her family’s pet rabbit, showing her competitive spirit in caring for animals. Occasionally she pretends to be a chef, helping
    her mother in the kitchen and insisting on arranging ingredients neatly. These ambitions are guided by her practical outlook and desire to make a clear, helpful contribution to others.
