  hobbies: '[''Hiking (Appalachian Trail)'', ''Cycling (Sussex County bike club)'', ''Community theater acting & set design'', ''Landscape and street photography'', ''Recreational basketball league'', ''Trivia
    nights'', ''Yoga and meditation'', ''Home brewing craft beer'', ''Woodworking'', ''Attending art galleries and local exhibitions'']'
  career_goals: Daniel aspires to advance from his current inspector role to a senior quality management position within the next five years, seeking Six Sigma Black Belt certification and leading company‑wide
    continuous‑improvement projects. He aims to become a subject‑matter expert in data‑driven quality analytics, mentoring teams while championing innovative, environmentally friendly process designs that
    merge his technical expertise with his appreciation for art and design. Ultimately, he envisions either heading a multi‑site quality department or launching his own consulting firm that helps manufacturers
    implement lean and sustainable practices, all while maintaining a balanced lifestyle that mitigates his stress sensitivity.
