personas:
  professional: Jacquelyn Smith, a seasoned mental‑health and substance‑use social worker with a strong STEM foundation, blends evidence‑based therapies such as CBT and DBT with expressive‑arts techniques—including
    abstract painting, jazz‑infused piano improvisation, and community drama—to design outcome‑driven programs, supervise interns, secure grants, and advocate for health‑equity policies across DeKalb County.
  sports: Jacquelyn Smith enjoys weekend hikes in the North Georgia mountains, supports the Atlanta Falcons and Atlanta United FC, holds a membership with the local Atlanta Trail Club, and participates
    in a monthly beginner’s tennis league at a community recreation center.
  arts: Jacquelyn Smith immerses themselves in creative expression, painting abstract canvases inspired by Mark Rothko, playing piano improvisations that weave Miles Davis’s modal jazz with Bach’s motifs,
    attending community theater productions of August Wilson plays, and joining drumming circles that honor cultural rhythms.
  travel: Jacquelyn Smith prefers purpose‑driven trips that blend cultural immersion and relaxation, having explored Savannah’s historic squares, New Orleans’ music scene, the gardens of Kyoto, and planning
    a future pilgrimage to the blues‑rich Delta region of Mississippi when grant deadlines ease.
  culinary: Jacquelyn Smith delights in cooking healthy twists on soul‑food classics, such as collard greens sautéed with garlic and quinoa, sweet‑potato pie layered with coconut milk, and black‑eyed peas
    seasoned with smoked paprika, showcasing a firm grasp of both tradition and nutrition.
  core: Jacquelyn Smith, a 54‑year‑old art‑driven social worker, turns stress into paint, worries about grant deadlines, and sometimes forgets to take their blood‑pressure medication.
background:
  cultural: Jacquelyn is an African‑American woman whose roots run deep in the historic Black communities of Atlanta. Raised in a church‑centered household, she was nurtured by a strong sense of collective
    responsibility, civil‑rights activism, and the rich musical legacy of the South. Her family’s oral histories preserve connections to West‑African traditions, reflected in her appreciation for drumming
    and storytelling. Growing up in DeKalb County, she witnessed both the challenges and triumphs of the Black diaspora, shaping her commitment to health equity and community empowerment. As a first‑generation
    graduate in a STEM field, she bridges scientific rigor with culturally responsive care, embodying the resilience and creativity characteristic of the vibrant Black cultural landscape of Atlanta.
attributes:
  skills: '["Clinical Assessment & Diagnosis", "Cognitive Behavioral Therapy (CBT)", "Dialectical Behavior Therapy (DBT)", "Motivational Interviewing", "Trauma‑Informed Care", "Group Facilitation", "Program
    Development & Evaluation", "Grant Writing and Fundraising", "Community Outreach & Coalition Building", "Advocacy for Mental Health Equity", "Expressive Arts Therapy Integration", "Telehealth Platform
    Management", "Data Analysis using R and SPSS"]'
  hobbies: '["Abstract Painting", "Piano (Jazz & Classical)", "Community Theater & Improv Workshops", "Reading Speculative Fiction by Black Authors", "Urban Gardening", "Yoga & Mindfulness Meditation",
    "Hiking in North Georgia", "Healthy Soul‑Food Cooking", "Volunteering at the Martin Luther King Jr. Center", "African Drumming Circles"]'
  career_goals: Jacquelyn aims to lead a county‑wide behavioral health initiative that integrates art‑based therapies for substance‑use recovery, particularly within underserved Black communities. She plans
    to pursue a Doctorate in Public Health focused on health disparities, enabling her to spearhead research on the efficacy of expressive‑arts interventions. Her ambition includes securing a senior director
    position in DeKalb County's Department of Behavioral Health, expanding peer‑support networks, publishing peer‑reviewed articles, and mentoring the next generation of Black mental‑health professionals.
    Additionally, she seeks to influence state policy to embed mental‑health services within primary care settings and to increase funding for culturally responsive treatment programs.
