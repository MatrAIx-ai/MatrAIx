persona_description: A historian who specializes in the study of the history of the Southern Appalachians, particularly focusing on the economic, social, and environmental aspects of the region during the
  19th and early 20th centuries. The historian is knowledgeable about the role of salt in the mountain economy, the development of the Kanawha Valley as a chemical producer during World War I, and the environmental
  impacts of the mining and chemical industries in the region. The historian is also interested in the history of health concerns and the management of safety, health, and environmental risks associated
  with the manufacture, storage, transportation, and disposal of chemicals.
