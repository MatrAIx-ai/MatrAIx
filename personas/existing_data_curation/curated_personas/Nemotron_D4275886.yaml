personas:
  professional: Brittany Proffer, a retired civil and environmental engineer, channels her meticulous planning skills and love for routine into leading a community garden project in Pinetop, where they
    apply GIS mapping and water‑resources expertise to design sustainable irrigation while mentoring high‑school STEM students.
  sports: Brittany Proffer enjoys seasonal hikes in the White Mountains and participates in the Pinetop Senior Walking Club, while regularly cheering for the Arizona Diamondbacks baseball team and the locally
    beloved Pinetop Wildcats high‑school basketball squad.
  arts: Brittany Proffer weaves narratives into hand‑stitched quilts while listening to folk singer Joan Baez and poet Maya Angelou, and they frequently attend community performances honoring Navajo and
    Hopi storytelling traditions.
  travel: Brittany Proffer favors low‑key road trips that blend cultural immersion with natural beauty, having explored the red rocks of Sedona, the historic pueblos of Santa Fe, the lush valleys of the
    Great Smoky Mountains, and planning a future pilgrimage to the cliff dwellings of Mesa Verde.
  culinary: Brittany Proffer delights in preparing roasted heirloom tomatoes with fresh basil, sage‑infused chicken stew, and prickly pear jam harvested from her own garden, showcasing competent cooking
    skills that occasionally veer toward over‑seasoning due to a penchant for bold flavors.
  core: Brittany Proffer blends a calm, routine‑driven mindset with a generous community spirit, forever balancing meticulous engineering precision with a love for hand‑stitched quilts and desert sunsets.
background:
  cultural: Brittany is a third‑generation white American who grew up in the Midwest before moving to Arizona for college. She embraces the values of small‑town life—self‑reliance, neighborly cooperation,
    and respect for the surrounding natural environment. Living in Pinetop, she has developed an appreciation for the region’s Native American heritage and often participates in local cultural events that
    honor Navajo and Hopi traditions, while maintaining her own family’s customs, such as celebrating traditional holidays, baking family recipes, and fostering a pragmatic, community‑oriented worldview.
