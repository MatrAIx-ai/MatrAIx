  hobbies: '[''Gardening'', ''Hiking'', ''Birdwatching'', ''Quilting'', ''Knitting'', ''Reading Historical Biographies'', ''Attending Community Potlucks'', ''Church Participation'', ''Volunteer Work at
    Local Library'', ''Native Plant Restoration'']'
  career_goals: Although retired, Brittany aims to stay intellectually active and give back to her community. She plans to mentor high‑school students in STEM subjects, serve on the board of the local historical
    society, and lead a community garden project that promotes sustainable, practical gardening practices. She also hopes to complete a personal memoir that chronicles her engineering career and life in
    the Arizona high country, and to acquire basic programming skills to support her volunteer initiatives.
