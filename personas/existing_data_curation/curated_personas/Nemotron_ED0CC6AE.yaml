personas:
  professional: Elizabeth Scott, a seasoned mental‑health counselor with a business graduate background, leverages meticulous documentation and structured program development, and they apply empathetic
    group facilitation to build community partnerships while balancing routine‑oriented planning with lively choir‑style collaboration.
  sports: Elizabeth Scott, an avid line‑dancer and dog‑walking enthusiast, follows the New Orleans Saints and LSU Tigers with seasonal fervor, participates in the Bayou Trail Hiking Club for weekly low‑impact
    cardio, and joins a community line‑dancing group at local festivals each spring, treating exercise as a social ritual that keeps them energized.
  arts: Elizabeth Scott channels their sociable nature into the church choir, revering the harmonies of the Mormon Tabernacle Choir and the soulful stylings of Aretha Franklin, while their weekly mystery
    book club dissects Agatha Christie’s classic twists and Gillian Flynn’s modern thrillers, allowing literature and music to anchor their sense of community and curiosity.
  travel: Elizabeth Scott prefers short, well‑planned weekend getaways to historic towns like St. Martinville, Natchitoches, and Natchez, where they schedule guided tours and line‑dance workshops, while
    dreaming of a leisurely autumn road‑trip through New England’s leaf‑laden villages, balancing their love of familiarity with occasional gentle adventure.
  culinary: Elizabeth Scott, an enthusiastic gardener and home‑cook, blends fresh garden tomatoes, sautéed okra, and smoked sausage into rich Cajun gumbo and Creole jambalaya for church potlucks, while
    mastering perfectly crisped cornbread, yet they sometimes order a shrimp étouffée delivery on a busy Saturday night when time runs short.
  core: Elizabeth Scott, a routine‑loving mental‑health counselor who swaps spreadsheets for spice rubs, finds balance in garden rows and choir harmonies, and can’t resist a good mystery plot, even if they
    occasionally forget to water their begonias.
background:
  cultural: Elizabeth is a white Southern woman who has lived most of her life in Lafayette, Louisiana. Her upbringing reflects the region’s Cajun influences—French language snippets at home, Catholic traditions,
    and a strong emphasis on hospitality and community togetherness. Family gatherings, church involvement, and participation in local festivals have shaped her values of practicality, harmony, and sustained
    relationships. While she embraces the cultural cuisine and music of the area, she also respects the broader Southern work ethic and the importance of maintaining stable, routine‑oriented lifestyles.
attributes:
  skills: '[''Individual counseling'', ''Group facilitation'', ''Crisis intervention'', ''Conflict mediation'', ''Program development'', ''Community outreach'', ''Financial literacy counseling'', ''Career
    coaching'', ''Case management'', ''Active listening'', ''Documentation and record-keeping'', ''Workshop design'']'
  hobbies: '[''Gardening'', ''Cajun cooking'', ''Reading mystery novels'', ''Church choir'', ''Line dancing'', ''Volunteering at food banks'', ''Walking in parks and bayous'', ''Attending local festivals'',
    ''Traveling with friends'', ''Knitting'']'
  career_goals: Elizabeth aims to expand mental‑health services for underserved populations in Lafayette Parish by launching a community‑based peer‑support program. She hopes to become director of a regional
    counseling center, where she can integrate evidence‑based practices with pragmatic business strategies. Mentoring emerging counselors, publishing a guide on mid‑life emotional well‑being, and establishing
    a series of workshops that blend financial and emotional wellness are also top priorities before she considers a phased retirement.
