personas:
  professional: Omar Rubiano is an aspiring comic‑book illustrator and junior animator who channels their boundless curiosity into sketching vibrant characters on tablet apps, often leaving sketches half‑finished
    due to a relaxed attitude toward deadlines, yet they dream of one day producing a full animated short that blends marine themes with local folklore.
  sports: Omar Rubiano plays forward for the League City Youth Soccer Club, idolizes the Houston Dynamo’s attacking flair, eagerly monitors the Clear Creek Knights’ high‑school football games on Friday
    nights, and they spend weekends practicing penalty kicks at the community park while occasionally watching NBA highlight reels.
  arts: Omar Rubiano immerses themselves in comic‑book creation, sketching dynamic, manga‑inspired heroes while grooving to Bad Bunny, Queen, and Nobuo Uematsu, drawing artistic inspiration from Jack Kirby’s
    bold panels and Hayao Miyazaki’s whimsical animation, and they proudly display their artwork at the League City community art fair.
  travel: Omar Rubiano enjoys weekend trips to Galveston’s sandy shores and the Armand Bayou Nature Center, cherishes family outings to coastal festivals celebrating Día de la Virgen, and they dream of
    someday snorkeling in the Florida Keys and wandering the historic streets of Cartagena, all while balancing school responsibilities and a modest travel budget.
  culinary: Omar Rubiano, an eager junior chef, helps stir aromatic gallo pinto made with black beans, rice, and fresh cilantro, flips crispy plantain fritters, assists in wrapping tamales with corn masa
    and seasoned pork, and they love tasting smoky Texas‑style brisket at neighborhood barbecues, all while still mastering the perfect seasoning balance.
  core: Omar Rubiano blends a curious fascination with marine life, comic art, and cultural celebrations into a vibrant worldview, yet they often leave school projects unfinished and misplace LEGO pieces
    due to a relaxed attitude toward planning.
background:
  cultural: Omar’s family traces its roots to Honduras, and Spanish is spoken at home alongside English. He participates in cultural celebrations such as Día de la Virgen and Honduran Independence Day,
    where his family enjoys foods like gallo pinto, pupusas (adapted from his extended family’s Central‑American ties), and plantain fritters. Storytelling and music from his heritage are woven into family
    gatherings, and he often hears folkloric songs and learns a few traditional dance steps. Living in League City, Texas, Omar blends his Honduran background with local Texan customs—he follows high‑school
    football season, enjoys Texas‑style barbecue at community events, and feels a strong connection to the Gulf Coast’s marine environment. This bicultural experience shapes his worldview, fostering curiosity
    about both his ancestral roots and his American surroundings.
