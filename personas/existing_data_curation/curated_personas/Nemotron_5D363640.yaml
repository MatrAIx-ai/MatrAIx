  career_goals: Omar hopes to turn his love of drawing and storytelling into a career as an animator or video‑game designer, where he can blend art with technology. He is also fascinated by the marine life
    of the Gulf Coast and occasionally imagines becoming a marine biologist to study fish and ecosystems. In the longer term, he wants to travel to Honduras to document family traditions through art and
    perhaps study graphic design in college. He values flexibility and wants a future that lets him continue learning new ideas and experimenting with creative projects.
