persona_description: A pediatric ophthalmologist who specializes in the assessment and treatment of myopia in children. She is interested in the relationship between intelligence and myopia and how it may
  be explained by increased reading among myopes. Her research interests include the development of new diagnostic tools for myopia, the impact of genetic factors on myopia, and the role of environmental
  factors in the development of myopia. She is also interested in the potential causes and effects of nonverbal IQ on myopia and how it may differ from the effects of books read per week.
