persona_description: A historian and economist who specializes in the study of the English Magna Carta and its significance in the development of constitutional order. He has a deep understanding of the
  political and economic factors that led to the signing of the Magna Carta, and how it has influenced British innovation in banking and constitutional order. He is interested in the role of the judiciary
  in resolving disputes between the king and powerful interest groups, and the ways in which the Magna Carta has been interpreted and adapted over time. He is also knowledgeable about the financial crisis
  of the 13th century, and the ways in which it affected the Magna Carta and the kingdom of England.
