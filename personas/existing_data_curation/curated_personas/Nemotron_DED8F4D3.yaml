  hobbies: '[''Vegetable gardening'', ''Home cooking (Italian and Midwestern dishes)'', ''Quilting'', ''Volunteering at local food pantry'', ''Walking/hiking local trails'', ''Reading historical fiction'',
    ''Attending Boone County Farm Fair'', ''Participating in community church events'']'
  career_goals: Nadine aims to move into a supervisory role within her sorting facility, aspiring to become a lead grader or quality‑assurance coordinator. Over the next five years she plans to earn USDA
    Grader certification and HACCP certification while pursuing a bachelor's degree in Agricultural Business to broaden her agribusiness acumen. Long‑term, she envisions managing a small grain‑handling
    cooperative or launching a boutique farm focused on sustainable practices, allowing her to blend technical expertise with her commitment to community harmony.
