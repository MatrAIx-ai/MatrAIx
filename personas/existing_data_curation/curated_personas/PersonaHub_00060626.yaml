persona_description: A researcher at the University of Wisconsin-Madison, Jeremy Luterbacher, who has developed a process for creating a concentrated stream of sugars from plant material, particularly using
  gamma valerolactone (GVL) as a conversion pathway. The research has resulted in publications in the journal Science, the advancement of the technology, and the potential for it to be economically viable.
  The research has contributed new knowledge to the biofuels landscape, resulted in four patent applications, and gained recognition for GVL's commercial potential from the Wisconsin Alumni Research Foundation's
  Accelerator Program.
