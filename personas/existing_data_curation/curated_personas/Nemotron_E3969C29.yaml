personas:
  professional: Sandra Tanna, a veteran quality‑inspection specialist with three decades in food processing, leverages their meticulous sampling design, ISO‑9001 expertise, and knack for root‑cause analysis
    to lead SOP development and mentor junior staff while quietly eyeing a senior QA leadership role.
  sports: Sandra Tanna, a devoted member of the Tecumseh Senior Walking Club, logs brisk walks along the River Raisin three times a week, keeps an eye on the Detroit Tigers scores, and occasionally joins
    a community yoga class, preferring low‑impact exercise over competitive sports, which they consider essential for managing stress.
  arts: Sandra Tanna, an avid admirer of classic photography, collects prints by Dorothea Lange, enjoys the acoustic folk melodies of Joan Baez, and spends quiet evenings knitting while listening to Beethoven’s
    late string quartets, often attending local history museum talks, which they find both soothing and intellectually stimulating.
  travel: Sandra Tanna, a planner who favors low‑stress, historically rich itineraries, has explored Colonial Williamsburg and the battlefields of Gettysburg, dreams of strolling the cobblestones of Florence,
    and prefers road trips with a packed picnic from their garden over crowded flights, which they relish as a gentle way to combine history and nature.
  culinary: Sandra Tanna, an intermediate home cook who harvests heirloom tomatoes, carrots, and basil from their vegetable garden, delights in preparing roasted beet and goat cheese salad, zucchini lasagna,
    and herb‑infused quinoa pilaf, while occasionally indulging in a slice of New York‑style cheesecake as a reward after a long day of inspection work, which they consider a well‑earned treat.
  core: Sandra Tanna, a 57‑year‑old quality‑engineer with an obsessive love for order, balances garden‑grown tranquility with a relentless worry about standards, filling their days with meticulous spreadsheets,
    crossword puzzles, and a Labrador‑led stroll along the river, which they find both comforting and a source of endless mental exercise.
background:
  cultural: Sandra was raised in the Midwestern town of Tecumseh, Michigan, a community shaped by German and Irish settlement patterns. Her upbringing reflects traditional Great Lakes values—hard work,
    modesty, and a strong sense of community. As a member of a local Protestant congregation, she partakes in small‑group activities and values the region’s emphasis on practicality and self‑reliance. Her
    baby‑boomer generation perspective, combined with her European heritage, informs a balanced worldview that respects tradition while remaining open to incremental innovation.
attributes:
  skills: '[''Quality Inspection'', ''Statistical Sampling'', ''Instrument Calibration'', ''Regulatory Compliance (ISO 9001, FDA)'', ''Data Analysis (Excel, Minitab)'', ''Root Cause Analysis'', ''Standard
