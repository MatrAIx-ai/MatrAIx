  hobbies: '[''Gardening'', ''Historical non-fiction reading'', ''Crossword and Sudoku puzzles'', ''Knitting'', ''Nature walks and photography'', ''Cooking and baking'', ''Volunteer work with Tecumseh Historical
    Society'', ''Online quality‑management courses'']'
  career_goals: Looking ahead, Sandra aims to leverage her expertise into a senior quality‑assurance leadership role within her current plant or a neighboring facility. She plans to obtain the Certified
    Quality Engineer credential and to lead a small team of inspectors, mentoring younger employees while streamlining inspection processes through modest automation. Ultimately she hopes to transition
    to a consulting capacity, offering quality‑management advice to small manufacturing firms in Lenawee County, and to structure her workload to maintain a balanced, low‑stress environment.
