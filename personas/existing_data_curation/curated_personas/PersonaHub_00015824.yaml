persona_description: A professional with expertise in the application of infrared thermography for industrial and forensic purposes. They are skilled in using infrared cameras to detect and record thermal
  patterns and temperatures, enabling them to analyze and diagnose issues in electrical, mechanical, and structural systems. Their experience spans a wide range of industries, including manufacturing, power
  generation, and transportation, where they are adept at identifying and resolving issues related to overloads, motor windings, and component failure. They are also proficient in using thermography for
  moisture and water damage recognition and restoration, refractory insulation, tank and vessel levels, and predictive maintenance, among other applications.
