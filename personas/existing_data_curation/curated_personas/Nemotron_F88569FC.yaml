  career_goals: Approaching retirement, Jeremiah aims to channel his curiosity for emerging HR technologies into a senior leadership role, such as HR Director, where he can champion data‑driven decision‑making
    while preserving the human touch. He plans to launch a pilot program that integrates AI‑assisted employee‑engagement surveys with traditional feedback loops, enhancing both efficiency and authenticity.
    A core ambition is to embed a culture of psychological safety and resilience, drawing on his own experiences with anxiety to develop comprehensive wellness initiatives. Over the next two years, he hopes
    to mentor a cohort of junior HR professionals, creating a lasting legacy of collaborative, compassionate leadership. Post‑retirement, he envisions transitioning to a part‑time consultancy, advising
    organizations on strategic workforce planning and employee‑wellness architecture.
