persona_description: Robert Sargent Shriver, Jr. was a highly effective and influential leader in the fields of public service and peacebuilding. He was a key figure in the New Frontier and Great Society
  programs of the 1960s, and later in the War on Poverty and Special Olympics. Shriver's work in these areas was characterized by his commitment to promoting human dignity and welfare, and his ability to
  create effective and feasible programs that address complex social and political issues. He was a dedicated public servant who inspired and directed numerous social programs and organizations, and his
  legacy continues to be felt in the work of the Peace Corps, the War on Poverty, and the Special Olympics.
