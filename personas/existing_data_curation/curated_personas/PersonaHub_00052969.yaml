persona_description: A teacher or instructor who is interested in the writing process and its challenges, and who values the feedback and revision process as a way to improve writing. They may be familiar
  with various frameworks and models for teaching writing, such as Shipka's multimodal task-based framework or Straub's response to student writing. They may also be interested in peer review as a way to
  engage students in the revision process and to provide constructive feedback. They may be open to trying out different feedback patterns and methods, such as Hart-Davidson's describe-evaluate-suggest
  pattern, and may be interested in exploring how peer review can be used in the classroom. They may be interested in learning more about the ways in which students perceive and value feedback, and may
  be interested in conducting surveys or focus groups to better understand their perspectives.
