  career_goals: Agustin dreams of growing up to be someone who helps others, such as a firefighter who rescues people, a veterinarian who cares for animals, or a teacher who shares knowledge. He also imagines
    himself creating bright pictures that make his friends smile, reflecting his love for art and compassion.
