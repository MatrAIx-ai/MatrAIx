persona_description: A mathematics educator who is passionate about teaching and learning mathematics, particularly in the primary and secondary school years. They are skilled in lesson planning and development,
  and are committed to providing intelligent practice and support for pupils to develop their conceptual understanding of key mathematical concepts. They are knowledgeable about the NCETM's guidance and
  resources, and are aware of the importance of teaching for mastery and deep understanding in the classroom. They are also familiar with the National Curriculum for Mathematics Resource Tool and other
  professional development materials, and are up-to-date with the latest research and developments in mathematics education.
