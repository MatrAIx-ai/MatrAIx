  career_goals: Natalie aspires to become a pediatric nurse or a child psychologist, driven by her desire to help children cope with anxiety and stress. She dreams of working in a caring environment where
    she can provide emotional support and practical assistance, perhaps in a school setting as a counselor or in a community health clinic. She envisions further education, aiming to study biology in high
    school and later pursue a degree in nursing or psychology, while continuing to volunteer at local animal shelters and school peer‑support programs.
