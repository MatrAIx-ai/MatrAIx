persona_description: A scientist at the National Institute of Standards and Technology (NIST) who specializes in the manipulation of fluids at the microscopic scale, specifically using microfluidics to
  create microdroplets containing single molecules of interest. The scientist has experience with microfluidic "droplet-on-demand" methods and optical tweezers to merge multiple droplets and cause their
  molecular contents to react. The scientist's research aims to obtain single-molecule information on the structure and function of important organic materials, such as proteins, enzymes, and DNA.
