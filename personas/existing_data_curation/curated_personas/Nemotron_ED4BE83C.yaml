  hobbies: '[''Visiting art galleries and museums'', ''Digital photography of historic neighborhoods'', ''Cooking Creole cuisine'', ''Backyard gardening'', ''Playing chess'', ''Attending intimate jazz shows'',
    ''Reading historical nonfiction'', ''Participating in a small book club'', ''DIY woodworking projects'', ''Volunteering at community events'']'
  career_goals: Hampton aims to channel his lifelong curiosity for art into community service by becoming a volunteer docent at the New Orleans Museum of Art and curating a modest online blog that highlights
    regional artists and historical sites. He also aspires to mentor younger adults in art appreciation through small workshops at local community centers. Beyond the arts, he hopes to expand his urban
    garden project into a collaborative space for neighbors and to refine his woodworking hobby into a modest side venture that could provide custom pieces for friends and local charities.
