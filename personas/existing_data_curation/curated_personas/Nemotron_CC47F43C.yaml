  career_goals: Although only eight, Ashley already imagines a future where she can combine her love for helping others and her organizational talents. She often says she wants to become a teacher or a
    librarian, dreaming of a calm classroom where every student feels supported. Occasionally she mentions a desire to be a veterinarian because she enjoys caring for animals on family visits to the local
    farm. Her long‑term ambition is to work in a role that allows her to create orderly, harmonious environments while making a positive impact on people or pets.
