  career_goals: Faith aims to secure an entry‑level administrative or office assistant position within a community‑oriented organization, such as a school, healthcare clinic, or non‑profit agency. She intends
    to build experience in office management, develop professional certifications (e.g., Microsoft Office Specialist), and eventually pursue an associate’s degree in Business Administration or Healthcare
    Administration. Her longer‑term ambition includes taking on supervisory responsibilities or transitioning into a project‑coordination role that blends her organizational strengths with her curiosity
    about process improvement.
