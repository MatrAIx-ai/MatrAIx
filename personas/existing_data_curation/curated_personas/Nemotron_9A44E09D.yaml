personas:
  professional: Michael Coolahan, a seasoned facility‑management consultant with decades of hands‑on construction and logistical coordination experience, leverages Excel, QuickBooks, and project‑management
    software to deliver methodical, budget‑tight solutions for small businesses, and they embody their reliable, structured personality through meticulous scheduling and hands‑on problem solving.
  sports: Michael Coolahan, an avid angler on Lake Erie during summer and weekend golfer at the historic Squaw Creek Golf Club, they cheer for the Cleveland Browns and follow the Cleveland Guardians closely,
    while maintaining a modest fitness routine of early‑morning walks and occasional community fire‑department charity runs.
  arts: Michael Coolahan, a dedicated stage‑crew volunteer at the local community theater, they admire the craftsmanship of classic stage lighting—often citing Broadway revivals of 'Les Misérables' and
    'Chicago'—and unwind by assembling model railroad layouts that echo historic rail lines, while also enjoying the folk storytelling of Bob Dylan and the cinematic wit of John Ford.
  travel: Michael Coolahan, a planner who favors structured road trips with detailed itineraries, they have explored the Amish country of Ohio, taken yearly weekend getaways to Niagara Falls, and dream
    of a summer road‑trip along the Great Lakes shoreline, balancing adventure with the practical need to fit travel around family commitments and a part‑time consulting schedule.
  culinary: Michael Coolahan, a home‑cooking enthusiast who grows heirloom tomatoes, rosemary, and roses in their garden, they relish preparing hearty roasted pork shoulder with sauerkraut and mashed potatoes,
    while also mastering homemade apple crisp using crisped orchard apples from nearby orchards, and they occasionally indulge in craft beer tasting at local breweries.
  core: Michael Coolahan, a methodical handyman with a love for woodworking, garden vegetables, and community theater, they juggle a disciplined budget, battle mild hypertension with garden‑fresh meals,
    and occasionally over‑schedule their weekends, leaving little time for spontaneous relaxation.
background:
  cultural: Michael hails from a Midwestern family whose ancestry includes German and Irish immigrants who settled in Ohio during the early 1900s. Raised in the Cleveland suburbs, he absorbed values of
    self‑reliance, punctuality, and community service. Local traditions such as county fairs, church gatherings, and neighborhood block parties shaped his social outlook. These cultural influences are reflected
    in his commitment to volunteer work, his pragmatic approach to problems, and his emphasis on family and neighborhood responsibility.
attributes:
  skills: '[''Project Management'', ''Budgeting & Cost Control'', ''Facilities Maintenance'', ''Carpentry & Woodworking'', ''Basic Electrical & Plumbing Repair'', ''Inventory Management'', ''Data Analysis
    (Excel)'', ''Community Volunteer Coordination'', ''Mentorship & Training'']'
  hobbies: '[''Woodworking'', ''Gardening'', ''Fishing'', ''Historical Nonfiction Reading'', ''Model Railroading'', ''Community Theater (Stage Crew)'', ''Volunteer Fire‑Department Support'']'
  career_goals: Looking to re‑enter the workforce on his own terms, Michael plans to launch a part‑time consulting and handyman service that helps local small businesses streamline operations and maintain
    their facilities. He intends to earn a certified project‑management credential (PMP) to formalize his expertise. Michael also seeks a role on the Mentor town council’s planning committee or a similar
    civic board, where his practical perspective can influence community development. While pursuing these goals, he remains focused on preserving a stable home life and supporting his family’s needs.
