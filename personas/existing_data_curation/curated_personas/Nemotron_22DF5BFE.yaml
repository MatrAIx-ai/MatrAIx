personas:
  professional: Gloria Trias blends a STEM‑grounded analytical mindset with hands‑on retail expertise, leading floor teams through data‑driven scheduling, KPI dashboards, Lean process improvements, and
    bilingual coaching while championing AI‑powered inventory forecasting as a stepping stone toward district‑manager leadership.
  sports: Gloria Trias follows the New York Red Bulls and Peru’s Alianza Lima in soccer, joins a local co‑ed recreational soccer league on weekends, and balances their competitive streak with regular hikes
    on the Watchung Reservation, where they track elevation gains using a trail‑mapping app.
  arts: Gloria Trias immerses herself in Afro‑Peruvian folk dance at community festivals, spins vinyl of Eva Ayllón and Susana Baca during her cooking nights, enjoys the improvisational jazz of Miles Davis,
    and channels her competitive nature into Settlers of Catan tournaments and trivia nights featuring pop‑culture references to actors like Penélope Cruz.
  travel: Gloria Trias takes advantage of long‑weekend flights to explore the Andean highlands of Cusco, plans a future culinary‑inspired trip to Barcelona’s La Boqueria market, and balances those adventures
    with quarterly staycations at nearby New Jersey shore towns to manage family and work commitments.
  culinary: Gloria Trias demonstrates an intermediate‑to‑advanced cooking skill set, perfecting ceviche with fresh lime juice, aji amarillo, and cilantro, mastering lomo saltado with soy‑based marinades,
    and regularly experiments with fusion dishes that pair Peruvian spices with Southern barbecue sauces during her monthly host‑ed dinner parties.
  core: Gloria Trias is a data‑driven retail leader whose curiosity fuels a love of group cooking, board‑game battles, and relentless pursuit of AI‑enabled inventory precision, tempered by a competitive
    edge that sometimes makes them impatient with slower teammates.
background:
  cultural: Gloria was raised in a bilingual household by Peruvian parents, preserving deep connections to her heritage while navigating American culture. She celebrates Peruvian holidays such as Inti Raymi
    and Día de la Canción, and often organizes cultural events through the Maplewood Peruvian community association. Fluently speaking Spanish and English, she acts as a cultural liaison at local schools
    and community centers, introducing Peruvian traditions, cuisine, and language to a wider audience. Her family values of solidarity and hospitality inform her leadership style, fostering a supportive
    and energetic work environment. She seamlessly blends Peruvian culinary and festive customs with the diverse, collaborative spirit of her New Jersey community.
attributes:
  skills: '[''Team leadership'', ''Sales analytics'', ''Visual merchandising'', ''Inventory management'', ''Customer service training'', ''Process improvement'', ''Technology integration'', ''Bilingual
