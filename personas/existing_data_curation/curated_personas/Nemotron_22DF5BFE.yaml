  hobbies: '[''Peruvian cooking'', ''Salsa and Afro‑Peruvian dancing'', ''Hiking'', ''Competitive board games and trivia'', ''STEM outreach volunteering'', ''Technology podcasts and retail innovation reading'',
    ''Soccer fandom'']'
  career_goals: Gloria aims to advance from first‑line supervisor to district manager within the next five years, overseeing multiple stores and driving data‑centric retail strategies. She plans to earn
    a professional retail management certification and pursue an MBA part‑time to deepen her strategic and financial expertise. A key ambition is to champion AI‑powered inventory forecasting and predictive
    analytics across her organization, positioning the chain at the forefront of retail innovation. In the long term, she envisions launching her own boutique that showcases Peruvian artisan products, blending
    her cultural heritage with the analytical skills she has cultivated.
