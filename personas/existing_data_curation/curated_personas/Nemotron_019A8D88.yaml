    Optimization'']'
  hobbies: '[''Gardening'', ''Cooking (Southern comfort dishes)'', ''Walking in local parks and beaches'', ''Volunteer work with church and community outreach'', ''DIY home‑improvement projects'', ''Knitting/Crocheting'',
    ''Listening to R&B/Soul music'', ''Attending local cultural festivals'']'
  career_goals: Sandra aims to advance to a senior regional property manager role within the next five years, overseeing multiple community associations across Central Florida. She plans to obtain the Certified
    Manager of Community Associations (CMCA) designation and further her education with a bachelor’s degree in Business Administration. Long‑term, she envisions establishing her own boutique property‑management
    firm focused on high‑quality, resident‑centered services. Alongside professional growth, she seeks a stable work schedule that maintains her preferred routine while reducing stress, allowing her to
    provide reliable leadership and mentorship to junior staff.
