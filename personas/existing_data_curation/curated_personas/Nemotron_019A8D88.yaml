personas:
  professional: Sandra Shelton is a property and community association manager in Central Florida who leverages her routine‑driven work style, meticulous budgeting, and conflict‑resolution expertise to
    keep HOA operations smooth while mentoring junior staff and eyeing a senior regional manager role.
  sports: Sandra Shelton enjoys daily walks in nearby parks and beaches for cardio, participates in a spring community 5‑K running club, follows the Orlando Magic and Tampa Bay Buccaneers avidly, and occasionally
    joins a summer beach‑volleyball league with neighbors.
  arts: Sandra Shelton unwinds to classic R&B and soul legends like Marvin Gaye, Aretha Franklin, and Al Green while knitting, and she makes it a point to attend the annual Jacksonville Jazz & Heritage
    Festival and local community theater productions.
  travel: Sandra Shelton prefers well‑planned road‑trip adventures that blend routine checkpoints with spontaneous local stops, often spending weekend getaways at Cocoa Beach or St. Augustine, dreams of
    a cultural immersion in New Orleans for its music and cuisine, and books occasional overseas eco‑tour trips to Costa Rica when her budget permits.
  culinary: Sandra Shelton loves cooking Southern comfort staples such as oven‑fried catfish, collard greens, and cornbread, but frequently experiments with healthier twists like quinoa‑tabbouleh salads,
    roasted sweet‑potato mash, and herb‑infused olive oil drizzles, favoring ingredients like fresh basil, thyme, and smoked paprika.
  core: Sandra Shelton balances a love for structured routines and community care with a hidden penchant for late‑night sci‑fi binge‑watching, a tendency to over‑budget, and a constant battle against stress‑induced
    worry.
background:
  cultural: Sandra’s cultural background is rooted in the African‑American community of Central Florida. Growing up in a close‑knit Black neighborhood, she experienced the strong emphasis on family ties,
    church involvement, and community solidarity that shape her values today. She celebrates traditions such as Juneteenth, participates in local Black cultural festivals, and enjoys soul food cooking that
    blends Southern and Caribbean influences common in Florida. These cultural influences inform her compassionate approach to community management, her commitment to fostering inclusive environments, and
    her appreciation for music, storytelling, and collective resilience.
attributes:
  skills: '[''Property Management'', ''HOA Governance'', ''Budgeting and Financial Reporting'', ''Vendor and Contractor Coordination'', ''Tenant Relations'', ''Property Maintenance Oversight'', ''Regulatory
