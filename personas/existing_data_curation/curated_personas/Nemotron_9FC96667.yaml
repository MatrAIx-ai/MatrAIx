personas:
  professional: Jannie White, a senior industrial and refractory machinery mechanic renowned for her precision in hydraulic, pneumatic, and electrical diagnostics, leverages her curious, art‑infused perspective
    and disciplined yet adaptable work style to drive lean‑manufacturing improvements, mentor junior technicians, and champion innovative sustainable design solutions within the plant.
  sports: Jannie White, a weekend hiker who frequents the Cahaba River Trail and belongs to the Birmingham Trailblazers hiking club, watches the Atlanta Braves for baseball, enjoys occasional pick‑up basketball
    at the community center, and prefers low‑impact fitness activities that complement her physically demanding trade.
  arts: Jannie White, an avid visitor of local galleries and museums who captures urban and industrial landscapes through monochrome photography, sketches in watercolors during quiet evenings, and finds
    inspiration in the blues of B.B. King and the improvisational jazz of Miles Davis, intertwining her mechanical precision with artistic expression.
  travel: Jannie White, a deliberate traveler who plans trips around photography opportunities, has explored Detroit’s historic factories, Chicago’s museum precincts, and New Orleans’ jazz scene, and dreams
    of photographing sustainable architecture in Copenhagen and tea plantations in Kyoto, balancing modest budgets with a desire for immersive cultural experiences.
  culinary: Jannie White, an experimental Southern cook who delights in crafting smoked pork shoulder with kimchi slaw, collard greens seasoned with miso, and bourbon‑glazed pecan pie, enjoys sourcing fresh
    local produce from the farmer’s market yet occasionally over‑salts dishes when concentrating on a new blueprint.
  core: Jannie White is a mechanically meticulous, art‑driven problem‑solver who balances a competitive spirit with a quiet love for jazz, gardening, and DIY projects, while navigating the physical demands
    and occasional health challenges of her trade.
background:
  cultural: Jannie grew up in Columbia, South Carolina, within a close‑knit African‑American community that valued self‑reliance, craftsmanship, and collective support. Family gatherings, church events,
    and Juneteenth celebrations reinforced a strong sense of cultural pride and resilience. Exposure to Black artisans and skilled tradespeople in her neighborhood sparked her early interest in mechanics.
    While navigating the challenges of separation, she draws on the legacy of perseverance and community activism that shaped the local Black experience, integrating these values into her work ethic, mentorship
    aspirations, and appreciation for the arts.
attributes:
  skills: '[''Industrial machinery maintenance'', ''Refractory material handling'', ''Welding (MIG/TIG)'', ''Hydraulic and pneumatic systems troubleshooting'', ''Blueprint reading'', ''Preventive maintenance
    scheduling'', ''Equipment calibration'', ''Safety compliance (OSHA)'', ''Process optimization'', ''Lean manufacturing principles'', ''Technical documentation'', ''Basic CNC programming'', ''Team leadership'',
    ''Problem solving'']'
  hobbies: '[''Visiting local art galleries and museums'', ''Photography'', ''Sketching/painting'', ''DIY home repair projects'', ''Gardening'', ''Reading science and technology magazines'', ''Listening
    to jazz and blues music'', ''Cooking Southern and experimental dishes'', ''Hiking nature trails'', ''Yoga and mindfulness meditation'', ''Attending small community workshops'']'
  career_goals: Jannie aims to advance into a senior lead mechanic or supervisory role within the plant, securing certifications such as Certified Maintenance & Reliability Professional (CMRP) and Certified
    Welding Inspector. She envisions mentoring the next generation of women and people of color in skilled trades, perhaps through a community apprenticeship program. Long‑term, she is interested in launching
    a boutique consulting firm that advises manufacturers on sustainable refractory technologies and aesthetic equipment design, merging her mechanical expertise with her appreciation for art and unconventional
    thinking.
