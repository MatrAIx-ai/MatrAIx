persona_description: A school administrator who is responsible for planning and implementing a blended learning strategy to improve student learning. They are aware of the importance of defining mission
  and learning goals before deciding on the technologies to be used and the schedule for students. They are skilled at scheduling student time and are familiar with the Station-Rotation model and other
  blended learning methods. They prioritize communication with teachers, parents, and students to ensure that the blended learning approach is effective and that their goals are being met.
