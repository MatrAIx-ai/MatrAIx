  hobbies: '["Reading chapter books (Mystery/Adventure)", "LEGO building following instructions", "Puzzle solving (jigsaw, logic games)", "Rock collecting and nature observation", "Single-player video games
    (Minecraft)", "Drawing rockets and space scenes"]'
  career_goals: Although still young, Phelix imagines a future where he works in a quiet, structured environment that lets him solve problems methodically. He dreams of becoming an aerospace engineer or
    astronaut, hoping to design spacecraft and explore the stars. He also expresses interest in becoming a computer programmer who writes clean, organized code. These ambitions reflect his desire for order,
    solitude, and the belief that mastering a technical field will give him control over his worries and enable him to contribute meaningfully.
