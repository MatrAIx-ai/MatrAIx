personas:
  professional: Phelix Young is a budding junior LEGO architect who meticulously follows step‑by‑step instructions, turning their love of structure and solitary focus into impressive model builds, while
    their practical mindset ensures each creation is both stable and imaginative, and they proudly display each finished set on a dedicated shelf.
  sports: Phelix Young participates in the local youth soccer club called the Mighty Rockets, they dedicate after‑school time to practicing penalty kicks with the precise focus they bring to LEGO builds,
    and avidly follows the New York Yankees for baseball, though they usually watch games alone from home.
  arts: Phelix Young channels imagination into detailed space‑themed drawings inspired by NASA Hubble images and the animated film \"The LEGO Movie\", while they listen to the orchestral scores of Hans
    Zimmer and the upbeat tracks of Imagine Dragons during building sessions, making art a quiet sanctuary.
  travel: Phelix Young prefers meticulously planned day trips to nearby science museums and the local botanical garden, and they have visited the Smithsonian National Air and Space Museum in Washington,
    D.C., and dreams of traveling to the Kennedy Space Center in Florida and the International Space Station via a future virtual reality tour, balancing excitement with a need for predictable schedules.
  culinary: Phelix Young favors the comforting flavors of mac and cheese, pepperoni pizza, and peanut butter‑jelly sandwiches, and they enjoy assembling simple \"rock‑cake\" treats by mixing chocolate chips
    and crushed graham crackers, yet their cooking attempts are limited to microwave meals and occasional help with stirring pancake batter.
  core: Phelix Young is a solitary, structure‑loving 7‑year‑old who transforms anxiety into meticulous LEGO creations, yet they often forget to put away puzzle pieces and can be overly cautious about new
    social situations.
background:
  cultural: 'Phelix comes from a middle‑class white family living in the planned community of Ladera Ranch in Orange County, California. His upbringing reflects typical suburban American values: emphasis
    on education, punctuality, and participation in community events such as neighborhood pool parties and holiday celebrations like Thanksgiving and Halloween. The diverse cultural milieu of Southern California,
    with nearby Hispanic, Asian, and other communities, has exposed him to a variety of foods and festivals, though his family''s traditions remain rooted in classic U.S. customs. The suburb''s organized
    layout, HOA rules, and structured school environment reinforce his preference for order and predictability.'
attributes:
  skills: '["Reading (chapter books)", "Basic Math (addition/subtraction)", "LEGO construction", "Puzzle solving (jigsaw, logic games)", "Organizing personal belongings", "Following daily schedules", "Using
