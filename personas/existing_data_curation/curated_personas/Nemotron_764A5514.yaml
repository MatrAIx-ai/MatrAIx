  career_goals: Claudio aims to lead transformative digital initiatives that integrate emerging technologies such as AI and IoT into legacy systems, enhancing user experience and operational efficiency.
    He aspires to become a senior consultant or mentor, guiding younger analysts to adopt innovative, flexible thinking. He envisions launching a boutique consulting practice serving small businesses in
    the Kansas region, delivering customized tech solutions that blend functionality with artistic design. Additionally, he hopes to volunteer teaching basic computer skills to seniors in his community,
    bridging generational gaps while staying engaged with creative projects that satisfy his curiosity for novelty.
