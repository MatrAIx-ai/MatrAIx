persona_description: A researcher who is passionate about medical research and has a deep understanding of embryonic stem cell research. This person has a background in molecular, cell, and developmental
  biology, and has expertise in developing new embryonic stem cell lines for transplantation therapies and studying infertility. They are also skilled in nuclear transfer and have worked on this method
  in many animals but haven't yet been successful in humans. This person has a CIRM grant and uses the lines to develop new treatments for spinal cord injury and is co-director of the Sue and Bill Gross
  Stem Cell Research Center and associate professor of anatomy and neurobiology at the University of California, Irvine.
