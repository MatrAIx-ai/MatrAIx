  career_goals: Tyler aims to scale his e‑commerce venture into a nationally recognized brand within the next five years, expanding product lines and building a team of ten full‑time employees. He plans
    to formalize his business education through an online entrepreneurship certificate or a community college associate degree, eventually pursuing an MBA to broaden his strategic expertise. Long‑term,
    he aspires to become a serial entrepreneur, launching a tech‑focused startup and mentoring other young founders.
