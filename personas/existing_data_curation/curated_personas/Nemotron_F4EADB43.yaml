personas:
  professional: Tyler Jafari, a 19‑year‑old e‑commerce chief executive, channels their relentless curiosity and methodical mindset into scaling a small‑town apparel brand by crafting data‑driven digital
    marketing campaigns, negotiating supplier contracts with a competitive edge, and rallying teams through charismatic public speaking—all while they stay organized and skeptical of any vague promise.
  sports: Tyler Jafari hits the courts for pickup basketball at the Mulberry community center, pumps iron at a local Powerhouse Gym, logs weekly 5‑mile runs around Lake Weir, and they cheer on the Orlando
    Magic in the NBA and Orlando City SC in MLS, treating fitness as both a stress outlet and a competitive arena.
  arts: Tyler Jafari spends evenings remixing beats inspired by Bad Bunny and Travis Scott for their growing TikTok audience, drinks in live‑energy at local venues featuring Southern rock staples like Lynyrd Skynyrd,
    and unwinds at stand‑up shows headlined by John Mulaney, and they let those eclectic tastes shape both their personal brand and the way they connect with followers.
  travel: Tyler Jafari prefers weekend road trips that blend adventure and relaxation, having road‑tripped to Miami’s South Beach, the laid‑back islands of Key West, and a music‑filled weekend in New Orleans
    for Mardi Gras, while they dream of a spring‑time pilgrimage to Austin’s South by Southwest festival and a cultural immersion in Puerto Rico’s Old San Juan.
  culinary: Tyler Jafari, a modest home‑chef, whips up Southern‑style fried chicken with collard greens, spicy Caribbean jerk pork with plantains, and late‑night tacos al pastor topped with fresh pineapple
    and cilantro, savoring the mix of hot sauce, mango salsa, and a dash of orange‑zest glaze while they host game nights for friends.
  core: Tyler Jafari is a gregarious 19‑year‑old entrepreneur who balances a relentless competitive streak and worry‑laden perfectionism with nightly runs, weekend remix sessions, and a habit of splurging
    on concert tickets despite a meticulously kept budget, and they often stay up late fearing missed opportunities.
background:
  cultural: Tyler grew up in Mulberry, a small town in central Florida, where Southern hospitality and a close‑knit community ethos shaped his worldview. His family identifies as white American, with roots
    in the Midwest, and while they maintain traditional values of hard work and self‑reliance, they also embrace the diverse cultural influences of the Orlando metropolitan area, including exposure to Latin
    and Caribbean flavors in food, music, and festivals. This blend of small‑town Southern culture and the vibrant, entrepreneurial spirit of central Florida informs his pragmatic yet curious outlook.
