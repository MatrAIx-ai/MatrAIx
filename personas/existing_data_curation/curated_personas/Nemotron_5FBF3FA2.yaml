  career_goals: Even in retirement, Maya’s goal is to stay active, independent, and useful within her community. She aims to continue volunteering at the local senior center, mentoring younger volunteers
    in crafts, budgeting, and basic computer use. Maya hopes to lead a monthly small‑group cooking class that shares practical, seasonal recipes, and she plans to deepen her genealogical research to preserve
    her family’s history. Learning more digital tools to stay connected with distant relatives and maintaining her health through daily walks and gardening are central to her ambitions.
