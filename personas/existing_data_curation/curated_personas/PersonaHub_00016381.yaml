persona_description: A geologist who is interested in studying the geology and ground-water resources of Washington County, Colorado. They are likely to be interested in the history and development of the
  county's water resources, the types of rocks and soils that influence the availability of ground water, and the potential for future development of ground water for irrigation in the South Platte valley
  and in some parts of the Beaver and Arikaree valleys. They may also be interested in the sodium-adsorption-ratio for all samples analyzed, the suitability of water from the Ogallala Formation for domestic
  use, and the availability of ground water in the Ogallala Formation for future development.
