  hobbies: '[''Acrylic painting'', ''Street photography'', ''Visiting art galleries'', ''Improv comedy'', ''Community theater acting'', ''Toastmasters public speaking'', ''Emceeing neighborhood events'',
    ''Exploring local cafés'', ''Hiking'', ''Trivia nights'', ''Board‑game competitions'', ''DIY home renovation'', ''Sustainable building workshops'']'
  career_goals: Suzette aims to become a certified foreperson within the next three years, earn an OSHA 30‑hour certification, and complete a journeyman apprenticeship in either carpentry or electrical
    work. She plans to pursue an associate degree in construction management to qualify for project manager roles. In the medium term, she wants to lead a crew, manage budgets, and be recognized for exemplary
    safety records. Long‑term, she envisions launching her own small remodel and custom‑design business that blends sustainable building practices with artistic aesthetics, creating spaces that are both
    functional and visually striking. Her competitive drive pushes her to prove herself as a leader in Dayton’s revitalization projects while maintaining credibility and trust among colleagues.
