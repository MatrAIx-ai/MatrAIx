personas:
  professional: Suzette Willis, a seasoned construction helper turned aspiring foreperson in Dayton, blends hands‑on framing, drywall, and conduit work with an artist’s eye for design, and they coordinate
    crews with talkative confidence while pushing for OSHA certification and sustainable remodels.
  sports: Suzette Willis, a devoted fan of the Dayton Flyers basketball team and the Cleveland Browns, regularly hikes Five Rivers MetroParks trails for cardio, participates in a local co‑ed softball league,
    follows the Dayton Dragons minor‑league baseball schedule, and they balance team spirit with a practical, DIY‑style home workout regimen.
  arts: Suzette Willis channels their curiosity into acrylic paintings of urban streetscapes, street photography captured in the Oregon District, performs improv at the Dayton Comedy Club, and they find
    inspiration from artists like Jeff Koons and musicians such as The White Stripes, while their Toastmasters involvement sharpens their stage presence.
  travel: Suzette Willis prefers weekend road trips that blend adventure with DIY research, having driven the historic Route 66 to Chicago for blues festivals, explored Asheville’s arts scene, and scheduled
    a future visit to the Irish cultural festival in Columbus, all while budgeting travel expenses through a separate savings jar, and they plan their next trip around both community events and sustainable
    practices.
  culinary: Suzette Willis, an avid coffee shop hopper, delights in crafting their own sourdough starter, whips up a signature Midwestern chili with locally sourced beans and smoked sausage, experiments
    with seasonal vegetables like roasted Brussels sprouts during DIY dinner parties, yet they often forget to finish a meal before tackling a renovation project.
  core: Suzette Willis is a talkative, competitively‑driven construction pro who fuses artistic flair with sustainable building, fuels their days with coffee, board games, and community theater, and they
    balance frugal budgeting with occasional splurges on creativity.
background:
  cultural: Suzette grew up in a working‑class family in the Dayton metropolitan area. Her heritage is predominantly Irish‑German, common among many white Ohio families, and she was raised with Midwestern
    values of hard work, community involvement, and modesty. The industrial and aviation legacy of Dayton, together with its revitalized arts districts, fostered her appreciation for both practical craftsmanship
    and creative expression. Local traditions such as county fairs, high‑school football games, and neighborhood block parties remain central to her identity, while the city’s strong labor‑union presence
    and DIY culture have shaped her career path in the construction trades.
attributes:
  skills: '[''Construction site assistance'', ''Basic carpentry'', ''Electrical wiring assistance'', ''Plumbing support'', ''Power and hand tool operation'', ''Blueprint reading'', ''Material handling'',
