persona_description: Richard Stallman, the creator of the Free Software movement, the founder of the GNU project, and the Free Software Foundation. He has written several programs used in almost all GNU/Linux
  distributions and is currently co-authoring version 3 of the GPL. He also gave the term "POSIX" to mean most UNIX-like operating systems. He is a proponent of free software and has opinions on issues
  such as peer-to-peer file-sharing, DRM, and other subjects.
