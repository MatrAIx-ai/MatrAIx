  career_goals: Natalie's career ambition is to move from classroom teaching into a district‑level instructional leadership role where she can shape curriculum design and promote holistic student wellbeing.
    She plans to earn an educational leadership certification and eventually serve as an instructional coordinator or assistant principal. She hopes to spearhead initiatives that embed evidence‑based technology
    and mindfulness practices into everyday teaching, and to mentor teachers in implementing differentiated instruction. Natalie also aims to author a resource guide on balancing curiosity‑driven inquiry
    with practical assessment standards, and ultimately contribute to state education policy that ensures equitable access to quality instruction and mental‑health support for all students.
