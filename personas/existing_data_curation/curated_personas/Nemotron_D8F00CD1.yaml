  career_goals: Vincent aims to advance to a senior leadership role, such as Branch Manager or Director of Community Lending, within the next five years. He intends to obtain Certified Financial Services
    Counselor (CFSC) and Mortgage Loan Originator (MLO) certifications to broaden his expertise. He is passionate about expanding financial inclusion in rural Idaho, planning to develop a community outreach
    program that offers free financial literacy workshops for small business owners, farmers, and low-income families. Long-term, he envisions establishing a non-profit that partners with local banks to
    provide micro-loans and mentorship for aspiring entrepreneurs, while also mentoring junior loan officers to foster a collaborative workplace culture.
