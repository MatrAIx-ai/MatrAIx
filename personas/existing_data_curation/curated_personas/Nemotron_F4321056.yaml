  hobbies: '[''Sketching'', ''Digital painting'', ''Reading historical fiction and biographies'', ''Solving puzzles (crosswords, Sudoku)'', ''Journaling'', ''Volunteer work at the local library'', ''Listening
    to instrumental jazz and classical music'', ''Exploring science kits'']'
  career_goals: Denisha dreams of a career that blends her love for art, her talent for organization, and her desire to help others. She envisions becoming a museum curator or art conservator who preserves
    African-American cultural heritage, designs engaging exhibits, and creates educational programs for youth. She also aspires to develop community art workshops that provide safe, creative spaces for
    children who prefer quieter environments. In the long term, Denisha hopes to attend a specialized arts high school, pursue a degree in museum studies or visual arts, and eventually lead initiatives
    that use art to foster empathy and cultural understanding.
