persona_description: A designer or landscape architect who is responsible for creating shade solutions for outdoor spaces, particularly for areas like playgrounds, garden centers, and outdoor play areas.
  They are skilled in selecting appropriate levels of shade for different applications based on factors like the type of shade cloth, the shade factor, and the cover factor. They are also knowledgeable
  about the Australian Standard AS 4174-1994 Synthetic Shadecloth and its classification into heavy, medium, and light categories. They are able to analyze the performance of shadecloth installations and
  make informed decisions based on the shade factor, cover factor, and other relevant factors.
