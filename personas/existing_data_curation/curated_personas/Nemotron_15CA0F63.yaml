personas:
  professional: Amina Patel, a detail‑driven volunteer guide at the Albright‑Knox Art Gallery, leverages their associate’s degree in Business Administration, expertise in project planning, budgeting, and
    digital illustration to orchestrate community art workshops while preparing to enroll in a Arts Management bachelor’s program.
  sports: Amina Patel roots for the Buffalo Bills, follows the Buffalo Sabres, cheers on the Erie SeaWolves, and belongs to the Erie Lakeside Runners club, where they mix weekend hikes along Lake Erie’s
    shoreline with occasional pick‑up basketball games at the local community center.
  arts: Amina Patel curates a quarterly indie‑music playlist featuring Tame Impala, Phoebe Bridgers, and Flying Lotus, devotes evenings to sketching urban vistas, draws inspiration from contemporary artists
    like Ai Weiwei and Yayoi Kusama, and engages in lively book club discussions about Murakami and Atwood, reflecting their eclectic taste.
  travel: Amina Patel has trekked the Great Smoky Mountains, explored Montreal’s vibrant street art scene, and plans a cultural immersion trip to Kyoto’s temples and Florence’s Renaissance museums, and
    they favor a blend of structured itineraries and spontaneous detours.
  culinary: Amina Patel delights in crafting fragrant spiced rice pudding and hand‑rolled savory pastries for family celebrations, experiments with fresh seasonal vegetables like roasted cauliflower, and
    balances their culinary pursuits with a modest talent for quick weekday stir‑fries.
  core: Amina Patel marries ultra‑organized project management with a free‑spirited love for art and sweet treats, occasionally over‑indulging in a midnight supply run for new paints, and they keep a color‑coded
    planner at arm’s reach.
background:
  cultural: Amina is a second‑generation South Asian American of Indian (Gujarati) descent. Raised in Hamburg, NY, she grew up in a bilingual household that celebrated Diwali, Navratri, and other cultural
    festivals while also embracing American customs. Her parents emigrated in the early 1990s, instilling values of education, family solidarity, and community service. She is fluent in both English and
    Hindi, and regularly participates in local South Asian cultural events, such as the Buffalo India Festival. This bicultural upbringing has given her a deep appreciation for multicultural perspectives,
    which informs her artistic interests and her desire to create inclusive community spaces.
