  hobbies: '["Visiting art galleries and museums","Digital sketching and illustration","Reading contemporary fiction and philosophy","Yoga and mindfulness practice","Cooking and baking South Asian cuisine","Hiking
    the Lake Erie shoreline","Volunteering in community art programs","Curating indie‑music playlists"]'
  career_goals: Amina aims to transition from her current non‑workforce status into a career that merges her passion for art with her organizational strengths. She plans to enroll in a bachelor’s program
    in Arts Management or Museum Studies within the next two years, while completing a certificate in Curatorial Practices. Her long‑term ambition is to become an arts administrator or curator for a regional
    museum or cultural center, where she can design inclusive exhibitions, lead community art initiatives, and create educational programming that bridges diverse cultural perspectives. She also envisions
    establishing a small collaborative studio space in Erie County that supports emerging local artists and offers workshops on digital art techniques.
