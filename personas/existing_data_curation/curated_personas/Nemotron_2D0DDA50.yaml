personas:
  professional: Maria Castro is a budding comic artist who spends weekends sketching superhero mini-stories, channeling their curiosity into bold character designs and often challenging friends to create
    the most dynamic panel, all while they juggle school projects in a delightfully disorganized, improvisational style.
  sports: Maria Castro is a lively midfielder for the neighborhood park's Junior Soccer Club, they idolize the women's national team of the United States and dream of meeting FC Barcelona's youth program
    stars, but they often forget to bring water, leading to occasional dehydration headaches.
  arts: Maria Castro devours adventure graphic novels by Kazu Kibuishi, draws inspiration from comic legends like Stan Lee and manga creator Naoko Takeuchi, dances to the beats of Shakira and Bad Bunny,
    and follows storytelling podcasts featuring the likes of Neil Gaiman, all which they channel into their colorful, imaginative comic strips.
  travel: Maria Castro prefers short, family-oriented trips such as weekend visits to the city's science museum and a day at the coastal aquarium, while daydreaming about an epic adventure to the ancient
    ruins of Machu Picchu that they hope to explore once they are old enough to read a map without getting lost.
  culinary: Maria Castro enjoys building their own taco bowls with salsa, shredded cheese, and avocado, loves the sweet crunch of caramelized popcorn, and they can sometimes be found attempting a half-baked
    chocolate-chip pizza under the watchful eye of their older sibling.
  core: Maria Castro blends a restless curiosity for comics and science with a knack for turning pocket money into comic-book dreams, all while they juggle soccer, occasional allergy flare-ups, and a delightfully
    messy schedule.
background:
  cultural: Maria grows up in a Mexican‑American household in Chicago’s Little Village area. At home, Spanish is spoken alongside English, and family gatherings feature traditional Mexican dishes like tacos
    and tamales. She celebrates Día de los Muertos with colorful altars and participates in community festivals that showcase mariachi music and folklórico dance. The blend of Mexican heritage and urban
    Chicago life shapes her identity, giving her a strong sense of familismo and pride in her cultural roots.
