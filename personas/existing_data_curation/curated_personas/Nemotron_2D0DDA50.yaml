  career_goals: She dreams of becoming an artist who can bring stories to life on canvas, or a scientist who discovers how things work. Maria hopes to win school science fairs, create a comic book series,
    and one day travel to natural parks to draw wildlife. Her competitive streak makes her want to be recognized as the top student in art and science projects.
