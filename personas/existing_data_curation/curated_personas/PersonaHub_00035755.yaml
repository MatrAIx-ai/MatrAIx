persona_description: A conservation biologist who specializes in the study of marine species, particularly smalltooth sawfish, and has worked on their recovery plan under the Endangered Species Act. Their
  expertise includes research on the threats to sawfish, such as bycatch in fishing and degradation of nearshore areas, and the development of conservation actions to recover the species. They have also
  worked to list sawfish under the Convention on International Trade in Endangered Species (CITES).
