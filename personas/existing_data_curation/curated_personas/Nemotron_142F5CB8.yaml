personas:
  professional: Jeremy Tisby, a retired engineer with a lifetime of experience in statistical analysis, computational modeling, and CAD design, applies their methodical yet flexible mindset to mentor aspiring
    STEM students, spearhead a solar‑powered community garden, and provide pragmatic engineering advice to local nonprofits.
  sports: Jeremy Tisby, a member of the Prince George’s Senior Walking Club, routinely walks the Anacostia River Trail three times a week, follows the Washington Capitals and Washington Commanders as his
    favorite professional teams, and occasionally joins a low‑impact pickleball league at the community recreation center to stay active.
  arts: Jeremy Tisby, a jazz enthusiast, regularly attends concerts by local ensembles and national acts such as Miles Davis’s posthumous tributes and Kamasi Washington, delights in reading literary works
    by Toni Morrison and James Baldwin, and finds creative satisfaction in restoring vintage radios, which he views as functional art.
  travel: Jeremy Tisby prefers modest, culturally enriching vacations, having recently toured the historic streets of Savannah, savored the jazz scene in New Orleans, and cared for a lingering desire to
    explore the meticulously designed gardens of Kyoto and the tulip fields of the Netherlands, all while managing travel costs within his retirement budget.
  culinary: Jeremy Tisby enjoys cooking with garden‑fresh produce, often preparing a fragrant ratatouille with heirloom tomatoes, zucchini, and basil, they pair it with slow‑cooked collard greens seasoned
    with smoked paprika, and treat themselves to a homemade pecan pie on special occasions.
  core: Jeremy Tisby, a curious yet practical retiree who balances a competitive spirit in chess with a deep commitment to community mentoring, channels their meticulous engineering mindset into gardening,
    vintage radio restoration, and thoughtful reflection on a lifetime of experiences.
background:
  cultural: Jeremy is an African‑American who grew up in the Washington, D.C. metropolitan area during the height of the civil‑rights movement. His parents migrated from the rural South seeking better employment
    and education opportunities, instilling a strong emphasis on academic achievement and community solidarity. He has deep ties to the historically Black church, where music, fellowship, and service shaped
    his values. Throughout his career, Jeremy has navigated both the challenges of racial bias in STEM fields and the pride of being a role model for younger Black professionals. He celebrates cultural
    traditions such as Juneteenth, soul‑food gatherings, and storytelling that connect him to his heritage while also embracing the multicultural fabric of Prince George’s County.
