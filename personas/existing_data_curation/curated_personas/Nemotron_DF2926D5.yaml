  hobbies: '[''live music attendance'', ''gallery visits and sketching'', ''photography of urban and industrial scenes'', ''road trips and outdoor activities (hiking, kayaking)'', ''guitar playing'', ''Southern
    BBQ cooking'', ''community volunteer work (Habitat for Humanity)'', ''reading trade magazines'', ''socializing at local breweries'', ''journaling and meditation for stress relief'']'
  career_goals: Isaac aims to become a crew leader within the next two years, obtain a Journeyman Roofer certification, and eventually launch his own small roofing company that specializes in energy‑efficient
    and aesthetically distinct roofs. He is intrigued by green technology, so he plans to add solar panel mounting and cool‑roof coatings to his service portfolio. His artistic curiosity drives a side ambition
    to offer custom roof‑top murals or color schemes for bold homeowners. He hopes to attend evening courses in construction management to better handle budgets, schedules, and staff, addressing his natural
    aversion to rigid structures by gaining practical tools. Long‑term, he sees himself as a community advocate for sustainable building practices, possibly working with local non‑profits to provide affordable,
    resilient housing. He also seeks to develop stress‑management habits such as mindfulness and journaling to counter his tendency toward worry and support his entrepreneurial aspirations.
