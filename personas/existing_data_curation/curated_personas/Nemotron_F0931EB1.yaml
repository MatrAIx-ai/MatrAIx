  career_goals: Deborah aims to earn her GED within the next year and then enroll in a community college program for graphic design or digital media. She aspires to work as a freelance designer for local
    businesses, gradually building a portfolio that could support the launch of a small boutique selling her own artwork and custom apparel. In the short term, she plans to secure a part‑time job at a local
    coffee shop to gain customer‑service experience, earn money for her education, and develop networking skills within the Mercer Island community.
