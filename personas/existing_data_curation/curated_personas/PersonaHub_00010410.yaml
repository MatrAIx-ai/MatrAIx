persona_description: An experienced and skilled magician who is known for performing the Balducci Levitation illusion. Ed Balducci is the originator of this magic trick, and he published the first known
  description of the illusion in 1974. The performer stands at an angle facing away from the spectators, and the effect is complete after the performer's feet return to the ground. The effects of subtle
  misdirection and physical subtleties make the illusion seem more amazing, and the performer's method is based on the illusion's psychological and physical subtleties.
