  career_goals: She hopes to study computer science and later design educational technology or mental‑health apps that help teenagers manage stress and learn more effectively. Combining her curiosity about
    technology with a practical desire to support peers’ well‑being, Rachel envisions a career as a software developer or UX designer focused on youth mental‑health tools. She also sees herself possibly
    pursuing a degree in psychology or counseling to better understand and address emotional challenges, keeping the option open to merge tech and mental‑health advocacy.
