personas:
  professional: Yvette Thomas, a senior visual designer with a strong foundation in branding and UI creation, leverages her knack for narrative depth and meticulous typography while balancing a structured
    workflow with a relaxed, sometimes disorganized, approach that lets creative spontaneity surface in client collaborations.
  sports: Yvette Thomas incorporates yoga three times a week for balance, joins a weekend community jog that circles Lake St. Clair, and cheerfully roots for the Detroit Lions during football season while
    also keeping an eye on the Detroit Pistons' schedule for a quick after‑work watch party.
  arts: Yvette Thomas immerses herself in contemporary literature, often revisiting novels by Cheryl Strayed and Zadie Smith, attends local poetry slams spotlighting emerging voices, curates street‑photography
    exhibits inspired by Vivian Maier, and finds quiet inspiration listening to the piano works of Ludovico Einaudi and the soulful jazz of Norah Jones.
  travel: Yvette Thomas prefers curated, low‑key trips that blend cultural immersion and relaxation—she has explored the historic streets of Savannah, savored the café scene in Lisbon, revisited the Great
    Lakes shoreline in Canada’s Algonquin Park, and dreams of a slow‑travel itinerary through the vineyards of Tuscany while balancing a modest travel budget.
  culinary: Yvette Thomas enjoys cooking simple yet flavorful meals, regularly preparing herb‑infused lemon‑roasted chicken with thyme and rosemary from her indoor garden, crafting spicy lentil stew with
    cumin and smoked paprika, and indulging in fresh mozzarella and heirloom tomato salads seasoned with basil and a drizzle of balsamic reduction.
  core: Yvette Thomas is a detail‑driven designer who balances structured planning with spontaneous creativity, budget‑conscious yet occasionally impulsive, health‑aware but sometimes forgetful about prescriptions,
    and a quiet competitor who finds solace in yoga, photography, and the written word.
background:
  cultural: Yvette grew up in a Black family that values storytelling, music, and community connection. Though she was raised in the Midwest, her family’s Southern roots influence the food, language, and
    cultural practices she maintains. She actively participates in local Black cultural events, such as the Kalamazoo Black History Month celebrations and community mural projects. Her humanities education
    deepened her appreciation for African American literature and visual arts, which she integrates into her design work to amplify underrepresented narratives. Yvette’s cultural identity informs both her
    personal life and professional ethos, emphasizing representation, resilience, and collaborative empowerment.
attributes:
  skills: '["Visual Design", "Brand Identity", "User Interface (UI) Design", "Adobe Photoshop", "Adobe Illustrator", "Adobe InDesign", "Figma", "Sketch", "Prototyping (InVision, Axure)", "Typography", "Layout
    Composition", "Print Production", "User Research", "Design Thinking", "Client Communication", "Project Coordination"]'
  hobbies: '["Visiting Art Galleries", "Attending Poetry Readings", "Reading African American Literature", "Writing Short Essays", "Street Photography", "Yoga", "Herb Gardening", "Volunteering (Design Workshops)",
    "Board Games with Close Friends"]'
  career_goals: Yvette aims to transition into a senior design role where she can lead small, focused design teams, developing cohesive brand systems for local businesses and cultural organizations. She
    is interested in deepening her expertise in user experience strategy and hopes to create a boutique design studio that serves underrepresented communities in Michigan, integrating culturally relevant
    storytelling into visual communication. Over the next five years, she plans to earn a certification in UI/UX design, mentor emerging Black designers, and establish a reputable presence in the Midwest
    design network.
