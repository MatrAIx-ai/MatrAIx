personas:
  professional: Keith McGee is an emerging freelance concept artist who blends digital illustration, 3D modeling, and narrative design to craft atmospheric game assets, leveraging Adobe Creative Suite and
    Blender while navigating the anxiety of client deadlines with a meticulously organized yet flexible workflow that they constantly refine.
  sports: Keith McGee enjoys weekend volleyball at Fort Lauderdale Beach, follows the Miami Heat with fervor, and hikes the Everglades trails for both fitness and inspiration, occasionally joining a local
    running club for early‑morning cardio runs, and they relish the end‑of‑session cooldowns.
  arts: Keith McGee immerses in the local art scene, drawing inspiration from street murals captured in their photography, attending open‑mic nights featuring spoken‑word poets, and listening to ambient
    composers like Brian Eno while sketching under the Florida sun, all of which feed their speculative fiction writing and concept art, and they constantly experiment with new mediums.
  travel: Keith McGee prefers spontaneous road trips along the Florida Keys, has visited Key West and the Everglades for photography, dreams of exploring Kyoto’s art districts and Seattle’s gaming conventions,
    and balances travel ambitions with a tight freelance budget by hunting deals on budget airlines and couch‑surfing, and they plan their itineraries with a mix of spontaneity and careful cost‑analysis.
  culinary: Keith McGee frequents eclectic coffee shops for espresso and flat whites, loves cooking shrimp tacos with fresh cilantro and lime, and experiments with tropical smoothies and key lime pie, though
    they sometimes over‑salt dishes when distracted by new music production ideas.
  core: Keith McGee, a 24‑year‑old imaginative visual storyteller, balances ambitious freelance pursuits with a restless mind that fuels creative bursts, occasional worry, and a love for coffee‑fuelled
    late‑night art sessions that they cherish.
background:
  cultural: Keith is a White American who grew up in Hollywood, Florida, within the multicultural tapestry of Broward County. While his family background is middle‑class and rooted in mainstream U.S. values,
    his upbringing was flavored by the vibrant Caribbean and Latin influences that permeate South Florida—through music, food, and community festivals. This exposure sparked his appreciation for diverse
    artistic expressions and encouraged an open‑minded, eclectic worldview. He identifies with a laid‑back coastal lifestyle, valuing personal freedom, creativity, and the DIY spirit of the local arts scene.
    At the same time, his parents emphasized responsibility and reliability, shaping his blend of ambition with pragmatic organization.
attributes:
