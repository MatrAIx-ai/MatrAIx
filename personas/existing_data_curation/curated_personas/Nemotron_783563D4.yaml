  hobbies: '["Sketching and painting (digital & analog)", "Playing narrative video games", "Reading speculative fiction", "Visiting local art shows and galleries", "Photography of street art and nature",
    "Ambient music production", "Creative writing (short stories, webcomic)", "Exploring coffee shops for inspiration", "Hiking in the Everglades"]'
  career_goals: Keith aims to transition from an informal creative hobbyist to a paid freelance professional within the next year. He plans to build a polished online portfolio that showcases his illustration,
    concept art, and multimedia projects, and to secure at least three recurring client contracts for graphic design and custom artwork. He intends to enroll in a part‑time certification program in Interactive
    Media to solidify his technical foundations. Long‑term, he dreams of joining a game studio as a junior concept artist or launching his own indie game project that blends his storytelling and visual
    skills. Alongside these goals, he hopes to exhibit a series of mixed‑media pieces in local galleries and to monetize a personal webcomic series fueled by his creative writing passion.
