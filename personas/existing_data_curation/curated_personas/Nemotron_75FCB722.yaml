  career_goals: Yanneth aims to move from a frontline surveillance officer to a senior surveillance manager at a major casino, overseeing a team and shaping security protocols. She plans to complete a bachelor's
    degree in criminal justice or security management to qualify for higher‑level leadership roles. Long‑term, she envisions becoming a certified security consultant specializing in gaming fraud prevention,
    and she hopes to design a training curriculum that emphasizes creative, on‑the‑spot decision making. Her love of art also fuels a side ambition to transition into museum security, where she can merge
    her protective expertise with her appreciation for cultural heritage.
