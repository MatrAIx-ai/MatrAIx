    Communication'', ''Financial Reporting and Budgeting'']'
  hobbies: '[''Traditional Mexican Cooking'', ''Herb Gardening'', ''Reading Business and Veterinary Innovation Literature'', ''Yoga'', ''Hiking in the Blue Hills'', ''Animal Shelter Volunteering'', ''Mentoring
    Volunteers'']'
  career_goals: Lilia aims to advance into a senior management role within a multi‑specialty veterinary practice, leveraging her business background to improve operational efficiency and patient outcomes.
    Over the next five years, she plans to obtain certification as a Certified Veterinary Practice Manager (CVPM) and lead a clinic-wide quality improvement initiative. Long‑term, she envisions establishing
    a community‑focused animal health consultancy that offers preventive care workshops for pet owners, especially targeting Spanish‑speaking households in the Greater Boston area.
