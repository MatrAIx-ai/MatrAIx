personas:
  professional: Marcella Wilson, a budding robotics engineer and debate champion, merges her love for practical problem‑solving with a flair for persuasive argument, using her critical eye and competitive
    drive to lead school tech projects while thriving in the spotlight of the theater stage.
  sports: Marcella Wilson is a midfielder on the local youth soccer club, a fervent fan of the national women's team and New York City FC, and approaches fitness with a data‑driven mindset, tracking her
    sprint times on a wearable and using her competitive edge to push through drills while encouraging teammates with her trademark banter.
  arts: Marcella Wilson shines in community theater productions, channels her sci‑fi passion by quoting Isaac Asimov and watching performances by Millie Bobby Brown, and curates a personal playlist that
    mixes the soaring scores of Hans Zimmer with the pop hooks of Ariana Grande, letting the arts shape her confidence on and off the stage.
  travel: Marcella Wilson has explored the nearby science museum in her hometown and dreams of attending the Tokyo Robotics Expo and catching a West End musical in London, preferring a mix of structured
    day‑trip itineraries with spontaneous detours to local cafes, all while balancing the limited budget of a typical middle‑schooler.
  culinary: Marcella Wilson enjoys whipping up pepperoni pizza with extra mozzarella, crafting simple spaghetti al Pesto using fresh basil and pine nuts, and savoring a steaming bowl of pork‑bone ramen
    on weekend study sessions, though she often forgets to hydrate between coding marathons.
  core: Marcella Wilson is a talkative, competition‑driven teen who bolts between robotics builds and drama rehearsals, hoarding spare change for gadgets while sometimes sacrificing sleep for the perfect
    code.
background:
  cultural: Marcella grew up in Freeport, a small Midwestern town in Illinois, surrounded by a close‑knit community that values hard work, modesty, and neighborly support. Her family reflects typical Midwestern
    white‑American traditions, including participation in local church activities, seasonal community events like county fairs, and a strong emphasis on education and self‑reliance. The town’s agricultural
    roots and school culture have encouraged her practical outlook, while exposure to broader media and online communities fuels her curiosity and competitive drive.
