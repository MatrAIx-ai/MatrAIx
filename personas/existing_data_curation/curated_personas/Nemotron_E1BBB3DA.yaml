  hobbies: '[''Urban street photography'', ''Cycling and bike maintenance'', ''Board game strategy (e.g., Settlers of Catan, Ticket to Ride)'', ''Vintage electronics repair'', ''Listening to classic rock
    vinyl'', ''Reading nonfiction (urban planning, technology)'', ''Sketching/drawing'', ''Pick‑up basketball'', ''Exploring local neighborhoods'']'
  career_goals: William aims to turn his eclectic skill set into a sustainable, independent livelihood. In the next two years he plans to complete his GED and enroll in a community‑college certificate program
    in carpentry or building maintenance, which will give him formal credentials while preserving his hands‑on approach. He hopes to launch a modest, owner‑operated handyman service that can be scheduled
    on a flexible basis, allowing him to take on projects that interest him—particularly home‑renovation, bike repair, and electronics refurbishing. As his reputation grows, he envisions opening a small
    workshop space in a Brooklyn industrial loft where he can offer DIY classes, collaborate with local artists, and provide low‑cost repair services to his neighborhood. Ultimately, he wants to achieve
    financial independence without sacrificing the freedom to explore new ideas.
