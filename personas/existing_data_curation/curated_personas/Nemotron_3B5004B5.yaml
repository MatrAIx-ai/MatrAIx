  hobbies: '[''Watercolor painting'', ''Landscape photography'', ''Gardening'', ''Woodworking'', ''Reading science fiction'', ''Hiking'', ''Visiting art museums'', ''Vintage car restoration'']'
  career_goals: Approaching retirement, Mary Jane aims to transition into a senior advisory and consulting role where she can apply her engineering expertise to sustainable product development and emerging
    technologies such as renewable energy systems. She hopes to lead small, flexible R&D teams focused on eco‑friendly mechanical solutions, secure a handful of patents that blend functional engineering
    with aesthetic design, and mentor the next generation of engineers through one‑on‑one coaching rather than formal coursework. Ultimately, she envisions a part‑time consultancy that allows her to maintain
    intellectual challenge while preserving ample solitary time for creative pursuits.
