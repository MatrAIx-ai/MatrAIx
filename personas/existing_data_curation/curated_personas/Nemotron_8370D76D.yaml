  career_goals: Christopher aims to establish a nonprofit art hub in Dubois that showcases contemporary Western voices while providing mentorship for emerging artists. He hopes to secure a national artist‑in‑residence
    fellowship that will allow him to experiment with large‑scale environmental installations. Over the next five years, he plans to publish a visual memoir linking his personal journey with the landscapes
    of Wyoming, expand his practice into immersive digital media, and place his work in regional museums and public spaces. He also envisions teaching a semester‑long art history course at a nearby community
    college, leveraging his competitive drive to earn recognition for his innovative approach.
