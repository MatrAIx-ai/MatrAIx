personas:
  professional: Susan Wills, an aspiring kindergarten teacher in training, organizes their pretend classroom with tidy lesson plans and patiently guides their stuffed‑toy students, showcasing their practical,
    methodical nature and deep compassion for others.
  sports: Susan Wills enjoys toddling on the ski slopes at a family‑friendly resort in the Wasatch Mountains during winter and plays on the Provo Little Kickers soccer team in the spring, cheering for the
    Utah Jazz and the Utah Utes as their hometown sporting icons.
  arts: Susan Wills delights in drawing bright dinosaurs and singing along to the songs of The Wiggles and Sesame Street, often mimicking characters like Elmo and sharing their favorite Disney movie 'Frozen'
    soundtrack while practicing their tiny piano keys.
  travel: Susan Wills loves family road trips to scenic spots like Zion National Park and the Alpine Loop, and dreams of visiting Disneyland Paris for a magical adventure, preferring itineraries that balance
    short rides with plenty of snack breaks and nap time.
  culinary: Susan Wills favors cheesy mac‑and‑cheese, chicken nuggets, and apple slices, enjoys helping their grandma stir batter for banana muffins, and proudly knows the difference between cheddar and
    mozzarella, often declaring that cheese makes everything better.
  core: Susan Wills is a delightfully organized four‑year‑old who balances a love for structure, compassion, and playful curiosity, often turning everyday chores into miniature projects and occasionally
    hoarding stickers in secret piles.
background:
  cultural: Susan is a white child raised in Provo, Utah County, a largely suburban community in the Intermountain West. Her family participates in local community events such as church gatherings, neighborhood
    picnics, and school activities that emphasize family values, cooperation, and service. The region’s cultural environment includes an emphasis on education, outdoor recreation like hiking and skiing,
    and a close‑knit community that values kindness and helping others.
attributes:
  skills: '["alphabet recognition", "counting to twenty", "shape and color sorting", "following multi-step routines", "sharing and comforting peers", "simple puzzle completion (12 pieces)", "building block
    arrangement"]'
  hobbies: '["building block construction", "picture puzzle solving", "sorting games (colors, shapes)", "storytime and library visits", "nature walks and collecting natural items", "drawing and coloring",
    "helping with simple household chores"]'
  career_goals: Susan often talks about growing up to be someone who helps others and keeps things orderly. She says she wants to be a teacher because she enjoys sharing stories and helping friends learn.
    She also imagines working as a veterinarian or a nurse, caring for animals and people. Her love of routines leads her to consider a future as a librarian or a preschool assistant, where she can organize
    books and create predictable learning environments.
