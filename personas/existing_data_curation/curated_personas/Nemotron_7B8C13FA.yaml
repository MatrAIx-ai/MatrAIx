personas:
  professional: Cedric Davis is a 16‑year‑old aspiring visual communicator who blends digital illustration expertise in Procreate and Photoshop with a self‑taught knack for HTML and CSS, channeling their
    curiosity and meticulous cataloguing of marine life into eco‑focused design concepts while navigating the stress of school deadlines with a blend of reserved focus and occasional assertive teamwork.
  sports: Cedric Davis enjoys early‑morning beach runs and seasonal surf sessions, participates in the local high school beach‑volleyball club, supports the New Orleans Saints in the NFL and the Alabama
    Crimson Tide football team, and balances a laid‑back fitness routine with occasional anxiety‑driven over‑exertion during group cleanup marathons.
  arts: Cedric Davis draws creative energy from listening to John Coltrane’s modal jazz, contemporary gospel vocalist Kirk Franklin, and introspective hip‑hop beats of Kendrick Lamar while sketching marine
    ecosystems, and they regularly cite Wyland’s underwater murals and the surreal landscapes of Studio Ghibli as visual inspirations.
  travel: Cedric Davis prefers low‑key, nature‑centered trips planned months in advance, favoring weekend getaways to the Florida Keys and occasional family visits to New Orleans for its music scene, while
    dreaming of snorkeling the Great Barrier Reef and exploring the misty cliffs of Cinque Terre when finances allow.
  culinary: Cedric Davis, a budding home cook, favors Southern coastal dishes like shrimp and grits, fried catfish with hushpuppies, and key lime pie, often seasoning their meals with fresh lemon zest,
    cilantro, and a dash of Cajun spice, though they occasionally over‑salt their gumbo when experimenting late at night.
  core: Cedric Davis is a curious, beach‑dwelling teenage artist who habitually catalogues shells in a journal, wrestles with anxiety that spikes during school projects, and turns late‑night video edits
    into vibrant advocacy for coastal conservation.
background:
  cultural: Cedric is an African‑American teen raised in Orange Beach, Alabama, where his upbringing reflects a blend of Southern Black cultural traditions and Gulf‑Coast maritime life. Family and church
    have been central pillars; he regularly attends a local Baptist congregation where choir singing and community outreach shape his sense of belonging. Southern soul food traditions, such as cooking collard
    greens and fried catfish, feature in family gatherings, reinforcing intergenerational bonds. At the same time, the proximity to the ocean has instilled a deep respect for fishing, boating, and the natural
    rhythms of the tide, connecting him to a legacy of Black coastal laborers who have historically contributed to the region's fishing industry. His identity is further enriched by exposure to African‑American
    artistic movements, from the Harlem Renaissance to contemporary street art, inspiring his own creative pursuits while navigating the socioeconomic challenges that many young Black residents of the area
    face.
attributes:
