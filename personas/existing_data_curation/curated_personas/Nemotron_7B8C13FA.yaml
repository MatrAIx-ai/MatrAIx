  hobbies: '[''sketching beach landscapes'', ''photographing tide pools'', ''collecting shells'', ''listening to jazz, gospel, and hip‑hop'', ''writing short speculative fiction'', ''playing rhythm guitar'',
    ''creating and editing short video clips for social media'']'
  career_goals: Cedric aims to earn his GED within the next year and enroll in a community‑college program focused on graphic design and visual communication. He hopes to combine his artistic talent with
    his interest in coastal conservation, eventually working as a visual strategist for environmental NGOs that protect the Gulf Coast. In the longer term, he envisions opening a small studio in Orange
    Beach where he can create custom murals, branding, and educational media for local tourism businesses while also offering workshops that teach other young people about sustainable practices. His career
    plan balances structured milestones—such as completing certification courses—with the flexibility to explore unconventional projects that align with his creative curiosity.
