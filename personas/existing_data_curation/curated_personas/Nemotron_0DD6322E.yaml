  career_goals: At one year old Jody does not have defined career aspirations, but her heightened interest in picture books, bright illustrations, and crayons hints at an early fascination with visual storytelling.
    Her caregivers nurture a gentle ambition for her to pursue creative outlets such as drawing or painting in the future, while also supporting her natural curiosity about how things work, which could
    evolve into an interest in science or engineering as she grows.
