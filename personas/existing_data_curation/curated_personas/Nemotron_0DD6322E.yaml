personas:
  professional: Jody King, a 1‑year‑old budding explorer of sensory environments, demonstrates early analytic curiosity by methodically inspecting every new toy and systematically arranging blocks, foreshadowing
    a future as a meticulous problem‑solver.
  sports: Jody King, a 1‑year‑old who enthusiastically joins parent‑led baby gymnastics classes and mimics the moves of the local junior soccer team mascot during weekends, loves kicking soft foam balls
    in the living room and proudly wears a tiny jersey of the hometown baseball team, the Riverdale Rangers, reflecting a competitive yet solitary approach to physical play.
  arts: Jody King, a 1‑year‑old who delights in bright picture books by Eric Carle, claps along to the upbeat melodies of The Wiggles, goes wide‑eyed over the swirling colors of the Pixar short Purl, and
    experiments with finger‑sized crayons to ‘paint’ on construction paper, showcasing a vivid appreciation for visual and auditory art despite limited language.
  travel: Jody King, a 1‑year‑old who has already traveled on a family road trip to Grandma’s farm in the countryside and taken a short flight to visit an aunt in Seattle, prefers stroller adventures over
    long car rides, and delights in the sensory overload of the local aquarium’s touch pool, balancing limited attention span with a budding curiosity for new places.
  culinary: Jody King, a 1‑year‑old who favors smooth sweet potato puree, avocado mash, and banana finger foods, loves the bright orange of carrot sticks but often creates a mess by flinging peas, occasionally
    sneaks bites of buttery crackers from the countertop, and shows an adventurous palate for gentle spices like cinnamon.
  core: Jody King, a 1‑year‑old curious explorer with methodical toy arrangements, intense emotional swings, and a competitive spark balanced by quiet solo play.
background:
  cultural: 'Jody is a white American child raised in Cranston, Rhode Island, a suburban community in Providence County. Her family reflects typical New England cultural practices: celebrating holidays
    such as Thanksgiving, Christmas, and the Fourth of July with family gatherings and community events, attending a local preschool that emphasizes early literacy, arts, and inclusive play. The neighborhood’s
    cultural atmosphere includes visits to the local library’s story‑time sessions, community park outings, and exposure to the region’s maritime heritage. While her background is broadly Anglo‑American,
    her caregivers intentionally introduce diverse ideas and artistic experiences to nurture her open and unconventional thinking.'
