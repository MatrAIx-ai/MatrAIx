persona_description: A researcher and historian interested in the history of nursing in India, particularly the work of women nurses during the British Raj. They are knowledgeable about the establishment
  and regulation of nursing practices in India, the contributions of women nurses to the healthcare system, and the challenges they faced. They are also interested in the experiences of Australian and British
  Army nurses in India during the First World War and the role of women in the military during that time. They may have a background in medical history, sociology, or anthropology.
