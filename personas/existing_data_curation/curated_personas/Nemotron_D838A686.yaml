  career_goals: Even at this young age, Dorothy talks about wanting to be a teacher because she loves setting up organized activities for other children, and she dreams of becoming a gymnastics champion,
    picturing herself winning ribbons at preschool competitions. Her long‑term ambition is to hold a role where she can create structure, achieve high standards, and be recognized for her accomplishments.
