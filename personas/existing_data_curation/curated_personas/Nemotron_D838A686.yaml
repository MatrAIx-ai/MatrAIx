personas:
  professional: Dorothy Williams, a 3-year-old aspiring architect who spends hours arranging LEGO bricks into perfectly symmetrical structures, demonstrates disciplined focus and a competitive edge by challenging
    peers to build taller towers while insisting on a strict daily schedule, and they proudly display each completed set on a miniature exhibition shelf.
  sports: Dorothy Williams, a Mini‑MVP age‑3 soccer enthusiast, idolizes the New York Yankees and the Chicago Bulls, and regularly attends Little Legends Soccer Club practices where they compete for the
    fastest sprint award.
  arts: Dorothy Williams, a bright‑eyed fan of the animated series Sesame Street and the musical tunes of Raffi, spends afternoons dancing to The Wiggles, secretly mimics Elvis Presley’s hip moves, and
    they fill sketchbooks with crayon drawings of their favorite character Elmo.
  travel: Dorothy Williams, an adventurous tot who recently explored the interactive exhibits at the Children’s Museum of Indianapolis, splashed in the sand at Florida’s Clearwater Beach, and they dream
    of a family trip to the Disney World Resort in Orlando next summer.
  culinary: Dorothy Williams, a picky yet curious eater, delights in crunchy chicken nuggets with honey‑mustard dip, insists on macaroni and cheese topped with extra cheddar, and they proudly help stir
    mashed sweet potatoes while refusing broccoli with a distinct grimace.
  core: Dorothy Williams, a three‑year‑old bundle of boundless energy who obsessively lines up toy cars, negotiates for the biggest slice of cake, and demands a bedtime story exactly at 7:30 p.m., they
    blend meticulous organization with a fierce competitive spark.
background:
  cultural: Dorothy is raised in Hialeah, Florida, a lively multicultural community. While her family identifies as white and primarily English‑speaking, they are immersed in the diverse cultural fabric
    of South Florida. She hears Spanish spoken by neighbors, participates in local festivals such as Calle Ocho, and celebrates mainstream American holidays like Halloween, Thanksgiving, and Christmas.
    This blend of mainstream U.S. traditions with the vibrant, multilingual atmosphere of Hialeah shapes a culturally aware yet family‑centered upbringing.
