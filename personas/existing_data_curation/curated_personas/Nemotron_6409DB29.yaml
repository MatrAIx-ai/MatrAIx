  hobbies: '["Vegetable gardening","Woodworking","Reading horticulture books","Listening to salsa and bolero music","Coastal walking","Fishing","Cooking Puerto Rican cuisine","Watching baseball","Plant
    photography"]'
  career_goals: Tahimy aims to move into a supervisory role within the municipal parks department, eventually becoming a crew foreman or shift manager. He plans to earn a Certified Horticulturist credential
    and to integrate water-efficient landscaping techniques into his work. Long‑term, he hopes to launch his own eco‑friendly landscaping business that serves neighborhoods in Ponce, focusing on native
    plants and low‑maintenance designs, while also establishing a small organic garden on a parcel of land for his family.
