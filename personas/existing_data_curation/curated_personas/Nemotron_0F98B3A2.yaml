  hobbies: '[''Cooking Mexican Dishes'', ''Salsa Dancing Workshops'', ''Reading Business Books'', ''Yoga and Pilates'', ''Community Tutoring (English/Spanish)'', ''Balcony Herb Gardening'', ''Art Gallery
    Visits'', ''Street Photography'']'
  career_goals: Short-term, she aims to become a store manager within the next one to two years, raising sales performance and reducing shrinkage through tighter operational controls. Mid-term, she aspires
    to advance to a district-manager role overseeing multiple Brooklyn locations, where she can implement omnichannel strategies such as click-and-collect and integrate data analytics across stores. Long-term,
    Xiomara plans to pursue an executive MBA to qualify for a corporate retail operations position or to launch her own boutique that blends Mexican culinary heritage with lifestyle retail. Throughout her
    career path, she is committed to mentoring Latinx employees and championing diversity and inclusion initiatives within the organization.
