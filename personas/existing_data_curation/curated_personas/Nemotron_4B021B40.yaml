  career_goals: Bertha aims to advance to a senior project manager role within the next three years, eventually moving into a PMO director position where she can shape organization‑wide project standards
    across the region. She plans to earn or renew her PMP certification and lead high‑visibility, multi‑disciplinary initiatives that deliver measurable community impact. Her competitive drive pushes her
    to surpass performance benchmarks, mentor junior project managers, and foster a culture of reliability and continuous improvement. In the longer term, she envisions establishing a boutique consulting
    firm that assists small New England businesses in implementing efficient, routine‑focused project practices.
