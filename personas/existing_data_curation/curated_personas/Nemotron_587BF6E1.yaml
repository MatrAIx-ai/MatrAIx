personas:
  professional: David Croft, a 44-year-old electrician with deep expertise in NEC-compliant residential wiring, low-voltage data cabling, and emerging solar PV installations, they apply their disciplined,
    solitary work style and meticulous project scheduling to deliver consistently flawless job sites and to mentor apprentices with quiet confidence.
  sports: David Croft enjoys low-key fitness through weekly hikes with the Shenandoah Trail Runners, weekend fishing on the Shenandoah River, and follows the Washington Commanders and Virginia Tech Hokies
    fervently, while they occasionally volunteer as a safety official for the local high-school baseball league.
  arts: David Croft channels his appreciation for craftsmanship into woodworking inspired by Sam Maloof, listens to bluegrass legends like The Stanley Brothers and modern folk artist Chris Stapleton, collects
    vintage 1930s railway posters, and they attend occasional community theater productions of classic plays at the Luray Playhouse.
  travel: David Croft favors self-planned road trips in a sturdy pickup, spending weekends exploring Shenandoah National Park, historic Gettysburg, and the artsy streets of Asheville, while they dream of
    an eco-tour through Iceland’s geothermal sites once their solar contracting business stabilizes.
  culinary: David Croft enjoys cooking hearty, home-grown meals such as fried catfish with hush-puppies, smoked pork shoulder, and homemade apple butter, often seasoning with rosemary and basil from their
    garden, and they occasionally treat themselves to pepperoni rolls from a local bakery when a project runs late.
  core: David Croft is a disciplined, solitary electrician turned solar-energy entrepreneur; they apply a love for precision, self-reliance, and quiet craftsmanship to every aspect of work, finances, health,
    and hobbies.
background:
  cultural: David grew up in a working‑class, Anglo‑American family in the Shenandoah Valley, where self‑reliance and craftsmanship are valued. The region’s agricultural heritage and close‑knit community
    have shaped his respect for tradition, modesty, and family life. He maintains strong ties to local customs, such as regional food traditions and community gatherings, and often participates in church‑related
    volunteer efforts. His cultural identity reinforces his preference for structured, dependable work and a quiet, solitary lifestyle.
attributes:
  skills: '["Residential electrical wiring", "Commercial electrical systems", "Electrical code compliance (NEC)", "Blueprint reading", "Conduit bending", "Solar panel installation", "Low‑voltage data cabling",
    "Electrical safety inspections", "Project scheduling", "Technical documentation", "Apprentice training", "Troubleshooting and diagnostics"]'
  hobbies: '["Home DIY projects", "Woodworking", "Model train building", "Fishing", "Hiking in Shenandoah National Park", "Home automation tinkering", "Reading technical manuals", "Crossword puzzles", "Gardening",
    "Volunteer electrical safety workshops"]'
  career_goals: David aims to achieve Master Electrician licensure within the next two years and eventually launch his own small electrical contracting firm focused on renewable energy solutions for rural
    Virginia homes. He aspires to become a certified NABCEP PV installer and to be recognized locally for an exemplary safety record. Mentoring the next generation of electricians and contributing to community
    safety workshops are also central to his long‑term professional vision.
