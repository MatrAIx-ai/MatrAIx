  career_goals: Although retired, Dena aims to deepen her community impact. She plans to take on a mentorship role at the local senior center, helping younger volunteers develop leadership skills. She hopes
    to launch a small‑scale oral‑history project to document Oscoda’s heritage, and she intends to enroll in a digital storytelling workshop to share those stories online. Staying active and healthy, Dena
    also aspires to travel to historic sites in the Midwest and complete a short course on horticulture to enhance her garden.
