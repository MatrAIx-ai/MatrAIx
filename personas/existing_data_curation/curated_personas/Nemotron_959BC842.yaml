personas:
  professional: An aspiring junior architect, Russ Pass channels their vivid imagination and meticulous planning into elaborate LEGO cityscapes, collaborates eagerly with friends on group designs, and dreams
    of sketching real skyscrapers one day.
  sports: An enthusiastic forward for the Midtown Mavericks U‑8 soccer team, Russ Pass dashes across the field after school, practices drills twice a week, cheers for FC Barcelona’s Lionel Messi during
    weekend broadcasts, and loves the camaraderie of weekend park matches with friends.
  arts: A vibrant art club member, Russ Pass fills sketchbooks with colorful drawings inspired by Pixar’s “Wall‑E,” Studio Ghibli’s “My Neighbor Totoro,” and the bold street murals of Keith Haring, eagerly
    collaborates on school murals, and sings along to the “Frozen” soundtrack while painting.
  travel: A curious explorer, Russ Pass has trekked the nearby Pine Trail, visited the state nature reserve on a family weekend, toured the Kennedy Space Center in Florida, dreams of a future virtual‑reality
    trip to the International Space Station, and hopes to wander through the castles of Scotland next summer.
  culinary: A budding chef, Russ Pass loves assembling cheese pizza with pepperoni, whipping up macaroni and cheese, crafting fruit smoothies with banana and blueberries, and proudly mixes cookie dough
    for chocolate‑chip cookies, though they sometimes sneak extra chocolate chips into the batter.
  core: Russ Pass is an imaginative, organized seven‑year‑old who blends boundless creativity with methodical planning, turning LEGO bricks and sketchpads into daily adventures while juggling pocket money,
    soccer drills, and occasional allergy sniffles.
background:
  cultural: Russ was born and raised in Lexington, Kentucky, a city known for its horse farms, horse racing heritage, and Southern hospitality. He grew up in a middle‑class family that values community
    involvement, frequent visits to local museums, and attendance at the annual Kentucky State Fair. His school environment emphasizes collaborative learning and extracurricular activities such as choir
    and sports. Family traditions include Sunday church gatherings and storytelling evenings that celebrate regional folklore, which have nurtured his imaginative and cooperative nature.
attributes:
  skills: '[''Reading comprehension (2nd‑grade level)'', ''Basic addition and subtraction'', ''Creative drawing and storytelling'', ''Digital navigation on educational tablets'', ''Organizational skills
    (keeping supplies and schedules)'', ''Cooperative group play and conflict mediation'']'
  hobbies: '[''Drawing and painting'', ''LEGO building'', ''Reading adventure and space books'', ''Playing soccer'', ''Nature walks and rock collecting'', ''Watching space‑themed animated shows'', ''Participating
    in school art club'']'
  career_goals: Russ dreams of becoming an astronaut who explores distant planets, inspired by his love for novelty and abstract concepts. He also imagines himself as a painter who creates bold, imaginative
    murals, and he expresses a desire to help others as a teacher who makes learning fun. His ambition includes leading group projects, such as organizing a school science fair, and later contributing to
    community art initiatives in Lexington.
