  hobbies: '["Book club participation", "Chinese cooking and recipe experimentation", "Gardening (vegetable and herb beds)", "Volunteering at senior community center (event organization)", "Attending Asian
    cultural festivals", "Mandarin calligraphy practice", "Puzzle solving (crosswords, Sudoku)", "Exploring new technology (cloud services, apps)", "Karaoke nights", "Community theater outings"]'
  career_goals: Ying aims to advance to a senior office manager role where she can lead a team of administrative staff and drive efficiency improvements across the office. She plans to obtain a Certified
    Administrative Professional (CAP) credential to formalize her expertise. mentorship is a priority; she hopes to mentor younger clerks, sharing best practices for organization and stress management.
    As she approaches retirement, Ying envisions transitioning to part‑time consulting, offering small businesses streamlined record‑keeping and workflow solutions. Financial security for her later years
    and the ability to continue contributing to her community remain central motivations.
