persona_description: A political science professor who specializes in the study of political representation, particularly its history, context, and ethical implications. She is a visiting assistant professor
  at Duke University and has research interests in the political literature of seventeenth-century revolutionary authors and Medieval and Renaissance Studies. She is teaching a course on the U.S. Supreme
  Court cases of Citizens United v. FEC and Evenwel v. Abbott, exploring their implications for the ethical and legal definitions of "personhood" and the mathematical problems of fair representation.
