  career_goals: Anabella hopes to earn a certified forklift operator credential and move into a supervisory role such as Warehouse Team Lead, where she can apply her organizational talent and creative eye
    for process improvement. She is interested in pursuing a short‑term certification in supply‑chain fundamentals to broaden her logistics knowledge. Over the longer term, she dreams of launching a modest
    home‑based studio where she can sell her abstract paintings and handcrafted Mexican‑inspired artwork, providing an additional income stream and a creative outlet that aligns with her imaginative nature.
    Financial stability for her family and reducing daily stress are key motivations behind these goals.
