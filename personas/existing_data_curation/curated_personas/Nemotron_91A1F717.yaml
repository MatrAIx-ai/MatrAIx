personas:
  professional: Michael Miller, a budding LEGO architect, constructs step‑by‑step creations with the precision of a junior engineer, channeling his love for routine and methodical planning into every set
    he completes.
  sports: Michael Miller plays third base for the Brandon Tigers youth baseball team, eagerly practices his swing during the summer league, idolizes the New Orleans Saints on Sundays, and has a poster of
    the Memphis Grizzlies on his bedroom wall as a source of inspiration.
  arts: Michael Miller spends afternoons drawing Disney’s Mickey Mouse and other cartoon heroes, listens to the lively tunes of The Wiggles and Raffi while rereading Jeff Kinney’s ‘Diary of a Wimpy Kid,’
    and proudly displays a hand‑crafted paper snowflake he made during church Sunday school crafts.
  travel: Michael Miller enjoys weekend trips to the Smith County fair and family outings to Biloxi’s Gulf Coast beach, while dreaming of a future adventure at Disney World in Orlando and a school field
    trip to explore the Smithsonian museums in Washington, D.C.
  culinary: Michael Miller favors buttery buttermilk biscuits drizzled with honey, crispy fried catfish seasoned with cornmeal, and sweet tea made with fresh lemon slices, and loves helping his family stir
    the apple‑pie filling of tart Granny Smith apples and a pinch of cinnamon.
  core: Michael Miller is a methodical 7‑year‑old who thrives on routine, lovingly collects smooth river rocks, sometimes forgets to put away his LEGO bricks, yet always makes time to help a friend in need.
background:
  cultural: Michael grows up in Brandon, a small town in Smith County, Mississippi. His family reflects typical Southern values of hospitality, respect for elders, and close community ties. Routine is a
    core part of daily life, with set meal times, a bedtime schedule, and regular church attendance. He attends a local public elementary school where teachers emphasize reliability, cooperation, and respectful
    behavior. Community events such as the county fair, church potlucks, and neighborhood baseball games provide him with opportunities for small‑group interaction. Southern cuisine and seasonal activities
    like fishing in the nearby creek are part of his upbringing, reinforcing his connection to the local culture while nurturing his compassionate and cooperative nature.
