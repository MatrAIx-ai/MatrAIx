  hobbies: '[''Building LEGO sets'', ''Reading \''Diary of a Wimpy Kid\'' series'', ''Jigsaw puzzles'', ''Caring for family dog'', ''Short nature walks'', ''Helping with garden chores'', ''Playing checkers'',
    ''Collecting river rocks'', ''Sunday school crafts'']'
  career_goals: Michael dreams of a future where he can help others in a structured and reliable way. He often says he would like to become a veterinarian because he enjoys caring for animals and likes
    the idea of keeping detailed health records. He is also fascinated by firefighters, admiring their teamwork, dependable service, and role in keeping the community safe. In the short term, he aims to
    be a 'classroom helper', assisting his teacher with organizing supplies and supporting classmates.
