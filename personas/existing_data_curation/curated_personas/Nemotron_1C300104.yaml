  hobbies: '["Soccer (local adult league)", "Cooking Mexican dishes and experimenting with recipes", "Gardening (home vegetable garden)", "Attending church festivals and cultural celebrations", "Woodworking
    and small carpentry projects", "Playing guitar (banda and mariachi music)", "Listening to regional music (banda, mariachi)", "Participating in trivia and bingo nights", "Volunteer mentoring at youth
    garden programs", "DIY home repairs and projects"]'
  career_goals: Although currently out of the formal workforce, Eric aims to earn his GED within the next year to open more part‑time opportunities. He wishes to secure a regular vendor spot at the Visalia
    farmer’s market where he can sell homemade salsas and seasonal produce, leveraging his gardening and cooking expertise. Eric also aspires to become a mentor for younger community members, leading garden
    workshops and sharing his practical skills. To balance his competitive streak, he plans to enter the regional senior cooking competition, hoping to win recognition and boost his confidence while managing
    his stress through structured goals and a steady income stream.
