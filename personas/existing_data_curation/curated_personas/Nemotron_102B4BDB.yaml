personas:
  professional: Militza Lara is a bilingual floral designer and budding entrepreneur who combines a deep knowledge of color theory, sustainable sourcing, and project management to create vibrant wedding
    and corporate installations that weave marigold garlands and papel picado motifs into contemporary aesthetics while juggling budgets and client relationships with disciplined organization.
  sports: Militza Lara energizes her week with salsa and bachata dance nights at Café Del Sol, weekend hikes on the Lost Lake Trail with the Will County Trailheads Club, and cheering on the Chicago Bulls
    and Chicago Cubs, while joining a local trivia league that doubles as an informal cardio workout.
  arts: Militza Lara immerses herself in the arts by curating playlists featuring Celia Cruz and Juanes for her events, visiting the Art Institute of Chicago to study Diego Rivera murals, reading historical
    fiction by Isabel Allende, and participating in community workshops that celebrate traditional paper‑cutting (papel picado) and flower‑arranging artistry.
  travel: Militza Lara’s travel style blends purposeful cultural pilgrimages—such as attending Día de los Muertos festivities in Oaxaca and exploring the flower markets of Medellín—with relaxed road trips
    to Lake Geneva, Wisconsin and the vibrant streets of New Orleans during Mardi Gras, always budgeting for both inspiration and weekend getaways with friends.
  culinary: Militza Lara’s kitchen is a bustling haven where she crafts tamales, pozole, and chiles en nogada for gatherings, experiments with edible pansies and rose petals in desserts, and occasionally
    splurges on premium avocados and fresh cilantro while admitting she sometimes forgets to meal‑prep during busy weeks.
  core: Militza Lara is a fiercely competitive, detail‑driven floral entrepreneur whose love of vibrant traditions, group dance, and meticulous budgeting coexists with a penchant for late‑night work marathons
    and occasional sleep deprivation.
background:
  cultural: Militza grew up in a Mexican‑American household in the Chicago suburbs, where Spanish and English were spoken interchangeably. Her family upheld traditions such as Día de los Muertos and Las
    Posadas, and they often incorporated vibrant marigold garlands and papel picado into celebrations, experiences that later inspired her floral aesthetic. While embracing her Mexican heritage—through
    cuisine, music, and familial values—she also absorbed the Midwestern work ethic and community spirit of New Lenox. This dual cultural lens informs her designs, business approach, and her dedication
    to serving a diverse clientele with respect and authenticity.
attributes:
  skills: '[''Floral Design & Arrangement'', ''Color Theory'', ''Seasonal Botanical Knowledge'', ''Event Planning and Coordination'', ''Client Consultation'', ''Bilingual Communication (Spanish & English)'',
    ''Inventory Management'', ''Budgeting and Cost Control'', ''Sustainable Sourcing Practices'', ''Project Management'', ''Photography for Portfolio'']'
  hobbies: '[''Latin dance (Salsa & Bachata)'', ''Hiking and nature walks'', ''Cooking traditional Mexican cuisine'', ''Volunteering at community cultural events'', ''Attending flower arrangement workshops'',
    ''Reading botanical literature and historical fiction'', ''Playing chess and participating in trivia nights'', ''Gardening at home'', ''Exploring local art galleries'', ''Photography of natural scenes'']'
  career_goals: Militza aims to open her own boutique floral studio in the greater Chicago area that showcases a blend of contemporary design and Mexican cultural motifs. She plans to build a network of
    local farms for sustainably sourced flowers, expand into mobile pop‑up installations for festivals, and develop a series of hands‑on workshops for aspiring designers. Within the next five years, she
    aspires to be recognized as a leading floral designer in Illinois, mentor junior designers, and possibly pursue a master's degree in design management to broaden her strategic and entrepreneurial skill
    set.
