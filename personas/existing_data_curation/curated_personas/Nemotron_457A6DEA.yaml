personas:
  professional: Alicia Ramos, a protective‑service specialist with a keen eye for routine, blends expertise in security patrols, CCTV monitoring, and detailed incident reporting with the delicate role of
    cultural liaison, using tribal protocols to build trust while navigating a competitive drive toward supervisory positions, a relaxed approach to paperwork, and moderate talkativeness during briefings.
  sports: Alicia Ramos enjoys competitive softball with the Pryor Pioneers, follows the Oklahoma City Thunder and Dallas Cowboys for excitement, and finds peace fishing on Lake Tenkiller on weekends, being
    more competitive than cooperative on the field yet enjoying lively banter with teammates.
  arts: Alicia Ramos creates beadwork and woven baskets for ceremonial use, often shares the stories behind each piece at community gatherings, listens to classic country legends like Johnny Cash, folk
    storytellers such as Gillian Welch, and watches western films like True Grit, letting these artistic outlets shape their identity and provide a creative release.
  travel: Alicia Ramos favors spontaneous road trips that blend adventure with cultural immersion, often heading to familiar routes through the Ozarks or to Santa Fe, while staying flexible enough to take
    detours for tribal cultural gatherings, all while balancing a modest travel budget that prioritizes nature over luxury.
  culinary: Alicia Ramos cultivates corn, beans, and squash in a traditional three‑sisters garden and cooks hearty stews with heirloom corn and pan‑seared catfish seasoned with local herbs, yet sometimes
    resorts to fast‑food tacos when the garden harvest runs low or time is scarce.
  core: Alicia Ramos is a routine‑driven, competitively spirited protective‑service professional who balances cultural stewardship, modest financial habits, and a love for outdoor recreation, all while
    occasionally letting organization slip in favor of flexibility.
background:
  cultural: Born and raised in Pryor, Oklahoma, Alicia is an enrolled member of the Cherokee Nation. Her parents, both fluent in Cherokee, instilled a strong sense of tribal identity by sharing stories,
    songs, and the importance of community reciprocity. She grew up attending tribal schools and community events, learning traditional crafts such as beadwork and basketry, and participating in seasonal
    ceremonies like the Bean Dance. While she works in a mainstream protective‑service agency, she regularly volunteers with the tribal police liaison program, helping bridge cultural gaps. Her worldview
    blends the values of her ancestors—respect for the land, reverence for elders, and collective responsibility—with the practical demands of modern life.
attributes:
  skills: '["Security patrol operations", "Access control", "CCTV monitoring", "Incident reporting", "First aid/CPR certification", "Defensive tactics", "Firearms safety", "Situational awareness", "De‑escalation
    techniques", "Crisis management", "Cultural liaison (Cherokee protocols)", "Investigative documentation", "Emergency‑response coordination", "Community outreach"]'
  hobbies: '["Vegetable gardening", "Beadwork", "Basket weaving", "Fishing at Lake Tenkiller", "Softball league", "Listening to country and folk music", "Watching western films", "Reading mystery novels",
    "Attending Cherokee cultural gatherings", "Participating in language classes and seasonal ceremonies"]'
  career_goals: Alicia aims to complete her associate degree in criminal justice within the next two years and then qualify for the Cherokee Nation Police Academy. Her primary ambition is to transition
    from a patrol role to a supervisory position, eventually becoming a shift commander or community‑relations specialist. She hopes to develop a culturally‑informed safety training program for tribal businesses
    and schools, and to mentor other Native American women entering protective‑service careers. Long‑term, she envisions contributing to policy development that integrates tribal law and modern public‑safety
    practices.
