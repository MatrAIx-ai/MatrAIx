personas:
  professional: Hanna Whitfield is a 16‑year‑old aspiring technician who channels the quick decision‑making of competitive first‑person shooters into hands‑on repairs—ranging from bike frames to kitchen
    appliances—while they lay the groundwork for a community‑college HVAC or automotive certification and a DIY tutorial YouTube channel.
  sports: Hanna Whitfield is a casual basketball enthusiast who joins weekend pickup games at the community park, roots for the nearby high‑school Wildcats while also following the Pittsburgh Steelers,
    spends quiet afternoons fishing the creek behind their house, and keeps a modest collection of vintage baseball caps from local teams.
  arts: Hanna Whitfield nurtures a love of folk and indie music—spinning Dolly Parton, The Lumineers, and Tame Impa on a portable speaker—while strumming a ukulele for personal enjoyment, snapping sunrise
    landscape photos with a smartphone, and drawing creative inspiration from county‑fair art displays and vintage Americana posters.
  travel: Hanna Whitfield dreams of swapping the familiar hills of their hometown for a road‑trip down the Blue Ridge Parkway to Asheville, already enjoys annual visits to the Lawrence County Fair, weekend
    trips to Hershey’s Chocolate World, and a summer bike‑ride pilgrimage to the historic town of Gettysburg.
  culinary: Hanna Whitfield whips up hearty tomato‑basil sauce, spicy pepper salsa, and batch‑baked chocolate‑chip cookies for friends, proudly seasons garden‑grown veggies with fresh rosemary and thyme,
    and occasionally experiments with smoked brisket after watching a cooking livestream, showcasing a growing confidence in the kitchen.
  core: Hanna Whitfield is a skeptical teen tinkerer who balances video‑game victories with garden weeds, trades sleep for micro‑transactions, and channels a practical work ethic into DIY projects and future
    trade school plans.
background:
  cultural: Hanna comes from a multi‑generational white family rooted in Hillsville, Pennsylvania. The town’s small, close‑knit community blends an agricultural past with modest manufacturing, fostering
    a strong work ethic and a practical outlook. Family gatherings often revolve around home‑cooked meals, backyard barbecues, and annual trips to the Lawrence County Fair, where she was raised on a mix
    of folk music, country tunes, and the occasional indie playlist she discovers online. While her family attends a local Methodist church, Hannah’s skeptical nature leads her to question traditions and
    seek out diverse viewpoints, especially through internet forums and documentary series. This blend of regional pragmatism, community‑centered values, and a curiosity about the broader world shapes her
    cultural identity.
attributes:
