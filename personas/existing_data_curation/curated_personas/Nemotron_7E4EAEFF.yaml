  hobbies: '["competitive gaming (FPS and strategy)", "DIY projects (building, repairing)", "gardening (vegetable and herb garden)", "fishing", "nature photography", "playing ukulele", "attending the county
    fair", "watching science documentaries", "casual basketball"]'
  career_goals: Hanna aims to turn her hands‑on abilities into a sustainable career without a traditional high‑school diploma. In the near term, she plans to enroll in a community‑based vocational program
    to earn a certification in automotive technology or HVAC, fields where her troubleshooting mindset and mechanical curiosity will be valuable. Simultaneously, she hopes to grow a modest YouTube channel
    that showcases DIY repair tutorials, gardening tips, and gaming strategy breakdowns, allowing her to combine her competitive spirit with her love of sharing knowledge. Long‑term, she envisions starting
    a small side‑business‑by‑the‑farm, selling home‑grown produce and handcrafted items at the local farmer’s market, eventually expanding into a weekend‑only repair service for bikes and small equipment.
    Throughout, she wants to maintain the flexibility to explore new interests, keeping her work life both practical and creatively open.
