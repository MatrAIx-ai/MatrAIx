personas:
  professional: Aaron Delacruz, a 36‑year‑old financial planner in Dallas, blends a data‑driven, structured approach to comprehensive financial planning with a personable, bilingual style that lets them
    create clear, adaptable plans while navigating occasional disorganization in their own schedule.
  sports: Aaron Delacruz, an enthusiastic 36‑year‑old, plays in a mixed‑age Dallas Metro Soccer League on weekends, never misses a Dallas Cowboys game with their family, and maintains fitness by hiking
    Texas Hill Country trails with a local outdoor club, though they occasionally skip scheduled gym sessions when work gets hectic.
  arts: Aaron Delacruz frequents live music venues in Dallas, where they enjoy Tex‑Mex‑influenced country concerts by the Zac Brown Band and traditional norteño sets by Los Tigres del Norte, while also
    catching occasional performances by indie rock group Whiskey Myers, reflecting an eclectic taste that balances energetic country anthems with roots‑style melodies.
  travel: Aaron Delacruz prefers short, family‑friendly road trips that combine outdoor adventure and cultural flavor, such as weekend hikes in the Texas Hill Country’s Enchanted Rock, day‑long explorations
    of Austin’s South Congress music scene, and a planned spring visit to Santa Fe’s art markets, all while balancing a modest travel budget and the kids’ school schedule.
  culinary: Aaron Delacruz showcases intermediate cooking skills by preparing traditional Mexican dishes like carne asada tacos with fresh cilantro, lime, and corn masa, hand‑making salsa verde with tomatillos
    and jalapeños, and occasionally tackling chiles en nogada during holiday gatherings, all while sourcing chilies, avocados, and queso fresco from local Dallas markets.
  core: Aaron Delacruz blends a structured, data‑centric mindset with a laid‑back, community‑focused lifestyle, juggling meticulous financial planning at work with spontaneous family soccer games, weekend
    hikes, and a love for Tex‑Mex and country music, all while navigating occasional disorganization and a habit of overcommitting to community events.
background:
  cultural: Aaron is a first‑generation Mexican‑American raised in a bilingual household in Dallas. He blends Mexican family traditions—such as celebrating Día de los Muertos and maintaining close extended‑family
    ties—with the independent spirit of Texan culture. His heritage informs his warm, relationship‑centric approach to advising, and his fluency in Spanish allows him to bridge cultural gaps for clients.
    He regularly participates in local Hispanic festivals, supports community initiatives that promote financial empowerment, and integrates cultural values of respect, generosity, and hard work into both
    his personal life and professional practice.
attributes:
  skills: '[''Financial planning'', ''Investment portfolio construction'', ''Retirement and tax strategy'', ''Client relationship management'', ''Risk assessment'', ''Bilingual communication (English/Spanish)'',
