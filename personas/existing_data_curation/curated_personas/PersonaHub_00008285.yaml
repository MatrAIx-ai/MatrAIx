persona_description: A scientist or environmentalist who is interested in the health and sustainability of freshwater streams, rivers, and the Chesapeake Bay. They are dedicated to reducing nutrient and
  sediment pollution, improving water quality, and restoring the health of these ecosystems. They are aware of the long-term trends in nutrient and sediment loads and are interested in the impact of management
  efforts on water quality. They may work with the Chesapeake Bay Program or other organizations to monitor and evaluate stream health and the overall health of the watershed. They are knowledgeable about
  the effects of weather variations on water quality and are interested in developing strategies to mitigate these impacts.
