personas:
  professional: Jill Wondra, a seasoned community organizer known for meticulous budgeting and logistics, channels her practical, competitive nature into flawlessly executed local festivals and volunteer
    projects, relying on Excel expertise and calm first‑aid readiness.
  sports: Jill Wondra, an avid paddleboarder and member of the Santa Rosa Beach Beach Volleyball Club, competes in weekly beach volleyball tournaments, follows the Jacksonville Jaguars and Florida Gulf
    Coast Eagles, and adheres to a structured fitness routine that blends sunrise paddle sessions with strength work, driven by a competitive edge.
  arts: Jill Wondra, an enthusiastic facilitator of a senior‑center book club, devotes evenings to historical fiction by authors like Ken Follett and Hilary Mantel, enjoys Jimmy Buffett’s Gulf‑coast tunes,
    and supports local art fairs featuring painter Mary Ann Reeves, letting creative storytelling balance her organized lifestyle.
  travel: Jill Wondra, a meticulous planner, prefers weekend road trips to Gulf Islands National Seashore and historic towns such as Charleston and Savannah, dreams of a culinary pilgrimage to Brittany,
    France, and always books accommodations and itineraries weeks in advance to fit her boutique launch schedule.
  culinary: Jill Wondra, an intermediate home chef, delights in grilling snapper with citrus butter, whipping up shrimp po' boys seasoned with Old Bay, and baking key lime pies for community bake sales,
    while experimenting with fresh herbs and locally sourced seaweed to infuse coastal flavors.
  core: Jill Wondra blends methodical organization with a love for communal outdoor fun, turning every beach volleyball game, book club meeting, and boutique plan into a well‑structured, socially vibrant
    experience, all while juggling a skeptical eye for risk and a tendency to over‑schedule.
background:
  cultural: Jill grew up in a middle‑class white family in the Midwest and relocated to Santa Rosa Beach in the early 1990s. She reflects the Southern Gulf Coast’s blend of hospitality, community spirit,
    and a love for the outdoors. Her cultural identity is shaped by regular participation in local festivals—such as seafood and sea‑turtle conservation events—church gatherings, and a strong emphasis on
    neighborly support. This background informs her practical, organized outlook and her enthusiasm for group activities.
attributes:
  skills: '[''Event planning'', ''Volunteer coordination'', ''Budgeting and financial management'', ''Project scheduling'', ''Microsoft Office (Word, Excel, PowerPoint)'', ''Risk assessment'', ''Conflict
    resolution'', ''Mentoring and training'', ''Basic first aid'', ''Customer service'']'
  hobbies: '[''Paddleboarding'', ''Beach volleyball'', ''Patio gardening'', ''Coastal cooking'', ''Reading historical fiction'', ''Book club leadership'', ''Volunteer work at the town library'', ''Community
    bake sale organization'', ''Bird‑watching walks'']'
  career_goals: Although currently not employed, Jill aims to launch a small beach‑side boutique offering locally crafted souvenirs and coastal home décor, leveraging her event‑planning and marketing instincts.
    She also aspires to serve on the board of a regional environmental nonprofit to spearhead beach clean‑up and sea‑turtle nesting programs. To strengthen her business acumen, Jill plans to complete a
    certificate in Small Business Management and a short course in Nonprofit Leadership within the next two years.
