  career_goals: At 71, Daniel aims to transition from full‑time clerical work to a part‑time consulting role where he can mentor younger accountants and small‑business owners in best‑practice bookkeeping
    and financial stewardship. He plans to earn a certification in cloud‑based accounting (e.g., Xero) to stay current with emerging technology. Daniel also hopes to volunteer as treasurer for a local arts
    nonprofit, applying his financial acumen to sustain community cultural projects. Long‑term, he envisions writing a memoir that melds his Southeast Asian heritage with his Iowa life, highlighting the
    intersections of art, finance, and resilience.
