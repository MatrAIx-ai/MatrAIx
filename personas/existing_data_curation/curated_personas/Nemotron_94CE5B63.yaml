personas:
  professional: Elias Williams, an aspiring junior scientist‑engineer, channels boundless curiosity and a pragmatic mindset into building intricate LEGO space stations and dissecting adventure science books,
    while their competitive edge drives them to race friends in problem‑solving challenges and their relaxed, somewhat disorganized approach lets ideas flow freely without strict plans.
  sports: Elias Williams enjoys pickup basketball at the local park, where they play for the Riverbend Tigers youth basketball club, cheer for the hometown professional basketball team the Springfield Spartans,
    and during the summer join a community baseball league, all while they approach fitness with a competitive spirit that prefers small‑group drills over large‑scale scrimmages.
  arts: Elias Williams draws lively cartoons inspired by adventure stories and listens avidly to gospel choirs like The Spiritual Voices and contemporary R&B artists such as Beyoncé, Bruno Mars, and H.E.R.,
    weaving these musical influences into their sketches and often humming melodies while sketching in their notebook.
  travel: Elias Williams loves spontaneous nature hikes along the nearby riverbanks and woods, has visited the Great Smoky Mountains National Park on a family road trip, dreams of exploring the Smithsonian
    museums in Washington, D.C., and prefers low‑budget, flexible travel with parents over organized tours, often packing a small backpack of rocks and leaves as souvenirs.
  culinary: Elias Williams prefers comfort foods like cheese pizza, mac and cheese, and peanut‑butter‑and‑jelly sandwiches, enjoys snacking on fresh berries and chocolate chip pancakes for breakfast, can
    modestly assemble a PB&J on their own but relies on parents for cooking meals, and delights in trying new toppings such as jalapeños on pizza while occasionally overindulging in sugary cereal.
  core: Elias Williams is a curiosity‑driven, quietly competitive 7‑year‑old who builds LEGO galaxies, hoards rocks, and over‑thinks allowances while secretly fearing messy schedules.
background:
  cultural: Elias is a Black child raised in Wesson, a small town in Lawrence County, Mississippi. His family is rooted in the African‑American community of the Deep South, where church life, especially
    the local Baptist congregation, plays a central role. Weekly services, gospel singing, and community potlucks featuring soul food such as fried fish, collard greens, and cornbread are regular fixtures.
    Stories of his grandparents' participation in the civil‑rights movement are shared at family gatherings, fostering a sense of resilience and pride. He participates in neighborhood events like the annual
    Juneteenth celebration and the youth basketball league, which blend Southern hospitality with cultural heritage. Music in the household ranges from traditional gospel hymns to contemporary R&B and hip‑hop,
    reflecting both generational ties and modern influences. These cultural threads shape his values of community, perseverance, and expressive creativity.
attributes:
  skills: '["Reading comprehension (grade 2 level)", "Basic arithmetic (addition, subtraction, introduction to multiplication)", "LEGO building and spatial reasoning", "Basic coding with Scratch Jr.", "Sketching
    and drawing", "Outdoor exploration and nature observation", "Problem solving (troubleshooting toys, puzzles)", "Mini‑team games (ball catching, short basketball drills)"]'
  hobbies: '["Reading adventure and science books", "Building LEGO constructions", "Exploring local woods and riverbanks", "Playing basketball with a small group of friends", "Playing educational video
    games (Scratch Jr., Mario Kart)", "Drawing cartoons and doodles", "Listening to gospel and R&B music with family", "Collecting rocks, leaves, and insects"]'
  career_goals: Elias loves dreaming about careers that let him combine his curiosity with practical impact. He often talks about building rockets that could travel to space, hoping one day to become an
    astronaut or a scientist who studies the stars. He also imagines designing projects to protect the Mississippi River’s wildlife, so a future as a wildlife engineer or environmental scientist feels exciting
    to him. On the court, he envisions himself playing on a professional basketball team, using his competitive spirit to excel. Overall, his ambition is to learn science and engineering so he can create
    things that help his community while also pursuing his love of sports.
