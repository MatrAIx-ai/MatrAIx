  hobbies: '[''Recreational softball'', ''Basketball'', ''Live music festivals'', ''Exploring historic neighborhoods'', ''Watching Pittsburgh Steelers games'', ''Cooking and hosting dinner parties'', ''Homebrewing'',
    ''Reading historical biographies'', ''Volunteering at community events'', ''Mentoring youth'']'
  career_goals: Cody aims to advance to a senior leadership role within the social services sector, such as Director of Community Programs for a regional nonprofit or a municipal agency. He plans to design
    and implement a sustainable, evidence-based outreach initiative focused on workforce development and mental-health support for underserved residents of Pittsburgh. Securing stable funding through grants
    and building strong partnerships with local businesses, schools, and faith groups are key priorities. Over the next five years, he also aspires to mentor junior staff, champion policy improvements for
    community services, and establish a legacy of reliable, routine-driven programs that adapt flexibly to emerging needs.
