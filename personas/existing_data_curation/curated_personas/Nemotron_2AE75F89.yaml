  hobbies: '[''Visiting Art Galleries'', ''Jazz Concerts'', ''Community Theater Improv'', ''Experimental Painting'', ''Cooking African‑American Cuisine'', ''Urban Gardening'', ''Traveling to Cultural Festivals'',
    ''Bridge'', ''Senior Dance Club'']'
  career_goals: Tiffany hopes to transform her passion for art and community into a lasting legacy. She aims to start a grassroots arts collective that offers free workshops for seniors, become a certified
    docent at the Jacksonville Museum of Fine Arts, and complete a community arts facilitation certificate through a local college. She also dreams of writing a memoir that weaves her personal history with
    the broader African‑American experience in Jacksonville, and to mentor at-risk youth in storytelling and creative expression.
