personas:
  professional: Tiffany Laney, a community arts organizer with a knack for rallying seniors around creative projects, blends her curiosity for art history with a relaxed, sometimes chaotic approach to planning,
    turning neighborhood gardens into pop‑up galleries while mentoring younger neighbors and leveraging social media to promote local events.
  sports: Tiffany Laney, a fan of the Jacksonville Jaguars and the local Jacksonville Jumbo Shrimp baseball team, channels her competitive streak into weekly senior dance club workouts, occasional low‑impact
    yoga sessions, and a casual walking group that meets on Saturday mornings, while also joining a community bridge league that satisfies her strategic side.
  arts: Tiffany Laney, an avid patron of the Jacksonville Museum of Fine Arts and a regular at live jazz venues featuring artists like Wynton Marsalis and Christian McBride, immerses herself in experimental
    painting workshops, improv theater sessions inspired by the works of Keith Johnstone, and study of modern painters such as Kehinde Wiley, weaving these experiences into her own quilting and mural projects.
  travel: Tiffany Laney, who plans trips with a mix of spontaneity and a loose checklist, loves cultural festivals like New Orleans Mardi Gras, Charleston’s Spoleto Festival USA, and Savannah’s St. Patrick’s
    Day Parade, and balances travel budgets by staying with friends or in modest B&Bs while dreaming of a future pilgrimage to the historic art colonies of New England.
  culinary: Tiffany Laney, a confident Southern cook, regularly prepares dishes like gumbo with okra, collard greens seasoned with smoked turkey, sweet‑potato pie, and black‑eyed pea salad, enjoys experimenting
    with hot sauce blends and fresh herbs from her balcony garden, but occasionally over‑indulges in fried catfish at local diners, a habit she jokes about while sharing recipes at neighborhood potlucks.
  core: Tiffany Laney is a curious, sociable senior who blends artistic passion with community activism, embraces flexibility over strict order, and balances a competitive streak with a love for collaborative
    creativity.
background:
  cultural: Tiffany grew up in Jacksonville’s historic African‑American neighborhoods, where church, music, and community solidarity shaped her worldview. She carries the traditions of Southern black culture—gospel
    music, soul food, storytelling, and a deep respect for civil‑rights history—into her daily life. Her family’s legacy of resilience and collective support informs her strong ties to local community centers,
    black cultural festivals, and the preservation of oral histories that reflect the experiences of generations of African‑American Floridians.
attributes:
  skills: '[''Community Event Coordination'', ''Oral History Documentation'', ''Mentoring and Peer Support'', ''Painting and Quilting'', ''Social Media Outreach'', ''Advocacy for Senior Citizens'', ''Southern
