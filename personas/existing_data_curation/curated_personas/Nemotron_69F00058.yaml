personas:
  professional: Al Broad is a budding robotics enthusiast and self-taught programmer who spends after-school hours in the school robotics club designing and coding miniature autonomous robots, applying
    a methodical, curiosity‑driven approach that balances innovative ideas with proven engineering practices.
  sports: Al Broad enjoys strategic physical activities like chess tournaments and occasionally joins middle‑school intramural soccer, but prefers solitary fitness such as brisk walks on the Cape Fear River
    boardwalk, cheering for the Carolina Panthers on game nights and keeping a modest collection of sports cards from the Charlotte Hornets.
  arts: Al Broad is an avid reader of science‑fiction novels featuring strong female leads, such as N.K. Jemisin’s ‘The Fifth Season’, and spends evenings sketching riverbank scenes while listening to contemporary
    R&B artists like SZA and Doja Cat, allowing rhythm to inspire their journal entries and creative drawings.
  travel: Al Broad dreams of attending a sci‑fi convention in Orlando, has taken family road trips to historic Charleston and the Blue Ridge Mountains, and favors low‑key travel plans that involve walking
    nature trails, collecting shells on coastal beaches, and staying with relatives to keep costs low.
  culinary: Al Broad’s culinary palate centers on comfort foods like homemade mac and cheese and fish tacos with mango salsa, and they enjoy experimenting with simple recipes—adding sea‑salt harvested from
    collected shells to grilled cheese—and occasionally binge‑eating sugary cereal when stress spikes.
  core: Al Broad is a meticulous, introverted robotics prodigy whose love of solitary puzzle‑solving is balanced by a constant undercurrent of worry, a shell‑collecting habit, and a playlist of R&B that
    keeps the mind calm.
background:
  cultural: Al grew up in a close‑knit Black family in Wilmington, a city with a deep civil‑rights legacy and a vibrant African‑American cultural scene. Her grandparents shared stories of the 1898 Wilmington
    coup and the city’s tradition of gospel music, which instilled a sense of pride and responsibility in her. Family gatherings often revolve around soul food, church services, and community events at
    the local historic Black church, where she learned the value of resilience and collective support. The neighborhood’s emphasis on education and mentorship, especially through programs at the local library
    and community center, has shaped Al’s determination to succeed academically and give back to her community. Though she is reserved, she carries the cultural rhythm of storytelling, lyrical expression,
    and a strong sense of identity that guides her ambitions.
