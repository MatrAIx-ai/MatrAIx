  career_goals: Looking ahead, Al hopes to channel her curiosity about how things work into a career in engineering or computer science. She aims to earn a scholarship to attend a STEM‑focused high school
    and eventually pursue a degree in software engineering or biomedical engineering, fields where she can blend practical problem solving with innovative design. Her long‑term ambition includes creating
    technology solutions that improve community health resources in Wilmington, ensuring she can give back to the neighborhood that shaped her. While she remains aware of the challenges she may face, she
    is determined to achieve financial stability and leadership roles that allow her to inspire other young Black girls.
