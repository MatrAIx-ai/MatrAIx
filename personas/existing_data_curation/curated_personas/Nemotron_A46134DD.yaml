  career_goals: The family envisions Phuc growing into a reliable and organized adult who values practicality and community. His long‑term career ambition is to pursue a profession that blends his methodical
    nature with his sociable personality, such as civil engineering, community health work, or teaching. He aspires to become a respected member of the Vietnamese‑Filipino community in central Florida,
    contributing to local cultural events and supporting family welfare. His early calm resilience is expected to help him navigate academic challenges and achieve leadership positions in his chosen field.
