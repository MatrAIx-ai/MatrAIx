persona_description: A professional engineer who specializes in corrosion and corrosion protection simulations, particularly using the Corrosion Module. They are skilled in setting up and solving models
  in 1D, 2D, and 3D to understand and avoid corrosion situations and design corrosion protection solutions. They are proficient in using the transport of ions and neutral species in the solution, current
  conduction in the metal structure, and other phenomena such as fluid flow and heat transfer to simulate the electrochemistry of corrosion and corrosion protection. They are adept at linking simulations
  at both microscopic and larger scales to optimize corrosion protection.
