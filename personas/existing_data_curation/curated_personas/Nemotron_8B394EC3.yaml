  career_goals: Susan envisions a future where she can support and nurture others. She often says she wants to become a teacher, a pediatric nurse, or a librarian—roles that align with her caring nature
    and love for order. She is attracted to professions that allow her to create structured environments and help small children learn and feel safe.
