personas:
  professional: Thaddeus Blackmon, a 34‑year‑old hospitality professional who has honed meticulous multitasking, conflict‑resolution, and menu‑planning skills while waiting tables in Pompano Beach, now
    channels their curiosity and practicality toward a restaurant‑management certification and aims to lead an inclusive café that trains underserved youth.
  sports: Thaddeus Blackmon, a regular participant in community basketball pick‑ups and beach volleyball leagues, roots for the Miami Heat and Tampa Bay Buccaneers, and complements the on‑court action with
    strength‑training sessions at the local gym to stay fit for summer sand tournaments.
  arts: Thaddeus Blackmon, an avid listener of Miles Davis, Aretha Franklin, and A Tribe Called Quest, frequents the Pompano Beach Art Center, captures sunrise landscapes with a DSLR, and reads nonfiction
    works on social justice that sharpen their appreciation of music and visual storytelling.
  travel: Thaddeus Blackmon, who balances meticulous itinerary planning with spontaneous weekend road trips, has explored New Orleans’ culinary scene, trekked the historic forts of San Juan, Puerto Rico,
    regularly unwinds at quiet Gulf Coast beaches, and dreams of a future culinary pilgrimage to Jamaica for authentic jerk flavors.
  culinary: Thaddeus Blackmon, an intermediate home chef, masterfully blends Southern comfort staples like shrimp and grits, fried catfish, and mac and cheese with Caribbean‑inspired jerk chicken, plantains,
    and scotch bonnet peppers, and often hosts communal pot‑luck evenings that showcase their experimental spice mixes and fresh herbs.
  core: Thaddeus Blackmon blends meticulous hospitality expertise, community‑centric compassion, and a love for lively sports and soulful music into a habit‑driven yet curiosity‑fueled life, occasionally
    over‑committing to volunteer projects at the expense of personal downtime.
background:
  cultural: Thaddeus grew up in a close‑knit African‑American family rooted in the South, with grandparents who migrated from Georgia to Florida during the Great Migration. The cultural tapestry of Pompano
    Beach—marked by a blend of Southern traditions, Caribbean influences, and the vibrant coastal lifestyle—shapes his identity. He participates in community events such as the Broward County Black History
    Month celebrations and local church gatherings, which reinforce values of solidarity, respect for elders, and service. His culinary tastes reflect a fusion of Southern soul food and Caribbean dishes
    common in the area, and he maintains a strong connection to African‑American music, storytelling, and the tradition of communal support that characterizes his neighborhood.
attributes:
  skills: '["Customer Service", "Multitasking", "POS System Operation", "Conflict Resolution", "Food Safety & Sanitation", "Inventory Management", "Staff Scheduling", "Menu Knowledge", "Mixology Basics",
    "Event Coordination", "Time Management", "Data Entry & Excel"]'
  hobbies: '["Basketball", "Beach Volleyball", "Home Cooking", "Volunteering at Food Bank", "Mentoring Youth", "Reading (Non‑fiction)", "Listening to Jazz, R&B, Hip‑hop", "Meditation", "Photography", "Hiking
    in Local Parks"]'
  career_goals: Thaddeus aims to leverage his hands‑on hospitality experience to move into a supervisory role within the next two years, obtaining a certification in restaurant management and completing
    his associate’s degree in hospitality. He aspires to become a restaurant manager, where he can implement efficient service protocols, mentor new staff, and foster an inclusive workplace culture that
    reflects his commitment to teamwork and compassion. Long‑term, Thaddeus envisions opening a neighborhood café that doubles as a job‑training hub for youth from underserved backgrounds, offering affordable
    meals and hosting community workshops. He also hopes to gain experience in event planning to organize fund‑raising dinners that support local charities.
