  hobbies: '[''Sketching'', ''Reading Art History'', ''Journaling'', ''Nature Walks'', ''Gardening'', ''Knitting'', ''Listening to Classical Music'', ''Exploring Online Art Communities'', ''Volunteer Library
    Assistant'']'
  career_goals: Susan aims to advance from her current clerk role to a senior administrative or office manager position within the next five years. She plans to earn a Certified Administrative Professional
    (CAP) credential and complete an associate’s degree in Business Administration to solidify her managerial credentials. Long‑term, she hopes to blend her organizational talent with her passion for the
    arts by transitioning into arts administration for a community museum or nonprofit, where she can oversee exhibitions, manage volunteer programs, and foster inclusive cultural experiences while maintaining
    a stable, supportive work environment.
