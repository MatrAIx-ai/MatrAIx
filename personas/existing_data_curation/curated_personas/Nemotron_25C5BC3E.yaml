    painting'']'
  career_goals: Kathryn aims to transition from skilled tradesperson to business owner by securing her contractor's license and expanding her team into a full‑service interior finishing company. She plans
    to complete her associate’s degree in construction management, obtain certification in lead‑safe painting, and develop a niche in eco‑friendly, low‑VOC finishes for health‑conscious homeowners. Long‑term,
    she hopes to become a recognized specialist in historic home restoration within the Dallas‑Fort Worth area, while mentoring apprentices and fostering a supportive work culture.
