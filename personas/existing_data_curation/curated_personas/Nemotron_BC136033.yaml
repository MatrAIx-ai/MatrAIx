  hobbies: '[''Gardening'', ''Birdwatching'', ''Model Train Building'', ''Walking/Hiking'', ''Reading Historical Biographies'', ''Volunteering at Senior Centers'', ''Journaling'', ''Meditation'']'
  career_goals: Approaching retirement, John aims to transition into a senior advisory role where he can leverage his experience to guide community-focused and sustainability-oriented projects. He aspires
    to become a mentor and consultant for emerging project managers, helping them develop structured yet compassionate leadership styles. Reducing personal stress and achieving a healthier work‑life balance
    are central to his goals, as is establishing a legacy of volunteer‑driven initiatives that improve neighborhood cohesion and environmental stewardship.
