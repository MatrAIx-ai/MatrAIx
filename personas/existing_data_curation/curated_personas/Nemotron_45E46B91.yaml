personas:
  professional: Hernando Montes, a budding five-year-old engineer-in-training, uses a curious love for building LEGO structures combined with a practical knack for sorting classroom supplies, consistently
    balancing inventive play with careful adherence to the teacher’s routine.
  sports: Hernando Montes sprints around the neighborhood soccer field as a member of the Tiny Tigers, a kindergarten-age league, quietly cheering for the Los Angeles Dodgers and avidly practicing balance
    on a backyard jungle gym, preferring short, focused play sessions over marathon games.
  arts: Hernando Montes fills their sketchbook with crayon renditions of Mickey Mouse and Toy Story characters, belts out The Wiggles' Fruit Salad on the family karaoke mic, and eagerly watches Pixar's
    Inside Out, drawing inspiration for daily imaginative play.
  travel: Hernando Montes prefers short family road trips to nature spots like the Grand Canyon's South Rim, relishes the sensory overload of Disneyland's Fantasyland, and dreams of a beach adventure in
    Cancun, always packing their favorite stuffed bunny first.
  culinary: Hernando Montes loves buttery mac and cheese topped with breadcrumbs, delights in building mini pizza circles with tomato sauce, mozzarella, and pepperoni, and proudly helps stir the batter
    for homemade banana pancakes using ripe bananas and cinnamon.
  core: Hernando Montes balances a boundless curiosity for building worlds with a meticulous habit of aligning every crayon by color, often forgetting to brush teeth before bedtime.
background:
  cultural: Hernando grows up in a Mexican‑American household in Placentia, where Spanish is spoken at home and English at school. Family traditions such as celebrating Día de los Muertos, cooking dishes
    like tacos, tamales, and churros, and listening to mariachi and regional folk songs are part of his daily life. He attends a local preschool where cultural diversity is embraced, and his extended family
    often visits, reinforcing values of respect, community, and modest pride in his heritage while also integrating the multicultural environment of Orange County.
attributes:
  skills: '[''building block structures'', ''counting to 20'', ''recognizing letters and sight words'', ''basic drawing and coloring'', ''organizing toys and play materials'', ''following routines'', ''bilingual
    communication (Spanish & English)'']'
  hobbies: '[''building with LEGO and wooden blocks'', ''solving picture puzzles'', ''reading picture books'', ''drawing and coloring'', ''exploring nature with a magnifying glass'', ''listening to Mexican
    folk music'', ''small‑group crafts'', ''helping in the kitchen'']'
  career_goals: Hernando dreams of becoming someone who designs and builds things that help people, such as a builder or a young engineer. He loves imagining how simple tools can create shelters for his
    toys and hopes to one day build real houses or bridges that keep his community safe and comfortable.
