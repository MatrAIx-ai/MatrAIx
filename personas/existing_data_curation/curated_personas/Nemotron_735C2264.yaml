  career_goals: Ruby plans to transition from full‑time housekeeping to a part‑time advisory role, offering workshops on cleaning efficiency and home organization for seniors and small‑business owners.
    She hopes to author a practical guidebook on eco‑friendly housekeeping, launch a boutique home‑care consulting service, and mentor younger workers through a local community‑college hospitality program.
    Additionally, she aims to secure a comfortable retirement while continuing to volunteer at Philadelphia senior centers and neighborhood clean‑up initiatives.
