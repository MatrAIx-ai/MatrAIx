  hobbies: '[''Reading adventure/science books'', ''LEGO construction'', ''Jigsaw puzzles (30‑piece)'', ''Drawing animals and machines'', ''Backyard nature exploration'', ''Single‑player video games (Minecraft,
    puzzle apps)'']'
  career_goals: Bernard imagines a future where he can work with clear systems and tangible results. He dreams of becoming an engineer or a pilot, careers that combine his love of building, problem‑solving,
    and structured environments. He also expresses a budding interest in becoming an astronaut, attracted by the rigorous training and precise procedures involved. These ambitions reflect his desire for
    responsibility, order, and measurable achievement.
