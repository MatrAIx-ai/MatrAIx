personas:
  professional: Jean Oliver is an emerging community event coordinator who blends meticulous logistical planning, strong interpersonal mediation, and a competitive drive to turn neighborhood clean-ups and
    local art fairs into high‑visibility showcases, leveraging basic photography and digital illustration skills to amplify outreach.
  sports: Jean Oliver spends summer weekends playing competitive beach volleyball with the Palm Bay Suns Volleyball Club, follows the Orlando Magic and Florida Panthers avidly, incorporates early‑morning
    jogs along the Atlantic shoreline into the routine, yet occasionally skips workouts when event‑planning fatigue sets in.
  arts: Jean Oliver delights in watercolor painting inspired by Georgia O’Keeffe, creates bold digital illustrations reminiscent of Loish’s palette, regularly attends the Brevard Art Fair, supports local
    musicians like H.E.R. at community venues, and curates pop‑up galleries that spotlight emerging Space Coast artists.
  travel: Jean Oliver prefers meticulously planned weekend getaways that blend adventure with laid‑back beach time, having explored the coral reefs of Key West, the historic charm of St. Augustine, and
    the volcanic landscapes of Iceland, while dreaming of witnessing a rocket launch at Kennedy Space Center and an art‑focused cultural exchange in Oaxaca on a shoestring budget.
  culinary: Jean Oliver enjoys cooking with fresh Floridian seafood, frequently preparing shrimp tacos with mango salsa and a squeeze of lime, baking key‑lime pie from a scratch crust, experimenting with
    avocado toast topped with chili flakes, and occasionally improvising a vegan risotto from leftover vegetables while savoring a dark‑roast coffee from a local roastery.
  core: Jean Oliver is a fiercely organized yet worry‑prone community‑spirit enthusiast who channels competitive energy into art‑driven events while juggling anxiety, a love of beach volleyball, and a penchant
    for spontaneous up‑cycling projects that leave a trail of half‑finished crafts around the house.
background:
  cultural: Jean Michele grew up in a predominantly white, suburban neighborhood of Palm Bay, Florida. Her family reflects a typical middle‑class Floridian upbringing, with a blend of Atlantic coast leisure—fishing
    trips, beach outings, and seasonal community festivals—and modest Southern influences such as key‑lime desserts and a casual, outdoor‑oriented lifestyle. While rooted in mainstream American values of
    independence and self‑reliance, she has been exposed to the multicultural flavor of Brevard County, including a diverse culinary scene and the regional pride associated with the nearby Space Coast and
    NASA activities. Her cultural experiences have reinforced her appreciation for varied artistic expressions and community collaboration.
attributes:
  skills: '["event planning", "social media management", "photography", "digital illustration", "DIY crafting", "budget management", "conflict mediation", "first aid", "team coordination", "critical thinking"]'
  hobbies: '["watercolor painting", "digital illustration", "beachcombing", "hiking", "volunteering at community garden", "volleyball", "board games", "reading speculative fiction", "yoga", "journaling"]'
  career_goals: Jean Michele aims to earn her GED within the next year and then pursue a certificate in Community Event Management at a local community college. She envisions leveraging her organizational
    talent to secure a part‑time role as a community outreach coordinator for a nonprofit or the Brevard County Parks Department. Simultaneously, she plans to grow an online storefront on Etsy, selling
    her handmade décor and prints, eventually turning it into a modest source of income. Long‑term, she hopes to be recognized for curating local art showcases that blend her love of unconventional ideas
    with her competitive drive to achieve visibility for emerging artists in the Space Coast region.
