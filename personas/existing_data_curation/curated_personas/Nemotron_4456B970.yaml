personas:
  professional: Linda White, a four-year-old budding architect, spends afternoons arranging colorful building blocks into meticulously ordered cities while quietly imagining whimsical twists, showcasing
    a blend of organization, curiosity, and a preference for solitary play.
  sports: Linda White enjoys a weekly preschool gymnastics class, practices balance beam with focus, and quietly cheers for the Chicago Cubs and New York Knicks from the couch, preferring low-key participation
    over noisy crowds.
  arts: Linda White delights in finger-painting abstract swirls, humming classic Disney songs by Lin-Manuel Miranda, and collecting picture books by Eric Carle, allowing their curiosity and love for unconventional
    art to shape playful creative moments.
  travel: Linda White has visited Grandma's farm, spent a magical weekend at Disneyland, and dreams of a serene beach getaway in Maine, favoring carefully planned trips that allow ample quiet time for sand-castle
    building.
  culinary: Linda White prefers soft mac and cheese with a sprinkle of parmesan, enjoys crunchy carrot sticks and apple slices, proudly helps stir batter for banana muffins, yet occasionally sneaks a cookie
    before dinner.
  core: Linda White is a calm, solitary four-year-old whose inquisitive mind blends art, order, and quiet imagination into play, while a mischievous cookie habit hints at a playful spark.
background:
  cultural: Linda is a white American child raised in Denham Springs, Louisiana, in St. Helena Parish. Her family lives in a small suburban community where Southern customs are part of daily life. She celebrates
    local traditions such as Mardi Gras parades, enjoys Southern comfort foods like dumplings and biscuits during family gatherings, and attends a nearby church where she participates in music and community
    events. The warm, close‑knit atmosphere of her neighborhood and the emphasis on kindness, cooperation, and harmony shape her worldview.
