  career_goals: Anthony aims to transition from his current unemployment into a full‑time role that merges his passion for the arts with his organizational talent. His short‑term goal is to secure an entry‑level
    position such as Assistant Event Coordinator or Community Programs Associate at a museum, art gallery, or nonprofit cultural organization in the Bay Area. He plans to complete his bachelor's degree
    in Arts Administration or Communications and earn a certification in event management. Long‑term, he envisions advancing to a program director or arts administration manager role, eventually shaping
    community‑wide cultural initiatives and possibly launching his own consultancy that helps local artists and nonprofits design and promote public events.
