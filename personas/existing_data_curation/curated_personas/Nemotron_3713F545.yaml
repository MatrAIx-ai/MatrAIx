personas:
  professional: Julio Quintana, an aspiring young robotics enthusiast who channels a love for strategy games and model kit building into their school's STEM club projects, they blend methodical problem-solving
    with imaginative design to prototype functional mini-robots for local competitions.
  sports: Julio Quintana, a weekend soccer midfielder for the middle-school team who also follows the Sacramento Kings and the San Jose Earthquakes, spends autumn afternoons on the field, winter months
    shooting hoops at the community gym, and they fit in short bike rides to the nearby park as a low-key cardio routine.
  arts: Julio Quintana, a dedicated fan of sci-fi and fantasy literature from authors like N.K. Jemisin and Brandon Sanderson, spends evenings listening to regional folk music that blends traditional instruments
    with modern beats, and they attend Saturday cultural festivals where classic films by Guillermo del Toro are screened, drawing inspiration for their own short stories.
  travel: Julio Quintana, an inquisitive teen who plans family trips around school breaks, has explored the historic streets of Mexico City during a family visit for Día de los Muertos celebrations, enjoys
    weekend road trips to the towering Redwoods of Northern California, and they dream of saving enough to attend the Tokyo Game Show, balancing budget limits with a yearning for immersive cultural experiences.
  culinary: Julio Quintana, an intermediate home cook who masters classic carnitas tacos and chile relleno while experimenting with quinoa-infused masa and a sous-vide technique for tender pork, frequently
    adds a splash of lime, chipotle powder, and fresh avocado to each dish, and they proudly use the family's heirloom tortilla press for authentic handmade tortillas.
  core: Julio Quintana, a 15-year-old blend of sci-fi imagination and tradition-rooted creativity, they balance meticulous curiosity with late-night gaming splurges, occasional acne flare-ups, and a habit
    of tweaking family recipes with modern culinary twists.
background:
  cultural: Julio grew up in a Mexican‑American household in Sacramento, where Spanish is spoken at home and Mexican customs are celebrated, such as Día de los Muertos and traditional holiday meals. His
    family maintains strong ties to their Mexican roots while navigating life in the United States, giving Julio a bicultural perspective. He participates in community events at the local Mexican cultural
    center, enjoys the vibrant food scene, and values the blend of his heritage with the broader Californian environment.
