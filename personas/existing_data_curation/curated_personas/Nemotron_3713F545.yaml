  career_goals: Julio plans to complete his high school education or earn a GED within the next two years, then pursue a community‑college program in computer science or electrical engineering. He aims
    to secure an apprenticeship in a tech‑focused trade, eventually becoming a software developer or hardware specialist. Julio hopes to merge his technical skills with his cultural heritage by creating
    digital content that celebrates Mexican traditions, and he aspires to provide financial stability for his family while mentoring younger peers in his community.
