personas:
  professional: A budding graphic designer, Alicia Noori, blends a love for mobile photography and social media into freelance content creation, leveraging their knack for quick photo edits, DIY tech troubleshooting,
    and relaxed approach to deadlines while dreaming of flexible work that keeps them plugged into the Tampa Bay community.
  sports: A skate‑boarding enthusiast, Alicia Noori spends weekends at the Pinellas Skate Crew meet‑ups, follows the Tampa Bay Buccaneers, Lightning, and Rays, hikes local nature trails, and treats fitness
    as a spontaneous extension of their social outings rather than a regimented routine.
  arts: A music‑curious, photo‑obsessed creator, Alicia Noori curates playlists featuring Tame Impala, Billie Eilish, and Japanese composer Yoko Kanno, admires the work of photographer Annie Leibovitz,
    devours fantasy epics by Brandon Sanderson, and draws inspiration from indie video‑game soundtracks like those in Hades and Celeste to shape their own visual storytelling.
  travel: A sunrise‑seeker, Alicia Noori explores nearby gems such as Clearwater Beach, Fort De Soto Park, and a weekend road‑trip to Savannah, while dreaming of island hopping in the Caribbean and a future
    backpacking trek through New Zealand, preferring spontaneous itineraries that fit their modest student budget and love of coastal vistas.
  culinary: An experimental home cook, Alicia Noori whips up dishes like shakshuka with poached eggs, sushi‑style rice bowls with avocado and wasabi mayo, and mango sticky rice drizzled with coconut cream,
    savoring ingredients such as sumac, harissa, and fresh lemongrass, and often improvises with whatever is on sale at the local market.
  core: Alicia Noori is a sunrise‑chasing, skate‑boarding 18‑year‑old who flips between impulsive snack raids and meticulous photo edits, forever chasing the next creative gig while letting deadlines slip.
background:
  cultural: Alicia is a white American raised in Seminole, Florida. Her upbringing in Pinellas County exposed her to a blend of coastal lifestyle, tourism, and the multicultural influences of the Gulf Coast,
    including interactions with Hispanic and Caribbean communities. She celebrates typical American holidays while also appreciating the region’s beach culture and the diverse culinary scene. Her family’s
    roots are in the Mid‑Atlantic, and she grew up hearing stories of both urban and rural traditions, which shape her open‑minded perspective and love of mixing different cultural flavors in her cooking
    and creative projects.
