  career_goals: Alicia aims to pursue a post‑secondary path that blends creativity with flexibility. She is interested in enrolling in a community‑college program for graphic design or digital media, with
    the long‑term goal of working as a freelance content creator or social‑media manager for small businesses in the Tampa Bay area. Alternatively, she is exploring a certificate in culinary arts to open
    a weekend pop‑up food stall featuring experimental recipes she enjoys testing at home. In either direction, she wants a career that lets her set her own schedule, continue learning new tools, and stay
    connected with her community through collaborative projects.
