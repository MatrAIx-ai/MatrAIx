  hobbies: '[''Painting'', ''Salsa dancing'', ''Cooking traditional Salvadoran dishes'', ''Community volunteering'', ''Photography'', ''Reading contemporary fiction and non‑fiction'', ''Attending live music
    events'', ''Yoga'', ''Group hikes'', ''Exploring local art galleries'']'
  career_goals: Odalys aims to become a leading family health NP who reduces health disparities for underserved Salvadoran and Latinx populations in Bexar County. She plans to pursue a Doctor of Nursing
    Practice (DNP) degree with a focus on health equity and community‑based interventions. Her ambition includes launching a mobile clinic that blends primary care with art‑therapy workshops, mentoring
    aspiring nurses from immigrant backgrounds, and influencing local health policy to support culturally sensitive care. She also hopes to collaborate with local artists and cultural centers to create
    wellness programs that celebrate Salvadoran heritage while promoting preventive health.
