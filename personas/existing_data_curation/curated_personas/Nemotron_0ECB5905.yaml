personas:
  professional: Katrina Albritton leverages fifteen years of hands‑on landscaping and groundskeeping experience, combining practical know‑how with a curiosity for sustainable practices, to design functional
    outdoor spaces, troubleshoot irrigation, and lead community greening projects; their sociable nature makes them a natural client liaison, while their assertive side drives them toward a supervisory
    role and certifications like CGM and LICI, even though they sometimes overcommit to volunteer events at the cost of personal downtime.
  sports: Katrina Albritton embraces an active lifestyle that blends kayaking on Lake Erie with weekend hikes in the Appalachian foothills, participates in the local kayak club and a community “Trailblazers”
    hiking group, and avidly follows the Cleveland Guardians and Cleveland Browns, though they occasionally skip a scheduled paddle when fatigue sets in after a long week of landscaping.
  arts: Katrina Albritton channels their creative side through landscape photography, capturing seasonal changes in the Erie shoreline and local flora, drawing inspiration from Ansel Adams and folk musician
    Gillian Welch, attends DIY workshops at the library, and regularly visits art shows featuring regional painters like Mary Whitaker, yet they sometimes let perfectionism delay sharing their photos online.
  travel: Katrina Albritton prefers road‑trip adventures that balance family time with personal discovery, frequently exploring nearby attractions such as Niagara Falls, the Cuyahoga Valley State Park,
    and the botanical gardens of Asheville; they have a bucket‑list destination of Provence’s lavender fields and Japan’s Kyoto gardens, but budget constraints and fire‑department volunteer commitments
    often dictate short, weekend getaways over extended vacations.
  culinary: Katrina Albritton delights in farm‑to‑table cooking, frequently preparing roasted heirloom beet salad with goat cheese, grilled salmon with dill, and fresh corn succotash spiced with rosemary,
    showcasing their garden’s bounty; they are a competent home cook who enjoys experimenting with fermented vegetables, yet they sometimes over‑season dishes in excitement for bold flavors.
  core: Katrina Albritton is a community‑focused landscaping expert who blends practicality with curiosity, balances disciplined finances with occasional garden‑tool splurges, and channels resilience into
    outdoor adventures, creative photography, and sustainable cooking.
background:
  cultural: Katrina comes from a Midwestern white American background, with deep roots in the Ohio region that blend German‑American and Irish‑American family traditions. Growing up in a small‑town environment,
    she internalized values of hard work, community involvement, and a strong connection to the land. Her family’s holiday gatherings, church attendance, and participation in local fairs have shaped a pragmatic
    yet warm outlook. Living in Ashtabula, a town known for its lake heritage and burgeoning wine industry, has reinforced her appreciation for the outdoors, seasonal cycles, and the importance of preserving
    local natural resources.
attributes:
  skills: '["Landscape design", "Plant identification and care", "Hardscape installation", "Irrigation system design and maintenance", "Equipment operation and maintenance", "Team leadership and crew coordination",
    "Client communication", "Budget and resource management", "Safety compliance and OSHA regulations", "Sustainable horticultural practices"]'
  hobbies: '["Home vegetable gardening", "Kayaking on Lake Erie", "Hiking", "Community garden volunteering", "Seasonal landscape photography", "Farm‑to‑table cooking", "Attending local wine and food festivals",
    "DIY home improvement projects", "Volunteer fire department activities", "Group fitness classes"]'
  career_goals: Katrina aims to step into a supervisory role within her current company, earn professional certifications such as the Certified Grounds Manager (CGM) and the Landscape Industry Certified
    Instructor (LICI), and eventually launch her own environmentally focused landscaping business that serves residential and municipal clients in the Ashtabula region. She also hopes to mentor apprentices
    and lead community greening projects that promote native plantings and stormwater management.
