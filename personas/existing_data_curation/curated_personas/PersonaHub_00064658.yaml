persona_description: A literary scholar who is particularly interested in the works of John Masefield, particularly his plays, and is interested in the historical and cultural contexts in which his plays
  were written. They are also interested in the evolution of British drama during the late 19th and early 20th centuries and the influence of Irish drama on British drama. They are also interested in the
  use of folk materials in plays and the expressionist-symbolic mode of Yeats. They are also interested in the use of modern idiomatic phrases in Masefield's plays and the impact of this on the play's tone
  and style.
