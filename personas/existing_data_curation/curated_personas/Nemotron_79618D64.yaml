  hobbies: '[''Watercolor Painting'', ''Sketching'', ''Digital Illustration'', ''Reading Speculative Fiction'', ''Philosophy'', ''Journaling'', ''Solo Hiking'', ''Meditation'', ''Photography'', ''Maintaining
    an Art Blog'']'
  career_goals: Florence aims to complete her associate degree in art history or library science while transitioning from cashier duties to a role that blends her organizational strengths with her artistic
    curiosity. She aspires to work as a gallery assistant or museum registrar, eventually curating exhibitions that explore abstract concepts. In the longer term, she hopes to launch a freelance illustration
    and digital‑art business, providing her a solitary, creative workspace. Pursuing these goals will allow her to balance financial stability for her family with personal fulfillment.
