persona_description: A historian who specializes in the study of labor history, particularly the events and figures related to the Dublin Lockout of 1913. Her research interests include the role of labor
  unions in the Irish context, the impact of economic policies on working-class lives, and the history of Irish trade unions. She is particularly interested in the experiences of women workers during the
  strike and the role of the Irish Women Worker's Union (IWWU) in organizing food distribution and soup kitchens during the strike. She is passionate about the legacy of the Dublin Lockout and its impact
  on Irish labor history.
