  hobbies: '[''Playing soccer in a local league'', ''Cooking traditional Mexican dishes'', ''Listening to regional Mexican music'', ''Volunteering at the community center'', ''Attending church gatherings'',
    ''Gardening'', ''Watching Mexican football'', ''DIY home projects'']'
  career_goals: Oscar aims to advance to a supervisory or team‑lead position within his call‑center, leveraging his organizational strengths to streamline workflows and improve team performance. He plans
    to obtain a Certified Customer Service Professional credential and develop a structured onboarding program for new agents. In the longer term, he envisions moving into a managerial role where he can
    shape policies that enhance service quality for Spanish‑speaking customers while maintaining a stable work‑life balance for his family.
