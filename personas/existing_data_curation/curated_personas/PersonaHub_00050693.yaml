persona_description: A researcher and conservationist who is passionate about the study of alpine butterflies and their habitats, particularly those in the Rocky Mountain region. They are skilled at using
  data from citizen scientists and modeling to understand the impacts of climate change on butterfly populations and their habitat. They are also aware of the threats posed by encroaching treeline and the
  importance of snow for alpine butterflies. They have experience with long-term butterfly projects and are dedicated to understanding how to mitigate the impacts of climate change on other species.
