  hobbies: '[''Sketching and watercolor painting'', ''Visiting local art galleries'', ''Reading architecture and art books'', ''Listening to construction and design podcasts'', ''DIY woodworking'', ''Hiking
    in Jefferson County'', ''Gardening'', ''Volunteering with Habitat for Humanity'']'
  career_goals: Gina aims to transition from hands‑on labor to a supervisory role where she can blend her practical construction knowledge with her interest in design. In the next two years she plans to
    complete an OSHA 30‑hour certification and a short course in finish carpentry, positioning herself for a foreman position. Mid‑term, she hopes to lead renovation projects that highlight aesthetic details,
    such as restoring historic Louisville row houses with artistic flourishes. Ultimately, she envisions launching a small, community‑focused construction and design consultancy that takes on modest public‑art
    installations and neighborhood improvement projects, allowing her to maintain flexibility, stay close to her family, and keep time for her own artistic pursuits.
