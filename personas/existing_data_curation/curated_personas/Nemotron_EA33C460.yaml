personas:
  professional: Gina Shepherd is a seasoned construction laborer with hands‑on expertise in framing, drywall installation, and blueprint reading who leverages a curious, art‑inspired perspective to solve
    on‑site problems, though they sometimes struggle with the organization and paperwork needed for a foreman position.
  sports: Gina Shepherd enjoys weekend hikes along the Jefferson Memorial Forest trails with the Bluegrass Trail Runners club, they are an enthusiastic supporter of Louisville City FC and attend matches
    when the schedule permits, and they occasionally unwind with evening yoga to stretch after long workdays.
  arts: Gina Shepherd is an avid sketcher and watercolorist who regularly visits the Speed Art Museum and intimate downtown galleries, drawing inspiration from Edward Hopper’s industrial scenes and Olafur
    Eliasson’s light installations, and they often channel this creativity into community mural projects and DIY home décor.
  travel: Gina Shepherd prefers low‑key road trips that mix adventure with flexibility, having explored the rolling hills of the Bluegrass Region, taken a weekend art‑focused getaway to Asheville, and fulfilled
    a long‑standing dream of visiting Barcelona to study Gaudí’s architecture, yet they usually book accommodations on a whim through Airbnb.
  culinary: Gina Shepherd delights in simple farm‑to‑table cooking, frequently preparing dishes like roasted beet salad, grilled chicken with fresh garden tomatoes, and crusty sourdough bread from their
    own starter, while they occasionally indulge in a spicy jambalaya from a local Cajun eatery after a long day on the job.
  core: Gina Shepherd blends a hands‑on construction background with a painter’s eye, juggling spontaneous creativity and occasional disorganization, while they find solace in sketching, gardening, and
    community projects.
background:
  cultural: Gina grew up in a working‑class family in Louisville, Kentucky, where Southern hospitality and Midwestern practicality intersect. The city’s rich traditions—horse racing, bourbon heritage, the
    annual Kentucky Derby, and a vibrant arts scene—shaped her appreciation for both hard work and creative expression. She was raised with values of community cooperation, modesty, and a strong work ethic
    common in the Bluegrass region. Local customs such as sharing meals centered on regional dishes like the Hot Brown, attending neighborhood block parties, and listening to bluegrass and country music
    have left an imprint on her worldview. While identifying as white, she is attuned to the diverse cultural fabric of Louisville and often seeks ways to bridge her labor‑intensive background with the
    city’s artistic pulse.
attributes:
  skills: '[''Framing and structural carpentry'', ''Concrete mixing and finishing'', ''Drywall installation'', ''Tool operation and maintenance'', ''Blueprint interpretation basics'', ''OSHA safety compliance'',
