  career_goals: Elvira aims to become a regional director of health services for the central mountainous region of Puerto Rico, championing the expansion of telehealth and preventive care programs in underserved
    rural communities like Lares. She is driven to spearhead a comprehensive quality improvement framework that reduces patient wait times and enhances care coordination across multiple clinics. Additionally,
    she aspires to mentor emerging female health administrators, establishing a leadership pipeline that reflects the island’s cultural diversity. Her competitive spirit fuels a long‑term ambition to be
    recognized as an innovator in integrating art‑based therapeutic initiatives within public health strategies.
