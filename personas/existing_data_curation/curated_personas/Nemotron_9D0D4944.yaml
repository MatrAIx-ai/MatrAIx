personas:
  professional: Wayne Aman is a self‑taught handyman and aspiring tradesperson whose expertise in carpentry, basic electrical work, and automotive maintenance is paired with a safety‑first mindset, a methodical
    step‑by‑step approach to projects, and a commitment to serving neighbors, positioning them to launch a reliable home‑repair service.
  sports: Wayne Aman is a seasonal outdoorsman who spends spring and summer fishing on Lake Floyd and hunting deer in the woods, while cheering on the Atlanta Falcons, Atlanta Braves, and Georgia Bulldogs,
    and occasionally joins a community softball league for light exercise.
  arts: Wayne Aman unwinds by crafting wooden birdhouses and listening to the classic country storytelling of Alan Jackson, George Strait, and the Southern rock swagger of Lynyrd Skynyrd, finding inspiration
    for their woodworking projects.
  travel: Wayne Aman favors low‑key road trips that blend fishing and family time, having explored the Blue Ridge Parkway and a weekend cabin in the Great Smoky Mountains, while dreaming of a guided fishing
    lodge in Manitoba’s Lake of the Woods for the next summer adventure.
  culinary: Wayne Aman enjoys cooking garden‑fresh collard greens, fried catfish, and peach cobbler on the porch, boasting a solid home‑cook skill level that lets them season dishes with a pinch of homegrown
    herbs and a dash of classic Southern BBQ rub.
  core: Wayne Aman is a steady‑hand pragmatist who balances a love for the outdoors and craft with meticulous budgeting, a habit of checking the weather before every project, and a tendency to over‑organize
    their toolbox.
background:
  cultural: Wayne grew up in a rural part of northwestern Georgia, within a close‑knit, predominantly white community that values self‑reliance, family, church, and tradition. The Southern cultural backdrop
    includes an emphasis on hospitality, a strong work ethic, and a love of outdoor activities such as hunting, fishing, and gardening. These influences have shaped his pragmatic worldview, his commitment
    to community, and his preference for structured, predictable routines.
attributes:
  skills: '[''carpentry'', ''basic electrical repairs'', ''automotive maintenance'', ''yard and garden care'', ''home repair troubleshooting'', ''budgeting and household finance management'', ''tool maintenance'',
