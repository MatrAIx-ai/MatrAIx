persona_description: A French scientist working in the field of environmental science, specifically focused on the development and implementation of innovative wastewater treatment methods. This scientist
  is part of a team that has developed a novel and effective system using natural processes to treat effluent from industrial food cleaning and processing operations. The scientist is passionate about the
  application of bamboo-based intensified phytoremediation techniques and has a unique understanding of the challenges faced by the food industry in dealing with greywater, which contains organic matter
  that could be harmful to aquatic life. The scientist is interested in demonstrating the effectiveness of the system through a full-scale pilot plant at a soft drinks manufacturing facility near Valence,
  France, and is funded by the EU.
