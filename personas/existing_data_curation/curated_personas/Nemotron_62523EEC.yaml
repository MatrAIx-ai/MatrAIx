  hobbies: '[''Watercolor Painting'', ''Visiting Art Galleries'', ''Reading Classic Literature'', ''Gardening'', ''Birdwatching'', ''Yoga'', ''Meditation'', ''Journaling'', ''Cooking Simple Meals'']'
  career_goals: Annette aims to drive sustainable growth for her company while embedding a culture that values artistic expression and employee well‑being. She aspires to launch an internal arts initiative
    that encourages creative thinking across departments, mentor emerging female leaders, and position the organization as a model of socially responsible and culturally enriched corporate citizenship in
    the Southeast. Long‑term, she envisions transitioning to a board advisory role that leverages her experience to champion community arts programs and environmentally responsible business practices.
