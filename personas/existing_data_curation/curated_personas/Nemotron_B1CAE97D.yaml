  career_goals: Even in retirement, William aims to translate his rich inner world into a lasting creative legacy. He plans to finish a memoir that weaves together his life experiences and intellectual
    reflections, complete a series of watercolour paintings portraying the St. Johns River landscapes, and self‑publish a collection of poems and short stories. He also hopes to mentor his grandchildren
    and local youth in creative writing and painting, and to volunteer as a guide at the Sanford Historical Museum, sharing his knowledge of local history and art.
