  hobbies: '[''Watercolour painting'', ''Sketching'', ''Creative writing'', ''Reading speculative fiction'', ''Philosophy reading'', ''Art history'', ''Gardening'', ''Birdwatching'', ''Chess'', ''Jigsaw
