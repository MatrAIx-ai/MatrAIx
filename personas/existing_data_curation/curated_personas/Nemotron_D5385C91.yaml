  career_goals: Katherine aims to re‑enter the professional sphere as a freelance curator and museum educator, designing pop‑up exhibitions that highlight under‑represented local artists while maintaining
    flexible scheduling. She hopes to publish a collection of essays on contemporary art and secure a part‑time teaching position at a community college. Long‑term, she envisions establishing a small community
    arts center in Suffolk County that offers workshops, residency programs, and collaborative projects, allowing her to blend independent research with meaningful community engagement.
