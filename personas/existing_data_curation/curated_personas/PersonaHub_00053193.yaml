persona_description: A geologist who specializes in the study of geology and the geological processes that shape the Earth's surface, particularly in Yosemite National Park. They are knowledgeable about
  the formation and history of the park's rocks, the geological features that make up the park, and the impact of glaciers on the park's landscape. They have a particular interest in the geological processes
  that have shaped the park's unique rock formations, such as the formation of the dome-shaped Half Dome. They are also interested in the role that glaciers have played in shaping the park's landscape and
  the geological processes that have occurred over time in the park.
