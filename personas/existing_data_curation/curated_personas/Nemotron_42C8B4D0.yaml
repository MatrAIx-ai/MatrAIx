  hobbies: '[''Community Volunteering'', ''Book Club (African American Literature)'', ''Cooking and Recipe Experimentation'', ''Zumba Fitness'', ''Hiking'', ''Acoustic Guitar'', ''Yoga'', ''Journaling'',
    ''Mindfulness Meditation'', ''Neighborhood Events'']'
  career_goals: Anabelle aims to advance to a lead teacher role where she can shape school-wide instructional practices and mentor novice educators. She plans to pursue a master’s degree in Educational
    Leadership to qualify for an instructional coach or assistant principal position. Over the next five years, she hopes to develop a culturally responsive curriculum framework for her district, spearhead
    a district‑wide equity initiative, and establish a sustainable after‑school tutoring program that supports under‑served students in Cincinnati.
