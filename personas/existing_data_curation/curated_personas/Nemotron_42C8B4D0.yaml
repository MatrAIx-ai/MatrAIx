personas:
  professional: Anabelle Weston, a seasoned middle‑school teacher in Cincinnati, blends curiosity‑driven lesson design with practical classroom management, using interactive whiteboards and differentiated
    instruction while fostering a compassionate, collaborative culture among students and colleagues.
  sports: Anabelle Weston, a regular attendee of Zumba classes and avid weekend hiker on Eden Park trails, cheers for the Cincinnati Bengals, follows the Reds' spring training, and participates in a community
    women's recreational soccer league during the summer.
  arts: Anabelle Weston, an enthusiastic member of a book club exploring African American literature, channels that literary passion into acoustic guitar sessions at community gatherings, and draws artistic
    inspiration from soulful icons like Aretha Franklin and folk storytellers such as James Taylor, while attending Cincinnati Art Museum exhibitions featuring contemporary diaspora artists.
  travel: Anabelle Weston, who prefers well‑planned weekend escapes to culturally rich destinations like New Orleans and Asheville, structures trips around school holidays and a modest travel fund, and
    dreams of a spring pilgrimage to Washington, D.C.'s historic monuments and museums.
  culinary: Anabelle Weston, whose kitchen experiments with soul‑food twists, expertly prepares collard greens seasoned with smoked paprika, sweet‑potato lattés, and baked catfish with a Cajun rub, while
    also enjoying occasional fine‑dining experiences at Cincinnati's farm‑to‑table restaurants such as Sotto.
  core: Anabelle Weston, a compassionate educator who channels boundless energy into soulful cooking, community guitar jams, and meticulous lesson design, yet often battles a persistent worry‑engine that
    fuels midnight journaling and a perpetual quest for balance.
background:
  cultural: Anabelle identifies as African American and draws strength from her family’s deep roots in Cincinnati’s historic Black neighborhoods. She grew up attending a vibrant Baptist church that emphasized
    education, service, and cultural pride. These influences shape her teaching philosophy; she incorporates African American history and contemporary cultural references into lessons and celebrates traditions
    like Juneteenth and Black History Month with school‑wide projects. Her extended family’s emphasis on community support and resilience informs her compassionate approach to student welfare and her commitment
    to fostering an inclusive environment for all learners.
