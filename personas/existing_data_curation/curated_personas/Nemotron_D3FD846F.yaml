  hobbies: '[''Pickup Basketball'', ''Camping'', ''Historic Site Exploration'', ''Motorbike Tinkering'', ''Live Music Concerts'', ''Herb Gardening'', ''DIY Woodworking'', ''Community Volunteering'']'
  career_goals: In the short term, Jimmy aims to become a crew leader and earn a Certified Landscape Technician credential while taking night courses in horticulture at a community college. His longer-term
    ambition is to launch his own sustainable landscaping business that specializes in native plant installations, rain-garden construction, and organic pest management for residential clients. He hopes
    to blend his curiosity for new ecological methods with practical, low-cost solutions, eventually expanding the company to offer design-consulting services and employ a small team of like-minded groundskeepers.
