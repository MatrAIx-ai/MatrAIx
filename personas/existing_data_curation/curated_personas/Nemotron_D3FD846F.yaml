personas:
  professional: Jimmy Tanner, a 20‑year‑old landscaping crew member with strong horticultural knowledge and a knack for troubleshooting equipment on the fly, channels his spontaneous energy and competitive
    drive into leading crews and targeting a Certified Landscape Technician credential.
  sports: Jimmy Tanner, an avid pickup basketball player at the local park, spends weekends cheering for the New England Patriots and UConn women’s basketball, holds a season ticket with the Hartford Yard
    Goats fan club, and occasionally joins trail runs at Sleeping Brown State Park.
  arts: Jimmy Tanner, a regular at West Hartford’s Toad’s Place and the annual Connecticut Folk Festival, immerses themselves in live shows by The Avett Brothers, Fleet Foxes, and local indie folk group
    The Figgs, while treating woodworking projects as a form of folk art and sketching historic stone mills in spare moments.
  travel: Jimmy Tanner prefers low‑cost, spontaneous road trips, having camped on the shores of Block Island and hiked the cliffs of Acadia National Park, while dreaming of a future backpacking trek through
    the Scottish Highlands once their landscaping business stabilizes.
  culinary: Jimmy Tanner, who tends a micro‑green garden and dabbles in backyard grilling, loves preparing herb‑infused pesto with fresh basil and micro‑greens, pan‑seared trout with lemon‑dill sauce, and
    a hearty New England clam chowder using locally sourced clams.
  core: Jimmy Tanner blends hands‑on optimism with a restless, competitive streak, turning backyard experiments and spontaneous bike rides into stepping stones toward a future sustainable landscaping venture.
background:
  cultural: Jimmy comes from a working-class white New England family that has lived in the Middlesex County area for several generations. His upbringing emphasized hard work, self-reliance, and community
    involvement, typical of small-town Connecticut culture. Seasonal changes shaped his appreciation for outdoor activities—from summer gardening to winter snow removal. Local traditions such as Fourth
    of July fireworks, fall harvest festivals, and town parades fostered a strong sense of neighborly ties. While he identifies with mainstream American culture, he also respects the region’s colonial history
    and the values of modesty and practicality that have been passed down through his family.
attributes:
  skills: '[''Plant Identification'', ''Seasonal Horticulture'', ''Landscape Design'', ''Equipment Operation'', ''Equipment Maintenance'', ''Irrigation System Installation'', ''Safety Compliance'', ''Team
