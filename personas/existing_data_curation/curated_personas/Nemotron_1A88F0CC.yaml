personas:
  professional: Alaa Choudry is a toddler explorer who delights in building block structures, showcasing early engineering curiosity, and they thrive on predictable routines while preferring quiet, solitary
    play that lets them focus deeply on each creation.
  sports: Alaa Choudry enjoys toddler gymnastics at the local YMCA and participates in the Vernon Hills Tigers tiny-tots soccer program, they prefer solitary practice with a soft foam ball, and they occasionally
    watch the Chicago Cubs games with family, finding the steady rhythm of the sport comforting.
  arts: Alaa Choudry loves listening to gentle lullabies by A. R. Rahman and upbeat nursery rhymes from Disney, often humming along while coloring picture books that depict vibrant festival scenes, and
    they are fascinated by the bright kinetic art displayed at the neighborhood cultural center.
  travel: Alaa Choudry enjoys family outings to nearby Chicago attractions such as Navy Pier and the Lincoln Park Zoo, looks forward to seasonal trips to the Wisconsin Dells water park, and they dream of
    a future visit to Marrakech for its colorful markets and lantern-lit nights.
  culinary: Alaa Choudry prefers soft, mildly spiced rice porridge swirled with mango puree, enjoys sipping warm mango lassi, they often help stir the pot with a tiny wooden spoon, and they delight in crunchy
    carrot sticks as a snack.
  core: Alaa Choudry is a quiet, structure-loving toddler who finds comfort in solitary play, soothing music, and the predictable rhythm of daily routines, while they occasionally scatter toys in a charmingly
    disorganized fashion.
background:
  cultural: Alaa comes from a South Asian family—likely with roots in India, Pakistan, Bangladesh, or Sri Lanka—living in Vernon Hills, Illinois. At home he is exposed to family languages such as Hindi,
    Urdu, Punjabi, or Bengali, as well as South Asian music, stories, and festivals like Diwali and Eid. The household balances traditional South Asian values of respect, hospitality, and community with
    the norms of American suburban life. He participates in local cultural gatherings at community centers and celebrates holidays with family, experiencing a blend of South Asian heritage and Midwestern
    American culture.
