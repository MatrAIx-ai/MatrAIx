  hobbies: '[''Watercolor painting'', ''Art gallery visits'', ''Reading art history'', ''Photography'', ''Cooking Vietnamese cuisine'', ''Attending cultural festivals'', ''Gardening'', ''Playing mahjong'',
    ''Walking in local parks'']'
  career_goals: Although nearing retirement, Duc aims to transition his extensive field experience into a mentorship and consultancy role. He hopes to train younger security personnel in best practices
    for surveillance and ethical policing, and to advise gambling establishments on improving safety protocols through technology. Duc also dreams of documenting his career stories as a modest guidebook
    for veterans in the security industry, preserving practical knowledge for future generations.
