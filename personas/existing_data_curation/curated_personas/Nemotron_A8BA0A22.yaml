    kitchen'', ''collecting stickers and rocks'']'
  career_goals: Zenaida dreams of becoming an artist who creates colorful murals that celebrate her Guatemalan heritage and the vibrant life of the Bronx. She also imagines herself as a future teacher or
    museum guide, sharing stories and artworks with other children. Her love for exploration makes her curious about becoming a scientist or astronaut one day, but she consistently ties her ambitions to
    helping her community and preserving cultural traditions.
