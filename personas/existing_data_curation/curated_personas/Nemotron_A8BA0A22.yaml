personas:
  professional: Zenaida Guerrero, a budding junior artist, channels her boundless curiosity and methodical nature into meticulously planned watercolor scenes, layered collages, and sturdy LEGO structures,
    often directing her classmates in classroom art projects with organized steps and encouraging unconventional ideas.
  sports: Zenaida Guerrero laces up tiny cleats for the San Antonio Youth Soccer Academy’s U‑7 team, cheers enthusiastically for the San Antonio Spurs during family game nights, and spends afternoons on
    the swings and climbing frames at Hillside Park, balancing her love for organized team play with spontaneous tag games.
  arts: Zenaida Guerrero immerses herself in creative expression by reproducing the vivid collage style of Henri Matisse’s cut‑outs in kid‑friendly form, tracing the whimsical illustrations of Eric Carle’s
    ‘The Very Hungry Caterpillar’, and dancing to the lively marimba rhythms of Los Amigos, which together shape her playful artistic identity.
  travel: Zenaida Guerrero loves weekend family road trips to the San Antonio River Walk, has taken a memorable field trip to the Grand Canyon, dreams of exploring Machu Picchu, and curates a scrapbook
    of tickets and rocks from each adventure, favoring short, well‑planned excursions that blend discovery with the comfort of familiar routines.
  culinary: Zenaida Guerrero delights in kneading masa dough for tamales alongside her family, skillfully rolls tiny fruit rolls, measures cheese and salsa for mini quesadillas, and proudly enjoys the sweet
    taste of strawberry jam on toast, displaying a budding confidence in the kitchen while sometimes getting flour on her apron.
  core: Zenaida Guerrero is a fiercely organized six‑year‑old creator who balances meticulous art projects with spontaneous sticker hunts, manages her allowance with a piggy bank, and tackles mild allergies
    with a cheerful, self‑directed routine.
background:
  cultural: Zenaida is a first-generation American of Guatemalan descent. She grows up in a bilingual household where Spanish is spoken at home and English at school. Her family celebrates Guatemalan holidays
    such as Día de la Independencia and Día de los Muertos, often enjoying traditional foods like tamales and pupusas. Living in the Bronx, she attends a multicultural elementary school, participates in
    community festivals, and is influenced by the artistic street murals and diverse neighborhoods that surround her. Her cultural identity blends the rich traditions of her parents' homeland with the dynamic
    urban life of New York City.
