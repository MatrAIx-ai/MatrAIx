  hobbies: '[''Woodworking'', ''Vintage radio restoration'', ''Home automation tinkering'', ''Fishing'', ''Genealogy research'', ''Local history'', ''Chess'', ''Amateur radio'', ''Home brewing'']'
  career_goals: He aims to transition his practical experience into a part‑time consulting role, helping local small manufacturers implement lean processes and improve equipment reliability. He also plans
    to earn a certification in advanced woodworking to launch a custom furniture side‑business, and to mentor younger community members through a local vocational program.
