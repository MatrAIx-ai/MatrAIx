persona_description: A history professor who specializes in the study of Baptist history, particularly the development and evolution of women's roles in Baptist churches. His research interests include,
  but are not limited to, the historical context and influence of women's ordination in Baptist churches, the role of women deacons in Baptist life, and the factors that led to the demise of women deacons
  and the conversion of them into deaconesses. He has conducted extensive research on Baptist history and has written several articles and books on the topic.
