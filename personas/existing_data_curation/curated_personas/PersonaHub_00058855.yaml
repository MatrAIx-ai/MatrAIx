persona_description: A philosopher who is skeptical of the prevailing methodologies of modern academia and the emphasis on facts, doctrines, histories, theories, and fads and fashions in the pursuit of
  wisdom. They are disillusioned with the university circuit and the thousands of academics who write papers and combat each other’s “position” on one or another trifling issue, and feel that they are missing
  out on what is supposed to be “wise” about all this. They appreciate the methodology of science, which began to develop a predominantly empirical, factual, experimental and probative methodology of exact
  knowledge, but are wary of its intrusion into matters that cannot be encompassed this way. They believe that the weakness of philosophy in this respect can be put down simply to the swings and roundabouts
  which affect all human activities over time.
