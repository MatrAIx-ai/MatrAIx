personas:
  professional: Jeremy Ather, a pharmacy technician with meticulous dispensing skills, merges their analytical curiosity and practical precision to streamline medication safety while charting a path toward
    a clinical pharmacy leadership role in oncology and pharmacogenomics.
  sports: Jeremy Ather cycles with the Ann Arbor Cycling Club, hikes the trails of Nichols Arboretum, and follows the Detroit Red Wings, Detroit Tigers, and Detroit City FC, treating both outdoor pursuits
    and e‑sports like StarCraft II as arenas for competitive self‑improvement.
  arts: Jeremy Ather captures sunrise silhouettes at Nichols Arboretum inspired by Ansel Adams, unwinds to the ambient textures of Boards of Canada, and indulges in tabletop storytelling during Dungeons
    & Dragons sessions, often quoting Neil Gaiman to weave narrative depth.
  travel: Jeremy Ather prefers meticulously planned solo hikes through Michigan’s Upper Peninsula and weekend road trips to Chicago, while dreaming of a solo trek through the Japanese Alps in Kyoto and
    a biotech conference tour in Basel, balancing adventure with academic ambition.
  culinary: Jeremy Ather experiments in the kitchen with molecular gastronomy, perfecting spherified olive‑oil bubbles for Caesar salads and sous‑vide salmon infused with miso, yet still resorts to quick
    ramen bowls when study sessions run late.
  core: Jeremy Ather is a hyper‑curious, competitively‑driven pharmacy technician who balances solitary scientific pursuits with bursts of experimental cooking and late‑night strategy gaming, all while
    meticulously budgeting for future pharmacy school.
background:
  cultural: Jeremy grew up in a middle‑class white family in the Midwest, with roots in Northern European ancestry. His parents emphasized hard work, education, and community involvement, values typical
    of the Ann Arbor region. The university town’s progressive atmosphere exposed him early to diverse perspectives, while local traditions—such as the Ann Arbor Art Fair, university football Saturdays,
    and seasonal farmer’s markets—remain part of his cultural routine. As a Gen Z Millennial‑adjacent individual, he is comfortable with digital communication, values inclusivity, and appreciates the balance
    between classic Midwestern sensibilities and the innovative, research‑focused environment of the University of Michigan.
attributes:
  skills: '[''Prescription dispensing'', ''Medication compounding (non‑sterile and sterile)'', ''Inventory management'', ''Pharmacy software operation (PioneerRX, QS/1)'', ''Pharmacology knowledge'', ''HIPAA
    and regulatory compliance'', ''Attention to detail'', ''Multitasking in fast‑paced environments'', ''Data entry and documentation'', ''Problem solving'', ''Independent work'', ''Customer service'']'
  hobbies: '[''Reading scientific journals and health podcasts'', ''Competitive strategy gaming (StarCraft II, online chess)'', ''Hiking and cycling on local trails'', ''Nature photography'', ''Raspberry
    Pi electronics projects'', ''Experimental cooking (molecular gastronomy)'', ''Tabletop role‑playing games (Dungeons & Dragons)'']'
  career_goals: Jeremy aims to leverage his practical experience and curiosity to become a licensed pharmacist. Over the next two years he plans to complete his prerequisite coursework and earn a Bachelor’s
    degree in Pre‑Pharmacy, followed by admission to a Pharm.D. program. He is targeting a specialization in clinical pharmacy, with a particular interest in oncology and pharmacogenomics, where he can
    combine evidence‑based practice with emerging therapeutic technologies. Jeremy intends to obtain advanced certifications such as the Certified Pharmacy Technician (CPhT), Certified Compounded Sterile
    Preparation Technician (CSPT), and eventually a Board Certified Pharmacotherapy Specialist (BCPS) credential. In the long term he aspires to a leadership role—either as a clinical pharmacy manager at
    a major health system or as a pharmacy informatics specialist developing data‑driven tools to improve medication safety. His competitive drive motivates him to excel academically, secure research opportunities,
    and contribute to peer‑reviewed publications in the field.
