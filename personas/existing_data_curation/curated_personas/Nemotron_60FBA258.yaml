    Activity Planning'']'
  hobbies: '[''Hiking and nature journaling'', ''DIY woodworking projects'', ''Puzzle solving (crosswords, logic games)'', ''Reading non-fiction (psychology, education, Michigan history)'', ''Baking sourdough
    and herbal tea brewing'', ''Small-group board games'', ''Community garden volunteering'']'
  career_goals: Ann aims to leverage her practical experience and curiosity for innovative pedagogy to become a director of a small, community‑focused daycare or to launch her own home‑based early learning
    center that emphasizes evidence‑based play and STEM exposure for preschoolers. She plans to complete a bachelor’s degree in Early Childhood Education within the next two years and obtain the Child Development
    Associate (CDA) credential along with NAEYC accreditation for her program. Her competitive nature drives her to be recognized locally for high‑quality care, potentially earning a “Best Childcare Provider”
    award in Wexford County. Long‑term, she envisions mentoring fellow childcare workers, leading workshops on curriculum design, and influencing state policy on early childhood standards.
