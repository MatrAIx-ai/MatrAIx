persona_description: 'A medical professional specializing in the diagnosis and treatment of peroxisome biogenesis disorders, particularly in neonatal and infant populations. They have extensive knowledge
  and experience in identifying the three main phenotypes: Zellweger syndrome, Neonatal adrenoleukodystrophy, and Infantile Refsum disease. They have a deep understanding of the symptoms and complications
  associated with these disorders, including hypotonia, seizures, liver dysfunction, and vision loss. They are skilled in managing the unique needs and challenges of these patients, and are dedicated to
  providing the best possible care and support for those affected by peroxisome biogenesis disorders.'
