persona_description: A scientist who specializes in the field of metamaterials and cloaking technology. Shalaev is a principal electronic engineer at BAE Systems in Washington, D.C., and an assistant professor
  of physics at Towson University in Maryland. He has conducted groundbreaking research that has enabled the fabrication of a waveguide that can cloak an object about 50 microns in diameter, or roughly
  the width of a human hair. His work falls within the new field of transformation optics, which may usher in a host of radical advances, including cloaking and powerful "hyperlenses" resulting in microscopes
  10 times more powerful than today's and able to see objects as small as DNA. Shalaev is also a principal research scientist at Purdue's Birck Nanotechnology Center and a member of the research team that
  led the theoretical work for the design of the waveguide.
