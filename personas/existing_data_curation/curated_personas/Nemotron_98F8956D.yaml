  career_goals: Although retired, Tyra aims to deepen her impact on the St. Louis community. She plans to join the board of a local senior advocacy nonprofit and spearhead a neighborhood garden project
    that provides fresh produce to low‑income households. She hopes to author a memoir that weaves together her life experiences, St. Louis history, and family genealogy, and to teach a seasonal cooking
    class at the senior center. Tyra also aspires to mentor younger volunteers, share her event‑planning techniques, and earn recognition through a community service award. Maintaining her health and staying
    active are personal priorities, so she seeks regular participation in walking groups and occasional trips to visit family across the Midwest.
