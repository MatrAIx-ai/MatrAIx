  career_goals: Tuong aims to open a small boutique studio in Worcester that offers a quiet, low‑stress environment where clients receive highly personalized hair services. She plans to acquire an advanced
    certification in color theory within the next two years and eventually develop her own line of natural, Southeast‑Asian‑inspired hair care products. Her ambition includes building a reputation as a
    trusted stylist for the local diaspora community while maintaining a sustainable business model that allows her to work independently and minimize demanding social interactions. Long‑term, she envisions
    mentoring a select few apprentices who share her preference for thoughtful, solitary craftsmanship.
