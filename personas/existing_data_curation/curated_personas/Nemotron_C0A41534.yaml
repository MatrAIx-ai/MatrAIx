personas:
  professional: Tuong Saleh, a 28‑year‑old hair stylist in Worcester, blends meticulous precision cutting with advanced color techniques like balayage, leverages sustainable, eco‑friendly products, and
    cultivates a quiet, client‑centred boutique studio vision that reflects their love of solitary creative work, while their organized yet flexible approach and healthy skepticism keep them grounded amid
    last‑minute requests.
  sports: Tuong Saleh finds low‑impact fitness in early walks through Worcester’s Elm Park, weekly yoga at a quiet studio, occasional half‑marathon training runs for stress release, and passionately follows
    the Worcester Red Sox and Boston Celtics, using sports as a brief, communal respite.
  arts: Tuong Saleh draws inspiration from ambient composers like Brian Eno and Nils Frahm, reads poetry by Rilke and classic novels by Austen, sketches fashion and hair designs reminiscent of Alexander
    McQueen in a solitary notebook, and regularly visits the Worcester Art Museum to absorb contemporary exhibitions.
  travel: Tuong Saleh prefers off‑season, contemplative travel, having explored Kyoto’s zen gardens and Bali’s rice terraces, dreaming of Iceland’s geothermal springs, and plans trips that balance budget
    constraints with time for sketching and meditation.
  culinary: Tuong Saleh enjoys crafting herb‑infused teas with lemongrass and ginger, cooking basil pesto pasta, miso soup, and fresh spring rolls, and experiments with natural hair care blends using coconut
    oil, rosemary, and avocado, while sometimes ordering quick takeout when salon rushes dominate.
  core: Tuong Saleh is a solitary, detail‑obsessed hair artist whose anxiety drives a relentless quest for perfection, leading them to meticulously curate both salon space and personal rituals, even if
    it means occasional over‑thinking and impulse purchases of exotic herbs.
background:
  cultural: Tuong was born to Southeast Asian immigrant parents, with her family tracing its roots to Vietnam. Growing up in Worcester’s Vietnamese community, she was raised bilingual in English and Vietnamese
    and participated in cultural festivals such as Tet. Her family emphasized respect for tradition, a strong work ethic, and the importance of supporting one another, values that still influence her professional
    demeanor. This cultural heritage informs her aesthetic sensibility, often incorporating subtle Southeast Asian motifs and natural ingredients into her styling and product ideas, while she also cherishes
    quiet moments of personal reflection that balance her communal upbringing.
