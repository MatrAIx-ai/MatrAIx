  career_goals: Dean aims to merge his love for technology and teamwork. He aspires to become a software engineer or game developer who creates collaborative experiences. In the near term, he wants to join
    his middle school's robotics club, win a regional coding competition, and secure a varsity spot on the soccer team. He also hopes to lead a community tech workshop for younger students, channeling his
    competitive drive into mentorship.
