  career_goals: As she approaches the next phase of her career, Nancy aims to cement a lasting legacy by mentoring the next generation of leaders and implementing a robust succession plan for the company.
    She envisions expanding the organization’s impact on the local community through sustainable practices, increased charitable partnerships, and employee‑focused wellness programs. Additionally, she hopes
    to serve on regional business boards and advisory councils, sharing her expertise while continuing to champion inclusive, compassionate leadership.
