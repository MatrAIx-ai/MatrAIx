  hobbies: '[''Chess (online and over‑the‑board)'', ''Model building (airplanes, cars)'', ''Strategy video gaming (turn‑based and real‑time strategy)'', ''Fishing in local bayous and lakes'', ''Listening
    to zydeco and classic rock music'', ''Attending small‑group local events (Mardi Gras parades, high school football games)'', ''Learning Python through online tutorials'']'
  career_goals: Amin aims to secure a stable, structured career that builds on his practical skills. His short‑term goal is to earn a vocational certification as an automotive technician or IT support specialist,
    allowing him to enter the workforce with clear credentials. He envisions gaining experience in a reputable garage or tech service firm while continuing to develop his coding abilities. Long‑term, he
    hopes to open his own small business—either a neighborhood auto repair shop or a freelance tech support service—where he can apply his competitive drive and maintain a predictable work environment.
