personas:
  professional: Amin Dolfie, a 17‑year‑old aspiring automotive technician and IT support specialist, channels their competitive drive and love for methodical problem‑solving into hands‑on car repairs and
    troubleshooting home networks while preparing for a vocational certification.
  sports: Amin Dolfie follows the New Orleans Saints and the Pelicans, roots for the Metairie High Hurricanes during Friday night football, and spends weekend mornings fishing the nearby bayous with a small
    club, treating both spectator sports and angling as disciplined outlets for competition.
  arts: Amin Dolfie immerses themselves in the rhythmic strains of Buckwheat Zydeco and classic rock legends like Led Zeppelin, hones strategic creativity through online chess tournaments, and appreciates
    the tactile artistry of assembling detailed airplane and car model kits as a personal form of sculptural expression.
  travel: Amin Dolfie prefers low‑key, budget‑friendly trips, having explored the French Quarter during Mardi Gras, fished at Grand Isle, and now dreaming of a road‑trip to Austin for its live music scene
    and a future venture to Yellowstone National Park for wilderness solitude.
  culinary: Amin Dolfie can whip up a hearty gumbo and simmer a fragrant jambalaya, takes pride in crafting a perfectly seasoned po’boy with shrimp, and enjoys seasoning blackened catfish with Cajun spices
    while keeping their cooking skill level solidly intermediate.
  core: Amin Dolfie is a methodical 17‑year‑old who blends a love of structured hands‑on work with a quiet competitive streak, balancing solo pursuits like coding and model‑building with a pragmatic, slightly
    frugal lifestyle.
background:
  cultural: Amin comes from a white, middle‑class family in Metairie, Louisiana, a suburban enclave of New Orleans. The area blends Southern hospitality with strong French‑Creole influences, shaping local
    customs, cuisine, and music. He grew up with the region’s signature dishes—gumbo, jambalaya, and po’boys—and heard zydeco and jazz as part of community celebrations. While his family values privacy
    and self‑reliance, they also participate in neighborhood gatherings and seasonal festivals. This cultural mix has contributed to his reserved demeanor, competitive drive, and appreciation for structured,
    practical pursuits.
attributes:
  skills: '[''Automotive maintenance (oil changes, brake inspection, tire rotation)'', ''Basic computer troubleshooting and OS reinstallations'', ''Self‑taught Python scripting (automation scripts, small
