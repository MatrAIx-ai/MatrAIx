  hobbies: '["Drawing and coloring with crayons", "Building towers with wooden blocks", "Listening to library storytime", "Singing and dancing to children’s songs", "Collecting leaves and rocks in the park",
    "Solving simple jigsaw puzzles", "Playing educational tablet games", "Helping in the kitchen with simple tasks"]'
  career_goals: Indira dreams of becoming a children’s book author and illustrator, creating vibrant stories that spark imagination. She also envisions designing colorful playgrounds as an architect, merging
    her love for art and structure. Occasionally she imagines herself as a scientist or astronaut exploring new worlds, reflecting her curiosity and openness to unconventional ideas. Her ambitions combine
    creativity, organization, and a desire to make a joyful impact on others.
