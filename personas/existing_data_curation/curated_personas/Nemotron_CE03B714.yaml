  career_goals: Gloria aims to transition her passion for art and community engagement into a part‑time role as a freelance curatorial consultant or cultural liaison, focusing on showcasing emerging local
    talent in Galveston. She plans to complete a bachelor's degree in art history or cultural studies to deepen her expertise and to secure grant funding for a pop‑up gallery space that highlights under‑represented
    artists. Parallel to her professional aspirations, she hopes to develop a peer‑support network that uses creative expression—such as collaborative murals and writing workshops—to help individuals navigate
    anxiety and emotional distress.
