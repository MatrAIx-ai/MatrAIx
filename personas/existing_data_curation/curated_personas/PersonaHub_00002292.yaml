persona_description: A school district administrator responsible for overseeing and implementing the curriculum and instruction within a school district. This persona is knowledgeable about the implementation
  of the Pennsylvania Common Core standards and the use of the Student Assistance Program (SAP) to identify and address barriers to learning. They are also familiar with the criteria for gifted education
  eligibility and the services provided to students with disabilities. This persona is responsible for ensuring that all students receive a high-quality education and that the district is meeting its educational
  goals.
