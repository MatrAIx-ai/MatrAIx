personas:
  professional: Diego Aguilar is a detail‑oriented auditor who leverages their expertise in GAAP‑compliant reporting, advanced Excel analytics, and bilingual client communication to streamline audit workflows
    while maintaining a structured, dependable approach that teammates rely on.
  sports: Diego Aguilar plays forward in a local recreational soccer league, hikes the Wasatch foothills with the Wasatch Trailblazers Club each Saturday, and roots for Real Salt Lake and the Utah Jazz,
    balancing competitive play with low‑key endurance training.
  arts: Diego Aguilar strums acoustic guitar nightly, draws inspiration from indie folk artists like Father John Misty and regional folk ensembles, and regularly attends live shows featuring both local
    singer‑songwriters and vibrant banda performances at Salt Lake City venues.
  travel: Diego Aguilar prefers weekend road trips that mix scenic hikes in national parks such as Zion and Arches with cultural stops at historic towns like Santa Fe, while dreaming of future adventures
    to coastal festivals that celebrate their heritage’s music and cuisine.
  culinary: Diego Aguilar, an enthusiastic home chef, skillfully blends traditional family recipes—like masa‑based enchiladas and slow‑cooked pork shoulder—with Utah ingredients such as wild trout, locally
    sourced sage, and heirloom tomatoes, often finishing dishes with a splash of lime and fresh cilantro.
  core: Diego Aguilar balances a methodical professional life with a lively social circle, but their habit of binge‑watching late‑night soccer recaps sometimes cuts into sleep, leaving them a bit groggy
    for early morning hikes.
background:
  cultural: Diego was raised in a Mexican‑American household where family gatherings, traditional foods, and bilingual communication were daily norms. His parents emigrated from Jalisco, imparting a strong
    sense of Mexican cultural identity blended with the values of hard work and community service common in Utah. He celebrates holidays such as Día de los Muertos and Mexican Independence Day, while also
    embracing local customs like winter ski trips. His fluency in Spanish and deep appreciation for Mexican traditions inform both his professional rapport with Hispanic clients and his personal commitment
    to preserving cultural heritage within the broader Utah community.
