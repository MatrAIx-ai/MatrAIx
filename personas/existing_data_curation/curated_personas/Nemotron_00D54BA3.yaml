  hobbies: '[''Soccer (recreational league)'', ''Hiking in the Wasatch Mountains'', ''Cooking Mexican cuisine'', ''Playing acoustic guitar'', ''Attending live music events'', ''Financial‑literacy volunteering'',
    ''Participating in cultural festivals'']'
  career_goals: Diego aims to obtain his Certified Public Accountant (CPA) license within the next two years, followed by promotion to senior auditor and eventually audit manager at his firm. He envisions
    leveraging his expertise to become a chief financial officer (CFO) of a mid‑size company, preferably one that serves the Hispanic small‑business community. Additionally, he aspires to earn an MBA with
    a focus on strategic finance, and to launch a boutique financial consultancy that provides affordable accounting and financial‑literacy services to Mexican‑American entrepreneurs in Utah.
