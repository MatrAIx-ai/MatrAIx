personas:
  professional: Jennifer Thomas, a seasoned housekeeping professional with an associate's degree in hospitality, excels at systematic cleaning, meticulous inventory management, and eco‑friendly workflow
    design, and is actively pursuing green‑cleaning certification and small‑business coursework to rise into a supervisory role or launch a boutique cleaning service for high‑end residences.
  sports: Jennifer Thomas participates in the Naples Community Center Walking Club for sunrise beach walks, enjoys weekly pickleball matches at a local senior fitness center, supports the Tampa Bay Buccaneers
    and Miami Heat, and occasionally watches the Tampa Bay Rays while adhering to a light‑impact exercise routine that balances her love for the outdoors with low‑stress cardio.
  arts: Jennifer Thomas finds creative fulfillment in crocheting blankets for friends and charitable causes, loses herself in mystery novels by Agatha Christie and Gillian Flynn, attends Gulf Coast Museum
    of Art exhibitions, and relaxes to the soothing sounds of Norah Jones and the classic jazz of Bill Evans during her evenings.
  travel: Jennifer Thomas plans her travel with meticulous spreadsheets, favoring relaxed getaways like shell‑collecting trips to Sanibel Island, weekend cruises to the Caribbean, and dreaming of a scenic
    retreat to Santorini, while balancing family commitments and using credit‑card rewards to stretch her moderate travel budget.
  culinary: Jennifer Thomas delights in cooking fresh Florida seafood such as grilled grouper with citrus beurre blanc, stone crab legs seasoned with Old Bay, and shrimp‑avocado tacos garnished with cilantro
    and lime, showcases moderate‑to‑high culinary skill using ingredients like key lime, fresh basil, and locally sourced herbs, and occasionally dines out at waterfront restaurants for a splash of inspiration.
  core: Jennifer Thomas blends meticulous housekeeping expertise with a calming love for succulents, community service, and eco‑friendly living, they balance disciplined budgeting with occasional indulgences,
    and they navigate life with a structured, low‑stress, detail‑oriented outlook.
background:
  cultural: Jennifer comes from a middle‑class white American background, raised in a modest small‑town environment that emphasized hard work, self‑reliance, and community service. The values of Southern
    hospitality and practicality shape her daily interactions, while living in Naples has exposed her to a multicultural atmosphere, leading her to appreciate local Latin‑influenced cuisine and festivals.
    She maintains a blend of traditional American family customs with an open, respectful attitude toward the diverse cultural fabric of her Floridian community.
attributes:
  skills: '[''Residential cleaning'', ''Deep‑cleaning techniques'', ''Laundry and fabric care'', ''Inventory management'', ''Time management'', ''Customer service'', ''Team training'', ''Safety and chemical
    handling'', ''Scheduling and logistics'']'
  hobbies: '[''Gardening'', ''Beach walks'', ''Mystery novels'', ''Cooking seafood dishes'', ''Crocheting'', ''Volunteer work at community center'', ''DIY home projects'', ''Attending church events'']'
  career_goals: Jennifer aims to advance into a supervisory role within a hotel or resort housekeeping department in Naples, where she can lead a team, streamline operations, and mentor junior staff. She
    also envisions launching her own boutique cleaning service focused on green, detail‑oriented cleaning for high‑end residential clients. To support these goals, she plans to obtain certification in green
    cleaning and pursue additional coursework in small‑business management before transitioning to a consulting role as she approaches retirement.
