personas:
  professional: Corinne Schultz, a budding junior event organizer, channels their love for structure and social energy into planning detailed birthday parties and Girl Scout gatherings, turning each activity
    station into a well‑run mini‑project, and they always double‑check the schedule.
  sports: Corinne Schultz is a spirited member of the elementary school soccer team, practices ballet twice a week for discipline, cheers on the Chicago Cubs and Chicago Fire FC, and treats weekend drills
    as their personal fitness routine, and they never miss a practice unless sick.
  arts: Corinne Schultz fuels their creativity by building intricate LEGO sets, crafting friendship bracelets inspired by Taylor Swift’s pastel‑colored album covers, and rereading the Magic Tree House series
    that sparks imagination with its vivid illustrations by Mary Pope Osborne, and they often share their creations with friends.
  travel: Corinne Schultz dreams of their next family adventure to Disney World’s Magic Kingdom and the Grand Canyon, while fondly recalling school field trips to the local science museum and a weekend
    camping trip at Lake Michigan, always preferring itineraries planned with colorful spreadsheets, and they love making travel journals with stickers.
  culinary: Corinne Schultz loves making peanut‑butter‑banana mini‑sandwiches, baking chocolate chip cookies with a secret pinch of sea salt, and enjoys the bright flavor of strawberry‑shortcake, though
    they often forget to clean the kitchen counter after cooking, and they pride themselves on perfecting the cookie’s golden edges.
  core: Corinne Schultz is a meticulous 9‑year‑old whirlwind who blends a love for organized party planning, solid saving habits, and boundless social energy into every adventure, even when they accidentally
    leave a stray LEGO piece under the couch.
background:
  cultural: Corinne comes from a white, middle-class family that has lived in Orlando, Florida for several generations. Her household reflects typical American cultural traditions, celebrating holidays
    such as Thanksgiving, Christmas, and the Fourth of July with family gatherings, seasonal meals, and community fireworks. The family attends a local Protestant church, where they emphasize service and
    community involvement, which aligns with Corinne's participation in Girl Scouts and shelter volunteering. Living in central Florida, she often visits nearby theme parks and enjoys the multicultural
    atmosphere of Orlando's tourist-driven community, giving her exposure to diverse customs while maintaining her family's own traditions.
