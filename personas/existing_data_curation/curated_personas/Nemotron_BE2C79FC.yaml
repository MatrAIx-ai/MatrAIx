  career_goals: Corinne dreams of becoming an elementary school teacher because she loves helping classmates understand new topics and appreciates the structured environment of a classroom. She also thinks
    about working as a veterinarian, motivated by her kindness toward animals and desire to provide organized care. In the longer term, she imagines planning community events such as school fairs or neighborhood
    clean-ups, where she could combine her sociable nature with her knack for planning and coordinating activities.
