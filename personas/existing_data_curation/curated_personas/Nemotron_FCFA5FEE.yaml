  career_goals: Although retired from formal employment, Satish aims to stay intellectually engaged by volunteering as a STEM mentor for local high‑school students, serving on the board of a regional nonprofit
    focused on senior services, and offering occasional consultancy on renewable‑energy projects. He also hopes to author a memoir that blends his immigrant journey with reflections on technological change,
    and to continue learning emerging fields such as artificial intelligence and sustainable design.
