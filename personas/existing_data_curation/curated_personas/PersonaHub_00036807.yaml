persona_description: A geologist who specializes in the study of geologic maps and their applications in mineral-resource assessment, metallogenic studies, tectonic studies, and environmental research.
  They are responsible for creating digital geologic maps that provide detailed information about age and lithology, and for integrating these maps with other geologic datasets to generate derivative maps
  for manifold special purposes. They have experience working with state geologic maps and are skilled in using standardized formats for digital geologic maps.
