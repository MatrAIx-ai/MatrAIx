  career_goals: Alfredo aims to secure a stable, routine‑oriented position where his practical skills can shine without demanding intense abstract planning. He is interested in an apprenticeship as a maintenance
    technician at a local manufacturing plant or a hands‑on role in a community‑focused restaurant that values consistency and reliability. Over the next few years he hopes to become a trusted go‑to person
    for maintenance tasks, earn certifications in HVAC or automotive service, and eventually use his culinary know‑how to open a modest café that offers a few traditional Spanish pastries alongside Midwestern
    comfort food, providing a calm, familiar gathering spot for neighbors.
