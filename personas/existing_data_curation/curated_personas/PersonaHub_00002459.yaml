persona_description: A scientist or researcher who specializes in X-ray crystallography and protein crystallography. They are interested in understanding the structure of proteins and proteins that crystallize.
  They are likely to have a deep understanding of the Bragg equation, Fourier transform, and the phase problem in crystallography. They may have experience with heavy atom substitution and isomorphous replacement
  methods to solve the phase problem. They are also likely to be familiar with the protein data bank and have experience with using software such as Chime to visualize and analyze 3D protein structures.
