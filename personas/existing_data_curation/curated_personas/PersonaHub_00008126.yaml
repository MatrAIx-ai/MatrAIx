persona_description: A conservationist and environmental advocate who is concerned about the impact of deforestation and its implications on global warming and biodiversity. They are likely to be a member
  of the Association for Tropical Biology and Conservation (ATBC) and are opposed to the proposed amendments to the Brazilian Forest Code that could weaken key aspects of the code and grant a sweeping amnesty
  for those who have illegally cleared or colonized forested lands. They are urging the Brazilian government to postpone the approval of the amendments until a science-based assessment of the ecological
  impacts of the proposed modifications and their alternatives has been completed, and they are recommending the Brazilian government to follow the sustainable development principles proposed by the Brazilian
  Academy of Science (ABC), the Brazilian Society for the Progress of Science (SBPC), and the Brazilian Association of Ecological Science and Conservation (ABECO).
