personas:
  professional: Sabrina Johnsonlewis, a 66‑year‑old veteran financial analyst and strategist, leverages three decades of expertise in budgeting, cash‑flow optimization, risk assessment and portfolio diversification,
    while her curiosity and love for unconventional ideas drive her to blend finance with art in part‑time consulting, mentorship of emerging women professionals, and advisory roles for impact‑investment
    funds.
  sports: Staying fit through weekly yoga, sunrise walks along the Intracoastal Trail, and occasional paddle‑boarding, Sabrina Johnsonlewis also roots for the Miami Heat and the Tampa Bay Buccaneers while
    playing touch‑tennis with the Fort Lauderdale Senior Sports Club during cooler months.
  arts: An avid lover of visual storytelling, Sabrina Johnsonlewis spends Saturday mornings touring Fort Lauderdale galleries featuring works by Kehinde Wiley, Faith Ringgold and local muralist Mike Leland,
    fills evenings with live jazz from a Wynton Marsalis tribute trio at The Blue Moon, hones improvisational wit at the Fort Lauderdale Improv Ensemble, and curates a personal collection of vibrant African‑inspired
    textile art that doubles as communal narrative.
  travel: Sabrina Johnsonlewis prefers thoughtfully curated cultural trips—her recent pilgrimage to Trinidad for Carnival, a week‑long immersion in Jamaica’s reggae scene and Creole cuisine, and a solo
    stroll through Mexico City’s historic mural districts—yet her curiosity sometimes spurs impromptu weekend getaways to the Bahamas when a last‑minute flight opens up.
  culinary: Delighting in vibrant Caribbean and Creole flavors, Sabrina Johnsonlewis is known among friends for her spicy shrimp étouffée, homemade callaloo, perfectly seasoned jerk chicken, fresh mango
    salsa, and she often caps her yoga sessions with a turmeric‑infused tea to boost energy.
  core: Sabrina Johnsonlewis blends a razor‑sharp financial mind with a restless artistic curiosity, juggling meticulous spreadsheet routines and sudden impulse buys of pottery supplies, all while championing
    community empowerment through storytelling and occasionally forgetting to file paperwork on deadline.
background:
  cultural: Sabrina is a first‑generation African‑American who grew up during the civil‑rights era in the South before moving to South Florida. Her upbringing was rooted in church, family storytelling,
    and a strong sense of community activism. In Fort Lauderdale, she embraces the vibrant Black diaspora, drawing inspiration from Caribbean rhythms, Creole cuisine, and the historic "Black Beach" community.
    Her heritage informs her values of resilience, mutual aid, and cultural pride, shaping both her professional ethos and personal pursuits. As a widowed senior, she balances honoring her ancestors with
    championing empowerment for younger Black professionals.
