  career_goals: While transitioning toward a phased retirement, Sabrina aims to leverage her expertise to mentor the next generation of Black women in finance, serve on the board of a local nonprofit focused
    on economic empowerment, and launch a community‑based financial literacy program that blends art and storytelling to make finance accessible. She also plans to consult part‑time for small businesses
    seeking sustainable growth and explore advisory roles with impact‑investment funds that align with her values of social responsibility and innovative thinking.
