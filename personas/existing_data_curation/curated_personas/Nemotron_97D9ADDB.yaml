personas:
  professional: Mai Kim, a preschool helper who coordinates toy rotations, meticulously arranges activity stations, and gently mediates conflicts, reflecting their methodical organization, sociable energy,
    and deep compassion.
  sports: Mai Kim, an energetic kindergarten soccer enthusiast who plays forward for the Tiny Tigers club, cheers on the local City Lions during weekend games, and attends swimming lessons at the community
    pool, displaying sociable teamwork and a love for organized play.
  arts: Mai Kim, a curious budding artist who spends afternoons finger-painting bright mandalas, thrills at storytime performances of classic fairy tales by the local children’s theatre, and can recite
    the alphabet song by Sesame Street, blending their love for unconventional ideas with a compassionate desire to share art with friends.
  travel: Mai Kim, a wide-eyed little explorer who has visited the city zoo, the sunny beach of Seaside Cove, and a family road trip to the mountains of Pine Ridge, and dreams of traveling to Disneyland
    and the Great Wall, preferring well-planned itineraries but also delighting in spontaneous ice-cream stops.
  culinary: Mai Kim, a foodie in training who adores strawberry-topped pancakes, crunchy carrot sticks with hummus, and the occasional cheesy pizza slice, helps stir batter with a wooden spoon, and insists
    on tasting every spice jar, showing curiosity but sometimes over-indulging in sweet treats.
  core: Mai Kim is a bright, organized, and compassionate four-year-old who balances meticulous planning with boundless curiosity, often channeling her energy into caring for friends and exploring the world
    around her.
background:
  cultural: Mai comes from a Korean-American family that settled in Los Angeles. At home, she hears both Korean and English, celebrates Chuseok and Lunar New Year with traditional foods like rice cakes
    and kimchi, and participates in a weekend Korean language preschool where she learns basic Hangul characters and folklore stories. The multicultural vibe of Los Angeles exposes her to a rich tapestry
    of cultures, from Mexican festivals to diverse art forms, which fuels her curiosity and appreciation for varied experiences while keeping a strong connection to her Korean heritage.
