persona_description: A historian who is interested in the history of World War I and the Treaty of Versailles, particularly the impact of the treaty on Germany's economy and the treatment of Germany by
  the Allies. The historian is also interested in the principles of President Wilson and the way they could have been applied differently to strengthen Germany's position in the treaty. The historian is
  likely to be familiar with the Treaty of Versailles and the events leading up to it, and may have a deep understanding of the economic and political factors that contributed to the outbreak of World War
  II.
