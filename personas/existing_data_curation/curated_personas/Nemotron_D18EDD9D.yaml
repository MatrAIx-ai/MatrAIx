personas:
  professional: Ansel Selles is a 25‑year‑old mechanical maintenance specialist who blends industrial welding expertise with a kinetic‑art mindset, often favoring spontaneous, improvised fixes over strict
    procedural checklists, which makes them a uniquely creative problem‑solver but also a chronic deadline‑evader on the path toward a lead mechanic role at a renewable‑energy plant.
  sports: Ansel Selles is a 25‑year‑old who squeezes spontaneous one‑on‑one basketball games into their schedule, follows the Baltimore Ravens and Washington Wizards with fervor, and plays in a community
    pickup league that meets at the Howard Community Center every Saturday, using the competitive nature of the sport to channel their drive while keeping fitness low‑key.
  arts: Ansel Selles channels their artistic curiosity into building kinetic metal sculptures and photographing urban street art across Baltimore’s Station North and DC’s U‑Street, drawing inspiration from
    Banksy, Kehinde Wiley and the experimental beats of Flying Lotus, which they remix during occasional DJ sets at neighborhood indie venues.
  travel: Ansel Selles prefers low‑key, budget‑savvy trips that blend maker culture with outdoor adventure, having road‑tripped to Asheville for its craft‑brew and woodworking scene, explored Berlin’s Maker
    Faire, and now dreams of a renewable‑energy tour in Reykjavik, all booked through a points‑earned credit card to stretch every dollar.
  culinary: Ansel Selles loves fusing Southern soul food with Caribbean zest, regularly cooking shrimp and grits with a mango‑tamarind glaze, collard greens spiced with Scotch bonnet peppers, and sweet‑plantain‑infused
    cornbread, wielding a well‑worn cast‑iron skillet and a copy of The Flavor Bible as their culinary compass.
  core: Ansel Selles is a restless 25‑year‑old mechanic‑artist who thrives on impromptu welding projects, midnight sculpture builds, and surprise DJ gigs, yet constantly battles missed deadlines and a habit
    of hoarding scrap metal for future art.
background:
  cultural: Ansel is an African‑American raised in Bowie, MD, a suburb of Prince George’s County known for its strong Black community and cultural festivals. His grandparents hail from Jamaica and the Ghanaian
    coast, influencing his family's love for reggae, highlife music, and soulful cuisine like collard greens and jerk chicken. He grew up attending church gatherings where gospel singing reinforced his
    appreciation for soulful vocal expression. Community events such as the Prince George’s African American Cultural Festival and local mural projects have nurtured his respect for collective artistic
    expression while his family traditions keep his connection to the broader Black diaspora alive.
attributes:
  skills: '["Industrial machinery maintenance", "Refractory linings repair", "MIG/TIG welding", "Blueprint reading", "Hydraulic system diagnostics", "Pneumatic system diagnostics", "PLC troubleshooting",
    "Predictive maintenance (vibration, thermography)", "CNC machine operation", "3D modeling (Fusion 360)", "Improvisational problem solving"]'
  hobbies: '["Kinetic sculpture building", "Urban street‑art photography", "One‑on‑one basketball", "Strategy board games", "DJing at local venues", "Reading speculative fiction", "Fusion cooking (southern
    and Caribbean)", "Maker‑hackathon participation"]'
  career_goals: Ansel aims to earn journeyman certifications in mechanical maintenance and welding, then transition into a lead mechanic role at a renewable‑energy plant where he can integrate sustainable
    practices into heavy‑equipment upkeep. Long‑term, he envisions launching his own small‑scale fabrication shop that blends functional engineering with kinetic art installations, mentoring apprentices
    from his community and championing diversity in skilled trades.
