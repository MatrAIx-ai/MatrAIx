persona_description: A historian and archeologist who specializes in the study of American history and culture, particularly the conflicts and feuds that shaped the United States. They have a deep interest
  in the Hatfield and McCoy family feud and are particularly interested in the discovery of the New Year's Massacre of 1888. They are knowledgeable about the families involved, their history, and the legal
  proceedings that followed the massacre. They are also interested in the cultural and social context of the time period and how it contributed to the conflict.
