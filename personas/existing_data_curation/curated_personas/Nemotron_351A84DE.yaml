  career_goals: He aims to move into a supervisory role within the next two years, obtaining a Lean Six Sigma Green Belt to formalize his process-improvement expertise. Over the next five to seven years,
    Edgardo plans to pursue a bachelor's degree in Industrial Technology or Manufacturing Engineering, positioning himself for an Operations Manager position where he can shape plant strategy and lead large-scale
    efficiency projects. He also harbors a long-term ambition to start a small CNC machining shop that blends his curiosity for automation with the practical needs of local manufacturers.
