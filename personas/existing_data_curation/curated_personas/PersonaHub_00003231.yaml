persona_description: A marine biologist who is conducting a pilot experiment to test the potential use of cord grass (Spartina anglica) in the higher intertidal zone for consolidation and stabilization
  of tidal flats, and for the creation/restoration of pioneer salt marsh zones. The experiment aims to develop a suitable substrate in which Spartina plants can establish before being put in place, in order
  to make them less prone to wash-out by the hydrodynamic forces. The persona is knowledgeable about the challenges of re-establishing coastal vegetation on bare mudflats and the harsh environmental conditions
  that hinder settlement and survival. They have expertise in the concepts and theorems related to the use of cord grass in coastal engineering and have conducted research in the field of ecosystem engineering.
