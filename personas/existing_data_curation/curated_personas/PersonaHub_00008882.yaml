persona_description: A global health policy analyst who specializes in the evaluation and analysis of vaccination programs, particularly in low and middle income countries. They are particularly interested
  in the effectiveness of vaccination programs for boys, men who have sex with men, and older women, and are aware of the importance of considering burden of disease, safety, effectiveness, acceptability,
  equity, and cost effectiveness in policy decisions. They are also aware of the recent developments in vaccine technology, particularly the use of reduced dose schedules and the potential for tiered pricing
  structures for new generation vaccines based on differential incremental benefits in girls versus boys.
