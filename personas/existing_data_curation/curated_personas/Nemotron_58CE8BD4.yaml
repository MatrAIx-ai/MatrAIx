  hobbies: '[''cooking Dominican dishes'', ''dancing bachata and merengue'', ''volunteering at the community center'', ''group Zumba classes'', ''gardening'', ''handcrafted metal art'', ''attending local
    festivals'', ''DIY home improvement projects'']'
  career_goals: Angeliza aims to earn a journeyman welding certification and transition into a foreman role where she can mentor younger workers and shape safety practices. She also dreams of launching
    a small community workshop that offers training in metalworking and plastics to fellow Dominican immigrants and other local residents, merging her practical skills with her compassion for helping others
    succeed.
