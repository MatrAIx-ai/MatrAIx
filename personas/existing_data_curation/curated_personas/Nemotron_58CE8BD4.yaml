personas:
  professional: Angeliza Perez is a seasoned metal fabricator and plastic manufacturing specialist with over twenty years of hands‑on experience, renowned for their MIG and TIG welding mastery, CNC machine
    operation, and a pragmatic yet curious approach that drives them to mentor crews while championing safety on the shop floor.
  sports: Angeliza Perez enjoys group fitness through Zumba, roots for the Orlando Magic in basketball, follows Inter Miami in soccer, tends their backyard garden as low‑impact daily exercise, and occasionally
    joins the local community fun run each spring.
  arts: Angeliza Perez expresses their creativity by crafting metal art pieces that weave tropical motifs into welded sculptures, dancing bachata and merengue at community festivals, and drawing inspiration
    from musicians like Juan Luis Guerra and Shakira and kinetic installations by Tim Prentice.
  travel: Angeliza Perez favors purposeful travel, planning budget‑friendly trips to Caribbean islands such as Puerto Rico for cultural festivals, exploring European metal‑working workshops in Barcelona,
    and dreaming of a tech‑focused visit to Japan’s welding expos, all while balancing family commitments and workshop funding constraints.
  culinary: Angeliza Perez delights in cooking traditional island dishes such as mangú, sancocho, and tostones, meticulously seasoning with adobo, cilantro, and lime, while experimenting with plating their
    metal art alongside hearty stews, and occasionally over‑spicing meals in their enthusiasm to share flavors with neighbors.
  core: Angeliza Perez blends two decades of welding expertise with a vibrant love for dance, community service, and culinary tradition, navigating life with disciplined curiosity, a sturdy work ethic,
    and a habit of juggling too many projects at once.
background:
  cultural: Angeliza was raised in a close‑knit Dominican family that preserved the island's vibrant traditions of music, dance, and cuisine. Although she migrated to the United States as a teenager, she
    remains bilingual in Spanish and English and stays connected to her heritage through church gatherings, Dominican cultural festivals in New Jersey, and sharing family recipes with friends. Her cultural
    identity fuels her warmth, generosity, and desire to support the Dominican community in Phillipsburg.
