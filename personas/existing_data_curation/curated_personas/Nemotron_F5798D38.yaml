personas:
  professional: Connie Stephens is a 24-year-old insurance sales associate who leverages their methodical risk-assessment skills, CRM-driven lead management, and compliance expertise to exceed quotas, while
    their competitive and structured nature drives them to meticulously tailor policies and pursue a regional sales manager role within three years.
  sports: Connie Stephens hits the pavement five mornings a week with the Boston Running Club, lifts weights at Equinox, competes in the Cambridge Bowlers League, roots for the Boston Celtics and Boston
    Red Sox, and treats each workout as a data-driven performance test, logging every mile and rep to out-pace their personal bests.
  arts: Connie Stephens streams playlists that alternate between Taylor Swift's storytelling pop and Billie Eilish's moody electropop, attends off-Broadway productions starring Lin-Manuel Miranda, and collects
    limited-edition prints of Banksy's street art, reminding themselves that structured creativity fuels their sales pitch.
  travel: Connie Stephens plans trips with the precision of a project timeline, favoring weekend getaways to New York City's museums and Boston's historic Freedom Trail, while dreaming of a meticulously
    organized two-week itinerary through Kyoto's temples, Iceland's waterfalls, and the Amalfi Coast, balancing their modest travel budget with occasional splurges on boutique hotels after hitting sales
    milestones.
  culinary: Connie Stephens favours meal-prepped quinoa bowls topped with grilled salmon, roasted sweet potatoes, kale, avocado, and a drizzle of lemon-tahini, enjoys a nightly Greek yogurt parfait with
    blueberries and granola, and treats weekend brunches to avocado toast sprinkled with chili flakes and a perfectly brewed flat-white, all while experimenting with turmeric-infused smoothies for an extra
    health boost.
  core: Connie Stephens is a data-driven, competition-fueled insurance sales prodigy who balances a relentless pursuit of quotas with a disciplined fitness routine, a spreadsheet-obsessed budget, and a
    secret love for karaoke nights that surface when the pressure eases.
background:
  cultural: Connie grew up in Odessa, Texas, a small‑city community shaped by the oil and ranching industries. As a white, middle‑class Texan, she was raised in a conservative, Protestant household that
    emphasized hard work, self‑reliance, and community involvement. The regional culture—high school football, local rodeos, and a close‑knit neighbor network—instilled in her a pragmatic outlook and a
    respect for tradition, while also exposing her to the diverse workforce of the oil sector, influencing her competitive drive and practical problem‑solving style.
attributes:
  skills: '["Insurance product knowledge","Risk assessment and policy tailoring","Sales negotiation","Customer relationship management","CRM software (e.g., Salesforce)","Regulatory compliance","Data analysis
