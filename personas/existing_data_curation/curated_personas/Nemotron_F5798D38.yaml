  hobbies: '["Running and strength training","Bowling league participation","Puzzle solving (Sudoku, crosswords)","Reading non‑fiction (personal finance, self‑improvement)","Listening to business podcasts","Volunteering
    at senior community fundraisers"]'
  career_goals: Connie aims to advance to a senior sales position within the next three years, targeting a regional sales manager role where she can lead a team and drive market growth. She plans to obtain
    professional designations such as the Chartered Property Casualty Underwriter (CPCU) to deepen her expertise. Long‑term, she envisions opening her own independent insurance brokerage, providing customized
    coverage solutions while achieving financial independence and stability to support her personal life after separation.
