personas:
  professional: Kristin Bunton, an inventive recreation specialist with a STEM foundation, channels eight years of hands‑on program design into flexible, data‑driven community workshops that blend outdoor
    adventure, environmental education, and creative arts, while they sometimes let spontaneous, last‑minute adjustments override strict schedules.
  sports: Kristin Bunton, a weekend enthusiast of Washington Capitals hockey games and DC United soccer matches, also rows with the Potomac Paddle Club, hikes the C&O Canal Trail with a local outdoor crew,
    and attends community yoga classes at the YMCA, making fitness a blend of team spirit and personal adventure.
  arts: Kristin Bunton, an avid sketcher of DC’s urban murals and regular attendee of improv nights at the Washington Improv Theater, draws inspiration from street artists like Shepard Fairey and from vibrant
    self‑portrait painters whose work blends folk motifs with bold colors, while they curate pop‑science art exhibits that fuse scientific visuals with colorful storytelling.
  travel: Kristin Bunton, who favors spontaneous weekend getaways over meticulously planned vacations, dreams of wandering through a bustling market town with vibrant street food and historic plazas, and
    strolling along the canals of Amsterdam, yet often anchors trips with day hikes in Shenandoah National Park where they can practice photography and kayak on the river.
  culinary: Kristin Bunton, a self‑taught experimental cook, loves whipping up smoky‑chili chicken tacos, tangy corn‑based breakfast bowls topped with pickled onions, and avocado‑lime ceviche, frequently
    experimenting with smoked chilies, fresh herbs like epazote, and corn masa, while their occasional over‑ambitious plating leads to a lingering mess in the kitchen.
  core: Kristin Bunton, a curiosity‑driven recreation leader who thrives on blending science and art, balances a love for spontaneous adventure with a habit of occasional disorganization, turning every
    community program into a playful experiment.
background:
  cultural: Kristin is a white American raised in the Mid‑Atlantic region. Her middle name, Guadalupe, reflects a close family connection to Hispanic heritage, which enriches her appreciation for multicultural
    festivals, music, and cuisine. Living in Washington, DC, she is immersed in a diverse cultural environment that influences her commitment to inclusive community programming and her love for exploring
    art from a variety of traditions.
attributes:
  skills: '[''Program design & flexible scheduling'', ''Facilitation and group dynamics'', ''First aid & CPR'', ''Outdoor recreation leadership'', ''Environmental education'', ''Data collection & program
