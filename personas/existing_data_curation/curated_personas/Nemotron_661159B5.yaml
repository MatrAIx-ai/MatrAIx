  hobbies: '[''Gallery and museum visits'', ''Sketching urban landscapes'', ''Hiking the C&O Canal'', ''Kayaking on the Potomac River'', ''Yoga and mindfulness practice'', ''Experimental cooking (Mexican-inspired
    dishes)'', ''Improv theater attendance'', ''Photography'', ''Reading popular science'', ''Volunteering at community gardens'']'
  career_goals: Kristin aspires to move into senior leadership within the District’s Parks and Recreation Department, aiming to become a Program Director who can shape city‑wide initiatives that unite art,
    science, and outdoor activity. She dreams of launching a series of interdisciplinary community workshops that make STEM concepts accessible through creative play, and eventually founding a nonprofit
    that provides free, inclusive recreation programs for underserved youth across Washington, DC.
