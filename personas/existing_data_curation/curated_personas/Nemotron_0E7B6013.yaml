personas:
  professional: A diligent student leader, Darlita Blango coordinates the library's reading program, volunteers for community events, and practices piano with a meticulously timed schedule; they showcase
    a methodical approach to budding leadership and artistic discipline.
  sports: An organized athlete, Darlita Blango plays midfield on her middle school soccer team, follows a structured conditioning routine, cheers for the Chicago Fire FC, and they balance their love for
    team sports with occasional solo jogging to maintain consistent fitness.
  arts: A creative musician, Darlita Blango studies piano with disciplined practice, finds inspiration in R&B icons like Alicia Keys, hip-hop storytelling from Kendrick Lamar, and classic literature such
    as Maya Angelou's poems, and they often sketch scenes from their favorite songs during quiet moments.
  travel: A meticulous traveler, Darlita Blango prefers family-planned trips with detailed itineraries, has explored Chicago's Museum Campus and a weekend getaway to Milwaukee, and they dream of visiting
    New York City's Broadway shows and Orlando's Disney World, balancing adventure with structured schedules.
  culinary: A budding chef, Darlita Blango enjoys cooking soul-food staples like fried chicken, collard greens seasoned with smoked paprika, and sweet potato pie, while also mastering simple dishes such
    as homemade mac and cheese and experimenting with fresh basil and mozzarella on pizza nights, and they love sharing these meals with family during Sunday gatherings.
  core: Darlita Blango, a 13-year-old with a love for structured puzzles, disciplined piano practice, and organized community service, balances quiet introspection with a habit of over-scheduling free time
    and they have a secret penchant for late-night LEGO builds.
background:
  cultural: Darlita identifies as African American and grew up in a close‑knit Black family in Palatine, Illinois. Her cultural upbringing blends traditional African‑American customs—such as listening to
    R&B and hip‑hop, celebrating Kwanzaa, and participating in church community events—with the Midwestern values of community involvement and public service. Family gatherings often feature soul food and
    storytelling that emphasize resilience and education. The multicultural environment of Lake County, with its mix of cultures and community programs, has also shaped her appreciation for diversity and
    collective responsibility.
