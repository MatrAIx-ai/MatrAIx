  career_goals: Darlita aims to pursue a STEM‑focused career, with a particular interest in civil or software engineering where she can apply her love for structure and problem‑solving. In the near term,
    she plans to join her high school robotics team, attend summer engineering camps, and earn a leadership role in her school's technology club. She envisions herself designing safe, efficient community
    spaces and eventually contributing to projects that improve neighborhood infrastructure.
