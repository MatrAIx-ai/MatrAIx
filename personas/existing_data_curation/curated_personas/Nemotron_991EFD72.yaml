  career_goals: Renita dreams of a future where she can combine her love of people with her curiosity about the world. She hopes to become an elementary school teacher who designs interactive lessons that
    let children explore science, art, and teamwork. She also imagines leading community service projects—organizing neighborhood clean‑ups, after‑school kindness clubs, or youth mentorship programs—so
    she can help others grow in a supportive, harmonious environment.
