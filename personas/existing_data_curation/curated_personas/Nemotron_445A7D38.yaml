personas:
  professional: Ronald Miller, a 17‑year‑old aspiring visual artist and freelance content creator, channels their self‑taught Photoshop, Procreate, and HTML/CSS abilities into surf‑inspired digital illustrations
    for indie game studios, while their relaxed, curious yet slightly disorganized mindset fuels spontaneous experimentation and a competitive drive to stand out.
  sports: Ronald Miller rides the Coronado waves on a 7‑foot board and hits the skate park after school, cheering for the San Diego Wave in the NWSL and keeping an eye on the LA Chargers’ Thursday night
    games, treating fitness as a spontaneous extension of their beach‑side lifestyle.
  arts: Ronald Miller immerses themselves in mixed‑media collages, drawing inspiration from street‑muralist Shepard Fairey, indie musician Tame Impala, and experimental filmmaker Alex Garland, regularly
    attending underground screenings at the historic Balboa Theatre and sharing their AI‑enhanced surreal landscapes on Instagram.
  travel: Ronald Miller loves impulsive coastal road trips, having already explored Santa Cruz, Big Sur, and the desert art installations of Joshua Tree, while dreaming of a backpacking adventure across
    Southeast Asia’s surf spots once they can afford a gap‑year budget.
  culinary: Ronald Miller prefers fresh fish tacos with pico de gallo, avocado toast smothered in feta and chili flakes, and a nightly habit of ordering ramen from the local food truck, yet their cooking
    skills are limited to quick pasta dishes when inspiration strikes.
  core: Ronald Miller is a surf‑infused teen artist whose restless curiosity fuels endless digital experiments, but whose anxiety and habitually relaxed planning often leave projects half‑finished and finances
    in a whimsical scramble.
background:
  cultural: Ronald grew up in Coronado, a coastal suburb of San Diego known for its ties to the U.S. Navy and its affluent, laid-back lifestyle. As a white, middle‑class American teen, he was exposed to
    a blend of traditional suburban values and the progressive, creative currents of Southern California. The local surf and beach culture, nearby military presence, and the city’s diverse arts scene—including
    street murals, indie music venues, and experimental film events—have shaped his worldview. While his family background leans toward conventional expectations, the region’s emphasis on individuality,
    outdoor recreation, and artistic expression has fostered his curiosity and unconventional thinking.
