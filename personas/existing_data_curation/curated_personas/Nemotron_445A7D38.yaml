  hobbies: '[''Sketching and hand-drawing'', ''Digital painting'', ''Surfing'', ''Skateboarding'', ''Playing guitar'', ''Writing lyrics and short stories'', ''Playing narrative RPG video games'', ''Reading
    philosophy and art theory'', ''Exploring street art and graffiti'', ''Attending avant-garde film screenings'', ''Nighttime photography'']'
  career_goals: Ronald aims to turn his artistic talents into a sustainable career. He plans to earn his GED, attend a community college program in graphic design or digital media, and eventually work as
    a freelance visual artist and content creator for indie game studios or online publishers. In the longer term he hopes to open a small studio where he can produce prints, custom illustrations, and digital
    projects while also using his art to explore and raise awareness about mental‑health challenges.
