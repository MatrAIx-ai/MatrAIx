    aid and emergency response'']'
  hobbies: '[''Gardening'', ''Reading historical fiction and local history'', ''Quilting (weekly circle)'', ''Volunteer transportation outreach'', ''Photography of river towns'', ''Driving scenic routes'',
    ''Attending small community gatherings'']'
  career_goals: Mary aims to transition into a senior trainer role within her transit company, where she can formalize her mentorship into structured driver education programs, emphasizing safety and customer
    service. She also hopes to take on responsibilities as a safety coordinator, conducting audits and implementing procedural improvements to reduce incidents. While planning for a comfortable retirement,
    she envisions part‑time work driving community shuttle services for seniors, combining her practical skills with a desire to give back to her town. Additionally, Mary is interested in earning a certification
    in bus maintenance to deepen her technical expertise and possibly advise on fleet upkeep.
