persona_description: A musician who is skilled in the use of pitch axis theory in their music, particularly in the use of the modes and chords that are built on a common root. They are likely to be interested
  in the use of modal jazz, George Russell's Lydian Chromatic Concept of Tonal Organization, and other related music theories. They may also be familiar with the work of Joe Satriani, Dream Theater, Steve
  Vai, Marty Friedman, Guthrie Govan, Planet X, Yngwie Malmsteen, Greg Howe, Animals as Leaders, and Paul Del Nero and Mitch Seidman.
