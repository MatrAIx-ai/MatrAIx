personas:
  professional: John Moses, a two-year-old budding organizer, spends hours arranging his building blocks by shape and color, showcasing early planning and reliability that hint at a future career in architecture
    or project management, while their cautious nature drives a preference for familiar routines over spontaneous play.
  sports: John Moses, a two-year-old who loves bouncing on a miniature soccer ball with the Tiny Tigers toddler soccer club, also eagerly claps for the Springfield Thunder during weekend broadcasts, showing
    a budding enthusiasm for organized team play while they prefer short, supervised activity bursts.
  arts: John Moses, a two-year-old who sings along to Raffi's Bananaphone and watches Sesame Street, spends afternoons doodling bright circles and stick‑figure cats, letting the lively rhythms of the Wiggles
    shape their early artistic palette, while they often hum the melodies.
  travel: John Moses, a two-year-old who delights in car rides to the countryside farm where Grandma lives and recently visited the city aquarium, secretly dreams of a future trip to Disneyland Paris when
    he’s bigger, favoring fast‑paced, sensory‑rich excursions but needing familiar routines to feel safe, while they cling to the comfort of a bedtime story each night.
  culinary: John Moses, a two-year-old who favors creamy mac & cheese, crunchy apple slices, and strawberry yogurt smoothies, eagerly helps their caregiver sprinkle shredded cheese on their own plate, though
    they are picky and refuse peas and broccoli, turning meals into a predictable routine of bite‑size comfort foods.
  core: John Moses, a two-year-old who thrives on predictable routines, meticulously lines up toy cars by size, worries over tiny changes, and hoards gummy bears as imagined high‑yield investments, revealing
    a blend of cautious practicality and endearing quirks they display daily.
background:
  cultural: John is raised in a white, Midwestern family in Rockford, Illinois. His family values community, modesty, and politeness, and they celebrate typical American holidays such as Thanksgiving and
    Christmas. He attends a local early-childhood center where inclusive play and simple routines are emphasized. The cultural environment blends suburban Midwestern customs with a strong emphasis on family
    cohesion and cooperation.
