personas:
  professional: Erika Carballeira, a retired household manager turned community cooking workshop facilitator, blends their methodical budgeting, event‑planning flair, and nurturing spirit to mentor families
    in traditional recipes, coordinate church gatherings, and steadily sharpen their digital skills to aid their grandchildren.
  sports: Erika Carballeira enjoys leisurely walks in the nearby park, participates in weekly community dance classes, and roots for the local high school basketball team, the Riverdale Eagles, while they
    keep a modest fitness routine that emphasizes low‑impact movement over high‑intensity sports.
  arts: Erika Carballeira finds artistic fulfillment in humming classic cumbia and bolero tunes by Los Ángeles Azules and Los Panchos while crocheting blankets for charities, swapping light fiction like
    a Nora Roberts romance with neighbors, and attending cultural festivals that showcase folk dance performances.
  travel: Erika Carballeira prefers relaxed, low‑key travel, often taking weekend road trips to the historic town of Santa Fe, a seaside stay in Monterey, and dreaming of a pilgrimage to Granada, Spain,
    always balancing travel plans with family responsibilities and a modest travel budget.
  culinary: Erika Carballeira delights in cooking pupusas stuffed with queso fresco, yuca con chicharrón, and tamales with freshly harvested cilantro and oregano from their garden, skillfully blending traditional
    spices with modern plating while they occasionally indulge in extra dulce de leche desserts despite their careful diet.
  core: Erika Carballeira is a warm‑hearted, methodical volunteer who nurtures community through cooking, caregiving, and quiet perseverance, all while gently balancing tradition with a curiosity for new
    tools.
background:
  cultural: Erika is deeply rooted in Salvadoran heritage, having grown up in a close‑knit Salvadoran family within the Los Angeles diaspora. She maintains fluency in Spanish and practices Catholic traditions,
    celebrating holidays such as Las Posadas, Día de los Muertos, and patron saint festivals. Family and community are central to her identity; she regularly prepares pupusas, tamales, and mariscada for
    gatherings and shares cultural stories with her grandchildren. Her involvement with local Salvadoran community groups, church activities, and cultural events reflects a commitment to preserving and
    passing on her cultural legacy in North Hollywood.
attributes:
  skills: '[''Traditional Salvadoran cooking'', ''Household budgeting and finance'', ''Childcare and elder caregiving'', ''Event planning for community and church groups'', ''Spanish fluency'', ''Basic
