  hobbies: '[''Cooking and recipe experimentation'', ''Gardening (vegetables & herbs)'', ''Church participation and choir'', ''Crocheting and knitting'', ''Volunteer work at senior center'', ''Walking and
    local park strolls'', ''Attending Salvadoran cultural festivals'', ''Listening to Latin music (cumbia, boleros)'', ''Reading memoirs and light fiction'']'
  career_goals: Although retired from formal employment, Erika aims to deepen her volunteer involvement by leading cooking workshops at the local community center, mentoring younger Salvadoran families,
    and documenting her family's recipes in a personal cookbook to preserve cultural heritage. She also aspires to become more proficient with digital tools to assist her grandchildren with school projects,
    and to support neighborhood charitable initiatives through organizing fundraisers and food drives.
