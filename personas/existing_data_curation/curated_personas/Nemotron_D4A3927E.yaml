  career_goals: Approaching retirement, Jordan aims to leverage his experience to drive strategic sustainability initiatives within his organization, reducing the carbon footprint of material production
    processes. He aspires to serve as a senior technical advisor and mentor, guiding the next generation of engineers through formal mentorship programs. Jordan also plans to transition into consulting,
    offering expertise in low‑temperature material selection and recycled‑material product design for regional industries. In addition, he hopes to author a technical handbook that bridges engineering rigor
    with creative design thinking, and to contribute to community STEM outreach by organizing workshops for local schools.
