  career_goals: He aims to progress from his current specialist role to a senior operations manager within the next three years, eventually leading a regional operations department. Pedro aspires to integrate
    creative problem-solving into operational leadership, spearheading initiatives that blend technology, sustainability, and innovative business models. He plans to earn an MBA with a focus on innovation
    management and to acquire certifications in process improvement and AI integration, positioning himself to launch a boutique consulting firm that helps mid-size companies redesign their operations for
    agility and growth.
