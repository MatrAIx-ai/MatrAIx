  career_goals: At 83, Osvaldo’s ambitions center on maintaining his independence, staying mentally sharp, and giving back to his community. He hopes to complete a written memoir of his life and family
    history, to be shared with his grandchildren. He also wants to learn how to use a tablet and video-call apps to stay in touch with relatives abroad. Volunteering at the Edna senior center as a workshop
    mentor—teaching basic home-repair skills and cooking classes—is a key goal. Additionally, he dreams of taking a short trip to his birthplace in Mexico to reconnect with his roots and celebrate a family
    reunion. Finally, he aims to keep his garden thriving as a source of fresh food and a gathering spot for neighbors.
