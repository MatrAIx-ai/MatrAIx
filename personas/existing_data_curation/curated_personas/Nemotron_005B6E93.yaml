personas:
  professional: Jeanette Vega, an aspiring bilingual administrative assistant, merges her emerging business administration knowledge with meticulous organization and a compassionate, reserved demeanor to
    thrive in health‑care and nonprofit environments.
  sports: Jeanette Vega enjoys low‑impact fitness through gentle yoga and leisurely weekend walks around Lake Artemesia, and follows the Washington Wizards in the NBA and the Washington Capitals in the
    NHL, though she shies away from joining organized team sports.
  arts: Jeanette Vega nurtures her artistic side by devouring contemporary fiction from authors like Chimamanda Ngozi Adichie, curating playlists that feature singer‑songwriter Natalia Lafourcade and folk
    guitarist Rhiannon Giddens, and sketching street scenes during park walks inspired by the photography of Vivian Maier.
  travel: Jeanette Vega favors budget‑friendly solo trips, planning weekend escapes to Washington, D.C.’s museums and Shenandoah National Park’s trails, while dreaming of an immersive cultural journey to
    Oaxaca to explore its culinary scene and vibrant markets.
  culinary: Jeanette Vega, a passionate home cook, perfects family staples like pupusas, tamales, and yuca frita, often adding fresh herbs, smoked cheese, and adventurous spices, and enjoys hosting intimate
    tasting evenings where she pairs her creations with homemade horchata for friends.
  core: Jeanette Vega is a thoughtful 18‑year‑old who balances quiet ambition with a love of solitary reflection, channeling her meticulous organization into community‑focused studies, careful budgeting,
    and heartfelt cooking, all while wrestling with a tendency to over‑worry.
background:
  cultural: Jeanette was born and raised in Beltsville, Maryland, to Salvadoran immigrant parents who arrived in the United States in the early 2000s. She grew up bilingual, speaking Spanish at home and
    English at school, and she is deeply connected to Salvadoran traditions such as celebrating Día de la Virgen de Guadeloupe, preparing festive foods for holidays like Navidad and Día de los Muertos,
    and participating in community festivals organized by the local Salvadoran cultural association. The family’s Catholic faith and emphasis on close‑knit family ties have shaped her values of harmony
    and cooperation. Being part of a vibrant Salvadoran diaspora in Prince George’s County, she frequently attends cultural events at the Salvadoran Embassy's outreach programs and volunteers at the local
    community center that offers ESL and job‑training services for recent immigrants. This bicultural experience informs her identity, fostering both a strong sense of cultural pride and an acute awareness
    of the challenges faced by immigrant families in the United States.
attributes:
  skills: '["Bilingual communication (Spanish/English)", "Microsoft Office and Google Workspace proficiency", "Basic research and data analysis", "Community health volunteer experience (case intake, client
    support)", "Personal budgeting and introductory accounting", "Cooking traditional Salvadoran cuisine", "Basic first aid certification", "Event planning and scheduling", "Active listening and conflict
    mediation"]'
  hobbies: '["Reading contemporary fiction and historical biographies", "Cooking and experimenting with Salvadoran dishes", "Yoga and mindfulness meditation", "Journaling and sketching", "Walking and nature
    photography in local parks", "Volunteering at community food bank", "Listening to Latin American music", "Crocheting"]'
  career_goals: Jeanette aims to complete her associate’s degree in Business Administration or Human Services within the next two years, leveraging her curiosity for new subjects while staying grounded
    in practical career pathways. In the short term, she plans to secure an internship or a paid entry‑level position as a bilingual administrative assistant at a health‑care or non‑profit organization
    in Prince George’s County, where she can apply her organizational skills and bilingual abilities. Long‑term, she aspires to earn a bachelor’s degree in Social Work or Public Health and become a community
    outreach coordinator focused on supporting Salvadoran and other Latino immigrant families. She hopes to develop programs that combine health‑education, financial literacy, and cultural preservation.
    Additionally, she envisions launching a modest community kitchen that offers affordable, nutritious meals while serving as a cultural hub for Salvadoran youth. Her overarching ambition is to create
    stable, meaningful employment that allows her to continuously learn and give back to her community.
