    ''Basic proficiency in Cherokee language'', ''Conflict mediation'', ''Stress‑management coaching'']'
  hobbies: '[''Participating in powwows and drum circles'', ''Beadwork and traditional craftmaking'', ''Creative writing (poetry, memoir)'', ''Hiking in the Ozark foothills'', ''Group fitness classes (Zumba,
    dance)'', ''Cooking and sharing tribal recipes'', ''Volunteering at community arts centers'', ''Playing strategy board games (e.g., Settlers of Catan)'', ''Reading historical fiction and anthropology
    texts'', ''Gardening with native plants'']'
  career_goals: Eliese aims to transition from her current period of unemployment into a stable, full‑time position that leverages both her humanities education and her knack for organized, people‑centered
    work. Her primary goal is to become a Cultural Program Coordinator for a tribal museum or community center in the Springdale area, where she can design and lead events that preserve and share indigenous
    traditions. Simultaneously, she seeks certification in project management and counseling so she can develop mental‑health outreach initiatives that blend traditional healing practices with contemporary
    wellness strategies. Over the next five years, she also plans to launch a small business selling handcrafted beadwork and prints, using grant funding she secures to sustain the venture and support other
    local artists.
