personas:
  professional: Eliese Praseuth, a community‑oriented cultural program specialist, blends rigorous grant‑writing expertise with hands‑on event coordination, leveraging their structured approach and competitive
    drive; they excel at securing funding for tribal heritage exhibitions and wellness workshops.
  sports: Eliese Praseuth enjoys group Zumba classes at the local community center, hikes the Ozark foothills on weekends, and fervently supports the Arkansas Razorbacks basketball team; they balance fitness
    with a competitive streak that drives them to set personal step‑count goals.
  arts: Eliese Praseuth's artistic expression centers on beadwork and quill‑embellished jewelry inspired by tribal motifs, while they find creative renewal in the poetry of Maya Angelou and the folk melodies
    of Rhiannon Giddens, often curating pop‑up exhibits at the regional arts center.
  travel: Eliese Praseuth favors culturally immersive trips, having explored the Santa Fe Indian Market, hiked the Columbia River Gorge, and planned a future pilgrimage to the Smithsonian Folklife Festival;
    they always budget travel around grant cycles and family responsibilities.
  culinary: Eliese Praseuth relishes cooking the Three Sisters Stew—corn, beans, and squash—paired with wild‑berry sorrel sauce, and crafts herbal tea blends using sage and cedar leaves, though they occasionally
    resort to fast‑food tacos during late‑night grant‑writing sprints.
  core: Eliese Praseuth blends meticulous planning with a restless, sociable spirit; they often juggle grant deadlines, drum circles, and anxiety‑driven coffee binges.
background:
  cultural: Eliese is of Eastern Cherokee descent and grew up in a multigenerational family that kept tribal traditions alive in suburban Springdale, Arkansas. From an early age she attended language classes,
    learned traditional beadwork, and participated in seasonal ceremonies that blended indigenous spirituality with contemporary community life. Her family emphasized the importance of storytelling as a
    means of preserving history, which inspired her academic pursuit of a graduate degree in arts and humanities focused on cultural anthropology. She remains actively involved with the local Cherokee Nation
    chapter, contributing to cultural preservation projects, mentoring youth in language revitalization, and advocating for the recognition of tribal rights and wellness initiatives within the broader Arkansas
    community.
attributes:
  skills: '[''Community event planning'', ''Project management'', ''Budget development and financial oversight'', ''Cultural research and archival work'', ''Oral‑history interviewing and transcription'',
