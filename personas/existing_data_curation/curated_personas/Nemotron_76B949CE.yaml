personas:
  professional: Marie Person, a retired community organizer, channels decades of household management, meticulous budgeting, and event coordination into leading a weekly senior‑center craft and cooking
    workshop and spearheading a neighborhood garden, where their disciplined, structured approach ensures every detail meets high standards.
  sports: Marie Person enjoys leisurely walks in Orlando’s lakeside parks, participates in a senior‑center bridge club that doubles as a gentle social fitness group, cheers for the Orlando Magic during
    basketball season, and follows Orlando City SC with a modest fan’s dedication, preferring low‑impact activity over competitive sports.
  arts: Marie Person weaves her love for craft and narrative by knitting while listening to Mahalia Jackson’s gospel hymns, reading Philippa Gregory’s historical fictions, and attending community theater
    productions featuring the works of August Wilson, letting these artistic experiences shape her sense of continuity and purpose.
  travel: Marie Person prefers meticulously planned short trips, often joining senior travel groups to explore historic Savannah, the tranquil gardens of Asheville’s Biltmore Estate, and occasionally dreaming
    of a Caribbean cruise to experience island aromas, balancing a love of cultural heritage with the comfort of well‑organized itineraries.
  culinary: Marie Person delights in crafting Southern‑style shrimp and grits and Caribbean callaloo, seasoning with garden‑grown thyme, basil, and scotch bonnet peppers, while their high‑level cooking
    skill lets them host weekly potluck dinners that blend comfort food nostalgia with fresh, home‑grown produce.
  core: Marie Person is a precision‑driven, garden‑loving craftsperson whose love of orderly routines is punctuated by a habit of double‑checking every appointment on a rubber‑stamped calendar and an occasional
    nervous habit of buying extra yarn when a sale feels too good to pass up.
background:
  cultural: Marie is an African‑American woman who grew up in a close‑knit, working‑class Black family in central Florida during the 1950s and 1960s. Raised by a single mother, the church was a central
    pillar of her upbringing, shaping her values of community service, resilience, and collective uplift. She carries the culinary traditions of Southern soul food blended with Caribbean influences from
    extended family, and she celebrates cultural observances such as Kwanzaa and Juneteenth alongside church holidays. Her identity is rooted in the legacy of civil‑rights activism in Orlando, and she remains
    deeply connected to the African‑American community through church, senior‑center programs, and intergenerational storytelling that preserves her family’s history.
attributes:
