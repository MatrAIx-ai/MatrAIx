    administrative support'']'
  hobbies: '[''Gardening (herbs, vegetables, flowers)'', ''Knitting and crochet'', ''Reading historical fiction and biographies'', ''Church choir singing'', ''Cooking traditional Southern and Caribbean
    dishes'', ''Genealogy research'', ''Walking in local parks'', ''Playing bridge and checkers'', ''Volunteering at senior center'', ''Attending cultural festivals and community events'']'
  career_goals: Although retired from formal employment, Marie’s current ambitions focus on sustaining her independence, contributing her organizational talents to the senior community, and preserving her
    family’s legacy. She aims to lead a weekly senior‑center craft and cooking workshop, launch a small community garden that provides fresh produce for local food‑banks, develop a written memoir of her
    life experiences for future generations, and complete a GED through evening classes at a local adult education center. She also hopes to mentor younger volunteers, helping them adopt the same disciplined,
    achievement‑driven mindset she values.
