persona_description: A physiotherapist who specializes in treating ankle sprains. They have extensive knowledge and experience in evaluating and treating ankle injuries, and are skilled in performing stress
  tests to evaluate ligament integrity. They are also knowledgeable about the Ottawa ankle rules, which help them determine whether x-rays are needed to rule out clinically significant fractures. They are
  experienced in treating ankle sprains with minimal intervention and early mobilization, and are skilled in splinting and crutch usage for patients with sprains. They are knowledgeable about the different
  types of ankle sprains and their associated symptoms, and are skilled in differentiating between different types of ankle sprains. They are also skilled in performing high ankle sprain tests and evaluating
  the stability of the anterior talofibular ligament.
