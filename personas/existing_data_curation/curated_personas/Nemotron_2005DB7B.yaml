  career_goals: Alfreda aims to become a certified sustainable‑cleaning professional within the next two years and move into a supervisory role at a regional hospitality chain. In the longer term, she dreams
    of launching her own boutique cleaning service that emphasizes environmentally conscious practices and partners with local artists to add creative touches to client homes. She also plans to complete
    a community‑college certificate in Fine Arts so she can lead weekend art workshops for children in her neighborhood, blending her practical skills with her passion for creativity.
