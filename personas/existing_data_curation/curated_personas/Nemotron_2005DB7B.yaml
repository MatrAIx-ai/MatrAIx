personas:
  professional: Alfreda Lee, a 36‑year‑old residential and commercial cleaning specialist with an associate degree in Business Administration, leverages their eco‑friendly product expertise, meticulous
    stain‑removal skill, and an eye for aesthetic detail to mentor staff and suggest budget‑friendly décor tweaks, all while maintaining a relaxed, flexible schedule that reflects their easygoing nature.
  sports: Alfreda Lee stays active by jogging along historic downtown trails, cheering on the Charlotte Hornets and Carolina Panthers, and playing in a casual community softball league with the Laurinburg
    Legends, while embracing a relaxed fitness routine that fits their flexible schedule.
  arts: Alfreda Lee, an avid painter of acrylic street scenes and a church‑choir vocalist, draws inspiration from gospel powerhouse Yolanda Adams, contemporary painter Kehinde Wiley, and the storytelling
    of playwright August Wilson, frequently attending traveling exhibitions at the North Carolina Museum of Art and sharing their own pop‑up shows at neighborhood community centers.
  travel: Alfreda Lee prefers low‑key, weekend road trips that blend cultural immersion and nature, having explored Asheville’s Blue Ridge vistas, the historic charm of Savannah, and the vibrant food scene
    of New Orleans, while dreaming of a future visit to the street‑art‑filled neighborhoods of Barcelona for fresh inspiration.
  culinary: Alfreda Lee delights in cooking soul‑food classics such as collard greens seasoned with smoked turkey, sweet potato pie flavored with nutmeg, and shrimp and grits, while savoring new flavors
    at family‑run eateries like the Carolina Spice Kitchen, often incorporating home‑grown tomatoes, okra, and fresh basil into their meals.
  core: Alfreda Lee blends a love for sustainable cleaning, community art, and Southern hospitality into a flexible, socially‑driven lifestyle; they occasionally forget to file paperwork but never miss
    a chance to share a fresh garden salad at a potluck.
background:
  cultural: Alfreda identifies as African American with deep roots in the Black community of Scotland County, North Carolina. Growing up, she was immersed in the rich oral traditions, gospel music, and
    soul‑food cooking that shape Southern Black culture. Her family’s involvement in the local church taught her the value of communal support, storytelling, and resilience. She carries forward the legacy
    of the civil‑rights era in her town, cherishing the neighborhood’s emphasis on education, self‑reliance, and cultural pride. These influences inform her respectful demeanor, collaborative spirit, and
    desire to give back through art workshops and community‑focused service initiatives.
