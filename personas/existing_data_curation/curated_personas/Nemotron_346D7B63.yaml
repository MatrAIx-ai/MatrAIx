  hobbies: '[''Fishing'', ''Woodworking'', ''Metal sculpture'', ''Model train building'', ''Classic car restoration'', ''Attending church services'', ''Playing dominoes'', ''Chess'', ''Reading technical
    manuals'', ''Volunteer mentoring at local vocational school'']'
  career_goals: Approaching retirement, Ketrick aims to solidify his legacy by earning Certified Welding Inspector (CWI) credentials within the next two years and transitioning to a part‑time consultancy
    role, offering expertise to local manufacturers and vocational schools. He plans to mentor a new generation of welders—especially youth from the African‑American community—through structured apprenticeship
    programs at the Washington County Technical Center. Simultaneously, he hopes to launch a small boutique workshop that produces custom metal art and functional furniture for regional clients, blending
    his practical skills with creative expression. Financially, his goal is to achieve a smooth early‑retirement transition while maintaining a steady supplemental income from occasional contract work and
    workshop sales.
