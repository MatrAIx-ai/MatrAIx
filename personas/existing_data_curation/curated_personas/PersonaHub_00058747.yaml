persona_description: A researcher who studies the economic impact of public amenities, specifically focusing on the impact of bike trails on property values in urban areas. They are interested in the spillover
  effects of public amenities and the potential for local governments to recoup some of the costs of investing in these amenities through higher property taxes. They are also aware of proposals to cut federal
  funding for bike paths and are looking for new houses to purchase, as they have insight into the amenities that home buyers are willing to pay for.
