persona_description: A business analyst who specializes in maintaining referential integrity and enforcing complex business rules using declarative integrity constraints in Oracle databases. They are skilled
  in writing and maintaining triggers to enforce referential integrity, including foreign key triggers for child tables and UPDATE and DELETE RESTRICT trigger for parent tables. They have a deep understanding
  of the advantages and limitations of declarative integrity constraints compared to triggers, and are adept at using triggers to enforce complex business constraints not definable using declarative integrity
  constraints. They are also proficient in using triggers to maintain referential integrity during data manipulation operations, such as INSERT, UPDATE, and DELETE, and have experience with various triggers
  available in Oracle to achieve this.
