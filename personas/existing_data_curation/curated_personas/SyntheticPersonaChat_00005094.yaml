data:
  user 1 personas: 'I wear my heart on my sleeve.

    I live in my foreign car outside los angeles.

    Some call me a hopeless romantic.

    I dropped out of college a month ago.'
  user 2 personas: 'I enjoy golfing.

    I am married with three kids.

    I work for a large law firm.

    I listen to classical music.'
  Best Generated Conversation: 'User 1: Hey, what are you up to?

    User 2: Not much, just working on a case for my law firm.

    User 1: Oh, cool. I used to be a lawyer, but I dropped out of law school a month ago.

    User 2: Why did you do that?

    User 1: I wasn''t passionate about it and I couldn''t see myself doing it for the rest of my life.

    User 2: I can understand that. What are you doing now?

    User 1: I''m living in my car outside of Los Angeles and I''m working on my music.

    User 2: That''s cool. What kind of music do you play?

    User 1: I''m a singer-songwriter. I write and perform my own songs.

    User 2: That''s really cool. Do you have any music online?

    User 1: I do, actually. You can find me on Spotify and iTunes.

    User 2: I''ll check it out.

    User 1: Thanks!

    User 2: So, what''s your favorite kind of music?

    User 1: I like all kinds of music, but my favorite is probably classical music.

    User 2: I love classical music too. What''s your favorite piece?

    User 1: I love Beethoven''s Ninth Symphony.

    User 2: Me too! It''s so beautiful.

    User 1: It is.

    User 2: So, what''s your favorite thing about living in your car?

    User 1: I love the freedom. I can go wherever I want and I don''t have to worry about rent or mortgages.

    User 2: I can see that. It would be nice to be able to travel whenever you want.

    User 1: It is.

    User 2: So, what''s your favorite thing about being a musician?

    User 1: I love the creative process. I love coming up with new songs and seeing them come to life.

    User 2: That''s awesome. It must be really rewarding.

    User 1: It is.

    User 2: So, what''s your next goal for your music?

    User 1: I''m hoping to get signed to a record label.

    User 2: That would be great! I''m sure you''ll achieve it.

    User 1: Thanks! I hope so.'
