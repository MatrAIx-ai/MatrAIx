    hospitality students'', ''Poker nights with friends'']'
  career_goals: Mark aspires to advance to a regional management role for a hotel chain in the Appalachian and Mid-Atlantic region, where he can apply his blend of practical know-how and innovative ideas
    to improve operational efficiency and guest satisfaction. In the longer term, he dreams of opening a boutique inn that showcases Appalachian culture, incorporates eco-friendly operations, and serves
    as a training ground for the next generation of hospitality professionals. He also aims to mentor younger staff and become a recognized speaker at industry conferences on sustainable lodging practices.
