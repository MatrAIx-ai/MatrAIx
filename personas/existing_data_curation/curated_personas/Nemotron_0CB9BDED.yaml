personas:
  professional: Mark Owens, a seasoned hotel manager with 25 years of experience, leverages deep community‑oriented values, meticulous budgeting, and a hands‑on familiarity with Oracle OPERA to streamline
    operations while fostering a collaborative workplace that feels like an extended family.
  sports: Mark Owens, an avid outdoor enthusiast, regularly participates in regional fishing tournaments, hikes sections of the Appalachian Trail, and supports the Washington Capitals, Baltimore Ravens,
    and the local high‑school football team, often attending games with a thermos of coffee from home.
  arts: Mark Owens, a dedicated mandolin player, frequents blue‑grass festivals such as the Old Fiddlers’ Festival, jams at community gatherings, and admires the storytelling of folk legends like Doc Watson
    while also enjoying classic cinema starring James Stewart.
  travel: Mark Owens, who prefers road trips over flying, has explored the Blue Ridge Parkway, spent weekends in Asheville’s art districts, dreams of a summer stay in the Great Smoky Mountains, and plans
    a future visit to Nashville’s music scene to connect with fellow blue‑grass musicians.
  culinary: Mark Owens, an enthusiastic home cook, excels at smoking pork shoulder with a coffee‑chili rub and baking buttery cornbread, experiments with seasonal veggies like collard greens, yet sometimes
    neglects to clean the smoker promptly, leading to a lingering ash buildup.
  core: Mark Owens, a 50‑year‑old resort manager, balances a love of community, blue‑grass, and the outdoors with a practical mindset, a habit of late‑night poker games, and a steadfast commitment to hiking
    at least once a week.
background:
  cultural: Mark grew up in a close-knit white Appalachian family in Putnam County, West Virginia. His upbringing emphasized hard work, self-reliance, and a strong sense of community—values that still inform
    his managerial style. He was raised with Methodist traditions and regularly attended church gatherings, which reinforced his cooperative yet assertive demeanor. The region’s rich folk music, storytelling,
    and emphasis on hospitality shaped his love for social events and group activities. Though he never married, his deep ties to local customs and pride in Appalachian heritage guide his personal and professional
    choices.
