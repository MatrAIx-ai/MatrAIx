  career_goals: Although retired, Heather aims to remain an active contributor to her community by expanding her volunteer work at the local senior center and the marine rescue volunteer group. She hopes
    to mentor younger volunteers, document the history of her neighborhood for the local archives, and eventually compile a family cookbook that preserves her culinary heritage for future generations. She
    also aspires to maintain her health and independence, ensuring she can continue to support her husband and grandchildren while fostering harmony in her family and neighborhood.
