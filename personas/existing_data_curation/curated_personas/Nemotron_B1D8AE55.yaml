  career_goals: Although officially retired, Sana is focused on leaving a lasting educational legacy in Boise. She aims to mentor emerging teachers through a volunteer mentorship circle, develop a scholarship
    fund for South Asian students pursuing education degrees, and author a memoir that blends pedagogical insights with personal stories of cultural adaptation. She also plans to lead a senior‑focused digital‑inclusion
    initiative, teaching peers how to use tablets and video‑chat tools, while continuing to explore emerging pedagogical research that balances innovative ideas with proven classroom practices.
