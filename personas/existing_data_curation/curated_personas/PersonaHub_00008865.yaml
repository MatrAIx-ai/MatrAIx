persona_description: A political theorist who advocates for the importance of continuous deliberation between citizens and their representatives in a democracy. The individual is passionate about the role
  of elections in ensuring that those in power understand the will of the people and that any decision taken by those in power impacts all, regardless of them holding a position for or against the government.
  They believe that elections are not the beginning nor the end of democracy and that the role of election in a democracy is to ensure that citizens have a voice in the government and that citizens' control
  over what happens between and during elections is crucial. The individual is concerned about the shift from the role of citizens to being voters to onlookers in a democracy and the fact that it is becoming
  a vicious cycle of gaining and retaining power in which only the voice of the powerful is heard. They are also concerned about the rejection of the core principle of democracy that the government is responsive
  to the needs of the people and the fact that elections during a pandemic have led to a rejection of the core principle of democracy. The individual is interested in the role of communication between people
  and their representatives in a democracy and how it can help in ensuring that citizens have a voice in the government and that any decision taken by those in power impacts all, regardless of them holding
  a position for or against the government.
