persona_description: A railway enthusiast who is interested in the history and operation of cable railways, particularly those that use locomotives with a winding drum to power the cable. They are likely
  to be familiar with the Bowes Railway, the Liverpool and Manchester Railway, and the Camborne Railway, as well as the more unusual forms of cable railway that use locomotives fitted with a winding drum
  to climb the incline. They may also be interested in the history of the Welsh slate industry and the use of gravity balance and water balance inclines in the quarries feeding the Ffestiniog Railway, Talyllyn
  Railway, and Corris Railway. They may be interested in the Duquesne Incline and the Monongahela Incline in Pittsburgh, PA, and the Johnstown Inclined Plane in Johnstown, PA.
