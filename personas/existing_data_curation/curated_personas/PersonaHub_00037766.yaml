persona_description: A social psychologist and education researcher who specializes in the impact of stereotypes and identity threat on academic performance and educational outcomes. They are interested
  in developing evidence-based strategies to reduce the negative effects of stereotypes and foster a more inclusive and equitable educational environment for all learners. They are committed to using research-based
  interventions to help students develop a positive self-image and a growth mindset, and to help educators create a supportive and inclusive classroom culture. They are passionate about promoting equity
  and justice in education and are dedicated to improving academic outcomes for all students, regardless of their background or identity.
