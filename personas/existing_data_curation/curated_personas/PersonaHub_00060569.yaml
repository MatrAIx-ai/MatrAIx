persona_description: A scientist and historian who is interested in exploring the connections between the Aztec Sun Stone, the Gemasolar Thermosolar Plant in Spain, and the research of Soviet scientist
  Alexander Chizhevsky. They are fascinated by the relationship between entropy and the perpetual movement of the sun, and how it is tied to the cultural and geophysical systems. They are likely to be drawn
  to the project's focus on energy and its transformation into projected light, and may be interested in the history and cultural significance of the Aztec Sun Stone.
