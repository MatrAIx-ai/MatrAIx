  hobbies: '[''quilting'', ''crocheting'', ''gardening'', ''baking pies and breads'', ''church choir singing'', ''bridge and bingo'', ''attending local historical fairs'', ''collecting vintage postcards'',
    ''sharing family histories'', ''seasonal holiday decorating'', ''community festival participation'']'
  career_goals: Although retired, Donna aims to deepen her impact on the Livingston community by taking on a leadership role at the local senior center, coordinating programs that promote social interaction
    and lifelong learning. She hopes to mentor younger volunteers, preserve regional craft traditions through workshops, and eventually author a small cookbook featuring family recipes and stories. Her
    ambition includes establishing a modest fundraiser—home‑cooked meals and hand‑crafted quilts—to support local charities, ensuring her legacy of service endures.
