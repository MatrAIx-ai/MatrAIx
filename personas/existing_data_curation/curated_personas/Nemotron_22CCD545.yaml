personas:
  professional: Donna, a retired community organizer with a knack for budgeting nonprofit events, blends their meticulous planning skills and social flair to orchestrate senior center programs that feel
    like well‑rehearsed performances, often taking the spotlight while ensuring every detail runs smoothly.
  sports: Donna follows the St. Louis Cardinals baseball games with loyal enthusiasm, cheered on at the senior center’s weekly bridge meet‑ups where the Livingston Seniors Bridge Club competes, and joins
    the Greenwood Walking Club’s Thursday strolls, preferring gentle, low‑impact exercise over high‑intensity sports.
  arts: Donna weaves stories into their quilts while humming classic country tunes like Dolly Parton and listening to Handel’s choral works, often showcasing their crocheted heirloom pieces at local historical
    fairs where they engage younger visitors with anecdotes about regional craft traditions.
  travel: Donna prefers well‑planned road trips that combine nostalgic visits to family farms in the Midwest with stops at historic sites such as Savannah’s riverfront and New England’s apple orchards,
    always reserving lodging near community centers so they can lead a bake‑share night on arrival.
  culinary: Donna’s kitchen revolves around their garden’s bounty, turning home‑grown tomatoes and fresh basil into their signature tomato‑basil focaccia, while their Granny Smith apple pie and southern‑style
    cornbread, seasoned with a pinch of cinnamon, dominate the potluck tables they bake for.
  core: Donna blends an old‑world love of routine and community service with a competitive edge in bridge, a calm resilience that masks occasional skepticism about strangers, and a habit of turning every
    garden harvest into a communal feast.
background:
  cultural: Donna grew up in a traditional, Protestant (Baptist) family in East Texas, where hospitality, self‑reliance, and community involvement are deeply valued. Her white Southern heritage includes
    a strong emphasis on family ties, church participation, and preserving regional customs such as home‑cooked meals and handcrafts. Living in Livingston, Polk County, she embodies the modest, practical
    lifestyle typical of small‑town Texas, with a respectful attitude toward local traditions, conservative social values, and a love for the outdoors and communal gatherings.
