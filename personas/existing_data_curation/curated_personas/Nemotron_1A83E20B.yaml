    natural objects'', ''Using educational tablet apps'']'
  career_goals: Mary often talks about becoming a "science explorer" when she grows up, imagining a future where she can discover how things work and invent new solutions. She expresses a strong interest
    in roles like scientist, engineer, or wildlife researcher, motivated by her curiosity and love for hands‑on experiments. Her competitive streak drives her to be the best at any project she undertakes,
    and she aspires to lead a team that solves puzzles or builds inventions. At the same time, she values practicality, so she wants a career that lets her apply her ideas to real‑world problems, such as
    designing safe playground equipment or developing simple tools for everyday use.
