personas:
  professional: Mary Hembree is a budding pretend entrepreneur who runs a home lemonade stand; they apply their practical curiosity to perfect the recipe while meticulously organizing the tiny cash box
    and competitively counting imagined profits.
  sports: Mary Hembree attends Saturday toddler gymnastics at the community center, idolizes the Little Tigers Soccer Club's junior team, cheers for the city's major league baseball team the Tigers during
    family games, and fiercely competes in playground tag, preferring solo challenges over large group scrimmages; they also enjoy practicing balance beams at home.
  arts: Mary Hembree delights in drawing colorful scenes inspired by Dr. Seuss, humming the playful tunes of The Wiggles, and watching Mickey Mouse cartoons, often pausing to critique the rhythm or color
    scheme before adding perfect crayon details; they also love to narrate the stories aloud to their stuffed audience.
  travel: Mary Hembree enjoys family trips to the nearby zoo and a sunny beach resort, meticulously planning snack breaks with a kid-friendly map, and dreams of a future adventure to Disney World after
    seeing pictures in a travel brochure; they love to collect souvenir postcards from each destination.
  culinary: Mary Hembree prefers crunchy carrot sticks, cheesy pizza slices, and strawberry yogurt, proudly helps whisk pancake batter with a wooden spoon, and occasionally sneaks extra chocolate chips
    into their cookie dough; they also insist on arranging fruit slices in smiley faces before eating.
  core: Mary Hembree is a curious yet practical five-year-old who balances organized play with a competitive spirit, relishes solo challenges, and they navigate the world with steady calm and occasional
    picky habits.
background:
  cultural: Mary is raised in a middle‑class, white family in Statesville, North Carolina, where Southern traditions and community values shape her upbringing. Family gatherings often involve church attendance,
    seasonal holidays like Fourth of July parades, and sharing home‑cooked meals featuring Southern comfort foods. She attends a local pre‑K program that emphasizes both academic readiness and social etiquette.
    The surrounding community places value on politeness, respect for elders, and a modest, practical approach to daily life, all of which complement Mary's balance of curiosity with practicality and her
    reserved, self‑reliant nature.
attributes:
