personas:
  professional: Ricardo Romero is a teen point guard and budding organizer who channels his tactical mind and love for structure into leading school basketball drills, coordinating community tutoring schedules,
    and sketching logistics flowcharts for a future associate degree in industrial engineering, while maintaining a competitive edge that sometimes borders on overly skeptical of teammates' ideas.
  sports: Ricardo Romero dominates as a point guard for the East Side High basketball team, leads the local youth league's championship squad, follows the professional Capitanes de Arecibo, and plays beach
    volleyball with the San Juan Surf Club during summer afternoons.
  arts: Ricardo Romero fuels his creative downtime with reggaetón tracks by Bad Bunny and J Balvin, salsa classics by Marc Anthony, occasional indie electronic beats by Odesza, and attends weekend street‑dance
    gatherings where he admires local muralists, shaping his aesthetic sense for custom skateboard designs.
  travel: Ricardo Romero enjoys weekend bike rides along the coastal promenade to the historic lighthouse in Cabo Rojo, dreams of a study‑abroad stint in Valencia, Spain, and plans a future backpacking
    trip across the Caribbean islands, balancing his modest teen budget with family travel constraints.
  culinary: Ricardo Romero prefers island flavors like arroz con gandules, crispy tostones, grilled mahi‑mahi with lime, and makes his own smoothies with mango, avocado, and coconut water, cooking at a
    competent level that lets him whip up post‑practice meals in under 20 minutes.
  core: Ricardo Romero is a structured, competition‑driven teen who blends tactical basketball instincts with hands‑on tinkering, balancing disciplined planning with occasional impulsive splurges and a
    healthy skepticism of shortcuts.
background:
  cultural: Ricardo grew up in Carolina, a vibrant municipality on Puerto Rico’s northeast coast, steeped in a blend of urban rhythm and coastal tradition. He is raised in a close‑knit Puerto Rican family
    where Spanish is spoken at home and English is taught in school, fostering bilingual fluency. The island’s strong community ethos, Catholic celebrations, and annual festivals like Fiestas de la Virgen
    del Carmen inform his sense of identity. He enjoys local dishes such as mofongo and arroz con gandules, and his love for music reflects the island’s Afro‑Caribbean heritage. The resilience shown by
    his community after recent hurricanes has shaped his emotional stability and practical outlook, reinforcing a desire to contribute to Puerto Rico’s future through reliable, structured work.
