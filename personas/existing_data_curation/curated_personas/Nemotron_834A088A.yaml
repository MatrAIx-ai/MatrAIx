  hobbies: '[''Competitive basketball'', ''Listening to reggaetón and salsa'', ''DIY electronics (Arduino) projects'', ''Custom skateboard building'', ''Volunteer tutoring at community center'', ''Beach
    volleyball'', ''Strategic video games (e.g., FIFA, Minecraft)'']'
  career_goals: Ricardo aims to complete his high school equivalency and enroll in an associate degree program in industrial engineering or logistics at a technical institute in Puerto Rico. He wants to
    build a career in supply chain management for the island’s shipping and distribution sector, where he can apply his love for structure, predictability, and problem solving. He also envisions a backup
    plan of becoming a certified electrical or mechanical technician, ensuring a stable, hands‑on profession. Long term, he hopes to lead a team that improves the efficiency of local infrastructure while
    mentoring younger students in STEM and sports.
