personas:
  professional: Andria Fabian, a 40-year-old painting professional, blends meticulous surface-preparation expertise, precise paint-mixing calculations, and budget-tracking discipline to deliver high-quality
    interior and exterior finishes while confidently leading small crews and mentoring apprentices on the path to NAWMP certification, and they are laying the groundwork for a boutique eco-friendly restoration
    business.
  sports: Andria Fabian enjoys weekday walks on the Lake Norman trail, watches the Charlotte Hornets and Charlotte FC, participates in a local walking club that meets for early-morning birdwatching hikes,
    and they approach fitness with a disciplined yet flexible routine that includes occasional community softball games.
  arts: Andria Fabian relaxes by quilting intricate patchwork quilts, reads historical fiction by Ken Follett and Philippa Gregory, and listens to classic rock legends like The Eagles and country icons
    such as Johnny Cash, often attending local live-music open-mic nights and community-theater productions to nurture their creative spirit, and they find solace in these artistic pursuits after a day
    on the job site.
  travel: Andria Fabian prefers carefully planned road trips through the Blue Ridge Parkway, weekend stays at a cabin near Asheville, visits historic sites like Charleston's Old Quarter, and dreams of a
    European tour of Italy's Renaissance towns, and they balance budget constraints with a love for cultural immersion.
  culinary: Andria Fabian cooks family recipes like chicken and dumplings and peach cobbler, infuses garden-fresh heirloom tomatoes, basil, and sweet corn into dishes, skillfully uses a cast-iron skillet
    and slow-cooker, yet sometimes over-seasons while savoring the comforting flavors of Southern comfort cuisine, and they cherish the ritual of sharing meals with neighbors at church socials.
  core: Andria Fabian is a structured painter-entrepreneur who balances meticulous work, gardening, quilting, and historic preservation, thrives on routine while occasionally battling back pain, and they
    obsessively track paint swatches, budgets, and garden blooms.
background:
  cultural: Andria was raised in a close‑knit, predominantly White community in Iredell County, North Carolina, with roots tracing back to English and German ancestry. Growing up in a rural Southern environment,
    she was influenced by values of hard work, self‑reliance, and community service. Her family attended a local Baptist church, reinforcing traditions of regular fellowship and volunteerism. These cultural
    influences shape her practical outlook, dedication to reliable craftsmanship, and strong ties to local community activities.
attributes:
  skills: '[''Surface preparation'', ''Paint mixing and color matching'', ''Interior and exterior painting'', ''Safety compliance and equipment usage'', ''Project estimation and budgeting'', ''Customer
