  hobbies: '[''Gardening (vegetable and flower beds)'', ''Walking local nature trails'', ''Birdwatching'', ''Reading historical fiction'', ''DIY home projects (furniture refinishing)'', ''Cooking family
    recipes'', ''Attending church socials'', ''Volunteering with Habitat for Humanity'', ''Quilting'', ''Listening to classic rock and country music'']'
  career_goals: Andria aims to advance from a skilled painter to a certified painting supervisor, obtaining industry credentials such as the NAWMP certification. She aspires to start her own boutique painting
    and restoration business focused on eco‑friendly finishes and historic home preservation in the Charlotte–Iredell area. Alongside business ownership, she hopes to mentor apprentices, build a reliable
    client base, and secure a stable financial foundation for her future retirement while maintaining the structured, predictable work environment she values.
