  hobbies: '[''Hiking'', ''Beach volleyball'', ''Half-marathon training'', ''Salsa dancing'', ''Mentoring youth in fire safety'', ''Community gardening'', ''Reading historical fiction'', ''Attending jazz
    concerts'']'
  career_goals: Judith seeks to advance within the fire department, aiming to earn the rank of captain within the next five years and ultimately pursue the role of battalion chief. She plans to complete
    a Bachelor of Science in Fire Protection Engineering or Public Administration to strengthen her qualifications for leadership positions. Additionally, she aspires to develop a specialized program for
    youth fire safety outreach and to receive advanced certifications in fire investigation and emergency medical services. Her long-term ambition is to influence policy on fire safety for underserved communities
    in Los Angeles County.
