  hobbies: '[''Fishing and camping at Michigan lakes'', ''Bowling league participation'', ''Pickup basketball games'', ''DIY home projects (shelf building, motorcycle maintenance)'', ''Classic rock music
    appreciation'', ''Streaming crime dramas'', ''Video gaming (strategic casual titles)'', ''Attending local community events'', ''Volunteer work at charity drives'', ''Exploring local breweries'']'
  career_goals: Looking ahead, Justin aims to step into a senior sales leadership role within the next three years, such as a regional sales manager or team lead, where he can mentor newer agents and shape
    sales strategies. He plans to obtain additional licensing (e.g., life and health insurance) and pursue the Chartered Property‑Casualty Underwriter (CPCU) designation to broaden his expertise. While
    he values higher earnings and a top‑performer reputation, he also seeks a more structured support system to reduce the stress that often accompanies his self‑managed schedule. Ultimately, he envisions
    leveraging his on‑the‑ground experience to transition into a consulting role that advises small businesses on risk management, balancing professional growth with a healthier work‑life rhythm.
