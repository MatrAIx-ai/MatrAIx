  career_goals: In the short term, Scott plans to earn a scholarship and enroll in a bachelor's program in computer science or environmental engineering at a university that values interdisciplinary work.
    He aims to secure a summer internship at a Seattle tech firm or a sustainability-focused organization, where he can apply his coding skills to real‑world problems. Over the next five years, he hopes
    to graduate with a strong technical foundation and begin a career as a software engineer or sustainability analyst, focusing on projects that blend innovative technology with practical environmental
    solutions. Long‑term, Scott envisions moving into a project‑management role where he can lead cross‑functional teams, mentor junior developers, and contribute to community‑oriented tech initiatives
    that improve quality of life in his hometown.
