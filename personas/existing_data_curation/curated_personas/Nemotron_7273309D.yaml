  career_goals: Shelly aims to excel academically, especially in mathematics and science, with a long‑term goal of becoming a civil engineer who designs safe, sustainable infrastructure. She hopes to earn
    a spot in a STEM‑focused summer program and eventually attend a high‑school engineering academy. In the meantime, she wants to lead her school’s science fair team, develop more sophisticated Scratch
    projects, and earn a scholarship that will enable her to study environmental engineering in college, where she can combine her love of structure with a desire to help her community.
