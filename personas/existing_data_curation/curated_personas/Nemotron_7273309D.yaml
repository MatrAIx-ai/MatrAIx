personas:
  professional: Shelly King is a budding young scientist‑engineer who spends weekends building LEGO models from instruction manuals and coding Scratch projects, using her love of structure and strategic
    thinking from chess to meticulously plan experiments and prototype simple machines, while balancing an assertive curiosity with a practical focus on immediate, doable results.
  sports: Shelly King follows the St. Louis Cardinals and the St. Louis Blues with family enthusiasm, participates in a local youth soccer league during the spring, and joins weekend nature‑walk groups
    that collect rocks and identify plants, reflecting a balanced, community‑oriented approach to fitness and seasonal sports.
  arts: Shelly King immerses herself in the arts by reading J.K. Rowling and Rick Riordan fantasy series, drawing detailed illustrations inspired by Monet’s water lilies, practicing piano pieces by Mozart,
    and regularly visiting the St. Louis Art Museum to study works by Van Gogh, weaving her structured creativity into a personalized artistic routine.
  travel: Shelly King prefers meticulously planned family trips, cherishing past visits to Chicago’s Museum Campus and a weekend road‑trip to the Ozark Mountains, while dreaming of future adventures to
    Washington, D.C., and Disney World, balancing a love for educational sites with a desire for magical experiences despite modest family budgets.
  culinary: Shelly King enjoys regional fares such as toasted ravioli and toasted corn, favors classic comfort foods like grilled cheese and spaghetti with marinara, and skillfully bakes chocolate chip
    cookies using butter, brown sugar, and vanilla, reflecting a practical palate that blends familiar flavors with occasional culinary experiments.
  core: Shelly King is an organized, curiosity‑driven eleven‑year‑old who channels a love for structure into LEGO building, chess strategy, and meticulous budgeting, while balancing reserved solitude with
    a heartfelt commitment to community and family traditions.
background:
  cultural: Shelly comes from a suburban white family in St. Louis County, Missouri, where Midwestern values of politeness, community involvement, and practicality are emphasized. She celebrates typical
    American holidays such as Thanksgiving, Independence Day, and Halloween with family gatherings that often feature regional foods like toasted ravioli and toasted corn. Growing up near Forest Park, she
    has frequent access to the Saint Louis Science Center and the Art Museum, which have nurtured her curiosity in science and the arts. Her family's cultural practices include attending a local community
    church on Sundays, participating in neighborhood block parties, and supporting local sports teams like the St. Louis Cardinals, all of which reinforce a sense of belonging and modest ambition.
