  hobbies: '[''Abstract painting'', ''Architectural photography'', ''Cooking Mexican cuisine'', ''Gardening'', ''Book club (philosophy)'', ''Volunteer art teaching'', ''Attending local art fairs'', ''Walking
    historic districts'']'
  career_goals: Lourdes aims to transition from individual brokerage to establishing a boutique agency that specializes in historic homes and artistic property renovations in the Piedmont region. She plans
    to mentor emerging agents, particularly those from underrepresented backgrounds, by offering workshops on culturally sensitive client service and creative marketing. Over the next five years, she hopes
    to acquire a professional certification in real‑estate development, launch a community‑focused affordable‑housing advisory program, and have her agency recognized for integrating art and design into
    the home‑buying experience.
