personas:
  professional: Lourdes Roman is a veteran residential real‑estate broker whose two decades of market analysis, bilingual negotiation, and eye‑for‑abstract‑inspired home staging empower them to guide clients
    through historic property deals while they quietly build a boutique agency focused on artistic renovations and mentorship of under‑represented agents.
  sports: Lourdes Roman supports local teams like the Greenville Drive baseball club and the Charlotte Hornets, enjoys weekly walking tours of downtown's historic districts, and attends a senior fitness
    class at the community center where they practice gentle tai chi and occasional tennis on Saturday afternoons.
  arts: Lourdes Roman spends weekends painting abstract watercolors inspired by Jackson Pollock and Georgia O'Keeffe, snapshots historic brick facades with a vintage Leica, volunteers at the Greenville
    Art Fair teaching children basic drawing, and finds solace in listening to Lila Downs and classical piano while they curate a personal gallery of local artwork.
  travel: Lourdes Roman prefers spontaneous, culturally immersive trips, often jet‑setting to historic towns such as Santa Fe, Asheville’s Blue Ridge Mountains, and Kyoto’s temples, while they also enjoy
    nearby weekend escapes to Charleston’s waterfront, budgeting these adventures through careful use of a travel rewards credit card and flexible itinerary planning.
  culinary: Lourdes Roman excels at preparing traditional mole poblano, tamales, and fresh guacamole using heirloom chilies and homemade corn masa, while their garden supplies cilantro, oregano, and avocados
    for authentic flavor, and they relish sharing these dishes at family gatherings, sometimes indulging a little too much on the rich sauces.
  core: Lourdes Roman blends a seasoned real‑estate acumen with abstract artistic flair, nurturing community ties through bilingual service, flexible finance, and a love for historic charm, all while they
    juggle mild health concerns, a penchant for spontaneous travel, and the occasional indulgence in rich mole.
background:
  cultural: Lourdes was raised in a Mexican‑American household and carries forward the warmth, hospitality, and strong family ties of her heritage. Fluent in Spanish, she often incorporates bilingual communication
    in her client interactions, ensuring Mexican‑origin buyers and sellers feel comfortable. She celebrates Día de los Muertos and Mexican Independence Day with gatherings that blend traditional foods,
    music, and storytelling, fostering cultural pride within the Greenville community. Her background informs her respect for community cohesion and her commitment to supporting local Hispanic initiatives,
    such as literacy programs and cultural festivals.
