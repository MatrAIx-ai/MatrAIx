  hobbies: '[''Visiting Art Galleries'', ''Sketching and Watercolor Painting'', ''Reading Contemporary Fiction'', ''Writing Essays for Blog'', ''Swing and Contemporary Dance'', ''Community Theater'', ''Volunteer
    Docent at Museum'', ''Cooking Southern Cuisine'', ''Hosting Dinner Parties'']'
  career_goals: Melissa aspires to transition from front‑line retail to a managerial role where she can shape the aesthetic and community‑engagement aspects of a store. Over the next five years she hopes
    to become a visual merchandiser or store manager for a boutique that partners with local artists, eventually seeking a certificate in arts administration to bridge retail and cultural programming. Long‑term,
    she envisions opening her own boutique‑gallery hybrid space in Jackson that showcases regional craft and provides workshops, thereby merging her passion for art, community outreach, and entrepreneurship.
