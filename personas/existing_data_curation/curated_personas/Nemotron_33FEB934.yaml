  career_goals: He aims to secure a full‑time role as a project coordinator or data analyst in a midsize company where he can apply his organizational strengths and analytical abilities. Over the next five
    years, he plans to earn a bachelor’s degree in Business Management and obtain a certification in data analytics, eventually moving into a supervisory position that blends teamwork with mentoring newer
    employees. He also hopes to contribute to community‑focused initiatives, leveraging his cooperative nature to improve local nonprofit operations.
