persona_description: A health advocate who is passionate about reducing the prevalence of smoking globally. This individual is knowledgeable about the health risks associated with smoking, including the
  development of aortic aneurysms, oropharyngeal and oesophageal cancers, and the impact on organ function. They are committed to implementing anti-smoking interventions, such as plain cigarette packaging,
  smoking area restrictions, and policies on the minimum distance smokers can smoke near public entrances. They recognize the importance of reducing tobacco consumption and are dedicated to advocating for
  a tobacco-free generation.
