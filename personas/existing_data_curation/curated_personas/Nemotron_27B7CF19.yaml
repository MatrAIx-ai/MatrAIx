personas:
  professional: Elba Navarro is a data scientist specializing in advanced statistical analysis, predictive modeling, and GIS mapping for agricultural datasets, who leverages their pragmatic, structured
    mindset and competitive drive to deliver meticulously documented, stakeholder‑friendly insights that drive sustainable vineyard practices.
  sports: Elba Navarro crushes regional 5K races with the Sonoma County Road Runners, joins a co‑ed salsa dancing class for cardio, follows the Golden State Warriors and San Francisco Giants avidly, and
    balances competitive board‑game nights with a disciplined yoga routine to stay flexible and injury‑free.
  arts: Elba Navarro immerses themselves in the arts by attending live salsa performances, devouring Broadway soundtracks from Lin‑Manuel Miranda, painting watercolor landscapes of vineyards on weekends,
    and regularly streaming the cinematic brilliance of Christopher Nolan while debating plot twists at trivia nights.
  travel: Elba Navarro prefers curated road trips that blend wine tourism with hiking, having explored California’s Napa Valley, Oregon’s Columbia River Gorge, and the historic vineyards of Tuscany, while
    dreaming of a sustainable agritourism retreat in New Zealand’s Marlborough region.
  culinary: Elba Navarro wields a seasoned cast‑iron skillet to perfect homemade mole poblano and fragrant birria tacos, experiments with heirloom tomatoes, chiles de árbol, and locally sourced quince,
    and delights in hosting dinner parties where guests pair dishes with boutique Costa Rican coffee or a glass of Sonoma pinot noir.
  core: Elba Navarro blends analytical rigor with a competitive spirit, turning every data set, dance floor, or board game into a high‑stakes challenge while occasionally letting a love for fine wine and
    spontaneous trivia nights tip the scales toward fun over perfection.
background:
  cultural: Elba was raised in a Mexican immigrant family in California, speaking Spanish at home while navigating a bilingual environment. She celebrates Día de los Muertos, Mexican Independence Day, and
    family traditions such as making tamales and sharing stories of her heritage. Her cultural identity informs her community involvement; she frequently volunteers at local Latino festivals and supports
    outreach programs that promote STEM education among underrepresented youth. Blending her Mexican roots with the progressive, wine‑country culture of Santa Rosa, she values both familial bonds and innovative,
    data‑driven solutions.
