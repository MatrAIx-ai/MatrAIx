  hobbies: '[''Hiking'', ''Wine Tasting'', ''Cooking Mexican Cuisine'', ''Salsa Dancing'', ''STEM Mentorship'', ''5K Running'', ''Trivia Competitions'', ''Puzzle Solving'', ''Board Games'', ''Yoga'']'
  career_goals: Elba aims to advance to a senior data scientist or lead quantitative analyst role within a technology or agritech firm, focusing on sustainable agriculture solutions for Sonoma County’s
    vineyards. She plans to pursue a master's degree in Data Science, publish research on climate‑resilient farming practices, and secure a leadership position where she can mentor women and Latinx students
    in STEM. Long‑term, she envisions founding a consultancy that bridges data‑driven insights with community‑based agricultural initiatives, positioning herself as a recognized expert in data‑enabled sustainability.
