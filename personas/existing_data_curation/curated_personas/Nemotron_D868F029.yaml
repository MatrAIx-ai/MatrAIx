  hobbies: '[''Reading Mexican literature'', ''Knitting and textile crafts'', ''Herb gardening'', ''Traditional cooking'', ''Listening to boleros and mariachi music'', ''Walking in historic neighborhoods'',
    ''Visiting art galleries'', ''Storytelling and oral history recording'']'
  career_goals: 'Even at 85, Thelma aims to leave a lasting legacy: she is drafting a memoir that chronicles her family''s migration and cultural journey, planning a traveling exhibit of Mexican folk art
    for local schools, and compiling a community cookbook that preserves her treasured recipes. She also mentors younger volunteers at the neighborhood cultural center and advocates for the preservation
    of historic Latino neighborhoods in Los Angeles, all while managing her concern for health and the desire to see her efforts endure beyond her years.'
