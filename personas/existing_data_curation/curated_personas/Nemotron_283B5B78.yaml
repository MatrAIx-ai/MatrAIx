  hobbies: '["gardening", "fishing", "listening to classic country music", "attending live music shows", "volunteering at church food bank", "participating in neighborhood yard clean‑up", "woodworking",
    "cooking Southern dishes", "reading historical biographies"]'
  career_goals: As he approaches retirement, Bobby aims to secure a stable part‑time supervisory role that offers a predictable schedule and the chance to mentor younger janitorial staff. He plans to earn
    a green‑cleaning certification and stay current on eco‑friendly cleaning technologies, enhancing both his expertise and the building’s environmental profile. Ultimately, he hopes to transition to running
    a modest independent cleaning service for local churches and community centers, allowing him to remain active while enjoying greater flexibility in his work hours.
