personas:
  professional: Bobby Willis, a 64-year-old janitorial supervisor with four decades of hands-on building upkeep, leverages their meticulous floor-care expertise and OSHA-compliant safety mindset to mentor
    junior staff while they steer the crew toward greener, eco-friendly cleaning practices.
  sports: Bobby Willis enjoys early-morning fishing at Percy Priest Lake, follows the Nashville Predators and Tennessee Titans on TV, participates in the community’s senior walking group on weekends, and
    they keep fit by tending their garden and doing light carpentry.
  arts: Bobby Willis, a lifelong fan of Nashville’s classic country and Americana, regularly spins Johnny Cash, Emmylou Harris, and Sturgill Simpson records, attends intimate gigs at the 5 Spot, and they
    draw inspiration from biographies of Johnny Cash and Helen Keller.
  travel: Bobby Willis prefers relaxed road trips to historic Southern towns like Franklin and Asheville, often planning outings around church events, and they dream of a leisurely spring visit to the Great
    Smoky Mountains to photograph native wildflowers.
  culinary: Bobby Willis loves cooking Southern staples such as fried catfish, collard greens, and cornbread, frequently seasoning dishes with fresh tomatoes, peppers, and basil from their garden, and they
    aren’t shy about experimenting with a dash of hot sauce on their signature shrimp boil.
  core: Bobby Willis balances a structured work ethic with a spontaneous love of gardening and live music, mentoring younger cleaners while occasionally misplacing the right cleaning chemicals in their
    garden shed, and they often hum classic country tunes as they work.
background:
  cultural: Bobby was raised in a working‑class white family in the Nashville suburbs during the 1960s and 70s. His upbringing emphasized Southern hospitality, community involvement, and a strong work ethic,
    values reinforced by regular church attendance and family gatherings centered around music and food. He completed high school locally and entered the building‑maintenance trade straight after, finding
    a career that aligned with his practical, hands‑on nature. The cultural fabric of his life includes a deep appreciation for country music, Southern cuisine, and the close‑knit neighborhoods of Davidson
    County. Though he has witnessed social change over his lifetime, he remains rooted in the traditions and modesty of his community, which shape his dependable and resilient outlook.
