  hobbies: '[''pickup basketball'', ''surfing/paddle-boarding'', ''robotics club'', ''beach clean-up volunteering'', ''reading science-fiction'', ''listening to classic rock'', ''blogging about environmental
    issues'', ''mindfulness meditation'', ''journal keeping'', ''DIY electronics projects'']'
  career_goals: Robert aims to finish his secondary education by obtaining a GED and then enroll in a community college program in civil engineering. He is particularly interested in sustainable coastal
    infrastructure and hopes to work on projects that mitigate sea-level rise and protect Mastic Beach. Over the next decade, he envisions completing a bachelor's degree, securing internships with local
    construction and environmental firms, and eventually becoming a licensed civil engineer specializing in resilient shoreline design. He also plans to acquire EMT certification, integrating his desire
    to help others and his strong teamwork skills into a supplementary emergency response role. Long-term, he aspires to mentor younger students through STEM outreach programs and contribute to community
    resilience initiatives.
