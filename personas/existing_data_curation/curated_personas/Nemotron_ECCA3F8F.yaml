personas:
  professional: Robert is a proactive robotics club leader who blends their curiosity for new ideas with disciplined project management, using Python and Scratch to prototype eco-friendly devices while
    mentoring peers and envisioning a future as a civil engineer focused on resilient coastline design.
  sports: Robert thrives on the basketball courts of the local park, cheering for the New York Knicks during the off-season, and spends sunny weekends surfing and paddle-boarding at Mastic Beach, where
    they belong to a weekend beach-clean-up surf crew that doubles as a fitness club.
  arts: Robert immerses themselves in classic rock legends like Led Zeppelin, Pink Floyd, and Fleetwood Mac while devouring science-fiction classics such as Asimov's Foundation and Frank Herbert's Dune,
    and they often channel the narratives into blog posts that blend storytelling with local environmental advocacy.
  travel: Robert favors short, purposeful trips along the East Coast, having explored the Hudson Valley's historic farms, the remote sandbars of Fire Island, and dreaming of a research-focused adventure
    to Iceland's volcanic coasts to study geothermal resilience, where they hope to apply their engineering curiosity.
  culinary: Robert enjoys preparing grilled salmon with quinoa, crafting fish tacos topped with mango salsa, and blending smoothies with kale, banana, and chia seeds, though they sometimes skip meals during
    late-night robotics sessions.
  core: Robert is an organized, eco-driven teen whose relentless curiosity fuels both a love for robotics and a deep anxiety that they pacify with mindfulness, surf sessions, and meticulous budgeting.
background:
  cultural: Robert comes from a white, middle-class American family rooted in the suburban culture of Long Island, New York. Growing up in Mastic Beach, a coastal community, he has been shaped by the region's
    maritime lifestyle, seasonal beach activities, and a strong community-service ethic that is common in many Long Island neighborhoods. His family celebrates typical American holidays and maintains values
    of hard work, education, and civic involvement. While his heritage is primarily of European descent—tracing back to English and Irish ancestors—he has been exposed to the cultural diversity of Suffolk
    County, including interactions with neighbors from various backgrounds, which have broadened his appreciation for different perspectives.
