personas:
  professional: Sue Gordon is a meticulous Business Administration associate student who leverages her Excel expertise, precise time‑management, and basic bookkeeping to streamline class projects and volunteer
    event logistics, showcasing a methodical, reliable drive that aligns with her ambition to become an office manager in healthcare or logistics.
  sports: Sue Gordon enjoys solitary hillside hikes on the nearby Leaf River trail, follows the Mississippi State Bulldogs football season with quiet pride, and maintains a low‑key fitness routine through
    a community yoga class at the local recreation center, preferring consistent, planned workouts over competitive sports.
  arts: Sue Gordon finds solace in contemporary fiction by authors such as Sally Rooney, knits patterned scarves while listening to folk‑rock singer Gillian Welch, and occasionally supports community theater
    productions behind the scenes, letting artistic appreciation complement their methodical nature.
  travel: Sue Gordon prefers low‑cost road trips, cataloguing each stop in their bullet journal, with recent weekends spent exploring the sandy shores of Gulf Coast beaches and a bucket‑list longing to
    wander the historic French Quarter of New Orleans and the music scene of Nashville, balancing adventure with careful budgeting.
  culinary: Sue Gordon relishes classic Southern comfort foods like buttery biscuits with honey, fried catfish with hush‑puppy sides, and sweet pecan pie, yet their cooking skill remains modest, often sticking
    to straightforward recipes and maintaining a well‑organized pantry of dried beans, cornmeal, and fresh garden herbs.
  core: Sue Gordon is a meticulous planner who channels a quiet competitiveness into bullet‑journaling and spreadsheet‑driven budgeting, balancing a love for solo hikes and puzzles with a tendency to over‑schedule
    and occasionally neglect social spontaneity.
background:
  cultural: Sue grew up in Hattiesburg, Mississippi, within a predominantly white, Southern, small‑town environment. Her upbringing emphasized self‑reliance, respect for routine, and community values rooted
    in Southern hospitality and church involvement, though she prefers quieter, more private social settings. Local customs such as Southern cuisine, high school football culture, and a close‑knit neighbor
    network have shaped her worldview, while her education at a community college reflects the region's focus on pragmatic, career‑oriented training.
attributes:
  skills: '["Time management","Microsoft Office (Word, Excel, PowerPoint)","Data entry","Basic bookkeeping","Research and information synthesis","Strategic planning (via structured video games)"]'
  hobbies: '["Bullet journaling","Crossword and Sudoku puzzles","Strategic video games (e.g., Civilization, StarCraft)","Hiking in local nature trails","Reading contemporary fiction","Knitting simple patterns","Behind‑the‑scenes
    planning for small community events"]'
  career_goals: Sue aims to complete her associate degree in Business Administration and transition to a bachelor's program in the same field. She aspires to secure an entry‑level office manager or administrative
    coordinator position within a healthcare or logistics company in the Hattiesburg area. Long‑term, she hopes to earn a Certified Administrative Professional (CAP) credential and eventually lead a small
    team, leveraging her organizational strengths and competitive drive to improve operational efficiency.
