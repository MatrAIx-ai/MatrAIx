personas:
  professional: Valarie Petty, a seasoned housekeeping specialist with a flawless track record in residential and commercial deep‑cleaning, leverages her meticulous scheduling and inventory expertise to
    lead teams, and is actively preparing for a supervisory role at a boutique hotel while planning to launch her own client‑centric cleaning service.
  sports: Valarie Petty enjoys low‑impact fitness, attending a Tuesday evening yoga class at the community center and a weekly walking club that explores the city’s historic districts, while cheering on
    the local semi‑pro basketball team, the Metro Wolves, and the hometown minor league baseball squad, the Springfield Sluggers, as her seasonal sports companions.
  arts: Valarie Petty weaves intricate crochet patterns while the smooth vocals of Aretha Franklin and Marvin Gaye fill her kitchen, immerses herself in mystery novels by Agatha Christie and Gillian Flynn,
    and lends her clear alto to the church choir, where she reveres the harmonies of classic soul as a daily source of artistic fulfillment.
  travel: Valarie Petty prefers meticulously planned getaways that blend relaxation with botanical inspiration, such as weekend trips to the historic Kew Gardens in England and a sun‑kissed retreat among
    the Majorelle Garden’s succulents in Marrakech, while balancing her modest budget and occasional family commitments to ensure each journey feels both purposeful and serene.
  culinary: Valarie Petty, a confident home cook, delights in seasoning herb‑roasted chicken with fresh rosemary and thyme from her balcony garden, crafting soulful shrimp and grits seasoned with smoked
    paprika, and occasionally whips up a comforting sweet‑potato casserole topped with pecan streusel, all while enjoying classic R&B playlists as culinary backdrops.
  core: Valarie Petty channels her love of order into pristine cleaning routines, soothing crochet sessions, and a meticulously budgeted life, yet battles occasional anxiety‑driven impulse buys and an unrelenting
    need to journal every emotional ripple.
background:
  cultural: Valarie grew up in a close‑knit African‑American neighborhood in Brooklyn, New York, where community bonds and church life were central to daily life. Her family traditions include preparing
    soul‑food meals, celebrating cultural holidays such as Juneteenth, and participating in neighborhood block parties. She retains a strong sense of pride in her Black heritage, drawing on the resilience
    and solidarity of her community to navigate personal challenges, including her recent divorce and managing anxiety.
attributes:
  skills: '[''Residential cleaning'', ''Commercial cleaning'', ''Deep cleaning'', ''Laundry and fabric care'', ''Chemical safety and usage'', ''Time management'', ''Scheduling and client communication'',
