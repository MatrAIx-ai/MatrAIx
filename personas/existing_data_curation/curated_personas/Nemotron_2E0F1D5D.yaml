  career_goals: Timothy aims to transition into a senior leadership role, such as Director of Community Services for Luzerne County, where he can integrate technology into service delivery and champion
    policies that reduce racial and socioeconomic disparities. He plans to secure sustainable funding for innovative programs, publish case studies on tech‑enabled outreach, and develop a mentorship pipeline
    for emerging social workers, especially those from underrepresented backgrounds. Over the next five years, he also hopes to earn a Licensed Clinical Social Worker (LCSW) credential and become a sought‑after
    speaker at state and national social work conferences, while gradually scaling back to a part‑time consultancy that continues his community advocacy.
