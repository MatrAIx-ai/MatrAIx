  hobbies: '[''Bass Fishing'', ''Vegetable Gardening'', ''Woodworking'', ''Reading Non‑fiction (Finance, Self‑help)'', ''Classic Country Music'', ''Church Community Activities'', ''High School Football
    Games'', ''Maintaining a Classic Truck'', ''Puzzle Solving (Crosswords, Sudoku)'']'
  career_goals: Erick aims to move from a customer‑service representative role into a supervisory position within his call center, capitalizing on his organizational strengths and high standards. Over the
    next three to five years he plans to complete a part‑time associate’s degree in Business Administration and earn the Certified Customer Service Professional (CCSP) credential. His goal is to become
    a team lead or quality‑assurance manager, where he can mentor new agents, refine call‑handling procedures, and contribute to measurable improvements in department efficiency. A stable promotion with
    a reliable salary increase is also important to him as a way to provide greater financial security for his family and plan for a comfortable retirement.
