personas:
  professional: Erick Cole, a 45‑year‑old seasoned customer‑service representative, applies their disciplined, script‑driven methodology and deep CRM expertise to consistently exceed key performance metrics
    while mentoring new hires, positioning themselves for a supervisory role.
  sports: Erick Cole follows a routine of weekend bass fishing on Watts Bar Lake, watches their hometown high‑school’s Friday night football, roots for the Tennessee Titans, and maintains a modest fitness
    regimen by walking the dog and doing light weightlifting at the community gym, valuing consistency over competitive sport.
  arts: Erick Cole’s artistic side expresses itself through woodworking projects inspired by the craftsmanship of Walter Sorrells, while their leisure reading includes personal‑finance best‑sellers by Dave
    Ramsey, and they unwind listening to classic country legends like Johnny Cash and attending church potlucks where gospel hymns by The Blind Boys of Alabama set the mood.
  travel: Erick Cole prefers carefully planned road trips within a few hundred miles, such as annual family visits to the Great Smoky Mountains and occasional weekend getaways to Nashville’s music scene,
    but dreams of a structured itinerary to explore the historic streets of Savannah, balancing the desire for new experiences with their need for routine and budget discipline.
  culinary: Culinary pursuits for Erick Cole revolve around home‑grown tomatoes, beans, and peppers transformed into tomato basil soup, roasted vegetable medley, and pepper‑stuffed peppers, while they reliably
    fall back on classic comfort meals like fried chicken and meat‑loaf, showcasing a competent yet no‑frills cooking style.
  core: Erick Cole is a 45‑year‑old pragmatist who blends routine‑driven discipline with a quiet love for hands‑on projects, yet constantly battles worry‑induced stress that fuels both meticulous planning
    and occasional over‑control.
background:
  cultural: Erick grew up in a traditional Southern white family in rural East Tennessee, where Scotch‑Irish and English heritage are common. The community’s values emphasize self‑reliance, a strong work
    ethic, and close‑knit family ties, reinforced by a lifelong involvement in the local Baptist church. Southern hospitality and practicality shape his outlook, encouraging him to prioritize reliable routine
    and tangible results. Regional customs—such as home‑cooked meals, Saturday church services, and attending high‑school sports—have ingrained a sense of communal responsibility while respecting personal
    space. This cultural backdrop, combined with his marriage and small‑town environment, informs his disciplined, modest, and community‑oriented personality.
attributes:
