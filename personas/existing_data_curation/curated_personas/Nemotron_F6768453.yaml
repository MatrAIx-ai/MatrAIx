  career_goals: Tor dreams of designing things that improve everyday life, picturing himself as an engineer or architect who creates safe playgrounds and energy‑efficient homes. He also feels a strong connection
    to animals and imagines becoming a veterinarian one day. Above all, he wants to keep learning, help his friends solve problems, and perhaps lead a community service project in his neighborhood when
    he’s older.
