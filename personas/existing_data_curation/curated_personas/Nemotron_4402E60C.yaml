  career_goals: She aims to advance to a store manager role within the next two years, followed by a regional district manager position overseeing multiple stores. Long‑term, she envisions leading a flagship
    retail concept that integrates technology, sustainability, and experiential art installations. She also plans to complete an executive leadership program, earn an MBA specialization in retail innovation,
    and mentor emerging women leaders in the industry.
