persona_description: A military officer who served in the Mexican-American War, the Civil War, and the Confederate Army, and who is remembered for his bravery and leadership during the Battle of Cerro Gordo
  and the Siege of Vera Cruz. He was a brother of General Hamilton P. Bee and served as an Adjutant, 3rd Infantry, from July 25, 1848 to March 3, 1855. He was mortally wounded during the Battle of Cerro
  Gordo and died the following day in a small cabin near the battlefield. He was buried in Pendleton, SC.
