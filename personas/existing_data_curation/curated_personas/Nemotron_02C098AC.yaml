  career_goals: Nicole aims to graduate high school with a solid GPA and earn a scholarship to study nursing, attracted by the clear, structured career path and the opportunity to help her community directly.
    She also keeps an eye on a parallel interest in digital media, dreaming of a future where she could combine health communication with graphic design to create informative, visually engaging public‑health
    campaigns. In the short term, she plans to obtain her first‑aid certification and volunteer at the local community health clinic, building both experience and a network of supportive mentors.
