personas:
  professional: Quinney Deleon is an aspiring digital creator who merges coding, photography, and graphic design into tidy, minimalist website projects for school clubs and the neighborhood community center,
    channeling their love of order and analytical thinking into consistently meeting deadlines, and they often volunteer to teach peers basic HTML skills.
  sports: Quinney Deleon, a member of a local surf club, spends weekends riding waves at La Jolla while cheering on the San Diego Padres and following San Diego Wave FC, and maintains a disciplined yet
    sometimes erratic fitness routine that includes early morning runs and weekend beach volleyball, and they often log their surf sessions in a personal tracker.
  arts: Quinney Deleon cultivates a solo creative practice through coastline photography, digital sketches inspired by artists like Loish and Bee Davis, and a deep appreciation for R&B and hip‑hop icons
    such as H.E.R. and Kendrick Lamar, often curating a personal playlist while methodically editing images, and they share their latest pieces on a private Instagram account.
  travel: Quinney Deleon prefers carefully planned, budget‑friendly getaways, frequently day‑tripping to Torrey Pines and La Jolla Cove, while dreaming of a solo adventure to Kyoto during cherry‑blossom
    season and a family road‑trip along the Pacific Coast Highway, and they track each trip's expenses in a detailed journal.
  culinary: Quinney Deleon enjoys preparing homemade fish tacos with lime‑marinated cod, avocado, and cilantro, experimenting with miso‑based ramen bowls topped with chili oil, and snacking on sweet plantain
    chips, reflecting a blend of coastal Californian and Latino flavors, and they love pairing the tacos with a side of fresh salsa.
  core: Quinney Deleon is a detail‑obsessive teen who balances structured coding sessions with spontaneous midnight photography walks, compulsively schedules every minute yet secretly fears missing out,
    and they habitually check their phone at exactly 8 p.m. for the latest music releases.
background:
  cultural: Nicole is an African American teen raised in San Diego’s vibrant, multicultural environment. Her family blends Black traditions—such as celebrating Juneteenth and attending gospel services—with
    Latino influences reflected in her surname Deleon, including occasional participation in neighborhood Día de los Muertos festivities and a modest fluency in Spanish. This mixed cultural heritage has
    instilled in her a strong sense of community, resilience, and appreciation for diverse artistic expressions, all of which shape her personal interests and future aspirations.
