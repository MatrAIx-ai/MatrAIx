persona_description: A Sarawakian indigenous Dayak community leader who is knowledgeable about the traditional land tenure system, adat, and the history of the land administration policies in Sarawak. They
  are deeply concerned about the preservation and protection of the native rights and customs, and are actively involved in the development of sustainable land administration practices. They are also interested
  in the economic impacts of land administration policies on the Iban community and the potential for poverty eradication through sustainable land management.
