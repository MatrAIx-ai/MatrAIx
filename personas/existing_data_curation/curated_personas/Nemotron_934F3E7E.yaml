  hobbies: '[''Gardening'', ''Heirloom tomato cultivation'', ''Fusion cooking'', ''Reading historical biographies'', ''Crossword puzzles'', ''Book club'', ''Seated yoga'', ''Temple participation'', ''Volunteer
    work at food pantry'']'
  career_goals: Although retired, Prakash aims to stay mentally active by attending local lifelong‑learning courses on digital literacy and regional history, to mentor his grandchildren and community youth,
    to document his family's migration story for future generations, to volunteer as a cultural advisor at the senior center, and to maintain his health through regular walking and seated yoga practice.
