personas:
  professional: Prakash Patel is a retired electrical technician who combines hands‑on expertise in residential wiring with small‑business bookkeeping and cultural liaison work, applying their practical
    curiosity and cooperative nature to mentor youth and resolve community conflicts.
  sports: Prakash Patel is an avid supporter of the Milwaukee Brewers and the Green Bay Packers, joins a senior walking group that meets three times weekly, and incorporates seated yoga into their fitness
    routine to accommodate osteoarthritis.
  arts: Prakash Patel engages with the arts through a close‑knit book club that discusses biographies of historical figures, attends community concerts featuring violinist Itzhak Perlman, listens to sitar
    recordings of Ravi Shankar while cooking, and enjoys the poetry of Maya Angelou.
  travel: Prakash Patel prefers thoughtfully planned short trips that blend historical curiosity with comfort, such as a guided tour of the Freedom Trail in Boston, a weekend visit to the Amish farms of
    Lancaster County, and a leisurely cruise along the Mississippi River with grandchildren, always choosing destinations that offer easy accessibility and cultural depth.
  culinary: Prakash Patel delights in preparing fusion dishes that marry Indian spices with Midwestern fare, such as heirloom tomato tikka tacos seasoned with cumin, turmeric, and fresh cilantro, and often
    pairs these meals with locally sourced sweet corn and paneer, showcasing both their gardening enthusiasm and culinary curiosity.
  core: Prakash Patel is a reflective, community‑oriented elder who balances a love of quiet puzzles and gardening with a disciplined routine of volunteering, mentoring, and quietly mastering new digital
    skills, all while occasionally forgetting to water their tomatoes during rainstorms.
background:
  cultural: Prakash was born in Gujarat, India, into a Patidar farming family and immigrated to the United States in the early 1970s. He grew up bridging Gujarati traditions—such as joint family celebrations,
    devotion to the Bhagavad Gita, and vegetarian cuisine—with American Midwestern life in Michigan. His cultural identity reflects a strong sense of family duty, respect for elders, and active participation
    in the local Indian diaspora community, while his curiosity has led him to adopt and appreciate aspects of American culture.
