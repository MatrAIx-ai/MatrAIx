personas:
  professional: Wendy Broadwell, a seasoned low‑voltage systems professional with over three decades of experience installing fire alarm and security systems, combines her practical curiosity with a methodical,
    organized approach to every project; they meticulously read schematics, adhere to NFPA 72 and local codes, integrate emerging IoT smart‑home devices, mentor younger technicians—especially women—and
    are planning a transition to part‑time consulting and compliance audits within the next five years.
  sports: Wendy Broadwell, an avid birdwatcher and senior hiker, spends mornings walking the Potomac River trail with binoculars, participates in the Shenandoah Senior Hiking Club, enjoys gentle yoga at
    the local community center, cheers on the Washington Capitals during hockey season and the Virginia Cavaliers basketball team, and occasionally volunteers as a safety monitor at community sports events.
  arts: Wendy Broadwell, a devoted patron of the arts, rarely misses a performance at the local community theater—especially productions like "Our Town" and the annual musical revue—while also enjoying
    Southern gospel hymns by the Oak Ridge Boys and classic country legends such as Dolly Parton; they keep a scrapbook of playbills and often discuss stage lighting nuances with the theater's technical
    crew.
  travel: Wendy Broadwell, who favors leisurely road trips that blend history and nature, has driven the Blue Ridge Parkway each fall to photograph the foliage, visited Colonial Williamsburg and the historic
    district of Savannah, dreams of strolling the cobblestone streets of Bath, England, plans trips months in advance, prefers staying at family‑run bed‑and‑breakfasts, and allocates a modest travel fund
    to ensure budget‑friendly adventures with their grandchildren.
  culinary: Wendy Broadwell, a talented home cook, delights in preparing traditional Southern dishes such as fried chicken, collard greens simmered with smoked ham hocks, shrimp and grits, and peach cobbler,
    often using garden‑fresh herbs like thyme, basil, and dill; they enjoy experimenting with sweet tea blends, take pride in perfecting the flaky crust of cornbread, and occasionally indulge in a slice
    of rich chocolate cake from a local bakery as a treat.
  core: Wendy Broadwell blends meticulous craftsmanship in low‑voltage systems with a warm, community‑focused life, balancing pragmatic financial habits, gentle health management, and a love for Southern
    heritage, gardening, and the arts.
background:
  cultural: Wendy grew up in a middle‑class, multigenerational family in suburban Virginia, where a blend of traditional Southern hospitality and a pragmatic work ethic shaped her outlook. Her cultural
    heritage includes active participation in church activities, local community events, and an appreciation for the region’s colonial history. The values of reliability, service to neighbors, and modest
    self‑reliance typical of her upbringing influence both her professional demeanor and personal life. While honoring these traditions, she embraces the growing influence of modern technology, reflecting
    the gradual shift of her generation toward smart‑home adoption.
attributes:
  skills: '[''Electrical wiring and low‑voltage circuitry'', ''Interpretation of fire and security codes (NFPA 72)'', ''Installation of fire alarm panels'', ''Installation of security alarm panels'', ''Configuration
    of motion sensors and door/window contacts'', ''CCTV camera setup and networking'', ''Smart home integration (IoT security devices)'', ''System troubleshooting and diagnostics'', ''Customer education
    and training'', ''Project planning and documentation'', ''Safety compliance and inspection'']'
  hobbies: '[''Gardening (vegetable and flower beds)'', ''Birdwatching'', ''Knitting and crocheting'', ''Reading historical fiction'', ''Volunteer fire‑safety education'', ''Attending community theater
    productions'', ''Cooking Southern recipes'', ''Hiking in Shenandoah National Park'', ''Smart‑home device tinkering'', ''Puzzle solving (crosswords, Sudoku)'']'
  career_goals: Although approaching traditional retirement age, Wendy plans to deepen her technical expertise by obtaining a Master Alarm Installer certification and staying current with IoT‑based security
    solutions. She aims to mentor younger technicians, especially women entering the trade, and to expand her services into integrating smart home technologies for senior‑friendly environments. Over the
    next five years, she envisions transitioning into a part‑time consulting role, offering compliance audits and training workshops, while maintaining a limited schedule of hands‑on installations to stay
    connected with the work she loves.
