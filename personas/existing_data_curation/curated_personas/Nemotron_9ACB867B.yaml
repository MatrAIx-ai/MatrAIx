  hobbies: '[''Cooking traditional Puerto Rican cuisine'', ''Salsa dancing'', ''Gardening'', ''Reading historical fiction'', ''Walking the Chicago lakefront trail'', ''Volunteer health outreach in Humboldt
    Park'', ''Yoga for stress relief'', ''Photography'', ''Knitting'', ''Listening to boleros and Latin jazz'']'
  career_goals: Maria aims to transition from bedside nursing to a nurse manager position within her health system, where she can shape policies that improve care for older adults and underserved Latino
    populations. She plans to earn a Bachelor of Science in Nursing (BSN) and later a Master’s in Nursing Leadership, while obtaining a certification in gerontological nursing. Her long-term ambition is
    to launch a community outreach program that offers preventive health workshops, bilingual education, and mobile screening services in Chicago’s Puerto Rican neighborhoods. She also hopes to mentor at
    least ten new nurses each year, fostering a supportive, stress-aware work environment.
