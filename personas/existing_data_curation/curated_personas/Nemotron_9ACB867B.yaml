personas:
  professional: Maria Bellido, a seasoned registered nurse with over 25 years of acute‑care and community health experience, is methodical yet curious; they combine an evidence‑based approach with a passion
    for emerging best practices, leveraging bilingual communication, advanced patient assessment, and quality‑improvement leadership to mentor staff and champion patient safety while meticulously planning
    each shift and documenting every detail.
  sports: Maria Bellido, an active community dancer and avid lakefront walker, is a dedicated fan of local sports; they follow the Chicago Cubs for baseball, support the Chicago Bears during football season,
    cheer for the Chicago Bulls in winter, and participate in a local senior salsa club that meets weekly at a community center, while also joining a seasonal pick‑up softball league in the summer.
  arts: Maria Bellido, an enthusiastic lover of music and visual arts, is a cultural connoisseur; they spend evenings listening to boleros by Los Panchos, Latin jazz from Tito Puente, and classic salsa
    recordings by Celia Cruz, curate a small collection of vintage vinyl, enjoy knitting while watching films by Pedro Almodóvar, and capture neighborhood life through black‑and‑white photography inspired
    by Diane Arbus.
  travel: Maria Bellido, a careful planner who prefers cultural immersion over flashy tourism, is adventurous yet organized; they have visited historic Old San Juan, explored the colorful streets of Barcelona,
    trekked the rainforest trails of Costa Rica, and dream of a relaxed cruise through the Greek islands, always budgeting for travel insurance and arranging trips around family obligations and work schedules.
  culinary: Maria Bellido, a confident home chef, is passionate about traditional flavors; they regularly prepare arroz con gandules seasoned with sofrito, adobo, and pigeon peas, roll tender pasteles wrapped
    in banana leaves for holidays, experiment with plantain mofongo, and enjoy sourcing fresh cilantro, ají dulce, and ripe avocados at the local farmers market to perfect their family‑style meals.
  core: Maria Bellido, a diligent nurse who worries about every detail, is both meticulous and indulgent; they balance a love for salsa rhythms and garden serenity, splurge occasionally on exotic spices,
    meticulously track finances, and often over‑plan their day while secretly indulging in late‑night knits and bolero playlists.
background:
  cultural: Maria was born to Puerto Rican parents who migrated to Chicago in the 1970s. She grew up in the vibrant Humboldt Park community, where Spanish was spoken at home and traditional celebrations
    such as Nochebuena and San Juan were observed. Her upbringing instilled strong family values, a deep respect for Catholic traditions, and a commitment to communal support. Bilingual and bicultural,
    Maria navigates both the Puerto Rican diaspora and the broader American healthcare system, using her cultural insight to bridge gaps in patient communication and to advocate for health equity. She participates
    in local cultural festivals, supports the Puerto Rican National Day parade, and remains active in a neighborhood church that offers health-related outreach programs.
attributes:
  skills: '[''Clinical Nursing'', ''IV Therapy'', ''Wound Care'', ''Geriatric Care'', ''Chronic Disease Management'', ''Patient Education'', ''Bilingual Spanish-English Communication'', ''Electronic Health
