persona_description: A mobile application developer who is interested in learning about the practice of building software, web apps, or websites for mobile and handheld devices. The individual is looking
  to build mobile applications that use library data or work in a library setting. They are familiar with the process of planning, developing, and launching mobile library applications and have experience
  building digital library applications and setting digital content strategies. They are interested in learning about Jason A. Clark's step-by-step tutorials for building mobile applications and have a
  strong interest in digital ccess and web Services at Montana State University Libraries. They follow Jason on Twitter and regularly check out his code samples and occasional posts on his website and blog.
