persona_description: 'A person interested in gardening, environmental education, and sustainable living. They are likely to be a professor or researcher at Cornell University''s School of Integrative Plant
  Science or the Department of Horticulture. They are passionate about teaching and learning through hands-on experiences and have a strong interest in gardening, ecology, and community development. They
  are likely to be involved in various garden-based learning programs, distance learning opportunities, and research projects. They are also likely to be knowledgeable about the Cornell Botanic Gardens,
  New York Agriculture in the Classroom, and Cornell Farm to School Outreach programs. They are interested in the role of civic ecology practices in communities facing conflict, disaster, and other social,
  economic, and environmental stresses, and the meanings people attribute to these practices. They are also interested in the Department of Horticulture''s individual study, internships, and courses that
  weave in elements of gardening, including Hort 1102: Hands-On Horticulture, HORT/IARD 3200: Experiential Garden-Based Learning in Belize, Hort 4850: Public Garden Management, and HORT 1250: Organic Vegetable
  Gardening. They are also likely to be involved in the Civic Ecology Lab''s projects, including Garden Mosaics, and are interested in the role of civic ecology practices in communities facing conflict,
  disaster, and other social, economic, and environmental stresses.'
