  hobbies: '[''Birdwatching'', ''Scale model building'', ''Reading detective and historical non‑fiction'', ''Woodworking'', ''Playing chess'', ''DIY electronics tinkering'', ''Small‑group board game nights'',
    ''Hiking'', ''Gardening'', ''Fishing'']'
  career_goals: Tyree aims to move from front‑line monitoring to a supervisory role within a casino security department, where he can mentor new staff and develop training curricula that blend his education
    degree with real‑world security practices. He is interested in earning certifications such as Certified Protection Officer (CPO) and a private investigator license to broaden his expertise. Long‑term,
    Tyree envisions becoming a security consultant for multiple gaming venues, advising on technology upgrades, risk management strategies, and employee development programs while maintaining a flexible
    schedule that lets him spend quality time with his family.
