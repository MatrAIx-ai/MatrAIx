  career_goals: Although retired from formal employment, Jayde aims to deepen her impact in the local community. She plans to lead a senior‑center garden program, mentor younger volunteers at the church,
    and document her family’s genealogy for future generations. Additionally, she hopes to organize an annual food‑bank fundraiser and possibly travel to her ancestral hometown in Portugal to reconnect
    with family roots.
