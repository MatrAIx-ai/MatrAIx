  career_goals: Kimberly dreams of becoming a teacher who creates a structured, supportive classroom environment where she can guide and collaborate with students. She also imagines herself as a community
    organizer for children's events, using her reliability and organizational talents to plan activities that bring families together. Ultimately, she hopes to combine her love for learning, leadership,
    and helping others into a career that fosters both order and community spirit.
