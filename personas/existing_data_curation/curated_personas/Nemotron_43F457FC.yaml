personas:
  professional: Kimberly Rock, an aspiring soccer forward in their local youth league, blends their organized, methodical mindset with an outgoing, team‑oriented spirit, making them a natural leader on
    the field and in Girl Scouts projects.
  sports: Kimberly Rock, a member of the Sunnyvale Strikers U‑8 soccer club, practices three times a week, cheers for the Seattle Sounders FC during family game nights, and enjoys weekend visits to the
    local community pool where they swim laps to stay fit.
  arts: Kimberly Rock expresses creativity through weekly contemporary dance classes, loves drawing whimsical characters inspired by Pixar’s Inside Out, and sings along to the Disney soundtrack of Moana
    while doodling to the beats of pop star Taylor Swift.
  travel: Kimberly Rock has explored the magic of Disneyland in Anaheim, trekked through Redwood National Park on a school field trip, and dreams of visiting the Eiffel Tower in Paris, preferring structured
    itineraries that combine guided tours with free‑play time at playgrounds.
  culinary: Kimberly Rock favors homemade pizza topped with pepperoni, bell peppers, and mozzarella, enjoys crafting peanut‑butter‑jelly sandwiches, and delights in the occasional sushi roll made with cooked
    shrimp and avocado, though they often forget to finish their vegetables.
  core: Kimberly Rock is a highly organized yet energetic 8‑year‑old who balances a love for soccer, LEGO building, and Girl Scout leadership with occasional candy cravings and a habit of leaving socks
    on the hallway floor.
background:
  cultural: Kimberly is a White American girl raised in Edmond, Oklahoma, a suburban community in the Heartland. Her family embodies Midwestern values emphasizing close family ties, community involvement,
    school participation, and church activities. She experiences typical regional traditions such as Friday night football, seasonal county fairs, and local outdoor recreation. Growing up in a predominantly
    white neighborhood, she has been exposed to mainstream American cultural norms and the values of hospitality, reliability, and community service common to the Great Plains region.
