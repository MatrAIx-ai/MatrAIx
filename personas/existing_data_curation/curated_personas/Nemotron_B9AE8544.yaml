  hobbies: '["Sketching historic buildings", "Landscape photography", "Woodworking and furniture restoration", "Reading local history", "Book club participation", "Fishing", "Hiking", "Attending arts and
    crafts fairs", "Listening to folk music", "Volunteer work at the historical society"]'
  career_goals: Gregory aims to transition from full‑time labor to a part‑time consulting role focused on historic home preservation, reducing physical strain while leveraging his expertise. He plans to
    launch a small handyman service that emphasizes quality craftsmanship and mentorship of younger workers. In parallel, he intends to take community‑college courses in drawing and photography, eventually
    curating a modest exhibition of his sketches of Wellsville’s historic architecture. He also seeks financial stability for a comfortable retirement and hopes to establish a low‑stress routine that eases
    his chronic worry and stress.
