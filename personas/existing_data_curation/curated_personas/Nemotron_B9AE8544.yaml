personas:
  professional: Gregory Garza, a seasoned construction veteran with over three decades of hands‑on experience in framing, drywall, masonry and heavy‑equipment operation, now channels his curiosity and love
    of historic architecture into part‑time consulting on historic home preservation while they mentor apprentices and prepare to launch a low‑stress handyman service that blends period‑appropriate details
    with modern safety standards.
  sports: Gregory Garza, a devoted fan of the Buffalo Bills and Buffalo Sabres, spends their weekends fishing on the Genesee River, joins a local senior hiking group for occasional treks along the Allegany
    Trail, and participates in the annual Genesee River Anglers Club tournament, preferring low‑impact activities that complement their love of the outdoors.
  arts: Gregory Garza, an avid sketcher of Wellsville’s historic facades and a lover of folk music ranging from Bob Dylan to Odetta, regularly attends the Allegany County Arts and Crafts Fair, curates a
    modest collection of photographs inspired by Ansel Adams, and discusses literary works at their monthly book club, finding solace in the creative narratives of John Ruskin and the visual storytelling
    of Andrew Wyeth.
  travel: Gregory Garza, who favors meticulously planned, low‑key getaways, often explores nearby destinations such as the Finger Lakes, Lake Placid, and the Hudson Valley for photography excursions, dreams
    of a guided tour through Charleston’s historic district, and balances their wanderlust with a modest budget and the occasional visit to a family reunion in upstate New York.
  culinary: Gregory Garza, an intermediate home cook, delights in preparing pan‑seared trout with fresh rosemary and lemon harvested from their garden, hearty chicken and wild mushroom stew, and classic
    New York apple pie with a flaky crust, while occasionally treating themselves to a slice of blackberry cobbler after a long day of sketching.
  core: Gregory Garza blends a meticulous craftsmanship mindset with a solitary, nature‑infused creative spirit, habitually worrying about details yet finding peace in sketching historic architecture, fishing,
    and modest folk tunes.
background:
  cultural: Gregory’s cultural background reflects a blend of Midwestern American working‑class values and his family's Hispanic heritage. Raised in the small town of Wellsville, NY, he grew up in a predominantly
    Anglo‑American environment where hard work, self‑reliance and community solidarity were emphasized. At home, his parents, originally from Mexico, preserved elements of their culture, such as Mexican
    cuisine, occasional Spanish phrases, and Catholic traditions. This dual cultural exposure has given Gregory a pragmatic outlook tempered by an appreciation for storytelling, folk art, and the preservation
    of local history. He identifies culturally as white American but remains connected to his Hispanic roots through family gatherings and community festivals.
attributes:
  skills: '["Framing", "Drywall installation", "Masonry", "Heavy equipment operation", "Blueprint interpretation", "Building code compliance", "Safety training", "Historic home restoration", "Sketching
