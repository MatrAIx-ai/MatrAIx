  career_goals: Jesus aims for a practical, stable career that builds on his strengths. He plans to graduate high school with a focus on vocational training in automotive technology, earn a certification
    as a mechanic, and eventually open his own repair shop. At the same time, he sees himself contributing to his family's Mexican culinary tradition by helping run a family‑owned taquería. His competitive
    streak drives him to seek opportunities in school robotics clubs or auto‑shop contests, and his cautious nature leads him to set clear academic milestones to ensure a reliable future.
