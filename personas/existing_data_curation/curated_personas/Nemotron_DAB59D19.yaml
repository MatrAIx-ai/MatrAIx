  career_goals: Lisa aspires to become a senior program manager overseeing cross‑functional initiatives with measurable social impact, such as community health‑tech or STEM education programs. She plans
    to obtain PMP and PMI‑ACP certifications, deepen her expertise in agile scaling frameworks like SAFe, and integrate well‑being practices into project culture. Her long‑term ambition is to be recognized
    as a leader who cultivates collaborative, stress‑aware environments, eventually leading a department or founding a consultancy focused on compassionate project management. She also aims to speak at
    regional conferences on empathy‑driven leadership, improve her personal organization skills to reduce anxiety, and serve as a role model for balanced work‑life integration for other working mothers.
