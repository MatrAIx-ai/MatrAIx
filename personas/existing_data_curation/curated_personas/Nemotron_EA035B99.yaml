  hobbies: '[''Reading historical fiction'', ''Gardening (vegetables and native flowers)'', ''Hiking local trails'', ''Cooking and baking'', ''Knitting and crocheting'', ''Nature photography'', ''Small‑group
    book club'', ''Volunteering at community garden'', ''Attending county fairs'', ''DIY home projects'']'
  career_goals: Katie aims to move from a sales associate role to a store manager position within the next two years, seeking opportunities that emphasize employee development and community engagement.
    She plans to obtain a retail management certification and deepen her knowledge of digital merchandising and e‑commerce integration to modernize a small‑town shop. Long‑term, she dreams of opening her
    own boutique that highlights locally sourced products and offers a welcoming space for the Dickeyville community, while also improving her organizational skills to better meet deadlines and inventory
    targets.
