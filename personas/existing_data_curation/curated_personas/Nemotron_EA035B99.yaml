personas:
  professional: Katie Salta, a 33‑year‑old retail specialist with a knack for visual merchandising, POS mastery and spontaneous problem‑solving, channels their curiosity‑practical blend into building customer
    rapport and fostering a harmonious store atmosphere while aiming for a manager role.
  sports: Katie Salta, a 33‑year‑old who finds solitude on the Mississippi River bluffs, regularly hikes with the River Bluff Hiking Club, tracks casual runs, and avidly follows the Milwaukee Bucks, Green
    Bay Packers, and Milwaukee Brewers for a dose of community spirit.
  arts: Katie Salta, an avid reader of historical fiction, captures the changing landscape through nature photography inspired by Ansel Adams, knits scarves while listening to Norah Jones, and finds artistic
    resonance in Monet’s water lilies and the storytelling of Hilary Mantel.
  travel: Katie Salta, preferring low‑key getaways, spends weekends exploring nearby state parks like Devil’s Lake, has visited Bath, England for its historic charm, dreams of trekking the Scottish Highlands
    and plans a future solo trip to New Zealand’s South Island to photograph untouched coastlines.
  culinary: Katie Salta, a proficient home cook who melds garden‑grown tomatoes, basil, and herbs into rustic tomato soup and herb‑roasted chicken, bakes comforting banana nut bread and contributes savory
    pies to potlucks, and delights in pairing meals with a squeeze of fresh lemon and locally sourced honey.
  core: Katie Salta, a solitary‑spirit retailer who blends practical curiosity with spontaneous kindness, tending gardens, books, and budget sheets while quietly chasing community harmony.
background:
  cultural: Katie grew up in a white, Midwestern family with German‑Scandinavian roots in the agricultural setting of Grant County, Wisconsin. The community’s emphasis on modesty, hard work, and neighborly
    support shaped her practical worldview. Local traditions such as the county fair, cheese‑curd festivals, and church potlucks reinforced a sense of collective harmony and self‑reliance. Living in the
    small village of Dickeyville fostered close‑knit social bonds, a love for nature, and a deep appreciation for community‑centered values, all of which continue to influence her personal and professional
    life.
attributes:
  skills: '[''Customer service'', ''Sales and upselling'', ''Visual merchandising'', ''Inventory management'', ''POS operation (Square, Lightspeed)'', ''Cash handling'', ''Basic bookkeeping'', ''Conflict
