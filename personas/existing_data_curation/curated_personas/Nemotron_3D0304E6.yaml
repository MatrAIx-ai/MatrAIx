personas:
  professional: Daniel Mellott is a seasoned electrical and electronics engineer specializing in power electronics, embedded systems, and industrial automation, who excels at PCB design with Altium, firmware
    development in C/C++, and PLC programming, and applies lean principles to streamline projects while communicating clearly in small focused teams, assertively championing design decisions yet remaining
    cooperative, and is pursuing a Professional Engineer license to lead renewable‑energy design teams and mentor junior engineers.
  sports: Daniel Mellott enjoys outdoor recreation that blends relaxation and light competition, spending early mornings fishing on the Ohio River as part of the Ohio River Anglers Club, following the Cincinnati
    Bengals and Reds for NFL and MLB excitement, hiking local trails with their wife on weekends, and occasionally joining a community sled‑ding league in winter, while maintaining basic fitness through
    at‑home calisthenics.
  arts: 'Daniel Mellott engages with the arts by devouring classic sci‑fi novels by Isaac Asimov and Philip K. Dick, listening to Pink Floyd and Rush, participating in a monthly board‑gaming group that
    tackles strategic titles like Terraforming Mars and Scythe, attending Cincinnati Symphony Orchestra performances, and watching classic films such as Blade Runner and 2001: A Space Odyssey, which often
    inspire their hobby projects.'
  travel: Daniel Mellott prefers purposeful travel that balances work and leisure, attending industry conferences like IEEE PES in Denver, taking weekend trips to Asheville, Nashville, and the Great Smoky
    Mountains, dreaming of a Pacific Coast road trip to experience coastal wind farms, and having already toured Denmark’s offshore wind farms, all while planning meticulously yet leaving room for spontaneous
    detours.
  culinary: Daniel Mellott enjoys cooking practical, flavor‑rich meals such as grilled ribeye steaks and smoked salmon, often using a custom Arduino‑controlled temperature sensor to achieve perfect doneness,
    favors Cincinnati chili over spaghetti with cornbread as a comfort dish, occasionally bakes sourdough bread while listening to classic rock, and experiments with sous‑vide cooking for tender vegetables
    using precise temperature control.
  core: Daniel Mellott is a curious, pragmatic engineer who balances meticulous project leadership with solitary tinkering, strategic board games, and weekend fishing, all while they manage a disciplined
    yet occasionally impulsive financial and health plan.
background:
  cultural: Daniel grew up in the Midwestern United States, rooted in a white, predominantly German‑Irish family tradition that values hard work, modesty, and community involvement. Living in Clermont County,
    Ohio, he embraces the region's blend of rural sensibility and small‑town camaraderie, which reinforces his practical outlook and preference for close‑knit social circles. His upbringing emphasized reliability,
    self‑reliance, and a balanced respect for both tradition and progress, shaping his pragmatic yet curious approach to both his professional and personal life.
attributes:
  skills: '["Circuit design", "PCB layout (Altium Designer)", "Embedded firmware development (C/C++)", "Power electronics", "PLC programming (Allen-Bradley, Siemens)", "Industrial automation", "MATLAB modeling
    and simulation", "AutoCAD Electrical schematic design", "Troubleshooting and diagnostic analysis", "Project documentation and technical writing", "Lean process improvement", "Mentorship of junior engineers"]'
  hobbies: '["Arduino hobby projects", "Raspberry Pi home automation", "Reading (science fiction and technical literature)", "Fishing", "Woodworking", "Hiking", "Strategic board games", "STEM mentorship
    at community center"]'
  career_goals: Looking ahead, Daniel aims to obtain his Professional Engineer (PE) license and transition into a senior engineering role where he can lead design projects in renewable energy and smart
    grid technologies. He aspires to manage a small team of engineers, applying his organized yet flexible approach to drive innovative yet reliable solutions. Over the next five years, he plans to spearhead
    the development of energy‑efficient power conversion systems for local manufacturers, positioning himself as a bridge between practical engineering execution and emerging sustainable technologies. He
    also hopes to mentor the next generation of engineers and eventually explore consulting opportunities that leverage his expertise in power electronics and industrial automation.
