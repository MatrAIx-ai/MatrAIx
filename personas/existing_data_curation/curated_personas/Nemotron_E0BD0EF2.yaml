  hobbies: '[ ''Watercolor painting'', ''Ceramic art'', ''Reading magical realism literature'', ''Visiting art exhibitions and museums'', ''Yoga and meditation'', ''Gardening native desert plants and herbs'',
    ''Mexican cooking and recipe experimentation'', ''Volunteering at cultural institutions'', ''Genealogy research'' ]'
  career_goals: Although retired from formal employment, Leticia aims to deepen her impact on the community by establishing a mentorship program that pairs senior artists with under‑privileged youth to
    explore visual arts and cultural heritage. She plans to complete an online certificate in museum studies to strengthen her curatorial skills and eventually curate a traveling exhibition that showcases
    Mexican‑American artists from the Southwest. Leticia also hopes to author a memoir blending family stories, culinary traditions, and reflections on her Mexican heritage, while leading a fundraising
    campaign to expand the senior center's arts programming in Tucson.
