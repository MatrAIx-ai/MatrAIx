  career_goals: Although retired, Monica wishes to continue expanding her personal legacy. She plans to write a memoir that weaves together family history, local Haverhill anecdotes, and reflections on
    art and community. She also hopes to mentor younger volunteers at the senior center, develop a quarterly intergenerational art salon at her home, and deepen her genealogy research using digital archives.
    Maintaining mental sharpness and health, she aims to learn digital photography to document her garden and community events.
