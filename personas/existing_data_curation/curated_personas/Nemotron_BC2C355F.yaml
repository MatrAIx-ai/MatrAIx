  career_goals: Although retired, John aims to remain an independent and engaged elder in Winsted. He aspires to keep his mind sharp by learning more about digital technology and documenting his family's
    genealogy in a bound memoir. He wants to mentor younger volunteers at the local senior center and the historic preservation society, sharing his practical skills and community knowledge. John hopes
    to sustain his physical health through regular walks on the Litchfield trails and by tending his garden, ensuring he can continue to host family gatherings and celebrate milestones with his wife. He
    also harbors a quiet ambition to contribute a chapter on local history to the town library’s archive, combining his curiosity with his love for established traditions.
