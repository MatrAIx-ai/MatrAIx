persona_description: A pre-service teacher who is interested in the NWT philosophy of education, Aboriginal education, teacher role, lesson planning, classroom management, and peer teaching. They are eager
  to learn about the role of Aboriginal perspectives in course delivery and the importance of appropriate assessment, evaluation, and reporting procedures. They are passionate about learning about unit
  and year planning, using Aboriginal content and resources, and experiencing peer teaching. They are also interested in learning about the operation of equipment commonly used in classrooms and would like
  to gain practical skills in planning and practising the teaching of Aboriginal content.
