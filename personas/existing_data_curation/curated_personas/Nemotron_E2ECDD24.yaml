  career_goals: Robert aims to progress from a first‑line supervisor to store manager within the next two years, eventually targeting a district or regional management role. He is interested in earning
    an MBA or a certification in retail analytics to strengthen his strategic capabilities. His long‑term ambition is to shape retail operations at a corporate level, driving the adoption of data‑centered
    decision processes and innovative customer‑experience initiatives. He also hopes to mentor emerging retail leaders and, eventually, launch his own boutique retail concept that blends technology with
    personalized service, while preserving a flexible work‑life balance for his family.
