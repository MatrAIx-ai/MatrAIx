personas:
  professional: Robert New, a first‑line retail supervisor at a busy Columbus department store, blends his STEM‑grounded analytical savvy with hands‑on leadership, using Excel and basic SQL to turn sales
    data into practical floor‑plan tweaks while they keep their team motivated yet occasionally let the weekly schedule turn into a scribbled mess on a whiteboard.
  sports: Robert New dominates the local Grove City basketball league and joins weekly pickup soccer games, cheering for the Cleveland Cavaliers in the NBA and the Columbus Crew in MLS, while they view
    fitness as a social commitment rather than a strict regime, occasionally skipping a workout after a late night at a craft brewery.
  arts: Robert New is a regular at Columbus Museum of Art openings and enjoys live shows by indie folk artist Brandi Carlile and classic rock legend Bruce Springsteen, often pairing a night at the theater
    with a craft brew, reflecting their belief that cultural experiences are best shared with friends.
  travel: Robert New prefers weekend road trips to nearby Hocking Hills State Park and two‑day getaways to Chicago’s food scene, while dreaming of a summer drive through the Appalachian Trail, balancing
    a love for spontaneous adventure with the practical need to keep travel costs within their family budget and usually planning itineraries only a day ahead.
  culinary: Robert New is a fan of Ohio‑style pizza, smoked BBQ ribs, and craft beers like BrewDog’s Punk IPA, moderately confident in the kitchen where they experiment with smart‑home sous‑vide gadgets
    to perfect a homestyle chicken pot pie, yet they often order takeout on busy weeknights, citing a habit of putting family time over meal prep.
  core: Robert New is a sociable Midwestern retail leader who mixes data‑driven curiosity with a laid‑back, sometimes disorganized charm, juggling spontaneous brewery visits, DIY home projects, and a burgeoning
    ambition to modernize store operations while occasionally forgetting to file expense reports on time.
background:
  cultural: Robert grew up in the Midwest, shaped by the values of small‑town Ohio—hard work, community involvement, and modest practicality. His family traditions include regular church gatherings, seasonal
    family barbecues, and a strong emphasis on education and self‑reliance. Living in Grove City, a suburb of Columbus, he blends a Midwestern sensibility with exposure to a diverse urban culture, adopting
    a friendly, approachable demeanor while maintaining a pragmatic outlook on life and work.
