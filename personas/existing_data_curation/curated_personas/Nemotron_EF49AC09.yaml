personas:
  professional: Heather Dyer, an aspiring junior coder who blends watercolor sketches with simple Python scripts to animate her drawings, channels her curiosity and outgoing nature into collaborative school
    tech clubs, even if their laid‑back approach sometimes leaves projects half‑finished, and they often find themselves day‑dreaming during lessons.
  sports: Heather Dyer kicks the ball for the Midtown Juniors Soccer Club and spends Saturday mornings dribbling at the community park, while cheering for the local high school basketball team the Eagles
    and the national women’s soccer squad, balancing her energetic play with a habit of occasionally forgetting to stretch before games, and they sometimes end up with sore calves.
  arts: Heather Dyer spends afternoons sketching in her spiral‑bound notebook and experimenting with watercolors, drawing inspiration from the animated films of Studio Ghibli and the graphic novel series
    Amulet, while also admiring the bold street art of Banksy and the dreamy brushwork of Claude Monet, often sharing her creations at the local art workshop they help run.
  travel: Heather Dyer loves spontaneous weekend day trips to the nearby State Forest for treasure‑hunt hikes, has explored the Discovery Museum’s interactive exhibits, and dreams of traveling to the Smithsonian
    National Air and Space Museum in Washington, D.C., preferring flexible itineraries over rigid schedules, and they always pack a sketchbook for inspiration.
  culinary: Heather Dyer, a budding kitchen experimenter, delights in making rainbow fruit smoothies with strawberries, blueberries, and kiwi, whipping up cheesy garlic pizza with fresh mozzarella, and
    occasionally sneaking a spoonful of Nutella on toast, though they often leave watercolor stains on the kitchen counter.
  core: Heather Dyer, a curious 12‑year‑old who blends art, code, and soccer into a whirlwind of creative energy, often misplaces their sketchbooks and allowance money but never loses enthusiasm for new
    ideas, and they always find a way to start something new.
background:
  cultural: Heather comes from a white, middle‑class family with deep New England roots, including Irish‑American and Italian‑American ancestry, and she was raised in Bridgeport, Connecticut. Her parents
    value education, community involvement, and the arts, often taking her to local theater productions and cultural festivals that reflect the city’s diverse population. This blend of family heritage and
    exposure to a multicultural environment has shaped her open‑minded outlook and appreciation for varied artistic expressions.
