  career_goals: Heather dreams of attending a specialized arts high school where she can blend visual art with technology, eventually pursuing a career as an illustrator or multimedia designer. She also
    hopes to explore environmental advocacy, imagining a future where she can use her creative skills to raise awareness about climate issues through compelling visuals and storytelling. In the short term,
    she is eager to build a portfolio of her artwork and learn more advanced digital tools.
