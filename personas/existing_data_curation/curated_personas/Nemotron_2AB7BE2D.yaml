  hobbies: '[''Watercolor painting'', ''Quilting'', ''Herb gardening'', ''Attending community theater'', ''Visiting art fairs'', ''Listening to bluegrass and gospel music'', ''Cooking Southern cuisine'',
    ''Teaching art to children'', ''Reading historical fiction'']'
  career_goals: While content with her current role, Viola hopes to advance to a lead‑cashier or shift‑supervisor position where she can mentor newer employees and help shape store policies. She plans to
    enroll in a community‑college retail‑management certificate program, and she dreams of eventually opening a small home‑based studio to create and sell her own paintings and handcrafted quilts, blending
    her artistic passions with her retail experience.
