personas:
  professional: Viola Navarro, with over twenty years of retail experience, excels at high‑volume cash handling, POS mastery, and staff mentorship, channeling her calm composure and curiosity into diffusing
    tense customer encounters while subtly improvising store policies as she aspires to a shift‑supervisor role.
  sports: Viola Navarro enjoys leisurely morning walks in the rolling hills of Tennessee, follows the Nashville Predators and Tennessee Titans avidly, participates in the Clarksville Community Running Club’s
    weekly 5K, and approaches fitness with a low‑impact, flexible mindset, favoring yoga stretches over high‑intensity drills.
  arts: Viola Navarro immerses herself in artistic pursuits by painting water‑color landscapes inspired by Monet and O'Keeffe, stitching quilts while humming to Alison Krauss and The Infamous Stringdusters,
    and volunteering to teach elementary‑school art, all of which enrich her sense of community and self‑expression.
  travel: Viola Navarro favors relaxed road trips that blend scenic nature with historic charm, often planning spontaneous weekend getaways to the Great Smoky Mountains, Savannah’s cobblestone streets,
    or the art‑laden alleys of Santa Fe, while budget‑conscious and family‑oriented travel decisions keep her trips grounded.
  culinary: Viola Navarro, an adept home cook, whips up Southern classics like shrimp and grits, fried chicken with buttermilk rub, and heirloom tomato bruschetta spiced with garden‑fresh basil and thyme,
    while listening to bluegrass on her kitchen radio, occasionally over‑seasoning as a quirky habit.
  core: Viola Navarro is a calm, curious retail veteran who blends artistic passions with community spirit, juggling spontaneous creativity and a relaxed approach to life, often forgetting to file receipts
    but never missing a quilting session.
background:
  cultural: Viola grew up in a modest, white Southern family in West Tennessee. Her upbringing was shaped by the traditions of Southern hospitality, church‑centered community life, and a love of regional
    food and music. She identifies with the cultural values of Madison County—pride in local craftsmanship, participation in county fairs, and a strong sense of neighborly support. Though her family roots
    trace back to Anglo‑Saxon and German immigrants who settled the area in the 19th century, she embraces a blended Southern identity that celebrates both the past and the evolving cultural landscape of
    her hometown.
