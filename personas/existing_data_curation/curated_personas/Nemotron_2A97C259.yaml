personas:
  professional: Evelyn Helms, a data‑savvy clinical social worker with a STEM graduate background, merges evidence‑based counseling, GIS mapping of rural service gaps, and trauma‑informed care to design
    community mental‑health initiatives, and they are actively pursuing an LCSW and a public health informatics certification to step into a director role.
  sports: Evelyn Helms hikes weekly with the local Appalachian Trail Club, passionately supports the West Virginia Mountaineers football team and the Pittsburgh Steelers, volunteers as a water‑quality monitor
    during the county’s summer 5K run, and they occasionally join a community yoga circle for flexibility and mindfulness.
  arts: Evelyn Helms curates a vibrant book‑discussion group focused on social‑justice authors like bell hooks and Ta‑Nehisi Coates, attends folk concerts featuring Jason Isbell and spoken‑word performances
    by Andrea Gibson, and they unwind by painting watercolor landscapes of the Blue Ridge mountains.
  travel: Evelyn Helms enjoys weekend road trips to Shenandoah National Park, has explored Asheville’s farm‑to‑table culinary scene, spent a lively weekend in New Orleans during Mardi Gras, and they dream
    of trekking the Scottish Highlands to combine their love of hiking with cultural immersion, all while balancing a modest travel budget and family commitments.
  culinary: Evelyn Helms prefers farm‑to‑table cooking, often preparing heirloom tomato gazpacho, roasted beet and goat cheese salads, and slow‑cooked collard greens with smoked ham hocks, and they take
    pride in growing most of the vegetables in their backyard garden, though they occasionally experiment with ambitious fermentation projects that can go awry.
  core: Evelyn Helms is a structured, data‑driven community advocate with a green thumb, a habit of buying too many seeds, and an unstoppable enthusiasm for hiking, yoga, and social‑justice literature.
background:
  cultural: Evelyn was raised in Harrodsburg, a small town in the heart of Kentucky’s Bluegrass region, and identifies with the values of Appalachian and Southern rural culture—family solidarity, hospitality,
    and a strong sense of community responsibility. Her upbringing emphasized church involvement, local traditions, and a practical, self‑reliant mindset, which mesh with her STEM education to give her
    a unique perspective on integrating scientific approaches with community‑based social services.
attributes:
  skills: '[''evidence‑based counseling'', ''case management'', ''crisis intervention'', ''program development'', ''community outreach'', ''data analysis (SPSS, R)'', ''GIS mapping'', ''grant writing'',
    ''trauma‑informed care'', ''interdisciplinary collaboration'']'
  hobbies: '[''hiking'', ''gardening'', ''volunteering at county fair'', ''book‑discussion group'', ''yoga'', ''farm‑to‑table cooking'', ''citizen‑science water monitoring'']'
  career_goals: Evelyn aims to transition into a leadership role within a regional nonprofit or government agency, such as Director of Community Mental Health Services, where she can design and implement
    data‑driven programs for substance‑use prevention and mental‑health support in Appalachia. She plans to obtain her Clinical Social Work license (LCSW) and a certification in public health informatics,
    and ultimately to influence state policy on rural mental‑health funding through advocacy and research.
