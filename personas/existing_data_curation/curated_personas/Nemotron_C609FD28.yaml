personas:
  professional: Juan Negron is a freelance home‑repair specialist who leverages their improvisational carpentry, plumbing, and electrical troubleshooting skills to serve Brooklyn tenants, while simultaneously
    nurturing a side venture that functions as a pop‑up gallery and community workshop, reflecting their curiosity for art and preference for a flexible, unstructured schedule.
  sports: Juan Negron follows the Brooklyn Nets and New York Yankees avidly, plays pickup basketball at a local community center on Saturday mornings, and maintains a modest fitness routine of weekend bike
    rides along the waterfront, preferring relaxed, low‑pressure exercise over regimented training.
  arts: Juan Negron curates weekly photo walks capturing murals inspired by artists such as Banksy and Shepard Fairey, collects vinyl records from Celia Cruz, John Coltrane, and Arcade Fire, and occasionally
    strums guitar to the tunes of Rubén Blades and Jeff Buckley, shaping a personal aesthetic that blends urban grit with melodic nostalgia.
  travel: Juan Negron prefers spontaneous, budget‑friendly weekend getaways, having explored the street‑art corridors of Berlin, the historic plazas of Cartagena, and the coastal towns of Nova Scotia, while
    always returning to Brooklyn to document the evolving murals of their neighborhood.
  culinary: Juan Negron experiments in the kitchen with island‑inspired fusion, blending a heritage rice‑and‑bean dish seasoned with sofrito, achiote, and plantain chips into a ramen broth, while also mastering
    slow‑cooked pork shoulder with a citrus‑garlic spice rub and crisp tostones, reflecting a love for bold flavors and improvisational cooking.
  core: Juan Negron is a laid‑back Brooklyn fixer‑upper with a camera always slung over their shoulder, a penchant for late‑night vinyl digging, and a habit of misplacing tools in the fridge.
background:
  cultural: Juan grew up in a close‑knit Puerto Rican family in Brooklyn's Bushwick area, where the rhythms of salsa, plena, and bomba intertwined with the city's hip‑hop beats. Bilingual in Spanish and
    English, he navigates both cultures seamlessly, celebrating holidays like Nochebuena with traditional foods and sharing stories of his grandparents' migration from the island. The vibrant Latino street
    festivals, community murals, and neighborhood bodegas have shaped his sense of identity, fostering a deep appreciation for cultural preservation while also embracing the diverse, artistic energy of
    New York City. His upbringing instilled values of community solidarity, storytelling, and a love for food and music that continue to influence his daily life.
