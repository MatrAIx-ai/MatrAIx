  career_goals: Juan aims to combine his practical skills and passion for art by establishing a flexible, community‑focused venture. He wants to provide reliable home‑repair services on a freelance basis,
    and gradually develop a modest pop‑up gallery or workshop space where he can host art‑related events, teach cooking classes, and mentor local youth. He hopes to achieve financial stability without sacrificing
    his love for creativity, and to deepen his involvement in Brooklyn's Puerto Rican cultural scene while maintaining a relaxed, self‑directed work schedule.
