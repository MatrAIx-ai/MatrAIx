persona_description: A mathematician who specializes in the Koch House System, a variant of the Placidus system, which is a method used to calculate the position of planets and other celestial bodies on
  the ecliptic. The Koch system is a variant of Alcabitius, and it calculates the position of planets and other celestial bodies by dividing the time from the chart's MC to its culmination into three parts
  and taking the ascendants for these times as the house cusps. The Koch system is particularly useful for calculating the position of planets in polar latitudes, as it does not fail in these areas. The
  Koch system is a recent development and was not published until 1971.
