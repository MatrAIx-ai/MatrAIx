personas:
  professional: Sammy Kelly, a retired systems engineer turned community technologist, blends data‑science expertise, Python programming, and hands‑on hardware tinkering with a warm, sociable demeanor to
    lead senior‑center STEM workshops, mentor high‑school students, and design low‑cost health‑tracking apps, even though their relaxed planning sometimes leads to missed deadlines.
  sports: Sammy Kelly stays fit by attending weekly Tai chi sessions, playing pickleball with neighbors at the community recreation center, and cheering on the Chicago Cubs during baseball season, embodying
    a relaxed yet social approach to exercise.
  arts: Sammy Kelly weaves a love of jazz into daily life by singing classic standards by Ella Fitzgerald and Louis Armstrong in the local choir, captures everyday moments with a vintage Leica inspired
    by Henri Cartier‑Bresson, and immerses themselves in science‑fiction novels by Isaac Asimov and Octavia Butler, often quoting favorite lines during community gatherings.
  travel: Sammy Kelly prefers relaxed, well‑planned road trips with their spouse, savoring scenic drives along the Blue Ridge Parkway, visiting historic civil‑rights landmarks such as Selma and Charleston,
    and winding down with stays at cozy B&Bs, while occasionally joining group tours to European cities like Lisbon for vibrant street art and café culture.
  culinary: Sammy Kelly enjoys cooking hearty, garden‑fresh meals such as roasted vegetable quinoa bowls with heirloom tomatoes, basil, and feta, whips up a crowd‑pleasing gumbo for potluck nights, and
    indulges in weekend brunches featuring homemade banana bread and fresh espresso, reflecting a competent but occasionally experimental home chef.
  core: Sammy Kelly is a relentlessly curious, socially vibrant retiree who flips between meticulous tinkering with Arduino projects and forgetful misplacements of their keys, balancing a heart of community
    service with a tendency toward anxious overthinking.
background:
  cultural: Sammy grew up in the Washington, D.C. metro area as part of a close‑knit African‑American family that emphasized education, community service, and cultural pride. Born during the civil‑rights
    era, he was inspired by black scientists and engineers who broke barriers, which motivated his pursuit of a STEM graduate degree. His upbringing blended Southern culinary traditions—soul food cooked
    with fresh produce from local gardens—with the cosmopolitan influences of Montgomery County’s diverse neighborhoods. Active in his church’s outreach programs and the local NAACP chapter, Sammy remains
    deeply connected to the Black heritage of storytelling, music, and collective resilience. He celebrates Juneteenth, participates in African diaspora festivals, and draws strength from intergenerational
    ties that shape his values of cooperation, harmony, and social responsibility.
