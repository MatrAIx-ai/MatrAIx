  hobbies: '[''Game nights'', ''Potluck dinners'', ''Arduino tinkering'', ''Renewable‑energy garden projects'', ''Science‑fiction reading'', ''African‑American literature'', ''Street photography'', ''Jazz
    choir'', ''Community gardening'', ''Tai chi'', ''Museum volunteering'']'
  career_goals: Sammy’s primary ambition is to channel his technical background into community service. He aims to expand the senior‑center’s STEM mentorship program, develop a low‑cost mobile app that
    helps older adults track medication and appointments, and co‑author a series of accessible guides on basic data literacy for local high‑school students. He also hopes to travel with his wife to visit
    historically significant sites in African‑American history, while continuing to attend therapy groups that support his emotional well‑being. Ultimately, he wants to leave a legacy of empowerment—both
    by nurturing the next generation of engineers and by fostering a supportive, harmonious environment within his neighborhood.
