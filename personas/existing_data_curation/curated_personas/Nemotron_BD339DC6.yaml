  career_goals: Timothy aims to advance to senior leadership within the construction industry, targeting roles such as Director of Construction or Vice President of Development at a regional or national
    firm. He plans to obtain professional certifications—PMP, CCM, and LEED AP—to deepen his expertise in project delivery and sustainable building. Over the next five years, he envisions leading large‑scale
    mixed‑use or civic projects that showcase innovative design and green technology, while mentoring the next generation of tradespeople. Long‑term, he aspires to launch his own consulting boutique focused
    on sustainable construction and community‑focused redevelopment in the Baltimore area, positioning himself as a catalyst for revitalizing historic neighborhoods with a blend of functionality and artistic
    flair.
