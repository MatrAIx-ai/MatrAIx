personas:
  professional: Abigail Jolly, a seasoned Class A CDL driver with a keen eye for emerging fleet tech, blends meticulous route planning and DOT compliance with a compassionate, active‑listening style that
    de‑escalates stressful deliveries, positioning them to transition into senior driver‑trainer and eco‑friendly logistics coordination.
  sports: Abigail Jolly stays active by tackling Cascade foothill trails with the Cascade Trail Association, follows the Portland Timbers and Trail Blazers avidly, joins a seasonal community softball league
    in the summer, and practices yoga three times a week to maintain flexibility and manage anxiety.
  arts: Abigail Jolly indulges in mystery novels by Agatha Christie and Tana French, captures Oregon vistas in the style of Ansel Adams with a DSLR, knits scarves to the soundtrack of Sufjan Stevens, and
    occasionally pens reflective journal entries that echo the lyrical mood of Claude Monet’s water lilies.
  travel: Abigail Jolly prefers meticulously planned road trips that blend waterfall hikes in Crater Lake and Redwood forests with spontaneous photo stops, dreams of exploring Banff’s turquoise lakes and
    New Zealand’s South Island, but balances these ambitions against family commitments and a modest travel budget.
  culinary: Abigail Jolly, an enthusiastic home cook, whips up herb‑roasted salmon seasoned with sage and rosemary, wild mushroom risotto with pine nuts, and lavender‑infused shortbread for community potlucks,
    delighting in the fresh herbs and native Oregon hazelnuts they grow in their garden.
  core: Abigail Jolly balances a relentless curiosity for sustainable logistics with a habit of over‑packing hiking gear, channels intense anxiety into yoga and journaling, and blends community spirit with
    a stubborn reluctance to delegate, making them a dependable yet occasionally frazzled pillar of their hometown.
background:
  cultural: Abigail comes from a multi‑generational white American family with roots in the Pacific Northwest, tracing ancestry to German and Irish immigrants who settled in Oregon during the early 1900s.
    Raised in a close‑knit, small‑town community, she values self‑reliance, hard work, and a deep respect for the natural environment. Her upbringing includes regular participation in church gatherings,
    community festivals, and seasonal traditions such as Thanksgiving potlucks and Fourth of July parades. These cultural influences have shaped her cooperative spirit, appreciation for local heritage,
    and commitment to serving her neighbors.
