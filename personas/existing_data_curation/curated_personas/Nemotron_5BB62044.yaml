personas:
  professional: Gerardo Diaz, a 76‑year‑old community handyman and volunteer, leverages his practical home‑repair skills, bilingual fluency, and meticulous budgeting to organize neighborhood block parties,
    teach cooking and salsa at senior centers, and mediate disputes with a blend of reliable structure and assertive compassion, all while managing occasional bouts of anxiety about meeting expectations.
  sports: Gerardo Diaz avidly follows the New York Yankees, watches each game on television with his grandchildren, regularly attends the local senior baseball league's charity matches, and participates
    in weekly light‑intensity exercise classes at the community center to keep his joints mobile.
  arts: Gerardo Diaz immerses himself in salsa dancing at community socials, listens to classic bomba and plena recordings by Celia Cruz, Tito Puente, and Ismael Rivera, and never misses his favorite telenovela
    'La Usurpadora', which fuels his love for dramatic storytelling.
  travel: Gerardo Diaz dreams of a modest pilgrimage to the island of his ancestors, having already toured Old San Juan and the Statue of Liberty, he prefers meticulously planned itineraries arranged by
    his children, yet occasionally indulges in spontaneous ferry rides to nearby coastal towns for fresh seafood.
  culinary: Gerardo Diaz expertly prepares arroz con gandules using homemade sofrito, slow‑roasted pernil seasoned with adobo, and crisp tostones garnished with cilantro and tomatoes from his balcony garden,
    though he sometimes overindulges in sugary flan, leading to brief guilt about his sugar intake.
  core: Gerardo Diaz, 76, blends a love for structured routine with vibrant community life, dancing to salsa rhythms, cooking festive meals, and confronting health and financial anxieties with both meticulous
    planning and occasional impulsive indulgence.
background:
  cultural: Gerardo is a second‑generation Puerto Rican who grew up in Brooklyn’s vibrant Spanish‑speaking neighborhoods of Bushwick and East Williamsburg. His upbringing blended Catholic traditions, extended‑family
    values, and the rhythmic sounds of bomba and plena that filled community gatherings. He maintains fluency in both Spanish and English, celebrates Puerto Rican holidays such as Three Kings Day and the
    Nochebuena parranda, and remains active in local cultural organizations that preserve island cuisine, music, and dance for younger generations.
