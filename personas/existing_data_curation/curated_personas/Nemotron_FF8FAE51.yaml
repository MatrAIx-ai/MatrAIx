  career_goals: Her long-term ambition is to work in a field that values precision, data integrity, and independent work, such as becoming a medical records technician or health information manager. In
    the short term, she aims to graduate high school with honors, earn a scholarship, and pursue a college degree in health information technology or data analytics, where she can apply her systematic mindset
    and high standards.
