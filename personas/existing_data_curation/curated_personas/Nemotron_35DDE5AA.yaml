  career_goals: Although retired, Mun aims to compile and publish a memoir that chronicles his family's migration journey and the evolution of South Asian identity in the American South. He hopes to establish
    a modest scholarship for South Asian high school students in Jefferson County, curate a traveling cultural exhibition that showcases South Asian art alongside local Southern artists at the Birmingham
    Museum of Art, and continue serving as a cultural liaison between senior centers and youth organizations to foster mutual understanding and preserve heritage.
