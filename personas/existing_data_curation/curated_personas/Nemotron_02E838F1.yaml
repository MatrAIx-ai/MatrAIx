personas:
  professional: Michael Brittain, a mental‑health support aide at a rural clinic, employs calm de‑escalation, meticulous vital monitoring, and art‑based interventions to engage patients, and they blend
    their curious appreciation for visual arts and relaxed, cooperative work style with occasional assertive leadership as they pursue a Certified Psychiatric Technician credential.
  sports: Michael Brittain, an avid hiker and weekend angler, roams the Kettle Moraine State Forest trails with the Kettle Moraine Trail Association, supports the Milwaukee Brewers, Milwaukee Bucks, and
    Green Bay Packers with passionate game‑day rituals, and they join a local pick‑up basketball league to stay active during the warmer months.
  arts: Michael Brittain, a self‑taught painter and acoustic‑guitar enthusiast, regularly visits traveling exhibits at the Milwaukee Art Museum featuring Frida Kahlo and Georgia O’Keeffe, draws inspiration
    from folk legends Bob Dylan and Nick Drake, and they volunteer at community arts‑for‑healing workshops where they guide participants through collaborative mural projects.
  travel: Michael Brittain, a road‑trip lover who prefers spontaneous itineraries, has explored the scenic harbors of Door County and the historic streets of Berlin, dreams of trekking Norway’s fjords and
    Iceland’s volcanic landscapes, and they habitually spend summer weekends fishing on Lake Winnebago before retreating to a family cabin in the north woods.
  culinary: Michael Brittain, a competent home cook who favors hearty Midwestern fare, enjoys grilling bratwurst with sauerkraut, pan‑searing Lake Winnebago perch with lemon butter and fresh dill, and they
    often bake rye bread using locally milled whole‑grain flour to share at informal gatherings with friends.
  core: Michael Brittain blends calm, art‑driven mental‑health work with a carefree, occasionally disorganized lifestyle, championing community healing while they secretly hoard vintage guitar picks and
    habitually forget to file tax returns on time.
background:
  cultural: Michael grew up in a close-knit rural community in Fond du Lac County, where Midwestern values of modesty, neighborly cooperation, and a deep connection to the land are prominent. His family
    traces its roots to German and Scandinavian immigrants, shaping holiday traditions that feature shared meals, folk music, and an appreciation for craftsmanship. The local culture’s emphasis on practical
    self-reliance and community support has influenced his collaborative work style and his dedication to fostering accessible mental-health resources for his hometown.
