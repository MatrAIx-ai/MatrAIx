    in mental-health care'']'
  hobbies: '[''Painting'', ''Visiting art exhibits'', ''Hiking in Kettle Moraine'', ''Fishing on Lake Winnebago'', ''Playing acoustic guitar'', ''Reading psychology and philosophy'', ''Woodworking'', ''Listening
    to mental-health podcasts'', ''Volunteering at community art-therapy workshops'']'
  career_goals: Michael aims to advance his qualifications by earning a Certified Psychiatric Technician credential and eventually completing an associate degree in mental-health counseling. He aspires
    to take on a supervisory role in his facility, where he can mentor new aides and champion the integration of art-based therapies. Long-term, he hopes to develop a community outreach program in Brandon
    that provides accessible mental-health education and creative workshops for families and youth.
