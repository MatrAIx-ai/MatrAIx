  career_goals: Jeannette aims to finish her associate’s degree in Business Management or Early Childhood Education at St. Petersburg College within the next two years. She envisions securing a stable full‑time
    role that blends routine with personal interaction—such as a front‑desk administrator at a local non‑profit, a preschool teacher’s aide, or a community center coordinator. In the longer term, she hopes
    to open a modest, family‑run coffee shop that offers a cozy gathering spot for neighbors, allowing her to blend her love for routine, hospitality, and community service while maintaining a flexible
    schedule that respects her need for occasional solitude.
