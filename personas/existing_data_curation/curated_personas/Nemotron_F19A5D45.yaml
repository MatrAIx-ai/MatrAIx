personas:
  professional: Jeannette Anderson, a 19‑year‑old aspiring community‑center coordinator, blends her hands‑on customer‑service experience from a beachside souvenir shop with a practical flair for spreadsheets
    and scheduling, making her the friendly, if occasionally absent‑minded, front‑desk anchor who thrives on routine and personal interaction.
  sports: Jeannette Anderson enjoys sunset beach walks along St. Pete’s shoreline as a daily low‑impact workout, participates in a casual community volleyball league, and faithfully cheers for the Tampa
    Bay Rays, Buccaneers, and Lightning while occasionally joining a weekend running club.
  arts: Jeannette Anderson finds creative solace in crocheting scarves while listening to folk artists such as Bob Dylan, Gillian Welch, and Brandi Carlile, and balances that with reading Jane Austen and
    contemporary romance novels, plus occasional visits to the local community theater to catch productions of classic plays.
  travel: Jeannette Anderson’s travel style blends budget‑friendly road trips to nearby gems like the Florida Keys and Savannah with a yearning to someday explore New Orleans for its music scene, preferring
    spontaneous day‑trip planning over rigid itineraries but always keeping an eye on student‑friendly discounts.
  culinary: Jeannette Anderson’s kitchen revolves around fresh garden tomatoes, herbs, and peppers used in simple herb‑roasted chicken, while their comfort‑food repertoire includes banana bread, chocolate
    chip cookies, and peach pies, and they proudly claim a middling skill level that lets them improvise a new twist on classic recipes at least once a month.
  core: Jeannette Anderson epitomizes the friendly, routine‑loving college student who can lose track of a calendar but never forget to share a warm cookie with a friend, even if they occasionally forget
    to water their own garden.
background:
  cultural: Jeannette comes from a middle‑class White American family with deep roots in the Southeast. Her parents raised her in a suburban neighborhood of Pinellas County, emphasizing community, family
    values, and practicality, often reinforced through regular church attendance and Sunday brunches. Growing up, she participated in local beach festivals, county fairs, and church youth groups, which
    instilled a sense of belonging and a respect for tradition. While she identifies with mainstream Southern‑Florida culture, she also appreciates the diverse influences of the Tampa Bay area, noticing
    a mix of Latin, Caribbean, and other cultural flavors in local cuisine and music. Her upbringing encourages a balanced life centered on routine, kindness, and harmony with others.
