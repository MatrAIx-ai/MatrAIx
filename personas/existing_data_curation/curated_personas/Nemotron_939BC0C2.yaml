  career_goals: She intends to enroll in a community‑college program to earn an associate degree in culinary arts or hospitality management, with a long‑term ambition to launch a home‑based catering business
    that offers modern twists on Dominican cuisine. Additionally, she is exploring roles as a bilingual community health worker or support specialist, leveraging her calm demeanor and cultural knowledge
    to assist local families.
