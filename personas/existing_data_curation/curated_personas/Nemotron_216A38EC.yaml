  career_goals: Christopher aspires to turn his love of technology and community into a career that helps other youth. He hopes to attend a high school with strong STEM and mentorship programs, eventually
    earning a degree in computer science or interactive media. His long-term goal is to design educational games or apps that reflect the experiences of Black teenagers and promote social-emotional learning.
    Parallel to that, he dreams of becoming a youth mentor or community organizer in Orange County, where he can lead after-school programs that combine sports, coding workshops, and creative expression.
    He sees himself as a bridge between tech innovation and grassroots community service.
