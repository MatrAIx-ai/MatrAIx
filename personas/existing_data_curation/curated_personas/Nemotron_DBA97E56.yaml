  career_goals: She dreams of becoming a scientist or engineer who creates inventions that make everyday life easier, inspired by her love of building with blocks and discovering how things work. She also
    imagines helping animals as a wildlife biologist and enjoys the idea of teaching younger children, reflecting her organized and caring nature.
