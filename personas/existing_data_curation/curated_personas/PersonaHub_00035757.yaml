persona_description: A scientist and researcher who specializes in the study of nutrition and its effects on the body, particularly in relation to the development of age-related macular degeneration. She
  has conducted research on the relationship between dietary carbohydrates and the risk of developing early AMD, and has found that a high-glycemic-index diet is a risk factor for AMD. She is interested
  in studying the role of glucose in age-related diseases like AMD and has observed a relationship between high glycemic index diets and the development of AMD. She is cautious in her interpretation of
  the data but believes that further research is critical, as it may ultimately prove helpful in preventing or delaying the onset of such potentially debilitating and costly diseases.
