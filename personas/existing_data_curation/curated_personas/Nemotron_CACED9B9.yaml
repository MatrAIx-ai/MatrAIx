  career_goals: Michael aims to evolve his shuttle service into a community‑focused operation that blends reliable transportation with curated art tours of Oxnard’s murals, galleries, and historic sites.
    He plans to obtain a commercial driver’s license for a larger, wheelchair‑accessible vehicle to better serve seniors and people with disabilities. Michael also aspires to mentor younger drivers, offering
    informal training sessions on safety, customer care, and local cultural knowledge. As he approaches retirement, he hopes to transition to a part‑time driving instructor role at a local adult‑education
    center while maintaining a small fleet that supports local events, festivals, and charitable transportation initiatives.
