  hobbies: '[''Reading (non-fiction, personal finance, local history)'', ''Crossword puzzles'', ''Sudoku'', ''Gardening (vegetables and herbs)'', ''Cooking and baking'', ''Nature walks'', ''Birdwatching'',
    ''Small book club participation'']'
  career_goals: Yvonne aims to advance to a supervisory or assistant manager role within her retail environment, eventually overseeing store operations and staff development. She is also exploring a certification
    in office administration or bookkeeping to transition into a more specialized administrative position, seeking greater responsibility, stable income, and the ability to mentor younger employees. Long‑term,
    she hopes to achieve financial independence and perhaps open a small boutique or thrift shop that reflects her organized and practical sensibilities.
