personas:
  professional: Yvonne Wisotsky is a meticulous retail associate whose cash‑handling precision, Excel‑driven inventory tracking, and disciplined schedule management enable her to resolve customer issues
    with a calm, skeptical eye while quietly positioning herself for a supervisory or assistant‑manager role.
  sports: Yvonne Wisotsky enjoys leisurely birdwatching hikes along the Suwannee River, participates in a local walking club, and faithfully follows the Jacksonville Jaguars and Florida Gators, cheering
    each game while keeping a modest home gym for weekend strength routines.
  arts: Yvonne Wisotsky engages with the arts through a close‑knit book‑club that dissects non‑fiction works, attends folk concerts featuring Bob Dylan and Joan Baez, and admires the realistic paintings
    of Andrew Wyeth, while occasionally volunteering at the Alachua Community Playhouse.
  travel: Yvonne Wisotsky favors well‑planned, low‑key getaways, having explored historic Charleston and Savannah, taken weekend trips to Apalachicola, and dreaming of a cultural pilgrimage to Edinburgh,
    all while balancing a modest travel budget and limited family commitments.
  culinary: Yvonne Wisotsky delights in seasonal meal planning, bakes sourdough bread and lemon‑blueberry muffins, crafts roasted beet and goat cheese salads, and harvests fresh heirloom tomatoes and rosemary
    from her modest garden to enrich every dish.
  core: Yvonne Wisotsky blends disciplined curiosity with a love for solitary efficiency, turning meticulous retail work, budget‑savvy investing, and garden‑to‑table cooking into a quietly competitive path
    toward financial independence.
background:
  cultural: Yvonne grew up in a working‑class, white, Southern family in north‑central Florida, with roots tracing back to English and Irish ancestry. Her upbringing emphasized modesty, hard work, and self‑reliance,
    reinforced by regular attendance at a local Methodist church and community events. The small‑town culture of Lake City, with its close‑knit neighborhoods and appreciation for practicality, has shaped
    her disciplined, achievement‑oriented outlook while her curiosity leads her to explore broader ideas through reading and local history.
attributes:
  skills: '[''Cash handling'', ''POS system operation'', ''Inventory management'', ''Basic accounting'', ''Microsoft Excel'', ''Customer service'', ''Conflict resolution'', ''Staff training'', ''Scheduling
