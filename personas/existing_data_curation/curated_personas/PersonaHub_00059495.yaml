persona_description: A financial manager who is responsible for developing and implementing budgets for a company. They are skilled in preparing and analyzing budgets, and are aware of the challenges and
  benefits of using budgets for financial control. They are also aware of the potential for budget games within the organization and have a plan in place to detect and deter them. They are interested in
  using budgets to evaluate performance, but are also aware of the importance of having a good control system and incentives that reflect the economic capability of the organization. They are also aware
  of the importance of setting a goal that is too tight or too loose, and are skilled in determining the appropriate level of stretch for the budget.
