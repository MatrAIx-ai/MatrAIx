personas:
  professional: Elizabeth Miranda is a seasoned housekeeping expert with decades of experience in meticulous home maintenance, fluent bilingual communication, and a compassionate approach to caring for
    elderly residents and pets, combining their methodical routines and reliable nature to ensure spotless environments while mentoring junior staff.
  sports: Elizabeth Miranda enjoys low‑impact fitness through daily walks around their neighborhood, participates in a local senior walking club, and follows the city’s baseball team, the Riverhawks, while
    favoring the calm of a community yoga class over high‑intensity sports.
  arts: Elizabeth Miranda finds solace in classic bolero recordings by Los Panchos and Agustín Lara, gets lost in beloved romance novels by Danielle Steel, and regularly attends community theater productions
    starring local actors, which together enrich their evenings after knitting sessions.
  travel: Elizabeth Miranda prefers well‑planned, serene getaways, such as a week‑long retreat at a historic seaside village in the Pacific Northwest and a cultural pilgrimage to a centuries‑old cathedral
    town in Spain, always balancing travel costs with their modest retirement savings.
  culinary: Elizabeth Miranda delights in preparing home‑cooked herb‑infused stews, such as a slow‑roasted pork dish seasoned with oregano, cilantro, and mint, alongside fresh corn tortillas and salsa verde,
    showcasing their skill in blending simple ingredients into comforting meals.
  core: Elizabeth Miranda blends disciplined routine with quiet compassion, turning their love of orderly housekeeping, herb gardening, and classic boleros into a life of predictable comfort, occasional
    knitting splurges, and steadfast care for others.
background:
  cultural: Elizabeth is a second‑generation Mexican American who grew up in a close‑knit, Catholic household in East Los Angeles, where family gatherings and community celebrations were central to daily
    life. Her upbringing instilled strong values of respect for elders, hospitality, and the importance of sharing meals—especially dishes like tamales, pozole, and enchiladas that she continues to prepare.
    She celebrates cultural traditions such as Día de los Muertos, Las Posadas, and Mexican Independence Day, often incorporating these customs into the homes she cares for. While she embraces the multicultural
    vibrancy of Los Angeles, she remains deeply connected to her Mexican roots through language, cuisine, and a reverence for familial and religious rituals.
attributes:
  skills: '[''Household cleaning'', ''Laundry and fabric care'', ''Meal preparation (Mexican cuisine)'', ''Home organization'', ''Time management and scheduling'', ''Basic budgeting and expense tracking'',
