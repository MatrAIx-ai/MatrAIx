  hobbies: '[''Herb gardening'', ''Knitting scarves'', ''Listening to Mexican boleros'', ''Reading romance novels'', ''Journaling'', ''Puzzle solving (crosswords)'', ''Traditional Catholic devotional practices'']'
  career_goals: Elizabeth aims to transition into a senior housekeeping role with a reputable family or agency that offers health benefits and a retirement plan, allowing her to secure long‑term financial
    stability for herself and her husband. She also hopes to mentor younger housekeepers, sharing her methodical techniques and compassion‑focused approach. In the longer term, she envisions launching a
    modest, home‑based cleaning service that can generate supplemental income and give her the flexibility to work at her own pace while maintaining the structured routine she values.
