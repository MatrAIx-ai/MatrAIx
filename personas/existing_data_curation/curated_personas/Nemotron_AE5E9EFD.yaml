  career_goals: Christa aims to transition from a freelance manicurist to a boutique salon owner within the next three years, establishing a flagship studio in Marysville that blends high‑end nail services
    with a curated art gallery space. She plans to obtain a full cosmetology license, develop a signature line of eco‑friendly nail polish colors inspired by the Pacific Northwest, and earn recognition
    in regional nail‑art competitions. Long‑term, she envisions expanding her brand to offer mobile services, workshops for aspiring technicians, and an online platform showcasing her designs, securing
    both creative fulfillment and financial independence.
