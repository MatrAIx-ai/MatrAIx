personas:
  professional: Christa Mondragon, a 27‑year‑old freelance manicurist in Marysville, combines meticulous sanitation protocols with a vivid artistic vision, delivering precision manicures while methodically
    managing appointments, inventory, and social‑media marketing as they prepare to launch a boutique salon that doubles as an art gallery.
  sports: Christa Mondragon fuels their love for the outdoors by hiking the Cascades with the North Cascade Hiking Club, practicing Vinyasa yoga three times weekly, and cheering on the Seattle Seahawks
    and Sounders while occasionally joining a local co‑ed soccer league for cardio balance.
  arts: Christa Mondragon channels their curiosity into sketching, painting, and cutting‑edge nail art, drawing inspiration from Yayoi Kusama’s polka‑dot motifs and Dale Chihuly’s glass sculptures, while
    regularly attending Seattle’s First Thursday art walks and curating playlists that feature Tame Impala and Phoebe Bridgers.
  travel: Christa Mondragon plans travel with the same precision they apply to salon logistics, favoring meticulously mapped weekend getaways to the Oregon Coast and Willamette Valley wine farms, while
    dreaming of a future creative retreat in Barcelona to study Mediterranean color palettes despite a modest travel budget.
  culinary: Christa Mondragon enjoys experimenting in the kitchen, skillfully whipping up miso‑glazed salmon with locally sourced Pacific salmon, quinoa‑stuffed bell peppers seasoned with smoked paprika,
    and avocado toast topped with toasted hazelnuts, while pairing meals with craft coffee from Seattle’s local roasters.
  core: Christa Mondragon, a methodical yet creatively restless 27‑year‑old, transforms each manicure into a miniature canvas while obsessively cataloguing nail polish shades, scheduling every hour, and
    dreaming of a boutique art‑salon that balances nature‑inspired eco‑beauty with fierce competition.
background:
  cultural: Christa grew up in Marysville, a close‑knit community in Snohomish County, Washington. Her family background includes both Anglo‑American and Spanish‑European ancestry, reflected in her surname
    Mondragon, though she identifies as white on official documents. She was exposed to a blend of cultural traditions at home, including occasional celebrations of Hispanic heritage. The Pacific Northwest
    setting fostered an appreciation for nature, outdoor activities, and a community‑oriented mindset. Local traditions such as participating in Marysville’s seasonal festivals and supporting neighborhood
    businesses shaped her sense of belonging, while the nearby Seattle metropolitan area provided access to a diverse arts scene that influences her creative pursuits.
