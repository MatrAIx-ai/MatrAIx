  career_goals: Idael dreams of turning her artistic passion into a profession as a multimedia designer or independent visual artist. She hopes to earn a scholarship to study graphic design at a community
    college or university, eventually launching her own online boutique where she sells original artwork and handmade accessories. She also aspires to work on community cultural projects in Juncos, such
    as organizing youth art workshops and curating local mural tours, thereby celebrating and preserving Caribbean artistic heritage.
