personas:
  professional: An aspiring visual storyteller, Idael Ruiz blends curiosity for street murals, graphic‑novel illustration, and guitar songwriting into a self‑driven creative portfolio that they nurture
    between school assignments, often thriving on flexible, unstructured schedules while occasionally juggling deadlines in a delightfully disorganized fashion.
  sports: An enthusiastic soccer forward for the Juncos Youth Soccer Club, Idael Ruiz also roots for the regional baseball team the Hawks and follows the NBA’s Miami Heat, yet they sometimes skip training
    sessions when a new mural project or jam session beckons, balancing athletic involvement with creative passions.
  arts: An eclectic music lover and sketch artist, Idael Ruiz jams to indie rock from Arctic Monkeys, reggaetón hits by Bad Bunny, and salsa classics by Marc Anthony while they draw daily inspiration from
    street‑art provocateur Banksy and graphic‑novel creator Jeff Smith, channeling those influences into spontaneous guitar riffs and intricate character doodles.
  travel: An adventure‑seeking teen, Idael Ruiz spends weekend getaways snorkeling around Culebra, hiking in the rainforest of El Yunque, and dreams of a future backpacking trek through Buenos Aires, and
    they prefer spur‑of‑the‑moment travel plans over rigid itineraries despite a modest allowance.
  culinary: A budding home chef, Idael Ruiz reimagines classic mofongo with avocado crema and roasted corn, crafts sweet plantain brownies spiced with cinnamon, and whips up a signature salsa blending adobo,
    chipotle, and lime, and they sometimes burn toast due to their hurried, disorganized kitchen routine.
  core: Idael Ruiz is a creatively restless fifteen‑year‑old who weaves street art, guitar riffs, and inventive cuisine into a vibrant lifestyle, yet their relaxed, occasionally chaotic approach to deadlines
    and finances fuels both spontaneous brilliance and occasional pandemonium.
background:
  cultural: Idael is a second‑generation Puerto Rican raised in Juncos, where family and community life revolve around a blend of Catholic traditions, Afro‑Caribbean rhythms, and Taíno folklore. She grew
    up hearing bomba and plena at family gatherings, savoring arroz con gandules and mofongo in the kitchen, and participating in the town's fiestas patronales with vibrant parades and colorful murals.
    Bilingualism is a daily reality; she switches seamlessly between Spanish at home and English at school. The island’s emphasis on resilience, close‑knit family ties, and pride in Caribbean heritage deeply
    shape her identity and outlook.
