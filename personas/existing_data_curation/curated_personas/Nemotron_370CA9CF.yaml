personas:
  professional: Patricia Whelan, a budding block architect in her preschool classroom, channels her curiosity and practical mindset into meticulously planning and constructing towering wooden cube structures,
    while they draw on their outgoing energy to foster collaborative play and occasionally assertively direct peers.
  sports: Patricia Whelan, a spirited member of the Neighborhood Totters Toddler Soccer program, energetically chases the bright orange ball each Saturday, while they cheer loudly for the Seattle Mariners
    during family game nights and demonstrate a methodical approach to learning basic dribbling by arranging practice drills in a tidy sequence.
  arts: Patricia Whelan, an eager little performer, sings along to Disney’s Let It Go and the Baby Shark chorus during playtime, while they delight in finger‑painting with bold primary colors and regularly
    request encores of The Wiggles Fruit Salad, reflecting a blend of curiosity for new melodies and a practical penchant for repeating familiar tunes.
  travel: Patricia Whelan, an adventurous road‑trip enthusiast, enjoys family visits to the nearby aquarium and a memorable weekend at the seaside town of Puget Sound, while they thrive on scenic car rides
    with a favorite stuffed otter but can become anxious when departing from the familiar backyard.
  culinary: Patricia Whelan, a budding tiny chef, eagerly helps stir yogurt and mash bananas for breakfast, while they favor cheddar‑filled macaroni, carrot sticks dipped in hummus, and occasional strawberry
    slices, often exhibiting a habit of selectively nibbling only the crunchy bits and refusing broccoli.
  core: Patricia Whelan, a two‑year‑old whirlwind of curiosity and order, builds block towers with methodical precision, hoards jingling coins in a piggy bank, manages itchy eczema flares, dominates toddler
    soccer drills, sings Disney anthems with gusto, and erupts into tears at the slightest surprise, all while never parting with a beloved stuffed rabbit.
background:
  cultural: Patricia is a white American toddler raised in a suburban, middle-class family in Titusville, Florida, on the Space Coast. Her household reflects typical Atlantic-Florida culture, emphasizing
    family, community, and outdoor recreation. She participates in local church Sunday school, celebrates holidays such as Halloween, Thanksgiving, and Independence Day with family gatherings and beach
    picnics, and is regularly exposed to space-exploration themes through nearby Kennedy Space Center programs. The regional culture values friendliness, sociability, and a love for nature, which influence
    her daily life.
