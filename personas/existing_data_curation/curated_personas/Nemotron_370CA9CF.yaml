  career_goals: Even at two years old, Patricia expresses simple aspirations that hint at future ambitions. She enjoys helping friends during play and often says she wants to be a teacher when she grows
    up. Visits to the nearby Kennedy Space Center spark a dream of becoming an astronaut, while her love for caring for stuffed animals suggests an interest in veterinary work. Her organized, reliable nature
    points toward future roles that involve planning and supporting others, such as a kindergarten teacher, community helper, or event coordinator.
