persona_description: A Canadian songwriter and musician who was born in Brantford, Ontario, and spent his early years learning to play guitar and banjo. He later studied painting and served in the Royal
  Canadian Air Force during World War II. After the war, he worked as a surveyor in the wilderness areas of Northern Ontario, Quebec, and Labrador, and later moved to Montreal where he worked as a draftsman
  for the Canadian National Railway and performed in the city's folk music clubs at night. Hemsworth is known for his contributions to the history of Canadian folk music with his enduring classics such
  as "The Wild Goose", "The Blackfly Song", and "The Log Driver's Waltz".
