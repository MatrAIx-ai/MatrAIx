    Financial Literacy Mentor'', ''Toastmasters Membership'', ''Reading African-American Literature and History'']'
  career_goals: Juan aims to achieve Certified Public Accountant (CPA) and Certified Internal Auditor (CIA) designations within the next two years, positioning himself for a senior audit manager role at
    a regional firm. He seeks to lead large, complex audit engagements and develop a niche in forensic and fraud investigations. Long‑term, Juan envisions becoming a chief financial officer for a midsize
    company or launching his own consultancy that specializes in financial services for minority‑owned businesses. He also aspires to mentor emerging professionals and contribute to community financial‑literacy
    programs.
