    "Piano lessons"]'
  career_goals: 'Tonya aspires to combine her love for animals and science, envisioning a future as a veterinarian or wildlife biologist after she finishes school. She is also drawn to roles that directly
    help people, such as a pediatric nurse or elementary school teacher, reflecting her compassionate nature and desire to make a tangible difference. Her ambitions are grounded in practical steps: she
    plans to maintain strong academic performance, join the school science club, volunteer at a local animal shelter, and seek mentorship from professionals in her areas of interest. Ultimately, she hopes
    to contribute to conservation efforts for Florida’s unique ecosystems while serving her community.'
