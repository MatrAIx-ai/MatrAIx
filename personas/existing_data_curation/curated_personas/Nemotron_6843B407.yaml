personas:
  professional: Tonya Rowlins, an aspiring junior scientist and builder, channels their love for adventure novels and animal nonfiction into methodical LEGO constructions, hands‑on science club experiments,
    and beginner Scratch coding projects, reflecting a balance of curiosity and practical problem‑solving.
  sports: Tonya Rowlins treads the soccer fields of the local park with the Suncoast Youth Soccer Club while diving into laps at the community pool, cheering on Orlando City SC as their favorite professional
    team and dreaming of making the varsity team at their middle school, and they insist on a pre‑game ritual of listening to upbeat pop playlists.
  arts: Tonya Rowlins explores creative expression through piano lessons where they practice scales diligently yet love improvising to songs by Billie Eilish, sketch cartoon versions of the jungle animals
    they read about, and attend occasional community theater productions starring local actors like Maya Hawthorne, blending structured learning with spontaneous artistry.
  travel: Tonya Rowlins prefers family road trips that combine nature stops—like a sunrise hike in the Everglades, a day at Walt Disney World, and a weekend at Clearwater Beach—with the excitement of planning
    simple itineraries on a crayon‑drawn map, while they daydream about a future visit to the Great Barrier Reef to see real coral reefs up close.
  culinary: Tonya Rowlins enjoys helping in the garden to harvest fresh strawberries and basil, then whipping up a quick strawberry‑basil smoothie, loves cooking simple spaghetti with meatballs, and proudly
    bakes chocolate chip cookies that sometimes turn a little too crispy because they can’t resist checking the oven before the timer rings.
  core: Tonya Rowlins blends boundless curiosity with down‑to‑earth practicality, turning every LEGO set, science experiment, and piano piece into a structured adventure while occasionally succumbing to
    impulse splurges on stickers and extra screen time.
background:
  cultural: Tonya comes from a Black family that places great emphasis on community, faith, and cultural heritage. Her household regularly attends a local Baptist church, where gospel music, fellowship,
    and service projects are integral parts of life. The family celebrates African‑American traditions such as Juneteenth and Kwanzaa, learning about history, cultural pride, and the values of unity and
    self‑determination. Home meals often feature Southern‑influenced dishes like collard greens, sweet potatoes, and cornbread, and Tonya helps prepare these recipes, connecting her to generational cooking
    practices. She enjoys a mix of contemporary Black music, from hip‑hop to R&B, and participates in school events that showcase African‑American literature and art. Growing up in DeLand, Florida, she
    experiences a multicultural environment, interacting with peers from diverse backgrounds and taking part in community festivals that broaden her perspective while reinforcing her own cultural identity.
