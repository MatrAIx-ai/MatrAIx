    traditional Mexican dishes'']'
  career_goals: Inspired by his curiosity and practical mindset, Alejandro aims to attend a STEM‑focused high school and eventually study civil or mechanical engineering. He hopes to design sustainable
    infrastructure for his community, such as flood‑resistant bridges or renewable‑energy projects. He is motivated to win state‑level robotics or math competitions, believing that competitive success will
    open doors to scholarships and mentorship opportunities.
