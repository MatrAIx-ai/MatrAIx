personas:
  professional: Alejandro Delallana, an aspiring teen coder and DIY engineer, channels curiosity and practicality into building Scratch mini‑games and assembling model rockets, balancing meticulous planning
    with enough flexibility to tinker and experiment, and they proudly share their creations with friends.
  sports: Alejandro Delallana powers through after‑school practices with the San Marcos Youth Soccer Club, idolizes the Dallas Cowboys for their aggressive play, follows the Houston Astros during baseball
    season, and they keep a personal sprint‑time log to maintain a competitive edge.
  arts: Alejandro Delallana devotes weekend evenings to sketching scenes inspired by the sci‑fi graphic novel 'Saga' while blasting the ranchera classics of Vicente Fernández and the modern corridos of
    Los Tigres del Norte, and they eagerly anticipate the local theater’s production of 'El Jarabe Tapatío' during community festivals.
  travel: Alejandro Delallana prefers loosely planned day‑trips to nearby natural spots like the San Marcos River and Edwards Plateau, yet they keep a notebook of route ideas for a future family road‑trip
    to Austin’s music scene and a dream visit to the ancient ruins of Teotihuacan, balancing spontaneity with organized aspirations.
  culinary: Alejandro Delallana, a budding kitchen assistant, expertly rolls small batches of tamales using masa and pork, loves the crisp bite of homemade tortilla chips with fresh guacamole, and they
    experiment with adding chili‑infused olive oil to grilled corn on the cob, showcasing a practical yet adventurous approach to cooking.
  core: Alejandro Delallana is a curious, competitively‑spirited 12‑year‑old who blends practical tinkering with a love for soccer, coding, and regional traditions, and they juggle a meticulous allowance
    plan with a laid‑back approach to health.
background:
  cultural: Alejandro is a Mexican‑American raised in a bilingual household in San Marcos, Texas. His family maintains strong ties to Mexican heritage, celebrating holidays such as Dia de los Muertos and
    enjoying foods like tamales and pozole, while also embracing Texan customs like barbecue and local high‑school football culture. He is raised with values of family solidarity, respect for elders, and
    a blend of Catholic traditions and community involvement, which shape his worldview and everyday interactions.
