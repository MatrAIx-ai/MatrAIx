persona_description: A researcher at the University of Helsinki who specializes in the study of ice streams and their interaction with the ocean. The persona is particularly interested in the Younger Dryas
  period and the role of the Jakobshavn Isbræ ice stream in the Greenland Ice Sheet. The persona is also knowledgeable about the study of diatoms and their use in reconstructing past sea surface conditions.
  The persona is interested in understanding the complex interactions between the ocean, ice sheet, and atmosphere, and how they contribute to climate change.
