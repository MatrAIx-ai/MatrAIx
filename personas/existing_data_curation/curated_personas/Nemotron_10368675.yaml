personas:
  professional: Elizabeth Goens, a retired senior‑center coordinator and community event organizer in West Kingston, leverages their lifelong practical skills in budgeting, garden maintenance, and digital
    tutoring to keep volunteer schedules running like clockwork, while their natural kindness and attention to harmony make them the go‑to mentor for new volunteers, even as they worry about maintaining
    the center’s funding.
  sports: Elizabeth Goens, an avid fan of the Boston Red Sox and New England Patriots, enjoys weekly nature‑trail walks with their local senior walking club, participates in low‑impact tai‑chi classes at
    the community center, and follows the seasonal rhythm of the town’s senior softball league, all while keeping their heart health in check with gentle gardening labor.
  arts: Elizabeth Goens, a lifelong lover of classic literature such as Jane Austen and historical novels by Ken Follett, finds inspiration in the works of the New England Symphony Orchestra, folk singer
    Joan Baez, and the paintings of Winslow Homer, and regularly attends the town’s community theater productions, knitting circles, and church choir, letting the arts shape their evenings and their own
    creative projects.
  travel: Elizabeth Goens, who prefers relaxed, well‑planned trips, has taken leisurely day excursions to historic Newport, a guided tour of Boston’s Freedom Trail, and a summer visit to Martha’s Vineyard,
    while dreaming of a gentle cruise along the New England coast in the future, always choosing accommodations close to their garden‑friendly schedule and traveling with a small, organized packing list.
  culinary: Elizabeth Goens, a confident home cook, delights in preparing New England clam chowder, herb‑roasted chicken, and apple‑cinnamon crumble using fresh vegetables from their garden, skillfully
    canning tomatoes and pickles for winter, and indulges in knitting a tea‑time scone while occasionally forgetting to turn off the stove due to their preoccupation with crossword puzzles.
  core: Elizabeth Goens blends meticulous organization, a nurturing spirit, and a touch of worry into a purposeful retirement filled with gardening, community service, and quiet moments of creative craft.
background:
  cultural: Elizabeth is a lifelong resident of West Kingston, Rhode Island, rooted in a white New England heritage that blends English and Irish ancestry. She grew up in a close‑knit community where town
    meetings, church gatherings, and seasonal farmer’s markets were central to social life. Her cultural identity is shaped by values of self‑reliance, modesty, and a deep respect for local traditions,
    such as preserving historic homes and supporting community volunteerism. Though she identifies as a Protestant (Episcopal) and participates in church‑based service, she also embraces the multicultural
    tapestry of modern Rhode Island by engaging in intergenerational activities and supporting local cultural festivals.
