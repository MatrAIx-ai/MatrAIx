  career_goals: Although retired, Elizabeth’s ambitions focus on maintaining independence, health, and a sense of purpose. She aims to stay physically active through daily gardening and weekly walks, and
    mentally sharp by expanding her digital literacy and completing a genealogy project that records her family’s history for future generations. She plans to increase her volunteer contributions at the
    West Kingston senior center, eventually mentoring newer volunteers and serving on the advisory board of a local historical society. Additionally, she hopes to complete a short memoir that captures the
    stories of her longtime community, preserving the cultural fabric of her New England hometown.
