persona_description: A construction engineer tasked with designing and building retaining walls for residential and commercial properties, as well as for public infrastructure projects. They are familiar
  with various types of retaining walls, their construction methods, and the relevant building codes and regulations. They have experience with excavation, foundation placement, and the use of concrete,
  block, and brick materials. They are responsible for ensuring the stability and safety of the walls, as well as complying with structural and aesthetic requirements. They have a deep understanding of
  the principles of stability and strength required for retaining walls, and they use their knowledge to design and build walls that meet these standards. They also have experience with the use of specialized
  tools and equipment for excavation, such as trench diggers and concrete mixers, and they are skilled at working with materials such as gravel, sand, and rebar. They are detail-oriented and meticulous
  in their work, and they prioritize safety and quality over speed.
