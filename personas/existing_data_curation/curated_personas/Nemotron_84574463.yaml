  career_goals: Anthony plans to finish his associate degree in Business Administration within the next year and secure a role that blends his practical abilities with his interest in community outreach,
    such as a marketing assistant for a local nonprofit or a junior project coordinator at a small business in Lynchburg. He hopes to earn digital‑marketing certifications to strengthen his skill set, eventually
    pursue a bachelor's degree in Public Relations or Business Management, and build a stable career that lets him contribute to his community while maintaining the flexibility he values.
