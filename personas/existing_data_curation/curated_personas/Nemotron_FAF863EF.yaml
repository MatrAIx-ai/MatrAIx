    and personal finance basics'']'
  hobbies: '[''creative writing (poetry, journaling)'', ''reading (contemporary fiction, African-American literature)'', ''photography (nature, street)'', ''gardening (vegetable and herb garden)'', ''listening
    to music (R&B, hip‑hop, gospel)'', ''yoga and mindfulness meditation'', ''knitting and crochet'']'
  career_goals: Sonita aspires to obtain her GED within the next year and enroll in a community college program that merges her interest in health care and hands‑on problem solving, such as a medical assistant
    or nursing aide track. She hopes to secure a stable entry‑level position that offers both practical experience and a clear path for advancement, so she can achieve financial independence and reduce
    the anxiety stemming from uncertainty. In the longer term, she wishes to become a peer‑support coordinator for mental‑health outreach in her hometown, using her personal experience with anxiety to help
    other young adults navigate emotional challenges. She also wants to cultivate a disciplined routine that balances her spontaneous nature with the structure needed to meet career milestones.
