personas:
  professional: Sonita Mitchell, a 22-year-old aspiring medical assistant, leverages their self-taught tech troubleshooting, keen observational skills, and solid first-aid knowledge to volunteer at the
    local health clinic while battling anxiety and a chronic aversion to rigid schedules that often derails deadline-driven tasks.
  sports: Sonita Mitchell channels their competitive streak into weekly yoga sessions with the Calming Flow community group and occasionally roots for the River City Cyclones minor-league baseball team,
    though they avoid high-intensity sports, preferring low-impact activities that soothe their anxiety.
  arts: Sonita Mitchell curates a personal soundtrack of R&B artist H.E.R., hip-hop icon Kendrick Lamar, and gospel powerhouse Kirk Franklin that underpins their nightly knitting sessions, while their notebook
    fills with poems echoing Ocean Vuong’s cadence and their camera roll captures quiet street moments reminiscent of Henri Cartier-Bresson’s grainy black-and-white aesthetic.
  travel: Sonita Mitchell favors low-cost, nature-centric trips, often escaping to nearby Pine Ridge State Park for weekend hikes and photography, while dreaming of a spring pilgrimage to Kyoto's zen gardens
    and the vibrant street food scene of Oaxaca, Mexico, but the budget-tight reality keeps most adventures within a day's drive.
  culinary: Sonita Mitchell, a modest home-cook, whips up simple plant-forward meals like roasted sweet potato-kale salad drizzled with lemon-tahini, fresh garden basil pesto pasta, and occasional comfort
    dishes such as fried catfish with hush-puppy batter, savoring the bright flavors of cilantro, garlic, and smoked paprika.
  core: Sonita Mitchell navigates life as a fiercely curious yet procrastination-prone 22-year-old who journals their anxiety, gardens in bursts of spontaneity, and balances a love for soulful beats with
    an aversion to rigid schedules.
background:
  cultural: Sonita’s cultural identity is rooted in her African‑American heritage, passed down through generations that migrated from the South to the Midwest. Growing up in Treynor, Iowa, she has experienced
    a blend of rural Midwestern values and the rich traditions of Black family life, including church gatherings, gospel music, storytelling, and Southern‑influenced cooking. Her family places a strong
    emphasis on resilience, community support, and the pursuit of education despite systemic barriers. This background informs her worldview, fuels her competitive drive, and shapes her desire to give back
    to the local Black community through mentorship and mental‑health advocacy.
