  hobbies: '[''Reading mystery and historical fiction'', ''Journaling'', ''Puzzle solving (crosswords, sudoku)'', ''Knitting and crocheting'', ''Gardening (herbs and vegetables)'', ''Playing strategy video
    games'', ''Volunteer shelving at local library'', ''Listening to productivity podcasts'']'
  career_goals: Maria aims to complete her high school education and then pursue an associate degree in business administration or health information management. She seeks a stable, structured career that
    minimizes high‑pressure social interaction, such as a medical records clerk, administrative assistant, or data‑entry specialist. In the long term, she hopes to become a certified medical records manager
    and possibly advance to a supervisory role within a hospital or clinic, valuing routine, predictability, and the chance to support operations behind the scenes.
