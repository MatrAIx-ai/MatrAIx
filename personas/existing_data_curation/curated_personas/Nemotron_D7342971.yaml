personas:
  professional: Maria Zlotecki is a diligent library volunteer who leverages her methodical nature and love of order to keep the community's shelves impeccably organized, planning shelving routes, tagging
    books, and maintaining a tracking spreadsheet, and they consistently follow through on every commitment.
  sports: Maria Zlotecki is a quiet fitness enthusiast who jogs with the Chicago Youth Runners Club on Saturday mornings, follows the Chicago Cubs and Chicago Bulls for seasonal excitement, practices yoga
    twice a week at the local community center for flexibility, and they prefer low‑impact, solitary workouts over team sports.
  arts: Maria Zlotecki is an avid reader of Agatha Christie mysteries and historical fiction, regularly listens to Ludovico Einaudi and Tchaikovsky on their headphones while knitting, admires textile artist
    Kiki Smith, attends library author talks, and they occasionally binge‑watch classic films like Casablanca on weekend evenings.
  travel: Maria Zlotecki is a planner‑oriented traveler who has visited Washington D.C. and Starved Rock State Park on family trips, dreams of exploring Kyoto’s zen gardens and the Renaissance art of Florence,
    books trips months in advance using a detailed itinerary spreadsheet, and they budget each journey with a dedicated travel savings jar.
  culinary: Maria Zlotecki is a budding home chef who cultivates herbs such as basil and rosemary for homemade pesto and roasted potatoes, prepares simple vegetable stir‑fry with garlic and ginger, enjoys
    mint tea infused with garden mint, follows recipes with moderate success while occasionally over‑salting, and they love to knit scarves while simmering soups.
  core: Maria Zlotecki is a methodical teen who transforms solitary hobbies into disciplined routines, balancing meticulous organization with occasional indulgent splurges on puzzles and craft supplies.
background:
  cultural: Maria comes from a white, Polish‑American family that settled in central Texas. The Zlotecki surname reflects her Polish ancestry, with family traditions that blend Catholic holidays and Polish
    dishes like pierogi with the broader Southern Texan culture. Raised in a modest, close‑knit household in Waco, she participates in community events such as the Waco Spring Festival and the Texas State
    Fair, while maintaining the orderly, hardworking values emphasized by both her Polish heritage and the local community.
attributes:
