personas:
  professional: Felton Mackey, a 54‑year‑old practical carpenter and community mentor, leverages their organized work ethic and precise budgeting to prepare for a GED, a vocational carpentry certificate,
    and the launch of a low‑cost home‑renovation business that serves Philadelphia’s underserved neighborhoods.
  sports: Felton Mackey plays pick‑up basketball at the neighborhood recreation center, follows the Philadelphia 76ers with avid enthusiasm, occasionally volunteers as a stats keeper for the adult league,
    and uses a local gym for cardio sessions during winter months.
  arts: Felton Mackey curates an extensive vinyl collection featuring Miles Davis, John Coltrane, Aretha Franklin, and Nina Simone, frequents live jazz and soul gigs at Chris’ Jazz Café, and channels the
    improvisational spirit of the music into inventive woodworking designs.
  travel: Felton Mackey favors budget‑friendly weekend trips, has toured the National Museum of African American History in Washington D.C., explored Boston’s Freedom Trail, and aspires to experience the
    New Orleans Jazz & Heritage Festival, all while keeping travel costs within a modest savings plan.
  culinary: Felton Mackey delights in garden‑fresh tomato‑basil pasta, pepper‑infused chicken stir‑fry, herb‑laden homemade pesto, and a side of cornbread, while occasionally treating themselves to a classic
    Philly cheesesteak from a beloved local hoagie shop.
  core: Felton Mackey blends practical craftsmanship, disciplined budgeting, and a deep love for jazz into a community‑focused life, even if their relentless project schedule sometimes pushes health check‑ups
    to the back of the list.
background:
  cultural: Felton is an African‑American born and raised in the North‑West Philadelphia neighborhoods that have long been hubs of Black culture and activism. He grew up attending a Methodist church where
    gospel singing and community service were central. His family’s history includes participation in the civil‑rights era marches and the local Black Arts movement, which instilled a strong sense of pride
    in African‑American heritage. The community’s emphasis on mutual aid, porch conversations, and neighborhood solidarity shaped his values of cooperation and self‑reliance. Philadelphia’s rich musical
    legacy—from jazz clubs on South Street to the legacy of the Philadelphia Soul—has deeply influenced his taste in music and cultural identity.
attributes:
  skills: '[''Carpentry'', ''General Home Repair'', ''Basic Automotive Maintenance'', ''Budgeting and Personal Finance'', ''Internet Research'', ''Community Outreach'', ''Mentoring Youth'', ''Conflict Mediation'']'
  hobbies: '[''Reading Historical Biographies'', ''Jazz and Soul Music Listening'', ''Pick‑up Basketball'', ''Balcony Gardening'', ''Woodworking'', ''Personal Journaling'']'
  career_goals: Felton aims to obtain his GED within the next year, followed by a vocational certificate in carpentry, with the ultimate goal of launching a small, community‑focused renovation business
    that offers affordable home‑improvements to low‑income residents in Philadelphia. He also hopes to formalize his mentorship role by becoming a certified youth counselor at the local community center,
    and eventually serve on the board of a neighborhood development nonprofit.
