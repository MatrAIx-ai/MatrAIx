  career_goals: Looking ahead, George aims to move into a supervisory role, such as shift lead or assistant store manager, where he can apply his organizational strengths and mentoring ability. He plans
    to enroll in a community college retail management certificate program to formalize his knowledge of inventory control and staff development. Over the next five years, he hopes to qualify for a store
    manager position at his current employer, and eventually explore the possibility of owning a small neighborhood convenience store that serves the senior community. At the same time, he wants to build
    a modest side business offering basic tech support and POS training for local small businesses, providing an additional income stream for his family’s retirement savings.
