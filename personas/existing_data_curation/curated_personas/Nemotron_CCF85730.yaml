personas:
  professional: Minji Kang is a senior full‑stack software engineer who leverages her expertise in Python, React, and AWS to architect scalable cloud solutions, while her disciplined, organized nature and
    Scrum Master certification ensure that her teams deliver on time with meticulous documentation and inclusive mentorship.
  sports: Minji Kang is an avid cross‑country skier in winter and a weekend hiker at state parks in summer, regularly attends runs with the Twin Cities Running Club, and cheers for the Minnesota Vikings
    and Timberwolves, balancing structured workouts with community sports events.
  arts: Minji Kang immerses herself in literature by reading contemporary Korean authors like Han Kang, enjoys Sufjan Stevens and traditional pansori recordings, and attends productions at the Guthrie Theater,
    finding that the blend of modern indie folk and classic storytelling fuels her creative problem‑solving.
  travel: Minji Kang prefers meticulously planned trips, returning each autumn to Seoul and Jeju to visit family, while also scheduling a summer road‑trip to Yellowstone and dreaming of a future solo hike
    in Iceland’s fjords, all balanced against her professional commitments.
  culinary: Minji Kang, a confident home cook, perfects kimchi and bibimbap using fresh kale and carrots from her garden, experiments with gochujang‑glazed salmon, and occasionally whips up a Korean‑style
    tteokbokki taco, showcasing her skillful fusion of traditional flavors and Midwestern ingredients.
  core: Minji Kang is a disciplined tech leader who blends meticulous organization, cultural traditions, and a love for mindful wellness into a life of purposeful growth, occasional gadget splurges, and
    a well‑tended garden.
background:
  cultural: Minji is a second‑generation Korean American. Her parents immigrated to the United States in the 1970s, and she was raised in a bilingual household in Minnesota. She grew up celebrating Chuseok
    and Seollal, maintaining close family ties, and internalizing cultural values that emphasize education, diligence, and respect for elders. These values blend seamlessly with the Midwestern ethos of
    community involvement and humility. Minji frequently incorporates Korean culinary traditions and language practice into her daily life while also participating in local church events, neighborhood festivals,
    and community service initiatives, reflecting a harmonious integration of her Korean heritage and American upbringing.
