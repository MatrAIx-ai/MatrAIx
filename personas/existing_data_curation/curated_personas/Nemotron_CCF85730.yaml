  hobbies: '[''Yoga'', ''Vegetable gardening'', ''Korean cooking (kimchi, bibimbap, tteokbokki)'', ''Hiking in Minnesota state parks'', ''Cross‑country skiing'', ''Reading contemporary Korean literature'',
    ''Reading historical non‑fiction'', ''Board game nights'', ''STEM mentorship for middle‑school girls'', ''Annual travel to South Korea'']'
  career_goals: Minji aims to transition into a senior engineering manager or director role within the next five years, where she can shape technology strategy and lead larger product teams. She plans to
    earn an AWS Solutions Architect certification and a PMP to formalize her technical and managerial expertise. A core ambition is to build inclusive, high‑performing teams and to champion diversity initiatives,
    especially mentorship programs for women and underrepresented groups in tech. Long‑term, she envisions contributing to open‑source projects, influencing industry standards, and possibly launching a
    consultancy that delivers data‑driven solutions to small and midsize businesses in the Midwest.
