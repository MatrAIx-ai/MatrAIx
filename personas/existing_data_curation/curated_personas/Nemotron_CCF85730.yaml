  skills: '[''Full-stack software development'', ''Python'', ''Java'', ''C++'', ''React'', ''Django'', ''MySQL'', ''PostgreSQL'', ''AWS (EC2, S3, Lambda)'', ''Agile/Scrum methodology'', ''Project planning'',
