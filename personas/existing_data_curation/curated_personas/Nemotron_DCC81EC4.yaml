  hobbies: '["Painting and sketching", "Visiting art galleries and exhibitions", "Community theater acting", "Hiking in the Appalachian region", "Playing basketball", "Guitar playing", "Experimental cooking",
    "Reading contemporary fiction and philosophy", "Volunteering at local festivals"]'
  career_goals: Wayne aims to earn a bachelor's degree in education and pursue a teacher certification in art education, positioning himself to become a curriculum specialist for interdisciplinary arts
    programs. He aspires to lead a school‑wide initiative that blends creative arts with core subjects, and eventually seeks a role as assistant principal or district coordinator where he can champion student
    mental‑health resources and community partnerships.
