persona_description: A scientist working at the International Research Institute for Climate and Society (IRI) in Columbia University, responsible for developing and implementing early warning systems for
  the forecast of disease outbreaks, particularly in sub-Saharan Africa, where malaria and other diseases are prevalent. This scientist has experience in using data analysis and mapping techniques to predict
  weather patterns and their impact on disease spread, and has successfully implemented this system in several countries, including Botswana, Colombia, and Senegal. The scientist is also interested in mapping
  hotspots for emerging diseases and using this information to reduce the spread of these killers and save lives.
