persona_description: A linguist who is passionate about the preservation and revitalization of endangered languages, and the study of their cultural and linguistic diversity. They are dedicated to collecting
  data, verifying language numbers and status, documenting local knowledge systems, and creating an up-to-date list and map of endangered languages. They aim to bring wide attention to the issue of language
  loss and use mapping to understand language distribution and its relation to geography. Their research interests include the study of endangered languages, their cultural and linguistic diversity, and
  the impact of language loss on biodiversity.
