  hobbies: '["Hiking", "Tennis (doubles)", "Cooking East Asian cuisine", "Tai chi", "Volunteer work at community clinic", "Photography", "Gardening", "Attending medical conferences", "Participating in cultural
    festivals"]'
  career_goals: In the coming years Dr. Jin aims to develop a community‑based chronic‑illness management program that serves the growing elderly Asian‑American population in Los Angeles County, integrating
    preventive care, culturally appropriate education, and technology‑enabled monitoring. He plans to publish a review article on harmonizing traditional East Asian health practices with Western medicine,
    mentor at least ten resident physicians through structured rotations, and take on an advisory role for a regional health equity coalition. Ultimately, he envisions a gradual transition to part‑time
    consulting while remaining active in advocacy for physician wellness and mental‑health support.
