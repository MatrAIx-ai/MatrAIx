  hobbies: '[''Sketching'', ''Graffiti art'', ''Photography'', ''Hip‑hop dance'', ''Playing basketball'', ''Attending live music events'', ''Writing spoken‑word poetry'', ''Volunteering at community art
    workshops'', ''Exploring new restaurants'', ''Playing video games (narrative RPGs)'']'
  career_goals: Malcolm aspires to earn a bachelor’s degree in Communications or Arts Management and eventually work as a community arts coordinator or marketing communications specialist. He wants to design
    and run programs that bring art, music, and cultural expression to underserved youth in Fontana and the broader Inland Empire. In the long term, he dreams of launching his own nonprofit focused on mentorship
    through creative workshops, while also building a personal brand as a content creator highlighting Black arts and social issues. He aims to blend his organizational talents, creative flair, and sociable
    energy to become a trusted voice for community empowerment.
