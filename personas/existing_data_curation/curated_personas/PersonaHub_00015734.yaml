persona_description: A human rights advocate and lawyer who has worked extensively with survivors of torture and other human rights abuses. They are deeply concerned about the potential repeal of the Human
  Rights Act and the erosion of human rights protections in the UK. They are committed to safeguarding the existing Act and have a passion for public education about human rights. They have seen firsthand
  the damage that can be done by political attacks on human rights, and are determined to prevent any attempt to replace the Act with a new Bill of Rights.
