  career_goals: At 72, Carolina aims to maintain a part‑time schedule that provides steady supplemental income while allowing flexibility for family and social activities. She hopes to complete a GED program
    for personal fulfillment, and to mentor younger cashiers by sharing her knowledge of customer service and bilingual communication. Carolina also dreams of turning her love of cooking and crafts into
    a modest home‑based venture, selling homemade tamales, salsas, and crocheted blankets at local markets. Volunteering at the community center to teach basic Spanish and traditional recipes is another
    long‑term ambition, ensuring she remains an active, contributing member of her Harlingen neighborhood.
