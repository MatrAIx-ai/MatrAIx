personas:
  professional: Hager Woods, a senior procurement analyst at a major manufacturing firm, blends rigorous data‑driven sourcing with a passion for supplier diversity, using Excel, Power BI, and SQL to negotiate
    contracts while they mentor junior colleagues, and channels the community‑first values learned from church outreach into building partnerships with underrepresented local enterprises.
  sports: Hager Woods, a 42‑year‑old pickup basketball enthusiast, plays in a local weekend league, cheers for the Charlotte Hornets and the Carolina Panthers, hikes the Blue Ridge foothills each Saturday,
    and they incorporate weekly yoga to counteract knee soreness from the court.
  arts: Hager Woods is an avid collector of contemporary African‑inspired artwork, featuring pieces by Kehinde Wiley and Amy Sherald displayed at the Mint Museum, regularly attends jazz nights at the local
    jazz club featuring performances by Wynton Marsalis, and they practice street photography capturing vibrant Charlotte neighborhoods, drawing inspiration from the works of Gordon Parks.
  travel: Hager Woods, with a family‑centric budget, prefers a mix of planned cultural getaways to New Orleans for its music heritage and spontaneous weekend road trips to Asheville's art scene, while they
    dream of a culinary tour of Italy’s Tuscany region and a future adventure to Ghana to explore ancestral roots, balancing travel costs with contributions to local mentorship programs.
  culinary: Hager Woods enjoys cooking inventive Southern‑inspired meals such as shrimp and grits with miso glaze, collard greens sautéed with kale and smoked paprika, and sweet‑potato‑harissa cheesecake,
    often experimenting with ingredients like harissa, miso, and pimento, while they frequently dine out at downtown soul‑food spots like Soul Food Junction for their famed fried catfish and cornbread.
  core: Hager Woods is a data‑savvy procurement leader who blends community‑first values with a love for contemporary art, sci‑fi reads, and weekend basketball, often juggling midnight marathon series with
    early‑morning contract reviews and, as they often forget, watering houseplants.
background:
  cultural: Hager is a second‑generation Black American raised in the South, with deep roots in Charlotte's historically Black neighborhoods. His family traditions emphasize community uplift, education,
    and resilience, values that inform his professional commitment to supplier diversity and mentorship. He participates in local cultural events such as Juneteenth celebrations and Black History Month
    exhibitions, and he stays connected to the African American church community, where he volunteers for outreach programs. These cultural influences shape his appreciation for art, his dedication to social
    equity in business, and his grounded yet forward‑looking outlook.
attributes:
  skills: '[''Strategic Sourcing'', ''Vendor Relationship Management'', ''Contract Negotiation'', ''Cost Analysis and Reduction'', ''Inventory Control & Demand Forecasting'', ''ERP Procurement Systems (SAP
    MM, Oracle Procurement Cloud)'', ''Data Analytics (Excel, Power BI, SQL)'', ''Regulatory Compliance (USMCA, NC procurement policies)'', ''Sustainable Sourcing'', ''Project Management Basics'']'
  hobbies: '[''Visiting art galleries and collecting contemporary African American art'', ''Cooking inventive Southern‑fusion dishes'', ''Reading science‑fiction and technology non‑fiction'', ''Playing
    pickup basketball'', ''Hiking in the Blue Ridge foothills'', ''Mentoring youth in STEM programs'', ''Street photography of Charlotte neighborhoods'']'
  career_goals: Hager aims to advance to a senior procurement leadership role within the next five years, targeting a Category Manager or Director position where he can shape enterprise‑wide sourcing strategies.
    He plans to obtain the Certified Professional in Supply Management (CPSM) credential and enroll in a part‑time MBA program to deepen his strategic and financial acumen. A key ambition is to champion
    supplier diversity programs that elevate Black‑owned businesses in the Charlotte region, and to lead initiatives that embed AI‑driven analytics into the purchasing function for greater efficiency and
    sustainability.
