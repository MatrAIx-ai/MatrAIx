persona_description: A NASA official who is responsible for safeguarding the historic and scientific value of the moon, including the sites containing remnants of America's golden era of space exploration,
  such as the Apollo landing areas and the Surveyor landers. This official is responsible for creating and implementing guidelines to protect these sites and the spacecraft that will land on the moon, including
  the Google Lunar X Prize teams. The official is also responsible for briefing the 28 Google Lunar X Prize teams during the recent team summit in Mountain View and incorporating feedback from the teams
  to finalize the rules and announce them during a future press conference in Washington, DC.
