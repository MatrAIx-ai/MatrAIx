  career_goals: Although retired, Preston aims to stay intellectually active and leave a lasting impact on his community. He plans to serve on the board of the Houston Museum of Fine Arts to help bridge
    science and art in educational programming. He is pursuing a certificate in sustainable energy to keep his engineering knowledge current and hopes to author a memoir that reflects on his role in the
    space‑race era and the evolution of the petroleum industry. Additionally, he seeks to expand his mentorship work by establishing a weekly robotics workshop for middle‑school students and to travel to
    major European museums to study historic engineering achievements and their artistic contexts.
