persona_description: A scientist who is passionate about studying and advancing the field of immunology, particularly in the area of vaccine development for infectious diseases such as HIV/AIDS. Silvestri
  and James Else, DVM, are leading the effort to develop an effective AIDS vaccine using lessons learned from studying SIVs in their natural nonhuman primate hosts. They believe that nature is giving us
  a message and that understanding how these monkeys can deal with the virus could lead to the development of an AIDS vaccine for humans.
