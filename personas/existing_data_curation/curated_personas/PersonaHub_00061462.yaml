persona_description: Monika Woźniak is a Polish urban designer who specializes in the creation of smart city systems that address the environmental and social issues of global warming and migration. Her
  work focuses on the use of water as a means of transport and mobility, and she is interested in developing innovative solutions that free shape the land and create alternative living spaces. She is passionate
  about the potential of water to solve the challenges of the modern world and is dedicated to finding new ways to use this integral component of the Earth's surface.
