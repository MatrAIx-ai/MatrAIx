  hobbies: '[''Acrylic painting'', ''Hiking in the Bighorn Mountains'', ''Landscape photography'', ''Piano playing'', ''Reading science fiction and philosophy'', ''Improv theater'', ''Yoga and meditation'',
    ''Experimental cooking'', ''Visiting art galleries and museums'', ''Collecting vinyl records'']'
  career_goals: Melanie aims to secure a tenured professorship or senior research position that lets her lead an interdisciplinary lab at the intersection of physical science and visual arts. She wants
    to develop immersive, data‑driven installations and visualization tools that transform how scientific findings are experienced by both academic and public audiences. Securing multi‑disciplinary grants,
    publishing in high‑impact journals, and influencing science policy toward integrative research are central to her ambition. She is also committed to mentoring the next generation of women in STEM, building
    structured yet flexible workflows to improve deadline adherence, and cultivating personal resilience to manage stress and maintain a healthier work‑life balance.
