  career_goals: Although retired, Angelique remains driven to contribute her knowledge and energy to the community. She aims to mentor early‑career teachers through informal coaching, develop an intergenerational
    tutoring program at the Waterville Public Library, and expand her senior‑focused digital‑literacy workshops. She is working on a memoir that captures stories from her teaching years and local history
    anecdotes, with the hope of publishing a small book for the community. Angelique also aspires to serve on the board of the Waterville Historical Society, champion new community‑garden initiatives, and
    lead her bridge team to regional competitions.
