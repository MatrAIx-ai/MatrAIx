personas:
  professional: Angelique Brown, a retired public‑school teacher with three decades of classroom, curriculum and assessment expertise, now mentors early‑career educators, designs intergenerational tutoring
    programs at the Waterville Public Library, and runs senior digital‑literacy workshops, all while channeling her competitive edge into leading her bridge team to regional tournaments.
  sports: Angelique Brown, an avid hiker and bird‑watcher who tackles the Mount Blue Trail each summer, supports the Portland Sea Dogs and follows the New England Patriots, plays bridge competitively at
    the Waterville senior center, and joins a local walking club that meets weekly, balancing seasonal outdoor activity with mind‑sport competition; they relish the camaraderie of team sports while maintaining
    a personal competitive edge.
  arts: Angelique Brown, a devoted community‑theater participant who recently portrayed Eleanor in a production of 'Our Town', immerses themselves in New England historical fiction by Kate Morton, savors
    the folk melodies of Gillian Welch, and admires the performances of Meryl Streep, using the arts as a conduit for storytelling and social connection.
  travel: Angelique Brown, who plans trips with a mix of genealogical research and leisurely sightseeing, has explored the historic streets of Boston, trekked the Scottish Highlands to trace family roots,
    visited Dublin’s literary pubs, and dreams of a coastal road trip through Nova Scotia’s lighthouse villages, always arranging group travel to accommodate their social nature while keeping expenses within
    a fixed retirement budget.
  culinary: Angelique Brown, a skilled home baker and garden‑to‑table cook, delights friends with their signature Maine blueberry streusel pie, hearty clam chowder, roasted root vegetables seasoned with
    thyme and rosemary, and occasionally experiments with apricot preserves, preferring fresh, seasonal ingredients harvested from their own backyard garden.
  core: Angelique Brown, a 73‑year‑old former teacher, blends community mentorship, competitive bridge, and garden‑fresh cooking into a vibrant, slightly skeptical yet reliably organized lifestyle, often
    double‑checking their garden rows and bridge scores.
background:
  cultural: Angelique is a lifelong New Englander whose family traces its roots to Irish and English settlers who arrived in Maine in the 1800s. Raised in a close‑knit, middle‑class town, she was taught
    the value of hard work, education, and civic responsibility. Her upbringing in a small‑town community emphasized self‑reliance, respect for the natural rhythms of the seasons, and a strong sense of
    neighborly support. She has been active in her local church and community organizations, reflecting the region’s tradition of volunteerism and collective well‑being. The cultural fabric of Maine—its
    love of the outdoors, its modesty, and its intergenerational ties—continues to shape Angelique’s outlook and daily life.
