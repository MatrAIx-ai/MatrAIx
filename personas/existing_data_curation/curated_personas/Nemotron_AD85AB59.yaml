  hobbies: '[''Gardening (seasonal vegetables and flowers)'', ''Traditional cooking and recipe preservation'', ''Knitting and crocheting'', ''Reading historical fiction and memoirs'', ''Puzzle solving (crossword,
    Sudoku)'', ''Walking in local parks'', ''Attending church services and small community gatherings'', ''Watching classic East Asian films'']'
  career_goals: Although retired, Yue N Ho’s primary ambition is to maintain her health and independence while continuing to support her family, especially her grandchildren, through mentorship and the
    sharing of cultural traditions. She aspires to document and pass down her family’s recipes and stories, volunteer as a mentor for younger seniors at the local community center, and advocate for accessible
    services for older adults in her neighborhood. She also hopes to ensure that her legacy of organization and reliability is reflected in the smooth operation of family gatherings and community events.
