  career_goals: Although retired, Nubia aims to compile a memoir that captures the cultural heritage of San Sebastián, blending oral histories with personal reflections. She aspires to mentor younger community
    members in traditional crafts and storytelling, and to exhibit her artwork in local galleries and cultural centers. Her long‑term ambition is to establish a modest community art studio that offers workshops
    in painting, craft, and digital illustration, ensuring the preservation and evolution of Puerto Rican cultural expressions. She also wishes to continue exploring new artistic mediums, such as digital
    art, to keep her creative practice fresh and innovative.
