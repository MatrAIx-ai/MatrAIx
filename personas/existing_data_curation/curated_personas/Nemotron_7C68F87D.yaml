  career_goals: Robert aims to progress into a senior leadership role such as Creative Director, where he can guide a multidisciplinary design team and shape a studio’s creative vision. He is driven to
    develop innovative, sustainable design solutions that incorporate emerging technologies like augmented reality. Over the next five years, he plans to launch a boutique consultancy focused on cultural
    branding for local businesses, publish articles on design theory, and mentor emerging designers. Balancing ambition with his sensitivity to stress, he also seeks to establish a healthier work‑life rhythm
    that allows for deeper personal creative exploration.
