personas:
  professional: Alisa Pryor is a skilled carpenter and custom furniture designer in the Sierra foothills, combining traditional joinery with CNC technology, a meticulous project‑management style, and a
    passion for eco‑friendly historic restoration.
  sports: Alisa Pryor is an avid hiker who tackles Sierra trails year‑round, joins a local mountain‑biking club in the summer, enjoys weekend snowshoeing and occasional ski trips at Lake Tahoe, and cheers
    for the Sacramento River Cats, Golden State Warriors, and San Jose Earthquakes.
  arts: Alisa Pryor blends woodworking with fine art, spending evenings painting landscape studies inspired by Ansel Adams, sketching textures after visits to the de Young Museum, and drawing design inspiration
    from the abstract forms of Georgia O’Keeffe and the contemporary installations of James Turrell.
  travel: Alisa Pryor prefers purposeful road trips that combine artistic research and outdoor adventure, often planning weekend getaways to Yosemite, a historic tour of Virginia City, a culinary retreat
    in Portland, and a long‑awaited pilgrimage to the fjords of Norway to study sustainable timber practices.
  culinary: Alisa Pryor enjoys cooking rustic meals like cedar‑plank salmon with wild rosemary, mushroom‑and‑herb risotto featuring locally foraged chanterelles, and sourdough bread made with heritage wheat,
    while they relish tasting craft beers from Sierra microbreweries and pairing meals with single‑origin coffee.
  core: Alisa Pryor is a meticulous, eco‑conscious carpenter whose artistic curiosity, competitive drive, and occasional stress‑filled perfectionism shape a life focused on sustainable craftsmanship and
    community mentorship.
background:
  cultural: Alisa grew up in a small town in the Central Valley of California, raised in a mixed‑heritage (German‑Scandinavian) family with a strong DIY ethic. Her parents owned a hardware store, exposing
    her early to tools and hands‑on work. She attended a community college near Sacramento, studying general studies with coursework in art and design before focusing on carpentry through an apprenticeship.
    Living in Sonora, Tuolumne County, she is deeply connected to the region’s Gold Rush heritage and the rugged natural environment of the Sierra foothills. Her cultural identity blends traditional American
    values of self‑reliance, an appreciation for historic preservation, and a modern commitment to environmental sustainability and inclusive community involvement.
