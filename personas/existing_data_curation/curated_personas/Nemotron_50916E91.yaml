  hobbies: '[''painting'', ''sketching'', ''hiking'', ''landscape photography'', ''visiting art galleries'', ''attending craft fairs'', ''reading design and sustainability literature'', ''yoga'', ''community
    teaching'']'
  career_goals: She aims to earn a certified journeyman carpenter credential and eventually open her own boutique workshop in the Sierra foothills where she can design and produce high‑end, sustainably
    sourced furniture. Alisa hopes to lead restoration projects for historic homes in Tuolumne County, develop a mentorship program for young women entering the trades, and expand her business to offer
    custom design consulting and online sales. In the long term, she envisions becoming a recognized authority on eco‑friendly woodworking practices and publishing a guidebook on integrating art and function
    in residential construction.
