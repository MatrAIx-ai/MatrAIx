  career_goals: Michael aims to obtain his GED within the next twelve months and enroll in a vocational program at Westmoreland County Community College to become a certified automotive technician. He envisions
    working in a reputable repair shop to gain professional experience, with a longer‑term goal of opening his own small auto‑service business that offers personalized, reliable service to his community.
    Alongside his technical aspirations, he hopes to improve his organizational habits and develop a stable, structured career path that balances predictability with the flexibility he values. He also wants
    to stay involved in local volunteer initiatives, particularly youth mentorship programs.
