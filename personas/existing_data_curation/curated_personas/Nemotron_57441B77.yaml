  career_goals: Looking ahead, Jayne aims to transition into a senior technical specialist role where she can lead process‑improvement projects and mentor the next generation of technologists. She is pursuing
    a Professional Engineering Technologist (CET) certification and seeks to integrate sustainability principles into the manufacturing processes of local agribusinesses. Jayne also aspires to develop community
    outreach programs that blend engineering and art, such as public installations that illustrate renewable energy concepts. Ultimately, she envisions shaping policy for small‑scale industrial innovation
    in Monterey County while maintaining a hands‑on role in advanced prototyping.
