personas:
  professional: Wai Ly, a 16‑year‑old tech enthusiast, combines a solid foundation in Python programming with hands‑on experience building custom PCs and robotics projects, channeling their competitive
    yet calm mindset into school hackathons and coding contests where meticulous organization meets flexible problem‑solving.
  sports: Wai Ly, a regular participant in the local badminton club and an avid follower of the national basketball team, balances competitive play on the court with weekend hikes on the nearby Greenridge
    Trail, using sport as a focused outlet for their analytical energy.
  arts: Wai Ly, who immerses themselves in anime series like 'Fullmetal Alchemist' and reads sci‑fi novels by Liu Cixin, practices traditional calligraphy on weekends, and draws inspiration from Studio
    Ghibli’s visual storytelling, letting creative expression temper their strategic mindset.
  travel: Wai Ly, who enjoys weekend hikes to the Sunlit Ridge and dreams of a future trip to Japan’s Akihabara district to experience its tech culture and anime conventions, plans trips with spreadsheets,
    balancing budget constraints with a craving for immersive, tech‑focused adventures.
  culinary: Wai Ly, a self‑taught home cook, favors crafting ramen bowls with miso broth, perfecting a crispy chicken cutlet, and experimenting with DIY electronics‑enabled sous‑vide setups, while still
    indulging in quick snack runs for spicy instant noodles after late‑night coding sessions.
  core: Wai Ly, a calm yet fiercely competitive teen, fuses curiosity for hardware with disciplined strategy, turning every project, game, or study session into a meticulously balanced challenge.
background:
  cultural: Wai comes from an East Asian (Chinese‑American) family that blends traditional cultural values with Southern U.S. life in Alpharetta, GA. Home life emphasizes respect for elders, educational
    achievement, and participation in cultural celebrations such as Lunar New Year and Mid‑Autumn Festival, featuring foods like dumplings and mooncakes. Bilingual upbringing in Mandarin and English gives
    him a strong cultural identity, while his day‑to‑day experiences in suburban Georgia expose him to diverse community events and a blend of Eastern and Western influences.
