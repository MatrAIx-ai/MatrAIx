personas:
  professional: Jahrod Moton is a budding junior programmer who channels their organized, curiosity-driven mindset into building Scratch games and tinkering with Python scripts, often approaching projects
    with a competitive drive to outdo peers while still appreciating proven coding practices.
  sports: Jahrod Moton thrives on the fast-break energy of pick-up basketball at the community center, cheering on the Los Angeles Lakers while rocking a Chicago Bulls jersey for luck, and dashes through
    track events with the local YMCA sprint club, always striving to beat personal bests and sometimes over-training to the point of early fatigue.
  arts: Jahrod Moton fuels their creative spark by listening to the synth-pop beats of Daft Punk and the soaring scores of John Williams, watching science-fiction blockbusters starring Chris Hemsworth,
    and constructing LEGO dioramas inspired by the vibrant visual style of Pixar’s 'Coco', a hobby that merges meticulous planning with imaginative storytelling.
  travel: Jahrod Moton loves day trips to the historic Liberty Bell in Philadelphia and weekend camping at Shenandoah National Park, dreams of visiting the futuristic teamLab Borderless exhibit in Tokyo,
    and, when budgeting permits, hopes to explore the space-themed attractions at the Kennedy Space Center in Florida.
  culinary: Jahrod Moton prefers bite-size pepperoni pizza slices, perfects chocolate-chip cookies using brown sugar and vanilla extract, and enjoys whipping up quick mac and cheese with a splash of hot
    sauce, often experimenting with a pinch of nutritional yeast for an extra cheesy twist.
  core: Jahrod Moton blends a competitive, organized drive with a love for group play, a penchant for meticulous coding projects, and occasional over-enthusiasm that leads to forgotten homework or an extra
    slice of pizza.
background:
  cultural: Jahrod comes from a close-knit African-American family that has lived in Brunswick County for generations. His upbringing is steeped in the traditions of the local Black church, where gospel
    music, storytelling, and community fellowship play a central role. Family gatherings often feature Southern comfort foods such as collard greens, fried catfish, and sweet potato pie, and the meals are
    occasions for sharing oral histories about the civil-rights movement and local community leaders. Growing up in Lawrenceville, he is aware of the legacy of historically Black schools and the importance
    of education as a pathway to empowerment. His parents emphasize respect for elders, perseverance, and giving back to the neighborhood, values that align with the broader cultural emphasis on collective
    well-being and self-reliance. These influences shape Jahrod's sense of pride in his heritage and motivate his desire to contribute positively to his community.
