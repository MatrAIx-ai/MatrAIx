  career_goals: Although still young, Jahrod envisions a future where his love for organized thinking, technology, and community impact converge. He aims to earn top grades throughout middle and high school,
    join a competitive robotics team, and win regional science competitions. In the long term he hopes to study engineering—particularly civil or mechanical engineering—so he can design practical solutions
    for his hometown, such as improved infrastructure or sustainable farming equipment. He also dreams of becoming a mentor who can guide younger students in STEM, blending his sociable nature with his
    competitive drive to inspire excellence. Ultimately he sees himself working as a software developer or a project manager on large-scale community projects, balancing innovative ideas with proven methods.
