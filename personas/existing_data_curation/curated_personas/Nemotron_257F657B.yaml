  hobbies: '[''Drawing and illustrating'', ''Reading science-fiction picture books'', ''LEGO construction'', ''Exploring nature and collecting specimens'', ''Simple coding with Scratch'', ''Puzzle solving'',
    ''Listening to gospel, R&B, and hip-hop music'']'
  career_goals: Caprecia dreams of becoming a creator who can explore new worlds, so she often imagines herself as an astronaut who discovers distant planets, a comic-book author who brings her characters
    to life, or a scientist-inventor who solves mysteries with clever inventions. She is determined to win her school's science fair and hopes to one day design her own video games or animated series. Her
    competitive streak fuels a goal to be recognized as the most inventive kid in her class and later, in the broader community.
