  hobbies: '["Reading contemporary fiction", "Journaling", "Sketching and drawing", "Digital photography", "Cooking and baking Southern-inspired dishes", "Vegetable gardening", "Hiking local trails (e.g.,
    Congaree River trail)", "Volunteering at a local animal shelter", "Mindfulness meditation", "Playing single-player narrative video games"]'
  career_goals: Brandi aims to obtain her GED within the next year and then enroll in a community college associate‑degree program, preferably in health sciences or graphic design, fields that satisfy both
    her curiosity about how things work and her desire for a practical, employable skill set. She envisions a career where she can work in a small, supportive team—such as a community health outreach coordinator,
    a medical records clerk, or an entry‑level graphic designer—allowing her to apply her organizational strengths while staying close to people she cares about. In the longer term, she hopes to combine
    her creative interests and empathy by designing health‑education materials or leading workshops that help peers manage anxiety and stress.
