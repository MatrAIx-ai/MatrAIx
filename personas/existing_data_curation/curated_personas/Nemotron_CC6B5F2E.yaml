personas:
  professional: Brandi Dobson, an aspiring community health outreach coordinator and entry‑level graphic designer, blends meticulous organization, beginner‑level Canva skills, and a natural empathy to craft
    clear health‑education flyers while dreaming of a future where they can help peers manage anxiety through visual storytelling.
  sports: Brandi Dobson finds solace in weekend hikes along the Congaree River trail, occasionally joins a local walking club, and watches the Charleston Battery soccer matches on TV, preferring low‑key,
    nature‑focused movement over competitive sports.
  arts: Brandi Dobson immerses herself in contemporary fiction by Sally Rooney, sketches scenes from daily life, experiments with digital photography using Lightroom, and listens to indie artists like Mitski,
    letting these creative outlets shape her reflective inner world.
  travel: Brandi Dobson favors low‑key travel that blends nature and culture, having explored Asheville’s art scene and Savannah’s historic squares, while dreaming of a solo trip to Kyoto to study minimalist
    design and sample authentic matcha.
  culinary: Brandi Dobson enjoys recreating Southern comfort dishes such as buttermilk biscuits, shrimp and grits, and peach cobbler, often incorporating fresh tomatoes, basil, and kale from their backyard
    garden into simple, home‑cooked meals.
  core: Brandi Dobson is an introverted 18‑year‑old who balances curiosity and practicality, channels anxiety into mindfulness and creative pursuits, and thrives on solitary hobbies like writing, gardening,
    and gentle hikes.
background:
  cultural: Brandi grew up in Columbia, South Carolina, in a middle‑class White family that values Southern hospitality, close family ties, and community involvement. Her upbringing includes regular attendance
    at a local Methodist church, participation in church‑based service projects, and exposure to regional customs such as home‑cooked meals featuring barbecue, biscuits, and peach cobbler. The city’s blend
    of historic downtown charm, university atmosphere, and natural spaces like the Riverbanks Zoo and Congaree National Park has given her an appreciation for both cultural and outdoor pursuits. While rooted
    in Southern traditions, Brandi also draws on the broader digital culture of her peers, balancing local values with contemporary media influences.
attributes:
  skills: '["Basic computer proficiency (Microsoft Office, Google Suite)", "Social media content creation (Canva, Instagram basics)", "Creative writing and journaling", "Basic cooking and baking (Southern-inspired
