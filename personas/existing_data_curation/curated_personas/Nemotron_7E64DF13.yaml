  hobbies: '[''Visiting art galleries and street art tours'', ''Painting and mixed‑media art'', ''Hiking in the Rocky Mountains'', ''Playing in a co‑ed soccer league'', ''Latin dance (salsa, bachata)'',
    ''Cooking Mexican cuisine with contemporary twists'', ''Hosting themed dinner parties'', ''Volunteering at community safety workshops'', ''Participating in trivia nights with friends'', ''Learning basic
    mixology'']'
  career_goals: Miriam aims to advance to a supervisory role within the Aurora Police Department's community policing unit, earn the Certified Protection Officer (CPO) credential, and later pursue a degree
    in criminal justice to qualify for a federal law enforcement position. She also aspires to develop a training curriculum that integrates cultural competency and art‑based community engagement to reduce
    crime and strengthen neighborhood cohesion.
