  career_goals: Soo aims to attend a competitive high school program that blends art and technology, eventually earning a scholarship to a university where he can study either architecture, graphic design,
    or user experience (UX) design. He dreams of creating visually compelling digital products that are both aesthetically pleasing and accessible, particularly tools that support mental‑health awareness
    for teens like himself. In the short term, he plans to build a robust art portfolio, win a regional coding competition, and enroll in a summer intensive for illustration. Long‑term, he envisions a career
    that lets him merge his disciplined work ethic with his creative passions, while also giving back to his community by mentoring younger students in art and coding.
