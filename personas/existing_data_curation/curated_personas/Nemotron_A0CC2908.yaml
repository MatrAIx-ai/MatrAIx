personas:
  professional: Soo Chen is an aspiring visual storyteller who blends detailed hand-ink cityscape sketches with interactive Python game narratives, and they apply disciplined organization and a relentless
    pursuit of perfection to deliver polished portfolio pieces.
  sports: Soo Chen prefers low-key physical activity, joining a weekend community badminton club, cheering fervently for the NBA's Golden State Warriors and the Premier League’s Liverpool FC, and they occasionally
    hike local urban trails to sketch scenic views while staying fit.
  arts: Soo Chen finds artistic inspiration in Katsuhiro Otomo’s sprawling cyber-city panels, the atmospheric storytelling of Studio Ghibli’s Hayao Miyazaki, the bold line work of comic artist Fiona Staples,
    and the kinetic energy of contemporary dancer Akram Khan, and they channel these influences into both inked cityscapes and digital character designs.
  travel: Soo Chen dreams of a meticulously planned trip to Tokyo’s Shibuya district to study neon-lit architecture, a weekend getaway to Barcelona’s Gothic Quarter to sketch Gaudí’s mosaics, and they routinely
    explore nearby historic museums on school breaks, balancing wanderlust with a tight teenage budget and parental approval.
  culinary: Soo Chen’s palate favors ramen with rich miso broth, buttery croissants, and matcha-flavored mochi, while they experiment with simple home-cooked stir-fry using soy sauce, ginger, and fresh
    bok choy, and they never miss a chance to indulge in artisanal dark chocolate while sketching.
  core: Soo Chen is a disciplined, anxiety-prone teen who fuses meticulous cityscape art with code, constantly seeks harmony through music and mindfulness, yet they often let perfectionism spark late-night
    drawing marathons and impulsive art-supply splurges.
background:
  cultural: Soo’s family originates from East Asia, with his parents speaking Mandarin at home and emphasizing the value of education, respect, and collective harmony. Growing up in Wilmington, North Carolina,
    he blends traditional Chinese customs—celebrating Lunar New Year with family gatherings, enjoying dumplings and red envelopes—with Southern American influences such as barbecue and community festivals.
    He attends a weekend Chinese language school, which reinforces his bilingual abilities and cultural knowledge, while also participating in local multicultural events organized by the New Hanover County
    Chinese Cultural Association. This bicultural upbringing informs his cooperative demeanor, his appreciation for artistic traditions like calligraphy and ink painting, and his desire to bridge cultural
    gaps through creative work.
