persona_description: A professional civil engineer who specializes in stormwater management and flood control. They are responsible for designing and implementing effective mitigation strategies for flooding
  in Utah, incorporating specific materials into the pavement or concrete surface of roads and highways to collect and detain rain and melting snow. They are also involved in the development of specialized
  forecasts for UDOT's road maintenance crews and snowplow operators, monitoring road surfaces for standing water and dispatching crews to respond to heavy rain bands.
