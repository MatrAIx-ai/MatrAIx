persona_description: A molecular biologist who specializes in the study of DNA structure and function, particularly the double helix. His research interests include the mechanisms by which DNA is coiled
  and wound, the effects of over-winding on DNA structure and function, and the implications of this for biological processes such as cell division and gene expression. He is also interested in the potential
  applications of these findings in medical and biological research.
