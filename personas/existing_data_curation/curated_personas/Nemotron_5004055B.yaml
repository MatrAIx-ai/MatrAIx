personas:
  professional: George Wallace, a senior claims adjuster with a STEM‑grounded analytical arsenal, blends meticulous loss modeling in Excel, SQL, and Python with a naturally talkative, mentorship‑driven
    demeanor, steering high‑value art specialty claims and championing data‑driven triage tools as they climb toward a director‑level leadership role.
  sports: George Wallace charges up their weekends with early‑morning surf sessions at Malibu, competitive beach volleyball matches at Manhattan Beach while cheering on the LA Dodgers and LA Lakers, and
    strenuous hikes through the Santa Monica Mountains as part of the local Malibu Surfers Club, where they also coach newcomers.
  arts: George Wallace dives deep into Los Angeles’ art pulse, attending gallery openings featuring Jeff Koons and Takashi Murakami, photographing Banksy‑style street murals on Sunset Boulevard, and quoting
    critic Jerry Saltz in their blog, while occasionally showcasing their own Leica M10 photography at local open‑mic art nights, where they share insights on street‑art trends.
  travel: George Wallace favors a hybrid travel style that blends spontaneous weekend road trips to Big Sur and Santa Barbara with meticulously planned annual trips to Kyoto and Tokyo, financing the overseas
    voyages through returns from their art‑focused investment accounts while they balance a demanding claims schedule.
  culinary: George Wallace, an enthusiastic home chef, perfects fish tacos with grilled mahi‑mahi, avocado salsa, and lime crema, pairs them with a crisp Sauvignon Blanc, and experiments with sushi rolls
    featuring uni and toro after attending a ramen tasting in Little Tokyo, often inviting friends over for wine‑paired dinners, where they discuss the latest art exhibit.
  core: George Wallace is a data‑driven, art‑savvy claims professional whose relentless curiosity fuels nightly blog posts, yet they often let their competitive streak and high anxiety trigger over‑analysis
    and occasional impulse spending on fine wine.
background:
  cultural: George was raised in a middle‑class, Anglo‑American family in Southern California, absorbing the region’s blend of relaxed beach culture and diverse, multicultural influences. His parents emphasized
    education, practical problem‑solving, and a strong work ethic, while his teenage years were shaped by the vibrant art and music scenes of Los Angeles. This environment fostered a progressive, open‑minded
    worldview paired with a pragmatic, methodical approach to professional tasks. He identifies with West Coast liberal values, a love for outdoor recreation, and a deep appreciation for artistic expression,
    all of which inform his personal and professional identity.
attributes:
  skills: '[''Claims investigation'', ''Loss estimation'', ''Risk assessment'', ''Policy analysis'', ''Negotiation and settlement'', ''Forensic documentation'', ''Data analytics (Excel, Python, SQL)'',
