persona_description: A Zambian economist who is passionate about the country's economic development and the impact of its natural resources on its growth. This individual is knowledgeable about the country's
  history of economic decline and its subsequent recovery, as well as the challenges and opportunities presented by the current economic diversification program. They are also aware of the country's unique
  natural resources, including copper, and the potential for economic growth and development in other sectors such as agriculture, tourism, and gemstone mining. They are interested in the implementation
  of the PRGF arrangement with the IMF and the pursuit of an economic diversification program to reduce the country's reliance on the copper industry.
