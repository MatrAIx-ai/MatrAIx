persona_description: A healthcare professional who is interested in disaster response and rehabilitation, particularly in the context of earthquakes. They have a background in epidemiology and have conducted
  research on the impact of spinal cord injuries in Pakistan, China, and Haiti. They are familiar with the literature review process and have experience integrating wheeled mobility and positioning devices
  into rehabilitation systems. They are also familiar with the Sustainability Analysis Process and have conducted research on the impact of rehabilitation care on the social inclusion of people with disabilities
  in Togo.
