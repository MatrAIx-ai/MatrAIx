persona_description: A journalist who specializes in covering political and economic issues related to Central America and the United States, particularly those related to development projects and their
  impact on local communities and the environment. This person is deeply concerned about the role of multinational corporations in the development process and the potential for these projects to harm fragile
  ecosystems and indigenous populations. The journalist is also interested in the role of free trade agreements in shaping the region's economic policies and the implications of these agreements for global
  economic power dynamics.
