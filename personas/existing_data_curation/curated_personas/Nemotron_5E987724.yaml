personas:
  professional: Roberto Lopez is a seasoned construction manager who leverages bilingual communication, lean construction principles, and a passion for sustainable design to infuse projects with artistic
    motifs drawn from mountain valley celebrations, while meticulously overseeing schedules, budgets, and quality on New England commercial sites.
  sports: Roberto Lopez enjoys playing pick‑up soccer with local teams, cheering for Hartford Athletic and the New England Revolution, and hiking the Appalachian Trail in winter, while they sometimes forgo
    training sessions when project deadlines loom.
  arts: Roberto Lopez frequents the Wadsworth Atheneum and Hartford Stage, attends evening painting classes, and relaxes by playing the cajón in informal jam sessions that blend classic Andean folk rhythms
    with salsa beats, often inspired by the music of Susana Baca.
  travel: Roberto Lopez plans trips that blend adventure and cultural immersion, having trekked the high‑altitude trails near the ancient Andean citadel of Machu Picchu and explored New England coastal
    towns like Mystic and Newport, while they favor budget‑friendly road trips and occasional weekend getaways to Barcelona during festivals, balancing travel with family duties.
  culinary: Roberto Lopez loves cooking traditional dishes such as ceviche, lomo saltado, and causa, often fusing them with New England staples like lobster and maple‑glazed carrots, while they showcase
    culinary skill by mastering the balance of ají, cilantro, and fresh citrus in each recipe.
  core: Roberto Lopez is a meticulous construction manager who channels their love for Andean rituals and art into sustainable building designs, yet often battles stress‑induced worry and a habit of late‑night
    photography sessions.
background:
  cultural: Roberto was born to Peruvian immigrant parents who settled in Connecticut when he was a child. Growing up in a bilingual household, he speaks fluent Spanish at home and English in the broader
    community, allowing him to bridge cultural gaps on construction sites. His family preserves Andean traditions—celebrating Inti Raymi, honoring Inca heritage, and serving dishes like ceviche and causa—while
    also embracing New England customs. He remains active in the local Peruvian American Association, participating in cultural events, dance groups, and community outreach programs. This bicultural identity
    informs his work ethic, emphasizing collective responsibility and respect for craftsmanship, and inspires his interest in integrating Peruvian artistic motifs and sustainable practices into the built
    environment of Hartford.
attributes:
  skills: '[''Project planning and scheduling'', ''Budget development and cost control'', ''Blueprint reading and code compliance'', ''Site supervision and OSHA safety enforcement'', ''Subcontractor selection
