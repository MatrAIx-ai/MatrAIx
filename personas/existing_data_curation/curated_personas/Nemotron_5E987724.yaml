    aesthetic integration'', ''Team leadership and conflict resolution'', ''Risk assessment and crisis management'', ''Bilingual communication (Spanish/English)'']'
  hobbies: '[''Visiting art galleries and museums'', ''Painting and community art classes'', ''Playing cajón and listening to Peruvian folk music'', ''Pickup soccer and team sports'', ''Salsa and cumbia
    dancing'', ''Volunteering at Peruvian cultural festivals'', ''Cooking traditional Peruvian cuisine'', ''Hiking and outdoor recreation'', ''Photography of urban and historic sites'', ''Reading construction
    and architecture journals'', ''Maintaining a DIY home improvement blog'']'
  career_goals: Roberto aims to advance to a senior regional construction director role, overseeing large-scale commercial and mixed-use projects across New England. He is working toward obtaining his GED
    and professional certifications such as PMP and LEED AP to formalize his expertise. A long-term ambition is to launch his own construction consultancy that specializes in sustainable building and culturally
    resonant design, integrating Peruvian artistic motifs into modern architecture. He also wants to mentor Latinx youth entering the trades, develop affordable-housing initiatives in Hartford, and build
    a reputation for delivering projects that balance high performance with community-focused aesthetics. Managing stress and achieving a healthier work-life balance are personal goals that accompany his
    professional aspirations.
