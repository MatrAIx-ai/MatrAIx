personas:
  professional: Angel Martin, a 29-year-old architectural designer proficient in AutoCAD, Revit, Rhino, and Grasshopper, leverages a critical, competitive mindset and a pragmatic love of sustainable design
    to turn generative, code-compliant concepts into buildable mixed-use projects while juggling tight client feedback loops.
  sports: Angel Martin hikes the Pine Ridge trails three times a month to reset their mental state, attends a local indoor climbing gym for strength conditioning, and roots for the Milwaukee Brewers while
    occasionally joining a weekend co-ed soccer league for social balance.
  arts: Angel Martin sketches urban skylines, 3D-prints small architectural models, and draws inspiration from Zaha Hadid, Bjarke Ingels, and sci-fi authors William Gibson and Octavia Butler, while regularly
    attending gallery openings that feature digital parametric installations.
  travel: Angel Martin prefers purposeful travel, having toured Chicago’s architectural landmarks, taken a week-long design-focused trip to Copenhagen’s sustainable neighborhoods, and planning a future
    pilgrimage to Kyoto’s Zen gardens, balancing tight work schedules with limited-budget, off-season itineraries.
  culinary: Angel Martin’s plant-forward palate favors quinoa-seed bowls with roasted root vegetables, miso-glazed eggplant, and a steady supply of matcha lattes, yet they admit a weakness for artisanal
    pizza on Friday nights and often experiment with sous-vide tofu to sharpen culinary precision.
  core: Angel Martin blends a fierce competitive edge with a methodical, curiosity-driven approach, yet struggles with high-octane anxiety that colors both their brilliant designs and occasional impulsive
    habits.
background:
  cultural: Angel grew up in a middle-class, predominantly white suburb of Omaha, where Midwestern values of practicality, self-reliance, and community involvement shaped her worldview. Her family emphasized
    education and encouraged independent thinking, which fostered her skeptical and critical outlook. Exposure to the local architectural heritage—ranging from historic brick warehouses to modern civic
    projects—instilled an appreciation for both tradition and innovation. Though her cultural roots are firmly Midwestern, she regularly travels to Europe and the Pacific Northwest, experiences that broadened
    her design perspective and reinforced her commitment to sustainable, context-responsive architecture.
attributes:
  skills: '[''AutoCAD'', ''Revit'', ''Rhino'', ''Grasshopper'', ''BIM coordination'', ''Parametric modeling'', ''Sustainable design'', ''LEED certification'', ''Construction documentation'', ''Cost estimation'',
