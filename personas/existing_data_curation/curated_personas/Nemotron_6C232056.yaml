  hobbies: '[''Sketching'', ''3D printing'', ''Hiking'', ''Reading (architecture, sci-fi, psychology)'', ''Design meet-ups'', ''Volunteer community clean-up'', ''Yoga'', ''Meditation'', ''Photography of
    built environment'']'
  career_goals: Angel aims to obtain her architectural licensure within the next year and become a project manager on large-scale mixed-use developments in the Midwest. She aspires to lead a design team
    that integrates cutting-edge technology with environmentally responsible practices, eventually launching her own boutique firm that focuses on sustainable urban infill projects. Her competitive drive
    pushes her to win national design competitions and earn recognition for innovative design solutions. Additionally, she plans to continue her education by pursuing a master's degree in urban design to
    broaden her strategic impact, while also developing personal strategies to manage her anxiety and maintain work-life balance.
