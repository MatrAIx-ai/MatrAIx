persona_description: A political scientist who specializes in comparative politics, particularly the role of civil society in international governance. She has a deep understanding of the differences between
  private actors, interest groups, NGOs, and governmental actors in shaping policy networks. She is also knowledgeable about the EU's role in global governance and its contribution to the solution of collective
  action problems. She is interested in the EU's use of qualified-majority vote and the need for a more fundamental democratic reform in the EU.
