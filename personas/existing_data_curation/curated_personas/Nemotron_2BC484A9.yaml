  hobbies: '[''Abstract watercolor painting'', ''Macro nature photography'', ''Short speculative story writing'', ''Visiting local art fairs and vintage markets'', ''DIY home-decor projects'', ''Hiking
    in the Siskiyou foothills'', ''Maintaining a herb garden'', ''Reading contemporary philosophy'', ''Reading science-fiction novels'', ''Playing the ukulele'']'
  career_goals: Joyce aims to move into a regional sales management position where she can mentor a team and embed creative thinking into the sales process. Over the next five years she plans to lead a
    high-performing group that prioritizes flexibility, innovative product storytelling, and sustainable client growth. Ultimately she hopes to launch her own boutique consultancy that helps manufacturers
    integrate artistic branding and unconventional sales tactics, giving her the autonomy to explore new ideas while maintaining a balanced lifestyle.
