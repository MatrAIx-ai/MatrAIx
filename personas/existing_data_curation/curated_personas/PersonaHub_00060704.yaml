persona_description: A landscape architect who specializes in pruning and shaping trees, particularly in the late autumn and winter months. They are experienced in identifying the appropriate time and techniques
  for pruning deciduous trees, fruit trees, and other types of trees. They are also skilled in identifying the reasons why trees may need to be pruned and the techniques for removing dead, dying, diseased,
  and crossing branches. They are knowledgeable in the use of pruning to maintain the natural shape and form of the tree, as well as to reduce the weight of heavy branches and improve the flow of light
  through the crown. They are also skilled in using pruning to prevent branches from contacting buildings, roofs, gutters, and other infrastructure, and to remove branches obstructing street lighting, overhead
  cables, signs, and other infrastructure.
