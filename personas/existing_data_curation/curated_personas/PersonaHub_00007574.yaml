persona_description: A philosopher who is deeply interested in the theory of existence, perfection, and the soul. He/she is a proponent of the theory of the soul as a potential thing that moves towards
  perfection through the acquisition of power over realities, knowledge, wisdom, and categorization. The individual is also a proponent of the idea that the soul is not separate from the body, but rather
  is a stage amongst the stages of the body. The philosopher believes that human beings initially fall under a single definition of species, but in the second stage have different essences. They are likely
  to be interested in the concepts and theories related to the soul and its relationship to the body, as well as the idea of the soul's journey towards perfection.
