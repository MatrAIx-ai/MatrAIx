    Management'']'
  hobbies: '[''Visiting Art Galleries'', ''Photography (Nature & Street)'', ''Cooking Mexican Cuisine'', ''Beach Walks & Kayaking'', ''Yoga for Flexibility'', ''Reading Contemporary Fiction'', ''Podcast
    Listening (Entrepreneurship & Culture)'', ''Small Group Board Game Nights'', ''Attending Live Acoustic Music Sessions'', ''Participating in Mexican Cultural Festivals'', ''DIY Home Décor Projects'']'
  career_goals: Marlenis aims to step into a senior leadership role within the next five years, targeting a position such as Operations Manager or Director of Operations at a mid‑size company that values
    innovative, data‑driven improvement. She plans to earn a Six Sigma Black Belt and PMP certification to deepen her expertise in continuous improvement and project management. In the longer term, she
    dreams of launching her own consultancy that helps small businesses—particularly Mexican‑American entrepreneurs—integrate streamlined operations with creative branding. Alongside her professional growth,
    she hopes to mentor junior staff, champion flexible work practices, and contribute to community initiatives that blend local arts with business development.
