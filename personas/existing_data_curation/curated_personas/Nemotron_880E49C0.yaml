personas:
  professional: Marlenis Lara, a business operations specialist with a flair for data‑driven continuous improvement, blends her curiosity for lean and agile methods with a relaxed approach to deadlines,
    often improvising process tweaks while juggling vendor relationships and bilingual communication to bridge cultural gaps.
  sports: Marlenis Lara enjoys early morning beach walks, weekend kayaking excursions with the local Fort Walton Paddle Club, and practices yoga at the community studio, cheering on the Jacksonville Jaguars
    during football season and the Tampa Bay Rays’ spring training games.
  arts: Marlenis Lara frequents the Emerald Coast Arts Center and the nearby cultural museum, often sketching exhibits inspired by artists like Frida Kahlo and Banksy, and relaxes to acoustic sets by José
    González at intimate local venues.
  travel: Marlenis Lara prefers small‑group, culturally immersive trips, having explored Mexico City’s mural scene, taken a road‑trip along the Gulf Coast to New Orleans, and dreaming of a weekend retreat
    in Asheville’s Blue Ridge Mountains, all while balancing a modest travel budget.
  culinary: Marlenis Lara experiments with modern twists on classic Mexican dishes such as mole poblano with smoked chipotle and quinoa‑based tacos al pastor, enjoys sourcing fresh cilantro and local seafood
    at the Fort Walton farmers market, and rates herself as an intermediate home chef.
  core: Marlenis Lara is a curious yet laid‑back operations thinker who balances data‑driven work, spontaneous art‑filled weekends, and a love for beachside yoga, all while occasionally misplacing paperwork
    and indulging in culinary experiments.
background:
  cultural: Marlenis grew up in a bilingual Mexican household where Spanish and English woven together daily life. Family traditions such as Día de los Muertos, Christmas posadas, and weekend gatherings
    centered around homemade tamales shaped her sense of community and respect for cultural heritage. Her parents instilled a strong work ethic and an appreciation for storytelling through music and art,
    which fuels her curiosity today. After relocating to Fort Walton Beach, she blends her Mexican roots with the coastal Floridian lifestyle, celebrating both Mexican holidays and local events. Her cultural
    identity influences her cooking, her love for vibrant visual art, and her commitment to supporting the Mexican‑American community through mentorship and collaborative projects.
attributes:
  skills: '[''Process Optimization'', ''Lean Six Sigma Methodologies'', ''Data Visualization (Excel, Power BI)'', ''Project Coordination'', ''Vendor Relationship Management'', ''Financial Reporting & Budget
