persona_description: A teacher who is interested in using critical literary analysis and close reading to enhance students' critical thinking and comprehension skills in literature. They are familiar with
  Roland Barthes's The Death of the Author and have a passion for teaching literature to adolescents. They are open to exploring new teaching strategies and have a strong desire to help students develop
  their own interpretations of texts. They are also interested in incorporating the concept of power and subjectivity into their teaching, and they seek to empower their students by giving them the tools
  and knowledge to engage with literature on their own terms.
