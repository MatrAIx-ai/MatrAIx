  hobbies: '[''Sailing'', ''Beach Photography'', ''Cooking Mexican Cuisine'', ''Attending Art Festivals'', ''Playing Acoustic Guitar'', ''Reading Contemporary Literature'', ''Volunteering with Community
    Art Projects'', ''Hiking'', ''Yoga'']'
  career_goals: Modesto aims to advance to a regional operations director role within the next five years, pursuing an MBA to deepen his strategic expertise. He hopes to integrate art and cultural initiatives
    into his company's corporate‑social‑responsibility programs, mentor emerging talent, and eventually open a small community‑focused gallery‑café that blends his love for business, art, and Mexican heritage.
