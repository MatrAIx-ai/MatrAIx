  career_goals: Bradley aims to transition from a clerical bookkeeping role to a senior accounting or supervisory position within the next three years. He plans to obtain the Certified Bookkeeper (CB) credential
    and pursue CPA coursework to enhance his qualifications. His ambition includes leading a small accounting team at a mid-sized firm or launching his own boutique bookkeeping consultancy, allowing him
    to design structured financial systems while maintaining a flexible schedule. He also seeks to mentor junior staff, leveraging his competitive drive to achieve departmental performance targets.
