  hobbies: '["gardening", "cooking Mexican and Californian fusion dishes", "reading historical biographies", "woodworking", "volunteering at senior community center", "hiking in Sonoma County", "wine tasting",
    "playing Mexican folk music on guitar", "participating in local cultural festivals"]'
  career_goals: Although retired from formal employment, George aims to deepen his impact as a community elder. He plans to mentor younger volunteers at the local senior center, expand a community garden
    that provides fresh produce for low‑income families, and develop a series of cooking workshops that teach Mexican‑California fusion recipes. He also hopes to document his family’s migration story in
    a memoir, preserving cultural heritage for his grandchildren and the broader Mexican‑American community. George’s ambitions are guided by his desire to foster harmony, share knowledge, and leave a lasting,
    practical legacy.
