  career_goals: Although retired, Leslie aims to leave a lasting legacy in her community. She plans to volunteer as an adult‑literacy mentor at the local library, share her teaching experience through occasional
    workshops for new educators, and complete a memoir that weaves together family history and the lessons she has learned. She also hopes to master digital photography to document her genealogy work and
    to continue lifelong learning by enrolling in online courses on American history and art.
