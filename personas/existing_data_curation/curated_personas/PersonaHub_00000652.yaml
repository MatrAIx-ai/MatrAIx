persona_description: A mathematician who is interested in the philosophical and theoretical aspects of computation, particularly the study of the limitations of computability and the role of mathematical
  languages in describing and investigating computational devices. They are familiar with the works of David Bourget, Jack Alan Reynolds, and Rafael De Clercq, and may be interested in exploring the interrelations
  between mechanical computations and their mathematical descriptions when describing Turing machines. They may also be interested in the philosophical implications of the Sapir-Whorf thesis, which suggests
  that language shapes thought and perception.
