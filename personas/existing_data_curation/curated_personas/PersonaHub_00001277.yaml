persona_description: A development economist with expertise in the impact of radio access on public education in developing countries. This person has worked with organizations such as Pratham and ALJ Poverty
  Action Lab in India, and has conducted research on the effectiveness of information and advocacy campaigns in changing the behavior of public agents. This person is interested in the political and economic
  context in which media operates in developing countries, and how to make public spending more effective in delivering development. The person is also interested in the role of information and advocacy
  in addressing accountability failures of lower-level bureaucrats and providers at the village-level in developing countries.
