personas:
  professional: Steven Maldonado, 24, is a Detroit auto‑parts assembler whose expertise in CNC milling, MIG/TIG welding, and ISO 9001 quality inspections drives flawless production runs, while they apply
    a methodical, structure‑loving personality to ensure meticulous work‑order adherence, proactive maintenance, and clear communication with a small team, positioning them as a natural candidate for lead
    assembler and future shift supervisor.
  sports: Steven Maldonado, 24, channels their competitive drive into a Saturday boxing class at the community center and a local amateur soccer league that meets on Sunday afternoons, while they avidly
    follow the Detroit Lions, Detroit Tigers, and Detroit City FC, tracking personal performance metrics with a smartwatch to balance cardio and strength conditioning.
  arts: Steven Maldonado, 24, finds artistic balance in woodworking, setting smooth grain finishes to classic blues tracks by Stevie Ray Vaughan and classic rock anthems by AC DC, while they unwind by savoring
    cinematography from Guillermo del Toro and admiring street murals by Shepard Fairey, all of which fuel the creative flair evident in their custom metalwork.
  travel: Steven Maldonado, 24, prefers road‑trip itineraries that combine mechanical curiosity with scenic relaxation, having driven the Pacific Coast Highway to study coastal engineering, toured the auto
    museums of Stuttgart, Germany, and planning a future summer venture to the Upper Peninsula to weld a custom bike frame in a secluded lakeside cabin, all while they balance a modest travel budget.
  culinary: Steven Maldonado, 24, cooks with a hands‑on precision reminiscent of their workshop, mastering tacos al pastor with achiote‑marinated pork, chipotle‑spiced tamales wrapped in fresh corn husks,
    and hearty pozole seasoned with hominy, radish, lime, and oregano, sourcing pork shoulder, masa harina, and dried chiles from local markets, and they experiment with sous‑vide techniques for perfect
    meat tenderness.
  core: Steven Maldonado, 24, blends a disciplined, assembly‑line mindset with a passion for classic car restoration, strategic gaming, and late‑night taco cooking, while they balance meticulous planning
    with a habit of hoarding tools and occasional procrastination on paperwork.
background:
  cultural: Steven grew up in a Mexican‑American household in Southwest Detroit. His parents immigrated from Jalisco, Mexico, and raised him speaking both Spanish and English. Family traditions such as
    celebrating Día de los Muertos, Mexican Independence Day, and cooking holiday meals are central to his cultural identity. The close‑knit extended family provides a strong support network, reinforcing
    values of hard work, respect, and communal responsibility. Steven frequently participates in local Hispanic community events, volunteer initiatives, and cultural festivals that highlight Mexican music,
    dance, and cuisine. This blend of Mexican heritage and Detroit’s industrial environment shapes his pragmatic, disciplined approach to work and life, while also grounding him in a vibrant cultural community.
attributes:
  skills: '[''Mechanical assembly'', ''Blueprint interpretation'', ''CNC milling operation'', ''CNC lathe operation'', ''MIG/TIG welding'', ''Quality inspection (ISO 9001)'', ''Preventive maintenance'',
    ''OSHA safety compliance'', ''Team coordination'', ''Basic CAD reading'', ''ERP system usage'']'
  hobbies: '[''Car restoration'', ''Motorbike customization'', ''Woodworking'', ''Cooking Mexican cuisine'', ''Strategic video gaming'', ''Boxing'', ''Community soccer'', ''Riverfront walking'']'
  career_goals: Steven aims to advance from an assembler to a lead assembler and then to a shift supervisor within the next three to five years. He plans to earn certifications such as CNC programming,
    OSHA 30‑hour, and a Six Sigma Yellow Belt to strengthen his supervisory credentials. In the longer term, he hopes to complete an associate degree in manufacturing technology through a local community
    college and eventually move into a production manager role, overseeing larger teams and process improvements. His ultimate ambition is to open his own small fabrication shop that serves local automotive
    and custom‑metalwork clients, blending his technical expertise with entrepreneurial aspirations.
