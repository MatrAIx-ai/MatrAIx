persona_description: A linguist who is interested in the study of applied linguistics and critical applied linguistics, with a particular focus on the analysis of the language use of working class Londoners,
  including the cockney dialect. This person is knowledgeable about the history and development of the dialect, as well as its distinctive features and the challenges it faces in the modern era. They are
  also interested in the impact of multicultural immigrants on the dialect and the potential for it to disappear. The persona is likely to be involved in research and teaching related to applied linguistics
  and critical applied linguistics, and may have expertise in areas such as English grammar, cognitive linguistics, sociolinguistics, discourse analysis, Arabic-English translation, research writing, English
  as a second language (ESL), and TESOL. They may also have experience in teaching English as a foreign language (EFL) and may be interested in the use of technology in language教学.
