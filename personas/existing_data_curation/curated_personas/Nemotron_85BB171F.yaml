  hobbies: '[''Visiting art galleries'', ''Sketching and watercolor painting'', ''Cooking Mexican dishes'', ''Experimenting with cocktail recipes'', ''Hiking in the Sawtooth foothills'', ''Gardening'',
    ''Attending community festivals'', ''Playing soccer with friends'', ''Watching movies'', ''Listening to music (regional Mexican, rock, folk)'', ''Volunteer work at cultural events'']'
  career_goals: Jose aims to move into a supervisory role within the next two years, seeking a position as assistant manager at his current restaurant or a similar establishment. He plans to complete his
    GED and enroll in a community‑college certificate program in hospitality management to strengthen his credentials. Long‑term, he dreams of opening a family‑run café that blends Mexican culinary traditions
    with local Idaho flavors, featuring occasional art showcases and live music. In parallel, he hopes to refine his mixology skills, obtain ServSafe certification, and become a trusted mentor for younger
    staff members. Achieving financial stability for his family while preserving his cultural heritage remains a core motivation.
