personas:
  professional: Jose Alvarez, a 46‑year‑old front‑of‑house specialist known for methodical organization and bilingual charm, leverages high‑volume service expertise, meticulous inventory control, and a
    natural knack for training staff, and they consistently earn praise for calm conflict resolution as they pursue an assistant‑manager promotion.
  sports: Jose Alvarez enjoys weekend soccer matches with friends at the local field, cheers for the Boise State Broncos football team, and they regularly hike the Sawtooth foothills, often joining a community
    trail club that meets Saturday mornings to stay fit and enjoy Idaho's outdoors.
  arts: Jose Alvarez frequents the Boise Art Museum and the Riverstone Gallery, sketches watercolor scenes of downtown murals, and they are an avid fan of Diego Rivera‑style mural art and classic rock icons
    like Bruce Springsteen, which inspire both their drawings and cocktail experiments.
  travel: Jose Alvarez prefers road‑trip adventures that blend scenic drives with culinary stops, having explored Napa Valley's wine country and Santa Fe's historic plazas, and they dream of a summer trek
    to the Canadian Rockies to hike new trails and sample local craft beers.
  culinary: Jose Alvarez excels at preparing traditional mole poblano and sizzling carne asada, experiments with Idaho potatoes and trout in fusion dishes like chipotle‑infused trout tacos, and they run
    a home bar where they craft smoky mezcal‑based cocktails featuring agave syrup and fresh jalapeño garnish.
  core: Jose Alvarez is a sociable, detail‑driven restaurant veteran who balances a love for art, garden‑fresh cooking, and weekend soccer with disciplined budgeting and a steady eye on future entrepreneurship.
background:
  cultural: Jose's cultural roots are firmly planted in Mexican traditions, which shape his worldview and daily life. He grew up speaking Spanish at home and celebrating holidays such as Día de los Muertos,
    Cinco de Mayo, and the Feast of Our Lady of Guadalupe with family gatherings, traditional foods, and music. These customs influence his cooking style, his warm hospitality, and his sense of community.
    While living in Burley, Idaho, he has blended his heritage with the local culture, adopting regional customs and forming bonds with neighbors from diverse backgrounds. His bilingual ability enables
    him to act as a cultural bridge, and he often shares Mexican stories, recipes, and art with his colleagues and neighbors. He values family loyalty, respect for elders, and the spirit of festivity, which
    he carries into his professional and social interactions.
attributes:
  skills: '[''Customer Service'', ''Bilingual Communication (Spanish/English)'', ''Food Safety & Hygiene'', ''Bar Assistance & Basic Mixology'', ''Inventory Management'', ''Shift Scheduling & Coordination'',
