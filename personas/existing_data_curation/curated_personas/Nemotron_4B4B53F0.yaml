  career_goals: Jerry aims to transition into a senior consultancy role where he can advise municipalities on seismic retrofitting and climate‑resilient infrastructure, leveraging his practical expertise
    while satisfying his curiosity about emerging sustainable technologies. Over the next three years, he plans to earn an advanced certification in Sustainable Infrastructure and to lead a mentorship program
    within his firm to pass on his knowledge to younger engineers. He also intends to serve on the Placentia Planning Commission as a volunteer, contributing his professional perspective to local development
    decisions. While gradually reducing his workload toward semi‑retirement, Jerry hopes to remain involved in a select few high‑impact projects that align with his passion for safe, sustainable public
    works, and to author a technical guide on integrating GIS data into civil engineering project management.
