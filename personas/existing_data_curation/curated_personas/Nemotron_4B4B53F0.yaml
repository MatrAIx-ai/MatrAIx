personas:
  professional: A veteran civil engineer with three decades of experience, Jerry Wheeler leverages advanced BIM tools, seismic retrofit expertise, and a pragmatic curiosity to deliver resilient infrastructure,
    and they channel their meticulous nature into both project leadership and hands‑on mentorship.
  sports: An avid hiker and occasional long‑distance walker, Jerry Wheeler trails the coastal cliffs of Orange County with the local Orange County Hiking Club, they cheer for the LA Lakers and the San Jose
    Earthquakes from home, and they belong to the senior cycling group at the downtown bike shop.
  arts: A dedicated amateur photographer and carpenter, Jerry Wheeler spends weekends capturing the dramatic silhouettes of the Pacific coastline inspired by Ansel Adams, they listen to the Boston Symphony
    while shaping reclaimed oak tables, and they frequent the Pacific Repertory Theatre for contemporary staging.
  travel: A methodical planner with a love for scenic routes, Jerry Wheeler maps out weekend road trips to Big Sur and the redwoods, they also dream of photographing the historic Charles Bridge in Prague
    and have a wish list that includes New Zealand’s fjordlands and the vineyards of Tuscany.
  culinary: A meticulous home‑brewer and competent cook, Jerry Wheeler enjoys crafting IPAs with locally sourced hops while perfecting fish tacos with grilled avocado, they often pair their meals with a
    side of fresh herbs from the community garden and experiment with sourdough loaves in their kitchen.
  core: Jerry Wheeler is a detail‑driven engineer‑turned‑hobbyist who balances solitary precision projects with occasional indulgences, and they navigate semi‑retirement with a pragmatic curiosity and a
    habit of over‑checking the weather before every hike.
background:
  cultural: Jerry grew up in the Midwest before his family relocated to Southern California in his early twenties, drawn by the region’s growing infrastructure opportunities. He embraces the suburban, family‑oriented
    culture of Orange County while respecting its diverse, multicultural environment. His upbringing emphasized self‑reliance, community participation, and modest celebrations of holidays such as Thanksgiving
    and the Fourth of July, which he shares with his wife and two adult children. Although he identifies as white American, Jerry’s professional life has taught him to value the varied perspectives of a
    multicultural workforce, influencing his collaborative work style and his commitment to inclusive community projects like local garden initiatives and city planning efforts.
