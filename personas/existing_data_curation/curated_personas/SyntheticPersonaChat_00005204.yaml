    User 1: So, what else do you like to do for fun?

    User 2: I also love to read and watch movies. I''m a big fan of science fiction and fantasy.

    User 1: Me too! I love science fiction and fantasy. I''m a big fan of Star Wars and Lord of the Rings.

    User 2: Oh, those are two of my favorites too! I also love Harry Potter.

    User 1: Me too! I love Harry Potter.

    User 2: So, what do you do for a living?

