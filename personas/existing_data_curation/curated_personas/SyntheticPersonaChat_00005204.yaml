    User 1: Oh, that sounds great. I love the beach.

    User 2: Me too! I''m so excited.

    User 1: So, what else do you have planned for this summer?

    User 2: Not much, just working and hanging out with my friends.

    User 1: Sounds like a good plan.

    User 2: Yeah, I think it is.'
