persona_description: A marine biologist who specializes in coral reef ecology, particularly the role of staghorn coral in the ecosystem and the decline of coral populations due to white-band disease and
  human activity. He has conducted genetic studies of coral populations throughout the Caribbean and has identified areas of gene flow to locate potential recruits for coral nurseries. His research interests
  include the genetic connectivity between populations within the Caribbean and the potential for non-native recruits to cause issues such as local adaptation and high levels of genetic structure within
  populations. He is working to develop management plans to boost local populations using local coral nurseries sites and has advised against the introduction of non-native staghorn corals from nurseries
  to boost population declines.
