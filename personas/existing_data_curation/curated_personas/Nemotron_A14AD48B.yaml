  hobbies: '[''Reading science and adventure books'', ''Lego building'', ''Drawing and painting'', ''Soccer'', ''Playing the recorder'', ''Scratch coding'', ''Chess'', ''Puzzles'', ''Church youth group
    activities'', ''Nature walks'']'
  career_goals: Daniel dreams of exploring the world beyond his hometown. He aspires to become an astronaut or an aerospace engineer, fascinated by space travel and the mechanics of rockets, and hopes to
    one day conduct experiments that help solve real‑world problems. He also imagines playing soccer professionally, aiming to lead a team to victory. In the near term, he wants to win his school’s science
    fair, become captain of his soccer team, and earn a spot in a regional chess tournament. He is determined to stay organized, work hard, and turn his curiosity into a career that lets him discover new
    ideas while competing at the highest level.
