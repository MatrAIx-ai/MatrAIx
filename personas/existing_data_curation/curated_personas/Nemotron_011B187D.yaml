personas:
  professional: Jacob Cecil is a seasoned culinary operations specialist with three decades of high‑volume kitchen experience, certified in ServSafe, who blends meticulous menu planning and cost control
    with a warm, talkative leadership style that makes them a natural mentor for younger staff.
  sports: Jacob Cecil is an avid weekend fisherman who frequents the Gulf’s mangrove flats for tarpon and snapper, and they cheer on the Tampa Bay Rays and the Miami Dolphins from their porch, participate
    in a local seniors’ bowling league, and enjoy occasional paddling at the nearby Everglades National Park.
  arts: Jacob Cecil is a backstage volunteer and occasional supporting actor at his town’s community theater, a fan of classic rock legends like Lynyrd Skynyrd and Johnny Cash, and they often strum a well‑worn
    acoustic guitar at family gatherings while quoting lines from John Wayne films they admire.
  travel: Jacob Cecil prefers meticulously planned short getaways, taking their family on weekend road trips to the Keys for sunset shrimp boils, revisiting historic Savannah for its southern charm, and
    dreaming of a spring cruise to the Caribbean’s Bahamian islands to sample island spices while staying within a modest travel budget, and they value a balance of relaxation and exploration.
  culinary: Jacob Cecil excels at marrying Southern comfort food with Gulf Coast seafood, perfecting dishes like shrimp étouffée, fried chicken with buttery biscuits, and pepper‑infused tomato salsa, while
    they proudly grow their own basil, thyme, and hot peppers, yet they occasionally over‑sauce their barbecue sauces out of enthusiasm.
  core: Jacob Cecil is a sociable, structure‑loving senior chef who turns every barbecue into a community celebration, meticulously balances budgets, monitors his health, and still finds time to jam on
    a guitar despite the occasional over‑salting habit, and they always make sure everyone feels included.
background:
  cultural: Jacob is a white American who grew up in the North Port area of Florida, steeped in the traditions of the Gulf Coast and classic Southern hospitality. His family emphasized community, church
    participation, and home‑cooked meals, passing down recipes for fried chicken, biscuits, and fresh seafood. He identifies with the "Old Florida" culture that values outdoor recreation, family gatherings,
    and a respectful, neighborly demeanor. While primarily rooted in mainstream white American culture, Jacob appreciates the multicultural flavors of South Florida, integrating subtle influences from the
    region's diverse culinary scene into his cooking. He maintains a modest Protestant background, reinforcing values of kindness, cooperation, and service to others.
attributes:
  skills: '[''ServSafe food safety certification'', ''Culinary preparation (grilling, frying, baking, seafood)'', ''Menu planning and recipe development'', ''Kitchen inventory and stock management'', ''Budgeting
