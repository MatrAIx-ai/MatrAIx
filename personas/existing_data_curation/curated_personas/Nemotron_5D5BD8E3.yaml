  career_goals: Lazara aspires to pursue a practical and people-focused career that allows her to support her family and community. She is interested in becoming a dental assistant or a certified nursing
    aide, roles that combine hands-on work with caring for others. In the medium term, she plans to attend a community college in Santa Barbara to earn a health-sciences certificate, and eventually she
    hopes to work in a clinic serving the Latino community while continuing her involvement in local cultural events.
