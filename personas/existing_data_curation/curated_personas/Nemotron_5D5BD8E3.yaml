personas:
  professional: Lazara Santillana, a high‑school student who volunteers as assistant coach for her school’s soccer team, blends her natural organizational flair with an outgoing spirit to plan practice
    drills, manage equipment, and foster teamwork, while dreaming of a future career in community sports development.
  sports: Lazara Santillana thrives in the city’s youth soccer league, where she plays forward for the Tigers Club, follows the LA Galaxy and the Mexican women’s national team for tactical inspiration,
    and squeezes in morning jogs along the beach to stay fit, even though she occasionally neglects cool‑down stretches.
  arts: Lazara Santillana shines in her school’s folkloric dance troupe, channeling the rhythmic storytelling of Lila Downs and the vibrant choreography of Carlos Santana’s performances into her own routines,
    while also sketching comic panels of her favorite graphic novel heroes during free periods.
  travel: Lazara Santillana prefers family‑oriented trips that blend sun and culture, like weekend getaways to the Riviera Maya’s white‑sand beaches, a spring break hike through the pine‑forested highlands
    of Guanajuato, and dreaming of a future adventure to Kyoto’s cherry‑blossom festivals.
  culinary: Lazara Santillana loves cooking with her grandmother, mastering dishes such as chicken pozole, homemade guacamole with ripe Hass avocados, and sweet cajeta‑drizzled churros, while proudly wielding
    her well‑worn cast‑iron skillet like a miniature chef’s wand.
  core: Lazara Santillana is a routine‑loving, socially vibrant teen who balances soccer, dance, and family cooking, yet secretly hoards candy wrappers in her backpack for late‑night cravings.
background:
  cultural: Lazara comes from a Mexican-American family rooted in the traditions of Southern California’s vibrant Latino community. She grew up speaking Spanish at home while attending English-language
    schools, celebrating holidays such as Día de los Muertos, Las Posadas, and Mexican Independence Day with family gatherings and community parades. Her Catholic upbringing and close-knit extended family
    emphasize respect, hospitality, and collective responsibility. Living in Santa Barbara, she blends these cultural values with the coastal, multicultural environment, participating in local festivals,
    school multicultural clubs, and neighborhood gatherings that highlight her bicultural identity.
