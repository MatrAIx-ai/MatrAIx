persona_description: A biologist who specializes in the study of speciation, particularly the mechanisms and processes behind the formation of new species. They are particularly interested in the role of
  genetic differences and assortative mating in driving speciation. They have conducted research on a wide range of organisms, including birds, butterflies, mosquitoes, fish, and other animals, and have
  published several papers on the topic. They are known for their pragmatic approach to defining species and for their ability to analyze the genomes of wild creatures, including closely related ones.
