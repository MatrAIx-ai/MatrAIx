  hobbies: '["Reading classic literature", "Watercolor painting", "Knitting and crocheting", "Gardening (herbs and roses)", "Birdwatching", "Crossword puzzles", "Genealogy research", "Listening to classical
    music", "Attending small art exhibitions", "Volunteering at the local library"]'
  career_goals: Even at 98, Alexa is driven to leave a lasting legacy of service and knowledge. She aims to become a volunteer archivist for the Smithville Historical Society, documenting oral histories
    of longtime residents. She also aspires to mentor new reception staff, sharing her disciplined approach to organization and customer care. Continuing her lifelong learning, she hopes to master modern
    digital archiving tools to ensure the town's records are preserved for future generations. Additionally, she plans to complete a memoir capturing her personal experiences and the evolution of her community
    over the past century.
