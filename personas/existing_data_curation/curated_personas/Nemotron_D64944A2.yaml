personas:
  professional: Alexa Hartman, a 98‑year‑old former reception desk stalwart turned volunteer archivist for the Smithville Historical Society, uses decades of meticulous record‑keeping, precise data entry,
    and a soothing telephone manner to curate oral histories and mentor new front‑desk staff; they also infuse genealogical discoveries with poetic insight, maintaining a calm, disciplined environment that
    mirrors their imaginative curiosity and high standards.
  sports: Alexa Hartman enjoys gentle morning walks in the town park to birdwatch and participates in light stretching routines at the senior center’s tai chi class; they are a devoted fan of the Smithville
    Tigers high‑school basketball team, never missing a home game, and occasionally join the local shuffleboard league for light competition, preferring low‑impact activity that aligns with their age‑appropriate
    fitness level.
  arts: Alexa Hartman spends afternoons painting watercolor botanicals and Tennessee hillscapes, drawing inspiration from Monet’s soft palettes and Cassatt’s domestic scenes, while listening to Beethoven’s
    Symphony No 9 and attending intimate exhibitions at the county library featuring local artists like Ellen Fry; they also recite Emily Dickinson poems to their garden roses, weaving artistic appreciation
    into daily life.
  travel: Alexa Hartman favors relaxed, organized trips, having taken senior escorted tours to the Great Smoky Mountains, historic Boston’s Freedom Trail, and a literary pilgrimage to Stratford‑upon‑Avon;
    they dream of a gentle river cruise along the Thames to visit the gardens that inspired classic poetry, yet they limit travel to short stays due to health considerations and a preference for familiar
    routines.
  culinary: Alexa Hartman delights in simple, herb‑forward cooking, regularly preparing rosemary‑infused vegetable soup, chamomile‑lavender tea, and rose petal jam for charity bake sales, while their proudest
    culinary triumph is a flaky peach cobbler topped with a dusting of cinnamon; they are a competent home cook who prefers fresh, locally sourced produce and enjoys occasional meals at the town diner for
    its chicken‑fried steak, though they have a habit of over‑salting recipes when distracted by a crossword puzzle.
  core: Alexa Hartman blends a century of disciplined service, boundless curiosity, and quiet creativity into a life of meticulous archiving, gentle stewardship of community traditions, and artistic expression
    that thrives amid the comforts of routine.
background:
  cultural: Alexa grew up in a tight‑knit white Southern family in rural Warren County, Tennessee. Her upbringing was steeped in Southern hospitality, church involvement (Methodist), and a deep respect
    for community traditions. She learned the values of courtesy, humility, and self‑reliance from generations of farm and small‑town living. While she briefly attended college in Knoxville, she returned
    to Smithville, where she built a career in local civic service. Her cultural identity includes a love for Southern cuisine (biscuits, fried chicken, sweet tea), storytelling rooted in Appalachian folklore,
    and an appreciation for country and gospel music, though her personal tastes lean toward classical compositions. This background shapes her commitment to harmony, cooperation, and preserving the heritage
    of her hometown.
