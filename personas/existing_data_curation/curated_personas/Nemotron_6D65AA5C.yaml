    ''Bilingual patient communication (Spanish/English)'', ''Process improvement and audit preparation'']'
  hobbies: '[''Meal planning and cooking traditional Spanish recipes'', ''Bullet journaling and planner organization'', ''Weekly hikes in the Colorado foothills'', ''Yoga and mindfulness meditation'', ''Crossword
    and Sudoku puzzle solving'', ''Volunteer health education at Spanish-language community events'', ''Herb gardening'', ''Reading scientific literature on health technology'']'
  career_goals: She aspires to transition from a hands‑on technologist to a senior laboratory manager within the next five years, overseeing a high‑performing team and ensuring consistent, error‑free operations.
    She plans to obtain the ASCP Laboratory Management certification and to lead initiatives that streamline workflow through evidence‑based SOPs and automation. Long‑term, she envisions a role in health
    informatics where she can combine her technical expertise with data analytics to improve patient outcomes while maintaining a predictable, structured schedule that aligns with her preference for routine.
