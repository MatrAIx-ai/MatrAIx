  hobbies: '[''Watercolor painting'', ''Vietnamese calligraphy'', ''Reading historical biographies'', ''Listening to Vietnamese classical music'', ''Herb gardening'', ''Quiet walks in parks'', ''Cooking
    family recipes'', ''Journaling'', ''Documentary watching'', ''Tai Chi'']'
  career_goals: Although retired, Angelita aspires to compile a memoir of her family's migration journey and publish a small collection of her watercolor paintings that blend Vietnamese motifs with Californian
    landscapes. She hopes to become a volunteer docent at the Kern County Museum, guiding visitors through Southeast Asian art exhibits, and to mentor younger members of the local Vietnamese community in
    cooking and traditional crafts. Maintaining her health, staying mentally active, and ensuring her grandchildren retain a strong sense of cultural identity remain central to her ambitions.
