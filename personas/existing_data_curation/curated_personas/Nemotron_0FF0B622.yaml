  hobbies: '[''Bird Watching'', ''Hiking in Local Nature Trails'', ''Community Volunteer Events'', ''DIY Habitat Construction'', ''Cooking Tex-Mex Cuisine'', ''Learning Spanish'', ''Playing Acoustic Guitar'',
    ''Gardening'', ''Attending Local Music Festivals'', ''Reading Natural History Books'']'
  career_goals: Martin aims to advance to a regional director role at a wildlife rehabilitation network, where he can integrate his business acumen with animal welfare leadership. He plans to earn veterinary
    technician certification, spearhead community education initiatives that link local schools with conservation projects, and eventually launch his own nonprofit sanctuary that employs sustainable business
    models to provide lifelong care for rescued wildlife.
