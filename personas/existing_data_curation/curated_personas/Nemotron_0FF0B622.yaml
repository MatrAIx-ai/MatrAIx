personas:
  professional: Martin Teague, a seasoned wildlife rehabilitation manager, merges his business management expertise with hands‑on animal husbandry, applying methodical record‑keeping, calm resilience, and
    assertive leadership to streamline budgets, design low‑stress habitats, and coordinate community education programs, and they consistently mentor staff with patience and clarity.
  sports: Martin Teague, an avid hiker and member of the Hill Country Hiking Association, plays weekend softball with a local co‑ed league, follows the Dallas Mavericks and Houston Astros, and they incorporate
    bird‑watching treks into their fitness regimen to stay active and connected to nature.
  arts: Martin Teague, a regular at the downtown acoustic jam nights, draws musical inspiration from John Mayer, Nanci Griffith, and the folk‑rock storytelling of Bob Dylan, while they also cherish the
    narrative elegance of David Attenborough and Carl Sagan, blending music and natural‑history in their creative expression.
  travel: Martin Teague favors meticulously planned wildlife‑focused trips, having explored Costa Rica’s rainforests, the Galápagos Islands, and the Texas Hill Country, and they dream of a guided bird‑watching
    expedition to Patagonia to practice Spanish in the field.
  culinary: Martin Teague enjoys crafting Tex‑Mex fare such as smoky chipotle chicken enchiladas, fresh guacamole with hand‑picked cilantro, and homemade ranch‑style beans, often sourcing heirloom corn
    and chilies from their modest garden to add authentic flavor to their dishes.
  core: Martin Teague blends pragmatic business acumen with a relentless curiosity for wildlife, balancing methodical planning with sociable community engagement, and they habitually hum acoustic chords
    under a steady, resilient calm.
background:
  cultural: Martin grew up in a small Texas town within a White, Anglo‑American family that valued independence, hard work, and Southern hospitality. Living in McAllen, near the U.S.–Mexico border, he has
    absorbed a rich blend of Texan and Mexican cultural influences—enjoying bilingual interactions, regional cuisine, and community festivals. This crossover shapes his open‑minded, sociable demeanor while
    maintaining the pragmatic and organized traits nurtured by his upbringing and business education.
attributes:
  skills: '[''Animal Husbandry'', ''Veterinary Assistance'', ''Facility Management'', ''Budgeting and Financial Planning'', ''Inventory Control'', ''Regulatory Compliance'', ''Staff Training and Supervision'',
