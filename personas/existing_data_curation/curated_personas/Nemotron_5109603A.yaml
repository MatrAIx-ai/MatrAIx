  hobbies: '["Gardening (native Floridian plants)", "Birdwatching", "Reading historical fiction and biographies", "Small book club participation", "Quilting and textile crafts", "Cooking Southern-inspired,
    health-conscious meals", "Genealogical research and family scrapbook creation", "Volunteer reading circle facilitator at senior center", "Basic technology tutoring for seniors", "Day trips to nearby
    coastal towns"]'
  career_goals: Although retired from formal teaching, Cheyenne aims to stay intellectually vibrant by mentoring younger educators through occasional workshops and one‑on‑one coaching. She wishes to document
    and share the teaching methods she refined over her career by publishing a reflective memoir and a series of practical guides for senior education. Cheyenne is also dedicated to preserving local history;
    she plans to collaborate with the Port Charlotte Historical Society to curate oral histories and digitize archival materials. Another ambition is to expand the community garden program she volunteers
    with, integrating intergenerational activities that connect school children with seniors. Finally, she seeks to deepen her digital fluency, earning a certificate in senior‑focused technology support
    to better assist peers in embracing new tools.
