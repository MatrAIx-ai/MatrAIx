  hobbies: '[''Abstract watercolor painting'', ''Pottery'', ''Reading contemporary fiction and magical realism'', ''Philosophy and abstract thought'', ''Cooking Mexican cuisine with creative twists'', ''Volunteer
    financial counseling for immigrant families'', ''Community art workshops'', ''Photography of Nebraska landscapes'', ''Spontaneous day trips and nature walks'']'
  career_goals: Rosa aims to transition into a senior advisory role where she can blend her technical accounting expertise with her passion for creativity, such as becoming a finance consultant for nonprofit
    and community organizations. She wishes to develop and lead a financial‑literacy program for Mexican‑American families in Omaha, helping them navigate budgeting, taxes, and entrepreneurship. Long‑term,
    she envisions taking on a part‑time teaching position at a local community college, sharing both rigorous accounting principles and innovative, visual approaches to financial analysis. Throughout her
    career progression, Rosa seeks to maintain a balanced workload that reduces stress while allowing her to mentor the next generation of accountants.
