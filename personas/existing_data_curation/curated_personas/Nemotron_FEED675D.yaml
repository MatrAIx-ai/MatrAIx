personas:
  professional: Rosa Salas, a seasoned accountant and auditor, leverages advanced Excel, SQL, and Tableau expertise to turn complex financial data into visual stories, while her imaginative, spontaneous
    nature drives her to redesign audit methodologies with creative flair, even though she sometimes struggles with tight deadlines.
  sports: Rosa Salas enjoys low‑impact fitness, regularly walking the Nebraska prairie with the Omaha Trailblazers Hiking Club, cheering on Saturday Cornhuskers football games, and following the Omaha Storm
    baseball team, preferring gentle movement over high‑intensity workouts.
  arts: Rosa Salas paints abstract watercolors inspired by the emotive palettes of Mark Rothko and the fluid forms of Georgia O'Keeffe, shapes pottery in the loose, experimental style of contemporary ceramist
    Erin Pozzi, and finds solace reading magical realism by Isabel Allende while listening to the introspective folk songs of Sufjan Stevens.
  travel: Rosa Salas favors spontaneous weekend road trips across the Great Plains, capturing sunsets at Chimney Rock and the sand dunes of Great Sand Hills, while dreaming of an immersive cultural tour
    through Oaxaca’s art markets and the historic streets of Seville.
  culinary: Rosa Salas, an adept home chef, perfects traditional mole poblano and enchilada soufflé, then experiments by infusing them with Midwestern heirloom corn and smoked sage, often using dried chilies,
    masa harina, and locally sourced honey to craft inventive fusion dishes.
  core: Rosa Salas blends analytical rigor with boundless creativity, turning numbers into narratives while painting her life’s canvas with colors of compassion and occasional chaos.
background:
  cultural: Rosa’s Mexican heritage is a vibrant thread in her identity. Raised in a bilingual household, she grew up celebrating traditions such as Día de los Muertos, Semana Santa, and family gatherings
    centered around shared meals and music. The cultural values of familismo, respeto, and búsqueda de armonía shape her compassionate and cooperative demeanor, driving her desire to help others and maintain
    harmony in her professional and personal circles. While living in Omaha, she blends Mexican customs with Midwestern values, participating in local festivals like the Omaha Mexican Festival and volunteering
    with the Mexican American Chamber of Commerce. Her cooking preserves family recipes passed down through generations, and she often shares these dishes with friends and neighbors, fostering cultural
    exchange and community bonding.
attributes:
  skills: '[''Financial reporting'', ''Audit planning and execution'', ''Tax compliance'', ''Data analysis and visualization'', ''Advanced Excel and SQL'', ''Internal controls design'', ''Risk assessment'',
