personas:
  professional: Joann Batte is a 17‑year‑old budding community organizer who uses her Microsoft Office and social‑media savvy to schedule volleyball tournaments, theater productions, and animal‑shelter
    volunteer rosters, while pursuing a GED and eyeing a hospitality‑management certificate or CNA credential.
  sports: Joann Batte plays on the Appleton West Girls Volleyball team in the fall, joins Appleton United Soccer Club for spring league matches, trains on weekend hikes for cardio, and avidly watches the
    Green Bay Packers, Milwaukee Brewers, and Milwaukee Bucks, balancing team commitment with a personal fitness routine that includes yoga stretches for injury prevention.
  arts: Joann Batte immerses herself in Appleton's community theater, starring in the high‑school production of Grease and handling lighting for The Little Mermaid, while her playlist features Taylor Swift,
    Lin‑Manuel Miranda’s Hamilton soundtrack, and local folk band The Lemming Folk, and she never misses the annual Mid‑States Fair music showcase.
  travel: Joann Batte plans weekend getaways with friends using color‑coded spreadsheets, favoring nearby escapes to Door County’s shoreline, the Wisconsin Dells waterparks, and a yearly road‑trip to Chicago’s
    museums, while pinning Paris, Iceland, and New Zealand on her vision board for future backpacking adventures.
  culinary: Joann Batte, a confident home baker, frequently perfects chocolate‑chip cookies, rustic sourdough loaves, and matcha‑infused cupcakes, layering cinnamon, vanilla extract, and fresh rosemary
    in her experimental pizza dough, and she enjoys preparing quick pasta alfredo for her soccer teammates after practice.
  core: Joann Batte blends meticulous planning with a contagious energy, obsessively color‑coding her life while sometimes binge‑watching theater rehearsals late into the night and hoarding spare craft
    supplies she never uses.
background:
  cultural: Joann comes from a typical Midwestern white family in Appleton, Wisconsin, with deep roots in German and Scandinavian heritage. Her upbringing reflects the region's emphasis on community involvement,
    modesty, and hard work. She was raised in a Lutheran household that values service, teamwork, and neighborly support. Local traditions such as county fairs, community potlucks, and church-sponsored
    volunteer events have shaped her sense of belonging and her commitment to fostering harmony and cooperation within her social circles.
attributes:
  skills: '[''Event coordination'', ''Volunteer program management'', ''Organizational planning'', ''Time management'', ''Microsoft Office proficiency'', ''Social media content creation'', ''Interpersonal
    communication'', ''Conflict resolution'', ''First aid and CPR certification'', ''Basic cooking'', ''DIY crafts'']'
  hobbies: '[''Volleyball'', ''Soccer'', ''Community theater'', ''Baking'', ''DIY upcycling crafts'', ''Volunteer at animal shelter'', ''Library event assistance'', ''Hiking the Appleton trail system'',
    ''Journaling and digital planning'', ''Attending local fairs and music festivals'']'
  career_goals: Joann aims to complete a GED program within the next year and then enroll in a community college to earn a certificate in hospitality management or a certified nursing assistant (CNA) credential,
    depending on which path feels most aligned with her desire to help others. Her short‑term goal is to secure a part‑time role as a front‑desk assistant or event volunteer at a local nonprofit, where
    she can apply her organizational and people‑skills. Long‑term, she envisions becoming an event coordinator for community festivals or a manager at a small boutique hotel, and eventually opening her
    own café that doubles as a venue for local arts and youth workshops, blending her love for hospitality, community building, and creative expression.
