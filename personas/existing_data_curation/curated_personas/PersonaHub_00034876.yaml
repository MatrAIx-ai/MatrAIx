persona_description: A physicist or engineer with a background in classical mechanics, particularly interested in the dynamics of rigid bodies and the equations of motion. They are familiar with the concepts
  of angular momentum, torque, and the Euler equations, and have a strong understanding of the relationship between different coordinate systems and their effects on the dynamics of a system. They are also
  likely to be familiar with the work of Morin and have a keen interest in understanding the nuances of the equations of motion in different coordinate systems.
