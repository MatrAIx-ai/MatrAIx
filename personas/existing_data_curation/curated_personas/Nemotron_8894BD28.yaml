personas:
  professional: Ana Mejia, an emerging arts management enthusiast, blends her Business Administration degree with a flair for creative problem‑solving, using their relaxed, collaborative style to turn spontaneous
    ideas into organized community art projects and event campaigns.
  sports: Ana Mejia enjoys weekly yoga classes, roots for the New York Knicks and the Bronx Bombers, and they regularly join a community hip‑hop dance crew that serves as a high‑energy cardio workout.
  arts: Ana Mejia immerses themselves in the Bronx’s vibrant street‑art scene, sketches tributes to icons like Jean‑Michel Basquiat and Banksy, curates playlists that weave folk rhythms, reggaeton, and
    indie rock, and volunteers at local galleries that showcase emerging artists from their community.
  travel: Ana Mejia prefers spontaneous subway rides to Bushwick for mural tours, plans occasional coastal weekend getaways for fresh seafood and inspiration, and they dream of backpacking through mountainous
    villages in the Andes to capture new visual narratives.
  culinary: Ana Mejia delights in cooking encebollado, a hearty coastal fish stew, pairing it with crispy plantain chips, and frequently experiments by adding spices from other cuisines to craft fusion
    bowls that they photograph for their food blog.
  core: Ana Mejia is a free‑spirited 18‑year‑old who fuses business acumen with a passion for street art, often juggling spontaneous creative projects while navigating a part‑time budget and a jam‑filled
    schedule, and they thrive on the buzz of community collaboration.
background:
  cultural: Ana is a first‑generation Ecuadorian‑American. Her parents emigrated from Guayaquil, bringing Andean customs, Spanish language, and a love for traditional cuisine. Growing up in the Bronx, she
    was immersed in a multicultural neighborhood where Latino, Caribbean, and African‑American influences intersect. She celebrates Ecuadorian holidays such as Carnaval de Guaranda and shares family stories
    while also participating in citywide events like the Bronx Latin Parade. Frequent visits to Westchester expose her to suburban cultural activities and outdoor recreation, giving her a blended urban‑suburban
    perspective. Her bilingual upbringing shapes her identity, allowing her to navigate both Latin American and mainstream American social spheres.
