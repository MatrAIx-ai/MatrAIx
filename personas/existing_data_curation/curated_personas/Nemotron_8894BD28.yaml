  career_goals: Ana aims to blend her business acumen with her love for art and culture by pursuing a role in arts management, cultural entrepreneurship, or marketing for creative enterprises. In the short
    term she plans to intern with a local arts nonprofit in the Bronx, help organize community festivals, and build a portfolio of event campaigns. Long‑term, she envisions launching a multicultural pop‑up
    gallery space that showcases emerging Latin American artists while offering mentorship and micro‑grant programs for young creators. She values flexible work arrangements that allow her to continue learning,
    travel, and engage in artistic projects.
