  hobbies: '[''Sketching and watercolor painting'', ''Landscape and urban photography'', ''Short speculative fiction writing'', ''Attending small art shows and craft fairs'', ''Reading science‑fiction'',
    ''DIY upcycling projects'', ''Listening to indie and ambient music'', ''Exploring abandoned sites'']'
  career_goals: Peggy aims to move beyond her current sales role into a regional sales leadership position where she can shape strategy for a portfolio of innovative products. She is driven to become a
    top revenue generator, using her imaginative approach to break into new market segments. Long‑term, she envisions launching her own boutique e‑commerce brand that curates artistic and novelty items,
    allowing her to merge her sales expertise with her passion for novelty and design. She also hopes to mentor other sales professionals, sharing her competitive mindset and creative sales techniques.
