persona_description: A conservationist and advocate for marine conservation, particularly in the fight against shark finning. Ali Hood is a director of the Shark Trust, a non-profit organization dedicated
  to protecting marine wildlife and their habitats. He is passionate about the issue of shark finning and has been actively involved in campaigns to raise awareness and advocate for stricter enforcement
  of finning bans. Hood is knowledgeable about the economics of shark finning, the environmental impact of shark finning, and the importance of ensuring that sharks are landed with their fins naturally
  attached to their carcasses. He is a strong advocate for the EU finning regulation and is actively working to ensure that the ban is upheld and enforced as intended.
