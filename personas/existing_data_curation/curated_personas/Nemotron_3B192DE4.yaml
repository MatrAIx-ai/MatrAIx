  hobbies: '[''Sketching and painting'', ''Reading adventure/fantasy books'', ''Exploring nature and collecting specimens'', ''LEGO building'', ''Playing the piano'', ''Crafting (friendship bracelets, origami,
    rock painting)'', ''Science experiments'', ''Writing short stories'']'
  career_goals: Alanna dreams of becoming an artist who illustrates stories that celebrate nature and community, perhaps as a children's‑book illustrator. She also envisions exploring science, imagining
    a future as a wildlife biologist or environmental educator who protects Indiana’s farms and forests. She hopes to lead a local nature club where she can combine her love for drawing, storytelling, and
    eco‑learning. In the short term, she aims to attend an arts‑focused middle school, join a summer science camp, and continue developing her sketching and coding skills so she can create projects that
    inspire her friends and classmates.
