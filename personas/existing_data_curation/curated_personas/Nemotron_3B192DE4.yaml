personas:
  professional: Alanna Morkunas is a budding young naturalist and creative illustrator, channeling her curiosity and calm resilience into detailed journal sketches of woodland ecosystems while organizing
    her LEGO habitats with disciplined yet imaginative flair.
  sports: Alanna Morkunas enjoys playing on the local junior soccer team, the Meadowbrook Cubs, practices swimming at the community pool twice a week, and cheerfully roots for the national women's soccer
    team, blending teamwork with a love for staying active.
  arts: Alanna Morkunas finds artistic inspiration in the whimsical illustrations of Beatrix Potter, the vibrant colors of Yayoi Kusama's polka‑dot canvases, and the melodic simplicity of Disney's 'Let
    It Go', often spending weekends drawing, painting, and crafting friendship bracelets while humming her favorite piano pieces.
  travel: Alanna Morkunas loves weekend nature hikes in the nearby state forest, has visited the bustling county fair in her hometown, dreams of exploring the towering redwoods of California, and prefers
    family road trips that balance adventure with the comfort of familiar surroundings.
  culinary: Alanna Morkunas delights in making fruit kebabs with strawberries, bananas, and grapes, enjoys baking chocolate chip cookies for the school bake sale, and often helps her family prepare simple
    pasta dishes with marinara sauce, showcasing a budding enthusiasm for sweet and savory flavors.
  core: Alanna Morkunas blends a quiet, resilient curiosity with a love for nature‑inspired art, organized LEGO world‑building, and a habit of meticulously saving her allowance for creative projects.
background:
  cultural: Alanna grows up in Wheatfield, Indiana, a small rural Midwestern town where community, family, and modesty are core values. Her family maintains Lithuanian heritage, celebrating traditions such
    as Užgavėnės and preparing dishes like kugelis during holidays, while also participating in typical American celebrations and church activities. The local culture emphasizes hard work, neighborly support,
    and involvement in events like the Jasper County fair and school service projects. Surrounded by farms and open fields, she develops a deep connection to the land, fostering her love for nature and
    environmental stewardship. Through school programs, library storytimes, and occasional trips to nearby art museums, she is exposed to diverse ideas and creative expression, nurturing her open‑minded
    and appreciative outlook.
attributes:
  skills: '[''Reading comprehension'', ''Creative drawing'', ''Basic Scratch programming'', ''Observational skills in nature'', ''Organizational skills for school projects'', ''Empathy and conflict mediation'',
