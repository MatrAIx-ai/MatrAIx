  hobbies: '[''Model building (RC cars, model rockets)'', ''Electronics tinkering'', ''Hiking local trails'', ''Playing basketball'', ''Listening to classic rock music'', ''Reading non‑fiction (technology,
    business, productivity)'', ''Strategy video games'', ''Volunteering at community events'']'
  career_goals: David aspires to move beyond his current operator role into leadership positions on the production floor. In the next three years he plans to complete his associate’s degree in industrial
    technology and pursue certifications such as Certified Production Technician and Six Sigma Green Belt. His medium‑term goal is to become a shift supervisor, overseeing a team of operators while driving
    efficiency improvements. Ultimately, he hopes to earn a bachelor’s degree in industrial engineering or supply‑chain management and advance to plant manager, where he can shape production strategies,
    mentor staff, and implement data‑driven process enhancements. He also entertains the idea of launching a small, locally sourced packaging services business once he has sufficient industry experience
    and capital.
