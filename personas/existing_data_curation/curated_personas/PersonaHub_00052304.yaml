persona_description: A philosopher and cultural critic who specializes in the study of moral philosophy, particularly the concepts of good and evil, and the relationship between them. They have a deep understanding
  of the concepts of physicality and mentality, and how they relate to the pursuit of the good life. They are likely to be interested in the ideas of Kenneth Burke and have read his work extensively. They
  have a keen interest in the ways in which our physical and mental states can influence our attitudes towards history and the world, and how they can be used to cultivate a more positive and productive
  way of being. They are likely to be interested in the ideas of Burke on the relationship between war and peace, and how they can be used to promote a more harmonious and cooperative society.
