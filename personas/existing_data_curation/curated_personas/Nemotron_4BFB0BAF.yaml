personas:
  professional: Amy Schultz, a 27-year-old elementary STEM teacher in Savannah, designs data-driven, project-based STEAM curricula that weave watercolor art and community science fairs together, leveraging
    their knack for organization and open‑minded curiosity to inspire students while deftly navigating occasional stress‑induced over‑planning.
  sports: Amy Schultz, an energetic member of the Savannah Runners club, participates in charity 5K races, practices yoga three times a week, and roots for the Savannah Bananas baseball team while occasionally
    kayaking along the Savannah River during the summer.
  arts: Amy Schultz, an avid watercolorist who captures moss‑draped oaks on canvas, frequents the SCAD Museum of Art, follows the music of Hozier and Alabama Shakes at the Savannah Music Festival, and draws
    inspiration from Georgia O’Keeffe’s floral abstractions and local folk artist Mary Hinton.
  travel: Amy Schultz, a meticulous planner with a love for Southern charm, enjoys weekend road trips to Charleston’s historic district, the Blue Ridge Mountains of North Carolina, and the coastal vibes
    of Tybee Island, while dreaming of a spring visit to the gardens of Kyoto and a summer art tour of Florence, balancing travel costs with a modest budget and coordinating trips around the school calendar.
  culinary: Amy Schultz, a proficient home cook who blends Midwestern comfort with Southern flair, frequently prepares shrimp and grits topped with caramelized bratwurst, peach‑glazed chicken pot pie, and
    heirloom tomato salads seasoned with fresh basil, and delights in sourcing locally grown sweet corn, collard greens, and apricot preserves at Savannah’s farmers market.
  core: Amy Schultz, a curiosity‑driven, art‑infused STEM educator who balances meticulous planning with spontaneous garden experiments, worries about details yet fuels community with boundless energy and
    a penchant for late‑night science‑fiction marathons.
background:
  cultural: Amy is a second‑generation American of German‑American descent whose family roots trace back to the Midwest, where she was raised in a small, close‑knit community that emphasized modesty, hard
    work, and a love of learning. Relocating to Savannah for college introduced her to the city’s rich Southern heritage, characterized by historic architecture, hospitality, and a vibrant cultural rhythm.
    She embraces Southern traditions such as peach‑season cooking, folk art, and community gatherings, while maintaining an openness to diverse ideas fostered by her Midwestern upbringing. Her marriage
    and professional life in Savannah have deepened her connection to local festivals, historic preservation efforts, and community service, blending a multicultural appreciation with a distinctly Southern
    sense of place.
attributes:
  skills: '[''STEM curriculum development'', ''Project‑based learning'', ''Classroom management'', ''Differentiated instruction'', ''STEAM integration'', ''Technology integration (Google Classroom, interactive
    whiteboards)'', ''Data analysis for student assessment'', ''Grant writing'', ''Parent and community outreach'', ''Conflict resolution'', ''Leadership and mentorship'']'
  hobbies: '[''Watercolor painting'', ''Visiting art galleries and exhibitions'', ''Attending the Savannah Music Festival'', ''Reading contemporary fiction and popular science'', ''Participating in a local
    book club'', ''Volunteering at community science fairs'', ''Mentoring in coding workshops'', ''Running in charity 5Ks'', ''Yoga and meditation'', ''Gardening native Southern plants'', ''Cooking seasonal
    meals with friends and family'']'
  career_goals: Amy aims to become a STEM coordinator for the Chatham County School District, where she can lead district‑wide STEAM initiatives and expand access to hands‑on science experiences for all
    students. She plans to pursue a Master’s in Educational Leadership to deepen her expertise in curriculum design and school administration. Long‑term, she envisions establishing a community makerspace
    that partners with local artists and engineers, securing sustained funding through grants and philanthropic support. Amy also aspires to mentor new teachers, contribute to education policy discussions
    on STEM equity, and eventually take on an administrative role such as principal to shape school culture holistically.
