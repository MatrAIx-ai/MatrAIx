  skills: '[''Team collaboration'', ''Scratch programming'', ''Mathematics problem solving'', ''Reading comprehension'', ''Soccer'', ''Bike maintenance'', ''Public speaking'']'
  hobbies: '[''Soccer'', ''Exploring nature'', ''LEGO building'', ''Scratch coding'', ''Reading adventure and sci‑fi books'', ''Playing guitar'', ''Boy Scouts'']'
  career_goals: Eric dreams of becoming a wildlife biologist who studies the unique ecosystems of the Louisiana bayous, combining his love for nature with scientific inquiry. He also envisions creating
    educational video games that teach environmental stewardship, merging his interest in coding with his desire to help others learn. In the near future, he aims to achieve the rank of Eagle Scout, lead
    community service projects, and earn recognition for his contributions to school science fairs.
