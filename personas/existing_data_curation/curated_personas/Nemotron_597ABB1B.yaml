personas:
  professional: A budding junior coder and aspiring environmental explorer, Eric Summerlin combines curiosity and practicality; they develop Scratch games and sketch ideas for future eco‑tech solutions.
  sports: An energetic member of the Bayou City Juniors soccer team, Eric Summerlin thrives on after‑school matches and weekend league play, cheering for the New Orleans Pelicans and occasionally joining
    local youth baseball clinics; they stay fit by hiking with the Boy Scouts, practicing drills, and balancing competitive spirit with teamwork.
  arts: A budding guitarist and avid storyteller, Eric Summerlin performs in the school’s music program, strums chords to songs by Taylor Swift and Imagine Dragons, and loses themselves in sci‑fi novels
    by Isaac Asimov and Rick Riordan; they also channel creativity into LEGO builds and sketching wildlife they spot in bayous.
  travel: An adventurous explorer of nearby wetlands, Eric Summerlin spends weekends trekking the Atchafalaya Basin and camping in the Great Smoky Mountains with family, and dreams of backpacking through
    the Grand Canyon and sampling street food in Bangkok; they prefer planning routes with hand‑drawn maps but love spontaneous detours when a hidden creek beckons.
  culinary: A budding home chef with a flair for bold flavors, Eric Summerlin enjoys making cheesy mac and cheese, devouring a bowl of gumbo with shrimp and okra, and blending tropical fruit smoothies with
    mango and pineapple; they can whip up a quick grilled cheese but often snack on chocolate‑covered pretzels while gaming.
  core: Eric Summerlin blends curiosity, practicality, and boundless energy into a life of soccer, coding, scouting, and creative pursuits, all while juggling a disciplined allowance, mild allergies, and
    a habit of forgetting to pack a water bottle on hikes; they often remedy the omission by borrowing a bottle from a teammate.
background:
  cultural: Eric is raised in a white, Southern family in Singer, Louisiana, a small rural community in Beauregard Parish. His upbringing is shaped by Southern hospitality and a close‑knit community that
    celebrates local traditions such as Mardi Mardi parades, church gatherings, and seasonal festivals. He frequently experiences outdoor activities common to the region, including fishing, camping, and
    wildlife observation in the bayous, which foster a practical appreciation for nature. His family values education, hands‑on learning, and community service, reflecting the region’s emphasis on self‑reliance
    and collaborative spirit.
