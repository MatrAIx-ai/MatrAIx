persona_description: A scientist who specializes in the study of asexual organisms, particularly bdelloid rotifers. She is interested in understanding how these organisms have adapted to survive in dry
  conditions without the need for sex. Her research interests include the evolution of asexual organisms, the role of sex in animal adaptation, and the use of mathematical models to study these organisms.
  She is particularly interested in the role of genes and proteins in the protection of these organisms during dehydration and the different functions of the two copies of the gene lea in Adineta ricciae.
