  hobbies: '[''Reading medical journals'', ''Science‑fiction novels'', ''Sudoku and logic puzzles'', ''Tai Chi'', ''Cooking Chinese cuisine'', ''Street photography'', ''Competitive online gaming'', ''Language‑exchange
    meetups'']'
  career_goals: Hua aims to complete his associate’s degree in nursing within the next two years and obtain RN licensure, targeting a position in acute‑care nursing where he can specialize in geriatric
    or wound‑care services. He is motivated to become a charge nursing assistant or unit supervisor to leverage his organizational strengths, and eventually aspires to pursue a Bachelor of Science in Nursing
    and transition into a nurse practitioner role focused on community health. He also envisions contributing to healthcare technology projects that streamline patient monitoring, reflecting his blend of
    curiosity and practicality.
