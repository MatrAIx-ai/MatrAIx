personas:
  professional: Glenn Depalma, a veteran heavy‑vehicle operator with over forty years in commercial transportation, combines flawless safety records, mechanical know‑how, and sales acumen to keep freight
    moving efficiently; now at 75, they drive part‑time routes on a flexible schedule that leaves room for watercolor painting, and mentor younger drivers by sharing route‑optimization tricks, while drafting
    a memoir that weaves logistics anecdotes with reflections on Appalachian folk art.
  sports: Glenn Depalma enjoys low‑impact outdoor activities, spending mornings fishing on Lake Hickory and evenings strolling the Catawba River trail, while cheering on the Charlotte Hornets in the NBA
    and following the Appalachian State Mountaineers football season; they belong to a local seniors’ shuffleboard club that meets twice a week, and they keep fit with gentle hill walks through the foothills,
    treating exercise as a chance to sketch the scenery.
  arts: Glenn Depalma, an avid watercolorist, spends afternoons capturing the shifting colors of the Appalachian foothills, drawing inspiration from regional folk art and the improvisational spirit of Miles Davis,
    B.B. King, and the Nitty Gritty Dirt Band; they frequent the Hickory Art Fair and vintage car shows, where they collect sketches of classic Chevrolet designs, and they regularly discuss classic literature
    and art history at the senior book club, often quoting passages from biographies of Henry Ford.
  travel: Glenn Depalma prefers unhurried road trips in their trusty semi‑tractor, planning routes on a loose map that leaves room for spontaneous stops at roadside diners, small‑town art galleries, and
    the Blue Ridge Parkway overlook at sunrise; they have driven the length of Route 66 for nostalgic jazz festivals, dream of a pilgrimage to the Tuscan countryside to study frescoes, and cherish weekend
    getaways to Asheville’s River Arts District for inspiration.
  culinary: Glenn Depalma loves preparing hearty pasta al pomodoro topped with fresh basil, garlic, and Parmesan, a dish that echoes family Sunday meals, while also mastering Southern staples like slow‑cooked
    brisket, collard greens seasoned with smoked ham hocks, and homemade biscuits; they enjoy sourcing heirloom tomatoes at the local farmers’ market and pairing a glass of Zinfandel with a plate of eggplant
    parmesan, savoring the blend of Mediterranean aroma and Appalachian comfort.
  core: Glenn Depalma is a reflective 75‑year‑old who blends decades of trucking expertise with a quiet love for watercolor, vintage cars, and community service, navigating life with emotional steadiness,
    a flexible schedule, and occasional disorganization that keeps their days interesting.
background:
  cultural: 'Glenn comes from an Italian‑American family that settled in the Appalachian region of western North Carolina a few generations ago. His surname, Depalma, reflects his Italian heritage, and
    family traditions include Catholic holidays, hearty pasta dishes, and a love for communal meals. Growing up in Hickory and the surrounding Catawba County, he absorbed Southern hospitality, a deep respect
    for community, and an appreciation for Appalachian folk culture—particularly its music, storytelling, and crafts. This blend of Italian roots and Southern upbringing shapes his worldview: he values
    family cohesion, enjoys sharing food and stories, and feels a strong connection to both the regional landscape and the broader cultural tapestry of the United States.'
attributes:
  skills: '[''Heavy‑Vehicle Operation'', ''Route Optimization'', ''Basic Truck Maintenance'', ''Safety Compliance'', ''Customer Service'', ''Sales Negotiation'', ''Inventory Management'', ''Problem Solving'',
