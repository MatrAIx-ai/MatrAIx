personas:
  professional: Beth Borghese, a retired community arts facilitator in Taos, leverages her humanities background, digital savvy, and compassionate nature to orchestrate intergenerational workshops, secure
    funding, and mentor emerging artists, all while balancing meticulous organization with the flexibility demanded by creative collaborations.
  sports: Beth Borghese enjoys low‑impact hiking on the high desert trails near Taos, follows the New Mexico United soccer team for community spirit, and practices weekly tai chi at the local community
    center, balancing her love of nature with a preference for non‑competitive, socially engaging activities.
  arts: Beth Borghese curates a vibrant mix of plein‑air painting, pottery, and mixed‑media collage, draws inspiration from the works of Georgia O’Keeffe and local folk artists like Maria Martinez, and
    regularly attends gallery openings featuring artists such as James Turrell, allowing her creative practice to intertwine with community storytelling.
  travel: Beth Borghese favors immersive cultural trips, having explored the historic pueblos of Santa Fe, the desert vistas of Sedona, and the art districts of Oaxaca, often planning trips months ahead
    to include workshops and local festivals, while balancing travel with her caregiving commitments at the hospice.
  culinary: Beth Borghese delights in cooking Southwestern dishes, often preparing enchiladas suizas with roasted Hatch chilies, sage‑infused green chile stew, and prickly pear margaritas, and enjoys experimenting
    with native ingredients like amaranth and piñón in her garden‑to‑table meals.
  core: Beth Borghese blends artistic curiosity, gentle activism, and a love for the high desert into a retirement life that balances community mentorship, modest financial prudence, and a penchant for
    pottery mishaps that end in laughable glaze disasters.
background:
  cultural: Beth's family traces its roots to Italian immigrants who settled in the Midwest after World War II, giving her a heritage of Mediterranean customs and a love for family gatherings. After moving
    to Taos in her forties, she embraced the rich cultural tapestry of the Southwest, developing a deep respect for Pueblo traditions, Spanish colonial history, and contemporary American art. She often
    blends her Italian-American background with local influences, integrating storytelling, folk motifs, and a reverence for the land into her creative and community pursuits.
attributes:
  skills: '[''Art appreciation and critique'', ''Curatorial assistance'', ''Workshop facilitation'', ''Community program coordination'', ''Fundraising and grant writing'', ''Basic digital literacy and social
