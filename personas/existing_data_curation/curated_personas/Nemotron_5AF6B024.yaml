  hobbies: '[''Plein-air painting'', ''Pottery and ceramics'', ''Gardening (native plants)'', ''Reading historical fiction'', ''Cooking Southwestern cuisine'', ''Yoga'', ''Volunteer art workshops'', ''Photography'',
    ''Attending cultural festivals'', ''Mixed-media collage'']'
  career_goals: In retirement, Beth aims to leave a lasting impact on Taos's artistic community. She plans to develop an intergenerational art mentorship program that pairs seasoned artists with youth,
    document oral histories of local Pueblo and Hispanic artists, and curate a traveling exhibition of regional folk art. She also hopes to author a memoir that weaves together her experiences with art,
    travel, and community service, and to volunteer more deeply with the local hospice, bringing creative therapy to patients.
