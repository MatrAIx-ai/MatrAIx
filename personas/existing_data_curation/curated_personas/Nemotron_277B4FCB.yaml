personas:
  professional: A seasoned parking attendant who excels at bilingual customer service, cash reconciliation, and crowd management, Nelly Perezmoran channels their curiosity and sociable energy into mentoring
    new team members, while their laid-back attitude occasionally leads to missed scheduling details.
  sports: A spirited fitness enthusiast, Nelly Perezmoran joins community soccer leagues each winter, switches to pickleball in the spring, enjoys sunrise beach jogs in the summer, and fervently supports
    the Miami Heat and Miami Dolphins while cheering from local sports bars.
  arts: An avid cultural connoisseur, Nelly Perezmoran spends weekends exploring Wynwood's vibrant murals by Luis Delgado, attends community theater revivals directed by Carlos Ramos, and fills their home
    with the lively beats of cumbia and salsa performed by musician Marco Reyes, weaving these artistic experiences into their personal identity.
  travel: A spontaneous explorer, Nelly Perezmoran loves weekend drives to the Florida Keys and annual trips to the high-altitude coffee farms of the Andes, keeps a bucket list that includes wandering the
    historic streets of Seville and hiking the misty trails of Machu Picchu, but often delays the longer journeys as budgeting worries and family commitments tug at their planning.
  culinary: A passionate home cook, Nelly Perezmoran masterfully prepares arepas, sancocho, and empanadas seasoned with fresh cilantro and achiote, brews rich, aromatic high-altitude coffee for family gatherings,
    and balances their skillful kitchen experiments with occasional visits to local food festivals where they sample ceviche and tropical fruit smoothies.
  core: A warm, curious mentor who blends disciplined service work with a love for salsa, coffee, and community art, Nelly Perezmoran balances a laid-back lifestyle with occasional worry-driven overthinking,
    and dreams of turning their cultural passions into a neighborhood cafe.
background:
  cultural: Born to Colombian parents, Nelly grew up immersed in the rhythms of cumbia and vallenato, the aromas of coffee and empanadas, and the close-knit family values typical of Colombian households.
    Though she moved to South Florida as a teenager, she retained fluency in Spanish and a strong sense of Colombian identity, celebrating holidays such as Dia de la Independencia (July 20) and Carnaval
    de Barranquilla with traditional food, music, and dance. Living in Broward County's multicultural environment has blended her heritage with Caribbean and broader Hispanic influences, enriching her appreciation
    for diverse artistic expressions. Nelly's cultural background informs her warm, cooperative demeanor and drives her commitment to community involvement, especially in supporting fellow Latino newcomers.
attributes:
  skills: '[''Customer Service'', ''Bilingual Communication (Spanish & English)'', ''Cash Handling & Reconciliation'', ''Vehicle Navigation & Spotting'', ''Basic Vehicle Maintenance Knowledge'', ''Conflict
    Resolution'', ''Safety & Compliance Procedures'', ''Crowd Management'', ''Flexible Scheduling'', ''Art Appreciation & Local Cultural Knowledge'', ''Community Engagement'', ''Basic Photography'', ''Salsa
    Dancing Instruction Basics'']'
  hobbies: '[''Salsa Dancing'', ''Exploring Local Art Galleries & Street Murals'', ''Cooking Colombian Cuisine'', ''Gardening (tropical plants)'', ''Reading Mystery Novels'', ''Volunteering at Community
    Center (Spanish tutoring)'', ''Beach Outings with Family'', ''Attending Community Theater Performances'', ''DIY Home Decor Projects'']'
  career_goals: Seeking greater stability and a chance to blend her service expertise with her passion for culture, Nelly aims to advance into a supervisory role within the parking operations of a large
    venue, such as a shopping mall or event complex, where she can mentor newer staff and implement more efficient, customer-friendly processes. Concurrently, she plans to complete her associate degree
    in hospitality management, leveraging it to transition eventually to a front-desk or visitor-services position at a museum or cultural center in South Florida. Long-term, Nelly dreams of opening a small
    community cafe that showcases Colombian coffee and art, serving as a gathering place for local artists and families. To support these ambitions, she is enrolling in stress-management workshops and studying
    basic leadership principles, aiming to reduce the anxiety that sometimes accompanies her responsibilities.
