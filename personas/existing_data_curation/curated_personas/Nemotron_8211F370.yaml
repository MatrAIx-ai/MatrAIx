personas:
  professional: Thomas Bennett is a high‑school junior who spends evenings working on his family’s pickup truck, mastering oil changes, tire rotations, and minor repairs while also leading local basketball
    pickup games, and they blend a practical, routine‑driven mindset with natural leadership to prepare for an automotive‑technician apprenticeship and future community auto shop.
  sports: Thomas Bennett captains his town’s high‑school basketball team, the Wildcats, while also playing in the community YMCA league, drills teammates with practices modeled after NBA legend Gregg Popovich,
    roots for the Golden State Warriors and the New England Patriots, and they balance their love of seasonal hunting and fishing trips with his father during the fall and winter months.
  arts: Thomas Bennett relaxes after a demanding day by blasting classic rock staples from Led Zeppelin and AC/DC and country hits from Johnny Cash and Dolly Parton, sketching woodcarvings of deer they’ve
    hunted, and binge‑watching sports documentaries featuring legendary coaches, which together shape their gritty, hands‑on appreciation for both auditory and visual storytelling.
  travel: Thomas Bennett prefers low‑cost road trips that combine outdoor adventure with familiar routine, having camped in the Great Smoky Mountains, fished the lakes of Minnesota, and dreamed of a future
    fishing lodge tour of Patagonia, yet they keep his budget constraints largely tied to nearby state parks, family‑owned cabins, and occasional weekend getaways to neighboring cities like Nashville.
  culinary: Thomas Bennett enjoys cooking hearty, protein‑rich meals such as grilled ribeye steaks, BBQ chicken wings, and loaded nachos seasoned with smoked paprika, often using the charcoal grill he built
    himself, and they consider a creamy bowl of homemade mac and cheese topped with crisp bacon bits the perfect post‑game comfort dish.
  core: Thomas Bennett is a routine‑focused teen who channels his hands‑on technical skills, competitive drive, and community spirit into a life where practical work, organized sports, and local loyalty
    outweigh fleeting trends, and they constantly seek structure in every endeavor.
background:
  cultural: Thomas grew up in Avella, a small community in Washington County, Pennsylvania, an area shaped by Appalachian heritage and generations of German-Scotch-Irish settlers. The local culture emphasizes
    self-reliance, practical craftsmanship, and close-knit community ties, values reflected in family traditions of routine work, church gatherings, and annual events like the county fair and high-school
    sports. These influences have fostered Thomas’s appreciation for dependable, hands-on occupations, his involvement in group activities, and his respect for longstanding regional customs. The modest,
    down-to-earth lifestyle of his surroundings aligns with his preference for practicality, routine, and community engagement.
attributes:
  skills: '[''Vehicle maintenance (oil changes, tire rotation, minor repairs)'', ''Small-engine repair (lawnmowers, chainsaws)'', ''Basic carpentry (building shelves, fence repair)'', ''Team leadership
    (captain of local basketball games)'', ''Event coordination (organizing youth sports tournaments)'', ''Digital scheduling and group communication'', ''First-aid certification (basic emergency response)'']'
  hobbies: '[''Basketball (pickup games and team play)'', ''Automotive tinkering (vehicle maintenance and repair)'', ''Multiplayer video gaming (strategic team games)'', ''Hunting and fishing (seasonal
    trips)'', ''Woodworking (building small furniture)'', ''Community volunteering (youth sports coaching, county fair assistance)'', ''Weightlifting (stress management)'', ''Listening to classic rock and
    country music'']'
  career_goals: Thomas aims to secure a formal apprenticeship as an automotive technician within the next year, earn his ASE certification, and eventually open a small, community-focused auto repair shop
    that offers reliable, routine service to neighbors. He also hopes to channel his competitive spirit and leadership experience by coaching the town’s youth basketball program or helping organize local
    sports leagues. In the long term, Thomas envisions a stable career that blends hands-on technical work with community involvement, providing him with a predictable routine, financial independence, and
    the opportunity to give back to his hometown.
