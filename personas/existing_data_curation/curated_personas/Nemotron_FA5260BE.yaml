  career_goals: Jose aims to rise from first-line supervisor to plant manager within the next five years, leveraging a Lean Six Sigma Black Belt certification to spearhead waste-reduction and automation
    projects. He is driven to create a high-performance culture that consistently exceeds productivity targets while championing sustainability. In the long term, he envisions establishing his own consultancy
    that helps mid-size manufacturers adopt innovative process improvements, and he seeks recognition as a thought leader in operational excellence within the Central Valley manufacturing community.
