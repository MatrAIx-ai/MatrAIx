persona_description: A neuroscientist and engineer who specializes in the study of brain-computer interfaces and motor control. He is particularly interested in the use of brain-derived signals to control
  robotic arms and has demonstrated the feasibility of this approach in rats and monkeys. He has developed and utilized multi-electrode arrays in behaving animals to extract information from neuronal populations
  and decode the information processed by these neuronal populations while the animals perform specific behavioral tasks involving somatosensory perception and/or trained limb movement. He has also demonstrated
  the ability to extract and utilize "comm" for forelimb movement from the motor cortex of rats and has further developed technology to allow up to 1000 neurons to be recorded simultaneously.
