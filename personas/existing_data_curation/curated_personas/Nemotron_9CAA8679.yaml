personas:
  professional: Sandra Mattison, a 31‑year‑old accountant with a knack for turning complex financial data into vivid visual dashboards, leverages their GAAP expertise, advanced Excel modeling, SAP and NetSuite
    experience, and love for the arts to audit nonprofit cultural institutions while orchestrating process‑improvement projects that blend precision with creative problem‑solving.
  sports: Sandra Mattison fuels their energetic spirit by joining salsa dancing classes, tackling weekend hikes with the Dallas Trailblazers Club, cheering for the Dallas Mavericks and Dallas Stars, and
    occasionally signing up for 5‑k runs, though they sometimes skip warm‑ups due to a rushed schedule.
  arts: Sandra Mattison channels their curiosity through docent work at the Dallas Museum of Art, sketches downtown skylines in watercolor after evenings at the AT&T Performing Arts Center, admires the
    works of Georgia O'Keeffe, Frida Kahlo, and local Texas muralist Carmen Lomas Garza, and never misses a community theater production of 'Avenue Q' or a pop‑up gallery opening.
  travel: Sandra Mattison plans art‑focused escapes to New York City’s MoMA, Paris’s Louvre, and Santa Fe’s Georgia O'Keeffe Museum, favoring boutique hotels near cultural districts, booking trips months
    in advance to secure museum passes, yet sometimes squeezes a last‑minute weekend trip to Austin’s SXSW art festival when the budget allows, and they carefully track travel expenses in a spreadsheet
    to stay within budget.
  culinary: Sandra Mattison’s kitchen is a laboratory for Tex‑Mex flavors, from mastering chicken enchiladas with homemade salsa verde and fresh cilantro from the Farmers Market, to perfecting chiles rellenos
    stuffed with queso fresco, though their tendency to over‑season can sometimes overwhelm delicate dishes.
  core: Sandra Mattison blends meticulous accounting with a bohemian love of art, juggling spreadsheets and sketchbooks, while their stress‑prone nature fuels both diligent financial planning and occasional
    over‑thinking in every facet of life.
background:
  cultural: Sandra grew up in a middle‑class, white family in the Dallas‑Fort Worth metroplex, deeply rooted in Southern hospitality and community values. Her upbringing emphasized church involvement, family
    gatherings, and a strong work ethic. While culturally American, her arts‑humanities education broadened her perspective, fostering an appreciation for diverse artistic traditions and encouraging inclusive
    thinking. Living in Mesquite, she balances the region's traditional Texan vibe with an active participation in the local arts scene, reflecting both her regional roots and her curiosity about global
    cultural expressions.
attributes:
  skills: '["Accounting (GAAP)", "Auditing", "Tax Preparation", "Financial Reporting", "Advanced Excel", "QuickBooks", "ERP Systems (SAP, NetSuite)", "Risk Assessment", "Internal Controls", "Data Analysis",
    "Dashboard Design", "Project Management", "Process Improvement", "Public Speaking", "Technical Writing", "Art Curation Basics", "Event Planning", "Cross‑cultural Communication"]'
  hobbies: '["Gallery and museum visits", "Docent volunteering", "Sketching and watercolor painting", "Community theater attendance", "Salsa dancing", "Group hiking", "Book club (contemporary fiction &
    art criticism)", "Yoga and mindfulness journaling", "Cooking Tex‑Mex cuisine", "Exploring farmers'' markets", "Travel to art‑focused cities"]'
  career_goals: Sandra aims to earn her CPA designation within the next year and progress to a senior auditor role at a public accounting firm that serves nonprofit and cultural clients. She aspires to
    become a finance manager for a regional arts nonprofit, eventually moving into a chief financial officer position where she can integrate sustainable financial practices with artistic programming. Long‑term,
    she hopes to mentor junior accountants, lead interdisciplinary teams that bridge finance and the arts, and contribute thought leadership on arts funding and impact measurement.
