personas:
  professional: John Womick, an aspiring project coordinator with a PMP‑focused mindset, turns meticulous spreadsheet modeling, budget tracking, and hands‑on DIY troubleshooting into systematic construction
    workflows, while their skeptical edge constantly checks stakeholder intentions and their high anxiety fuels relentless attention to detail.
  sports: John Womick hits the Austin Trail Running Club’s morning routes and mixes in weight‑training at a local gym, while cheering on the Austin FC soccer team and Texas Longhorns football on weekends,
    balancing disciplined fitness goals with occasional missed sessions driven by anxiety.
  arts: John Womick unwinds by assembling detailed model kits while listening to classic rock legends like Bruce Springsteen and country icons such as George Strait, and occasionally attends Austin City
    Limits performances, finding creative spark in both the precision of models and the raw energy of live music.
  travel: John Womick plans weekend escapes with spreadsheet precision, favoring road trips to the Texas Hill Country vineyards, New Mexico’s Santa Fe art scene, and dreaming of a summer hike in Yellowstone,
    all while juggling a modest travel budget and occasional family commitments.
  culinary: John Womick enjoys grilling Texas‑style barbecue—smoked brisket seasoned with mesquite wood chips and paprika—paired with freshly caught Lake Kyle trout, and shows competent cooking skills that
    blend methodical recipe following with spontaneous spice experiments.
  core: John Womick is a methodical, anxiety‑driven planner who balances solitary precision projects with communal football nights, obsessively tracks numbers, yet occasionally lets nervous impulses spark
    impulsive purchases and social skepticism.
background:
  cultural: John was raised in a traditional Texan White household with roots in German and English ancestry. His upbringing emphasized self‑reliance, community involvement, and modest conservative values
    often associated with suburban Central Texas. He grew up attending a local Methodist church, celebrating holidays with family‑centric gatherings, and participating in community events like county fairs
    and neighborhood barbecues, all of which have shaped his practical outlook and sense of responsibility.
attributes:
  skills: '["Advanced Excel and data analysis", "Project planning and task scheduling", "Budget creation and financial tracking", "Home repair and basic carpentry", "Automotive maintenance", "Strategic
    problem solving", "Time management", "Event coordination for community gatherings"]'
  hobbies: '["Model kit building", "Puzzle solving", "Trail running", "Weight training", "Fishing", "Barbecue cooking", "Attending high school football games", "Reading non‑fiction self‑help and productivity
    books"]'
  career_goals: John is determined to transition from his current unemployment into a stable, upward‑mobility role that leverages his organizational strengths. He aims to earn a Project Management Professional
    (PMP) certification within the next 12 months and secure a junior project coordinator position in a construction or facilities management firm in the greater Austin area. In the longer term, he envisions
    launching his own small‑scale handyman service that combines his DIY expertise with his commitment to high standards, allowing him to provide reliable, competitively priced services while achieving
    financial security for his family.
