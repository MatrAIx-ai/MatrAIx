  career_goals: Although retired from formal employment, Destiny is driven to remain a pillar of stability for her family and neighborhood. She aims to deepen her leadership role in her church’s outreach
    committee, mentor teenage girls from the community, and launch a weekly garden club for seniors that provides structure and social connection. Preserving her family’s history through a scrapbook project
    and gifting handcrafted quilts to neighbors are personal ambitions that blend creativity with purposeful, low‑stress commitments.
