personas:
  professional: Cosimo Garrett, a 37‑year‑old registered acute‑care nurse, leverages top‑tier assessment, triage, and infection‑control expertise while channeling his structured, practical mindset and outgoing,
    collaborative style into leading shift operations and mentoring new staff.
  sports: Cosimo Garrett hits the community center basketball courts three nights a week, hikes the Blue Ridge Mountains on weekends, and roots for the Carolina Panthers while also following the Charlotte
    Hornets, embracing a structured fitness routine that blends competitive play with nature‑based endurance.
  arts: Cosimo Garrett revels in Charlotte’s thriving arts scene, catching live shows by local indie band The Good Life, attending performances of the North Carolina Symphony, and discussing contemporary
    fiction by authors like Colson Whitehead and Sally Rooney at book club gatherings, letting music and literature color their social outings.
  travel: Cosimo Garrett prefers well‑planned road trips that combine hiking challenges—like the Appalachian Trail segment in Virginia—and culinary stops in Italian‑American eateries, having explored Asheville
    and Charleston while eyeing a future trek through the Scottish Highlands.
  culinary: Cosimo Garrett’s cooking skill borders on gourmet, as they perfect spaghetti carbonara with pancetta, guanciale, Pecorino Romano, and fresh egg yolks, while also crafting house‑made gnocchi
    tossed in sage‑brown butter, frequently sourcing heirloom tomatoes and fresh basil from their garden.
  core: Cosimo Garrett is a pragmatic, socially‑charged nurse‑leader who channels his love of basketball, Italian‑American cooking, and community health into a structured yet flexible life, all while battling
    mild hypertension and an occasional coffee‑addiction habit.
background:
  cultural: Cosimo is a second‑generation Italian‑American. His grandparents emigrated from Southern Italy after World War II and settled in Charlotte, North Carolina. Raised in a close‑knit Italian Catholic
    household, he grew up celebrating traditional holidays such as Ferragosto, attending Mass, and sharing large family meals centered around homemade pasta and sauce. The Southern hospitality of his hometown,
    combined with his Italian heritage, instilled in him a strong sense of community, a robust work ethic, and a deep appreciation for family ties. These cultural influences are evident in his love for
    cooking, participation in local Italian festivals, and commitment to service through healthcare and volunteer work.
