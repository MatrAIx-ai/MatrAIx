  career_goals: Cosimo aims to complete a Bachelor of Science in Nursing (BSN) within the next two years and subsequently pursue a Master of Science in Nursing (MSN) with a focus on nursing administration
    or advanced practice. He aspires to become a unit manager, then a Director of Nursing, where he can lead hospital‑wide quality improvement and patient safety initiatives. He plans to obtain the Certified
    Nurse Manager and Clinical Leader (CNML) credential and to develop community health programs targeting underserved populations in Mecklenburg County. Mentoring emerging nurses and contributing to evidence‑based
    practice through research and publication are also key components of his long‑term professional vision.
