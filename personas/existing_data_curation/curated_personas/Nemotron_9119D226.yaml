personas:
  professional: Alberto Rahman is a retired handyman‑turned‑community volunteer who leverages bilingual fluency, practical repair skills, and event‑coordination experience to assist newcomers, blending
    meticulous planning with bursts of spontaneous activity when organizing block parties and church gatherings.
  sports: Alberto Rahman is a devoted Boston Red Sox fan who follows every game, joins the local senior walking club for morning strolls, and treats salsa dancing as a lively cardio workout, balancing structured
    fitness routines with spontaneous community pick‑up games.
  arts: Alberto Rahman finds artistic inspiration in the vibrant salsa rhythms of Celia Cruz and Tito Puente, regularly practicing dance steps to their music, while also enjoying the cinematic storytelling
    of Pedro Almodóvar, which informs their creative approach to community event narratives.
  travel: Alberto Rahman enjoys planning relaxed road trips to New England coastal towns like Cape Cod and to the White Mountains, yet also dreams of a nostalgic return to San Juan, Puerto Rico, where they
    can reconnect with family and savor island cuisine, balancing budget‑friendly drives with occasional splurges on short‑haul flights.
  culinary: Alberto Rahman, a confident home chef, delights in preparing arroz con gandules, pasteles, and mofongo on their balcony kitchen, seasoning each with fresh cilantro, smoky adobo‑spiced peppers,
    and generous garlic, while also experimenting with farmer‑market vegetables to host impromptu communal meals.
  core: Alberto Rahman is a socially energetic, structure‑loving retiree who blends meticulous DIY expertise with spontaneous salsa nights, occasionally forgets to pay bills on time but never skips a domino
    game, embodying a warm, community‑centric spirit tempered by impulsive spending.
background:
  cultural: Alberto was born in San Juan, Puerto Rico, and moved to the Greater Boston area in his early thirties. He grew up in a close‑knit family that celebrated Puerto Rican holidays such as fiestas
    de la Navidad and San Juan’s patron saint festivals, preserving traditions like bomba music, parade floats, and family‑style meals. In Medford, he stays connected to the island’s diaspora through the
    local Puerto Rican cultural association, participating in parrandas, sharing culinary recipes, and supporting church gatherings that blend Catholic rites with island customs. His bilingual fluency and
    deep appreciation for both cultures inform his daily interactions and community involvement.
