  career_goals: Although retired from full‑time work, Alberto aims to stay active by volunteering at the Medford community center as a bilingual outreach volunteer, helping new immigrants navigate city
    services. He hopes to mentor younger Puerto Rican men and women at a local after‑school program, sharing his practical skills in DIY projects and cooking. Additionally, he wants to maintain his health
    through regular exercise and eventually take a short trip back to Puerto Rico to reconnect with family and cultural roots.
