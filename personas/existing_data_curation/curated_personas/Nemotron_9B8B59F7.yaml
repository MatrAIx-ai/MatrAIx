personas:
  professional: Jason Peralta is an aspiring young digital artist and junior game programmer who blends meticulous LEGO engineering with imaginative watercolor sketches, using their curiosity and methodical
    planning to prototype simple Scratch games while collaborating in school art club and robotics team.
  sports: Jason Peralta is a dedicated midfielder for the Sykesville Youth Soccer Club, cheering for the Baltimore Ravens on game nights and idolizing goalkeeper Alisson Becker, while they regularly hike
    the Patapsco Valley State Park trails on weekends to keep fit and stay grounded.
  arts: Jason Peralta channels inspiration from Hayao Miyazaki’s animated worlds and the bold color palettes of Vincent van Gogh, spends afternoons recreating favorite scenes in watercolor, and collects
    limited‑edition Studio Ghibli art prints, letting these influences steer their own sketchbook adventures.
  travel: Jason Peralta prefers hands‑on explorations, having camped at Shenandoah National Park and visited the historic museums of Washington, D.C., yet dreams of a future family trip to Tokyo’s Akihabara
    district to see the birthplace of their beloved manga and game inspirations, balancing careful itinerary planning with spontaneous nature detours.
  culinary: Jason Peralta loves pepperoni pizza, homemade mac and cheese, and experimenting with rainbow fruit smoothies flavored with strawberries, blueberries, and mango, yet their cooking skill peaks
    at assembling snack‑size sushi rolls using seaweed sheets and cucumber, while they occasionally over‑season with too much soy sauce.
  core: Jason Peralta is a curious, organized ten‑year‑old who balances vivid imagination with methodical LEGO builds, a generous allowance‑saving habit, a diligent health log, and a habit of binge‑reading
    sci‑fi while occasionally forgetting to finish homework before a soccer game.
background:
  cultural: 'Jason grows up in a suburban-rural part of Howard County, Maryland, in a family that identifies as white with some Latino heritage reflected in his surname. His household reflects typical Mid-Atlantic
    values: an emphasis on education, community involvement, and appreciation for the arts. He frequently visits the Baltimore Museum of Art on field trips, attends local summer art workshops, and participates
    in community service projects organized by his school. The cultural mix in his community, including diverse festivals and a strong emphasis on outdoor recreation, shapes his open-minded view of the
    world while grounding him in American middle-class traditions.'
