  career_goals: Jason dreams of combining his love for art and technology into a career that lets him create interactive experiences for people. He aspires to become an engineer-designer who builds museum
    exhibits, video-game environments, or educational robots that spark curiosity in others. He also imagines studying computer science or mechanical engineering in high school and college, while keeping
    a strong foundation in visual arts. Ultimately, he hopes to lead a team that develops immersive learning tools that blend storytelling, art, and engineering.
