  career_goals: He aims to complete his GED within the next year, then enroll in a community college program focusing on communications, digital media, or visual arts. He envisions a career that merges
    his love of storytelling and visual expression—perhaps as a social media strategist for local businesses, a content creator for cultural festivals, or eventually a creative director in an advertising
    agency. He also hopes to contribute to community events in Prairieville, leveraging his event‑planning skills to help organize music festivals or arts fairs. In the longer term, he dreams of running
    his own media brand that showcases Southern culture and emerging artists.
