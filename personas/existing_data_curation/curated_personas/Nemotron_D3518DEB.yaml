personas:
  professional: Donald Matthews, an 18‑year‑old aspiring content creator, blends their curiosity for visual storytelling with strong organizational chops to craft engaging social‑media campaigns for local
    festivals, often taking the lead in brainstorming sessions and thriving as the charismatic voice that unites artists and audiences.
  sports: Donald Matthews, a regular at the local community center's basketball courts, follows the LSU Tigers basketball season zealously, joins pickup games every weekend, and balances a laid‑back approach
    to fitness with occasional runs through the downtown park to keep their energy high for performances.
  arts: Donald Matthews, an avid patron of Baton Rouge's art galleries, draws inspiration from contemporary street artist Banksy and local musician Hurray for the Riff Raff, frequently sketching urban skylines
    while playing acoustic guitar at open‑mic nights, and curates Instagram reels that showcase emerging Southern artists.
  travel: Donald Matthews prefers spontaneous road trips to nearby cultural hotspots like New Orleans for Mardi Gras and Austin for live music festivals, plans trips on a shoestring budget using student
    discounts, and dreams of exploring the historic streets of Savannah and the art museums of Barcelona when finances allow.
  culinary: Donald Matthews, a budding home chef, masters gumbo and crawfish boils with a family‑passed spice blend, experiments with shrimp and grits for brunch, and occasionally over‑indulges in late‑night
    cheese‑filled beignets after long rehearsal sessions.
  core: Donald Matthews is a talkative, curiosity‑driven 18‑year‑old who seamlessly fuses art, music, and community, yet they occasionally sacrifice sleep and budgeting for the thrill of the next live show.
background:
  cultural: Donald grew up in Prairieville, a suburban community in Ascension Parish, Louisiana. His family's roots are in the American South, with a mix of Anglo-American and French-Acadian heritage common
    to the region. He was raised in a tight-knit neighborhood where Southern hospitality, church gatherings, and community festivals were part of everyday life. The local culture—characterized by Cajun
    and Creole music, spicy cuisine like gumbo and crawfish, and a love for outdoor activities along the Mississippi River—shaped his appreciation for diverse artistic expressions. While he identifies with
    broader Southern values of friendliness, modesty, and a strong work ethic, his upbringing also exposed him to the eclectic cultural tapestry of Louisiana, encouraging him to explore and celebrate varied
    perspectives.
