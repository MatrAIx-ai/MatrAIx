persona_description: A scientist or researcher who is interested in the study of surface and interfacial science, particularly in the use of quartz crystal microbalance (QCM) to study the formation of nanobubbles
  on various surfaces. The individual may be particularly interested in the fast formation time of nanobubbles and the consistent direction of shifts in frequency and dissipation when nanobubbles are present.
  They may also be interested in the potential applications of QCM in this field and the implications of their findings for the study of surface and interfacial phenomena.
