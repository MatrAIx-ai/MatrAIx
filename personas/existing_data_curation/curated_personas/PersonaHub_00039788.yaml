persona_description: A former victim of labor trafficking in the U.S. who has dedicated their life to helping others and advocating for policies to combat human trafficking. They have a deep understanding
  of the struggles and experiences of trafficking victims, and have worked to educate the public and policymakers on the importance of addressing this issue. They are a strong advocate for increased investigations
  into industries that commonly use low-income workers, and for removing barriers that prevent trafficking survivors from accessing employment assistance programs. They have gained recognition for their
  work and have been appointed to serve on the U.S. Advisory Council on Human Trafficking.
