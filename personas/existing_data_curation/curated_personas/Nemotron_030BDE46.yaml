  hobbies: '["Playing drums in a garage band", "Car restoration and customization", "Recreational basketball league", "Fishing at Lake Ray Hubbard", "Competing in online video‑game tournaments", "Grilling
    and barbecue experimentation", "Attending local tech meetups"]'
  career_goals: Robert aims to become a lead fabricator and shop‑floor supervisor within the next three to five years. He plans to earn Journeyman certifications in welding and CNC programming, complete
    an associate degree in Manufacturing Technology, and champion the integration of additive manufacturing and robotics in his current plant. Long‑term, he aspires to launch his own custom metal and plastic
    fabrication business that serves automotive and aerospace clients in the Dallas‑Fort Worth area, leveraging his competitive drive to become a top‑tier supplier.
