personas:
  professional: Robert Johnson is a hands‑on fabricator at a Dallas‑area manufacturing plant, where their mastery of CNC milling, MIG/TIG welding, and injection‑molding setup merges with a natural knack
    for translating complex blueprints into clear, actionable instructions, and they leverage their outspoken, competitive streak to become the go‑to problem‑solver on the shop floor.
  sports: Robert Johnson dominates the local Dallas Men’s Basketball League every summer, cheers loudly for the Dallas Mavericks and the Texas Rangers, spends weekend mornings casting at Lake Ray Hubbard,
    and they squeeze in high‑intensity HIIT sessions to maintain the stamina their competitive streak demands.
  arts: Robert Johnson channels their creative energy into pounding drums for a garage band that covers the Red Hot Chili Peppers and Led Zeppelin, showcases their vocal bravado at community karaoke nights
    with renditions of Beyoncé and Kendrick Lamar, and they unwind by binge‑watching the latest Marvel movies and listening to the podcast ‘Stuff You Should Know.’
  travel: Robert Johnson prefers spontaneous weekend road trips across Texas, having already explored the Hill Country wineries, the art district of Marfa, and a fishing weekend at Lake Lanier, while their
    long‑term bucket list includes a tech‑focused tour of Stuttgart’s automotive museums and a cultural immersion in Osaka’s street‑food scene, and they book these adventures using a mix of budget‑friendly
    Airbnb stays and occasional boutique hotels.
  culinary: Robert Johnson is an avid backyard grillmaster who experiments with Texas‑style smoked brisket, chipotle‑marinated chicken wings, and cedar‑plank grilled catfish served with a tangy mango‑chili
    salsa, and they boast an intermediate skill set that lets them master a smoker on most Saturdays while still ordering sushi when craving something fresh.
  core: Robert Johnson is a charismatic, competition‑driven fabricator who can talk the ear off anyone at a BBQ, yet secretly hoards unfinished car projects in their garage like trophies, and they have
    a habit of checking their watch every five minutes during meetings.
background:
  cultural: Robert grew up in Terrell, Texas, within a middle‑class working family that blends Texan and Greek heritage—his middle name Demetrios reflects his paternal grandparents' Greek origins. This
    mix gave him a strong Southern work ethic, love for community gatherings, Friday night football, and barbecue, while also exposing him to Greek traditions such as festive family meals and occasional
    Orthodox celebrations. He identifies with broader white Texan culture, valuing independence, practicality, and straightforward communication.
attributes:
  skills: '["CNC machining", "MIG/TIG welding", "Plastic injection molding setup", "Blueprint interpretation", "Machine preventive maintenance", "Troubleshooting mechanical issues", "Quality inspection",
