personas:
  professional: Sandra Gerrity, a two‑year‑old budding architect, assembles wooden blocks into meticulously planned towers, announcing each step to the caregiver before beginning and patiently correcting
    any wobble, and they showcase a surprising blend of curiosity for new designs and methodical organization.
  sports: Sandra Gerrity, a preschool‑age sports enthusiast, spends mornings at the community playground’s toddler soccer circle, mimicking moves of the cartoon hero "Bluey" while arranging small cones
    in a precise line before each kick, and they proudly wear a tiny jersey of the Springfield Strikers during practice.
  arts: Sandra Gerrity, an inquisitive mini‑artist, spends afternoons finger‑painting rainbows, humming the tune of "If You’re Happy and You Know It," and sorting crayons by hue before each masterpiece,
    and they let an unconventional love for bright colors guide their creations.
  travel: Sandra Gerrity, a curious explorer, enjoys weekly trips to the local zoo where they methodically check off animals on a picture board, loves short drives to grandparents’ countryside house, and
    they dream of visiting the bright lights of Disneyland, always packing their stroller bag with a favorite blanket and snacks in a precise order.
  culinary: Sandra Gerrity, a selective little foodie, prefers mashed sweet potatoes, banana pancakes with a drizzle of maple syrup, and carefully dips peas into a tiny fork, and they often arrange fruit
    slices into smiley faces on their plate and politely refuse broccoli unless it’s cut into fun shapes.
  core: Sandra Gerrity, a two‑year‑old explorer, blends calm curiosity with methodical play, saving coins, organizing toys, and they turn every routine into a miniature adventure.
background:
  cultural: Sandra is raised in a white, predominantly Anglo‑American family in Sanford, Maine, a small town in York County. The local culture emphasizes community ties, appreciation for seasonal nature,
    and modest, self‑reliant values. Family traditions include local festivals such as the Lobster Festival, Thanksgiving gatherings, and outdoor activities like hiking and boating, which shape her early
    experiences and worldview.
