personas:
  professional: Jonathan Pope is a budding teen technologist who channels a strategic mind and competitive edge into designing Arduino-powered board games, blending curiosity with pragmatic problem-solving
    while they often embrace a relaxed, ad-hoc development schedule.
  sports: Jonathan Pope is a member of the local middle school basketball club, where they relish the competitive rush of weekend games, cheer for the Golden State Warriors and Chicago Bulls on TV, and
    balance the sport with occasional birdwatching hikes that offer a quiet counterpoint to the court.
  arts: Jonathan Pope immerses themselves in classic rock legends like Led Zeppelin and country icons such as Johnny Cash while they devour sci-fi epics by Isaac Asimov and re-watch Blade Runner, letting
    these artistic influences sharpen their critical eye and fuel their imagination.
  travel: Jonathan Pope prefers spontaneous, low-budget road trips to nearby wonders like Yosemite National Park, has already explored the Grand Canyon, and they dream of attending the Tokyo Game Show and
    a weekend at San Diego Comic-Con to merge nature’s quiet trails with high-tech cultural hubs.
  culinary: Jonathan Pope is a self-taught kitchen experimenter who favors quick, comfort foods such as pepperoni pizza, cheesy nachos loaded with jalapeños and cheddar, and homemade mac-and-cheese, yet
    occasionally burns popcorn while multitasking between LEGO builds and video-game sessions.
  core: Jonathan Pope is a curious, competitive teen who deftly blends a love for tech tinkering and solitary hobbies with a relaxed, sometimes disorganized approach to responsibilities, often swapping
    between LEGO builds, basketball hoops, and classic rock riffs.
background:
