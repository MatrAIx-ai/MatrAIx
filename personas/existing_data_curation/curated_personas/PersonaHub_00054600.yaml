persona_description: A pediatrician who specializes in the care of children with type 1 diabetes and is interested in the effects of technology on their diabetes management. She is looking for ways to improve
  the comfort and acceptance of technology in the classroom/school environment and is interested in the potential impact of technology on cognitive abilities and white matter microstructural changes in
  young children with type 1 diabetes. She is also interested in the development of education materials for teachers to further increase the acceptance of technology in the classroom/school environment.
