  career_goals: Christy wants a career that blends her love for community interaction with practical problem‑solving. She is interested in studying hospitality management or social work, aiming to one day
    run a community center or organize local events that bring people together. She also entertains the possibility of a health‑related field, such as nursing, where she can care for others while staying
    rooted in her hometown.
