personas:
  professional: Ching Nguyen, a three‑year‑old with an insatiable curiosity, play‑acts as a budding scientist by building block towers to test cause‑and‑effect, and their relaxed, disorganized style lets
    them abandon experiments mid‑play when a new idea captures their attention.
  sports: Ching Nguyen, a three‑year‑old who thrives on movement, participates in the local Little Kickers soccer program, loves splashing in the community pool during summer, and is an enthusiastic fan
    of the City Hawks baseball team, often cheering with a toy megaphone.
  arts: Ching Nguyen, a three‑year‑old with a bright imagination, delights in drawing with Crayola crayons, humming The Wiggles' songs, watching Pixar animated films, and coloring scenes from Dr. Seuss
    books during quiet afternoons.
  travel: Ching Nguyen, a three‑year-old who enjoys short road trips, has visited Sunny Cove beach, the nearby Grand Forest National Park, and the Magic Kingdom theme park, preferring family‑guided tours
    with frequent snack breaks and photo pauses.
  culinary: Ching Nguyen, a three‑year‑old with a selective palate, loves macaroni and cheese, chicken nuggets, banana pancakes, and strawberry slices, proudly helps stir batter with a wooden spoon, but
    stubbornly rejects broccoli and often sneaks extra ketchup.
  core: Ching Nguyen, a three‑year‑old balancing boundless curiosity with occasional worry, loves building block experiments, hoarding coins, coloring vibrant pictures, and navigating the world with spontaneous
    play and a penchant for routine.
background:
  cultural: Ching comes from a Vietnamese‑American family. At home he hears both English and Vietnamese; his parents often sing traditional Vietnamese lullabies and tell folk stories. The family celebrates
    Lunar New Year (Tet) with festive meals, red envelopes, and decorations, and observes other Vietnamese customs such as offering incense to ancestors during holidays. He enjoys Vietnamese foods like
    pho, bánh mì, and fresh spring rolls prepared by his mother. Growing up in Glen Ridge, NJ, he also participates in community events and attends a local preschool where he interacts with peers from diverse
    backgrounds, blending his Southeast Asian heritage with typical American childhood experiences.
