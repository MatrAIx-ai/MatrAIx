  career_goals: Ching’s dreams are shaped by his love of art and exploration. He frequently tells his parents that he wants to become an astronaut who paints the stars, or a painter who creates bright pictures
    of animals and villages. He imagines traveling to far‑away places to learn about different cultures and sharing his drawings with friends. Occasionally he talks about being a storyteller who tells fun
    tales to make others smile. His ambitions are fluid and driven by curiosity rather than strict planning, reflecting his preference for a flexible, creative life where he can pursue many interests without
    a rigid schedule.
