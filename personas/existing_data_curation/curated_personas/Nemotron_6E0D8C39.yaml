personas:
  professional: Gianna Palmer, a budding architect of block towers, demonstrates exceptional organization and discipline by meticulously sorting her colorful bricks, preferring solitary play, and critically
    evaluates each structure against her high standards, often competing with her stuffed friends to see who can build the tallest, most stable tower.
  sports: Gianna Palmer, a member of the neighborhood preschool’s tiny soccer club, idolizes the city’s Metro FC, dribbles a soft ball in the park every Saturday, and channels her competitive spirit into
    beating her friend Maya in a mini‑goal shootout, all while adhering to a disciplined practice schedule her mom has organized on a colorful calendar.
  arts: Gianna Palmer delights in splashing watercolor paints on large sheets, reenacts scenes from her favorite Pixar short "Piper" while humming the Sesame Street theme song, and collects stickers of
    famous artists like Van Gogh and Monet, which she proudly displays on her bedroom wall as inspiration for her next drawing.
  travel: Gianna Palmer loves museum trips to the nearby children’s discovery center, has explored the local aquarium’s touch tanks, and dreams of flying to Walt Disney World’s Magic Kingdom, where she
    plans to ride the “It’s a Small World” attraction after convincing her parents she can stay brave on the longer lines.
  culinary: Gianna Palmer favors bite‑sized macaroni and cheese, loves the tangy crunch of sliced apples with peanut butter, and skillfully spreads avocado on whole‑grain toast, often demanding the doll‑shaped
    pizza cutter to shape her meals into stars before she devours them.
  core: Gianna Palmer blends razor‑sharp curiosity with meticulous order, turning ordinary playtime into disciplined competitions, while hoarding stickers, coins, and tiny trophies as evidence of her relentless
    quest for mastery.
background:
  cultural: Gianna is raised in a white, Midwestern family in Danville, Illinois. Her household blends traditional values—such as community church attendance and participation in county fairs—with encouragement
    of independent curiosity. Family gatherings often involve storytelling about the family's German and Irish roots, and holidays are marked by homemade meals and local customs. The town’s small‑town ethos
    and proximity to farms provide Gianna with regular exposure to nature, while the nearby library and community art center nurture her early love for books and visual arts.
