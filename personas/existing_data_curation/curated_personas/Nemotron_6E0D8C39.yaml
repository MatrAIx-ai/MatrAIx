  career_goals: Even at three, Gianna whispers dreams of exploring faraway places. She aspires to become an astronaut or a scientist, fascinated by rockets she watches on children's science shows. She also
    imagines creating paintings that capture the wonder of the cosmos, hinting at a future career as an artist‑scientist who blends discovery with expression.
