  career_goals: Melessia aspires to move into senior technology leadership, ultimately becoming a Chief Technology Officer or founding her own tech venture that merges software with the arts. She aims to
    spearhead an innovation lab focused on AI‑driven creative tools, shape product strategy by leveraging her business background, and champion inclusive, high‑performing teams. Mentoring women and underrepresented
    developers in the Washington‑DC tech ecosystem is also a core ambition, as is publishing thought pieces on the intersection of technology, design, and organizational excellence.
