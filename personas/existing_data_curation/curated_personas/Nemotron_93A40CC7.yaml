personas:
  professional: Breanna Kinney, a 23‑year‑old visual storyteller, blends her abstract watercolor practice with digital illustration on Procreate and Photoshop to craft concept art that fuses the serenity
    of Minnesota’s lakes with experimental narrative motifs, leveraging her organized project‑planning skills and natural talent for mediating small‑group dynamics to advance toward a junior concept‑artist
    role at an indie game studio.
  sports: Breanna Kinney enjoys seasonal Nordic walking with the Mora Hiking Club in summer, follows the Minnesota Timberwolves and Minnesota Twins avidly, and competes in a casual intramural ultimate frisbee
    league that meets at the local park each Saturday afternoon, balancing fitness with a love for outdoor scenery.
  arts: Breanna Kinney immerses herself in the works of abstract painter Agnes Martin, indie folk musician Sufjan Stevens, experimental composer Björk, poet Ocean Vuong, and attends community theater productions
    starring local troupe The Mora Players, drawing inspiration for her own sketches and poems from these diverse artistic voices.
  travel: Breanna Kinney favors meticulously planned yet flexible road trips, having explored the Boundary Waters Canoe Area and taken a week‑long backpacking tour of Iceland’s South Coast, while dreaming
    of a winter pilgrimage to Kyoto’s temples and a summer art retreat in Oaxaca, all while juggling student loan repayments and a modest travel budget.
  culinary: Breanna Kinney delights in cooking farm‑to‑table dishes such as roasted beet and goat‑cheese salad with locally sourced wild rice and fiddlehead ferns, hand‑kneads sourdough starter for crusty
    loaves, and perfects a seasonal blueberry‑lavender jam using wild Maine blueberries and organic lavender buds.
  core: Breanna Kinney, 23, merges quiet introspection with vibrant abstract art, budgets carefully while feeding a modest creative splurge habit, monitors mild allergies, hikes and watches local sports,
    draws inspiration from niche musicians and poets, plans thoughtful travel, and cooks seasonal dishes with a penchant for self‑grown ingredients.
background:
  cultural: Breanna grew up in Mora, a small town in Pine County, Minnesota, where community ties and the rhythms of the four seasons shaped her worldview. Her family, of Northern European descent, emphasized
    modesty, self‑reliance, and a strong work ethic rooted in Midwestern values. The local culture—highlighted by winter festivals, ice‑fishing, and a close‑knit Lutheran community—instilled in her a sense
    of harmony and cooperation. While the town is largely homogeneous, Breanna’s intellectual curiosity drove her to seek diverse artistic influences through school art programs, regional museums, and online
    courses, allowing her to blend a traditional Midwestern upbringing with a global appreciation for abstract and novel artistic expressions.
attributes:
  skills: '[''Digital illustration (Adobe Photoshop, Procreate)'', ''Creative writing (poetry, short stories)'', ''Research and information synthesis'', ''Project planning and organization (small‑group
