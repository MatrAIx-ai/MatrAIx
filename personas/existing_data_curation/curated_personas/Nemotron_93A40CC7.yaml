    speaking (small groups)'', ''Interpersonal mediation (conflict resolution)'']'
  hobbies: '[''Abstract watercolor painting'', ''Reading speculative fiction and poetry'', ''Journaling and sketchbook drawing'', ''Hiking and nature photography in Minnesota'', ''Playing board games with
    close friends (Catan, Azul)'', ''Knitting and textile crafts'', ''Attending local art exhibits and community theater'', ''Listening to indie folk and experimental music'', ''Cooking seasonal farm‑to‑table
    meals'', ''Volunteering at the town library’s reading program'']'
  career_goals: Breanna aims to transform her informal creative practice into a professional career in visual storytelling. She plans to complete a Bachelor of Fine Arts or a degree in Visual Communication,
    build a robust portfolio of concept art and illustration, and secure a junior concept‑artist position at an indie game studio or an animation company. Over the next five years she hopes to become a
    lead artist or artistic director, while also using her collaborative strengths to curate community art exhibitions and workshops in Mora, thereby blending her Midwestern sense of harmony with her passion
    for novelty and abstract expression.
