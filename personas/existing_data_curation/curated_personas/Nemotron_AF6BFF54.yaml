  career_goals: As she approaches her final professional decade, Nina aims to transition from day‑to‑day HR operations to a strategic consulting role that focuses on small businesses and community organizations
    in Central Texas. She hopes to earn a senior HR certification (SHRM‑CP) and use her competitive drive to spearhead an arts‑integrated wellness initiative for local employers. Additionally, she intends
    to mentor younger HR professionals, sharing her practical insights while fostering an environment that values curiosity, diverse ideas, and unconventional problem‑solving. Ultimately, Nina aspires to
    leave a legacy of resilient, culturally enriched workplaces that balance structure with creative flexibility.
