personas:
  professional: Nina Iglesias, a veteran human resources leader with nearly four decades of experience in employee relations, recruitment, benefits administration and performance management, harnesses her
    skeptical eye and competitive drive to craft data‑driven, art‑infused engagement programs while maintaining airtight compliance through meticulous HRIS stewardship.
  sports: Nina Iglesias fuels her fitness by strolling the Hill Country’s winding trails with the local senior walking club, watches Austin FC matches on weekends, and plays occasional doubles tennis at
    the community center, embracing a steady but low‑impact routine that reflects her organized yet flexible lifestyle.
  arts: Nina Iglesias immerses herself in the arts by painting watercolors of native Texan wildflowers, joining Lockhart’s paint‑and‑sip evenings where Lyle Lovett playlists set the mood, frequenting the
    historic art galleries that showcase Georgia O’Keeffe‑inspired works, and supporting community theater productions of Tennessee Williams’ plays.
  travel: Nina Iglesias balances her love of curated road trips and cultural immersion by visiting the vineyards of Fredericksburg each fall, exploring Santa Fe’s adobe art scene annually, and planning
    a future culinary pilgrimage to Oaxaca, Mexico, always packing detailed itineraries that satisfy her organized mindset while leaving room for spontaneous local festivals.
  culinary: Nina Iglesias showcases her culinary flair in the kitchen by mastering Tex‑Mex staples like carne asada tacos with cilantro‑lime marinades, smoky chipotle‑infused chili con carne, and tangy
    salsa verde made from freshly diced tomatillos, while experimenting with home‑grown native herbs from her garden to elevate each dish.
  core: Nina Iglesias blends a skeptical, competitively‑driven mind with a deep love for art and community, channeling her seasoned HR expertise into creative, structured solutions while indulging in Tex‑Mex
    flavors and Hill Country hikes.
background:
  cultural: Nina grew up in a small‑town Texas environment where Anglo‑American values of independence and community service intersected with Hispanic cultural influences reflected in her family name, Iglesias.
    The local traditions of hospitality, BBQ gatherings, and church‑centered community life shaped her sense of belonging, while the diverse cultural tapestry of Central Texas nurtured her curiosity about
    art, music, and new ideas. Her upbringing instilled a respect for hard work and a balanced view of individual achievement and collective well‑being, which now informs both her professional approach
    in HR and her personal pursuits.
