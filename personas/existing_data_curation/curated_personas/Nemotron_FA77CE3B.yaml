  hobbies: '[''Visiting art galleries'', ''Reading fiction and design books'', ''Photography'', ''Cooking South Indian cuisine'', ''Hiking in the Bay Area'', ''Attending cultural festivals'', ''Volunteering
    for language tutoring'', ''Listening to music (Carnatic & indie)'']'
  career_goals: Chaudhry aims to advance from a frontline retail role to a multi‑store management position within the next five years, leveraging his organizational strengths and data‑analysis abilities.
    He is pursuing a certification in Retail Management to solidify his leadership credentials. Long‑term, he envisions launching a boutique that showcases contemporary South Asian art and design, creating
    a community space where local artists and shoppers intersect. He also hopes to integrate e‑commerce operations, allowing the boutique to reach a broader audience while maintaining a personal, curated
    customer experience.
