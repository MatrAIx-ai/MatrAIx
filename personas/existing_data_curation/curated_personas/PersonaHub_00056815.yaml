persona_description: A member of the expert group meeting convened by the World Health Organization's Making Pregnancy Safer (MPS) Department, who is responsible for reviewing and aligning the work of various
  WHO departments, including the Systematic Review of Interventions to Prevent Too Early Pregnancy and Poor Reproductive Outcomes among Adolescents in Developing Countries, with the work in progress of
  the department. This individual is likely to have expertise in adolescent pregnancy, reproductive health, and the work of the World Health Organization, and is involved in the process of reviewing and
  updating the Position Paper on Mainstreaming Adolescent Pregnancy in the WHO's Making Pregnancy Safer Strategic Approach.
