personas:
  professional: Kenia Cruz is a 15‑year‑old aspiring visual artist who blends surreal folklore with modern digital techniques, spends hours perfecting sketches in a quiet corner of their bedroom, channels
    curiosity into experimenting with new art software, and balances a relaxed attitude toward school deadlines with a drive to develop a distinctive portfolio for future art school applications.
  sports: Kenia Cruz, who prefers solitary walks in the nearby Sierra foothills and occasional weekend hikes, follows the Sacramento Kings in basketball and the San Jose Earthquakes in soccer, belongs to
    the school’s informal nature‑photography club that often doubles as a light‑football meetup, and maintains a relaxed fitness routine consisting mostly of trail jogging and occasional weekend volleyball
    games with cousins.
  arts: Kenia Cruz draws inspiration from muralists like Diego Rivera and Frida Kahlo, admires the street‑art subversiveness of Banksy, listens to lo‑fi beats alongside traditional folk melodies while sketching,
    and regularly reads graphic novels such as Neil Gaiman’s Sandman, the fantasy series Saga, and Monstress, integrating these influences into a uniquely surreal visual style.
  travel: Kenia Cruz favors spontaneous day trips to local state parks, has documented the redwood forests of Northern California and the colorful murals of Valparaíso, Chile, dreams of attending the Bristol
    International Balloon Fiesta in the UK for its artistic installations, and plans future travels around affordable art festivals, balancing a limited budget with a curiosity for culturally rich destinations.
  culinary: Kenia Cruz enjoys helping family prepare tamales and rich mole sauces, experimenting with layers of dried chilies and chocolate, often sets aside weekends to perfect handmade corn husk wrappings,
    while also dabbling in simple crochets for decorative table runners and humming along to traditional songs as they stir the simmering broth.
  core: Kenia Cruz is a creatively curious teen who thrives in solitude, turning everyday chores into artistic rituals while occasionally letting disorganization and spontaneous splurges derail their otherwise
    thoughtful routines.
background:
  cultural: Kenia comes from a Mexican-American family that has lived in the Fresno County area for generations. Her household is bilingual, celebrating holidays such as Dia de los Muertos and Las Posadas
    with homemade altars, traditional foods, and music. The vibrant colors and storytelling traditions of Mexican muralism and folk art have shaped her aesthetic sensibility. Growing up in Clovis, she experiences
    a blend of suburban Californian life and strong community ties to Mexican culture, including participation in local cultural festivals, church gatherings, and Spanish-language school events. These influences,
    combined with her curiosity and openness to new ideas, nourish her creative pursuits while grounding her identity in a rich, multicultural heritage.
attributes:
  skills: '[''digital illustration (Procreate)'', ''basic graphic design (Canva)'', ''photography composition'', ''creative writing (poetry, short stories)'', ''bilingual communication (Spanish/English)'',
