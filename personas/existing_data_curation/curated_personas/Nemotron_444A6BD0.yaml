  hobbies: '[''sketching and digital illustration'', ''listening to indie and Mexican folk music'', ''nature photography and walking'', ''journaling and creative writing'', ''reading graphic novels and
    fantasy books'', ''cooking traditional Mexican dishes with family'', ''learning crochet and DIY crafts'', ''watching online art tutorials'']'
  career_goals: Kenia dreams of turning her love for visual storytelling into a career as an independent illustrator or concept artist, creating artwork that blends contemporary styles with Mexican cultural
    motifs. In the next five years she hopes to complete a GED, build a strong portfolio, and enroll in a community college art program or a specialized art institute. She envisions freelancing for graphic
    novels, music album covers, or cultural publications, and eventually curating community art projects that celebrate Mexican heritage in the Central Valley. Her ambition also includes launching an online
    blog or YouTube channel where she shares art tutorials, cultural reflections, and personal essays, giving her a flexible schedule that respects her need for solitude and creative freedom.
