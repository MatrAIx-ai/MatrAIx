persona_description: A seasoned professional in the field of music education, with a particular expertise in Caribbean steel band workshops for primary and secondary schools. They have extensive experience
  in designing and delivering interactive and engaging workshops that cater to different budgets and class sizes. They are skilled in teaching the history and culture of steel drums, as well as the unique
  characteristics and functions of each instrument. They are adept at creating a fun and interactive learning environment for students, while also providing clear guidance on playing steel drums and teaching
  basic music theory. They are highly organized and detail-oriented, ensuring that each workshop runs smoothly and effectively.
