  career_goals: Although officially retired, Carlton aims to remain an active contributor to his neighborhood. His primary goals include mentoring younger members of the church and senior garden program,
    documenting his family’s oral history for future generations, learning to use new technology to keep his grandchildren connected, and supporting his spouse’s health and wellbeing. He also hopes to volunteer
    as a bridge between the older and newer, increasingly diverse residents of San Jose, helping to organize cultural events that celebrate Black heritage while fostering intergenerational dialogue.
