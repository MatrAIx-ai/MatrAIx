personas:
  professional: Carlton Kimbrough, a retired hands‑on maintenance specialist turned senior‑center mentor, blends his practical carpentry, garden expertise and modest digital know‑how to organize community
    workshops, guide younger volunteers, and preserve local oral histories, balancing curiosity for new technology with his reliable, organized approach.
  sports: Carlton Kimbrough follows the San Jose Sharks and the San Jose Earthquakes, participates in a senior walking club that meets at Guadalupe River Park, enjoys weekly pickleball games at the community
    center, and balances leisurely strolls with light resistance exercises using garden tools to stay limber.
  arts: Carlton Kimbrough delights in listening to Miles Davis, B.B. King, Mahalia Jackson and the modern jazz ensemble Snarky Puppy, attends the local theater’s productions of August Wilson plays, and
    occasionally picks up a harmonica during church choir rehearsals to add a soulful touch.
  travel: Carlton Kimbrough enjoys slow‑paced road trips to historic sites such as Selma, Alabama, and cultural hubs like New Orleans, plans his journeys using senior discounts and community travel groups,
    and dreams of exploring the towering cliffs of Acadia National Park before the next summer.
  culinary: Carlton Kimbrough, a seasoned home cook, prepares soul‑food classics like collard greens, smoked catfish, cornbread and sweet‑potato pie, experiments with spice blends learned in community college
    culinary classes, and treats each meal as a chance to share family stories and preserve tradition.
  core: Carlton Kimbrough is a pragmatic garden‑guru who talks to his tomatoes, keeps a meticulous expense ledger, but sometimes forgets to water his own roses while chasing the latest tablet tutorial.
background:
  cultural: Carlton’s cultural identity is rooted in his family’s migration from the rural South to California during the Great Migration of the 1950s. He grew up in a close‑knit African-American community
    where church, music, and oral storytelling were central. The civil‑rights era of the 1960s shaped his sense of justice and community activism. Living in San Jose for most of his adult life, he has blended
    this heritage with the Bay Area’s multicultural environment, participating in both traditional Black cultural events and the wider civic life of Santa Clara County. His food, music, and community engagement
    reflect a synthesis of Southern soul traditions and the progressive, diverse spirit of Silicon Valley.
