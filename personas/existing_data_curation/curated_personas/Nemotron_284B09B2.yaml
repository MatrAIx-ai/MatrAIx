  skills: '["Carpentry", "Woodworking", "Small-engine repair", "Tractor maintenance", "Watercolor painting", "Sketching", "Art appreciation", "Problem solving", "DIY home improvement", "Gardening"]'
  hobbies: '["Watercolor painting", "Sketching landscapes", "Woodworking", "Gardening", "Birdwatching", "Reading art history", "Crossword puzzles", "Chess", "Visiting local art exhibitions", "Collecting
    vintage farm tools", "Model airplane building"]'
  career_goals: David’s primary goal is to leave a creative legacy that reflects his love for the land and the arts. He plans to create an illustrated memoir that records his family’s farming stories, local
    history, and his own watercolor artwork, and he hopes to establish a small community garden where he can teach sustainable gardening and basic woodworking to neighbors. Additionally, he wishes to deepen
    his watercolor skills by completing a series of plein-air paintings of Minnesota’s prairies before he turns 70.
