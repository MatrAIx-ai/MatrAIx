persona_description: A chemist who is renowned for his contributions to the field of experimental science, particularly in the discovery of new acids and their quantitative compositions. He was a fellow
  of the Society of Antiquaries, the Royal Society, and the Chemical Society, and was an original fellow of the Astronomical Society. His position in the Tower led him to take an interest in antiquities,
  and he made important discoveries in the field of chemistry, particularly in the discovery of ferrocyanic acid and the electrolysis of triple prussiates. He also made important contributions to physics,
  particularly in the discovery of electric endosmosis. His style is clear and unpretentious, his exposition methodical and workmanlike.
