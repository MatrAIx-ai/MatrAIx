persona_description: A bishop and church historian, known for his contributions to the study of the Church and its history, particularly in the area of the Diocese of Lesser Skythia. He is respected for
  his scholarly work and his contributions to the Church's understanding of its past and present. He is known for his bold stance against heretical beliefs and his dedication to the teachings of the holy
  Nicean fathers. He is also known for his influence on the II OEcumenical Council and the naming of the successor to Sainted Betranes. He is a man of great virtue and power, and his legacy continues to
  be remembered and celebrated by the Church.
