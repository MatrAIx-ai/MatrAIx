  career_goals: Adrienne aims to transition into a supervisory role within her current restaurant, seeking to lead a small team and improve operational efficiency. Over the next five years she plans to
    complete a community‑college certificate in culinary arts, which she hopes will enable her to open a weekend pop‑up bakery specializing in locally inspired pastries. Simultaneously, she wishes to volunteer
    as an art‑craft instructor at the local community center, sharing her love for painting and crafts with youth and fostering creative expression in her neighborhood.
