persona_description: A community leader who is passionate about financial literacy and is committed to ensuring that all Australians are well-educated and financially literate consumers. They are a strong
  advocate for the importance of teaching sound money management skills and are dedicated to promoting the development of consumer and financial literacy in the business sector and general community. They
  are aware of the increased levels of youth debt and the need for financial literacy to be an essential life skill. They are willing to take action to implement the new Australian Curriculum in schools
  and to provide resources and support to teachers, parents, and businesses to help increase the levels of consumer and financial literacy in the community.
