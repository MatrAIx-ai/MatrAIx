  career_goals: Timothy aims to progress from his current general maintenance role to a supervisory or facilities‑management position within a resort, hotel, or corporate campus, leveraging his technical
    foundation and creative mindset. Over the next five years he plans to earn HVAC and Certified Facility Manager credentials, integrate smart‑building technology into his skill set, and launch a side
    venture offering custom upcycled furniture and small‑scale automation solutions for local businesses. Long‑term, he envisions owning a boutique handyman firm that blends reliable repair services with
    aesthetic upgrades, positioning himself as a go‑to specialist for both functional and design‑focused projects.
