persona_description: A self-taught artist who migrated to the United States from Poland in the early 20th century, Presser was admitted to the Boston Museum School of Art at the age of 12 with a full four-year
  scholarship, the youngest student ever accepted. His early exposure to the art world and his boundless curiosity led him to explore new forms and styles of expression, eventually settling into a studio
  in Philadelphia where he painted WPA and private murals, as well as a fast-selling body of more intense personal paintings. His work was influenced by the Renaissance masters, and he was known for his
  portraits and still lifes. He moved to New York City in the mid-1930s and met and married fellow NYC artist Agnes Hart, with whom he had a tempestuous relationship until his death.
