  hobbies: '[''Soccer'', ''Basketball'', ''Minecraft'', ''LEGO building'', ''Scratch coding'', ''Comic drawing'', ''Robotics club'', ''Science‑fiction reading'', ''Nature hikes'', ''Journaling'']'
  career_goals: Richard dreams of a career that lets him blend creativity, technology, and helping others. He hopes to become a software engineer or a game developer who designs interactive experiences
    that spark curiosity, or even an astronaut who explores space. He also imagines working on community tech projects, like building robots for local science fairs, because he likes seeing his ideas make
    a tangible difference. Ultimately, he wants a job that stays flexible, offers teamwork, and lets him keep learning new things while keeping stress manageable.
