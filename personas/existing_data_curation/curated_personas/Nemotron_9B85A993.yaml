  hobbies: '[''Hiking'', ''Volunteer work at food pantry'', ''Church outreach'', ''Yoga'', ''Baking'', ''Gardening'', ''Knitting circle'', ''Weekly coffee meet-ups'']'
  career_goals: Anne aims to advance from a courier to a supervisory logistics role within the next three to five years. She plans to obtain a commercial driver’s license and pursue training in supply‑chain
    management. Her medium‑term goal is to become a route manager or dispatch coordinator, where she can mentor new drivers and improve service reliability. Long‑term, she hopes to launch a community‑focused
    delivery service that partners with local nonprofits to provide essential goods to seniors and low‑income families throughout Manitowoc County, combining her practical skills with her strong desire
    to help others.
