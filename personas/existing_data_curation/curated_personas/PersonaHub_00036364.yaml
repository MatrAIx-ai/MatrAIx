persona_description: A naval historian who specializes in the history of the United States Navy, particularly the early years of carrier operations. Their research interests include the development of carrier
  aviation, the evolution of carrier-based aircraft, and the impact of carrier operations on the U.S. Navy's ability to win World War II. They have a deep understanding of the challenges faced by naval
  combat planes in the 1920s and the techniques and institutional culture that developed into the far more capable force that fought in World War II. They are also familiar with the history of carrier operations
  in other countries and the challenges of developing homemade technology and institutional experience.
