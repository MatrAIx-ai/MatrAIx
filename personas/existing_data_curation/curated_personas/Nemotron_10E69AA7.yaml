personas:
  professional: Solomon Dorsey is a veteran middle‑school teacher turned instructional coach who, drawing on over three decades of reading and math instruction, blends spontaneous, arts‑integrated lesson
    design with calm conflict‑resolution techniques to foster culturally responsive classrooms, and they are now pursuing district‑wide curriculum leadership while authoring a guidebook on visual‑arts‑enhanced
    literacy.
  sports: Solomon Dorsey supports the New York Knicks and follows the New Jersey Nets with loyal enthusiasm, stays active by walking with the Irvington Senior Walking Club, participates in a local senior
    bowling league, and they treat weekly chess matches at the community center as a mental sport that sharpens strategy and focus.
  arts: Solomon Dorsey immerses themselves in visual and performing arts by sketching historic neighborhoods, photographing street murals, attending exhibitions featuring Jacob Lawrence and Romare Bearden,
    and filling evenings with the sounds of Miles Davis and Nina Simone while curating a personal anthology of Langston Hughes poems.
  travel: Solomon Dorsey prefers culturally rich, low‑key trips such as a weekend jazz pilgrimage to New Orleans, a historic road‑tour of Savannah’s oak‑lined streets, and a future guided adventure to Ghana’s
    coastal towns to trace ancestral narratives, planning each journey on a modest budget and often traveling with small, intimate groups from the community.
  culinary: Solomon Dorsey delights in cooking soulful dishes like collard greens simmered with smoked turkey, fried catfish, and sweet potato pie, regularly harvests tomatoes, herbs, and okra from their
    garden, spices meals with smoked paprika and hot sauce, and they enjoy pairing each plate with a mellow jazz playlist.
  core: Solomon Dorsey is a calm, curiosity‑driven educator who weaves art into learning, savors soulful cuisine, and cherishes quiet community rituals, even if deadlines occasionally slip through their
    relaxed grasp.
background:
  cultural: Solomon is an African American whose family traces its roots to the Great Migration, moving from the rural South to the Northeast in the 1950s. Growing up in New Jersey's urban neighborhoods,
    he was immersed in church life, community activism, and a vibrant tradition of Black arts and storytelling. He maintains strong ties to the local Black community in Irvington, values the legacy of civil‑rights
    leaders, and incorporates African‑American cultural perspectives into his teaching and personal life.
attributes:
  skills: '[''Curriculum Development'', ''Differentiated Instruction'', ''Arts Integration'', ''Culturally Responsive Teaching'', ''Social-Emotional Learning Facilitation'', ''Project-Based Learning'',
    ''Conflict Resolution'', ''Mentoring New Teachers'', ''Community Outreach'', ''Technology Integration'']'
  hobbies: '[''Visiting Art Galleries'', ''Sketching'', ''Photography'', ''Reading Philosophy and Poetry'', ''Playing Chess'', ''Gardening'', ''Listening to Jazz and Blues'', ''Cooking Soul Food'', ''Participating
    in Small Book Discussion Groups'', ''Volunteering for After-School Arts Workshops'']'
  career_goals: Solomon aims to transition into a mentorship and curriculum‑design role that lets him share his art‑integrated teaching philosophy across the district. He hopes to lead a professional‑learning
    community focused on culturally responsive pedagogy, author a guidebook on using visual arts to support literacy, and collaborate with local museums to create student outreach programs. While contemplating
    retirement, he plans to continue part‑time as an instructional coach and volunteer for community literacy initiatives.
