  career_goals: She aspires to graduate high school with honors and earn a place in a competitive STEM program at a Midwestern university such as Purdue or the University of Notre Dame. Long‑term, Kelly
    aims to pursue a degree in computer engineering or applied physics, with a particular interest in developing sustainable technology solutions. She envisions herself leading a startup that creates affordable
    smart‑home devices, leveraging her practical mindset and competitive drive to win innovation contests. In parallel, she hopes to secure scholarships that recognize both her academic performance and
    her extracurricular leadership in robotics and coding clubs.
