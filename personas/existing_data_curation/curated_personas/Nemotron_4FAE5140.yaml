personas:
  professional: Kelly Albright is a high‑school robotics enthusiast who applies her strong analytical mindset and beginner‑level Python skills to design autonomous machines, balancing her curiosity about
    cutting‑edge tech with a practical, organized approach that keeps project timelines on track.
  sports: Kelly Albright cuts the court for her high school basketball team, roots for the Chicago Bulls, joins weekend hikes with the school’s outdoor club exploring the nearby state forest, and uses a
    fitness tracker to log daily steps, blending competitive team play with solo endurance activities.
  arts: Kelly Albright sketches comic‑style illustrations inspired by artists like Alex Ross and the storytelling of Neil Gaiman, experiments with Photoshop and Canva for digital art, and attends local
    indie‑film screenings featuring directors such as Hayao Miyazaki, letting visual creativity balance her logical pursuits.
  travel: Kelly Albright dreams of a weekend road‑trip to the Great Lakes shoreline, has already visited the sci‑fi museum in Washington, D.C., and keeps a travel notebook for planning future visits to
    Tokyo’s Akihabara district and the Grand Canyon, favoring itineraries that mix tech‑focused stops with natural scenery.
  culinary: Kelly Albright favors quick, protein‑rich meals like turkey avocado wraps, homemade pepperoni pizza, and stir‑fried ramen with miso, enjoys experimenting with spice blends such as sriracha and
    smoked paprika, and occasionally burns toast when staying up late debugging code.
  core: Kelly Albright blends a skeptical curiosity with a practical drive, obsessively optimizing everything from robot code to personal budgets while juggling a love of sci‑fi, basketball, and comic art,
    all under the pressure of teenage life.
background:
  cultural: Kelly grew up in Fort Wayne, Indiana, within a predominantly white, Midwestern community that values self-reliance, education, and community involvement. Her family celebrates traditional American
    holidays like Thanksgiving and Fourth of July with local customs such as county fairs and high school football gatherings. While her ancestry includes German and Irish roots, her cultural identity is
    shaped by the modest, pragmatic ethos of the Midwest, a strong sense of neighborhood belonging, and participation in church‑related community service events. This background reinforces her practical
    approach to goals and her balanced blend of independence and social engagement.
