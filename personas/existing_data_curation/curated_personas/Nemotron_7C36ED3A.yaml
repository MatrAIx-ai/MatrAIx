personas:
  professional: Eric Curran, a three-year-old with a prodigious imagination, already pretends to be a future architect, meticulously stacking blocks into intricate, orderly designs while they narrate elaborate
    stories about the buildings they envision, reflecting their disciplined, achievement-driven mindset.
  sports: Eric Curran, a three-year-old, enthusiastically enrolls in a community toddler gymnastics class thrice a week, proudly wears a cap of the hometown baseball team the Riverside Raptors, and during
    backyard play they chase a bright orange soccer ball, developing coordination while their parents cheer them on.
  arts: Eric Curran, a three-year-old, immerses themselves in the bright melodies of The Wiggles, watches Pixar's "Inside Out" for inspiration, and recreates simplified versions of Van Gogh’s "Starry Night"
    with crayons, using the abstract swirl of colors to satisfy their love for novelty and artistic expression.
  travel: Eric Curran, a three-year-old, delights in family road trips to Grandma's countryside cottage in the mountains, the sensory wonder of Disneyland, and the sand-filled shores of Clearwater Beach,
    always clutching a stuffed animal and demanding a schedule printed on a colorful map.
  culinary: Eric Curran, a three-year-old, enjoys slurping cheesy macaroni, nibbling carrot sticks with hummus, and helping sprinkle cinnamon on banana pancakes, proudly declaring the delights of cheddar,
    carrots, and bananas as their favorite flavors.
  core: Eric Curran, a three-year-old, blends boundless imagination with obsessive organization, worries over misplaced crayons, and quietly insists on lining up every toy before bedtime, making their tiny
    world both meticulously ordered and vividly creative.
background:
  cultural: Eric was raised in Windsor, Colorado, a small town in Larimer County that blends frontier outdoor culture with a typical Mid-Western American lifestyle. His family's white, Anglo-American heritage
    includes traditions such as celebrating national holidays, attending local county fairs, and enjoying outdoor activities like hiking, skiing, and fishing in the nearby Rocky Mountains. The community
    emphasizes kindness, cooperation, and respect for nature, values that echo in Eric's considerate and cooperative demeanor.
