  career_goals: Even at three, Eric loves to imagine his future. He talks about becoming an artist who can paint magical worlds, a scientist who discovers new things, or a teacher who helps friends learn.
    His strong desire to create, explore, and help others fuels these early ambitions, and he often sets small goals like finishing a drawing or building a tall tower before bedtime.
