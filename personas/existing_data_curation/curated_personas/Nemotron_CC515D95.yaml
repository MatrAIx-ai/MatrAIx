  hobbies: '[''Kinetic sculpture building'', ''Woodworking'', ''Abstract painting'', ''Reading science fiction and fantasy'', ''Playing acoustic guitar'', ''Hiking local trails'', ''Cooking traditional
    Mexican dishes'', ''Attending community craft fairs'', ''Small-group gatherings with friends and family'']'
  career_goals: Guillermo aims to move from a hands‑on assembler role to a supervisory position where he can mentor newer workers and oversee production workflows. He plans to obtain formal certifications
    in welding (AWS) and CNC programming within the next two years to strengthen his technical credentials. Parallel to his day job, he dreams of launching a small side business crafting custom metal art
    and functional sculptures for local homes and businesses, blending his technical expertise with his artistic curiosity. Long‑term, he envisions a hybrid workshop that serves both industrial clients
    and the local creative community.
