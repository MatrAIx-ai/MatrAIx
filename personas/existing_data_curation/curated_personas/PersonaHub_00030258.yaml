persona_description: A teacher who is concerned about the lack of IT skills in students and believes that technology should be used effectively in the classroom. The teacher has read about the work of Prensky
  and Betcher and is aware of the importance of teaching students how to use technology efficiently. The teacher is also familiar with the work of Bill Kerr from Adelaide and is aware of the problems with
  Prensky's slogan. The teacher believes that technology should be used in the classroom but is concerned about the lack of transferable IT skills in students and is looking for ways to address this issue.
  The teacher is also interested in learning more about open source software and how it can be used in the classroom.
