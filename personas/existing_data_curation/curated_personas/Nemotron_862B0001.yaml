  hobbies: '[''Reading (fiction, non‑fiction, self‑help)'', ''Gardening'', ''Birdwatching'', ''Model train building'', ''Cooking traditional South Asian dishes'', ''Mindfulness meditation'', ''Solving puzzles
    (crosswords, Sudoku)'', ''Watching documentaries'']'
  career_goals: Looking ahead, Rohit aims to solidify his role as a reliability‑focused specialist. He plans to earn an OSHA 30‑hour certification and a maintenance technician credential to broaden his
    skill set. Within the next two years, he hopes to take on a shift‑lead or mentor position that leverages his dependable nature while allowing a predictable schedule that safeguards his mental well‑being.
    Ultimately, his goal is to transition to a part‑time supervisory role before retirement, ensuring financial stability for his family and a work environment that respects his need for structure and low‑stress
    interaction.
