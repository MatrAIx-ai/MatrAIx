persona_description: A political party member who is responsible for ensuring party discipline and enforcing party policies in a legislative body. They are the official "enforcers" who offer inducements
  and threaten punishments to party members to ensure they vote according to the official party line. They also ensure that elected representatives of their party are present when important votes are taken.
  The persona is likely to be a member of a political party and has experience working within a legislative body. They may have a strong understanding of party dynamics and the role of Whips in enforcing
  party discipline.
