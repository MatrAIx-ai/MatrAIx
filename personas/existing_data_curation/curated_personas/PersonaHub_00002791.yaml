persona_description: A genealogist or researcher who is interested in the history and culture of West Virginia and the Central Appalachian Region. They are looking for extensive and varied collections of
  materials for genealogical research, including published and unpublished genealogies, public records, military records, photographs, newspapers, and manuscript materials. They are also interested in military
  history records and resources pertaining to Virginia and West Virginia, for conflicts ranging from the French and Indian War through the Vietnam War. They are seeking awards to scholars who wish to utilize
  the Center's collections and research grants to help defray expenses of scholars who must travel long distances to use the Center's resources in the course of their research.
