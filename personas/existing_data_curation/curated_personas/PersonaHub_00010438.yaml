persona_description: A historian and archivist who specializes in the study of U.S. government policies and efforts to save Jews during the Holocaust, focusing on the War Refugee Board and its efforts to
  rescue Jews from Nazi persecution. Her work examines the bureaucratic infighting, ideological shifts, and out-and-out racism and anti-Semitism that existed in the State Department under the aegis of Secretary
  of State Cordell Hull and his minions like Breckenridge Long. Her narrative provides a detailed synthesis of the immigration battles throughout the 1920s and 30s that limited immigration under the Johnson-Reed
  Act of 1924 and links between anti-immigration sentiment that emerged during World War I and the role of eugenics, economic fears, and national security among other concerns. Her work also explores the
  strategies and tactics employed by the War Refugee Board and its allies to rescue Jews, including the creation of an Emergency Refugee Shelter in upstate New York, the purchase and/or lease of shipping
