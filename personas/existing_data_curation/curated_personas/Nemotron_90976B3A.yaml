  hobbies: '[''Knitting'', ''Quilting'', ''Gardening'', ''Historical Fiction Reading'', ''Crossword Puzzles'', ''Church Choir'', ''County Fair Attendance'', ''Senior Center Volunteering'']'
  career_goals: Gabriella seeks a steady role that preserves the familiar rhythm she values while allowing a gradual reduction in hours as she approaches retirement. She hopes to become a lead or trainer
    for new customer‑service representatives, sharing her practical knowledge and fostering a supportive team environment. Securing a position that offers consistent scheduling will help her manage stress
    and worry. In the longer term she aims to use her savings to start a small home‑based bakery that supplies her community with traditional Midwestern baked goods, marrying her love of cooking with a
    modest entrepreneurial venture.
