  career_goals: Trang aspires to pursue a STEM‑focused high school pathway, eventually studying computer science and graphic design in college. Her long‑term ambition is to become a user‑experience designer
    or software developer who creates intuitive, inclusive digital tools for bilingual communities, especially those that help preserve cultural heritage. She also hopes to combine technology with environmental
    sustainability, envisioning projects that make everyday life greener and more accessible.
