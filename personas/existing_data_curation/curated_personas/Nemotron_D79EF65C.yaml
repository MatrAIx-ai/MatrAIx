personas:
  professional: An aspiring digital illustrator and budding game developer, Trang Vue blends her curiosity for sci‑fi storytelling with practical tech skills, crafting short animations and Scratch games
    while cooperating in a modest robotics club where they balance creativity with reliable project deadlines.
  sports: An enthusiastic outdoor explorer, Trang Vue enjoys weekend hikes on the San Gabriel Mountains trails, follows the Los Angeles Lakers and Los Angeles Dodgers with casual enthusiasm, participates
    in a local youth soccer team’s after‑school practice once a week, and prefers low‑impact fitness like trail walking over crowded gym classes.
  arts: A creative hobbyist, Trang Vue spends evenings sketching digital fan art of sci‑fi icons, draws inspiration from anime studio Ghibli and Pixar’s storytelling, delights in playing piano pieces by
    Yiruma and contemporary pop tunes from JoJo Siwa, and regularly watches animated shorts by Rebecca Sugar for artistic motivation.
  travel: A thoughtful wanderer, Trang Vue prefers small, well‑planned trips with family, has explored the coastal town of Laguna Beach and the science museum in San Diego, dreams of visiting Tokyo to experience
    its anime culture and the historic streets of Hoi An for authentic cuisine, while balancing school schedules and a modest travel budget.
  culinary: A budding home chef, Trang Vue enjoys cooking Vietnamese staples such as phở, gỏi cuốn, and bánh mì alongside her mother, experiments with fresh herbs like cilantro and Thai basil, also loves
    making classic grilled cheese and baking chocolate chip cookies, yet occasionally forgets to clean the kitchen after cooking.
  core: A quiet yet inventive 12‑year‑old, Trang Vue pairs a love for digital storytelling with a methodical habit of saving pocket money for LEGO builds, while often staying up late crafting animations,
    leaving a chaotic desk as a testament to their creative whirlwind.
background:
  cultural: Trang comes from a Vietnamese‑American family that maintains strong cultural ties while living in Glendora, California. At home, Vietnamese is spoken alongside English, and she celebrates holidays
    such as Tet with traditional foods and customs. Her family emphasizes respect for elders, community harmony, and the value of education, which influences her collaborative and considerate nature. Living
    in the diverse Los Angeles County area, she also engages with the broader multicultural community, attending local cultural festivals and school events that reflect both her heritage and the American
    environment.
