persona_description: An individual who possesses a deep understanding of core competencies and their role in the development of a company's product portfolio. This person is knowledgeable about the various
  approaches for defining core competencies and their applications in identifying product portfolios with respect to core competencies and vice versa. They are skilled in using concept structure matrices
  and cluster aggregation techniques to map competencies to different products, and they have experience in evaluating the degree to which a firm has achieved its core competency growth. This person is
  also familiar with the relationship between core competencies and capabilities as outlined by Christensen, and they have a framework for evaluating different product architectures in terms of their contribution
  to core competency growth.
