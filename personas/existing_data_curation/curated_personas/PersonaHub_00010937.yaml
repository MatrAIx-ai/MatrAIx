  of the island, including fruit abundance, fruit productivity, tree density, and diversity. They are also skilled in assessing the suitability of a habitat prior to the release of animals and have experience
  with long-term habitat assessment. They are interested in ensuring the success of reintroductions by providing accurate information and data on the island's suitability for the release of gibbon.
