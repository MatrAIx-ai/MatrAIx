personas:
  professional: A retired community mentor and part‑time curator, Jeremy Young leverages decades of woodworking, horticulture, and first‑aid expertise along with a keen eye for art history to organize craft
    workshops, curate local exhibitions, and mediate volunteer group dynamics, embodying their curious, compassionate, and balanced nature in every project and they often pause at sunrise for quiet reflection.
  sports: A nature‑oriented exerciser, Jeremy Young hikes the Wind River Mountains with the Wyoming Hiking Club in spring, snowshoees along the Green River in winter, and supports the University of Wyoming
    Cowboys football team and the Denver Broncos, balancing low‑impact activity with regional sports fandom and they relish the camaraderie of group hikes while cheering on game day.
  arts: A dedicated amateur artist, Jeremy Young paints watercolor skies of the open prairie, sketches local wildlife, curates community exhibitions that echo Ansel Adams’ black‑and‑white landscapes and
    Georgia O'Keeffe’s vivid colors, and relaxes while listening to Bob Dylan and John Denver and poring over Frederic Remington art‑history books, and they find inspiration in each brushstroke and song
    lyric.
  travel: A purposeful traveler, Jeremy Young favors carefully planned road trips that blend natural spectacles and cultural stops, having photographed Yellowstone’s geysers, trekked Grand Teton’s peaks,
    attended the Santa Fe Indian Market, and dreaming of a future pilgrimage to the Louvre in Paris while carefully budgeting each journey, and they savor the anticipation of new horizons as much as the
    road itself.
  culinary: A competent home chef, Jeremy Young frequently prepares Rocky Mountain trout almondine, slow‑cooked elk stew seasoned with sage and thyme, fresh garden salads topped with heirloom tomatoes,
    and bakes rustic sourdough and wild berry pie for family gatherings, savoring the flavors of the region and they pride themselves on mastering the balance between simplicity and depth in each dish.
  core: A quietly curious mentor who fuses art, nature, and community service, Jeremy Young balances meticulous frugality with generous giving, navigates age‑related health quirks with steady optimism,
    and they find solace in solitary hikes and watercolor sunsets while occasionally leaving paint tubes uncapped on the porch.
background:
  cultural: Jeremy is a third‑generation white Westerner whose ancestors settled in the high plains of Wyoming during the early 1900s, blending German, Scottish, and Scandinavian roots. Raised in the close‑knit
    community of Dubois, he absorbed the values of frontier self‑reliance, modesty, and communal interdependence. The town’s ranching heritage, the rhythms of seasonal agriculture, and the quiet traditions
    of local churches shaped his worldview. While honoring his Western upbringing, Jeremy’s lifelong curiosity has led him to explore broader cultural currents, from contemporary art movements to global
    philosophies, allowing him to bridge his deep local ties with an openness to new ideas.
attributes:
