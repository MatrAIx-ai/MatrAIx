  hobbies: '[''Softball'', ''Karaoke'', ''Community Festivals'', ''Home Cooking (Portuguese dishes)'', ''Watching cooking competition shows'', ''DIY garage projects'', ''Multiplayer video gaming'', ''Socializing
    with friends'']'
  career_goals: Jordan aims to move beyond his current role as a dishwasher and transition into a line cook position within the next year, leveraging his practical kitchen experience and curiosity about
    cooking techniques. He plans to obtain his GED and enroll in a community‑college culinary program to earn a certification, which would open doors to a sous‑chef role or a supervisory shift leader position.
    Ultimately, his ambition is to launch a small food‑truck business that blends his Portuguese heritage with Midwestern comfort food, allowing him to showcase his own recipes while competing in local
    food festivals. While he remains flexible about the exact timeline, his competitive drive pushes him to prove his competence and earn recognition among his peers.
