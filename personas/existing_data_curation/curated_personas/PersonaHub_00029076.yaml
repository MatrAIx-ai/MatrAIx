persona_description: W. Philip Cotton, Jr. was a tireless advocate for historic architecture, born in Columbia, Missouri as William Philip Cotton, Jr. He was one of St. Louis' early preservation pioneers,
  an architect by training, and became an outspoken advocate for the reform of city tax laws that rewarded owner inaction in maintenance and discouraged investment. He was active in the city and county,
  and championed the city's official landmark program, nominating the first 35 sites, structures, and buildings to receive that designation. He was an active preservation architect, and his restoration
  projects include the Piper Palm House in Tower Grove Park, the Mark Twain boyhood home in Hannibal, Missouri, the Collins House in Collinsville, Illinois, the Gittemeier House in Florissant, the Saline
  County Courthouse in Missouri, and others. He was an organist and aficionado of classical music, whose knowledge was revered by his friends. Phil remained as persistent as ever, even in the face of illness,
  and was named to the College of Fellows of the American Institute of Architects in 2002.
