  career_goals: Over the next year Pamela plans to earn her GED and enroll in a community‑college program focused on business administration or information technology. She seeks a part‑time internship or
    volunteer position in a local library or municipal office to gain practical experience in office management. In the short term she aims to work as an administrative assistant where her organizational
    strengths can be applied, while her long‑term ambition is to advance to a project coordinator or operations analyst role in a small nonprofit or business. She also intends to earn certifications such
    as Microsoft Office Specialist and explore training as a certified medical records technician, balancing professional development with a stable, community‑oriented work life.
