persona_description: A dedicated public health advocate and politician who played a significant role in the launch and success of the President's Emergency Plan for AIDS Relief (PEPFAR), a global initiative
  aimed at combating HIV/AIDS. Lee helped in the effort a decade ago and is known for her bipartisan efforts to save lives and provide access to healthcare. She is interested in the impact of PEPFAR on
  gender equity, access to reproductive health services, and preventing gender-based violence.
