personas:
  professional: Martin Knecht, a 21‑year‑old mechanical engineering student, blends hands‑on automotive restoration with AutoCAD drafting and Excel‑driven project planning, delivering methodical, data‑backed
    solutions to campus design challenges while they maintain a competitive drive to outperform peers in capstone simulations and a skeptical eye toward untested design assumptions.
  sports: Martin Knecht hikes the forested trails of Wayne County with a local hiking club, follows the Detroit Lions in the fall and the Detroit Red Wings in the winter, occasionally plays intramural basketball
    at college, and they train with a community gym’s weight‑lifting program to maintain functional strength for their mechanical projects, approaching team hype with a healthy dose of skepticism while
    they focus on personal performance.
  arts: Martin Knecht unwinds by listening to classic rock legends like Led Zeppelin and the instrumental mastery of Miles Davis while sanding wood, attends the annual classic car show where they admire
    the design work of automotive designer Henrik Fisker, and reads popular science authors such as Carl Sagan and Mary Roach, which fuel their appreciation for narrative storytelling in documentaries and
    podcasts, yet they remain skeptical of trendy art movements that lack substantive depth.
  travel: Martin Knecht prefers meticulously planned road trips in their restored classic car, having already driven to the Henry Ford Museum in Dearborn, the Michigan Upper Peninsula’s Pictured Rocks,
    and a weekend getaway to Chicago’s Museum of Science and Industry, while they dream of a future cross‑country tour of iconic automotive factories in Germany and Japan, budgeting each leg in a spreadsheet
    and maintaining a skeptical stance toward overly commercialized tourist traps.
  culinary: Martin Knecht enjoys grilling a perfectly seared ribeye steak seasoned with rosemary and smoked paprika, whipping up homemade mac and cheese topped with sharp cheddar and breadcrumb crunch,
    and they love experimenting with a simple wood‑crafted charcuterie board to serve craft beers featuring Michigan cherries and locally sourced sausages, while they remain skeptical of trendy food hype,
    favoring classic, proven flavors.
  core: Martin Knecht is a methodical, competition‑driven engineering student who restores classic cars on weekends, logs everything in spreadsheets, and they balance a relentless curiosity with a reliable,
    organized life, approaching new ideas with measured skepticism.
background:
  cultural: Martin grew up in Jeromesville, a small town in Ohio’s Wayne County, where Midwestern values of self‑reliance, practicality, and community service are deeply ingrained. Raised in a working‑class
    family with a Protestant background, he was taught the importance of hard work, modesty, and dependable relationships. The local culture emphasizes loyalty to family and neighbors, participation in
    community events such as high school football games, and a pragmatic approach to problem‑solving. This environment has shaped Martin’s organized, reliable nature and his balanced view of curiosity and
    tradition, while also nurturing a competitive spirit that drives him to excel in both personal projects and future professional endeavors.
attributes:
  skills: '[''Mechanical troubleshooting'', ''Basic automotive repair'', ''Computer hardware diagnostics'', ''AutoCAD drafting'', ''Microsoft Excel data management'', ''Project planning'', ''Analytical
