  hobbies: '[''Classic car restoration'', ''Woodworking'', ''Hiking'', ''Strategy board games'', ''Simulation video games'', ''Science non-fiction reading'', ''Community volunteering'']'
  career_goals: Martin aims to complete his bachelor's degree in Mechanical Engineering by transferring from his current community college program to a university with a strong engineering curriculum. He
    envisions a career in manufacturing process engineering at a Midwestern plant, where he can apply his practical expertise to improve efficiency and reliability of production lines. In the long term,
    he hopes to open a small, customer‑focused automotive repair and customization shop in Wayne County, leveraging his hands‑on skills and methodical approach to build a reputation for dependable, high‑quality
    service. He is driven by the ambition to be recognized as a problem‑solver who blends curiosity for new technologies with a practical, results‑oriented mindset.
