persona_description: A researcher and clinician in the field of gynaecological oncology who has expertise in genetic profiling and cancer subtyping. He is currently leading a study to classify high-risk
  endometrial cancer into distinct genetic subtypes using routinely available technology. His research interests include developing targeted therapies for high-risk endometrial cancer patients and refining
  risk assessment for endometrial cancer patients. He has published a paper titled "Refining prognosis and identifying targetable pathways for high-risk endometrial cancer; a TransPORTEC initiative" in
  Modern Pathology, which has been widely cited in the field.
