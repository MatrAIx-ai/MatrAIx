  career_goals: Howard dreams of one day becoming a multimedia storyteller who can blend illustration, animation, and interactive media. He envisions creating his own comic books or video games that explore
    curious, off‑beat concepts. He also expresses an interest in environmental education, hoping to design visual projects that raise awareness about nature. While his long‑term goals are still forming,
    he aspires to a career that lets him remain creative, work flexibly, and occasionally work alone on projects he is passionate about.
