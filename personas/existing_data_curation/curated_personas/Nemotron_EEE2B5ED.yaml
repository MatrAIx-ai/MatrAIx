personas:
  professional: A budding illustrator and storyteller, Howard Forbes channels boundless curiosity into detailed fantasy sketches and inventive short stories, while their relaxed attitude toward deadlines
    and love for hands‑on LEGO building foster a creative process that thrives on spontaneous ideas rather than strict schedules, even as they sometimes worry about unfinished projects.
  sports: Howard Forbes enjoys exploring Seattle’s Green Lake for impromptu swimming and tide‑pool scouting, follows the Seattle Seahawks and Seattle Sounders FC on game days, and occasionally participates
    in a local after‑school soccer club, where they feel comfortable in the small group setting and prefer low‑pressure play over competitive drills.
  arts: Howard Forbes devotes free afternoons to drawing scenes inspired by Neil Gaiman, Studio Ghibli films, and the avant‑garde installations of Yayoi Kusama, while they listen to the whimsical scores
    of Danny Elfman and often recreate their favorite characters using LEGO bricks, cherishing the solitary creative flow that satisfies their reserved yet curious nature.
  travel: Howard Forbes loves day‑trips to the Seattle Arboretum and weekend getaways to Olympic National Park, dreaming of future adventures to Iceland’s geysers and Japan’s Miyajima Island, and they favor
    flexible itineraries that leave room for spontaneous tide‑pool discoveries, preferring the quiet of nature over crowded tourist hotspots.
  culinary: Howard Forbes favors comfort foods like cheesy pizza and chicken nuggets, but also enjoys helping to make clam chowder with fresh Pacific oysters and chopping strawberries for a berry‑yogurt
    parfait, and they stay at a beginner cooking level, often over‑seasoning dishes when excitement distracts them.
  core: Howard Forbes is a ten‑year‑old dreamer who sketches fantastical worlds, hoards LEGO bricks, worries about running out of time, and thrives on flexible, solitary adventures while occasionally indulging
    in snack‑induced sugar spikes.
background:
  cultural: Howard is a white boy raised in Seattle, a city known for its progressive values, vibrant arts scene, and strong environmental awareness. His family participates in community events such as
    local art fairs and neighborhood clean‑ups, exposing him to diverse cultural influences while maintaining a generally liberal, open‑minded household. The Pacific Northwest's emphasis on nature, technology,
    and creativity shapes his worldview, encouraging his love for unconventional ideas and his desire to blend art with innovative thinking.
