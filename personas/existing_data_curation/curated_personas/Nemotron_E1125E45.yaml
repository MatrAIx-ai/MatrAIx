personas:
  professional: Rosalinda Lugo is a seasoned aerospace engineer who translates sophisticated CFD simulations into manufacturable propulsion systems, leads cross‑functional teams with an assertive yet collaborative
    style, and they are charting a path toward senior technical leadership in sustainable spaceflight.
  sports: Rosalinda Lugo spends weekends rock climbing at Stone Summit and hiking the Indiana Dunes, proudly follows the Indianapolis Colts and Indiana Pacers, trains with the Midwest Climbers club, and
    they join a seasonal adult softball league each summer.
  arts: Rosalinda Lugo plays piano at home, frequently rehearses pieces by Ludovico Einaudi and John Williams, attends local sci‑fi film screenings featuring directors like Christopher Nolan, and they enjoy
    listening to Mexican folk singer Lila Downs while dancing salsa at family gatherings.
  travel: Rosalinda Lugo prefers meticulously planned trips that blend adventure with cultural immersion, having visited the Kennedy Space Center to watch a launch, trekked the Atacama Desert for stargazing,
    and they long to explore Kyoto’s temples and New Zealand’s South Island hiking trails.
  culinary: Rosalinda Lugo crafts modern health‑forward Mexican cuisine, regularly preparing quinoa‑infused tacos with grilled fish, avocado‑lime salsa, and roasted nopal, while they experiment with cauliflower
    tortillas and source fresh cilantro and chilies from the local farmer’s market.
  core: Rosalinda Lugo fuses aerospace curiosity with a love for hands‑on challenges, balancing rigorous engineering work with salsa‑filled evenings, a penchant for last‑minute climbing trips, and an occasional
    habit of over‑seasoning their dishes.
background:
  cultural: Rosalinda grew up in a Mexican‑American household where Spanish and English were spoken interchangeably, fostering bilingual fluency and a deep appreciation for both Mexican traditions and American
    cultural dynamics. Her family emphasizes the importance of close‑knit relationships, communal celebrations such as Día de los Muertos and Mexican Independence Day, and the value of hard work and education.
    Living in Prospect Heights, she remains actively engaged with Chicago’s vibrant Mexican community, attending cultural festivals, supporting local Mexican markets, and collaborating with community organizations
    that promote Latino representation in engineering. These cultural ties shape her worldview, reinforcing a strong sense of family, resilience, and a desire to give back through mentorship and community
    service.
attributes:
  skills: '[''Aerodynamic analysis'', ''Computational fluid dynamics (CFD)'', ''Finite element modeling'', ''Propulsion system design'', ''Structural analysis'', ''Systems integration'', ''Project management'',
