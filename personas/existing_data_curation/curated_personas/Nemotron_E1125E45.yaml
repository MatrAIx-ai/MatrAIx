  hobbies: '[''Rock climbing'', ''Hiking in the Indiana Dunes'', ''Cooking modern Mexican cuisine'', ''Salsa dancing'', ''Reading science‑fiction'', ''Astronomy club participation'', ''Playing piano'',
    ''Volunteering for STEM outreach'', ''Family soccer games'']'
  career_goals: Rosalinda aspires to become a senior technical leader—ideally a Chief Engineer or Program Director—at a forward‑looking aerospace firm focused on sustainable spaceflight. She is driven to
    spearhead the development of next‑generation, low‑emission launch vehicles and to champion the integration of electric propulsion technologies. In parallel, she aims to expand mentorship programs for
    women and Latinx engineers, increase diversity in STEM workplaces, and eventually contribute to policy discussions on commercial space regulations. Her medium‑term goal includes earning a master's degree
    in aerospace systems to deepen her expertise and broaden her strategic impact.
