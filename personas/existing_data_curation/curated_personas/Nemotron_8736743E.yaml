personas:
  professional: John Plummer, a budding robotics club member and Minecraft modder, channels their methodical curiosity into designing and programming competition‑ready robots, balancing innovative ideas
    with reliable, step‑by‑step execution.
  sports: John Plummer dribbles for the North Valley Basketball Club, follows the Las Vegas Aces with avid enthusiasm, and spends weekends hiking the trails of Red Rock Canyon to build endurance, treating
    fitness as a disciplined yet enjoyable complement to their robotics pursuits.
  arts: John Plummer builds intricate LEGO cityscapes, mods Minecraft worlds to the soundtrack of Imagine Dragons and Taylor Swift, and devours science‑fiction novels by Brandon Sanderson and Becky Chambers,
    finding inspiration in the vivid murals of the annual Las Vegas Arts Festival.
  travel: John Plummer prefers meticulously planning family road trips that blend adventure and discovery, having already explored Zion and the Grand Canyon, dreaming of a future backpacking stint in Kyoto,
    while balancing school schedules and a modest travel allowance.
  culinary: John Plummer, a budding chef who can whip up a spicy chicken tortilla soup and a fresh cactus salad, often experiments with jalapeño‑infused nachos at home while still indulging in sugary Cheetos
    and soda during late‑night gaming sessions.
  core: John Plummer balances a methodical mind with a restless curiosity, meticulously budgeting for LEGO while secretly hoarding extra snacks in a drawer for late‑night gaming spikes.
background:
  cultural: John grew up in a suburban neighborhood of Las Vegas, Nevada, in a family of white American heritage. The city's blend of tourism, desert landscape, and multicultural neighborhoods exposed him
    to a variety of cultural experiences, from local Native American heritage sites to Hispanic festivals. His family values hard work and community involvement; his mother works in hospitality while his
    father is employed in construction. These influences, combined with the Southwest's emphasis on resilience and cooperation, shape his pragmatic outlook and appreciation for both tradition and innovation.
