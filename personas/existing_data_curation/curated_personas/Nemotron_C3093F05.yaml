personas:
  professional: John Davis, a retired master carpenter and hobbyist photographer, channels a competitive, detail‑driven mindset into designing and hand‑crafting seasonal wooden sculptures while they lead
    hands‑on workshops that blend local history with practical craftsmanship.
  sports: John Davis enjoys early‑morning fishing for walleye on Lake Wisconsin, hikes the Ice Age Trail, passionately follows the Green Bay Packers and Milwaukee Brewers, and they occasionally compete
    in the senior center’s shuffleboard league, balancing a competitive spirit with a love for quiet outdoor pursuits.
  arts: John Davis captures sunrise over Lake Wisconsin with a camera inspired by Ansel Adams, creates mixed‑media paintings that echo Grant Wood’s regional realism, attends the Briggsville Art Fair to
    study works by contemporary woodworkers, and they channel a competitive eye for detail into critiquing exhibitions, often quoting Bob Ross’s ‘happy little accidents.’
  travel: John Davis prefers road‑trip adventures that combine scenic photography—such as a sunrise drive to Door County’s lighthouse—and visits to art‑rich cities like Chicago and Minneapolis, yet they
    plan each outing meticulously after worrying about budget constraints and the health of their aging sedan.
  culinary: John Davis enjoys cooking fresh‑caught walleye with lemon‑butter sauce, crafts rosemary‑infused roasted potatoes, and they bake a classic Apple Crisp, employing a modest culinary skill set that
    blends rustic Midwestern flavors with occasional foraged mushroom sautées.
  core: John Davis is a curious, competitive retired craftsman who worries about every detail yet they thrive on turning reclaimed wood into seasonal art, even if their workshop frequently resembles organized
    chaos.
background:
  cultural: John was raised in a small farming town in the Upper Midwest, descended from German‑Polish immigrants who valued hard work, self‑reliance, and modesty. The rural Wisconsin milieu instilled in
    him a deep appreciation for the land’s rhythms, seasonal cycles, and community gatherings like church potlucks and county fairs. While his upbringing emphasized practicality, exposure to regional art
    colonies and local museums sparked a lifelong curiosity about visual arts. This blend of Midwestern pragmatism and emerging artistic sensibility shapes his worldview, encouraging both critical analysis
    and an openness to unconventional ideas.
