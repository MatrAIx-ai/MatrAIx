  hobbies: '[''Woodworking'', ''Digital photography'', ''Fishing'', ''Birdwatching'', ''Hiking'', ''Reading nonfiction'', ''Chess'', ''Attending art fairs'', ''Mixed‑media painting'', ''Writing memoir entries'',
    ''Community workshop volunteering'']'
  career_goals: 'Although retired, John aspires to channel his curiosity and competitive streak into a legacy project: creating a series of handcrafted wooden sculptures that interpret the changing seasons
    of the Upper Midwest, and compiling a memoir that weaves together personal anecdotes, local history, and reflections on art. He also hopes to mentor younger community members in woodworking through
    weekend workshops, organize a small‑scale art exhibition at the Briggsville community center, and adopt regular stress‑management practices—like journaling and light meditation—to counter his tendency
    toward worry.'
