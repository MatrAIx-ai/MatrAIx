persona_description: A professional plumber and electrician who specializes in using special techniques to safely and efficiently drill through brick walls to install plumbing and electrical pipes. This
  includes using a special direct system drill bit, slope the tunnel slightly downward on the outside to prevent condensation from dripping off the pipe and saturating the insulating material inside the
  cavity, and switch to the non-hammer setting before the bit exits the inside wall to prevent fracturing the interior brick face during the final inch of drilling. They have a degree in engineering and
  have gained extensive experience in the field.
