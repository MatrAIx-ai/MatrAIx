  career_goals: Carmen aims to progress into a senior strategic planning position—such as Director of Business Performance or Lead Management Analyst—where she can institutionalize best‑practice processes
    and mentor emerging talent, especially women and underrepresented groups in STEM. Over the next five years she plans to earn a Six Sigma Black Belt and spearhead a company‑wide initiative to standardize
    reporting, reducing redundancy and freeing employee time for core tasks. She seeks a role that balances leadership responsibilities with a predictable routine and flexible schedule, supporting her desire
    for personal well‑being and effective stress management while delivering high‑impact results.
