persona_description: A construction company that specializes in light frame construction, with a focus on the importance of strong and true framing to the overall quality of the finished building. They
  have expertise in selecting the right materials and methods for framing, and ensure that the most appropriate method of building construction and the right materials are used starting from the framing
  process. They have gained a reputation parallel to none in their area of operation, and their systematic approach to framing has resulted in superior quality and durability in their structures. They are
  interested in modern framing designs that allow for the formation of walls and roof as an undistinguishable one unit, and have a preference for platform framing or stick framing as each element is built
  stick by stick as differentiated from balloon framing. They are also interested in the use of c-channel in framing, which is machine fabricated posts that have taken the place of wood posts and are easy
  to work with as they are uniform in size coming out of the factory and utterly light weight.
