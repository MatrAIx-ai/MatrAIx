personas:
  professional: Clara Cuba, an aspiring junior architect in the making, loves building LEGO sets and drawing meticulous floor plans, channeling her organized mind and compassionate nature into designing
    tiny, functional play spaces for friends.
  sports: Clara Cuba, a member of the Greenfield Cubs youth soccer team, practices twice a week, enjoys cheering for the regional basketball squad, the City Hawks, and participates in the school’s spring
    track meet for the 800‑meter run.
  arts: Clara Cuba spends afternoons coloring intricate mandala designs, sketching detailed LEGO models, and listening to the whimsical songs from Disney’s “Moana” soundtrack while collecting beloved Dr.
    Seuss picture books for bedtime reading.
  travel: Clara Cuba dreams of exploring the towering Redwood forests of California, reminisces about summer trips to the beach town of Santa Cruz, and looks forward to a family vacation to the historic
    castle ruins in Scotland, though her parents’ budget at times limits the frequency of long‑distance travel.
  culinary: Clara Cuba enjoys mashing avocados for guacamole, rolling fresh tortillas with her mother, and crafting bright fruit salads featuring mango, strawberry, and a splash of lime zest, while proudly
    serving these dishes to her family.
  core: Clara Cuba is a meticulously organized eight‑year‑old who balances a love for structured LEGO builds and compassionate garden club service with a tendency to over‑worry and a habit of counting every
    coin before spending.
background:
  cultural: Clara is a Mexican‑American who grew up in a bilingual household in Redlands, California. At home she speaks Spanish with her parents and grandparents, and English at school. Her family celebrates
    Mexican traditions such as Día de los Muertos, Las Posadas, and enjoys cooking family recipes like tamales and sopes. She attends a local parish where she participates in community events and values
    the strong family ties typical of Mexican culture. Living in a diverse Californian community, Clara blends these traditions with local customs, fostering a sense of cultural pride and responsibility
    to help others.
attributes:
  skills: '[''Organizing school supplies'', ''Following daily routines'', ''Basic reading comprehension'', ''Basic arithmetic'', ''Peer mediation'', ''Elementary digital literacy'', ''Crafting and origami'']'
  hobbies: '[''Reading storybooks'', ''Drawing and coloring'', ''Puzzles and LEGO building'', ''Cooking with family'', ''School garden club'', ''Assisting at library story‑time'']'
  career_goals: Even though she’s only eight, Clara often talks about helping people when she grows up. She dreams of becoming a teacher because she loves sharing knowledge and keeping a classroom organized,
    or a nurse so she can care for those who are sick. She also imagines herself as a community volunteer who organizes neighborhood clean‑up events and helps younger kids with schoolwork. Her short‑term
    goal is to improve her reading level and become a reliable class helper.
