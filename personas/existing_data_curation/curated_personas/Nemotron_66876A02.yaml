personas:
  professional: Jamelia Sawyer combines hands‑on expertise in concrete finishing, framing, and heavy equipment operation with a curious yet practical mindset, turning meticulous site cleanup and rapid plan
    adaptation into a fast‑track toward a crew‑leader role while they balance organized schedules with flexible problem‑solving.
  sports: Jamelia Sawyer fuels their competitive drive on the local pick‑up basketball court every weekend, roots for the Washington Wizards and the Washington Capitals, and joins a seasonal intramural
    league that blends cardio drills with skill work, using the basketball court as a laboratory for strategic play mirroring their love of chess.
  arts: Jamelia Sawyer captures DC’s historic facades through urban photography inspired by Vivian Maier’s street eye, while their playlists of J. Cole, H.E.R., and Anderson · Paak provide the soundtrack
    for cooking sessions that blend modern twists on soul food, reflecting a creative rhythm that balances visual storytelling with musical grooves.
  travel: Jamelia Sawyer curates weekend trips that blend architectural wanderlust and sustainable travel, exploring Philadelphia’s Independence Hall, wandering Barcelona’s Gaudí masterpieces on a student
    discount, and planning a future road‑trip to Savannah’s historic squares, all while they balance a tight construction salary with budget‑friendly hostels and travel‑point credit cards.
  culinary: Jamelia Sawyer reimagines classic soul food by preparing collard greens sautéed with smoked turkey and quinoa, sweet‑potato biscuits infused with rosemary, and shrimp‑and‑grits topped with a
    miso‑butter glaze, cooking to the beat of neo‑soul playlists while they proudly claim a fairly adequate yet modest spice rack.
  core: Jamelia Sawyer blends a relentless curiosity for sustainable construction with a competitive streak, often juggling midnight tool‑shopping trips, a meticulously handwritten safety checklist, and
    an unshakable habit of photographing every completed project corner before the day ends.
background:
  cultural: Jamelia is a Black woman raised in Washington, DC, whose upbringing in the Anacostia area immersed her in a community that values resilience, mutual support, and activism. Family gatherings
    emphasized cultural traditions such as Juneteenth celebrations and participation in local Black History Month events. This heritage fostered a strong work ethic and a sense of responsibility to uplift
    her neighborhood, influencing her career choice in construction and her later focus on affordable housing. She navigates between standard American English and African American Vernacular English, reflecting
    her cultural roots, and she values mentorship and representation, aiming to open pathways for other Black youth in skilled trades. Exposure to DC's diverse cultural scene—museum visits, live music,
    and culinary festivals—has broadened her perspective and fuels her curiosity about the intersection of design, sustainability, and social equity.
attributes:
  skills: '[''Concrete finishing'', ''Formwork'', ''Bricklaying'', ''Framing'', ''Drywall installation'', ''Insulation installation'', ''Heavy equipment operation (forklift, backhoe, skid‑steer)'', ''OSHA
    10 certification'', ''First aid/CPR'', ''Blueprint reading'', ''Site safety management'', ''Problem solving'', ''Team coordination'', ''Time management'', ''Sustainable building practices knowledge'',
    ''BIM basics'', ''DIY furniture construction'']'
  hobbies: '[''Urban photography'', ''DIY furniture building'', ''Pick‑up basketball'', ''Volunteering with Habitat for Humanity'', ''Listening to hip‑hop, R&B, neo‑soul'', ''Cooking soulful dishes with
    modern twists'', ''Following green building podcasts'', ''Exploring historic DC neighborhoods'', ''Online chess'']'
  career_goals: Jamelia aims to move from laborer to crew leader within the next two to three years, targeting a foreman certification such as the NCCER Construction Craft Worker credential. She plans to
    enroll part‑time at a community college to earn an associate's degree in construction management while pursuing OSHA 30 and LEED Green Associate certifications. Long‑term, she envisions leading a small,
    community‑focused renovation firm that specializes in affordable‑housing retrofits in historic Washington, DC neighborhoods, integrating sustainable practices and ensuring projects benefit local residents.
    She also hopes to mentor and advocate for other young Black women entering the skilled trades, promoting equity and representation in the construction industry.
