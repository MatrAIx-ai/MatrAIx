personas:
  professional: Katie Sharma is a proficient computer support specialist who leverages strong process analysis and empathetic communication to diagnose multi‑platform issues while meticulously documenting
    solutions in knowledge‑base articles, and she channels her disciplined work ethic toward earning CompTIA Network+ and ITIL Expert certifications to eventually lead a high‑performing support team.
  sports: Katie Sharma enjoys weekend hikes on the Rocky Mountain trails with the local Alpine Explorers club, follows the Colorado Avalanche and Denver Broncos passionately, and incorporates regular yoga
    sessions as her primary fitness routine, preferring low‑impact activities over team sports.
  arts: Katie Sharma finds artistic inspiration in Ansel Adams’ black‑and‑white landscapes and the folk melodies of Iron & Wine, curates a modest collection of vintage film prints, and regularly attends
    local gallery openings featuring emerging photographers.
  travel: Katie Sharma prefers meticulously planned, low‑key nature getaways, having hiked in Banff and Yosemite, and she dreams of exploring Iceland’s geothermal trails and New Zealand’s Southern Alps
    while balancing travel costs with her disciplined budgeting.
  culinary: Katie Sharma enjoys crafting nutrient‑dense meals such as quinoa‑black bean Buddha bowls and avocado‑lime smoothies using fresh herbs from her modest garden, while occasionally over‑indulging
    in late‑night homemade oat‑flour cookies despite her otherwise disciplined eating habits.
  core: Katie Sharma is a detail‑oriented, curiosity‑driven tech support specialist who balances disciplined organization with a quiet love for nature, puzzles, and self‑improvement, yet often wrestles
    with anxiety and a tendency to over‑plan.
background:
  cultural: Katie was raised in Eaton, Colorado, a close‑knit community in Weld County where the prevailing culture emphasizes self‑reliance, neighborly support, and outdoor recreation. Although her surname
    reflects Indian heritage—her mother immigrated from Gujarat—her upbringing blended mainstream Midwestern customs with occasional cultural celebrations such as Diwali and family recipes from Indian cuisine.
    This multicultural exposure fostered an appreciation for diverse perspectives while reinforcing her practical, organized approach to life. She identifies primarily with the local Colorado lifestyle,
    enjoying hiking, community service, and small‑group gatherings, while also honoring her family's Indian roots through holiday observances and occasional visits to extended relatives.
