  career_goals: Katie aims to deepen her technical expertise by earning certifications such as CompTIA Network+ and ITIL Expert, and eventually move into a senior support or IT service manager role. She
    is interested in leveraging her business background to become a Business Analyst or Technical Project Manager within a midsize organization, where she can bridge technology and business strategy. She
    plans to pursue a PMP certification to lead cross‑functional projects, while prioritizing a low‑stress environment that aligns with her disciplined, high‑standard work ethic. Long‑term, she envisions
    leading a small, high‑performing support team that values collaborative problem‑solving, continuous improvement, and a supportive culture.
