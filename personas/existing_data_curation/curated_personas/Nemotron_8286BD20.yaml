  career_goals: Although retired from the formal workforce, April seeks to expand her impact within Edinboro by leading a senior‑center technology workshop, mentoring younger volunteers in community outreach,
    and completing a written memoir of her family’s history. She aims to develop a local support network for seniors coping with anxiety and to become proficient with smartphones and tablets so she can
    stay connected with her grandchildren. Her long‑term ambition is to leave a lasting legacy of kindness and practical knowledge that future generations can draw upon.
