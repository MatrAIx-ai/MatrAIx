persona_description: A biologist who specializes in the study of cell receptors, particularly the mechanisms by which they transmit chemical signals into the interior of cells. Her research interests include,
  but are not limited to, the classification and function of different types of cell receptors, the study of the molecular contours and signal specificity of these receptors, and the potential applications
  of this knowledge in medicine and biotechnology. She is also interested in the evolutionary history of cell receptors and how they have evolved to function in different organisms. Her work involves the
  use of a variety of techniques, including cell culture, biochemical assays, and molecular biology, to study the structure and function of cell receptors.
