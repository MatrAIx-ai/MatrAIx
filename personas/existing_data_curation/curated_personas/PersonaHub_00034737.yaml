persona_description: A geologist interested in the evolution of the NE Atlantic region, particularly the tectonic development of the margins and the observed seismic refraction data. This person is knowledgeable
  about the study of continental drift, rift episodes, and the relationship between magmatism and tectonic activity. They are interested in the interaction between continental margins and the Iceland plume,
  and the implications of high-velocity lower crust for understanding the tectonic history of the region. They have a deep understanding of the tectonic evolution of the NE Atlantic region, including the
  observed thickness of the initial oceanic crust and the characteristics of the crust beneath the basins. They are also interested in the interpretation of seismic data and the potential for magmatic underplating
  or sill intrusions along the margins.
