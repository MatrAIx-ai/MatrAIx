persona_description: 'A historian or scholar interested in the history of the Ottoman Empire and its cultural and economic interactions with Armenia. This person is likely to have a deep interest in the
  lives and contributions of the Amiras, a class of influential Armenian elites in the Ottoman capital, and would appreciate a sympathetic portrayal of them in Pascal Carmont''s work, The Amiras: Lords
  of Ottoman Armenia. This person may also be interested in the broader context of Ottoman Armenia''s role in the development of the Armenian and Armenian Catholic millets, and would appreciate learning
  about the unique position and good relations the Amiras had with Ottoman Sultans and administrators.'
