personas:
  professional: A Haynes, a meticulous five-year-old with a love for building block towers, envisions a future as a civil engineer and spends playtime drafting blueprints on graph paper, demonstrating the
    same methodical planning and reliability they show in daily routines.
  sports: A Haynes, an enthusiastic member of the local Little Eagles soccer club, loves the rhythm of dribbling drills, cheers for the nearby professional baseball team the Springfield Storm, and organizes
    backyard races with a stopwatch to track lap times despite being only five.
  arts: A Haynes, a budding illustrator who spends afternoons sketching characters from the beloved animated series 'Paw Patrol' and the classic films of Walt Disney, can recite lyrics from the catchy tunes
    of 'Frozen' and often reenacts scenes with a makeshift stage made from couch cushions.
  travel: A Haynes, a curious little explorer who enjoys family road trips to the zoo and the nearby beach, prefers the structured itinerary of a planned day with scheduled snack breaks, and dreams of visiting
    the enchanted castles of Disney World and the towering pyramids of Mexico, albeit with a packed suitcase of favorite plush toys.
  culinary: A Haynes, a picky eater with a fondness for creamy mac and cheese, crunchy carrot sticks with hummus, and peanut butter-jelly sandwiches, likes to 'help' stir the pot in the kitchen but often
    gets distracted by the bright colors of the ingredients, leading to occasional spills they dutifully clean up.
  core: A Haynes is a five-year-old who pairs an uncanny love for order with a playful imagination, building block forts with precision while secretly hoarding extra crayons for midnight doodles.
background:
  cultural: A Jo grew up in a middle‑class, suburban setting in Livonia, Michigan. Her family follows typical Midwestern American customs, celebrating holidays like Thanksgiving, Fourth of July, and Christmas
    with community gatherings. She attends a local public preschool and occasionally participates in church‑based Sunday school activities. The community's emphasis on politeness, responsibility, and routine
    reinforces her natural preference for structure and predictability.
attributes:
  skills: '[''Basic reading'', ''Counting to 20'', ''Puzzle solving'', ''Toy organization'', ''Following multi‑step routines'', ''Fine‑motor coordination'']'
  hobbies: '[''Coloring'', ''Building with LEGO'', ''Puzzles'', ''Storytime at the library'', ''Swimming lessons'', ''Singing nursery rhymes'', ''Sticker collecting'']'
  career_goals: Even at five, A Jo imagines a future where she helps others and maintains order. She often says she wants to be a teacher because she enjoys explaining things and keeping a classroom neat,
    or a veterinarian so she can care for animals while ensuring their spaces are clean and safe. Her ambition reflects a desire to combine compassion with an organized, reliable approach.
