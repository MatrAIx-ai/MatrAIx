  hobbies: '["Gospel choir participation", "Community gardening", "Cooking healthy Southern-inspired meals", "Book club (African‑American literature)", "Local history tours", "Cultural festivals", "Dance
    workshops (line and African rhythm)", "Mentoring aspiring healthcare students"]'
  career_goals: Anaiya is motivated to expand her nursing credentials by enrolling in an LPN‑to‑RN bridge program, with the long‑term goal of becoming a registered nurse and eventually moving into a nurse
    manager role at the local nursing home. She also aspires to develop a community‑based chronic‑disease education program that targets diabetes and hypertension within the Black community of Chambers
    County. Mentoring younger African‑American nurses and advocating for increased diversity in healthcare are personal ambitions that complement her professional growth. Financial stability, owning a modest
    home, and optionally launching a small home‑health service for elderly neighbors also feature in her roadmap.
