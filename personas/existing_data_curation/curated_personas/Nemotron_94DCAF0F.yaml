personas:
  professional: Anaiya Polke, a 47-year-old practical nurse in Lafayette, Alabama, blends keen clinical assessment and evidence-based care with a natural curiosity for new techniques, and they use an outgoing
    communication style to coordinate teams, mentor students, and lead community health outreach, even while managing a flexible, occasionally disorganized schedule.
  sports: Anaiya Polke stays active through weekly line-dancing classes, seasonal African rhythm workshops, a bi-weekly community softball league, and avidly follows the Alabama Crimson Tide football team
    and the New Orleans Pelicans basketball, and they blend social sport with personal fitness.
  arts: Anaiya Polke, a vibrant member of their church’s gospel choir, draws inspiration from legends like Mahalia Jackson and Kirk Franklin, enjoys book club discussions of socially resonant novels, regularly
    attends regional theater productions of classic dramas, and they weave music and literature into daily life.
  travel: Anaiya Polke prefers short, well-planned road trips to historic Southern cities like Savannah, Charleston, and New Orleans, where they can explore culinary scenes, attend gospel music festivals,
    and join guided tours of antebellum neighborhoods, balancing a love for cultural immersion with a modest travel budget.
  culinary: Anaiya Polke delights in cooking healthier twists on Southern comfort meals, such as collard greens seasoned with fresh thyme and rosemary, baked sweet-potato casserole topped with sage, and
    low-fat jambalaya infused with oregano and basil, and they regularly experiment with herb-rich recipes in their community garden kitchen.
  core: Anaiya Polke, a 47-year-old practical nurse, balances community-focused care with a love for gospel singing, gardening, and mentorship, and they navigate life with a practical curiosity, relaxed
    planning, and a habit of impulsively buying fresh herbs.
background:
  cultural: Anaiya’s cultural background is rooted in the African‑American experience of the Deep South. Growing up in a close‑knit Black community in Alabama, she was shaped by the traditions of church
    fellowship, oral storytelling, and soulful music. The rich heritage of Southern cuisine, combined with a modern emphasis on health and wellness, informs her cooking and community health interests. Her
    family values emphasize resilience, mutual support, and the importance of giving back, which is evident in her volunteer work and mentorship. As a Black nurse, she navigates both the challenges and
    pride of representing her community in healthcare, drawing strength from historic civil‑rights legacies and contemporary movements for equity.
attributes:
  skills: '["Patient assessment", "Medication administration", "Wound and pressure‑injury care", "Basic IV therapy", "Infection control", "EHR documentation", "Patient education", "Community health outreach",
