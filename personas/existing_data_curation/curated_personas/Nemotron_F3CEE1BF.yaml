  career_goals: Jon plans to earn a scholarship to a specialized visual‑arts program or community college, build a professional portfolio, and secure an apprenticeship at a local multimedia studio. He aspires
    to become a concept artist for video games or animation, win national youth art competitions, and eventually launch his own creative studio that blends digital art, storytelling, and interactive media.
