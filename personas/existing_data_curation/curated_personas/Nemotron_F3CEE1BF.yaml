personas:
  professional: Jon Gamble, a 16‑year‑old digital storyteller, blends polished Procreate illustrations with crisp video editing to craft speculative comic concepts and indie game mock‑ups while leading
    peer art shows and meeting tight school deadlines with the discipline of a project manager.
  sports: Jon Gamble dominates Columbus’s pickup basketball courts, studying game tape like a strategist, roots for the Cleveland Cavaliers and Ohio State Buckeyes, and runs the after‑school Hoops Club
    while squeezing in weight‑training sessions only when video projects allow.
  arts: Jon Gamble’s artistic universe mixes sci‑fi sketches inspired by H.R. Giger and Syd Mead with a soundscape ranging from Miles Davis jazz to Kendrick Lamar beats, fueling nightly art jams at the
    community center, while they binge‑read speculative fiction by authors like N.K. Jemisin for narrative fuel.
  travel: Jon Gamble’s travel style blends meticulous planning with spontaneous photo‑hunts, taking weekend trips to the Columbus mural district, a day‑long train ride to Chicago’s Comic & Animation Expo,
    and dreaming of a future art‑focused backpacking tour of Japan’s Studio Ghibli Museum.
  culinary: Jon Gamble’s palate is a mash‑up of comfort and experimentation, swapping pepperoni pizza for spicy ramen bowls, mastering avocado toast topped with sriracha, and occasionally attempting sushi
    rolls in the kitchen while listening to lo‑fi beats.
  core: Jon Gamble is a hyper‑organized teen visual storyteller who channels boundless imagination into disciplined art projects, competitive basketball, and a meticulous yet sometimes splurgy approach
    to money and health.
background:
  cultural: Jon is an African‑American teenager raised in the South Side of Columbus, Ohio. His family and community emphasize resilience, storytelling, and artistic expression, reflected in local church
    gatherings, neighborhood murals, and the city's vibrant music scene. He participates in the African World Festival and benefits from after‑school programs that celebrate Black art and culture. While
    navigating the challenges of being a Black youth in a Midwestern urban environment, Jon draws on his heritage and the diverse cultural influences of Columbus to shape his creative voice and competitive
    drive.
