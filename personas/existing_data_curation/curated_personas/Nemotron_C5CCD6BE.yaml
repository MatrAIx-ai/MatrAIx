  hobbies: '[''Gardening'', ''Reading historical non‑fiction and business strategy'', ''Book club participation'', ''Volunteer budgeting committee for local school district'', ''Knitting'', ''Hiking in
    Kankakee River State Park'']'
  career_goals: Looking ahead, Jamie aims to transition into a senior advisory role where she can shape long‑term organizational strategy and champion data‑driven decision making. She aspires to lead high‑impact
    cross‑functional initiatives that blend innovative ideas with proven best practices, leaving a lasting legacy of operational excellence. Jamie also hopes to mentor the next generation of analysts, fostering
    a culture of curiosity tempered by practical rigor. As she approaches retirement, she envisions scaling back her workload while offering consultancy services to local nonprofits and small businesses,
    applying her expertise to enhance community development projects.
