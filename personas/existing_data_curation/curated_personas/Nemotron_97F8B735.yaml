  career_goals: Steven aims to first obtain his GED within the next year, viewing it as a gateway to structured vocational training. He is interested in pursuing an apprenticeship in electrical work or
    HVAC, fields that offer clear procedural guidelines and tangible outcomes, aligning with his preference for predictability while allowing flexible problem‑solving. In the longer term, he envisions a
    stable, skilled‑trade career that lets him support his family and perhaps mentor younger teens in his community, combining his practical expertise with his cooperative, caring demeanor.
