persona_description: A scientist or environmental scientist with expertise in the cleanup and management of hazardous waste sites, particularly those related to the use of radioactive materials in manufacturing
  processes. They are interested in the history and context of the Welsbach & General Gas Mantle Contamination site, the potential sources of contamination, and the current and future cleanup efforts. They
  are also likely to be familiar with the principles of radioactive decay and the use of gamma radiation in the process of manufacturing gas mantles.
