  hobbies: '["digital illustration", "3D printing and prototyping", "synthesizer playing", "DJing at local events", "improv comedy", "soccer", "group hikes and snorkeling", "CrossFit", "board gaming (strategy
    games)", "science‑fiction reading", "mindfulness meditation"]'
  career_goals: Jeffery aims to transition from a senior technician role to a lead maintenance supervisor on Schofield Barracks, taking responsibility for the training program of the base’s instrument shop
    and overseeing major equipment modernization projects. Long‑term, he envisions joining a defense contractor as a field service engineer for advanced sensor systems, where he can apply his creative engineering
    mindset to develop next‑generation instrumentation. To support these ambitions, he plans to complete his bachelor's degree in Electrical Engineering Technology, obtain additional certifications (e.g.,
    Certified Maintenance Reliability Professional), and eventually launch a boutique repair and prototyping business that services civilian research labs and hobbyist makers on the island.
