  career_goals: Olivier plans to earn his high‑school equivalency (GED) within the next two years and then pursue certification as an emergency medical technician (EMT) or community health worker. He is
    driven by a desire to provide direct assistance to individuals in crisis and to promote health and safety in his neighborhood. In the longer term, he hopes to work for a local non‑profit focused on
    youth mentorship and substance‑abuse prevention, eventually moving into a leadership role where he can design programs that foster harmony and resilience. He values a stable, service‑oriented career
    that offers a predictable routine while still allowing the flexibility to respond to emergent community needs.
