persona_description: A scientist who specializes in studying the atmosphere and climate of Mars, particularly the effects of solar winds and atmospheric loss. They are passionate about understanding how
  Mars was able to transform from a warm and wet environment to the cold and arid planet we see today, and how this has implications for our understanding of the solar system and the potential for life
  on other planets. They are also interested in the InSight mission, which is set to study the red planet's interior, including its core, and how this could shed light on what happened to Mars' magnetic
  field.
