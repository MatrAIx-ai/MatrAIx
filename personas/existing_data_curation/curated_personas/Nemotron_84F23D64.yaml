personas:
  professional: Mayelin Gomez, a 40‑year‑old interior designer known for sustainable, culturally resonant residential projects, leverages AutoCAD, SketchUp, and Adobe Creative Suite while they harness bilingual
    communication to merge contemporary aesthetics with Latin American motifs, and they use mood‑board checklists to corral their spontaneous, deadline‑averse tendencies into creative momentum.
  sports: Mayelin Gomez fuels their active lifestyle with weekend hikes in the Colorado foothills, weekday rides with the Greeley Trailblazers Cycling Club, and passionate fandom for the Colorado Rockies,
    Denver Broncos, and Colorado Avalanche, while they incorporate regular salsa dancing lessons with their husband as a lively cardio routine that blends outdoor adventure, team spirit, and cultural fitness.
  arts: Mayelin Gomez showcases hand‑crafted décor at local art fairs, draws creative inspiration from Frida Kahlo’s vivid palettes and Ansel Adams’ iconic landscapes, frequents the Denver Art Museum’s
    contemporary exhibitions, and they curate a home gallery of DIY wall hangings that echo Latin American folk art while maintaining a practical eye for sustainable materials.
  travel: Mayelin Gomez prefers road‑trip itineraries that weave hiking in Rocky Mountain National Park, cultural immersion in Santa Fe’s historic plazas, and culinary pilgrimages to Oaxaca, Mexico, they
    plan trips using travel‑reward credit cards to stretch their budget, and they balance these escapes with family time and the demands of launching their boutique studio.
  culinary: Mayelin Gomez, an experienced home chef, delights in preparing tamales with heirloom corn masa, simmering mole with locally sourced chilies, and crafting fresh trout ceviche infused with Colorado
    herbs, they often pair these dishes with seasonal salads of heirloom tomatoes, avocado, cilantro, and lime, and they experiment with fermented salsas and homemade corn tortillas that blend Mexican tradition
    with Colorado bounty.
  core: Mayelin Gomez is a sustainability‑driven interior designer who fuses Latin culinary flair with eco‑friendly artistry, mentors community designers, and they balance a chaotic, spontaneous schedule
    with a love for garden‑to‑table living.
background:
  cultural: Mayelin comes from a mixed Hispanic background, with roots in both Mexican and Colombian families who settled in Colorado generations ago. She grew up bilingual, celebrating Día de los Muertos,
    Las Posadas, and Colombian Thanksgiving with vibrant family gatherings that emphasized food, music, and storytelling. These cultural traditions influence her design aesthetic, often incorporating warm
    earth tones, handcrafted textiles, and folk art motifs. She maintains strong ties to the local Latino community in Greeley, participating in cultural festivals and serving on the advisory board of a
    nonprofit that promotes Hispanic entrepreneurs. Her cultural heritage provides a rich source of inspiration and a deep sense of identity that she weaves into both her professional projects and personal
    life.
attributes:
  skills: '[''Space planning'', ''Color theory'', ''Sustainable material selection'', ''AutoCAD'', ''SketchUp'', ''Adobe Creative Suite'', ''Bilingual client communication (Spanish/English)'', ''Vendor
