  hobbies: '[''Gardening'', ''Cooking traditional Mexican cuisine'', ''Hiking and mountain biking'', ''Attending art fairs and craft markets'', ''Salsa dancing'', ''DIY home décor projects'', ''Volunteering
    as a design instructor'']'
  career_goals: Mayelin aims to launch her own boutique interior‑design studio in Greeley that specializes in eco‑friendly residential projects, blending contemporary aesthetics with Latin American cultural
    motifs. She plans to obtain LEED‑Green Associate certification within the next two years to strengthen her sustainability credentials. Building a stronger professional network is a priority, so she
    intends to attend regional design conferences and join the Colorado Chapter of the American Society of Interior Designers. Mayelin also dreams of mentoring aspiring designers from the local Hispanic
    community through workshops and a mentorship program. Long‑term, she hopes to publish a design blog and author a collection of case studies that showcase how cultural heritage can inform modern interior
    spaces.
