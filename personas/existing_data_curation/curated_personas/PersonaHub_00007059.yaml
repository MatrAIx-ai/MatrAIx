persona_description: A disaster management official who is passionate about using space technology to improve disaster response and preparedness. This individual is knowledgeable about the UN-SPIDER network
  and its activities, and is actively involved in promoting access to and use of space-based solutions for disaster management. They have experience collaborating with international and regional organizations
  and institutions to establish disaster management plans and facilitate networking among regional institutions. They are skilled in conducting Technical Advisory Missions, which involve experts from space
  and disaster management agencies from other countries and relevant international and regional organizations and institutions, and in implementing the SpaceAid Framework, which facilitates the cooperation
  between disaster management and space communities and ensures access to space-based solutions for disaster response and preparedness.
