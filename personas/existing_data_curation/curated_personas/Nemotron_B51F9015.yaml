  hobbies: '[''Landscape and historical site photography'', ''Wood carving and furniture restoration'', ''Collecting vintage postcards and local ephemera'', ''Gardening native perennials'', ''Listening
    to classic jazz and blues'', ''Reading Southern folklore and history'', ''Small‑group storytelling sessions'', ''Model ship building'', ''Sketching with pastels'']'
  career_goals: Although retired from formal work, Peter aims to leave a lasting imprint on Frisco City by curating a small traveling exhibit of his photographs and collected memorabilia for local schools
    and the county museum. He aspires to mentor younger community members interested in craftsmanship and heritage preservation, offering workshops on basic woodworking and historical research. He also
    hopes to author a modest memoir that weaves together his memories of the town’s cultural shifts, providing future generations with a personal perspective on Southern life.
