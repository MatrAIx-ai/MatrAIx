personas:
  professional: Stan Frost, a budding robotics enthusiast, combines methodical programming skills in Scratch and LEGO Mindstorms with an organized forward play style on their soccer team, consistently leading
    their peers through structured project plans and energetic teamwork, and they always make sure to document each step.
  sports: Stan Frost, a forward on the River Valley Rovers U13 soccer team, trains thrice weekly with a disciplined, methodical routine, supplements the sport with summer basketball at the community center,
    and they mirror their organized play style by closely studying the tactics of professional clubs like Manchester United and the NBA’s Chicago Bulls.
  arts: Stan Frost channels creative energy into drawing comic strips inspired by Marvel heroes, beating out drum rhythms to the classic hits of The Beatles during community music class, and they immerse
    themselves in adventure novels by Rick Riordan while designing pixel‑art landscapes in Minecraft, all of which shape a vibrant artistic identity.
  travel: Stan Frost prefers meticulously planned family trips, having explored Yellowstone National Park and Disney World with a detailed itinerary, while they dream of a future adventure to Kyoto, Japan,
    to experience its historic temples and anime culture, balancing excitement with practical budgeting.
  culinary: Stan Frost enjoys the comfort of pepperoni pizza and spaghetti Bolognese, often helping in the kitchen to assemble simple meals like grilled cheese with sharp cheddar and tomato soup, while
    they also crave sushi rolls with avocado and cucumber whenever a family dinner out is planned.
  core: Stan Frost is a hyper‑organized yet energetic 12‑year‑old who thrives on team projects, and they obsessively line up LEGO pieces by color, forget to finish homework when a Minecraft update drops,
    and constantly balance a love for structure with spontaneous bursts of creativity.
background:
  cultural: Stan grew up in Belleville, Michigan, a small Midwestern community with strong family and neighborhood ties. His family celebrates traditional American holidays such as Thanksgiving, Fourth
    of July fireworks, and Halloween, often participating in local parades and church events. The cultural atmosphere emphasizes kindness, hard work, and community involvement, which aligns with Stan's
    cooperative yet assertive personality. Exposure to regional sports culture, especially high-school football and community soccer leagues, reinforces his love for organized group activities and team
    spirit.
attributes:
  skills: '[''time management'', ''note-taking'', ''group project organization'', ''basic coding (Scratch)'', ''mathematical problem solving'', ''team collaboration'', ''leadership in school clubs'']'
