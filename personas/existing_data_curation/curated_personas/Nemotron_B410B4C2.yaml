  career_goals: Stan dreams of a future where he can combine his love for structure, teamwork, and helping others. He is fascinated by engineering and often imagines designing bridges or machines that solve
    everyday problems. He also admires firefighters and police officers for their community service and clear, decisive roles, and he hopes to explore those paths in high school through science fairs and
    safety workshops. Ultimately, Stan aims to attend a technical high school or college where he can study mechanical or civil engineering and continue to take on leadership roles in student organizations.
