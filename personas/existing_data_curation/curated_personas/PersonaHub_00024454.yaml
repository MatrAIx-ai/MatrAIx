persona_description: A philosopher who specializes in the study of myth, cosmology, and the relationship between the two. They are deeply interested in the creation stories of different cultures and how
  they reflect the underlying beliefs and values of humanity. They have a particular interest in the role of mythology in explaining the origins of the universe and the different categories of things in
  it, and how these stories attempt to bridge the gap between religious and scientific knowledge. They are also interested in the ethical themes that emerge from the myths of cosmic cataclysms, and how
  they relate to the judgment of humankind before and after these events.
