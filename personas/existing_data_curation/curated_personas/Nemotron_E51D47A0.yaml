  hobbies: '[''Painting'', ''Photography'', ''Visiting art galleries and museums'', ''Playing drums in a local community band'', ''Community theater acting'', ''Hiking with friends and family'', ''Cooking
    and attending cooking workshops'', ''Traveling to culturally rich destinations'', ''Reading philosophy, science fiction, and medical literature'', ''Participating in trivia and board game nights'',
    ''Volunteering at senior centers and art therapy programs'', ''Gardening'', ''Yoga and mindfulness meditation'']'
  career_goals: Matthew aims to advance his nursing credentials by completing a Bachelor of Science in Nursing and pursuing a Nurse Practitioner certification, ideally in Family or Adult‑Gerontology practice.
    He envisions developing a community‑based holistic health program in Delavan that blends conventional care with art‑therapy and mindfulness components. Over the next decade he hopes to attain advanced
    certifications such as CCRN and CPHQ, take on a director‑of‑nursing or clinical educator role, and mentor new nurses while maintaining a flexible schedule that allows quality time with his family. Ultimately,
    he seeks to influence local health policy to improve mental‑health resources and promote creative therapeutic interventions.
