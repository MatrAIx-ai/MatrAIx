  hobbies: '[''Surfing'', ''Paddle-boarding'', ''Karaoke'', ''Community Theater'', ''Food Festival Exploration'', ''Yoga'', ''Book Club (Business & Personal Development)'', ''Coastal Clean-up Volunteering'',
