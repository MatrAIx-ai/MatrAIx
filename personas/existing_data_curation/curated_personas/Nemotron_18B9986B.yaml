  career_goals: Heather wants to transition from first-line supervisor to a regional sales manager within the next 3-5 years, aspiring to oversee multiple teams and shape company-wide sales strategy. She
    aims to earn a bachelor's degree in business administration through part-time studies, complementing her hands-on experience. She hopes to design a mentorship program that nurtures emerging sales talent,
    leveraging her passion for coaching. Long-term, she envisions launching an independent sales consulting firm focused on helping small businesses implement agile sales processes. Her ambition balances
    the desire for professional advancement with maintaining flexibility and creative autonomy.
