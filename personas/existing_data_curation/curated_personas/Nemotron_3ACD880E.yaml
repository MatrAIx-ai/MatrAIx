  hobbies: '[''Gardening'', ''Baking'', ''Competitive board games (Scrabble, Monopoly)'', ''Trivia nights'', ''Reading mystery novels'', ''Watching classic sitcoms'', ''Hiking local trails'', ''Volunteering
    at animal shelter'', ''DIY home projects'']'
  career_goals: Danielle aims to translate her household management expertise into a part‑time bookkeeping or accounting assistant role for a local small‑business or nonprofit, while also launching a modest
    home‑based cottage‑food venture selling baked goods to neighbors and at farmers' markets. In the longer term she seeks financial stability that allows her to upgrade her home, support her family, and
    become a trusted practical‑advice resource within her community.
