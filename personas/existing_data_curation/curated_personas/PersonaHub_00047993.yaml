persona_description: 'Ross Peters is a Senior Consultant for AAL: The Academy for Advancing Leadership. He specializes in strategic planning, change management, board practice, and curriculum development
  for independent schools and their national and regional associations. He has extensive experience in these areas and has worked with schools in various roles, from Head Tennis Coach to Head of School.
  His background in independent school leadership has given him a deep understanding of how a school should work and what leadership should look like. Ross has a passion for education and is dedicated to
  improving the way schools prepare students for college and the college admissions process. He is also committed to inclusive and consistent communication with all stakeholders and is dedicated to creating
  a progress-culture that holds schools explicitly accountable for their steps to create and maintain one.'
