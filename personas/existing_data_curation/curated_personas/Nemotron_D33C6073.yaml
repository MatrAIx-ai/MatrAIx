personas:
  professional: Hector Millan, a seasoned secondary‑school STEM teacher, blends their expertise in curriculum development, Python‑based project‑based learning, and bilingual communication to craft interdisciplinary
    STEAM lessons while they apply their organized, methodical nature and quiet curiosity to drive classroom innovation.
  sports: Hector Millan channels their love for the outdoors into weekly hikes with the Denver Hiking Club, follows the Broncos, Avalanche, and Rockies for a seasonal sports fix, and joins a community Saturday
    soccer league, balancing moderate cardio with occasional yoga to counteract stress.
  arts: Hector Millan frequents local galleries, sketches urban landscapes, paints watercolors inspired by Frida Kahlo’s vibrant palettes, and quietly strums acoustic renditions of Juanes and traditional
    folk songs on their guitar, while they draw philosophical inspiration from Carl Sagan and Nietzsche to infuse depth into their artistic pursuits.
  travel: Hector Millan, who prefers meticulously planned trips, spends vacation weekends exploring Colorado’s national parks like Rocky Mountain and Mesa Verde, dreams of a cultural immersion tour of Oaxaca’s
    Day of the Dead festivals, and balances travel ambitions with a modest teacher’s budget by using reward points and off‑peak bookings.
  culinary: Hector Millan loves crafting mole poblano with dried ancho chilies, chipotle, and cumin, perfecting tamales wrapped in corn husks, and experimenting with fresh cilantro and lime in grilled fish
    tacos, while they also savor farm‑to‑table brunches at local eateries.
  core: Hector Millan, a detail‑oriented yet worry‑prone educator, harmonizes their curiosity for art and technology with a disciplined routine, occasional over‑thinking, and a habit of turning stress into
    creative projects.
background:
  cultural: Hector is a second‑generation Mexican‑American raised in a bilingual household in Denver. His family maintains strong ties to Latino traditions, celebrating Día de los Muertos, quinceañeras,
    and vibrant community festivals that feature mariachi music and regional cuisine. These cultural experiences have shaped his identity, instilling values of familial solidarity, community service, and
    respect for diverse perspectives. Hector actively participates in local Latino organizations, mentors students from underrepresented backgrounds, and incorporates cultural references into his teaching
    to create an inclusive classroom environment.
attributes:
  skills: '["Curriculum Development", "Project‑Based Learning", "STEAM Integration", "Classroom Management", "Data‑Driven Instruction", "Technology Integration (Google Classroom, LMS)", "Robotics and Coding
    (Python, Arduino)", "Bilingual Communication (Spanish‑English)", "Collaborative Facilitation", "Assessment Design"]'
  hobbies: '["Visiting art galleries and sketching", "Playing acoustic guitar", "Hiking and landscape photography", "Developing educational apps in Python", "Cooking traditional Latin American dishes",
    "Reading science and philosophy books", "Participating in Latino cultural festivals", "Meditation, journaling, and yoga"]'
  career_goals: Hector aspires to become a STEM department chair within the next five years, using his organizational strengths to lead curriculum innovation across the district. He plans to pursue a master's
    degree in Educational Leadership to equip himself with advanced administrative skills. His long‑term ambition is to design and implement a district‑wide STEAM program that incorporates local art and
    cultural resources, providing students with experiential learning opportunities. He also seeks professional development in teacher well‑being to better manage his own stress and to advocate for mental‑health
    support for educators and students alike.
