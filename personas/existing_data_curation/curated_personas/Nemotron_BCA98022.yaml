  career_goals: Although still exploring his interests, David is drawn to careers that blend practical problem‑solving with service to others. He often talks about wanting to become a civil engineer who
    designs safe bridges and playgrounds for his community, and he also admires firefighters for their role in protecting neighbors. His love for animals leads him to consider a future as a veterinarian,
    especially after helping care for the family’s pet rabbit. At school, he expresses enthusiasm for science projects and enjoys watching documentaries about space, hinting at a possible curiosity about
    becoming an astronaut. Overall, his ambitions are rooted in helping people, building tangible solutions, and staying involved in community life.
