personas:
  professional: David Thompson is an aspiring city builder who channels their love for LEGO skyscrapers and woodland sketches into detailed play‑maps, reflecting a practical, structured mindset while they
    occasionally misplace bricks in the creative chaos.
  sports: David Thompson energizes their week with soccer practice for the Thunder Jr. Soccer Club, cheering on DC United during weekend games, and they enjoy quiet afternoons fishing on the Potomac with
    Dad, blending team sport enthusiasm with solitary outdoor recreation.
  arts: David Thompson nurtures an artistic side by sketching cartoon adventures of their LEGO city, playing simple tunes on a beginner keyboard while they listen to the whimsical scores of Pixar films
    and the classic pop melodies of The Beatles, which fuel both imagination and quiet solo play.
  travel: David Thompson blends a love of structured itineraries with spontaneous adventure, dreaming of weekend hikes in Shenandoah National Park and family trips to the Smithsonian museums in Washington,
    D.C., while they also enjoy backyard camping nights that let them explore nature on their own terms.
  culinary: David Thompson favors hearty, kid‑friendly meals like chicken nuggets with carrot sticks, spaghetti with marinara sauce, and freshly grilled trout after a fishing outing, often adding a sprinkle
    of cheddar cheese or a squeeze of lemon, yet they sometimes lose focus and let a half‑built LEGO set sit in the kitchen while snacking.
  core: David Thompson is a structure‑loving, LEGO‑building, nature‑curious 8‑year‑old who balances teamwork on the soccer field with solo keyboard tunes, while they occasionally forget chores in favor
    of imaginative play.
background:
  cultural: David grows up in Warsaw, a small town in Westmoreland County, Virginia, where community ties and local history shape everyday life. His family has deep roots in the region, with stories of
    ancestors who farmed the Tidewater area and participated in county fairs. The local culture emphasizes respect for tradition, participation in seasonal events such as the July Fourth parade and the
    annual county fair, and a close‑knit school environment where teachers know each student personally. While the community is predominantly white, David’s household celebrates a blend of Southern hospitality
    and Mid‑Atlantic sensibilities—enjoying homemade biscuits, outdoor barbecues, and storytelling sessions about the nearby historic sites like George Washington’s birthplace. Church gatherings and volunteer
    clean‑up days in the local park further reinforce values of cooperation and stewardship that David mirrors in his daily interactions.
