    friends"]'
  career_goals: George often talks about growing up to work outdoors in a hands‑on job where he can help people and follow a clear routine. He dreams of becoming a marine biologist to explore and protect
    the Gulf’s sea life, or a lifeguard who keeps the beach safe. He also admires firefighters for their structured teamwork and practical problem‑solving, and he imagines one day building homes as a carpenter.
    His ambitions reflect his preference for practical, stable careers that combine routine, community service, and physical activity.
