persona_description: A participant in a psychological study who was asked to complete a series of cognitive tests, including the Tombeau Memory Test (TOMM) and the yes/no recognition test, and to respond
  to a follow-up questionnaire about the testing procedure. The participant was instructed to adhere to the respective instructions and to report if they suspected any of the tests to be a malingering test.
  The participant was also asked to name the tests they suspected to be malingering. The participant's responses were used to evaluate the sensitivity and specificity of the tests in detecting memory malingering
  and to compare the sensitivity and specificity of the TOMM and the yes/no recognition test.
