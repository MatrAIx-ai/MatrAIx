persona_description: A neuroscientist and researcher who specializes in the development of lightweight and easy-to-use brain scanners for young children with epilepsy. They are working on a prototype of
  a new MEG scanner that is not much bigger than a bike helmet, and hopes to replace bulky and challenging-to-use scanners in the future. The researchers published a paper about the new device in Nature.
