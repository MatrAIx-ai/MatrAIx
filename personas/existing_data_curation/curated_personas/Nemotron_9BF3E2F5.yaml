personas:
  professional: Christy Barajas, a 32‑year‑old community‑focused professional, leverages her bilingual fluency, event‑coordination expertise, and first‑aid certification to excel as a front‑desk coordinator
    in a boutique hotel, where they balance structured check‑in procedures with the flexibility needed to host spontaneous cultural events and maintain harmonious guest experiences.
  sports: Christy Barajas, a 32‑year‑old enthusiast of both beach and team sports, joins the local San Juan Trail Runners club for sunrise jogs along Isla Verde, supports the Cangrejeros de Santurce in
    basketball season and the Vaqueros de Bayamón in baseball, and mixes Zumba classes with occasional beach volleyball games to stay active, though they often skip scheduled gym days in favor of spontaneous
    dance sessions.
  arts: Christy Barajas, a passionate lover of music and performance, fills dance nights with the rhythms of Bad Bunny and Ricky Martin, sings along to classic salsa queen Celia Cruz, binge‑watches the
    telenovela La Reina del Sur with cousins, enjoys contemporary romance novels by Nora Roberts, and occasionally attends live theater productions at the Teatro Tapia, though they sometimes stay up late
    binge‑watching series at the expense of sleep.
  travel: Christy Barajas prefers a semi‑planned itinerary that leaves room for spontaneous beach stops; they often book affordable flights to Cartagena or Barcelona during off‑season, while always carving
    out weekend getaways to Culebra or the El Yunque rainforest, balancing family obligations with a desire for cultural immersion.
  culinary: Christy Barajas, an enthusiastic home chef, specializes in crafting mofongo with crispy plantains, arroz con gandules seasoned with sofrito, and tembleque made from coconut milk, loves pairing
    garlic shrimp with lime‑brightened avocados, often experiments with adobo and sazón, yet they sometimes forget to let the rice rest, resulting in a slightly mushy texture.
  core: Christy Barajas, a 32‑year‑old sociable planner, blends structured event coordination with a love for spontaneous dance parties, tends to forget to file receipts, overcooks rice, and never says
    no to a good potluck.
background:
  cultural: Christy was born and raised in the bustling municipality of San Juan, where the rich tapestry of Puerto Rican culture shapes her daily life. Her family traditions emphasize close‑knit relationships,
    respect for elders, and celebrations rooted in both Catholic and Afro‑Caribbean heritage. She grew up listening to plena, bomba, and reggaetón, rhythms that often accompany her weekend outings and dance
    classes. Puerto Rican cuisine—especially dishes like mofongo, pasteles, and tostones—is a cornerstone of family gatherings, and she carries these flavors into her cooking for friends. Community is central
    to her identity; she regularly participates in the San Sebastián Street Festival, the Carnaval de San Juan, and neighborhood block parties, reinforcing collective solidarity and cultural pride. While
    fluent in Spanish, she comfortably navigates English‑speaking environments, reflecting Puerto Rico’s bilingual reality and her own adaptability.
