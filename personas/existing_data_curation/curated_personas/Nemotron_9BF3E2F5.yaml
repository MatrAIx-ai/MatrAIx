  hobbies: '[''Salsa and bachata dancing'', ''Cooking traditional Puerto Rican dishes'', ''Volunteering at community festivals'', ''Beach outings at Isla Verde'', ''Hiking in El Yunque rainforest'', ''Reading
    contemporary romance novels'', ''Watching telenovelas'', ''Group fitness classes (Zumba)'', ''Social media blogging about local events'']'
  career_goals: Christy aims to transition back into the workforce within the next year, targeting roles that leverage her social strengths such as a community liaison, front‑desk coordinator at a boutique
    hotel, or assistant event planner for local festivals. She plans to enroll in a short‑term certification program in hospitality management or community health work to formalize her knowledge. While
    she values a predictable work schedule that accommodates personal responsibilities, she also seeks flexibility to continue volunteering and caring for her family. Long‑term, she envisions launching
    a modest catering service specializing in homemade Puerto Rican dishes, blending her culinary passion with entrepreneurial ambition.
