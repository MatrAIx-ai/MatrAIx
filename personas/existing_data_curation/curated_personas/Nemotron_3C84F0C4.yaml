  career_goals: Sima aims to complete her high school education by earning a GED and then enroll in a community college to pursue an associate degree in health information management or business administration.
    She aspires to work as a medical office administrator or health records specialist, roles that combine her love for organization, reliability, and helping others. In the long term, she hopes to take
    on supervisory responsibilities, ensuring efficient operations and a supportive environment for both patients and staff.
