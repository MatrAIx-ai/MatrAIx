personas:
  professional: A diligent junior library program coordinator, Sima Brizuela leverages Excel spreadsheets and meticulous calendar management to orchestrate the summer reading initiative, while already mapping
    out a future as a health information manager who will blend organizational rigor with patient-centered service.
  sports: A desert-trail enthusiast, Sima Brizuela spends weekends hiking the rugged paths around Fountain Hills, volunteers as a trail-maintenance helper for the local park, and follows the Arizona Diamondbacks
    and Chicago Cubs, while opting for low-impact cardio like brisk walks over team sports.
  arts: An aspiring classical pianist, Sima Brizuela devotes evenings to practicing Chopin Nocturnes and Beethoven Sonatas, while also weaving creative expression through knitting scarves inspired by the
    color palettes of Monet water lilies and baking decorative pastries that mirror the symmetry of Escher prints.
  travel: A methodical planner, Sima Brizuela maps out weekend getaways using spreadsheets, has trekked the Grand Canyon and Sedona red rocks, dreams of walking the historic streets of Kyoto during cherry
    blossom season, and balances travel ambitions with a limited teen budget and school commitments.
  culinary: A precision baker, Sima Brizuela follows exact measurements to craft buttery croissants, chewy chocolate-chip cookies, and lemon zest pound cake, favoring ingredients like unsalted butter, vanilla
    bean, and almond extract, and rates herself a competent home chef who still occasionally over-mixes batter.
  core: Sima Brizuela is a 16-year-old planner-obsessed teen who balances ledger-like budgeting, methodical baking, and meticulous volunteer work, yet occasionally lets perfectionism freeze her creative
    bursts.
background:
  cultural: Sima comes from a white, middle‑class family that has lived in the Phoenix metropolitan area for several generations. Although the Brizuela surname reflects some Hispanic ancestry, she was raised
    primarily within mainstream American cultural traditions common in Fountain Hills, such as celebrating Thanksgiving, the Fourth of July, and participating in community events at the local recreation
    center. Her family values punctuality, responsibility, and community service, which have shaped her outlook. Growing up amidst the desert environment of the Southwest, she appreciates the region’s natural
    beauty and incorporates that appreciation into her hobbies and social activities.
