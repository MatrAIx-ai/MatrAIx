persona_description: A scientist who specializes in the field of nanotechnology and DNA sequencing, particularly in the development of nanopore-based DNA readers and sequencing devices. Has expertise in
  controlling the motion of single DNA strands through a protein nanopore using a polymerase enzyme, and has successfully demonstrated this approach in a recent research paper. Is currently working on developing
  the next generation version of the system, combining his DNA polymerase approach with the 'read-head' nanopore developed by Hagan Bayley. Has experience in collaboration with other scientists and is highly
  motivated to create a cheap and simple sequencing method.
