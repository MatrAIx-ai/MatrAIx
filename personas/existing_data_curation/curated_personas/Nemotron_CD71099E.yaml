  hobbies: '[''visiting art galleries and theater'', ''leading a book club'', ''gardening herbs'', ''playing đàn tranh (Vietnamese zither)'', ''experimenting with cooking'', ''digital photography'', ''volunteering
    at community events'', ''learning watercolor painting'']'
  career_goals: Although retired from formal employment, Huong aims to preserve and share her Vietnamese heritage by establishing a community arts program that showcases traditional music, dance, and visual
    art. She aspires to mentor younger volunteers, especially women, in leadership and event planning. She hopes to write and self‑publish a memoir documenting her migration journey and the evolution of
    Vietnamese culture in Las Vegas. Huong also plans to travel back to Vietnam to document regional culinary practices and to explore digital illustration techniques, integrating them into local workshops.
    Finally, she wants to contribute her organizational talents to senior wellness initiatives, creating low‑stress social activities for older adults.
