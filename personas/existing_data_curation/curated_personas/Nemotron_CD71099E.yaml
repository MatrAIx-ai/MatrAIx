personas:
  professional: Huong Sampang channels their meticulous event‑planning expertise and bilingual fluency into steering volunteer‑driven arts festivals, where their natural skepticism pushes them to double‑check
    contracts and budgets, while they serve as the go‑to liaison between performers and senior participants.
  sports: Huong Sampang enjoys weekly walking groups at Red Rock Canyon and a friendly senior badminton league, while cheering on the Vegas Golden Knights and the Las Vegas Raiders with the same fervor
    they bring to community event planning.
  arts: Huong Sampang frequents the Bellagio Gallery of Fine Art and the Smith Center theater, curates community exhibitions featuring emerging painters like Maya Hesh, and lovingly plucks the strings of
    the đàn tranh at traditional music circles, letting their curiosity for unconventional art forms guide them as they lead volunteer‑led workshops.
  travel: Huong Sampang plans meticulously for each journey, alternating between nostalgic trips to the river delta region of their homeland to document regional culinary practices and adventure‑filled
    visits to Kyoto’s night markets, the lavender fields of Provence, and the desert trails of Sedona, always balancing travel costs with their modest retirement income, and they frequently adjust itineraries
    to stay within budget.
  culinary: Huong Sampang thrives in the kitchen, skillfully merging fragrant herbs like basil, cilantro, and mint into innovative dishes such as lemongrass‑infused chicken tikka wraps and miso‑pho broth,
    while their competitive spirit fuels weekly challenges at the senior center’s cooking club, and they often seek new flavor pairings to impress fellow participants.
  core: Huong Sampang is a detail‑oriented cultural champion who blends organized event mastery with artistic curiosity, and they wrestle with lingering worry and a competitive edge that spurs both meticulous
    planning and occasional over‑analysis.
background:
  cultural: Huong was born in Vietnam and immigrated to the United States in her early twenties after the war, settling first in California before moving to Las Vegas. She grew up in a tight‑knit Vietnamese‑American
    community, where family loyalty, respect for elders, and communal celebration are core values. She maintains cultural traditions such as celebrating Tet with elaborate meals, preparing pho, bánh chưng,
    and other holiday dishes, and participating in local Vietnamese festivals in Clark County. Her Southeast Asian heritage informs her love of music, cuisine, and storytelling, while her decades in Nevada
    have exposed her to a multicultural environment that she embraces through cross‑cultural volunteer work and community engagement.
