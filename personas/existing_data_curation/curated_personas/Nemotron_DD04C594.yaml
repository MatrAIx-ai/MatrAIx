  career_goals: Looking ahead, George aims to transition into a senior executive role—such as Director of Operations or Vice President—where he can steer large-scale digital transformation initiatives and
    embed a culture of creativity and well‑being across the organization. He is passionate about championing diversity, equity, and inclusion, particularly by creating mentorship pipelines for Mexican‑American
    and other under‑represented talent in STEM fields. Over the next five years, he plans to launch a corporate-wide employee wellness program that integrates mindfulness, art‑based workshops, and flexible
    work structures to address mental‑health challenges. Ultimately, George envisions leaving a lasting legacy by establishing a scholarship for low‑income Mexican‑heritage students pursuing STEM degrees
    and, in retirement, consulting for nonprofits seeking operational excellence.
