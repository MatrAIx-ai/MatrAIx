personas:
  professional: George Ortizsantiago, a seasoned engineering manager with a track record of leading Lean Six Sigma-driven digital transformation projects, leverages data analytics tools like Tableau and
    SAP to streamline operations while infusing design-thinking and storytelling into cross‑functional teams, balancing methodical planning with an open curiosity for unconventional solutions.
  sports: George Ortizsantiago enjoys hiking the coastal trails of Marin County with the local Trail Runners Club, follows the San Francisco Giants in spring, the Golden State Warriors in winter, and occasionally
    plays casual basketball at a community center, using these activities to balance a competitive spirit with a desire for calm.
  arts: George Ortizsantiago immerses themselves in the Bay Area’s vibrant art scene, often attending exhibitions featuring muralist Diego Rivera retrospectives, collecting limited‑edition prints by Frida
    Kahlo, and performing acoustic guitar renditions of Victor Jara songs at community festivals, while their own oil and watercolor paintings echo the bold colors of traditional mural narratives.
  travel: George Ortizsantiago’s travel style blends purposeful exploration and family connection, having trekked the ancient ruins of Teotihuacan, savored the street food of Oaxaca, and revisited the coastal
    cliffs of Cinque Terre, while meticulously planning future trips to the serene Japanese garden at Ryoan‑ji and a pilgrimage to the historic churches of Seville.
  culinary: George Ortizsantiago delights in cooking mole negro with homemade chocolate, tamales stuffed with locally sourced pork and chilies, and experimenting with avocado‑citrus salsa, often pairing
    these dishes with a glass of Californian pinot noir and serving them during Navidad gatherings.
  core: George Ortizsantiago is a methodical, curiosity‑driven leader who channels intense anxiety into creative outlets like painting and guitar, yet occasionally over‑commits to community events at the
    expense of personal rest.
background:
  cultural: George is a first‑generation Mexican‑American who grew up in a bilingual household that emphasized familismo, respect for elders, and strong community ties. He celebrates Mexican traditions
    such as Día de los Muertos, Las Posadas, and family gatherings during Navidad, often preparing authentic dishes like mole and tamales. Fluent in Spanish, he maintains close connections with the local
    Mexican community in Marin County, participating in cultural events, folk music gatherings, and church activities rooted in his Catholic upbringing. His heritage informs his collaborative management
    style, fostering inclusive teamwork and a deep appreciation for storytelling. The vibrant colors and narratives of Mexican mural art have nurtured his lifelong fascination with visual arts, while the
    cultural emphasis on emotional expression helps him navigate his own heightened emotional reactivity.
