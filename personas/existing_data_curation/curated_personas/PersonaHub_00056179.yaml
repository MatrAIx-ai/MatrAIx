persona_description: A professional in the field of rigging and lifting who is familiar with the use and applications of eyebolts in various applications such as lifting heavy loads, tensioning wires, securing
  loads, and in non-load bearing applications. They have experience with different types of eyebolts including forged, plain, collared, commercial, load rated, machinery, swivel, galvanised, anodised or
  plated. They are knowledgeable about the specifications, standards and applications of these eyebolts, and are able to provide advice and guidance on their use. They may also have experience with the
  installation and maintenance of eyebolts and have a good understanding of the different types of eyebolts available in the market.
