persona_description: A scientist who specializes in climate change and its potential effects on human health. This person is likely to be interested in the potential increase in health risks associated
  with heavy smog and extreme weather events due to global warming. They would be familiar with computer models and simulations that predict the frequency and intensity of these events. They would also
  be aware of the potential increase in hospital admissions for cardiac and respiratory problems due to high levels of pollution. Additionally, they would be interested in the implications of the simulation
  presented at the annual meeting of the American Association for the Advancement of Science in Washington, which suggests that global warming could lead to an increase in difficult days for those affected
  by ozone pollution.
