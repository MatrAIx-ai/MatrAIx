  career_goals: Julie aims to turn her love for technology and creative problem‑solving into a future career in software development or game design. She hopes to attend a high school with a strong STEM
    program, win a regional coding competition, and eventually study computer science at a university. In the longer term, she envisions creating interactive digital experiences that blend storytelling
    with technology, while maintaining the flexibility to work on personal projects and explore new ideas.
