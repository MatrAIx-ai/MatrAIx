  career_goals: Harry aims to become a store manager within the next two years, leveraging his organizational skills and people‑centric approach to improve team performance. He plans to pursue a Business
    Administration degree part‑time, positioning himself for a regional district manager role that blends leadership with mentorship. Ultimately, he dreams of launching a boutique that showcases Mexican
    artisanal products, creating jobs for fellow community members while preserving cultural heritage.
