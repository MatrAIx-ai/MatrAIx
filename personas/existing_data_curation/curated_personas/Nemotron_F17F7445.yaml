  career_goals: Despite being retired from full‑time work, Robert remains goal‑oriented. He hopes to complete the bachelor’s degree he started in the 1960s, focusing on art history or American studies.
    He plans to compile his memoirs and a curated archive of Moorcroft’s visual history, culminating in a small exhibition at the local library. He also aspires to lead a yearly intergenerational art workshop
    that pairs senior participants with local students, fostering unconventional creative dialogue. In the long term, he wishes to see the community’s oral histories digitized and made accessible online.
