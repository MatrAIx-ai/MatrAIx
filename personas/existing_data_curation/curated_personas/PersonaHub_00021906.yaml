persona_description: A historian who specializes in the study of military history, particularly the conflicts of the past and their impact on society. She is interested in the portrayal of military conflicts
  in games and how it shapes our understanding of history and its events. She is aware of the limitations of military games in depicting other spheres of human activity and the importance of politics, social,
  and economic conflicts in history. She is also aware of the moral and ethical implications of military conflicts and the need to understand the political intention behind them. She is interested in the
  role of strategy in understanding military conflicts and the importance of understanding the politics behind them.
