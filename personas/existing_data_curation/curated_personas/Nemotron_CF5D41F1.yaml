personas:
  professional: Miguel Delaguila is a veteran heavy‑duty equipment technician with three decades of expertise in diesel, hydraulics, and electronic diagnostics, and they blend a calm, methodical troubleshooting
    style with a curiosity for emerging telematics, aiming to earn ASE master technician status and lead their shop’s service department while mentoring apprentices.
  sports: Miguel Delaguila maintains his athletic edge by playing central midfield for the Austin Elite Soccer Club in the local adult league, cheering for Austin FC in MLS, casting with the Lake Travis
    Anglers Association on weekends, and they winter‑time follow the Dallas Cowboys for a high‑energy routine.
  arts: Miguel Delaguila fuses his love for mechanics and aesthetics by restoring vintage pickups and hand‑crafting custom metal art, often collaborating with a local steel‑workers guild, while they devote
    evenings to the vibrant sounds of Los Tigres del Norte and Vicente Fernández and draw inspiration from contemporary creators like Banksy, Jeff Koons, and muralist Diego Rivera when visiting galleries
    in Austin.
  travel: Miguel Delaguila prefers road‑trip adventures that combine fishing and cultural stops, having driven his restored classic truck to Patagonia’s remote lakes for a dreamcatcher fishing expedition
    and to Santa Fe’s art district for a weekend of mural tours, and they are planning their next getaway to the Pacific Northwest’s Columbia River Gorge to test a new hybrid retrofit on steep mountain
    roads.
  culinary: Miguel Delaguila cooks traditional dishes such as pozole with hominy, pork shoulder, and chipotle‑infused broth, prepares hand‑rolled tacos al pastor using pineapple, achiote, and fresh cilantro,
    and they balance moderate kitchen skills with a penchant for grilling marinated carne asada over mesquite wood while occasionally experimenting with avocado foam in a modern mole.
  core: Miguel Delaguila blends the steady precision of a master mechanic with an unquenchable curiosity for art and technology, and they often forget to schedule routine doctor appointments while hoarding
    spare truck parts in their garage.
background:
  cultural: Miguel was born to Mexican immigrant parents and grew up speaking both Spanish and English in the agricultural heartland of Kern County. He maintains strong ties to Mexican traditions—celebrating
    Día de los Muertos, Christmas posadas, and sharing family recipes—while embracing the multicultural fabric of Southern California. His cultural identity reinforces a deep respect for hard work, community
    solidarity, and the vibrant visual arts of his heritage, which often surface in his personal projects and social life.
