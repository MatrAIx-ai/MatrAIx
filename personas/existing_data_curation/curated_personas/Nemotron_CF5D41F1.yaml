  hobbies: '[''Playing soccer in a local league'', ''Fishing trips with friends'', ''Attending Mexican cultural festivals'', ''Restoring classic trucks'', ''Metalworking and custom welding projects'', ''Cooking
    traditional Mexican meals'', ''Listening to norteño and mariachi music'', ''Visiting art galleries and street murals'']'
  career_goals: Miguel aims to earn ASE master technician certification and become the lead service manager at his current shop, where he can shape maintenance protocols and mentor the next generation of
    mechanics. He also dreams of launching his own mobile repair service that specializes in retrofitting older equipment with newer, more efficient technologies, ensuring financial stability for his family
    while preserving his passion for hands-on problem solving.
