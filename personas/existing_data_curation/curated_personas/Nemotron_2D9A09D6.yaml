  career_goals: Aleigha aims to transition from her current stay‑at‑home role into a freelance creative practice that merges her love for visual art and storytelling. She plans to build a robust portfolio,
    secure regular commissions for branding and illustration, and eventually launch an online boutique featuring her own prints and handcrafted goods. Simultaneously, she intends to enroll part‑time in
    a BFA or certificate program to deepen her technical expertise, while also establishing a monthly community art workshop in Rowlett to foster local creativity and mentorship.
