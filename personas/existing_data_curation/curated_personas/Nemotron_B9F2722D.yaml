personas:
  professional: Alexander Santossantos is a budding LEGO architect and Minecraft world designer who channels curiosity and methodical planning into intricate builds, while their compassion shines through
    as they mentor younger students in the school’s Science Club.
  sports: Alexander Santossantos is a midfield dynamo for the River Valley Rockets youth soccer team and a shortstop for the Middletown Minors baseball club, and they also cycle the Maple Creek Trail every
    weekend, approaching fitness with an energetic, organized routine that balances team practice with solo bike rides.
  arts: Alexander Santossantos delights in singing harmonies with the church choir, crafting elaborate LEGO sculptures inspired by the intricate works of architect Frank Gehry, and immersing themselves
    in adventure tales like 'Artemis Fowl' while grooving to upbeat tracks by Imagine Dragons and the pop anthems of Taylor Swift.
  travel: Alexander Santossantos plans family vacations with the precision of a LEGO blueprint, having already explored San Diego’s zoo and Seattle’s Space Needle, while dreaming of biking through the forests
    of Yosemite and tasting tacos in Oaxaca, balancing adventure with the comfort of familiar group activities.
  culinary: Alexander Santossantos assists in the kitchen by measuring spices for layered vegetable casseroles and preparing seasoned meat wraps with fresh salsa, proudly mastering the art of chopping cilantro,
    whisking yogurt sauce, and sanding wooden cutting boards under dad’s carpentry guidance.
  core: Alexander Santossantos is a curious, organized nine‑year‑old whose boundless energy fuels teamwork in sports and LEGO builds, yet a streak of worry often leads to late‑night gaming and occasional
    candy cravings.
background:
  cultural: Alexander’s family blends Greek and Hispanic heritage within the Midwestern setting of Mustang, Oklahoma. At home, he hears occasional Greek and Spanish phrases, celebrates Greek Easter with
    traditional foods, and joins Mexican cultural observances such as Día de los Muertos. These traditions coexist with local Oklahoma customs, including county fairs and community service events. The family
    emphasizes hospitality, close‑knit relationships, and giving back to the community, values that reinforce Alexander’s compassionate and cooperative nature while grounding him in the neighborly spirit
    of his hometown.
