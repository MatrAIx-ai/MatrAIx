  career_goals: Alexander dreams of a future where he can combine his love for helping others with his practical problem‑solving abilities. He is drawn to becoming a pediatrician or an elementary school
    teacher, careers that let him support children's growth and well‑being. He also imagines roles such as an environmental scientist or community organizer, where his curiosity about the natural world
    and his desire to create harmonious, cooperative environments can make a positive impact.
