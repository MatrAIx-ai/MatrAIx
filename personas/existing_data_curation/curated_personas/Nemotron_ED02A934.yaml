personas:
  professional: Tyeisha Artis, a 37‑year‑old textile care specialist at a Decatur dry‑cleaning facility, leverages her associate degree in business and a practical curiosity for eco‑friendly solvents to
    streamline garment processing while mentoring new staff with a steady, organized yet flexible approach.
  sports: Tyeisha Artis is a seasonal runner who logs early morning jogs in the cool mornings of spring and fall, follows the Atlanta Braves and Hawks religiously, and participates in a weekend community
    cycling club that meets at Decatur's historic square.
  arts: Tyeisha Artis regularly attends gallery openings featuring local visual artists like Rodney Phelps, and dives into live jazz sets at the East Atlanta Village club, where they savor the sounds of
    Kamasi Washington and Esperanza Spalding, letting the music inspire their herb‑infused culinary experiments.
  travel: Tyeisha Artis enjoys short, purposeful trips that balance exploration and relaxation, having taken a weekend road trip to Savannah’s historic district, a culinary tour of New Orleans’ soul‑food
    scene, and a planned two‑week camping adventure in the Great Smoky Mountains to source wild herbs.
  culinary: Tyeisha Artis blends Southern soul‑food foundations with health‑conscious twists, perfecting dishes like baked collard greens with smoked turkey, quinoa‑stuffed sweet potatoes, and low‑oil “fried”
    chicken seasoned with sumac and fresh thyme, while their garden yields cilantro, sage, and heirloom tomatoes that star in most meals.
  core: Tyeisha Artis is a practical dreamer who gardens, greening laundry, and jazz‑listening all while fluidly balancing disciplined finances, meticulous health habits, and an ever‑growing curiosity for
    sustainable living.
background:
  cultural: Tyeisha grew up in the vibrant African-American community of Decatur, shaped by the region’s history of resilience and communal support. Her family traditions celebrate Gospel music, church
    gatherings, and Southern soul cuisine, which influence her love of cooking and community events. She identifies strongly with the values of mutual aid and perseverance passed down through generations,
    and she actively participates in local cultural festivals and neighborhood clean-up projects, reflecting her commitment to uplifting her community while honoring her heritage.
attributes:
  skills: '[''Textile identification and care'', ''Stain removal techniques'', ''Commercial laundering equipment operation'', ''Customer service and client communication'', ''Inventory management'', ''Basic
