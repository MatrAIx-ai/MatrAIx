  hobbies: '[''Community gardening'', ''Soul-food cooking'', ''Reading non-fiction (entrepreneurship, sustainability)'', ''Attending jazz performances'', ''Yoga and mindfulness'', ''Youth mentorship and
    career coaching'']'
  career_goals: Tyeisha aims to advance into a supervisory role at her current dry-cleaning facility, where she can mentor newer staff and streamline operations. Long-term, she plans to open her own boutique
    laundry service that specializes in sustainable, low-chemical cleaning methods for the Decatur community. She also hopes to obtain certifications in textile preservation and green cleaning, and to partner
    with local businesses for joint recycling initiatives.
