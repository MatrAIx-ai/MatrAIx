personas:
  professional: Liza Ochoa, a 16‑year‑old student, merges bilingual fluency, beginner HTML/CSS skills, and forward‑line soccer leadership into coordinating their school’s health‑science club, where their
    curious‑practical approach drives prototype health‑tracker apps while their competitive drive pushes peers to excel.
  sports: Liza Ochoa, a forward on the Rancho Cordova Vanguards youth soccer team, trains three times weekly, draws inspiration from Sacramento Republic FC, also joins a weekend volleyball club, and balances
    intense competitive drills with occasional skate‑boarding for cross‑training.
  arts: Liza Ochoa curates TikTok dance routines set to Bad Bunny and J Balvin beats while delving into graphic novels like 'Ms. Marvel' and 'Saga', and their playlists blend Latin pop icons such as Luis Miguel
    with indie rock acts like Arctic Monkeys, reflecting a cultural appreciation that fuels their creative identity.
  travel: Liza Ochoa enjoys weekend road trips to the California coast, has visited Mexico City during a family reunion, dreams of backpacking through Costa Rica’s rainforests and touring Tokyo’s tech districts,
    yet balances these aspirations with meticulous planning that squeezes trips into school breaks and a modest savings pool.
  culinary: Liza Ochoa loves crafting homemade tortas with chorizo and avocado mash, perfecting tamales with a pinch of smoked chipotle, and experimenting on weekends by adding Korean‑inspired kimchi to
    traditional salsa, showcasing a cooking skill that balances family tradition with adventurous flavor fusions.
  core: Liza Ochoa is a fiercely competitive soccer forward whose curiosity fuels a love of coding and dance, yet they sometimes procrastinate on schoolwork and forget to charge their phone before a big
    practice.
background:
  cultural: Liza grew up in a Mexican‑American household in Rancho Cordova, where Spanish is spoken daily alongside English. Her parents immigrated from central Mexico and maintain strong ties to Mexican
    customs, celebrating holidays such as Día de los Muertos, Mexican Independence Day, and family quinceañeras. These traditions blend with the multicultural atmosphere of Sacramento County, exposing her
    to a broad array of cuisines, music, and community festivals. Family gatherings often revolve around shared meals, storytelling, and religious observances that reflect a blend of Catholic and secular
    values. Liza’s bilingual upbringing has given her a deep appreciation for Mexican literature, folk art, and the importance of community solidarity. At school, she is one of the few students who can
    act as a cultural bridge, helping classmates navigate language barriers and fostering inclusive group projects. Her identity as a Mexican‑American teen shapes her worldview, motivating her to give back
    to the Latino community while navigating the opportunities of a diverse Californian environment.
