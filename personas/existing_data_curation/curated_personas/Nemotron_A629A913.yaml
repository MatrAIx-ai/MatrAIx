  hobbies: '[''Soccer'', ''Cumbia and reggaeton dancing'', ''TikTok video creation'', ''Cooking traditional Mexican dishes'', ''Volunteer work at community center'', ''Reading graphic novels'', ''Beginner
    coding (HTML/CSS)'', ''Listening to diverse music'', ''Stargazing'', ''Organizing cultural events'']'
  career_goals: Liza aims to finish her high school education—either by completing ninth grade or obtaining a GED—within the next two years, then enroll in a community‑college program focused on health
    sciences. She dreams of becoming a bilingual medical assistant or community health worker, using her practical problem‑solving skills and cultural insights to support Latino families in Sacramento County.
    Her curiosity about science drives her to seek a scholarship for a competitive STEM outreach program, and she hopes to later pursue an associate degree in nursing, eventually achieving RN certification.
    Beyond the health field, Liza wants to lead youth‑leadership workshops at the local community center, channeling her sociable energy and competitive spirit to mentor other teenagers. She envisions a
    future where she balances a stable career with continued learning, possibly returning to school for a bachelor’s degree in public health.
