persona_description: A health official from the Tanzanian Ministry of Health who is responsible for coordinating the government's response to avian influenza, especially given the country's location on
  a migratory bird route and its efforts to sensitize the public about the threat. The official is cautious about importing poultry products from other countries but believes that the government is prepared
  for any potential outbreak and has a plan in place to compensate poultry farmers in case of an outbreak. The official is also in the process of seeking help from various organizations to create a fund
  to address the issue of avian influenza.
