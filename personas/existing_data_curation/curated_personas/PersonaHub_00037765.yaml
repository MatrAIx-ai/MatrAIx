persona_description: A socio-political theorist and advocate for Integral Humanism, Narayana Rao K.V.S.S. is known for his work on the principles of economic development and social hierarchy based on the
  harmonization of plurality, diversity, and internal contradictions. He proposes a model of economic development based on Integral Humanism, which emphasizes self-interest, others' interests, freedom subject
  to principles of Dharma, individual learning, individual activity, increase in knowledge, innovation, major adventures, growth in wealth, social stability, and socially committed people. Rao's postulates
  and practical guidelines for economic development are grounded in the Vedanta philosophy and are based on the perception of chiti and recognition of dharma.
