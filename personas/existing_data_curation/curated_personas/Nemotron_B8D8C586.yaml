  career_goals: She aims to advance to an Operations Manager or Office Manager position within the next five years, overseeing multiple departments and leading digital transformation initiatives for administrative
    processes. She plans to pursue a master’s degree in Organizational Leadership or Business Administration to deepen her strategic management skills. Additionally, she aspires to develop a company‑wide
    employee engagement program that integrates arts and cultural experiences, leveraging her passion for creativity to enhance workplace morale. Long‑term, she envisions mentoring emerging women leaders
    in the administrative field and possibly consulting on process optimization for small businesses in the Bucks County area.
