  hobbies: '[''Classic car restoration'',''Fishing'',''Community workshop volunteering'',''Woodworking'',''Reading DIY and technical magazines'',''Gardening'',''Attending local baseball games'',''Playing
    acoustic guitar'']'
  career_goals: Arthur aims to formalize his extensive practical knowledge with additional credentials, specifically the AWS Certified Welding Supervisor certification, to qualify for a foreman or supervisory
    role that offers a predictable schedule and health benefits. He wants to leverage his organizational strengths to lead a small team, implement systematic safety and workflow protocols, and mentor the
    next generation of welders. Simultaneously, he plans to launch a side business that provides custom metal fabrication for local homeowners—such as patio furniture and decorative metalwork—allowing him
    to balance hands‑on craftsmanship with manageable managerial duties. His long‑term ambition is to achieve financial stability for a comfortable retirement while reducing occupational stress by establishing
    steady, structured work routines and delegating appropriately.
