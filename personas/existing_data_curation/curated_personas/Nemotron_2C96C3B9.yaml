  hobbies: '[''Basketball'', ''Coding club (Scratch/Python)'', ''DIY electronics and robotics projects'', ''Drumming'', ''Online multiplayer gaming'', ''Sci‑fi movies'', ''Creative writing'', ''Community
    center volunteering'', ''Journaling'']'
  career_goals: Albert aspires to graduate high school with a solid academic record and earn a scholarship to study computer science or robotics engineering. He envisions a career as a software developer
    or robotics technician where he can merge his curiosity for new technology with practical problem‑solving. Long‑term, he hopes to mentor younger students in his community, using his experience to guide
    them toward STEM fields and to give back through volunteer tutoring and local youth programs.
