personas:
  professional: Albert Baker is a budding technophile who blends his love for basketball teamwork with methodical curiosity, coding simple Python scripts and building robots in the school coding club while
    already envisioning a future as a robotics engineer.
  sports: Albert Baker thrives on the basketball court, playing point guard for the middle school Eagles, cheering for the NBA's Miami Heat, and attending weekly practices at the community gym while also
    participating in summer camp leagues.
  arts: Albert Baker channels rhythmic energy into informal drumming sessions, curates playlists featuring Kendrick Lamar, Nas, and gospel powerhouse Kirk Franklin, and writes sci‑fi short stories inspired
    by the cinematic worlds of Blade Runner and the narrative style of Neil Gaiman.
  travel: Albert Baker’s travel dreams mix low‑cost road trips to the Grand Canyon with aspirations to attend the Tokyo International Robot Exhibition, preferring to plan itineraries with friends over apps
    while balancing school deadlines and a limited family budget.
  culinary: Albert Baker’s culinary palate favors handheld snacks like pepperoni pizza slices, spicy chicken wings, and mango smoothies, yet he also experiments with simple tech‑themed kitchen projects
    such as constructing a DIY gummy‑bear dispenser, showing a knack for blending curiosity with food fun.
  core: Albert Baker’s teenage life is a whirlwind of basketball hustle, coding curiosity, and anxiety‑driven overthinking, marked by late‑night gaming marathons, a habit of forgetting to charge his phone,
    and a relentless drive to turn hobby projects into future careers.
background:
  cultural: Albert is an African‑American teenager growing up in Bourbonnais, a small Midwestern town in Illinois. His family maintains close ties to the local church, where gospel music, community gatherings,
    and the celebration of cultural milestones like Juneteenth and Black History Month are integral. Soul‑food meals and family storytelling reinforce his connection to African‑American heritage. While
    the town is predominantly white, Albert's social circles at school and in the community center provide a supportive environment where he navigates both inclusion and occasional experiences of marginalization.
    His cultural identity shapes his love for hip‑hop, his respect for elders, and his dedication to uplifting other Black youth in the area.
attributes:
  skills: '[''Team collaboration'', ''Public speaking'', ''Basic coding with Scratch and Python'', ''DIY electronics and simple repairs'', ''Basketball strategy and teamwork'', ''Creative writing'', ''Time
