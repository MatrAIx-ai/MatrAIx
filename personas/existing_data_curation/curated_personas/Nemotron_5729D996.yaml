personas:
  professional: Rhea Joseph, a seasoned data entry specialist who now bridges a knack for precise spreadsheet management with a humanities‑infused eye for context, leverages their organized, methodical
    nature and insatiable curiosity to transform museum records into searchable digital archives while championing inclusive data practices within their nonprofit team.
  sports: Rhea Joseph enjoys early‑morning runs with the Takoma Park Community Runners, attends weekly Vinyasa yoga at a nearby studio, and follows the Washington Capitals with fervor, balancing low‑impact
    cardio with occasional pick‑up basketball games at the local park.
  arts: Rhea Joseph spends weekends sketching watercolor cityscapes at the Renwick Gallery, writes spoken‑word poetry inspired by the rhythms of John Coltrane and the visuals of Kehinde Wiley, curates a
    personal blog reviewing exhibitions by contemporary creators, and captures neighborhood festivals through street photography, weaving these artistic pursuits into their daily rhythm.
  travel: Rhea Joseph favors meticulously planned cultural trips, having explored the jazz heritage of New Orleans, savored Caribbean flavors on a weekend in Kingston, Jamaica, toured the historic streets
    of Savannah, and now dreams of tracing ancestral roots in Accra, Ghana, while a loyalty credit card fuels future art‑focused retreats in Oaxaca, Mexico.
  culinary: Rhea Joseph loves cooking Southern‑style collard greens seasoned with smoked turkey, whipping up Caribbean‑inspired jerk chicken with Scotch bonnet peppers, and perfecting sweet potato pie with
    nutmeg, often experimenting with fresh basil and local herbs from their balcony garden while alternating between quick weeknight meals and elaborate weekend feasts.
  core: Rhea Joseph blends a meticulous data‑driven mindset with a boundless love for rhythm‑filled poetry, often toggling between spreadsheets and sketchpads over a double espresso, while habitually overbooking
    their calendar and relying on mindfulness breaks to stay grounded.
background:
  cultural: 'Rhea was raised in a middle‑class African‑American family in the Washington, D.C. metropolitan area. Her parents valued education, civic engagement, and cultural expression, which instilled
    in her a strong sense of identity and community responsibility. She grew up attending church choirs, Juneteenth celebrations, and local cultural festivals, experiences that deepened her appreciation
    for Black music, storytelling, and visual arts. Her undergraduate studies in humanities, with a focus on African‑American literature and cultural studies, further informed her worldview. Living in Takoma
    Park—a diverse, progressive suburb—has exposed her to a mosaic of cultures and progressive social movements, reinforcing her commitment to inclusivity and social justice. Rhea’s cultural background
    influences her everyday life: from the food she prepares (incorporating Southern and Caribbean flavors) to the community volunteer work she undertakes, and her dedication to preserving and elevating
    Black artistic heritage.'
attributes:
  skills: '["Data Entry", "Data Validation", "Microsoft Excel", "Google Sheets", "Typing (80 WPM)", "Attention to Detail", "Document Management", "Office Administration", "Time Management", "Project Coordination",
    "Research and Content Curation", "Basic Graphic Design", "Art Curation", "Community Outreach", "Customer Service", "Digital Archiving"]'
  hobbies: '["Visiting art galleries", "Sketching and watercolor painting", "Reading African American literature", "Poetry writing", "Photography", "Attending live jazz performances", "Community volunteering
    at local art center", "Urban gardening", "Cooking traditional Caribbean dishes", "Puzzle solving (crosswords, Sudoku)", "Mindfulness meditation"]'
  career_goals: Looking ahead, Rhea plans to leverage her meticulous data‑handling background to move into a data‑analysis or data‑management role within a cultural or nonprofit organization. She is currently
    enrolled in the Google Data Analytics Professional Certificate and intends to gain proficiency in data visualization tools such as Tableau and Power BI. Her long‑term aim is to become a data governance
    lead who designs and maintains reliable information systems for museums, galleries, or community arts programs. Additionally, she hopes to obtain a certificate in Museum Studies or Archival Science,
    allowing her to merge her expertise in data with her passion for preserving and presenting African‑American art. Rhea also aspires to mentor junior staff, champion inclusive data practices, and eventually
    oversee a small team that ensures the integrity of digital collections while supporting community outreach initiatives.
