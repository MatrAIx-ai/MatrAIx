  career_goals: As he approaches retirement, Devin aims to transition into a mentorship role by obtaining a library technology certification and becoming a go‑to resource for staff and patrons. He hopes
    to lead larger community outreach programs, such as the town's literacy initiative and local history archives, and eventually move into a supervisory position that allows him to shape library services
    while preserving his flexible, people‑centered approach. He also envisions volunteering as a consultant for neighboring rural libraries to share best practices.
