personas:
  professional: Devin Gregory, a veteran library support specialist with three decades of cataloguing, circulation, and data‑management experience, leverages their methodical workflow and personable approach
    to mentor staff, lead community reading initiatives, and troubleshoot tech issues while maintaining the flexibility to adapt to unexpected patron needs.
  sports: Devin Gregory, a dedicated member of the town’s senior basketball league, cheers on the North Dakota State Bison football team, follows the Fargo‑Moorhead RedHawks baseball club, and spends weekend
    mornings fishing at Lake Sakakawea, balancing a competitive spirit on the court with a love for outdoor recreation that keeps them active and socially engaged.
  arts: Devin Gregory, a choir singer at their local Lutheran church, devotes evenings to listening to folk legends like John Prine and classic country star Patsy Cline, appreciates Ansel Adams’ prairie
    photographs, and regularly attends community theater productions of "Our Town" and "Little Women", weaving artistic appreciation into their social calendar.
  travel: Devin Gregory, an avid road‑tripper who has explored the Badlands National Park, Glacier National Park, and attended a genealogy conference in Omaha, dreams of traveling to the Norwegian fjords
    and Bavarian villages to trace ancestral roots, and prefers modest, budget‑friendly itineraries that include stays at family‑run B&Bs, allowing them to satisfy both curiosity and community‑focused values.
  culinary: Devin Gregory, a garden‑to‑table enthusiast who often prepares hearty vegetable soup with carrots, potatoes, and corn from their own plot, enjoys classic dishes like German potato salad, buttered
    rye bread, and smoked trout, and takes pride in contributing casseroles to community potlucks while occasionally indulging in a slice of apple‑cinnamon pie, reflecting their blend of practical cooking
    and occasional indulgence.
  core: Devin Gregory, a community‑focused senior who blends structured library expertise with a flexible love for group activities, gardening, woodworking, and modest competitive streaks, lives by predictable
    rhythms yet embraces occasional spontaneity, and values self‑reliance while staying open to collaboration, which they demonstrate daily.
background:
  cultural: Devin is a white Midwesterner raised in a small‑town, Lutheran environment typical of North Dakota. His ancestry is primarily German‑Norwegian, and his upbringing emphasized community service,
    modesty, and practical self‑reliance. He values the predictable rhythms of rural life—seasonal cycles, community gatherings, and neighborly support—while also enjoying the social vibrancy of town events.
    These cultural influences shape his worldview, work ethic, and preference for balanced structure with flexibility.
