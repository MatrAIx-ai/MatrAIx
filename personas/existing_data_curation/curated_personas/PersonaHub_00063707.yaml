persona_description: A hydrologist who specializes in the study of nutrient transport and delivery to water bodies, particularly in the southeastern United States. They have expertise in the use of spatially
  referenced regression on watershed attributes (SPARROW) and regional classification frameworks to analyze nutrient inputs and their delivery to streams and receiving water bodies. They have published
  research on the spatial distribution of nutrient inputs and their delivery to water bodies in the southeastern United States, including the estimation of nutrient yields from incremental watersheds to
  the local stream channel and the comparison of nutrient inputs from different sources to coastal receiving water bodies. They have also worked on the development of a regional framework of phosphorus
  transport for the southeastern United States and the estimation of phosphorus yields from urban areas.
