  career_goals: Before fully retiring, John aims to position his store among the top three in the district by driving record sales growth and pioneering an art‑themed visual merchandising program that links
    local culture to the shopping experience. He plans to mentor a cohort of junior supervisors, establishing a formal succession pipeline for the chain. Simultaneously, he will launch a part‑time consulting
    practice focused on retail staff development and boutique visual merchandising. Over the next two years, he hopes to travel to major art museums in Europe and South America, and eventually open a modest
    gallery‑café that showcases emerging artists, blending his business acumen with his love of art.
