personas:
  professional: John Avery is a seasoned retail executive with over three decades of frontline leadership, leveraging data‑driven analytics, bilingual communication, and an art‑infused visual merchandising
    philosophy to drive sales performance, while mentoring emerging supervisors, designing sustainability initiatives, preparing a part‑time consulting practice that blends boutique store design with emerging
    artists, and aiming to rank their store among the top three in the district, all the while maintaining a healthy skepticism toward supplier promises.
  sports: John Avery follows the Miami Heat and Miami Dolphins with quiet devotion, plays weekly tennis at the Miami Beach Senior Tennis Club where their competitive streak emerges, and joins a dawn walking
    group that explores the coastal trail, preferring low‑impact exercise that aligns with their age and joint concerns.
  arts: John Avery immerses themselves in Miami’s vibrant art scene by frequenting the Pérez Art Museum, Wynwood Walls, and intimate galleries, painting delicate watercolors of coastal vistas inspired by
    Winslow Homer and Henri Matisse, collecting vintage travel posters, reading classics like 'The Story of Art,' and volunteering to teach drawing to middle‑school students, finding solace at the intersection
    of creation and mentorship.
  travel: John Avery travels with a measured, solitary approach, meticulously planning itineraries that blend art, history, and cuisine, exploring historic towns such as St. Augustine and Key West on weekend
    road trips, and aspiring to visit European institutions like the Louvre and Uffizi and South American gems like the Museo de Arte de São Paulo, often staying in boutique hotels that showcase local art
    and using travel‑reward points to offset costs.
  culinary: John Avery experiments in the kitchen with a fusion of Cuban and Haitian flavors, regularly preparing dishes such as ropa vieja, tostones, griot, and pikliz, enriched by fresh oranges and herbs
    harvested from their backyard garden, favoring a well‑seasoned cast‑iron skillet and pairing meals with aged rum, though they occasionally over‑salt sauces, prompting a corrective dash of citrus.
  core: John Avery blends a meticulous retail career with a passionate, solitary pursuit of art, travel, and culinary experimentation, balancing disciplined financial habits with occasional splurges on
    vintage posters, and navigating health challenges with a resilient yet sometimes neglectful approach.
background:
  cultural: John is a white, second‑generation American who grew up in the Midwest before relocating to Miami in his early forties for career advancement. His upbringing was rooted in traditional Anglo‑American
    customs, but living in Miami’s multicultural environment has fostered an appreciation for Hispanic culture, especially its language, food, and vibrant public art. He comfortably navigates bilingual
    settings, respects the city’s diverse traditions, and integrates these influences into his personal and professional life, all while maintaining a grounded, pragmatic American outlook.
