  career_goals: Lincoln aspires to a career where he can continue to serve others, such as becoming a school counselor, social worker, or community health worker. He sees himself leading youth mentorship
    programs in Grand Rapids, helping younger students navigate academic and emotional challenges. In the longer term, he hopes to earn a degree in psychology or social work, so he can design inclusive
    community initiatives and advocate for mental‑health resources for teens.
