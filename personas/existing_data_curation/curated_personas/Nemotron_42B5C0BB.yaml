personas:
  professional: Lincoln Labad, a budding junior coder who blends a love of graphic storytelling with Scratch programming, uses their practical, structure‑loving mindset to carefully outline project steps
    while their relaxed, flexible approach allows them to improvise creative solutions during school hackathons, and they thrive on collaborating with peers in a compassionate, teamwork‑focused environment.
  sports: Lincoln Labad, an enthusiastic pickup basketball player at the neighborhood park and member of the Brookside Youth Basketball Club, follows the Chicago Bulls avidly, mimics their teamwork on the
    court, balances seasonal fitness with weekend runs, and they enjoy cheering on the Chicago Bears during football season.
  arts: Lincoln Labad, an avid reader of graphic novels like Neil Gaiman’s The Sandman and Mike Mignola’s Hellboy, frequently sketches sci‑fi scenes inspired by Junji Ito, attends local comic‑book club
    meetups, and they unwind listening to the lo‑fi beats playlists featuring artists such as Daft Punk and the soundtracks from Guardians of the Galaxy.
  travel: Lincoln Labad, who prefers spontaneous weekend trips over rigid itineraries, has explored Washington, D.C.’s Smithsonian museums and spent a summer at Disney World in Orlando, dreams of visiting
    Tokyo to experience anime culture firsthand, and they often rely on family car rides to nearby nature parks for low‑cost adventures.
  culinary: Lincoln Labad, an enthusiastic home‑chef with intermediate cooking skills, loves recreating family recipes like fried chicken, collard greens seasoned with smoked paprika, and sweet potato pie,
    experiments with spice blends such as cayenne and thyme, and they enjoy sharing the meals with friends at informal dinner parties.
  core: Lincoln Labad is a compassionate, slightly anxious 13‑year‑old who balances crafting graphic‑novel art and coding with basketball, often forgets to finish homework but never misses a library Storytime
    session, and they habitually nibble on snack‑sized cornflakes during coding breaks.
background:
  cultural: Lincoln was born and raised in a Black family in Grand Rapids, Michigan. His parents and extended relatives emphasize community ties, mutual support, and respect for cultural traditions. He
    attends a local Baptist church where music, fellowship, and service are central, and he participates in the church’s youth outreach events. Family gatherings often feature Southern‑influenced soul food,
    storytelling, and the celebration of holidays such as Juneteenth, which reinforce his sense of identity. Growing up in Kent County, Lincoln is also exposed to the city’s vibrant arts scene and Midwestern
    values of hard work and cooperation, which shape his outlook and ambitions.
