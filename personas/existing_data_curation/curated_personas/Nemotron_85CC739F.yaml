personas:
  professional: Christina Swain, a veteran bedside nurse with 15+ years of experience, they blend meticulous patient assessment, evidence‑based wound‑care expertise, and a collaborative mindset to streamline
    unit workflows, mentor junior staff, and spearhead quality‑improvement projects aimed at reducing medication errors while pursuing a BSN and CWCN certification.
  sports: Christina Swain embraces outdoor fitness, they hike the Green Mountains on weekends, belong to the Burlington Trail Runners club, follow the New England Patriots and the Boston Red Sox, and they
    occasionally join a local women’s recreational tennis league during summer.
  arts: Christina Swain channels creativity through knitting and photography, they stitch handmade scarves for charity while capturing Vermont’s autumn foliage inspired by Ansel Adams, regularly attend
    performances by the Burlington Symphony, and they unwind with historical fiction novels by Hilary Mantel and Ken Follett.
  travel: Christina Swain prefers purposeful, low‑key trips that balance adventure with family time, they have explored Acadia National Park, the White Mountains, and Montreal on weekend road trips, and
    they dream of a spring pilgrimage to Ireland’s historic castles while budgeting each journey through a detailed travel spreadsheet.
  culinary: Christina Swain delights in farm‑to‑table cooking, they grow heirloom tomatoes, kale, and beans, then craft dishes like roasted beet and goat‑cheese salad, apple‑cinnamon crisp, and herb‑infused
    quinoa bowls, while occasionally improvising with leftover root vegetables when a busy shift runs late.
  core: Christina Swain blends clinical rigor with a love for sustainable living, balancing the demands of nursing leadership with weekend hikes, garden‑to‑table meals, and community‑focused creativity,
    even as they sometimes forget to drink enough water during long shifts.
background:
  cultural: Christina grew up in a multigenerational family in rural Vermont, part of the broader New England cultural tapestry. Her ancestry traces back to English and Irish settlers who valued self-reliance,
    community cooperation, and a close relationship with the land. The regional emphasis on seasonal cycles, local agriculture, and modest, practical living shaped her worldview. While raised in a Protestant
    tradition, she now identifies as spiritually eclectic, drawing on the region’s appreciation for personal responsibility and communal support. Her cultural upbringing reinforces her balanced approach
    to curiosity and practicality, fostering a deep respect for both tradition and thoughtful innovation.
attributes:
  skills: '[''Patient Assessment'', ''IV Therapy'', ''Wound Care'', ''Medication Administration'', ''Electronic Medical Record (EMR) Documentation'', ''Care Planning'', ''Health Education'', ''Interdisciplinary
