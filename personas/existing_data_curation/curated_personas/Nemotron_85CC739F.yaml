  hobbies: '[''Hiking'', ''Trail Maintenance Volunteering'', ''Gardening'', ''Farm-to-Table Cooking'', ''Historical Fiction Reading'', ''Knitting'', ''Nature Photography'', ''Community Health Fair Volunteering'']'
  career_goals: Christina plans to complete a Bachelor of Science in Nursing within the next two years, positioning herself for a charge-nurse role on her unit. She aspires to lead quality-improvement projects
    that reduce medication errors and enhance patient satisfaction, and she is pursuing certification as a Certified Wound Care Nurse (CWCN). Long-term, she envisions transitioning into a nurse educator
    position at a community college or hospital, where she can blend her love of learning with mentorship. Throughout her advancement, she remains committed to preserving a sustainable work-life balance
    that supports her marriage and family life.
