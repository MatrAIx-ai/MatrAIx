    User 2: Me too! It''s a lot of fun.

    User 1: What do you like to do in your free time?

    User 2: I like to volunteer, tell jokes, and spend time with friends and family.

    User 1: That sounds like a lot of fun. I like to draw comic books, and I like to go to concerts.

    User 2: That''s cool! I love music. I used to play in a band.

    User 1: Oh, that''s awesome! What kind of music did you play?

    User 2: We played punk rock.

    User 1: That''s cool! I love punk rock.

    User 2: Me too! Do you go to a lot of concerts?

    User 1: Yeah, I try to go to as many as I can.

    User 2: That''s great! I love live music.

    User 1: Me too! It''s the best.

    User 2: Yeah, it is!

    User 1: So, what do you think of the new Black Keys album?

    User 2: I love it! It''s so good.

    User 1: Me too! I''ve been listening to it non-stop.

    User 2: Yeah, me too! It''s so good.

    User 1: I''m so glad we agree!

    User 2: Me too!'
