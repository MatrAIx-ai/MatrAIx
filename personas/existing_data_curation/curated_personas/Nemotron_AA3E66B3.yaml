  hobbies: '[''Sketching in public spaces'', ''Visiting local galleries and murals'', ''Listening to indie/experimental music'', ''Writing poetry and journal entries'', ''Playing acoustic guitar'', ''Designing
    interactive digital sketches'', ''Playing indie video games'', ''Attending open‑mic nights'', ''Practicing short mindfulness meditations'']'
  career_goals: David dreams of turning his artistic curiosity into a flexible career that lets him blend visual storytelling with technology. He hopes to become a freelance illustrator or a concept artist
    for video games, eventually expanding into art‑therapy projects that help other teens process strong emotions. While he values formal education, he prefers learning through real‑world projects, workshops,
    and mentorships rather than a traditional college path, aiming to build a portfolio that showcases his unconventional style.
