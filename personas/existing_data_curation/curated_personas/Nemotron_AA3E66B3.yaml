personas:
  professional: An aspiring UI/UX designer, David Dawson translates his love for murals and indie music into hand‑drawn wireframes that later become interactive sketches on his tablet, leveraging their
    natural curiosity and relaxed attitude toward deadlines to experiment with unconventional layouts, even if they sometimes leave projects half‑finished.
  sports: A casual yet dedicated teen athlete, David Dawson follows the Boston Red Sox in spring and the New England Patriots in fall, spends Saturday mornings skateboarding along the Fall River waterfront
    with the local skate club, and joins the high school’s after‑school intramural basketball league to stay active, though they often skip structured workouts in favor of wandering the city’s murals for
    inspiration.
  arts: An avid connoisseur of the avant‑garde, David Dawson reveres the lo‑fi melodies of Tame Impala and the experimental soundscapes of Oneohtrix Point Never while sketching tributes to street‑artist
    Banksy in local cafés, they also write poetry inspired by Rupi Kaur and Ocean Vuong, and they regularly step onto the stage at Fall River’s open‑mic nights to share improvised guitar verses.
  travel: A wander‑lusted teen with a penchant for off‑the‑beaten‑path art scenes, David Dawson splurges on a weekend train ticket to Boston’s underground galleries, they dream of strolling Berlin’s East
    Side murals, and they often curl up at the nearby Cape Cod Seaside Library for travel guides, preferring spontaneous, budget‑friendly trips over meticulously planned vacations.
  culinary: A culinary explorer with a taste for eclectic comfort foods, David Dawson favors artisanal avocado toast with smoked salmon, slurps spicy ramen bowls packed with miso and soft‑boiled eggs, and
    whips up late‑night bruschetta using fresh basil and cherry tomatoes, but they often forget to clean the kitchen after midnight snack sessions.
  core: David Dawson is a 15‑year‑old art‑obsessed dreamer who balances spontaneous creativity with bouts of anxiety, thriving on street murals, indie tunes, and impulsive coffee‑shop sketching while occasionally
    letting disorganization derail their plans, and they often find solace in music.
background:
  cultural: David grew up in a white, working‑class family in Fall River, Massachusetts, a town shaped by its maritime heritage and a mix of Irish, Italian, and Portuguese immigrant histories. The community’s
    close‑knit neighborhoods and modest cultural institutions, like the Fall River Historical Society and local art collectives, have given him exposure to diverse artistic expressions. His family’s modest
    New England values emphasize individuality and resilience, while the town’s multicultural vibe subtly informs his appreciation for varied perspectives and unconventional ideas.
