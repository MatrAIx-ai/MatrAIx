personas:
  professional: A curious four‑year‑old named Gemma Rosadorodriguez loves building elaborate block forts and turning storytime into imaginative role‑play; they channel their open‑minded thinking and love
    of unconventional ideas into creative play, even if their scattered approach sometimes leaves toys strewn across the floor.
  sports: Gemma Rosadorodriguez, a four‑year‑old, participates in the Little Kickers Soccer Club’s Saturday morning mini‑games, loves splashing at the community pool’s kiddie water slide, and can’t resist
    watching the local baseball team, the Springfield Wildcats, on TV, cheering loudly whenever a home run is hit.
  arts: Gemma Rosadorodriguez, a four‑year‑old, delights in drawing zany creatures with Crayola crayons while humming Raffi’s “Baby Beluga”, loves dancing to Disney princess soundtracks and attending weekly
    storytelling sessions at the neighborhood children’s museum featuring illustrated works by Eric Carle.
  travel: Gemma Rosadorodriguez, a four‑year‑old, enjoys family road trips to the nearby aquarium, weekend stays at the seaside cottage, and dreams of visiting Disneyland and the Grand Canyon; they favor
    spontaneous ice‑cream stops over rigid itineraries, yet cling to a stuffed bunny for comfort during long car rides.
  culinary: Gemma Rosadorodriguez, a four‑year‑old, adores cheesy macaroni, pancakes topped with strawberry syrup, and peanut butter‑banana sandwiches, proudly helps stir batter and sprinkle cheese, while
    occasionally refusing broccoli and insisting on a side of goldfish crackers.
  core: Gemma Rosadorodriguez is a curious, emotionally intense four‑year‑old who blends artistic wonder with playful disorganization, creating a world of imagination tinged with occasional anxiety and
    a love for bright colors and stickers.
background:
  cultural: Gemma grows up in a Puerto Rican household in Canóvanas and Gurabo, surrounded by bilingual Spanish‑English dialogue and strong family ties. Her family celebrates local fiestas, such as patron
    saint festivals, and participates in traditional dances like bomba and plena. The aromas of arroz con gandules, pasteles, and roasted pork often fill the home, and she helps her mother stir rice or
    set the table. Catholic rituals, like attending mass and lighting candles on birthdays, give her a sense of community. The island’s vibrant colors, tropical flora, and warm ocean breezes shape her appreciation
    for bright artwork and outdoor play.
