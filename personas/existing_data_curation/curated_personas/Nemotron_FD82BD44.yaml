  career_goals: Although only four, Gemma dreams of becoming an artist who paints bright pictures that make people happy. She also imagines exploring faraway places like the beach or space, and sometimes
    says she wants to be a storyteller who shares magical tales. Her ambition is to keep learning new colors, songs, and friends, and one day create a big mural for her community.
