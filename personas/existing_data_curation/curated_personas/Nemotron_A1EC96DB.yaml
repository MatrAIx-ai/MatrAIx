  career_goals: Mark aims to progress from his current role as a junior financial manager to a senior finance leadership position within the next five years, ultimately targeting the Chief Financial Officer
    role at a regional mid-size company. To solidify his expertise, he plans to obtain CPA certification and begin the CFA program, blending practical credentials with his curiosity for investment analysis.
    He is driven to lead a finance transformation that incorporates AI-enabled analytics and automation into budgeting and reporting processes, delivering measurable cost savings and operational efficiency.
    Mark also aspires to mentor younger analysts, fostering a collaborative yet high-performing team culture. Outside corporate goals, he hopes to launch a boutique consulting practice focused on financial
    optimization for small businesses in Iowa, leveraging his competitive drive to build a reputable brand while contributing to local economic development.
