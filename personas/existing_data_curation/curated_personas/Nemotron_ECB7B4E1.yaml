personas:
  professional: An HR data analyst who blends a STEM background with people skills, Tulia Rojasmartinez uses Python and Excel to build predictive recruitment dashboards, thrives in fast‑paced environments
    by juggling multiple hiring pipelines, but often battles disorganized to‑do lists because their spontaneous nature resists rigid structures.
  sports: As a kinetic enthusiast, Tulia Rojasmartinez spends weekends playing beach volleyball with friends at Isla Verde, dances salsa at local clubs where the rhythm of the conga drums drives their cardio,
    and hikes the misty trails of the island’s rainforest, cheering on the San Juan FC soccer team during matches.
  arts: In creative pursuits, Tulia Rojasmartinez captures island landscapes through photography, frequents live performances by artists like Bad Bunny and traditional plena groups, and experiments with
    digital art during downtime, often sharing their work on Instagram while humming salsa tunes.
  travel: Travel‑wise, Tulia Rojasmartinez enjoys spontaneous weekend getaways to neighboring coastal towns such as Rincón, plans trips around cultural festivals like the annual patron saint celebrations,
    and dreams of backpacking through the historic streets of Barcelona, all while balancing a modest travel budget.
  culinary: Culinary‑wise, Tulia Rojasmartinez loves the fragrant blend of sofrito in dishes like arroz con gandules, delights in cooking quick shrimp ceviche with lime and cilantro, but admits to over‑indulging
    in sweet pastelitos after long days, and their cooking skill hovers at confident home‑cook level.
  core: Tulia Rojasmartinez is a sociable, data‑driven HR professional who balances curiosity with impromptu spontaneity, often juggling analytics and salsa nights while occasionally forgetting to file
    taxes on time.
background:
  cultural: Tulia is a proud Puerto Rican who grew up in the close‑knit neighborhoods of Toa Alta and Toa Baja. Bilingual in Spanish and English, she embodies the island’s blend of Caribbean warmth and
    resilience. Family gatherings, music, and food are central to her identity, and she takes part in annual celebrations such as San Sebastián and the vibrant local patron saint festivals. Her upbringing
    instilled a strong sense of community responsibility, influencing both her career choice in human resources and her commitment to give back through mentorship and volunteer work.
attributes:
  skills: '[''Recruitment and talent acquisition'', ''Employee onboarding and orientation'', ''HRIS management (e.g., BambooHR, Workday)'', ''Data analysis with Excel and Python'', ''Statistical reporting'',
