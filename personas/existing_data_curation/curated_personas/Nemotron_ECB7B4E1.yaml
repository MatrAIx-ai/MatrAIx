  hobbies: '[''Salsa dancing'', ''Beach volleyball'', ''Hiking in El Yunque'', ''Community volunteering'', ''Exploring local festivals'', ''Photography'', ''Coding side projects'', ''Traveling across Caribbean
    islands'']'
  career_goals: Tulia aims to become a certified HR professional (SHRM‑CP) within the next two years and eventually transition into an HR Business Partner role where she can shape strategic workforce planning.
    She is passionate about integrating analytics into people‑management, so she plans to pursue a master's degree in Human Resource Management with a focus on HR analytics. Long‑term, she envisions leading
    employee‑engagement initiatives that leverage technology to improve retention, while also mentoring new talent from her community in Toa Alta and Toa Baja.
