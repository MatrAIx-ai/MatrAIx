  career_goals: Looking ahead, Jason aspires to merge his love for art and technology. He dreams of becoming a multimedia storyteller - perhaps an animator, video game designer, or science communicator
    - who can translate abstract concepts into engaging visual narratives. He hopes to study graphic design and computer science in high school and beyond, with the long-term ambition of creating educational
    games that inspire other curious kids. Jason also envisions playing a role in community events, using his communication skills to lead workshops that blend creativity with learning.
