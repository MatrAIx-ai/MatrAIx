personas:
  professional: An aspiring young digital illustrator and storyteller, Jason Lizarazo blends their love of fantasy novels, Minecraft world‑building, and school drama club into creative projects that showcase
    vivid character sketches and narrative flair, while their organized yet flexible approach keeps deadlines for school assignments and robotics competitions on track.
  sports: A spirited youth athlete, Jason Lizarazo kicks off after‑school soccer matches with the Maine United Youth Soccer Club, follows the Boston Bruins (NHL) on the ice during winter, cheers the Boston
    Red Sox (MLB) in summer, and spends weekends hiking the Appalachian Trail foothills, balancing energetic team play with calm nature walks, while their love of group exercise reflects their sociable
    nature and occasional tendency to over‑commit to both robotics practice and sports practice.
  arts: An enthusiastic creative explorer, Jason Lizarazo immerses themselves in drawing whimsical characters inspired by Studio Ghibli, composing short stories echoing J.K. Rowling's magical worlds, performing
    in school drama productions of A Midsummer Night’s Dream, and listening to the musical storytelling of Taylor Swift and Billie Eilish, while they experiment with digital illustration on a tablet using
    apps like Procreate, weaving together their love of fantasy literature, theater, and visual art into a vibrant personal style.
  travel: A curious junior traveler, Jason Lizarazo spends summers camping along the shores of Acadia National Park, enjoys weekend trips to Boston’s Museum of Fine Arts, dreams of visiting Tokyo’s Akihabara
    district to see anime culture firsthand, and hopes to explore the historic castles of Ireland on a future family vacation, preferring a blend of structured family itineraries and spontaneous treasure‑hunt
    style hikes that satisfy their imaginative curiosity while staying within the budget of their parents’ vacation fund.
  culinary: A budding food enthusiast, Jason Lizarazo loves whipping up fluffy blueberry pancakes drizzled with pure maple syrup for breakfast, crafting creamy New England clam chowder with fresh clams
    and potatoes for lunch, and experimenting with pepperoni pizza topped with olives and a sprinkle of oregano at home, while they occasionally attempt baking chocolate chip cookies using a kid‑friendly
    recipe from the local library, showcasing a growing confidence in the kitchen balanced with a tendency to over‑season when excited.
  core: Jason Lizarazo, an 11‑year‑old imagination‑fuelled storyteller and digital sketcher, balances school responsibilities, soccer, and a love of fantasy with a habit of over‑committing to clubs while
    occasionally forgetting to take their allergy meds.
background:
  cultural: Jason was raised in Waterville, Maine, a small New England town known for its close-knit community and natural surroundings. His family's cultural heritage reflects a blend of typical American
    traditions and the region's historical European influences, such as Irish and English customs, which are celebrated through holiday gatherings, local festivals, and community service. Growing up near
    forests and lakes, he developed an appreciation for outdoor activities like hiking and fishing, which complement his indoor creative pursuits. The supportive school environment and the town's emphasis
    on communal involvement have fostered his cooperative nature and his desire to share his ideas with others.
