personas:
  professional: Iris Mendez, a seasoned head bartender with three decades of mixology expertise, channels their bilingual fluency and meticulous cocktail craftsmanship into running a high‑volume bar routine
    while mentoring staff with a firm yet compassionate hand, balancing a love for familiar island‑inspired drinks with a pragmatic focus on cost control and safety.
  sports: Iris Mendez, an avid walker who enjoys early morning strolls along Lake Eola and occasional beach walks at Cocoa Beach, they cheer for the Orlando Magic and the Orlando City SC, attend occasional
    community softball games at the local park, and belong to a casual senior walking club that meets twice a week, balancing low‑impact activity with a love for seasonal sports viewership.
  arts: Iris Mendez, a devoted fan of salsa, plena, and bolero, they attend a monthly salsa night at a neighborhood lounge, keep a collection of romance novels by Nora Roberts and historical biographies
    by David McCullough, and spend evenings crocheting blankets while listening to classic recordings by Celia Cruz and Marc Anthony, letting music and literature shape their leisurely evenings.
  travel: Iris Mendez, a nostalgic traveler who prefers short road trips to familiar Floridian spots like the Florida Keys and Savannah, they meticulously plan visits to family for Nochebuena celebrations
    but remain flexible with itineraries, dream of a future pilgrimage to the island for the Three Kings Day festival, and balance a modest travel budget with occasional cruise excursions that offer a relaxed
    pace.
  culinary: Iris Mendez, a home chef specializing in arroz con gandules, pernil, and pastelitos, they cultivate an herb garden of cilantro, oregano, and thyme that flavors their dishes, meticulously follow
    traditional sofrito recipes while sprinkling in personal twists like a hint of smoked paprika, and enjoy pairing their meals with a favorite cocktail—Piña Colada with a splash of dark rum—while occasionally
    indulging in late‑night empanadas made from leftover dough.
  core: Iris Mendez, a routine‑driven mixology veteran who blends island flavors with Florida practicality, they wrestle with worry yet find comfort in community rituals, mentorship, and the steady rhythm
    of their bar and garden.
background:
  cultural: Iris is a first‑generation Puerto Rican American who grew up in a bilingual household, speaking Spanish at home and English in school. Her family maintains strong ties to Puerto Rican traditions,
    celebrating holidays such as Nochebuena, Three Kings Day, and the Festival de San Juan with music, food, and communal gatherings. Catholic faith plays a role in her life, guiding family rituals and
    community involvement. She participates in Orlando's vibrant Puerto Rican diaspora, attending cultural events, supporting local Latin markets, and sharing the island's culinary and musical heritage
    with friends and customers. Her identity blends Caribbean warmth with Floridian practicality, influencing both her personal life and professional style.
attributes:
  skills: '[''mixology'', ''bilingual customer service (English/Spanish)'', ''cash handling'', ''inventory management'', ''conflict resolution'', ''staff training'', ''menu planning (including Puerto Rican
    cocktails)'', ''event coordination'', ''basic accounting'', ''food safety compliance'', ''personalized drink creation'', ''knowledge of spirits and wines'']'
  hobbies: '[''cooking traditional Puerto Rican cuisine'', ''herb gardening and rose care'', ''listening to salsa and bolero music'', ''reading romance novels and historical biographies'', ''crocheting'',
    ''volunteering at church food pantry'', ''attending Puerto Rican cultural festivals'', ''short beach walks'']'
  career_goals: Iris aims to solidify her role as head bartender at her current venue, ensuring a stable routine and consistent income as she approaches retirement. She hopes to mentor younger bartenders,
    passing on her practical knowledge and cultural flair. In the next few years, she dreams of opening a modest family‑run café‑bar that showcases Puerto Rican cuisine and cocktails, offering a familiar
    gathering spot for the local community. She also plans to teach occasional mixology workshops at a community college or local cultural center, allowing her to stay engaged without overextending her
    schedule. Financial security and a low‑stress environment are central to her ambitions, reflecting her desire for a comfortable, routine‑oriented retirement.
