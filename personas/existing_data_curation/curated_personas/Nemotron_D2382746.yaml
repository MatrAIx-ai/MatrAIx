  career_goals: Juan aims to obtain his GED within the next year, which he sees as a gateway to formalizing his self‑taught skills. He plans to set up a modest home workshop where he can design and build
    custom wooden furniture and simple home‑improvement items for local clients. He also intends to develop an online presence—through a bilingual blog or YouTube channel—where he can share step‑by‑step
    DIY tutorials, thereby generating modest supplemental income while maintaining his preference for solitary work. In the longer term, he hopes to achieve financial independence that allows him to continue
    living a quiet, self‑sufficient lifestyle, with occasional volunteer mentorship at community centers.
