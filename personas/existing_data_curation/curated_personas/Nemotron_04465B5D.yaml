personas:
  professional: Javier Hernandez, an aspiring home‑based caterer and future community liaison, merges hands‑on expertise in automotive maintenance, gardening, and household repairs with meticulous budgeting
    and event‑coordination skills, while their organized, reliable nature and sociable, kind demeanor ensure every menu plan, certification step, and neighborhood program is executed with precision.
  sports: Javier Hernandez bolts onto the midfield of his neighborhood soccer league every Saturday, cheers on the San Juan City Soccer Club while playing pickup games with his children, follows the rhythm
    of local high‑school baseball during summer, and incorporates gardening as an active recovery routine to stay fit.
  arts: Javier Hernandez enjoys the lively beats of cumbia legend Celso Piña and norteño group Los Tigres del Norte, regularly watches classic films from his cultural heritage such as Los Olvidados, and
    volunteers at local art fairs where they often chat with performers about community storytelling and shared traditions.
  travel: Javier Hernandez favors practical weekend road trips, meticulously planning itineraries to maximize family time while keeping costs low, regularly visits the nearby lakeside town of Lakeview for
    fishing and BBQs, dreams of a summer getaway to the vibrant music scene of Austin, Texas, and hopes to one day trek the historic streets of Seville, Spain, to sample its renowned tapas and festivals.
  culinary: Javier Hernandez is a self‑taught culinary enthusiast who thrives in his backyard kitchen, skillfully preparing street‑style tacos with marinated pork (taco al pastor), fresh cilantro, diced
    onions, and a squeeze of lime, crafting smoky elote grilled corn slathered in mayo, chili powder, and queso fresco, while experimenting with salsas that balance smoky chipotle with sweet pineapple,
    and his repertoire also includes hearty pozole, fresh guacamole, and homemade tamales seasoned with cumin, oregano, and ancho chilies.
  core: Javier Hernandez blends methodical organization, a big heart for community, and a flavor‑first approach to life—often juggling a meticulously planned budget while seasoning every family gathering
    with spontaneous salsa experiments, even if that sometimes results in a burnt quesadilla or an overbooked volunteer calendar.
background:
  cultural: Javier was born and raised in the Rio Grande Valley, where Mexican heritage intertwines with Texan influences. He grew up in a bilingual, Catholic household that celebrates Día de los Muertos,
    Semana Santa, and Mexican Independence Day. Family ties and community are central to his identity; he frequently visits relatives across the border and participates in local traditions such as tamale‑making
    gatherings, posadas, and neighborhood fiestas. The daily life of San Juan, TX, with its strong Hispanic culture, shapes his language, food preferences, music tastes, and social networks.
attributes:
  skills: '["Automotive maintenance", "Home repair", "Gardening", "Traditional Mexican cooking", "Budgeting and household financial management", "Event planning and coordination", "Bilingual communication
    (Spanish/English)", "Basic computer literacy (email, social media)", "Volunteer leadership"]'
  hobbies: '["Cooking traditional Mexican dishes", "Playing soccer", "Gardening", "Listening to cumbia and norteño music", "Attending church and community festivals", "Volunteering at community center",
    "Reading self‑help and practical books", "Watching classic Mexican cinema", "Participating in block parties"]'
  career_goals: Although currently not in the workforce, Javier aims to complete his GED and obtain a food‑safety certification so he can launch a small home‑based catering business focused on authentic
    Mexican street foods. He envisions expanding to a weekend taco stand or food truck that serves the San Juan community. In parallel, he hopes to become a community liaison, helping neighbors navigate
    local resources and organizing senior‑center programs. His long‑term ambition is to combine his love for cooking, organization, and community service into a sustainable venture that supports his family
    while strengthening neighborhood ties.
