personas:
  professional: Iris Davis, a 30-year-old cleaning professional, leverages eight years of commercial floor-care expertise, OSHA-compliant safety practices, and a flair for visual storytelling to craft sustainable
    cleaning SOPs that double as vibrant instructional guides, reflecting their imaginative yet organized approach.
  sports: Iris Davis, an avid solo hiker and birdwatcher, trains on the rugged trails of the Bitterroot Valley with the local Trail Club, follows the Montana Grizzlies football and the Seattle Seahawks
    for winter excitement, and incorporates weekend snowshoe sessions into their fitness routine to balance serene outdoor pursuits with occasional high-energy cardio.
  arts: Iris Davis, a dedicated painter of Bitterroot Valley scenes, draws inspiration from Monet's light, O'Keeffe's color fields, and Ansel Adams' mountain photography; they write poetic verses echoing
    Margaret Atwood's speculative narrative style, strum their ukulele to Jack Johnson and Bob Marley, and regularly collaborate with the town's art collective on murals, fostering community through visual
    storytelling.
  travel: Iris Davis plans trips with meticulous itineraries, preferring solo or small-group nature retreats that blend hiking and photography, having explored Glacier National Park, Yellowstone, and a
    week wandering Kyoto's temple gardens, while dreaming of trekking Patagonia's Torres del Paine once their certification budget eases.
  culinary: Iris Davis, an intermediate home cook, favors farm-to-table dishes like roasted beet-goat cheese salad, wild mushroom risotto, and pan-seared trout seasoned with lemon-dill, often harvesting
    herbs from their garden to garnish, while treating themselves to occasional fine-dining outings at Lolo Bakeshop for inspiration.
  core: Iris Davis balances a green-cleaning career with a vivid artistic soul, channeling solitary hikes into brushstrokes, budget-mindful investing into occasional splurges on premium paints, and a tendency
    to over-schedule creative workshops while they neglect floss.
background:
  cultural: Iris was raised in a working‑class family in rural Montana, where self‑reliance, modesty, and a deep appreciation for the outdoors are core values. Her ancestry traces back to Northern European
    settlers who arrived in the early 20th century, and she grew up hearing stories of frontier resilience and community cooperation. After graduating from a local high school, she earned an associate’s
    degree at a community college in Helena, studying environmental health and basic public‑service principles. Living in Anaconda—a town shaped by its mining heritage and ongoing environmental revitalization—has
    instilled in her a respect for the region’s natural beauty and the indigenous Salish‑Kootenai cultures that have long stewarded the land. Iris participates in local clean‑up initiatives, attends county
    fairs, and enjoys small‑town traditions like potlucks and volunteer fire‑department events. Her cultural identity blends the pragmatic, close‑knit ethos of small‑town Montana with a curiosity for artistic
    expression and sustainable living.
attributes:
  skills: '[''Commercial cleaning'', ''Floor care and polishing'', ''Chemical safety compliance (OSHA)'', ''Inventory management'', ''Green cleaning practices'', ''Basic facilities maintenance'', ''Time
    management and scheduling'', ''Staff training and mentoring'', ''Creative problem solving'', ''Graphic design for signage'']'
  hobbies: '[''Painting'', ''Sketching'', ''Photography'', ''Reading speculative fiction and philosophy'', ''Poetry writing'', ''Ukulele playing'', ''Hiking and birdwatching'', ''Gardening'', ''DIY crafts
    (candle‑making, woodworking)'', ''Community mural workshops'']'
  career_goals: Looking ahead, Iris aims to transition from frontline cleaning to a supervisory role in facilities management, focusing on environmentally sustainable operations. She plans to earn the ISSA
    Building Service Operator certification and complete a bachelor’s program in Facility Management or Environmental Health within the next three years. Her ambition is to become a Facilities Manager for
    a local health clinic or community college, where she can embed green cleaning standards, develop staff training curricula, and lead a small team. Parallel to her professional trajectory, Iris hopes
    to launch a weekend art studio that offers mural workshops for community spaces, merging her passion for visual art with civic engagement.
