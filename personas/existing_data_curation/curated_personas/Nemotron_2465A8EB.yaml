personas:
  professional: Luther Brown, a 19‑year‑old aspiring graphic designer, leverages a solid foundation in Photoshop, Illustrator, and self‑taught web design to create visually striking branding concepts for
    local nonprofits while balancing meticulous project timelines with the flexibility to experiment with animation and audio editing.
  sports: Luther Brown hits the neighborhood park every Saturday for pickup basketball, idolizes the Memphis Grizzlies and cheers for the University of Memphis Tigers during the college season, and maintains
    a casual cardio routine by hiking the Ozark Trail on occasional weekend trips.
  arts: Luther Brown channels a love for Memphis‑born jazz legends like Al Green and contemporary hip‑hop artists such as Rapsody into curated playlists that fuel his digital paintings of urban skylines,
    while his evenings are often spent sketching scenes inspired by sci‑fi novels like Neuromancer and watching Studio Ghibli animations for aesthetic cues.
  travel: Luther Brown prefers low‑cost, adventure‑focused trips, having backpacked the Great Smoky Mountains for sunrise sketch sessions, explored the street art of Berlin’s Kreuzberg district, and day‑tripping
    to New Orleans to soak in live jazz and Creole cuisine, while dreaming of a future study‑abroad stint in Tokyo’s design studios.
  culinary: Luther Brown enjoys soul‑food staples such as smoked brisket, collard greens, and sweet potato pie, experiments with homemade BBQ rubs featuring paprika and brown sugar, and occasionally tries
    to replicate sushi rolls after watching cooking tutorials, though he often over‑seasoned his dishes.
  core: Luther Brown is a creatively curious 19‑year‑old who balances meticulous design work with a penchant for jazz‑infused playlists, basketball courts, anxiety‑driven mindfulness, and a habit of overspending
    on art gear.
background:
  cultural: Luther was raised in a close‑knit Black family in Cordova, a suburb of Memphis, where the legacy of blues, soul, and hip‑hop is woven into daily life. His grandparents migrated from the rural
    South during the Great Migration, bringing traditions of gospel music, storytelling, and communal gatherings. He attends a local Baptist church, where choir singing and community service are emphasized.
    The city’s rich civil‑rights history and vibrant street‑art scene shape his identity, inspiring him to celebrate Black culture through visual media. At the same time, he navigates the challenges of
    growing up as a young Black man in the South, fostering resilience and a strong sense of responsibility to uplift his community.
attributes:
  skills: '[''Graphic Design (Adobe Photoshop, Illustrator)'', ''Digital Illustration'', ''Photography'', ''Basic HTML/CSS'', ''Public Speaking'', ''Event Planning'', ''Team Collaboration'', ''Audio Editing'']'
  hobbies: '[''Sketching urban landscapes'', ''Digital painting'', ''Listening to jazz and hip‑hop'', ''Reading science‑fiction'', ''Basketball'', ''Volunteering at community center art program'', ''Mindfulness
    journaling'', ''Hiking'']'
  career_goals: Luther aims to pursue a degree in Graphic Design or Multimedia Arts at a community college, eventually transferring to a four‑year university. He envisions a career as a visual artist and
    branding specialist, creating culturally resonant campaigns for local businesses and non‑profits. Long‑term, he hopes to launch a youth arts mentorship program in Cordova that combines creative workshops
    with mental‑health support, drawing on his own experiences with stress and anxiety. His ambition is to be both a commercial creative professional and a community advocate who uses art to spark dialogue
    and empower underrepresented voices.
