persona_description: A historian who specializes in the study of the history of space exploration, particularly the missions of the Voyager spacecraft. His research interests include, but are not limited
  to, the impact of space exploration on human knowledge and understanding of the universe, the role of space missions in advancing scientific knowledge, and the history of space exploration in the Sol
  system. He is particularly interested in the first manned mission to Jupiter and the discovery of four moons capable of supporting life.
