personas:
  professional: Robbie Cedotal, a compliance officer with a STEM background, applies meticulous risk assessment and data‑driven policy enforcement using SQL and Python, while steering cross‑functional teams
    through HIPAA and GDPR audits; known for double‑checking every checklist and staying up late drafting audit reports, they aim to become a senior compliance manager and embed AI‑driven monitoring across
    the enterprise.
  sports: Robbie Cedotal, an avid runner training for 10 k races, logs weekly mileage with a Garmin watch, joins the Austin Road Runners club for group runs, hikes the Balcones Canyonlands trail with their
    spouse on weekends, and cheers for the Dallas Cowboys while following the Houston Astros' spring training, blending structured exercise with low‑stress outdoor pursuits.
  arts: Robbie Cedotal, an acoustic‑guitar enthusiast, spends quiet evenings strumming songs by John Mayer and the Lumineers, occasionally jams at local board‑game nights, and visits the Houston Museum
    of Fine Arts to admire contemporary photography, while their playlist also includes classical guitarist Andrés Segovia for focused practice.
  travel: Robbie Cedotal, a methodical traveler, plans trips on a spreadsheet, prefers weekend getaways to Texas Hill Country vineyards and national parks like Big Bend, and dreams of a structured two‑week
    itinerary through Italy’s wood‑working studios and historic sites, balancing family time with a desire for cultural immersion.
  culinary: Robbie Cedotal, a home‑cooking enthusiast, loves crafting smoky brisket, preparing quinoa‑black‑bean salads with cilantro and lime, and perfecting a sourdough starter, while their go‑to comfort
    dish is chicken fajitas seasoned with smoked paprika, and they often over‑season the sauce in pursuit of bold flavor.
  core: Robbie Cedotal blends meticulous compliance expertise with a worry‑prone yet balanced lifestyle, channeling anxiety into structured runs, woodworking, and data‑driven audits while nurturing family
    harmony.
background:
  cultural: 'Robbie grew up in a middle‑class, predominantly white suburban community in Plano, Texas. His upbringing reflects mainstream American and Texan values: a strong work ethic, emphasis on family
    and community, participation in local events such as high school football games and neighborhood barbecues, and an appreciation for the region’s outdoors. While he identifies culturally as white American,
    his family’s heritage includes a mix of Anglo‑American traditions and subtle influences from his surname’s Spanish origins, giving him a modest openness to diverse perspectives.'
