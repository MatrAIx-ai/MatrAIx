  career_goals: Robbie aims to progress to a senior compliance manager or chief compliance officer role within a mid‑size or large corporation, where he can shape enterprise‑wide risk strategies and embed
    a proactive compliance culture. He plans to earn professional certifications such as the Certified Compliance & Ethics Professional (CCEP) and to lead initiatives that integrate compliance technology
    (AI‑driven monitoring, automated reporting). Balancing his ambition with family life, he also seeks to mentor emerging compliance professionals and create processes that reduce organizational stress
    and uncertainty.
