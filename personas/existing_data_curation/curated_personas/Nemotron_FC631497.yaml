  hobbies: '["Visiting art galleries and museums", "Painting and sketching", "Attending theatre and live music events", "Hosting dinner parties and cooking", "Gardening (herbs and flowers)", "Yoga and mindfulness
    practice", "Volunteering at community center youth art workshops", "Traveling to historic towns and natural parks", "Listening to podcasts on creativity and philosophy", "Writing a personal blog about
    arts and community"]'
  career_goals: Rose Ann aims to leverage her passion for the arts and community building into a part‑time role in arts administration or cultural outreach. She plans to complete her bachelor's degree in
    arts management, subsequently seeking a position as a community arts coordinator where she can develop programs for youth and underserved populations. In the longer term, she envisions founding a community
    cultural hub in Henrico County that hosts workshops, exhibitions, and lectures. Additionally, she aspires to author a blog and occasional articles on art appreciation and community engagement, and perhaps
    host a local radio segment or podcast.
