personas:
  professional: Rose Lucier, a 38‑year‑old community‑focused arts enthusiast, leverages their communication expertise, event‑planning savvy, and calm assertiveness to curate local exhibitions, lead youth
    workshops, and network across social media while eyeing a part‑time arts administration role that merges creativity with civic impact.
  sports: Rose Lucier fuels weekend fitness with early‑morning yoga, trail runs with the Richmond Road Runners, and occasional kayaking on the James River, cheering on the Richmond Flying Squirrels in baseball
    season and the Virginia Cavaliers during college football, while maintaining a relaxed but consistent exercise routine that balances social interaction with personal well‑being.
  arts: Rose Lucier immerses themselves in Richmond’s arts scene, attending openings featuring works by Kara Walker and local emerging painters, savoring performances at the Virginia Repertory Theatre starring
    Ethan Embry, and regularly listening to folk‑rock ensembles like The Avett Brothers and indie acts such as The National, which together inform their own watercolor practice and community curatorial
    projects.
  travel: Rose Lucier prefers weekend getaways that blend historic charm with nature, meticulously planning short trips to Colonial Williamsburg, the Shenandoah Valley, and Asheville’s Blue Ridge trails,
    while dreaming of a spring art pilgrimage to Paris’s Musée d’Orsay, balancing a modest travel budget with an appetite for cultural immersion and occasional spontaneous detours to local farmers’ markets.
  culinary: Rose Lucier delights in crafting Southern‑inspired feasts, mastering shrimp and grits with smoked paprika, fried green tomatoes tossed in fresh basil, and peach cobbler drizzled with local honey,
    while their herb garden supplies thyme, rosemary, and mint for improvisational sauces, reflecting a confident home‑cook who loves hosting and occasionally over‑seasoning dishes in pursuit of bold flavor.
  core: Rose Lucier is a charismatic, art‑obsessed community builder who balances meticulous event planning with spontaneous watercolor sessions, a penchant for Southern comfort cooking, and a calm resilience
    that rarely lets anxiety cloud their vibrant social life.
background:
  cultural: Rose Ann is a white, Anglo‑American woman who grew up in the Richmond, Virginia area. Her upbringing reflects the blend of Southern hospitality and a strong sense of community that characterizes
    Henrico County. She was raised in a family that valued education, church involvement, and participation in local festivals, which fostered her appreciation for tradition alongside an openness to new
    ideas. The rich historical tapestry of Virginia, combined with the city’s growing contemporary arts scene, has shaped her cultural outlook, making her both a steward of local heritage and an advocate
    for progressive, inclusive cultural experiences.
attributes:
  skills: '["Public speaking", "Event planning", "Facilitation", "Community outreach", "Art appreciation", "Social media management", "Volunteer coordination", "Conflict mediation", "Organizational coordination",
