  hobbies: '[''Sketching and drawing'', ''Digital painting'', ''Playing soccer'', ''Skateboarding'', ''Video gaming (Minecraft, Mario Maker)'', ''Listening to music (Reggaeton, Punta, Latin pop)'', ''Social
    media content creation'', ''Cooking family recipes'', ''Attending cultural festivals'', ''Reading graphic novels'']'
  career_goals: Pablo hopes to turn his love for art and technology into a career as a graphic designer or animator. He dreams of attending an art‑focused high school and eventually a university program
    in visual arts or game design. He wants to create comics or animated videos that incorporate stories from his Honduran heritage and the multicultural life of Jersey City. In the longer term, he sees
    himself leading a creative studio or working as a content creator for a media company, where he can blend cultural storytelling with modern digital media. He also wishes to mentor younger students in
    his community, encouraging them to explore creative fields.
