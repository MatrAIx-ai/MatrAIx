  hobbies: '[''Sailing'', ''Beach walking'', ''Gardening'', ''Youth robotics mentorship'', ''Cooking Southern cuisine'', ''Reading historical fiction'', ''Yoga'', ''Community theater'']'
  career_goals: Jacqueline aims to transition into an engineering management role where she can shape sustainable marine projects for her community, such as designing low‑emission ferries and offshore wind
    support structures. She aspires to earn a master’s degree in Engineering Management to complement her technical background and to lead a multidisciplinary team focused on reliability and environmental
    stewardship. A long‑term ambition is to become a recognized authority on corrosion control in salt‑water environments, publishing papers through ASME and speaking at industry conferences. She also seeks
    to formalize a mentorship program within her company to support the next generation of engineers, while maintaining a balanced schedule to mitigate her stress sensitivity.
