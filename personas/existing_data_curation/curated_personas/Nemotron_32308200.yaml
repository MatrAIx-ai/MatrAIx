  career_goals: Jose aims to earn his GED and enroll in a vocational training program for automotive technology, with the longer‑term goal of opening a modest auto‑repair shop that also offers a side venture
    selling homemade Colombian snacks at local markets. He hopes to use his sociable nature to become a recognized organizer of cultural events for the Colombian diaspora in New Jersey, strengthening community
    connections while achieving greater financial stability for his family.
