personas:
  professional: Jose Macias is a community‑focused handyman‑organizer who blends practical automotive and home‑repair expertise with a knack for coordinating neighborhood events, all while maintaining a
    relaxed, adaptable approach that balances curiosity with pragmatism.
  sports: Jose Macias plays midfield for a local community soccer team, avidly follows the New York Red Bulls in Major League Soccer, and joins weekend pickup basketball games at the municipal park, using
    these seasonal activities to stay fit and socialize.
  arts: Jose Macias revels in dancing to salsa and cumbia at neighborhood fiestas, streams classic Latin pop legends like Celia Cruz and modern reggaetón star Bad Bunny, and attends occasional off‑off‑Broadway
    productions featuring Latin American playwrights.
  travel: Jose Macias prefers spontaneous road trips that blend beach relaxation with cultural festivals, having road‑tripped along the Caribbean coast of Puerto Rico and explored the historic plazas of
    Quito, while dreaming of a future trek through the Andean highlands to savor mountain vistas.
  culinary: Jose Macias is a confident home cook who excels at crafting arepas, hearty sancocho, and crispy empanadas, seasoning with cumin, achiote, and fresh cilantro, and often pairs these dishes with
    guava jam and grilled plantains at lively family gatherings.
  core: Jose Macias blends hands‑on practicality with a love for community rhythm, juggling tools, spices, and soccer balls while occasionally forgetting to file paperwork but never missing a dance beat.
background:
  cultural: Jose grew up in a Colombian‑American household where Spanish was spoken at home and family life revolved around food, music, and Catholic traditions. His parents emigrated from Colombia's Caribbean
    coast, bringing regional customs such as celebrating Carnaval, listening to vallenato and salsa, and preparing dishes like arepas, sancocho, and empanadas. Living in Elizabethport, NJ, he maintains
    strong ties to the local Colombian diaspora, participating in community festivals, church activities, and neighborhood gatherings. While honoring the collectivist values of his heritage—family loyalty,
    respect for elders, and communal support—Jose also integrates American ideals of individual initiative and practical problem‑solving, creating a blended cultural identity that guides his daily life
    and aspirations.
