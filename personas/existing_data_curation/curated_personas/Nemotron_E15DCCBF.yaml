  career_goals: Jeannie aims to build a career as a freelance visual artist and creative consultant, eventually establishing her own boutique studio that blends art, technology, and community events. She
    hopes to become a creative director for a brand that values originality and experimental storytelling, while maintaining the flexibility to pursue personal art projects. In the longer term, she envisions
    curating pop‑culture art exhibitions and launching an online platform that showcases emerging artists and interactive installations.
