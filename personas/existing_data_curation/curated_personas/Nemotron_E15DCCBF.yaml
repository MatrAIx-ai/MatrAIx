personas:
  professional: Jeannie Bird is an imaginative freelance visual artist and creative consultant who leverages rapid, unstructured brainstorming to generate abstract concepts, but often wrestles with meeting
    client deadlines and staying organized, channeling their sociable energy into dynamic workshops and pop‑culture exhibition curation.
  sports: Jeannie Bird roots for the Portland Timbers and Portland Trail Blazers, stays active by playing on the River City Rollers ultimate‑frisbee league, hitting the local Planet Climbing gym three times
    a week, and using music‑festival dancing as their primary cardio, though they sometimes skip scheduled workouts when a new art commission arrives.
  arts: Jeannie Bird immerses themselves in a kaleidoscope of artistic influences, from creating street‑art style sketches inspired by Banksy and virtual installations echoing Beeple's NFTs to vibing to
    Tame Impala and listening to Arcade Fire while channeling improvisational techniques learned from Phoebe Waller‑Bridge’s comedy sketches.
  travel: Jeannie Bird curates a wanderlust‑filled travel notebook that blends spontaneous weekend road trips to Oregon’s Columbia River Gorge, annual pilgrimages to the Burning Man festival in Nevada,
    and planned European art‑tour adventures to Berlin’s street‑art scene and Barcelona’s Gaudí architecture, balancing limited freelance income with a love for immersive cultural experiences.
  culinary: Jeannie Bird’s palate swings between experimental home‑cooking, such as crafting vegan avocado toast topped with smoked paprika and pickled radish, and indulgent dining out on sushi rolls with
    toro and ramen bowls spiced with miso‑black garlic broth, all while they occasionally splurge on artisanal cheese plates featuring brie and aged gouda.
  core: Jeannie Bird is a 24‑year‑old whirlwind of imagination who channels spontaneous creative bursts into freelance art, spends impulsively on experiences, battles a touch of anxiety, and constantly
    juggles deadlines with a competitive edge and a habit of forgetting where they left their sketchbook.
background:
  cultural: Jeannie grew up in Locust Grove, a small community in Spotsylvania County, Virginia, within a white, middle‑class family that valued independence and close‑knit neighborhood ties. While she
    was exposed to Southern Appalachian folk traditions and local community festivals, she also embraced contemporary American pop culture through music, online platforms, and digital art. This blend of
    rural Southern roots and modern, globally connected influences fuels her eclectic creative outlook and her desire to merge tradition with novelty.
