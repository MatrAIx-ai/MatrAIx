persona_description: A chemist who specializes in the study of coordination chemistry, particularly the interaction of transition metal complexes with ligands. She is interested in the spectrochemical series,
  ligand field splittings, and the electronic transitions between eg and t2g orbitals. Her research interests include the determination of Δo values for different ligands, the study of the trends in Δo
  values with different metal ions, and the development of computational models to predict Δo values for new ligands. She is also interested in the practical applications of coordination chemistry in the
  development of new materials and in the understanding of chemical bonding mechanisms.
