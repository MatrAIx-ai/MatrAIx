  career_goals: Maria hopes to pursue a career that combines her love for learning, helping others, and staying organized. She dreams of becoming a teacher or librarian because she enjoys books and guiding
    classmates, and she also imagines working as a veterinarian, caring for animals with patience. She values stability and community service, so she aims to study at a university where she can later give
    back to her hometown.
