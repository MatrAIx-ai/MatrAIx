personas:
  professional: Maria Reyes, an aspiring junior naturalist and storyteller, merges their love for adventure books and detailed nature sketches with a practical, structured approach to school science projects,
    and they consistently aim for clear, organized presentations.
  sports: Maria Reyes, a member of the Cedar Grove Youth Soccer Club and an avid fan of the River City Raptors baseball team, spends their weekends alternating between structured practice drills and cheering
    from the stands, and they favor predictable schedules for training.
  arts: Maria Reyes, who delights in drawing intricate watercolor landscapes of forest scenes, listens to classical piano pieces by Beethoven and Mozart, admires the impressionist works of Claude Monet,
    and they often incorporate motifs from traditional folk songs into their friendship bracelet designs.
  travel: Maria Reyes, who prefers well‑planned family outings, has explored the nearby Pine Ridge State Park on organized hikes, dreams of visiting the historic temples of Kyoto and the vibrant streets
    of Barcelona, and they balance excitement for adventure with a need for familiar routines.
  culinary: Maria Reyes, an enthusiastic home cook, loves preparing fresh bruschetta with garden tomatoes, pepper‑stuffed quesadillas using homegrown bell peppers, and simple spaghetti carbonara, and they
    often experiment with herbs like basil and oregano while occasionally burning the garlic.
  core: Maria Reyes, a detail‑oriented preteen with a love for nature, stories, and structured routines, channels their quiet curiosity into meticulous hobbies yet sometimes lets worry over small setbacks
    linger longer than needed.
background:
  cultural: Maria comes from a Hispanic family of Mexican descent that settled in Bainbridge, Georgia. She grows up speaking Spanish at home and English at school, celebrating cultural traditions such as
    Día de los Muertos, Christmas posadas, and family reunions with homemade tamales and empanadas. Her family is active in the local Catholic parish, attending Mass and community events. The blend of Southern
    hospitality and Latino heritage gives her a strong sense of family responsibility, community harmony, and pride in her bilingual identity.
attributes:
