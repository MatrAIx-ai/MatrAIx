persona_description: A microbiologist who is conducting research on the variation of the GI tract microbiota in diabetic condition. The microbiologist is interested in studying the commensal microbial population
  of the GI tract in diabetic rats and normal rats, and is using a variety of agar displays to observe the commensal microbial growth in 4 and 8 week diabetic rats along with that in normal rats. The microbiologist
  is also interested in investigating the metabolic activity of the commensal microbes in the diabetic rats, and is using a number of confirmation tests including Catalase test, Coagulase Test, RAPIDEC
  Staph Test, Oxidase test, and API 20E Test to obtain comparative figures.
