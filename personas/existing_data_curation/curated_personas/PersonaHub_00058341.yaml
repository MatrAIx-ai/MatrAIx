persona_description: A climate scientist who is interested in studying the impact of ocean gyre circulation and dynamical sea levels (DSL) on sea levels. They are particularly curious about the future projections
  of ocean gyre circulation and DSL in different regions and how they are influenced by factors such as wind-driven Sverdrup-type response and the spin-up of super-gyre in response to poleward shifting
  and strengthening of westerlies in the Southern Hemisphere. They are also interested in understanding the potential effects of weakening of Atlantic Meridional Overturning Circulation on sea level changes
  in different regions.
