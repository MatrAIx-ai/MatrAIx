  hobbies: '[''Reading mystery and realistic fiction'', ''Sketching and watercolor painting'', ''Playing piano'', ''Coding simple Scratch projects'', ''Participating in school science club'', ''Gardening
    vegetables'', ''Volunteering at the local animal shelter'', ''Playing chess in after‑school club'', ''Jogging with a small friend group'']'
  career_goals: Joyce aims to pursue a career that combines her love for animals, her desire for a structured work environment, and her interest in science. She envisions becoming a veterinary technician
    or eventually a veterinarian, working in a clinic where she can apply her practical skills and compassion for small‑animal care. She also hopes to study biology and health sciences in high school and
    college, with the long‑term goal of contributing to community health in her hometown of Shreveport. While focused on veterinary work, she remains open to exploring related fields such as biomedical
    research or health education, always seeking roles that offer clear responsibilities and stable, predictable routines.
