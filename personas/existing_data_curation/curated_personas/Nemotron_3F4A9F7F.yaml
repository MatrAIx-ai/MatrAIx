personas:
  professional: Sandra Lahey, a 22‑year‑old flight attendant with a meticulous eye for safety, leverages her CPR certification, fluent Spanish, and knack for conflict de‑escalation to keep cabins running
    smoothly while eyeing a rapid promotion to purser through disciplined documentation and competitive crew leadership.
  sports: Sandra Lahey, an early‑riser who logs five‑kilometer jogs before her shifts and attends weekly yoga with the Bayou Runners club, roots for the New Orleans Saints and Pelicans, and treats herself
    to weekend pickup basketball, though a packed schedule sometimes forces her to skip a session.
  arts: Sandra Lahey immerses herself in the local jazz and blues scene, snapping street‑life photos at the New Orleans Jazz & Heritage Festival while vibing to Trombone Shorty and Gary Clark Jr., and she
    balances this with a love for French impressionist art and indie cinema during her downtime.
  travel: Sandra Lahey, a flight attendant who plans meticulous itineraries yet leaves room for spontaneous layover food hunts, has explored New York, Chicago, Nashville, and Montreal, dreams of strolling
    through Paris’s cobblestones and snorkeling in St. Lucia, and navigates travel on a student‑budget with strategic use of airline perks.
  culinary: Sandra Lahey, an enthusiastic home cook, recreates gumbo, étouffée, and coq au vin using cayenne, paprika, thyme, and béchamel, experiments with spices discovered on layovers, boasts intermediate
    skill with a Canon EOS for plating photography, and has a soft spot for chicory‑coffee paired with beignets.
  core: Sandra Lahey blends disciplined cabin‑safety expertise with a competitive climb toward purser, a love for spontaneous culinary experiments, and a balanced rhythm of social zest and solitary reflection.
background:
  cultural: Sandra grew up in Marrero, Louisiana, a community shaped by Southern hospitality, Cajun and Creole influences, and a strong sense of local tradition. Her upbringing exposed her to the rhythm
    of jazz and blues, the flavors of gumbo and étouffée, and the communal spirit of Mardi Gras celebrations. While she identifies as white, her family values emphasize close‑knit family gatherings, respect
    for elders, and an appreciation for the multicultural tapestry of the Gulf Coast. These cultural touchstones inform her warm, service‑oriented demeanor and her affinity for connecting with travelers
    from diverse backgrounds.
attributes:
  skills: '["Safety & Emergency Procedures", "First Aid & CPR", "Customer Service", "Conflict De‑escalation", "Spanish Language Proficiency", "Time Management", "Organizational & Logistical Planning", "FAA
    Compliance", "Crew Training & Mentoring"]'
  hobbies: '["Cooking (international cuisine)", "Learning French", "Jogging", "Yoga", "Travel Photography", "Attending New Orleans music festivals", "Reading non‑fiction on aviation and leadership"]'
  career_goals: Sandra aims to advance within the airline industry by attaining the position of Purser within the next three years, leveraging her competitive drive to lead cabin crews and oversee operational
    excellence. She plans to complete a bachelor's degree in Aviation Management while continuing her flight attendant duties, positioning herself for a future role as a Cabin Services Manager or a safety
    auditor for the airline. Long‑term, she envisions transitioning into airline operations or training development, where she can shape policy and mentor the next generation of flight crews.
