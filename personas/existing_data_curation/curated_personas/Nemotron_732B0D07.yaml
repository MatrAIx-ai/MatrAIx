  hobbies: '[''Oil Painting'', ''Urban Photography'', ''Reading Literature and Philosophy'', ''Visiting Art Exhibits'', ''Hiking in State Parks'', ''Gardening'', ''Playing Classical Piano'', ''Creative
    Writing'', ''Volunteer Art Workshops'', ''Attending Public Lectures'']'
  career_goals: Timothy aims to transition from a frontline psychiatric technician to a supervisory role within his facility, eventually becoming a lead case manager or program coordinator. He plans to
    pursue a master’s degree in social work or counseling to obtain licensure as a mental health therapist, with a particular interest in integrating art therapy into standard treatment protocols. Long‑term,
    he envisions establishing a community‑based art‑and‑wellness center in Omaha that offers creative workshops, peer support groups, and stress‑reduction programs for individuals coping with mental illness.
    He also aspires to contribute to research on the efficacy of creative interventions in reducing anxiety and depressive symptoms, positioning himself as both a practitioner and an advocate for innovative,
    holistic mental‑health care.
