personas:
  professional: Tiquan Cooks is a network and systems administrator who leverages a methodical, results‑oriented approach to LAN/WAN design and cloud integration while flexibly mentoring junior staff and
    championing digital equity in the Bay Area’s underserved neighborhoods, translating complex tech into clear language and balancing structured planning with spontaneous problem‑solving.
  sports: Tiquan Cooks competes in an adult basketball league at Hayward Recreation Center, follows the Golden State Warriors and Oakland Athletics, hikes Redwood Regional Park on weekends, and cycles the
    San Francisco Bay Trail as a member of the Bay Area Cycling Club, embracing both team camaraderie and solo outdoor challenges.
  arts: Tiquan Cooks drums in a community jazz‑fusion band, curates playlists that weave together Miles Davis, Kamasi Washington, and Kendrick Lamar, and frequently attends live performances at the Fox
    Theater and SFMOMA exhibitions, letting rhythmic storytelling shape both their creative outlet and collaborative work style.
  travel: Tiquan Cooks favors spontaneous, low‑key trips that blend adventure with community connection—road‑tripping to Mendocino’s red‑wood coast, biking the Pacific Coast Highway, and planning a future
    cultural pilgrimage to Accra to explore diaspora tech initiatives—while keeping travel costs modest to stay aligned with long‑term savings goals.
  culinary: Tiquan Cooks enjoys crafting Southern‑Californian fusion dishes like shrimp‑and‑grits tacos with avocado‑citrus salsa, smoked brisket glazed with rosemary‑infused BBQ sauce served alongside
    grilled collard greens, and sweet‑potato mac and cheese, showcasing an intermediate‑to‑advanced cooking skill that shines at their weekend backyard barbecues.
  core: Tiquan Cooks blends disciplined tech expertise with a laid‑back love for community rhythms, spontaneous barbecues, and adaptable plans, turning schedules into jam sessions that keep both networks
    and friendships humming.
background:
  cultural: Tiquan grew up in the East Bay within a close‑knit African‑American family that celebrated the rich cultural legacy of the Bay Area’s Black community. He regularly took part in Juneteenth parades,
    Black History Month events, and church gatherings that emphasized community service, resilience, and collective uplift. Influenced by the region’s musical heritage—from funk and soul to hip‑hop—he learned
    to play drums and values storytelling through rhythm. His family placed a strong emphasis on education and civic involvement, shaping his dedication to mentoring youth and advocating for digital equity.
    He is an active member of local Black tech networks such as Black Tech Foundry and draws inspiration from pioneering Black engineers who paved the way in networking and cybersecurity.
attributes:
  skills: '[''Cisco routing and switching (CCNA/CCNP level)'', ''Network design and troubleshooting'', ''VMware vSphere virtualization'', ''Microsoft Active Directory & Group Policy'', ''AWS cloud services
    (EC2, VPC, IAM)'', ''Google Cloud Platform (Compute Engine, Cloud DNS)'', ''PowerShell scripting'', ''Python automation'', ''Bash/Shell scripting'', ''Network monitoring with SolarWinds and Zabbix'',
    ''Firewall configuration (Palo Alto, Fortinet)'', ''VPN setup (IPsec, SSL)'', ''ITIL Foundation processes'', ''Disaster recovery planning and backup solutions'', ''User support and training'']'
  hobbies: '[''Pickup basketball (Hayward Recreation Center)'', ''Hiking in Redwood Regional Park'', ''Biking the San Francisco Bay Trail'', ''Home cooking – fusion of Southern and Californian cuisine'',
    ''Barbecuing and hosting weekend gatherings'', ''Drumming in a community jazz‑fusion band'', ''Attending Bay Area Black Tech Meetups'', ''Mentoring high‑school students in STEM'', ''Co‑op multiplayer
    gaming (e.g., Valorant, Sea of Thieves)'', ''Streaming music playlists for friends'']'
  career_goals: Tiquan aims to move into a senior network architect role within the next five years, leveraging his hands‑on experience to design hybrid cloud‑on‑premises infrastructures for mid‑size enterprises.
    He plans to earn the Cisco CCIE and the AWS Certified Solutions Architect – Professional certifications, and to deepen his knowledge of software‑defined networking and automation tools like Ansible
    and Terraform. Long‑term, he envisions taking on an IT leadership position—such as Infrastructure Manager or Director of Services—where he can shape strategic technology roadmaps, mentor a diverse team,
    and champion initiatives that improve digital equity for underserved communities in the Bay Area.
