  career_goals: Marsha aims to channel her organizational talents into strengthening her community's next generation. She aspires to mentor emerging leaders at the local senior center, serve on the board
    of a nonprofit focused on African American history preservation, and lead intergenerational programs that connect youth with elders. Additionally, she plans to document her family's stories in a memoir
    and ensure her family's financial security through careful estate planning. Her ambition is to leave a lasting legacy of service, cultural preservation, and empowerment.
