persona_description: A Singapore-based education consultant who specializes in the development and implementation of comprehensive and effective strategies for the improvement of primary school students'
  creative writing skills. This individual has extensive experience in working with parents and students to understand the nuances of the PSLE composition component and to develop creative writing skills
  that can be applied to the PSLE examination. They are well-versed in the differences between creative writing and traditional PSLE composition writing, and are adept at teaching students to break the
  established rules of sentence construction while still adhering to the strict requirements of the PSLE. They are also knowledgeable about the importance of planning and drafting in the creative writing
  process, and have a proven track record of helping students to deliver well-crafted compositions under examination conditions.
