  career_goals: Andrew is captivated by large, orderly machines and often imagines becoming a firefighter or a construction worker, picturing himself operating a fire engine or a crane. He aspires to learn
    to read and write so he can explore manuals for these vehicles and to be recognized as a "big kid" who can take on responsibilities at home. His competitive nature fuels a desire to build the tallest
    block tower and to be the fastest at completing simple tasks.
