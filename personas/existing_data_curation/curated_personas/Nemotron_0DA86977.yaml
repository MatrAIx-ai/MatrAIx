personas:
  professional: Andrew Allred, a three‑year‑old budding builder, spends hours stacking interlocking bricks in meticulous patterns, yet when a new shape appears he joyfully re‑arranges them, showcasing his
    blend of love for structure and spontaneous play in his early engineering exploration.
  sports: Andrew Allred, a three‑year‑old member of the Little Kickers Soccer Club, eagerly dribbles a soft ball at weekend practice, proudly wears a tiny Dallas Cowboys cap, and treats each mini‑match
    as a friendly competition, reflecting his competitive streak balanced with the joy of play.
  arts: Andrew Allred loves drawing bright animals while listening to Raffi’s ‘Baby Beluga’, can recite verses from Sesame Street starring Big Bird, and delights in watching Mickey Mouse cartoons, weaving
    structured coloring sessions with spontaneous musical sing‑alongs.
  travel: Andrew Allred has explored the nearby city zoo, splashed at a family beach vacation in Fort Myers, and dreams of stepping onto Disneyland’s Main Street, preferring trips that combine his familiar
    bedtime routine with new playground adventures.
  culinary: Andrew Allred favors creamy mac and cheese, crunchy chicken nuggets, and sweet strawberry slices, can whiz together a banana‑and‑yogurt smoothie with a plastic spoon, yet often sneaks extra
    grapes when no one watches, marrying a practical palate with spontaneous cravings.
  core: Andrew Allred is a three‑year‑old who thrives on tidy routines while delightfully tossing them aside for spontaneous play, balances sharing with a competitive edge, and calmly breezes through spills
    and hiccups, making his tiny world both orderly and unpredictably fun.
background:
  cultural: Andrew is a white child raised in Saint Marys, a small Midwestern town in Auglaize County, Ohio. His family lives in a close‑knit community where church gatherings, county fairs, and local school
    events are central to social life. The regional culture emphasizes reliability, routine, and community support, which reinforces his preference for predictable daily structures. At the same time, the
    open rural environment encourages spontaneous outdoor play and a competitive spirit during playground games. These cultural influences blend with his personal tendencies toward both structure and flexibility.
