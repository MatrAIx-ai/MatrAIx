  career_goals: Although she is currently not in the formal workforce, Anh hopes to translate her culinary strengths into a modest home-based catering service specializing in family-style Vietnamese meals
    for birthday parties and small cultural gatherings. She also envisions completing a part-time certification in nutrition or home economics to deepen her knowledge of healthy cooking, which could support
    a future side business or volunteer role teaching cooking classes at the local community center. Over the next few years, her primary ambition is to achieve greater financial stability for her household,
    preserve and share her cultural heritage with younger generations, and slowly expand her community involvement while maintaining the predictable routine that gives her comfort.
