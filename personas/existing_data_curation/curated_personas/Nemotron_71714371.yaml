personas:
  professional: Anh Nguyen, a diligent home manager transitioning into a modest home‑based catering venture, blends meticulous budgeting, spreadsheet‑driven meal planning, and reliable event coordination
    with a quiet assertiveness that pushes them to market family‑style Vietnamese meals while still clinging to the comforting routines that define their daily work.
  sports: Anh Nguyen, an enthusiastic supporter of the Portland Timbers (MLS) and the Portland Trail Blazers (NBA), enjoys weekly morning walks with the River Bend Striders senior walking club, participates
    in a local recreational tennis league each spring, and uses gardening as a low‑impact way to stay active.
  arts: Anh Nguyen, a devoted listener of Trịnh Công Sơn's folk ballads and contemporary pop star Mỹ Linh, immerses themselves in historical fiction by Ken Follett and Vietnamese author Nguyễn Nhật Ánh,
    and channels the lyrical inspiration into knitting quilts patterned after Faith Ringgold’s vibrant storytelling.
  travel: Anh Nguyen, a methodical planner who prefers short, intimate trips, has visited Hoi An’s lantern‑lit Old Town and the coastal city of Da Nang, dreams of exploring Kyoto’s tea gardens and the vineyards
    of Tuscany, and always books accommodations that include a kitchen to keep their cooking routine intact.
  culinary: Anh Nguyen, a seasoned home cook who expertly prepares pho broth seasoned with star anise, clove, and charred ginger, rolls spring rolls filled with shrimp, vermicelli, and fresh basil, and
    perfectly layers bánh chưng with pork and glutinous rice, while occasionally over‑salting when stressed but delighting friends with their thoughtfully tweaked family recipes.
  core: Anh Nguyen balances a comforting devotion to routine with a quietly ambitious drive to share their culinary heritage, all while navigating worries about health and finances, and indulging in quirky
    habits like over‑salting dishes during stressful moments.
background:
  cultural: Anh is a first- or second-generation Vietnamese-American. Raised in a bilingual household in California, she speaks both Vietnamese and English fluently and grew up observing the customs and
    values of her parents’ homeland. She celebrates Tet (Lunar New Year) and Mid-Autumn Festival with traditional foods, ancestor worship, and family reunions, while also participating in local community
    activities and a nearby church that blends her cultural heritage with broader American traditions. Her upbringing emphasized respect for elders, the importance of family cohesion, and the practical
    virtues of hard work and self-reliance, all of which continue to shape her worldview and daily routines.
