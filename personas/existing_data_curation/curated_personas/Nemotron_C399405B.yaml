  career_goals: Juan aims to become a regional senior director of construction for a leading developer in Southern California, overseeing multi‑million‑dollar mixed‑use projects that prioritize sustainability
    and cultural relevance. He plans to earn the PMP certification and become a LEED Accredited Professional within the next three years. Ultimately, he envisions launching his own boutique construction
    firm that blends cutting‑edge technology (modular construction, 3‑D printing) with Mexican‑inspired design motifs, and mentoring the next generation of engineers and project managers.
