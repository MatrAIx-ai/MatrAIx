  hobbies: '[''Visiting art galleries and street murals'', ''Digital photography'', ''Strategy video games and chess'', ''Cooking fusion dishes (East Asian & Texan)'', ''Board‑game nights with friends'',
    ''Hiking in the Texas Hill Country'', ''Sketching and drawing'']'
  career_goals: Eng aims to advance from his current clerk role to a supervisory position within the next three to five years, eventually becoming a warehouse manager or regional logistics coordinator.
    He plans to obtain professional certifications such as the APICS CPIM and pursue an associate degree in supply chain management to deepen his strategic knowledge. Leveraging his curiosity for new ideas,
    he hopes to lead initiatives that integrate automation technologies, improve throughput, and set performance benchmarks that outpace competing facilities.
