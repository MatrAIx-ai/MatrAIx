personas:
  professional: Eng Zheng, a 27‑year‑old logistics clerk with forklift certification, applies their meticulous inventory control and Fishbowl expertise while channeling a competitive, curiosity‑driven mindset
    to streamline warehouse processes and propose automation upgrades.
  sports: Eng Zheng follows the Dallas Cowboys and Dallas Mavericks avidly, plays pick‑up basketball at a local park on Tuesday evenings, and belongs to a weekend intramural soccer league with the FC Dallas
    fan club, balancing a competitive edge with a laid‑back love of Texas‑style barbecues after games.
  arts: Eng Zheng dives into contemporary art by frequenting the Dallas Museum of Art and hunting street murals in Deep Ellum, sketches urban scenes for an online portfolio, draws inspiration from artists
    like Shepard Fairey and modern Chinese ink masters, and channels their curiosity into digital photography of the Texas Hill Country’s bluebonnet fields at golden hour.
  travel: Eng Zheng plans travel with a mix of meticulous budgeting and spontaneous detours, favoring weekend escapes to the Texas Hill Country’s wineries and occasional trips abroad to Kyoto for its serene
    temples, yet limits longer vacations due to career ambitions and a modest investment portfolio.
  culinary: Eng Zheng enjoys experimenting in the kitchen, mastering a hybrid dish of mesquite‑smoked Korean BBQ short ribs glazed with gochujang and a side of Tex‑Mex corn salsa, while their moderate cooking
    skill leads them to rely on a trusted set of ingredients—smoked paprika, soy sauce, and fresh cilantro—to fuse East Asian flavors with Texas barbecue.
  core: Eng Zheng is a 27‑year‑old logistics enthusiast who balances a competitive, detail‑obsessed work ethic with a vibrant love for art, photography, and culinary mash‑ups, all while navigating a pragmatic
    yet adventurous life.
background:
  cultural: Eng comes from an East Asian family that immigrated to the United States, and he grew up bilingual in English and Mandarin. Family gatherings often feature traditional celebrations such as Lunar
    New Year and Mid‑Autumn Festival, while his upbringing in Texas has blended these customs with local traditions like Fourth of July fireworks and Tex‑Mex cuisine. He maintains ties to his cultural heritage
    through community events at the local cultural center, yet he also embraces the diverse Texan environment, reflecting a hybrid identity that values both his ancestral roots and his American experiences.
attributes:
  skills: '[''Inventory management'', ''Shipping and receiving documentation'', ''Warehouse Management System (WMS) operation'', ''Forklift certification'', ''Data entry and analysis'', ''Process improvement'',
