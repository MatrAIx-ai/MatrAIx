persona_description: A conservation scientist who is concerned about the potential negative impacts of climate change on New Zealand's flora and fauna, particularly in the context of invasive species control.
  They are aware of the need for more research to take into account climate change when making conservation decisions and are aware of the high risk of extinction for native species in a changing climate.
  They are committed to protecting New Zealand's biological heritage and are aware of the importance of considering the impacts of climate change on indigenous communities and culture.
