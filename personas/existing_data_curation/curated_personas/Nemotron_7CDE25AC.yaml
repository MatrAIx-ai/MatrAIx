  career_goals: At 55, John aims to transition into a senior executive role, such as Chief Communications Officer, where he can shape the strategic direction of a regional media organization. He seeks to
    lead a high‑impact rebranding initiative that showcases his ability to merge structured planning with creative execution. Additionally, John plans to establish his own consulting firm focused on helping
    small‑town businesses and nonprofits craft disciplined, results‑driven communication strategies. Mentoring the next generation of communicators and achieving measurable improvements in organizational
    reputation are also central to his long‑term ambition.
