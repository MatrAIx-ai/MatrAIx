personas:
  professional: Crystal Gersholowitz, a veteran mechanical engineer with 25 years of experience, channels her vivid imagination into sustainable design projects that blend robotics, fluid dynamics, and
    reclaimed‑material art installations for coastal communities, and they mentor emerging women engineers while fostering interdisciplinary collaboration.
  sports: Crystal Gersholowitz enjoys snorkeling along the Caribbean reefs, hikes the El Yunque rainforest trails, practices yoga at the local studio, and they volunteer as a safety coordinator for the
    Fajardo sailing club while cheering on the regional baseball team, the Fajardo Mariners, during the summer season.
  arts: Crystal Gersholowitz spends evenings oil‑painting seascapes inspired by Ansel Adams’ tonal mastery, sculpts reclaimed wood and metal while listening to classical guitarist John Williams, captures
    sunset abstractions in photography influenced by René Magritte, and they often share their work at the Fajardo Cultural Center’s monthly art showcase.
  travel: Crystal Gersholowitz prefers spontaneous, low‑key getaways to island destinations such as St. Lucia, Curaçao, and the Azores, often planning trips around local festivals and marine‑conservation
    events, and they balance occasional luxury snorkeling charters with budget‑friendly hostels to keep travel expenses in check.
  culinary: Crystal Gersholowitz enjoys cooking traditional island dishes like mofongo with shrimp al ajillo, arroz con gandules, and pastelón, boasts solid skill with aromatics such as sofrito and achiote,
    and they frequently pair meals with fresh tropical fruit smoothies or a glass of locally produced rum.
  core: Crystal Gersholowitz, the imaginative engineer‑artist who weaves sustainable tech, ocean‑inspired art, and mindful practice into daily life, balances curiosity and occasional anxiety, and they nurture
    a love for island flavors and community mentorship.
background:
  cultural: Crystal grew up in a close‑knit Puerto Rican family on the eastern coast of the island, where Spanish and English intertwine in daily life. The island’s vibrant music, dance, and oral storytelling
    traditions nurtured her imagination and respect for community harmony. Surrounded by coral reefs, mangroves, and the tropical rainforest, she developed an early fascination with natural systems, which
    later informed her sustainable engineering perspective. Family gatherings centered around shared meals, especially dishes like mofongo and lechón, reinforced values of generosity, cooperation, and collective
    well‑being. This cultural tapestry of resilience, creativity, and communal responsibility shapes her professional ethos and personal pursuits.
attributes:
  skills: '[''Mechanical Design'', ''Finite Element Analysis (FEA)'', ''Computational Fluid Dynamics (CFD)'', ''Computer-Aided Design (CAD)'', ''Rapid Prototyping'', ''Materials Science'', ''Robotics Integration'',
    ''Sustainable Design'', ''Creative Problem Solving'', ''Technical Writing'', ''Artistic Sketching'']'
  hobbies: '[''Oil Painting'', ''Sculpture'', ''Playing Classical Guitar'', ''Reading Speculative Fiction'', ''Snorkeling'', ''Hiking in El Yunque'', ''Yoga and Meditation'', ''Teaching Small‑Group STEM
    Workshops'', ''Cooking Traditional Puerto Rican Dishes'', ''Coastal Sunset Photography'']'
  career_goals: Crystal aims to lead a small, interdisciplinary design studio in Fajardo that blends engineering with artistic expression to create sustainable, community‑focused installations and products.
    She hopes to develop low‑cost renewable‑energy prototypes for coastal neighborhoods and mentor emerging women engineers in Puerto Rico. Over the next decade, she plans to pursue a master’s degree in
    Sustainable Engineering, secure a senior technical director position that allows flexible project structures, and launch an annual hackathon‑art symposium that celebrates innovation and harmony. Her
    ultimate ambition is to leave a legacy of inventive, humane engineering solutions that enrich the cultural fabric of her island home while maintaining a work rhythm that protects her emotional well‑being.
