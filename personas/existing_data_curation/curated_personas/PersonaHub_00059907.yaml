persona_description: A scientist at the Van Andel Research Institute (VARI), focused on the study of Myelodysplastic Syndrome (MDS), a bone marrow disease. The scientist has published findings on the importance
  of the RhoB gene in the disease's progression and has identified potential therapeutic targets for late-stage MDS. The scientist collaborates with researchers at the Lankenau Institute for Medical Research
  on the study and has received funding from the American Cancer Society.
