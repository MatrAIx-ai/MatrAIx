  hobbies: '[''watercolor painting'', ''ceramic tile decoration'', ''community gardening'', ''organizing group planting events'', ''attending Mexican cultural festivals'', ''cooking regional Mexican cuisine'',
    ''hiking in coastal wetlands'', ''nature photography'']'
  career_goals: Enrique aims to transition from being an employee to owning a small, family‑run landscaping business that specializes in environmentally friendly designs and culturally inspired gardens.
    He plans to obtain certification in horticulture and sustainable landscape management within the next two years, allowing him to offer consulting services to municipal projects in Liberty County. Additionally,
    Enrique aspires to establish a mentorship program for younger workers, especially those from the local Hispanic community, to share his disciplined work ethic and artistic perspective. Long‑term, he
    hopes to broaden his portfolio to include public art installations that blend landscaping with Mexican cultural motifs, positioning his firm as a unique contributor to the region’s visual identity.
