personas:
  professional: A budding junior architect in the making, Clarence Mcdonald loves building Lego skyscrapers, and they channel their love of routine and meticulous step‑by‑step instruction into refining
    spatial reasoning, patience, and an early knack for project planning, even if their desk sometimes ends up a cluttered battlefield of loose bricks.
  sports: A weekend explorer of Central Park's trails, Clarence Mcdonald enjoys casual bike rides and Saturday soccer scrimmages with their sister's neighborhood team, and they cheer for the New York Knicks
    on TV, while also following the New York Yankees, preferring low‑pressure play over organized leagues.
  arts: A quiet sketcher and classic‑rock aficionado, Clarence Mcdonald fills a small notebook with simple landscapes inspired by the rhythms of The Beatles and Led Zeppelin, and they watch animated adaptations
    of the Magic Tree House series, admiring the watercolor works of Winslow Homer while letting music guide their drawing pace.
  travel: A family‑oriented day‑trip planner, Clarence Mcdonald loves short adventures to nearby attractions like the American Museum of Natural History and the Bronx Zoo, and they dream of visiting the
    Grand Canyon's wide vistas for rock‑collecting, valuing the predictable schedule of weekend trips over spontaneous overseas flights.
  culinary: A picky yet curious eater, Clarence Mcdonald prefers classic comfort foods like cheese pizza, chicken nuggets, and mac & cheese, and they delight in making peanut‑butter‑banana sandwiches at
    home, enjoying the occasional strawberry‑topped pancake breakfast, though they often protest when vegetables appear on their plate.
  core: A routine‑loving, modestly anxious ten‑year‑old, Clarence Mcdonald builds elaborate Lego worlds, saves spare change in a piggy bank, sketches while classic rock plays, and they worry about the smallest
    changes in their schedule, all with a gentle smile and a habit of leaving their crayons scattered.
background:
  cultural: Clarence comes from a white, middle‑class American family that has lived in New York City for several generations. His household observes traditional American holidays—Thanksgiving, Christmas,
    and the Fourth of July—with an emphasis on family meals and shared stories. He attends a local public elementary school where the curriculum includes multicultural perspectives, yet his family places
    strong value on practical education, punctuality, and courteous behavior. The family has modest religious ties, occasionally attending a community church that emphasizes service and kindness. Growing
    up in a diverse city, Clarence has been exposed to many cultures, but his immediate cultural environment remains rooted in conventional American middle‑class values and routines.
attributes:
  skills: '["Reading comprehension (grade 4 level)", "Basic arithmetic (addition, subtraction, multiplication)", "Digital literacy (tablet use, educational apps)", "Lego building and spatial reasoning",
    "Drawing and sketching", "Cooperative group work", "Empathy and conflict resolution", "Basic cooking (preparing simple snacks)"]'
  hobbies: '["Reading chapter‑book series (e.g., Magic Tree House)", "Lego construction (following instruction manuals)", "Drawing and sketching", "Puzzle solving (jigsaw, kid‑friendly Sudoku)", "Playing
    Minecraft (creative mode)", "Board games with siblings (Ticket to Ride: First Journey)", "Nature walks in Central Park", "Listening to classic rock music"]'
  career_goals: Clarence is fascinated by how things are built and imagines a future where he designs safe, functional spaces for his community. He hopes to study more math and drawing, join a school STEM
    or robotics club, and ultimately pursue a career as an architect or civil engineer. In the short term, he aims to improve his grade‑level math and complete a challenging Lego architecture set, seeing
    these steps as building blocks toward a practical, community‑focused profession.
