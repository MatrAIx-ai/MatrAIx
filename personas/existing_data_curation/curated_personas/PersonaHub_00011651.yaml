persona_description: A bioethicist who specializes in the study of developmental human biology and the ethical principles that can sustain scientific exploration in this field. They are deeply concerned
  with the distinction between the living whole and the biochemical parts, and how this distinction can inform and refine ethical principles. They believe that a proper ethical framework can set the principles
  that preserve a coherent moral understanding while defining the boundaries of these principles with a clarity and precision that opens avenues of advance for the whole future of developmental biology.
