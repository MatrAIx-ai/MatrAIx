  career_goals: Yvonne aims to become a leading figure in interdisciplinary data science, driving research that bridges technology and the humanities to address social inequities. She aspires to secure
    a senior research scientist position where she can lead large-scale projects that develop ethically responsible AI tools for cultural heritage preservation and community empowerment. Long‑term, she
    envisions establishing a research lab focused on inclusive AI, securing sustained funding, and influencing policy on algorithmic fairness. Yvonne also hopes to mentor more Black women in tech, champion
    diversity initiatives, and eventually transition into a tenured academic role that allows her to shape curricula at the intersection of computer science and humanities.
