personas:
  professional: Yvonne Jackson, a senior research scientist at a leading university, blends deep expertise in natural language processing, machine learning, and humanities scholarship to build inclusive
    AI tools for cultural heritage, channeling her curiosity and practical mindset while navigating a relaxed, sometimes disorganized workflow.
  sports: Yvonne Jackson avidly follows the New York Knicks and New York Yankees, participates in the Hudson Valley Hiking Club for weekend trail outings, and attends weekly yoga sessions at a Brooklyn
    studio, combining community spirit with personal fitness.
  arts: Yvonne Jackson immerses themselves in the city’s artistic pulse by attending jazz concerts featuring Wynton Marsalis, exploring gallery exhibitions of Kara Walker and Kehinde Wiley, and reading
    contemporary poetry collections by Ocean Vuong, all of which inform their interdisciplinary research perspective.
  travel: Yvonne Jackson plans travel that mixes cultural immersion and restorative retreats, favoring weekend hikes in the Hudson Valley, annual trips to New Orleans for its vibrant jazz scene, and dreaming
    of a future pilgrimage to Ghana’s coastal diaspora museums, all while balancing a modest budget and family responsibilities.
  culinary: Yvonne Jackson loves cooking soul‑food inspired dishes with a modern twist, often preparing collard greens sautéed with smoked turkey and quinoa, sweet‑potato pie spiced with ginger and cardamom,
    and perfecting New‑York‑style bagels topped with lox, while also delighting in dishes like Ethiopian injera when dining out.
  core: Yvonne Jackson is a curiosity‑driven data scientist who balances scholarly rigor with a laid‑back, occasionally chaotic schedule, channeling deep compassion into community mentorship while sometimes
    forgetting to file taxes on time.
background:
  cultural: Yvonne grew up in a close‑knit African‑American family in Brooklyn, where church, music, and storytelling were central to daily life. Her parents emphasized education, community service, and
    pride in Black cultural heritage. She carries the legacy of the Civil Rights and Black Arts movements, which fuels her commitment to social justice and representation in tech. Living in New York City
    has exposed her to a mosaic of cultures, reinforcing her belief in the power of interdisciplinary collaboration and the importance of inclusive spaces. Yvonne's cultural identity informs her research
    focus on equitable technology and her dedication to mentoring the next generation of Black scholars and technologists.
