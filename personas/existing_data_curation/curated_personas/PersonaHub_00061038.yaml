persona_description: A member of Congress who is interested in the legislative process, particularly in the areas of oversight, investigations, and policy-making. They are likely to be involved in committee
  work, floor debate, and the use of amendments to bills. They may also be familiar with the workings of the House Rules Committee and the ability of Congress to exercise control over executive agencies.
  Additionally, they may have a deep understanding of the concept of standing committees, the tendency of Congress to spread the benefits of a policy over a wide range of members' districts, and the significance
  of the capacity to bring a proposal before the full legislature.
