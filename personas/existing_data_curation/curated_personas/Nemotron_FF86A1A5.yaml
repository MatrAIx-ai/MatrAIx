  career_goals: At 63, Hien aims to transition into a mentorship and leadership role within the healthcare setting. She plans to obtain certification as a Certified Nursing Assistant (CNA) trainer and eventually
    oversee a small cohort of nursing assistants, raising the bar for patient safety and care quality. Passionate about blending art with health, she hopes to develop an in‑house art‑therapy program for
    senior residents at her facility. Additionally, Hien is interested in volunteering as a health educator at community centers, sharing her expertise and promoting preventive care for older adults in
    the Aurora area.
