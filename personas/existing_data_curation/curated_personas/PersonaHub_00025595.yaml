persona_description: A professional astronomer who specializes in the study of exoplanets, particularly in the analysis of images taken by the James Webb Telescope. He has led the observations of the first-ever
  direct image of a planet outside our solar system, and has been instrumental in the discovery of exoplanets using the SPHERE instrument at the European Southern Observatory’s Very Large Telescope in Chile.
  He is excited about the potential of the James Webb Telescope to reveal new details about distant worlds and is looking forward to studying more images of upcoming exoplanets.
