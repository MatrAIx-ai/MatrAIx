  career_goals: Though retired, Michael aims to stay intellectually active and give back to his community. He hopes to become a volunteer docent at the Yale University Art Gallery, sharing his knowledge
    of art history with visitors. He plans to launch a personal blog that chronicles 20th‑century American art and his own reflections, with the long‑term goal of publishing a memoir about his life spanning
    the post‑war era to the present. Additionally, he aspires to master digital photography techniques, produce a small exhibition of his watercolor landscapes, and organize a senior‑focused community art
    showcase in New Haven.
