personas:
  professional: Michael Wooten, a retired carpenter turned community art advocate, combines his decades‑long expertise in antique furniture restoration and meticulous genealogical record‑keeping to volunteer
    as a docent at the Yale University Art Gallery, where they apply an organized, skeptical eye and a competitive drive to elevate visitor tours with precise historical context and engaging visual analysis.
  sports: Michael Wooten, a dedicated bird‑watcher, spends his mornings walking the Long Island Sound shoreline with the local Birdwatchers Club, maintains a modest fitness routine of weekly tai‑chi and
    gentle swimming, and they follow the New England Patriots football team and the Connecticut Whale hockey club as their seasonal sports anchors.
  arts: Michael Wooten, an avid watercolorist and vintage postcard collector, frequents intimate New Haven galleries to study and critique works by Winslow Homer and contemporary marine painters, while
    they spend their evenings immersed in the smooth improvisations of Miles Davis, John Coltrane, and Thelonious Monk, shaping their artistic sensibility and community mentorship.
  travel: Michael Wooten, a meticulous planner, prefers low‑key coastal getaways such as weekend trips to Cape Cod, Newport and Portland, Maine, while they dream of a guided tour of the Maritime Museum
    in Amsterdam, balancing their modest travel budget with a penchant for researching historic ship routes and arranging itineraries well in advance to avoid travel‑related stress.
  culinary: Michael Wooten, a hobbyist gardener‑chef, transforms their home‑grown tomatoes, basil, and oregano into dishes like fresh tomato bruschetta, herb‑infused roasted chicken, and a creamy New England
    clam chowder, showcasing intermediate cooking skills while occasionally letting the kitchen become a chaotic studio of spice jars and jazz records.
  core: Michael Wooten combines a lifelong curiosity for art and history with methodical craftsmanship and a cautious, sometimes skeptical temperament, channeling their meticulous nature into watercolor
    landscapes, vintage postcard collections, and community mentorship while quietly battling persistent worry.
background:
  cultural: Michael is a second‑generation Irish‑American raised in a Protestant (Episcopal) family in a working‑class neighborhood of New Haven. Growing up during the post‑war boom and the cultural shifts
    of the 1960s, he internalized New England's values of self‑reliance, modesty, and hard work, while his curiosity led him to explore broader artistic and intellectual currents. He maintains ties to the
    local Irish community, participating in St. Patrick’s Day events and occasional heritage gatherings. Though he left formal schooling before ninth grade, his lifelong habit of independent learning reflects
    the region’s respect for education and personal improvement.
