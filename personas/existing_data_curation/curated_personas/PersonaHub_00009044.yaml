persona_description: A geophysicist and planetary scientist who specializes in studying the surface temperature and composition of Venus, as well as the planet's volcanic history and its differences from
  Earth. They are interested in understanding the reasons behind Venus's unique features and the potential for active volcanoes on the planet. They have collaborated with colleagues from Finland, Italy,
  and France to gather data and conduct research on Venus's surface temperature and composition. They are also interested in the similarities and differences between Venus and Earth, particularly in terms
  of their surface temperatures and atmospheric conditions.
