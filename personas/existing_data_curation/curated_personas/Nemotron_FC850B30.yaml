  career_goals: Jessie aims to leverage her supervisory experience into a senior operations role within the next three years, targeting a Director of Administrative Services position at a technology or
    cultural institution in New York. She plans to enroll in a part‑time MBA program to deepen her strategic management skills and to earn a PMP certification for formal project‑management credentials.
    Long‑term, she hopes to spearhead digital‑transformation initiatives that modernize office workflows, champion sustainability practices across corporate facilities, and mentor emerging women leaders.
    Additionally, she envisions launching a community‑focused arts program that integrates creative expression into workplace wellness initiatives.
