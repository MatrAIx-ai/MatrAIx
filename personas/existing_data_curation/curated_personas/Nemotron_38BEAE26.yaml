  career_goals: Will aims to be promoted to store manager within the next two years, leveraging his organizational strengths and customer‑focused mindset. He envisions a longer‑term trajectory toward a
    district‑manager role or a senior visual merchandising position with a national retailer, where he can combine his artistic curiosity with data‑driven merchandising strategy. To support these goals,
    he plans to complete his associate’s degree in Business Administration and pursue professional certifications in retail management. Ultimately, he aspires to open a boutique that showcases emerging
    African‑American artists and designers, creating a community‑centric space that blends commerce, culture, and creativity while fostering mentorship for young talent.
