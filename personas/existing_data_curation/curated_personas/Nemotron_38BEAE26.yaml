personas:
  professional: Will Thomas, a 26‑year‑old retail associate, blends meticulous inventory management and data‑driven visual merchandising with a vibrant artistic imagination, turning store layouts into immersive
    galleries while they lead team briefings with calm, organized enthusiasm and a genuine concern for colleagues' growth.
  sports: Will Thomas is a regular at the Kern County Community Basketball League and a member of the Sierra Trail Club, cheering on the Los Angeles Lakers each season while they maintain a disciplined
    weekly hiking routine through the Kern River Canyon.
  arts: Will Thomas finds inspiration in the abstract paintings of Mark Rothko, the improvisational brilliance of Miles Davis, and the lyrical flow of Kendrick Lamar, channeling this blend into weekend
    sketch sessions and volunteering at youth art workshops where they mentor budding creators.
  travel: Will Thomas’s travel style mixes spontaneous weekend road trips to nearby gems like Yosemite and Austin’s music scene with carefully saved plans for a future art‑focused pilgrimage to Tokyo’s
    Roppongi district, balancing a modest budget with a love for immersive cultural experiences.
  culinary: Will Thomas’s palate gravitates toward spicy ramen bowls, smoky pork tacos al pastor, and artisan latte art, and while they boast a decent home‑cook ability—often whipping up quick stir‑fry
    with soy sauce, ginger, and chili—they frequently indulge in food‑truck excursions that sometimes leave their kitchen a mess.
  core: Will Thomas is a hyper‑creative, hyper‑organized 26‑year‑old who channels chronic anxiety into vibrant art, meticulous retail leadership, and a relentless pursuit of community‑driven cultural experiences,
    all while they juggle a coffee habit and an occasional tendency to over‑schedule.
background:
  cultural: Will is an African‑American who grew up in Bakersfield, California, in a close‑knit family that emphasized community, faith, and cultural pride. Sunday services at a historically Black church
    introduced him early to soul music, gospel choirs, and the tradition of storytelling that celebrates resilience and achievement. Family gatherings often feature fried‑chicken, collard greens, and discussions
    of African‑American history, reinforcing a sense of identity. Although Bakersfield’s Black population is modest, Will stays connected through local Black cultural festivals, Juneteenth celebrations,
    and community centers that host art workshops and mentorship programs. He draws artistic inspiration from Black painters, musicians, and contemporary designers, and he actively supports initiatives
    that amplify Black voices in the arts. This heritage informs his worldview, fostering a commitment to inclusivity, representation, and community empowerment in both his professional and personal pursuits.
