  career_goals: Although no longer active in the formal workforce, Thang aims to channel his business acumen into community service by volunteering as a financial literacy tutor at the local senior center
    and providing mentorship to small business owners in Fairfax County. He aspires to document his family’s migration story and culinary traditions in a memoir and a series of online videos, hoping to
    preserve cultural heritage for future generations. Additionally, he wishes to deepen his knowledge of contemporary art, attending occasional museum talks and curating a small personal collection that
    reflects his curiosity for unconventional perspectives.
