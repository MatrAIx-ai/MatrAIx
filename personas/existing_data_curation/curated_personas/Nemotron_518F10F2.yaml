personas:
  professional: Kourtney Schliep is a seasoned elementary and middle school teacher who blends curiosity-driven project-based learning with state standards, leveraging interactive whiteboards and learning
    management systems to craft flexible, environmentally anchored curricula, while they foster a kind, cooperative classroom culture that mirrors their practical yet open‑minded outlook.
  sports: Kourtney Schliep enjoys hiking the Sonoran Desert trails near Vail, often joining the local Vail Desert Runners club for weekend treks, supports the Arizona Diamondbacks and Phoenix Suns, and
    they play recreational volleyball at the community center, reflecting a love of low‑key outdoor activity and regional team spirit.
  arts: Kourtney Schliep cultivates a deep appreciation for visual and tactile arts through photographing blooming desert flora, attending pottery workshops that honor native‑American craft techniques,
    knitting scarves for friends and charitable drives, and they draw creative inspiration from photographer Edward Weston and historical novelist L. M. Montgomery.
  travel: Kourtney Schliep prefers low‑key, flexible travel experiences, often road‑tripping to Sedona’s red rocks, exploring historic Tucson, and they dream of a summer visit to the vineyards of Nelson
    Valley, balancing an adventurous spirit with the practical need to budget and coordinate school responsibilities.
  culinary: Kourtney Schliep delights in Southwestern flavors, frequently preparing grilled cactus paddles (nopales), homemade salsa with jalapeños, quinoa salads tossed with roasted desert squash, and
    they sip a robust Mexican café de olla while occasionally testing recipes inspired by the historical fiction they read.
  core: Kourtney Schliep, a 45‑year‑old educator and nature enthusiast, merges curiosity with practicality, embraces flexible routines, and nurtures kindness, even as occasional disorganization and a love
    for desert‑inspired creativity shape their everyday life.
background:
  cultural: Kourtney identifies as a white American with German and Irish ancestry. She grew up in a close‑knit Midwestern town, where she internalized values of self‑reliance, community cooperation, and
    modest celebrations of seasonal holidays. After moving to Vail, Arizona, she embraced the Southwest’s open landscape and multicultural milieu, developing an appreciation for the Tohono O'odham Nation’s
    heritage and the region’s Hispanic influences. Her cultural outlook blends mainstream American traditions with a deep respect for local desert ecology and the diverse peoples of Pima County, shaping
    her inclusive teaching philosophy and community involvement.
