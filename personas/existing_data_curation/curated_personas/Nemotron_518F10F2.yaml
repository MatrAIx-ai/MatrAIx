  career_goals: Kourtney aims to complete a bachelor’s degree in Elementary Education within the next two years, followed by a master’s in Curriculum and Instruction. She aspires to become an instructional
    coach or curriculum specialist for the Pima County school district, where she can mentor new teachers and develop district‑wide inquiry‑based units that incorporate the unique desert ecosystem and local
    cultural narratives. She also hopes to start an after‑school enrichment program focused on nature exploration and creative arts, providing a flexible, supportive environment for students and families.
    Balancing her professional growth with personal well‑being, she seeks leadership roles that allow her to champion harmonious, student‑centered learning while maintaining the flexibility she values.
