  career_goals: Jess aims to transition into a senior office manager role where she can lead process‑improvement initiatives across multiple clinics in the Portland metropolitan area. She plans to earn
    the Certified Medical Administrative Assistant (CMAA) credential and deepen her knowledge of health informatics to spearhead the adoption of new digital tools that enhance patient experience. Over the
    next five years, she hopes to mentor younger administrative staff, serve on a regional healthcare advisory board, and eventually consult part‑time for small practices seeking efficiency upgrades.
