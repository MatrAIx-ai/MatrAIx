  career_goals: Joan aims to advance to a supervisory role as a parts department manager within the next three years, taking on responsibilities for staff training, vendor relationships, and inventory optimization.
    She plans to earn a professional certification, such as the Automotive Service Excellence (ASE) Parts Specialist credential, and to complete a GED program to enhance her formal qualifications. In the
    longer term, she envisions opening a small independent auto‑parts boutique that emphasizes personalized service and carries a curated selection of specialty parts for classic and modern vehicles. Simultaneously,
    she seeks to improve her work‑life balance, reduce stress through better time‑management practices, and develop coping strategies—like mindfulness and journaling—to manage her tendency toward worry.
    Financially, she hopes to secure a stable retirement plan and contribute to her children's college funds.
