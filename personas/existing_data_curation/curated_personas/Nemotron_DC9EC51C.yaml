personas:
  professional: A budding robotics engineer, Cornelius Clifton channels his curiosity and methodical nature into building and programming VEX kits, leading his school's robotics club while balancing schoolwork,
    drum practice, and strategic gaming.
  sports: A competitive point‑guard for his middle‑school basketball team, Cornelius Clifton idolizes the Detroit Pistons and follows the Michigan State Spartans, training on the community gym’s early‑morning
    courts while also logging weekend hikes on the Cranberry Lake trail to boost endurance.
  arts: An enthusiastic drummer in the school band, Cornelius Clifton favors playing classic rock anthems by Foo Fighters and vintage jazz solos by Miles Davis, spends weekends dissecting the soundtrack
    design of Civilization, and attends the Detroit Repertory Theatre’s youth productions whenever his schedule permits.
  travel: A planner who loves mixing road trips with spontaneous roadside stops, Cornelius Clifton has road‑tripped to Ann Arbor for a science fair, camped on Mackinac Island’s bike paths during a summer
    break, and longs to explore the Canadian‑border city of Windsor for its lakeside festivals.
  culinary: A self‑taught teen cook, Cornelius Clifton loves mastering the perfect mac‑and‑cheese with sharp cheddar, experimenting with homemade chicken teriyaki sushi rolls, and perfecting a secret cinnamon‑sugar
    popcorn recipe he shares at after‑school club meetings.
  core: Cornelius Clifton blends a strategic mind, relentless organization, and a quiet competitive streak into every project, from robotics to drumming, while juggling teen habits like obsessive spreadsheet‑keeping
    and occasional snack‑laden gaming marathons.
background:
  cultural: Cornelius grows up in a middle‑class, suburban white family in Commerce Township, Michigan, an area characterized by Midwestern values of hard work, community involvement, and proximity to the
    automotive industry. His family places a strong emphasis on education, practical skills, and participation in school clubs, sports, and extracurricular STEM activities. He celebrates typical American
    holidays while also engaging in local traditions such as community fairs and county‑organized youth programs, reflecting the region's blend of modesty, self‑reliance, and communal support.
