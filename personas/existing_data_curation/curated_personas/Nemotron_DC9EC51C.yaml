    (Sudoku, logic puzzles)'', ''Chess club'', ''Hiking on local trails'']'
  career_goals: Cornelius aims to pursue a career in engineering, with a particular interest in mechanical or robotics engineering. He plans to attend a high‑performing high school that offers strong STEM
    programs, earn an engineering degree from a reputable university, and ultimately work for an automotive or technology company in Michigan—such as Ford, General Motors, or a robotics firm—designing innovative,
    efficient automation solutions. He also hopes to compete in FIRST Robotics and eventually lead a team as project manager or captain, securing scholarships through his technical achievements.
