  career_goals: Alexandra aims to advance into a senior finance supervisory role within the next five years, leveraging her deep billing knowledge to lead a team of clerks and oversee the entire accounts
    payable/receivable cycle. She plans to obtain the Certified Billing Specialist (CBS) credential and pursue coursework toward a Certified Management Accountant (CMA) designation. Her long‑term ambition
    includes shaping organizational policies that streamline financial workflows and enhance cross‑departmental harmony. Alexandra also hopes to mentor younger employees, champion workplace wellness initiatives,
    and eventually transition to a finance manager position where she can blend her analytical expertise with her passion for fostering collaborative, supportive work environments.
