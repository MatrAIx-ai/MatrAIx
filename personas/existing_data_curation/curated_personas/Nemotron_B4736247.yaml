personas:
  professional: Trevor Ngo is a veteran inventory and shipping operations specialist who leverages deep expertise in NetSuite, SAP WM, and advanced Excel macros to audit stock levels, while their vivid
    imagination and relentless skepticism drive continuous‑improvement initiatives that blend Lean‑Six‑Sigma rigor with artistic visualizations, making their reports as insightful as a watercolor sketch.
  sports: Trevor Ngo enjoys solitary trail runs through Redwood groves and occasional weekend kayaking on the Pacific coast, follows the San Francisco Giants and Golden State Warriors from the comfort of
    their home, and maintains a modest membership in a local hiking club that meets for sunrise climbs.
  arts: Trevor Ngo immerses themselves in speculative fiction by Ted Chiang and Neal Stephenson, draws visual inspiration from abstract painter Mark Rothko and multimedia artist Refik Anadol, and curates
    a playlist of Björk, Miles Davis, and ambient soundscapes for late‑night digital illustration sessions.
  travel: Trevor Ngo favors meticulously planned solo trips that blend photography and quiet contemplation, having captured the misty forests of Oregon’s Coast Range, the sunrise over Angkor Wat, and the
    intricate canals of Venice, while dreaming of a future pilgrimage to the cherry‑blossom valleys of Hokkaido.
  culinary: Trevor Ngo, an adept home chef, experiments with Southeast Asian flavors by infusing pho broth with charred star anise and kaffir lime, perfects bánh mì with house‑made pickled daikon, and frequently
    decorates plates with microgreens and edible flowers, treating each dish as a canvas for their artistic palate.
  core: Trevor Ngo is a solitary, imagination‑driven logistician who balances data‑driven precision with a restless artistic curiosity, often losing track of time while sketching, yet occasionally hoarding
    obscure art supplies and skipping social calls.
background:
  cultural: Trevor was born and raised in the San Francisco Bay Area to Vietnamese immigrant parents. His household preserved Vietnamese customs such as Tet celebrations, family‑cooked pho, bánh mì, and
    traditional music. He grew up bilingual, speaking Vietnamese at home while attending English‑language schools, and he participated in local cultural festivals that showcased Southeast Asian art and
    cuisine. The multicultural environment of Greenbrae and Marin County exposed him to a variety of artistic influences, which he blends with traditional motifs in his own artwork. His cultural heritage
    fuels his respect for diligent work, communal responsibility, and a love of food, while also inspiring the abstract aesthetic themes that appear in his paintings and digital designs.
attributes:
  skills: '["Inventory Management", "Warehouse Management Systems (WMS)", "Advanced Excel (pivot tables, macros)", "Process Optimization (Lean, Six Sigma)", "Shipping Documentation & Compliance", "Forklift
