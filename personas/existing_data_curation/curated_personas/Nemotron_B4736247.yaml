  hobbies: '["Watercolor Painting", "Digital Illustration", "Speculative Fiction Reading", "Philosophy & Abstract Concept Exploration", "Macro Nature Photography", "Scale Model Ship Building", "Arduino
    Home Automation Projects", "Meditation & Mindfulness", "Southeast Asian Cooking", "Puzzle Solving (Crosswords, Sudoku)"]'
  career_goals: Trevor aims to transition from a clerk role to a senior inventory analyst or logistics manager within the next three years, leveraging his hands‑on experience to lead a small team and oversee
    process automation initiatives such as RFID tagging and AI‑driven demand forecasting. He plans to earn the APICS Certified In Production and Inventory Management (CPIM) credential to solidify his expertise.
    In the longer term, Trevor hopes to merge his logistical acumen with his artistic passion by launching a boutique e‑commerce brand that sells limited‑edition prints and handcrafted Southeast Asian‑inspired
    home décor, handling the entire supply chain himself. He also wants to mentor younger employees, fostering a culture of data‑driven continuous improvement.
