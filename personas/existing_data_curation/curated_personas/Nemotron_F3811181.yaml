    conflict mediation'', ''Adaptability and improvisation'']'
  hobbies: '[''Woodworking'', ''DIY electronics tinkering'', ''Vegetable gardening'', ''Bicycle riding around Indianapolis'', ''Attending Indianapolis Colts games'', ''Playing acoustic guitar'', ''Homebrewing
    beer'', ''Reading science and technology magazines'', ''Volunteer work at community garden'', ''Fishing'']'
  career_goals: Michael aims to turn his practical skills into a small, flexible home‑based handyman business that can generate steady supplemental income while allowing him to stay present for his family.
    He plans to earn his GED within the next year and pursue a vocational certification in electrical or HVAC work to formalize his expertise. Building a modest portfolio of custom wooden furniture for
    local buyers is also a goal, as is becoming a regular volunteer for community improvement projects in Indianapolis. Ultimately, he seeks financial stability and the freedom to balance work, family,
    and personal curiosity.
