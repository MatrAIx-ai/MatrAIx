personas:
  professional: Michael Clements, a 38‑year‑old self‑taught handyman, blends a knack for woodworking, DIY electronics, and basic electrical and plumbing repairs with a laid‑back yet adaptable approach,
    allowing them to turn their curious practicality into a flexible home‑based service that balances family time with opportunistic projects.
  sports: Michael Clements enjoys casual fitness through weekend bicycle rides with the Indianapolis Cycling Club, follows the Indianapolis Colts during NFL season, cheers on the Indiana Pacers when basketball
    rolls around, and they unwind by fishing with friends, balancing a relaxed approach to exercise with an appreciation for local team spirit.
  arts: Michael Clements channels creative energy by strumming acoustic renditions of Led Zeppelin, The Rolling Stones, and Pink Floyd at home, attending classic‑rock concerts whenever possible, and they
    occasionally apply the same hands‑on enthusiasm to crafting handcrafted furniture that doubles as functional art.
  travel: Michael Clements prefers low‑key, self‑planned road trips that blend outdoor adventure with craft‑brew exploration, often cycling to the Indiana Dunes for a weekend trek, driving to Nashville
    for live music, and they are penciling in a future drive‑through of Portland’s renowned beer scene when family finances allow.
  culinary: Michael Clements, an adept DIY chef, enjoys brewing a seasonal IPA using fresh hops and malt while also whipping up grilled vegetable kebabs, smoked chicken wings, and heirloom tomato salads
    seasoned with basil and smoked paprika, and they often pair these meals with home‑brewed beer and an occasional take‑out from the local burger joint.
  core: Michael Clements balances a curious handyman’s love for building and tinkering with a laid‑back, sometimes disorganized lifestyle that revels in classic rock, craft beer, and weekend bike rides,
    while they navigate a modest budget and a tendency to procrastinate on paperwork.
background:
  cultural: Michael grew up in the Midwest, shaping a cultural identity rooted in practical self‑reliance, modesty, and community engagement. His family traditions emphasize a strong work ethic, hands‑on
    problem solving, and appreciation for classic American pastimes such as sports, home‑cooked meals, and outdoor recreation. Living in Indianapolis, he is exposed to a blend of blue‑collar and emerging
    tech influences, fostering an adaptable outlook. While his white Midwestern background reflects a relatively homogeneous cultural environment, he values the growing diversity of his city and incorporates
    inclusive community values into his volunteer activities.
attributes:
