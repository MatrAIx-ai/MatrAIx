personas:
  professional: Jean Wilds is a seasoned teaching assistant in a Henderson elementary school, and they are known for meticulous organization, adept use of educational technology, and a disciplined work
    ethic that fuels their ambition to become a lead assistant and eventually a certified teacher focusing on inclusive pedagogy.
  sports: Jean Wilds enjoys casual weekend hikes in Red Rock Canyon, plays in a local co‑ed softball league, and roots for the Las Vegas Raiders and the Vegas Golden Knights, balancing low‑impact exercise
    with a love for team spirit and community camaraderie, while they often cheer loudly at games.
  arts: Jean Wilds spends evenings knitting scarves for charity while listening to Bob Dylan and classical piano recitals, participates in a historical nonfiction book club that reads works by Doris Kearns
    Goodwin, and volunteers at the Henderson Little Theatre, letting the arts enrich their structured life, and they find solace in each stitch.
  travel: Jean Wilds prefers meticulously planned road trips to natural wonders like the Grand Canyon and Yellowstone, enjoys occasional European history tours to Rome and Edinburgh, but balances these
    adventures with family responsibilities and a modest travel budget, often using the same reusable garden tote for gear, and they always keep a detailed itinerary in their notebook.
  culinary: Jean Wilds loves cooking classic family dishes such as roast chicken with sage‑infused potatoes and apple crumb pie, incorporates fresh garden harvests like heirloom tomatoes and rosemary, and
    boasts a solid skill set in baking that they share at neighborhood potlucks, though they sometimes over‑salt in a quest for the perfect flavor.
  core: Jean Wilds, a disciplined 52‑year‑old educator, blends a love of order with garden‑to‑table cooking, puzzle‑solving, and community knitting, always planning the next lesson, budget, or stitch while
    never missing a deadline, and they proudly wear their habit of double‑checking every detail.
background:
  cultural: Jean Marie comes from a White American background rooted in a Midwestern small‑town upbringing, where values of hard work, community involvement, and respect for tradition were emphasized. After
    moving to Henderson, Nevada, she has embraced the region’s blend of Southwestern culture and rapid growth, while preserving her family‑centered, middle‑class ethos. Her cultural experiences reflect
    a balance of mainstream American educational values and an appreciation for the diverse perspectives encountered in Clark County’s multicultural school environment.
