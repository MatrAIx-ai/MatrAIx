  career_goals: Jean Marie aims to transition into a lead teaching assistant role within the next two years, where she can mentor newer staff and spearhead school‑wide organizational initiatives. She plans
    to earn a teaching credential and ultimately become a certified elementary teacher, focusing on inclusive pedagogy and curriculum development. Long‑term, she envisions contributing to district‑level
    professional development programs, sharing best practices for classroom efficiency and student support, while also preparing for a smooth transition into retirement by establishing a part‑time tutoring
    consultancy that leverages her extensive experience.
