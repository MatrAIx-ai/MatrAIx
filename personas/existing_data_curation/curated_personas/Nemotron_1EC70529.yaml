  career_goals: Martha aims to transition her extensive informal experience into a formal leadership role within her community. Over the next few years she plans to become the president of the local community
    center, launch a small home‑based catering service specializing in traditional Kentucky comfort food, and obtain a certification in early‑childhood education to volunteer as a reading mentor. She also
    hopes to spearhead a neighborhood garden initiative that provides fresh produce to families and to run for a seat on the Edmonson County planning commission, where she can influence local development
    while preserving the town’s historic character.
