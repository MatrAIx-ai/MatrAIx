personas:
  professional: Martha Allgood is a community‑focused organizer who leverages budgeting, event‑planning, and first‑aid expertise to lead the local community center’s programs while eyeing a future role
    on the Edmonson County planning commission and launching a home‑based catering business that showcases traditional Kentucky comfort food.
  sports: Martha Allgood enjoys cheering on the University of Kentucky Wildcats men’s basketball in winter, attending Louisville Cardinals baseball games in summer, and playing in the Edmonson County co‑ed
    softball league while maintaining a weekday walking routine through their garden and local park.
  arts: Martha Allgood leads a church choir that performs gospel classics by Mahalia Jackson and contemporary hits by Dolly Parton, stitches quilts inspired by Faith Ringgold’s storytelling, and immerses
    themselves in historical novels by Hilary Mantel and Ken Follett, all of which intertwine with their genealogical pursuits.
  travel: Martha Allgood prefers structured weekend getaways that blend history and nature, such as guided tours of Mammoth Cave National Park, a culinary weekend in Nashville, and a heritage walk through
    Savannah’s historic district, planning each trip with a detailed itinerary and a modest budget while occasionally longing for a longer cruise in the Caribbean.
  culinary: Martha Allgood excels at preparing Southern comfort dishes like fried chicken, collard greens, and hearty burgoo, and bakes signature apple‑cinnamon pies using garden‑grown apples and home‑grown
    butter, often incorporating fresh herbs such as sage and thyme into their recipes.
  core: Martha Allgood is a routine‑driven, sociable community catalyst who blends meticulous organization with a competitive edge, turning every garden, quilt, and choir rehearsal into a platform for leadership,
    all while juggling a penchant for couponing and occasional dental procrastination.
background:
  cultural: Martha grew up in the rural foothills of Kentucky, immersed in a Southern Appalachian cultural milieu that values family, hospitality, and community. Her upbringing emphasized practical skills,
    religious participation, and a respect for local traditions such as church potlucks, county fairs, and storytelling. While she embraces these heritage norms, she also adapts them to contemporary life,
    using modern tools like social media to keep neighbors connected. Her cultural identity blends a strong sense of place—with deep roots in Edmonson County’s farming and small‑town life—and an openness
    to fostering change through organized community efforts.
