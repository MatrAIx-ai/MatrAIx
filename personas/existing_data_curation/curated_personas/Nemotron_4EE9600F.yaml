  hobbies: '[''Yoga'', ''Trail Running'', ''Hiking'', ''Watercolor Painting'', ''Visiting Art Galleries'', ''Attending Indie Music Shows'', ''Cooking Healthy Meals'', ''Volunteering at Community Health
    Fairs'', ''Journaling'', ''Reading Contemporary Fiction'', ''Listening to Podcasts on Psychology and Fitness'', ''Participating in Small‑Group Craft Circles'']'
  career_goals: Jill aims to deepen her expertise by earning a Certified Strength and Conditioning Specialist (CSCS) credential and completing a bachelor's degree in Exercise Science. In the next five years
    she hopes to open a boutique studio in Toledo that blends physical training with artistic experiences—offering classes such as Canvas & Cardio and Music‑Driven Movement. She also aspires to develop
    a community outreach program that provides free fitness workshops for underserved youth and seniors, and to become a recognized speaker at regional wellness conferences, advocating for the integration
    of creative expression and exercise to promote mental well‑being.
