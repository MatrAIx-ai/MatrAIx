  hobbies: '[''Basketball'', ''LEGO building'', ''Scratch coding'', ''Listening to blues and hip hop'', ''Reading science books'', ''Exploring nature'', ''Drawing comics'']'
  career_goals: James dreams of one day designing his own robots and becoming an engineer who creates gadgets that make everyday life easier for his community. At the same time, he aspires to earn a scholarship
    to play college basketball, hoping to combine his love for technology and sports by developing smarter training equipment for athletes. His competitive streak fuels his ambition to excel both in the
    lab and on the court, while his practical curiosity pushes him to seek real‑world solutions.
