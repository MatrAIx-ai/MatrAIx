personas:
  professional: A budding junior programmer and designer, James Stewart channels curiosity and practicality into building simple games and animations in Scratch, while their competitive, skeptical nature
    drives them to troubleshoot code and perfect LEGO creations with methodical precision.
  sports: James Stewart dominates pickup basketball at the neighborhood park, idolizing the Chicago Bulls and emulating LeBron James’s moves, while also joining the local youth league as a point guard and
    spending weekends hiking the nearby Oak Ridge trail to keep stamina.
  arts: James Stewart draws comic strips about superhero inventors inspired by the storytelling flair of Stan Lee and the rhythmic beats of B.B. King’s Memphis blues, while also humming modern hip‑hop tracks
    from Kendrick Lamar during LEGO building sessions.
  travel: James Stewart dreams of a road trip to the Kennedy Space Center in Florida, and already explores nearby nature trails like the Pine Creek Loop, balancing a love of local adventure with the ambition
    to someday see the Aurora Borealis in Norway.
  culinary: James Stewart prefers classic mac and cheese and chicken nuggets but often experiments by adding in crunchy LEGO‑themed pretzel sticks, enjoys the tang of Buffalo wing sauce on pizza, and occasionally
    requests a blueberry smoothie after reading about space food on NASA’s website.
  core: James Stewart blends a restless curiosity with a competitive streak, turning every game, LEGO set, and comic into a challenge while worrying about the little things that most kids ignore.
background:
  cultural: James grows up in a close‑knit African American family in South Memphis, where church gatherings, family barbecues, and community events are central to his life. He is surrounded by the rich
    musical heritage of the city—blues, soul, and hip‑hop are part of his daily soundtrack. Family traditions include cooking soul food like fried catfish, collard greens, and cornbread, and storytelling
    that links past generations to the present. The local library's STEM programs and the neighborhood youth basketball league provide supportive spaces that nurture his curiosity, competitiveness, and
    sense of belonging.
