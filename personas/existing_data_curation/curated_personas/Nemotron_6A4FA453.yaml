  hobbies: '["Gardening","Birdwatching","Quilting","Reading historical novels","Volunteer work at senior center","Water aerobics","Playing bridge","Cooking Southern dishes","Attending church choir","Participating
    in local history tours"]'
  career_goals: Edna’s primary ambition is to remain an active, supportive presence in her community. She aims to expand the local senior‑center garden project, train younger volunteers in event planning
    and caregiving, and help document oral histories of Beaufort County’s Lowcountry heritage. She also hopes to maintain her health through regular water aerobics, deepen her spiritual practice through
    church involvement, and travel to visit her grandchildren across the region, while continuing to learn new gardening techniques and health‑focused cooking methods.
