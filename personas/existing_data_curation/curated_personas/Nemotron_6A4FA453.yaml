personas:
  professional: A community volunteer coordinator who skillfully blends horticultural expertise with event planning, Edna Chen leverages their methodical organization, compassionate nature, and digital
    savvy to orchestrate senior‑center garden projects and heritage‑preserving gatherings.
  sports: A low‑impact fitness enthusiast, Edna Chen participates in water‑aerobics at the senior center, enjoys leisurely walks through marshes, follows the Carolina Panthers and the Charleston Battery,
    and they stay active by cheering games on television while tending to their garden.
  arts: An avid lover of Southern musical heritage, Edna Chen spends afternoons crocheting to the sounds of Patsy Cline and Dolly Parton, sings gospel hymns in the church choir, reads the works of Hilary
    Mantel and Maya Angelou, and they draw inspiration for quilting patterns.
  travel: An intergenerational traveler, Edna Chen plans trips with a blend of spontaneity and careful budgeting, visiting grandchildren in Savannah and Charleston, while dreaming of a sun‑kissed week on
    the Outer Bays Islands, and they prefer short drives over long flights to stay comfortable.
  culinary: A seasoned Southern cook, Edna Chen whips up shrimp and grits with a health‑focused twist—using brown rice and low‑fat sausage—while seasoning with fresh okra, collard greens, and a dash of
    lemon, and they love sharing peach cobbler at community potlucks.
  core: Edna Chen, a 76‑year‑old quilt‑loving garden steward, blends meticulous organization with heartfelt community service, often humming classic country tunes while coaxing marsh birds into their backyard,
    and they never miss a chance to share a fresh batch of biscuits.
background:
  cultural: Edna grew up in a traditional Southern white family in the Lowcountry of South Carolina, where church, family, and community hospitality were central values. The rhythm of coastal life, including
    seasonal fishing, shrimping, and the preservation of Gullah‑influenced culinary traditions, shaped her appreciation for regional culture. Though rooted in these traditions, Edna’s curiosity has led
    her to explore broader cultural experiences through travel, reading, and intergenerational friendships, allowing her to blend respect for her heritage with an openness to new ideas.
