personas:
  professional: Long Hairston is a retired civil engineer who now channels decades of structural analysis, project management, and data visualization expertise into mentoring youth, volunteering at the
    local museum, and drafting community infrastructure proposals, and they balance curiosity with practicality in every endeavor.
  sports: Long Hairston enjoys low‑impact fitness through morning walks along the Pee Dee River, follows the Carolina Panthers and the Charlotte Hornets on television, participates in weekly chess tournaments
    at the community center that double as cognitive sport, and they play badminton with a local senior club where camaraderie outweighs competition.
  arts: Long Hairston finds solace in classic jazz, regularly listening to albums by Miles Davis, John Coltrane, and Ella Fitzgerald while woodworking, attends seasonal performances at the historic Hartsville
    theater, and they appreciate both Shakespearean productions and contemporary Southern folk music groups.
  travel: Long Hairston favors thoughtful road trips that blend natural scenery with historic sites, recently driving the Blue Ridge Parkway to savor its vistas, planning a future visit to Savannah’s historic
    district, and they prefer modest B&Bs that allow time for sketching local architecture.
  culinary: Long Hairston cooks Southern comfort foods such as shrimp and grits, collard greens seasoned with smoked ham hocks, and pecan pie, experimenting with heirloom sweet potatoes and fresh okra from
    their garden, and they often accompany meals with sweet tea brewed from loose‑leaf black tea.
  core: Long Hairston blends a lifelong engineer’s precision with a gardener’s patience, sprinkling their days with jazz, birdwatching, and a stubborn habit of over‑organizing their bookshelf by publication
    date, and they never miss their morning cup of coffee before tending the garden.
background:
  cultural: Long Kimani Hairston was born and raised in Hartsville, SC, within a close‑knit African American community that values resilience, family ties, and faith. Growing up during the civil‑rights
    movement, he witnessed both the challenges and the collective strength of his neighbors, shaping his pragmatic yet hopeful outlook. His cultural heritage is steeped in Southern Black traditions, including
    church participation, oral storytelling, and culinary customs passed down through generations. While his family has roots in the Gullah culture of the coastal Lowcountry, Long embraces a blend of regional
    influences, honoring the legacy of Black engineers, educators, and activists who paved the way for his own academic and professional pursuits.
