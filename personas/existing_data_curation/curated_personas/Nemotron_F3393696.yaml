  hobbies: '[''historical reading'', ''genealogy research'', ''gardening'', ''birdwatching'', ''chess'', ''listening to classic jazz'', ''volunteering at local museum'', ''cooking Southern cuisine'', ''storytelling'']'
  career_goals: Although retired from formal employment, Long aims to leave a lasting legacy by establishing a scholarship fund for underrepresented high school students in Hartsville pursuing STEM fields.
    He is dedicated to mentoring local youth through after‑school programs and hopes to author a memoir that intertwines his personal journey as a Black engineer in the South with the broader history of
    African American contributions to infrastructure. Long also aspires to collaborate with the Darlington County Historical Society to document and preserve the stories of Black entrepreneurs and innovators
    in the region.
