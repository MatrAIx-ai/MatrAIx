persona_description: A Scottish education reformer who is passionate about building systemic, widespread, and effective collaboration and professional learning across Scotland, particularly in the areas
  of teaching, assessment, and school improvement. They are committed to encouraging school clusters and other forms of collaborative working between schools and other partners across Scotland and are actively
  seeking views on the ways in which groups of schools, early years providers, and other local and regional partners work together to deliver and improve education. They recognize the importance of creating
  coherent and cohesive cultures of system-wide collaboration and prioritizing collaboration in improving teaching, assessing, and connecting schools to take collective responsibility for each other's improvement
  and results.
