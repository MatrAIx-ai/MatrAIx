personas:
  professional: Federico Luna, a 16‑year‑old budding muralist and visual artist, blends hand‑drawn sketches, digital illustrations using free tools like Krita, and bilingual communication to create community‑focused
    art projects that celebrate local traditions, channeling their curiosity, organizational flexibility, and cooperative spirit into every commission.
  sports: Federico Luna, an occasional pickup‑basketball participant who avidly follows the Milwaukee Bucks and attends Brewers spring training when possible, maintains a light fitness routine of lakefront
    jogging and daily stretching to sustain stamina for long sketching sessions, balancing a relaxed approach to exercise with a love for local team spirit.
  arts: Federico Luna immerses themselves in sketching downtown Milwaukee’s urban scenes and crafting digital illustrations inspired by the vibrant murals of local artist Jaune Jones, while listening to
    a mix of folk singer Lila Downs and indie rock band The Strokes, regularly attending youth workshops at the Milwaukee Art Museum and documenting street art with a phone camera, all of which shape a
    distinctive, culturally resonant artistic identity.
  travel: Federico Luna prefers loosely planned weekend road trips that combine art exhibitions with family gatherings, having explored Detroit’s mural districts, Santa Fe’s historic art colonies, and dreaming
    of a solo backpacking adventure through Berlin’s street‑art corridors and Portugal’s sun‑kissed Algarve coast.
  culinary: Federico Luna, an enthusiastic home cook with intermediate skill, loves preparing family‑style corn tamales filled with seasoned pork, simmered mole sauce rich with dried chilies and chocolate,
    alongside freshly made guacamole, while also indulging in pepperoni pizza from the neighborhood pizzeria and experimenting with avocado toast topped with feta, lime, and a drizzle of hot sauce.
  core: Federico Luna is a curious, organized yet flexible 16‑year‑old artist who bridges community traditions and modern expression through murals, sketches, and digital art, while juggling a modest budget,
    mild allergies, and a penchant for spontaneous creativity.
background:
  cultural: Federico is a second‑generation Mexican American whose parents immigrated from Jalisco. Raised in a bilingual household in Milwaukee’s south side, he grew up celebrating Mexican holidays such
    as Día de los Muertos and Navidad while also partaking in Midwestern customs like summer barbecues and local sports events. Family gatherings emphasize respect, teamwork, and mutual support (familismo),
    which shape his cooperative nature. At the same time, his daily life is infused with the city’s diverse cultural landscape—interacting with peers from various backgrounds, navigating a public school
    system, and attending community arts programs that highlight both Mexican and American artistic traditions.
attributes:
  skills: '[''Sketching and charcoal drawing'',''Digital illustration with free software (Krita, GIMP)'',''Basic photography and composition'',''Bilingual communication (Spanish/English)'',''Basic HTML/CSS
    coding'',''Organizational planning for personal projects'']'
  hobbies: '[''Sketching urban landscapes'',''Playing acoustic guitar'',''Listening to Mexican folk and indie music'',''Visiting Milwaukee Art Museum exhibitions'',''Participating in Día de los Muertos
    events'',''Cooking traditional Mexican dishes'',''Reading graphic novels'',''Photographing street art'']'
  career_goals: Federico hopes to complete his high‑school equivalency within the next two years and then enroll in a community college program focused on graphic design or visual arts. He envisions a career
    that blends creativity with community service—such as becoming a muralist who creates public art reflecting Mexican heritage in Milwaukee, or a cultural arts coordinator who organizes workshops for
    local youth. Long‑term, he aspires to use his artistic voice to promote cultural understanding and provide mentorship for other young people navigating similar educational challenges.
