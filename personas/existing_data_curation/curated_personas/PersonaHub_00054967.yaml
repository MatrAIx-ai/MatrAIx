persona_description: A historian who specializes in the study of medieval and early modern Europe, focusing on the role of craftsmen in the growth of population and the emergence of different professions.
  Their research interests include the economic, social, and cultural factors that influenced the development of craft guilds and the way they operated, as well as the impact of these guilds on the economy
  and society. They are particularly interested in the daily lives of craftsmen, their work, the tools and materials they used, and the locations where they worked.
