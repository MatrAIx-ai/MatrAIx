  hobbies: '[''Painting'', ''Ceramics'', ''Visiting Art Museums'', ''Jazz and Blues Music'', ''Community Theater Participation'', ''Gardening'', ''Cooking Fusion Cuisine'', ''Reading Contemporary Fiction'',
    ''Traveling to Cultural Festivals'', ''Hiking'']'
  career_goals: Turkessia aims to transition into school leadership, seeking a department‑head or assistant‑principal role where she can champion interdisciplinary arts integration and culturally responsive
    curricula. She plans to pursue a doctorate in Education Leadership to deepen her impact on district‑wide policy and to author articles on innovative teaching practices. Additionally, she aspires to
    become a mentor for emerging educators and to collaborate with local arts organizations on after‑school programs that broaden students' creative horizons.
