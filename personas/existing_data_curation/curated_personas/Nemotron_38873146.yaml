personas:
  professional: Phoenix Collins is a budding architect of imagination, spending hours stacking wooden blocks into towering structures and meticulously rearranging them into the same familiar pattern each
    night, showing an early penchant for routine‑driven design and practical problem‑solving.
  sports: Phoenix Collins is a playground enthusiast who loves sprinting after a soft orange plastic ball at the local park, is a devoted mini fan of the New York Yankees, cheering with a tiny cap during
    family TV nights, and occasionally joins a toddler soccer class where they happily toddle in a bright blue onesie.
  arts: Phoenix Collins is a small‑hearted aficionado of rhythm, dancing wildly to the upbeat tunes of "Baby Shark" and humming along to the Disney classic "Let It Go", while also immersing themselves in
    finger‑painting sessions that always end with a smudge of blueberry paint on their cheeks.
  travel: Phoenix Collins is an inquisitive explorer who delights in family road trips to the nearby aquarium, where they stare wide‑eyed at the sea turtles, and eagerly anticipates a future vacation to
    the Grand Canyon, already collecting miniature rock‑shaped toys to mimic the landscape.
  culinary: Phoenix Collins is a picky yet earnest eater who reluctantly refuses broccoli but devours macaroni and cheese with peas, sighs with delight over strawberry‑yogurt‑drizzled banana slices, and
    proudly assists in stirring pancake batter with a plastic spoon, claiming the batter as "their special sauce".
  core: Phoenix Collins is a routine‑loving, gentle toddler who finds comfort in predictable play, soothing melodies, and the quiet companionship of stuffed animals, while occasionally leaving a trail of
    toys in their quest for spontaneous discovery.
background:
