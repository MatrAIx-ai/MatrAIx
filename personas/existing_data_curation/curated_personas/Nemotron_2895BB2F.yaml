  hobbies: '[''Reading chapter books (mysteries, adventure)'', ''Keeping a personal journal'', ''Sketching and drawing'', ''Solving jigsaw puzzles'', ''Beginner Sudoku'', ''Building Lego sets'', ''Gardening
    (planting tomatoes)'', ''Walking the family dog'', ''Participating in small church youth group activities'']'
  career_goals: Donna aims to pursue a career that offers clear structure and the opportunity to help others in a predictable setting. She dreams of becoming a veterinarian because she loves animals and
    enjoys the routine of caring for them, or alternatively a librarian where she can organize books and maintain a calm learning environment. In the short term, she focuses on maintaining good grades and
    strengthening her organizational skills to build confidence and manage her worries, with the long‑term ambition of studying veterinary science or library science.
