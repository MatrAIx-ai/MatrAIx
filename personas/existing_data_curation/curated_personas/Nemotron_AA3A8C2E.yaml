personas:
  professional: A budding game designer, Gustavo Govantes, leverages Scratch to build interactive stories, blending curiosity with disciplined planning, and enjoys presenting his projects to classmates,
    often taking the spotlight as the enthusiastic narrator.
  sports: Gustavo Govantes shines as a forward on the neighborhood U-8 soccer squad, the River Valley Rangers, where his disciplined drills echo the style of world-class forwards like Lionel Messi, and
    in the off-season he practices basketball with the junior Thunderbolts while cheering for the city’s professional team, the Metro Eagles.
  arts: Gustavo Govantes expresses creativity through salsa dancing at family gatherings, echoing the smooth moves of Celia Cruz, while devouring adventure books by J.K. Rowling and Roald Dahl, and channeling
    the excitement of those stories into hand-drawn comic strips of heroic LEGO robots, all of which fuel his passion for imaginative performance and storytelling.
  travel: Gustavo Govantes enjoys weekend trips to the nearby mountain nature reserve, has explored the historic cobblestone streets of the local colonial town during a school field trip, and daydreams
    about trekking the Andes' high peaks one day and later visiting the magical castles of Disney World in Florida.
  culinary: Gustavo Govantes assists with preparing traditional arepas and empanadas, mastering the art of shaping cornmeal dough and folding golden pastry, while also delighting in making cheesy pizza
    slices topped with pepperoni, and cherishes the aroma of melted mozzarella and sweet guava jam on his homemade desserts.
  core: Gustavo Govantes is a hyper-organized, talkative eight-year-old who blends curiosity with discipline, loves leading soccer games and LEGO builds, and never misses a chance to be the life of the
    party, even if it means occasionally forgetting homework for a dance rehearsal.
background:
  cultural: Gustavo is a first-generation Colombian-American raised in a bilingual household in Charlottesville, Virginia. His parents immigrated from Medellin and maintain Colombian traditions such as
    Spanish language use at home, salsa music and dance, and cooking dishes like arepas and empanadas. He attends a public elementary school where he blends Southern hospitality with his Colombian heritage,
    participates in local Latino festivals, enjoys soccer - a passion shared by both cultures - and takes pride in sharing his cultural background with friends and classmates.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Advanced reading comprehension'', ''Elementary arithmetic skills'', ''Scratch visual programming'', ''Classroom leadership and organization'',
