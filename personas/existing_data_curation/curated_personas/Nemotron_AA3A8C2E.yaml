  hobbies: '[''Playing soccer'', ''Salsa dancing'', ''LEGO building'', ''Scratch coding'', ''Reading adventure and science books'', ''Board games'', ''Cooking Colombian dishes with family'', ''Participating
    in school events'', ''Nature walks'']'
  career_goals: Gustavo aspires to become a scientist or engineer who creates sustainable solutions for his community, while also dreaming of becoming a teacher who helps younger students discover a love
    of reading and learning. He aims to consistently achieve top grades, win his school's science fair, serve as student council president, and later pursue a degree in engineering with a focus on renewable
    energy, all while staying connected to his cultural roots and encouraging community projects that celebrate Colombian heritage.
