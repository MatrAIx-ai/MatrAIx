  hobbies: '[''Landscape painting'', ''Nature photography'', ''Woodworking with Mexican motifs'', ''Cooking traditional Mexican cuisine'', ''Hiking'', ''Reading architecture and art books'', ''Visiting
    local art galleries'', ''Volunteer home‑repair work'', ''Mindfulness journaling'']'
  career_goals: Gilberto aims to transition from physically demanding labor to a supervisory and design‑focused role. He plans to earn a foreman certification through NCCER and become an OSHA trainer, positioning
    himself as a safety officer for local contractors. Simultaneously, he wishes to launch a boutique woodworking business that blends modern construction techniques with Mexican folk motifs, creating bespoke
    furniture for the Pacific Northwest market. Gilberto also hopes to mentor younger workers, fostering a harmonious and supportive work environment, while gradually reducing his on‑site workload to better
    manage his anxiety and maintain emotional well‑being.
