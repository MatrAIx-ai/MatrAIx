  career_goals: Maria aims to move from cashier to shift supervisor within the next two years, leveraging her competitive drive to lead a team and improve store performance. She plans to enroll in a community
    college night program to earn an associate degree in business administration, which will help her eventually open a small convenience store that blends Mexican and Texan flavors. Flexibility remains
    key; she prefers roles that allow her to set her own schedule and maintain a quiet work environment where she can focus on operational efficiency.
