personas:
  professional: Vivian Ingram is a budding community organizer who channels their love of structure and compassion into coordinating the youth food-bank drives at their church, meticulously planning each
    event and ensuring every volunteer knows their role.
  sports: Vivian Ingram plays forward on the middle school soccer team, cheers for the U.S. women's national soccer team and follows Manchester United, and spends Saturdays at the local community center's
    youth fitness club where they blend cardio drills with strategic game-planning sessions.
  arts: Vivian Ingram devotes evenings to piano practice, often working through Mozart's Sonata in C major and humming along to the soundtracks of "Harry Potter" by John Williams, while also immersing themselves
    in fantasy series by J.K. Rowling and crafting friendship bracelets inspired by the colors of their favorite "Taylor Swift" album covers.
  travel: Vivian Ingram dreams of exploring the castles of Scotland's Highlands after a summer road trip to the Grand Canyon, and they meticulously plan family vacations using printable itineraries, balancing
    adventure hikes with frequent stops for local ice-cream shops.
  culinary: Vivian Ingram loves snacking on fresh cherry tomatoes from the garden, whipping up banana-oat smoothies with honey, and they occasionally indulge in pepperoni pizza, while their cooking skill
    hovers at middle-school level—able to roast vegetables but still prone to burning toast.
  core: Vivian Ingram combines a notebook-filled agenda, a heart for community service, and a habit of over-planning every school project, all while secretly hoarding glitter pens for late-night journaling.
background:
  cultural: Vivian grew up in Terrell, a small rural community in Catawba County, North Carolina. Her family reflects the region’s traditional Southern values—strong emphasis on family togetherness, church
    participation, and community service. She is raised in a predominantly white, close‑knit neighborhood where local customs include church gatherings, school sports events, and seasonal community fairs.
    These influences have shaped her respectful demeanor, work ethic, and collaborative spirit.
