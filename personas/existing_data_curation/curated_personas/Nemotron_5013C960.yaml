  career_goals: Vivian dreams of becoming an elementary school teacher, motivated by her love for helping others learn in a structured, supportive environment. She also considers a future in pediatric nursing
    or community outreach, where she can combine her compassion with practical problem‑solving to make a tangible difference in children's lives.
