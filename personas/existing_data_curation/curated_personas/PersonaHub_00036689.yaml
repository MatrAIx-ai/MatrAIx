persona_description: A textile engineer who specializes in the testing and evaluation of textile materials for their ability to resist mildew and rot, and for their efficacy in containing fungal growth.
  This individual likely has experience with soil burial, agar plate tests, humidity jar tests, and other methods for evaluating the performance of textile materials in outdoor and above-ground applications.
  They are skilled in conducting tests on a wide range of textiles, including those that come in contact with soil, those that will not come in contact with soil, and those that require breakage strength
  testing. They are also likely familiar with the ISO 17025 accreditation process and have experience with testing textiles for their ability to resist mildew and rot.
