personas:
  professional: Adalis Alvarez is an aspiring visual artist and digital illustrator who blends traditional sketching with tablet‑based painting, channeling their curious, spontaneous nature into bold, experimental
    pieces while often flouting deadlines in after‑school art club projects.
  sports: Adalis Alvarez enjoys staying active through salsa dancing at community festivals and weekly soccer drills with the local youth club, cheers for the Austin FC soccer team and the Texas Rangers
    baseball club, and approaches fitness with playful spontaneity, preferring group activities over structured workouts.
  arts: Adalis Alvarez finds inspiration in animated classics like Hayao Miyazaki’s "Spirited Away," loves the vibrant street art of Banksy, and follows the musical storytelling of Lin‑Manuel Miranda, often
    recreating scenes in their sketchbook while attending local art fairs and school performances.
  travel: Adalis Alvarez dreams of wandering the historic streets of Oaxaca to soak in colorful murals, has already road‑tripped to San Antonio’s River Walk for a weekend of taco tasting, and prefers spontaneous,
    friend‑led getaways over meticulously planned itineraries.
  culinary: Adalis Alvarez’s culinary palate mixes love for homemade tamales and enchiladas—often garnished with a swirl of edible flower frosting—as a budding chef who can confidently sauté vegetables
    but still burns toast, and they adore experimenting with avocado, mango, and roasted corn in both traditional and inventive dishes.
  core: Adalis Alvarez is a curiosity‑driven teen artist who bursts into spontaneous creativity, splurges on art supplies, dabbles in teen finance, and dances through life with a splash of color and the
    occasional missed deadline.
background:
  cultural: Adalis is a first‑generation Mexican‑American raised in San Bernardino. She grows up in a bilingual household, speaking Spanish with her grandparents and English with friends and teachers. Family
    traditions such as Día de los Muertos altars, quinceañera preparations, and weekend visits to local Mexican festivals are central to her identity. The vibrant mural culture of her city and the sounds
    of mariachi and norteña music shape her artistic sensibility. She feels a strong sense of community responsibility, often volunteering at the local library’s story‑time sessions that showcase Mexican
    folklore.
attributes:
  skills: '[''sketching'', ''digital illustration'', ''mixed media art'', ''public speaking'', ''team collaboration'', ''conflict mediation'', ''bilingual communication (English/Spanish)'', ''cultural storytelling'']'
  hobbies: '[''sketching'', ''digital painting'', ''watching animated movies'', ''playing Minecraft'', ''dancing (salsa, folklórico)'', ''cooking Mexican foods'', ''reading graphic novels'', ''participating
    in after‑school art clubs'']'
  career_goals: Adalis dreams of turning her love for art into a career as a visual storyteller. She hopes to study graphic design or animation in high school and eventually create graphic novels that celebrate
    Mexican-American culture. She also wants to use her artistic skills to run community art workshops for younger kids in San Bernardino, giving them a space to explore creativity without strict rules.
    In the longer term, she envisions becoming a social media content creator who blends art tutorials, cultural storytelling, and youth advocacy.
