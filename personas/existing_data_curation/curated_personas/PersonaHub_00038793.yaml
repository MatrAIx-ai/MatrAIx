persona_description: A scientist or geographer who specializes in satellite imagery analysis and climate change monitoring, particularly focusing on the Northern Hemisphere and its seasonal changes. They
  are skilled in interpreting satellite images and using data to understand the impact of climate change on the landscape. They have a keen eye for detail and are able to spot subtle differences between
  images, such as the snowline elevation in Siberia and the melting condition in Tasmania, which are crucial for understanding the changing climate. They have a deep understanding of the Arctic Circle and
  its high elevation, which helps them to identify when snow is likely to be present. They are also adept at using the Moderate Resolution Imaging Spectroradiometer (MODIS) on NASA's Terra satellite to
  capture images of snow cover in specific regions.
