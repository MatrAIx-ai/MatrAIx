personas:
  professional: Lemarkus Mcroy, a methodical 20‑year‑old civil engineering student, leverages strong structural analysis, AutoCAD, Revit, and GIS expertise to design low‑carbon community cultural centers
    that fuse engineering precision with public art, and they experiment with parametric design to explore unconventional forms.
  sports: Lemarkus Mcroy, an avid solo hiker who tackles the ridges of the Tennessee Valley on weekends and runs 5 km trail loops on weekday evenings, follows the Alabama Crimson Tide football season for
    community connection, belongs to a local climbing gym for bouldering twice a month, and prefers personal fitness routines over team sports.
  arts: Lemarkus Mcroy, a quiet sketch‑enthusiast, spends evenings drawing Zaha Hadid‑inspired structures, regularly visits the Huntsville Museum of Art to study works by Anish Kapoor and local muralists,
    and relaxes with sci‑fi graphic novels by Neal Stephenson while listening to ambient compositions of Brian Eno.
  travel: Lemarkus Mcroy, a meticulous solo traveler who relies on GIS mapping to plan trips, has trekked the Appalachian Trail’s Tennessee segment, dreams of photographing Barcelona’s Gaudí architecture,
    and intends to backpack through the Scottish Highlands to study historic stone bridges, all while keeping a budget‑friendly itinerary.
  culinary: Lemarkus Mcroy, a modest home cook, favors grilled trout seasoned with lemon‑dill butter, perfects quick miso ramen with homemade chashu pork, indulges in Southern smoked brisket on rare occasions,
    and pairs meals with a precisely brewed pour‑over coffee using a Chemex.
  core: Lemarkus Mcroy, a solitary 20‑year‑old engineer‑artist hybrid, blends disciplined design rigor with sketching, hiking, and low‑key culinary experiments, while occasionally slipping into exam‑induced
    anxiety and splurging on premium art supplies.
background:
  cultural: Lemarkus is an African‑American raised in Huntsville, Alabama, where his family’s roots intertwine Southern traditions with a strong emphasis on education and community service. Growing up attending
    a historically Black church and participating in local cultural festivals, he developed a deep respect for the contributions of Black engineers and artists throughout history. His cultural heritage
    informs his values of resilience, collaboration, and the desire to give back to his community through thoughtful, inclusive design.
attributes:
  skills: '[''AutoCAD'', ''Revit'', ''Structural Analysis'', ''GIS Mapping'', ''Project Scheduling'', ''Technical Report Writing'', ''Sustainable Design Principles'', ''Parametric Modeling'']'
  hobbies: '[''Sketching Architectural Renderings'', ''Visiting Art Galleries'', ''Reading Science Fiction'', ''Urban Landscape Photography'', ''Solo Hiking'', ''Studying Sustainable Design'']'
  career_goals: Lemarkus aims to obtain his Professional Engineer (PE) licensure within the next five years and specialize in structural engineering with a focus on sustainable, low‑carbon infrastructure.
    He aspires to work on projects that blend functionality with artistic expression, such as community cultural centers or green public spaces that reflect the heritage of Huntsville. Long‑term, he envisions
    leading a multidisciplinary design team that integrates engineering, architecture, and public art to create resilient, aesthetically compelling structures for underserved neighborhoods.
