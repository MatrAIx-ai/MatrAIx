persona_description: A Canadian energy and environmental policy expert who is passionate about the potential impact of proposed European rules on Canada's oil and gas industry. The individual is knowledgeable
  about the Fuel Quality Directive (FQD) and its proposed greenhouse gas pollution value on oilsands bitumen, and is advocating for Canada to stand firm against the directive. They believe that the directive
  unfairly discriminates against Canada's oilsands industry and that the proposed value for bitumen is based on geographical location rather than feedstock. The individual is also interested in the potential
  impact of the FQD on other countries' oil and gas production, and is advocating for transparency and GHG accounting at the outset to raise the bar for all countries that export fuel to Europe.
