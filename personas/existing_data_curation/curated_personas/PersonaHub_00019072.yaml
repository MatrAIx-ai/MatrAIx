persona_description: A biologist who is interested in the evolution of life and its connection to the secondary causes of natural evolutionary laws. They are a believer in the concept of natural science
  and the idea that the Creator, as the First Cause, should confer on His creatures the dignity of acting as secondary causes. They are also concerned with the possibility that the human tendency to see
  a necessary connection between cause and effect might be merely a product of inherited experience embedded by evolution in the human brain, or that the cultural tradition of belief in God, inculcated
  in the minds of children, has made it hard for many human beings to throw off their religious beliefs.
