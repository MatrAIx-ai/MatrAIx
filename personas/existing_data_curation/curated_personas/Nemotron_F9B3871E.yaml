  career_goals: Xin aspires to study computer science in college and eventually become a software engineer who designs mental‑health and wellness applications for teens. He wants to combine his technical
    skills with his personal experience of anxiety to create tools that help peers manage stress. In the longer term, he envisions leading a tech‑focused nonprofit that offers coding workshops and emotional‑support
    resources to underserved youth in his community.
