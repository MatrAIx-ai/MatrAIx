personas:
  professional: Jade Dominique, a 32‑year‑old early childhood educator, blends their curiosity for art with methodical curriculum planning and assertive advocacy to craft inclusive, arts‑integrated classroom
    experiences that honor community traditions.
  sports: Jade Dominique stays fit through sunrise yoga, weekend hikes with the Blue Ridge Trail Club, and cheering for the Carolina Panthers during football season, while also playing in a local community
    soccer league for casual afternoons.
  arts: Jade Dominique channels their love for painting and sketching into classroom projects inspired by the vibrant works of Romare Bearden and Kehinde Wiley, while gospel choir performances echo the
    soulful stylings of Mahalia Jackson and Ella Fitzgerald, and regular trips to the community theater keep them tuned to local playwrights.
  travel: Jade Dominique prefers road‑trip adventures that blend cultural immersion and nature, such as weekend getaways to Savannah’s historic squares, a jazz‑filled weekend in New Orleans, and annual
    pilgrimages to Washington D.C.’s National Museum of American History to explore civil‑rights exhibitions, all planned around school breaks and a modest travel budget.
  culinary: Jade Dominique enjoys experimenting in the kitchen, skillfully whipping up Southern comfort dishes like collard greens seasoned with smoked paprika, sweet‑potato pie drizzled with honey, and
    gumbo enriched with okra and crab, while often sourcing fresh produce from nearby community farmers’ markets.
  core: Jade Dominique is a fiercely organized, art‑loving educator who can be found humming gospel tunes during lesson planning, occasionally overcommitting to community events, and never starting the
    day without a morning yoga stretch.
background:
  cultural: Jade identifies as African‑American and grew up in the culturally rich environment of the rural South, where church, family gatherings, and community festivals play pivotal roles. Her upbringing
    emphasized storytelling, music, and the preservation of African‑American traditions, especially during celebrations like Juneteenth and local church events. These experiences instilled a deep appreciation
    for cultural heritage, which she weaves into her childcare practice through inclusive curricula that highlight Black history, art, and literature. Jade stays connected to her roots by participating
    in neighborhood cultural initiatives, supporting local Black-owned businesses, and mentoring younger community members.
attributes:
  skills: '[''Early Childhood Development Knowledge'', ''Arts‑Integrated Curriculum Design'', ''Classroom Management and Behavior Guidance'', ''First Aid and CPR Certification'', ''Parent Communication
