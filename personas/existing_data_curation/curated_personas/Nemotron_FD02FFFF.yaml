    Advocacy'']'
  hobbies: '[''Painting and Sketching'', ''DIY Educational Craft Projects'', ''Community Theater Attendance'', ''Yoga Practice'', ''Hiking in North Carolina Trails'', ''Cooking Southern and African‑American
    Inspired Dishes'', ''Gospel and Jazz Choir Singing'', ''Reading Progressive Education and Social Justice Books'', ''Volunteer Work at Cultural Heritage Events'', ''Participating in an Art‑Focused Book
    Club'']'
  career_goals: Jade aims to advance to a lead teacher or program director role within the next three years, leveraging her passion for art‑focused early education. She plans to complete her associate’s
    degree in Early Childhood Education and pursue additional certifications in child psychology and inclusive teaching practices. Long‑term, she envisions opening her own boutique daycare that centers
    on culturally responsive, arts‑rich learning experiences for Black children and families in rural North Carolina, while also mentoring new childcare workers and collaborating with local schools to develop
    after‑school enrichment programs.
