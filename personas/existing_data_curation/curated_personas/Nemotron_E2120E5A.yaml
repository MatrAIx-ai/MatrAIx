personas:
  professional: Melanie Watkins is a junior architect in the world of LEGO, turning colorful bricks into detailed townscapes, applying precise planning and organized execution, and they naturally take charge
    of group projects by assigning roles and ensuring everyone follows the blueprint.
  sports: Melanie Watkins loves the thrill of sliding down the powdery slopes at the nearby ski hill, participates in the U5 snow sledding club, cheers for the Utah Jazz during family couch‑bound basketball
    nights, and they eagerly attend weekly soccer practices with the Little Tigers team at the community park.
  arts: Melanie Watkins enjoys drawing whimsical scenes inspired by Dr. Seuss and Disney’s Frozen, sings along to the upbeat tunes of Taylor Swift’s ‘Shake It Off’ at playdates, and they eagerly watch Pixar’s
    “Toy Story” series, often mimicking the characters’ voices.
  travel: Melanie Watkins prefers short road trips with plenty of snack breaks, cherishes family outings to Yellowstone’s geysers and the snow‑capped peaks of Lake Tahoe, dreams of building sandcastles
    on Hawaii’s Waikiki Beach, and they keep a crayon‑filled map of their favorite spots pinned above their bed.
  culinary: Melanie Watkins loves the cheesy stretch of a classic pepperoni pizza, the comforting bite of mac and cheese, enjoys helping Mom stir pancake batter with a splash of vanilla, and they often
    request crunchy apple slices with a drizzle of honey for snack time.
  core: Melanie Watkins blends bright curiosity with meticulous order, turning everyday play into tiny projects, they save every coin for a future bike while occasionally losing socks in the laundry basket.
background:
  cultural: Melanie grows up in a predominantly white, middle‑class neighborhood in Herriman, Utah, where community life revolves around family gatherings, school events, and outdoor activities like hiking,
    biking, and seasonal snow play. The local culture blends mainstream American media with regional traditions, such as community service projects and seasonal festivals that celebrate the natural landscape.
    Her family places a high value on friendliness, safety, respect for neighbors, and early educational enrichment, shaping her balanced curiosity and practical mindset.
