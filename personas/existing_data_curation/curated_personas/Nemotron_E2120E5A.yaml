  career_goals: Melanie loves animals and imagines herself as a veterinarian who carefully cares for pets while keeping a tidy clinic. She also expresses a wish to be a teacher, sharing new ideas with younger
    children in a structured classroom. Her curiosity drives a budding ambition to be a scientist, conducting simple experiments and exploring nature with a methodical approach. In the long term she hopes
    to combine her compassion and practical mindset in a career that helps others and solves real‑world problems.
