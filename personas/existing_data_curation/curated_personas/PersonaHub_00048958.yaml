persona_description: A professional energy consultant who specializes in the analysis and optimization of combined heat and power systems, particularly those designed to achieve high overall efficiency
  and power-to-heat ratio. They are experienced in developing transparent and accurate formulae and definitions for the determination of combined heat and power energy products and referring energy inputs,
  and are well-versed in the European energy policy for reducing CO2 emissions. They have a keen interest in gathering statistics and monitoring developments in the combined heat and power sector, and are
  aware of the challenges and uncertainties associated with the technology. They are committed to creating greater certainty that the basic concept of combined heat and power is understood and determined
  in the same way across Europe, and are aware of the need for a set of widely accepted determination rules to remove ambiguity resulting from a lack of standardised procedures across Europe.
