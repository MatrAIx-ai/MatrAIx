  career_goals: James aims to channel his artistic curiosity and community spirit into a sustainable career. In the near term, he plans to earn his GED and enroll in community‑college courses focused on
    arts administration and social work. His long‑term ambition is to establish a nonprofit arts and wellness hub in Grand Island that offers free workshops, therapeutic art sessions, and a space for local
    creators to collaborate. He also hopes to publish a graphic novel that blends abstract concepts with personal stories, and to work as a freelance multimedia storyteller while maintaining the flexible
    schedule that lets him support his marriage and volunteer commitments.
