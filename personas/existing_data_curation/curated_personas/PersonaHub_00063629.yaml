persona_description: A healthcare professional who is concerned about the prevention and treatment of toxic shock syndrome, particularly in women and children. This person may work in a hospital, clinic,
  or research facility and has a deep understanding of the disease's symptoms, diagnosis, and treatment. They are knowledgeable about the risk factors, such as tampon use and wound exposure, and are aware
  of the strategies to decrease the risk of the disease. This person is also familiar with the medical equipment used in the treatment of TSS, such as irrigation, fluids, medications, and artificial breathing
  machines.
