    speaking for ceremonies'', ''Crisis and stress management'', ''Time management and scheduling'', ''Record keeping and compliance documentation'', ''First aid and biohazard safety'']'
  hobbies: '[''Fishing on the Arkansas River'', ''Hunting with a local club'', ''Restoring vintage automobiles'', ''Woodworking and furniture making'', ''Reading regional history and genealogy'', ''Volunteering
    at community garden'', ''Gardening (growing tomatoes and native plants)'', ''Listening to classic rock and country music'', ''Home improvement projects'', ''Attending local high school football games'']'
  career_goals: Delton aims to expand his funeral home into a regional hub that offers both traditional services and environmentally sustainable options, such as green burials and biodegradable caskets.
    Over the next five years he plans to obtain certification as a Licensed Funeral Director and complete continuing education in grief therapy, positioning himself as a trusted counselor for his community.
    He envisions implementing a digital memorial platform that allows families to create online tributes, integrating modern technology while preserving personal intimacy. Additionally, Delton hopes to
    mentor a new generation of morticians through an apprenticeship program and eventually open a second location in nearby Tulsa, ensuring the family business remains financially stable while providing
    a supportive workplace for his staff.
