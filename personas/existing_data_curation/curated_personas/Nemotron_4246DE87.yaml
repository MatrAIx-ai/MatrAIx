personas:
  professional: Delton Martins, a veteran manager of a family‑run funeral home, blends meticulous embalming expertise, restorative art skill, and regulatory know‑how with a pragmatic curiosity that drives
    their push for green burial options, a digital memorial platform, and a mentorship apprenticeship program, all delivered with calm composure under the pressure of grieving families.
  sports: Delton Martins spends weekends fishing the Arkansas River and hunting with the Sapulpa Outdoor Recreation Club, while cheering on the Oklahoma City Thunder in basketball, the Tulsa Drillers in
    minor‑league baseball, and occasionally joining a local softball league for casual exercise.
  arts: Delton Martins channels their creative side through restoring a 1957 hearse, carving wooden sculptures, and immersing themselves in the sounds of Bruce Springsteen, The Eagles, Willie Nelson, and
    Johnny Cash, while devouring regional history books by authors like Stephen L. Davis, all of which shape their appreciation for craftsmanship and storytelling.
  travel: Delton Martins prefers carefully planned road trips that blend historical exploration and nature, having driven to Santa Fe, New Mexico, and toured Carlsbad Caverns, while dreaming of a future
    pilgrimage to Yellowstone and the Canadian Rockies, all balanced against the practical constraints of a busy funeral home schedule and family commitments.
  culinary: Delton Martins enjoys cooking hearty meals like smoked brisket seasoned with smoked paprika, heirloom tomato salad drizzled with local honey, and grilled Arkansas River trout, often incorporating
    fresh tomatoes and prairie greens from their community garden, reflecting a competent yet modest kitchen skill set that favors comfort and freshness.
  core: Delton Martins is a methodical funeral home manager who balances a love for vintage cars and solitary outdoor pursuits with a chronic worry about perfection, occasionally over‑indulging in restoration
    projects at the expense of sleep.
background:
  cultural: Culturally, Delton is rooted in the Mid‑South traditions of small‑town Oklahoma. He grew up in a close‑knit, predominantly white community where family ties, church involvement, and local civic
    participation are central values. His upbringing emphasized self‑reliance, respect for tradition, and a pragmatic approach to problem‑solving, reflecting the broader values of the Great Plains region.
    While he honors longstanding customs—celebrating holidays such as Thanksgiving, Independence Day, and community fairs—Delton also embraces contemporary influences, like digital memorial services, that
    align with his curiosity and practicality. His cultural identity is further shaped by participation in the local Chamber of Commerce and the Rotary Club, and by a lifelong affinity for Oklahoma’s college
    sports, particularly the Sooners.
