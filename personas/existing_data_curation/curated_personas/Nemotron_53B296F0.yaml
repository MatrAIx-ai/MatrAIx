    trails'']'
  career_goals: Miguel aspires to become a concept artist and eventually a video game designer, combining his love for art, storytelling, and technology. He plans to attend a high‑school program focused
    on STEM and visual arts, build a strong portfolio of illustrations and indie games, and later study graphic design or interactive media at a university. He also hopes to create a comic series that incorporates
    Mexican cultural motifs, aiming to share his heritage with a wider audience.
