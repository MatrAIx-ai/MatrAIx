personas:
  professional: A budding creative technologist, Miguel Palencia, blends sketching, digital art, and early-stage programming in Scratch and Python to prototype interactive story-driven games, leveraging
    their methodical planning and imaginative curiosity to meet project deadlines and collaborate in small, supportive maker groups.
  sports: An outdoor‑oriented hobbyist, Miguel Palencia, enjoys weekend hikes on the Barton Creek Greenbelt, follows the Austin FC soccer team and the Texas Longhorns football program on TV, and participates
    in a local youth robotics club that also fields a casual flag‑football team, preferring low‑key crew‑based activities over large crowds.
  arts: A passionate visual storyteller, Miguel Palencia, spends afternoons sketching characters inspired by graphic novels like Neil Gaiman's *The Sandman* and Alan Moore's *Watchmen*, creates digital
    illustrations in Procreate and Blender, listens to folk ballads by Woody Guthrie and early Mexican corridos on a laptop, and curates a personal collection of indie animation shorts.
  travel: A curious explorer, Miguel Palencia, maps out family road trips to nearby gems such as the Texas Hill Country vineyards, the historic towns of San Antonio and Fredericksburg, dreams of visiting
    NASA's Johnson Space Center in Houston and the grand vistas of Grand Canyon National Park, favoring well‑planned itineraries with plenty of time for sketching landscapes.
  culinary: A budding kitchen experimenter, Miguel Palencia, enjoys preparing simple tacos with seasoned ground beef, fresh cilantro, lime, and avocado, occasionally whips up spaghetti carbonara with pancetta
    and parmesan, but often over‑sauces dishes with chipotle paste, reflecting a love for bold flavors despite a modest cooking skill set.
  core: Miguel Palencia, a 13‑year‑old imagination‑driven tech‑artist, balances meticulous budgeting, meticulous health routines, and a quiet love for solitary creativity, occasionally succumbing to snack‑induced
    sugar spikes after late‑night coding sessions.
background:
  cultural: Miguel grows up in a bilingual Mexican‑American household in Austin, Texas. At home, Spanish is spoken and Mexican customs such as Día de los Muertos, traditional cooking, and family gatherings
    are central to his life. The vibrant Latino community in Austin exposes him to Mexican folk art, music, and mural traditions, which influence his own artistic style. He blends these cultural roots with
    the diverse, innovative atmosphere of Austin’s tech and art scenes, fostering a hybrid identity that values family, cultural heritage, and creative exploration.
