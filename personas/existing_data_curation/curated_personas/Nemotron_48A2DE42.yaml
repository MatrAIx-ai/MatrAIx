  career_goals: Over the next three years Brandon aims to step into a supervisory role, such as Team Lead or Customer Service Manager, where he can shape service standards and coach a team. He plans to
    earn a Certified Customer Experience Professional (CCXP) credential and enroll in part‑time MBA courses to deepen strategic management skills. Ultimately, he envisions moving into a Customer Success
    or Operations Management position that merges his business acumen with his passion for innovative, customer‑centric solutions. Parallel to his corporate trajectory, he hopes to launch a small consulting
    venture helping Midwest small businesses elevate their customer experience, allowing him to apply his curiosity and artistic sensibilities to business practice.
