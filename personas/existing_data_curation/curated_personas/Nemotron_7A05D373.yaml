personas:
  professional: Cyndia Maldonado is a diligent personal care worker who leverages bilingual fluency, meticulous record‑keeping, and a structured, detail‑oriented approach to deliver precise hygiene assistance
    and medication management, while quietly pursuing a CNA certification and eyeing a future supervisory role in a home‑health agency.
  sports: Cyndia Maldonado prefers low‑impact solitary exercise like early‑morning jogging and yoga, occasionally joins a local recreational soccer league for structured teamwork, follows the regional baseball
    team the Miami Marlins with disciplined fan routines, and maintains a roster of home‑workout videos for rainy days.
  arts: Cyndia Maldonado finds solace in classic Caribbean literature such as works by José Martí, devours contemporary mystery novels, tunes into vintage son and bolero recordings by icons like Celia Cruz,
    and binge‑watches documentary series on historical and scientific topics for intellectual enrichment.
  travel: Cyndia Maldonado plans trips with meticulous itineraries, favoring quiet historic towns like Granada in Spain, scenic coastal retreats in Puerto Rico, and museums in Washington, D.C., balancing
    a modest travel budget with a yearning for immersive cultural experiences.
  culinary: Cyndia Maldonado enjoys cooking family‑heritage dishes such as slow‑cooked shredded beef stew and hearty black bean soup, perfecting the balance of cumin, garlic, bay leaf, and cilantro, while
    tending a small indoor herb garden that supplies fresh aromatics for daily meals.
  core: Cyndia Maldonado is a methodical, solitary 20‑year‑old who thrives on structure, fervently solves puzzles, meticulously budgets, and quietly dreams of leading her own personal‑care service.
background:
  cultural: Cyndia was raised in a Cuban‑American household in Arlington, Texas. Both of her parents immigrated from Cuba, and the family maintains bilingual fluency, celebrating cultural traditions such
    as Carnaval, Noche de San Juan, and preparing classic dishes like arroz con pollo. The importance of family ties, respect for elders, and a strong work ethic are core values she carries into her personal‑care
    career. While she prefers quiet and solitude, she stays connected to her roots through cooking, music, and occasional community events that honor her Cuban heritage.
attributes:
  skills: '["Personal hygiene assistance", "Medication reminder and basic health monitoring", "Scheduling and appointment coordination", "Inventory control and supply management", "Record‑keeping and compliance
    documentation", "Basic first aid and CPR certification", "Bilingual communication (Spanish/English)", "Cleaning and sanitation protocols", "Attention to detail in care plan execution"]'
  hobbies: '["Reading (Cuban literature and mystery novels)", "Journaling", "Puzzle solving (Sudoku, crosswords)", "Cooking traditional Cuban recipes", "Indoor herb gardening", "Listening to Cuban son and
    bolero music", "Mindfulness meditation", "Watching educational documentaries"]'
  career_goals: Cyndia aims to first obtain her GED and then become a Certified Nursing Assistant (CNA) to deepen her clinical knowledge. Over the next five years she plans to move into a supervisory care‑coordinator
    role within a home‑health agency, where she can apply her organizational strengths to manage schedules, staff, and client records. Ultimately, she envisions launching her own small personal‑care service
    business that offers structured, high‑quality support for elderly and disabled clients, allowing her to create the predictable environment she values while competing in a growing market.
