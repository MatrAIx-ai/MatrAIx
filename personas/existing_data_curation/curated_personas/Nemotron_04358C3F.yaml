  hobbies: '[''gardening (heirloom tomatoes)'', ''preparing traditional Mexican dishes'', ''reading historical biographies'', ''birdwatching'', ''walking in local nature trails'', ''playing classical guitar'',
    ''volunteering at community garden'']'
  career_goals: Although retired from formal employment, Perfecto aims to leave a lasting legacy by mentoring younger members of the Mexican‑American community in Wilsonville, volunteering at the local
    senior center, and documenting his family’s oral history in a memoir. He also hopes to acquire new digital skills, such as photography and social‑media storytelling, to share cultural traditions with
    a broader audience.
