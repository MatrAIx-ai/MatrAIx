persona_description: A historian and urban planner who specializes in the study of the decline and transformation of industrial cities, with a particular focus on Detroit's history and the impact of central
  city decline on the United States' economy. This person is interested in the interplay between economic development, urban planning, and social and cultural changes in the context of industrialization
  and urbanization. They are also interested in the role of government policies and social factors in shaping the trajectory of industrial cities and their communities.
