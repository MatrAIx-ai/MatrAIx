personas:
  professional: Lynn Frazier, a health services administrator with a solid STEM foundation, leverages Lean Six Sigma methodology, data‑driven decision making, and compassionate assertiveness to streamline
    clinic operations, roll out telehealth in underserved Texas communities, and mentor emerging leaders while meticulously managing budgets and regulatory compliance.
  sports: Lynn Frazier, an avid weekend horse rider and Hill Country hiker, roots for the Dallas Cowboys, follows Austin FC matches, rides with the Austin Equestrian Association, and participates in a local
    hiking club to stay fit, balancing seasonal outdoor activity with weekly yoga.
  arts: Lynn Frazier, who devours historical nonfiction by David McCullough and mystery novels by Agatha Christie, solves crossword puzzles, and finds inspiration in the soulful sounds of Leon Bridges and
    the vibrant Texas landscapes painted by Charles Umlauf, integrates these artistic passions into their strategic mindset and leisure time.
  travel: Lynn Frazier, a meticulous road‑trip planner, has explored the Hill Country wine trail, the historic streets of Santa Fe, and the cloud forests of Costa Rica, favoring destinations that blend
    cultural immersion with natural beauty while balancing family commitments and a modest travel budget.
  culinary: Lynn Frazier, a dedicated home chef, experiments with Tex‑Mex classics such as carne asada tacos, chili rellenos, and fresh guacamole made from tomatillos, cumin, and smoked paprika, and delights
    friends with their signature slow‑roasted pork barbacoa at intimate dinner gatherings.
  core: Lynn Frazier, a disciplined yet warm‑hearted strategist, blends a love for tidy gardens, data‑driven health administration, and inventive Tex‑Mex cooking into a life that values order, community
    connection, and occasional sleepless nights over challenging crossword puzzles.
background:
  cultural: Lynn was raised in a small town within the Texas Hill Country, descending from German and Irish ancestors who settled the area in the 19th century. Her upbringing blends traditional Texan values—self‑reliance,
    hospitality, and a strong sense of community—with an appreciation for organized, practical approaches to life. She participates in regional traditions such as local fairs, country music, and barbecue,
    yet she prefers intimate gatherings over large events. Community and faith‑based service, emphasized through her family's church involvement, reinforced her commitment to helping others, shaping her
    career in health‑care management.
