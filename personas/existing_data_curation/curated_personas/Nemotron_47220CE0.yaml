personas:
  professional: Mary Beaumier, a registered nurse who blends art with medicine, they combine comprehensive patient assessment, health informatics fluency, and calm crisis de‑escalation to mentor junior
    staff, spearhead quality‑improvement initiatives, and champion holistic, patient‑centered care.
  sports: Mary Beaumier, an avid outdoor enthusiast, they hike the Sierra Nevada foothills with the local Sierra Trailblazers club, practice Vinyasa yoga at Yoga Fusion studio, and cheer on the Fresno State
    Bulldogs football team and Los Angeles Dodgers baseball club, often carving out weekend mornings for trail runs when the schedule allows.
  arts: Mary Beaumier, a devoted creator and appreciator of the arts, they paint watercolors inspired by Georgia O'Keeffe and contemporary watercolorist Yao Cheng, capture Fresno street murals with a Nikon
    D3500, attend acoustic concerts by Iron & Wine and local folk singer Sam Kincaid, and participate in community pottery workshops that echo traditional hand‑thrown ceramic techniques.
  travel: Mary Beaumier, a purposeful traveler with a penchant for nature and culture, they plan weekend escapes to Yosemite for sunrise hikes, relax at Mendocino’s coastal retreats for surf‑and‑silence
    meditation, voyage annually to Kyoto, Japan for tea ceremonies and koi‑pond photography, and dream of a future cycling tour through Portugal’s Douro Valley vineyards, balancing adventure with budget‑conscious
    choices.
  culinary: Mary Beaumier, an intermediate home chef devoted to farm‑to‑table cuisine, they craft seasonal dishes such as heirloom tomato bruschetta with fresh basil, roasted cauliflower drizzled with tahini,
    citrus‑herb glazed salmon, and kimchi‑infused ramen, sourcing organic produce at the Saturday Fresno farmers’ market and experimenting with ingredients like smoked chorizo, fresh figs, and local honey.
  core: Mary Beaumier, a curiosity‑driven nurse who eases patient stress through watercolor therapy, they habitually over‑schedule yoga sessions and midnight almond‑butter snacks when anxiety spikes, reflecting
    a blend of creative resilience and occasional self‑indulgence.
background:
  cultural: Mary's cultural background reflects a blend of Midwestern American roots and French-Canadian heritage, hinted by her family name Beaumier. Raised in a suburban community on the outskirts of
    Fresno, she grew up in a household that prized education, civic duty, and modest, community-oriented values. Her parents, both originally from the Midwest, instilled a strong work ethic and an appreciation
    for diverse perspectives, encouraging her exposure to the rich multicultural fabric of Fresno County, where Hispanic, Asian, and other cultures intersect. She celebrates traditional American holidays
    while also embracing regional customs such as the annual Farm-to-Table festival and local art events. This multicultural environment, combined with her curiosity for new ideas, has shaped her inclusive
    worldview, fostering a respect for cultural competence in her nursing practice and an openness to integrating diverse artistic expressions into everyday life.
attributes:
  skills: '["Clinical assessment", "Acute care nursing", "Patient education", "Electronic medical records management", "Health informatics", "Interdisciplinary collaboration", "Crisis de-escalation", "Mental
