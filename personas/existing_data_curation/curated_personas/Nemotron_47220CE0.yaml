  hobbies: '["Watercolor painting", "Visiting art galleries", "Pottery classes", "Reading contemporary fiction and science literature", "Hiking in Sierra foothills", "Yoga and mindfulness meditation", "Cooking
    farm-to-table meals", "Volunteering at community health fairs", "Participating in book clubs", "Listening to live music", "Exploring health tech gadgets", "Attending neuroscience lectures"]'
  career_goals: Looking ahead, Mary aims to earn a Master of Science in Nursing with a concentration in Psychiatric-Mental Health Nurse Practitioner, positioning herself to address both physical and emotional
    wellbeing of patients. She aspires to design and implement an integrative art-therapy program within her hospital, fostering creative expression as a therapeutic modality. Over the next five years she
    hopes to lead a nursing unit focused on holistic care, mentor fellow nurses in resilience and mental-health strategies, and contribute to research that bridges health informatics with patient outcomes.
    Ultimately, she seeks a leadership role that allows her to champion nurse wellbeing, cultivate interdisciplinary innovation, and maintain a sustainable work-life rhythm that supports her family and
    personal passions.
