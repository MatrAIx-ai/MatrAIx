  career_goals: Looking ahead, Maria hopes to transition into a supervisory or lead‑trainer role where she can pass on her expertise while enjoying a more predictable schedule. She aims to improve her department’s
    safety record and boost productivity metrics, gaining recognition from management before she retires. Additionally, she wants to secure stable retirement benefits, explore part‑time consulting for small
    local manufacturers, and stay connected to the Salvadoran community by volunteering in cultural outreach programs that benefit senior residents.
