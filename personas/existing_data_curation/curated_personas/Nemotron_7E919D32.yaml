personas:
  professional: Yoni Rodriguez, a 17‑year‑old autodidact visual and literary creator, blends surreal watercolor sketches with digital concept art using free programs like Krita and GIMP while penning speculative
    poems, aiming to carve a freelance niche in indie game illustration and graphic novel development despite a habit of disorganized time‑management.
  sports: Yoni Rodriguez finds solace in solitary hiking through the wooded trails around McCalla, belongs to the local McCalla Trails Club, practices occasional yoga at the community center, follows the
    Atlanta Falcons in the NFL and the Atlanta Hawks in the NBA, yet rarely participates in team sports, preferring nature‑based movement over competitive leagues.
  arts: Yoni Rodriguez immerses themselves in abstract visual storytelling, drawing inspiration from ambient pioneers like Brian Eno, William Basinski, and the ethereal soundscapes of Julianna Barwick,
    while revering literary figures such as Octavio Paz and Neil Gaiman, and cites narrative‑driven indie titles like Journey and Ori and the Blind Forest as artistic catalysts for their surreal poems and
    concept sketches.
  travel: Yoni Rodriguez favors low‑key, budget‑friendly getaways that feed their imagination, such as weekend hikes in the Great Smoky Mountains, a solitary retreat to Asheville’s art colonies, and a dream
    to explore Iceland’s misty fjords and Scotland’s rugged highlands, but their travel plans remain constrained by school commitments and limited personal funds.
  culinary: Yoni Rodriguez, a budding home cook, delights in crafting simple vegetarian plates like avocado‑black‑bean quesadillas and lavender‑infused honey drizzles over fruit, experiments with Mexican‑inspired
    spice blends, and favors brewing loose‑leaf herbal teas while occasionally indulging in spontaneous midnight ramen bowls.
  core: Yoni Rodriguez is a solitary dream‑weaver who channels nocturnal imagination into art while battling procrastination and occasional insomnia.
background:
  cultural: Yoni’s Mexican heritage is a central thread in her identity. At home, Spanish is the primary language, and family gatherings revolve around traditional foods like tacos, tamales, and mole, as
    well as celebrations of Día de los Muertos, where she helps create sugar‑skull decorations. Though she lives in the rural community of McCalla, Alabama, where the Mexican population is small, she maintains
    strong ties to her roots through church services offered in Spanish and frequent visits from extended family in Mexico. The vibrant colors, symbolic motifs, and mythic stories from Mexican art and folklore
    heavily influence her own artwork and writing. Simultaneously, she navigates Southern cultural cues, such as local music and community events, blending them with her Mexican background to create a unique
    bicultural perspective.
