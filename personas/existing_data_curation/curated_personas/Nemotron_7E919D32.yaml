  career_goals: Yoni aims to turn her artistic passions into a sustainable freelance career. She plans to build an online portfolio and eventually enroll in a community‑college art program or an online
    visual‑arts certificate. Her ambition is to become a concept artist for indie video games or graphic novels, and to publish a collection of her surreal poems and illustrated stories. She hopes to gain
    recognition in online art communities, win contests, and eventually secure commissions that allow her to work independently, preserving the flexibility and solitude she values.
