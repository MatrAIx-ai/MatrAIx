  career_goals: Jennifer aims to leverage her extensive customer service experience into a supervisory or team‑lead role within the next three years, where she can mentor newer representatives and shape
    service policies. She is also exploring certification in conflict resolution and a GED program to broaden her qualifications. Long‑term, she dreams of integrating her love for the arts into her career,
    perhaps by coordinating community outreach events for her employer or taking a part‑time role at a local gallery that blends customer engagement with cultural education. A core ambition is to maintain
    a stable, supportive environment for her family while contributing positively to Buffalo’s vibrant community.
