personas:
  professional: Maretta Mcdaniel, a retired community archivist and genealogist, leverages their meticulous budgeting skills and methodical research approach to compile a memoir and mentor high‑school students
    in oral history, embodying a quiet but assertive dedication to preserving local heritage.
  sports: Maretta Mcdaniel, a loyal fan of the Atlanta Falcons and the Georgia Bulldogs, enjoys gentle morning walks through their garden, participates in the local senior walking club, and watches the
    occasional basketball game on the porch, preferring low‑impact activity over competitive sports.
  arts: Maretta Mcdaniel, an avid watercolorist and quilt maker, immerses themselves in the works of Jacob Lawrence, Ella Fitzgerald, and Miles Davis, attends early‑morning gallery openings at the Augusta
    Museum of History, and finds inspiration for their art in gospel hymns and Southern storytelling traditions.
  travel: Maretta Mcdaniel, who prefers meticulously planned trips, frequently visits Savannah’s historic squares, has traveled to New Orleans for the Jazz & Heritage Festival, and hopes to explore Washington,
    D.C.’s Smithsonian National Museum of American History, always traveling with a detailed itinerary and a spare seat for their walking cane.
  culinary: Maretta Mcdaniel, an accomplished Southern cook, delights in preparing shrimp and grits, collard greens seasoned with garden‑grown thyme and rosemary, and sweet potato pie, while their hobby
    of preserving heirloom recipes in a handwritten ledger reflects both culinary skill and a love for tradition.
  core: Maretta Mcdaniel is a reflective 85‑year‑old who blends meticulous organization with a love for quiet art‑making, gardening, and preserving family stories, though they often lose track of time while
    humming gospel tunes during quilting sessions.
background:
  cultural: Maretta is an African‑American woman whose life has been shaped by the deep cultural roots of the South. Born and raised in Augusta during the Jim Crow era, she experienced segregation, the
    civil‑rights movement, and the strong community bonds of Black churches. Her family’s heritage includes sharecropping ancestors and a tradition of storytelling, gospel singing, and soul food cooking.
    These influences fostered a resilient, self‑reliant spirit and a profound respect for African‑American history, literature, and art. Her cultural identity blends Southern hospitality with a preference
    for quiet reflection, and she carries forward the values of perseverance, community service, and the preservation of Black heritage.
attributes:
  skills: '[''Genealogical research'', ''Archival documentation'', ''Oral history interviewing'', ''Budgeting and personal finance management'', ''Herb and vegetable gardening'', ''Quilting and fabric arts'',
