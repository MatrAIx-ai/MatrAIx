  hobbies: '[''Reading historical and literary fiction'', ''Listening to jazz and gospel music'', ''Watercolor painting'', ''Herb and flower gardening'', ''Quilting'', ''Crossword puzzles'', ''Birdwatching'',
    ''Attending local art exhibitions'', ''Writing memoirs'', ''Researching family genealogy'']'
  career_goals: Even though she is retired, Maretta aims to leave a lasting intellectual legacy. She plans to compile and publish a memoir that captures her experience growing up in segregated Augusta and
    the civil‑rights era, preserving her family’s stories for future generations. She also hopes to volunteer as a consultant for the local historical society, offering her expertise in African‑American
    local history and helping to curate a small exhibit on Black life in Richmond County. Additionally, she wishes to mentor high‑school students interested in genealogy and oral history, and to establish
    a modest digital archive of recipes and anecdotes for her grandchildren.
