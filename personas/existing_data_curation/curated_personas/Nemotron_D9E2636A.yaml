personas:
  professional: Rosa Rodriguez, a curious one‑year‑old who meticulously arranges their picture books and plastic blocks by color and shape, already displays the organized yet flexible mindset of a future
    visual designer, turning playtime into a laboratory for unconventional ideas.
  sports: Rosa Rodriguez loves toddling in the parent‑child gymnastics class at the community center, eagerly claps for the Dallas Mavericks game shown on the waiting‑room TV, and they participate in a
    baby swim club that meets twice a week at the local pool.
  arts: Rosa Rodriguez, despite being only a year old, is mesmerized by the gentle lullabies of Mozart, the playful rhythm of the Sesame Street theme, and the bold, primary‑colored paintings of Piet Mondrian
    featured in their picture books, often swaying their tiny body to the music.
  travel: Rosa Rodriguez’s travel adventures so far consist of family road trips to the sunny beaches of San Diego, a weekend stay at a child‑friendly resort in Orlando’s Disney World where they adored
    the stroller‑friendly rides, and a short visit to the Monterey Bay Aquarium, which sparked a fascination with colorful fish.
  culinary: Rosa Rodriguez prefers smooth, naturally sweet foods such as mashed sweet potatoes, ripe banana purée, and avocado chunks, delights in the occasional bite of soft cheese, and, though they cannot
    cook yet, enjoys helping their caregiver stir a pot of oatmeal with their tiny wooden spoon.
  core: Rosa Rodriguez, a wide‑eyed one‑year‑old with boundless curiosity and a tendency toward worry, finds joy in shiny coins, bright colors, and comforting lullabies while occasionally flinging their
    spoon in a burst of impulsive energy.
background:
  cultural: Rosa is raised in a Mexican‑American household in Fountain Valley, California. Her parents speak Spanish at home while also using English, giving her early bilingual exposure. Family life includes
    regular celebrations of Mexican traditions such as Día de los Muertos, Christmas posadas, and weekend gatherings featuring Mexican cuisine like tacos, tamales, and arroz con pollo. She attends a local
    bilingual preschool where she interacts with children from diverse backgrounds, and she experiences a blend of Southern Californian and Mexican cultural influences through community festivals, music,
    and family customs.
attributes:
  skills: '["bilingual basic communication (Spanish & English)", "fine motor coordination with crayons and blocks", "color and shape identification", "social interaction and cooperative play", "memory of
