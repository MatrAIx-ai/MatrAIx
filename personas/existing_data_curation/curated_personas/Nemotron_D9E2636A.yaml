  hobbies: '["scribbling with crayons and finger‑painting", "building block towers", "listening to children''s music and dancing", "participating in interactive storytime", "playing at the park with peers",
    "observing and helping in family cultural celebrations (e.g., Día de los Muertos)", "exploring nature walks and tactile experiences"]'
  career_goals: At one year old Rosa is still in the exploratory phase of childhood, but she often expresses a desire to create and share—whether by drawing scribbles, dancing to music, or helping her parents
    in the kitchen. She shows early signs of a future interest in artistic or creative professions, such as becoming an artist, designer, or teacher, and enjoys imagining herself helping or making things.
    For now, her goal is simply to explore, learn, and experience the world around her.
