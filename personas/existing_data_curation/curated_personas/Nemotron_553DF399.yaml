personas:
  professional: Jeremy Hebert, a toddler tinkerer who builds towers with blocks, channeling a curious yet practical mindset, organizes their play area while staying flexible enough to improvise stories,
    and often insists on being the first to finish a puzzle, showcasing early competitive spirit.
  sports: Jeremy Hebert, a lively member of the Little Lions Soccer Club, loves sprinting after a soft soccer ball at the neighborhood park, cheers for the hometown's baseball team the Springfield Wildcats,
    and they also enjoy seasonal toddler gymnastics sessions at the community center.
  arts: Jeremy Hebert, an enthusiastic fan of The Wiggles and Disney's Frozen soundtrack, spends afternoons drawing bright crayon dinosaurs, sings along to Raffi's 'Baby Beluga,' and they attend weekly
    storytime with classic fairy tales at the local library.
  travel: Jeremy Hebert, who has already explored Disneyland Resort in California and taken a family road trip to the Grand Canyon, prefers adventures that blend playground fun with short stroller-friendly
    walks, and they are eagerly dreaming of a future beach getaway to Clearwater, Florida.
  culinary: Jeremy Hebert, a selective eater who adores cheesy macaroni, chicken nuggets with ketchup, banana slices, and occasionally helps stir peanut butter into oatmeal despite a mild dairy sensitivity,
    yet they consistently refuse broccoli and brussels sprouts.
  core: Jeremy Hebert, a spirited two-year-old who balances relentless curiosity with practical play, thrives on group activities, showcases a competitive streak, and occasionally resists bedtime when their
    curiosity outweighs routine.
background:
  cultural: Jeremy is being raised in a typical Midwestern white family in Decatur, Indiana. His cultural environment blends small‑town community values, a strong emphasis on family and church participation,
    and the rhythms of rural life such as seasonal festivals, farm visits, and local sports. He experiences American traditions like Thanksgiving, Fourth of July celebrations, and community picnics, and
    his family's social life often revolves around neighborhood gatherings, preschool activities, and church school. This backdrop reinforces his sociable nature, curiosity about the world, and appreciation
    for both new ideas and established community customs.
