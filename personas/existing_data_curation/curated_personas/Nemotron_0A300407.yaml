personas:
  professional: Williammichael Jones is a newly minted education graduate who designs culturally responsive lesson plans that weave visual arts, photography, and local tribal practices into elementary curricula,
    using their curiosity and competitive drive to continually refine instructional strategies and showcase student work on platforms like Google Classroom and Seesaw.
  sports: Williammichael Jones enjoys weekend hikes in Wichita Mountains Wildlife Refuge and participates in the Oklahoma Outdoor Adventure Club, follows the Oklahoma City Thunder and the Oklahoma Sooners
    for a dash of competitive spirit, yet prefers casual runs over organized sports, balancing fitness with a laid‑back approach to exercise.
  arts: Williammichael Jones immerses themselves in painting Oklahoma sunsets, photographing tribal drum circles, and strumming folk songs on an acoustic guitar inspired by Bob Dylan and Joni Mitchell,
    while drawing creative fuel from the works of Edward Hopper and Ansel Adams, which shape their artistic identity.
  travel: Williammichael Jones plans trips that blend photography expeditions to places like the Grand Canyon and Chickasaw National Recreation Area with cultural immersion at regional powwows, favoring
    a semi‑structured itinerary that leaves room for spontaneous roadside camping, all within a modest budget that prioritizes travel gear over luxury accommodations.
  culinary: Williammichael Jones enjoys cooking at a moderate skill level, often preparing frybread with honey drizzle, hearty succotash with fresh corn and black‑eyed peas, and a spicy green chile stew,
    delighting in the texture of heirloom tomatoes and the aroma of toasted cornmeal while experimenting with traditional herbs.
  core: Williammichael Jones is a curious, competition‑driven art‑focused educator who balances budget‑tight living, modest health hassles, and a love for hiking, music, and cultural storytelling, all while
    occasionally succumbing to impulse purchases and neglecting routine check‑ups.
background:
  cultural: Will identifies as an American Indian of Cherokee descent, with family roots that have spanned generations in the Tulsa metropolitan area. Growing up in Broken Arrow, he was immersed in tribal
    cultural practices such as storytelling, seasonal celebrations, and language revitalization, while also navigating mainstream American life. His parents emphasized preserving Cherokee heritage, teaching
    him basic language skills, traditional crafts, and the importance of community solidarity. He actively participates in local tribal council events, volunteer programs supporting youth empowerment, and
    cultural workshops that reinforce his connection to ancestry. These experiences shape his worldview, fostering respect for nature, collective responsibility, and a commitment to using education as a
    tool for uplifting his community.
