  hobbies: '[''Painting (watercolor, acrylic)'', ''Sketching and drawing'', ''Photography (landscape, cultural events)'', ''Reading (contemporary fiction, indigenous literature, philosophy)'', ''Playing
    acoustic guitar'', ''Songwriting (folk-inspired)'', ''Attending powwows and cultural workshops'', ''Traditional dance and drum making'', ''Hiking and nature walks'', ''Cooking traditional Native American
    dishes'', ''Creating digital educational content (videos, interactive lessons)'', ''Board games and strategy video games'']'
  career_goals: Will aims to become a certified elementary school teacher in an Oklahoma tribal school, where he can integrate indigenous culture and visual arts into everyday learning. He plans to complete
    his teacher certification within the next year and then gain classroom experience while advancing his expertise in culturally responsive pedagogy. In the longer term, he aspires to earn a master's degree
    in Education Leadership to become a curriculum specialist or program director for youth arts initiatives that empower Native American students. He also hopes to present at regional conferences on the
    benefits of blending traditional knowledge with modern educational practices.
