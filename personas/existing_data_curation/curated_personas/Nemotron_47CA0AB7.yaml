personas:
  professional: Ruth Green is a self-taught tinkerer who spends weekends troubleshooting old computer hardware, customizing skateboards, and learning Python to prototype simple game mechanics, and they
    are eyeing an automotive apprenticeship that will let them blend hands-on problem solving with the competitive thrill of mastering complex repairs.
  sports: Ruth Green is an avid hiker who regularly explores the Ozark Trail, a member of the local skateboarding club that competes in regional park-and-ride events, and a dedicated follower of the St.
    Louis Cardinals baseball team and the Jefferson County Wildcats high-school soccer squad, balancing solo trail runs with competitive board tricks.
  arts: Ruth Green channels creativity into digital art using free tools like Krita, draws inspiration from sci-fi illustrators such as Syd Mead and video-game concept artists like Yoshitaka Amano, and
    curls up reading authors like Neal Stephenson and N.K. Jemisin, often sketching scenes from their favorite novels while listening to the music of The Strokes and classic rock from the 70s.
  travel: Ruth Green dreams of a road-trip circuit that stitches together a camping stop at the Great Smoky Mountains, a pit-stop at the Detroit Auto Show to scout the latest repair tech, and a weekend
    in Austin, Texas for its vibrant live-music scene, planning each leg on the fly with a mix of online research and the freedom to reroute if a new route looks more exciting.
  culinary: Ruth Green enjoys hearty Midwestern staples like corn-bread and BBQ ribs, but also loves whipping up quick avocado toast seasoned with fresh herbs from the community garden, often snacking on
    trail-mix while debugging code, and treats themselves to a slice of deep-dish pizza from a local pizzeria after a long skate session.
  core: Ruth Green is a pragmatic, competition-driven tinkerer who blends solitary tech projects with community-rooted hands-on work, juggling disorganized budgeting, a love for outdoor adventure, and an
    ever-growing stash of skateboard tricks.
background:
  cultural: Ruth grew up in Imperial, a small, predominantly white town in Jefferson County, Missouri. Her family has deep Midwestern roots, with a background in agriculture and blue‑collar manufacturing.
    The local culture values self‑reliance, practicality, and community involvement, which have shaped Ruth's pragmatic outlook and competitive spirit. Regular attendance at community events, church gatherings,
    and school sports has reinforced a sense of belonging, while increasing access to high‑speed internet in the area has nurtured her curiosity about technology and the wider world.
attributes:
  skills: '["troubleshooting basic tech issues", "DIY furniture assembly and repair", "basic Python programming", "science project design and data analysis", "effective verbal communication", "critical
    thinking and problem solving"]'
  hobbies: '["hiking local trails", "building and customizing skateboards", "strategy video gaming", "digital art creation", "reading science‑fiction novels", "volunteering at the community garden"]'
  career_goals: Ruth aims to complete her high‑school education through a GED and secure an apprenticeship in automotive technology or a related trade where she can apply her curiosity about how things
    work in a practical setting. She is motivated by the competitive nature of mastering complex repairs and hopes to obtain certification as a master technician. Long‑term, she envisions running her own
    mobile auto‑repair service that offers flexible hours, allowing her to blend independence with the chance to continually learn new technologies and techniques.
