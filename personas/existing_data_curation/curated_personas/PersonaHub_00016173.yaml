persona_description: A researcher and scientist in the field of physics and astronomy, particularly interested in the interaction between light and matter at the sub-nanometric scale. They are experts in
  the field of materials physics and have conducted research on the chromatic fingerprint, tunnel effect, and the impact of light on the sense of well-being and performance. They are also involved in the
  development of new technologies and strategies for the manufacture of smaller optoelectric devices and photochemistry. They have published several articles and have received funding from various organizations
  such as the Basque Government, Ikerbasque, and the European Union.
