  hobbies: '["Vegetable gardening", "Lake fishing", "Participating in tribal cultural events", "Traditional storytelling and drumming", "Reading historical nonfiction", "Senior‑center book club", "Chess",
    "Volunteer tax assistance"]'
  career_goals: David aims to solidify his role as a senior financial clerk or team lead within the Bladen County government, where he can mentor younger staff and help modernize the office’s accounting
    systems. He plans to complete an associate’s degree in accounting and earn the Certified Bookkeeper credential within the next two years. Long‑term, he hopes to transition into a part‑time consulting
    role, offering bookkeeping and financial planning services to local small‑business owners and tribal enterprises, allowing him to achieve a stable retirement while staying connected to his community.
