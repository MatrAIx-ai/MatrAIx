persona_description: A professor at the University of Missouri College of Education who specializes in educational research and has a focus on improving reading comprehension and knowledge of American history
  among middle school students in Missouri, Michigan, Massachusetts, and Washington, D.C. He has a long-term goal of creating better citizens who are engaged civically through civically-engaged adults who
  can start building that early in middle school. His research interests include promoting acceleration of comprehension through text and creating more individualized approaches to address the needs of
  all learners.
