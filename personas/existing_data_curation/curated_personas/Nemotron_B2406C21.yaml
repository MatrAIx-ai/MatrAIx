personas:
  professional: Dayton Watkins, a customer service specialist with a knack for calm conflict resolution, blends advanced Salesforce and Excel expertise with a mentor‑style approach, and they lead new hires
    while driving metric‑based improvements, positioning themselves for a team‑lead role.
  sports: Dayton Watkins, a regular participant in a Saturday adult basketball league, they cheer on the Indiana Pacers and Indianapolis Colts, and volunteer as an assistant coach for a local high‑school
    youth soccer team during the fall.
  arts: Dayton Watkins engages in community theater as an actor and set designer, they enjoy live‑music shows at the Indianapolis Concert Hall featuring artists like Jason Isbell and The Avett Brothers,
    and unwind with online multiplayer gaming sessions with friends.
  travel: Dayton Watkins prefers low‑key road trips to Midwestern gems such as Brown County State Park, the historic town of Madison, Indiana, and they occasionally fly to Nashville for a weekend of country‑music
    festivals, balancing travel with family commitments.
  culinary: Dayton Watkins delights in backyard barbecues, mastering smoked pork ribs, corn on the cob with butter and herbs, and a signature bourbon‑glazed sauce, and they often order takeout pizza after
    late‑night gaming.
  core: Dayton Watkins, a 38‑year‑old community‑oriented problem‑solver, blends structured professionalism with a love for basketball, theater, and barbecues, while they juggle a pragmatic financial plan
    and a never‑ending quest for the perfect smoked rib.
background:
  cultural: Dayton grew up in a small-town setting in Indiana, raised in a middle‑class, Anglo‑American family that prized hard work, reliability, and community involvement. The Midwestern cultural fabric
    of Delaware County emphasized modesty, friendliness, and a pragmatic approach to everyday life, shaping his preference for structure and his calm, resilient demeanor. He is familiar with local traditions
    such as county fairs, high‑school sports events, and church‑based outreach, all of which reinforce his sociable nature and collaborative spirit.
