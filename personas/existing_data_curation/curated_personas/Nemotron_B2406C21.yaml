  career_goals: Dayton aims to move into a supervisory role within the next two years, targeting a Customer Service Team Lead position where he can apply his organizational strengths and calm leadership
    style. He plans to earn a Certified Customer Service Professional credential and pursue a Six Sigma Green Belt to deepen his process‑improvement expertise. Long‑term, he envisions becoming a Customer
    Experience Manager, shaping service strategies for a regional call center while also mentoring staff. To support these ambitions, he is enrolling in evening courses toward an Associate’s degree in Business
    Management, balancing his education with his current full‑time responsibilities.
