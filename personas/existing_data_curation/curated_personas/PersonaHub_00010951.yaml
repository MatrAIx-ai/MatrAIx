persona_description: A primatologist who studies the evolution of primate brains and the role of vision in their development. She has conducted research on the neural response of macaque monkeys to images
  of snakes, angry macaque faces, monkey hands, and geometric designs, and has identified the unique region of the brain involved in gaze direction and eye movement. Her hypothesis is that primate brains
  have been hardwired to detect snakes due to the threat of snakes as their main predator, and she is excited to replicate the experiment on primates that have no exposure to snakes to further test the
  theory.
