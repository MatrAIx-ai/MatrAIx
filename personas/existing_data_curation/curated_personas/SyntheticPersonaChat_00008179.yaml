    User 1: It is. I get to work with all kinds of different fish and plants.

    User 2: That''s cool. I''ve always been interested in aquariums, but I''ve never had one.

    User 1: You should get one! They''re really fun to watch.

    User 2: I might just do that.

    User 1: Well, I''m glad we had this conversation. I think we''ll get along great.

    User 2: I think so too.

    User 1: Nice to meet you.

    User 2: Nice to meet you too.'
