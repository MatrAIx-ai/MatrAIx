personas:
  professional: Tatiana Soto, a nursing assistant proficient in monitoring vital signs, supporting wound care, and enforcing infection‑control standards, they blend their vivid imagination and deep empathy
    by offering patients calming watercolor sketches and gentle acoustic lullabies, while their relaxed attitude toward strict scheduling sometimes leads to forgotten paperwork as they pursue LPN studies.
  sports: Tatiana Soto enjoys low‑impact exercise, taking solitary weekend walks through Griffith Park, cheering on the Los Angeles Lakers and Dodgers, and participating in a community‑center yoga class
    where they find calm movement alongside fellow enthusiasts.
  arts: Tatiana Soto nurtures a rich creative life through watercolor landscapes and abstract sketches, they draw inspiration from the immersive installations of Yayoi Kusama and the bold brushwork of Georgia
    O'Keeffe, lose themselves in speculative novels by N.K. Jemisin and poetry by Rita Dove, and unwind to the gentle strings of The Milk Carton Kids and traditional folk guitar melodies.
  travel: Tatiana Soto prefers spontaneous, soul‑searching trips, often exploring nearby coastal retreats like Santa Barbara and Catalina Island, while dreaming of immersive cultural journeys to Oaxaca,
    Mexico and Granada, Spain, though limited savings sometimes keep these adventures on a wish list.
  culinary: Tatiana Soto delights in crafting aromatic home‑cooked meals, they expertly simmer a fragrant herb‑and‑vegetable stew with fresh cilantro and lime, skillfully roast a honey‑glazed chicken with
    rosemary and garlic, and savor these creations alongside a cup of homemade hibiscus tea, often improvising with pantry staples when inspiration strikes.
  core: Tatiana Soto is a deeply compassionate nursing assistant whose vivid imagination fuels spontaneous watercolor therapy for patients, yet their habit of misplacing paperwork and occasional anxiety‑driven
    overthinking can turn quiet evenings into restless bouts of scrolling.
background:
  cultural: Tatiana was born in Guatemala and moved to Los Angeles as a young adult. She grew up speaking Spanish at home and participates in Mayan‑influenced traditions, such as weaving, traditional cooking,
    and celebrating Día de los Muertos in the local Latino community. Her Catholic upbringing intermingles with indigenous beliefs about health, which informs her holistic view of caregiving. In Los Angeles,
    she stays connected with a close‑knit Guatemalan diaspora, attending community festivals, sharing recipes, and offering support to new immigrants, all of which enrich her compassionate approach to patient
    care.
attributes:
  skills: '["Patient care", "Vital signs monitoring", "Mobility assistance", "Wound care support", "Infection control", "Empathetic communication", "Cultural liaison for Spanish‑speaking patients", "Creative
    art‑based patient soothing", "Stress reduction techniques", "Team collaboration"]'
  hobbies: '["Watercolor painting", "Sketching", "Weaving traditional textiles", "Cooking Guatemalan dishes", "Reading speculative fiction", "Poetry", "Attending art walks", "Listening to marimba music",
    "Gentle yoga", "Meditation", "Walking in Griffith Park", "Volunteer art teaching"]'
  career_goals: She aspires to complete her GED and enroll in a licensed practical nursing (LPN) program, ultimately becoming a registered nurse. Tatiana hopes to integrate her artistic interests into healthcare
    by developing an in‑house art‑therapy or music‑based calming program for long‑term patients. She also aims to mentor fellow nursing assistants, especially those from immigrant backgrounds, and to volunteer
    in community health outreach that bridges conventional medicine with culturally familiar practices from Guatemala.
