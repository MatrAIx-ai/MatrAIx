  hobbies: '["Beach volleyball", "Cross‑fit classes", "Running along the St. Lucie River", "Social dancing (Salsa)", "Cooking Southern and Caribbean dishes", "Volunteering at the animal shelter", "Community
    safety workshops", "Reading crime‑thriller novels", "Podcasting on public‑safety tips"]'
  career_goals: She aims to advance within the St. Lucie County Sheriff's Office while deepening her impact on the community. Over the next five years she plans to earn her associate's degree in criminal
    justice, qualify for the detective track, and complete a specialized training program in community liaison work. Long‑term, Karen aspires to become a precinct sergeant or a crime‑prevention program
    manager, leading initiatives that mentor at‑risk youth, improve neighborhood‑watch collaborations, and promote transparent policing practices.
