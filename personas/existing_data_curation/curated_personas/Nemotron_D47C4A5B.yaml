  career_goals: Jerry plans to obtain his GED within the next year and then enroll in a technical certification program, aiming either for an automotive technology certification or an entry‑level IT networking
    credential. He envisions a career where his analytical mind and competitive edge can thrive—such as a computer technician, automotive technician, or eventually a cybersecurity analyst. While he follows
    professional esports closely and dreams of competing at a high level, he prioritizes securing a stable trade that offers clear structure and reliable advancement.
