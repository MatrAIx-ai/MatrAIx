persona_description: A scientist at IBM Zurich Research Laboratory who specializes in the study of atomic-scale physics and nanotechnology. His research focuses on the development of new technologies that
  can measure and manipulate individual atoms, including the use of an atomic force microscope with a tuning-fork detector arrangement to distinguish among positively charged atoms from those that are neutral
  or negatively charged. He is known for his work with the scanning tunneling microscope and is currently advancing his research to develop a nanotechnology development that can produce devices by assembling
  them atom by atom.
