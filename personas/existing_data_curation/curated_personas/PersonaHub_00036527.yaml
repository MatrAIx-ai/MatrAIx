persona_description: A historian or local enthusiast who is interested in the history of Pisa and Livorno, particularly the period of Florentine rule and the subsequent ownership by the Republic of Pisa.
  They are curious about the role of the Giardino Scotto in the city's history and its transformation from a fortress to a public garden. They are also interested in the legacy of the Republic of Pisa's
  ownership of Livorno in the Middle Ages and the subsequent period of great urban planning and expansion in the late 16th century.
