persona_description: A researcher and educator who specializes in ocean science and communication, particularly in the areas of ocean literacy, ocean socioscientific issues, and ocean stewardship. They
  have conducted research and developed educational materials that aim to improve ocean literacy among teens and adults, and they have presented their findings at international conferences and published
  their work in academic journals. They are interested in understanding the factors that influence ocean literacy, such as content, experience, and morality, and they seek to develop new metrics for measuring
  ocean literacy and to integrate ocean socioscientific issues into educational curricula.
