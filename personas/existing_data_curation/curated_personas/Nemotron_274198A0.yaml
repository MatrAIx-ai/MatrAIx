  career_goals: Fern aims to enroll in a culinary arts program within the next two years to earn an associate degree and deepen her technical expertise. She aspires to become a head chef at a farm-to-table
    restaurant in the Upper Midwest, where she can blend her love for seasonal local ingredients with artistic plating. Long-term, Fern hopes to open her own boutique eatery that showcases a rotating menu
    inspired by global cuisines and contemporary art, and to compete in regional cooking competitions to gain recognition. She also envisions developing a food-focused social media presence that highlights
    creative recipes and the stories behind local producers.
