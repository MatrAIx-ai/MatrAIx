personas:
  professional: Mary Baker is a licensed practical nurse with a solid STEM foundation, excelling at rapid patient assessments, IV insertion, and health education, while their spontaneous, people‑centric
    style fuels dynamic teamwork in fast‑paced clinical settings and drives their ambition to become a registered nurse and future charge nurse.
  sports: Mary Baker plays volleyball at the local recreation center, hikes the rocky coastal trails of New England, and supports the New England Patriots and Boston Red Sox, often joining community running
    clubs and beach clean‑up crews that double as informal fitness groups.
  arts: Mary Baker fuels their creative side by taking improv theater classes, photographing sunrise over the Atlantic, and attending live concerts featuring artists like The Lumineers, Lizzo, and St. Vincent,
    while they also curate eclectic playlists for dinner parties that blend indie folk with classic rock.
  travel: Mary Baker prefers spontaneous weekend road trips along the New England coastline, has already explored Acadia National Park and Montreal, and dreams of backpacking through Patagonia’s Torres
    del Paine, balancing limited vacation days with a love for adventure and occasional group beach clean‑up getaways abroad.
  culinary: Mary Baker delights in cooking eclectic meals for friends—ranging from spicy Korean bibimbap and Mediterranean shakshuka to Southern jambalaya—using fresh basil, miso, and sumac, though their
    tendency to over‑season or forget to set timers sometimes leads to burnt edges and laughter‑filled rescue missions.
  core: Mary Baker’s life is a vibrant blend of curiosity‑driven nursing expertise, spontaneous social energy, and occasional disorganization, which together fuel a relentless drive to help others while
    juggling impulsive spending and a love for community‑centered adventures.
background:
  cultural: Mary grew up in Bristol, Rhode Island, a close‑knit New England town with deep maritime roots and a strong sense of community. Her family background reflects the region’s middle‑class, multi‑generational
    heritage, emphasizing public service, education, and civic engagement. The local culture—marked by seasonal fairs, historic town meetings, and a tradition of cooperation among neighbors—has shaped her
    values of harmony, kindness, and collective well‑being. Exposure to the coastal environment and the region’s blend of colonial history and contemporary diversity informs her appreciation for both tradition
    and innovation.
