  career_goals: Mary aims to advance from her current Licensed Practical Nurse role to a Registered Nurse position by completing an RN bridge program and obtaining a BSN. She is motivated to specialize
    in emergency or community health nursing, seeking certifications such as Certified Emergency Nurse (CEN) or Community Health Nursing (CHN). Her long‑term ambition is to become a charge nurse or a nurse
    educator, where she can blend her curiosity for new medical technologies with practical bedside expertise to mentor other clinicians. Additionally, she envisions participating in mobile health outreach
    programs across Rhode Island’s coastal communities, leveraging her sociable nature to foster health awareness and preventive care.
