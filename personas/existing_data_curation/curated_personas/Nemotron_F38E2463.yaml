    to teach art workshops'']'
  career_goals: Paula aims to channel her artistic talent and compassionate nature into a role that nurtures community well‑being. In the next few years she plans to complete a bachelor's degree in Art
    Therapy or Social Work, followed by a master’s program that merges creative practice with mental health. She envisions establishing a community art studio in Fayetteville that offers therapeutic workshops
    for children, seniors, and families, while also providing a gallery space for emerging local artists. Alternatively, she is considering a position as a program coordinator for a nonprofit that integrates
    arts into youth development and trauma recovery. Long‑term, Paula aspires to become a certified art therapist, run her own nonprofit, and author a series of illustrated guides on creativity and emotional
    resilience.
