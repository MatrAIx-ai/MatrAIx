personas:
  professional: Paula Judkins, a methodical and imaginative community art organizer, leverages their watercolor expertise, digital illustration skills, and empathetic listening to design and coordinate
    therapeutic art workshops for local nonprofits while simultaneously advancing a bachelor's degree in Art Therapy, and they also mentor junior volunteers in project planning.
  sports: Paula Judkins, an avid weekend hiker on the Ozark Trail and regular participant in sunrise yoga at Fayetteville Flow Studio, cheers on the Arkansas Razorbacks during basketball season and supports
    the local semi‑pro soccer side Fayetteville FC, while maintaining a modest home‑gym setup for strength‑training to complement their outdoor pursuits, and they also log their runs in Strava.
  arts: Paula Judkins, a dedicated watercolorist and mixed‑media enthusiast, draws inspiration from Georgia O'Keeffe's desert palettes, Yayoi Kusama's polka‑dot motifs, and local painter John O'Connor's
    tactile abstractions, frequently attending gallery openings featuring artists like Miriam Sutherland while also curating a personal blog that showcases their own poetic reflections alongside playlists
    of Bon Iver and St. Vincent, and they regularly host small art‑talk gatherings in their garden.
  travel: Paula Judkins, who prefers thoughtfully planned getaways over spontaneous trips, often escapes to the historic baths of Hot Springs, Arkansas or the misty trails of the Great Smoky Mountains,
    has a bucket‑list entry for a spring pilgrimage to Kyoto's cherry‑blossom festivals, and dreams of a month‑long art‑therapy retreat in Costa Rica once their community studio is financially secure, and
    they habitually map each itinerary with a hand‑drawn sketch.
  culinary: Paula Judkins, an avid home baker with a knack for sourdough starter care, spends weekends perfecting rosemary‑infused focaccia, flaky croissants with almond‑cream filling, and lavender‑honey
    glazed scones, while occasionally experimenting with matcha powder and locally sourced heirloom tomatoes in savory tarts, and they also love hosting neighborhood tea parties where they serve fresh pastries.
  core: Paula Judkins blends artistic imagination with methodical planning, turning everyday moments—from garden harvests to watercolor washes—into purposeful community‑building rituals, all while habitually
    over‑watering their succulents and never turning down a late‑night poetry reading, and they thrive on the quiet buzz of a studio after dark.
background:
  cultural: 'Paula is a white woman who grew up in a semi‑rural part of Arkansas before moving to Fayetteville for college. Her upbringing emphasized Southern values such as hospitality, strong community
    ties, and a deep appreciation for the natural beauty of the Ozarks. Family traditions included church involvement, Sunday potlucks, and a love for regional foods like barbecue and fried catfish. The
    proximity to the University of Arkansas exposed her to a more diverse and progressive cultural environment, fostering openness to new ideas, artistic experimentation, and social justice. This blend
    of a traditional Southern background and contemporary college‑town influences shapes her worldview: she values loyalty, family, and community service while also championing creativity, inclusivity,
    and lifelong learning.'
