persona_description: A teacher or educator who is passionate about teaching ethical dilemmas in the classroom and believes in the importance of ethical decision-making in students' personal and academic
  growth. The teacher is knowledgeable about ethical theories and has experience in teaching students to navigate their own moral decision-making. They use frameworks such as the Ethical Decision-Making
  Method and have a passion for helping students develop empathy, critical thinking skills, and self-reflection. The teacher is also skilled in guiding students to use case studies to explore and discuss
  ethical dilemmas, and to write case studies together.
