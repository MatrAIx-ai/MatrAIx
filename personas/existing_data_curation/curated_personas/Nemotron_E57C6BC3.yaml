personas:
  professional: Beth Cooke, a veteran preschool and kindergarten teacher with over twenty years of experience, blends her curiosity for innovative pedagogy with pragmatic curriculum design to create play‑based
    lessons that weave literacy, STEM, and SEL, while their assertive yet compassionate leadership style makes them a sought‑after mentor and curriculum committee chair.
  sports: Beth Cooke, an avid member of the Everglades Hiking Club who enjoys gentle weekend treks, follows the Miami Heat for basketball and the Tampa Bay Rays for baseball, and complements outdoor activity
    with regular community‑center yoga classes that soothe their anxiety.
  arts: Beth Cooke, who paints tranquil watercolors of Florida wetlands inspired by Winslow Homer and Georgia O'Keeffe, loses themselves in historical fiction by Philippa Gregory and Bernard Cornwell, and
    crochets intricate blankets while humming folk tunes by Joan Baez.
  travel: Beth Cooke, a purposeful traveler who prefers slow, immersive experiences, has trekked the cobblestone streets of Florence, basked in the sunsets of Santorini, and spends weekends exploring Charleston
    and the Florida Keys, carefully budgeting each journey to keep their anxiety at bay.
  culinary: Beth Cooke, a confident home cook, whips up Mediterranean‑styled dishes like grilled branzino with lemon‑oregano vinaigrette, Greek salad with feta and Kalamata olives, and hibiscus‑infused
    mocktails, while harvesting fresh basil, heirloom tomatoes, and lemongrass from their tropical garden for daily meals.
  core: Beth Cooke, a 49‑year‑old early‑childhood educator, balances boundless curiosity with meticulous organization, combats intense anxiety through nightly journaling, and cannot resist rescuing stray
    garden gnomes for their patio décor.
background:
  cultural: Beth is a white American of mixed Irish and German ancestry, raised in a middle‑class suburb in the Midwest where education and community service were core family values. Her upbringing in a
    Protestant household emphasized compassion, responsibility, and involvement in local churches and charity groups. After completing her bachelor's degree in education, she moved to Boca Raton, Florida,
    where she and her husband have been active members of a diverse, coastal community. Beth respects the multicultural milieu of Palm Beach County, incorporating Latin American and Caribbean cultural references
    into her classroom to reflect her students' backgrounds. While she continues to celebrate traditional American holidays and family customs, she also embraces the regional culinary flavors, outdoor lifestyle,
    and the emphasis on inclusive, culturally responsive teaching that her current environment offers.
