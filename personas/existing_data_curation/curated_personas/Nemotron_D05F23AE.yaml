  hobbies: '["reading adventure books", "drawing cartoons", "LEGO building", "soccer", "bike riding", "nature exploration", "caring for family dog", "educational tablet games", "improvisational storytelling"]'
  career_goals: Yvonne aspires to become a teacher because she enjoys helping classmates learn within a structured classroom environment. At the same time, she dreams of exploring nature as a wildlife biologist,
    which would satisfy her curiosity and love for spontaneous discovery. She hopes to combine these interests by eventually leading a community garden or nature‑exploration program for kids, where she
    can teach, organize activities, and still experience the excitement of uncovering new things.
