personas:
  professional: Yvonne Luker, a budding LEGO architect who loves turning hexagonal bricks into sprawling cityscapes, uses the predictable snap-fit system of the bricks to satisfy her craving for order while
    letting spontaneous bursts of imagination scatter the layout, and they often switch between meticulous planning and impulsive building.
  sports: Yvonne Luker, an enthusiastic member of the local Little Rockets soccer club who idolizes the US Women's National Soccer Team, dashes across the field after school, balances teamwork with assertive
    goal-scoring, and they also ride a mountain bike on the neighborhood trail while exploring the creek for hidden treasures.
  arts: Yvonne Luker, a prolific sketchbook illustrator who mimics the whimsical style of Mo Willems and draws cartoons about her golden retriever's adventures, spends afternoons creating comics that blend
    structured panel layouts with spontaneous dialogue, and they eagerly swap drawings with friends during playdates.
  travel: Yvonne Luker, a curious traveler who has already visited the local state park's waterfall, dreams of exploring the geysers of Yellowstone and the castles of Germany, prefers family-planned road
    trips with a well-packed snack bag yet sometimes sneaks off to follow a butterfly, and they love collecting a pressed leaf from each destination.
  culinary: Yvonne Luker, a budding home chef who adores pepperoni pizza, cheesy macaroni, and crunchy carrot sticks, often helps stir batter for chocolate cupcakes and experiments with homemade trail mix
    featuring raisins, peanuts, and dried mango, and they have a habit of sneaking an extra cookie when no one watches.
  core: Yvonne Luker blends a love for orderly LEGO constructions with bursts of spontaneous storytelling, saves allowance for future sets while clutching occasional candy cravings, and navigates kid-sized
    challenges with a mix of cooperative charm and assertive curiosity.
background:
  cultural: 'Yvonne grows up in Dexter, a close‑knit community in Washtenaw County, Michigan. Her White, middle‑class family emphasizes Midwestern values such as friendliness, community involvement, and
    respect for seasonal traditions. They regularly attend local events like the Dexter Farmers'' Market, the county fair, and church gatherings, and they celebrate holidays with family‑centered meals and
    activities. The region''s four‑season climate shapes her hobbies: sledding in winter, swimming and bike rides in summer, and leaf‑collecting in the fall. School, neighborhood friendships, and community
    programs play a central role in her daily life, reinforcing a sense of belonging and shared responsibility.'
attributes:
  skills: '["reading comprehension", "basic writing", "addition and subtraction", "introductory multiplication", "spatial reasoning", "LEGO building", "introductory coding (ScratchJr)", "following routines",
