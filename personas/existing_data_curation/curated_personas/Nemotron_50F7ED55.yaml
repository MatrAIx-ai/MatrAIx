  hobbies: '[''Sketching and drawing'', ''Digital illustration'', ''Photography of urban landscapes'', ''Visiting local art galleries and museums'', ''Reading science fiction and philosophy'', ''Practicing
    yoga and mindfulness meditation'', ''Cooking Punjabi cuisine'', ''Playing the tabla'', ''Participating in community bike rides'', ''Journaling for mental health'']'
  career_goals: Lakhwinder aims to obtain a full‑time commercial driver’s license (CDL) and secure a permanent bus‑driver position with Metro Transit. He envisions advancing to roles such as dispatcher,
    route planner, or transit project manager, leveraging his curiosity about new ideas and systems. Combining his love for art, he hopes to curate on‑board art displays or lead community art‑themed tours
    using his route. He plans to attend community‑college courses in transportation logistics and digital media, ultimately aspiring to launch a small venture that fuses culturally themed transportation
    services with artistic experiences for the Minneapolis region.
