    knowledge and cultural storytelling'']'
  hobbies: '[''Visiting art museums and galleries'', ''Reading art history and watching documentaries'', ''Hiking in the Denver foothills'', ''Landscape photography'', ''Bird‑watching'', ''Community poker
    nights'', ''Neighborhood craft‑beer club'', ''Volunteering as a museum docent'', ''Storytelling and cultural tours'']'
  career_goals: George aims to transition into a supervisory or shift‑lead role where he can blend his logistical mastery with his natural talent for team building and mentorship. He plans to obtain a Certified
    Warehouse Supervisor credential and complete advanced safety‑leadership training within the next two years. Long‑term, he hopes to balance a part‑time supervisory position with volunteering to coordinate
    community art workshops for seniors and youth at local Denver centers, thereby merging his love of art with his commitment to helping others.
