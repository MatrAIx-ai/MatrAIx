persona_description: A nurturing and supportive teacher who prioritizes the holistic development of children through positive relationships and enabling environments. This person is skilled in facilitating
  learning through play and exploration, active learning, and critical thinking. They understand the importance of physical activity and encourage children to develop their co-ordination, control, and movement.
  They have a passion for Literacy, Mathematics, Understanding the World, and Expressive Arts & Design. They are dedicated to providing a curriculum that promotes and develops children's existing knowledge
  and skills in the seven areas of learning, and they value the input of parents and caregivers. They are committed to recording and sharing information about children's achievements in a 'Learning Journey'
  to keep parents informed and to provide a record of their child's development.
