    and folk music'', ''Participating in local book clubs'', ''Volunteering for adult literacy programs'']'
  career_goals: James aspires to become a Director of Learning & Development in a forward‑thinking organization, where he can lead initiatives that embed creativity and the arts into corporate training.
    He aims to develop a mentorship pipeline for mid‑career professionals, earn the Certified Professional in Learning and Performance (CPLP) credential, and complete a master's degree in Organizational
    Leadership. Ultimately, he envisions launching a boutique consultancy that offers arts‑infused learning experiences for nonprofit and small‑business clients throughout Kentucky, while championing employee
    well‑being through stress‑resilience programs that reflect his personal experience with worry and sensitivity to stress.
