  career_goals: Over the next five years, Irene aims to transition into a Technical Lead role and eventually become an Engineering Manager, where she can shape team culture and drive process improvements.
    She plans to earn an AWS Solutions Architect certification and enroll in a part‑time master's program in Computer Science to deepen her technical expertise. A key ambition is to champion mental‑health-friendly
    practices within her organization, creating structured support systems for stress management. Additionally, she hopes to contribute to open‑source projects that enhance developer tooling and accessibility.
