persona_description: A humanitarian worker who is part of the Disaster Management Affairs department of the Government of Malawi. They have extensive experience in managing and responding to disaster situations,
  with a particular focus on earthquake response and relief efforts. They have a deep understanding of the socio-economic and environmental factors that contribute to disaster vulnerability in Malawi, and
  are skilled in identifying and addressing immediate and long-term humanitarian needs in disaster-affected areas. They are dedicated to ensuring that the affected population receives the necessary support
  and assistance to recover and rebuild their lives.
