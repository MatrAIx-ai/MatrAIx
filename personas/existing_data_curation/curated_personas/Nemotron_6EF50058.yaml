personas:
  professional: April Mock, an event planner based in Indianapolis, blends meticulous logistical coordination with an emerging focus on sustainable, low‑stress conferences; they excel at vendor negotiation,
    budget oversight, and adaptive on‑site troubleshooting, while their relaxed stance on strict timelines sometimes leads to last‑minute schedule reshuffles they handle with calm composure.
  sports: April Mock, an avid weekend hiker at Eagle Creek County Park, also enjoys casual basketball pick‑ups with friends and attends Indiana Pacers games when the schedule permits, though they favor
    low‑key fitness like trail walking and gentle yoga over competitive sports.
  arts: April Mock, a quiet‑minded street photographer, draws inspiration from Vivian Maier and Nan Goldin, while immersing themselves in contemporary fiction by Sally Rooney and non‑fiction design works
    by John Maeda, often attending indie film screenings at the Indy Film Center.
  travel: April Mock, a thoughtful solo traveler, meticulously plans low‑key getaways to serene destinations such as Hocking Hills State Park and the Japanese town of Takayama, favoring off‑season visits
    that allow quiet reflection and align with their modest travel budget.
  culinary: April Mock, a home baker with a penchant for artisanal sourdough, frequently experiments with rosemary focaccia and lavender‑infused shortbread, nurturing a balcony herb garden of basil, thyme,
    and mint while pairing their baked creations with locally sourced honey.
  core: April Mock is a sustainably minded event planner who thrives on quiet solitude, balances meticulous logistics with a flexible, slightly disorganized approach, and channels their calm curiosity into
    hiking, photography, and home baking.
background:
  cultural: April grew up in a middle‑class white family in Indianapolis, rooted in Midwestern values of modesty, community service, and hospitality. Her grandparents emigrated from Germany and Ireland,
    and family traditions include seasonal farm‑to‑table meals, attending local county fairs, and volunteering at community events. These cultural influences fostered her appreciation for quiet, well‑organized
    gatherings and her instinct to consider others' needs. While she identifies with broader American culture, her upbringing in the Midwest has shaped her work ethic, pragmatic curiosity, and preference
    for harmonious, low‑key environments.
attributes:
  skills: '[''Logistics coordination'', ''Vendor negotiation'', ''Budget management'', ''Contract administration'', ''Venue scouting and booking'', ''Audio‑visual technology integration'', ''Hybrid/virtual
