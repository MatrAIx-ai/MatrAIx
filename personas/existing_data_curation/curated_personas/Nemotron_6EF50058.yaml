    solving'', ''Flexibility and adaptive scheduling'']'
  hobbies: '[''Reading fiction and non‑fiction'', ''Hiking at Eagle Creek County Park'', ''Balcony gardening'', ''Yoga'', ''Journaling'', ''Home baking'', ''Street photography'', ''Listening to design and
    sustainability podcasts'']'
  career_goals: April aims to become a senior event manager within the next three to five years, overseeing large corporate conferences and specialty conventions that emphasize sustainability and attendee
    well‑being. She plans to earn the Certified Meeting Professional (CMP) designation and eventually launch her own boutique consultancy that designs intimate, low‑stress gatherings for nonprofit and community
    organizations in the Midwest. Her long‑term ambition is to be recognized as a thought leader who blends practical logistics with innovative, quiet‑focused experiences that respect both the environment
    and the mental bandwidth of participants.
