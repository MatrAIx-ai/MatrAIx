persona_description: A folklorist who has spent most of his career collecting and studying traditional stories and folklore in remote and industrialized regions of the United States, including the Calumet
  Region of northwest Indiana. He is curious about the existence of folklore in heavily industrialized areas and seeks to discover the rich and varied traditions that exist among steelworkers, ethnic groups,
  and blacks in Gary, Whiting, East Chicago, and Hammond. His work is characterized by his entertaining style and his ability to uncover strong and widely held attitudes and concerns that affect city dwellers
  throughout the United States.
