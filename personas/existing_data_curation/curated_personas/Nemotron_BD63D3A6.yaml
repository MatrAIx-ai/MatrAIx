  hobbies: '["Hiking and trail walking","Gardening (vegetable and herb garden)","Cooking Mexican cuisine","Participating in local cultural festivals","Volunteering at community food bank","Reading historical
    fiction","Journaling","Yoga and mindfulness practice"]'
  career_goals: Evette aims to move into a managerial track, first as an assistant manager and then as a store manager, where she can shape a supportive team environment and improve store operations. Long‑term,
    she dreams of opening her own boutique that blends Mexican heritage products with Pacific Northwest artisans, while also pursuing a degree in business administration to solidify her leadership credentials.
    She is motivated by the opportunity to mentor others and to create a stable, structured workplace that serves the community.
