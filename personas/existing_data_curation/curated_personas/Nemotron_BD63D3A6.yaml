personas:
  professional: Evette Ortiz is a bilingual retail specialist who leverages strong customer‑service skills, POS expertise, and meticulous visual merchandising to streamline store operations, while consistently
    mentoring new staff and coordinating community outreach events with a practical, structured approach.
  sports: Evette Ortiz maintains fitness through weekly hikes along the Cascades, practices sunrise yoga sessions, and supports the Seattle Sounders FC and the Seattle Seahawks, often joining a local running
    club that meets at Green Lake for weekend cardio.
  arts: Evette Ortiz indulges in historical fiction by authors such as Ken Follett and Isabel Allende, enjoys listening to folk‑rock bands like The Lumineers, attends the local art walk featuring Pacific
    Northwest painters, and volunteers to curate cultural festival showcases that blend traditional dance with contemporary performance.
  travel: Evette Ortiz prefers well‑planned trips that balance adventure and relaxation, having trekked the Canadian Rockies, explored the historic streets of Québec City, and taken a weekend road‑trip
    to the Columbia River Gorge, while dreaming of a future retreat to Costa Rica’s cloud forests.
  culinary: Evette Ortiz loves to cook family‑heritage dishes that feature fresh herbs from their garden, such as cilantro‑infused grilled chicken with roasted corn, homemade salsa verde, and a slow‑cooked
    stew flavored with chilies and epazote, often pairing meals with locally sourced craft cider.
  core: Evette Ortiz blends structured ambition with compassionate community spirit, balancing meticulous planning, hands‑on gardening, and heartfelt cooking while always carving out moments for reflective
    yoga and quiet reading.
background:
  cultural: Evette’s Mexican heritage plays a central role in her identity, shaping her values of family, community, and hospitality. Bilingual and fluent in Spanish, she maintains cultural traditions such
    as Día de los Muertos, quinceañera celebrations, and cooking authentic dishes that she shares with her neighbors in Twisp. Living in the Pacific Northwest, she blends these traditions with the local
    lifestyle, often participating in regional events while bringing a Mexican perspective to community gatherings. Her cultural background informs her compassionate approach to both work and volunteering,
    and she takes pride in being a bridge between her Mexican roots and her rural Washington community.
attributes:
  skills: '["Bilingual Spanish-English communication","Customer service","Point-of-sale (POS) system operation","Inventory management","Visual merchandising","Conflict resolution","Team training and mentorship","Organizational
