  career_goals: Joaquín aims to channel his technical expertise into community service, establishing a neighborhood maker‑space where he can mentor youths in practical trades. He hopes to collaborate with
    local schools to introduce hands‑on STEM workshops, and eventually document his accumulated knowledge in a series of bilingual guidebooks on home repair and sustainable living. While not seeking formal
    employment, he intends to remain an active, respected contributor to his community, using his skills to improve local resilience and preserve cultural craftsmanship.
