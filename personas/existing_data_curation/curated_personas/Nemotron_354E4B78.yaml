personas:
  professional: Joaquin Quiros, a seasoned maintenance technician turned community maker‑space founder, leverages their industrial maintenance background, hands‑on woodworking, and improvisational problem‑solving
    to mentor youths and adapt complex repairs into teachable moments, while their spontaneous nature keeps projects fluid but occasionally challenges deadline adherence.
  sports: Joaquin Quiros, a devoted fan of the Cangrejeros de Santurce baseball squad and occasional member of the San Juan community jogging group, keeps fit with early morning coastal runs and weekend
    pick‑up basketball at the Santurce gym, though their spontaneous schedule sometimes skips planned workouts.
  arts: Joaquin Quiros, a self‑taught photographer who prints silver‑gel images of Old San Juan's pastel‑colored streets and a devoted cuatro player who reveres the folk tones of maestros like Ramón Rivera
    and the classic songs of Rafael Hernández, they infuse woodworking projects with artistic flourishes inspired by sculptor José Bedia.
  travel: Joaquin Quiros, whose wanderlust blends spontaneous day‑trips to nearby Playa Flamenco on Culebra with occasional abroad journeys to the historic plazas of Cartagena, Colombia, and the serene
    rice terraces of Bali, prefers flexible itineraries over rigid schedules, even though a modest retirement pension imposes careful budgeting on travel escapades.
  culinary: Joaquin Quiros, an avid home‑cook who masters the art of mofongo—mashed green plantains blended with chicharrón, garlic, and a splash of adobo—while also experimenting with fresh garden cilantro,
    aji dulce, and pumpkin in their version of pasteles, they often pair meals with a chilled glass of locally brewed Medalla beer.
  core: Joaquin Quiros, a hands‑on maker with quiet curiosity, blends practical ingenuity and spontaneous generosity, yet habitually leaves tools scattered and deadlines drifting.
background:
  cultural: Joaquín is a native of San Juan, raised in the vibrant barrios of Carolina Municipio. As a Puerto Rican, he grew up immersed in a blend of Caribbean and American influences, speaking Spanish
    at home while navigating schooling in English. He carries the island’s strong sense of community, respect for elders, and reverence for cultural traditions such as música jíbara, festive folk songs,
    and culinary heritage. The island’s history of resilience in the face of economic and environmental challenges shaped his practical mindset. He is proud of his heritage, often attending local festivals,
    supporting small family‑owned businesses, and preserving the island’s artisanal crafts through his own woodworking. His identity is anchored in the values of self‑reliance, adaptability, and a deep
    connection to the rhythms of Puerto Rican life.
