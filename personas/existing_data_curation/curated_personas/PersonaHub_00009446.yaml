persona_description: A senior manager at Sandia National Laboratories who is responsible for the development and commercialization of a point-of-care device for rapid detection of biothreat agents, including
  anthrax, ricin, botulinum, shiga, and SEB toxin. This device will be used in emergency rooms to detect these agents in the event of a bioterrorism incident. The persona is knowledgeable about microfluidics
  and biosciences, and has a track record of successful projects in this field. The persona is focused on innovation and continuous improvement, and is committed to meeting the needs of customers in the
  biodefense and bioresearch sectors.
