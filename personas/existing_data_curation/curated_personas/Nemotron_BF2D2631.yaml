  hobbies: '[''Reading (historical fiction and mystery)'', ''Knitting and crocheting'', ''Garden cultivation (vegetables and ornamental)'', ''Bird watching'', ''Baking homemade bread and pies'', ''Church
    potluck gatherings'', ''Hiking local trails'', ''Listening to folk and bluegrass music'', ''Participating in a small book club'']'
  career_goals: Melissa’s current focus is on deepening her role within the community while exploring ways to turn her culinary and baking talents into a modest home‑based business. She hopes to obtain
    a food‑safety certification and start selling homemade breads, pies, and preserves at local farmers’ markets. Additionally, she is interested in completing an online caregiving certification to broaden
    her volunteer impact at the nearby senior center. Over the next five years, she envisions herself leading a neighborhood resource network, providing support for families in need, and possibly returning
    to part‑time work in a community center where her organizational and interpersonal skills can be utilized. Personal growth goals include enrolling in a community college course on small business management
    and learning more about sustainable gardening practices.
