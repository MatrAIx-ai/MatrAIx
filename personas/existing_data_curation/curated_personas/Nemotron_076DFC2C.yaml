  hobbies: '[''Line dancing'', ''Cheerleading'', ''Soccer'', ''Cooking and baking'', ''Volunteer work at church'', ''Gardening'', ''Crocheting'', ''Friendship bracelet making'', ''TikTok content creation'']'
  career_goals: Sandra aims to complete her high school equivalency (GED) within the next year and enroll in a community‑college program for Early Childhood Education, so she can work as a certified childcare
    assistant. In the short term, she intends to secure a part‑time position at a local grocery store or a family‑run farm to gain work experience and contribute financially to her household. She also plans
    to obtain a basic first‑aid certification to enhance her caregiving abilities. Long‑term, Sandra dreams of opening a small café or bakery in Glennville, where she could combine her love for baking with
    her desire to create a welcoming community space. Her practical outlook and love for structured environments guide her toward career paths that offer clear steps and tangible outcomes.
