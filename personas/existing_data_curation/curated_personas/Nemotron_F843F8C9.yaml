  hobbies: '[''Fishing'', ''Hunting'', ''Gardening'', ''Woodworking'', ''Classic car restoration'', ''Watching college football (Clemson Tigers)'', ''Church activities and community picnics'', ''Reading
    historical non‑fiction'', ''Playing cards'', ''Attending local fairs and festivals'']'
  career_goals: As he approaches retirement age, William aims to secure a senior technician or shift‑lead role that leverages his institutional knowledge while allowing a steadier schedule. He hopes to
    earn an OSHA‑10 certification and complete a short course in industrial automation, positioning himself as a mentor for younger staff. Ultimately, he envisions transitioning to part‑time consultancy
    for local textile firms or running a small workshop where he can turn his mechanical tinkering into a hobby‑business, such as refurbishing vintage sewing machines.
