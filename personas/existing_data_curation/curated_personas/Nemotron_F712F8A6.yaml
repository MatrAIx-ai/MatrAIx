personas:
  professional: Madline Patino is a budding community outreach enthusiast who leverages bilingual fluency and event‑organizing flair to coordinate neighborhood games and cultural gatherings, while they
    often roll with last‑minute changes due to a laid‑back attitude.
  sports: Madline Patino plays forward on a community park soccer squad, cheers on Orlando City SC during MLS season, and attends a local bachata‑dance fitness class that blends cardio with rhythm, reflecting
    their energetic, sociable nature.
  arts: Madline Patino dances bachata to Aventura and merengue to Juan Luis Guerra at weekend socials, sketches vibrant street‑art inspired by Kissimmee’s murals, and curates TikTok reels featuring music
    by Bad Bunny and Romeo Santos, illustrating their creative, outgoing spirit.
  travel: Madline Patino has explored Orlando’s theme parks and visited Santo Domingo with family, dreams of backpacking through Cartagena during summer break, and plans a road‑trip to Miami’s Little Havana
    for a culinary weekend, favoring spontaneous itineraries over rigid plans.
  culinary: Madline Patino perfects mangú with cheese and sautéed onions, rolls pastelitos for neighborhood fiestas, loves the sweet tang of guava paste, and experiments with coconut‑milk‑based sancocho
    on weekends, though their kitchen often ends up a lively mess.
  core: Madline Patino is a sociable, curiosity‑driven teen who balances spontaneous creativity with a habit of forgetting schedules, constantly juggling dance, soccer, and TikTok fame.
background:
  cultural: Madline grew up in a bilingual Dominican household in Kissimmee, Florida. At home, Spanish is spoken, and traditions such as celebrating Dominican Independence Day, Carnival, and family reunions
    with classic foods like mangú and pasteles are central to her life. Her extended family maintains strong ties with relatives in the Dominican Republic, and she regularly participates in church activities
    and community festivals that blend Caribbean rhythms with Floridian multicultural influences. The diverse environment of Osceola County, with its mix of Latino, Caribbean, and Southern cultures, has
    given her a broad appreciation for different customs while keeping her Dominican roots at the core of her identity.
attributes:
  skills: '[''Bilingual communication (English/Spanish)'', ''Social media proficiency (Instagram, TikTok)'', ''Event coordination for peer gatherings'', ''Basic cooking (mangú, sancocho)'', ''Team sports
