  hobbies: '[''Bachata and merengue dancing'', ''Playing soccer'', ''Cooking Dominican dishes'', ''Creating TikTok videos'', ''Volunteering at community center'', ''Sketching street art'', ''Listening to
    reggaeton and Latin pop'']'
  career_goals: Madline dreams of completing high school and later studying hospitality or community development at a local college. She aims to combine her love for Dominican culture and people‑centered
    work by becoming a community outreach coordinator at a cultural center in Central Florida, or by launching a small catering business that offers traditional Dominican food at local events. In the short
    term, she plans to earn a food‑safety certification, take a part‑time role in a youth mentorship program, and gain experience while keeping a flexible schedule that allows her to continue her social
    and creative pursuits.
