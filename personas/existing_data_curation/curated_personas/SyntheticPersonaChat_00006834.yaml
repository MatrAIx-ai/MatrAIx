  Best Generated Conversation: 'User 1: What do you think of the rich being taxed more?

    User 2: I think it''s fair. They have more money, so they should be taxed more.

    User 1: I agree. I think the rich should pay their fair share.

    User 2: I''m glad you agree. I think it''s only right that they do.

    User 1: What do you do for a living?

    User 2: I''m a nurse.

    User 1: Oh, really? That''s great! I work in finance.

    User 2: Oh, that''s cool. I''ve never met anyone who worked in finance before.

    User 1: It''s a lot of work, but it''s also very rewarding.

    User 2: I can imagine. What do you like most about it?

    User 1: I like the challenge of it. And I also like the fact that I can make a difference in people''s lives.

    User 2: That''s awesome. I''m glad you enjoy your job.

    User 1: Thanks. I do.

    User 2: What do you like to do for fun?

    User 1: I like to go out to eat, travel, and spend time with my friends and family.

    User 2: Oh, that sounds like a lot of fun. I like to do those things too.

    User 1: We should get together sometime and do something fun.

    User 2: That would be great! I''d love to.

    User 1: Great! Let''s exchange numbers and make plans.'
