    (Brandywine Valley)'']'
  career_goals: Cynthia aims to achieve full CPA licensure within the next year and advance to an audit manager position at her firm, overseeing multiple client engagements and mentoring junior staff. She
    is interested in expanding her expertise in data‑analytics‑driven audits and eventually leading a compliance division or opening her own boutique accounting practice that services local small businesses.
    Additionally, she seeks to develop strategic leadership skills to influence firm‑wide audit methodology and champion a culture of continuous improvement, while also maintaining a healthy work‑life balance
    to mitigate stress.
