personas:
  professional: Cynthia Henderson is a seasoned accountant and internal auditor who leverages fifteen years of public‑accounting experience to design meticulous audit plans, integrate data‑analytics tools
    like SQL and ACL, and mentor junior staff, while they pursue CPA licensure and set their sights on an audit‑manager position.
  sports: Cynthia Henderson competes in local 5K charity races with the Brandywine Running Club, hikes solo on Brandywine Valley trails for weekend resets, and they root for the Philadelphia Eagles and
    Phillies, using these activities to channel their competitive streak while respecting a structured routine.
  arts: Cynthia Henderson finds creative escape in crossword puzzles, Sudoku, and a weekly chess club, while they also enjoy classical concerts featuring Bach, attend productions at Philadelphia’s Walnut
    Street Theatre, and curate a modest collection of botanical art that mirrors their gardening passion.
  travel: Cynthia Henderson prefers meticulously planned trips, favoring weekend getaways to the Hudson Valley and historic sites like Colonial Williamsburg, dreaming of a spring garden tour in Kyoto, and
    they balance travel ambitions with a tight budget and family commitments.
  culinary: Cynthia Henderson’s kitchen is a precision lab where they bake sourdough bread, perfect coq au vin with rosemary and shallots, and craft a seasonal ratatouille using zucchini, eggplant, and
    bell peppers, always measuring ingredients to the gram and showcasing a knack for both savory and sweet pastries.
  core: Cynthia Henderson is a detail‑driven accountant with a green thumb and a puzzle‑solving mind, whose relentless drive for structure fuels career ambition and precise culinary experiments, even as
    chronic worry shadows their daily routine and they struggle to unwind.
background:
  cultural: Cynthia's cultural background is rooted in a middle‑class, Anglo‑American family that has lived in the Greater Philadelphia region for generations. Raised in suburban Pennsylvania, she grew
    up with a strong emphasis on hard work, education, and community involvement, reflecting the traditional values of the area’s Quaker and Protestant heritage. Family traditions such as Thanksgiving gatherings
    and holiday volunteer service are central to her identity. Her upbringing in Delaware County, a region known for its historic preservation and emphasis on civic responsibility, informs her commitment
    to integrity and stewardship both personally and professionally.
