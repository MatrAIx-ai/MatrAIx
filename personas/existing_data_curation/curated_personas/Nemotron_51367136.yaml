  career_goals: Elizabeth aims to transition from employee to entrepreneur by launching a boutique cleaning service that emphasizes sustainable, low-chemical methods for families in the Los Angeles area.
    She plans to obtain a professional certification in green cleaning and home stewardship, and over the next few years she hopes to become a trusted household manager for multiple residences, providing
    not only cleaning but also space-optimization consulting and occasional art-inspired decor suggestions. Mentoring younger housekeeping staff is a key ambition; she wants to share her expertise and encourage
    continuous learning, especially for those balancing domestic work with other responsibilities. Additionally, she envisions a side business offering one-on-one home organization workshops, helping clients
    declutter and design functional, visually appealing spaces. Financial stability for her retirement and supporting her children's college savings drive her entrepreneurial goals.
