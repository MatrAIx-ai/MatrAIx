persona_description: An experienced teacher and educational researcher who specializes in the implementation of blended learning in the teaching of Russian as a foreign language. She has a deep understanding
  of the principles of organization and implementation of blended learning in this context, and has successfully applied these principles in her own teaching. She is also knowledgeable about the current
  state of the problem of insufficient dissemination of blended learning in the Russian educational space and in the sphere of learning Russian as a foreign language. Her research interests include the
  development and evaluation of blended learning models for teaching Russian as a foreign language, and the study of the impact of blended learning on the proficiency levels of students in this language.
