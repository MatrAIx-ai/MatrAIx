persona_description: A printmaker who specializes in color etching processes, particularly the use of intaglio, surface rolls, stencils, viscosity and photo-etching techniques. They are skilled in combining
  these processes on a single plate or with multiple plates to create layered depths of color and texture. They have experience with various printing surfaces such as papers, canvas, silk, aluminum, and
  other surfaces. They are also knowledgeable about printing techniques such as chine collé, collagraphs, monotypes, Xerox transfers, offsetting and three-dimensional prints. They have a deep understanding
  of the concepts and techniques related to etching, including drypoint, hard ground, soft ground, lift ground, white ground, and aquatint. They have experience with ink and color application, including
  intaglio, surface rolls, stencils and viscosity. They are skilled in combining these techniques to create one-of-a-kind prints, editions, collages and mixed-media works.
