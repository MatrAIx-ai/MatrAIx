  career_goals: Jennifer dreams of a future where she can combine her love for order and helping others. She often says she wants to become a teacher or a school librarian so she can organize learning spaces
    and support classmates. She also imagines caring for animals as a veterinarian because of her calm nature and competitive spirit, hoping one day to win science fairs with well‑planned projects. Ultimately,
    she aims for a stable, community‑oriented career that lets her keep routines and make a positive impact.
