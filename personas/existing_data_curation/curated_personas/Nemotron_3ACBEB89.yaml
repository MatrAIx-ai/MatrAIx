personas:
  professional: Jennifer Otero, a budding architect-in-training, channels their love for LEGO and puzzles into designing meticulous scale models, methodically chronicling each build in a notebook and dreaming
    of one day drafting blueprints for real houses, and they approach each project with the same practical, step-by-step mindset that defines their everyday life.
  sports: Jennifer Otero, a forward on the Maple Grove Youth Soccer Club, adheres to a strict training schedule that features Thursday drills, Saturday matches against rival squads like the Riverdale Rovers,
    and post-game analysis with the coach, and they relish the structured competition as an outlet for their competitive spirit.
  arts: Jennifer Otero, an avid reader of the Harry Potter series and a piano student, spends evenings mastering Für Elise while humming John Williams' magical themes, curates a collection of illustrated
    bookmarks by artists such as Mary Grandpre, and they integrate these artistic pursuits into a meticulously planned daily routine.
  travel: Jennifer Otero prefers meticulously planned family trips, such as the annual weekend hike on the same loop trail at Willow Creek State Park and a summer stay at the coastal town of Santa Cruz
    where they swap stickers on the boardwalk, and they document every outing with a scrapbook page featuring photos, tickets, and a brief itinerary.
  culinary: Jennifer Otero, an aspiring home chef, delights in crafting homemade pepperoni pizza with fresh basil from the garden, mixing carrot-tomato salads harvested on Saturdays, yet they sometimes
    neglect to clean the prep area before starting a new recipe, a quirk that surprises even the most organized of their parents.
  core: Jennifer Otero, a nine-year-old who thrives on routine and competition, tackles each day with meticulous planning—from LEGO builds to soccer drills—and they secretly hoard extra stickers in a hidden
    drawer for emergency trades.
background:
  cultural: Jennifer grows up in Lawrenceburg, Indiana, within a white, Midwestern family that values community, modesty, and tradition. Her family attends a local Methodist church, celebrates Thanksgiving,
    Fourth of July parades, and the county fair, and emphasizes routine and responsibility. School life at the public elementary school reinforces organization and teamwork, while local customs—like annual
    holiday gatherings and neighborhood block parties—reinforce her familiar and practical worldview.
