    temple'']'
  career_goals: Although she is currently not employed, Surabhi is motivated to translate her practical abilities into volunteer leadership and modest entrepreneurship. She aims to complete a community‑college
    certificate in digital literacy so she can mentor seniors in Cincinnati on safe internet use and basic tech troubleshooting. She dreams of launching a home‑based catering venture that offers healthy,
    heritage‑rich Gujarati meals for small corporate luncheons and local cultural festivals, hoping to win a regional cooking competition as a way to prove her culinary expertise. Surabhi also aspires to
    become a peer facilitator for a senior anxiety support group, drawing on her own experiences with intense emotional reactivity to help others manage stress. Finally, she wishes to write and self‑publish
    a memoir that chronicles her immigrant family history and personal journey of resilience.
