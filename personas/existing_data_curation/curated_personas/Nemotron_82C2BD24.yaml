personas:
  professional: An aspiring digital‑literacy mentor and home‑based caterer, Surabhi Parekh leverages meticulous budgeting and event‑planning expertise to develop volunteer leadership and a niche corporate
    lunch service, and they approach each project with a competitive drive while staying cautious about overcommitting.
  sports: A modest sports enthusiast, Surabhi Parekh follows the Cincinnati Bengals and the Reds while participating in a local walking club and weekend garden‑yard yoga sessions, they enjoy occasional
    light jogging in the park and prefer low‑impact activities that align with their age and desire for solitary exercise.
  arts: An avid lover of cultural arts, Surabhi Parekh attends intimate sitar recitals at the temple and enjoys the Cincinnati Symphony Orchestra’s performances, they also collect memoirs of diaspora experiences
    that inform their appreciation of narrative arts and occasionally join a community theater’s backstage crew for small productions.
  travel: A thoughtfully planned traveler, Surabhi Parekh has explored the historic streets of Old Town Cincinnati, taken weekend trips to Asheville’s Blue Ridge Mountains, and fulfilled a lifelong wish
    to visit Jaipur during Diwali, they favor itineraries that balance cultural immersion with comfortable accommodations, and they often budget trips meticulously to allow for occasional spontaneous detours.
  culinary: An innovative home cook, Surabhi Parekh perfects dishes like dhokla, thepla, and lentil kala chana curry, experimenting with spice blends that include cumin, coriander, and asafoetida, they
    keep a handwritten notebook of recipes, regularly host small tasting gatherings, and they occasionally indulge in sourcing specialty ingredients from ethnic markets for their catering venture.
  core: Surabhi Parekh is a detail‑driven, introspective 55‑year‑old who channels competitive energy into community mentoring, cautious budgeting, mindful health practices, and culinary creativity, all
    while navigating intense emotions with meditation and a love for solitary pursuits.
background:
  cultural: Surabhi Singh Parekh is a first‑generation American of Gujarati Indian heritage. Raised in a close‑knit South Asian household in Cincinnati, she grew up navigating the expectations of a traditional
    Indian family while integrating into Midwestern American culture. Family celebrations such as Diwali, Navratri, and Uttarayan are central to her identity, and she continues to observe these festivals,
    often preparing authentic dishes and sharing them with friends and neighbors. Gujarati is spoken at home, and she maintains fluency in reading Devanagari script. Her cultural values emphasize modesty,
    self‑reliance, and respect for elders, which have shaped her independent lifestyle and her decision to remain unmarried. At the same time, she participates in the local Indian community association,
    volunteering at cultural events and contributing her culinary skills. Surabhi’s identity reflects a blend of Indian traditions and American individualism, informing both her personal interests and her
    desire to give back to the broader community.
