  career_goals: Sylvia’s ambitions are expressed through imaginative role‑play. She loves helping her mother stir a pot in the kitchen and often pretends to be a teacher caring for stuffed animals, hinting
    at a future desire to work in caregiving or education. Guided by her parents’ encouragement, she aims to be the best helper at home, a goal she pictures translating into becoming a respected teacher
    or community caretaker when she grows older. Her competitive nature fuels a wish to excel academically, while her sensitivity to stress makes her seek stable, supportive environments where she can feel
    secure.
