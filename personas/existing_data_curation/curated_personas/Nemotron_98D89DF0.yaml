  hobbies: '[''Sketching in sketchbook'', ''Digital illustration on tablet'', ''Reading graphic novels and indie comics'', ''Listening to indie/alternative music'', ''Urban photography'', ''Participating
    in small‑group art workshops'', ''Volunteering as a tutor for younger children'', ''Exploring street murals and graffiti'', ''Experimenting with new digital art applications'', ''Skateboarding with
    close friends'']'
  career_goals: Jacob dreams of turning his love for visual storytelling into a career that also serves his community. In the next few years he aims to build a strong portfolio of illustrations and comics
    to apply to a specialized high‑school art program, and eventually attend an art school where he can study illustration or user‑experience design. Long‑term, he hopes to work as a community arts facilitator
    or a creative consultant for non‑profits, using his artistic skills to design campaigns that raise awareness about social issues and foster collaboration among diverse groups. He also envisions mentoring
    younger children in creative workshops, blending his compassion with his artistic passion.
