persona_description: A historian or archaeologist who specializes in the study of iron furnaces and their impact on the history and development of the Hanging Rock region. They are interested in the details
  of the construction, operation, and decline of the iron furnaces, as well as the social and economic impact they had on the local communities. They are also interested in the unique features and historical
  significance of the surviving iron furnaces, such as the stone stacks and the remnants of the town.
