persona_description: A researcher and scholar who is deeply involved in the field of lifelong learning and its access issues. They are interested in understanding the diversity of contexts in which access
  to lifelong learning is researched and the issues central to the access debate. They are also curious about the range of methodological approaches that have been employed by researchers in the field and
  the innovative methodological approaches that have been used to address the research questions. They are passionate about the growing concern around the world on the need to combat social exclusion and
  improve economic circumstances through access to lifelong learning and are committed to exploring the relationships between research, policy, and practice.
