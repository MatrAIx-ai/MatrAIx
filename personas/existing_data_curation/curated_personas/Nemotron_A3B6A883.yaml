personas:
  professional: Jane Pixley is an aspiring community development student who leverages their knack for organizing volunteer art events and mediating group dynamics to design inclusive youth workshops that
    blend creative expression with social support.
  sports: Jane Pixley is a casual hiker who frequents the trails of Rock Cut State Park, follows the Chicago Bulls and Bears with enthusiastic yet laid‑back fandom, and joins the Rockford Runners club for
    Saturday morning jogs, treating exercise as a social outlet rather than a regimented regimen.
  arts: Jane Pixley immerses herself in the local art scene, drawing inspiration from Monet’s watercolors and Frida Kahlo’s mixed media, snapping street photography of Rockford’s murals, and regularly discusses
    contemporary fiction by Sally Rooney and the soulful folk tunes of Sufjan Stevens during book club gatherings.
  travel: Jane Pixley plans weekend road trips with a mix of careful itinerary and spur‑of‑the‑moment detours, having already explored Chicago’s museums, taken a day‑long hike in the Hocking Hills of Ohio,
    and dreaming of a future art‑focused pilgrimage to Paris’s Musée d’Orsay.
  culinary: Jane Pixley enjoys a modest but adventurous kitchen, whipping up beet‑and‑goat cheese salads, fresh herb focaccia using garden‑grown basil, and experimental watercolor‑inspired layered desserts,
    though they sometimes over‑salt their soups in the excitement of flavor.
  core: Jane Pixley blends an unstoppable curiosity for art with a calm, community‑first mindset, turning every potluck, hike, or volunteer shift into a canvas for connection, even if they occasionally
    misplace their watercolors in the garden.
background:
  cultural: Jane grew up in a middle‑class family in Rockford, Illinois, with roots in German and Irish ancestry that are common in the region. Her upbringing reflects typical Midwestern values—emphasis
    on community service, modesty, family cohesion, and a strong work ethic. She attended the local public high school, where she participated in the art club and school theater, fostering her appreciation
    for creative expression. The cultural milieu of Rockford, with its blend of industrial heritage and a growing arts community, has shaped her worldview, encouraging both a respect for tradition and an
    openness to new ideas. While identifying as white, Jane actively engages in inclusive community initiatives that celebrate diversity and promote social harmony.
attributes:
  skills: '[''Interpersonal communication'', ''Community outreach'', ''Event planning'', ''Creative arts (watercolor painting, sketching, photography)'', ''Digital content creation (social media, Canva)'',
