  hobbies: '[''Watercolor painting and sketching'', ''Photography'', ''Visiting local art museums and galleries'', ''Community book club (contemporary fiction)'', ''Hosting themed potluck gatherings'',
    ''Hiking in Rock Cut State Park'', ''Gardening (vegetable garden)'', ''Volunteering at community art festivals'', ''Mentoring younger volunteers'']'
  career_goals: Jane aims to pursue a bachelor's degree in social work or community development at a nearby state university, with a long‑term ambition to become a community outreach coordinator for a nonprofit
    that integrates arts into youth empowerment programs. She envisions creating and leading after‑school workshops where creative expression serves as a tool for personal growth and social cohesion. Additionally,
    she hopes to obtain a certification in art therapy, allowing her to blend her love of art with her compassionate drive to support others. While building her career, she plans to balance family life,
    continuing to nurture her marriage and community connections in Rockford.
