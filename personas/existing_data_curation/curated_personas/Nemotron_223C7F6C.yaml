personas:
  professional: Angel Santana, a 40‑year‑old teaching assistant at a public middle school in Weatherly, PA, leverages their expertise in bilingual instruction, educational technology (Google Classroom,
    Seesaw, Canvas), and visual‑arts integration to design evidence‑based curricula, while their curious, competitive nature drives them to constantly refine lesson plans and mentor at‑risk students with
    a critical eye.
  sports: Angel Santana enjoys weekend hikes in the Allegheny foothills with the local Trailblazers Hiking Club, roots for the Pittsburgh Steelers, and they practice yoga twice weekly at Weatherly’s community
    center, balancing solitary reflection with occasional spirited participation in the town’s co‑ed softball league.
  arts: Angel Santana, an avid acrylic painter inspired by Diego Rivera’s murals and the lyrical landscapes of Appalachian folk artists like The Carolina Chocolate Drops, frequents the Luzerne County Art
    Museum’s exhibitions, collects Frida Kahlo prints, and they channel their critical yet open‑minded outlook into bold, community‑focused canvases.
  travel: Angel Santana prefers meticulously planned cultural trips, having explored Oaxaca’s historic markets and Mexico City’s mural routes, while dream‑ing of a fall weekend in the Scottish Highlands
    to study Celtic folk art, they balance travel budgets with a savings plan for future community‑center workshops.
  culinary: Angel Santana delights in crafting authentic mole poblano with pasilla, mulato, and chipotle chilies, prepares hand‑made tamales with masa and roasted pumpkin seeds, and experiments with locally
    sourced Pennsylvania apples in a spiced crumble, their cooking skill is advanced but they occasionally over‑salt dishes in their quest for bold flavor.
  core: Angel Santana blends a meticulous educator’s precision with a restless artist’s curiosity, balancing critical competition and community‑driven compassion while they occasionally let perfectionism
    sabotage their own downtime.
background:
  cultural: Angel’s Mexican heritage is a central thread in her identity. Raised in a bilingual household, she grew up speaking Spanish with her parents and grandparents, learning traditional recipes, folklore,
    and the significance of Día de los Muertos. The values of family cohesion, respect for elders, and community solidarity guide her daily life, while her upbringing in a Mexican immigrant community in
    Pennsylvania has taught her to navigate dual cultural expectations. She celebrates both Mexican and American holidays, participates in local Hispanic outreach programs, and actively incorporates Mexican
    folk art motifs and storytelling techniques into her teaching, reflecting a nuanced blend of cultural pride and adaptive openness.
attributes:
  skills: '[''Lesson planning and adaptation'', ''Bilingual instructional support (Spanish/English)'', ''Art integration into curriculum'', ''Educational technology proficiency (Google Classroom, Seesaw,
    Canvas)'', ''Student data analysis and assessment reporting'', ''Classroom management and organization'', ''Differentiated instruction design'', ''Academic tutoring for at‑risk students'', ''Professional
    development assistance'', ''Collaborative curriculum development'']'
  hobbies: '[''Acrylic painting and mural-inspired art'', ''Cooking Mexican dishes (mole, tamales, salsas)'', ''Attending local art exhibits and folk music concerts'', ''Hiking in the Allegheny foothills'',
    ''Yoga and mindfulness practice'', ''Bilingual book club focusing on Latin American literature and pedagogy'']'
  career_goals: Angel aims to transition from a teaching assistant to a fully credentialed classroom teacher within the next three years, pursuing a Master’s degree in Curriculum and Instruction with a
    focus on bilingual education. She is determined to become a literacy and arts specialist who can lead district‑wide initiatives that embed Mexican folk art and culturally responsive pedagogy into standard
    curricula. Long‑term, she envisions establishing a community cultural center that offers after‑school arts workshops and bilingual tutoring, positioning herself as a competitive leader who shapes educational
    policy at the county level.
