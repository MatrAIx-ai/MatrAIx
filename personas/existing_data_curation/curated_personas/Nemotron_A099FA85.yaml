  hobbies: '[''Community theater'', ''Habitat for Humanity volunteering'', ''Historic preservation society'', ''Gardening'', ''Farm‑to‑table cooking'', ''Hiking'', ''Yoga'', ''Photography'', ''Woodworking'',
    ''Book club'']'
  career_goals: Melba aims to become a senior partner in her firm, leading a multidisciplinary team that focuses on sustainable, community‑oriented architecture in the Midwest. She is passionate about spearheading
    adaptive‑reuse projects that revitalize historic downtown Adrian while incorporating renewable energy systems. Mentorship is a core ambition; she wants to cultivate the next generation of architects—especially
    women and underrepresented groups—through formal mentorship programs and local AIA workshops. In the long term, she envisions launching a boutique practice dedicated to low‑impact design and regional
    heritage preservation, positioning herself as a thought leader in resilient, people‑first architecture.
