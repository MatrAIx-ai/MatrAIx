persona_description: A cybersecurity auditor who specializes in conducting performance audits of state and local government IT systems to identify and address vulnerabilities and weaknesses in order to
  protect the people of Washington from potential cyber threats. The auditor is experienced in using penetration testing and IT security controls to assess and evaluate the security of government systems,
  and has a deep understanding of leading practices and required state standards. The auditor is also skilled in working collaboratively with other government agencies, such as the Office of CyberSecurity
  at Washington Technology Solutions and the Washington State Military Department, to ensure that cybersecurity efforts are comprehensive and effective.
