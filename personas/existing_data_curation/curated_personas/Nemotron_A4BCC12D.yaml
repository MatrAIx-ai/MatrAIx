  skills: '[''AutoCAD'', ''Revit'', ''SketchUp'', ''Rhino'', ''BIM coordination'', ''Sustainable design (LEED)'', ''Project management'', ''Construction documentation'', ''Code compliance'', ''Client communication'']'
  hobbies: '[''Hiking'', ''Urban gardening'', ''Yoga'', ''Photography'', ''Reading contemporary fiction'', ''Cooking seasonal meals'', ''Volunteer work with Habitat for Humanity'']'
  career_goals: Looking ahead, Mary aims to lead larger multidisciplinary design teams and become a senior project architect within her firm. She is working toward LEED Accredited Professional certification
    and hopes to spearhead at least two net-zero residential projects in the Omaha metro area over the next five years. In the longer term, she envisions opening her own practice focused on community-centered,
    sustainable architecture that integrates innovative technologies while respecting local context.
