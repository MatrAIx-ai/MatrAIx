personas:
  professional: An architectural designer and project manager, Mary Go leverages AutoCAD, Revit, SketchUp, and BIM coordination to blend technical precision with sustainable design, balancing a curiosity
    for innovative materials with a practical, client‑focused mindset, and they assert themselves in team meetings while staying reliably organized.
  sports: Mary Go enjoys trail hiking in the Loess Hills, participates in a local weekend yoga class, follows the Omaha Storm Chasers baseball team, occasionally joins a community running club for 5K races
    in spring, and supports the Nebraska Cornhuskers football team, blending seasonal outdoor activity with casual sports fandom that they share on social media.
  arts: Mary Go finds creative inspiration in the photography of Berenice Abbott and the architecture documentaries of Edward Burtynsky, attends local gallery openings featuring emerging Midwest artists,
    listens to indie folk musician Sufjan Stevens while sketching, and occasionally volunteers to curate a fundraiser exhibition for Habitat for Humanity, intertwining visual arts and community spirit,
    something they often discuss during networking events.
  travel: Mary Go prefers weekend road trips to nearby national parks like Badlands and Wind Cave, enjoys planning detailed itineraries that balance hiking, local food sampling, and photography sessions,
    dreams of a sustainable design tour in Denmark, but currently limits travel to regional destinations due to budget constraints and a demanding work schedule, a compromise they view as a practical balance
    of adventure and relaxation.
  culinary: Mary Go cooks seasonal farm‑to‑table meals, often preparing roasted beet salad with goat cheese and arugula, pan‑seared trout with lemon‑dill butter, and experimenting with fermented kimchi,
    while they admit to over‑indulging in artisanal espresso drinks during late‑night design sprints, reflecting both a health‑conscious palate and a caffeine‑driven habit.
  core: Mary Go is a sustainability‑driven architect who balances meticulous project leadership with spontaneous hikes, occasional over‑caffeination, and a habit of postponing dental visits, embodying a
    pragmatic curiosity and a touch of organized chaos that they navigate with quiet determination.
background:
  cultural: Mary was raised in a Midwestern family in Nebraska, blending a heritage of German-American and Irish-American roots with the region’s values of practicality, community involvement, and modesty.
    Her upbringing emphasized an appreciation for the outdoors, a strong work ethic, and the tradition of seasonal family gatherings, which now inform her collaborative approach and commitment to sustainable,
    locally-responsive design.
