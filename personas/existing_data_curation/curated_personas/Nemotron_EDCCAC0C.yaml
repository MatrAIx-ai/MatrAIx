  hobbies: '[''Strategy video gaming'', ''DIY drone and model car building'', ''Soccer'', ''Reading science articles'', ''Digital illustration'', ''Cooking traditional Mexican and Tex‑Mex dishes'', ''Listening
    to banda and Latin pop music'', ''Volunteering at the community center'']'
  career_goals: Ruben aspires to translate his practical talents into a stable, skilled‑trade career. After completing his GED, he plans to enroll in a community‑college apprenticeship program in automotive
    technology, with a particular interest in emerging electric‑vehicle systems. He also envisions using his bilingual abilities to serve as a liaison for Spanish‑speaking customers in a service‑oriented
    business, eventually opening his own small auto‑repair shop that combines technical expertise with community outreach. In the long term, he hopes to mentor other youth from his neighborhood, encouraging
    them to pursue technical education and develop confidence in both English and Spanish.
