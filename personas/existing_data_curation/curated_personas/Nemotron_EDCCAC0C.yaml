personas:
  professional: Ruben, a 16‑year‑old aspiring automotive technician, blends his methodical tinkering with bilingual communication skills to excel in school workshops and community‑center tech projects,
    planning each repair like a strategic video‑game mission while staying reliable and organized.
  sports: Ruben, a forward on the Laredo United youth soccer team, practices three times a week, joins the school’s spring track club for sprint workouts, and follows the Dallas Cowboys and Real Sociedad
    with enthusiastic game‑day gatherings.
  arts: Ruben, who creates digital illustrations inspired by sci‑fi landscapes and sketches promotional flyers for the community center, enjoys listening to Banda El Recodo, J Balvin, and the electronic
    beats of Odesza, and experiments with beginner‑level graphic design using Canva and Photoshop.
  travel: Ruben prefers organized, budget‑friendly trips, having visited the San Antonio River Walk and Austin’s music venues with friends, dreaming of a cultural weekend in Mexico City during Día de los
    Muertos and a road‑trip to New Mexico’s desert for stargazing, always planning itineraries on a spreadsheet.
  culinary: Ruben, an adept home‑cook, frequently prepares tacos al pastor, enchiladas with chipotle sauce, and sopa de tortilla on weekends, relishing fresh cilantro, lime, and queso fresco, while experimenting
    with electric‑grill techniques despite occasional over‑spicing when trying new recipes.
  core: Ruben balances a love for high‑tech tinkering with family‑first values, staying organized and methodical while occasionally succumbing to late‑night gaming marathons and the occasional missed dental
    floss.
background:
  cultural: Ruben grew up in Laredo, Texas, a city that straddles the U.S.–Mexico border and is infused with a rich Mexican heritage. His family maintains strong ties to Mexican customs, celebrating holidays
    such as Día de los Muertos, Cinco de Mayo, and Charro Days with music, food, and communal gatherings. At home, Spanish is the primary language, and he regularly switches between Spanish and English,
    reflecting the bilingual rhythm of the community. The values of familismo, respeto, and collective well‑being shape his worldview, and his Catholic upbringing informs many of his family traditions.
    Simultaneously, he experiences Texan influences—regional cuisine, high‑school sports culture, and the entrepreneurial spirit of border towns—which blend with his Mexican roots to create a bicultural
    identity that he proudly embraces.
attributes:
  skills: '[''Bilingual Spanish‑English communication'', ''Strong organization and time‑management'', ''Basic computer troubleshooting and productivity software'', ''DIY bicycle and small engine maintenance'',
