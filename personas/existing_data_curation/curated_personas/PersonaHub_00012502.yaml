persona_description: A structural engineer with expertise in evaluating and designing momentless, or funicular, arches using Bernoulli-Euler beam theory. The engineer is interested in understanding the
  errors associated with these arches and their behavior under hydrostatic pressure. They are likely to have a deep understanding of structural design, loads, beams and girders, approximation theory, hydrostatic
  pressure, bending, shear deformation, and the principles of structural engineering. They may also have experience with structural analysis and design software, and a familiarity with the ASCE journal.
