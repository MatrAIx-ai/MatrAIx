  hobbies: '[''Watercolor painting'', ''Plein‑air sketching'', ''Hiking'', ''Reading magical realism'', ''Cooking Mexican‑fusion cuisine'', ''Yoga and meditation'', ''Ceramic glazing workshops'', ''Papel
    picado craft'', ''Digital storytelling'', ''Book discussion group'']'
  career_goals: Although retired, Lilia is driven by a desire to leave a lasting cultural imprint. She aims to curate a traveling exhibition that showcases contemporary Mexican folk art alongside works
    by emerging California artists, highlighting cross‑border dialogues. She also plans to author a memoir‑essay collection that intertwines personal reflections with insights on Mexican artistic traditions,
    to be published both in print and as an interactive digital archive. Mentoring younger artists and volunteers in Big Sur’s community center is a priority, as is establishing a publicly accessible online
    repository of oral histories from Mexican‑American elders in Monterey County. These goals reflect her competitive spirit for artistic excellence, her skeptical eye for authenticity, and her calm dedication
    to legacy building.
