personas:
  professional: Lilia Cestona, a retired college instructor and community docent, channels their lifelong immersion in arts and humanities into curating traveling exhibitions that juxtapose contemporary
    folk art from their cultural roots with emerging Californian works, leveraging bilingual research, curriculum development, and digital storytelling skills while maintaining a skeptical eye for authenticity
    and a calm, resilient demeanor.
  sports: Lilia Cestona stays active through weekly hikes with the Redwood Trail Walkers club along the Big Sur coastline, occasionally joining low‑impact aqua aerobics at the Monterey Bay community pool,
    and they keep a loyal fan devotion to the San Francisco Giants and the Golden State Warriors, preferring a measured, enjoyment‑first approach to fitness rather than competitive athletics.
  arts: Lilia Cestona weaves their watercolor landscapes with influences from Georgia O'Keeffe's bold desert hues, the lyrical storytelling of Joni Mitchell's folk songs, and the narrative depth of magical
    realist authors like Gabriel García Márquez, while also curating small exhibitions featuring contemporary folk artisans whose paper cutwork and ceramic glaze techniques they explore in workshops, allowing
    them to blend scholarly art‑historical research with hands‑on creation.
  travel: Lilia Cestona prefers meticulously planned cultural retreats that balance gentle adventure with restorative downtime, favoring destinations like the historic town of Carmel‑by‑the‑Sea, the cliffside
    villages of Cinque Terre, and the vibrant artisan markets of Marrakech, while they prioritize short‑term stays and volunteer‑based travel experiences that align with mentorship goals.
  culinary: Lilia Cestona combines their adept kitchen skills with a love for locally sourced herbs and Pacific sea‑salt, reimagining traditional dishes from their family's heritage with rosemary‑infused
    chiles and creating sea‑salt caramel crème brûlée, while they host intimate tasting evenings where guests savor dishes such as grilled corn esquites topped with cilantro‑lime vinaigrette.
  core: Lilia Cestona is a serene yet competitively meticulous 71‑year‑old artist‑scholar who turns every hike, brushstroke, and dialogue into a disciplined quest for authentic cultural exchange, even if
    they occasionally hoard art supplies and meticulously check every exhibition label for accuracy.
background:
  cultural: Lilia’s family traces its roots to the state of Oaxaca, where vibrant textile traditions and storytelling are integral to community life. Growing up in a bilingual household in Southern California,
    she celebrated Día de los Muertos, Las Posadas, and regional festivals with music, food, and altars that blended indigenous symbolism with Catholic rites. This bicultural upbringing instilled a deep
    respect for Mexican heritage while fostering an openness to Californian coastal culture. In Big Sur, she participates in local art cooperatives, often serving as a cultural liaison, bringing Mexican
    folk motifs into collaborative murals and community workshops. Her identity as a Mexican‑American woman informs her artistic taste, culinary experiments, and her commitment to preserving intergenerational
    narratives within both her Mexican lineage and her adopted Pacific‑coast community.
attributes:
  skills: '[''Art‑historical research'', ''Spanish‑English translation'', ''Curriculum development'', ''Public speaking'', ''Exhibition curation'', ''Event planning'', ''Volunteer team management'', ''Digital
