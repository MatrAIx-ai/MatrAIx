personas:
  professional: Harry Spruell, a 36‑year‑old middle‑school teacher, blends imaginative STEAM curriculum design with meticulous lesson planning and classroom management, using their methodical organization
    to coordinate interdisciplinary projects, mentor novice educators, and lead professional development workshops that champion creativity.
  sports: Harry Spruell hits the Cascades on weekends for multi‑day hikes, joins a local trail‑running club for 5K races, supports the Seattle Seahawks and Seattle Kraken, plays recreational soccer with
    a community league, and occasionally practices indoor climbing at a nearby gym to maintain strength.
  arts: Harry Spruell spends evenings painting watercolor landscapes of Mt. Rainier, strums an acoustic guitar to Nick Drake and Joni Mitchell, attends productions at the Seattle Repertory Theatre, frequents
    gallery openings featuring contemporary painter Julie Mehretu, reads Neil Gaiman and N.K. Jemisin, and co‑designs educational board games inspired by classic fantasy lore.
  travel: Harry Spruell prefers road‑trip adventures that combine hiking and sketching, has trekked Yellowstone and the Grand Canyon, returns often to Portland’s art festivals, dreams of photographing the
    fjords of New Zealand, and plans a spring visit to Kyoto for its historic temples and manga exhibitions.
  culinary: Harry Spruell enjoys cooking pan‑seared salmon with dill butter, whipping up wild mushroom risotto, baking sourdough loaves and almond croissants for literacy volunteers, sipping single‑origin
    pour‑over coffee, and pairing meals with a rotating selection of local craft beers, though they sometimes neglect grocery budgeting in favor of specialty ingredients.
  core: Harry Spruell merges disciplined organization with boundless imagination, turning lessons, hikes, and melodies into canvases for curiosity while juggling a habit of over‑committing to creative side
    projects.
background:
  cultural: Raised in the Pacific Northwest, Harry's cultural identity is shaped by the region's blend of progressive, environmental, and artistic values. His family heritage traces back to English and
    Irish ancestors, and he embraces a community‑oriented, egalitarian outlook typical of many white families in the area. Bothell's vibrant arts scene, emphasis on outdoor recreation, and strong support
    for public education have reinforced his commitment to creativity, lifelong learning, and civic involvement. These influences inform both his teaching philosophy and his personal pursuits.
