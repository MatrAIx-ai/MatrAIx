  hobbies: '[''Watercolor Painting'', ''Acoustic Guitar'', ''Speculative Fiction Reading'', ''Poetry Writing'', ''Short Story Writing'', ''Hiking in the Cascades'', ''Nature Photography'', ''Community Theater
    Acting'', ''Board Game Design (Educational Focus)'', ''Volunteer Literacy Tutoring'']'
  career_goals: Harry aspires to move into a curriculum leadership role where he can shape district-wide interdisciplinary programs that prioritize creativity and critical thinking. He plans to earn a master's
    degree in Curriculum and Instruction and eventually pursue an educational specialist certification. Long‑term, he hopes to become a district curriculum coordinator or principal, championing innovative
    arts integration and advocating for policies that support holistic student development. He also dreams of authoring a children's book series that blends fantasy storytelling with educational content.
