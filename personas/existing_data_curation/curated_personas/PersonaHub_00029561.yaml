persona_description: A historian who specializes in the study of Irish history, particularly the period from the 16th to the 19th century. Her research interests include the emergence of Irish nationalism,
  the role of religion in social and political change, and the impact of political and social discrimination on the lives of Catholics in Ireland. She is particularly interested in the ways in which the
  17th-century land settlements affected the social and political demarcations between Catholic and Protestant communities, and the ways in which the penal laws codified discrimination against Catholics
  in the early 18th century were both corrosive and persistent. She is also interested in the ways in which the partition of Ireland in 1921-1922 affected the lives of Catholics in Northern Ireland, and
  the ways in which this conflict continues to shape the political and social landscape of the region.
