personas:
  professional: Sabrina Tran, a budding digital illustrator and junior coder, blends a love for folklore‑inspired character design with strategic problem‑solving, channeling their competitive edge into
    creating interactive art projects for school competitions while maintaining a meticulous yet flexible workflow.
  sports: Sabrina Tran, who prefers solo training, spends after‑school hours at the local community pool on the swim team and joins a youth rock‑climbing club, while cheering for the Seattle Storm during
    WNBA season and the Seattle Seahawks in football, treating each practice as a strategic game that satisfies their competitive nature.
  arts: Sabrina Tran immerses themselves in the worlds of Studio Ghibli, the digital surrealism of Beeple, and the graphic novels of Neil Gaiman, regularly visits the downtown art center’s showcase of emerging
    teen artists, and captures cityscapes with a vintage Fujifilm camera, letting these influences shape their own folklore‑rich digital sketches.
  travel: Sabrina Tran prefers carefully planned weekend trips that blend cultural immersion with artistic inspiration, such as a family visit to Kyoto’s historic temples and a school‑organized field trip
    to the Smithsonian’s American Art Museum, while dreaming of a solo backpacking adventure through the misty highlands of Scotland to sketch local folklore.
  culinary: Sabrina Tran enjoys experimenting in the kitchen, skillfully preparing aromatic pho broth with star anise and fish sauce, hand‑rolling fresh spring rolls with mint and shrimp, and mixing matcha‑green
    tea batter for fluffy pancakes, all while documenting each recipe with stylized food photography.
  core: Sabrina Tran, a fiercely curious teen who channels competitive energy into digital art and coding while battling intense anxiety that fuels both meticulous journaling and occasional late‑night snack
    binges.
background:
  cultural: Born to Vietnamese immigrant parents, Sabrina grew up in Cypress, Texas, navigating a blend of Vietnamese traditions—Tet celebrations, language at home, and Vietnamese cuisine—and contemporary
    American life. Her family emphasizes respect for elders and community, yet encourages curiosity and individual expression. This bicultural environment nurtures her appreciation for both Eastern and
    Western art forms and fuels her desire to incorporate cultural storytelling into her creative pursuits.
attributes:
  skills: '["Research and information synthesis","Basic programming (Scratch, Python)","Digital illustration and mixed media art","Bilingual (English and Vietnamese)","Organized note-taking and project
    planning","Competitive math problem solving","Creative writing and journaling","Photography basics"]'
  hobbies: '["Digital drawing and sketching","Reading fantasy and speculative fiction","Playing strategy video games (e.g., Minecraft, Civilization)","Coding small projects in Scratch and Python","Journaling
    and creative writing","Photography of nature and local architecture","Learning Vietnamese recipes","Participating in school art club and occasional robotics club"]'
  career_goals: She aspires to blend art and technology, aiming to become a video game designer or multimedia artist who tells stories rooted in her Vietnamese heritage. Sabrina hopes to attend a specialized
    magnet high school for digital media, earn a degree in computer science or graphic design, and eventually work on culturally inclusive interactive experiences. She also dreams of using her platform
    to advocate for teen mental‑health awareness.
