    Automation'', ''Stakeholder Communication'', ''Project Coordination'']'
  hobbies: '[''Community Cybersecurity Workshops'', ''Hiking'', ''Tennis'', ''Book Club'', ''Escape Rooms/Puzzle Solving'', ''Vinyl Record Collecting'', ''Gardening'', ''Mediterranean Cooking'', ''Travel
    to Historic European Cities'']'
  career_goals: Shirley aims to transition from a senior analyst role to a strategic leadership position such as Director of Information Security or Chief Information Security Officer within the next five
    years. She hopes to shape an organization’s security roadmap by embedding AI‑driven threat detection, championing zero‑trust architectures, and fostering a security‑first culture across all business
    units. Additionally, she plans to mentor emerging security talent, especially women returning to the field, and to expand her impact by offering pro‑bono cybersecurity workshops for local schools and
    small businesses in Bergen County.
