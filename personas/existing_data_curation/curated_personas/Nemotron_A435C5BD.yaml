personas:
  professional: Soraima Minoso, a 43-year-old aerospace engineer, leverages expertise in CFD, Python-driven simulation pipelines, and additive-manufacturing prototyping to design next-generation reusable
    launch vehicles, while her spontaneous, collaborative nature turns bilingual communication into seamless teamwork and mentorship of junior staff on small, focused teams.
  sports: Soraima Minoso enjoys a flexible fitness routine that includes weekend hikes through the Texas Hill Country, regular rides with a local women's cycling club, and cheering for the Houston Astros
    during baseball season, while occasionally joining a community softball league that lets her blend teamwork with her love of outdoor activity.
  arts: Soraima Minoso finds inspiration in the speculative worlds of authors like N.K. Jemisin and the visual storytelling of Christopher Nolan, while at home she tunes into classic progressive rock such
    as Pink Floyd and traditional marimba rhythms played at community festivals, using these artistic influences to fuel both her astrophotography projects and personal creativity.
  travel: Soraima Minoso favors meticulously planned stargazing trips to remote locales like Chile's Atacama Desert and New Mexico's White Sands, while balancing family time with spontaneous weekend getaways
    to Austin and the SpaceX launch site at Boca Chica, often using a mix of saved travel points and modest budgeting to make these adventures feasible.
  culinary: Soraima Minoso cooks with a confident, experimental flair, mastering traditional dishes such as pupusas filled with cheese and chicharron and crisp yuca frita, then infusing them with Texas
    herbs like rosemary and smoky chipotle, while also preparing hearty quinoa salads with cilantro, lime, and roasted corn for family gatherings.
  core: Soraima Minoso is a solitary-yet-collaborative aerospace engineer who fuses a love of the stars with community-rooted traditions, occasionally letting spontaneous curiosity derail strict schedules,
    but always returning to mentorship, sustainable innovation, and a kitchen full of fragrant fusion dishes.
background:
  cultural: Soraima grew up in a close-knit Salvadoran-American household in Houston, where Spanish and English intermingle in daily life. Family gatherings are centered around shared meals, music, and
    stories that keep her connection to Salvadoran traditions alive. She participates in community festivals such as Fiesta de la Cultura Salvadoreña, and respects the Catholic customs observed by many
    in her extended family. This bicultural identity informs her worldview, fostering a deep appreciation for community solidarity, humility, and perseverance. In her professional sphere, she often draws
    on her cultural heritage to bridge communication gaps, offering a bilingual perspective that enriches collaborative problem-solving.
attributes:
  skills: '[''Computational Fluid Dynamics'', ''Finite Element Analysis'', ''Systems Engineering'', ''Python programming'', ''MATLAB/Simulink'', ''Additive Manufacturing'', ''Technical Writing'', ''Project
    Coordination (flexible)'', ''Mentoring and Training'', ''Cross-Functional Communication'']'
  hobbies: '[''Astrophotography'', ''Reading science-fiction'', ''Cooking Salvadoran cuisine'', ''STEM outreach volunteering'', ''Gardening'', ''Hiking in the Texas Hill Country'']'
  career_goals: She aims to become a senior lead system architect for next-generation reusable launch vehicles, championing sustainable propulsion technologies that reduce launch costs and environmental
    impact. Soraima aspires to lead interdisciplinary teams that blend cutting-edge research with proven engineering practices, leveraging her curiosity to push design boundaries while maintaining reliability.
    A core part of her ambition is to mentor and create pathways for other Hispanic women in aerospace, building a more inclusive community within the industry. In the longer term, she envisions contributing
    to a historic deep-space mission, perhaps as part of a crewed Mars initiative, where her blend of practical expertise and innovative mindset can make a tangible difference.
