personas:
  professional: Nicolas Smitherman, an emerging community event coordinator in training, channels their practical curiosity and strong teamwork into organizing church youth group gatherings and neighborhood
    block parties, while leveraging their reliable time‑management and DIY problem‑solving skills to balance creative ideas with the modest, hard‑working ethos of their small‑town upbringing, and they thrive
    on collaborating with peers to refine event logistics.
  sports: Nicolas Smitherman, a dedicated player in Peoria’s community basketball league and a weekend midfielder for Peoria United Soccer Club, stays fit through a mix of team drills and solo runs, cheering
    on the Chicago Bulls and Chicago Fire as their favorite professional franchises, and they balance a busy school and work schedule.
  arts: Nicolas Smitherman, an aspiring YouTuber who captures friends’ backyard games and DIY projects, draws creative inspiration from Casey Neistat’s kinetic editing style, the folk storytelling of John Prine,
    and the cinematic vision of Christopher Nolan, often layering their videos with a soundtrack featuring Taylor Swift and Hozier to reflect their love of contemporary and classic artistry, and they frequently
    experiment with narrative structures in their uploads.
  travel: Nicolas Smitherman, an enthusiastic weekend explorer who meticulously plans trips using a budgeting spreadsheet and embraces spontaneous road‑trips, enjoys revisiting the nearby Shawnee National
    Forest and Chicago’s lakefront, and dreams of backpacking through the Netherlands and Belgium once they save enough for a post‑high‑school adventure.
  culinary: Nicolas Smitherman, a competent home‑cook who relishes hearty Midwestern comfort foods such as Chicago‑style deep‑dish pizza, slow‑cooked barbecue ribs glazed with hickory‑smoked sauce, and
    buttery corn casserole, often seasons with smoked paprika and fresh garlic while testing new recipes between their DIY projects, and they love sharing meals with friends after a day of community volunteering.
  core: Nicolas Smitherman, a socially‑driven DIY enthusiast whose boundless energy for community events is tempered by a lingering worry that fuels nightly breathing exercises and a habit of over‑planning
    every project and social outing, and they often forget to reply to messages amidst their busy schedule.
background:
  cultural: Nicolas grew up in a middle‑class, white family in Peoria, Illinois, where Midwestern values of community involvement, modesty, and hard work are emphasized. His upbringing included regular
    participation in local church youth groups and neighborhood block parties, fostering a strong sense of belonging and social responsibility. The regional culture of friendly, down‑to‑earth interaction
    and a pragmatic approach to life shapes his balance of curiosity and practicality, while the small‑town atmosphere nurtures his outgoing, group‑oriented personality.
attributes:
  skills: '[''Team collaboration'', ''Event planning and coordination'', ''Basic computer troubleshooting'', ''Photo/video editing'', ''DIY woodworking'', ''Basic auto maintenance'', ''Time management'',
    ''Adaptable problem‑solving'']'
  hobbies: '[''Basketball'', ''Soccer'', ''Video filming and editing'', ''YouTube content creation'', ''DIY home improvement'', ''Bike restoration'', ''Mindfulness breathing'', ''Reflective journaling'']'
  career_goals: Eager to translate his social energy and practical skills into a career, Nicolas aims to pursue an associate degree in communications or hospitality management, with the long‑term goal of
    becoming a community event coordinator or a hospitality manager at a regional hotel or convention center. He is motivated to create welcoming experiences for others while building a stable, well‑structured
    career that balances his creative curiosity with financial security. In the meantime, he plans to secure part‑time work in customer service to gain professional experience and fund his education.
