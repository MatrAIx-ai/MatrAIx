  career_goals: Patricia aims to transition into a visual‑merchandising specialist role within her retail chain, leveraging her artistic vision to shape store concepts regionally. Over the next three years
    she plans to earn a certification in retail visual design and take on a supervisory position that allows her to mentor staff while reducing the day‑to‑day sales floor pressures that contribute to stress.
    Long‑term, she dreams of opening a boutique that showcases handmade home‑decor items inspired by African‑American artistic traditions, providing a space for community workshops and cultural education.
