personas:
  professional: Patricia Vanhoose, a seasoned retail visual merchandiser with more than twenty years of hands‑on experience, channels her love of abstract acrylic painting and data‑driven analysis into
    store displays that feel like gallery installations, while her reserved yet occasionally assertive nature lets them mentor new associates with empathetic structure and firm guidance when needed.
  sports: Patricia Vanhoose, a member of the Goldsboro senior fitness circle, enjoys low‑impact yoga at the community center, walks the local park each morning for gentle cardio, passionately follows the
    Carolina Panthers on Sundays and the Charlotte Hornets during the NBA season, and tends their garden as a form of functional exercise.
  arts: Patricia Vanhoose, an avid painter, quilter, and reader of magical realism, draws creative fuel from the soulful voice of Nina Simone, the improvisational brilliance of John Coltrane, and the poetic
    lyricism of Maya Angelou, often playing these recordings while layering acrylics that explore memory and identity.
  travel: Patricia Vanhoose prefers purposeful escapes that inspire artistic curiosity, such as weekend trips to Savannah’s historic squares, a pilgrimage to New Orleans for live jazz, and a long‑awaited
    journey to Oaxaca, Mexico to study traditional weaving, all while budgeting travel around modest retirement savings and family commitments.
  culinary: Patricia Vanhoose delights in cooking Southern comfort fare, regularly preparing collard greens seasoned with smoked turkey, black‑eyed peas simmered with a hint of kombu, and sweet tea brewed
    with a splash of vanilla, while their backyard garden provides fresh tomatoes, basil, and rosemary for homemade bruschetta.
  core: Patricia Vanhoose is a creatively driven, quietly resilient 53‑year‑old who balances artistic ambition with pragmatic caution, often wrestling with stress‑induced worries while crafting vibrant
    visual stories.
background:
  cultural: Patricia was born and raised in Goldsboro, a city with deep roots in the African‑American experience of eastern North Carolina. Her grandparents migrated from rural counties during the Great
    Migration, and her parents were active participants in the civil‑rights movement of the 1960s. She attended a historically Black college for her bachelor’s in humanities, where she studied African‑American
    literature and visual culture. In Goldsboro, she remains connected to the local Black church, celebrates Juneteenth, and contributes to community events that honor Black heritage. Her upbringing instilled
    a strong sense of resilience, communal responsibility, and pride in the artistic expressions of her ancestors, which continues to shape her worldview and creative work.
