personas:
  professional: Alan Bermudez, a retired handyman turned church volunteer, leverages his lifelong expertise in plumbing, electrical repairs and carpentry to coordinate modest community service projects,
    preferring a low‑key, routine‑driven approach that values harmony over strict scheduling, even though their relaxed attitude sometimes leads to last‑minute scrambling.
  sports: Alan Bermudez supports the Dallas Cowboys and Texas Rangers, participates in a weekly senior lawn‑bowling league at the community center, and keeps fit through early‑morning fishing trips on nearby
    lakes and light gardening, preferring low‑impact activities that fit his routine, though they admit to neglecting regular cardio workouts and often miss the occasional weekend basketball game.
  arts: Alan Bermudez finds solace in classic western films starring John Wayne and Clint Eastwood, sways to the country tunes of Johnny Cash, George Strait, and Willie Nelson while cooking, and enjoys
    the occasional choir hymn at church, allowing these familiar cultural pillars to reinforce his traditional values, even though they seldom explore newer artistic genres.
  travel: Alan Bermudez prefers relaxed, short trips that suit his routine, such as weekend drives to the Texas Hill Country wine trails and annual visits to his grandchildren’s home in Florida, while dreaming
    of a gentle Mississippi River cruise and a modest pilgrimage to the Alamo, yet they often postpone booking travel and rely on family members to handle logistics.
  culinary: Alan Bermudez cooks with confidence, regularly preparing hearty Texas staples such as chicken fried steak, chili con carne, and pecan‑topped sweet‑potato casserole, seasoning with cumin, smoked
    paprika, and fresh garden herbs, and prefers casual home‑cooked meals over noisy restaurants, though they occasionally over‑salt dishes when distracted by crossword puzzles.
  core: Alan Bermudez is a routine‑loving, retired handyman who balances quiet devotion to family, church, and classic westerns with a tendency to misplace bills and over‑salt his chili, embodying a gentle
    mix of practicality and nostalgic charm.
background:
  cultural: Alan was raised in West Texas, absorbing a blend of Anglo‑Texan and Hispanic cultural influences reflected in his family name, Bermudez. He grew up celebrating traditional American holidays
    such as Thanksgiving, Christmas, and the 4th of July, while also embracing occasional Mexican culinary traditions passed down from extended family. His upbringing emphasized self‑reliance, community
    service, and respect for longstanding customs, shaping his practical outlook and deep sense of belonging to the Midland community.
