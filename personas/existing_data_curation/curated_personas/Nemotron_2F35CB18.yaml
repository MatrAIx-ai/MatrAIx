personas:
  professional: Yeji Yang, a retired community volunteer who now leads intergenerational cooking workshops, garden programs, and language‑exchange gatherings, leverages practical budgeting know‑how and
    a curiosity for blending old family recipes with local ingredients, though they often improvise on the fly due to a relaxed approach to scheduling.
  sports: Yeji Yang enjoys gentle daily walks along Anchorage’s nature trails, participates in the local senior walking club, follows the Anchorage Seawolves and Anchorage Aces hockey teams on television,
    and incorporates bird‑watching sessions as a low‑impact fitness routine.
  arts: Yeji Yang delights in attending winter concerts at the Anchorage Community Center, reads historical fiction and mystery novels by authors such as Diana Gabaldon and Agatha Christie, listens to cultural
    podcasts, and expresses creativity through knitting scarves and crocheting blankets for friends and charitable drives.
  travel: Yeji Yang prefers short, well‑planned trips that balance relaxation with cultural exploration, has visited Seattle’s Pike Place Market and Vancouver’s historic Gastown, dreams of a future pilgrimage
    to Kyoto’s culinary studios and an Aurora‑watching adventure in Iceland, while keeping travel budgets modest due to a fixed retirement income.
  culinary: Yeji Yang constantly reinvents classic family dishes by incorporating Alaskan salmon, foraged chanterelle mushrooms, and wild blueberry sauces, cultivates an indoor herb garden of cilantro,
    basil, and mint, and relishes preparing a signature salmon teriyaki with blueberry glaze served alongside a mushroom miso soup.
  core: Yeji Yang blends generational cooking traditions with Alaskan flavors, nurtures community through garden projects and language exchanges, embraces flexibility over rigid plans, and balances gentle
    resilience with occasional forgetfulness.
background:
  cultural: Yeji is a second‑generation East Asian American, with her parents having immigrated from South Korea in the early 1950s to work in the burgeoning oil industry of Anchorage. Raised in a bilingual
    household, she grew up speaking both Korean and English, celebrating Lunar New Year, Chuseok, and other traditional holidays while also embracing Alaskan customs such as fishing and enjoying the outdoors.
    Her family’s culinary heritage blends Korean staples like kimchi and bulgogi with Alaskan seafood and wild berries, creating a unique fusion that she continues to share at community gatherings. Yeji
    remains actively involved with the local Asian‑American community center, participating in cultural festivals, language classes, and intergenerational storytelling events, reflecting a deep respect
    for both her ancestral roots and her Alaskan home.
