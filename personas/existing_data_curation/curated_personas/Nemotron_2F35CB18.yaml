  hobbies: '[''Cooking and recipe experimentation'', ''Gardening (herbs and cold‑weather vegetables)'', ''Knitting and crocheting'', ''Reading historical fiction and mystery novels'', ''Listening to podcasts
    on world cultures'', ''Walking and birdwatching'', ''Attending local music and cultural events'', ''Language exchange and teaching basic Mandarin/Korean'']'
  career_goals: Although retired, Yeji’s ambitions center on leaving a lasting legacy for her family and community. She aims to preserve and pass down her family’s culinary recipes and cultural stories
    by documenting them in a small handwritten cookbook for her grandchildren. She hopes to mentor younger members of the Anchorage Asian‑American community through cooking workshops and language exchange
    sessions. Yeji also wishes to stay physically active and maintain her health, planning regular walks and gentle yoga. She’s interested in learning basic photo‑editing to create a visual memoir of her
    life in Alaska, and she aspires to continue supporting her husband’s well‑being while remaining an engaged volunteer for local cultural festivals.
