  hobbies: '["Bridge (card game)", "Community gardening", "Quilting circle", "Church choir", "Senior‑tech workshop volunteering", "Morning walks along the Ohio River", "Baking family recipes", "Reflective
    journaling", "Yoga for seniors"]'
  career_goals: Although retired, Glennie is driven to stay intellectually active and socially connected. She aims to volunteer as a STEM mentor for high‑school girls in Cincinnati, sharing her practical
    engineering experience to inspire the next generation of women in technical fields. She also plans to complete a short certificate program in horticulture to support a neighborhood community garden,
    where she can apply her systematic approach to plant care. Additionally, she aspires to organize a monthly senior‑tech workshop at the local community center, helping peers navigate everyday technology
    while maintaining a steady weekly routine to manage her anxiety.
