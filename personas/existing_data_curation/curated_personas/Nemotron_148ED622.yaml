personas:
  professional: Glennie Travis, a retired senior mechanical engineer with four decades of experience designing automotive parts, they blend their meticulous CAD and lean‑manufacturing expertise with a warm,
    hands‑on mentorship style, leading volunteer STEM workshops for high‑school girls while keeping detailed project logs in their signature blue notebook.
  sports: Glennie Travis, a lifelong fan of the Cincinnati Bengals and the Cincinnati Reds, they participate in a senior walking group along the Ohio Riverfront three times weekly and occasionally join
    a low‑impact water aerobics class at the community center, but they admit to skipping workouts on days when anxiety spikes.
  arts: Glennie Travis, who delights in singing hymns with their church choir, they knit during their quilting circle while listening to classic country legends like Johnny Cash and Dolly Parton, and attend
    seasonal productions at the Cincinnati Playhouse, though they sometimes get frustrated when rehearsals run overtime.
  travel: Glennie Travis, preferring organized short‑road trips to nearby destinations like Hocking Hills State Park and the historic village of Shaker Heights, they enjoy visiting family in the Midwest
    during Thanksgiving and dream of a leisurely cruise on the Great Lakes, yet their travel plans often hinge on their budget and the comfort of traveling with a familiar group.
  culinary: Glennie Travis, a lover of hearty Midwestern comfort foods such as chicken pot pie, apple crisp, and tangy barbecue ribs, they regularly cultivate fresh tomatoes and herbs for their garden‑to‑table
    meals and perfect a Sunday batch of homemade cinnamon rolls, though they sometimes over‑bake their pies, resulting in a burned crust they humorously blame on over‑engineered oven settings.
  core: Glennie Travis is a routine‑driven, community‑oriented retired engineer who applies their systematic problem‑solving to gardening, mentoring, and managing anxiety with a blend of meticulous planning
    and heartfelt optimism.
background:
  cultural: Glennie’s cultural background is rooted in the Midwestern United States. Raised in a middle‑class, white Protestant family in Ohio, she grew up with values of punctuality, self‑reliance, and
    community service. Traditional holidays, church gatherings, and neighborhood events have shaped her pragmatic yet sociable outlook. Her upbringing emphasized practical achievement and modesty, which
    aligns with her preference for routine, her hands‑on engineering career, and her ongoing commitment to local volunteerism.
attributes:
  skills: '["Mechanical Engineering", "Manufacturing Process Optimization", "Quality Assurance", "CAD (AutoCAD, SolidWorks)", "Statistical Process Control (Minitab)", "Lean Manufacturing", "Project Management",
