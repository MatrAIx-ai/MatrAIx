  career_goals: Jessica aspires to pursue a career that blends her love for art and technology. She hopes to earn a scholarship to a university with a strong visual arts or interactive media program, eventually
    working as a concept artist or UX/UI designer for video games or digital media companies. She is also intrigued by museum curation and wants to explore opportunities to develop educational exhibits
    that make art accessible to younger audiences. In the short term, she plans to build a strong portfolio, win local art competitions, and secure a summer internship at a design studio, while maintaining
    a high GPA to keep her college options broad.
