personas:
  professional: Jessica Loftus is an aspiring digital illustrator who blends her love for science‑fiction novels with methodical, project‑by‑project planning, creating detailed concept art for fan collaborations
    while leading the school debate and chess clubs, where her competitive edge and organized mindset ensure every deadline is met and every argument is sharpened.
  sports: Jessica Loftus is a devoted fan of the Los Angeles Lakers and LA Galaxy, participates in the school varsity cross‑country team during the fall, plays pick‑up basketball at the neighborhood community
    center on weekends, and is a member of the Valley Youth Soccer Club, where her competitive drive from debate fuels her commitment to endurance training and team strategy.
  arts: Jessica Loftus immerses herself in contemporary art, drawing inspiration from Yayoi Kusama’s immersive installations at the Getty Center, bold LA street murals, and Hayao Miyazaki’s fantasy illustrations,
    while she unwinds by strumming acoustic guitar versions of Tame Impala and Hozier songs during late‑night creative sessions.
  travel: Jessica Loftus dreams of exploring Tokyo’s neon‑lit cyber‑punk districts but has already taken weekend trips to Griffith Observatory, Santa Monica Pier, and a family vacation to San Diego’s Comic‑Con,
    balancing her love for structured itineraries with spontaneous street‑food detours into Mexican taco stalls and Korean BBQ joints.
  culinary: Jessica Loftus enjoys a hybrid palate, swapping between homemade ramen bowls with miso and pork belly and crafting avocado toast topped with feta and cherry tomatoes for breakfast, while her
    cooking skill remains an enthusiastic beginner—she can follow a churros recipe but often burns the edges when a new illustration idea distracts her.
  core: Jessica Loftus is a meticulously organized 15‑year‑old sci‑fi art enthusiast whose competitive streak fuels both her chess victories and relentless quest for the perfect digital illustration, even
    as anxiety and occasional impulsive splurges keep her balancing on a tightrope of ambition and self‑care.
background:
  cultural: Jessica grew up in Van Nuys, a diverse suburb of Los Angeles, within a middle‑class white American family. Her parents, an engineer and a high‑school teacher, placed a strong emphasis on education,
    organization, and curiosity. The multicultural fabric of the San Fernando Valley exposed her to a wide range of cultural influences, from the vibrant street art of nearby neighborhoods to the music
    and food of Hispanic and Asian communities. These surroundings fostered an appreciation for eclectic artistic expression and a broad worldview, while her family's values encouraged a disciplined, competitive
    approach to personal achievement.
