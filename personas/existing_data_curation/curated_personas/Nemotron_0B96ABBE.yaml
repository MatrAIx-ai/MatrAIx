  career_goals: In adulthood Krishna aspires to merge his vivid imagination with his deep emotional awareness by pursuing a career that bridges art and science. He envisions becoming a conceptual visual
    artist or multimedia storyteller who translates abstract ideas into compelling visual narratives. Parallel to his artistic ambitions, he is drawn to the field of psychological research, aiming to explore
    the neural underpinnings of emotion and creativity, with the long-term goal of developing therapeutic art programs for individuals experiencing anxiety or mood disorders. He hopes to establish a community
    arts center in Midland County that offers workshops, exhibitions, and mental-health outreach, fostering creative expression in a small-town setting.
