persona_description: A geographer who specializes in the study of tropical rainforest ecosystems and their interactions with human settlements and natural resources. The person is particularly interested
  in the Petén lowlands in Guatemala, which feature a dense forested low-lying limestone plain with karstic topography and a variety of forest and soil types. The person is also interested in the climate
  and topography of the region, as well as the economic and social impacts of deforestation and development in the Petén department. The person is likely to be interested in the study of Maya archaeological
  sites and the development of ecotourism in the region, as well as the potential for sustainable agriculture in the southern portion of the Maya Biosphere Reserve.
