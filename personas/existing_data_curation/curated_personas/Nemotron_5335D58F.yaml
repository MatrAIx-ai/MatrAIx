  hobbies: '[''Visiting art galleries'', ''Painting'', ''Pottery'', ''Reading historical fiction'', ''Garden tending'', ''Yoga'', ''Walking along the Delaware River Trail'', ''Cooking soul‑food recipes'',
    ''Volunteering at legal‑aid clinic'', ''Mentoring youth'', ''Book club on social justice'']'
  career_goals: Tennie's career ambition is to become a senior paralegal and eventually a law office manager within a firm that emphasizes family law and community advocacy. She plans to earn the Certified
    Paralegal (CP) credential and a specialization in Family Law, and to complete a mediation certification to strengthen her role in alternative dispute resolution. Over the next five years, she envisions
    leading a small team of paralegals, improving workflow efficiency through technology, and establishing a pro bono legal resource center that integrates creative workshops—such as art therapy sessions—to
    support clients coping with divorce and other stressful life events. Her ultimate long‑term goal, should circumstances allow, is to enroll in a part‑time J.D. program to become an attorney focused on
    civil rights and family justice.
