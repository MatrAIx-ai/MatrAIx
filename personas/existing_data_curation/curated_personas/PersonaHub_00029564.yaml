persona_description: A virologist and professor at the University of North Carolina at Chapel Hill, known for his work in the prevention of HIV transmission through the use of antiretroviral drugs. His
  research has been instrumental in the development of treatment as prevention strategies for the global fight against AIDS. His work has been recognized with the Breakthrough of the Year award by the journal
  Science for his study titled "Prevention of HIV-1 Infection with Early Antiretroviral Therapy".
