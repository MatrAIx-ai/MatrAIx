  hobbies: '[''gardening'', ''cooking'', ''reading mystery novels'', ''DIY home improvement'', ''walking her dog'', ''community volunteering'', ''participating in local 5K runs'', ''road trips with family'']'
  career_goals: Kayla aims to advance from a frontline supervisory role to a facilities-management position within the next five years, ideally overseeing multiple sites for a corporate campus. She plans
    to earn a Certified Professional in Cleaning Management (CPCM) credential and lead a sustainability initiative to reduce chemical waste. Long-term, she dreams of starting her own boutique cleaning consultancy
    that blends traditional best practices with innovative green technologies, while mentoring other women in the trades.
