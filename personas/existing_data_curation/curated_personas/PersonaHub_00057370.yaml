persona_description: A philosopher who is interested in the philosophical and clinical aspects of delusions, and is familiar with the debates and theories surrounding the nature and formation of delusions.
  They have a strong interest in the doxastic and anti-doxastic arguments for and against delusions being regarded as beliefs, and are knowledgeable about the causal mechanisms responsible for the formation
  of delusions and their implications for clinical practice. They are also interested in the standard issues in the philosophy of mind, such as what conditions a report needs to satisfy to be regarded as
  a belief report, and how experience and reasoning interact in generating of hypotheses that can then be accepted as beliefs.
