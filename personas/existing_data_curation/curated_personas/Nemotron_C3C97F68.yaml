  hobbies: '[''Soccer (team sport)'', ''Hip‑hop dance'', ''School theater productions'', ''Volunteering at the local animal shelter'', ''Digital illustration and sketching'', ''Photography of nature and
    local events'', ''Creating short videos for TikTok'', ''Reading contemporary young adult fiction'', ''Cooking and baking for friends'', ''Exploring local parks and nature trails'']'
  career_goals: Connie aims to finish high school with strong academic performance and then pursue a degree in public health, communications, or a related field. She envisions a career that blends her passion
    for helping others, her organizational strengths, and her love for creative projects. Ideally, she would work as a community outreach coordinator, youth program manager, or public relations specialist
    for nonprofit organizations serving families in Central Florida. She also hopes to obtain certifications in event management and first aid, and later consider studying counseling to support her peers.
