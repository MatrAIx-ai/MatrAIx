personas:
  professional: Connie Ellis, an aspiring community outreach coordinator, leverages their organized planner, sociable charisma, and pragmatic curiosity to design youth health workshops for nonprofit groups
    across Central Florida.
  sports: Connie Ellis, a dedicated member of their high‑school soccer team, supplements their training by attending weekly hip‑hop dance classes at Groove Move Studio and follows Orlando City SC and the
    Orlando Magic, channeling that enthusiasm into a balanced routine of cardio drills, flexibility work, and weekend pickup games at the community park.
  arts: Connie Ellis, a budding digital illustrator and theater enthusiast, draws inspiration from visual storytellers like Studio Ghibli and street artist Banksy while channeling pop influences from Ariana Grande
    and Billie Eilish into their upbeat TikTok choreography and stage performances.
  travel: Connie Ellis enjoys spontaneous weekend getaways, planning school‑club trips with a practical checklist, and has already explored Orlando’s theme parks and Clearwater’s beaches while dreaming
    of a spring‑break adventure in Barcelona and a cultural exchange program in Kyoto.
  culinary: Connie Ellis, a confident teen cook, whips up classic chocolate chip brownies, avocado toast with feta, and quick pasta carbonara, favoring fresh strawberries, honey, and cinnamon in dessert
    experiments, and loves sharing these treats at school potlucks and family game nights.
  core: Connie Ellis blends boundless curiosity with disciplined organization, juggling a planner‑filled schedule of soccer, dance, and community volunteer work while habitually binge‑scrolling TikTok at
    midnight, a quirky habit that fuels their creative spark.
background:
  cultural: Connie comes from a white, middle‑class family in Spring Hill, a suburban community in Pasco County, Florida. She has been raised in a typical Floridian environment characterized by warm weather,
    an outdoor‑oriented lifestyle, and a strong sense of community. Family life often revolves around church activities, neighborhood barbecues, and local sports events. The region’s tourism industry and
    proximity to the Gulf Coast expose her to a diverse range of cultural influences, while her school and social circles reflect the suburban Southern culture of mutual support, hospitality, and emphasis
    on teamwork. These experiences shape her values of cooperation, friendliness, and a practical approach to everyday life.
attributes:
  skills: '[''Interpersonal communication'', ''Team collaboration'', ''Organizational and time‑management skills'', ''Practical problem solving'', ''Basic digital literacy (social media, Microsoft Office,
