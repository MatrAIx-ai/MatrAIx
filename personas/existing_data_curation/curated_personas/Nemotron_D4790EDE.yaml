  career_goals: Frank aims to transition from a sales agent to a fully licensed broker within the next two years, ultimately establishing his own small boutique brokerage that prioritizes personalized service
    for first‑time homebuyers in New Hanover County. He plans to mentor newer agents, especially those from underrepresented backgrounds, and to launch a community‑focused outreach program that helps low‑income
    families access affordable housing. Long‑term, he envisions building a modest property investment portfolio that complements his brokerage and supports local neighborhood revitalization projects.
