personas:
  professional: Amanda Deloach, a 19‑year‑old business administration major, blends methodical event‑coordination experience from volunteer work with a data‑driven yet creatively playful approach to junior
    marketing roles, leveraging their reliable planning style, public‑speaking confidence, and basic Spanish to craft cross‑border tourism campaigns for regional hospitality firms.
  sports: Amanda Deloach fuels their active social life by playing forward on the Sierra Vista Intramural Soccer Team, hiking with the Arizona Desert Trail Club through the Dragoon Mountains, and line‑dancing
    at local venues while cheering on the Arizona Cardinals and Phoenix Suns, reflecting a competitive edge that drives regular weekend workouts.
  arts: Amanda Deloach captures desert sunsets and candid festival moments with a DSLR inspired by Chris Burkard, curates their Instagram feed using Canva graphics, enjoys line‑dancing to Willie Nelson
    and Los Lobos, and binge‑listens to the podcasts How I Built This and The Tim Ferriss Show for entrepreneurial inspiration.
  travel: Amanda Deloach prefers meticulously planned weekend getaways, having trekked the Gila Wilderness, explored Organ Pipe Cactus National Monument, crossed into Ciudad Juárez for culinary experiments,
    and dreaming of a sunrise hike in Machu Picchu while balancing a modest student budget.
  culinary: Amanda Deloach loves cooking Tex‑Mex fusion dishes such as shrimp‑and‑chorizo tacos with chipotle‑lime crema, chicken‑tinga enchilada lasagna topped with cotija, and grilled elote sprinkled
    with pomegranate seeds, showing a moderate skill level that blends bold spices with fresh desert‑grown ingredients.
  core: Amanda Deloach is a curious yet pragmatic 19‑year‑old marketer‑in‑training who channels competitive energy into organized event planning, disciplined finances, active outdoor pursuits, and a quirky
    habit of capturing every sunset on camera.
background:
  cultural: Amanda was raised in Douglas, a small border town in Cochise County, Arizona. Her family embodies a blend of traditional Southwestern values and the practical, hard‑working ethic common in the
    region. While predominantly White and raised in a modest, middle‑class household with Protestant roots, her daily life is flavored by the close proximity to Mexican culture—evident in local cuisine,
    bilingual signage, and cross‑border community events. The high‑desert environment fostered an appreciation for outdoor activities and a connection to the land, while community gatherings like the annual
    Douglas Fair reinforced a strong sense of local identity and pride. This upbringing nurtured her sociable, outgoing demeanor, balanced with a healthy skepticism and competitiveness that drive her personal
    and professional ambitions.
