  career_goals: Amanda aims to complete her bachelor's degree in business administration with a focus on marketing, leveraging her practical curiosity to blend data‑driven strategies with creative campaigns.
    In the next five years, she envisions securing a junior marketing role at a regional tourism board or hospitality firm in southern Arizona, where she can blend her event‑planning expertise with outreach
    to both local and cross‑border audiences. Long‑term, she aspires to rise to a marketing manager position or launch her own boutique events company that specializes in culturally infused festivals and
    community gatherings, reflecting her competitive drive and desire to make a tangible impact on her hometown.
