  hobbies: '[''abstract watercolor painting'', ''reading poetry'', ''reading philosophy'', ''playing acoustic guitar'', ''photography of landscapes'', ''gardening with native perennials'', ''birdwatching'',
    ''cooking Colombian meals'', ''small book club participation'']'
  career_goals: Although retired, Michael aims to leave a lasting cultural legacy. He plans to compile a bilingual anthology of stories from Stanwood’s older residents, create a small community archive
    of local history, and publish a memoir that weaves his Colombian heritage with his Pacific Northwest experiences. He also hopes to teach a series of Spanish cooking workshops at the community center,
    mentor youth volunteers in project planning, and exhibit a collection of abstract watercolors inspired by the region’s natural light.
