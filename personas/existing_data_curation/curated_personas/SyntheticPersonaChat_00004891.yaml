    User 1: I''m glad to hear that! Do you still swim?

    User 2: Not as much as I used to, but I still enjoy it.

    User 1: That''s great! I hope you keep swimming.

    User 2: Thank you! I hope so too.

    User 1: What''s your favorite thing to cook?

