personas:
  professional: Amanda Piechocki, an aspiring visual storyteller, channels their boundless imagination into creating intricate LEGO kingdoms and fantastical drawings, seamlessly blending artistic flair
    with budding coding skills in Scratch, while their relaxed approach to deadlines means projects often evolve organically rather than following a strict schedule, and they proudly display finished creations
    on the bedroom wall.
  sports: Amanda Piechocki, a quiet observer of team sports, cheers from home for the Baltimore Orioles and the Washington Capitals while occasionally practicing beginner swimming lessons at the local community
    pool, preferring solo laps over team drills, and they enjoy weekend nature hikes as their own low‑key fitness regimen.
  arts: Amanda Piechocki, a budding creator, spends afternoons sketching dragons inspired by the works of J.K. Rowling and watching Disney’s animated classics, while practicing beginner piano pieces by
    Yiruma and crafting playful soundtracks for their Scratch games, often listening to instrumental scores from Studio Ghibli to fuel their imagination.
  travel: Amanda Piechocki, an imaginative explorer, delights in weekend field walks through the rolling fields around Ephrata, dreams of stargazing in Iceland’s remote highlands, and has already visited
    the historic streets of Gettysburg and the interactive science exhibits at the Carnegie Science Center in Pittsburgh, and they sketch constellations in a notebook after each adventure.
  culinary: Amanda Piechocki, an experimental snack maker, loves assembling rainbow fruit kebabs with watermelon, grapes, and blueberries, baking peppermint chocolate cupcakes topped with edible glitter,
    and occasionally practicing simple pasta recipes that they garnish with bright cherry tomatoes and shredded mozzarella.
  core: Amanda Piechocki, an imaginative eight‑year‑old with a penchant for solitary creativity, navigates the world through mythic drawings, quiet stargazing, and a tender heart that constantly balances
    wonder with occasional worry, and they often confide their ideas to stuffed animal friends.
background:
  cultural: Amanda is raised in a white, middle‑class family in Ephrata, Pennsylvania, a town in Lancaster County known for its mix of modern suburbia and nearby Amish farms. Her family observes typical
    American holidays such as Christmas, Thanksgiving, and Independence Day, and also celebrates local Pennsylvania Dutch festivals that highlight folk music, craft fairs, and community meals. The region’s
    agricultural heritage, modest values, and occasional interactions with the Amish community foster a respect for simplicity, hard work, and close‑knit neighborhood ties. Her parents, who trace their
    ancestry to German and Polish immigrants, have passed down stories about their cultural roots, influencing Amanda’s appreciation for tradition while she pursues her own imaginative interests.
