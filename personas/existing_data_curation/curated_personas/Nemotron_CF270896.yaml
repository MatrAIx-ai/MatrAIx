  career_goals: Amanda dreams of becoming a fantasy author and illustrator who can bring comfort and wonder to children. She also imagines designing educational games that spark curiosity, or someday working
    as a scientist who explores abstract ideas like space or robotics—all careers that let her work flexibly, create novel concepts, and help others feel happy and safe.
