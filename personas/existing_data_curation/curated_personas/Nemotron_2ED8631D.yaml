  hobbies: '["Scale model building", "Woodworking", "Hill Country hiking", "Vegetable gardening", "Piano practice", "Reading non-fiction (engineering, science)", "Landscape photography", "Volunteer food
    pantry organization", "Chess", "Puzzle solving"]'
  career_goals: Michael aims to secure a stable engineering role within a reputable firm or a public agency where his methodical approach can contribute to designing reliable, user‑friendly systems—ideally
    in healthcare technology or infrastructure. Over the next five years he plans to obtain a Professional Engineer (PE) license and deepen his expertise in assistive‑device design that benefits vulnerable
    populations. He also intends to pursue a master’s degree in engineering management to develop leadership skills while maintaining a predictable routine. Alongside his professional growth, Michael wants
    to continue volunteering as a STEM mentor for local schools, reinforcing his commitment to compassionate community service.
