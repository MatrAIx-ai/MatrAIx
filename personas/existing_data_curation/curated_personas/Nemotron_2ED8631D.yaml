personas:
  professional: Michael Cope, a 23‑year‑old mechanical engineer with strong CAD, Python, and MATLAB expertise, translates his love of routine and meticulous documentation into reliable design work on assistive
    medical devices, while his compassionate listening ensures project teams stay harmonious.
  sports: Michael Cope enjoys low‑impact cardio through weekend hikes in the Texas Hill Country, follows the Austin FC soccer team and the Texas Longhorns football program, and maintains a steady routine
    at the local community gym's weight‑lifting class on Tuesdays and Thursdays.
  arts: Michael Cope finds quiet inspiration in the works of Ansel Adams, plays classical pieces by Chopin on his piano, and occasionally watches independent films by Guillermo del Toro, letting these artistic
    pursuits balance his methodical engineering mindset.
  travel: Michael Cope prefers meticulously planned road trips, having mapped out a solo drive through the Texas Hill Country wineries and a month‑long backpacking adventure in the Scottish Highlands, but
    his limited budget keeps international travel to occasional long‑weekend getaways like a weekend in New Orleans.
  culinary: Michael Cope enjoys cooking simple, healthy meals such as grilled chicken with roasted sweet potatoes and quinoa, often seasoning with cumin and smoked paprika, while he indulges in Tex‑Mex
    comfort foods like brisket tacos on holidays, reflecting his family's backyard barbecue tradition.
  core: Michael Cope is a methodical 23‑year‑old engineer who balances solitary precision hobbies with heartfelt community service, yet habitually forgets to water his vegetable garden during busy weeks.
background:
  cultural: Michael was raised in a middle‑class suburban community in central Texas within a family that emphasized practicality, self‑reliance, and education. His European‑American heritage is reflected
    in family traditions such as holiday gatherings, backyard barbecues, and a strong work ethic. The Texan values of straightforwardness, responsibility, and community service have shaped his organized
    and compassionate traits. While he respects traditional customs, he also embraces Austin’s progressive, tech‑savvy atmosphere, balancing a respect for routine with an appreciation for the city’s innovative
    spirit.
attributes:
  skills: '["SolidWorks (CAD)", "Python programming", "MATLAB", "Data analysis and statistics", "Laboratory instrumentation", "Technical writing", "Project planning", "Quality control", "Team collaboration",
