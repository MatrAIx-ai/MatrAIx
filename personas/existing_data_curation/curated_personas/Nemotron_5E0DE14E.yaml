personas:
  professional: Nestor Orengo is a four‑year‑old pretend architect who builds block castles following step‑by‑step instructions while also improvising new towers, reflecting a blend of curiosity and practicality,
    though they often leave scattered blocks around the room because they value flexibility over strict order.
  sports: Nestor Orengo loves watching the Chicago Cubs on TV and dribbles a mini soccer ball at the neighborhood park while belonging to a toddler soccer club named Little Kickers, often cheering for the
    team but playing loosely due to a relaxed attitude toward strict practice.
  arts: Nestor Orengo delights in finger‑painting bright dinosaurs, sings the Sesame Street theme at bedtime, and collects plush toys of characters like Buzz Lightyear, letting these creative outlets shape
    a world where imagination outweighs social expectations.
  travel: Nestor Orengo enjoys family road trips to the beach in Santa Monica and a weekend visit to the interactive Children’s Museum in Boston, preferring short, structured excursions over long flights,
    yet they sometimes get anxious about unfamiliar places and cling to a stuffed rabbit for comfort.
  culinary: Nestor Orengo prefers cheesy macaroni, loves dipping apple slices in honey, and can stir a bowl of oatmeal with a wooden spoon all by themselves, though they often make a mess on the kitchen
    floor and rebel against vegetables unless they’re cut into dinosaur shapes.
  core: Nestor Orengo is a fiercely curious four‑year‑old who balances practical building with spontaneous imagination, competes eagerly for toys, yet swings from playful joy to sudden anxiety, making each
    day a mix of organized chaos and tender vulnerability.
background:
  cultural: Nestor is raised in a Hispanic‑Latino household in Darby, Pennsylvania. His parents speak Spanish at home, teaching him family recipes such as arroz con pollo and empanadas, and celebrating
    traditions like Dia de los Muertos and holiday gatherings with music, dance, and colorful decorations. The local Latino community provides a supportive environment with bilingual preschool programs,
    community festivals, and a sense of pride in his cultural heritage, which shapes his worldview and daily routines.
