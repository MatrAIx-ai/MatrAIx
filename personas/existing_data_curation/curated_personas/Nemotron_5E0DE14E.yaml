  career_goals: Nestor dreams of becoming a firefighter who rescues people and a construction worker who builds tall towers, reflecting his love of heroic figures and his enjoyment of constructing things.
    He often says he wants to be the 'best builder' and imagines wearing a bright helmet while helping others. These ambitions combine his competitive nature with a practical desire to protect and create.
