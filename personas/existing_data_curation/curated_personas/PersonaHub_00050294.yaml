persona_description: A paramedic or emergency medical services personnel who is trained and experienced in the management and treatment of traumatic injuries, particularly those involving aortic lacerations.
  They are aware of the severity of these injuries and the importance of timely and effective medical intervention. They have worked on numerous cases involving aortic lacerations and have extensive knowledge
  about the forces involved in accidents, seat belt use, and the potential for seat belt use to prevent these injuries. They are familiar with the legal aspects of these cases and have experience working
  with attorneys and staff to ensure that the rights of the injured are protected.
