  career_goals: Bethani aims to pursue a career that combines her love for community, organization, and communication. In the future she hopes to become a high school teacher or school counselor, where
    she can mentor younger students and design engaging curricula. She is also interested in community event management or public administration, envisioning a role in planning local festivals, youth programs,
    and civic initiatives that strengthen her hometown.
