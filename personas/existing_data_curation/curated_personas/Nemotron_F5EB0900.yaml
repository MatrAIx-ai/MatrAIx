personas:
  professional: Shelby Boudreaux is an aspiring animal caretaker with an associate degree in animal science, who excels at routine feeding, nutrition planning, and basic veterinary first aid, and leverages
    their cooperative nature to communicate effectively with shelter visitors, even as they wrestle with paperwork deadlines.
  sports: Shelby Boudreaux enjoys hiking the Summit County trails with the local Akron Trail Club, occasionally joins a spring ultimate frisbee league, supports the Cleveland Browns and the Cleveland Cavaliers,
    and approaches fitness with a laid‑back routine that blends wildlife observation with light cardio.
  arts: Shelby Boudreaux finds solace in classic animal documentaries like 'March of the Penguins' and vintage films such as 'Casablanca', while also appreciating the folk melodies of Joni Mitchell, the
    paintings of Claude Monet, and the poetry of Maya Angelou, which inspire their knitting designs and garden aesthetics.
  travel: Shelby Boudreaux prefers low‑key road trips to nearby natural retreats like Hocking Hills State Park and Shenandoah National Park, planning itineraries loosely around animal rescue conferences
    and using student discounts to stretch a limited travel budget, while dreaming of a future visit to New Zealand’s wildlife sanctuaries.
  culinary: Shelby Boudreaux relishes preparing herb‑infused dishes such as rosemary roasted potatoes, kale salad with lemon vinaigrette, and carrot‑lentil soup, utilizing fresh basil, thyme, and home‑grown
    vegetables from their balcony garden, and they consider themselves a competent, if not adventurous, home cook.
  core: Shelby Boudreaux is a routine‑loving, animal‑focused 19‑year‑old who balances gentle kindness with occasional disorganization, channeling anxiety into journaling and a budding dream of a low‑stress
    farm sanctuary.
background:
  cultural: Shelby’s family traces its roots to the Cajun region of Louisiana, preserving French‑Acadian traditions such as cooking gumbo, listening to zydeco music, and celebrating Mardi Gras, even after
    relocating to Akron, Ohio. Growing up in the Midwest, she absorbed the region’s practical work ethic, community spirit, and appreciation for modest, routine‑oriented lifestyles. This blend of Cajun
    heritage and Midwestern values informs her emphasis on practicality, tradition, and harmony in both personal and professional spheres.
attributes:
  skills: '["Animal Husbandry", "Feeding and Nutrition Management", "Basic Veterinary First Aid", "Enclosure Cleaning and Maintenance", "Behavioral Observation", "Basic Record Keeping", "Customer Service",
    "Team Collaboration"]'
  hobbies: '["Garden cultivation", "Fostering rescued rabbit", "Hiking and birdwatching", "Knitting", "Animal documentaries", "Classic cinema", "Volunteering at local animal shelter", "Journaling"]'
  career_goals: Shelby aims to become a lead animal caretaker at a regional wildlife rehabilitation center, where she can blend her love for routine care with opportunities for spontaneous problem‑solving.
    Over the next three years she plans to complete a bachelor's degree in animal science and obtain certification as a veterinary technician. Ultimately, she hopes to establish a small sanctuary for rescued
    farm animals, providing a stable, low‑stress environment that reflects her practical values and desire to protect vulnerable creatures.
