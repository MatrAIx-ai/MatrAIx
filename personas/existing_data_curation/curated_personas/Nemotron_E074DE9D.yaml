  career_goals: Philip aims to become a creative technologist, blending his love for art and coding to design interactive experiences. He dreams of studying graphic design or computer animation in college,
    creating video games or digital media, and eventually working for a studio that values innovative storytelling. He also hopes to earn a scholarship to a specialized high school for arts and technology.
