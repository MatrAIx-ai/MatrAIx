persona_description: A Cambridge Puritan theologian who was born in Lancashire and educated in Burnley and St. Paul's School, excelling in Greek and translating the Bible into Latin, particularly the works
  of the Church Fathers. He was a canon of Norwich and regius professor of divinity, but his Puritanism nearly prevented him from being appointed master of St. John's in 1586. After his appointment, he
  made sure that Calvinistic orthodoxy was the theology taught in Trinity College (1593-95). He wrote many treatises in Latin and enjoyed a wide readership in Europe.
