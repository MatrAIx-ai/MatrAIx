  career_goals: Sean aims to continue shaping a structured yet compassionate learning environment, seeking leadership roles such as lead teacher or curriculum specialist within his district. He plans to
    spearhead initiatives that embed inclusive practices and social‑emotional learning into the core curriculum, while mentoring novice teachers and facilitating professional development. Over the next
    five years, he intends to develop a district‑wide literacy improvement program and expand community partnership projects that provide real‑world learning experiences. As he approaches retirement, he
    envisions transitioning into a part‑time educational consultant role, offering expertise to schools seeking to strengthen classroom management systems and culturally responsive teaching, and volunteering
    his time to local literacy and after‑school programs.
