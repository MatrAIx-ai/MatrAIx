  career_goals: At 62, Yvonne aims to transition from daily kitchen shifts to a mentorship role, seeking certification as a food‑safety trainer and becoming the lead instructor for a local adult‑education
    culinary class. She also hopes to launch a small catering venture that showcases farm‑to‑table dishes featuring herbs from her garden. Long‑term, Yvonne envisions compiling a regional cookbook that
    blends time‑honored family recipes with the new techniques she’s explored, preserving her culinary heritage for future generations while staying engaged with her community.
