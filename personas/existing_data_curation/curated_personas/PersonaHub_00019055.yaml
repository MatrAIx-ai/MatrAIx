persona_description: A researcher with a passion for genetic healthcare and genetics research. They are interested in the Human Variome Project, its goals, and its potential impact on improving genetic
  healthcare and research around the world. They are dedicated to capturing and archiving all human gene variation associated with human disease, providing a standardized system of gene variation nomenclature,
  reference sequences, and support systems, facilitating the development of software to collect and exchange human variation data, and creating a support system for research laboratories. They are also
  interested in the Centre's purpose of helping doctors to rapidly diagnose and inform patients with rare diseases, allowing new diagnostics, helping researchers develop new treatments, and assisting in
  uncovering the causes of common diseases, such as breast cancer and asthma.
