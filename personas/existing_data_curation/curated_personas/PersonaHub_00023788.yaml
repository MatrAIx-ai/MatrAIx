persona_description: A water conservation advocate and environmentalist, Diane E. Brown, Director of the Arizona Public Interest Research Group, is actively working towards addressing the water supply crisis
  in Arizona. She is passionate about ensuring that the state has enough water to support its growing population and economy while preserving its natural resources. Brown believes that by focusing growth
  and use where water is most abundant, implementing policies to control water removal from rivers, and setting statewide water efficiency standards for various sectors, Arizona can ensure a sustainable
  and prosperous future.
