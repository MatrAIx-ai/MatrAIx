  career_goals: Marie's immediate goal is to become a shift supervisor within the next year, leveraging her organizational strengths and calm under pressure. She plans to obtain a ServSafe certification
    and enroll in a hospitality-management program at a local community college to qualify for an assistant-manager role. In the longer term, she aspires to manage a full-service restaurant and eventually
    open a small, family-friendly café that emphasizes Southern comfort food and provides a structured environment for staff development. Her competitive drive pushes her to consistently exceed sales targets
    and be recognized as a top performer in her restaurant.
