  hobbies: '[''Soccer'', ''Improv comedy'', ''Gallery hopping'', ''Street photography'', ''Community festival volunteering'', ''Cooking fusion cuisine'', ''Hiking'', ''Neighborhood clean-up events'']'
  career_goals: Ismael aims to advance within the fire department, first seeking promotion to Fire Inspector Supervisor and ultimately to Fire Marshal. He plans to enroll in a fire‑science degree program
    to deepen his technical knowledge and earn certifications such as the International Fire Inspector (IFI) and Hazardous Materials Responder. Passionate about outreach, he intends to pioneer community
    education programs that blend artistic storytelling with fire‑prevention messaging, using visual media to raise awareness. In the long term, he envisions leading a regional fire‑safety initiative, influencing
    policy development, and integrating innovative, art‑inspired approaches to public safety.
