personas:
  professional: Robert Rudolph is a veteran cabinetmaker and bench carpenter who leverages his 35‑plus years of hands‑on experience, advanced joinery expertise, and a relaxed‑but‑curious approach to turn
    client concepts into functional artwork, and they comfortably juggle mentorship, workshop management, and occasional disorganization with a flexible, people‑first mindset.
  sports: Robert Rudolph enjoys leisurely walks along the Detroit Riverfront and occasional pick‑up basketball games at his neighborhood rec center, and they root for the Detroit Lions, Pistons, and Red
    Wings while participating in a senior‑friendly 5K running club that meets each spring, preferring a relaxed fitness routine that balances gentle stretching with occasional woodworking‑induced hand exercises.
  arts: Robert Rudolph immerses themselves in the soulful sounds of B.B. King, Miles Davis, and John Coltrane while strolling through local galleries featuring contemporary installations by artists such
    as Olafur Eliasson, and they often translate that auditory inspiration into modest guitar sessions and handcrafted furniture designs.
  travel: Robert Rudolph favors low‑key road trips to historic towns like Savannah, Georgia, and Asheville, North Carolina, where they can explore preserved homes and local music scenes, plans itineraries
    loosely over a weekend, and balances a love of art and blues festivals with a modest budget and occasional family responsibilities.
  culinary: Robert Rudolph delights in cooking with the herb garden they tend, often preparing rosemary‑infused grilled salmon, heirloom tomato salad drizzled with a balsamic reduction, and occasional gumbo
    with smoked sausage, while their cooking skill hovers between confident home‑cook and experimental hobbyist.
  core: Robert Rudolph blends a curious, artistic spirit with a relaxed, slightly disorganized work ethic, turning woodworking into functional art while they juggle a penchant for vintage blues records,
    spontaneous garden talks, and the occasional missed appointment.
background:
  cultural: Robert is an African‑American who grew up in Detroit’s vibrant cultural scene, with family roots tracing back to the Great Migration from the Southern United States. His upbringing was shaped
    by a close‑knit church community, soul food traditions, and a deep respect for African‑American artistic expression. He draws inspiration from Black artisans and musicians, integrating rhythmic patterns
    and storytelling into his woodwork. In Ferndale, he remains active in local Black cultural festivals, supporting community arts initiatives and preserving the legacy of Black craftsmanship in Michigan.
attributes:
  skills: '["Custom cabinet design", "Advanced joinery", "Fine finishing techniques", "Wood species identification", "Blueprint reading", "Basic CAD drafting", "Tool maintenance", "Apprentice mentorship",
    "Client consultation", "Project estimating"]'
  hobbies: '["Visiting art galleries and museums", "Playing blues guitar", "Listening to jazz and soul music", "Community gardening", "Volunteer woodworking workshops", "Historic home tours", "Collecting
    vintage woodworking tools", "Traveling to craft fairs"]'
  career_goals: Looking ahead, Robert hopes to transition his workshop into a boutique studio that serves both private clients and local artists, offering limited‑edition furniture that doubles as functional
    art. He aims to develop a small apprenticeship program to pass on his knowledge to the next generation, especially to young Black craftsmen in the Detroit metro area. Additionally, Robert envisions
    publishing a guide on sustainable woodworking practices and documenting his personal journey in a memoir that highlights the intersection of African‑American cultural heritage and the craft of woodworking.
