personas:
  professional: Maria Casstevens, an experienced HR compensation architect, blends meticulous data-driven analysis with a flexible, curiosity‑driven approach, often juggling multiple projects despite a
    relaxed attitude toward rigid schedules, and uses their assertive yet compassionate style to champion equitable pay across the county.
  sports: Maria Casstevens, a devoted early‑morning walker and gentle yoga enthusiast, logs daily strolls along the Cape Charles boardwalk and participates in a senior‑friendly rowing club, while they cheer
    for the Washington Nationals, the Virginia Cavaliers basketball team, and occasionally join a local walking group called the Chesapeake Bay Trail Club for seasonal fitness challenges.
  arts: Maria Casstevens, a watercolor hobbyist who finds inspiration in the works of Winslow Homer and Claude Monet, regularly visits the Williamsburg Art Conservation Center and the Virginia Museum of
    Fine Arts, enjoys piano recitals featuring Debussy and Ludovico Einaudi, and supports the Virginia Repertory Theatre’s productions, allowing their creative side to balance their analytical career.
  travel: Maria Casstevens, an avid traveler who plans their trips around historic coastal towns, has explored Cape Cod, the Outer Banks, and a weekend retreat in Newport, Rhode Island, while also journeying
    abroad to Edinburgh for its maritime heritage and the Dutch town of Volendam for its fishing culture, preferring a mix of guided tours and spontaneous walks despite their part‑time consultancy limiting
    extended vacations.
  culinary: Maria Casstevens, a competent home cook with a penchant for Chesapeake Bay seafood, frequently prepares Old Bay‑seasoned crab cakes, lemon‑herb grilled snapper, and rosemary‑infused focaccia
    using fresh herbs from their garden, and they delight in dining at the local oyster bar while occasionally indulging in a glass of Virginia Pinot Grigio after a long day.
  core: Maria Casstevens, a curious yet loosely organized HR veteran, balances data‑driven compensation work with spontaneous watercolor sessions, worries about future pay equity, and habitually forgets
    to water their succulents until the last minute.
background:
  cultural: Maria is a White American with deep roots in the Mid‑Atlantic coastal region. Her family lineage traces back to English and German immigrants who settled in the Chesapeake Bay area in the 19th century.
    Growing up in a small fishing town, she absorbed a blend of Southern hospitality, maritime traditions, and a strong sense of community responsibility. Local customs such as crabbing, seasonal seafood
    festivals, and church gatherings shaped her appreciation for shared experiences, while the area's rich history of art and preservation fostered her love for museums and cultural events. She blends these
    regional influences with a progressive outlook on equity and inclusion nurtured through her professional career.
attributes:
  skills: '["Compensation design","Benefits administration","Job analysis (point‑factor systems)","Salary benchmarking","HR analytics (Python, R)","Data visualization (Tableau)","HRIS management","Regulatory
    compliance (FLSA, ACA)","Project management","Stakeholder negotiation","Training & development","Workforce planning"]'
  hobbies: '["Watercolor painting","Coastal gardening","Birdwatching","Historical fiction reading","Genealogy research","Yoga","Piano playing","Volunteering at local museum","Knitting/crafting"]'
  career_goals: Maria aims to lead the development of a county‑wide equitable compensation framework that reduces pay gaps and aligns rewards with skill‑based progression. She wants to mentor the next generation
    of HR professionals in her organization, sharing her analytical approach and emphasis on compassionate decision‑making. Over the next five years, she plans to transition to a part‑time consultancy focused
    on small coastal businesses, helping them implement data‑driven benefits packages while advocating for work‑life balance and mental‑health awareness. Publishing a practical guide on modernizing compensation
    for mid‑size firms is also on her wish list.
