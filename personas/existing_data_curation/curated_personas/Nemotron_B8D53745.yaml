personas:
  professional: Cindy Wiggins merges a solid business foundation with full‑stack expertise in Python/Django and React, channeling their curiosity and organized flexibility into leading agile product teams
    that prioritize intuitive UX for mental‑wellness apps while mentoring junior developers in a close‑knit, supportive environment.
  sports: Cindy Wiggins enjoys weekend hikes through the Texas Hill Country, practices sunrise yoga at a local studio, follows the Dallas Cowboys in the NFL and Austin FC in MLS, and participates in the
    Austin Trail Hikers Club, preferring low‑impact, solitary exercise over competitive team sports.
  arts: Cindy Wiggins regularly showcases watercolor landscapes inspired by Georgia O'Keeffe at intimate gallery openings, sketches to the soundtrack of Bon Iver, experiments with digital illustration in
    Procreate, volunteers at pottery workshops, and immerses themselves in indie folk playlists featuring Sufjan Stevens and The War on Drugs.
  travel: Cindy Wiggins favors solo, low‑key travel that blends photography and reflection, from weekend road trips to Marfa’s art installations and New Mexico’s Pueblo villages to a planned cultural immersion
    in Kyoto’s Zen gardens, always choosing boutique B&Bs that support local artisans.
  culinary: Cindy Wiggins enjoys crafting fresh avocado‑lime ceviche and hearty green‑chile queso, seasoning dishes with cilantro and jalapeño while experimenting with plating that mirrors their watercolor
    palettes, and relies on a home espresso machine to brew single‑origin beans from Stumptown for a daily coffee ritual.
  core: Cindy Wiggins weaves together code, canvas, and calm, constantly battling anxiety that fuels meticulous planning yet also drives spontaneous bursts of artistic creativity, often found juggling a
    bug fix with a brushstroke while sipping artisanal coffee.
background:
  cultural: Cindy’s cultural background is rooted in a white, middle‑class Texan upbringing. She grew up in a small town near Austin, where community values of self‑reliance, hospitality, and a strong work
    ethic were emphasized. Her family’s emphasis on education and entrepreneurship led her to pursue a business degree before transitioning into tech. While she embraces modern, progressive ideas, she still
    feels a connection to Texas traditions—such as appreciating local music, attending regional fairs, and valuing close‑knit social circles. Living now in Aubrey, Denton County, she is part of the burgeoning
    Dallas‑Fort Worth tech scene, blending her Southern heritage with a forward‑looking, digital lifestyle.
