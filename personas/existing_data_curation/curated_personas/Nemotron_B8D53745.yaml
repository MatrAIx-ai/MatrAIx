  career_goals: Cindy aims to progress to a lead engineering or product management role where she can shape product vision at the intersection of technology and user experience. She wants to leverage her
    business background and artistic sensibility to develop digital products that enhance mental wellness and creativity, such as a mobile app that combines guided mindfulness exercises with expressive
    art tools. Over the next five years, she plans to earn a certification in cloud architecture and pursue an MBA part‑time to broaden her strategic leadership capabilities, eventually aspiring to become
    a Director of Product Development or co‑founder of a purpose‑driven tech startup. She values an environment that supports small, close‑knit teams and offers flexibility to manage her anxiety.
