persona_description: A transportation engineer who has walked the equivalent of the Earth's circumference in the process of commuting to work. He is an adjunct professor in the Department of Civil and Environmental
  Engineering in the UC College of Engineering and Applied Science. He has been commuting to work by foot since January 1999, and projects that he will reach his goal of 24,902 miles in June. He uses a
  method of tracking his distance by measuring his pace and counting his steps, and he has had to scale back this year because of problems with sidewalk maintenance along his route. He has estimated that
  if people didn't use their cars just two days a week, they could reduce greenhouse gas emissions by an average of 1,600 pounds per year.
