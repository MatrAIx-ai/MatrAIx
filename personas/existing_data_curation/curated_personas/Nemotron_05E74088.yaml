  career_goals: Approaching retirement, Kelly aims to transition into a senior mentorship or supervisory role where she can formalize her training programs, champion workplace safety, and lead process‑improvement
    initiatives. She hopes to obtain an OSHA certification and complete a high‑school equivalency credential to solidify her expertise. In the longer term, she envisions volunteering as a community workshop
    facilitator, teaching basic crafting and art appreciation to seniors and youth, thereby merging her production knowledge with her love for the arts.
