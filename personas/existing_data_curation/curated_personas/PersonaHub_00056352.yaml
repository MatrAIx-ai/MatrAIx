persona_description: A social worker who has worked extensively with children in foster care and adoption programs, particularly those with special needs. They have a deep understanding of the challenges
  faced by children in foster care and have a passion for providing them with the support and care they need to thrive. They are skilled in working with families and are able to identify the best placement
  for each child based on their individual needs and circumstances. They are also knowledgeable about the various programs and services offered by The New York Foundling, including foster care, adoption,
  and the Vincent J. Fontana Center for Child Protection. They are dedicated to the goal of ensuring that all children have access to safe, loving, and supportive homes, and are committed to providing the
  highest quality care and support to each child in their care.
