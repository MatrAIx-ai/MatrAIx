personas:
  professional: Amber Delacruz is an aspiring junior game developer who channels their love for fantasy novels and methodical LEGO construction into Scratch programming projects, yet they often launch coding
    sessions on a whim, disrupting the tidy step‑by‑step plans they otherwise crave.
  sports: Amber Delacruz enjoys playing midfield for the local community soccer league and drills after school with the Riverside Youth Soccer Club, and they root for the U.S. Women’s National Team—especially
    goalkeeper Alyssa Naeher—while balancing structured practice with occasional spontaneous pick‑up games that throw off their preferred routine.
  arts: Amber Delacruz expresses creativity by sketching scenes from J.K. Rowling’s Harry Potter series while listening to Hans Zimmer’s cinematic scores, building LEGO houses, and they swap fan‑art with
    friends who adore Studio Ghibli, especially the film ‘Spirited Away.’
  travel: Amber Delacruz loves weekend road trips to nearby Redwood State Park and annual visits to the county fair in Maple Town, while they day‑dream about a future family vacation to Disney World and
    a school‑organized tour of the Eiffel Tower, balancing their spontaneous love for detours with careful allowance savings for travel.
  culinary: Amber Delacruz enjoys baking chocolate chip cookies and peanut butter brownies with their family, enthusiastically measuring flour and sugar with a wooden spoon, and they can whip up a quick
    grilled cheese sandwich after a soccer game, though they sometimes forget to set a timer, resulting in slightly over‑browned treats.
  core: Amber Delacruz is a fantasy‑loving, LEGO‑building, Scratch‑coding 11‑year‑old who constantly juggles a craving for order with bursts of spontaneous creativity, sometimes forgetting deadlines but
    always dreaming up new adventures, and they thrive on balancing structure with surprise.
background:
  cultural: Amber was raised in a predominantly White, middle‑class family in Sulphur, Oklahoma, a small town in Murray County. Her upbringing reflects typical small‑town values such as strong family ties,
    community involvement, and participation in local traditions like the county fair and church gatherings. She enjoys regional foods, country music, and outdoor activities like hiking and wildlife observation,
    which have fostered her appreciation for practicality, hospitality, and a close‑knit community.
attributes:
  skills: '[''Basic cooking and baking'', ''LEGO and model kit assembly'', ''Scratch programming'', ''Reading comprehension'', ''Basic math problem solving'', ''Organizing small group games'']'
