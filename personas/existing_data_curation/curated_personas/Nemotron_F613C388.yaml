  career_goals: Amber dreams of one day working with animals, hoping to become a wildlife biologist or veterinarian so she can help protect the local wildlife she loves exploring. In the short term, she
    aims to improve her organization skills, win a school science fair, and join a community service club to develop teamwork and leadership abilities.
