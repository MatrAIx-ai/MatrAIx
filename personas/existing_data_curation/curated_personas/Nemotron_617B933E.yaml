  hobbies: '[''Sketching'', ''Visiting art museums and galleries'', ''Photography'', ''DIY home-improvement projects'', ''Playing acoustic guitar'', ''Hiking'', ''Reading biographies of artists and craftsmen'',
    ''Volunteering with community mural projects'']'
  career_goals: He aims to become a certified lead painter within the next two years, earn his OSHA 30-hour certification, and complete a vocational program in construction management. Long-term, Nasser
    plans to launch his own painting and finishing company, offering specialty services such as decorative murals and custom finishes that blend his artistic interests with his trade expertise.
