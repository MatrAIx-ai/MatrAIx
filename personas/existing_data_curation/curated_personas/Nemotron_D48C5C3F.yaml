personas:
  professional: Steven Cannon is a community recreation coordinator who leverages their organized, detail‑oriented nature and curiosity for new ideas to design inclusive outdoor programs, blend art installations
    into park spaces, manage budgets with precision, and lead stakeholder collaborations with calm assertiveness.
  sports: Steven Cannon enjoys weekend hikes on the Ice Age Trail, birdwatching outings with the local Audubon club, and casual pick‑up soccer with a community league, roots their fandom in the Milwaukee
    Bucks and Brewers, and they approach fitness with a steady, low‑impact routine that balances cardio with occasional weight‑training at a neighborhood gym.
  arts: Steven Cannon nurtures a love of visual art through watercolor landscapes inspired by Ansel Adams, curates a rotating 'art in the park' series featuring local sculptors, attends Milwaukee Art Museum
    exhibitions of Georgia O'Keeffe and contemporary fiber artists, and they unwind with classic folk albums by Bob Dylan and the modern indie band Fleet Foxes.
  travel: Steven Cannon prefers meticulously planned road trips that blend nature and culture, having explored Door County’s lighthouses, the volcanic landscapes of Iceland’s Golden Circle, and the historic
    towns of Bavaria during Oktoberfest, while they dream of hiking Norway’s fjords but keep family commitments and a modest travel budget in mind.
  culinary: Steven Cannon enjoys crafting hearty meals such as pan‑seared lake trout with dill, a rustic spätzle and sauerkraut stew, and experimenting with sourdough starter using local wheat, they have
    an intermediate skill level in the kitchen, and they often pair dishes with a craft‑brew they brew at home.
  core: Steven Cannon blends a methodical, quiet demeanor with a curiosity for art and technology, turning modest Midwestern roots into inclusive park programs while juggling a love of hiking, watercolor,
    and precise budgeting, even if they occasionally forget to floss.
background:
  cultural: Steven was raised in a predominantly white, Midwestern community in Germantown, Wisconsin, with family roots tracing back to German and Scandinavian immigrants. His upbringing emphasized modesty,
    self-reliance, community service, and a love of outdoor recreation typical of the region. He participates in local cultural events such as county fairs, Oktoberfest celebrations, and craft fairs, reflecting
    a heritage of German-influenced traditions. This background shapes his dedication to providing inclusive, culturally resonant recreation programs that respect both local customs and the natural environment.
