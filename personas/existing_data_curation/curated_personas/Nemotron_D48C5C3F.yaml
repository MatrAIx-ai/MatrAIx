  career_goals: Steven aims to advance to the position of recreation director for the Washington County Parks Department, where he can expand inclusive programming and embed innovative art-and-technology
    collaborations in community spaces. He plans to earn a bachelor's degree in recreation management, achieve Certified Park and Recreation Professional (CPRP) certification, and lead grant-writing efforts
    to secure funding for new parks, youth centers, and sustainable outdoor projects. He also seeks to mentor junior staff, champion environmentally responsible recreation, and strengthen community partnerships.
