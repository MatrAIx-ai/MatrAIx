    and poetry'', ''Gardening with native prairie plants'']'
  career_goals: She aims to step into a senior leadership role—ideally Director of Marketing or Vice President of Marketing—within the next three years, overseeing regional brand strategy for a consumer-focused
    company. Lillie is committed to championing inclusive, culturally resonant campaigns that draw on her love of the arts. She plans to earn an Executive MBA to deepen her strategic and financial acumen,
    and to mentor emerging marketers, especially women re-entering the workforce. A longer-term ambition is to launch a boutique consultancy that helps arts and cultural nonprofits amplify their reach through
    modern marketing techniques.
