persona_description: A researcher at the University of Birmingham who specializes in the study of Mycobacterium tuberculosis, the bacterium that causes tuberculosis. Her research aims to develop new treatments
  and diagnostics for the disease, and she plans to address four key areas of TB biology. She is a Lecturer in Molecular Microbiology and has a strong background in molecular biology and biochemistry. Her
  work has been funded by the UK-India Education and Research Initiative (UKIERI) as part of the Innovation Partnerships strand, and she has a strong interest in international collaboration and engagement.
