personas:
  professional: Susie Gueringer, a budding robotics enthusiast, channels their disciplined, detail‑oriented mindset into designing Scratch‑coded robots for school competitions, and they balance inventive
    sci‑fi inspiration with practical engineering methods.
  sports: Susie Gueringer hits the neighborhood court after school to play pickup basketball with their friends, idolizing the Los Angeles Lakers while also cheering for the local middle‑school girls’ team,
    and they use the sport as a structured outlet for stress relief and teamwork.
  arts: Susie Gueringer channels their creative energy into sketching comic‑style panels inspired by creators like Marjane Satrapi and Mike Mignola, while they unwind to R&B artists such as H.E.R. and neo‑soul
    singer SZA, and they practice contemporary dance routines from YouTube tutorials, occasionally showcasing their voice in the church choir.
  travel: Susie Gueringer dreams of visiting the Kennedy Space Center in Florida to stand beneath a historic launch pad, and they eagerly anticipate a family road trip to the Grand Canyon, preferring itineraries
    built in their planner that balance structured museum stops with spontaneous photo‑ops.
  culinary: Susie Gueringer often spends weekend afternoons prepping avocado toast topped with cherry tomatoes and feta, meticulously measuring each ingredient, and they treat themselves to baking chewy
    chocolate‑chip cookies with a pinch of sea salt, a habit that sometimes leads to excessive late‑night snacking.
  core: Susie Gueringer, a 13‑year‑old organized dreamer, balances a relentless curiosity for space and robotics with a tendency to over‑worry, and they turn journaling and disciplined routines into tools
    for both achievement and stress relief.
background:
  cultural: Susie comes from an African‑American family with deep roots in the Washington‑D.C. metropolitan area. Her parents emphasize the importance of education, perseverance, and community service,
    values that are reflected in family traditions such as weekly church attendance, cooking soul‑food meals together, and observing cultural holidays like Juneteenth and Kwanzaa. Living in Aldie, a largely
    suburban part of Loudoun County, she navigates a multicultural environment that blends her family's heritage with the broader, predominantly white community. She is a member of her school's Black Student
    Union, where she helps organize events that celebrate Black history and culture. At home, she hears stories about the civil‑rights movement and the contributions of African‑American pioneers, which
    inspire her ambition. These cultural influences shape her perspectives on identity, resilience, and the desire to give back to her community.
