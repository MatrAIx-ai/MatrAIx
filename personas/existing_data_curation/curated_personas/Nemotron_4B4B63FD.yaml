  hobbies: '[''Reading (Science‑Fiction & Nonfiction)'', ''Sketching/Illustration'', ''Robotics Club (Scratch Programming)'', ''Basketball'', ''Journaling'', ''Listening to R&B, Neo‑Soul, Hip‑Hop Music'',
