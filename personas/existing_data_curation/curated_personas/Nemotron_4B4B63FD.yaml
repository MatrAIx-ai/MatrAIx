  career_goals: Looking ahead, Susie envisions a career that merges her curiosity about how things work with a practical desire to help others. She aspires to become a biomedical researcher or pediatrician,
    motivated by a wish to contribute to children's health and to address health disparities she has observed in her community. In the short term, she aims to maintain top grades throughout high school,
    earn a scholarship, and join advanced science programs such as a STEM summer institute. She also hopes to develop leadership experience by serving on her school's student council and by organizing health‑awareness
    workshops for younger students, eventually using her disciplined work ethic to pursue a degree in biomedical engineering or public health.
