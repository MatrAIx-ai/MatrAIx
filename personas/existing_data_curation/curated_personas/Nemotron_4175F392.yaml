personas:
  professional: Erika Pachecorodriguez is a retail associate turned visual merchandiser who leverages precise cash‑handling and point‑of‑sale expertise with a naturally keen aesthetic sense to design eye‑catching
    boutique displays, and she is actively seeking a supervisory role in a gallery gift shop where she can curate art‑focused retail experiences.
  sports: Erika Pachecorodriguez is an avid hiker with the Pueblo Outdoor Club, attends weekly yoga classes to maintain flexibility, and supports the Colorado Rockies and Denver Broncos while occasionally
    joining community basketball pick‑up games during summer.
  arts: Erika Pachecorodriguez immerses herself in Pueblo’s vibrant street murals, often sketching works by local muralist Carlos Sánchez, draws inspiration from Frida Kahlo and Banksy’s subversive stencils,
    paints acrylic mixed‑media pieces while listening to Bad Bunny and J Balvin, and discusses philosophical novels and contemporary art theory at her weekly book club.
  travel: Erika Pachecorodriguez prefers spontaneous, budget‑conscious trips that blend art and nature, having explored Santa Fe’s galleries and Oaxaca’s culinary markets, she now dreams of wandering Mexico
    City’s murals and Barcelona’s Gaudí architecture, yet she often leaves flights to the last minute to accommodate her flexible schedule.
  culinary: Erika Pachecorodriguez enjoys cooking at an intermediate level, perfecting traditional Mexican dishes such as chiles en nogada, pozole, and homemade tamales, delighting in the aroma of roasted
    chilies, fresh cilantro, and masa while often improvising fusion twists like avocado‑lime salsa over grilled fish.
  core: Erika Pachecorodriguez is a curiously creative spirit who balances a love for color‑filled street art and spontaneous cooking with a relaxed, sometimes disorganized lifestyle, habitually late to
    appointments but always ready to share a fresh sketch.
background:
  cultural: Erika is a second‑generation Hispanic American of Mexican descent, raised in Pueblo, Colorado, where a strong Latino community shaped her upbringing. She grew up bilingual, celebrating traditions
    such as Día de los Muertos and quinceañeras, and she values familismo and community solidarity. The city's rich mural culture and local festivals fostered her love for visual arts and public expression.
    Her cultural identity blends Mexican heritage with the broader American Southwest experience, influencing her artistic tastes, food preferences, and emphasis on interpersonal harmony.
