  hobbies: '[''Visiting art galleries'', ''Sketching'', ''Acrylic painting'', ''Photography'', ''Cooking Mexican cuisine'', ''Listening to Latin music'', ''Dancing'', ''Hiking'', ''Yoga'', ''Reading fiction
    and philosophy'', ''Book club participation'']'
  career_goals: Erika aims to leverage her customer service experience and artistic interests into a role that blends retail and creative expression. She hopes to advance into a supervisory or management
    position at a boutique or cultural venue, such as a community art gallery or museum gift shop, where she can curate displays and engage with patrons. In the longer term she plans to complete her college
    coursework in marketing or art history, possibly pursuing a degree in arts administration, to open her own small gallery‑café that showcases local Latino artists and provides a community gathering space.
