personas:
  professional: Tamara Teasley, a civil engineer in Baker County who blends structural analysis and sustainable design with a vibrant artistic sensibility, uses their curiosity to integrate murals and landscaped
    spaces into public projects, and leverages their outgoing, assertive communication style to translate complex technical concepts for community stakeholders while guiding initiatives toward equity and
    resilience.
  sports: Tamara Teasley, a fitness‑oriented community member who attends weekly yoga classes, participates in a local walking club that supports Habitat for Humanity fundraisers, cheers for the Atlanta
    Falcons and Atlanta Braves, and often leads group hikes in the Georgia countryside, while occasionally skipping workouts when project deadlines intensify.
  arts: Tamara Teasley, a watercolor landscape painter who curates a neighborhood gallery showcasing emerging artists, sings lead alto in a Sunday gospel choir, draws inspiration from Monet and Georgia
    O'Keeffe, and discusses historic fiction and civil‑rights biographies with their book club, reflecting a deep curiosity and collaborative spirit.
  travel: Tamara Teasley, an avid cultural traveler who has explored the National Civil Rights Museum in Memphis, the historic district of Savannah, the Mardi Gras celebrations in New Orleans, and the annual
    Skirball Cultural Festival in Atlanta, prefers planning trips around community festivals and historic sites, and balances wanderlust with a modest travel budget that funds both boutique stays and family
    visits.
  culinary: Tamara Teasley, a home chef who expertly prepares Southern soul dishes such as smoked collard greens, fried catfish, and cornbread, often infusing them with unexpected flavors like miso glaze
    or gochujang, experiments with heirloom tomatoes from their garden in fresh salsas, enjoys hosting potlucks for choir and engineering colleagues, and occasionally over‑seasons in pursuit of bold taste.
  core: Tamara Teasley, a curious, community‑driven engineer who balances technical rigor with artistic passion, lives a socially vibrant life, and navigates mid‑life with disciplined finances, health‑wise
    vigilance, and a habit of over‑committing to creative projects.
background:
  cultural: Tamara grew up in a close‑knit African‑American community in rural Georgia, where church, family, and music were central pillars of daily life. Her grandparents participated in the civil‑rights
    movement, instilling in her a strong sense of social responsibility and pride in her heritage. She maintains ties to Southern Black cultural traditions such as gospel music, storytelling, and communal
    cooking, often sharing these experiences with neighbors and coworkers. Her identity as a Black woman in a traditionally male‑dominated field shapes her advocacy for inclusive design practices and her
    dedication to mentoring the next generation of engineers from underrepresented backgrounds. While rooted in Southern hospitality, she actively embraces broader artistic and intellectual influences,
    blending them into both her professional projects and personal pursuits.
attributes:
  skills: '[''Structural Analysis'', ''Road and Bridge Design'', ''Stormwater Management'', ''AutoCAD Civil 3D'', ''GIS Mapping'', ''Project Management'', ''Budgeting and Cost Estimation'', ''Stakeholder
