  hobbies: '[''Watercolor Painting'', ''Community Art Curation'', ''Yoga'', ''Book Club'', ''Gospel Choir'', ''Gardening'', ''Habitat for Humanity Volunteering'', ''Travel to Cultural Festivals'', ''Cooking
    Southern Soul Food'', ''Historical Fiction Reading'']'
  career_goals: Tamara aims to advance to a senior project manager position within the county's public works department, where she can lead large‑scale infrastructure initiatives that prioritize sustainability
    and equity. She plans to obtain a Professional Engineer (PE) license and to mentor emerging Black women engineers through local STEM outreach programs. She is passionate about championing the inclusion
    of public art in civic projects and, in the long term, envisions establishing a consulting firm that advises municipalities on resilient, community‑driven design while influencing state policy on equitable
    infrastructure investment.
