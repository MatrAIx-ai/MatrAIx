persona_description: A researcher and educator interested in alternative approaches to teaching and learning, particularly those that emphasize collaboration, community, and distributed control. This person
  is likely to be familiar with concepts such as learning communities, dynamic learning environments, and distributed control. They are likely to be interested in the idea of learning as a process of self-organization
  and adaptation, rather than a passive process of learning from a teacher or a prescribed curriculum. They are also likely to be familiar with the work of complexity theorists and complexity-based systems
  theory, and may be interested in how these theories can be applied to educational settings.
