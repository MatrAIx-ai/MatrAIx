  hobbies: '["Surfing", "Beach Volleyball", "DIY Car Restoration", "Hiking in Local Trails", "Listening to Classic Rock", "Watching Technology Documentaries", "Participating in Community Beach Clean-ups",
    "Reading Non-fiction on Sustainability"]'
  career_goals: Allan aims to advance from a frontline cleaner to a supervisory or operations manager role within his company, leveraging his practical experience to oversee larger teams and optimize cleaning
    processes. He plans to obtain certifications in industrial cleaning safety and green cleaning methods, and eventually earn a diesel mechanic credential to broaden his technical skill set. Over the next
    five years, he envisions launching his own mobile detailing service focused on sustainable, low‑impact cleaning solutions, combining his curiosity for new technologies with his pragmatic approach to
    business.
