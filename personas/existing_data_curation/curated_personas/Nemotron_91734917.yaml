personas:
  professional: Allan Savage is a seasoned cleaning specialist at a major facilities management firm, leveraging deep expertise with pressure washers, steam cleaners, and eco-friendly chemical mixes while
    applying their organized yet adaptable mindset to train crews, optimize routes, and champion green-cleaning certifications as they work toward a supervisory role.
  sports: Allan Savage rides the waves at Long Beach, plays beach volleyball with the local Long Beach Surf Club, follows the Los Angeles Dodgers and Los Angeles Lakers passionately, and hikes the coastal
    trail at Crystal Cove each weekend to stay fit and maintain a balanced active lifestyle.
  arts: Allan Savage’s evenings often feature classic rock legends like Led Zeppelin, Pink Floyd, and The Rolling Stones while they binge-watch documentaries by David Attenborough and attend occasional
    live shows at The Greek Theatre, letting music and nature documentaries shape their creative outlook.
  travel: Allan Savage enjoys spontaneous weekend road trips along California’s coast to Big Sur and Catalina Island, has explored New Zealand’s South Island for its hiking and renewable-energy projects,
    and dreams of a sustainable adventure in Iceland’s geothermal scenery, always balancing travel costs with a modest savings plan.
  culinary: Allan Savage favors fresh seafood tacos seasoned with cumin, lime, and cilantro, they cook a perfectly grilled salmon accompanied by quinoa and roasted asparagus, and they relish a hearty kale-and-sweet-potato
    smoothie, reflecting a moderate cooking skill set focused on sustainable, flavor-rich dishes.
  core: Allan Savage blends a practical eco-conscious work ethic with a love for surf, vintage cars, and classic rock, but they can’t resist splurging on car parts and occasionally forget to floss.
background:
  cultural: Allan grew up in a middle‑class white family in Long Beach, California, immersed in the region's car culture and beach lifestyle. The multicultural environment of Los Angeles County exposed
    him to diverse perspectives, yet his upbringing emphasized independence, a solid work ethic, and practical problem‑solving. He identifies with the working‑class ethos of Southern California, valuing
    reliability, community involvement, and a balanced blend of personal space and social connection.
attributes:
  skills: '["Vehicle Exterior Detailing", "Interior Upholstery Cleaning", "Pressure Washing", "Chemical Safety Management", "Equipment Maintenance", "Inventory Control", "Customer Service", "Basic Automotive
