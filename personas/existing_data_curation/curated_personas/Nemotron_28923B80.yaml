  hobbies: '[''Fishing'', ''Barbecue/grilling'', ''Woodworking'', ''Playing guitar'', ''Community festivals'', ''Volunteering teaching home‑repair'', ''Watching football'', ''Supporting the Texas Rangers'']'
  career_goals: Jose aims to earn a senior superintendent role within the next three years, overseeing multiple projects across the Tulsa region. He is also interested in obtaining certifications in advanced
    safety management and sustainable construction practices. Long‑term, he plans to transition to a consulting role or start a small family‑owned contractor business that emphasizes safety, efficiency,
    and mentorship of younger Hispanic workers. Retirement planning and securing a stable future for his family are also central to his ambitions.
