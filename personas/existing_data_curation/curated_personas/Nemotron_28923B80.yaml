personas:
  professional: Jose Rivera, a veteran construction supervisor with over 30 years of on‑site experience in construction and extraction, leverages a methodical problem‑solving approach, meticulous crew scheduling,
    and compassionate leadership to exceed OSHA safety standards, keep projects on budget, and mentor younger tradespeople.
  sports: Jose Rivera, a loyal fan of the Texas Rangers, Oklahoma Sooners football, and the Bixby Bulldogs high‑school team, blends his love of weekend fishing trips on Lake Eufaula with regular functional‑strength
    workouts at the local gym, while carving out time each Sunday to watch high‑school football broadcasts with his family.
  arts: Jose Rivera, who brings a well‑worn guitar to church potlucks to play classic country tunes by George Strait and norteño anthems by Juan Gabriel, also enjoys attending local mural festivals and
    listening to the storytelling flair of Texas‑style folk singers, letting music and visual art shape his community connections.
  travel: Jose Rivera, who prefers organized road trips with detailed itineraries, has explored the historic missions of San Antonio, hiked the pine‑covered trails of the Colorado Rockies, and savored a
    family reunion in Oaxaca’s colorful streets, while dreaming of a serene Gulf of Mexico cruise that balances adventure with relaxation.
  culinary: Jose Rivera, a proficient grill master, delights his family with smoky chipotle‑marinated carnitas, homemade chile rellenos stuffed with queso fresco, and Tex‑Mex fajitas topped with fresh cilantro
    and lime, while occasionally splurging on a premium ribeye steak at a high‑end steakhouse.
  core: Jose Rivera, a methodical yet warm‑hearted 55‑year‑old supervisor, balances disciplined work habits with late‑night guitar jam sessions, a habit of over‑salting his dishes, and a stubborn reluctance
    to delegate tasks.
background:
  cultural: Jose was raised in a Mexican‑American household where Spanish was spoken at home and traditions such as Día de los Muertos, Cinco de Mayo, and family posadas were celebrated with great pride.
    He is bilingual, often translating for coworkers and relatives. Their Catholic faith and strong sense of family responsibility influence his values of loyalty and community service. Living in Bixby,
    OK, he blends his Mexican heritage with Midwestern customs, participating in local church activities, supporting regional sports teams, and bringing Mexican culinary flavors to neighborhood potlucks.
