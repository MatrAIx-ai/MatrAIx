  career_goals: Randall aims to advance into a senior leadership role within analytics, such as Director of Operational Excellence, where he can shape organization‑wide performance initiatives. He plans
    to earn PMP and Six Sigma Black Belt certifications to formalize his expertise. Mentoring junior analysts and building high‑performing teams are key ambitions, as is championing data‑driven decision
    making that supports sustainable growth for his company. Over the next five years, he also hopes to balance professional advancement with greater community impact, perhaps by consulting for local non‑profits
    or serving on regional economic development boards.
