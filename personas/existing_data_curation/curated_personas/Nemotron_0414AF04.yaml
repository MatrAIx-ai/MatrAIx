  hobbies: '[''Sketching and drawing'', ''Visiting art museums and galleries'', ''3D printing personal projects'', ''DIY woodworking'', ''Playing acoustic guitar'', ''Urban exploration in Boston'', ''Volunteering
    at community maker spaces'', ''Reading science fiction and design literature'', ''Photography'', ''Yoga or meditation'', ''Cycling around Allston'']'
  career_goals: Christopher aims to transition from a drafter to a lead design engineer within the next five years, focusing on sustainable and inclusive building design. He plans to deepen his BIM expertise
    and obtain a Professional Engineer (PE) license, positioning himself to oversee complex multidisciplinary projects. His long‑term ambition is to establish a community‑focused design studio that merges
    art and technology, offering pro‑bono design services for affordable housing and public spaces. He also hopes to develop workshops that teach drafting and 3‑D modeling to underrepresented youth, leveraging
    his compassionate nature to broaden access to design careers.
