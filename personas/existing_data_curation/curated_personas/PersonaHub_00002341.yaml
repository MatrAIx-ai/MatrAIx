persona_description: A molecular biologist who specializes in the study of gene expression microarray technology, particularly in its application to cardiovascular diseases and the microarray technique.
  She is interested in understanding the mechanisms of vascular physiology and pathophysiology, and how the microarray technique can be used to investigate cellular mechanisms and identify novel pathways
  associated with atherogenesis. Her research interests include, but are not limited to, the identification of molecules downstream of transforming growth factor β and tumour necrosis factor α signalling,
  and the study of vascular dysfunction and atherogenesis in hypercholesterolaemic mice. She is also interested in the study of the pulmonary circulation and the identification of novel genes involved in
  oxidative processes, vascular dysfunction, and sterol metabolism in high-density lipoprotein deficient mice.
