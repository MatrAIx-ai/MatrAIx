personas:
  professional: Rafael Fernandezburgos, a budding junior programmer, channels their love for comics and step‑by‑step LEGO builds into creating simple Scratch games that showcase a knack for logical sequencing
    and storytelling.
  sports: Rafael Fernandezburgos enjoys small‑team soccer practice after school, preferring the familiar rhythm of passing drills with friends and quietly cheering for the local City Strikers U‑11 squad,
    even though they rarely attend large stadium games.
  arts: Rafael Fernandezburgos immerses themselves in comic book universes and draws original cartoons while listening to traditional folk melodies from regional festivals, often humming the tunes of artist
    Lila Perez during sketch sessions.
  travel: Rafael Fernandezburgos loves weekend trips to the nearby historic town of Old Falls, where they explore the local museum and the annual lantern parade, preferring short drives over long flights
    and always packing a sketchbook for on‑the‑go doodles.
  culinary: Rafael Fernandezburgos assists their grandmother in the kitchen, mastering the art of shaping masa for tamales and sprinkling a dash of chili powder on homemade tacos, while their favorite snack
    remains crunchy nachos with melted cheese.
  core: Rafael Fernandezburgos is a routine‑loving ten‑year‑old who blends structured LEGO building, comic‑inspired coding, and heartfelt family cooking into a quiet but imaginative world, occasionally
    forgetting to floss and hoarding spare change for future projects.
background:
  cultural: Rafael is raised in a Mexican‑American household in Tulsa, Oklahoma. Spanish is spoken at home, and he grows up immersed in Mexican traditions such as celebrating Día de los Muertos, Mexican
    Independence Day, and the annual making of tamales with his extended family. The values of familismo, respect for elders, and a strong sense of community guide his daily life. While attending an English‑language
    elementary school, he balances both cultures, embracing American customs like school sports while maintaining Mexican heritage through food, music, and bilingual communication. His family participates
    in a local Mexican cultural center, which reinforces his connection to his roots and teaches him the importance of sharing his culture with others.
