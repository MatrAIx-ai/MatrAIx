  career_goals: Rafael imagines a future where he can combine his love for building, problem‑solving, and helping others. He hopes to become a civil engineer or architect who designs safe, functional spaces
    for his community in Tulsa, valuing a clear, structured career path. He also envisions a role that allows him to share knowledge, such as becoming a bilingual teacher who can support other Spanish‑speaking
    students. His long‑term ambition is to have a stable, reliable job that lets him provide for his family and contribute positively to his neighborhood.
