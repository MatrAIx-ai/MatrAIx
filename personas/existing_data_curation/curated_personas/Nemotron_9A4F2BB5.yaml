  career_goals: Looking ahead, Sophia aims to transition into a senior executive role, such as Director of Cultural Affairs for the City of Norfolk, where she can shape citywide arts policy and expand equitable
    access to cultural resources. She plans to mentor the next generation of Black arts administrators through a structured fellowship program she intends to launch within her organization. Over the next
    five years, she also seeks to secure a multi‑year grant to establish a permanent community arts hub in a historically underserved neighborhood, preserving local heritage while fostering economic development.
    In parallel, Sophia is pursuing a Project Management Professional (PMP) certification to formalize her operational expertise and intends to author a memoir that blends personal narrative with the history
    of African American artistic expression in Norfolk.
