  hobbies: '[''Gardening'', ''Reading historical and local literature'', ''Knitting'', ''Attending bible study'', ''Book club'', ''Birdwatching'', ''Walking along the Umpqua River'', ''Baking pies'', ''Volunteering
    at community craft fairs'']'
  career_goals: Although she is no longer in the formal workforce, Jessica’s primary ambition is to preserve her independence and health while giving back to her community. She aims to continue volunteering
    at the senior center, mentor younger neighbors on practical life skills, and finish a memoir that captures her personal history and the changes in Roseburg over the decades. She hopes to organize a
    small intergenerational gardening club that encourages social interaction in a low‑stress setting. Jessica also aspires to maintain a sustainable garden that supplies fresh produce for herself and for
    occasional donations to the local food pantry.
