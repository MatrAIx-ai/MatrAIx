personas:
  professional: Chiquita Todd is an 18-year-old graphic design associate student who blends digital illustration with data-driven storytelling, using their competitive edge and critical eye to lead campus
    art exhibitions and secure part-time internships, while they remain open to experimental visual concepts.
  sports: Chiquita Todd is a weekend kayaker and member of a local beach volleyball league, who tracks workouts with a smartwatch, follows the Miami Heat in the NBA and the Carolina Hurricanes in the NHL,
    and incorporates high-intensity interval training to keep endurance and creative energy in balance.
  arts: Chiquita Todd frequents local galleries, draws creative spark from the street art of Banksy, the graphic novels of Jillian Tamaki, the music of Tame Impala, and the films of Hayao Miyazaki, and
    they regularly dissect these works in thoughtful blog posts.
  travel: Chiquita Todd loves spontaneous weekend road trips to coastal towns like the Outer Banks, dreams of exploring the vibrant streets of Lisbon and the historic temples of Kyoto, and prefers flexible
    itineraries that leave room for impromptu sketch sessions.
  culinary: Chiquita Todd enjoys crafting avocado toast topped with feta and chili flakes, whipping up quick shrimp tacos with lime and cilantro, and occasionally experimenting with matcha-infused macarons,
    balancing a modest cooking skill with a love for bold, fresh flavors.
  core: Chiquita Todd is a fiercely curious 18-year-old graphic design student who channels competitive ambition into art, balances meticulous planning with spontaneous sketching, and habitually procrastinates
    by playing strategy video games.
background:
  cultural: Chiquita grew up in a close‑knit African‑American family in Elizabeth City, where church gatherings, gospel music, and family storytelling shaped her early worldview. The town’s maritime heritage
    and the proximity of the Outer Banks instilled an appreciation for coastal culture, while local Black community events—such as the Juneteenth celebration at the Elizabeth City Community Center—connected
    her with the broader history of African‑American resilience in the South. She participates in a youth art program hosted by the Black History Museum of North Carolina, where she learns traditional quilting
    techniques and contemporary Black visual art. Her cultural identity is a blend of Southern Black traditions, a love for storytelling through art, and a forward‑looking drive to represent her community
    on larger creative platforms.
attributes:
  skills: '[''Graphic Design'', ''Digital Illustration'', ''Critical Writing'', ''Social Media Strategy'', ''Photography'', ''Research & Data Analysis'', ''Public Speaking'']'
  hobbies: '[''Sketching & Digital Painting'', ''Visiting Art Galleries & Murals'', ''Reading Speculative Fiction & Graphic Novels'', ''Listening to Neo‑Soul and Hip‑Hop Poetry'', ''Volunteering as a Youth
    Tutor'', ''Kayaking & Beach Photography'', ''Playing Strategy Video Games'']'
  career_goals: In the short term, Chiquita plans to complete an Associate of Applied Science in Graphic Design, building a professional portfolio that showcases her illustration work and branding projects.
    She aims to secure a part‑time internship with a regional marketing firm or a cultural institution such as the Museum of the Albemarle, where she can apply her visual storytelling skills in a real‑world
    setting. Competitive by nature, she intends to enter state‑wide art contests and win recognition that can springboard her freelance business. Over the next five to seven years, she envisions earning
    a BFA in Graphic Design, followed by certifications in UI/UX, ultimately positioning herself for a senior creative role—such as Art Director or Creative Lead—at an agency that values culturally resonant
    design. She also hopes to launch her own line of limited‑edition prints that merge Southern coastal imagery with contemporary Black artistic narratives.
