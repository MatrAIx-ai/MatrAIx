  hobbies: '[''Native plant gardening'', ''Beadwork'', ''Quilting'', ''Reading historical fiction'', ''Nature walking'', ''Bridge (card game)'', ''Cooking traditional Caddo dishes'', ''Storytelling'']'
  career_goals: Although Alena is no longer in the formal workforce, she remains driven to contribute to her community. Her primary goal is to establish a mentorship program that pairs tribal elders with
    young entrepreneurs, fostering culturally-grounded economic development. She aspires to document and archive Caddo oral histories, creating a small digital library for future generations. Additionally,
    she hopes to lead a community garden that showcases native Texas plants, providing fresh produce for local families and serving as a living classroom for traditional ecological knowledge. She also dreams
    of serving as an advisory council member for the Caddo Nation's cultural preservation committee, where her business acumen and collaborative spirit can help shape sustainable initiatives.
