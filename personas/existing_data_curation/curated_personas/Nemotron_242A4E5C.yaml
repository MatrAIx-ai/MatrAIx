personas:
  professional: Alena Casenas, a retired business strategist turned community mentor, leverages decades of financial planning, grant writing, and conflict mediation expertise to guide local entrepreneurs
    while letting their relaxed, curiosity‑driven approach keep meetings informal and occasionally a bit disorganized.
  sports: Alena Casenas, an avid walker and occasional bird‑watcher, joins the senior walking club at the nearby nature reserve during spring and fall, cheers on the Dallas Cowboys on Sundays, and follows
    the Houston Astros during baseball season, preferring low‑impact exercise over organized team sports.
  arts: Alena Casenas, a dedicated beadwork artist and quilt maker, draws inspiration from the intricate patterns of Jane Thompson’s contemporary bead designs, the melodic storytelling of folk legend Pete
    Seeger, and the vibrant desert landscapes in Georgia O'Keeffe’s paintings, weaving these influences into evenings of craft and cultural reflection.
  travel: Alena Casenas prefers relaxed, low‑key travel, often planning trips with a loose itinerary to stay flexible; they have already explored the seasonal wildflower fields of New Mexico’s high desert,
    the historic river towns along the Mississippi, and they dream of visiting the Black Hills of South Dakota to study native plant uses and tell stories of the land.
  culinary: Alena Casenas loves cooking traditional dishes such as frybread, wild rice pilaf with toasted pine nuts, and stews flavored with sage and juniper berries; they are a capable home cook who enjoys
    experimenting with heirloom beans, but they sometimes over‑salt the pilaf because of a habit of tasting midway.
  core: Alena Casenas blends seasoned business savvy with a gentle curiosity, cherishes solitude and small gatherings, and, despite a habit of misplacing garden tools and an occasional lapse in bill organization,
    remains a compassionate pillar of community harmony.
background:
  cultural: Alena is a member of the Caddo Nation, a tribe with deep roots in East Texas. Her upbringing combined modern American life with the preservation of Caddo traditions, language, and ceremonies.
    She grew up speaking both English and conversational Caddo, participating in annual powwows and seasonal planting rituals that honor the earth. Her identity is shaped by a strong sense of communal responsibility,
    reverence for nature, and an oral-history tradition that values intergenerational storytelling. Living in Tomball, Texas, she maintains close ties with the local tribal council and frequently engages
    in cultural events that celebrate her heritage.
