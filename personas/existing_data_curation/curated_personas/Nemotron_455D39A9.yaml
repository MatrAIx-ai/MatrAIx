  career_goals: John aspires to become a robotics engineer or software developer who creates practical, real‑world solutions. He dreams of designing autonomous machines that can assist in everyday tasks
    and hopes to compete in national robotics competitions, eventually earning a scholarship in engineering. He also imagines combining his love for technology with his competitive nature by leading a future
    tech startup. While his primary focus is on engineering, he keeps an open door to pursuing a sports scholarship in soccer if he can balance both passions.
