personas:
  professional: John Davis is an aspiring roboticist who merges meticulous LEGO Mindstorms programming with a strategic mindset sharpened by chess, turning every school science fair project into a well-planned,
    competitive showcase they execute with methodical precision.
  sports: John Davis is a committed U13 soccer player for the Hillsborough Hawks, drills twice a week while cheering for the New York Red Bulls during the MLS season, and they apply the same competitive
    edge honed on the chessboard to relentless sprint drills and strategic positioning on the field.
  arts: John Davis immerses themselves in classic sci-fi novels by Isaac Asimov and the cinematic scores of Hans Zimmer, follows LEGO designer Nathan Sawaya's artistic builds, and they draw inspiration
    from these creators to craft original robotic projects that blend storytelling with engineering.
  travel: John Davis prefers structured day-trips that mix education and adventure—reliving Revolutionary history at Philadelphia's Independence Hall, exploring the Natural History Museum in New York, and
    they dream of a future road-trip to the Kennedy Space Center to stand beneath towering rockets.
  culinary: John Davis enjoys assembling their own pepperoni-mushroom pizza with a drizzle of olive oil, occasionally treats themselves to a quick microwave mac-and-cheese during late-night LEGO sessions,
    and they experiment with making simple chocolate-covered pretzel bites, showcasing a blend of culinary curiosity and convenient habits.
  core: John Davis is a methodical, curiosity-driven 12-year-old who balances a fierce competitive streak with meticulous planning, they often sacrifice sleep for LEGO projects and occasionally let their
    skepticism interfere with group harmony.
background:
  cultural: John was raised in the suburban community of Hillsborough, New Jersey, within a middle‑class American household that values education, self‑reliance, and community involvement. His family’s
    heritage includes English and Irish ancestry, and they observe mainstream American traditions such as Thanksgiving, Christmas, and the Fourth of July. Growing up in a relatively diverse county, John
    has been exposed to various cultural perspectives at school and through local community programs, though his home life reflects the typical values of suburban white American culture—emphasis on punctuality,
    personal achievement, and a balanced mix of individual pursuits and community activities.
