  hobbies: '[''LEGO Building'', ''LEGO Mindstorms Robotics'', ''Chess'', ''Strategy Video Games (e.g., Minecraft, Factorio)'', ''Science‑Fiction Reading'', ''Soccer'', ''Science Fair Projects'', ''Math
