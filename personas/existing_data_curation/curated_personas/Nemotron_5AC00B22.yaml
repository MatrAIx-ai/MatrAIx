personas:
  professional: Serita Battle is a data-savvy management analyst who turns complex Excel, Power BI, and Tableau dashboards into actionable community-focused reports, and they leverage their organized, methodical
    nature to bridge municipal leadership with grassroots art groups while channeling curiosity into pioneering data-driven revitalization strategies for Gary's distressed neighborhoods.
  sports: Serita Battle enjoys weekend soccer matches with the community club Gary Twisters, joins high-energy African-inspired dance classes at the local center, and they root for the Chicago White Sox
    while occasionally watching the Chicago Bulls, blending competitive spirit with a collaborative, team-first mindset.
  arts: Serita Battle frequents the West Side Art Center to view works by contemporary painter Kerry James Marshall, attends live performances by the Soulful Jazz Ensemble featuring renditions of Nina Simone
    classics, and they participate in community theater workshops where they experiment with improvisational storytelling, letting their love for blues and soul culture shape both creative output and advocacy
    for neighborhood art fairs.
  travel: Serita Battle loves planning immersive trips that blend music and history, having explored the vibrant jazz scene in New Orleans, the historic blues clubs of Memphis, and the museum district of
    Chicago, and they dream of a future cultural pilgrimage to Paris's Musée d'Orsay and a heritage tour of Ghana's coastal villages, always balancing travel costs with their community budget.
  culinary: Serita Battle whips up soul-food staples like collard greens seasoned with smoked turkey, sweet-potato pie, and crispy fried chicken served with hot honey, while incorporating fresh kale, heirloom
    tomatoes, and okra from a backyard garden into farm-to-table dishes like grilled corn succotash, and they proudly experiment with spice blends inspired by Caribbean and Southern traditions.
  core: Serita Battle blends analytical rigor with soulful community activism, turning data into canvases, dancing through soccer drills, cooking garden-fresh meals, and they compulsively collect vintage
    vinyl on weekend evenings.
background:
  cultural: Serita is an African‑American woman raised in Gary, Indiana, whose family roots trace back to the Great Migration from the rural South. She grew up in a close‑knit church community that emphasized
    mutual support, resilience, and cultural pride. The city’s rich blues, jazz, and soul heritage, coupled with the strong sense of solidarity among the black community facing industrial decline, have
    shaped her worldview. These cultural influences inform her appreciation for the arts, her commitment to community empowerment, and her desire to blend data‑driven solutions with creative expression
    to uplift her neighborhood.
