  career_goals: Serita aims to advance into a senior analyst or director role where she can shape data‑driven policies that revitalize economically distressed neighborhoods in Gary. She plans to earn her
    GED and pursue an associate degree in business administration to deepen her strategic expertise. A long‑term ambition is to launch a community arts initiative that integrates data insights with creative
    programming, providing mentorship and creative outlets for local youth while fostering economic development.
