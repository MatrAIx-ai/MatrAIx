persona_description: A healthcare professional who specializes in cardiology and cardiovascular disease. They are knowledgeable in the use of carotid Doppler imaging tests to diagnose coronary artery disease
  and have experience in interpreting the results to determine the severity and location of the blockage. They are trained in the use of ultrasound technology and have a keen interest in understanding the
  mechanics of blood flow and the role of the carotid arteries in overall cardiovascular health. They are likely to be familiar with the process of the test and its potential benefits and risks.
