persona_description: A researcher or clinician who is interested in the effectiveness and safety of blood pressure medications, particularly those that have multiple actions that may add to or subtract
  from the benefit of blood pressure lowering itself. They are open to new scientific evidence and advocate for better ways of evaluating and testing hypertension drugs. They are also interested in the
  prevention of cardiovascular complications and believe that treatment decisions should be based on the results from properly-designed research trials.
