personas:
  professional: Ruby Carter, a retired community organizer and avid genealogist, channels her lifelong project‑management expertise, piano skills, and meticulous research into directing the senior center's
    art‑and‑craft circle and volunteering as a museum docent, reflecting her competitive drive to see her curated history recognized.
  sports: Ruby Carter enjoys low‑impact senior yoga classes, morning bayou walks in spring, enthusiastically roots for the New Orleans Saints and LSU Tigers during football and basketball seasons, and occasionally
    joins the Cajun Classics senior softball league for light competition.
  arts: Ruby Carter spends afternoons painting watercolor bayou scenes inspired by Claude Monet and local zydeco rhythms, crafts intricate quilts echoing Henri Matisse’s geometric patterns, and sings in
    the church choir while listening to John Coltrane, Clifton Chenier, and Ella Fitzgerald, letting these artistic influences shape her identity.
  travel: Ruby Carter prefers leisurely road trips to historic Southern towns such as Natchez, Mississippi and Savannah, Georgia, has visited the French Quarter of New Orleans, hopes to explore Acadia National
    Park’s shoreline, and designs slow‑paced itineraries that allow time for genealogy research at local archives.
  culinary: Ruby Carter, an accomplished Creole cook, masterfully prepares gumbo, jambalaya, shrimp étouffée, and sweet corn pudding, seasoning with file powder, smoked sausage, and fresh herbs from her
    garden, enjoys the occasional bake of pecan pie, and sometimes over‑salts her dishes before tasting.
  core: Ruby Carter blends a competitive spirit, artistic imagination, and deep community pride into a life of quilt‑making, watercolor painting, and genealogy, while occasionally indulging in extra slices
    of pecan pie and a dash of healthy skepticism.
background:
  cultural: Ruby is an African‑American woman raised in Crowley, Louisiana, a community where Creole, Cajun, and Southern traditions intersect. Her upbringing was steeped in the church, gospel music, and
    communal gatherings that emphasized mutual support and cultural pride. She grew up during the civil‑rights era, witnessing both the challenges and the resilience of her neighborhood, which shaped her
    skeptical yet competitive spirit. Family recipes, storytelling, and the oral transmission of history have been central to her identity, linking her to the broader narrative of black Louisianans. Ruby’s
    cultural heritage is reflected in her love of Creole cooking, participation in church choirs, appreciation for jazz and zydeco rhythms, and dedication to preserving local African‑American history through
    genealogy and oral‑history projects.
