  hobbies: '[''Watercolor painting'', ''Reading science‑fiction and poetry'', ''Book club participation'', ''Gardening (tomatoes, okra, herbs)'', ''Cooking Creole dishes'', ''Church choir singing'', ''Community
    dance socials (swing, zydeco)'', ''Crossword puzzles'', ''Mahjong and board games'', ''Genealogy research'']'
  career_goals: Although Ruby is retired, she remains driven by a desire to leave a lasting cultural legacy. She aims to compile a memoir and a curated family genealogy that will be donated to the Acadia
    Parish Historical Society. She also wants to launch a weekly art‑and‑craft circle at the local senior center, mentoring younger participants and entering her quilts in regional competitions. Ruby aspires
    to digitize her extensive collection of family photographs and oral histories, making them accessible online for future generations. Additionally, she hopes to volunteer as a docent for the local museum’s
    African‑American heritage exhibit, sharing her knowledge of the community’s history.
