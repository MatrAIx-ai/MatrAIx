personas:
  professional: Catherine Bleakley is a diligent library clerk at a Los Angeles public branch who leverages her strong cataloging skills in MARC, her knack for digital resource navigation, and her calming,
    organized demeanor to streamline circulation, train volunteers, and create inclusive programming for English‑ and Spanish‑speaking patrons.
  sports: Catherine Bleakley enjoys low‑key fitness through a weekend adult softball league and weekly yoga classes, roots for the Los Angeles Dodgers and LA Galaxy, and volunteers as a scorekeeper for
    a local community basketball tournament, balancing competitive spirit with a preference for small‑group activity.
  arts: Catherine Bleakley immerses themselves in Los Angeles cultural life by strolling through Getty Center exhibitions featuring artists like Kehinde Wiley, attending chamber music concerts of the LA
    Philharmonic, snapping street photography of historic neighborhoods, and joining a small book club that dissects contemporary fiction and local history.
  travel: Catherine Bleakley favors purposeful travel, planning weekend trips to nearby Santa Barbara vineyards, a solo road‑trip through the Joshua Tree desert for photography, and a future culinary pilgrimage
    to Seville to study Mediterranean cooking, always researching destinations through library archives and budgeting meticulously to keep trips affordable.
  culinary: Catherine Bleakley experiments in their kitchen with Mexican dishes such as chilaquiles and pozole and Mediterranean recipes like za'atar‑spiced roasted lamb, often harvesting cilantro, oregano,
    and heirloom tomatoes from their modest garden, and they delight in crafting homemade salsa and fermented hot sauce while occasionally forgetting to set timers for stews.
  core: Catherine Bleakley blends a curiosity‑driven love of history with a disciplined, detail‑oriented lifestyle, channeling both into meticulous library work, careful budgeting, and quiet hobbies that
    balance methodical order with moments of spontaneous indulgence.
background:
  cultural: Catherine was born and raised in Huntington Park, California, a city known for its vibrant Latino community. Her family heritage traces back to Irish and German ancestors, and she grew up in
    a household that celebrated traditional American holidays while also embracing the multicultural flavors of the neighborhood. Regular exposure to Mexican cultural festivals, community parades, and Spanish
    greetings from neighbors fostered an early appreciation for cultural diversity. Although she identifies primarily with her European roots, Catherine’s daily interactions with a multilingual population
    have shaped an inclusive worldview and a strong commitment to serving patrons from diverse backgrounds.
attributes:
  skills: '["Cataloging and classification (MARC)", "Reference and research assistance", "Circulation desk operations", "Interlibrary loan processing", "Library management software (SirsiDynix, Koha)",
    "Digital resource navigation", "Data entry and record keeping", "Document digitization and scanning", "Basic IT troubleshooting", "Event planning and coordination for small programs", "Patron customer
    service", "Basic Spanish communication", "Inventory management", "Budget tracking for library supplies", "Volunteer training and supervision"]'
  hobbies: '["Reading historical non-fiction and contemporary fiction", "Visiting the Huntington Library and researching local history", "Gardening (vegetable and flower beds)", "Knitting scarves and blankets",
    "Solving crosswords and jigsaw puzzles", "Participating in a small book club", "Cooking Mexican and Mediterranean cuisine", "Genealogy research", "Street and nature photography"]'
  career_goals: Catherine aims to advance beyond her current clerical role by earning an associate degree in Library Science and eventually pursuing a Master of Library and Information Science. Her long‑term
    ambition is to become a collection development specialist or a branch supervisor, where she can lead digitization projects that preserve local history and expand digital access for the community. She
    also hopes to design and run regular literacy workshops and small‑group programs that cater to both English‑and Spanish‑speaking patrons, leveraging her organizational strengths to create sustainable
    outreach initiatives. In the next five years, she envisions herself mentoring new staff, championing inclusive services, and contributing to the strategic planning of her library system.
