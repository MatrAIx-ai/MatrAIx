  career_goals: Maria aims to earn her GED within the next year and obtain an entry‑level IT certification (CompTIA A+). Her long‑term ambition is to launch a home‑based tech repair service that allows
    her to work independently and build a reputation based on competence. She also hopes to expand into creating and selling handmade tech‑themed accessories on an e‑commerce platform, turning her craft
    skills into a scalable side business. Her competitive drive pushes her to seek recognition through local maker fairs and online reviews, while her preference for solitude guides her toward freelance
    and remote work.
