personas:
  professional: A budding home‑based tech repair entrepreneur, Maria Barrett channels their curiosity and practical mindset into troubleshooting hardware, scripting Python utilities, and designing tech‑themed
    accessories, while their relaxed approach to deadlines lets them dive deep into projects that truly capture their interest.
  sports: An energetic cyclist and nature walker, Maria Barrett spends weekends pedaling the Arlington trails with the Arlington Bike Club, supports the Washington Capitals in the NHL, and occasionally
    jogs to stay fit, preferring solo workouts that let them reflect while staying active.
  arts: A digital illustration hobbyist, Maria Barrett draws inspiration from sci‑fi visionaries like Syd Mead and H.R. Giger, soundtracks by Koji Kondo, and synthwave duo Gunship, often creating fan art
    of classic video game characters while experimenting with Adobe Illustrator and Blender.
  travel: A thoughtful explorer, Maria Barrett prefers meticulously planned solo trips that blend adventure with nostalgia, having biked through Shenandoah National Park last summer and dreaming of a future
    pilgrimage to Akihabara in Tokyo to hunt for rare vintage gaming hardware.
  culinary: A modest home chef, Maria Barrett often whips up quick ramen bowls seasoned with miso and a soft‑boiled egg, rolls spicy tuna sushi with pickled ginger, and bakes chocolate cupcakes adorned
    with fondant circuit‑board designs, savoring the blend of precise craftsmanship and flavor.
  core: Maria Barrett is a solitary tech‑savvy teen who trades late‑night gaming marathons for meticulous console restorations, thrives on puzzle challenges, but habitually lets school assignments slip
    in favor of spontaneous hardware projects.
background:
  cultural: Maria grew up in a middle‑class, white family in the suburban community of Arlington, Texas. Her household emphasized self‑reliance, hard work, and a practical outlook, values that echo the
    broader Texan ethos of independence. While she occasionally attended community church events, she prefers solitude and finds comfort in the quiet of her own space. Local influences include exposure
    to Texas’s blend of Southern hospitality, country music, and barbecue culture, though Maria’s personal interests lean toward technology and solitary creative pursuits. Her upbringing has instilled a
    respect for both tradition and innovation, shaping her balanced curiosity and practicality.
