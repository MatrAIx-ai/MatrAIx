persona_description: A financial economist who specializes in predicting and analyzing the economic impacts of global events, particularly pandemics. They are well-versed in the Organisation for Economic
  Cooperation and Development (OECD) reports and have a deep understanding of the economic downturn caused by the Covid-19 pandemic. They are also knowledgeable about the potential long-term impacts of
  the pandemic on global economies, including the expected recession and slow economic recovery. They are likely to be interested in the economic policies and strategies that could help mitigate the effects
  of the pandemic and support economic recovery.
