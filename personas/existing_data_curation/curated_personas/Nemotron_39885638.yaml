personas:
  professional: Tahina Romero, a retired community program director turned heritage initiative founder, leverages twelve years of grant writing, budget oversight, and bilingual communication to meticulously
    launch a multicultural heritage program that blends organized logistics with a curiosity for new cultural projects, while they ensure every event meets high standards through their competitive streak.
  sports: Tahina Romero, an enthusiastic salsa dancer and member of the local senior walking club, follows the Atlanta Braves and the Morgan County Tigers high school baseball team, and treats fitness as
    a social ritual, yet they still compete for the top spot in the annual senior trivia’s physical challenges, blending community engagement with personal competitiveness.
  arts: Tahina Romero, a passionate admirer of vibrant music and visual arts, frequently attends salsa nights featuring live mariachi ensembles, collects Frida Kahlo prints, enjoys listening to Carlos Santana’s
    guitar, and watches classic films like Like Water for Chocolate, allowing these artistic experiences to shape their photography projects and storytelling.
  travel: Tahina Romero, a seasoned traveler who prefers well‑planned itineraries that blend cultural immersion and relaxation, has explored Oaxaca’s historic markets, visited Puebla during Día de los Muertos,
    taken a road trip along Georgia’s coastal islands, and dreams of a pilgrimage to the historic mission villages of the American Southwest, all while they budget carefully to fund their community projects.
  culinary: Tahina Romero, an accomplished home chef, excels at preparing mole poblano, hand‑made tamales, and chiles en nogada using heirloom poblano peppers, epazote, and masa from her organic garden,
    and delights in hosting potluck gatherings where they pair these dishes with a crisp mezcal‑infused agua fresca, yet they occasionally over‑salt their mole in pursuit of the perfect depth of flavor.
  core: Tahina Romero is a disciplined, bilingual community stalwart whose curiosity drives them to preserve traditions through cooking, gardening, and photography, while their competitive spirit fuels
    a relentless quest for flawless events and senior trivia triumphs, even if it sometimes makes them a tough critic of themselves and others.
background:
  cultural: Tahina is a first‑generation Mexican‑American whose family migrated from Jalisco in the 1960s. She grew up biculturally, speaking Spanish at home while attending school in the American South.
    Her cultural identity blends vibrant Mexican traditions—such as Día de los Muertos, mariachi music, and family‑centered cooking—with the hospitality and community spirit of rural Georgia. She remains
    active in the local Catholic parish, celebrates Mexican holidays with a Southern twist, and uses her bilingual abilities to bridge cultural gaps in her community.
attributes:
  skills: '[''Community event planning'', ''Budget management and grant writing'', ''Bilingual Spanish-English communication'', ''Traditional Mexican cooking'', ''Organic gardening'', ''Volunteer mentorship'',
