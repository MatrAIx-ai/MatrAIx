  hobbies: '[''Cooking traditional Mexican dishes'', ''Organic gardening'', ''Salsa dancing'', ''Bridge and card games'', ''Genealogy research'', ''Puzzle solving (crosswords, Sudoku)'', ''Reading historical
    fiction'', ''Volunteering at senior center'', ''Digital photography'', ''Learning senior-friendly technology'']'
  career_goals: Although retired from formal employment, Tahina is driven to leave a lasting imprint on her community. She aims to launch and direct a multicultural heritage program at the Morgan County
    community center that showcases Mexican traditions while fostering cross‑generational exchange. She also plans to compile a family cookbook that preserves authentic recipes and stories, and to mentor
    a new generation of volunteers to uphold the same disciplined standards she values. On a personal level, she aspires to win the annual senior trivia competition, have her vegetable garden featured in
    the county fair’s 'Best Organic Garden' award, and complete a senior‑focused digital photography course to document local histories.
