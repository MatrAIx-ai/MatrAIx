  hobbies: '[''Hiking in the Cascades'', ''Landscape photography'', ''Watercolor painting'', ''DIY frame and ceramics crafting'', ''Attending gallery openings'', ''Playing acoustic guitar'', ''Reading contemporary
    fiction and science non‑fiction'', ''Cooking seasonal meals'', ''Participating in trivia nights'', ''Journaling and reflective reading'']'
  career_goals: Laura aims to transition from a dispensing role to owning an independent boutique optical studio that merges cutting‑edge vision solutions with curated art experiences. She plans to earn
    advanced certifications such as the Certified Contact Lens Practitioner (CCT®) and complete specialized workshops on progressive lens design and emerging coating technologies. By collaborating with
    local artisans, she hopes to create limited‑edition frames that reflect the Pacific Northwest’s natural beauty. Long‑term, she envisions mentoring junior opticians, developing community education programs
    on eye health, and teaching part‑time at a community college, while maintaining a balanced lifestyle that supports her continued curiosity and personal growth.
