  career_goals: Steve aims to transition from his current hiatus into a sustainable freelance career that merges his artistic talents with his business acumen. He plans to expand his portfolio, acquire
    a UX/UI certification, and eventually launch a small creative studio with his spouse, offering branding, website design, and custom artwork to local businesses and online clients. While he is competitive
    and driven to outshine peers in the gig market, he also seeks financial stability to alleviate his chronic worry and to support his family. Long‑term, he envisions teaching community art workshops,
    fostering creative thinking in the Broome County area, and possibly pursuing a bachelor's degree in Visual Communications to deepen his expertise.
