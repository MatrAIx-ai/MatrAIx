persona_description: 'A landscape architect who is interested in urban planning and design, particularly in the context of climate change and sea level rise. They are passionate about identifying creative
  solutions for adapting to urban sea level rise and fostering dialogue between public, private, and community stakeholders in the landscape and urban design sector. They are also interested in increasing
  public awareness of the vulnerability of NSW coastlines and foreshores to the impacts of changing climate. They are open to any or all of the following topics: human settlement, infrastructure, transport
  systems, shoreline buildings, open space systems, ecological systems, and coastal settlements and infrastructure. They are interested in developing effective adaptation responses to reduce the impacts
  of climate change and deliver co-benefits such as increased energy or water efficiency.'
