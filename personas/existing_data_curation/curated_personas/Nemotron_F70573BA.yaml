  hobbies: '[''Visiting art galleries and museums'', ''Reading African-American literature, history, and philosophy'', ''Watercolor painting'', ''Gardening (vegetables and native plants)'', ''Listening
    to jazz, blues, and gospel music'', ''Storytelling and oral history sharing'', ''Genealogy research'', ''Birdwatching'', ''Playing chess at the senior center'']'
  career_goals: Even at 86, Yonas is driven to leave a lasting legacy. He aims to document oral histories of his generation and compile them into a community memoir, establish a modest scholarship fund
    for local high‑school graduates pursuing higher education, and launch a small arts program at the senior center that pairs elders with youth for collaborative projects. He also hopes to mentor younger
    volunteers, ensuring the continuity of the cultural and civic values he cherishes.
