personas:
  professional: Yonas Ferguson, an 86‑year‑old community coordinator, channels a lifelong curiosity and disciplined organization into planning intergenerational storytelling events, documenting oral histories,
    and mentoring youth volunteers at the senior center’s new arts partnership program, where they serve as both guide and archivist.
  sports: Yonas Ferguson stays active through leisurely bird‑watching walks around the lake, participates in senior‑center chess tournaments, and avidly follows the Miami Heat, the Tampa Bay Buccaneers,
    and the Florida Gators, treating sports as a low‑intensity social ritual rather than a competitive pursuit.
  arts: Yonas Ferguson immerses themselves in the arts by painting watercolors of Florida’s wetlands, attending gallery openings showcasing artists like Annette Kienholz, and listening to jazz legends such
    as Miles Davis, blues icon B.B. King, and gospel great Mahalia Jackson, which together nurture a reflective and expressive personal aesthetic.
  travel: Yonas Ferguson prefers relaxed, meticulously planned road trips to historically rich Southern towns such as Savannah, Charleston, and New Orleans, often timing visits around museum exhibitions
    and local music festivals while accommodating frequent rest stops due to limited stamina.
  culinary: Yonas Ferguson delights in cooking garden‑fresh meals—seasonal tomatoes, sweet potatoes, and collard greens—often preparing a humble jambalaya seasoned with smoked paprika and a splash of hot
    sauce, while their modest culinary skill shines in simple, hearty dishes that echo their love of comfort and tradition.
  core: Yonas Ferguson is a curious, highly organized elder who balances artistic passion, community mentorship, and a garden‑centric lifestyle, intertwining social involvement with quiet reflection and
    occasional forgetfulness.
background:
  cultural: Born in 1939 in a small Black community near Jacksonville, Florida, Yonas grew up during the era of segregation. His parents, who worked as sharecroppers, taught him the values of hard work,
    storytelling, and collective responsibility. He attended a historically Black school, later enrolling at a community college in Gainesville, where he studied business fundamentals and African‑American
    studies. In the 1960s, he participated in local civil‑rights actions, marching for voting rights and desegregation. A lifelong member of St. John Baptist Church in Lake County, he has been deeply involved
    in the church’s choir, fellowship events, and community outreach. His cultural identity is shaped by Southern Black traditions—gospel music, soul food, church fellowship, and a strong emphasis on intergenerational
    mentorship. Living now in Grand Island, he continues to celebrate his heritage through participation in Black History Month events, local cultural festivals, and by passing on oral histories to younger
    residents.
attributes:
  skills: '[''Community outreach and volunteer coordination'', ''Budgeting and financial stewardship'', ''Event planning and organization'', ''Art appreciation and cultural commentary'', ''Genealogical
