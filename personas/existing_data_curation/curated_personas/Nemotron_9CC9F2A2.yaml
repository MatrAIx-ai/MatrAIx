personas:
  professional: Josh Keeter is a budding automotive/farm‑equipment technician who leverages their knack for organized DIY repairs, leads school clubs and community clean‑up projects, and balances GED preparation
    with a budding passion for coaching youth sports, showing they thrive on structure and teamwork.
  sports: Josh Keeter is a versatile pick‑up basketball and flag‑football player who roots for the Iowa State Cyclones and the Des Moines Men’s Soccer Club, and volunteers as an assistant coach for the
    local U‑12 youth league, showing they value teamwork both on and off the field.
  arts: Josh Keeter’s soundtrack blends classic rock icons like AC/DC and Led Zeppelin with country legends such as Johnny Cash and Carrie Underwood, and they frequently attend community theater productions
    and binge‑watch sports‑themed movies on weekends, reflecting their love for both energetic and storytelling arts.
  travel: Josh Keeter prefers weekend road trips to nearby natural gems like Lake Rathbun and the Maquoketa Caves while dreaming of a future cross‑country drive to Yellowstone National Park, balancing adventure
    with the budget constraints of a high‑school student, and they often plan trips using free online maps and group chat coordination.
  culinary: Josh Keeter loves grilling fresh‑caught catfish with lemon‑pepper seasoning, crafting smoky BBQ pulled‑pork sandwiches with coleslaw, and simmering a hearty chipotle‑spiced chili with ground
    beef and kidney beans after a long day of fixing bikes, and they enjoy sharing these meals with family and friends during weekend gatherings.
  core: Josh Keeter blends hands‑on tinkering, team‑spirit, and community‑first values into a pragmatic yet sociable teen outlook, punctuated by a love for classic rock, a penchant for budgeting, and occasional
    knee‑wobbling after basketball, showing they balance structure with spontaneity.
background:
  cultural: 'Josh comes from a white, Midwestern family rooted in the small town of Centerville, Iowa. His cultural upbringing is shaped by the values of the rural Midwest: a strong work ethic, self‑reliance,
    modesty, and a deep sense of community. His family has generations of farming and small‑business experience, and they have been active members of a local Protestant church that emphasizes service, fellowship,
    and family. These cultural influences foster his practical outlook, cooperative demeanor, and desire to contribute positively to his neighborhood. He also enjoys traditional regional pastimes such as
    high school sports, community fairs, and outdoor activities like fishing and hunting.'
