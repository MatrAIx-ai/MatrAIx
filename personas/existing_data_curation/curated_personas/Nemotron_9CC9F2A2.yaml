  career_goals: Josh aims to pursue a career that offers clear structure, hands‑on work, and the chance to serve his community. In the near term, he plans to earn his GED and enroll in a vocational program
    to become an automotive or farm‑equipment technician. He hopes to gain certification and eventually open a small repair shop that serves the rural area of Appanoose County. Additionally, he is interested
    in coaching youth sports or mentoring peers, combining his practical skills with his desire to help others. Long‑term, he envisions a stable, respectable profession that allows him to maintain a balanced
    life and give back to his hometown.
