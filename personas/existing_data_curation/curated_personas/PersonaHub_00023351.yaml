persona_description: A healthcare professional who is trained in the treatment and prevention of rabies, particularly in developing countries where the virus is prevalent. They are aware of the high death
  rate and the importance of immediate medical attention in such situations. They have experience administering post-exposure prophylaxis and are knowledgeable about the various vaccines available for prevention.
  They are aware of the strict quarantine laws and travel schemes in the UK, and the rarity of rabies cases in developed countries. They are also aware of the limited access to medical care in parts of
  the world where the virus is prevalent, and the importance of routine vaccination.
