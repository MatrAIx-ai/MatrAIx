    apps"]'
  career_goals: Javier often talks about becoming a robotics engineer or inventor who can design a helpful robot for his family, reflecting his blend of curiosity about how things work and a practical desire
    to solve real‑life problems. He also imagines exploring the desert as a wildlife biologist, wanting to study insects and plants up close, which aligns with his love for solitary observation and his
    competitive drive to discover something no one else has noticed.
