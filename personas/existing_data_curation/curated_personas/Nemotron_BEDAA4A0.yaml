  hobbies: '[''Mixed-Media Painting'', ''Visiting Art Galleries and Museums'', ''Latin Dance (Merengue and Salsa)'', ''Cooking Dominican Cuisine'', ''Volunteering at Community Health Fairs'', ''Tutoring
    Adult Learners'', ''Exploring Salem’s Historic Sites'', ''Photography'', ''Reading Contemporary Fiction'', ''Maintaining a Pharmacy & Art Blog'', ''Attending Live Music Performances'']'
  career_goals: She aspires to advance to a pharmacy supervisor or manager role while integrating her passion for education by leading a pharmacy technician training program. Lizeth plans to pursue a master's
    degree in health education or public health, focusing on bilingual community outreach. She envisions creating a community health initiative in Salem that blends art and health literacy for the Dominican
    diaspora and broader community, and hopes to present at regional conferences on innovative patient education methods.
