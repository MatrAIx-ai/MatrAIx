personas:
  professional: Lizeth Tran is a seasoned pharmacy technician in Salem who leverages meticulous inventory control and bilingual patient counseling to spearhead culturally attuned health education, while
    their sociable, talkative nature makes them a natural trainer and team leader.
  sports: Lizeth Tran jogs the historic streets of Salem with the local Salem Run Club each spring, dances energetic salsa and merengue at a downtown studio as a cardio workout, and roots for the Boston
    Red Sox while attending occasional New England Patriots games with friends.
  arts: Lizeth Tran immerses themselves in Salem's art scene by creating mixed-media paintings inspired by the bold palettes of Frida Kahlo and the dynamic compositions of Kehinde Wiley, attending gallery
    openings featuring works by local artist Maya Rivera, and moving to the rhythms of Marc Anthony, Celia Cruz, and Shakira during Latin dance nights.
  travel: Lizeth Tran balances careful budgeting with spontaneous adventure, spending free weekends exploring historic towns like Newport and Portland, while planning longer vacations to vibrant cultural
    hubs such be Barcelona, Lisbon, and the Caribbean island of Puerto Rico for its lively festivals.
  culinary: Lizeth Tran enjoys cooking hearty plantain-based dishes such as sancocho, mangú topped with sautéed onions, and arroz con pollo, skillfully seasoning with sofrito, garlic, and cilantro, and
    frequently hosts potluck nights where friends sample their fusion of traditional flavors and modern plating, while also savoring farm-to-table seafood at Salem's seasonal pop-up restaurants.
  core: Lizeth Tran fuses pharmacy precision with artistic flair, turning patient counseling into color-coded storyboards, while secretly hoarding glitter pens for spontaneous note-taking.
background:
  cultural: A first‑generation Dominican‑American, Lizeth grew up immersed in the rhythms of merengue, the flavors of Dominican cuisine, and the Spanish language. Family gatherings centered around music,
    storytelling, and shared meals, fostering a deep sense of community and cultural pride. In Salem, she bridges her Caribbean roots with New England’s historic charm, participating in local Dominican
    cultural festivals and contributing to bilingual health outreach initiatives. Her cultural identity informs her compassionate approach to patient care and her appreciation for vibrant artistic expression.
