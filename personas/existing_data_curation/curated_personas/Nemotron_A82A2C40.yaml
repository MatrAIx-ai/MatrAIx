personas:
  professional: Dina Jennette, a 27‑year‑old facilities specialist, leverages their methodical, organized nature and meticulous floor‑care expertise—including stripping, waxing, and equipment operation—to
    keep commercial spaces spotless while coordinating schedules and inventory with reliable, team‑oriented precision.
  sports: Dina Jennette enjoys early‑morning jogs along the Bayou, participates in the community “Lafourche Bayou Bunch” adult softball league each spring, follows the New Orleans Saints and Pelicans with
    avid devotion, and balances structured cardio with occasional yoga sessions to counteract the physical demands of their cleaning work.
  arts: Dina Jennette draws creative energy from the folk fiddle melodies of Natalie Macmaster, the suspenseful plots of Agatha Christie, and the timeless films of Audrey Hepburn, weaving these influences
    into their knitting designs and lively discussions at the mystery‑novel book club.
  travel: Dina Jennette prefers meticulously planned short getaways, having road‑tripped along the Gulf Coast to Gulf Shores and explored the historic French Quarter in New Orleans, and they daydream about
    a cultural immersion in Kyoto’s textile districts and a relaxing surf retreat on Saint Martin’s island.
  culinary: Dina Jennette, an adept home cook, meticulously crafts Cajun classics such as gumbo with a dark roux, andouille sausage, shrimp, okra, and a pinch of filé powder, and they balance the bold flavors
    with occasional buttery croissants from a local bakery, treating each meal as a structured experiment in taste and timing.
  core: Dina Jennette blends disciplined organization with creative flair, color‑coding every cleaning schedule and knitting pattern, yet they habitually procrastinate on updating inventory spreadsheets
    until the last minute.
background:
  cultural: Raised in Gray, a small town in Lafourche Parish, Dina grew up immersed in the Gulf Coast’s blend of Southern hospitality and French‑Cajun heritage. Her family’s ancestry is primarily Anglo‑American
    with deep roots in the region’s historic French settlements. Community life revolves around church gatherings, local festivals, and shared meals featuring gumbo, crawfish, and other regional specialties.
    This environment fostered a strong sense of mutual support, a practical work ethic, and an appreciation for the simple, predictable rhythms of daily life.
attributes:
  skills: '[''Commercial cleaning'', ''Floor care (stripping, waxing, buffing)'', ''Restroom sanitation'', ''Industrial equipment operation'', ''Chemical safety and handling'', ''Inventory management'',
    ''Time management'', ''Team coordination'', ''Customer service'', ''Basic facilities maintenance'', ''OSHA compliance'', ''Record keeping'']'
  hobbies: '[''Knitting'', ''Gardening'', ''Cooking (Cajun dishes)'', ''Puzzle solving'', ''Book club (mystery novels)'', ''Community clean‑up volunteering'']'
  career_goals: Her immediate goal is to attain certified training in IICRC carpet cleaning and OSHA safety within the next year, positioning herself for a supervisory role on the janitorial team at her
    current employer. Long‑term, Dina aspires to become a facilities manager for a small school or community center in Lafourche Parish, and eventually launch her own residential and commercial cleaning
    business that emphasizes reliability, environmental safety, and fair employment practices. She plans to supplement her practical experience with a part‑time associate degree in facilities management
    or business administration.
