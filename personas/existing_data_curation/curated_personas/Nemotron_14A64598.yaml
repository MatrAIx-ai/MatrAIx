  career_goals: Shirley aims to advance to a senior veterinary technologist role where she can lead a multidisciplinary team and influence clinic protocols. She is pursuing a master's degree in veterinary
    science with a focus on exotic animal care and integrative therapies. In the long term, she envisions establishing a community outreach program that blends animal health education with artistic workshops,
    and she aspires to publish research on innovative diagnostic techniques. Her competitive drive pushes her to become a recognized speaker at veterinary technology conferences, while her desire for flexibility
    leads her to explore telehealth consulting opportunities for remote animal care.
