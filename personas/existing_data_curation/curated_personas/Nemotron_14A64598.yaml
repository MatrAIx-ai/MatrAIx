personas:
  professional: Shirley Hampton, a Seattle veterinary technician, blends expert anesthesia administration, diagnostic imaging, and animal behavior assessment with a flair for detailed animal illustrations,
    driving senior-level protocol redesigns while channeling their competitive, curious nature into leading multidisciplinary team workshops.
  sports: Shirley Hampton energizes their weekends with hikes in the Cascades, sunrise kayak sessions on Lake Washington, and competitive matches for the Seattle Volleyball Club, all while cheering on the
    Seattle Seahawks, Sounders FC, and Kraken, treating each training session as a friendly challenge to out-perform teammates.
  arts: Shirley Hampton channels their love of speculative fiction by devouring novels from Neal Stephenson and Ann Leckie, draws animal portraits in the style of Charlee Harper during park visits, immerses
    in Seattle’s gallery scene featuring Yayoi Kusama installations, and fuels weekend evenings with Fleet Foxes concerts, using these artistic sparks to craft whimsical clinic educational posters.
  travel: Shirley Hampton favors spontaneous, nature-focused getaways—like weekend kayaking trips to the San Juan Islands and a recent road-trip through Vancouver’s coastal rainforests—while saving for
    a future adventure to Patagonia’s glaciers and Kyoto’s temples, planning each journey loosely to accommodate their master’s schedule and a modest travel budget.
  culinary: Shirley Hampton, a confident home cook, delights in prepping cedar-plank salmon with miso glaze, wild mushroom risotto seasoned with locally foraged chanterelles, and a weekly quinoa-kale bowl
    topped with pickled ginger, while indulging in Seattle’s sushi scene—especially salmon nigiri with a hint of yuzu—and occasionally whipping up pet-safe carrot treats for shelter dogs.
  core: Shirley Hampton is a curious, art-infused veterinary tech who balances competitive volleyball, spontaneous outdoor adventures, and a habit of sketching every animal they encounter, all while navigating
    a flexible, slightly disorganized approach to finances and health.
background:
  cultural: Shirley comes from an Anglo‑German heritage typical of many white families in the Pacific Northwest. Raised in suburban Seattle, she absorbed the region's progressive values, environmental consciousness,
    and strong coffee culture. The city's blend of tech innovation and artistic communities shaped her interdisciplinary interests, while the emphasis on outdoor recreation fostered her love for hiking
    and kayaking. Her divorced status and independent lifestyle reflect the region's support for diverse family structures and personal autonomy. She identifies with Seattle's inclusive, socially active
    ethos, supporting LGBTQ+ rights, sustainability initiatives, and community volunteerism.
