  hobbies: '[''Vegetable gardening'', ''Woodworking'', ''Folk music jam sessions'', ''Senior basketball league'', ''Nature walks'', ''Classic car restoration'', ''Astronomy'', ''Museum volunteering'']'
  career_goals: Although he is not currently employed, Shemuel aims to deepen his involvement in community development by leading a town‑wide sustainability initiative, such as a community garden or renewable‑energy
    outreach program. He aspires to earn a certification in nonprofit leadership, obtain first‑aid and CPR instructor credentials, and eventually serve as a mentor for at‑risk youth, sharing his practical
    skills and disciplined work ethic. He also hopes to publish a guide on DIY home repairs for seniors, blending his curiosity for new techniques with pragmatic solutions.
