personas:
  professional: Jenny Moralita, a budding junior illustrator, blends their love of colored pencils and bird‑ and planet‑themed stickers with a meticulously organized nature journal, channeling curiosity
    into detailed drawings that often feature unconventional dinosaur‑space mashups while occasionally worrying about meeting art‑club deadlines.
  sports: Jenny Moralita plays on the neighborhood youth soccer team, practices gymnastics at the community center, and cheers for the Springfield Cyclones, the local professional baseball team, balancing
    energetic play with occasional fatigue caused by over‑scheduling.
  arts: Jenny Moralita delights in sketching whimsical creatures inspired by Dr. Seuss and the vibrant patterns of Yayoi Kusama, collects bird and planet stickers, and spends weekends watching animated
    documentaries about dinosaurs, allowing their creative imagination to flourish.
  travel: Jenny Moralita dreams of visiting the national dinosaur museum in Denver and the planetarium in San Francisco, enjoys weekend trips to the nearby state park for leaf‑collecting adventures, and
    prefers travel plans laid out in a detailed checklist to avoid the stress of unexpected changes.
  culinary: Jenny Moralita enjoys helping their mother bake vanilla cupcakes topped with rainbow sprinkles and galaxy‑themed icing, loves making spaghetti with meatballs, and occasionally experiments with
    fruit kebabs, showing growing confidence in the kitchen despite occasional sticky‑finger mishaps.
  core: Jenny Moralita is a curiosity‑driven seven‑year‑old whose colored‑pencil masterpieces, meticulous sticker collections, and anxious attention to detail reveal a bright mind tempered by a habit of
    worrying about the small things.
background:
  cultural: Jenny was born and raised in Huntington, a small town in Wabash County, Indiana. Her family’s heritage reflects traditional Midwestern American values, with community traditions such as church
    gatherings, county fair celebrations, and school events that emphasize cooperation, self‑reliance, and modesty. Growing up in a predominantly white, rural setting, she is influenced by the close‑knit
    community, the rhythms of the agricultural calendar, and an appreciation for simple outdoor activities and local crafts. These cultural touchstones shape her love for nature, crafts, and contributing
    to group projects at school.
