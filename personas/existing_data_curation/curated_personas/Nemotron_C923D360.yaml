  career_goals: Jenny dreams of becoming an artist who can illustrate stories, while also imagining a future as an astronaut exploring space or a veterinarian caring for animals. She talks about wanting
    to create a picture book that explains the wonders of the natural world, reflecting her love for art, science, and helping others learn. Even at her age, she shares these aspirations with teachers and
    family, hoping to develop her drawing skills and scientific curiosity further.
