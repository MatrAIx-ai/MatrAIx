personas:
  professional: Jorge Comas, an 82‑year‑old community elder who organizes cultural events at the senior center, blends their encyclopedic knowledge of local history, carpentry, and storytelling with a reliable
    yet adaptable approach, mentoring volunteers and fostering intergenerational collaboration.
  sports: Jorge Comas keeps active with a daily sunrise beach walk, joins the senior canoe club that meets at the eastern bay, and is an avid fan of the Cangrejeros de Santurce baseball squad and the Capitanes
    de Arecibo basketball team, cheering them on during televised games.
  arts: Jorge Comas, an enthusiastic watercolor hobbyist, paints delicate seascapes of pastel‑colored houses while listening to the rhythmic sounds of salsa legend Celia Cruz and the poetic verses of poet
    Mario Benedetti, and frequently visits the local museum to study the works of painter Diego Rivera, letting these artistic encounters shape their leisurely evenings.
  travel: Jorge Comas prefers short, well‑planned road trips to historic coastal towns such as Old San Juan and neighboring islands like Vieques, balancing a love for relaxed beach afternoons with a curiosity
    for exploring colonial forts, while relying on modest travel funds and occasional assistance from family to cover costs.
  culinary: Jorge Comas excels at preparing traditional dishes like arroz con gandules, lechón cooked over a wood fire, and sofrito‑rich stews, seasoning them with fresh cilantro, annatto, and a splash
    of coconut milk, and takes pleasure in serving guests mango‑papaya salsa and sweet plantain fritters during festive family gatherings.
  core: Jorge Comas blends a lifelong love of gardening, cooking, and watercolor painting with a compassionate community spirit, yet often frets over finances and health, balancing daily beach walks with
    occasional forgetfulness about appointments.
background:
  cultural: Jorge is a lifelong resident of Ceiba, a coastal municipality in eastern Puerto Rico. His heritage reflects the island’s rich tapestry of Spanish colonial influence, African ancestry, and Taíno
    indigenous roots. Raised in a close‑knit, Catholic family, he participated in fiestas patronales, the annual Festival del Coco, and community gatherings that emphasize mutual aid, known locally as "compadrazgo."
    He speaks Spanish with the distinctive eastern Puerto Rican dialect and acquired conversational English through school and tourism interactions. Jorge’s cultural identity is deeply tied to the rhythms
    of bomba and plena music, the flavors of island cuisine, and the oral storytelling tradition that preserves communal memory. He values the resilience of his community, shaped by historical migrations
    and economic challenges, and this informs his compassionate, cooperative nature and his dedication to preserving local customs for future generations.
