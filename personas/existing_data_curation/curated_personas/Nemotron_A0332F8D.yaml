  hobbies: '[''Beach walks and shell collecting'', ''Birdwatching'', ''Home gardening (mango, papaya, herbs)'', ''Traditional cooking'', ''Listening to salsa, plena, jíbaro music'', ''Attending local festivals'',
    ''Reading historical novels and poetry'', ''Crossword puzzles'', ''Documentary film viewing'', ''Watercolor painting'', ''Playing dominoes'', ''Volunteering at community library'']'
  career_goals: At 82, Jorge's ambitions focus on legacy and community enrichment rather than professional advancement. He aims to mentor younger residents by sharing his culinary and gardening knowledge,
    and he plans to record oral histories of Ceiba elders to preserve the town’s cultural memory. Jorge hopes to expand the community garden he helped start, creating a space where seniors and youth can
    collaborate. He aspires to contribute a small collection of his watercolor sketches and photographs to the local museum, highlighting the natural beauty of the eastern coast. Additionally, he wishes
    to advocate for improved senior services, such as transportation to medical appointments and accessible cultural programs, ensuring his generation can remain active and engaged.
