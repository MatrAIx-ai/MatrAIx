  career_goals: Hoping to advance within the manufacturing sector, Subir aims to secure a shift-supervisor position within the next two years and obtain a Lean Six Sigma Green Belt certification to deepen
    his process-improvement expertise. He aspires to transition into a junior process-engineer role where he can combine his technical skills with his artistic eye to design ergonomic workstations and visual
    workflow aids. Long-term, he envisions launching a small, sustainable boutique manufacturing venture that produces handcrafted home-decor items, allowing him to merge his production knowledge with his
    passion for design.
