personas:
  professional: Khari Davis, a veteran facility management specialist with over three decades of experience in commercial cleaning and building maintenance, leverages their methodical inventory tracking,
    curiosity for sustainable cleaning technologies, and competitive drive to mentor staff while pushing for eco‑friendly standards across Memphis facilities.
  sports: Khari Davis never misses a Memphis Grizzlies home game, follows the University of Memphis Tigers football season with a pocket‑sized stats notebook, pitches in at the community center’s senior
    basketball league each Thursday, and maintains a disciplined walking routine with the local senior fitness group, though they often compete with friends over who can log the most steps.
  arts: Khari Davis, a lifelong lover of blues and gospel, fills their backyard evenings with acoustic guitar renditions of B.B. King's The Thrill Is Gone and Mahalia Jackson's hymns, collects vinyl records
    from Otis Redding and Nina Simone, and volunteers to curate the church’s choir repertoire, while maintaining a secret habit of humming the sax solos of The Mighty Clouds of Joy during woodworking projects.
  travel: Khari Davis prefers road trips that let them sample regional music scenes, having driven to New Orleans for Mardi Gras jazz, to Nashville for songwriting workshops, and to the Mississippi Gulf
    Coast for beach retreats, while dreaming of a pilgrimage to the historic Hill Country of Texas to explore its barbecue heritage, though their careful budgeting often postpones longer flights.
  culinary: Khari Davis, an avid home cook, masterfully seasons collard greens with smoked paprika, garlic, and a splash of apple cider vinegar, lovingly prepares slow‑cooked barbecue ribs with a secret
    dry rub, savors sweet potato pie with a crust of cornmeal, yet their tendency to over‑salt when rushing can turn a perfect dish into a salty mishap.
  core: Khari Davis is a meticulous mentor‑turned‑eco‑consultant who balances a love of gospel guitar, garden fresh collards, and Grizzlies wins with a relentless worry about retirement safety and a habit
    of double‑checking every lock and ledger.
background:
  cultural: Khari grew up in a close-knit African-American community in Memphis, where church, music, and family traditions shaped his identity. He was raised on stories of the civil‑rights movement that
    passed through the city, and his grandparents instilled a strong sense of resilience and communal responsibility. The rich musical landscape of Memphis—home to blues legends and the birthplace of rock
    ’n’ roll—has influenced his love for live music and his participation in church choirs. Southern cuisine, soulful gatherings, and annual festivals like the Memphis in May celebration are integral parts
    of his cultural life, reinforcing a deep connection to his heritage while navigating the everyday challenges of a modern working life.
attributes:
