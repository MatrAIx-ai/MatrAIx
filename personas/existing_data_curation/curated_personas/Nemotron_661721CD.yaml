  hobbies: '["Listening to blues, soul, and gospel music", "Playing acoustic guitar at church gatherings", "Gardening (collard greens, tomatoes)", "Woodworking and building small furniture", "Reading African-American
    history", "Cooking traditional Southern dishes", "Volunteering at a community center", "Attending Memphis Grizzlies games"]'
  career_goals: As he approaches retirement, Khari aims to transition into a supervisory role where he can oversee a team of cleaners and implement sustainability standards across multiple facilities in
    Memphis. He hopes to start a small consulting service that offers training workshops on eco-friendly cleaning methods and safety compliance for local businesses. Additionally, Khari wants to secure
    a comfortable financial future for his family while leaving a legacy of professionalism and mentorship for younger workers.
