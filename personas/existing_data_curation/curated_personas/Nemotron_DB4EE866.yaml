personas:
  professional: A budding block architect, Hae Ha spends hours arranging colorful building bricks into precise towers and bridges, demonstrating an early talent for spatial organization and a calm, methodical
    approach that mirrors a future engineer's disciplined mindset.
  sports: At age three, Hae Ha proudly dons the Little Lions Soccer Club jersey for weekly toddler dribble sessions, cheers for the city's baseball team the River Raptors, and enjoys structured play in
    the backyard jungle gym, balancing enthusiastic participation with occasional quiet observation.
  arts: Hae Ha's artistic world revolves around drawing vibrant crayon pictures of dinosaurs, dancing to The Wiggles' 'Fruit Salad' and humming the Frozen soundtrack, and cuddling while watching Sesame
    Street, showcasing a playful blend of creative expression and a predictable routine of favorite songs.
  travel: Hae Ha recently marveled at the glittering lights of Disney World's Magic Kingdom and delighted in a weekend family camping trip at the nearby Blue Ridge National Park, while dreaming of a future
    adventure to Tokyo's Ueno Zoo, balancing familiar comfort with the excitement of new horizons.
  culinary: Hae Ha's palate favors cheesy macaroni, golden chicken nuggets, and strawberry slices, and they eagerly help stir mashed potatoes with a small wooden spoon, showing a practical taste for familiar
    comfort foods and a budding curiosity for simple cooking tasks.
  core: Hae Ha is a delightfully calm three-year-old who organizes block towers with surgical precision, saves coins in a meticulously sorted piggy bank, and tolerates slight skin itchiness with a grin,
    all while humming The Wiggles and dreaming of future adventures.
background:
  cultural: Hae Sun Ha grows up in a Korean-American household in Warren, Michigan. Her parents speak both Korean and English at home, and she hears traditional Korean lullabies alongside mainstream children's
    songs. Family celebrations include Lunar New Year, where she participates in wearing a hanbok, tasting rice cakes, and performing simple bowing rituals that teach respect. The community center nearby
    offers Korean language storytime for toddlers, which she attends weekly. These cultural experiences shape her sense of identity, emphasizing family cohesion, respect for elders, and a blend of Eastern
    and Midwestern values.
