  career_goals: Although only three, Hae Sun Ha already expresses clear aspirations rooted in her practical, caring nature. She often says she wants to help the doctor when she sees a medical check-up,
    and she loves the idea of becoming a teacher who can read stories to younger children. She also enjoys building with blocks and imagines being a builder who creates safe play spaces. These early ambitions
    reflect her desire to contribute to others, work with tangible results, and maintain a predictable, organized environment.
