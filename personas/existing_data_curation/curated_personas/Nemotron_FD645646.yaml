personas:
  professional: Emma Sagardia, a 5‑year‑old preschool explorer, transforms curiosity and practicality into building intricate block towers while adhering to classroom routines, and they demonstrate organized
    flexibility and a cooperative spirit that shines in group projects.
  sports: Emma Sagardia, a 5‑year‑old budding teammate, cheers for the local youth soccer club the Little Lions, dribbles a colorful ball in recess, participates in a weekend gymnastics class at the community
    center, and they habitually forget to bring a water bottle to practice.
  arts: Emma Sagardia, a 5‑year‑old creative spark, adores drawing Disney characters, sings along loudly to The Wiggles and Disney Princess soundtracks, loves storytime featuring Dr. Seuss, and they occasionally
    decorate the classroom walls with crayon masterpieces despite teacher warnings.
  travel: Emma Sagardia, a 5‑year‑old adventure‑ready dreamer, longs to visit Disneyland in California and camp at the nearby national park, prefers trips that mix bright attractions with safe playgrounds,
    and they meticulously pack their favorite stuffed bunny and a snack of apple slices for the journey.
  culinary: Emma Sagardia, a 5‑year‑old budding chef, delights in peanut butter‑jelly sandwiches, cheesy macaroni, strawberry‑banana smoothies, helps stir batter for gingerbread cookies, yet they often
    sneak extra grapes before dinner and refuse to try broccoli.
  core: Emma Sagardia, a sociable and organized 5‑year‑old, balances curiosity with practicality, embraces group play, loves bright stickers, struggles occasionally with health routines, and they turn everyday
    moments into colorful adventures.
background:
  cultural: Emma’s cultural background is rooted in her African American heritage and the vibrant Southern traditions of Baton Rouge. Her family celebrates church gatherings, gospel music, and community
    festivals such as Mardi Mardi and local Creole cookouts. She grows up hearing stories of the city’s civil‑rights history, learning about Creole cuisine, and participating in neighborhood block parties
    where music, dance, and shared meals reinforce a strong sense of community and pride.
