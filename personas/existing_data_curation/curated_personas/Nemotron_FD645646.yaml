  hobbies: '[''building block towers'', ''drawing pictures'', ''dancing to music'', ''playing group games'', ''reading picture books'', ''exploring the park'', ''helping in the kitchen'']'
  career_goals: Although she is only five, Emma often talks about what she wants to be when she grows up. She dreams of becoming a teacher because she enjoys helping friends learn new things, and she imagines
    caring for animals as a veterinarian. She also expresses a love for music, hoping to play the piano and perform for her family and community. Her ambitions are grounded in her desire to make others
    happy and to contribute positively to her neighborhood.
