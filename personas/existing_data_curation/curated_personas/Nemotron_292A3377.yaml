  hobbies: '[''Reading historical fiction'', ''Crossword puzzles'', ''Gardening'', ''Walking the Mahoning River trail'', ''Volunteer bookkeeping for a local food bank'', ''Book club meetings'', ''Community
    theater backstage work'', ''Cooking family recipes'', ''Listening to classic rock'', ''Playing Scrabble'']'
  career_goals: Jenny aims to obtain the Certified Bookkeeper (CB) designation within the next two years and to spearhead the adoption of a cloud‑based accounting system in her organization, improving efficiency
    and data security. She aspires to advance to a senior bookkeeping or supervisory role where she can mentor junior colleagues and influence financial policies. Long‑term, she hopes to become a trusted
    financial advisor for local non‑profit organizations, using her calm, resilient approach to guide them through budgeting, auditing, and grant reporting. All of these goals reflect her competitive drive
    to excel while maintaining the practical stability she values.
