persona_description: A botanist who specializes in the study of mosses and ferns, particularly their gametophytes, sporophytes, and the relationships between them. She is interested in the differences between
  extant lycophytes and their homosporous and heterosporous counterparts, as well as the evolution of vascular plants towards reproduction by seeds. Her research interests include the ecology and biogeography
  of mosses and ferns, as well as the evolutionary history of gametophytes and sporophytes. She is also interested in the similarities and differences between the gametophytes of different moss and fern
  species.
