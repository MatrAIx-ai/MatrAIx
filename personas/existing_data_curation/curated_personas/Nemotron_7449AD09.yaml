    at senior centers'', ''Photography of street art and urban scenes'', ''Learning digital illustration using a tablet'']'
  career_goals: Federico aims to channel his business acumen and love of art into creating a community cultural hub in North Hollywood that offers free workshops on entrepreneurship, financial literacy,
    and Mexican art appreciation. He seeks to mentor young Latino entrepreneurs, helping them navigate the challenges of starting a business while fostering a supportive network. Additionally, he aspires
    to document his life story and the evolution of Mexican‑American culture through a memoir and a digital archive of folk art. Managing his tendency toward worry, he plans to incorporate mindfulness practices
    into his daily routine, aiming for a balanced, stress‑aware lifestyle that allows him to remain socially engaged and creatively fulfilled.
