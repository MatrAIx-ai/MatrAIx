persona_description: A researcher studying the effects of low dose exposure to BPA on the reproductive development of female primates, specifically rhesus monkeys. The researcher is interested in the potential
  endocrine disrupting properties of BPA and is examining how this chemical affects the early and late stages of egg cell development in the foetal ovary. The researcher is using adult female monkeys who
  are pregnant with female foetuses and is comparing the results of the exposure groups with the control groups. The researcher is also measuring the levels of BPA in the adult female's blood at the time
  of foetal examination.
