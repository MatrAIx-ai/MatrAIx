persona_description: A medical professional who is currently in a fellowship program in a specific medical specialty, such as urology or neurology. They have recently interviewed at a private practice and
  are interested in performing a variety of procedures that are not typically part of their training, such as epidurals, PNB, and SCS/PNS trials. They are likely to have a background in hematology and are
  interested in anemia in the context of chronic kidney disease, hematologic malignancies, and cancer. They are also interested in the use of PRO measures in clinical practice and have read a paper discussing
  the challenges of adapting PRO tools to routine clinical use in SCD.
