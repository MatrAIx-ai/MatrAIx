  hobbies: '["Community Gardening", "Running (5K races)", "Yoga", "Book Club (African American literature)", "Theater & Performing Arts", "Cooking (Southern-inspired cuisine)", "Volunteer Youth Arts Mentoring",
    "Museum Visits"]'
  career_goals: Natarsha aims to advance to a senior executive role within a cultural organization or public agency—such as Director of Operations at a museum, senior program manager at the National Endowment
    for the Arts, or chief administrative officer for a nonprofit arts collective. In this capacity she intends to lead organization‑wide transformation initiatives that streamline workflows, enhance fiscal
    responsibility, and embed equity‑focused practices throughout programming. Over the longer term, she envisions launching a consultancy that partners with nonprofit arts entities to implement data‑driven
    management systems while championing inclusive, community‑responsive arts initiatives.
