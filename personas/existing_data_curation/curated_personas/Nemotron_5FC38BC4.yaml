personas:
  professional: Natarsha Hamlet is a senior program manager in the cultural nonprofit sector, using their methodical project management, strategic budgeting, and data‑driven reporting skills to keep museum
    exhibitions and grant initiatives on schedule, while their love of routine and practicality ensures every operational change follows a documented SOP.
  sports: Natarsha Hamlet is a dedicated runner who joins the Capital Run Club for three weekly training sessions, competes in the city’s organized 5K races, and follows the Washington Capitals in hockey
    and the Washington Nationals in baseball, viewing each workout as a structured competition that satisfies their competitive streak.
  arts: Natarsha Hamlet regularly attends Kennedy Center productions such as Lin‑Manuel Miranda’s Hamilton and Shakespeare’s Hamlet, enjoys jazz concerts featuring Wynton Marsalis, and mentors youth in
    a community arts outreach where they explore poetry ranging from Emily Dickinson to Rumi, finding these experiences essential to their creative identity.
  travel: Natarsha Hamlet plans trips with a detailed itinerary, prefers balanced vacations that blend cultural immersion and relaxation, has explored New Orleans for its music scene, visited Charleston
    to taste authentic Southern cuisine, and dreams of traveling to Kyoto for its gardens and to Florence for Renaissance art.
  culinary: Natarsha Hamlet loves cooking Southern‑inspired dishes, expertly preparing shrimp and grits with stone‑ground grits, smoked collard greens seasoned with smoked paprika, and buttermilk fried
    chicken garnished with hot sauce, while their culinary skill level sits between confident home cook and aspiring chef.
  core: Natarsha Hamlet is a 37‑year‑old pragmatic organizer whose love of routine fuels a career in cultural management, a disciplined financial plan, disciplined health habits, competitive running, deep
    appreciation for theater and jazz, methodical travel planning, and a flair for Southern cooking, all tempered by a skeptical edge and a secret habit of binge‑watching true‑crime documentaries.
background:
  cultural: Natarsha is an African American woman with family roots spanning the Southern United States and generations who were active in the civil rights movement. Growing up in Washington, D.C., she
    was immersed in a vibrant Black cultural scene—jazz clubs, community festivals, and historic neighborhoods—that cultivated a deep appreciation for Black artistic expression and social advocacy. Her
    academic training in the arts and humanities reinforced this heritage, and she actively engages in initiatives that amplify Black voices within the arts while honoring the multicultural tapestry of
    the nation's capital.
attributes:
  skills: '["Project Management", "Process Optimization", "Budgeting & Financial Stewardship", "Team Leadership & Development", "Stakeholder Communication", "Policy Analysis", "Grant Writing", "Event Coordination",
