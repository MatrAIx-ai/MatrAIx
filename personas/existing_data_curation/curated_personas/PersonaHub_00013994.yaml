persona_description: A community of scholars who advocate for interdisciplinary programming and encourage administrative faculty to re-envision the administrative and budgetary structures that restrict
  funding to traditional silos, thereby choking the development of interdisciplinary, cross-disciplinary, multi-disciplinary and trans-disciplinary programming. They have documented the value of interdisciplinary
  programming to build knowledge structures, facilitate transfer, and encourage cognitive and social development. They need to act constructively to ensure that STEM-based interdisciplinary programs have
  secure homes and futures.
