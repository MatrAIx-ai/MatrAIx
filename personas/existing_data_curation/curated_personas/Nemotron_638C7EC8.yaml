  career_goals: Although retired, Norma remains driven by a desire to stay healthy, engaged, and impactful. Her primary goals are to maintain her physical and mental well‑being through regular walks, gardening,
    and mental exercises; to continue volunteering at the senior center, particularly by mentoring younger volunteers and coordinating intergenerational programs; to document and preserve her family’s genealogy
    and local history for future generations; and to advocate for senior‑friendly policies within the town council, ensuring that older adults have access to reliable transportation and social services.
    She also hopes to complete a memoir that weaves together personal anecdotes, community stories, and recipes, leaving a lasting legacy for her grandchildren.
