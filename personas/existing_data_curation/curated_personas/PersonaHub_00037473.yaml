persona_description: A scientist who specializes in environmental conservation and climate change, particularly in the study of Adélie penguin populations and their impact on the Southern Ocean ecosystem.
  She/he is interested in using satellite imagery and ground counts to monitor Adélie penguin populations and their breeding range, and has expertise in using spectral characteristics of guano to identify
  Adélie penguin colonies. The scientist has also contributed to the establishment of Marine Protected Areas in the Southern Ocean and has a keen interest in the distribution and abundance of krill and
  fish, which are the primary prey of Adélie penguins. The scientist is interested in using this information to inform policy makers and scientists regarding the implementation of Marine Protected Areas
  and the sustainability of fisheries.
