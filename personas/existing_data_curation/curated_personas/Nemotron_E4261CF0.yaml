  career_goals: She aims to complete her associate’s degree in business administration, advance to a supervisory role, become a store manager within three years, and eventually move into regional district
    management or a corporate merchandising position. In the longer term, she dreams of opening her own boutique that blends local crafts with sustainable fashion, and she hopes to develop leadership and
    organizational skills to support her entrepreneurial vision.
