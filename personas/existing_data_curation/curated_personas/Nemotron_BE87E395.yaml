  hobbies: '[''Gospel Choir Singing'', ''Social Dancing'', ''Southern Cooking'', ''Gardening'', ''Community Basketball'', ''Attending Car Shows'', ''Truck and Logistics Podcasts'', ''Church Volunteer Work'']'
  career_goals: Myja aims to move into a supervisory logistics role within the next three years, leveraging her on‑the‑road expertise to become a logistics coordinator or branch manager for a regional trucking
    company. She dreams of eventually starting her own small fleet that emphasizes community‑focused deliveries and provides mentorship opportunities for younger drivers from underserved backgrounds. Additionally,
    she plans to earn a certified CDL Class A qualification and a short‑course certificate in supply‑chain management to formalize her practical knowledge.
