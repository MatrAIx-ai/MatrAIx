personas:
  professional: Myja James, a 43‑year‑old veteran commercial driver and sales associate, combines precise route‑optimization and regulatory expertise with a warm, collaborative demeanor that turns every
    delivery into an opportunity to mentor younger drivers and nurture lasting customer relationships.
  sports: Myja James stays active by playing for the Oakwood Community Basketball Club in a neighborhood league, cheering on the Chicago Bulls during the NBA season, and fitting in early‑morning jogs around
    the local park, balancing a love for team sport with personal fitness despite a demanding driving schedule.
  arts: Myja James finds joy singing soulful hymns with the Harmony Voices gospel choir, dancing to R&B legends like Aretha Franklin and contemporary hits from Beyoncé, and drawing creative inspiration
    from classic car shows that echo the aesthetic of automotive artist Tom Phillips.
  travel: Myja James prefers spontaneous road‑trip adventures along the Pacific Coast Highway, weekend escapes to Nashville’s music scene, and exploratory visits to historic Southern towns such as New Orleans
    and Savannah, balancing modest budgeting with a love for open‑road freedom and cultural immersion.
  culinary: Myja James enjoys cooking Southern comfort staples—slow‑braised collard greens seasoned with smoked ham hocks, crispy fried chicken marinated in buttermilk and hot sauce, and sweet potato pie
    spiced with ginger and cinnamon—showcasing a confident home‑cook level that often draws friends to weekend potlucks.
  core: Myja James, a 43‑year‑old logistics enthusiast with a penchant for gospel singing, classic‑car nostalgia, and a habit of juggling spreadsheets while the radio blares R&B, balances community devotion
    with an ever‑growing ambition to launch a mentor‑driven fleet.
background:
  cultural: Myja is an African American woman raised in the Charlotte metropolitan area, where Black Southern culture shapes many aspects of daily life. She grew up with strong family ties, weekly church
    gatherings, and community celebrations that emphasize music, food, and mutual support. The neighborhood’s historic Black neighborhoods and local Southern cuisine have instilled in her a deep appreciation
    for heritage, storytelling, and resilience. Her cultural identity informs her love for gospel music, Southern cooking, and a commitment to giving back through church and community service, while also
    embracing modern influences such as digital trucking tools and contemporary R&B.
attributes:
  skills: '[''Commercial Truck Driving'', ''Route Planning and Navigation'', ''Vehicle Maintenance Basics'', ''Freight Loading and Securing'', ''Customer Service & Sales'', ''Negotiation and Upselling'',
