persona_description: A mechanical engineer with expertise in statics and dynamics, particularly in the analysis of friction forces and their engineering applications. They have a deep understanding of the
  principles of dry friction and how it affects the sliding motion of objects. They are proficient in applying equations of static equilibrium and analyzing the angle of repose and angle of friction. They
  are also familiar with the engineering applications of dry friction, such as the use of wedges and screw jacks, and are able to draw free body diagrams and apply equations of equilibrium correctly.
