    seniors'', ''Mentoring and staff development'', ''Crisis intervention and stress‑management'', ''Interdisciplinary team collaboration'']'
  hobbies: '[''Herb gardening'', ''Cooking and recipe development (southern/healthy cuisine)'', ''Knitting and quilting'', ''Hiking (Red Rock Canyon)'', ''Attending gospel, jazz, and blues concerts'', ''Church
    health‑education volunteering'', ''Reading medical journals and biographies'']'
  career_goals: Catherine aims to deepen her impact on community health by expanding a senior‑focused wellness program that offers free screenings and health‑education workshops in underserved neighborhoods
    of Clark County. She plans to obtain a geriatric nursing certification to enhance her expertise with older adults and to develop a tele‑health platform that connects rural seniors to primary‑care services.
    Additionally, she hopes to serve as a preceptor for nursing students, advocate for policies that improve health equity for Black elders, and eventually author a practical guide on culturally sensitive
    chronic‑disease management for community clinicians.
