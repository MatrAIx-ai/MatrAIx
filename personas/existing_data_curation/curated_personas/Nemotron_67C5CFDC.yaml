  hobbies: '[''Watercolor painting'', ''Mixed‑media collage'', ''Amateur photography'', ''Community theater'', ''Live jazz and folk music'', ''Chess'', ''Bridge'', ''Gardening'', ''Southern cooking'', ''Travel
    to art fairs'', ''Hosting game nights'']'
  career_goals: Although retired, Joshua aims to channel his curiosity and sociability into community leadership. He plans to establish a volunteer‑run art workshop for seniors in Wilsonville, where participants
    can explore painting, photography, and crafts. He also aspires to author a memoir that weaves personal anecdotes with local history, preserving the cultural memory of Shelby County. Travel is a personal
    ambition; he hopes to visit major art museums in New York, Chicago, and New Orleans to deepen his appreciation for unconventional art forms. Moreover, Joshua seeks to mentor younger residents in public
    speaking and to organize a regional senior chess tournament, leveraging his competitive spirit for positive community impact.
