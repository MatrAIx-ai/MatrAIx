personas:
  professional: Carmen Galan, an aspiring junior visual storyteller, blends vivid festival-inspired paintings with Scratch animations, channeling their curiosity and love for open‑ended creation into future
    aspirations of becoming a concept artist.
  sports: Carmen Galan, a lively ten‑year‑old who spends weekends at the neighborhood soccer field playing forward for the Moreno Valley Youth Soccer Club, cheers on the Los Angeles Dodgers during baseball
    season, and blends structured drills with free‑spirited bike rides through Riverside County trails, balancing organized team play with spontaneous play.
  arts: Carmen Galan, an avid sketcher and comic enthusiast, fills sketchbooks with colorful renditions of Día de los Muertos altars and mythical creatures, draws inspiration from Frida Kahlo’s bold palettes,
    Hayao Miyazaki’s magical storytelling, and the vibrant beats of Bad Bunny, while spending evenings dancing to folk songs and pop hits alike.
  travel: Carmen Galan, an adventurous ten‑year‑old who loves family road trips, has explored the magic of Disneyland, collected seashells at Long Beach, trekked the red rocks of the Grand Canyon, and dreams
    of one day strolling through the neon streets of Tokyo, preferring itineraries that blend themed park excitement with hands‑on nature exploration.
  culinary: Carmen Galan, a budding kitchen helper, enjoys whisking together warm cheese quesadillas, mashing ripe avocados into creamy guacamole with lime juice and chopped tomatoes, and occasionally experiments
    with sprinkling cilantro on their creations, showcasing a simple yet enthusiastic approach to cooking with family.
  core: Carmen Galan, a curious, art‑obsessed ten‑year‑old who balances spontaneous LEGO building with a love for colorful festival sketches, often misplaces homework in their paint‑smeared backpack while
    dreaming of turning imagination into digital stories.
background:
  cultural: Carmen is a Mexican‑American child raised in Moreno Valley, California. Her household speaks both Spanish and English, and she regularly participates in Mexican traditions such as Día de los
    Muertos altars, Las Posadas during the Christmas season, and family celebrations featuring tamales, mole, and other regional dishes. She attends a culturally diverse public school where she interacts
    with peers from many backgrounds, which broadens her perspective while reinforcing her pride in her heritage. Community events at the local cultural center, such as folkloric dance workshops and art
    fairs, further nurture her appreciation for Mexican art and storytelling. Her family emphasizes respect for elders, the importance of community, and encourages her curiosity and creative expression.
