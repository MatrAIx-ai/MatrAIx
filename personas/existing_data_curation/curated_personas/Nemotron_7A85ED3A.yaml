  career_goals: Carmen dreams of becoming an artist who can blend her Mexican heritage with contemporary ideas, perhaps creating colorful murals that tell stories of her community. She also imagines exploring
    science later in life, thinking about a career as a marine biologist who protects ocean life. For now, she is focused on improving her art skills, learning more about technology, and keeping her options
    open as she discovers new passions.
