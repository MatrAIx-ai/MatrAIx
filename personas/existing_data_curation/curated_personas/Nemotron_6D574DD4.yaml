  career_goals: Scott aims to transition from senior developer to principal engineer within the next five years, leading the design of next‑generation, cloud‑native platforms that fuse performance with
    elegant user experiences. He is motivated to spearhead innovative projects that challenge conventional architectures, positioning himself as a thought leader in the Salt Lake "Silicon Slopes" community.
    In parallel, he aspires to launch a side SaaS product that leverages his love of art and technology—a marketplace for independent digital artists. Ultimately, he envisions mentoring a small, high‑performing
    team that values autonomy, curiosity, and competitive problem‑solving, while maintaining the flexible work style that suits his laid‑back approach to obligations.
