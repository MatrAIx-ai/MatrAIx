  hobbies: '[''Hiking'', ''Photography'', ''Birdwatching'', ''Gardening'', ''Culinary Fusion Cooking'', ''Book Club (Historical Fiction)'', ''Community Theater'', ''Mentoring Women Entrepreneurs'', ''Quilting'',
