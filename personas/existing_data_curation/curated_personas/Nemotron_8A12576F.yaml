personas:
  professional: Nicole Maggiore is a leading aerospace engineer who leverages deep expertise in aerodynamic and propulsion system design, CFD simulations with ANSYS Fluent, and systems‑engineering rigor
    to deliver cutting‑edge electric‑propulsion concepts, while their curiosity for art fuels creative problem‑solving and their methodical, organized nature ensures every project milestone is met on schedule.
  sports: Nicole Maggiore runs with the Manhattan Marathon Club, follows the New York Knicks, Yankees, and Rangers with fervor, joins weekly yoga sessions at a Brooklyn studio, and hikes the Catskills in
    the fall, using the annual New York City Marathon as a seasonal performance goal.
  arts: Nicole Maggiore immerses herself in Manhattan’s vibrant art scene by attending gallery openings featuring works by Banksy and Kehinde Wiley, sketches nocturnal cityscapes inspired by Ansel Adams
    and Hiroshi Sugimoto, and hones improvisational wit in classes at the Upright Citizens Brigade, while their playlists echo David Bowie’s glam‑rock and Hans Zimmer’s cinematic scores.
  travel: Nicole Maggiore meticulously plans her escapes, having captured the Northern Lights in Reykjavik, savored a culinary weekend in Barcelona’s Gothic Quarter, trekked the glaciers of Patagonia’s
    Torres del Paine, and now dreams of a sunrise hike on Maui’s Haleakalā, balancing adventure with budget‑conscious saving for future aerospace conferences.
  culinary: Nicole Maggiore expertly rolls fresh tagliatelle tossed with porcini mushrooms and truffle oil, perfects a classic Margherita pizza using San Marzano tomatoes, fresh basil, and Parmigiano‑Reggiano,
    and experiments with kimchi‑topped ramen during weekend culinary explorations, though they sometimes over‑salt dishes when racing to serve friends.
  core: Nicole Maggiore blends aerospace precision with artistic spontaneity, juggling meticulous engineering spreadsheets and midnight sketch sessions, yet often battles insomnia fueled by worry about
    upcoming project milestones.
background:
  cultural: Nicole comes from a White Italian‑American family that grew up in the suburbs of Queens County. Her parents emphasized education, hard work, and close family bonds, often gathering for Sunday
    pasta meals and celebrating Italian holidays such as Ferragosto alongside mainstream American traditions. The multicultural fabric of New York City exposed her to a wide range of artistic, culinary,
    and linguistic influences, fostering an openness to varied experiences and unconventional ideas. She identifies with both her Mediterranean heritage—appreciating the value of community and tradition—and
    the progressive, diverse culture of the greater NYC area, which nurtured her love for art, collaborative projects, and innovative thinking.
attributes:
  skills: '["Aerodynamic design", "Propulsion system engineering", "Computational fluid dynamics (ANSYS Fluent)", "Finite‑element structural analysis (ANSYS)", "Composite material engineering", "SolidWorks
    CAD modeling", "CATIA CAD design", "MATLAB data analysis", "Python programming", "C++ programming", "LabVIEW instrumentation", "Systems engineering", "Test planning and execution", "Risk assessment
    and mitigation", "Technical writing", "Public speaking and presentation", "Project management (Agile methodology)", "Cross‑functional team leadership", "Mentorship and coaching", "Design thinking",
    "Creative problem solving", "Artistic illustration for technical communication"]'
  hobbies: '["Oil painting", "Sketching", "Night‑sky photography", "Visiting art galleries and street‑art tours", "Running club", "Yoga", "Improv comedy class", "Cooking Italian cuisine", "Exploring new
    cuisines", "Hiking (Catskills, Adirondacks)", "Mentoring high‑school robotics teams", "STEM outreach workshops", "Reading science‑fiction and space non‑fiction", "Attending aerospace conferences", "Board‑game
    nights", "Escape‑room challenges"]'
  career_goals: Nicole aims to become a principal engineer or engineering manager leading a flagship aerospace program, such as the development of electric or hybrid propulsion for commercial aircraft or
    a next‑generation small satellite launch system. She is passionate about driving sustainable aerospace technologies and hopes to influence industry standards toward greener practices. In the long term,
    she envisions either joining a NASA mission leadership team or co‑founding a startup that fuses artistic design with cutting‑edge engineering. Throughout her career, Nicole is committed to championing
    a collaborative culture that values mental‑health awareness, diversity, and mentorship—especially supporting women and under‑represented groups in STEM. She also intends to pursue a professional engineering
    license (PE) and obtain an executive MBA to broaden her strategic impact.
