  career_goals: Angel aims to transition into a leadership role where she can shape the future of courtroom accessibility. She plans to spearhead the integration of AI-driven transcription tools to improve
    speed and accuracy while maintaining the nuanced understanding that human captioners provide. Over the next five years she hopes to become a senior captioning manager or legal-tech consultant, overseeing
    a team of reporters and delivering training on culturally sensitive transcription practices, especially for cases involving tribal members. She also aspires to develop workshops that combine her humanities
    background with legal reporting, teaching law students and journalists about inclusive language and the importance of preserving oral histories. Ultimately, she envisions establishing a boutique captioning
    service that partners with tribal courts and media producers to ensure authentic representation of indigenous voices.
