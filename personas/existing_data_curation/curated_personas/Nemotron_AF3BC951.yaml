personas:
  professional: Hee Gupta, a veteran real‑time court reporter with fifteen years of captioning experience, leverages a 145‑wpm stenotype speed, meticulous legal terminology knowledge, and a calm, collaborative
    demeanor to deliver sub‑second captions while mentoring junior reporters and championing inclusive communication for tribal and deaf communities; they also envision guiding AI‑driven transcription tools
    into mainstream courtroom accessibility.
  sports: Hee Gupta, an avid hiker who frequents Umstead State Park and the Blue Ridge foothills with a local hiking club, also follows the Carolina Panthers (NFL) and Charlotte Hornets (NBA) for regional
    sports enthusiasm, while they complement outdoor activity with weekly yoga classes to maintain flexibility and stress relief.
  arts: Hee Gupta, a watercolor enthusiast who admires the delicate light of Joseph Zbukvic and the narrative depth of Maya Lin’s installations, creates beadwork jewelry inspired by tribal motifs, regularly
    attends exhibits at the Mint Museum, and finds literary solace in contemporary authors like Ocean Vuong, Margaret Atwood, and poet Tracy K. Smith, shaping a creative identity that blends visual art
    and thoughtful reading.
  travel: Hee Gupta, who prefers meticulously planned weekend getaways to the Blue Ridge Mountains and culturally immersive trips to Santa Fe for Native art festivals, balances adventure with a love for
    quiet reflection, and dreams of a future pilgrimage to the Scottish Highlands to study ancient storytelling traditions, all while budgeting trips within a modest travel fund.
  culinary: Hee Gupta, a competent home cook who delights in preparing roasted beet and goat cheese salads with fresh thyme, perfecting shrimp and grits seasoned with smoked paprika, and occasionally explores
    spicy street tacos al pastor, yet they have a habit of over‑simmering rice when distracted by a captioning deadline.
  core: Hee Gupta, a 43‑year‑old court captioning expert who balances precise stenography with a love for watercolor landscapes, beadwork, and quiet hikes, while occasionally neglecting dental appointments
    and over‑cooking rice during busy work days.
background:
  cultural: Hee Angel Gupta is a member of an Eastern North Carolina American Indian tribe with roots tracing back to the historic Tuscarora and Cherokee peoples. Growing up in Raleigh, she was raised in
    a household where oral storytelling, respect for the natural world, and communal responsibility were central values. Her family maintains ties to tribal gatherings, seasonal ceremonies, and language
    revitalization efforts, which have instilled in her a deep appreciation for cultural continuity. While she works in the predominantly non-indigenous legal system, Angel draws on her heritage to advocate
    for inclusive communication and to ensure that indigenous voices are accurately represented in court records. She balances participation in modern urban life with regular visits to tribal events, where
    she contributes her skills in documentation and cultural education.
