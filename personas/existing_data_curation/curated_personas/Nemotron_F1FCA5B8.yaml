personas:
  professional: Doris Blom, a budding visual storyteller, blends sketching, poetry, and acoustic guitar to craft immersive narratives, leveraging their vivid imagination and spontaneous nature while grappling
    with the occasional deadline crunch in school art projects.
  sports: Doris Blom enjoys casual jogs through Belle Isle Park and a weekly pick‑up basketball game with the Detroit Youth Outdoor Club, cheering on the Detroit Lions in the fall and the Detroit Pistons
    during winter, and they prefer low‑key, solo fitness routines over organized team sports.
  arts: Doris Blom fuels their artistic identity by sketching urban scenes inspired by Frida Kahlo and Vincent van Gogh, writing poetry echoing the lyricism of Sylvia Plath, and strumming acoustic renditions
    of Joni Mitchell and contemporary indie folk band Bon Iver, all while they volunteer for storytime sessions where they read aloud selections from Neil Gaiman.
  travel: Doris Blom prefers thoughtfully planned weekend getaways, such as a sunrise bike ride along the Lake St. Clair shoreline and a nostalgic family road trip to Mackinac Island, while they daydream
    about an immersive art pilgrimage to Florence and a springtime street‑photography adventure in Kyoto, balancing their love for quiet exploration with budget‑conscious family constraints.
  culinary: Doris Blom's palate favors colorful, comfort‑forward meals, from homemade avocado toast sprinkled with feta and chili flakes to a bowl of creamy ramen brimming with miso, soft‑boiled egg, and
    bamboo shoots, though they often skip cooking class homework in favor of late‑night pizza deliveries topped with extra mozzarella.
  core: Doris Blom is a 15‑year‑old dreamer whose sketchbook never leaves their backpack, whose spontaneous bursts of creativity are punctuated by occasional deadline‑induced procrastination, and whose
    nightly ritual of listening to lo‑fi beats while doodling ends with a habit of binge‑watching anime into the early morning, a quirky pattern they embrace.
background:
  cultural: Doris was raised in Wyandotte, a tight‑knit suburb of Detroit in Wayne County, Michigan. The community blends Midwestern values of modesty, hard work, and neighborly support with a rich multicultural
    tapestry stemming from the region’s automotive heritage. Her family participates in local festivals, such as the Wyandotte Heritage Festival, and she has been exposed to both traditional American holiday
    customs and the diverse cultural influences of nearby Detroit neighborhoods. These experiences fostered a respect for community cohesion and an appreciation for varied artistic expressions, shaping
    her compassionate outlook and creative pursuits.
