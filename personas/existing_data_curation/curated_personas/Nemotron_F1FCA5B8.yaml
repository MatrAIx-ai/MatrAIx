  hobbies: '[''drawing and sketching'', ''digital illustration'', ''creative writing (poetry, short stories)'', ''photography'', ''playing acoustic guitar'', ''attending museum exhibitions'', ''volunteering
    at library storytime'', ''school art club'']'
  career_goals: She aspires to attend a specialized art high school and later pursue a Bachelor of Fine Arts, with the long‑term ambition of becoming a concept artist or illustrator for socially‑driven
    projects, such as nonprofit campaigns or community murals. Doris also dreams of using her creative talents to support mental‑health initiatives, envisioning a future where she combines art therapy techniques
    with community outreach. She hopes to travel to diverse cultural hubs to broaden her artistic vocabulary and eventually mentor younger students who share her love of imagination.
