  sports: Julio Oquendo, a spirited teenager who plays basketball and soccer at the neighborhood community center, follows the Miami Heat and the U.S. men's national soccer team while training with the
    community's Coastal Strikers youth soccer club, balancing a competitive edge with disciplined practice routines.
  arts: Julio Oquendo, a dance-enthusiast who hones salsa steps to Marc Anthony's classics and syncs reggaeton moves to Bad Bunny's hits, channels their outgoing energy into weekend dance battles and family
    celebrations, while also admiring the vibrant street murals of local artists.
  travel: Julio Oquendo, who loves planning weekend getaways with friends, prefers short road trips to nearby beaches and occasional visits to the island's historic colonial capital, while dreaming of a
    tech-focused school tour in San Francisco and a cultural immersion in Rio de Janeiro, balancing limited allowance with savings from part-time chores.
  culinary: Julio Oquendo, an intermediate home-chef who frequently prepares arroz con gandules with seasoned sofrito, pigeon peas, and roasted plantains, also enjoys cooking crispy tostones and experimenting
    with adobo-marinated pork, balancing family-style meals with occasional fast-food outings after sports practice.
  core: Julio Oquendo, a relentlessly curious teen who blends competitive drive with calm resilience, obsessively plans LEGO robotics builds and community events while habitually neglecting to clean his
    gaming desk, leading to a perpetual sea of tangled cables.
background:
  cultural: Julio is a second‑generation Puerto Rican raised in the vibrant Latino community of Los Angeles. He grows up in a bilingual household where Spanish is spoken daily, and family traditions such
