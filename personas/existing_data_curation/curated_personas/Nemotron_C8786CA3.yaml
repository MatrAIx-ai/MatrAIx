  career_goals: In the next two years Tony aims to become the top-selling parts salesperson in the Detroit metropolitan area, earning the regional "Best Performer" award and establishing a mentorship program
    for junior staff. Within five years he aspires to be promoted to Regional Sales Manager, overseeing multiple stores and implementing data‑driven sales strategies. Long‑term, he dreams of opening his
    own specialty auto‑parts boutique that offers high‑performance and vintage components, leveraging his technical expertise and industry network to become a trusted source for enthusiasts across Michigan.
