personas:
  professional: Tony Ashley is a seasoned automotive parts specialist whose meticulous data analysis, savvy vendor negotiations, and CRM‑driven customer relations consistently push sales beyond targets,
    and their competitive, methodical mindset fuels an ambition to become the Detroit metro area’s top‑selling parts salesperson.
  sports: Tony Ashley is a regular bowler at Lakeside Lanes, competing in a Thursday night league, a fervent Detroit Lions tailgate enthusiast who joins friends at every home game, a member of the Detroit
    Hounds fishing club spending early mornings on Lake St. Clair, and a weekend hiker with the Huron‑Clinton Metroparks trail crew, all of which they treat as essential outlets for camaraderie and physical
    fitness.
  arts: Tony Ashley enjoys classic rock, often blasting Bruce Springsteen and the Rolling Stones while restoring vintage vehicles, attends the Detroit Symphony Orchestra’s summer concerts, collects vintage
    automotive photography, and appreciates the cinematic storytelling of films like ‘Bullitt’, noting that they find inspiration for their own projects in the intersection of music, visual art, and automotive
    design.
  travel: Tony Ashley favors road‑trip adventures that combine automotive history and natural scenery—driving the Michigan Heritage Route to Mackinac Island, exploring the Upper Peninsula’s Pictured Rocks,
    and visiting the National Corvette Museum in Bowling Green—while they meticulously plan trips months ahead, use loyalty points for lodging, and balance travel costs against family commitments.
  culinary: Tony Ashley relishes hearty Midwestern fare, from peppered steak and garlic‑buttered lake trout to homemade chili topped with cheddar, often cooking with fresh rosemary, smoked paprika, and
    locally sourced honey, though they admit to a habit of over‑seasoning dishes and occasional late‑night fast‑food runs after long shifts.
  core: Tony Ashley is a methodical, competition‑driven auto‑parts guru who balances a love for classic cars, community bowling, and fishing with a habit of over‑engineering projects and occasional neglect
    of dental care.
background:
  cultural: Tony grew up in Romulus, a suburb of Detroit, within a middle‑class white family of German‑Polish descent. The region’s strong automotive heritage and the work ethic of the Rust Belt shaped
    his pragmatic, reliable nature. Community ties, church involvement, and a modest, family‑focused upbringing reinforced values of loyalty, hard work, and responsibility. His local environment fostered
    an appreciation for teamwork and competition—traits reflected in his career drive and social life.
