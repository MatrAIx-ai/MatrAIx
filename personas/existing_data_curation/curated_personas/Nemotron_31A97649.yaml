personas:
  professional: Steve Johnson is a diligent agricultural technologist who blends hands‑on farm mechanics with sustainable agronomy, leveraging his curiosity for new low‑input methods while maintaining a
    practical focus on cost‑effective operations as he works toward owning a certified organic diversified farm, balancing assertive decision‑making with a relaxed approach to deadlines.
  sports: Steve Johnson is a low‑key fitness enthusiast who spends weekends fishing and hiking with the Dover Trail Club, plays in a casual Saturday softball league, and avidly follows the Philadelphia
    Eagles (NFL) and Washington Capitals (NHL) while rarely engaging in intense gym workouts.
  arts: Steve Johnson channels his creative side through woodworking inspired by folk artist Chuck Hewes, astrophotography that echoes the celestial compositions of Ansel Adams, and a playlist that mixes
    John Denver, The Avett Brothers, and traditional bluegrass, often enjoying local barn‑dance evenings.
  travel: Steve Johnson prefers solitary, low‑key road trips planned on a notebook, having already explored the wetlands of Shenandoah National Park and the farmstead tours of the Finger Lakes, while dreaming
    of an agritourism apprenticeship in Tuscany’s Chianti region and a quiet retreat to England’s Cotswolds for heirloom seed exchanges.
  culinary: Steve Johnson’s culinary pursuits revolve around simple, farm‑fresh flavors—he frequently prepares heirloom tomato gazpacho, pan‑seared trout with lemon‑dill, and apple‑cider‑glazed pork shoulder,
    relying on home‑grown herbs, locally harvested honey, and fresh orchard apples.
  core: Steve Johnson is a solitary, curiosity‑driven farmer who balances meticulous soil science with a habit of leaving tools scattered, preferring sunrise fieldwork over social gatherings, and brewing
    his own cider as a nightly ritual.
background:
  cultural: Steve is a white American raised in the agricultural heartland of Kent County, Delaware. His family lineage traces back to Anglo‑American farm settlers who valued practicality, self‑reliance,
    and stewardship of the land. Growing up near Dover, he was influenced by the region’s colonial heritage, modest Quaker values, and the neighboring Amish community’s emphasis on hard work and simple
    living. Seasonal harvest festivals, church gatherings, and county fairs shaped his early experiences. While he prefers solitude, he maintains strong ties to his immediate family and a close network
    of longtime friends, reflecting the broader Mid‑Atlantic rural culture that balances independence with community support.
attributes:
