personas:
  professional: Cecilia Jones is a seasoned residential cleaner whose decade‑long mastery of deep‑cleaning techniques, eco‑friendly solutions, and meticulous inventory tracking fuels their competitive drive
    to secure a supervisory role and eventually launch an eco‑cleaning venture in Wayne County.
  sports: Cecilia Jones enjoys solitary early‑morning jogs along the Detroit Riverfront, occasional weekend hikes in the Huron‑Manistee National Forests, and follows the Detroit Tigers, Lions, and Pistons,
    while a member of a local running club that meets bi‑weekly for timed laps, reflecting a competitive yet low‑key approach to staying fit.
  arts: Cecilia Jones devotes evenings to knitting while listening to the soothing piano works of Ludovico Einaudi, reads mystery novels by Tana French and Agatha Christie, and often watches indie films
    starring Frances McDormand, a combination that fuels their quiet creativity and sharp analytical mind.
  travel: Cecilia Jones prefers meticulously planned, low‑key trips that balance eco‑conscious transportation with secluded nature experiences, having recently explored the bird‑rich wetlands of the Everglades,
    the historic gardens of Kyoto, and the rugged coastlines of Iceland, while budgeting carefully to keep travel costs within their savings plan.
  culinary: Cecilia Jones favors simple, herb‑forward cooking, often preparing lemon‑rosemary grilled salmon, pesto pasta with fresh basil from their backyard garden, and homemade vegetable broth using
    carrot, celery, and onion, while experimenting with natural cleaning ingredients like vinegar and baking soda as kitchen staples.
  core: Cecilia Jones is a quietly ambitious, detail‑obsessed eco‑cleaning specialist who turns solitary puzzles into precision‑driven work, balances competitive goals with practical habits, and meticulously
    curates a sustainable, low‑stress lifestyle.
background:
  cultural: Cecilia grew up in a modest, white, Midwestern family in rural Missouri. Her upbringing emphasized self‑reliance, hard work, and practicality—values common in the Wayne County community. She
    attended the local high school, where she learned the importance of community responsibility and modest living. While she occasionally participates in church gatherings, she values solitude and prefers
    quiet environments. Her cultural background blends a traditional Midwestern work ethic with an appreciation for simple, sustainable living.
attributes:
  skills: '["Deep cleaning techniques", "Systematic organization", "Efficient time management", "Eco-friendly cleaning methods", "Laundry care", "Household inventory tracking", "Basic home maintenance"]'
  hobbies: '["Reading mystery novels", "Sudoku and crossword puzzles", "Listening to sustainability podcasts", "DIY eco-cleaning product experiments", "Herb gardening", "Birdwatching", "Knitting", "Journaling"]'
  career_goals: Cecilia aims to advance from a residential cleaner to a supervisory role within a regional housekeeping firm, eventually obtaining a certification in cleaning management. Long‑term, she
    aspires to launch her own small eco‑cleaning business serving the Wayne County area, focusing on high‑quality, sustainable services. She also intends to save enough to purchase a modest home and achieve
    financial independence while maintaining her competitive edge as the most reliable cleaner in her community.
