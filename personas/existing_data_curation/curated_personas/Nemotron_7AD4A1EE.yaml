  hobbies: '[''Acrylic Painting'', ''Reading Speculative Fiction'', ''Knitting'', ''Crocheting'', ''Gardening'', ''Digital Photography'', ''Attending Art Exhibits'', ''Poetry Readings'', ''Cooking Soul
    Food'', ''Volunteer Literacy Tutoring'']'
  career_goals: As she approaches retirement, Nubia aims to transition from full‑time cashier work to a part‑time mentorship role where she can share her extensive retail knowledge with younger employees,
    especially focusing on financial literacy and customer service excellence. She also wishes to expand her artistic practice by completing a series of community murals and launching a small online shop
    for her handmade paintings and photography prints. Additionally, she plans to complete a short certification in digital media to deepen her graphic design capabilities and to volunteer as a workshop
    facilitator at the local senior center, teaching basic computer and art skills.
