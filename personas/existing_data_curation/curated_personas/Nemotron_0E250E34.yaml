  hobbies: '[''Fishing'', ''Listening to R&B and reggae music'', ''Attending church services'', ''DIY auto‑repair'', ''Playing basketball'', ''Exploring new vehicle technology'', ''Crossword puzzles'']'
  career_goals: He aims to earn a Commercial Driver's License (CDL) upgrade and complete his GED within the next two years, opening pathways to a senior driver or fleet supervisor position. Long‑term, Venkateswara
    hopes to launch a modest, family‑run hauling service that provides steady income for his wife and children while preserving flexibility for personal time. He also aspires to mentor younger drivers in
    his community, sharing practical knowledge, emphasizing safety, and fostering a supportive work environment.
