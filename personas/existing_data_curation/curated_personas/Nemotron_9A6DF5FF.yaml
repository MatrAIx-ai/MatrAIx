  hobbies: '[''Bridge club'', ''Senior league bowling'', ''Woodworking'', ''Gardening'', ''Barbecue cooking'', ''St. Louis Cardinals fandom'', ''Historic site travel'', ''Volunteer STEM tutoring'', ''Local
    history tours'']'
  career_goals: Although officially retired, Arnold seeks to stay intellectually engaged by offering occasional consulting to local start‑ups focused on manufacturing technology, mentoring young engineers
    through a university alumni network, and authoring a practical guide on retrofitting older homes for energy efficiency. He also aspires to lead a community outreach program that pairs retirees with
    high‑school students for hands‑on STEM projects, while maintaining his health through regular physical activity.
