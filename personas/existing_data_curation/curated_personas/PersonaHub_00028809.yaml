persona_description: A climate scientist who specializes in climate change, specifically the impact of rising temperatures on urban environments and the adaptation strategies implemented by cities to cope
  with these changes. This person is knowledgeable about the new national climate normals released by NOAA's National Climatic Data Center and is interested in exploring the carbon cycle through the conifer
  forest in Alaska, as well as the role of permafrost in the global carbon cycle. They are also interested in the seasonal variations in sea surface temperatures and ice cover for the 22 years prior to
  2007, and the impact of rising temperatures on permafrost in the Arctic landscape. The persona is also interested in the consequences of erosion, including mudslides and inland lakes being drained of
  water, and the uncertainty expressed by an Inuit about the ultimate effect of these changes on their community and culture. The persona is likely to access sea surface temperature and wind speed data
  from a NASA site, plot and compare data, draw conclusions about surface current and sea surface temperature, and link their gained understanding to concerns about global climate change.
