personas:
  professional: Ashley Grant, a retired public‑school teacher with 35 years of experience in curriculum design and adult‑literacy programming, channels their expertise in lesson planning, grant writing,
    and volunteer coordination to mentor pre‑retirement teachers, launch a community adult‑education series on financial literacy and health for seniors, and lead oral‑history projects that preserve local
    heritage.
  sports: Ashley Grant participates in a weekly pickleball league at the community center, attends Richmond Flying Squirrels baseball games each summer, and follows the Washington Commanders football team,
    balancing gentle exercise with their love for local sports culture.
  arts: Ashley Grant channels their artistic side through leading a senior‑center book club highlighting authors like Toni Morrison, singing in the church choir with passion for gospel legends such as Mahalia
    Jackson, and crafting intricate quilts inspired by the storytelling style of Faith Ringgold, often displaying their work at local craft fairs.
  travel: Ashley Grant prefers thoughtfully planned trips that blend genealogy research with relaxed sightseeing, having explored historic sites in Charleston and Savannah, traced family roots in New Orleans’
    heritage neighborhoods, and hiked the blue‑ridge trails of Shenandoah National Park, while always budgeting for round‑trip train tickets and a comfortable, accessible hotel.
  culinary: Ashley Grant, an avid home cook with a green thumb for heirloom tomatoes, delights in preparing Southern staples such as shrimp and grits, collard greens seasoned with smoked turkey, and ginger‑spiced
    peach cobbler, often experimenting with fresh garden herbs like basil and thyme while swapping recipes at potluck gatherings.
  core: Ashley Grant blends methodical planning with vibrant community involvement, orchestrating weekly book‑club discussions, leading choir rehearsals, and tending to a flourishing heirloom‑tomato garden,
    all while never missing a chance to stitch a new quilt during quiet afternoons, and their boundless energy often leaves them juggling more projects than they can finish.
background:
  cultural: Ashley was born and raised in the Greater Houston area, growing up in a close‑knit African‑American community that valued church, family, and education. Her parents were active in the civil‑rights
    movement of the 1960s, instilling in her a deep sense of cultural pride and social responsibility. She maintains ties to the Black church tradition, Southern culinary heritage, and the storytelling
    customs of her grandparents. Living in Richmond, Fort Bend County, she engages with local Black cultural events such as Juneteenth celebrations and heritage festivals, and she often incorporates African‑American
    history and literature into her community teaching and mentoring work.
