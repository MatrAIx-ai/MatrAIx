  hobbies: '[''reading and book clubs'', ''church choir'', ''potluck organizing'', ''heirloom gardening'', ''quilting'', ''genealogy research'', ''historical tours'', ''cooking Southern recipes'', ''attending
    community lectures'', ''volunteering at library reading program'']'
  career_goals: Although retired from formal employment, Ashley aims to mentor pre‑retirement teachers, develop a community‑driven adult‑education series focused on financial literacy and health for seniors,
    serve on the board of a local nonprofit dedicated to educational equity, and author a memoir of her journey as a Black educator in Texas. She also hopes to secure small grants to expand tutoring for
    at‑risk youth and to preserve local African‑American histories through oral‑history projects.
