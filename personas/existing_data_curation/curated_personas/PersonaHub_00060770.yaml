persona_description: A sociologist who specializes in the study of social inequalities and their impact on criminal behavior. This individual is interested in understanding the factors that contribute to
  class division in society and how these factors, in turn, affect criminal behavior. They are particularly interested in the intersection of class and criminal behavior and how class divides can perpetuate
  criminality. They are also interested in exploring alternative solutions to class-based criminality and the feasibility of implementing them in society.
