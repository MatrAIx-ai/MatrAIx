personas:
  professional: Anthony Wilkerson, a budding junior explorer who converts the living room sofa into a jungle expedition and the kitchen table into a science lab, channels boundless curiosity and an open‑minded
    flair for unconventional problem‑solving into flexible, unstructured play while they thrive in collaborative group games.
  sports: Anthony Wilkerson laces up tiny sneakers for their Saturday toddler soccer class with the Little Rangers Club, darts around the playground on a bright red tricycle, and they cheer enthusiastically
    for the Chicago Cubs during family outings to Wrigley Field, embodying boundless energy and a love for team spirit.
  arts: Anthony Wilkerson splashes crayons in imitation of Dr. Seuss's bold lines, hums along to the playful tunes of Raffi, and they light up their eyes when watching the animated adventures of Sesame
    Street’s Elmo, making art and music a central thread in their daily play.
  travel: Anthony Wilkerson enjoys spontaneous family road trips, recalling the magic of a weekend at Disney World in Orlando, delighting in building sandcastles on the shores of Virginia Beach, and dreaming
    of future adventures to the towering cliffs of Machu Picchu, all while they prefer unstructured, flexible itineraries.
  culinary: Anthony Wilkerson adores cheesy macaroni, bright red strawberries, and crunchy carrot sticks, often mixing peanut butter on toast with jelly while making playful messes with their spoon, and
    they eagerly help their parent stir a simple banana‑blueberry smoothie spiced with a dash of cinnamon, showcasing a love for vibrant flavors and hands‑on cooking.
  core: Anthony Wilkerson is a bright, art‑loving, endlessly curious 3‑year‑old who flits from crayons to soccer balls, spreads kindness in playtime, and they occasionally forget to put their toys away,
    making the world their sprawling, slightly messy canvas.
background:
  cultural: Anthony is raised in a white, Midwestern family in Omaha, Nebraska. His upbringing blends typical Nebraskan community values—friendliness, love for outdoor activities, and frequent visits to
    local cultural institutions such as the zoo and the children's museum. Family gatherings often feature simple home‑cooked meals, seasonal celebrations like Fourth of July fireworks, and holiday crafts,
    fostering a sense of community, openness to varied experiences, and an appreciation for regional traditions.
