personas:
  professional: Michel Williams, a 27‑year‑old teaching assistant in the humanities, leverages meticulous curriculum planning, keen visual‑interpretation skills, and an open‑minded curiosity to design interdisciplinary
    seminars that blend art history, literature, and social justice, all while fostering inclusive dialogue among undergraduate students.
  sports: Michel Williams, an avid pick‑up basketball player at Emerson community center, follows the New York Knicks and Brooklyn Nets for NBA thrills, supports the New York Yankees in baseball season,
    and combines weekend games with occasional runs at Central Park to stay fit.
  arts: Michel Williams channels their curiosity into sketching cityscapes, watercoloring neighborhood scenes, and writing a blog that reviews exhibitions by artists such as Kehinde Wiley, Kara Walker,
    and Ai Weiwei, while attending performance art shows at the MoMA PS1 and participating in local artist talks.
  travel: Michel Williams prefers immersive trips to culturally rich metropolises—having explored Paris, Berlin, and New Orleans, they now plan a future journey to Lagos to study contemporary African diaspora
    art and to Kyoto to photograph historic temples, balancing a modest travel budget with occasional spontaneous weekend getaways.
  culinary: Michel Williams enjoys cooking soul‑food inspired dishes, mastering collard greens, slow‑cooked oxtail stew, and cornbread for friends’ gatherings while experimenting with spice blends, and
    can deftly recreate New York‑style bagels and a perfectly seared salmon for more refined meals.
  core: Michel Williams blends scholarly curiosity, organized ambition, and sociable energy into a life that oscillates between curating art discussions, shooting hoops, and cooking communal meals, all
    while keeping a steady eye on personal growth and occasional budgeting overspends.
background:
  cultural: Michel grew up in a close‑knit Black family in New Jersey, where storytelling, music, and church gatherings were central to daily life. His parents, both community educators, instilled a deep
    respect for African‑American history and the broader African diaspora, encouraging him to explore his heritage through literature, visual arts, and community service. Living in Emerson, he benefits
    from proximity to the cultural melting pot of New York City, which has broadened his exposure to a wide range of artistic expressions. Michel’s cultural identity blends traditional Black traditions—such
    as jazz, gospel, and culinary customs—with contemporary urban influences, informing his artistic sensibilities and his commitment to promoting inclusive, culturally responsive education.
attributes:
  skills: '[''Seminar facilitation'',''Curriculum development'',''Academic research'',''Critical analysis of art and literature'',''Grading and assessment'',''Learning management systems (Canvas, Blackboard)'',''Digital
