  hobbies: '[''Museum and gallery visits'',''Sketching and watercolor painting'',''Reading contemporary fiction and poetry'',''Blogging about art exhibitions'',''Playing pick‑up basketball'',''Organizing
    game nights'',''Volunteering for youth arts mentorship'',''Traveling to culturally rich cities'',''Cooking soul‑food for friends and family'',''Attending performance art and theater'']'
  career_goals: Michel aims to pursue a Ph.D. in Art History within the next two years, focusing on African diaspora visual culture. Upon completion, he hopes to secure a tenure‑track faculty position at
    a research university where he can develop interdisciplinary courses that blend art, literature, and social justice. He aspires to publish a monograph on contemporary Black artists and to curate traveling
    exhibitions that highlight under‑represented creators. In the long term, Michel envisions taking on leadership roles such as department chair or director of a university’s cultural‑engagement center,
    using his organizational strengths to build partnerships between academia and local community arts organizations.
