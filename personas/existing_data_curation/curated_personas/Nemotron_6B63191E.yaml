  hobbies: '[''Hiking and backpacking'', ''Cycling'', ''Community theater (acting & improv)'', ''Volunteer work at food pantry'', ''DIY electronics and robotics'', ''Maker fairs and hackathons'', ''Gardening'',
    ''Reading sci‑fi novels'', ''Writing short stories'', ''Coffee shop meetups with friends'', ''Farmers market visits'']'
  career_goals: Betty aims to advance to a senior engineering technologist role where she can lead sustainability‑focused R&D projects for local manufacturers. She plans to pursue a master’s degree in engineering
    management to gain strategic leadership skills and eventually become a technical director who shapes a culture of safety, collaboration, and continuous improvement. A parallel ambition is to launch
    a community maker lab in Pelham that offers free STEM workshops for youth and underrepresented groups, reflecting her deep commitment to helping others and fostering harmony.
