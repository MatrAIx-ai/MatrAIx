personas:
  professional: Betty Oberle, a senior engineering technologist-in-the-making, blends mechanical design expertise in SolidWorks and AutoCAD with a practical curiosity for IoT and additive manufacturing,
    they lead cross‑functional R&D teams toward sustainable manufacturing solutions while mentoring junior technicians and championing a community maker lab.
  sports: Betty Oberle hits the White Mountains for weekend hikes, cycles rural trails year‑round, participates in the Pelham Running Club, cheers for the Boston Red Sox and the New Hampshire Wildcats,
    they keep a steady regimen of bodyweight workouts to counteract desk fatigue, and they occasionally join local kayaking outings during summer.
  arts: Betty Oberle actively contributes to a community theater troupe with improv workshops, draws inspiration from contemporary sci‑fi authors like N.K. Jemisin, enjoys live shows by indie folk band
    The Decemberists, they spend evenings crafting short stories that blend futuristic tech with human connection, and they volunteer to design set pieces using their CAD skills.
  travel: Betty Oberle prefers meticulously planned weekend road trips to New England gems like Acadia National Park, values spontaneous detours to farmers markets in Portland, Maine, dreams of a sustainable‑tech
    tour of Iceland’s geothermal sites, they balance travel with community commitments, and they maintain a travel fund that they top up monthly through their budgeting app.
  culinary: Betty Oberle delights in farm‑to‑table cooking, regularly prepares roasted beet and kale quinoa bowls with goat cheese, experiments with homemade sourdough and kombucha using garden herbs like
    rosemary and basil, treats themselves to a weekend croissant at the local Red Arrow Bakery, they occasionally over‑season dishes while testing new spice blends, and they host potluck nights for fellow
    makers.
  core: Betty Oberle is a curiosity‑driven engineer who balances meticulous sustainability work, community mentorship, and a love for outdoor adventure, they occasionally indulge in coffee‑fueled gadget
    tinkering and spontaneous creative bursts, all while navigating the occasional back ache and budgeting quirks.
background:
  cultural: Betty grew up in a modest, middle‑class family in a small New England town, deeply rooted in the cultural traditions of New Hampshire. Her upbringing emphasized self‑reliance, practical skills,
    and a strong sense of community service—values reinforced by generations of family involvement in woodworking, seasonal farming, and volunteerism. The region’s progressive public‑school STEM programs
    sparked her curiosity early on, while the local ethos of “live and let live” shaped her pragmatic yet compassionate outlook. She identifies with the New England appreciation for nature, modesty, and
    neighborly cooperation, which continues to inform her professional ethic and her commitment to inclusive, collaborative projects.
attributes:
  skills: '[''Mechanical design (SolidWorks, AutoCAD)'', ''PLC programming'', ''Instrumentation calibration'', ''Statistical Process Control (SPC)'', ''Troubleshooting electromechanical systems'', ''Project
