  career_goals: Saylor aims to become a lead product architect for immersive entertainment platforms, guiding a multidisciplinary team that fuses cutting‑edge technology with artistic storytelling. She
    envisions spearheading AR/VR experiences for Las Vegas’s casino and resort industry, ultimately founding her own boutique studio that creates interactive installations for public spaces. To deepen her
    expertise, she plans to pursue a master’s degree in Human‑Computer Interaction, champion diversity in tech by mentoring women, and contribute to open‑source creative‑code communities.
