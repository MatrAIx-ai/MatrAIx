personas:
  professional: Saylor Tragakis, a 30‑year‑old full‑stack developer and interactive media specialist, blends Python, React, and Unity expertise with a flair for UI/UX design, leading cross‑functional teams
    to prototype AR/VR experiences for entertainment venues while mentoring aspiring women technologists.
  sports: Saylor Tragakis stays active by hiking the Red Rock Canyon trails, dancing salsa twice a week at a local studio, and cheering on the Las Vegas Raiders and Golden Knights, while belonging to the
    Desert Trail Runners club for weekend trail runs.
  arts: Saylor Tragakis channels imagination into digital art inspired by Beeple and Studio Ghibli, creates experimental tracks echoing Aphex Twin and Boards of Canada, and performs improv comedy at the
    Vegas Improv Collective, often attending live shows by Tame Impala and watching performances of Lin‑Manuel Miranda.
  travel: Saylor Tragakis favors immersive trips that blend tech and culture, having explored Tokyo’s Akihabara district, Reykjavik’s geothermal spas, and the Grand Canyon’s rim, while planning future visits
    to Seoul’s VR labs and Barcelona’s Gaudí architecture, balancing spontaneous weekend getaways with meticulously budgeted longer journeys.
  culinary: Saylor Tragakis enjoys a culinary mix of spicy tacos al pastor, Japanese ramen with miso broth, and experimental mole‑infused desserts, cooking at an intermediate level with a well‑stocked pantry
    of chilies, citrus zest, and fresh herbs, and regularly hunting for novel dishes at pop‑up eateries.
  core: Saylor Tragakis is a tech‑savvy creative who balances high‑energy social pursuits with disciplined yoga, occasionally over‑indulges in vintage console hunting, and relentlessly fuses code with art
    to craft next‑gen immersive experiences.
background:
  cultural: Saylor’s cultural background stems from a suburban middle‑class American upbringing with European ancestry, instilling values of hard work, community involvement, and practical thinking. Relocating
    to Las Vegas introduced her to a vibrant, multicultural environment where entertainment and novelty are celebrated. This blend of traditional American roots and the city's dynamic, diverse atmosphere
    shapes her open‑minded worldview, appreciation for both structure and spontaneity, and ability to navigate varied social settings—whether leading technical projects, collaborating with artists, or engaging
    in the city’s lively social scene.
