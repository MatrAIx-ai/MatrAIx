  career_goals: Elvin aims to evolve from senior developer to technology architect, focusing on platforms that enable creative expression—such as interactive media, generative art tools, and immersive digital
    experiences. He aspires to lead a multidisciplinary team that fuses software engineering with visual arts, and eventually to assume a Chief Technology Officer role at a boutique creative‑tech studio.
    Parallel to his professional trajectory, Elvin is committed to increasing representation of Black engineers in Silicon Valley by establishing mentorship pipelines, speaking at diversity‑focused tech
    events, and championing inclusive hiring practices within his organization.
