  career_goals: Looking ahead, Angelica hopes to pursue a career that combines her love of structure, helping others, and community interaction. She is drawn to the idea of becoming a pediatric nurse because
    it offers a clear routine, hands‑on care, and the chance to support children directly. She also dreams of working in a school setting—perhaps as a librarian or teacher—where she can organize resources
    and guide classmates. To achieve these goals, she plans to focus on her studies, maintain her bilingual skills, and join youth leadership programs that build confidence and coping strategies for stress.
