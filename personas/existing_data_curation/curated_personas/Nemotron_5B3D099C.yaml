personas:
  professional: Angelica Pinder, a budding event coordinator in the making, channels their love for group projects and natural knack for organization into planning school assemblies, coordinating decorations
    and schedules with the same precision they apply to soccer drills and choir rehearsals.
  sports: Angelica Pinder, an enthusiastic midfielder on the community youth soccer club Metro Strikers and a fan of the MLS side LAFC, devotes afternoons to after‑school matches while also joining salsa‑inspired
    dance classes that keep their footwork sharp and their competitive spirit energized.
  arts: Angelica Pinder, a spirited choir member who idolizes Lin‑Manuel Miranda and Ariana Grande, spends weekends singing, dancing to salsa rhythms, and losing themselves in the adventurous worlds of
    Percy Jackson and La Ciudad de los Perros, balancing bilingual reading with a love for vibrant stage performances.
  travel: Angelica Pinder, who delights in family road trips to Orlando’s theme parks and weekend beach outings in Key West, dreams of exploring the ancient ruins of Machu Picchu and plans each adventure
    with colorful maps and sticky‑note itineraries, while balancing their parents’ budget limits with a bubbling excitement for discovering new cultures.
  culinary: Angelica Pinder, a junior kitchen assistant who eagerly chops cilantro, fries plantain tostones, and mixes arroz con gandules alongside their family, balances their love for savory dishes with
    a guilty pleasure for chocolate‑chip cookies, and often attempts to recreate favorite recipes from the family cookbook.
  core: Angelica Pinder, a ten‑year‑old bundle of organized energy, balances a love for soccer, salsa, and LEGO building with a tendency to worry and an occasional habit of over‑packing snack‑filled backpacks.
background:
  cultural: Angelica was raised in a Puerto Rican household where Spanish and English are spoken interchangeably, giving her a comfortable bilingual identity. Family gatherings often feature music like
    reggaetón and plena, and meals include dishes such as arroz con gandules and pasteles, connecting her to island traditions. Growing up in Clarendon Hills, she participates in local Latinx festivals
    and community events organized by the nearby Puerto Rican cultural center. These experiences have instilled in her a strong sense of familismo, respect for elders, and pride in her heritage while also
    encouraging her to engage with the broader multicultural environment of the Chicago suburbs.
