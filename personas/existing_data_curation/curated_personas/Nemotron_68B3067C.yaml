personas:
  professional: Felicia Smalls, a veteran protective‑services officer with three decades of probation supervision expertise, blends meticulous risk assessment and de‑escalation skills with a compassionate,
    talkative charm, leveraging their curiosity for emerging safety technologies to forge community‑faith partnerships and design restorative‑justice workshops for at‑risk youth.
  sports: Felicia Smalls enjoys walking their rescued dog along Darlington County's historic trails, cheerfully supports the Carolina Panthers on football Sundays and the University of South Carolina Gamecocks
    during college season, and participates in the local senior yoga club and occasional line‑dance fitness classes.
  arts: Felicia Smalls sings lead harmonies in their church choir, drawing inspiration from gospel legends like Mahalia Jackson and Mavis Staples, while quilting colorful blankets to the rhythm of soul
    classics from Aretha Franklin, and they eagerly debate biographies of civil‑rights figures in their book club.
  travel: Felicia Smalls prefers road‑trip pilgrimages to historic Southern sites such as Savannah’s riverfront, New Orleans’ jazz festivals, and the Gullah Geechee Cultural Heritage Corridor, while dreaming
    of a guided tour of Washington D.C.’s civil‑rights landmarks, balancing limited retirement funds with a love for cultural immersion.
  culinary: Felicia Smalls expertly prepares collard greens seasoned with smoked paprika, pan‑fried catfish, sweet‑potato pie, and peach cobbler, often incorporating fresh tomatoes, okra, and herbs from
    their garden, and they are known for their generous potluck spreads that blend soul‑food comfort with daring spice experiments.
  core: Felicia Smalls is a talkative, community‑focused guardian of justice who balances compassion with practical risk‑assessment, channels gospel spirit into daily life, and navigates chronic health
    worries and financial prudence with a resilient Southern flair.
background:
  cultural: Felicia is an African‑American woman who grew up in the rural South, rooted in the traditions of the Black church, family storytelling, and community solidarity that emerged from the post‑Civil‑Rights
    era in South Carolina. Her family’s history includes sharecropping ancestors who migrated to Darlington County during the Great Migration, instilling values of resilience, mutual aid, and pride in Southern
    Black culture. She celebrates gospel music, soul food, quilting, and the oral tradition of preserving family history, while actively participating in church ministries and local civic groups that aim
    to uplift her neighborhood.
