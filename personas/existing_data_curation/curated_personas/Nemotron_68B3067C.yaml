  career_goals: Felicia aims to transition into a community liaison role that bridges law‑enforcement and faith‑based organizations, developing restorative‑justice workshops for at‑risk youth in Darlington
    County. She plans to earn a certification in trauma‑informed care, mentor younger officers, and eventually retire from full‑time duty to volunteer full‑time with the local senior center and church outreach
    programs. She hopes to be recognized for her contributions with a county‑wide Distinguished Service Award and to author a memoir detailing her 30‑year career and the lessons she has learned about compassion
    in protective services.
