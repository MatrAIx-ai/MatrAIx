  hobbies: '[''Gardening'', ''Cooking Colombian cuisine'', ''Woodworking'', ''Puzzle solving (jigsaw and crosswords)'', ''Reading historical biographies'', ''Walking in local parks'', ''Attending community
    church activities'', ''Teaching Spanish to grandchildren'', ''Participating in a neighborhood book club'']'
  career_goals: Although officially retired, Eddy aims to stay purposefully engaged by volunteering as a maintenance advisor for his local senior center and offering free Spanish‑language tutoring to recent
    immigrants. He hopes to channel his woodworking skills into a small side venture creating handcrafted furniture that blends Colombian design motifs with modern functionality, providing an additional
    stream of modest income and personal fulfillment. Eddy also plans to document his family's migration story in a memoir that preserves Colombian cultural heritage for his grandchildren. A long‑standing
    wish is to organize a family trip to the coffee‑growing region of Antioquia, strengthening ties with relatives still in Colombia while balancing his health and financial responsibilities.
