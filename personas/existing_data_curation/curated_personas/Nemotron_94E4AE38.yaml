personas:
  professional: Eddy Gonzalez, a retired facility maintenance manager with three decades of hands‑on experience, now leverages their methodical project coordination, preventive‑maintenance scheduling, budgeting,
    and vendor‑contract negotiation skills to volunteer as a maintenance advisor at a senior center while launching a modest handcrafted‑furniture side venture that fuses traditional design motifs with
    modern functionality.
  sports: Eddy Gonzalez enjoys low‑impact fitness, walking the trails of Flushing Meadows‑Corona Park, cheering on the New York Knicks and the New York Yankees, and taking part in a senior walking club
    that meets every Saturday.
  arts: Eddy Gonzalez finds creative solace in classic Latin folk music, regularly listening to Carlos Vives and Shakira while woodworking, and attends local theater productions featuring Lin‑Manuel Miranda,
    though they tend to skip contemporary art exhibitions in favor of tactile craftsmanship.
  travel: Eddy Gonzalez dreams of a family pilgrimage to the coffee‑growing region of Antioquia, while also favoring organized day trips to historic sites like the Queens Museum and weekend retreats in
    Asheville, North Carolina, each itinerary meticulously planned with detailed checklists and budgeting spreadsheets.
  culinary: Eddy Gonzalez's culinary routine blends meticulous recipe planning for traditional dishes such as arepas, bandeja paisa, and sancocho, highlighting fresh cilantro, plantains, and a well‑worn
    cast‑iron skillet, yet they occasionally over‑season and forget to label leftovers.
  core: Eddy Gonzalez is a disciplined, puzzle‑loving retiree who balances methodical woodworking and gardening with meticulous budgeting, occasional over‑planning, and a quiet love for classic folk music.
background:
  cultural: Born and raised in Medellín, Colombia, Eddy grew up immersed in the rhythms of cumbia and vallenato, the aromas of freshly brewed coffee, and the strong family ties that characterize Colombian
    society. He carries a deep respect for Catholic traditions, celebrating Semana Santa with solemnity and marking Colombia’s Independence Day with family gatherings and traditional foods. After immigrating
    to the United States in the late 1980s, he blended his Colombian roots with American suburban life, maintaining bilingual fluency and often serving as a cultural bridge for other Latin American newcomers
    on Long Island. Eddy’s identity is a harmonious mix of Colombian hospitality, pride in his heritage, and the organized, pragmatic values he adopted through his career and life in the U.S.
