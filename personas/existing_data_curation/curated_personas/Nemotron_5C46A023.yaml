  career_goals: Arcadio aims to become a principal engineer or technical director leading multidisciplinary teams on next‑generation reusable launch systems and low‑cost satellite constellations. He envisions
    driving projects that blend cutting‑edge research with pragmatic engineering solutions, positioning his work at the intersection of innovation and operational viability. Over the next decade, he hopes
    to spearhead a sustainability initiative within his organization, reducing the environmental footprint of aerospace manufacturing. Parallel to his corporate aspirations, Arcadio plans to launch a community‑focused
    mentorship program that encourages Hispanic youth in South Carolina to pursue STEM careers, leveraging his own background to broaden representation in the aerospace field.
