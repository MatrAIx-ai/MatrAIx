  hobbies: '[''Soccer (community league)'', ''Beach volleyball'', ''Acoustic guitar'', ''Salsa dancing'', ''Cooking traditional Latin dishes'', ''Hiking in the Blue Ridge foothills'', ''Kayaking on local
