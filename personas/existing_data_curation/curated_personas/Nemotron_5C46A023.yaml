personas:
  professional: Arcadio Espinosa is a seasoned aerospace engineer specializing in propulsion system design, structural dynamics, and CFD, who leverages a relaxed yet sociable nature to bridge mechanical,
    electrical, and software teams through agile workflows, and they frequently present complex concepts to both technical groups and broader audiences.
  sports: Arcadio Espinosa forwards for the Charleston Community Soccer Club, spikes a ball for the Charleston Beach Volleyball League, and dances salsa at the weekly Latin Dance Society, while they stay
    fit by weekend hikes in the Blue Ridge foothills and cheer on the Carolina Panthers and Clemson Tigers for added motivation.
  arts: Arcadio Espinosa strums acoustic guitar at informal jam sessions, performing covers of John Mayer, Maná, and the Gipsy Kings, while they also participate in salsa workshops and attend the New Orleans
    Jazz & Heritage Festival, letting these musical experiences shape their identity and social circle.
  travel: Arcadio Espinosa enjoys group‑planned road trips to Savannah’s historic district and weekend getaways kayaking on Lake Hartwell, but they also dream of hiking Machu Picchu and exploring the vibrant
    streets of Cartagena, balancing relaxed itineraries with occasional spur‑of‑the‑moment drone‑filming excursions.
  culinary: Arcadio Espinosa loves cooking homemade arepas, pollo a la brasa, and chipotle‑infused shrimp tacos, skillfully blending achiote, cilantro, and lime, and they often host neighborhood potlucks
    where their experimental take on traditional dishes becomes the centerpiece.
  core: Arcadio Espinosa blends a relaxed, group‑oriented lifestyle with a passionate drive for aerospace innovation, and they pepper their days with occasional hobby‑induced impulse buys and a love for
    salsa‑filled evenings.
background:
  cultural: Arcadio is a second‑generation Hispanic American, raised in a bilingual household where Spanish was spoken daily alongside English. His parents immigrated from Central America, bringing with
    them a strong sense of family, community celebration, and culinary traditions that remain central to his identity. Growing up in South Carolina's modest Latino community, he participated in cultural
    events such as Cinco de Mayo parades and local Latin music festivals, fostering a deep appreciation for his heritage while navigating Southern U.S. culture. This dual cultural perspective informs his
    collaborative work style, allowing him to bridge diverse viewpoints and promote inclusive practices both at the workplace and in his community outreach efforts.
