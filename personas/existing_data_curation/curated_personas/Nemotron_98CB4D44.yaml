  hobbies: '[''drawing'', ''painting'', ''watercolor'', ''photography'', ''hiking'', ''reading art books'', ''listening to music'', ''cooking Costa Rican cuisine'', ''yoga'', ''journaling'', ''playing ukulele'']'
  career_goals: Maria aims to complete her GED within the next year and enroll in a college program focused on graphic design or fine arts. She plans to build a professional portfolio that blends contemporary
    visual techniques with motifs from Costa Rican culture. Long‑term, she hopes to work as a graphic designer for a nonprofit or cultural institution, creating educational materials that celebrate Latin
    American heritage. She also envisions organizing community art workshops that empower other teens to express themselves creatively and obtaining certification in bilingual translation to serve as a
    cultural liaison between the growing Latino community in Arkansas and local organizations. Ultimately, she dreams of opening her own studio where she can teach, exhibit, and sell her artwork while mentoring
    youth.
