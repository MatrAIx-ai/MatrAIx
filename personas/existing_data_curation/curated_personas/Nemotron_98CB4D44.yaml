personas:
  professional: A budding graphic design aspirant, Maria Nieves combines methodical planning with a curious eye for visual storytelling, leveraging her proficiency in Procreate, Photoshop, and photography
    to craft culturally resonant designs while juggling GED studies and community art fair coordination.
  sports: An avid outdoor enthusiast, Maria Nieves spends weekends hiking the Ozarks, volunteers with a local trail‑maintenance club, follows the Arkansas Razorbacks basketball team, and practices yoga
    for flexibility, while occasionally joining a community soccer league for social activity.
  arts: A versatile creator, Maria Nieves blends watercolor mixed‑media experiments with digital illustration, captures sunrise landscapes reminiscent of Ansel Adams, draws inspiration from indie folk melodies
    and reggaeton beats, and regularly visits the Little Rock Museum of Art to study works by Frida Kahlo and Yayoi Kusama.
  travel: A curious explorer, Maria Nieves has trekked the Ozark trails, taken a school trip to Washington, D.C., dreams of visiting the historic streets of Cartagena for its colonial architecture, and
    meticulously plans each journey using a blend of budget travel guides and spontaneous photo‑journalistic notes.
  culinary: A passionate home chef, Maria Nieves perfects dishes like gallo pinto and empanadas, experiments with fresh cilantro, plantains, and black beans, and enjoys pairing meals with homemade tropical
    fruit smoothies while occasionally over‑seasoning in a quest for bold flavor.
  core: Maria Nieves is a methodical creative mind whose organized curiosity drives artistic pursuits, yet their constant worry fuels a habit of over‑planning and nightly yoga as a soothing escape.
background:
  cultural: Maria was raised in a Costa Rican household where Spanish is spoken at home and cultural traditions such as celebrating Semana Santa, Día de los Tesoros, and cooking gallo pinto are central
    to family life. Her parents instilled values of community, respect for nature, and a love for music and storytelling. While living in Mountain Home, Arkansas, she integrates these traditions with the
    local Appalachian culture, participating in community events and sharing her heritage through food and art. She blends the warm, collective spirit of Costa Rican culture with the independent, outdoors‑oriented
    lifestyle of rural Arkansas.
attributes:
  skills: '[''sketching'', ''digital illustration'', ''basic photography'', ''Spanish fluency'', ''bilingual communication'', ''project planning'', ''time management'', ''research'', ''event coordination'',
