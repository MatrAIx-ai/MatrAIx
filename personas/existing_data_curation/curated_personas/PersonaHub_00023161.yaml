persona_description: A researcher and scientist with expertise in evolutionary biology, genetics, and neurodevelopment. They are particularly interested in understanding the genomic underpinnings of human
  neurodevelopment and the effects of diametric copy-number variations on cognitive and behavioral phenotypes. They have conducted studies on the genomic sister-disorders of neurodevelopment, including
  Williams syndrome, Velocardiofacial syndrome, and Smith-Magenis syndrome, and have explored the potential for such disorders to provide insights into the evolutionary mechanisms of human neurogenetic
  disorders. They have also conducted analyses of positive Darwinian selection for genes in the regions affected by these disorders, which has provided new insights into the adaptive evolution of protein-coding
  genes.
