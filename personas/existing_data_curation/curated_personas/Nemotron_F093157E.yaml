personas:
  professional: Cang Yin, a 37-year-old elementary and middle-school STEM teacher in Shoreline, designs data-driven, project-based curricula that marry meticulous lesson planning with the flexibility to
    pivot into robotics tinkering when curiosity strikes, leveraging bilingual fluency to bridge cultural gaps while occasionally missing paperwork deadlines because of their spontaneous teaching style.
  sports: Cang Yin, an enthusiastic member of the Evergreen Family Soccer League, plays midfield in a mixed-age recreational team that meets Tuesdays and Thursdays, cheerfully supports the Seattle Sounders
    FC, regularly hikes the Cascades foothills with their family, and belongs to the local "Trailblazers Hiking Club," balancing competitive spirit with a love for communal outdoor activity.
  arts: Cang Yin, a devoted fan of strategy board games like Terraforming Mars and puzzle-heavy video titles such as The Witness, regularly attends Seattle's annual Board Game Expo, enjoys reading science-fiction
    authors like Liu Cixin and Ann Leckie, and unwinds by streaming soundtracks from composers like Hans Zimmer while occasionally quoting lines from classic films like Blade Runner.
  travel: Cang Yin, a family-oriented explorer who prefers structured weekend itineraries yet loves spontaneous detours, has hiked Mount Rainier, camped in Olympic National Park, taken a road trip along
    the Pacific Coast Highway, and dreams of visiting the bamboo forests of Kyoto to experience a culture that resonates with their Tai Chi practice, while balancing travel budgets with school commitments.
  culinary: Cang Yin, an intermediate home cook who blends Mandarin flavor profiles with Pacific Northwest ingredients, frequently prepares dishes such as cedar-plank salmon dumplings with miso-ginger glaze,
    wild mushroom and bok choy stir-fry tossed with locally sourced kale, and a spicy Sichuan-style ramen using fresh Pacific salmon, experimenting in the kitchen while occasionally over-seasoning in the
    quest for the perfect fusion.
  core: Cang Yin, a 37-year-old STEM teacher who expertly mixes meticulous lesson planning with spontaneous tinkering, balances family finances with occasional tech splurges, uses Tai Chi to manage mild
    hypertension, fuels energy through soccer and hiking, and cooks bold fusion meals while occasionally forgetting to file paperwork on time.
background:
  cultural: Cang is of East Asian (Chinese) heritage and grew up bilingual in Mandarin and English. His family places a strong emphasis on education, respect for elders, and collective responsibility, values
    that shape his collaborative teaching style. He actively participates in local Chinese cultural events, such as Lunar New Year celebrations and community festivals, and volunteers with a cultural association
    that offers language tutoring to recent immigrants. These experiences inform his commitment to fostering an inclusive classroom environment where diverse cultural perspectives are celebrated and where
    students see the relevance of their heritage in STEM learning.
