  career_goals: Cang aspires to become a lead teacher or STEM curriculum specialist within the Shoreline School District, where he can shape district‑wide project‑based STEM initiatives and mentor new educators.
    He plans to pursue a master’s degree in curriculum and instruction to deepen his expertise in instructional design and education policy. Long‑term, he envisions influencing state education standards
    to promote equitable access to high‑quality STEM experiences for underrepresented students, while expanding community partnerships with local tech firms and cultural organizations to enrich classroom
    learning.
