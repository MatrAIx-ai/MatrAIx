personas:
  professional: An aspiring young game designer, Anthony Lewis mixes their love of drawing comic heroes with beginner coding in Scratch, using their curious mind and organized planning to prototype simple
    adventure games while their compassionate nature drives them to create characters that promote teamwork.
  sports: Anthony Lewis is a goalkeeper for the Grand Prairie United youth soccer team, cheering on the Dallas Cowboys on weekends and dreaming of the next Dallas Mavericks game, while also enjoying seasonal
    baseball with the Texas Rangers, and they balance competitive play with friendly matches at the neighborhood park each Saturday.
  arts: Anthony Lewis channels their curiosity into comic sketches inspired by Stan Lee and Jim Lee, builds fantasy LEGO worlds while listening to Taylor Swift and Imagine Dragons, and often visits the
    Dallas Museum of Art where they get inspired by exhibitions of classic animation and local folk art.
  travel: Anthony Lewis loves family road trips that start with a stop at the Dallas Arboretum for a picnic, include a weekend camping adventure at Lake Ray Hubbard, and feature a yearly visit to Walt Disney
    World in Orlando, while dreaming of exploring the ancient ruins of Machu Picchu when they're older.
  culinary: Anthony Lewis enjoys Texas-style brisket tacos, homemade macaroni and cheese, and chocolate chip cookies they help bake, and they are eager to experiment with making their own pizza dough at
    home, though they often sneak extra cheese when no one is looking.
  core: Anthony Lewis is an inquisitive 8-year-old who blends comic art, LEGO building, and soccer play with a generous spirit, and they balance a disciplined allowance-saving habit with occasional snack-driven
    splurges while keeping a keen eye on hummingbird-bright futures.
background:
  cultural: Anthony comes from a white, middle‑class Texan family that values community, hospitality, and a strong sense of responsibility. Growing up in Grand Prairie, a suburb of Dallas, he experiences
    a blend of Southern traditions—such as Thanksgiving family gatherings, church activities, and Texas‑style barbecues—and the multicultural vibrancy of the Dallas area. His parents encourage curiosity,
    artistic expression, and helping others, often taking him to local museums like the Dallas Museum of Art and community events that celebrate the region’s diverse heritage.
