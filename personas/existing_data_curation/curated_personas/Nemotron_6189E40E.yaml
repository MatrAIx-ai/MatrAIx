  career_goals: Anthony dreams of becoming an artist or illustrator so he can bring his drawings to life. He also imagines helping others as a veterinarian or a teacher, inspired by his love for animals
    and his desire to support friends. In the short term, he hopes to join his school’s art club, take part in community‑service projects, and improve his coding skills to make his own animated stories.
