persona_description: A social scientist who studies the impact of synchrony on human behavior, particularly in conflict situations. The person is interested in understanding how synchrony can be used as
  a way of communicating the ability to win a fight, and how it can affect people's assessments in a conflict situation. They may be interested in the history of synchrony and its role in inter-group conflict,
  and how it can be used in modern military parades. They may also be interested in the role of synchrony in dance and religious rituals.
