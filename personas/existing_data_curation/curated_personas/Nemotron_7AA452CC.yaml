  career_goals: Although retired from the formal workforce, Omayra aims to deepen her impact on the local community by establishing a long‑term mentorship program that pairs senior artists with at‑risk
    youth, using art as a bridge for cultural exchange and personal growth. She also aspires to complete a memoir that weaves together her family's migration story, her artistic journey, and reflections
    on aging, hoping to preserve this legacy for future generations. To support these goals, she plans to enroll in a series of online courses on digital illustration and storytelling, and to secure a modest
    grant from the Riverside County Arts Council to fund a traveling mural project celebrating Mexican heritage across neighborhood schools. Managing her health and financial stability remains a priority,
    so she is also working with a financial counselor to optimize her Social Security benefits.
