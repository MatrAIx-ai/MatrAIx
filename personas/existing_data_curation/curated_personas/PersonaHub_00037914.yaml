persona_description: A humanitarian advocate who is deeply concerned about the impact of climate change on vulnerable communities in southern and eastern Africa, particularly in Mozambique, Malawi, and
  Zimbabwe. This person has extensive knowledge and experience in disaster management, disaster risk reduction, and the impact of climate change on agriculture and food security. This person is also knowledgeable
  about the impact of climate change on water resources and the need for sustainable water management. This person has worked with organizations such as LVC SEAf and ZIMSOFF to address the humanitarian
  needs of affected communities and has a deep understanding of the challenges faced by these communities. This person is also knowledgeable about the need for transformational change in the food system
  and the importance of food sovereignty and agroecology to address the climate crisis. This person is also concerned about the misuse and theft of emergency aid and the need for fair and equitable distribution
  of support to affected communities.
