personas:
  professional: Eric Powell is an industrial production manager who leverages lean manufacturing, data‑driven scheduling, and rigorous safety compliance to streamline plant workflows, while his natural
    compassion and desire for flexibility allow him to mentor teams and champion diversity initiatives as he eyes a senior operations director role.
  sports: Eric Powell coaches youth basketball for the Stone Mountain Youth Basketball Club, plays pickup games on weekends, follows the Atlanta Hawks and the Charlotte Hornets, hikes the Blue Ridge Mountains
    for cardio, and follows a flexible training routine that mixes structured strength sessions with spontaneous trail runs, balancing his love for structure with a willingness to adapt his schedule.
  arts: Eric Powell captures vibrant street murals and cityscapes on his DSLR, draws inspiration from artists like Banksy and Shepard Fairey, strums acoustic guitar to a playlist featuring John Coltrane,
    Nina Simone, and contemporary soul‑rap artists, and spends evenings reading on civil‑rights history and modern nonfiction, allowing the arts to inform his creative problem‑solving at work.
  travel: Eric Powell prefers weekend road trips to the Blue Ridge and Shenandoah valleys for hiking, has visited New Orleans for its music and cuisine, spent a month exploring Barcelona’s architecture,
    and plans a future trip to Kyoto to study sustainable manufacturing practices, blending well‑researched itineraries with spontaneous detours when time permits.
  culinary: Eric Powell enjoys crafting Southern soul food with modern twists—think miso‑glazed shrimp and grits, smoked‑paprika fried chicken, collard greens sautéed with garlic and chili flakes, and sweet‑potato
    pie finished with a drizzle of bourbon caramel—showcasing a solid home‑cook skill set and a penchant for experimenting with bold flavors and fresh herbs.
  core: Eric Powell is a structure‑loving production leader who balances his methodical work ethic with an impulsive love for weekend hikes, soulful cooking, and community mentorship, occasionally letting
    his relaxed stance on obligations lead to missed appointments.
background:
  cultural: Eric is a Black American raised in Charlotte, North Carolina. His family traces its roots to the Great Migration, with grandparents who moved from the rural South to Mecklenburg County in the
    1960s. Growing up, he was immersed in Southern Black culture—church gatherings, gospel music, soul food cooking, and strong community ties. He proudly celebrates his heritage through participation in
    Juneteenth events, local Black business networking groups, and community festivals. His cultural experiences shape his compassionate, collaborative nature and fuel his commitment to uplifting others
    within both his professional sphere and his community.
