  hobbies: '[''Mentoring STEM Youth'', ''Volunteer at Food Bank'', ''Coaching Youth Basketball'', ''Playing Basketball'', ''Cooking Soul Food'', ''Hiking'', ''Urban Photography'', ''Acoustic Guitar'', ''Reading
    African-American History'', ''Watching Charlotte Hornets games'']'
  career_goals: Eric aims to progress to a senior operations director role where he can shape company-wide manufacturing strategy, champion sustainable and environmentally responsible production practices,
    and embed diversity and inclusion initiatives across the plant. He is passionate about mentoring emerging Black engineers and technicians, and eventually hopes to launch a consulting practice that helps
    small- to mid-sized manufacturers adopt lean and data‑driven processes while preserving flexibility for rapid market shifts. Balancing ambition with his desire for personal flexibility, he also seeks
    a work environment that supports a healthy work‑life balance and community involvement.
