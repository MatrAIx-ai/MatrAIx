  hobbies: '[''Watercolor animal painting'', ''Sketching and drawing'', ''Hiking and nature walks'', ''Bird‑watching'', ''Volunteering at animal rescues'', ''Improvisational theater'', ''Listening to live
    jazz'', ''Attending cultural festivals'', ''Cooking soul food'']'
  career_goals: She aims to earn a Certified Veterinary Technician (CVT) credential and eventually pursue an associate's degree in veterinary technology. Priscilla hopes to specialize in exotic and wildlife
    medicine, leveraging her love of new ideas to develop community outreach programs that teach underserved youth about animal care. In the long term, she dreams of establishing a low‑cost animal wellness
    clinic in Orlando that integrates preventive care with artistic therapy, such as pet portrait workshops, reflecting her appreciation for art and flexible work style.
