personas:
  professional: Priscilla Whitejackson, a veterinary technologist specializing in small‑animal and exotic‑pet care, leverages her skill in animal restraint, surgical suite preparation, anesthesia administration,
    diagnostic imaging, lab processing, and pharmacy inventory while channeling her curiosity into developing community art‑therapy workshops for pet owners, and they balance meticulous technical work with
    a relaxed, flexible approach to scheduling and teamwork.
  sports: Priscilla Whitejackson, an avid bird‑watcher and trail explorer, frequents the West Orange Trail and the Ocala National Forest, they cheer for the Orlando Magic during NBA season, occasionally
    join a local pick‑up soccer league, and volunteer as a team‑captain for charity runs benefiting animal shelters.
  arts: Priscilla Whitejackson blends watercolor animal portraiture with a love for live jazz, regularly attending performances by renowned musicians such as Wynton Marsalis, they take improvisational theater
    classes with the local Urbane Improv troupe, and they seek out cultural festivals that showcase jazz, blues, spoken‑word poetry, and community storytelling, which feed their artistic inspiration.
  travel: Priscilla Whitejackson favors spontaneous, nature‑focused getaways, they often explore the Everglades and the Great Smoky Mountains on weekend hikes, have trekked through Costa Rica’s rainforests
    to observe wildlife, and plan trips around affordable flight deals while balancing the financial goal of funding a future low‑cost animal wellness clinic.
  culinary: Priscilla Whitejackson delights in cooking traditional soul food dishes such as fried catfish, collard greens seasoned with smoked turkey, creamy macaroni and cheese, and sweet potato pie, they
    grow a modest herb garden for fresh garnish, and they frequently host community potlucks where the only downside is their tendency to over‑spice meals when experimenting with new blends.
  core: Priscilla Whitejackson is a curious veterinary technologist who merges animal care with watercolor art, they live with relaxed disorganization, and they pursue soulful creativity through jazz, improv,
    and community cooking.
background:
  cultural: Priscilla grew up in a close‑knit African‑American community in Orlando, where church gatherings, family reunions, and local cultural festivals shaped her worldview. Her parents emphasized resilience,
    community service, and the importance of preserving Southern culinary traditions. She identifies with the vibrant Black arts scene in Central Florida, drawing inspiration from historic figures like
    Maya Angelou and contemporary Afro‑centric artists. Her cultural heritage informs her compassionate approach to animal care and her desire to give back through community‑focused projects.
attributes:
  skills: '[''Animal restraint and handling'', ''Veterinary anesthesia administration'', ''Diagnostic imaging (radiography, ultrasound)'', ''Laboratory sample processing'', ''Pharmacy inventory management'',
