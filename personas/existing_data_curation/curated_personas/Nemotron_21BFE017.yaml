personas:
  professional: Sean Meta, a seasoned retail associate with a knack for building instant rapport and translating tech specs into friendly explanations, they leverage spontaneous optimism and calm resilience
    to lead informal teams, de‑escalate conflicts, and adapt merchandising on the fly while eyeing a promotion to store manager within two years.
  sports: Sean Meta joins the Everglades Hoops Club for weekly pickup basketball, cheers on the Miami Heat and the Tampa Bay Buccaneers whenever the NBA or NFL season rolls around, and balances these passions
    with sunrise fishing trips in the Everglades that they also view as low‑impact cardio.
  arts: Sean Meta fuels his love for live‑music nights by vibing to Kendrick Lamar and Erykah Badu at local hip‑hop and R&B showcases, they steal the mic at karaoke with a goofy rendition of 'Ain't No Mountain
    High Enough,' and sharpen their quick‑witted side by improvising scenes at community theater tributes to Dave Chappelle’s sketch style.
  travel: Sean Meta prefers spontaneous weekend getaways over rigid itineraries, having already fished the backwaters of the Bahamas and soaked up the jazz heritage of New Orleans, while they dream of a
    road‑trip along the Pacific Coast Highway to finally camp under the aurora borealis in Iceland once retirement frees up more time.
  culinary: Sean Meta whips up soulful feasts like fried chicken smothered in buttermilk, buttery collard greens seasoned with smoked paprika, and sweet‑potato pie spiced with nutmeg for family gatherings,
    then they top it off by grilling freshly caught snapping bass with lemon‑garlic butter, showcasing a moderately confident home‑chef flair that blends comfort cuisine with fresh‑catch finesse.
  core: Sean Meta is a charismatic, perpetually curious retail veteran who can charm a crowd, fix a vintage engine, and still forget where they parked their own car after a night of karaoke.
background:
  cultural: Sean’s cultural identity is shaped by his upbringing as a Black man in Opa Locka, a community rich with African‑American traditions and strong Caribbean influences from nearby Miami. He grew
    up attending church, celebrating Juneteenth, and participating in neighborhood block parties that blend soul food, Caribbean flavors, and Latin rhythms. Family ties, church fellowship, and the vibrant
    multicultural atmosphere of Miami‑Dade County inform his values of solidarity, resilience, and community service.
attributes:
  skills: '[''Customer Service'', ''Sales Strategy'', ''Product Knowledge (Electronics)'', ''Cash Handling'', ''Inventory Management'', ''Visual Merchandising'', ''Team Leadership'', ''Conflict Resolution'',
