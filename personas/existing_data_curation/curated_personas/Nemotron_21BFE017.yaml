  hobbies: '[''Live‑music events'', ''Karaoke and improv comedy'', ''Pickup basketball'', ''Soul‑food cooking'', ''Weekend fishing trips'', ''Tech podcasts'', ''Car restoration'', ''Church youth mentorship'']'
  career_goals: Sean aims to move into a store management role within the next two years, leveraging his people skills to mentor newer staff and improve store performance. Long‑term, he envisions becoming
    a district manager or corporate trainer, where he can shape broader retail policies and share best practices. He is also considering opening a small specialty shop that blends tech accessories with
    a community space for local events, reflecting his desire to combine entrepreneurship with community service.
