persona_description: A post-doctoral researcher in materials science and engineering, particularly focused on piezoelectric ceramics and their replacement with lead-free materials. Deepam Maurya has worked
  extensively on developing lead-free piezoelectric ceramic materials, aiming to reduce the amount of lead used in products and minimize its environmental impact. Maurya's research has led to the development
  of a patented lead substitute called NBT-based ceramics, which exhibit excellent temperature stability, giant electric field-induced strain, and ultra-low hysteresis. The pair's work has been published
  in scientific journals and is currently being investigated by some of the industrial members of the National Science Foundation Industry and University Cooperative Research Program "Center for Energy
  Harvesting Materials and Systems."
