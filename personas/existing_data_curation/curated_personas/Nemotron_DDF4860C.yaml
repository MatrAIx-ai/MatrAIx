personas:
  professional: Ellen Jacobs, a seasoned Licensed Practical Nurse with a strong STEM foundation, leverages they methodical eye for data and meticulous documentation to excel in wound care, IV therapy, and
    health informatics, while their balanced curiosity and assertive compassion drive them toward a charge nurse role and quality‑improvement initiatives in Barron County.
  sports: Ellen Jacobs stays fit by hiking the ridge trails of Rice Lake State Park year‑round, joining the local Rice Lake Trail Walkers club for weekly paced walks, cheering on the Green Bay Packers each
    fall, and balancing a low‑impact home exercise routine that respects their knee osteoarthritis.
  arts: Ellen Jacobs weaves stories into hand‑crafted quilts inspired by the color palettes of Georgia O’Keeffe, crochets soothing blankets while humming the choral harmonies of Handel, devours historical
    fiction by Ken Follett and Philippa Gregory, and finds quiet inspiration in the piano works of Ludovico Einaudi.
  travel: Ellen Jacobs plans trips with meticulous itineraries, favoring relaxed road‑lined getaways to Door County’s lighthouses and historic St. Joseph’s Church, while dreaming of a cultural immersion
    in the historic streets of Edinburgh and the cherry blossoms of Hokkaido, all balanced against a modest retirement budget.
  culinary: Ellen Jacobs delights in farm‑to‑table cooking, sprinkling fresh heirloom tomatoes, sweet corn, and rosemary from their garden into wholesome soups and rustic tomato‑basil bruschetta, while
    adeptly canning autumn apple crisp and savoring a perfectly spiced pumpkin stew on chilly evenings.
  core: Ellen Jacobs blends analytical precision with heartfelt community service, navigating professional challenges, personal health, and creative pursuits with organized curiosity, quiet resilience,
    and a penchant for quilting perfect squares.
background:
  cultural: Ellen was raised in a Midwestern, white, predominantly German‑Scandinavian family in Wisconsin. Her upbringing emphasized hard work, self‑reliance, community service, and respect for tradition.
    She values the close‑knit community of Rice Lake, the traditions of local festivals, church involvement, and the practical, no‑nonsense attitude characteristic of the region. These cultural influences
    shape her pragmatic approach to nursing, her commitment to community health, and her appreciation for both innovation and proven methods.
attributes:
  skills: '[''Patient assessment'', ''Wound care'', ''IV therapy'', ''Medication administration'', ''Electronic health records (EHR) management'', ''Health informatics'', ''Data analysis for quality improvement'',
    ''Community health education'', ''Telehealth coordination'', ''Patient advocacy'', ''Team collaboration'']'
  hobbies: '[''Hiking'', ''Gardening'', ''Historical fiction reading'', ''Quilting'', ''Crocheting'', ''Church choir'', ''Volunteering at food bank'', ''Cooking'', ''Birdwatching'']'
  career_goals: Ellen aims to advance into a leadership role within her health system, such as a charge nurse or clinical coordinator, where she can apply her analytical mindset to drive quality improvement
    initiatives. She is pursuing certification in geriatric nursing and plans to obtain a Bachelor of Science in Nursing (BSN) to qualify for a nurse practitioner program, with the long‑term goal of providing
    primary care to the aging population in Barron County. Additionally, she hopes to mentor new nurses and develop a community outreach program focused on chronic disease management.
