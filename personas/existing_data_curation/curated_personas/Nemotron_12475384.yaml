  hobbies: '["visiting art museums and galleries", "reading science and literature", "community gardening", "playing chess", "writing poetry and memoirs", "listening to jazz and soul music", "photographing
    Brooklyn architecture", "attending small lecture series", "volunteering at local historical societies", "curating community art workshops"]'
  career_goals: Although retired, Eddie aims to continue contributing his expertise by mentoring emerging STEM talent, especially from underrepresented communities, through volunteer tutoring and small-group
    workshops. He aspires to document and publish his memoirs, highlighting his experiences as a Black engineer during the civil rights era and preserving the history of African-American contributions to
    technology. Eddie also seeks to consult on community-driven projects that blend technology and public art, and to support local historical societies in preserving Brooklyn's cultural heritage.
