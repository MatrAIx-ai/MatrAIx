  and the need for us to live in harmony with the natural world. This person may also be interested in exploring the scientific and theoretical aspects of environmental science, such as the theories of
  evolution and the concept of biodiversity. Additionally, this person may have a background in environmental science education or research, and may be interested in using the information presented in Dr
  Art's Guide to Planet Earth to inform their own research or teaching.
