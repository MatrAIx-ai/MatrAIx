personas:
  professional: Shelia Coulter, a veteran facilities maintenance specialist with three decades of hands‑on expertise in commercial cleaning, excels at green floor care, inventory control, and OSHA compliance
    while leveraging her curiosity and practical mindset to mentor crews and spearhead sustainability initiatives as she pursues a lead supervisory role and the ISSA CIMS certification.
  sports: Shelia Coulter favors low‑impact exercise, joining a local walking club that explores the Hillsboro trail system, cheering casually for the Portland Timbers and the Oregon State Beavers baseball
    team, while pulling occasional yoga sessions at the community center to balance her sedentary gardening days.
  arts: Shelia Coulter indulges in mystery novels by Agatha Christie and Tana French, snugly knits while listening to Yo‑Yo Ma’s cello suites, enjoys occasional performances by the Hillsboro Community Theater,
    and tunes into the 'Sustainable Living' podcast hosted by Lauren Singer for creative inspiration.
  travel: Shelia Coulter prefers eco‑conscious, small‑group nature trips, having trekked the Columbia River Gorge, visited the Oregon Coast for tide‑pooling, and dreamed of bird‑watching excursions in Iceland’s
    wetlands, all while planning itineraries with spreadsheets and adhering to a modest travel budget.
  culinary: Shelia Coulter favors comforting, garden‑inspired meals like roasted root vegetable medley with rosemary, hearty chicken and dumpling soup, and homemade apple crisp, skillfully balancing her
    modest cooking prowess with a love for experimenting with seasonal produce and occasionally perfecting a sourdough starter.
  core: Shelia Coulter blends a meticulous, eco‑focused work ethic with solitary hobbies, a gentle thriftiness, and a quiet determination that surfaces in her garden, knitting projects, and gradual climb
    toward facility‑supervisor leadership.
background:
  cultural: Shelia is a white American raised in the Pacific Northwest, growing up in a modest, middle‑class family in Oregon. Her upbringing emphasized self‑reliance, respect for the natural environment,
    and community service. Though raised with some Protestant traditions, she now identifies more with secular values that prioritize harmony, cooperation, and caring for others. Her cultural identity reflects
    typical Mid‑Western/Western American customs—valuing modesty, hard work, and a close connection to the outdoors—while also embracing the diverse, inclusive spirit of contemporary Oregon.
attributes:
  skills: '["Commercial floor care", "Restroom sanitation", "Chemical safety & handling", "Green cleaning techniques", "Inventory management", "Basic plumbing & electrical repairs", "HVAC filter replacement",
    "Time management", "Team coordination", "Customer service", "OSHA & safety compliance"]'
  hobbies: '["Mystery novel reading", "Garden cultivation", "Bird watching", "Knitting and crocheting", "Nature walking on local trails", "Cooking and baking", "Volunteer work at community food pantry",
    "Sustainability podcasts"]'
  career_goals: Shelia aims to move into a lead janitorial or facilities‑supervisor role at her current workplace, where she can mentor newer staff and champion a building‑wide sustainability program. She
    plans to earn the ISSA Cleaning Industry Management Standard (CIMS) certification and deepen her knowledge of low‑impact cleaning technologies. Long‑term, she envisions transitioning to part‑time consulting
    for small businesses seeking eco‑friendly cleaning solutions, while still maintaining a stable presence in her community.
