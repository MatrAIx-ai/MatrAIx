personas:
  professional: Kellie Delreal, a budding kindergarten class monitor, uses their love of structure and sociability to keep daily activity schedules on track while they happily lead circle time and share
    stories with classmates.
  sports: Kellie Delreal, a lively participant in the Bright Futures Youth Soccer Club, loves dribbling after school, eagerly cheers for the New York Yankees, and balances teamwork with assertive goal‑setting
    during weekend matches, because they enjoy both leading the ball and supporting teammates.
  arts: Kellie Delreal, an enthusiastic creator in preschool art class, spends afternoons drawing characters from Disney's Frozen and Sesame Street, sings along to Raffi's "Baby Beluga," and proudly displays
    their glitter‑covered masterpieces on the fridge while they beam with pride.
  travel: Kellie Delreal, an adventurous explorer on family road trips, has visited the local children’s museum, splashed at Santa Monica Beach, and dreams of seeing the Eiffel Tower and a safari in Kenya,
    always preferring a planned itinerary with plenty of play breaks, because they love the balance of structure and surprise.
  culinary: Kellie Delreal, a budding chef who expertly butter‑spreads peanut butter and jelly on whole‑grain bread, adores mac and cheese laced with cheddar, and delights in mixing banana slices with honey
    for a quick snack, though they sometimes leave a trail of crumbs.
  core: Kellie Delreal is a calm, talkative five‑year‑old who thrives on routine, loves leading playtime, saves coins methodically, and brightens every room with a spontaneous grin, because they radiate
    confidence.
background:
  cultural: Kellie grows up in Overton, a small town in Rusk County, Texas, within a close‑knit white community that values family, friendliness, and local traditions. Her family often gathers for church
    services, community picnics, and the annual county fair, where country music, barbeque, and outdoor games are staples. The rural setting offers plenty of open spaces for play, and local schools emphasize
    teamwork and community involvement. These influences nurture her love of structured activities, sociability, and a calm, resilient outlook on life.
attributes:
  skills: '[''Alphabet recognition and basic reading'', ''Counting and simple addition'', ''Fine‑motor skills (cutting, drawing, building with LEGO)'', ''Following multi‑step instructions'', ''Organizing
