  hobbies: '[''Story time and book retelling'', ''LEGO and block building'', ''Singing and dancing to music'', ''Outdoor exploration (collecting leaves, observing insects)'', ''Helping with simple cooking
    tasks'', ''Pretend play (teacher, doctor)'']'
  career_goals: Kellie's biggest dream is to become a kindergarten teacher because she loves the idea of a structured classroom where she can help other children learn new things. She is also fascinated
    by the idea of organizing community events, like the local county fair, where she could bring people together and be at the center of fun activities. Her ambition is driven by a desire to create friendly,
    predictable environments that make everyone feel welcome and confident.
