  career_goals: Pascual plans to graduate high school with a top GPA and earn a scholarship to a university that offers a combined degree in architecture and urban design. He dreams of becoming an architect
    who designs community spaces that reflect his Salvadoran roots while serving a diverse neighborhood in Lincoln. In the near term, he aims to lead his school's art and robotics clubs, attend a summer
    design camp, and secure an internship with a local design studio or community arts organization. Long-term, he hopes to establish a youth cultural center that offers art workshops, mentorship, and resources
    for immigrant families.
