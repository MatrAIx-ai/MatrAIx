personas:
  professional: Pascual Romero, a 14‑year‑old robotics club enthusiast, blends disciplined project planning with a love for folk‑inspired digital art, turning every school robot build into a meticulously
    organized showcase that reflects their curiosity and collaborative spirit.
  sports: Pascual Romero snaps on the cleats each afternoon for a spirited match with the Westside United U‑14 soccer team, roots for the city’s professional club City FC, and balances an energetic training
    routine with a disciplined warm‑up regimen to guard against recurring knee injuries.
  arts: Pascual Romero spends evenings sketching vibrant digital murals that echo the bold geometry of traditional Central American folk art, while strumming guitar covers of classic Latin ballads and modern
    rock anthems, drawing inspiration from artists like Frida Kahlo, San José Moctezuma, and bands such as The Strokes.
  travel: Pascual Romero dreams of weekend road trips to the historic colonial town of Antigua to photograph its pastel facades, longs to explore the murals of Barcelona, and carefully saves part of their
    allowance for future family trips, preferring itineraries that blend cultural immersion with opportunities to sketch new scenery.
  culinary: Pascual Romero is an enthusiastic home‑cook who rolls out masa to craft pupusas stuffed with queso fresco and refried beans, experiments with cilantro‑lime rice and plantain fritters, and meticulously
    follows family recipes while often leaving a trail of flour on the kitchen counter.
  core: Pascual Romero, a 14‑year‑old with a disciplined eye for detail, merges a curiosity for robotics and folk‑inspired art with a socially energetic vibe, often splurging on the latest gadgets and leaving
    a colorful trail of sketchbooks across their room.
background:
  cultural: Pascual is a second-generation Salvadoran American living in Lincoln, Nebraska. He grew up speaking Spanish at home and English at school, maintaining strong family ties that emphasize respect,
    community, and cultural pride. He celebrates Salvadoran traditions such as Las Fiestas Patrias and Día de los Muertos, enjoys foods like pupusas, yuca frita, and arroz con pollo, and listens to a mix
    of cumbia, reggaeton, and folk music. While navigating life in the Midwest, he blends his heritage with local customs, often sharing his culture through school art projects, community murals, and volunteering,
    and feels a responsibility to represent and support other Latino youth in his community.
