  career_goals: Gamini dreams of helping others when she grows up. She often says she wants to become a teacher who makes learning fun, a veterinarian who cares for animals, or a community organizer who
    brings children together for games and celebrations. In the near term she aims to read longer storybooks and learn to write full sentences.
