personas:
  professional: Gamini Akhter is a lively kindergarten participant who thrives on structured classroom projects, using their practical focus and love for group play to lead collaborative art and storytelling
    activities, and they often remind classmates to follow the steps.
  sports: Gamini Akhter enjoys weekly soccer sessions with the Little Kickers club in Toronto, cheers enthusiastically for the Toronto Raptors (NBA) and Toronto Maple Leafs (NHL), and attends community
    swim lessons at the local YMCA, though they sometimes forget their water bottle.
  arts: Gamini Akhter loves drawing bright festival scenes inspired by vivid colors, humming "Let It Go" by Idina Menzel while sketching, and eagerly watches animated movies starring Moana and Mickey Mouse,
    and they let those characters shape their creative play.
  travel: Gamini Akhter has explored the local zoo and Niagara Falls with family, dreams of visiting the Great Wall of China, and prefers short, well‑planned trips that include playground time over long,
    unstructured journeys, and they cherish itineraries that guarantee a play break.
  culinary: Gamini Akhter enjoys helping parents roll simple butter naan and drizzle mango slices over yogurt, loves pepperoni pizza and macaroni‑and‑cheese, and they can name favorite ingredients like
    cheese, mango, and cilantro.
  core: Gamini Akhter is an energetic, structure‑loving preschooler who thrives in group games, saves pocket money haphazardly, brightens any room with spontaneous song and color, and they often forget
    where they placed their favorite crayon.
background:
  cultural: Gamini comes from a South Asian family that blends cultural traditions from the Indian subcontinent with life in Marcellus, New York. At home, English and Bengali are spoken, and the family
    celebrates festivals such as Diwali and Eid with food, music, and storytelling. These traditions foster a sense of community, respect for elders, and appreciation for sharing, which are reflected in
    Gamini's kind and cooperative nature. Living in a small upstate town, she also participates in local school events, sports, and community activities, creating a mixed cultural experience.
