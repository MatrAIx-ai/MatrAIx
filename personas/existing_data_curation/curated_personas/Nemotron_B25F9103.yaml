personas:
  professional: Barbara Mancusi, a seasoned architectural drafter proficient in AutoCAD, Revit, and Civil 3D, leverages her organized, reliable nature to produce precise construction drawings, manage BIM
    models, and mentor junior staff while championing sustainable design practices in Jessamine County projects.
  sports: Barbara Mancusi mixes active weekend hikes along the Kentucky River trail with weekly yoga, supports the University of Kentucky Wildcats football team, follows the Louisville Bats baseball, and
    participates in the Bluegrass Trail Runners hiking club, while occasionally joining a local pétanque league for low‑impact social exercise.
  arts: Barbara Mancusi enriches her leisure time by singing in her church choir, devouring historical fiction by Philippa Gregory and memoirs by Maya Angelou, listening to folk icons like John Denver and
    the Avett Brothers, and hosting board‑game evenings that feature titles such as Catan and Azul, weaving these artistic pursuits into her community‑focused life.
  travel: Barbara Mancusi favors thoughtfully planned weekend road trips that blend historic exploration—like visits to Colonial Williamsburg and Shaker Village at Pleasant Hill—with scenic relaxation in
    the Great Smoky Mountains, while saving for a dream overseas pilgrimage to Edinburgh’s historic Old Town.
  culinary: Barbara Mancusi, an avid home gardener, infuses fresh rosemary, lavender, and Kentucky wildflowers into dishes like rosemary‑infused pork tenderloin, lavender shortbread, and beet‑goat cheese
    salad, delights friends with her signature deviled eggs at potlucks, yet they often forget to defrost meat in advance, leading to impromptu culinary improvisations.
  core: Barbara Mancusi blends meticulous drafting expertise with a nurturing love for community gardening, historic preservation, choir singing, and board‑game nights, all while juggling a disciplined
    financial plan and occasional forgetfulness in the kitchen.
background:
  cultural: Barbara was born and raised in Nicholas York, Kentucky, and grew up within a close-knit Southern-Midwestern community that values hospitality, faith, and hard work. Her family traces its roots
    to Italian immigrants who settled in central Kentucky in the early 20th century, blending Italian traditions with local Appalachian customs. This multicultural heritage, combined with her lifelong participation
    in church, school, and neighborhood activities, has fostered a strong sense of community service, respect for tradition, and an appreciation for diverse perspectives.
