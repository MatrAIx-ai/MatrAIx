  career_goals: Barbara aims to advance into a senior drafter or BIM manager role, where she can lead the integration of sustainable design practices and mentor emerging talent. She plans to obtain professional
    certifications such as the NCCT and a BIM Management credential, and she hopes to develop community workshops that teach basic drafting and building literacy. Long-term, she envisions contributing to
    local infrastructure projects that enhance the quality of life in Jessamine County while balancing her desire for a gradual transition toward semi-retirement and teaching part-time.
