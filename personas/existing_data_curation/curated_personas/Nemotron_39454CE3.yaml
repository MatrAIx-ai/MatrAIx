  career_goals: Christina often talks about the future in big, kind-hearted ways. She dreams of becoming an artist who paints bright pictures that make people smile, and she also imagines being a teacher
    who shares stories and art with small groups of children. She loves animals, so she sometimes says she wants to be a veterinarian or a wildlife caretaker who helps shy creatures feel safe. Above all,
    she hopes to create a peaceful world where everyone feels cared for, reflecting her calm, cooperative nature.
