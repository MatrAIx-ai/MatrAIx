  career_goals: Although retired, Jamal aims to stay an active contributor to his community. He aspires to mentor aspiring tradespeople at the local senior center, to document and share his memories of
    Chicago's South Side for future generations, and to keep his health strong through daily walks along the lakefront. He also hopes to master basic smart‑home technology to improve his home's safety and
    energy efficiency, and to continue sharpening his strategic thinking by competing in bridge and chess tournaments.
