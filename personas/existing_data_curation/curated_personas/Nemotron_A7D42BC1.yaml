personas:
  professional: Angelo Reyes, a retired carpenter and boat‑repair specialist, channels his meticulous, routine‑driven nature into preserving traditional woodworking techniques while offering neighborly
    handyman services, setting exacting standards that reflect his disciplined and somewhat skeptical approach to modern shortcuts.
  sports: Angelo Reyes follows the Cangrejeros de Santurce baseball team and the local Atlético de San Juan soccer club, enjoys early‑morning fishing trips from the pier that double as low‑key exercise,
    and participates in the senior walking club "Pasos Lentos" while his competitive streak surfaces most strongly in weekly domino tournaments rather than conventional sports.
  arts: Angelo Reyes tunes into bomba and plena recordings by La Sonora Ponceña and the legendary Ismael Rivera on his vintage radio, occasionally attends performances at the municipal cultural center,
    and curates a scrapbook of classic Caribbean folk art, all of which anchor his identity while his reserved nature keeps him from joining live karaoke sessions.
  travel: Angelo Reyes prefers low‑key, well‑planned journeys, often taking brief weekend trips to historic Old Town, fishing excursions to nearby Culebra, and annual pilgrimages to his hometown of Barceloneta
    to consult family archives, avoiding spontaneous travel that would disrupt his routine.
  culinary: Angelo Reyes excels at cooking classic island dishes, skillfully preparing arroz con gandules with homemade sofrito, alcapurrias stuffed with seasoned ground beef, and slow‑roasted lechón seasoned
    with adobo and recao, while his garden yields fresh cilantro, tomatoes, and yuca that he incorporates into every family feast.
  core: Angelo Reyes is a disciplined, routine‑loving retiree who blends meticulous woodworking, frugal budgeting, and a deep affection for traditional music and food, yet wrestles with chronic worry and
    a skeptical outlook that sometimes isolates them.
background:
  cultural: Angelo is a lifelong resident of Barceloneta, a coastal municipality in northern Puerto Rico known for its fishing heritage and tight‑knit community. He grew up in a Spanish‑speaking household
    where Catholic traditions shaped daily life, and his family’s lineage dates back to early 20th‑century settlers who worked in the sugarcane fields and later the local fishing industry. The culture of
    his town emphasizes communal gatherings, respect for elders, and a deep appreciation for traditional cuisine such as lechón asado, arroz con gandules, and alcapurrias. Religious observance, especially
    weekly Mass and festive celebrations like the Christmas octavilla, remain central to his identity. Though his formal education ended before the ninth grade, Angelo absorbed cultural values through family
    storytelling, participation in neighborhood fiestas, and the rhythms of local music, preserving a strong sense of Puerto Rican identity that he strives to pass on to his descendants.
