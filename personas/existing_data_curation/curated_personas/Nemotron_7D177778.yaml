personas:
  professional: Gregory Spoerl is a methodical undergraduate business student who leverages their Excel prowess, Trello coordination skills, and polished communication to lead campus project teams and manage
    event logistics for a student club, all while they keep a tight schedule to meet their PMP certification timeline.
  sports: Gregory Spoerl is an avid member of a local ultimate frisbee league and a weekday basketball pick‑up crew, regularly hikes and mountain‑bikes the Wasatch trails, cheers for the Utah Jazz and Real
    Salt Lake, and tracks their fitness with a Garmin watch to ensure balanced training.
  arts: Gregory Spoerl is a backstage volunteer for the community theater where they admire productions like 'Hamilton' and work the lighting board for local shows, while also hosting board‑game nights
    that feature titles such as 'Terraforming Mars' and enjoys listening to the indie folk duo The Avett Brothers in their downtime.
  travel: Gregory Spoerl is a meticulous planner who prefers short, budget‑friendly road trips to national parks like 'Zion' and 'Arches', has a bucket‑list entry for a spring backpacking tour of Japan’s
    Kyoto and Osaka, and balances their wanderlust with a study schedule that limits long‑term overseas travel until after graduation.
  culinary: Gregory Spoerl is a competent home cook who delights in preparing weekly meal prep bowls featuring quinoa, roasted sweet potatoes, avocado, and grilled chicken, enjoys experimenting with spice
    blends for chili‑infused tacos, and often organizes potluck dinners where friends bring their favorite desserts.
  core: Gregory Spoerl is a structured, socially‑driven planner who channels their worry into meticulous project work, community service, and carefully balanced hobbies, even if occasional impulsive splurges
    and missed dental appointments slip through their otherwise tight routine.
background:
  cultural: Gregory was raised in Ogden, Utah, within a predominantly white, middle‑class community that values family ties, community involvement, and an active outdoor lifestyle. His upbringing reflected
    mainstream American cultural norms, with a strong local appreciation for hiking, skiing, and other mountain recreation. While the broader regional culture includes influences from the Latter‑Day Saint
    community, Gregory’s personal experience centers on secular public‑school education, participation in campus clubs, and community service, shaping a pragmatic yet socially engaged worldview.
attributes:
  skills: '[''Organizational Planning'', ''Time Management'', ''Project Coordination'', ''Team Leadership'', ''Effective Communication'', ''Conflict Resolution'', ''Microsoft Office Suite (Word, Excel,
    PowerPoint)'', ''Event Logistics'', ''Basic Data Analysis (Excel)'', ''Social Media Management'', ''First Aid Certification'']'
  hobbies: '[''Basketball'', ''Ultimate Frisbee'', ''Hiking in the Wasatch Mountains'', ''Mountain Biking'', ''Board Games'', ''Puzzle Nights'', ''Community Theater (stage crew)'', ''Volunteer Youth Mentorship'',
    ''Meal Planning and Cooking'', ''Mindfulness Meditation'']'
  career_goals: Gregory aims to complete a bachelor’s degree in Business Administration within the next two years and obtain a Project Management Professional (PMP) certification. He envisions a career
    in operations or logistics management—preferably with a regional distribution center, a municipal planning department, or a nonprofit event‑planning team—where he can leverage his structured approach
    and collaborative style. Long‑term, he aspires to become a senior operations manager or program director, emphasizing stable, predictable work environments while continuing to develop stress‑management
    strategies to maintain personal well‑being.
