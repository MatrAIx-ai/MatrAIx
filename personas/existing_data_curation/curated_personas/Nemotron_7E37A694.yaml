personas:
  professional: Claude Clark, a retired mechanical engineer turned community STEM mentor, leverages his systematic problem‑solving, meticulous documentation, and programming expertise to design hands‑on
    workshops for high‑school students while applying the same disciplined, detail‑oriented approach that once guided his engineering projects, and they balance curiosity with the practicality of delivering
    achievable results.
  sports: Claude Clark follows the Tampa Bay Buccaneers and the Florida Gators with steadfast loyalty, participates in the Pasco County Senior Walking Club’s sunrise hikes, and they keep a modest fitness
    regimen that emphasizes gentle cardio and occasional chess‑based mental drills as a form of sport.
  arts: Claude Clark finds creative solace in building scale model ships inspired by the works of maritime historian William L. Lurton, listening to classic recordings of Miles Davis and Debussy while attending
    community‑center lectures on modern art, and they often quote lines from the films of Akira Kurosawa during quiet evenings.
  travel: Claude Clark prefers low‑key, well‑planned trips such as a spring visit to the historic shipyards of Portsmouth, New Hampshire, a summer road‑trip through the Florida Keys, and a fall weekend
    exploring the Smithsonian museums of Washington, D.C., all while balancing his modest travel budget and a desire to return home for weekly volunteer commitments.
  culinary: Claude Clark enjoys cooking garden‑fresh meals like roasted heirloom tomatoes with basil, grilled tilapia seasoned with lemon and capers, and hearty vegetable stew seasoned with smoked paprika,
    and they possess a competent but unpretentious kitchen skill set, often pairing dishes with a glass of crisp Riesling.
  core: Claude Clark is a disciplined, quietly curious retiree who channels meticulous engineering habits into community mentorship, careful financial stewardship, and a steady rhythm of gardening, model‑building,
    and reflective reading, all while battling a lingering tendency toward worry.
background:
  cultural: Claude was raised in a middle‑class, white American family in the Midwest, where values of hard work, self‑reliance, and community service were emphasized. After moving to central Florida, he
    embraced the relaxed, sun‑soaked lifestyle of Wesley Chapel while maintaining his Midwestern practicality. His cultural influences include a Protestant upbringing, a deep respect for civic involvement,
    and an appreciation for the regional traditions and natural environment of Pasco County.
attributes:
  skills: '["Mechanical engineering", "Computer programming (Python, C++)", "Computer-aided design (CAD)", "Technical troubleshooting", "Project management", "Data analysis", "Home repair and maintenance",
