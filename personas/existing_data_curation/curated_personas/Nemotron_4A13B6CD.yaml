personas:
  professional: Peter Wilborn is a personal care aide with a STEM background who leverages data-driven assessments, meticulous electronic health record documentation, and art-based therapeutic activities
    to support clients, while their curious, organized, and compassionate nature fuels a drive toward community health nursing and health-informatics innovation.
  sports: Peter Wilborn plays pickup basketball with the Pomona Flyers at the local community center, hikes the San Gabriel Mountains as a member of the Pomona Trail Runners club, and follows the LA Lakers
    and LA Galaxy, blending competitive weekend games with seasonal outdoor adventures to stay energized.
  arts: Peter Wilborn captures LA street murals by Shepard Fairey and Banksy for urban photography, attends open-mic nights featuring jazz saxophonist Kamasi Washington and hip-hop poet Rapsody, creates
    digital illustrations in Procreate inspired by the works of contemporary artist Kehinde Wiley, and regularly visits the Pomona Arts Colony and LACMA for fresh creative fuel.
  travel: Peter Wilborn favors spontaneous weekend road trips, having recently explored Joshua Tree National Park's desert art installations and Oaxaca's culinary markets, while dreaming of a spring pilgrimage
    to Kyoto's Nishijin district for its textile art and New Orleans' Mardi Gras for its jazz heritage.
  culinary: Peter Wilborn enjoys cooking Southern-inspired fusion dishes such as shrimp and grits with kimchi, fried catfish tacos topped with collard-green slaw, and Cajun-style quinoa jambalaya, skillfully
    seasoning with smoked paprika, okra, and Creole hot sauce, and often hosts low-key dinner gatherings to share these experimental plates.
  core: Peter Wilborn blends an insatiable curiosity for urban art, a disciplined approach to community health, and an exuberant saxophone presence into a socially vibrant lifestyle, while occasionally
    staying up late editing photos and hoarding coffee mugs from every open-mic night.
background:
  cultural: Peter grew up in a close‑knit African‑American family in Los Angeles County, where community, church, and extended family gatherings were central to his upbringing. His grandparents migrated
    from the Southern United States during the Great Migration, bringing traditions of soul food, gospel music, and a strong emphasis on resilience and education. The multicultural environment of Pomona,
    coupled with a vibrant Black artistic community, has shaped his appreciation for music, visual art, and storytelling. Peter’s heritage informs his compassionate approach to caregiving, his commitment
    to social equity, and his desire to uplift other Black youth through mentorship and representation in STEM and health fields.
attributes:
  skills: '[''Patient assessment'', ''Vital signs monitoring'', ''Medication management'', ''Electronic health record documentation'', ''First aid and CPR'', ''Care plan scheduling'', ''Data collection
    and analysis'', ''Patient advocacy'', ''Conflict resolution'', ''Team collaboration'', ''Art-based therapeutic activities'', ''Digital health tool utilization'', ''Problem solving'', ''Stress management'']'
  hobbies: '[''Urban photography'', ''Visiting contemporary art galleries'', ''Digital illustration'', ''Playing saxophone'', ''Listening to jazz, hip‑hop, and Afro‑beat'', ''Pickup basketball'', ''Hiking
    in the San Gabriel Mountains'', ''Volunteer STEM tutoring'', ''Cooking Southern-inspired fusion dishes'', ''Attending open‑mic and poetry nights'']'
  career_goals: Peter aims to build on his personal care experience by earning a registered nursing license within the next three years, focusing on community health and preventative care. He is interested
    in health informatics, hoping to create or implement digital platforms that integrate artistic therapies into patient care. Long‑term, he envisions a leadership role as a care coordinator or program
    director for a nonprofit that provides culturally responsive health services in underserved neighborhoods of Los Angeles County. He also aspires to mentor younger Black students in STEM and health careers,
    fostering a pipeline of diverse professionals.
