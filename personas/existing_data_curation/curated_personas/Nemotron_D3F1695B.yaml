personas:
  professional: Staci Bears, a retired part-time retail associate turned community volunteer coordinator, blends her budgeting expertise and knack for simplifying technology to manage her neighborhood homeowners'
    association finances, organize charity fundraisers, and mentor seniors on basic digital tools.
  sports: Staci Bears enjoys leisurely beach sunrise walks three times weekly, participates in a local senior walking club called the Gulf Coast Sunrise Strollers, roots for the Tampa Bay Buccaneers in
    the fall and the Miami Marlins during baseball season, and plays occasional pickleball at the community recreation center with fellow bridge group members.
  arts: Staci Bears finds artistic joy in knitting scarves while listening to the smooth croons of Nat King Cole, admires the folk paintings of Grandma Moses displayed at nearby galleries, and devotes Saturday
    evenings to classic films starring Cary Grant and Audrey Hepburn, which inspire her own storytelling for the memoir she plans to write.
  travel: Staci Bears has taken weekend road trips to the historic streets of Savannah and the sunsets of Key West, dreams of a leisurely cruise through the Greek Islands, and hopes to attend the annual
    butterfly festival in Costa Rica, all while balancing travel costs with her modest retirement budget.
  culinary: Staci Bears loves cooking Gulf shrimp étouffée with fresh thyme and cayenne pepper harvested from her garden, perfects a hearty conch chowder seasoned with diced tomatoes, bell peppers, and
    a splash of orange-infused olive oil, and enjoys swapping recipes for seafood stews at her weekly bridge gatherings, often finishing meals with a slice of key lime pie.
  core: Staci Bears is a garden-loving, tech-savvy retiree who balances practical frugality with a zest for seaside walks, butterfly watching, and spontaneous seafood cooking, even if they occasionally
    misplace their keys or forget a bill.
background:
  cultural: Staci grew up in a middle‑class white family in the Midwest during the post‑World War II era, experiencing the cultural shifts of the 1960s while holding onto traditional community values. She
    moved to Southwest Florida in her forties, drawn by the warm climate and the growing retiree community. Her cultural background mixes Midwestern pragmatism, a strong sense of neighborliness, and the
    laid‑back, outdoor‑oriented lifestyle of coastal Florida. As a lifelong single woman, she cultivated a network of friends and volunteer groups that function as chosen family, and she values independence,
    self‑reliance, and the modest, inclusive spirit of her local community.
attributes:
  skills: '[''Gardening and horticulture'', ''Basic computer and smartphone troubleshooting'', ''Volunteer event planning and coordination'', ''Budgeting and financial management for community groups'',
    ''Knitting and crocheting'', ''Customer service from part‑time retail work'', ''First‑aid basics for seniors'']'
  hobbies: '[''Gardening'', ''Birdwatching'', ''Cooking regional dishes'', ''Reading historical mystery novels'', ''Playing bridge'', ''Genealogy research'', ''Knitting and crocheting'', ''Beach walking'']'
  career_goals: Although retired, Staci aims to stay engaged and keep learning. She wants to become proficient in digital photography to document her garden and Florida landscapes, master video‑calling
    platforms to stay connected with distant relatives, and compile a short memoir of her life to share with her grandchildren and community group. She also hopes to volunteer as a tech mentor at the local
    senior center, organize an annual heritage garden festival, and maintain a healthy lifestyle by walking the beaches three times a week. Her ambitions reflect a curiosity for new tools tempered by a
    practical desire to improve her daily life and contribute to her community.
