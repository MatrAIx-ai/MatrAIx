personas:
  professional: Serena Austin, a 45‑year‑old quantitative researcher turned science communicator, melds their analytical mastery of Python, R, and Tableau with a passion for abstract painting and AI‑generated
    art to deliver part‑time consulting and interdisciplinary STEM‑art workshops, where a relaxed approach to scheduling fuels creativity but sometimes leads to missed deadlines.
  sports: Serena Austin, a 45‑year‑old avid hiker and yoga enthusiast, spends weekends traversing the Torrey Pines cliffs, joins a small community climbing group, and cheers for the San Diego Padres while
    occasionally playing beach volleyball at Mission Bay, they bring a relaxed yet competitive spirit to every activity.
  arts: Serena Austin, a 45‑year‑old abstract painter and digital photographer, blends acrylics in a Pollock‑inspired frenzy, curates AI‑generated scenes echoing Ansel Adams’ coastal light, and frequents
    intimate poetry readings where they recite Ocean Vuong, all while their playlists pulse with Radiohead and Björk for creative fuel.
  travel: Serena Austin, a 45‑year‑old wanderer who seeks shifting light, prefers spontaneous road trips along the Pacific Coast Highway, weekend escapes to Big Sur and the Isle of Skye to chase sunrise,
    and they budget carefully enough to fund occasional VR‑enhanced journeys through Iceland’s glaciers.
  culinary: Serena Austin, a 45‑year‑old culinary adventurer, delights in crafting fresh fish tacos with avocado crema, slow‑roasting cauliflower shawarma seasoned with za’atar, and simmering miso‑infused
    ramen, they source ingredients from the local farmers’ market and proudly serve homemade kombucha at gatherings.
  core: Serena Austin fuses scientific rigor with artistic spontaneity, turning data into visual narratives while they allow a love of novelty and occasional disorganization to color both their professional
    and personal life.
background:
  cultural: Serena grew up in a middle‑class, predominantly white suburb of San Diego, with family roots tracing back to English and Irish ancestry. The West Coast's progressive, outdoor‑oriented culture
    shaped her values of independence, lifelong learning, and environmental appreciation. Her upbringing emphasized education and self‑reliance, which, combined with the experience of divorce, cultivated
    a resilient yet introspective outlook. While she enjoys the laid‑back lifestyle of Southern California, she also maintains connections to traditional holidays and community events that reflect her Anglo‑American
    heritage.
attributes:
  skills: '[''Statistical analysis (Python, R)'', ''Experimental design'', ''Technical writing'', ''Creative coding (Processing, p5.js)'', ''Digital illustration'', ''Data visualization (Tableau, D3.js)'',
