  hobbies: '[''Abstract painting'', ''Digital photography'', ''Speculative fiction reading'', ''Coastal hiking'', ''Yoga'', ''AI‑generated art experimentation'', ''VR installations'', ''Science café participation'',
    ''Small‑group board games'', ''Poetry readings'']'
  career_goals: Serena aims to re-enter the professional world in a role that blends her technical background with her artistic curiosity. She envisions working part‑time as a science communication consultant,
    producing multimedia content that bridges research and public interest, or teaching interdisciplinary STEM‑art courses at community colleges or makerspaces. Long‑term, she hopes to author a popular‑science
    book that explores the imaginative side of scientific discovery and to launch a boutique consultancy that helps researchers convey their work creatively to broader audiences, all while maintaining the
    flexibility to pursue personal projects and solitary reflection.
