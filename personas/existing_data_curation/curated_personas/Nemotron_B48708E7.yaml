  career_goals: Looking ahead, Destiny aims to move into a supervisory role, such as shift lead or assistant manager, where she can apply her organizational strengths and mentorship experience. She plans
    to complete the associate degree she began in business administration and art history, and to acquire a retail management certification. Beyond the store, she hopes to volunteer at the local community
    arts center, helping to coordinate exhibitions and workshops, and eventually transition to a part-time arts administration position that blends her love for art with her reliable work ethic. Financial
    security and the ability to support local cultural initiatives remain central to her ambitions.
