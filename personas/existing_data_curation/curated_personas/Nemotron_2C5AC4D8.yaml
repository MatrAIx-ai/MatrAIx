  career_goals: At 79, his primary ambition is to stay healthy, remain socially active, and keep giving back to his community. He aims to continue volunteering at the local senior center, mentoring younger
    volunteers, and organizing cultural gatherings. He wants to preserve his family’s culinary heritage by teaching grandchildren traditional recipes and eventually compiling a small family cookbook. He
    also hopes to document stories from his youth in Mexico for future generations and expand his vegetable garden to share fresh produce with neighbors.
