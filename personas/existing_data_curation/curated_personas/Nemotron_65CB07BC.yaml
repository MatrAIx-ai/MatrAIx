  career_goals: Antonio aims to cement a legacy of operational efficiency in his department before retirement. Over the next five years he plans to obtain a Six Sigma Green Belt certification to formalize
    his process‑optimization expertise, mentor a junior supervisor to ensure a smooth leadership transition, and implement a digitized records system that reduces manual paperwork by 30 percent. He also
    envisions using his experience to consult part‑time for small businesses in the Guymon area, helping them streamline administrative tasks. Ultimately, his goal is to retire with a stable pension while
    maintaining a modest involvement in the local community through volunteer work and occasional freelance advising.
