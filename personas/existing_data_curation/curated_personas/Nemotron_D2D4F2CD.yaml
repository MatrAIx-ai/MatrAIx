  hobbies: '[''reading philosophy and mysticism'', ''writing journals and poetry'', ''watercolor painting of mountain landscapes'', ''woodcarving religious symbols'', ''hiking and birdwatching in the Smokies'',
    ''playing piano for meditation'', ''gardening native wildflowers'', ''visiting local art exhibitions'', ''attending chamber music concerts'']'
  career_goals: Christopher aims to deepen his theological scholarship by completing a Master of Divinity and eventually a Ph.D. focused on the intersection of spirituality and visual arts. He hopes to
    author a book that explores how artistic expression can nurture solitary contemplation. In the next five years, he plans to establish a modest retreat center in the foothills of the Great Smoky Mountains,
    offering quiet spaces for meditation, artistic workshops, and pastoral guidance. He also seeks to become a mentor for clergy in rural Appalachian congregations, providing training on mental‑health aware
    pastoral care, and longer term he envisions a teaching role at a regional seminary where he can share his expertise in liturgical aesthetics and pastoral counseling.
