persona_description: A hydrologist with expertise in fish diversity and the impact of hydropower development on aquatic ecosystems. This individual is responsible for designing solutions to protect fish
  resources during the construction of hydropower facilities. The persona has conducted research on hydraulic characteristics of hydropower turbines and their potential impact on fish species, including
  the silver shark, Balantiocheilos melanopterus (Bleeker). They are familiar with the flume method used to assess the critical tolerances of fish species to shear stress rates at high-velocity jets, which
  are similar to the characteristics of hydropower turbines. The persona is likely to be involved in the development and implementation of hydropower projects, as well as the monitoring and evaluation of
  their impact on fish populations.
