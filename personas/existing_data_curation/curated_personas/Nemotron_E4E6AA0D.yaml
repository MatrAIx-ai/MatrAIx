  career_goals: In the next two years, Liza aims to complete the CFA charter and step into a senior analyst role, leading larger portfolio projects. She is keen to specialize in ESG and impact investing,
    developing strategies that support sustainable growth for Puerto Rican enterprises. Long‑term, she envisions becoming a portfolio manager and eventually a Chief Investment Officer, shaping the firm’s
    investment philosophy to blend rigorous financial performance with social and cultural value creation. She also hopes to mentor junior analysts, especially women from under‑represented backgrounds,
    and to champion inclusive investment practices within the regional financial community.
