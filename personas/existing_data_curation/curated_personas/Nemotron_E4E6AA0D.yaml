personas:
  professional: Liza Sanchez is a senior investment analyst at a boutique firm, where they leverage advanced Excel, VBA scripting, and Python to construct detailed financial models and risk assessments,
    while their competitive edge drives them to outperform peers and their sociable nature makes client presentations lively and relationship‑building effortless.
  sports: Liza Sanchez combines a love for outdoor adventure and team sports, hiking the trails of El Yunque on weekends, catching early‑morning surf at Isla Verde, participating in salsa‑fit classes, and
    they cheer for San Juan FC soccer and the Puerto Rico Islanders baseball team, balancing high‑energy dance with endurance training to stay fit.
  arts: Liza Sanchez immerses themselves in San Juan’s vibrant art scene, attending contemporary openings featuring artists like Tania Bruguera and Jeff Koons, joining street‑art tours that showcase murals
    by local creator Vydia, and dancing to live salsa sets by Marc Anthony and Gilberto Santa Rosa, letting visual and musical expression fuel their creative outlook.
  travel: Liza Sanchez plans trips with a mix of detailed itineraries and spontaneous detours, favoring culturally rich destinations such as Oaxaca, Mexico, Lisbon, Portugal, and the coral reefs of Bonaire,
    while they stay budget‑conscious but are willing to splurge on boutique hotels that host art‑focused events and local culinary workshops.
  culinary: Liza Sanchez delights in cooking traditional Puerto Rican dishes like mofongo with garlic‑infused sofrito, lechón asado seasoned with adobo, and arroz con gandules, often experimenting by adding
    quinoa and kale for a modern twist, and they relish dining at farm‑to‑table eateries that feature fresh plantains, seafood, and locally sourced herbs.
  core: Liza Sanchez blends analytical rigor with artistic curiosity, competitive drive with sociable charm, and disciplined finance habits with a penchant for spontaneous surf sessions and salsa nights,
    and they approach life with relentless curiosity.
background:
  cultural: 'Liza is a third‑generation Puerto Rican born and raised in San Juan. She grew up in a bilingual household where Spanish and English were spoken interchangeably, and family gatherings centered
    around music, food, and the vibrant celebrations of festivals such as the San Sebastián Street Festival. Her upbringing immersed her in the island’s rich traditions of música plena, salsa, and art,
    which fostered an appreciation for cultural expression. These roots inform her professional ethos: a collaborative, community‑oriented approach, a resilient attitude shaped by the island’s history,
    and a commitment to leveraging finance as a tool for local development. While she navigates a globalized corporate environment, she maintains strong ties to her community through local volunteer work
    and a deep pride in Puerto Rican heritage.'
