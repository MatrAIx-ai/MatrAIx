personas:
  professional: Francis Jackson is a veteran small‑engine mechanic who leverages 25 years of hands‑on troubleshooting, welding, and basic CAD design to blend precise technical repairs with artistic customizations,
    while mentoring apprentices and planning to transform their shop into a community hub for creative builds.
  sports: Francis Jackson rides with the Marysville Cycling Club on weekend foothill routes, supports the San Francisco Giants, the Golden State Warriors, and the San Jose Sharks, and cuts a brisk figure
    in seasonal pick‑up basketball games at the community center, though they sometimes skip the post‑game stretch, resulting in sore calves.
  arts: Francis Jackson frequents local art fairs, sketches industrial landscapes inspired by the works of Edward Hopper and Ansel Adams, contributes set designs to their community theater group where they
    admire the comedic timing of Steve Martin, and unwinds listening to Tom Waits and folk‑blues guitarist John Fahey while sketching metal sculptures.
  travel: Francis Jackson prefers weekend road trips that balance scenic adventure with family time, having recently explored the granite cliffs of Yosemite and the vineyards of Napa, while dreaming of
    a spring bike tour through the Dutch tulip fields, yet they often postpone longer overseas journeys to Italy’s metalworking workshops due to school schedules and financial cautions.
  culinary: Francis Jackson enjoys grilling fresh Lake Oroville trout with lemon‑butter and rosemary, mastering smoky BBQ ribs seasoned with smoked paprika, and hosts potluck nights featuring fish tacos
    topped with cilantro and avocado, while their modest culinary skill is sometimes marred by a habit of over‑salting the grill.
  core: Francis Jackson is a 49‑year‑old engine whisperer whose love of metal art, community theater, and weekend cycling collides with a tendency to worry about finances and a habit of staying up late
    chasing moonlit photo opportunities.
background:
  cultural: Francis grew up in a predominantly white, working‑class community in California’s Central Valley. His family’s roots trace back to Midwestern farming families who moved west in the 1950s, bringing
    a strong ethic of self‑reliance, hard work, and community cooperation. The region’s agricultural rhythm and small‑town values have shaped his pragmatic outlook, while the proximity to the Sacramento
    art scene has exposed him to a diverse range of cultural expressions. He identifies with mainstream American cultural norms—celebrating holidays like Independence Day and Thanksgiving—but also embraces
    local traditions of county fairs, outdoor concerts, and volunteer fire‑department events. This blend of practical, community‑oriented heritage and an openness to creative experiences informs his worldview
    and daily life.
