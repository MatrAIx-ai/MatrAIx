  career_goals: His long‑term goal is to transition from day‑to‑day repairs to a leadership role that blends his mechanical knowledge with his creative interests. He hopes to open a small, community‑focused
    shop that offers both engine services and a workshop space where hobbyists can experiment with custom builds and art‑inspired projects. He is studying for a certified service manager credential to better
    oversee staff, improve workflow, and reduce his own stress. Over the next five years, Francis aims to mentor a formal apprenticeship program, increase his shop’s reputation for innovative, aesthetic
    modifications, and secure a financial plan that ensures stability for his family as he approaches retirement.
