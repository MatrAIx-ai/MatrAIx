personas:
  professional: Astrid Pagoada is a community‑focused home‑catering entrepreneur who leverages their practical budgeting acumen, bilingual communication, and event‑planning flair to deliver authentic island
    feasts, and they assertively mentor volunteers at the senior center.
  sports: Astrid Pagoada stays active by dancing salsa three nights a week at community gatherings, they participate in the local walking club 'Balcony Strollers', and they root passionately for the Metro
    Harbor Mariners baseball team while occasionally cheering on the Island Hurricanes women's volleyball squad.
  arts: Astrid Pagoada finds inspiration in the vibrant rhythms of El Gran Combo de la Salsa, the lyrical storytelling of Lin‑Manuel Miranda, and the bold colors of Frida Kahlo’s paintings, and they often
    weave these artistic influences into their crocheting projects and community workshops.
  travel: Astrid Pagoada prefers meticulously planned weekend getaways to historic coastal towns such as Old San Juan and Cartagena, they balance a love for cultural festivals with a modest travel budget
    and family duties, and they occasionally dream of a relaxing soak in Iceland’s Blue Lagoon when finances allow.
  culinary: Astrid Pagoada, a seasoned home chef, perfects classic arroz con gandules, pasteles, and lechón while experimenting with pineapple‑infused sofrito and garden‑fresh cilantro, and they delight
    in pairing their meals with a splash of local rum or a crisp Sauvignon Blanc.
  core: Astrid Pagoada blends pragmatic budgeting with a zest for cultural flavors, they tirelessly juggle community service, culinary experiments, and a quest for financial independence while occasionally
    hoarding coupon clippings and forgetting to water their balcony tomatoes.
background:
  cultural: Astrid grew up in Cataño, a coastal town within the San Juan metropolitan area, steeped in Puerto Rican culture. She speaks Spanish as her first language and is fluent in English, reflecting
    the island’s bilingual reality. Her upbringing was shaped by strong family ties, Catholic traditions, and vibrant community celebrations such as the Fiesta Patronal and the San Sebastián Street Festival.
    The rhythms of Caribbean music, the flavors of island cuisine, and the close‑knit neighborhood network have deeply influenced her values of hospitality, resilience, and communal support.
attributes:
  skills: '[''Traditional Puerto Rican cooking'', ''Household budgeting'', ''Event planning'', ''Basic home maintenance'', ''Balcony gardening'', ''Bilingual communication (Spanish/English)'', ''Caregiving'',
