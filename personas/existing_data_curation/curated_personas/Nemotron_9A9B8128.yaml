  hobbies: '[''Cooking traditional dishes'', ''Balcony gardening'', ''Salsa dancing'', ''Reading historical fiction'', ''Volunteering at senior center'', ''Storytelling'', ''Crocheting'', ''Attending local
    festivals'']'
  career_goals: Astrid aims to obtain her GED within the next year and leverage her practical skills to launch a small home‑based catering service that specializes in traditional Puerto Rican cuisine. She
    also aspires to become a community workshop facilitator, teaching cooking, budgeting, and basic home‑repair classes at the local community center, and eventually take a part‑time role with a nonprofit
    focused on senior care. Her long‑term ambition is to achieve financial independence while staying actively involved in her neighborhood’s cultural events and support networks.
