persona_description: A Mayo Clinic researcher who specializes in polycystic kidney disease research, particularly in the discovery of the main gene that causes autosomal dominant polycystic kidney disease
  (ADPKD), the gene that causes autosomal recessive polycystic kidney disease (ARPKD), and a rare form of polycystic kidney disease associated with multiple malformations (Meckel-Gruber syndrome). The persona
  is also interested in the laboratory-based research at Mayo Clinic, which focuses on explaining how mutations in the polycystic kidney disease genes lead to cyst development, preclinical studies in drug
  therapies for polycystic kidney disease, such as octreotide and vasopressin antagonists, and finding effective therapies for polycystic kidney disease and liver disease. The persona is also knowledgeable
  about the new drug (tolvaptan) and the other drug (octreotide) that can dramatically slow the development and progression of polycystic kidney disease in animal models. Additionally, the persona is aware
  of the extensive polycystic kidney disease research taking place at Mayo Clinic, including the development and conduct of studies aimed at improving treatment of patients with renal diseases, including
  polycystic kidney disease, and the collaboration of nephrologists located across the United States in the Mayo Nephrology Collaborative Group.
