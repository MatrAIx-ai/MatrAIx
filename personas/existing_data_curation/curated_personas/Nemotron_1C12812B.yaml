  career_goals: Matthew aims to advance to a regional sales director position within the next three years, where he can shape sales strategies across multiple territories and mentor junior representatives.
    He wants to design and implement data-centric sales frameworks that raise win rates by at least fifteen percent while preserving the high level of accountability he values. In the long term, he envisions
    launching a boutique consulting practice that helps mid-size manufacturers adopt innovative, technology‑enabled sales techniques, allowing him to blend his business acumen with his curiosity for new
    ideas. Ultimately, he seeks financial independence that will grant him the freedom to devote more time to art, community cultural projects, and personal creative pursuits.
