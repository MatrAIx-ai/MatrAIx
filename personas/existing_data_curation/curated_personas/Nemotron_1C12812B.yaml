personas:
  professional: A seasoned wholesale and manufacturing sales leader, Matthew Shelton (52) leverages data‑driven market analysis, strategic account management, and meticulous CRM‑based pipeline forecasting
    to drive multi‑million‑dollar contracts for industrial goods while quietly mentoring junior reps and championing process‑optimization initiatives across the Great Lakes region.
  sports: An understated Midwest sports enthusiast, Matthew Shelton (52) follows the Detroit Tigers and Red Wings avidly, joins a local hiking club for weekend treks on the Huron‑Manistee Trail, and participates
    in a modest adult softball league that meets on Saturday mornings at a community field.
  arts: A solitary visual‑arts aficionado, Matthew Shelton (52) spends weekends alone at the Detroit Institute of Arts and Ann Arbor galleries, curates a personal collection of mid‑century modern posters
    by designers like Charles and Ray Eames, paints watercolors to the sound of Beethoven’s piano sonatas, and reads art‑theory texts such as Gombrich’s 'The Story of Art' with an ever‑present leather‑bound
    journal.
  travel: An itinerant explorer with a penchant for quiet retreats, Matthew Shelton (52) plans meticulous road trips along Michigan’s Upper Peninsula, has completed photography expeditions to Glacier National
    Park, dreams of capturing the Scottish Highlands’ lochs, and favors destinations that offer both natural scenery and modest cultural institutions.
  culinary: A measured home chef, Matthew Shelton (52) favors lake‑caught whitefish grilled with fresh dill and lemon, crafts hearty root‑vegetable stews seasoned with rosemary and thyme, enjoys baking
    a classic Michigan cherry pie, and meticulously catalogs recipes in a spiral‑bound notebook, though they sometimes splurge on artisanal cheeses.
  core: Matthew Shelton (52) blends methodical sales expertise with a solitary passion for art, disciplined finances, and low‑key outdoor pursuits, navigating life with pragmatic precision, quiet curiosity,
    and an occasional indulgence in vintage posters and lake fish.
background:
  cultural: Matthew was raised in the Midwestern United States, growing up in a small town near Detroit. His white American heritage is steeped in the region's values of hard work, self‑reliance, and community
    involvement. Living in Brighton, Michigan, he is influenced by the area's manufacturing legacy, close‑knit neighborhoods, and the natural beauty of the Great Lakes region. He embraces a pragmatic, understated
    lifestyle while maintaining an openness to progressive ideas drawn from art and innovation. His cultural upbringing blends traditional Midwestern modesty with an appreciation for the evolving cultural
    scene of nearby metropolitan areas.
