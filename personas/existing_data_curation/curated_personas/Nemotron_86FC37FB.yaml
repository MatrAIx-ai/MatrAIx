personas:
  professional: Juan Lerma is a hands-on handyman and seasoned home cook who is turning his practical repair skills and bilingual community outreach into a part-time consulting service, while laying the
    groundwork for a home-based catering venture that blends authentic regional dishes with occasional fusion twists.
  sports: Juan Lerma enjoys leisurely walks through neighborhood parks, follows the local soccer team Austin FC, and occasionally joins an informal adult basketball pick-up league, preferring low-impact
    activity that accommodates occasional back discomfort while still providing social interaction.
  arts: Juan Lerma delights in classic noir films like "Double Indemnity," westerns such as "The Good, the Bad and the Ugly," and tunes into mariachi legends like Jose Alfredo Jimenez and folk performers
    such as Pedro Infante, while also attending community theatre's annual dance showcases.
  travel: Juan Lerma prefers short, budget-friendly road trips, has explored the historic streets of Oaxaca and the vibrant markets of San Miguel de Allende, and dreams of attending a culinary tour in Barcelona,
    but balances this wanderlust against the savings needed for the upcoming catering launch.
  culinary: Juan Lerma is a seasoned home chef who cultivates chilies, cilantro, and tomatoes in a modest garden, expertly prepares mole poblano, chiles rellenos, and tamales, and experiments with fusion
    flavors such as chipotle-infused pho, while also savoring classics like ceviche and mole verde.
  core: Juan Lerma is a practical yet worry-prone 49-year-old who blends hands-on repair expertise with a passion for authentic Mexican cooking, juggling community service, spontaneous creativity, and a
    lingering reluctance to stick to rigid plans.
background:
  cultural: Juan was raised in a Mexican‑American household, the son of immigrants who settled in the Washington, D.C. metro area. He grew up speaking Spanish at home, celebrating traditions such as Día
    de los Muertos, Las Posadas, and Sunday family meals featuring tamales and pozole. His Catholic upbringing adds a rhythm of church attendance and religious holidays to his life. Living in Springfield,
    VA, Juan maintains strong ties to the local Hispanic community, attending festivals at the Fairfax County Fairgrounds and participating in cultural exchange events at the community center. While he
    embraces American customs, his Mexican heritage remains central to his identity, influencing his cuisine, language, values of family loyalty, respect for elders, and a communal spirit.
