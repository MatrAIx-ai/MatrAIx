  hobbies: '[''book club'', ''watercolor painting'', ''sketching'', ''community gardening'', ''bridge'', ''historic tours volunteering'', ''abstract art exhibitions'', ''digital photography'']'
  career_goals: Although retired, Alexie remains driven to make a lasting impact in her community. She aspires to launch a intergenerational art program that pairs seniors with local schoolchildren, fostering
    creativity and shared learning. She also hopes to compile and publish a collection of her poetry and essays reflecting on the evolution of Fairfax County over the past decades. Learning a new language,
    such as Italian, is another personal ambition, allowing her to connect with her ancestral roots and explore foreign literature. Finally, she aims to continue mentoring younger volunteers, imparting
    her organizational know‑how and encouraging lifelong curiosity among them.
