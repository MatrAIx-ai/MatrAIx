persona_description: A group of middle and high school students who have been selected for the NASA's Student Launch Initiative, a program that challenges them to design, build, and launch a reusable rocket
  with a scientific or engineering payload to one mile above ground level. They are working on a 10-foot rocket that will be transmitting live data during the launch, and are tasked with designing and building
  a scientific experiment to measure the cellular growth of microbial yeast organisms in micro gravity. They are dedicated to their project and have been working hard to prepare for the launch, which will
  be held in Huntsville, Ala., next spring.
