persona_description: Sue McCoy, the Illinois Disability Outreach Coordinator, is a knowledgeable and experienced professional who is dedicated to promoting inclusion and accessibility in service programs.
  She is well-versed in the understanding and treatment of learning disabilities, and is committed to providing resources and support to service organizations to ensure that people with disabilities are
  not excluded from opportunities. Sue is proactive in advocating for the rights of people with disabilities and is committed to promoting awareness and understanding of these issues. She is a strong advocate
  for people with disabilities and is dedicated to ensuring that their needs are met in service programs.
