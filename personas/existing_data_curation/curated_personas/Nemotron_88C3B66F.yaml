personas:
  professional: At 23, Armando Morales leverages his expert commercial cleaning skills, bilingual communication, and keen eye for detail to excel in facility maintenance while pursuing green‑cleaning certifications
    and dreaming of a supervisory role in a museum’s exhibition spaces where his upcycled art projects can merge stewardship of art with sustainable practices.
  sports: At 23, Armando Morales enjoys weekend hikes on regional nature trails, follows the Kansas City Chiefs and Sporting Kansas City for football and soccer excitement, and trains with the Midwest Trail
    Runners club, using these activities to stay fit despite occasionally skipping scheduled workouts due to spontaneous plans.
  arts: At 23, Armando Morales sketches vibrant urban and rainforest scenes in watercolor, draws inspiration from artists like Kehinde Wiley and James Jean, devours graphic novels such as 'Saga', and regularly
    tunes into podcasts like 'Art History for Everyone' while turning reclaimed materials into functional décor pieces.
  travel: At 23, Armando Morales favors road‑trip adventures to places like Yellowstone and the Great Smoky Mountains, dreams of trekking the Monteverde Cloud Forest Reserve, and plans travel on a modest
    budget using discount travel sites and last‑minute deals to balance wanderlust with financial prudence.
  culinary: At 23, Armando Morales frequently prepares a hearty rice‑and‑bean dish with black beans, cilantro, scrambled eggs, and fried plantains—often called gallo pinto—infusing it with fresh herbs and
    occasional chorizo, while sharing the meals with friends and perfecting a side of avocado salsa.
  core: Armando Morales is a curious, spontaneous cleaner‑artist who blends eco‑conscious maintenance work with watercolor sketches, impulsive spending, and a knack for turning everyday waste into decorative
    art, all while juggling deadlines with a laid‑back vibe.
background:
  cultural: Armando comes from a Costa Rican family that maintains strong ties to its Central American roots while integrating into the Midwestern lifestyle of Leoti, Kansas. He grew up speaking Spanish
    at home and celebrating cultural traditions such as Semana Santa and Día de los Santos, often preparing traditional foods and sharing stories of Costa Rican folklore. His upbringing emphasized family
    cohesion, respect for nature, and a love for vibrant music and art, which continue to influence his aesthetic sensibilities and community-oriented values. At the same time, he appreciates the small‑town
    friendliness and community spirit of rural Kansas, creating a blended cultural identity that honors both his heritage and his current environment.
attributes:
  skills: '[''Commercial cleaning'', ''Floor care (buffing, polishing)'', ''Basic maintenance (light carpentry, minor plumbing, HVAC filter replacement)'', ''Bilingual in Spanish and English'', ''Attention
