  hobbies: '[''Sketching and watercolor painting'', ''Listening to art and philosophy podcasts'', ''Hiking and exploring nature trails'', ''Community clean‑up volunteering'', ''Cooking Costa Rican cuisine'',
    ''Reading graphic novels'', ''DIY upcycling projects'']'
  career_goals: Armando aims to earn certifications in green cleaning and facilities management within the next two years, positioning himself for a supervisory role in building maintenance. He is also
    interested in combining his artistic curiosity with his work by seeking a position in a museum or gallery where he can care for exhibition spaces while being surrounded by art. Long‑term, he envisions
    starting a small business that offers both professional cleaning services and handcrafted upcycled décor, allowing him to support his family financially while expressing his creativity.
