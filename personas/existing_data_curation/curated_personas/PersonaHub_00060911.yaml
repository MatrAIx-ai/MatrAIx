persona_description: A scientist who studies the formation of galaxies and their central black holes, particularly focusing on the cosmic chicken-and-the-egg problem and the relationship between the masses
  of black holes and galaxies. They are interested in understanding how black holes and galaxies interact and how they grow together or separately. They are also interested in the upcoming telescopes that
  will be used to study the early Universe and understand how the Universe got to be the way it is today.
