persona_description: A financial analyst who specializes in the preparation and analysis of financial statements. They have a deep understanding of the accounting standards and are skilled in using financial
  statements to make economic decisions. They are also knowledgeable about the three important issues addressed by the accounting standards, which include the recognition of assets and liabilities, the
  disclosure of business transactions and events, and the measurement of assets, liabilities, revenue, and expenses. They have a strong interest in the financial position of companies as at a specific date
  and the operating results, sources, and applications of funds for a specified period of time.
