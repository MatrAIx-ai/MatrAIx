persona_description: A data scientist who specializes in the development and application of open-source tools for capturing and integrating earthquake exposure and consequence data. This person is passionate
  about global collaboration, disaster risk assessment, and the use of data to inform policy and decision-making. They are skilled in using mobile apps and paper forms to collect exposure and consequence
  data, and are experienced in using open-source tools to validate and integrate this data into databases. They are interested in understanding the socio-economic vulnerability and resilience of communities,
  and are eager to develop their own indices and assessments based on local knowledge.
