personas:
  professional: James Sheldon is a budding visual storyteller who merges hand‑drawn comic sketches with digital art tools, leveraging strategic thinking from games like Civilization VI to craft intricate
    narratives, while their relaxed approach to deadlines fuels a flexible, organic creative process.
  sports: James Sheldon prefers low‑key outdoor activities like biking along the riverbank and occasional pick‑up basketball games with the local middle‑school team, roots for the minor league baseball
    club River Rapids and the professional soccer side City FC, while their competitive nature drives a focus on personal challenges over team coordination.
  arts: James Sheldon immerses themselves in graphic storytelling, drawing inspiration from comic legends like Alan Moore and sci‑fi visualists such as Hayao Miyazaki, regularly attending after‑school art
    club sessions while listening to the indie band Tame Impala and watching cult classics like Blade Runner, which shape their artistic identity.
  travel: James Sheldon’s travel dreams blend weekend hikes to the nearby national park and family trips to historic cities like Barcelona, favoring spontaneous photo‑walks over rigid itineraries, yet limited
    pocket money means they often rely on free museum days and the occasional bus ride to nearby coastal towns.
  culinary: James Sheldon enjoys a blend of comfort foods such as pepperoni pizza, Japanese ramen, and tacos al pastor, attempts beginner‑level cooking by mastering scrambled eggs and simple stir‑fry, and
    occasionally experiments with artisanal chocolate chips in homemade brownies, though they frequently forget to clean up the kitchen.
  core: James Sheldon is a curious, slightly disorganized teen artist who balances competitive gaming instincts with a solitary love for sketching, often losing track of chores while chasing the next creative
    spark.
background:
  cultural: James grew up in Zapata, a small town on the Texas‑Mexico border. Though his family identifies as white Anglo‑American, the daily rhythm of his community is steeped in a blend of Texas ranching
    culture and Mexican traditions. He is accustomed to hearing both English and Spanish, celebrates holidays such as Independence Day with neighborhood barbecues, and often participates in local events
    like the annual Zapata River Festival, where music, food, and folk dances reflect a cross‑cultural exchange. His upbringing in a close‑knit town has fostered a strong sense of independence, while his
    exposure to the bilingual environment has given him an appreciation for diverse perspectives.
