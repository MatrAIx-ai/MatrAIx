  hobbies: '[''Gardening (vegetables and herbs)'', ''Reading mystery novels'', ''Baking Southern pastries and pies'', ''Quilting and crocheting'', ''Puzzles and brain‑teaser games'', ''Walking in local
    parks and trails'', ''Attending church gatherings'', ''Volunteer work at community food pantry'', ''DIY home improvement projects'', ''Listening to classic rock and country music'']'
  career_goals: Anna aims to advance from a frontline cleaning role to a supervisory position within a larger hospitality or property‑management company, eventually overseeing a team of housekeepers. She
    is working toward earning a professional cleaning certification and hopes to launch her own small cleaning service focused on environmentally conscious practices, providing stable income for her family
    and mentoring younger workers.
