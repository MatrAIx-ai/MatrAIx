  career_goals: Freddie often talks about wanting to be a firefighter because he likes the idea of helping people in a clear, organized way. He also dreams of becoming a teacher, where he can share knowledge
    in a calm, predictable classroom. Occasionally, his spontaneous side leads him to imagine being an astronaut exploring new worlds, showing his love of imagination and flexibility.
