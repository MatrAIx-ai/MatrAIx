persona_description: A researcher and meteorologist who specializes in the field of severe weather forecasting using machine learning techniques. They have expertise in developing statistical models and
  random forest machine learning algorithms to predict severe weather events out to days 4-8. They are interested in exploring alternative methods for gathering features around observed events, including
  spatial averaging and time lagging, to improve the accuracy and reliability of their forecasts. They are also interested in comparing their forecasts with those generated by human forecasters at the Storm
  Prediction Center and evaluating their skill against climatology.
