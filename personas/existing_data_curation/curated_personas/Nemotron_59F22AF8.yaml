  career_goals: Amanda aims to move into a supervisory role within the next two years, seeking a shift‑lead position where she can apply her methodological strengths to mentor frontline staff. She plans
    to earn the Certified Packaging Professional credential and complete a short course in logistics management to broaden her qualifications. Long‑term, she hopes to secure a stable, well‑paid position
    that offers a clear path toward retirement while also exploring opportunities to consult on packaging efficiency for small local manufacturers.
