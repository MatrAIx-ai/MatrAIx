personas:
  professional: A seasoned packaging technician with three decades of fast‑paced plant experience, Amanda Barrett blends her methodical expertise in automated machine operation, OSHA compliance, and Lean
    fundamentals with a competitive drive to mentor staff, positioning herself for a supervisory role within two years.
  sports: An active community competitor, Amanda Barrett guards the paint for the Riverfront Rookies adult basketball team in Detroit’s local league, logs regular miles on foot along Belle Isle Park, and
    never misses a Detroit Lions Sunday matchup while cheering on the Pistons during the NBA season whenever schedule permits.
  arts: A soulful cultural participant, Amanda Barrett lifts her voice in the local church choir, curates a growing collection of vintage packaging boxes and label art that decorates her living room, and
    finds inspiration in the timeless works of Aretha Franklin, Stevie Wonder, and the Motown sound, often streaming these classics while stitching new label designs.
  travel: A calculated weekend explorer, Amanda Barrett plans modest road trips that balance adventure with budget, having already toured Mackinac Island’s historic streets and the jazz‑rich French Quarter
    of New Orleans, while eyeing a future journey to Asheville’s Blue Ridge art scene for its culinary and craft‑booth markets.
  culinary: A confident home chef, Amanda Barrett crafts classic soul‑food feasts—crispy fried chicken, buttery collard greens seasoned with home‑grown thyme, cheesy macaroni, and buttery cornbread—while
    weaving fresh basil and heirloom tomatoes from her balcony garden into vibrant side salads that keep friends gathering around her dinner table.
  core: A structured, community‑driven competitor, Amanda Barrett balances a meticulous work ethic with a love for group basketball, gospel singing, and vintage label collecting, all while battling a habit
    of over‑worrying that fuels both her precision and occasional stress.
background:
  cultural: Amanda’s cultural background is rooted in the African‑American community of Detroit, shaped by the legacy of the Great Migration and the city’s rich musical heritage of Motown and jazz. She
    grew up attending a historically Black public school and has always been involved in church and neighborhood events that celebrate Black history and resilience. Her culinary preferences reflect Southern
    soul traditions, and she takes pride in preserving family recipes. Growing up in a city known for its labor activism, she values hard work, solidarity, and the importance of mentoring younger workers,
    especially other Black women in industrial settings.
