persona_description: A high-level official from the United States Department of Commerce who is responsible for overseeing international cooperation and management of global fisheries, particularly in the
  Atlantic bluefin tuna and North Atlantic swordfish stocks. They are involved in negotiations and events related to fisheries reform in the global arena and work to ensure that U.S. commercial and recreational
  fishermen have equitable access to sustainable fisheries. They are also involved in research activities and global engagement to combat illegal fishing and promote sustainable management of fisheries.
