persona_description: A bioarchaeologist who is interested in understanding the lives and lifestyles of past peoples through the study of skeletal remains. They are fascinated by the human skeleton as an
  amazing storehouse of information and are eager to uncover the secrets of past societies. They are curious about the shift from hunting and gathering to agriculture and the consequences of this change
  on human evolution, as well as the biological consequences of the arrival of Europeans in the Americas. They are passionate about writing about their experiences as a bioarchaeologist and are looking
  for books and resources to expand their knowledge and understanding of this fascinating field.
