personas:
  professional: Steven Gross, a 4‑year‑old mini‑architect who spends afternoons building elaborate forts from couch cushions, channels his organized, methodical nature into carefully drawing floor plans,
    and delights in sharing his creations with friends at play dates; they love to explain each step like a tiny project manager.
  sports: Steven Gross, a lively 4‑year‑old who loves the local youth soccer league, cheers on the Portland Timbers, and hones coordination by sprinting through the sprinkler‑spattered backyard after weekend
    rain, while also practicing balance on a small climbing wall at the community center; they thrive on group games at the county fair’s inflatable arena.
  arts: Steven Gross, an enthusiastic preschool painter who idolizes Dr. Seuss illustrations, loves singing along to Disney’s Frozen soundtrack, spends weekends at library story hour drawing characters,
    and bursts into impromptu dance to Taylor Swift’s 'Shake It Off' after fairy‑tale readings; they often incorporate leaves and pine cones into their crafts.
  travel: Steven Gross, a curious explorer who has visited the Oregon State Fair and taken a family road trip to Crater Lake, and dreams of the giant redwoods of Redwood National Park and the bustling streets
    of Tokyo, preferring trips packed with hands‑on nature hikes and interactive museum exhibits; they love packing a tiny backpack with snacks and a favorite stuffed bear.
  culinary: Steven Gross, a budding kitchen helper who adores peanut butter‑banana sandwiches, loves scooping carrot sticks for a colorful snack plate, and can expertly sprinkle shredded cheese on their
    mac ’n’ cheese, though they often sneak extra gummy bears when no one’s watching; they enjoy helping their parents bake apple crisp for Thanksgiving.
  core: Steven Gross, a bright‑eyed, organized four‑year‑old who balances boundless curiosity with meticulous planning, worries about rainy days, and secretly hoards gummy bears in a hidden pocket.
background:
  cultural: Steven was raised in a middle-class white family living in Salem, Oregon. His parents emphasize community involvement, attending local events such as county fairs, farmers' markets, and library
    story hours. He celebrates typical American holidays—Thanksgiving, Christmas, and the Fourth of July—with family traditions that include seasonal meals, fireworks, and community service projects. The
    Pacific Northwest environment, with its emphasis on outdoor recreation and environmental stewardship, influences his weekend activities and his appreciation for nature.
