  career_goals: Steven dreams of becoming a firefighter or a construction worker, careers he admires for their hands-on problem solving and visible contributions to the community. He often talks about helping
    people, building things, and using big tools, reflecting his blend of curiosity and practicality. While his ambitions are still playful, he expresses a strong desire to learn more about how things work,
    to fix broken toys, and to be a big helper when he grows up.
