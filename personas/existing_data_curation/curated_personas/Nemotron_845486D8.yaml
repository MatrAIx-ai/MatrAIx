personas:
  professional: Charles Blackwell, a retired K‑12 educator turned curriculum consultant, leverages three decades of instructional design expertise and a methodical project‑management style to mentor novice
    teachers, craft grant‑ready proposals for adult literacy, and author practical guides, all while balancing curiosity for new pedagogies with a steadfast reliance on proven classroom practices.
  sports: Charles Blackwell enjoys low‑impact cardio through weekly hikes in the Cascade foothills and occasional bike rides along the Deschutes River, while cheering on the Portland Timbers and the Oregon
    Ducks, and participates in a community walking club affiliated with the Sisters Senior Center.
  arts: Charles Blackwell channels a quiet creative spirit through nature photography inspired by Ansel Adams, enjoys listening to John Denver and Bob Dylan while working on woodworking projects, and regularly
    attends the annual Sisters Outdoor Quilt & Yarn Festival, where they admire the quilts of local artisans.
  travel: Charles Blackwell favors measured road trips to nearby national treasures like Crater Lake and the Columbia River Gorge, plans each itinerary with detailed mileage charts, and harbors a long‑standing
    wish to explore the historic streets of Edinburgh while staying within a modest retirement budget.
  culinary: Charles Blackwell prefers hearty, farm‑to‑table meals such as cedar‑plank grilled trout with roasted wild mushrooms, pairs them with a glass of Oregon Pinot Noir, and often experiments with
    native Oregon herbs like sage and bitterroot in their modest kitchen, though they occasionally burn the edges of their famous cornbread during late‑night woodworking breaks.
  core: Charles Blackwell blends a lifelong curiosity for learning with a disciplined, solitary lifestyle, meticulously documenting hikes and curricula while wrestling with a persistent streak of worry
    that fuels both their competitive edge and meticulous planning.
background:
  cultural: Charles is a White American who grew up in a Midwestern farming community before relocating to the Pacific Northwest in his thirties. His upbringing emphasized self-reliance, hard work, and
    modesty—values that align with the small-town culture of Sisters, Oregon. He identifies with the regional legacy of outdoor recreation, conservation, and community stewardship, often participating in
    local festivals and volunteering with the town's historical society. His educational background and long-standing involvement in public schools have ingrained a belief in the civic importance of learning,
    while his Protestant family traditions have shaped a quiet, reflective disposition.
attributes:
  skills: '[''Curriculum Development'', ''Instructional Design'', ''Educational Assessment'', ''Adult Learning Facilitation'', ''Project Management'', ''Grant Writing'', ''Budget Planning'', ''Community
