personas:
  professional: Stephanie Sanford is a clinical psychologist who leverages her dual expertise in neurocognitive assessment and statistical modeling to design data‑driven, art‑integrated therapeutic programs
    for older adults, while juggling a relaxed schedule, occasional disorganization, and a competitive edge that drives her to secure a modest research grant for her envisioned interdisciplinary center
    in Columbus.
  sports: Stephanie Sanford is a loyal fan of the Columbus Blue Jackets and the Columbus Crew, participates in a sunrise walking club at the Scioto Mile during spring, practices gentle yoga twice a week,
    and joins a local senior tennis league each summer, preferring low‑impact activities that keep her mind sharp without the pressure of competitive performance.
  arts: Stephanie Sanford curates her own creative sanctuary by painting watercolor landscapes inspired by Mark Rothko’s color fields, assembling mixed‑media collages after visits to the Wexner Center for
    the Arts, and regularly attending intimate jazz concerts featuring the John Coltrane tribute trio at the Bluestone Lounge, while also appreciating classical works by Beethoven in small chamber recitals.
  travel: Stephanie Sanford favors spontaneous, scenic weekend road trips along Ohio’s byways to places like Hocking Hills State Park and the Amish Country, occasionally planning a longer adventure to the
    Tuscan countryside where they can sketch vineyards, but they avoid crowded tourist hotspots, opting instead for boutique B&Bs and quiet cafés.
  culinary: Stephanie Sanford delights in farm‑to‑table cooking, often tossing fresh basil, rosemary, and mint from her herb garden into a lemon‑garlic pasta or a Mediterranean quinoa salad, while their
    moderate cooking skill shines in mastering a silky watercolor‑like risotto, though they sometimes over‑season dishes in a quest for bold flavor.
  core: Stephanie Sanford is a curious, art‑loving psychologist who balances data‑driven therapy with watercolor brushes, embraces flexible routines, and quietly competes with herself to turn each weekend
    road trip into a canvas of new insights.
background:
  cultural: Stephanie identifies as a white American raised in the Midwest, where practicality, community service, and a strong work ethic are common values. Her family encouraged both scientific inquiry
    and artistic appreciation, leading her to pursue a STEM graduate degree before transitioning to psychology. Living in Columbus, Ohio, she engages with the city’s vibrant cultural scene while maintaining
    Midwestern tendencies toward modesty, self‑reliance, respect for personal space, and a balanced emphasis on intellectual rigor and creative expression.
attributes:
  skills: '[''Clinical Psychology (Adult & Geriatric)'', ''Neuropsychological Assessment'', ''Cognitive‑Behavioral Therapy (CBT)'', ''Statistical Modeling and Data Analysis (R, Python)'', ''Psychometric
    Test Development'', ''Art‑Integrated Therapy'', ''Research Design and Grant Writing'', ''Mentorship and Supervision'', ''Workshop Facilitation (Small Groups)'', ''Consultation for Mental‑Health Policy'']'
  hobbies: '[''Watercolor painting'', ''Mixed‑media collage'', ''Art gallery and museum visits'', ''Jazz and classical music concerts'', ''Philosophy & science non‑fiction reading'', ''Mindfulness meditation'',
    ''Herb gardening'', ''Jigsaw puzzles'', ''Scenic weekend road trips (small group)'', ''Writing reflective essays for a literary journal'']'
  career_goals: Stephanie aims to establish an interdisciplinary center in Columbus that merges psychology, neuroscience, and visual arts to enhance mental well‑being for older adults. She plans to publish
    a monograph on art‑based interventions for cognitive resilience, secure a modest research grant, mentor a cohort of emerging psychologists, and serve on a state mental‑health advisory board. While valuing
    flexibility over rigid schedules, she prefers part‑time consulting and occasional speaking engagements that allow her to maintain influence without sacrificing her preference for low‑key, purposeful
    work.
