personas:
  professional: Joann Hein, a seasoned administrative specialist with three decades of experience in small-town government, blends meticulous record‑keeping with a flexible, curiosity‑driven approach that
    lets them quickly adopt new digital filing systems while casually mentoring junior staff.
  sports: Joann Hein, a fond admirer of the Oregon Ducks football team, spends their mornings on the Malheur River trail with the High Desert Senior Walking Club, and occasionally joins a gentle yoga class
    at the community center to stay limber.
  arts: Joann Hein, an avid reader of historical fiction and a dedicated quilt maker, finds inspiration in the folk melodies of Joan Baez, the stage productions of the Oregon Shakespeare Festival, and the
    paintings of local watercolorist Nancy Frizzell, weaving these artistic threads into their own creative projects.
  travel: Joann Hein, who prefers low‑key road trips over crowded tours, often drives the scenic Highway 395 to explore the high desert and the Oregon coast, and they have a bucket‑list destination of Crater
    Lake National Park with a dream of visiting Portland’s historic Pearl District.
  culinary: Joann Hein, a skilled home baker, favors pie recipes like blackberry crumble and rhubarb custard, often seasons roasted carrots and potatoes with rosemary and thyme, and they enjoy sourcing
    ingredients at the Bend farmers’ market for their community gatherings.
  core: Joann Hein, a 62‑year‑old garden‑loving administrator, blends curiosity, flexibility, and quiet generosity into a life of careful stewardship, creative crafting, and modest community involvement,
    and they approach each day with a calm, methodical rhythm.
background:
  cultural: Joann was born and raised on a family farm in eastern Oregon. Her ancestry is primarily Northern European—German, Irish, and a hint of French‑Canadian through the Chachere line—reflecting the
    settlement patterns of the region. The community’s culture emphasizes self‑reliance, neighborly cooperation, and a deep respect for the surrounding high‑desert landscape. She grew up attending a Protestant
    church, celebrating traditional American holidays, and taking part in the annual county fair. These experiences have instilled a modest, courteous demeanor and a strong sense of community responsibility,
    while her curiosity has kept her open to new ideas and modest modern influences.
