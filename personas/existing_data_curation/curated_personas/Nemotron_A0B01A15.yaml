  career_goals: Approaching retirement, Joann intends to remain a valued member of her workplace by transitioning into a mentoring role where she can share institutional knowledge with younger staff. She
    hopes to deepen her digital‑filing expertise and obtain a short certification in records management, positioning herself as a senior administrative specialist. Simultaneously, she would like to volunteer
    part‑time at the local historical society, assisting with archiving documents and organizing community events. Her overarching ambition is to preserve the smooth operation of her office while contributing
    to the cultural life of her town, all on a schedule that respects her desire for flexibility and personal time.
