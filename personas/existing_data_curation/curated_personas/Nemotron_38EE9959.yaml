personas:
  professional: Maria Rogers, a material mover and freight stocker at a Fayetteville distribution center, they blend hands‑on curiosity with disciplined safety protocols, excel at forklift operation, inventory
    software, and team training, and are already drafting process‑improvement plans that pair innovative tech with proven methods.
  sports: Maria Rogers, an avid participant in a co‑ed softball league and regular line‑dancer at the community center, they hit the trails at Carvers Creek State Park on weekends, cheer for the Arkansas
    Razorbacks and the Fayetteville Woodpeckers, and log three to four weekly cardio sessions to stay game‑ready.
  arts: Maria Rogers, who frequents live‑music nights at The Drome and The Stone, they enjoy the storytelling of Zac Brown Band and the soulful blues of Gary Clark Jr., practice line‑dancing to classic
    country hits like Luke Combs, and support local theater productions at TheatreSquared.
  travel: Maria Rogers, a weekend‑oriented explorer, they map out road‑trip itineraries months in advance, enjoy short getaways to Hot Springs, Memphis, and the Ozark National Forest, balance adventure
    with relaxation by hiking sunrise trails and sampling local BBQ, and dream of driving to the Grand Canyon once their savings for a home purchase are solidified.
  culinary: Maria Rogers, an enthusiastic home cook, they master Southern comfort staples like fried chicken, shrimp and grits, collard greens, and banana pudding, experiment with homemade biscuits using
    buttermilk and sage, and host pot‑luck gatherings where they proudly serve their signature sauce‑smothered pork ribs.
  core: Maria Rogers, a pragmatic yet curious 27‑year‑old warehouse professional, they juggle a hands‑on career with a love for community fitness, Southern cooking, and relentless goal‑setting, all while
    occasionally hoarding spare wood for DIY projects and impulsively buying the latest power tools.
background:
  cultural: Maria was raised in Fayetteville, North Carolina, in a working‑class, white family with deep Southern roots. Her upbringing emphasized hospitality, community involvement, and a strong work ethic,
    values reinforced by the nearby Fort Bragg military community. She attended a public high school, participated in church youth groups, and celebrated regional traditions such as BBQ cookouts and country‑music
    festivals. While she cherishes these Southern cultural elements, her curiosity and daily interactions with a diverse workforce have broadened her appreciation for multicultural perspectives, especially
    within the logistics field.
attributes:
  skills: '["Forklift operation", "Pallet jack operation", "Inventory tracking", "Warehouse management software usage", "Safety compliance and training", "Physical stamina and endurance", "Team coordination
