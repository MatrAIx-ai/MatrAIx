  hobbies: '["Playing softball in a local co-ed league", "Line dancing classes at the community center", "Volunteering at the Fayetteville Food Bank", "Cooking Southern comfort meals for friends and family",
    "Hiking on nearby trails", "DIY home improvement projects", "Learning basic woodworking", "Attending live music events at local venues"]'
  career_goals: Maria aims to move into a supervisory role within the next three to five years. She plans to earn a Certified Forklift Operator credential and complete a community‑college certificate in
    logistics and supply chain management. Her long‑term ambition is to become a warehouse supervisor or logistics coordinator, where she can lead a team, implement safety and efficiency programs, and contribute
    to strategic planning. She also hopes to secure a stable financial foundation for her family, including home ownership and savings for future education.
