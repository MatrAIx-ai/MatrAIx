  career_goals: Although she is formally retired, Sandra seeks to remain an active contributor to her community. Her primary ambition is to serve on the local school board or advisory committee, where she
    can influence policy and support innovative teaching methods. She also aims to lead a regional arts-and-crafts club for seniors, organize traveling exhibitions of local art, and mentor young teachers
    through a retired‑educators program. On a personal level, she plans to complete a series of online courses in art history and sustainable gardening, and to document her family history for future generations.
