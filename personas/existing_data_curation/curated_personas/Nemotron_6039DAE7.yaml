  hobbies: '[''building LEGO sets'', ''exploring woods and streams'', ''collecting rocks, leaves, and insects'', ''reading adventure books (Magic Tree House series)'', ''playing soccer'', ''participating
    in Cub Scouts'', ''drawing comic‑style pictures'', ''simple science experiments'', ''educational video games with puzzles'']'
  career_goals: Troy dreams of a future where he can protect his community and the natural world. He is fascinated by the idea of becoming a firefighter or other first‑responder because it combines practical
    problem solving with helping others. At the same time, his love of exploring the woods and learning about animals fuels an ambition to work in wildlife conservation or as a park ranger. He hopes to
    continue learning new skills, stay reliable and kind, and eventually take on a role that lets him use his curiosity and practical abilities to serve others.
