personas:
  professional: A budding LEGO architect and aspiring junior engineer, Troy Gaddy merges curiosity with practicality by meticulously constructing vehicle models, recording each build step in a notebook
    to share with his Cub Scout group, and reliably finishing projects on schedule.
  sports: An energetic team player, Troy Gaddy practices with the Oak Tree Rangers youth soccer club, cheers for the state's professional soccer team Capitol City United on TV, and balances on‑field competition
    with courteous support for teammates.
  arts: A creative comic enthusiast, Troy Gaddy sketches superhero scenes inspired by Stan Lee's Spider‑Man and the kid‑friendly adventures of Adventure Time, curates a vibrant sketchbook, and eagerly trades
    drawings with friends during Cub Scout meetings.
  travel: An adventurous explorer, Troy Gaddy spends weekends wandering the pine‑filled trails and babbling streams of the nearby Green Valley State Forest, and has eagerly saved for a family road‑trip
    to Yellowstone National Park, balancing his love of nature with his parents’ budget constraints.
  culinary: A budding chef, Troy Gaddy loves building homemade pizzas topped with pepperoni and olives, relishes classic peanut‑butter‑and‑jelly sandwiches, and experiments with simple science‑kitchen projects
    like making rock candy, though they often sneak extra cookies before dinner.
  core: Troy Gaddy is a curious, organized 7‑year‑old who balances building elaborate LEGO creations with outdoor adventures, caring teamwork, and occasional candy‑stained fingers.
background:
  cultural: Troy was raised in Adams, Wisconsin, a small, predominantly white Midwestern community where agriculture, local schools, and community gatherings shape daily life. His family attends a local
    Lutheran church and participates in county fairs, Fourth of July parades, and seasonal harvest celebrations. The community places value on hard work, modesty, respect for nature, and helping neighbors,
    which aligns with Troy’s cooperative and considerate personality. He experiences the typical Midwest values of friendliness, practicality, and a strong connection to the surrounding rural landscape.
