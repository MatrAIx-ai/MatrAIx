personas:
  professional: Alicia Hubbard, a seasoned elementary and middle‑school educator in Garden City, Kansas, leverages methodical lesson planning, data‑driven assessment, and imaginative arts‑integration to
    cultivate inclusive classrooms while mentoring new teachers and championing mental‑health resources for staff.
  sports: Alicia Hubbard, a devoted fan of the Kansas City Chiefs and the Kansas City Royals, participates in a local senior walking club, practices yoga twice weekly at the community center, and joins
    a community softball league in the summer, balancing her love for gentle activity with occasional competitive spirit.
  arts: Alicia Hubbard, an avid watercolorist, poet, and speculative‑fiction enthusiast, draws inspiration from Georgia O’Keeffe, Frida Kahlo, and N.K. Jemisin, regularly contributes to the Garden City
    storytelling circle, and curates a personal library of works by Octavia Butler and Toni Morrison that inform her creative workshops.
  travel: Alicia Hubbard, with a modest travel budget, prefers road trips to Midwestern gems like Tallgrass Prairie and the Ozarks, dreams of a heritage pilgrimage to Ghana, revisits New Orleans for jazz
    and culinary exploration, and treasures a yearly family vacation to the Great Smoky Mountains.
  culinary: Alicia Hubbard, a passionate home cook, transforms classic soul‑food staples such as collard greens, black‑eyed peas, and sweet‑potato casserole into lighter, garden‑fresh dishes using herbs
    like sage and lovage, often pairing them with roasted okra or a quinoa‑based jambalaya.
  core: Alicia Hubbard blends disciplined organization with boundless imagination, channeling anxiety into artistic expression, community mentorship, and a lifelong quest to honor heritage through education,
    art, and garden‑to‑table cuisine.
background:
  cultural: Alicia grew up in a close‑knit African‑American family in the Midwest, where church, music, and storytelling were central to daily life. Her parents emphasized education as a path to empowerment,
    a value she upheld throughout her teaching career. In Garden City, Kansas, she has been an active member of the local NAACP chapter and a volunteer at the community center, where she leads workshops
    on African‑American art and history for students and adults alike. She incorporates cultural traditions—such as celebrating Juneteenth in the classroom and featuring works by Black authors—to foster
    pride and representation. Alicia’s lived experience of navigating predominantly white schools while preserving her heritage informs her commitment to inclusive pedagogy and community advocacy.
attributes:
  skills: '["Curriculum design", "Differentiated instruction", "Classroom management", "Art integration", "Project‑based learning", "Assessment design and data analysis", "Educational technology (Smartboard,
    LMS)", "Mentoring new teachers", "Parent and community communication", "Cultural competency and inclusive curriculum"]'
  hobbies: '["Watercolor painting", "Poetry writing", "Reading speculative fiction", "Gardening native Kansas plants", "Quilt‑making", "Community storytelling circles", "Yoga and meditation", "Cooking soul‑food
    with healthy twists", "Volunteer tutoring for adults", "Genealogy research"]'
  career_goals: As she approaches retirement, Alicia aims to leave a lasting impact by developing a district‑wide mentorship program for early‑career teachers and spearheading an arts‑integration curriculum
    initiative that emphasizes imagination and cultural relevance. She aspires to author a children’s book that blends storytelling with science concepts, and to serve as an adjunct instructor at a community
    college, sharing her expertise with future educators. Additionally, she seeks to advocate for mental‑health resources for teachers, drawing on her own experiences of anxiety to promote supportive school
    cultures.
