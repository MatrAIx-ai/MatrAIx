persona_description: An engineer with expertise in dielectric elastomer generators (DEGs) and wave energy converters (WECs). They are currently investigating and developing innovative concepts for DEG-based
  WECs, focusing on the polymeric oscillating water column (poly-OWC) as the most promising technology. They have conducted experiments to validate the energy capturing abilities of the poly-OWC device
  and are now developing a larger scale model for long-term tests in a 3D wave tank to assess scalability issues. They are also interested in investigating lifetime performance and degradation issues of
  DEGs operating in marine environmental conditions and manufacturing large DEGs for use in various applications.
