    and oral history preservation'', ''Cultural event planning (Colombian festivals)'']'
  hobbies: '[''Walking on the beach'', ''Gardening (herbs, citrus, tropical flowers)'', ''Traditional Colombian cooking'', ''Knitting and crocheting'', ''Reading (Colombian literature, historical novels)'',
    ''Listening to Colombian music (Cumbia, Vallenato, Latin jazz)'', ''Gentle yoga and meditation'', ''Volunteering (reading to children, senior center assistance)'', ''Video calling with family'', ''Curating
    family photos and oral histories'']'
  career_goals: Jacqueline’s ambition is less about professional advancement and more about personal and community enrichment. She plans to launch a weekly Colombian cooking workshop at the Delray Beach
    senior center, sharing recipes and stories that connect older and younger participants. She hopes to compile a family cookbook that blends Colombian flavors with South Florida produce, preserving memories
    for future generations. Learning watercolor painting has sparked her curiosity, and she intends to take a beginner’s class at the local art center, applying her practical approach to keep the hobby
    sustainable. She also aspires to mentor recent Colombian immigrants, offering language support and cultural guidance, and to travel back to Colombia every few years to reconnect with relatives and attend
    regional festivals. Maintaining her health through gentle yoga, daily walks on the beach, and mindfulness practices remains a central goal.
