  skills: '[''Home budgeting'', ''Household organization'', ''Dry‑land gardening'', ''Quilting and needlework'', ''Art appreciation and evaluation'', ''Basic computer literacy'', ''Volunteer coordination'']'
  hobbies: '[''Gardening'', ''Reading historical novels'', ''Watercolor painting'', ''Quilting and embroidery'', ''Birdwatching'', ''Listening to jazz and country music'', ''Visiting local galleries and
    community theater'']'
  career_goals: Although retired, Jeanee Rose aims to deepen her knowledge of regional folk art by attending workshops at the local community center and eventually curating a modest exhibit of local crafts
    at her church. She wishes to document her family’s multi‑generational story in a memoir that preserves local history. She also hopes to mentor younger volunteers in the community garden, passing on
    sustainable gardening techniques. Travel within Texas to historic sites and participation in the annual Austin Art Festival are personal aspirations she hopes to fulfill while maintaining her independence
    and health.
