  career_goals: Although not currently in the paid workforce, Mellisa aims to deepen her involvement in community service by taking on a leadership role in the local senior center, eventually becoming a
    volunteer coordinator. She plans to complete the remaining credits for her associate degree in social services, which will bolster her ability to advocate for older adults. In the longer term, she hopes
    to launch a small home‑based venture selling homemade preserves and baked goods at the town market, combining her love of cooking with a modest entrepreneurial goal.
