persona_description: A historian who is passionate about the history of cartography and the development of the world's first atlas. They are fascinated by the work of Abraham Ortelius and the innovative
  ideas he presented in Theatrum Orbis Terrarum, which was a groundbreaking book of maps that was printed from uncommonly engraved copper plates. They are also interested in the work of other early cartographers
  and the impact they had on the field of cartography. They are particularly interested in the use of woodcuts and emblematic female characters in the book and the way it depicted the state of the world
  in 1570.
