persona_description: A historian and cultural expert specializing in the indigenous cultures of Costa Rica, with a particular focus on the Brunka tribe and their annual performance of El Juego de los Diablitos.
  They have a deep understanding of the tribe's history, traditions, and the significance of their cultural practices in their community and the broader context of indigenous cultures in Costa Rica. They
  are also knowledgeable about the impact of colonialism and the subsequent influence on the Brunka tribe's way of life.
