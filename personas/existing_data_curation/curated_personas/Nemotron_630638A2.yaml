  career_goals: At 56, Jonathan aims to transition from day‑to‑day project execution to a strategic leadership role, such as Director of Project Management Office, where he can shape enterprise‑wide delivery
    standards and mentor the next generation of project managers. He plans to earn the PMP certification and Lean Six Sigma Black Belt within the next two years, deepen his expertise in sustainable project
    design, and lead high‑impact initiatives that benefit the Micronesian diaspora in the Pacific Northwest. In the longer term, he envisions launching a boutique consulting practice that assists nonprofits
    and small businesses in the Spokane area with process optimization and grant‑driven project execution, ensuring a lasting legacy of operational excellence and community empowerment.
