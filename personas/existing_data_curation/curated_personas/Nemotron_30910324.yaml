personas:
  professional: Raymond Nepi, a 38‑year‑old technical help‑desk specialist, blends meticulous troubleshooting of consumer electronics with a patient, cooperative demeanor that makes him a go‑to problem‑solver
    for colleagues, while his love of routine keeps him thriving in structured ticket‑based workflows despite a tendency to let paperwork pile up when obligations feel overwhelming.
  sports: Raymond Nepi, an avid weekend hiker and casual cyclist, follows the Portland Timbers and Portland Trail Blazers religiously, participates in a local adult softball league on Saturdays, and maintains
    fitness primarily through trail runs in the Columbia River Gorge, though they often skip formal gym sessions in favor of spontaneous outdoor activity.
  arts: Raymond Nepi, a classic‑rock aficionado who frequently spins Led Zeppelin and Fleetwood Mac on vinyl while sipping pour‑over coffee, enjoys attending Portland’s independent film screenings featuring
    directors like Jim Jarmusch, and revisits the works of local ceramic artist Jason Beaupre, finding solace in the tactile connection between art and his own woodworking.
  travel: Raymond Nepi prefers low‑key road trips that combine scenic hikes with culinary stops, having recently explored the waterfalls of Olympic National Park and the vineyards of Sonoma Valley, while
    dreaming of a future adventure to the Cinque Terre coast, but budget constraints keep international travel on the back‑burner.
  culinary: Raymond Nepi, a competent home cook, loves crafting hearty lasagna layered with ricotta, mozzarella, and fresh basil, perfecting espresso‑infused tiramisu for family gatherings, and regularly
    experiments with cold‑brew coffee using single‑origin beans, though they often forget to defrost the meat for Sunday roasts, leading to last‑minute takeout.
  core: Raymond Nepi balances a methodical, service‑oriented mindset with a love of spontaneous outdoor escapades, a habit of misplacing tools and bills, and an undercurrent of anxiety that fuels both meticulous
    care for others and occasional over‑thinking.
background:
  cultural: Raymond grew up in a middle‑class family in the Pacific Northwest. His heritage traces back to European (primarily Italian) ancestors, which is reflected in family gatherings centered around
    food and hospitality. Living near Vancouver, WA, and the greater Portland area, he has absorbed the region’s outdoors‑oriented lifestyle, coffee‑house culture, and community‑focused values. He celebrates
    typical North American holidays such as Thanksgiving and Christmas while also enjoying cooking dishes inspired by his Italian roots and participating in local cultural events.
