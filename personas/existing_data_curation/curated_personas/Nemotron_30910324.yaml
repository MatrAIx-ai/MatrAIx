  career_goals: Raymond aims to secure a full‑time role that offers clear structure and predictable responsibilities, such as a technical help‑desk or administrative support position within a supportive
    organization. He plans to complete his associate degree or earn an IT certification (e.g., CompTIA A+ or Google IT Support) to solidify his technical foundation. In the longer term, he hopes to leverage
    his hands‑on expertise to start a modest home‑maintenance business or become a community liaison that blends his problem‑solving skills with his desire to help others while providing a stable income
    and routine.
