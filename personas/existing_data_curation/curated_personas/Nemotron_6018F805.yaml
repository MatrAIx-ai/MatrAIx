personas:
  professional: Candido Lopez is a 17‑year‑old high school student who spends free evenings assembling computers, debugging code in Python and JavaScript, and contributing modest patches to open‑source
    gaming mods, blending a relaxed, cooperative nature with a detail‑oriented mindset, and they aim to pursue future roles as a software developer or technical support specialist serving small, community‑focused
    businesses.
  sports: Candido Lopez regularly skate‑boards at the Riverside Skate Park in Queens, enjoys casual basketball at the local recreation center, and is an avid fan of the New York Knicks, New York Rangers,
    and NYC FC, cheering for the teams while they prefer solo practice sessions over large team sports.
  arts: Candido Lopez spends weekends drawing manga‑style characters using a digital tablet, drawing inspiration from Studio Ghibli and the anime My Hero Academia, while their playlists feature reggaeton
    star Bad Bunny, cumbia legend Grupo Niche, and traditional folk rhythms that shape their creative mood, and they often stay up late editing their art for online communities.
  travel: Candido Lopez prefers spontaneous, low‑cost trips, having explored Manhattan’s museums and taken a family weekend getaway to Atlantic City, they hope to someday visit Japan for a manga pilgrimage
    and Italy’s coastal towns to taste fresh seafood dishes, but budget constraints and upcoming exams often keep their travel plans in the planning stage.
  culinary: Candido Lopez loves cooking with their mother, experimenting with homemade empanadas filled with spiced meat, fresh ceviche using lime, cilantro, and chili, and has a growing skill set that
    includes mastering proper dough folding techniques, while they frequently improvise flavor combos using plantains, corn masa, and imported sauces to create fusion snacks for friends.
  core: Candido Lopez is a curious, relaxed teen who blends tech tinkering, digital art, and family cooking into a harmonious but sometimes disorganized lifestyle, constantly balancing worries with a cooperative
    spirit and an appetite for creative problem‑solving, and they often seek out new projects to stay motivated.
background:
  cultural: Candido was born to Ecuadorian parents who migrated to New York before his birth. He grew up in a bilingual household in Queens, speaking Spanish at home and English at school. Family gatherings
    feature traditional foods such as locro, ceviche, and empanadas, and celebrations include Día de los Reyes and Carnaval with music and dance. His cultural identity blends Andean values of close‑knit
    family, respect for elders, and communal support with the multicultural vibrancy of Queens, where he interacts with peers from many backgrounds. He attends a local Catholic parish with his family, reinforcing
    his sense of community and responsibility to help others, and his heritage influences his love for food, music, and his desire to give back to the immigrant community through technology.
