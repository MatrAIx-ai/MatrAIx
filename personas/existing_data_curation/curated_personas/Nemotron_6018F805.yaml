  career_goals: Candido aims to turn his curiosity for technology into a career as a software developer or technical support specialist, eventually creating tools that help small businesses in immigrant
    communities. He also dreams of preserving his family's culinary heritage by studying culinary arts and possibly opening a modest food stall offering Ecuadorian specialties. He plans to attend a community
    college or vocational program after high school to earn certifications in IT and culinary fields, seeking a role that balances creative problem‑solving with people‑focused service and allows him to
    support his family while staying true to his cooperative nature.
