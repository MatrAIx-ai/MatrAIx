personas:
  professional: Mineshkumar Dangra, a 78‑year‑old master carpenter, blends five decades of expertise in traditional joinery, custom furniture design, and home‑renovation with a love for spontaneous problem‑solving,
    guiding apprentices with patient yet assertive mentorship while managing part‑time projects that honor heritage‑home restoration and community values.
  sports: Mineshkumar Dangra stays active by walking with the Edison Senior Walking Club, playing weekly badminton at the senior center, and cheering on the New York Giants during football season and the
    New York Yankees in summer, preferring low‑impact activities that accommodate his knee osteoarthritis.
  arts: Mineshkumar Dangra’s artistic life revolves around listening to Lata Mangeshkar’s classic Bollywood songs, the soulful qawwalis of Nusrat Fateh Ali Khan, and devotional bhajans at the Gurdwara,
    while occasionally watching Amitabh Bachchan’s iconic films and supporting the local Sikh Cultural Arts Society’s folk‑dance events.
  travel: Mineshkumar Dangra favors modestly planned pilgrimages and family trips, having journeyed to Amritsar’s Golden Temple, the bustling streets of New Delhi, and a nostalgic road‑trip through the
    Niagara region, while dreaming of a leisurely summer cruise to the Canadian Rockies and a cultural tour of historic sites in England when his health and finances allow.
  culinary: Mineshkumar Dangra delights in preparing authentic Punjabi fare—soft whole‑wheat roti, butter chicken rich with tomatoes, ghee, and garam masala, and fragrant sarson da saag cooked with mustard
    greens and mustard oil—cooking with a practiced hand that balances meticulous measurement and occasional spontaneous spice experiments inspired by his garden’s bounty.
  core: Mineshkumar Dangra navigates life with a carpenter’s precision tempered by spontaneous bursts of creativity, structuring his days around a garden and a workshop while gifting generous family feasts,
    yet occasionally losing track of appointments amid his love for building tiny wooden motifs.
background:
  cultural: Mineshkumar Neelesh Dangra is a first-generation immigrant from the Punjab region of India who grew up in a family that valued skilled craftsmanship. He maintains strong ties to his cultural
    heritage through language (fluent in Punjabi and English), religious practice at the local Gurdwara, and participation in community festivals such as Vaisakhi, Diwali, and Raksha Bandhan. The Indian
    emphasis on family cohesion and respect for elders shapes his daily life, while the multicultural environment of Edison, NJ, has broadened his outlook, allowing him to blend traditional Indian values
    with American work ethic and community involvement.
