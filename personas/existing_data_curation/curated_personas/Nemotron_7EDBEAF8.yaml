  hobbies: '[''Vegetable gardening'', ''Cooking traditional Punjabi dishes'', ''Listening to bhajans and classic Bollywood music'', ''Playing bridge'', ''Attending Vaisakhi and Diwali celebrations'', ''Walking
    in local parks'', ''Building wooden decorative models'']'
  career_goals: Although approaching retirement, Mineshkumar aims to keep working part-time to stay physically active and mentally engaged. He plans to pass his carpentry business to his son while documenting
    his woodworking techniques in a handwritten guide for future generations. He hopes to secure a few heritage-home restoration contracts that allow him to apply his traditional skills, and he wants to
    organize a quarterly workshop at the local cultural center where he can teach basic carpentry to community youth. Maintaining his health so he can continue contributing to his family and neighborhood
    remains his top ambition.
