    and active listening'']'
  hobbies: '[''Fishing'', ''Classic car restoration'', ''Listening to blues and jazz'', ''Reading historical biographies'', ''Cooking family meals'', ''Woodworking'', ''Attending church services'', ''Gardening'']'
  career_goals: Matthew aims to transition into a regional logistics coordinator or fleet manager role where he can blend his driving expertise with strategic planning. He plans to obtain the Certified
    Transportation Professional (CTP) credential and eventually launch a modest independent trucking operation that offers personalized service to local businesses. Mentoring new drivers and fostering a
    safety‑first culture are also important to him, as is ensuring steady financial security for his family while preserving the flexible work rhythm he values.
