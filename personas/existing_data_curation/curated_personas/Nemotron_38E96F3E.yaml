  career_goals: Anna aspires to move into a leadership role within her call center, such as Customer Service Team Lead or Quality Assurance Analyst, where she can champion employee well‑being and service
    excellence. She plans to earn a Certified Customer Service Manager credential and may pursue an associate degree in Business Administration to solidify her management foundation. Combining her passion
    for art with her professional expertise, she hopes to coordinate community outreach or visitor‑experience programs for a local museum or cultural institution, eventually creating a hybrid position that
    merges customer support leadership with arts programming. Long‑term, she envisions mentoring a new generation of service professionals while fostering cultural enrichment in her community.
