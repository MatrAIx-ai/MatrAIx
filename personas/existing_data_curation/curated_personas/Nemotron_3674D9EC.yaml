  hobbies: '[''Art gallery visits'', ''Theater attendance'', ''Gardening'', ''Knitting and crocheting'', ''Book club (historical fiction & poetry)'', ''Volunteer work at senior center'', ''Bird watching'',
    ''Genealogy research'', ''Southern cooking'', ''Yoga for stress relief'']'
  career_goals: Although retired, Suzanne aims to channel her organizational talents into creating an intergenerational community garden that brings together seniors and schoolchildren. She is eager to
    become a docent at the Henderson County Heritage Museum, sharing her love of art and local history with visitors. Suzanne also hopes to complete a memoir documenting her family’s Appalachian roots,
    and to learn digital photography so she can capture the natural beauty of the Blue Ridge Mountains. Additionally, she aspires to advocate for senior-friendly services in Arden, working with local officials
    to improve transportation and social programming for older adults.
