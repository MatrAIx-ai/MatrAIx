  career_goals: At 80, Bharat aims to leave a meaningful legacy by compiling his memoirs, focusing on his journey through engineering, art, and cultural adaptation. He hopes to launch a community garden
    paired with an outdoor sculpture series that reflects his South Asian heritage and Texan surroundings. Additionally, he wishes to mentor a small group of high‑school students in basic electronics and
    digital art, fostering curiosity and interdisciplinary thinking.
