  hobbies: '[''Gardening'', ''Crocheting'', ''Reading mystery novels'', ''Listening to classic rock and country music'', ''Hiking in Angeles National Forest'', ''Yoga for stress relief'', ''Volunteer work
    at community food pantry'', ''Home cooking (Mexican-inspired cuisine)'']'
  career_goals: Alexis aims to transition from on‑road driving to a supervisory logistics role within the next three years. She plans to earn a Certified Transportation Professional (CTP) credential and
    complete an associate's degree in logistics management. Her long‑term ambition is to become a fleet trainer, offering a more predictable schedule that reduces daily stress while allowing her to mentor
    new drivers. She also seeks to boost her sales earnings to build a comfortable retirement fund and explore a small side business offering delivery consulting services.
