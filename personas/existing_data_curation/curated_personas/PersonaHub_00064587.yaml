persona_description: A physician who specializes in orthopedic surgery and is leading a phase II clinical trial for stem cell therapy. He is optimistic about the potential benefits of using hematopoietic
  stem cells to regenerate cartilage in patients with osteoarthritis and sports injuries. He believes that regenerative medicine focuses on biology rather than carpentry, and that allowing the body to try
  to heal itself first is a more appropriate way to go. He is interested in the potential benefits of stem cell injections and wants to provide his patients with a clear understanding of the choices they
  have in front of them.
