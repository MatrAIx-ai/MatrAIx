  hobbies: '[''Gardening'', ''Quilting'', ''Knitting'', ''Reading Historical Fiction'', ''Cooking Family Recipes'', ''Walking Along the River'', ''Birdwatching'', ''Church Choir'', ''Crossword Puzzles'']'
  career_goals: Although retired from formal employment, Debra aims to remain an active contributor to her Pekin community. She aspires to expand the senior‑center garden program, mentoring younger volunteers
    in sustainable planting practices. She wishes to launch a monthly quilting circle that provides both social connection and skill sharing for older adults. Debra also hopes to document her family's stories
    and local history in a memoir that can be donated to the Tazewell County Historical Society. Supporting her grandchildren’s education through tutoring and sharing her cooking knowledge is another personal
    ambition. Ultimately, she seeks to balance her love of structured projects with the flexibility to adapt, ensuring her later years are fulfilling and purpose‑driven.
