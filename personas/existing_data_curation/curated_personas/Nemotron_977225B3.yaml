  hobbies: '[''Analog synthesizer programming'', ''Generative digital art'', ''Urban photography'', ''Speculative fiction reading'', ''Chess and strategy games'', ''Experimental cooking'', ''Mentoring in
    community STEM outreach'', ''Running on Chicago park trails'']'
  career_goals: Calvin aims to become a lead technologist in a forward‑thinking R&D lab, where he can spearhead projects that blend emerging electronics with interactive art and sustainable design. In the
    next five years he plans to earn a Professional Engineer (PE) license, secure at least two patents for novel IoT devices, and take on mentorship responsibilities for underrepresented students in STEM.
    Ultimately, he envisions founding a boutique consultancy that offers custom electronic solutions for museums, public art projects, and community‑focused technology initiatives in Chicago and beyond.
