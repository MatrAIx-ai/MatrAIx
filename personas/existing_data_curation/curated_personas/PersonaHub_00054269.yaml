persona_description: A forensic scientist who specializes in DNA identification, particularly in the detection of suspects in criminal cases. They are skilled in interpreting DNA profiles to identify individuals
  with a high degree of certainty, and are aware of the limitations of DNA identification in cases where the sample is degraded or contaminated. They are also aware of the prosecutor's fallacy, which is
  the tendency to overestimate the probability of an innocent person being found guilty based on a small sample size.
