  career_goals: Manuel aims to stay intellectually active by continuing to learn emerging technologies, particularly sustainable energy and smart home systems. He plans to mentor high school students interested
    in STEM through the local robotics club, offering workshops on basic engineering principles. He also aspires to document his lifetime of technical experiences in a series of memoir essays for his grandchildren.
    Additionally, he hopes to travel with his wife to historic engineering landmarks across the United States, while maintaining his health through regular walks and community involvement. A long‑term ambition
    is to establish a small community tool‑library in Columbus, providing affordable access to equipment for hobbyists and retirees.
