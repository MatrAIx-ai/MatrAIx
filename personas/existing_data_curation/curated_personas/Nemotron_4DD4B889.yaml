  hobbies: '[''Watercolor Painting'', ''Piano'', ''Reading Contemporary Fiction'', ''Hiking'', ''Gardening'', ''Yoga'', ''Traveling to Cultural Festivals'', ''Cooking Farm-to-Table Meals'', ''Photography'',
    ''Volunteering at Local Museum'', ''Attending Art Exhibitions'']'
  career_goals: Gladys aims to earn promotion to senior lecturer and eventually to department chair, using her leadership skills to shape program direction. She plans to develop a signature interdisciplinary
    course that merges environmental science with visual arts, highlighting sustainable practices through creative projects. To expand her impact, she intends to secure a federal grant for community‑based
    learning initiatives that connect the college with local cultural institutions. Completing a master's in educational leadership (or a PhD) is on her agenda, as is publishing research on arts integration
    in postsecondary education. Mentoring emerging educators, influencing state education policy, and expanding the college’s online learning offerings are also central to her long‑term ambitions.
