persona_description: A US scientist who specializes in the study of alcohol and liver disease, particularly the effects of alcohol on women's liver health. His research interests include the genetic predisposition
  to liver disease and the impact of alcohol consumption on liver function. He is known for his work on the liver's role in energy storage and metabolism, and his findings on the differences in alcohol
  metabolism between men and women.
