  career_goals: In the short term, Laura aims to obtain a Hospitality Management certificate at a local community college and secure a shift‑supervisor position, leveraging her ServSafe certification to
    stand out. Mid‑term, she plans to advance to floor manager at a high‑volume restaurant, building leadership skills and a reputation for operational excellence. Long‑term, Laura envisions opening a boutique
    coffee‑shop/food‑truck that blends modern pop‑up concepts with a sustainably sourced menu, allowing her to channel her competitive drive into culinary innovation and community engagement. Throughout,
    she balances the desire for stable income with the ambition to experiment creatively, while managing financial worries and stress through careful planning.
