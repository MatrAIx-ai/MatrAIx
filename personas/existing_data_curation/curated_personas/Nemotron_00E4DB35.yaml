  career_goals: Even at four, Tom loves to imagine future jobs. He frequently says he wants to be a firefighter because he admires how they keep people safe, and he also dreams of becoming a veterinarian
    to help animals. His practical side leads him to favor roles that involve clear, hands‑on tasks, while his caring nature pushes him toward careers that serve the community. He often talks about wanting
    a job where he can work with friends and make sure everyone feels safe and happy, reflecting his desire for harmony and his occasional worries about safety.
