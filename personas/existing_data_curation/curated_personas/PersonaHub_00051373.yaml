persona_description: A pediatrician or a medical researcher specializing in the study of osteomalacia, a disease affecting children characterized by skeletal abnormalities, especially rachitis, caused by
  the non-deposition of earthy salts in the osteoid tissues. They are likely to have expertise in the diagnostic and treatment of osteomalacia, as well as the understanding of the underlying causes and
  mechanisms of the disease. They may also have knowledge of the role of vitamin D in the development and prevention of osteomalacia.
