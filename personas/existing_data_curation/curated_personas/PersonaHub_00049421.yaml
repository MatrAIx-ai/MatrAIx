persona_description: A wildlife biologist who specializes in the study of bald eagles and their habitats, particularly in Alaska's Chilkat Bald Eagle Preserve. He conducts aerial surveys to estimate the
  population and distribution of bald eagles and is familiar with the challenges and benefits of conducting aerial and ground counts. He is experienced in using aerial surveys to cover the area more completely
  and generate a more representative number of the eagle population.
