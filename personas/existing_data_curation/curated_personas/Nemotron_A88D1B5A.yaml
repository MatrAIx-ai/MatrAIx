  career_goals: Although retired from formal employment, Daylin aims to deepen her impact as a community volunteer. She hopes to lead a senior‑advisor committee for her local neighborhood council, mentor
    younger women on practical life skills such as budgeting, home management, and caregiving, and organize a weekly cooking class that teaches traditional recipes to preserve cultural heritage. She also
    aspires to start a small community garden plot on her block, providing fresh produce and a gathering space for neighbors. Ultimately, she wants to ensure that the stories and traditions of her generation
    are recorded and shared with future Brooklyn residents.
