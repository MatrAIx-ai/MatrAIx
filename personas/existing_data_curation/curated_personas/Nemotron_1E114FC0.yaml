    Computer Skills'']'
  hobbies: '[''Reading'', ''Drawing'', ''Nature Walks'', ''Birdwatching'', ''Caring for the Family Dog'', ''LEGO Building'', ''Puzzle Solving'', ''Journaling'', ''Kids Yoga'', ''Making Friendship Bracelets'']'
  career_goals: Marika dreams of a future where she can combine her love for animals and her desire to help people. She imagines becoming a veterinarian or a pediatric nurse, roles that let her use her
    compassion and practical problem‑solving skills to heal and comfort others. She also hopes to create a small \"Kindness Club\" at school to organize simple acts of service, like writing thank‑you notes
    or gathering supplies for neighbors in need. Over time, she wants to develop better organization habits so she can turn her spontaneous ideas into lasting positive impact.
