personas:
  professional: Maria Reyesgarcia, a seasoned licensed electrician with three decades of expertise in residential and commercial wiring, blueprint interpretation, and smart‑home and solar retrofits, channels
    her methodical planning, sociable mentorship style, and unwavering reliability into every project, ensuring safety, code compliance, and inclusive team dynamics.
  sports: Maria Reyesgarcia stays active by joining a local walking club that meets in Fairmount Park every Saturday, follows the Philadelphia Eagles in the fall and the Phillies during baseball season,
    and channels her love of rhythm into weekly salsa classes at the community center, treating dance as her cardiovascular workout while occasionally cheering on the Philadelphia Flyers during ice‑hockey
    season.
  arts: Maria Reyesgarcia immerses herself in the arts by sketching vibrant cityscapes at the Philadelphia Museum of Art, drawing inspiration from contemporary painters like Kehinde Wiley and street‑art
    legends such as Banksy, capturing the pulse of neighborhood life through photography influenced by Diane Arbus, and losing herself in salsa rhythms from icons like Celia Cruz and Marc Anthony during
    her dance nights.
  travel: Maria Reyesgarcia enjoys meticulous trip planning, blending her love of architecture and mural art by strolling through Lisbon’s Alfama district, exploring Melbourne’s colorful laneway graffiti,
    and wandering Charleston’s historic streets, while she dreams of visiting eco‑villages in Costa Rica and the serene fjords of Norway for a sustainable getaway.
  culinary: Maria Reyesgarcia excels in the kitchen, regularly preparing aromatic rice dishes like arroz con gandules, hearty mofongo with plantains and chicharrones, and experimenting with roasted eggplant
    seasoned with paprika and fresh cilantro, often pairing meals with lime wedges and a splash of dark rum glaze for a festive touch.
  core: Maria Reyesgarcia blends a pragmatic electrician’s eye for detail with boundless artistic curiosity, often juggling a sketchbook while troubleshooting circuits, and despite a tendency to over‑schedule
    her week, she never skips a salsa night or a sunny balcony garden session.
background:
  cultural: Maria's Puerto Rican heritage shapes much of her identity. Raised in a bilingual household, she grew up listening to bomba and plena rhythms, celebrating traditions such as Three Kings Day and
    Noche Buena. In Philadelphia's vibrant Latino neighborhoods, she has maintained strong ties to the Puerto Rican community, participating in annual festivals, supporting local cultural organizations,
    and preserving family recipes passed down through generations. This cultural foundation reinforces her values of hospitality, collective harmony, and resilience, which she carries into her professional
    life, fostering inclusive teamwork and a deep respect for diverse perspectives.
