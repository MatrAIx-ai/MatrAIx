  hobbies: '[''Painting'', ''Art gallery visits'', ''Photography'', ''Salsa dancing'', ''Cooking Puerto Rican cuisine'', ''Balcony gardening'', ''Community safety workshops'', ''Reading about modern art'',
    ''DIY home improvement'']'
  career_goals: Maria aims to obtain her Master Electrician license within the next two years, positioning herself to launch a boutique contracting firm that specializes in energy-efficient retrofits and
    community-focused projects in Philadelphia. She hopes to expand her mentorship initiative to recruit and train more women and Puerto Rican youth in the trades, ultimately becoming a recognized advocate
    for sustainable construction practices. Long-term, Maria envisions her business not only delivering high-quality electrical work but also partnering with local non-profits to upgrade affordable housing,
    thereby combining her technical expertise with her commitment to harmony and community well-being.
