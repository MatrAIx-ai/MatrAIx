  career_goals: Rafael aims to translate his artistic passion and compassionate spirit into a community‑oriented role. He hopes to earn a GED within the next two years to broaden his opportunities. He plans
    to lead a weekly free art workshop at the local community center, offering mentorship to at‑risk youth and sharing Mexican cultural motifs. Long‑term, he envisions a part‑time position as a cultural
    liaison or community outreach coordinator, where he can design programs that foster harmony between Mexican‑American families and the broader Clint community. He also aspires to exhibit a personal collection
    of abstract paintings that explore themes of identity and resilience.
