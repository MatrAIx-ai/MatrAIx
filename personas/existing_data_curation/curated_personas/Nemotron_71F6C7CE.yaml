personas:
  professional: Cecelia Jernigan, a senior computer systems analyst in Milwaukee, weaves her knack for big‑picture abstraction into meticulously crafted data models, Python automations, and cloud‑native
    architectures, while her spontaneous nature often leads her to prototype daring AI‑enhanced UI concepts on hackathon weekends before polishing them for stakeholder buy‑in.
  sports: Cecelia Jernigan, a member of the Milwaukee Kayak Club who crowns her weekend hikes along the Ice Age Trail with sunrise paddle sessions on Lake Michigan, roots for the Milwaukee Bucks and Green
    Bay Packers, and tracks every workout on Strava to gamify her fitness journey.
  arts: Cecelia Jernigan, an avid creator of digital illustrations inspired by Refik Anadol and a composer of glitch‑laden electronic tracks echoing Aphex Twin, frequents the Milwaukee Museum of Art’s contemporary
    wing, performs weekly improv scenes with the local theater troupe, and powers through strategy board games like Terraforming Mars with a storyteller’s flair.
  travel: Cecelia Jernigan, who prefers spontaneous weekend escapes, jet‑sets to Berlin’s avant‑garde galleries, hikes Iceland’s volcano‑scarred landscapes for photography, and returns to the Upper Midwest
    for lake‑front cabin retreats, always packing a portable synth for impromptu sound‑scapes on the road.
  culinary: Cecelia Jernigan, a culinary experimenter who perfects smoked perch with dill‑infused butter, spices up ramen with miso‑caramel broth, and regularly tests molecular gastronomy kits while savoring
    craft coffee from Milwaukee’s Sobelman's, viewing each dish as a palette for her artistic sensibilities.
  core: Cecelia Jernigan, a 37‑year‑old tech‑savvy dreamer, fuses data science with avant‑garde art, chases novelty at hackathons, navigates finances with a mix of strategic investing and impulse tech purchases,
    and thrives on lake‑side adventures balanced by a calm, resilient mindset.
background:
  cultural: Cecelia was raised in Port Washington, Wisconsin, a lakeside community that blends traditional Midwestern values—such as a strong work ethic, modesty, and community involvement—with easy access
    to the natural outdoors. While she celebrates typical American holidays like Thanksgiving and Christmas, her upbringing also encouraged curiosity and self‑reliance, which helped her forge an independent
    path in technology. The region’s vibrant local art scene and proximity to Milwaukee’s museums exposed her early to contemporary art and music, shaping her appreciation for novel creative expressions.
    Travel experiences and a globally connected digital world have further broadened her cultural perspective, allowing her to integrate diverse artistic and technological influences into her personal and
    professional life.
