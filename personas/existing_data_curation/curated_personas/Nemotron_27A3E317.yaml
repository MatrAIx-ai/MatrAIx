  career_goals: Pedro aims to transition into a senior leadership role where he can shape data‑driven strategy for a technology or biotech firm, such as becoming a Director of Data Science or Head of Analytics.
    He is eager to mentor under‑represented talent in STEM, build inclusive data teams, and lead cross‑functional projects that have measurable social impact—particularly initiatives that address health
    equity or environmental sustainability. To deepen his expertise, he plans to earn a master's degree in Applied Statistics and acquire professional certifications in cloud analytics platforms. Long‑term,
    he envisions founding a consultancy that helps small businesses leverage analytics for growth while maintaining a strong community‑outreach program.
