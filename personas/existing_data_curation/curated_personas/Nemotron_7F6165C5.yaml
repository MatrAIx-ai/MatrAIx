personas:
  professional: William Rezendes is a self-taught digital creator who blends graphic design, web development, and photography into freelance UX projects, leveraging their curiosity and practical mindset
    while wrestling with deadline-driven structure.
  sports: William Rezendes enjoys early-morning rides on the Lakefront Trail and follows the Chicago Cubs, Chicago Bulls, and Chicago Blackhawks, occasionally joining a local cycling club that meets on
    weekends for group rides along the shoreline.
  arts: William Rezendes frequently attends live shows featuring indie rock bands such as The Strokes and jazz ensembles like Snarky Puppy, while also curating urban sunrise photo series that echo the aesthetic
    of Henri Cartier-Bresson, feeding both their visual and auditory cravings.
  travel: William Rezendes prefers short-haul trips that combine photography opportunities with cultural immersion, having chased sunrise over Lake Michigan, explored the street art of Lisbon, hiked the
    Reykjavik coastal trail, and planning a future road-trip to the Pacific Northwest’s volcanic landscapes.
  culinary: William Rezendes experiments in the kitchen with dishes like Korean bibimbap, Moroccan chicken tagine, and Japanese ramen, often swapping miso for sumac to twist flavors, and they consider themselves
    a competent home cook who enjoys sourcing fresh produce from the community garden they volunteer at.
  core: William Rezendes is a curiosity-driven, flexible creator who cycles sunrise-lit trails, captures cityscapes, and juggles freelance UX work with a growing impulse to build a community-focused collaborative
    space.
background:
  cultural: William grew up on Chicago’s North Side in a working‑class family of Irish‑German descent. The city's rich tapestry of cultures, its storied arts and music scenes, and the Midwestern values
    of practicality, fairness, and community orientation have deeply shaped his outlook. He internalizes the city’s pragmatic spirit while remaining open to new ideas, reflecting the blend of tradition
    and innovation that characterizes Chicago’s cultural landscape.
attributes:
  skills: '[''Graphic Design (Adobe Photoshop, Illustrator)'', ''Web Development (HTML, CSS, JavaScript, WordPress)'', ''Content Writing & Editing'', ''Digital Photography and Lightroom Editing'', ''Social
