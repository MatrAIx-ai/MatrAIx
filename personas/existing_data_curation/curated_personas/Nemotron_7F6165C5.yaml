  hobbies: '[''Urban Photography'', ''Live Music Shows'', ''Cycling along the Lakefront Trail'', ''Cooking experimental recipes'', ''Reading mystery and science nonfiction'', ''Volunteer work at community
    garden'', ''Board games and improv nights'']'
  career_goals: William aims to turn his curiosity and practical mindset into a sustainable career that still offers flexibility. Over the next three to five years he plans to earn a professional certificate
    in User Experience (UX) Design, build a portfolio of freelance UX projects for local startups and small businesses, and secure remote contracts that let him manage his own schedule. Simultaneously,
    he hopes to launch a modest community‑focused space—perhaps a weekend workshop series or a small co‑working café—that blends his love for creative collaboration, digital literacy teaching, and neighborhood
    connection. He envisions this venture as a way to balance earning a stable income with the freedom to explore new ideas and support others.
