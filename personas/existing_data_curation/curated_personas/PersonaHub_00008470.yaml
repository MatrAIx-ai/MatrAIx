persona_description: A school principal who is interested in the impact of single-sex classes on academic and social outcomes for both boys and girls. They are looking for evidence that single-sex classes
  can provide better learning environments, more opportunities for leadership, and less distraction for both sexes. They are also interested in understanding the potential trade-offs in social behaviors,
  such as whether single-sex classes can cause girls to become chattier and boys less polite and too competitive.
