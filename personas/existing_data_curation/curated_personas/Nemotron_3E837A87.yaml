  career_goals: Fabio dreams of pursuing a career that blends his love for problem‑solving, helping others, and technology. He aspires to become an engineering or robotics specialist who designs assistive
    devices for people with disabilities, seeing this as a way to combine his practical curiosity with his compassionate nature. In the short term, he aims to earn a scholarship to a competitive high school,
    join a robotics club, and volunteer as a mentor for younger students to build confidence and emotional resilience.
