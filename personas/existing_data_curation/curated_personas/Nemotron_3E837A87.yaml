personas:
  professional: An aspiring junior robotics designer, Fabio Autry channels their curiosity and practicality into building and programming Lego robotics kits, blending methodical planning with spontaneous
    experimentation while collaborating with friends in school tech clubs, showcasing an organized yet flexible work style.
  sports: A passionate team player, Fabio Autry competes on the Eastside Basketball Cagers and the Lakeview Youth Soccer Club, idolizes the NBA’s Boston Celtics and La Liga’s FC Barcelona, and maintains
    a high‑energy fitness routine that blends spirited weekend matches with occasional solo jogs, all while using their sociable nature to motivate teammates.
  arts: A creatively inclined teen, Fabio Autry strums acoustic guitar to the melodies of John Mayer and Ed Sheeran, performs at school talent shows, writes short sci‑fi stories inspired by authors like
    Isaac Asimov, and participates in the Riverbend Community Theater, where their outgoing personality shines through diverse acting roles.
  travel: An aspiring explorer, Fabio Autry has visited Washington, D.C.’s National Air and Space Museum and spent a family weekend camping in the Rocky Mountains, dreams of strolling through Tokyo’s Akihabara
    district and the historic streets of Rome, and plans trips with meticulous checklists crafted alongside parents, balancing a love for adventure with the comfort of familiar routines.
  culinary: A budding home chef, Fabio Autry enjoys assembling homemade pizza topped with mozzarella, pepperoni, and fresh basil, whipping up spaghetti carbonara for family dinners, and baking chocolate
    chip cookies that they proudly share with friends after robotics sessions, though they sometimes skip vegetables when time runs short.
  core: Fabio Autry, a 13‑year‑old who fuses technical curiosity with sociable energy, toggles between building Lego robots and playing acoustic guitar, yet wrestles with intense anxiety that fuels occasional
    procrastination and late‑night snack binges.
background:
  cultural: Fabio was raised in a middle‑class, suburban family in Citrus Heights, California, where he has been exposed to a blend of traditional Midwestern American values and the multicultural atmosphere
    of the Sacramento region. His household emphasizes community involvement, respect for diversity, and a strong work ethic. Growing up in a diverse neighborhood, he has learned to appreciate different
    cultural perspectives while maintaining his family's heritage, which includes a mix of European (Italian and German) ancestry. This background shapes his appreciation for both established methods and
    innovative ideas, fueling his curiosity and collaborative spirit.
