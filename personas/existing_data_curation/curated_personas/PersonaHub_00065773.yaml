persona_description: An advocate for a public-interest industry that would supply all of Canada's oil and natural gas needs, without the efforts to boost consumption and externalize costs. They would promote
  job-producing, value-added, cleaner downstream industry development in Canada, institute demand reduction through carbon pricing, make oil patch development more orderly and less inflationary, boost security
  of energy supply for Canadians, enable full capture of rents, and develop job-creating renewable energy. They would advocate for the transformation of the private-interest industry to a public-interest
  mandate and support public ownership as a means to enable this mandate. They would be interested in the design issues surrounding the transformation, such as public, private or mixed ownership.
