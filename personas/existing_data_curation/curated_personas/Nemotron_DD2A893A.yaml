  career_goals: Loriann aims to transition into a school-wide instructional leadership role within the next five years, such as Curriculum Coordinator or Instructional Coach. She intends to pursue a Master’s
    degree in Educational Leadership to deepen her understanding of system-level change. Her goal is to champion evidence‑based teaching practices while introducing innovative, curiosity‑driven projects
    that raise student achievement across the district. She also hopes to lead the school’s academic competitions and develop community partnerships that support real‑world learning experiences.
