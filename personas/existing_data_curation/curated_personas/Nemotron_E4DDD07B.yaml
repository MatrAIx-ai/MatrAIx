personas:
  professional: Lidia Rodriguez, a seasoned correctional officer with over two decades of frontline experience, blends analytical expertise in surveillance technology and data‑driven incident analysis with
    calm conflict de‑escalation, using their balanced curiosity and disciplined authority to improve security protocols while mentoring new staff with compassionate assertiveness.
  sports: Lidia Rodriguez roots for the Orlando Magic and Orlando City SC, spends Saturday mornings fishing for bass on Lake Tohopekaliga, attends weekly salsa‑rumba classes for cardio, and competes in
    a local adult softball league, combining fandom, outdoor recreation, and community fitness; they view each activity as a balance between competition and personal well‑being.
  arts: Lidia Rodriguez enjoys evenings listening to Latin jazz legends like Arturo Sandoval and Chucho Valdés, dances to timba rhythms in community classes, devours crime novels by Michael Connelly and
    contemporary Caribbean literature, and occasionally attends local theater productions that explore diaspora themes, letting music and storytelling weave into their identity.
  travel: Lidia Rodriguez plans vacations that blend cultural immersion with relaxation, favoring organized itineraries that leave room for spontaneous fishing trips; they have explored the historic streets
    of New Orleans, the beaches of the Yucatán, and hope to soon visit Barcelona for its vibrant music scene and architecture.
  culinary: Lidia Rodriguez is an intermediate home cook who perfects traditional dishes such as Ropa Vieja, arroz con pollo, and café con leche, seasoning them with fresh cilantro, cumin, and oregano from
    their garden, while also savoring grilled snapper caught on the lake and experimenting with mango‑chili salsa as a modern twist.
  core: Lidia Rodriguez balances a disciplined correctional career with a restless curiosity for technology and music, juggling nightly crime novels and weekend salsa classes while occasionally splurging
    on fishing gear and forgetting to schedule mental‑health breaks; they often joke that their schedule runs on adrenaline and espresso.
background:
  cultural: Lidia is a second-generation Cuban-American. Her parents emigrated from Havana in the early 1980s and raised her in a bilingual household where Spanish was spoken at home and English at school.
    She grew up in a tight‑knit extended family that emphasized respect for elders, collective responsibility, and the celebration of Cuban traditions—such as San Juan festivals, Cuban Heritage Month, and
    family gatherings centered around music, dance, and food. These cultural values have ingrained a strong work ethic, resilience, and a deep sense of community. Fluent in both Spanish and English, she
    often switches languages depending on context, using Spanish when communicating with Spanish‑speaking inmates and community members. Her identity blends the vibrant rhythm of Cuban culture with the
    multicultural tapestry of central Florida, informing her compassionate yet disciplined approach to both personal life and her role in corrections.
