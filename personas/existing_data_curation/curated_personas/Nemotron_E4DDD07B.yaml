  career_goals: Lidia aims to advance to supervisory roles within the Osceola County Corrections Department, such as Shift Supervisor and eventually Facility Manager. She wants to spearhead the adoption
    of evidence-based rehabilitation programs that incorporate technology, like virtual-reality job-training modules for inmates. She plans to pursue a master's degree in Criminal Justice or Public Administration
    to strengthen her policy-making capabilities. Lidia also aspires to mentor new officers, particularly those from underrepresented backgrounds, and to develop a county-wide training curriculum that blends
    practical security with mental-health awareness. Moreover, she envisions contributing to community outreach, establishing partnerships with local NGOs and STEM education programs to facilitate inmate
    re-entry. She hopes her work will lead to measurable reductions in recidivism rates and improve staff morale.
