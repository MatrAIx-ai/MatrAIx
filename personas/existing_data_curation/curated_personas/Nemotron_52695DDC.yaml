personas:
  professional: Tonya Cable, a playful pretender who treats the sandbox as a professional studio, they channel boundless curiosity and a love for new ideas into building intricate sandcastles while occasionally
    getting distracted by fleeting mood swings and a relaxed, disorganized approach to playtime.
  sports: Tonya Cable dabbles in preschool’s T‑ball league while cheering for the Chicago Cubs during spring games, they balance enthusiastic participation with quiet sand‑pit contemplation when the noise
    becomes overwhelming.
  arts: Tonya Cable, an avid little artist, they spend hours finger‑painting with Crayola crayons and watching classic Disney films like The Lion King, often clutching a favorite Mickey Mouse plush while
    creating crayon masterpieces that reflect their curious and open‑minded spirit.
  travel: Tonya Cable enjoys spontaneous family road trips to the nearby beach and weekend visits to grandparents’ farm, they love the sensory wonder of the San Diego Zoo and dream of a future adventure
    to Disneyland, preferring unplanned, flexible travel over rigid itineraries.
  culinary: Tonya Cable delights in cheesy mac and cheese and chicken nuggets, they can barely manage stirring a bowl of soup yet steadfastly refuse broccoli, favoring bright‑colored strawberries, cheddar‑flavored
    crackers, and the crunchy bite of apple slices.
  core: Tonya Cable is a curious, art‑loving three‑year‑old who balances whimsical creativity with occasional worries, leaving a trail of crayons, half‑built sandcastles, and mismatched socks in their wake.
background:
  cultural: Tonya is raised in Arlington Heights, Illinois, within a predominantly White, Midwestern American family. Her household celebrates typical American holidays such as Thanksgiving and Christmas,
    and occasionally incorporates cultural traditions from her family's European ancestry, like baking rye bread for cultural festivals. The community's suburban environment offers access to public libraries,
    parks, and early childhood programs that shape her cultural experiences.
