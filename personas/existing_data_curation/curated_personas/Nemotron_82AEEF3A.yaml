  career_goals: Sandra envisions a future where she can merge her love for art, technology, and storytelling. Her primary ambition is to become a concept artist or visual developer for video games or animated
    films, building a portfolio that will earn her a place in a specialized high‑school arts program and later at a university known for digital media. She also dreams of creating her own illustrated graphic
    novels that blend scientific curiosity with fantastical worlds. While she is drawn to creative fields, she remains open to interdisciplinary paths such as interactive media design or scientific illustration,
    seeking a career that lets her explore novel ideas while maintaining a competitive, high‑achievement mindset.
