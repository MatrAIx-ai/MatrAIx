personas:
  professional: Sandra Quick, a budding young coder and aspiring narrative game designer, channels their vivid imagination and critical mindset into creating strategy-focused Scratch games that they regularly
    showcase at the community center, balancing meticulous planning with spontaneous storytelling twists.
  sports: Sandra Quick, an enthusiastic member of the Lake Charles junior swim team and a seasonal participant in youth basketball leagues, trains thrice weekly at the community center, draws inspiration
    from the New Orleans Pelicans' fast-break style, and channels their competitive nature into both chess tournaments and team scrimmages, while also cheering for the New Orleans Saints during football
    season.
  arts: Sandra Quick, who spends evenings sketching dragons inspired by Brian Froud’s artwork and listening to Hayao Miyazaki film scores while devouring novels by N.K. Jemisin, showcases their poems at
    school open-mic nights, and finds rhythmic solace in practicing piano pieces by Ludwig van Beethoven and contemporary pop hits by Billie Eilish, weaving these influences into a unique creative identity.
  travel: Sandra Quick, who plans trips with a blend of meticulous research and spontaneous curiosity, prefers weekend getaways to New Orleans’ French Quarter festivals and annual visits to the Atchafalaya
    Basin for kayaking, while dreaming of immersive cultural tours in Kyoto, Japan and the sci-fi exhibitions of the Edinburgh Festival, balancing a modest family budget with a desire for adventure.
  culinary: Sandra Quick, an aspiring home cook who enjoys experimenting with Cajun classics like shrimp étouffée and jambalaya, frequently adds a dash of smoked paprika to her mac-and-cheese experiments,
    balances this with a love for Japanese sushi rolls featuring avocado and crab, and occasionally indulges in pepperoni pizza and chocolate chip cookies after long coding sessions.
  core: Sandra Quick, a fiercely imaginative 13-year-old who alternates between marathon strategy-gaming sessions and sketch-filled journals, often forgets to finish homework on time but compensates by
    turning deadlines into creative challenges.
background:
  cultural: 'Sandra grows up in a middle‑class white family in Lake Charles, Louisiana, a city that blends Southern, Cajun, and Creole influences. Her upbringing reflects the Gulf Coast’s community‑oriented
    culture: family gatherings often feature regional dishes like gumbo, jambalaya, and beignets, and local celebrations such as Mardi Gras and the Louisiana Pirate Festival are part of her annual calendar.
    She attends a public middle school where she interacts with peers from diverse backgrounds, fostering an appreciation for the multicultural fabric of the area. Her family attends a Baptist church, but
    they also honor the broader cultural traditions of the region, which include music ranging from jazz and zydeco to contemporary pop. This environment has nurtured Sandra’s sociable, outgoing personality
    while exposing her to a rich tapestry of artistic and culinary traditions that inspire her creative pursuits.'
attributes:
