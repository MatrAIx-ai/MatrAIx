  hobbies: '[''Cooking Traditional Puerto Rican Cuisine'', ''Salsa Dancing'', ''Attending Cultural Festivals'', ''Yoga'', ''Hiking in El Yunque'', ''Reading Latin American Fiction'', ''Educational Psychology
    Literature'', ''Balcony Gardening'', ''Volunteer Tutoring'', ''Book Club Participation'']'
  career_goals: Carmen aims to complete her bachelor’s degree within the next two years and then pursue a master’s in Educational Leadership, with the long‑term goal of becoming a department chair or program
    coordinator. She is dedicated to embedding Puerto Rican cultural content into her courses, mentoring new faculty, and leading curriculum reform initiatives that improve student outcomes. Ultimately,
    she hopes to earn a Ph.D. in Education to transition into a research‑focused professorship and to contribute scholarly work on bilingual pedagogy and culturally responsive teaching.
