personas:
  professional: Amanda Saenz is a meticulous hairdresser specializing in precision cuts, advanced color techniques such as balayage and ombre, and restorative scalp treatments, who channels their introverted
    calm and resilient nature into creating a tranquil, eco‑friendly salon environment while balancing a curiosity for sustainable products with practical client health considerations.
  sports: Amanda Saenz, an avid hiker of the Wasatch Range, spends weekends trail‑running and snowshoeing in the Utah mountains, roots for the Utah Jazz and follows Real Salt Lake, and occasionally participates
    in a local outdoor yoga club that meets at the Jordan River Parkway.
  arts: Amanda Saenz curates a small collection of vintage hair accessories, finds artistic inspiration in the macro photography of Edward Weston, delights in contemporary novels by Sally Rooney, attends
    low‑key Spanish‑language film screenings featuring works by Pedro Almodóvar, and relaxes to the ambient soundscapes of Björk.
  travel: Amanda Saenz prefers meticulously planned solo trips that blend quiet nature hikes with cultural immersion, having trekked Bryce Canyon, explored the pastel villages of Cinque Terre, and dreaming
    of a solitary retreat in the Icelandic Highlands, while balancing a modest travel budget and occasional family obligations.
  culinary: Amanda Saenz enjoys cooking heritage dishes such as saffron‑infused paella, chilled gazpacho, and rustic tortilla, mastering the balance of flavors with organic produce, olive oil, smoked paprika,
    and fresh herbs, and often pairs meals with a glass of crisp Albariño while experimenting with DIY natural beauty recipes for the kitchen.
  core: Amanda Saenz blends a calm, introverted resilience with a meticulous eye for hair artistry, a habit of collecting vintage hair pins, a penchant for late‑night entrepreneurship podcasts, and an occasional
    tendency to over‑schedule client consultations, all while maintaining a serene, solitary work rhythm.
background:
  cultural: Amanda's parents emigrated from Spain before she was born, and she grew up bilingual, celebrating Spanish holidays such as Día de los Reyes and Semana Santa with her family. Her home life blends
    Mediterranean culinary traditions, music, and a warm hospitality style with the clean, understated aesthetic prevalent in the Mountain West. While fully integrated into the West Jordan community, she
    remains connected to her Spanish roots, influencing her artistic sensibility and her emphasis on personal, respectful client relationships.
attributes:
  skills: '[''precision haircutting'', ''balayage and ombre coloring'', ''hair color correction'', ''organic hair treatments'', ''scalp analysis'', ''client consultation'', ''salon sanitation & hygiene'',
