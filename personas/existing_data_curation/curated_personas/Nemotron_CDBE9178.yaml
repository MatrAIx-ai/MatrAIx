  hobbies: '[''reading'', ''hiking'', ''yoga'', ''meditation'', ''cooking Spanish cuisine'', ''macro photography'', ''collecting vintage hair accessories'', ''DIY natural beauty recipes'', ''listening to
    entrepreneurship podcasts'', ''attending Spanish film nights'']'
  career_goals: Amanda aspires to open a boutique, eco‑friendly salon in West Jordan that offers a tranquil environment for both clients and staff. She plans to earn advanced certification in color correction
    and become a brand ambassador for sustainable hair‑care products. Over the next five years, she aims to build a curated client base for private styling sessions, host workshops on calm salon practices,
    and mentor aspiring stylists, especially those from Spanish‑speaking backgrounds. Financial independence and the ability to maintain a solitary, serene work lifestyle are central to her long‑term ambitions.
