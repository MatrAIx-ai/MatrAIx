  career_goals: Although retired, Jan aims to deepen her impact within the Van Wert community. She plans to spearhead a neighborhood community garden, mentor younger volunteers at the senior center, and
    expand intergenerational programs that link seniors with local school students. Jan also aspires to complete a memoir documenting her family's Midwestern heritage and the town's history, while continuing
    to stay physically active through walking groups and low‑impact fitness classes. Learning new technology tools to better assist peers and family members remains a personal ambition.
