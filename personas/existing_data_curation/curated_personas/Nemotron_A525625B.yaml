  hobbies: '[''Cooking Mexican cuisine'', ''Fishing at Lake Bryan'', ''Attending Texas A&M football games'', ''Visiting art exhibitions'', ''Reading business biographies'', ''Spanish-language tutoring'',
    ''Gardening'']'
  career_goals: Jose aims to move from store‑level supervision to a regional management role within the next three years, leveraging his track record of exceeding sales targets to oversee multiple locations.
    He plans to earn the Certified Retail Management Professional (CRMP) designation and to mentor emerging supervisors, especially those from bilingual or multicultural backgrounds. In the longer term,
    he hopes to open a small, community‑focused boutique that blends his passion for arts and Mexican heritage, offering handcrafted goods while providing on‑the‑job training for local youth.
