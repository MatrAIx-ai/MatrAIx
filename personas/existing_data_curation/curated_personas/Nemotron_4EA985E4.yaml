    in NYC and nearby states'', ''Cooking collaborative meals with friends'']'
  career_goals: Mohammad aims to become a principal investigator leading an interdisciplinary research group that delivers both fundamental insights and scalable technologies, particularly in the field
    of materials science for energy applications. He is targeting high-impact publications, securing multi-year federal or industry grants, and filing patents on novel nanomaterials. Over the next five
    years he hopes to transition into a senior R&D leadership role where he can shape product development pipelines, mentor early-career scientists, and increase the visibility of his work through public
    outreach and science-policy advisory boards.
