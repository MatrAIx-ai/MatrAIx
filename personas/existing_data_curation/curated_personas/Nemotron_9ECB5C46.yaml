personas:
  professional: Xiomara Hernandez is a master diesel technician who blends deep expertise in fuel‑injection, turbocharging, and MIG/TIG welding with a talkative, competitive edge that makes them an engaging
    trainer for apprentices and a persuasive problem‑solver for fleet clients, while they adopt a relaxed approach to scheduling that sometimes leads to juggling urgent repairs with last‑minute garage‑night
    projects.
  sports: Xiomara Hernandez passionately follows Liga MX, cheering for Club América whenever possible, and channels their competitive spirit into weekly pick‑up soccer games at the community field, while
    they also support the Dallas Cowboys for a taste of American football during the fall season.
  arts: Xiomara Hernandez immerses themselves in the vibrant world of cumbia and salsa, dancing to Celia Cruz and Los Mirlos at local festivals, while they also draw inspiration from street murals and the
    work of Frida Kahlo, fueling occasional sketching of automotive designs on napkins during lunch breaks.
  travel: Xiomara Hernandez favors road‑trip adventures that combine auto‑mechanic curiosity with cultural immersion, such as weekend drives to the Texas Hill Country to explore wineries, a yearly pilgrimage
    to Oaxaca for its markets and festivals, and a bucket‑list visit to the historic car museums of Stuttgart, Germany, where they plan to photograph classic engines and sample local cuisine.
  culinary: Xiomara Hernandez excels at crafting smoky tamales filled with pork and chilies, whipping up fresh cilantro‑lime salsa, and experimenting with rosemary‑infused grilled vegetables, all while
    they keep a well‑stocked spice rack that includes cumin, ancho chile powder, and smoked paprika for weekend backyard barbecues.
  core: Xiomara Hernandez blends diesel mastery, a love for cumbia, and a competitive spark into a life where workshop deadlines, spontaneous festivals, and occasional financial oversights coexist in a
    colorful, high‑energy rhythm that they navigate with talkative enthusiasm.
background:
  cultural: Xiomara was raised in a bilingual Mexican‑American household in the Rio Grande Valley. Her parents emigrated from Michoacán, and she grew up speaking Spanish at home while attending English‑language
    schools. The close‑knit family values and community traditions of Mexican culture—celebrating Día de los Muertos, Cinco de Mayo, and sharing family recipes—remain central to her identity. Living in
    McAllen, she balances her Mexican heritage with the diverse influences of South Texas, participating in local festivals, listening to regional Tejano music, and supporting Mexican‑owned businesses.
    Her cultural background shapes her strong sense of community, love for food and music, and the pride she feels in representing a woman in a traditionally male‑dominated trade, often mentoring other
    Latina mechanics.
attributes:
  skills: '[''Diesel engine diagnostics'', ''Heavy vehicle maintenance'', ''Turbocharger repair'', ''Fuel injection system servicing'', ''Emission control troubleshooting'', ''Hydraulic system repair'',
    ''Welding (MIG/TIG)'', ''Technical schematics reading'', ''Parts catalog management'', ''ASE Certified Diesel Technician'', ''Customer communication'', ''Apprentice training'', ''Emerging powertrain
    technologies (electric/hybrid)'']'
  hobbies: '[''Dancing (cumbia, salsa)'', ''Cooking Mexican dishes (tamales, mole)'', ''Restoring classic pickup trucks'', ''Participating in garage meet‑ups'', ''Yoga'', ''Gardening (chilies, herbs)'',
    ''Watching Mexican soccer (Liga MX)'', ''Playing poker'', ''Competing in trivia contests'', ''Volunteering as a youth mechanics mentor'']'
  career_goals: Xiomara aims to become a master diesel technician and earn a Master Technician certification from ASE. She plans to complete an associate degree in automotive technology to complement her
    hands‑on experience. In the next five years she hopes to be promoted to lead technician or shop manager at a regional fleet service center, overseeing a team and implementing best‑practice maintenance
    programs. Long‑term, she dreams of opening her own independent diesel repair shop in McAllen, focused on serving local bus companies and offering training opportunities for women and under‑represented
    youth. She is also interested in specializing in retrofitting diesel trucks with hybrid or electric conversion kits, positioning herself at the forefront of greener automotive technologies.
