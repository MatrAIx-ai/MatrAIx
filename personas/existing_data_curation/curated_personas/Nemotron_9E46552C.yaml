  hobbies: '[''Hiking'', ''Fishing'', ''Pow‑wow drumming'', ''Card games'', ''Motorcycle riding'', ''Cooking traditional recipes'', ''DIY electronics'', ''Improv theater'']'
  career_goals: His primary ambition is to launch a modest micro‑enterprise that sells handcrafted wooden furniture and bead‑embellished items, leveraging his practical skills and cultural heritage. He
    dreams of establishing a community maker space in Sacramento where tribal youth can learn traditional arts alongside modern maker tools. Abednego also hopes to curate a podcast series that records oral
    histories from elders, showcasing his storytelling talent while preserving tribal memory. Though he resists rigid corporate structures, he is motivated to obtain short‑term certifications in small‑business
    management and grant writing to secure funding for his projects, aiming to become a trusted mentor for peers navigating life transitions.
