personas:
  professional: Abednego Sanders, a 50‑year‑old hands‑on craftsman, blends traditional tribal woodworking and beadwork with modern maker‑tool expertise to launch a modest micro‑enterprise while championing
    community workshops and a heritage‑focused podcast, and they eagerly share their stories through a planned podcast series.
  sports: Abednego Sanders enjoys seasonal hikes in the Sierra foothills with the Sierra Trailblazers club, weekend fly‑fishing on the American River, active drumming at local pow‑wow circles, cheering
    on the Sacramento Kings, and competing in weekly board‑game tournaments at the community center, and they thrive on the competitive energy of group sports.
  arts: Abednego Sanders creates intricate beadwork and baskets, performs hand drums inspired by Fela Kuti, delights in improv theater where they channel storytelling flair à la Maya Angelou, curates social‑media
    content that highlights local artists like Bob Dylan and indigenous folk performers, and they relish the creative buzz that fuels their community connections.
  travel: Abednego Sanders embarks on spontaneous motorcycle road trips along the Pacific Coast Highway, has camped at Lake Tahoe, explored the vineyards of Napa Valley, dreams of a cultural exchange workshop
    in Sedona, balances limited funding with a love for off‑the‑grid adventure, and they often plan trips last‑minute, letting spontaneity guide the itinerary.
  culinary: Abednego Sanders cooks traditional three‑bean stew and spruce‑tip sautéed trout with creative twists such as wild mushroom corn‑bread, enjoys experimenting with heirloom corn and pine nuts,
    is the go‑to potluck host for rustic yet inventive tribal dishes, and they sometimes over‑season dishes in their enthusiasm for bold flavors.
  core: Abednego Sanders is a competitive, spontaneous 50‑year‑old craftsman who fuses tribal art with modern making, thrives on community engagement, and they tackle life’s challenges with a blend of curiosity,
    skeptical practicality, and occasional disorganized streak.
background:
  cultural: Abednego is a member of the Nisenan (Southern Maidu) community, whose ancestral lands span the Sacramento River Valley. He grew up on a reservation near Sacramento before moving to the city,
    giving him a blend of tribal traditions and urban experiences. He actively participates in seasonal ceremonies, maintains fluency in the Nisenan language through informal practice, and values intergenerational
    sharing of cultural knowledge. His upbringing instilled a respect for the land, communal resilience, and a deep connection to tribal crafts, all of which shape his identity and daily life.
attributes:
  skills: '[''Woodworking'', ''Auto mechanics'', ''Traditional beadwork'', ''Wilderness survival'', ''Public speaking'', ''Improvisational storytelling'', ''Basic computer troubleshooting'', ''Social media
