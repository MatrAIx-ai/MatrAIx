persona_description: A researcher at Michigan State University who is working on developing a transparent luminescent solar concentrator that captures ultraviolet and infrared light without absorbing light
  in the visible spectrum. The concentrator has a solar conversion efficiency of about 1 percent, and the researchers aim to increase it to 5 percent, while current colored concentrators have an efficiency
  of about 7 percent. The concentrator is designed to generate energy without obstructing the view.
