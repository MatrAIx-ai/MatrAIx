  career_goals: Timothy aims to transition from a front‑line representative to a supervisory role within the next two years, targeting a Team Lead or Customer Experience Manager position at his call center.
    To support this goal, he plans to complete his GED and enroll in a part‑time certificate program focused on Customer Service Management and Organizational Psychology. He is passionate about incorporating
    employee well‑being into service operations, so he intends to develop a stress‑management training module for his team, drawing on his own experiences with workplace anxiety. Long‑term, Timothy envisions
    establishing a small community‑based art café that doubles as a venue for local artists, blending his love of art with his desire to contribute to the cultural life of San Luis. He also hopes to mentor
    at‑risk youth in the area, sharing his communication skills and work ethic.
