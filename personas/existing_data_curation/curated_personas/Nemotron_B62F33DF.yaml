  career_goals: Approaching retirement, Gonzalo aims to transition his expertise into a community‑focused boutique that offers custom‑designed eyewear infused with Mexican artistic motifs. He wishes to
    publish a modest guide that explores the intersection of optical science and visual aesthetics, and to teach part‑time at the local community college's optometry program. Mentoring the next generation
    of opticians, preserving his family's financial stability, and making regular trips to his hometown in Jalisco to reconnect with his roots are also central to his long‑term aspirations.
