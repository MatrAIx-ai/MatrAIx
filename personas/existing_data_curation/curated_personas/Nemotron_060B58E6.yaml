  career_goals: Eugene is aiming to transition from his current period of non‑employment into a part‑time or freelance role that leverages his humanities background while offering the flexibility he values.
    His primary ambition is to become a community historian and content creator for local museums, historical societies, or municipal heritage projects in Pittsburgh, producing articles, exhibit copy, and
    oral‑history podcasts. He also hopes to secure a teaching adjunct position at a community college, mentor youth volunteers, and eventually obtain a certification in digital archiving to strengthen his
    professional credibility. Financial stability and a structured routine are important, but he wants the work to remain adaptable enough to accommodate his personal responsibilities.
