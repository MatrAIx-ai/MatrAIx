persona_description: A network administrator who is responsible for setting up and maintaining an Ethernet network in a small to medium-sized industrial or commercial environment. This person is familiar
  with the different types of Ethernet network topologies such as bus, ring, and star, and is skilled in configuring and troubleshooting switches and routers. They are also knowledgeable about the benefits
  and drawbacks of using managed versus unmanaged switches, and have experience with the different features and functions of routers. The person is often tasked with creating groups within an Ethernet network
  to manage traffic and is familiar with the use of virtual private networks (VPNs) for connecting to the Internet. They are detail-oriented and have a strong understanding of network security and data
  privacy.
