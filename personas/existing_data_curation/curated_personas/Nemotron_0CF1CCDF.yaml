personas:
  professional: Sara Izquierdo, a retired humanities scholar now steering multigenerational oral‑history projects and bilingual community festivals, leverages their organized, reliable nature and sociable
    charisma to bridge generations and preserve cultural narratives.
  sports: Sara Izquierdo keeps fit by attending salsa and bachata sessions at the senior center, joins a weekly walking group that cheers on the Boston Red Sox at the nearby sports bar, and occasionally
    enjoys watching New England Revolution matches on TV, blending rhythm‑based exercise with community fandom.
  arts: Sara Izquierdo immerses themselves in Latin American literature, discussing works by Gabriel García Márquez and Isabel Allende in book clubs, savors the rhythms of classic salsa legends like Celia
    Cruz at community concerts, and captures family gatherings through a budding hobby in digital photography.
  travel: Sara Izquierdo prefers purposeful travel that blends family reunions on the Caribbean island where their parents grew up with leisurely day trips to nearby New England towns such as Salem for
    historic tours, often planning trips months in advance to secure senior discounts and off‑season rates.
  culinary: Sara Izquierdo delights in preparing traditional dishes like arroz con pollo, empanadas, and tamales, seasoning them with garden‑fresh cilantro, oregano, and annatto, and while their cooking
    skill is seasoned and confident, they occasionally over‑salt a pot in their enthusiasm to feed a bustling kitchen.
  core: Sara Izquierdo, a vibrant septuagenarian who blends organized activism, community‑centric generosity, and lively salsa steps, navigates life with a curious practicality, occasional forgetfulness,
    and a heart rooted in shared stories and aromatic kitchens.
background:
  cultural: Sara’s cultural roots are grounded in her Puerto Rican heritage, passed down through her parents who immigrated to the United States in the 1950s. She grew up in a bilingual household, celebrating
    fiestas, Nochebuena, and Día de los Muertos with family rituals, music, and storytelling. In Somerville, she is an active member of La Casa Cultural, a community hub for Latino residents, where she
    helps organize cultural events, language workshops, and senior support groups. Her identity blends the values of collectivism, respect for elders, and a strong Catholic tradition with the progressive,
    multicultural spirit of the Greater Boston area, shaping her worldview and community involvement.
attributes:
  skills: '[''Bilingual Spanish‑English communication'', ''Community event planning and coordination'', ''Adult education and tutoring'', ''Cultural heritage preservation'', ''Basic digital literacy and
