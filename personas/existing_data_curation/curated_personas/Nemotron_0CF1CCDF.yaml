  hobbies: '[''Salsa and bachata dancing'', ''Cooking traditional Latino dishes'', ''Reading Latin American literature'', ''Book club participation'', ''Community‑college genealogy classes'', ''Digital
    photography'', ''Gardening'', ''Crossword puzzles'', ''Volunteering at local food pantry'', ''Attending multicultural festivals'', ''Traveling to Puerto Rico'']'
  career_goals: Although retired from formal employment, Sara aims to remain an active contributor to her community. She hopes to lead a multigenerational oral‑history project that records the stories of
    Latino seniors in Somerville, and to mentor younger volunteers in event planning and bilingual outreach. She aspires to serve on the board of a local cultural organization, and to publish a memoir that
    blends personal history with reflections on Hispanic heritage in New England. Sara also plans to continue learning new technologies, such as social‑media storytelling, to amplify community voices and
    raise awareness of senior issues.
