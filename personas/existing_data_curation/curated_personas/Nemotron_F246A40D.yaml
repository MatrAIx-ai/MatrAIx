  hobbies: '[''vintage radio restoration'', ''scale model building'', ''hiking and wildlife photography'', ''science‑fiction book club'', ''community gardening'', ''DIY craft fair attendance'', ''small‑group
    volunteer projects'']'
  career_goals: Gail aims to earn certifications as a journeyman electrician and HVAC technician within the next three years, positioning herself for supervisory roles in facility management. She dreams
    of eventually opening a small, locally‑focused handyman service that offers reliable, affordable repairs while mentoring other young workers from rural backgrounds. Her ambition is balanced by a desire
    to maintain a stable income that supports a modest, independent lifestyle.
