  career_goals: 'Kim aims to transition from a frontline support role into a senior IT operations or service-delivery management position within the next five years. She plans to earn the Microsoft Certified:
    Modern Desktop Administrator Associate and the CompTIA Security+ certifications, and to deepen her expertise in cloud platforms such as Azure to support hybrid environments. Her competitive nature drives
    her to lead a small team, implement process improvements that reduce ticket resolution times, and eventually launch a boutique IT consultancy focused on small businesses in the Plano area. She wants
    to balance her curiosity for new technologies with practical solutions that deliver measurable ROI for clients.'
