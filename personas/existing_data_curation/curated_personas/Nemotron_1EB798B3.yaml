  hobbies: '[''DIY electronics (Raspberry Pi, Arduino)'', ''Gardening'', ''Reading mystery and historical fiction'', ''Hiking'', ''Volunteer teaching computer basics'', ''Blogging about tech tips'', ''Puzzling
