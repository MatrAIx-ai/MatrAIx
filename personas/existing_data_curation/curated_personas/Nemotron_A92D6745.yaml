  career_goals: Suzanne aims to move into a senior office‑manager or administrative‑director role within the next two years, where she can mentor junior staff, lead the adoption of modern, cloud‑based workflow
    systems, and shape community‑outreach initiatives for the county. She also hopes to serve on the board of the Perry County Arts Council, applying her organizational strengths to support exhibitions
    and cultural programming. As she approaches retirement, she plans to launch a part‑time consulting practice offering efficiency audits and training for small nonprofits, allowing her to stay intellectually
    active while dedicating more time to her artistic pursuits.
