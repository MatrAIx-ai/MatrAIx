  hobbies: '["Gardening", "Church choir", "Book club", "Bridge (card game)", "Community cooking contests", "Historical site tours", "Digital photography", "Volunteer work at local food bank", "Walking groups",
    "Quilting"]'
  career_goals: Approaching retirement, Cheryl aims to transition from a hands‑on operator role to a supervisory position focused on safety and efficiency. She seeks certification in industrial safety and
    hopes to mentor younger workers, establishing a legacy of best practices on the shop floor. Cheryl also aspires to lead a small team in implementing continuous‑improvement projects, leveraging her competitive
    spirit to exceed production targets while maintaining the high reliability she values.
