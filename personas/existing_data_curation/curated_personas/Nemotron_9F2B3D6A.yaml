  hobbies: '["Solo hiking and trail running","Rock climbing (solo)","Training journal and performance logging","Reading exercise‑science journals","Puzzle solving (Sudoku, crosswords)","Python scripting
    for fitness data","Cooking experimental healthy meals","Ambient music listening","Meditation","Strategic video gaming"]'
  career_goals: Brian aims to earn the Certified Strength and Conditioning Specialist (CSCS) credential and complete a bachelor’s degree in Kinesiology within the next three years. He plans to open a boutique
    studio in Irving that emphasizes data‑driven, individualized training while limiting class sizes to maintain a focused, quiet environment. Long‑term, he wants to develop a proprietary AI‑powered fitness
    app that personalizes workouts based on real‑time biometric feedback. He also aspires to publish articles that challenge common fitness misconceptions, speak at industry conferences, and mentor emerging
    trainers without sacrificing his preference for solitary work.
