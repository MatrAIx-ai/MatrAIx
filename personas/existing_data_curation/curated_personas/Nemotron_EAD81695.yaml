personas:
  professional: Cheryl Vestal is a veteran clinical psychologist with three decades of practice who blends evidence‑based CBT and DBT with rigorous quantitative program evaluation, using SPSS and R to track
    outcomes, and their methodical, calm demeanor translates into precise documentation, reliable tele‑health implementation, and meticulous mentorship of emerging counselors.
  sports: Cheryl Vestal enjoys low‑impact activities such as weekly bird‑watching walks along the local nature trail and occasional senior softball games with the Lenawee County Seniors league, while cheering
    on the Detroit Tigers baseball team and the Michigan State Spartans basketball team, and they prefer gentle stretching over high‑intensity workouts.
  arts: Cheryl Vestal finds solace in knitting traditional Fair Isle scarves while listening to the soothing piano works of Erik Satie, indulges in macro‑photography of wildflowers inspired by the paintings
    of Georgia O'Keeffe, and reads classic literary fiction like Virginia Woolf’s "To the Lighthouse" alongside scientific journals, integrating these artistic influences into their reflective practice.
  travel: Cheryl Vestal favors thoughtful, low‑stress travel, planning day trips to historic sites such as the Amway Grand Plaza in Grand Rapids and the Henry Ford Museum, while their bucket list includes
    a quiet week exploring the gardens of Kyoto’s Kinkaku‑ji, and they often travel by train to minimize driving fatigue.
  culinary: Cheryl Vestal prefers home‑cooked meals, frequently preparing roasted vegetable medleys with rosemary and thyme, simmering lentil soups seasoned with cumin and turmeric, and they enjoy the occasional
    indulgence of a fresh peach cobbler, but they admit to a habit of forgetting to hydrate during long knitting sessions.
  core: Cheryl Vestal blends relentless curiosity with a tranquil, methodical outlook, cultivating a garden of knowledge and herbs while quietly mastering data‑driven counseling, modest finances, and low‑key
    hobbies, all while occasionally misplacing their glasses on the kitchen counter.
background:
  cultural: Cheryl was raised in a multi‑generational, white Midwestern family rooted in the agricultural communities of southern Michigan. The region’s values of self‑reliance, modesty, and community service
    shaped her strong work ethic and her preference for privacy. Her parents, both engineers, fostered a love of learning and a pragmatic outlook, which later merged with the progressive counseling philosophies
    of the 1970s. As a Baby Boomer, she witnessed significant social change, blending respect for tradition with openness to new ideas. While she participates modestly in her local church and the Saline
    historical society, she primarily gravitates toward solitary reflection, a hallmark of the quiet, introspective Midwest culture.
attributes:
  skills: '[''Cognitive Behavioral Therapy'', ''Dialectical Behavior Therapy'', ''Psychometric Assessment'', ''Crisis Intervention'', ''Evidence‑Based Program Development'', ''Statistical Data Analysis
    (SPSS, R)'', ''Electronic Medical Records Management'', ''Tele‑health Service Delivery'', ''Case Management'', ''Research Design and Evaluation'', ''Clinical Supervision and Mentoring'']'
  hobbies: '[''Gardening (vegetables and herbs)'', ''Bird watching'', ''Reading (scientific journals and literary fiction)'', ''Knitting and crocheting'', ''Crossword puzzles and sudoku'', ''Nature photography'',
    ''Walking local trails'', ''Historical research on Saline, MI'', ''Digitizing family photographs'']'
  career_goals: Approaching traditional retirement age, Cheryl intends to shift into a mentorship and consulting role that leverages her dual expertise in mental health and data analysis. In the next five
    years she aims to (1) launch a county‑wide, evidence‑based tele‑counseling network for older adults in Lenawee County, (2) author a handbook on integrating quantitative assessment into everyday counseling
    practice, (3) serve as a clinical supervisor for graduate counseling trainees, and (4) volunteer to lead a low‑stress support group for caregivers, ensuring the program reflects her methodical, calm
    approach.
