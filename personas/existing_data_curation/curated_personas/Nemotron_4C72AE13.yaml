personas:
  professional: An aspiring teen developer, Ana Baez blends her love for coding mini‑games in Scratch with her knack for tutoring younger peers, and they channel their organized yet adaptable mindset into
    collaborative school tech clubs.
  sports: Passionate about soccer, Ana Baez plays forward for the local Womelsdorf Youth Soccer Club, idolizes the US Women's National Team and follows the Philadelphia Union, and they also enjoy weekend
    salsa socials that keep their rhythm and fitness sharp.
  arts: With a sketchpad and drawing tablet in hand, Ana Baez draws inspiration from sci‑fi author Octavia Butler, anime director Hayao Miyazaki, and muralist Frida Kahlo, and they fuel both their digital
    art sessions and salsa rehearsals with playlists featuring Bad Bunny and traditional rhythms.
  travel: Having visited family in the capital of their ancestral homeland and explored the waterfalls of Shenandoah National Park, Ana Baez dreams of trekking the cloud forests of Costa Rica and attending
    a cultural festival in Oaxaca, and they prefer family‑planned itineraries that balance adventure with school commitments.
  culinary: An avid home chef, Ana Baez perfects gallo pinto with red beans, rice, and plantains, experiments with nacatamales and quesillo, and they love adding a dash of cilantro to avocado toast while
    mastering the art of whipping up homemade mango smoothies.
  core: Ana Baez is a curious, socially energized teen who juggles coding, soccer, and family recipes, often over‑committing to projects but they always find time to dance and sketch.
background:
  cultural: Ana comes from a Nicaraguan‑American family that maintains strong ties to their heritage while living in Womelsdorf, Pennsylvania. She grew up speaking both Spanish and English at home, celebrating
    Nicaraguan holidays such as Independence Day and participating in traditional customs like making gallo pinto and enjoying folk music. Family gatherings often include storytelling about life in Nicaragua,
    and regular video calls keep her connected to relatives abroad. In her community, she takes part in local Latinx cultural festivals and contributes to a cultural club at school, blending her Nicaraguan
    roots with the broader American environment.
