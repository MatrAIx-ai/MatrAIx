  career_goals: Ana aspires to combine her curiosity about science with her desire to help her community. In the near future, she plans to take advanced science and health courses, join her school's environmental
    club, and seek mentorship opportunities with local health professionals. Her long‑term goal is to earn a degree in public health or nursing, focusing on bilingual health education and outreach for underserved
    Latino communities. She hopes to eventually design community programs that improve health literacy and promote preventative care, while also keeping the door open to further education in environmental
    science.
