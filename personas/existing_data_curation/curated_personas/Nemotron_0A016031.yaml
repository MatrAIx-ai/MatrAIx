personas:
  professional: Rosby Wilson, a seasoned building inspector with three decades of experience, leverages their meticulous detail‑orientation and deep expertise in the International and Illinois Building
    Codes to conduct rigorous safety audits, mentor junior inspectors, and champion historic preservation in modern compliance projects.
  sports: Rosby Wilson captains a lively weekly bowling league, roots for the Chicago Bears and Chicago Bulls, takes gentle walks around their vegetable garden for low‑impact cardio, and competes in a senior
    chess club where they often out‑maneuver opponents.
  arts: Rosby Wilson avidly attends performances at the Champaign‑Urbana theatre circuit, admires the architectural works of Frank Lloyd Wright and the paintings of Georgia O’Keeffe, sings gospel and jazz
    standards in the church choir, and they collect reproductions of local avant‑garde art that fuel their conversations on design.
  travel: Rosby Wilson favors weekend road trips to historic towns such as Savannah and Charleston, plans annual visits to African‑American cultural festivals in Chicago to experience music and storytelling,
    dreams of strolling through Barcelona’s Modernist landmarks, and they budget their travel by leveraging senior discounts on Amtrak and budget‑friendly lodging.
  culinary: Rosby Wilson enjoys cooking hearty vegetable stews with carrots, kale, and tomatoes, masters smoked chicken using a backyard smoker, delights in tasting jambalaya at Chicago festivals, and they
    occasionally splurge on fresh rosemary for garden‑to‑table meals.
  core: Rosby Wilson blends meticulous inspection expertise with a vibrant community‑centered life, channels competitive energy into bowling and chess, guards a disciplined budget while they habitually
    over‑indulge in never‑finished woodworking projects.
background:
  cultural: Rosby’s cultural identity is rooted in a family history that traces back to the Great Migration, when his grandparents moved from the rural South to the industrial Midwest in search of better
    opportunities. Growing up in Dwight, Illinois, he was raised in a close‑knit African‑American community that emphasized church involvement, mutual support, and the value of hard work. His parents instilled
    pride in both his Black heritage and the Midwestern work ethic, encouraging him to pursue education and skilled trades. Over the years, Rosby has blended the storytelling traditions, music, and culinary
    flavors of his ancestry with the broader cultural fabric of central Illinois, participating in local civil‑rights commemorations and celebrating Juneteenth alongside county fairs. This dual cultural
    grounding informs his respect for historic preservation, his commitment to community service, and his desire to mentor younger professionals from diverse backgrounds.
