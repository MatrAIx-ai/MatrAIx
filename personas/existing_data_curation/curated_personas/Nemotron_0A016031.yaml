  career_goals: Looking ahead, Rosby aims to transition into a regional leadership role within the Illinois Department of Buildings, where he can influence statewide safety standards and develop a standardized
    training curriculum for inspectors. He plans to author a practical guidebook on integrating historic preservation considerations into modern building inspections, leveraging his artistic curiosity.
    Rosby also aspires to launch a boutique consulting firm that offers specialized compliance audits for heritage properties and small‑scale developers in the Midwest. In parallel, he hopes to mentor a
    new generation of inspectors through a partnership with the local community college, encouraging diverse candidates to pursue careers in construction safety.
