  career_goals: Looking ahead, Marjorie dreams of a career that merges her love for art, structure, and innovation. She aspires to become an architect who designs visually striking, sustainable spaces,
    or a concept artist for video games and graphic novels where she can apply her disciplined workflow to bring imaginative worlds to life. She is motivated to attend a specialized high‑school program
    for visual arts and later pursue a degree at an architecture or fine‑arts school, aiming to earn scholarships through competitions.
