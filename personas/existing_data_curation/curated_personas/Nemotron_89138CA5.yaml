personas:
  professional: Marjorie Landers, an aspiring visual artist and junior Scratch programmer, applies their meticulous organization and competitive drive to craft intricate digital illustrations and interactive
    stories that they treat as personal championships.
  sports: Marjorie Landers participates in the school’s soccer team as a disciplined defender, follows the hometown minor‑league baseball club the River City Raptors, and avidly watches the Golden State
    Warriors, balancing competitive instincts on the field with a preference for solo jogs in the neighborhood park to manage anxiety.
  arts: Marjorie Landers is a dedicated member of the school art club, regularly visiting the local contemporary art museum to study works by Frida Kahlo, Vincent van Gogh, and street artist Banksy, and
    channels that inspiration into their own paintings, often experimenting with acrylics, watercolor, and digital sketching while maintaining high standards for each piece.
  travel: Marjorie Landers enjoys weekend family road trips to nearby state parks for sketching nature scenes, has visited the national museum in Washington, D.C., dreams of exploring Kyoto’s historic temples
    to experience traditional Japanese art, and prefers detailed itineraries over spontaneous travel, often planning each museum visit months in advance.
  culinary: Marjorie Landers prefers simple, fresh meals like homemade vegetable pizza topped with mozzarella and basil, enjoys crafting avocado toast with a sprinkle of chili flakes, and often helps in
    the garden harvesting carrots and tomatoes, though they can be particular, refusing to eat foods with strong textures such as raw onions.
  core: Marjorie Landers is an 11‑year‑old whose disciplined, competitive nature fuels a thriving love of art, coding, and chess, while they experience intense anxiety and occasional impulsive splurges
    on supplies that reveal a delicate balance between meticulous order and emotional turbulence.
background:
  cultural: Marjorie grew up in a white, middle‑class family in Fayetteville, North Carolina, a city shaped by its proximity to Fort Bragg and a blend of Southern traditions and military community influences.
    Her household observes typical Southern customs—celebrating holidays like Thanksgiving and Christmas with family gatherings, attending a local Baptist church, and valuing community service. The diverse
    cultural fabric of Fayetteville, including historic African‑American heritage sites and military family exchanges, has broadened her perspective, fostering an appreciation for varied experiences while
    grounding her in a Southern identity that emphasizes courtesy, resilience, and a strong sense of place.
