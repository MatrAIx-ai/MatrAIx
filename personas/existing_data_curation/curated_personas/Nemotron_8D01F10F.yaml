  career_goals: In the near term, Tao aims to release a debut EP that showcases his cross‑cultural sound, collaborating with local indie musicians and possibly scoring a short film for a regional festival.
    He hopes to build a modest but loyal fan base in Amherst and the greater Pioneer Valley through intimate house concerts and community events. Long‑term, he envisions establishing an independent label
    that supports Asian‑American artists, touring nationally with a small ensemble, and eventually composing for larger multimedia projects while mentoring emerging musicians from under‑represented backgrounds.
