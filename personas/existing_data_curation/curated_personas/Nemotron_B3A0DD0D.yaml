personas:
  professional: Leopoldo Lora, a 37‑year‑old administrative support professional, merges methodical office management with a creative eye for curating art displays, leveraging bilingual fluency and strong
    interpersonal skills to orchestrate meetings, budgets, and community events, all while eyeing an Office Manager promotion.
  sports: Leopoldo Lora fuels fitness through midnight salsa dancing at the Miami Salsa Social Club and weekend beach volleyball at South Beach, while cheering for the Miami Heat in the NBA season and the
    Miami Marlins in the MLB, treating sports as a social outlet.
  arts: Leopoldo Lora immerses themselves in Miami’s vibrant murals and the Pérez Art Museum, regularly reviewing exhibitions on artists like Kehinde Wiley, Tania Bruguera, and local muralist Nina Surel,
    while collecting vintage Cuban vinyl that informs their appreciation for visual rhythm and using their blog to dissect how each piece impacts emotional wellbeing.
  travel: Leopoldo Lora prefers immersive cultural trips, planning visits to Havana’s historic plazas, the street art alleys of Valparaíso, and the museums of New York City, balancing a modest travel budget
    with occasional splurges on airfare that allow them to reconnect with heritage and broaden artistic perspectives.
  culinary: Leopoldo Lora delights in weekly kitchen rituals of preparing ropa vieja, picadillo, and moros y cristianos—using guava paste, mojo sauce, and black beans—hosting cozy dinner gatherings where
    friends sample homemade croquetas and plantain tostones, while they experiment with modern plating inspired by gallery aesthetics.
  core: Leopoldo Lora is a socially vibrant, meticulously organized administrator whose love for art and cooking intertwines with a restless mind that constantly seeks calm through mindfulness, yet sometimes
    spirals into anxiety‑driven over‑planning.
background:
  cultural: Leopoldo is a first‑generation Cuban‑American raised in Miami's Little Havana neighbourhood. His household was bilingual, with Spanish spoken at home and English at school, fostering a deep
    connection to both cultures. Family traditions revolve around multi‑generational meals, music, and celebrations such as Carnaval Miami and Cuban Heritage Month. He grew up listening to son, bolero,
    and salsa, and these rhythms influence his love for dance and community gatherings. Catholic values and a strong sense of community responsibility shaped his cooperative and kind nature. The Cuban emphasis
    on hospitality and celebration of art informs his sociable personality, his appreciation for varied experiences, and his desire to contribute to cultural life in Miami.
attributes:
  skills: '[''Office administration'', ''Calendar and meeting coordination'', ''Data entry and records management'', ''Bilingual communication (English/Spanish)'', ''Microsoft Office Suite'', ''Google Workspace'',
