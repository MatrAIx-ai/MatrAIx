  hobbies: '[''Visiting art galleries and museums'', ''Salsa dancing and social dancing'', ''Cooking Cuban cuisine'', ''Hosting dinner gatherings'', ''Blogging about art and culture'', ''Reading psychology/self‑help
    books'', ''Mindfulness meditation'', ''Volunteering as an English tutor'', ''Traveling to Cuba'', ''Collecting vintage Cuban vinyl records'']'
  career_goals: Leopoldo aims to advance to an Office Manager or Administrative Team Lead role within the next three years, obtaining a Certified Administrative Professional (CAP) credential and a basic
    project management certification (CAPM). He plans to complete his GED and enroll in an associate degree program in Business Administration at a community college, which will provide a foundation for
    future leadership positions. Long‑term, he dreams of merging his administrative expertise with his passion for the arts by moving into arts administration at a local cultural institution or by establishing
    a boutique consultancy that helps small arts organizations with operational and event‑planning needs. He also seeks to develop mentorship skills to support newer staff and to build coping strategies
    for his anxiety through professional development and wellness programs.
