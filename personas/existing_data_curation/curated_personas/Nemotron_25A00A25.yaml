personas:
  professional: Dane Jane, a seasoned secondary school teacher with 30+ years of experience, merges meticulous lesson planning and bilingual instruction with a passion for mural art, leading after‑school
    art clubs and coordinating community murals that embed Mexican heritage into the curriculum while aspiring to head the school’s arts department.
  sports: Dane Jane, a sociable fitness advocate, leads a Saturday youth soccer program for the Live Oak County Youth Soccer Association, plays weekly pick‑up matches with the local Live Oak Kickers, cheers
    on the Dallas Cowboys and Houston Astros during game nights, and maintains a disciplined morning jog routine in spring to balance energy for coaching.
  arts: Dane Jane, an enthusiastic muralist, draws inspiration from Diego Rivera and Frida Kahlo while strumming traditional folk songs by Lila Downs on guitar, attends Ballet Folklórico de Texas performances,
    and curates community art exhibitions that celebrate Mexican literary and visual heritage.
  travel: Dane Jane, an adventurous planner, prefers meticulously organized trips to historic sites like Mexico City, Oaxaca, and San Miguel de Allende, and enjoys weekend getaways to Santa Fe, New Mexico,
    balancing cultural immersion with family time, while budgeting travel through a dedicated savings fund.
  culinary: Dane Jane, a proficient home cook, regularly prepares authentic dishes such as tamales, mole poblano, and chiles en nogada using fresh corn masa, ancho chiles, and epazote from their garden,
    and delights students and neighbors with shared meals at community events, though they sometimes over‑season with salt.
  core: Dane Jane, a calm, organized educator and community artist, blends bilingual teaching with vibrant murals, meticulous budgeting, and a love for Mexican folk music, while occasionally indulging in
    vintage guitar splurges and battling mild hypertension.
background:
  cultural: Dane is a first‑generation Mexican‑American whose family maintains strong ties to their Mexican heritage while embracing life in rural Texas. He grew up bilingual, speaking Spanish at home and
    English at school, and was raised with traditions such as Día de los Muertos, quinceañeras, and Catholic holidays. These cultural practices shape his worldview, fostering a deep respect for family,
    community, and collective celebration. In his teaching, Dane weaves Mexican folklore, music, and visual arts into lessons, creating a bridge between his students’ diverse backgrounds and the rich tapestry
    of Mexican culture. He is an active member of the local Hispanic community organization, participating in cultural preservation projects and advocating for Mexican‑American representation in regional
    educational policy.
attributes:
  skills: '["Classroom management", "Lesson planning and curriculum design", "Bilingual instruction (Spanish & English)", "Art education and visual arts integration", "Culturally responsive teaching", "Community
    outreach and partnership building", "Event coordination (school festivals, murals)", "Mentorship and peer coaching", "Conflict resolution", "Time management and organization", "Educational technology
    integration", "Extracurricular program leadership", "Team collaboration"]'
  hobbies: '["Mural painting", "Playing guitar (traditional Mexican folk music)", "Cooking Mexican cuisine", "Gardening native herbs", "Reading art history and Mexican literature", "Volunteering at community
    cultural center", "Coaching youth soccer", "Photography of community events", "Traveling to historic Mexican sites", "Attending regional festivals and dances"]'
  career_goals: Dane aims to become the head of the arts department at his school, using that platform to institutionalize a bilingual, culturally inclusive curriculum across the district. He plans to earn
    his GED and subsequently complete an associate degree in education to formalize his credentials while continuing to teach. He also envisions launching a community‑wide public‑art initiative that engages
    local students and elders in creating murals that celebrate Mexican heritage. Long‑term, Dane hopes to mentor retiring teachers, write a guide on culturally responsive pedagogy, and eventually transition
    to a community cultural liaison role that preserves and promotes Mexican traditions in Live Oak County.
