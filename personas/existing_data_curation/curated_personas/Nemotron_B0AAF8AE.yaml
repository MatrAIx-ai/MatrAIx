  career_goals: Curtis aspires to pursue a career that offers clear structure and measurable outcomes. He is particularly drawn to civil engineering, imagining himself designing safe bridges and sustainable
    infrastructure. He also entertains the idea of becoming a veterinarian, motivated by his kindness toward animals and desire to help others in a well‑defined professional role. In the long term, he hopes
    to attend a strong STEM high school and later university, maintaining his high academic standards while contributing to projects that improve his community.
