personas:
  professional: Curtis Scaturro, a twelve‑year‑old budding robotics enthusiast and LEGO architect, combines disciplined programming in Arduino C++ with meticulous mechanical design, leading their middle‑school
    robotics club’s competition builds while applying their love for order and high standards to every circuit and brick layout.
  sports: Curtis Scaturro, a twelve‑year‑old youth swimmer on the River Valley Dolphins club, dedicates themselves to lap drills and open‑water training, follows the Los Angeles Lakers for basketball inspiration,
    cheers for the New England Patriots during football season, and incorporates structured fitness routines into their after‑school schedule to balance their love of competition with their need for predictable
    exercise.
  arts: Curtis Scaturro, a twelve‑year‑old piano devotee, devotes daily practice to technically demanding pieces like Beethoven's Moonlight Sonata and Chopin's Etudes, while also drawing creative inspiration
    from the cinematic scores of Hans Zimmer and the pixelated soundscapes of Minecraft, and they never miss an episode of The LEGO Movie for its blend of storytelling and visual design.
  travel: Curtis Scaturro, a twelve‑year‑old who loves meticulously planned trips, has explored the Kennedy Space Center with their family, dreams of attending the International Robot Expo in Tokyo, and
    they regularly add new destinations like the Grand Canyon and Barcelona to their well‑illustrated travel journal, balancing wanderlust with the constraints of school schedules and parental budgeting.
  culinary: Curtis Scaturro, a twelve‑year‑old with a penchant for precise meals, often crafts perfectly measured grilled cheese sandwiches using exactly two slices of sharp cheddar and a tablespoon of
    butter, enjoys assembling LEGO‑shaped fruit kebabs with pineapple, strawberries, and grapes, and they show budding cooking skills by following step‑by‑step video tutorials for spaghetti carbonara.
  core: Curtis Scaturro, a twelve‑year‑old LEGO‑building, piano‑playing planner who thrives on structure, worries about perfection, and occasionally sacrifices sleep for their next project, they demonstrate
    disciplined creativity tempered by gentle anxiety.
background:
  cultural: Curtis was raised in Spring, Texas, a suburban community in Montgomery County with a predominantly middle‑class white population. His family embraces Southern traditions such as weekend football
    games, BBQ gatherings, and regular attendance at a local Baptist church. He celebrates holidays like Thanksgiving, the Fourth of July, and Christmas with family meals and community events. While his
    ancestry traces back to Irish and English roots, his upbringing reflects a blend of classic Texan hospitality, a strong emphasis on education, and active participation in community service through the
    school and church.
