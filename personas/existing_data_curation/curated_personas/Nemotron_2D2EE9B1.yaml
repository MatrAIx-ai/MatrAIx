  hobbies: '[''Journaling'', ''Sketching'', ''Reading graphic novels'', ''Playing soccer'', ''Robotics club participation'', ''Baking traditional Mexican pastries'', ''Listening to Latin pop and Mexican
    folk music'', ''Watching nature documentaries'']'
  career_goals: Guadalupe aspires to combine her love of science with a desire to serve her community. She hopes to earn a scholarship to study environmental engineering or sustainable agriculture, fields
    where she can apply her practical mindset to solve real‑world problems like water conservation and food security. She also envisions working as a bilingual liaison, helping immigrant families navigate
    school systems and environmental programs. In the long term, she aims to obtain a degree in engineering, graduate from a university that supports first‑generation students, and eventually lead community‑based
    projects that improve the quality of life in both her Wisconsin suburb and Mexican heritage neighborhoods.
