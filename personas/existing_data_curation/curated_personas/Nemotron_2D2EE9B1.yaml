personas:
  professional: Guadalupe Linares, a budding robotics enthusiast in middle school, combines methodical planning with creative problem-solving to design autonomous soccer ball collectors for their club while
    they balance curiosity about new sensors with proven engineering methods.
  sports: Guadalupe Linares, a midfield player for the local youth soccer team the River Valley Rovers, trains thrice weekly, follows the tactical strategies of the Premier League club Tottenham Hotspur,
    and balances competitive play with a love for spontaneous park pickup games during school breaks, and they often analyze game footage to improve their positioning.
  arts: Guadalupe Linares, who sketches detailed cityscapes in a spiral-bound journal and draws inspiration from graphic novel artists like Alex Ross and environmental documentaries, enjoys listening to
    contemporary Latin pop stars such as Bad Bunny and classic folk singers like Victor Jara while they unwind after school, and they occasionally experiment with digital art tools to expand their style.
  travel: Guadalupe Linares dreams of exploring the biodiverse rainforests of Costa Rica and the historic streets of Barcelona, plans trips with a detailed itinerary that includes sketching spots and local
    food markets, but currently limits travel to weekend family visits to nearby state parks like Redwood National Forest due to school commitments, and they keep a travel journal to capture each adventure.
  culinary: Guadalupe Linares, an avid baker in the family kitchen, perfects pan dulce and tamales on weekends while experimenting with cinnamon-sugar doughnuts and spicy chipotle salsa, yet often forgets
    to clean the kitchen counters before diving into the next recipe, and they love sharing their treats with neighbors who appreciate homemade sweets.
  core: Guadalupe Linares blends a love for structured robotics projects with spontaneous sketching of city skylines, expertly balancing disciplined planning and a curious, slightly night-owl habit that
    fuels both creative and academic pursuits, and they often stay up late perfecting a design before sunrise.
background:
  cultural: 'Guadalupe grows up in a bicultural Mexican‑American household in New Berlin, Wisconsin. Her parents immigrated from the state of Jalisco, and she was raised speaking Spanish at home while attending
    an English‑language public middle school. Family traditions such as celebrating Día de los Muertos, cooking mole and tamales, and attending the local Catholic parish are central to her identity. At
    the same time, she partakes in Wisconsin customs like the Dairyland Festival and winter ice‑skating, creating a blended cultural perspective. This dual heritage fosters a strong sense of community responsibility:
    she values family loyalty and respects the collective spirit of her Mexican roots, while also embracing the independent, volunteer‑oriented ethos of her Midwestern surroundings. Her cultural background
    informs her bilingual proficiency, culinary interests, and her ambition to bridge gaps between immigrant families and local institutions.'
attributes:
  skills: '[''Bilingual (Spanish/English)'', ''Mathematics problem solving'', ''Scientific inquiry'', ''Project planning and time management'', ''Team collaboration and leadership'', ''Basic coding (Python,
