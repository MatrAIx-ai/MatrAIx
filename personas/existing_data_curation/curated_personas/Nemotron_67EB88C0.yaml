personas:
  professional: A nonprofit program coordinator in training, Davina Andry leverages their meticulous project management skills, compassionate mediation style, and digital budgeting expertise to design community
    youth initiatives that balance innovative ideas with proven outreach methods.
  sports: An active fitness enthusiast, Davina Andry spends weekends hiking the Natchez Trace Trail with the Natchez Trail Trekkers club, practices yoga three times a week at the downtown studio, cheers
    on the Atlanta Braves and New Orleans Pelicans, and occasionally joins a co-ed adult soccer league at the city park to stay socially engaged and fit.
  arts: Culturally vibrant, Davina Andry fuels their creative spirit through weekly salsa lessons set to Celia Cruz and Shakira, starring in community theater productions of Neil Simon comedies, devouring
    mystery novels by Agatha Christie and Gillian Flynn, and attending the local book club where discussions often reference the films of director Ava DuVernay.
  travel: An adventurous yet organized traveler, Davina Andry has explored Asheville's craft breweries, the historic streets of Charleston, and the jazz scene of New Orleans, and now dreams of a culinary
    pilgrimage to Oaxaca, Mexico, while planning each trip with a spreadsheet of budget, itinerary, and yoga-friendly accommodations, balancing structured research with spontaneous detours.
  culinary: A modest yet inventive home chef, Davina Andry blends Southern comfort foods like shrimp and grits, collard greens, and jambalaya with fresh garden harvests of tomatoes, basil, and okra, frequently
    seasoning dishes with smoked paprika and hot sauce, while mastering the art of slow-cooked gumbo and occasionally experimenting with Mexican mole after a trip to Oaxaca.
  core: Davina Andry is a methodical, socially-driven community catalyst who balances careful planning with spontaneous creativity, turning every hobby from salsa to gardening into a platform for connection
    and growth.
background:
  cultural: Davina was raised in Oxford, Mississippi, within a middle‑class Southern family that emphasized hospitality, church involvement, and strong community ties. Growing up near the University of
    Mississippi exposed her to a blend of academic and cultural events, while family traditions—like weekend barbecues, church gatherings, and a love for Southern music—shaped her values of kindness and
    cooperation. She respects the region's history and evolving demographics, integrating traditional Southern values of generosity and resilience with an openness to new ideas and progressive community
    initiatives.
attributes:
  skills: '[''Project Management'', ''Event Planning'', ''Community Outreach'', ''Interpersonal Communication'', ''Conflict Resolution'', ''Budgeting and Financial Tracking'', ''Digital Literacy (Microsoft
    Office, Google Suite)'', ''Volunteer Coordination'', ''First Aid and Basic Caregiving'', ''Time Management'']'
  hobbies: '[''Salsa dancing'', ''Community theater'', ''Gardening'', ''Cooking Southern cuisine'', ''Hiking on the Natchez Trace Trail'', ''Volunteering at the local animal shelter'', ''Reading mystery
    novels'', ''Puzzle solving (crosswords, Sudoku)'', ''Book club participation'', ''Yoga'']'
  career_goals: Davina aims to re‑enter the workforce in a role that leverages her organizational strengths and compassion, such as a program coordinator for a local nonprofit focused on youth and family
    services. She plans to earn a bachelor's degree in social work or nonprofit management within the next three years and to obtain a Certified Associate in Project Management (CAPM) credential. Long‑term,
    she envisions starting her own community‑consulting firm that helps small organizations streamline their operations and increase their impact, while also maintaining a stable income that supports her
    independence.
