  career_goals: Tyrone aims to advance to a regional sales manager position within the next three to five years, where he can lead a team, expand the client portfolio, and shape sales strategy for a larger
    territory. He plans to earn professional certifications such as Certified Professional Salesperson (CPS) and pursue an associate’s degree in business or supply‑chain management to complement his practical
    experience. Long‑term, he envisions launching his own distribution business focused on niche manufacturing products, achieving financial stability for himself and providing support to his extended family.
