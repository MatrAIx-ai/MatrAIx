  hobbies: '[''Reading contemporary fiction'', ''African‑American poetry'', ''Watercolor painting'', ''Gardening'', ''Cooking heritage recipes'', ''Book club'', ''Volunteer at health fairs'', ''Yoga'',
    ''Hiking'', ''Photography'', ''Visiting art galleries'']'
  career_goals: Dora aims to move into a nurse manager or clinical educator role within the next five years, leading quality‑improvement projects that address health disparities in underserved Black communities.
    She plans to earn a Master’s degree in Nursing Leadership or Public Health, develop a community‑health outreach program focused on chronic‑disease prevention and health literacy, and mentor junior nurses.
    Additionally, she hopes to integrate arts‑based therapeutic techniques into patient‑care protocols and eventually author a guidebook on culturally sensitive nursing practice.
