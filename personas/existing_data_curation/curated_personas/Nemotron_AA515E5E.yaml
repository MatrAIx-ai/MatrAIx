personas:
  professional: Dora Griffin, a seasoned medical‑surgical and geriatric nurse with two decades of experience, leverages their meticulous organizational skills and curiosity to lead quality‑improvement initiatives
    while weaving therapeutic storytelling into patient education, and they quietly battle stress‑induced worry during busy shifts.
  sports: Dora Griffin, an avid hiker of the Rockefeller Trail and regular participant in a Westchester yoga studio, roots for the New York Yankees in summer, cheers on the New York Knicks during basketball
    season, and they balance their fitness routine with occasional weekend runs with the Hudson Valley Hiking Club.
  arts: Dora Griffin, a watercolor landscape painter who devotes evenings to capturing everyday moments, finds inspiration in the poems of Langston Hughes, the prose of Toni Morrison, and the vibrant canvases
    of Kehinde Wiley, while attending Hudson Valley gallery openings featuring works by contemporary artists like Amy Sherald, and they unwind to Nina Simone on a vintage record player.
  travel: Dora Griffin, who meticulously plans weekend getaways to the Hudson Valley for hiking and gallery tours but dreams of a week‑long culinary immersion in Oaxaca, Mexico, they balance their love
    of adventure with a modest travel budget, favoring off‑season flights and boutique B&Bs over luxury resorts.
  culinary: Dora Griffin, an enthusiastic home cook, expertly combines Southern soul‑food staples like collard greens and smoked turkey with Caribbean spices such as Scotch bonnet pepper and coconut milk
    to create dishes like jerk‑seasoned shrimp and grits, often improvising with fresh herbs from their patio garden and they relish the occasional dinner party with friends.
  core: Dora Griffin navigates life with a blend of methodical precision and creative curiosity, often over‑planning their schedule while secretly hoarding a stash of scented candles for late‑night reading,
    and they battle a persistent worry‑monster that fuels both their compassion for patients and their love of yoga.
background:
  cultural: Dora is an African‑American woman whose family roots trace back to the Southern United States and the Caribbean. She grew up in a close‑knit Black community where gospel music, church fellowship,
    and oral storytelling were central. She celebrates cultural milestones such as Juneteenth and Kwanzaa and maintains connections with extended family across the diaspora. Living in New Rochelle, a diverse
    suburb of New York City, she blends her heritage with the multicultural fabric of the region, actively advocating for health equity and culturally competent care for patients of varied backgrounds.
