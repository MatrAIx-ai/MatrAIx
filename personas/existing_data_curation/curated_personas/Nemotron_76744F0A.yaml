  career_goals: Norberto aims to move into a supervisory role within the next three to five years, targeting a foreman or crew lead position where he can apply his organizational strengths and safety focus.
    He plans to earn an NCCER certification in Construction Craftsmanship and complete a community‑college certificate in Construction Management to broaden his technical knowledge. Ultimately, he envisions
    starting a modest family‑owned contracting business that emphasizes reliable service, clear communication, and a safe workplace for his team and his own family’s future.
