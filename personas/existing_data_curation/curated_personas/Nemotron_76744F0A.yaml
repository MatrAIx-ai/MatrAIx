personas:
  professional: Norberto Videa is a seasoned construction specialist in the San Diego area, leveraging their expertise in concrete finishing, framing, and bilingual crew coordination to deliver projects
    on schedule while rigorously enforcing OSHA safety protocols, reflecting their preference for structured workflows and their reliable, detail‑oriented nature.
  sports: Norberto Videa spends Saturday mornings fishing at Lake El Cajon, hikes the Cuyamaca Mountains in the cooler months, follows the San Diego Padres and Liga MX’s Club América on TV, and joins a
    weekly pickup soccer game with the local “Cañon FC” amateur league, treating their fitness routine as a blend of low‑impact outdoor recreation and light team sport.
  arts: Norberto Videa enjoys winding down to the sounds of Vicente Fernández and Los Tigres del Norte, attends community Día de Los Muertos art installations, and occasionally catches a performance by
    the San Diego Symphony or a local Mexican‑themed theater production, integrating cultural music and visual arts into their family evenings.
  travel: Norberto Videa prefers family‑oriented road trips that blend cultural immersion and outdoor adventure, having taken their wife and kids to Oaxaca’s historic markets and the Grand Canyon’s rim,
    while they dream of a future camping expedition in Patagonia’s Torres del Paine and a relaxed weekend retreat at a coastal resort in Cabo San Lucas.
  culinary: Norberto Videa is an avid home chef who expertly prepares hand‑rolled tamales with masa harina, pork fillings, and a simmered mole rojo thickened with chocolate and ancho chilies for holidays,
    while also mastering grilled tilapia seasoned with lime, cumin, and fresh cilantro for casual dinners.
  core: Norberto Videa balances a meticulous, safety‑first work ethic with a habitual tendency to over‑worry about project deadlines, often treating their meticulously organized tool chest like a comfort
    object while secretly indulging in late‑night video games to unwind.
background:
  cultural: Norberto is a first‑generation Mexican‑American who grew up speaking Spanish at home while attending school in the United States. His upbringing in a close‑knit Mexican community in El Cajon
    instilled strong family values, respect for hierarchy, and a collaborative spirit. He celebrates traditional holidays such as Día de Los Muertos, Las Posadas, and Mexican Independence Day, often sharing
    these customs with his children. His bilingual ability enables him to bridge cultural gaps at work and within his neighborhood, and his culinary heritage influences his love for cooking and community
    gatherings. The blend of Mexican cultural pride and American work ethic shapes his identity and informs both his personal and professional life.
