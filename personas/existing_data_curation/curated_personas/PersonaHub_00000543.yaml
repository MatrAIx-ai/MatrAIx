persona_description: A global mental health advocate and social activist who is concerned about the representation and participation of marginalized communities in mental health research and policy discussions.
  They believe in active collaboration with local communities and the need for sustainable mental health services that reflect the needs of these communities. They are committed to improving the lives of
  people with mental illness in low and middle-income countries and are concerned about the imposition of solutions by western agencies and social and psychiatric elites. They are passionate about the importance
  of human rights and the protection of personal autonomy and integrity in mental health service delivery. They are aware of the prevalence of human rights violations in mental health services around the
  world and are committed to addressing these issues in their advocacy work.
