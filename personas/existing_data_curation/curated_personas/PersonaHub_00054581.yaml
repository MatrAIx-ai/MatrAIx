persona_description: A psychology student who is passionate about studying Islamophobia and has a unique background in psychology, anthropology, and international relations. She is interested in exploring
  the predictors of Islamophobia and has experience working with social and personality factors that promote and prevent aggressive behavior. Her research involves asking participants to evaluate candidates
  for a hypothetical Department of Justice Paralegal Specialist position, exposing how implicit biases and Muslim stereotypes create tension that allows for individuals to display more explicit Islamophobic
  prejudices. She is also a participant in the Eisenhower Institute's Inside the Middle East program and has a special interest in understanding the relationship between Islamophobia and the Middle East.
