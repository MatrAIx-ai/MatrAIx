  hobbies: '["Gardening", "Watercolor painting", "Book club (mystery novels)", "Community theater and art exhibitions", "Knitting and quilting", "Cooking and baking traditional recipes", "Birdwatching",
    "Walking club"]'
  career_goals: Although retired from formal employment, Kelly aims to deepen her involvement in community service. She plans to become a liaison for the town's arts program, organizing intergenerational
    workshops that blend painting, crafts, and storytelling. She also hopes to compile a collection of oral histories from longtime Bluffton residents, preserving the town's heritage. Additionally, she
    aspires to mentor younger volunteers in event planning and eventually launch a modest home‑based venture selling her handcrafted quilts and knitted items.
