personas:
  professional: Kelly Martin, a retired community events coordinator turned town arts liaison, channels their methodical planning, volunteer management, and budget‑savvy skills into designing intergenerational
    workshops that fuse watercolor painting, quilting, storytelling, and local history preservation, while their outgoing nature ensures every participant feels welcomed.
  sports: Kelly Martin stays active through the Bluffton Walking Club’s weekly nature hikes, enjoys senior pickleball matches at the community center, and follows the Charleston Battery soccer team with
    fervor, balancing gentle cardio with the occasional bird‑watching stroll.
  arts: Kelly Martin fills their days with watercolor landscapes inspired by Monet and O’Keeffe, regularly attends community theater productions featuring actors like Meryl Streep, indulges in mystery novel
    discussions with the book club, and crafts vibrant quilts and knitted blankets while listening to James Taylor’s acoustic melodies.
  travel: Kelly Martin prefers well‑planned road trips, often visiting Savannah’s historic squares, the Blue Ridge Mountains for leaf‑watching, and occasionally dreaming of a coastal retreat in Nantucket,
    balancing leisurely drives with a modest travel budget and a reliance on senior discounts.
  culinary: Kelly Martin delights in cooking garden‑fresh vegetable stew seasoned with rosemary and thyme, baking buttery apple pie with a flaky crust, and perfecting Southern cornbread using buttermilk,
    while their moderate cooking skill leads them to experiment with new recipes only when the seasonal harvest inspires them.
  core: Kelly Martin blends meticulous organization with a boundless curiosity, turning community service, art, and gardening into a lively tapestry of intergenerational connection, even if they sometimes
    overcommit and forget to pause for themselves.
background:
  cultural: Kelly was raised in a small‑town Midwestern family in Ohio, descending from English and German ancestors who settled in the region in the late 19th century. Her upbringing emphasized community
    involvement, church participation, and self‑reliance. She grew up attending local fairs, church socials, and school events, fostering a deep appreciation for local traditions and collective harmony.
    This cultural foundation informs her values of cooperation, hospitality, and a lifelong curiosity for art and new ideas.
attributes:
  skills: '["Community event planning", "Volunteer coordination", "Budgeting and record‑keeping", "Gardening and horticulture", "Painting (watercolor)", "Knitting and quilting", "Public speaking", "Creative
