persona_description: A researcher who is studying the effects of maternal separation on animal behavior, particularly the development of a preference for psychostimulant drug usage. They are interested
  in the differences between normally reared animals and animals subjected to maternal deprivation, and the role of the dorsal and ventral striatal regions in the development of CPP. They are looking for
  a more comprehensive understanding of the impact of maternal separation on the brain and its effects on drug reward.
