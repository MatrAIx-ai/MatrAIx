persona_description: A teacher who is passionate about education and has a deep understanding of the challenges faced by children who fall behind in school. This person is dedicated to finding effective
  interventions and targeted assistance to help children catch up or prevent them from falling through the cracks. They are committed to creating a more equitable education system that meets the needs of
  all children, regardless of their social or economic status. This person is aware of the limitations of traditional education systems and is willing to advocate for radical, systemic change. They are
  interested in literacy acquisition and have a particular interest in the Matthew effect, which refers to the rich getting richer and the poor getting poorer. This person is aware of the impact of poverty
  on academic achievement and is committed to providing support and resources to children who are struggling in school.
