personas:
  professional: Michael Clement is a civil engineer who blends rigorous structural analysis with a keen eye for public art, leveraging AutoCAD, Revit, and Civil 3D to design sustainable transportation corridors
    while leading multidisciplinary teams with organized precision, charismatic stakeholder presentations, and a natural flair for community outreach.
  sports: Michael Clement pursues fitness through weekly hikes along the Orange County coastline with the local Trailblazers Hiking Club—where they regularly chat up new members—occasional beach volleyball
    at Huntington Beach, and a routine of early‑morning runs that keep them cheering for the Los Angeles Dodgers, Anaheim Ducks, and LA Rams while they balance cardio with yoga to stretch out hiking‑induced
    back tightness.
  arts: Michael Clement fuels their creative side by sketching the geometric lines of downtown LA warehouses, photographing vibrant street murals by artists like Banksy and Shepard Fairey, curating playlists
    that blend John Mayer acoustic riffs with Tame Impala synth‑pop, and performing original acoustic renditions at open‑mic nights where they confidently engage the audience alongside local singer‑songwriters
    such as Phoebe Bridgers.
  travel: Michael Clement balances a meticulously organized travel itinerary—complete with budget spreadsheets and pre‑booked Airbnb stays in San Francisco and Portland—with spontaneous weekend getaways
    along the Pacific Coast Highway to Big Sur, while dreaming of immersive street‑art tours in Berlin and culinary explorations of Oaxaca, all within the time constraints of a demanding engineering career,
    and they often share travel stories at community meet‑ups.
  culinary: Michael Clement enjoys cooking Mediterranean‑inspired shrimp tacos with fresh lime, cilantro, and jalapeño, perfecting a moderately skilled sous‑vide salmon while also savoring farmer’s‑market
    avocado toast topped with chili flakes, and they frequently treat themselves to craft IPAs after a night of acoustic playing.
  core: Michael Clement is a civically minded engineer‑artist who channels relentless organization, boundless sociability, and a coffee‑driven habit into building publicly beautiful, sustainable spaces
    while occasionally over‑planning their own free time.
background:
  cultural: Michael is a white American raised in Placentia, a suburban community in Orange County, California. His family is of European descent; his mother was a high‑school English teacher and his father
    owned a small family business. Growing up in a culturally diverse Southern California environment exposed him to Mexican, Asian, and Pacific Islander communities, fostering an appreciation for multicultural
    perspectives. His upbringing emphasized community service, frequent visits to museums and theater, and a strong work ethic. These influences blend typical middle‑class American values with the region’s
    progressive, arts‑focused ethos, shaping his inclusive, collaborative outlook.
attributes:
  skills: '[''AutoCAD'', ''Revit'', ''Civil 3D'', ''SAP2000'', ''ETABS'', ''Structural analysis'', ''Stormwater management'', ''Site grading'', ''Project management'', ''Budgeting and cost estimation'',
