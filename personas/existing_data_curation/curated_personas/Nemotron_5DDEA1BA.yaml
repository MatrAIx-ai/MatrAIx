  hobbies: '[''Visiting art galleries and museums'', ''Sketching architecture and installations'', ''Urban photography'', ''Hiking coastal trails'', ''Playing acoustic guitar'', ''Open‑mic performances'',
    ''Volunteering with Habitat for Humanity'', ''STEM mentorship for high‑school students'', ''Improvisational theatre'', ''Attending community meetups'']'
  career_goals: Michael aims to become a licensed Professional Engineer within the next two years and advance to senior project manager overseeing large‑scale sustainable infrastructure projects in Orange
    County. He aspires to specialize in integrating public art and green design into transportation and civic works, leading interdisciplinary teams that blend engineering rigor with cultural relevance.
    In the longer term, he hopes to launch a non‑profit that empowers local neighborhoods to co‑design public spaces, and eventually assume a leadership role in a municipal planning department where he
    can shape policy around resilient, artistically enriched infrastructure.
