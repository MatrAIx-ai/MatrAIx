personas:
  professional: Salvador Gonzalez, a 2-year-old who pretends to be a meticulous caretaker, carefully arranges toy blocks by size and color with surprising methodical precision, and they demonstrate an early
    blend of curiosity and practicality that hints at a future in organized professions.
  sports: Salvador Gonzalez, a 2-year-old who enjoys toddler gymnastics at the community center and a weekly mini soccer session wearing a tiny jersey of the River City Runners, prefers small-group play
    over noisy fields, and they eagerly practice kicking soft balls under careful supervision.
  arts: Salvador Gonzalez, a 2-year-old who delights in watching animated music videos by Baby Shark and listening to the gentle piano of Ludovico Einaudi, loves finger-painting in the bright style of Eric
    Carle, and they frequently reenact scenes from Dr. Seuss books, weaving music, visual art, and storytime into their daily routine.
  travel: Salvador Gonzalez, a 2-year-old who loves short family road trips to the sandy shores of Santa Monica, occasional weekend cabins in the Colorado Rockies, and day-long trips to Disneyland, prefers
    calm, familiar accommodations, and they often request a favorite stuffed animal for comfort during travel.
  culinary: Salvador Gonzalez, a 2-year-old with a palate that favors soft scrambled eggs, mashed avocado toast, sweet potato puree, and occasional banana pancakes, enjoys helping stir batter with a plastic
    spoon, but they are picky about broccoli and often negotiate extra peas for snack time.
  core: Salvador Gonzalez, a 2-year-old whose tiny world balances boundless curiosity with meticulous order, deep compassion, and a persistent worry over missing toys, makes every day a blend of wonder,
    careful routine, and heartfelt empathy.
background:
  cultural: Salvador was born into a Mexican-American family in Kerman, California. At home, Spanish is spoken alongside English, and family traditions such as celebrating Dia de los Muertos, Cinco de Mayo,
    and the annual quinceanera season are part of his cultural exposure. The household places a strong emphasis on family cohesion, respect for elders, and communal meals featuring Mexican cuisine. Growing
    up in the agricultural heart of Fresno County, he frequently observes the rhythms of farm life, which reinforces a respect for hard work and community interdependence. These cultural influences nurture
    his compassionate, cooperative nature and his early interest in helping others.
attributes:
  skills: '[''Bilingual basic vocabulary (Spanish and English)'', ''Fine-motor skills (stacking blocks, turning pages)'', ''Simple problem-solving with puzzles'', ''Self-feeding and dressing assistance'',
