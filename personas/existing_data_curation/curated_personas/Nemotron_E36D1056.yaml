  hobbies: '[''Stacking wooden blocks'', ''Coloring with crayons'', ''Listening to Mexican lullabies'', ''Reading picture books'', ''Pretend cooking and setting the table'', ''Playing with a small group
    of familiar peers'', ''Cuddling stuffed animals'']'
  career_goals: Although only two years old, Salvador already expresses a desire to be helpful. He often says he wants to 'be like Daddy' and assist on the family farm, and he delights in pretending to
    care for his stuffed animals, hinting at an early ambition to become a caregiver or community helper. His long-term goal, as envisioned by his parents, is to grow into a kind, reliable adult who contributes
    to his family's agricultural work and supports his neighborhood, perhaps as a farmer, teacher, or volunteer.
