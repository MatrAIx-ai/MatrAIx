  hobbies: '[''Vegetable gardening'', ''Woodworking'', ''Birdwatching'', ''Jigsaw puzzles'', ''Crossword puzzles'', ''Model train building'', ''Reading historical biographies'', ''Reading engineering journals'']'
  career_goals: Although no longer employed, Shabeer aims to stay intellectually active and self‑sufficient. He hopes to volunteer as a technical advisor for the local community college’s agriculture program,
    mentor younger mechanics through a senior‑youth apprenticeship, and compile a practical handbook on low‑maintenance gardening for the senior center. He also aspires to maintain his home and workshop
    independently, ensuring he can live comfortably without relying on outside help, and to remain a respected, dependable presence in the Milton Freewater community.
