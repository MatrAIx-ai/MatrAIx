  career_goals: Joachim aims to obtain his GED within the next year and enroll in a community college program focused on visual arts or graphic design. In the long term, he aspires to work as a freelance
    muralist and visual storyteller, collaborating with local businesses and community centers. He also envisions a role at a Brooklyn cultural nonprofit where he can help organize art workshops and youth
    mentorship programs. By blending his love for street art, digital media, and community empowerment, Joachim hopes to build a sustainable creative practice that contributes to his neighborhood’s cultural
    vitality.
