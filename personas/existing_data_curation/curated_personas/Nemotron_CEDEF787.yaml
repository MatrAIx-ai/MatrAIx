  career_goals: Laura dreams of a career that blends her love for science with her desire to help others manage emotional challenges. In the short term, she aims to win a regional science fair with a project
    on stress‑reduction techniques for teenagers and to take on a leadership role in her school’s debate team. Long‑term, she envisions studying psychology or neuroscience at a state university, eventually
    becoming a clinical psychologist who specializes in adolescent anxiety and depression. She is motivated by the idea of using her analytical skills and personal experience with anxiety to develop evidence‑based
    interventions, and she hopes to earn scholarships that recognize both academic excellence and community service.
