  hobbies: '[''Gardening (vegetables and native plants)'', ''Traditional Mexican cooking'', ''Fishing on Moses Lake'', ''Woodworking'', ''Playing cards (bridge, poker)'', ''Volunteering at senior center'',
    ''Family genealogy research'', ''Nature and community event photography'', ''Attending local cultural festivals'']'
  career_goals: Although retired, Antonio aims to remain an active pillar of the Moses Lake community by expanding his volunteer leadership at the local senior center and organizing a multicultural garden
    that provides fresh produce to low‑income families. He hopes to document his family's migration story and Mexican culinary heritage in a small memoir for his grandchildren, and to mentor younger residents
    in practical trades and cultural appreciation. Maintaining his health, staying socially connected, and visiting his extended family in Mexico remain personal priorities.
