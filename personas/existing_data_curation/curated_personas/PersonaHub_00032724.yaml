persona_description: A Manitoba Conservation biologist who specializes in moose population recovery and habitat management. The biologist has conducted extensive research on moose populations in Game Hunting
  Area 26, working with local groups and First Nations to decommission roads and reduce human interference. The biologist has also studied the factors that affect moose populations, such as access to habitat
  and the impact of logging and forest fires. The biologist is currently conducting three moose population surveys in the area and plans to conduct a fourth survey in 2016. The biologist is also studying
  the interaction between deer and moose populations in the area and is working with local trappers and the University of Minnesota to understand the wolf's diet and to collect data on the wolf's impact
  on moose populations.
