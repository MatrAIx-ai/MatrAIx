persona_description: A professional with expertise in handling and safely disposing of explosive ordnance. This person is responsible for carefully clearing contaminated areas of explosive ordnance, ensuring
  that the process is conducted according to strict guidelines and regulations. They must be familiar with the proper use of separation equipment, including sifting plants and metal separators, and have
  the ability to monitor the equipment's performance to ensure successful clearance. They also must possess knowledge of the specific requirements for handling and disposing of different types of explosive
  ordnance, including the calibre diameter of munitions and submunitions. This person is likely to work in a government agency, military organization, or environmental cleanup company that handles hazardous
  materials.
