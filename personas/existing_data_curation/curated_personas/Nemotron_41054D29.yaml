personas:
  professional: Frances Sonnier, an 18‑year‑old school‑bus monitor, leverages her knack for precise route planning, conflict de‑escalation, and meticulous data tracking to envision a future as a transportation
    coordinator for her district, balancing curiosity about emerging logistics technologies with the practical demands of student safety and punctuality.
  sports: Frances Sonnier enjoys weekend hikes on prairie trails as a member of the Sangamon County Trailblazers hiking club, follows the Chicago Cubs, Chicago Bulls, and Chicago Bears on game days, and
    occasionally joins intramural soccer matches at the community center to stay active and socialize with peers.
  arts: Frances Sonnier spends afternoons editing prairie‑flower photographs inspired by Sebastião Salgado, unwinds listening to indie folk artists such as Sufjan Stevens and The Lumineers, attends local
    theater productions of August Wilson plays, and curates a modest playlist of Hans Zimmer scores for study sessions.
  travel: Frances Sonnier prefers low‑cost, spontaneously planned weekend getaways, often drives to St. Louis for museum visits or to Shawnee National Forest for camping, dreams of backpacking through the
    Canadian Rockies once she graduates, and uses student discount travel sites to stretch her limited budget.
  culinary: Frances Sonnier, a novice cook, frequently whips up quick pasta carbonara, avocado toast, and grilled cheese with sharp cheddar, loves adding fresh basil and locally sourced corn from farmer’s
    markets, and often hosts potluck evenings where friends sample her experimental honey‑glazed salmon and seasonal vegetable stir‑fry.
  core: Frances Sonnier is a curious, pragmatic teen who balances bus‑route logistics with prairie hikes, meticulously budgets her earnings yet sometimes forgets to floss, and dreams of designing safer
    student‑transport programs.
background:
  cultural: Frances grew up in Riverton, a small Midwestern town in Illinois, in a family with deep roots in the region’s agricultural and small‑business community. Her upbringing emphasized humility, hard
    work, and community service, reflecting typical Midwestern values. While she identifies as white and was raised in a Protestant (likely United Church of Christ) environment, she was exposed to a diverse
    array of local traditions, such as county fairs, church potlucks, and volunteer fire‑department events. These experiences have fostered a strong sense of place, a respect for local heritage, and an
    appreciation for the collaborative spirit of her town.
attributes:
  skills: '[''Student safety supervision'', ''Conflict de‑escalation'', ''Basic first‑aid'', ''Time‑management'', ''Route planning'', ''Digital record‑keeping'', ''Spreadsheet and scheduling software'',
    ''Effective communication'', ''Vehicle safety inspections'', ''Emergency response procedures'']'
  hobbies: '[''Reading contemporary fiction and non‑fiction'', ''Hiking local prairie trails'', ''Photography of nature and historic sites'', ''Volunteering at community center'', ''Cooking and sharing
    meals'', ''Attending town meetings'']'
  career_goals: Frances aims to leverage her experience on the bus route into a transportation coordination role within the school district or a local transit agency. She plans to complete her associate
    degree in logistics or education administration, then pursue certification as a commercial driver or a transportation safety specialist. Long‑term, she hopes to design safer student‑transport programs
    and possibly lead community‑based initiatives that improve rural mobility.
