  hobbies: '[''Birdwatching'', ''Fishing'', ''Gardening'', ''Woodworking'', ''Classic car restoration'', ''Collecting vintage computers'', ''Reading historical nonfiction'', ''Playing chess'', ''Genealogy
    research'']'
  career_goals: As he approaches retirement, Yong aims to transition his deep technical knowledge into a part‑time consulting role that allows him to mentor younger technicians while maintaining a steady
    income. He plans to earn formal industry certifications such as CompTIA A+, Network+, and Security+ to validate his expertise. He also hopes to establish a community‑focused "Tech Tutor" workshop series
    for high‑school students in Petel, sharing practical IT skills and fostering local talent. By securing a limited contract with the county school district, he seeks financial stability and the opportunity
    to continue solving real‑world technology problems in a structured, low‑stress environment.
