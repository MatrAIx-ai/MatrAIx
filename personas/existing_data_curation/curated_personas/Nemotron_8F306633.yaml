  career_goals: Huy aims to obtain his GED within the next year and enroll in a community‑college program focused on business administration or supply‑chain logistics. His long‑term ambition is to become
    a logistics coordinator for a regional distribution center, leveraging his love for structure and predictability. He also dreams of someday expanding his family's grocery business into a larger community
    hub that offers culturally specific products and services, while mentoring other Southeast Asian youth in practical job skills.
