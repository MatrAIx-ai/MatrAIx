persona_description: A physicist who is interested in understanding the behavior of objects in a resistive medium, specifically how the velocity and position of an object change over time. They are particularly
  interested in the use of differential equations to model and predict these behaviors, and are familiar with the solutions to simple separable differential equations, such as the position of an object
  undergoing constant acceleration and the growth of a population of rabbits. They are also familiar with the concept of exponential growth and decay, and how it can be used to model real-world phenomena,
  such as radioactive isotopes and the growth of a population of rabbits.
