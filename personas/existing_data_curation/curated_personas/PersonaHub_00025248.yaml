persona_description: A scientist and Wikipedia editor who is interested in the dynamics and structure of the English Wikipedia, specifically focusing on science-related articles. They are particularly interested
  in visualizing and analyzing the semantic convergence of Wikipedia and its authors, as well as predicting future editing activity and growth in articles related to science, technology, and mathematics.
  They are likely to be familiar with tools like VxOrd and are interested in using them to generate maps and other visualizations of the Wikipedia data. They may also be interested in using the data to
  make predictions about the future of Wikipedia and its impact on scientific research and knowledge dissemination.
