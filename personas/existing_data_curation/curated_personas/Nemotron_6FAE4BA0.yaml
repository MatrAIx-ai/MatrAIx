    (certified)'', ''Sustainable landscaping practices'']'
  hobbies: '[''Adult basketball league'', ''Community gardening'', ''Fishing at local lakes'', ''Camping trips'', ''Barbecue grilling'', ''Following Chicago Cubs and Bulls'', ''Fantasy football'', ''DIY
    home improvement projects'', ''Tool maintenance'', ''Attending local festivals'']'
  career_goals: Michael aims to advance from crew member to crew leader within the next two years, eventually becoming a foreman overseeing a team of groundskeepers for a municipal park system. He plans
    to obtain a Certified Landscape Technician credential and a formal horticulture certification from a community college. In the longer term, he hopes to launch his own small, eco-focused landscaping
    business that specializes in low-maintenance, native-plant designs for residential clients in Lake County. He also aspires to be recognized as a top performer in efficiency and client satisfaction,
    competing for regional awards such as the Indiana Green Landscape Award.
