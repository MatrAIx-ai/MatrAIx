personas:
  professional: Ryan Walton is a budding robotics enthusiast who thrives on building intricate LEGO Technic sets and programming simple robotics kits, applying a practical, structure‑loving mindset to systematic
    trial‑and‑error experiments while they often organize friendly tech challenges for peers.
  sports: Ryan Walton plays on a local youth soccer team called the Eastside Strikers, joins after‑school pickup basketball games where they idolize the Los Angeles Lakers, and they root for the Manchester
    United and the Chicago Cubs, balancing structured practice with a competitive drive on the field.
  arts: Ryan Walton shines on stage in the school drama club, drawing inspiration from actors like Timothée Chalamet and performers such as Lin‑Manuel Miranda, while they also devour adventure novels by
    Rick Riordan and listen to Imagine Dragons and Ariana Grande during LEGO builds, letting these creative influences shape their expressive, outgoing personality.
  travel: Ryan Walton enjoys weekend road trips to the nearby state park for fishing with dad and has visited Disneyland and the Grand Canyon, while they dream of camping under the Northern Lights in Iceland
    and exploring the Great Barrier Reef, preferring organized itineraries curated by parents but sneaking in spontaneous detours for local arcade hunts.
  culinary: Ryan Walton favors cheesy pizza, chicken nuggets, and mac and cheese, often experimenting with homemade pepperoni rolls and building a modest skill set by following YouTube tutorials to melt
    perfect cheese, while they also enjoy gummy bears and insist on extra jalapeño slices on tacos as a quirky flavor challenge.
  core: Ryan Walton is a competitively minded, structure‑seeking ten‑year‑old who balances LEGO engineering, soccer, and drama with a skeptical edge, secretly hoarding baseball cards while they constantly
    plan the next group game.
background:
  cultural: 'Ryan grew up in a typical Midwestern small‑town setting in Angola, Indiana. His family embraces core Midwestern values: a strong work ethic, community involvement, and a blend of church and
    family gatherings. The local school district emphasizes participation in team sports and extracurricular clubs, reinforcing teamwork and civic responsibility. Community events like county fairs, 4‑July
    parades, and town potlucks shape his sense of belonging, while the surrounding farmland and local businesses provide a backdrop of practical, hands‑on experiences. As a White American in this region,
    Ryan''s cultural background includes a mix of traditional values, respect for routine, and a love for local traditions such as high‑school football Friday nights and seasonal hunting or fishing trips.'
