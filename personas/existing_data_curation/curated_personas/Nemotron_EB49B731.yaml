  career_goals: Ryan dreams of a career that combines his love of structure, teamwork, and helping the community. He is fascinated by the disciplined environment of firefighting and hopes to become a firefighter,
    appreciating the clear protocols and the chance to protect his town. At the same time, his competitive drive fuels an ambition to excel in sports, particularly soccer, with the long‑term goal of playing
    at the high‑school varsity level and possibly earning a scholarship. Academically, he plans to pursue STEM subjects, develop his coding skills further, and eventually explore engineering or robotics,
    aiming to design practical solutions that make everyday life easier.
