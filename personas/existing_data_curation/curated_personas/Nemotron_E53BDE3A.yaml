  career_goals: Guided by his love for structure and tangible results, Jong imagines a future where he designs and builds things that help people. He often talks about becoming an astronaut who explores
    space and a software engineer who writes code to control robots. He looks forward to joining a school robotics club, learning Scratch and later Python, and one day contributing to a tech company in
    Silicon Valley. He also expresses a gentle ambition to become a teacher who can share clear, organized lessons with younger children.
