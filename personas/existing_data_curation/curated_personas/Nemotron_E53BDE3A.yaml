personas:
  professional: Jong Hong is a budding LEGO architect, turning step-by-step instructions into intricate mechanical models while applying their love for structure, reliability, and practical problem-solving.
  sports: Jong Hong rides a bright pink bike through the neighborhood, trains with the Little Lions youth soccer team after school, and cheers for the local minor-league baseball club the River Rapids while
    maintaining a disciplined yet playful fitness routine.
  arts: Jong Hong sketches rockets and robots inspired by Mo Willems' vibrant illustrations, practices beginner piano pieces such as a simplified Für Elise, and enjoys the LEGO Animation series The LEGO
    Movie, blending methodical creativity with imaginative storytelling.
  travel: Jong Hong loves backyard expeditions to the nearby river park, weekend trips to the Science Discovery Museum, a family vacation to the Grand Canyon, and dreams of exploring the Space Center in
    Houston, always planning itineraries with colorful stickers and clear steps.
  culinary: Jong Hong delights in assembling crunchy tacos with shredded cheese, lettuce, and salsa, whipping up fruit kebabs of grapes and strawberries, and proudly prepares a simple cheese quesadilla,
    preferring bright, predictable flavors that echo their step-by-step mindset.
  core: Jong Hong, a six-year-old LEGO engineer, balances methodical building urges with a playful streak, thriving on predictable routines while occasionally over-fixating on the perfect piece placement.
background:
  cultural: Jong Son Hong is a first‑generation Korean‑American raised in a bilingual household in San Jose, California. At home he hears both English and Korean, celebrates Lunar New Year and Chuseok with
    traditional foods like tteokguk and kimchi, and enjoys Korean pop music and folk stories. His family emphasizes education, respect for elders, and community involvement, while the broader American environment
    encourages independence and exploration. This blend shapes his life with a balanced appreciation for structured learning, cultural traditions, and creative play.
