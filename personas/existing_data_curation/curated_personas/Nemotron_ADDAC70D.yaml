    modalities'']'
  hobbies: '[''Softball league'', ''Hiking'', ''Classic car restoration'', ''Photography'', ''Reading medical imaging advancements'', ''Mindfulness meditation'', ''Volunteering at community events'']'
  career_goals: He aims to become a lead technologist or supervisor at his imaging department, earn advanced certifications in MRI and interventional radiology, and eventually transition into radiology
    management or education. He also hopes to champion staff well‑being initiatives that address anxiety and burnout among healthcare workers, and to contribute to protocol development that improves patient
    safety and workflow efficiency.
