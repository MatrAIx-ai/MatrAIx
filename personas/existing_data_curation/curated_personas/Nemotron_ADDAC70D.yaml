personas:
  professional: Joseph Lehman is an experienced radiologic technologist with a keen eye for emerging imaging methods, who channels curiosity into practical solutions while navigating the emotional demands
    of a fast-paced clinical environment.
  sports: Joseph Lehman thrills as shortstop for a local Wilmington softball team each spring, tackles mountain hikes in the Pisgah National Forest with family during summer, and follows the Charlotte Hornets
    (NBA) and Carolina Panthers (NFL) as favorite professional teams, while maintaining a membership at the community YMCA basketball court.
  arts: Joseph Lehman channels their creative side through nature photography inspired by Ansel Adams, regularly displaying landscape prints at the county fair, while enjoying the classic rock of The Rolling
    Stones and the blues of B.B. King, and attending performances at the local community theater whenever possible.
  travel: Joseph Lehman prefers short, well‑planned road trips to nearby gems like the Great Smoky Mountains and Shenandoah National Park, yet dreams of wandering Kyoto’s historic temples and Edinburgh’s
    medieval streets, using detailed spreadsheets to budget and schedule each adventure while balancing family commitments.
  culinary: Joseph Lehman delights in Southern barbecue, especially slow‑cooked pork shoulder glazed with apple‑cider reduction, prepares homemade pimento cheese and collard greens seasoned with smoked
    ham hocks, enjoys crafting bourbon‑infused baked beans, and while their cooking skill is solid, occasional attempts at a classic French soufflé often end in a deflated disappointment.
  core: Joseph Lehman is a fiercely curious radiologic technologist who channels competitive energy into both perfecting vintage car restorations and battling anxiety with mindfulness, all while juggling
    occasional impulsive spending sprees.
background:
  cultural: Joseph grew up in a working‑class family in the greater Raleigh area of North Carolina. His upbringing reflects a blend of Southern hospitality, strong community ties, and an appreciation for
    tradition while also valuing practical problem‑solving and self‑reliance. He identifies with the region's emphasis on family involvement, communal support, and a balance between respecting established
    ways and embracing new ideas.
attributes:
  skills: '[''Digital radiography operation'', ''Patient positioning and care'', ''Radiation safety and dose optimization'', ''Quality assurance and equipment calibration'', ''PACS and RIS software proficiency'',
