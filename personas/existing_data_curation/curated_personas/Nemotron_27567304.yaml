  career_goals: Maritza aims to transition from a supportive executive secretary role to a senior office manager or operations strategist position where she can shape organization‑wide efficiency initiatives.
    She is pursuing the Certified Administrative Professional (CAP) credential to formalize her expertise and plans to develop an internal training program that teaches younger staff how to leverage emerging
    productivity technologies, such as AI‑based document assistants and cloud collaboration platforms. Leveraging her competitive streak, she seeks recognition as the most innovative and cost‑saving administrator
    in her firm, targeting measurable improvements in travel spend and meeting turnaround times. In the longer term, Maritza envisions launching a boutique consulting practice that helps small Connecticut
    businesses—particularly those serving the local Puerto Rican community—optimise their administrative processes while maintaining flexible work arrangements that suit her preference for adaptability
    over rigid scheduling.
