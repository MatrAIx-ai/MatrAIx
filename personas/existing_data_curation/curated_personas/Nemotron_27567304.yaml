  hobbies: '[''Gardening'', ''Cooking Puerto Rican cuisine'', ''Reading mystery and historical fiction'', ''Crossword puzzles'', ''Sudoku'', ''Small‑group salsa dancing'', ''Recreational tennis'', ''Volunteering
