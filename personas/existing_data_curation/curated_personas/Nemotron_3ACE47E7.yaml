  hobbies: '[''Listening to tech and entrepreneurship podcasts'', ''Cooking South Asian cuisine'', ''Playing cricket'', ''Gym workouts and early-morning runs'', ''Urban photography'', ''Exploring Charlotte
    neighborhoods'', ''Volunteering at cultural festivals'']'
  career_goals: Sohail aims to transition from a solo taxi driver to an owner-operator of a small fleet that offers both standard rides and premium executive services in the Charlotte metro area. He plans
    to obtain a Commercial Driver’s License (CDL) and complete a short logistics certification to manage scheduling, driver recruitment, and vehicle upkeep. In the longer term, he envisions launching a
    community-focused ride-share app that integrates flexible scheduling for drivers while providing reliable service for underserved neighborhoods. Returning to college to earn a business degree is also
    part of his roadmap, allowing him to combine his practical experience with formal management knowledge.
