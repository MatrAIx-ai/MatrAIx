personas:
  professional: Sohail Khan, a seasoned taxi operator in Charlotte, blends a curiosity for tech‑driven logistics with a practical, route‑by‑route mastery, using GPS and local traffic insights while they
    deliver courteous, bilingual service and quickly adapt to new ride‑hailing platforms.
  sports: Sohail Khan competes in the Riverside Cricket Club’s local league, pairs the camaraderie of weekly matches with disciplined early‑morning runs and strength sessions at the Charlotte YMCA, and
    roots for the Charlotte Knights and Charlotte FC while they are off the field.
  arts: Sohail Khan captures Charlotte’s evolving street art through lenses inspired by Alex Webb, finds rhythm in A.R. Rahman’s compositions and Glass Animals’ indie beats, and volunteers at cultural festivals
    where they help curate visual showcases, letting artistic expression inform their problem‑solving mindset.
  travel: Sohail Khan enjoys weekend road trips to Asheville’s Blue Ridge trails, has a backlog of travel dreams that include wandering the alleys of Marrakech and the historic districts of Istanbul, yet
    they typically plan trips around work schedules and budget, opting for spontaneous day trips to nearby historic towns when possible.
  culinary: Sohail Khan experiments with biryani and tandoori chicken at home, layering basmati rice, saffron, garam masala, and smoky yogurt‑marinated meat, while they relish discovering new regional twists
    and often host friends for communal feasts that blend tradition with bold flavor pairings.
  core: Sohail Khan harmonizes a tech‑savvy curiosity with hands‑on practicality, turning every ride, recipe, and run into a chance to blend community roots with forward‑looking ambitions.
background:
  cultural: Sohail Khan was raised in a South Asian household, likely of Pakistani or Indian origin, in which family gatherings, hospitality, and respect for elders are central. His parents emphasized bilingual
    fluency, so he grew up speaking Urdu (or Hindi) at home while learning English in school. The cultural emphasis on community service and modest achievement guided his cooperative yet assertive demeanor.
    Though now living in Charlotte, NC, he maintains ties to his heritage through religious observances such as Ramadan, celebrating Eid with his local diaspora, and through cooking, music, and participation
    in South Asian community events. This blend of traditional values and American urban life informs his balanced outlook on curiosity, practicality, and resilience.
attributes:
