persona_description: An international sociologist and cultural theorist who specializes in the study of interculturalism, identity formation, and the role of culture in shaping individual and collective
  identities. They are particularly interested in the relationship between nation, ethnicity, and language, and how these factors interact and evolve over time. They have conducted research on the socio-psychological
  indicators of perceived social capital, trust, civil identity, life satisfaction, and economic attitudes in different regions, including Moscow and Bashkortostan. They are also familiar with the various
  approaches to the concept of fatherhood, including biological determinism, social constructivism, and biosocial theory, and have analyzed them to understand the role of men's parental practices in modern
  Russian society.
