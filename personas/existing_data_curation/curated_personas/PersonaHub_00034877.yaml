persona_description: A scientist and economist who specializes in the study of climate change and its effects on agriculture. They have a deep understanding of economic models and have conducted research
  on the effects of climate change on farmland values in the Southwestern United States. They are interested in evaluating the spillover effects of one farmer's practices on another and have used an interdisciplinary
  approach to evaluate the effects of climate change on agriculture. They have worked with multiple climate change scenarios and have a unique understanding of how climate change will affect farmers' bottom
  line.
