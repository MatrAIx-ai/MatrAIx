  career_goals: Approaching retirement, Abdellatif aims to shift from full‑time sales to a part‑time consulting role, offering small‑business owners in Arenac County strategic guidance on low‑budget advertising.
    He hopes to mentor a new generation of sales agents within his former agency, passing on his deep industry knowledge while emphasizing ethical, client‑centric practices. A personal ambition is to curate
    a local ‘Art in Advertising’ exhibit that showcases how visual art can inspire memorable ad campaigns, thereby merging his professional expertise with his love of art. He also wishes to author a short
    memoir that reflects on the evolution of advertising over the past forty years, documenting both successes and the emotional challenges he faced, as a way to leave a thoughtful legacy for his community.
