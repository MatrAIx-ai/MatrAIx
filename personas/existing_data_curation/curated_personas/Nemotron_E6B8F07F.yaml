personas:
  professional: Danielle Ocon, a seasoned total rewards strategist, leverages their analytical acumen and artistic imagination to design compensation frameworks that reward both measurable performance and
    creative contributions, while deftly navigating ERISA and ACA compliance, vendor negotiations, and HRIS transformations, all delivered with a calm, resilient demeanor that keeps high‑stakes negotiations
    steady.
  sports: Danielle Ocon channels their love of solitude into seasonal hiking expeditions across the Rocky Mountains, belongs to a local trail‑blazing club that meets quarterly, follows the Denver Broncos
    for NFL excitement in small group viewings, and occasionally joins weekend ski trips with a close circle of friends at Vail.
  arts: Danielle Ocon cultivates a quiet artistic life through watercolor landscapes and abstract compositions, curates a personal digital gallery featuring contemporary creators like Yayoi Kusama, James
    Turrell, and Agnes Martin, and finds inspiration in reading art history texts and philosophy books, while attending intimate gallery openings for emerging artists in Denver.
  travel: Danielle Ocon favors solo, contemplative travel itineraries that blend rugged nature with cultural immersion, having trekked Patagonia’s Torres del Paine, explored Iceland’s volcanic terrain,
    and spent quiet weekends in the historic streets of Florence to sketch and journal, all planned with flexible, last‑minute bookings that accommodate their aversion to rigid schedules.
  culinary: Danielle Ocon enjoys a modest home‑cooking repertoire focused on Mediterranean and Southwest flavors, expertly preparing dishes like grilled salmon with harissa, quinoa tabbouleh with fresh
    mint, and roasted sweet‑potato enchiladas, while also indulging in artisanal cheese boards featuring aged manchego and tangy goat cheese during relaxed evenings with a glass of pinot noir.
  core: Danielle Ocon blends a calm, resilient spirit with a fierce love of solitary creativity, navigating professional ambition and personal quirks through flexible routines, competitive instincts, and
    an unwavering curiosity for art and nature.
background:
  cultural: Danielle grew up in a middle‑class white family in the Midwest before moving to Denver for university and her career. Her cultural upbringing blends traditional American values of independence
    and self‑reliance with the progressive, environmentally conscious ethos of the Colorado Front Range. She identifies with the Western U.S. cultural emphasis on outdoor recreation, individualism, and
    a strong appreciation for the arts. Her heritage includes Northern European (German and Scandinavian) roots, which have fostered an appreciation for modesty, practicality, and a quiet confidence that
    informs both her personal and professional life.
