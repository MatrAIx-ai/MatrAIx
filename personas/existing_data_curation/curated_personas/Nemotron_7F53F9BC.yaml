  career_goals: Adel aims to leverage his hands‑on experience into a supervisory role within the logistics sector. Over the next two years he plans to complete his associate degree in supply chain management
    and obtain certifications such as OSHA 30‑hour and Certified Forklift Operator. He envisions moving into a shift‑lead position, then advancing to warehouse operations manager, where he can mentor new
    employees and implement process improvements. In the longer term, Adel hopes to start his own niche logistics service catering to small businesses in the Orlando area, combining his practical know‑how
    with his curiosity for new operational technologies.
