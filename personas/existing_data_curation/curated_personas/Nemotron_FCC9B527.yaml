  career_goals: Although still very young, Janelle frequently talks about what she wants to be when she grows up. She dreams of becoming an artist who can fill large canvases with bright colors, and she
    also imagines being a teacher who creates orderly classrooms where children can explore safely. Occasionally she mentions wanting to care for animals as a veterinarian. Her desire for structure and
    her love of sharing new ideas suggest she may aim for roles that combine creativity with organization, such as a museum educator or a kindergarten teacher.
