personas:
  professional: Janelle Dean, an aspiring junior botanist, spends afternoons meticulously labeling houseplants and organizing her collection of leaf rubbings, demonstrating her curiosity and methodical
    nature while eagerly sharing discoveries with family.
  sports: Janelle Dean, a budding preschool soccer enthusiast, attends Tuesday and Thursday mini‑league matches with the Tiny Tigers, proudly wears the jersey of the local MLB team, the Springfield Sluggers,
    and practices balance on a kid‑friendly gymnastics beam at the community center.
  arts: Janelle Dean, an eager little artist, spends hours drawing with crayons, is fascinated by Eric Carle’s collage books, sings along to songs by Raffi and The Wiggles, and regularly watches the animated
    adventures of Sesame Street’s Elmo, which shape her imaginative play.
  travel: Janelle Dean, an adventurous pretender, loves weekend road trips to Grandma’s farm where she collects seashells, dreams of visiting Disney World’s Magic Kingdom, and once toured the aquarium in
    Monterey, balancing excitement with occasional clinginess when away from parents.
  culinary: Janelle Dean, a picky yet curious eater, adores grilled cheese sandwiches with cheddar, mac ’n’ cheese with a sprinkle of breadcrumbs, and fruit smoothies blended with banana and strawberries,
    often insisting on arranging food in smiley faces on her plate.
  core: Janelle Dean, a bright four‑year‑old with a relentless curiosity, an obsessive need to organize her crayons, a habit of worrying over lost toys, and a stubborn refusal to share the last cookie,
    navigates the world with methodical wonder and occasional meltdowns.
background:
  cultural: Janelle is raised in a middle‑class white family in Pittsburgh, Pennsylvania. Her upbringing is shaped by the city’s rich artistic and educational resources, such as the Carnegie Museums, the
    Children’s Museum of Pittsburgh, and the local public library’s story‑time programs. Family traditions include weekend outings to Phipps Conservatory, participation in community festivals like the annual
    Fourth of July parade, and holiday gatherings that emphasize hospitality and courtesy. The cultural environment encourages curiosity, respect for routine, and an appreciation for the arts, all of which
    are reflected in Janelle’s everyday life.
