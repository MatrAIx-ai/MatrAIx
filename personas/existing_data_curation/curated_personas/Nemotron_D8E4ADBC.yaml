personas:
  professional: Jaime Pastor, a meticulous community organizer and aspiring home‑based caterer, leverages their bilingual fluency, QuickBooks expertise, and love for healthy island cuisine to design and
    promote small‑scale culinary events while planning for a future nonprofit leadership role.
  sports: Jaime Pastor, a quiet fitness enthusiast, spends weekend mornings strolling through the Katy Nature Center, practices gentle yoga at home, and cheers on the Houston Astros and the Houston Dynamo
    while avoiding high‑intensity competitive sports.
  arts: Jaime Pastor, an avid reader of poetry and historical fiction, curates a small book‑club that discusses works by Neruda and Angelou, enjoys listening to bomba and plena rhythms alongside contemporary
    Latin pop artists like Bad Bunny, and occasionally sketches botanical illustrations from their herb garden.
  travel: Jaime Pastor, an intentional explorer, prefers short road trips to nearby cultural festivals in New Orleans and Savannah, dreams of a culinary pilgrimage to the Caribbean island where arroz con
    gandules originated, and carefully budgets travel expenses to balance family responsibilities.
  culinary: Jaime Pastor, a creative home chef, transforms classic dishes like pasteles and lechón into lighter versions using olive oil, quinoa, and fresh herbs from their balcony garden, delights friends
    with hand‑knit aprons, and constantly experiments with spice blends inspired by island flavors.
  core: Jaime Pastor, a planner‑driven introvert, channels their anxiety into meticulous budgeting, community service, and wholesome cooking, while balancing curiosity for new ideas with a steadfast preference
    for routine.
background:
  cultural: Jaime’s identity is rooted in her Puerto Rican heritage, which she embraces through language, food, music, and family traditions. Born to parents who emigrated from Puerto Rico, she grew up
    bilingual, celebrating holidays such as Nochebuena, Three Kings' Day, and the island’s vibrant festivals with salsa, bomba, and plena rhythms. Family gatherings often featured dishes like arroz con
    gandules and pasteles, recipes passed down from her grandmother. While residing in Katy, Texas, she blends island customs with Southern hospitality, participating in local Hispanic cultural events and
    maintaining strong ties with relatives back on the island through regular video calls. Her Catholic upbringing informs her values of respect (respeto), community solidarity (compañerismo), and caring
    for others, which guide her everyday interactions and volunteer commitments.
