  hobbies: '[''Reading'', ''Journaling'', ''Crocheting'', ''Cooking (traditional and healthy Puerto Rican cuisine)'', ''Urban gardening'', ''Volunteer work'', ''Nature walks'', ''Documentary watching'',
    ''Yoga'', ''Listening to Puerto Rican music'']'
  career_goals: Jaime aims to transform her organizational talents and love of cooking into a modest home‑based catering business that offers healthy Puerto Rican meals to the Katy community. She plans
    to transfer her associate degree credits toward a bachelor’s in Business Administration within the next three years, enabling her to run the venture sustainably. Additionally, she aspires to take on
    a leadership role within a local nonprofit that supports Latinx families, eventually becoming a program coordinator who designs workshops on budgeting, nutrition, and stress management. On a personal
    level, she seeks to develop coping strategies for anxiety, improve public‑speaking confidence, and become a mentor for other introverted individuals looking to balance curiosity with practicality.
