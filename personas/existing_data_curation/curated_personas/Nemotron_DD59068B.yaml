  career_goals: Formal career goals are still forming for Doris, but she shows early aspirations typical for her age. She loves listening to stories and often says she wants to become a 'teacher' or a 'doctor'
    when she grows up, reflecting a budding interest in helping and nurturing others. Doris is eager to learn to read and write, enjoys pretending to care for her family’s pet rabbit, and likes helping
    her mother stir safe ingredients in the kitchen, hinting at a future desire to work with people or animals.
