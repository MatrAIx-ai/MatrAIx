personas:
  professional: Doris Davis, a two-year-old budding little organizer, treats preschool playtime as a structured project, sorting blocks by color and size, displaying early analytical skills and a reliable,
    routine‑driven approach that hints at future leadership potential, and they often re‑arrange their toys to maintain order.
  sports: Doris Davis, a playful two‑year‑old, participates in the local preschool’s introductory soccer program with the Little Rockets team, loves watching the hometown Junior Mariners games on TV, and
    enjoys daily trips to the playground where they swing and climb with balanced enthusiasm.
  arts: Doris Davis, a budding aficionado of early childhood arts, sings along to The Wiggles, dances to Disney’s Let It Go, creates finger paintings with non‑toxic paints, and regularly watches the animated
    series Bluey, which shapes their imaginative play, and they often dance in the living room to the catchy tunes.
  travel: Doris Davis, an adventurous toddler, loves family road trips to the nearby aquarium and beach, dreams of seeing the Eiffel Tower someday, prefers traveling by car with a familiar playlist of lullabies,
    and they giggle loudly during the car ride while clutching their favorite stuffed bear, balancing excitement with the need for familiar routines.
  culinary: Doris Davis, a picky eater with strong routine preferences, enjoys cheddar macaroni, mashed sweet potatoes, strawberry yogurt, and sips warm apple juice, while occasionally helping stir pancake
    batter and showing a fondness for crunchy carrot sticks, and they love to lick the batter spoon for extra fun.
  core: A routine‑loving two‑year‑old with a balanced blend of curiosity and order, Doris Davis savors simple joys, hoards tiny treasures, and sometimes throws a stubborn tantrum when their familiar schedule
    is disrupted, though they quickly settle down.
background:
  cultural: Doris was born and raised in Midland, Texas, a community shaped by the oil industry and close‑knit Southern Baptist traditions. Her family observes weekly church services, celebrates holidays
    such as Thanksgiving and Christmas with familiar rituals, and enjoys regional customs like barbecue and Texan music. The local culture emphasizes practicality, self‑reliance, and outdoor activities,
    which align with Doris’s love for routine, simple hands‑on play, and comfort with familiar settings. These cultural influences foster her balanced social nature, modest assertiveness, and steady resilience.
