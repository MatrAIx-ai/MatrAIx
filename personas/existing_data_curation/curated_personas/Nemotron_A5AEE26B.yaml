  career_goals: Julius aims to finish his associate degree in Business Administration within the next year and secure an entry-level position as a community outreach coordinator or customer service manager
    at a local non-profit or retail company. He hopes to leverage his people-skills and event-planning experience to create programs that benefit youth in Blackville. In the longer term, he dreams of starting
    his own event-planning and small-business consulting service that helps other local entrepreneurs market their ventures. A stable income, the ability to support his family, and a work environment that
    values collaboration and mental-wellbeing are central to his ambitions.
