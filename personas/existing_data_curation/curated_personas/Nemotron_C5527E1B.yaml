    pickup basketball'', ''Volunteer event coordination at the local library'']'
  career_goals: James aims to transition from informal work into a structured, skilled trade. His immediate goal is to enroll in a local HVAC or electrical apprenticeship program within the next six months
    and obtain the necessary certifications (EPA, OSHA). Over the next five years he plans to become a licensed contractor, eventually managing a small crew and overseeing projects that emphasize safety
    and efficiency. He also wants to develop leadership experience by taking on supervisory roles in community‑service projects and possibly explore military reserve service as a pathway to discipline and
    benefits.
