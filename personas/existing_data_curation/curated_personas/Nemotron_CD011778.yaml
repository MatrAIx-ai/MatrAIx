  hobbies: '["Drawing comics", "LEGO building", "Reading graphic novels", "Exploring nature", "Soccer", "Listening to music", "Scratch coding", "Cooking with family", "Church youth choir"]'
  career_goals: He dreams of a future where he can blend his love of art and storytelling, perhaps as a comic‑book creator or a video‑game designer. Darius also imagines becoming a mentor who can inspire
    younger kids in his neighborhood, maybe through a community art program. He admires teachers and sometimes envisions himself as a future teacher or youth program coordinator. A fascination with space
    and stargazing occasionally leads him to think about becoming an astronaut or a scientist who explores the unknown.
