personas:
  professional: Jean Washington is a high‑school sophomore who balances their role as a varsity basketball starter with a budding interest in sports analytics, using spreadsheets to track player statistics
    and channeling their competitive drive toward a future in athletic performance coaching.
  sports: Jean Washington is a starting point guard for the Lake Charles High School Tigers, rehearses with the local community basketball club on weekends, avidly follows the New Orleans Pelicans and LSU
    Tigers, and treats each practice as a structured drill to sharpen a competitive edge while occasionally over‑analyzing opponents’ tactics.
  arts: Jean Washington enjoys watching R&B and gospel music videos by Beyoncé, H.E.R., and Kirk Franklin, reads young‑adult novels such as The Hate U Give alongside self‑help titles on stress resilience,
    and volunteers to organize church youth talent shows featuring local choir performances and spoken‑word poetry.
  travel: Jean Washington dreams of a road trip to New Orleans for Mardi Gras, a weekend beach getaway to Gulf Shores to fish and sample fresh oysters, and a family visit to Savannah’s historic district,
    preferring meticulously planned itineraries with backup indoor activities for rainy days.
  culinary: Jean Washington is an intermediate home cook who loves simmering gumbo with andouille sausage, shrimp, okra and filé powder, perfecting jambalaya with a caramelized roux, and experimenting with
    hot sauce and fresh cilantro in fried catfish, often swapping recipes with grandparents during Sunday family meals.
  core: Jean Washington combines disciplined basketball training, structured journaling, and a love for Creole cooking into a competitive yet anxious teen who thrives on routine but wrestles with a skeptical
    streak.
background:
  cultural: Jean comes from an African-American family rooted in southern Louisiana. Her upbringing is shaped by the blend of Black Southern traditions, Creole culinary influences, and a strong church community.
    Family gatherings often feature soulful gospel music, communal meals centered around gumbo, jambalaya, and fried catfish, and storytelling that celebrates resilience and perseverance. Lake Charles'
    proximity to the Gulf Coast and its vibrant Mardi Gras celebrations expose her to a mix of cultural festivities, while the local African-American church provides a supportive network that emphasizes
    education, service, and mutual aid. This cultural backdrop informs her values of community, hard work, and a deep appreciation for music, food, and shared traditions.
