  career_goals: Jean aims to earn her GED within the next two years and then enroll in a community-college program focused on nursing or allied health. She seeks a career that offers clear structure, reliable
    routines, and the chance to help her community—ideally as a certified nursing assistant in the local hospital, with the long-term ambition of becoming a registered nurse. She also hopes to continue
    developing her organizational and leadership skills by eventually managing a health-services team or mentoring younger students facing similar academic challenges.
