  hobbies: '[''drawing cartoons'', ''building LEGO models'', ''playing Minecraft'', ''creating games in Roblox'', ''participating in school drama club'', ''collecting trading cards'', ''playing competitive
    soccer'', ''exploring local parks and sketching nature'', ''reading graphic novels'']'
  career_goals: Christopher dreams of turning his love for art and invention into a future career. He frequently says he wants to become a comic‑book artist who creates bold, new characters, or a video‑game
    designer who builds immersive worlds for other kids to explore. He also imagines himself as an inventor or robotics hobbyist, inspired by the gadgets he sees in science shows. While his ambitions are
    playful, they reflect a drive to combine creativity with technology, aiming to share his ideas with a wide audience and perhaps lead a team in a future maker’s competition.
