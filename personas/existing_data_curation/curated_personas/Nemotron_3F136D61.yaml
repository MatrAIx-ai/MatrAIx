  career_goals: Mark aims to attend a high school that offers strong STEM and arts programs, with the long‑term goal of earning a degree in mechanical engineering or industrial design. He envisions creating
    innovative products that blend functionality with aesthetic appeal, and hopes to develop his own video game or graphic novel in the future. He is motivated to win a state‑level science fair, earn a
    scholarship for college, and eventually work as a product designer or engineer where he can apply both his technical and artistic strengths.
