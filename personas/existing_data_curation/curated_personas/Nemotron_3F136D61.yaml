personas:
  professional: Mark Mosier, an aspiring teenage game developer and digital illustrator, they channel a curious and methodical mindset into creating puzzle‑centric games on Scratch and Python while meticulously
    sketching fantasy landscapes for future concept art.
  sports: Mark Mosier, a 13‑year‑old outdoor enthusiast, they spend Saturday mornings hiking the nearby nature reserve and birdwatching, follow the NBA's Golden State Warriors for inspiration, occasionally
    join a local youth soccer pickup game, and maintain a disciplined routine of stretching after each hike to keep their posture aligned for their model‑building hobby.
  arts: Mark Mosier, a budding artist, they blend inspiration from fantasy author Brandon Sanderson, illustrator James Gurney, and folk guitarist Bob Dylan to sketch sprawling landscapes, compose original
    acoustic chord progressions on their guitar, and curate a personal online portfolio of digital illustrations that showcase their love for speculative worlds.
  travel: Mark Mosier, an ambitious teen traveler, they carefully plan weekend trips to nearby state parks like Yellowstone for hiking and birdwatching, dream of backpacking through the Scottish Highlands
    to capture misty vistas, and curate a travel scrapbook using photo prints from family vacations to the Grand Canyon, all while balancing schoolwork and a limited budget.
  culinary: Mark Mosier, a 13‑year‑old with a developing palate, they enjoy crafting homemade mac and cheese with sharp cheddar, experimenting with sushi rolls featuring cucumber and avocado, and snacking
    on granola bars with dried cranberries, while proudly mastering the art of brewing a simple herbal tea with peppermint leaves.
  core: Mark Mosier, a curious yet meticulous 13‑year‑old, they balance a competitive streak in chess and coding with a quiet love for sketching and hiking, all while occasionally neglecting sleep and indulging
    in spontaneous LEGO purchases.
background:
  cultural: Mark grew up in Albert City, a small farming community in Buena Vista County, Iowa. His family’s roots are tied to the region’s German‑Scandinavian heritage, and he was raised in a modest, Protestant
    household that emphasizes self‑reliance, hard work, and community involvement. Local traditions such as county fairs, high school sports, and church gatherings shaped his social outlook. While his immediate
    environment is largely homogeneous, Mark’s curiosity drives him to explore diverse artistic styles and ideas through the internet, school media, and occasional trips to nearby cities.
