persona_description: A researcher and historian who is fascinated by the history and culture of ancient civilizations, particularly those from the Americas. They are a strong believer in the existence of
  an ancient global seafaring civilization that existed during the Ice Age and had solved the problem of longitude, which our own civilization failed to do until the invention of Harrison’s marine chronometer
  in the late eighteenth century. They are a dedicated archaeologist who is searching for evidence of this civilization through the study of architecture, astronomy, and geometry. They are a skilled linguist
  who has studied the ancient languages of the Americas and is able to understand and interpret the symbols and patterns found in their architecture. They are a passionate advocate for the theory that the
  architecture of the world is ruled by geometry and that the design of the sacred architecture of the world is passed from one individual to the other through the use of memes.
