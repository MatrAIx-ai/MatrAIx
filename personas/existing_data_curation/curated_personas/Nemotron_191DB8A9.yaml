personas:
  professional: Sharon Blount, a 41-year-old industrial safety engineer with a background in engineering and a passion for storytelling, combines lean-process expertise, CAD and Python-driven risk analysis
    with an imaginative flair for visual safety communications, leading cross-functional teams while embracing a relaxed, flexible work style that sometimes appears disorganized but fuels creative problem-solving.
  sports: Sharon Blount channels her love of the outdoors into weekend bike rides with the Cedar Rapids Cycle Club and early-morning hikes along the Loess Hills, follows the Iowa Hawkeyes football and basketball
    teams and the Des Moines Menace soccer club, and maintains a flexible fitness routine that mixes yoga for back health with occasional community basketball pick-ups, preferring low-key, spontaneous activity
    over regimented gym sessions.
  arts: Sharon Blount fosters her creative side through watercolor painting inspired by Claude Monet’s light and Georgia O'Keeffe’s prairie palettes, captures landscapes with a Nikon D750 echoing the compositions
    of Ansel Adams, shares the stage in an improv troupe at the Cedar Rapids Community Theater where they riff on scripts by Tina Fey, and regularly attends live shows featuring folk singer Gillian Welch
    and the indie band The National, weaving these artistic influences into both personal and professional storytelling.
  travel: Sharon Blount approaches travel as a blend of spontaneous day-trips and carefully curated getaways; they spend weekends exploring Iowa’s Loess Hills and the Mississippi River bluffs by bike, have
    taken a two-week road trip through the Badlands and Yellowstone, dream of a spring photography pilgrimage to the lavender fields of Provence and a quiet retreat in Kyoto’s temple gardens, and usually
    plan itineraries in loose outlines that leave room for unplanned photo sessions, balancing a modest travel budget with occasional splurges on boutique lodging.
  culinary: Sharon Blount enjoys cooking with a farm-to-table ethos, favoring dishes like herb-roasted chicken with rosemary and thyme, grilled corn succotash with fresh Iowa sweet corn, and a classic Waldorf
    salad tossed with crisp apples, walnuts, and a light yogurt-dill dressing, while their kitchen is stocked with locally sourced honey, heirloom tomatoes, and a bottle of aged balsamic, reflecting a competent
    but not professional chef who occasionally experiments with fermented kimchi and saffron risotto for special occasions.
  core: Sharon Blount, a 41-year-old safety engineer with an artist’s soul, balances lean-process rigor with watercolor whimsy, often forgetting meetings while obsessively collecting vintage paint tubes
    and dreaming up safety stories that feel like novels.
background:
  cultural: Sharon was raised in a mixed‑German‑Scandinavian family on a modest farm near Waukon, Iowa. The community’s deep sense of self‑reliance, neighborly cooperation, and respect for the land shaped
    her practical work ethic, while family traditions of folk music and storytelling nurtured her imagination. Growing up in the Upper Midwest, she internalized values such as modesty, punctuality, and
    civic involvement, often attending county fairs, church gatherings, and local art festivals. This blend of rural Midwestern steadiness and a familial appreciation for creativity informs her balanced
    outlook—valuing both structure and freedom, tradition and novelty.
attributes:
  skills: '[''Industrial safety compliance (OSHA, MSHA)'', ''Risk assessment and mitigation'', ''Ergonomic evaluation and redesign'', ''Lean manufacturing and continuous improvement'', ''Project coordination
    and scheduling'', ''Data analysis with Excel, Minitab, and Python'', ''Technical writing and incident report generation'', ''Root cause analysis'', ''Creative problem solving and design thinking'',
    ''Development of visually engaging safety signage'', ''Cross‑functional team facilitation and training'', ''Regulatory auditing and certification preparation'']'
  hobbies: '[''Watercolor painting'', ''Landscape photography'', ''Reading speculative fiction and philosophy'', ''Hand‑looming textiles'', ''Book club participation'', ''Volunteer emergency response'',
    ''Improv theater performance'', ''Cycling and hiking'', ''Gardening'', ''Experimenting with DIY home décor'']'
  career_goals: Sharon aims to transition from a front‑line safety engineer to a senior health‑and‑safety manager within the next five years, obtaining the Certified Safety Professional (CSP) credential
    and deepening her expertise in sustainability‑focused safety programs. She envisions establishing a regional safety consortium that blends traditional engineering rigor with artistic storytelling to
    make safety training more memorable. Long‑term, she hopes to launch a boutique consultancy that helps small manufacturers in the Midwest integrate innovative safety practices, ergonomic design, and
    lean operations, while also mentoring women entering engineering fields.
