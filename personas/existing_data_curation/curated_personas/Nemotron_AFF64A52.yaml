personas:
  professional: Thomas Tooley, a three‑year‑old with a love for building block towers, already demonstrates an emerging architectural mindset, blending practical problem‑solving with boundless curiosity
    while they quietly cooperate with peers during play.
  sports: Thomas Tooley, a three‑year‑old who loves sprinting around the community playground, proudly waves a mini jersey of the local minor‑league baseball team the River City Rovers and enjoys organized
    toddler soccer sessions at the neighborhood club, where they cheer quietly for their teammates.
  arts: Thomas Tooley, who adores the playful tunes of Laurie Berkner and the colorful animations of Sesame Street, often hums "The Wheels on the Bus" while they draw crayon pictures of their favorite character
    Elmo.
  travel: Thomas Tooley, after a family road trip to the Seattle zoo and a weekend stay at a beachside cottage in Oregon, now hopes to explore the bright lights of Disneyland in Anaheim and the historic
    castles of Scotland, places they hope to visit one day with their parents.
  culinary: Thomas Tooley, who prefers soft macaroni and cheese with a sprinkle of cheddar and loves bite‑size apple slices, can modestly spread peanut butter on toast but still insists on a sip of warm
    milk before bedtime, a comforting routine they cherish.
  core: Thomas Tooley, a three‑year‑old bundle of quiet curiosity, balances practical play with gentle cooperation, often hoarding stickers in secret while soothing any upset with a calm, steady smile that
    reflects their emotional stability.
background:
  cultural: Thomas was raised in Fort White, a small community in Columbia County, Florida. His family observes typical Southern American customs, such as Sunday family meals, attending a local church,
    and celebrating holidays like Thanksgiving and Independence Day with community parades. He often watches Saturday morning cartoons and participates in neighborhood picnics, which blend his white American
    heritage with the relaxed, close‑knit atmosphere of a rural Floridian town.
