  career_goals: 'As a five‑year‑old, Edward’s ambitions are expressed through pretend play: he often imagines becoming a firefighter because he admires the clear rules, teamwork, and the ability to keep
    people safe. He also talks about being a soccer player, drawn to the structured practice schedule and the competitive spirit of the sport. These goals reflect his love of organized environments, desire
    to excel, and the calm confidence he brings to any role he imagines.'
