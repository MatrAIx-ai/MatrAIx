  hobbies: '["Listening to salsa and plena music","Cooking traditional Puerto Rican cuisine","Photography (airports, cityscapes, candid portraits)","Senior book club (mystery and historical biographies)","Walking
    in Herrick Lake Forest Preserve","Assembling model aircraft kits","Meditation and breathing exercises","Small intimate gatherings with friends and colleagues"]'
  career_goals: As he approaches retirement, Eduardo aims to transition into a senior training role within his airline, formally mentoring new flight attendants and shaping safety culture. He is interested
    in developing a crew‑wellness program that incorporates stress‑reduction techniques, reflecting his personal sensitivity to worry. Eduardo also seeks a more predictable schedule with shorter routes
    to balance work and family life. Additionally, he aspires to author a guide on senior travel safety, merging his curiosity for fresh ideas with his extensive practical experience, and to contribute
    to diversity initiatives that amplify Hispanic representation and bilingual support in airline operations.
