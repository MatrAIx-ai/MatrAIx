personas:
  professional: An experienced flight attendant with over three decades in the cabin, Eduardo Castilla blends meticulous safety expertise, bilingual fluency, and calming emotional intelligence with a relaxed,
    occasionally disorganized approach that values flexibility and genuine connection with passengers, especially those who share his love of salsa and family gatherings, while assertively mentoring new
    crew members toward a stronger safety culture.
  sports: Eduardo Castilla enjoys leisurely walks through Herrick Lake Forest Preserve, follows the Chicago Cubs in baseball and the Chicago Bulls in basketball, and participates in a senior bowling league
    at a community center, favoring low‑impact exercise that fits his flexible schedule.
  arts: Eduardo Castilla captures candid airport moments through photography, finds solace in listening to classic salsa legends like Celia Cruz, Hector Lavoe, and Willie Colón, and deepens his curiosity
    by discussing mystery novels with a senior book club, blending visual and auditory arts with literary intrigue.
  travel: Eduardo Castilla prefers short, well‑planned trips that balance relaxation with cultural immersion, often choosing weekend getaways to Chicago’s lakefront, nostalgic visits to Old San Juan’s forts,
    and dreaming of a leisurely cruise to the historic streets of Cartagena, while relying on flexible itineraries that accommodate his mentor schedule.
  culinary: Eduardo Castilla, an adept home cook, delights in preparing arroz con gandules with sofrito, adobo‑seasoned pasteles, and sweet plantain maduros, experimenting with fresh cilantro, oregano,
    and a splash of dark rum in desserts, while also cherishing communal meals that echo family gatherings.
  core: Eduardo Castilla navigates life with a warm, curious heart that delights in salsa rhythms and kitchen aromas, yet wrestles with persistent worry, a laid‑back approach to scheduling, and occasional
    forgetfulness that adds a human, endearing imperfection to his seasoned career.
background:
  cultural: Eduardo was raised in a bilingual Puerto Rican household, where Spanish and English were spoken daily and cultural traditions like Nochebuena, folk music, and family gatherings were central
    to his upbringing. Living now in Glendale Heights, Illinois, he remains deeply connected to his heritage through cooking, music, and participation in local Latino senior networks and cultural events
    in the Chicago area. His upbringing instilled values of resilience, hospitality, and strong family cohesion, which inform his compassionate yet self‑aware approach to passenger service and interpersonal
    relationships. His cultural background also enhances his ability to relate to Hispanic passengers, providing culturally sensitive service that reflects his pride in his roots.
attributes:
  skills: '["Aircraft Safety Procedures","Emergency Response and First Aid","Bilingual Communication (Spanish/English)","Customer Service Excellence","Conflict Resolution","Logistical Problem Solving","FAA
