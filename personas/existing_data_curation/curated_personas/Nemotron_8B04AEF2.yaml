personas:
  professional: Suk Szoke, a 15-year-old aspiring visual storyteller, blends watercolor and digital illustration to create fantasy anime fan art, curates time-lapse TikTok videos, and leads improv sketches
    in the school drama club, leveraging their curiosity and love for attention to experiment with unconventional narrative techniques.
  sports: Suk Szoke enjoys casual community-center dance workshops and occasional Saturday soccer pick-ups with the local youth club, while cheering for the Chicago Cubs and the Chicago Fire, viewing sports
    more as social gatherings than competitive pursuits.
  arts: Suk Szoke immerses in creative expression by drawing characters inspired by Studio Ghibli and My Hero Academia, listening to A.R. Rahman's Bollywood soundtracks and indie pop artists like Clairo,
    and performing original songs and improvised stories at open-mic nights alongside favorite performers such as Billie Eilish and Ranbir Kapoor.
  travel: Suk Szoke dreams of spontaneous trips that blend art and culture, such as a weekend road-trip to Santa Fe to sketch desert murals, a future visit to Kyoto to explore manga cafes, and a school-organized
    exchange in Paris to experience street art, always packing a sketchbook for on-the-go inspiration.
  culinary: Suk Szoke loves whipping up crunchy vegetable samosas with their mother, experimenting with chili-infused chutney, and occasionally attempting ramen bowls flavored with miso and soft-boiled
    eggs, treating each cooking session as another canvas for color and texture.
  core: Suk Szoke is a vibrant teen artist who thrives on social buzz, channels anxiety into bold sketches, and balances impulsive spending with fleeting moments of disciplined savings.
background:
  cultural: Suk Nalinie comes from a South Asian family that originally hails from the Indian subcontinent. Her parents maintain many cultural traditions at home, such as celebrating Diwali and Holi, cooking
    dishes like biryani and dal, and speaking Hindi with relatives. Growing up in Hollister, California, she balances these customs with typical American teenage life, attending a diverse public middle
    school and participating in local community activities. Her bicultural experience gives her a unique perspective, influencing her art—she often blends Western comic‑style visuals with motifs inspired
    by Indian mythology and vibrant festival colors. This cultural hybridity fuels her curiosity and openness to new ideas while also giving her a sense of belonging to both her heritage and her Californian
    surroundings.
