  career_goals: Suk Nalinie dreams of turning her love for art and storytelling into a career as a visual artist and content creator who uses her platform to raise mental‑health awareness among teenagers.
    She aspires to study graphic design or illustration after high school and eventually work freelance for entertainment studios or launch her own YouTube channel that blends art tutorials, cultural commentary,
    and personal wellness insights. She also hopes to mentor younger kids in her community, especially those from immigrant families, helping them find creative outlets for their emotions.
