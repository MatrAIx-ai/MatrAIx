  career_goals: Although still young, Josue often talks about wanting to be a 'big helper' when he grows up. He admires firefighters, police officers, and teachers, and dreams of one day wearing a uniform
    that lets him protect and guide others. His practical side leads him to imagine a future where he can use his organizational skills to keep things safe and tidy, perhaps as a community safety officer
    or a school aide. He also expresses an early interest in building things, hinting at an ambition to become an engineer or a construction worker who creates places where families can gather.
