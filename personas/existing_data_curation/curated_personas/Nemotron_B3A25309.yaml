personas:
  professional: An aspiring junior architect, Josue Soto spends afternoons arranging LEGO bricks into intricate cityscapes, applying methodical planning and a love for both creative ideas and practical
    structures, while their outgoing nature turns each build session into a collaborative play with friends.
  sports: Josue Soto thrills on the soccer field as a forward for the Riverside Rangers Kids Soccer Club, chants along with the crowd when the Los Angeles Dodgers score a home run, and eagerly mimics the
    moves of NBA star LeBron James during recess, blending organized team play with a passion for professional sports.
  arts: Josue Soto stars in the school’s monthly “Tiny Talent” show, confidently performing “Let It Go” from Frozen, collects plush toys of Mickey Mouse, and enjoys listening to the catchy tunes of the
    pop group BTS and the classic lullabies of Disney’s The Little Mermaid soundtrack, weaving a vibrant tapestry of early artistic expression.
  travel: Josue Soto recently visited the Grand Canyon on a family road trip, marveling at the vast red cliffs while snapping photos with a plastic dinosaur toy, and dreams of riding the roller coasters
    at Disneyland in Anaheim, planning the trip with a handmade map and a checklist of snacks and souvenir stickers.
  culinary: Josue Soto loves digging into cheesy macaroni, slurping chicken noodle soup with carrots, and sneaking bites of mango slices, proudly declares they can roll a perfect peanut butter and jelly
    sandwich, yet habitually leaves a stray spoon in the sink after snack time.
  core: Josue Soto is a bright, organized five‑year‑old who balances curiosity with practicality, turning every LEGO set, piggy bank, and playground game into a meticulously planned adventure while occasionally
    forgetting the sunscreen.
background:
  cultural: Josue grows up in a Mexican‑American household in Mission, Texas, a vibrant community near the U.S.–Mexico border. His family maintains strong ties to Mexican traditions, speaking both Spanish
    and English at home, celebrating holidays such as Día de los Muertos, Navidad, and Cinco de Mayo with food, music, and family rituals. He regularly visits his grandparents, who teach him songs, recipes,
    and stories from their hometown in Mexico. The local community’s emphasis on family, respect, and communal celebrations shapes his values of cooperation, kindness, and cultural pride.
