  hobbies: '[''Cooking Cuban cuisine'', ''Salsa dancing'', ''Volunteering teaching English'', ''Hiking in Watchung Reservation'', ''Balcony gardening'', ''Reading historical fiction'', ''DIY home improvement
    projects'', ''Listening to Latin jazz'']'
  career_goals: Beatriz aims to move into a supervisory or lead‑assembler role within the next three to five years, leveraging her technical expertise and people‑focused style. She plans to earn a Certified
    Production Technician (CPT) credential and later pursue additional coursework in industrial engineering or quality assurance. Her long‑term ambition is to design and implement training programs that
    improve safety and efficiency while fostering a supportive environment for new and multilingual workers, ultimately positioning herself as a bridge for greater Latinx representation in manufacturing
    leadership.
