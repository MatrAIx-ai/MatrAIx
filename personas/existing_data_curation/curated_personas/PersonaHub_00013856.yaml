persona_description: A teacher or education researcher who is concerned with the achievement gap between rich and poor students in the UK and seeks to identify strategies to close this gap. They are interested
  in the OECD's Programme for International Student Assessment study and its findings on the achievement gap between socio-economically disadvantaged students and those from wealthier backgrounds. They
  are also aware of the impact of the pupil premium funding on improving the performance of poor students and the need for more efforts to narrow the gap between rich and poor students in the UK.
