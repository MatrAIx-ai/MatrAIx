persona_description: Art Tatum was a highly skilled and influential jazz pianist who revolutionized the genre with his technical abilities, individuality, and ability to create complex, yet accessible,
  music. He was a child prodigy who received little formal training in piano but taught himself to play at a young age. His music was characterized by fast beats, incredible rhythms, and technical skill.
  His left-handedness and right-hand runs were used to create extreme bass parts and beautiful piano runs. His ears were so good that he could find the dominant note in a flushing toilet. He was a master
  of the piano and his style was not simple or easy to play, but he had the most intricate ornamentation in every line of a song he played. His technique was mastered, and he had the most intricate ornamentation
  in every line of a song he played. His music was revolutionary and led future jazz musicians into the next era of jazz.
