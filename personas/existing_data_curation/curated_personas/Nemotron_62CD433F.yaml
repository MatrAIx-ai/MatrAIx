personas:
  professional: Gloria Villanueva, a veteran registered nurse with forty years across acute, home, and community settings, blends a practical evidence‑based mindset with a curious embrace of telehealth,
    leading senior wellness workshops, assertively mentoring younger staff, and championing culturally sensitive care for Spanish‑speaking elders.
  sports: Gloria Villanueva, a salsa‑enthusiast who frequents community‑center dance nights and hikes the misty Pacific Northwest trails with her senior walking club, roots for the Seattle Seahawks and
    the Seattle Sounders FC, and incorporates low‑impact tai chi into her fitness routine for joint health.
  arts: Gloria Villanueva, a lover of vibrant cultural rhythms, spins to Celia Cruz and Tito Puente at salsa evenings, devours mystery novels by Agatha Christie and Sue Grafton, and enjoys classic films
    starring Rita Hayworth, letting music and storytelling color her social gatherings.
  travel: Gloria Villanueva, who blends structured day‑trips to the Oregon Coast with spontaneous weekend getaways to Vancouver, BC, and dreams of exploring the historic streets of Oaxaca and San Miguel
    de Allende, balances travel planning with a flexible, go‑with‑the‑flow attitude while mindful of a modest travel budget.
  culinary: Gloria Villanueva, a self‑taught cook, whips up enchiladas verdes with garden‑fresh cilantro, jalapeño, and roasted tomatillos, crafts quinoa‑brown rice salads scented with basil from her herb
    plot, and treats herself to warm pecan pie on festive occasions, balancing spice with comfort.
  core: Gloria Villanueva, a charismatic 69‑year‑old nurse, fuses her love of community, salsa, and garden‑fresh flavors with a pragmatic curiosity for health tech, yet often misplaces her keys during impromptu
    dance nights.
background:
  cultural: Born in Jalisco, Mexico, Gloria moved to the Pacific Northwest in her early twenties and has maintained a strong connection to her Mexican heritage. Fluent in Spanish, she often acts as a cultural
    liaison for Spanish‑speaking patients, respecting their health beliefs and family dynamics. Gloria celebrates Día de los Muertos, quinceañeras, and Mexican holidays with colorful altars and festive
    gatherings, and her Catholic upbringing fuels her commitment to community service. Living in Dayton, WA, she blends Mexican customs with the Pacific Northwest lifestyle, participating in local Latino
    events while embracing outdoor activities like hiking and gardening.
