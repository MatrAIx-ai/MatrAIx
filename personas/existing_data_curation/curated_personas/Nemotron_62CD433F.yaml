  career_goals: Approaching retirement, Gloria aims to stay actively involved in nursing by shifting to a part‑time community health educator role. She plans to earn certification in hospice and palliative
    care, launch a wellness program for seniors in Columbia County, and serve as a mentor for nursing students at the local community college. Gloria also seeks to advocate for culturally competent care
    for Hispanic elders, help integrate telehealth services into rural clinics, and document her nursing journey in a memoir that highlights the evolution of patient care and community health.
