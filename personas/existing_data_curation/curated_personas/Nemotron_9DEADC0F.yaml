personas:
  professional: Katherine Cerros, a certified forklift operator and budding logistics manager, blends meticulous inventory control with an artistic eye for storage design, mediates coworker conflicts with
    calm compassion, and aims to become a shift lead who mentors teammates.
  sports: Katherine Cerros enjoys weekend hikes with the Garden City Trailblazers club, participates in lively group salsa classes, and supports the Kansas City Chiefs and the St. Louis Cardinals as an
    enthusiastic fan who regularly attends games at Arrowhead Stadium and Busch Stadium.
  arts: Katherine Cerros frequents the downtown art gallery featuring works by regional muralist Mike Britt, captures everyday Midwestern scenes with a vintage Fujifilm camera, experiments with DIY macramé,
    and draws inspiration from musicians like The Lumineers and visual artists such as Georgia O'Keeffe, shaping their identity through a blend of local folk art and contemporary indie culture.
  travel: Katherine Cerros prefers budget-friendly road trips that blend nature and small-town charm, such as exploring the Ozark National Forest and visiting the historic Route 66 towns, while dreaming
    of a future backpacking adventure through Kyoto's temples and Paris's art museums, planning itineraries around holiday breaks and modest savings.
  culinary: Katherine Cerros enjoys cooking comfort meals like Kansas City BBQ ribs with a homemade dry rub of brown sugar, smoked paprika, and garlic, often pairing them with buttery corn on the cob and
    a side of sweet-potato casserole, while also delighting in quick-prep dishes like avocado toast topped with cherry tomatoes and feta, reflecting a moderately skilled home chef with a penchant for bold
    Midwestern flavors.
  core: Katherine Cerros balances a practical work ethic with a restless curiosity, often juggling forklift shifts, GED studies, and late-night mural walks, yet sometimes forgets to charge their phone before
    a night shift, leading to occasional missed calls from friends.
background:
  cultural: Katherine grew up in the Midwestern small‑town environment of Garden City, Missouri, where community ties and a strong work ethic are valued. Her family’s modest, white, working‑class roots
    have instilled a practical mindset and a sense of responsibility. The region’s cultural fabric, with its emphasis on neighborly support, local festivals, and a blend of traditional and contemporary
    arts, shapes her outlook. While she identifies with mainstream American cultural norms, she also embraces the eclectic influences of rural Midwest folk art, regional music, and the inclusive spirit
    of local community organizations.
