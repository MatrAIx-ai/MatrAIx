  hobbies: '[''visiting local art galleries'', ''community volunteer work'', ''group dancing classes'', ''hiking'', ''photography'', ''DIY crafting'', ''attending live music events'', ''listening to podcasts
    about new ideas'']'
  career_goals: Katherine aims to earn her GED within the next year and enroll in a logistics management program at a community college to qualify for a supervisory position in warehouse operations. She
    aspires to become a shift lead, where she can combine her organizational strengths with her natural inclination toward supporting coworkers and fostering a harmonious work environment. Long‑term, she
    envisions launching a community outreach initiative that provides art supplies and creative workshops for youth in Garden City, merging her love of art, compassion for others, and leadership skills.
