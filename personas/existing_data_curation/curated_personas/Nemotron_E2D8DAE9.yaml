    ''Participating in neighborhood block parties'']'
  career_goals: James aims to transition from equipment operator to Site Supervisor within the next three to five years, eventually moving into a Construction Project Manager role. He plans to earn a NCCER
    Construction Supervisor credential and complete a community‑college certificate in Construction Management. Long‑term, he envisions starting a small equipment‑rental business serving the Riverside County
    market, leveraging his knowledge of modern telematics and emerging technologies like drone surveying and BIM integration. He also aspires to mentor younger workers who lack formal diplomas, fostering
    a supportive and skilled workforce.
