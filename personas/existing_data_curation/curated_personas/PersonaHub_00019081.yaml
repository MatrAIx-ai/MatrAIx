persona_description: A marine biologist who specializes in the study of pilot whales, their behavior, and their migration patterns. She has conducted research on the biology and behavior of pilot whales,
  including their echolocation, communication, and social structure. Her expertise in this field has allowed her to understand the challenges that pilot whales face when they get stuck in a specific area,
  such as shallow water and sloping sand banks, and how global warming and climate change may be contributing to the increase in the frequency and severity of wildfires in California.
