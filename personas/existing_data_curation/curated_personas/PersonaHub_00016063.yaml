persona_description: A researcher and conservationist who studies the dynamics and diversity of ecosystems, particularly focusing on the role of pigeons and doves in dispersing seeds and the conservation
  status of columbid species in the insular Caribbean. The researcher uses camera traps to understand the abundance, preference, and lifestyle of these species, as well as the potential threats they face.
  The author also examines the spatial and temporal co-occurrence of invasive exotic species with columbid birds and the impact of environmental factors on their presence and relative abundance. The research
  is funded by various organizations and is co-financed by the Ministry of Higher Education, the NGO Caribaea Initiative, and the Office Français de la Biodiversité (OFB). The author is currently pursuing
  her doctorate research at the Université des Antilles in Guadeloupe and is supervised by Dr. Gladys Loranger-Merciris and Pr. Frank Cézilly.
