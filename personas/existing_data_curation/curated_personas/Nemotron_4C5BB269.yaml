  hobbies: '[''Fishing'', ''Gardening'', ''Woodworking'', ''Model shipbuilding'', ''Genealogy research'', ''Historical reading'', ''Cooking traditional recipes'', ''Bridge (card game)'']'
  career_goals: Mickey aims to transition his maintenance expertise into a part‑time consulting role for local landlords while mentoring apprentices through a community workshop. He hopes to serve on the
    Staten Island historic preservation board and to author a practical home‑repair guide for fellow homeowners. Securing his family’s financial stability, creating a modest waterfront garden for his retirement
    years, and leaving a tangible, hands‑on legacy in his neighborhood are his primary long‑term ambitions.
