personas:
  professional: Sharron Hardy, a 23‑year‑old aspiring freelance illustrator, blends watercolor, pastel sketches of the rolling sandhills and digital storytelling into a methodical yet imaginative workflow,
    using their reliable planning skills to juggle college graphic‑design coursework, Etsy commissions, and volunteer event coordination for the local library.
  sports: Sharron Hardy enjoys jogging on sandhill trails each spring, plays recreational softball with the Robbins Church League, follows the Charlotte Hornets and Carolina Panthers for community camaraderie,
    and attends the Robbins Community Center Yoga Club twice weekly as their primary fitness regimen.
  arts: Sharron Hardy’s creative life revolves around daily sketchbook pages of pine‑dotted dunes, evenings listening to Iron & Wine and Esperanza Spalding while experimenting with digital illustration,
    and active participation in a virtual book club that debates contemporary fiction by Zadie Smith and poetic meditations by Ocean Vuong.
  travel: Sharron Hardy prefers low‑key road trips, having already explored Asheville’s River Arts District, the historic streets of Edenton, and the breezy Outer Banks, while dreaming of a spring pilgrimage
    to Santa Fe’s art scene and planning each journey around seasonal garden duties and Etsy order deadlines.
  culinary: Sharron Hardy favors simple farm‑to‑table meals, often preparing heirloom tomato bruschetta with fresh basil and balsamic, whipping up a weekly collard‑green jambalaya, and indulging in a slice
    of pecan pie from the local bakery as a weekend treat.
  core: Sharron Hardy balances a vivid imagination with meticulous organization, wielding sketchbooks and spreadsheets alike while wrestling a lingering worry that fuels both creative depth and occasional
    over‑thinking.
background:
  cultural: As a native of Robbins, a small town in the Sandhills region of North Carolina, Sharron grew up in a Southern, primarily Anglo‑American environment where family gatherings, church community,
    and local traditions hold great importance. Her upbringing emphasized hospitality, modesty, and a strong sense of neighborly support. The rural landscape, seasonal agricultural cycles, and close‑knit
    community events have shaped her appreciation for nature, craftsmanship, and shared cultural heritage, while her college experience introduced her to broader artistic movements and contemporary ideas.
attributes:
  skills: '[''Watercolor painting'', ''Digital illustration'', ''Creative writing'', ''Event planning'', ''Household budget management'', ''Research and information synthesis'', ''Project coordination'',
    ''Microsoft Office (Word, Excel, PowerPoint)'', ''Adobe Lightroom photo editing'', ''Bullet journaling and personal organization'']'
  hobbies: '[''Sketching and watercolor painting'', ''Digital illustration and graphic design'', ''Reading fiction, poetry, and philosophy'', ''Online art‑history courses'', ''Yoga and mindfulness meditation'',
    ''Herb and vegetable gardening'', ''Volunteer work at the local library'', ''Participating in community arts fairs'', ''Keeping a bullet journal'']'
  career_goals: She aims to turn her artistic talents into a sustainable freelance career, offering custom illustrations and printable art through an online shop such as Etsy. In the next 3–5 years she
    hopes to complete a bachelor's degree in graphic design or visual arts, expand her client base to local businesses in Moore County, and eventually launch a community‑center art program that brings creative
    workshops to youth and seniors. She also envisions writing and self‑publishing a collection of short stories that blend surreal themes with Southern settings.
