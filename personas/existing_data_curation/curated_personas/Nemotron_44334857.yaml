  hobbies: '[''Live Music Attendance'', ''Urban Photography'', ''Collecting Vintage Maps'', ''Community Fair Volunteering'', ''Yoga and Mindfulness'', ''Riverfront Jogging'', ''Craft Beer Tasting'', ''Spontaneous
    Road Trips'', ''Hosting Dinner Parties'', ''Reading Urban Planning and Economics Books'']'
  career_goals: Adrian aims to advance to a senior assessor role within the St. Louis City Assessor’s Office, eventually overseeing a team of appraisers. He aspires to champion the integration of AI‑driven
    valuation models and interactive GIS dashboards to improve transparency and efficiency. Over the next five years, he hopes to become a recognized thought leader in municipal property assessment, presenting
    at regional conferences and publishing best‑practice guides. Long‑term, he envisions influencing city policy on equitable property taxation and possibly pursuing an elected position on the city council
    to advocate for fair housing and community development initiatives.
