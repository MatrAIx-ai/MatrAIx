persona_description: A teacher who is experienced in teaching English Literature and has a deep understanding of the Modality and Split Attention effects. She is skilled in breaking down complex content
  into manageable chunks, using a disproportionate visual/auditory format for delivering new content, ensuring any reading elements of the lesson involve the pupils first and then the teacher second, and
  ensuring all teacher exposition is short and sharp. She is aware of the transient information effect and is adept at using the four ideas to minimise learning loss and build the appropriate schema for
  understanding the new content. She is committed to using this knowledge to launchpad the teaching of the conceptually more challenging stuff in other subjects where she is presented with the challenge
  of teaching the novice learner new content.
