personas:
  professional: Teresa Clodfelter, a seasoned volunteer event designer in Grand Junction, leverages their meticulous budgeting, skeptical fact‑checking, and love of local history to orchestrate community
    art talks, historical exhibitions, and neighborhood clean‑ups, while they mentor younger volunteers through a structured apprenticeship program.
  sports: Teresa Clodfelter enjoys low‑impact outdoor activities such as bird‑watching hikes along the Colorado River and seasonal snowshoeing in the Rockies, supports the Denver Broncos, Colorado Avalanche,
    and Colorado Rockies from their living room, and they participate in a local walking club that meets twice a month.
  arts: Teresa Clodfelter channels their love of art through sketching native flora after visits to the Museum of Western Colorado, crafting pottery inspired by the studio techniques of Peter Voulkos, and
    finding solace in the poetry of Mary Oliver and the paintings of Georgia O’Keeffe, while they also regularly attend performances by the Mountain Shadows Theater.
  travel: Teresa Clodfelter prefers carefully planned, low‑stress weekend getaways, such as a day trip to Sedona’s red rock trails, a weekend in Santa Fe to explore Southwest art markets, and an annual
    pilgrimage to Des Moines to research their Midwestern family roots, and they always budget travel costs within their modest savings.
  culinary: Teresa Clodfelter enjoys modest home cooking, favoring quinoa‑based salads with roasted corn, local sage‑infused lamb chops, and seasonal apple‑cinnamon crumble, while their skill level is intermediate—capable
    of crafting handmade pasta but they often opt for quick, nourishing meals after a long day of volunteering.
  core: Teresa Clodfelter blends relentless curiosity with an exacting, budget‑obsessed mindset, finds comfort in solitary art and nature, and they wrestle with chronic worry that fuels both meticulous
    planning and occasional sleepless nights.
background:
  cultural: Teresa comes from a multi‑generational white U.S. family with roots in the Midwest—her grandparents migrated to Colorado in the post‑World War II era seeking opportunities in the burgeoning
    oil and agricultural sectors. Raised in a modest, close‑knit household that valued self‑reliance, community service, and modest religious attendance (Methodist), she internalized a strong work ethic
    and a reverence for local traditions. Living her adult life in Grand Junction, she has absorbed the town’s blend of frontier pragmatism and emerging arts culture. This backdrop informs her respect for
    historical preservation, her affinity for the outdoors, and her commitment to contributing to the cultural tapestry of Mesa County while maintaining a quietly independent and thoughtful demeanor.
