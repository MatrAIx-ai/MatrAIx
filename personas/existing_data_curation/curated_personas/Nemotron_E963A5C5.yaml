  hobbies: '["Museum visits", "Botanical sketching", "Book club", "Birdwatching", "Native‑plant gardening", "Pottery", "Knitting", "Quilting", "Bullet journaling", "Gentle yoga", "Genealogy research"]'
  career_goals: Although Teresa is not currently in the formal workforce, she aspires to become a recognized catalyst for cultural preservation in Grand Junction. Her primary ambition is to lead a community‑driven
    exhibition series that highlights local artists and the town’s pioneer heritage, securing a grant from the Colorado Arts Council to fund it. She also aims to mentor younger volunteers, establishing
    a structured apprenticeship program for event organization and historical documentation. On a personal level, Teresa hopes to publish a memoir blending her family’s migration story with reflections
    on the evolving art scene of Mesa County, positioning herself as a storyteller who bridges past and present.
