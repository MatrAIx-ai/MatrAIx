persona_description: An expert on invasive species, particularly those related to pests and weeds, who is advocating for urgent national action to combat their invasion. They are a member of the Australian
  Biosecurity Group and have experience in weed science and plant biology. They have worked on developing a 10-point plan to tackle the potential devastation of native species and eradication costs, and
  are part of a group that wants coherent laws and programs across state borders to control the sale of pest plants and animals. They have expertise in weed science, plant biology, and have experience in
  developing and implementing policies related to invasive species.
