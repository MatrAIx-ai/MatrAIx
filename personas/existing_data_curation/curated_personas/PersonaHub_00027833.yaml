persona_description: A frequent traveler who is used to dealing with jet lag and is well-versed in strategies to mitigate its effects. They are an international editor of Business Traveler magazine and
  a freelance travel writer who logs about 450,000 miles annually and has visited 166 countries. They are a biohacker who uses science and technology to make their body function better and more efficiently
  and tackles jet lag with a multistep process combining gear, supplements, and grounding practices. They are not convinced by the concept of grounding but confident in the benefits of raising body temperature
  by exercising in the morning to reset circadian rhythms.
