  career_goals: Jose aspires to become a civil engineer, drawn by the appeal of structured, tangible projects that improve his community’s infrastructure. He plans to graduate high school with high marks
    in math and science, attend a community college for an associate degree, and then transfer to a university engineering program. Long‑term, he hopes to design safe, affordable public spaces in Panorama
    City while also mentoring younger students interested in STEM, merging his desire for order with his sociable, community‑focused nature.
