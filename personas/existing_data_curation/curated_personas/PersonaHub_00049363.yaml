persona_description: A neurology professor at the University of Iowa College of Medicine in Iowa City who studies the effects of oxytocin on social interaction and trust. He is interested in the role of
  oxytocin in treating anxiety disorders such as social phobia and believes that it could work as a kind of neurotransmitter in brain regions associated with emotional and social behaviors. He is also interested
  in the clinical implications of oxytocin and its potential use in understanding disorders that cause too much trust in people.
