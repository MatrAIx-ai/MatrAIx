  career_goals: Guillermo aims to advance from senior analyst to portfolio manager within the next three years, earning his CFA charter along the way. He aspires to lead a boutique investment firm that
    focuses on impact investing, especially projects that blend finance with the arts and cultural entrepreneurship. Long‑term, he envisions creating a platform that supports Latinx artists and creators
    through tailored financial products, while mentoring a diverse next generation of finance professionals.
