persona_description: A nutritional ecologist who has developed a model to investigate the interaction of macro-nutrients in various species, including primates and carnivores. He has identified the role
  of protein in contributing to obesity in both animals and humans, and has established that diluting the protein in a carnivore's diet with extra carbohydrates will lead them to overeat carbohydrates,
  which is a significant contributor to obesity. He has also made the point that cats fed commercial foods will be held in a chronic state of nutritional imbalance, which raises welfare concerns and will
  also in the long term likely affect cat metabolism and health.
