persona_description: A person who is interested in learning about and implementing energy-efficient building practices, particularly in the context of retrofitting existing buildings. They are likely to
  have a background in construction or building science, and may have a particular interest in the Passivhaus movement and the Passivhaus Standard. They are also likely to be familiar with the concept of
  thermal bridges and their impact on energy performance, as well as the use of low-grade heat and mechanical ventilation systems. They may have a keen interest in understanding the various tools and software
  used in the development and accreditation of energy-efficient buildings, such as PHPP and the AECB's Low Energy Building Planning Package (LEBPP).
