    films'', ''Reading speculative fiction'', ''Building custom PCs'']'
  career_goals: Thomas aims to turn his artistic passions into a sustainable freelance career. He plans to build an online portfolio that showcases his illustrations, photography, and design work, hoping
    to attract commissions for album covers, indie game assets, and custom prints. While he does not intend to follow a traditional academic path, he is open to enrolling in a community college art program
    or attending short‑term workshops to refine his technique and learn professional practices. Long‑term, he hopes to maintain a flexible schedule that lets him work from his quiet home studio in Little
    Rock while traveling occasionally for inspiration.
