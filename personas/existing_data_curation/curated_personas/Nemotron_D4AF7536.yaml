  career_goals: Jesus aims to transition from a frontline packager to a supervisory role within the next two to three years, leveraging his hands‑on experience to lead a shift team. He plans to obtain a
    forklift certification and attend a short‑term supply‑chain management course at a local community college, positioning himself for future opportunities in operations coordination or logistics planning.
    While he values upward mobility, he also wants to maintain the flexible schedule that lets him stay engaged with his family and community activities.
