  hobbies: '[''Bridge and trivia games'', ''Hiking'', ''Gardening'', ''Photography'', ''Amateur radio'', ''Woodworking'', ''Astronomy'', ''Volunteer tech assistance'']'
  career_goals: Although officially retired, Timothy aims to leave a lasting impact on his community by expanding local STEM outreach programs, developing a mentorship curriculum for high‑school students,
    and authoring a practical guide on sustainable home renovation. He also aspires to serve on the advisory board of the Placer County senior center, share his knowledge in community workshops, and continue
    learning advanced topics such as renewable energy technologies.
