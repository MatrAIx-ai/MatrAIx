    watercolor painting'', ''Quilting and crocheting'']'
  hobbies: '[''Watercolor painting'', ''Visiting art galleries and museums'', ''Community theater'', ''Reading (fiction and nonfiction)'', ''Book club'', ''Gardening (native Missouri plants)'', ''Hiking
    (Ozark Trail)'', ''Yoga'', ''Quilting'', ''Crocheting'', ''Cooking and experimenting with recipes'', ''Online learning (photography, digital design)'', ''Volunteering at community events'']'
  career_goals: Patricia aims to move into a supervisory administrative role within the next two to three years, such as Office Manager for a school district or a county office, where she can mentor junior
    staff and streamline office processes. She plans to earn a certificate in office management or pursue a master’s degree in educational leadership to strengthen her credentials. Leveraging her love for
    art and education, she hopes to develop community‑based art workshops or become a program coordinator for the local community center or museum, creating hands‑on learning experiences for residents of
    all ages. Additionally, she dreams of launching a small side business selling handmade crafts, allowing her to blend creativity with entrepreneurship while maintaining a healthy work‑life balance for
    her family.
