personas:
  professional: Patricia Decossas blends meticulous office administration expertise—proficient in Microsoft Office, Google Workspace, and QuickBooks—with their innate curiosity and collaborative yet assertive
    style, enabling them to streamline school district processes while curating community art displays and mentoring junior staff.
  sports: Patricia Decossas stays active by hiking sections of the Ozark Trail with the Ozark Trail Preservation Society, practicing yoga twice weekly, and cheering on the Kansas City Chiefs and St. Louis
    Cardinals during the football and baseball seasons.
  arts: Patricia Decossas channels their love for Monet and Andrew Wyeth into watercolor sketches of museum exhibits, volunteers at community theater productions of 'Our Town', and finds inspiration in
    the folk‑rock melodies of Sufjan Stevens and the nuanced performances of Frances McDormand.
  travel: Patricia Decossas plans their trips meticulously, favoring weekend escapes to Branson and the historic streets of St. Louis, while dreaming of immersive cultural tours in Oaxaca and Kyoto that
    blend art workshops with local cuisine.
  culinary: Patricia Decossas enjoys cooking intermediate‑level meals such as herb‑roasted trout with rosemary and thyme, caramelized pecan salad, and classic chicken and dumplings, often sourcing fresh
    Missouri-grown produce for their experimental kitchen adventures.
  core: Patricia Decossas is a curious, organized multitasker who balances a love for art and community service with a penchant for sketching watercolors on office stationery during lunch breaks.
background:
  cultural: Patricia grew up in a small‑town Midwestern setting near Jefferson City, Missouri, in a family with German and Irish ancestry. Her upbringing emphasized community involvement, church participation
    (Methodist), and the values of hard work and education. She has a deep appreciation for regional traditions such as the state fair, county festivals, and local cuisine like barbecue and catfish. While
    identifying as white, Patricia is aware of the Osage Nation’s historical presence in the area and respects the local Native American heritage, often attending cultural heritage events hosted by the
    Osage community. Her Midwestern roots shape her practical outlook, collaborative spirit, and commitment to civic engagement.
