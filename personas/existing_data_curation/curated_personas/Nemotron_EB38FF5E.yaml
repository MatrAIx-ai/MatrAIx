  career_goals: At this stage, Elroy aims to deepen the church's engagement with the local community by launching a mentorship program for emerging clergy and authoring a book that bridges scientific concepts
    with everyday spirituality. He aspires to expand environmental stewardship initiatives, such as a community garden and shoreline clean‑ups, reflecting his practical values. Additionally, he hopes to
    transition into a chaplaincy role at a nearby senior center, allowing him to provide focused pastoral care while maintaining his involvement in church leadership and outreach.
