persona_description: A public health expert and researcher in the field of parasitic diseases, particularly amoebiasis. Yoder and colleagues' study on the prevalence of N. fowleri amoebas in U.S. waters
  and the incidence of PAM provides insights into the environmental factors and risk factors associated with this infection. They are motivated to find the cause and understand the mechanisms behind the
  infection to improve public health practices and reduce the risk of infection.
