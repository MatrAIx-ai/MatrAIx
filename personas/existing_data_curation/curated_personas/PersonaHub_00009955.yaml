persona_description: A healthcare professional who specializes in the diagnosis and treatment of heart disease, particularly in women. This persona is knowledgeable about the signs and symptoms of silent
  coronary heart disease, as well as the differences between men and women in terms of these symptoms. They are skilled in recognizing the signs of angina and other heart-related symptoms in women, and
  are able to provide appropriate treatment and care for patients with coronary heart disease. This persona is also knowledgeable about the complications of heart disease, including heart attacks, heart
  failure, and arrhythmias, and is skilled in managing these conditions through education and treatment.
