persona_description: A scientist or environmental scientist who specializes in the regulation and classification of solid waste, particularly related to industrial boilers and incinerators. They are familiar
  with the proposed rules for Boiler MACT and CISWI, including the criteria for determining whether non-hazardous secondary materials qualify as solid waste. They are likely to have experience working with
  EPA regulations and have expertise in environmental science, chemistry, and engineering. They are knowledgeable about the proposed petition process for materials used as fuels outside the control of the
  generator and are aware of potential implementation issues and concerns related to the legitimacy criteria and processing requirements.
