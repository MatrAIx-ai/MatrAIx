persona_description: A scholar with diverse research agendas, including in technical communication, new media, media accessibility, disability rights, and Universal Design. They are interested in the field
  of Audio Description research of maps and have collaborated with national park sites throughout the country. They have earned accolades such as the Dr. Margaret Pfanstiehl Achievement Award from the American
  Council of the Blind and the John Wesley Powell Prize for outstanding achievement in the field of historical displays. They work as an Associate Professor at the University of Hawai‘i and frequently attend
  education events and webinars. They are interested in taking specific courses that are not listed online and are open to attending a recording if they are unable to attend.
