  career_goals: Even at 85, Dinora remains driven by a desire to nurture the next generation of artists and to preserve her cultural heritage. She aims to establish a scholarship fund for young Guatemalan‑American
    artists, curate a traveling exhibition of her life's work that highlights the fusion of Maya motifs with contemporary Brooklyn life, and publish a richly illustrated memoir that combines her personal
    stories with lessons in art technique. She also hopes to complete a collaborative mural in her neighborhood that involves local youth, thereby cementing a lasting community legacy.
