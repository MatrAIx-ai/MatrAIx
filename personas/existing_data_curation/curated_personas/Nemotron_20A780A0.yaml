personas:
  professional: Dinora Villamar, an 85-year-old community muralist and textile artist, blends oil painting, watercolor, and traditional weaving expertise with their relaxed, flexible approach to workshop
    organization, fostering inclusive creative spaces for neighborhood youth.
  sports: Dinora Villamar enjoys gentle morning walks in Prospect Park, occasionally joining the local Prospect Park Walking Club, and follows the Brooklyn Nets and the New York City Marathon, cheering
    from the sidelines while they prefer low-impact exercise over competitive sports.
  arts: Dinora Villamar spends afternoons crocheting intricate shawls to the marimba rhythms of Carlos Huertas, immersing themselves in folk songs by Ana Villegas, and draws inspiration from the vibrant
    colors of Frida Kahlo's paintings and the lyrical verses of Claribel Alegria, weaving these influences into their murals and watercolors.
  travel: Dinora Villamar favors slow-paced, culturally rich trips, often planning last-minute getaways to the bustling markets of Oaxaca, the colonial charm of Antigua, and the tranquil beaches of the
    Cayman Islands, balancing their love of adventure with the practical constraints of senior travel.
  culinary: Dinora Villamar, a seasoned home chef, delights in simmering pepian with roasted chilies, tomatoes, and masa, skillfully wrapping tamales with fresh corn husks and pumpkin seed-infused masa,
    and occasionally treats themselves to a simple avocado toast topped with radish and lime when dining out.
  core: Dinora Villamar blends artistic mastery with a laid-back, slightly disorganized spirit, nurturing community creativity while they juggle garden chores, sketchbooks, and forgotten appointment reminders.
background:
  cultural: Dinora was born in a small village in the department of Quetzaltenango, Guatemala, where her family were artisans known for weaving huipils and creating bright ceramic pottery. Growing up among
    the K'iche' Maya traditions, she learned the symbolism of indigenous patterns and the importance of communal celebration through art. After moving to New York in the early 1970s, she maintained strong
    ties to her Guatemalan roots by participating in cultural festivals, teaching Spanish to neighborhood children, and incorporating Mayan iconography into her Brooklyn murals, thereby creating a bridge
    between her heritage and her adopted city.
