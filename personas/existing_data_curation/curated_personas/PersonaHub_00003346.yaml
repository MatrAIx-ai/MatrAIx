persona_description: A health and wellness advocate who is passionate about promoting awareness, prevention, and protective measures against tick-borne diseases. She is knowledgeable about the expansion
  of tick populations, irregular climate patterns, and urbanization, and has a deep understanding of the number of counties at high-risk for Lyme disease. She is also knowledgeable about the rise in the
  number of diagnosed cases of Lyme disease, particularly in rural areas. She is aware of the importance of choosing a repellent that is safe for pregnant women and children of all ages and has a strong
  desire to educate others on the importance of following CDC guidelines when choosing a repellent. She is a leader in the natural prevention industry and has a unique vision for creating a world of protection
  for homes, families, and the environment.
