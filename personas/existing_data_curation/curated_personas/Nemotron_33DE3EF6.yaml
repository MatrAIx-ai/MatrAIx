  career_goals: In the next few years, Carmen aims to transition from a front-line sales role to a senior advisory and mentorship position. She plans to obtain the Series 7 and Certified Financial Planner
    (CFP) designations to broaden her credential set. Her long-term ambition is to launch a boutique advisory firm that focuses on serving Spanish-speaking professionals and retirees along the Texas Gulf
    Coast, offering customized commodity and securities strategies. Carmen also intends to develop a community-based financial literacy program that provides workshops on investment basics, retirement planning,
    and risk management for local Hispanic seniors. While she looks forward to scaling back her day-to-day sales responsibilities, she wishes to remain an active speaker at industry conferences and a trusted
    mentor within her firm.
