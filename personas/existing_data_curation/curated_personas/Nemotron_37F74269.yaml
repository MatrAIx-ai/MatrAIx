  career_goals: Emerlinda aims to transition into a senior engineering or technical lead role within the next three years, earn an AWS Solutions Architect certification, and lead cross‑functional product
    initiatives that blend cloud services with user‑centered design. Long‑term, she hopes to launch her own tech venture that provides affordable cloud‑based solutions for small businesses, while mentoring
    women and under‑represented professionals in the technology industry.
