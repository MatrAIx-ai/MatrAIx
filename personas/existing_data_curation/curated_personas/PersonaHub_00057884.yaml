persona_description: A scientist or researcher working on the development of injectable lotions and biomaterials that can accelerate the healing of skin wounds, bone fractures, and internal organ injuries.
  They are interested in the unique microencapsulation system that traps proteins and mesenchymal or connective tissue stem cells in microspheres made of synthetic hydrogels. They are passionate about improving
  wound and fracture healing, as well as the medical needs of chronic wound patients in the United States. They have a deep understanding of the importance of tissue-engineered skin grafts and non-healing
  wound management in burn victims, diabetic, and elderly populations. They are skilled in using microspheres for wound healing, and are interested in the possibility of applying them externally or injecting
  them for fractures and internal organ injury. They are also interested in the potential of MSCs microspheres to be frozen for storage and wound repair promoting protein microspheres to be lyophilized
  (freeze dried).
