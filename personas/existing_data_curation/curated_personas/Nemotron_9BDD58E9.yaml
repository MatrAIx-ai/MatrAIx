  hobbies: '[''playing in playground'', ''building block towers'', ''dancing to music'', ''listening to Spanish lullabies'', ''watching animated shows'', ''exploring parks'', ''helping in kitchen'']'
  career_goals: Even at his age, Inti often talks about wanting to be a firefighter or a soccer player when he grows up, inspired by the community heroes he sees in the Bronx. He dreams of helping others,
    being part of a team, and having a clear, predictable role that lets him use his energy and sociable nature. He also imagines becoming an artist, drawing colorful pictures that reflect the vibrant culture
    around him.
