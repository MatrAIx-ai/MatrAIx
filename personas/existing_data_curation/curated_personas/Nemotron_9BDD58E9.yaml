personas:
  professional: Inti Lara, a 2-year-old with a budding sense of order, spends hours arranging blocks in perfect rows and mimicking adult phone calls, preferring predictable play routines while occasionally
    abandoning them for spontaneous storytelling, and they are the charismatic leader of the sandbox crew.
  sports: Inti Lara joins the local Parent-Child Soccer circle at the community park, cheering for the hometown River City Rovers while preferring the soft foam ball over the larger field, and they love
    splashing in the shallow pool during summer, balancing high energy with a love for predictable routines.
  arts: Inti Lara immerses themselves in the world of children's music, dancing to Raffi's 'Baby Beluga' and humming the 'Circle of Life' from Disney's The Lion King, while scribbling abstract shapes with
    Crayola crayons, often insisting on performing a dramatic encore for any audience, even an imaginary one.
  travel: Inti Lara loves spontaneous stroller rides to the nearby zoo, especially fascinated by the giraffes at the local Safari Park, but also enjoys meticulously planned weekend trips to grandma's house
    where the familiar scent of fresh biscuits offers comfort amid occasional travel anxieties, and they beam with delight when a new playground is discovered.
  culinary: Inti Lara prefers the comforting taste of mashed sweet potatoes and chicken nuggets, often insisting on the bright orange strawberry-shaped pasta, yet they are notorious for rejecting broccoli
    with a dramatic face-pout, and they love helping stir the batter for banana pancakes with a tiny wooden spoon.
  core: Inti Lara is a lively, structure-loving 2-year-old who balances social exuberance with intense emotional swings, often oscillating between meticulous toy organization and spontaneous bursts of playful
    chaos, and they delight in bright crayons and sing-along songs.
background:
  cultural: Inti is a two‑year‑old Honduran‑American growing up in the Bronx. He lives in a bilingual household where Spanish is spoken at home and English at school and in the community. His family celebrates
    Honduran traditions such as Feria Juniana, enjoys dishes like baleadas, plantains, and tamales, and participates in local Latino community events that feature music, dance, and strong family ties. This
    cultural blend shapes his daily life, language use, and social interactions.
