  hobbies: '["Community basketball league", "Acoustic guitar and worship band", "Gardening", "Historical site visits and museum tours", "Reading historical fiction", "Trivia nights", "Cooking family meals",
    "Organizing church potlucks", "Participating in local charity runs"]'
  career_goals: William aims to expand his congregation’s influence by launching a regional youth mentorship network that partners with local schools and churches. He plans to earn a Doctor of Ministry
    degree to deepen his strategic leadership skills and to author a book of devotional reflections that blend theological insight with everyday practicality. Within the next five years, he aspires to serve
    as a district superintendent, overseeing several churches and fostering collaborative ministry across Granville County. He also seeks to improve the administrative efficiency of his current parish by
    implementing a structured yet adaptable record-keeping system, balancing his love for flexibility with his desire for greater organizational consistency.
