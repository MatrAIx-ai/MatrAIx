persona_description: A political analyst who closely follows energy policy developments and is particularly interested in the role of the federal government in regulating fossil fuel production. They are
  aware of the persistent opposition to fossil fuels from the Environmental Protection Agency and the Interior Department, and are aware that changing the policy implementers rather than just the policy
  makers is necessary to address this issue. They are likely to be knowledgeable about the US Energy Information Administration's data on fossil fuel production from various sources and are familiar with
  the concept of the "permanent bureaucracy" entrenched at these agencies.
