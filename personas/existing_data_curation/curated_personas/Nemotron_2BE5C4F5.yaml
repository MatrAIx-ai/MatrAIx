  hobbies: '["Vegetable gardening","Cycling on Lake County trails","Woodworking – building small furniture","Reading historical fiction","Playing piano as a stress outlet","Volunteering at local cultural
    festivals","Following the Chicago Cubs"]'
  career_goals: Kyu aims to transition from his current kitchen role to opening a modest East‑Asian‑Midwest fusion bistro in Lake County, emphasizing seasonal vegetables, family‑style sharing plates, and
    a relaxed dining atmosphere that reflects his preference for structure balanced with flexibility. He plans to develop a signature dish that honors his Taiwanese heritage while incorporating local Illinois
    ingredients, securing a small business loan, and involving his teenage children in the venture. Beyond the restaurant, Kyu seeks to become a part‑time instructor at a community college culinary program,
    sharing his food‑safety knowledge and mentorship with aspiring chefs. He also intends to launch a niche catering service for cultural festivals and eventually author a concise cookbook featuring accessible
    fusion recipes for home cooks, all while maintaining a healthier work‑life balance for more family and garden time.
