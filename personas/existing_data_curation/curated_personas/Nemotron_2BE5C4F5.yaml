personas:
  professional: Kyu Wu, a seasoned culinary professional who leverages advanced East Asian cooking techniques, meticulous HACCP compliance, and bilingual recipe translation to run a fast‑paced kitchen,
    blends his practical, structure‑loving mindset with a relaxed, flexible approach to team mentorship and menu innovation.
  sports: Kyu Wu cycles regularly with the Lake County Cycling Club on the winding trails around the county lakes, enjoys occasional pickup basketball games in the summer, and faithfully cheers for the
    Chicago Cubs, often joining friends at Wrigley Field during weekend home games.
  arts: Kyu Wu nurtures his artistic side by playing piano pieces by Lang Lang in his home kitchen, devouring historical fiction novels by James Clavell and Ken Follett set in East Asia, volunteering at
    local Asian cultural festivals where he demonstrates traditional cooking, and attending Chicago Symphony Orchestra concerts featuring works by Tchaikovsky and Tan Dun.
  travel: Kyu Wu prefers low‑key, family‑oriented trips that blend culinary discovery with relaxation, having explored the night markets of Taipei and the historic temples of Kyoto, while planning a future
    road‑trip along the Great Lakes to savor regional farm‑to‑table fare, though his modest budget often steers him toward weekend getaways in nearby Chicago and local vineyard retreats.
  culinary: Kyu Wu excels at crafting East Asian‑Midwest fusion dishes such as miso‑glazed pork chops with Illinois honey‑roasted carrots, ginger‑infused kale stir‑fry topped with pickled Taiwanese garlic,
    and handcrafted dim sum dumplings stuffed with locally sourced corn and shrimp, favoring fresh herbs like cilantro and Thai basil and relishing the tactile precision of knife work.
  core: Kyu Wu balances a disciplined culinary career with a laid‑back love of gardening, often forgetting to water his lettuce in pursuit of perfect menu plating, and still manages to sprout new ideas
    while occasionally misplacing his favorite kitchen knives.
background:
  cultural: Kyu is a first‑generation American; his parents emigrated from Taiwan in the early 1970s and settled in the Chicago suburbs. Raised in a bilingual household, he grew up celebrating Lunar New
    Year, participating in night‑market style cooking at family gatherings, and maintaining a deep respect for familial harmony and collective well‑being—values that echo both his East Asian roots and the
    communal ethos of Midwestern suburbia. He speaks Mandarin and English fluently, stays active in the local Taiwanese‑American community, and frequently incorporates traditional flavors and techniques
    into his cooking while adapting them to the regional palate of Illinois. This cultural blend informs his kind, cooperative nature and his desire to foster cross‑cultural dialogue through food.
attributes:
  skills: '["Wok stir‑fry technique","Dim sum and bao preparation","Precision knife skills for fish and meat","Menu development with seasonal Midwestern produce","Food safety and HACCP compliance","Inventory
