  hobbies: '[''Sketching'', ''Digital painting'', ''Reading speculative fiction'', ''Philosophy'', ''Poetry'', ''Playing acoustic guitar'', ''Stargazing'', ''Night photography'', ''Coding simple interactive
    art'', ''Journaling'']'
  career_goals: He aspires to earn a scholarship to a reputable art and design college, where he can refine his illustration and interactive media skills. His long‑term ambition is to work as a concept
    artist for video games or film studios, creating visual narratives that blend his love for abstract ideas with storytelling. He also hopes to develop a personal web portfolio and a small indie game
    that incorporates his poetry and visual art, giving him a platform to share his inner world. Recognizing his sensitivity to stress, William intends to study art therapy or community arts programs, enabling
    him to use his creative talents to support others dealing with anxiety. Ultimately, he seeks a career that balances independent creative work with meaningful collaboration, providing both personal fulfillment
    and financial stability.
