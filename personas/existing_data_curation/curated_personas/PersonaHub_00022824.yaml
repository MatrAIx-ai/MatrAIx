persona_description: A project manager who is responsible for managing the budget and resources of a project while ensuring that the project objectives are met and stakeholders' requirements are satisfied.
  The project manager must have a strong understanding of project budgeting and planning processes, as well as the ability to analyze and control project costs within the approved budget. The project manager
  must also have experience in conducting baseline budgeting and monitoring project progress against expectations, as well as the ability to generate accurate project estimates and budgets. The project
  manager must be able to work collaboratively with the team and document the history of the project to ensure that it is well understood and that the team can effectively estimate and manage the project.
