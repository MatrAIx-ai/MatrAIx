personas:
  professional: Anthony Broeker, an experienced metal fabricator and CNC specialist, leverages two decades of precision welding, CAD design, and lean‑manufacturing expertise to lead shift teams with methodical
    planning, hands‑on mentorship, and a quiet confidence that balances assertiveness with collaborative problem‑solving.
  sports: Anthony Broeker, a dedicated weekend hiker and member of the Spokane Hiking Society, complements his outdoor pursuits with occasional pickup basketball at the Spokane Youth Sports Center, follows
    the Seattle Seahawks and Spokane Indians, and practices a disciplined routine of morning calisthenics to maintain functional strength.
  arts: Anthony Broeker, an avid industrial photographer and metal sculpture creator, draws inspiration from Ansel Adams’ black‑and‑white landscapes and the intricate beadwork of local Indigenous artists,
    regularly curating pieces for the Riverfront Gallery while swapping ideas at the makerspace with fellow welders‑turned‑artists.
  travel: Anthony Broeker, an explorer of both rugged terrains and industrial heritage, has trekked the Alpine trails of Bavaria, toured the Meiji‑era factories in Osaka, enjoys annual road trips to the
    Oregon Coast for pelagic salmon smoke‑houses, and dreams of a future pilgrimage to the Ironbridge Gorge Museum in England to study historic metalworking.
  culinary: Anthony Broeker, a self‑taught grill master, favors cedar‑plank smoked trout, hand‑crafted rye sourdough, and a robust cup of dark roast coffee, often seasoning his wood‑smoked creations with
    locally sourced pine nuts and peppercorns while occasionally indulging in an extra slice of cheesecake after a gallery opening.
  core: Anthony Broeker blends disciplined craftsmanship with a quiet curiosity, balancing a love for solitary metal art and rugged hikes with a penchant for meticulous budgeting, occasional health‑check
    procrastination, and an unwavering commitment to community‑focused improvement.
background:
  cultural: Anthony was raised in a working‑class, German‑American family in the suburbs of Spokane County, Washington. The Pacific Northwest’s strong outdoors culture, self‑reliance, and community spirit
    shaped his values. Exposure to the local logging and manufacturing industries, as well as the nearby Air Force base, fostered a respect for discipline, precision, and teamwork. While identifying as
    white, he appreciates the region’s multicultural aspects, showing particular interest in Native American art and the vibrant local artistic scene. Family traditions emphasized practicality, modesty,
    and a strong work ethic, aligning with his organized and reliable nature.
attributes:
  skills: '[''Metal fabrication'', ''Assembly line operations'', ''Blueprint/technical drawing interpretation'', ''CNC machining (milling, turning)'', ''MIG/TIG welding'', ''Precision measurement (calipers,
