    wiring and soldering'', ''Troubleshooting mechanical systems'']'
  hobbies: '[''Model airplane building and painting'', ''Woodworking'', ''Metal sculpture/crafting'', ''Hiking and nature walks'', ''Industrial photography'', ''Reading science‑fiction'', ''Makerspace participation'',
    ''Attending gallery openings'', ''Community theater shows'']'
  career_goals: In the near term, Anthony aims to become a shift supervisor, leading a team of assemblers, implementing continuous‑improvement projects, and mentoring newer colleagues. His longer‑term ambition
    is to transition into a quality‑assurance lead role, focusing on process auditing and certification. He also dreams of launching a side venture that creates custom metal art and functional décor, leveraging
    his fabrication skills and artistic curiosity. To support these goals, he plans to enroll in community‑college courses on CNC programming and advanced CAD, and to obtain a OSHA 30‑hour certification.
