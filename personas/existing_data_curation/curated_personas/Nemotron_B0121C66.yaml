  hobbies: '[''Playing basketball'', ''Listening to hip‑hop and R&B'', ''Freestyle rap and songwriting'', ''Video gaming (NBA 2K, Fortnite)'', ''Church youth group involvement'', ''Skateboarding'', ''Cooking
    soul food dishes'', ''Drawing comic‑style art'']'
  career_goals: Jamel’s primary goal is to complete his secondary education, earn his GED, and enroll in a community college program focused on social services or criminal justice. He aims to become a youth
    mentor or community liaison, using his natural charisma and empathy to support at‑risk teens. He also harbors a long‑term dream of playing college basketball and eventually pursuing a professional career,
    while understanding the importance of a backup plan. He envisions a future where he can blend his love for teamwork, leadership, and service, perhaps as a firefighter or police officer, roles that offer
    clear structure, predictability, and the chance to help others.
