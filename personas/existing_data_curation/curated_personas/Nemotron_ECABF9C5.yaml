  hobbies: '["Coastal Fishing","Native Plant Gardening","Cooking Traditional Puerto Rican Cuisine","Reading History and Biographies","Scale Model Ship Building","Photography of Patillas’ Coastline","Listening
    to Bomba and Plena Music","Small‑Group Coffee Gatherings"]'
  career_goals: Ricardo’s primary ambition is to transition from a clerical role to a supervisory position where he can formalize process improvements and lead a small logistics team. He plans to obtain
    a Certified Supply Chain Professional (CSCP) credential to bolster his theoretical foundation and reduce the stress caused by ad‑hoc problem solving. In the longer term, he hopes to launch a community‑focused,
    micro‑shipping service that assists local artisans and farmers in Patillas to reach mainland markets, thereby blending his practical expertise with his desire to support the local economy and foster
    workplace harmony.
