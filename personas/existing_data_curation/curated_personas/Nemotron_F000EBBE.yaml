personas:
  professional: Heather Bass, a 15‑year‑old aspiring marine‑focused digital storyteller, merges their love of marine biology, Python scripting, and sketching to create interactive marine ecosystem projects
    for their science class and online community.
  sports: Heather Bass, a 15‑year‑old beach‑enthusiast, rides the waves with the local surf club, plays weekly beach volleyball matches, cheers on the San Diego Padres, and follows the Los Angeles Lakers,
    balancing casual fitness with occasional school cross‑country runs.
  arts: Heather Bass channels their creative energy into digital paintings inspired by Beeple’s futuristic aesthetics, sketches marine life reminiscent of Hokusai’s wave motifs, writes fan fiction tributes
    to Ursula K. Le Guin, and curates a photography collection echoing Ansel Adams’s coastal black‑and‑white vistas.
  travel: Heather Bass prefers spontaneous, low‑budget coastal getaways, having explored Monterey Bay, Catalina Island, and dreaming of snorkeling the Great Barrier Reef and hiking Iceland’s volcanic trails,
    often planning trips around school breaks and their beach‑cleanup schedules.
  culinary: Heather Bass enjoys crafting poke bowls with fresh ahi tuna, mango, and seaweed, cooking simple garlic‑butter salmon, and savoring fish tacos with cilantro‑lime slaw, while their kitchen skills
    hover at enthusiastic beginner level, occasionally burning toast in their rush to start a new coding project.
  core: Heather Bass is a solitary, curiosity‑driven teen who blends marine art, code, and video‑game strategy, juggling a tidy budget with occasional procrastination and a penchant for beachside daydreams.
background:
  cultural: Heather grew up in a middle‑class suburban family in Jacksonville, Florida, where Southern hospitality and a strong sense of community shape daily life. Her family traditions include Sunday
    church attendance, weekend barbecues with extended relatives, and seasonal trips to the nearby Atlantic coast for fishing and beach outings. Jacksonville’s blend of Southern culture with a coastal,
    multicultural environment has exposed her to a diversity of perspectives, especially through school programs focused on marine conservation and community service. This background has fostered a respect
    for family, a pragmatic work ethic, and an appreciation for Florida’s natural ecosystems.
