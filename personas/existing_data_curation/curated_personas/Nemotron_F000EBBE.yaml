  hobbies: '[''reading (science fiction, nature non‑fiction)'', ''sketching and drawing marine life'', ''photography (coastal scenes)'', ''digital art and graphic design'', ''creative writing (short stories,
    fan fiction)'', ''basic Python coding'', ''beachcombing and nature walks'', ''multiplayer strategy video games with a small group of friends'', ''volunteering for beach clean‑up events'']'
  career_goals: Heather aspires to blend her curiosity about the natural world with a practical, solution‑focused mindset by pursuing a career in marine environmental science. She hopes to earn a scholarship
    to study environmental biology in college, then work with local Florida organizations on coastal habitat restoration and public education. In the short term, she aims to join a summer marine conservation
    program, secure an internship with the Jacksonville Zoo’s marine department, and develop a portfolio of independent research projects and digital outreach content. She also keeps open the possibility
    of a related career in data analysis for environmental NGOs, which would provide the flexibility she values.
