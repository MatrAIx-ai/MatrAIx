personas:
  professional: Marjorie Barnes, a one-year-old, delights in aligning colorful building blocks in perfect rows and experimenting with cause-and-effect toys, hinting at an early penchant for systematic problem-solving
    that may one day steer them toward engineering or design.
  sports: Marjorie Barnes, a one-year-old, loves the rhythmic bounce of toddler gym classes, races enthusiastically with fellow infants on soft mats, and cheers along with parents when the local baseball
    team takes the field on weekend outings.
  arts: Marjorie Barnes, a one-year-old, shows a budding appreciation for visual art by reaching for the bright print of Monet's Water Lilies on the wall and engages in finger-painting sessions that splatter
    vivid reds and blues, while they smile at the gentle melodies of Mozart and playful tunes from Sesame Street.
  travel: Marjorie Barnes, a one-year-old, has already experienced family trips to the sandy shores of Florida and the rolling hills of a grandparents' farm in Iowa, savoring the feel of warm sand between
    tiny toes and looking forward to a future seaside vacation that balances curiosity with a comfortable stroller.
  culinary: Marjorie Barnes, a one-year-old, prefers smooth mashed sweet potatoes and buttery peas, delights in the warm scent of cinnamon drifting from oatmeal, yet can be stubbornly picky, often refusing
    unfamiliar textures while secretly savoring a stray nibble of soft cheese.
  core: Marjorie Barnes, a one-year-old, blends restless curiosity, meticulous toy arrangement, and contagious sociability into a tiny whirlwind of exploration, though they occasionally lose focus during
    mealtime and demand a second serving of favorite puree.
background:
  cultural: Marjorie is raised in a white, Southern Appalachian family in Owensboro, Kentucky. Her upbringing reflects traditional Southern values, with frequent exposure to country and bluegrass music,
    community church gatherings, and local crafts such as quilting and woodworking. The close‑knit community atmosphere and regional festivals contribute to her appreciation of art, music, and collective
    experiences.
