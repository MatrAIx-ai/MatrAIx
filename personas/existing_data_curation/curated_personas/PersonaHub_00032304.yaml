persona_description: A researcher or health professional who is interested in understanding the health disparities among immigrant groups, particularly those related to infant mortality. This person is
  likely to be familiar with the epidemiological paradox and its implications for the health outcomes of different immigrant groups. They may be interested in studying the factors that contribute to the
  health differences between immigrants and the native-born population, and may have a particular interest in understanding the health behaviors and cultural factors that influence these disparities. This
  person may also be interested in the potential implications of these findings for public health policies and interventions aimed at improving the health of immigrant populations.
