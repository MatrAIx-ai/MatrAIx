persona_description: A researcher in the field of neurology and neuroscience, particularly interested in the study of cognitive functioning in severely brain-injured patients. They are interested in the
  use of fMRI to probe for higher-level cognitive functioning and are looking for ways to improve the accuracy of bedside exams in assessing severe brain injuries. They are also interested in exploring
  the range of brain function in patients with severe injuries and are cautious about the limitations of fMRI in making clear measurements of cognitive performance.
