persona_description: A molecular geneticist and developmental biologist who specializes in studying the development and evolution of simple organisms, with a focus on the nematode C. elegans. He is particularly
  interested in understanding how simple changes in gene expression can result in stunningly different bodies, such as the differences in the number of legs and eyes between spiders and flies. His research
  involves cloning and comparing spider and fly genes that determine where and when eyes and legs are made. He teaches genetics, principles of biology, biochemistry, embryology, and development, and his
  expertise lies in molecular genetics and developmental biology of the nematode C. elegans. He is a senior associate dean and associate professor at the University of the Pacific, with an office at Biology
  Room 254.
