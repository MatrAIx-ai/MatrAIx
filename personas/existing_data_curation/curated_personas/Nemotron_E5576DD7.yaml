  career_goals: Inspired by her vivid imagination, Amelia frequently talks about becoming a “big-time artist” who paints bright pictures for everyone. She also dreams of being an astronaut, building rockets
    out of blocks and flying to the stars. Occasionally she says she wants to be a story-teller who reads magical books to friends, merging her love of art, novelty, and abstract ideas into future ambitions.
