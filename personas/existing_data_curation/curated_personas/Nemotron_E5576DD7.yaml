personas:
  professional: Amelia Williams is a budding storyteller and miniature architect who uses building blocks to craft intricate narratives and spatial designs, and they already show the curiosity, organization,
    and assertiveness that will one day guide a career in creative education or design.
  sports: Amelia Williams loves toddling around in a Little Stars soccer club class on Saturdays, cheers enthusiastically for the nearby professional baseball team the Springfield Sluggers when they watch
    games on TV, and they dream of one day trying a mini-ski lesson at a local indoor ski dome.
  arts: Amelia Williams delights in finger-painting to the catchy beats of 'Baby Shark' by Pinkfong, reveres the whimsical illustrations of Eric Carle's The Very Hungry Caterpillar, and they often pretend
    to perform graceful ballets inspired by Misty Copeland while narrating their own colorful stories.
  travel: Amelia Williams enjoys family road trips to the nearby Children's Museum, remembers the pine-scented wonder of a summer stay at the Great Smoky Mountains, eagerly anticipates a future visit to
    the Magic Kingdom in Orlando, and they daydream about seeing the cherry blossoms in Kyoto while their parents handle every itinerary detail.
  culinary: Amelia Williams favors simple finger foods like grilled cheese sandwiches made with sharp cheddar, chicken nuggets, and strawberry-banana smoothies, can independently spread peanut butter on
    toast using a tiny plastic knife, yet they throw occasional tantrums when presented with broccoli or peas.
  core: Amelia Williams is a wildly imaginative three-year-old who builds entire universes from LEGO bricks, hoards crayons, and bursts into tears at the sight of a stray dog, yet they stubbornly refuse
    to share their beloved stuffed rabbit.
background:
  cultural: Amelia is raised in a white, middle-class family in Crystal Spring, Pennsylvania, a close-knit rural community in Fulton County. Her family celebrates traditional American holidays such as Christmas,
    Thanksgiving, and Easter, often incorporating church activities and community gatherings like the county fair. Local influences include Appalachian folk music, outdoor play in the adjacent woods, and
    a strong emphasis on family togetherness and early childhood education through a nearby preschool. These cultural elements blend with her parents’ encouragement of artistic expression, shaping her imaginative
    outlook and emotional sensitivity.
