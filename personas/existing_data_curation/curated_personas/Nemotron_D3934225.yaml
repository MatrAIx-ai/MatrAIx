personas:
  professional: Genevieve Perez, a seasoned veterinary technologist with three decades of hands‑on experience and a STEM graduate background, blends meticulous diagnostic expertise, team‑leadership flair,
    and a curiosity‑driven appetite for emerging veterinary technologies while navigating a relaxed, sometimes disorganized approach to clinic administration as they pursue senior leadership.
  sports: Genevieve Perez fuels their energetic lifestyle by hiking the cliffs of Torrey Pines in spring, surfing the waves at La Jolla with the La Jolla Surfers Club in summer, kayaking the San Diego Bay
    in fall, and joining Zumba classes at the community center while cheering on the San Diego Padres and the San Diego Wave FC.
  arts: Genevieve Perez nurtures their love of narrative and melody through voracious reading of Isaac Asimov and N.K. Jemisin, attending marine‑biology lectures at the Scripps Institution, catching performances
    by the San Diego Symphony and Los Lobos, and dancing to the rhythms of Andrea Bocelli and classic salsa at community cultural nights.
  travel: Genevieve Perez prefers spontaneous, flexible trips that blend hiking in national parks like Zion and Yellowstone with coastal drives along the Pacific Coast Highway, and they dream of a future
    adventure to Patagonia’s Torres del Paine while balancing occasional family obligations.
  culinary: Genevieve Perez delights in preparing Mediterranean feasts such as grilled branzino with rosemary and lemon, tabbouleh with fresh mint, and saffron‑infused risotto, drawing fragrant herbs and
    succulents from their coastal garden and pairing each meal with a crisp olive oil and a glass of local rosé.
  core: Genevieve Perez blends a love for animals, the outdoors, and Mediterranean flavors with a laid‑back, occasionally disorganized approach that makes them a charismatic, adaptable leader who never
    says no to a new adventure.
background:
  cultural: Genevieve grew up in a Southern‑California family of Italian descent, where Sunday family meals and a strong appreciation for fresh, seasonal foods were central. Living near the U.S.–Mexico
    border, she has absorbed the region’s multicultural vibe, often joining bilingual community events and supporting local Hispanic festivals. Her upbringing emphasized outdoor recreation, environmental
    stewardship, and community involvement—values reflected in her love of the coast, her participation in local volunteer initiatives, and her commitment to sustainable practices within the clinic. While
    she identifies with mainstream American culture, her cultural experience blends Mediterranean family traditions, Southern‑Californian beach‑life sensibilities, and an inclusive, diverse community mindset.
