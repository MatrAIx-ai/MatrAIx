  hobbies: '[''Hiking Torrey Pines State Natural Reserve'', ''Surfing at La Jolla'', ''Kayaking in San Diego Bay'', ''Participating in Zumba classes'', ''Community gardening'', ''Cooking Mediterranean cuisine'',
    ''Reading science‑fiction novels'', ''Volunteering at local animal shelters'', ''Attending marine biology talks'', ''Traveling to national parks'']'
  career_goals: Genevieve aims to transition into a senior leadership role within her clinic, such as lead technologist or practice manager, where she can leverage her operational expertise to improve patient
    outcomes and staff satisfaction. She is pursuing certification in veterinary practice management to broaden her strategic planning skills while maintaining the flexibility that matches her relaxed approach
    to obligations. Additionally, she envisions launching a community‑focused pet wellness program that offers preventive care workshops and tele‑health consultations, allowing her to combine her love of
    education, technology, and social interaction. Mentoring the next generation of veterinary technicians remains a core ambition, as she hopes to foster a collaborative and compassionate workplace culture.
