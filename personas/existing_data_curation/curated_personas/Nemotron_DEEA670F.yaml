personas:
  professional: Calvin Santiago, a 20‑year‑old aspiring HVAC apprentice, applies their practical mindset to routine tasks and, when challenges arise, they methodically troubleshoot systems using hands‑on
    automotive, woodworking, and home‑repair skills.
  sports: Calvin Santiago enjoys weekend fishing with the Kankakee River Fishing Club, plays in the local Wilmington Softball Club, and they routinely cheer for the Chicago Bears, Chicago Bulls, and the
    Wilmington Wildcats high‑school football team, using these activities as a relaxed way to stay fit.
  arts: Calvin Santiago finds creative relaxation in building wooden furniture while listening to Bruce Springsteen and The Avett Brothers, and they unwind with cooperative video games like Overcooked and
    Among Us alongside friends, occasionally attending community theater productions.
  travel: Calvin Santiago favors low‑key road trips in their 1992 Ford pickup, having explored Chicago, St. Louis, and Nashville, and they dream of camping near Yellowstone National Park while balancing
    a modest travel budget and weekend work commitments.
  culinary: Calvin Santiago, an intermediate home‑cook, loves grilling chicken with a rosemary‑garlic rub and tossing fresh garden tomatoes, basil, and corn into a hearty vegetable soup, and they often
    cap meals with a side of buttery cornbread.
  core: Calvin Santiago is a routine‑driven, hands‑on problem‑solver who shuns rigid schedules, procrastinates paperwork, yet they find joy in the steady progress of building, fixing, and fishing.
background:
  cultural: 'Calvin grew up in Wilmington, a small Midwestern town in Will County, Illinois, within a predominantly white, Anglo‑American community. His family has lived in the area for several generations,
    and he was raised with the values typical of the region: a strong work ethic, modesty, community involvement, and an appreciation for practical skills. He attended Wilmington High School, participated
    in the school’s Future Farmers of America (FFA) club, and regularly attends a locally‑based Protestant church, where community service and family traditions are emphasized.'
attributes:
  skills: '[''Basic automotive maintenance'', ''Woodworking'', ''Gardening and lawn care'', ''Home repair (plumbing, electrical)'', ''Basic computer troubleshooting'', ''Customer service'', ''Team collaboration'',
