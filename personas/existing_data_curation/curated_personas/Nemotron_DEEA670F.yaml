  hobbies: '[''Woodworking'', ''Vegetable gardening'', ''Fishing'', ''Classic car restoration'', ''Co‑op video gaming'', ''Attending local high school sports events'']'
  career_goals: Calvin wants to channel his practical strengths into a stable, skilled trade. His immediate goal is to enroll in a community‑college apprenticeship program for HVAC or electrical work, earn
    the necessary certifications, and secure a journeyman position with a local utility or service contractor. Over the next five to ten years he hopes to become a licensed tradesperson and eventually launch
    his own small handyman business that allows him to set his own schedule while serving the Wilmington community.
