persona_description: A conservationist and filmmaker who has dedicated his life to studying, exploring, and documenting animal life in the oceans and across the globe. His most celebrated contribution to
  the research community is the invention of the National Geographic Crittercam, a small, lightweight, streamlined camera that has the remarkable ability to travel unobtrusively with its animal hosts where
  no camera has been before, capturing never before seen footage of the private lives of wild animals. He has since dedicated his life to researching the behavior of marine and terrestrial species across
  the globe, heading up over a hundred field expeditions worldwide and collaborating in cutting-edge behavioral studies of over 70 species, from lions to emperor penguins to humpback whales.
