persona_description: A researcher and scientist who specializes in the study of nutrition and its effects on human health. Dr. Abha Chauhan is an Indian-origin researcher who has conducted a study on the
  benefits of eating walnuts for cognitive function and mental skills. The study was led by Dr. Chauhan and his colleagues at New York State Institute, and the findings suggest that regular consumption
  of walnuts can help reduce the risk of developing dementia. The study was based on an analysis of an experiment on laboratory rodents, and the researchers discovered that feeding the nuts to mice with
  Alzheimer's disease kept their mental skills up. The results represent a breakthrough in the study of how the brain decays.
