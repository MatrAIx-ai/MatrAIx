personas:
  professional: Jocelyne Thomas, a 65‑year‑old retired community support specialist, now volunteers as a senior‑center liaison and after‑school mentor, and they use their lifelong budgeting and event‑planning
    expertise to organize small, harmonious gatherings while staying curious about digital tools that help preserve elders’ oral histories.
  sports: Jocelyne Thomas enjoys leisurely strolls through Fairmount Park, participates in a senior‑center pickle‑ball league, and faithfully follows the Philadelphia Eagles and Phillies, and they approach
    fitness with steady, low‑impact activity that complements their reserved yet community‑oriented lifestyle.
  arts: Jocelyne Thomas finds creative solace in knitting and quilting while listening to the timeless sounds of John Coltrane, Ella Fitzgerald, and Mahalia Jackson, and they attend local jazz showcases
    and documentary screenings that deepen their appreciation for soulful storytelling.
  travel: Jocelyne Thomas prefers carefully planned, budget‑friendly trips to historic sites like Valley Forge and New Orleans’ French Quarter, and they often travel with a small group of church friends
    to indulge in jazz festivals and culinary tours while staying within a modest travel allowance.
  culinary: Jocelyne Thomas delights in preparing collard greens, cornbread, and sweet‑potato pie alongside seasonal dishes featuring basil and thyme from their balcony garden, and they sometimes over‑salt
    the greens in enthusiasm, skillfully blending traditional soul‑food techniques with fresh, locally sourced ingredients.
  core: Jocelyne Thomas, a 65‑year‑old retired caretaker, weaves curiosity, community spirit, and soulful cooking into a quiet, organized life punctuated by gentle walks and handcrafted histories, and they
    remain a steady presence in their neighborhood.
background:
  cultural: Jocelyne’s cultural identity is rooted in the African‑American community of Philadelphia. Raised in the 1960s and ’70s, she witnessed the city’s civil‑rights activism and the vital role of the
    Black church in fostering solidarity. Family traditions—such as Sunday gatherings, shared meals of collard greens, cornbread, and sweet potato pie—have shaped her values of cooperation and mutual care.
    She maintains strong ties to her neighborhood, cherishes the storytelling inherited from her grandparents, and draws inspiration from the city’s rich musical heritage, including jazz, soul, and gospel.
