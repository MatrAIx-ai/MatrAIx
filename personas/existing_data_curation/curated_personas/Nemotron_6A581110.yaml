  career_goals: Although retired from formal employment, Jocelyne aims to deepen her involvement in community service. She hopes to volunteer regularly at the local senior center, mentor youth through the
    neighborhood's after‑school program, and serve as a liaison between seniors and municipal services to ensure their needs are heard. She also plans to enroll in a community college course on digital
    literacy and to document oral histories of Philadelphia's African American elders, preserving their stories for future generations.
