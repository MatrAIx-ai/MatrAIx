persona_description: A healthcare professional who supports and empowers women to breastfeed, particularly in the UK. This person is a local GP who believes that breastfeeding has numerous health benefits
  for both the baby and the mother. They are knowledgeable about the health benefits of breastfeeding, including reducing the risk of infections, diseases, and obesity, and the long-term benefits of breastfeeding,
  such as lowering the risk of breast and ovarian cancer. This person is also aware of the financial benefits of breastfeeding, as well as the need for support and advice for women who may have concerns
  about breastfeeding. They are also aware of the importance of breastfeeding in the fight against poverty and improving infant health, and they are committed to promoting breastfeeding as part of their
  role as a healthcare professional.
