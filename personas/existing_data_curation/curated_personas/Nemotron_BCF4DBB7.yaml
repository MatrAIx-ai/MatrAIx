    parks and nature trails'']'
  career_goals: In the short term, Michael plans to enroll in a community college program in graphic design or visual arts to build a professional portfolio and secure an internship at a local design studio.
    He hopes to develop a series of concept art pieces that blend his interest in speculative storytelling with Black cultural motifs. Over the next five years, he aims to earn a BFA, transition into a
    full‑time role as a concept artist, UI/UX designer, or multimedia creator for video‑game or film studios. Long‑term, he envisions launching his own creative brand, publishing a graphic novel that celebrates
    Black heritage, and mentoring younger Black artists in his community to foster representation in the arts.
