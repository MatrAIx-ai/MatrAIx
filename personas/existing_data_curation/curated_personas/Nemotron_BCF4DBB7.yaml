personas:
  professional: Michael Hayden, a 19‑year‑old aspiring concept artist and UI/UX designer, leverages proficiency in Photoshop, Illustrator, Procreate, and front‑end web development to transform surreal,
    speculative narratives into interactive visual experiences, while methodical project‑planning habits and a cooperative yet assertive communication style keep freelance commissions and community workshops
    on schedule.
  sports: Michael Hayden stays active by playing pick‑up basketball at the local community center, cheering for the Atlanta Hawks and Falcons, participating in a weekend running club that meets at Lithia
    Springs Park for 5K training, following Atlanta United soccer matches on TV, and incorporating yoga sessions to balance nervous energy.
  arts: Michael Hayden channels a love for surreal sketching, digital illustration, and speculative storytelling into a personal Instagram feed that references the visual era of Kanye West, the neo‑soul
    vibes of Kamasi Washington, the narrative depth of graphic novelist Jillian Tamaki, and the community spirit of the Fulton County Art Fair, while also delivering spoken‑word poetry at open‑mic nights
    inspired by Maya Angelou’s cadence.
  travel: Michael Hayden prefers self‑planned road trips that blend discovery and cultural immersion, having visited Savannah’s historic squares, New Orleans’ music scene, and a spontaneous weekend in Asheville’s
    art galleries, while dreaming of a future backpacking adventure through Kyoto’s temples and Reykjavik’s aurora‑lit landscapes, all budgeted through a shared travel fund with fellow art students.
  culinary: Michael Hayden’s palate mixes comfort Southern fare with global flavors, often cooking collard greens with smoked turkey, savoring perfectly crisp fried catfish, experimenting with Korean kimchi
    fried rice, indulging in late‑night sushi rolls topped with avocado and pickled ginger, and proudly claiming a dash of hot sauce from the local market as their secret ingredient.
  core: Michael Hayden is a 19‑year‑old visual storyteller who balances meticulous planning, lingering anxiety, midnight anime marathons, and a habit of doodling on napkins during lectures, and they often
    turn those scribbles into fresh concept sketches.
background:
  cultural: Michael grew up in a close‑knit African‑American community in Lithia Springs, Georgia. His family’s traditions blend Southern hospitality with deep roots in Black cultural expression—from gospel
    music in church to storytelling at family gatherings. He is aware of the history of the civil rights movement in Atlanta and feels a responsibility to represent his heritage in his creative work. The
    local 'Atlanta sound' of hip‑hop and neo‑soul, as well as community events like the Fulton County Art Fair, have shaped his aesthetic sensibilities. He values the resilience and creativity that characterize
    Black Southern culture, and he often incorporates motifs of empowerment, history, and contemporary Black life into his artwork.
