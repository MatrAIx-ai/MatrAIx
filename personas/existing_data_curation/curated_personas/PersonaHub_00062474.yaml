persona_description: A native of Taiwan who is deeply interested in the history and culture of his homeland, particularly in the field of water resources management and the Japanese occupation era. He is
  also passionate about religious movements and the political movements of the Taiwanese people against Japanese rule. He is particularly interested in the events leading up to the Ta-pa-ni Incident and
  the subsequent suppression of religious beliefs in Taiwan. He is also interested in the life of Yang Kui, a native of Sinhua, Tainan City who dedicated his life to working with his hands for grassroots
  literature and "running with his two feet working for the social movement."
