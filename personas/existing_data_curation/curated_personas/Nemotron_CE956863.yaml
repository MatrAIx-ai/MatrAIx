  hobbies: '[''Visiting art galleries and museums'', ''Photography'', ''Playing board games with friends'', ''Listening to live music'', ''Cooking diverse cuisines'', ''Attending community theater productions'',
    ''Reading about art history and contemporary culture'', ''Exploring local street art'', ''Participating in community volunteer events'']'
  career_goals: Assadollah aims to move into a supervisory role within the next two years, seeking a shift manager position that would let him mentor younger employees and shape store culture. He plans
    to enroll in an online retail management course to strengthen his leadership and scheduling skills. Long-term, he hopes to blend his passion for art with his career by taking on a part-time role at
    a local gallery or community arts center, perhaps coordinating exhibitions or workshops. Ultimately, he envisions opening a small coffee shop that doubles as a neighborhood art showcase, providing a
    flexible, community-focused space where he can combine his retail experience with his love for the arts.
