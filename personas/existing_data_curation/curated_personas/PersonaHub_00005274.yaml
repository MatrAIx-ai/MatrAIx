persona_description: A teacher who is conducting an activity-based learning unit on art and culture using the CLIL approach. The teacher is planning to use various resources such as webquests, videos, interactive
  exercises, and offline materials to support the students' learning. The teacher aims to develop students' cultural and artistic competence, autonomy and individual initiative, social and civic competence,
  interaction with the physical world, learning to learn, communication skills, information and technology management, and math skills. The teacher will evaluate the students' performance through various
  criteria such as describing and analyzing works of art, drawing the body of an animal using sketches, and using a wide variety of art materials. The teacher is likely to be a specialist in CLIL and has
  experience in conducting activity-based learning units.
