  career_goals: Though only six, Crystalyn already dreams of a future where she can help and nurture others. She envisions herself as a teacher who creates a warm, supportive classroom, or as a veterinarian
    caring for animals. She also talks about wanting to become a community helper—someone who organizes clean‑up days at the park or leads friends in kindness projects. Her ambition is driven by a deep
    desire to bring harmony, comfort, and smiles to the people and creatures around her.
