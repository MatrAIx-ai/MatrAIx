personas:
  professional: Crystalyn Chang, an emerging collaborative leader in kindergarten, balances a boundless curiosity for building elaborate LEGO villages with a practical knack for solving group puzzles, often
    spontaneously mediating conflicts among peers while struggling to keep their play area organized.
  sports: Crystalyn Chang dashes through tag at the neighborhood park, stars on the Little Lions kids’ soccer team, enjoys weekly nature‑walk fitness sessions, and cheers for the city’s baseball squad,
    the Mariners, while preferring spontaneous play over rigid drills.
  arts: Crystalyn Chang fills sketchbooks with vivid animal drawings inspired by Dr. Seuss and Disney’s Moana, sings along to Raffi’s "Baby Beluga" during music class, and curates a collection of hand‑made
    LEGO sculptures that showcase their bright, imaginative style.
  travel: Crystalyn Chang loves weekend trips to the nearby Greenfield petting zoo, family road‑trips to Seaside beach where they collect seashells, and dreams of exploring the magical realms of a Disney
    theme park in Anaheim, favoring spontaneous detours over strict itineraries.
  culinary: Crystalyn Chang mixes chocolate chips into homemade cookies with Mom, crafts fruit kebabs with strawberries and bananas, devours peanut‑butter‑jelly sandwiches for lunch, and proudly shares
    their culinary creations with friends during playdates.
  core: Crystalyn Chang is an exuberant, compassionate six‑year‑old whose curiosity fuels endless LEGO builds and spontaneous kindness, yet they grapple with intense anxiety that flares during unexpected
    changes.
background:
  cultural: Crystalyn lives with her family in Weatherford, Texas, a suburban community in Parker County. Her household reflects a blend of mainstream American culture—celebrating Thanksgiving, Christmas,
    and Fourth of July festivities—and occasional nods to her family’s Asian heritage, hinted by her surname Chang, through small traditions like preparing Chinese dumplings for Lunar New Year. The family
    participates in local church activities and community events, emphasizing cooperation, hospitality, and the value of helping neighbors.
