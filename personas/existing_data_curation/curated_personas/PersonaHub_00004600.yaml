  those living in food-insecure households. They are committed to working with a diverse range of stakeholders, including government agencies, non-profits, and private sector companies, to address the root
  causes of food insecurity and promote sustainable food systems. This individual is knowledgeable about the latest research and best practices in nutrition and food production, and is actively engaged
  in advocating for policy changes that support the health and well-being of all people.
