  hobbies: '[''Beach walking'', ''Bird‑watching'', ''Native‑plant gardening'', ''Reading historical fiction'', ''Reading popular science'', ''Reflective journaling'', ''Knitting'', ''Coastal photography'',
    ''Model rocket building'', ''Attending small community art events'']'
  career_goals: Toni aims to become the district’s STEM curriculum coordinator, leading the integration of environmental science into elementary curricula across Monterey County schools. She plans to build
    partnerships with the Monterey Bay Aquarium and local marine research institutes to provide field‑based learning experiences. Over the next five years, she hopes to author a series of classroom resources
    on coastal ecology, mentor new teachers, and champion inclusive, low‑stimulus learning spaces for neurodiverse students. Ultimately, she seeks to leave a lasting impact on science literacy in her community
    while maintaining a balanced, low‑stress work life.
