personas:
  professional: An experienced elementary and middle school STEM educator, Toni Bingham leverages their love for structure and spontaneous inquiry to design low‑stimulus, hands‑on coastal science lessons,
    while their cooperative nature fuels mentorship of fellow teachers despite occasional struggles with meeting curriculum deadlines.
  sports: A steady‑pacing fitness enthusiast, Toni Bingham enjoys early‑morning beach walks with the Monterey Bay Trail Running Club, follows the San Francisco Giants in baseball and the San Jose Earthquakes
    in soccer, and participates in a low‑impact senior yoga class at the local community center, favoring gentle movement over high‑intensity competition.
  arts: A reflective creative soul, Toni Bingham captures misty shoreline scenes inspired by Ansel Adams, enjoys listening to James Taylor and Mary Oliver poetry readings at intimate Monterey art gatherings,
    and knits while humming folk ballads, often citing local painter Laura Phelps as a favorite source of visual inspiration.
  travel: A low‑key wanderer, Toni Bingham prefers carefully planned, off‑season trips to coastal gems such as Big Sur, the Channel Islands, and Maine’s Acadia, while dreaming of a spring pilgrimage to
    the Galápagos Islands to study marine life up close, always packing a notebook for reflective journaling.
  culinary: A modest home cook, Toni Bingham delights in preparing simple, sea‑inspired dishes like cioppino with fresh Dungeness crab, kelp and herb‑infused quinoa salads, and hand‑kneaded sourdough loaves,
    favoring fresh rosemary, lemon zest, and locally sourced produce while savoring quiet meals at the kitchen table.
  core: Toni Bingham is a quietly driven STEM veteran who balances meticulous lesson planning with spontaneous curiosity, prefers solitary coastal walks over crowds, and occasionally procrastinates on paperwork,
    all while nurturing a garden of native plants.
background:
  cultural: Toni grew up in a middle‑class white family in the San Francisco Bay Area during the 1960s and 1970s, absorbing the era’s progressive educational values. After earning a bachelor's degree in
    a STEM discipline, she settled in Seaside, a coastal community in Monterey County, where she embraces the region’s strong connection to the ocean, environmental stewardship, and laid‑back Californian
    lifestyle. Her cultural identity merges traditional American values of self‑reliance and community service with a deep appreciation for the local marine heritage. She participates in her church’s volunteer
    programs and local environmental organizations, reinforcing a sense of collective responsibility and harmony.
attributes:
  skills: '[''STEM curriculum development'', ''Hands‑on science experiment design'', ''Differentiated instruction'', ''Classroom technology integration'', ''Data‑driven assessment'', ''Project‑based learning
