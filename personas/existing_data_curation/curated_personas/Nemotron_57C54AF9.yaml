personas:
  professional: Kelly Santo, a veteran aircraft mechanic with decades of hands‑on experience, blends meticulous inspection skills and deep knowledge of hydraulic, pneumatic, and electrical jet systems with
    a natural aptitude for teaching, and they are poised to lead safety initiatives and create training curricula for the next generation of diverse technicians.
  sports: Kelly Santo fuels their fitness routine with daily walks along Griffith Park’s shaded trails, occasional participation in a senior walking club, and cheering for the Los Angeles Dodgers, Lakers
    and Rams while favoring low‑impact activities that protect their arthritic knees.
  arts: Kelly Santo expresses their creativity through painting scale model airplanes, knitting practical scarves for community outreach, and immersing themselves in aviation‑themed art, from listening
    to John Williams’ iconic scores and Joni Mitchell’s folk melodies to revisiting classic films like ‘The Aviator’ and reading works by aviation historians such as William Miller.
  travel: Kelly Santo prefers meticulously planned short‑haul trips that combine their love of aviation history with gentle leisure, such as weekend getaways to the Museum of Flight in Seattle, a day cruise
    to Catalina Island’s historic airport, and annual visits to the Deutsches Museum in Munich, always traveling with a small, like‑minded group to keep outings low‑stress and budget‑friendly.
  culinary: Kelly Santo enjoys cooking simple, herb‑forward meals like ratatouille, grilled salmon with rosemary, and basil pesto pasta using fresh produce from their urban garden, has a solid home‑cooking
    skill set that favors Mediterranean flavors, and treats themselves to a slice of tiramisu on special community events.
  core: Kelly Santo is a methodical aircraft mechanic turned mentor who balances a lifelong curiosity for emerging aerospace tech with a disciplined, spreadsheet‑obsessed approach to life, and they occasionally
    over‑plan to the point of analysis paralysis.
background:
  cultural: Kelly is a third‑generation Italian‑American raised in post‑war Los Angeles. Her family emphasized hard work, respect for tradition, and community service, values rooted in a modest Catholic
    upbringing. Growing up near the expanding aerospace industry, she was inspired by the era's spirit of innovation while retaining a practical, down‑to‑earth outlook. The multicultural tapestry of Los
    Angeles exposed her to diverse perspectives, fostering an appreciation for both her heritage and the broader American melting pot. These influences shape her balanced blend of curiosity, practicality,
    and organized reliability.
