  career_goals: Approaching retirement, Kelly aims to transition from daily hands‑on work to a mentorship and safety‑lead role within her shop, where she can codify her extensive knowledge into training
    curricula for younger mechanics, especially women and underrepresented groups. She plans to lead a small internal safety committee to enhance procedural rigor and reduce workplace incidents. Additionally,
    she hopes to contribute articles to aviation trade publications, documenting best practices for legacy aircraft upkeep, and to volunteer as a technical advisor for a local aviation museum, preserving
    the history of aircraft maintenance for future generations.
