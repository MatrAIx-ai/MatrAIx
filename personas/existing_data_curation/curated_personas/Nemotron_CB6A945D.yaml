    music", "Attending art fairs and community theater", "Knitting scarves and hats", "Quilting blankets for friends and family", "Genealogy research", "Volunteering at senior‑center craft workshops"]'
  career_goals: Though retired, Veronica is eager to keep learning and contributing. She aims to complete a beginner’s watercolor course, develop a community‑garden plot at the local park, compile and publish
    a family recipe and storybook for her grandchildren, teach quilting basics at the senior center once a month, and digitize her family’s genealogical records to share online. These goals reflect her
    curiosity, love of art, and desire to leave a lasting, supportive legacy for her community and family.
