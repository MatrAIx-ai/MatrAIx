  hobbies: '[''LEGO Technic building'', ''Robotics club (block‑based programming)'', ''Reading science‑fiction and engineering non‑fiction'', ''Chess'', ''Pickup basketball'', ''Puzzle‑oriented video games'',
    ''Exploring local nature trails (e.g., Frick Park)'']'
  career_goals: Heath aspires to channel his curiosity and practical mindset into a future career in engineering. He dreams of becoming an aerospace or civil engineer, envisioning himself designing aircraft,
    bridges, or the iconic steel structures that define Pittsburgh’s skyline. He is motivated to earn top grades, win school science‑fair awards, and eventually secure a scholarship for a STEM‑focused high
    school program. In the long term, he hopes to work on sustainable infrastructure projects that combine his love of problem‑solving with a desire to make a tangible impact on his community.
