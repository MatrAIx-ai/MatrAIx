  career_goals: Sangeeta aims to pursue a college degree that blends her curiosity for science with her desire to help others, targeting a major in health sciences or psychology. She aspires to become a
    registered nurse or a mental health counselor, roles that offer practical stability while allowing her to provide compassionate care. She also envisions involvement in community health outreach programs
    that address youth stress and wellness, leveraging her organizational strengths to lead health education workshops in her local area. Long‑term, she hopes to obtain advanced certification in pediatric
    nursing or counseling, integrating her love for mentorship and her commitment to fostering harmonious environments.
