personas:
  professional: An aspiring health‑science student and school leader, Sangeeta Kamran channels their organized, methodical nature and bilingual communication skills into coordinating varsity volleyball,
    leading the dance team with Bollywood and contemporary routines, and producing TikTok study‑tip videos that blend academic rigor with cultural storytelling.
  sports: A volleyball enthusiast, Sangeeta Kamran plays varsity for Papillion High, follows the Nebraska Cornhuskers women's volleyball team, participates in a local youth beach‑volleyball club on weekends,
    and balances their energetic fitness routine with seasonal runs and cheering for the Omaha Mavericks basketball squad.
  arts: An expressive dancer, Sangeeta Kamran blends Bollywood choreography with contemporary moves, draws creative inspiration from Shakira, Priyanka Chopra, Beyoncé, and the Alvin Ailey American Dance
    Theater, and rehearses to music by A.R. Rahman and Taylor Swift, channeling their sociable energy into performance.
  travel: A curious explorer, Sangeeta Kamran has visited the Grand Canyon and New York City with their family, dreams of backpacking through the Swiss Alps and attending a cultural festival in Japan, meticulously
    plans trips using a spreadsheet to budget each expense, and balances their desire for adventure with the financial limits of a high‑school student.
  culinary: A budding culinary fusionist, Sangeeta Kamran perfects classic chicken tikka masala and aloo gobi, experiments with samosa‑filled mac and cheese bites, relishes the aroma of cumin, turmeric,
    and fresh cilantro, and often showcases these dishes at community potlucks, though they sometimes over‑spice in their enthusiasm.
  core: Sangeeta Kamran is a meticulous, socially‑charged teen who juggles varsity sports, dance, and cultural cooking, constantly worries about future responsibilities, yet channels their anxiety into
    organized community projects and creative expression.
background:
  cultural: Sangeeta is a second‑generation South Asian American, with her family originating from the Indian subcontinent. Growing up in Papillion, NE, she balances traditional South Asian customs—celebrating
    Diwali, Holi, and family gatherings with Indian cuisine and language—while embracing Midwestern American life, such as participating in school sports and community service. Her household places a high
    value on education and caring for the extended family, which informs her respectful attitude toward elders and her cooperative nature. At the same time, she enjoys the diversity of her community, often
    acting as a cultural bridge by sharing her heritage through food, dance, and bilingual communication with friends and neighbors.
