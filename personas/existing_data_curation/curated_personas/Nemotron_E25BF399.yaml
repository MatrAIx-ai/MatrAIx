personas:
  professional: Ernesto Luback, a retired mechanical engineer who specialized in HVAC system design and reliability engineering, applies their meticulous project planning, rigorous MATLAB and Python data
    analysis, and exacting documentation to mentor high‑school STEM students and steer nonprofit boards with a competitive, data‑driven precision.
  sports: Ernesto Luback stays active with daily morning walks through their garden and weekly low‑impact yoga, follows the Dallas Cowboys, the Texas Rangers, and the Dallas Mavericks on TV, and maintains
    a modest membership at the Fort Worth Tennis Club where they occasionally play doubles on senior match days, reflecting a structured yet low‑intensity approach to fitness.
  arts: Ernesto Luback, who spends evenings listening to Beethoven’s Ninth Symphony and Bach’s cello suites while admiring a Kimbell Art Museum exhibition featuring Georgia O'Keeffe and Ansel Adams, incorporates
    that artistic discipline into their precise woodworking projects and reads biographies of engineers as a form of intellectual art, reflecting a reserved yet deeply analytical appreciation for the arts.
  travel: Ernesto Luback plans each trip like a project, using detailed itineraries to explore destinations such as Sedona’s red rocks, the historic streets of Carmel‑by‑the‑Sea, and a guided Grand Canyon
    tour with their spouse, and they dream of a meticulously scheduled cultural immersion in Lake Como, Italy, while avoiding spur‑of‑the‑moment travel.
  culinary: Ernesto Luback, an exacting home chef, prepares heirloom family dishes like slow‑cooked pork mole, chicken pozole, and hand‑rolled tamales using ancestral corn varieties, dried chilies, and
    fresh herbs, measuring each spice to the gram, and shares modest portions with their spouse and a few close friends, reflecting a disciplined yet heartfelt culinary practice.
  core: Ernesto Luback, an 82‑year‑old retired engineer, blends a lifelong love of precision with solitary hobbies, a penchant for obsessive spreadsheet‑driven budgeting, a stubborn reluctance to delegate,
    and a habit of double‑checking every chess move even at bedtime.
background:
  cultural: Ernesto was born to Mexican immigrant parents who settled in Texas in the 1940s. He grew up bilingual, speaking Spanish at home and English in school, and retains strong ties to Mexican cultural
    traditions such as Día de los Muertos, Semana Santa, and family-centered celebrations. His Catholic upbringing influences his values of discipline, respect for hierarchy, and community service. Living
    in Fort Worth, he blends his Mexican heritage with Texan sensibilities, participating in local Mexican-American community events while preserving the practical, hardworking ethos passed down by his
    parents.
attributes:
  skills: '["Mechanical engineering (HVAC design)", "Thermodynamics and fluid mechanics", "Statistical quality control and data analysis", "Technical writing and documentation", "Project planning and budget
    management", "Team coordination and mentorship", "Computer programming (MATLAB, Python)", "Problem solving under constraints", "Classic car restoration", "Custom woodworking design"]'
  hobbies: '["Gardening (heirloom Mexican varieties)", "Reading historical non‑fiction and engineering biographies", "Chess puzzles and strategy games", "Woodworking (custom furniture building)", "Classic
    car restoration", "Cooking traditional Mexican cuisine", "Mentoring small groups of STEM students"]'
  career_goals: Although officially retired, Ernesto aims to codify his decades of engineering experience into a concise technical memoir that can serve as a reference for budding engineers. He also seeks
    to volunteer as a mentor for a small, select group of high‑school students in Fort Worth's STEM outreach programs, using his competitive drive to challenge them to achieve rigorous standards. Additionally,
    he hopes to contribute his analytical skills to local nonprofit boards, helping them implement structured, data‑driven decision‑making processes.
