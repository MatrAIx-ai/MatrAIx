personas:
  professional: William Wheeler is a mid-level engineering technologist specializing in CNC machining, PLC programming, and additive manufacturing, who blends a practical, hands‑on mindset with a curiosity
    for emerging tech while navigating their worry‑prone and flexible work style to lead small project teams and mentor junior staff.
  sports: William Wheeler enjoys weekend hikes in the Cascades with the Cascades Outdoor Club, follows the Seattle Seahawks and Portland Timbers fervently, practices fly‑fishing on the Willamette River
    during spring, and maintains a casual fitness routine of biweekly trail runs, preferring flexible, low‑pressure activities over structured gym sessions.
  arts: William Wheeler finds creative release in building handcrafted wooden furniture and tinkering with Arduino drones, while unwinding to the ambient sounds of Bon Iver and the synth‑laden scores of
    Vangelis, frequently quoting passages from Isaac Asimov, and joins a local board‑gaming group that relishes titles like Terraforming Mars and Catan.
  travel: William Wheeler prefers low‑key, nature‑focused trips that combine spontaneous camping with modest planning, having trekked through Glacier National Park and camped along Oregon’s coast, while
    dreaming of a future adventure to Iceland’s volcanic highlands and New Zealand’s South Island to scout new landscapes for their next woodworking project.
  culinary: William Wheeler enjoys cooking simple, seasonal meals such as cedar‑plank grilled salmon with roasted wild mushrooms and quinoa, often experimenting with local ingredients like Oregon hazelnuts,
    while also indulging in occasional craft coffee dates at a nearby roastery and occasionally ordering sushi as a convenient dinner after long work weeks.
  core: William Wheeler is a curiosity‑driven engineering technologist who balances hands‑on craftsmanship with a wandering mind, often juggling disorganized schedules, lingering anxiety, and a love for
    the Pacific Northwest’s forests, drones, and sci‑fi tales.
background:
  cultural: William grew up in a modest, family‑oriented community in western Oregon, where practical self‑reliance and a close connection to the land are core values. His upbringing blends traditional
    Midwestern work ethics with the progressive, environmentally conscious attitudes common in the Pacific Northwest. He identifies with the region’s appreciation for outdoor recreation, community cooperation,
    and a pragmatic approach to problem solving, which is reinforced by his STEM education and engineering career. These cultural influences shape his collaborative, kind nature and his desire to contribute
    positively to both his workplace and local community.
