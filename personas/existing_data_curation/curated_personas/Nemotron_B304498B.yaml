  career_goals: William aims to advance to a senior engineering technologist role where he can lead small project teams and mentor junior staff. He plans to obtain certifications in PLC programming and
    Six Sigma, and eventually pursue a master's degree in engineering management to broaden his strategic perspective. A key ambition is to champion sustainable manufacturing practices for local Oregon
    producers, integrating renewable energy and waste‑reduction solutions. He also prioritizes building better personal organization and stress‑management habits to maintain a healthy work‑life balance
    for his family.
