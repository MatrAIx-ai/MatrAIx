persona_description: A researcher and inventor who specializes in developing new technologies for amputees, particularly those who have lost limbs in terrorist attacks. They are focused on developing bionic
  limbs that are controlled by the central nervous system and are able to directly attach to the bone without the risk of infection. They are known for their work on the Intraosseous Transcutaneous Amputation
  Prosthesis (ITAP) and have been successful in early clinical trials.
