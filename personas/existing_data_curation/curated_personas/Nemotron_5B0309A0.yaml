  hobbies: '[''hiking'', ''mountain biking'', ''photography'', ''DIY electronics'', ''acoustic guitar'', ''improv comedy'', ''volunteering with Habitat for Humanity'', ''hosting carpentry workshops'', ''reading
    trade magazines'', ''craft beer tasting'']'
  career_goals: While proud of his craftsmanship, Ryan is driven to expand his impact beyond individual projects. He aims to launch his own boutique construction firm specializing in energy‑efficient, custom
    homes that blend traditional woodworking with modern sustainable practices. Over the next five years, he hopes to secure certification as a green builder, build a reputation for high‑end, client‑focused
    work, and eventually mentor a network of skilled carpenters. He also envisions hosting workshops that blend practical skill‑share with his love for community engagement, positioning himself as a local
    authority on innovative yet reliable building methods.
