personas:
  professional: An aspiring performer and budding content creator, Loretta Albritten blends hip‑hop dance, cheerleading, and improvisational theater, and they channel their spontaneous energy into leading
    school squad rehearsals while planning TikTok tutorials that spark peer engagement.
  sports: Loretta Albritten throws herself into high‑school cheerleading and a hip‑hop dance crew year‑round, swaps to community ultimate frisbee in spring, and they root for the Los Angeles Lakers and
    the U.S. Women’s National Soccer Team, often streaming games with friends after practice.
  arts: Loretta Albritten channels creative energy into improvisational theater, reads Neil Gaiman’s *Neverwhere* and binge‑watches BTS music videos, while they draw inspiration from dancer Misty Copeland
    and curate TikTok DIY crafts inspired by maker @theDIYqueen.
  travel: Loretta Albritten prefers spontaneous, budget‑friendly getaways, having spent a school break at Disneyland and dreaming of a future backpacking adventure through Tokyo’s anime districts, while
    they often opt for last‑minute day trips to the nearby Redwood State Park with friends.
  culinary: Loretta Albritten, a self‑taught snack chef, whips up TikTok‑viral mug‑pizza, avocado toast with chili flakes, and DIY fruit‑kebab skewers, favoring bright ingredients like mango, peanut butter,
    and matcha while they occasionally over‑season as a quirky habit.
  core: Loretta Albritten is a high‑energy teen who balances spontaneous creativity with occasional disorganization, turning anxiety into journal pages and TikTok videos while they habitually lose their
    phone during rehearsals.
background:
  cultural: Loretta is a White Midwestern American raised in Batavia, Ohio, a small‑town community in Clermont County. Her family’s heritage traces back to Anglo‑American roots common in the region, with
    traditions that include attending local church gatherings, celebrating U.S. holidays like Thanksgiving and the Fourth of July, and taking part in county fair activities. The community’s emphasis on
    neighborly support, modesty, and practical hard work has shaped her balanced outlook—valuing both curiosity and established methods. Growing up in a tight‑knit environment has reinforced her sociable
    nature and her desire to give back through community service, while the relatively stable, slower‑paced setting provides a comforting backdrop for her spontaneous and creative pursuits.
