  career_goals: Loretta dreams of a career that merges her love for helping people with her creative curiosity. She aims to become a community health worker or youth outreach coordinator, hoping to support
    peers dealing with stress and mental‑health challenges. In the longer term, she envisions earning a degree in public health or communications at a community college, then working for a local non‑profit
    that focuses on teen well‑being and environmental education. Parallel to that, she wants to develop a modest online platform—such as a YouTube or TikTok channel—where she shares practical mental‑health
    tips, sustainable DIY projects, and fun science experiments for other teenagers. She also harbors an entrepreneurial ambition to launch a small sustainable‑crafts business using upcycled materials from
    her hometown.
