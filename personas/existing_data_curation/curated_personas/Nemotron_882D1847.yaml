personas:
  professional: Chelsea Higginbotham, a retired home‑economics steward turned volunteer coordinator, blends meticulous budgeting with a pragmatic, structured approach to managing their church’s outreach
    programs, ensuring every food drive runs on schedule while quietly asserting themselves in community meetings.
  sports: Chelsea Higginbotham, a devoted fan of the local high‑school football team and the regional baseball club, spends leisurely mornings strolling the neighborhood while birdwatching, participates
    in a low‑impact walking group at the community center, and treats each Sunday service as a chance to cheer on the team from the pews.
  arts: Chelsea Higginbotham, who weaves stories into hand‑crafted blankets, sings in the church choir to the soulful strains of Mahalia Jackson and uplifting chords of traditional Southern gospel, and
    devotes evenings to reading historical fiction by authors like Charles Frazier, often quoting passages while knitting.
  travel: Chelsea Higginbotham, a planner who prefers short, well‑organized trips, enjoys annual visits to historic Williamsburg, a yearly pilgrimage to the Magnolia Plantation gardens, and dreams of a
    tranquil weekend in Asheville’s Blue Ridge Mountains, always packing a list of garden seeds to bring back as souvenirs.
  culinary: Chelsea Higginbotham, an accomplished Southern cook, perfects classics such as collard greens simmered with smoked ham hocks, peach cobbler spiced with ginger, and crisply fried catfish, while
    experimenting with new twists like adding citrus zest to cornbread batter and incorporating garden‑grown basil into their signature tomato sauce.
  core: Chelsea Higginbotham blends steadfast routine with quiet creativity, tending a thriving garden, preserving family recipes, and orchestrating community gatherings, all while navigating occasional
    forgetfulness and the gentle ache of arthritis.
background:
  cultural: 'Chelsea was raised in a multi‑generational Southern family in rural Alabama. Her upbringing reflected the traditions of the American South: a strong emphasis on family ties, church participation
    (Baptist), modest hospitality, and a reverence for local customs such as Southern cooking, gardening, and community gatherings. Though she did not complete a high school diploma, her education was shaped
    by practical life experiences—working the family farm, learning to preserve produce, and participating in church activities. Her cultural identity is rooted in values of modesty, self‑reliance, and
    respect for community elders, which continue to guide her daily life in Auburn, Alabama.'
attributes:
  skills: '[''Cooking (traditional Southern cuisine)'', ''Gardening (vegetable and flower beds)'', ''Knitting and crocheting'', ''Household budgeting and accounting'', ''Volunteer coordination at local
