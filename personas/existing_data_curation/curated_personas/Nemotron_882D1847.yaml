  hobbies: '[''Gardening'', ''Knitting'', ''Reading historical fiction'', ''Birdwatching'', ''Church choir participation'', ''Bridge club with seniors'', ''Cooking traditional Southern meals'']'
  career_goals: Her primary ambition is to remain self‑sufficient and healthy, ensuring she can continue to care for her garden and support her grandchildren. She aspires to document family recipes and
    stories to pass on to future generations, and to stay an active, low‑profile volunteer in her church’s outreach program. Chelsea hopes to foster a sense of community by organizing a small monthly quilting
    circle for seniors and to leave her home in good order for her heirs.
