personas:
  professional: Viera Patch, a budding preschool architect, constructs elaborate block castles with meticulous planning, showcasing their organized, reliable nature and a preference for structure and predictability.
  sports: Viera Patch, a member of the Little Acorn Soccer Club, loves running in the park and dribbles a mini soccer ball with the same competitive drive they bring to building block towers, while cheering
    for the local baseball team, the Riverdale Rams.
  arts: Viera Patch delights in drawing characters from the animated series "Bluey", sings along to child‑friendly tunes by Raffi, and they admire the whimsical illustrations of Eric Carle.
  travel: Viera Patch loves family road trips to Grandma's farmhouse in the countryside, enjoys meticulously planned pit stops at playgrounds, and they dream of seeing the colorful coral reefs of Queensland,
    Australia.
  culinary: Viera Patch prefers creamy mac and cheese with a sprinkle of cheddar, delights in dipping carrot sticks in ranch, and they proudly help stir the pancake batter for weekend brunches.
  core: Viera Patch is a meticulously organized 4‑year‑old builder who treats every block tower like a blueprint, hoards spare change in a pink piggy bank, and insists on nightly symptom charts, all while
    they secretly hum Raffi choruses.
background:
  cultural: Viera is raised in a middle‑class white family in Woburn, Massachusetts. Her cultural background reflects typical New England suburban life, with exposure to American holidays such as Thanksgiving,
    Christmas, and Fourth of July celebrations, and participation in community activities at her local library and preschool. She speaks English at home and is introduced to both traditional American cultural
    values and the diverse cultural fabric of the Boston metropolitan area.
