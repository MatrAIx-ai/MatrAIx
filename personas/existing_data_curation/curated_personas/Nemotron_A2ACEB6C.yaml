  hobbies: '[''building block towers'', ''organizing dollhouse'', ''drawing'', ''listening to storytime'', ''puzzle solving'', ''sorting games'', ''sticker collecting'']'
  career_goals: Though only four, Viera often talks about wanting to become a teacher or librarian because she likes structured environments and sharing knowledge. She also imagines being a team captain
    in playground games, reflecting her competitive nature. In the future she aspires to roles that let her organize, lead, and maintain order.
