persona_description: A scholar and theologian who specializes in the study of Thomistic theology, particularly the works of St. Thomas Aquinas. He or she has a deep understanding of the scholastic tradition
  of medieval theology, and is skilled in defending and explaining the teachings of St. Thomas. The persona is likely to have a passion for the study of the Church's teachings and has a keen interest in
  the questions of grace and faith. The persona is also likely to be familiar with the works of the German mystics and the Dominican theologians who lived during the sixteenth and seventeenth centuries.
