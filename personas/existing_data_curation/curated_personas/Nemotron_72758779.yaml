  hobbies: '[''Street‑art photography'', ''Gallery and museum visits'', ''Jazz and hip‑hop music appreciation'', ''Cooking Caribbean‑American soul food'', ''Weekend basketball games'', ''Volunteering at
    youth community center'']'
  career_goals: Adrian aims to transition from driver‑sales roles into a supervisory position within a logistics firm, eventually becoming a fleet manager overseeing routing, compliance, and driver development.
    He also dreams of launching a boutique transportation service that specializes in the safe handling of fine art and cultural artifacts, merging his practical expertise with his love of the arts. Over
    the next five years he plans to acquire additional certifications in hazardous‑material handling and supply‑chain management, and to mentor younger drivers from his community, fostering greater representation
    in the trucking industry.
