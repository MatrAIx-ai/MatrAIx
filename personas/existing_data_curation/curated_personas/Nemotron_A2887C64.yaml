  career_goals: Narsimha dreams of a future where he can explore the far reaches of imagination and the universe. He aspires to become an astronaut who discovers new planets, an artist who paints fantastical
    worlds, or a storyteller who writes picture books that ignite curiosity in other children. He also imagines inventing toys that blend art and science, and hopes to one day design games that let kids
    create their own stories. His ambitions are guided by his love for novelty, abstract ideas, and the desire to share his creative visions with others.
