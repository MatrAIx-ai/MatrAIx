personas:
  professional: A budding junior explorer named Narsimha Patel spends afternoons building cardboard rockets, turning ordinary backyard sticks into imagined interstellar vessels, reflecting their vivid imagination
    and keen curiosity.
  sports: A miniature soccer fan named Narsimha Patel joins the Little Dynamo Soccer Club, cheers for the local junior team the River Rapids, and during winter glides on a community ice‑skating rink, blending
    a love of team play with solitary balance.
  arts: A vivid little artist named Narsimha Patel spends evenings drawing fantastical creatures inspired by the animated films of Pixar, sings along to the Frozen soundtrack by Idina Menzel, and collects
    stickers of the painter Yayoi Kusama, channeling abstract curiosity into creative expression.
  travel: A curious explorer named Narsimha Patel enjoys weekend trips to the nearby zoo, dreams of visiting the Tokyo Disney Resort after watching a travel vlog, and prefers meticulously planned family
    road trips over spontaneous wanderings, reflecting a mix of adventurous imagination and organized preferences.
  culinary: A selective eater named Narsimha Patel loves creamy macaroni and cheese with a dash of paprika, relishes mango slices, occasionally sneaks a bite of sushi roll at a family gathering, and assists
    in stirring pancake batter, underscoring a playful yet evolving palate.
  core: Narsimha Patel is a five‑year‑old with boundless imagination, meticulous curiosity, and a calm resilience that turns everyday play into miniature adventures, all while juggling a few quirks like
    a secret stash of stickers and occasional bedtime tooth‑brushing lapses.
background:
  cultural: Narsimha was born to a South Asian (Indian) family that preserves its cultural heritage while living in Melbourne, Florida, Brevard County. At home, his parents speak Gujarati (and occasionally
    Hindi) alongside English, and they celebrate festivals such as Diwali, Holi, and Navratri with traditional foods, music, and community gatherings at the local Indian association. He enjoys Indian dishes
    like roti, dal, and mango lassi, and he participates in cultural dance and music lessons offered in the area. This blend of Indian traditions and Floridian lifestyle gives him a rich, multicultural
    perspective that informs his curiosity, creativity, and respect for diverse experiences.
