  hobbies: '[''Biking and urban photography'', ''Cooking traditional Latino cuisine'', ''Salsa dancing'', ''Volunteering in after‑school tutoring'', ''Reading contemporary fiction'', ''Watching documentaries
    on technology and urban planning'']'
  career_goals: Mayra aims to advance within the school district’s transportation department. In the next few years she hopes to obtain a commercial driver’s license (CDL) with a passenger endorsement and
    become a certified bus safety trainer, mentoring new drivers. She is interested in pursuing a supervisory role, such as route coordinator or transportation manager, where she can apply her organizational
    skills to improve scheduling efficiency and safety protocols. Additionally, she plans to enroll in evening courses toward an associate degree in transportation logistics, positioning herself for future
    roles in district-wide transportation planning or community outreach programs that promote safe travel for students.
