persona_description: A scientist who specializes in soil science and environmental protection. They are particularly interested in the impact of pesticides on soil health and the need for regulations and
  reference points on pesticide cocktails in soils. They have conducted research on the content distribution of pesticides in European soils under organic and conventional farming practices, and are aware
  of the challenges and limitations in understanding the effects of pesticide cocktails on soil health. They are also aware of the need to transition from conventional agriculture to organic agriculture,
  considering the persistence of residues in organic soils and the time required for the transition.
