personas:
  professional: John Oates, a 35‑year‑old meat‑processing specialist with mastery of animal anatomy, HACCP compliance, and custom charcuterie, leverages their quiet, meticulous nature to plan a boutique
    artisan meat shop in Des Moines where their artistic eye shapes visually striking packaging and their relaxed, sometimes disorganized work style fuels spontaneous product experimentation.
  sports: John Oates, a solitary fitness enthusiast, cycles regularly on rural trails with the Des Moines Cycling Club, casually follows the Iowa Hawkeyes football team, occasionally joins a pick‑up volleyball
    game at the local park during summer, and prefers low‑impact workouts that align with their calm disposition, though they often forget to schedule training sessions in advance.
  arts: John Oates immerses themselves in artistic pursuits by painting watercolors inspired by the subtle tones of Monet’s gardens, photographing Iowa’s farms with a Canon EOS R to capture the chiaroscuro
    reminiscent of Ansel Adams, and reading art‑history books about the Hudson River School, all while letting curiosity lead to spontaneous sketch sessions at farmers’ markets despite their occasional
    habit of leaving canvases unfinished.
  travel: John Oates prefers low‑key, self‑planned road trips that blend culinary exploration with serene landscapes, having already ridden their bike through the rolling hills of the Iowa Great Lakes region,
    dreaming of a summer visit to the Tuscan countryside to study traditional salumi, and occasionally booking a weekend stay at a quiet lakeside cabin in Minnesota, all while keeping travel budgets modest
    due to their flexible spending style.
  culinary: John Oates, a skilled butcher turned home cook, revels in crafting small‑batch cured sausages flavored with fennel seeds, smoked pork belly glazed with maple‑brown sugar, and pairing them with
    locally sourced heirloom tomatoes and fresh basil, while their watercolor‑inspired plating showcases artistic flair, though they sometimes forget to defrost meats in time, leading to rushed cooking
    sessions.
  core: John Oates is a quietly curious 35‑year‑old butcher‑artist who blends meticulous meat craft with watercolor imagination, thriving on solitude, spontaneous creativity, and a laid‑back approach that
    leads both to artistic brilliance and occasional disorganization.
background:
  cultural: John is a third‑generation Midwestern white American of German‑Irish ancestry, raised in a small farming community near Waukee, Iowa. His upbringing emphasized self‑reliance, modesty, and a
    strong work ethic typical of the region, while community events like county fairs and potlucks reinforced a sense of local togetherness. Though he values solitude, his cultural roots keep him connected
    to the rhythms of rural life, seasonal harvests, and a quiet appreciation for traditional crafts and folk art that subtly shapes his aesthetic tastes.
