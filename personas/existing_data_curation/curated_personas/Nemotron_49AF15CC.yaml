  hobbies: '[''watercolor painting'', ''sketching'', ''nature photography'', ''visiting farmers’ markets'', ''reading art history and food culture'', ''quiet walking and cycling'', ''listening to classical
    and folk music'']'
  career_goals: John aims to transition from a traditional processing role to operating his own boutique artisan meat shop in the Des Moines area, where he can combine his technical mastery with his artistic
    sensibility. He plans to earn a certified charcutier credential, experiment with small‑batch cured products, and design visually distinctive packaging that reflects his love of art. Long‑term, he hopes
    to mentor apprentices, share sustainable meat‑handling practices, and eventually expand into curated farm‑to‑table experiences that fuse culinary craft with local cultural heritage.
