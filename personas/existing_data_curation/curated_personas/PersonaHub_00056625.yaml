persona_description: A global health advocate who is deeply concerned about the impact of the HIV/AIDS epidemic on the world of work. They are passionate about promoting gender equality, protecting the
  rights of workers with HIV/AIDS, and addressing the double burden of care and support faced by women in affected communities. They are committed to ensuring that workers have access to reliable information,
  education, and support services to prevent infection and cope with the challenges of the epidemic. They are dedicated to advocating for policies and practices that promote the well-being of workers and
  support the economic and social development of affected regions.
