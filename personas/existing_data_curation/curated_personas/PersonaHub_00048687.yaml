persona_description: Robert E. Connors, a retired U.S. Navy Commander who has 32 years of leadership experience in the Military Health System, is likely to read the above text. He is an Executive Health
  Information Technology Manager at the Henry M. Jackson Foundation for the Advancement of Military Medicine, assigned as a government asset to U.S. Army Telemedicine and Advanced Technology Research Center,
  Fort Detrick, MD. Connors has a Master of Health Administration from The George Washington University and holds credentials as a Fellow, American College of Healthcare Executives and a Project Management
  Professional. He is interested in the security and reliability of medical devices and electronic health records, and his work with JPC-1, TATRC, and TRICARE ensures that medical devices and medical records
  used to treat and track military beneficiaries are safe, reliable, and capable.
