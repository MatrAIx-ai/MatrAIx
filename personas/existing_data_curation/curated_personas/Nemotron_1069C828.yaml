personas:
  professional: Irma Mirandaguzman, a budding digital illustrator and junior game designer, leverages a curious and organized mindset to weave musical and literary inspirations into Procreate artworks and
    Scratch‑coded mini games while confidently leading the school art club with a balanced blend of reliability and creative flexibility.
  sports: Irma Mirandaguzman, who enjoys pick‑up soccer games after school and follows the MLS team Seattle Sounders FC, maintains fitness through weekly yoga streams and a membership at the local community
    center’s sprint‑training club, preferring low‑pressure, fun‑oriented activity over intense competition.
  arts: Irma Mirandaguzman, whose artistic palate blends contemporary street art influences like Banksy with classic animation from Hayao Miyazaki, spends weekends sketching to the soundtrack of indie bands
    such as Arctic Monkeys and traditional punta rhythms and frequently visits the city museum’s modern art wing to study works by Frida Kahlo and Jean‑Michel Basquiat, shaping a unique visual language.
  travel: Irma Mirandaguzman, an avid planner of weekend getaways, has explored the historic streets of Oaxaca City and the vibrant murals of Valparaíso, dreams of trekking the fjords of Norway and attending
    the San José International Art Fair, and balances budget constraints with a desire for immersive cultural experiences.
  culinary: Irma Mirandaguzman, an enthusiastic home cook, prepares traditional dishes like baleadas with refried beans, cheese, and avocado, experiments by adding smoked paprika and cilantro to the filling,
    and also masters quick ramen bowls topped with a soft‑boiled egg and toasted sesame seeds, showcasing a middling cooking skill that blends heritage flavors with global twists.
  core: Irma Mirandaguzman, a curious teen who fuses digital art, indie music, and family cooking into a vibrant, slightly perfection‑prone but warmly collaborative lifestyle.
background:
  cultural: Irma is a first‑generation American of Honduran descent. Her parents immigrated to the United States and maintain strong ties to their homeland, speaking Spanish at home and celebrating Honduran
    holidays such as Día de la Independencia and Día de la Madre. Family gatherings feature traditional foods like baleadas, plátanos fritos, and tamales, as well as vibrant music that blends Caribbean
    rhythms with modern influences. Growing up in Knoxville, Tennessee, Irma navigates a bicultural identity, blending the warmth and communal values of her Honduran heritage with the diverse cultural experiences
    of her Southern community. This dual perspective enriches her worldview and fuels her curiosity about art, culture, and community engagement.
