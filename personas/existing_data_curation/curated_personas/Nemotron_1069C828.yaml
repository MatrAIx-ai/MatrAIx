  hobbies: '[''Sketching'', ''Digital art (Procreate)'', ''Reading graphic novels'', ''Listening to diverse music'', ''Cooking Honduran dishes'', ''Playing guitar'', ''Coding simple games (Scratch)'', ''Visiting
    museums'', ''Participating in school art club'']'
  career_goals: Irma aspires to join a specialized high‑school arts program and later pursue a Bachelor of Fine Arts in graphic design or visual communications. She dreams of becoming a multimedia artist
    who blends her Honduran cultural heritage with contemporary digital media, creating compelling visual stories that celebrate diversity. In the long term, she aims to work as a creative director at an
    inclusive media agency or as a cultural curator for community museums, using her artistic talent and bilingual background to bridge cultures and inspire new generations.
