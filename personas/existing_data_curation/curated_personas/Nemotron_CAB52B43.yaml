    time management'']'
  hobbies: '[''Adult basketball league'', ''Hiking in the Blue Ridge foothills'', ''Barbecue gatherings with friends'', ''Running (semi‑marathon training)'', ''Car maintenance and restoration'', ''Attending
    craft‑beer festivals'', ''Mentoring high‑school students on sales basics'', ''Guided meditation for stress relief'']'
  career_goals: Billy aims to move from a frontline sales role to a regional sales management position within the next five years, overseeing a team of representatives across the Carolinas. He plans to
    earn the Certified Professional Sales Leader (CPSL) credential and deepen his expertise in supply‑chain logistics to add strategic value to his employer. While he values clear performance metrics and
    structured career advancement, he also wants to retain the flexible, people‑focused environment that keeps him energized. Long‑term, he envisions launching his own boutique wholesale distribution company
    that leverages his network and his knack for matching products to market demand.
