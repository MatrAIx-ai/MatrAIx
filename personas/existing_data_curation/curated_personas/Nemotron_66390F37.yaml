  hobbies: '["Cooking Mexican Cuisine", "Gardening", "Hiking in Local Parks", "Playing Chess", "Watching Baseball", "Volunteering at Community Center", "DIY Home Improvement Projects", "Listening to Classic
    Rock"]'
  career_goals: Francisco aims to transition from a front‑line stocker role to a supervisory position such as Shift Lead or Inventory Manager, leveraging his decades of hands‑on experience. He plans to
    earn certifications in forklift safety and advanced warehouse management systems to stay current with emerging automation technologies. In the longer term, he hopes to mentor younger workers and possibly
    consult for small local businesses on efficient inventory practices, all while securing a stable retirement benefit package.
