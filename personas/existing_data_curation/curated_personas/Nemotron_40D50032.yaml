  career_goals: Although retired, Mark aims to preserve his family’s legacy by compiling a written memoir and oral histories for future generations. He hopes to mentor younger community members in practical
    trades, volunteer occasionally at the local library to help with historical archives, and ensure his estate and personal affairs are orderly so his descendants can focus on their own goals. Maintaining
    his health and independence so he can continue his hands‑on projects remains a personal priority.
