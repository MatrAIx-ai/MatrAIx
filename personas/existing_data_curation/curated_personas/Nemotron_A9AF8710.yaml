  hobbies: '[''PC building and customization'', ''Arduino tinkering'', ''competitive FPS gaming'', ''pickup basketball'', ''hiking in Pacific Northwest'', ''reading popular science'', ''listening to indie/alternative
    music'']'
  career_goals: William aims to earn his GED within the next year and then enroll in a vocational apprenticeship program in automotive technology or electrical work, fields that align his curiosity for
    how things work with a practical career path. He envisions becoming a certified automotive technician or electrician, eventually opening his own small repair shop. Simultaneously, he keeps a backup
    ambition of entering software development, particularly game development, where his competitive gaming experience and coding basics could merge into a future career creating interactive entertainment.
