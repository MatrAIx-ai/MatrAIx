  career_goals: Christina aims to stay mentally and physically active by pursuing lifelong learning opportunities, such as enrolling in a weekly art‑history class at Aiken Community College and attending
    workshops on digital storytelling. She aspires to mentor high‑school students interested in genealogy and local history, helping them develop research skills while sharing her own discoveries. Within
    her community, she wishes to expand the senior‑center’s cultural programs, introducing art‑based activities and intergenerational storytelling events. On a personal level, she is committed to maintaining
    her independence through regular walking, balanced nutrition, and managing stress through mindfulness practices, ensuring she can continue to support her husband and family.
