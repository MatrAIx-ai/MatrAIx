personas:
  professional: Susan Johnson, a two‑year‑old with a budding love for order, meticulously arranges her chunky wooden blocks each morning and eagerly assists the preschool teacher in setting up the daily
    activity stations, demonstrating a surprising methodical approach for their age.
  sports: Susan Johnson, a two‑year‑old who loves the rhythmic bounce of a toddler gymnastics class and eagerly joins the Little Lions Soccer Club on warm afternoons, also shows early loyalty to the Chicago
    Cubs by wearing a miniature cap during family viewings, balancing active play with occasional quiet time on the swing.
  arts: Susan Johnson, a two‑year‑old who keeps her crayons sorted by color and delights in drawing simple pictures of animals while humming along to Raffi's Baby Beluga and watching Sesame Street's Elmo,
    finds artistic expression both soothing and a way to explore new ideas.
  travel: Susan Johnson, a two‑year‑old who eagerly clutches a stuffed giraffe during family road trips to the San Diego Zoo and lights up at the prospect of a weekend visit to Disney World in Orlando,
    prefers itineraries that include familiar rest breaks and a predictable nap schedule, yet displays genuine curiosity at every new environment.
  culinary: Susan Johnson, a two‑year‑old who fiercely prefers the crunch of carrot sticks and the cheesy comfort of macaroni and cheese, can occasionally help stir mashed potatoes with a plastic spoon,
    yet insists on having her chicken nuggets served with a side of honey‑glazed peas, reflecting a blend of picky tastes and a budding willingness to explore flavors.
  core: Susan Johnson, a two‑year‑old who balances an innate curiosity with surprising methodical habits, often arranging her toys in tidy rows before diving into play, yet occasionally stubbornly refuses
    bedtime when the promise of a new sticker looms.
background:
  cultural: Susan is a white child raised in Guysville, a small town in Meigs County, Ohio. Her upbringing reflects Midwestern rural culture, with strong ties to family, community events, local church gatherings,
    and practical, modest values. The community’s emphasis on neighborly support and simple, hands‑on activities shapes her everyday experiences.
