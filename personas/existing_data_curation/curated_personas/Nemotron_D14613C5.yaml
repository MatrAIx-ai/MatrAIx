  career_goals: Steven aims to enroll in a specialized high school with a strong arts program, then pursue a degree in visual communications or interactive media. His long‑term ambition is to become a creative
    director for digital content, merging his love for art, technology, and community storytelling. He also envisions launching a youth‑focused art collective that offers workshops and mentorship in his
    hometown, leveraging his sociable nature to build supportive networks. Recognizing his tendency toward worry, he hopes to develop resilience and time‑management strategies to handle future academic
    and professional pressures.
