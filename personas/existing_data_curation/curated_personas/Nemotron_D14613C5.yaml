personas:
  professional: A budding multimedia creator, Steven Blankenship mixes sketching, digital art, and short TikTok videos to explore narrative, while their relaxed attitude toward deadlines sometimes leads
    to last‑minute project scrambles; their sociable nature makes them the go‑to collaborator in the school drama club.
  sports: An energetic bike‑enthusiast and casual fan, Steven Blankenship rides their mountain bike through local parks on Saturday mornings, follows the New Jersey Devils hockey team and the Philadelphia
    Eagles football franchise, and occasionally joins pickup basketball games at the community center, balancing their love for spontaneous movement with a laid‑back approach to structured training.
  arts: A creative polymath, Steven Blankenship sketches character concepts inspired by Studio Ghibli, experiments with Photoshop filters after watching tutorials by Aaron Blaise, strums acoustic renditions
    of Billie Eilish and The Beatles for their songwriting, and showcases their work at the Medford Art Fair where they enjoy the community’s supportive vibe.
  travel: An adventure‑seeking explorer, Steven Blankenship enjoys spontaneous bike trips to the nearby Pine Barrens, dreams of a weekend getaway to New York City’s Museum of Modern Art, has visited Philadelphia’s
    historic district with friends, and hopes to one day experience the neon streets of Tokyo during a school exchange program.
  culinary: A food‑curious teen with a penchant for comfort and experimental dishes, Steven Blankenship loves pepperoni pizza, homemade ramen bowls with soft‑boiled eggs, tries their hand at making avocado
    toast with a drizzle of sriracha, and frequently tastes artisanal ice cream at local fairs, though they often skip breakfast in favor of late‑night snack runs.
  core: Steven Blankenship, a 15‑year‑old curious and talkative teen, blends their love for sketching, guitar, and TikTok storytelling while juggling occasional anxiety, a relaxed take on obligations, and
    a habit of impulsive spending.
background:
  cultural: Steven grew up in Medford, a suburban community in Burlington County, New Jersey. His family reflects a typical middle‑class white American upbringing, with an emphasis on community involvement
    and access to public school arts programs. The local culture combines suburban traditions, close‑knit neighborhood connections, and a variety of cultural events from nearby Philadelphia and larger New
    Jersey cities. This environment has nurtured his openness to new experiences, provided resources for artistic exploration, and fostered a sense of belonging that informs his collaborative and sociable
    personality.
