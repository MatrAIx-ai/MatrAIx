  career_goals: Chad aims to transition from his current period outside the formal workforce to a sustainable remote freelance career as a visual content creator. Over the next three to five years, he plans
    to build a portfolio that attracts small businesses and indie publishers for branding, illustration, and multimedia projects. He intends to earn a UI/UX design certification through a community‑college
    program to broaden his service offering. Ultimately, he envisions establishing his own boutique creative studio in the Bremen area, providing mentorship and art‑workshop programming for local youth
    while maintaining a balanced lifestyle that respects his need for both social engagement and solitary creative time.
