personas:
  professional: Chad Johns, a 30‑year‑old self‑taught visual content creator, channels their meticulous project‑management habits and vivid imagination into cohesive branding, illustration, and animated
    graphics for indie publishers and small businesses, and they balance solitary studio time with community‑driven art workshops.
  sports: Chad Johns hikes the nearby state parks each weekend, plays in a local pick‑up soccer league affiliated with the Bremen Sports Association, follows Werder Bremen in the Bundesliga and enjoys occasional
    games of the Bremen Towers basketball team, and they keep fit with regular trail runs and a weekly yoga class.
  arts: Chad Johns nurtures a deep love for oil and acrylic painting inspired by the brushwork of Vincent van Gogh and the minimalist lines of Piet Mondrian, captures moody landscapes à la Ansel Adams with
    their DSLR, writes folk‑rock songs on acoustic guitar echoing Bon Iver, and they regularly attend the Bremen Artists Collective meet‑ups to share and critique work.
  travel: Chad Johns prefers short, self‑planned road trips to nearby state parks like the Harz, has already trekked the Blue Ridge Mountains in North Carolina, dreams of exploring the Scottish Highlands
    and the Amalfi Coast, and they balance travel with a modest budget while using travel rewards credit cards for flights.
  culinary: Chad Johns enjoys cooking Mediterranean dishes such as ratatouille with fresh zucchini and eggplant and shakshuka seasoned with cumin and harissa, experiments with homemade sourdough starter
    on weekends, pairs meals with local craft beer, yet they often order sushi delivery when a woodworking project runs late.
  core: Chad Johns blends disciplined organization with boundless imagination, juggling freelance design work, community art‑therapy sessions, woodworking projects, and a habit of binge‑reading speculative
    fiction late into the night.
background:
  cultural: Chad grew up in Bremen, Indiana, a small Midwestern town with deep German‑American roots. His family values self‑reliance, modesty, and community service, reflecting the region's working‑class
    heritage. He attended the local public high school, where he was active in the art club and marching band, and participated in town traditions such as the Fourth of July parade, county fair, and church‑based
    community outreach. This upbringing instilled a strong work ethic, a respect for tradition, and an appreciation for both the simplicity of rural life and the creative possibilities of modern artistic
    expression.
