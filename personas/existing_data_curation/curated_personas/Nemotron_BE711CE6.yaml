  career_goals: Looking ahead, Catherine aims to transition into a senior creative director role within a regional agency or to launch her own boutique design consultancy focused on community branding in
    the Twin Cities and surrounding area. She wants to mentor emerging designers, lead award‑winning campaigns, and secure a regional design award within the next three years. Additionally, she plans to
    develop a series of hands‑on workshops for local small businesses to improve their visual communication and to author a guidebook on effective print design for Midwestern markets before retirement.
