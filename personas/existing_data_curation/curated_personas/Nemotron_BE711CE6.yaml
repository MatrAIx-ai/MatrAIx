personas:
  professional: An experienced graphic designer and budding creative leader, Catherine Parker blends three decades of branding, layout, and print production expertise with a methodical, deadline‑driven
    workflow, leveraging the full Adobe Creative Suite to craft cohesive visual identities while mentoring junior designers and steering community‑focused campaigns; they channel a competitive drive for
    award‑winning work.
  sports: A dedicated fan of Minnesota’s professional teams, Catherine Parker roots for the Vikings and Timberwolves, competes in a women’s volleyball league at the Mankato Community Center, hikes the Minnesota
    River Valley each spring, and volunteers as a race marshal for the Twin Cities Marathon, reflecting their sociable, energetic, yet highly organized approach to sports; they view athletics as both community
    engagement and personal discipline.
  arts: Deeply embedded in Mankato’s cultural fabric, Catherine Parker leads community art classes, volunteers backstage for the Mankato Civic Theatre’s productions of classics like 'A Midsummer Night’s
    Dream,' curates monthly design meet‑ups, and collaborates with quilting circles that reinterpret traditional patterns, drawing inspiration from Georgia O’Keeffe and contemporary graphic designer Jessica
    Hische, while their competitive edge pushes them to seek award‑winning projects; they thrive on the interplay of collaboration and personal excellence.
  travel: An avid planner, Catherine Parker favors meticulously organized weekend road trips to the Door County peninsula and historic Stillwater, dreams of a summer study tour of Norway’s coastal towns
    for Scandinavian design inspiration, balances travel enthusiasm with a sensible budget, and always returns home in time for the garden’s harvest, reflecting their structured yet adventurous spirit;
    they meticulously map itineraries to maximize both discovery and efficiency.
  culinary: Seasonal cooking is a centerpiece of Catherine Parker’s life; they harvest heirloom tomatoes, kale, and beets from their garden to create dishes like roasted beet and goat‑cheese salad, heirloom
    tomato gazpacho, and summer corn chowder, while honing canning skills and occasionally experimenting with wild rice and fresh dill in a signature Minnesota‑style trout recipe, all executed with the
    same methodical precision they apply to design projects; they view the kitchen as another studio where creativity meets disciplined technique.
  core: Catherine Parker is a structured, competitive design veteran who channels sociable energy into community arts, meticulous finances, and garden‑to‑table cooking, yet sometimes overcommits and forgets
    to unwind; they often find themselves juggling multiple projects at once.
background:
  cultural: Catherine was raised in a middle‑class family in the Upper Midwest, with roots in the Lutheran and Scandinavian traditions common to Minnesota. The region’s emphasis on practicality, punctuality,
    and community service shaped her organized and reliable demeanor. Her education in the humanities exposed her to European modernism and American regional art, which she integrates into her design aesthetic.
    She values modesty, hard work, and civic involvement, often drawing inspiration from the prairie landscapes and small‑town spirit of Blue Earth County.
