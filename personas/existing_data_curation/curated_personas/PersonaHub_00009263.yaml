persona_description: A botanist and natural historian who traveled extensively in Brazil during the 19th century, particularly in the northern provinces and gold and diamond districts. He is known for his
  work on the British Flora and his extensive collections, including a complete "Flora Zeylanica" that was never published due to his early death. He was also a member of the Linnean Society and was appointed
  as the superintendent of the botanic garden in Peradeniya by the colonial government of Ceylon.
