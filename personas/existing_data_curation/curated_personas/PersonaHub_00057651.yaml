persona_description: A lawyer who specializes in Roman law, particularly the ancient legal texts and their application in contemporary legal systems. They have a deep understanding of the Formulary system,
  the Twelve Tables, and the Canons, and are proficient in using them to resolve legal disputes. They are also familiar with the development of the legal profession in Rome and the changes that occurred
  during the fall of the Roman Empire. They have a keen interest in the history of the legal system and the evolution of legal institutions in Western Europe.
