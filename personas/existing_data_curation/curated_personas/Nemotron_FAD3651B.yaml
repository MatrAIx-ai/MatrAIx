  hobbies: '[''Line dancing'', ''Church choir singing'', ''Community gardening'', ''Cooking workshops and potlucks'', ''Book club (contemporary fiction & African‑American literature)'', ''Travel to cultural
    festivals and historic sites'', ''Genealogy research'', ''Crochet'', ''Volunteering at senior center'']'
  career_goals: Although retired from formal employment, Classie aims to deepen her impact on the Vernon Hills community. She plans to take a leadership role in the local senior center’s programming committee,
    launch and sustain a community garden that provides fresh produce and intergenerational learning, and become a certified digital‑literacy tutor for seniors. Additionally, she hopes to travel to key
    African‑American historic sites across the United States, document her experiences in a memoir, and mentor at‑risk teenagers through a church‑based outreach program. Her overarching ambition is to stay
    socially connected, keep learning, and leave a lasting legacy of community empowerment.
