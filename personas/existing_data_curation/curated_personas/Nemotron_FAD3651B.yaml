personas:
  professional: Classie Hobson, a retired community educator who now spearheads senior‑center programming and neighborhood garden initiatives, blends her natural curiosity for new ideas with a hands‑on
    practicality, rallying volunteers with charismatic speeches while flexibly adapting when plans go awry.
  sports: Classie Hobson, an enthusiastic line‑dancer who joins the weekly community studio class and walks the Vernon Hills trails with her senior walking club, cheers the Chicago Cubs in summer and the
    Chicago Bears in fall, and occasionally runs in the local 5K charity event supporting the library.
  arts: Classie Hobson, a devoted church‑choir soprano who delights in singing gospel classics by Mahalia Jackson and contemporary soul by Alicia Keys, regularly attends the Goodman Theatre for productions
    of August Wilson’s plays, and enjoys film nights featuring Denzel Washington and Meryl Streep.
  travel: Classie Hobson, who favors organized group tours to cultural festivals like New Orleans’ Mardi Gras and historic walking tours in Savannah, plans annual trips to Washington, D.C.’s national monuments,
    and relishes spontaneous weekend getaways to nearby Lake Geneva, balancing curiosity with a flexible itinerary.
  culinary: Classie Hobson, a seasoned home chef who blends traditional soul‑food staples—seasoned fried chicken, collard greens, and cornbread—with inventive twists like miso‑glazed shrimp over creamy
    grits, frequently experiments with smoked paprika, jalapeño, and fresh rosemary in weekly cooking workshops, and delights in potluck spreads featuring sweet‑potato casserole and black‑bean enchiladas.
  core: Classie Hobson, a lively 66‑year‑old community catalyst who mixes curiosity with practicality, remembers birthdays but often misplaces her glasses, and channels boundless energy into gardening,
    cooking, and rallying neighbors.
background:
  cultural: Classie Kay Hobson is a second‑generation African‑American who grew up in Chicago’s South Side during the latter years of the Great Migration, absorbing the rich traditions of gospel music,
    soul food, and community activism. Her family’s roots trace back to the Mississippi Delta, and she maintains a strong connection to African‑American heritage through church involvement, family reunions,
    and celebrating holidays such as Juneteenth. After moving to Vernon Hills in the 1990s, she blended her cultural customs with the suburb’s multicultural environment, often sharing her culinary and musical
    traditions with neighbors. Her cultural identity informs her commitment to mentorship, storytelling, and preserving the history of her community.
