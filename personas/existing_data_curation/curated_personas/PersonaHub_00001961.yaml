persona_description: A mental health specialist who believes that Alzheimer's is a normal part of aging and that labelling people with the disease unfairly. They are a senior clinical psychologist at Melbourne
  Health and have expertise in aged persons' mental health. They believe that the reality of aging is that many people in their 80s and 90s would lose memory and cognitive abilities, just as they would
  suffer from other age-related issues such as hearing loss and deteriorating eyesight. They do not question the existence of Alzheimer's as a medical condition but believe that much of the research effort
  is focused on finding a cure rather than finding better ways to care for the millions of old people with Alzheimer's and other forms of dementia as they reach the end of their lives.
