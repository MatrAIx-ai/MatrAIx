  career_goals: Although officially retired, Randall is driven to stay intellectually and creatively active. He aims to deepen his knowledge of emerging technologies such as 3D printing and artificial intelligence,
    applying them to personal maker projects and to assist local hobbyists. He aspires to mentor high‑school and community‑college students through Hillsborough County’s STEM mentorship program, sharing
    his engineering insights and encouraging interdisciplinary thinking that unites art and science. Another ambition is to help establish a modest makerspace in Odessa where neighbors can collaborate on
    woodworking, electronics, and digital art. On the artistic side, Randall plans to complete a series of watercolor works inspired by Florida’s natural landscapes and exhibit them at the local community
    center. He also hopes to compile his experiences and reflections into a memoir that highlights the synergy between technical practice and creative curiosity.
