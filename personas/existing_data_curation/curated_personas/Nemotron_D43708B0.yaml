  career_goals: As he looks to the future, Christian aims to channel his love for technology and creative problem solving into a career that blends both. He dreams of attending a university where he can
    study computer science or software engineering, with the goal of becoming a video game developer or interactive media designer. He is also interested in leveraging his bilingual abilities to work on
    culturally inclusive tech projects that serve Latino communities. In the shorter term, he hopes to secure a summer internship or apprenticeship in a local tech startup or a community makerspace, where
    he can deepen his coding skills and gain real‑world experience. Ultimately, he envisions creating games or apps that reflect his heritage and provide engaging, educational experiences for young users.
