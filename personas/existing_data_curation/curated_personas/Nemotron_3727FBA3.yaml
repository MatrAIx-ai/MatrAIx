  career_goals: Gladys dreams of becoming a professional artist who can share the stories of her family’s Puerto Rican culture through paintings and illustrations. She imagines using her creativity to help
    other children express their feelings, so she thinks about a future as an art therapist or a teacher. Occasionally she mentions wanting to work with animals as a veterinarian because she loves her family’s
    pet rabbit, but her primary ambition is to use art to make people feel understood and happy.
