personas:
  professional: A budding digital illustrator named Gladys Sanchez uses a tablet to create vibrant drawings, channeling their curiosity and methodical nature into detailed artwork while dreaming of illustrating
    their own adventure storybooks.
  sports: An enthusiastic young dancer named Gladys Sanchez attends community salsa classes with their mother, cheers for the New York Knicks and the New Jersey Devils, and spends weekends at the local
    park playing soccer with the Little Falcons youth club.
  arts: A creative explorer named Gladys Sanchez immerses in drawing and digital art, drawing inspiration from Studio Ghibli films, the whimsical illustrations of Dr. Seuss, and the bold colors of Yayoi
    Kusama, while they also savor folklore picture books that spark imaginative storytelling.
  travel: An adventurous stroller named Gladys Sanchez enjoys weekend trips to the Liberty Science Center, day outings at Central Park’s playgrounds, and weekend family road trips to the coastal town of
    Asbury Park, while they dream of visiting the Caribbean islands they see in picture books.
  culinary: A budding kitchen helper named Gladys Sanchez loves mixing sofrito, pigeon peas, and rice to make arroz con gandules, delights in shaping empanaditas with sweet plantain filling, and often snacks
    on apple slices and chocolate chip cookies after art sessions.
  core: A curious, organized, and emotionally sensitive 7‑year‑old named Gladys Sanchez blends artistic enthusiasm with a love for puzzles, saving, and family cooking, all while navigating bouts of anxiety
    and a preference for quiet, small‑group play.
background:
  cultural: Gladys comes from a vibrant Puerto Rican family that maintains strong ties to their island roots while living in Newark, New Jersey. Spanish is spoken at home alongside English, and she celebrates
    cultural traditions such as the San Juan festivities, enjoys listening to reggaeton and traditional plena music, and participates in community events at the local Puerto Rican cultural center. Family
    meals often feature classic dishes like mofongo and arroz con gandules, and she learns about her heritage through stories from her grandparents, visits to the Paseo Boricua street festival, and by practicing
    salsa dance steps taught by her parents.
