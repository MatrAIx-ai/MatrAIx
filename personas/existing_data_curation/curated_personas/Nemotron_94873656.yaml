    Nahuatl'']'
  career_goals: Jaqueline aims to re‑enter the workforce part‑time by leveraging her STEM background in science communication and community education. She hopes to develop a local program that mentors under‑represented
    youth in STEM, integrates art‑based learning, and promotes environmental justice. Over the next few years she plans to earn a certification in grant writing, secure funding for community‑based projects,
    and eventually take on a leadership role as a coordinator for a nonprofit focused on sustainable living and cultural heritage preservation.
