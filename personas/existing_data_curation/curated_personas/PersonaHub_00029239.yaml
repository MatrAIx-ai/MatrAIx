persona_description: A sociologist and demographer who specializes in the study of Jewish intermarriage, particularly its demographic significance and its impact on Jewish identity and cohesion. He examines
  the trend of Jewish intermarriage from a new angle and provides insights into how Jews in-marry and their children are more likely to identify as Jews. He also investigates how Jews and their non-Jewish
  partners negotiate Christmas, wedding ceremonies, and child-rearing. His research interests include the demographic significance of interfaith families and their impact on Jewish identity and cohesion.
