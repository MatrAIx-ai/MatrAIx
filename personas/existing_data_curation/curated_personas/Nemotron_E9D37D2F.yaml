    ''Volunteering as a tech mentor at the community library'']'
  career_goals: 'Allyson aims to transition from senior DBA to lead data architect, spearheading enterprise‑wide cloud migrations and establishing data‑governance frameworks for a mid‑size technology firm
    in the D.C. metro area. She plans to acquire an AWS Certified Database – Specialty and a Microsoft Certified: Azure Data Engineer Associate by the end of next year. In the longer term, she envisions
    founding a boutique consulting practice that helps organizations optimize high‑performance database environments while maintaining rigorous security standards. Mentoring emerging DB professionals and
    positioning herself as a recognized subject‑matter expert at industry conferences are also key personal milestones.'
