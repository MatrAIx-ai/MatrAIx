  hobbies: '[''Gardening'', ''Reading Latin American literature'', ''Chess'', ''Woodworking'', ''Cooking traditional Honduran dishes'', ''Volunteer archival work at local library'', ''Participating in small
    book clubs'', ''Walking nature trails'']'
  career_goals: Although retired, Efrain aims to continue serving his community by establishing a local cultural heritage program that documents and preserves the stories of Honduran immigrants in Zebulon
    and Franklin County, ultimately creating a modest museum or digital archive. He seeks to mentor younger members of the Hispanic community in bilingual education and research methods, potentially through
    a scholarship fund for high‑school students interested in arts and humanities. He also aspires to author a memoir that blends his personal journey with the broader historical context of Honduran migration,
    and hopes to travel back to Honduras periodically to reconnect with his roots while maintaining his health and supporting his family.
