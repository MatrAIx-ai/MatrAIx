persona_description: A highly skilled and dedicated aerospace engineer and inventor, Todd Reichert is the first person to complete the continuous flight of an ornithopter. With over four years of hard work
  and dedication, he has created a carbon fiber and foam aircraft that weighs just under 43 kilograms and is capable of flapping its wings in an elegant flapping motion. Reichert has worked with Cameron
  Robertson and James DeLaurier, a retired professor and world expert on ornithopters, to create the Snowbird, which has a wingspan of 32 meters and cost over $200,000. The Snowbird is a significant achievement
  in aviation history, and it is likely that Reichert's achievement will be recognized by the Fédération Aéronautique Internationale and be donated to the Canada Aviation and Space Museum in Ottawa.
