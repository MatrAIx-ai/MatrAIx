  career_goals: Pedro dreams of becoming a mechanical engineer or robotics technician who designs reliable, practical machines. He is motivated by the idea of creating tools that help his family and community.
    In the short term, he aims to improve his coding skills using block‑based programming kits and to earn a science‑related merit badge through the Boy Scouts. He also hopes to master cooking simple traditional
    Mexican dishes to contribute at home, blending his love for routine with a desire to be helpful and dependable.
