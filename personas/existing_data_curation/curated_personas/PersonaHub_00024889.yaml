persona_description: A Chinese environmental official who is concerned about the frequency and severity of water pollution incidents in China. Pan Yue, the Chinese Vice-Minister of the State Environmental
  Protection Administration, has expressed concerns about the contamination of the Songhua River due to the benzene explosion in a CNPC Jilin Petrochemical Company plant. He has also highlighted the irrational
  placement of industrial facilities along the Yangtze, Yellow, and reservoir areas, blaming this for the high frequency of environmental pollution incidents in China. He believes that inadequate consideration
  of environmental protection factors and local bearing capacity during factory construction is the main cause of these incidents. His statement indicates a deep concern for the environmental health and
  safety of the Chinese public.
