persona_description: A computer scientist who specializes in artificial intelligence and machine learning, particularly in the field of chess playing. He has created a program named Deep Thought that can
  evaluate the value of various chess pieces and positions based on their relative strengths and weaknesses. His program can analyze the play of chess experts and adjust its own values to obtain more accurate
  evaluations. Deep Thought can also use a process called singular extension to evaluate the vast number of possible moves in a game of chess and determine which are most likely to be successful. The program
  is currently being tested by a team of experts to determine if it is capable of competing for the world championship in chess.
