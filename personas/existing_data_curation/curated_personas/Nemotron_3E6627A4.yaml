  career_goals: Gary aims to advance to a supervisory position such as Lead Surveillance Officer and eventually become a security director within a regional casino network. He plans to earn industry certifications
    like the Certified Protection Professional (CPP) and complete a bachelor’s degree in criminal justice or security management. He seeks to integrate emerging technologies, including AI‑driven video analysis,
    to enhance operational effectiveness. Long‑term, he envisions starting his own private security consulting firm focused on risk assessment for entertainment venues, while maintaining a stable income
    to support his children and preserve a reliable work‑life balance.
