personas:
  professional: Mariacristina Kongkaew is an emerging teenage illustrator and self‑taught Python programmer who leverages the strategic thinking honed from chess and Civilization to meticulously plan graphic
    novel storyboards, balancing school responsibilities with late‑night sketch sessions while constantly experimenting with new anime‑inspired visual styles.
  sports: Mariacristina Kongkaew splits time between the high school volleyball squad, a Saturday junior swimming club, and avidly follows Manchester United in the Premier League and the Los Angeles Lakers
    in the NBA, using the discipline from these sports to keep a modest cardio routine despite a screen‑heavy lifestyle.
  arts: Mariacristina Kongkaew spends evenings sketching scenes inspired by Hayao Miyazaki’s whimsical storytelling and Makoto Shinkai’s vibrant palettes, often listening to lo‑fi beats by Lofi Girl and
    indie pop tracks from Clairo while binge‑watching Attack on Titan for visual references.
  travel: Mariacristina Kongkaew prefers meticulously planned short trips that blend cultural immersion with creative inspiration, such as a weekend in Kyoto’s historic Gion district, a week‑long backpacking
    adventure through Chiang Mai’s night bazaars, and a family road‑trip to the Grand Canyon where they sketch the canyon’s vistas with a pocket‑size sketchbook.
  culinary: Mariacristina Kongkaew enjoys moderate cooking skills, eagerly assisting with homemade pho broth simmered for twelve hours and mango sticky rice topped with ripe mango slices, while also mastering
    quick‑cook spicy ramen with sliced bok choy and a dash of sriracha, and they never skip a late‑night miso soup snack.
  core: Mariacristina Kongkaew is a quietly driven teen who fuses a love for anime‑style illustration, strategic gaming, and coding with a disciplined yet solitary lifestyle, balancing meticulous organization
    with bursts of creative spontaneity.
background:
  cultural: Mariacristina is a first‑generation American of mixed Vietnamese and Thai descent. Her parents immigrated to the United States and maintain a bilingual household where English, Vietnamese, and
    some Thai are spoken. Growing up in Lilburn, GA—a suburb with a vibrant Southeast Asian community—she celebrates both Tet (Vietnamese Lunar New Year) and Songkran (Thai New Year), attending local cultural
    festivals, community dance workshops, and weekend language classes. Her family emphasizes education, respect for elders, and the preservation of cultural traditions while encouraging her to explore
    contemporary American life. This blend of cultures informs her artistic sensibilities, culinary tastes, and her desire to create work that reflects a multicultural perspective.
