    and photo editing'', ''Listening to indie pop/lo‑fi music'', ''Cooking traditional Vietnamese and Thai dishes'', ''Attending small book club meetings'', ''Practicing Vietnamese language skills'']'
  career_goals: Looking ahead, Mariacristina aspires to merge her love for art and technology by pursuing a career as a creative technologist or interactive media designer. She hopes to attend a university
    with strong programs in Computer Science and Fine Arts, eventually working on immersive digital experiences that tell culturally nuanced stories. In the short term, she aims to deepen her coding skills,
    build a portfolio of digital artwork, and secure an internship or mentorship with a local design studio. She also dreams of using her multicultural background to develop content that bridges Vietnamese,
    Thai, and American narratives, perhaps through video games or interactive documentaries.
