  career_goals: Philip aims to transition into a principal engineer or software architect role within the next five years, focusing on building scalable, resilient systems that serve both commercial products
    and community‑oriented projects. He aspires to lead a cross‑functional team that pioneers the integration of AI/ML capabilities into existing services while maintaining the high reliability standards
    he values. He also plans to contribute to open‑source initiatives related to cloud infrastructure and sustainability, and to mentor emerging talent through local coding bootcamps and STEM outreach programs.
    In the longer term, Philip envisions establishing a tech consultancy that helps small businesses in the Pacific Northwest adopt modern, environmentally responsible digital solutions.
