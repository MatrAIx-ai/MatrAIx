personas:
  professional: Abel Espinosa, a 14‑year‑old aspiring musician and self‑taught game designer, discovers that they can blend sci‑fi storytelling with meticulous organization by composing cuatro pieces while
    collaboratively coding simple strategy games with a close circle of friends.
  sports: Abel Espinosa, a 14‑year‑old who plays in a local neighborhood baseball league, cheers for the Cangrejeros de Santurce, follows the Santurce Toros basketball club, and spends weekends hiking the
    Sierra de Cayey while maintaining a light jogging routine for stamina, they often balance team practice with solo training to stay flexible and organized.
  arts: Abel Espinosa, a 14‑year‑old budding artist who sketches cityscapes and comic heroes in a battered notebook, draws inspiration from street murals and the vibrant rhythms of Bad Bunny, Residente,
    and classic salsa legend Celia Cruz, and regularly records and shares original cuatro arrangements on social media, blending traditional folk tones with modern reggaetón beats as they explore both solo
    creation and collaborative jam sessions.
  travel: Abel Espinosa, a 14‑year‑old who prefers short, adventure‑filled trips with a handful of friends, has explored Old San Juan’s colorful streets, trekked the El Yunque rainforest, and dreams of
    visiting the historic plazas of Cartagena, the neon buzz of Tokyo, and the coastal cliffs of Cinque Terra, they always balance school responsibilities with these cultural getaways and plan each journey
    with a mix of spontaneity and careful budgeting.
  culinary: Abel Espinosa, a 14‑year‑old who enjoys cooking arroz con gandules and pastelón for family gatherings, makes a seasonal batch of coquito during holidays, experiments with homemade mango salsa,
    and pairs meals with fresh batata chips, they also indulge in occasional pizza slices and sushi rolls while striving to perfect their own island‑flavored recipes.
  core: Abel Espinosa, a curious yet practical 14‑year‑old, balances solitary creativity on the cuatro with collaborative video‑gaming, saves meticulously, battles mild asthma, and they secretly hoard comic
    books under their bed.
background:
  cultural: Abel is a Puerto Rican teenager raised in Aguas Buenas, a municipality known for its verdant hills, natural springs, and close‑knit neighborhoods. His household primarily speaks Spanish, with
    English taught at school, giving him a bilingual foundation. Family traditions such as preparing arroz con gandules, drinking coquito during holiday celebrations, and dancing to plena and salsa music
    are integral to his upbringing. The community’s collective response to events like Hurricane Maria instilled in him a sense of resilience and solidarity. Local pastimes—baseball, playing the cuatro,
    and attending the town’s patron saint festivals—have shaped his social life. He also embraces contemporary Puerto Rican culture through reggaetón and digital media. These cultural threads influence
    his values of family, community service, and pride in his island heritage.
