  hobbies: '[''Reading science‑fiction novels'', ''Playing and composing on the cuatro'', ''Sketching landscapes and comic characters'', ''Hiking trails in the Sierra de Cayey'', ''Developing simple Python
    programs'', ''Playing baseball with neighborhood friends'', ''Multiplayer strategy video gaming'']'
  career_goals: Abel envisions a future where he can merge his love of technology with a commitment to his community. He aspires to study computer science or engineering at a university, aiming to become
    a software developer who designs tools that improve everyday life in Aguas Buenas, such as apps for local farmers or disaster‑response platforms. He also entertains the idea of environmental engineering,
    hoping to contribute to sustainable development and preserve the natural springs of his hometown. While ambitious, he remains grounded, recognizing the need for solid education and practical experience,
    and he plans to take advanced courses, participate in robotics clubs, and seek mentorship from local professionals.
