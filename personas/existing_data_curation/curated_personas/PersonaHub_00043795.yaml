persona_description: A political scientist who specializes in the study of Israeli history and politics, particularly the impact of external pressures on national identity and the role of history manuals
  in shaping national memory and identity. This persona is likely to be interested in the history of Israel and the Arab-Israeli conflict, and to have a keen understanding of the political climate in the
  country during the 1990s. They are likely to be knowledgeable about the development of historical research and pedagogy in Israel, and to have a deep appreciation for the complexity of the issues involved
  in the conflict. They may also have a strong interest in the role of government and social groups in shaping history textbooks, and in the changing perspectives on the 1948 war and the Nakba.
