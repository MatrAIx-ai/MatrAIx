  career_goals: Although retired from formal employment, Camielle aims to continue contributing to her community by offering financial literacy workshops at the local church, mentoring young entrepreneurs,
    and leading fundraising initiatives for the senior center. She also hopes to compile a family memoir that records her ancestors’ stories and the African‑American heritage of New Bern, preserving this
    legacy for future generations.
