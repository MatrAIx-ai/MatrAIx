personas:
  professional: Camielle Thurman, a retired business administrator with a flair for meticulous budgeting, now channels her expertise into orchestrating church financial literacy workshops, coordinating
    senior center fundraisers, and mentoring budding entrepreneurs, all while serving as the go‑to organizer for community events.
  sports: Camielle Thurman finds her cardio in sunrise walks along the Neuse River with the Riverwalk Walking Club, cheers on the nearby Carolina Mudcats baseball team, and participates in a seasonal community
    bridge‑toss competition that blends light exercise with social camaraderie.
  arts: Camielle Thurman blends her love of gospel through the church choir with a devotion to Southern storytelling, often quoting works by Tayari Jones and listening to live performances by folk legend
    Emmylou Harris, while attending quarterly quilting exhibitions at the local arts council.
  travel: Camielle Thurman prefers short, purposeful trips—driving to historic Savannah for its riverfront tours, taking a weekend ferry to Charleston’s historic district, and dreaming of a leisurely cruise
    through the Chesapeake Bay whenever her savings permit and her grandchildren’s schedules align.
  culinary: Camielle Thurman delights in crafting crispy fried chicken seasoned with paprika and garlic, slow‑cooked collard greens simmered with smoked ham hocks, and sweet potato pie spiced with nutmeg
    and cinnamon, often adding fresh garden herbs like basil and thyme for an extra flourish.
  core: Camielle Thurman is a routine‑loving, garden‑to‑table hospitality enthusiast who balances meticulous financial stewardship with heartfelt community service, occasionally forgetting medication but
    never missing a Sunday potluck.
background:
  cultural: Camielle identifies as African‑American with deep roots in the coastal region of North Carolina. Her family has been part of the New Bern Black community for generations, maintaining traditions
    of church fellowship, oral storytelling, and Southern hospitality. She values the close‑knit support network of her church, the legacy of civil‑rights activism in her neighborhood, and the cultural
    significance of Southern cuisine, gospel music, and community service that have shaped her identity.
