personas:
  professional: Anita Mills, a meticulous credit counselor and loan officer, leverages their analytical precision and love for routine to deliver methodical budgeting plans while maintaining a calm, supportive
    demeanor for anxious clients.
  sports: Anita Mills enjoys low‑impact fitness, attending sunrise yoga classes at the Fruitland Park community center, joining a local walking club for weekend trail hikes, and cheering on the Tampa Bay
    Buccaneers every fall football season, where they proudly wear the team colors.
  arts: Anita Mills cultivates their artistic side by binge‑watching classic family films like The Sound of Music and Little Miss Sunshine, savoring the storytelling of director Frank Capra, listening to
    soothing folk melodies by Joan Baez, immersing themselves in personal‑development books by Brené Brown, and solving daily crossword puzzles for mental stimulation.
  travel: Anita Mills plans vacations with a spreadsheet, favoring budget‑friendly weekend road trips to the Blue Ridge Parkway and Savannah’s historic district, while dreaming of a future spring getaway
    to the lavender fields of Provence, where they hope to unwind with a quiet mind.
  culinary: Anita Mills, a confident home baker, spends Saturday mornings perfecting sourdough loaves with rye flour and wild yeast, crafting rosemary focaccia using vegetables from their own garden, and
    indulging in cinnamon‑swirl pastries flavored with butter, brown sugar, and a pinch of cardamom.
  core: Anita Mills is a routine‑loving credit counselor who balances meticulous financial stewardship with anxiety‑driven self‑care rituals—from garden‑to‑oven baking to gentle yoga—while they juggle a
    penchant for over‑planning and late‑night puzzle marathons.
background:
  cultural: Anita is a white Floridian raised in a middle‑class, Anglo‑European family with deep roots in the Gulf Coast region. Her upbringing emphasized traditional values, practicality, and community
    service, often centered around her local church and neighborhood events. She grew up with a strong work ethic, placing importance on stable employment, family responsibility, and helping others, which
    continues to shape her professional and personal life.
