  career_goals: Anita aims to advance to a senior loan officer or branch manager position within the next five years, obtaining professional certifications such as Certified Credit Counselor (CCC) and the
    Certified Financial Services Counselor (CFSC). She hopes to lead a team of counselors, develop community‑focused financial education workshops, and eventually transition into a role that combines client
    counseling with program development to help underserved residents of Sumter County achieve financial stability.
