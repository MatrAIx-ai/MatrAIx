  career_goals: Francis aims to earn his GED within the next year, secure an apprenticeship in carpentry or automotive repair, and eventually launch a modest freelance handyman service that lets him blend
    his love of tinkering with a stable income. He envisions owning a small home in West Salem, providing a secure environment for his spouse, and continuing to learn new trades through hands‑on practice
    and community workshops. His long‑term ambition is to balance financial stability with the flexibility to choose projects that spark his curiosity.
