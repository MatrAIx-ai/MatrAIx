personas:
  professional: Francis Belmore, a 19‑year‑old aspiring handyman who blends a curious DIY spirit with a down‑to‑earth pragmatism, flips through online tutorials to patch up old furniture, tinker with engines,
    and troubleshoot computer glitches, while they embrace a relaxed approach to planning that lets them jump into projects on a whim, and their occasional assertiveness helps them negotiate tool shares
    at community workshops.
  sports: Francis Belmore, a 19‑year‑old who spends weekends angling with the West Salem Anglers Club, tunes into Oregon State Beavers football and Seattle Seahawks games, they join pick‑up basketball at
    the Salem community center in the spring, and keep fit by hauling firewood and fixing bikes, balancing a love for low‑key outdoor recreation with occasional team‑sport camaraderie.
  arts: Francis Belmore, a 19‑year‑old classic‑rock enthusiast who blasts Led Zeppelin, The Rolling Stones, and Fleetwood Mac from a portable speaker while working on projects, they relax to nature documentaries
    narrated by David Attenborough, and occasionally catch indie‑film screenings of the Coen brothers at the local community theater, letting music and visual storytelling fuel both their DIY creativity
    and quiet downtime.
  travel: Francis Belmore, a 19‑year‑old who favors spontaneous weekend road trips over rigid itineraries, they often drive to Cannon Beach on the Oregon Coast, hike around Crater Lake, explore Portland’s
    Saturday Market, and dream of a budget‑friendly backpacking adventure through the national parks of Utah, all while balancing a modest student budget and family obligations.
  culinary: Francis Belmore, a 19‑year‑old who cooks simple but hearty meals like grilled trout with lemon‑herb butter, beef chili seasoned with smoked paprika and cumin, and classic mac & cheese, enjoys
    experimenting with fresh herbs like rosemary and thyme, yet they often forget to defrost fish in time and occasionally burn toast, reflecting a practical yet occasionally careless kitchen style.
  core: Francis Belmore, a 19‑year‑old handyman‑in‑training, blends curiosity‑driven tinkering with a laid‑back pragmatism, they juggle spontaneous projects, a modest budget, occasional tool‑clutter chaos,
    and a lifelong love for classic rock and weekend fishing.
background:
  cultural: Francis grew up in West Salem, a small town in Medina County, Ohio, within a predominantly white, Midwestern working‑class community. The local culture emphasizes modesty, self‑reliance, strong
    family bonds, and a pragmatic approach to everyday life. He was raised with subtle Protestant values, participating in community church activities, county fairs, and neighborhood gatherings. This upbringing
    fostered an appreciation for hands‑on work, neighborly cooperation, and informal social ties, shaping his practical outlook and flexible attitude toward responsibilities.
