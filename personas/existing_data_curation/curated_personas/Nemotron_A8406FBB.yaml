  career_goals: Jason dreams of turning his love for art, storytelling, and technology into a future career. He aspires to become a multimedia artist or video game designer who can create immersive worlds
    that spark imagination in others. He is also intrigued by architectural design, envisioning spaces where creativity and function blend seamlessly. In the short term, he aims to deepen his digital art
    skills, learn more advanced coding (such as Python), and participate in youth art competitions and coding clubs, laying the groundwork for a career in creative media.
