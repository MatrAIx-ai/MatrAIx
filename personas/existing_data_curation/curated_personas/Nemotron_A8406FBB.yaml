personas:
  professional: Jason Marin is an aspiring multimedia storyteller who merges his vibrant fantasy sketches, intricate LEGO builds, and spontaneous keyboard compositions into comic strips, and they relish
    the process as a way to channel their boundless curiosity, structured creativity, and collaborative spirit.
  sports: Jason Marin plays forward for the Valrico Youth Soccer Club, cheers on the Tampa Bay Buccaneers and the Tampa Bay Lightning, spends summer afternoons swimming at the community pool, and they squeeze
    quick body‑weight circuits into his after‑school routine, embodying his energetic yet organized approach to fitness.
  arts: Jason Marin channels his imagination through vibrant fantasy drawings inspired by Studio Ghibli, writes comic strips echoing Neil Gaiman’s storytelling, improvises piano melodies reminiscent of
    Toby Fox’s game scores, and they perform in his school drama troupe where they admire Lin‑Manuel Miranda’s lyrical flair.
  travel: Jason Marin loves weekend adventures, from spontaneous bike rides to Clearwater Beach with friends to carefully planned family road trips to Legoland Florida and occasional excursions to Washington,
    D.C., while they dream of a future summer in Tokyo to explore anime culture, balancing relaxed beach vibes with immersive cultural experiences.
  culinary: Jason Marin enjoys crafting cheesy pepperoni pizza slices at home, whipping up banana‑strawberry smoothies with almond milk, and experimenting with taco night featuring seasoned ground beef,
    cilantro, and salsa after school, though they often forget to clean the kitchen, leaving a trail of flour footprints.
  core: Jason Marin is a 12‑year‑old imagination‑driven comic creator who can’t resist a new LEGO set, frequently loses track of time while perfecting fantasy sketches, and they habitually forget to water
    the houseplant their mom gave them.
background:
  cultural: Jason grew up in Valrico, a suburban community in Hillsborough County, Florida. His family traces its roots to Irish and German ancestry, and he was raised in a predominantly white, middle‑class
    neighborhood. The region’s Southern hospitality, combined with the multicultural atmosphere of nearby Tampa—featuring diverse festivals, Spanish language exposure at school, and a variety of cuisines—has
    shaped his worldview. He participates in local traditions such as church volunteer events, community sports games, and neighborhood block parties, while also appreciating the broader cultural influences
    that surround him.
