  career_goals: Jordan aims to transition from a junior sales representative to a senior sales engineer or solution architect within the next three years, eventually leading a regional sales team. He plans
    to earn certifications such as Certified Technology Sales Professional (CTSP) and Salesforce Advanced Administrator to deepen his expertise. Long‑term, he envisions starting his own consulting firm
    that helps small manufacturers adopt digital tools, leveraging his technical background and competitive drive. He also wants to develop strong leadership and mentoring skills to support newer colleagues
    while maintaining a work‑life balance that mitigates his anxiety.
