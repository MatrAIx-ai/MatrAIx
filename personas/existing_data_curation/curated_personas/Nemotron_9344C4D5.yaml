  hobbies: '[''Strategy video games (e.g., Civilization, StarCraft)'', ''Board game nights'', ''Hiking in the Poconos'', ''DIY electronics (Arduino/Raspberry Pi)'', ''Science‑fiction reading'', ''Tech podcasts'',
