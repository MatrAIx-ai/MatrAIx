personas:
  professional: Jordan Johnson is a junior sales representative for a tech solutions firm who leverages a solid background in mathematics, physics, and computer science to translate complex product specifications
    into compelling client proposals, using Salesforce and Tableau with meticulous preparation and a competitive drive to close deals while sprinting toward a senior sales engineer or solution architect
    role.
  sports: Jordan Johnson streams the Scranton/Wilkes‑Barre RailRiders baseball games, roots for the Philadelphia Eagles, lifts weights at a local gym with the Iron Titans club, hikes the Pocono foothills
    every other weekend with the Trailblazers hiking group, and joins occasional pickup basketball games with friends.
  arts: Jordan Johnson indulges in strategic board‑game nights with friends, devours sci‑fi novels by Neal Stephenson and Liu Cixin, listens to progressive electronic music from Daft Punk and alternative
    rock by Foo Fighters, and follows science‑tech podcasts like "Reply All" and "Wired Tech in Two" to stay creatively inspired.
  travel: Jordan Johnson prefers meticulously planned weekend getaways, often backpacking the Pocono Mountains or road‑tripping to New York City, while dreaming of a tech‑focused excursion to Tokyo and
    a historic tour of Berlin, balancing a modest travel budget with occasional splurges for flights that satisfy a curiosity about emerging tech hubs.
  culinary: Jordan Johnson enjoys grabbing a classic pepperoni pizza with extra mozzarella from the local pizzeria, snacking on warm soft pretzels drenched in cheese dip, and experimenting in the kitchen
    by crafting homemade pierogi stuffed with potato and cheddar, while occasionally tinkering with Arduino‑controlled sous‑vide devices to perfect a sous‑vide steak.
  core: Jordan Johnson is a methodical, fiercely competitive tech‑savvy sales rep who balances intense anxiety with disciplined routines, a love for strategic gaming, and a relentless drive to turn humble
    Scranton roots into a future consultancy empire.
background:
  cultural: Jordan grew up in Scranton, Pennsylvania, a city with a strong working‑class heritage rooted in coal mining and manufacturing. His family background reflects the region’s mix of Irish, Italian,
    and Polish ancestry, emphasizing hard work, community loyalty, and practical problem‑solving. The local culture of modesty, straightforward communication, and a love for regional sports such as the
    Scranton/Wilkes‑Barre RailRiders shaped his reliable and methodical nature. He celebrates typical American holidays and enjoys regional foods like pizza and pretzel‑styled snacks, while also appreciating
    the close‑knit community ethos that values self‑reliance and mutual support.
attributes:
