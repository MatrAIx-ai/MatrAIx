  career_goals: Tavera aims to complete her Bachelor of Science in Nursing (BSN) at the University of California, Irvine within the next two years while continuing to work part‑time as a registered nurse.
    She is drawn to pediatric acute care and community health nursing, and hopes to specialize in pediatric nursing or launch a community health clinic that incorporates art‑therapy and creative outreach
    for youth. Long‑term, she plans to earn a Master of Science in Nursing (MSN) to become a Pediatric Nurse Practitioner and eventually pursue a leadership role as a charge nurse or clinical nurse manager.
    Competitive by nature, she seeks recognition as a top performer, wishes to spearhead patient‑experience initiatives, and aspires to mentor the next generation of nurses while integrating technology
    and artistic expression into patient care.
