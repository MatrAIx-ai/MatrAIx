  hobbies: '[''Hiking the Ice Age Trail'', ''Cycling local bike paths'', ''Playing ultimate frisbee'', ''Participating in community improv theater'', ''Building Arduino and Raspberry Pi projects'', ''Experimenting
    with craft beer cooking pairings'', ''Reading science‑fiction novels'', ''Watching documentaries on emerging tech'', ''Traveling to national parks'']'
  career_goals: Cameron aims to become a department chair within the next three years, leveraging his organizational strengths to shape the school’s STEM pathway. He plans to earn a master's in educational
    leadership and obtain certification as a STEM instructional coach, positioning himself to mentor teachers district‑wide. Long‑term, he envisions directing a district‑level STEM innovation program, securing
    funding for state‑of‑the‑art makerspaces, and establishing community‑university partnerships that expand hands‑on learning opportunities for all students.
