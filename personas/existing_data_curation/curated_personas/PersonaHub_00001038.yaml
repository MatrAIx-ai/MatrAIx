persona_description: A scientist who is conducting research on the effects of warming on peatlands and the production of greenhouse gases, specifically methane. The scientist is using the Spruce and Peatland
  Responses Under Changing Environments (SPRUCE) experiment to study the response of peatlands to warming, and is particularly interested in the impact of warming on the production of plant-derived metabolites
  and the stimulation of methanogenesis. The scientist is likely to be a researcher in environmental science or biogeochemistry, with a focus on the study of the carbon cycle and the impact of climate change
  on ecosystems. They may have experience with soil sampling and analysis, as well as knowledge of microbial ecology and the metabolic pathways of plants and bacteria.
