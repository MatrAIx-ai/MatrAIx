  hobbies: '[''Reading historical non-fiction and business biographies'', ''Woodworking'', ''Vegetable gardening'', ''Morning hikes on coastal trails'', ''Online chess'', ''Listening to classical and jazz
    music'', ''Landscape photography'']'
  career_goals: In the next few years, Joel aims to become the head of the Business and Economics department, spearhead a school-wide career readiness initiative, and develop an after-school entrepreneurship
    incubator that connects students with local small businesses. He hopes to author a practical guidebook for high school business teachers that blends traditional concepts with modern digital tools. As
    he approaches retirement, he plans to transition into part‑time consulting for schools seeking to strengthen their financial literacy programs and to offer private tutoring for adult learners seeking
    basic business skills.
