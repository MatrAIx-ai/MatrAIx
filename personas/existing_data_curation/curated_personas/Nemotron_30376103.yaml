personas:
  professional: Georgina Davis, a seasoned master captain with two decades of piloting coastal ferries and cargo tugs, leverages her meticulous planning, crew leadership, and environmental stewardship to
    uphold rigorous safety standards while mentoring the next generation of mariners.
  sports: Georgina Davis channels her love of the water into weekend sailing on the Southern California coast, kayaking on local reservoirs, and hiking the Angeles National Forest trails, while cheering
    for the Los Angeles Dodgers and staying active in the LA Yacht Club’s racing squad.
  arts: Georgina Davis captures sunrise over the Pacific through analog photography inspired by Ansel Adams, fuels her salsa and swing nights with the rhythms of Buena Vista Social Club and the Count Basie
    Orchestra, and devours maritime histories by Patrick O'Brian during quiet evenings.
  travel: Georgina Davis favors meticulously planned coastal road trips—recently a photo‑filled journey along Highway 1 to Big Sur and a weekend sailing excursion to Catalina Island—while dreaming of future
    eco‑tour charters to the Galápagos and Mediterranean ports.
  culinary: Georgina Davis delights in cooking for gatherings, favoring herb‑infused grilled branzino, saffron‑laden paella, and homemade salsa verde, often sourcing fresh basil, thyme, rosemary, and lemon
    zest from her modest garden.
  core: Georgina Davis blends a captain’s precision with a social butterfly’s zest, navigating both sea routes and life’s complexities with a disciplined budget, a camera in hand, and a garden of herbs
    for any impromptu dinner.
background:
  cultural: Georgina was born and raised in suburban Southern California, where she absorbed a blend of classic American middle‑class values and the multicultural energy of Los Angeles County. Her family’s
    heritage is primarily Anglo‑American, and she celebrates traditional holidays such as Thanksgiving and Christmas, while also taking part in Glendale’s diverse community festivals. Growing up near the
    Pacific coast fostered a lifelong affinity for the water and the maritime world. Her upbringing emphasized hard work, practicality, and community involvement, shaping both her career as a ship captain
    and her outward‑looking, sociable personality.
attributes:
  skills: '["Maritime navigation", "U.S. Coast Guard Master Captain’s license", "Crew leadership and training", "Safety drill planning", "Vessel maintenance scheduling", "Emergency response coordination",
