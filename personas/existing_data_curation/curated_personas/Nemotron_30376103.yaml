  hobbies: '["Recreational sailing", "Kayaking on local reservoirs", "Hiking in the Angeles National Forest", "Marine photography", "Volunteer beach clean-ups", "Cooking for family and friends", "Social
    dancing (salsa, swing)", "Participating in yacht club events", "Reading maritime history", "Gardening"]'
  career_goals: Georgina aims to qualify for an ocean‑going Master Mariner license and transition to overseeing a fleet of larger commercial vessels. She aspires to become a senior fleet operations manager
    where she can influence safety standards and sustainability initiatives across the company. Mentoring the next generation of captains is a key ambition, and she is exploring a part‑time adjunct teaching
    role at the California Maritime Academy. In the longer term, she hopes to launch a family‑owned eco‑tour charter service that showcases Southern California’s coastline while promoting marine conservation.
