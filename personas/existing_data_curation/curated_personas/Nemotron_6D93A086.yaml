personas:
  professional: Carl Cummings is a 17‑year‑old aspiring tradesperson who leverages their practical automotive and electrical tinkering skills and disciplined schedule to pursue a GED and an apprenticeship,
    and they channel their competitive drive from video gaming into mastering systematic repair tasks, eyeing a future in the Navy’s engineering division.
  sports: Carl Cummings hoists a worn‑out Lakers jersey while playing in the community center basketball league, they follow the Golden State Warriors for strategic inspiration, and they spend weekends
    at the downtown skate park with the local Ramp Raiders crew.
  arts: Carl Cummings syncs PC‑building sessions to the pulsing beats of Daft Punk and the aggressive flow of Kendrick Lamar, they unwind with the cinematic scores of Hans Zimmer while occasionally streaming
    Christopher Nolan films for structural inspiration.
  travel: Carl Cummings prefers meticulously planned road trips, they have camped in the Great Smoky Mountains, explored the historic streets of New Orleans, and they dream of attending Tokyo’s gaming expo
    to merge their love of travel and competition.
  culinary: Carl Cummings whips up comfort food classics like bacon‑cheeseburger sliders, pepperoni pizza, and instant ramen seasoned with sriracha, they can fry a perfect egg and prefer a side of spicy
    jalapeños for extra kick.
  core: Carl Cummings is a routine‑obsessed, competition‑driven teen whose hands‑on tinkering, strategic gaming, and disciplined budgeting are punctuated by a perfectionist’s need to align PC cables flawlessly,
    and they often bite their nails during high‑stakes matches.
background:
  cultural: Carl grew up in a middle‑class, white family in the Washington, D.C. metropolitan area, with roots in the broader Mid‑Atlantic region. His father worked as a maintenance technician and his mother
    as a retail associate, instilling a strong work ethic and practical mindset. The diverse urban environment exposed him to many cultures, though his household emphasized traditional American values,
    routine, and self‑reliance. He attended local public schools but left before ninth grade, prompting his current focus on obtaining a GED. His cultural identity blends suburban working‑class sensibilities
    with the city’s multifaceted community landscape.
attributes:
  skills: '[''Automotive maintenance (oil changes, tire repair)'', ''Basic carpentry and home repairs'', ''Use of power tools'', ''Organizational and time-management'', ''Budgeting and personal finance
