  hobbies: '[''Model airplane/kit building'', ''Custom PC assembly'', ''Competitive multiplayer video gaming (e.g., League of Legends, Call of Duty)'', ''Basketball (community league)'', ''Skateboarding'',
    ''Neighborhood clean‑up volunteer work'', ''Weightlifting / fitness training'']'
  career_goals: Carl aims to secure a stable, hands‑on career that leverages his practical strengths and love for routine. In the short term he plans to obtain his GED and enroll in a trade apprenticeship,
    either in automotive technology or electrical work. He hopes to earn journeyman certification within five years, allowing him to work independently and possibly start his own repair business. He also
    considers joining the U.S. Navy’s engineering division to combine his competitive drive with technical training. Ultimately, he wants a reliable income that supports the organized lifestyle he values
    while offering opportunities for upward mobility.
