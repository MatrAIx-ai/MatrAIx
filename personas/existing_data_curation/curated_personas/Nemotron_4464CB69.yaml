    Knowledge'', ''Team Collaboration and Training'']'
  hobbies: '[''Photography (maritime and landscape)'', ''Visiting art galleries and museums'', ''Community theater participation'', ''Salsa dancing classes'', ''Volunteering at local festivals'', ''Hiking
    the Cape Cod National Seashore'', ''Gardening'', ''Listening to folk music live'', ''Reading contemporary fiction'', ''Podcasts on urban planning and art history'']'
  career_goals: She aims to advance within the regional transit authority, seeking a supervisory role such as senior driver trainer or route manager where she can shape policy, mentor new drivers, and improve
    service quality. Lisa also hopes to leverage her interest in art and community engagement by coordinating cultural outreach programs on buses, like traveling exhibitions or local artist spotlights.
    Over the next five years she plans to complete a certificate in transportation planning and possibly pursue a part‑time graduate course in urban studies, positioning herself for a future role in transit
    planning or advocacy. Financial security and independent decision‑making are top priorities as she builds a stable post‑divorce life.
