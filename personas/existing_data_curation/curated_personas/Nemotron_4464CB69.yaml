personas:
  professional: Lisa Pieto, a veteran commercial driver for the regional transit authority, leverages meticulous route‑planning skills, on‑the‑spot problem solving, and genuine curiosity about art to mentor
    new drivers, champion safety protocols, and prototype on‑board cultural outreach programs such as traveling mini‑exhibitions.
  sports: Lisa Pieto, an avid hiker of the Cape Cod National Seashore, joins the West Yarmouth Trail Club for weekend treks, cheers for the Boston Red Sox and the New England Patriots, and plays in a co‑ed
    recreational softball league every summer to stay fit and socialize.
  arts: Lisa Pieto, an enthusiastic photographer of Cape Cod shorelines, draws creative inspiration from Ansel Adams and local painter Alan O’Connor, performs in community theater workshops, dances salsa
    to the rhythms of Celia Cruz, and regularly attends folk shows featuring The Avett Brothers and Joan Baez, weaving these experiences into the stories they share with bus passengers.
  travel: Lisa Pieto, a planner who maps out each trip in a spreadsheet, loves weekend getaways to Provincetown, Martha’s Vineyard, and the historic streets of Boston, dreams of a summer in Cinque Terre,
    and balances these trips with a modest travel budget that prioritizes photography opportunities over luxury.
  culinary: Lisa Pieto, an intermediate home cook, relishes New England clam chowder, lobster rolls, and garden‑fresh ratatouille made with basil and thyme harvested from their backyard, and often pairs
    meals with a glass of local cranberry‑infused cider while listening to folk playlists.
  core: Lisa Pieto blends a methodical driver’s precision with an art‑fueled curiosity, balancing tight budgets, anxiety spikes, and a love for shoreline photography, salsa dancing, and community theater.
background:
  cultural: Lisa grew up in a working‑class, predominantly white New England community, where a strong sense of self‑reliance and neighborly support was valued. Her family’s roots trace back to Irish and
    English ancestry, and she was raised with the maritime traditions of Cape Cod—seasonal tourism, fishing, and a deep appreciation for the coastal environment. The local public schools emphasized civic
    participation, which fostered her sociable and community‑oriented nature. Living in West Yarmouth, she is familiar with the rhythms of a tourist‑driven economy, bilingual seasonal interactions (English
    and occasional service‑industry German/Spanish), and the region’s historic preservation efforts, all of which shape her worldview and daily life.
attributes:
