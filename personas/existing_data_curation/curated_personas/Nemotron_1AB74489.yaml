  hobbies: '[''Visiting art museums'', ''Sketching and watercolor painting'', ''Reading art history and philosophy'', ''Listening to classical and ambient music'', ''Hiking in the Laurel Highlands'', ''Kayaking
    on the Allegheny River'', ''Puzzle solving'', ''Woodworking'', ''Herb gardening'']'
  career_goals: Elizabeth aims to advance to a supervisory position within the correctional system, such as Deputy Warden, where she can shape institutional policy and mentor junior staff. She is particularly
    interested in expanding art‑based rehabilitation programs, leveraging her curiosity for unconventional ideas to integrate creative therapies into inmate education. To support these goals, she plans
    to pursue a master’s degree in criminal justice or correctional counseling and obtain additional certifications in correctional administration. Over the next five years, she hopes to lead a pilot program
    that reduces recidivism through structured educational and artistic interventions.
