personas:
  professional: Robert Jimenez is an aspiring civil engineer who channels his love for LEGO architecture and methodical planning into building intricate model structures, while his organized, reliable nature
    makes him the go‑to teammate in his Boy Scout projects.
  sports: Robert Jimenez loves playing forward on the Surprise Soccer Club's U‑8 team, enjoys weekend family outings to watch the Arizona Diamondbacks at Chase Field, and idolizes the Phoenix Suns, while
    their disciplined practice routine reflects their methodical and energetic personality.
  arts: Robert Jimenez immerses in the whimsical worlds of Pixar’s "Toy Story", draws his favorite comic hero Spider‑Man during free time, and listens to upbeat tracks by Imagine Dragons while constructing
    LEGO cityscapes that fuel their boundless imagination.
  travel: Robert Jimenez prefers short family road trips with a clear itinerary, relishes desert hikes in Sedona and splash‑pad adventures at Legoland California, and dreams of exploring the Grand Canyon’s
    rim and Disney World in Florida when they’re older.
  culinary: Robert Jimenez loves building his own nachos with shredded cheddar, jalapeños, and refried beans, can whip up a decent peanut butter‑banana sandwich, and eagerly helps his mom assemble chicken
    quesadillas with cilantro, lime, and a squeeze of hot sauce.
  core: Robert Jimenez is a bright, organized seven‑year‑old who balances a love for structured LEGO creations with boundless energy on the soccer field, yet they sometimes misplace their inhaler and forget
    to tidy up scattered crayons.
background:
  cultural: Robert grows up in a white, Anglo‑American family living in the suburban community of Surprise, Arizona. While his household observes classic American traditions—such as Thanksgiving, Fourth
    of July fireworks, and Halloween—it also enjoys occasional Southwest influences, like tasting tacos at family gatherings that reflect the Jiménez surname heritage. The local desert environment and close‑knit
    neighborhood foster community events, school activities, and outdoor adventures that shape his everyday life.
