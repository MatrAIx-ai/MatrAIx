  hobbies: '["Reading technical manuals","DIY home repairs","Classic car restoration","Fishing","Hiking in West Texas","Watching college football","Playing strategy board games","Collecting vintage tools","Attending
    local rodeos with spouse","Small-group social gatherings"]'
  career_goals: Brian aims to advance from sales associate to shift supervisor within the next year and ultimately become a store manager. He plans to earn his GED and complete a retail management certification
    to strengthen his leadership credentials. In the longer term, he dreams of opening a small general store or a hobby-focused shop that blends his love for DIY projects with community interaction, providing
    a stable income for his family and a platform for his entrepreneurial aspirations.
