personas:
  professional: Liana Cascante, a board‑certified optometrist in a family‑oriented practice, leverages meticulous eye‑health assessments, advanced OCT and corneal topography expertise, and a calm, structured
    bedside manner to build trust while championing low‑vision therapy and community outreach, balancing her organized nature with a deep concern for patients’ wellbeing.
  sports: Liana Cascante, a yoga‑practicing hiker, joins a modest local trail‑running group, follows the island’s baseball team Cangrejeros de Santurce during the summer season, and schedules weekend hikes
    in the Cordillera Central, viewing fitness as a structured stress‑relief routine.
  arts: Liana Cascante, a devoted attendee of bomba y plena festivals, draws inspiration from musicians like Andy Montañez, Vico C, and flamenco dancer Sara Baras, weaving rhythmic cadences into her crocheting
    sessions and finding solace in the storytelling narratives of author Esmeralda Santiago.
  travel: Liana Cascante meticulously plans her trips with a detailed itinerary, favoring weekend getaways to nearby coastal towns like Rincón and hikes in the Cordillera Central, while dreaming of a cultural
    immersion in Barcelona’s Gothic Quarter and the historic streets of Seville, balancing travel enthusiasm with family responsibilities.
  culinary: Liana Cascante, an enthusiastic home cook, expertly prepares mofongo with fried plantains and chicharrón, aromatic arroz con gandules seasoned with sofrito and cilantro, and crispy alcapurrias
    stuffed with seasoned ground beef, often seasoning dishes with fresh garden herbs like basil and thyme while occasionally over‑salting to satisfy her craving for bold flavors.
  core: Liana Cascante, a methodical optometrist who balances a love of garden‑grown herbs, meticulous eye‑care plans, and nightly yoga, yet habitually over‑thinks deadlines and occasionally indulges in
    late‑night telenovela marathons.
background:
  cultural: Liana identifies strongly with her Puerto Rican roots, having grown up in the rural town of San Sebastián within the Moca municipio. She is bilingual in Spanish and English, and her family traditions
    reflect a blend of Spanish colonial, African, and Taíno influences. Raised in a Catholic household, she participates in local fiestas patronales, parrandas, and community gatherings that emphasize family
    cohesion and mutual support. Her love for Puerto Rican music, cuisine, and storytelling underscores her commitment to preserving cultural heritage while navigating a modern professional life.
attributes:
  skills: '[''Comprehensive ocular examinations'', ''Contact lens fitting'', ''Pediatric optometry'', ''Low‑vision rehabilitation'', ''Vision therapy and orthoptics'', ''Use of OCT and corneal topography'',
    ''Electronic medical records management'', ''Patient education and counseling'', ''Quality assurance and infection control'', ''Community outreach program coordination'']'
  hobbies: '[''Yoga and mindfulness'', ''Backyard gardening'', ''Cooking traditional Puerto Rican cuisine'', ''Reading historical fiction and medical biographies'', ''Volunteer eye‑screening events'', ''Hiking
    in the Cordillera Central'', ''Attending bomba y plena festivals'', ''Journaling'', ''Crocheting'']'
  career_goals: Liana aims to broaden her clinical services by adding a dedicated low‑vision and vision‑therapy unit to her practice. She envisions opening a family‑oriented optometry clinic in Moca that
    integrates school‑based vision‑screening programs and affordable eye‑care for underserved residents. Professionally, she plans to become a certified specialist in myopia control, publish research on
    diabetic eye disease prevalence in Puerto Rico, and mentor junior optometrists through adjunct teaching at a local university. Balancing her ambition with personal well‑being, she seeks to establish
    a sustainable work‑life rhythm that limits stress and allows more quality time with her family.
