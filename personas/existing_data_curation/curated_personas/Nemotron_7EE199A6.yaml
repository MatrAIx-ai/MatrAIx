  hobbies: '[''Desert Hiking'', ''Reading Historical Fiction'', ''Cooking Southwestern Cuisine'', ''Volunteering at Senior Center'', ''Gardening Native Plants'', ''Yoga and Mindfulness'', ''Photography
    of Desert Landscapes'', ''Community Arts & Crafts Workshops'']'
  career_goals: Deidra aims to transition from managing a single facility to a regional leadership role that oversees multiple clinics across southeastern New Mexico. She is passionate about expanding telehealth
    services to serve isolated ranching families and wants to spearhead a pilot program that integrates mobile health units with existing hospital resources. In the next five years she plans to complete
    an MBA with a focus on healthcare innovation, positioning herself to drive strategic initiatives such as flexible staffing models and patient‑centered care pathways. Mentoring emerging health administrators
    and championing culturally responsive services for the growing Hispanic community are also central to her long‑term vision.
