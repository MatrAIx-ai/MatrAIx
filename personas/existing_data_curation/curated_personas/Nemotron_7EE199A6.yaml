personas:
  professional: Deidra Obeid is a healthcare administrator who transforms intricate HIPAA and state health regulations into patient-focused workflows, using their blend of curiosity and practicality to
    oversee a medium-sized medical facility while navigating occasional disorganization with a calm, flexible style.
  sports: Deidra Obeid enjoys early‑morning desert trail runs, practices yoga three times weekly, maintains a casual membership in the Albuquerque Trail Runners club, roots for New Mexico United soccer
    and the New Mexico State Aggies basketball teams, and prefers low‑pressure fitness over strict regimented training.
  arts: Deidra Obeid immerses themselves in historical fiction by authors like Philippa Gregory and L. M. Mack, captures the stark New Mexico landscape in photograph series inspired by Ansel Adams, and
    leads simple arts‑and‑craft workshops for seniors while humming to the folk‑rock of Bruce Springsteen and appreciating the desert serenity of Georgia O'Keeffe's paintings.
  travel: Deidra Obeid prefers spontaneous road trips that weave through Carlsbad Caverns, White Sands National Park, and the Grand Canyon, enjoys planning loosely around a core itinerary, and dreams of
    trekking Patagonia’s Torres del Paine and exploring Kyoto’s temples when time and budget allow.
  culinary: Deidra Obeid experiments with southwestern cuisine, regularly cooking green chile enchiladas, prickly pear salsa, and roasted yucca while skillfully crafting blue‑corn tortillas and occasionally
    improvising with unexpected ingredients like cactus flower or smoked mesquite for a unique twist.
  core: Deidra Obeid is a calm, curiosity‑driven healthcare leader who balances flexible, low‑key planning with a love for desert hikes, historic tales, spontaneous cooking, and mindful self‑care, all while
    occasionally letting disorganization slip into their schedule.
background:
  cultural: Deidra was raised in a traditional white, Midwestern family that valued self‑reliance, community involvement, and a pragmatic approach to everyday life. Moving to Hobbs for her career introduced
    her to the rich Hispanic and Native American heritage of the Southwest, which she has embraced through local food, festivals, and bilingual community outreach initiatives. Her humanities education fostered
    an appreciation for diverse narratives, and she often integrates this cultural awareness into both her professional projects and personal pursuits, creating a blend of classic Anglo‑American values
    with the vibrant, multicultural fabric of New Mexico.
attributes:
  skills: '[''Healthcare Operations Management'', ''Staff Scheduling and Team Leadership'', ''Budgeting and Financial Planning'', ''Regulatory Compliance (HIPAA, State Health Laws)'', ''Quality Improvement
