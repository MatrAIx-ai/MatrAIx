personas:
  professional: Berenise Qazi, a 15‑year‑old budding mixed‑media illustrator, blends traditional inks with digital textures, channeling their curiosity and disciplined organization into collaborative mural
    projects for the school’s art club; they often stay up late perfecting details.
  sports: Berenise Qazi enjoys weekend hikes with the local Wyoming Trails club, follows the Denver Broncos in the NFL and the Wyoming Cowboys in college football, and in winter swaps hiking boots for a
    snowboard on nearby slopes, balancing a love for outdoor adventure with a casual fandom for professional sports; they often plan hikes around team game schedules.
  arts: Berenise Qazi immerses themselves in drawing, photography, and graphic novels, drawing inspiration from artists like Frida Kahlo, illustrator Alan Lee, and filmmaker Hayao Miyazaki, while their
    playlists range from traditional folk songs heard during family gatherings to indie rock bands such as Arctic Monkeys, shaping a hybrid visual and auditory aesthetic; they regularly experiment with
    blending ink and digital textures.
  travel: Berenise Qazi plans trips that blend family road‑trips to places like Yellowstone and Grand Teton with occasional fly‑overs to a bustling southern capital and a historic colonial city famous for
    its vibrant markets, to connect with familial roots and explore street‑food scenes, preferring a mix of structured itineraries and spontaneous detours on a modest teen budget; they often document each
    journey with a camera and sketchbook.
  culinary: Berenise Qazi cooks at an intermediate level, mastering classic dishes such as tamales, pozole, and chilaquiles while experimenting with twists like mole‑marinated chicken tacos with nopales,
    always reaching for chili varieties, corn masa, and fresh cilantro to add bold flavor; they sometimes over‑salt recipes in their eagerness to perfect taste.
  core: Berenise Qazi is a curious teen artist who balances disciplined schoolwork with spontaneous creative experiments, often staying up late perfecting ink‑and‑digital blends while juggling a modest
    allowance, allergies, and a love for hiking.
background:
  cultural: Berenise comes from a Mexican‑American family with roots in Jalisco. At home, Spanish is spoken alongside English, and she celebrates cultural traditions such as Día de los Muertos, Mexican
    Independence Day, and family gatherings featuring homemade tamales and pozole. Living in Rock Springs, she blends these customs with the rural, open‑space lifestyle of Wyoming, finding inspiration in
    both desert sunsets and vibrant Mexican colors. Her bicultural experience informs her artistic perspective, encouraging her to explore themes of identity, migration, and the convergence of different
    landscapes.
attributes:
  skills: '[''digital illustration'', ''bilingual communication (Spanish/English)'', ''basic video editing'', ''creative writing'', ''research & information synthesis'', ''bullet journaling'', ''basic coding
    (Scratch)'', ''outdoor navigation'']'
  hobbies: '[''digital and traditional drawing'', ''mixed‑media experimentation'', ''reading graphic novels and sci‑fi'', ''photography of nature and landscapes'', ''listening to diverse music'', ''cooking
    family recipes with creative variations'', ''participating in school art club projects'']'
  career_goals: Berenise aspires to become a multimedia artist who tells stories that bridge her Mexican heritage with the landscape of the American West. She aims to attend a specialized art high school
    or later a university program in graphic design or visual arts, with a long‑term goal of curating community art projects and cultural exhibitions that celebrate diversity. She also hopes to develop
    a personal portfolio that could lead to freelance illustration work or collaborations with local galleries.
