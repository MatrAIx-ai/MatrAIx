  hobbies: '[''sketching'', ''photography'', ''playing acoustic guitar'', ''hiking'', ''snowboarding'', ''attending live music'', ''community theater'', ''volunteering at library'', ''cooking Italian dishes'']'
  career_goals: Shawn aims to enroll in a bachelor's program in Communications or Visual Arts, focusing on community-based storytelling and nonprofit outreach. He aspires to work as a community arts coordinator
    or a social media strategist for environmental NGOs, creating inclusive cultural events that connect diverse groups. Long‑term, he hopes to lead a regional arts center or launch a social enterprise
    that blends creative media with environmental advocacy, while also building a freelance portfolio in photography and graphic design.
