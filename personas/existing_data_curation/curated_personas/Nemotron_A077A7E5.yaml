personas:
  professional: Shawn Scialabba is a budding community arts coordinator in training, merging graphic design, photography, and social media savvy to craft inclusive storytelling projects for environmental
    NGOs, while their curiosity and balanced work style keep them reliable yet adaptable in group initiatives.
  sports: Shawn Scialabba embraces the outdoors with weekend hikes in the Green Mountains and seasonal snowboarding at Stowe, follows the University of Vermont Catamounts basketball team, and enjoys occasional
    pickup soccer games at the local recreation center, balancing cardio with a love for fresh mountain air.
  arts: Shawn Scialabba immerses themselves in creative expression by sketching urban street scenes, photographing sunrise over Lake Champlain, playing acoustic renditions of Bob Dylan and local folk bands,
    and regularly volunteering at community theater productions, drawing inspiration from contemporary photographer Alex Webb and indie musician Phoebe Bridgers.
  travel: Shawn Scialabba prefers spontaneous road trips across New England, has already explored Acadia National Park and hopes to trek the Swiss Alps, plans trips on a modest student budget using discount
    travel sites, and balances adventure with occasional downtime at a seaside cottage in Cape Cod.
  culinary: Shawn Scialabba enjoys cooking at an intermediate level, often preparing pasta carbonara, homemade bruschetta with fresh basil, and a rustic lasagna, while experimenting with seasonal Vermont
    maple syrup as a glaze, and they frequently source ingredients from the local farmer’s market.
  core: Shawn Scialabba blends artistic curiosity with community spirit, juggling sketchbooks, guitar strings, and a careful budget while wrestling with anxiety and a habit of over‑booking social events.
background:
  cultural: Shawn grew up in a predominantly white New England environment with strong Italian‑American roots reflected in family traditions like Sunday pasta meals and folk music. Living in Colchester,
    Vermont, he has been influenced by the region's love for nature, outdoor recreation, and a supportive local arts community. His upbringing blends the modest, community‑oriented values of rural New England
    with the warmth and cultural pride of his Italian heritage.
