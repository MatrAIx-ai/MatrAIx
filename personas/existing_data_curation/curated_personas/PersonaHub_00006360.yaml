persona_description: A scientist or researcher who specializes in the study of radiation and its effects on cancer cells, particularly in the context of high LET radiation and cancer stem cells. They are
  interested in understanding the role of radiation in targeting cancer stem cells and reducing tumour recurrence. They are likely to have expertise in cancer biology, cell biology, and radiation biology.
  They may also have experience in developing and using cell lines and animal models to study radiation effects on cancer cells. They are interested in developing new treatments and therapies that can overcome
  radioresistance and target cancer stem cells.
