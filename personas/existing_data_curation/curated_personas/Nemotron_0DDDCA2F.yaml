  career_goals: In the short term, Diane aims to win her middle‑school art competition, expand her YouTube channel with more polished video edits, and take on leadership roles in the drama and debate clubs.
    She hopes to enroll in a specialized high‑school program that blends visual arts with technology, such as a magnet school for digital media. Long‑term, she dreams of becoming a multimedia designer or
    video‑game developer, eventually leading creative projects that fuse her love of unconventional ideas, storytelling, and competitive design. She envisions turning her social‑media presence into a professional
    platform and hopes to mentor other kids who share her curiosity and independent spirit.
