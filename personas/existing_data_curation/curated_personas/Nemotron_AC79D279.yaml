personas:
  professional: Jon Keeter, a budding junior game developer, spends afternoons turning their Scratch projects into mini soccer simulations, channeling their love of structure into clean, block‑based code
    while delighting classmates with frequent demo presentations.
  sports: Jon Keeter, a competitive member of the Riverside Rovers youth soccer team and a regular at the community pool's swimming lessons, cheers loudly for the Seattle Seahawks during NFL games and idolizes
    Lionel Messi’s dribbling, while also trying to emulate swimmer Michael Phelps’s stroke technique during practice.
  arts: Jon Keeter, an enthusiastic participant in school theatre productions, loves performing leading roles in plays like "Matilda" and idolizes actor Lin‑Manuel Miranda for his lyrical storytelling,
    while also devouring adventure novels by Rick Riordan and listening to Taylor Swift’s upbeat tracks while building LEGO landmarks.
  travel: Jon Keeter, an inquisitive beach‑comber, enjoys family trips to the sandy shores of Myrtle Beach collecting shells, dreams of snorkeling at the Great Barrier Reef, and hopes to explore the tropical
    mangroves of the Florida Keys where they can study marine life up close.
  culinary: Jon Keeter, a budding home‑chef who can flawlessly whip up peanut‑butter‑jelly sandwiches and buttery scrambled eggs, delights in making homemade pizza topped with pepperoni, mozzarella, and
    a sprinkle of basil, and often mixes fruit salads featuring mango, pineapple, and blueberries for after‑school snacks.
  core: Jon Keeter, a structure‑loving, spotlight‑seeking nine‑year‑old, balances meticulous LEGO building with spontaneous soccer scrambles, hoards allowance in a piggy bank, and habitually forgets to
    do homework until the last minute.
background:
  cultural: Jon comes from a middle‑class white Anglo‑American family that lived in the Midwest before moving to Naples, Florida. He attends a local public elementary school where the community emphasizes
    outdoor activities, beach culture, and a strong focus on education. His family celebrates typical American holidays and enjoys the coastal lifestyle, often incorporating beach outings and marine‑themed
    learning into his upbringing.
