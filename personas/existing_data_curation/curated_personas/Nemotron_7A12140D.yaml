personas:
  professional: Xiomara Capistran, a precocious two‑year‑old who treats preschool routines like a budding project manager, orders block towers by size and color, and they thrive on clear schedules, quietly
    asserting themselves when a favorite activity is skipped.
  sports: Xiomara Capistran, a two‑year‑old who eagerly participates in the Tiny Tots Soccer Club’s Saturday morning sessions and watches the Los Angeles Dodgers on TV, they favor structured play over chaotic
    free‑running, often mimicking pitcher wind‑ups with a plastic bat.
  arts: Xiomara Capistran, a two‑year‑old who hums Raffi’s 'Baby Beluga' while arranging picture books, they find calm in the familiar melodies of Disney’s 'Let It Go' and delight in the animated antics
    of the Muppets, shaping their early sense of creativity.
  travel: Xiomara Capistran, a two‑year‑old who enjoys planned outings such as a weekend day trip to the Grand Canyon’s visitor center and a family vacation to Orlando’s Disney World, they thrive on the
    routine of packed diaper bags and scheduled nap times, yet they sometimes resist the unfamiliar sounds of crowded airports.
  culinary: Xiomara Capistran, a two‑year‑old with a pronounced love for buttery macaroni and cheese, sweet banana slices, and crispy chicken nuggets, they insist on scooping peas with a tiny spoon, rejecting
    mushy oatmeal but embracing crunchy apple sticks and the bright red ketchup.
  core: Xiomara Capistran, a structured yet shy two‑year‑old who balances a love for predictable routines with occasional assertive bursts, they delight in building tidy block towers, saving pennies, and
    humming familiar lullabies while navigating the world through quiet curiosity and occasional stubbornness.
background:
  cultural: Xiomara is raised in a Guatemalan‑American household in Plainfield, NJ. Spanish is spoken at home alongside English, giving her a bilingual foundation. Her family observes traditional Guatemalan
    celebrations such as Semana Santa, Día de los Santos, and shares customary foods like tamales, pupusas, and atol de elote during gatherings. Cultural values of family cohesion, respect for elders, and
    communal sharing influence her daily routines and the emphasis on caring for others, reinforcing her cooperative yet assertive personality.
attributes:
  skills: '["Basic Spanish and English vocabulary", "Ability to follow simple daily routines", "Fine motor coordination (stacking blocks, turning pages)", "Gross motor skills (walking, climbing stairs)",
