  hobbies: '["Playing with wooden blocks", "Listening to Guatemalan lullabies and folk songs", "Coloring with crayons", "Exploring the local park", "Pretend play with kitchen toys", "Reading picture books
    with parents", "Participating in family cooking sessions (helping stir)"]'
  career_goals: While still a toddler, Xiomara’s nascent ambitions are shaped by her love of routine and helping others. She looks forward to attending preschool where structured learning can further her
    language and counting skills. She often repeats that she wants to be a teacher or a caregiver later, imagining a role where she can organize activities, guide friends, and create a safe, predictable
    environment—aligning with her practical and compassionate nature.
