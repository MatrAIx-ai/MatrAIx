personas:
  professional: Mayra Aguilar, a budding robotics enthusiast, applies their disciplined, detail‑oriented mindset to designing LEGO Mindstorms projects and leads their school’s mini‑team with a competitive
    edge.
  sports: Mayra Aguilar, who swims twice weekly at the local community pool and practices gymnastics during the school term, follows the Los Angeles Dodgers with the same competitive intensity they bring
    to chess, and plays on the Riverside Elementary after‑school swim team.
  arts: Mayra Aguilar, who spends evenings immersed in the lively trumpets of Mariachi Los Camperos and the mystery plots of Agatha Christie, often sketches clues on paper and models scenes with LEGO, and
    they find inspiration from the intricate set designs of director Guillermo del Toro.
  travel: Mayra Aguilar prefers meticulously planned weekend trips with a clear itinerary, has enjoyed a family road trip to the Grand Canyon and a short visit to Washington, D.C., and now daydreams about
    a summer adventure to Tokyo’s tech districts where they can see robots in action.
  culinary: Mayra Aguilar, an enthusiastic junior chef, loves perfecting their grandparents’ homemade tamales made with masa, pork, and red chilies, often adding a pinch of cumin to quesadillas and savoring
    the fragrant cilantro‑laden salsa they serve together.
  core: Mayra Aguilar, a detail‑driven ten‑year‑old with a passion for puzzles, balances a fierce competitive streak with a love for quiet, structured hobbies, often staying up late to finish a Sudoku because
    they crave order.
background:
  cultural: Mayra comes from a Mexican‑American family that maintains strong ties to its heritage. She speaks Spanish fluently with her parents and grandparents, celebrates Día de los Muertos and Mexican
    Independence Day with traditional foods, music, and crafts. Her family’s emphasis on education and respect for elders shapes her disciplined attitude. The cultural value of "familismo" reinforces her
    sense of responsibility toward her family, while the Mexican tradition of storytelling fuels her love for reading. Living in Fort Worth, Texas, Mayra navigates both Mexican cultural practices at home
    and the broader American school environment.
attributes:
  skills: '["Mathematics (basic algebra)", "Reading comprehension", "Organizational skills", "Basic coding (Scratch)", "Chess strategy", "Bilingual communication (Spanish/English)", "Project planning for
