  career_goals: Mayra dreams of a career that combines her love for order, problem‑solving, and helping others. She aspires to become a civil engineer or an architect, envisioning herself designing safe,
    efficient structures for her community. She also expresses an interest in becoming a teacher or a librarian, roles where she can organize information and mentor younger students. Her competitive nature
    drives her to aim for academic scholarships and science fairs.
