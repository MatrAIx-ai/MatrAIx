persona_description: A wildlife conservation expert with extensive experience in monitoring and combating illegal wildlife trade, particularly in Nepal's national parks. They have worked with WWF to introduce
  unmanned aerial vehicles (UAVs) to monitor wildlife and combat poaching, and have contributed to the successful pilot test of the UAVs in the Bardia National Park. They are passionate about protecting
  Nepal's natural heritage and have a unique understanding of the challenges faced by antipoaching patrols in remote and inaccessible areas.
