personas:
  professional: Hyang Chen is an aspiring digital illustrator who blends watercolors with Photoshop to create fantastical scenes, channeling their boundless imagination and collaborative spirit into school
    art projects and YouTube tutorials.
  sports: Hyang Chen enjoys weekend hikes along the Pacific coastline with the local youth outdoor club, follows the San Francisco Giants and the Seattle Seahawks, plays on the school’s co‑ed volleyball
    team, and balances energetic dance rehearsals with occasional surf lessons at the community beach.
  arts: Hyang Chen spends afternoons sketching in a sunlit corner of the school library while listening to the ambient piano works of Ludovico Einaudi and the dreamy pop of Billie Eilish, draws inspiration
    from the animated worlds of Studio Ghibli’s Hayao Miyazaki and the graphic novels of Neil Gaiman, and regularly participates in school drama productions that let them explore character‑driven storytelling.
  travel: Hyang Chen’s travel style mixes spontaneous weekend road trips to Redwood National Park with carefully planned family vacations to Tokyo and the coastal town of Cinque Terra, preferring a blend
    of adventure hiking and cultural immersion at local festivals, yet their allowance limits long‑haul trips to once a year.
  culinary: Hyang Chen loves experimenting with simple fusion dishes like avocado toast topped with miso‑glazed tofu, homemade ramen broth flavored with ginger and shiitake, and baking blueberry muffins
    while practicing calligraphy‑inspired plating, but they often forget to clean up the kitchen after a late‑night snack binge.
  core: Hyang Chen is a boundlessly creative 13‑year‑old who balances a love for fantasy storytelling with a habit of juggling school projects, pocket money, and spontaneous hikes, all while leaving a trail
    of unfinished sketchbooks and half‑finished recipes.
background:
  cultural: Hyang is a second‑generation Chinese‑American raised in Pacific Palisades. Her family maintains many Chinese cultural traditions, such as speaking Mandarin at home, celebrating Lunar New Year
    and the Mid‑Autumn Festival, and cooking family recipes. At the same time, she is immersed in the multicultural, artistic environment of Los Angeles, which broadens her perspective and influences her
    creative pursuits.
attributes:
  skills: '[''Digital illustration'', ''Traditional drawing'', ''Creative writing'', ''Basic programming (Scratch, Python)'', ''Group leadership'', ''Bilingual communication (Mandarin/English)'']'
