personas:
  professional: Mandy Mone, a 28‑year‑old freelance visual artist and aspiring cultural nonprofit designer, blends self‑taught illustration, digital painting, and graphic design expertise in Photoshop,
    Illustrator, and Procreate with a highly imaginative, organized‑yet‑flexible mindset that lets them craft abstract, concept‑driven visuals while confidently steering community art workshops and meeting
    client deadlines.
  sports: Mandy Mone, an avid hiker who joins the Pelham Trailblazers Hiking Club for weekend treks through New England’s rolling hills, also follows the Boston Red Sox, the Boston Celtics, and the New
    England Patriots with seasonal enthusiasm, and blends these passions with regular yoga sessions and casual jogs to sustain the stamina needed for long studio days.
  arts: Mandy Mone, a self‑taught visual artist, draws inspiration from the color fields of Mark Rothko, the immersive installations of Yayoi Kusama, and the contemporary digital surrealism of Bee Beeple,
    while loftily immersing themselves in indie folk sounds by Sufjan Stevens and Bon Iver during studio sessions, and regularly absorbs fresh perspectives at regional galleries featuring works by local
    New England painters.
  travel: Mandy Mone, a 28‑year‑old art enthusiast, plans meticulously for cultural excursions—like the historic streets of Boston, the maritime charm of Portland, Maine, and the contemporary art scene
    in Reykjavik, Iceland—while also allowing spontaneous weekend getaways to the White Mountains for sketching, balancing a modest travel budget with a desire to capture diverse visual inspirations.
  culinary: Mandy Mone, an intermediate home cook, favors seasonal New England fare such as roasted butternut squash risotto with sage, kale‑walnut salads drizzled with apple‑cider vinaigrette, and occasional
    miso‑glazed salmon, while often indulging in artisan coffee and handcrafted macarons from local bakeries, and they enjoy experimenting with fresh herbs like rosemary and thyme in their dishes.
  core: Mandy Mone channels boundless imagination into abstract art while habitually losing track of time in late‑night studio sessions, fueled by countless cups of coffee and a stubborn refusal to let
    deadlines curb their creative explorations.
background:
  cultural: Mandy grew up in a small New England town in New Hampshire, steeped in the region’s seasonal rhythms and community‑oriented culture. Her family background is primarily Anglo‑American, with a
    mix of early‑colonial and later European (Irish, German) ancestry, which is reflected in modest, self‑reliant values and a strong appreciation for local traditions such as town fairs, autumn leaf festivals,
    and community volunteerism. The New England emphasis on education, nature, and civic participation has shaped her curiosity, love of the outdoors, and engagement with local arts initiatives.
attributes:
  skills: '["Illustration", "Digital Painting", "Graphic Design (Adobe Photoshop, Illustrator, Procreate)", "Creative Writing (Poetry, Short Stories)", "Community Event Planning", "Public Speaking", "Photography",
