  hobbies: '["Abstract Acrylic Painting", "Digital Illustration", "Reading Speculative Fiction and Philosophy", "Nature Photography", "Hiking", "Creative Writing (Poetry, Short Stories)", "Community Art
    Workshops (volunteer)", "Knitting and Crocheting", "Visiting Art Galleries and Museums", "DIY Home Crafts (Terrarium building)"]'
  career_goals: Mandy aims to turn her freelance art work into a full‑time career as a visual designer for a cultural or nonprofit organization in New England. She plans to enroll in a BFA or equivalent
    program to deepen her artistic practice and eventually curate community‑based exhibitions that blend abstract concepts with local heritage. Long‑term, she hopes to open a modest studio/gallery where
    she can sell limited‑edition prints, offer workshops, and collaborate with other creators, while establishing a recognizable brand for her illustration commissions.
