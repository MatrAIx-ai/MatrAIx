  career_goals: Gina aims to build a career at the intersection of art and community engagement. In the short term, she wants to secure an entry‑level role as a gallery assistant or junior marketing coordinator
    for a cultural institution in Los Angeles, leveraging her design and communication strengths while continuing to freelance as a visual content creator to expand her portfolio. Long‑term, she aspires
    to become an arts program manager or curator who designs inclusive exhibitions and outreach initiatives that amplify underrepresented voices. To support these ambitions, she plans to pursue a bachelor’s
    degree in Arts Administration or Museum Studies and develop leadership experience through volunteer projects and professional mentorships.
