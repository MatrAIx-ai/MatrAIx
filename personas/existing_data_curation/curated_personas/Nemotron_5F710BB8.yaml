  hobbies: '[''Hiking desert trails'', ''Amateur astronomy'', ''Community center volunteering'', ''Organizing educational workshops'', ''Family game nights'', ''Cooking'', ''Vegetable gardening'', ''Board
    games'', ''Reading mystery novels'', ''Attending local fairs'']'
  career_goals: Beth aims to deepen her expertise in data analytics, pursue a bachelor’s degree in applied mathematics or environmental science, and earn a Certified Analytics Professional credential. In
    the next five years she hopes to step into a senior analyst or team‑lead role, overseeing statewide water‑resource forecasting projects. She also envisions contributing to community planning by serving
    on the Churchill County advisory board and eventually launching a small consulting practice that helps local farms optimize irrigation through data‑driven insights.
