personas:
  professional: Beth Quercia, a data analyst in the scientific sector, blends meticulous Excel, SPSS, and R expertise with GIS mapping and laboratory instrumentation know‑how, channeling her methodical,
    routine‑loving nature into precise data cleaning, rigorous quality control, and clear presentations that earn trust from both technical teams and community stakeholders.
  sports: Beth Quercia, an avid desert‑trail hiker who joins the Fallon Trail Runners club for Saturday morning jogs and never misses a Las Vegas Raiders game, also supports the Reno Aces and plays pickup
    basketball at the community center to stay fit and social.
  arts: Beth Quercia, who unwinds with Agatha Christie whodunits and Gillian Flynn thrillers, often streams Johnny Cash and Dolly Parton while tending her garden, and attends the annual Churchill County
    fair’s live bluegrass stage featuring artists like Alison Krauss.
  travel: Beth Quercia prefers meticulously planned weekend getaways, such as a sunrise hike in Zion National Park, a stargazing excursion to Chile’s Atacama Desert, and a family road trip through Oregon’s
    wine country, always booking accommodations and routes in advance to keep her schedule predictable.
  culinary: Beth Quercia, a confident home cook, frequently prepares hearty vegetable stew with carrots, potatoes, kale, and lentils from her garden, brews a robust chili con carne spiced with cumin and
    chipotle, and bakes rustic sourdough loaves using fresh rosemary and thyme, delighting her family with these comforting, garden‑to‑table dishes.
  core: Beth Quercia, a routine‑driven data analyst who can’t resist a nightly true‑crime podcast and often over‑schedules her weekend hikes, occasionally forgets to water her garden after a long work sprint
    but quickly corrects the lapse with a meticulous to‑do list.
background:
  cultural: Beth comes from a traditional white American background, with family roots in the Midwest. Raised in a close‑knit farming community, she internalized values of hard work, self‑reliance, and
    community service. Her upbringing emphasized practicality, routine, and faith, and she continues to participate in her local Protestant church. Living in Fallon, she blends these Midwestern sensibilities
    with the desert culture of rural Nevada, valuing family, neighborly support, and a pragmatic approach to life.
attributes:
  skills: '[''Statistical analysis'', ''Data visualization'', ''GIS mapping'', ''Advanced Excel modeling'', ''R programming'', ''SPSS'', ''Laboratory instrumentation'', ''Quality control and data integrity'',
