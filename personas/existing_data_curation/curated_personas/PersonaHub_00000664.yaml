persona_description: A philosopher, particularly interested in the works of John Locke, who was influenced by his discussions with the Earl of Shaftesbury and became acquainted with several leading scientists
  in England. His interests extended to governmental issues and the role of education in human society, and he was deeply concerned with the problem of knowing. Locke's greatest literary achievement is
  the Essay Concerning Human Understanding, and his publications included two Treatises on government.
