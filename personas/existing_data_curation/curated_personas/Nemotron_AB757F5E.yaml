personas:
  professional: Daniel Finley, a budding robotics enthusiast, combines a love of LEGO robotics kits with early coding experiments, balancing curiosity and practicality as they lead a small project to automate
    their school’s library book‑return system while staying reliably organized and cooperative in the club.
  sports: Daniel Finley, a point guard on the Queens Basketball Association (QBA) youth team, dribbles with the same collaborative spirit they bring to school projects, cheering for the New York Knicks
    while training at the local rec center and balancing competitive drive with a love for team harmony.
  arts: Daniel Finley, a piano‑practicing comic‑sketcher, draws inspiration from Lin‑Manuel Miranda’s Broadway scores, the synth‑rich soundtracks of Yoko Kanno, and the vivid panels of One Piece, blending
    these influences into original comic strips that capture sci‑fi adventures.
  travel: Daniel Finley, an eager explorer of both local and far‑away places, has visited the Statue of Liberty, the National Museum of Natural History, and a weekend trip to Washington, D.C., and dreams
    of journeying to Tokyo to experience anime culture and to Rome to taste the traditional family pasta dishes they’ve heard about.
  culinary: Daniel Finley, who enjoys both cooking and tasting, often helps prepare the family’s Saturday pasta night—favoring spaghetti carbonara with fresh parmesan—while also savoring the diverse street
    foods of Elmhurst, from dumplings to falafel, and experiments with a simple chocolate‑chip cookie recipe on weekends.
  core: Daniel Finley, the thirteen‑year‑old LEGO‑builder‑coder who balances piano practice, basketball drills, and nightly comic sketches, is known for their disciplined savings habit, occasional candy
    binge, and a penchant for staying up late polishing code, all while keeping a cooperative smile on the playground.
background:
  cultural: Daniel is a white American raised in Elmhurst, Queens, a multicultural neighborhood that exposes him to a wide array of cultures, languages, and cuisines. His family background blends Irish
    and Italian heritage, celebrated through occasional family gatherings and traditional holidays like St. Patrick’s Day and Italian feast nights, while primarily embracing broader American customs. Growing
    up in such a diverse setting has fostered his openness to different perspectives, reinforcing his cooperative nature and respect for community harmony.
attributes:
  skills: '[''basic Python programming'', ''Scratch game development'', ''Tinkercad 3D modeling'', ''Mathematical problem solving'', ''Project organization'', ''Collaborative teamwork'', ''Intermediate
