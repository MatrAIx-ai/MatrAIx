  hobbies: '[''reading science‑fiction novels'', ''coding small games in Scratch'', ''building LEGO robotics kits'', ''playing basketball'', ''participating in school robotics club'', ''playing piano'',
    ''volunteering at community library'', ''drawing comics'']'
  career_goals: He aspires to become a software engineer focused on educational technology, aiming to design interactive learning platforms that make STEM subjects accessible and engaging for peers. Daniel
    plans to deepen his coding skills through high‑school AP computer science courses, participate in robotics competitions, and attend summer coding camps. He envisions earning a computer science degree,
    later contributing to companies that develop learning tools while also mentoring middle‑school students in his community, reflecting his considerate and cooperative personality.
