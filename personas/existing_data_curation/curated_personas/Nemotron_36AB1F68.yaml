  hobbies: '[''Gardening'', ''Woodworking'', ''Fishing'', ''Card games (bridge, poker)'', ''Church potlucks and community events'', ''Senior center game nights and dance evenings'', ''Listening to classic
    rock and big‑band music'', ''Reading historical biographies'', ''Model‑train collecting'', ''Storytelling and oral‑history projects'']'
  career_goals: Although retired, James is focused on preserving his health and emotional wellbeing through a structured daily routine. He aims to deepen his involvement in the local senior center, taking
    on a mentorship role for younger volunteers and spearheading oral‑history projects that capture the town’s oil‑industry legacy. He hopes to organize regular community events that foster harmony and
    support for seniors, while also creating a written memoir for his grandchildren to preserve family values. Maintaining a close partnership with his wife, he aspires to travel to visit family, especially
    his grandchildren, and to continue learning new woodworking techniques that keep his mind active.
