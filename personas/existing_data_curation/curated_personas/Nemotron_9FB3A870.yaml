  hobbies: '[''Reading Mentorship'', ''Community Theatre'', ''Hiking'', ''Trivia Competitions'', ''Tennis'', ''Yoga and Mindfulness'', ''Cooking'', ''Exploring New Cuisines'']'
  career_goals: Berta aims to advance from individual tutoring to a leadership role within a regional tutoring organization, aspiring to become an instructional coordinator who shapes evidence‑based curricula
    for K‑12 learners. She plans to pursue a doctorate in education to deepen her expertise in learning analytics and eventually launch her own boutique tutoring center that blends rigorous academic support
    with innovative, technology‑enhanced teaching methods. Her competitive drive pushes her to achieve measurable improvements in student outcomes and gain recognition as a thought leader in the Midwest
    tutoring community.
