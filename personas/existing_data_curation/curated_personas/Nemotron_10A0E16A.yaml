    "Stress‑management counseling", "Conflict resolution"]'
  hobbies: '["Cooking traditional Mexican dishes", "Herb gardening", "Knitting and crocheting", "Weekly church participation and choir singing", "Playing bridge and card games", "Reading historical fiction
    and medical literature", "Volunteering at community health fairs", "Walking along the Detroit Riverwalk", "Listening to boleros and mariachi music"]'
  career_goals: Yulien aims to transition into a charge‑nurse or clinical educator role, seeking a Bachelor of Science in Nursing to qualify for teaching assignments. She wants to mentor younger nurses,
    spearhead a stress‑reduction program for staff, and lead community outreach initiatives that improve health outcomes for Spanish‑speaking seniors in Detroit. While maintaining the routine she values,
    she plans a gradual move toward part‑time teaching as she approaches retirement, ensuring her high standards of patient care continue to shape the next generation of clinicians.
