  hobbies: '[''Church choir'',''Cooking soul‑food and Caribbean dishes'',''Hosting potluck dinners'',''Walking the Lakefront Trail'',''Yoga and guided meditation'',''Book club'',''Volunteer health screenings'',''Balcony
    herb gardening'',''Dancing to jazz and blues'']'
  career_goals: Looking ahead, Martinique plans to complete a BSN through an RN‑to‑BSN program while maintaining her current shift schedule to preserve routine. She aims to become a charge nurse on her
    medical‑surgical unit within the next two years, leveraging her reliability and organizational strengths. Long‑term, she aspires to transition into a clinical nurse educator role, designing competency‑based
    training that blends practical skills with compassionate communication. She also hopes to lead community‑based health outreach initiatives in Chicago’s South Side, addressing health disparities and
    fostering culturally competent care. Throughout, she seeks roles that provide stable schedules, opportunities to mentor, and visible impact on patient outcomes.
