personas:
  professional: A veterinary surgeon with a specialization in small‑animal surgery, Angelica Mccullough blends meticulous clinical skill, diagnostic imaging expertise, and a passion for community‑focused
    outreach, creating art‑infused educational materials while steering a bustling clinic with organized flexibility.
  sports: A weekend jogger along Lake Michigan, Angelica Mccullough also co‑hosts a pick‑up basketball league, follows the Chicago Bulls and Cubs loyally, attends Chicago White Sox games regularly, and
    blends a competitive drive with a community‑oriented fitness mindset.
  arts: A devoted creative, Angelica Mccullough sketches animal portraits under the gallery lights of the Museum of Contemporary Art Chicago, draws inspiration from Miles Davis and Kamasi Washington, curates
    community mural projects, and attends weekly jazz sessions at the Green Mill.
  travel: Preferring culturally immersive trips, Angelica Mccullough plans weekend getaways to New Orleans for jazz festivals, explores the historic streets of Savannah, dreams of a research‑focused visit
    to Kenya’s wildlife reserves, and balances modest budgets with occasional splurges on museum passes.
  culinary: A culinary experimenter, Angelica Mccullough reimagines classic collard greens with miso glaze, crafts jalapeño cornbread, savors the spice of gochujang‑infused gumbo, enjoys cooking at home,
    and treats herself to soul‑food‑inspired dishes at Virtue and the Art of Barbecue.
  core: Angelica Mccullough channels curious artistry and competitive precision into a veterinary career, while juggling a skeptical edge, occasional over‑commitment to community projects, and an unshakable
    love for midnight jazz.
background:
  cultural: Angelica is a Black woman raised in Chicago’s vibrant African‑American community, where church, music, and family gatherings shaped her worldview. Her cultural heritage influences her strong
    sense of community responsibility and her commitment to representation in a field where Black professionals are under‑represented. She celebrates traditions such as Juneteenth, participates in local
    cultural festivals like the Chicago African Festival, and draws inspiration from gospel and jazz music. Angelica’s cultural identity fuels her dedication to mentorship programs for minority youth and
    to integrating culturally resonant art into her veterinary practice.
attributes:
  skills: '[''Small‑animal clinical care'', ''Surgical techniques'', ''Diagnostic imaging (radiology, ultrasound)'', ''Emergency and critical care'', ''Animal nutrition counseling'', ''Client education
