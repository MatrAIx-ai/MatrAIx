    pet owners'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching and animal portrait photography'', ''Cooking and experimenting with soul food recipes'', ''Attending live jazz concerts'', ''Volunteering
    at animal shelters'', ''Yoga and mindfulness practice'', ''Reading speculative fiction'', ''Participating in community mural projects'']'
  career_goals: Angelica aims to become a recognized specialist in veterinary surgery while expanding her influence beyond the clinic. Over the next five years she plans to open a boutique practice in Chicago’s
    South Side that offers low‑cost services to underserved neighborhoods and incorporates art‑based therapy spaces for pets and owners. She also seeks a leadership role within the American Veterinary Medical
    Association, where she can champion diversity and mentor aspiring Black veterinarians. Long‑term, Angelica envisions launching a nonprofit that combines animal welfare education with community murals,
    positioning herself as both a medical and cultural innovator.
