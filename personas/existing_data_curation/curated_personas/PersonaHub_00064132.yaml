persona_description: A historian and a student of the history of Greece and Italy, particularly the conflicts between the two countries. This person is interested in the military history of the region,
  the role of Italian troops in Greece during the Greek War of Independence and the Metaxas regime in Greece, and the Italian and Greek forces' interactions on the Albanian front. This person is also interested
  in the role of the Carabinieri, the Alpini, and the MVSN in the Greek and Italian wars, and the impact of these forces on the region's history.
