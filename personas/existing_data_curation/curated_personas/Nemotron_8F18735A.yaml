  hobbies: '[''Beach volleyball'', ''Sailing'', ''Volunteer financial literacy tutoring'', ''Acoustic guitar jam sessions'', ''Hiking in Pine Barrens'', ''Reading science‑fiction'', ''DIY electronics projects'',
    ''Board game nights with friends'', ''Cooking seafood dishes'']'
  career_goals: Chris aims to transition from his current clerk position to a senior financial analyst or team‑lead role within the next five years. He plans to earn CPA certification and deepen his expertise
    in financial planning so he can lead a community‑focused financial‑education program. Ultimately, he hopes to manage a small team, introduce data‑driven efficiencies, and mentor junior staff while maintaining
    a balanced lifestyle that mitigates his stress‑prone tendencies.
