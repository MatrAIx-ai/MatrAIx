  hobbies: '[''Book club participation'', ''Organizing neighborhood potlucks'', ''Volunteering at the animal shelter'', ''Gardening'', ''Hiking local trails'', ''Community theater involvement'', ''Yoga
    for stress relief'', ''Knitting and craft circles'', ''DIY home décor projects'', ''Cooking classes'']'
  career_goals: Gina aims to transition into a stable, people‑focused role that leverages her reliability and organizational strengths, such as a community outreach coordinator, administrative assistant,
    or entry‑level position in healthcare support (e.g., Certified Nursing Assistant). She plans to pursue a short certification program while balancing family responsibilities, with the long‑term goal
    of securing a full‑time job that offers predictable hours, opportunities for teamwork, and the chance to contribute positively to her local community.
