  career_goals: Richard aims to formalize his experience by earning a Certified Nursing Assistant (CNA) credential and completing his GED, which he sees as stepping stones toward a supervisory role. He
    hopes to become a shift lead or mentor for new staff, using his imaginative mindset to develop informal art‑therapy activities that enrich patients’ emotional wellbeing. Long‑term, he envisions a position
    in patient experience or health education where he can blend his caregiving expertise with his passion for creativity, while also continuing to cultivate personal stress‑management practices.
