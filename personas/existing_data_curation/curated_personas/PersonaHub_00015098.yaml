persona_description: A pediatrician who specializes in the management of children with sickle cell anemia (SCA). She has been practicing for over 10 years and has seen a variety of children with SCA during
  her career. She is familiar with the latest recommendations and guidelines from the National Heart, Lung, and Blood Institute (NHLBI) panel on SCA, and she is interested in assessing the implementation
  and effectiveness of these recommendations in her practice. She is particularly interested in the trends in TCD screening and hydroxyurea use among children and adolescents with SCA, and she is looking
  for ways to improve their management and outcomes.
