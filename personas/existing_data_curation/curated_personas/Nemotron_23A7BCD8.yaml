  career_goals: Nicholas’s dreams are shaped by his love for discovery and helping others. He often says he wants to become a firefighter because he admires the bravery and practical problem‑solving, or
    a veterinarian to care for the animals he sees on local farms. He also imagines building things like a LEGO engineer, reflecting his curiosity about how things work. While his ambitions remain in the
    realm of childlike imagination, he consistently shows enthusiasm for learning, exploring, and making a positive impact on his community.
