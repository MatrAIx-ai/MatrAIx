  career_goals: Alonzo aspires to transition from managing a single team to overseeing an engineering division as a Director or Vice President, focusing on integrating emerging technologies such as AI‑driven
    sustainability platforms while ensuring operational excellence. He seeks to lead initiatives that expand the company’s impact on environmental stewardship and community outreach, and to mentor the next
    generation of Black engineers through formal sponsorship programs. In the long term, he envisions establishing a consultancy that helps mid‑size tech firms adopt inclusive, data‑driven product strategies
    and foster diverse talent pipelines.
