  hobbies: '[''DIY Home Automation'', ''Reading Non‑fiction (Science, Technology Ethics, Black Entrepreneurship)'', ''Urban Gardening'', ''Trail Hiking and Running (Mount Diablo)'', ''Chess (Online and
