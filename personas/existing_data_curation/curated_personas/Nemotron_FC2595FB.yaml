personas:
  professional: John Forrest is a third‑grade student who channels his love for building LEGO and model kits into a budding interest in engineering, often leading classroom group projects with practical
    problem‑solving and a flexible schedule, while his volunteer work at the animal shelter fuels his compassionate teamwork and reflects his preference for structure balanced by a relaxed approach to obligations.
  sports: John Forrest plays for the Lakewood Tigers youth soccer team and the Riverdale Hoops basketball club, enjoys weekend fishing trips on Willow Creek, follows the Springfield Storm high‑school baseball
    squad and the Capital City Capitals MLB team on TV, and balances a flexible yet enthusiastic training routine that mixes scheduled practices with spontaneous backyard drills.
  arts: John Forrest grooves to pop hits by Billie Eilish, BTS, and Taylor Swift while mastering dance moves from TikTok and Beat Saber, channels that creative energy into choreographing simple routines
    for his friends, and draws design inspiration from LEGO Architecture sets, often sketching his own mini‑models during free periods.
  travel: John Forrest loves weekend hikes through Pine Ridge State Park, regular visits to the nearby Maple Grove Farm for fruit picking, and daydreams of camping under the Northern Lights in Iceland,
    planning family road trips with a loose itinerary that allows for spontaneous detours and snack stops.
  culinary: John Forrest enjoys assembling his own veggie‑laden pizzas topped with mozzarella, cherry tomatoes, and pepperoni, can whip up a decent mac and cheese using cheddar and a splash of milk, and
    often helps harvest carrots and basil from the family garden, though he frequently forgets to wash his hands before cooking.
  core: John Forrest is an energetic, structure‑loving 11‑year‑old who blends a love for teamwork, LEGO precision, and spontaneous kindness—yet often forgets homework and misplaces snack wrappers.
background:
  cultural: John was raised in Nash and Iowa, a small, rural community in Floyd County where family ties, church gatherings, and local school events shape daily life. The community values hard work, self‑reliance,
    and mutual support, reflected in the town’s harvest festivals, county fairs, and volunteer fire department. Growing up in a predominantly white Midwestern setting, John’s upbringing emphasizes modesty,
    respect for nature, and a strong sense of neighborly responsibility. These cultural influences nurture his practical mindset, compassion for others, and eagerness to maintain harmony within his close‑knit
    environment.
