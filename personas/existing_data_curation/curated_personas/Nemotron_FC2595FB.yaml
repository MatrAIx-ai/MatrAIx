  career_goals: John dreams of a career that lets him combine his love for helping others with a clear, organized environment. He imagines becoming a middle‑school teacher or youth mentor where he can guide
    classmates, foster teamwork, and maintain a harmonious classroom. He is also fascinated by caring for animals and hopes to study veterinary science, allowing him to use his practical skills to heal
    pets and farm animals. Ultimately, he wants a role that serves his close‑knit Iowa community, whether in education, youth services, or animal care, providing structure while staying adaptable to the
    needs of those around him.
