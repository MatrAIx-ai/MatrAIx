personas:
  professional: Min Siu is a bilingual classroom assistant who leverages Google Classroom, interactive whiteboards, and data analytics to streamline lesson delivery while mentoring teaching assistants and
    crafting culturally responsive STEAM modules for future full-time teaching.
  sports: Min Siu is an avid hiker who tackles the Rocky Mountain trails on weekends, attends Zumba and Pilates sessions for cardio variety, and follows the Denver Broncos (NFL), Colorado Rockies (MLB)
    and Denver Nuggets (NBA), often joining a local running club for group workouts.
  arts: Min Siu enjoys strategic board games such as Terraforming Mars and Scythe, regularly attends indie film screenings, and curates playlists featuring Yo‑Yo Ma, Jay Chou, and Taylor Swift, blending
    classical, pop, and cinematic soundtracks into their social gatherings.
  travel: Min Siu plans trips with detailed itineraries yet leaves room for spontaneous detours, having explored Taiwan’s tea‑plantation hills, Hong Kong’s night markets, the Canadian Rockies near Banff,
    and dreaming of a spring cherry‑blossom pilgrimage to Kyoto while balancing travel costs against a modest teaching‑assistant stipend.
  culinary: Min Siu delights in crafting dim sum bites, spicy mapo tofu, and citrus‑infused chicken pho, using fresh ginger, star anise, and fermented black beans, and hosts monthly potluck nights where
    friends sample experimental sushi rolls and pineapple‑basil fried rice.
  core: Min Siu is a structure‑loving, socially vibrant educator who balances meticulous budgeting, proactive health routines, competitive board‑gaming, and a passion for culturally infused cooking and
    travel.
background:
  cultural: Min is the daughter of East Asian immigrants—her mother hails from Hong Kong and her father from Taiwan—who settled in the United States before she was born. Raised in a bilingual household,
    she grew up speaking both English and Cantonese, celebrating Lunar New Year, Mid‑Autumn Festival, and other cultural traditions alongside typical American holidays. Her upbringing emphasized the importance
    of education, respect for community, and a balanced blend of traditional values with Western independence, shaping her pragmatic yet socially vibrant outlook.
attributes:
  skills: '[''Classroom management'', ''Lesson planning assistance'', ''Differentiated instruction support'', ''Educational technology integration'', ''Bilingual communication (English‑Mandarin)'', ''Assessment
