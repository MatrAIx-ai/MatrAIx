    skills'']'
  hobbies: '[''Hiking'', ''Group fitness classes (Zumba, Pilates)'', ''Cooking Asian cuisine'', ''Hosting potluck gatherings'', ''Board games (Catan, Ticket to Ride)'', ''Volunteering tutoring'', ''Attending
    cultural festivals'', ''Traveling'', ''Yoga'']'
  career_goals: Min aims to earn a Master’s degree in Curriculum and Instruction within the next three years, positioning herself for a full‑time teaching license and subsequent promotion to lead teacher
    or instructional coordinator. She hopes to design a culturally responsive STEAM curriculum that integrates East Asian perspectives and to mentor new teaching assistants, eventually contributing to district‑wide
    curriculum development. In the longer term, Min envisions taking on an administrator role, such as assistant principal, where she can shape school policies that promote structure, equity, and community
    engagement.
