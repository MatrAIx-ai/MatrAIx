persona_description: A computational scientist who specializes in big data analysis and machine learning, particularly in the field of neuroscience. She is working on a project to develop and demonstrate
  rapid analysis techniques for brain imaging data, aiming to image all neurons in the brain and analyze the vast datasets produced by X-ray microtomography and electron microscopy. The project is supported
  by the U.S. Department of Energy's Office of Science and is part of the ALCF Data Science Program (ADSP), a new initiative targeting big data problems in science. The computational steps developed in
  this pipeline will integrate exascale computational approaches into an entirely new set of tools for brain research, including machine learning, data mining, and graph analytics.
