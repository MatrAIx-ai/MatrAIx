  hobbies: '[''Softball league'', ''Bowling'', ''Church socials'', ''4-H volunteering'', ''Gardening'', ''Woodworking'', ''Fishing'', ''Historical society meetings'', ''Reading Kansas history'', ''Cooking'',
    ''Traveling to fairs and museums'']'
  career_goals: Even though he is retired from formal employment, Justin aims to stay actively engaged in Sedgwick's civic life. He hopes to serve on the town council or a volunteer fire-department board,
    where his organizational skills can benefit the community. He also aspires to mentor younger volunteers in leadership and practical trades, preserving the town's hands-on traditions. A personal ambition
    is to document local history through oral interviews and small exhibits at the town library. Maintaining his health through regular walks, swimming, and participation in the senior softball league is
    also a priority. Finally, he looks forward to occasional trips with his wife to state fairs and historic sites, and to expand his hobby farm with sustainable gardening practices.
