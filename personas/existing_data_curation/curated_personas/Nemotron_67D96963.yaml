personas:
  professional: Justin Voelkel, a retired farm equipment mechanic turned community organizer, leverages decades of hands‑on carpentry, event coordination, and modest budget management to run Sedgwick’s
    volunteer programs with a methodical, predictably structured style while flexibly adapting to the social dynamics of seniors’ softball leagues and church socials; they relish guiding volunteers through
    clear processes and mediating occasional conflicts.
  sports: Justin Voelkel, an avid participant in Sedgwick’s senior softball league and weekly bowling nights, stays fit with morning walks, evening swims at the community pool, and seasonal gardening chores,
    while cheering on the Kansas City Chiefs and the Kansas City Royals and maintaining membership in the Sedgwick Bowling Club and the local Softball Seniors Association; they find camaraderie in team
    sports and appreciate the structured routine of regular practice sessions.
  arts: Justin Voelkel, a lover of Midwestern folk music and local history, fills their evenings with classic country tunes by Johnny Cash and Merle Haggard, attends occasional performances by the Kansas
    Symphony, and finds inspiration in the paintings of Grant Wood, all of which influence the handmade wooden furniture they craft in their workshop.
  travel: Justin Voelkel, a meticulous planner of low‑key road trips, prefers relaxed visits to state fairs such as the Kansas State Fair, historic museums like the Henry Ford Museum, and scenic sites like
    the Tallgrass Prairie National Preserve, always reserving a comfortable hotel room for themselves and their spouse; they prioritize staying within a pre‑set travel budget and enjoy leisurely mornings
    exploring local histories.
  culinary: Justin Voelkel, an experienced home cook who harvests heirloom tomatoes, sweet corn, and beans from their garden, enjoys preparing classic Midwestern dishes such as corn casserole, pot roast
    with carrots, and fresh garden salad drizzled with homemade vinaigrette, and they occasionally over‑season the stew with extra salt, reflecting a love of hearty flavors coupled with a modest culinary
    skill set.
  core: Justin Voelkel, a structured yet sociable retiree, channels decades of hands‑on expertise into community leadership while juggling a penchant for over‑committing to volunteer projects and a slight
    indulgence in salty home‑cooked meals; they balance their desire for predictability with the unpredictable energy of group activities.
background:
  cultural: Justin was born and raised on a family farm just outside Sedgwick, Kansas, in a predominantly white, Midwestern community with deep German-Scandinavian roots. His upbringing was shaped by Protestant
    values, a strong work ethic, and close-knit family ties typical of rural Kansas. The regional culture emphasized self-reliance, community service, modesty, and practicality, which continue to guide
    his daily life. Over the decades, he has witnessed the transition from a purely agricultural economy to a more diversified small-town environment, adapting his skills to support local institutions such
    as the church, school, and volunteer fire department.
