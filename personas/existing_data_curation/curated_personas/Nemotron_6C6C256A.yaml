  hobbies: '[''Sketching and journal drawing'', ''Digital art experimentation'', ''Listening to and creating music (R&B, hip-hop, gospel)'', ''School drama club'', ''Dance and community performances'',
    ''Pickup basketball'', ''Volunteering at local cultural museum'', ''Reading sci-fi/fantasy literature'']'
  career_goals: She hopes to attend a specialized high school for the arts and later earn a degree in visual arts or graphic design, aiming to become a multidisciplinary artist who creates murals celebrating
    African-American history. Victoria also dreams of working in a community arts program that engages youth through creative workshops, and she is interested in building a platform as a young content creator
    or journalist to amplify under-represented voices.
