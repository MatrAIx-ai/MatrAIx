personas:
  professional: Victoria Mckenzie, a budding visual storyteller, blends sketching, mixed‑media collages, and lyric writing into school projects and community murals, channeling their boundless curiosity;
    they adopt a relaxed, flexible work style that favors spontaneous bursts of creativity over rigid planning.
  sports: Victoria Mckenzie, a lively member of the Augusta Youth Basketball League who dominates pickup games at the downtown park, also assists the school’s volleyball team, cheers for the Atlanta Braves
    and the Georgia Bulldogs, and keeps a flexible fitness routine that favors spontaneous games over strict training schedules; they remain enthusiastic and resilient even after a tough loss.
  arts: Victoria Mckenzie, an eager drama‑club performer and collage enthusiast, draws inspiration from Romare Bearden’s mixed‑media works, the lyrical flow of Outkast, and the stage energy of Lin‑Manuel
    Miranda, weaving these influences into their own verses and visual art; they proudly share their creations with friends and the local community.
  travel: Victoria Mckenzie, a spontaneous road‑trip lover, has explored Savannah’s historic squares, Charleston’s waterfront, and Washington D.C.’s museums with their family, dreams of wandering the art‑filled
    streets of Paris, and prefers flexible itineraries that let them stop at local music venues along the way; they always pack a notebook to sketch the scenes they encounter.
  culinary: Victoria Mckenzie, a self‑taught kitchen experimenter, favors fried catfish drizzled with lemon, seasoned collard greens with smoked turkey, buttery cornbread, and often adds a splash of hot
    sauce to their mac and cheese, while occasionally overindulging at family gatherings and neglecting to clean up their art‑scented cooking space; they smile at the mess, promising to tidy up later.
  core: Victoria Mckenzie, a curiosity‑driven teen artist who balances laid‑back spontaneity with unwavering calm, flips between sketchbooks, basketball courts, and music streams, all while never letting
    anxiety cloud their creative flow; they stay endlessly optimistic and ready to dive into the next idea.
background:
  cultural: Raised in Augusta, Georgia, Victoria is immersed in Southern African-American culture. Her family regularly attends a historically Black Baptist church where gospel music, community storytelling,
    and strong ties to family shape her values. She celebrates Juneteenth, participates in local festivals that highlight Black artistry, and enjoys soul-food staples such as fried catfish, collard greens,
    and cornbread prepared by her relatives. The civil-rights history of nearby Columbia County and the legacy of Georgia's Black artists, like Romare Bearden and Outkast, inspire her pride and creative
    ambition.
attributes:
  skills: '[''Traditional drawing and watercolor painting'', ''Digital illustration (Procreate, Photoshop)'', ''Basic video editing (iMovie)'', ''Creative writing and storytelling'', ''Public speaking and
