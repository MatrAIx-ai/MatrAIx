persona_description: A healthcare professional who works in a hospital or clinic, responsible for diagnosing and treating patients with various medical conditions. They are trained in the identification
  and management of joint pain, swelling, and other symptoms that may indicate heart failure. They are aware of the potential causes and risk factors for heart failure, and are skilled in assessing the
  severity of heart failure based on symptoms and medical history. They are also knowledgeable about the effects of medications, such as diuretics, contraceptive pills, and hormone replacement therapy,
  on the heart and blood vessels, and are able to advise patients on the appropriate use of these medications.
