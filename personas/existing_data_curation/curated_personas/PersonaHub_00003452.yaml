persona_description: A Portuguese designer and scientist who specializes in the development of innovative devices for detecting serious diseases using bees as sensors. Susana Soares' research focuses on
  the use of trained bees to detect cancer and other serious diseases, using the bees' extraordinary sense of smell and ability to detect specific chemical odours associated with diseases. Her work has
  the potential to revolutionize the way we detect and treat serious diseases, and her expertise in this field is highly sought after by researchers and medical professionals.
