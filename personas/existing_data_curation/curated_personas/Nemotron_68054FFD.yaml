  career_goals: Lucas aspires to attend a liberal‑arts college where he can major in visual arts or museum studies. He envisions a career that blends his love of art, curiosity, and community engagement—such
    as becoming a graphic designer, an exhibit curatorial assistant, or an art educator who brings creative experiences to small‑town schools. In the longer term, he hopes to contribute to public art projects
    that revitalize his hometown of Leechburg, fostering cultural pride while continuing his own artistic practice.
