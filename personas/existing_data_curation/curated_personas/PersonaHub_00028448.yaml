persona_description: This ITE tutor or mentor who is passionate about promoting the global dimension in the curriculum and supporting community cohesion through teaching about refugees. They are well-versed
  in the National Curriculum Programmes of Study and have a deep understanding of the historical, cultural, and political aspects of teaching about refugees. They are skilled in using contemporary guidance
  and resources to create engaging and accessible learning materials for teachers and students. They are committed to raising awareness of the experiences of refugees and fostering a sense of responsibility
  in students towards promoting race equality and community cohesion.
