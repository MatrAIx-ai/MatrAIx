  hobbies: '[''Exploring marshes and tide pools'', ''Bird‑watching'', ''Collecting shells and sea glass'', ''Building model ships and LEGO sets'', ''Playing strategic video games (Minecraft, Civilization)'',
    ''Reading adventure and mystery novels'', ''Playing acoustic guitar'', ''Participating in youth baseball'', ''Helping with family cooking (shrimp grilling)'']'
  career_goals: Paul's short‑term ambition is to finish middle school with strong grades, especially in science and math, so he can qualify for a technical apprenticeship after high school. He is drawn
    to careers that offer clear structure and tangible results, such as becoming an automotive or marine mechanic, where he can apply his hands‑on skills. Over the longer term, he hopes to combine his love
    of the Lowcountry environment with technical expertise by working in marine maintenance or joining the U.S. Coast Guard, roles that provide routine responsibilities and community service.
