personas:
  professional: Paul Armitage, a 12‑year‑old budding naturalist, applies his meticulous eye for detail and love of structure to cataloging bird species and building accurate model ships, turning solitary
    exploration into early scientific inquiry.
  sports: Paul Armitage, 12, splashes into the Johns Island Junior Sox as a shortstop, idolizes the Charleston RiverDogs, and spends weekends trekking the marsh trails of Johns Island, where they track
    turtle sightings and practice lung‑strengthening breathing drills.
  arts: Paul Armitage, a 12‑year‑old acoustic‑guitar hobbyist, strums John Mayer's "Gravity" while devouring Rick Riordan's adventure novels, and displays a flair for creative construction by recreating
    famous ships from Nathan Sawaya's LEGO sculptures.
  travel: Paul Armitage, age 12, prefers low‑key road trips with the family to nearby coastal spots like Kiawah Island, while dreaming of exploring the Galápagos Islands to study exotic birds, balancing
    a love of meticulous planning with a spontaneous urge to chase a rare shell on the beach.
  culinary: Paul Armitage, 12, enjoys the occasional kitchen takeover, confidently grilling fresh‑caught shrimp with garlic, lemon, and a splash of butter, while also indulging in cheesy pepperoni pizza
    and experimenting with simple pasta carbonara, though they sometimes forget to stir the sauce, resulting in a burnt bottom.
  core: Paul Armitage, a 12‑year‑old organizer of shells and strategies, balances quiet curiosity with an obsessive need for detail, often losing track of time while perfecting LEGO builds and forgetting
    to do chores.
background:
  cultural: Paul was raised in a white, low‑country family on Johns Island, South Carolina, where Southern traditions blend with the unique coastal culture of the Charleston area. His upbringing includes
    regular attendance at a local Baptist church, participation in community events such as the Lowcountry Oyster Festival, and family meals featuring regional dishes like shrimp and grits. Growing up near
    marshes and the Atlantic shoreline has fostered a deep respect for the natural environment and an awareness of the historic Gullah heritage of neighboring communities, shaping his values of stewardship,
    humility, and close‑knit family ties. The laid‑back yet structure‑oriented atmosphere of the island community influences his practical outlook and preference for reliable routines.
