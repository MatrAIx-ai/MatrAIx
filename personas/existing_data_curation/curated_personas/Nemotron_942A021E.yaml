personas:
  professional: Yvonne Beaupre, a seasoned food-service supervisor with a business degree, leverages their curiosity for art and new flavors to run high-volume kitchen operations, cultivates staff development
    through flexible, collaborative techniques, and despite a relaxed approach to strict scheduling that sometimes leaves inventory lists a little disordered, they consistently drive cost-efficient culinary
    innovation.
  sports: Yvonne Beaupre is a devoted fan of the Chicago Cubs, Bears, and Bulls, joins a local senior pickleball league, participates in a community walking group along the Lakefront Trail each Saturday,
    and enjoys occasional bowling nights at the Park Forest senior center, combining social interaction with gentle exercise.
  arts: Yvonne Beaupre immerses themselves in the Chicago art scene, regularly visits exhibitions by Kerry James Marshall and the Art Institute's contemporary collections, attends live jazz performances
    by Wynton Marsalis, paints watercolors inspired by Edward Hopper's Midwestern vistas, and leads a community theater troupe that stages modern plays by Annie Baker.
  travel: Yvonne Beaupre has explored Oaxaca's bustling mezcal markets, strolled through Kyoto's tranquil tea houses, revels in annual trips to the New Orleans Jazz & Heritage Festival, and dreams of a
    culinary pilgrimage to Marrakech's spice souks, all while planning trips around senior center volunteering and a modest retirement budget.
  culinary: Yvonne Beaupre blends Midwestern comfort with global flavors, creating smoked paprika chicken pot pie with lemongrass-infused broth, herb-crusted pork tenderloin glazed with miso, and curried
    pumpkin pierogi topped with fresh basil and rosemary from their garden, showcasing their knack for experimental yet approachable cuisine.
  core: Yvonne Beaupre, a curious, art-loving food-service veteran, balances competitive ambition with a relaxed, community-centric lifestyle marked by herb gardening, spontaneous travel, and vibrant, globally
    inspired meals.
background:
  cultural: Yvonne grew up in a Midwestern white working‑class family with deep ties to community and church life. The values of hard work, hospitality, and civic engagement shaped her outlook, while exposure
    to Chicago’s vibrant art scene sparked an enduring appreciation for creativity. Her cultural identity blends modest, practical Midwestern sensibilities with an open‑minded curiosity about other peoples’
    traditions, especially as reflected in the diverse cuisines she serves and the inclusive community events she supports.
