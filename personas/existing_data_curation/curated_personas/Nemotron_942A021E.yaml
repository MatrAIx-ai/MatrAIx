  hobbies: '[''Visiting Art Galleries'', ''Painting Watercolors'', ''Cooking and Experimenting with New Recipes'', ''Community Theater Participation'', ''Swing Dancing'', ''Reading Contemporary Fiction'',
    ''Leading a Local Book Club'', ''Volunteering at the Park Forest Senior Center'', ''Herb Gardening'', ''Attending Regional Food Festivals'']'
  career_goals: At 63, Yvonne aims to transition from day‑to‑day supervision to a strategic role such as Operations Manager or Culinary Program Advisor, where she can shape broader service standards across
    multiple venues. She wishes to mentor emerging supervisors, implement sustainable sourcing and waste‑reduction initiatives, and champion local art integration within dining spaces. Ultimately, she hopes
    to leave a legacy of a well‑run, culturally vibrant food operation that balances profitability with community enrichment.
