personas:
  professional: Mary Lee, a senior process analyst who wields advanced Excel, SQL, PowerBI, and R to untangle operational inefficiencies, blends Six Sigma rigor with pragmatic curiosity, and channels a
    competitive drive into leading cross‑functional cost‑saving projects while mentoring emerging women analysts.
  sports: Mary Lee, a dedicated runner on the Schuylkill River Trail and member of the Philadelphia Road Runners, cheers for the Eagles, Phillies, and 76ers on game days, and follows a disciplined training
    regime that she occasionally skips after demanding analytics projects, reflecting her competitive yet stress‑prone nature.
  arts: Mary Lee, a regular at the Philadelphia Jazz Club where she savors the sounds of Kamasi Washington and Esperanza Spalding, attends the annual Odunde Festival, and devours nonfiction works by Ta‑Nehisi
    Coates and Michael Porter, allowing music and ideas to shape both her analytical mindset and her personal identity.
  travel: Mary Lee, an avid traveler who balances meticulous itineraries with spontaneous detours, dreams of returning to New Orleans for its jazz heritage and exploring Savannah’s historic squares, while
    also savoring a recent cultural immersion in Accra’s markets—yet family commitments limit the frequency of her overseas trips.
  culinary: Mary Lee, a capable home chef who perfects soul‑food staples like smoked collard greens, spiced fried chicken, and cornbread, infuses herb‑freshness from her balcony garden into sauces, and
    occasionally over‑salts her gumbo while experimenting with homemade hot sauce for friends’ gatherings.
  core: Mary Lee, a fiercely competitive senior analyst who channels anxiety into meticulous data work, nurtures a herb garden while juggling late‑night crosswords, and occasionally lets stress drive her
    to over‑commit to mentorship and jazz outings.
background:
  cultural: Mary grew up in a close‑knit African‑American community in North Philadelphia, where church, family gatherings, and neighborhood networks shaped her identity. She embraces Black cultural traditions—from
    music and cuisine to community activism—and actively participates in local Black professional and cultural organizations. Her experiences navigating systemic barriers inform her competitive drive and
    her commitment to uplifting other Black women in the analytics field.
attributes:
  skills: '[''Data analysis'', ''Process improvement'', ''Strategic planning'', ''Stakeholder communication'', ''Advanced Excel'', ''SQL'', ''PowerBI'', ''Statistical analysis (R)'', ''Risk assessment'',
    ''Project management (CAPM)'', ''Six Sigma Yellow Belt'', ''Report writing'', ''Presentation design'', ''Critical thinking'', ''Time management'']'
  hobbies: '[''Running'', ''Urban gardening'', ''Jazz concerts'', ''Cultural festivals'', ''Reading nonfiction (social justice, business)'', ''Cooking soul-food'', ''Mentoring high-school students'', ''Crossword
    puzzles'']'
  career_goals: Mary aims to progress to a senior management analyst role within the next three years, eventually moving into a strategy manager or director of operations position. She plans to deepen her
    expertise in data visualization and predictive analytics, earn a PMP certification, and lead cross‑functional projects that drive cost savings for her organization. A parallel ambition is to mentor
    emerging Black women analysts and to champion diversity initiatives within the analytics community.
