  career_goals: He dreams of a future where he can combine his love for order and helping people. He envisions becoming a civil engineer, designing safe bridges and community structures, or a software developer
    creating well‑structured video games for children. He also imagines a role as a teacher, where his kindness and reliability could support younger students. In any career, he seeks stability, clear expectations,
    and the chance to make a positive, organized impact.
