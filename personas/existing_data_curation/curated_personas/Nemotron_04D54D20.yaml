personas:
  professional: Larry Keck is an aspiring LEGO engineer who transforms step‑by‑step building instructions into intricate models while using Scratch to craft simple interactive stories, and they show a practical,
    organized mindset that thrives in focused, small‑group collaborations.
  sports: Larry Keck plays third base for the Lynn Little League baseball team, follows the Boston Red Sox with weekend game viewings, and they also join the Lynn Youth Soccer Club for after‑school practice,
    reflecting their preference for organized, team‑oriented activities.
  arts: Larry Keck is an avid reader of adventure series like Rick Riordan’s Percy Jackson, enjoys the whimsical storytelling of the LEGO Movie, and they listen to classic tracks by The Beatles alongside
    upbeat pop from Taylor Swift, illustrating how creative narratives fuel their imagination.
  travel: Larry Keck’s travel style centers on family‑planned road trips, from exploring the Freedom Trail in Boston and summer days at Cape Cod to seasonal bird‑watching walks in Lynn Woods, and they dream
    of a future adventure to Washington, DC’s National Museum of Natural History.
  culinary: Larry Keck favors classic comfort foods such as buttery pepperoni pizza, creamy macaroni and cheese, and New England clam chowder, often trying to bake cinnamon rolls with their mother and keeping
    a stash of chocolate chip cookies near their study desk.
  core: Larry Keck is a methodical 9‑year‑old who channels their love for LEGO and chess into disciplined routines, balances a diligent saving plan with a sweet tooth, and navigates life’s challenges with
    quiet confidence and a habit of double‑checking every puzzle piece.
background:
  cultural: Larry is a white American raised in Lynn, Massachusetts, a city on the North Shore of Boston with a rich mix of immigrant and long‑standing New England families. He grows up in a middle‑class
    household that celebrates typical American holidays such as Thanksgiving, Independence Day, and Christmas, and participates in community events like the Lynn Farmers Market and local library story times.
    The public school system and the city's proximity to Boston offer exposure to both urban diversity and traditional New England values, shaping his sense of community responsibility and modest cultural
    traditions.
