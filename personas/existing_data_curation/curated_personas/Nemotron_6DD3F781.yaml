  career_goals: He aims to become a senior director of real-estate operations for a forward-thinking firm that prioritises sustainability and community culture. Over the next five years he plans to obtain
    the Certified Property Manager (CPM) designation and lead a portfolio of high-profile mixed-use developments that incorporate smart-building technologies and curated public art. He also envisions launching
    his own boutique management company that offers flexible, tech-enabled services to art-focused co-living projects, positioning himself as a bridge between real-estate efficiency and creative community
    building.
