personas:
  professional: Summer Boughman, a retired community organizer turned volunteer board member at the local seniors' center, leverages meticulous event‑planning skills, budget‑savvy household management,
    and a natural knack for mediation to lead the new community garden project and mentor peers in digital literacy, demonstrating how they blend structure with community spirit.
  sports: Summer Boughman, a dedicated member of the East Bay Trail Blazers walking club, enjoys low‑impact cardio through spring wildflower hikes and autumn leaf‑strolls in the Marin Headlands, tunes in
    to the San Francisco Giants and Golden State Warriors on game days, and they practice weekly yoga to complement their birdwatching excursions.
  arts: Summer Boughman's artistic life weaves together nightly sessions listening to The Rolling Stones and Fleetwood Mac, vibrant quilting inspired by the patterns of Mary Cassatt and local folk art,
    and behind‑the‑scenes contributions to community theater productions featuring classics like "Our Town", all of which reinforce how they cherish collaborative creativity.
  travel: Summer Boughman meticulously plans their travel, favoring group road trips to acclaimed national parks such as Yosemite, Redwood, and Grand Teton with their book‑club friends, while they dream
    of a spring pilgrimage to the cherry blossoms of Kyoto, balancing their love for nature with a modest retirement budget.
  culinary: Summer Boughman's culinary repertoire showcases farm‑to‑table creations like heirloom tomato bruschetta, kale‑quinoa salad tossed with lemon vinaigrette, and rosemary‑infused roasted chicken,
    often crowned with a splash of fresh basil and the occasional rose petal jam for a fragrant finish, reflecting how they celebrate the bounty of their garden.
  core: Summer Boughman is a garden‑loving, quilt‑crafting social butterfly who balances a penchant for meticulous budgeting with an occasional splurge on exotic seed packets, all while they navigate mild
    health hurdles with resilient optimism.
background:
  cultural: Summer is a white American who grew up in a small Midwestern town before moving to Vacaville, California in her early thirties. Her family's roots trace back to German and Irish immigrants who
    settled in the United States in the early 1900s. She carries the values of self-reliance, community involvement, and a strong work ethic common in that heritage. Living in Solano County's agricultural
    region has deepened her appreciation for farm life, seasonal rhythms, and fresh produce. She was raised in a Protestant (Methodist) household, which fostered a tradition of service and fellowship, influences
    that continue to shape her volunteer mindset and community-center activities today.
