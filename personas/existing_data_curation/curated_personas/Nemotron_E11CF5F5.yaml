  career_goals: Although retired from formal employment, Summer aims to stay actively engaged in her community. She hopes to lead a new community garden project that brings neighbours together and provides
    fresh produce for local food banks. She wants to take on a mentorship role at the senior center, teaching digital skills to fellow seniors and guiding younger volunteers. Summer also plans to enroll
    in a local college's adult education program to improve her Spanish and explore creative writing, eventually compiling her life stories into a memoir. Maintaining her health is a priority, so she aspires
    to keep up with her weekly walking group and low-impact yoga classes, ensuring she can enjoy future travel to national parks with her friends.
