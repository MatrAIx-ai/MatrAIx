persona_description: A historian who specializes in the study of Philippine pottery, particularly the traditional forms, patterns, and techniques used during the ancient times. Her research interests include
  the cultural and artistic significance of the pottery, its impact on the development of Philippine art, and the influence of Chinese porcelain on the originality of the native ware. She is also interested
  in the history and evolution of the pottery industry in the Philippines, and how it has changed over time.
