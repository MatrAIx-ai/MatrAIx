  hobbies: '[''Reading classic literature'', ''Creative writing (poetry, essays)'', ''Vegetable gardening'', ''Quilting'', ''Hiking'', ''Local historical society involvement'', ''Yoga'', ''Library volunteer'']'
  career_goals: Margaret aims to achieve tenure and advance to a senior academic rank, ultimately becoming department chair. She plans to develop an interdisciplinary program that links literary studies
    with digital humanities, and to publish a monograph on Midwest literary culture. Securing a multi‑year grant from the National Endowment for the Humanities to support research and community outreach
    is a key objective. She also seeks to improve student retention through structured advising initiatives and to be recognized as a leading scholar in early American studies while mentoring the next generation
    of faculty.
