  hobbies: '[''LEGO building'', ''Scratch coding projects'', ''Playing basketball'', ''Playing baseball'', ''Video gaming (Minecraft, Fortnite)'', ''Reading science‑fiction and adventure books'', ''Astronomy
    (stargazing)'', ''Watching documentaries on space and technology'', ''Attending local football games'', ''Nature hikes in the Texas Panhandle'', ''Drawing comic strips'']'
  career_goals: Alex aspires to become a STEM professional, with a particular interest in engineering. He dreams of studying aerospace or mechanical engineering at a university like Texas A&M, where he
    hopes to design innovative aircraft or space‑exploration technologies. He also envisions joining a robotics club in high school to gain hands‑on experience, competing in state‑level contests, and eventually
    securing a scholarship that enables him to pursue his degree. While ambitious, Alex remains practical, setting short‑term goals such as maintaining strong grades, earning a spot on his high school robotics
    team, and exploring summer STEM camps to build a solid foundation for his future career.
