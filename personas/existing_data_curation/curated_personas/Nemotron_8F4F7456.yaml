personas:
  professional: A budding young technologist, Alex Rowe merges a practical love for LEGO robotics with Scratch programming, delivering meticulously crafted yet adaptable projects at school science fairs,
    guiding teammates confidently when needed but staying open to collaborative ideas.
  sports: Alex Rowe, an enthusiastic member of the Amarillo Youth Baseball League and the middle school basketball team, follows the Dallas Cowboys and the Houston Astros, balances structured practice with
    occasional pickup games at the local recreation center, and enjoys weekend hikes that double as informal cardio sessions across the flat Panhandle terrain.
  arts: Alex Rowe, a creative comic artist, draws strips inspired by Rick Riordan’s Percy Jackson adventures and Marvel’s Spider‑Man stories while listening to Taylor Swift’s pop hits, and spends hours
    building LEGO sets that echo the futuristic aesthetics of the movie Ready Player One.
  travel: Alex Rowe, a curious traveler, prefers family road trips that blend adventure and learning, having explored Palo Duro Canyon, the KOB observatory in Alpine, and a weekend getaway to Austin’s live‑music
    scene, while dreaming of a school‑organized visit to the Kennedy Space Center to deepen their passion for astronomy.
  culinary: Alex Rowe, an eager kitchen helper, delights in assisting with smoky brisket and chili con carne seasoned with cumin and smoked paprika at backyard barbecues, enjoys crafting homemade mac and cheese
    topped with crisp bacon bits, and often caps the evening with s’mores cooked over a campfire.
  core: Alex Rowe balances hands‑on curiosity with community tradition, turning LEGO bricks into programmable robots while cheering at Friday night football, meticulously tracking their allowance despite
    occasional gaming splurges, and staying steady through school projects, sports, and star‑gazing nights.
background:
  cultural: Alex is a white Texan raised in Amarillo, a city in the heart of the Texas Panhandle. His community values hard work, school achievement, and local traditions such as high school football, rodeos,
    and community barbecues. He grew up hearing stories of the region's agricultural and oil‑industry heritage, which have instilled an appreciation for practical, hands‑on problem solving. Family celebrations
    often feature classic Texas foods, fireworks on Independence Day, and a mild Texan accent in everyday conversation. Although his household leans toward a moderate Christian background, Alex’s upbringing
    encourages curiosity about the world, blending respect for tradition with a strong interest in modern technology and science. This cultural mix shapes his balanced personality, allowing him to enjoy
    both contemporary hobbies and the enduring community spirit of his hometown.
attributes:
  skills: '[''Mathematics (pre‑algebra)'', ''Reading comprehension'', ''Creative writing'', ''Basic coding (Scratch)'', ''LEGO building and design'', ''Basic electronics tinkering'', ''Woodworking basics'',
