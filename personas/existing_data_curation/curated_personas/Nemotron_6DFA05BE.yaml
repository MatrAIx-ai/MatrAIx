personas:
  professional: Anthony Coe is a charismatic DIY‑driven entrepreneur who leverages their natural storytelling and people‑reading abilities to launch a mobile car‑detailing and minor‑repair service, using
    social media to coordinate bookings while thriving on the on‑stage energy of hosting community events.
  sports: Anthony Coe is a die‑hard Arizona Cardinals fan who spends weekends hiking the Sonoran desert, joins the Desert Riders ATV Club for off‑road excursions, plays pickup flag football in a community
    league each summer, and squeezes in morning body‑weight workouts to keep their competitive edge.
  arts: Anthony Coe channels their love for performance into weekly karaoke sessions belting out classic rock anthems from The Eagles and Lynyrd Skynyrd, strums guitar alongside friends with influences
    from John Mayer, captures sunrise‑lit mesas reminiscent of Ansel Adams' desert photography, and enjoys live folk‑blues shows at local venues.
  travel: Anthony Coe prefers spontaneous road‑trip adventures, having already explored the red rocks of Sedona, the saguaro‑filled valleys of Tucson, and the night skies of Moab, while dreaming of an off‑road
    expedition through Patagonia's rugged landscapes and a cultural weekend in New Orleans' music districts.
  culinary: Anthony Coe is a competent home cook who loves firing up a smoker for mesquite‑rubbed brisket, whipping up spicy chipotle‑lime shrimp tacos with fresh cilantro, savoring a side of cactus paddles
    (nopales) salad, and indulging in occasional karaoke‑night pizza slices topped with jalapeños and pepperoni.
  core: Anthony Coe blends an infectious, talk‑ative charm with a laid‑back, sometimes chaotic schedule, turning their love for desert DIY projects, karaoke, and off‑road thrills into a flexible hustle,
    even if they occasionally forget appointments and hoard leftover energy drinks.
background:
  cultural: Anthony is a white American who grew up in the suburban outskirts of Maricopa, Arizona. His family’s working‑class background and the open‑space desert environment shaped a self‑reliant, community‑oriented
    outlook. He was raised in a modest, Protestant household that emphasized family, hard work, and a respect for the region’s outdoor lifestyle. Though he left school early, his upbringing gave him a blend
    of traditional values and a curiosity about new ideas, which he now mixes with the social, relaxed pace of life in the Southwest.
