  career_goals: Anthony wants to turn his sociability and DIY know‑how into a flexible source of income. He envisions launching a mobile car‑detailing and minor‑repair service that can be booked through
    social media, allowing him to set his own schedule. A secondary ambition is to become a local community‑event organizer, hosting neighborhood gatherings and seasonal fairs. He also hopes to earn his
    GED within the next two years to broaden his options and eventually build a small business that combines his love for people, practical skills, and the Arizona desert lifestyle.
