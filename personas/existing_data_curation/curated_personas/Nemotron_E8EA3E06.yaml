  hobbies: '[''Bachata and merengue dancing'', ''Bridge card club'', ''Gardening'', ''Woodworking'', ''Reading historical biographies'', ''Cooking Dominican cuisine'', ''Genealogy research'', ''Walking
    in local parks'', ''Chess'']'
  career_goals: In retirement, Anderson aims to channel his structured mindset into community impact. He plans to establish a local STEM mentorship program for high‑school students, volunteer as a guide
    for the senior center’s technology workshops, and compile a written memoir that chronicles his family’s migration story and his professional journey. He also aspires to maintain his health through regular
    walking and dancing, and hopes to make at least two trips to the Dominican Republic in the next five years to reconnect with his roots and visit extended family.
