personas:
  professional: Erica Castro, a 36‑year‑old construction laborer certified in OSHA‑10, combines expertise in concrete finishing, framing, and heavy‑equipment operation with a natural flair for on‑site mentorship
    and storytelling, though their laid‑back attitude toward planning occasionally leads to last‑minute task shuffling.
  sports: Erica Castro enjoys hiking the Indiana Dunes, weekday bike rides, cheering for the Chicago Cubs and Chicago Bulls, and rides with a local women’s cycling club on Saturday mornings, balancing vigorous
    outdoor activity with occasional DIY home‑gym workouts.
  arts: Erica Castro channels curiosity into sketching downtown street scenes and acrylic paintings inspired by the bold colors of Frida Kahlo, dances to salsa rhythms of Celia Cruz at community nights,
    and regularly shares original verses at open‑mic poetry sessions, weaving artistic expression into daily life.
  travel: Erica Castro favors spontaneous weekend road trips—cooking tamales on a campsite in New Orleans for its music vibe or trekking the Rocky Mountains for fresh air—while carefully budgeting to fund
    their future renovation venture and family responsibilities.
  culinary: Erica Castro is a confident home‑cook who masterfully prepares tamales with masa and rich mole sauce, often experimenting with chilies, chocolate, and fresh corn, and delights in exchanging
    recipes at pot‑luck gatherings that become lively culinary celebrations.
  core: Erica Castro blends rugged construction expertise with a vibrant artistic soul, thrives on social gatherings, yet juggles chronic back strain, budgeting quirks, and a habit of procrastinating plans.
background:
  cultural: Erica was raised in a bilingual household; her parents immigrated from Jalisco, Mexico, and Spanish was spoken at home alongside English. She grew up celebrating Día de los Muertos, quinceañeras,
    and other Mexican traditions, often preparing family recipes and participating in community festivals in the broader Chicago area. Living in Gary, Indiana, she blends Mexican customs with Midwestern
    cultural norms, forging a hybrid identity that values family loyalty, community support, and hard work. She stays connected to her roots through the local Mexican‑American community center, where she
    volunteers for cultural events and tutors children in Spanish. This dual cultural perspective informs her appreciation for vibrant art, communal gatherings, and a resilient, adaptable outlook on life.
