  hobbies: '[''salsa dancing'', ''Latin‑dance workshops'', ''open‑mic poetry'', ''sketching'', ''acrylic painting'', ''cooking Mexican cuisine'', ''hosting pot‑luck gatherings'', ''hiking Indiana Dunes'',
    ''biking local trails'', ''DIY home‑improvement projects'', ''guided meditation'', ''urban art podcasts'']'
  career_goals: Erica aims to transition from laborer to foreperson within the next two years by completing a certified foreman training program and earning a heavy‑equipment operator license. She hopes
    to later obtain an associate degree in construction management through night courses, positioning herself for a site‑supervisor role. Long‑term, she dreams of launching a small renovation business that
    specializes in artistic finishes – such as decorative concrete, custom murals, and culturally inspired design elements – allowing her to combine her construction expertise with her love of art. Financial
    independence and a steadier schedule are also priorities, as they would give her more flexibility to manage personal responsibilities and reduce stress.
