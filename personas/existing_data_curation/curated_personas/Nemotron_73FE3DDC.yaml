  career_goals: Although officially retired, Hung aims to leave a lasting cultural legacy in his community. He plans to curate a traveling exhibition of East Asian art and local senior artworks, author
    a memoir intertwining his personal life with broader historical narratives, and develop a mentorship program that pairs seasoned artists with emerging creators in Baltimore County. He also hopes to
    secure funding for a small community studio where seniors can explore novel artistic mediums, ensuring his lifelong curiosity and organized mindset continue to benefit others.
