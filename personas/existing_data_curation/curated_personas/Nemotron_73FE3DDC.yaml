personas:
  professional: Hung Kpa is a retired community volunteer coordinator who leverages an associate degree in business administration, meticulous planning, and a lifelong mastery of East Asian calligraphy
    and watercolor painting to orchestrate senior art exhibitions, mentorship programs, and a traveling showcase that fuses tradition with digital media.
  sports: Hung Kpa enjoys low‑impact fitness routines, joining morning walking groups at Cylburn Arboretum, playing weekly senior pickleball matches at the local community center, and cheering on the Baltimore
    Ravens during football season, all while maintaining a relaxed, habit‑driven approach to staying active.
  arts: Hung Kpa’s artistic life intertwines traditional East Asian calligraphy practiced to the cadence of guzheng music, watercolor landscapes of the Chesapeake Bay inspired by John Marin, a private collection
    of poetry from Langston Hughes and Wang Wei, and curating community exhibitions featuring the minimalist works of Agnes Martin alongside local senior artists.
  travel: Hung Kpa prefers meticulously planned cultural trips, favoring weekend train rides to Annapolis’s historic district and Baltimore’s Inner Harbor, dreaming of a spring pilgrimage to Kyoto’s serene
    Japanese garden, and balancing limited mobility with a love for quiet museum tours and tea house visits.
  culinary: Hung Kpa skillfully prepares classic miso soup, hand‑rolled spring rolls, and delicate poached fish flavored with local Maryland crab and fresh herbs, yet occasionally overcooks rice and, on
    rainy evenings, succumbs to the convenience of a favorite Sichuan pepper chicken take‑out, which they humorously label a ‘creative culinary shortcut.’
  core: Hung Kpa is a methodical yet whimsical elder who blends meticulous community planning with an unrelenting curiosity for abstract art, often found lost in thought over a brushstroke while vigilantly
    tracking their medication schedule.
background:
  cultural: Hung was raised in an East Asian household that emphasized respect for elders, the value of education, and the preservation of cultural traditions such as Lunar New Year celebrations, tea ceremonies,
    and calligraphic art. Growing up as an immigrant in the United States, he blended these traditions with an American sensibility, fostering a bicultural identity that celebrates both his heritage and
    his Maryland community. His cultural upbringing informs his disciplined approach to art, his reverence for historical continuity, and his commitment to sharing cultural knowledge through volunteer teaching
    and community events.
