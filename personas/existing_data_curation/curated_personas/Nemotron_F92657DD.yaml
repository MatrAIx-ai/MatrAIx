  career_goals: Mary aspires to open a community wellness hub in Gregory that combines fitness, art, and mental‑health resources. She plans to develop specialized programming for seniors and individuals
    coping with anxiety, leveraging her knowledge of exercise as a therapeutic tool. Over the next five years, she hopes to earn a bachelor's degree in Health Promotion, become a Certified Health Coach,
    and launch a mentorship program for aspiring fitness instructors. Additionally, Mary envisions partnering with local schools to incorporate movement and creativity into curricula, fostering a culture
    of holistic well‑being in her hometown.
