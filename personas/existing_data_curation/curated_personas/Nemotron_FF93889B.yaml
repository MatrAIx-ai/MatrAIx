personas:
  professional: Thomas Lavigne, a 17‑year‑old aspiring automotive technician, leverages their hands‑on experience fixing cars in their family garage, their knack for assembling custom PCs, and their methodical
    event‑planning skills to lead neighborhood basketball tournaments, all while applying their competitive edge and skeptical mindset to troubleshoot complex mechanical problems with precision.
  sports: Thomas Lavigne, a 17‑year‑old basketball enthusiast who practices daily on the court while rooting for the Cleveland Cavaliers, also captains the Riverside Youth Soccer Club and follows a regimented
    fitness schedule that balances weekend pickup games, early‑morning runs, and trail hikes, reflecting their competitive drive and organized nature.
  arts: Thomas Lavigne, a 17‑year‑old tech‑savvy creative, channels their artistic side by programming Arduino LED displays that pulse to Daft Punk's 'Around the World', streaming the cinematic scores of
    Hans Zimmer while unwinding with indie‑rock tracks from Imagine Dragons, and occasionally attending local high‑school theater productions starring up‑and‑coming actors like Maya Rosenthal.
  travel: Thomas Lavigne, a 17‑year‑old adventure‑seeker, spends their school breaks camping in Shenandoah National Park, has already taken a weekend road trip to the iconic car‑museum in Detroit, and dreams
    of a future backpacking tour through Japan’s Akihabara district and the historic streets of Florence, Italy, always planning meticulously with spreadsheet itineraries to squeeze the most mileage out
    of a modest budget.
  culinary: Thomas Lavigne, a 17‑year‑old who enjoys building both machines and meals, often cooks hearty spaghetti Bolognese with ground beef, tomatoes, garlic, and fresh basil, whips up loaded nachos
    topped with jalapeños, cheddar, and salsa after late‑night gaming sessions, and treats themselves to homemade pepperoni pizza on a DIY pizza stone whenever their toolbox is clean.
  core: Thomas Lavigne, a 17‑year‑old tireless tinkerer, blends their love of cars, computers, and community into a methodical, competitive drive that fuels both their weekend basketball showdowns and their
    long‑term dream of a teen‑focused auto‑tech hub, all while juggling a habit of postponing chores for gaming marathons.
background:
  cultural: Thomas grows up in Madison, Tennessee, a suburban community near Nashville with deep Southern roots. His family practices a modest, working‑class lifestyle that values self‑reliance, community
    involvement, and church participation. He is shaped by Southern hospitality, a strong sense of local pride, and exposure to both rural traditions and the vibrant music culture of the Nashville area.
    These influences foster his pragmatic outlook, competitive spirit, and commitment to helping his neighbors.
attributes:
  skills: '[''Computer hardware repair'', ''Software troubleshooting'', ''Basic automotive maintenance'', ''Event planning and coordination'', ''Leadership and teamwork'', ''Basketball and soccer playing'',
    ''Boy Scouts leadership'']'
  hobbies: '[''Basketball'', ''Competitive video gaming'', ''Electronics tinkering'', ''Model car building'', ''Community volunteering'', ''Hiking'', ''Church youth group activities'']'
  career_goals: Thomas aims to earn an associate degree in automotive technology or a related engineering field at a community college, followed by an apprenticeship in a reputable auto shop. He envisions
    eventually opening his own garage that also offers a community tech repair hub, blending his passions for cars and computers. In the longer term, he hopes to mentor other teenagers in hands‑on trades,
    using his competitive drive to foster excellence and practical problem‑solving.
