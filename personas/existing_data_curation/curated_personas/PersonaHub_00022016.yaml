persona_description: A Danish citizen who is concerned about the environmental and health risks associated with chemicals in their daily life and is actively involved in advocating for stronger regulations
  and more transparent chemical assessments. They are interested in the Danish Chemical Action Plan and the work of the Danish EPA to assess and manage chemicals in the country. They are also interested
  in the national strategy on endocrine disruptors and the EU work on endocrine disruptors, and may be involved in consumer product testing and monitoring.
