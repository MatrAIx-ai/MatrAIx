personas:
  professional: Debra Brooks is a commercial property and casualty underwriter at a Florida insurance firm, blending meticulous risk assessment with data‑driven predictive modeling using Excel, Power Query,
    and Tableau, and they channel their love of both new ideas and proven methods into crafting policies that balance emerging cyber and climate exposures with practical compliance, while their cooperative
    yet assertive style guides brokers toward mutually beneficial deals.
  sports: Debra Brooks hits the Fort Lauderdale Beach at sunrise for a rhythmic jog, joins a local paddle‑boarding club on the Intracoastal, practices Afro‑Caribbean dance for cardio, they cheer on the
    Miami Dolphins on game days and are a dedicated member of the Fort Lauderdale Running Club, balancing competitive spirit with a low‑key approach to fitness that includes yoga for mental balance.
  arts: Debra Brooks immerses herself in Afro‑Caribbean dance workshops, curates playlists featuring Beyoncé, Shaggy, and contemporary jazz saxophonist Kamasi Washington, they attend quarterly screenings
    of contemporary fiction adaptations at the Broward Center, and they capture culinary creations through digital photography inspired by the visual storytelling of Kehinde Wiley and Kara Walker.
  travel: Debra Brooks prefers short, purposeful culinary trips to cities like New Orleans, Austin, and Charleston to explore regional soul‑food revivals, they also dream of a week‑long cultural immersion
    in Jamaica and a tech‑focused conference in Tokyo, blending a pragmatic budgeting approach with a spontaneous love for seaside sunsets and impromptu photo walks.
  culinary: Debra Brooks loves reimagining classic Southern soul dishes—like collard greens tossed with roasted beet and smoked paprika, shrimp‑and‑grits elevated with quinoa and miso glaze, and honey‑glazed
    fried chicken paired with caramelized plantains—while experimenting with ingredients such as scotch bonnet peppers, kale, and black‑eyed peas; they document each plate with careful composition in Lightroom,
    and they often binge‑watch cooking shows late into the night, occasionally sacrificing sleep for the perfect recipe.
  core: Debra Brooks blends data‑driven underwriting expertise with a love for sunrise jogs, modern soul cuisine, and community mentorship, all while juggling a penchant for late‑night food‑blog scrolling
    and an assertive yet compassionate leadership style.
background:
  cultural: Debra was raised in a close‑knit African‑American family in South Florida, where church, music, and communal gatherings shaped her upbringing. Her parents, both college‑educated professionals,
    emphasized the importance of education and civic responsibility. The multicultural environment of Fort Lauderdale exposed her to Caribbean and Latin influences, which are reflected in her culinary tastes
    and musical interests. She celebrates Juneteenth and Kwanzaa, and actively supports local Black cultural festivals. As a member of the Fort Lauderdale chapter of the National Association of Black Professional
    Women, she participates in mentorship and networking events that reinforce her identity as a Black professional seeking representation in the insurance industry. These cultural experiences foster her
    resilience, community orientation, and commitment to giving back.
attributes:
  skills: '[''Commercial property underwriting'', ''Casualty underwriting'', ''Risk evaluation and analysis'', ''Policy structuring and pricing'', ''Data analysis (Excel, Power Query, Tableau)'', ''Predictive
    modeling'', ''Florida insurance regulatory compliance'', ''Negotiation with brokers'', ''Strategic planning'', ''Financial analysis'', ''Project management'', ''Stakeholder communication'', ''Mentorship
    and team development'']'
  hobbies: '[''Reading contemporary fiction and business psychology'', ''Beach jogging at sunrise'', ''Paddle‑boarding on the Intracoastal Waterway'', ''Yoga'', ''Afro‑Caribbean dance workshops'', ''Volunteer
    mentoring in financial literacy'', ''Cooking Southern soul food with modern twist'', ''Digital photography'', ''Culinary travel'']'
  career_goals: Debra aims to advance to senior underwriting leadership within five years, targeting roles such as Underwriting Manager or Director of Risk Solutions. She plans to earn the Chartered Property
    Casualty Underwriter (CPCU) designation and deepen her expertise in cyber and climate risk underwriting. Passionate about data‑driven decision making, she envisions leading a cross‑functional team that
    integrates AI‑based risk assessment tools to modernize underwriting processes. Debra also seeks to mentor emerging Black professionals in the insurance sector and champion diversity, equity, and inclusion
    initiatives at her firm. Long‑term, she aspires to contribute to industry thought leadership through speaking engagements, publishing whitepapers, and potentially establishing a consultancy focused
    on emerging risk insurance solutions.
