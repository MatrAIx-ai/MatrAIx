personas:
  professional: Andrea Ganas is a bilingual accountant who blends rigorous GAAP and IFRS expertise with a humanities‑infused critical perspective, and they lead audit teams with organized precision while
    staying open to innovative forensic techniques and sustainability reporting.
  sports: Andrea Ganas jogs along South Beach at sunrise, attends weekly yoga sessions at a studio on Ocean Drive, roots for the Miami Heat and Inter Miami CF, and they play in the local beach‑volleyball
    league during summer, balancing a competitive edge with a community‑focused fitness mindset.
  arts: Andrea Ganas immerses themselves in Miami’s vibrant art scene, regularly visiting the Pérez Art Museum and the Wynwood Walls, drawing inspiration from contemporary painters like Kehinde Wiley, and
    they often listen to Latin‑jazz legends such as Tito Puente while reviewing literary essays at local cafés.
  travel: Andrea Ganas favors culturally immersive trips, having explored Cartagena’s historic walled city, Oaxaca’s colonial markets, and Montmartre’s artistic cafés in Paris, and they are planning a future
    journey to Cusco to study Inca heritage and sustainable tourism.
  culinary: Andrea Ganas enjoys cooking Latin‑American dishes, mastering smoky chipotle chicken tacos, perfecting arroz con pollo with saffron, and crafting plantain‑based empanadas filled with dulce de
    leche, yet they habitually forget to set timers, leading to occasional over‑cooked sauces.
  core: Andrea Ganas is a curious yet pragmatic CPA‑in‑training who balances audit spreadsheets, salsa nights, and a secret habit of midnight snack‑induced over‑cooking, and they champion financial literacy
    in their Miami community.
background:
  cultural: Andrea is a second-generation Italian-American raised in a middle-class family that values education, community service, and cultural appreciation. Living in Miami, she has been immersed in
    a vibrant multicultural environment that blends Caribbean, Latin, and Southern U.S. influences. She is fluent in Spanish, celebrates both Italian holidays such as Ferragosto and local Miami traditions
    like Carnaval Miami, and her compassionate outlook is shaped by the diverse community she calls home.
