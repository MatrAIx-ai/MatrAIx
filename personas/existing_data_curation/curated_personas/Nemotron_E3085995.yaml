  hobbies: '[''Reading (fiction & non-fiction)'', ''Art gallery visits'', ''Yoga'', ''Beach jogging'', ''Cooking (Latin American cuisine)'', ''Volunteering (financial literacy tutoring)'', ''Book club'',
    ''Salsa dancing'', ''Traveling to cultural destinations'']'
  career_goals: Andrea aims to obtain her CPA license within the next year and move into a senior auditor role, eventually stepping up to audit manager or finance controller. She is particularly interested
    in developing expertise in forensic accounting and sustainability reporting, and she wants to lead corporate social responsibility initiatives within her firm. Additionally, she hopes to create a mentorship
    program that supports women and underrepresented groups in the finance industry.
