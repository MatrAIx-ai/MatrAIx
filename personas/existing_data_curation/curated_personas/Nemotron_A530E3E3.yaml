  career_goals: Lindsey dreams of growing up to become someone who can blend her love for art and helping others. She imagines herself as a wildlife illustrator who brings animals to life on the page, a
    teacher who inspires curiosity in young minds, or even an astronaut exploring new worlds and sharing the wonder of discovery. She aspires to keep learning, creating, and using her talents to make people
    smile and understand the world better.
