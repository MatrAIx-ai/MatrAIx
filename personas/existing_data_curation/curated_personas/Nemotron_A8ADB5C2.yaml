personas:
  professional: An aspiring teen illustrator, Eduardo Moralesmiranda, blends hand‑drawn sketches and digital painting in Procreate and Photoshop to craft speculative comic strips, while their relaxed, flexible
    attitude lets them experiment freely but often leaves project timelines loosely organized.
  sports: Eduardo Moralesmiranda drifts into winter pickup basketball games at the East Orange community center, follows the New York Knicks and New York Red Bulls with avid streaming sessions, and keeps
    a laid‑back fitness routine that includes occasional weekend runs along the Passaic River, while they treat each game as a chance to unwind from school pressures.
  arts: Eduardo Moralesmiranda pours their imagination into hand‑drawn comics and digital illustrations inspired by Moebius, Hayao Miyazaki, and the psychedelic tones of Tame Impala, while they curate playlists
    that blend indie rock with traditional marimba rhythms and attend local street‑art festivals to soak in vibrant visual culture.
  travel: Eduardo Moralesmiranda prefers low‑key weekend road trips to nearby art hubs like Brooklyn’s Williamsburg and the murals of Philadelphia, while dreaming of a culturally immersive journey to Oaxaca’s
    colorful markets and Kyoto’s historic temples, balancing careful budgeting with spontaneous photo‑walks.
  culinary: Eduardo Moralesmiranda crafts family‑style pupusas and hearty tamales with fresh masa, cheese, and savory fillings, showcases a growing knack for spice blending with ingredients like roasted
    chilies and cilantro, and they delight in exploring street‑food stalls for zesty elotes and craft sodas.
  core: Eduardo Moralesmiranda is a day‑dreaming teen visual storyteller who fills sketchbooks with fantastical worlds, flips between art projects and late‑night comic drafts, and habitually forgets to
    wear their glasses during creative marathons, all while they maintain a chill, flexible outlook on life.
background:
  cultural: Eduardo grows up in a bilingual Guatemalan household in East Orange. At home, Spanish is spoken alongside English, and family meals often feature dishes such as pepian, tamales, and pupusas.
    He celebrates holidays like Día de los Muertos and Semana Santa with traditional foods, candles, and stories passed down from his grandparents, who emigrated from Guatemala in the 1990s. The close‑knit
    extended family and the local Guatemalan diaspora community reinforce values of mutual support, respect for elders, and a love for storytelling. These cultural threads shape his artistic voice, prompting
    him to infuse his drawings with motifs from Guatemalan myths, vibrant colors, and a sense of communal narrative.
