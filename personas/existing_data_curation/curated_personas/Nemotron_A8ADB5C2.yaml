  career_goals: Eduardo hopes to turn his passion for visual storytelling into a career that lets him work on his own terms. He aims to enroll in a community-college graphic design or illustration program,
    build a freelance portfolio, and eventually secure commissions for book covers, game concept art, or murals that celebrate Guatemalan culture. He also dreams of designing community art workshops for
    younger kids in East Orange, using art as a bridge between his heritage and the local neighborhood. Flexibility is important to him, so he envisions a future where he can balance personal projects with
    occasional collaborative work in a studio or cultural nonprofit.
