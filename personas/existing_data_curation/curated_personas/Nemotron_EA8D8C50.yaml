  hobbies: '[''reading contemporary art criticism'', ''watercolor painting'', ''digital photography of architecture'', ''genealogy research'', ''book-discussion circle'', ''bridge'', ''museum docent volunteering'',
    ''visiting gallery openings'']'
  career_goals: Although retired, Juliana’s current ambitions focus on leaving a lasting cultural imprint. She aims to complete a memoir that weaves together her personal journey with the evolving art scene
    of the mid‑Atlantic region, and to donate a portion of her personal art collection to the Blackwood Historical Society. She also hopes to mentor a small group of younger volunteers in archival methods,
    establish a quarterly lecture series on unconventional art movements, and secure a modest endowment that funds scholarships for community members pursuing art‑related studies.
