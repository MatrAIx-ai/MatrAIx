persona_description: A professional in a career field who is aware of their own interest, values, beliefs, skills, perceptions, strengths, and weaknesses. They are motivated to manage their own career and
  choose a suitable career that aligns with their interests and skills. They seek feedback from their manager about their skills, strengths, and weaknesses and have a plan to achieve their career goals.
  They interact with employees from different work groups or fields within the company or outside the company to gather information and insights about their career development needs. They are proactive
  in seeking information about training and development programs offered by the company and taking the initiative to develop their skills and knowledge. They are also open to counseling and guidance from
  their employer to help them manage their career effectively.
