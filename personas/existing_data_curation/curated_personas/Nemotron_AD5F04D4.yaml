personas:
  professional: An organized high school senior and class secretary, Nancy Roberts leverages her proficiency with Microsoft Office and Google Workspace to coordinate environmental club projects, applying
    her methodical planning and data‑analysis skills toward a future in logistics and supply‑chain management.
  sports: A seasonal outdoors enthusiast, Nancy Roberts spends spring and summer hiking with the River Trail Runners Club, follows the Detroit Tigers baseball team, and joins the local co‑ed volleyball
    league, balancing cardio hikes along the St. Clair River with weekly strength sessions at the community gym.
  arts: A creative spirit, Nancy Roberts captures the moody light of forest canopies through nature photography inspired by Ansel Adams, strums acoustic renditions of John Mayer songs at family gatherings,
    and reads Margaret Atwood’s speculative novels, finding artistic solace in both visual and musical expression.
  travel: An eager explorer, Nancy Roberts has trekked the limestone cliffs of Mackinac Island, taken a road trip to Chicago’s Art Institute, dreams of hiking Banff National Park’s alpine trails and immersing
    in Kyoto’s cherry‑blossom festivals, blending budget‑friendly road trips with future international adventures.
  culinary: A home‑cooking enthusiast, Nancy Roberts reimagines her grandmother’s Midwestern chicken pot pie by adding fresh rosemary and a dash of smoked paprika, experiments with homemade kimchi for a
    tangy side, and enjoys crafting latte art with oat milk, showcasing both comfort food roots and global flavor curiosity.
  core: Nancy Roberts balances methodical planning with spontaneous creativity, juggling spreadsheets, hikes, and guitar strings while occasionally forgetting to water her potted plants during late‑night
    study sessions.
background:
  cultural: Nancy was raised in Capac, a small community in St. Clair County, Michigan. Her family traces its roots to German and Polish immigrants who settled in the Great Lakes region in the early 20th century.
    Growing up, she absorbed Midwestern values of hard work, modesty, and strong community involvement. Local traditions such as church gatherings, high‑school sports events, and the annual county fair
    play a central role in her social life. Proximity to Lake Huron and the surrounding agricultural landscape fostered her appreciation for nature and seasonal rhythms. Her upbringing blends traditional
    family meals, neighborly support, and an openness to practical innovation, reflecting a mix of cultural heritage and contemporary small‑town American life.
