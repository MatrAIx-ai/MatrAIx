  hobbies: '[''Hiking'', ''Nature photography'', ''Reading (science-fiction & non-fiction)'', ''Journaling and sketching'', ''Volunteering at the library'', ''Organizing community clean-up events'', ''Cooking'',
    ''Playing acoustic guitar'']'
  career_goals: Nancy plans to enroll in a community college program focusing on business administration and supply‑chain management, aiming to become a logistics coordinator for a regional manufacturing
    firm. She is also exploring courses in environmental engineering to merge her curiosity for innovative solutions with practical sustainability projects for her hometown. In the short term, she intends
    to secure an internship with a local company and earn a project‑management certification (CAPM). Her long‑term ambition is to lead efficient operations and eventually launch a consulting business that
    helps local farms adopt modern inventory and distribution practices.
