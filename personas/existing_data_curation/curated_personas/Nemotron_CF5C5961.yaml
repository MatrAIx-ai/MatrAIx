  career_goals: Kenneth aspires to a career that combines his love for systematic problem solving and tangible outcomes. He aims to become a civil engineer, designing bridges and buildings that serve his
    community, and is motivated to pursue advanced STEM courses in high school and college. He also dreams of serving as a firefighter, valuing the routine, teamwork, and clear impact of protecting others.
    In pursuit of these goals, he plans to excel academically, participate in robotics and engineering clubs, and maintain his physical fitness through sports.
