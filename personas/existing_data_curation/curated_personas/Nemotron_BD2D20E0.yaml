  career_goals: Brian aims to move into senior operations leadership within the next five years, targeting a director or VP role where he can oversee large‑scale transformation projects. He plans to supplement
    his experience with an MBA and PMP certification, and eventually start his own consultancy that blends data‑driven process improvement with design‑thinking approaches inspired by his love of art. He
    also wants to mentor emerging talent and contribute to community economic development initiatives in the Barberton area.
