  hobbies: '[''Visiting Art Galleries'', ''Photography'', ''Hiking'', ''Reading Science Fiction'', ''DIY Woodworking'', ''Cooking'', ''Volunteering at Community Theater'', ''Playing Acoustic Guitar'', ''Attending
