persona_description: A volcanologist who works at the Hawaii Volcano Observatory, monitoring and analyzing volcanic activity and earthquakes in the Hawaiian Volcano National Park. They are responsible for
  providing regular updates on the current state of Kīlauea Volcano, including seismic activity, ground deformation, gas emissions, and other monitoring data. The persona is knowledgeable about the history
  and past activity of the volcano, and is able to provide detailed information on the current state of the volcano based on the latest data from the Hawaii Volcano Observatory. They are also responsible
  for issuing alerts and updates as needed based on changing activity, and for providing information on earthquakes in the Ka'ōiki Pali area. The persona is likely to be experienced and knowledgeable in
  volcanic monitoring and analysis, and is able to provide accurate and reliable information to the public.
