  hobbies: '[''Gardening (vegetables and herbs)'', ''Cooking soul food and experimenting with new recipes'', ''Listening to R&B, gospel, and jazz music'', ''Church attendance and choir participation'',
    ''Walking or jogging in local parks'', ''Knitting and crocheting'', ''Crossword puzzles and brain teasers'', ''Reading self‑help and personal development books'']'
  career_goals: Marcella aims to advance to a supervisory or office‑manager role within the next three years, leveraging her practical experience and competitive drive. She plans to earn her GED and pursue
    a certification such as the Certified Administrative Professional (CAP) to strengthen her credentials. Long‑term, she envisions leading a team of receptionists, implementing efficient workflow systems,
    and possibly transitioning into community outreach coordination at a local nonprofit, using her organizational talents to support programs that serve Knoxville’s African‑American community.
