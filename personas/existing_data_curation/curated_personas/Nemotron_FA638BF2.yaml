  hobbies: '[''Cooking Cuban Cuisine'', ''Salsa Dancing'', ''Gardening'', ''Volunteer Work'', ''Reading Romance Novels'', ''Crocheting'', ''Attending Church Events'', ''Listening to Cuban Music'']'
  career_goals: Alexia aims to advance to a supervisory role within her store, leveraging her organizational strengths and calm leadership style to oversee floor operations and train new employees. She
    also plans to complete a GED program to broaden her qualifications, which could open opportunities for a part‑time inventory specialist position with higher pay. Long‑term, she wants a stable retirement
    income and hopes to supplement it by selling homemade Cuban pastries at local markets, sharing her cultural recipes with the community.
