  career_goals: Gwen aims to open a community-focused creative technology studio that partners with local museums, schools, and arts groups to produce interactive exhibits and digital storytelling projects.
    She wants to shift from an individual contributor to a thought leader who mentors emerging coders, especially women and mid-career career changers, and to speak at national conferences on art, technology,
    and community empowerment. Over the next five years she plans to launch a sustainable freelance practice offering custom interactive installations, develop a low-code platform that enables artists to
    build immersive experiences, and secure a senior creative technologist role that lets her shape product direction while preserving a flexible schedule that matches her spontaneous work style.
