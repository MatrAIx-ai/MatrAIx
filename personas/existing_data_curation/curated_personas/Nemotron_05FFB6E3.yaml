personas:
  professional: Wayne Duke, a seasoned electrical and electronics engineer specializing in power distribution, industrial automation, and embedded hardware design, combines a methodical, structure‑loving
    mindset with a naturally talkative, competitive edge to lead cross‑functional teams, mentor junior engineers, and meticulously drive projects toward their goal of earning a PE license and transitioning
    into senior engineering management.
  sports: Wayne Duke, a dedicated cyclist who logs weekly rides on the Laurel Highlands trails with the Keystone Cycling Club, supplements training with gym workouts and summer intramural softball, and
    they passionately follow the Pittsburgh Steelers (NFL), Pittsburgh Penguins (NHL), and Pittsburgh Pirates (MLB), using personal performance metrics to satisfy their competitive nature.
  arts: Wayne Duke, an enthusiastic member of the Evans City Community Theater who regularly stars in Neil Simon comedies and Arthur Miller dramas, channels theatrical flair into everyday conversations,
    while their off‑stage leisure includes listening to The Who’s rock anthems and Miles Davis’s modal jazz, reinforcing a charismatic, talkative identity.
  travel: Wayne Duke, who plans trips with meticulous spreadsheets, balances practicality with curiosity, and they enjoy weekend bike‑centric getaways to the Laurel Highlands, family road trips to Niagara
    Falls, and aspire to attend the Edinburgh Festival in Scotland and explore Copenhagen’s solar‑powered sustainability showcases, all while staying within a modest family budget.
  culinary: Wayne Duke, an adept home chef who transforms family gatherings into culinary showcases, frequently prepares roasted pork shoulder with a rosemary‑garlic rub, hearty paella brimming with saffron
    rice, and hand‑crafted apple‑cinnamon pie, while their love of woodworking leads them to build a custom smoker for slow‑cooked ribs, reflecting a meticulous, flavor‑focused approach to cooking.
  core: Wayne Duke, a structurally minded yet gregarious engineer, channels competitive talkativeness into mentoring, cycles relentlessly, builds custom woodworking projects, and occasionally over‑invests
    in hobby gear, all while never missing a chance to command the stage in community theater.
background:
  cultural: Raised in a middle‑class white family in western Pennsylvania, Wayne grew up with a strong work ethic rooted in the region’s manufacturing heritage. His father was a machinist and his mother
    a schoolteacher, instilling values of practicality, reliability, and community service. Living in Evans City, he embraces the town’s close‑knit culture, participates in local fairs, and maintains a
    pragmatic yet sociable outlook shaped by his Mid‑Atlantic upbringing.
attributes:
  skills: '[''Power systems engineering'', ''Industrial automation design'', ''PLC programming (Allen‑Bradley, Siemens)'', ''PCB layout and fabrication'', ''Embedded C/C++ development'', ''AutoCAD Electrical'',
