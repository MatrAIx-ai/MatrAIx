  hobbies: '[''Amateur radio (ham)'', ''Woodworking'', ''Cycling on local trails'', ''Community theater acting'', ''Guitar playing'', ''Home brewing'', ''STEM mentorship for high‑school students'', ''Cooking
    and hosting dinner parties'']'
  career_goals: Wayne aims to obtain his Professional Engineer (PE) license within the next two years and transition into a senior engineering management role, overseeing a multidisciplinary team that develops
    renewable‑energy solutions for the regional grid. He also envisions launching a boutique consulting firm focused on smart‑grid and energy‑efficiency projects, leveraging his deep technical background
    and strong leadership presence.
