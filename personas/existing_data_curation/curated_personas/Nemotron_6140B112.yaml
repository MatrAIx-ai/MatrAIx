personas:
  professional: A budding early-childhood explorer, Kevin Ross channels a blend of curiosity and practicality into daily play, skillfully assembling and disassembling block towers while quietly ensuring
    toys are returned to their proper places, hinting at an early talent for organized problem-solving.
  sports: An energetic toddler, Kevin Ross loves chasing after a soft ball at the local park, attending a weekly toddler gymnastics class at Little Sprouts Gym, and proudly wears a miniature Chicago Cubs
    cap while cheerfully shouting encouragement for the team during family game nights.
  arts: A vivacious little fan of the arts, Kevin Ross delights in dancing to The Wiggles and Raffi, singing along to Sesame Street's Elmo, and flipping through picture books by Dr. Seuss, often mimicking
    the characters' voices and gestures with unbridled enthusiasm.
  travel: A curious explorer, Kevin Ross enjoys short family getaways to the nearby beach at Santa Monica, a weekend visit to the Grand Canyon's visitor center, and eagerly anticipates a future trip to
    Disney World, preferring trips that involve familiar faces, playful activities, and plenty of snack breaks.
  culinary: A budding food enthusiast, Kevin Ross prefers creamy macaroni and cheese, crunchy carrot sticks, and sweet banana slices, often pretending to stir a pot of oatmeal with a plastic spoon and proudly
    declaring a cookie-crumb masterpiece when a stray chocolate chip lands on the floor.
  core: Kevin Ross, a 2-year-old whirlwind of curiosity and gentle kindness, habitually lines up toy cars in perfect rows before joyfully scattering them again, and can't resist a sudden cookie-crumb tantrum
    when a tower collapses.
background:
  cultural: Kevin is raised in a white family living in Lenore, Idaho, within Nez Perce County. His upbringing reflects a rural Idaho lifestyle, emphasizing community gatherings, outdoor recreation, and
    seasonal celebrations such as Fourth of July barbecues and Thanksgiving meals. While his household primarily follows mainstream American customs, occasional community events introduce him to the cultural
    heritage of the Nez Perce people, fostering a respectful awareness of local indigenous traditions. His family participates in a small community church, reinforcing values of kindness, cooperativeness,
    and harmony that align with his personality profile.
