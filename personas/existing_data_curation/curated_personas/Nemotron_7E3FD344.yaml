  career_goals: Nadene aims to progress into a district-level retail management role within the next three to five years, leveraging her STEM background to embed data-driven strategies across multiple stores.
    She aspires to spearhead innovative visual merchandising concepts that blend art and retail, such as pop-up gallery installations and experiential shopping experiences. Long-term, she envisions opening
    a boutique that curates contemporary art alongside thoughtfully selected products, creating a community-focused space that reflects her love of creativity and inclusive culture. She also plans to pursue
    professional development in organizational leadership and advanced analytics to strengthen her strategic impact.
