  career_goals: Candace aims to attend a STEM‑focused high school and later pursue a degree in computer science or environmental engineering. She envisions a career as a software developer creating tools
    for environmental monitoring, combining her curiosity about the natural world with practical problem‑solving. She also hopes to acquire a counseling certification to support peers who experience anxiety,
    drawing on her own sensitivity to stress. Ultimately, she wants a stable, impactful profession that allows both independent work and occasional collaborative projects.
