personas:
  professional: An aspiring junior programmer, Candace Smallwood blends a love for Python scripting with a pragmatic approach to problem‑solving, using their science‑fiction reading habit to spark creative
    algorithm ideas while staying organized enough to meet high‑school coding club deadlines and thriving in small‑group project settings.
  sports: Candace Smallwood channels their love of the outdoors into weekend hikes with the local Lakeview Trail Club, cheers for the San Diego Padres and the LA Lakers on game nights, and occasionally
    practices yoga at their high‑school wellness club to balance quiet movement with the occasional competitive spirit of a community soccer pick‑up game.
  arts: Candace Smallwood expresses their inner world through digital illustration of cyberpunk landscapes inspired by artists like Syd Mead and the music of Grimes, while their book club discussions often
    revolve around contemporary sci‑fi authors such as N. K. Jemisin, and they enjoy rewatching classic films like Blade Runner for visual inspiration.
  travel: Candace Smallwood prefers low‑key, well‑planned getaways, spending summer weekends at nearby La Jolla beaches, dreaming of a spring trek to Joshua Tree National Park, and keeping a modest travel
    fund for a future trip to Kyoto to attend a manga convention, all while balancing school responsibilities and their family’s modest budget.
  culinary: Candace Smallwood favors a blend of fresh Californian fare—like fish tacos with cilantro, lime, and avocado, avocado toast sprinkled with pepper flakes, and occasional sushi rolls—while their
    cooking skill is modest, often whipping together simple recipes from YouTube, and they occasionally indulge in late‑night snack runs for chocolate chip cookies when stress rises.
  core: Candace Smallwood is a quiet, curiosity‑driven teen who balances creative coding and digital art with weekend hikes, a nervous habit of over‑thinking finances, and a penchant for late‑night sci‑fi
    marathons that sometimes leave them exhausted.
background:
  cultural: Candace was raised in a middle‑class, suburban family in Lakeside, California. Her upbringing reflects typical Southern California white middle‑class culture, emphasizing education, self‑reliance,
    and community involvement. Family traditions include weekend trips to nearby beaches and hiking in local nature reserves, celebrating mainstream holidays such as Thanksgiving and the Fourth of July,
    and participating in school and church activities that reinforce responsibility and teamwork. The multicultural environment of San Diego County also exposes her to diverse perspectives through school
    programs and community events.
