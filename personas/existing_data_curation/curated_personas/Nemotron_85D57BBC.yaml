  career_goals: Looking ahead, Alejandra hopes to share her hard‑won expertise by mentoring younger administrative staff at the local health clinic, emphasizing cultural sensitivity and flexible office
    practices. She dreams of launching a series of small workshops on traditional Mexican crafts—embroidery, papel picado, and pottery—to preserve her heritage and foster community bonds. To support these
    ambitions, she plans to enroll in a short community‑college course on digital record‑keeping and basic graphic design, enabling her to create promotional materials for cultural events. On a personal
    level, she seeks to adopt mindfulness techniques to better manage stress and worry, and hopes to someday travel to her family's hometown in Jalisco to capture its scenery through watercolor painting.
