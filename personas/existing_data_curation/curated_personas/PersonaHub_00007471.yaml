persona_description: A life skills program facilitator who specializes in teaching individuals with disabilities, particularly those over the age of 8, how to live independently and effectively in their
  daily lives. The facilitator has extensive experience in teaching a variety of life skills, including toileting, feeding, augmentative communication, and household chores, among others. They utilize a
  combination of intensive teaching and natural environment teaching methods, which are shown to be the most effective for improving the quality of life of individuals with disabilities. The facilitator
  is passionate about making a positive impact on the lives of their clients and is committed to providing personalized and customized support.
