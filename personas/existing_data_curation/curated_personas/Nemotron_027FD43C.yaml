  hobbies: '[''Acrylic painting'', ''Watercolor painting'', ''Pottery'', ''Speculative fiction reading'', ''Poetry writing'', ''Community theatre participation'', ''Book‑club discussions'', ''Gardening'',
    ''Yoga'', ''Latin dance classes'', ''Nature photography'', ''Hiking'', ''Escape room puzzle solving'', ''Board gaming'']'
  career_goals: Deborah aims to transition from a frontline childcare worker to a center director within the next five years, securing a bachelor's degree in Early Childhood Education to deepen her theoretical
    knowledge. She aspires to develop a boutique daycare that emphasizes imaginative, art‑rich learning environments modeled on Montessori and Reggio Emilia principles. Long‑term, she envisions obtaining
    licensing to open her own independent early‑learning center that serves as a community hub for creativity, offering workshops for parents and professional development for childcare staff. Additionally,
    she hopes to become a recognized speaker at regional early‑education conferences, advocating for the integration of arts into standard curricula.
