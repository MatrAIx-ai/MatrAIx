personas:
  professional: Liliana Ayala, a 39‑year‑old industrial technology specialist turned kinetic fabricator, channels MIG/TIG welding, CNC machining, and 3D CAD expertise into producing moving metal‑art installations
    while mentoring workshop participants, yet their love of spontaneity often clashes with the rigid timelines of manufacturing projects.
  sports: Liliana Ayala enjoys weekend hikes along the Appalachian Trail foothills, follows the Philadelphia Eagles and the Phillies, and participates in a local co‑ed recreational soccer league, using
    salsa‑inspired cardio drills to stay fit despite a tendency to skip structured gym sessions.
  arts: Liliana Ayala’s artistic world spins between creating kinetic metal sculptures inspired by Theo Jansen’s Strandbeests, dancing to the rhythms of salsa, bomba, and plena at local festivals, and performing
    improv scenes that channel the spontaneity of theater legends like Keith Johnstone, while they also draw inspiration from the vibrant installations of Yayoi Kusama.
  travel: Liliana Ayala prefers a blend of spontaneous weekend road trips to the Blue Ridge Mountains and planned cultural pilgrimages to New Orleans for Mardi Gras and Barcelona to study Gaudí’s sculptural
    architecture, balancing limited budget constraints with a desire to experience diverse artistic scenes.
  culinary: Liliana Ayala delights in preparing hearty Caribbean‑style dishes such as arroz con gandules, crispy tostones, and slow‑roasted pernil, skillfully seasoning with sofrito, plantains, and adobo
    while treating family gatherings as performance spaces where cooking becomes a communal celebration, though they sometimes over‑salt in excitement.
  core: Liliana Ayala is a charismatic 39‑year‑old maker who fuses industrial welding with kinetic art, radiates energy in dance and improv, champions community workshops, yet habitually battles deadline‑driven
    chaos and occasional self‑neglect.
background:
  cultural: Liliana is proudly of Puerto Rican descent, having grown up in a bilingual household where Spanish and English intertwined. Her cultural heritage is a central part of her identity; she celebrates
    La Navidad, San Sebastián, and other island festivals with music, dance, and traditional foods. She maintains strong ties to the local Puerto Rican community in Pennsylvania, participating in cultural
    clubs, supporting charitable initiatives for Puerto Rico after natural disasters, and infusing the rhythms and storytelling traditions of her ancestors into her artistic work. This blend of Caribbean
    warmth and Mid‑Atlantic resilience shapes her outlook on life and her commitment to community harmony.
