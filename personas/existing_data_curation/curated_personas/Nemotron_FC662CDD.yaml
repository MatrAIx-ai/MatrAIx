  hobbies: '[''Kinetic metal sculpture'', ''Salsa, bomba, and plena dancing'', ''Improv theater'', ''Upcycling scrap metal and plastic'', ''Reading speculative and science‑fiction novels'', ''Cooking Puerto
    Rican cuisine'', ''Hiking in Pennsylvania forests'', ''Youth center volunteering and mentorship'']'
  career_goals: Liliana aims to transition from a production role to a leadership position that blends manufacturing with creativity. She dreams of opening a community makerspace in Schuylkill County where
    local artists, students, and aspiring fabricators can experiment together. In the longer term, she hopes to become a lead fabricator for an innovative design firm, spearheading projects that integrate
    metal and plastic with artistic concepts, and eventually launch her own line of kinetic sculptures that serve both aesthetic and functional purposes while providing apprenticeship opportunities for
    underrepresented youth.
