  hobbies: '[''Street Photography'', ''Sketching'', ''Hiking'', ''Craft Beer Tasting'', ''Strategy Video Games'', ''Speculative Fiction Reading'', ''DIY Furniture Making'', ''Jam Sessions'']'
  career_goals: Ali aims to move beyond the shop floor by earning a Lean Six Sigma Yellow Belt and an associate’s degree in industrial technology. He hopes to become a shift supervisor within the next two
    years, leading a team and driving productivity improvements. In the longer term, he envisions launching a small custom‑furniture business that would let him merge his production expertise with his artistic
    side. He is also interested in taking evening courses in CAD design to broaden his design capabilities.
