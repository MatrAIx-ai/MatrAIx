  career_goals: Aimee aims to deepen her expertise by earning a Bachelor’s degree in Electrical Engineering, followed by a Master’s focused on emerging hardware technologies such as wearable computing and
    quantum sensors. She aspires to become a senior hardware engineer leading interdisciplinary product teams that blend technology with artistic expression—creating interactive installations and next‑generation
    consumer electronics. In the longer term, she envisions launching her own startup that designs kinetic art pieces powered by custom‑built electronics, while also mentoring young women and underrepresented
    groups in STEM.
