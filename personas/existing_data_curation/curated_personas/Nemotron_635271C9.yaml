personas:
  professional: Aimee Wilkins is a budding electrical engineering student who merges circuit design mastery with generative art, leading cross‑functional prototypes that blend wearable tech and kinetic
    installations while thriving in a slightly chaotic, improvisational workflow.
  sports: Aimee Wilkins enjoys casual desert hikes in Red Rock Canyon, follows the Vegas Golden Knights and Las Vegas Raiders with spirited game‑day rituals, and belongs to a weekend rock‑climbing club
    at the local gym, treating fitness as a flexible, mood‑driven escape rather than a regimented schedule.
  arts: Aimee Wilkins channels their imagination into digital illustrations inspired by Beeple and Refik Anadol, composes ambient soundscapes using modular synths influenced by Brian Eno and Aphex Twin,
    and attends indie shows featuring bands like Tycho, all of which shape their identity as a hybrid technologist‑artist.
  travel: Aimee Wilkins prefers spur‑of‑the‑moment road trips to stark landscapes—such as the Nevada desert, Joshua Tree, and Iceland’s volcanic fields—while saving for a dream solo visit to Tokyo’s Akihabara
    for tech‑inspired art tours, balancing a limited student budget with a hunger for immersive, off‑beat experiences.
  culinary: Aimee Wilkins enjoys experimenting in the kitchen, often whipping up vegan taco bowls with roasted jackfruit, spicy harissa, and fresh cilantro, while their favorite comfort dish remains a perfectly
    seared ramen with miso broth, soft‑boiled egg, and a dash of yuzu, reflecting a palate that loves bold, umami‑rich flavors and occasional DIY fermentation projects.
  core: Aimee Wilkins is a 21‑year‑old imaginative engineer‑artist who fuses circuitry with sculpture, lives on a flexible schedule fueled by caffeine and curiosity, and navigates life’s chaos with a playful
    mix of meditation, impulsive purchases, and relentless creative tinkering.
background:
  cultural: Raised in a middle‑class family on the outskirts of Las Vegas, Aimee’s cultural background blends mainstream American traditions with the unique vibe of the Nevada desert. Her family, of European‑American
    ancestry with roots in the Midwest and the West, celebrates holidays such as Thanksgiving and Independence Day with close‑knit gatherings, while also appreciating the city’s entertainment culture. Frequent
    weekend trips to nearby national parks and a love for open‑space outdoor activities have shaped her appreciation for both community and solitude, informing her balance of social engagement and alone
    time.
