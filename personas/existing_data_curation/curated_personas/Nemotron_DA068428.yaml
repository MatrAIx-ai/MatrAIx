  hobbies: '[''Reading historical fiction'', ''Gardening'', ''Knitting'', ''Jigsaw puzzles'', ''Hiking local trails'', ''Book club'', ''Volunteering at community library'']'
  career_goals: Rosemarie aims to move from cashier to shift supervisor within the next two years, then pursue a store manager role. To support this progression, she plans to enroll in a community‑college
    business program focused on retail management and leadership. Long‑term, she envisions owning a small boutique or specialty shop in New Baden, allowing her to blend her practical skills with a personal
    entrepreneurial vision while maintaining a stable, community‑oriented career.
