  career_goals: Although retired, Jacqueline’s primary ambition is to leave a lasting legacy for her family and community. She is compiling a handwritten memoir and a family recipe book to pass down to
    her grandchildren. She wishes to continue serving as an elder advisor at the local senior center, helping shape programs that foster social connection for seniors. Additionally, she hopes to document
    the oral histories of longtime Roanoke residents, preserving the community’s story for future generations.
