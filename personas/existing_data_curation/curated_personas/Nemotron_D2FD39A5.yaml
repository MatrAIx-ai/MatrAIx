  career_goals: Although retired from the formal workforce, Akram aims to remain intellectually active by authoring a memoir that weaves his business experiences with reflections on art and philosophy.
    He aspires to establish a quarterly newsletter for small‑business owners in Tampa, offering strategic insights and encouraging innovative thinking. Additionally, he hopes to sponsor a scholarship at
    a local college for students pursuing interdisciplinary studies that blend commerce with the humanities, thereby leaving a lasting legacy of curiosity and disciplined creativity.
