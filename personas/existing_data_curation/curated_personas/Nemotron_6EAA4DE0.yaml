personas:
  professional: Chandler Doherty, a dental and ophthalmic laboratory technician, blends mastery of CAD/CAM software, 3‑D printing, and biomaterials with a vivid visual design sense, delivering meticulously
    crafted prostheses while navigating clinician collaborations through a balance of organized precision and creative flexibility.
  sports: Chandler Doherty, an avid hiker with the Redding Trail Hikers Club, follows the Sacramento Kings throughout the NBA season, joins a weekend mountain‑bike group exploring the Shasta‑Boon corridor,
    and punctuates the routine with occasional pickup basketball at the local community center, emphasizing low‑impact cardio over high‑intensity training.
  arts: Chandler Doherty, who paints watercolors echoing the tonal serenity of Claude Monet’s landscapes, creates digital illustrations inspired by Hayao Miyazaki’s whimsical line work, strums acoustic
    folk songs alongside local troubadour Jessa Campbell, and references the minimalist structures of Zaha Hadid while constructing laser‑cut scale models, weaving a tapestry of visual and auditory creativity.
  travel: Chandler Doherty, preferring meticulously planned solo road trips that blend photography with cultural immersion, has trekked the Canadian Rockies, explored the historic streets of Kyoto’s Gion
    district, and dreams of a summer workshop retreat in the Mendocino Coast to capture fog‑kissed vistas.
  culinary: Chandler Doherty, an enthusiastic home cook, frequents the Farmers Market for Sierra Nevada apples, heirloom tomatoes, and fresh goat cheese, whipping up rosemary‑infused grilled chicken, quinoa
    salads with roasted beets, and experimenting with a blueberry‑lavender panna cotta that showcases a balance of sweet and herbal flavors.
  core: Chandler Doherty fuses meticulous technical craftsmanship with boundless artistic curiosity, carving a niche in precision prosthetics by day while immersing in watercolor, model‑making, and folk
    music by night, all while habitually hoarding art supplies and navigating a disciplined yet creatively driven life.
background:
  cultural: Chandler grew up in a middle‑class, predominantly white community in Shasta County, California. His family’s cultural heritage is rooted in the broader Anglo‑American traditions of the West
    Coast, emphasizing self‑reliance, community involvement, and an appreciation for the natural environment. Local customs such as celebrating traditional American holidays (Thanksgiving, Fourth of July)
    and participating in community events like the annual Redding River Festival shaped his social outlook. The region’s mix of rural outdoorsmanship and small‑town civic life fostered a balanced perspective
    that values both individual creativity and collective responsibility. Exposure to the Sierra Nevada’s outdoor culture nurtured his love for hiking and nature photography, while the proximity to Redding’s
    modest arts scene offered access to galleries and workshops that fed his artistic curiosity.
attributes:
  skills: '[''Dental prosthesis fabrication (crowns, bridges, dentures)'', ''Ophthalmic device assembly and lens edging'', ''CAD/CAM design using Exocad and 3Shape'', ''3D printing and CNC milling for medical
    appliance prototypes'', ''Materials science knowledge (acrylics, composites, metals, high-index lenses)'', ''Quality assurance and regulatory compliance for medical devices'', ''Technical documentation
    and record-keeping'', ''Creative problem solving and design thinking'', ''Effective communication with clinicians and patients'', ''Time management and workflow optimization'', ''Lab safety and ergonomics'']'
  hobbies: '[''Watercolor painting of local landscapes'', ''Digital illustration with graphics tablet'', ''Scale model building (architectural and mechanical)'', ''Hiking and wildlife photography in Shasta
    County'', ''Acoustic guitar playing in a folk group'', ''Mentoring high-school students in CAD workshops'']'
  career_goals: Chandler aims to deepen his technical mastery and move into a leadership role within the dental/ophthalmic lab industry. Over the next three years he plans to earn a certified dental technician
    credential (e.g., CDT) and complete an associate degree in dental technology to complement his hands‑on experience. He aspires to become a senior technician or lab manager, overseeing a team that integrates
    advanced digital workflows such as intra‑oral scanning, AI‑driven design optimization, and additive manufacturing. Long‑term, Chandler envisions establishing his own boutique lab that focuses on custom,
    artistically inspired orthodontic and eyewear solutions, leveraging his penchant for novelty and abstract design. He also hopes to contribute to industry standards by presenting at regional conferences
    and publishing case studies on innovative material applications.
