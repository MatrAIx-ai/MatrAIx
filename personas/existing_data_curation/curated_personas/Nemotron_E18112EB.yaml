  hobbies: '[''Calligraphy'', ''Watercolor painting'', ''Gardening'', ''Reading classic literature'', ''Attending small art exhibitions'', ''Book club participation'', ''Cooking traditional recipes'', ''Volunteer
    storytelling and meditation at senior center'']'
  career_goals: Although retired from formal employment, Shuyun aims to continue contributing to her community by leading intergenerational art workshops, curating a small collection of local art exhibits,
    and publishing a memoir that preserves her family's migration story and cultural heritage. She aspires to serve on the advisory board of the Framingham Asian Cultural Association to foster cultural
    exchange and to mentor emerging artists in the area, ensuring that her legacy of harmony, curiosity, and service endures.
