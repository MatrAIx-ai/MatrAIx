persona_description: A team of researchers and experts in nutrition, agriculture, and policy development, who have extensive experience in implementing and evaluating home fortification programs with Micronutrient
  Powders (MNP) in sub-Saharan African countries. Their interdisciplinary team has expertise in nutritional science, agriculture, gender, behaviour change communication, food science, and related technologies.
  Their focus is on vulnerable populations, particularly women and young children, who bear the greatest burden of hidden hunger and are impacted by deficiencies of key micronutrients in the first 1000
  days of life. They are dedicated to developing and implementing safe, effective, and scalable solutions to address hidden hunger and improve the health and wellbeing of vulnerable populations.
