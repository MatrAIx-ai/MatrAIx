  career_goals: Glen’s immediate goal is to move into a supervisory or store-manager role at his current retail chain within the next two to three years, where he can shape the sales floor into a calm,
    organized space that aligns with his preference for quiet, low‑stress environments. He wants to mentor younger staff, sharing his storytelling approach to product knowledge while modeling a flexible
    yet accountable work ethic. Over the longer term, Glen envisions opening a niche online boutique focusing on historically inspired home décor and high-quality outdoor equipment, leveraging his deep
    product research skills. To support this, he plans to complete a part-time certificate in retail management and explore e‑commerce training, ultimately balancing a stable income from the store with
    the entrepreneurial venture.
