  hobbies: '[''community volunteering'', ''gardening'', ''yoga'', ''mindfulness meditation'', ''adult coloring'', ''book club'', ''cooking classes'', ''local theater outings'', ''walking in Cuyahoga Valley
    National Park'']'
  career_goals: Jennifer aims to progress into a senior operations leadership role where she can shape strategic initiatives that improve both efficiency and employee well‑being. She plans to earn a Lean
    Six Sigma Black Belt to deepen her expertise in continuous improvement, and she hopes to mentor younger staff, especially women entering STEM fields. Over the next few years she also wants to champion
    a workplace wellness program that addresses stress and anxiety, creating a more supportive, harmonious environment for her colleagues.
