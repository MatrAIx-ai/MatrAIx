persona_description: A conservationist who is deeply concerned about the decline of salmon fishing stocks and the failure of conservation action to address the underlying issues of the ecosystem. They are
  aware of the challenges posed by introduced species, particularly in New Zealand, and the need for goal definition and coordination between the public, government, and private foundations to maximize
  the effectiveness of biodiversity conservation efforts. They are also interested in the New Zealand conservation story and the 12 recommendations given in Leathwick and Byrom (2023) and are looking for
  ways to apply these insights to address biodiversity crises in other ecosystems.
