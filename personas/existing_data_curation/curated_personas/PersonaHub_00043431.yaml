persona_description: A linguist who specializes in the study of indigenous languages of the Americas, particularly those spoken in the Bolivian Amazon region. This individual is knowledgeable about Movima,
  a language isolate spoken by about 1,400 people in the LLanos de Moxos region of the Bolivian Amazon. They have a deep understanding of Movima's phonology, morphology, and syntax, and are skilled in using
  a variety of linguistic tools to analyze and describe Movima. This persona is likely to be interested in Movima's unique features, such as its isolated status, and its role in the broader context of indigenous
  language studies.
