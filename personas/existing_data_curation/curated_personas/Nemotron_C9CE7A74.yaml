  career_goals: Linda aims to become a lead curriculum innovator at her college, championing a cross-disciplinary STEM-arts program that incorporates virtual reality labs and maker-space projects. She seeks
    to secure grant funding to expand community outreach, bringing hands-on science experiences to under-served youth in St. Lucie County. Over the next five years she envisions completing a PhD in Science
    Education, publishing a popular-science book that explores the intersection of art and physics, and mentoring a network of educators dedicated to flexible, student-centered teaching methods.
