  hobbies: '[''Gardening'', ''Fishing'', ''Listening to blues, gospel, and jazz music'', ''Reading historical fiction and biographies'', ''Genealogy research'', ''Playing dominoes and checkers'', ''Cooking
    Southern dishes'', ''Volunteering at church kitchen'']'
  career_goals: Although retired from formal employment, Tariq aims to channel his experience into community mentorship. He hopes to lead a weekly woodworking class at the local community center, teaching
    younger residents practical skills while sharing stories of the Black South. He plans to digitize and archive his family's photographs and oral histories, creating a small collection for the Harlem
    library. Tariq also aspires to take on a more active role in his church, possibly serving as a deacon or organizing outreach programs for seniors. On a personal level, he wants to ensure his grandchildren
    have access to educational resources, so he is working toward setting up a modest scholarship fund using careful budgeting and occasional part‑time consulting on home repairs.
