personas:
  professional: Derek Holt, a 28‑year‑old elementary and middle school teacher who leverages visual and performing arts to create inclusive, culturally responsive lesson plans, combines their imagination
    and organized planning to engage young learners while championing community mentorship and preparing for a future as an instructional coach.
  sports: Derek Holt, a 28‑year‑old educator, enjoys playing pick‑up basketball at the local community center, follows the Atlanta Hawks and Atlanta Falcons passionately, runs with the Fayette County Trail
    Runners during spring, and practices yoga twice weekly to counteract stress, and they balance competitive enthusiasm with a laid‑back social vibe.
  arts: Derek Holt channels a love for the blues and gospel by painting vibrant cityscapes inspired by B.B. King and Mahalia Jackson, plays saxophone in a local jazz ensemble that covers John Coltrane and
    Kamasi Washington, attends poetry readings featuring Amanda Gorman, and they weave these influences into their teaching and personal life, finding artistic rejuvenation in the works of visual artists
    like Jacob Lawrence.
  travel: Derek Holt, a 28‑year‑old teacher, prefers spontaneous weekend road trips to Southern historic sites like Savannah’s riverfront and the civil‑rights landmarks of Birmingham, while also dreaming
    of a cultural immersion trip to New Orleans for its jazz festivals and to the vibrant art scene of Detroit, and they balance limited vacation time with a desire for authentic community experiences.
  culinary: Derek Holt enjoys cooking soulful Southern dishes such as shrimp and grits, collard greens with smoked turkey, and peach cobbler, skillfully blending fresh herbs like thyme and hot sauce while
    experimenting with jazz‑inspired plating, yet they sometimes over‑season meals when stressed, revealing a habit of seeking bold flavors to match their vibrant personality.
  core: Derek Holt is a 28‑year‑old educator‑artist whose boundless imagination and community‑centric heart drive a vibrant, sometimes anxiously driven, pursuit of creative expression, cultural stewardship,
    and collaborative storytelling, and they thrive on turning challenges into opportunities for growth.
background:
  cultural: Derek grew up in the heart of the Black Southern tradition of Georgia, where church, music, and storytelling were central to family life. His upbringing was steeped in gospel hymns, blues riffs,
    and the oral histories of the civil‑rights movement, which shaped his deep appreciation for community resilience and artistic expression. He carries forward the traditions of intergenerational mentorship
    and communal service, often incorporating African‑American literary and artistic references into his teaching. While navigating the complexities of racial identity in a predominantly white suburban
    area, Derek strives to create inclusive classroom spaces that honor Black cultural contributions and empower his students to celebrate their own diverse backgrounds.
attributes:
  skills: '[''Curriculum development'', ''Differentiated instruction'', ''Arts integration'', ''Digital media for teaching'', ''Classroom management'', ''Conflict resolution'', ''Cultural competency'',
    ''Public speaking'', ''Student mentorship'', ''Collaborative team planning'']'
  hobbies: '[''Painting'', ''Saxophone'', ''Speculative fiction reading'', ''Poetry writing'', ''Tabletop RPGs'', ''Community gardening'', ''Gospel and blues concerts'', ''Southern cooking'', ''After‑school
    creative writing mentorship'']'
  career_goals: Derek aims to become an instructional coach or curriculum specialist within his district, focusing on expanding interdisciplinary arts programs that foster imagination and critical thinking.
    He plans to pursue a master's degree in Educational Leadership to eventually move into school administration, where he can advocate for culturally responsive pedagogy and mental‑health support for students.
    Long‑term, he envisions founding a community arts center in Fayette County that offers after‑school workshops, mentorship, and showcases for Black creative expression, bridging his teaching expertise
    with his passion for the arts.
