persona_description: A scientist who studies the impacts of climate change on the Earth system and has expertise in paleoclimatology, specifically in the analysis of ice cores and tree rings to reconstruct
  past climate conditions. They have a deep understanding of the causes and mechanisms of abrupt climate changes, including the role of ice sheets and ocean circulation in triggering these events. They
  have published research on the relationship between ice cores and climate reconstructions, and have used this knowledge to investigate the possibility of other mechanisms contributing to D-O events, such
  as melting Antarctic ice. They are likely to be interested in the implications of their research for future climate change and the need for adaptation strategies.
