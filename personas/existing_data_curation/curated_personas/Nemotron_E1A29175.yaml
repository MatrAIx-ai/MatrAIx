personas:
  professional: Wayne Carter is a two-year-old budding architect of cardboard forts, whose innate curiosity blends with a methodical love of order, allowing them to plan elaborate play structures while
    they delight peers with enthusiastic explanations.
  sports: Wayne Carter is an energetic toddler who attends weekly parent-led soccer tots sessions, proudly waving a tiny red jersey for the local youth club while they also join the preschool swimming splash
    hour, finding joy in the camaraderie and the chance to be the center of applause.
  arts: Wayne Carter is a lively mini-artist who splashes finger paints to recreate vivid rainbows, claps along to the rhythmic beats of 'Baby Shark', and idolizes animated singer Jojo Siwa, letting these
    creative outlets shape their spontaneous yet organized play as they engage friends in constant chatter.
  travel: Wayne Carter is a curious globe-trotter in training who loves family road trips to the nearby state park waterfall, delights in the sensory overload of the city aquarium, and they dream of building
    a sandcastle on the beaches of Florida after watching travel videos with their parents.
  culinary: Wayne Carter is a picky yet adventurous eater who adores mashed sweet potatoes, crunchy carrot sticks, and the occasional drizzle of honey on oatmeal, often demanding the bright green peas on
    the plate be separated from the peas of the same color, showcasing their methodical approach to meals as they negotiate snack time.
  core: Wayne Carter, a sociable two-year-old, balances boundless curiosity with a tidy, talk-filled play style, often leading peers in organized games while they occasionally forget bedtime routines for
    extra snack time.
background:
  cultural: Wayne is a Black American child raised in Tacoma, Washington. His family honors African‑American traditions such as music, storytelling, and community gatherings while also embracing the diverse
    cultural fabric of the Pacific Northwest. He experiences family meals that blend Southern dishes like collard greens with locally sourced produce, participates in Juneteenth celebrations, and attends
    events at the Tacoma Children’s Museum that reflect both his heritage and his community. His caregivers emphasize kindness, cooperation, and respect for others, fostering a nurturing environment for
    his social and emotional growth.
