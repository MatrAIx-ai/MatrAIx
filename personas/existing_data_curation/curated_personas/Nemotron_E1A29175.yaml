  hobbies: '[''dancing to music'', ''singing nursery rhymes'', ''building with wooden blocks'', ''drawing with crayons'', ''sensory play with water and sand'', ''listening to storytime'', ''group playdates'']'
  career_goals: Although still a toddler, Wayne often talks about wanting to "help people" and shows excitement for building things. He imagines becoming someone who constructs and fixes, like a builder
    or community helper, and someday may be interested in caring roles such as a nurse or teacher. His immediate ambition is to learn new words, explore new activities, and be the "big helper" for his family.
