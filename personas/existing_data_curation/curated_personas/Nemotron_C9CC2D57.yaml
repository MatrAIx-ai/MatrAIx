personas:
  professional: Misty Sulsona is an aspiring junior environmental advocate who channels her love for routine, compassion, and nature into weekly nature journals, small conservation projects, and helping
    at the church food pantry, showcasing her practical, hands‑on approach to making a difference even at eleven.
  sports: Misty Sulsona enjoys short hikes in the Utah hills with the Salt Lake City Youth Hiking Club, watches the Utah Jazz during basketball season and follows Real Salt Lake's soccer matches on TV,
    but prefers informal outdoor activity over organized team sports, reflecting a relaxed, routine‑friendly fitness approach.
  arts: Misty Sulsona delights in sketching waterfalls inspired by Claude Monet, knitting scarves while listening to folk singer Molly Tuttle, and immersing themselves in fantasy chapter‑books such as J.K.
    Rowling's Harry Potter series and Rick Riordan's Percy Jackson, weaving a blend of visual, tactile, and literary creativity into everyday life.
  travel: Misty Sulsona plans low‑key family weekend trips to nearby Zion National Park and the Arches in Moab, dreams of an organized school‑group visit to Kyoto, Japan, yet they rarely venture beyond
    familiar routes, favoring predictable itineraries over spontaneous adventure.
  culinary: Misty Sulsona favors simple comfort foods like creamy macaroni and cheese, occasionally crafts homemade granola bars with rolled oats, honey, and dried cranberries, and while their cooking skill
    is limited to microwave meals and occasional help in the church kitchen, they love sharing carrot sticks and apple slices with friends.
  core: Misty Sulsona is a routine‑loving, quietly compassionate eleven‑year‑old who balances notebook journaling, nature hikes, and a chaotic piggy‑bank habit, all while secretly hoarding wildlife stickers.
background:
  cultural: Misty grew up in Eagle Mountain, Utah, a predominantly white, family‑oriented community with strong ties to The Church of Jesus Christ of Latter‑Day Saints. Her upbringing emphasizes modesty,
    community service, and daily routines centered around family gatherings, church activities, and school events. The local culture values practicality, outdoor recreation, and mutual support, all of which
    have shaped Misty’s compassionate and cooperative nature. Her family celebrates traditional holidays and encourages participation in service projects, reinforcing her desire to help others and maintain
    harmony within her community.
