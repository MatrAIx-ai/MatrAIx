  career_goals: Misty dreams of a career that lets her help people every day while offering a stable, routine‑based environment. She is particularly interested in becoming a pediatric nurse or an elementary
    school teacher, both of which would allow her to support children’s health and learning. She also imagines working as a community health volunteer in Eagle Mountain, where she could organize friendly
    service projects for her neighborhood. Her long‑term ambition is to combine her compassion with a practical, dependable profession that contributes to the well‑being of her community.
