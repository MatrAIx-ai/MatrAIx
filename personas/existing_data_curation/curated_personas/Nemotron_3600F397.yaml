  career_goals: Although retired from full‑time work, Eugene aims to deepen his impact as a trusted advisor in his community. He plans to expand his volunteer tax‑assistance program, mentor at‑risk youth
    through hands‑on workshops, and compile a memoir that weaves his personal history with the broader story of African‑American life in Wayne County. He also hopes to stay current with emerging smart‑home
    technologies, applying his curiosity and practicality to help neighbors modernize their homes safely and affordably.
