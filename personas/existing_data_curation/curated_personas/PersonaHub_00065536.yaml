persona_description: A conservationist or environmental scientist who is concerned about the impact of climate change on plant and tree species. This individual is likely to be interested in the study of
  plant and tree species and their responses to climate change, as well as the need to conserve and monitor natural habitats to make it easier for plants to disperse between them. They may also be interested
  in the importance of records provided by members of the public to the Woodland Trust in identifying long-term trends in the natural environment, and the need to protect natural habitats to ensure the
  survival of plant and tree species in the face of climate change.
