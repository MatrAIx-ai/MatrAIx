personas:
  professional: A meticulous community organizer and aspiring museum docent, Alicia Sanford leverages their sharp eye for visual composition, their conversational Spanish, and their methodical record‑keeping
    to curate engaging senior‑friendly art tours and lead gardening projects, while they often worry about meeting expectations.
  sports: A fan of low‑impact activity, Alicia Sanford enjoys morning walks along the West Palm Beach seawall, follows the Miami Heat for basketball excitement, and participates in a senior yoga class at
    the local community center, while they occasionally skip sessions when stress overwhelms them.
  arts: A devoted patron of the arts, Alicia Sanford frequents the Norton Museum, draws inspiration from mid‑century Florida painters like Robert Rauschenberg, immerses themselves in the symphonies of Debussy
    and the improvisations of Miles Davis, and curates a blog featuring emerging local artists, even though they sometimes over‑analyze each exhibition to the point of paralysis.
  travel: A culturally curious traveler, Alicia Sanford prefers small‑group tours to historic European cities such as Florence and Seville, has a long‑standing wish to explore the ancient ruins of Palmyra,
    and balances these ambitions with weekend getaways to the Florida Keys, all while they budget carefully due to their fixed income.
  culinary: An enthusiastic Mediterranean cook, Alicia Sanford delights in preparing dishes like grilled branzino with herb‑infused olive oil, chickpea‑laden ratatouille, and fresh tabbouleh, experimenting
    with spices such as za'atar and sumac, though they occasionally over‑season in pursuit of bold flavor.
  core: Alicia Sanford blends meticulous organization with artistic curiosity, channeling their love for photography, gardening, and senior advocacy into a life of quiet dedication, tempered by a tendency
    to worry and occasional over‑planning.
background:
  cultural: Alicia grew up in a middle‑class, predominantly white suburb in the Midwest during the 1960s‑70s, where values of self‑reliance, community service, and an appreciation for classic American art
    and music were emphasized. In her early fifties she relocated to West Palm Beach, drawn by the warm climate and the vibrant, multicultural arts scene. While she cherishes the traditions of her upbringing—such
    as volunteerism, a strong work ethic, and dedication to family—she has embraced the diverse culinary influences (especially Mediterranean and Caribbean) and the lively arts festivals that characterize
    South Florida. Her cultural identity blends the nostalgic, community‑oriented values of her generation with an open‑minded curiosity for new ideas and unconventional experiences.
attributes:
  skills: '["Community event coordination", "Volunteer scheduling and administration", "Meticulous record‑keeping", "Digital photography", "Basic photo editing (e.g., Lightroom)", "Local Florida art history
    knowledge", "Horticulture and gardening", "Written communication and newsletter authoring", "Basic computer literacy (email, word processing, social media)", "Conversational Spanish (self‑taught)"]'
  hobbies: '["Art gallery and museum visits", "Attending local lectures and cultural talks", "Reading historical fiction and biographies", "Digital photography", "Gardening (vegetable and ornamental)",
    "Cooking Mediterranean cuisine", "Journaling", "Listening to classical and jazz music", "Crossword and Sudoku puzzles", "Volunteer reading companion for children"]'
  career_goals: Although not currently in the workforce, Alicia aims to become a volunteer docent at the Norton Museum of Art, sharing her passion for art with small, intimate groups. She plans to complete
    her GED to formalize her education and enroll in an online museum studies certificate to deepen her expertise. Alicia also intends to launch a curated blog highlighting cultural events, art exhibitions,
    and senior‑friendly activities in West Palm Beach. Additionally, she hopes to lead a community gardening initiative at a local senior center and advocate for mental‑health resources tailored to older
    adults, leveraging her organized and compassionate nature.
