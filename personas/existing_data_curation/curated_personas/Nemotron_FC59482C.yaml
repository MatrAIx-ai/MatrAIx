personas:
  professional: Justin Swain, a seasoned counselor with over three decades of experience, weaves evidence‑based therapies such as Cognitive‑Behavioral Therapy, narrative therapy, and solution‑focused brief
    therapy together with rhythmic breathing exercises and intergenerational storytelling to deliver organized, compassionate care while mentoring junior staff and designing culturally responsive programs.
  sports: Justin Swain is a loyal fan of the New York Knicks and Brooklyn Nets, collects New York Yankees memorabilia, participates in a weekly walking club through Prospect Park, and joins a community
    basketball viewing night at the local senior center every season.
  arts: Justin Swain frequently attends jazz performances featuring artists like Wynton Marsalis, reads poetry by Langston Hughes, curates a small personal sketchbook with charcoal drawings, collects works
    by Jacob Lawrence, and hosts a monthly storytelling‑and‑art gathering that blends music, literature, and visual expression.
  travel: Justin Swain prefers thoughtfully planned trips that explore historical depth, having visited Charleston’s civil‑war sites, New Orleans for its music and cuisine, Ghana to connect with ancestral
    roots, and Edinburgh for its literary festival, while dreaming of a future visit to the Smithsonian museums in Washington, DC with his sister and grandchildren.
  culinary: Justin Swain enjoys cooking collard greens, black‑eyed peas, and sweet‑potato pie using fresh tomatoes, basil, and kale from his rooftop garden, often pairing meals with classic jazz records,
    though he sometimes adds too much salt and overcooks beans when in a rush.
  core: Justin Swain is a disciplined, compassionate storyteller who blends therapeutic rigor with rhythmic breathing, nurtures a rooftop garden, and finds solace in literature, jazz, and close‑knit community
    gatherings.
background:
  cultural: Justin is an African‑American who was raised in Brooklyn during the post‑civil‑rights era, experiencing the neighbourhood’s evolving cultural mosaic. His family’s roots trace back to the Southern
    United States, and he grew up listening to oral histories and music that celebrated resilience and community solidarity. These experiences instilled a deep respect for collective well‑being, intergenerational
    storytelling, and the importance of cultural affirmation in mental health. He actively incorporates elements of his cultural heritage—such as storytelling, rhythmic breathing exercises drawn from African‑diasporic
    traditions, and community‑based support networks—into his counseling practice to foster a sense of belonging and empowerment for his clients.
