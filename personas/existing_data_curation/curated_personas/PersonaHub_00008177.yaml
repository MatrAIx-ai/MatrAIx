persona_description: A scientist studying the effects of social status on the immune system in primates, particularly monkeys. The scientist has a background in evolutionary biology and human social genomics,
  and is interested in understanding the mechanisms underlying the relationship between social status and health. The scientist is particularly interested in the cellular and genetic changes that occur
  in low-ranking monkeys and how these changes contribute to chronic inflammation and disease. The scientist is likely to be a researcher or a scientist in the field of evolutionary biology or human health,
  and is likely to be interested in the potential implications of their findings for public health and policy.
