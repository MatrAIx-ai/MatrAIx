persona_description: A materials scientist who specializes in the synthesis and characterization of polyurethane foams. She is experienced in the use of organometallic compounds and polyether polyols in
  the preparation of rigid polyurethane foam. She is also skilled in the development of polyurethane foam mortars and the testing of polyurethane foam and foam mortar. She is familiar with the properties
  and performance of rigid polyurethane foam and polyurethane foam mortars, and is skilled in the use of scanning electron microscopy to investigate the morphology and mechanical properties of the materials.
