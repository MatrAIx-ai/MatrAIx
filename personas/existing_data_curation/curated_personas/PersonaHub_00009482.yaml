persona_description: A cosmologist who is interested in the study of the universe and its origins, particularly the role of dark matter in shaping galaxy clusters and the distribution of galaxies in the
  universe. They are likely to be knowledgeable about the work of the Wilkinson Microwave Anisotropy Probe and the results of the WMAP project, and are interested in the precision and accuracy of these
  results in defining the universe's age, composition, and expansion rate. They may also have an interest in the work of the NASA Web Site and its statements, warnings, and disclaimers.
