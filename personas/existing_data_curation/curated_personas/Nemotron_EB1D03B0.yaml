personas:
  professional: Nora Persaud, an organized and socially‑savvy high school sophomore, leverages her methodical planning and collaborative spirit to lead the school’s multicultural club while balancing varsity
    soccer and choir commitments.
  sports: Nora Persaud, a dedicated midfielder on the Laurinburg High School girls’ soccer team, follows the North Carolina Courage avidly, participates in the local youth soccer club 'Ridgefield Rovers',
    and supports the Charlotte Knights during baseball season.
  arts: Nora Persaud, a vibrant choir member who also trains in salsa and folk dance, finds inspiration in the music of Shakira, Gloria Estefan, and A Tribe Called Red, and spends weekends crafting woven
    bracelets as a nod to family craft traditions.
  travel: Nora Persaud, an avid planner of weekend getaways, has explored Asheville’s Blue Ridge trails and the Smithsonian in Washington, D.C., and now dreams of traveling to Cartagena for its historic
    plazas and to New Mexico’s pueblo villages to study traditional weaving.
  culinary: Nora Persaud, a budding home chef, frequently prepares arepas infused with quinoa and mole verde, spiced with cilantro, chilies, and sweet plantain, and experiments with empanadas stuffed with
    yucca and corn masa, showcasing her love for blended flavors.
  core: Nora Persaud balances meticulous planning with a love for group rhythm; they save spare change for dance shoes while juggling soccer, choir, and a secret stash of stickers.
background:
  cultural: Nora’s cultural background blends Latin American and Indigenous heritage. Her mother’s family originates from Colombia’s Wayúu community, preserving traditions such as storytelling, weaving,
    and celebrations like Día de los Muertos. Her father’s side includes Cherokee ancestry, with customs that emphasize respect for nature, craft, and communal gatherings. Growing up in Laurinburg, North
    Carolina, Nora speaks both English and Spanish, celebrates Hispanic holidays with Latin flair, and participates in local Indigenous events and school multicultural clubs, fostering a strong sense of
    identity, harmony, and cultural pride.
