  career_goals: Nora aspires to pursue higher education in public health or education, aiming to become a community health educator or school counselor who can support youth from diverse backgrounds. She
    plans to excel academically in high school, take on leadership roles in student council and community service clubs, and earn scholarships that will enable her to study nursing, public health, or educational
    leadership. Her long‑term ambition is to develop culturally responsive programs that promote health equity, academic success, and cultural pride in her hometown of Laurinburg.
