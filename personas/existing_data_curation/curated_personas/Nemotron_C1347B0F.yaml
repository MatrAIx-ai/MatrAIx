  career_goals: Yanessy is fascinated by science and helping living things, so she dreams of becoming a veterinarian one day. She also imagines herself as a scientist who invents useful gadgets, or as a
    teacher who shares knowledge with younger kids. Her competitive streak motivates her to win a local spelling bee and lead her soccer team to a championship, reflecting her desire to excel and make a
    positive impact.
