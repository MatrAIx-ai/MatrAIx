personas:
  professional: Yanessy Bermudez, a budding wildlife illustrator, combines a keen curiosity for nature with a practical knack for detailed LEGO construction, channeling their relaxed yet resilient temperament
    into meticulous sketches that balance imagination with realistic anatomy.
  sports: Yanessy Bermudez spins the soccer ball on the grass fields of the Keller Youth Soccer Club’s U‑8 team, dashes through backyard obstacle courses with the same competitive spark they reserve for
    cheering on the Dallas Cowboys and the Dallas Mavericks, yet they prefer spontaneous play over structured training.
  arts: Yanessy Bermudez fills sketchbooks with vibrant wildlife scenes inspired by Eric Carle, constructs imaginative LEGO worlds while humming tunes from Roald Dahl adaptations, and spends weekends reenacting
    simple dance steps to lively folk music, weaving a vivid artistic identity that colors their playtime.
  travel: Yanessy Bermudez dreams of a road‑trip adventure that stitches together weekend camping under the stars at Big Bend National Park, a day trip to the historic San Antonio River Walk, and a playful
    sunrise hike in the nearby Hill Country, balancing a love for exploration with the family's modest travel budget.
  culinary: Yanessy Bermudez, a budding kitchen helper, eagerly mixes ripe avocados and diced tomatoes to whip up guacamole, rolls soft tortillas for taco night, and savors the tangy bite of homemade salsa,
    mastering simple recipes with a playful sprinkle of curiosity and a tendency to add extra cheese when no one’s watching.
  core: Yanessy Bermudez, a 7‑year‑old explorer with a calm, resilient spirit, dives into backyard treasure hunts and LEGO creations, balancing fierce competition on the soccer field with a habit of misplacing
    their favorite colored pencils.
background:
  cultural: Yanessy comes from a Mexican‑American household in Keller, Texas, where both Spanish and English are spoken at home. Her family celebrates Mexican traditions such as Día de los Muertos, Cinco
    de Mayo, and Christmas posadas, sharing stories, music, and foods like tamales, enchiladas, and homemade salsa. She attends a bilingual after‑school program that reinforces her heritage while integrating
    into the broader Texan community. This blend of Mexican cultural values and suburban American life influences her worldview, fostering respect for family, community, and cultural diversity.
