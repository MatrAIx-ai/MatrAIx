  career_goals: In the next phase of her career, Kacie aims to mentor emerging HR professionals, especially women and older workers, by establishing a formal mentorship program that links senior and junior
    staff. She aspires to consult for small nonprofit organizations in New York, helping them build compassionate employee‑wellness initiatives and age‑friendly workplace policies. Kacie also hopes to author
    a practical guide on empathetic HR practices for small businesses and to stay current with AI‑driven recruitment tools while maintaining a balanced, pragmatic approach. Volunteering her expertise to
    community groups and advocating for inclusive, intergenerational workplaces are central to her ambitions.
