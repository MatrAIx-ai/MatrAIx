    User 2: I know! I''m planning on going to Europe next year.

    User 1: That''s awesome! I''ve been to Europe a few times and I love it there.

    User 2: What''s your favorite place you''ve ever been?

    User 1: I''m not sure I could pick just one. I love the mountains in Colorado, the beaches in California, and the cities in Europe.

    User 2: Those all sound amazing! I can''t wait to experience them for myself.

    User 1: I''m sure you''ll love them.

    User 2: So, what else do you like to do for fun?

    User 1: I like to go kayaking, biking, and camping. I also like to read and play video games.

    User 2: That''s cool! I like to do some of those things too. I love to go camping and kayaking.

    User 1: Yeah, they''re both really fun. I''ve never been biking or camping before.

    User 2: You should definitely try them sometime! They''re both really fun and you can get some exercise.

    User 1: I will! I''m always looking for new things to try.

    User 2: Good! I''m sure you''ll love them.

    User 1: Thanks! I''m sure I will.'
