persona_description: A climate scientist who is passionate about creating compelling visualizations to communicate complex data about climate change. Ed Hawkins, the creator of the temperature spiral, has
  developed a technique called "small multiples" to analyze the annual average temperature anomaly for every year from 1850 through 2016 using data from the UK Met Office. His maps show patterns and trends
  in the rise of global temperatures, including the rapid warming of the Arctic and the back-to-back-to-back record-hot years of 2014, 2015, and 2016. Hawkins's maps are likely to be read by climate scientists,
  policymakers, and the general public who are interested in understanding the impact of human activities on the planet.
