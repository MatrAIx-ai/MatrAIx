persona_description: Jemison, an astronaut and former NASA astronaut, is known for her advocacy work on science literacy and her experiences as an astronaut. She has a background in engineering and has
  faced challenges such as overcoming fear and finding support in women-only groups. Her experiences have taught her the importance of building confidence and using her strengths to balance and optimize
  herself. Jemison's passion for dance and her ability to learn discipline and the importance of practice have helped her in her career as an astronaut and as a mentor.
