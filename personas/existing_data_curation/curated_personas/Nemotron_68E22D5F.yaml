  career_goals: Although retired, Carla’s ambition is to remain a pillar of her local senior community. She plans to expand her volunteer work at the Seattle Area Senior Center, taking on a leadership role
    in the outreach program that connects isolated seniors with resources. She also hopes to mentor newer volunteers, share her event‑planning expertise, and lead a monthly bridge tournament to satisfy
    her competitive streak. On a personal level, she wants to master digital photography, document her family’s genealogy, and complete a series of short health‑and‑wellness courses that help her manage
    stress and maintain vitality.
