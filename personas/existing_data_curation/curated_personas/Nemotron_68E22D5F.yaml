personas:
  professional: Carla Spisak, a retired administrative assistant turned senior‑center volunteer coordinator, applies their razor‑sharp organizational talent, budget‑savvy, and skeptical yet fair mediation
    style to keep community programs running like clockwork while they champion a fiercely competitive monthly bridge tournament.
  sports: Carla Spisak enjoys gentle hikes along the Burke‑Gimports Trail, participates in the Seattle Seniors Walking Club, cheers for the Seahawks on Sundays, follows the Seattle Sounders FC, and keeps
    a competitive edge by playing bridge as a mental sport.
  arts: Carla Spisak frequents live music at The Triple Door, where they savor folk‑rock performances by artists like Brandi Carlile and classic blues from Buddy Guy, while their evenings at home are filled
    with mystery novels by Agatha Christie and historical sagas by Ken Follett, all of which inspire their budding hobby of digital photography.
  travel: Carla Spisak favors meticulously planned trips that combine scenic hikes and cultural immersion, such as weekend drives to the Oregon Coast, a leisurely cruise through Alaska's Inside Passage,
    and a nostalgic tour of historic towns along the historic trade routes of Central Europe, always balancing senior discounts, health considerations, and a modest travel budget.
  culinary: Carla Spisak delights in cooking garden‑fresh salmon with dill, braised root vegetables seasoned with thyme and sage, and handcrafted dumplings filled with potatoes and cheese, while they savor
    seasonal farmers‑market finds like wild ramps and locally roasted beans, occasionally treating themselves to a fragrant espresso at their favorite Capitol Hill café.
  core: Carla Spisak blends a Midwestern work ethic with Seattle’s progressive vibe, turning meticulous organization, cautious finances, health vigilance, and a competitive spirit into a life of community
    service, garden‑to‑table cooking, and relentless curiosity about the world.
background:
  cultural: Carla is a white American of mixed Polish and German ancestry, born in the Midwest and raised with a strong emphasis on self‑reliance, punctuality, and community responsibility. She moved to
    Seattle in the early 1990s, absorbing the city’s progressive, environmentally conscious culture while retaining her Midwestern work ethic. Her upbringing fostered a practical outlook and respect for
    tradition, yet her Seattle life introduced her to diverse social circles, coffee‑house gatherings, and a vibrant arts scene, shaping a balanced cultural identity that values both structure and open‑minded
    engagement.
