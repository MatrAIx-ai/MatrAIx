personas:
  professional: Shandrieka Jackson, a seasoned early‑childhood program manager in Barnstable County, blends meticulous grant writing and data‑driven budgeting with a curiosity‑driven drive to weave acrylic
    painting projects and multicultural stories into curricula, while using her natural assertiveness to champion equity policies and her sociable energy to rally staff and community partners around an
    arts‑focused vision.
  sports: Shandrieka Jackson, a devoted fan of the Boston Red Sox, Celtics, and Bruins, spends Saturday mornings kayaking the Cape Cod bays, joins a local women’s hiking group for the Cape Cod National
    Seashore trail network during spring, and participates in a community adult yoga class that doubles as a low‑impact fitness regimen.
  arts: Shandrieka Jackson, an avid acrylic painter who regularly experiments with the vibrant patterns of Yayoi Kusama and the bold color fields of Georgia O'Keeffe, attends monthly poetry readings featuring
    works by Maya Angelou and local spoken‑word artists, volunteers at a neighborhood youth theatre where they help stage productions of classics and contemporary pieces, and curates a personal collection
    of street‑art prints by Banksy and Ai Weiwei to fuel their own creative practice.
  travel: Shandrieka Jackson, a purposeful planner who maps out trips with a blend of spreadsheet itineraries and spontaneous detours, prefers mid‑week getaways to charming coastal towns like Bar Harbor
    and Newport, has dreamed of strolling the frescoed halls of Florence and the canals of Amsterdam, and balances her wanderlust with a modest travel fund that allocates $200 per month after budgeting
    for arts‑related expenses.
  culinary: Shandrieka Jackson, a competent home cook who finds joy in soul‑food‑inspired dishes such as smoked turkey collard greens, shrimp and grits seasoned with smoked paprika, and sweet‑potato cornbread,
    often sources fresh herbs from the local farmers’ market and enjoys pairing their meals with a dash of hot sauce, while their occasional indulgence lies in splurging on a premium bottle of bourbon to
    complement a Friday night barbecue.
  core: Shandrieka Jackson blends a relentless curiosity for art and community with a background in early‑childhood leadership, juggling a love for kayaking, yoga, and acrylic painting while constantly
    fretting over budgets and deadlines, making them a vibrant yet occasionally anxious catalyst for equitable change.
background:
  cultural: Shandrieka identifies as a Black woman raised in New England, with family roots that trace back to the Great Migration. Her upbringing blended the traditions of African-American church life,
    storytelling, and music with the coastal culture of Cape Cod. She draws strength from the resilience of her community and incorporates African-American artistic expressions—such as jazz, spoken word,
    and visual arts—into her professional work. At the same time, she embraces the region's maritime heritage, often integrating local environmental themes into educational programs. Her cultural perspective
    informs her commitment to equity, her love of collaborative art, and her dedication to creating inclusive spaces for children and families of diverse backgrounds.
attributes:
  skills: '[''Curriculum development with arts integration'', ''Early childhood program administration'', ''Staff supervision and professional development'', ''Budget management and grant writing'', ''Program
