    learning'', ''Risk assessment and crisis management'']'
  hobbies: '[''Acrylic painting'', ''Visiting art galleries and museum events'', ''Yoga and mindfulness practice'', ''Hiking and kayaking along Cape Cod'', ''Cooking soul-food dishes and sharing meals'',
    ''Volunteering with youth theatre programs'', ''Reading African-American literature and social-justice non-fiction'', ''Participating in community book clubs'']'
  career_goals: She aims to earn a master's degree in Educational Leadership within the next two years to qualify for district-level leadership roles. Her long-term ambition is to become the Director of
    Early Childhood Services for Barnstable County, where she can champion equity-focused policies and expand arts-based learning across the region. She also hopes to launch a community-run arts hub that
    offers after-school programs and mentorship for under-served youth, and to publish a guide on culturally responsive early-education practices.
