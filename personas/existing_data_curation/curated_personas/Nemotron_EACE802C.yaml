  hobbies: '[''Attending Marfa art events and live music'', ''Desert hiking and birdwatching'', ''Photography of landscapes and cultural scenes'', ''Cooking and recipe experimentation'', ''Folklorico dancing'',
    ''Volunteering at community reading programs'', ''Reading historical fiction and memoirs'', ''Gardening xeriscape and herbs'']'
  career_goals: While she is no longer part of the formal workforce, Jesenia remains driven to contribute to her community. She aims to develop a mentorship program pairing senior artisans with younger
    residents to safeguard local crafts, launch a community garden that supplies fresh produce to seniors and low‑income families, and compile oral histories of Mexican‑American families in Presidio County
    for a future publication. She also hopes to become a volunteer coordinator at the Marfa Community Center, facilitating cultural exchange events and ensuring they reflect the richness of her heritage.
