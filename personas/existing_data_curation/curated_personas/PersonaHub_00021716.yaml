persona_description: Julie Lumeng, a psychologist and researcher who specializes in the study of stress eating in children. She believes that stress is a universal experience and that it is how we cope
  with stress that determines how we respond to stress. Lumeng is concerned that stress eating is a missing link in the understanding of stress and its effects on children. She is passionate about helping
  parents recognize when their children are stress-eating and providing them with strategies to help their children manage stress. Lumeng is a leader in the field of psychology and society, and she is dedicated
  to finding solutions to the problem of childhood obesity.
