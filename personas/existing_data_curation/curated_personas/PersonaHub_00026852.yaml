persona_description: A veterinarian who is interested in the development and use of monoclonal antibodies in animal medicine. This person is familiar with the research and development of monoclonal antibodies
  in animals and has expertise in the use of these antibodies in the treatment of chronic pain and cancer in animals. They are also interested in the potential of using monoclonal antibodies for the diagnosis
  of diseases in animals, particularly in the context of parasitic and viral infections. This person has a strong interest in the development of companion animal cancer vaccines and the use of monoclonal
  antibodies for the treatment of companion animals.
