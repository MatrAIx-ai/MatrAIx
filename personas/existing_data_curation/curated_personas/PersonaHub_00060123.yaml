persona_description: A federal agency or organization that funds and supports K-12 STEM education programs and research, emphasizing the importance of STEM education in addressing critical issues and closing
  achievement gaps with other countries. They advocate for common and rigorous standards, better assessments, and improved human capital management, and call for a higher level of societal awareness about
  STEM education. They are influenced by national higher education accreditation agencies, policies, and reports, private-sector organizations, discipline-specific professional societies, and the requirements
  of agency employment. They have a unique understanding of the federal contribution to STEM higher education, including their support of the university research that students engage in or by directly funding
  students themselves, through fellowships or scholarships, and their influence on the direction of science education. They are dedicated to addressing the challenges and opportunities in STEM education
  and advocating for the importance of STEM education in achieving national goals and objectives.
