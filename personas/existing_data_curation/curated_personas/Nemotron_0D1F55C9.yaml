personas:
  professional: Maria Marchany is a budding junior architect who transforms LEGO bricks and wooden blocks into whimsical cityscapes, leveraging her vivid imagination and love for bright colors, while her
    relaxed approach to obligations makes her favor spontaneous building sessions over rigid instructions, and her competitive streak drives her to out‑design friends during playtime.
  sports: Maria Marchany thrills to backyard tag and rhythmic dancing to folk beats, follows the River Runners youth soccer club, eagerly watches the hometown baseball team, the City Sluggers, and occasionally
    tries swimming lessons at the community pool, approaching fitness with boundless energy and a healthy dose of friendly competition.
  arts: Maria Marchany dives into drawing whimsical creatures reminiscent of Dr. Seuss, sings along to Raffi’s “Baby Beluga,” and watches animated classics by Walt Disney, letting these creative forces
    shape her bright palette and imaginative play.
  travel: Maria Marchany prefers spontaneous weekend trips to the nearby zoo or aquarium, dreams of exploring Disneyland’s magical lands and the towering cliffs of the Grand Canyon, and balances her wanderlust
    with family constraints by planning short, kid‑friendly adventures that allow ample time for drawing the places she visits.
  culinary: Maria Marchany delights in munching on cheesy quesadillas and crafting fruit salads featuring strawberries, bananas, and kiwi, while she experiments with beginner‑level banana pancakes topped
    with honey, showcasing a playful curiosity for bright flavors and simple cooking.
  core: Maria Marchany is a bright‑eyed, curious six‑year‑old whose love for color, spontaneous creation, and friendly competition fuels an ever‑evolving imagination, even if her pockets get messy and her
    plans occasionally tumble.
background:
  cultural: Maria is a Mexican‑American child growing up in Humble, Texas, a diverse community in Harris County. She lives in a bilingual household where Spanish is spoken at home and English is used at
    school, giving her a strong command of both languages. Family traditions include celebrating Día de los Muertos, Cinco de Mayo, and holiday meals featuring tacos, tamales, and atole. She often hears
    Mexican folk stories and music, such as mariachi and regional rancheras, and enjoys dancing at family gatherings. The local Catholic church and community festivals reinforce cultural values and a sense
    of heritage. At the neighborhood community center, Maria takes part in art workshops that highlight Mexican artists like Frida Kahlo, reinforcing her appreciation for creative expression. The blend
    of Mexican heritage and Tex‑Mex influences shapes her identity, fostering pride in her roots while embracing the multicultural environment of the Greater Houston area.
