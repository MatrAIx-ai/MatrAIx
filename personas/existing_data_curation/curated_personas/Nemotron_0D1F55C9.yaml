  career_goals: Maria’s biggest ambition is to become a visual artist or illustrator, creating colorful pictures that tell stories and bring joy to others. She also imagines exploring the world as an adventurer
    or astronaut, driven by her boundless curiosity. Inspired by the idea of sharing knowledge, she sometimes says she wants to be a teacher who encourages other children to ask questions and create art.
    Her competitive spirit motivates her to win art competitions and be recognized for her creative talent.
