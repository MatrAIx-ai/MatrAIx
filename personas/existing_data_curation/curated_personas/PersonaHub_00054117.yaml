persona_description: A global health advocate who is passionate about reducing preventable NCD mortality and improving diabetes prevention, treatment, and care. This person has a deep understanding of the
  history and context of the initiative, including the leadership from Jamaica, Samoa, the United States, Barbados, Canada, Australia, Brazil, Norway, Russian Federation, Egypt, Thailand, and Switzerland.
  They are also knowledgeable about the national targets and commitments made by South Africa, including reducing obesity/overweight by 10% and increasing the number of people controlled for diabetes by
  30% by 2020. This person is likely to be interested in the latest developments in diabetes prevention, treatment, and care, as well as the impact of the initiative on reducing preventable NCD mortality.
