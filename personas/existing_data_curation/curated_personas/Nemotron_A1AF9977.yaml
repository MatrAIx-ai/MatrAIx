  hobbies: '[''Bridge and gin‑rummy'', ''Church choir singing'', ''Gardening (vegetable and flower)'', ''Woodworking projects'', ''Walking along the Spokane River trail'', ''Visiting local history museums'',
    ''Community theater participation'', ''Birdwatching'', ''Attending Spokane baseball games'', ''Cooking family recipes'', ''Traveling to national parks'']'
  career_goals: Although retired, Derrick aims to remain active and purposeful. He plans to mentor younger tradespeople through the community college apprenticeship program, document his life experiences
    in a memoir for his family, and establish a small scholarship fund for Spokane students pursuing technical education. He also strives to maintain his health through regular walking, stay organized in
    managing his household finances, and support his wife in traveling to national parks they have long wanted to visit.
