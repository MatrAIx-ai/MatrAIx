personas:
  professional: Derrick Sallee, an 85-year-old retired maintenance supervisor from Spokane, leverages his three-decade expertise in electrical and mechanical systems and his disciplined, organized nature
    to mentor apprentices, design volunteer safety workshops, and meticulously plan a modest scholarship fund for technical students.
  sports: Derrick Sallee stays active by strolling the Spokane River Trail with the local senior walking club, cheering for the Spokane Indians during summer baseball, tuning into the Seattle Seahawks on
    Sundays, and joining a community softball league each spring, while occasionally birdwatching along the Columbia River basin during migration season.
  arts: Derrick Sallee, a longtime member of his Methodist church choir, sings hymns ranging from Mahalia Jackson’s gospel renditions to Beethoven’s Ninth Symphony choral passages, delights in community
    theater productions where they have played supporting roles, and frequently attends the Northwest Museum of Arts & Culture to view exhibitions featuring local Native American artists and the photography
    of Ansel Adams.
  travel: Derrick Sallee plans meticulously for each journey, favoring organized road trips with his wife to iconic national parks like Yellowstone, Glacier, and Grand Teton, preferring mid-range lodges
    and guided day hikes over backpacking, while also cherishing occasional visits to historic sites in Spokane such as the Northwest Museum of Arts & Culture and nearby historic downtown districts, and
    using a fold-out map and printed itineraries to quell any travel-related anxiety.
  culinary: Derrick Sallee enjoys cooking hearty family recipes like chicken and dumplings, slow-cooked pot roast with root vegetables, and fresh-caught trout seasoned with dill and lemon, often adding
    garden-grown tomatoes, rosemary, and garlic, while also indulging in a slice of homemade huckleberry pie topped with whipped cream during Sunday gatherings.
  core: Derrick Sallee is an impeccably organized, sometimes worry-prone 85-year-old who blends his love of community, disciplined routines, and a penchant for hands-on projects, though they often fret
    over minor details and stubbornly refuse to let age dictate their ambitions.
background:
  cultural: Derrick was born and raised in Spokane, Washington, to a family of German‑American descent. Growing up in post‑World War II Pacific Northwest, he absorbed the region’s values of hard work, self‑reliance,
    and close‑knit community. He has spent his entire life in the Spokane area, attending local schools and earning an associate degree from Spokane Community College. His cultural identity is rooted in
    the Methodist faith, community service, and a deep appreciation for the natural landscapes of the Inland Northwest. These influences shape his disciplined, organized approach to life and his strong
    commitment to family and civic involvement.
