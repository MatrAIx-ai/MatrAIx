  hobbies: '[''gardening (roses, azaleas, vegetables)'', ''quilting and sewing'', ''bridge and card games'', ''church choir and services'', ''birdwatching'', ''cooking traditional Southern recipes'', ''local
    history tours'', ''bingo and friendly competitions'']'
  career_goals: Although retired, Traci aims to keep contributing to her community by mentoring younger volunteers, documenting and sharing stories of Inman's past, and maintaining her garden as a living
    classroom. She hopes to organize inter‑generational workshops that combine gardening, cooking, and quilting, fostering connections between seniors and youth. Personal health goals include staying active
    enough to attend church services and weekly bridge sessions, and she aspires to travel within South Carolina to visit historic sites and family members while preserving her independence.
