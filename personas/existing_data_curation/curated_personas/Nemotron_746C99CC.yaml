  hobbies: '[''Reading science non‑fiction'', ''Classic Indian literature'', ''Yoga and meditation'', ''Hiking in Michigan'', ''Gardening'', ''Cooking regional Indian dishes'', ''Chess'', ''Puzzle solving'',
    ''Volunteer STEM tutoring'', ''Photography'']'
  career_goals: Sunanda aspires to become a director of community health programs within a major non‑profit or municipal agency, where she can champion evidence‑based interventions for underserved populations.
    She aims to integrate technology—such as a culturally tailored mobile mental‑health app for South Asian clients—into service delivery, and to secure competitive funding to expand program reach. To deepen
    her policy influence, she plans to pursue a Master of Social Work or a public‑health degree, positioning herself for leadership roles in the Michigan Department of Health & Human Services. Long‑term,
    she hopes to mentor emerging social workers, set industry benchmarks, and shape state‑level policies that improve equity for immigrant communities.
