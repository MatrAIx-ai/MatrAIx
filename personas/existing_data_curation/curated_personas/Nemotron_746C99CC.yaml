personas:
  professional: Sunanda Baveja leverages her rigorous statistical and GIS expertise to design data‑driven community health programs, translating her disciplined, achievement‑focused mindset into grant‑winning
    proposals and culturally attuned digital platforms that empower underserved families.
  sports: Sunanda Baveja balances her competitive spirit on the chess board with a disciplined fitness routine that includes weekly yoga at the Ann Arbor Yoga Studio, seasonal snowshoeing in winter, regular
    hikes with the Michigan Trailblazers Hiking Group, and enthusiastic support for the Detroit Tigers, Detroit Lions, and the Michigan Wolverines football team.
  arts: Sunanda Baveja captures community festivals through her lens, channeling Ansel Adams’ compositional precision and the soulful sitar tones of Ravi Shankar while finding balance in the spoken word
    of Maya Angelou and the theatrical vigor of Lin‑Manuel Miranda.
  travel: Sunanda Baveja plans trips with a data‑driven itinerary, savoring weekend getaways to Michigan’s Upper Peninsula and annual hikes in Banff National Park, while budgeting for a dream cultural immersion
    in Kyoto’s temples and the coastal towns of Amalfi, all balanced against her family’s holiday expectations.
  culinary: Sunanda Baveja (a moderately advanced home chef) blends fresh garden cilantro, mint, and fenugreek into meticulously perfected butter chicken, sarson ka saag with makki di roti, and a Kerala‑style
    fish curry, while occasionally experimenting with fusion dishes like spiced quinoa biryani, always insisting on authentic spice ratios.
  core: Sunanda Baveja is a data‑driven social‑work strategist who balances a competitive edge with solitary hikes, yet secretly hoards scented candles and can’t resist a nightly true‑crime podcast binge.
background:
  cultural: Sunanda is a second‑generation Indian‑American whose parents immigrated from Punjab. She grew up celebrating Diwali, Holi, and family gatherings that emphasized respect for elders, education,
    and community cohesion. Fluent in English and Hindi, she maintains strong ties to South Asian traditions while navigating the individualistic culture of suburban Michigan. Active in local Indian cultural
    associations, Sunanda volunteers at cultural festivals and leverages her heritage in her social work to advocate for immigrant and South Asian clients. Her cultural identity blends pragmatic problem‑solving
    with a deep appreciation for familial and communal values.
attributes:
  skills: '[''Data analysis (R, SPSS)'', ''GIS mapping for resource allocation'', ''Program evaluation'', ''Grant writing'', ''Strategic project management'', ''Digital platform development'', ''Critical
