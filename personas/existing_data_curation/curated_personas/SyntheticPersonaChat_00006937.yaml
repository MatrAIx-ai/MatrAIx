    User 2: I don''t think that''s true. Everyone is good at something. What do you like to do?

    User 1: I like to draw.

    User 2: That''s great! Have you thought about making a career out of it?

    User 1: I''ve thought about it, but I''m not sure if I''m good enough.

    User 2: You''re probably better than you think. You should give it a try.

    User 1: I''ll think about it.

    User 2: Great! In the meantime, don''t be too hard on yourself. Everyone makes mistakes. Just keep trying and you''ll eventually find your way.

    User 1: Thanks for the advice.

