persona_description: A doctor who specializes in the examination and treatment of the back, spine, and related structures. They are experienced in using imaging studies such as x-rays, CT scans, and MRI
  scans to diagnose and evaluate back pain. They are skilled in interpreting the results of these tests and determining the cause of back pain. They are also trained in the use of nerve and muscle studies
  to assess the activity of the back muscles and spinal nerves. They may order blood and urine samples to test for infection or other conditions. They have a deep understanding of the anatomy and physiology
  of the back and are skilled in diagnosing and treating back pain.
