  hobbies: '[''Cricket (weekly league)'', ''Golf (amateur league)'', ''Cooking Indian and Filipino fusion dishes'', ''Gardening (herbs and vegetables)'', ''Beach walking along Tampa Bay'', ''STEM mentorship
    volunteering'', ''Reading leadership and business non-fiction'', ''Mindfulness meditation'']'
  career_goals: Kaushal aims to leverage his technical and managerial experience to ascend to senior operational leadership within the chemical manufacturing sector. His primary ambition is to become a
    Plant Manager or Director of Operations for a major facility in the Gulf Coast region, where he can drive large-scale process improvements and embed sustainability and safety at the core of production.
    Over the next five years, he plans to obtain a Lean Six Sigma Black Belt and an executive MBA to broaden his strategic acumen. He also envisions launching a boutique consulting practice that advises
    mid-size manufacturers on regulatory compliance, energy efficiency, and circular-economy solutions. In parallel, he is committed to mentoring junior engineers and establishing a company-wide leadership
    development program.
