  hobbies: '[''Watercolor painting'', ''Digital illustration'', ''Korean calligraphy'', ''Reading speculative fiction'', ''Philosophy and science nonfiction'', ''Creative writing (short stories, poetry)'',
    ''Hiking and nature photography'', ''Cooking Korean fusion cuisine'', ''Playing piano'', ''DIY health‑tech gadget building'', ''Mindful meditation'', ''Small book‑club discussions'']'
  career_goals: Lili aims to transition from direct patient care to strategic leadership that fuses technology, research, and community health equity. Within five years she plans to become a Clinical Director
    of a rural health network or to launch a multidisciplinary community clinic in Bismarck that integrates telehealth, health‑informatic analytics, and culturally tailored services for underserved Asian‑American
    populations. She intends to pursue a Doctor of Nursing Practice or a PhD in Health Services Research to lead rigorous studies on health disparities, publish in peer‑reviewed journals, and influence
    policy. Lili also aspires to develop an AI‑enhanced telehealth platform that provides personalized chronic‑disease management for remote patients. Additionally, she seeks to mentor emerging nurse practitioners,
    present her work at national conferences, and author a guide on incorporating artistic creativity into patient‑centered care.
