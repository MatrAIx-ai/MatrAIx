  career_goals: Stefania aims to attend a university where she can study civil engineering or community development, blending her curiosity for new ideas with a practical desire to improve her hometown.
    She envisions a career designing sustainable infrastructure and public spaces in Kansas City or similar Midwestern communities. In the short term, she wants to earn leadership positions in school clubs—such
    as student council president or robotics team captain—to hone her management skills, and she hopes to gain internships with local planning firms or nonprofit organizations that focus on community outreach.
