personas:
  professional: Stefania Boatman, a 14‑year‑old budding robotics enthusiast, combines their methodical curiosity and organized planning to design functional school‑project machines while balancing team
    leadership on the soccer field and choreography in modern dance.
  sports: Stefania Boatman captains her high‑school girls’ soccer team, trains three times a week at the local community field, cheers for the Kansas City Chiefs and Royals on weekends, and maintains a
    balanced fitness routine that mixes drills, yoga stretches from her dance class, and weekend bike rides through Clinton State Park.
  arts: Stefania Boatman expresses creativity through modern dance routines inspired by Martha Graham, video edits set to the beats of Billie Eilish and Hozier, and landscape sketches of the Flint Hills
    echoing Grant Wood’s style, while regularly attending performances at the Kansas City Repertory Theatre and collecting graphic novels by Neil Gaiman.
  travel: Stefania Boatman loves weekend road trips to nearby state parks like Clinton and Topeka’s West Broughton, dreams of a summer family vacation to Washington, D.C. to explore the Smithsonian museums,
    and balances her travel enthusiasm with school commitments by meticulously planning itineraries on a shared family spreadsheet.
  culinary: Stefania Boatman favors classic Midwestern fare such as BBQ ribs, cheesy pizza, and fried chicken nuggets, experiments in the kitchen with homemade Kartoffelpuffer (potato pancakes) and Irish
    soda bread using potatoes and buttermilk, and is a budding home chef who follows YouTube tutorials while still mastering proper seasoning techniques.
  core: Stefania Boatman blends a methodical passion for robotics and community clean‑ups with an occasional habit of leaving her sketchbook at home, a paradox that fuels her curiosity‑driven yet pragmatic
    teenage outlook.
background:
  cultural: Stefania was raised in Kansas City, Kansas, within a middle‑class, white Midwestern family. Her upbringing reflects the region’s emphasis on community involvement, modesty, and a strong work
    ethic. She celebrates typical American holidays—Thanksgiving, the Fourth of July, and Halloween—and participates in local traditions like county fairs and seasonal volunteer drives. Her family’s roots
    trace back to European ancestors (predominantly German and Irish), which influence occasional cultural foods and values spoken about at family gatherings. Growing up in the Leavenworth County area,
    she feels a deep connection to the close‑knit neighborhood spirit, Midwestern hospitality, and the practical, down‑to‑earth outlook characteristic of the region.
