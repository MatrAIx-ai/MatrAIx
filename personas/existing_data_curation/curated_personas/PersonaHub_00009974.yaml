persona_description: An environmental conservationist or a wildlife biologist who is interested in the conservation and management of natural habitats and species. They are knowledgeable about the importance
  of protecting biodiversity and the need for scientific data to support conservation efforts. They are also familiar with the development and implementation of international conservation programs such
  as the IBA initiative and have experience in conducting and analyzing bird surveys to assess the status of bird populations in proposed IBA areas. They are passionate about the role of collaborative management
  and the importance of respecting individual property owners' interests while working towards common conservation goals.
