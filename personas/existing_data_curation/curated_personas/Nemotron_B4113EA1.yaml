  skills: '[''Digital illustration'', ''Mixed-media artwork'', ''Conceptual sketching'', ''Creative writing'', ''Storyboarding'', ''Basic graphic-design (Photoshop, Canva)'', ''Bilingual communication (English/Spanish)'',
