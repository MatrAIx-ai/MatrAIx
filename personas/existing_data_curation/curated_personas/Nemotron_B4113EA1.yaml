  hobbies: '[''Sketching and painting'', ''Digital illustration'', ''Creative writing and journaling'', ''Exploring Santa Barbara’s beaches for inspiration'', ''Visiting local art galleries and street fairs'',
    ''Cooking traditional Mexican meals'', ''Participating in Mexican folk-dance workshops'', ''Listening to indie/alternative music'']'
  career_goals: Jennifer aims to enroll in a specialized visual-arts program at a community college or a high-school academy that will lead to a Bachelor of Fine Arts. She dreams of working as a concept
    artist for video games or animated films, where she can merge her love for abstract concepts with storytelling. In the longer term, she hopes to launch a community-based art collective in Santa Barbara
    that showcases Mexican-American narratives, offering workshops for youth and creating public murals. She also plans to earn a scholarship that supports under-represented artists, allowing her to travel
    and study diverse artistic traditions.
