  hobbies: '[''Hiking'', ''Mystery and historical fiction reading'', ''Board game strategy nights'', ''Vegetable gardening'', ''DIY electronics projects'', ''Youth coding workshops volunteering'']'
  career_goals: Paula aims to advance to a senior systems analyst role within the next three to five years, targeting certifications such as Certified Business Analysis Professional (CBAP) and ITIL Expert
    to deepen her expertise. She is driven to lead cross‑functional technology projects that streamline operations for regional healthcare providers or government agencies in Arkansas. In the longer term,
    she aspires to transition into a technology manager or solution architect position, where she can shape strategic roadmaps and mentor junior analysts. To support these ambitions, she plans to pursue
    a part‑time MBA focused on technology management while continuing to build a portfolio of successful system transformation initiatives.
