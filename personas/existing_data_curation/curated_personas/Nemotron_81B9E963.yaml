personas:
  professional: David Daugherty is a seasoned firefighter with twenty years of hands‑on experience in fire suppression, hazardous‑materials response, and EMT‑B emergency care, who applies their routine‑oriented,
    detail‑driven mindset to consistently lead incident command with clear communication and to develop structured training programs for their crew.
  sports: David Daugherty adheres to a disciplined fitness schedule of sunrise runs and weight‑training at the local gym, spends weekend mornings angling on the Finger Lakes as a member of the Finger Lakes
    Anglers Association, and faithfully supports the Buffalo Bills and Rochester Red Wings, rarely missing a game day broadcast or a local baseball outing.
  arts: David Daugherty unwinds by watching classic western films starring John Wayne and Clint Eastwood, frequently visits the Rochester Museum & Science Center for rotating art exhibitions, draws aesthetic
    inspiration from the realist paintings of Andrew Wyeth for their woodworking designs, and regularly reads fire‑history non‑fiction to deepen both professional knowledge and cultural appreciation.
  travel: David Daugherty plans travel methodically, favoring weekend trips to Adirondack State Park and Letchworth State Park’s historic fire‑tower trail, has already visited Niagara Falls and a historic
    fire brigade museum in Boston, and dreams of a summer expedition to Yellowstone National Park to study historic wildfire sites and a cultural tour of the Scottish Highlands to explore the roots of modern
    firefighting techniques.
  culinary: David Daugherty, a competent home cook with a preference for hearty, protein‑rich meals, often prepares grilled lake trout with lemon‑dill sauce, slow‑smoked brisket seasoned with paprika and
    brown sugar, and a robust bean chili served with fresh cornbread, while experimenting with seasonal herbs from their backyard garden and using a manual burr grinder for freshly ground coffee.
  core: David Daugherty, a disciplined 43‑year‑old firefighter and avid woodworker, blends routine‑driven pragmatism with solitary early‑morning runs, classic western film marathons, and a quiet competitive
    edge that fuels both career ambition and meticulous DIY projects.
background:
  cultural: David was raised in a modest, middle‑class family in the Rochester suburbs of upstate New York. His family valued hard work, punctuality, and community service, reflecting the practical, down‑to‑earth
    culture of the region. He grew up attending a Protestant church that emphasized personal responsibility, humility, and helping one's neighbors. The local culture, characterized by a blend of small‑town
    solidarity and respect for tradition, has shaped his preference for routine, practicality, and a straightforward approach to life.
attributes:
  skills: '[''Fire suppression'', ''Search and rescue'', ''Emergency medical response (EMT-B)'', ''Fire prevention inspection'', ''Hazardous materials response'', ''Incident command'', ''Equipment maintenance'',
