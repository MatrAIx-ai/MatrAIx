  hobbies: '[''Woodworking'', ''Fishing'', ''Running'', ''Weight training'', ''Reading historical non-fiction'', ''Watching classic western films'']'
  career_goals: David aims to advance within the fire department by earning the rank of Lieutenant within the next two years and eventually attaining the position of Battalion Chief. He plans to complete
    the NFPA Fire Officer I and II courses, obtain EMT‑Paramedic certification, and specialize in hazardous materials operations. He also aspires to become the department’s training officer, where he can
    develop structured, repeatable safety and skill‑building programs. Additionally, he hopes to launch a community fire‑safety outreach initiative that provides regular workshops to local schools and senior
    centers.
