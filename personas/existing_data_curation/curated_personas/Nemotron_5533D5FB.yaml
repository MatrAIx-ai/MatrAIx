personas:
  professional: Karla Odle, a 25-year-old aspiring museum professional, blends self-taught art-history depth, meticulous project-planning skills, and a keen eye for digital photography to support curatorial
    work at the Cassia County Historical Museum, while their calm, skeptical, and competitively driven nature ensures rigorous cataloguing and strategic artist outreach.
  sports: Karla Odle enjoys solitary hikes along the foothills surrounding Malta, joins a weekend trail-running group affiliated with the Boise Trail Runners, and follows the Boise State Broncos football
    team and the Idaho Vandals basketball, they prefer low-impact fitness activities that align with their calm, methodical lifestyle.
  arts: Karla Odle channels their curiosity into watercolor paintings of Idaho's sagebrush, sketches inspired by Georgia O'Keeffe's desert forms, and collects limited-edition prints by Banksy, while they
    regularly attend exhibitions featuring Andy Warhol at the Boise Art Museum and find creative focus in the indie folk sounds of Iron & Wine.
  travel: Karla Odle plans travel around curated art experiences, favoring road trips to Portland's vibrant gallery scene, the adobe-rich streets of Santa Fe for its native-craft markets, and occasional
    weekend flights to Berlin to explore contemporary museum installations, balancing an adventurous spirit with a tight budget and a love of detailed itinerary spreadsheets, they enjoy mixing spontaneous
    detours with thorough planning.
  culinary: Karla Odle experiments with farm-to-table dishes, often whipping up roasted beet and goat-cheese salads with fresh dill, quinoa-crusted salmon glazed with lavender-honey, and homemade kimchi
    using garden-grown cabbage, and they showcase a moderate cooking skill that blends rustic ingredients with global flavors.
  core: Karla Odle is a calm, methodical art enthusiast who merges rural self-reliance with a global curiosity, obsessively curates visual collections, budgets meticulously, and they occasionally hoard
    garden seeds and vintage prints.
background:
  cultural: Karla is a White American raised in Malta, Idaho, within a small, tight-knit community that values self-reliance, connection to the land, and modest folk traditions. Her family’s heritage includes
    ancestors of Northern European descent, and while the local culture is largely agrarian, she was exposed early to regional crafts, community fairs, and church-based music. This upbringing fostered an
    appreciation for simple, authentic expressions, which she balances with a strong curiosity about global artistic movements through online forums, travel documentaries, and occasional trips to urban
    art hubs. Her marital partnership and community involvement shape a cultural identity that blends rural Western American values with a progressive, art-centric outlook.
attributes:
  skills: '[''Art history research'', ''Digital photography'', ''Project planning and time management'', ''Data organization and archival'', ''Critical analysis'', ''Basic graphic design'', ''Gardening'',
