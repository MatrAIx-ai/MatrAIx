  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Reading art and philosophy books'', ''Digital photography of landscapes'', ''Hiking'', ''Gardening'', ''Pottery
    crafting'', ''Participating in a small book club'', ''Experimental cooking'', ''Attending intimate craft fairs'']'
  career_goals: Karla aims to formalize her passion for art by enrolling in a community college program in museum studies while leveraging her organizational expertise to obtain a curatorial assistant role
    at a regional museum. In parallel, she plans to launch an online platform that showcases emerging artists, curates virtual exhibitions, and sells curated prints. Over the next five years, she envisions
    expanding this venture into a small physical gallery or community art space in Cassia County, providing a venue for local talent and interdisciplinary workshops.
