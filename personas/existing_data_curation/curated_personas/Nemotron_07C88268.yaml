  hobbies: '[''Fishing'', ''Hunting'', ''Hiking'', ''Woodworking'', ''Homebrewing'', ''Attending brewery tastings'', ''Playing acoustic guitar'', ''Classic car shows'', ''DIY home improvement projects'']'
  career_goals: Boris aims to become a regional sales manager within the next three years, overseeing a team of representatives and shaping sales strategy for a broader territory. He is also interested
    in developing expertise in a specialized product line, eventually stepping into a product specialist or business development role that blends his curiosity for new technologies with his practical sales
    experience. Long-term, he envisions launching his own distribution company that caters to Midwestern manufacturers, allowing him to leverage his network, competitive drive, and desire for flexibility
    while providing financial stability for his family.
