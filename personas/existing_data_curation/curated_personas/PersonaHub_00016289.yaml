persona_description: A geologist who specializes in the study of the geology and geophysics of the Southern Appalachian Mountains, particularly in the Henderson and Rutherford counties. His research interests
  include the geology of the region, the history of the area, and the preservation and management of natural resources. He is knowledgeable about the unique features and habitats of the area, including
  the Bat Cave, and is interested in the conservation efforts of The Nature Conservancy in managing the preserve. He is also interested in the invasive species and the battle against them through the invasive
  species program.
