  hobbies: '[''Hiking'', ''Skiing'', ''Trail Running'', ''Landscape Photography'', ''Digital Illustration'', ''Motion Graphics'', ''Yoga'', ''Mindfulness Meditation'', ''Cooking'', ''Board Game Nights'',
