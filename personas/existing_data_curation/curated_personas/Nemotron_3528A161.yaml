  career_goals: Juliann aims to step into a senior design leadership role where she can shape strategic product direction while championing inclusive, data‑driven design practices. She envisions building
    a scalable design system for a forward‑thinking company or launching her own consultancy that partners with outdoor‑tourism brands to create accessible, sustainable digital experiences. Over the next
    five years she also plans to mentor emerging designers, speak at national UX conferences, and obtain advanced certifications in accessibility and design operations to reinforce her competitive edge.
