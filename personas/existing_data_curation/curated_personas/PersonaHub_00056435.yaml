persona_description: A military historian who specializes in the study of the use and development of sniper rifles during World War I and World War II, particularly those used by Germany, Great Britain,
  Japan, and the United States. Their research interests include the tactics and strategies employed by snipers, the development of new sniper rifles, and the impact of snipers on the outcome of wars. They
  have a deep understanding of the history of snipers and the evolution of their use, and are skilled in analyzing and interpreting historical data. They are also knowledgeable about the technical specifications
  and design of the various sniper rifles used, including their chambering, barrel length, and magazine capacity.
