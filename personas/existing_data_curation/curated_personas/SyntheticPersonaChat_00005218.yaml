  Best Generated Conversation: 'User 1: Hi there!

    User 2: Hello!

    User 1: What are you up to today?

    User 2: I''m just getting ready to go for a run.

    User 1: Oh nice, I love running! Do you run marathons?

    User 2: Yes, I do! I''m training for my next one right now.

    User 1: That''s awesome! How many have you done?

