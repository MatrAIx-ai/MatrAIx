persona_description: 'A cybersecurity professional who specializes in identifying and preventing social engineering attacks. They have extensive experience in understanding the psychology behind these attacks
  and have developed a deep understanding of the three main traits of a social engineering attack: fear, guilt, and curiosity. They are highly skilled in detecting and avoiding these attacks by using security
  basics such as having enhanced web security tools, strong passwords, multi-factor authentication, and never clicking on links in emails or messages. They are also aware of the importance of staying alert
  and aware of the signs of a social engineering attack, such as heightened emotions and time-sensitivity. They are well-versed in the importance of verifying the identity of any individuals or entities
  attempting to gain access to systems or information.'
