personas:
  professional: Darneta Moore, a meticulous 24‑year‑old library assistant at the Baltimore Central Library, leverages their expertise in Sierra/Alma cataloging, reference services, and event coordination
    to streamline patron experiences while competitively pursuing a Library Services Manager role within five years.
  sports: Darneta Moore, a devoted fan of the Baltimore Ravens and Orioles, maintains fitness through daily yoga, weekend long walks in Patterson Park, participation in a pick‑up basketball league with
    the Inner Harbor Hoops Club, and occasional training for local 5K charity runs.
  arts: Darneta Moore fuels their creative side by capturing vibrant street scenes with their Canon EOS, devouring contemporary fiction by authors such as Sally Rooney and Yaa Gyasi, and regularly attending
    Baltimore Museum of Art exhibitions featuring works by Jean‑Michel Basquiat and Diane Arbus, all while a backdrop of Miles Davis jazz and Erykah Badu neo‑soul accompanies their evenings.
  travel: Darneta Moore prefers meticulously planned weekend getaways, having explored Washington, D.C.’s monuments and driven the Blue Ridge Parkway, while dreaming of a culinary pilgrimage to New Orleans
    and a cultural immersion in Savannah’s historic district, all balanced against a modest student‑budget that guides their choice of affordable Airbnb stays and off‑season travel.
  culinary: Darneta Moore, an adept home cook, perfects Southern comfort classics like buttermilk fried chicken, collard greens simmered with smoked turkey, and sweet‑potato cornbread, while infusing dishes
    with fresh Baltimore crab meat and a pinch of Cajun paprika, and they frequently explore the city’s vibrant food scene at venues such as Miss Shirley’s Café for modern Southern cuisine.
  core: Darneta Moore, a methodical 24‑year‑old library professional, balances a competitive drive with a love for Southern cooking, photography, and community tech mentorship, navigating tight budgets
    and mild anxieties with a skeptical yet curious mindset.
background:
  cultural: Darneta grew up in the vibrant African American community of Baltimore, with deep family roots that trace back to the Southern states. Her upbringing in Gwynn Oak exposed her to a blend of suburban
    stability and rich urban cultural traditions, including church gatherings, community festivals, and a strong emphasis on storytelling. These experiences fostered a respect for oral history and a passion
    for preserving local narratives, which she channels into her work at the library. While she navigates contemporary challenges, she remains connected to the legacy of civil‑rights activism and the artistic
    expressions of Black Baltimore, informing both her professional focus on community outreach and her personal interests in African American literature, music, and culinary heritage.
attributes:
  skills: '[''Cataloging and classification'', ''Reference assistance'', ''Circulation and interlibrary loan management'', ''Data entry and record keeping'', ''Library management software (Sierra/Alma)'',
    ''Microsoft Office (Word, Excel, Outlook)'', ''Customer service and patron support'', ''Event planning and coordination'', ''Research and information retrieval'', ''Digital archiving'', ''Time management'',
    ''Critical thinking and workflow analysis'']'
  hobbies: '[''Reading contemporary fiction and African American literature'', ''Exploring Baltimore history and genealogy'', ''Cooking Southern cuisine'', ''Photography'', ''Yoga and park walking'', ''Strategic
    board games (e.g., Settlers of Catan)'', ''Listening to true‑crime and tech podcasts'', ''Volunteer tutoring at community center'']'
  career_goals: Darneta aims to advance from her current library assistant role to a supervisory position within the next five years, ideally becoming a Library Services Manager. To achieve this, she plans
    to enroll in a bachelor’s program in Library and Information Science while continuing to work part‑time. She is passionate about expanding digital literacy services and hopes to design and lead youth
    tech workshops that blend her curiosity for new ideas with practical community impact. Long‑term, she envisions spearheading a branch-wide outreach initiative that celebrates African American history
    and leverages local archives, positioning the library as a hub for cultural education and innovation.
