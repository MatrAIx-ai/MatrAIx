personas:
  professional: Brandon Herbert, a budding visual storyteller at fifteen, blends sketching, acoustic guitar songwriting, and short‑form video editing for TikTok into a self‑directed multimedia internship
    with the school drama club, channeling their curiosity and love of unconventional ideas while reliably meeting production deadlines.
  sports: Brandon Herbert fuels their love of the outdoors by regularly hiking sections of the Appalachian Trail, joins the high school cross‑country team, and cheers for the local minor‑league baseball
    club, the Asheville Tourists, while occasionally catching the Carolina Panthers on Sundays.
  arts: Brandon Herbert immerses themselves in indie folk (Bon Iver, Fleet Foxes), classic rock (Led Zeppelin, Pink Floyd), and the sketchy street style of Banksy, weaving these influences into detailed
    urban landscape drawings, acoustic ballads, and drama club performances of Shakespearean comedies.
  travel: Brandon Herbert has trekked the Blue Ridge Parkway, explored Asheville’s River Arts District, day‑tripped to Shenandoah National Park, and dreams of visiting Kyoto’s Gion district to experience
    traditional tea ceremonies and cherry blossoms.
  culinary: Brandon Herbert prefers quick, creative meals such as avocado toast topped with feta and fresh basil, homemade ramen with soft‑boiled eggs and sriracha, and occasional pizza nights experimenting
    with toppings like roasted red peppers and spinach, often cooking while listening to folk playlists.
  core: Brandon Herbert is a talkative teen artist who balances sketchbooks, guitars, and TikTok feeds, worries about perfection but thrives on community applause and spontaneous hikes.
background:
  cultural: Brandon grew up in Elizabethton, a small Appalachian town in Carter County, Tennessee, where community ties and family gatherings are central to daily life. His white Southern heritage includes
    traditions such as church potlucks, local blue‑grass festivals, and a strong sense of hospitality. While his upbringing emphasized modesty and respect for local customs, his innate curiosity has led
    him to explore a broader cultural landscape through the internet, exposing him to global music, visual arts, and contemporary social ideas. This blend of Appalachian roots and modern digital influences
    shapes his worldview, fostering both a love for local community service and an eagerness to bring new artistic perspectives to his hometown.
attributes:
  skills: '[''Public speaking'', ''Interpersonal communication'', ''Basic drawing and sketching'', ''Digital illustration (beginner)'', ''Social media content creation'', ''Team collaboration'', ''Event
    planning (school clubs)'', ''Research and self-directed learning'', ''Empathy and conflict mediation'', ''Organizational skills'']'
  hobbies: '[''Sketching and drawing'', ''Playing the acoustic guitar'', ''Collaborative storytelling (online forums)'', ''Participating in school theatre'', ''Reading fantasy and science-fiction novels'',
    ''Hiking in the Appalachian trails'', ''Video game streaming'', ''Volunteering at local community events'', ''Listening to indie and folk music'', ''Creating short videos for TikTok'']'
  career_goals: Brandon aims to complete high school with a strong portfolio that showcases his art and communication abilities, then pursue a degree in visual communication, multimedia design, or theater
    arts at a community college or university. He hopes to blend his creative talents with his love for people by working as a community arts coordinator, youth workshop facilitator, or media content creator
    who produces educational and uplifting material. In the longer term, Brandon envisions establishing his own digital platform where he can teach drawing techniques, share personal reflections on mental
    well‑being, and collaborate with local artists to bring arts programming to underserved schools in Eastern Tennessee.
