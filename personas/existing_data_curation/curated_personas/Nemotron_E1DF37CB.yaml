personas:
  professional: Keith Masri, a disciplined secondary STEM educator with five years of teaching experience, leverages a strong foundation in mathematics, physics, and computer science to craft interdisciplinary
    STEAM curricula that weave art and design thinking into scientific concepts, while their meticulous organization and assertive yet compassionate leadership style drives collaborative project teams and
    data‑driven assessment practices.
  sports: Keith Masri regularly hikes the Cascades with the Cascades Explorers club, paddles a kayak on Lake Washington, and cheers for the Seattle Seahawks, Seattle Sounders FC, and Seattle Kraken, while
    maintaining a disciplined weekly routine of strength training and weekend trail runs that balances structured fitness with spontaneous outdoor adventures.
  arts: Keith Masri frequents Seattle’s Pike/Pine galleries and catches live indie shows at The Crocodile featuring bands like The Shins and Mitski, captures Capitol Hill street murals with a Canon EOS
    M50, draws inspiration from sci‑fi authors such as N.K. Jemisin and philosophers like Kierkegaard, and weaves these artistic influences into classroom projects and personal creative outlets.
  travel: Keith Masri prefers meticulously planned weekend getaways to nearby destinations like Portland, Oregon, and Vancouver, BC, while dreaming of a month‑long cultural immersion in Kyoto during autumn;
    they book flights using a points‑earned credit card, pack a detailed gear checklist for national‑park hikes, yet often postpone longer trips due to graduate‑school demands and budget constraints.
  culinary: Keith Masri enjoys cooking Pacific Northwest salmon with miso glaze, quinoa bowls tossed with kale and roasted mushrooms, and experimenting with kimchi fermentation, favoring ingredients like
    dill, lemon, and matcha; their cooking skill is modest but curiosity drives them to try new recipes after each travel adventure, and they savor single‑origin espresso during evening coding sessions.
  core: Keith Masri, a meticulously organized STEM teacher with an insatiable curiosity for art and technology, balances disciplined achievement with spontaneous hikes, indie gigs, and a stubborn habit
    of late‑night Arduino tinkering.
background:
  cultural: Keith identifies with mainstream American culture while being deeply influenced by the progressive, environmentally conscious ethos of the Pacific Northwest. Raised in a middle‑class family
    with European (primarily Irish and Scandinavian) ancestry, his upbringing emphasized education, outdoor activity, and community involvement. Seattle's vibrant tech scene and rich arts community have
    shaped his worldview, fostering a blend of analytical rigor and creative appreciation. He participates in local coffeehouse culture, values inclusivity and social responsibility, and often engages in
    community service initiatives that reflect the region's collaborative spirit.
attributes:
  skills: '[''Mathematics instruction'', ''Physics laboratory management'', ''Computer science curriculum design'', ''STEAM interdisciplinary integration'', ''Educational technology integration'', ''Data-driven
    assessment'', ''Differentiated instruction'', ''Curriculum development'', ''Public speaking and workshop facilitation'', ''Student mentorship and coaching'', ''Project management'', ''Lab safety protocols'']'
  hobbies: '[''Visiting art galleries and museums'', ''Listening to indie music live'', ''Hiking in the Cascades'', ''Kayaking on Lake Washington'', ''Photography (urban and nature)'', ''Reading science
    fiction and philosophy'', ''Participating in book clubs'', ''DIY electronics and Arduino projects'', ''Robotics kit building'', ''Mentoring teens in coding and visual arts'']'
  career_goals: Keith aims to become a leader in secondary education by first serving as department head for the STEM and STEAM programs at his Seattle high school. Over the next five years, he plans to
    pursue a master's degree in Educational Leadership and earn national certification in curriculum development. He envisions spearheading a district-wide initiative that blends art, coding, and engineering
    to foster creative problem solving among students. In the longer term, Keith aspires to author research articles on interdisciplinary pedagogy, contribute to state education policy reforms, and possibly
    launch a nonprofit that provides after-school STEAM workshops for underrepresented youth in the Pacific Northwest.
