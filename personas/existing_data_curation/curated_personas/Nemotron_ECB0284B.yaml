  hobbies: '[''Custom PC building'', ''Competitive multiplayer gaming (Valorant, League of Legends)'', ''Online chess'', ''Logic puzzles and brain teasers'', ''Weightlifting and interval running'', ''Model
    airplane kit assembly'']'
  career_goals: Ryan aims to earn his GED within the next year and then enroll in a vocational program focused on information technology or automotive technology. He is particularly interested in obtaining
    CompTIA A+ and Network+ certifications to start a career as an IT support specialist, where his methodical approach and problem‑solving skills will be valuable. In the longer term, he aspires to become
    a cybersecurity analyst, leveraging his disciplined work ethic and competitive drive to protect network systems. Parallel to his technical goals, he hopes to qualify for a regional e‑sports tournament
    in a strategy shooter game, using his gaming expertise as a stepping stone toward a professional e‑sports career or as a supplemental income source.
