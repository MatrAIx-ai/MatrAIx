personas:
  professional: Ryan Hathcock is a methodical teenage tech enthusiast who spends evenings building custom PC rigs, scripts routine tasks in Python, and trains rigorously in competitive games, and they channel
    that discipline toward earning CompTIA A+ and Network+ certifications, ultimately pursuing a career as an IT support specialist and future cybersecurity analyst.
  sports: Ryan Hathcock balances a disciplined fitness schedule that includes weightlifting, interval running, and weekly sessions at the local CrossFit box, while cheering for the Los Angeles Lakers and
    following the NFL's Seattle Seahawks, and they occasionally join a school-run cycling club to apply their mechanical skills.
  arts: Ryan Hathcock finds creative relief in the electronic soundtracks of 'League of Legends' and the cinematic scores of Hans Zimmer, binge-watches the anime series 'Attack on Titan' for its strategic
    storytelling, and collects limited-edition gaming art prints, letting the aesthetics of neon-lit PC builds influence their personal style.
  travel: Ryan Hathcock dreams of attending the DEF CON conference in Las Vegas and the Tokyo Game Show, has already visited San Francisco for a regional esports qualifier, and they plan budget-friendly
    trips with family to Seattle's tech museums, balancing curiosity with a strict travel budget.
  culinary: Ryan Hathcock favors high-protein meals like grilled chicken teriyaki with brown rice, enjoys assembling DIY ramen bowls with miso broth and Sriracha, and relies on quick snacks such as pizza
    rolls and energy bars during marathon gaming sessions, while occasionally attempting to bake banana bread for friends.
  core: Ryan Hathcock is a hyper-organized 16-year-old who merges a love for tech, competitive gaming, and disciplined fitness into a precise, data-driven lifestyle, albeit with a habit of over-scheduling
    and a lingering caffeine dependency.
background:
  cultural: Ryan was raised in a middle‑class, suburban neighborhood of San Diego by parents of German and Irish descent. The family emphasizes self‑reliance, practicality, and a strong work ethic—values
    reflected in the local Californian culture of outdoor activity and tech‑savvy lifestyles. While he enjoys the laid‑back beach atmosphere of his city, his reserved nature leads him to focus on activities
    that can be pursued independently or in small groups. His cultural upbringing also includes exposure to military values through his father's service, reinforcing his appreciation for structure, discipline,
    and achievement.
attributes:
  skills: '[''Computer hardware troubleshooting'', ''Basic Python scripting'', ''Strategic video gaming'', ''Time management and scheduling'', ''Organizational planning'', ''Mechanical repair (bicycles
