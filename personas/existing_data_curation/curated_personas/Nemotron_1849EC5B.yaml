  career_goals: Although retired, Jayla is committed to lifelong contribution. She aims to launch a weekly intergenerational storytelling series at the local senior center, preserving the oral histories
    of African‑American elders in Florissant. She wishes to mentor younger volunteers in event planning and grant writing, helping them build sustainable community programs. Jayla plans to complete a short
    gerontology certificate to deepen her understanding of senior health and advocacy. She also hopes to compile a family cookbook that blends traditional recipes with historical context, and to secure
    educational scholarships for her grandchildren. Ultimately, she seeks to strengthen community bonds and ensure the cultural legacy of her generation is celebrated.
