personas:
  professional: An experienced community organizer and retired administrator, Jayla Rideout leverages decades of office management, budgeting, and volunteer coordination to design intergenerational storytelling
    events, all while ensuring meticulous scheduling and a warm, inclusive atmosphere that reflects their sociable, structured nature.
  sports: A regular participant in the senior center’s walking club and occasional bingo enthusiast, Jayla Rideout enjoys strolling through Tower Grove Park, follows the St. Louis Cardinals baseball season,
    and supports the St. Louis Blues hockey team, all while maintaining a gentle daily fitness routine that balances structure and social interaction.
  arts: A devoted quilter and gospel singer, Jayla Rideout draws inspiration from the works of Mahalia Jackson and the folk melodies of Joan Baez, stitches vibrant heritage‑inspired motifs into her quilts
    while attending local heritage lectures featuring historian Dr. Elaine Matthews, and finds solace in reading David McCullough biographies during quiet evenings.
  travel: A meticulous planner, Jayla Rideout prefers organized weekend trips to nearby historic towns such as Savannah, Georgia, and the St. Louis Botanical Garden, while dreaming of a pilgrimage to Marrakesh’s
    gardens, all arranged within a modest travel budget that accommodates occasional visits from her grandchildren.
  culinary: An accomplished home cook, Jayla Rideout prepares traditional Southern comfort dishes like collard greens seasoned with smoked ham hocks, crispy fried chicken, and buttery corn‑bread, often
    incorporating herbs from her vegetable garden such as thyme and basil, and enjoys sharing these meals at community potlucks where her recipes become a bridge between generations.
  core: Jayla Rideout is a structured yet sociable septuagenarian who blends meticulous community organizing, careful budgeting, and a love for quilting, choir, and garden‑to‑table cooking into a life of
    service, despite a lingering tendency to worry about every detail.
background:
  cultural: Jayla was born in the early 1940s, a time when her parents were part of the Great Migration that brought many African‑American families from the South to St. Louis in search of better opportunities.
    Growing up in Florissant’s close‑knit Black community, she was immersed in the traditions of the African Methodist Episcopal church, where gospel music, communal meals, and activism were central. The
    cultural fabric of her upbringing includes Southern cooking, storytelling, quilting, and a strong emphasis on mutual aid and education. The civil‑rights movement of the 1960s shaped her sense of justice
    and community service. Today, she draws on these roots to celebrate African‑American heritage through food, music, craft, and mentorship, while also honoring the Midwest’s unique blend of cultural influences.
