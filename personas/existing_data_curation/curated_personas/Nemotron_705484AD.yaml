  hobbies: '[''Museum and gallery visits'', ''Street photography'', ''Puzzle solving (jigsaw, cryptic crosswords)'', ''Solo chess'', ''Hiking in New England woods'', ''Reading detective and true‑crime literature'',
    ''Listening to classical and jazz music'', ''Gourmet tea brewing'', ''Gardening (private garden)'', ''Collecting rare art prints'']'
  career_goals: Maria aims to transform her reputable solo practice into a boutique investigative agency that specializes in art‑theft, corporate espionage, and high‑stakes personal investigations throughout
    New England. She plans to publish a practical guide on investigative techniques for independent detectives, mentor younger women entering the field, and secure a seat on the board of the New England
    Private Investigators Association, positioning herself as a thought leader in the region’s investigative community.
