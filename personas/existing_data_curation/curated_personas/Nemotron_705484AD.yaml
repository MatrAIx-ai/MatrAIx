personas:
  professional: Maria Susi, a 57‑year‑old independent investigator, merges meticulous forensic photography, advanced digital forensics, and a scholarly grasp of art history to crack art‑theft and corporate
    espionage cases, delivers razor‑sharp reports that showcase their critically skeptical analysis, nurtures a small network of apprentices, and is plotting a boutique agency that will champion women detectives
    across New England, and they approach each new client with a competitive edge.
  sports: Maria Susi enjoys solitary hikes along the quiet Worcester County woodlands, occasional weekend tennis matches with the Worcester Trail Club, and cheering the Boston Red Sox in the fall and the
    Boston Celtics during the NBA season, approaching fitness with disciplined yet low‑pressure walks that double as reconnaissance for new photography spots, and they relish the calm solitude of early‑morning
    treks.
  arts: Maria Susi dives deep into art history at the Worcester Art Museum, studies Caravaggio’s chiaroscuro up close, captures candid street scenes in black‑and‑white, and unwinds to recordings of Miles Davis
    and Johann Sebastian Bach, allowing the works of Monet, Hopper, and contemporary local painters to shape their analytical eye and quiet evenings, and they often sketch quick studies to hone their observational
    skills.
  travel: Maria Susi prefers meticulously planned cultural trips that blend art‑filled itineraries—such as weekend explorations of Florence’s Uffizi, a week‑long study of Edo‑period museums in Kyoto, and
    annual drives along Cape Cod’s lighthouse trail—yet they balance these ambitions with a modest travel budget and a penchant for solo, low‑key adventures, and they carefully map each journey to ensure
    ample time for spontaneous street photography.
  culinary: Maria Susi, an avid tea‑connoisseur, crafts bespoke blends of Darjeeling, jasmine, and lapsang souchong while skillfully preparing Mediterranean fare such as seared sea bass with a caper‑lemon
    beurre blanc and rosemary‑roasted lamb, and they relish brunches featuring avocado toast and smoked salmon at local cafés, often pairing each dish with a newly invented tea infusion.
  core: Maria Susi is a meticulously curious, 57‑year‑old solo investigator who balances a calm, competitive mind with a love for art, cryptic puzzles, and perfectly steeped tea, and they often forget to
    water their garden until the next sunrise.
background:
  cultural: Maria grew up in a modest, predominantly White, New England household during the 1960s‑70s, where self‑reliance, quiet determination, and respect for personal privacy were core values. Her family’s
    Protestant background emphasized community service and modesty, yet frequent visits to the Worcester Art Museum and local community theater instilled an early appreciation for the arts. The region’s
    blend of traditional American work ethic and a thriving independent‑thinking vibe shaped her skeptical, competitive nature, while the cool, reserved New England climate reinforced her comfort with solitude
    and preference for small‑group interactions.
attributes:
  skills: '[''Surveillance'', ''Interviewing'', ''Forensic Photography'', ''Digital Forensics'', ''Open‑Source Intelligence Research'', ''Analytical Reasoning'', ''Evidence Preservation'', ''Report Writing'',
