  career_goals: Nicholas dreams of a future where he can combine his love for practical problem‑solving with his curiosity about the natural world. He aspires to become an environmental engineer or a wildlife
    conservation scientist who designs sustainable solutions for his community’s parks and waterways. He also hopes to lead youth mentorship programs, using his organizational talents to help other kids
    set and achieve goals while fostering a supportive, collaborative environment.
