  skills: '[''Pipefitting'', ''Steamfitting'', ''Welding (MIG/TIG)'', ''Blueprint reading'', ''Hydraulic system troubleshooting'', ''Safety compliance'', ''Team leadership'', ''Apprentice training'', ''Problem
