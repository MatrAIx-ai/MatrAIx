  hobbies: '[''Softball league'', ''Community barbecues'', ''Volunteer work at town fair'', ''Vintage truck restoration'', ''DIY home improvement'', ''Hiking'', ''Fishing'', ''Country dancing'', ''Listening
    to classic rock'']'
  career_goals: Sophia aims to earn her journeyman certification within the next year and eventually step into a foreman or supervisory role where she can blend her technical expertise with her people‑focused
    leadership style. She dreams of establishing a small, women‑friendly contracting firm that offers mentorship to other women entering the trades, while also pursuing additional certifications in advanced
    steam systems to stay at the cutting edge of the industry. Balancing her desire for professional growth with her need for a less stressful schedule, she hopes to transition from physically demanding
    field work to project management, allowing more time for community involvement and personal well‑being.
