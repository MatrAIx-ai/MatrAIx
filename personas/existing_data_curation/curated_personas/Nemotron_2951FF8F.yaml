    and textile arts'']'
  hobbies: '[''Gardening (roses, herbs, vegetables)'', ''Reading classic literature'', ''Writing essays and memoir'', ''Book club participation'', ''Storytelling and oral history sharing'', ''Knitting and
    embroidery'', ''Watercolor painting'', ''Participating in cultural festivals'', ''Cooking traditional South Asian dishes'', ''Genealogy research'', ''Listening to classical Indian music'', ''Volunteering
    as a digital‑literacy coach for seniors'']'
  career_goals: Although Bibi is retired from formal employment, she remains driven by a sense of purpose. Her primary ambition is to preserve and share her family's stories by completing a memoir that
    intertwines personal history with the broader South‑Asian immigrant experience in Texas. She aims to mentor younger members of the Frisco South‑Asian community, helping them navigate cultural identity
    while fostering civic engagement. Bibi also hopes to expand the senior‑center’s cultural‑program offerings, securing long‑term funding for workshops that celebrate South‑Asian arts, music, and cooking,
    thereby creating a lasting bridge between generations.
