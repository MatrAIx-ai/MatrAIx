  hobbies: '[''gardening'', ''knitting'', ''reading classic literature'', ''reading scientific journals'', ''crossword puzzles'', ''Sudoku'', ''bridge'', ''chess'', ''volunteering at library'', ''senior
    book club'']'
  career_goals: Although retired, Linda remains driven to leave a lasting impact. She aims to mentor high school students in rural Puerto Rico through a weekly STEM tutoring program, contribute to preserving
    local oral histories by documenting senior residents' experiences, and maintain her own health and independence. She also hopes to author a memoir reflecting her journey as a woman in a male‑dominated
    field, and to complete a certification in gerontology to better serve her peers.
