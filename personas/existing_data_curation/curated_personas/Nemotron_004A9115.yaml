  hobbies: '[''Soccer'', ''Basketball'', ''Hiking in the Cascades'', ''Salsa Dancing'', "Cooking Guatemalan Cuisine", ''Photography'', ''Tech Meetups'', ''Volunteer Mentorship'', ''Board Games'', ''Travel
    Exploration'']'
  career_goals: Pablo aims to move from his current first‑line supervisor role to a store manager position within the next two years, then progress to district and regional management. He plans to leverage
    his STEM background by earning an MBA focused on retail analytics and digital transformation, eventually overseeing a multi‑store network that integrates data‑driven decision making. Long‑term, he dreams
    of launching his own boutique retail concept that fuses technology with culturally inspired products, reflecting both his professional expertise and Guatemalan heritage.
