  career_goals: Although retired and no longer in the formal workforce, Patrick aims to maintain an active, purposeful routine. He aspires to mentor younger members of his community in trade skills, organize
    monthly DIY workshops at the local senior center, and complete a portfolio of small woodworking projects for his grandchildren. He also hopes to stay physically fit through regular walks and to continue
    competing in his local bowling league, balancing his competitive drive with the desire for social connection.
