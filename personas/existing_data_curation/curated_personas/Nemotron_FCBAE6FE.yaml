  hobbies: '[''Coastal hiking and beach walks'', ''Vegetable gardening'', ''Yoga practice'', ''Traditional South Asian cooking'', ''Woodworking personal projects'', ''Reading historic architecture'', ''Photography
    of nature'', ''Volunteering at local temple community group'']'
  career_goals: Farida aims to achieve journeyman certification and become a recognized master carpenter within the Bay Area. Over the next five years she plans to launch a boutique workshop that specializes
    in sustainable, custom‑made furniture that subtly incorporates South Asian motifs into contemporary Californian design. She also hopes to obtain Green Builder certification, secure community‑focused
    renovation contracts, and create a mentorship program for women entering the trades. Ultimately, she envisions a small cooperative studio that balances steady income with creative fulfillment while
    allowing her to maintain a flexible schedule for family and personal interests.
