persona_description: A business executive who is responsible for managing the data protection and recovery systems of a large organisation. This executive is interested in implementing a more effective
  and efficient data recovery system that can protect both physical and virtual environments with a single platform. They are looking for a solution that provides flexibility in data protection and recovery,
  reduces the number of tools required, and enables the recovery of files, databases, systems, and entire sites from any device and location. They are also interested in a solution that can seamlessly take
  advantage of different storage media with different characteristics and price points, and can facilitate the needed functionality at the right price point to enable a more agile DR strategy for scale-out
  data centers.
