personas:
  professional: Jorge Colon, a retired carpenter and seasoned community organizer, channels their methodical planning, bilingual fluency, and sharp artistic critique into curating a traveling exhibition
    of heritage‑inspired artwork, mentoring high‑school students in visual arts, and leading senior‑center events—though their competitive edge sometimes sparks spirited debates with fellow volunteers,
    and they readily defend their creative vision.
  sports: Jorge Colon joins a weekly walking club at the senior center, plays casual pickleball with neighbors, and remains a devoted fan of the Houston Astros, the Houston Dynamo, and the Texas Rangers,
    often cheering from the comfort of their living room, and they relish discussing game stats over coffee with fellow seniors.
  arts: Jorge Colon spends afternoons painting watercolors and acrylics inspired by the bold colors of Frida Kahlo and Diego Rivera, critiques pieces at the Houston Museum of Fine Arts, captures neighborhood
    festivals with a digital camera before editing them for social media, and attends live mariachi and Tex‑Mex band performances, often quoting the lyrical poetry of local muralist Ana Ramirez, and they
    relish sharing their own artistic experiments with fellow seniors.
  travel: Jorge Colon combines meticulous planning with a love of spontaneous discovery, having trekked the vineyards of Jalisco’s Tequila region, explored Oaxaca’s bustling markets, taken weekend road
    trips to the San Antonio River Walk, and they continue to dream of a photo‑journalism pilgrimage to the Sierra Madre, balancing cultural deep dives with cost‑conscious travel.
  culinary: Jorge Colon crafts traditional tacos al pastor, rich mole, and fluffy tamales using chiles de árbol, ancho, and a hint of cocoa, experiments with pineapple‑infused marinades for a modern twist,
    and they joyfully share these dishes at community festivals while refining recipes for a modest online salsa and pickle business.
  core: Jorge Colon blends restless curiosity, methodical organization, sociable energy, a competitive streak, and an undercurrent of anxiety into a vibrant senior life of art, food, community leadership,
    and cultural storytelling, and they never miss a chance to mentor a younger neighbor.
background:
  cultural: Jorge is the son of Mexican immigrants who settled in Houston’s historic East End, a neighborhood rich in Mexican‑American traditions. He grew up speaking both Spanish and English, celebrating
    Catholic holidays like Christmas Posadas and the vibrant Día de los Muertos, where he helped organize community altars. Family gatherings often revolve around shared meals of tamales, pozole, and enchiladas,
    reinforcing his deep connection to Mexican culinary heritage. While embracing Texan culture—enjoying barbecues, local sports, and the state’s eclectic music scene—Jorge remains proud of his Mexican
    roots, actively participating in the local Mexican American Cultural Center, tutoring youth in Spanish, and preserving folk traditions through storytelling and art. His bicultural identity shapes his
    worldview, fostering a respect for diversity and a desire to bridge communities in Houston.
