personas:
  professional: Joel Kosik is a budding junior engineer who spends afternoons sketching intricate LEGO mechanical models, experimenting with Scratch to code tiny games, and channeling their talkative energy
    into leading group projects in the school’s robotics club, where curiosity for new ideas meets a practical knack for building functional prototypes.
  sports: Joel Kosik bursts onto the neighborhood soccer field each Saturday for the Sedro‑Woolley Youth Soccer Club, while cheering loudly for the Seattle Sounders FC during TV games and occasionally joining
    friends for pickup basketball at the community center, embodying their love for teamwork and fast‑paced action.
  arts: Joel Kosik rocks the garage drum kit in their family’s impromptu band, shines in drama club improv sketches with a flair for quick jokes, admires the quirky animations of Pixar’s 'Toy Story' and
    the rhythmic beats of Imagine Dragons, and edits short comedy videos on their phone using Billie Eilish’s soundtrack to showcase their creative storytelling.
  travel: Joel Kosik’s travel log lists weekend camping trips to the North Cascades, a family road trip to Seattle’s Pike Place Market, an adventurous hike in Oregon’s Columbia River Gorge, and a yearning
    to explore the giant Redwood forests of Northern California, all planned spontaneously with input from friends and a modest allowance.
  culinary: Joel Kosik devours classic pizza slices and chicken nuggets after school, loves the smoky flavor of bratwurst they reluctantly eat at the annual Oktoberfest celebration, whips up quick microwave
    popcorn with extra butter for movie nights, and enjoys crafting s’mores over a campfire using marshmallows, graham crackers, and chocolate bars.
  core: Joel Kosik blends a restless curiosity for building and coding with a love for high‑energy performances, often juggling soccer drills, LEGO constructions, and video skits, while their habit of misplacing
    homework and forgetting to log their allowance adds a charmingly chaotic twist to their otherwise enthusiastic routine.
background:
  cultural: Joel comes from a White American family that has lived in the Pacific Northwest for several generations, with ancestral roots tracing back to German and Scandinavian immigrants who settled in
    Washington State in the early 20th century. Growing up in Sedro‑Woolley, he is immersed in a community that values outdoor recreation, seasonal festivals, and a strong sense of neighborliness. Local
    cultural touchstones such as the annual Skagit County Fair, high‑school football games, and community potlucks shape his social experiences. At home, his family observes mainstream American traditions—Thanksgiving,
    Independence Day fireworks—while also preserving occasional heritage celebrations like Oktoberfest, reflecting his mixed European lineage. This blend of regional nature‑oriented lifestyle and multicultural
    family traditions informs his appreciation for both established customs and new ideas.
