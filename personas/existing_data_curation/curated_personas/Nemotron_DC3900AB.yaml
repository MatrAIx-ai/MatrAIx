  career_goals: Looking ahead, Joel envisions a career that blends his love for technology, storytelling, and the outdoors. He aspires to become an environmental engineer or robotics specialist who designs
    sustainable tools for community use, while also sharing his knowledge through youth workshops and online video content. In the short term, he aims to lead his middle‑school robotics team, win a regional
    science fair, and secure a leadership role in his school’s student council, building a foundation for future studies in engineering and communication.
