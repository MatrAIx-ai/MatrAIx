  career_goals: Elizabeth aims to lead a research team that bridges mathematics and visual arts, creating innovative data-driven storytelling platforms. She aspires to become a senior data scientist or
    principal investigator in a university-affiliated research institute, where she can mentor junior scholars and shape interdisciplinary curricula. Long-term, she hopes to launch a boutique consultancy
    that applies mathematical insights to solve complex problems for cultural institutions and tech startups, while advocating for greater representation of women in STEM.
