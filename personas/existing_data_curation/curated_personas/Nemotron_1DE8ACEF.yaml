personas:
  professional: Christina Mayeux is a full‑stack software developer and burgeoning tech leader who leverages her Python, JavaScript, React, and AWS expertise to turn business strategies into scalable web
    products, while her practical, structured mindset and sociable energy make her a go‑to facilitator in agile ceremonies and an inspirational mentor for junior engineers.
  sports: Christina Mayeux fuels her fitness by practicing yoga three times a week at a downtown studio, joining the Brooklyn Running Club for weekend long runs, and playing co‑ed softball on a local league,
    while cheering for the Brooklyn Nets, the New York Yankees, and New York City FC from her balcony garden on game days.
  arts: Christina Mayeux channels her sociable flair into weekly improv sessions with a Brooklyn comedy troupe, finds inspiration in comedy legends like Amy Poehler and Ali Wong, devours contemporary fiction
    from Sally Rooney to Ocean Vuong, and curates her apartment walls with limited‑edition prints by Kehinde Wiley and vibrant murals by local street artists, all while spinning playlists that blend Mitski,
    St. Vincent, and Nils Frahm.
  travel: Christina Mayeux approaches travel with a blend of meticulous itineraries and spontaneous photo‑essay moments, having already explored Kyoto’s temples, Barcelona’s tapas bars, Marrakech’s souks,
    and Iceland’s volcanic landscapes, while they dream of trekking Patagonia’s glaciers and sailing around New Zealand’s fjords, always budgeting carefully to fund both adventure and their vibrant brunch‑hosting
    lifestyle back home.
  culinary: Christina Mayeux, a confident home‑cook who harvests basil and mint on her balcony, delights in whipping up Shakshuka with fresh tomatoes, crafting kimchi‑fried rice using gochujang and pantry‑ready
    quinoa, and perfecting a smoky roasted‑beet and goat‑cheese salad, while they also indulge in Brooklyn’s ever‑evolving culinary scene—from ramen bowls at a hidden cellar to artisanal bagels topped with
    lox, capers, and a smear of cream cheese.
  core: Christina Mayeux balances a data‑driven mind with a gregarious heart, orchestrating code, brunches, and improv with equal precision, while secretly obsessing over perfect spreadsheet aesthetics
    and an endless quest for the ideal avocado toast.
background:
  cultural: Christina comes from a white, middle‑class family with roots in the northeastern United States; her paternal lineage traces back to French‑Canadian ancestors, which has infused occasional family
    traditions such as celebrating Saint‑Jean‑Baptiste and enjoying classic French‑Canadian cuisine during holidays. Raised in a suburban New Jersey community before moving to Brooklyn for college, she
    values the blend of East Coast diligence and the borough’s vibrant multicultural fabric. Her upbringing emphasized education, civic engagement, and community service, influencing her current involvement
    in local volunteer initiatives and her appreciation for the diverse cultural offerings of Brooklyn.
