  career_goals: Christina aims to leverage her dual expertise in technology and business to transition into a senior engineering leadership role within the next three years, ideally as a Lead Engineer or
    Engineering Manager. She aspires to mentor junior developers, champion inclusive team culture, and drive product innovation that aligns with market needs. Long‑term, she envisions founding a tech consultancy
    that helps small businesses modernize their operations, combining her business acumen with her software development background to deliver end‑to‑end digital solutions.
