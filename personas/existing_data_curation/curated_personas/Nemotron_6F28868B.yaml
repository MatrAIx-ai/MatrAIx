personas:
  professional: Johnathan Kemp is a meticulous young robotics enthusiast who spends after‑school hours designing intricate LEGO models, writing simple code in Scratch, and leading his school’s robotics
    club projects with a focus on precision and practical problem‑solving.
  sports: Johnathan Kemp is a regular participant in pick‑up basketball games at the neighborhood park, idolizing the Golden State Warriors while practicing disciplined drills with the Midtown Hoops youth
    league, blending competitive drive with cooperative team spirit.
  arts: Johnathan Kemp finds creative release in building LEGO sculptures inspired by Nathan Sawaya, devouring mystery series by Rick Riordan and J.K. Rowling, and listening to the dynamic film scores of
    Hans Zimmer, which together shape a disciplined yet adventurous artistic identity.
  travel: Johnathan Kemp loves planning family road trips with a meticulously drawn itinerary, having explored Yellowstone National Park and the historic sites of Washington, D.C., while dreaming of a future
    visit to the LEGO House in Billund, Denmark, balancing curiosity with structure.
  culinary: Johnathan Kemp helps prepare simple meals like spaghetti Bolognese and chicken quesadillas, often insisting on adding extra cheese and pepperoni, and while their cooking skill is beginner‑level,
    they occasionally forget to wash their hands before handling food, a quirky habit they’re learning to correct.
  core: Johnathan Kemp is an organized, routine‑loving eleven‑year‑old who blends disciplined LEGO engineering with a love for basketball, mystery novels, and methodical budgeting, all while navigating
    the quirks of youthful curiosity.
background:
  cultural: Johnathan is an African‑American boy raised in Glen Allen, a diverse suburb of Richmond, Virginia. His family honors traditions such as gathering for Sunday meals, listening to gospel music,
    and celebrating Juneteenth and Black History Month with stories of local civil‑rights leaders. He attends a public middle school where African‑American heritage is highlighted through curriculum and
    community events, and he participates in a church that emphasizes service and fellowship. These cultural influences shape his values of community, cooperation, and a strong work ethic.
