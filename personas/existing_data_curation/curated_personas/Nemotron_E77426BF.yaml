personas:
  professional: Aileen Reynes is a budding mini-architect who channels curiosity into assembling LEGO models; they use a methodical eye for detail while delighting in the freedom to invent new structures.
  sports: Aileen Reynes is a lively park explorer who rides a bright red bike through the neighborhood, joins friends in tag games, and proudly cheers for the local minor league baseball team, the City
    Cubs; they love the thrill of running and the camaraderie of team spirit.
  arts: Aileen Reynes fills sketchbooks with vibrant animal drawings inspired by the bold colors of Henri Matisse and often dances to lively folk rhythms, humming along to the warm melodies of the group
    Los Amigos; they feel the beat guiding their hand on each drawing.
  travel: Aileen Reynes loves short family road trips to the nearby coastal town of Seaside Bay and day trips to the botanical garden, while dreaming of a future adventure to the Iguazu Falls to see the
    roaring waterfalls up close; they imagine the roar of the waterfalls echoing their own boundless energy.
  culinary: Aileen Reynes enjoys snack-time banana pancakes topped with maple syrup, delights in dipping fresh carrots into hummus, and helps family prepare simple chicken soup known for its comforting
    broth; they proudly serve the soup to younger cousins, feeling a sense of nurturing.
  core: Aileen Reynes blends an organized love for building blocks with a vibrant imagination for drawing, occasionally forgetting to clean up but always eager to share colorful creations and upbeat tunes;
    they delight in turning any space into a mini‑studio.
background:
  cultural: Aileen’s family maintains strong Nicaraguan roots while living in Placentia, California. Spanish is spoken at home, and she celebrates traditional holidays such as Noche Buena and Independence
    Day with special foods like gallo pinto, tamales, and plantain fritters. She attends a local Catholic parish and participates in community festivals that feature marimba music and folkloric dances.
    The blend of Nicaraguan customs and Californian community life gives her a bicultural perspective, encouraging respect for family, community, and diversity.
