  hobbies: '[''Coloring and drawing'', ''Building with LEGO'', ''Bike riding'', ''Playing tag with friends'', ''Helping in the garden'', ''Listening to Nicaraguan music'', ''Dancing'', ''Watching educational
    cartoons'']'
  career_goals: Aileen dreams of becoming someone who helps others and explores the world. She often says she wants to be a teacher who reads stories to kids, a veterinarian who cares for animals, or an
    astronaut who discovers new planets. Her practical side shows in a desire to "take care of things"—helping her family with chores and caring for her pet hamster, which she sees as early practice for
    future caregiving roles.
