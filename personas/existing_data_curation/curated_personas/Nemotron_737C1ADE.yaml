personas:
  professional: An 18‑year‑old aspiring financial analyst named Angelica Lands leverages their hands‑on bookkeeping experience at a family boutique and a local nonprofit, pairing Excel wizardry with Canva‑styled
    visuals to produce data reports that feel like art, thriving in small‑team settings where their attentive, detail‑oriented nature shines despite occasional worry.
  sports: Angelica Lands enjoys solitary hikes through Savannah’s coastal parks, participates in a local 5K running club on Saturdays, follows the Savannah Bananas baseball team and the Atlanta Hawks for
    basketball, yet they prefer quiet, solo exercise over team sports due to their reserved nature.
  arts: Angelica Lands spends weekends sketching riverfront scenes, crafting digital illustrations in Procreate, draws inspiration from jazz greats like Miles Davis, soul legends such as Aretha Franklin,
    and Southern blues icons like B.B. King, and they regularly visit the Telfair Museums and thrift stores for vintage prints, channeling their curiosity into every brushstroke.
  travel: When budgeting permits, Angelica Lands embarks on low‑cost road trips to historic towns like Charleston and Asheville, staying in tranquil B&Bs, and they dream of a solo backpacking trek along
    the Appalachian Trail, meticulously planning itineraries in Excel to balance adventure with financial prudence.
  culinary: Angelica Lands delights in cooking classic Southern dishes such as shrimp and grits, collard greens, and pecan pie, often adding fresh herbs and locally sourced produce, yet they admit to overindulging
    in sweet tea during late‑night study sessions, a habit they humorously call their 'creative fuel.'
  core: Angelica Lands is an 18‑year‑old finance enthusiast who turns spreadsheets into artful stories, lives with a quiet curiosity and occasional worry, and balances budget‑savvy habits with a love for
    Southern culture and solo creative pursuits.
background:
  cultural: Angelica was raised in a close‑knit African‑American family in Savannah’s historic Westside neighborhood. Her upbringing was shaped by Southern Black traditions, including Sunday church services,
    gospel music, and community gatherings that celebrate resilience and collective progress. She grew up hearing stories of the Gullah/Geechee heritage that permeates the coastal region, fostering a deep
    respect for cultural preservation and oral history. Family meals centered around soul food—fried catfish, collard greens, and sweet potatoes—reinforced a sense of belonging and shared identity. The
    legacy of Black entrepreneurship in Savannah, exemplified by family‑run corner stores and barbershops, inspired Angelica’s early interest in managing finances to support her family’s livelihood. Her
    cultural identity informs her commitment to uplift other Black youth through financial education and to honor artistic expression as a vital part of her community’s narrative.
attributes:
  skills: '["Financial budgeting", "Cash‑flow analysis", "Basic bookkeeping", "Microsoft Excel (advanced formulas, pivot tables, data visualization)", "QuickBooks (accounts payable/receivable)", "Financial
    reporting", "Analytical problem solving", "Risk assessment", "Attention to detail", "Effective communication in small teams", "Creative financial strategy development", "Time management", "Stress coping
    techniques (mindfulness, journaling)", "Digital design basics (Canva)", "Research of emerging financial trends"]'
  hobbies: '["Visiting local art galleries and museums", "Sketching and digital illustration (Procreate)", "Reading contemporary fiction and poetry", "Listening to jazz, soul, and Southern blues", "Hiking
    coastal parks and nature trails", "Journaling and meditation", "Personal finance blogging", "Volunteiting for youth financial literacy programs", "Cooking traditional Southern cuisine", "Exploring vintage
    thrift stores for unique art and fashion items"]'
  career_goals: Angelica’s immediate goal is to earn her GED and enroll in a community‑college associate program in accounting, followed by a bachelor’s degree in finance. She plans to obtain professional
    certifications such as the QuickBooks ProAdvisor and eventually the Certified Public Accountant (CPA) credential. In the medium term, she aspires to become a senior financial analyst or CFO for a small
    black‑owned business in Savannah, using her expertise to support community economic empowerment. Long‑term, Angelica dreams of founding a consultancy that offers financial literacy workshops and budgeting
    services to youth and artistic collectives, merging her love for art with her financial acumen. She also hopes to mentor other young women of color who wish to pursue careers in finance despite limited
    formal education pathways.
