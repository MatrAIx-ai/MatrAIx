  hobbies: '[''Fishing at Fox Lake'', ''Gardening'', ''Cooking traditional Italian dishes'', ''Bridge club'', ''Weekly Sunday Mass'', ''Volunteering at the food pantry'', ''Reading mystery novels'', ''Watching
    classic movies'']'
  career_goals: Approaching retirement, David aims to solidify the restaurant’s operational stability by documenting standardized procedures and mentoring a successor. He hopes to transition into a part‑time
    consulting role for nearby small eateries, offering practical guidance on cost control and food‑safety best practices. Maintaining a harmonious workplace and leaving a legacy of reliable, well‑organized
    service are his primary ambitions.
