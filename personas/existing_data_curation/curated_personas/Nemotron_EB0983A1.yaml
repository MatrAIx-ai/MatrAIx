  career_goals: Xavier aims to move up to a store manager position within the next three years, leveraging his hands‑on retail experience to lead a team. He plans to enroll in a community‑college business
    administration program to gain formal management credentials. In the longer term, he hopes to open a small convenience store or a Salvadoran‑style food kiosk that can serve both his local community
    and his family back in El Salvador, providing stable income, benefits, and a platform to showcase his cultural heritage.
