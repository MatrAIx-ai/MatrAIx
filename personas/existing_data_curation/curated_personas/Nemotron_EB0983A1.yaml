personas:
  professional: Xavier Pacheco thrives on the predictable rhythm of retail operations, where their bilingual charm, meticulous POS handling, and knack for inventory organization empower them to resolve
    conflicts on the floor while staying flexible enough to address unexpected issues as they quietly plot a three‑year path toward store‑manager leadership.
  sports: Xavier Pacheco follows the El Salvador national soccer team and cheers for MLS clubs like LAFC and Seattle Sounders, while they unwind by conquering seasonal soccer video games, casting lines
    at Lake Shasta on weekends, and pedaling rugged rural trails near Big Bear.
  arts: Xavier Pacheco’s evenings echo the vibrant sounds of cumbia legends Los Ángeles Azules and the reggaeton hits of J Balvin and Bad Bunny, melodies that they dance to during church celebrations and
    local cultural festivals.
  travel: Xavier Pacheco prefers spur‑of‑the‑moment road trips that blend nature and culture, having already explored the hiking trails of Yosemite and fished at Lake Shasta, while they dream of strolling
    through Antigua, Guatemala and the colorful streets of Cartagena, Colombia, all on a modest student‑budget that favors affordable hostels over luxury resorts.
  culinary: Xavier Pacheco enjoys a moderate‑skill kitchen where they expertly hand‑shape pupusas filled with cheese, pork, and loroco, and slow‑cook tamales with masa, bean puree, and a pinch of ají, often
    pairing the dishes with fresh salsa verde.
  core: Xavier Pacheco blends a love for routine retail work with a relaxed, community‑centered lifestyle, juggling spontaneous cooking sessions, soccer fandom, and occasional disorganization, while they
    stay upbeat and adaptable.
background:
  cultural: Xavier’s family originates from San Salvador, El Salvador, and maintains many Salvadoran customs in their home in Ekron, Kentucky. Raised in a bilingual environment, he grew up speaking Spanish
    with his parents and grandparents while learning English at school. He celebrates traditional holidays such as Día de la Batalla de San Salvador and enjoys family gatherings centered around food and
    music. As a Catholic, he attends mass regularly and participates in church‑based community service. While he embraces Southern hospitality and local customs, he also keeps close ties to the Salvadoran
    diaspora, preserving his heritage through language, cuisine, and cultural celebrations.
