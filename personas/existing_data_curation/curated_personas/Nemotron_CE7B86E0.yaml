  hobbies: '[''drawing and painting'', ''LEGO building'', ''soccer'', ''Scratch coding projects'', ''reading fantasy books'', ''exploring nature trails'', ''attending cultural festivals'', ''listening to
    music (Mexican folk and pop)'']'
  career_goals: Ramon dreams of turning his love for art and technology into a future career. He imagines becoming an illustrator or video-game designer who can create characters and worlds that blend his
    Mexican heritage with imaginative storytelling. He also hopes to use his bilingual skills to teach younger kids about art and coding, perhaps leading community workshops. While he keeps his plans flexible,
    his overarching ambition is to create experiences that inspire curiosity and celebrate cultural diversity.
