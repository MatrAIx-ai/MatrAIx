personas:
  professional: Ramon Maldonadosantiago, a 10‑year‑old aspiring multimedia creator, mixes cartoon sketching, LEGO engineering, and Scratch game design to prototype playful stories while they confidently
    champion group brainstorming sessions and tolerate the occasional unfinished project.
  sports: Ramon Maldonadosantiago bolts onto the local Wylie Community Soccer Field every Saturday with the Wylie Youth Soccer Club, cheers for FC Dallas and the Dallas Mavericks on TV, and uses their boundless
    energy to practice dribbling tricks while they occasionally forget to stretch, leading to a few sore knees.
  arts: Ramon Maldonadosantiago dazzles classmates with vibrant cartoon panels inspired by the whimsical style of Dr. Seuss and the bold colors of contemporary muralists, composes simple beats from mariachi
    recordings and Billie Eilish tracks while they paint small murals on neighborhood walls during town festivals, and they eagerly collect limited‑edition LEGO art sets.
  travel: Ramon Maldonadosantiago enjoys weekend hikes on the Heard Natural Science Museum trails, has visited San Antonio’s River Walk for a festive Cinco de Mayo parade, dreams of exploring the ancient
    ruins of Chichén Itzá, and they often plan trips by sketching itineraries on notebook paper, though they sometimes forget to pack snacks.
  culinary: Ramon Maldonadosantiago loves the smoky flavor of tacos al pastor, the cheesy stretch of pepper jack pizza, and the sweet crunch of churros, often attempts to recreate these dishes at home with
    the help of a parent, but they frequently over‑season their creations while giggling at the colorful mess.
  core: Ramon Maldonadosantiago is a curiosity‑driven 10‑year‑old who colors the world with LEGO bricks, cartoons, and soccer kicks, yet they habitually leave half‑finished art projects strewn around the
    living room.
background:
  cultural: Ramon is a second-generation Mexican-American raised in Wylie, Texas. At home he speaks Spanish with his parents and grandparents, and English at school and with friends. His family celebrates
    Mexican holidays such as Dia de los Muertos, Las Posadas, and Cinco de Mayo, often preparing traditional foods like tamales and pozole. The blend of Mexican customs and the multicultural atmosphere
    of the Dallas-area community gives him a bicultural identity that influences his art, his love for music, and his desire to share his heritage with others.
