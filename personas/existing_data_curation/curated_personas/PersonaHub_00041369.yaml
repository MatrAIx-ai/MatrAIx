persona_description: A space engineer who specializes in the design and development of life support systems for space travel. Their expertise lies in the creation of systems that can maintain the necessary
  necessities for life aboard spacecraft, including air pressure, atmospheric conditions, and water purification. They are responsible for ensuring that astronauts and cosmonauts have access to clean and
  safe drinking water, food, and oxygen, and that their health is maintained in a zero gravity environment. They work closely with nutritionists to develop safe and nutritious food options that meet the
  specific dietary needs of astronauts and cosmonauts.
