persona_description: A radiation biologist who has conducted extensive research on the health effects of radiation on the human body, particularly the risks associated with full-body scans. He is concerned
  about the promotion of these tests as screening methods and the potential for radiation-induced cancer. He is interested in quantifying the radiation exposure from full-body scans and the benefits of
  receiving a correct diagnosis versus the radiation risk. He is skeptical of the lack of knowledge among physicians about the radiation risks of medical tests and is advocating for greater transparency
  and education on this issue.
