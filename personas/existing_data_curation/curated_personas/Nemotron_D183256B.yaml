personas:
  professional: Tonya Polk, a middle‑school humanities teacher in Milwaukee, designs interdisciplinary curricula that weave literary analysis, historical context, and digital storytelling, leveraging their
    methodical lesson planning and compassionate mentorship while quietly managing classroom dynamics with a practiced, stress‑aware eye.
  sports: Tonya Polk enjoys low‑impact fitness, attending the local Milwaukee Parks yoga series and a Saturday morning adult volleyball league with the East Side Spikers, while cheering on the Milwaukee
    Brewers in spring and the Bucks during winter, using these routine activities as structured stress‑relief outlets.
  arts: Tonya Polk finds solace in Milwaukee’s art museums, especially the exhibits of contemporary painter Kara Walker and the historical portrait collection, while at home they needle‑craft journals inspired
    by Maya Angelou’s poetry and unwind to the soulful piano of Nina Simone.
  travel: Tonya Polk prefers meticulously planned weekend escapes, often retreating to Door County’s lakeside cabins for solitary reflection, while dreaming of a culturally immersive trip to Savannah’s
    historic district and a future literary pilgrimage to Dublin’s James Joyce Centre.
  culinary: Tonya Polk, a modest home‑cook, gravitates toward plant‑based comfort foods like simmered lentil stew seasoned with smoked paprika and fresh cilantro, delights in crafting their own herbal tea
    blends with chamomile and mint, and occasionally treats themselves to a slice of homemade banana bread after a long grading night.
  core: Tonya Polk is a quietly ambitious educator who channels meticulous organization, deep compassion, and a persistent undercurrent of worry into crafting inclusive curricula, nurturing indoor greenery,
    and finding calm in yoga and poetry.
background:
  cultural: Tonya identifies as African American, rooted in a family tradition of storytelling and community activism. Growing up in Milwaukee's historic Bronzeville neighborhood, she experienced the vibrant
    legacy of Black churches, civil rights groups, and cultural festivals that celebrate African diasporic heritage. Her education in the humanities deepened her appreciation for Black literature, history,
    and the arts, which she weaves into her teaching to foster cultural pride and critical consciousness among her students.
attributes:
  skills: '[''lesson planning'', ''curriculum development'', ''differentiated instruction'', ''culturally responsive pedagogy'', ''classroom management'', ''digital storytelling integration'', ''literary
    analysis'', ''student assessment'', ''conflict resolution'', ''mentorship'']'
  hobbies: '[''reading contemporary African American literature'', ''journaling'', ''yoga'', ''indoor gardening'', ''book club for Black women writers'', ''volunteering at community literacy events'', ''visiting
    art museums'', ''historical tours'']'
  career_goals: She aims to become a lead humanities coordinator for the Milwaukee school district, designing inclusive curricula that reflect the histories and experiences of African American communities.
    Over the next five years, Tonya plans to earn a master's in educational leadership, mentor novice teachers, and launch an after‑school program focused on creative writing and social justice. She also
    hopes to contribute to district‑wide professional development workshops on culturally responsive teaching.
