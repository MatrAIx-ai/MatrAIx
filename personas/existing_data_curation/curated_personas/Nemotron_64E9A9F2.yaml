  career_goals: Marisa aims to build on her practical experience by completing her associate degree and eventually earning a bachelor’s in community development or public administration. She hopes to transition
    into a supervisory role within parking services or facilities management, where she can mentor new staff and implement more efficient, customer‑focused processes. Long‑term, she is passionate about
    working for a city‑run or nonprofit organization that improves transportation equity and supports underserved neighborhoods in Atlanta. She also wants to develop formal skills in project coordination
    and grant writing to contribute to community‑building initiatives, while continuing to strengthen her resilience and stress‑management techniques.
