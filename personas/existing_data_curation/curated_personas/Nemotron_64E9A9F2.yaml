personas:
  professional: Marisa Gregory, a 25-year-old parking attendant in Atlanta, blends precise cash-handling, digital ticketing expertise, and clear, courteous communication with a calm, compassionate approach
    to de‑escalate tense situations, and they aspire to lead a supervisory team that embeds equity and sustainability into city parking and facilities management.
  sports: Marisa Gregory cheers for the Atlanta Braves, follows the Atlanta Falcons and Atlanta United, and they stay fit by jogging with the Midtown Run Club three times a week while joining a co-ed recreational
    soccer league each spring, balancing team spirit with personal wellness.
  arts: Marisa Gregory nurtures their creative side through urban photography inspired by Eric Kim, frequents the Fox Theatre to catch the Atlanta Symphony Orchestra and indie concerts by H.E.R., and they
    curate a personal playlist featuring Kamasi Washington and Janelle Monáe while exploring street-art districts on weekends.
  travel: Marisa Gregory prefers spontaneous low-budget weekend road trips to Appalachian highlights like Asheville’s Blue Ridge trails or Savannah’s historic squares, and they are saving for a future solo
    adventure to Lisbon’s pastel-colored neighborhoods and Valencia’s urban art scene, balancing wanderlust with their modest income.
  culinary: Marisa Gregory enjoys cooking Southern comfort meals such as shrimp and grits with smoked paprika and collard greens seasoned with apple cider vinegar, while they also savor specialty cold brews
    made from Ethiopian beans at local cafés and experiment with plant-based dishes like quinoa-kale bowls drizzled with tahini.
  core: Marisa Gregory, a 25-year-old parking attendant with a habit of over-organizing sticky notes, combats chronic worry through nightly yoga but secretly hoards free-range chicken bones for an imagined
    future stew.
background:
  cultural: Marisa grew up in DeKalb County, a culturally diverse part of the Atlanta metropolitan area. Although her family identifies as White and generally follows Southern middle‑class traditions—such
    as weekend barbecues, Thanksgiving gatherings, and an appreciation for local sports—her upbringing was shaped by the city’s multicultural atmosphere. She attended public schools where she interacted
    with peers from a range of ethnic backgrounds, fostering an early awareness of community dynamics and a respect for the city’s rich cultural tapestry. This blend of Southern hospitality and exposure
    to urban diversity informs her cooperative outlook, her desire to serve a broad community, and her interest in initiatives that promote inclusive, equitable public services.
