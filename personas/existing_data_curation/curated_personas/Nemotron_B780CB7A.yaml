  career_goals: Thomas aims to stay intellectually active and socially engaged in his later years. He plans to complete a series of watercolor paintings reflecting the landscapes of East Tennessee and display
    them in the local community center. He intends to write and self‑publish a memoir that weaves together family stories and the region’s industrial heritage. He also hopes to earn a certificate in senior‑volunteer
    leadership, mentor younger members of the seniors’ club in event planning and budgeting, and deepen his knowledge of modern art by attending workshops at the nearby Knoxville Museum of Art. Additionally,
    he wants to become proficient in digital photography to capture and archive local cultural events.
