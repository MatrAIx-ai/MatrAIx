persona_description: A linguistics professor who specializes in the study of Early Modern English, particularly the structural development of the language from the 15th to the 17th century. She has a passion
  for teaching and has written a textbook that is suitable for undergraduate students who are familiar with Shakespeare or studying the structural development of English. Her research has led to a corrective
  shift away from the traditional literature bias among historians of English toward non-canonical and previously unexamined vernacular texts.
