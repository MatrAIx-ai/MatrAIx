  hobbies: '[''Gardening'', ''Quilting'', ''Knitting'', ''Church choir'', ''Book club'', ''Historical fiction reading'', ''Volunteer work at food pantry'', ''Walking on nature trails'', ''Crossword puzzles'',
    ''Classic rock and folk music'']'
  career_goals: Although retired from the formal workforce, Audrey aims to deepen her involvement in community service by leading senior‑center programs, mentoring new volunteers, and completing a GED to
    formalize her education. She aspires to become a certified peer supporter for older adults, organize local health‑screening events, and eventually author a practical guide on senior living based on
    her lifetime of experience.
