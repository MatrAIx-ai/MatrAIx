  hobbies: '["hiking in the high desert","target shooting","cooking traditional Mexican dishes","reading true‑crime literature","watching documentaries on investigations","playing acoustic guitar","woodworking","fishing
    on the Snake River","attending rodeo events"]'
  career_goals: Luis aims to advance within the Malheur County Sheriff's Office, targeting a promotion to sergeant within the next three years and eventually transitioning to a detective role specializing
    in narcotics or rural crimes. He plans to earn an associate degree in criminal justice to strengthen his investigative credentials and to develop a community‑policing liaison program that bridges law
    enforcement and the local Hispanic population. In the longer term, he aspires to mentor new officers and perhaps join a state‑level special operations unit.
