persona_description: A researcher in public health who specializes in the study of influenza and vaccine effectiveness. They have conducted in-depth analyses of flu vaccine effectiveness studies and have
  experience with sentinel flu surveillance. They are concerned about the potential for bias in the selection of patients for testing in the study and are looking for ways to control for this. They are
  also interested in the effectiveness of the pandemic vaccine and want to know if it is as effective as it claims to be.
