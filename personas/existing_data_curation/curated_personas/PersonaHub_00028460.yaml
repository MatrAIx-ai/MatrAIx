persona_description: A scientist or archeologist specializing in the study of ancient cultures, particularly those in the southwestern United States, such as the Anasazi people. This person is interested
  in the procurement and use of resources in the Chaco Canyon region, including the sourcing of ponderosa pine used in Anasazi great house construction. They have a deep understanding of isotopic analysis
  and are familiar with the complex procurement practices of the Anasazi people, which require careful consideration of multiple and distant sources.
