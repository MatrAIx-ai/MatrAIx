personas:
  professional: Monique Dunk is a development strategist who blends a STEM graduate background with a flair for storytelling, using predictive modeling and donor analytics to craft data‑driven fundraising
    campaigns that feel like interactive art installations; they thrive on designing intimate, jazz‑infused donor events that celebrate community narratives, though they often let the creative spark overrule
    strict timelines.
  sports: Monique Dunk is an avid jogger who traverses the Gwinnett County trail network three times a week, often meeting up with a small cohort from the Peachtree Trail Runners club; they root for the
    city’s football, basketball, and baseball teams—cheering on the Falcons, Hawks, and Braves—while preferring low‑key, sunrise runs over crowded gym sessions, and they occasionally dabble in recreational
    pick‑up basketball games during community festivals.
  arts: Monique Dunk is a devoted creator who spends weekends in their apartment studio layering bold swaths of color on canvas inspired by the improvisational cadence of Miles Davis, while they immerse
    themselves in AR/VR exhibitions at the local contemporary art hub; they avidly devour speculative fiction from authors such as Octavia Butler and Nnedi Okorafor, and they often recite original poetry
    at intimate jazz nights featuring Kamasi Washington, blending visual and literary art forms into a personal narrative tapestry.
  travel: Monique Dunk is a curious explorer who prioritizes immersive cultural experiences over luxury resorts, planning trips with a blend of meticulous research and spontaneous detours; they have wandered
    the historic streets of Savannah and New Orleans for their soulful music scenes, visited Ghana to reconnect with extended family and partake in traditional drumming ceremonies, and they dream of attending
    the Reykjavik Arts Festival while also craving a weekend hike in the Blue Ridge Mountains, often booking flights through a flexible travel app that lets them pivot plans at a moment’s notice.
  culinary: Monique Dunk is an experimental home chef who merges soul‑food staples with global spice palettes, whipping up shrimp and grits infused with harissa and collard greens tossed in miso glaze,
    while they also perfect a fragrant jollof rice with smoked turkey; they keep a well‑stocked herb garden on their balcony, harvesting basil, cilantro, and thyme for fresh sauces, and they regularly source
    heirloom tomatoes and fresh okra from the local farmer’s market, often layering flavors with ingredients like suya pepper, ginger, and chia seeds to create dishes that feel like edible art.
  core: Monique Dunk is a data‑driven fundraising visionary who paints abstract canvases, jogs at sunrise, and occasionally forgets to file tax receipts, but always turns curiosity into community‑focused
    impact.
background:
  cultural: Monique is a second‑generation African‑American raised in the vibrant, historically Black neighborhoods of Atlanta. Her family emphasized community bonds, resilience, and pride in Southern Black
    heritage, sharing traditions like soulful cooking, gospel music, and storytelling during family gatherings. She earned her STEM degree at a historically Black university, where she forged lasting connections
    with Black scholars and professional societies. The cultural richness of Atlanta—its music scene, culinary legacy, and activism—shapes her identity, and she actively participates in local civil‑rights
    commemorations and Black cultural festivals. Monique also maintains ties to West African roots through Ghanaian relatives who visit during holidays, introducing her to West African customs, rhythms,
    and oral histories. These layered influences inform her worldview, professional network, and the inclusive, community‑focused approach she brings to her fundraising work.
attributes:
  skills: '[''Fundraising strategy'', ''Donor analytics and segmentation'', ''Grant writing'', ''Major gift solicitation'', ''Corporate partnership development'', ''Event planning and execution'', ''Storytelling
    & narrative development'', ''Digital campaign design'', ''Data visualization'', ''Flexible project management'']'
  hobbies: '[''Abstract painting'', ''Experimental cooking'', ''AR/VR art exploration'', ''Speculative fiction reading'', ''Poetry writing'', ''Urban gardening'', ''Live jazz listening'', ''STEM outreach
    volunteering'', ''Jogging'']'
  career_goals: Monique aims to become a Director of Development at a culturally vibrant nonprofit that merges arts and STEM education, where she can pioneer innovative fundraising models that integrate
    technology, interactive media, and community storytelling. She aspires to lead a team that builds sustainable, major‑gift pipelines for programs that increase access to STEM learning for underrepresented
    youth. Over the next five years, she plans to launch a boutique consultancy that helps small arts and education organizations adopt data‑driven, creativity‑focused fundraising practices. Long‑term,
    she envisions establishing a family‑backed foundation that funds interdisciplinary projects at the intersection of science, art, and social justice, promoting equitable opportunities for Black creators
    and scholars.
