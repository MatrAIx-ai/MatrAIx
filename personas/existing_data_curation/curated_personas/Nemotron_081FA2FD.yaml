  career_goals: Looking ahead, Juliana aims to expand her firm’s portfolio of community‑focused, environmentally responsible projects in the Greater New Jersey area. She plans to become a LEED Accredited
    Professional and lead a dedicated sustainable‑design initiative that integrates passive design strategies with local climate considerations. Mentorship remains a priority; she hopes to formalize a structured
    apprenticeship program to guide the next generation of architects. Ultimately, Juliana envisions transitioning to a consultant role that allows her to shape high‑impact public spaces—such as libraries
    and civic centers—while preserving a flexible schedule for personal pursuits.
