persona_description: A global educator who is passionate about promoting learning and sharing best practices across schools. This person is interested in the IPC (International Primary Curriculum) and its
  resources and tools, as well as the self-review process that allows schools to assess their implementation of the IPC and engage the community in their children's learning. This person is likely to be
  a member of the IPC and has access to the accreditation process, which demonstrates that schools have taken IPC activities and resources and transformed learning in the school. This person is interested
  in improving their own practice and celebrating what they are doing, which is why they use the IPC self-review process to reflect on their own practice, share what they do, and measure it against the
  IPC accreditation criteria.
