persona_description: A scientist or a horticulturist who studies plant diseases and their management. This person is likely to read about frost damage and its effects on seedlings and older plants, as well
  as the potential spread of diseases such as Botrytis blight and foliar phytophthora under warm and humid conditions. They may also be interested in the management of replant disease in ginseng cultivation,
  and the importance of early detection and application of protective products.
