  career_goals: Approaching retirement, Jay aims to transition into a mentorship and advisory role, helping junior staff and small local businesses navigate financial planning. He hopes to launch a community
    financial‑literacy program in Marathon County and explore sustainable investing opportunities that align with his practical outlook. Maintaining flexibility, he wishes to reduce his formal workload
    while still contributing his experience to strategic projects and occasional consulting.
