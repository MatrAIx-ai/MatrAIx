personas:
  professional: Rebeca Alejo, a 28-year-old financial analyst turned strategic planner, leverages advanced Excel, Power BI, and SAP expertise to craft data-driven forecasts while letting their curiosity
    for contemporary art inspire unconventional, creative solutions, even as their relaxed approach to obligations sometimes leads to last-minute deadline scrambles.
  sports: Rebeca Alejo, an enthusiastic weekend hiker and salsa dancer, regularly explores the Everglades' trails with a local hiking club, attends salsa nights at a downtown studio, and is a loyal fan
    of the Miami Heat, Miami Dolphins, and Inter Miami CF, occasionally joining pick-up basketball games at community courts.
  arts: Rebeca Alejo, a devoted follower of contemporary visual culture, frequents Miami’s Wynwood Walls and the Perez Art Museum to see works by artists like Wifredo Lam, Tania Bruguera, and Kehinde Wiley,
    curates a personal Instagram feed of street photography, and finds inspiration in the music of Celia Cruz and Buena Vista Social Club while reading psychology books by Brené Brown.
  travel: Rebeca Alejo, a travel enthusiast who balances budget-conscious planning with spontaneous cultural immersion, has trekked the Everglades, revisited family in Havana, explored the colonial streets
    of Cartagena, and dreams of a road trip along the Pacific Coast of Mexico, all while documenting each journey in a photo-rich blog.
  culinary: Rebeca Alejo, whose culinary adventures span cooking authentic ropa vieja, lechon asado, and plantain-based dishes at home and sampling innovative Cuban-fusion plates like pork belly with mojo
    sauce at Miami’s culinary hotspots, enjoys experimenting with fresh cilantro, lime, and cumin, yet often over-indulges in late-night cafecito and struggles to keep a tidy kitchen.
  core: Rebeca Alejo, a 28-year-old finance specialist with a love for art, salsa, and yoga, balances spreadsheets with spontaneous gallery splurges, battles anxiety through meditation, and occasionally
    lets disorganization turn deadline pressure into creative breakthroughs.
background:
  cultural: Rebeca is a Cuban‑American raised in Miami, deeply rooted in the island’s traditions while navigating a bicultural identity. Bilingual in Spanish and English, she participates in local Cuban
    community events, celebrates cultural festivals, and maintains strong family ties. Her heritage informs her worldview—valuing resilience, communal support, and artistic expression—while also shaping
    her professional insight into the Cuban‑American market. She balances the vibrancy of her culture with the fast‑paced, diverse environment of Miami, often drawing on her background to foster inclusive
    and creative approaches in both her work and personal life.
