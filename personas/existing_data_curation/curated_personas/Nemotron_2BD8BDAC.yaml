  career_goals: Rebeca aims to become a chief financial officer within the next five to seven years, leading finance transformation initiatives that incorporate AI‑driven analytics and sustainable investment
    practices. She hopes to champion innovative, culturally informed financial strategies for Latinx businesses in Miami and to mentor emerging professionals. Long‑term, she envisions launching a boutique
    consultancy that blends financial expertise with creative, community‑focused projects, while maintaining a work environment that supports her mental‑health needs.
