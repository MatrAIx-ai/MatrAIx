    typical American cultural traditions, celebrating holidays like Thanksgiving, Independence Day, and Christmas, and participating in community events such as local parades and youth sports leagues. While
    his ethnic background is white, his environment is culturally diverse, exposing him to a range of perspectives through school and community programs. The suburban Baltimore-Washington corridor influences
    his exposure to technology, education, and civic engagement, shaping his values of reliability, cooperation, and a balanced approach to curiosity and practicality.
