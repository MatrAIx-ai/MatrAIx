personas:
  professional: Charles Alvarez, a 14‑year‑old forward on his middle‑school soccer team and active robotics club member, they channel their curiosity and practicality into designing competition‑ready robots,
    balancing meticulous coding with on‑the‑fly problem solving while thriving in collaborative team settings.
  sports: Charles Alvarez, a forward for Crofton Middle School’s soccer team, they train twice weekly with the team, follow the Washington Spirit and Baltimore Ravens for inspiration, and spend weekends
    playing pick‑up matches at a local park while balancing a love for both competitive play and casual recreation.
  arts: Charles Alvarez, an avid LEGO builder and acoustic‑guitar hobbyist, they draw creative inspiration from artists like Ed Sheeran, Imagine Dragons, and classic Beatles tracks, often strumming while
    assembling intricate LEGO cityscapes and quoting lines from science‑fiction novels such as 'Dune' and 'Ender’s Game' during jam sessions.
  travel: Charles Alvarez, who loves weekend trips, they frequently visit the Smithsonian museums in Washington, D.C., explore the historic waterfront of Baltimore’s Inner Harbor, and dream of a summer
    road‑trip to the Grand Canyon, preferring budget‑friendly travel with friends and family while using travel‑planning apps to maximize free admission days.
  culinary: Charles Alvarez, a budding home‑cook with moderate skill, they enjoy whipping up pepperoni pizza from a frozen base, customizing it with extra mozzarella and jalapeños, crafting chocolate chip
    cookies for after‑school study sessions, and occasionally experimenting with homemade sushi rolls using sushi rice and avocado when friends gather for gaming marathons.
  core: Charles Alvarez, the 14‑year‑old robotics‑savvy soccer forward, they balance a restless curiosity with practical habits, worry about school and gaming performance, yet channel that energy into creative
    builds, teamwork, and occasional late‑night gaming marathons.
background:
