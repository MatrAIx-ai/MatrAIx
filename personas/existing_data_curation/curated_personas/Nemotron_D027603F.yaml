  career_goals: Although retired, Carlese aims to deepen her impact on her community through mentorship and cultural preservation. She aspires to curate a traveling exhibition of senior‑generated artwork
    that celebrates Philadelphia's historic neighborhoods. She also hopes to complete a memoir that weaves together personal narratives, family genealogy, and reflections on the Civil Rights era, contributing
    to the African‑American oral history record. Additionally, she wants to expand her volunteer work at the local public library, leading story‑telling workshops for children and guiding intergenerational
    dialogues about art and history.
