personas:
  professional: A veteran full‑stack software developer with 25 years of experience, Treg Soares channels their curiosity and artistic sensibility into designing modular, cloud‑native architectures, weaving
    generative visualizations into the UI while embracing a relaxed, flexible workflow that often trades strict planning for spontaneous creative problem‑solving, and they thrive when autonomy meets artistic
    expression.
  sports: A solitary fitness enthusiast, Treg Soares spends weekends hiking the Superior National Forest and cross‑country skiing along the Boundary Waters while cheering for the Minnesota Timberwolves
    and Vikings, holds a membership with the North Shore Hiking Club, and they prefer low‑key endurance activities over team sports.
  arts: A devoted aficionado of contemporary art, Treg Soares frequents gallery openings featuring Olafur Eliasson and Yayoi Kusama, curates an ever‑growing collection of vintage vinyl from Aphex Twin and
    Boards of Canada, and spends quiet evenings coding generative visual loops inspired by Rebecca Morris’s abstract sculptures, and they often draw creative parallels between the two worlds.
  travel: A contemplative traveler, Treg Soares enjoys meticulously planning solo canoe trips through the Boundary Waters and spontaneous weekend getaways to Reykjavik’s geothermal baths, while they daydream
    about a spring pilgrimage to Kyoto’s cherry‑blossom gardens, balancing a modest travel budget with a love for both remote wilderness and curated cultural experiences.
  culinary: A reflective home cook, Treg Soares prefers simple, seasonal dishes like pan‑seared walleye with wild‑rice pilaf and huckleberry glaze, experiments with foraged morels in a creamy risotto, savors
    a French‑press coffee, yet they often abandon recipes halfway to tweak flavors based on the experimental music playing.
  core: A curious, solitary technologist who merges code with canvas, Treg Soares embraces flexibility over rigid schedules, collects vintage vinyl, and occasionally lets disorganization derail deadlines,
    yet they constantly seek new ways to fuse art and technology.
background:
  cultural: Treg grew up in a middle‑class family in Minneapolis with Portuguese ancestry on his father's side, which introduced him to traditions like festa celebrations and seafood dishes such as bacalhau.
    The Midwestern culture of Minnesota, known for its emphasis on community, modesty, and a deep connection to the outdoors, shaped his love for quiet solitude and nature. At the same time, the city's
    vibrant arts scene and progressive attitudes reinforced his appreciation for unconventional ideas and creative expression. This blend of Portuguese family customs, Midwestern values, and a tech‑forward
    mindset gives Treg a unique cultural perspective that informs both his professional work and personal pursuits.
