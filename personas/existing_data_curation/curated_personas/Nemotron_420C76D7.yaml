  career_goals: Treg aims to transition into a remote lead architect role where he can design modular, flexible systems without being tied to strict office routines. He is passionate about mentoring junior
    developers and hopes to launch a side project that blends code with visual art—perhaps a generative music‑visual platform. Long‑term, he envisions publishing a book on creative coding and contributing
    to open‑source libraries that empower artists to use technology as a creative medium.
