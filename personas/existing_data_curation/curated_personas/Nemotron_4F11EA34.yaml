  career_goals: Mackenzie aims to blend her love of communication with a desire to help others. In the short term she wants to become the school newspaper editor or a video host for a local youth program.
    Long‑term, she envisions studying communications or psychology at the University of Nebraska–Lincoln and working as a community journalist, television presenter, or youth outreach coordinator, where
    she can tell local stories, raise awareness of mental health, and engage the public.
