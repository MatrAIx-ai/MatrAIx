personas:
  professional: A teen theater enthusiast with a practical eye for immediate staging needs and a budding talent for coordinating school productions, Mackenzie Bush leverages their sociable charisma to direct
    cast rehearsals, despite a tendency toward last-minute organization.
  sports: An energetic participant in after-school dance classes and the school's intramural soccer team, Mackenzie Bush also hikes local trails on weekends, cheering on the Chicago Cubs and Chicago Bulls
    while favoring spontaneous workouts over rigid training schedules.
  arts: A budding performer and DIY creator, Mackenzie Bush immerses themselves in school theater productions and dance rehearsals, curates playlists featuring Ariana Grande, Taylor Swift, and BTS, and
    crafts handmade jewelry inspired by the whimsical aesthetics of Disney's Frozen and the lyrical flair of Lin-Manuel Miranda.
  travel: An adventure-seeking teen who prefers spontaneous weekend road trips to nearby state parks like Yosemite and dreams of a cultural immersion trip to Tokyo for J-pop concerts, Mackenzie Bush balances
    an unstructured travel style with occasional careful budgeting for a future Disney World getaway.
  culinary: A modest home-chef who loves pepperoni pizza, chicken teriyaki bowls, and strawberry-banana smoothie bowls, Mackenzie Bush often experiments with easy DIY snacks like granola bars and avocado
    toast while sharing meals with friends during gaming sessions.
  core: Mackenzie Bush is a talkative, spotlight-loving teen who channels their worries into theater, dance, and DIY projects, while juggling a love for spontaneity with an undercurrent of practical, short-term
    focus.
background:
  cultural: Mackenzie grew up in Lincoln, Nebraska, within a predominantly white, Midwestern community that values friendliness, modesty, and self‑reliance. Her family participates in local traditions such
    as county fairs, high school sports events, and church gatherings, reflecting a Protestant upbringing. The region’s emphasis on community involvement and outdoor recreation has shaped her appreciation
    for volunteer work, spending time in parks, and supporting local causes, while the broader Midwestern ethos of politeness and practicality influences her day‑to‑day outlook.
