personas:
  professional: Ellen Dorrance, a seasoned financial manager with two decades of expertise in budgeting, cash‑flow optimization, and GAAP compliance, leverages her love of structure and competitive edge
    to lead cross‑functional teams through ERP implementations while mentoring junior analysts with clear, data‑driven communication.
  sports: Ellen Dorrance, an avid member of the Sangre de Cristo Trailblazers walking club, tackles the foothills year‑round, follows the Denver Broncos in the fall, supports the Colorado Rockies during
    spring baseball, cheers on the Colorado Avalanche in winter, and balances her competitive streak on the weekly bridge table with a disciplined regimen of weekend hikes and occasional yoga sessions.
  arts: Ellen Dorrance frequently attends live country‑rock shows featuring the Zac Brown Band and Chris Stapleton, curates a rotating selection of contemporary novels from authors like Margaret Atwood
    and Colson Whitehead for her book‑exchange group, and enjoys evening performances at the local community theater starring regional talent such as Sarah Miller.
  travel: Ellen Dorrance prefers meticulously planned weekend getaways that blend adventure with comfort, having explored the Santa Fe art scene, trekked in Yellowstone National Park, savored culinary tours
    in Tuscany, while she dreams of a future extended stay in Kyoto to study traditional Japanese garden design.
  culinary: Ellen Dorrance, an enthusiastic home chef, specializes in rustic dishes such as slow‑braised short ribs with rosemary‑infused root vegetables, homemade sourdough flatbreads, and fire‑roasted
    heirloom tomatoes, skillfully balancing her intermediate cooking skills with a penchant for sourcing locally farm‑raised meats and seasonal produce, often turning her garden harvests into themed dinner
    parties for friends.
  core: Ellen Dorrance blends a competitive, slightly skeptical edge with a love for structured social gatherings, often juggling boardroom spreadsheets by day and rustic dinner parties by night, while
    occasionally over‑committing to volunteer projects and forgetting to reply to a few emails.
background:
  cultural: Ellen grew up in a traditional white, Anglo‑American family in the Mountain West, where self‑reliance and community involvement are core values. Her upbringing in small‑town Colorado instilled
    a respect for hard work, practicality, and the outdoors. She identifies with the region’s blend of frontier independence and close‑knit social networks, often celebrating local holidays with family
    potlucks and supporting town events. Although she has modest formal education, her life experience reflects a strong ethic of accountability and a pragmatic, structured worldview.
