  hobbies: '[''community gardening'', ''hiking'', ''bridge club'', ''cooking and hosting dinner parties'', ''live music concerts'', ''book-exchange group'', ''volunteering for financial-literacy workshops'']'
  career_goals: Ellen aims to advance to a chief financial officer role within the next five years, ideally at a regional manufacturing firm or a publicly listed company in the Rocky Mountain area. She
    plans to earn a Certified Public Accountant (CPA) designation to strengthen her professional credibility and to spearhead a company‑wide financial transformation that integrates predictive analytics.
    Concurrently, she wants to develop a formal financial‑literacy program for local high schools, positioning herself as a community leader while leaving a lasting legacy of financial empowerment.
