  career_goals: Anthony aims to transition from senior developer to a technology leadership role where he can shape product strategy at the intersection of tech and creative media. He envisions leading
    a multidisciplinary engineering team to build innovative platforms for digital art, immersive experiences, or AI‑enhanced creative tools. In the medium term, he seeks to attain a Chief Technology Officer
    position at a boutique startup or launch his own venture that leverages his business acumen and software expertise to democratize access to artistic creation. He is motivated by competitive challenges
    such as hackathons and industry conferences, and he plans to earn advanced certifications in cloud architecture and machine learning to stay ahead of emerging trends.
