persona_description: A museum curator who is interested in virtual reality and virtual cyberspace applications, particularly in the implementation of these techniques in museum practice. This person has
  experience in museum presentation and visualization, and is looking for innovative and engaging ways to present the history and architecture of the Slanec Castle. They are also interested in the varied
  aspects of the Slanec Castle's reconstruction in a virtual museum and are eager to analyze the different levels of virtuality and virtual design used in this project.
