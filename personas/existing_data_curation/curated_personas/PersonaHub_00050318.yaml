persona_description: A teacher who is interested in exploring and promoting 21st century teaching and learning approaches in English-medium schooling. They are committed to understanding the implications
  for teaching practice and student learning and are open to exploring the range of terms used to describe information literacy, critical literacy, multiple literacies, transliteracy. They are also interested
  in the wider collaborations and the need for well-developed, consistently delivered professional development. They are interested in bringing teaching staff on board with technologies and are concerned
  about the roll-out of UltraFastBroadband, which they believe has not been supported or underpinned by the necessary professional development.
