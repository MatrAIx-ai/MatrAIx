  career_goals: Stefan aims to become a certified housekeeping manager by earning an ISSA cleaning certification within the next two years. He plans to complete his GED and enroll in a community‑college
    business administration program, with the long‑term goal of launching a boutique cleaning service that specializes in eco‑friendly practices for art galleries, boutique hotels, and high‑end residential
    clients in the Lorain County area. Additionally, he aspires to own his own home, achieve financial independence, and eventually mentor other young workers entering the service industry.
