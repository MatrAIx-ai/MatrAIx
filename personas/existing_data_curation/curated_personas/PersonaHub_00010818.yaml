persona_description: A university professor or administrator who is passionate about promoting diversity and inclusion in the curriculum and pedagogy, particularly in the fields of science, math, and humanities.
  They are interested in research-based approaches to teaching and learning, and in creating an inclusive and equitable learning environment for all students. They may be involved in initiatives such as
  the Center for Curriculum Transformation, the Pamplin College of Business’s business diversity minor, or the Diversity Teaching Techniques program at Indiana University-Purdue. They may also have expertise
  in areas such as math and science education, curriculum development, and assessment, and may be involved in efforts to increase the representation of historically underrepresented groups in these fields.
