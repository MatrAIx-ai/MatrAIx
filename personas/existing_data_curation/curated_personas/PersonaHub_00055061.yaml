persona_description: A federal Minister of Fisheries and Oceans who is responsible for overseeing the conservation and management of marine resources, particularly focusing on the impact of seal populations
  on East Coast fish stocks. She is committed to conducting research to better understand the diet, distribution, and impact of seals on fish populations, and to work with stakeholders to address concerns
  about the role of seals in the ocean ecosystem. She is also interested in the development of potential new markets for Canadian seal products.
