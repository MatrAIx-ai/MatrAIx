personas:
  professional: Vanessa Ng, an enthusiastic playground organizer who transforms ordinary tag games into structured activities, demonstrates early leadership by coordinating friends, yet they often let the
    schedule slip when excitement builds.
  sports: Vanessa Ng, who thrives on tag, organized obstacle courses, and playground hide-and-seek, joins the local Little Kickers soccer club under coach Sam, cheers for the nearby River City Raptors baseball
    team, and they embrace flexible, fun-focused fitness over rigid training.
  arts: Vanessa Ng, who loves sketching whimsical characters inspired by Dr. Seuss, dancing to upbeat tunes by Taylor Swift and BTS, and singing along to Disney's Frozen soundtrack, and they channel creativity
    through glitter glue crafts and pretend-play theater.
  travel: Vanessa Ng, who enjoys family trips to the local aquarium, weekend hikes in the nearby national park, and dreams of exploring Disneyland, prefers itineraries with plenty of playground stops and
    flexible snack breaks, and they balance excitement with a need for predictability by mapping out restroom locations.
  culinary: Vanessa Ng, who delights in helping make mini cheese pizzas, mixing fruit kebabs with grapes and banana slices, and stirring batter for chocolate chip cookies, favors bright sweet flavors like
    strawberry jam and honey, and they often forget to wash hands before cooking, prompting parental reminders.
  core: Vanessa Ng is a bubbly, sociable seven-year-old who channels boundless energy into playful leadership, embraces spontaneous fun while they occasionally misplace crayons and forget chores.
background:
  cultural: Vanessa grew up in a close-knit African-American family in Natchez, Mississippi, where church gatherings, gospel music, community festivals like Juneteenth, and family stories about local history
    shape her sense of identity; she enjoys Southern Black culinary traditions such as fried catfish, cornbread, and sweet tea, and values the storytelling traditions passed down by her grandparents.
