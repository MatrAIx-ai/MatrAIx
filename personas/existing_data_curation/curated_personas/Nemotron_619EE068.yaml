  hobbies: '[''visiting local art galleries'', ''attending community theater productions'', ''participating in church choir'', ''gardening'', ''cooking traditional Southern dishes'', ''bingo nights with
    friends'', ''spontaneous road trips along the Atlantic coast'', ''reading African American history books'', ''crafting (beadwork, quilting)'', ''listening to jazz and blues music'']'
  career_goals: Brittny aims to formalize her expertise by obtaining a certified forklift operator license and a OSHA safety trainer certification within the next year. She hopes to step into a supervisory
    or shift‑lead role, where she can mentor younger workers and promote a culture of safety and teamwork. Beyond the warehouse, she envisions launching a community art initiative that pairs her love of
    creative expression with her logistical know‑how—organizing pop‑up exhibitions in local storage spaces and coordinating art‑related events for senior residents in Hampton. Ultimately, she wants to leave
    a legacy of both operational excellence and enriched community life, blending her practical skills with her passion for art and social connection.
