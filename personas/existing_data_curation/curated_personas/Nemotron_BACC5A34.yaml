  hobbies: '[''Folklórico dancing'', ''Cooking Mexican dishes'', ''Playing soccer in a local league'', ''Volunteering at community garden and food pantry'', ''Social media content creation (food and dance)'',
    ''Watching telenovelas'', ''Reading romance novels'']'
  career_goals: She plans to enroll in a community college to earn an associate degree in social work or public health, with the goal of becoming a bilingual community health worker who can provide outreach
    and support to farmworker families. In the short term, she hopes to gain certification as a personal support worker or early childhood education aide, allowing her to work part-time while continuing
    her studies. Long-term, Nancy envisions leading a community wellness program that combines structured health education with culturally relevant activities, helping to reduce stress and improve mental
    well-being among her neighbors.
