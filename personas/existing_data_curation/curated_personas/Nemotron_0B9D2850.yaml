  hobbies: '[''Watercolor painting'', ''Abstract drawing'', ''Poetry writing'', ''Reading magical realism'', ''Birdwatching'', ''Nature walks'', ''Knitting'', ''Crochet'', ''Book‑club participation'', ''Folk‑music
    listening'', ''Meditative journaling'']'
  career_goals: Beverly aims to self‑publish a collection of poetry and short stories that capture the emotional textures of aging and small‑town life. She plans to curate a community art exhibit in Bluffton
    that showcases works by senior artists, providing a platform for shared expression. Additionally, she wants to launch a weekly intergenerational creative‑writing circle at the public library, mentoring
    younger writers while fostering dialogue across age groups. As a volunteer lay art therapist, she hopes to integrate her painting and gardening projects into therapeutic sessions for residents of the
    senior center, using nature and art to support emotional wellbeing.
