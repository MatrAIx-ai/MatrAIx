personas:
  professional: Beverly Potter, a retired community lay counselor turned self-taught watercolorist, blends their empathic listening skills with an improvisational art practice, using garden sketches as
    springboards for abstract paintings that serve as visual therapy for senior-center residents and fuel the intergenerational writing circle they are launching.
  sports: Beverly Potter enjoys leisurely walks along the Indiana countryside, participates in the Bluffton senior bowling league each winter, attends weekly gentle yoga classes at the town YMCA, and cheerfully
    roots for the Indianapolis Colts, often gathering with neighbors at the local bar to watch games while sharing home-cooked cornbread.
  arts: Beverly Potter draws inspiration from Winslow Homer's seascapes, the lyrical verses of Ocean Vuong, and the folk melodies of Joan Baez, spends afternoons at the Bluffton Folk Art Collective crafting
    abstract watercolors, knitting chunky scarves to the rhythm of The Milk Carton Kids, and curates a monthly showcase of senior artists that blends rustic quilts with speculative short stories.
  travel: Beverly Potter favors spontaneous day trips to nearby county fairs in Madison County, artistic retreats in Asheville's Blue Ridge Mountains, and occasional road-trip pilgrimages to the tulip fields
    of Holland, yet budget constraints keep most journeys modest, so they often route their adventures in a vintage station wagon with their sister, planning each outing around the senior center's calendar.
  culinary: Beverly Potter delights in garden-fresh tomato basil soup, homemade cornbread, apple crisp with oat topping, and a pinch of rosemary in their roasted potatoes, frequently baking rustic soda
    bread for church potlucks, though they have a habit of over-seasoning their dishes, which sometimes leads to mild indigestion after dinner.
  core: Beverly Potter is a whimsical senior artist who cultivates garden serenity into vibrant watercolor chaos, they quietly nurture their community through empathetic counseling, yet they wrestle with
    anxiety-driven forgetfulness and an occasional splurge on art supplies.
background:
  cultural: Beverly grew up on a farm near Lafayette, Indiana, in a family with German‑Irish roots and a Methodist upbringing. The Midwest’s modesty, neighborliness, and strong sense of community shaped
    her values, while local traditions such as county fairs, church potlucks, and folk‑craft gatherings nurtured her love for quilting, knitting, and communal storytelling. Although she lives in the quiet
    town of Bluffton, her imagination draws her toward wider artistic currents, blending the simple rhythms of rural life with a curiosity for novel, abstract concepts. This cultural mix informs both her
    compassionate engagement with neighbors and her pursuit of creative novelty.
