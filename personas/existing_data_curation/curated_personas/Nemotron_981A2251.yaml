personas:
  professional: Collin Saleem, a 4‑year‑old pretend retailer, runs a homemade toy shop where they meticulously arrange inventory, greet visiting friends with enthusiastic chatter, and treat each sale as
    a friendly competition, reflecting their love of routine, organization, and being the center of attention.
  sports: Collin Saleem, a 4‑year‑old mini‑soccer enthusiast, dribbles a tiny shin‑guarded ball for the ‘Little Lions’ preschool team, cheers loudly for the Chicago Cubs during family TV nights, and treats
    each practice as a competitive sprint to be the fastest runner in the lineup.
  arts: Collin Saleem, a 4‑year‑old budding performer, sings along to The Wiggles' 'Fruit Salad', imitates Sesame Street's Elmo during playtime, and draws vibrant pictures of Moana's island scenes, channeling
    their talkative nature into a love for bright, familiar tunes and colorful storytelling.
  travel: Collin Saleem, a 4‑year‑old adventure‑curious kid, has visited the local aquarium on weekends, loves the routine of staying at Grandma’s countryside cottage, and dreams of a future trip to Disneyland
    where they can meet Mickey Mouse and ride the carousel, all while preferring short, well‑planned journeys over long, unpredictable flights.
  culinary: Collin Saleem, a 4‑year‑old picky yet adventurous eater, adores creamy mac and cheese topped with broccoli florets, insists on spreading thick peanut butter on whole‑grain bread, and proudly
    helps stir tomato sauce with basil for a mini‑pizza, showing a blend of routine comfort foods and occasional culinary experimentation.
  core: Collin Saleem is a routine‑loving, talkative 4‑year‑old who turns everyday play into organized competitions, thrives on social applause, and balances a practical streak with fearless curiosity about
    the world.
background:
  cultural: Collin is a Black child growing up in the vibrant, multilingual city of San Antonio, Texas. His family blends African-American traditions—such as Sunday church gatherings, gospel music, and
    celebrations of Juneteenth—with the rich Hispanic culture that surrounds them, including exposure to Spanish language in school, Mexican cuisine, and community festivals like Fiesta San Antonio. The
    family's emphasis on close-knit relationships, regular family meals, and neighborhood solidarity influences Collin's sociable personality and his comfort with routine. He often hears stories of his
    ancestors' resilience and values the practical, community-focused mindset that his parents emphasize, shaping his early worldview.
attributes:
  skills: '[''basic counting (1-10)'', ''alphabet letter recognition'', ''color identification'', ''simple storytelling'', ''hand-eye coordination'', ''following routines'', ''social communication'', ''basic
