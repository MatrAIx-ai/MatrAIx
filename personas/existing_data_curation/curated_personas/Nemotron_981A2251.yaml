  hobbies: '[''building block play'', ''coloring and drawing'', ''pretend play (firefighter, doctor)'', ''simple puzzles'', ''sing-along sessions'', ''toddler soccer'', ''storytime at library'', ''dancing
    to music'', ''watching favorite cartoon'']'
  career_goals: Collin loves stories about helpers in his community and often says he wants to be a firefighter because he admires the bright trucks, the routine of drills, and the chance to protect others.
    He also mentions wanting to grow up to be a teacher, appreciating the structured schedule of school days and the opportunity to share knowledge. When asked about favorite activities, he talks about
    playing on a soccer team and hopes to become a professional soccer player one day. These aspirations reflect his desire for practical, service-oriented roles that involve clear routines and the chance
    to be at the center of attention.
