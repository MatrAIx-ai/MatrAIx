personas:
  professional: Judith Tran, a seasoned elementary and middle‑school STEM educator with a graduate foundation in science and mathematics, leverages her curiosity and artistic flair to design inquiry‑based
    STEAM curricula, integrates technology like Scratch and interactive whiteboards, and uses her balance of organization and flexibility to mentor teachers and lead professional‑development workshops,
    all while assertively advocating for district‑wide curriculum coordination.
  sports: Judith Tran, an avid hiker of Kankakee River State Park trails and a dedicated supporter of the Chicago Cubs, Chicago Bears, and Chicago Bulls, participates in a local adult softball league and
    occasional yoga‑focused wellness classes, balancing competitive spirit with a love for nature.
  arts: Judith Tran, a frequent visitor to the Art Institute of Chicago and neighborhood galleries where she sketches Monet’s water lilies and contemporary works by Kerry James Marshall, plays piano pieces
    by Debussy in community theater rehearsals, and reads art‑history volumes on Renaissance masters, weaving visual and performing arts into her teaching and personal life.
  travel: Judith Tran, who plans trips with a blend of educational purpose and leisure, has visited the Smithsonian museums in Washington, D.C., the historic streets of New Orleans for its culinary scene,
    and dreams of exploring Kyoto’s temples and culinary markets, while often taking weekend drives to Milwaukee’s lakefront and Indiana’s state parks, balancing family time with personal curiosity.
  culinary: Judith Tran, a moderately skilled home chef, loves to fuse Midwestern comfort staples like chicken pot pie and deep‑dish pizza with global flavors such as miso glaze, kimchi, and harissa, often
    using garden‑fresh kale, heirloom tomatoes, and rosemary in dishes like kimchi‑infused cornbread or miso‑marinated roasted carrots, while seeking out farm‑to‑table restaurants for inspiration and occasionally
    splurging on artisanal cheese boards.
  core: Judith Tran, a curiosity‑driven educator who balances meticulous planning with spontaneous artistic bursts, fuels her life with garden‑grown veggies, museum‑inspired lessons, and occasional caffeine‑powered
    late‑night grading marathons.
background:
  cultural: Judith grew up in the suburban Midwest, where values of hard work, community involvement, and education are deeply ingrained. As a white American raised in the Chicago area, she was exposed
    to a mix of Midwestern cultural traditions—county fairs, local sports, and seasonal celebrations—while also benefiting from the region's rich cultural diversity, including frequent trips to museums
    and multicultural festivals. Her marriage to a partner with Vietnamese heritage introduced her to Vietnamese customs, cuisine, and perspectives, broadening her cultural outlook and reinforcing her appreciation
    for multicultural experiences. This blend of Midwestern pragmatism and cross‑cultural curiosity informs her teaching philosophy, her love for integrating art with science, and her commitment to fostering
    inclusive learning environments.
