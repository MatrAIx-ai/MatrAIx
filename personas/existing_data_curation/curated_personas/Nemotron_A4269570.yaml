    in a book club'']'
  career_goals: Judith aims to become a STEM curriculum coordinator for her district, shaping district‑wide instructional strategies and fostering cross‑grade collaborations. She plans to pursue a master's
    degree in Educational Leadership within the next two years, with the long‑term goal of moving into school administration as an assistant principal or director of curriculum and instruction. She also
    hopes to launch a district‑wide STEAM fellowship that partners with local museums and tech firms, and to author a children’s science book that blends scientific concepts with artistic storytelling.
    In parallel, she seeks to secure grant funding to expand after‑school robotics and art‑tech clubs for underserved students.
