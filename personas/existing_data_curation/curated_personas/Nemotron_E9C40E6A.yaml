  hobbies: '[''Model train building'', ''Puzzle solving (crosswords, Sudoku)'', ''Gardening'', ''Fishing'', ''Meditation'', ''Journaling'', ''Traditional Japanese cooking'', ''Watching historical documentaries'']'
  career_goals: Chang Ja seeks a low‑stress, part‑time role in facilities maintenance or a consulting capacity where his reliable, detail‑oriented nature can be valued. He aims to launch a modest home‑based
    woodworking side business to generate supplemental income and gain recognition for his craftsmanship. He also wishes to volunteer as a cultural liaison for local Japanese community events, preserving
    his heritage while establishing a stable routine that helps mitigate his anxiety and emotional reactivity.
