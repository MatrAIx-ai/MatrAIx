personas:
  professional: Susannah Jefferson leverages their strong organizational skills, conflict‑resolution talent, and digital‑literacy teaching experience to coordinate community outreach programs, and their
    blend of curiosity and practicality ensures every project balances innovative ideas with proven methods.
  sports: Susannah Jefferson enjoys regular mindfulness walks in Forest Park, joins a neighborhood senior‑fitness class for gentle yoga, and passionately follows the St. Louis Cardinals in baseball and
    the St. Louis Blues in hockey, often attending games with fellow volunteers to combine social interaction with light exercise.
  arts: Susannah Jefferson immerses themselves in literary classics such as Toni Morrison’s “Beloved” and James Baldwin’s “The Fire Next Time,” sings in the church gospel choir echoing Mahalia Jackson’s
    soulful style, and crafts quilts inspired by the patterns of local artist Liza Lou, all of which shape their creative identity.
  travel: Susannah Jefferson plans budget‑friendly road trips to historic Southern cities such as New Orleans and Memphis, has visited Washington, D.C.’s National Museum of American History, and dreams
    of a heritage pilgrimage to Ghana’s Cape Coast Castle, balancing careful itinerary research with a love for spontaneous stops at local cafés.
  culinary: Susannah Jefferson cultivates a garden of thyme, sage, and rosemary to season traditional soul‑food staples like smoked turkey collard greens, sweet potato casserole, and spicy gumbo, and they
    confidently experiment with herb‑infused sauces for potluck gatherings, considering themselves a competent home chef with a flair for creative twists.
  core: Susannah Jefferson blends a nurturing, community‑oriented spirit with a restless curiosity, balancing meticulous planning with occasional overcommitment, a habit of late‑night genealogy research
    that fuels their sense of identity, and a tendency to worry over every detail while finding solace in soulful music and garden herbs.
background:
  cultural: Susannah identifies as African‑American and was raised in St. Louis, a city shaped by the Great Migration and a vibrant Black cultural heritage. Her family’s origins trace back to the rural
    South, and she grew up immersed in traditions of gospel music, soul food, and church community life. This cultural backdrop has fostered a strong sense of communal responsibility, resilience, and pride.
    She draws inspiration from the rich history of Black activism in St. Louis—from the legacy of the 1917 race riot to contemporary movements for social justice—to inform her volunteer work and advocacy.
    Her culinary preferences, musical tastes, and emphasis on mentorship reflect the depth of her cultural identity.
attributes:
  skills: '["Community outreach coordination", "Conflict resolution and mediation", "Event planning and logistics", "Microsoft Office and Google Workspace proficiency", "Budgeting and personal finance management",
