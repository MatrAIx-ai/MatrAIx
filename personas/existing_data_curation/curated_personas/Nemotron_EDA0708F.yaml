  hobbies: '["Community garden volunteering", "Soul‑food cooking and recipe development", "Reading African‑American literature and history", "Attending gospel services and choir rehearsals", "Food‑bank
    volunteering", "Mindfulness walks in Forest Park", "Quilting and knitting for charity", "Family genealogy research"]'
  career_goals: Susannah aims to re‑enter the workforce within the next year by completing her associate’s degree in social work at a local community college. Her primary ambition is to become a community
    outreach coordinator for a nonprofit focused on youth empowerment and digital inclusion in St. Louis. She also hopes to launch a part‑time home‑based catering service that showcases traditional soul‑food
    recipes, providing supplemental income and a creative outlet. Over the longer term, she envisions mentoring at‑risk teenagers, leveraging her conflict‑resolution skills and caregiving experience to
    support their personal growth while achieving greater financial stability.
