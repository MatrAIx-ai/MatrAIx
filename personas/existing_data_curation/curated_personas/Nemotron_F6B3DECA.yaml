  hobbies: '[''collecting rocks and shells'', ''building LEGO creations'', ''drawing comic characters'', ''racing remote‑control cars'', ''exploring the local park and lake'', ''listening to space‑themed
    podcasts for kids'']'
  career_goals: John dreams of becoming an astronaut because he loves learning about space, but he also wants to be a firefighter or a builder to help people in practical ways. He aims to master reading
    by second grade, ride his bike without training wheels, and someday design simple inventions that solve everyday problems he notices around the house and playground.
