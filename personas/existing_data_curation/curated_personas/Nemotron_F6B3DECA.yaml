personas:
  professional: John Burdeshaw, a pint-sized explorer who spends his preschool days turning building blocks into makeshift contraptions and asking why in every play session, blends his innate curiosity
    with a practical eye for what holds together, even though he resists tidy clean‑up and prefers spontaneous tinkering over structured lessons.
  sports: John Burdeshaw channels competitive energy into T‑ball practice at the local community field, cheering for the Chicago Cubs on weekends, and, after school, races the neighborhood kids on their
    bikes, never missing a chance to prove they can swing the bat farther than anyone else.
  arts: John Burdeshaw, a budding fan of animated adventures, spends evenings humming the tunes of Paw Patrol and Bluey, drawing vibrant dinosaurs on sketchbook paper, and proudly reciting lines from the
    classic film Toy Story starring Tom Hanks and Tim Allen.
  travel: John Burdeshaw loves family road trips to the seaside, especially the boardwalk in Virginia Beach, and is eager to ride the monorail at Disneyland, preferring spontaneous pit‑stops for ice‑cream
    over rigid itineraries, though they often request a night in the hotel because of their need for a familiar bedtime routine.
  culinary: John Burdeshaw, a picky eater with a penchant for chicken nuggets, cheese‑filled pizza slices, and apple wedges, can spend hours perfecting the art of dipping fries in ketchup while occasionally
    sneaking a bite of the secret‑spiced mac and cheese his mom makes on weekends.
  core: John Burdeshaw is a curious, competitive five‑year‑old who turns every block and coin into a mini‑experiment, embraces spontaneous play, keeps a tiny savings stash, and tackles allergies with a
    calm, self‑directed approach while dreaming of bigger adventures.
background:
  cultural: John grows up in Excelsior, Minnesota, a small Midwestern community in Carver County. His family reflects typical white, middle‑class values of the region, emphasizing politeness, independence,
    and a love of the outdoors. Seasonal activities like fishing on local lakes, biking on country trails, and celebrating American holidays such as Fourth of July and Thanksgiving shape his upbringing.
    Local preschool and community events foster a sense of neighborhood connection, while the area's Scandinavian and German heritage subtly influences cultural references at home.
