persona_description: A project manager for the Trading Consequences project, who is responsible for ensuring that the project's objectives are met and that the project's data is accurate and up-to-date.
  The persona is skilled in using the Edinburgh Geoparser to extract geographic information from text data and is also knowledgeable about the challenges of identifying and annotating place names in historical
  documents. The persona is interested in publishing the database of place names and region names missing from standard gazetteers in the near future and is looking for ways to improve the project's accuracy
  and completeness.
