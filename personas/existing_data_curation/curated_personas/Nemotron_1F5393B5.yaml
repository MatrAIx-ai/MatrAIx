  hobbies: '[''Cooking (Southern cuisine)'', ''Gardening'', ''Fishing'', ''Woodworking'', ''Reading (historical nonfiction, self-improvement)'', ''Volunteering at food bank'', ''Trivia nights'', ''Attending
    local music festivals'']'
  career_goals: Tyler aspires to move beyond his current role as a server to a leadership position within the hospitality field. Over the next few years, he plans to complete a certification in restaurant
    management and serve as a shift supervisor, eventually becoming a general manager of a family-owned restaurant. His long-term ambition is to open a modest farm-to-table bistro in Taylorsville that highlights
    locally sourced ingredients and offers a welcoming environment that reflects his values of harmony and community. He also hopes to mentor younger staff, sharing his practical knowledge while encouraging
    innovative ideas.
