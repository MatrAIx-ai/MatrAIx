persona_description: A data scientist who specializes in the analysis and processing of large-scale data sets. They are familiar with the open-source framework Apache Hadoop, which allows for the storage
  and processing of huge data sets on clusters of commodity hardware. They are skilled in using the MapReduce design to divide and run sub tasks in parallel over multiple cluster nodes, and are comfortable
  with the fully distributed mode of operation. They are also proficient in debugging and setting up Hadoop in different modes such as Standalone, Pseudo-distributed, and Fully-distributed. They have a
  deep understanding of the quality of the framework, which continues to evolve and improve over time, and are committed to using Hadoop for the analysis and processing of large data sets.
