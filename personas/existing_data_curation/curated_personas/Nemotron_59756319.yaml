  hobbies: '[''Church choir and volunteer emcee work'', ''Card games (bridge, canasta) at senior center'', ''Fishing and hunting trips'', ''Gardening (vegetable garden and flower border)'', ''Cooking traditional
    Midwestern meals and hosting potlucks'', ''Watching classic western movies'', ''Reading local history and oral storytelling'', ''Visiting grandchildren and family reunions'']'
  career_goals: Although Dennis is no longer part of the formal workforce, he remains driven by a desire to stay purposeful and engaged. He aims to formalize his role as a volunteer coordinator for the
    Hanska seniors' center, designing structured yet flexible programs that blend regular activity schedules with spontaneous social gatherings. He hopes to compile and publish a small booklet of his recollections
    of life on a Watonwan County farm, preserving local oral history for younger residents. Mentoring younger volunteers—especially his grandchildren—on practical skills such as woodworking, gardening,
    and responsible health habits is another ambition. Dennis also wishes to establish a community garden plot that can be transferred to a local school, ensuring his gardening knowledge benefits future
    generations. Maintaining his health through a gentle daily routine—morning walks, light stretching, and regular medical check‑ups—is a personal goal that also eases his tendency toward worry. Ultimately,
    he strives to balance his need for predictable structure with the flexibility to enjoy spontaneous moments with family and friends.
