personas:
  professional: Jerome Scelp, a 19‑year‑old aspiring mechanical engineer who leverages systematic organization, Python scripting, and advanced Excel tracking to streamline campus group projects while mediating
    team discussions with a cooperative, detail‑oriented approach.
  sports: Jerome Scelp, a devoted Detroit Lions and Detroit Pistons fan who plays forward for the Madison Heights Youth Soccer Club and participates in a weekly intramural basketball league at the local
    community recreation center, using these activities to channel competitive energy and maintain disciplined fitness routines.
  arts: Jerome Scelp, whose evenings often include listening to Bright Eyes, studying Edward Hopper’s chiaroscuro paintings, and binge‑watching the nostalgic series Stranger Things, finds that these artistic
    touches inspire both his planner customizations and his engineering design concepts.
  travel: Jerome Scelp, a meticulous planner who has explored Chicago’s lakefront, trekked the dunes of Sleeping Bear, and dreams of backpacking through the historic towns of the Czech Republic, always
    adhering to a student‑budget that favors off‑season travel, hostel stays, and detailed itinerary spreadsheets.
  culinary: Jerome Scelp, an intermediate home‑cook who favors hearty Midwestern comfort foods such as chicken pot pie with a flaky crust, cheddar‑stuffed potatoes, and dill‑garnished salmon, often experiments
    with precise measurements in his recipes, yet sometimes forgets to finish meals due to late‑night study sessions.
  core: Jerome Scelp, a 19‑year‑old planner‑obsessed optimist who combats chronic worry with meticulous schedules, model‑building hobbies, and occasional late‑night snack binges, embodies a blend of Midwestern
    diligence and curiosity‑driven ambition.
background:
  cultural: Jerome grew up in Madison Heights, a suburban community in Oakland County, Michigan, surrounded by a predominantly white, middle‑class population with roots in Northern European (German and
    Polish) heritage. His family emphasizes hard work, education, and community involvement, typical of Midwestern values. He attended the local public high school, where he participated in extracurricular
    clubs and community service projects, fostering a balance of independent initiative and cooperative engagement. While his upbringing reflects traditional Midwestern modesty and practicality, exposure
    to the area's growing cultural diversity has shaped an inclusive outlook and an appreciation for varied perspectives.
attributes:
  skills: '["Organizational planning and time management", "Research and analytical reporting", "Basic programming (Python)", "Advanced Microsoft Office (Excel, PowerPoint)", "Interpersonal mediation and
    group facilitation", "Practical problem solving", "Academic writing and communication"]'
  hobbies: '["Reading (science and self‑improvement)", "Chess", "Journaling and planner customization", "Model building (e.g., model airplanes)", "Volunteering at community center", "Productivity podcasts",
    "Mindfulness meditation"]'
  career_goals: Jerome aims to earn a bachelor's degree in Mechanical Engineering or Computer Science at a state university, leveraging his analytical mindset and hands‑on curiosity. He plans to pursue
    certifications such as PMP to become a project manager who leads well‑structured teams on technology‑driven, community‑focused projects. Balancing his desire for achievement with his sensitivity to
    stress, he seeks a supportive work environment that values mentorship and clear expectations. Long‑term, he envisions a role where he can integrate his technical expertise with his caring nature—perhaps
    developing sustainable engineering solutions or health‑tech platforms that improve quality of life in his Midwestern community.
