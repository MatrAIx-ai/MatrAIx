persona_description: A neuroscientist who specializes in the study of the cerebellum, particularly its role in motor learning and its relation to reading disorders such as dyslexia. The scientist has conducted
  research on the serial reaction time performance of dyslexic adults and has found evidence of an implicit motor learning deficit in some dyslexics. This deficit is thought to contribute to their difficulties
  in reading and other non-motor learning tasks. The scientist's research interests include the development of interventions to improve reading skills in dyslexic adults.
