personas:
  professional: Florentina Inguanzo is an aspiring civil engineer who mixes bilingual communication, rigorous fact‑checking, and budding web design skills to spearhead high‑school sustainability initiatives,
    channeling her competitive drive and organized mindset into practical, community‑focused solutions.
  sports: Florentina Inguanzo captains the Mission High School varsity soccer midfield, trains with the local Trail Hikers Club for weekend hikes, and follows the Houston Dynamo, Dallas Cowboys, and Dallas
    Mavericks, channeling her competitive edge into both team play and personal endurance.
  arts: Florentina Inguanzo immerses herself in science‑fiction works by N.K. Jemisin and Octavia Butler, debates contemporary Latin American literature like Gabriel García Márquez, practices folklorico
    dance, and curates playlists featuring Lila Downs and Juanes, letting these artistic influences shape her creative projects and social media storytelling.
  travel: Florentina Inguanzo plans trips with meticulous itineraries, having trekked through Big Bend National Park and explored the San Antonio River Walk, and now dreams of visiting Mexico City’s historic
    center and Barcelona’s Gothic Quarter while balancing her wanderlust with a limited college‑preparation budget.
  culinary: Florentina Inguanzo blends traditional tamales and carnitas with modern twists like chipotle‑infused avocado toast, skillfully using corn masa, cilantro, and epazote while filming short cooking
    videos that showcase her experimental flair in the kitchen.
  core: Florentina Inguanzo navigates the world with a competitive, skeptical mind tempered by deep community roots, juggling soccer leadership, experimental cooking, and bilingual research while occasionally
    over‑scheduling her diary and forgetting to floss.
background:
  cultural: Florentina grew up in Mission, Texas, a bilingual border town where Mexican heritage and Texan culture intersect daily. Her family maintains traditions such as Día de los Muertos altars, Sunday
    family meals featuring homemade tamales, and active participation in a local Catholic parish. She speaks Spanish at home and English at school, navigating a bicultural identity that values familismo
    and respeto alongside the American emphasis on individual achievement. This blend influences her worldview, shaping a strong sense of community responsibility while nurturing personal ambition.
