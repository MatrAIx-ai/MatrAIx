  hobbies: '[''Reading science‑fiction and contemporary Mexican literature'', ''Soccer (midfielder for school team)'', ''Folklorico dance practice'', ''Cooking and experimenting with regional recipes'',
    ''Nature photography on local trails'', ''Video blogging (vlog) about DIY projects'', ''Journaling for self‑reflection'']'
  career_goals: Florentina aims to enroll in a university program that blends her curiosity for technology with her desire for practical impact—particularly civil engineering or computer science with a
    focus on sustainable infrastructure for border communities. She dreams of designing affordable water‑management systems and creating user‑friendly digital tools that address local health and environmental
    challenges. Her competitive drive pushes her to excel academically, earn scholarships, and eventually secure a stable career that supports her family while giving her the means to give back to her community.
