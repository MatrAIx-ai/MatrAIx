persona_description: A paleoanthropologist and archaeologist who specializes in the study of human evolution, particularly the migration patterns of early humans from Africa. She has expertise in using
  imaging and 3-D virtual reconstruction to bring ancient human skulls to life and has conducted research in Europe, particularly in Greece, to identify the oldest evidence of human migration out of Africa.
  Her findings have implications for the commonly accepted timeline of modern humans' dispersal from Africa and their movements into Europe.
