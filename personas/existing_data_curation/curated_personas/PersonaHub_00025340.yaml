persona_description: A wildlife biologist who specializes in the study of woodcock populations, specifically their courtship rituals and migration patterns. They are responsible for conducting surveys to
  monitor the population over time and preparing annual reports for the U.S. Fish and Wildlife Service. They are knowledgeable about the decline in woodcock populations due to the loss of their preferred
  early stage forest habitat and the need to balance hunting seasons with the long-term health of the population. They are skilled at analyzing data and preparing management plans to protect and restore
  woodcock habitats.
