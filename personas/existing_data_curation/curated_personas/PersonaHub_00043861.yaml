persona_description: A passionate and creative educator who is interested in using technology to enhance the learning experience for students. They are interested in engaging students with creative projects
  and have a background in teaching younger children. They have experience using technology in the classroom and are familiar with various devices such as iPads, smartphones, and Chromebooks. They are interested
  in using technology to create a culture of passionate learning in the classroom and are willing to try new and innovative methods to engage students. They are interested in using technology to create
  interactive and engaging multimedia projects such as eBooks, green screen videos, and old-time radio shows. They are interested in using technology to enhance communication and collaboration among students
  and teachers. They are interested in using technology to create multimedia projects that allow students to express themselves and learn by visually mapping their knowledge on a two-dimensional photo.
