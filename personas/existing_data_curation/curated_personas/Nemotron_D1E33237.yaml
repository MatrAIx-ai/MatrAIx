  hobbies: '[''Watercolor painting'', ''Gardening (vegetables and herbs)'', ''Knitting and crochet'', ''Listening to Mexican folk music (mariachi, ranchera)'', ''Reading historical fiction'', ''Cooking
    traditional Mexican dishes'', ''Storytelling with grandchildren'', ''Birdwatching during nature walks'', ''Attending small church gatherings'', ''Exploring online art tutorials'', ''Gentle yoga and
    stretching exercises'']'
  career_goals: Maira’s ambitions focus on preserving her cultural legacy while nurturing her wellbeing. She aims to complete a handwritten family cookbook that blends recipes with personal anecdotes, and
    to teach these culinary traditions to her grandchildren through hands‑on sessions. She plans to finish a series of watercolor paintings that capture the Texas Hill Country and arrange a modest exhibition
    at the Jones County community hall. Recognizing the historical value of her parents’ migration story, she intends to record oral histories on a digital device and donate them to a local Mexican‑American
    heritage archive. To maintain her independence, she will keep gardening, take short daily walks, and practice gentle breathing exercises to alleviate anxiety. Finally, she aspires to remain a steady
    emotional anchor for her adult children, balancing compassion with her need for personal space and self‑care.
