  career_goals: Marilyn aims to advance to a senior operations leadership position—such as Director of Administrative Services or Chief Operations Officer—within the next five to seven years. She plans
    to earn a PMP certification and pursue an MBA to deepen her strategic acumen. Her ambition includes spearheading digital transformation initiatives that streamline administrative processes and generate
    cost savings. Additionally, she is committed to mentoring emerging female leaders in the public sector and shaping a more inclusive workplace culture.
