  career_goals: Although retired from formal employment, Joseph aims to stay actively engaged by volunteering as a mentor for local high‑school STEM clubs, serving on the board of the Unicoi County Community
    Center, and leading heritage‑preservation projects that document oral histories of longtime residents. He seeks to maintain a steady rhythm of service that aligns with his love of routine, while fostering
    harmony and cooperation within his community.
