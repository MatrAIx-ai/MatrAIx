    research'', ''Travel to historic sites'', ''Community volunteer work'']'
  career_goals: Although retired from formal employment, Timothy’s ambition is to shape the cultural life of his neighborhood. He aims to chair the board of the Rosedale Community Arts Council, launch a
    scholarship for local high‑school students interested in visual arts, and publish a memoir that intertwines his personal story with the civil‑rights era in Baltimore. He also aspires to complete a series
    of online courses in art history and cultural preservation, and to mentor at least three young adults through a formal apprenticeship program.
