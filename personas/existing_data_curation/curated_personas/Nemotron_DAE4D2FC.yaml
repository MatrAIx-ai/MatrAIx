personas:
  professional: Timothy Carter, a retired logistics coordinator turned community arts champion, leverages their supply‑chain precision and disciplined project‑management style to organize senior‑center
    events, coach youth apprenticeships, and steer the Rosedale Community Arts Council toward impactful cultural programming.
  sports: Timothy Carter enjoys daily walks with their dog, plays pickleball at the senior center three times a week, and passionately cheers for the Baltimore Orioles and Ravens while occasionally joining
    a local walking club that explores historic neighborhoods.
  arts: Timothy Carter's artistic life revolves around attending gallery openings featuring contemporary artists who explore cultural heritage, listening to Miles Davis and Aretha Franklin in their living
    room, capturing vintage street scenes with their digital camera, and crafting furniture pieces inspired by mid‑century modern design.
  travel: Timothy Carter plans their journeys around museum and historic‑site itineraries, having already explored the National Museum of American History in Washington, D.C., the Civil Rights Trail in
    Memphis, and the preservation‑focused historic district of Savannah, while dreaming of a weekend pilgrimage to the Freedom Trail in Boston.
  culinary: Timothy Carter tends a small vegetable garden that yields heirloom tomatoes and rainbow chard, which they transform into seasonal ratatouille and fresh garden salads, and they delight in pairing
    their home‑cooked dishes with classic jazz records, while occasionally treating themselves to a fine‑dining seafood platter.
  core: Timothy Carter is a meticulously organized, curiosity‑driven elder who balances disciplined community leadership with nightly jazz sessions and an occasionally over‑ambitious garden schedule.
background:
  cultural: Timothy is an African‑American who grew up in Baltimore during the height of the civil‑rights movement. Raised in a close‑knit church community, he inherited a strong sense of resilience, collective
    responsibility, and an appreciation for African‑American artistic expression—from gospel choirs to the city’s vibrant mural tradition. His family’s Southern roots, coupled with the rich cultural tapestry
    of Baltimore’s Black neighborhoods, have shaped his values of education, community service, and the preservation of heritage. He honors his heritage through food, music, storytelling, and active involvement
    in local cultural initiatives.
