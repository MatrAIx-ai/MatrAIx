personas:
  professional: A seasoned packaging machine operator with three decades of hands‑on expertise, Mayra Valdes excels at calibrating filling equipment, troubleshooting pneumatic and electrical faults, and
    mentoring new staff, all while championing safety and pragmatic workflow improvements on the shop floor.
  sports: Mayra Valdes walks the coastal promenade daily, follows the regional soccer team Harbor FC’s matches on TV, and joins an informal beach volleyball group each summer, balancing low‑impact exercise
    with a love for lively community sports.
  arts: Mayra Valdes sways to classic salsa hits by Celia Cruz and bomba rhythms at community festivals, knits intricate sweaters for grandchildren while listening to Agatha Christie audiobooks, and enjoys
    attending local theater productions featuring veteran performer Carlos Méndez.
  travel: Mayra Valdes prefers short, relaxed getaways to nearby coastal towns like Cabo Rojo and historic destinations such as Old San Juan, while dreaming of a leisurely cruise to the Caribbean islands,
    always planning trips around family holidays and the harvest season of their garden.
  culinary: Mayra Valdes delights in preparing aromatic arroz con gandules and hand‑wrapped pasteles, seasoning them with home‑grown cilantro, recao, and sweet plantains, and often caps off meals with a
    drizzle of homemade sofrito‑infused olive oil.
  core: Mayra Valdes blends a pragmatic work ethic with a zest for tropical gardening, spontaneous salsa dancing, and a relaxed approach to planning, making them a warm‑hearted mentor who never says no
    to a good mystery novel or a fresh batch of pasteles.
background:
  cultural: Mayra grew up in Rio Grande, a town steeped in Puerto Rican traditions and Caribbean rhythms. Her family roots trace back to the central mountain region, and she was raised bilingual in Spanish
    and English. The island's rich culinary heritage, music, and strong sense of community have shaped her values of family, hospitality, and cooperation. She participates in local fiestas, supports the
    Noche de San Juan celebrations, and maintains close ties with relatives across the island, reflecting a deep connection to her Puerto Rican identity.
attributes:
  skills: '["Packaging machine operation", "Filling machine setup and tendering", "Mechanical troubleshooting", "Preventive maintenance", "Quality control inspection", "Inventory management", "Safety compliance",
    "Team coordination", "Training and mentorship"]'
  hobbies: '["Gardening", "Traditional Puerto Rican cooking", "Salsa and bomba dancing", "Reading mystery novels", "Knitting", "Coastal walks", "Electronics repair"]'
  career_goals: Mayra aims to transition into a mentorship role where she can pass on her practical knowledge to younger operators, potentially becoming a shift lead or safety trainer. She is interested
    in learning about newer automated packaging technologies to stay relevant, and hopes to contribute to process improvements that boost efficiency while preserving a safe, supportive work environment.
    As she approaches retirement, she seeks a part‑time schedule that allows her to balance work with family visits and personal projects.
