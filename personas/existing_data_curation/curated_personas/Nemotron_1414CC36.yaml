personas:
  professional: Marquez Thomas is a budding visual artist who blends hand‑drawn cityscapes with digital interactive installations, leveraging their curiosity and disciplined planning to lead collaborative
    street‑art projects with friends while balancing school responsibilities.
  sports: Marquez Thomas regularly joins pick‑up basketball games at the local community center, cheering on the Philadelphia 76ers and dreaming of playing on the high school varsity team, while also dabbling
    in freestyle hip‑hop dance as a form of cross‑training.
  arts: Marquez Thomas immerses themselves in Philadelphia’s vibrant mural scene, drawing inspiration from artists like Keith Haring and local street muralist Stephen Powers, while practicing hip‑hop dance
    routines set to a mixtape ranging from Miles Davis to contemporary trap, and coding interactive art pieces that react to ambient city sounds.
  travel: Marquez Thomas favours urban explorations, spending weekends wandering the historic streets of Old City and the graffiti‑laden alleys of Fishtown, while dreaming of a future trip to Berlin’s East
    Side Gallery to see its iconic street art up close.
  culinary: Marquez Thomas enjoys grabbing a classic Philly cheesesteak after basketball practice, experimenting with homemade spice blends for their own take on the sandwich, and occasionally whipping
    up quick ramen bowls with miso and soft‑boiled eggs when working on late‑night coding projects.
  core: Marquez Thomas is a curiosity‑driven teenage creator who balances the rhythm of hip‑hop dance, the hum of code, and the pulse of city streets into a uniquely energetic, collaborative lifestyle.
background:
  cultural: Raised in a Black family in West Philadelphia, Marquez’s upbringing is shaped by the city’s rich African-American heritage, community churches, and family traditions that celebrate storytelling,
    music, and social solidarity. He often participates in local cultural events such as block parties, mural tours, and youth mentorship programs, and he draws inspiration from the legacy of Black artists
    and activists who have contributed to Philadelphia’s history.
