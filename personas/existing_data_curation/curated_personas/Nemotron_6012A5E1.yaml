    concerts", "Participating in community book club", "Volunteering for STEM outreach", "Learning basic French"]'
  career_goals: Although she is officially retired, Laila remains driven to contribute her expertise to the community and to lifelong learning. She aims to lead citizen‑science water‑quality initiatives
    in the Twin Cities, collaborate with local universities on sustainable engineering research, and publish a series of articles that bridge scientific insight with artistic expression. Laila is also eager
    to explore emerging AI tools for environmental data analysis, present at regional sustainability conferences, and mentor underrepresented youth in STEM through outreach programs. Ultimately, she hopes
    to curate a small exhibition that showcases her own photography and paintings inspired by the interplay of nature, science, and art.
