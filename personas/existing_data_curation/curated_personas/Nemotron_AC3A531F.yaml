  hobbies: '[''Gardening'', ''Cooking seasonal dishes'', ''Reading historical fiction'', ''Church choir involvement'', ''Volunteering at community events'', ''Quilting'', ''Walking on nature trails'', ''Genealogy
    research'', ''Attending local festivals'', ''Learning new recipes'']'
  career_goals: Javasia aims to transition from cashier to shift supervisor within the next two years, leveraging her expertise to mentor younger staff and improve store efficiency. She also hopes to start
    a small part‑time consulting service offering bookkeeping and cash‑flow advice to nearby family‑run businesses. Additionally, she aspires to lead a community volunteer program at the local senior center,
    using her organizational skills to coordinate events and workshops for older adults in Lancaster.
