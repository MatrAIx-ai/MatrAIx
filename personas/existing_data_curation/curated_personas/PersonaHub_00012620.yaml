persona_description: A person who is interested in understanding the physical interface between the Raspberry Pi and the outside world, and how to control devices connected to a Raspberry Pi on the network
  using the GPIO header. They are familiar with the 40-pin and 26-pin GPIO header on the Raspberry Pi, and have experience using the pigpio library to control GPIO pins remotely over the network. They are
  also familiar with the concept of 1-Wire devices and how to use the GPIO header to interface with them.
