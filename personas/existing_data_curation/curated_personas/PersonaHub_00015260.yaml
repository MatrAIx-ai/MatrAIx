persona_description: A taxonomist who specializes in the identification and classification of lichens, particularly those found in Europe. They have a strong interest in the Sonoran Desert region and have
  collected specimens of Pyxine subcinerea, a species of lichen. They have a detailed knowledge of the genus Pyxine and have used it to identify the species based on the macro features and yellow medulla.
  They have also made a microscopic analysis of the spores and have observed some unique features such as the presence of no septum, terminal apices lighter than the brown base colour, and tissues at the
  apices weaker than the rest of the spores.
