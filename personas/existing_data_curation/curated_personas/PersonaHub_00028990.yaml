persona_description: A mid-level health provider (MLP) who is trained at a higher education institution for at least a total of 2-3 years, authorized and regulated to work autonomously to diagnose, manage
  and treat illness, disease and impairments, as well as engage in preventive and promotive care. Their role has been progressively expanding and receiving attention, in particular in low- and middle-income
  countries, as a strategy to overcome health workforce challenges and improve access to essential health services and achieve the health related targets of the Millennium Development Goals. The person
  is interested in the expansion of MLP and the potential benefits of using these cadres in health systems, particularly in low- and middle-income countries. They are likely to be focused on improving education,
  supervision, management and regulation practices and integrating MLP into the health system to maximize the benefits from their use.
