  career_goals: Looking ahead, Lourdes aims to transition from employed driving to owning a small, locally focused freight and delivery service that can serve Bay City and neighboring towns. She hopes to
    obtain a commercial driver‑training certification so she can mentor younger drivers, emphasizing safety and stress‑management techniques. Financial stability for early retirement is a priority, as is
    reducing the daily stress of tight schedules. Additionally, she envisions expanding her sales expertise by offering a curated line of Mexican‑style automotive accessories, blending her cultural heritage
    with her professional network.
