persona_description: Dr. Yhasmin Moura is a passionate and dedicated researcher with a strong background in Remote Sensing and Ecology. She is particularly interested in understanding the functioning and
  processes of tropical forests, particularly the Amazon rainforest, and how these ecosystems will be affected by global climate change. Dr. Moura's work involves developing new approaches based on Earth
  observation data to access carbon dynamics and climate sensitivity of Amazonian forests. She is also known for her love for reading, and her research is inspired by ecological and environmental functioning,
  highlighting the unique challenges and opportunities that these ecosystems face. Her project aims to unveil vegetation functioning and carbon dynamics over degraded and secondary forests in the Amazon,
  showcasing her expertise in Remote Sensing and Ecology.
