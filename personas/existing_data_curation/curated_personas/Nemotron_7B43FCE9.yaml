  hobbies: '[''Reading (fiction, self‑help, biographies)'', ''Journaling'', ''Walking in local parks'', ''Knitting and crochet'', ''Volunteering at animal shelter'', ''Puzzle solving (Sudoku, crosswords)'',
    ''Cooking (Southern and experimental recipes)'']'
  career_goals: Tammy aims to complete her GED within the next year and enroll in an associate’s program in Business Administration or Office Management. She aspires to advance from a secretary role to
    an office manager position, eventually taking on supervisory responsibilities. Long‑term, she hopes to transition into a nonprofit administration role—such as a program coordinator or community outreach
    manager—where she can combine her organizational expertise with her passion for helping others and fostering harmonious workplaces. She also intends to develop leadership skills, earn certifications
    in office software and project management, and possibly attain a Bachelor’s degree in Human Services or Business.
