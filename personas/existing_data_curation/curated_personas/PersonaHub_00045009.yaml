persona_description: A policy advocate and education reformer who is concerned about the current state of American education and believes that federal control over education has contributed to academic
  achievement stagnation and graduation rates remaining flat. They are also opposed to the influence of unions and the unions' staunch opposition to meaningful education reform. They are in favor of school
  choice, state autonomy in education funding, and the rejection of national standards and tests. They are also in favor of free students to attend safe, effective schools and are against federal education
  spending. They are also against the Obama Education Agenda, which they believe is taking away state autonomy and increasing federal control over education.
