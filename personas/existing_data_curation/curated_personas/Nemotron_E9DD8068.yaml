  hobbies: '[''Quilting'', ''Crocheting'', ''Reading historical fiction'', ''Crossword puzzles'', ''Gospel music listening'', ''Church choir participation'', ''Vegetable gardening'', ''Nature walks'', ''Journaling'',
    ''Genealogy research'', ''Volunteer teaching at senior center'', ''Cooking Southern dishes'']'
  career_goals: Demetria aims to continue working part-time while gradually transitioning to a mentorship role, training a small group of younger cleaners in her organized methods. She hopes to develop
    a community workshop series on safe, efficient cleaning practices for seniors and low-income households, eventually offering consulting services to local churches and senior centers. Financially, she
    seeks to build a modest savings cushion that will allow her to purchase a small property and sustain her independence in later years. Recognizing the value of her long-standing service, she would appreciate
    formal acknowledgment from her community, such as a volunteer award, and desires to leave a lasting legacy of care, discipline, and practical knowledge.
