personas:
  professional: Demetria Dodd is a veteran housekeeping specialist who combines four decades of deep‑cleaning expertise, meticulous inventory spreadsheets, and a curiosity for eco‑friendly products to mentor
    younger cleaners and design community workshops that promote senior safety and efficient household management.
  sports: Demetria Dodd enjoys low‑impact cardio on the Piney Woods trail, participates in the local senior walking club that supports the community center, and roots for the New Orleans Saints and the
    Atlanta Dream while avoiding competitive sports in favor of gentle, social activity.
  arts: Demetria Dodd finds inspiration in the soulful vocals of Aretha Franklin and Mahalia Jackson, the Southern narratives of Jesmyn Ward, and the tactile rhythm of her quilting, often watching PBS's
    'The Quilters' series and attending gospel concerts featuring the Sacred Harmony Ensemble.
  travel: Demetria Dodd prefers relaxed, culturally rich road trips, meticulously planning routes on her tablet before traveling to historic Savannah, the scenic Great Smoky Mountains, and the vibrant jazz
    districts of New Orleans, all while budgeting each journey to preserve her modest savings.
  culinary: Demetria Dodd enjoys cooking Southern comfort dishes such as collard greens seasoned with smoked turkey, sweet‑potato pies spiced with cinnamon and nutmeg, and fresh tomato salsa made from garden‑grown
    tomatoes, while also indulging in buttery buttermilk biscuits at her favorite local farmer’s market café.
  core: Demetria Dodd blends disciplined housekeeping mastery with a curious, community‑focused spirit, stitching quilts and spreadsheets alike, while nightly crossword puzzles and occasional extra‑yarn
    splurges reveal a sweet, slightly stubborn soul.
background:
  cultural: Demetria was born and raised in a close-knit African-American community in rural Meriwether County, Georgia. Growing up during the civil-rights era, she learned the importance of mutual support,
    faith, and self-reliance. The local church has been a central influence, shaping her values of compassion, cooperation, and service to others. Traditions such as family gatherings, shared meals, storytelling,
    and gospel music have reinforced a strong sense of identity and resilience. Southern culinary practices and the legacy of community activism continue to inform her daily life, work ethic, and commitment
    to helping those around her.
attributes:
  skills: '[''Residential housekeeping'', ''Deep cleaning'', ''Stain removal'', ''Fabric care'', ''Inventory management'', ''Supply budgeting'', ''Eco-friendly cleaning methods'', ''Digital scheduling tools'',
