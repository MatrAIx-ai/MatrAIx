  career_goals: Mary aims to transition into a senior engineering role within the next two years, eventually leading a cross‑functional development team where she can embed structured, user‑focused processes
    while fostering a collaborative, flexible environment. She aspires to champion accessibility and inclusive design, and eventually launch a boutique consultancy that creates interactive digital experiences
    for non‑profits and arts organizations. She also wants to deepen her product management knowledge, earn a certification in agile leadership, and continue mentoring women in tech.
