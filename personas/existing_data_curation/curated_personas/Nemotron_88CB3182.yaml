personas:
  professional: Mary Tindal is a full‑stack software developer who crafts clean React and Django applications, leverages their humanities training to translate complex user stories into intuitive interfaces,
    and balances a love for structure with a laid‑back, collaborative sprint rhythm, often asserting themselves in code reviews while still keeping the team’s vibe relaxed, and they constantly encourage
    inclusive design practices.
  sports: Mary Tindal is an avid hiker with the Rocky Mountain Trail Club, a regular participant in weekday sunrise yoga at FlowSpace, and a dedicated fan of the Colorado Avalanche, Denver Broncos, and
    Colorado Rapids, often cheering them on while they balance structured workout plans with impromptu weekend climbs.
  arts: Mary Tindal immerses themselves in the local arts scene by attending The Improvised Life improv shows, listening to The Lumineers at Red Rocks, painting in weekend workshops hosted by Beneath the
    Brush, and curating board‑game nights at The Game Board Café; they let these creative bursts inspire their UI designs.
  travel: Mary Tindal prefers weekend road trips with a loose itinerary that combs the peaks of Rocky Mountain National Park and the alpine towns of Banff, while also plotting a meticulous two‑week cultural
    tour of Kyoto’s temples and Berlin’s murals; they balance structured planning with spontaneous detours.
  culinary: Mary Tindal enjoys a palate that oscillates between spicy green chili burritos, homemade quinoa‑kale salads, and craft‑brew‑paired flatbreads, cooks at an intermediate level with a favorite
    recipe for jalapeño‑infused pizza, and they frequent venues like The Brew House for tasting flights of IPA and stout.
  core: Mary Tindal is a socially charged tech mentor who harmonizes a love for structured code with spontaneous outdoor adventures; they occasionally forget to file taxes on time, but always prioritize
    inclusive design and a good laugh over a craft beer.
background:
  cultural: Mary is a white American raised in the Denver metropolitan area, where the blend of frontier spirit, outdoor lifestyle, and a vibrant arts community shaped her worldview. Her family roots trace
    back to German and Irish immigrants, giving her an appreciation for diverse cultural traditions. Growing up in a progressive, environmentally‑conscious Colorado culture, she embraces sustainability,
    wellness, and community involvement. Her arts‑humanities education deepened her love for literature, visual arts, and critical discourse, which she integrates into her tech career by emphasizing human-centered
    design and inclusive collaboration.
