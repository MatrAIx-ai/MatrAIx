  career_goals: Although retired from formal employment, Carlos aims to remain an active contributor to his Bronx neighborhood. He aspires to volunteer regularly at the local senior center and to lead cooking
    workshops that teach younger generations how to prepare authentic Dominican dishes. He hopes to launch a modest home‑based catering service for community celebrations, blending his culinary passion
    with a small entrepreneurial venture. He also wants to deepen his digital skills to create video tutorials for cooking and cultural storytelling, ensuring his heritage is preserved. Visiting family
    in the Dominican Republic and documenting his family's oral histories are long‑term personal goals.
