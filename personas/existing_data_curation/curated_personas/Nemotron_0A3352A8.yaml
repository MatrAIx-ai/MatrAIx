personas:
  professional: Terence Green is a seasoned construction laborer with an associate degree in construction management who skillfully blends carpentry, concrete forming, and heavy-equipment operation with
    a laid-back, flexible approach that lets them solve on-site problems quickly while occasionally letting paperwork slip due to their relaxed attitude toward strict planning.
  sports: Terence Green is an avid Dallas Cowboys fan who watches Sunday football with their spouse, participates in the Katy Amateur Fishing Association during the spring and summer, and plays casual pick-up
    basketball at the local community center, preferring low-key fitness activities over regimented gym routines.
  arts: Terence Green enjoys classic R&B and jazz, often spinning Marvin Gaye, Aretha Franklin, and Miles Davis on their vintage record player while attending occasional gospel services and community theater
    productions at the Houston Grand Opera, which grounds their sense of identity and offers a soulful escape from work.
  travel: Terence Green favors low-key road trips, having already toured Austin's live-music scene during SXSW, explored the Hill Country vineyards, and dreamed of a relaxed family getaway to the Bahamas,
    always planning trips on a modest budget and preferring spontaneous stops over rigid itineraries.
  culinary: Terence Green prefers Southern comfort foods like smoked brisket, collard greens seasoned with smoked turkey, and shrimp etouffee, often cooking them on their backyard grill using home-grown
    tomatoes and peppers, while their culinary skill hovers between competent home-cooking and occasional over-charred barbecues.
  core: Terence Green balances a practical, hands-on work ethic with a relaxed, sometimes disorganized lifestyle, channeling their love for community, classic tunes, and sustainable home improvement into
    a steady pursuit of a foreman role and an eventual eco-friendly renovation business.
background:
  cultural: Terence grew up in the greater Houston area within a close‑knit African‑American community that blends Southern hospitality with the cultural traditions of Black Texan life. Church gatherings,
    soul food, and gospel music were integral parts of his upbringing, fostering values of resilience, family solidarity, and community service. Living in Katy, a rapidly diversifying suburb, has exposed
    him to a mosaic of cultures while reinforcing his appreciation for his heritage and the importance of supporting his family and neighborhood.
attributes:
  skills: '[''Carpentry'', ''Concrete Forming'', ''Blueprint Reading'', ''Heavy Machinery Operation'', ''Construction Site Safety'', ''Sustainable Building Practices'', ''Problem Solving'', ''Team Coordination'',
