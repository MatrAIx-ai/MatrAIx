  hobbies: '[''Fishing'', ''Barbecue Cooking'', ''DIY Home Improvement'', ''Habitat for Humanity Volunteering'', ''Gardening'', ''Classic R&B and Jazz Music'', ''Watching Football'', ''Automotive Restoration'']'
  career_goals: Terence’s short‑term goal is to become a foreman within the next three years, which he plans to support by earning an OSHA 30‑hour certification and completing a supervisory‑leadership course
    at a local community college. Long‑term, he aspires to obtain a contractor’s license and eventually launch his own residential‑renovation business that emphasizes eco‑friendly upgrades for families
    in the Katy‑Houston area. To solidify his business credentials, he intends to pursue a Bachelor’s degree in Construction Management part‑time while maintaining a stable income to support his married
    life.
