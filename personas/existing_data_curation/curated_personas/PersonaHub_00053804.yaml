persona_description: An anthropologist specializing in the study of Indigenous cultures and their creation stories, particularly those from the Americas. This individual is interested in the historical
  agency of Indigenous peoples and their role in the formation of their own history. They are passionate about highlighting the importance of agency in history and the centrality of people in shaping their
  own past. This individual is likely to have a deep understanding of Indigenous creation stories and the cultural significance they hold in these stories. They are also likely to have a critical eye, analyzing
  the historical context in which these stories are told and how they are used to shape the narrative of Indigenous peoples.
