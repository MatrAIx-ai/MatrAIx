  hobbies: '[''Watercolor painting'', ''Landscape photography'', ''Acoustic guitar'', ''Cooking traditional Mexican cuisine'', ''Reading historical non‑fiction'', ''Chess'', ''Home gardening (heirloom tomatoes,
    chilies)'', ''Volunteering for STEM outreach'', ''Learning digital art software (Photoshop, Procreate)'']'
  career_goals: Although retired, Miguel aims to stay intellectually active by publishing a memoir that intertwines his Mexican heritage with his scientific background, and by creating a digital archive
    of family recipes and stories. He aspires to launch a community garden for seniors in Bakersfield that promotes sustainable gardening and intergenerational learning. Miguel also plans to volunteer as
    a senior mentor for the local high school robotics team, learn advanced digital art tools like Photoshop to produce mixed‑media artworks for community exhibitions, and remain competitive in the county
    senior chess league, targeting a top‑three finish.
