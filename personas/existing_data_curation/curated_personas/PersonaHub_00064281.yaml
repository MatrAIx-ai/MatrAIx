persona_description: A scientist or naturalist who specializes in marine biology, particularly the study of seabirds, including their genetics, evolution, distribution, and ecology. They have a keen interest
  in understanding the historical and evolutionary relationships between different species of shearwaters, their migration patterns, and their geographical distribution. They are likely to have a background
  in paleontology, comparative anatomy, and evolutionary biology, and they are interested in exploring the potential for genetic diversity and adaptation in the evolution of shearwater species. They may
  also be interested in the impact of climate change on the distribution and survival of these species, and they are likely to be familiar with the use of DNA analysis and genetic diversity to study the
  history and evolution of seabirds.
