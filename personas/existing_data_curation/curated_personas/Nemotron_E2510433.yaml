  career_goals: Monica aims to deepen her financial expertise by obtaining a Certified Bookkeeper credential and completing an associate’s degree in accounting. She aspires to transition into a senior bookkeeping
    or financial analyst role within a mid‑sized company, eventually moving toward a finance manager position. Leveraging her love of art, she hopes to work part‑time in the finance department of a local
    museum or cultural organization, blending her professional skills with her artistic interests. Additionally, Monica wants to develop leadership capabilities, mentor younger colleagues, and secure greater
    financial stability to support her independent lifestyle after divorce.
