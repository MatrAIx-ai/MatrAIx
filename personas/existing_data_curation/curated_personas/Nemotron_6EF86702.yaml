personas:
  professional: Rebecca Jackson is a nurse practitioner who applies her STEM‑based analytical problem‑solving and structured workflow to primary care assessment, chronic disease management, women’s health,
    and community health outreach, while her practical, organized nature and cooperative mindset make her a reliable leader of quality‑improvement projects and a mentor for emerging clinicians.
  sports: Rebecca Jackson enjoys early‑morning hikes through the bayous, follows the New Orleans Saints and the LSU Tigers with spirited enthusiasm, plays in a women’s tennis league at the Baton Rogue Recreation
    Center, attends weekly yoga classes for flexibility, yet occasionally skips the Saturday bike ride when work demands become overwhelming.
  arts: Rebecca Jackson captures the beauty of wetlands through wildlife photography, relaxes to the soulful sounds of Louis Armstrong, gospel hymns in her church choir, and the storytelling of historic
    dramas on streaming platforms, while they occasionally procrastinate on editing photo collections and admit a guilty pleasure for karaoke nights.
  travel: Rebecca Jackson plans trips with meticulous itineraries, prefers road‑trips to historic Southern towns like Natchez and the French Quarter, has a bucket list that includes the Great Barrier Reef
    and the Scottish Highlands, and balances wanderlust with family responsibilities by opting for weekend cottage retreats in the bayou over long‑haul flights.
  culinary: Rebecca Jackson delights in preparing regional Louisiana dishes such as gumbo and jambalaya, skillfully balancing the bold flavors of andouille sausage, okra, and Cajun spices while incorporating
    fresh produce from their garden, yet they sometimes forget to label leftovers, leading to occasional food waste.
  core: Rebecca Jackson blends analytical precision with southern hospitality, turning a love for community health, garden stewardship, and soulful music into a structured yet flexible life rhythm, while
    habitually over‑scheduling and frequently misplacing their glasses.
background:
  cultural: Rebecca is an African American woman raised in Morehouse Parish, Louisiana, where deep roots in Black Creole culture shape her values of community, resilience, and family solidarity. Her upbringing
    in a close‑knit church community ingrained a strong sense of service and collective well‑being. Familiar with the culinary traditions, music (gospel, jazz, and zydeco), and storytelling of the region,
    she carries forward these cultural threads in her daily life. Exposure to systemic healthcare inequities in her community fuels her commitment to culturally competent care and health equity, while her
    educational achievements reflect a family emphasis on perseverance and academic excellence.
attributes:
  skills: '[''Primary care assessment'', ''Chronic disease management'', "Women''s health", ''Preventive health screenings'', ''Patient education and counseling'', ''Culturally competent care'', ''Electronic
    health record (EHR) management'', ''Quality improvement initiatives'', ''Health data analysis'', ''Interdisciplinary team leadership'', ''Community health outreach'']'
  hobbies: '[''Gardening'', ''Creole cooking'', ''Reading historical fiction'', ''Church choir participation'', ''Volunteer tutoring'', ''Hiking in local wetlands'', ''Yoga and meditation'', ''Nature photography'']'
  career_goals: Rebecca aspires to expand her impact beyond individual patient care by moving into a leadership role at a community health center, where she can develop telehealth services for underserved
    rural residents. She aims to earn a master's in healthcare administration to strengthen her strategic planning skills and to champion policies that reduce health disparities for Black communities in
    the South. Mentoring emerging Black nurses and nurse practitioners is also a key ambition, as she seeks to build a supportive pipeline of culturally aware clinicians.
