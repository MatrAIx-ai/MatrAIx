personas:
  professional: A veteran adult educator and workforce development specialist Shannel Sidhu blends over thirty years of curriculum design expertise with an artistic flair, leveraging e‑learning platforms
    like Articulate Rise and Cornerstone to create interactive trainings that incorporate watercolor storytelling and cultural narratives, while they mentor junior facilitators and steer toward a consulting
    future.
  sports: An avid mountain hiker Shannel Sidhu spends weekends trekking the Rockies, supports the Colorado Rockies baseball team and the Denver Broncos, participates in a local senior walking club that
    meets for morning strolls at City Park, and they occasionally join a community bridge tournament, treating it as a mental sport to keep sharp.
  arts: A dedicated watercolorist Shannel Sidhu finds inspiration in Winslow Homer's luminous seascapes and Georgia O'Keeffe's delicate botanical studies, regularly visits the Denver Art Museum to view
    contemporary Native American exhibitions, volunteers as a stage‑design assistant for the local community theater, and they collect limited‑edition prints by Japanese ukiyo‑e master Hiroshige.
  travel: A culturally curious traveler Shannel Sidhu has journeyed from island villages in the Pacific to the historic streets of Kyoto, enjoys hiking the peaks of Banff National Park, plans a future pilgrimage
    to the ancient ruins of Palau, and they cherish weekend road trips across Rocky Mountain towns like Aspen and Telluride.
  culinary: A passionate home cook Shannel Sidhu delights in preparing island‑inspired coconut fish stew, taro leaf wraps, and banana‑leaf‑wrapped lemongrass chicken, while they also experiment with Colorado‑grown
    trout and heirloom tomatoes in fresh garden salads, displaying a moderate‑to‑advanced cooking skill set that blends traditional recipes with seasonal farm‑to‑table ingredients.
  core: Shannel Sidhu weaves storytelling, watercolor brushstrokes, and inclusive pedagogy into every facet of life, balancing meticulous project plans with spontaneous art‑supply splurges, while their
    love for hiking, bridge, and family reunions fuels a vibrant, community‑centered worldview.
background:
  cultural: Shannel’s cultural identity is rooted in her Micronesian heritage, a tapestry of island nations where community, oral tradition, and respect for elders are central. Growing up in a close‑knit
    Pacific family, she learned the value of sharing stories, music, and craft as ways of preserving knowledge. These traditions instilled in her a collaborative spirit and a deep appreciation for visual
    and narrative arts, which she carries into her training work. After moving to Sterling, Colorado, Shannel maintains ties to the Micronesian diaspora through local cultural clubs, language practice,
    and seasonal celebrations of festivals such as Yap Day and Chuuk Independence. Her background informs her inclusive approach—she often incorporates storytelling, communal learning, and hospitality into
    workshops, emphasizing collective success and mutual respect. This blend of Pacific communal values with Western professional practices creates a unique, culturally aware perspective that enriches both
    her personal life and her development initiatives.
attributes:
  skills: '["curriculum development", "instructional design", "facilitation and public speaking", "e‑learning authoring (Articulate Storyline, Rise)", "learning management system administration", "needs
