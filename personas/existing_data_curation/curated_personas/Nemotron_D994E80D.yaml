  hobbies: '["watercolor painting", "visiting art galleries and museums", "hiking in the Rocky Mountains", "gardening", "cooking traditional Micronesian cuisine", "volunteering at cultural festivals", "participating
    in community theater (stage design)", "reading historical fiction", "playing bridge", "traveling to Micronesian islands"]'
  career_goals: Shannel aims to expand the reach of her training expertise by creating a signature program that integrates Micronesian storytelling and visual arts into corporate soft‑skill curricula, thereby
    promoting cultural competence and creativity in the workplace. She plans to obtain a recognized instructional design certification (e.g., ATD Master Instructional Designer) and develop a structured
    mentorship pipeline for junior trainers within her organization. Over the next five years, she hopes to transition into a consulting role that partners with nonprofits and businesses to design inclusive
    learning experiences, and ultimately to author a guidebook chronicling her blended‑art and education methodology.
