personas:
  professional: Anibal Cruz, a 60‑year‑old master handyman in Denver, they combine decades of carpentry, plumbing, and electrical repair expertise with meticulous budgeting and a competitive drive to build
    a reputation as the go‑to reliable service provider for seniors and low‑income families, while mentoring apprentices through weekend workshops.
  sports: Anibal Cruz, an avid yet solitary fitness enthusiast, they hike the foothills of the Rockies weekly, belong to the Denver Metro Seniors Hiking Club, and keep an eye on the Denver Broncos, Colorado
    Rockies, and Denver Nuggets, often cheering from their porch after a long walk.
  arts: Anibal Cruz, a quiet connoisseur of the arts, they spend evenings photographing Colorado’s alpine meadows, enjoy listening to traditional corridos and the folk music of Los Lobos, and immerse themselves
    in the literature of Sandra Cisneros and Rudolfo Anaya, which deepens their appreciation for storytelling.
  travel: Anibal Cruz, who favors carefully planned road trips, they have explored Santa Fe’s historic plaza and the red‑rock landscapes of Sedona, dream of visiting Granada’s Alhambra, and regularly take
    weekend drives to Rocky Mountain National Park to photograph sunrise vistas.
  culinary: Anibal Cruz, a seasoned home cook, they relish preparing tamales with masa, pork, and ancho chilies, simmering mole poblano with chocolate, nuts, and poblano peppers, while also experimenting
    with fresh garden herbs like cilantro and oregano to enhance every dish.
  core: Anibal Cruz, a meticulous handyperson who balances a competitive edge with a love for solitary woodworking, garden stewardship, and quiet chess battles, often juggling a disciplined budget and a
    stubborn reluctance to seek help for minor health aches.
background:
  cultural: Anibal was born to Mexican parents who immigrated to the United States and grew up in a bilingual household where Spanish and English were spoken interchangeably. He retains strong ties to Mexican
    traditions, celebrating Día de los Muertos and Mexican Independence Day with his extended family in Denver. His culinary knowledge reflects regional Mexican flavors, and he frequently prepares home‑cooked
    meals for friends and community events. Though never married, he values the sense of community found in local Mexican‑American churches and cultural centers, where he volunteers occasionally. His cultural
    identity informs his work ethic, emphasis on reliability, and his desire to give back through service and mentorship.
