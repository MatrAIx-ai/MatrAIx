  career_goals: At 60, Anibal aims to channel his practical expertise into a small, community‑focused home‑repair business that offers dependable, affordable services to his Denver neighborhood. He wants
    to become known as the go‑to handyman for seniors and low‑income families, leveraging his reliability and competitive drive to build a reputation for quality work. Additionally, he hopes to mentor younger
    tradespeople through a weekend workshop series, sharing his knowledge while creating a modest supplemental income that supports his independent lifestyle.
