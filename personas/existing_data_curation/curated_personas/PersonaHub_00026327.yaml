persona_description: George Frideric Handel, an English composer of German birth, is likely to be a music enthusiast and a serious music lover who appreciates the vast range of his compositions. He is known
  for his contributions to every musical genre of his time, including operas, oratorios, and vocal works. Handel's reputation as one of the greatest composers of his age rests largely on the knowledge of
  a small number of orchestral works and oratorios, particularly the Messiah. His operas, mainly on Italian librettos, were his earlier part of his career, and are considered the finest of their kind. In
  his later years, his commitment to large-scale vocal works, usually with a strong dramatic element, found a more individual outlet in English oratorio, a genre that he invented and established.
