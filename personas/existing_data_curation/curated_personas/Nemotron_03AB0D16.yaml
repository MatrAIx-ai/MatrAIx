personas:
  professional: Bryan Rivera is an assistant construction manager who blends bilingual fluency, blueprint reading, cost estimating, and on-site safety oversight with a curiosity-driven approach, keeping
    projects on schedule while staying flexible enough to adapt to shifting site conditions.
  sports: Bryan Rivera is a regular member of the Desert Trail Runners club, enjoys weekend hikes through the Sonoran Desert, follows the Arizona Cardinals in the NFL and the Phoenix Suns in the NBA closely,
    and occasionally joins a recreational ultimate frisbee league to stay active.
  arts: Bryan Rivera finds artistic inspiration while strumming traditional folk ballads by José Alfredo Jiménez on his acoustic guitar, admiring the vibrant murals of local street artist G. Gabbart, and
    analyzing the cinematic storytelling of Alejandro González Iñárritu, weaving these influences into his DIY home-improvement projects.
  travel: Bryan Rivera prefers low-key road trips that blend cultural immersion with outdoor adventure, having explored the desert canyons of Sedona, the colonial charm of Guanajuato, and the cherry-blossom
    streets of Kyoto, all while meticulously budgeting each itinerary around his modest earnings.
  culinary: Bryan Rivera is a budding home chef who masterfully simmers carnitas with ancho chilies, crafts hand-rolled tacos al pastor topped with pineapple and fresh cilantro, and experiments with mole
    poblano during weekend gatherings for family and close friends.
  core: Bryan Rivera balances a meticulous eye for construction detail with a laid-back love for guitar riffs, often losing track of time on desert hikes while forgetting to pay utility bills until the
    last minute.
background:
  cultural: Bryan is a second-generation Mexican-American raised in Phoenix’s vibrant Latino community. He grew up bilingual, speaking Spanish at home and English at school, and celebrates cultural traditions
    such as Día de los Muertos, Mexican Independence Day, and family gatherings centered around food and music. His heritage shapes his values of hard work, family loyalty, and community service, and he
    often incorporates Mexican design elements and sustainable practices into his construction projects to honor his roots.
attributes:
  skills: '[''Project Management'', ''Site Supervision'', ''Blueprint Reading'', ''Cost Estimation'', ''Safety Compliance'', ''Team Coordination'', ''Material Procurement'', ''Vendor Negotiation'', ''Bilingual
    Communication (Spanish/English)'', ''Construction Software (Procore, AutoCAD)'', ''Sustainable Building Practices'', ''Adaptable Problem Solving'']'
  hobbies: '[''Playing Guitar'', ''Cooking Mexican Cuisine'', ''Hiking in Desert Trails'', ''Architectural Photography'', ''Simulation Video Games'', ''Reading Construction Trade Journals'', ''DIY Home
    Improvement Projects'']'
  career_goals: Bryan aims to advance from his current assistant construction manager role to a licensed general contractor within the next five years. He plans to complete his bachelor's degree in construction
    management, obtain certifications such as OSHA 30-hour, Lean Construction, and LEED Green Associate, and eventually launch his own firm focused on affordable, energy-efficient housing that serves the
    Phoenix community. He also hopes to mentor younger workers and contribute to community development projects that reflect his Mexican heritage.
