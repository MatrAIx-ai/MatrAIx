  hobbies: '[''Photography (nature and urban)'', ''Reading (literature, art criticism, science podcasts)'', ''Sketching and drawing'', ''Collecting postcards and stamps'', ''Model ship building'', ''Fishing'',
    ''Walking local nature trails'', ''Attending low‑key art gallery openings'']'
  career_goals: James aims to advance within the United States Postal Service by moving into a supervisory role such as Assistant Postmaster, where he can mentor newer carriers and contribute to operational
    improvements. He also wishes to combine his love for art with his professional life by organizing small community art displays at the local post office or volunteering at the Eustis art center. Over
    the next few years, he plans to complete a bachelor's degree in art history or graphic design part‑time, giving him the credentials to launch a modest online gallery showcasing his own photography.
    Throughout, he prioritizes a stable income, a flexible schedule that allows quality time with his spouse, and the ability to remain rooted in his quiet, lakeside community.
