personas:
  professional: Benjamin Garcia, a senior civil engineer specializing in structural analysis and geotechnical assessment, blends curiosity with practicality; they integrate BIM and digital‑twin technologies
    into climate‑resilient infrastructure projects while mentoring junior staff and aligning technical solutions with community harmony.
  sports: Benjamin Garcia, an avid early‑morning hiker who joins a local mountain‑trail club and follows the regional basketball team Aibonito FC in the summer and the baseball club Cangrejeros de Santurce
    in the winter, incorporates weekly cardio hikes and weekend soccer matches to stay fit while balancing community camaraderie with solitary trail time.
  arts: Benjamin Garcia, a community‑oriented musician who plays the cuatro at informal gatherings and revels in Bomba and Plena festivals featuring artists such as Tito Matos, also channels the vibrancy
    of his cloud‑forest photography into a personal blog that references the color palettes of painter William H. Johnson.
  travel: Benjamin Garcia, who prefers meticulously planned trips that blend adventure and relaxation, often explores nearby islands like St. Thomas for weekend hikes, dreams of photographing the terraced
    rice fields of Bali, and balances travel budgets with family commitments by reserving one long vacation per year.
  culinary: Benjamin Garcia, an enthusiastic home cook who cultivates plantains, peppers, and gourds, delights friends with arroz con gandules, pasteles, and a signature plantain‑pepper stew, while also
    savoring fresh ceviche and enjoying locally roasted coffee beans.
  core: Benjamin Garcia, a pragmatic visionary who balances meticulous engineering with spontaneous garden improvisations, habitually checks the weather before every hike, occasionally hoards extra seed
    packets, and believes that a well‑planned bridge and a lively jam session share the same harmony.
background:
  cultural: Raised in Aibonito, Puerto Rico, Benjamin grew up in a close‑knit, bilingual community where Spanish is spoken at home and English is used in school and professional settings. The town’s cooler
    climate and annual Festival de las Flores nurtured his love for nature and local traditions. His family’s Catholic faith and emphasis on community solidarity shaped his cooperative and considerate nature.
    He identifies with the island’s rich blend of Taíno, Spanish, and African heritage, which is reflected in his appreciation for local music, dance, and cuisine. Experiencing Hurricane Maria’s devastation
    and the subsequent community recovery reinforced his commitment to resilient infrastructure and collective well‑being.
attributes:
  skills: '["Structural analysis", "Geotechnical assessment", "Sustainable infrastructure design", "AutoCAD Civil 3D", "Revit BIM", "GIS mapping", "Building Information Modeling (BIM)", "Project management",
    "Budget control", "Code compliance (Puerto Rico)", "Site inspection", "Community stakeholder engagement", "Mentoring and team leadership"]'
  hobbies: '["Hiking in the Cordillera Central", "Landscape photography", "Gardening", "Cooking traditional Puerto Rican dishes", "Playing the cuatro", "Attending Bomba and Plena festivals", "Reading historical
    biographies and engineering journals", "Volunteering with post‑hurricane rebuilding projects", "Solo reflective walks"]'
  career_goals: Benjamin aims to become a senior consultant focusing on climate‑resilient infrastructure for Puerto Rico, leading large‑scale projects that protect communities from hurricanes and landslides.
    He aspires to champion green building standards, drive widespread adoption of BIM and digital‑twin technologies in municipal agencies, and create a mentorship program for mid‑career engineers across
    rural municipalities. In the longer term, he hopes to influence public policy to secure funding for sustainable water management and transportation networks in Aibonito and the central mountain region.
