  career_goals: Dustin aims to transition into a supervisory role where he can blend his technical expertise with his passion for mentoring and collaborative problem‑solving. He is interested in leading
    continuous‑improvement projects that incorporate new automation technologies, and eventually hopes to spearhead a small custom‑metal art studio that merges his fabrication skills with his love for unconventional
    design. In the longer term, he envisions becoming a trusted trainer within the region’s manufacturing community, helping younger workers develop both hard and soft skills.
