personas:
  professional: A disciplined preschool problem‑solver named Tonya Debban loves arranging block towers, adheres to daily classroom routines, and quietly offers help to classmates, as they apply a practical,
    compassionate mindset to every tiny challenge.
  sports: An energetic five‑year‑old named Tonya Debban delights in community soccer with the Little Tigers Soccer Club, watches the Seattle Seahawks on weekends, attends indoor swimming lessons during
    winter, and as they practice kicking and swimming, they balance structured play with spontaneous tag games, showing their love for organized sport and playful movement.
  arts: A vivid young creator named Tonya Debban enjoys drawing bright‑colored pictures of Disney’s Frozen characters, singing along to Raffi’s Baby Beluga, and watching Sesame Street’s Elmo, as they often
    request extra crayons to perfect their sketches, reflecting a gentle artistic curiosity combined with a love for familiar musical storytellers.
  travel: An adventurous preschool traveler named Tonya Debban has visited Grandma’s house in upstate New York, explored Disneyland in California, and dreams of seeing the Grand Canyon, preferring family‑guided
    tours with plenty of snack breaks, as they balance excitement for new sights with a need for familiar routines.
  culinary: A budding foodie named Tonya Debban favors macaroni and cheese with extra cheddar, peanut butter and jelly sandwiches, and apple slices, can stir batter with a wooden spoon under parental supervision,
    and as they select meals, they occasionally swap vegetables for crunchy crackers, showcasing a simple yet evolving palate.
  core: Tonya Debban, a five‑year‑old with a love for predictable routines, a secret stash of glitter stickers, and a disciplined piggy‑bank habit, navigates daily life with quiet compassion, structured
    play, and occasional stubbornness when faced with unexpected changes, as they prefer order but cherish small surprises.
background:
  cultural: Tonya is a White American child raised in Grand Prairie, a suburban community in Dallas County, Texas. Her upbringing blends typical Mid‑South Texan values such as friendliness, community involvement,
    and an appreciation for local traditions like weekend sports games and church gatherings. Her family participates in neighborhood activities, celebrates holidays with a mix of regional customs, and
    values a structured, supportive environment that reflects the broader cultural emphasis on hospitality and cooperation in the area.
