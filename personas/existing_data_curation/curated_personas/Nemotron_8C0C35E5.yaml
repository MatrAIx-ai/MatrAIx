personas:
  professional: James Kennedy is an aspiring junior programmer who builds and modifies LEGO machines, crafts simple Scratch games, and blends a practical, methodical mindset with boundless curiosity, thriving
    in quiet, focused coding sessions that let them turn imagined inventions into working prototypes.
  sports: James Kennedy enjoys low‑key fitness activities like weekend bird‑watching hikes with the Greenfield Junior Naturalists Club, occasional swimming at the community pool during summer, follows the
    River City Raccoons baseball team on television, and prefers solitary, self‑paced exercise over team sports, using a simple step‑count app to track their daily activity.
  arts: James Kennedy channels a love for sci‑fi storytelling into digital sketches inspired by Hayao Miyazaki’s whimsical worlds and Pixar’s short films, collects vintage LEGO design catalogs, and enjoys
    listening to the orchestral soundtracks of John Williams while sketching imagined inventions, often sharing their creations with the online Scratch community.
  travel: James Kennedy prefers meticulously planned, low‑stimulus trips like a family hike through Yellowstone National Park and a weekend at the Smithsonian Air and Space Museum in Washington, D.C., while
    dreaming of exploring the calm coral lagoons of the Great Barrier Reef, always packing a field journal and a spare tablet for sketching and coding on the go.
  culinary: James Kennedy enjoys simple, hands‑on cooking like making avocado toast with cherry tomatoes, whipping up banana‑spinach smoothies, and baking oatmeal‑honey granola bars with almonds, frequently
    experimenting with roasted chickpeas seasoned with smoked paprika while organizing LEGO pieces on the kitchen table, though they sometimes over‑salt their pasta sauce in the quest for bold flavor.
  core: James Kennedy is a quietly driven ten‑year‑old who transforms solitary curiosity into LEGO engineering, Scratch coding, and detailed wildlife journals, yet often battles worry‑filled spirals that
    they soothe with endless journaling and occasional over‑snacking on sugary cereal.
background:
  cultural: James was raised in a white, middle‑class family in College Place, Washington, a small town in the agricultural heart of the Walla Walla Valley. The region’s strong ties to farming, outdoor
    recreation, and community organizations such as 4‑H and the Boy Scouts have shaped his values of self‑reliance, practicality, and an appreciation for the natural environment. Local school curricula
    emphasize hands‑on science and technology projects, which align with his curiosity and practical mindset. Community life revolves around seasonal festivals, school events, and a quiet, close‑knit atmosphere
    that complements his preference for solitude. He celebrates typical American holidays and has been exposed to the Pacific Northwest’s cultural emphasis on environmental stewardship and modest, hard‑working
    ethos.
attributes:
  skills: '["Advanced reading comprehension", "Basic programming with Scratch", "LEGO model construction", "Science experiment design", "Digital illustration", "Organizational planning for projects"]'
  hobbies: '["Reading science fiction and natural history", "Building LEGO models", "Birdwatching and nature journaling", "Programming simple games in Scratch", "Journaling for stress relief", "Digital
    sketching of inventions"]'
  career_goals: James dreams of eventually becoming a robotics engineer who can develop tools that help local farms operate more efficiently. He is also fascinated by wildlife and imagines a future as a
    conservation biologist studying the birds of the Pacific Northwest. In the short term, he aims to excel in middle school science and math, earn a spot in his school's robotics club, and win a regional
    science fair. He aspires to attend a university with strong engineering or environmental programs, where he can combine his curiosity for new ideas with practical problem‑solving to make a tangible
    impact.
