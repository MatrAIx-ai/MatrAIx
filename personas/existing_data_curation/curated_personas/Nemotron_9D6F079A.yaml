  career_goals: Victor’s teachers and parents notice his fascination with space, machines, and helping living things. He often talks about becoming an astronaut who builds rockets that can explore new planets
    and bring back helpful inventions. He also expresses a desire to be a veterinarian because he loves caring for animals. Overall, his long‑term goal is to work in a STEM field—such as engineering or
    science—where he can create practical solutions that benefit people and the environment, reflecting his blend of curiosity and practicality.
