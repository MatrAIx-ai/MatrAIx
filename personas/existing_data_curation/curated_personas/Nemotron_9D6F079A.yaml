personas:
  professional: Victor Page is a budding junior scientist who loves exploring how toys work, constantly asking “why,” yet prefers hands‑on experiments over long worksheets, balancing their natural curiosity
    with a practical focus on building things that actually function.
  sports: Victor Page dashes around the local park as a member of the Tiny Lions Soccer Club, cheering for the New York Yankees during family game nights, and gravitates toward spontaneous games of tag
    over structured practice, preferring the joy of movement to regimented schedules.
  arts: Victor Page spends afternoons drawing dinosaurs with bright crayons, singing along to the Frozen soundtrack and the Sesame Street theme, and idolizes the playful artistry of Dr. Seuss, weaving imagination
    into every doodle and dance.
  travel: Victor Page dreams of revisiting Disneyland for the fireworks, has already collected seashells on a beach trip to Florida, and eagerly awaits a family road trip to the Grand Canyon, preferring
    short, adventure‑filled outings over long, organized tours.
  culinary: Victor Page devours macaroni and cheese with hidden peas, crafts peanut‑butter‑jelly sandwiches shaped like stars, and squeals over strawberry‑topped mini pancakes, proudly calling themselves
    a “little chef” despite frequent kitchen messes.
  core: Victor Page is a curious, practical five‑year‑old who balances spontaneous play with occasional disciplined projects, often trading a tidy space for a trail of creative clutter.
background:
  cultural: Victor is a white American child raised in the suburban community of Orange, California. His family follows typical middle‑class American customs, celebrating holidays such as Thanksgiving,
    Christmas, and the Fourth of July with gatherings, meals, and community events. Growing up in Orange County, he is exposed to the region’s cultural diversity, enjoying foods like tacos and sushi at
    local festivals and hearing bits of Spanish and other languages in the neighborhood. His parents encourage curiosity and practical learning, enrolling him in a local preschool that emphasizes hands‑on
    activities, outdoor play, and social cooperation. The blend of mainstream American traditions and the multicultural environment of Southern California shapes his worldview and interests.
