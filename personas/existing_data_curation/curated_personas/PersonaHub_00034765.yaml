persona_description: A maritime safety professional who is interested in learning about the latest maritime accidents and the lessons learned from them. They are a member of the National Transportation
  Safety Board (NTSB) and are responsible for investigating major marine causalities upon the navigable waters of the U.S. and accidents involving U.S.-flagged vessels worldwide. They are looking for a
  comprehensive report that details the lessons learned from maritime accidents involving contact with fixed objects, sinkings, collisions, fires, explosions, flooding, groundings and capsizings. They are
  also interested in the Safer Seas Digest 2020, which is a compendium of the agency’s maritime accident investigations involving loss of life, injuries and significant property damage completed in 2020.
  They are looking for a print version of the report and access to the online version of the report.
