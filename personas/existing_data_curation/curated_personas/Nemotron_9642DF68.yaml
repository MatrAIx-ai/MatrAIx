  career_goals: James aims to land a full‑time role in data analytics or applied engineering where he can blend his technical skills with collaborative teamwork. He hopes to earn certifications in data
    science and project management within the next two years, positioning himself for a future team‑lead or junior manager role. He also wants to build a professional network in the Indianapolis‑Columbus
    corridor, contribute to community tech workshops, and eventually have the financial stability to start a small side venture focused on DIY electronics kits.
