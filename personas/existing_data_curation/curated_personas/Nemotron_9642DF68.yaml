personas:
  professional: James Roman is an emerging data analyst with a STEM bachelor’s degree who leverages Python, SQL, and R to turn messy datasets into actionable insights, while their love for structured project
    plans and hands‑on maker meetups fuels a collaborative, yet flexible work style that thrives on group problem‑solving and occasional improvisation.
  sports: James Roman is a weekend athlete who joins pickup basketball and ultimate frisbee games at Indy parks, cheers on the Indiana Pacers and Columbus Crew, hikes the Hoosier National Forest trails
    each Saturday, and belongs to a local recreational sports league that meets every Thursday evening.
  arts: James Roman is a live‑music enthusiast who regularly attends shows at the Downtown Symphony Hall featuring acts like The Strokes and local indie folk band The Rivertones, streams multiplayer games
    with friends after gigs, and enjoys browsing the Indianapolis Museum of Art for modern sculpture inspiration.
  travel: James Roman prefers short, budget‑friendly road trips that combine hiking in the Great Smoky Mountains with weekend visits to craft‑beer towns like Asheville, while dreaming of a future backpacking
    adventure through the Pacific Northwest, balancing a love for spontaneous discovery with the need to keep travel costs low for their side‑venture savings.
  culinary: James Roman loves cooking collaborative meals, especially whipping up homemade pizza with fresh mozzarella, pepperoni, and rosemary, experimenting with a 3D‑printed garnish for a chicken tikka
    masala, and sourcing seasonal vegetables from the local farmer’s market for a weekend brunch spread.
  core: James Roman blends a data‑driven mind with an energetic social life, often juggling spreadsheets, sports, and maker projects, while occasionally forgetting to pay a bill on time because their spontaneous
    weekend plans take precedence.
background:
  cultural: James grew up in Columbus, Indiana, in a middle‑class family of mixed German and Irish ancestry common to many Midwestern White households. His upbringing emphasized practical work ethic, modesty,
    and a friendly, neighborly attitude. Local traditions such as high school sports, county fairs, and church gatherings shaped his community‑oriented values. He identifies with mainstream American culture,
    enjoys regional foods like pork tenderloin sandwiches, and holds a pragmatic outlook grounded in the Midwestern emphasis on reliability and cooperation.
