personas:
  professional: Corey Taylor, a 23‑year‑old tech‑enabled services founder, channels their high sociability and quick‑wit into high‑energy pitch decks, rapid market assessments, and improvisational crisis
    management, while delegating operational minutiae to keep pace with spontaneous growth goals.
  sports: Corey Taylor fuels their adrenaline through weekly skate‑park sessions, competitive Valorant tournaments, and membership in the Atlanta Spinners ultimate frisbee club, all while passionately cheering
    on the Atlanta Falcons during football season and the Atlanta Hawks throughout the NBA playoffs.
  arts: Corey Taylor, an avid improvisational comedy enthusiast, frequents The Masquerade to discover emerging acts by artists such as Tame Impala and Halsey, devours stand‑up specials from Dave Chappelle,
    and records nightly reflections for a personal podcast inspired by the storytelling style of Malcolm Gladwell.
  travel: Corey Taylor embarks on spontaneous road‑trip escapades across the Southern corridor—buzzing through Nashville, Austin, and the Great Smoky Mountains—while day‑dreaming about an Icelandic adventure
    to chase the northern lights, favoring last‑minute Airbnb bookings over rigid itineraries despite a tight startup budget.
  culinary: Corey Taylor, a self‑taught kitchen improviser, oscillates between whipping up quick avocado‑toast‑like brunch bowls and devouring street‑food staples such as Korean BBQ tacos and ramen after
    late‑night networking, always chasing the umami kick of miso and the heat of serrano peppers while sipping craft IPA.
  core: Corey Taylor thrives on the edge of chaos, converting social buzz into business momentum while juggling intense anxiety, impulsive spending, and a chronic habit of over‑promising and under‑delivering
    on deadlines.
background:
  cultural: Corey grew up in a middle‑class family in central Texas and now lives in the college town of College Station. His upbringing blends Southern hospitality, independent‑thinker ethos, and the entrepreneurial
    vibe of a university‑anchored community. He identifies with a broadly American white cultural heritage while being shaped by Texas's emphasis on self‑reliance, informal social networks, and a love of
    sports and music. Exposure to the diverse student body at Texas A&M has broadened his outlook, giving him a mix of traditional Southern values and a modern, tech‑savvy perspective.
attributes:
  skills: '[''Strategic visioning'', ''Market assessment'', ''Sales negotiation'', ''Public speaking'', ''Networking'', ''Brand storytelling'', ''Data-driven decision making'', ''Crisis improvisation'',
