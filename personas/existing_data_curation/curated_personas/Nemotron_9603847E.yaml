  hobbies: '[''Networking mixers'', ''Improv comedy workshops'', ''Competitive multiplayer gaming'', ''Spontaneous road trips'', ''Basketball games'', ''Live music concerts'', ''Reading tech and business
    blogs'', ''DIY cocktail mixing'', ''Journaling'', ''Mindfulness meditation'']'
  career_goals: Corey is driven to transform his fledgling venture into a nationally recognized brand, securing venture‑capital funding within the next two years and expanding into multiple markets across
    the South. He aspires to become a recognized thought leader in the tech‑enabled services sector, delivering keynote talks at industry conferences and building a personal media platform. While he values
    rapid growth, he also seeks to maintain the creative freedom and spontaneous lifestyle that fuel his entrepreneurial spirit.
