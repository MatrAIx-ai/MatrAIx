personas:
  professional: At three years old, Bernice Stockard, in imaginative play, acts as a miniature store manager, meticulously arranging toy shelves while flexibly improvising when friends introduce new toys,
    showcasing their blend of curiosity and practicality.
  sports: At three years old, Bernice Stockard loves to chase balls at the local park, participates in a toddler soccer class that cheers for the Portland Timbers' mascot, and they often wear a miniature
    Timbers jersey during family outings.
  arts: At three years old, Bernice Stockard spends afternoons finger-painting vibrant scenes inspired by their favorite animated film The Little Mermaid, sings along to Raffi's "Baby Beluga", and they
    delight in building block sculptures of characters from Sesame Street, weaving creativity into everyday play.
  travel: At three years old, Bernice Stockard's travel log includes weekend trips to the nearby zoo, a sun-soaked family vacation at Myrtle Beach, and a dream of visiting Disneyland, preferring short,
    parent-guided excursions that balance new sights with familiar comfort, and they often request a stuffed animal for the journey.
  culinary: At three years old, Bernice Stockard adores crunchy chicken nuggets, buttery macaroni and cheese, and strawberry-banana fruit kebabs, often helping stir pancake batter with a tiny wooden spoon
    while stubbornly refusing any side of broccoli, and they proudly display a napkin as a makeshift cape during meals.
  core: At three years old, Bernice Stockard, a curious yet practical explorer, lines up toys in perfect order, yet delights in spontaneous messes, and they're famous among friends for stashing glitter
    stickers that surface during playtime.
background:
  cultural: Bernice is raised in a White, Southern, middle‑class family in Villa Rica, a small town in Carroll County, Georgia. Her family upholds traditional Southern values such as hospitality, close‑knit
    family ties, and regular church attendance, attending a local preschool that incorporates Christian teachings and community service. Community life includes family picnics, trips to the county fair,
    and Sunday breakfasts featuring Southern comfort foods like biscuits, peach slices, and fried chicken. The warm climate encourages year‑round outdoor play, and she often hears a gentle Southern accent
    at home. Local culture also emphasizes politeness, respect for elders, and participation in neighborhood events, all of which shape her early worldview.
attributes:
  skills: '["Fine motor coordination (stacking Mega Bloks, coloring)", "Gross motor coordination (running, climbing playground equipment)", "Early language and communication", "Basic self‑care (dressing,
    feeding with minimal assistance)", "Simple problem solving (puzzles, shape sorters)", "Following routines and organizing toys", "Social sharing and turn‑taking", "Assertive expression of preferences"]'
  hobbies: '["Building with Mega Bloks", "Coloring and drawing", "Listening to and narrating stories", "Singing nursery rhymes and dancing", "Outdoor exploration (collecting leaves, rocks, pinecones)",
    "Pretend play (doctor, teacher, veterinarian)"]'
  career_goals: Bernice loves pretending to be a teacher, a veterinarian, and an astronaut. She often says she wants to "help animals" and "teach kids to read," showing an early desire to care for others.
    While she enjoys exploring new ideas through imaginative play, she also values learning step by step, aiming to master reading picture books and counting. In the future, she dreams of becoming someone
    who can both explore the world—perhaps as an astronaut—and make a difference in her community, such as a teacher or a doctor.
