  career_goals: Benjamin dreams of becoming a community helper—he often says he wants to be a firefighter because he likes the idea of keeping people safe and helping others. He also imagines being a teacher
    one day, sharing stories and helping younger kids learn, reflecting his compassionate and cooperative nature.
