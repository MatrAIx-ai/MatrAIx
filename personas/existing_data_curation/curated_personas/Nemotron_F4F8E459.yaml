  hobbies: '["Traditional Mexican Cooking", "Family Gatherings", "Church Activities", "Gardening", "Reading Mystery Novels", "Listening to Mariachi Music", "Walking Her Dog", "Quilting", "Volunteer Work
    at Community Center", "Crafting (Embroidery, Papel Picado)", "Attending Local Cultural Festivals"]'
  career_goals: Farida aims to advance to a senior bookkeeping supervisor role within the next three years, where she can lead a small team and oversee the full accounting cycle for a growing local business.
    She plans to earn a QuickBooks Certified ProAdvisor credential and complete a community-college bookkeeping certificate to formalize her expertise. Long-term, she envisions launching a part-time freelance
    bookkeeping service that caters to Mexican-owned enterprises in San Antonio, providing affordable, bilingual financial support while maintaining a stable retirement fund for her family.
