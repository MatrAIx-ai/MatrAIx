personas:
  professional: Desiree Ruiz is a computer support specialist who leverages their methodical problem-solving and organized documentation to resolve Windows, macOS, and Linux issues efficiently while delivering
    empathetic step-by-step guidance to end-users.
  sports: Desiree Ruiz stays fit by hiking the Middlesex Fells with the Boston Hiking Club, practicing weekly yoga at a downtown studio, and following the Boston Red Sox, Boston Celtics, and New England
    Patriots, weaving seasonal fandom into a balanced active lifestyle.
  arts: Desiree Ruiz curates playlists that blend classic cumbia icons like Celso Piña with indie acts such as Tame Impala and Vampire Weekend, devotes weekend evenings to reading thriller novels by Gillian
    Flynn, and enjoys indie film festivals featuring works by directors like Guillermo del Toro, allowing artistic variety to shape their leisure.
  travel: Desiree Ruiz plans trips with meticulous itineraries using Google Sheets, prefers a mix of cultural exploration and relaxation, has trekked the historic streets of New York City and the Old Port
    of Montreal, and now dreams of savoring Barcelona’s architecture and Kyoto’s cherry blossoms on a future overseas adventure.
  culinary: Desiree Ruiz prides themselves on mastering traditional Salvadoran comfort foods like freshly made pupusas stuffed with loroco and cheese, slow-cooked tamales, and crispy yuca frita, while also
    experimenting with herb-infused olive oil from their balcony garden and pairing meals with homemade curtido and ripe avocado.
  core: Desiree Ruiz blends a love for orderly tech support with a playful obsession for puzzles, balancing disciplined budgeting and methodical work habits with occasional culinary splurges and a nightly
    journaling routine.
background:
  cultural: Desiree is a first‑generation Salvadoran‑American; her parents immigrated to the United States in the 1990s. She grew up bilingual, speaking Spanish at home and English at school, which gives
    her fluency in both languages and a deep connection to her heritage. Salvadoran traditions—strong family ties, respect for elders, Catholic celebrations like Día de la Independencia and Semana Santa—shape
    her values of reliability, practicality, and community support. She actively participates in the Salvadoran community in Greater Boston, attending Spanish‑language church services, celebrating cultural
    holidays, and cooking traditional meals for gatherings. This cultural grounding coexists with her integration into the broader Medford environment, where she balances her heritage with American professional
    norms and local civic life.
