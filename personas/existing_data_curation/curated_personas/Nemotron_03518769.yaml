  career_goals: 'Desiree aims to deepen her expertise and advance within the IT support field while maintaining the stability and routine she values. In the next two years she plans to earn CompTIA Network+
    and Microsoft Certified: Modern Desktop Administrator certifications, followed by a Cisco CCNA to broaden her networking knowledge. Her short‑term goal is to become a senior computer support specialist,
    taking on mentorship responsibilities and leading a small support team. Long‑term, she aspires to transition into a network administration or cybersecurity analyst role, leveraging her methodical problem‑solving
    skills. She is also considering a part‑time master’s program in Information Technology to supplement her practical experience with advanced theory.'
