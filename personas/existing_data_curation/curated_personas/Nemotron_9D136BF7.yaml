personas:
  professional: Lina Ruizsantiago is a tiny architect in training, arranging wooden blocks into orderly houses and bridges, showcasing a love for structure and predictability while they delight in group
    play with friends.
  sports: Lina Ruizsantiago splashes in toddler swim lessons at the community pool, kicks a soft soccer ball with the Kamehameha Little Hawks mini‑team, and they cheer for the Hawai‘i Rainbow Warriors while
    balancing energetic play with a love for routine drills.
  arts: Lina Ruizsantiago dances to the lullabies of Luis Miguel and the soothing ukulele strums of Israel Kamakawiwo'ole, loves finger‑painting bright sunflowers, and they often reenact hula movements
    learned during Lei Day celebrations, absorbing cultural rhythms into everyday play.
  travel: Lina Ruizsantiago loves short family road trips to the Dole Plantation on O‘ahu and weekend stays at a beachfront resort in Maui, preferring familiar sandy beaches where they can build sandcastles
    in a predictable routine, while dreaming of a future visit to Spain’s coastal towns.
  culinary: Lina Ruizsantiago enjoys the sweet taste of mango slices and the salty charm of mini paella bites made by their mother, can already stir a bowl of rice with a plastic spoon, and they insist
    on sprinkling shredded cheese over everything, often asking for extra ketchup.
  core: Lina Ruizsantiago is a lively, structure‑loving three‑year‑old who turns everyday chores into playful organization, saves coins like a mini‑banker, and mixes Spanish lullabies with Hawaiian hula,
    all while they stubbornly refuse bedtime without a sticker reward.
background:
  cultural: 'Lina is raised in a Spanish‑heritage household in Pearl City, Hawai‘i. At home she hears Spanish lullabies, celebrates traditional holidays like Día de los Muertos and Navidad, and enjoys family
    meals with dishes such as paella and arroz con frijoles. Living on O‘ahu exposes her to the island’s multicultural rhythm: she participates in local events like Lei Day and Hula performances, learns
    simple Hawaiian words (e.g., aloha, mahalo), and enjoys the beach culture. Her bilingual environment and the diverse community of Pearl City foster an appreciation for both her Spanish roots and the
    Hawaiian‑Pacific way of life.'
attributes:
  skills: '[''Fine‑motor coordination (drawing, coloring, block stacking)'', ''Gross‑motor abilities (running, climbing, dancing)'', ''Bilingual vocabulary (Spanish & English)'', ''Following two‑step instructions'',
    ''Adherence to daily routines'', ''Social sharing and turn‑taking'', ''Cooperative group play'', ''Simple problem‑solving (shape matching, puzzles)'']'
  hobbies: '[''Group story time'', ''Singing and dancing to songs'', ''Block building'', ''Sand and beach exploration'', ''Coloring and sticker crafts'', ''Interactive games (Simon Says, Duck, Duck, Goose)'',
    ''Watching educational cartoons'']'
  career_goals: Lina often imagines becoming a teacher who helps other kids learn, a nurse who makes people feel better, or a dancer who brings smiles to friends' faces. She is drawn to roles that involve
    caring for others, sharing knowledge, and performing in front of an audience. As she grows, she hopes to remain a friendly, helpful community member and eventually work in a profession that blends her
    love for people, structure, and creativity.
