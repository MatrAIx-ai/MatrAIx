  career_goals: Although retired, Amilcar aims to give back to his community by volunteering at the local senior center, preserving oral histories of Aguas Buenas, and mentoring youths interested in trade
    skills. He hopes to launch a modest home‑based venture selling homemade guava jam and handcrafted wooden items, and to compile his family’s genealogy for future generations.
