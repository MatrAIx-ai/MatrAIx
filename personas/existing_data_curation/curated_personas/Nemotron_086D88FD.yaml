  hobbies: '["Hiking", "Birdwatching", "Fishing", "Landscape photography", "Gardening", "Historical fiction reading", "Quilting", "Canoeing with small groups", "DIY woodworking", "Cooking Texan meals"]'
  career_goals: Jeannine aims to move from hands‑on recreation work to a supervisory role within the Erath County Parks and Recreation department. She plans to earn an associate’s degree in recreation management
    and obtain a Certified Park and Recreation Professional (CPRP) credential. Her ambition is to design county‑wide youth outreach programs that blend traditional outdoor activities with emerging trends
    such as eco‑education and low‑tech adventure challenges, thereby increasing participation rates. Long‑term, she envisions becoming a recreation director overseeing multiple sites and eventually launching
    a small venture offering guided wilderness experiences for small groups, leveraging her practical expertise and competitive drive to become a respected community leader.
