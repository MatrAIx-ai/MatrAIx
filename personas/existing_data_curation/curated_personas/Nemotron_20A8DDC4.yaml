personas:
  professional: Joaquin is a budding environmental technologist in the making, they blend a curiosity for science, hands‑on experience from volunteering at a community garden, and a collaborative spirit
    to lead their school’s new green‑tech club, all while juggling a laid‑back attitude toward homework that sometimes leads to missed deadlines.
  sports: Joaquin plays forward for the Kannapolis United Soccer Club and spends weekends perfecting tricks at the Eastside Skate Park, they idolize Lionel Messi’s creativity, follow Charlotte FC for inspiration,
    and balance competitive practice with a flexible, low‑pressure attitude toward training.
  arts: Joaquin grooves to Latin pop icons like Bad Bunny and J Balvin, they often sketch album‑cover ideas in their journal, experiment with Minecraft music mods, and occasionally attend community theater
    productions to broaden their creative horizons.
  travel: Joaquin dreams of alternating weekend road trips to the Great Smoky Mountains with family vacations to a tropical coastal town where they learn to surf, they plan trips with a mix of spontaneous
    spur‑of‑the‑moment decisions and careful budgeting, all while navigating school schedules.
  culinary: Joaquin delights in the fragrant blend of black beans, rice, and cilantro in gallo pinto, they sometimes add plantain chips for crunch or a dash of hot sauce for a spicy twist, while also indulging
    in classic American pizza and chicken nuggets as comfort foods during gaming marathons.
  core: Joaquin balances a restless curiosity for building and science with a laid‑back, sometimes disorganized lifestyle, they juggle Minecraft creations, soccer drills, and anxious journaling, all while
    never quite mastering a strict schedule.
background:
  cultural: Joaquin’s cultural identity is rooted in his Costa Rican heritage, which his family maintains through language, food, and celebrations like Día de la Independencia. Growing up in Kannapolis,
    North Carolina, he navigates a blend of Central American traditions and Southern American culture. He speaks Spanish at home, ensuring fluency, while his school and social life are primarily English‑based.
    He values family cohesion, respects the warmth and hospitality typical of Costa Rican families, and often shares stories of his grandparents’ village life with friends, fostering cross‑cultural understanding
    in his community.
