  career_goals: Joaquin aims to pursue a college degree that blends his desire to help others with his growing interest in technology. He is considering majors such as social work, community health, or
    computer science with a focus on educational apps. His long‑term ambition is to create digital tools or community programs that support youth mental health and immigrant families, leveraging his bilingual
    background and compassionate nature. He also envisions working part‑time as a youth mentor or a volunteer coordinator while gaining further technical expertise.
