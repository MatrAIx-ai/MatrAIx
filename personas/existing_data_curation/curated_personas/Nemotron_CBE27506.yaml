  career_goals: Dale aspires to become a multidisciplinary multimedia artist and creative director, eventually building an independent art collective that offers workshops and mentorship for other teens
    in Anoka County. He plans to complete his GED and enroll in a community college program for digital media or graphic design, aiming to develop a professional portfolio that could lead to admission at
    a specialized art institute. Long‑term, he hopes to fuse his love of abstract concepts with technology by working in game design or interactive installation art, while also giving back to his community
    by teaching art and organizing public art projects that celebrate the Twin Cities’ vibrant cultural scene.
