  hobbies: '[''Gardening'', ''Reading Historical Fiction'', ''Crocheting'', ''Jazz and Soul Music Appreciation'', ''Small Book Club (African‑American Literature)'', ''Volunteer Computer Tutor at Public
    Library'', ''Genealogy Research'', ''Cooking Traditional Southern Dishes'']'
  career_goals: As she approaches retirement, Nadia aims to leverage her curiosity for new office technologies while preserving the reliable processes she values. Her primary goal is to transition into
    a part‑time consulting role where she can mentor emerging administrative professionals, especially those from underrepresented backgrounds, and help small non‑profits streamline their operations. She
    is also pursuing a Certified Administrative Professional (CAP) credential to formalize her expertise. Additionally, Nadia hopes to design a low‑stress workflow toolkit that integrates mindfulness practices,
    allowing her to address her own sensitivity to stress and share supportive strategies with colleagues. Ultimately, she wishes to leave a lasting legacy of efficient, compassionate workplace practices
    within the Moreno Valley community.
