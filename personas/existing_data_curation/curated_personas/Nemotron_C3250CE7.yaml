personas:
  professional: A retired handyman and community mediator, Calby Rodriguez blends hands‑on carpentry, gardening, and cooking expertise with a spontaneous, practical mindset, using their curiosity to improvise
    repairs and mentor neighbors while shunning rigid schedules.
  sports: A casual fitness enthusiast, Calby Rodriguez enjoys weekday walks with the Whittier Senior Walkers club and tunes in to Los Angeles Dodgers baseball, Los Angeles Lakers basketball, and occasional
    LA Galaxy soccer matches, preferring low‑impact activity over competitive sports.
  arts: An avid music lover, Calby Rodriguez fills their kitchen with the sounds of Banda El Recodo, Vicente Fernández, and Los Tigres del Norte while storytelling at the community center, letting these
    artists and oral traditions shape their identity and provide a soundtrack to daily chores.
  travel: Adventure‑leaning yet budget‑conscious, Calby Rodriguez favors road trips to nearby coastal towns like Santa Monica and weekend stays in historic Santa Barbara, while dreaming of a pilgrimage
    to Oaxaca’s markets, planning trips around family schedules and modest savings.
  culinary: A seasoned home chef, Calby Rodriguez masterfully prepares tamales, pozole, and carnitas, experimenting with heirloom chilies, fresh cilantro, and roasted tomatillos to give classic dishes new
    twists, and relishes sharing meals at family gatherings.
  core: Calby Rodriguez is a pragmatic storyteller who cultivates pepper gardens, builds birdhouses, and cooks festive feasts, balancing spontaneous curiosity with a relaxed approach to deadlines, and occasionally
    forgets to water the plants while humming Banda tunes.
background:
  cultural: Calby’s identity is rooted in a bicultural Mexican‑American experience. His parents emigrated from rural Jalisco in the 1940s, bringing traditions of Catholicism, communal celebrations, and
    Mexican cuisine that shaped his upbringing in Whittier. He grew up speaking Spanish at home, celebrating Día de los Muertos, quinceañeras, and Saturday family meals centered on mole and tamales. The
    close‑knit Mexican community in Whittier reinforced values of family loyalty, respect for elders, and mutual assistance. Over the decades, Calby blended these customs with the everyday rhythms of Southern
    California life—participating in local parades, supporting the neighborhood church, and adapting traditional dishes with the flavors and ingredients of his Californian surroundings. His cultural background
    informs his language, food, storytelling, and community engagement, creating a bridge between his heritage and the broader American context.
