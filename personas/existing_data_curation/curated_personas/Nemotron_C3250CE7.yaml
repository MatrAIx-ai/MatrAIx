  career_goals: Although retired, Calby remains driven to stay active and purposeful. He hopes to mentor his grandchildren in cooking and gardening, passing on his culinary and horticultural skills. He
    aims to volunteer regularly at his parish, assisting with maintenance projects and helping organize small cultural events, especially Día de los Muertos altars. He would like to learn basic digital
    tools—email and video calls—to keep closer contact with family scattered across the country. Lastly, he aspires to write a short memoir of his life as a Mexican‑American in Whittier, preserving his
    personal and community history for future generations.
