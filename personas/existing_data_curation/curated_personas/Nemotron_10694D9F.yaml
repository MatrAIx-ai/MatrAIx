personas:
  professional: Paola Alvarezorozco is an aspiring health information management student who leverages bilingual fluency and strong Excel data analysis skills to volunteer as a math tutor and coordinate
    community events, while meticulously planning a future as a certified medical coder in a clinic serving Spanish-speaking families.
  sports: Paola Alvarezorozco follows the Modesto Nuts minor-league baseball team and the Golden State Warriors, attends weekly Hatha yoga classes for flexibility, and hikes the nearby McSwain Canyon trail
    with a close friend on weekends, preferring low-key physical activity over crowded gyms.
  arts: Paola Alvarezorozco is a budding digital photographer who captures the colorful street processions during community festivals, edits images in Lightroom, relaxes to Latin pop artists like Bad Bunny
    and Shakira, and spends quiet evenings crocheting scarves as personalized gifts.
  travel: Paola Alvarezorozco plans trips with spreadsheets, enjoys weekend road trips to Yosemite National Park for scenic hikes, cherishes a recent cultural immersion visit to Oaxaca to experience Día
    de los Muertos celebrations, and dreams of a future study-abroad semester in Florence, Italy, balancing budget constraints with a love for history.
  culinary: Paola Alvarezorozco loves preparing authentic tamales, mole poblano, and fresh salsa verde using cilantro and chilies harvested from their garden, excels at measuring ingredients for consistent
    flavor, and occasionally over-salts dishes when experimenting with new family recipes.
  core: Paola Alvarezorozco balances meticulous spreadsheets, a quiet love for gardening and cooking, and devoted community service, while occasionally indulging in coffee splurges and over-committing to
    volunteer events.
background:
  cultural: Paola is a first‑generation Mexican‑American raised in Modesto, California. She grew up in a bilingual household where Spanish was spoken daily, and she attended a school program that emphasized
    both languages. Mexican traditions such as Día de los Muertos, making tamales with her grandmother, and attending Mass at the local Catholic church are integral parts of her life. She maintains strong
    ties to the local Mexican community through church events and volunteer work at a community center. Her cultural heritage fuels her desire to give back, particularly by supporting health and educational
    services for fellow Mexican families in the region.
