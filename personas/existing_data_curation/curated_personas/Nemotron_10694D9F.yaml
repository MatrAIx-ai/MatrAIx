  career_goals: Paola plans to enroll in a community college to earn an Associate's degree in Business Administration or Health Information Management, with the goal of becoming a certified medical coder
    or office administrator. She seeks a stable, structured work environment where her detail‑oriented, methodical approach can add value. Leveraging her bilingual skills, she aims to work in a clinic or
    organization that serves the Mexican community in the Central Valley, providing reliable administrative support while contributing to her family's financial stability.
