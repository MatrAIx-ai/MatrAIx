personas:
  professional: Joel Jimenez, a budding comic‑strip creator and LEGO city architect, transforms playground observations into vibrant panels and intricate brick layouts, harnessing their boundless curiosity
    and love for storytelling while thriving on the energy of friends and the freedom of spontaneous play.
  sports: Joel Jimenez, an enthusiastic member of the River Rapids Junior Soccer Club, spends weekends dribbling on the field, biking the neighborhood park, cheering for the Los Angeles Lakers and the San
    Jose Earthquakes, and approaches fitness through playful challenges, though their relaxed outlook occasionally leads them to skip pre‑game warm‑ups.
  arts: Joel Jimenez, a comic‑strip enthusiast, idolizes Stan Lee’s storytelling, draws inspiration from Pixar’s “Toy Story” and Hayao Miyazaki’s whimsical animation, and can recite the lyrics of They Might Be Giants’
    “Birdhouse in Your Soul” while sketching, turning every free moment into a personal art gallery.
  travel: Joel Jimenez, a curious explorer, loves weekend trips to the local botanical garden and annual family outings to Disneyland, dreams of boarding a plane to Tokyo’s Ghibli Museum and hiking the
    Grand Canyon, and plans spontaneous day adventures with friends, though their packing skills are as chaotic as their LEGO shelves.
  culinary: Joel Jimenez, a budding kitchen helper, prefers pepperoni pizza with extra mozzarella, homemade cheese quesadillas with fresh salsa, and strawberry‑banana smoothies, can whisk a batch of chocolate
    chip cookies using just enough sugar and a dash of imagination, yet they often leave crumbs on the counter and forget to rinse the mixing bowl.
  core: Joel Jimenez, the talkative nine‑year‑old who turns playground chatter into comic adventures, hoards stickers like treasure, juggles spontaneous experiments with endless imagination, and keeps their
    backpack perpetually a mess, is the friendly spark that lights up any room.
background:
  cultural: Joel is a white boy raised in Excelsior Springs, a small town in Ray County, Missouri. His upbringing reflects typical Midwestern values of friendliness, modesty, and community involvement.
    He often participates in local events such as the county fair, church gatherings, library storytimes, and school‑sponsored art projects, which expose him to a mix of traditional American culture and
    creative arts. His family’s roots trace back to generations of Midwestern farming and small‑town retail, fostering a grounded sense of responsibility while encouraging curiosity, openness to new ideas,
    and a love of shared experiences.
