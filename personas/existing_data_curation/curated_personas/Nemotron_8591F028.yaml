  career_goals: Although only nine, Joel already dreams of turning his love for art and people into a future career. He imagines himself as a children's TV show creator, a museum guide who shares stories
    behind artworks, or an elementary school teacher who uses drawing and interactive tech to make learning fun. He also hopes to start a kid‑friendly YouTube channel where he can share art tutorials, simple
    science demos, and jokes, hoping to bring smiles to other kids and inspire curiosity while enjoying a flexible, creative work style.
