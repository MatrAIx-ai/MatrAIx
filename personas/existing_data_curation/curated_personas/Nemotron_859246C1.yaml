  hobbies: '[''cooking Louisiana cuisine'', ''reading historical fiction'', ''gardening'', ''volunteering at church food pantry'', ''youth art mentorship'', ''watercolor painting'', ''quilting'', ''listening
    to jazz music'', ''attending community festivals'', ''collecting vintage gospel and soul vinyl'']'
  career_goals: Shaina aims to expand her solo contracting work into a modest, family‑owned painting and paper‑hanging business that specializes in sustainable finishes and historic home restorations in
    the Greater New Orleans area. Over the next three to five years she plans to earn a Master Painter certification, develop a niche service offering eco‑friendly paint solutions, and build a reliable
    network of trusted subcontractors. She hopes to become a mentor and advocate for young people—especially women of color—entering skilled trades by partnering with local vocational programs and the parish
    trade union. Ultimately she envisions transitioning into a consulting role that blends her hands‑on expertise with interior design advice while providing a steady income that supports her family and
    community initiatives.
