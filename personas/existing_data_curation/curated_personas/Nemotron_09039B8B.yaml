  career_goals: Justin aims to deepen his expertise in threat hunting and advanced incident response while earning industry certifications such as CISSP, OSCP, and CISM. Over the next five years, he envisions
    transitioning into a senior security engineer role where he can design and lead comprehensive security architectures for critical infrastructure. Ultimately, he aspires to become a Chief Information
    Security Officer (CISO) for a mid‑size technology firm or government contractor, leveraging his organized leadership style to build resilient security programs and mentor emerging analysts.
