personas:
  professional: Justin Potter, a meticulous information security analyst, leverages their methodical mindset, network security expertise, and automation skills in Python and PowerShell to build robust SIEM
    configurations, conduct thorough risk assessments aligned with NIST and ISO 27001, and maintain detailed incident documentation, while their penchant for structure ensures reliable, repeatable security
    processes.
  sports: Justin Potter, an avid cyclist who rides the Annapolis waterfront in spring and summer, joins an intramural soccer league with the Annapolis Mariners during the fall, follows the Baltimore Ravens
    on Sundays and the Washington Capitals throughout the hockey season, and keeps a disciplined workout routine that blends weekend hikes in Patapsco Valley State Park with strength‑training sessions at
    the local gym.
  arts: Justin Potter, a dedicated sci‑fi aficionado who spends board‑game nights debating plot twists, finds inspiration in the novels of Isaac Asimov and Octavia Butler, enjoys the ambient synth soundtracks
    of Vangelis, attends occasional indie film screenings featuring directors like Denis Villeneuve, and unwinds to the guitar work of John Petrucci and the cinematic scores of Hans Zimmer.
  travel: Justin Potter, who balances a love for meticulous itinerary planning with spontaneous weekend getaways, has trekked the Blue Ridge Parkway, explored the historic streets of Boston, and taken a
    tech‑conference trip to Seattle, while dreaming of an immersive sci‑fi pilgrimage to Tokyo and a rugged adventure in Iceland's volcanic terrain.
  culinary: Justin Potter, an intermediate home cook who favors flavor‑packed dishes like Maryland crab cakes seasoned with Old Bay, homemade ramen broth infused with kombu and miso, and reheated leftovers
    spiced with sriracha and garlic, enjoys sourcing fresh herbs such as cilantro and basil from the local farmers market, and occasionally splurges on a craft‑beer pairing with spicy chicken wings at a
    neighborhood gastropub.
  core: Justin Potter, a methodical security analyst who swings between strategic gaming marathons and disciplined hikes, obsessively tracks every expense, combats occasional insomnia with late‑night coffee,
    and channels their love of sci‑fi into both work and play, all while never missing a Sunday Ravens game.
background:
  cultural: Justin grew up in a middle‑class suburban community in the Baltimore‑Washington corridor of Maryland, an area characterized by a pragmatic work ethic and strong community ties. His family emphasized
    education, reliability, and organized planning, values that are reflected in his methodical professional style. Exposed to the diverse cultural landscape of the region, he developed an appreciation
    for varied perspectives while maintaining a connection to traditional East‑Coast customs, such as celebrating local festivals, enjoying Chesapeake Bay seafood, and participating in community service.
    This blend of regional heritage and contemporary professional culture shapes his identity and informs his balanced approach to work and life.
attributes:
  skills: '["Network security monitoring","Vulnerability assessment","Penetration testing","Incident response and forensics","SIEM administration (Splunk, QRadar)","Risk assessment and compliance (NIST,
