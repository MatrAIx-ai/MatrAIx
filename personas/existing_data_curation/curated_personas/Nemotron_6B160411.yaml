  career_goals: Although retired, Alejandra aims to stay intellectually active by volunteering at local schools and senior centers, mentoring young educators, and documenting oral histories of the Mexican‑American
    community in Minneapolis. She hopes to publish a memoir of her teaching journey, advocate for inclusive education policies, and continue learning new crafts and languages.
