personas:
  professional: Alejandra Aviles, an 86‑year‑old retired elementary teacher, leverages decades of bilingual education expertise and a knack for hands‑on storytelling to mentor novice teachers and orchestrate
    community cultural celebrations, channeling her spontaneous curiosity into flexible lesson‑plan designs while occasionally battling her own disorganized tendencies.
  sports: Alejandra Aviles, an enthusiastic member of the local senior walking club, spends her mornings strolling through Minnehaha Park for birdwatching while cheering on the Minnesota Twins and Vikings
    on television, and joins a weekly folk‑dance circle that keeps her joints moving despite her osteoarthritis.
  arts: Alejandra Aviles, a lifelong admirer of the vibrant sounds of Mariachi Vargas de Tecalitlán and the murals of Diego Rivera displayed at the Minneapolis Institute of Art, frequently attends community
    folk‑dance performances and reads biographies of figures like Frida Kahlo, letting these artistic encounters color her storytelling workshops.
  travel: Alejandra Aviles favors spontaneous weekend getaways to nearby nature sanctuaries such as Cedar Creek Ecosystem Reserve and the historic St. Croix River Valley, while also cherishing past family
    trips to New Orleans and dreaming of a leisurely cruise along the Pacific coast of Canada, always balancing a modest travel budget with a love for cultural festivals.
  culinary: Alejandra Aviles, a seasoned home chef, lovingly prepares mole using dried pasilla and mulato chilies, chocolate, and garden‑grown tomatoes, rolls tamales with fresh masa and corn husks, and
    delights in pairing these dishes with cilantro from her own garden, though she sometimes over‑spices her salsa and forgets to label homemade sauces for later use.
  core: Alejandra Aviles, an 86‑year‑old retired teacher, blends curiosity, spontaneity, and community spirit into a vibrant life of gardening, storytelling, and cultural preservation, even as she wrestles
    with occasional disorganization and age‑related health challenges.
background:
  cultural: Alejandra was born in Jalisco, Mexico, and emigrated to the United States in her early twenties. She retains deep ties to Mexican traditions—celebrating Día de los Muertos, cooking regional
    cuisine, and speaking fluent Spanish—while also embracing the multicultural fabric of Minneapolis. As a member of the Hennepin County Mexican‑American community, she bridges her heritage with local
    customs, often sharing cultural stories and crafts with neighbors and younger generations.
