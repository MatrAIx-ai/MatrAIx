    scheduling'', ''Tool inventory organization'', ''Problem solving under pressure'']'
  hobbies: '[''Street art photography'', ''Sketching and digital illustration'', ''Competitive real‑time strategy gaming'', ''DIY smart‑home automation projects'', ''Fusion cooking experimenting with Indian
    spices'', ''Reading science‑fiction and technology blogs'', ''Attending local art gallery openings'', ''Urban cycling'', ''Volunteer mentorship for youth in trade skills'', ''Exploring independent music
    scenes'']'
  career_goals: Jignasha aims to become a certified Master HVAC Technician within the next three years, securing both EPA Section 608 certification and a New Jersey state contractor license. He plans to
    enroll in a community‑college HVAC program to earn an associate degree in building technology, strengthening his theoretical knowledge. In the medium term, he aspires to launch his own boutique HVAC
    firm focused on energy‑efficient and smart‑home solutions, integrating IoT thermostats and renewable‑energy compatible equipment. He also hopes to take on a mentorship role, guiding apprentices and
    eventually holding a leadership position within a local trade union, where he can advocate for skilled‑trade pathways for youth from his community.
