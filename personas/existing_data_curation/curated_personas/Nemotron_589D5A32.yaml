  career_goals: Although retired, Luat hopes to leave a lasting legacy by mentoring at‑risk youth in STEM, writing a memoir that blends his personal story with the evolution of technology, and applying
    his engineering knowledge to local sustainability projects such as low‑cost rainwater harvesting systems. He also aspires to be a cultural bridge in Alpine, organizing Southeast Asian heritage workshops
    and supporting senior‑center programs that promote mental well‑being.
