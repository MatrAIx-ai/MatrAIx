  career_goals: At 64, Tam aims to transition into a senior mentor and safety coordinator role where she can formally train new hires and promote a culture of occupational well‑being. She hopes to champion
    mental‑health awareness on the shop floor, using her compassionate nature to create supportive peer networks. Additionally, she aspires to develop ergonomic workflow solutions that reduce strain for
    her colleagues and to volunteer her technical knowledge at local community colleges and youth programs, leaving a lasting legacy of skill and empathy.
