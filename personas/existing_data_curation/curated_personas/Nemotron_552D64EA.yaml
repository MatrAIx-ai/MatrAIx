personas:
  professional: Tam Srinivasan, a veteran aerospace assembler with three decades of precision blueprint reading and CNC operation, they channel their meticulous curiosity and compassionate teamwork into
    mentoring newcomers and championing safety protocols on the shop floor.
  sports: Tam Srinivasan, an avid early‑morning bird‑watcher who joins a local walking club and follows the Arizona Diamondbacks, Phoenix Suns, and Phoenix Rising FC, they embrace fitness as a gentle, community‑oriented
    pursuit that balances their need for solitude with occasional social engagement.
  arts: Tam Srinivasan, a dedicated reader of Agatha Christie mysteries and Hilary Mantel historical novels, they enjoy listening to the Beatles and Nina Simone, and knitting intricate scarves while attending
    community theater productions like The Glass Menagerie, weaving creative expression into their compassionate daily rhythm.
  travel: Tam Srinivasan, who prefers well‑planned road trips to the Sonoran Desert and occasional overseas sojourns to Tuscany and Kyoto, they balance a love for cultural immersion with a practical eye
    on budget and family obligations, often traveling with a curated itinerary that leaves room for spontaneous garden‑inspired photography.
  culinary: Tam Srinivasan, an enthusiastic home cook who blends aromatic cumin, coriander, and ginger into lentil dal and vegetable curries while harvesting fresh tomatoes and chilies from their desert
    garden, they enjoy mastering both traditional spice blends and modern farm‑to‑table dishes, yet sometimes over‑salt a stew in a rush.
  core: Tam Srinivasan, who combines a lifetime of aerospace precision with a nurturing spirit, they use gardening, yoga, and storytelling to temper emotional intensity while mentoring colleagues and savoring
    the flavors of home‑grown cuisine.
background:
  cultural: Tam was born to a Sikh Punjabi family that later settled in the United States; she married a Tamil‑Indian man, blending Sikh and Tamil traditions in her household. She grew up speaking Punjabi
    at home while also learning Tamil phrases from her husband’s side, and she is fluent in English. Tam celebrates Diwali, Vaisakhi, and Pongal, attending both the local gurdwara and Indian cultural events
    in Phoenix. Her South Asian heritage informs her cooking, music choices, and community involvement, while her long‑term residence in Arizona has integrated desert‑inspired gardening and participation
    in American holidays like Thanksgiving.
