persona_description: A professional who advocates for the transparency and ethical treatment of animals in research, testing, and teaching. They are passionate about promoting the welfare of animals and
  ensuring that the use of animals is justified and humane. They are knowledgeable about the Openness Agreement on Animal Research and Teaching in New Zealand and advocate for increased transparency in
  animal use within research, education, breeding, and animal supply facilities. They are committed to ensuring that the benefits of research and education are weighed against the harm to animals and that
  animal use and welfare harms are minimized.
