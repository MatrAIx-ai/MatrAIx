  hobbies: '[''Visiting art galleries and museums'', ''Street photography'', ''Live music shows'', ''Playing guitar'', ''Hiking in the Cascades'', ''Reading contemporary fiction'', ''Improv comedy'', ''Volunteering
    for community art programs'']'
  career_goals: Marc aims to complete a bachelor’s degree in Communications with a minor in Art History, then pursue a career that blends his organizational rigor with his love for the arts. His short‑term
    goal is to secure a marketing or project‑manager role at a tech‑forward media company where he can shape creative campaigns. Long‑term, he envisions becoming a creative director or museum curator, and
    launching a youth‑focused art mentorship program in Seattle that leverages his networking strengths and commitment to community impact.
