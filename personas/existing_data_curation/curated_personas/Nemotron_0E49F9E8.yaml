personas:
  professional: Marc Scribner, an 18‑year‑old communications student and budding art‑history enthusiast, channels their meticulous project‑management skills, gregarious public‑speaking flair, and passion
    for visual critique into leading campus media clubs and orchestrating immersive gallery‑opening campaigns for emerging Seattle artists, while they consistently seek feedback from peers to refine each
    event.
  sports: Marc Scribner fuels their weekend stamina with hikes organized through the Seattle Hiking Club, roots for the Seattle Seahawks and Seattle Kraken with unwavering devotion, and joins a seasonal
    intramural soccer league in the fall, though they sometimes skip post‑game stretching in favor of editing photos on their phone.
  arts: Marc Scribner immerses themselves in Seattle’s art pulse by curating Instagram reels of gallery openings, drawing visual inspiration from the stark black‑and‑white streetscapes of Nan Goldin, the
    vibrant installations of Yayoi Kusama, and the soulful chords of local indie folk band The Head and the Heart, while occasionally performing acoustic covers of Jimi Hendrix at open‑mic nights, and they
    often share their own street‑photography to spark dialogue.
  travel: Marc Scribner prefers spontaneous weekend getaways, having trekked the misty trails of the Alpine Lakes Wilderness, taken a rainy weekend trip to Victoria, Canada for its colonial art scene, and
    dreamed of a future pilgrimage to Kyoto’s temples to study Japanese aesthetic philosophy, all while budgeting travel through student discount apps, and they maintain a modest travel blog to document
    each adventure.
  culinary: Marc Scribner’s palate favors Pacific Northwest flavors, regularly ordering cedar‑plank salmon with dill, crafting avocado‑toast topped with dulse flakes and a poached egg, and concocting a
    signature cold‑brew latte sweetened with maple syrup, though they habitually forget to eat a balanced lunch amidst their busy event schedule.
  core: Marc Scribner, a hyper‑organized social catalyst, can’t resist the lure of late‑night coffee, overbooks their calendar, and constantly fidgets with their phone camera to capture the perfect shot,
    and they rarely take a break to unwind.
background:
  cultural: Marc is a White American raised in Seattle’s Capitol Hill neighborhood, with family roots in the Midwest. His upbringing reflects a middle‑class, progressive Pacific‑Northwest environment that
    values environmental awareness, tech innovation, and artistic expression. Exposure to Seattle’s diverse cultural venues, outdoor lifestyle, and a community that blends traditional American values with
    a forward‑thinking ethos has shaped his worldview and personal identity.
attributes:
  skills: '[''Project Management'', ''Event Coordination'', ''Public Speaking'', ''Social Media Strategy'', ''Graphic Design (Adobe Photoshop & Illustrator)'', ''Art History Knowledge'', ''Research and
