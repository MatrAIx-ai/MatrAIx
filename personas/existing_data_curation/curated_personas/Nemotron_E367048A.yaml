personas:
  professional: Lourdes Medina is a retired administrative specialist who now volunteers as a community‑center cooking instructor, leveraging their meticulous record‑keeping, bilingual communication, and
    methodical planning to design structured classes and detailed recipe handouts while remaining skeptical of untested teaching methods.
  sports: Lourdes Medina enjoys daily 30‑minute walks with the Parkside Senior Walking Club, follows the regional baseball team the River City Ravens, and participates in weekly bridge tournaments at the
    community center, blending low‑impact fitness with competitive mental sport.
  arts: Lourdes Medina spends evenings immersed in classic Mexican cinema, idolizing actors like Pedro Infante and María Félix, binges contemporary telenovelas starring Victoria Ruffo, and channels artistic
    appreciation into quilting intricate patterns inspired by Frida Kahlo’s floral motifs while also reading romance novels by Nicholas Sparks.
  travel: Lourdes Medina prefers meticulously planned trips that balance cultural immersion with family visits, having recently enjoyed a pilgrimage to the historic town of San Miguel de Allende and dreaming
    of a scenic road‑trip along the Pacific Coast to explore coastal villages and serene beaches.
  culinary: Lourdes Medina boasts advanced culinary skills, regularly preparing authentic tamales, mole negro, and pozole for large gatherings, hand‑selecting heirloom chilies, hominy, and masa de maíz,
    and takes pride in fine‑tuning each recipe with a precise measurement of spices to recreate the flavors of their childhood kitchens.
  core: Lourdes Medina is a detail‑driven, community‑spirited elder who blends structure, tradition, and modest competitiveness into daily life, all while wrestling with a persistent undercurrent of worry.
background:
  cultural: Lourdes was born to Mexican immigrant parents who settled in Bakersfield, bringing with them the customs of central Mexico, particularly from the state of Jalisco. She grew up speaking Spanish
    at home and English in school, maintaining a bilingual identity. Catholic faith and family values are central to her life; she celebrates Día de los Muertos, quinceañeras, and major Mexican holidays
    with vibrant community gatherings. Her cultural heritage influences her cooking, music, and storytelling, and she remains active in Bakersfield's Mexican community through church events and local festivals.
attributes:
  skills: '[''Household budgeting'', ''Traditional Mexican cooking'', ''Garden design and maintenance'', ''Administrative clerical work'', ''Event coordination'', ''Bilingual Spanish‑English communication'',
