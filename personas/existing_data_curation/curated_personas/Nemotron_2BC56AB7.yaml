  career_goals: Edmond’s career aspirations are shaped by his love for clear, purposeful roles and a structured environment. He often says he wants to become a firefighter, admiring the predictable shift
    schedule, the teamwork within a small crew, and the tangible ways firefighters keep the community safe. He also occasionally imagines an eventual role as a carpenter or builder, appreciating the hands‑on,
    practical nature of constructing things he can see and touch.
