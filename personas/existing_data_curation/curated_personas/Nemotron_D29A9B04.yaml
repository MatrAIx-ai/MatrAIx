personas:
  professional: Nimeh Zaveri is a licensed practical nurse who combines a methodical, data‑driven approach to patient assessment and emergency triage with a knack for mentoring staff, and they navigate
    the structured path toward RN certification and a future as a midwife serving community health programs.
  sports: Nimeh Zaveri enjoys hiking the Osage plains with the local Trailblazers Hiking Club, they cheer for the Oklahoma City Thunder and the Oklahoma Sooners football team, and they occasionally join
    a community softball league despite preferring solitary outdoor pursuits.
  arts: Nimeh Zaveri spends evenings strumming acoustic guitar in the style of Joni Mitchell, they knit beadwork scarves featuring traditional tribal motifs, and they capture sunrise landscapes inspired
    by Ansel Adams, while finding solace in historical fiction by Philippa Gregg.
  travel: Nimeh Zaveri favors short, well‑planned getaways to state parks like Antelope Island and can’t wait to trek the mesas of New Mexico’s Taos region, they balance a love for rugged adventure with
    a practical eye on travel costs, often using reward points to offset flights.
  culinary: Nimeh Zaveri enjoys cooking dishes like rosemary‑roasted chicken with sweet corn succotash and beet‑infused salad, they are comfortable making herbal teas with sage and cedar, and they often
    experiment with bead‑decorated presentation on traditional pottery.
  core: Nimeh Zaveri blends analytical precision with a love for solitary creative pursuits, they juggle a competitive drive for career advancement with a relaxed, sometimes disorganized lifestyle, and
    they can’t resist a good puzzle before bedtime.
background:
  cultural: Nimeh is a member of the Cherokee Nation, raised in Sapulpa, Oklahoma, where tribal culture is woven into daily life. Her upbringing involved learning the Cherokee language through community
    classes, participating in seasonal ceremonies, and observing the tribe's emphasis on respect for nature and communal well‑being. These cultural roots shape her worldview and inform her approach to nursing,
    prompting her to honor traditional healing practices, such as herbal remedies and storytelling, alongside modern medical care. She remains active in tribal health outreach programs, advocating for culturally
    competent services that address the unique health disparities faced by American Indian communities in the Tulsa County region.
