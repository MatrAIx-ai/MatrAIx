  career_goals: Nimeh aims to transition to a registered nurse role through an RN‑to‑BSN program, with a long‑term goal of becoming a Certified Nurse Midwife who serves tribal communities in Oklahoma. She
    also plans to earn a Critical Care Registered Nurse (CCRN) certification to broaden her clinical expertise. Driven by competition and a desire for structured advancement, she envisions establishing
    a community‑health outreach initiative that targets diabetes and hypertension prevention among American Indian populations, leveraging her STEM background to develop data‑driven intervention strategies.
    Eventually, she hopes to take on a nurse‑manager position where she can shape policies that balance rigorous protocols with the flexibility needed for culturally sensitive care.
