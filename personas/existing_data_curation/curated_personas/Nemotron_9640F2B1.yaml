  hobbies: '[''Reading contemporary fiction and psychology books'', ''Hiking on Lookout Mountain trails'', ''Nature and urban photography'', ''Playing acoustic guitar'', ''Reflective journaling'', ''Strategic
    board games (e.g., Settlers of Catan)'', ''Volunteering at a local food pantry'', ''Participating in a small church study group'', ''Meditation and mindfulness practice'']'
  career_goals: Anthony aims to earn a Bachelor’s degree in Psychology followed by a Master’s in Clinical Counseling, ultimately becoming a licensed mental‑health counselor specializing in adolescent anxiety
    and depression. He aspires to work within community mental‑health centers in Tennessee, where he can blend his compassionate nature with practical problem‑solving to improve access to care. Long‑term,
    he hopes to design and lead peer‑support programs in local high schools and contribute to crisis hotline services, all while maintaining a balanced lifestyle that includes ongoing volunteerism and personal
    well‑being practices.
