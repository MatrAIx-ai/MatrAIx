  hobbies: '["Reading historical nonfiction and classic literature", "Crossword puzzles", "Gardening (roses)", "Knitting and quilting", "Following the Kentucky Derby", "Classic movie appreciation", "Small‑group
    Bible study", "Seniors'' book club", "Birdwatching"]'
  career_goals: Although retired, Jessica’s personal ambitions focus on legacy and continued growth. She is dedicated to completing a memoir that captures her experiences from the post‑World II era to the
    present, preserving family recipes and local stories for future generations. She aims to expand her digital literacy by learning to edit family photos and create a simple website for sharing those memories.
    Jessica also hopes to deepen her involvement with the intergenerational program at the Louisville public library, mentoring younger volunteers in traditional crafts and storytelling. Maintaining her
    health, independence, and ability to contribute to her community remains a central goal.
