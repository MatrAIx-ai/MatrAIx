personas:
  professional: Jestin Boutte is a retired handyman-turned-community elder who leverages their decades-long carpentry, home-maintenance, and storytelling expertise; they mentor seniors at the local senior
    center, exemplifying their practical curiosity and dependable, flexible nature.
  sports: Jestin Boutte enjoys low-impact fitness, joining the 'Silver Striders' senior walking club for a 30-minute neighborhood stroll each day, and they cheer on the New Orleans Saints during football
    season and the New Orleans Pelicans in the NBA playoffs, as well as following the local minor-league baseball team, the River City Redbirds.
  arts: Jestin Boutte finds solace in classic R&B, gospel, and jazz, regularly listening to recordings by Aretha Franklin, Mahalia Jackson, Marvin Gaye, John Coltrane, and Ella Fitzgerald; they often share
    stories about these artists with friends and grandchildren during card games.
  travel: Jestin Boutte prefers slow, well-planned trips that combine cultural immersion with gentle activity; they have enjoyed a guided historic tour of Charleston, a weekend drive through the Great Smoky
    Mountains, and they hope to one day take a leisurely cruise to the Bahamas while their grandchildren accompany them.
  culinary: Jestin Boutte is a seasoned home chef who expertly prepares Southern soul-food staples such as fried catfish with collard greens scented with smoked turkey, buttery cornbread, and sweet-potato
    pie, often brightening dishes with fresh basil, thyme, and rosemary harvested from their garden.
  core: Jestin Boutte is a quiet, practical storyteller who blends old-world craftsmanship with modern curiosity, savoring daily walks, fresh garden herbs, and family video calls while occasionally misplacing
    their reading glasses on the kitchen counter.
background:
  cultural: Jestin is an African‑American elder whose life spans pivotal moments in U.S. history, from the civil‑rights movement to the growth of Las Vegas's Black community. Raised in the South during
    the era of segregation, he carries the traditions of Southern hospitality, gospel music, and communal storytelling. The Great Migration brought his family to Nevada, where they built a tight‑knit neighborhood
    centered around the local church, barbershop, and family gatherings. These cultural touchstones shaped his emphasis on harmony, respect for elders, and the importance of oral history. While he embraces
    the diverse influences of Las Vegas—its desert landscape, tourism industry, and multicultural milieu—he remains rooted in the values of perseverance, mutual support, and the celebration of Black heritage
    through food, music, and community service.
attributes:
  skills: '["Basic carpentry and woodworking", "Household maintenance and repairs", "Traditional Southern cooking and soul‑food recipes", "Budgeting and financial organization", "Storytelling and oral history
