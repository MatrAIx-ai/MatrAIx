  hobbies: '["Gardening (herbs and vegetables)", "Listening to classic R&B, jazz, and gospel music", "Reading newspapers and solving crossword puzzles", "Attending weekly church services", "Playing card
    games (bridge, rummy)", "Daily neighborhood walks", "Video calling grandchildren", "Cooking family recipes", "Participating in small community storytelling groups", "Volunteering at the local senior
    center"]'
  career_goals: Although retired, Jestin remains driven by personal milestones and the desire to give back. He aims to maintain his health and independence through regular walks and balanced nutrition.
    He is determined to compile a family scrapbook that records photographs, recipes, and anecdotes, preserving his legacy for grandchildren and great‑grandchildren. Jestin hopes to mentor younger family
    members, offering practical advice on budgeting, home upkeep, and navigating modern technology. He also aspires to learn a new smart‑home device to enhance daily living and to celebrate his centennial
    birthday surrounded by close family and friends.
