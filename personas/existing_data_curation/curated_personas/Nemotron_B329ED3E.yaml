  hobbies: '["Gardening", "Birdwatching", "Reading historical fiction", "Crossword puzzles", "Jigsaw puzzles", "Knitting", "Crocheting", "Church choir participation", "Genealogy research"]'
  career_goals: Approaching retirement, Rachael aims to transition into a role that leverages her deep operational knowledge while allowing a more predictable schedule. Her primary ambition is to become
    a lead trainer or quality‑assurance specialist within her call‑center, designing streamlined scripts and coaching teammates to meet high‑performance standards. She plans to earn a certification in Customer
    Service Management to formalize her expertise. After stepping back from full‑time work, she hopes to serve as a part‑time consultant, providing occasional process‑improvement advice and training workshops,
    thereby maintaining financial stability and a sense of purposeful engagement.
