personas:
  professional: Catherine Nelson, a licensed physical therapist in Stuart, blends manual therapy, gait analysis, and aquatic rehab with her artistic flair, using her calm, talkative demeanor to engage patients
    while navigating her relaxed, sometimes chaotic scheduling style.
  sports: Catherine Nelson races in community 5K runs, paddles across the Intracoastal Waterway with the St. Lucie Paddle Club, practices yoga at the Sunshine Yoga Studio, and cheers for the Miami Heat
    and Tampa Bay Buccaneers while belonging to the Florida Coastal Running Club.
  arts: Catherine Nelson paints vibrant coastal seascapes reminiscent of Winslow Homer, curates weekend gallery tours featuring works by Georgia O'Keeffe and local Floridian artists, finds inspiration in
    the music of Norah Jones and the choreography of Alvin Ailey, and volunteers as a facilitator for community theater productions of Tennessee Williams’ plays.
  travel: Catherine Nelson favors spontaneous, art‑infused getaways, often jet‑setting from the St. Lucie County Airport to the historic streets of Santa Fe, New Mexico for its Native‑American galleries,
    while also indulging in weekend road trips to the Florida Keys, the Bahamas, and occasional weekend cruises to the Caribbean, balancing her love for water activities with a relaxed budgeting approach.
  culinary: Catherine Nelson enjoys cooking light, Mediterranean‑style seafood dishes such as grilled mahi‑mahi with lemon‑dill sauce, shrimp ceviche with avocado, and mango‑salsa‑topped fish tacos, favoring
    fresh citrus, basil, and chili flakes, while also relishing dining out at local oyster bars and the upscale farm‑to‑table restaurant RAW on the River.
  core: Catherine Nelson exudes a calm, arts‑driven charisma that fuels her PT practice, yet her relaxed approach to planning often leaves her juggling credit‑card due dates, misplacing keys, and improvising
    last‑minute schedules.
background:
  cultural: Catherine grew up in a middle-class, Anglo-American family on the East Coast before relocating to Stuart, Florida, where she has lived for the past decade. Her upbringing combined the traditional
    values of Southern hospitality - emphasizing friendliness, community involvement, and a relaxed pace - with a liberal, open-minded attitude toward art, education, and new ideas. The multicultural vibe
    of coastal Florida, with its blend of Caribbean, Latin, and North-American influences, has shaped her appreciation for diverse cultural expressions and reinforced her belief in flexible, inclusive approaches
    to both life and work. This background underpins her comfort in social settings, her willingness to explore unconventional solutions, and her calm resilience in the face of challenges.
attributes:
  skills: '[''Manual therapy'', ''Therapeutic exercise prescription'', ''Orthopedic and sports injury rehabilitation'', ''Gait and functional movement analysis'', ''Patient education and motivational counseling'',
    ''Aquatic therapy'', ''Myofascial release'', ''Electro-therapy modalities (ultrasound, TENS)'', ''Group wellness class facilitation'', ''Public speaking and community health workshops'', ''Creative
    integration of art into rehabilitation'']'
  hobbies: '[''Painting'', ''Visiting art galleries and museum exhibitions'', ''Coastal photography'', ''Paddle-boarding and snorkeling'', ''Yoga and Pilates'', ''Improvisational dance'', ''Running (5K/10K
    races)'', ''Reading scientific and art literature'', ''Hosting dinner parties'', ''Volunteering in community theater'', ''Leading health-and-art workshops'']'
  career_goals: Looking ahead, Catherine aims to translate her competitive drive and innovative mindset into a thriving boutique physical-therapy practice that blends conventional rehabilitation with creative
    arts experiences. She plans to complete a Doctor of Physical Therapy program within the next three years to deepen her clinical expertise and earn certification as a Sports Clinical Specialist. Catherine
    also aspires to become a recognized speaker at national PT conferences, publishing research on the therapeutic benefits of art-based movement and aquatic modalities. Within her community, she envisions
    launching a series of free health-and-art workshops, mentoring junior therapists, and eventually expanding her practice to include a multidisciplinary wellness hub that offers yoga, dance, and creative
    expression classes alongside physical therapy services.
