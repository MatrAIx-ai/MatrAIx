  career_goals: Donovan aims to transition from supervising a single store to overseeing multiple locations as a district or area manager within the next three years. He is driven to leverage his educational
    background to design scalable training curricula that raise sales performance across the region. In the longer term, he envisions founding a retail consultancy that helps midsize chains implement flexible
    staffing models and data-driven merchandising strategies. He also seeks to earn professional certifications such as the Certified Retail Manager (CRM) and Project Management Professional (PMP) to formalize
    his expertise.
