  hobbies: '["Reading (historical non-fiction & biographies)", "Gardening (vegetable garden)", "Fishing", "DIY woodworking", "Jazz and blues music", "Attending small community gatherings", "Watching documentaries
    (science, technology)", "Chess"]'
  career_goals: Ivanhoe aims to transition from frontline cleaning to a supervisory or facilities-management role within the next five years. He plans to earn a Certified Professional Cleaner (CPC) credential
    and complete a community college program in facilities management, building on his existing college coursework. His ambition includes leading a small team, overseeing budgeting for supplies, and implementing
    green-cleaning initiatives that reduce environmental impact. Long-term, he envisions launching his own locally-owned cleaning service that emphasizes reliable service, employee development, and community
    involvement. Achieving these goals will provide greater financial stability for his family and allow him to mentor younger workers.
