personas:
  professional: Ivanhoe James is a seasoned facility maintenance professional with over two decades mastering commercial cleaning protocols, chemical safety, and equipment operation, who channels his curiosity
    into streamlining workflows, championing sustainable cleaning practices, and mentoring new staff, while strategically pursuing a Certified Professional Cleaner credential and facilities‑management coursework
    to transition into a supervisory role that blends practical problem‑solving with green‑initiative leadership.
  sports: Ivanhoe James stays active through low‑impact pursuits such as tending his vegetable garden, weekend anglers’ trips on the Cedar River as a member of the Cedar River Anglers Association, and occasional
    pick‑up basketball games, while cheering on the Cedar Rapids Kernels minor‑league baseball team during summer and following the Green Bay Packers as his NFL staple, a blend of modest exercise and community‑spirit
    fandom.
  arts: Ivanhoe James immerses themselves in the rich timbres of Miles Davis, B.B. King, and Billie Holiday on their vintage turntable while reading historical biographies, and they attend intimate live
    jazz nights at the local community center, finding that the improvisational flow of the music mirrors their own problem‑solving approach to facility management.
  travel: Ivanhoe James prefers purposeful, low‑key travel, having recently explored historic sites like Colonial Williamsburg and Gettysburg National Military Park, taken a weekend road trip to the Grand
    Canyon for sunrise hikes, and now plans a future cultural immersion in Kyoto’s Zen gardens to inspire his own vegetable patch, all while balancing family commitments and a modest travel budget.
  culinary: Ivanhoe James enjoys farm‑to‑table cooking, frequently preparing a fresh ratatouille with heirloom tomatoes, zucchini, basil, and thyme harvested from their garden, pairing it with pan‑seared
    trout caught on the Cedar River and seasoned with dill and lemon, and they also favor hearty dishes like chicken pot pie and homemade vegetable soup, while occasionally indulging in a perfectly brewed
    dark‑roast coffee after a night of reading.
  core: Ivanhoe James blends quiet curiosity with practical stamina, tending gardens, woodworking, and meticulous cleaning by day while quietly dreaming of a greener, self‑run cleaning venture, and they
    habitually sip jazz while plotting their next sustainable improvement.
background:
  cultural: Ivanhoe’s cultural background blends African-American heritage with the Midwestern values of Cedar Rapids, Iowa. His family’s roots trace back to the Southern United States, where church, gospel
    music, and communal storytelling were central to daily life. Moving to Iowa in his youth, he absorbed the region’s emphasis on hard work, modesty, and neighborly cooperation while maintaining a strong
    connection to his African-American identity through church involvement, annual celebrations of Black History Month, and a love for jazz, blues, and soul food. This dual cultural lens informs his worldview,
    fostering resilience, a sense of collective responsibility, and pride in both his family’s traditions and his adopted community.
attributes:
  skills: '["Facility Maintenance", "Commercial Cleaning Procedures", "Chemical Safety Management", "Inventory Control", "Basic Plumbing and Electrical Repairs", "Floor Care (Stripping, Waxing, Polishing)",
