  career_goals: Although she is approaching traditional retirement age, Carol Ann plans to remain active in Louisville’s entertainment community for the next decade. Her primary ambition is to transition
    into a mentorship and consulting role, training new attendants and advising venues on senior‑friendly accessibility and cost‑effective service upgrades. She hopes to compile a personal archive of the
    city’s theater and music‑hall history, eventually publishing a memoir that spotlights behind‑the‑scenes stories. A competitive drive fuels her desire to earn a Best Guest Service award from the local
    arts council and to be recognized as a cultural ambassador for the Kentucky Derby‑related events. Financially, she aims to supplement her pension with occasional freelance consulting projects and by
    offering personalized event‑planning services for small private gatherings.
