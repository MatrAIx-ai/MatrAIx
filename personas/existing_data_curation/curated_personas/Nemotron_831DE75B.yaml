  career_goals: Drake dreams of turning his love of art and technology into a future career as a creative technologist or video‑game designer, where he can build immersive worlds that tell stories. He also
    imagines exploring space as an astronaut and hopes to combine scientific curiosity with artistic expression. In the short term, he wants to win his school's science‑fair competition and earn a place
    on the regional robotics club, seeing these achievements as stepping stones toward a lifelong ambition of creating innovative, interactive experiences.
