personas:
  professional: An aspiring young coder and future architect, Drake Joyner harnesses their curiosity and competitive edge to create Scratch animations and intricate LEGO models, while their relaxed, sometimes
    disorganized approach fuels a playful yet determined problem‑solving style.
  sports: Drake Joyner cheers for the Los Angeles Dodgers and Los Angeles Lakers while playing on the Hanford Tigers U10 soccer team, preferring informal pickup games in the school yard to strict training
    regimes, and enjoys weekend bike rides through orchard trails for personal fitness.
  arts: Drake Joyner channels a love for comic legends like Stan Lee, manga creator Akira Toriyama, and the whimsical visuals of Pixar’s Toy Story into vibrant LEGO‑inspired murals, while their after‑school
    art club sessions often feature playlists from Imagine Dragons and watch parties for Marvel movies.
  travel: Drake Joyner favors weekend road trips to nearby farms, farmer’s markets, and the towering granite cliffs of Yosemite, while dreaming of a future school excursion to NASA’s Kennedy Space Center
    and a family vacation in Japan to see both futuristic technology and ancient temples, balancing relaxed family travel with a thirst for adventure.
  culinary: Drake Joyner delights in building crunchy nachos with cheddar cheese, jalapeños, and salsa, loves taco nights featuring seasoned ground beef and fresh cilantro, and often helps prepare avocado
    toast topped with lime and cherry tomatoes, reflecting a budding appetite for bold, farm‑fresh flavors.
  core: Curious, art‑driven and competitively spirited, 9‑year‑old Drake Joyner builds LEGO worlds, codes quirky Scratch stories, and explores farms, balancing a love for solitary creativity with a playful,
    relaxed outlook.
background:
  cultural: Drake grew up in a white, middle‑class family that moved to Hanford from the Midwest several years ago. Living in Tulare County’s agricultural heartland, he is accustomed to a community where
    farming, seasonal festivals, and local fairs are part of everyday life. His household celebrates typical American holidays such as Thanksgiving, Independence Day, and Christmas, while also embracing
    the multicultural flavor of the Central Valley by enjoying foods like tacos and fresh produce from nearby farms. The blend of rural California traditions and his family’s Midwestern roots gives him
    a grounded, independent outlook and a respect for both hard work and creative expression.
