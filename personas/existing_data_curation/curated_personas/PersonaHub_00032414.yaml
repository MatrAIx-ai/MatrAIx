persona_description: A cryptographer who specializes in the design and analysis of cryptographic systems, particularly those that require long-term secrecy. They have a deep understanding of Kerckhoff's
  Principle and the distinction between the key and algorithm components of a cipher system. They are aware of the limitations and challenges of building secure ciphers, and they are committed to publishing
  all internal details of their systems to ensure trust and credibility. They are also skilled at identifying and dismissing out-of-hand security claims for systems whose internal details are kept secret,
  and they are aware of the importance of auditing and analysis for systems that require full details.
