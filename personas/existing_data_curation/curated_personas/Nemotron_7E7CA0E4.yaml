personas:
  professional: Chuni Fong, a 56‑year‑old part‑time financial consultant, leverages a decade‑long expertise in budgeting, risk assessment, and bilingual business communication to help small Texas enterprises
    streamline their finances, applying a meticulous, data‑driven approach that mirrors their love for structure and their critical, results‑focused mindset.
  sports: Chuni Fong enjoys gentle tai chi sessions at the local community center, birdwatching trips to the Aransas National Wildlife Refuge, and follows the Dallas Cowboys and Austin FC with a detached
    yet analytical eye, joining a weekend walking club at the age of 56 to stay active while avoiding high‑impact sports.
  arts: Chuni Fong expresses creativity through traditional Chinese calligraphy, knitting intricate scarves, and reading historical nonfiction, while finding solace in the piano works of Debussy, the paintings
    of Andrew Wyeth, and the calligraphic scrolls of Wang Xizhi, allowing these artistic pursuits to balance their analytical mind.
  travel: Chuni Fong prefers meticulously planned, low‑key getaways, having explored the historic missions of San Antonio, the wildflower‑laden Hill Country in spring, and a quiet workshop in Kyoto to refine
    calligraphy, while dreaming of a retreat to the lavender fields of Provence for future solitary reflection.
  culinary: Chuni Fong enjoys cooking with fresh garden harvests, favoring dishes like herb‑roasted chicken with rosemary, Texas‑style chili with black beans, and simple stir‑fry of bok choy and ginger,
    yet they often over‑season meals while meticulously tracking nutritional content in a spreadsheet.
  core: Chuni Fong is a disciplined, solitary strategist who balances meticulous budgeting, careful health monitoring, and quiet creative pursuits, while occasionally succumbing to worry‑driven over‑analysis
    and a habit of over‑seasoning meals.
background:
  cultural: Chuni was born to first‑generation Chinese immigrants and grew up in a bilingual household where Mandarin (with some Cantonese influences) was spoken alongside English. While she embraces the
    Confucian values of diligence, respect for elders, and family cohesion, her adult life in Seabrook, Texas has woven in Southern hospitality and a love for local community traditions. She celebrates
    Chinese New Year with family gatherings, prepares dim sum and moon‑cake recipes passed down from her mother, and participates in the local Asian cultural festival, blending her East Asian heritage with
    the multicultural fabric of the Houston–Galveston area.
attributes:
  skills: '[''Financial Planning'', ''Budget Management'', ''Excel Spreadsheet Modeling'', ''Data Analysis'', ''Risk Assessment'', ''Project Coordination'', ''Strategic Decision-Making'', ''English-Mandarin
