  hobbies: '[''Reading Historical Non-Fiction'', ''Gardening'', ''Traditional Chinese Calligraphy'', ''Crossword and Sudoku Puzzles'', ''Tai Chi'', ''Birdwatching'', ''Knitting'', ''Journaling'']'
  career_goals: Chuni aims to translate her decades‑long business knowledge into a part‑time consultancy that helps small local enterprises streamline their finances and reduce operational risk. She also
    dreams of authoring a practical guide on personal budgeting for senior households and volunteering as a financial‑literacy mentor at the community center. Underlying these objectives is a personal ambition
    to establish a disciplined daily routine that mitigates stress and supports her family's wellbeing.
