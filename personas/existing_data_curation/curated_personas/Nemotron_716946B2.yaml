personas:
  professional: An aspiring digital content creator, Hana Sanders leverages their debate club eloquence, basic Scratch coding, and Canva graphic design to craft engaging multimedia stories that blend youthful
    energy with a pragmatic, organized approach, while their competitive drive pushes them to lead high‑school projects and envision a future mentorship platform for local teens.
  sports: A basketball enthusiast and hip‑hop dancer, Hana Sanders competes on their high‑school varsity team, follows the Houston Rockets and the Houston Astros with avid fandom, joins a local community
    dance crew for weekend rehearsals, and blends structured workouts with spontaneous bike rides to maintain competitive stamina while balancing school commitments.
  arts: A budding video creator, Hana Sanders produces short, R&B‑infused social media clips featuring creative edits of everyday moments, draws inspiration from artists like SZA, Drake, and J. Cole, and
    regularly attends local open‑mic poetry nights and community theater productions, channeling their outgoing energy into visual storytelling.
  travel: An adventurous planner, Hana Sanders enjoys weekend bike trips to nearby state parks such as Brazos Bend, has taken family road trips to New Orleans and Austin, and dreams of backpacking through
    Seattle’s coffee scene and the vibrant art districts of New York City, often researching itineraries on their phone while balancing school workload and budget.
  culinary: A kitchen experimenter, Hana Sanders mixes family‑style comfort foods like chicken and waffles, spicy tacos, and homemade banana bread with fresh ingredients such as jalapeños, rosemary, and
    cinnamon, often using their mom’s old recipes as a base while mastering video‑ready plating for their social‑media food reels.
  core: Hana Sanders is a fiercely competitive, socially magnetic teen who juggles debate victories, basketball drills, and midnight video edits, yet sometimes over‑promises group projects and battles a
    habit of scrolling endless TikTok feeds at the expense of sleep, leaving them exhausted by morning.
background:
  cultural: She is an African American teen growing up in Fulshear, a suburban community in Fort Bend County, Texas. Her family maintains strong ties to the Black Southern tradition, including church gatherings,
    soulful cooking, and celebrations of Juneteenth and Kwanzaa. The multicultural environment of the Houston metro area exposes her to a blend of Texan hospitality, diverse music, and a supportive community
    that values both individual achievement and collective resilience.
