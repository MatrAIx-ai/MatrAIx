  career_goals: She aims to earn a scholarship to study communications or marketing at a university, with a long term ambition to become a digital content creator who highlights uplifting stories from the
    black teen community. Hana also hopes to launch a youth mentorship program in Fort Bend County that blends her competitive drive with community service, eventually building a personal brand that merges
    creative media with practical business skills.
