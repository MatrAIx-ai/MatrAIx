  hobbies: '["Hip hop dance", "Zumba fitness classes", "Community basketball", "Volunteer work at food pantries", "Cooking soul food", "Hiking in local nature trails", "Reading personal development books",
    "Attending live R&B and jazz performances", "Singing in church choir"]'
  career_goals: Driven by curiosity and a practical mindset, Barbara aims to transition from hands‑on material handling to supervisory and strategic roles in supply‑chain management. She plans to complete
    a bachelor’s degree in Business Administration or Supply‑Chain Management within the next three years, earn certifications such as Certified Supply Chain Professional (CSCP) and OSHA Safety Trainer,
    and ultimately become a logistics coordinator or warehouse manager. Long‑term, she hopes to launch a community‑focused logistics consulting firm that helps small local businesses streamline operations
    while providing mentorship to other Black women entering the trade. She also prioritizes building a stable financial foundation, improving her stress‑management skills, and maintaining work‑life balance.
