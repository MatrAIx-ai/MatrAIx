  hobbies: '[''Reading speculative fiction'', ''Exploring technology blogs'', ''Hiking local trails'', ''Analog photography'', ''Creative cooking'', ''Strategic board games (e.g., Catan)'']'
  career_goals: Stuart aims to transition from a frontline representative to a supervisory role within the next three years, targeting positions such as Team Lead or Customer Experience Manager. He plans
    to enroll in a bachelor's program in Business Administration to complement his associate's degree and deepen his strategic understanding of operations. Long‑term, he aspires to blend data analytics
    with customer insights as a Customer Experience Analyst or Product Specialist, shaping service design and policy while continuing to apply his practical curiosity to solve real‑world problems.
