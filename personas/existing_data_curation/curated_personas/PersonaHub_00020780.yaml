persona_description: A chemist who specializes in the analysis of tritium in air, water, and other environments. They have a deep understanding of the latest advancements in tritium measurement instrumentation,
  including the development of commercial ion-chamber-based and gas-flow-proportional-counter-based tritium monitors. They are familiar with the most sensitive method for tritium-in-water analysis, which
  is 3He mass spectrometry, and the reliability, convenience, and low cost of passive tritium-oxide-in-air samplers. They are also interested in the development of new detectors for measuring tritium-in-air
  in the presence of high gamma and/or noble gas backgrounds.
