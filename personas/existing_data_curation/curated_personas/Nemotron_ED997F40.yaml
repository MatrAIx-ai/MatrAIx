personas:
  professional: Teresa Colon is a budding digital artist who spends hours sketching on a tablet while experimenting with layers and animation, channeling their curiosity and outgoing energy into bold color
    choices, and they often collaborate with friends in the school art club despite occasionally forgetting to save their work.
  sports: Teresa Colon dashes across the field as a forward for the Sunrise Youth Soccer Club, cheers on the Arizona Cardinals during football season, spends Saturday mornings hiking the nearby desert trails
    with friends, and they join a weekend dance crew for both folkloric routines and hip‑hop freestyles, blending competitive spirit with a love for community movement.
  arts: Teresa Colon is a sketchbook‑savvy teen who dives into the vibrant beats of Karol G and the dreamy indie sounds of Clairo while drawing fantastical creatures inspired by Sarah J. Maas, and they
    attend local art festivals where they admire works by muralist Diego Rivera and indie filmmaker Greta Gerwig, letting music and literature fuel their creative bursts.
  travel: Teresa Colon prefers spontaneous road trips to desert parks like Sedona and the Grand Canyon, often packing a sketchbook and a portable charger for impromptu art sessions, while dreaming of a
    future backpacking adventure through the ruins of Machu Picchu and the colorful streets of Barcelona, and they balance a love for nature with a curiosity for historic architecture despite family budget
    limits.
  culinary: Teresa Colon enjoys crafting colorful poke bowls with rice, avocado, and sesame‑crusted tofu, fiddles with making homemade guacamole for snack time, and can flawlessly whip up a quick spaghetti
    carbonara using pancetta and pecorino, though they often leave the kitchen a mess and forget to start the dishwasher, reflecting a playful yet chaotic cooking style.
  core: Teresa Colon is a whirlwind of curiosity and color, juggling digital art, soccer, and spontaneous dance routines while occasionally misplacing their sketch pencils and forgetting to save a project.
background:
  cultural: Teresa comes from a Mexican‑American family that maintains strong cultural ties, speaking Spanish at home and celebrating traditions such as Día de los Muertos, Cinco de Mayo, and family‑centered
    holidays. Growing up in Indio, California, she experiences the blend of desert life, the multicultural vibe of the Coachella Valley, and the close‑knit Hispanic community of Riverside County. Her parents
    share Mexican recipes, music, and stories, fostering a deep appreciation for her heritage while also embracing the broader Californian lifestyle, which includes school activities, community festivals,
    and exposure to diverse artistic influences.
