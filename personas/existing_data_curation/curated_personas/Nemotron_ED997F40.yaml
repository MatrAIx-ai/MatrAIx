  hobbies: '[''Drawing'', ''Digital art'', ''Mexican folkloric dance'', ''Hip‑hop dance'', ''Soccer'', ''Hiking'', ''Reading fantasy novels'', ''DIY crafts'', ''School art club'', ''Coding club (Scratch)'']'
  career_goals: Teresa aspires to turn her love for art and community into a future career as a graphic designer or visual storyteller, perhaps focusing on projects that celebrate her Mexican heritage.
    She hopes to attend an arts‑focused high school and later study visual communication or multimedia design at college. In the long term, she envisions creating workshops for kids in her community that
    blend art, technology, and cultural education, while staying open to emerging creative fields like game design or animation.
