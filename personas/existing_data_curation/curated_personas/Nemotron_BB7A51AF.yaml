  career_goals: Despite approaching retirement age, Angela is driven to solidify her legacy in both the maintenance field and her personal artistic pursuits. She aims to earn the Certified Maintenance &
    Reliability Technician (CMRT) credential and transition into a senior maintenance supervisor role where she can mentor younger workers. Parallel to this, she plans to launch a modest side business offering
    bespoke metal‑art installations and custom repair solutions for local businesses, leveraging her imaginative designs. Financially, she seeks a stable income that will cushion her retirement while allowing
    her to invest in a small studio space. Her competitive streak pushes her to be recognized as the go‑to expert for complex equipment failures in Everett, and she hopes to publish a how‑to guide on sustainable
    repair practices.
