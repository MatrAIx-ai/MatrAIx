personas:
  professional: Angela Haines, a veteran maintenance and reliability specialist, channels her competitive streak and vivid imagination into diagnosing stubborn HVAC failures and repurposing reclaimed parts
    into functional art, while their critical, detail‑oriented approach earns them a reputation as the go‑to troubleshooter in Everett’s industrial sector.
  sports: Angela Haines enjoys early‑morning walks along the Puget Sound and a weekly yoga class at the Evergreen Wellness Studio, while cheering for the Seattle Seahawks in the fall and the Seattle Mariners
    in the summer, and they casually play doubles tennis at the Evergreen Tennis Club to keep both mind and body sharp.
  arts: Angela Haines blends a love for Kandinsky’s abstract color fields and Calder’s kinetic metal sculptures, often listening to Brian Eno’s ambient albums while working in their studio, and they regularly
    attend Everett’s art shows and historic talks to feed their curiosity for speculative fiction and philosophical discourse.
  travel: Angela Haines prefers meticulously planned weekend getaways to New England’s coastal towns like Portland, Maine, and occasional longer voyages to Kyoto, Japan for its renowned metalworking heritage,
    balancing a modest travel budget with a longing for both serene nature hikes and cultural immersion.
  culinary: Angela Haines delights in cooking rustic New England clam chowder, roasted maple‑glazed carrots, and metal‑inspired plated dishes featuring locally foraged fiddleheads and fresh rosemary, showcasing
    an intermediate culinary skill set that favors seasonal, native ingredients and occasional experimental plating.
  core: Angela Haines, a 57‑year‑old maintenance maestro turned metal‑art visionary, balances a keen competitive edge with a love for solitary creativity, stubbornly over‑plans everything yet still worries
    about every detail.
background:
  cultural: Angela grew up in a working‑class Irish‑American family in the suburbs of Boston during the 1960s and 1970s. The cultural milieu emphasized self‑reliance, practical skills, and community solidarity,
    values that shaped her early forays into home repair and woodworking. Living in Everett, a town with a legacy of textile mills and recent revitalization, she internalized the region’s appreciation for
    craftsmanship and sustainable reuse. Although she never completed formal high school, she pursued informal learning through trade workshops, community colleges, and hands‑on mentorships. Her cultural
    identity blends New England pragmatism with a quiet appreciation for the arts, reflected in her participation in local heritage festivals and her seasonal observances of traditional Irish holidays.
