  career_goals: Although currently not in the formal workforce, Burley aims to channel his experience into leadership roles within local non-profits and civic organizations. He aspires to become the chair
    of the O’Fallon Community Center board, where he can design and oversee programs that foster neighborhood cohesion and support seniors and youth. He also hopes to launch a mentorship program linking
    experienced tradespeople with high-school students, and to acquire a certification in community development to strengthen his strategic planning capabilities. Ultimately, he wants to leave a lasting
    legacy of greater social harmony and practical support for his town.
