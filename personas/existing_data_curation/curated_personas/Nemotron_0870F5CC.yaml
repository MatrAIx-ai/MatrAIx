personas:
  professional: Margaret Bolis is a veteran Dearborn waitress whose razor‑sharp memory for daily specials, calm conflict‑resolution skills, and knack for juggling high‑volume tables translate into a practical,
    on‑the‑fly leadership style as she pursues a shift‑lead role.
  sports: Margaret Bolis is a faithful fan of the Detroit Lions, Detroit Tigers, and the Michigan State Spartans hockey team, while she routinely hikes the dunes of Sleeping Bear and joins a local senior‑center
    basketball league for light cardio.
  arts: Margaret Bolis thrives in the community theater scene, recently starring in a regional production of "Our Town", sways to Benny Goodman’s swing tunes during weekly dance nights, and curates a modest
    collection of Norman Rockwell prints that inspire her dinner‑party décor.
  travel: Margaret Bolis favors weekend road trips along Michigan’s Lake Michigan shoreline—especially Grand Haven and Saugatuck—but dreams of a summer escape to New Orleans to soak in its jazz heritage
    and culinary scene, balancing her travel plans around her volunteer schedule and upcoming café project.
  culinary: Margaret Bolis delights in cooking hearty Midwestern classics like chicken pot pie, skillet cornbread, and garden‑fresh beet salad, skillfully blending farm‑to‑table vegetables with comfort‑food
    flavors while occasionally experimenting with a dash of Cajun spice after her New Orleans trip.
  core: Margaret Bolis blends a relentless sociability with practical hospitality expertise, a competitive streak that fuels her poker games, and a relaxed planning habit that often sees her juggling too
    many community commitments while chasing her café dream.
background:
  cultural: Margaret is a third‑generation Midwestern American of German and Irish ancestry, raised in the Detroit suburbs before moving to Dearborn. She grew up attending a Catholic school, which ingrained
    a sense of community service and a practical work ethic. Living in Dearborn has exposed her to a vibrant blend of cultures, especially the local Arab community, fostering an appreciation for diverse
    cuisines and traditions while maintaining her own Midwestern values of independence and straightforwardness.
attributes:
  skills: '[''Customer Service'', ''Menu Knowledge'', ''Food Safety'', ''Cash Handling'', ''POS System Operation'', ''Conflict Resolution'', ''Team Coordination'', ''Basic Barista Skills'', ''Time Management'']'
  hobbies: '[''Community theater'', ''Swing dancing'', ''Volunteer at senior center'', ''Hiking'', ''Card games'', ''Gardening'', ''Cooking for friends'', ''Local sports events'']'
  career_goals: Margaret aims to leverage her experience into a supervisory role, targeting a shift‑lead position within the next year. She plans to complete her associate degree in hospitality management
    to solidify her credentials. Long‑term, she dreams of opening a small, community‑focused café that blends classic Midwestern comfort food with a relaxed, welcoming atmosphere. Achieving financial stability
    for retirement and possibly supporting her adult children are also key motivations driving her ambition.
