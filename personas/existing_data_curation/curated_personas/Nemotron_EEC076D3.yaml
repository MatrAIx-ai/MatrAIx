personas:
  professional: Amanda Keller, a management analyst at a tech-forward firm, leverages their analytical rigor and vivid visual imagination to turn complex data sets into compelling strategic narratives,
    using Power BI dashboards and hand-drawn storyboards to guide senior leaders through large-scale transformation initiatives.
  sports: Amanda Keller, an avid hiker and weekend beach-volleyball enthusiast, belongs to the San Diego Trailblazers running club and follows the San Diego Wave FC, integrating regular sunrise hikes and
    yoga flows into their routine to combat stress and maintain a balanced fitness level.
  arts: Amanda Keller, a painter and digital illustrator who draws inspiration from coastal light and the fantastical worlds of Hayao Miyazaki, routinely showcases their photography at local pop-up galleries
    and collaborates with fellow creatives to produce immersive community mural projects.
  travel: Amanda Keller, a meticulous planner with a love for culturally rich experiences, has trekked the cliffs of Big Sur, explored the historic streets of Kyoto, and aims to journey through the Patagonian
    Andes next summer, balancing budget constraints with a desire for immersive, off-the-beaten-path adventures.
  culinary: Amanda Keller, an experimental home chef, delights in crafting miso-glazed salmon with sumac-crusted vegetables and hand-rolled ramen infused with fermented kimchi, often sourcing ingredients
    from farmers' markets and pairing meals with indie-brew microbeers.
  core: Amanda Keller blends analytical precision with a restless creative spark, constantly juggling data dashboards and paintbrushes, while battling a chronic worry habit that fuels both their meticulous
    planning and occasional over-commitment to social events.
background:
  cultural: Amanda was raised in a middle‑class, white American family in suburban Southern California, with deep roots in the region and a mixed German‑Irish heritage. Growing up in Poway, she absorbed
    the West Coast blend of individualism, community involvement, and an outdoor‑oriented lifestyle. The diverse cultural fabric of nearby San Diego exposed her to a variety of artistic, culinary, and social
    influences, fostering an openness to new ideas while maintaining traditional family values. Her upbringing emphasized education, self‑reliance, and a strong work ethic, yet also encouraged participation
    in local community events, volunteer initiatives, and the vibrant regional arts scene.
