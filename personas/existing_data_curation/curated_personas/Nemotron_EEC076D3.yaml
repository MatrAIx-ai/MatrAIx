  career_goals: Amanda aims to progress into a senior strategic advisor role where she can lead large‑scale transformation projects that blend data‑driven decision making with creative innovation. She plans
    to earn an MBA and obtain advanced certifications in analytics and Lean‑Six Sigma to deepen her expertise. Over the next five years she hopes to spearhead a cross‑departmental innovation hub within
    her organization, mentor junior analysts, and embed sustainability metrics into business strategies. Long‑term, she envisions transitioning into an innovation manager or product development lead, shaping
    the company’s future offerings while maintaining a healthy work‑life balance that reduces stress and supports her personal growth.
