  hobbies: '[''abstract canvas painting'', ''reading speculative fiction'', ''studying art history'', ''hiking Sonoran desert trails'', ''attending local art fairs'', ''participating in community mural
    projects'', ''cooking modern Mexican cuisine'']'
  career_goals: Jenifer aspires to transition from a sole contractor to the founder of a small boutique finishing studio that blends traditional Mexican motifs with contemporary Southwestern design. She
    aims to secure a local certification in eco‑friendly painting practices, mentor a junior apprentice, and establish a portfolio of community murals that celebrate cultural heritage. In the longer term,
    she hopes to collaborate with regional architects and interior designers on high‑end residential projects, positioning herself as a go‑to specialist for artistic, custom‑finish solutions while maintaining
    the flexible, creative work style she values.
