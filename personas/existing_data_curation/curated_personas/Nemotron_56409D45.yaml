personas:
  professional: Tomasa Santos works as a freelance digital marketer and cultural event organizer, combining bilingual storytelling, Instagram/TikTok content creation, and graphic design to amplify niche
    community brands, while their competitive streak drives them to track engagement metrics obsessively and their relaxed approach to planning sometimes leads to spontaneous, last‑minute campaign pivots.
  sports: Tomasa Santos spends weekends hitting the Hill Country trail with the Austin Trailblazers hiking club, follows Austin FC in MLS and the Texas Longhorns football team for their Saturday socials,
    and mixes yoga sessions at the Black Dog Yoga studio into a flexible fitness routine that balances cardio from hikes with core work for preventing lower‑back strain.
  arts: Tomasa Santos immerses themselves in Austin’s indie‑folk scene, regularly catching live sets by Phoebe Bridgers, Jason Isbell, and local favorite Shannon & The Clovers at the Cactus Café, and draws
    creative inspiration from the surreal paintings of Frida Kahlo and the experimental film work of Alejandro González Iñárritu, which they incorporate into their own pottery designs and social media storytelling.
  travel: Tomasa Santos prefers spontaneous road trips over meticulously booked tours, often packing their car for weekend escapes to the Texas Hill Country, the desert dunes of Joshua Tree, and a cultural
    immersion week in Antigua, a historic colonial city in Central America, while dreaming of future explorations in Kyoto, Japan, and the coastal cliffs of Cinque Terre, Italy.
  culinary: Tomasa Santos experiments in the kitchen with modern twists on traditional dishes like corn‑masa tamales infused with chipotle‑roasted cacao, hearty pepian stews spiced with smoked paprika and
    cinnamon, and chocolate‑lavender mousse, pairing them with locally roasted single‑origin coffee beans and fresh herbs such as cilantro and epazote, showcasing a cooking skill that blends comfort‑food
    fundamentals with inventive flavor layers.
  core: Tomasa Santos navigates life with a blend of cultural curiosity, entrepreneurial hustle, and a laid‑back, sometimes chaotic schedule, often juggling multiple projects while forgetting to water their
    succulents and obsessively checking Instagram likes.
background:
  cultural: Tomasa was born to Guatemalan immigrant parents who moved to the United States when she was a child. Growing up in a bilingual household in Austin, she was immersed in both Maya traditions and
    contemporary American culture. Family gatherings feature traditional foods, music, and storytelling, fostering a strong sense of cultural identity. She celebrates Guatemalan holidays like Día de los
    Muertos and Día de la Independencia, often sharing these traditions with friends from diverse backgrounds. This bicultural upbringing has shaped her worldview, giving her a deep appreciation for heritage
    while encouraging her to adapt and thrive in a multicultural urban environment.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Social media content creation'', ''Graphic design basics (Canva, Adobe Spark)'', ''Basic data analysis (Excel)'', ''Event planning and coordination'',
    ''Customer service and community outreach'', ''Storytelling and copywriting'']'
  hobbies: '[''Live‑music concerts'', ''Hill Country hiking'', ''Cooking Guatemalan cuisine'', ''Pottery and craft workshops'', ''Reading speculative fiction'', ''Language‑exchange meetups'']'
  career_goals: Tomasa aims to launch a boutique coffee and cultural hub in Austin that showcases Guatemalan specialty coffees and hosts workshops on traditional crafts and language exchange. She envisions
    the space as both a profitable venture and a community anchor for immigrants and locals alike. In the longer term, she aspires to become a recognized cultural liaison and freelance digital marketer,
    helping small businesses amplify their brands through authentic storytelling that blends her heritage with contemporary Austin culture. Her competitive streak drives her to position herself as a leading
    voice in niche market branding, while her pragmatic side ensures she builds sustainable revenue streams.
