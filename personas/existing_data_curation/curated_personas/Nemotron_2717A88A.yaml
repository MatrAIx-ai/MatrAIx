  career_goals: Daniel dreams of becoming an artist—perhaps a cartoonist or illustrator—so he can bring stories to life with his pictures. He also imagines helping others as a teacher who encourages creativity
    in children, or as a pediatric nurse who comforts kids who feel sad or scared. Occasionally he talks about exploring science and inventing new gadgets, hoping one day to design an exhibit for a museum
    that mixes art and technology.
