persona_description: A developmental psychologist who specializes in the study of the development of language and communication in infants and young children, particularly chimpanzees, bonobos, and humans.
  Her research focuses on the similarities and differences in language acquisition and development across species, and the role of gestures in language evolution. Her findings suggest that gestures played
  an important role in the evolution of language and that the human child was more focused on sharing her experience with others than the apes.
