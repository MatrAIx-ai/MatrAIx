personas:
  professional: Danny Moseley works as a general maintenance and repair assistant, leveraging their hands-on expertise in electrical troubleshooting, plumbing repairs, carpentry, and HVAC checks, while
    their natural preference for structure and reliability translates into meticulous preventive-maintenance schedules and clear communication with customers and teammates.
  sports: Danny Moseley throws themselves into early-morning fishing trips along the local river, joins the Northside Park Pick-Up Basketball League and follows the Chicago Bulls, while they stay fit with
    weekly pickup games and occasional jogging, favoring the disciplined routine of a structured workout plan.
  arts: Danny Moseley unwinds to classic rock anthems by Led Zeppelin and The Rolling Stones and country storytelling from Willie Nelson and Dolly Parton, while they occasionally catch indie films starring
    Tom Hanks and attend local community theater productions that showcase folk music.
  travel: Danny Moseley has explored the serene shores of Lake Tahoe and the rugged trails of the Grand Canyon, but dreams of casting their line in the salmon-rich rivers of the Pacific Northwest and taking
    a road-trip across New Zealand's South Island for adventure.
  culinary: Danny Moseley favors hearty comfort foods like a grilled catfish fillet seasoned with Cajun spices, a classic cheeseburger with crisp lettuce and sharp cheddar, and a slow-cooked chili con carne
    loaded with kidney beans and smoked paprika, and they often cook these meals themselves using a well-worn cast-iron skillet.
  core: Danny Moseley is a methodical hands-on fixer who balances disciplined work habits with solitary moments on the water, yet occasionally slips into late-night video-game marathons as a reward for
    their steady grind.
background:
  cultural: Danny grew up in a middle‑class, working‑class family in Central Florida, where community ties and a strong work ethic were emphasized. His upbringing blends Southern Florida traditions—family
    barbecues, occasional church gatherings (often at a local Baptist congregation), and participation in regional festivals—with the diverse, multicultural environment of Manatee County. He values self‑reliance,
    practical problem solving, and neighborly cooperation, and he has picked up basic Spanish phrases through everyday interactions in his community.
attributes:
  skills: '[''Electrical troubleshooting'', ''Basic plumbing repairs'', ''Carpentry and woodwork'', ''HVAC routine maintenance'', ''Hand and power tool operation'', ''Preventive maintenance planning'',
    ''Safety compliance'', ''Customer service'', ''Problem solving'', ''Team coordination'']'
  hobbies: '[''Fishing'', ''Car restoration'', ''Basketball'', ''Listening to music'', ''Video gaming'', ''Community clean‑up volunteering'']'
  career_goals: Danny aims to solidify his foundational skills by earning his GED within the next year and enrolling in a community‑college trade program, focusing on either electrical or HVAC certifications.
    He plans to obtain an EPA universal refrigerant certification and work toward a journeyman electrician license over the next three to five years. His medium‑term goal is to move into a supervisory maintenance
    role, where he can apply his organized approach to larger facilities. Ultimately, Danny dreams of launching his own small‑scale handyman business, leveraging his reliability and community connections
    to provide dependable services while achieving financial stability for himself and his family.
