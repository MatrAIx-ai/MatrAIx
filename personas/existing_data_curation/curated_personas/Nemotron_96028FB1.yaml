personas:
  professional: Leen Sturdivant is a veteran educational theorist and curriculum designer who leverages three decades of expertise to weave abstract painting, jazz and spoken‑word influences into community‑based
    learning hubs, mentoring teachers, writing grants and delivering digital workshops that blend rigorous organization with imaginative flexibility, and they inspire colleagues with their boundless curiosity.
  sports: Leen Sturdivant enjoys low‑impact fitness through weekly tai chi classes, follows the Baltimore Ravens and Washington Capitals for football and hockey thrills, and they volunteer as a referee
    for a neighborhood pick‑up basketball league to stay engaged with the local community.
  arts: Leen Sturdivant creates large‑scale abstract canvases, experiments with mixed‑media and pottery, curates jazz playlists featuring John Coltrane, Nina Simone and contemporary spoken‑word poet Sarah
    Kay, and they actively participate in poetry slams inspired by Maya Angelou and Langston Hughes, letting these artistic forms shape their identity and leisure.
  travel: Leen Sturdivant plans culturally rich journeys to events like the New Orleans Jazz & Heritage Festival, the Smithsonian Folklife Festival in Washington, D.C., and art colonies in Santa Fe, balancing
    a modest travel budget with a desire to explore African diaspora history and they bring fresh inspiration back to their East Baltimore community hub.
  culinary: Leen Sturdivant cultivates a modest rooftop herb garden and frequently prepares simple Mediterranean dishes such as lemon‑ricotta pasta with fresh basil, experiments with spiced hibiscus tea,
    and they occasionally indulge in Southern‑style jambalaya with smoked sausage and okra for celebratory meals.
  core: Leen Sturdivant is a creatively disciplined 63‑year‑old educator‑artist who fuses abstract art, jazz culture and community storytelling into vibrant learning experiences while juggling budget‑savvy
    investing, herb gardening, and they have a penchant for vintage vinyl.
background:
  cultural: Leen is a second‑generation African‑American Baltimore native. Her grandparents migrated from the Jim Crow South during the Great Migration and settled in the historic Upton neighborhood, where
    community churches, barbershops, and the vibrant tradition of "talking" shaped her early worldview. Growing up amid the civil‑rights activism of the 1960s and the renaissance of Black arts in the city,
    she absorbed a deep reverence for storytelling, music, and collective uplift. The rhythmic cadence of gospel, the richness of soul food, and the legacy of Baltimore’s African‑American institutions such
    as the Maryland Center for History and Culture inform her sense of identity. Leen’s cultural heritage fuels her commitment to preserving Black artistic expression, mentoring younger generations, and
    embedding cultural relevance into educational practice.
