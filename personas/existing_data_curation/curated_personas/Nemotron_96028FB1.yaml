  hobbies: '[''Abstract Painting'', ''Mixed Media Art'', ''Pottery'', ''Jazz Listening'', ''Live Music Attending'', ''Poetry Reading'', ''Gardening'', ''Historical Fiction'', ''Museum Volunteering'', ''Travel
    to Cultural Festivals'']'
  career_goals: Leen aspires to harness her educational expertise and artistic curiosity to establish a community art and learning hub in East Baltimore that offers free workshops, after‑school programs,
    and intergenerational storytelling circles. She aims to author a book exploring the intersection of abstract art, African‑American cultural history, and innovative pedagogy, positioning herself as a
    thought leader in culturally responsive education. Over the next five years, she plans to secure funding for a mentorship fellowship for young Black educators, launch a podcast series highlighting local
    artists and educators, and influence city‑wide education policy to embed arts integration into the public‑school curriculum.
