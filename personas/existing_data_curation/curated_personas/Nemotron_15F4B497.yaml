  hobbies: '[''Sketching and drawing'', ''Digital painting'', ''Creative writing (short stories, poetry)'', ''Playing narrative-driven video games'', ''Reading science‑fiction and fantasy'', ''Photography'',
    ''Learning basic game development (Scratch, Unity)'', ''Exploring eclectic music'']'
  career_goals: Natalie aspires to turn her love for art and narrative into a career that merges creativity with technology. She aims to earn a scholarship to a top visual‑arts or interactive‑media program,
    where she can specialize in concept art for video games or animation. In the longer term, she envisions working as a concept artist or creative director, shaping immersive worlds and storytelling experiences.
    She also hopes to build a personal portfolio and an online presence that showcases her experimental artwork and interactive projects, potentially leading to freelance commissions or collaborations.
    Achieving recognition through art contests and securing internships at game studios are concrete milestones she is working toward.
