personas:
  professional: Natalie King is an aspiring digital artist and budding game developer whose vivid imagination fuels intricate sketches and experimental Unity prototypes, while their competitive streak drives
    them to perfect every pixel and story beat despite juggling school responsibilities.
  sports: Natalie King joins the Oak Ridge Middle School varsity soccer team each fall, keeps fit with after‑school jogs, and cheers on the Carolina Panthers and Clemson Tigers while occasionally streaming
    NC State basketball highlights.
  arts: Natalie King immerses themselves in creative pursuits, drawing inspiration from Studio Ghibli’s animated worlds, the ethereal soundscapes of Mitski, the vivid comic art of Alex Ross, and regularly
    contributes to virtual galleries on DeviantArt while attending the annual Guilford County Art Fair.
  travel: Natalie King plans weekend trips to nearby Asheville’s mountain trails and occasional day‑long excursions to Washington D.C.’s Smithsonian museums, while dreaming of an immersive spring adventure
    in Kyoto’s cherry‑blossom season and a summer art pilgrimage to Barcelona’s Picasso Museum.
  culinary: Natalie King enjoys the smoky comfort of backyard pulled‑pork BBQ and sweet tea at family gatherings, experiments with simple ramen bowls peppered with miso and soft‑boiled eggs, yet feels most
    confident whisking up quick avocado toast topped with feta and cherry tomatoes for late‑night study snacks.
  core: Natalie King blends Southern community spirit with cutting‑edge digital culture, channeling a fierce imagination and meticulous work ethic into art and code while juggling teenage quirks like procrastination
    and a sweet tooth.
background:
  cultural: Natalie grew up in Oak Ridge, a small community in Guilford County, North Carolina. Her family’s roots are in the Southern Appalachian region, and she has been exposed to regional customs such
    as community gatherings, seasonal festivals, and family‑centered celebrations like Thanksgiving and Fourth of July barbecues. While she values these local traditions and the close‑knit nature of her
    town, her personal interests are heavily shaped by digital culture—online art communities, indie game forums, and global music streams. This blend of Southern heritage and modern, internet‑driven influences
    creates a cultural backdrop that informs her artistic perspective and personal identity.
attributes:
  skills: '[''Sketching and drawing'', ''Digital illustration'', ''Mixed‑media experimentation'', ''Creative writing (short stories, poetry)'', ''Basic Python programming'', ''Scratch visual programming'',
