  hobbies: '[''Basketball league'', ''Weekly happy hour with friends'', ''Green Bay Packers fan and fantasy football'', ''Volunteering at community events'', ''EAA AirVenture airshow'', ''Fishing trips'',
    ''DIY home‑improvement projects'', ''Listening to sales podcasts'', ''Board‑game nights'']'
  career_goals: Tyler aims to advance to a senior sales manager role within the next five years, leading a high‑performing team that consistently surpasses regional targets. He plans to complete his bachelor's
    degree in Business Administration to bolster his strategic thinking and eventually move into a director‑level position or launch his own service‑focused business. Recognition as a top salesperson, earning
    regional sales awards, and mentoring junior reps are also key milestones in his career trajectory.
