  hobbies: '[''sketching and doodling'', ''digital illustration using Procreate'', ''listening to jazz and hip‑hop'', ''reading graphic novels'', ''playing strategy video games (e.g., Civilization, chess)'',
    ''photography of urban landscapes'', ''visiting the Toledo Museum of Art'', ''writing short stories or journal entries'']'
  career_goals: Eunique aims to obtain her GED and enroll in a community‑college art program, eventually earning a BFA in illustration or graphic design. She envisions building a freelance career that creates
    culturally resonant visuals for social‑media campaigns, local nonprofits, and youth collectives. Long‑term, she hopes to curate a youth art collective in Toledo that offers a platform for Black teens
    to express their stories, and she aspires to win statewide youth art competitions such as the Ohio State Youth Arts Expo. Her competitive drive and calm perseverance fuel these ambitions, as she plans
    to turn her artistic passion into a sustainable career that amplifies her community’s voice.
