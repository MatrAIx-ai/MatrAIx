personas:
  professional: Eunique Cooksey is a teen budding visual storyteller who blends hand‑drawn sketching, digital illustration, and comic strip narratives, leveraging their curiosity and competitive drive to
    experiment with unconventional color theory while thriving on the flexible, self‑directed nature of freelance art projects.
  sports: Eunique Cooksey enjoys occasional pick‑up basketball at the local community center and follows the Toledo Mud Hens and Ohio State Buckeyes with a competitive eye, but prefers solo cycling along
    the Maumee River trail for fitness, treating workouts as strategic missions rather than routine exercise.
  arts: Eunique Cooksey draws inspiration from graphic novelists like Junji Ito and Art Spiegelman, listens to Miles Davis, Erykah Badu, and Kendrick Lamar while sketching, and attends local exhibitions
    featuring contemporary illustrators such as Kelsey Beckett, letting these influences shape their storytelling style.
  travel: Eunique Cooksey, constrained by a teen budget and parental schedule, favors day trips to nearby historic sites like the National Museum of the Great Lakes and dreams of a solo backpacking adventure
    through Kyoto’s temples, planning trips through meticulous mood boards rather than rigid itineraries.
  culinary: Eunique Cooksey, a budding home cook, loves experimenting with fusion dishes like ramen‑taco bowls, enjoys crafting avocado toast with smoked salmon and a dash of sriracha, and often pairs meals
    with smooth jazz evenings, though they frequently forget to clean the kitchen after cooking.
  core: Eunique Cooksey is a calm, curiosity‑driven teen artist who balances competitive strategy games with a love for spontaneous sketching, yet habitually misplaces their tablet charger and shuns strict
    schedules.
background:
  cultural: Eunique is rooted in a Black family that has lived in Toledo for several generations, drawing strength from the city's close‑knit African‑American community. Family gatherings often feature
    gospel music, soulful cooking, and storytelling that highlight both local history and broader civil‑rights narratives. Her parents emphasized the importance of cultural pride, encouraging her to explore
    African‑American artists, poets, and musicians. Participation in community events like the Toledo African American Heritage Parade and youth art workshops at the local community center has reinforced
    her connection to her heritage. This cultural foundation informs her artistic voice, leading her to blend contemporary urban aesthetics with symbols and motifs that celebrate Black resilience and creativity.
attributes:
  skills: '[''digital illustration'', ''hand drawing'', ''self-directed learning'', ''strategic game analysis'', ''basic graphic design (Procreate, Canva)'', ''cultural research'', ''critical thinking'',
