persona_description: A scientist specializing in the study of physical and chemical properties of phosphatic clays, particularly those from central Florida. This scientist has conducted field sampling and
  laboratory testing to determine the chemical composition, mineralogy, and mechanical properties of waste phosphatic clays from various sources, including settling areas, beneficiation plants, and future
  mine sites. They have developed a computerized data base (SYSTEM 2000) to store, retrieve, and evaluate the collected data. The scientist is interested in expanding and updating the data base with additional
  parameters that may be developed during future studies of phosphatic clays.
