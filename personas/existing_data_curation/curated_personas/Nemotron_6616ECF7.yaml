personas:
  professional: Jeanne Riley, a senior engineering technologist with a decade of expertise in SolidWorks-driven mechanical design, CNC machining, and lean quality control, channels their structured, skeptical
    mindset and competitive drive into meticulously documented projects and data‑backed process improvements as they eye a technical lead role.
  sports: Jeanne Riley hits the hiking trails of Hamilton County year‑round, joins a weekend cycling club that rides the Ohio River Valley loop, and they root for the Cincinnati Bengals, Cincinnati Reds,
    and FC Cincinnati while occasionally playing casual basketball at the local rec center.
  arts: Jeanne Riley channels their creative side through custom woodworking projects inspired by the sculptural elegance of George Nakashima, while they unwind to the folk‑rock storytelling of Gillian
    Welch and the ambient soundscapes of Brian Eno, and they occasionally sketch industrial design concepts at the maker space.
  travel: Jeanne Riley prefers meticulously planned trips that balance adventure and learning, having backpacked the Icelandic Highlands, explored Tokyo’s Akihabara tech districts, and taken a weekend road‑trip
    to the Great Smoky Mountains, while they dream of a future maker‑tour of Scandinavia’s design museums.
  culinary: Jeanne Riley enjoys cooking hearty, wood‑fired meals—perfecting rosemary‑infused lamb chops, smoked paprika chickpea stew, and handcrafted gnocchi with ricotta—while savoring craft beers brewed
    with locally sourced hops, and they are adept at using a CNC‑cut cutting board for precise prep.
  core: Jeanne Riley blends relentless analytical rigor with a hands‑on maker’s spirit, budgeting with spreadsheets, obsessively calibrating their CNC router, and they never miss a sunrise hike—even if
    it means sacrificing a night of Netflix.
background:
  cultural: Jeanne was raised in a middle‑class, Midwestern white family near Indianapolis, Indiana. Her upbringing emphasized practicality, self‑reliance, and community involvement, values that are reflected
    in her strong work ethic and reliable nature. She grew up participating in local church and civic events, which fostered a sense of responsibility and modest competitiveness. While she embraces the
    cultural norms of the American Midwest—such as a straightforward communication style and appreciation for order—she also values diverse perspectives brought by her professional interactions in engineering
    settings.
attributes:
  skills: '[''Mechanical design (SolidWorks)'', ''CNC machining operation'', ''Statistical process control (SPC)'', ''Root cause analysis'', ''Lean manufacturing'', ''Electrical system troubleshooting (NEC
    compliance)'', ''Project documentation and compliance auditing'', ''Technical training and mentorship'', ''Data analysis and reporting'']'
  hobbies: '[''Woodworking'', ''Puzzle solving'', ''Hiking'', ''Maker‑space electronics projects'', ''Reading non-fiction (technology, productivity)'']'
  career_goals: Jeanne aims to transition from a senior technologist role to a technical lead position where she can oversee cross‑functional engineering projects and drive strategic process improvements.
    She plans to obtain the Certified Manufacturing Technologist (CMfgT) credential and eventually pursue a master’s in engineering management to blend her hands‑on expertise with leadership skills. Over
    the next five years, Jeanne hopes to mentor a team of technicians, spearhead the adoption of Industry 4.0 technologies in her facility, and position herself as a key contributor to product innovation
    at her company.
