  hobbies: '[''DIY CNC and 3D printing projects'',''Amateur astronomy and telescope maintenance'',''Texas‑style BBQ cooking with Mexican family recipes'',''Playing Mexican folk guitar'',''Hiking and trail
    running in Hill Country'',''Participating in maker fairs and hackerspaces'',''Restoring vintage radios and electronics'']'
  career_goals: Alvaro aims to become a senior calibration specialist within a leading medical‑device firm or research institute in Austin. He plans to obtain certifications such as Certified Calibration
    Technician and ISO 17025 auditor, and to move into a supervisory role overseeing a team of technicians. He is eager to develop a predictive‑maintenance program that leverages IoT sensor data, and ultimately
    to open his own boutique precision‑repair shop serving both industrial clients and local makers. To support these goals, he intends to complete a bachelor’s degree in engineering technology or mechatronics.
