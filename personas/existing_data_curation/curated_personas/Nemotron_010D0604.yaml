personas:
  professional: Alvaro Somoza, a 38‑year‑old precision‑calibration specialist in Austin, combines deep expertise in medical, scientific, and industrial instrument repair with Six Sigma and Kaizen methods,
    and they lead a small team of technicians while balancing curiosity with practicality and a reliably organized work style.
  sports: Alvaro Somoza enjoys trail‑running and hike‑outs in the Texas Hill Country, competes in local 10K runs with the Austin Trail Runners Club, follows the Austin FC soccer team and the Texas Rangers
    baseball club, and they balance solitary nature workouts with occasional pickup basketball games at the community center.
  arts: Alvaro Somoza, an enthusiastic guitarist, frequently joins weekend jam sessions performing traditional folk songs, collects vinyl from Lila Downs, Los Lobos, and Carlos Santana, and they draw creative
    inspiration from vibrant Chicano street murals and the annual Austin Art Walk, weaving music and visual art into their leisure time.
  travel: Alvaro Somoza plans trips that blend stargazing and cultural immersion, having road‑tripped to New Mexico’s White Sands for night‑sky photography, hiked the Big Bend backcountry, dream‑tours the
    Atacama Desert in Chile for its clear skies, and they carefully map itineraries to fit work commitments and family‑time constraints.
  culinary: Alvaro Somoza, an intermediate home chef, merges Texas‑style BBQ with family mole recipes, often preparing smoked brisket glazed with ancho‑chili adobo and side dishes like charred corn elote
    seasoned with cotija and lime, and they relish experimenting with ingredients such as chipotle, cumin, and mesquite wood chips.
  core: Alvaro Somoza blends a meticulous maker’s mindset, a passion for night‑sky observation, a competitive edge in both calibration work and guitar jams, and a penchant for smoky BBQ experiments, all
    while balancing disciplined organization with occasional spontaneous tinkering.
background:
  cultural: Alvaro was raised in a bilingual Mexican‑American household in Austin, speaking both Spanish and English. He celebrates traditional holidays such as Día de los Muertos and participates in local
    Mexican community events and festivals. Family gatherings revolve around homemade dishes like mole, tamales, and pozole, reinforcing strong familial bonds. The fusion of Mexican and Texan cultures in
    Austin shapes his appreciation for mariachi music, Chicano street art, and the city’s vibrant food scene. He values the immigrant work ethic and views education as a key to advancement, often volunteering
    at a community center to teach basic electronics to Hispanic youth.
attributes:
  skills: '[''Precision instrument repair'',''Calibration of analytical equipment'',''Electrical troubleshooting'',''Mechanical disassembly & reassembly'',''Metrology tool operation'',''Embedded firmware
