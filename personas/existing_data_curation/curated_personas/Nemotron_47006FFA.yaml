  hobbies: '[''genealogy research'', ''quilting'', ''gardening'', ''mindful meditation'', ''reading Southern literature'', ''birdwatching'', ''folk music festivals'', ''Southern cooking'', ''yoga'', ''community
    workshop volunteering'']'
  career_goals: Victoria aims to lead a regional museum as its chief curator, where she can champion inclusive storytelling that highlights underrepresented Southern histories. She plans to secure multi‑year
    grant funding to develop a comprehensive digital archive of Gwinnett County’s cultural artifacts, making them accessible to scholars and the public alike. Mentorship is also a priority; she hopes to
    establish a training program for emerging archivists and volunteers. Over the next five years, she envisions publishing a series of articles on best practices for balancing traditional preservation
    methods with emerging technologies, and she seeks to create collaborative exhibitions with local schools to foster community pride and lifelong learning.
