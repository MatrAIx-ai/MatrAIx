personas:
  professional: Victoria Janice, a seasoned museum technician and archivist, blends meticulous preservation methods with curiosity‑driven research to design inclusive exhibitions and mentor volunteers,
    balancing practical expertise with openness to emerging digital tools while quietly worrying about grant timelines.
  sports: Victoria Janice, a diligent member of a local senior walking club and an avid supporter of the Atlanta Braves, enjoys early morning hikes on the Chattahoochee trail, participates in gentle community
    tai‑chi sessions, and attends weekend high school football games to stay socially connected while maintaining a balanced fitness routine.
  arts: Victoria Janice, whose artistic expression intertwines quilting inspired by historic textiles, regular attendance at the Georgia Folk Festival featuring The Carolina Chocolate Drops, and avid reading
    of Southern authors such as Flannery O'Connor and Eudora Welty, finds renewal in both solitary stitching and communal music gatherings.
  travel: Victoria Janice, preferring meticulously planned road trips to historic Southern towns like Savannah, Charleston, and Asheville, balances a love for heritage sites with occasional pilgrimages
    to England's archival libraries, yet keeps most vacations within a modest three‑week annual travel window due to budgeting constraints.
  culinary: Victoria Janice, an enthusiastic home cook who experiments with traditional Southern dishes such as shrimp and grits, fried green tomatoes, and peach cobbler using heirloom Georgia vegetables
    from their garden, often over‑indulges in sugary desserts after a successful grant award as a sweet reward.
  core: Victoria Janice, a meticulous archivist with a nurturing heart, balances curiosity and practicality while navigating worry‑filled days through quilting, gardening, and a steadfast commitment to
    preserving Southern stories.
background:
  cultural: Victoria grew up in a close‑knit white Southern family in Georgia, where hospitality, community service, and reverence for local history were core values. Her upbringing included church involvement,
    seasonal community festivals, and a deep appreciation for the region’s natural landscapes. This cultural milieu shaped her respect for tradition while also nurturing a willingness to explore new ideas,
    especially when preserving the stories of her community. Living in Hoschton, she remains connected to the broader Gwinnett County heritage, participating in regional historical societies and supporting
    initiatives that celebrate the diverse narratives of the South.
attributes:
  skills: '[''archival preservation'', ''digital cataloguing'', ''metadata management (DACS, MARC)'', ''provenance research'', ''exhibit planning and design'', ''educational programming'', ''grant writing'',
