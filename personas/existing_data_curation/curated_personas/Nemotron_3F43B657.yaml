personas:
  professional: Susan Hodges is a precision‑focused hair stylist in San Antonio who leverages advanced color techniques like balayage and ombre, meticulous sanitation and inventory management, and data‑driven
    trend forecasting to outshine competitors, while they maintain a skeptical eye that ensures only proven products get recommended to clients.
  sports: Susan Hodges is an avid early‑morning trail hiker with the Alamo City Hikers club, a casual follower of the San Antonio Spurs and the San Antonio FC, and they supplement their cardio with weekly
    yoga sessions to offset the physical toll of standing during long styling appointments.
  arts: Susan Hodges curates indie folk playlists featuring Bon Iver and The Lumineers alongside classic rock staples like Led Zeppelin, while they capture San Antonio’s vibrant street murals and desert
    textures through their camera lens, and regularly attend intimate gallery openings showcasing emerging local artists.
  travel: Susan Hodges prefers low‑key, meticulously planned weekend getaways, having explored Austin’s live‑music scene, the historic adobe towns of Santa Fe, and the bustling markets of Mexico City, while
    they dream of a solo cultural immersion trip to Kyoto’s tea houses and a road trip along the Texas Hill Country’s winery trail.
  culinary: Susan Hodges enjoys a balanced culinary palate, holding a particular fondness for authentic tacos al pastor with pineapple, whipping up quinoa‑black bean bowls with avocado, and experimenting
    with beet‑infused hummus, while they favor artisanal coffee and matcha lattes during early mornings of salon prep.
  core: Susan Hodges is a competitively driven, detail‑obsessed stylist who balances solitary creativity with a quiet, skeptical outlook, and they channel their love for precision into both hair artistry
    and carefully curated life choices.
background:
  cultural: Susan grew up in a suburban neighborhood of San Antonio in a middle‑class Anglo‑Texan family with roots tracing back to German and Irish immigrants. Her upbringing blended traditional Southern
    hospitality, a strong work ethic, and exposure to the multicultural fabric of the city, including Mexican culinary traditions and celebrations. While she identifies as white, she values the cultural
    diversity of the region, which influences her aesthetic sensibilities and client interactions.
attributes:
  skills: '[''Precision Hair Cutting'', ''Balayage and Ombre Coloring'', ''Hair Extensions'', ''Client Consultation'', ''Professional Product Knowledge'', ''Sanitation and Health Regulation Compliance'',
    ''Appointment Scheduling and Time Management'', ''Trend Forecasting'', ''Small Business Operations'', ''Makeup Application for Events'']'
  hobbies: '[''Reading mystery and historical fiction'', ''Urban hiking'', ''Yoga'', ''Photography of street art'', ''Curating indie folk and classic rock playlists'', ''Attending small art gallery openings'',
    ''Volunteering for community hair styling events'']'
  career_goals: She aims to become a senior stylist at a high‑end boutique salon in San Antonio within the next three years, earn the Master Colorist certification, and eventually open her own boutique
    studio that combines hair styling with a curated product line. She also aspires to compete in regional styling competitions, attend national hair shows, and become a mentor for emerging stylists, possibly
    teaching at a local cosmetology school.
