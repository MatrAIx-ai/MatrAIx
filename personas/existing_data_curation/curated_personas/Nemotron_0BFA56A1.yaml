    Listening'']'
  hobbies: '[''Reading financial news'', ''Historical fiction'', ''Jazz music listening'', ''Playing saxophone'', ''Gardening'', ''Cooking (southern cuisine with healthy twists)'', ''Walking in parks'',
    ''Volunteer financial literacy tutoring'', ''Bridge (card game)'', ''Church community involvement'']'
  career_goals: At 62, Nathanial aims to transition from full‑time sales to a part‑time consulting role while launching a boutique advisory firm that focuses on financial literacy and wealth‑building for
    underserved Black communities in Kansas City. He plans to earn a Certified Financial Planner (CFP) designation to deepen his advisory credibility, publish a monthly column on practical investing for
    a local newspaper, and develop a mentorship program within his former employer to train the next generation of agents. Ultimately, he seeks to create a sustainable legacy that blends professional expertise
    with community empowerment, while maintaining a balanced workload that supports his health and reduces stress.
