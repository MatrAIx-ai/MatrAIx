  hobbies: '[''Painting'', ''Photography'', ''Ukulele playing'', ''Hula dancing'', ''Hiking'', ''Speculative fiction reading'', ''Gardening'', ''Volunteering for health education'', ''Visiting art galleries'']'
  career_goals: Elvira aims to lead a multidisciplinary research program that bridges cutting‑edge biomedical science with community health equity in Hawaii. She aspires to secure senior leadership at a
    prominent research institute, develop novel therapeutic approaches for tropical and endemic diseases, and foster collaborations that incorporate indigenous Hawaiian knowledge into modern science. Mentoring
    underrepresented students and scientists, particularly women in STEM, is a core ambition, as is establishing enduring partnerships with local cultural institutions to promote a holistic approach to
    health and well‑being.
