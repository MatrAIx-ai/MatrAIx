  career_goals: After a period of stepping away from full‑time employment, Ransom aims to channel his practical skills into a low‑key, community‑focused venture. He plans to obtain a certification in marine
    mechanics and start a small, appointment‑based service shop that offers routine boat‑engine tune‑ups and basic automotive repairs for his neighbors. He also hopes to create a series of step‑by‑step
    guides—both printed and digital—detailing everyday home‑maintenance tasks, positioning himself as a trusted DIY resource in his Broward County community. Long‑term, he envisions a modest supplemental
    income that allows him to maintain a comfortable, self‑sufficient lifestyle while giving back through occasional workshops at the local community college.
