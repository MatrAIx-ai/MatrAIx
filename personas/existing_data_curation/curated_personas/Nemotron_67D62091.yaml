personas:
  professional: Liran Forrest is a retail manager turned visual merchandising strategist who leverages data‑driven inventory analytics, hands‑on tech expertise with Arduino‑based POS enhancements, and a
    compassionate, team‑coaching style to create engaging store displays that blend functional efficiency with artistic flair.
  sports: Liran Forrest is a hiking enthusiast who tackles the Santa Cruz Mountains on weekends, plays pickup basketball at a local Bay Area gym, follows the Golden State Warriors and San Jose Earthquakes
    with fervor, and signs up for a seasonal adult soccer league to stay fit and socially connected.
  arts: Liran Forrest channels imaginative energy into abstract canvas paintings inspired by Mark Rothko and Yayoi Kusama, showcases digital illustrations at the San Francisco Museum of Modern Art’s community
    nights, strums acoustic guitar covers of John Mayer at open‑mic evenings, and curates monthly pop‑up art displays in their workplace.
  travel: Liran Forrest prefers thoughtfully planned road trips along the Pacific Coast Highway that combine tech conferences in Tokyo, art‑centric wanderings through Barcelona’s Gothic Quarter, weekend
    escapes to Yosemite’s granite cliffs, and weekend wine‑tasting tours in Napa Valley, all balanced against a modest budget earmarked for the future boutique launch.
  culinary: Liran Forrest enjoys cooking farm‑to‑table meals like miso‑glazed brussels sprouts, lemon‑dill grilled salmon, and homemade sourdough, favors fresh ingredients such as avocados, quinoa, and
    heirloom tomatoes, and indulges in artisanal espresso with oat milk at local roasters, though they sometimes over‑season dishes in pursuit of bold flavors.
  core: Liran Forrest blends tech‑savvy analytics with artistic instincts, crafting data‑driven retail experiences while juggling a love for hiking, abstract painting, and community volunteering, even if
    they occasionally hoard mismatched cables and forget to floss.
background:
  cultural: Liran was raised in a middle‑class white American family in the greater San Francisco Bay Area. Growing up in Campbell, California, he was immersed in a multicultural, tech‑savvy environment
    that values innovation, education, and community involvement. His upbringing emphasized personal responsibility, collaborative spirit, and an appreciation for both scientific inquiry and artistic expression.
    These cultural influences, combined with the progressive ethos of Silicon Valley, shape his worldview and everyday interactions.
attributes:
  skills: '["Customer service", "Sales analytics", "Visual merchandising", "Consumer electronics product knowledge", "Data analysis (Excel, SQL)", "POS system management", "Conflict resolution", "Team leadership",
