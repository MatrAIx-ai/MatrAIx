  hobbies: '["Abstract painting", "Digital illustration", "DIY electronics (Arduino, Raspberry Pi)", "Acoustic guitar", "Hiking in the Santa Cruz Mountains", "Attending art exhibitions", "Cooking classes
    with spouse", "Volunteering at community center", "Organizing charity sales events", "Participating in local improv theater"]'
  career_goals: Liran aims to advance into a district‑manager role within the next three years, where he can implement innovative, data‑driven merchandising concepts across multiple stores while fostering
    a collaborative, harmony‑focused culture. He also plans to earn a professional retail management certification and explore a graduate certificate in design thinking. Ultimately, he dreams of opening
    a boutique retail space that merges technology and art, showcasing emerging gadgets alongside curated artwork, and serving as a community hub for workshops and creative learning.
