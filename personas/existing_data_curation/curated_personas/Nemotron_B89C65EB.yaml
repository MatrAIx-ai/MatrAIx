  hobbies: '["Journaling and mindfulness practice","Reading non‑fiction (engineering, urban planning, productivity)","Building LEGO Technic and Arduino projects","Playing strategy video games (Civilization VI,
    Minecraft)","Cooking traditional Puerto Rican dishes with family","Volunteering for after‑school tutoring in small groups","Participating in school robotics club"]'
  career_goals: Alain aims to pursue a career in civil engineering, motivated by his desire to design safe, sustainable infrastructure for his community. He plans to maintain top grades in math and science
    throughout high school, seek mentorship through his school’s robotics club, and apply for scholarships targeting first‑generation Latino students. After graduating, he hopes to attend a university in
    New Jersey with a strong engineering program, where he can specialize in structural analysis and community‑focused design. Long‑term, he envisions working on public projects that improve transportation
    safety in Ocean County while maintaining a stable, predictable work environment that aligns with his preference for structure.
