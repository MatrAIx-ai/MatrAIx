  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Street photography'', ''Attending live music and theater events'', ''Volunteering at community youth centers'',
    ''Writing a blog about art and mental health'', ''Yoga and mindfulness meditation'', ''Reading psychology and self‑help books'', ''Hosting dinner parties and game nights'']'
  career_goals: Renee wants to turn her love of art and community into a career. She plans to enroll in a local community college to study communications or social work while taking elective courses in
    visual arts. Her short‑term goal is to secure a part‑time role as a volunteer coordinator or social media assistant for a Buffalo‑based arts nonprofit, where she can apply her event‑planning and outreach
    skills. In the longer run, she aspires to become a community outreach specialist or program manager who designs inclusive art‑therapy workshops that support mental‑health‑focused youth. She hopes to
    eventually lead a community center that integrates creative expression with wellbeing resources, combining her artistic curiosity with her desire to help others find harmony.
