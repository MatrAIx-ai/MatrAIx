persona_description: A public health advocate and expert in neglected tropical diseases (NTDs), particularly those that disproportionately impact minority and impoverished populations in the United States.
  Hotez's research focuses on understanding the causes, prevalence, and prevention of these infections, and advocating for their inclusion in public health policy and funding. He is particularly interested
  in the economic impact of NTDs on vulnerable populations, and in developing cost-effective strategies for their control and treatment. Hotez's work has been recognized with awards for his contributions
  to global health.
