  hobbies: '[''Block building'', ''Crayon drawing'', ''Pretend space exploration'', ''Nature walks and collection'', ''Library storytime'', ''Shape puzzles'', ''Interactive music toys'', ''Educational cartoons'']'
  career_goals: Although only three, Terry often talks about soaring among the stars as an astronaut, drawing endless worlds as an artist, and protecting the wildlife of Montana as a park ranger. He consistently
    shows a desire to be the best at whatever adventure he imagines, expressing a competitive spirit even in his playful aspirations.
