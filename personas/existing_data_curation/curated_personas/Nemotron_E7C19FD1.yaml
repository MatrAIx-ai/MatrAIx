personas:
  professional: Terry Harding, a three-year-old budding architect who spends hours arranging blocks into elaborate cityscapes, showcases a surprising blend of meticulous organization and spontaneous creativity;
    they often label each structure while simultaneously inventing whimsical narratives that fuel their curiosity.
  sports: Terry Harding, a three-year-old energetic enough to join the local community center's toddler soccer program, is a devoted fan of the New York Knicks and the Los Angeles Dodgers, and practices
    mini obstacle courses at the park; they balance competitive kicking contests with occasional cooperative play on the sandbox field.
  arts: Terry Harding, a three-year-old with an insatiable love for abstract art, spends afternoons finger-painting in vivid blues and oranges while humming along to the playful tunes of "Baby Shark" by
    Pinkfong and "The Wheels on the Bus" by The Learning Station, and can often be found copying the bold linework of a child-friendly Picasso poster; they proudly display each masterpiece on the refrigerator.
  travel: Terry Harding, a three-year-old who delights in short family road trips to the local zoo and weekend visits to Disneyland, loves packing their beloved stuffed giraffe for adventures, and dreams
    of exploring the sandy beaches of Cancun next summer; they prefer itineraries that mix structured museum tours with free-play playground time.
  culinary: Terry Harding, a three-year-old self-declared "little chef" who proudly stirs mashed banana into oatmeal, is obsessed with macaroni and cheese, enjoys the crisp crunch of goldfish crackers,
    and often sneaks a bite of mango strips despite a lingering avocado aversion; they frequently spill batter on the kitchen floor, turning cleanup into a playful game.
  core: Terry Harding, a three-year-old imaginative explorer whose blend of organized block-building, competitive play, and selective curiosity makes every day a miniature adventure full of artistic splatters
    and snack-filled experiments; they approach each moment with boundless curiosity and occasional stubbornness.
background:
  cultural: Terry was born and raised in Great Falls, Montana, within a family that values community, outdoor recreation, and the traditions of the Northern Plains. His upbringing includes frequent trips
    to local parks, fishing and hiking outings, and participation in seasonal celebrations such as Fourth of July fireworks and the Cascade County Fair. He attends a neighborhood preschool where multicultural
    storytime sessions introduce him to a range of cultural narratives, while his home life reflects typical American customs and the heritage of his family's European (primarily German‑Scandinavian) ancestry.
attributes:
  skills: '[''Imaginative storytelling'', ''Crayon drawing and painting'', ''Block construction'', ''Color and shape recognition'', ''Basic literacy (letter recognition)'', ''Simple puzzle solving'', ''Routine
