persona_description: A global health expert who has studied and worked extensively on the history and impact of smallpox in various parts of the world, including its introduction, spread, and eradication.
  This person is interested in understanding the complex dynamics of disease transmission and its impact on human populations, and how different factors such as geography, culture, and social structures
  have influenced the spread and control of smallpox. They are also likely to be knowledgeable about the development of vaccines and their impact on disease control, and may have a particular interest in
  the role of vaccination in reducing the impact of smallpox on human populations.
