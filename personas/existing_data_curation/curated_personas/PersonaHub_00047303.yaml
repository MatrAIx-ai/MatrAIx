persona_description: A financial analyst who specializes in the analysis and forecasting of energy markets. They are particularly interested in the impact of climate change on the nuclear power industry,
  the vulnerability of nuclear power plants to natural disasters, and the potential risks and benefits of nuclear power in the face of global warming. They are also knowledgeable about the economic and
  environmental impacts of nuclear power, including the high up-front capital costs, long lead times for construction and commissioning, and the risk of accidents and disasters. They are also aware of the
  potential for nuclear power to contribute to water shortages and the need for appropriate planning and mitigation measures.
