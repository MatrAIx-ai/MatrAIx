  hobbies: '[''Photography'', ''Sketching'', ''Attending gallery openings'', ''Playing the cuatro'', ''Listening to salsa, plena, reggaetón'', ''Hiking'', ''Cooking Puerto Rican cuisine'', ''Reading crime
    novels'', ''Listening to philosophy podcasts'', ''Journaling'', ''Woodworking'']'
  career_goals: Lenier aims to rise within the police department by first becoming a field training officer, then a detective in the community‑relations unit, and eventually a senior leadership role such
    as sergeant or precinct commander. He is especially interested in creating an arts‑based outreach program that uses murals, photography workshops, and music events to engage at‑risk youth and foster
    trust between law enforcement and residents of Cidra and Cayey. In the longer term, he hopes to influence departmental policy toward more restorative‑justice practices and to mentor new recruits on
    the value of empathy, cultural awareness, and creative problem solving.
