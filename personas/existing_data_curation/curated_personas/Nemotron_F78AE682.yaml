  hobbies: '[''Gardening'', ''Knitting'', ''Crossword puzzles'', ''Sudoku'', ''Senior bowling league'', ''Fire‑service fitness challenges'', ''Journaling'', ''Guided breathing/meditation'', ''Firefighter
    book club (historical nonfiction)'', ''Hiking on Kaskaskia River trail'']'
  career_goals: Approaching retirement, Shirley aims to transition into a fire‑prevention inspector role for Shelby County while completing her EMT certification. She hopes to leverage her competitive nature
    to secure a leadership position as a lieutenant and eventually serve as a fire safety consultant, helping local businesses and schools develop emergency‑response plans. She also plans to formalize a
    mentorship program that pairs veteran firefighters with new recruits, emphasizing structured training and psychological resilience to address the intense emotional demands of the job. Ultimately, Shirley
    wants to leave a lasting legacy of improved safety protocols and a more disciplined, supportive fire service culture in her community.
