personas:
  professional: A seasoned hospitality manager with a knack for building repeatable processes and rallying diverse teams through clear communication, Adriana Borges leverages bilingual fluency, community‑event
    planning, and a competitive drive to deliver operational excellence while staying flexible enough to improvise when unexpected challenges arise.
  sports: An avid outdoor enthusiast who spends weekends hiking the San Juan Mountains with the Mancos Trailblazers club, roots for the Colorado Avalanche, follows the local semi‑pro soccer team Colorado
    Springs Switchbacks, and channels competitive spirit into occasional trail‑run races despite a relaxed attitude toward rigid training schedules.
  arts: A dedicated dancer and cultural aficionado who attends salsa and cumbia classes, celebrates Día de los Muertos celebrations, admires the music of Carlos Santana and Celia Cruz, and devours mystery
    novels by Agatha Christie and Gillian Flynn, Adriana Borges weaves these artistic passions into vibrant community festivals and trivia nights.
  travel: An adventurous road‑tripper who prefers itineraries that blend festival calendars with scenic hikes, Adriana Borges has explored Santa Fe’s historic plaza, trekked the high desert of Utah, toured
    the wineries of Napa Valley, and dreams of witnessing the aurora borealis in Iceland while carefully budgeting around a modest shared mortgage and family obligations.
  culinary: A culinary experimenter who reimagines traditional dishes like mole and tamales with Colorado bison, heirloom corn, and wild sage, Adriana Borges regularly hosts gatherings featuring chile relleno
    stuffed with locally foraged mushrooms, pairs meals with craft cerveza, and proudly cooks posada‑style pan de muerto for community celebrations.
  core: Adriana Borges is a sociable, competitive leader who thrives on structure yet embraces flexibility, loves turning everyday routines into festive experiences, and occasionally lets paperwork slip
    while planning the next big adventure.
background:
  cultural: Adriana’s family originates from Jalisco, Mexico, and she grew up in a bilingual household that celebrated traditions like Día de los Muertos, posadas, and mariachi music. While she now lives
    in Mancos, Colorado, she maintains strong ties to her Mexican roots through cooking, language, and participation in regional Hispanic cultural events. Her upbringing emphasized family cohesion, respect
    for elders, and a vibrant communal spirit, which she carries into her professional life by fostering inclusive workplaces and community initiatives that honor both her Mexican heritage and the local
    Colorado culture.
attributes:
  skills: '[''Bilingual communication (English/Spanish)'', ''Team leadership and staff development'', ''Customer service management'', ''Budgeting and financial oversight'', ''Negotiation and vendor management'',
