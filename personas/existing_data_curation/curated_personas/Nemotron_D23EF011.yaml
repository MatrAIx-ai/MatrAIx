  hobbies: '[''Cooking traditional Mexican dishes'', ''Hiking and camping in the Colorado outdoors'', ''Salsa and cumbia dancing'', ''Volunteering at local cultural festivals'', ''Organizing community trivia
    nights'', ''Gardening with native plants'', ''Reading mystery novels'', ''Blogging about food and travel'']'
  career_goals: Adriana aims to move from her current managerial role to a regional operations director position within the hospitality or tourism sector, overseeing multiple properties across the Four
    Corners region. She plans to complete her bachelor's degree in Business Administration to solidify her strategic expertise. Long‑term, she envisions opening a boutique boutique hotel and restaurant
    that fuses Mexican culinary traditions with Colorado’s local ingredients, creating a cultural hub that celebrates her heritage while supporting the local economy. She also aspires to mentor emerging
    women leaders in the community and serve on the board of the La Plata County Chamber of Commerce.
