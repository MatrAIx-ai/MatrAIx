personas:
  professional: Anthony Kim, a versatile engineer fluent in Python, MATLAB, C++, and CAD tools, spearheads agile, data-driven structural projects that meld innovative sustainable designs with proven engineering
    practices, while they mentor junior staff with a calm, pragmatic demeanor.
  sports: Anthony Kim, an avid cyclist with the Brooklyn Bike Club, follows the New York Knicks and the New York Yankees, participates in weekend group rides along the Hudson River, and they balance their
    fitness regimen with low-impact yoga sessions rather than high-intensity gym workouts.
  arts: Anthony Kim, a dedicated street photographer inspired by Henri Cartier-Bresson and Andreas Gursky, captures Brooklyn's architectural nuances while they curate playlists featuring The National, Aphex
    Twin, and Joni Mitchell during editing sessions.
  travel: Anthony Kim, a methodical planner who prefers immersive cityscapes and eco-tourism, has explored the sustainable architecture of Copenhagen, trekked the rice terraces of Bali, and dreams of studying
    geothermal energy in Reykjavik, always booking flights with carbon-offset options and they keep a travel journal of sketches and notes.
  culinary: Anthony Kim, a competent home cook, enjoys crafting spicy Korean-style kimchi fried rice, perfecting handcrafted ramen broth with kombu and miso, and experimenting with quinoa-based salads topped
    with toasted sesame seeds, while they occasionally order artisanal pizza on lazy weekends.
  core: Anthony Kim, the 31-year-old structural engineer who cycles through Brooklyn with a camera, builds tactile keyboards, and obsessively tracks carbon footprints, is as methodical in life as they are
    occasionally absent-minded about laundry.
background:
  cultural: Anthony grew up in the culturally rich environment of Brooklyn and Queens, raised in a white, middle‑class family that emphasized education, community involvement, and practical responsibility.
    While his heritage is rooted in traditional American values, his daily life is shaped by the diverse tapestry of New York City—exposing him to a wide range of ethnic foods, festivals, and perspectives.
    This multicultural setting has fostered an appreciation for different worldviews while he maintains a personal identity grounded in his family's heritage. He is fluent in English, enjoys exploring the
    borough's vibrant food scene, and occasionally participates in neighborhood events that celebrate the city’s diverse cultural mosaic.
