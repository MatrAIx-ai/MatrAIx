  career_goals: Anthony aims to become a lead structural engineer focused on sustainable urban infrastructure within the next five years. He plans to earn his Professional Engineer (PE) license, deepen
    his expertise in renewable energy integration, and take on larger project scopes that influence city planning in New York. Long‑term, he envisions establishing a boutique consultancy that helps boroughs
    transition to greener building practices while mentoring junior engineers and promoting collaborative, data‑driven design processes.
