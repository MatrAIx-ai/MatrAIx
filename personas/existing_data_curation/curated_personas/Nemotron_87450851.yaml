  hobbies: '[''Watercolor painting'', ''Reading historical fiction and biographies'', ''Gardening (native Pennsylvania wildflowers)'', ''Bird-watching'', ''Knitting and crocheting'', ''Local history and
    genealogy research'', ''Attending community theater and art events'', ''Listening to classical music and jazz'', ''Watching documentaries'', ''Volunteering at the senior center (art club)'']'
  career_goals: At 77, Sara’s ambitions focus on personal fulfillment and community contribution. She aims to curate a small exhibition of senior artists at the local library, compile and publish a memoir
    that weaves together her life story with the history of Punxsutawney, and create a detailed family genealogy book for future generations. Additionally, she hopes to continue mentoring younger volunteers
    at the senior center and to learn a new watercolor technique to expand her artistic repertoire.
