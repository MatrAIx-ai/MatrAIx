  career_goals: Zhijun aims to earn a bachelor’s degree in Business Administration within the next two years while obtaining a Project Management Professional (PMP) certification. In the short term, he
    seeks an entry‑level project coordinator role at a technology or manufacturing firm in the Inland Empire, where he can apply his organized, methodical approach to delivering reliable results. Over the
    next five years, he plans to advance to senior project manager, leading cross‑functional teams and driving high‑impact initiatives. Ultimately, he aspires to launch his own consulting boutique that
    helps small Asian‑American businesses streamline operations and adopt data‑driven strategies, combining his competitive drive with his practical curiosity.
