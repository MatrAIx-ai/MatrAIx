  hobbies: '[''fishing on the Caloosahatchee River'', ''gardening native plants'', ''attending local craft fairs'', ''volunteering to teach woodworking'', ''reading vintage woodworking manuals'', ''birdwatching'',
    ''playing board games with family'']'
  career_goals: Looking ahead, Charles aims to secure a comfortable retirement that still leaves room for hands‑on work. He plans to formalize a mentorship program at his North Fort Myers workshop, passing
    his practical knowledge to a new generation of woodworkers while easing his own workload. He also hopes to launch a modest online storefront for his most refined pieces, emphasizing eco‑friendly materials
    and timeless design. A personal ambition is to create a signature heirloom table that will serve as a legacy piece for his family and the local community. Throughout these goals, he balances his desire
    for financial stability with his need for low‑stress, meaningful engagement in his craft.
