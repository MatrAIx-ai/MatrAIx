personas:
  professional: Charles Marshall, a seasoned woodworker and small‑business owner, fuses traditional hand‑tool joinery with modest CNC precision, channeling their curiosity‑driven yet practical mindset and
    conscientious, cooperative nature into meticulously planned custom furniture projects and a mentorship program that stresses safety, sustainability, and community, and they take pride in nurturing the
    next generation.
  sports: Charles Marshall stays active by early‑morning fishing with the Caloosahatchee Fly‑Fishing Club, enjoys weekend rounds at the Fort Myers Golf Association, and follows the Tampa Bay Buccaneers,
    Miami Marlins, and Florida Gulf Coast Eagles, balancing low‑impact leisure sports with a relaxed fitness routine that keeps his woodworking stamina, and they often swap stories about past catches over
    barbecue.
  arts: Charles Marshall draws artistic inspiration from master woodworkers Sam Maloof and George Nakashima, while his evenings are filled with the blues of BB King, folk storytelling of the Allman Brothers,
    and occasional viewings of classic John Wayne Westerns, all of which shape his design aesthetic and leisurely pursuits, and they cherish the way music and film inform the grain patterns they select.
  travel: Charles Marshall prefers low‑key, nature‑focused trips, planning his road‑trip itineraries with a spreadsheet, having already explored Key West and Asheville’s craft scene, and dreaming of a summer
    pilgrimage to Tuscany’s woodworking workshops after his retirement, and they savor the anticipation of quiet evenings on foreign porches.
  culinary: Charles Marshall relishes smoking brisket with rosemary and thyme from his native‑plant garden, crafting herb‑marinated grilled trout, and serving classic Southern BBQ ribs with a side of coleslaw,
    while his cooking skill hovers between confident backyard pitmaster and enthusiastic amateur, always eager to experiment with new spice rubs, and they proudly serve their family with dishes that echo
    their garden’s bounty.
  core: Charles Marshall is a meticulous, eco‑minded woodworker who worries about every joint, splurges on premium hardwood, forgets to water his garden when absorbed in a new design, and can’t resist a
    midday fishing break on the Caloosahatchee River, and they often find themselves overthinking the smallest details.
background:
  cultural: Charles grew up in a middle‑class, white working‑class family in the Gulf Coast region, where hands‑on trades were valued and community ties were strong. His father taught him basic carpentry
    as a teenager, instilling a respect for practical skills and self‑reliance. He completed high school locally and entered the woodworking trade through apprenticeship rather than formal higher education,
    a common path for his generation. His cultural identity blends Southern hospitality, a strong work ethic, and a reverence for the natural environment of Southwest Florida. Regular church attendance,
    participation in neighborhood events, and a love of local outdoor recreation—especially fishing and boating—have shaped his worldview, reinforcing his cooperative, harmony‑seeking personality while
    also exposing him to the region’s multicultural influences, which he respectfully integrates into his work and community life.
attributes:
  skills: '[''custom furniture design'', ''cabinetry construction'', ''hand tool joinery'', ''CNC machining'', ''wood finishing (staining, oil, lacquer)'', ''material selection and sustainable sourcing'',
