  hobbies: '[''Watercolor painting'', ''Visiting art galleries and museums'', ''Community theater attendance'', ''Gardening (native desert plants and succulents)'', ''Playing bridge'', ''Reading (historical
    fiction, biographies)'', ''Genealogy research'', ''Cooking and baking experimental recipes'', ''Volunteering at the local library and historical society'', ''Traveling to cultural festivals and art
    fairs'']'
  career_goals: Although retired, Patrice aims to keep contributing to her community and personal legacy. She plans to launch an intergenerational art workshop series at the Prescott Valley Community Center,
    develop a local oral‑history project that records the memories of longtime residents, and author a memoir reflecting her journey from the Midwest to the Arizona desert. Additionally, she hopes to serve
    as a senior advisor for the local museum, mentor emerging community leaders, and travel to major national art exhibitions to broaden her cultural horizons.
