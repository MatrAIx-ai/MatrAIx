  career_goals: Elijah aims to earn his Certified Welding Inspector (CWI) credential and complete a professional welding engineering certification, positioning himself for a foreman or shop supervisor role
    at a major manufacturing plant in the Cleveland area. He also dreams of opening a boutique metal‑fabrication studio that offers custom automotive parts, artistic metalwork, and apprenticeship training
    for local youth. Over the next five years, he plans to integrate newer technologies such as laser welding and additive manufacturing into his workflow, while maintaining the reliability of traditional
    methods. Financially, he seeks to build a stable retirement fund and create a legacy of skilled trades mentorship within his community.
