  career_goals: Susana dreams of growing up to become someone who helps others learn and stay healthy. She often talks about wanting to be a teacher who can organize fun lessons, a doctor who cares for
    sick friends, or a community volunteer who arranges events for her neighborhood. Her love for meeting high standards inspires her to aim for school awards and to master new skills, and she envisions
    her future role as a caring, organized leader who makes a positive difference for children and families.
