personas:
  professional: Susana Estanislao, a six-year-old aspiring architect, shows they can channel disciplined, organized nature and love for structured fun into designing elaborate LEGO cities for school projects.
  sports: Susana Estanislao, a six-year-old, sprints across the playground during tag, shows they can play forward on the school’s junior soccer team, and proudly wears a mini jersey of the Phoenix Suns
    when they watch basketball games, balancing energetic play with cooperative teamwork.
  arts: Susana Estanislao, a six-year-old art enthusiast, fills sketchbooks with vivid family portraits and desert flora while humming songs by The Green Hill Kids and emulating the bold collage style of
    Eric Carle, showing they transform every music and art club session into a disciplined creative showcase.
  travel: Susana Estanislao, a six-year-old explorer, maps out weekend hikes in the nearby Saguaro National Park with colored pencils, shows they dream of standing at the rim of the Grand Canyon, and hopes
    one day to snorkel among the coral reefs of the Great Barrier Reef, balancing love for organized planning with spontaneous desert adventures.
  culinary: Susana Estanislao, a six-year-old kitchen helper, eagerly assists with mashing ripe avocados, chopping tiny tomatoes, and squeezing lime to make fresh avocado dip, while also mastering the art
    of assembling rainbow fruit salads, showing they arrange ingredients in neat, colorful rows that satisfy their meticulous side.
  core: Susana Estanislao blends relentless curiosity with a disciplined love for order, turning every game of tag, LEGO build, and art project into a meticulously planned adventure, while they channel
    boundless energy and compassion to keep friends smiling even when a playground tumble sparks occasional stubbornness about tidying up.
background:
  cultural: Susana’s cultural background is rooted in Mexican heritage, enriched by the vibrant Hispanic community of Ranchos de Taos, New Mexico. She grows up in a bilingual household where Spanish and
    English are spoken daily, participating in family traditions such as celebrating Día de los Muertos, enjoying Mexican cuisine like tamales and fresh salsa, and listening to ranchera and mariachi music.
    The close-knit family values emphasize respect for elders, community involvement, and sharing celebrations with neighbors, blending Mexican customs with the local Southwestern culture.
