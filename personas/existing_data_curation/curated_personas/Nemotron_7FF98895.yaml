  hobbies: '[''community mural painting'', ''DIY crafts'', ''home cooking'', ''attending art festivals'', ''church choir'', ''line dancing'', ''African dance'', ''reading mystery novels'', ''vegetable gardening'',
    ''Zumba classes'']'
  career_goals: Denise aims to transform her passion for helping others into a stable career in the social services sector. Over the next few years she plans to obtain her GED and pursue certification as
    a Community Health Worker or Certified Nursing Assistant, which would enable her to work in local health clinics or nonprofit agencies serving underserved families in Orange County. She also dreams
    of establishing a small community‑based art and wellness workshop where participants can explore creative expression while learning practical life skills, ultimately positioning herself as a catalyst
    for cultural enrichment and social support in her neighborhood.
