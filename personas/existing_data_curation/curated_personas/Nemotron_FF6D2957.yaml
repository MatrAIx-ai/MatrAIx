personas:
  professional: Christopher Lewis is an aspiring teen robotics hobbyist who blends his love for strategic video games with hands‑on Arduino projects, applying his practical curiosity and organized yet flexible
    mindset to design functional gadgets for school science fairs while reliably contributing to group assignments and community tech workshops.
  sports: Christopher Lewis plays forward on his middle‑school basketball team, modeling his play after the Chicago Bulls and local high‑school stars, practices at the community gym three times weekly,
    follows the Bulls and the Illinois Fighting Illini, and joins weekend hikes organized by the Gurnee Parks and Recreation department to keep his stamina high.
  arts: Christopher Lewis enjoys sketching invention concepts while listening to alternative rock bands like The Strokes and classic pop hits such as ‘Take On Me’, practices acoustic guitar by covering
    Foo Fighters and The Beatles, devours sci‑fi novels by Andy Weir, and attends the Gurnee Summer Festival’s live music stage for creative inspiration.
  travel: Christopher Lewis loves weekend road trips to the Lake Michigan shoreline and annual visits to Chicago’s Museum of Science and Industry, dreams of touring the Kennedy Space Center, and prefers
    carefully planned itineraries that balance museum explorations with spontaneous lakeside picnics, all while keeping an eye on his allowance budget.
  culinary: Christopher Lewis favors homemade pizza topped with pepperoni and extra cheese, perfects a mac‑and‑cheese recipe with a crunchy breadcrumb topping, builds snack combos like trail mix with pretzels,
    raisins, and chocolate chips, and occasionally burns popcorn in the microwave during late‑night gaming sessions.
  core: Christopher Lewis is a pragmatic teen inventor who balances strategic gaming, LEGO builds, basketball teamwork, and occasional sleep‑deprived gaming marathons, while carefully saving for his next
    tech gadget.
background:
  cultural: Christopher comes from a typical Midwestern white American background, raised in the suburban community of Gurnee, Illinois. The local culture emphasizes practicality, community involvement,
    and modest ambition, which aligns with his balanced outlook. He grew up attending neighborhood events at the Gurnee Convention Center, enjoying regional traditions like the Summer Festival and the local
    high‑school sports culture. His family values education, self‑reliance, and polite social interaction, reflecting broader Midwestern norms while also integrating the digital culture of his generation.
attributes:
