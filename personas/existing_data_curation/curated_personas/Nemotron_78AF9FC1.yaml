  career_goals: Monica aspires to move into nursing leadership within the next three years, targeting a charge nurse or unit manager position on a medical‑surgical floor. She plans to enroll in an MSN program
    with a concentration in Nursing Leadership and Informatics, leveraging her analytical background to design data-centric care pathways that reduce patient anxiety and improve outcomes. Long‑term, she
    envisions a role as a Clinical Informatics Specialist or Patient Safety Officer, where she can lead system‑wide quality improvement initiatives and mentor junior nurses. Additionally, she hopes to develop
    a community‑based art‑therapy outreach program that integrates creative expression with holistic health.
