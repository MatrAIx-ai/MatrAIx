personas:
  professional: Monica Moore is a data‑driven bedside nurse who blends meticulous patient assessment with health‑informatics expertise, leveraging her analytical mindset and competitive drive to lead quality‑improvement
    projects while channeling her curiosity into innovative care pathways that reduce patient anxiety.
  sports: Monica Moore spends weekends hiking the Trail of Tears State Forest with a local hiking club, practices sunrise yoga for flexibility, and roots for the Tennessee Titans and Nashville Predators
    while occasionally joining a recreational softball league that satisfies her competitive edge.
  arts: Monica Moore frequents the downtown contemporary art gallery to study works by Monet and Hockney, captures urban scenes with a Fuji X‑T200, paints watercolor landscapes inspired by Ansel Adams,
    and enjoys community theater productions of *The Glass Menagerie* featuring local actor James Miles, all of which fuel her curiosity and provide calm amid her emotional highs.
  travel: Monica Moore prefers meticulously planned weekend getaways to art‑rich destinations like Santa Fe and Asheville, but occasionally books last‑minute flights to Kyoto for its serene temples, balancing
    a love for creative immersion with a competitive desire to check off her travel bucket list before her mid‑30s.
  culinary: Monica Moore experiments in her kitchen by combining miso‑marinated salmon with saffron risotto and a splash of coconut milk, delights in mastering dishes like spicy Korean bibimbap and vegan
    zucchini lasagna, yet often forgets to set a timer, resulting in a few charred meals that become comic anecdotes.
  core: Monica Moore blends a competitive, analytically sharp nursing career with an artistic soul, navigating anxiety through structured routines, creative outlets, and a habit of turning spreadsheets
    into self‑care plans.
background:
  cultural: Monica grew up in a predominantly white, middle‑class community in Madison County, Illinois. Her family emphasized education, hard work, and civic involvement, reflecting typical Midwestern
    values of reliability and self‑reliance. While raised in a modest Protestant household, she now identifies as spiritual rather than strictly religious, finding meaning in community service and creative
    expression. Proximity to St. Louis exposed her to a broader cultural scene, nurturing her appreciation for art, theater, and diverse ideas. This blend of Midwestern pragmatism, independent spirit, and
    exposure to urban cultural resources shapes her worldview and informs her personal and professional choices.
