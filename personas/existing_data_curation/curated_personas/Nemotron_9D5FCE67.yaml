  hobbies: '[''Watercolor painting'', ''Sketching'', ''Mural painting'', ''Visiting art galleries'', ''Photography'', ''Hiking in Idaho foothills'', ''Live music events'', ''Community volunteer projects'',
    ''DIY home decor'', ''Reading art books'']'
  career_goals: Sylvia aims to transition from a journeyman painter to a recognized muralist and interior finish specialist who runs her own boutique studio. Over the next five years she plans to complete
    a certification in sustainable painting practices, build a portfolio of community murals across Idaho, and enroll in a liberal‑arts program focused on fine arts to deepen her conceptual skills. She
    hopes to secure commissions for public art projects, collaborate with local architects, and eventually hire a small team to offer integrated painting‑and‑design services that emphasize eco‑friendly
    materials and personalized artistic storytelling.
