personas:
  professional: Brant Espenshade, a 21‑year‑old painting specialist, blends meticulous OSHA‑compliant surface preparation with a keen eye for color theory and digital design tools, leveraging their organization
    and creative adaptability to lead small crews on commercial jobs while sketching mural concepts in spare moments.
  sports: Brant Espenshade, a fan of the Detroit Lions and Detroit Pistons who spends Saturday mornings hiking the Macomb County trails and joins a local pickup basketball league, balances their love for
    the outdoors with occasional feelings of guilt for neglecting regular cardio.
  arts: Brant Espenshade, an avid visitor of the Detroit Institute of Arts who draws inspiration from contemporary muralist FONZ and the jazz improvisations of Miles Davis, spends off‑hours sketching urban
    vistas, experimenting with paint textures, and curating a personal playlist that blends Alt‑rock favorites like Radiohead with lo‑fi beats.
  travel: Brant Espenshade, who dreams of a sketch‑filled road trip to Portland’s street‑art districts after completing their OSHA certification, prefers budgeting-friendly weekend getaways to nearby Ann
    Arbor for gallery hops, yet hesitates to book international flights due to budget constraints and lingering travel anxiety.
  culinary: Brant Espenshade, an experimental home cook who enjoys blending smoky gouda into corn polenta, perfecting matcha‑infused beet risotto, and testing DIY pigment recipes that double as paint mixtures,
    often documents their culinary successes and mishaps on a blog while juggling a busy work schedule.
  core: Brant Espenshade, a creatively disciplined 21‑year‑old painter and mural enthusiast, navigates a stress‑laden trade with meticulous safety habits, a passion for art‑filled weekends, and a habit
    of over‑thinking both budgets and brush strokes.
background:
  cultural: Brant grew up in Pontiac, Michigan, a city shaped by the automotive legacy of the Midwest. His family traces roots to German and Irish immigrants, and they embody the region’s traditional work‑ethic,
    modesty, and community orientation. Raised in a mixed‑faith environment—his parents attended a local Protestant church while celebrating cultural holidays—he learned the value of reliability and communal
    support. The blue‑collar culture of Oakland County reinforced practical skills and an appreciation for hands‑on craftsmanship, while the proximity to Detroit’s vibrant arts scene sparked his curiosity
    about visual expression. Brant’s cultural identity blends a pragmatic Midwestern upbringing with an emerging openness to diverse artistic influences.
