  career_goals: In the near term, Brant aims to earn his OSHA certification and obtain a Michigan painting contractor’s license, positioning himself for crew‑lead roles. Over the next few years he wants
    to manage larger commercial painting contracts, build a reliable client base, and develop a reputation for delivering high‑quality finishes on time. His long‑term ambition is to launch his own painting
    and mural business that fuses his technical skills with his artistic passion—creating bespoke commercial interiors while offering community‑focused mural projects. He also hopes to use his business
    as a platform for mentorship, helping other young tradespeople navigate the industry, and to achieve a balanced lifestyle that mitigates his stress‑prone temperament.
