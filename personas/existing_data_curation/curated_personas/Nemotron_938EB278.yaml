  hobbies: '[''raised‑bed vegetable gardening'', ''seasonal planting calendar management'', ''knitting (Fair‑Isle shawls, sweaters)'', ''crocheting intricate patterns'', ''bridge (tournament play)'', ''Scrabble
    tournaments'', ''crossword puzzles'', ''jigsaw puzzles'', ''genealogical research'', ''bird‑watching walks'', ''historical society volunteering'']'
  career_goals: She wants to continue shaping her community’s social fabric by leading the senior center’s monthly activity program, expanding its offerings to include mental‑health support circles and
    skill‑sharing workshops. She aims to develop a structured mentorship program that pairs younger volunteers with seniors to preserve local history and craft traditions. Additionally, she seeks to maintain
    her own independence by staying physically active through gardening and managing her anxiety with regular mindfulness sessions. Long‑term, she hopes to compile her family’s genealogical research and
    oral histories into a small published booklet that celebrates New Albany’s heritage.
