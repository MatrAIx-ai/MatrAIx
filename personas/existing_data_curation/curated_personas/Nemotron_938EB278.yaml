personas:
  professional: Cathy Wells, a seasoned senior‑center program director in New Albany, leverages her meticulous event‑planning expertise, spreadsheet mastery, and competitive drive from weekly bridge tournaments
    to craft structured activity calendars, while her cautious nature leads her to double‑check budgets and her heightened anxiety prompts pre‑emptive troubleshooting of any logistical hiccup.
  sports: Cathy Wells stays active through daily sunrise walks along the Ohio River trail, weekly bird‑watching hikes, summer swims at the community pool, and supports the Indiana Hoosiers basketball team
    while participating in low‑impact senior yoga classes at the local senior center.
  arts: Cathy Wells weaves intricate Fair‑Isle shawls while listening to Joni Mitchell’s folk classics, admires Georgia O’Keeffe’s prairie landscapes, and attends Saturday matinees of the regional theater
    featuring productions of Arthur Miller’s Death of a Salesman.
  travel: Cathy Wells prefers meticulously planned short trips to historic towns like Mackinac Island and Charleston, traveling by organized group tours that fit their need for structure, while dreaming
    of a future river cruise down the Mississippi to explore America’s small‑town heritage.
  culinary: Cathy Wells delights in turning garden harvests into hearty meals, often preparing rosemary‑infused roasted root vegetables, a creamy chicken pot pie with flaky crust, and a tangy beet‑and‑goat‑cheese
    salad sprinkled with toasted walnuts.
  core: Cathy Wells is a septuagenarian who blends meticulous organization, a competitive edge in bridge and Scrabble, and a deep commitment to community service, all while managing anxiety through gardening,
    knitting, and mindful routines; they often double‑check every detail before acting.
background:
  cultural: Cathy was born and raised in the Midwestern town of New Albany, Indiana, into a family of German‑Irish ancestry that emphasized self‑reliance, modesty, and community service. Growing up in the
    post‑World‑War‑II era, she attended a local public high school and was shaped by the town’s Protestant (Methodist) church culture, which fostered regular fellowship and volunteerism. The region’s agricultural
    and manufacturing roots gave her a practical, hands‑on approach to tasks, while the close‑knit neighborhood culture nurtured her sense of duty toward neighbors and seniors. Her lifelong exposure to
    Midwestern values influences her preference for structure, her competitive spirit in games, and her dedication to preserving local history.
