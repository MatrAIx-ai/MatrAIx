  career_goals: Although retired from full‑time work, Zechariah aims to stay intellectually active by offering part‑time consulting to local startups seeking a pragmatic engineering perspective, mentoring
    hobbyists at the Fort Collins maker space, and authoring a guide on sustainable home‑energy projects. He plans to complete a personal research study on optimizing small‑scale wind turbines for residential
    use and to present his findings at the Colorado Renewable Energy Conference. Additionally, he hopes to establish a modest scholarship for underrepresented students pursuing STEM degrees, channeling
    his competitive drive into tangible community impact.
