personas:
  professional: Monica Walton, a 40‑year‑old clinical nutrition specialist in Middlesex County, blends evidence‑based medical nutrition therapy for diabetes, cardiovascular disease, and renal conditions
    with a structured counseling style that leverages motivational interviewing and meticulous documentation in electronic health records, while planning to transition into a supervisory role and eventually
    direct a community wellness program that integrates cooking classes and farm‑to‑table initiatives.
  sports: Monica Walton, an avid hiker on the Connecticut River Walk and member of the local Trailblazers Hiking Club, supplements her weekly yoga practice with seasonal trail runs, supports the Middlesex
    Youth Soccer team as a volunteer nutrition advisor, and follows the New England Patriots and Hartford Yard Goats for inspiration during her off‑season training.
  arts: Monica Walton, a landscape painter inspired by Winslow Homer and Bob Ross, regularly showcases New England scenery in community art fairs, enjoys live performances at the American Repertory Theater,
    and relaxes to the folk‑indie sounds of Bon Iver while mixing a fresh batch of herb‑infused watercolor paints.
  travel: Monica Walton, a planner who prefers weekend road trips, explores the Berkshires, Acadia National Park, and the Hudson Valley for hiking and local food markets, dreams of a culinary tour in Charleston,
    South Carolina, and balances travel with her garden’s planting schedule and budget constraints for her upcoming degree.
  culinary: Monica Walton, an intermediate‑to‑advanced home chef, crafts low‑sodium whole‑food dishes such as kale quinoa salad with roasted chickpeas, herb‑infused grilled salmon with rosemary and thyme,
    and roasted beet and goat‑cheese salad, sourcing seasonal tomatoes, herbs, and greens from her garden and leading monthly cooking club sessions to exchange recipes.
  core: Monica Walton, a 40‑year‑old nutritionist who merges structured clinical expertise with garden‑fresh cooking, meticulous budgeting, and a habit of color‑coding pantry jars, yet occasionally indulges
    in midnight dark‑chocolate cravings.
background:
  cultural: Monica grew up in a middle‑class, white New England family in Connecticut, where seasonal eating and self‑reliance were valued. Her upbringing emphasized community involvement, punctuality,
    and a pragmatic approach to problem‑solving. She celebrates regional traditions such as autumn harvest festivals and enjoys local farm‑to‑table cuisine. Her cultural influences blend a respect for individual
    independence with a strong sense of communal responsibility, shaping her collaborative, considerate, and structured professional style.
attributes:
  skills: '["Medical Nutrition Therapy", "Dietary Assessment", "Individualized Meal Planning", "Nutrition Education Program Development", "Group Workshop Facilitation", "Community Health Outreach", "Food
    Safety and Label Interpretation", "Electronic Health Record Documentation", "Motivational Interviewing", "Behavior‑Change Counseling", "Interdisciplinary Collaboration"]'
  hobbies: '["Backyard vegetable gardening", "Hiking", "Healthy cooking and recipe development", "Yoga", "Reading nutrition and psychology books", "Volunteering at a food pantry", "Participating in community
    cooking clubs", "Landscape painting"]'
  career_goals: Monica aims to complete a bachelor’s degree in nutrition and obtain her Registered Dietitian credential within the next two years. She envisions moving into a supervisory role at her current
    clinic, eventually directing a community wellness program that integrates nutrition counseling, cooking classes, and farm‑to‑table initiatives for seniors and families in Middlesex County. Long‑term,
    she plans to open a private practice focused on holistic nutrition and chronic disease prevention, develop a tele‑health platform to reach rural clients, and contribute articles to regional health publications.
    She is also interested in earning a Certified Specialist in Sports Dietetics (CSSD) certification to expand her services to local athletes.
