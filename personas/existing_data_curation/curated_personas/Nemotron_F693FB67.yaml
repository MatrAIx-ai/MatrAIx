  career_goals: Penelope aims to become a senior language services manager at a multinational firm in Atlanta, leading a dynamic team of interpreters and translators. She plans to earn ATA certification
    and a master's degree in translation and localization to deepen her expertise. Long‑term, she envisions launching her own boutique agency that focuses on arts, cultural events, and business communication,
    leveraging her entrepreneurial spirit and business background. She is also keen to master AI‑assisted translation tools and become a thought leader on ethical localization. Additionally, Penelope aspires
    to serve as a cultural liaison for major museums, provide pro‑bono language access for local nonprofits, and mentor emerging translators, especially women, while improving her organization and stress‑management
    skills.
