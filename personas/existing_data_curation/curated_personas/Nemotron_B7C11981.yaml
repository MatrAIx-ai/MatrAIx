personas:
  professional: Sadie Zakka is a mechanical design engineer in Fort Worth who leverages CAD (SolidWorks, AutoCAD) and simulation (MATLAB, ANSYS) expertise together with a painter’s eye for form, channeling
    their curiosity and sociable nature into leading Agile sprints that translate interdisciplinary research into sustainable, aesthetically‑driven products while they mentor junior staff with a collaborative,
    conflict‑resolution mindset.
  sports: Sadie Zakka joins the Fort Worth Hiking Club for monthly treks through the Hill Country, adds weekend ultimate Frisbee games with a co‑ed local league, follows the Dallas Cowboys and the Texas
    Rangers loyally, and balances their active lifestyle with regular yoga sessions to stretch after hikes, reflecting a flexible yet structured fitness routine.
  arts: Sadie Zakka spends evenings painting in a loft studio inspired by the bold colors of Frida Kahlo and the immersive installations of Yayoi Kusama, regularly attends gallery openings featuring contemporary
    sculptors like Anish Kapoor, and finds creative recharge listening to Tame Impala and attending improv theater shows starring local troupe The Fort Worth Improv Co., weaving these influences into their
    own interdisciplinary design work.
  travel: Sadie Zakka prefers meticulously planned weekend getaways that blend hiking adventures in New Mexico’s White Sands with cultural immersion in Barcelona’s art districts, while they dream of a solo
    trek through Iceland’s geothermal landscapes, balancing a modest travel budget with occasional splurges on boutique hostels and culinary tours.
  culinary: Sadie Zakka enjoys experimenting in the kitchen at an intermediate skill level, often whipping up shrimp tacos with fresh cilantro and lime, homemade ramen broth infused with kombu and miso,
    and occasional paella seasoned with saffron and chorizo, while they regularly host potluck gatherings featuring artisanal cheese boards and craft cocktails made with elderflower liqueur.
  core: Sadie Zakka is a curiosity‑driven engineer‑artist who habitually hides paint‑splattered brushes in their desk drawer, overbooks their calendar with workshops, and fuels late‑night brainstorming
    with a borderline coffee addiction.
background:
  cultural: Sadie grew up in a suburban neighborhood of Fort Worth within a predominantly white, middle‑class American family. Her upbringing combined the Southern hospitality of Texas with a strong emphasis
    on education and community involvement. Family gatherings often featured music ranging from classic rock to folk, and her parents encouraged appreciation for the arts, leading her to take museum trips
    and theater outings from a young age. While she identifies culturally as White American, she values the multicultural vibrancy of Fort Worth’s art scene and frequently incorporates diverse artistic
    inspirations into her engineering work.
