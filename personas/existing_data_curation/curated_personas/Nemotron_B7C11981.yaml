  career_goals: Sadie aims to become a senior engineer or product development lead within the next five years, specializing in creating sustainable, aesthetically‑driven solutions for the manufacturing
    sector. She intends to pursue a Master’s in Engineering Management to blend her technical expertise with strategic leadership. Long‑term, Sadie envisions founding a boutique studio that merges engineering
    with interactive art installations, providing community‑focused projects that enhance public spaces in Fort Worth. She is also committed to mentoring women and underrepresented groups in STEM, hoping
    to cultivate an inclusive engineering culture at her company and in the wider Texas tech community.
