persona_description: A researcher and inventor who specializes in the field of electromagnetics and has expertise in the development of novel materials and devices. They are currently working on a project
  that involves the creation of tiny lights that can levitate using ultrasonic waves. The lights have a diameter of 3.5 mm and are designed to emit ultrasonic waves that make them float through 285 microspeakers.
  The ultimate goal is to equip the lights with movement or temperature sensors, which would allow them to deliver a message, make moving displays, detect the presence of humans, and participate in projection
  mapping. The developer hopes to make the lights available in the market in the next five to ten years.
