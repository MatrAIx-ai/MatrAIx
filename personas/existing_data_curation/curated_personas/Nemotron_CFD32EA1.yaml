    problem-solving'', ''Cloud services (AWS)'']'
  hobbies: '[''Visiting art galleries and museums'', ''Participating in community mural projects'', ''Playing guitar in a local mariachi group'', ''Hiking in the San Bernardino Mountains'', ''Salsa dancing'',
    ''Cooking traditional Mexican cuisine'', ''Street photography'', ''Hosting board-game nights'', ''Collecting vintage vinyl records'', ''Reading contemporary fiction and design theory'']'
  career_goals: Alan aims to become a Director of Product Experience, leading interdisciplinary teams to create culturally resonant digital products. He wants to mentor Latino technologists, launch a community
    platform that showcases local artists, and earn an advanced certification in AI-enhanced design. Additionally, he hopes to teach part-time at a community college, blending his industry expertise with
    his passion for the humanities.
