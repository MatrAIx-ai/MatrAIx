personas:
  professional: Alan Gomez is a bilingual full‑stack developer and UI/UX lead who blends human‑centered design with community outreach, leveraging React, Django, and Adobe Creative Suite to build culturally
    resonant digital experiences while juggling a laid‑back approach to deadlines and a relentless curiosity for AI‑enhanced design.
  sports: Alan Gomez is an avid weekend hiker in the San Bernardino Mountains, an enthusiastic follower of the Los Angeles Dodgers and the LA Lakers, and they occasionally join a local salsa‑dance fitness
    class that doubles as cardio, preferring flexible, outdoor activity over rigid gym routines.
  arts: Alan Gomez is a regular at LA galleries, co‑creates community murals inspired by Frida Kahlo and Diego Rivera, plays guitar in a mariachi ensemble, collects vintage records of Juan Gabriel and Paco
    de Lucía, and captures candid street scenes with a Nikon DSLR, weaving these passions into their design aesthetic.
  travel: Alan Gomez favors spontaneous road trips to places like Joshua Tree, Ojai, and Oaxaca, dreams of exploring Mexico City’s historic neighborhoods, and balances family obligations with a love for
    low‑key cultural immersion, often planning trips on a whim rather than strict itineraries.
  culinary: Alan Gomez enjoys cooking mole poblano, tamales, and fresh salsa with epazote and chipotle, possesses an intermediate skill level that blends traditional recipes with occasional fusion twists,
    and delights in sharing hearty meals with friends while occasionally overindulging in late‑night tacos.
  core: Alan Gomez is a charismatic, slightly disorganized tech‑designer who fuses community‑driven art with cutting‑edge digital products, savoring vintage vinyl, spicy food, and weekend hikes while juggling
    a relaxed stance on money and health.
background:
  cultural: Alan is a Mexican-American who grew up in a bilingual household in Southern California. His family maintains strong ties to Mexican traditions such as Día de los Muertos, posadas, and cooking
    regional dishes, while also embracing the broader Californian culture. He speaks fluent Spanish and English, and often volunteers at local Latino community centers, organizing tech-learning workshops
    for youth. His cultural identity informs his values of familismo, community solidarity, and respect for diverse perspectives, which he brings into his professional collaborations and creative projects.
attributes:
  skills: '[''Full-stack web development (JavaScript, React, Node.js, Python, Django)'', ''UI/UX design and user research'', ''Graphic design with Adobe Photoshop, Illustrator, InDesign'', ''Data visualization
