  career_goals: She aspires to become a freelance visual artist and concept illustrator, hoping to study fine arts or graphic design at a college that offers a flexible curriculum. She dreams of creating
    a portfolio that blends traditional drawing with digital media, and someday publishing illustrated books or comics that explore personal emotions and mental health themes. In the longer term, she envisions
    running her own small creative studio that collaborates with indie game developers and mental‑health initiatives, allowing her to work on projects that inspire and soothe others while maintaining a
    schedule that accommodates her need for spontaneity and self‑care.
