personas:
  professional: Rigoberto Crespo is a data‑driven integrated marketing strategist in the Dallas‑Fort Worth area, adept at crafting bilingual brand narratives and leveraging AR and analytics tools, while
    they channel a spontaneous, agile mindset that fuels rapid concept pivots but sometimes clashes with rigid deadline structures.
  sports: Rigoberto Crespo roots for the Dallas Cowboys and the Mavericks, plays pickup soccer on Saturday mornings at a local league, joins a weekly hiking group that explores the Texas Hill Country trails,
    and squeezes in early‑morning jogs along the Trinity River Trail to balance cardio with creative brainstorming, while they use these activities as informal labs for consumer insights.
  arts: Rigoberto Crespo frequents the Dallas Museum of Art and the Crow Museum, sketches street murals inspired by artists like Banksy and Kehinde Wiley, curates playlists featuring Tame Impala, Glen Hansard,
    and the regional folk duo The Desert Roses, and volunteers to teach mural techniques to youth through a community arts program, while they blend visual storytelling with brand messaging.
  travel: Rigoberto Crespo’s travel style blends spontaneous road trips to the Texas Hill Country vineyards with planned visits to cultural capitals like Barcelona for its street‑art scene and Lisbon for
    its historic neighborhoods, while they also enjoy weekend getaways to Austin’s music festivals and occasional backpacking adventures in Patagonia to satisfy their appetite for both music and rugged
    landscapes.
  culinary: Rigoberto Crespo enjoys cooking at home, mastering dishes such as slow‑cooked pork tacos, roasted corn elotes with cotija cheese, and cilantro‑lime quinoa bowls, experimenting with fusion twists
    like taco‑sushi rolls, and often hosts dinner parties where they showcase skillful use of fresh chilies, avocado, and locally sourced herbs.
  core: Rigoberto Crespo fuses data‑savvy marketing with a painter’s eye, juggling midnight guitar sessions, spontaneous mural tours, and occasional deadline meltdowns, while they keep a stash of art supplies
    in their office as a reminder of their creative side.
background:
  cultural: Rigoberto grew up in a bilingual household in Texas, the son of Mexican immigrants from the state of Jalisco. His family preserved many Mexican customs—celebrating Día de los Muertos with altars,
    preparing tamales during holidays, and listening to mariachi and regional folk music—while also embracing the multicultural environment of the Dallas‑Fort Worth metroplex. Fluent in both Spanish and
    English, he naturally bridges cultural contexts, which informs his professional work in crafting bilingual messaging that resonates authentically with Hispanic audiences. He remains active in the local
    Mexican community, attending events such as the annual Cinco de Mayo parade and supporting Mexican‑owned businesses in Lewisville. His appreciation for Mexican visual arts—from the murals of Diego Rivera
    to contemporary urban graffiti—shapes his aesthetic sensibilities and drives his commitment to integrating cultural storytelling into modern marketing.
attributes:
  skills: '[''Digital Marketing Strategy'', ''Social Media Management'', ''Bilingual Content Creation (English/Spanish)'', ''Data Analytics (Google Analytics, SEM tools)'', ''Brand Storytelling'', ''Creative
    Direction'', ''Market Research'', ''Influencer Partnerships'', ''Agile Project Management'', ''Content Production (copywriting, photography, basic graphic design)'']'
  hobbies: '[''Visiting contemporary art galleries and street‑mural tours'', ''Playing acoustic guitar and composing simple melodies'', ''Cooking traditional and fusion Mexican cuisine'', ''Street photography
    in urban Dallas'', ''Hiking in Texas Hill Country'', ''Reading design and psychology books'', ''Attending live music concerts'', ''Participating in community art workshops for youth'']'
  career_goals: Rigoberto aims to become a senior marketing leader who shapes regional brand strategies with a cultural lens, eventually stepping into a Director of Marketing role overseeing multicultural
    communications for a national consumer‑goods company. He plans to deepen his expertise in data science for marketing by completing a certification in Marketing Analytics and to earn an MBA with a focus
    on strategic brand management. In the longer term, he envisions launching a boutique agency that helps emerging brands craft culturally resonant campaigns rooted in art and technology, especially targeting
    the growing Hispanic market in the Southwest. Alongside career advancement, he is committed to mentoring junior marketers from underrepresented backgrounds and advocating for inclusive creative practices
    within his organization.
