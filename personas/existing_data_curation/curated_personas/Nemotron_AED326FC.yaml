personas:
  professional: Emma Mangum is an administrative assistant with a humanities background who blends meticulous calendar management, polished document preparation, and a curiosity for new software tools,
    while they embrace a relaxed approach to strict deadlines and aspire to become a senior office manager at a cultural institution in Kalamazoo.
  sports: Emma Mangum stays active by hiking the trails of Van Buren State Park in the summer, joining the Lake Michigan Trail Blazers running club for weekday jogs, cheering on the Detroit Tigers and Michigan
    Wolverines, and playing casual volleyball with the Kalamazoo Community Sports League during the fall, while they balance a love of low‑key outdoor movement with occasional binge‑watching of sports highlights.
  arts: Emma Mangum immerses themselves in the arts by regularly visiting the Kalamazoo Institute of Arts and local galleries, attending live shows featuring indie musicians like Bon Iver and St. Vincent,
    reading contemporary fiction and literary essays, and supporting community theater productions, all of which they cite as essential nourishment for their creative soul.
  travel: Emma Mangum favors flexible, low‑key travel experiences, often planning weekend road trips to nearby gems like Door County and Traverse City while they—when schedule permits—venture to European
    literary festivals in Edinburgh or cultural workshops in Kyoto, preferring spontaneous bookings over rigid itineraries but keeping an eye on their modest travel fund.
  culinary: Emma Mangum enjoys experimenting in the kitchen at an intermediate level, often whipping up dishes like butternut squash risotto, kimchi‑topped tacos, and miso‑glazed salmon using fresh Michigan
    cherries and heirloom tomatoes, which they document on their food blog despite occasionally forgetting to set a timer and over‑salting the final dish.
  core: Emma Mangum is a curiosity‑driven cultural enthusiast who balances a love of arts and community with a relaxed, sometimes procrastinative work style and a habit of turning overdue tasks into spontaneous
    creative bursts.
background:
  cultural: Emma grew up in a middle-class family in Kalamazoo, Michigan, with deep roots in the Midwestern United States. Her ancestry traces back to English and Irish immigrants, and her upbringing was
    shaped by the region’s emphasis on community, modesty, and self-reliance. The cultural fabric of Kalamazoo—its public libraries, local farms, university atmosphere, and vibrant arts scene—has influenced
    her values and interests. Family gatherings often featured storytelling and shared meals, reinforcing a respect for tradition while encouraging personal curiosity. Emma’s education in the humanities
    deepened her appreciation for literature, history, and the arts, which she continues to explore through museum visits and local cultural events. The practical, down-to-earth mindset common in the Midwest
    aligns with her balanced approach to new ideas and established methods, and her experience of regional festivals and volunteer initiatives reflects a commitment to civic engagement and collaborative
    effort.
