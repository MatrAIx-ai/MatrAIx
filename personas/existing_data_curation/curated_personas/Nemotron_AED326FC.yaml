  hobbies: '[''Reading fiction and non-fiction, especially contemporary literature and history'', ''Visiting art exhibitions at the Kalamazoo Institute of Arts'', ''Exploring local music venues and indie
    concerts'', ''Hiking and nature walks around nearby parks and lakes'', ''Cooking experimental recipes and food blogging'', ''Photography of urban and natural landscapes'', ''Volunteering at the downtown
    library or community theater'', ''Practicing yoga and mindfulness meditation'', ''Listening to podcasts on humanities topics'', ''Participating in a regional book club'']'
  career_goals: Emma aims to progress from her current administrative assistant role toward senior office management or executive assistant positions, ideally within a cultural organization such as a museum,
    university department, or community arts center in the Kalamazoo region. She plans to obtain a professional administrative certification and a project-management credential to strengthen her expertise
    in workflow optimization and team coordination. Over the next five years, Emma hopes to lead a small team that oversees event planning, community outreach, and digital communications, allowing her to
    blend her practical administrative strengths with her curiosity for new technologies and cultural programming. While she values stability, she also seeks a flexible hybrid work schedule that preserves
    her ability to engage with local arts events and pursue personal interests.
