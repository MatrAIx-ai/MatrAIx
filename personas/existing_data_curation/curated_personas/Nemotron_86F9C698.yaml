  career_goals: Phu Dieu dreams of becoming a professional soccer player who can represent his community and inspire younger kids. At the same time he is fascinated by video‑game design and hopes to study
    computer science or engineering in high school and later create games that bring people together. He envisions earning a sports scholarship that could fund his studies in technology, allowing him to
    blend his competitive spirit with practical problem‑solving.
