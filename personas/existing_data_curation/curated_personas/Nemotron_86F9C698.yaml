personas:
  professional: Phu Ilagan is a middle‑school student who channels their competitive spirit into becoming a promising youth soccer forward, while also excelling at building complex LEGO creations and mastering
    improvisational strategies in Minecraft and Fortnite.
  sports: Phu Ilagan plays as a forward for the neighborhood club Sunrise Soccer Academy, follows the Premier League’s Manchester United and the MLS side Seattle Sounders FC, and spends weekends biking
    on desert trails, combining competitive drive with a love for routine drills and spontaneous pickup games.
  arts: 'Phu Ilagan enjoys building imaginative Minecraft worlds and following K‑pop groups like BTS and BLACKPINK, while also appreciating the artistry of LEGO architects, the cinematic flair of Spider‑Man:
    Into the Spider‑Verse, and the energetic performances of teen pop star Olivia Rodrigo.'
  travel: Phu Ilagan has explored local state parks and a weekend trip to the coast, dreams of biking through the deserts of Arizona’s Red Rock, and hopes to visit Tokyo’s Akihabara district to experience
    its gaming culture and pop‑music scene firsthand.
  culinary: Phu Ilagan assists in cooking family meals featuring adobo‑style braised chicken, sinigang‑type sour soup, and homemade lumpia, enjoys the tactile challenge of rolling spring rolls with garlic
    and pepper, and loves snacking on pizza topped with pepperoni and olives after a long gaming session.
  core: Phu Ilagan is a fiercely competitive 11‑year‑old who balances a love for routine soccer drills with spontaneous Minecraft builds, often juggling impulsive gaming purchases against a secretly disciplined
    savings habit, all while coping with occasional allergies and a knack for making delicious family meals.
background:
  cultural: Phu Dieu comes from a mixed Filipino‑Vietnamese household that settled in Phoenix, Arizona. He speaks English at school and Tagalog at home, and celebrates both Filipino and Vietnamese traditions
    such as Simbang Gabi, Tet, and community fiestas. His family places a strong emphasis on practicality, respect for elders, and collective achievement, which shapes his routine‑oriented habits. At the
    same time, the vibrant multicultural environment of Phoenix and the local Southeast Asian community encourage him to stay active, social, and open to new experiences.
