personas:
  professional: Ivan Kermani, a seasoned retail leader with three decades of front-line management experience, they blend a practical, routine-oriented mindset with compassionate, cooperative leadership
    to streamline inventory, forecast sales, and nurture a harmonious, high-performing team while championing community-focused store events.
  sports: Ivan Kermani, an avid participant in a weekly adult softball league with the Boise River Rebels and a regular hiker with the Foothills Trailblazers, they support the Boise State Broncos football
    team and cheer for the Denver Nuggets during the NBA season, preferring low-impact, social fitness activities that blend camaraderie with the outdoors.
  arts: Ivan Kermani, a devoted fan of folk and classic rock, enjoys listening to John Prine, Bruce Springsteen, and the Avett Brothers while attending the Boise Music Festival, they also appreciate the
    works of director Steven Spielberg and attend the Idaho Shakespeare Festival whenever possible, weaving music and theatre into their social gatherings.
  travel: Ivan Kermani, who prefers relaxed, road-trip style vacations with their spouse, they have explored Yellowstone and Grand Teton National Parks and dream of visiting the Canadian Rockies and Tuscany,
    often planning trips on the fly but reserving a few weeks each year for outdoor adventure and cultural sightseeing.
  culinary: Ivan Kermani, a confident home cook, they relish preparing hearty stews, herb-roasted chicken with rosemary potatoes, salmon cakes seasoned with dill and lemon, and Idaho finger steaks, often
    featuring locally sourced potatoes, fresh herbs, and honey-glazed carrots in family gatherings and community potlucks.
  core: Ivan Kermani is a community-oriented, routine-loving retail veteran who balances a love for group activities and hearty home-cooked meals with a laid-back planning style, often juggling flexible
    schedules, occasional forgetfulness, and a steadfast commitment to harmony.
background:
  cultural: Ivan grew up in a predominantly white, middle‑class family in the Pacific Northwest, with Irish‑Scandinavian ancestry. He was raised on traditional American values—hard work, self‑reliance,
    and community responsibility. Although his surname reflects a Persian heritage, his upbringing was firmly rooted in Boise, Idaho's cultural norms. He embraces local customs like celebrating Thanksgiving
    and Christmas, enjoys Idaho's staple foods such as potato dishes, participates in outdoor recreation on the Boise River and foothills, and values the close‑knit community events that define his hometown.
