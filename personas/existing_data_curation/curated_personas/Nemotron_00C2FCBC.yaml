  hobbies: '[''Community gardening'', ''Fishing'', ''Volunteer work'', ''Adult softball league'', ''Board game nights'', ''Hiking in the foothills'', ''Cooking family meals'', ''Attending local music festivals'']'
  career_goals: Approaching retirement, Ivan aims to secure a promotion to store manager within the next two years, leveraging his extensive supervisory experience to oversee the entire store operation.
    He hopes to implement a mentorship program for emerging retail leaders, improve employee well‑being through flexible scheduling options, and champion community‑focused sales events that boost both revenue
    and local engagement. Ultimately, he envisions leaving a legacy of a harmonious, high‑performing team before transitioning to a semi‑retired role that allows him to volunteer more heavily in his community.
