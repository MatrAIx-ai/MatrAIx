  career_goals: Although retired from formal employment, Carlos aims to remain an active contributor to his community. He aspires to mentor at‑risk youth at the local community center, sharing his construction
    know‑how and life lessons while fostering curiosity about the arts. He hopes to organize a small annual art exhibition that showcases works by senior artists, positioning himself as a competitive entrant
    for regional senior art contests. On a personal level, Carlos wants to compile his memoirs, focusing on his journey as a Mexican‑American widower, and to use his writing as a therapeutic outlet for
    managing anxiety and sadness. He also plans to enroll in online art‑history courses to deepen his appreciation for unconventional artistic movements.
