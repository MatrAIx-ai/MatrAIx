personas:
  professional: David Thomas is a burgeoning automotive technician at a small Hudsonville garage, renowned for translating his artistic eye into custom car designs while juggling ASE certification studies
    and a laid‑back, occasionally disorganized workflow.
  sports: David Thomas cheers for the Detroit Lions, the Detroit Tigers, and the Grand Rapids Griffins, while they’re a member of the Hudsonville Hot Rod Club, often joining pickup basketball games at the
    community center and testing reflexes on the local karting track.
  arts: David Thomas is a steel‑sketching enthusiast who frequents the Ottawa County Cultural Center to admire realist painter Jane Miller, sips craft beer while listening to Led Zeppelin and The Rolling
    Stones, and spends evenings strumming a battered Gibson guitar, channeling the riffs into custom car‑wrap concepts.
  travel: David Thomas prefers spontaneous road trips along Michigan’s shoreline—camping on the dunes of Saugatuck, fishing on Lake Michigan’s clear waters, and dreaming of a future European tour to the
    Nürburgring and Stuttgart’s motor museum—while keeping a modest budget that favors cheap motels over pricey hotels.
  culinary: David Thomas loves hearty Midwestern fare—grilling pork ribs with a homemade barbecue glaze, pan‑frying fresh lake perch with lemon‑butter, and crafting classic Reuben sandwiches topped with
    sauerkraut—though their cooking skill remains at a respectable ‘bench‑side’ level, relying on simple recipes and occasional YouTube grill‑master tips.
  core: David Thomas is a 23‑year‑old garage‑dwelling dreamer who fuses auto mechanics with classic‑rock riffs, trades schedule rigor for free‑wheeling creativity, and navigates life through a toolbox‑like
    approach to money, health, and adventure.
background:
  cultural: David grew up in Hudsonville, a close‑knit community in Ottawa County, Michigan. His family reflects the region’s traditional white, middle‑class Midwest upbringing, with a strong work ethic
    rooted in the local manufacturing and automotive sectors. Community events like county fairs, high‑school sports, and volunteer fire‑department drives shaped his sense of civic responsibility and camaraderie.
    The area's blend of practical, hands‑on values and an emerging appreciation for local art scenes exposed David to both the reliability of small‑town life and the curiosity to explore unconventional
    ideas. This cultural mix informs his balance of practical skill, artistic interest, and independent yet community‑oriented mindset.
