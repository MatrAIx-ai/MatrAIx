  career_goals: David aims to become a Master Automotive Service Technician by obtaining his ASE certifications and pursuing specialized training in high‑performance and electric vehicle systems. In the
    next three years he plans to enroll in an automotive technology program at a community college to deepen his knowledge of EV powertrains and advanced driver‑assist technologies. Long‑term, he envisions
    opening his own boutique garage that combines meticulous mechanical work with artistic customizations, catering to classic‑car enthusiasts and owners of modified street cars. He also hopes to mentor
    younger technicians and eventually become a regional trainer for a major automotive service network.
