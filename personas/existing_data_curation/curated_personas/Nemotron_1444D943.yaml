  career_goals: Erin dreams of blending her imagination with structure in a future career. She aspires to become a children's book author and illustrator, envisioning fantastical worlds on paper, and also
    imagines a path as a marine biologist exploring ocean ecosystems inspired by her coastal hometown. She hopes to design educational games that teach science and art, and in the short term she aims to
    win her school science fair with an original project and build a portfolio of illustrated stories.
