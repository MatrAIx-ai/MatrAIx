personas:
  professional: Erin Sales, an 8‑year‑old aspiring coder and LEGO architect, channels their vivid imagination into building intricate brick creations while experimenting with block‑based programming that
    animates their whimsical creature drawings, and they meticulously document each step in a colorful notebook.
  sports: Erin Sales, a member of the local beachside junior swim team and an enthusiastic fan of the San Diego Padres, spends summer mornings practicing freestyle laps, joins a Saturday community soccer
    league, and they enjoy occasional sandcastle‑building contests as a playful form of exercise.
  arts: Erin Sales, a budding visual storyteller, sketches quirky pixies inspired by Studio Ghibli and Dr. Seuss, reads fantasy epics like J.K. Rowling’s Harry Potter, plays simple Beethoven lullabies on
    the piano, and they collect stickers of beloved characters such as Mickey Mouse and Elsa, weaving all into nightly bedtime narratives.
  travel: Erin Sales, who loves short family road trips to the tide‑pools of Monterey Bay, a yearly visit to the local aquarium, and dreams of chasing the Northern Lights in Iceland, prefers meticulously
    planned itineraries with coloring‑book maps and occasional beach bonfires, while their modest allowance limits travel to weekend getaways and a day at Disneyland.
  culinary: Erin Sales, a self‑declared connoisseur of cheesy mac & cheese, crunchy fish tacos, fresh fruit salad with strawberry slices, and occasional seaweed snacks, often assists in the kitchen by whisking
    pancake batter and sprinkling powdered sugar on cupcakes, yet they sometimes sneak extra cookies before dinner.
  core: Erin Sales, an imaginative eight‑year‑old with a methodical mind, blends whimsical art, curious coding, and a love of the sea into a uniquely organized yet delightfully solitary world, occasionally
    forgetting chores in favor of LEGO masterpieces.
background:
  cultural: Erin comes from a middle‑class, suburban white family in Bayville, New Jersey. Her upbringing reflects typical American coastal town traditions, such as celebrating holidays like Thanksgiving
    and Fourth of July, participating in local community events, and spending summers at the nearby Atlantic beaches. Her family places a high value on education, creativity, and nature exploration, nurturing
    her imaginative and organized personality. She attends a public elementary school where she interacts with a diverse peer group, but her cultural experiences are primarily rooted in mainstream suburban
    American customs.
