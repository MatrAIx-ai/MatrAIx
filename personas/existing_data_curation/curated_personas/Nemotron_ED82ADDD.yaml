  career_goals: Christine aspires to become an executive chef at a farm‑to‑table restaurant that showcases Midwest ingredients with an artistic twist. In the next five years she plans to earn advanced culinary
    certifications, travel to study regional cuisines in Europe and Asia, and develop a signature tasting menu that fuses traditional Midwestern flavors with unconventional plating. Ultimately, she hopes
    to open her own boutique restaurant in a vibrant community where she can mentor young cooks and curate seasonal, locally sourced dining experiences.
