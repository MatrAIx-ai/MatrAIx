persona_description: An IT professional who is interested in the implementation and deployment of next-generation mobile networks, specifically focusing on the standards-based architectural framework for
  delivering multimedia communications services such as voice, video and text messaging over IP networks. They are likely to have a background in telecommunications and network engineering, and are interested
  in exploring the advantages and benefits of the IP Multimedia Subsystem architecture, including application, network and device independence, reusable components, standards-based solutions, service interconnection,
  service diversity, convergence, and quality of service. They are also likely to have experience with IP networking technologies and protocols, such as SIP, and are interested in exploring how these technologies
  can be used to deliver multimedia communications services over IP networks.
