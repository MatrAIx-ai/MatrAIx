personas:
  professional: Olivia Montreuil, a self-taught mechanical engineer proficient in SolidWorks, Fusion 360, finite element analysis, and Python automation, leads competitive design challenges by merging sleek
    aesthetics with functional prototypes, yet their relaxed attitude toward deadlines often results in last-minute sprints that they navigate with a blend of curiosity and stubborn competitiveness.
  sports: Olivia Montreuil fuels fitness by hiking the Texas Hill Country on weekends, follows the Dallas Mavericks for basketball and the Dallas Cowboys for football, participates in a local ultimate frisbee
    league with the Dallas Doggies club, and attends yoga sessions at a boutique studio to maintain mental flexibility.
  arts: Olivia Montreuil is a regular at the Dallas Museum of Art and the Friday Night Art Walk, draws mechanical inspiration from M.C. Escher's impossible constructions and the vibrant street murals by
    JR, streams ambient soundscapes by Brian Eno while sketching, and immerses themselves in tabletop RPG storytelling that echoes the narrative art of Chris Avellone.
  travel: Olivia Montreuil prefers spontaneous, low-budget road trips, having already driven to the minimalist art scene in Marfa, trekked Enchanted Rock, and explored Austin’s live-music venues, while
    using a flexible itinerary app that lets them shift plans whenever a prototype deadline eases.
  culinary: Olivia Montreuil loves Tex-Mex comfort foods like carne asada tacos garnished with fresh cilantro, lime, and pickled onions, but also experiments with sustainable dishes such as quinoa-stuffed
    bell peppers flavored with smoked paprika and cumin, though they often forget to preheat the oven when a prototype deadline demands their full attention.
  core: Olivia Montreuil is a curiosity-driven, art-infused engineer whose flexible, competitive nature fuels inventive creations, even as their laid-back scheduling and occasional skepticism make them
    a charmingly disorganized dreamer.
background:
  cultural: Olivia’s family traces its roots to French‑Canadian settlers who migrated to Texas several generations ago, giving her a blend of French‑lingual heritage and traditional Texan values. Raised
    in Keller, she grew up with a respect for community festivals, a love of Southern hospitality, and an appreciation for multilingual storytelling. Her upbringing exposed her to both French‑Canadian culinary
    traditions like tourtière during family gatherings and Texas BBQ at local fairs, fostering a multicultural outlook that informs her openness to diverse ideas and artistic expression.
attributes:
  skills: '["Mechanical design", "SolidWorks", "Fusion 360", "Python programming", "Finite element analysis", "Rapid prototyping", "Creative problem solving", "Project coordination"]'
  hobbies: '["Visiting art galleries", "Sketching mechanical concepts", "Digital illustration", "Reading science fiction", "Yoga", "Hiking", "Road trips", "Tabletop RPGs", "Makerspace tinkering"]'
  career_goals: Olivia aims to become a senior engineer leading innovative product development at a company that values flexible work structures, such as a start‑up or a research lab. She wants to specialize
    in sustainable mechanical design and integrate artistic elements into functional products. Over the next five years, she plans to earn a professional engineering license, contribute to patent‑worthy
    projects, and eventually spearhead a cross‑disciplinary R&D team where she can mentor junior engineers and foster an environment that rewards unconventional thinking.
