  hobbies: '[''Cooking Puerto Rican cuisine'', ''Salsa dancing'', ''Beach walks'', ''Yoga and meditation'', ''Gardening'', ''Reading mystery novels'', ''Volunteering for financial literacy'', ''Listening
    to Latin music'']'
  career_goals: Maritza aims to become a senior auditor and eventually earn her CPA license, positioning herself for a future role as a finance manager or chief financial officer within a mid‑size Puerto
    Rican company. She plans to pursue a master's degree in accounting or an MBA to deepen her strategic expertise. Recognizing her desire for flexibility and reduced stress, she also envisions establishing
    a boutique bookkeeping and advisory practice that allows her to set her own schedule while delivering high‑quality financial services to local small businesses.
