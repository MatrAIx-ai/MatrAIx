personas:
  professional: Maritza Hagee, a 32‑year‑old auditor, leverages her solid foundation in financial accounting, audit procedures, and advanced Excel modeling to deliver meticulous audit reports, while her
    practical, detail‑oriented approach is tempered by a flexible mindset that lets her adapt to shifting client needs despite occasional disorganization.
  sports: Maritza Hagee stays active by taking early morning walks along the beaches of Manatí, joining a weekend beach‑volleyball club, and cheering enthusiastically for the Cangrejeros de Santurce basketball
    team during the winter season.
  arts: Maritza Hagee immerses herself in Latin pop and reggaetón, looping Bad Bunny and Ozuna while perfecting salsa steps, unwinds with mystery novels by Agatha Christie and Gillian Flynn, and occasionally
    attends community theatre productions featuring local actor José Figueroa.
  travel: Maritza Hagee prefers spontaneous weekend trips, often driving to the historic streets of Old San Juan or the tranquil coasts of Cayo Espinosa, while dreaming of a month‑long cultural immersion
    in Cartagena’s colonial quarter and the vibrant music scene of Miami.
  culinary: Maritza Hagee, an enthusiastic home cook, prepares classic Puerto Rican dishes such as arroz con gandules, mofongo with chicharrón, and alcapurrias, seasoning them with a signature sofrito blend
    of cilantro, annatto, and recao, and also experiments with fresh mango salsa and coconut rice for friends.
  core: Maritza Hagee blends meticulous audit expertise with a warm, community‑oriented spirit, juggling organized spreadsheets and spontaneous salsa nights while battling perpetual worry and a love for
    unplanned beach walks.
background:
  cultural: Maritza was born and raised in Manatí, Vega Baja, an area known for its close‑knit community and vibrant local traditions. She grew up in a bilingual household, speaking Spanish at home and
    learning English at school, and she identifies strongly with the Afro‑Taíno and Spanish influences that shape Puerto Rican culture. Her family places high value on respect, harmony, and mutual support,
    which informs her cooperative and considerate nature. She participates in regional celebrations such as the Festival de la Playa and the annual patron saint festivities, and she maintains strong ties
    with extended family, often gathering for Navidad and other holiday meals featuring classic island fare.
attributes:
  skills: '[''Financial accounting'', ''Auditing and internal controls'', ''Tax compliance'', ''QuickBooks'', ''SAP'', ''Oracle Financials'', ''Advanced Excel'', ''Data analysis'', ''Regulatory reporting'',
