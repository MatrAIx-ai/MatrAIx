  career_goals: Wendy aims to advance to a regional manager position within the next three to five years, overseeing multiple store locations across the region. She plans to obtain a professional management
    certification such as Certified Manager or PMP and pursue an associate degree in business administration to complement her practical experience. Her ambition includes implementing more efficient operational
    frameworks that boost productivity and employee retention. Long‑term, she envisions potentially launching her own small business rooted in the local community, leveraging her retail expertise and understanding
    of regional market dynamics.
