persona_description: A medical practitioner who specializes in oral and maxillofacial surgery. They have a keen interest in antibiotic usage and its potential risks, particularly in the context of Clostridium
  difficile colitis (CDI). They are aware of the increasing incidence of antibiotic-associated CDI and the high mortality rate associated with the disease. They are familiar with the symptoms and diagnosis
  of CDI and have experience with the treatment of the infection, including the use of antibiotics and metronidazole. They are aware of the potential for CDI to be caused by other antibiotics, including
  amoxcillin and fluoroquinolones. They are also aware of the importance of weighing the benefits and risks of antibiotic usage and the potential for antibiotic-associated CDI to be a serious complication.
