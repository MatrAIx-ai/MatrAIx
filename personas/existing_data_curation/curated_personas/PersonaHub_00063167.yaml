persona_description: A neuroscientist who specializes in the study of the spinal cord and its functions, particularly in the area of pain and itch. His research interests include the mechanisms of itch
  sensation, the role of the spinothalamic tract in transmitting itch signals to the brain, and the development of new treatments for itch disorders such as AIDS or Hodgkin's disease. He has made significant
  contributions to the field of neuroscience through his research on how scratching interferes with the itch signal and the development of new therapies for itch.
