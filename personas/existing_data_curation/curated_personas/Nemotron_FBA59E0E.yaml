  career_goals: Although retired from formal employment, Maria aims to strengthen her role as a cultural mentor within her community. She plans to organize a yearly family reunion that showcases Mexican
    traditions, teach her grandchildren and nearby youth how to cook classic dishes, and develop a small community garden project that supplies fresh produce to a local food bank. Maria also hopes to learn
    basic digital photography to document family history and share it on social media, thereby preserving her heritage for future generations.
