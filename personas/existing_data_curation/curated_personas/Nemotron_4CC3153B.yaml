  hobbies: '[''Karaoke singing'', ''Acoustic guitar playing'', ''Basketball league'', ''Fishing on Mobile Bay'', ''Volunteering at community health fairs'', ''Attending high school football games'', ''Cooking
    Southern cuisine'', ''Health‑education blogging'']'
  career_goals: In the short term, Nicolas plans to earn an associate's degree in health administration while continuing to work as a health services manager assistant. He aims to obtain certification as
    a Certified Medical Manager (CMM) within the next two years. Long‑term, he envisions becoming the clinic manager of a larger multi‑specialty practice in the Gulf Coast region, and eventually progressing
    to a regional health services director position. He is particularly interested in implementing streamlined patient flow processes, telehealth integration, and community health outreach programs that
    improve access for underserved populations. Nicolas also hopes to leverage his sociable nature to become a mentor for new staff and a spokesperson for health education initiatives in Baldwin County.
