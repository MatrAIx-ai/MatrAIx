  career_goals: David aims to enroll in a Bachelor’s program in Graphic Design or Visual Communications, with a focus on integrating art, technology, and heritage storytelling. In the short term, he plans
    to secure an internship with the Annapolis Maritime Museum or the U.S. Naval Academy Museum to gain hands-on experience in exhibit design and digital interpretation. He hopes to develop a professional
    portfolio that blends his love of local history with modern visual media, eventually working as a museum exhibit designer, cultural institution media coordinator, or creative marketer for arts-focused
    organizations. Long-term, he envisions launching a freelance design studio that serves small businesses and cultural nonprofits in the Mid-Atlantic, while continuing to experiment with emerging tools
    like AR/VR for immersive heritage experiences.
