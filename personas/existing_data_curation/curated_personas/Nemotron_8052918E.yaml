personas:
  professional: David Quick is a 21‑year‑old aspiring graphic designer who blends his love of maritime history with digital illustration, using Adobe Creative Suite to craft museum‑ready exhibit concepts
    while leveraging an organized yet flexible work style to juggle freelance gigs, volunteer art workshops, and a part‑time customer‑service job.
  sports: David Quick enjoys weekend sails with the Annapolis Sailing Club, follows the Baltimore Ravens and Orioles, plays occasional intramural soccer with friends, and balances their love of the water
    with light jogging, reflecting an adaptable, moderately social approach to fitness.
  arts: David Quick immerses themselves in the local arts scene, sketching waterfront vistas after shows by indie folk artist Sufjan Stevens, admiring Edward Hopper’s paintings at the Baltimore Museum of
    Art, and curating a photo‑essay series inspired by Ansel Adams, which fuels their creative identity and occasional perfectionist tendencies.
  travel: David Quick prefers loosely planned road trips that blend historic stops—like Colonial Williamsburg and Boston’s Freedom Trail—with spontaneous coastal detours, has already visited Edinburgh for
    its maritime museums and dreams of sailing the Greek islands, illustrating their curiosity‑driven yet budget‑conscious travel style.
  culinary: David Quick’s experimental kitchen blends classic mac and cheese with truffle oil, Korean gochujang‑glazed fried chicken, and a pumpkin‑curry stew featuring miso and harissa, showing a college‑level
    cooking skill set that leans on bold ingredient pairings discovered through travel documentaries.
  core: David Quick is a curious, organized 21‑year‑old who fuses maritime history with modern design, yet can’t resist a late‑night vintage camera purchase.
background:
  cultural: David is a white American raised in Annapolis, Maryland, a city steeped in colonial heritage and maritime tradition. His family traces its roots to German and Irish immigrants who settled in
    the Mid-Atlantic region generations ago. Growing up near the U.S. Naval Academy and the historic district, he absorbed a blend of patriotic American customs and a strong appreciation for nautical culture.
    He celebrates mainstream holidays such as Thanksgiving, Independence Day, and Christmas, while also participating in local events like the Annapolis Maritime Festival and the Maryland Film Festival.
    The diversity of Annapolis’s waterfront community, combined with his curiosity about global art and cuisine, has shaped an open-minded outlook that values both traditional American folk art and contemporary,
    experimental creative expression.
